# Publish the OpenMates Python SDK to PyPI.
# - dev branch → next alpha on the configured alpha train, e.g. 0.15.0a4
# - main branch → configured stable base, e.g. 0.15.0
# - pull requests → validate build/tests only, never publish
#
# Uses PyPI Trusted Publishing (OIDC) — no PYPI_API_TOKEN secret needed.
# Configure at: PyPI → Account settings → Publishing → Add pending publisher.
name: Publish Python SDK

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/publish-python-sdk.yml
      - backend/apps/**/app.yml
      - packages/openmates-python/**
      - scripts/ci_impact.py
      - scripts/generate_sdk_app_skills.py
      - scripts/prepare_python_publish_version.py
      - scripts/tests/test_ci_impact.py
      - scripts/tests/test_ci_workflow_scope.py
      - scripts/tests/test_prepare_python_publish_version.py
      - shared/config/product_version.json
  push:
    branches: [main, dev]
    paths:
      - .github/workflows/publish-python-sdk.yml
      - backend/apps/**/app.yml
      - packages/openmates-python/**
      - scripts/ci_impact.py
      - scripts/generate_sdk_app_skills.py
      - scripts/prepare_python_publish_version.py
      - scripts/tests/test_ci_impact.py
      - scripts/tests/test_ci_workflow_scope.py
      - scripts/tests/test_prepare_python_publish_version.py
      - shared/config/product_version.json
  workflow_dispatch: {}

concurrency:
  group: publish-python-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package test dependencies
        run: python -m pip install --upgrade pip pytest build cryptography requests

      - name: Run Python SDK tests
        run: python -m pytest packages/openmates-python/tests scripts/tests/test_prepare_python_publish_version.py

      - name: Check product/Python package version alignment
        run: python scripts/prepare_python_publish_version.py --channel=check

      - name: Build Python SDK package
        working-directory: packages/openmates-python
        run: python -m build

  publish:
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.stable-version.outputs.version || steps.dev-version.outputs.version }}
      published: ${{ steps.pypi-existing.outputs.published != 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Bump prerelease version
        id: dev-version
        if: github.ref == 'refs/heads/dev'
        run: |
          version="$(python scripts/prepare_python_publish_version.py --channel=dev)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Bump to stable version
        id: stable-version
        if: github.ref == 'refs/heads/main'
        run: |
          version="$(python scripts/prepare_python_publish_version.py --channel=main)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether stable version is already published
        id: pypi-existing
        if: github.ref == 'refs/heads/main'
        env:
          VERSION: ${{ steps.stable-version.outputs.version }}
        run: |
          set +e
          python - <<'PY'
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/openmates/{version}/json", timeout=10) as response:
                  raise SystemExit(0 if response.status == 200 else 1)
          except urllib.error.HTTPError as exc:
              raise SystemExit(1 if exc.code == 404 else 2)
          except (TimeoutError, urllib.error.URLError):
              raise SystemExit(2)
          PY
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "openmates $VERSION is already published; skipping PyPI publish."
          elif [ "$status" -eq 1 ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unable to determine whether openmates $VERSION exists on PyPI." >&2
            exit 1
          fi

      - name: Build Python SDK package
        working-directory: packages/openmates-python
        run: python -m build

      - name: Publish to PyPI
        if: github.ref == 'refs/heads/dev' || steps.pypi-existing.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/openmates-python/dist/
          skip-existing: true

  notify:
    needs: publish
    if: github.ref == 'refs/heads/main' && needs.publish.result == 'success' && needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify Discord about PyPI release
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Discord webhook secret DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          payload = {
              "username": "OpenMates CI",
              "embeds": [
                  {
                      "title": f"PyPI SDK release v{version}",
                      "url": os.environ["RUN_URL"],
                      "color": 0x2ecc71,
                      "fields": [
                          {"name": "Package", "value": "`openmates`", "inline": True},
                          {"name": "Version", "value": f"`{version}`", "inline": True},
                          {"name": "Index", "value": "`PyPI`", "inline": True},
                      ],
                      "footer": {"text": "OpenMates GitHub Actions"},
                  }
              ],
          }
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json", "User-Agent": "OpenMates-GitHub-Actions"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=10) as response:
                  if response.status >= 300:
                      print(f"::warning::Discord notification returned HTTP {response.status}")
          except (urllib.error.URLError, TimeoutError) as exc:
              print(f"::warning::Discord notification failed: {exc}")
          PY
