# .github/workflows/vitest.yml
#
# Runs Vitest unit tests for frontend packages.
# Covers store logic, utilities, encryption, message parsing, and status page tests.
#
# Triggers:
# - Push to dev branch (path-filtered)
# - Pull requests targeting dev (path-filtered)
# - workflow_dispatch (called by scripts/run_tests.py orchestrator)
#
# Architecture: docs/architecture/github-actions-ci.md

name: "Vitest: Unit Tests"

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - "!frontend/apps/web_app/tests/**"
  pull_request:
    branches: [dev]
    paths:
      - "frontend/**"
      - "!frontend/apps/web_app/tests/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name || 'dev' }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: frontend
      - name: Run UI package tests
        id: ui_tests
        continue-on-error: true
        run: |
          mkdir -p $GITHUB_WORKSPACE/test-results
          cd frontend/packages/ui
          npx vitest run --reporter=json > $GITHUB_WORKSPACE/test-results/vitest-ui.json 2>&1 || true
      - name: Run web app unit tests
        id: webapp_tests
        continue-on-error: true
        run: |
          cd frontend/apps/web_app
          npx vitest run --reporter=json > $GITHUB_WORKSPACE/test-results/vitest-webapp.json 2>&1 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail if tests failed
        if: steps.ui_tests.outcome == 'failure' || steps.webapp_tests.outcome == 'failure'
        run: exit 1
