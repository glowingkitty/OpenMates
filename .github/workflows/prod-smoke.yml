# .github/workflows/prod-smoke.yml
#
# Production smoke tests dispatched by the dev server, not by GitHub schedule.
# The dev server owns cadence, polling, deduplication, and Discord/email
# notification through `python3 scripts/run_tests.py ...` so alerts come from
# one place. This workflow only executes the selected suite and uploads the
# structured artifacts that the dev server parses.

name: "Prod smoke tests"
run-name: "Prod smoke ${{ inputs.suite || 'free-hourly' }} ${{ inputs.dispatch_token || github.run_id }}"

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Production suite to run"
        required: false
        type: choice
        default: "free-hourly"
        options:
          - "free-hourly"
          - "paid-chat"
          - "app-skill-web-search"
      dispatch_token:
        description: "Unique token used by the dev-server runner to identify its dispatched run"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  smoke:
    name: Run prod smoke suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROD_API_URL: https://api.openmates.org
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: ${{ inputs.suite == 'free-hourly' }}
        run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web_app

      - name: Build CLI
        if: ${{ inputs.suite == 'paid-chat' || inputs.suite == 'app-skill-web-search' }}
        run: pnpm --filter openmates build

      - name: Run free reachability spec
        if: ${{ inputs.suite == 'free-hourly' }}
        id: reachability
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          cd frontend/apps/web_app
          npx playwright test "tests/prod-smoke/prod-smoke-reachability.spec.ts" \
            --reporter=list,json \
            > "$GITHUB_WORKSPACE/test-results/reachability.json" || exit_code=$?
          if [ "${exit_code:-0}" != "0" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.PROD_BASE_URL }}

      - name: Run paid CLI chat smoke
        if: ${{ inputs.suite == 'paid-chat' }}
        id: paid_chat
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          python3 scripts/verify_prod_cli_smoke.py \
            --scenario paid-chat \
            --api-url "$PROD_API_URL" \
            --skip-build \
            > "$GITHUB_WORKSPACE/test-results/paid-chat.json" || exit_code=$?
          if [ "${exit_code:-0}" != "0" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
        env:
          OPENMATES_API_KEY: ${{ secrets.OPENMATES_TEST_ACCOUNT_API_KEY }}

      - name: Run CLI web-search app-skill smoke
        if: ${{ inputs.suite == 'app-skill-web-search' }}
        id: app_skill_web_search
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          python3 scripts/verify_prod_cli_smoke.py \
            --scenario app-skill-web-search \
            --api-url "$PROD_API_URL" \
            --skip-build \
            > "$GITHUB_WORKSPACE/test-results/app-skill-web-search.json" || exit_code=$?
          if [ "${exit_code:-0}" != "0" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"
        env:
          OPENMATES_API_KEY: ${{ secrets.OPENMATES_TEST_ACCOUNT_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-smoke-results-${{ github.run_id }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail workflow on selected suite failure
        if: |
          (inputs.suite == 'free-hourly' && steps.reachability.outputs.status == 'failed') ||
          (inputs.suite == 'paid-chat' && steps.paid_chat.outputs.status == 'failed') ||
          (inputs.suite == 'app-skill-web-search' && steps.app_skill_web_search.outputs.status == 'failed')
        run: exit 1
