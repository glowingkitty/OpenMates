# .github/workflows/pytest-unit.yml
#
# Runs pytest unit tests for the backend (excluding integration, slow, vault, benchmark).
# Covers status aggregation, URL normalization, text sanitization, and other pure-logic tests.
#
# Triggers:
# - Push to dev branch (path-filtered)
# - Pull requests targeting dev (path-filtered)
# - workflow_dispatch (called by scripts/run_tests.py orchestrator)
#
# Architecture: docs/architecture/github-actions-ci.md

name: "Pytest: Unit Tests"

on:
  push:
    branches: [dev]
    paths:
      - "backend/**"
  pull_request:
    branches: [dev]
    paths:
      - "backend/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name || 'dev' }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r backend/requirements-dev.txt
          pip install -r backend/core/api/requirements.txt 2>/dev/null || true
      - name: Run unit tests
        id: pytest_run
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/test-results
          cd backend
          pytest tests/ \
            -m "not integration and not slow and not vault and not benchmark and not provider_contract" \
            -v --tb=short --color=no \
            --ignore=tests/fixtures \
            --ignore=tests/provider_contracts \
            --ignore=tests/test_encryption_service.py \
            --ignore=tests/test_integration_encryption.py \
            --ignore=tests/test_status_service_v2.py \
            --continue-on-collection-errors \
            --json-report --json-report-file=$GITHUB_WORKSPACE/test-results/pytest-results.json \
            2>&1 | tee $GITHUB_WORKSPACE/test-results/pytest-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail if tests failed
        if: steps.pytest_run.outcome == 'failure'
        run: exit 1
