# .github/workflows/cli-integration.yml
#
# Runs mandatory live CLI integration checks separately from browser Playwright
# specs. The workflow intentionally fails when the API-key secret is missing so
# CLI coverage cannot be hidden behind skipped Playwright phases.
#
# Architecture: docs/architecture/test-orchestration.md

name: "CLI: Integration"
run-name: "CLI Integration ${{ github.run_number }}"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-cli-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build openmates CLI
        run: pnpm --filter openmates build
        working-directory: frontend
      - name: Run CLI integration checks
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          node tests/code-docs.integration.mjs \
            --output "$GITHUB_WORKSPACE/test-results/cli-integration.json"
        working-directory: frontend/packages/openmates-cli
        env:
          OPENMATES_TEST_ACCOUNT_API_KEY: ${{ secrets.OPENMATES_TEST_ACCOUNT_API_KEY }}
          OPENMATES_CLI_TEST_API_URL: ${{ secrets.E2E_DEV_API_URL }}
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.E2E_DEV_TEST_BASE_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-integration-results
          path: test-results/cli-integration.json
          if-no-files-found: ignore
          retention-days: 7
