# .github/workflows/daily-tests.yml
#
# Daily test suite for OpenMates — replaces the crontab-based run-tests-daily.sh.
#
# Runs pytest (unit), vitest (frontend unit), and Playwright E2E specs in parallel.
# Playwright specs are sharded across 4 matrix jobs (18 specs each) using separate
# test accounts to avoid collisions.
#
# Triggers:
# - Manual: workflow_dispatch with suite/environment selectors
# - CLI: python3 scripts/sessions.py trigger-tests
# - Cron: dev server crontab triggers via `gh workflow run` at 3am UTC
#
# Security:
# - Minimal permissions (contents: read only)
# - All secrets via ${{ secrets.* }} (never logged)
# - Playwright hits the public Vercel frontend (E2E_DEV_TEST_BASE_URL secret)
# - Only runs on dev branch
#
# Architecture: docs/architecture/github-actions-ci.md

name: Daily Test Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        type: choice
        options:
          - all
          - playwright
          - pytest
          - vitest
        default: all
      spec:
        description: "Single spec file to run (e.g. chat-flow.spec.ts). Leave empty for all."
        type: string
        default: ""
      environment:
        description: "Target environment"
        type: choice
        options:
          - development
          - production
        default: development

# Only one test run at a time
concurrency:
  group: daily-tests
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------
  # Gate: skip if no commits in last 24h (scheduled only)
  # -----------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
      - name: Check for recent commits
        id: check
        run: |
          # Check for commits in last 24 hours — skip if nothing changed
          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          if [ "$COMMITS" -eq 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No commits in last 24h — skipping"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "$COMMITS commit(s) in last 24h — running"
          fi

  # -----------------------------------------------------------------
  # pytest: backend unit tests
  # -----------------------------------------------------------------
  pytest:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'pytest' || github.event.inputs.suite == '')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pytest pytest-json-report pytest-asyncio
          pip install -r backend/core/api/requirements.txt
          pip install -r backend/requirements-dev.txt
      - name: Run pytest
        run: |
          mkdir -p test-results
          python -m pytest backend/tests/ \
            -m "not integration and not benchmark" \
            --ignore=backend/tests/test_encryption_service.py \
            --ignore=backend/tests/test_integration_encryption.py \
            --tb=short -q \
            --json-report --json-report-file=test-results/pytest.json \
            || true
        env:
          OPENMATES_TEST_ACCOUNT_API_KEY: ${{ secrets.OPENMATES_TEST_ACCOUNT_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: test-results/pytest.json
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # vitest: frontend unit tests
  # -----------------------------------------------------------------
  vitest:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'vitest' || github.event.inputs.suite == '')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: frontend
      - name: Run vitest (packages/ui)
        run: |
          mkdir -p $GITHUB_WORKSPACE/test-results
          npx vitest run --config vitest.simple.config.ts --reporter=json \
            > $GITHUB_WORKSPACE/test-results/vitest.json 2>&1 || true
        working-directory: frontend/packages/ui
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-results
          path: test-results/vitest.json
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # Playwright: E2E specs
  # When `spec` input is set: runs that single spec on 1 runner (account 1).
  # Otherwise: shards all specs across 10 parallel runners (~7 specs each).
  # Each runner uses a separate test account to avoid session collisions.
  # -----------------------------------------------------------------
  playwright:
    runs-on: ubuntu-latest
    needs: [gate]
    if: needs.gate.outputs.should_run == 'true' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'playwright' || github.event.inputs.suite == '')
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - batch: 0
            account: 1
          - batch: 1
            account: 2
          - batch: 2
            account: 3
          - batch: 3
            account: 4
          - batch: 4
            account: 5
          - batch: 5
            account: 6
          - batch: 6
            account: 7
          - batch: 7
            account: 8
          - batch: 8
            account: 9
          - batch: 9
            account: 10
    steps:
      # Skip batches 1-3 when running a single spec
      - name: Skip extra batches for single-spec run
        id: skip_check
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ] && [ "${{ matrix.batch }}" != "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          ref: dev
      - uses: actions/setup-node@v4
        if: steps.skip_check.outputs.skip != 'true'
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        if: steps.skip_check.outputs.skip != 'true'
      - name: Install dependencies
        if: steps.skip_check.outputs.skip != 'true'
        run: pnpm install --no-frozen-lockfile
        working-directory: frontend
      - name: Install Playwright browsers
        if: steps.skip_check.outputs.skip != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web_app
      - name: Get spec batch
        id: batch
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ]; then
            # Single/multi spec mode — prefix each spec with tests/ for exact matching
            SPECS=""
            for s in ${{ github.event.inputs.spec }}; do
              SPECS="$SPECS tests/$s"
            done
            echo "SPECS_FOR_BATCH=${SPECS# }" >> "$GITHUB_OUTPUT"
          else
            python3 scripts/ci/get_spec_batch.py ${{ matrix.batch }} 7
          fi
        env:
          PROJECT_ROOT: ${{ github.workspace }}
      - name: Run Playwright batch ${{ matrix.batch }}
        id: pw_run
        if: steps.skip_check.outputs.skip != 'true' && steps.batch.outputs.SPECS_FOR_BATCH != ''
        continue-on-error: true
        run: |
          mkdir -p $GITHUB_WORKSPACE/test-results
          cd frontend/apps/web_app
          npx playwright test ${{ steps.batch.outputs.SPECS_FOR_BATCH }} \
            --reporter=json \
            > $GITHUB_WORKSPACE/test-results/playwright-${{ matrix.batch }}.json
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.E2E_DEV_TEST_BASE_URL }}
          OPENMATES_TEST_ACCOUNT_1_EMAIL: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_EMAIL', matrix.account)] }}
          OPENMATES_TEST_ACCOUNT_1_PASSWORD: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_PASSWORD', matrix.account)] }}
          OPENMATES_TEST_ACCOUNT_1_OTP_KEY: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_OTP_KEY', matrix.account)] }}
          PLAYWRIGHT_WORKER_SLOT: "1"
          SIGNUP_TEST_EMAIL_DOMAINS: ${{ secrets.SIGNUP_TEST_EMAIL_DOMAINS }}
          MAILOSAUR_API_KEY: ${{ secrets.MAILOSAUR_API_KEY }}
          MAILOSAUR_SERVER_ID: ${{ secrets.MAILOSAUR_SERVER_ID }}
      - uses: actions/upload-artifact@v4
        if: always() && steps.skip_check.outputs.skip != 'true'
        with:
          name: playwright-results-${{ matrix.batch }}
          path: test-results/playwright-${{ matrix.batch }}.json
          if-no-files-found: ignore
      - name: Fail if Playwright tests failed
        if: steps.skip_check.outputs.skip != 'true' && steps.pw_run.outcome == 'failure'
        run: |
          echo "::error::Playwright batch ${{ matrix.batch }} failed"
          exit 1

  # -----------------------------------------------------------------
  # Report: aggregate results, email, OpenObserve, webhook
  # -----------------------------------------------------------------
  report:
    runs-on: ubuntu-latest
    needs: [gate, pytest, vitest, playwright]
    if: always() && needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Aggregate and report
        run: |
          python3 scripts/ci/aggregate_results.py
        env:
          ARTIFACTS_DIR: artifacts
          OPENMATES_API_URL: ${{ secrets.OPENMATES_API_URL }}
          OPENMATES_WEBHOOK_KEY: ${{ secrets.OPENMATES_WEBHOOK_KEY }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: dev
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aggregated-results
          path: test-results/last-run.json
          if-no-files-found: ignore
