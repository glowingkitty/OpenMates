# Real-dev OpenMates CLI smoke for typed Tasks and Workflows commands.
name: Typed Task/Workflow CLI Smoke

on:
  workflow_dispatch:
    inputs:
      account:
        description: Test account slot to use
        required: false
        default: "18"
        type: string
  schedule:
    - cron: "41 5 * * 1-5"
  push:
    branches: [dev]
    paths:
      - .github/workflows/app-skill-cli-smoke.yml
      - backend/apps/tasks/**
      - backend/apps/workflows/**
      - frontend/packages/openmates-cli/**
      - scripts/openmates_cli_test_account.mjs
      - scripts/verify_app_skill_cli_smoke.py

concurrency:
  group: app-skill-cli-smoke-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENMATES_API_URL: https://api.dev.openmates.org
      OPENMATES_TEST_ACCOUNT_EMAIL: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_EMAIL', inputs.account || '18')] }}
      OPENMATES_TEST_ACCOUNT_PASSWORD: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_PASSWORD', inputs.account || '18')] }}
      OPENMATES_TEST_ACCOUNT_OTP_KEY: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_OTP_KEY', inputs.account || '18')] }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter openmates build

      - name: Run real-dev typed task/workflow smoke
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-results
          python3 scripts/verify_app_skill_cli_smoke.py \
            --api-url "$OPENMATES_API_URL" \
            --skip-build \
            | tee test-results/app-skill-cli-smoke.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-skill-cli-smoke-${{ github.run_id }}
          path: test-results/app-skill-cli-smoke.json
          if-no-files-found: ignore
          retention-days: 14
