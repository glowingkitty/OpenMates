# Publish openmates CLI to npm when CLI code changes.
# - main branch → npm `latest` tag (stable release)
# - dev branch → npm `alpha` tag (prerelease)
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure at: npmjs.com → openmates → Settings → Trusted Publishing → Link GitHub repo.
name: Publish CLI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/packages/openmates-cli/**'
      - '.github/workflows/publish-cli.yml'
  workflow_dispatch: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24  # Ships with npm 11.x (Trusted Publishing requires >=11.5.1)

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter openmates build

      - name: Run CLI tests
        run: pnpm --filter openmates test

      - uses: actions/upload-artifact@v4
        with:
          name: openmates-cli-dist
          path: frontend/packages/openmates-cli/dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24  # Ships with npm 11.x (Trusted Publishing requires >=11.5.1)
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          name: openmates-cli-dist
          path: frontend/packages/openmates-cli/dist

      - name: Bump prerelease version (dev only)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: |
          # Base the bump on the highest published alpha, not package.json,
          # so re-runs after an uncommitted version bump don't collide.
          PUBLISHED=$(npm view openmates@alpha version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
          fi
          npm version prerelease --preid alpha --no-git-tag-version

      - name: Bump to stable version (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/packages/openmates-cli
        run: |
          # Strip prerelease suffix (e.g. 0.9.0-alpha.5 → 0.9.0).
          # If that base is already the published stable, bump patch instead so
          # repeated merges to main produce 0.9.0 → 0.9.1 → 0.9.2 etc.
          CURRENT=$(node -p "require('./package.json').version")
          BASE="${CURRENT%%-*}"
          LATEST=$(npm view openmates version 2>/dev/null || echo "0.0.0")
          HIGHEST=$(printf '%s\n' "$BASE" "$LATEST" | sort -V | tail -1)
          if [ "$BASE" != "$LATEST" ] && [ "$HIGHEST" = "$BASE" ]; then
            npm version "$BASE" --no-git-tag-version --allow-same-version
          else
            npm version "$LATEST" --no-git-tag-version --allow-same-version
            npm version patch --no-git-tag-version
          fi

      - name: Publish to npm (stable)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public

      - name: Publish to npm (alpha)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public --tag alpha
