# Publish openmates CLI to npm.
# - main branch → publishes the next stable patch in the configured release line
#   to npm `latest`
# - pull requests → validate build/tests only, never publish
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure at: npmjs.com → openmates → Settings → Trusted Publishing → Link GitHub repo.
name: Publish CLI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/packages/openmates-cli/**'
      - 'scripts/prepare_cli_publish_version.mjs'
      - 'shared/config/product_version.json'
      - '.github/workflows/publish-cli.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/packages/openmates-cli/**'
      - 'scripts/prepare_cli_publish_version.mjs'
      - 'shared/config/product_version.json'
      - '.github/workflows/publish-cli.yml'
  workflow_dispatch: {}

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24  # Ships with npm 11.x (Trusted Publishing requires >=11.5.1)

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter openmates build

      - name: Run CLI tests
        run: pnpm --filter openmates test

      - name: Check product/CLI version alignment
        run: node scripts/prepare_cli_publish_version.mjs --channel=check

      - uses: actions/upload-artifact@v4
        with:
          name: openmates-cli-dist
          path: frontend/packages/openmates-cli/dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.stable-published.outputs.published != 'true' }}
      version: ${{ steps.stable-version.outputs.version }}
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24  # Ships with npm 11.x (Trusted Publishing requires >=11.5.1)
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          name: openmates-cli-dist
          path: frontend/packages/openmates-cli/dist

      - name: Bump to stable version
        id: stable-version
        run: node scripts/prepare_cli_publish_version.mjs --channel=main

      - name: Check whether stable version is already published
        id: stable-published
        shell: bash
        run: |
          version="${{ steps.stable-version.outputs.version }}"
          if npm view "openmates@$version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "openmates@$version is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (stable)
        if: steps.stable-published.outputs.published != 'true'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public

  notify:
    needs: publish
    if: needs.publish.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify Discord about npm release
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Discord webhook secret DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["VERSION"]
          payload = {
              "username": "OpenMates CI",
              "embeds": [
                  {
                      "title": f"npm CLI release v{version}",
                      "url": os.environ["RUN_URL"],
                      "color": 0x2ecc71,
                      "fields": [
                          {"name": "Package", "value": "`openmates`", "inline": True},
                          {"name": "Version", "value": f"`{version}`", "inline": True},
                          {"name": "Tag", "value": "`latest`", "inline": True},
                      ],
                      "footer": {"text": "OpenMates GitHub Actions"},
                  }
              ],
          }
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json", "User-Agent": "OpenMates-GitHub-Actions"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=10) as response:
                  if response.status >= 300:
                      print(f"::warning::Discord notification returned HTTP {response.status}")
          except (urllib.error.URLError, TimeoutError) as exc:
              print(f"::warning::Discord notification failed: {exc}")
          PY
