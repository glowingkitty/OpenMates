# Publish openmates CLI to npm when CLI code changes on main.
# Requires NPM_TOKEN secret (npmjs.com → Access Tokens → Granular → publish for 'openmates').
name: Publish CLI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/packages/openmates-cli/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Run CLI tests
        run: pnpm --filter openmates test

      - name: Build CLI
        run: pnpm --filter openmates build

      - name: Publish to npm
        run: pnpm --filter openmates publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
