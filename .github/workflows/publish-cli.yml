# Publish openmates CLI to npm when CLI code changes.
# - main branch → npm `latest` tag (stable release)
# - dev branch → npm `alpha` tag (prerelease)
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure at: npmjs.com → openmates → Settings → Trusted Publishing → Link GitHub repo.
name: Publish CLI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/packages/openmates-cli/**'
      - '.github/workflows/publish-cli.yml'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24  # Ships with npm 11.x (Trusted Publishing requires >=11.5.1)
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          cd frontend/packages/openmates-cli && npm install
          cd ../secret-scanner && npm install

      - name: Build CLI
        working-directory: frontend/packages/openmates-cli
        run: npm run build

      - name: Run CLI tests
        working-directory: frontend/packages/openmates-cli
        run: npm test

      - name: Bump prerelease version (dev only)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: |
          # Base the bump on the highest published alpha, not package.json,
          # so re-runs after an uncommitted version bump don't collide.
          PUBLISHED=$(npm view openmates@alpha version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            npm version "$PUBLISHED" --no-git-tag-version --allow-same-version
          fi
          npm version prerelease --preid alpha --no-git-tag-version

      - name: Bump to stable version (main only)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/packages/openmates-cli
        run: |
          # Strip prerelease suffix (e.g. 0.9.0-alpha.5 → 0.9.0).
          # If that base version is already published as stable, publish the next patch instead
          # so repeated merges to main increment: 0.9.0 → 0.9.1 → 0.9.2 etc.
          CURRENT=$(node -p "require('./package.json').version")
          BASE="${CURRENT%%-*}"
          LATEST=$(npm view openmates version 2>/dev/null || echo "0.0.0")
          TARGET=$(node -e "
            const parse = v => v.split('.').map(Number);
            const [a, b] = [parse('$BASE'), parse('$LATEST')];
            const ahead = a[0]-b[0] || a[1]-b[1] || a[2]-b[2];
            if (ahead > 0) { console.log('$BASE'); }
            else { b[2]++; console.log(b.join('.')); }
          ")
          npm version "\$TARGET" --no-git-tag-version --allow-same-version

      - name: Publish to npm (stable)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public

      - name: Publish to npm (alpha)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public --tag alpha
