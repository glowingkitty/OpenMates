# Publish openmates CLI to npm when CLI code changes.
# - main branch → npm `latest` tag (stable release)
# - dev branch → npm `alpha` tag (prerelease)
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# Configure at: npmjs.com → openmates → Settings → Trusted Publishing → Link GitHub repo.
name: Publish CLI

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/packages/openmates-cli/**'
      - '.github/workflows/publish-cli.yml'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --filter openmates...

      - name: Run CLI tests
        run: pnpm --filter openmates test

      - name: Build CLI
        run: pnpm --filter openmates build

      - name: Bump prerelease version (dev only)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: npm version prerelease --preid alpha --no-git-tag-version

      - name: Publish to npm (stable)
        if: github.ref == 'refs/heads/main'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public

      - name: Publish to npm (alpha)
        if: github.ref == 'refs/heads/dev'
        working-directory: frontend/packages/openmates-cli
        run: npm publish --provenance --access public --tag alpha
