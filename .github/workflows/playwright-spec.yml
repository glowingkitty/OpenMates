# .github/workflows/playwright-spec.yml
#
# Runs a single Playwright E2E spec file.
# Designed to be triggered in parallel — one workflow run per spec.
#
# Triggers:
# - workflow_dispatch with spec name and account number
# - Called by scripts/ci/trigger_parallel_specs.sh
#
# Architecture: docs/architecture/github-actions-ci.md

name: "Playwright: Single Spec"
run-name: "Playwright: ${{ github.event.inputs.spec }} account ${{ github.event.inputs.account }} ${{ github.event.inputs.dispatch_token }}"

on:
  workflow_dispatch:
    inputs:
      spec:
        description: "Spec file name (e.g. chat-flow.spec.ts)"
        required: true
        type: string
      account:
        description: "Test account number (1-20)"
        required: true
        type: string
        default: "1"
      record_fixtures:
        description: "Record LLM fixtures instead of replaying mocks"
        type: boolean
        default: false
      use_mocks:
        description: "Use mock LLM responses (requires recorded fixtures)"
        type: boolean
        default: true
      record_live_fixtures:
        description: "Record live provider fixtures instead of replaying cached provider mocks"
        type: boolean
        default: false
      use_live_mocks:
        description: "Use cached live provider mocks for specs that call withLiveMockMarker()"
        type: boolean
        default: true
      create_account_slot:
        description: "Account slot for account-creation utilities. Reserved auth provisioning uses 14-20."
        type: string
        default: ""
      dispatch_token:
        description: "Unique token from scripts/run_tests.py used to identify this dispatch."
        type: string
        default: ""
      checkout_ref:
        description: "Commit SHA selected by scripts/run_tests.py."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  run-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.checkout_ref || 'dev' }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build openmates CLI (required by cli-skills-* specs)
        run: pnpm --filter openmates build
        working-directory: frontend
      - name: Prepare API key for CLI specs
        run: |
          set -euo pipefail
          mkdir -p frontend/apps/web_app/artifacts

          SPEC="${{ github.event.inputs.spec }}"
          API_URL="${{ secrets.E2E_DEV_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://api.dev.openmates.org"
          fi

          needs_fresh_key=0
          if [ "$SPEC" = "__cli_integration_code_docs__" ]; then
            needs_fresh_key=1
          elif [[ "$SPEC" == skill-* ]]; then
            needs_fresh_key=1
          elif [ "$SPEC" = "default-model-cli.spec.ts" ]; then
            needs_fresh_key=1
          fi

          if [ "$needs_fresh_key" -ne 1 ]; then
            echo "OPENMATES_TEST_ACCOUNT_API_KEY=${{ secrets.OPENMATES_TEST_ACCOUNT_API_KEY }}" >> "$GITHUB_ENV"
            exit 0
          fi

          node scripts/openmates_cli_test_account.mjs login \
            --slot "${{ github.event.inputs.account }}" \
            --api-url "$API_URL"

          created_json=$(node frontend/packages/openmates-cli/dist/cli.js \
            --api-url "$API_URL" \
            settings developers api-keys create "gha-${SPEC}-${{ github.run_id }}" --yes --json)

          api_key=$(printf '%s' "$created_json" | node -e 'let raw=""; process.stdin.on("data", d => raw += d); process.stdin.on("end", () => { const start = raw.indexOf("{"); if (start < 0) process.exit(2); const data = JSON.parse(raw.slice(start)); if (!data.api_key || !data.api_key.startsWith("sk-api-")) process.exit(3); process.stdout.write(data.api_key); });')
          api_key_id=$(printf '%s' "$created_json" | node -e 'let raw=""; process.stdin.on("data", d => raw += d); process.stdin.on("end", () => { const start = raw.indexOf("{"); if (start < 0) process.exit(2); const data = JSON.parse(raw.slice(start)); const id = data.key && typeof data.key.id === "string" ? data.key.id : typeof data.id === "string" ? data.id : ""; if (!id) process.exit(3); process.stdout.write(id); });')

          echo "::add-mask::$api_key"

          set +e
          OPENMATES_API_KEY="$api_key" node frontend/packages/openmates-cli/dist/cli.js \
            --api-url "$API_URL" apps math calculate "1+1" --json \
            > frontend/apps/web_app/artifacts/api_key_probe.out \
            2> frontend/apps/web_app/artifacts/api_key_probe.err
          probe_status=$?
          set -e

          if [ "$probe_status" -ne 0 ] && grep -Eq "New device detected|Device not approved" frontend/apps/web_app/artifacts/api_key_probe.err; then
            node scripts/approve_test_api_key_device.mjs --api-url "$API_URL"
            OPENMATES_API_KEY="$api_key" node frontend/packages/openmates-cli/dist/cli.js \
              --api-url "$API_URL" apps math calculate "1+1" --json \
              > frontend/apps/web_app/artifacts/api_key_probe.out \
              2> frontend/apps/web_app/artifacts/api_key_probe.err
          elif [ "$probe_status" -ne 0 ]; then
            cat frontend/apps/web_app/artifacts/api_key_probe.err >&2
            exit "$probe_status"
          fi

          echo "OPENMATES_TEST_ACCOUNT_API_KEY=$api_key" >> "$GITHUB_ENV"
          echo "OPENMATES_CI_API_KEY_ID=$api_key_id" >> "$GITHUB_ENV"
          echo "Prepared fresh CLI API key for $SPEC."
      - name: Run CLI integration checks
        if: github.event.inputs.spec == '__cli_integration_code_docs__'
        id: cli_run
        continue-on-error: true
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-results"
          node tests/code-docs.integration.mjs \
            --output "$GITHUB_WORKSPACE/test-results/cli-integration.json"
        working-directory: frontend/packages/openmates-cli
        env:
          OPENMATES_CLI_TEST_API_URL: ${{ secrets.E2E_DEV_API_URL }}
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.E2E_DEV_TEST_BASE_URL }}
      - name: Install Playwright browsers
        if: github.event.inputs.spec != '__cli_integration_code_docs__'
        run: npx playwright install --with-deps chromium
        working-directory: frontend/apps/web_app
      - name: Install Proton Mail Bridge for live Proton specs
        if: github.event.inputs.spec == 'proton-bridge-live.spec.ts'
        run: |
          set -euo pipefail
          if [ "$(dpkg --print-architecture)" != "amd64" ]; then
            echo "Proton's official Linux Bridge DEB is amd64-only; runner architecture is $(dpkg --print-architecture)."
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y wget gnupg2 pass dbus-x11 libopengl0
          gpg --batch --passphrase '' --quick-generate-key openmates-proton-bridge-ci@example.invalid default default never
          fingerprint="$(gpg --list-secret-keys --with-colons openmates-proton-bridge-ci@example.invalid | awk -F: '/^fpr:/ { print $10; exit }')"
          pass init "$fingerprint"
          wget -O /tmp/protonmail-bridge.deb https://proton.me/download/bridge/protonmail-bridge_3.22.0-1_amd64.deb
          sudo apt-get install -y /tmp/protonmail-bridge.deb
          protonmail-bridge --version || protonmail-bridge -v || true
      - name: Run spec
        if: github.event.inputs.spec != '__cli_integration_code_docs__'
        id: pw_run
        continue-on-error: true
        run: |
          mkdir -p $GITHUB_WORKSPACE/test-results
          cd frontend/apps/web_app
          set +e
          while true; do
            echo "[playwright heartbeat] still running ${{ github.event.inputs.spec }}"
            sleep 30
          done &
          heartbeat_pid=$!

          cleanup_heartbeat() {
            kill "$heartbeat_pid" 2>/dev/null || true
            wait "$heartbeat_pid" 2>/dev/null || true
          }
          trap cleanup_heartbeat EXIT

          # The longest specs declare a 30-minute Playwright timeout. Keep the
          # outer process guard slightly longer so Playwright can report cleanly.
          PLAYWRIGHT_JSON_OUTPUT_NAME=$GITHUB_WORKSPACE/test-results/playwright.json \
          timeout --kill-after=30s 1830s \
            npx playwright test "tests/${{ github.event.inputs.spec }}" \
            --reporter=line,json
          pw_status=$?

          cleanup_heartbeat
          trap - EXIT
          if [ "$pw_status" -eq 124 ]; then
            echo "Playwright exceeded the workflow timeout wrapper; preserving artifacts and reporting as failure."
            exit 1
          fi
          if [ "$pw_status" -ge 128 ]; then
            echo "Playwright exited with signal-style status ${pw_status}; preserving artifacts and reporting as failure."
            exit 1
          fi
          exit "$pw_status"
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ secrets.E2E_DEV_TEST_BASE_URL }}
          OPENMATES_E2E_API_URL: ${{ secrets.E2E_DEV_API_URL }}
          OPENMATES_TEST_ACCOUNT_1_EMAIL: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_EMAIL', github.event.inputs.account)] }}
          OPENMATES_TEST_ACCOUNT_1_PASSWORD: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_PASSWORD', github.event.inputs.account)] }}
          OPENMATES_TEST_ACCOUNT_1_OTP_KEY: ${{ secrets[format('OPENMATES_TEST_ACCOUNT_{0}_OTP_KEY', github.event.inputs.account)] }}
          OPENMATES_TEST_ACCOUNT_SOURCE_SLOT: ${{ github.event.inputs.account }}
          PLAYWRIGHT_WORKER_SLOT: "1"
          SIGNUP_TEST_EMAIL_DOMAINS: ${{ secrets.SIGNUP_TEST_EMAIL_DOMAINS }}
          E2E_SIGNUP_INVITE_CODE: ${{ (contains(github.event.inputs.spec, 'signup') || github.event.inputs.spec == 'referral-signup-purchase.spec.ts' || github.event.inputs.spec == 'create-test-account.spec.ts') && secrets.E2E_SIGNUP_INVITE_CODE || '' }}
          OPENMATES_CLI_SIGNUP_INVITE_CODE: ${{ github.event.inputs.spec == 'cli-provision-auth-accounts.spec.ts' && secrets.E2E_SIGNUP_INVITE_CODE || '' }}
          MAILOSAUR_API_KEY: ${{ secrets.MAILOSAUR_API_KEY }}
          MAILOSAUR_SERVER_ID: ${{ secrets.MAILOSAUR_SERVER_ID }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_TEST_ADDRESS: ${{ secrets.GMAIL_TEST_ADDRESS }}
          GOOGLE_CALENDAR_TEST_EMAIL: ${{ secrets.GOOGLE_CALENDAR_TEST_EMAIL }}
          GOOGLE_CALENDAR_TEST_PASSWORD: ${{ secrets.GOOGLE_CALENDAR_TEST_PASSWORD }}
          GOOGLE_CALENDAR_TEST_TOTP_KEY: ${{ secrets.GOOGLE_CALENDAR_TEST_TOTP_KEY }}
          GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
          GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
          GOOGLE_TEST_TOTP_KEY: ${{ secrets.GOOGLE_TEST_TOTP_KEY }}
          PROTON_BRIDGE_TEST_EMAIL: ${{ secrets.PROTON_BRIDGE_TEST_EMAIL }}
          PROTON_BRIDGE_TEST_PASSWORD: ${{ secrets.PROTON_BRIDGE_TEST_PASSWORD }}
          PROTON_BRIDGE_TEST_TOTP_KEY: ${{ secrets.PROTON_BRIDGE_TEST_TOTP_KEY }}
          E2E_USE_MOCKS: ${{ github.event.inputs.use_mocks == 'true' && '1' || '' }}
          E2E_RECORD_FIXTURES: ${{ github.event.inputs.record_fixtures == 'true' && '1' || '' }}
          E2E_USE_LIVE_MOCKS: ${{ github.event.inputs.use_live_mocks == 'true' && '1' || '' }}
          E2E_RECORD_LIVE_FIXTURES: ${{ github.event.inputs.record_live_fixtures == 'true' && '1' || '' }}
          CREATE_ACCOUNT_SLOT: ${{ github.event.inputs.create_account_slot }}
      - name: Show results
        if: always()
        run: |
          if [ -f test-results/playwright.json ]; then
            python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('test-results/playwright.json')
          try:
            data = json.loads(path.read_text() or '{}')
          except json.JSONDecodeError as exc:
            print(f'WARNING: could not parse Playwright JSON: {exc}')
            raise SystemExit(0)

          for suite in data.get('suites', []):
            for spec in suite.get('specs', []):
              for test in spec.get('tests', []):
                results = test.get('results', [])
                last = results[-1] if results else {}
                status = last.get('status', '?')
                print(f'{status}: {spec.get("title", "?")}')
          errors = data.get('errors', [])
          if errors:
            for e in errors:
              print(f'ERROR: {e.get("message","")[:200]}')
          PY
          fi
      - name: Update OTP key if changed by test
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: |
          OTP_FILE="frontend/apps/web_app/artifacts/new_otp_key.txt"
          if [ -f "$OTP_FILE" ]; then
            NEW_KEY=$(cat "$OTP_FILE")
            ACCOUNT="${{ github.event.inputs.account }}"
            SECRET_NAME="OPENMATES_TEST_ACCOUNT_${ACCOUNT}_OTP_KEY"
            echo "Updating $SECRET_NAME after credential-mutating test..."
            gh secret set "$SECRET_NAME" --body "$NEW_KEY" && echo "✅ Updated $SECRET_NAME" || echo "⚠️ Failed to update $SECRET_NAME"
          fi
      - name: Update API key if changed by test
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: |
          API_KEY_FILE="frontend/apps/web_app/artifacts/api_key.txt"
          if [ -f "$API_KEY_FILE" ]; then
            NEW_API_KEY=$(cat "$API_KEY_FILE")
            echo "Updating OPENMATES_TEST_ACCOUNT_API_KEY after credential-mutating test..."
            gh secret set OPENMATES_TEST_ACCOUNT_API_KEY --body "$NEW_API_KEY" && echo "✅ Updated OPENMATES_TEST_ACCOUNT_API_KEY" || echo "⚠️ Failed to update OPENMATES_TEST_ACCOUNT_API_KEY"
          fi
      - name: Revoke per-run CLI API key
        if: always()
        run: |
          set -euo pipefail
          if [ -z "${OPENMATES_CI_API_KEY_ID:-}" ]; then
            exit 0
          fi
          API_URL="${{ secrets.E2E_DEV_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://api.dev.openmates.org"
          fi
          node frontend/packages/openmates-cli/dist/cli.js \
            --api-url "$API_URL" \
            settings developers api-keys revoke "$OPENMATES_CI_API_KEY_ID" --yes --json \
            || echo "⚠️ Failed to revoke per-run CLI API key $OPENMATES_CI_API_KEY_ID"
      - name: Update account credentials if created by utility spec
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
        run: |
          CREDS_FILE="frontend/apps/web_app/artifacts/test_account_credentials.json"
          ENV_FILE="frontend/apps/web_app/artifacts/cli-slot-${{ github.event.inputs.create_account_slot }}.env"
          if [ -f "$CREDS_FILE" ] || [ -f "$ENV_FILE" ]; then
            mapfile -t CREDS < <(python3 - "$CREDS_FILE" "$ENV_FILE" <<'PY'
          import json
          import sys
          from pathlib import Path

          json_path = Path(sys.argv[1])
          env_path = Path(sys.argv[2])
          if json_path.exists():
              data = json.loads(json_path.read_text())
              print(data["slot"])
              print(data["email"])
              print(data["password"])
              print(data["otpKey"])
              raise SystemExit(0)

          values = {}
          for line in env_path.read_text().splitlines():
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              values[key] = value
          slot = env_path.stem.rsplit("-", 1)[-1]
          print(slot)
          print(values[f"OPENMATES_TEST_ACCOUNT_{slot}_EMAIL"])
          print(values[f"OPENMATES_TEST_ACCOUNT_{slot}_PASSWORD"])
          print(values[f"OPENMATES_TEST_ACCOUNT_{slot}_OTP_KEY"])
          PY
            )
            SLOT="${CREDS[0]}"
            EMAIL="${CREDS[1]}"
            PASSWORD="${CREDS[2]}"
            OTP_KEY="${CREDS[3]}"
            rm -f "$CREDS_FILE"
            rm -f "$ENV_FILE"
            echo "Updating OPENMATES_TEST_ACCOUNT_${SLOT}_* after account provisioning..."
            gh secret set "OPENMATES_TEST_ACCOUNT_${SLOT}_EMAIL" --body "$EMAIL"
            gh secret set "OPENMATES_TEST_ACCOUNT_${SLOT}_PASSWORD" --body "$PASSWORD"
            gh secret set "OPENMATES_TEST_ACCOUNT_${SLOT}_OTP_KEY" --body "$OTP_KEY"
            echo "✅ Updated OPENMATES_TEST_ACCOUNT_${SLOT}_* secrets"
          fi
      - name: Sanitize artifact name
        if: always()
        id: artifact_name
        run: echo "name=playwright-${SPEC//\//-}" >> "$GITHUB_OUTPUT"
        env:
          SPEC: ${{ github.event.inputs.spec }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: |
            test-results/playwright.json
            test-results/cli-integration.json
            frontend/apps/web_app/test-results/
            frontend/apps/web_app/artifacts/
          if-no-files-found: ignore
          retention-days: 7
      - name: Fail if tests failed
        if: steps.pw_run.outcome == 'failure' || steps.cli_run.outcome == 'failure'
        run: exit 1
