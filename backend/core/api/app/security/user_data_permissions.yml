version: 1
actors:
  - unauthenticated
  - authenticated_owner
  - shared_link_recipient
  - api_key
  - admin
  - internal_service
  - e2e_test_actor
access_modes:
  - public_read
  - share_read
  - owner_read
  - owner_write
  - api_key_read
  - api_key_write
  - admin_read
  - admin_write
  - internal_read
  - internal_write
  - test_write
  - system_write
  - public_write
  - token_read
  - signature_write
rest_modules:
  - path: backend/core/api/app/routes/admin.py
    expected_routes: 10
    actors: [admin]
    access: [admin_read, admin_write]
    data_domains: [admin, users, billing, credits, diagnostics]
    rationale: Admin-only operational actions and inspection endpoints.
  - path: backend/core/api/app/routes/admin_client_logs.py
    expected_routes: 1
    actors: [admin, e2e_test_actor]
    access: [admin_write, test_write]
    data_domains: [diagnostics]
    rationale: Client log ingestion for debug/test tooling.
  - path: backend/core/api/app/routes/admin_debug.py
    expected_routes: 20
    actors: [admin]
    access: [admin_read, admin_write]
    data_domains: [diagnostics, users, chats, embeds, logs]
    rationale: Admin debug and inspection endpoints must remain admin-gated.
  - path: backend/core/api/app/routes/admin_newsletter_campaigns.py
    expected_routes: 7
    actors: [admin]
    access: [admin_read, admin_write]
    data_domains: [newsletter]
    rationale: Newsletter campaign management is admin-only.
  - path: backend/core/api/app/routes/analytics_beacon.py
    expected_routes: 1
    actors: [unauthenticated]
    access: [public_read]
    data_domains: [analytics]
    rationale: Public analytics beacon accepts minimal event telemetry.
  - path: backend/core/api/app/routes/application_preview.py
    expected_routes: 4
    actors: [authenticated_owner, shared_link_recipient]
    access: [owner_read, owner_write, share_read]
    data_domains: [embeds, generated_assets]
    rationale: Application preview sessions are owner-started or share-context-authorized.
    endpoints:
      - method: POST
        route: /{application_embed_id}/preview/start
        function: start_application_preview
        actors: [authenticated_owner, shared_link_recipient]
        access: [owner_write, share_read]
        data_domains: [embeds, generated_assets, application_preview]
        auth_model: session_required_with_optional_shared_context
        rationale: Authenticated owner starts own app previews; authenticated shared viewers may start from client-provided shared context and spend their own session/credits.
      - method: GET
        route: /preview/{session_id}
        function: get_application_preview_status
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [application_preview]
        auth_model: session_required
        rationale: Preview status is scoped to the viewer hash stored in the preview session.
      - method: POST
        route: /preview/{session_id}/open
        function: open_application_preview
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [application_preview]
        auth_model: session_required
        rationale: Opening extends only the authenticated viewer's preview session.
      - method: POST
        route: /preview/{session_id}/stop
        function: stop_application_preview
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [application_preview]
        auth_model: session_required
        rationale: Stopping is scoped to the authenticated viewer's preview session.
  - path: backend/core/api/app/routes/application_preview_gateway.py
    expected_routes: 2
    actors: [authenticated_owner, shared_link_recipient]
    access: [owner_read, owner_write, share_read]
    data_domains: [embeds, generated_assets, application_preview]
    rationale: Preview gateway traffic is authorized by a short-lived sandbox token issued from an owner or shared preview session.
    endpoints:
      - method: API_ROUTE
        route: /t/{preview_token}/{path:path}
        function: application_preview_host_gateway
        actors: [authenticated_owner, shared_link_recipient]
        access: [token_read]
        data_domains: [application_preview]
        auth_model: preview_gateway_token
        rationale: Host-based preview traffic has no cookie auth and is authorized by preview host plus short-lived token.
      - method: API_ROUTE
        route: /p/{session_id}/{preview_token}/{path:path}
        function: application_preview_gateway
        actors: [authenticated_owner, shared_link_recipient]
        access: [token_read]
        data_domains: [application_preview]
        auth_model: preview_gateway_token
        rationale: Legacy preview traffic has no cookie auth and is authorized by session id plus short-lived token.
  - path: backend/core/api/app/routes/apps.py
    expected_routes: 3
    actors: [unauthenticated, authenticated_owner]
    access: [public_read]
    data_domains: [apps]
    rationale: App metadata is public product content.
  - path: backend/core/api/app/routes/apps_api.py
    expected_routes: 1
    actors: [authenticated_owner, api_key]
    access: [owner_read, api_key_read]
    data_domains: [apps]
    rationale: API-facing app list requires authenticated API access.
  - path: backend/core/api/app/routes/auth_routes/auth_2fa_setup.py
    expected_routes: 6
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [auth, user_security]
    rationale: 2FA setup and backup-code actions mutate authenticated user security state.
  - path: backend/core/api/app/routes/auth_routes/auth_2fa_verify.py
    expected_routes: 1
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [auth, user_security]
    rationale: Device 2FA verification is tied to the current login session.
  - path: backend/core/api/app/routes/auth_routes/auth_email.py
    expected_routes: 3
    actors: [unauthenticated, authenticated_owner]
    access: [public_read, owner_write]
    data_domains: [auth, profile]
    rationale: Signup/login email confirmation and username validation flows.
  - path: backend/core/api/app/routes/auth_routes/auth_gift.py
    expected_routes: 2
    actors: [unauthenticated, authenticated_owner]
    access: [public_read, owner_write]
    data_domains: [billing, gifts]
    rationale: Gift token validation and acceptance occur around auth/signup.
    endpoints:
      - method: GET
        route: /check-gift
        function: check_gift
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [billing, gifts]
        auth_model: session_required
        rationale: Gift status is checked for the current authenticated user/session.
      - method: POST
        route: /accept-gift
        function: accept_gift
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [billing, gifts]
        auth_model: session_required
        rationale: Gift acceptance mutates authenticated owner billing credits.
  - path: backend/core/api/app/routes/auth_routes/auth_invite.py
    expected_routes: 1
    actors: [unauthenticated]
    access: [public_read]
    data_domains: [auth]
    rationale: Invite token validity is checked before account creation.
  - path: backend/core/api/app/routes/auth_routes/auth_login.py
    expected_routes: 2
    actors: [unauthenticated]
    access: [public_read]
    data_domains: [auth]
    rationale: Login and lookup are unauthenticated auth entrypoints with origin/client checks.
  - path: backend/core/api/app/routes/auth_routes/auth_logout.py
    expected_routes: 3
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [auth, sessions]
    rationale: Logout revokes current or all authenticated sessions.
  - path: backend/core/api/app/routes/auth_routes/auth_pair.py
    expected_routes: 7
    actors: [unauthenticated, authenticated_owner]
    access: [public_read, owner_write]
    data_domains: [auth, sessions]
    rationale: Pair-auth bridges unauthenticated polling with authenticated approval.
    endpoints:
      - method: GET
        route: /pair/credentials
        function: pair_credentials
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [auth, sessions]
        auth_model: session_required
        rationale: Pair credentials are returned only to the authenticated account approving a pair flow.
      - method: POST
        route: /pair/authorize/{token}
        function: pair_authorize
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [auth, sessions]
        auth_model: session_required_and_pair_token
        rationale: Pair authorization requires the current authenticated owner plus the pair token.
      - method: DELETE
        route: /pair/{token}
        function: pair_cancel
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [auth, sessions]
        auth_model: session_required_and_pair_token
        rationale: Pair cancellation requires the authenticated owner plus the pair token.
  - path: backend/core/api/app/routes/auth_routes/auth_passkey.py
    expected_routes: 8
    actors: [unauthenticated, authenticated_owner]
    access: [public_read, owner_read, owner_write]
    data_domains: [auth, passkeys, user_security]
    rationale: Passkey registration/assertion includes public challenges and authenticated passkey management.
    endpoints:
      - method: GET
        route: /passkeys
        function: list_passkeys
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [auth, passkeys, user_security]
        auth_model: session_required_and_allowed_origin
        rationale: Passkey listing is authenticated account security state.
      - method: POST
        route: /passkeys/rename
        function: rename_passkey
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [auth, passkeys, user_security]
        auth_model: session_required_and_allowed_origin
        rationale: Passkey rename mutates authenticated account security state.
      - method: POST
        route: /passkeys/delete
        function: delete_passkey
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [auth, passkeys, user_security]
        auth_model: session_required_and_allowed_origin
        rationale: Passkey deletion mutates authenticated account security state.
  - path: backend/core/api/app/routes/auth_routes/auth_password.py
    expected_routes: 1
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [auth, user_security]
    rationale: Password setup mutates authenticated account security state.
  - path: backend/core/api/app/routes/auth_routes/auth_recovery.py
    expected_routes: 4
    actors: [unauthenticated]
    access: [public_read]
    data_domains: [auth, recovery]
    rationale: Recovery is an unauthenticated flow protected by codes and device checks.
  - path: backend/core/api/app/routes/auth_routes/auth_recoverykey.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [auth, recovery]
    rationale: Recovery-key management mutates authenticated account state.
  - path: backend/core/api/app/routes/auth_routes/auth_session.py
    expected_routes: 1
    actors: [authenticated_owner]
    access: [owner_read]
    data_domains: [auth, sessions]
    rationale: Session check returns current authenticated session state.
  - path: backend/core/api/app/routes/auth_routes/auth_sessions.py
    expected_routes: 5
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [auth, sessions]
    rationale: Device/session list, metadata registration, and revocation are owner-only.
  - path: backend/core/api/app/routes/client_logs_ephemeral.py
    expected_routes: 1
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [diagnostics]
    rationale: Ephemeral client log forwarding requires an authenticated user and strips identity before OpenObserve.
    endpoints:
      - method: POST
        route: /client-logs
        function: receive_ephemeral_client_logs
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [diagnostics]
        auth_model: session_required
        rationale: Any logged-in user may submit bounded, server-sanitized diagnostic warnings/errors.
  - path: backend/core/api/app/routes/code_execution.py
    expected_routes: 4
    actors: [authenticated_owner, api_key]
    access: [owner_read, owner_write, api_key_read, api_key_write]
    data_domains: [chats, messages, embeds, code_runs]
    rationale: Code execution status and control require owner/API-key authorization against the run/embed.
  - path: backend/core/api/app/routes/creators.py
    expected_routes: 1
    actors: [authenticated_owner]
    access: [owner_write]
    data_domains: [billing, creators]
    rationale: Creator tipping spends user credits.
  - path: backend/core/api/app/routes/credit_note.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [billing, invoices]
    rationale: Credit-note generation and preview are owner billing actions.
  - path: backend/core/api/app/routes/daily_inspirations_api.py
    expected_routes: 3
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [inspirations]
    rationale: Daily inspiration sync/read/opened state is per-user.
  - path: backend/core/api/app/routes/debug_sync.py
    expected_routes: 1
    actors: [authenticated_owner, e2e_test_actor]
    access: [owner_read, test_write]
    data_domains: [diagnostics, sync]
    rationale: Sync debug endpoint exposes current user sync status.
  - path: backend/core/api/app/routes/default_inspirations.py
    expected_routes: 1
    actors: [unauthenticated, authenticated_owner]
    access: [public_read]
    data_domains: [inspirations]
    rationale: Default inspirations are public content.
  - path: backend/core/api/app/routes/docs_routes.py
    expected_routes: 3
    actors: [unauthenticated, authenticated_owner]
    access: [public_read]
    data_domains: [docs]
    rationale: Product docs are public.
  - path: backend/core/api/app/routes/e2e_api.py
    expected_routes: 1
    actors: [e2e_test_actor]
    access: [test_write]
    data_domains: [diagnostics]
    rationale: E2E log ingestion is restricted by E2E token flow.
  - path: backend/core/api/app/routes/email.py
    expected_routes: 11
    actors: [admin, internal_service]
    access: [admin_read, internal_read]
    data_domains: [email, billing, auth]
    rationale: Email preview/dev endpoints must not expose user data to normal users.
  - path: backend/core/api/app/routes/email_block.py
    expected_routes: 1
    actors: [unauthenticated]
    access: [public_read]
    data_domains: [email]
    rationale: One-click email block endpoint is tokenized by email link.
  - path: backend/core/api/app/routes/embeds_api.py
    expected_routes: 3
    actors: [authenticated_owner, api_key]
    access: [owner_read, api_key_read]
    data_domains: [embeds, files]
    rationale: Embed file/content access must validate owner/API-key access.
  - path: backend/core/api/app/routes/generated_assets_api.py
    expected_routes: 1
    actors: [authenticated_owner, shared_link_recipient]
    access: [token_read]
    data_domains: [generated_assets, embeds]
    rationale: Generated asset downloads require owner or authorized shared context.
    endpoints:
      - method: GET
        route: /{asset_id}/files/{variant}/download
        function: download_generated_asset
        actors: [authenticated_owner, shared_link_recipient]
        access: [token_read]
        data_domains: [generated_assets, embeds]
        auth_model: download_token
        rationale: Decrypted generated assets are streamed only when a signed token matches asset id, variant, and user id.
  - path: backend/core/api/app/routes/geocode.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_read]
    data_domains: [location]
    rationale: Geocode proxy serves authenticated product features.
  - path: backend/core/api/app/routes/internal_api.py
    expected_routes: 31
    actors: [internal_service]
    access: [internal_read, internal_write]
    data_domains: [users, chats, messages, embeds, billing, email, generated_assets]
    rationale: Internal service API requires internal service token.
  - path: backend/core/api/app/routes/invoice.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [billing, invoices]
    rationale: Invoice generation/preview are owner billing actions.
  - path: backend/core/api/app/routes/newsletter.py
    expected_routes: 5
    actors: [unauthenticated, authenticated_owner]
    access: [public_read, owner_write]
    data_domains: [newsletter, email]
    rationale: Newsletter subscribe/confirm/unsubscribe flows are tokenized/public.
    endpoints:
      - method: GET
        route: /newsletter/categories
        function: get_newsletter_categories
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [newsletter, email]
        auth_model: session_required
        rationale: Newsletter category preferences are per-user settings.
      - method: PATCH
        route: /newsletter/categories
        function: update_newsletter_categories
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [newsletter, email]
        auth_model: session_required
        rationale: Newsletter category preference updates mutate authenticated user settings.
  - path: backend/core/api/app/routes/notifications.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_read]
    data_domains: [notifications]
    rationale: Notifications are per-user.
  - path: backend/core/api/app/routes/payments.py
    expected_routes: 29
    actors: [authenticated_owner, internal_service]
    access: [owner_read, owner_write, internal_write]
    data_domains: [billing, invoices, credits, gifts]
    rationale: Payment APIs mutate owner billing state; webhooks/internal flows are service-authenticated.
    endpoints:
      - method: GET
        route: /config
        function: get_payment_config
        actors: [unauthenticated, authenticated_owner]
        access: [public_read]
        data_domains: [billing]
        auth_model: public_configuration
        rationale: Payment config returns publishable Stripe configuration and region mode, not private billing records.
      - method: POST
        route: /create-support-order
        function: create_support_order
        actors: [unauthenticated, authenticated_owner]
        access: [public_write, owner_write]
        data_domains: [billing]
        auth_model: optional_session
        rationale: Support contributions may be guest or authenticated and create payment provider orders.
      - method: POST
        route: /create-support-bank-transfer-order
        function: create_support_bank_transfer_order
        actors: [unauthenticated, authenticated_owner]
        access: [public_write, owner_write]
        data_domains: [billing]
        auth_model: optional_session
        rationale: Support bank transfers may be guest or authenticated and create pending transfer orders.
      - method: POST
        route: /webhook
        function: payment_webhook
        actors: [internal_service]
        access: [signature_write]
        data_domains: [billing, invoices, credits, gifts]
        auth_model: provider_signature
        rationale: Payment providers call this unauthenticated endpoint, but processing requires verified Stripe/Revolut signature headers.
      - method: POST
        route: /refund
        function: request_refund
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [billing, invoices, credits]
        auth_model: session_required
        rationale: Refund requests mutate authenticated owner billing state.
  - path: backend/core/api/app/routes/profile_api.py
    expected_routes: 1
    actors: [authenticated_owner, api_key]
    access: [owner_read, api_key_read]
    data_domains: [profile]
    rationale: Profile image route serves avatar image bytes to authenticated sessions or API keys.
    endpoints:
      - method: GET
        route: /{user_id}/profile-image
        function: get_profile_image
        actors: [authenticated_owner, api_key]
        access: [owner_read, api_key_read]
        data_domains: [profile]
        auth_model: session_or_api_key
        rationale: Any authenticated session/API key can view profile avatars; this is broader than owner-only and should be reviewed before group/team features.
  - path: backend/core/api/app/routes/projects.py
    expected_routes: 10
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [projects, embeds]
    rationale: Project records and embed references are owner-scoped.
  - path: backend/core/api/app/routes/push.py
    expected_routes: 4
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [notifications, devices]
    rationale: Push subscription state is owner device data.
  - path: backend/core/api/app/routes/referrals.py
    expected_routes: 2
    actors: [authenticated_owner]
    access: [owner_read, owner_write]
    data_domains: [referrals]
    rationale: Referral status and capture are authenticated user flows.
    endpoints:
      - method: GET
        route: /status
        function: get_referral_status
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [referrals]
        auth_model: session_required
        rationale: Referral status is scoped to the authenticated user.
      - method: POST
        route: /capture
        function: capture_referral
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [referrals]
        auth_model: session_required
        rationale: Referral capture mutates authenticated user attribution state.
  - path: backend/core/api/app/routes/settings.py
    expected_routes: 59
    actors: [authenticated_owner, api_key]
    access: [owner_read, owner_write, api_key_read, api_key_write]
    data_domains: [settings, memories, billing, invoices, profile, usage, account_export, api_keys]
    rationale: Settings contains many owner-scoped account, memory, billing, and export operations.
    endpoints:
      - method: POST
        route: /auto-topup/low-balance
        function: update_low_balance_auto_topup
        actors: [authenticated_owner]
        access: [owner_write]
        data_domains: [settings, billing]
        auth_model: session_required
        rationale: Auto-topup settings can change billing behavior and must be mutated from an interactive owner session, not an API key.
      - method: GET
        route: /api-keys
        function: get_api_keys
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [api_keys, user_security]
        auth_model: session_required
        rationale: API key inventory exposes account security state and must not be readable using an API key itself.
      - method: GET
        route: /api-key-devices
        function: get_api_key_devices
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [api_keys, user_security]
        auth_model: session_required
        rationale: API key device inventory exposes security state and pending device approvals, so it is web-session only.
      - method: GET
        route: /usage/export
        function: export_usage_csv
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [usage, account_export]
        auth_model: session_required
        rationale: Full usage CSV export can contain detailed account activity and must require an interactive owner session.
      - method: GET
        route: /billing
        function: get_billing_overview
        actors: [authenticated_owner]
        access: [owner_read]
        data_domains: [billing, invoices]
        auth_model: session_required
        rationale: Billing overview exposes payment tier, auto-topup configuration, and invoices, so it is web-session only.
  - path: backend/core/api/app/routes/settings_software_update.py
    expected_routes: 6
    actors: [admin, internal_service]
    access: [admin_read, admin_write, internal_write]
    data_domains: [self_host, software_update]
    rationale: Software update routes affect deployment/runtime state.
  - path: backend/core/api/app/routes/share.py
    expected_routes: 15
    actors: [unauthenticated, authenticated_owner, shared_link_recipient]
    access: [public_read, owner_write, share_read]
    data_domains: [chats, messages, embeds, highlights, shares]
    rationale: Share routes combine owner share management with public encrypted shared-chat reads.
    endpoints:
      - method: GET
        route: /chat/{chat_id}
        function: get_shared_chat
        actors: [unauthenticated, shared_link_recipient]
        access: [share_read]
        data_domains: [chats, messages, embeds, highlights]
        auth_model: share_id
        rationale: Anyone with a shared chat id can fetch encrypted shared chat payloads; URL fragment key is never sent to the server.
      - method: GET
        route: /chat/{chat_id}/manifest
        function: get_shared_chat_manifest
        actors: [unauthenticated, shared_link_recipient]
        access: [share_read]
        data_domains: [chats, embeds, highlights]
        auth_model: share_id
        rationale: Anyone with a shared chat id can fetch encrypted shared metadata and auxiliary records without messages.
      - method: GET
        route: /chat/{chat_id}/messages
        function: get_shared_chat_message_window
        actors: [unauthenticated, shared_link_recipient]
        access: [share_read]
        data_domains: [messages]
        auth_model: share_id
        rationale: Anyone with a shared chat id can page encrypted shared messages; PII mappings are stripped unless owner enabled sharing them.
      - method: GET
        route: /chat/{chat_id}/og-metadata
        function: get_og_metadata
        actors: [unauthenticated]
        access: [public_read]
