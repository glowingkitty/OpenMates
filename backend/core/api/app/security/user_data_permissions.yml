version: 1
actors:
  - unauthenticated
  - authenticated_owner
  - shared_link_recipient
  - api_key
  - admin
  - internal_service
  - e2e_test_actor
access_modes:
  - public_read
  - share_read
  - owner_read
  - owner_write
  - api_key_read
  - api_key_write
  - admin_read
  - admin_write
  - internal_read
  - internal_write
  - test_write
  - system_write
