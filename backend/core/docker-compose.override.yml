# backend/core/docker-compose.override.yml
# Overrides for development/local access via SSH port forwarding

services:
  api:
    volumes:
      # Read-only access to the openmates-marketing sibling repo so
      # send_newsletter.py can render issues authored outside this repo.
      # Only used on the dev machine; prod never runs send_newsletter.py.
      - ../../../openmates-marketing:/openmates-marketing:ro

  cms:
    ports:
      # Expose Directus only on localhost for SSH forwarding
      - "127.0.0.1:8055:8055"

  # Grafana removed — see docker-compose.yml for details.
  # grafana:
  #   ports:
  #     - "127.0.0.1:3000:3000"
