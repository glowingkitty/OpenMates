# backend/core/directus/schemas/test_runs.yml
# Durable records for test execution requests and discovered external runs.
test_runs:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    run_key:
      type: string
      length: 255
      unique: true
      note: "[Indexed, Unique] Normalized run id."
    source:
      type: string
      length: 80
      note: "scripts_tests, github_actions, apple_remote, or import."
    external_run_id:
      type: string
      length: 255
      note: "Nullable GitHub Actions or Apple run identifier."
    workflow:
      type: string
      length: 255
      note: "Nullable workflow file/name for external runs."
    status:
      type: string
      length: 80
      note: "queued, running, completed, failed, cancelled, or skipped."
    git_sha:
      type: string
      length: 80
      note: "Git revision under test."
    git_branch:
      type: string
      length: 255
      note: "Git branch under test."
    environment:
      type: string
      length: 80
      note: "Test target environment."
    requested_tests:
      type: json
      note: "Canonical test keys requested by this run."
    summary:
      type: json
      note: "Aggregate result counts."
    record_json:
      type: json
      note: "Normalized redacted run record."
    updated_at:
      type: string
      length: 80
      note: "ISO timestamp for the latest update."
    updated_at_unix:
      type: integer
      note: "Unix timestamp for sorting."
