# backend/core/directus/schemas/workflow_runs.yml
# Durable execution records for one workflow trigger/manual run.
workflow_runs:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    run_id:
      type: string
      note: "[Indexed, Unique] Public run id."
      options:
        unique: true
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    version_id:
      type: string
      note: "Workflow version executed by this run."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    hashed_project_id:
      type: string
      note: "[Indexed, Nullable] SHA256(project_id) for project-scoped runs."
    trigger_id:
      type: string
      note: "Nullable trigger id."
    trigger_type:
      type: string
      note: "schedule, manual, webhook, event, or test."
    acceptance_idempotency_key:
      type: string
      note: "[Indexed, Unique] Trigger occurrence acceptance key."
      unique: true
    claim_token_hash:
      type: string
      note: "Nullable hash linking an accepted run to its trigger claim."
    accepted_at:
      type: integer
      note: "Unix timestamp when this concrete execution was accepted."
    status:
      type: string
      note: "queued, running, waiting, completed, failed, or cancelled."
    started_at:
      type: integer
      note: "Unix timestamp."
    finished_at:
      type: integer
      note: "Nullable Unix timestamp."
    cost_summary:
      type: json
      note: "Aggregate credits and provider usage."
    error_summary:
      type: string
      note: "Redacted user-visible error summary."
    encrypted_input:
      type: text
      note: "[Encrypted] Trigger/manual input payload."
    encrypted_output_summary:
      type: text
      note: "[Encrypted] Run output summary."
    content_retention_mode:
      type: string
      note: "Retention policy active when this run was saved."
    content_available:
      type: boolean
      default: false
      note: "Whether encrypted node/output content can still be inspected."
    content_storage:
      type: string
      note: "durable, ephemeral, or deleted."
    content_expires_at:
      type: integer
      note: "Nullable Unix timestamp for ephemeral run-content expiry."
    record_json:
      type: json
      note: "Server-owned normalized run record with encrypted refs only."
