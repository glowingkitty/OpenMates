# backend/core/directus/schemas/workflow_event_receipts.yml
# Durable event/trigger receipts deduplicate delivery without retaining payloads.
workflow_event_receipts:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    trigger_id:
      type: string
      note: "[Indexed] Trigger that evaluated the event."
    event_id:
      type: string
      note: "[Indexed] Authenticated producer event id."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the event owner."
    source:
      type: string
      note: "Event source retained for routing audit only."
    event_type:
      type: string
      note: "Event type retained for routing audit only."
    dispatch_status:
      type: string
      note: "accepted, duplicate, rejected, or failed."
    run_id:
      type: string
      note: "Nullable accepted run id."
    created_at:
      type: integer
      note: "Unix timestamp."
    expires_at:
      type: integer
      note: "Nullable receipt retention expiry."
