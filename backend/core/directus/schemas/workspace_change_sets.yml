# backend/core/directus/schemas/workspace_change_sets.yml
# Owner-scoped workspace history action records. These rows contain only safe
# metadata and redacted summaries; object snapshots live in change entries as
# encrypted/client-ciphertext payload refs or opaque inline ciphertext bundles.

workspace_change_sets:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    change_set_id:
      type: string
      note: "[Indexed, Unique] Stable client/server generated change set id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    source:
      type: string
      note: "Mutation source: cli, npm_sdk, pip_sdk, web, apple, ai_ask, workflow_input, or system_migration."
    namespace:
      type: string
      note: "Workspace namespace: tasks, plans, projects, workflows, or mixed."
    action_type:
      type: string
      note: "User-visible action type such as create, update, delete, restore, undo, ask, or archive."
    status:
      type: string
      note: "applied, partially_applied, undone, or undo_failed."
    redacted_summary:
      type: text
      nullable: true
      note: "Optional non-private summary safe for logs and history lists."
    created_at:
      type: integer
      note: "Unix timestamp when the change set was created."
    updated_at:
      type: integer
      note: "Unix timestamp when the change set metadata last changed."
    undo_expires_at:
      type: integer
      nullable: true
      note: "Optional Unix timestamp for quick undo UI affordances. History remains available by retention policy."
