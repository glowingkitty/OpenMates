# backend/core/directus/schemas/workflow_template_projections.yml
# Opaque client-encrypted portable Workflow templates for share/import flows.
workflow_template_projections:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    template_id:
      type: string
      note: "[Indexed, Unique] Stable client-generated portable template id."
      unique: true
    workflow_id:
      type: string
      note: "[Indexed, Unique] Runtime workflow that owns this one-way projection."
      unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the projection owner."
    source_version:
      type: integer
      note: "Runtime workflow version represented by the ciphertext."
    projection_schema_version:
      type: integer
      note: "Portable payload schema version."
    ciphertext:
      type: text
      note: "Opaque client-encrypted portable template; the backend never decrypts it."
    ciphertext_checksum:
      type: string
      note: "Client-provided integrity checksum for ciphertext transport."
    owner_wrapped_key:
      type: text
      note: "Template key wrapped for the owner's cross-device access."
    revoked_at:
      type: integer
      note: "Nullable revocation time for server-mediated future retrieval."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
