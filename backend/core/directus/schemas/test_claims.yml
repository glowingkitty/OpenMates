# backend/core/directus/schemas/test_claims.yml
# Parallel-safe debug claims for failed tests and triage groups.
test_claims:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    claim_key:
      type: string
      length: 255
      unique: true
      note: "[Indexed, Unique] Claim id."
    lease_id:
      type: string
      length: 255
      note: "Back-compatible lease id used by scripts/tests.py."
    group_id:
      type: string
      length: 255
      note: "Claimed deterministic triage group."
    status:
      type: string
      length: 80
      note: "active, completed, released, or expired."
    session_id:
      type: string
      length: 255
      note: "Claiming assistant or operator session id."
    worker_id:
      type: string
      length: 255
      note: "Optional worker id."
    leased_at:
      type: string
      length: 80
      note: "ISO timestamp when the claim was created."
    expires_at:
      type: string
      length: 80
      note: "ISO timestamp when the claim expires."
    expires_at_unix:
      type: integer
      note: "Unix timestamp when the claim expires."
    updated_at:
      type: string
      length: 80
      note: "ISO timestamp for the latest update."
    completed_at:
      type: string
      length: 80
      note: "Nullable completion timestamp."
    completed_commit:
      type: string
      length: 80
      note: "Nullable commit that resolved the claim."
    commit:
      type: string
      length: 80
      note: "Back-compatible completed commit field."
    released_at:
      type: string
      length: 80
      note: "Nullable release timestamp."
    release_reason:
      type: text
      note: "Nullable release reason."
    entry_json:
      type: json
      note: "Claimed triage entry payload."
