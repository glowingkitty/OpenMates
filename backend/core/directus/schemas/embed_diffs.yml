# backend/core/directus/schemas/embed_diffs.yml
# Stores version history for diffable embeds (code, document, sheet).
# Append-only: v=1 stores full original snapshot, v>1 stores unified diffs.
# Encrypted with the same embed_key as the parent embed (zero-knowledge).
embed_diffs:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    embed_id:
      type: string
      note: "[Indexed] References embeds.embed_id — the parent embed this diff belongs to."
      options:
        indexed: true

    version_number:
      type: integer
      note: "Version number (1 = original snapshot, 2+ = diff from previous version)."

    encrypted_snapshot:
      type: textfield
      note: "[Encrypted] Full content snapshot for v=1 only. Null for v>1. Encrypted with same embed_key as parent."

    encrypted_patch:
      type: textfield
      note: "[Encrypted] Unified diff patch (v>1 only). Null for v=1. Encrypted with same embed_key as parent."

    hashed_user_id:
      type: string
      note: "[Indexed] Hashed user ID of embed owner (for access control)."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when this version was created."

  # Compound index for efficient timeline queries
  indexes:
    - fields: [embed_id, version_number]
      unique: true
