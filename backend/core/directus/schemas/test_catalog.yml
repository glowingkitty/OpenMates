# backend/core/directus/schemas/test_catalog.yml
# Canonical inventory of tests known to the shared test control plane.
test_catalog:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    test_key:
      type: string
      length: 1024
      unique: true
      note: "[Indexed, Unique] Canonical key such as playwright::chat-flow.spec.ts."
    suite:
      type: string
      length: 80
      note: "Suite key: playwright, vitest, pytest, cli, apple, or future suite."
    test_name:
      type: string
      length: 1024
      note: "Human-readable test name."
    file_path:
      type: string
      length: 1024
      note: "Nullable source path or spec file."
    verification_command:
      type: string
      length: 2048
      note: "Nullable command used to rerun this test."
    metadata:
      type: json
      note: "Linked files, owner hints, tags, and suite-specific metadata."
