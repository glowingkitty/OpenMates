# backend/core/directus/schemas/workflow_encrypted_blobs.yml
# Encrypted Workflow V1 payload blobs referenced by workflow and run records.
# This keeps user-authored definitions and run content out of plaintext metadata
# while allowing server-side scheduled execution and run inspection.
workflow_encrypted_blobs:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    ref:
      type: string
      note: "[Indexed, Unique] Stable vault-style blob reference."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    kind:
      type: string
      note: "workflow_title, workflow_graph, workflow_run_content, or workflow_run_content_ephemeral."
    ciphertext:
      type: text
      note: "Encrypted JSON payload."
    checksum:
      type: string
      note: "SHA256 checksum of plaintext before encryption for integrity checks."
    expires_at:
      type: integer
      note: "Nullable Unix timestamp for ephemeral payload expiry."
    created_at:
      type: integer
      note: "Unix timestamp."
