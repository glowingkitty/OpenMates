# backend/core/directus/schemas/workflow_waits.yml
# Pending wait states for ask-user, approval, delay, and callback nodes.
workflow_waits:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    wait_id:
      type: string
      note: "[Indexed, Unique] Public wait id."
      options:
        unique: true
    run_id:
      type: string
      note: "[Indexed] Public workflow run id."
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    node_id:
      type: string
      note: "Graph node id that created the wait."
    wait_type:
      type: string
      note: "ask_user, approval, delay, or callback."
    status:
      type: string
      note: "pending, resolved, expired, or cancelled."
    expires_at:
      type: integer
      note: "Nullable Unix timestamp."
    resume_token_hash:
      type: string
      note: "Hash of callback/resume token."
    encrypted_prompt:
      type: text
      note: "[Encrypted] Prompt or approval text."
    encrypted_response:
      type: text
      note: "[Encrypted] User response or callback payload."
    created_at:
      type: integer
      note: "Unix timestamp."
    resolved_at:
      type: integer
      note: "Nullable Unix timestamp."
