# backend/core/directus/schemas/gift_cards.yml
# Defines the schema for the 'gift_cards' collection in Directus.
# Each record represents a gift card that can be redeemed for credits.
# By default gift cards are single-use (deleted on redemption). The is_reusable
# + allowed_email_domain fields below enable persistent cards locked to a specific
# email domain, used by the hourly prod smoke test (OPE-76).
gift_cards:
  type: collection
  fields:
    id:
      type: uuid
      primary: true
      note: "Primary Key - Unique identifier for the gift card, auto-generated by Directus."

    code:
      type: string
      length: 255
      unique: true
      note: "[Indexed] Unique gift card code, manually entered in Directus UI. Used for redemption."

    credits_value:
      type: integer
      note: "Value of credits this gift card provides (1-50000). Validation: min 1, max 50000."

    created_at:
      type: datetime
      note: "Unix timestamp (seconds) when the gift card was created. Auto-generated by Directus."

    notes:
      type: textfield
      nullable: true
      note: "Optional admin notes when creating the gift card (e.g., recipient, occasion, etc.)."

    purchaser_user_id_hash:
      type: string
      length: 512
      nullable: true
      note: "Hash of the user ID who purchased this gift card (null for manually created cards in Directus)."

    purchased_at:
      type: datetime
      nullable: true
      note: "Timestamp when the gift card was purchased (null for manually created cards in Directus)."

    is_reusable:
      type: boolean
      default: false
      note: "When true, the card is NOT deleted on redemption and can be redeemed repeatedly. Only set manually via admin API for infrastructure/test cards. User-purchased and admin-UI cards always default to false."

    allowed_email_domain:
      type: string
      length: 255
      nullable: true
      note: "Optional restriction: when set, the gift card can ONLY be redeemed by users whose email's full domain matches this value exactly (case-insensitive, not a suffix match). Used to lock the prod smoke test card to our specific Mailosaur server subdomain so no other Mailosaur user can redeem it. Null = no restriction."

