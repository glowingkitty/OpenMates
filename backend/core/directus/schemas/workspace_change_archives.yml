# backend/core/directus/schemas/workspace_change_archives.yml
# Lightweight manifests for encrypted S3 batches containing older workspace
# history. Manifests are owner-scoped and contain no decrypted private content.

workspace_change_archives:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    archive_id:
      type: string
      note: "[Indexed, Unique] Stable archive manifest id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    object_type:
      type: string
      note: "task, plan, project, or workflow."
    object_id:
      type: string
      note: "[Indexed] Stable object id whose entries are archived."
    first_entry_created_at:
      type: integer
      note: "Timestamp of the oldest entry in the archive batch."
    last_entry_created_at:
      type: integer
      note: "Timestamp of the newest entry in the archive batch."
    entry_count:
      type: integer
      note: "Number of entries in the encrypted archive batch."
    s3_bucket_key:
      type: string
      note: "Logical S3 bucket key."
    s3_object_key:
      type: string
      note: "S3 object key for the encrypted archive batch."
    checksum:
      type: string
      note: "SHA256 checksum of the encrypted archive payload."
    encryption_mode:
      type: string
      note: "Encryption model for the archive payload, e.g. client_encrypted_batch or vault_encrypted_batch."
    created_at:
      type: integer
      note: "Unix timestamp when the manifest was created."
