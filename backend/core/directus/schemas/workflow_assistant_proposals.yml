# backend/core/directus/schemas/workflow_assistant_proposals.yml
# Durable assistant workflow proposals. Graphs, inputs, and mutation payloads
# remain in owner-encrypted workflow blobs; this collection exposes only routing
# and approval lifecycle metadata.
workflow_assistant_proposals:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    proposal_id:
      type: string
      note: "[Indexed, Unique] Public approval proposal id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the proposal owner."
    action:
      type: string
      note: "create, update, delete, or run."
    workflow_id:
      type: string
      note: "Nullable existing workflow id for update, delete, or run."
    status:
      type: string
      note: "pending, executing, approved, rejected, cancelled, expired, or failed."
    risk_level:
      type: string
      note: "Server-derived low, elevated, or high action classification."
    auto_execute_at:
      type: integer
      note: "Nullable Unix timestamp. Assistant-triggered runs execute only after this owner-scoped countdown deadline."
    expires_at:
      type: integer
      note: "[Indexed] Unix timestamp after which pending approval cannot execute."
    resolved_at:
      type: integer
      note: "Nullable Unix timestamp for terminal resolution."
    result_id:
      type: string
      note: "Nullable workflow or accepted run id after approval."
    encrypted_payload_ref:
      type: string
      note: "[Encrypted reference] Owner-encrypted action payload in workflow_encrypted_blobs."
    record_json:
      type: json
      note: "Server-owned normalized proposal record; never stores plaintext graph or input."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
