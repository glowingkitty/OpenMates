# backend/core/directus/schemas/workspace_change_entries.yml
# Per-object workspace history entries. Payload fields are encrypted or opaque
# references and must never contain decrypted task, plan, project, or workflow
# private text.

workspace_change_entries:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    entry_id:
      type: string
      note: "[Indexed, Unique] Stable change entry id."
      options:
        unique: true
    change_set_id:
      type: string
      note: "[Indexed] Parent workspace_change_sets.change_set_id."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    object_type:
      type: string
      note: "task, plan, project, or workflow."
    object_id:
      type: string
      note: "[Indexed] Stable object id such as task_id, plan_id, project_id, or workflow id."
    operation:
      type: string
      note: "create, update, delete, archive, restore, link, unlink, reorder, status, or workflow_version."
    source:
      type: string
      note: "Source copied from parent change set for object-level filtering."
    namespace:
      type: string
      note: "Namespace copied from parent change set."
    version_before:
      type: integer
      nullable: true
      note: "Object metadata version before the mutation, when applicable."
    version_after:
      type: integer
      nullable: true
      note: "Object metadata version after the mutation, when applicable."
    encrypted_before_ref:
      type: text
      nullable: true
      note: "Opaque encrypted/client-ciphertext before snapshot ref or inline bundle."
    encrypted_after_ref:
      type: text
      nullable: true
      note: "Opaque encrypted/client-ciphertext after snapshot ref or inline bundle."
    encrypted_patch_ref:
      type: text
      nullable: true
      note: "Opaque encrypted/client-ciphertext patch ref or inline bundle."
    workflow_version_before_id:
      type: string
      nullable: true
      note: "Workflow version id before a workflow graph restore/update."
    workflow_version_after_id:
      type: string
      nullable: true
      note: "Workflow version id after a workflow graph restore/update."
    restored_from_entry_id:
      type: string
      nullable: true
      note: "Source workspace_change_entries.entry_id when this entry was created by a restore."
    restore_state:
      type: string
      nullable: true
      note: "before or after, indicating which state from restored_from_entry_id was applied."
    archived_manifest_id:
      type: string
      nullable: true
      note: "workspace_change_archives.archive_id after this entry moves to cold storage."
    created_at:
      type: integer
      note: "Unix timestamp when the entry was created."
    archived_at:
      type: integer
      nullable: true
      note: "Unix timestamp when the entry was archived to S3."
    undone_at:
      type: integer
      nullable: true
      note: "Unix timestamp when this entry was undone by a compensating change set."
