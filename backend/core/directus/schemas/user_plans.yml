      note: "red, green, final, or not_applicable."
    status:
      type: string
      note: "proposed, pending, passed, failed, passed_unexpectedly, skipped, skipped_with_reason, not_applicable, or waived."
    lifecycle_status:
      type: string
      nullable: true
      note: "Check lifecycle: proposed, description_approved, source_created, red_recorded, ready_for_implementation, green_recorded, complete, blocked, or waived."
    required_for_done:
      type: boolean
      default: true
    covers:
      type: json
      nullable: true
    source_hash:
      type: string
      nullable: true
    threshold:
      type: integer
      nullable: true
    score:
      type: integer
      nullable: true
    confidence:
      type: string
      nullable: true
    linked_task_id:
      type: string
      nullable: true
    linked_sub_chat_id:
