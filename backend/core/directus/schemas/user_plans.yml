      type: string
    status:
      type: string
      note: "Criterion state: pending, satisfied, failed, or waived."
    required:
      type: boolean
      default: true
    linked_step_ids:
      type: json
      nullable: true
    linked_task_ids:
      type: json
      nullable: true
    verification_ids:
      type: json
      nullable: true
    coverage_status:
      type: string
      default: uncovered
      note: "Criterion verification coverage: uncovered, covered, ambiguous, blocked, or waived."
    verification_scope:
      type: string
      nullable: true
    version:
      type: integer
      default: 1
    created_at:
      type: integer
    updated_at:
      type: integer
    encrypted_text:
      type: text
    encrypted_evidence:
      type: text
      nullable: true
    encrypted_coverage_note:
      type: text
      nullable: true
    encrypted_waiver_reason:
