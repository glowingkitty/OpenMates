# backend/core/directus/schemas/user_plans.yml
# Durable Plans V1 collections. Private plan content is client-encrypted for
# storage; server-visible fields are limited to ownership, filtering, status,
# versioning, traceability, and safe orchestration.

user_plans:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    plan_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID for the user-facing plan."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the plan owner."
    hashed_team_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] SHA256(team_id) when the plan has been moved into a team workspace. Null means personal context."
    status:
      type: string
      note: "Plan state: draft, checking_assumptions, awaiting_confirmation, active, executing, running_checks, blocked, completed, or archived."
    primary_chat_id:
      type: uuid
      nullable: true
      note: "Primary chat used as plan context."
    hashed_primary_chat_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(primary_chat_id) for privacy-preserving filtering."
    linked_project_hashes:
      type: json
      nullable: true
      note: "Array of SHA256(project_id) values linked to this plan for project filtering."
    current_phase_id:
      type: string
      nullable: true
    current_step_id:
      type: string
      nullable: true
    current_task_id:
      type: string
      nullable: true
    continuation_state:
      type: string
      nullable: true
      note: "Safe continuation state: idle, scheduled, paused, blocked, or budget_limited."
    approval_state:
      type: string
      nullable: true
      note: "Safe approval state: draft, approved, rejected, or autoconfirmed."
    planner_focus_id:
      type: string
      nullable: true
      note: "Focus mode that created or last edited the plan, e.g. openmates-plan or code-project_planner."
    version:
      type: integer
      default: 1
      note: "Server-authoritative monotonic metadata version; every accepted PATCH advances it."
    created_at:
      type: integer
    updated_at:
      type: integer
    completed_at:
      type: integer
      nullable: true
    encrypted_plan_key:
      type: text
      nullable: true
      note: "[Migration-only client-encrypted field] Legacy plan key wrapped with the user's master key. Canonical clients must use user_plan_key_wrappers before launch."
    encrypted_title:
      type: text
      note: "[Client-encrypted durable storage] Plan title."
    encrypted_summary:
      type: text
      nullable: true
    encrypted_goal:
      type: text
      nullable: true
    encrypted_scope_in:
      type: text
      nullable: true
    encrypted_scope_out:
      type: text
      nullable: true
    encrypted_user_flows:
      type: text
      nullable: true
    encrypted_current_focus:
      type: text
      nullable: true
    encrypted_linked_project_ids:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] JSON array of raw linked project IDs for owner-side UI/key operations."
    encrypted_assumptions:
      type: text
      nullable: true
    encrypted_open_questions:
      type: text
      nullable: true
    encrypted_constraints:
      type: text
      nullable: true
    encrypted_decisions:
      type: text
      nullable: true
    encrypted_risks:
      type: text
      nullable: true
    encrypted_reference_patterns:
      type: text
      nullable: true
    encrypted_context:
      type: text
      nullable: true
    encrypted_continuation_policy:
      type: text
      nullable: true

user_plan_key_wrappers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    hashed_plan_id:
      type: string
      note: "[Indexed] SHA256(plan_id) for the plan this wrapped key decrypts."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the plan owner."
    key_type:
      type: string
      note: "Wrapper type: master, chat, project, plan, or team. Share links use URL-fragment key payloads, not durable wrappers."
    hashed_chat_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(chat_id) for chat scoped plan key wrappers."
    hashed_project_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(project_id) for project scoped plan key wrappers."
    hashed_context_plan_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(plan_id) for plan scoped child-object wrappers. Null for the plan's own master/chat/project/team wrappers."
    hashed_team_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(team_id) for team scoped plan key wrappers."
    team_key_epoch:
      type: integer
      nullable: true
      note: "Team key rotation epoch for key_type='team'."
    encrypted_plan_key:
      type: text
      note: "Plan key wrapped with the context key. Never stores the raw plan key."
    created_at:
      type: integer
    expires_at:
      type: integer
      nullable: true
    wrapper_version:
      type: integer
      default: 1
      note: "Wrapper contract version."

user_plan_steps:
  type: collection
  fields:
    id:
      type: uuid
    plan_id:
      type: string
    step_id:
      type: string
    parent_step_id:
      type: string
      nullable: true
    status:
      type: string
    position:
      type: integer
      default: 0
    linked_task_ids:
      type: json
      nullable: true
    version:
      type: integer
      default: 1
    created_at:
      type: integer
    updated_at:
      type: integer
    encrypted_title:
      type: text
    encrypted_description:
      type: text
      nullable: true
    encrypted_notes:
      type: text
      nullable: true

user_plan_acceptance_criteria:
