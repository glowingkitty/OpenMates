# backend/core/directus/schemas/workflow_input_sessions.yml
# Durable workflow-input session reconnect metadata. All private session state,
# including drafts and planner output, is stored in Automation Vault blobs.
workflow_input_sessions:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - session id."
    session_id:
      type: string
      note: "[Indexed, Unique] Public workflow input session id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    status:
      type: string
      note: "running, needs_clarification, draft, executed, stopped, undone, or failed."
    event_cursor:
      type: integer
      note: "Latest append-only event id for reconnect polling."
    encrypted_state_ref:
      type: string
      note: "Automation Vault reference for the private session state."
    encrypted_state_checksum:
      type: string
      note: "SHA256 checksum for the encrypted private session state."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
    expires_at:
      type: integer
      note: "Unix timestamp for abandoned draft cleanup."
