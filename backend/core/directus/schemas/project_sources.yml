# backend/core/directus/schemas/project_sources.yml
# Project-attached remote or local sources for read/search/import workflows.
# User-facing names and source metadata remain opaque ciphertext; the backend
# only stores hashed ownership fields and sparse operational status/capabilities.
project_sources:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    source_id:
      type: string
      note: "Client-generated stable source identifier."

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id)."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the project owner."

    source_type:
      type: string
      note: "Source kind: local_folder, local_git_repository, remote_folder, or remote_git_repository."

    encrypted_display_name:
      type: text
      note: "[Encrypted] User-visible source name encrypted with the project key."

    encrypted_metadata:
      type: text
      note: "[Encrypted] Source metadata such as root path, remote URL label, branch, or provider details."

    capabilities:
      type: json
      note: "Sparse operational capabilities such as read, search, import, and write_request."

    status:
      type: string
      note: "Connection status: connected, offline, permission_required, or revoked."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the source was attached."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when the source metadata changed."

    last_indexed_at:
      type: integer
      note: "Optional Unix timestamp (seconds) for the last successful source index/search refresh."

  indexes:
    - fields: [hashed_project_id, hashed_user_id]
    - fields: [source_id, hashed_user_id]
      unique: true
