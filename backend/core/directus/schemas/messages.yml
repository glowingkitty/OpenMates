# backend/core/directus/schemas/messages.yml
# Defines the schema for the 'messages' collection in Directus.
# Each record represents a single chat message.
# Directus stores client-encrypted permanent message data only. The separate AI
# inference Redis cache is short-lived, Vault-encrypted, and server-readable for
# follow-up context; Vault-encrypted AI cache payloads must never be persisted here.
messages:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - Unique identifier for the message, auto-generated by Directus."

    client_message_id: # formerly message_id
      type: string
      note: "[Indexed] Unique identifier for the message. Format: {last_10_chars_of_chat_id}-{uuid_v4}. Generated by the initiator (client for user messages, server for AI messages)."
      options:
        unique: true # Assuming this should still be unique

    chat_id:
      type: string
      note: "Foreign Key linking back to the chats.id"

    hashed_user_id:
      type: string
      note: "[Indexed] The hashed ID of the user who sent the message. Null if sent by an AI/system."

    encrypted_content:
      type: textfield
      note: "[Client-encrypted permanent storage] Final message content, encrypted with the chat-specific key before storage in Directus. Content may be markdown/plain text or serialized JSON depending on the client payload."

    role:
      type: string
      note: "[Indexed] Role of the sender: 'user', 'assistant', or 'system'."

    encrypted_sender_name:
      type: string
      note: "[Client-encrypted permanent storage] Sender name, encrypted with the chat-specific key before storage in Directus"

    encrypted_category:
      type: string
      note: "[Client-encrypted permanent storage] Category, encrypted with the chat-specific key before storage in Directus"

    encrypted_model_name:
      type: string
      note: "[Client-encrypted permanent storage] Model name used to generate this message, encrypted with the chat-specific key before storage in Directus. ONLY for assistant messages."

    encrypted_thinking_content:
      type: textfield
      note: "[Client-encrypted permanent storage] The thinking content (internal reasoning) of the AI model, encrypted with the chat-specific key before storage in Directus"

    encrypted_thinking_signature:
      type: string
      note: "[Client-encrypted permanent storage] Digital signature for the thinking content (if provided by model), encrypted with the chat-specific key before storage in Directus"

    has_thinking:
      type: boolean
      default: false
      note: "Flag indicating if this message contains thinking content"

    thinking_token_count:
      type: integer
      note: "Number of tokens used for the thinking process"

    # sender_name is removed as it's derived from category via translations in the UI.

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the message was fully completed and persisted. Provided by the application."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when the message was last updated. Crucial for delta syncs."

    encrypted_pii_mappings:
      type: textfield
      note: "[Client-encrypted permanent storage] JSON mapping of PII placeholders to original values, encrypted with the chat-specific key before storage in Directus. Used for client-side restoration of anonymized data."

    user_message_id:
      type: string
      note: "ID (client_message_id) of the user message that triggered this system message. Only set for system role messages (e.g., credits-rejection responses). Enables Device B to display the correct user message preview under 'Credits needed...' in the sidebar."
