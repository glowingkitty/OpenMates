# backend/core/directus/schemas/project_settings.yml
# Encrypted per-Project assistant action and remote write preferences.
# Plaintext write_mode is intentionally sparse so backend/CLI can enforce the
# approved two-mode contract without decrypting user-authored settings details.
project_settings:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id)."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the project owner."

    write_mode:
      type: string
      note: "Project write policy: always_ask or auto_approve_safe_writes. Auto decide is intentionally not supported in V1."

    encrypted_settings:
      type: text
      note: "[Encrypted] Project permission settings, protected paths, and automated check overrides encrypted with the project key."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when settings changed."

  indexes:
    - fields: [hashed_project_id, hashed_user_id]
      unique: true
