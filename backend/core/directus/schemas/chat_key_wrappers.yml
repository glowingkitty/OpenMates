# backend/core/directus/schemas/chat_key_wrappers.yml
# Defines canonical wrapper rows for chat encryption keys.
# Existing production chats still keep chats.encrypted_chat_key as a compatibility
# fallback; this collection lets wrapper-aware clients resolve the same chat key
# from explicit access contexts without re-encrypting chat content.
# Backend backfill copies ciphertext only and must never decrypt chat keys.
chat_key_wrappers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus"

    hashed_chat_id:
      type: string
      note: "[Indexed] SHA256 hash of chat_id. References the chat this wrapped key belongs to."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256 hash of the owning user ID. Used for owner-scoped authorization and queries."

    key_type:
      type: string
      note: "[Indexed] Wrapper context type: 'master', 'chat', 'project', 'plan', or 'team'."

    hashed_project_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] For key_type='project': SHA256(project_id). Null for unrelated contexts."

    hashed_plan_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] For key_type='plan': SHA256(plan_id). Null for unrelated contexts."

    hashed_team_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] For key_type='team': SHA256(team_id). Null for unrelated contexts."

    team_key_epoch:
      type: integer
      nullable: true
      note: "Team key rotation epoch used for key_type='team'. Required for team wrappers before Teams ships."

    encrypted_chat_key:
      type: string
      length: 512
      note: "The chat encryption key wrapped by the context key. For key_type='master', this is the existing master-wrapped chat key ciphertext."

    wrapper_version:
      type: integer
      default: 1
      note: "Wrapper contract version for future migrations."

    expires_at:
      type: integer
      nullable: true
      note: "Optional Unix timestamp for temporary context wrappers. Null for durable wrappers."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when this wrapper row was created."
