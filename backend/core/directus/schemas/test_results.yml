# backend/core/directus/schemas/test_results.yml
# Per-test result events for history and triage.
test_results:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    result_key:
      type: string
      length: 2048
      unique: true
      note: "[Indexed, Unique] Idempotency key for a run/test/attempt result."
    run_key:
      type: string
      length: 255
      note: "Run key from test_runs."
    test_key:
      type: string
      length: 1024
      note: "Canonical test key from test_catalog."
    suite:
      type: string
      length: 80
      note: "Suite key."
    test_name:
      type: string
      length: 1024
      note: "Human-readable test name."
    status:
      type: string
      length: 80
      note: "passed, failed, skipped, running, cancelled, or unknown."
    error_summary:
      type: text
      note: "Redacted failure summary."
    metadata:
      type: json
      note: "Retries, flake state, artifact references, and external URLs."
    created_at:
      type: string
      length: 80
      note: "ISO timestamp for this result event."
    created_at_unix:
      type: integer
      note: "Unix timestamp for sorting."
