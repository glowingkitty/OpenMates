# backend/core/directus/schemas/workflow_chat_deliveries.yml
# Durable pending chat deliveries created by Workflow send_chat_message actions.
# Pending payload is Vault ciphertext; claim tokens are stored only as hashes.
workflow_chat_deliveries:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    delivery_id:
      type: uuid
      note: "[Indexed, Unique] Public pending delivery id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA-256 hash of the owning user id."
    chat_id:
      type: uuid
      note: "Stable chat id selected by the backend for client-side first encryption."
    message_id:
      type: uuid
      note: "Stable first message id selected by the backend."
    encrypted_payload:
      type: text
      note: "[Vault encrypted] Pending title and message payload."
    status:
      type: string
      note: "delivery_pending, claimed, acknowledged, cancelled, or expired."
    claim_generation:
      type: integer
      note: "Fencing generation for client claims."
    claim_token_hash:
      type: string
      note: "SHA-256 hash of the current claim token; raw token is never stored."
    claim_issued_at:
      type: integer
      note: "Unix timestamp for current claim issuance."
    claim_expires_at:
      type: integer
      note: "Unix timestamp for current claim expiry."
    claim_device_id:
      type: string
      note: "Hashed WebSocket device/connection id that owns the current claim."
    encrypted_chat_metadata:
      type: text
      note: "Client-supplied encrypted chat metadata after first encryption."
    encrypted_message:
      type: text
      note: "Client-supplied encrypted first message after first encryption."
    client_persisted_at:
      type: integer
      note: "Unix timestamp when client ciphertext was accepted."
    acknowledged_at:
      type: integer
      note: "Unix timestamp when delivery reached terminal acknowledged state."
    cancelled_at:
      type: integer
      note: "Unix timestamp when delivery was cancelled."
    expired_at:
      type: integer
      note: "Unix timestamp when delivery expired."
    created_at:
      type: integer
      note: "Unix timestamp when pending delivery was created."
    expires_at:
      type: integer
      note: "Unix timestamp when unacknowledged delivery expires."
