# backend/core/directus/schemas/workflow_triggers.yml
# Server-queryable trigger bindings for offline workflow execution.
workflow_triggers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    trigger_id:
      type: string
      note: "[Indexed, Unique] Public trigger id."
      options:
        unique: true
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    version_id:
      type: string
      note: "Current workflow version used for this trigger."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    trigger_type:
      type: string
      note: "schedule, manual, or webhook."
    schedule_config:
      type: json
      note: "Plaintext schedule routing metadata. Must not contain private prompts."
    webhook_ref:
      type: string
      note: "Nullable webhook reference for future webhook triggers."
    enabled:
      type: boolean
      default: false
      note: "Whether this trigger can create runs."
    next_run_at:
      type: integer
      note: "[Indexed, Nullable] Unix timestamp for scheduler queries."
    last_claimed_at:
      type: integer
      note: "Nullable timestamp used for duplicate-run protection."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
