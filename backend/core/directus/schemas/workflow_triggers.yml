# backend/core/directus/schemas/workflow_triggers.yml
# Server-queryable trigger bindings for offline workflow execution.
workflow_triggers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    trigger_id:
      type: string
      note: "[Indexed, Unique] Public trigger id."
      unique: true
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    version_id:
      type: string
      note: "Current workflow version used for this trigger."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    hashed_project_id:
      type: string
      note: "[Indexed, Nullable] SHA256(project_id) when the trigger is project-scoped."
    trigger_type:
      type: string
      note: "[Indexed] manual, schedule, webhook, or event."
    source:
      type: string
      note: "[Indexed, Nullable] Event source routing field."
    event_type:
      type: string
      note: "[Indexed, Nullable] Event type routing field."
    encrypted_schedule_config_ref:
      type: string
      note: "Vault blob reference for recurrence configuration."
    encrypted_event_predicate_ref:
      type: string
      note: "Vault blob reference for structured event filters."
    encrypted_webhook_config_ref:
      type: string
      note: "Vault blob reference for webhook configuration and secrets."
    encrypted_required_start_input_schema_ref:
      type: string
      note: "Vault blob reference for manual input schema containing user text."
    enabled:
      type: boolean
      default: false
      note: "Whether this trigger can create runs."
    next_run_at:
      type: integer
      note: "[Indexed, Nullable] Unix timestamp for scheduler queries."
    claim_status:
      type: string
      note: "Nullable claimed state used by the atomic scheduler boundary."
    claim_token_hash:
      type: string
      note: "Nullable hash of the worker claim token."
    claim_generation:
      type: integer
      default: 0
      note: "Monotonic claim generation that rejects stale advance requests."
    claimed_at:
      type: integer
      note: "Nullable timestamp when a worker accepted this occurrence."
    claim_expires_at:
      type: integer
      note: "Nullable timestamp after which a stalled claim may be recovered."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
