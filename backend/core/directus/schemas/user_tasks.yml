# backend/core/directus/schemas/user_tasks.yml
# User-facing Tasks V1 collections. Private task content is client-encrypted for
# durable storage; server-visible fields are limited to ownership, filtering,
# scheduling, ordering, conflict control, and safe AI execution state.

user_tasks:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    task_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID v4 for the user-facing task."
      options:
        unique: true

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the task owner."

    status:
      type: string
      note: "Task state: backlog, todo, in_progress, blocked, or done."

    assignee_type:
      type: string
      note: "Task assignee kind: ai or user."

    assignee_hash:
      type: string
      nullable: true
      note: "Hashed user id for user assignees; null or stable ai marker for AI assignee."

    primary_chat_id:
      type: uuid
      nullable: true
      note: "Primary chat used as task context. Server-visible for routing and chat task lists."

    hashed_primary_chat_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(primary_chat_id) for privacy-preserving filtering."

    linked_project_hashes:
      type: json
      nullable: true
      note: "Array of SHA256(project_id) values linked to this task for project filtering."

    parent_task_id:
      type: string
      nullable: true
      note: "Optional parent user task id for future subtask grouping."

    plan_id:
      type: string
      nullable: true
      note: "Optional Plans V1 plan id this task belongs to."

    plan_step_id:
      type: string
      nullable: true
      note: "Optional Plans V1 step id this task executes or verifies."

    task_type:
      type: string
      nullable: true
      note: "Task kind: work or verification. Null/empty is treated as work for legacy records."

    verification_id:
      type: string
      nullable: true
      note: "Optional Plans V1 verification id when task_type is verification."

    due_at:
      type: integer
      nullable: true
      note: "Unix timestamp when an AI-assigned task should start. Null means unscheduled."

    priority:
      type: integer
      default: 0
      note: "Server-visible priority for sorting. Reassess if priority becomes sensitive."

    position:
      type: integer
      default: 0
      note: "Kanban ordering value within a status column or filtered board."

    version:
      type: integer
      default: 1
      note: "Server-authoritative monotonic metadata version; every accepted PATCH advances it."

    created_at:
      type: integer
      note: "Unix timestamp when the task was created."

    updated_at:
      type: integer
      note: "Unix timestamp when the task metadata or encrypted fields changed."

    started_at:
      type: integer
      nullable: true
      note: "Unix timestamp when work started."

    completed_at:
      type: integer
      nullable: true
      note: "Unix timestamp when the task was completed."

    blocked_reason_code:
      type: string
      nullable: true
      note: "Safe enum-style reason for blocked tasks, never plaintext private content."

    ai_execution_state:
      type: string
      nullable: true
      note: "Safe state for AI execution orchestration, e.g. queued, running, waiting, completed."

    encrypted_title:
      type: text
      note: "[Client-encrypted durable storage] Task title encrypted before storage."

    encrypted_task_key:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Task key wrapped with the user's master key for standalone task decryption."

    encrypted_description:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Task description encrypted before storage."

    encrypted_tags:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Task tags encrypted before storage."

    encrypted_linked_project_ids:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] JSON array of raw linked project IDs for owner-side UI/key operations."

    encrypted_activity_summary:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Task activity summary encrypted before storage."

    encrypted_latest_instruction:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Latest task instruction encrypted before storage."

user_task_key_wrappers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    hashed_task_id:
      type: string
      note: "[Indexed] SHA256(task_id) for the task this wrapped key decrypts."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the task owner."

    key_type:
      type: string
      note: "Wrapper type: master, chat, or project. Share links use URL-fragment key payloads, not durable wrappers."

    hashed_chat_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(chat_id) for chat scoped task key wrappers."

    hashed_project_id:
      type: string
      nullable: true
      note: "[Indexed] SHA256(project_id) for project scoped task key wrappers."

    encrypted_task_key:
      type: text
      note: "Task key wrapped with the context key. Never stores the raw task key."

    created_at:
      type: integer
      note: "Unix timestamp when this key wrapper was created."

    expires_at:
      type: integer
      nullable: true
      note: "Optional expiry for time-bounded non-share access wrappers."

user_task_activity:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    task_id:
      type: string
      note: "User-facing task id this activity entry belongs to."

    actor_type:
      type: string
      note: "Actor kind: user, ai, or system."

    actor_hash:
      type: string
      nullable: true
      note: "Hashed actor identifier when applicable."

    event_type:
      type: string
      note: "Safe event type, e.g. created, updated, started, blocked, completed."

    created_at:
      type: integer
      note: "Unix timestamp when the activity entry was recorded."

    encrypted_message:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] User-visible activity text."

    encrypted_snapshot:
      type: text
      nullable: true
      note: "[Client-encrypted durable storage] Optional encrypted task snapshot."
