# backend/core/directus/schemas/project_folders.yml
# Nested organizational folders inside a project. Folders are not encryption
# boundaries; their names/metadata are encrypted with the parent project key.
project_folders:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    folder_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID v4 for the folder."
      options:
        unique: true

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id) for querying without exposing project IDs."

    hashed_parent_folder_id:
      type: string
      note: "[Indexed, Nullable] SHA256(parent folder_id). Null for root-level folders."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the project owner."

    encrypted_name:
      type: text
      note: "[Encrypted] Folder name encrypted with the project key."

    encrypted_sort_key:
      type: text
      note: "[Encrypted] Optional normalized sort string encrypted with the project key."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the folder was created."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when the folder changed."

    position:
      type: integer
      note: "Manual sort position within the parent folder."
