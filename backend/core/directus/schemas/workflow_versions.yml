# backend/core/directus/schemas/workflow_versions.yml
# Immutable workflow graph snapshots. Runs reference the version they executed.
workflow_versions:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    version_id:
      type: string
      note: "[Indexed, Unique] Public version id."
      options:
        unique: true
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    version_number:
      type: integer
      note: "Monotonic version number per workflow."
    graph_json:
      type: json
      note: "Validated workflow graph with sensitive leaf values redacted or encrypted."
    graph_hash:
      type: string
      note: "Hash of graph_json for idempotency/debugging."
    encrypted_graph_secrets:
      type: text
      note: "[Encrypted] Sensitive node config and body templates."
    created_by_client:
      type: string
      note: "web, cli, npm, pip, apple, or system."
    created_at:
      type: integer
      note: "Unix timestamp."
