# backend/core/directus/schemas/daily_inspiration_pool.yml
#
# Pool of daily inspiration entries generated by paid users.
# When a personalized inspiration is generated, a cleartext copy (no PII) is
# stored here.  The pool is capped at 100 entries (oldest evicted on overflow).
#
# Used by:
# - The daily defaults selection job (picks top 3 per language by score)
# - The interaction counter (incremented when any user opens a pool-sourced
#   inspiration — aggregate only, no user association)
#
# Privacy: No user identifiers are stored.  All content is cleartext because
# it is generic educational material (not personal to any user).

daily_inspiration_pool:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary key — Directus record ID"

    youtube_id:
      type: string
      length: 20
      note: "[Indexed, Unique] YouTube video ID.  Used for deduplication — only one pool entry per video."
      options:
        unique: true

    language:
      type: string
      length: 10
      note: "[Indexed] Language code of the generated content (e.g. 'en', 'de').  Matches the video search locale so the video itself is likely in this language."
      required: true

    phrase:
      type: textfield
      note: "Curiosity question / CTA phrase (8-18 words, two sentences).  Cleartext."
      required: true

    title:
      type: string
      length: 200
      note: "Concise chat title (3-7 words).  Cleartext."

    assistant_response:
      type: textfield
      note: "Rich first assistant message (3-5 sentences).  Cleartext."

    category:
      type: string
      length: 100
      note: "Chat category that best matches this inspiration (e.g. 'science', 'history').  One of the AVAILABLE_CATEGORIES from generator.py."
      required: true

    content_type:
      type: string
      length: 20
      default: "video"
      note: "Content type.  Currently always 'video'."

    # ── Video metadata ───────────────────────────────────────────────────────
    video_title:
      type: textfield
      note: "YouTube video title"

    video_thumbnail_url:
      type: textfield
      note: "URL of the video thumbnail"

    video_channel_name:
      type: textfield
      note: "YouTube channel name"

    video_view_count:
      type: integer
      note: "View count from YouTube Data API at generation time"

    video_duration_seconds:
      type: integer
      note: "Video duration in seconds"

    video_published_at:
      type: textfield
      note: "ISO 8601 publication date of the video"

    # ── Follow-up suggestions ────────────────────────────────────────────────
    follow_up_suggestions:
      type: textfield
      note: "JSON array of 3 follow-up conversation starters (stored as JSON string)"

    # ── Interaction tracking (aggregate only, no user association) ────────────
    interaction_count:
      type: integer
      default: 0
      note: "Number of times any user opened an inspiration sourced from this pool entry.  Used for ranking in the daily defaults selection.  No user IDs stored — purely aggregate."

    # ── Timestamps ───────────────────────────────────────────────────────────
    generated_at:
      type: integer
      note: "Unix timestamp (seconds) when the inspiration was originally generated"
      required: true

    created_at:
      type: timestamp
      note: "When this pool entry was created (Directus timestamp)"

  indexes:
    - name: idx_pool_language
      fields: [language]
      note: "For filtering pool entries by language in the daily defaults selection"

    - name: idx_pool_generated_at
      fields: [generated_at]
      note: "For ordering pool entries by recency (oldest-first for cap enforcement, newest-first for scoring)"

  note: |
    Pool of daily inspiration entries automatically populated from paid users' personalized generations.
    Capped at 100 entries (oldest evicted when full).
    Used by the daily defaults selection job to pick the top 3 per language.
    No PII — all content is generic educational material.
