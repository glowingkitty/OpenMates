# backend/core/directus/schemas/test_current_state.yml
# Latest stable and active status for each canonical test.
test_current_state:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    test_key:
      type: string
      length: 1024
      unique: true
      note: "[Indexed, Unique] Canonical test key."
    suite:
      type: string
      length: 80
      note: "Suite key."
    test_name:
      type: string
      length: 1024
      note: "Human-readable test name."
    stable_status:
      type: string
      length: 80
      note: "Latest completed status."
    stable_result_key:
      type: string
      length: 2048
      note: "Latest completed result key."
    stable_run_key:
      type: string
      length: 255
      note: "Latest completed run key."
    active_status:
      type: string
      length: 80
      note: "Nullable active state such as running or queued."
    active_run_key:
      type: string
      length: 255
      note: "Nullable active run key."
    triage_group_id:
      type: string
      length: 255
      note: "Nullable deterministic triage group id."
    error_summary:
      type: text
      note: "Redacted latest failure summary."
    metadata:
      type: json
      note: "Current-state payload used by scripts/tests.py."
    updated_at:
      type: string
      length: 80
      note: "ISO timestamp for the latest update."
    updated_at_unix:
      type: integer
      note: "Unix timestamp for sorting."
