# backend/core/directus/schemas/workflow_input_mutations.yml
# Workflow-input mutations are the durable undo ledger. Before/after snapshots
# are owner-encrypted Automation Vault blobs, never Directus JSON fields.
workflow_input_mutations:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - mutation id."
    session_id:
      type: string
      note: "[Indexed] Workflow input session id."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    type:
      type: string
      note: "create_workflow, update_workflow, delete_workflow, or link_workflow_to_project."
    target_type:
      type: string
      note: "workflow or project_item."
    target_id:
      type: string
      note: "Target identifier for undo."
    encrypted_before_ref:
      type: string
      note: "Nullable Automation Vault reference for the pre-mutation snapshot."
    encrypted_before_checksum:
      type: string
      note: "Nullable SHA256 checksum for the pre-mutation snapshot."
    encrypted_after_ref:
      type: string
      note: "Nullable Automation Vault reference for the post-mutation snapshot."
    encrypted_after_checksum:
      type: string
      note: "Nullable SHA256 checksum for the post-mutation snapshot."
    undone_at:
      type: integer
      note: "Nullable Unix timestamp when the mutation was undone."
    created_at:
      type: integer
      note: "Unix timestamp."
