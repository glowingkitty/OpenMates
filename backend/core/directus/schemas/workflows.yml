# backend/core/directus/schemas/workflows.yml
# Durable workflow metadata. Sensitive user-authored fields are encrypted; the
# server keeps only routing/status metadata needed to run workflows offline.
workflows:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    workflow_id:
      type: string
      note: "[Indexed, Unique] Public workflow id."
      options:
        unique: true
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."
    encrypted_user_id:
      type: text
      note: "[Encrypted] Raw user_id for server-side scheduled execution."
    encrypted_title:
      type: text
      note: "[Encrypted] Workflow title."
    encrypted_description:
      type: text
      note: "[Encrypted, Nullable] Workflow description."
    status:
      type: string
      note: "draft, active, disabled, error, or deleted."
    enabled:
      type: boolean
      default: false
      note: "Whether scheduled triggers may run."
    lifecycle:
      type: string
      note: "persisted or temporary. Temporary workflows auto-delete unless kept."
    source:
      type: string
      note: "manual, assistant, import, or system source label."
    source_chat_id:
      type: string
      note: "Nullable chat id that produced an assistant-created workflow."
    created_by_assistant:
      type: boolean
      default: false
      note: "Whether the workflow was created through assistant workflow skills."
    auto_delete_at:
      type: integer
      note: "Nullable Unix timestamp for temporary workflow cleanup."
    kept_at:
      type: integer
      note: "Nullable Unix timestamp when a temporary workflow was kept."
    version:
      type: integer
      default: 1
      note: "Server-authoritative monotonic metadata version."
    current_version_id:
      type: string
      note: "Current immutable workflow_versions id."
    trigger_type:
      type: string
      note: "schedule, manual, webhook, or none."
    trigger_summary:
      type: string
      note: "Plaintext non-sensitive summary such as daily at 07:00."
    next_run_at:
      type: integer
      note: "[Indexed, Nullable] Unix timestamp for the next due scheduled run."
    last_run_id:
      type: string
      note: "Nullable latest workflow_runs id."
    last_run_status:
      type: string
      note: "Nullable status of the latest run."
    run_content_retention:
      type: string
      note: "Run-content retention mode, such as last_5 or none."
    record_json:
      type: json
      note: "Server-owned normalized workflow record with encrypted refs only."
    deleted_at:
      type: integer
      note: "Nullable soft delete timestamp."
    created_at:
      type: integer
      note: "Unix timestamp."
    updated_at:
      type: integer
      note: "Unix timestamp."
