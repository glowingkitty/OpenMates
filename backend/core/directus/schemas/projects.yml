# backend/core/directus/schemas/projects.yml
# Client-encrypted project workspace metadata.
# Projects are the security boundary; folders and items inside a project use the
# project key for metadata while referenced chats/embeds keep their own keys.
projects:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    project_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID v4 for the project."
      options:
        unique: true

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the project owner."

    hashed_team_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] SHA256(team_id) when the project has been moved into a team workspace. Null means personal context."

    encrypted_project_key:
      type: text
      nullable: true
      note: "[Migration-only encrypted field] Legacy project key wrapped with the user's master key. Canonical clients must use project_key_wrappers before launch."

    encrypted_name:
      type: text
      note: "[Encrypted] Project name encrypted with the project key."

    encrypted_description:
      type: text
      note: "[Encrypted] Optional project description encrypted with the project key."

    encrypted_icon:
      type: text
      note: "[Encrypted] Optional icon name encrypted with the project key."

    encrypted_color:
      type: text
      note: "[Encrypted] Optional color/theme token encrypted with the project key."

    pinned:
      type: boolean
      default: false
      note: "Whether the project is pinned above normal project ordering."

    archived:
      type: boolean
      default: false
      note: "Whether the project is archived and hidden from the default list."

    is_private:
      type: boolean
      default: true
      note: "Whether the project is private. Read-only share links set this to false."

    is_shared:
      type: boolean
      default: false
      note: "Whether a read-only share link has been created for this project."

    version:
      type: integer
      default: 1
      note: "Server-authoritative monotonic metadata version."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the project was created."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when the project metadata changed."

    last_opened_at:
      type: integer
      note: "Unix timestamp (seconds) when the user last opened the project."

    item_count:
      type: integer
      default: 0
      note: "Denormalized count of project_items for quick list rendering."

project_key_wrappers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id) for the project this wrapped key decrypts."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the project owner."

    key_type:
      type: string
      note: "Wrapper type: master, chat, project, plan, or team."

    hashed_chat_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] SHA256(chat_id) for chat-scoped project wrappers."

    hashed_plan_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] SHA256(plan_id) for plan-scoped project wrappers."

    hashed_team_id:
      type: string
      nullable: true
      note: "[Indexed, Nullable] SHA256(team_id) for team-scoped project wrappers."

    team_key_epoch:
      type: integer
      nullable: true
      note: "Team key rotation epoch for key_type='team'."

    encrypted_project_key:
      type: text
      note: "Project key wrapped with the context key. Never stores the raw project key."

    wrapper_version:
      type: integer
      default: 1
      note: "Wrapper contract version."

    created_at:
      type: integer
      note: "Unix timestamp when this key wrapper was created."

    expires_at:
      type: integer
      nullable: true
      note: "Optional expiry for time-bounded access wrappers."
