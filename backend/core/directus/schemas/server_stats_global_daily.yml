server_stats_global_daily:
  type: collection
  fields:
    id:
      type: uuid
      primary: true

    date:
      type: string
      length: 10
      note: "[Unique, Indexed] Date in format 'YYYY-MM-DD'."

    # Incremental Totals
    new_users_registered:
      type: integer
      default: 0
      note: "Users who registered on this day."

    new_users_finished_signup:
      type: integer
      default: 0
      note: "Users who completed their first payment/gift card on this day."

    income_eur_cents:
      type: bigint
      default: 0
      note: "Total revenue in EUR cents received on this day."

    credits_sold:
      type: integer
      default: 0
      note: "Total credits purchased on this day."

    credits_used:
      type: integer
      default: 0
      note: "Total credits consumed by skills on this day."

    messages_sent:
      type: integer
      default: 0
      note: "Total messages sent by users on this day."

    chats_created:
      type: integer
      default: 0
      note: "Total chats created on this day."

    embeds_created:
      type: integer
      default: 0
      note: "Total embeds (file/image) created on this day."

    # Usage Entry Tracking
    usage_entries_created:
      type: integer
      default: 0
      note: "Total usage entries recorded on this day (across all apps)."

    usage_entries_by_app:
      type: json
      note: 'Usage entries breakdown by app_id. JSON object: {"ai": 500, "pdf": 50}.'

    # Financial Analytics (Phase 3)
    purchase_count:
      type: integer
      default: 0
      note: "Total number of purchases (credit packs) completed on this day."

    purchases_by_provider:
      type: json
      note: 'Purchase count by payment provider. JSON: {"stripe": 80, "gift_card": 20}.'

    gift_cards_created:
      type: integer
      default: 0
      note: "Number of gift cards created on this day (admin-generated or purchased)."

    gift_cards_redeemed:
      type: integer
      default: 0
      note: "Number of gift cards redeemed on this day."

    subscription_creations:
      type: integer
      default: 0
      note: "Number of new auto top-up subscriptions created on this day."

    subscription_cancellations:
      type: integer
      default: 0
      note: "Number of subscriptions cancelled on this day."

    # Token/Cost Tracking (Phase 6)
    total_input_tokens:
      type: bigint
      default: 0
      note: "Total LLM input tokens consumed on this day across all users."

    total_output_tokens:
      type: bigint
      default: 0
      note: "Total LLM output tokens generated on this day across all users."

    # Closing Snapshots (End of day state)
    liability_total:
      type: bigint
      default: 0
      note: "Total outstanding credit balance across all users at end of day."

    active_subscriptions:
      type: integer
      default: 0
      note: "Count of active Stripe subscriptions at end of day."

    total_regular_users:
      type: integer
      default: 0
      note: "Cumulative count of non-admin users at end of day."

    created_at:
      type: timestamp
      note: "Timestamp when record was created."

    updated_at:
      type: timestamp
      note: "Timestamp when record was last updated."
