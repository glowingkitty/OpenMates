# backend/core/directus/schemas/teams.yml
#
# Teams V1 storage. Team metadata is client-encrypted where user-visible or
# billing-related. Role and status fields are cleartext because backend
# authorization, billing, and sync routing must fail closed without decrypting.
teams:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    team_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID v4 for the team."
      options:
        unique: true
    hashed_team_id:
      type: string
      note: "[Indexed, Unique] SHA256(team_id) for privacy-preserving joins and permission checks."
      options:
        unique: true
    slug:
      type: string
      note: "[Indexed] User-facing short team slug; not treated as secret."
    encrypted_name:
      type: text
      note: "[Client-encrypted] Team display name."
    encrypted_description:
      type: text
      nullable: true
      note: "[Client-encrypted] Optional team description."
    encrypted_billing_profile:
      type: text
      nullable: true
      note: "[Client-encrypted] Optional team billing profile fields."
    created_by_user_hash:
      type: string
      note: "[Indexed] SHA256(user_id) of the team creator."
    status:
      type: string
      default: active
      note: "Team status: active, archived, or deleted."
    created_at:
      type: integer
    updated_at:
      type: integer

team_memberships:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    hashed_team_id:
      type: string
      note: "[Indexed] SHA256(team_id)."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id)."
    role:
      type: string
      note: "Role: owner, admin, member, or viewer."
    status:
      type: string
      note: "Membership status: active, invited, left, or removed."
    invited_by_hash:
      type: string
      nullable: true
    joined_at:
      type: integer
      nullable: true
    removed_at:
      type: integer
      nullable: true
    created_at:
      type: integer
    updated_at:
      type: integer

team_invites:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    invite_id:
      type: string
      note: "[Indexed, Unique] Client/server generated invite id."
      options:
        unique: true
    hashed_team_id:
      type: string
      note: "[Indexed] SHA256(team_id)."
    hashed_recipient_email:
      type: string
      nullable: true
      note: "[Indexed] Base64 SHA256(normalized email) for invite delivery matching; never used for account-existence disclosure."
    encrypted_recipient_hint:
      type: text
      nullable: true
      note: "[Encrypted] Optional recipient email/account hint."
    encrypted_invite_team_key:
      type: text
      nullable: true
      note: "[Encrypted] Team key encrypted by inviter client with email-bound invite secret; server cannot decrypt."
    invite_key_kdf_context:
      type: json
      nullable: true
      note: "Public KDF context for deriving the invite wrapping key; never stores the fragment secret."
    role:
      type: string
      note: "Role granted on accept: admin, member, or viewer."
    status:
      type: string
      note: "Invite status: pending, access_requested, accepted, declined, revoked, or expired."
    created_by_hash:
      type: string
      note: "[Indexed] SHA256(user_id) of inviter."
    one_time_token_hash:
      type: string
      nullable: true
      note: "[Indexed] Hash of one-time invite token; raw token is never stored."
    sent_at:
      type: integer
      nullable: true
    expires_at:
      type: integer
      nullable: true
    created_at:
      type: integer
    accepted_at:
      type: integer
      nullable: true
    declined_at:
      type: integer
      nullable: true
    revoked_at:
      type: integer
      nullable: true

team_access_requests:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    access_request_id:
      type: string
      note: "[Indexed, Unique] User-facing access request id."
      options:
        unique: true
    invite_id:
      type: string
      note: "[Indexed] Invite id that produced this request."
    hashed_team_id:
      type: string
      note: "[Indexed] SHA256(team_id)."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of recipient requesting access."
    role:
      type: string
      note: "Role requested from invite: admin, member, or viewer."
    encrypted_team_key:
      type: text
      nullable: true
      note: "Recipient-provided team key wrapper created from encrypted_invite_team_key; used by owner/admin approval without exposing raw team keys."
    status:
      type: string
      default: pending_access_approval
      note: "Internal status: pending_access_approval, approved, rejected, or expired. Product copy says Waiting for team access approval."
    requested_at:
      type: integer
    approved_at:
      type: integer
      nullable: true
    rejected_at:
      type: integer
      nullable: true
    resolved_by_user_hash:
      type: string
      nullable: true

team_key_wrappers:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    hashed_team_id:
      type: string
      note: "[Indexed] SHA256(team_id)."
    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) this team key is wrapped for."
    team_key_epoch:
      type: integer
      default: 1
      note: "Teams V1 always uses epoch 1 and does not auto-rotate team keys."
    encrypted_team_key:
      type: text
      note: "Team key wrapped for the member. Never stores raw key material."
    status:
      type: string
      default: active
      note: "Wrapper status: active or revoked."
    created_at:
      type: integer
    revoked_at:
      type: integer
      nullable: true

team_credit_accounts:
  type: collection
  fields:
    id:
      type: uuid
    hashed_team_id:
      type: string
      note: "[Indexed, Unique] SHA256(team_id)."
    encrypted_balance:
      type: text
      note: "[Vault-encrypted] Team credit balance."
    balance_credits:
      type: integer
      default: 0
      note: "Server-enforced team credit balance used for insufficient-credit checks."
    version:
      type: integer
      default: 1
    updated_at:
      type: integer

team_credit_events:
  type: collection
  fields:
    id:
      type: uuid
    event_id:
      type: string
      note: "[Indexed, Unique] Idempotency key for credit event."
    hashed_team_id:
      type: string
    actor_user_hash:
      type: string
    event_type:
      type: string
      note: "purchase, personal_transfer_in, deduction, refund, or adjustment."
    amount:
      type: integer
    encrypted_metadata:
      type: text
      nullable: true
    created_at:
      type: integer

team_usage_events:
  type: collection
  fields:
    id:
      type: uuid
    event_id:
      type: string
      note: "[Indexed, Unique] Idempotency key for usage event."
    hashed_team_id:
      type: string
    actor_user_hash:
      type: string
    workspace_type:
      type: string
    object_id_hash:
      type: string
      nullable: true
    credit_amount:
      type: integer
    created_at:
      type: integer

team_data_exports:
  type: collection
  fields:
    id:
      type: uuid
    export_id:
      type: string
      note: "[Indexed, Unique] Export job/artifact id."
      options:
        unique: true
    hashed_team_id:
      type: string
      note: "[Indexed] SHA256(team_id)."
    actor_user_hash:
      type: string
      note: "[Indexed] SHA256(user_id) of owner/admin creating the export."
    artifact_hash:
      type: string
      note: "Hash of the encrypted/redacted export artifact."
    encrypted_manifest:
      type: text
      note: "Client/server encrypted manifest for the prepared team export artifact."
    status:
      type: string
      default: ready
      note: "Export status: pending, ready, downloaded, expired, or revoked."
    created_at:
      type: integer
    expires_at:
      type: integer
      nullable: true
