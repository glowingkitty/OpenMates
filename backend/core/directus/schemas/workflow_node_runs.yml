# backend/core/directus/schemas/workflow_node_runs.yml
# Per-node execution history for workflow debugging and parity clients.
workflow_node_runs:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."
    node_run_id:
      type: string
      note: "[Indexed, Unique] Public node-run id."
      options:
        unique: true
    run_id:
      type: string
      note: "[Indexed] Public workflow run id."
    workflow_id:
      type: string
      note: "[Indexed] Public workflow id."
    node_id:
      type: string
      note: "Graph node id."
    node_type:
      type: string
      note: "Node type from WorkflowNodeType."
    status:
      type: string
      note: "queued, running, completed, skipped, or failed."
    started_at:
      type: integer
      note: "Unix timestamp."
    finished_at:
      type: integer
      note: "Nullable Unix timestamp."
    attempt:
      type: integer
      default: 1
      note: "Attempt number for retries."
    skipped_reason:
      type: string
      note: "Nullable skip reason."
    error_code:
      type: string
      note: "Nullable typed error code."
    error_summary:
      type: string
      note: "Redacted error summary."
    credit_cost:
      type: integer
      default: 0
      note: "Credits charged for this node."
    encrypted_input_summary:
      type: text
      note: "[Encrypted] Node input summary."
    encrypted_output_summary:
      type: text
      note: "[Encrypted] Node output summary."
