# backend/core/directus/schemas/project_items.yml
# Membership/link rows that place existing content inside a project/folder.
# A target embed/chat can appear in many projects by having many rows here.
project_items:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    project_item_id:
      type: string
      note: "[Indexed, Unique] Client-generated UUID v4 for this membership row."
      options:
        unique: true

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id)."

    hashed_folder_id:
      type: string
      note: "[Indexed, Nullable] SHA256(folder_id). Null for root-level items."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."

    item_type:
      type: string
      note: "Target kind: embed, chat, upload, or future workflow."

    target_id_hash:
      type: string
      note: "[Indexed] SHA256(target id). Used for deletion pre-checks without exposing IDs."

    target_id_encrypted:
      type: text
      note: "[Encrypted] Actual target id encrypted with the project key."

    encrypted_display_name:
      type: text
      note: "[Encrypted] Optional project-specific item label."

    encrypted_note:
      type: text
      note: "[Encrypted] Optional project-specific note."

    encrypted_metadata:
      type: text
      note: "[Encrypted] Optional item metadata JSON string."

    deleted_target_state:
      type: string
      note: "Nullable marker for a missing/deleted original target."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when this item was added."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when this membership changed."

    position:
      type: integer
      note: "Manual sort position within the folder."
