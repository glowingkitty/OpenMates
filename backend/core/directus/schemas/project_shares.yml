# backend/core/directus/schemas/project_shares.yml
# Read-only project share link records. The project decryption key lives in the
# URL fragment and is never sent to the server.
project_shares:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    share_id:
      type: string
      note: "[Indexed, Unique] Public share identifier used in project share URLs."
      options:
        unique: true

    hashed_project_id:
      type: string
      note: "[Indexed] SHA256(project_id)."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner."

    encrypted_share_metadata:
      type: text
      note: "[Encrypted] Optional metadata encrypted with the project key."

    expires_at:
      type: integer
      note: "Unix timestamp when the share expires. Null means no expiry."

    password_protected:
      type: boolean
      default: false
      note: "Whether the share requires a password-derived second key."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the share was created."

    revoked_at:
      type: integer
      note: "Unix timestamp (seconds) when the share was revoked. Null if active."
