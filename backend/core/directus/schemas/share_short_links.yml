# backend/core/directus/schemas/share_short_links.yml
# Durable short-link records for shared chats, embeds, and future shareable
# content types. The encrypted_url is opaque to the server; the decryption key
# is kept in the public URL fragment and is never sent over HTTP.

share_short_links:
  type: collection
  fields:
    id:
      type: uuid
      note: "Primary Key - auto-generated by Directus."

    token:
      type: string
      note: "[Indexed, Unique] Public lookup token used in /s/<token>. Does not decrypt the share URL."
      options:
        unique: true

    encrypted_url:
      type: text
      note: "Opaque AES-GCM encrypted long share URL. Server cannot decrypt because shortKey stays in URL fragment."

    content_type:
      type: string
      note: "Shared content type. Current values: chat, embed. Future values may include project and workflow."

    content_id:
      type: string
      note: "Chat ID, embed ID, or future shareable content ID associated with this short link."

    hashed_user_id:
      type: string
      note: "[Indexed] SHA256(user_id) of the owner who created the short link."

    password_protected:
      type: boolean
      default: false
      note: "Whether crawler-visible metadata must hide content title/summary and show the generic protected preview."

    expires_at:
      type: integer
      nullable: true
      note: "Unix timestamp when this short link expires. Null means no expiration."

    revoked_at:
      type: integer
      nullable: true
      note: "Unix timestamp when this short link was revoked. Null if active."

    created_at:
      type: integer
      note: "Unix timestamp (seconds) when the short link was created."

    updated_at:
      type: integer
      note: "Unix timestamp (seconds) when the short link was last updated."
