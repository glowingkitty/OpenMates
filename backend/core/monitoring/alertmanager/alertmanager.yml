# Alertmanager configuration for OpenMates.
# Sends alert notifications by POSTing to an internal API webhook, which
# dispatches email via the existing Brevo/Mailjet infrastructure.
#
# No SMTP configuration is needed — delivery is handled by the API + Celery.
# Alertmanager still controls grouping, throttling, and inhibition.
#
# Architecture context: See docs/architecture/logging-and-monitoring.md

global:
  # How long to wait before sending a notification about new alerts
  # that are added to a group of alerts for which an initial notification
  # has already been sent. (Default: 5m)
  group_wait: 60s

  # How long to wait before sending a notification about new alerts
  # within a group. After the first notification, subsequent ones are
  # throttled by this interval.
  group_interval: 10m

  # How long to wait before re-sending a notification that has already
  # been sent successfully. Prevents the same alert from flooding email.
  repeat_interval: 4h

# Route tree — controls how alerts are grouped and which receiver handles them
route:
  # Group alerts by alertname + severity so each email covers one issue type
  group_by: ["alertname", "severity"]
  receiver: "api-webhook"

  routes:
    # Critical alerts: shorter wait, still throttled
    - match:
        severity: critical
      receiver: "api-webhook"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    # Warning alerts: longer throttling to avoid noise
    - match:
        severity: warning
      receiver: "api-webhook"
      group_wait: 120s
      group_interval: 30m
      repeat_interval: 12h

# Inhibition rules — suppress lower-severity alerts when critical is firing
# for the same alertname (avoids duplicate noise)
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

receivers:
  - name: "api-webhook"
    webhook_configs:
      - url: "http://api:8000/internal/alerts/webhook"
        send_resolved: true
        # The internal service token secures this endpoint
        http_config:
          headers:
            X-Internal-Service-Token: "${INTERNAL_API_SHARED_TOKEN}"
