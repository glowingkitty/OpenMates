server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# OpenObserve exposes a Loki-compatible push API — Promtail connects to it directly.
# Stream name "default" corresponds to the OpenObserve default organization/stream.
clients:
  - url: http://openobserve:5080/api/default/loki/api/v1/push
    basic_auth:
      username: "${OPENOBSERVE_ROOT_EMAIL}"
      password: "${OPENOBSERVE_ROOT_PASSWORD}"

scrape_configs:
  # API application logs (from file)
  - job_name: api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api-logs
          __path__: /var/log/api/api.log
    pipeline_stages:
      # 1. Access environment variable
      - template:
          source: server_env
          template: '{{ env "SERVER_ENVIRONMENT" | default "development" }}'

      # 2. Parse JSON log lines
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            name: name
            event_type: event_type
            status: status

      # 3. Set labels from extracted JSON fields
      - labels:
          level:
          name:
          event_type:
          status:

      # 4. Drop DEBUG logs in production
      - match:
          selector: '{server_env="production", level=~"(?i)debug"}'
          action: drop

  # Compliance logs config (from file)
  - job_name: compliance-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: compliance-logs
          __path__: /var/log/api/compliance.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            event_type: event_type
            user_id: user_id
            status: status
      - labels:
          event_type:
          user_id:
          status:

  # Docker container logs (stdout/stderr)
  - job_name: container-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "compose_project"

    pipeline_stages:
      # 1. Access environment variable
      - template:
          source: server_env
          template: '{{ env "SERVER_ENVIRONMENT" | default "development" }}'

      # 2. Try parsing as JSON
      - json:
          expressions:
            json_level: level
          ignore_parse_errors: true

      # 3. Try parsing Directus format: [14:21:11] GET /users/me 200 9ms
      - regex:
          expression: '^\[(?P<directus_time>\d{2}:\d{2}:\d{2})\]\s+(?P<directus_method>\w+)\s+(?P<directus_path>[^\s]+)\s+(?P<directus_status>\d+)\s+(?P<directus_duration>[\d.]+ms)'

      # 4. Convert Directus logs to JSON format for consistency
      - template:
          source: output
          template: |
            {{- if .directus_time -}}
            {"timestamp":"{{ .directus_time }}","name":"directus","level":"INFO","message":"{{ .directus_method }} {{ .directus_path }} {{ .directus_status }} {{ .directus_duration }}"}
            {{- else -}}
            {{ .output }}
            {{- end -}}

      # 5. Re-parse as JSON
      - json:
          expressions:
            json_level: level
            json_timestamp: timestamp
            json_name: name
            json_message: message
          ignore_parse_errors: true

      # 6. Try parsing plain text format
      - regex:
          expression: '^\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2},\d{3}\s+\[(?P<plain_level>\w+)\]'

      # 7. Determine the actual log level
      - template:
          source: log_level
          template: "{{ if .json_level }}{{ .json_level }}{{ else if .plain_level }}{{ .plain_level }}{{ else }}INFO{{ end }}"

      # 8. Set the final 'level' label
      - labels:
          level: log_level

      # 9. Drop DEBUG logs in production
      - match:
          selector: '{server_env="production", log_level=~"(?i)debug"}'
          action: drop
