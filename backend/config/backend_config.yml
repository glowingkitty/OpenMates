# backend/config/backend_config.yml
# Main configuration for the OpenMates backend API.

# Apps, skills, embeds, focus modes, memories, and platform sections are enabled
# by default unless their metadata declares default_enabled: false or an admin
# override below changes the effective state. Changes require a server restart.
#
# Feature ID formats:
#   app:<app_id>
#   skill:<app_id>:<skill_id>
#   embed:<app_id>:<embed_id>
#   focus:<app_id>:<focus_id>
#   memory:<app_id>:<memory_id>
#   platform:<feature_id>
#
# Admin overrides. `enabled` is only needed to opt into features that ship with
# default_enabled: false. `disabled` can disable default-on features.
feature_overrides:
  enabled: []
  disabled:
    # Empty / no implemented skills declared
    - "app:3d"
    - "app:politics"
    # Placeholder app folders without implemented runtime behavior yet
    - "app:fitness"
    - "app:life_coaching"
    - "app:plants"

# Other backend-wide configurations can be added below.
# For example:
# global_settings:
#   default_language: "en"
#   max_request_size: "10mb"

# Logging configuration (can be overridden by environment variables)
logging:
  level: "INFO" # Default logging level (e.g., DEBUG, INFO, WARNING, ERROR, CRITICAL)
  format: "json"  # Logging format (e.g., "json", "text") - handled by setup_logging.py

# Feature flags
feature_flags:
  new_dashboard_feature: true
  experimental_analytics: false
