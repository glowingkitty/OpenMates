[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    integration: marks tests as integration tests (require external services)
    slow: marks tests as slow running
    vault: marks tests that require Vault instance
    benchmark: marks expensive model comparison / inference benchmarks (excluded from daily CI)
    provider_contract: marks reverse-engineered API contract probe tests (run inside app-ai-worker via scripts/run_provider_contracts.py, never in GHA)
    asyncio: marks async tests (registered by pytest-asyncio but needed for --strict-markers)
asyncio_mode = auto