# backend/shared/config/blocked_content_keywords.yml
#
# Canonical keyword blocklist for the Daily Inspiration content policy.
# Used at every filtering layer: topic suggestions, video titles/channels,
# LLM-generated tags, and the scheduled pool audit.
#
# Matching: word-boundary regex (\b...\b) for short keywords (<=5 chars),
# substring match for multi-word phrases. All case-insensitive.
#
# Rules for editing:
# - One keyword per line, lowercase
# - Short words (e.g. "god") MUST use word-boundary matching to avoid
#   false positives (e.g. "godfather" should not match "god")
# - Multi-word phrases use substring matching (safe by nature)
# - Keep entries alphabetically sorted within each category
# - Add a comment when a keyword was added due to a specific incident

# ── Religious promotion / proselytization ────────────────────────────────────
# Blocks content that promotes, proselytizes, or advocates for a religion.
# Does NOT block academic study of religion (history, architecture, philosophy)
# — that distinction is handled by the LLM validator layer.
