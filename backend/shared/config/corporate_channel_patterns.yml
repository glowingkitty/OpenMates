# backend/shared/config/corporate_channel_patterns.yml
#
# Seed blocklist of obvious corporate YouTube channel name patterns.
# Used as a fast-path filter in the Daily Inspiration video pipeline to
# immediately reject channels owned by companies, brands, or corporations
# without needing an LLM call.
#
# Design principle: Inspirations come from independent humans — educators,
# journalists, documentary makers, universities — never from corporate PR
# channels. This blocklist catches the most obvious cases; the LLM-based
# channel classification step catches the rest.
#
# Matching is: case-insensitive substring match against the channel name.
# A channel is blocked if its name contains ANY of the listed patterns.
#
# Rules for adding entries:
# - Only include company/brand names, not topics or content types
# - Keep patterns short enough to catch variations (e.g. "BMW" catches
#   "BMW Official", "BMW Deutschland", "BMW Group", etc.)
# - Do NOT add individual creators, educational channels, or universities
# - Add entries alphabetically within each category

# Automotive manufacturers and their subsidiaries
automotive:
