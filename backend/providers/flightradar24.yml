# backend/providers/flightradar24.yml
#
# Configuration for Flightradar24 flight tracking provider.
# Used by the Travel app for live flight lookup and tracking metadata.

provider_id: "flightradar24"
name: "Flightradar24"
description: "Live flight tracking platform for real-time aircraft, route, and flight status information. Privacy URL verified 2026-06-03."
logo_svg: "icons/flightradar24.svg"
region: "EU"
privacy_policy: "https://www.flightradar24.com/privacy-policy"

required_keys:
  - env_key: "SECRET__FLIGHTRADAR24__API_KEY"
    vault_path: "kv/data/providers/flightradar24"
    vault_key: "api_key"
    description: "Flightradar24 bearer token used by the Travel flight tracking provider."

pricing:
  per_request_credits: 5
