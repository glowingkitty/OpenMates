# backend/providers/bfl.yml
#
# Configuration for Black Forest Labs (BFL) AI services (creators of FLUX).

provider_id: "bfl"
name: "Black Forest Labs"
description: "High-performance image generation models including FLUX.2."
logo_svg: "icons/blackforestlabs.svg"

models:
  - id: "flux-2-klein"
    name: "FLUX.2 [klein] 9B"
    description: "FLUX.2 [klein] 9B Base from Black Forest Labs. Enhanced realism, crisper text generation, and native editing capabilities."
    country_origin: "US" # ISO 3166-1 alpha-2 country code for model origin
    for_app_skill: "images.generate_draft" # This model is for draft image generation (fast, text-to-image only)
    release_date: "2025-01-01" # Model release date (FLUX.2 [klein] release)
    input_types:
      - text
    output_types:
      - image
    default_server: "fal"
    servers:
      - id: "fal"
        name: "fal.ai"
        model_id: "fal-ai/flux-2/klein/9b/base"
        region: "US" # Server region for UI display
      # - id: "bfl"
      #   name: "BFL API"
    pricing:
      per_unit:
        credits: 15
        unit_name: "image"
    costs:
      # fal.ai charges $0.011/MP output. A 1024×1024 image is 1MP → $0.011/image.
      # At 3× markup: $0.033 → 33 credits, rounded up to 15 credits (our rate includes some subsidy).
      output_per_megapixel:
        price: 0.011
        currency: USD

  - id: "flux-2-klein-edit"
    name: "FLUX.2 [klein] 4B Edit"
    description: "FLUX.2 [klein] 4B Base image-to-image editing model. Accepts 1-4 reference images alongside a text prompt for style transfer, composition editing, or reference-guided generation."
    country_origin: "US"
    for_app_skill: "images.generate_draft" # Used when reference images are provided with generate_draft skill
    release_date: "2025-01-01"
    input_types:
      - text
      - image
    output_types:
      - image
    default_server: "fal"
    servers:
      - id: "fal"
        name: "fal.ai"
        model_id: "fal-ai/flux-2/klein/4b/base/edit"
        region: "US"
    pricing:
      per_unit:
        credits: 27
        unit_name: "image"
    costs:
      # fal.ai charges $0.009/MP for BOTH input and output on the edit endpoint.
      # Typical call: 1MP output + 1MP input (each reference image is resized to 1MP) = $0.018/image.
      # At 3× markup: $0.054 → 54 credits. We charge 27 credits as a user-friendly price
      # (approximately 1.5× markup on this model, balancing affordability with cost coverage).
      output_per_megapixel:
        price: 0.009
        currency: USD
      input_per_megapixel:
        price: 0.009
        currency: USD

# Pricing Formula:
# 1. Your price to user = your_cost_per_unit * markup
# 2. Credits per unit = your_price_to_user / credit_value_usd (0.001)
# Simplified: credits_per_unit = your_cost_per_unit * 3000
