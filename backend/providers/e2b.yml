# backend/providers/e2b.yml
#
# Provider metadata for E2B code execution sandboxes.

provider_id: "e2b"
name: "E2B"
description: "Secure cloud sandboxes for running code and agent workflows."
logo_svg: "logos/e2b.svg"
region: "US"
privacy_policy: "https://e2b.dev/privacy"
required_keys:
  - env_key: "SECRET__E2B__API_KEY"
    vault_path: "kv/data/providers/e2b"
    vault_key: "api_key"
    description: "E2B API key for hosted code execution sandboxes."
    setup_url: "https://e2b.dev/dashboard"
    docs_url: "https://e2b.dev/docs"
