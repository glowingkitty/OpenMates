# backend/providers/immoscout24.yml
#
# Configuration for ImmoScout24 provider.
# Used by the Home app for searching apartments, houses, and rooms.

provider_id: "immoscout24"
name: "ImmoScout24"
description: "Germany's largest online real estate marketplace for apartments, houses, and rooms."
logo_svg: "icons/immoscout24.svg"
region: "EU" # ImmoScout24 HQ is in Berlin, Germany

# No API key required — uses web scraping
no_api_key: true

# Pricing information
pricing:
  per_request_credits: 10 # 10 credits per home search request (set in app.yml)
