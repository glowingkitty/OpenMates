# backend/providers/google.yml
#
# Configuration for Google AI services.

provider_id: "google"
name: "Google"
description: "AI models and services from Google."
logo_svg: "logos/google.svg" # Path for UI, relative to a common logos directory
privacy_policy: "https://privacy.google.com/"

models:
  - id: "gemini-3-flash-preview"
    name: "Gemini 3 Flash"
    description: "Fast Gemini 3 preview model (primary: Google AI Studio US; fallback: Google Vertex AI global)."
    country_origin: "US" # ISO 3166-1 alpha-2 country code for model origin
    for_app_skill: "ai.ask" # This model is for the AI ask skill (text generation)
    release_date: "2025-12-17" # Model release date (Gemini 3 Flash preview release)
    allow_auto_select: true
    external_ids: # Mapping to external leaderboard IDs for cross-referencing
      lmarena: "gemini-3-flash"
      openrouter: "google/gemini-3-flash-preview"
    reasoning: true
    input_types:
      - text
      - image
      - video
      - audio
    output_types:
      - text
    default_server: "google_ai_studio" # AI Studio preferred — known US location for user transparency
    servers:
      - id: "google_ai_studio"
        name: "Google AI Studio"
        model_id: "gemini-3-flash-preview"
        region: "US" # Server region for UI display
      - id: "google"
        name: "Google Vertex AI"
        model_id: "gemini-3-flash-preview" # Google Vertex AI uses the model ID as-is
        region: "global" # Preview models only available on global endpoint (not regional)
      # OpenRouter removed — Google models should only use Google's own infrastructure
      # (AI Studio + Vertex AI). If both fail, model fallback in main_processor handles it.
    pricing:
      tokens:
        input:
          per_credit_unit: 650
        output:
          per_credit_unit: 110
    costs:
      input_per_million_token:
        price: 0.50
        currency: USD
        max_context: 1000000
      output_per_million_token:
        price: 3.00
        currency: USD
        max_context: 1000000
    features:
      knowledge_cutoff: "2025-01"

  - id: "gemini-3.1-pro-preview" # Official model ID
    name: "Gemini 3.1 Pro"
    description: "Better thinking, improved token efficiency, and stronger factual grounding over Gemini 3 Pro. Optimized for software engineering and agentic workflows with precise tool usage."
    country_origin: "US" # ISO 3166-1 alpha-2 country code for model origin
    for_app_skill: "ai.ask" # This model is for the AI ask skill (text generation)
    release_date: "2026-02-19" # Model release date (Gemini 3.1 Pro preview release)
    allow_auto_select: true
    external_ids: # Mapping to external leaderboard IDs for cross-referencing
      openrouter: "google/gemini-3.1-pro-preview"
    reasoning: true
    input_types:
      - text
      - image
      - video
      - audio
    output_types:
      - text
    default_server: "google_ai_studio" # AI Studio preferred — known US location for user transparency
    servers:
      - id: "google_ai_studio"
        name: "Google AI Studio"
        model_id: "gemini-3.1-pro-preview"
        region: "US" # Server region for UI display
      - id: "google"
        name: "Google Vertex AI"
        model_id: "gemini-3.1-pro-preview" # Google Vertex AI uses the model ID as-is
        region: "global" # Preview models only available on global endpoint (not regional)
      # OpenRouter removed — Google models should only use Google's own infrastructure
      # (AI Studio + Vertex AI). If both fail, model fallback in main_processor handles it.
    pricing:
      tokens:
        input:
          per_credit_unit: 170 # 1 credit per 170 input tokens (for <=200K tokens: $2.00/M)
        output:
          per_credit_unit: 30 # 1 credit per 30 output tokens (for <=200K tokens: $12.00/M)
    costs:
      input_per_million_token:
        price: 2.00
        currency: USD
        max_context: 1048576 # 1M token context window
      output_per_million_token:
        price: 12.00
        currency: USD
        max_context: 1048576 # 1M token context window; output limit 65536 tokens
    features:
      knowledge_cutoff: "2025-01"
      # Note: For >200K tokens, pricing is $4.00/M input and $18.00/M output

  - id: "gemini-3.5-flash"
    name: "Gemini 3.5 Flash"
    description: "Stable Gemini 3.5 Flash model built for fast coding, agentic, and long-context tasks. Cheaper than Gemini 3.1 Pro but more expensive than Gemini 3 Flash."
    country_origin: "US" # ISO 3166-1 alpha-2 country code for model origin
    for_app_skill: "ai.ask" # This model is for the AI ask skill (text generation)
    release_date: "2026-05-19" # Model release date (Gemini 3.5 Flash GA release)
    allow_auto_select: true
    external_ids: # Mapping to external leaderboard IDs for cross-referencing
      lmarena: "gemini-3.5-flash"
      openrouter: "google/gemini-3.5-flash"
    reasoning: true
    input_types:
      - text
      - image
      - video
      - audio
    output_types:
      - text
    default_server: "google_ai_studio" # AI Studio preferred — known US location for user transparency
    servers:
      - id: "google_ai_studio"
        name: "Google AI Studio"
        model_id: "gemini-3.5-flash"
        region: "US" # Server region for UI display
      - id: "google"
        name: "Google Vertex AI"
        model_id: "gemini-3.5-flash" # Google Vertex AI uses the model ID as-is
        region: "global"
      # OpenRouter removed — Google models should only use Google's own infrastructure
      # (AI Studio + Vertex AI). If both fail, model fallback in main_processor handles it.
    pricing:
      tokens:
        input:
          per_credit_unit: 200
        output:
          per_credit_unit: 40
    costs:
      input_per_million_token:
        price: 1.50
        currency: USD
        max_context: 1048576
      output_per_million_token:
        price: 9.00
        currency: USD
        max_context: 1048576
    features:
      knowledge_cutoff: "2025-01"

  - id: "gemini-3-pro-image-preview"
    name: "Gemini 3 Pro"
    description: "High-end native image generation and editing from Google. Supports text-to-image and image-to-image editing with up to 14 reference images."
    country_origin: "US" # ISO 3166-1 alpha-2 country code for model origin
    for_app_skill: "images.generate" # This model is for image generation skill
    release_date: "2025-12-17" # Model release date (same as Gemini 3 Pro)
    allow_auto_select: false # Image model - not for text generation auto-selection
    external_ids: # Mapping to external leaderboard IDs for cross-referencing
      openrouter: "google/gemini-3-pro-image-preview"
    input_types:
      - text
      - image # Supports reference images for image editing/guided generation
    output_types:
      - image
    default_server: "google_ai_studio" # AI Studio preferred — known US location for user transparency
    servers:
      - id: "google_ai_studio"
        name: "Google AI Studio"
        model_id: "gemini-3-pro-image-preview"
        region: "US" # Server region for UI display
      - id: "google"
        name: "Google Vertex AI"
        model_id: "gemini-3-pro-image-preview"
        region: "global" # Preview models only available on global endpoint (not regional)
    pricing:
      per_unit:
        credits: 200
        unit_name: "image"
    costs:
      # Output (generated image): $0.134/image (1120 tokens × $120/M tokens for 1K/2K images)
      # Input image: $0.0011/image (560 tokens × $2.00/M input tokens) — negligible, not charged separately.
      # Adding reference images barely changes cost (<1% of output price), so we keep a flat 200 credits/image.
      output_per_image:
        price: 0.134
        currency: USD
      input_per_image:
        price: 0.0011
        currency: USD

  - id: "lyria-3-pro-preview"
    name: "Lyria 3 Pro"
    description: "Google's latest Lyria music generation model for longer, high-quality stereo tracks with vocal and lyric support in preview. OpenMates uses Vertex AI by default for Cloud data-governance controls."
    country_origin: "US"
    for_app_skill: "music.generate"
    release_date: "2026-04-07"
    allow_auto_select: false
    input_types:
      - text
    output_types:
      - audio
    default_server: "google"
    servers:
      - id: "google"
        name: "Google Vertex AI"
        model_id: "lyria-3-pro-preview"
        region: "global"
    pricing:
      per_unit:
        credits: 120
        unit_name: "song"
    costs:
      # Gemini Developer API pricing: $0.08 per song/request, verified 2026-05-22.
      output_per_song:
        price: 0.08
        currency: USD

  - id: "lyria-3-clip-preview"
    name: "Lyria 3 Clip"
    description: "Google Lyria 3 preview model for 30-second high-quality stereo music clips."
    country_origin: "US"
    for_app_skill: "music.generate"
    release_date: "2026-04-07"
    allow_auto_select: false
    input_types:
      - text
    output_types:
      - audio
    default_server: "google"
    servers:
      - id: "google"
        name: "Google Vertex AI"
        model_id: "lyria-3-clip-preview"
        region: "global"
    pricing:
      per_unit:
        credits: 60
        unit_name: "song"
    costs:
      # Gemini Developer API pricing: $0.04 per song/request, verified 2026-05-22.
      output_per_song:
        price: 0.04
        currency: USD

  - id: "lyria-002"
    name: "Lyria 2"
    description: "Documented Vertex AI Lyria predict model for 30-second instrumental WAV generation. Kept as an explicit fallback for Lyria 3 preview availability gaps."
    country_origin: "US"
    for_app_skill: "music.generate"
    release_date: "2025-01-01"
    allow_auto_select: false
    input_types:
      - text
    output_types:
      - audio
    default_server: "google"
    servers:
      - id: "google"
        name: "Google Vertex AI"
        model_id: "lyria-002"
        region: "us-central1"
    pricing:
      per_unit:
        credits: 60
        unit_name: "song"
    costs:
      output_per_song:
        price: 0.04
        currency: USD

  - id: "veo-3.1-generate-preview"
    name: "Veo 3.1"
    description: "Google's latest Veo 3.1 preview model for high-fidelity short video generation with native audio. OpenMates stores generated videos encrypted and serves REST downloads through short-lived decrypted links."
    country_origin: "US"
    for_app_skill: "videos.generate"
    release_date: "2026-01-01"
    allow_auto_select: false
    input_types:
      - text
    output_types:
      - video
      - audio
    default_server: "google_ai_studio"
    servers:
      - id: "google_ai_studio"
