# backend/providers/bluesky.yml
#
# Provider metadata for Bluesky public social posts.

provider_id: "bluesky"
name: "Bluesky"
description: "Public posts and profile feeds from the Bluesky social network."
logo_svg: "logos/bluesky.svg"
region: "US"
privacy_policy: "https://bsky.social/about/support/privacy-policy"
optional_keys:
  - env_key: "SECRET__BLUESKY__IDENTIFIER"
    vault_path: "kv/data/providers/bluesky"
    vault_key: "identifier"
    description: "Optional Bluesky identifier for authenticated app-password access."
    docs_url: "https://docs.bsky.app/docs/get-started"
  - env_key: "SECRET__BLUESKY__APP_PASSWORD"
    vault_path: "kv/data/providers/bluesky"
    vault_key: "app_password"
    description: "Optional Bluesky app password for authenticated access."
    docs_url: "https://docs.bsky.app/docs/get-started"
