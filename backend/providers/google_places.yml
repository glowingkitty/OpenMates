# backend/providers/google_places.yml
#
# Configuration for Google Places API (New) provider.
# Used by the Health app to enrich doctor appointment results with ratings,
# reviews, opening hours, phone, website, and editorial summaries.

provider_id: "google_places"
name: "Google Places"
description: "Google Places API for business ratings, reviews, opening hours, and contact details."
logo_svg: "logos/google.svg"
region: "US" # Google HQ; the API is global.

# API endpoint
api_base_url: "https://places.googleapis.com/v1"

# Environment Variables Required:
# - SECRET__GOOGLE_PLACES__API_KEY: Google Cloud API key with Places API (New) enabled.
#   Get an API key at: https://console.cloud.google.com/apis/credentials
#   Enable Places API (New) at:
#     https://console.cloud.google.com/apis/library/places.googleapis.com

# Pricing (as of April 2026, Places API (New)):
#   - Text Search Essentials: $32/1000, 10,000 free per month
#   - Text Search Pro:        $32/1000, 5,000 free per month
#   - Text Search Enterprise: $35/1000, 1,000 free per month
#
# We request the Enterprise field mask (rating, reviews, opening hours, etc.)
# which bills every call at the Enterprise rate. Cost is embedded in the
# health/search_appointments skill pricing (250 credits per search, covering up
# to 6 doctor lookups = 6 × $0.035 = $0.21 plus scraper infra).
#
# This provider is NOT charged directly — it is a dependency of the health
# app's search_appointments skill. We surface it here so provider_info lookups
# and admin dashboards can find it.

# No direct user-facing pricing (billed at skill level).
pricing:
  per_request_credits: 0
