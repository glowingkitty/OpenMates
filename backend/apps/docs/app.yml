# Docs App Configuration
# Handles document generation and management (Word/Google Docs-like documents)
# Documents are created via docx_model fenced code blocks in the AI response stream

# App metadata
app_id: docs
name_translation_key: docs
description_translation_key: docs.description
icon_image: |
  docs.svg
category: productivity
stage: production

# Legacy embed descriptions (kept for documentation)
embeds:
  - id: doc_embed
    description_embed: Rich document preview with formatted HTML content (reports, articles, letters, etc.)
# Embed type definitions — single source of truth for frontend embed routing.
embed_types:
  # Document — direct-type, auto-detected from ```docx_model``` blocks by stream_consumer.py
  - id: doc
    category: direct
    frontend_type: docs-doc
    backend_type: document
    has_children: false
    groupable: true
    preview_component: docs/DocsEmbedPreview.svelte
    fullscreen_component: docs/DocsEmbedFullscreen.svelte
    icon: docs
    gradient_var: "--color-app-docs"
    i18n_namespace: embeds.docs.doc
    content_fields:
      - name: docx_model
        type: object
        required: true
      - name: title
        type: string
      - name: word_count
        type: number
        required: true

# Instructions injected into the AI system prompt when this app is available
# These are loaded dynamically by the main processor based on app discovery
instructions:
  - instruction: |
      **Document Generation (Docs App)**
      When the user asks you to create, write, or generate a document, report, article, blog post,
      essay, cover letter, proposal, memo, guide, or any substantial formatted content:
      - Use the ```docx_model code fence to produce a structured JSON document model
      - Include top-level title, filename, and blocks fields
      - The filename must be a short, descriptive .docx name using underscores (e.g., "Rental_Agreement.docx")
      - Supported block types: heading, paragraph, list, table, blockquote, page_break
      - For images, use an image block with the exact existing embed_ref; do not expose S3 keys or AES data
      - Paragraphs may use runs with text, bold, italic, underline, and #RRGGBB color
      - The document will be generated as a real .docx artifact with browser preview pages

# Skills (planned for future implementation)
skills: []

# Focuses (planned for future implementation)
focus_modes: []

# Memories for document generation preferences
settings_and_memories:
  - id: writing_style
    name_translation_key: docs.writing_style
    description_translation_key: docs.writing_style.description
    icon_image: text.svg
    type: list
    stage: production
    example_translation_keys:
      - "docs.writing_style.example_1"
      - "docs.writing_style.example_2"
      - "docs.writing_style.example_3"
    example_entries:
      - name: "docs.writing_style.example_1.name"
        description: "docs.writing_style.example_1.description"
      - name: "docs.writing_style.example_2.name"
        description: "docs.writing_style.example_2.description"
    schema:
      type: object
      properties:
        name:
          type: string
          description: Style name (e.g., Formal Business, Academic, Casual Blog)
          is_title: true
        description:
          type: string
          description: Description of this writing style and when to use it
          is_subtitle: true
          multiline: true
      required:
        - name
