# Nutrition app — recipe search and meal planning
#
# Searches REWE Online for recipes matching dietary and category filters.
# Uses the free REWE recipe filter API for discovery and Firecrawl for
# structured data extraction from recipe detail pages (Cloudflare-protected).
# Results are cached in Directus (persistent) + Dragonfly (hot cache, 30-day TTL).
#
# Provider: REWE (rewe.de/rezepte/)
# Data source: ~10,000 German-language recipes with ingredients, instructions,
#              nutrition info, ratings, dietary tags, and health scores.

name_translation_key: nutrition
description_translation_key: nutrition.description
icon_image: |
  nutrition.svg
category: personal
last_updated: '2026-04-05'
settings_and_memories:
  - id: |
      saved_recipes
    stage: planning
  - id: |
      meal_plan
    stage: planning
embed_types:
  - id: search_recipes
    category: app-skill-use
    skill_id: search_recipes
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: true
    child_type: recipe
    child_frontend_type: nutrition-recipe
    groupable: false
    icon: nutrition
    gradient_var: "--color-app-nutrition"
    i18n_namespace: embeds.nutrition.search_recipes
skills:
  # -----------------------------------------------------------------------
  # Search Recipes — search REWE online for recipes by category filters
  # -----------------------------------------------------------------------
  - id: search_recipes
    name_translation_key: app_skills.nutrition.search_recipes
    description_translation_key: app_skills.nutrition.search_recipes.description
    icon_image: nutrition.svg
    preprocessor_hint: >
      Search REWE Online for recipes by dietary and category filters.
      Returns full recipe details: ingredients, instructions, nutrition, ratings.
      Costs 50 credits per search. Supports filters like vegetarisch, vegan,
      pasta, glutenfrei, low-carb, einfach, hauptspeise, and 30+ more tags.
      Best for: recipe recommendations, meal planning, dietary filtering.
    stage: production
    class_path: backend.apps.nutrition.skills.search_recipes.SearchRecipesSkill
    pricing:
      per_unit:
        credits: 50
    providers:
      - name: REWE
        no_api_key: true
      - Firecrawl
    exclude_fields_for_llm:
      - type
      - uid
      - image_url
      - search_rank
      - from_cache
    suggestions_follow_up_requests:
      - Show me only vegetarian options
      - Find a quicker recipe under 30 minutes
      - What are the ingredients for the first recipe?
      - Find a similar recipe that is gluten-free
      - Show recipes with fewer calories
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of recipe search requests. Each request searches for
            recipes matching dietary and category filters on REWE Online.
          items:
            type: object
            properties:
              filters:
                type: array
                description: >
                  List of filter tags to narrow recipes. Combine multiple tags
                  to refine results. Available filters by category:
                  Diet: fleisch, fisch, vegetarisch, vegan.
                  Main ingredient: nudeln/pasta, kartoffeln, reis, gemuese, kuerbis.
                  Effort level: einfach (easy), mittel (medium), schwer (hard).
                  Meal type: vorspeise, hauptspeise, dessert, beilagen, fruehstueck,
                  suppen, auflauf, snacks, getraenke.
                  Dietary form: laktosefrei, low-carb, glutenfrei, paleo, wenig-zucker, clean-eating.
                  Baking: kuchen, torten, brot, muffins, cupcakes, plaetzchen.
                  Occasions: fruehling, grillen, picknick, kindergerichte, geburtstag, guenstig, party.
                items:
                  type: string
              max_results:
                type: integer
                description: >
                  Maximum number of recipes to return with full details (1-10, default 5).
                  Each result includes ingredients, instructions, nutrition, and ratings.
                default: 6
              page:
                type: integer
                description: >
                  Page number for pagination (default 1). Each page contains up to 36 recipes
                  from the REWE database of ~10,000 recipes.
                default: 1
            required:
              - filters
      required:
        - requests
