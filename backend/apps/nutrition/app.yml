# Nutrition app — recipe search and meal planning
#
# Searches Edamam Recipe Search v2 for recipes matching free-text queries and
# optional nutrition filters. Results include ingredients, step-by-step
# instructions, images, source links, and nutrition metadata when available.
#
# Provider: Edamam Recipe Search API
# Data source: Web recipes with explicit instructionLines requested and recipes
#              without instructions filtered out before returning results.

name_translation_key: nutrition
description_translation_key: nutrition.description
icon_image: |
  nutrition.svg
category: personal
last_updated: '2026-04-05'
settings_and_memories:
  - id: saved_recipes
    name_translation_key: nutrition.saved_recipes
    description_translation_key: nutrition.saved_recipes.description
    icon_image: bookmark.svg
    type: list
  - id: meal_plan
    name_translation_key: nutrition.meal_plan
    description_translation_key: nutrition.meal_plan.description
    icon_image: calendar.svg
    type: list
embed_types:
  - id: search_recipes
    category: app-skill-use
    skill_id: search_recipes
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: true
    child_type: recipe
    child_frontend_type: nutrition-recipe
    groupable: false
    preview_component: nutrition/NutritionSearchEmbedPreview.svelte
    fullscreen_component: nutrition/NutritionSearchEmbedFullscreen.svelte
    child_preview_component: nutrition/NutritionRecipeEmbedPreview.svelte
    child_fullscreen_component: nutrition/NutritionRecipeEmbedFullscreen.svelte
    icon: nutrition
    gradient_var: "--color-app-nutrition"
    i18n_namespace: embeds.nutrition.search_recipes
skills:
  # -----------------------------------------------------------------------
  # Search Recipes — search Edamam recipes by query and nutrition filters
  # -----------------------------------------------------------------------
  - id: search_recipes
    name_translation_key: app_skills.nutrition.search_recipes
    description_translation_key: app_skills.nutrition.search_recipes.description
    icon_image: search.svg
    preprocessor_hint: >
      Search Edamam for recipes by natural-language query and nutrition filters.
      Returns recipe details with ingredients, step-by-step instructions, images,
      source links, and nutrition metadata. Recipes without instructions are
      filtered out. Best for: recipe recommendations, meal planning, dietary
      filtering, and cooking guidance.
    class_path: backend.apps.nutrition.skills.search_recipes.SearchRecipesSkill
    pricing:
      per_unit:
        credits: 5
    providers:
      - name: Edamam
        requires_api_key: true
    exclude_fields_for_llm:
      - type
      - uid
      - image_url
      - search_rank
      - share_url
    suggestions_follow_up_requests:
      - Show me only vegetarian options
      - Find a quicker recipe under 30 minutes
      - What are the ingredients for the first recipe?
      - Find a similar recipe that is gluten-free
      - Show recipes with fewer calories
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of recipe search requests. Each request searches for
            recipes matching a free-text query and optional Edamam filters.
          items:
            type: object
            properties:
              query:
                type: string
                description: >
                  Free-text recipe query, e.g. "quick vegan pasta",
                  "gluten-free pancakes", or "miso salmon".
              health:
                type: array
                description: >
                  Optional Edamam health labels such as vegan, vegetarian,
                  gluten-free, dairy-free, keto-friendly, peanut-free, tree-nut-free.
                items:
                  type: string
              diet:
                type: array
                description: >
                  Optional Edamam diet labels such as balanced, high-fiber,
                  high-protein, low-carb, low-fat, low-sodium.
                items:
                  type: string
              time:
                type: string
                description: Optional cooking/prep time range, e.g. "1-30".
              calories:
                type: string
                description: Optional calories range, e.g. "100-600".
              cuisine_type:
                type: array
                description: Optional cuisine filters such as Italian, Japanese, Mexican.
                items:
                  type: string
              meal_type:
                type: array
                description: Optional meal filters such as Breakfast, Dinner, Lunch, Snack.
                items:
                  type: string
              dish_type:
                type: array
                description: Optional dish filters such as Main course, Soup, Salad, Pancake.
                items:
                  type: string
              excluded:
                type: array
                description: Optional ingredients or terms to exclude from recipes.
                items:
                  type: string
              ingredients:
                type: string
                description: Optional ingredient-count range, e.g. "5-10".
              max_results:
                type: integer
                description: >
                  Maximum number of recipes to return with full details (1-10, default 6).
                  Each returned result includes ingredients, step-by-step instructions,
                  image data, source attribution, and nutrition metadata.
                default: 6
            required:
              - query
      required:
        - requests

marketing_discovery:
  skills:
    search_recipes:
      enabled: true
      keywords:
        - find recipes with AI
        - meal ideas search
        - nutrition recipe assistant
      pain_points:
        - recipe search is ad-heavy and fragmented
      demo_angles:
        - show recipe search results
