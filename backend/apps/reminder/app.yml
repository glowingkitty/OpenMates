    category: app-skill-use
    skill_id: set-reminder
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: false
    preview_component: reminder/ReminderEmbedPreview.svelte
    fullscreen_component: reminder/ReminderEmbedFullscreen.svelte
