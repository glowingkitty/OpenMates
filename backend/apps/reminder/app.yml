    gradient_var: "--color-app-reminder"
    i18n_namespace: embeds.reminder.set_reminder
instructions:
  - instruction: |
      **Reminder Skills**
      - **set-reminder**: Schedule a reminder for a specific time or random time within a date/time range.
        The reminder can either create a new chat or send a follow-up in the current chat.
        Supports one-time and repeating reminders (daily, weekly, monthly, custom interval).
        
        When setting reminders:
        - For specific times, use ISO 8601 datetime format
        - For random times, specify a date range and optional daily time window
        - Use the user's timezone from the system prompt by default. Only ask if not available or if the user explicitly mentions a different timezone.
        - Ask the user if they want a new chat or follow-up in current chat
        - Choose response_type carefully — it controls what happens when the reminder fires:

          Use "simple" (default) when the user wants a **passive notification**:
            e.g. "remind me about this chat", "check this tomorrow", "ping me at 3pm",
                 "don't forget about X", "remind me to look at this later".
            → No AI response is generated. A notification, email, and a visual marker
              in the chat history appear. Nothing else. Use this for the vast majority
              of reminders — when the user just wants to be nudged back.

          Use "full" ONLY when the user explicitly wants the **AI to execute a task**
          at that scheduled time:
            e.g. "search the news every morning and summarize",
                 "remind me and give me the latest updates on X",
                 "every Monday, pull the week's top headlines and brief me".
            → The AI wakes up and runs the task when the reminder fires.

          Rule: if the user says "remind me about this chat" → always "simple" +
          target_type="existing_chat". When in doubt, use "simple".

        If the user doesn't have email notifications configured, recommend they set it up
        to ensure they receive reminder notifications even when not actively using the app.

skills:
  - id: set-reminder
    name_translation_key: reminder.set_reminder
    description_translation_key: reminder.set_reminder.description
    icon_image: reminder.svg
    preprocessor_hint: >
      Schedule, create, or set up reminders for the user. Handles one-time and recurring reminders (e.g., "every morning", "daily at 9am", "weekly", "monthly"). Use when user wants to be reminded, notified, or alerted about something at a specific time or on a recurring schedule. Also use for automating tasks like "get news every day" or "summarize updates weekly".
    stage: production
    providers:
      - name: OpenMates
        no_api_key: true
    class_path: backend.apps.reminder.skills.set_reminder_skill.SetReminderSkill
    tool_schema:
      type: object
      properties:
        prompt:
          type: string
          description: The reminder message/prompt that will be shown when the reminder fires

        trigger_type:
          type: string
          enum:
            - specific
            - random
          description: "'specific' for exact datetime, 'random' for random time within a window"

        trigger_datetime:
          type: string
          description: "ISO 8601 datetime for specific trigger (e.g., '2026-02-05T14:30:00'). Required if trigger_type is 'specific'."

        random_start_date:
          type: string
          description: "Start date for random window (YYYY-MM-DD). Required if trigger_type is 'random'."

        random_end_date:
          type: string
          description: "End date for random window (YYYY-MM-DD). Required if trigger_type is 'random'."

        random_time_start:
          type: string
          description: "Earliest time of day for random trigger (HH:MM, 24h format, e.g., '10:00'). Optional for random triggers."

        random_time_end:
          type: string
          description: "Latest time of day for random trigger (HH:MM, 24h format, e.g., '14:00'). Optional for random triggers."

        timezone:
          type: string
          description: "User's timezone (e.g., 'Europe/Berlin', 'America/New_York'). Required."

        target_type:
          type: string
          enum:
            - new_chat
            - existing_chat
          default: new_chat
          description: "'new_chat' creates a new chat when reminder fires, 'existing_chat' sends follow-up in current chat"

        new_chat_title:
          type: string
          description: "Title for the new chat. Required if target_type is 'new_chat'."

        response_type:
          type: string
          enum:
            - simple
            - full
          default: simple
          description: "'simple' = notification-only: no AI response is generated, just a notification, email, and a visual marker in the chat history. Use for passive nudges ('remind me about this', 'ping me tomorrow'). 'full' = action trigger: the AI executes a task when the reminder fires. Use ONLY when the user wants the AI to actively do something ('summarize the news every morning', 'give me an update on X'). Default is 'simple'."

        repeat:
          type: object
          description: "Configuration for repeating reminders. Omit for one-time reminders."
          properties:
            type:
              type: string
              enum:
                - daily
                - weekly
                - monthly
                - custom
              description: "Type of repeat schedule"
            interval:
              type: integer
              minimum: 1
              description: "For custom type: repeat every N units"
            interval_unit:
              type: string
              enum:
                - days
                - weeks
                - months
              description: "For custom type: unit of the interval"
            day_of_week:
              type: integer
              minimum: 0
              maximum: 6
              description: "For weekly type: 0=Monday, 6=Sunday"
            day_of_month:
              type: integer
              minimum: 1
              maximum: 31
              description: "For monthly type: day of the month (1-31)"
            end_date:
              type: string
              description: "Optional: stop repeating after this date (YYYY-MM-DD)"
            max_occurrences:
              type: integer
              minimum: 1
              description: "Optional: maximum number of times to fire"
          required:
            - type

      required:
        - prompt
        - trigger_type
        - timezone

  - id: list-reminders
    name_translation_key: reminder.list_reminders
    description_translation_key: reminder.list_reminders.description
    icon_image: task.svg
    preprocessor_hint: >
      Show the user's existing scheduled reminders.
    stage: production
    providers:
      - name: OpenMates
        no_api_key: true
    class_path: backend.apps.reminder.skills.list_reminders_skill.ListRemindersSkill
    tool_schema:
      type: object
      properties:
        status:
          type: string
          enum:
            - pending
            - all
          default: pending
          description: "Filter reminders by status. 'pending' shows only upcoming reminders."

  - id: cancel-reminder
    name_translation_key: reminder.cancel_reminder
    description_translation_key: reminder.cancel_reminder.description
    icon_image: delete.svg
    preprocessor_hint: >
      Cancel or delete an existing reminder.
    stage: production
    providers:
      - name: OpenMates
        no_api_key: true
    class_path: backend.apps.reminder.skills.cancel_reminder_skill.CancelReminderSkill
    tool_schema:
      type: object
      properties:
        reminder_id:
          type: string
          description: "ID of the reminder to cancel"
      required:
        - reminder_id
