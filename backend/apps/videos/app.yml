    category: app-skill-use
    skill_id: search
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: true
    child_type: video
    child_frontend_type: videos-video
    groupable: true
    preview_component: videos/VideosSearchEmbedPreview.svelte
    fullscreen_component: videos/VideosSearchEmbedFullscreen.svelte
    child_preview_component: videos/VideoEmbedPreview.svelte
    child_fullscreen_component: videos/VideoEmbedFullscreen.svelte
    icon: search
    gradient_var: "--color-app-videos"
    i18n_namespace: embeds.videos.search
  - id: get_transcript
    category: app-skill-use
    skill_id: get_transcript
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: false
    preview_component: videos/VideoTranscriptEmbedPreview.svelte
    fullscreen_component: videos/VideoTranscriptEmbedFullscreen.svelte
    icon: transcript
    gradient_var: "--color-app-videos"
    i18n_namespace: embeds.videos.get_transcript
  - id: generate
    category: app-skill-use
    skill_id: generate
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: false
    preview_component: videos/VideoGenerateEmbedPreview.svelte
    fullscreen_component: videos/VideoGenerateEmbedFullscreen.svelte
    icon: videos
    gradient_var: "--color-app-videos"
    i18n_namespace: embeds.videos.generate
  - id: create
    category: app-skill-use
    skill_id: create
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: false
    preview_component: videos/VideoCreateEmbedPreview.svelte
    fullscreen_component: videos/VideoCreateEmbedFullscreen.svelte
    icon: videos
    gradient_var: "--color-app-videos"
    i18n_namespace: embeds.videos.create
settings_and_memories:
  - id: to_watch_list
    name_translation_key: videos.to_watch_list
    description_translation_key: videos.to_watch_list.description
    icon_image: task.svg
    type: list
    stage: production
    example_translation_keys:
      - "videos.to_watch_list.example_1"
      - "videos.to_watch_list.example_2"
      - "videos.to_watch_list.example_3"
    example_entries:
      - name: "videos.to_watch_list.example_1.name"
        url: "https://youtube.com/watch?v=example1"
        channel: "Computerphile"
      - name: "videos.to_watch_list.example_2.name"
        url: "https://youtube.com/watch?v=example2"
        channel: "Matt Pocock"
    schema:
      type: object
      properties:
        name:
          type: string
          description: Video name or title (user-defined, can be auto-generated later)
          is_title: true
        url:
          type: string
          description: Video URL
        channel:
          type: string
          description: Channel name (can be auto-filled later)
      required:
        - name
        - url
  - id: subscribed_channels
    name_translation_key: videos.subscribed_channels
    description_translation_key: videos.subscribed_channels.description
    type: list
    stage: planning
    example_translation_keys:
      - "videos.subscribed_channels.example_1"
      - "videos.subscribed_channels.example_2"
      - "videos.subscribed_channels.example_3"
    schema:
      type: object
      properties:
        name:
          type: string
          description: Channel name
        url:
          type: string
          description: YouTube Channel URL
        subscribed_date:
          type: integer
          description: Unix timestamp when subscribed
        category:
          type: string
          description: Content category (e.g., tech, music, education)
      required:
        - url
focuses:
  - id: analyze_video
    name_translation_key: videos.analyze_video
    description_translation_key: videos.analyze_video.description
    process_translation_key: focus_modes.videos_analyze_video.process
    systemprompt_translation_key: focus_modes.videos_analyze_video.systemprompt
    icon_image: videos.svg
    stage: production
    preprocessor_hint: >
      Select when the user shares a YouTube video URL and asks to analyze,
      summarize, fact-check, assess credibility, detect bias, or verify claims made
      in the video. Do not select for general video search, video generation, or
      broad web research that is not centered on a specific video.
skills:
  - id: generate
    name_translation_key: app_skills.videos.generate
    description_translation_key: app_skills.videos.generate.description
    icon_image: ai.svg
    api_config:
      expose_get: true
      expose_post: true
    preprocessor_hint: >
      Generate short photorealistic or generative footage from text prompts using
      Google Veo. Use this when the user asks for cinematic footage, realistic
      scenes, camera movement, stylized animation, or non-deterministic video
      generation.
      Do not use this for exact text slides, product announcements, diagrams,
      charts, UI-like motion graphics, or branded videos where exact text and
      layout matter; those requests should use videos.create with an explicit
      ```remotion:Name.tsx fence instead.
      Do not use this for fake real-world footage, fake endorsements, public-figure
      likeness/persona/voice imitation, scams, spam, or watermark/detection evasion.
    stage: production
    class_path: backend.apps.videos.skills.generate_skill.GenerateSkill
    providers:
      - Google
    full_model_reference: google/veo-3.1-generate-preview
    pricing:
      per_second: 600
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: REQUIRED array of video generation request objects.
          items:
            type: object
            properties:
              prompt:
                type: string
                description: Detailed text description of the video to generate.
              aspect_ratio:
                type: string
                enum: ["16:9", "9:16"]
                default: "16:9"
              duration_seconds:
                type: integer
                enum: [4, 6, 8]
                default: 8
              resolution:
                type: string
                enum: ["720p", "1080p", "4k"]
                default: "720p"
              seed:
                type: integer
                description: Optional seed for more reproducible output when supported.
              model:
                type: string
                enum: ["veo-3.1-generate-preview", "veo-3.1-fast-generate-preview", "veo-3.0-generate-001"]
                default: "veo-3.1-generate-preview"
            required:
              - prompt
      required:
        - requests
    exclude_fields_for_llm:
      - s3_base_url
      - files
      - aes_key
      - aes_nonce
      - vault_wrapped_aes_key
  - id: create
    name_translation_key: app_skills.videos.create
    description_translation_key: app_skills.videos.create.description
    icon_image: videos.svg
    preprocessor_hint: >
      Create deterministic code-backed videos with Remotion. Use this for text
      slides, product announcements, diagrams, charts, UI-like motion graphics,
      or branded videos where exact text and layout matter. The assistant must
      write an explicit ```remotion:Name.tsx fence; do not use this for
      photorealistic footage or generic TSX components.
    stage: production
    providers:
      - E2B
      - Remotion
    pricing:
      per_started_minute: 5
      auto_start_first_minute_free: true
    tool_schema:
      type: object
      properties:
        source:
          type: string
          description: Remotion TSX source code to render.
        filename:
          type: string
          description: Source filename, for example ProductAnnouncement.tsx.
      required:
        - source
    exclude_fields_for_llm:
      - s3_base_url
      - files
      - aes_key
      - aes_nonce
      - vault_wrapped_aes_key
      - sandbox_id
  - id: get_transcript
    name_translation_key: videos.get_transcript
    description_translation_key: videos.get_transcript.description
    icon_image: transcript.svg
    preprocessor_hint: >
      Get the transcript/content of a specific YouTube video URL.
    stage: production
    class_path: |
      backend.apps.videos.skills.transcript_skill.TranscriptSkill
    providers:
      - YouTube
    # Fields to exclude from LLM inference (but keep in full results for UI rendering)
    # These fields are removed before adding to message history for LLM processing
    # but remain in the full response stored in chat history for proper UI rendering
    exclude_fields_for_llm:
      - "type"
      - "hash"
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: |
            REQUIRED: Array of transcript request objects for parallel processing. 
            This parameter is MANDATORY - you MUST always provide a 'requests' array, even for a single transcript.
            Example for single transcript: {"requests": [{"url": "https://youtube.com/watch?v=abc123"}]}
            Example for multiple transcripts: {"requests": [{"url": "https://youtube.com/watch?v=abc123"}, {"url": "https://youtube.com/watch?v=def456"}]}
            Each object must contain 'url' (YouTube video URL), and can include optional parameters (languages).
            Note: The 'id' field is auto-generated if not provided - you don't need to include it.
          items:
            type: object
            properties:
              url:
                type: string
                description: YouTube video URL (supports youtube.com/watch?v= and youtu.be/ formats)
              languages:
                type: array
                description: List of language codes to try for transcript (ISO 639-1, e.g., 'en', 'de', 'es', 'fr'). The API will use the first available language.
                items:
                  type: string
                default: ["en", "de", "es", "fr"]
            required:
              - url
      required:
        - requests
  - id: search
    name_translation_key: videos.search
    description_translation_key: videos.search.description
    icon_image: search.svg
    preprocessor_hint: >
      Search for videos, documentaries, tutorials, clips on the web.
    stage: production
    class_path: |
      backend.apps.videos.skills.search_skill.SearchSkill
    providers:
      - Brave
    # Follow-up suggestions shown to users after search results
    suggestions_follow_up_requests:
      - "Get transcript for this video"
      - "Search more videos"
      - "Watch related videos"
    # Fields to exclude from LLM inference (but keep in full results for UI rendering)
    # These fields are removed before adding to message history for LLM processing
    # but remain in the full response stored in chat history for proper UI rendering
    exclude_fields_for_llm:
      - "type"
      - "hash"
      - "meta_url.favicon"
      - "thumbnail.original"
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: |
            REQUIRED: Array of search request objects for parallel processing (up to 5 requests). 
            This parameter is MANDATORY - you MUST always provide a 'requests' array, even for a single search.
            Example for single search: {"requests": [{"query": "Python tutorial"}]}
            Example for multiple searches: {"requests": [{"query": "Python tutorial"}, {"query": "FastAPI tutorial"}]}
            Each object must contain 'query' (search query string), and can include optional parameters (count, country, search_lang, safesearch).
            Note: The 'id' field is auto-generated if not provided - you don't need to include it.
          items:
            type: object
            properties:
              query:
                type: string
                description: Search query string
              count:
                type: integer
                description: Number of results for this request (max 20)
                minimum: 1
                maximum: 20
                default: 6
              country:
                type: string
                description: "Country code for localized results. Must be one of: AR, AU, AT, BE, BR, CA, CL, DK, FI, FR, DE, GR, HK, IN, ID, IT, JP, KR, MY, MX, NL, NZ, NO, CN, PL, PT, PH, RU, SA, ZA, ES, SE, CH, TW, TR, GB, US, or ALL (case-insensitive). Defaults to 'us' if invalid."
                enum:
