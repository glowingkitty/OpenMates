name_translation_key: audio
description_translation_key: audio.description
icon_image: |
  audio.svg
category: communication
last_updated: "2026-02-20"
# Embed type definitions — single source of truth for frontend embed routing.
embed_types:
  # Audio recording — direct-type, created by voice recording flow
  - id: recording
    category: direct
    frontend_type: recording
    backend_type: audio-recording
    has_children: false
    preview_component: audio/RecordingEmbedPreview.svelte
    fullscreen_component: audio/RecordingEmbedFullscreen.svelte
    icon: audio
    gradient_var: "--color-app-audio"
    i18n_namespace: embeds.audio.recording
    content_catalog:
      enabled: true
      content_type_id: recording
      name: Audio recording
      description: Voice notes and uploaded audio recordings stored as first-class encrypted chat content.
      icon: audio
      example_key: audio.recording
      order: 10
  - id: transcribe
    category: app-skill-use
    skill_id: transcribe
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: false
    icon: audio
    gradient_var: "--color-app-audio"
    i18n_namespace: embeds.audio.transcribe
skills:
  - id: transcribe
    name_translation_key: app_skills.audio.transcribe
    description_translation_key: app_skills.audio.transcribe.description
    preprocessor_hint: >
      Transcribe an audio recording uploaded by the user to text using Mistral Voxtral.
      Use this skill only for manually uploaded audio files or failed/missing transcripts.
      Do not use it for web app voice recordings that already include transcript text.
    class_path: |
      backend.apps.audio.skills.transcribe_skill.TranscribeSkill
    providers:
      - Mistral
    full_model_reference: mistral/voxtral-mini-2602
    pricing:
      per_minute: 3 # $0.003/min Mistral cost; 1-minute minimum enforced in skill (~3x markup)
    api_config:
      expose_get: true # Expose GET so REST API callers can query skill metadata + use for uploaded audio
      expose_post: false # Custom POST registered by _register_audio_custom_routes() — uses session+API key auth
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: |
            Array of transcription request objects. Each object must contain
            's3_base_url', 's3_key', 'aes_key', 'aes_nonce', and 'vault_wrapped_aes_key'
            to fetch and decrypt the audio from S3, plus optional 'language' hint.
          items:
            type: object
            properties:
              s3_base_url:
                type: string
                description: "S3 base URL for the encrypted audio file."
              s3_key:
                type: string
                description: "S3 object key for the encrypted audio file."
              aes_key:
                type: string
                description: "Base64-encoded plaintext AES-256 key for decryption."
              aes_nonce:
                type: string
                description: "Base64-encoded AES-GCM nonce."
              vault_wrapped_aes_key:
                type: string
                description: "Vault Transit-wrapped AES key (server-side decryption)."
              language:
                type: string
                description: "Optional ISO 639-1 language hint (e.g. 'en', 'de')."
              filename:
                type: string
                description: "Original filename of the audio recording."
            required:
              - s3_base_url
              - s3_key
              - aes_key
              - aes_nonce
      required:
        - requests

marketing_discovery:
  skills:
    transcribe:
      enabled: true
      keywords:
        - audio transcription AI
        - voice note transcript cleanup
        - meeting recording transcript
      pain_points:
        - manual transcription is slow
        - raw transcripts need correction
      demo_angles:
        - show audio transcription with corrected transcript
