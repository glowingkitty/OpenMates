# backend/apps/diagrams/app.yml
#
# Dormant Diagrams app — source-first diagram generation and rendering.
#
# Mermaid support is currently disabled because rendered diagram quality is not
# good enough to expose. Keep this parked app definition so the implementation
# can be refined later without active app discovery.

app_id: diagrams
name_translation_key: diagrams
description_translation_key: diagrams.description
icon_image: diagram.svg
category: work
last_updated: "2026-06-18"
settings_and_memories: []
instructions: []
embed_types:
  - id: mermaid
    category: direct
    frontend_type: diagrams-mermaid
    backend_type: mermaid
    has_children: false
    groupable: true
    preview_component: diagrams/MermaidDiagramEmbedPreview.svelte
    fullscreen_component: diagrams/MermaidDiagramEmbedFullscreen.svelte
    icon: diagram
    gradient_var: "--color-app-diagrams"
    i18n_namespace: embeds.diagrams.mermaid
    content_catalog:
      enabled: true
      diff_editable: true
      content_type_id: mermaid
      name: Mermaid Diagram
      description: Flowcharts, sequence diagrams, timelines, and other source-first Mermaid diagrams.
      icon: diagram
      example_key: diagrams.mermaid
      order: 10
    content_fields:
      - name: title
        type: string
        required: true
      - name: diagram_kind
        type: string
        required: true
      - name: diagram_code
        type: string
        required: true
      - name: line_count
        type: number
        required: true
skills: []

marketing_discovery:
  skills: {}
