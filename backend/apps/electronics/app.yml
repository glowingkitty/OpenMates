# backend/apps/electronics/app.yml
#
# Electronics app — component search and circuit-design assistance.
#
# The first production skill searches TI WEBENCH Power Designer for power
# converter reference designs. Future providers can add categories such as
# passives, connectors, semiconductors, JLCPCB/LCSC, Mouser, and Digi-Key.

app_id: electronics
name_translation_key: electronics
description_translation_key: electronics.description
icon_image: pcbdesign.svg
category: work
last_updated: "2026-05-23"
settings_and_memories: []
instructions:
  - for_embed_types:
      - schematic
    instruction: |
      **PCB schematic generation with atopile**
      atopile_version: 0.15.7
      atopile_docs_version: 0.15.7
      Source: official PyPI sdist `atopile-0.15.7.tar.gz` README, `.claude/skills/ato-language/SKILL.md`, `.claude/skills/domain-layer/SKILL.md`, grammar, templates, and examples.

      When the user asks for a PCB schematic, write an `atopile` fenced code block with a top-level `module App:` entrypoint. Use `module`, `interface`, and explicitly named `component` blocks; instantiate with `new`; never write `new component` or anonymous component types. Connect compatible interfaces with `~`; use `~>` only with `#pragma experiment("BRIDGE_CONNECT")` and bridgeable components. For self-contained examples, avoid imports except known built-ins such as `import Resistor` and `import Capacitor`; never write invalid Python/JS-style imports such as `import Resistor from "..."` or bare `from Package import Thing`. Only use `from "path.ato" import Thing` when that exact local file is also included.

      Use Atopile 0.15.7 property names and terminals: `resistor.resistance`, `capacitor.capacitance`, and generic passive pins as `.unnamed[0]` / `.unnamed[1]`; never use KiCad/Python-style fields such as `.p1`, `.p2`, or `.value`. Use units, tolerances, and assertions so the solver can pick parts: `10kohm +/- 5%`, `10uF +/- 20%`, `3.0V to 3.6V`, and `assert rail.voltage within 3.0V to 3.6V`; never assign exact passive values such as `capacitor.capacitance = 10uF`. Do not claim compile success proves electrical safety, regulatory compliance, manufacturability, or expert review.

      OpenMates will compile with `atopile==0.15.7` in E2B using an `ato.yaml` containing `requires-atopile: "^0.15.7"`, `paths.src: ./`, `paths.layout: ./layouts`, and `builds.default.entry: main.ato:App`. Keep generated code as a self-contained starting point with a top-level `module App:` unless the requested module name is clear.

      For complex designs, package APIs, layout reuse, manufacturing exports, or uncertain current syntax, use `code.get_docs` with official atopile docs before writing code. Atopile can generate/update KiCad projects and build artifacts, but full placement/routing is still limited and often requires KiCad/manual layout work.
embed_types:
  - id: schematic
    category: direct
    frontend_type: electronics-pcb-schematic
    backend_type: pcb_schematic
    has_children: false
    groupable: true
    preview_component: electronics/PcbSchematicEmbedPreview.svelte
    fullscreen_component: electronics/PcbSchematicEmbedFullscreen.svelte
    icon: pcbdesign
    gradient_var: "--color-app-electronics"
    i18n_namespace: embeds.electronics.pcb_schematic
    content_fields:
      - name: code
        type: string
        required: true
      - name: language
        type: string
        required: true
      - name: filename
        type: string
        required: true
      - name: line_count
        type: number
        required: true
      - name: title
        type: string
      - name: module_name
        type: string
      - name: compile_status
        type: string
      - name: artifact_manifest
        type: object
  - id: search_components
    category: app-skill-use
    skill_id: search_components
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: true
    child_type: component
    child_frontend_type: electronics-component
    groupable: false
    preview_component: electronics/ElectronicsSearchEmbedPreview.svelte
    fullscreen_component: electronics/ElectronicsSearchEmbedFullscreen.svelte
    child_preview_component: electronics/ElectronicsComponentEmbedPreview.svelte
    child_fullscreen_component: electronics/ElectronicsComponentEmbedFullscreen.svelte
    icon: pcbdesign
    gradient_var: "--color-app-electronics"
    i18n_namespace: embeds.electronics.search_components
skills:
  - id: search_components
    name_translation_key: electronics.search_components
    description_translation_key: electronics.search_components.description
    icon_image: pcbdesign.svg
    preprocessor_hint: >
      Use this skill when the user asks to find electronic components,
      especially power converters or voltage regulators matching input voltage,
      output voltage, output current, efficiency, BOM cost, footprint, or
      topology requirements. Currently supports category power_converters via
      Texas Instruments WEBENCH Power Designer.
    stage: production
    providers:
      - name: Texas Instruments
        no_api_key: true
    class_path: |
      backend.apps.electronics.skills.search_components.SearchComponentsSkill
    pricing:
      fixed: 5
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Component search requests. Use one request per distinct power rail
            or component category.
          items:
            type: object
            properties:
              id:
                description: Optional caller-supplied ID for correlating responses.
              category:
                type: string
                enum: [power_converters]
                description: Component category. Currently only power_converters is supported.
              input_voltage_min:
                type: number
                description: Minimum input voltage in volts. For fixed input voltage, use the same value as input_voltage_max.
              input_voltage_max:
                type: number
                description: Maximum input voltage in volts. For fixed input voltage, use the same value as input_voltage_min.
              output_voltage:
                type: number
                description: Target output voltage in volts.
              output_current_max:
                type: number
                description: Maximum output current in amps.
              supply_type:
                type: string
                enum: [dc, ac]
                default: dc
                description: dc for DC/DC converters, ac for AC/DC converters.
              isolated:
                type: boolean
                default: false
                description: Whether the design should be isolated.
              ambient_temp_c:
                type: number
                default: 30
                description: Maximum ambient temperature in degrees Celsius.
              optimization:
                type: string
                enum: [balanced, low_cost, high_efficiency, small_footprint]
                default: balanced
                description: Optimization goal for WEBENCH ranking.
              max_results:
                type: integer
                default: 10
                description: Maximum number of candidate components to return.
            required:
              - category
              - input_voltage_min
              - input_voltage_max
              - output_voltage
              - output_current_max
      required:
        - requests

marketing_discovery:
  skills:
    search_components:
      enabled: true
      keywords:
        - find electronic components
        - electronics parts search
        - compare components for projects
      pain_points:
        - parts research is fragmented
      demo_angles:
        - show component search in OpenMates
