skills:
  - id: get-posts
    name_translation_key: app_skills.social_media.get_posts
    description_translation_key: app_skills.social_media.get_posts.description
    icon_image: social_media.svg
    preprocessor_hint: >
      Fetch recent social media posts from one or more specific platform pages
      or profiles. Supports Reddit subreddits through RSS feeds and Bluesky public
      AppView profile feeds. Use for profile monitoring, community research, and
      finding conversations to review manually.
    stage: development
    providers:
      - name: Reddit RSS
        no_api_key: true
      - name: Bluesky Public AppView
        no_api_key: true
    class_path: backend.apps.social_media.skills.get_posts.GetPostsSkill
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of social post fetch requests. For Reddit, page is the subreddit
            name without r/ (for example: privacy, selfhosted, buildinpublic).
            For Bluesky profile posts, page is the actor handle.
          items:
            type: object
            properties:
              id:
                description: Optional caller-supplied ID for correlating responses.
              platform:
                type: string
                description: Social platform to fetch from.
                enum:
                  - bluesky
                  - reddit
                default: reddit
              page:
                type: string
                description: Platform page/profile identifier. For Reddit, this is the subreddit name. For Bluesky, this is an actor handle for profile feeds.
              sort:
                type: string
                description: Post listing sort. Reddit supports new/hot/rising/top. Bluesky profile feeds ignore this value.
                enum:
                  - new
                  - hot
                  - rising
                  - top
                default: new
              limit:
                type: integer
                description: Number of posts to fetch per page.
                minimum: 1
                maximum: 25
                default: 10
              include_comments:
                type: boolean
                description: Whether to fetch comments for returned posts.
                default: true
              comments_limit:
                type: integer
                description: Number of comments to fetch per post.
                minimum: 0
                maximum: 25
                default: 5
      required:
        - requests
  - id: search
    name_translation_key: app_skills.social_media.search
    description_translation_key: app_skills.social_media.search.description
    icon_image: social_media.svg
    preprocessor_hint: >
      Search supported social platforms for recent public posts around a topic.
      Use this for topic monitoring and broad discovery across pages/profiles,
      not for monitoring a known profile; use Get posts for profile/page posts.
      Omit platform to search every supported provider. Bluesky search may use
      Vault credentials from kv/data/providers/bluesky; Reddit search uses the
      provider-managed Webshare proxy when available.
    stage: development
    providers:
      - name: Bluesky Public AppView
        no_api_key: true
      - name: Reddit RSS
        no_api_key: true
    class_path: backend.apps.social_media.skills.search.SearchSkill
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of social post search requests. For Bluesky, query is the topic
            to search and author optionally restricts results to a specific handle.
          items:
            type: object
            properties:
              id:
                description: Optional caller-supplied ID for correlating responses.
              platform:
                type: string
                description: Social platform to search. Omit or use all to search every supported provider.
                enum:
                  - all
                  - bluesky
                  - reddit
                default: all
              query:
                type: string
                description: Topic or search query to find posts around.
              sort:
                type: string
                description: Search sort. Bluesky supports latest/top; Reddit maps latest to new.
                enum:
                  - latest
                  - top
                  - new
                  - hot
                  - relevance
                default: latest
              limit:
                type: integer
                description: Number of posts to fetch per search.
                minimum: 1
                maximum: 25
                default: 10
              author:
                type: string
                description: Optional platform profile/handle filter. For Bluesky, this maps to the author filter.
            required:
              - query
      required:
        - requests

