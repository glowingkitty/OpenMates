skills:
  - id: search_repos
    name_translation_key: code.search_repos
    description_translation_key: code.search_repos.description
    icon_image: search.svg
    preprocessor_hint: >
      Search GitHub repositories. Use this instead of web.search whenever the
      user asks to find GitHub repos, repositories, open-source libraries,
      starred repos, or repo examples by topic, language, framework, or project
      need. Returns licensed repository embeds. Costs 10 credits per search.
    stage: production
    class_path: backend.apps.code.skills.search_repos_skill.SearchReposSkill
    pricing:
      per_unit:
        credits: 10
    providers:
      - name: GitHub
        no_api_key: true
    exclude_fields_for_llm:
      - owner_avatar_url
      - contributors.avatar_url
      - contributors.html_url
      - fetched_at
      - latest_commit_sha
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of repository search requests. Each request searches GitHub for
            public licensed repositories matching the query.
          items:
            type: object
            properties:
              query:
                type: string
                description: >
                  Repository search query, e.g. "svelte markdown editor",
                  "python cli framework", or "rust web server".
              count:
                type: integer
                minimum: 1
                maximum: 10
                default: 6
                description: Number of repositories to return.
            required:
              - query
      required:
        - requests
  - id: get_docs
    name_translation_key: code.get_docs
    description_translation_key: code.get_docs.description
    icon_image: library.svg
    preprocessor_hint: >
      Get latest documentation for programming libraries, frameworks, APIs, SDKs.
      Use for ANY programming-related query about a specific library or framework.
    stage: production
    class_path: |
      backend.apps.code.skills.get_docs_skill.GetDocsSkill
    providers:
      - Context7
    tool_schema:
      type: object
      properties:
        library:
          type: string
          description: |
            Library name to search for (e.g., "Svelte 5", "React", "FastAPI", "Miro API", etc.).
        question:
          type: string
          description: |
            Natural language question about the documentation needed
            (e.g., "How to use useState hook?", "How to setup routing?").
      required:
        - library
        - question
  - id: run
    name_translation_key: app_skills.code.run
    description_translation_key: app_skills.code.run.description
    icon_image: play.svg
    preprocessor_hint: >
      Run the currently selected code embed in an isolated E2B sandbox from the
      web app. The sandbox receives code files from the current chat, installs
      supported dependency manifests, and executes the selected file. Pricing is
      5 credits per started minute of sandbox runtime.
    stage: production
    class_path: backend.apps.code.skills.run_code_skill.RunCodeSkill
    providers:
      - name: E2B
    pricing:
      per_minute: 5
    api_config:
      expose_post: false
    tool_schema:
      type: object
      properties:
        chat_id:
          type: string
          description: Chat ID containing the code embeds to run.
        target_embed_id:
          type: string
          description: Code embed ID to execute as the entrypoint.
        enable_internet:
          type: boolean
          default: true
          description: Allow outbound internet access from the E2B sandbox.
      required:
        - chat_id
        - target_embed_id
  - id: clean_repo
    name_translation_key: code.clean_repo
    description_translation_key: code.clean_repo.description
    stage: planning
  - id: get_issues
    name_translation_key: code.get_issues
    description_translation_key: code.get_issues.description
    stage: planning
  - id: add_issue
    name_translation_key: code.add_issue
    description_translation_key: code.add_issue.description
    stage: planning
  - id: remove_secrets
    name_translation_key: code.remove_secrets
    description_translation_key: code.remove_secrets.description
    stage: planning
  - id: get_project_overview
    name_translation_key: code.get_project_overview
    description_translation_key: code.get_project_overview.description
    stage: planning
