# Shopping app — product search across groceries, marketplaces, and fabrics
#
# Searches REWE, Amazon, and Stoffe.de for products with live prices.
# REWE uses a Playwright-harvested cookie pool stored in Vault and a matching
# residential proxy. Amazon uses SerpAPI. Stoffe.de uses the public
# plentymarkets storefront API and does not require auth or proxy.
#
# Providers: REWE (shop.rewe.de), Amazon (SerpAPI), Stoffe.de (plentymarkets)
# REWE pricing data: market-specific, scoped to Berlin (PLZ 10115) by default

name_translation_key: shopping
description_translation_key: shopping.description
icon_image: |
  shopping.svg
category: lifestyle
last_updated: "2026-02-22"
# Embed type definitions — single source of truth for frontend embed routing.
embed_types:
  - id: search_products
    category: app-skill-use
    skill_id: search_products
    frontend_type: app-skill-use
    backend_type: app_skill_use
    has_children: true
    child_type: product
    child_frontend_type: shopping-product
    groupable: false
    preview_component: shopping/ShoppingSearchEmbedPreview.svelte
    fullscreen_component: shopping/ShoppingSearchEmbedFullscreen.svelte
    child_preview_component: shopping/ShoppingResultEmbedPreview.svelte
    child_fullscreen_component: shopping/ShoppingResultEmbedFullscreen.svelte
    icon: shopping
    gradient_var: "--color-app-shopping"
    i18n_namespace: embeds.shopping.search_products
skills:
  # -----------------------------------------------------------------------
  # Search Products — search REWE online shop for products with live prices
  # -----------------------------------------------------------------------
  - id: search_products
    name_translation_key: app_skills.shopping.search_products
    description_translation_key: app_skills.shopping.search_products.description
    icon_image: shopping.svg
    preprocessor_hint: >
      Search products on REWE, Amazon, or Stoffe.de with real-time prices.
      Use category to route groceries, marketplace products, fabrics, sewing supplies,
      and patterns to compatible providers. Invalid provider/category combinations are rejected.
    stage: production
    class_path: backend.apps.shopping.skills.search_products.SearchProductsSkill
    pricing:
      per_unit:
        credits: 10
    providers:
      - name: REWE
        no_api_key: true
      - Amazon
      - name: Stoffe.de
        no_api_key: true
    exclude_fields_for_llm:
      - type
      - product_id
      - image_url
      - category_ids
      - order_limit
      - search_rank
    suggestions_follow_up_requests:
      - Filter for organic products only
      - Show the cheapest option
      - Find similar products at a lower price
      - Add to shopping list
    tool_schema:
      type: object
      properties:
        requests:
          type: array
          description: >
            Array of product search requests. Each request searches for
            products matching a query on a compatible shopping provider.
          items:
            type: object
            properties:
              query:
                type: string
                description: >
                  Search query, e.g. "bio joghurt", "coffee grinder", "wireless mouse".
              provider:
                type: string
                description: >
                  Product provider. If omitted, inferred from category: grocery routes
                  to REWE, fabrics/sewing_supplies/patterns route to Stoffe.de, and
                  marketplace categories route to Amazon. Invalid explicit
                  provider/category combinations are rejected.
                enum:
                  - REWE
                  - Amazon
                  - Stoffe.de
              category:
                type: string
                description: >
                  Product category used for routing and provider compatibility.
                  Fabrics can be searched on Stoffe.de or Amazon. Groceries can be
                  searched on REWE or Amazon. Marketplace categories are Amazon-only.
                enum:
                  - grocery
                  - fabrics
                  - sewing_supplies
                  - patterns
                  - general_marketplace
                  - electronics
                  - home
                  - fashion
                  - beauty
                  - books
                  - sports
                  - toys
                  - automotive
                  - health
                  - music
                  - movies
                  - tools
                  - office
                  - pet_supplies
                  - video_games
                  - baby
              max_results:
                type: integer
                description: Maximum number of products to return (1-20, default 10).
                default: 10
              sort:
                type: string
                description: >
                  Sort order for results.
                  REWE supports: relevance, price_asc, price_desc, new.
                  Amazon supports: relevance, price_asc, price_desc, review_rank,
                  newest, best_sellers.
                  Stoffe.de supports: relevance, price_asc, price_desc, new.
                enum:
                  - relevance
                  - price_asc
                  - price_desc
                  - new
                  - review_rank
                  - newest
                  - best_sellers
                default: relevance
              service_type:
                type: string
                description: >
                  REWE-only fulfilment type. "DELIVERY" for home delivery (default).
                  "CLICK_AND_COLLECT" for store pickup. Ignored for Amazon and Stoffe.de.
                enum:
                  - DELIVERY
                  - CLICK_AND_COLLECT
                default: DELIVERY
              country:
                type: string
                description: >
                  Amazon-only marketplace country code. Example: us, uk, de, fr,
                  it, es, ca, au, jp, in, br, mx, nl, sg, se, pl.
                  If omitted, inferred from user language/locale with fallback to us.
              department:
                type: string
                description: >
                  Amazon-only category filter. Example: electronics, computers,
                  fashion, home, books, sports, toys, beauty, grocery, automotive,
                  health, music, movies, tools, office, pet_supplies, video_games, baby.
                enum:
                  - electronics
                  - computers
                  - fashion
                  - home
                  - books
                  - sports
                  - toys
                  - beauty
                  - grocery
                  - automotive
                  - health
                  - music
                  - movies
                  - tools
                  - office
                  - pet_supplies
                  - video_games
                  - baby
              min_price:
                type: number
                description: Amazon-only minimum price filter (client-side after fetch).
              max_price:
                type: number
                description: Amazon-only maximum price filter (client-side after fetch).
            required:
              - query
      required:
        - requests

marketing_discovery:
  skills:
    search_products:
      enabled: true
      keywords:
        - product search AI assistant
        - compare products online
        - shopping research chatbot
      pain_points:
        - shopping search is ad-heavy
      demo_angles:
        - show product search result
