# shared/config/embed_types.yml
#
# Virtual embed types that don't belong to a specific app's app.yml.
# These are produced by stream_consumer.py (sheets from markdown tables,
# focus_mode_activation from focus mode changes) or by generic client-side
# actions, and have no corresponding backend skill.
#
# Merged with per-app embed_types by the generate-embed-registry.js build script.

embed_types:
  # Sheet/table — auto-detected from markdown table syntax by stream_consumer.py
  - id: sheet
    app_id: sheets
    category: direct
    frontend_type: sheets-sheet
    backend_type: sheet
    has_children: false
    groupable: true
    preview_component: sheets/SheetEmbedPreview.svelte
    fullscreen_component: sheets/SheetEmbedFullscreen.svelte
    icon: sheets
    gradient_var: "--color-app-sheets"
    i18n_namespace: embeds.sheets.sheet
    content_catalog:
      enabled: true
      content_type_id: sheet
      name: Spreadsheet
      description: Tables and spreadsheet-style artifacts created from markdown table content.
      icon: sheets
      example_key: sheets.sheet
      order: 10
    content_fields:
      - name: table
        type: string
        required: true
        description: "Raw markdown table content"
      - name: title
        type: string
      - name: row_count
        type: number
        required: true
      - name: col_count
        type: number
        required: true

  # Focus mode activation indicator
  - id: focus_mode_activation
    app_id: ai
    category: direct
    frontend_type: focus-mode-activation
    backend_type: focus_mode_activation
    has_children: false
    groupable: false
    preview_component: FocusModeActivationEmbed.svelte
    fullscreen_component: null
    icon: focus
    gradient_var: "--color-app-ai"
    i18n_namespace: embeds.ai.focus_mode_activation
    content_fields:
      - name: focus_id
        type: string
        required: true
      - name: focus_mode_name
        type: string
        required: true

  # GitHub repository — auto-detected from pasted repo URLs and web search results
  - id: repo
    app_id: code
    category: direct
    frontend_type: code-repo
    backend_type: repo
    has_children: false
    groupable: true
    preview_component: code/CodeRepoEmbedPreview.svelte
    fullscreen_component: code/CodeRepoEmbedFullscreen.svelte
    icon: github
    gradient_var: "--color-app-code"
    i18n_namespace: embeds.code.repo
    content_catalog:
      enabled: true
      content_type_id: repo
      name: Git repository
      description: Standalone repository cards with project metadata, language, license, stars, and links.
      icon: github
      example_key: code.repo
      order: 30
    content_fields:
      - name: url
        type: string
        required: true
      - name: full_name
        type: string
        required: true
      - name: description
        type: string
      - name: owner_login
        type: string
        required: true
      - name: owner_avatar_url
        type: string
      - name: primary_language
        type: string
      - name: license_name
        type: string
      - name: license_spdx_id
        type: string
      - name: stars
        type: number
      - name: forks
        type: number
      - name: open_issues
        type: number
