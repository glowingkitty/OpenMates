# Provider Training Policies — Source of Truth
# -----------------------------------------------------------------------------
# Per-provider audit of whether API request data (prompts, images, outputs) is
# used to train or improve AI models. This file backs the "no-training-on-user-
# data" privacy promise in privacy_promises.yml and the corresponding section
# of the public privacy policy rendered by buildLegalContent.ts.
#
# Each entry records:
#   - The provider's contractual commitment (or lack thereof)
#   - The exact source document and quote
#   - The verification date (when we last checked the live policy page)
#   - Any action we took (e.g., opt-out toggle)
#
# Consumed by:
#   - frontend/packages/ui/src/legal/buildLegalContent.ts (renders per-provider
#     training disclosure in the privacy policy)
#   - frontend/packages/ui/src/i18n/sources/legal/privacy.yml (i18n keys for
#     the per-provider training section)
#   - .claude/agents/legal-compliance-auditor.md (periodic re-verification)
#
# Re-verification schedule: check all policy URLs at least once per quarter.
# Update `last_verified` and `quote` whenever a policy changes.

version: 1
last_full_audit: "2026-04-16"

# =============================================================================
# Status values:
#   no_training          — provider contractually prohibits training on API data
#   no_training_opt_out  — provider trains by default but we have opted out
#   limited_use          — provider uses anonymized/aggregated derivatives; no
#                          full opt-out available for standard API tier
# =============================================================================

providers:

  # ─── AI model inference providers (Group C in privacy_policy.yml) ──────────

  aws_bedrock:
    status: no_training
    provider_group: ai_models
    policy_url: https://aws.amazon.com/bedrock/faqs/
    terms_url: https://aws.amazon.com/service-terms/
    quote: >
      Your content is not used to improve the base models and is not shared
      with any model providers. Users' inputs and model outputs are not shared
      with any model providers.
    source_document: "AWS Bedrock FAQ + AWS Service Terms §50.12"
    mechanism: Unconditional — applies to all customers by default
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  anthropic_direct:
    status: no_training
    provider_group: ai_models
    policy_url: https://www.anthropic.com/legal/commercial-terms
    quote: >
      Anthropic may not train models on Customer Content from Services.
    source_document: "Anthropic Commercial Terms of Service, Section B"
    mechanism: Contractual prohibition for API customers
    notes: >
      This applies to the API (Commercial Terms). Consumer Claude.ai users
      are under separate terms where training is opt-out. We use the API.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  openai:
    status: no_training
    provider_group: ai_models
    policy_url: https://openai.com/enterprise-privacy/
    quote: >
      We do not train our models on your data by default.
    source_document: "OpenAI Enterprise Privacy page"
    mechanism: Opt-in only — training requires explicit consent
    notes: >
      Zero Data Retention (ZDR) is also available for eligible endpoints
      but requires a qualifying use case arranged with OpenAI.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  mistral:
    status: no_training
    provider_group: ai_models
    policy_url: https://legal.mistral.ai/terms/privacy-policy
    quote: >
      We do not use your Input and Output to train our artificial intelligence
      models when you use Le Chat Enterprise or the paid version of our APIs.
    source_document: "Mistral AI Privacy Policy"
    mechanism: No training for paid API customers by default
    notes: >
      Free/consumer tier does train by default (opt-out available).
      We use the paid API tier.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  google_gemini:
    status: no_training
    provider_group: ai_models
    policy_url: https://ai.google.dev/gemini-api/terms
    quote: >
      When you use Paid Services, including, for example, the paid quota of
      the Gemini API, Google doesn't use your prompts (including associated
      system instructions, cached content, and files such as images, videos,
      or documents) or responses to improve our products.
    source_document: "Gemini API Additional Terms of Service (effective 2026-03-23)"
    mechanism: No training on paid tier; billing account = paid status
    notes: >
      Free tier DOES train by default — no opt-out except upgrading to paid.
      EEA/Switzerland/UK users get paid-tier protections even on free tier.
      We use the paid tier (Cloud Billing account attached).
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  google_vertex_maas:
    status: no_training
    provider_group: ai_models
    policy_url: https://cloud.google.com/terms/service-terms
    quote: >
      Google will not use Customer Data to train or fine-tune any AI/ML models
      without Customer's prior permission or instruction.
    source_document: "Google Cloud Service Specific Terms, §18 — Training Restriction"
    mechanism: Contractual prohibition for Google-managed models
    notes: >
      Third-party models accessed via Vertex AI Model Garden ("Separate
      Offerings") are governed by the third-party provider's own terms, not
      this clause. For our use case (e.g., DeepSeek via Vertex), the model
      provider's terms apply — verify separately if we add new MaaS models.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  together_ai:
    status: no_training
    provider_group: ai_models
    policy_url: https://www.together.ai/privacy
    quote: >
      We do not use any data collected from you to train our models without
      your explicit opt-in and consent. You may revoke that consent at any
      time and request deletion of information we have collected.
    source_document: "Together AI Privacy Policy §1/2.2 (updated 2025-12-17)"
    mechanism: Opt-in only — no training by default
    notes: >
      Zero Data Retention (ZDR) mode is also available via
      Settings > Privacy & Security.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  groq:
    status: no_training
    provider_group: ai_models
    policy_url: https://console.groq.com/docs/legal/services-agreement
    quote: >
      Groq is not permitted to use Inputs or Outputs for training or
      fine-tuning any AI Model Services or other models, unless explicitly
      granted permission or instructed by Customer.
    source_document: "Groq Services Agreement §4.2 (effective 2025-10-15)"
    mechanism: Opt-in only — training prohibited unless customer grants permission
    notes: >
      The public groq.com/privacy-policy does NOT cover API customers —
      the Services Agreement governs. ZDR setting available at
      console.groq.com/settings/data-controls.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  cerebras:
    status: no_training
    provider_group: ai_models
    policy_url: https://www.cerebras.ai/terms-of-service
    quote: >
      For clarity, the foregoing does not grant Cerebras the right to use
      Service Content for the purpose of training or fine-tuning models.
    source_document: "Cerebras ToS, Data Usage and Privacy section (effective 2024-08-27, updated 2025-05-07)"
    mechanism: Unconditional — no opt-in path exists
    notes: >
      Privacy Policy §6 additionally confirms: "We do not retain inputs and
      outputs associated with our training, inference and chatbot Services."
      We access Cerebras via OpenRouter; Cerebras's own terms apply.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  openrouter:
    status: no_training
    provider_group: ai_models
    policy_url: https://openrouter.ai/terms
    terms_url: https://openrouter.ai/privacy
    quote: >
      Some AI Models may store or train on your Inputs for improving their own
      large language models and may allow you to opt-out of model training, as
      described in their AI Model Terms. Where possible, OpenRouter has opted
      out of model training with the AI Models it uses.
    source_document: "OpenRouter Terms of Service §5.1 (updated 2026-04-02)"
    mechanism: >
      OpenRouter itself does not train — product improvement is opt-in only
      (§5.2). For downstream providers, OpenRouter has proactively opted out
      where possible. Our only downstream via OpenRouter is Cerebras, which
      has its own unconditional no-training policy.
    notes: >
      Private input/output logging is also opt-in (§5.3). If we add new
      models via OpenRouter, verify the downstream provider's training policy.
    action_required: none
    last_verified: "2026-04-16T11:15:00Z"

  # ─── Image generation providers (Group D in privacy_policy.yml) ────────────

  fal:
    status: limited_use
    provider_group: image_generation
    policy_url: https://fal.ai/legal/terms-of-service
    quote: >
      Customer acknowledges and agrees that Company may generate, collect,
      store, use, transfer, and/or disclose to third parties Usage Data and
      use Usage Data to perform data analytics; to monitor, improve, and
      support the Services; to design, develop, and offer Company products,
      services, and AI models; and for any other lawful purposes.
    source_document: "fal.ai Terms of Service §6.3 (updated 2026-03-03)"
    mechanism: >
      "Usage Data" is defined as "anonymized or aggregated data... which may
      include data based on or derived from Customer Input." No opt-out exists
      for standard API customers. Enterprise contracts are the only path to
      negotiate this away.
    notes: >
      fal.ai does NOT claim to use raw prompts or images directly — only
      anonymized/aggregated derivatives. However, "based on or derived from
      Customer Input" is broad enough that we cannot claim zero training use.
      Enterprise pricing is not viable for us at this time.
    action_required: >
      Transparent disclosure in privacy policy. We cannot claim "no training"
      for fal.ai — we must disclose that anonymized derivatives of image
      generation prompts and source images may be used for model development.
    last_verified: "2026-04-16T11:15:00Z"

  recraft:
    status: no_training_opt_out
    provider_group: image_generation
    policy_url: https://www.recraft.ai/privacy
    quote: >
      We may use such information to train Recraft's own proprietary AI
      models, but you may disallow such use of your information by opting out
      in your account profile settings.
    source_document: "Recraft Privacy Policy, Artificial Intelligence Features section (modified 2026-03-12)"
    mechanism: >
      Training is ON by default. Opt-out available in account profile
      settings ("Help improve Recraft" toggle). Third-party AI providers
      used by Recraft are contractually prohibited from training.
    notes: >
      We opted out on 2026-04-16 via account settings (disabled "Help improve
      Recraft — Allow Recraft to use my content to enhance the quality of our
      AI models"). With the opt-out active, Recraft's own terms prohibit
      training on our data.
    action_required: >
      Verify opt-out remains active at each quarterly audit. If the setting
      is ever reset (e.g., after a ToS update), re-disable immediately.
    opted_out_date: "2026-04-16"
    last_verified: "2026-04-16T11:15:00Z"
