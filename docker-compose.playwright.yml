services:
  playwright:
    # Official Playwright image with browsers and Node pre-installed.
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    working_dir: /workspace
    volumes:
      # Mount only the Playwright config and tests; no need for the app code.
      - ./frontend/apps/web_app/playwright.config.ts:/workspace/playwright.config.ts:ro
      - ./frontend/apps/web_app/tests:/workspace/tests:ro
      # Mount a writable directory for screenshots and other artifacts.
      - ./playwright-artifacts:/workspace/artifacts
      # Mount the CLI package for cli-pair-login.spec.ts.
      # The spec spawns `node /workspace/cli/dist/cli.js` as a child process.
      # Dependencies (ws, qrcode-terminal) are installed at container startup
      # via the command below — pnpm symlinks don't survive Docker bind mounts.
      - ./frontend/packages/openmates-cli/dist:/workspace/cli/dist:ro
      - ./frontend/packages/openmates-cli/package.json:/workspace/cli/package.json:ro
    environment:
      # Target URL — must be set via E2E_DEV_TEST_BASE_URL in .env (passed
      # through by run-tests-worker.sh). No hardcoded default: a missing var
      # causes playwright.config.ts to throw, making misconfiguration visible.
      PLAYWRIGHT_TEST_BASE_URL:
      # Load test credentials from host environment (populated via .env).
      # Base vars (backward-compatible fallback for single-account runs):
      OPENMATES_TEST_ACCOUNT_EMAIL:
      OPENMATES_TEST_ACCOUNT_PASSWORD:
      OPENMATES_TEST_ACCOUNT_OTP_KEY:
      # Multi-account slots (1-5) for parallel test workers.
      # Each slot has its own email/password/otp_key so parallel specs
      # don't collide by sharing the same session.
      OPENMATES_TEST_ACCOUNT_1_EMAIL:
      OPENMATES_TEST_ACCOUNT_1_PASSWORD:
      OPENMATES_TEST_ACCOUNT_1_OTP_KEY:
      OPENMATES_TEST_ACCOUNT_2_EMAIL:
      OPENMATES_TEST_ACCOUNT_2_PASSWORD:
      OPENMATES_TEST_ACCOUNT_2_OTP_KEY:
      OPENMATES_TEST_ACCOUNT_3_EMAIL:
      OPENMATES_TEST_ACCOUNT_3_PASSWORD:
      OPENMATES_TEST_ACCOUNT_3_OTP_KEY:
      OPENMATES_TEST_ACCOUNT_4_EMAIL:
      OPENMATES_TEST_ACCOUNT_4_PASSWORD:
      OPENMATES_TEST_ACCOUNT_4_OTP_KEY:
      OPENMATES_TEST_ACCOUNT_5_EMAIL:
      OPENMATES_TEST_ACCOUNT_5_PASSWORD:
      OPENMATES_TEST_ACCOUNT_5_OTP_KEY:
      # Worker slot identifier (set by run-tests-worker.sh for parallel runs)
      PLAYWRIGHT_WORKER_SLOT:
      # Load signup test vars
      SIGNUP_TEST_EMAIL_DOMAINS:
      MAILOSAUR_API_KEY:
      MAILOSAUR_SERVER_ID:
      # Allow targeting specific tests
      PLAYWRIGHT_TEST_FILE:
      PLAYWRIGHT_TEST_GREP:
      # Reporter env vars (forwarded by run-tests-worker.sh for OpenObserve integration)
      E2E_REPORT_API_URL:
      E2E_REPORT_API_TOKEN:
      E2E_REPORT_ENVIRONMENT:
      E2E_REPORT_ENABLED:
      # E2E debug log forwarding (forwarded by run-tests-worker.sh)
      # E2E_RUN_ID: the run correlation ID used as debugging_id in OpenObserve
      # E2E_DEBUG_TOKEN: scoped HMAC token for /e2e/client-logs (NOT INTERNAL_API_SHARED_TOKEN)
      E2E_RUN_ID:
      E2E_DEBUG_TOKEN:
    networks:
      - openmates
    # NOTE: Use $$ to escape $ so docker-compose passes the variable expansion
    # to the shell inside the container, rather than evaluating it at parse time.
    command: >
      bash -lc "
        cd /workspace &&
        # Create an isolated, throwaway Playwright project inside the container.
        npm init -y >/dev/null 2>&1 &&
        npm install --silent @playwright/test@1.49.0 &&
        # Install CLI runtime deps (ws, qrcode-terminal) for cli-pair-login.spec.ts.
        # pnpm symlinks break across Docker mounts, so we install directly in /workspace/cli.
        if [ -f /workspace/cli/package.json ]; then
          cd /workspace/cli && npm install --silent --omit=dev 2>/dev/null; cd /workspace;
        fi &&
        # Allow targeted runs without overriding the container command.
        # PLAYWRIGHT_TEST_FILE points at a single test file.
        # PLAYWRIGHT_TEST_GREP filters tests by title (regex).
        npx playwright test --config=playwright.config.ts --reporter=list,./tests/api-reporter.ts $${PLAYWRIGHT_TEST_FILE:-} $${PLAYWRIGHT_TEST_GREP:+--grep \"$$PLAYWRIGHT_TEST_GREP\"}
      "

networks:
  openmates:
    external: true
    name: openmates
