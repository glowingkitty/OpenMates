# Search result row primitives (query title, provider label, metadata row).
# Consumed by build-tokens.js → emits .ds-* CSS classes + DS.* Swift structs.
#
# Used by 11 embed preview files across: events, health, home, maps, news,
# nutrition, shopping, travel (search + stays), videos, web.
#
# Explicitly NOT lifted:
#   - PdfSearchEmbedFullscreen: .search-query is a flex label+text container,
#     completely different role from the canonical 3-line clamped title.
#   - ImagesSearchEmbedPreview: intentionally diverges (grey-90 color,
#     line-height 1.4, no text-overflow) because the footer row sits over
#     a thumbnail strip with different contrast needs.
#
# The health embed augments .ds-search-provider with extra flex layout
# (display/align/gap) in its own local style block to host the provider-logo
# + provider-name children — that lives in HealthSearchEmbedPreview.svelte.

search-query:
  font-size:     { ref: "font-size-p" }
  font-weight:   600
  color:         { ref: "color-grey-100" }
  line-height:   1.3
  line-clamp:    3
  text-overflow: ellipsis
  word-break:    break-word

search-provider:
  font-size:   { ref: "font-size-small" }
  color:       { ref: "color-grey-70" }
  line-height: 1.3

search-results-info:
  display:     flex
  align-items: center
  gap:         { ref: "spacing-4" }
  margin-top:  { ref: "spacing-2" }
  flex-wrap:   wrap
