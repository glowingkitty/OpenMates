  diagrams:          { start: "#d49200", end: "#ffd24d" }
  events:            { start: "#a20000", end: "#e61b3e" }
  code:              { start: "#155d91", end: "#42abf4", dark_start: "#1b8fe3" }
  calendar:          { start: "#007a6e", end: "#3cc4b6" }
  mail:              { start: "#a82e1c", end: "#ef6a58" }
  reminder:          { start: "#8b0000", end: "#ff6f00" }
  business:          { start: "#004040", end: "#008080" }
