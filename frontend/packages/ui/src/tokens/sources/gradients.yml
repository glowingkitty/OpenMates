# frontend/packages/ui/src/tokens/sources/gradients.yml
#
# Gradient tokens — app gradients, icon gradients, primary, footer.
# All gradients use the standard 135deg angle with 9.04% -> 90.06% stops.
# The generator applies the angle and stops automatically.
#
# CSS output:  --color-app-{name}-start, --color-app-{name}-end, --color-app-{name}
# Swift output: LinearGradient.app{Name}

# Standard gradient angle and stops (applied by generator to all entries)
standard:
  angle: "135deg"
  start_stop: "9.04%"
  end_stop: "90.06%"

apps:
  ai:                { start: "#b85a3a", end: "#e8956e" }
  health:            { start: "#fd50a0", end: "#f42c2d" }
  life_coaching:     { start: "#fdb250", end: "#f42c2d" }
  nutrition:         { start: "#fd8450", end: "#f42c2d" }
  finance:           { start: "#0a6e04", end: "#2cb81e" }
  fitness:           { start: "#8a0048", end: "#d63084" }
  legal:             { start: "#239cff", end: "#005ba5" }
  weather:           { start: "#005ba5", end: "#00a7c9" }
  travel:            { start: "#059db3", end: "#13daf5" }
  news:              { start: "#c90820", end: "#f95a6e" }
  jobs:              { start: "#049363", end: "#00c382" }
  files:             { start: "#1e3a8a", end: "#29befb" }
  home:              { start: "#e58c27", end: "#f2cc00" }
  docs:              { start: "#0909e5", end: "#4285f4" }
  slides:            { start: "#ff8c00", end: "#f4b400" }
  sheets:            { start: "#006400", end: "#34a853" }
  notes:             { start: "#b87a00", end: "#f5c23a" }
