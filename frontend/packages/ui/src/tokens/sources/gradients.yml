  openmates:         { start_ref: "color-primary-start", end_ref: "color-primary-end" }
  chat:              { start_ref: "color-primary-start", end_ref: "color-primary-end" }

icons:
  default: { start_ref: "color-grey-20", end_ref: "color-grey-30" }
  focus:   { start: "#5951d0", end: "#7d74ff" }
  skill:   { start: "#fefefe", end: "#eaeaea" }
  memory:  { start: "#b5008e", end: "#f03ed0" }

primary: { start: "#4867cd", end: "#5a85eb" }

footer:
  light: { start: "#4867cd", end: "#5a85eb" }
  dark:  { start: "#293d7f", end: "#263969" }

# Record audio uses the primary gradient
record-audio: { start_ref: "color-primary-start", end_ref: "color-primary-end" }
