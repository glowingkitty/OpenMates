not_found.suggestion_body:
  context: Text below the suggestion heading on the 404 screen
  en: "Either try a search to find the page you are looking for, or ask OpenMates directly about the topic."
  de: "Versuche entweder eine Suche, um die gewünschte Seite zu finden, oder frage OpenMates direkt zum Thema."
  zh: "尝试搜索以找到您需要的页面，或直接向 OpenMates 询问该主题。"
  es: "Intenta una búsqueda para encontrar la página que buscas, o pregunta directamente a OpenMates sobre el tema."
  fr: "Essayez une recherche pour trouver la page que vous cherchez, ou demandez directement à OpenMates sur le sujet."
  pt: "Tente uma pesquisa para encontrar a página ou pergunte diretamente ao OpenMates sobre o assunto."
  ru: "Попробуйте поиск, чтобы найти нужную страницу, или спросите OpenMates напрямую по теме."
  ja: "検索で必要なページを見つけるか、OpenMates にトピックについて直接質問してください。"
  ko: "검색으로 찾는 페이지를 찾거나, OpenMates에 직접 주제에 대해 질문하세요."
  it: "Prova una ricerca per trovare la pagina che cerchi, o chiedi direttamente a OpenMates sull'argomento."
  tr: "Aradığınız sayfayı bulmak için arama yapmayı deneyin veya konu hakkında doğrudan OpenMates'e sorun."
  vi: "Thử tìm kiếm để tìm trang bạn cần, hoặc hỏi trực tiếp OpenMates về chủ đề đó."
  id: "Coba cari halaman yang Anda cari, atau tanyakan langsung kepada OpenMates tentang topiknya."
  pl: "Spróbuj wyszukać stronę lub zapytaj bezpośrednio OpenMates o temat."
  nl: "Probeer een zoekopdracht om de pagina te vinden of vraag OpenMates direct over het onderwerp."
  ar: "جرّب البحث للعثور على الصفحة، أو اسأل OpenMates مباشرة عن الموضوع."
  hi: "खोज कर पृष्ठ ढूंढने का प्रयास करें, या OpenMates से सीधे विषय के बारे में पूछें।"
  th: "ลองค้นหาหน้าที่ต้องการ หรือถาม OpenMates โดยตรงเกี่ยวกับหัวข้อนั้น"
  cs: "Zkuste vyhledat stránku nebo se přímo zeptejte OpenMates na dané téma."
  sv: "Försök söka för att hitta sidan du letar efter, eller fråga OpenMates direkt om ämnet."
  he: "נסה לחפש את הדף שאתה מחפש, או שאל את OpenMates ישירות על הנושא."
  verified_by_human: []

