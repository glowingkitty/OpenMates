not_found.explanation:
  context: Explanation paragraph on the 404 screen, {url} is the URL the user tried to visit
  en: "The page you are looking for does not exist. This can be for one of multiple reasons. For example:"
  de: "Die gesuchte Seite existiert nicht. Das kann verschiedene Gründe haben. Zum Beispiel:"
  zh: "您正在查找的页面不存在。这可能有多种原因。例如："
  es: "La página que buscas no existe. Esto puede ser por una de varias razones. Por ejemplo:"
  fr: "La page que vous recherchez n'existe pas. Cela peut être dû à plusieurs raisons. Par exemple :"
  pt: "A página que você está procurando não existe. Isso pode ser por várias razões. Por exemplo:"
  ru: "Запрашиваемая страница не существует. Это может быть по нескольким причинам. Например:"
  ja: "お探しのページは存在しません。これはいくつかの理由が考えられます。例えば："
  ko: "찾는 페이지가 존재하지 않습니다. 여러 가지 이유가 있을 수 있습니다. 예를 들어:"
  it: "La pagina che stai cercando non esiste. Ciò può dipendere da più motivi. Per esempio:"
  tr: "Aradığınız sayfa mevcut değil. Bu birkaç nedenle olabilir. Örneğin:"
  vi: "Trang bạn đang tìm kiếm không tồn tại. Điều này có thể do nhiều lý do. Ví dụ:"
  id: "Halaman yang Anda cari tidak ada. Ini bisa karena beberapa alasan. Misalnya:"
  pl: "Strona, której szukasz, nie istnieje. Może to być z kilku powodów. Na przykład:"
  nl: "De pagina die u zoekt bestaat niet. Dit kan om meerdere redenen zijn. Bijvoorbeeld:"
  ar: "الصفحة التي تبحث عنها غير موجودة. يمكن أن يكون ذلك لأسباب عدة. على سبيل المثال:"
  hi: "आप जिस पृष्ठ को ढूंढ रहे हैं वह मौजूद नहीं है। यह कई कारणों से हो सकता है। उदाहरण के लिए:"
  th: "หน้าที่คุณกำลังมองหาไม่มีอยู่ ซึ่งอาจเป็นเพราะหลายสาเหตุ เช่น:"
  cs: "Stránka, kterou hledáte, neexistuje. Může to být z několika důvodů. Například:"
  sv: "Sidan du letar efter finns inte. Det kan bero på flera orsaker. Till exempel:"
  he: "הדף שחיפשת אינו קיים. זה יכול להיות מסיבות שונות. לדוגמה:"
  verified_by_human: []

