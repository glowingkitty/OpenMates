description:
  context: Main description of OpenMates used in meta tags
  en: "AI team mates for everyday tasks & learning. Plan trips, discuss news, build projects - and more. With user interests & privacy above anything else."
  de: "KI-Teamkollegen für alltägliche Aufgaben & Lernen. Plane Reisen, diskutiere Nachrichten, baue Projekte – und mehr. Mit Nutzerinteressen & Datenschutz über allem anderen."
  zh: "AI团队伙伴，助您完成日常任务与学习。规划旅行、讨论新闻、建设项目——以及更多。将用户利益与隐私置于首位。"
  es: "Compañeros de equipo de IA para tareas cotidianas y aprendizaje. Planifica viajes, discute noticias, construye proyectos - y más. Con los intereses del usuario y la privacidad por encima de todo."
  fr: "Coéquipiers IA pour les tâches quotidiennes et l'apprentissage. Planifiez des voyages, discutez des actualités, construisez des projets - et plus encore. Avec les intérêts des utilisateurs et la confidentialité avant tout."
  pt: "Companheiros de equipe de IA para tarefas cotidianas e aprendizado. Planeje viagens, discuta notícias, construa projetos - e mais. Com os interesses do usuário e a privacidade acima de tudo."
  ru: "ИИ-напарники для повседневных задач и обучения. Планируйте поездки, обсуждайте новости, стройте проекты – и многое другое. Интересы пользователей и приватность – превыше всего."
  ja: "日常のタスクと学習のためのAIチームメイト。旅行を計画し、ニュースを議論し、プロジェクトを構築 - その他多数。ユーザーの利益とプライバシーを何より優先。"
  ko: "일상 업무와 학습을 위한 AI 팀원. 여행 계획, 뉴스 토론, 프로젝트 구축 - 그리고 더 많은 것. 사용자 이익과 개인정보 보호를 최우선으로."
  it: "Compagni di squadra AI per attività quotidiane e apprendimento. Pianifica viaggi, discuti notizie, costruisci progetti - e altro ancora. Con gli interessi degli utenti e la privacy al di sopra di tutto."
  tr: "Günlük görevler ve öğrenme için yapay zeka takım arkadaşları. Seyahat planla, haberleri tartış, projeler kur - ve daha fazlası. Kullanıcı çıkarları ve gizlilik her şeyin üzerinde."
  vi: "Đồng đội AI cho các nhiệm vụ hàng ngày và học tập. Lập kế hoạch chuyến đi, thảo luận tin tức, xây dựng dự án - và nhiều hơn nữa. Với lợi ích người dùng và quyền riêng tư trên hết."
  id: "Rekan tim AI untuk tugas sehari-hari dan pembelajaran. Rencanakan perjalanan, diskusikan berita, bangun proyek - dan lebih banyak lagi. Dengan kepentingan pengguna dan privasi di atas segalanya."
  pl: "Asystenci AI dla codziennych zadań i nauki. Planuj podróże, dyskutuj o wiadomościach, buduj projekty - i wiele więcej. Z interesami użytkowników i prywatnością ponad wszystko."
  nl: "AI-teamgenoten voor dagelijkse taken en leren. Plan reizen, bespreek nieuws, bouw projecten - en meer. Met gebruikersbelangen en privacy boven alles."
  ar: "رفاق فريق الذكاء الاصطناعي للمهام اليومية والتعلم. خطط للرحلات، ناقش الأخبار، أنشئ المشاريع - والمزيد. مع اهتمامات المستخدم والخصوصية فوق كل شيء."
  hi: "रोजमर्रा के कार्यों और सीखने के लिए AI टीम साथी। यात्राएं योजना बनाएं, खबरें चर्चा करें, परियोजनाएं बनाएं - और बहुत कुछ। उपयोगकर्ता की रुचियों और गोपनीयता को सर्वोपरि रखते हुए।"
  th: "เพื่อนร่วมทีม AI สำหรับงานประจำวันและการเรียนรู้ วางแผนการเดินทาง พูดคุยเรื่องข่าว สร้างโปรเจกต์ - และอื่นๆ อีกมาก โดยให้ความสำคัญกับความสนใจของผู้ใช้และความเป็นส่วนตัวเป็นอันดับแรก"
  cs: "AI spoluhráči pro každodenní úkoly a učení. Plánujte výlety, diskutujte o novinkách, stavějte projekty - a mnohem více. S zájmy uživatelů a soukromím na prvním místě."
  sv: "AI-lagkamrater för vardagliga uppgifter och lärande. Planera resor, diskutera nyheter, bygg projekt - och mer. Med användarintressen och integritet framför allt annat."
  he: "חברי צוות AI למשימות יומיומיות ולמידה. תכנן טיולים, דון בחדשות, בנה פרויקטים - ועוד. עם האינטרסים של המשתמש ופרטיות מעל הכל."
  verified_by_human: []
