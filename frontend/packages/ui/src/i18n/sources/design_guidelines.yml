maximum_good:
  context: Main text explaining maximum good philosophy
  en: Over recent years, profit-at-all-cost tech monopolies have over and over again prioritized their greed instead of the interests of their users and our planet, ignoring the negative consequences and destruction caused by those decisions. We can't just continue like that.
  de: In den letzten Jahren haben Profit-um-jeden-Preis Tech-Monopole immer wieder ihre Gier über die Interessen ihrer Nutzer und unseres Planeten gestellt und dabei die negativen Folgen und Zerstörung ignoriert, die diese Entscheidungen verursachen. So können wir nicht weitermachen.
  zh: 近年来，不惜一切代价追求利润的科技垄断企业一再将贪婪置于用户和地球的利益之上，忽视了这些决定造成的负面后果和破坏。 我们不能再这样继续下去了。
  es: Durante los últimos años, los monopolios tecnológicos que buscan beneficios a toda costa han priorizado repetidamente su codicia por encima de los intereses de sus usuarios y nuestro planeta, ignorando las consecuencias negativas y la destrucción causada por esas decisiones. No podemos continuar así.
  fr: Au cours des dernières années, les monopoles technologiques privilégiant le profit à tout prix ont maintes et maintes fois privilégié leur cupidité au détriment des intérêts de leurs utilisateurs et de notre planète, ignorant les conséquences négatives et la destruction causées par ces décisions.  Nous ne pouvons pas continuer ainsi.
  pt: Nos últimos anos, os monopólios tecnológicos que buscam lucro a qualquer custo priorizaram repetidamente sua ganância em vez dos interesses de seus usuários e do nosso planeta, ignorando as consequências negativas e a destruição causadas por essas decisões. Não podemos simplesmente continuar assim.
  ru: В последние годы технологические монополии, стремящиеся к прибыли любой ценой, снова и снова ставили свою жадность выше интересов пользователей и нашей планеты, игнорируя негативные последствия и разрушения, причинённые этими решениями. Так продолжаться не может.
  ja: 近年、利益優先のテクノロジー独占企業は、ユーザーや地球の利益よりも自らの貪欲さを優先し、その決定がもたらす悪影響や破壊を無視し続けてきました。このままでは続けられません。
  ko: 최근 몇 년 동안, 어떤 대가를 치르더라도 이익을 추구하는 기술 독점 기업들은 사용자와 우리 지구의 이익 대신 탐욕을 반복적으로 우선시했으며, 그 결정으로 인한 부정적인 결과와 파괴를 무시했습니다. 우리는 그냥 그렇게 계속할 수 없습니다.
  it: Negli ultimi anni, i monopoli tecnologici orientati al profitto a tutti i costi hanno ripetutamente dato priorità alla loro avidità invece degli interessi dei loro utenti e del nostro pianeta, ignorando le conseguenze negative e la distruzione causate da quelle decisioni. Non possiamo semplicemente continuare così.
  tr: Son yıllarda, her ne pahasına olursa olsun kâr peşinde koşan teknoloji tekelleri, defalarca kendi açgözlülüklerini kullanıcılarının ve gezegenimizin çıkarlarının önüne koyarak bu kararların neden olduğu olumsuz sonuçları ve yıkımı görmezden gelmiştir. Böyle devam edemeyiz.
  vi: Trong những năm gần đây, các tập đoàn công nghệ theo đuổi lợi nhuận bằng mọi giá đã nhiều lần ưu tiên sự tham lam của họ thay vì lợi ích của người dùng và hành tinh của chúng ta, bỏ qua những hậu quả tiêu cực và sự hủy hoại do những quyết định đó gây ra. Chúng ta không thể cứ tiếp tục như vậy.
  id: Selama beberapa tahun terakhir, monopoli teknologi yang mencari keuntungan dengan segala cara telah berulang kali mengutamakan keserakahan mereka daripada kepentingan pengguna dan planet kita, mengabaikan konsekuensi negatif dan kehancuran yang disebabkan oleh keputusan-keputusan tersebut. Kita tidak bisa terus seperti itu.
  pl: W ostatnich latach, monopole technologiczne dążące do zysku za wszelką cenę, raz po raz stawiały swoją chciwość ponad interesy swoich użytkowników i naszej planety, ignorując negatywne konsekwencje i zniszczenia spowodowane tymi decyzjami. Nie możemy tak po prostu kontynuować.
  nl: In de afgelopen jaren hebben technologische monopolies die winst nastreven ten koste van alles, keer op keer hun hebzucht boven de belangen van hun gebruikers en onze planeet gesteld, waarbij ze de negatieve gevolgen en de vernietiging die door die beslissingen worden veroorzaakt, negeerden. We kunnen zo niet gewoon doorgaan.
  ar: على مدار السنوات الأخيرة، قدّمت احتكارات التكنولوجيا الساعية للربح بأي ثمن جشعها مراراً وتكراراً على حساب مصالح مستخدميها وكوكبنا، متجاهلةً العواقب السلبية والدمار الناجم عن تلك القرارات. لا يمكننا الاستمرار على هذا النحو.
  hi: हाल के वर्षों में, किसी भी कीमत पर लाभ कमाने वाले तकनीकी एकाधिकारों ने बार-बार अपने उपयोगकर्ताओं और हमारे ग्रह के हितों के बजाय अपने लालच को प्राथमिकता दी है, उन निर्णयों के कारण होने वाले नकारात्मक परिणामों और विनाश को नजरअंदाज करते हुए। हम बस इसी तरह जारी नहीं रह सकते।
  th: ในช่วงไม่กี่ปีที่ผ่านมา การผูกขาดทางเทคโนโลยีที่แสวงหากำไรอย่างไม่มีข้อจำกัดได้ให้ความสำคัญกับความโลภของตนมากกว่าผลประโยชน์ของผู้ใช้และโลกของเรา โดยไม่สนใจผลลัพธ์เชิงลบและความเสียหายที่เกิดจากการตัดสินใจเหล่านั้น เราไม่สามารถดำเนินต่อไปเช่นนี้ได้
  cs: V posledních letech technologické monopoly zaměřené na zisk za každou cenu opakovaně upřednostňovaly svou chamtivost před zájmy svých uživatelů a naší planety, přičemž ignorovaly negativní důsledky a ničení způsobené těmito rozhodnutími. Nemůžeme jen tak pokračovat.
  sv: Under de senaste åren har teknologiska monopol som strävar efter vinst till varje pris, gång på gång prioriterat sin girighet framför sina användares och vår planets intressen, och ignorerat de negativa konsekvenserna och den förstörelse som orsakades av dessa beslut. Vi kan inte bara fortsätta så.
  he: במהלך השנים האחרונות, מונופולי טכנולוגיה השואפים לרווח בכל מחיר העדיפו שוב ושוב את חמדנותם על פני האינטרסים של המשתמשים שלהם ושל כדור הארץ שלנו, תוך התעלמות מההשלכות השליליות ומההרס שנגרמו כתוצאה מהחלטות אלו. אנחנו לא יכולים פשוט להמשיך ככה.
  verified_by_human: []
maximum_good.subtext:
  context: Conclusion for maximum good section
  en: 'Therefore,

    OpenMates is designed

    with a focus on maximizing the positive impact of AI.

    '
  de: 'Deshalb wurde

    OpenMates mit Fokus auf die

    Maximierung des positiven Auswirkungen von KI entwickelt.

    '
  zh: '因此，

    OpenMates 的设计

    着重于最大化人工智能的积极影响。

    '
  es: 'Por lo tanto,

    OpenMates está diseñado

    con un enfoque en maximizar el impacto positivo de la IA.

    '
  fr: 'Par conséquent,

    OpenMates est conçu

    en mettant l''accent sur la maximisation de l''impact positif de l''IA.

    '
  pt: 'Por isso,

    o OpenMates foi desenvolvido

    com foco em maximizar o impacto positivo da IA.

    '
  ru: 'Поэтому

    OpenMates разработан

    с акцентом на максимизацию положительного воздействия ИИ.

    '
  ja: 'そのため、

    OpenMatesはAIの

    ポジティブな影響を最大化することに焦点を当てて設計されています。

    '
  ko: '따라서,

    OpenMates는 AI의

    긍정적인 영향을 극대화하는 데 중점을 두고 설계되었습니다.

    '
  it: 'Pertanto,

    OpenMates è progettato

    con un focus sulla massimizzazione dell''impatto positivo dell''IA.

    '
  tr: 'Bu nedenle,

    OpenMates yapay zekanın

    olumlu etkisini en üst düzeye çıkarmaya odaklanarak tasarlanmıştır.

    '
  vi: 'Do đó,

    OpenMates được thiết kế

    với trọng tâm là tối đa hóa tác động tích cực của AI.

    '
  id: 'Oleh karena itu,

    OpenMates dirancang

    dengan fokus memaksimalkan dampak positif AI.

    '
  pl: 'Dlatego

    OpenMates jest zaprojektowany

    z naciskiem na maksymalizację pozytywnego wpływu AI.

    '
  nl: 'Daarom is

    OpenMates ontworpen

    met een focus op het maximaliseren van de positieve impact van AI.

    '
  ar: 'لذلك،

    تم تصميم OpenMates

    مع التركيز على تعظيم الأثر الإيجابي للذكاء الاصطناعي.

    '
  hi: 'इसलिए,

    OpenMates को AI के

    सकारात्मक प्रभाव को अधिकतम करने पर ध्यान केंद्रित करके डिज़ाइन किया गया है।

    '
  th: 'ดังนั้น

    OpenMates จึงถูกออกแบบ

    โดยมุ่งเน้นที่การเพิ่มผลกระทบเชิงบวกของ AI สูงสุด

    '
  cs: 'Proto je

    OpenMates navržen

    se zaměřením na maximalizaci pozitivního dopadu AI.

    '
  sv: 'Därför är

    OpenMates designat

    med fokus på att maximera den positiva effekten av AI.

    '
  he: |
    לכן,
    OpenMates תוכננה
    עם דגש על מקסום ההשפעה החיובית של בינה מלאכותית.
