travel_can_add_local_context.body:
  context: Quick tip body explaining that OpenMates can help with travel-related next steps
  en: "After planning travel, OpenMates can also help find local places, events, stays, routes, and practical details for the same trip."
  de: "Nach der Reiseplanung kann OpenMates auch lokale Orte, Veranstaltungen, Unterkünfte, Routen und praktische Details für dieselbe Reise finden."
  es: "Después de planificar un viaje, OpenMates también puede ayudarte a encontrar lugares locales, eventos, alojamientos, rutas y detalles prácticos para el mismo viaje."
  zh: 在规划行程后，OpenMates 还可以帮助查找同一行程的当地地点、活动、住宿、路线和实用细节。
  fr: "Après avoir planifié un voyage, OpenMates peut aussi t'aider à trouver des lieux locaux, des événements, des hébergements, des itinéraires et des détails pratiques pour ce même voyage."
  pt: Depois de planeares uma viagem, o OpenMates também pode ajudar a encontrar locais, eventos, estadias, rotas e detalhes práticos para a mesma viagem.
  ru: После планирования поездки OpenMates также поможет найти интересные места, события, жилье, маршруты и полезные детали для этого путешествия.
  ja: 旅行の計画を立てた後、OpenMatesは同じ旅行の現地の場所、イベント、宿泊先、ルート、実用的な詳細を見つけるお手伝いもできます。
  ko: 여행 계획을 세운 후, OpenMates는 해당 여행의 현지 장소, 이벤트, 숙소, 경로 및 실용적인 세부 정보를 찾는 데 도움을 줄 수 있습니다.
  it: Dopo aver pianificato un viaggio, OpenMates può aiutarti a trovare luoghi locali, eventi, alloggi, percorsi e dettagli pratici per lo stesso viaggio.
  tr: Seyahat planladıktan sonra OpenMates; aynı gezi için yerel mekanlar, etkinlikler, konaklama yerleri, rotalar ve pratik detaylar bulmana da yardımcı olabilir.
  vi: Sau khi lập kế hoạch du lịch, OpenMates cũng có thể giúp tìm các địa điểm địa phương, sự kiện, nơi lưu trú, lộ trình và các chi tiết thực tế cho cùng chuyến đi đó.
  id: Setelah merencanakan perjalanan, OpenMates juga bisa membantu menemukan tempat lokal, acara, penginapan, rute, dan detail praktis untuk perjalanan yang sama.
  pl: Po zaplanowaniu podróży OpenMates może również pomóc w znalezieniu lokalnych miejsc, wydarzeń, noclegów, tras i praktycznych szczegółów dotyczących tej samej wyprawy.
  nl: Na het plannen van een reis kan OpenMates ook helpen bij het vinden van lokale plekken, evenementen, verblijven, routes en praktische details voor diezelfde reis.
  ar: بعد التخطيط للسفر، يمكن لـ OpenMates أيضاً المساعدة في العثور على أماكن محلية وفعاليات وإقامات ومسارات وتفاصيل عملية لنفس الرحلة.
  hi: यात्रा की योजना बनाने के बाद, OpenMates उसी यात्रा के लिए स्थानीय स्थानों, कार्यक्रमों, ठहरने की जगहों, रास्तों और व्यावहारिक विवरणों को खोजने में भी मदद कर सकता है।
  th: หลังจากวางแผนการเดินทางแล้ว OpenMates ยังสามารถช่วยค้นหาสถานที่ในท้องถิ่น กิจกรรม ที่พัก เส้นทาง และรายละเอียดที่เป็นประโยชน์สำหรับการเดินทางครั้งเดียวกันนี้ได้อีกด้วย
  cs: Po naplánování cesty ti OpenMates může pomoci najít místní podniky, události, ubytování, trasy a praktické detaily pro stejný výlet.
  sv: Efter att du har planerat en resa kan OpenMates även hjälpa till att hitta lokala platser, evenemang, boenden, rutter och praktiska detaljer för samma resa.
  he: לאחר תכנון הנסיעה, OpenMates יכול לעזור גם במציאת מקומות מקומיים, אירועים, מקומות לינה, מסלולים ופרטים פרקטיים לאותה נסיעה.
