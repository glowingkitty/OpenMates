search_current_info_next_time.body:
  context: Quick tip body explaining that OpenMates can search for current information next time
  en: "Next time you need current prices, events, news, product details, or recent facts, OpenMates can search the web for you."
  de: "Wenn du das nächste Mal aktuelle Preise, Veranstaltungen, Nachrichten, Produktdetails oder neue Fakten brauchst, kann OpenMates für dich im Web suchen."
  es: "La próxima vez que necesites precios actuales, eventos, noticias, detalles de productos o datos recientes, OpenMates puede buscar en la web por ti."
  zh: 下次当你需要了解当前价格、活动、新闻、产品详情或近期事实时，OpenMates 可以为你搜索网页。
  fr: "La prochaine fois que tu auras besoin de prix actuels, d'événements, d'actualités, de détails sur un produit ou de faits récents, OpenMates pourra faire des recherches sur le web pour toi."
  pt: Da próxima vez que precisares de preços atuais, eventos, notícias, detalhes de produtos ou factos recentes, o OpenMates pode pesquisar na web por ti.
  ru: В следующий раз, когда тебе понадобятся актуальные цены, события, новости, сведения о товарах или свежие факты, OpenMates сможет найти их в сети.
  ja: 次回、最新の価格、イベント、ニュース、製品の詳細、または最近の事実が必要なときは、OpenMatesがウェブを検索します。
  ko: 다음번에 최신 가격, 이벤트, 뉴스, 제품 상세 정보 또는 최근 사실이 필요할 때 OpenMates가 웹에서 대신 검색해 드립니다.
  it: La prossima volta che avrai bisogno di prezzi aggiornati, eventi, notizie, dettagli sui prodotti o fatti recenti, OpenMates potrà cercare sul web per te.
  tr: "Bir dahaki sefere güncel fiyatlara, etkinliklere, haberlere, ürün detaylarına veya yeni bilgilere ihtiyaç duyduğunda, OpenMates senin için web'de arama yapabilir."
  vi: Lần tới khi bạn cần giá cả hiện tại, sự kiện, tin tức, chi tiết sản phẩm hoặc các sự kiện gần đây, OpenMates có thể tìm kiếm trên web giúp bạn.
  id: Lain kali kamu butuh harga terkini, acara, berita, detail produk, atau fakta terbaru, OpenMates bisa mencari di web untukmu.
  pl: Gdy następnym razem będziesz potrzebować aktualnych cen, wydarzeń, wiadomości, szczegółów produktów lub najnowszych faktów, OpenMates może przeszukać dla Ciebie sieć.
  nl: De volgende keer dat je actuele prijzen, evenementen, nieuws, productdetails of recente feiten nodig hebt, kan OpenMates het web voor je doorzoeken.
  ar: في المرة القادمة التي تحتاج فيها إلى أسعار حالية أو فعاليات أو أخبار أو تفاصيل منتجات أو حقائق حديثة، يمكن لـ OpenMates البحث في الويب من أجلك.
  hi: अगली बार जब तुम्हें मौजूदा कीमतों, कार्यक्रमों, समाचारों, उत्पाद विवरणों या हाल के तथ्यों की ज़रूरत हो, तो OpenMates तुम्हारे लिए वेब पर खोज कर सकता है।
  th: ครั้งหน้าที่คุณต้องการทราบราคาปัจจุบัน กิจกรรม ข่าวสาร รายละเอียดผลิตภัณฑ์ หรือข้อเท็จจริงล่าสุด OpenMates สามารถค้นหาเว็บให้คุณได้
  cs: Až budeš příště potřebovat aktuální ceny, události, zprávy, podrobnosti o produktech nebo nedávná fakta, OpenMates za tebe může prohledat web.
  sv: Nästa gång du behöver aktuella priser, evenemang, nyheter, produktinformation eller färska fakta kan OpenMates söka på webben åt dig.
  he: בפעם הבאה שתצטרך מחירים עדכניים, אירועים, חדשות, פרטי מוצרים או עובדות מהזמן האחרון, OpenMates יוכל לחפש באינטרנט עבורך.
