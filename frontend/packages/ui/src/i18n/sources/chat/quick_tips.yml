shorter_chats_equal_better_responses.body:
  context: Quick tip body explaining that shorter separate chats improve results and reduce credits
  en: "You get better responses and save credits when you split topics into separate shorter chats."
  de: "Du bekommst bessere Antworten und sparst Credits, wenn du Themen in separate, kürzere Chats aufteilst."
  es: "Obtienes mejores respuestas y ahorras créditos cuando separas los temas en chats más cortos."
  zh: 将不同主题拆分为较短的独立对话，可以获得更好的回复并节省额度。
  fr: Tu obtiens de meilleures réponses et économises des crédits en divisant les sujets en plusieurs chats plus courts.
  pt: Obténs melhores respostas e poupas créditos ao dividir os tópicos em chats separados e mais curtos.
  ru: Ответы будут точнее, а расход кредитов — меньше, если разделять темы на короткие чаты.
  ja: トピックを個別の短いチャットに分けることで、より良い回答が得られ、クレジットも節約できます。
  ko: 주제별로 대화를 짧게 나누면 더 정확한 답변을 얻고 크레딧도 절약할 수 있습니다.
  it: Ottieni risposte migliori e risparmi crediti quando dividi gli argomenti in chat separate più brevi.
  tr: Konuları ayrı ve daha kısa sohbetlere böldüğünde daha iyi yanıtlar alır ve kredi tasarrufu sağlarsın.
  vi: Bạn sẽ nhận được phản hồi tốt hơn và tiết kiệm tín dụng khi chia các chủ đề thành những cuộc trò chuyện ngắn riêng biệt.
  id: Kamu akan mendapatkan respons yang lebih baik dan menghemat kredit saat membagi topik ke dalam obrolan terpisah yang lebih pendek.
  pl: Otrzymasz lepsze odpowiedzi i zaoszczędzisz kredyty, dzieląc tematy na osobne, krótsze czaty.
  nl: Je krijgt betere antwoorden en bespaart credits wanneer je onderwerpen opsplitst in afzonderlijke, kortere chats.
  ar: ستحصل على ردود أفضل وتوفر الرصيد عند تقسيم المواضيع إلى دردشات منفصلة وأقصر.
  hi: जब आप विषयों को अलग-अलग छोटी चैट में बांटते हैं, तो आपको बेहतर जवाब मिलते हैं और क्रेडिट की बचत होती है।
  th: คุณจะได้รับคำตอบที่ดีกว่าและประหยัดเครดิตเมื่อแยกหัวข้อต่างๆ ออกเป็นแชทสั้นๆ หลายแชท
  cs: Získáš lepší odpovědi a ušetříš kredity, když témata rozdělíš do samostatných kratších chatů.
  sv: Du får bättre svar och sparar krediter när du delar upp ämnen i separata, kortare chattar.
  he: "תקבל תשובות טובות יותר ותחסוך קרדיטים כשתפצל נושאים לצ'אטים קצרים ונפרדים."
