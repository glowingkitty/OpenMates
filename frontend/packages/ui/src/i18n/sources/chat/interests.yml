title:
  context: Prompt shown after "Hey there!" once logged-out tag selection is skipped or completed
  en: "Explore what you can do:"
  de: "Wähle, was dir wichtig ist. Deine Auswahl bleibt in dieser Browsersitzung."
  zh: "选择你关心的内容。你的选择只保留在此浏览器会话中。"
  es: "Elige lo que te importa. Tus elecciones se quedan en esta sesión del navegador."
  fr: "Choisissez ce qui vous intéresse. Vos choix restent dans cette session de navigateur."
  pt: "Escolha o que importa para você. Suas escolhas ficam nesta sessão do navegador."
  ru: "Выберите, что вам интересно. Ваш выбор останется только в этой сессии браузера."
  ja: "関心のあるものを選んでください。選択内容はこのブラウザーセッション内に留まります。"
  ko: "관심 있는 항목을 선택하세요. 선택 내용은 이 브라우저 세션에만 저장됩니다."
  it: "Scegli ciò che ti interessa. Le scelte restano in questa sessione del browser."
  tr: "Önemsediğin konuları seç. Seçimlerin bu tarayıcı oturumunda kalır."
  vi: "Chọn điều bạn quan tâm. Lựa chọn chỉ ở trong phiên trình duyệt này."
  id: "Pilih hal yang Anda pedulikan. Pilihan tetap di sesi browser ini."
  pl: "Wybierz, co Cię interesuje. Wybory zostają w tej sesji przeglądarki."
  nl: "Kies wat je belangrijk vindt. Je keuzes blijven in deze browsersessie."
  ar: "اختر ما يهمك. تبقى اختياراتك في جلسة المتصفح هذه."
  hi: "जो आपके लिए मायने रखता है उसे चुनें। आपकी पसंद इसी ब्राउज़र सत्र में रहती है।"
  th: "เลือกสิ่งที่คุณสนใจ ตัวเลือกจะอยู่ในเซสชันเบราว์เซอร์นี้เท่านั้น"
  cs: "Vyberte, na čem vám záleží. Volby zůstanou v této relaci prohlížeče."
  sv: "Välj vad du bryr dig om. Dina val stannar i den här webbläsarsessionen."
  he: "בחר מה חשוב לך. הבחירות נשארות בסשן הדפדפן הזה."
  verified_by_human: []
