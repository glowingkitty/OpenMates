  de: Dieser Chat kann bis zu 20 parallele Sub-Chats gleichzeitig starten. Nutze eine sequenzielle Warteschlange für größere Mengen.
  zh: 此对话一次最多可启动 20 个并行子对话。如需更大批量，请使用顺序队列。
  es: Este chat puede iniciar hasta 20 subchats paralelos a la vez. Usa una cola secuencial para lotes más grandes.
  fr: "Ce chat peut lancer jusqu'à 20 sous-chats parallèles à la fois. Utilise une file d'attente séquentielle pour les lots plus importants."
  pt: Este chat pode iniciar até 20 sub-chats paralelos de uma vez. Usa uma fila sequencial para lotes maiores.
  ru: В этом чате можно запустить до 20 параллельных подчатов одновременно. Для большего количества используй последовательную очередь.
  ja: このチャットでは、一度に最大20件の並列サブチャットを開始できます。より大きなバッチには順次キューを使用してください。
  ko: 이 대화에서는 한 번에 최대 20개의 병렬 하위 대화를 시작할 수 있습니다. 더 많은 양은 순차 대기열을 사용하세요.
  it: Questa chat può avviare fino a 20 sotto-chat parallele contemporaneamente. Usa una coda sequenziale per lotti più grandi.
  tr: Bu sohbet aynı anda en fazla 20 paralel alt sohbet başlatabilir. Daha büyük gruplar için sıralı kuyruk kullan.
  vi: Cuộc trò chuyện này có thể bắt đầu tối đa 20 cuộc trò chuyện phụ song song cùng lúc. Hãy sử dụng hàng đợi tuần tự cho các đợt lớn hơn.
  id: Obrolan ini dapat memulai hingga 20 sub-obrolan paralel sekaligus. Gunakan antrean berurutan untuk batch yang lebih besar.
  pl: Ten czat może uruchomić do 20 równoległych podczatów jednocześnie. W przypadku większych partii użyj kolejki sekwencyjnej.
  nl: Deze chat kan maximaal 20 parallelle subchats tegelijk starten. Gebruik een sequentiële wachtrij voor grotere batches.
  ar: يمكن لهذه الدردشة بدء ما يصل إلى 20 دردشة فرعية متوازية في وقت واحد. استخدم قائمة انتظار متسلسلة للمجموعات الأكبر.
  hi: यह चैट एक साथ 20 पैरेलल सब-चैट तक शुरू कर सकती है। बड़े बैच के लिए सीक्वेंशियल कतार का इस्तेमाल करें।
  th: แชทนี้สามารถเริ่มแชทย่อยแบบขนานได้สูงสุด 20 รายการพร้อมกัน โปรดใช้คิวแบบลำดับสำหรับชุดข้อมูลที่ใหญ่กว่านี้
  cs: Tento chat může spustit až 20 paralelních podchatů najednou. Pro větší dávky použij sekvenční frontu.
  sv: Den här chatten kan starta upp till 20 parallella underchattar samtidigt. Använd en sekventiell kö för större batcher.
  he: "צ'אט זה יכול להפעיל עד 20 צ'אטי משנה מקבילים בו-זמנית. השתמש בתור רציף עבור קבוצות גדולות יותר."
