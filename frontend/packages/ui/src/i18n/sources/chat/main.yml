sub_chats.confirmation_description:
  context: Description for inline sub-chat confirmation. {auto} is the number allowed without confirmation, {max} is the concurrent parallel sub-chat cap.
  en: OpenMates starts up to {auto} automatically. Larger batches need your approval, and parallel batches can start up to {max} sub-chats at once. Sequential queues can be larger.
  de: "OpenMates startet bis zu {auto} automatisch. Größere Mengen benötigen deine Zustimmung, und parallele Stapel können bis zu {max} Sub-Chats gleichzeitig starten. Sequenzielle Warteschlangen können größer sein."
  zh: "OpenMates 会自动启动最多 {auto} 个子对话。更大批量的启动需要你的批准，且并行批次一次最多可启动 {max} 个子对话。顺序队列可以包含更多数量。"
  es: "OpenMates inicia hasta {auto} automáticamente. Los lotes más grandes necesitan tu aprobación, y los lotes paralelos pueden iniciar hasta {max} subchats a la vez. Las colas secuenciales pueden ser más grandes."
  fr: "OpenMates en lance jusqu'à {auto} automatiquement. Les lots plus importants nécessitent ton approbation, et les lots parallèles peuvent lancer jusqu'à {max} sous-chats à la fois. Les files d'attente séquentielles peuvent être plus grandes."
  pt: "O OpenMates inicia até {auto} automaticamente. Lotes maiores precisam da tua aprovação, e lotes paralelos podem iniciar até {max} sub-chats de uma vez. Filas sequenciais podem ser maiores."
  ru: "OpenMates запускает до {auto} чатов автоматически. Для большего количества нужно твое подтверждение. Одновременно может работать до {max} параллельных чатов, последовательные очереди могут быть больше."
  ja: "OpenMatesは最大 {auto} 件まで自動的に開始します。それ以上のバッチには承認が必要で、並列バッチでは一度に最大 {max} 件のサブチャットを開始できます。順次キューはそれ以上の件数に対応可能です。"
  ko: "OpenMates는 최대 {auto}개까지 자동으로 시작합니다. 그 이상의 대화는 승인이 필요하며, 병렬 배치는 한 번에 최대 {max}개의 하위 대화를 시작할 수 있습니다. 순차 대기열은 더 크게 설정할 수 있습니다."
  it: "OpenMates ne avvia automaticamente fino a {auto}. I lotti più grandi richiedono la tua approvazione e i lotti paralleli possono avviare fino a {max} sotto-chat contemporaneamente. Le code sequenziali possono essere più grandi."
  tr: "OpenMates en fazla {auto} sohbeti otomatik olarak başlatır. Daha büyük gruplar onayını gerektirir ve paralel gruplar aynı anda en fazla {max} alt sohbet başlatabilir. Sıralı kuyruklar daha büyük olabilir."
  vi: "OpenMates tự động bắt đầu tối đa {auto} cuộc trò chuyện. Các đợt lớn hơn cần bạn phê duyệt và các đợt song song có thể bắt đầu tối đa {max} cuộc trò chuyện phụ cùng lúc. Hàng đợi tuần tự có thể lớn hơn."
  id: "OpenMates memulai hingga {auto} secara otomatis. Batch yang lebih besar memerlukan persetujuanmu, dan batch paralel dapat memulai hingga {max} sub-obrolan sekaligus. Antrean berurutan bisa lebih besar."
  pl: "OpenMates automatycznie uruchamia do {auto}. Większe partie wymagają Twojej zgody, a partie równoległe mogą uruchamiać do {max} podczatów jednocześnie. Kolejki sekwencyjne mogą być większe."
  nl: "OpenMates start er maximaal {auto} automatisch. Voor grotere batches is je goedkeuring nodig, en parallelle batches kunnen maximaal {max} subchats tegelijk starten. Sequentiële wachtrijen kunnen groter zijn."
  ar: "يبدأ OpenMates ما يصل إلى {auto} تلقائيًا. تتطلب المجموعات الأكبر موافقتك، ويمكن للمجموعات المتوازية بدء ما يصل إلى {max} من الدردشات الفرعية في وقت واحد. يمكن أن تكون قوائم الانتظار المتسلسلة أكبر."
  hi: "OpenMates {auto} तक अपने आप शुरू कर देता है। बड़े बैच के लिए आपकी मंज़ूरी चाहिए, और पैरेलल बैच एक साथ {max} सब-चैट तक शुरू कर सकते हैं। सीक्वेंशियल (क्रमवार) कतारें इससे बड़ी हो सकती हैं।"
  th: "OpenMates จะเริ่มทำงานสูงสุด {auto} รายการโดยอัตโนมัติ ชุดข้อมูลที่ใหญ่กว่านี้ต้องได้รับการอนุมัติจากคุณ และการทำงานแบบขนานสามารถเริ่มแชทย่อยได้สูงสุด {max} รายการพร้อมกัน ส่วนคิวแบบลำดับสามารถมีขนาดใหญ่กว่านี้ได้"
  cs: "OpenMates automaticky spouští až {auto}. Větší dávky vyžadují tvůj souhlas a paralelní dávky mohou spustit až {max} podchatů najednou. Sekvenční fronty mohou být větší."
  sv: "OpenMates startar upp till {auto} automatiskt. Större batcher kräver ditt godkännande, och parallella batcher kan starta upp till {max} underchattar samtidigt. Sekventiella köer kan vara större."
  he: "OpenMates מתחילה עד {auto} באופן אוטומטי. קבוצות גדולות יותר דורשות את אישורך, וקבוצות מקבילות יכולות להפעיל עד {max} צ'אטי-משנה בו-זמנית. תורים רציפים יכולים להיות גדולים יותר."
  verified_by_human: []

