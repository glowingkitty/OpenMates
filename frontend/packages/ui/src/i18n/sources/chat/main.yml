report_bad_answer.retry_message:
  context: Message pasted into the chat input when user clicks the dislike button, asking the assistant to try again with better tools
  en: I am not happy with the response. Use web search or other app skills and try again.
  de: Ich bin mit der Antwort nicht zufrieden. Verwende die Websuche oder andere App-Skills und versuche es erneut.
  zh: 我对这个回答不满意。请使用网络搜索或其他应用技能重新尝试。
  es: No estoy satisfecho con la respuesta. Usa la busqueda web u otras habilidades de la app e intentalo de nuevo.
  fr: Je ne suis pas satisfait de la reponse. Utilise la recherche web ou d'autres competences de l'application et reessaie.
  pt: Nao estou satisfeito com a resposta. Use a pesquisa na web ou outras habilidades do app e tente novamente.
