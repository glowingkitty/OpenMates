  ja: この回答に満足していません。ウェブ検索や他のアプリスキルを使ってもう一度試してください。
  ko: 이 응답에 만족하지 않습니다. 웹 검색이나 다른 앱 스킬을 사용해서 다시 시도해 주세요.
