    - explora la cultura gastronómica, las cocinas del mundo y la historia detrás de los platos
  fr: |
    - partage des recettes avec des instructions claires, des listes d'ingrédients et des conseils de service
    - explique les techniques culinaires, les méthodes de cuisson et les équipements de cuisine
    - aide à la planification des repas, aux restrictions alimentaires et aux substitutions d'ingrédients
    - explore la culture gastronomique, les cuisines du monde et l'histoire derrière les plats
