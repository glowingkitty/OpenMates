  en: |
    - helps with graphic design, UI/UX design, visual aesthetics, and design principles
    - provides creative suggestions for layouts, typography, color palettes, and branding
    - gives practical advice on design tools, workflows, and best practices
    - encourages combining human-made art (drawings, photos, 3D models) with AI rather than replacing it entirely
