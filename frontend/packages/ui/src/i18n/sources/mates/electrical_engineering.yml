process:
  context: Bullet-point summary of what Elton (electrical engineering mate) does, shown in mate settings as key capabilities
  en: |
    - helps with circuit design, electronics troubleshooting, and electrical systems
    - provides accurate technical information on components, protocols, and standards
    - assists with problem-solving for embedded systems, PCB design, and power electronics
    - explains engineering concepts clearly for both beginners and experienced engineers
  de: |
    - hilft bei Schaltkreisdesign, Elektronik-Fehlersuche und elektrischen Systemen
    - liefert genaue technische Informationen zu Komponenten, Protokollen und Standards
    - unterstützt bei der Problemlösung für eingebettete Systeme, PCB-Design und Leistungselektronik
    - erklärt Ingenieurskonzepte klar für Anfänger und erfahrene Ingenieure
  zh: |
    - 帮助进行电路设计、电子故障排除和电气系统
    - 提供有关元件、协议和标准的准确技术信息
    - 协助解决嵌入式系统、PCB设计和功率电子问题
    - 为初学者和有经验的工程师清晰解释工程概念
  es: |
    - ayuda con el diseño de circuitos, solución de problemas de electrónica y sistemas eléctricos
    - proporciona información técnica precisa sobre componentes, protocolos y estándares
    - asiste con la resolución de problemas de sistemas embebidos, diseño de PCB y electrónica de potencia
    - explica conceptos de ingeniería claramente tanto para principiantes como para ingenieros experimentados
  fr: |
    - aide avec la conception de circuits, le dépannage électronique et les systèmes électriques
    - fournit des informations techniques précises sur les composants, protocoles et normes
    - assiste dans la résolution de problèmes pour les systèmes embarqués, la conception de PCB et l'électronique de puissance
    - explique les concepts d'ingénierie clairement pour les débutants et les ingénieurs expérimentés
  pt: |
    - ajuda com design de circuitos, solução de problemas eletrônicos e sistemas elétricos
    - fornece informações técnicas precisas sobre componentes, protocolos e padrões
    - auxilia na resolução de problemas para sistemas embarcados, design de PCB e eletrônica de potência
    - explica conceitos de engenharia claramente tanto para iniciantes quanto para engenheiros experientes
  ru: |
    - помогает с проектированием схем, устранением неисправностей в электронике и электрических системах
    - предоставляет точную техническую информацию о компонентах, протоколах и стандартах
    - помогает решать задачи встраиваемых систем, проектирования PCB и силовой электроники
    - объясняет инженерные концепции понятно как для новичков, так и для опытных инженеров
  ja: |
    - 回路設計、電子機器のトラブルシューティング、電気システムを支援します
    - 部品、プロトコル、規格に関する正確な技術情報を提供します
    - 組み込みシステム、PCB設計、電力電子機器の問題解決を支援します
    - 初心者にも経験豊富なエンジニアにも明確に工学の概念を説明します
  ko: |
