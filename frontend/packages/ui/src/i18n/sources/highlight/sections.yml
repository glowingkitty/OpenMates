ask.paragraph:
  context: Example text for Ask section
  en: 'For example:

    Get career advice

    based on your interests.

    '
  de: 'Zum Beispiel:

    Erhalte Karriereberatung

    basierend auf deinen Interessen.

    '
  zh: '例如：

    根据你的兴趣

    获得职业建议。

    '
  es: 'Por ejemplo:

    Obtén asesoramiento profesional

    basado en tus intereses.

    '
  fr: 'Par exemple :

    Obtenez des conseils de carrière

    en fonction de vos intérêts.

    '
  pt: 'Por exemplo:

    Obtenha aconselhamento de carreira

    com base nos seus interesses.

    '
  ru: 'Например:

    Получите советы по карьере

    на основе ваших интересов.

    '
  ja: '例えば：

    あなたの興味に基づいた

    キャリアアドバイスを受けられます。

    '
  ko: '예를 들어:

    관심사를 바탕으로

    커리어 조언을 받으세요.

    '
  it: 'Per esempio:

    Ricevi consigli sulla carriera

    in base ai tuoi interessi.

    '
  tr: 'Örneğin:

    İlgi alanlarınıza göre

    kariyer tavsiyesi alın.

    '
  vi: 'Ví dụ:

    Nhận lời khuyên về sự nghiệp

    dựa trên sở thích của bạn.

    '
  id: 'Misalnya:

    Dapatkan saran karier

    berdasarkan minat Anda.

    '
  pl: 'Na przykład:

    Uzyskaj porady dotyczące kariery

    na podstawie swoich zainteresowań.

    '
  nl: 'Bijvoorbeeld:

    Ontvang loopbaanadvies

    op basis van uw interesses.

    '
  ar: 'على سبيل المثال:

    احصل على نصائح مهنية

    بناءً على اهتماماتك.

    '
  hi: 'उदाहरण के लिए:

    अपनी रुचियों के आधार पर

    करियर सलाह प्राप्त करें।

    '
  th: 'ตัวอย่างเช่น:

    รับคำแนะนำด้านอาชีพ

    ตามความสนใจของคุณ

    '
  cs: 'Například:

    Získejte kariérní poradenství

    na základě vašich zájmů.

    '
  sv: 'Till exempel:

    Få karriärrådgivning

    baserat på dina intressen.

    '
  he: |
    לדוגמה:
    קבל ייעוץ קריירה
    על סמך תחומי העניין שלך.
  verified_by_human: []
