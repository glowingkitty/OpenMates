tasks.paragraph:
  context: Example text for Tasks section
  en: 'For example:

    Find doctor appointments

    that don''t collide with your calendar

    on Doctolib & Jameda.

    '
  de: 'Zum Beispiel:

    Finde Arzttermine

    die nicht mit deinem Kalender kollidieren

    auf Doctolib & Jameda.

    '
  zh: '例如：

    在 Doctolib 和 Jameda 上

    查找不与你的日历冲突的

    医生预约。

    '
  es: 'Por ejemplo:

    Encuentra citas médicas

    que no colisionen con tu calendario

    en Doctolib y Jameda.

    '
  fr: 'Par exemple :

    Trouvez des rendez-vous médicaux

    qui ne coïncident pas avec votre calendrier

    sur Doctolib & Jameda.

    '
  pt: 'Por exemplo:

    Encontre consultas médicas

    que não conflitem com o seu calendário

    no Doctolib & Jameda.

    '
  ru: 'Например:

    Найдите приёмы врача

    которые не пересекаются с вашим календарём

    на Doctolib & Jameda.

    '
  ja: '例えば：

    Doctolib & Jamedaで

    あなたのカレンダーと重ならない

    医師の予約を探します。

    '
  ko: '예를 들어:

    Doctolib & Jameda에서

    일정과 겹치지 않는

    의사 예약을 찾으세요.

    '
  it: 'Per esempio:

    Trova appuntamenti dal medico

    che non si sovrappongano al tuo calendario

    su Doctolib & Jameda.

    '
  tr: 'Örneğin:

    Doctolib & Jameda''da

    takviminizle çakışmayan

    doktor randevusu bulun.

    '
  vi: 'Ví dụ:

    Tìm lịch hẹn bác sĩ

    không trùng với lịch của bạn

    trên Doctolib & Jameda.

    '
  id: 'Misalnya:

    Temukan janji dokter

    yang tidak bentrok dengan kalender Anda

    di Doctolib & Jameda.

    '
  pl: 'Na przykład:

    Znajdź terminy u lekarza

    które nie kolidują z Twoim kalendarzem

    na Doctolib & Jameda.

    '
  nl: 'Bijvoorbeeld:

    Vind doktersafspraken

    die niet conflicteren met uw agenda

    op Doctolib & Jameda.

    '
  ar: 'على سبيل المثال:

    ابحث عن مواعيد الطبيب

    التي لا تتعارض مع تقويمك

    على Doctolib & Jameda.

    '
  hi: 'उदाहरण के लिए:

    Doctolib & Jameda पर

    ऐसे डॉक्टर अपॉइंटमेंट खोजें

    जो आपके कैलेंडर से न टकराएं।

    '
  th: 'ตัวอย่างเช่น:

    ค้นหาการนัดพบแพทย์

    ที่ไม่ขัดกับปฏิทินของคุณ

    บน Doctolib & Jameda

    '
  cs: 'Například:

    Najděte termíny u lékaře

    které nekolidují s vaším kalendářem

    na Doctolib & Jameda.

    '
  sv: 'Till exempel:

    Hitta läkartider

    som inte krockar med din kalender

    på Doctolib & Jameda.

    '
  he: |
    לדוגמה:
    מצא תורים לרופא
    שלא מתנגשים עם היומן שלך
    ב-Doctolib ו-Jameda.
  verified_by_human: []
