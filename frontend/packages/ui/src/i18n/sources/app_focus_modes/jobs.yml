career_insights.process:
  context: Bullet-point process summary for career insights focus mode, shown on the settings page. Each line starts with "- ".
  en: |
    - Understands your current job situation and what's prompting a change
    - Explores what energizes and drains you in past and current roles
    - Identifies your core skills, strengths, and areas of expertise
    - Discusses your values, interests, and priorities in a career
    - Considers practical constraints (location, finances, family, timeline)
    - Suggests 2–4 concrete career directions that match your profile
    - Provides actionable next steps (networking, upskilling, job boards)
  he: |
    - הבנת מצב התעסוקה הנוכחי שלך ומה מניע את השינוי
    - בחינת מה שמעניק לך אנרגיה ומה שמרוקן אותך בתפקידים קודמים ונוכחיים
    - זיהוי מיומנויות הליבה, החוזקות ותחומי המומחיות שלך
    - דיון בערכים, בתחומי העניין ובעדיפויות שלך בקריירה
    - התחשבות במגבלות מעשיות (מיקום, מצב כלכלי, משפחה, לוחות זמנים)
    - הצעה של 2–4 כיווני קריירה קונקרטיים שמתאימים לפרופיל שלך
    - מתן צעדים מעשיים להמשך (נטוורקינג, שדרוג מיומנויות, לוחות דרושים)
  verified_by_human:
    - en
  de: |
    - Versteht deine aktuelle berufliche Situation und was einen Wechsel antreibt
    - Erkundet, was dich in vergangenen und aktuellen Rollen energetisiert und erschöpft
    - Identifiziert deine Kernkompetenzen, Stärken und Fachkenntnisse
    - Bespricht deine Werte, Interessen und Prioritäten in einer Karriere
    - Berücksichtigt praktische Einschränkungen (Standort, Finanzen, Familie, Zeitplan)
    - Schlägt 2–4 konkrete Karriererichtungen vor, die zu deinem Profil passen
    - Bietet umsetzbare nächste Schritte (Networking, Weiterbildung, Jobbörsen)
  zh: |
    - 了解你目前的工作状况以及促使变化的原因
    - 探索在过去和当前职位中什么让你充满活力、什么让你精疲力竭
    - 识别你的核心技能、优势和专业领域
    - 讨论你在职业生涯中的价值观、兴趣和优先事项
    - 考虑实际限制（地点、财务、家庭、时间表）
    - 建议 2–4 个符合你个人特点的具体职业方向
    - 提供可行的下一步行动（人际网络、技能提升、招聘平台）
  es: |
    - Entiende tu situación laboral actual y qué impulsa el cambio
    - Explora qué te da energía y qué te agota en roles pasados y actuales
    - Identifica tus habilidades clave, fortalezas y áreas de especialización
    - Analiza tus valores, intereses y prioridades en una carrera
    - Considera restricciones prácticas (ubicación, finanzas, familia, cronograma)
    - Sugiere 2–4 direcciones de carrera concretas que se ajustan a tu perfil
    - Proporciona pasos accionables (networking, actualización de habilidades, bolsas de trabajo)
  fr: |
    - Comprend votre situation professionnelle actuelle et ce qui motive un changement
    - Explore ce qui vous dynamise et vous épuise dans vos rôles passés et actuels
    - Identifie vos compétences clés, vos forces et vos domaines d'expertise
    - Discute de vos valeurs, intérêts et priorités dans une carrière
    - Tient compte des contraintes pratiques (lieu, finances, famille, calendrier)
    - Suggère 2–4 orientations de carrière concrètes correspondant à votre profil
    - Fournit des prochaines étapes concrètes (réseautage, montée en compétences, plateformes d'emploi)
  pt: |
    - Compreende sua situação profissional atual e o que motiva uma mudança
    - Explora o que te energiza e esgota em funções passadas e atuais
    - Identifica suas habilidades essenciais, pontos fortes e áreas de especialização
    - Discute seus valores, interesses e prioridades em uma carreira
    - Considera restrições práticas (localização, finanças, família, cronograma)
    - Sugere 2–4 direções de carreira concretas que correspondem ao seu perfil
    - Fornece próximos passos acionáveis (networking, aprimoramento de habilidades, plataformas de emprego)
  ru: |
    - Понимает вашу текущую профессиональную ситуацию и что побуждает к переменам
    - Исследует, что вас заряжает и истощает в прошлых и текущих ролях
    - Определяет ваши ключевые навыки, сильные стороны и области экспертизы
    - Обсуждает ваши ценности, интересы и приоритеты в карьере
    - Учитывает практические ограничения (местоположение, финансы, семья, сроки)
    - Предлагает 2–4 конкретных карьерных направления, соответствующих вашему профилю
    - Предоставляет практические следующие шаги (нетворкинг, повышение квалификации, биржи труда)
  ja: |
    - 現在の仕事の状況と変化を促しているものを理解する
    - 過去と現在の役割で何があなたを活性化させ、何があなたを消耗させるかを探る
    - コアスキル、強み、専門分野を特定する
    - キャリアにおける価値観、興味、優先事項を話し合う
    - 実際の制約（場所、財務、家族、タイムライン）を考慮する
    - あなたのプロフィールに合った2〜4つの具体的なキャリア方向を提案する
    - 実行可能な次のステップを提供する（ネットワーキング、スキルアップ、求人掲示板）
  ko: |
    - 현재 직업 상황과 변화를 촉진하는 요인을 이해합니다
    - 과거 및 현재 역할에서 활력을 주는 것과 소진시키는 것을 탐색합니다
    - 핵심 기술, 강점 및 전문 영역을 파악합니다
    - 커리어에서 가치관, 관심사 및 우선순위를 논의합니다
    - 실질적인 제약 조건(위치, 재정, 가족, 일정)을 고려합니다
    - 프로필에 맞는 2–4개의 구체적인 커리어 방향을 제안합니다
    - 실행 가능한 다음 단계를 제공합니다 (네트워킹, 역량 강화, 구직 게시판)
  it: |
    - Comprende la tua situazione lavorativa attuale e cosa sta spingendo un cambiamento
    - Esplora cosa ti energizza e cosa ti esaurisce nei ruoli passati e attuali
    - Identifica le tue competenze principali, punti di forza e aree di specializzazione
    - Discute i tuoi valori, interessi e priorità in una carriera
    - Considera i vincoli pratici (posizione, finanze, famiglia, tempistiche)
    - Suggerisce 2–4 direzioni di carriera concrete che si adattano al tuo profilo
    - Fornisce prossimi passi attuabili (networking, aggiornamento competenze, bacheche di lavoro)
  tr: |
    - Mevcut iş durumunuzu ve değişimi neyin tetiklediğini anlar
    - Geçmiş ve mevcut rollerde sizi neyin enerjilendirdiğini ve neyin tükettiğini keşfeder
    - Temel becerilerinizi, güçlü yönlerinizi ve uzmanlık alanlarınızı belirler
    - Kariyer değerlerinizi, ilgi alanlarınızı ve önceliklerinizi tartışır
    - Pratik kısıtlamaları göz önünde bulundurur (konum, finanslar, aile, zaman çizelgesi)
    - Profilinize uyan 2–4 somut kariyer yönü önerir
    - Uygulanabilir sonraki adımlar sunar (ağ oluşturma, beceri geliştirme, iş ilanı panoları)
  vi: |
    - Hiểu tình trạng công việc hiện tại và điều gì thúc đẩy sự thay đổi
    - Khám phá điều gì tiếp thêm năng lượng và điều gì khiến bạn kiệt sức ở các vai trò trước và hiện tại
    - Xác định các kỹ năng cốt lõi, điểm mạnh và lĩnh vực chuyên môn của bạn
    - Thảo luận về giá trị, sở thích và ưu tiên của bạn trong sự nghiệp
    - Xem xét các ràng buộc thực tế (vị trí, tài chính, gia đình, thời gian biểu)
    - Đề xuất 2–4 hướng nghề nghiệp cụ thể phù hợp với hồ sơ của bạn
    - Cung cấp các bước tiếp theo có thể thực hiện (kết nối mạng, nâng cao kỹ năng, bảng tìm việc)
  id: |
    - Memahami situasi pekerjaan Anda saat ini dan apa yang mendorong perubahan
    - Menjelajahi apa yang memberi Anda energi dan apa yang menguras Anda di peran masa lalu dan saat ini
    - Mengidentifikasi keterampilan inti, kekuatan, dan area keahlian Anda
    - Mendiskusikan nilai, minat, dan prioritas Anda dalam karier
    - Mempertimbangkan kendala praktis (lokasi, keuangan, keluarga, jadwal)
    - Menyarankan 2–4 arah karier konkret yang sesuai dengan profil Anda
    - Memberikan langkah selanjutnya yang dapat ditindaklanjuti (jaringan, peningkatan keterampilan, papan lowongan kerja)
  pl: |
    - Rozumie Twoją obecną sytuację zawodową i co skłania do zmiany
    - Bada, co Cię energetyzuje i wyczerpuje w poprzednich i obecnych rolach
    - Identyfikuje Twoje kluczowe umiejętności, mocne strony i obszary ekspertyzy
    - Omawia Twoje wartości, zainteresowania i priorytety w karierze
    - Uwzględnia praktyczne ograniczenia (lokalizacja, finanse, rodzina, harmonogram)
    - Sugeruje 2–4 konkretne kierunki kariery pasujące do Twojego profilu
    - Dostarcza możliwych do podjęcia kroków (networking, podnoszenie kwalifikacji, portale pracy)
  nl: |
    - Begrijpt uw huidige werksituatie en wat een verandering aandrijft
    - Verkent wat u energiseert en uitput in vroegere en huidige rollen
    - Identificeert uw kernvaardigheden, sterke punten en expertisegebieden
    - Bespreekt uw waarden, interesses en prioriteiten in een carrière
    - Houdt rekening met praktische beperkingen (locatie, financiën, gezin, tijdlijn)
    - Stelt 2–4 concrete carrièrerichtingen voor die passen bij uw profiel
    - Biedt uitvoerbare vervolgstappen (netwerken, bijscholing, vacaturesites)
  ar: |
    - يفهم وضعك الوظيفي الحالي وما الذي يدفع إلى التغيير
    - يستكشف ما يمنحك الطاقة وما يستنزفك في أدوارك السابقة والحالية
    - يحدد مهاراتك الجوهرية ونقاط قوتك ومجالات خبرتك
    - يناقش قيمك واهتماماتك وأولوياتك في مسيرتك المهنية
    - يأخذ في الاعتبار القيود العملية (الموقع، الوضع المالي، الأسرة، الجدول الزمني)
    - يقترح 2–4 توجهات مهنية ملموسة تناسب ملفك الشخصي
    - يقدم خطوات عملية قابلة للتنفيذ (التواصل المهني، تطوير المهارات، لوحات الوظائف)
  hi: |
    - आपकी वर्तमान नौकरी की स्थिति और बदलाव को प्रेरित करने वाली बात को समझता है
    - पिछली और वर्तमान भूमिकाओं में आपको क्या ऊर्जा देता है और क्या थकाता है, यह जानता है
    - आपके मूल कौशल, शक्तियों और विशेषज्ञता के क्षेत्रों की पहचान करता है
    - करियर में आपके मूल्यों, रुचियों और प्राथमिकताओं पर चर्चा करता है
    - व्यावहारिक बाधाओं पर विचार करता है (स्थान, वित्त, परिवार, समयरेखा)
    - आपके प्रोफाइल से मेल खाने वाली 2–4 ठोस करियर दिशाएं सुझाता है
    - व्यावहारिक अगले कदम प्रदान करता है (नेटवर्किंग, कौशल उन्नयन, जॉब बोर्ड)
  th: |
    - เข้าใจสถานการณ์งานปัจจุบันของคุณและสิ่งที่กระตุ้นให้เกิดการเปลี่ยนแปลง
    - สำรวจสิ่งที่ให้พลังงานและสิ่งที่ดูดซับพลังงานจากคุณในบทบาทที่ผ่านมาและปัจจุบัน
    - ระบุทักษะหลัก จุดแข็ง และพื้นที่ความเชี่ยวชาญของคุณ
    - หารือเกี่ยวกับคุณค่า ความสนใจ และลำดับความสำคัญของคุณในอาชีพ
    - พิจารณาข้อจำกัดในทางปฏิบัติ (สถานที่ การเงิน ครอบครัว ไทม์ไลน์)
    - แนะนำ 2–4 ทิศทางอาชีพที่เป็นรูปธรรมซึ่งตรงกับโปรไฟล์ของคุณ
    - ให้ขั้นตอนต่อไปที่สามารถนำไปปฏิบัติได้ (การสร้างเครือข่าย การพัฒนาทักษะ กระดานหางาน)
  cs: |
    - Rozumí vaší aktuální pracovní situaci a co podněcuje změnu
    - Zkoumá, co vás v minulých a současných rolích nabíjí energií a co vás vyčerpává
    - Identifikuje vaše klíčové dovednosti, silné stránky a oblasti odbornosti
    - Diskutuje o vašich hodnotách, zájmech a prioritách v kariéře
    - Bere v úvahu praktická omezení (lokalita, finance, rodina, časový plán)
    - Navrhuje 2–4 konkrétní kariérní směry odpovídající vašemu profilu
    - Poskytuje uskutečnitelné další kroky (síťování, rozvoj dovedností, pracovní portály)
  sv: |
    - Förstår din nuvarande jobbsituation och vad som driver en förändring
    - Utforskar vad som ger dig energi och vad som tömmer dig i tidigare och nuvarande roller
    - Identifierar dina kärnkompetenser, styrkor och expertisområden
    - Diskuterar dina värderingar, intressen och prioriteringar i en karriär
    - Beaktar praktiska begränsningar (plats, ekonomi, familj, tidslinje)
    - Föreslår 2–4 konkreta karriärriktningar som matchar din profil
    - Ger genomförbara nästa steg (nätverkande, kompetensutveckling, platsannonser)
career_insights.description:
  context: Description for career insights focus mode in the Jobs app
  en: Find the right career based on your strengths.
  de: Finde die passende Karriere anhand deiner Stärken.
  zh: 根据你的优势找到合适的职业道路。
  es: Encuentra la carrera ideal según tus fortalezas.
  fr: Trouvez la carrière idéale selon vos forces.
  pt: Encontre a carreira certa com base em suas forças.
  ru: Найдите карьеру на основе ваших сильных сторон.
  ja: 強みに基づいて適切なキャリアを見つけましょう。
  ko: 강점을 바탕으로 적합한 경력을 찾으세요.
  it: Trova la carriera giusta per i tuoi punti di forza.
  tr: Güçlü yönlerinize göre doğru kariyer yolunu bulun.
  vi: Tìm nghề nghiệp phù hợp dựa trên thế mạnh của bạn.
  id: Temukan karier yang tepat berdasarkan kekuatan Anda.
  pl: Znajdź karierę dopasowaną do swoich mocnych stron.
  nl: Vind de juiste carrière op basis van je sterktes.
  ar: اعثر على المسار المهني المناسب بناءً على نقاط قوتك.
  hi: अपनी ताकत के आधार पर सही करियर खोजें।
  th: ค้นหาอาชีพที่เหมาะสมตามจุดแข็งของคุณ
  cs: Najděte kariéru na základě vašich silných stránek.
  sv: Hitta rätt karriär baserat på dina styrkor.
  he: מציאת הקריירה הנכונה עבורך על סמך החוזקות שלך.
  verified_by_human:
    - en
    - de
career_insights.how_to_use.1:
  context: "How-to-use example 1 for the Career Insights focus mode. Use **word** to highlight key trigger words."
  en: "I'm a **software developer** feeling burned out — help me explore alternative careers"
  de: "Ich bin **Softwareentwickler** und fühle mich ausgebrannt — hilf mir, Alternativen zu erkunden"
  zh: "我是**软件开发人员**，感到精疲力竭——帮我探索替代职业"
  es: "Soy **desarrollador de software** y me siento agotado — ayúdame a explorar carreras alternativas"
  fr: "Je suis **développeur logiciel** et je me sens épuisé — aidez-moi à explorer des carrières alternatives"
  pt: "Sou **desenvolvedor de software** e me sinto esgotado — ajude-me a explorar carreiras alternativas"
  ru: "Я **разработчик программного обеспечения** и чувствую выгорание — помоги мне изучить альтернативные карьеры"
  ja: "**ソフトウェア開発者**として燃え尽きを感じています — 代替キャリアを探る手助けをして"
  ko: "저는 **소프트웨어 개발자**인데 번아웃을 느끼고 있어요 — 대안적인 커리어를 탐색하는 데 도움을 주세요"
  it: "Sono uno **sviluppatore software** esausto — aiutami a esplorare carriere alternative"
  tr: "**Yazılım geliştirici** olarak tükenmişlik hissediyorum — alternatif kariyer yollarını keşfetmeme yardım et"
  vi: "Tôi là **nhà phát triển phần mềm** cảm thấy kiệt sức — giúp tôi khám phá các nghề nghiệp thay thế"
  id: "Saya **pengembang perangkat lunak** yang merasa kelelahan — bantu saya menjelajahi karier alternatif"
  pl: "Jestem **programistą** i czuję się wypalony — pomóż mi odkryć alternatywne ścieżki kariery"
  nl: "Ik ben een **softwareontwikkelaar** met een burn-out — help me alternatieve carrières te verkennen"
  ar: "أنا **مطور برمجيات** أشعر بالإرهاق — ساعدني في استكشاف مسارات مهنية بديلة"
  hi: "मैं एक **सॉफ्टवेयर डेवलपर** हूं जो थका हुआ महसूस कर रहा हूं — मुझे वैकल्पिक करियर खोजने में मदद करें"
  th: "ฉันเป็น**นักพัฒนาซอฟต์แวร์**ที่รู้สึกหมดแรง — ช่วยฉันสำรวจอาชีพทางเลือก"
  cs: "Jsem **softwarový vývojář** a cítím se vyhořelý — pomož mi prozkoumat alternativní kariéry"
  sv: "Jag är **mjukvaruutvecklare** och känner mig utbränd — hjälp mig utforska alternativa karriärer"
  he: "אני **מפתח תוכנה** שמרגיש שחוק — עזור לי לחקור קריירות חלופיות"
  verified_by_human: []
career_insights.how_to_use.2:
  context: "How-to-use example 2 for the Career Insights focus mode. Use **word** to highlight key trigger words."
  en: "I love **creative work** and problem-solving — what careers match my skills?"
  de: "Ich liebe **kreative Arbeit** und Problemlösung — welche Karrieren passen zu meinen Fähigkeiten?"
  zh: "我喜欢**创意工作**和解决问题——哪些职业符合我的技能？"
  es: "Me encanta el **trabajo creativo** y resolver problemas — ¿qué carreras se adaptan a mis habilidades?"
  fr: "J'adore le **travail créatif** et la résolution de problèmes — quelles carrières correspondent à mes compétences ?"
  pt: "Amo **trabalho criativo** e resolução de problemas — quais carreiras combinam com minhas habilidades?"
  ru: "Я люблю **творческую работу** и решение проблем — какие карьеры подходят под мои навыки?"
  ja: "**クリエイティブな仕事**と問題解決が好きです — 私のスキルに合う職業は何ですか？"
  ko: "저는 **창의적인 일**과 문제 해결을 좋아해요 — 제 기술에 맞는 직업은 무엇인가요?"
  it: "Amo il **lavoro creativo** e la risoluzione dei problemi — quali carriere si adattano alle mie competenze?"
  tr: "**Yaratıcı çalışmayı** ve problem çözmeyi seviyorum — hangi kariyer yolları becerilerimle uyuşuyor?"
  vi: "Tôi thích **công việc sáng tạo** và giải quyết vấn đề — những nghề nghiệp nào phù hợp với kỹ năng của tôi?"
  id: "Saya suka **pekerjaan kreatif** dan pemecahan masalah — karier apa yang sesuai dengan keterampilan saya?"
  pl: "Uwielbiam **pracę twórczą** i rozwiązywanie problemów — jakie kariery pasują do moich umiejętności?"
  nl: "Ik hou van **creatief werk** en probleemoplossing — welke carrières passen bij mijn vaardigheden?"
  ar: "أحب **العمل الإبداعي** وحل المشكلات — ما المسارات المهنية التي تناسب مهاراتي؟"
  hi: "मुझे **रचनात्मक काम** और समस्या-समाधान पसंद है — कौन से करियर मेरे कौशल से मेल खाते हैं?"
  th: "ฉันชอบ**งานสร้างสรรค์**และการแก้ปัญหา — อาชีพไหนที่เหมาะกับทักษะของฉัน?"
  cs: "Miluji **kreativní práci** a řešení problémů — jaké kariéry odpovídají mým dovednostem?"
  sv: "Jag älskar **kreativt arbete** och problemlösning — vilka karriärer matchar mina färdigheter?"
  he: "אני אוהב **עבודה יצירתית** ופתרון בעיות — אילו קריירות מתאימות לכישורים שלי?"
  verified_by_human: []
career_insights.how_to_use.3:
  context: "How-to-use example 3 for the Career Insights focus mode. Use **word** to highlight key trigger words."
  en: "I want to **switch industries** from finance to tech — how should I start?"
  de: "Ich möchte von der **Finanzbranche** in die Technologiebranche wechseln — wie soll ich anfangen?"
  zh: "我想从**金融行业**转到科技行业——我应该如何开始？"
  es: "Quiero **cambiar de industria** de finanzas a tecnología — ¿cómo debería empezar?"
  fr: "Je veux **changer de secteur** de la finance à la technologie — comment dois-je commencer ?"
  pt: "Quero **mudar de setor** das finanças para a tecnologia — como devo começar?"
  ru: "Я хочу **сменить отрасль** с финансов на технологии — с чего начать?"
  ja: "**業界を転換**して金融からテクノロジーへ移りたい — どう始めればよいですか？"
  ko: "금융에서 기술 분야로 **업종을 변경**하고 싶어요 — 어떻게 시작해야 할까요?"
  it: "Voglio **cambiare settore** dalla finanza alla tecnologia — da dove dovrei iniziare?"
  tr: "Finans sektöründen teknolojiye **geçiş yapmak** istiyorum — nasıl başlamalıyım?"
  vi: "Tôi muốn **chuyển ngành** từ tài chính sang công nghệ — tôi nên bắt đầu như thế nào?"
  id: "Saya ingin **berpindah industri** dari keuangan ke teknologi — bagaimana cara memulainya?"
  pl: "Chcę **zmienić branżę** z finansów na technologię — jak powinienem zacząć?"
  nl: "Ik wil **van sector veranderen** van financiën naar technologie — hoe moet ik beginnen?"
  ar: "أريد **تغيير المجال** من المالية إلى التكنولوجيا — كيف يجب أن أبدأ؟"
  hi: "मैं **उद्योग बदलना** चाहता हूं, वित्त से प्रौद्योगिकी में — मुझे कैसे शुरू करना चाहिए?"
  th: "ฉันต้องการ**เปลี่ยนอุตสาหกรรม**จากการเงินไปสู่เทคโนโลยี — ฉันควรเริ่มต้นอย่างไร?"
  cs: "Chci **přejít do jiného odvětví** z finančnictví do technologií — jak bych měl začít?"
  sv: "Jag vill **byta bransch** från finans till teknik — hur ska jag börja?"
  he: "אני רוצה **לעבור ענף** ממימון לטכנולוגיה — כיצד כדאי להתחיל?"
  verified_by_human: []
