  vi: Chu ky va doan ket thu co the tai su dung cho email nhap.
  id: Tanda tangan dan penutup yang bisa dipakai ulang untuk draf email Anda.
  pl: Wielokrotnego uzytku podpisy i zakonczenia do szkicow e-maili.
  nl: Herbruikbare handtekeningen en afsluitende blokken voor je e-mails.
  ar: تواقيع وعبارات ختامية قابلة لاعادة الاستخدام في مسودات البريد.
  hi: "आपके ईमेल ड्राफ्ट के लिए पुन: उपयोग योग्य सिग्नेचर और क्लोजिंग ब्लॉक।"
