  cs: Opakovane pouzitelne podpisy a zaverecne bloky pro koncepty e-mailu.
  sv: Ateranvandbara signaturer och avslut for dina e-postutkast.
  he: חתימות וקטעי סיום לשימוש חוזר בטיוטות אימייל.
