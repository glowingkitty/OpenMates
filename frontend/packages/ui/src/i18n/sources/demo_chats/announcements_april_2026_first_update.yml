message:
  context: 'Newsletter announcements/april-2026-first-update — message'
  en: |-
    Hey there — Marco here, the creator of OpenMates. I haven't forgotten about
    you and OpenMates; quite the opposite.
    
    ## A few words of thanks
    
    Since the first sign-ups around Christmas, I've been heads-down on making
    OpenMates more polished, more stable, and more complete. A huge thanks to
    everyone who reported bugs and edge cases — it really helped.
    
    ## The highlights of the last months
    
    - New apps & skills: Health (Doctolib/Jameda), Home (ImmoScout/WG-Gesucht),
      Events (Meetup/Luma), Travel (flights via Google), Reminders, Images, PDFs,
      Code, Math, Docs, Sheets, Mail, Audio — and more.
    - **Personal Data Placeholders:** sensitive data is detected and replaced
      with placeholders on your device before anything is sent to the AI.
    - **Settings & Memories:** app-specific preferences stored end-to-end
      encrypted and only shared when you explicitly confirm.
    - **Focus Modes** to guide chats for career insights, career advice, etc.
    - **New models:** Claude Opus 4.7, Gemini 3.1 Pro, GPT-5.4, DeepSeek V3.2,
      and more — with `@best` / `@fast` aliases.
    - **Daily Inspirations** on your home screen, end-to-end encrypted.
    
    ## What comes next
    
    From now on I plan to send 1–2 newsletter emails per month with updates
    and, when relevant, short tips & tricks. You can manage these preferences
    anytime in your Settings.
    
    Thanks for being an early user — it means a lot.
    
    — Marco
  de: |-
    Hallo zusammen — hier ist Marco, der Entwickler von OpenMates. Ich habe euch
    und OpenMates nicht vergessen; ganz im Gegenteil.
    
    ## Ein paar Dankesworte
    
    Seit den ersten Anmeldungen rund um Weihnachten habe ich mich voll darauf
    konzentriert, OpenMates runder, stabiler und vollständiger zu machen. Ein
    großes Danke an alle, die Bugs und Randfälle gemeldet haben — das hat
    enorm geholfen.
    
    ## Highlights der letzten Monate
    
    - Neue Apps & Skills: Health (Doctolib/Jameda), Home (ImmoScout/WG-Gesucht),
      Events (Meetup/Luma), Travel (Flüge via Google), Reminders, Images, PDFs,
      Code, Math, Docs, Sheets, Mail, Audio — und mehr.
    - **Persönliche Daten-Platzhalter:** sensible Daten werden auf deinem
      Gerät erkannt und durch Platzhalter ersetzt, bevor irgendetwas an die
      KI geht.
    - **Einstellungen & Memories:** App-spezifische Präferenzen
      Ende-zu-Ende-verschlüsselt, nur mit ausdrücklicher Freigabe geteilt.
    - **Focus Modes**, die Chats z. B. für Karriere-Einblicke anleiten.
    - **Neue Modelle:** Claude Opus 4.7, Gemini 3.1 Pro, GPT-5.4, DeepSeek V3.2
      und mehr — inkl. `@best` / `@fast`-Aliasen.
    - **Daily Inspirations** auf deinem Home-Screen, Ende-zu-Ende-verschlüsselt.
    
    ## Wie es weitergeht
    
    Ab jetzt plane ich 1–2 Newsletter-Mails pro Monat mit Updates und, wenn
    relevant, kurzen Tipps & Tricks. Du kannst diese Präferenzen jederzeit in
    deinen Einstellungen verwalten.
    
    Danke, dass du früh dabei bist — das bedeutet mir viel.
    
    — Marco
