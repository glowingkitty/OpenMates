    Приложение «Код» сделало большой шаг вперед. Теперь OpenMates может запускать код в песочнице, показывать результаты, помогать с поиском по репозиториям и выполнять больше последующих действий, связанных с кодом.
    
    Для обычных пользователей это полезно, даже если ты не профессиональный разработчик: небольшие скрипты, очистка данных, создание документов, предпросмотр сайтов, объяснение логов и технические вопросы станут более интерактивными.
    
    ## 3. Генерация музыки и улучшения провайдеров изображений
    
    Версия v0.11 расширяет возможности работы с медиаконтентом: добавлена генерация музыки и улучшена работа с провайдерами генерации изображений. Это значит, что OpenMates теперь поддерживает больше творческих задач прямо в чате: создание музыкальных набросков, генерацию визуальных концептов, доработку промптов или превращение черновой идеи в медиафайл, который можно просмотреть и использовать.
    
    Также улучшено представление созданного контента: результаты проще просматривать, открывать и использовать для дальнейшей работы.
    
