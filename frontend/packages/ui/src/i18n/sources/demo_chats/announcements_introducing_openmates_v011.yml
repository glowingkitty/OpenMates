    नमस्ते,
    
    OpenMates v0.11 अब लाइव है। यह अपडेट v0.10 के सुधारों पर आधारित है और इसमें व्यावहारिक रोज़मर्रा के फीचर्स जोड़े गए हैं: समृद्ध डेली इंस्पिरेशन (Daily Inspirations), कोड एक्जीक्यूशन, रिपॉजिटरी रिसर्च, म्यूजिक जनरेशन, इमेज-जनरेशन प्रोवाइडर में सुधार, स्पष्ट ऐप परिणाम और लोकल इंटरफ़ेस फोंट।
    
    # सबसे पहले, v0.10 का एक त्वरित रिकैप
    
    v0.10 में जवाबों के अंदर विकिपीडिया लिंक, मैसेज हाइलाइट्स और कमेंट्स, बेहतर सार्वजनिक घोषणा/उदाहरण पेज, SEPA बैंक ट्रांसफर और अकाउंट ईमेल परिवर्तन जोड़े गए थे।
    
    इन बदलावों ने OpenMates को दैनिक वर्कस्पेस के रूप में अधिक उपयोगी बना दिया: इससे सीखना आसान हो गया, शेयर करना आसान हो गया, और अकाउंट और पेमेंट की बुनियादी चीज़ें अधिक स्थिर हो गईं।
    
    # ✨ v0.11 में नया क्या है
    
    ## 1. विस्तारित डेली इंस्पिरेशन (Daily Inspirations)
    
    डेली इंस्पिरेशन अब और भी समृद्ध और विविध हो गए हैं। वे सार्वजनिक वीडियो, उपयोगी फीचर विचार और उन चीज़ों के लिए ठोस शुरुआती बिंदु दिखा सकते हैं जो आप OpenMates में करना चाहते हैं।
    
    लक्ष्य OpenMates को एक खाली चैटबॉट बॉक्स के बजाय एक ऐसी जगह बनाना है जो आपको उपयोगी चीज़ें खोजने में मदद करे: किसी विषय पर शोध करना, वीडियो समझना, किसी कार्य की योजना बनाना, किसी टूल को एक्सप्लोर करना, या किसी उदाहरण से आगे बढ़ना।
    
    ## 2. कोड एक्जीक्यूशन और कोड रिसर्च में सुधार
    
    कोड ऐप ने एक बड़ा कदम आगे बढ़ाया है। OpenMates अब सैंडबॉक्स में कोड चला सकता है, आउटपुट दिखा सकता है, रिपॉजिटरी सर्च में मदद कर सकता है और कोड से संबंधित अधिक फॉलो-अप कार्यों को संभाल सकता है।
    
    रोज़मर्रा के उपयोगकर्ताओं के लिए यह उपयोगी है भले ही आप एक पेशेवर डेवलपर न हों: छोटे स्क्रिप्ट, डेटा क्लीनअप, डॉक्यूमेंट जनरेशन, वेबसाइट प्रीव्यू, लॉग स्पष्टीकरण और तकनीकी प्रश्न अधिक इंटरैक्टिव हो सकते हैं।
    
    ## 3. म्यूजिक जनरेशन और इमेज प्रोवाइडर में सुधार
    
    v0.11 म्यूजिक जनरेशन और इमेज-जनरेशन प्रोवाइडर्स के सुधारों के साथ जनरेटेड-मीडिया वर्कफ़्लो का विस्तार करता है। इसका मतलब है कि OpenMates सीधे चैट में अधिक रचनात्मक कार्यों का समर्थन कर सकता है: एक त्वरित म्यूजिक आइडिया बनाना, विजुअल कॉन्सेप्ट्स जनरेट करना, प्रॉम्प्ट्स पर काम करना, या एक कच्चे विचार को ऐसे मीडिया में बदलना जिसे आप वास्तव में देख और पुन: उपयोग कर सकें।
    
    यह काम जनरेट किए गए मीडिया को पेश करने के तरीके में भी सुधार करता है, ताकि परिणामों को प्रीव्यू करना, खोलना और उनसे आगे बढ़ना आसान हो।
    
    ## 4. स्पष्ट ऐप परिणाम और प्रोवाइडर विवरण
    
    कई ऐप कार्ड और एम्बेड प्रीव्यू अब बेहतर वास्तविक उदाहरण, प्रोवाइडर लोगो, स्रोत जानकारी और स्पष्ट मेटाडेटा दिखाते हैं। इससे यह समझना आसान हो जाता है कि क्या हुआ, परिणाम कहाँ से आया और किस ऐप स्किल का उपयोग किया गया था।
    
    दैनिक उपयोग के लिए, इसका मतलब है कम अनुमान लगाना: यात्रा परिणाम, वेब परिणाम, जनरेट की गई फाइलें, मीडिया आउटपुट और कोड परिणाम पहचानना और उन पर कार्रवाई करना आसान होना चाहिए।
    
    ## 5. बेहतर फॉलो-अप प्रेजेंटेशन
    
    फॉलो-अप सुझाव पहले से मौजूद थे, लेकिन उनकी प्रस्तुति अब अधिक साफ और उपयोग में आसान है। इनका उद्देश्य आपको स्वयं सही अगले प्रॉम्प्ट के बारे में सोचे बिना किसी कार्य को जारी रखने में मदद करना है।
    
    ## 6. लोकल इंटरफ़ेस फोंट
    
    अब आप लोकल इंटरफ़ेस फोंट प्राथमिकताएं चुन सकते हैं। यह एक छोटी सी सेटिंग है, लेकिन अगर आप OpenMates में पढ़ने और लिखने में बहुत समय बिताते हैं तो यह मायने रखती है।
    
    ## 7. स्थिरता और प्रदर्शन में सुधार
    
    चैट सिंक, एम्बेड, फाइल प्रीव्यू और इमेज रिजल्ट प्रीव्यू में स्थिरता और प्रदर्शन में भी सुधार किए गए हैं।
    
    # आगे क्या है
    
    अगला कदम OpenMates को समझने और उपयोग करने में और भी आसान बनाना है: बेहतर उदाहरण, स्पष्ट ऐप फ्लो, अधिक परिष्कृत रचनात्मक और शोध उपकरण, और चैट अनुभव में कम कमियां।
    
    OpenMates का उपयोग करने और कुछ भ्रमित करने वाला या खराब होने पर फीडबैक देने के लिए धन्यवाद।
    
