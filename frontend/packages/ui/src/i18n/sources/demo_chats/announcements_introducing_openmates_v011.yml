    # Eerst een korte terugblik op v0.10
    
    v0.10 voegde Wikipedia-links toe in antwoorden, berichtmarkeringen en opmerkingen, betere openbare aankondigings-/voorbeeldpagina's, SEPA-bankoverschrijvingen en wijzigingen in het e-mailadres van accounts.
    
    Die wijzigingen maakten OpenMates nuttiger als dagelijkse werkplek: makkelijker om van te leren, makkelijker om te delen en minder kwetsbaar wat betreft de basis van accounts en betalingen.
    
    # ✨ Wat is er nieuw in v0.11
    
    ## 1. Uitgebreide Dagelijkse Inspiraties
    
    Dagelijkse Inspiraties zijn rijker en gevarieerder geworden. Ze kunnen openbare video's, nuttige functie-ideeën en concrete startpunten tonen voor dingen die je in OpenMates wilt doen.
    
    Het doel is om OpenMates minder te laten voelen als een leeg chatbot-venster en meer als een plek die je helpt nuttige dingen te ontdekken: een onderwerp onderzoeken, een video begrijpen, een taak plannen, een tool verkennen of verdergaan vanuit een voorbeeld.
    
    ## 2. Verbeteringen in code-uitvoering en code-onderzoek
    
    De Code-app heeft een grote stap voorwaarts gemaakt. OpenMates kan nu code uitvoeren in een sandbox, resultaten tonen, helpen bij het doorzoeken van repositories en meer code-gerelateerde vervolgacties afhandelen.
    
    Voor dagelijkse gebruikers is dit nuttig, zelfs als je geen professionele ontwikkelaar bent: kleine scripts, het opschonen van gegevens, het genereren van documenten, website-previews, uitleg van logs en technische vragen kunnen interactiever worden.
    
    ## 3. Muziekgeneratie en verbeteringen voor beeldaanbieders
    
    v0.11 breidt workflows voor gegenereerde media uit met muziekgeneratie en verbeteringen rond aanbieders van beeldgeneratie. Dat betekent dat OpenMates meer creatieve taken direct in de chat kan ondersteunen: een snel muziekidee maken, visuele concepten genereren, prompts verfijnen of een ruw idee omzetten in media die je daadwerkelijk kunt bekijken en hergebruiken.
    
    Het werk verbetert ook de manier waarop gegenereerde media worden gepresenteerd, zodat resultaten makkelijker te bekijken, te openen en te vervolgen zijn.
    
    ## 4. Duidelijkere app-resultaten en details van aanbieders
    
    Veel app-kaarten en embed-previews tonen nu betere echte voorbeelden, logo's van aanbieders, broninformatie en duidelijkere metadata. Dit maakt het makkelijker om te begrijpen wat er is gebeurd, waar een resultaat vandaan kwam en welke app-vaardigheid is gebruikt.
    
    Voor dagelijks gebruik betekent dat minder gissen: reisresultaten, webresultaten, gegenereerde bestanden, media-outputs en coderesultaten zouden makkelijker te herkennen en te gebruiken moeten zijn.
    
    ## 5. Betere presentatie van vervolgstappen
    
    Suggesties voor vervolgstappen bestonden al, maar de presentatie ervan is nu strakker en gebruiksvriendelijker. Ze zijn bedoeld om je te helpen een taak voort te zetten zonder dat je zelf de perfecte volgende prompt hoeft te bedenken.
    
    ## 6. Lokale interface-lettertypen
    
    Je kunt nu voorkeuren voor lokale interface-lettertypen kiezen. Het is een kleine instelling, maar het is belangrijk als je veel tijd besteedt aan lezen en schrijven in OpenMates.
    
    ## 7. Stabiliteits- en prestatieverbeteringen
    
    Er zijn ook stabiliteits- en prestatieverbeteringen doorgevoerd in chatsynchronisatie, embeds, bestandsvoorbeelden en voorbeelden van afbeeldingsresultaten.
    
    # Wat volgt er nu
    
    De volgende stap is om OpenMates steeds begrijpelijker en gebruiksvriendelijker te maken: betere voorbeelden, duidelijkere app-flows, meer verfijnde creatieve en onderzoekstools, en minder ruwe kantjes in de chatervaring.
    
    Bedankt voor het gebruiken van OpenMates en voor het geven van feedback wanneer iets verwarrend aanvoelt of niet werkt.
    
    Groeten,
    
    Marco  
    Maker van OpenMates
