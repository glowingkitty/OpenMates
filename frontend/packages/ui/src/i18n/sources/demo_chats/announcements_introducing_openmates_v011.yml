    Многие карточки приложений и окна предпросмотра теперь показывают наглядные примеры, логотипы провайдеров, информацию об источниках и более четкие метаданные. Это упрощает понимание того, что произошло, откуда взялся результат и какой навык приложения был использован.
    
    В повседневном использовании это избавит от лишних догадок: результаты поиска путешествий, веб-поиска, созданные файлы, медиа и результаты выполнения кода станет легче распознавать и использовать.
    
    ## 5. Улучшенное отображение предложений
    
    Предложения для продолжения диалога уже были, но теперь они выглядят аккуратнее и ими удобнее пользоваться. Они призваны помочь тебе продолжить задачу, не задумываясь над идеальным следующим промптом.
    
    ## 6. Локальные шрифты интерфейса
    
    Теперь можно выбрать предпочтительные локальные шрифты интерфейса. Это небольшая настройка, но она важна, если ты проводишь много времени за чтением и письмом в OpenMates.
    
    ## 7. Стабильность и производительность
    
    Также была повышена стабильность и производительность синхронизации чатов, встраиваемых объектов, предпросмотра файлов и изображений.
    
