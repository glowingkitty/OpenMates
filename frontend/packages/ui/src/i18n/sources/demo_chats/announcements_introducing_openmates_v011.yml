    # ✨ มีอะไรใหม่ใน v0.11
    
    ## 1. ขยายขอบเขตแรงบันดาลใจรายวัน (Daily Inspirations)
    
    แรงบันดาลใจรายวันมีความหลากหลายและน่าสนใจยิ่งขึ้น โดยสามารถแสดงวิดีโอสาธารณะ, ไอเดียฟีเจอร์ที่มีประโยชน์ และจุดเริ่มต้นที่เป็นรูปธรรมสำหรับสิ่งที่คุณอาจต้องการทำใน OpenMates
    
    เป้าหมายคือเพื่อให้ OpenMates ไม่ได้เป็นเพียงแค่กล่องแชทบอทที่ว่างเปล่า แต่เป็นสถานที่ที่ช่วยให้คุณค้นพบสิ่งที่มีประโยชน์ที่ควรทำ: ค้นคว้าหัวข้อต่างๆ, ทำความเข้าใจวิดีโอ, วางแผนงาน, สำรวจเครื่องมือ หรือต่อยอดจากตัวอย่าง
    
    ## 2. การปรับปรุงการรันโค้ดและการค้นคว้าโค้ด
    
    แอป Code ก้าวไปอีกขั้น ตอนนี้ OpenMates สามารถรันโค้ดใน Sandbox, แสดงผลลัพธ์, ช่วยค้นหาในคลังเก็บโค้ด และจัดการการดำเนินการต่อเนื่องที่เกี่ยวข้องกับโค้ดได้มากขึ้น
    
    สำหรับผู้ใช้ทั่วไป สิ่งนี้มีประโยชน์แม้ว่าคุณจะไม่ใช่โปรแกรมเมอร์มืออาชีพ: สคริปต์ขนาดเล็ก, การล้างข้อมูล, การสร้างเอกสาร, การดูตัวอย่างเว็บไซต์, การอธิบาย Log และคำถามทางเทคนิคจะมีความโต้ตอบได้มากขึ้น
    
    ## 3. การสร้างเพลงและการปรับปรุงผู้ให้บริการรูปภาพ
    
    v0.11 ขยายเวิร์กโฟลว์การสร้างสื่อด้วยการสร้างเพลงและการปรับปรุงเกี่ยวกับผู้ให้บริการสร้างรูปภาพ นั่นหมายความว่า OpenMates สามารถรองรับงานสร้างสรรค์ได้มากขึ้นโดยตรงในแชท: การสร้างไอเดียเพลงสั้นๆ, การสร้างคอนเซปต์ภาพ, การปรับแต่ง Prompt หรือการเปลี่ยนไอเดียคร่าวๆ ให้เป็นสื่อที่คุณสามารถตรวจสอบและนำไปใช้ต่อได้จริง
    
    งานนี้ยังปรับปรุงวิธีการแสดงผลสื่อที่สร้างขึ้น เพื่อให้ดูตัวอย่าง เปิด และทำงานต่อได้ง่ายขึ้น
    
    ## 4. ผลลัพธ์ของแอปและรายละเอียดผู้ให้บริการที่ชัดเจนขึ้น
    
    การ์ดแอปและตัวอย่างการฝัง (embed) จำนวนมากตอนนี้แสดงตัวอย่างจริง, โลโก้ผู้ให้บริการ, ข้อมูลแหล่งที่มา และ Metadata ที่ชัดเจนขึ้น สิ่งนี้ช่วยให้เข้าใจได้ง่ายขึ้นว่าเกิดอะไรขึ้น ผลลัพธ์มาจากไหน และใช้ทักษะของแอปใด
    
    สำหรับการใช้งานประจำวัน นั่นหมายถึงการคาดเดาที่น้อยลง: ผลลัพธ์การเดินทาง, ผลลัพธ์จากเว็บ, ไฟล์ที่สร้างขึ้น, สื่อที่ส่งออกมา และผลลัพธ์ของโค้ดควรจะจดจำและนำไปใช้งานต่อได้ง่ายขึ้น
    
    ## 5. การนำเสนอคำถามต่อเนื่องที่ดีขึ้น
    
    คำแนะนำสำหรับการดำเนินการต่อเนื่องมีอยู่แล้ว แต่การนำเสนอในตอนนี้ดูสะอาดตาและใช้งานง่ายขึ้น สิ่งเหล่านี้มีไว้เพื่อช่วยให้คุณทำงานต่อได้โดยไม่ต้องคิดหา Prompt ถัดไปที่สมบูรณ์แบบด้วยตัวเอง
    
    ## 6. ฟอนต์อินเทอร์เฟซในเครื่อง
    
    ตอนนี้คุณสามารถเลือกการตั้งค่าฟอนต์อินเทอร์เฟซในเครื่องได้แล้ว แม้จะเป็นการตั้งค่าเล็กๆ แต่ก็สำคัญหากคุณใช้เวลาส่วนใหญ่ในการอ่านและเขียนใน OpenMates
    
    ## 7. การปรับปรุงความเสถียรและประสิทธิภาพ
    
    นอกจากนี้ยังมีการปรับปรุงความเสถียรและประสิทธิภาพในการซิงค์แชท, การฝัง (embed), การดูตัวอย่างไฟล์ และการดูตัวอย่างผลลัพธ์รูปภาพ
    
    # สิ่งที่จะเกิดขึ้นต่อไป
    
