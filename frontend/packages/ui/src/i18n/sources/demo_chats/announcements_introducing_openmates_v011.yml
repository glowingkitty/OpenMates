    # Najpierw krótkie podsumowanie v0.10
    
    Wersja v0.10 dodała linki do Wikipedii w odpowiedziach, wyróżnienia i komentarze do wiadomości, lepsze strony publicznych ogłoszeń/przykładów, przelewy bankowe SEPA oraz możliwość zmiany adresu e-mail konta.
    
    Te zmiany sprawiły, że OpenMates stał się bardziej użyteczny jako codzienne miejsce pracy: łatwiejszy do nauki, łatwiejszy do udostępniania i bardziej stabilny w kwestiach podstawowych, takich jak konto i płatności.
    
    # ✨ Co nowego w v0.11
    
    ## 1. Rozszerzone Codzienne Inspiracje
    
    Codzienne Inspiracje stały się bogatsze i bardziej zróżnicowane. Mogą teraz wyświetlać publiczne filmy, przydatne pomysły na funkcje i konkretne punkty wyjścia dla rzeczy, które możesz chcieć zrobić w OpenMates.
    
    Celem jest sprawienie, by OpenMates mniej przypominał puste okno czatu, a bardziej miejsce, które pomaga odkrywać przydatne zajęcia: zgłębianie tematu, zrozumienie wideo, planowanie zadania, odkrywanie narzędzi czy kontynuowanie pracy na podstawie przykładu.
    
    ## 2. Wykonywanie kodu i ulepszenia w przeszukiwaniu kodu
    
    Aplikacja Code zrobiła duży krok naprzód. OpenMates może teraz uruchamiać kod w piaskownicy (sandbox), wyświetlać wyniki, pomagać w przeszukiwaniu repozytoriów i obsługiwać więcej działań następczych związanych z kodem.
    
    Dla codziennych użytkowników jest to przydatne, nawet jeśli nie jesteś profesjonalnym programistą: małe skrypty, czyszczenie danych, generowanie dokumentów, podglądy stron internetowych, wyjaśnianie logów i pytania techniczne mogą stać się bardziej interaktywne.
    
    ## 3. Generowanie muzyki i ulepszenia dostawców obrazów
    
    Wersja v0.11 rozszerza procesy pracy z generowanymi mediami o generowanie muzyki oraz ulepszenia u dostawców generowania obrazów. Oznacza to, że OpenMates może wspierać więcej kreatywnych zadań bezpośrednio w czacie: tworzenie szybkich pomysłów muzycznych, generowanie koncepcji wizualnych, iterowanie nad promptami czy zamianę surowego pomysłu w multimedia, które możesz sprawdzić i wykorzystać.
    
    Prace te poprawiły również sposób prezentacji generowanych mediów, dzięki czemu wyniki są łatwiejsze do podglądu, otwierania i dalszej obróbki.
    
    ## 4. Czytelniejsze wyniki aplikacji i szczegóły dostawców
    
    Wiele kart aplikacji i podglądów osadzonych treści pokazuje teraz lepsze, rzeczywiste przykłady, logo dostawców, informacje o źródłach i czytelniejsze metadane. Ułatwia to zrozumienie, co się stało, skąd pochodzi wynik i która umiejętność aplikacji została użyta.
    
    W codziennym użytkowaniu oznacza to mniej zgadywania: wyniki podróży, wyniki wyszukiwania, wygenerowane pliki, multimedia i wyniki kodu powinny być łatwiejsze do rozpoznania i podjęcia dalszych działań.
    
    ## 5. Lepsza prezentacja sugestii kontynuacji
    
    Sugestie kontynuacji (follow-up) już istniały, ale ich prezentacja jest teraz czystsza i łatwiejsza w użyciu. Mają one pomóc Ci kontynuować zadanie bez konieczności samodzielnego wymyślania idealnego kolejnego promptu.
    
    ## 6. Lokalne czcionki interfejsu
    
    Możesz teraz wybrać preferencje lokalnych czcionek interfejsu. To małe ustawienie, ale ma znaczenie, jeśli spędzasz dużo czasu na czytaniu i pisaniu w OpenMates.
    
    ## 7. Poprawa stabilności i wydajności
    
    Wprowadzono również poprawki stabilności i wydajności w synchronizacji czatu, osadzonych treściach, podglądach plików i podglądach wyników obrazów.
    
    # Co dalej
    
    Następnym krokiem jest dalsze ułatwianie zrozumienia i obsługi OpenMates: lepsze przykłady, czytelniejsze przepływy aplikacji, bardziej dopracowane narzędzia kreatywne i badawcze oraz mniej niedociągnięć w samym czacie.
    
    Dziękujemy za korzystanie z OpenMates i za przesyłanie opinii, gdy coś wydaje się niejasne lub nie działa poprawnie.
    
    Pozdrawiam,
    
    Marco  
    Twórca OpenMates
