    # İlk olarak, kısa bir v0.10 özeti
    
    v0.10; cevapların içine Wikipedia bağlantıları, mesaj vurguları ve yorumlar, daha iyi genel duyuru/örnek sayfaları, SEPA banka transferleri ve hesap e-postası değişiklikleri ekledi.
    
    Bu değişiklikler OpenMates'i günlük bir çalışma alanı olarak daha kullanışlı hale getirdi: öğrenmesi daha kolay, paylaşması daha kolay ve hesap ile ödeme temelleri konusunda daha sağlam.
    
    # ✨ v0.11'deki yenilikler
    
    ## 1. Genişletilmiş Günlük İlhamlar
    
    Günlük İlhamlar daha zengin ve daha çeşitli hale geldi. Herkese açık videoları, faydalı özellik fikirlerini ve OpenMates'te yapmak isteyebileceğin şeyler için somut başlangıç noktalarını ortaya çıkarabilirler.
    
    Amaç, OpenMates'in boş bir sohbet robotu kutusu gibi değil, yararlı şeyler keşfetmene yardımcı olan bir yer gibi hissettirmesini sağlamak: bir konuyu araştırmak, bir videoyu anlamak, bir görevi planlamak, bir aracı keşfetmek veya bir örnekten devam etmek.
    
    ## 2. Kod yürütme ve kod araştırması iyileştirmeleri
    
    Kod uygulaması büyük bir adım attı. OpenMates artık bir sandbox (korumalı alan) içinde kod çalıştırabilir, çıktıları gösterebilir, depo aramalarına yardımcı olabilir ve kodla ilgili daha fazla takip işlemini gerçekleştirebilir.
    
    Profesyonel bir geliştirici olmasan bile bu, günlük kullanıcılar için yararlıdır: küçük betikler, veri temizleme, belge oluşturma, web sitesi önizlemeleri, log açıklamaları ve teknik sorular daha etkileşimli hale gelebilir.
    
    ## 3. Müzik oluşturma ve görsel sağlayıcı iyileştirmeleri
    
    v0.11, müzik oluşturma ve görsel oluşturma sağlayıcıları etrafındaki iyileştirmelerle oluşturulan medya iş akışlarını genişletiyor. Bu, OpenMates'in doğrudan sohbette daha fazla yaratıcı görevi destekleyebileceği anlamına gelir: hızlı bir müzik fikri oluşturmak, görsel konseptler üretmek, istemler (prompts) üzerinde yineleme yapmak veya kaba bir fikri gerçekten inceleyebileceğin ve yeniden kullanabileceğin bir medyaya dönüştürmek.
    
    Bu çalışma aynı zamanda oluşturulan medyanın sunulma şeklini de iyileştiriyor, böylece sonuçları önizlemek, açmak ve onlardan devam etmek daha kolay hale geliyor.
    
    ## 4. Daha net uygulama sonuçları ve sağlayıcı ayrıntıları
    
    Birçok uygulama kartı ve yerleştirme önizlemesi artık daha iyi gerçek örnekler, sağlayıcı logoları, kaynak bilgileri ve daha net meta veriler gösteriyor. Bu, ne olduğunu, bir sonucun nereden geldiğini ve hangi uygulama becerisinin kullanıldığını anlamayı kolaylaştırır.
    
    Günlük kullanım için bu, daha az tahmin yürütmek anlamına gelir: seyahat sonuçları, web sonuçları, oluşturulan dosyalar, medya çıktıları ve kod sonuçlarının tanınması ve üzerinde işlem yapılması daha kolay olmalıdır.
    
    ## 5. Daha iyi takip sunumu
    
    Takip önerileri zaten vardı, ancak sunumları artık daha temiz ve kullanımı daha kolay. Mükemmel bir sonraki istemi kendin düşünmek zorunda kalmadan bir göreve devam etmene yardımcı olmayı amaçlıyorlar.
    
    ## 6. Yerel arayüz yazı tipleri
    
    Artık yerel arayüz yazı tipi tercihlerini seçebilirsin. Küçük bir ayar, ancak OpenMates'te okumak ve yazmak için çok zaman harcıyorsan önemlidir.
    
    ## 7. Kararlılık ve performans iyileştirmeleri
    
    Sohbet senkronizasyonu, yerleştirmeler, dosya önizlemeleri ve görsel sonucu önizlemelerinde de kararlılık ve performans iyileştirmeleri yapıldı.
    
    # Sırada ne var
    
    Bir sonraki adım, OpenMates'i anlamayı ve kullanmayı daha kolay hale getirmeye devam etmek: daha iyi örnekler, daha net uygulama akışları, daha gösterişli yaratıcı ve araştırma araçları ve sohbet deneyimindeki pürüzlerin azaltılması.
    
    OpenMates'i kullandığın ve bir şeyler kafa karıştırıcı veya bozuk geldiğinde geri bildirim verdiğin için teşekkürler.
    
    Selamlar,
    
