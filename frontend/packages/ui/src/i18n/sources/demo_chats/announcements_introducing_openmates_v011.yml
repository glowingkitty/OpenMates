    # ✨ ما الجديد في الإصدار v0.11
    
    ## 1. إلهامات يومية موسعة
    
    أصبحت "الإلهامات اليومية" أغنى وأكثر تنوعاً. يمكنها الآن عرض فيديوهات عامة، وأفكار لميزات مفيدة، ونقاط انطلاق ملموسة لأشياء قد ترغب في القيام بها في OpenMates.
    
    الهدف هو جعل OpenMates يبدو أقل كصندوق دردشة فارغ وأكثر كمكان يساعدك على اكتشاف أشياء مفيدة للقيام بها: البحث في موضوع ما، فهم فيديو، التخطيط لمهمة، استكشاف أداة، أو المتابعة من مثال سابق.
    
    ## 2. تحسينات تنفيذ الأكواد والبحث البرمجي
    
    خطى تطبيق "الكود" خطوة كبيرة للأمام. يمكن لـ OpenMates الآن تشغيل الأكواد في بيئة معزولة (sandbox)، وعرض المخرجات، والمساعدة في البحث في المستودعات، والتعامل مع المزيد من إجراءات المتابعة المتعلقة بالكود.
    
    بالنسبة للمستخدمين العاديين، هذا مفيد حتى لو لم تكن مطوراً محترفاً: السكربتات الصغيرة، تنظيف البيانات، توليد المستندات، معاينة المواقع، شرح السجلات (logs)، والأسئلة التقنية يمكن أن تصبح أكثر تفاعلية.
    
    ## 3. توليد الموسيقى وتحسينات مزودي الصور
    
    يوسع الإصدار v0.11 سير عمل الوسائط المولدة عبر توليد الموسيقى وتحسينات لمزودي توليد الصور. هذا يعني أن OpenMates يمكنه دعم المزيد من المهام الإبداعية مباشرة في الدردشة: إنشاء فكرة موسيقية سريعة، توليد مفاهيم بصرية، تكرار الأوامر (prompts)، أو تحويل فكرة أولية إلى وسائط يمكنك فحصها وإعادة استخدامها.
    
    كما يحسن هذا العمل كيفية عرض الوسائط المولدة، بحيث تصبح النتائج أسهل في المعاينة والفتح والمتابعة.
    
    ## 4. نتائج تطبيقات أوضح وتفاصيل المزودين
    
    تعرض العديد من بطاقات التطبيقات ومعاينات التضمين الآن أمثلة واقعية أفضل، وشعارات المزودين، ومعلومات المصدر، وبيانات وصفية أوضح. هذا يسهل فهم ما حدث، ومن أين أتت النتيجة، وأي مهارة تطبيق تم استخدامها.
    
    للاستخدام اليومي، يعني هذا تخميناً أقل: نتائج السفر، نتائج الويب، الملفات المولدة، مخرجات الوسائط، ونتائج الأكواد يجب أن تكون أسهل في التعرف عليها والتعامل معها.
    
    ## 5. عرض أفضل للمتابعة
    
    كانت اقتراحات المتابعة موجودة بالفعل، لكن عرضها الآن أصبح أكثر ترتيباً وسهولة في الاستخدام. تهدف لمساعدتك على مواصلة المهمة دون الحاجة للتفكير في الأمر (prompt) التالي المثالي بنفسك.
    
    ## 6. خطوط الواجهة المحلية
    
    يمكنك الآن اختيار تفضيلات خطوط الواجهة المحلية. إنه إعداد صغير، لكنه مهم إذا كنت تقضي وقتاً طويلاً في القراءة والكتابة في OpenMates.
    
    ## 7. تحسينات الاستقرار والأداء
    
    كانت هناك أيضاً تحسينات في الاستقرار والأداء في مزامنة الدردشة، والتضمينات، ومعاينات الملفات، ومعاينات نتائج الصور.
    
