    Ehi,
    
    OpenMates v0.11 è ora disponibile. Questo aggiornamento si basa sui miglioramenti della v0.10 e aggiunge funzionalità pratiche per l'uso quotidiano: Ispirazioni Quotidiane più ricche, esecuzione di codice, ricerca nei repository, generazione di musica, miglioramenti ai provider di generazione immagini, risultati delle app più chiari e font di interfaccia locali.
    
    [cta]
    
    # Innanzitutto, un rapido riepilogo della v0.10
    
    La v0.10 ha aggiunto link a Wikipedia all'interno delle risposte, evidenziazioni e commenti ai messaggi, migliori pagine di annunci pubblici/esempi, bonifici bancari SEPA e modifiche all'email dell'account.
    
    Questi cambiamenti hanno reso OpenMates più utile come spazio di lavoro quotidiano: più facile per imparare, più facile da condividere e più solido per quanto riguarda le basi dell'account e dei pagamenti.
    
    # ✨ Cosa c'è di nuovo nella v0.11
    
    ## 1. Ispirazioni Quotidiane ampliate
    
    Le Ispirazioni Quotidiane sono diventate più ricche e variegate. Possono mostrare video pubblici, idee utili per le funzionalità e punti di partenza concreti per le attività che potresti voler svolgere in OpenMates.
    
    L'obiettivo è far sì che OpenMates sembri meno una casella di chatbot vuota e più un luogo che ti aiuta a scoprire cose utili da fare: ricercare un argomento, capire un video, pianificare un'attività, esplorare uno strumento o continuare da un esempio.
    
    ## 2. Miglioramenti all'esecuzione e alla ricerca di codice
    
    L'app Code ha fatto un grande passo avanti. OpenMates può ora eseguire codice in una sandbox, mostrare gli output, aiutare con le ricerche nei repository e gestire più azioni di follow-up relative al codice.
    
    Per gli utenti comuni questo è utile anche se non sei uno sviluppatore professionista: piccoli script, pulizia dei dati, generazione di documenti, anteprime di siti web, spiegazioni di log e domande tecniche possono diventare più interattivi.
    
    ## 3. Generazione di musica e miglioramenti ai provider di immagini
    
    La v0.11 amplia i flussi di lavoro dei media generati con la generazione di musica e miglioramenti ai provider di generazione immagini. Ciò significa che OpenMates può supportare più attività creative direttamente in chat: creare una rapida idea musicale, generare concetti visivi, iterare sui prompt o trasformare un'idea grezza in un contenuto multimediale che puoi effettivamente ispezionare e riutilizzare.
    
    Il lavoro migliora anche il modo in cui vengono presentati i media generati, così i risultati sono più facili da visualizzare in anteprima, aprire e da cui proseguire.
    
    ## 4. Risultati delle app e dettagli dei provider più chiari
    
    Molte schede delle app e anteprime incorporate ora mostrano esempi reali migliori, loghi dei provider, informazioni sulle fonti e metadati più chiari. Questo rende più facile capire cosa è successo, da dove proviene un risultato e quale competenza dell'app è stata utilizzata.
    
    Per l'uso quotidiano, questo significa meno incertezze: i risultati di viaggio, i risultati web, i file generati, gli output multimediali e i risultati del codice dovrebbero essere più facili da riconoscere e su cui agire.
    
    ## 5. Migliore presentazione dei follow-up
    
    I suggerimenti di follow-up esistevano già, ma la loro presentazione è ora più pulita e facile da usare. Servono ad aiutarti a continuare un'attività senza dover pensare tu stesso al prompt successivo perfetto.
    
    ## 6. Font di interfaccia locali
    
    Ora puoi scegliere le preferenze per i font dell'interfaccia locale. È una piccola impostazione, ma conta se passi molto tempo a leggere e scrivere in OpenMates.
    
    ## 7. Miglioramenti della stabilità e delle prestazioni
    
    Ci sono stati anche miglioramenti della stabilità e delle prestazioni nella sincronizzazione della chat, negli embed, nelle anteprime dei file e nelle anteprime dei risultati delle immagini.
    
    # Cosa accadrà in seguito
    
    Il prossimo passo è continuare a rendere OpenMates più facile da capire e da usare: esempi migliori, flussi delle app più chiari, strumenti creativi e di ricerca più rifiniti e meno spigolosità nell'esperienza di chat.
    
    Grazie per usare OpenMates e per fornire feedback quando qualcosa sembra confuso o non funziona.
    
    Saluti,
    
    Marco  
    Creatore di OpenMates
