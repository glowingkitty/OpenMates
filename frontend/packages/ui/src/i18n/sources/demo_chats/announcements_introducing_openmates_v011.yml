    OpenMates v0.11 kini telah hadir. Pembaruan ini melanjutkan peningkatan dari v0.10 dan menambahkan fitur praktis sehari-hari: Inspirasi Harian yang lebih kaya, eksekusi kode, riset repositori, pembuatan musik, peningkatan penyedia pembuatan gambar, hasil aplikasi yang lebih jelas, dan font antarmuka lokal.
    
    # Pertama, rekap singkat v0.10
    
    v0.10 menambahkan tautan Wikipedia di dalam jawaban, sorotan dan komentar pesan, halaman pengumuman/contoh publik yang lebih baik, transfer bank SEPA, dan perubahan email akun.
    
    Perubahan tersebut membuat OpenMates lebih berguna sebagai ruang kerja harian: lebih mudah untuk dipelajari, lebih mudah dibagikan, dan lebih stabil dalam hal dasar-dasar akun dan pembayaran.
    
    # ✨ Apa yang baru di v0.11
    
    ## 1. Inspirasi Harian yang Diperluas
    
    Inspirasi Harian menjadi lebih kaya dan bervariasi. Fitur ini dapat menampilkan video publik, ide fitur yang berguna, dan titik awal konkret untuk hal-hal yang mungkin ingin kamu lakukan di OpenMates.
    
    Tujuannya adalah agar OpenMates tidak terasa seperti kotak chatbot kosong, melainkan tempat yang membantumu menemukan hal-hal berguna untuk dilakukan: meriset topik, memahami video, merencanakan tugas, menjelajahi alat, atau melanjutkan dari sebuah contoh.
    
    ## 2. Peningkatan eksekusi kode dan riset kode
    
    Aplikasi Kode mengalami kemajuan besar. OpenMates kini dapat menjalankan kode di dalam sandbox, menampilkan output, membantu pencarian repositori, dan menangani lebih banyak tindakan lanjutan terkait kode.
    
    Bagi pengguna sehari-hari, ini berguna meskipun kamu bukan pengembang profesional: skrip kecil, pembersihan data, pembuatan dokumen, pratinjau situs web, penjelasan log, dan pertanyaan teknis dapat menjadi lebih interaktif.
    
    ## 3. Pembuatan musik dan peningkatan penyedia gambar
    
    v0.11 memperluas alur kerja media yang dihasilkan dengan pembuatan musik dan peningkatan di sekitar penyedia pembuatan gambar. Artinya, OpenMates dapat mendukung lebih banyak tugas kreatif langsung di dalam chat: membuat ide musik cepat, menghasilkan konsep visual, melakukan iterasi pada prompt, atau mengubah ide kasar menjadi media yang benar-benar dapat kamu periksa dan gunakan kembali.
    
    Pembaruan ini juga meningkatkan cara penyajian media yang dihasilkan, sehingga hasilnya lebih mudah dipratinjau, dibuka, dan dilanjutkan.
    
    ## 4. Hasil aplikasi dan detail penyedia yang lebih jelas
    
    Banyak kartu aplikasi dan pratinjau sematan kini menampilkan contoh nyata yang lebih baik, logo penyedia, informasi sumber, dan metadata yang lebih jelas. Ini memudahkan untuk memahami apa yang terjadi, dari mana asal hasilnya, dan keahlian aplikasi mana yang digunakan.
    
    Untuk penggunaan sehari-hari, ini berarti lebih sedikit menebak-nebak: hasil perjalanan, hasil web, file yang dihasilkan, output media, dan hasil kode akan lebih mudah dikenali dan ditindaklanjuti.
    
    ## 5. Penyajian tindak lanjut yang lebih baik
    
    Saran tindak lanjut sudah ada sebelumnya, tetapi penyajiannya kini lebih bersih dan lebih mudah digunakan. Fitur ini dimaksudkan untuk membantumu melanjutkan tugas tanpa harus memikirkan prompt berikutnya yang sempurna sendiri.
    
    ## 6. Font antarmuka lokal
    
    Kamu sekarang dapat memilih preferensi font antarmuka lokal. Ini adalah pengaturan kecil, tetapi penting jika kamu menghabiskan banyak waktu membaca dan menulis di OpenMates.
    
    ## 7. Peningkatan stabilitas dan performa
    
    Ada juga peningkatan stabilitas dan performa pada sinkronisasi chat, sematan, pratinjau file, dan pratinjau hasil gambar.
    
    # Apa selanjutnya
    
    Langkah selanjutnya adalah terus membuat OpenMates lebih mudah dipahami dan digunakan: contoh yang lebih baik, alur aplikasi yang lebih jelas, alat kreatif dan riset yang lebih terpoles, serta mengurangi hambatan dalam pengalaman chat.
    
    Terima kasih telah menggunakan OpenMates dan telah memberikan masukan saat ada sesuatu yang terasa membingungkan atau rusak.
    
