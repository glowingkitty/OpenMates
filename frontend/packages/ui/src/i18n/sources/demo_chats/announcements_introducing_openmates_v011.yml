    Hej,
    
    OpenMates v0.11 är nu live. Den här uppdateringen bygger vidare på förbättringarna i v0.10 och lägger till praktiska vardagsfunktioner: rikare Daily Inspirations, kodexekvering, sökning i kodförråd, musikgenerering, förbättringar för bildgenereringsleverantörer, tydligare app-resultat och lokala gränssnittstypsnitt.
    
    # Först en snabb sammanfattning av v0.10
    
    v0.10 lade till Wikipedia-länkar i svar, meddelandemarkeringar och kommentarer, bättre sidor för offentliga meddelanden/exempel, SEPA-banköverföringar och ändring av e-postadress för konton.
    
    Dessa ändringar gjorde OpenMates mer användbart som en daglig arbetsyta: enklare att lära sig av, enklare att dela och stabilare kring konto- och betalningsgrunder.
    
    # ✨ Vad är nytt i v0.11
    
    ## 1. Utökade Daily Inspirations
    
    Daily Inspirations har blivit rikare och mer varierade. De kan lyfta fram offentliga videor, användbara funktionsidéer och konkreta startpunkter för saker du vill göra i OpenMates.
    
    Målet är att OpenMates ska kännas mindre som en tom chattbox och mer som en plats som hjälper dig att upptäcka användbara saker att göra: utforska ett ämne, förstå en video, planera en uppgift, utforska ett verktyg eller fortsätta från ett exempel.
    
    ## 2. Förbättringar av kodexekvering och kodforskning
    
    Kod-appen har tagit ett stort steg framåt. OpenMates kan nu köra kod i en sandlåda, visa utdata, hjälpa till med sökningar i kodförråd och hantera fler kodrelaterade uppföljningsåtgärder.
    
    För vardagliga användare är detta användbart även om du inte är en professionell utvecklare: små skript, datarensning, dokumentgenerering, förhandsvisningar av webbplatser, loggförklaringar och tekniska frågor kan bli mer interaktiva.
    
    ## 3. Musikgenerering och förbättringar av bildleverantörer
    
    v0.11 utökar arbetsflöden för genererad media med musikgenerering och förbättringar kring bildgenereringsleverantörer. Det innebär att OpenMates kan stödja fler kreativa uppgifter direkt i chatten: skapa en snabb musikidé, generera visuella koncept, iterera på prompter eller förvandla en grov idé till media som du faktiskt kan granska och återanvända.
    
    Arbetet förbättrar också hur genererad media presenteras, så att resultat blir enklare att förhandsvisa, öppna och fortsätta ifrån.
    
    ## 4. Tydligare app-resultat och leverantörsinformation
    
    Många app-kort och inbäddade förhandsvisningar visar nu bättre verkliga exempel, leverantörslogotyper, källinformation och tydligare metadata. Detta gör det lättare att förstå vad som hände, varifrån ett resultat kom och vilken app-färdighet som användes.
    
    För daglig användning innebär det mindre gissande: rese-resultat, webbresultat, genererade filer, mediautdata och kodresultat bör vara lättare att känna igen och agera på.
    
    ## 5. Bättre presentation av uppföljningar
    
    Uppföljningsförslag fanns redan, men deras presentation är nu renare och enklare att använda. De är tänkta att hjälpa dig att fortsätta en uppgift utan att du själv behöver komma på den perfekta nästa prompten.
    
    ## 6. Lokala gränssnittstypsnitt
    
    Du kan nu välja preferenser för lokala gränssnittstypsnitt. Det är en liten inställning, men den spelar roll om du spenderar mycket tid på att läsa och skriva i OpenMates.
    
    ## 7. Stabilitets- och prestandaförbättringar
    
    Det gjordes även stabilitets- och prestandaförbättringar i chattsynkronisering, inbäddningar, filförhandsvisningar och förhandsvisningar av bildresultat.
    
    # Vad händer härnäst
    
    Nästa steg är att fortsätta göra OpenMates enklare att förstå och använda: bättre exempel, tydligare app-flöden, mer polerade kreativa verktyg och forskningsverktyg, samt färre ojämnheter i chattupplevelsen.
    
    Tack för att du använder OpenMates och för att du ger feedback när något känns förvirrande eller trasigt.
    
    Hälsningar,
    
    Marco  
    Skapare av OpenMates
  he: |
    היי,
    
    OpenMates v0.11 זמינה כעת. העדכון הזה מתבסס על השיפורים של גרסה 0.10 ומוסיף תכונות יומיומיות פרקטיות: השראות יומיות עשירות יותר, הרצת קוד, מחקר מאגרי קוד (repositories), יצירת מוזיקה, שיפורים בספקי יצירת תמונות, תוצאות אפליקציה ברורות יותר וגופני ממשק מקומיים.
    
    # ראשית, סיכום קצר של גרסה 0.10
    
    גרסה 0.10 הוסיפה קישורי ויקיפדיה בתוך תשובות, הדגשות והערות להודעות, דפי הכרזות ודוגמאות ציבוריים טובים יותר, העברות בנקאיות ב-SEPA ושינוי אימייל בחשבון.
    
    השינויים האלו הפכו את OpenMates לסביבת עבודה יומיומית שימושית יותר: קל יותר ללמוד ממנה, קל יותר לשתף, ופחות רגישה בכל הנוגע לבסיס של ניהול חשבון ותשלומים.
    
    # ✨ מה חדש בגרסה 0.11
    
    ## 1. השראות יומיות מורחבות
    
    ההשראות היומיות הפכו לעשירות ומגוונות יותר. הן יכולות להציג סרטונים ציבוריים, רעיונות לתכונות שימושיות ונקודות פתיחה קונקרטיות לדברים שאולי תרצו לעשות ב-OpenMates.
    
    המטרה היא לגרום ל-OpenMates להרגיש פחות כמו תיבת צ'אטבוט ריקה ויותר כמו מקום שעוזר לכם לגלות דברים שימושיים לעשות: לחקור נושא, להבין סרטון, לתכנן משימה, לחקור כלי או להמשיך מתוך דוגמה.
    
    ## 2. הרצת קוד ושיפורים במחקר קוד
    
    אפליקציית הקוד עשתה צעד גדול קדימה. OpenMates יכולה כעת להריץ קוד בתוך ארגז חול (sandbox), להציג פלטים, לסייע בחיפושים במאגרי קוד ולטפל בפעולות המשך נוספות הקשורות לקוד.
    
    עבור משתמשים יומיומיים זה שימושי גם אם אינכם מפתחים מקצועיים: סקריפטים קטנים, ניקוי נתונים, יצירת מסמכים, תצוגה מקדימה של אתרים, הסברי לוגים ושאלות טכניות יכולים להפוך לאינטראקטיביים יותר.
    
    ## 3. יצירת מוזיקה ושיפורים בספקי תמונות
    
    גרסה 0.11 מרחיבה את תהליכי העבודה של מדיה גנרטיבית עם יצירת מוזיקה ושיפורים סביב ספקי יצירת תמונות. זה אומר ש-OpenMates יכולה לתמוך ביותר משימות יצירתיות ישירות בצ'אט: יצירת רעיון מוזיקלי מהיר, הפקת קונספטים ויזואליים, סבבי שיפור של פרומפטים, או הפיכת רעיון גולמי למדיה שבאמת אפשר לבחון ולהשתמש בה שוב.
    
    העבודה גם משפרת את האופן שבו המדיה שנוצרה מוצגת, כך שקל יותר לצפות בתוצאות בתצוגה מקדימה, לפתוח אותן ולהמשיך מהן.
    
    ## 4. תוצאות אפליקציה ופרטי ספקים ברורים יותר
    
    כרטיסי אפליקציה ותצוגות מקדימות מוטמעות רבות מציגים כעת דוגמאות אמיתיות טובות יותר, לוגואים של ספקים, מידע על מקורות ומטא-דאטה ברור יותר. זה מקל על ההבנה של מה קרה, מאיפה הגיעה התוצאה ובאיזו מיומנות אפליקציה נעשה שימוש.
    
    לשימוש יומיומי, זה אומר פחות ניחושים: תוצאות נסיעות, תוצאות מהרשת, קבצים שנוצרו, פלטי מדיה ותוצאות קוד אמורים להיות קלים יותר לזיהוי ולפעולה.
    
    ## 5. תצוגה טובה יותר של הצעות המשך
    
    הצעות המשך כבר היו קיימות, אך התצוגה שלהן כעת נקייה וקלה יותר לשימוש. הן נועדו לעזור לכם להמשיך במשימה מבלי שתצטרכו לחשוב בעצמכם על הפרומפט הבא המושלם.
    
    ## 6. גופני ממשק מקומיים
    
    כעת ניתן לבחור העדפות גופני ממשק מקומיים. זו הגדרה קטנה, אבל היא משמעותית אם אתם מבלים זמן רב בקריאה וכתיבה ב-OpenMates.
    
    ## 7. שיפורי יציבות וביצועים
    
    בוצעו גם שיפורי יציבות וביצועים בסנכרון הצ'אט, בהטמעות, בתצוגות מקדימות של קבצים ובתצוגות מקדימות של תוצאות תמונה.
    
    # מה הלאה
    
    השלב הבא הוא להמשיך להפוך את OpenMates לקלה יותר להבנה ולשימוש: דוגמאות טובות יותר, זרימות אפליקציה ברורות יותר, כלי יצירה ומחקר מלוטשים יותר, ופחות "פינות חדות" בחוויית הצ'אט.
    
    תודה שאתם משתמשים ב-OpenMates ותודה על המשוב כשמשהו מרגיש מבלבל או שבור.
    
    בברכה,
    
    מרקו  
    יוצר OpenMates
