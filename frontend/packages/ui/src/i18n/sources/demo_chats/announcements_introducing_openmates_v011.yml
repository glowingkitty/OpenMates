    OpenMates v0.11 jest już dostępny. Ta aktualizacja bazuje na ulepszeniach z wersji v0.10 i dodaje praktyczne funkcje codziennego użytku: bogatsze Codzienne Inspiracje, wykonywanie kodu, przeszukiwanie repozytoriów, generowanie muzyki, ulepszenia dostawców generowania obrazów, czytelniejsze wyniki aplikacji oraz lokalne czcionki interfejsu.
    
    # Na początek krótkie podsumowanie v0.10
    
    W v0.10 dodaliśmy linki do Wikipedii w odpowiedziach, wyróżnienia i komentarze do wiadomości, lepsze strony publicznych ogłoszeń/przykładów, przelewy bankowe SEPA oraz możliwość zmiany adresu e-mail konta.
    
    Te zmiany sprawiły, że OpenMates stał się bardziej użyteczny jako codzienne miejsce pracy: łatwiejszy do nauki, prostszy w udostępnianiu i bardziej stabilny w kwestiach podstawowych, takich jak konto i płatności.
    
    # ✨ Co nowego w v0.11
    
    ## 1. Rozszerzone Codzienne Inspiracje
    
    Codzienne Inspiracje stały się bogatsze i bardziej różnorodne. Mogą teraz wyświetlać publiczne filmy, pomysły na przydatne funkcje i konkretne punkty wyjścia dla rzeczy, które możesz chcieć zrobić w OpenMates.
    
    Celem jest sprawienie, by OpenMates mniej przypominał puste okno czatu, a bardziej miejsce, które pomaga odkrywać przydatne zajęcia: zgłębianie tematu, zrozumienie wideo, planowanie zadań, odkrywanie narzędzi czy kontynuowanie pracy na podstawie przykładu.
    
    ## 2. Wykonywanie kodu i ulepszenia w przeszukiwaniu kodu
    
    Aplikacja Code zrobiła duży krok naprzód. OpenMates może teraz uruchamiać kod w piaskownicy (sandbox), wyświetlać wyniki, pomagać w przeszukiwaniu repozytoriów i obsługiwać więcej działań następczych związanych z kodem.
    
    Dla zwykłych użytkowników jest to przydatne, nawet jeśli nie są profesjonalnymi programistami: małe skrypty, czyszczenie danych, generowanie dokumentów, podgląd stron internetowych, wyjaśnianie logów i pytania techniczne mogą stać się bardziej interaktywne.
    
    ## 3. Generowanie muzyki i ulepszenia dostawców obrazów
    
    Wersja v0.11 rozszerza procesy pracy z mediami o generowanie muzyki i ulepszenia u dostawców generowania obrazów. Oznacza to, że OpenMates może wspierać więcej kreatywnych zadań bezpośrednio w czacie: tworzenie szybkich pomysłów muzycznych, generowanie koncepcji wizualnych, iterowanie promptów czy zamianę surowego pomysłu w multimedia, które możesz sprawdzić i wykorzystać.
    
    Prace te poprawiły również sposób prezentacji wygenerowanych mediów, dzięki czemu wyniki są łatwiejsze do podglądu, otwierania i dalszej obróbki.
    
    ## 4. Czytelniejsze wyniki aplikacji i szczegóły dostawców
    
    Wiele kart aplikacji i podglądów osadzonych treści pokazuje teraz lepsze, rzeczywiste przykłady, logo dostawców, informacje o źródłach i czytelniejsze metadane. Ułatwia to zrozumienie, co się stało, skąd pochodzi wynik i która funkcja aplikacji została użyta.
    
    W codziennym użytkowaniu oznacza to mniej zgadywania: wyniki wyszukiwania podróży, wyniki z sieci, wygenerowane pliki, multimedia i wyniki kodu powinny być łatwiejsze do rozpoznania i podjęcia dalszych działań.
    
    ## 5. Lepsza prezentacja sugestii kontynuacji
    
    Sugestie kontynuacji (follow-up) już istniały, ale ich prezentacja jest teraz czystsza i łatwiejsza w użyciu. Mają one pomóc Ci kontynuować zadanie bez konieczności samodzielnego wymyślania idealnego kolejnego promptu.
    
    ## 6. Lokalne czcionki interfejsu
    
    Możesz teraz wybrać preferencje dotyczące lokalnych czcionek interfejsu. To małe ustawienie, ale ma znaczenie, jeśli spędzasz dużo czasu na czytaniu i pisaniu w OpenMates.
    
    ## 7. Poprawa stabilności i wydajności
    
    Wprowadzono również poprawki stabilności i wydajności w synchronizacji czatu, osadzonych treściach, podglądach plików i podglądach wyników obrazów.
    
    # Co dalej
    
    Następnym krokiem jest dalsze ułatwianie zrozumienia i obsługi OpenMates: lepsze przykłady, jaśniejsze procesy w aplikacjach, bardziej dopracowane narzędzia kreatywne i badawcze oraz mniej niedociągnięć w samym czacie.
    
    Dziękuję za korzystanie z OpenMates i za przesyłanie opinii, gdy coś wydaje się niejasne lub nie działa poprawnie.
    
    Pozdrawiam,
    
    Marco  
    Twórca OpenMates
