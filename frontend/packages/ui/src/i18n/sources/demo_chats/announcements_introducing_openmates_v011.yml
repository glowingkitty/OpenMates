    # Primeiro, um breve resumo da v0.10
    
    A v0.10 adicionou links da Wikipédia nas respostas, destaques e comentários em mensagens, melhores páginas de anúncios públicos/exemplos, transferências bancárias SEPA e alterações de e-mail de conta.
    
    Estas alterações tornaram o OpenMates mais útil como um espaço de trabalho diário: mais fácil para aprender, mais fácil de partilhar e menos frágil no que toca ao básico de conta e pagamentos.
    
    # ✨ O que há de novo na v0.11
    
    ## 1. Inspirações Diárias expandidas
    
    As Inspirações Diárias tornaram-se mais ricas e variadas. Podem apresentar vídeos públicos, ideias de funcionalidades úteis e pontos de partida concretos para coisas que possas querer fazer no OpenMates.
    
    O objetivo é fazer com que o OpenMates pareça menos uma caixa de chatbot vazia e mais um lugar que te ajuda a descobrir coisas úteis para fazer: pesquisar um tópico, compreender um vídeo, planear uma tarefa, explorar uma ferramenta ou continuar a partir de um exemplo.
    
    ## 2. Melhorias na execução e pesquisa de código
    
    A app de Código deu um grande passo em frente. O OpenMates agora pode executar código numa sandbox, mostrar resultados, ajudar com pesquisas em repositórios e lidar com mais ações de seguimento relacionadas com código.
    
    Para utilizadores comuns, isto é útil mesmo que não sejas um programador profissional: pequenos scripts, limpeza de dados, geração de documentos, pré-visualizações de websites, explicações de logs e questões técnicas podem tornar-se mais interativos.
    
    ## 3. Geração de música e melhorias nos fornecedores de imagem
    
    A v0.11 expande os fluxos de trabalho de media gerada com geração de música e melhorias nos fornecedores de geração de imagem. Isso significa que o OpenMates pode suportar mais tarefas criativas diretamente no chat: criar uma ideia musical rápida, gerar conceitos visuais, iterar em prompts ou transformar uma ideia bruta em media que podes realmente inspecionar e reutilizar.
    
    O trabalho também melhora a forma como a media gerada é apresentada, para que os resultados sejam mais fáceis de pré-visualizar, abrir e continuar.
    
    ## 4. Resultados de apps e detalhes de fornecedores mais claros
    
    Muitos cartões de apps e pré-visualizações incorporadas mostram agora melhores exemplos reais, logótipos de fornecedores, informações de origem e metadados mais claros. Isto torna mais fácil compreender o que aconteceu, de onde veio um resultado e qual a competência da app que foi utilizada.
    
    Para o uso diário, isso significa menos adivinhação: resultados de viagens, resultados web, ficheiros gerados, outputs de media e resultados de código devem ser mais fáceis de reconhecer e utilizar.
    
    ## 5. Melhor apresentação de seguimento
    
    As sugestões de seguimento já existiam, mas a sua apresentação é agora mais limpa e fácil de usar. Destinam-se a ajudar-te a continuar uma tarefa sem teres de pensar tu próprio no próximo prompt perfeito.
    
    ## 6. Fontes de interface locais
    
    Agora podes escolher preferências de fontes de interface locais. É uma definição pequena, mas importa se passas muito tempo a ler e a escrever no OpenMates.
    
    ## 7. Melhorias de estabilidade e desempenho
    
    Houve também melhorias de estabilidade e desempenho na sincronização do chat, incorporações, pré-visualizações de ficheiros e pré-visualizações de resultados de imagem.
    
    # O que vem a seguir
    
    O próximo passo é continuar a tornar o OpenMates mais fácil de compreender e de usar: melhores exemplos, fluxos de apps mais claros, ferramentas criativas e de pesquisa mais polidas e menos arestas por limar na experiência de chat.
    
