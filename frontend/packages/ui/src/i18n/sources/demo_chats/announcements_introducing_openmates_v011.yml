message:
  context: 'Newsletter announcements/introducing-openmates-v011 — message'
  en: |-
    Hey there,
    
    OpenMates v0.11 is now live. This update builds on the v0.10 improvements and adds a lot of practical everyday features: better follow-up suggestions, richer daily inspirations, code execution, music and media generation, local interface fonts, and the first version of the referral program.
    
    # First, a quick v0.10 recap
    
    v0.10 added Wikipedia links inside answers, message highlights and comments, better public announcement/example pages, SEPA bank transfers, improved Stripe checkout, account email changes, and a more polished intro/onboarding experience.
    
    Those changes made OpenMates more useful as a daily workspace: easier to learn from, easier to share, and less fragile around the account and payment basics.
    
    # ✨ What is new in v0.11
    
    ## 1. Follow-up suggestions
    
    OpenMates can now suggest useful next steps after a response. Instead of staring at a blank input field, you may see relevant follow-up questions or actions that continue the conversation naturally.
    
    This is especially useful for research, planning, learning, debugging, travel ideas, and longer tasks where the next step is not always obvious.
    
    ## 2. Expanded Daily Inspirations
    
    Daily Inspirations became richer and more varied. They can surface public videos, feature ideas and other useful starting points, while still keeping personalization private to your device when user-specific context is involved.
    
    The goal is to make OpenMates feel less like an empty chatbot box and more like a place that helps you discover useful things to do.
    
    ## 3. Code execution and code research improvements
    
    The Code app got a big step forward. OpenMates can now run code in a sandbox, show outputs, help with repository searches, and handle more code-related follow-up actions.
    
    For everyday users this is useful even if you are not a professional developer: small scripts, data cleanup, document generation, website previews and technical explanations can now become more interactive.
    
    ## 4. More creative media tools
    
    OpenMates added and improved support for generated media workflows, including image generation improvements and music generation. There is also more safety handling around generated media so these tools can be useful without being careless.
    
    ## 5. More useful app examples and provider details
    
    Many app cards and embed previews now show better real examples, provider logos, source information and clearer metadata. This makes it easier to understand what happened, where a result came from, and which app skill was used.
    
    ## 6. Local interface fonts
    
    You can now choose local interface font preferences. It is a small setting, but it matters if you spend a lot of time reading and writing in OpenMates.
    
    ## 7. Referral program foundation
    
    v0.11 includes the first referral credit program: share your referral link, and when someone joins and makes an eligible first credit purchase, both of you can receive free credits.
    
    This is intentionally a more organic growth path than tracking ads or dark patterns: people recommend OpenMates when they actually find it useful.
    
    ## 8. More reliability work
    
    There were also many improvements behind the scenes: encrypted chat compression checkpoints, better sync recovery, improved shared chat/embed handling, more reliable file and image result previews, and many E2E stability fixes.
    
    # What comes next
    
    The next step is to keep making OpenMates easier to understand and easier to use: better examples, clearer app flows, more polished creative and research tools, and fewer rough edges in the chat experience.
    
    Thanks for using OpenMates and for giving feedback when something feels confusing or broken.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates v0.11 ist jetzt live. Dieses Update baut auf den v0.10-Verbesserungen auf und bringt viele praktische Alltagsfunktionen: bessere Follow-up-Vorschläge, umfangreichere Daily Inspirations, Code-Ausführung, Musik- und Mediengenerierung, lokale Interface-Schriften und die erste Version des Empfehlungsprogramms.
    
    # Zuerst kurz zu v0.10
    
    v0.10 brachte Wikipedia-Links direkt in Antworten, Markierungen und Kommentare für Nachrichten, bessere öffentliche Ankündigungs- und Beispielseiten, SEPA-Überweisungen, verbesserten Stripe-Checkout, E-Mail-Änderungen für Accounts und ein polierteres Intro-/Onboarding-Erlebnis.
    
    Diese Änderungen machten OpenMates im Alltag nützlicher: besser zum Lernen, leichter zu teilen und weniger fragil bei Account- und Zahlungsgrundlagen.
    
    # ✨ Neu in v0.11
    
    ## 1. Follow-up-Vorschläge
    
    OpenMates kann nach einer Antwort sinnvolle nächste Schritte vorschlagen. Statt vor einem leeren Eingabefeld zu sitzen, bekommst du passende Anschlussfragen oder Aktionen, die das Gespräch natürlich weiterführen.
    
    Das ist besonders hilfreich bei Recherche, Planung, Lernen, Debugging, Reiseideen und längeren Aufgaben, bei denen der nächste Schritt nicht immer offensichtlich ist.
    
    ## 2. Erweiterte Daily Inspirations
    
    Daily Inspirations wurden vielseitiger. Sie können öffentliche Videos, Feature-Ideen und andere hilfreiche Startpunkte zeigen, während persönliche Anpassung weiterhin privat auf deinem Gerät bleibt, wenn nutzerspezifischer Kontext beteiligt ist.
    
    OpenMates soll sich dadurch weniger wie ein leeres Chatbot-Feld anfühlen und mehr wie ein Ort, der dir hilft, nützliche Dinge zu entdecken.
    
    ## 3. Code-Ausführung und bessere Code-Recherche
    
    Die Code-App machte einen großen Schritt nach vorne. OpenMates kann jetzt Code in einer Sandbox ausführen, Ausgaben anzeigen, bei Repository-Suchen helfen und mehr Code-bezogene Follow-up-Aktionen unterstützen.
    
    Das ist auch dann nützlich, wenn du nicht professionell programmierst: kleine Skripte, Datenbereinigung, Dokumentenerstellung, Website-Vorschauen und technische Erklärungen können interaktiver werden.
    
    ## 4. Mehr kreative Medien-Tools
    
    OpenMates hat Workflows für generierte Medien erweitert und verbessert, darunter Bildgenerierung und Musikgenerierung. Zusätzlich gibt es mehr Sicherheitslogik rund um generierte Medien, damit diese Tools nützlich bleiben, ohne leichtfertig zu werden.
    
    ## 5. Bessere App-Beispiele und Provider-Details
    
    Viele App-Karten und Embed-Vorschauen zeigen jetzt bessere echte Beispiele, Provider-Logos, Quelleninformationen und klarere Metadaten. Dadurch ist besser nachvollziehbar, was passiert ist, woher ein Ergebnis kommt und welcher App-Skill genutzt wurde.
    
    ## 6. Lokale Interface-Schriften
    
    Du kannst jetzt lokale Schriftpräferenzen für die Oberfläche auswählen. Das ist eine kleine Einstellung, aber wichtig, wenn du viel in OpenMates liest und schreibst.
    
    ## 7. Grundlage für das Empfehlungsprogramm
    
    v0.11 enthält die erste Version des Empfehlungsprogramms: Teile deinen Empfehlungslink, und wenn jemand beitritt und einen berechtigten ersten Guthaben-Kauf macht, könnt ihr beide Gratis-Credits erhalten.
    
    Das ist bewusst ein organischerer Weg zu wachsen als Tracking-Anzeigen oder Dark Patterns: Menschen empfehlen OpenMates weiter, wenn sie es wirklich nützlich finden.
    
    ## 8. Mehr Zuverlässigkeit im Hintergrund
    
    Außerdem gab es viele Verbesserungen im Hintergrund: verschlüsselte Chat-Kompressionspunkte, bessere Sync-Wiederherstellung, stabilere geteilte Chats und Embeds, zuverlässigere Datei- und Bildvorschauen und viele E2E-Stabilitätsfixes.
    
    # Was als Nächstes kommt
    
    Der nächste Schritt ist, OpenMates weiter verständlicher und einfacher nutzbar zu machen: bessere Beispiele, klarere App-Flows, poliertere Kreativ- und Recherche-Tools und weniger raue Kanten im Chat-Erlebnis.
    
    Danke, dass du OpenMates nutzt und Feedback gibst, wenn etwas verwirrend oder kaputt wirkt.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
