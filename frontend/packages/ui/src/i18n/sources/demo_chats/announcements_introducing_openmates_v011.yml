    أضاف الإصدار v0.10 روابط ويكيبيديا داخل الإجابات، وتمييز الرسائل والتعليقات، وصفحات إعلانات/أمثلة عامة أفضل، وتحويلات SEPA البنكية، وتغيير البريد الإلكتروني للحساب.
    
    جعلت هذه التغييرات OpenMates أكثر فائدة كمساحة عمل يومية: أسهل في التعلم، أسهل في المشاركة، وأكثر استقراراً فيما يخص أساسيات الحساب والدفع.
    
    # ✨ ما الجديد في الإصدار v0.11
    
    ## 1. إلهامات يومية موسعة
    
    أصبحت الإلهامات اليومية أغنى وأكثر تنوعاً. يمكنها الآن عرض فيديوهات عامة، وأفكار ميزات مفيدة، ونقاط بداية ملموسة لأشياء قد ترغب في القيام بها في OpenMates.
    
    الهدف هو جعل OpenMates يبدو أقل كصندوق دردشة فارغ وأكثر كمكان يساعدك على اكتشاف أشياء مفيدة للقيام بها: البحث في موضوع ما، فهم فيديو، التخطيط لمهمة، استكشاف أداة، أو المتابعة من مثال سابق.
    
    ## 2. تحسينات تنفيذ الأكواد والبحث البرمجي
    
    خطا تطبيق الكود خطوة كبيرة للأمام. يمكن لـ OpenMates الآن تشغيل الأكواد في بيئة معزولة (sandbox)، وعرض المخرجات، والمساعدة في البحث في المستودعات، والتعامل مع المزيد من إجراءات المتابعة المتعلقة بالكود.
    
    بالنسبة للمستخدمين العاديين، هذا مفيد حتى لو لم تكن مطوراً محترفاً: السكربتات الصغيرة، تنظيف البيانات، إنشاء المستندات، معاينة المواقع، شرح سجلات الأخطاء (logs)، والأسئلة التقنية يمكن أن تصبح أكثر تفاعلية.
    
    ## 3. توليد الموسيقى وتحسينات مزودي الصور
    
    يوسع الإصدار v0.11 سير عمل الوسائط المولدة مع توليد الموسيقى وتحسينات حول مزودي توليد الصور. هذا يعني أن OpenMates يمكنه دعم المزيد من المهام الإبداعية مباشرة في الدردشة: إنشاء فكرة موسيقية سريعة، توليد مفاهيم بصرية، تكرار الأوامر (prompts)، أو تحويل فكرة أولية إلى وسائط يمكنك فحصها وإعادة استخدامها.
    
    كما يحسن هذا العمل كيفية عرض الوسائط المولدة، بحيث يسهل معاينة النتائج وفتحها والمتابعة منها.
    
    ## 4. نتائج تطبيقات وتفاصيل مزودين أوضح
    
    تعرض العديد من بطاقات التطبيقات ومعاينات التضمين الآن أمثلة حقيقية أفضل، وشعارات المزودين، ومعلومات المصدر، وبيانات وصفية (metadata) أوضح. هذا يسهل فهم ما حدث، ومن أين أتت النتيجة، وأي مهارة تطبيق تم استخدامها.
    
    للاستخدام اليومي، يعني هذا تخميناً أقل: نتائج السفر، نتائج الويب، الملفات المولدة، مخرجات الوسائط، ونتائج الأكواد يجب أن تكون أسهل في التعرف عليها والتعامل معها.
    
    ## 5. عرض أفضل لاقتراحات المتابعة
    
    كانت اقتراحات المتابعة موجودة بالفعل، لكن عرضها الآن أصبح أكثر ترتيباً وسهولة في الاستخدام. تهدف لمساعدتك على إكمال المهمة دون الحاجة للتفكير في الأمر التالي المثالي بنفسك.
    
    ## 6. خطوط واجهة محلية
    
    يمكنك الآن اختيار تفضيلات خطوط الواجهة المحلية. إنه إعداد صغير، لكنه مهم إذا كنت تقضي الكثير من الوقت في القراءة والكتابة في OpenMates.
    
    ## 7. تحسينات في الاستقرار والأداء
    
    كانت هناك أيضاً تحسينات في الاستقرار والأداء في مزامنة الدردشة، والتضمينات، ومعاينات الملفات، ومعاينات نتائج الصور.
    
    # ما التالي
    
    الخطوة التالية هي الاستمرار في جعل OpenMates أسهل في الفهم والاستخدام: أمثلة أفضل، تدفقات تطبيقات أوضح، أدوات إبداعية وبحثية أكثر صقلاً، وتقليل العقبات في تجربة الدردشة.
    
    شكراً لاستخدامك OpenMates ولتقديم ملاحظاتك عندما تشعر أن شيئاً ما محير أو معطل.
    
