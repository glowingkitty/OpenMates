  en: |-
    Hey there,
    
    OpenMates v0.11 is now live. This update builds on the v0.10 improvements and adds practical everyday features: richer Daily Inspirations, code execution, repository research, music generation, image-generation provider improvements, clearer app results, and local interface fonts.
    
    [cta]
    
    # First, a quick v0.10 recap
    
    v0.10 added Wikipedia links inside answers, message highlights and comments, better public announcement/example pages, SEPA bank transfers, and account email changes.
    
    Those changes made OpenMates more useful as a daily workspace: easier to learn from, easier to share, and less fragile around the account and payment basics.
    
    # ✨ What is new in v0.11
    
    ## 1. Expanded Daily Inspirations
    
    Daily Inspirations became richer and more varied. They can surface public videos, useful feature ideas, and concrete starting points for things you may want to do in OpenMates.
    
    The goal is to make OpenMates feel less like an empty chatbot box and more like a place that helps you discover useful things to do: research a topic, understand a video, plan a task, explore a tool, or continue from an example.
    
    ## 2. Code execution and code research improvements
    
    The Code app got a big step forward. OpenMates can now run code in a sandbox, show outputs, help with repository searches, and handle more code-related follow-up actions.
    
    For everyday users this is useful even if you are not a professional developer: small scripts, data cleanup, document generation, website previews, log explanations, and technical questions can become more interactive.
    
    ## 3. Music generation and image provider improvements
    
    v0.11 expands generated-media workflows with music generation and improvements around image-generation providers. That means OpenMates can support more creative tasks directly in chat: making a quick music idea, generating visual concepts, iterating on prompts, or turning a rough idea into media you can actually inspect and reuse.
    
    The work also improves how generated media is presented, so results are easier to preview, open, and continue from.
    
    ## 4. Clearer app results and provider details
    
    Many app cards and embed previews now show better real examples, provider logos, source information and clearer metadata. This makes it easier to understand what happened, where a result came from, and which app skill was used.
    
    For daily use, that means less guessing: travel results, web results, generated files, media outputs, and code results should be easier to recognize and act on.
    
    ## 5. Better follow-up presentation
    
    Follow-up suggestions already existed, but their presentation is now cleaner and easier to use. They are meant to help you continue a task without having to think of the perfect next prompt yourself.
    
    ## 6. Local interface fonts
    
    You can now choose local interface font preferences. It is a small setting, but it matters if you spend a lot of time reading and writing in OpenMates.
    
    ## 7. Stability and performance improvements
    
    There were also stability and performance improvements in chat sync, embeds, file previews, and image result previews.
    
    # What comes next
    
    The next step is to keep making OpenMates easier to understand and easier to use: better examples, clearer app flows, more polished creative and research tools, and fewer rough edges in the chat experience.
    
    Thanks for using OpenMates and for giving feedback when something feels confusing or broken.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates v0.11 ist jetzt live. Dieses Update baut auf den v0.10-Verbesserungen auf und bringt praktische Alltagsfunktionen: umfangreichere Daily Inspirations, Code-Ausführung, Repository-Recherche, Musikgenerierung, Verbesserungen bei Bildgenerierungs-Providern, klarere App-Ergebnisse und lokale Interface-Schriften.
    
    [cta]
    
    # Zuerst kurz zu v0.10
    
    v0.10 brachte Wikipedia-Links direkt in Antworten, Markierungen und Kommentare für Nachrichten, bessere öffentliche Ankündigungs- und Beispielseiten, SEPA-Überweisungen und E-Mail-Änderungen für Accounts.
    
    Diese Änderungen machten OpenMates im Alltag nützlicher: besser zum Lernen, leichter zu teilen und weniger fragil bei Account- und Zahlungsgrundlagen.
    
    # ✨ Neu in v0.11
    
    ## 1. Erweiterte Daily Inspirations
    
    Daily Inspirations wurden vielseitiger. Sie können öffentliche Videos, nützliche Feature-Ideen und konkrete Startpunkte für Dinge zeigen, die du in OpenMates tun kannst.
    
    OpenMates soll sich dadurch weniger wie ein leeres Chatbot-Feld anfühlen und mehr wie ein Ort, der dir hilft, nützliche Dinge zu entdecken: ein Thema recherchieren, ein Video verstehen, eine Aufgabe planen, ein Tool ausprobieren oder von einem Beispiel aus weiterarbeiten.
    
    ## 2. Code-Ausführung und bessere Code-Recherche
    
    Die Code-App machte einen großen Schritt nach vorne. OpenMates kann jetzt Code in einer Sandbox ausführen, Ausgaben anzeigen, bei Repository-Suchen helfen und mehr Code-bezogene Anschlussaktionen unterstützen.
    
    Das ist auch dann nützlich, wenn du nicht professionell programmierst: kleine Skripte, Datenbereinigung, Dokumentenerstellung, Website-Vorschauen, Log-Erklärungen und technische Fragen können interaktiver werden.
    
    ## 3. Musikgenerierung und bessere Bild-Provider
    
    v0.11 erweitert Workflows für generierte Medien mit Musikgenerierung und Verbesserungen rund um Bildgenerierungs-Provider. Dadurch kann OpenMates mehr kreative Aufgaben direkt im Chat unterstützen: eine schnelle Musikidee erstellen, visuelle Konzepte generieren, Prompts iterieren oder aus einer groben Idee Medien machen, die du prüfen und weiterverwenden kannst.
    
    Außerdem wurde verbessert, wie generierte Medien angezeigt werden, damit Ergebnisse leichter zu prüfen, zu öffnen und weiterzuverwenden sind.
    
    ## 4. Klarere App-Ergebnisse und Provider-Details
    
    Viele App-Karten und Embed-Vorschauen zeigen jetzt bessere echte Beispiele, Provider-Logos, Quelleninformationen und klarere Metadaten. Dadurch ist besser nachvollziehbar, was passiert ist, woher ein Ergebnis kommt und welcher App-Skill genutzt wurde.
    
    Im Alltag bedeutet das weniger Rätselraten: Reiseergebnisse, Web-Ergebnisse, generierte Dateien, Medienausgaben und Code-Ergebnisse sollten leichter zu erkennen und zu nutzen sein.
    
    ## 5. Bessere Darstellung von Follow-up-Vorschlägen
    
    Follow-up-Vorschläge gab es bereits, aber ihre Darstellung ist jetzt klarer und leichter nutzbar. Sie sollen dir helfen, eine Aufgabe fortzusetzen, ohne selbst den perfekten nächsten Prompt formulieren zu müssen.
    
    ## 6. Lokale Interface-Schriften
    
    Du kannst jetzt lokale Schriftpräferenzen für die Oberfläche auswählen. Das ist eine kleine Einstellung, aber wichtig, wenn du viel in OpenMates liest und schreibst.
    
    ## 7. Stabilitäts- und Performance-Verbesserungen
    
    Außerdem gab es Stabilitäts- und Performance-Verbesserungen bei Chat-Sync, Embeds, Datei-Vorschauen und Bild-Ergebnisvorschauen.
    
    # Was als Nächstes kommt
    
    Der nächste Schritt ist, OpenMates weiter verständlicher und einfacher nutzbar zu machen: bessere Beispiele, klarere App-Flows, poliertere Kreativ- und Recherche-Tools und weniger raue Kanten im Chat-Erlebnis.
    
    Danke, dass du OpenMates nutzt und Feedback gibst, wenn etwas verwirrend oder kaputt wirkt.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
  zh: |
    你好，
    
    OpenMates v0.11 现已上线。此更新在 v0.10 的改进基础上，增加了实用的日常功能：更丰富的每日灵感、代码执行、仓库研究、音乐生成、图像生成提供商改进、更清晰的应用结果以及本地界面字体。
    
    [cta]
    
    # 首先，快速回顾一下 v0.10
    
    v0.10 在回答中加入了维基百科链接、消息高亮和评论、更好的公开公告/示例页面、SEPA 银行转账以及账户邮箱更改功能。
    
    这些变化使 OpenMates 作为一个日常工作空间变得更加实用：更易于学习、更易于分享，并且在账户和支付基础功能方面更加稳健。
    
    # ✨ v0.11 有哪些新功能
    
    ## 1. 扩展的每日灵感
    
    每日灵感变得更加丰富多样。它们可以展示公开视频、实用的功能创意，以及你在 OpenMates 中可能想要尝试的具体切入点。
    
    我们的目标是让 OpenMates 感觉不再像是一个空荡荡的聊天框，而更像是一个能帮助你发现有用之事的地方：研究课题、理解视频、规划任务、探索工具或从示例开始继续操作。
    
    ## 2. 代码执行和代码研究改进
    
    代码应用迈出了一大步。OpenMates 现在可以在沙盒中运行代码、显示输出、协助仓库搜索，并处理更多与代码相关的后续操作。
    
    对于普通用户来说，即使你不是专业开发人员，这也非常有用：小脚本、数据清理、文档生成、网站预览、日志解释和技术问题都可以变得更具互动性。
    
    ## 3. 音乐生成和图像提供商改进
    
    v0.11 通过音乐生成和图像生成提供商的改进，扩展了生成式媒体工作流。这意味着 OpenMates 可以直接在聊天中支持更多创意任务：快速制作音乐创意、生成视觉概念、迭代提示词，或者将粗略的想法转化为你可以实际检查和重用的媒体。
    
    这项工作还改进了生成媒体的呈现方式，使结果更易于预览、打开和继续操作。
    
    ## 4. 更清晰的应用结果和提供商详情
    
    许多应用卡片和嵌入预览现在显示了更好的真实示例、提供商图标、来源信息和更清晰的元数据。这使得理解发生了什么、结果来自哪里以及使用了哪项应用技能变得更加容易。
    
    对于日常使用，这意味着更少的猜测：旅游结果、网页结果、生成的文件、媒体输出和代码结果应该更容易识别和处理。
    
    ## 5. 更好的后续建议呈现
    
    后续建议功能此前已经存在，但现在的呈现方式更加简洁且易于使用。它们旨在帮助你继续任务，而无需你自己去构思完美的下一个提示词。
    
    ## 6. 本地界面字体
    
    你现在可以选择本地界面字体偏好。这是一个很小的设置，但如果你花大量时间在 OpenMates 中阅读和写作，它就很重要。
    
    ## 7. 稳定性和性能改进
    
    聊天同步、嵌入、文件预览和图像结果预览方面的稳定性和性能也得到了提升。
    
    # 下一步计划
    
    下一步是继续让 OpenMates 变得更易于理解和使用：更好的示例、更清晰的应用流程、更完善的创意和研究工具，以及更流畅的聊天体验。
    
    感谢你使用 OpenMates，并在感到困惑或发现问题时提供反馈。
    
    祝好，
    
    Marco  
    OpenMates 创始人
  es: |
    Hola,
    
    OpenMates v0.11 ya está disponible. Esta actualización se basa en las mejoras de la v0.10 y añade funciones prácticas para el día a día: Inspiraciones Diarias más completas, ejecución de código, investigación de repositorios, generación de música, mejoras en los proveedores de generación de imágenes, resultados de aplicaciones más claros y fuentes de interfaz locales.
    
    [cta]
    
    # Primero, un breve resumen de la v0.10
    
    La v0.10 añadió enlaces de Wikipedia dentro de las respuestas, destacados y comentarios en los mensajes, mejores páginas de anuncios públicos y ejemplos, transferencias bancarias SEPA y cambios de correo electrónico de la cuenta.
    
    Esos cambios hicieron que OpenMates fuera más útil como espacio de trabajo diario: más fácil para aprender, más fácil de compartir y menos frágil en lo que respecta a los aspectos básicos de la cuenta y los pagos.
    
    # ✨ Novedades de la v0.11
    
    ## 1. Inspiraciones Diarias ampliadas
    
    Las Inspiraciones Diarias son ahora más completas y variadas. Pueden mostrar vídeos públicos, ideas de funciones útiles y puntos de partida concretos para cosas que quieras hacer en OpenMates.
    
    El objetivo es que OpenMates se sienta menos como una caja de chatbot vacía y más como un lugar que te ayuda a descubrir cosas útiles que hacer: investigar un tema, entender un vídeo, planificar una tarea, explorar una herramienta o continuar a partir de un ejemplo.
    
    ## 2. Mejoras en la ejecución e investigación de código
    
    La aplicación de Código ha dado un gran paso adelante. OpenMates ahora puede ejecutar código en un entorno seguro (sandbox), mostrar resultados, ayudar con búsquedas en repositorios y gestionar más acciones de seguimiento relacionadas con el código.
    
    Para los usuarios habituales, esto es útil incluso si no eres un desarrollador profesional: pequeños scripts, limpieza de datos, generación de documentos, previsualizaciones de sitios web, explicaciones de registros (logs) y preguntas técnicas pueden volverse más interactivos.
    
    ## 3. Generación de música y mejoras en los proveedores de imágenes
    
    La v0.11 amplía los flujos de trabajo de medios generados con la generación de música y mejoras en los proveedores de generación de imágenes. Esto significa que OpenMates puede admitir más tareas creativas directamente en el chat: crear una idea musical rápida, generar conceptos visuales, iterar sobre prompts o convertir una idea aproximada en contenido multimedia que realmente puedas inspeccionar y reutilizar.
    
    Este trabajo también mejora la forma en que se presentan los medios generados, para que los resultados sean más fáciles de previsualizar, abrir y continuar.
    
    ## 4. Resultados de aplicaciones y detalles de proveedores más claros
    
    Muchas tarjetas de aplicaciones y previsualizaciones incrustadas muestran ahora mejores ejemplos reales, logotipos de proveedores, información de origen y metadatos más claros. Esto facilita la comprensión de lo que ha ocurrido, de dónde procede un resultado y qué habilidad de la aplicación se ha utilizado.
    
    Para el uso diario, esto significa menos conjeturas: los resultados de viajes, los resultados web, los archivos generados, las salidas multimedia y los resultados de código deberían ser más fáciles de reconocer y de utilizar.
    
    ## 5. Mejor presentación de las acciones de seguimiento
    
    Las sugerencias de seguimiento ya existían, pero su presentación es ahora más limpia y fácil de usar. Están pensadas para ayudarte a continuar una tarea sin tener que pensar tú mismo en el siguiente prompt perfecto.
    
    ## 6. Fuentes de interfaz locales
    
