    OpenMates v0.11 je nyní k dispozici. Tato aktualizace staví na vylepšeních verze v0.10 a přidává praktické funkce pro každý den: bohatší Denní inspirace, spouštění kódu, průzkum repozitářů, generování hudby, vylepšení poskytovatelů generování obrázků, přehlednější výsledky aplikací a lokální písma rozhraní.
    
    # Nejdříve rychlá rekapitulace v0.10
    
    Verze v0.10 přidala odkazy na Wikipedii přímo v odpovědích, zvýraznění zpráv a komentáře, lepší stránky s veřejnými oznámeními/příklady, bankovní převody SEPA a změny e-mailu účtu.
    
    Díky těmto změnám se OpenMates stal užitečnějším každodenním pracovním prostorem: lépe se z něj učí, snáze se sdílí a je stabilnější v základech týkajících se účtu a plateb.
    
    # ✨ Co je nového ve v0.11
    
    ## 1. Rozšířené Denní inspirace
    
    Denní inspirace jsou nyní bohatší a rozmanitější. Mohou zobrazovat veřejná videa, užitečné nápady na funkce a konkrétní výchozí body pro věci, které bys mohl chtít v OpenMates dělat.
    
    Cílem je, aby OpenMates nepůsobil jen jako prázdné okno chatbotu, ale spíše jako místo, které ti pomůže objevovat užitečné činnosti: prozkoumat téma, pochopit video, naplánovat úkol, prozkoumat nástroj nebo navázat na příklad.
    
    ## 2. Spouštění kódu a vylepšení průzkumu kódu
    
    Aplikace Kód udělala velký krok vpřed. OpenMates nyní dokáže spouštět kód v sandboxu, zobrazovat výstupy, pomáhat s vyhledáváním v repozitářích a zvládat více následných akcí souvisejících s kódem.
    
    Pro běžné uživatele je to užitečné, i když nejsi profesionální vývojář: malé skripty, čištění dat, generování dokumentů, náhledy webových stránek, vysvětlování logů a technické dotazy mohou být nyní interaktivnější.
    
    ## 3. Generování hudby a vylepšení poskytovatelů obrázků
    
    Verze v0.11 rozšiřuje pracovní postupy s generovanými médii o generování hudby a vylepšení u poskytovatelů generování obrázků. To znamená, že OpenMates může podporovat více kreativních úkolů přímo v chatu: vytvoření rychlého hudebního nápadu, generování vizuálních konceptů, iterování promptů nebo přeměnu hrubého nápadu v média, která si můžeš skutečně prohlédnout a znovu použít.
    
    Tato práce také vylepšuje způsob prezentace generovaných médií, takže výsledky lze snáze prohlížet, otevírat a navazovat na ně.
    
    ## 4. Přehlednější výsledky aplikací a podrobnosti o poskytovatelích
    
    Mnoho karet aplikací a náhledů vloženého obsahu nyní zobrazuje lepší reálné příklady, loga poskytovatelů, informace o zdrojích a jasnější metadata. Díky tomu je snazší pochopit, co se stalo, odkud výsledek pochází a která dovednost aplikace byla použita.
    
    Pro každodenní použití to znamená méně hádání: výsledky cestování, webové výsledky, generované soubory, mediální výstupy a výsledky kódu by měly být snadněji rozpoznatelné a použitelné.
    
    ## 5. Lepší prezentace následných kroků
    
    Návrhy následných kroků již existovaly, ale jejich prezentace je nyní čistší a snadněji se používá. Mají ti pomoci pokračovat v úkolu, aniž bys musel sám vymýšlet dokonalý další prompt.
    
    ## 6. Lokální písma rozhraní
    
    Nyní si můžeš zvolit preference lokálních písem rozhraní. Je to malé nastavení, ale záleží na něm, pokud v OpenMates trávíš hodně času čtením a psaním.
    
    ## 7. Vylepšení stability a výkonu
    
    Došlo také k vylepšení stability a výkonu v synchronizaci chatu, vloženém obsahu, náhledech souborů a náhledech výsledků obrázků.
    
    # Co přijde příště
    
    Dalším krokem je i nadále činit OpenMates srozumitelnějším a snadněji použitelným: lepší příklady, jasnější toky aplikací, propracovanější kreativní a výzkumné nástroje a méně nedostatků v chatu.
    
    Díky, že používáš OpenMates a že nám dáváš zpětnou vazbu, když ti něco připadá matoucí nebo nefunguje.
    
