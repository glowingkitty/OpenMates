    # Trước tiên, hãy cùng điểm lại nhanh v0.10
    
    v0.10 đã thêm các liên kết Wikipedia bên trong câu trả lời, làm nổi bật tin nhắn và bình luận, các trang thông báo/ví dụ công khai tốt hơn, chuyển khoản ngân hàng SEPA và thay đổi email tài khoản.
    
    Những thay đổi này giúp OpenMates trở nên hữu ích hơn như một không gian làm việc hàng ngày: dễ học hỏi hơn, dễ chia sẻ hơn và ổn định hơn về các vấn đề cơ bản liên quan đến tài khoản và thanh toán.
    
    # ✨ Có gì mới trong v0.11
    
    ## 1. Mở rộng Cảm hứng hàng ngày (Daily Inspirations)
    
    Cảm hứng hàng ngày trở nên phong phú và đa dạng hơn. Chúng có thể hiển thị các video công khai, các ý tưởng tính năng hữu ích và các điểm bắt đầu cụ thể cho những việc bạn có thể muốn thực hiện trong OpenMates.
    
    Mục tiêu là làm cho OpenMates bớt giống một khung chatbot trống rỗng và giống một nơi giúp bạn khám phá những điều hữu ích để làm hơn: nghiên cứu một chủ đề, hiểu một video, lập kế hoạch cho một nhiệm vụ, khám phá một công cụ hoặc tiếp tục từ một ví dụ.
    
    ## 2. Cải tiến thực thi mã và nghiên cứu mã
    
    Ứng dụng Code đã có một bước tiến lớn. OpenMates hiện có thể chạy mã trong môi trường thử nghiệm (sandbox), hiển thị kết quả đầu ra, hỗ trợ tìm kiếm kho lưu trữ và xử lý nhiều hành động tiếp theo liên quan đến mã hơn.
    
    Đối với người dùng thông thường, điều này vẫn hữu ích ngay cả khi bạn không phải là lập trình viên chuyên nghiệp: các đoạn mã nhỏ, dọn dẹp dữ liệu, tạo tài liệu, xem trước trang web, giải thích nhật ký (log) và các câu hỏi kỹ thuật có thể trở nên tương tác hơn.
    
    ## 3. Tạo nhạc và cải thiện nhà cung cấp hình ảnh
    
    v0.11 mở rộng quy trình làm việc với phương tiện được tạo ra bằng tính năng tạo nhạc và các cải tiến xung quanh các nhà cung cấp tạo hình ảnh. Điều đó có nghĩa là OpenMates có thể hỗ trợ nhiều tác vụ sáng tạo hơn trực tiếp trong đoạn chat: tạo ý tưởng âm nhạc nhanh, tạo các khái niệm hình ảnh, tinh chỉnh các câu lệnh (prompt) hoặc biến một ý tưởng thô thành phương tiện mà bạn thực sự có thể kiểm tra và tái sử dụng.
    
    Bản cập nhật cũng cải thiện cách trình bày các phương tiện được tạo ra, giúp kết quả dễ dàng xem trước, mở và tiếp tục thực hiện hơn.
    
    ## 4. Kết quả ứng dụng và chi tiết nhà cung cấp rõ ràng hơn
    
    Nhiều thẻ ứng dụng và bản xem trước nhúng hiện hiển thị các ví dụ thực tế tốt hơn, logo nhà cung cấp, thông tin nguồn và siêu dữ liệu rõ ràng hơn. Điều này giúp bạn dễ dàng hiểu chuyện gì đã xảy ra, kết quả đến từ đâu và kỹ năng ứng dụng nào đã được sử dụng.
    
    Đối với việc sử dụng hàng ngày, điều đó có nghĩa là ít phải đoán hơn: các kết quả du lịch, kết quả web, tệp được tạo, đầu ra phương tiện và kết quả mã sẽ dễ nhận biết và xử lý hơn.
    
    ## 5. Trình bày các bước tiếp theo tốt hơn
    
    Các gợi ý tiếp theo đã tồn tại từ trước, nhưng cách trình bày của chúng hiện đã gọn gàng và dễ sử dụng hơn. Chúng nhằm giúp bạn tiếp tục một nhiệm vụ mà không cần phải tự mình nghĩ ra câu lệnh tiếp theo hoàn hảo.
    
    ## 6. Phông chữ giao diện cục bộ
    
    Giờ đây bạn có thể chọn tùy chọn phông chữ giao diện cục bộ. Đây là một cài đặt nhỏ, nhưng nó quan trọng nếu bạn dành nhiều thời gian để đọc và viết trong OpenMates.
    
    ## 7. Cải thiện độ ổn định và hiệu suất
    
    Ngoài ra còn có các cải thiện về độ ổn định và hiệu suất trong việc đồng bộ hóa đoạn chat, các bản nhúng, xem trước tệp và xem trước kết quả hình ảnh.
    
    # Điều gì sẽ diễn ra tiếp theo
    
    Bước tiếp theo là tiếp tục làm cho OpenMates dễ hiểu và dễ sử dụng hơn: các ví dụ tốt hơn, luồng ứng dụng rõ ràng hơn, các công cụ sáng tạo và nghiên cứu trau chuốt hơn, và giảm bớt những điểm chưa hoàn thiện trong trải nghiệm chat.
    
    Cảm ơn bạn đã sử dụng OpenMates và đã phản hồi khi có điều gì đó gây nhầm lẫn hoặc bị lỗi.
    
    Thân ái,
    
