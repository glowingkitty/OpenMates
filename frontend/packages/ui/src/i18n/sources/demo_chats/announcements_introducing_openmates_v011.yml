    # Nejdříve rychlá rekapitulace v0.10
    
    Verze v0.10 přidala odkazy na Wikipedii přímo v odpovědích, zvýrazňování zpráv a komentáře, lepší stránky s veřejnými oznámeními a příklady, bankovní převody SEPA a změny e-mailu u účtu.
    
    Tyto změny udělaly z OpenMates užitečnější pracovní prostor pro každý den: lépe se z něj učí, snáze se sdílí a základy kolem účtu a plateb jsou stabilnější.
    
    # ✨ Co je nového ve v0.11
    
    ## 1. Rozšířené Denní inspirace
    
    Denní inspirace jsou nyní bohatší a rozmanitější. Mohou zobrazovat veřejná videa, užitečné nápady na funkce a konkrétní výchozí body pro věci, které chceš v OpenMates dělat.
    
    Cílem je, aby OpenMates nepůsobil jen jako prázdné okno chatbotu, ale spíše jako místo, které ti pomůže objevovat užitečné věci: prozkoumat téma, pochopit video, naplánovat úkol, prozkoumat nástroj nebo navázat na příklad.
    
    ## 2. Spouštění kódu a vylepšení průzkumu kódu
    
    Aplikace Kód udělala velký krok vpřed. OpenMates nyní umí spouštět kód v sandboxu, zobrazovat výstupy, pomáhat s vyhledáváním v repozitářích a zvládat více následných akcí souvisejících s kódem.
    
    Pro běžné uživatele je to užitečné, i když nejsi profesionální vývojář: malé skripty, čištění dat, generování dokumentů, náhledy webových stránek, vysvětlování logů a technické dotazy mohou být nyní interaktivnější.
    
    ## 3. Generování hudby a vylepšení poskytovatelů obrázků
    
    v0.11 rozšiřuje pracovní postupy pro generovaná média o generování hudby a vylepšení u poskytovatelů generování obrázků. To znamená, že OpenMates dokáže podpořit více kreativních úkolů přímo v chatu: vytvoření rychlého hudebního nápadu, generování vizuálních konceptů, ladění promptů nebo přeměnu hrubého nápadu v média, která si můžeš prohlédnout a znovu použít.
    
    Tato práce také zlepšuje způsob prezentace generovaných médií, takže výsledky lze snáze prohlížet, otevírat a dále s nimi pracovat.
    
    ## 4. Přehlednější výsledky aplikací a podrobnosti o poskytovatelích
    
    Mnoho karet aplikací a náhledů vloženého obsahu nyní zobrazuje lepší reálné příklady, loga poskytovatelů, informace o zdroji a srozumitelnější metadata. Díky tomu je snazší pochopit, co se stalo, odkud výsledek pochází a která dovednost aplikace byla použita.
    
    Pro každodenní použití to znamená méně hádání: výsledky cestování, webové výsledky, generované soubory, mediální výstupy a výsledky kódu by mělo být snazší rozpoznat a pracovat s nimi.
    
    ## 5. Lepší prezentace následných kroků
    
    Návrhy na následné kroky už existovaly, ale jejich prezentace je nyní čistší a snadněji se používá. Mají ti pomoci pokračovat v úkolu, aniž bys musel sám vymýšlet dokonalý další prompt.
    
    ## 6. Lokální písma rozhraní
    
    Nyní si můžeš vybrat preference lokálních písem rozhraní. Je to malé nastavení, ale záleží na něm, pokud v OpenMates trávíš hodně času čtením a psaním.
    
    ## 7. Vylepšení stability a výkonu
    
    Došlo také k vylepšení stability a výkonu v synchronizaci chatu, vloženém obsahu, náhledech souborů a náhledech výsledků obrázků.
    
    # Co přijde dál
    
    Dalším krokem je pokračovat v tom, aby byl OpenMates srozumitelnější a snadněji použitelný: lepší příklady, jasnější toky aplikací, vyladěnější kreativní a výzkumné nástroje a méně nedostatků v chatu.
    
    Díky, že používáš OpenMates a že nám dáváš zpětnou vazbu, když ti něco připadá matoucí nebo nefunguje.
    
