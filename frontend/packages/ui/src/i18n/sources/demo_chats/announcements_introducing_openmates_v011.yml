    OpenMates v0.11이 출시되었습니다. 이번 업데이트는 v0.10의 개선 사항을 바탕으로 일상적인 실용 기능을 추가했습니다: 더 풍성해진 일일 영감(Daily Inspirations), 코드 실행, 저장소 조사, 음악 생성, 이미지 생성 제공자 개선, 더 명확해진 앱 결과, 그리고 로컬 인터페이스 글꼴 등이 포함됩니다.
    
    # 먼저, v0.10 요약
    
    v0.10에서는 답변 내 위키백과 링크, 메시지 하이라이트 및 댓글, 개선된 공개 공지/예시 페이지, SEPA 은행 송금, 계정 이메일 변경 기능이 추가되었습니다.
    
    이러한 변화를 통해 OpenMates는 일상적인 작업 공간으로서 더 유용해졌습니다. 학습과 공유가 쉬워졌고, 계정 및 결제 관련 기본 기능도 더 안정화되었습니다.
    
    # ✨ v0.11의 새로운 기능
    
    ## 1. 확장된 일일 영감(Daily Inspirations)
    
    일일 영감이 더욱 풍성하고 다양해졌습니다. 이제 공개 동영상, 유용한 기능 아이디어, OpenMates에서 시도해 볼 수 있는 구체적인 시작점들을 제안합니다.
    
    목표는 OpenMates가 단순한 빈 챗봇 창이 아니라, 주제 조사, 동영상 이해, 작업 계획, 도구 탐색, 예시 활용 등 유용한 활동을 발견하도록 돕는 공간으로 느껴지게 하는 것입니다.
    
    ## 2. 코드 실행 및 코드 조사 개선
    
    코드 앱이 크게 발전했습니다. 이제 OpenMates는 샌드박스에서 코드를 실행하고, 결과를 보여주며, 저장소 검색을 돕고, 더 많은 코드 관련 후속 작업을 처리할 수 있습니다.
    
    개발자가 아닌 일반 사용자에게도 유용합니다. 간단한 스크립트, 데이터 정리, 문서 생성, 웹사이트 미리보기, 로그 설명, 기술적 질문 등을 더 대화형으로 진행할 수 있습니다.
    
    ## 3. 음악 생성 및 이미지 제공자 개선
    
    v0.11에서는 음악 생성 기능과 이미지 생성 제공자 개선을 통해 미디어 생성 워크플로우를 확장했습니다. 이제 채팅에서 직접 음악 아이디어를 만들고, 시각적 컨셉을 생성하며, 프롬프트를 반복 수정하거나, 대략적인 아이디어를 실제 확인하고 재사용할 수 있는 미디어로 바꿀 수 있습니다.
    
    또한 생성된 미디어의 표시 방식도 개선되어 결과를 더 쉽게 미리보고, 열고, 이어서 작업할 수 있습니다.
    
    ## 4. 더 명확해진 앱 결과 및 제공자 상세 정보
    
    많은 앱 카드와 임베드 미리보기에 실제 예시, 제공자 로고, 출처 정보 및 더 명확한 메타데이터가 표시됩니다. 이를 통해 어떤 일이 일어났는지, 결과가 어디서 왔는지, 어떤 앱 기능이 사용되었는지 더 쉽게 이해할 수 있습니다.
    
    일상적인 사용 시 추측할 필요가 줄어듭니다. 여행 결과, 웹 결과, 생성된 파일, 미디어 출력, 코드 결과 등을 더 쉽게 식별하고 활용할 수 있습니다.
    
    ## 5. 개선된 후속 제안 표시
    
    후속 제안 기능은 이미 있었지만, 이제 더 깔끔하고 사용하기 편하게 표시됩니다. 완벽한 다음 프롬프트를 직접 고민하지 않고도 작업을 계속 이어갈 수 있도록 돕습니다.
    
    ## 6. 로컬 인터페이스 글꼴
    
    이제 로컬 인터페이스 글꼴 설정을 선택할 수 있습니다. 작은 설정이지만, OpenMates에서 읽고 쓰는 시간이 많다면 중요한 변화입니다.
    
    ## 7. 안정성 및 성능 개선
    
    채팅 동기화, 임베드, 파일 미리보기, 이미지 결과 미리보기의 안정성과 성능도 개선되었습니다.
    
    # 향후 계획
    
