    # ✨ v0.11 में नया क्या है
    
    ## 1. विस्तारित डेली इंस्पिरेशन (Daily Inspirations)
    
    डेली इंस्पिरेशन अब और भी समृद्ध और विविध हो गए हैं। वे सार्वजनिक वीडियो, उपयोगी फीचर विचार और उन चीज़ों के लिए ठोस शुरुआती बिंदु दिखा सकते हैं जो तुम OpenMates में करना चाहते हो।
    
    लक्ष्य OpenMates को एक खाली चैटबॉट बॉक्स के बजाय एक ऐसी जगह बनाना है जो तुम्हें उपयोगी चीज़ें खोजने में मदद करे: किसी विषय पर शोध करना, वीडियो समझना, किसी कार्य की योजना बनाना, किसी टूल को एक्सप्लोर करना, या किसी उदाहरण से आगे बढ़ना।
    
    ## 2. कोड निष्पादन और कोड रिसर्च में सुधार
    
    कोड ऐप ने एक बड़ा कदम आगे बढ़ाया है। OpenMates अब सैंडबॉक्स में कोड चला सकता है, आउटपुट दिखा सकता है, रिपॉजिटरी सर्च में मदद कर सकता है और कोड से संबंधित अधिक फॉलो-अप कार्यों को संभाल सकता है।
    
    रोज़मर्रा के उपयोगकर्ताओं के लिए यह तब भी उपयोगी है जब तुम एक पेशेवर डेवलपर नहीं हो: छोटे स्क्रिप्ट, डेटा क्लीनअप, डॉक्यूमेंट जनरेशन, वेबसाइट प्रिव्यू, लॉग स्पष्टीकरण और तकनीकी प्रश्न अधिक इंटरैक्टिव हो सकते हैं।
    
    ## 3. म्यूजिक जनरेशन और इमेज प्रोवाइडर में सुधार
    
    v0.11 म्यूजिक जनरेशन और इमेज-जनरेशन प्रोवाइडर्स के सुधारों के साथ जनरेटेड-मीडिया वर्कफ़्लो का विस्तार करता है। इसका मतलब है कि OpenMates सीधे चैट में अधिक रचनात्मक कार्यों का समर्थन कर सकता है: एक त्वरित म्यूजिक आइडिया बनाना, विजुअल कॉन्सेप्ट्स जनरेट करना, प्रॉम्प्ट्स पर काम करना, या एक कच्चे विचार को ऐसे मीडिया में बदलना जिसे तुम वास्तव में देख और पुन: उपयोग कर सको।
    
    यह काम जनरेट किए गए मीडिया को पेश करने के तरीके में भी सुधार करता है, ताकि परिणामों को देखना, खोलना और उनसे आगे बढ़ना आसान हो।
    
    ## 4. स्पष्ट ऐप परिणाम और प्रोवाइडर विवरण
    
    कई ऐप कार्ड और एम्बेड प्रिव्यू अब बेहतर वास्तविक उदाहरण, प्रोवाइडर लोगो, स्रोत जानकारी और स्पष्ट मेटाडेटा दिखाते हैं। इससे यह समझना आसान हो जाता है कि क्या हुआ, परिणाम कहाँ से आया और किस ऐप स्किल का उपयोग किया गया था।
    
    दैनिक उपयोग के लिए, इसका मतलब है कम अंदाज़ा लगाना: यात्रा परिणाम, वेब परिणाम, जनरेट की गई फाइलें, मीडिया आउटपुट और कोड परिणाम पहचानना और उन पर कार्रवाई करना आसान होना चाहिए।
    
    ## 5. बेहतर फॉलो-अप प्रस्तुति
    
    फॉलो-अप सुझाव पहले से मौजूद थे, लेकिन उनकी प्रस्तुति अब अधिक साफ और उपयोग में आसान है। वे तुम्हें बिना खुद सही अगला प्रॉम्प्ट सोचे किसी कार्य को जारी रखने में मदद करने के लिए हैं।
    
    ## 6. लोकल इंटरफ़ेस फोंट
    
    अब तुम लोकल इंटरफ़ेस फोंट प्राथमिकताएं चुन सकते हो। यह एक छोटी सेटिंग है, लेकिन अगर तुम OpenMates में पढ़ने और लिखने में बहुत समय बिताते हो तो यह मायने रखती है।
    
    ## 7. स्थिरता और प्रदर्शन में सुधार
    
    चैट सिंक, एम्बेड, फाइल प्रिव्यू और इमेज रिजल्ट प्रिव्यू में स्थिरता और प्रदर्शन में भी सुधार किए गए हैं।
    
    # आगे क्या है
    
    अगला कदम OpenMates को समझने और उपयोग करने में और भी आसान बनाना है: बेहतर उदाहरण, स्पष्ट ऐप फ्लो, अधिक परिष्कृत रचनात्मक और शोध उपकरण, और चैट अनुभव में कम कमियां।
    
    OpenMates का उपयोग करने और कुछ भ्रमित करने वाला या खराब होने पर फीडबैक देने के लिए धन्यवाद।
    
