    OpenMates v0.10 draaide vooral om het product nuttiger te maken in alledaagse situaties: duidelijkere antwoorden, soepelere chats, meer apps en providers, en betere manieren om te leren en dingen gedaan te krijgen.
    
    [cta]
    
    # ✨ De hoogtepunten
    
    ## 1. Wikipedia-links direct in de antwoorden
    
    OpenMates kan nu relevante Wikipedia-onderwerpen direct in de antwoorden van de assistent markeren. Wanneer een concept de moeite waard is om verder te verkennen, kun je op de gemarkeerde term klikken en snel meer leren zonder de chat te verlaten.
    
    Dit is vooral handig voor leren, onderzoek, reisplanning, geschiedenisvragen, wetenschappelijke onderwerpen, of alles waarbij het antwoord een nieuw 'rabbit hole' opent.
    
    ## 2. Berichten markeren en opmerkingen toevoegen
    
    Je kunt nu delen van assistent-berichten markeren en er aantekeningen bij maken. Dit maakt langere antwoorden veel nuttiger: bewaar die ene belangrijke alinea, markeer iets waar je later op terug wilt komen, of plaats een opmerking bij een specifieke bewering of aanbeveling.
    
    ## 3. Nieuwe apps en app-vaardigheden
    
    OpenMates heeft meer nuttige app-vaardigheden gekregen in alledaagse categorieën. Zoekopdrachten voor reizen zijn praktischer geworden met treinverbindingen en boekingslinks, Events heeft nuttigere bronnen gekregen, Code is beter geworden in het begrijpen van repositories, en verschillende embed-types zijn duidelijker en actiegerichter geworden.
    
    In plaats van alleen te antwoorden vanuit het geheugen van het model, kan OpenMates steeds vaker specifieke tools gebruiken: zoeken, vergelijken, samenvatten, bestanden maken, bronmateriaal inspecteren en gestructureerde resultaten direct in de chat tonen.
    
    ## 4. Meer providers voor resultaten uit de echte wereld
    
    v0.10 heeft achter de schermen providers toegevoegd en verbeterd, bijvoorbeeld voor reizen, evenementen, betalingen en inhoudsbeveiliging. Dit is belangrijk omdat een vaardigheid pas echt nuttig is als het resultaat actueel is, onderbouwd door bronnen en specifiek genoeg om te gebruiken.
    
    Voor gebruikers is het zichtbare effect simpel: rijkere kaarten, betere bronvermelding, meer directe links en minder generieke antwoorden wanneer een provider echte data kan teruggeven.
    
    ## 5. Betere embeds en voorvertoningen
    
    Embeds zijn overal in de app nuttiger geworden. Zoekresultaten, boekingslinks, gegenereerde bestanden, code-outputs, afbeeldingen en openbare voorbeelden hebben nu duidelijkere voorvertoningen en fullscreen-weergaven, zodat je resultaten kunt bekijken zonder de context van het gesprek te verliezen.
    
    ## 6. Nuttigere voorbeelden en openbare pagina's
    
    Aankondigingen, tips, juridische pagina's en voorbeeldchats zijn nu volwaardige openbare chatpagina's. Dat maakt het makkelijker om te delen wat OpenMates kan en om nuttige voorbeelden later opnieuw te openen.
    
    ## 7. Soepelere aanmeld- en betalingsopties
    
    OpenMates heeft ook SEPA-bankoverschrijvingen via Revolut Business toegevoegd, de Stripe-checkout verbeterd voor gebruikers buiten de EU, en de mogelijkheid toegevoegd om je e-mailadres te wijzigen. Dit zijn geen flitsende functies, maar ze maken de basis minder kwetsbaar wanneer je het product daadwerkelijk wilt gebruiken.
    
    # Wat dit betekent voor dagelijks gebruik
    
    OpenMates zou nu meer als een nuttige werkplek moeten aanvoelen: antwoorden kunnen links bevatten om te leren, je kunt belangrijke delen markeren en later terugkijken, meer app-vaardigheden kunnen echte gestructureerde resultaten teruggeven, en openbare voorbeelden zijn makkelijker te delen.
    
    Zoals altijd bestond een groot deel van het werk uit onzichtbare bugfixes en verbeteringen aan de betrouwbaarheid — vooral rond versleutelde chatsynchronisatie, embeds, aanmelden en het gedrag in Safari.
    
    Groeten,
    
    Marco  
    Maker van OpenMates
