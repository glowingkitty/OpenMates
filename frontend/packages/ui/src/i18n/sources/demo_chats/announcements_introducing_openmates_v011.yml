    # ✨ Что нового в v0.11
    
    ## 1. Расширенные «Ежедневные идеи»
    
    «Ежедневные идеи» стали насыщеннее и разнообразнее. Теперь там могут появляться публичные видео, идеи полезных функций и конкретные отправные точки для задач, которые ты захочешь выполнить в OpenMates.
    
