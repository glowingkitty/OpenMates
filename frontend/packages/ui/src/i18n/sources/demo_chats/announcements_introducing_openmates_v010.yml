    # ✨ 주요 업데이트 내용
    
    ## 1. 답변 내 위키백과 링크 직접 연결
    
    이제 OpenMates는 어시스턴트 답변 내에서 관련 위키백과 주제를 직접 강조 표시할 수 있습니다. 더 깊이 탐구할 가치가 있는 개념이 나오면, 강조된 용어를 클릭하여 채팅 흐름을 벗어나지 않고도 빠르게 더 많은 정보를 확인할 수 있습니다.
    
    이는 학습, 연구, 여행 계획, 역사 질문, 과학 주제 등 답변을 통해 새로운 궁금증이 꼬리에 꼬리를 무는 모든 경우에 특히 유용합니다.
    
    ## 2. 메시지 강조 및 댓글
    
    이제 어시스턴트 메시지의 일부를 강조 표시하고 메모를 남길 수 있습니다. 이를 통해 긴 답변을 훨씬 더 유용하게 활용할 수 있습니다. 중요한 단락을 저장하거나, 나중에 다시 확인하고 싶은 부분을 표시하거나, 특정 주장이나 추천 사항 옆에 의견을 남겨보세요.
    
    ## 3. 새로운 앱 및 앱 스킬
    
    OpenMates는 일상적인 카테고리 전반에 걸쳐 더 유용한 앱 스킬을 갖추게 되었습니다. 여행 검색은 기차 연결 및 예약 링크를 통해 더 실용적으로 변했고, 이벤트는 더 유용한 이벤트 소스를 확보했으며, 코드는 저장소를 더 잘 이해하게 되었고, 여러 임베드 유형은 더 명확해지고 실행하기 쉬워졌습니다.
    
    모델의 기억에만 의존해 답변하는 대신, OpenMates는 검색, 비교, 요약, 파일 생성, 소스 자료 검토, 채팅 내 구조화된 결과 표시 등 전용 도구를 점점 더 많이 활용할 수 있습니다.
    
    ## 4. 실제 결과를 위한 더 많은 제공업체
    
    v0.10에서는 여행, 이벤트, 결제, 콘텐츠 안전 등 보이지 않는 곳에서 제공업체를 추가하고 개선했습니다. 스킬은 결과가 최신 상태이고, 출처가 뒷받침되며, 바로 사용할 수 있을 만큼 구체적일 때만 유용하기 때문에 이는 매우 중요합니다.
    
    사용자에게 보이는 효과는 간단합니다. 제공업체가 실제 데이터를 반환할 수 있게 됨에 따라 더 풍부한 카드, 더 나은 출처 표기, 더 많은 직접 링크, 그리고 덜 일반적인 답변을 제공합니다.
    
    ## 5. 더 나은 임베드 및 미리보기
    
    앱 전반에서 임베드가 더 유용해졌습니다. 검색 결과, 예약 링크, 생성된 파일, 코드 출력, 이미지 및 공개 예시는 더 명확한 미리보기와 전체 화면 보기를 제공하므로, 대화의 맥락을 잃지 않고 결과를 확인할 수 있습니다.
    
    ## 6. 더 유용한 예시 및 공개 페이지
    
    공지사항, 팁, 법적 페이지 및 예시 채팅이 정식 공개 채팅 페이지로 전환되었습니다. 이를 통해 OpenMates가 할 수 있는 일을 더 쉽게 공유하고, 유용한 예시를 나중에 다시 열어보는 것이 더 간편해졌습니다.
    
    ## 7. 더 매끄러운 가입 및 결제 옵션
    
    또한 OpenMates는 Revolut Business를 통한 SEPA 은행 송금을 추가하고, EU 외부 사용자를 위한 Stripe 결제를 개선했으며, 계정 이메일 변경 기능을 추가했습니다. 화려한 기능은 아니지만, 실제로 제품을 사용하고자 할 때 기본적인 기능들이 더 안정적으로 작동하도록 돕습니다.
    
