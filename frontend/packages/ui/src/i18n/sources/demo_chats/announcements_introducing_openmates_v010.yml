    Hoi,
    
    OpenMates v0.10 draaide vooral om het product nuttiger te maken in alledaagse situaties: duidelijkere antwoorden, soepelere chats, meer apps en providers, en betere manieren om te leren en dingen gedaan te krijgen.
    
    # ✨ De hoogtepunten
    
    ## 1. Wikipedia-links direct in antwoorden
    
    OpenMates kan nu relevante Wikipedia-onderwerpen direct in de antwoorden van de assistent markeren. Wanneer een concept de moeite waard is om verder te verkennen, kun je op de gemarkeerde term klikken en snel meer leren zonder de chat te verlaten.
    
    Dit is vooral handig voor leren, onderzoek, reisplanning, geschiedenisvragen, wetenschappelijke onderwerpen, of alles waarbij het antwoord een nieuw 'rabbit hole' opent.
    
    ## 2. Berichten markeren en opmerkingen
    
    Je kunt nu delen van assistent-berichten markeren en er aantekeningen bij maken. Dit maakt langere antwoorden veel nuttiger: sla de belangrijke alinea op, markeer iets waar je later op terug wilt komen, of plaats een opmerking bij een specifieke bewering of aanbeveling.
    
    ## 3. Nieuwe apps en app-vaardigheden
    
    OpenMates heeft meer nuttige app-vaardigheden gekregen in alledaagse categorieën. Zoekopdrachten voor reizen zijn praktischer geworden met treinverbindingen en boekingslinks, Events heeft meer nuttige bronnen gekregen, Code is beter geworden in het begrijpen van repositories, en verschillende embed-types zijn duidelijker en makkelijker in gebruik geworden.
    
    In plaats van alleen te antwoorden vanuit het geheugen van het model, kan OpenMates steeds vaker specifieke tools gebruiken: zoeken, vergelijken, samenvatten, bestanden maken, bronmateriaal inspecteren en gestructureerde resultaten direct in de chat tonen.
    
    ## 4. Meer providers voor resultaten uit de echte wereld
    
    v0.10 heeft achter de schermen providers toegevoegd en verbeterd, bijvoorbeeld voor reizen, evenementen, betalingen en inhoudsbeveiliging. Dit is belangrijk omdat een vaardigheid pas nuttig is als het resultaat actueel is, onderbouwd door bronnen en specifiek genoeg om te gebruiken.
    
    Voor gebruikers is het zichtbare effect simpel: rijkere kaarten, betere bronvermelding, meer directe links en minder algemene antwoorden wanneer een provider echte data kan teruggeven.
    
    ## 5. Betere embeds en voorvertoningen
    
    Embeds zijn overal in de app nuttiger geworden. Zoekresultaten, boekingslinks, gegenereerde bestanden, code-outputs, afbeeldingen en openbare voorbeelden kregen duidelijkere voorvertoningen en schermvullende weergaven, zodat je resultaten kunt bekijken zonder de context van het gesprek te verliezen.
    
    ## 6. Nuttigere voorbeelden en openbare pagina's
    
    Aankondigingen, tips, juridische pagina's en voorbeeldchats zijn nu echte openbare chatpagina's. Dat maakt het makkelijker om te delen wat OpenMates kan en om nuttige voorbeelden later opnieuw te openen.
    
    ## 7. Soepelere aanmelding en betalingsopties
    
    OpenMates heeft ook SEPA-bankoverschrijvingen via Revolut Business toegevoegd, de Stripe-checkout verbeterd voor gebruikers buiten de EU, en de mogelijkheid toegevoegd om het e-mailadres van je account te wijzigen. Dit zijn geen flitsende functies, maar ze maken de basis minder kwetsbaar wanneer je het product daadwerkelijk wilt gebruiken.
    
    # Wat dit betekent voor dagelijks gebruik
    
    OpenMates zou nu meer als een nuttige werkplek moeten voelen: antwoorden kunnen links bevatten om te leren, je kunt belangrijke delen markeren en later terugkijken, meer app-vaardigheden kunnen echte gestructureerde resultaten teruggeven, en openbare voorbeelden zijn makkelijker te delen.
    
    Zoals altijd bestond een groot deel van het werk ook uit onzichtbare bugfixes en verbeteringen in de betrouwbaarheid — vooral rond versleutelde chatsynchronisatie, embeds, aanmelding en het gedrag in Safari.
    
    Groeten,
    
    Marco  
    Maker van OpenMates
  ar: |
    أهلاً بك،
    
    ركز إصدار OpenMates v0.10 بشكل أساسي على جعل المنتج أكثر فائدة في المواقف اليومية المعتادة: إجابات أوضح، محادثات أكثر سلاسة، المزيد من التطبيقات والمزودين، وطرق أفضل للتعلم وإنجاز المهام.
    
    # ✨ أبرز التحديثات
    
    ## 1. روابط ويكيبيديا مباشرة داخل الإجابات
    
    يمكن لـ OpenMates الآن تمييز مواضيع ويكيبيديا ذات الصلة مباشرة داخل ردود المساعد. عندما يستحق مفهوم ما المزيد من الاستكشاف، يمكنك النقر على المصطلح المميز والتعلم بسرعة دون مغادرة سياق المحادثة.
    
    هذا مفيد بشكل خاص للتعلم، والبحث، وتخطيط السفر، والأسئلة التاريخية، والمواضيع العلمية، أو أي شيء تفتح فيه الإجابة آفاقاً جديدة للاستكشاف.
    
    ## 2. تمييز الرسائل والتعليقات
    
    يمكنك الآن تمييز أجزاء من رسائل المساعد وتدوين ملاحظات عليها. وهذا يجعل الإجابات الطويلة أكثر فائدة: احفظ فقرة مهمة، أو حدد شيئاً تريد العودة إليه لاحقاً، أو ضع تعليقاً بجانب ادعاء أو توصية محددة.
    
    ## 3. تطبيقات ومهارات تطبيقات جديدة
    
    حصل OpenMates على مهارات تطبيقات أكثر فائدة عبر الفئات اليومية. أصبحت عمليات البحث عن السفر أكثر عملية مع توفير روابط القطارات وروابط الحجز، واكتسبت "الفعاليات" مصادر أكثر فائدة، وأصبح "الكود" أفضل في فهم المستودعات، وأصبحت العديد من أنواع التضمين (embeds) أوضح وأسهل في التعامل معها.
    
    بدلاً من الإجابة فقط من ذاكرة النموذج، يمكن لـ OpenMates استخدام أدوات مخصصة بشكل متزايد: البحث، المقارنة، التلخيص، إنشاء الملفات، فحص المصادر، وعرض نتائج منظمة مباشرة في الدردشة.
    
    ## 4. المزيد من المزودين لنتائج واقعية
    
    أضاف الإصدار v0.10 مزودين وحسّن آخرين في الخلفية، على سبيل المثال للسفر، والفعاليات، والمدفوعات، وسلامة المحتوى. هذا أمر مهم لأن المهارة تكون مفيدة فقط عندما تكون النتيجة حديثة، ومدعومة بالمصادر، ومحددة بما يكفي للاستخدام.
    
    بالنسبة للمستخدمين، التأثير المرئي بسيط: بطاقات أغنى، إسناد أفضل للمصادر، روابط مباشرة أكثر، وإجابات عامة أقل عندما يتمكن المزود من إرجاع بيانات حقيقية.
    
    ## 5. تحسين التضمينات والمعاينات
    
    أصبحت التضمينات (Embeds) أكثر فائدة في جميع أنحاء التطبيق. حصلت نتائج البحث، وروابط الحجز، والملفات المنشأة، ومخرجات الكود، والصور، والأمثلة العامة على معاينات أوضح وعروض بملء الشاشة، بحيث يمكنك فحص النتائج دون فقدان سياق المحادثة.
    
    ## 6. أمثلة وصفحات عامة أكثر فائدة
    
    أصبحت الإعلانات، والنصائح، والصفحات القانونية، ومحادثات الأمثلة صفحات دردشة عامة حقيقية. وهذا يسهل مشاركة ما يمكن لـ OpenMates فعله وفتح الأمثلة المفيدة مرة أخرى لاحقاً.
    
    ## 7. خيارات تسجيل ودفع أكثر سلاسة
    
    أضاف OpenMates أيضاً تحويلات SEPA البنكية عبر Revolut Business، وحسّن عملية الدفع عبر Stripe للمستخدمين خارج الاتحاد الأوروبي، وأضاف إمكانية تغيير بريد الحساب الإلكتروني. هذه ليست ميزات مبهرة، لكنها تجعل الأساسيات أكثر استقراراً عندما تريد استخدام المنتج فعلياً.
    
    # ماذا يعني هذا للاستخدام اليومي
    
    من المفترض أن يبدو OpenMates الآن كمساحة عمل مفيدة: يمكن أن تحتوي الإجابات على روابط تعليمية، ويمكنك تمييز الأجزاء المهمة والعودة إليها، ويمكن لمزيد من مهارات التطبيقات إرجاع نتائج منظمة حقيقية، كما أصبحت الأمثلة العامة أسهل في المشاركة.
    
    وكما هو الحال دائماً، كان جزء كبير من العمل غير مرئي في إصلاح الأخطاء وتحسين الموثوقية — خاصة فيما يتعلق بمزامنة الدردشة المشفرة، والتضمينات، والتسجيل، وسلوك متصفح Safari.
    
    تحياتي،
    
    ماركو  
    مبتكر OpenMates
  hi: |
    नमस्ते,
    
    OpenMates v0.10 मुख्य रूप से प्रोडक्ट को रोज़मर्रा की स्थितियों में अधिक उपयोगी बनाने के बारे में था: स्पष्ट उत्तर, आसान चैट, अधिक ऐप्स और प्रोवाइडर्स, और सीखने और काम पूरा करने के बेहतर तरीके।
    
    # ✨ मुख्य बातें
    
    ## 1. उत्तरों के अंदर सीधे विकिपीडिया लिंक्स
    
    OpenMates अब असिस्टेंट के जवाबों के अंदर ही संबंधित विकिपीडिया (Wikipedia) विषयों को हाईलाइट कर सकता है। जब कोई विषय विस्तार से जानने लायक हो, तो तुम हाईलाइट किए गए शब्द पर क्लिक कर सकते हो और चैट के प्रवाह को छोड़े बिना जल्दी से और अधिक सीख सकते हो।
    
    यह विशेष रूप से सीखने, रिसर्च, यात्रा की योजना बनाने, इतिहास के सवालों, विज्ञान के विषयों, या ऐसी किसी भी चीज़ के लिए उपयोगी है जहाँ उत्तर से नई चीज़ें जानने की जिज्ञासा पैदा होती है।
    
    ## 2. मैसेज हाईलाइट्स और कमेंट्स
    
    अब तुम असिस्टेंट के मैसेज के कुछ हिस्सों को हाईलाइट कर सकते हो और उन पर नोट्स रख सकते हो। यह लंबे उत्तरों को बहुत अधिक उपयोगी बनाता है: महत्वपूर्ण पैराग्राफ को सेव करें, किसी ऐसी चीज़ को मार्क करें जिसे तुम फिर से देखना चाहते हो, या किसी विशिष्ट दावे या सुझाव के पास कमेंट लिखें।
    
    ## 3. नए ऐप्स और ऐप स्किल्स
    
    OpenMates को रोज़मर्रा की श्रेणियों में और अधिक उपयोगी ऐप स्किल्स मिली हैं। ट्रेन कनेक्शन और बुकिंग लिंक के साथ यात्रा सर्च अधिक व्यावहारिक हो गई है, इवेंट्स में अधिक उपयोगी इवेंट सोर्स जुड़े हैं, कोड रिपॉजिटरी को समझने में बेहतर हो गया है, और कई एम्बेड (embed) प्रकार स्पष्ट और उपयोग में आसान हो गए हैं।
    
    केवल मॉडल की मेमोरी से उत्तर देने के बजाय, OpenMates अब समर्पित टूल्स का अधिक उपयोग कर सकता है: सर्च करना, तुलना करना, सारांश बनाना, फाइलें बनाना, सोर्स मटेरियल की जांच करना और सीधे चैट में स्ट्रक्चर्ड परिणाम दिखाना।
    
    ## 4. वास्तविक दुनिया के परिणामों के लिए अधिक प्रोवाइडर्स
    
    v0.10 ने बैकएंड में प्रोवाइडर्स को जोड़ा और बेहतर बनाया है, उदाहरण के लिए यात्रा, इवेंट्स, पेमेंट और कंटेंट सुरक्षा के लिए। यह महत्वपूर्ण है क्योंकि कोई स्किल तभी उपयोगी होती है जब परिणाम वर्तमान हो, सोर्स-आधारित हो और उपयोग करने के लिए पर्याप्त रूप से विशिष्ट हो।
    
    यूजर्स के लिए, इसका प्रभाव सीधा है: बेहतर कार्ड्स, बेहतर सोर्स एट्रिब्यूशन, अधिक डायरेक्ट लिंक्स, और जब कोई प्रोवाइडर वास्तविक डेटा दे सकता है तो कम सामान्य उत्तर।
    
    ## 5. बेहतर एम्बेड्स और प्रिव्यू
    
    पूरे ऐप में एम्बेड्स अधिक उपयोगी हो गए हैं। सर्च रिजल्ट्स, बुकिंग लिंक्स, जेनरेट की गई फाइलें, कोड आउटपुट, इमेज और सार्वजनिक उदाहरणों को स्पष्ट प्रिव्यू और फुलस्क्रीन व्यू मिले हैं, ताकि तुम बातचीत के संदर्भ को खोए बिना परिणामों की जांच कर सको।
    
    ## 6. अधिक उपयोगी उदाहरण और सार्वजनिक पेज
    
    घोषणाएं, टिप्स, कानूनी पेज और उदाहरण चैट अब उचित सार्वजनिक चैट पेज बन गए हैं। इससे यह साझा करना आसान हो जाता है कि OpenMates क्या कर सकता है और उपयोगी उदाहरणों को बाद में फिर से खोलना आसान हो जाता है।
    
    ## 7. आसान साइनअप और पेमेंट विकल्प
    
    OpenMates ने Revolut Business के माध्यम से SEPA बैंक ट्रांसफर भी जोड़ा है, यूरोपीय संघ (EU) के बाहर के यूजर्स के लिए Stripe चेकआउट में सुधार किया है, और अकाउंट ईमेल बदलने की सुविधा जोड़ी है। ये कोई दिखावटी फीचर्स नहीं हैं, लेकिन जब तुम वास्तव में प्रोडक्ट का उपयोग करना चाहते हो तो ये बुनियादी चीज़ों को अधिक मजबूत बनाते हैं।
    
    # रोज़मर्रा के उपयोग के लिए इसका क्या अर्थ है
    
    OpenMates अब एक उपयोगी वर्कस्पेस की तरह महसूस होना चाहिए: उत्तरों में सीखने के लिंक हो सकते हैं, तुम महत्वपूर्ण हिस्सों को मार्क कर सकते हो और उन्हें फिर से देख सकते हो, अधिक ऐप स्किल्स वास्तविक स्ट्रक्चर्ड परिणाम दे सकती हैं, और सार्वजनिक उदाहरणों को साझा करना आसान है।
    
    हमेशा की तरह, बहुत सारा काम अदृश्य बग फिक्सिंग और विश्वसनीयता में सुधार का भी था — विशेष रूप से एन्क्रिप्टेड चैट सिंक, एम्बेड्स, साइनअप और Safari व्यवहार के आसपास।
    
    शुभकामनाएँ,
    
    मार्को  
    OpenMates के निर्माता
  th: |
    สวัสดีครับ,
    
    OpenMates v0.10 เน้นไปที่การทำให้ผลิตภัณฑ์ใช้งานได้จริงมากขึ้นในชีวิตประจำวัน: คำตอบที่ชัดเจนขึ้น, การแชทที่ลื่นไหลขึ้น, แอปและผู้ให้บริการที่มากขึ้น, และวิธีที่ดีกว่าในการเรียนรู้และทำงานให้สำเร็จ
    
    # ✨ ไฮไลต์ที่สำคัญ
    
    ## 1. ลิงก์ Wikipedia ภายในคำตอบโดยตรง
    
    ตอนนี้ OpenMates สามารถไฮไลต์หัวข้อ Wikipedia ที่เกี่ยวข้องได้โดยตรงภายในคำตอบของ AI เมื่อมีแนวคิดที่น่าสำรวจเพิ่มเติม คุณสามารถคลิกคำที่ไฮไลต์เพื่อเรียนรู้เพิ่มเติมได้อย่างรวดเร็วโดยไม่ต้องออกจากหน้าแชท
    
    สิ่งนี้มีประโยชน์อย่างยิ่งสำหรับการเรียนรู้, การวิจัย, การวางแผนการเดินทาง, คำถามทางประวัติศาสตร์, หัวข้อวิทยาศาสตร์ หรืออะไรก็ตามที่คำตอบนำไปสู่การค้นคว้าเพิ่มเติม
    
    ## 2. การไฮไลต์ข้อความและคอมเมนต์
    
    ตอนนี้คุณสามารถไฮไลต์ส่วนต่างๆ ของข้อความจาก AI และจดบันทึกไว้ได้ สิ่งนี้ทำให้คำตอบที่ยาวๆ มีประโยชน์มากขึ้น: บันทึกย่อหน้าที่สำคัญ, ทำเครื่องหมายสิ่งที่คุณต้องการกลับมาดูใหม่ หรือเขียนคอมเมนต์ไว้ข้างๆ ข้ออ้างอิงหรือคำแนะนำที่เฉพาะเจาะจง
    
    ## 3. แอปและทักษะใหม่ๆ ของแอป
    
    OpenMates มีทักษะของแอปที่มีประโยชน์มากขึ้นในหมวดหมู่ต่างๆ ในชีวิตประจำวัน การค้นหาข้อมูลการเดินทางใช้งานได้จริงมากขึ้นด้วยการเชื่อมต่อรถไฟและลิงก์การจอง, ส่วนกิจกรรม (Events) มีแหล่งข้อมูลกิจกรรมที่มีประโยชน์มากขึ้น, ส่วนโค้ด (Code) เข้าใจที่เก็บข้อมูล (repositories) ได้ดีขึ้น และประเภทการฝัง (embed) หลายอย่างก็ชัดเจนและใช้งานได้ง่ายขึ้น
    
    แทนที่จะตอบจากความจำของโมเดลเพียงอย่างเดียว OpenMates สามารถใช้เครื่องมือเฉพาะทางได้มากขึ้นเรื่อยๆ: ค้นหา, เปรียบเทียบ, สรุป, สร้างไฟล์, ตรวจสอบแหล่งข้อมูล และแสดงผลลัพธ์ที่มีโครงสร้างโดยตรงในแชท
    
    ## 4. ผู้ให้บริการที่มากขึ้นเพื่อผลลัพธ์ที่ใช้งานได้จริง
    
    v0.10 ได้เพิ่มและปรับปรุงผู้ให้บริการเบื้องหลัง เช่น สำหรับการเดินทาง, กิจกรรม, การชำระเงิน และความปลอดภัยของเนื้อหา สิ่งนี้สำคัญเพราะทักษะจะมีประโยชน์ก็ต่อเมื่อผลลัพธ์เป็นปัจจุบัน มีแหล่งข้อมูลรองรับ และมีความเฉพาะเจาะจงเพียงพอที่จะนำไปใช้งาน
    
    สำหรับผู้ใช้ ผลลัพธ์ที่เห็นได้ชัดคือ: การ์ดข้อมูลที่ละเอียดขึ้น, การระบุแหล่งที่มาที่ดีขึ้น, ลิงก์ตรงที่มากขึ้น และคำตอบทั่วไปที่น้อยลงเมื่อผู้ให้บริการสามารถส่งข้อมูลจริงกลับมาได้
    
    ## 5. การฝัง (Embeds) และการแสดงตัวอย่างที่ดีขึ้น
    
    การฝังข้อมูลมีประโยชน์มากขึ้นทั่วทั้งแอป ผลการค้นหา, ลิงก์การจอง, ไฟล์ที่สร้างขึ้น, ผลลัพธ์ของโค้ด, รูปภาพ และตัวอย่างสาธารณะ มีการแสดงตัวอย่างที่ชัดเจนขึ้นและมุมมองแบบเต็มหน้าจอ เพื่อให้คุณสามารถตรวจสอบผลลัพธ์ได้โดยไม่เสียบริบทของการสนทนา
    
    ## 6. ตัวอย่างและหน้าสาธารณะที่มีประโยชน์มากขึ้น
    
    ประกาศ, เคล็ดลับ, หน้ากฎหมาย และแชทตัวอย่าง ได้กลายเป็นหน้าแชทสาธารณะที่เหมาะสม สิ่งนี้ทำให้การแชร์สิ่งที่ OpenMates ทำได้ง่ายขึ้น และสามารถเปิดตัวอย่างที่มีประโยชน์ซ้ำได้ในภายหลัง
    
    ## 7. ตัวเลือกการสมัครใช้งานและการชำระเงินที่ราบรื่นขึ้น
    
    OpenMates ยังได้เพิ่มการโอนเงินผ่านธนาคาร SEPA ผ่าน Revolut Business, ปรับปรุงการชำระเงินด้วย Stripe สำหรับผู้ใช้นอกสหภาพยุโรป และเพิ่มการเปลี่ยนอีเมลบัญชี สิ่งเหล่านี้ไม่ใช่ฟีเจอร์ที่หวือหวา แต่ช่วยให้พื้นฐานต่างๆ ไม่ติดขัดเมื่อคุณต้องการใช้งานผลิตภัณฑ์จริงๆ
    
    # สิ่งนี้หมายความว่าอย่างไรสำหรับการใช้งานในทุกๆ วัน
    
    ตอนนี้ OpenMates ควรจะให้ความรู้สึกเหมือนพื้นที่ทำงานที่มีประโยชน์มากขึ้น: คำตอบสามารถมีลิงก์การเรียนรู้, คุณสามารถทำเครื่องหมายและกลับมาดูส่วนที่สำคัญได้, ทักษะของแอปที่มากขึ้นสามารถส่งผลลัพธ์ที่มีโครงสร้างจริงกลับมาได้ และตัวอย่างสาธารณะก็แชร์ได้ง่ายขึ้น
    
    เช่นเคย งานส่วนใหญ่ยังเป็นการแก้ไขบั๊กที่มองไม่เห็นและการปรับปรุงความเสถียร — โดยเฉพาะเรื่องการซิงค์แชทแบบเข้ารหัส, การฝังข้อมูล, การสมัครใช้งาน และพฤติกรรมบน Safari
    
