    Jest to szczególnie przydatne podczas nauki, researchu, planowania podróży, pytań o historię, zagadnień naukowych lub w każdej sytuacji, gdy odpowiedź zachęca do dalszego odkrywania.
    
    ## 2. Wyróżnienia i komentarze do wiadomości
    
    Możesz teraz wyróżniać fragmenty wiadomości asystenta i dodawać do nich notatki. Dzięki temu dłuższe odpowiedzi stają się znacznie bardziej użyteczne: zapisz ważny akapit, zaznacz coś, do czego chcesz wrócić, lub zostaw komentarz przy konkretnym twierdzeniu lub rekomendacji.
    
    ## 3. Nowe aplikacje i umiejętności aplikacji
    
    OpenMates zyskało więcej przydatnych umiejętności w codziennych kategoriach. Wyszukiwanie podróży stało się bardziej praktyczne dzięki połączeniom kolejowym i linkom do rezerwacji, Wydarzenia zyskały więcej przydatnych źródeł, Kod lepiej radzi sobie ze zrozumieniem repozytoriów, a kilka typów osadzonych treści stało się czytelniejszych i łatwiejszych w obsłudze.
    
    Zamiast odpowiadać wyłącznie z pamięci modelu, OpenMates coraz częściej korzysta z dedykowanych narzędzi: wyszukiwania, porównywania, podsumowywania, tworzenia plików, sprawdzania materiałów źródłowych i wyświetlania ustrukturyzowanych wyników bezpośrednio w czacie.
    
    ## 4. Więcej dostawców dla rzeczywistych wyników
    
    W wersji v0.10 dodaliśmy i ulepszyliśmy dostawców „pod maską”, na przykład w zakresie podróży, wydarzeń, płatności i bezpieczeństwa treści. Ma to znaczenie, ponieważ umiejętność jest przydatna tylko wtedy, gdy wynik jest aktualny, poparty źródłami i wystarczająco konkretny.
    
    Dla użytkowników widoczny efekt jest prosty: bogatsze karty, lepsze przypisanie źródeł, więcej bezpośrednich linków i mniej ogólnych odpowiedzi, gdy dostawca może zwrócić rzeczywiste dane.
    
    ## 5. Lepsze osadzone treści i podglądy
    
    Osadzone treści stały się bardziej użyteczne w całej aplikacji. Wyniki wyszukiwania, linki do rezerwacji, wygenerowane pliki, wyniki kodu, obrazy i publiczne przykłady zyskały wyraźniejsze podglądy i widoki pełnoekranowe, dzięki czemu możesz przeglądać wyniki bez utraty kontekstu rozmowy.
    
    ## 6. Bardziej przydatne przykłady i strony publiczne
    
    Ogłoszenia, wskazówki, strony prawne i przykładowe czaty stały się pełnoprawnymi publicznymi stronami czatu. Ułatwia to dzielenie się możliwościami OpenMates i ponowne otwieranie przydatnych przykładów w przyszłości.
    
