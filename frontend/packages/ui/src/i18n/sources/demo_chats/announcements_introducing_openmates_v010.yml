    Ciao,
    
    OpenMates v0.10 si è concentrata soprattutto sul rendere il prodotto più utile nelle situazioni quotidiane: risposte più chiare, chat più fluide, più app e provider, e modi migliori per imparare e fare le cose.
    
    [cta]
    
    # ✨ Le novità principali
    
    ## 1. Link a Wikipedia direttamente nelle risposte
    
    OpenMates ora può evidenziare argomenti rilevanti di Wikipedia direttamente nelle risposte dell'assistente. Quando un concetto merita di essere approfondito, puoi cliccare sul termine evidenziato e imparare rapidamente di più senza interrompere il flusso della chat.
    
    Questo è particolarmente utile per l'apprendimento, la ricerca, la pianificazione di viaggi, domande di storia, argomenti scientifici o qualsiasi cosa in cui la risposta apra nuovi spunti di approfondimento.
    
    ## 2. Evidenziazioni e commenti ai messaggi
    
    Ora puoi evidenziare parti dei messaggi dell'assistente e aggiungere delle note. Questo rende le risposte lunghe molto più utili: salva il paragrafo importante, segna qualcosa che vuoi rivedere o aggiungi un commento accanto a una specifica affermazione o raccomandazione.
    
    ## 3. Nuove app e funzionalità
    
    OpenMates ha acquisito funzionalità più utili in diverse categorie quotidiane. Le ricerche di viaggio sono diventate più pratiche con collegamenti ferroviari e link di prenotazione, la sezione Eventi ha ottenuto fonti più utili, Code è migliorata nel comprendere i repository e diversi tipi di contenuti incorporati sono diventati più chiari e facili da gestire.
    
    Invece di rispondere solo basandosi sulla memoria del modello, OpenMates può utilizzare sempre più strumenti dedicati: cercare, confrontare, riassumere, creare file, ispezionare il materiale sorgente e mostrare risultati strutturati direttamente nella chat.
    
    ## 4. Più provider per risultati reali
    
    La v0.10 ha aggiunto e migliorato i provider dietro le quinte, ad esempio per viaggi, eventi, pagamenti e sicurezza dei contenuti. Questo è importante perché una funzionalità è utile solo quando il risultato è aggiornato, supportato da fonti e abbastanza specifico da essere utilizzato.
    
    Per gli utenti, l'effetto visibile è semplice: schede più ricche, migliore attribuzione delle fonti, più link diretti e meno risposte generiche quando un provider può restituire dati reali.
    
    ## 5. Embed e anteprime migliori
    
    I contenuti incorporati (embed) sono diventati più utili in tutta l'app. Risultati di ricerca, link di prenotazione, file generati, output di codice, immagini ed esempi pubblici hanno ora anteprime più chiare e visualizzazioni a schermo intero, così puoi ispezionare i risultati senza perdere il contesto della conversazione.
    
    ## 6. Esempi e pagine pubbliche più utili
    
    Annunci, suggerimenti, pagine legali ed esempi di chat sono diventati vere e proprie pagine di chat pubbliche. Questo rende più facile condividere ciò che OpenMates può fare e riaprire esempi utili in seguito.
    
    ## 7. Opzioni di registrazione e pagamento più fluide
    
    OpenMates ha anche aggiunto i bonifici bancari SEPA tramite Revolut Business, migliorato il checkout di Stripe per gli utenti fuori dall'UE e aggiunto la possibilità di cambiare l'email dell'account. Non sono funzionalità appariscenti, ma rendono le basi meno fragili quando vuoi effettivamente usare il prodotto.
    
    # Cosa significa per l'uso quotidiano
    
    OpenMates ora dovrebbe sembrare più uno spazio di lavoro utile: le risposte possono contenere link di approfondimento, puoi segnare e rivedere parti importanti, più funzionalità delle app possono restituire risultati strutturati reali e gli esempi pubblici sono più facili da condividere.
    
    Come sempre, gran parte del lavoro ha riguardato anche la correzione di bug invisibili e miglioramenti dell'affidabilità, specialmente per quanto riguarda la sincronizzazione crittografata delle chat, gli embed, la registrazione e il comportamento su Safari.
    
