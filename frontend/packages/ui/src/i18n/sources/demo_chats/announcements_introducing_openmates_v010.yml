    # ✨ Höjdpunkterna
    
    ## 1. Wikipedia-länkar direkt i svaren
    
    OpenMates kan nu markera relevanta Wikipedia-ämnen direkt i assistentens svar. När ett koncept är värt att utforska vidare kan du klicka på den markerade termen och snabbt lära dig mer utan att lämna chattflödet.
    
    Detta är särskilt användbart för lärande, research, reseplanering, historiska frågor, vetenskapliga ämnen eller allt där svaret öppnar upp ett nytt kaninhål.
    
    ## 2. Markeringar och kommentarer i meddelanden
    
    Du kan nu markera delar av assistentens meddelanden och skriva anteckningar till dem. Detta gör längre svar mycket mer användbara: spara det viktiga stycket, markera något du vill återkomma till, eller lämna en kommentar intill ett specifikt påstående eller en rekommendation.
    
    ## 3. Nya appar och app-färdigheter
    
    OpenMates har fått mer användbara app-färdigheter inom vardagliga kategorier. Resesökningar blev mer praktiska med tågförbindelser och bokningslänkar, Evenemang fick mer användbara källor, Kod blev bättre på att förstå kodförråd, och flera typer av inbäddningar blev tydligare och enklare att agera på.
    
    Istället för att bara svara utifrån modellens minne kan OpenMates i allt högre grad använda dedikerade verktyg: söka, jämföra, sammanfatta, skapa filer, granska källmaterial och visa strukturerade resultat direkt i chatten.
    
    ## 4. Fler leverantörer för verkliga resultat
    
    v0.10 lade till och förbättrade leverantörer bakom kulisserna, till exempel för resor, evenemang, betalningar och innehållssäkerhet. Detta är viktigt eftersom en färdighet bara är användbar när resultatet är aktuellt, källbaserat och tillräckligt specifikt för att användas.
    
    För användare är den synliga effekten enkel: rikare kort, bättre källhänvisning, fler direktlänkar och färre generiska svar när en leverantör kan returnera riktig data.
    
    ## 5. Bättre inbäddningar och förhandsvisningar
    
    Inbäddningar blev mer användbara i hela appen. Sökresultat, bokningslänkar, genererade filer, kodutdata, bilder och offentliga exempel fick tydligare förhandsvisningar och helskärmsvyer, så att du kan granska resultat utan att tappa konversationens sammanhang.
    
    ## 6. Mer användbara exempel och offentliga sidor
    
    Meddelanden, tips, juridiska sidor och exempelchattar blev riktiga offentliga chattsidor. Det gör det enklare att dela vad OpenMates kan göra och att öppna användbara exempel igen senare.
    
    ## 7. Smidigare registrering och betalningsalternativ
    
    OpenMates lade även till SEPA-banköverföringar via Revolut Business, förbättrade Stripe-utcheckningen för användare utanför EU och lade till möjligheten att ändra e-postadress för kontot. Det här är inga flashiga funktioner, men de gör grunderna mindre bräckliga när du faktiskt vill använda produkten.
    
    # Vad detta innebär för vardagsanvändningen
    
    OpenMates bör kännas mer som en användbar arbetsyta nu: svar kan innehålla länkar för lärande, du kan markera och återkomma till viktiga delar, fler app-färdigheter kan returnera riktiga strukturerade resultat och offentliga exempel är lättare att dela.
    
    Som alltid bestod en stor del av arbetet också av osynliga buggfixar och tillförlitlighetsförbättringar – särskilt kring krypterad chattsynkronisering, inbäddningar, registrering och Safari-beteende.
    
