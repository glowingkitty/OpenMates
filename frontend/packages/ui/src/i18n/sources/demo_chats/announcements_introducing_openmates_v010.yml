    Ahoj,
    
    OpenMates v0.10 se zaměřuje především na to, aby byl produkt užitečnější v běžných každodenních situacích: jasnější odpovědi, plynulejší chaty, více aplikací a poskytovatelů a lepší způsoby, jak se učit a dotahovat věci do konce.
    
    # ✨ To nejdůležitější
    
    ## 1. Odkazy na Wikipedii přímo v odpovědích
    
    OpenMates nyní dokáže zvýraznit relevantní témata z Wikipedie přímo v odpovědích asistenta. Když nějaký pojem stojí za hlubší prozkoumání, můžeš na zvýrazněný termín kliknout a rychle se dozvědět víc, aniž bys musel opustit chat.
    
    To je užitečné zejména pro učení, výzkum, plánování cest, historické otázky, vědecká témata nebo cokoli, kde odpověď otevírá novou „králičí noru“ informací.
    
    ## 2. Zvýraznění zpráv a komentáře
    
    Nyní můžeš zvýrazňovat části zpráv od asistenta a psát si k nim poznámky. Díky tomu jsou delší odpovědi mnohem užitečnější: ulož si důležitý odstavec, označ si něco, k čemu se chceš vrátit, nebo si přidej komentář ke konkrétnímu tvrzení či doporučení.
    
    ## 3. Nové aplikace a dovednosti aplikací
    
    OpenMates získal užitečnější dovednosti v běžných kategoriích. Vyhledávání cestování je praktičtější díky vlakovým spojům a odkazům na rezervace, Události získaly více užitečných zdrojů, Kód lépe rozumí repozitářům a několik typů vloženého obsahu je nyní přehlednějších a snadněji použitelných.
    
    Místo toho, aby OpenMates odpovídal pouze z paměti modelu, může stále častěji využívat specializované nástroje: vyhledávat, porovnávat, shrnovat, vytvářet soubory, zkoumat zdrojové materiály a zobrazovat strukturované výsledky přímo v chatu.
    
    ## 4. Více poskytovatelů pro výsledky z reálného světa
    
    Verze 0.10 přidala a vylepšila poskytovatele v pozadí, například pro cestování, události, platby a bezpečnost obsahu. To je důležité, protože dovednost je užitečná jen tehdy, když je výsledek aktuální, podložený zdroji a dostatečně konkrétní pro praktické použití.
    
    Pro uživatele je viditelný efekt jednoduchý: bohatší karty, lepší uvádění zdrojů, více přímých odkazů a méně obecných odpovědí v případech, kdy poskytovatel může vrátit reálná data.
    
    ## 5. Lepší vložený obsah a náhledy
    
    Vložený obsah (embedy) je nyní v celé aplikaci užitečnější. Výsledky vyhledávání, odkazy na rezervace, generované soubory, výstupy kódu, obrázky a veřejné příklady mají jasnější náhledy a zobrazení na celou obrazovku, takže si můžeš výsledky prohlédnout, aniž bys ztratil kontext konverzace.
    
    ## 6. Užitečnější příklady a veřejné stránky
    
    Oznámení, tipy, právní stránky a ukázkové chaty se staly plnohodnotnými veřejnými stránkami chatu. Díky tomu je snazší sdílet, co OpenMates umí, a později se k užitečným příkladům vrátit.
    
    ## 7. Hladší registrace a možnosti plateb
    
    OpenMates také přidal bankovní převody SEPA přes Revolut Business, vylepšil platby přes Stripe pro uživatele mimo EU a přidal možnost změny e-mailu účtu. Nejsou to sice převratné funkce, ale díky nim jsou základní věci spolehlivější, když produkt skutečně chceš používat.
    
    # Co to znamená pro každodenní používání
    
    OpenMates by teď měl působit spíše jako užitečný pracovní prostor: odpovědi mohou obsahovat odkazy na učení, můžeš si označovat a vracet se k důležitým částem, více dovedností aplikací vrací reálné strukturované výsledky a veřejné příklady se snadněji sdílejí.
    
    Jako vždy byla velká část práce věnována neviditelným opravám chyb a zlepšení spolehlivosti – zejména v oblasti synchronizace šifrovaného chatu, vloženého obsahu, registrace a chování v prohlížeči Safari.
    
