    Это особенно полезно для учебы, исследований, планирования поездок, вопросов по истории и науке — или в любой ситуации, когда ответ заставляет углубиться в тему.
    
    ## 2. Выделение сообщений и комментарии
    
    Теперь ты можешь выделять части сообщений ассистента и оставлять к ним заметки. Это делает длинные ответы гораздо полезнее: сохрани важный абзац, отметь то, к чему хочешь вернуться позже, или оставь комментарий к конкретному утверждению или рекомендации.
    
    ## 3. Новые приложения и навыки
    
    В OpenMates появилось больше полезных навыков в повседневных категориях. Поиск поездок стал практичнее благодаря информации о поездах и ссылкам на бронирование, в «Событиях» добавились новые источники, «Код» стал лучше понимать репозитории, а несколько типов встроенных элементов стали понятнее и удобнее в использовании.
    
    Вместо того чтобы отвечать только по памяти модели, OpenMates всё чаще использует специальные инструменты: поиск, сравнение, суммаризацию, создание файлов, анализ исходных материалов и отображение структурированных результатов прямо в чате.
    
    ## 4. Больше провайдеров для реальных результатов
    
    В версии 0.10 мы добавили и улучшили работу провайдеров «под капотом» — например, для путешествий, событий, платежей и безопасности контента. Это важно, потому что навык полезен только тогда, когда результат актуален, подтвержден источниками и достаточно конкретен для использования.
    
    Для пользователей результат очевиден: более информативные карточки, четкое указание источников, больше прямых ссылок и меньше общих ответов там, где провайдер может предоставить реальные данные.
    
    ## 5. Улучшенные вставки и предпросмотр
    
    Встроенные элементы (эмбеды) стали полезнее во всем приложении. Результаты поиска, ссылки на бронирование, созданные файлы, вывод кода, изображения и публичные примеры получили более четкий предпросмотр и полноэкранный режим, чтобы ты мог изучать результаты, не теряя контекст беседы.
    
    ## 6. Полезные примеры и публичные страницы
    
    Объявления, советы, юридические страницы и примеры чатов превратились в полноценные публичные страницы. Теперь проще делиться возможностями OpenMates и возвращаться к полезным примерам позже.
    
