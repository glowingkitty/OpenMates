    Hej,
    
    OpenMates v0.10 handlade främst om att göra produkten mer användbar i vardagen: tydligare svar, smidigare chattar, fler appar och leverantörer, samt bättre sätt att lära sig och få saker gjorda.
    
    # ✨ Höjdpunkterna
    
    ## 1. Wikipedia-länkar direkt i svaren
    
    OpenMates kan nu markera relevanta Wikipedia-ämnen direkt i assistentens svar. När ett begrepp är värt att utforska vidare kan du klicka på den markerade termen och snabbt lära dig mer utan att lämna chatten.
    
    Detta är särskilt användbart för lärande, research, reseplanering, historiska frågor, vetenskapliga ämnen eller vad som helst där svaret öppnar upp ett nytt kaninhål.
    
    ## 2. Markeringar och kommentarer i meddelanden
    
    Du kan nu markera delar av assistentens meddelanden och skriva anteckningar till dem. Detta gör längre svar mycket mer användbara: spara det viktiga stycket, markera något du vill återkomma till, eller lämna en kommentar vid ett specifikt påstående eller en rekommendation.
    
    ## 3. Nya appar och app-färdigheter
    
    OpenMates har fått mer användbara app-färdigheter inom vardagliga kategorier. Resesökningar blev mer praktiska med tågförbindelser och bokningslänkar, Evenemang fick fler användbara källor, Kod blev bättre på att förstå kodförråd (repositories), och flera typer av inbäddningar blev tydligare och enklare att interagera med.
    
    Istället för att bara svara utifrån modellens minne kan OpenMates i allt högre grad använda dedikerade verktyg: söka, jämföra, sammanfatta, skapa filer, granska källmaterial och visa strukturerade resultat direkt i chatten.
    
    ## 4. Fler leverantörer för verkliga resultat
    
    v0.10 lade till och förbättrade leverantörer bakom kulisserna, till exempel för resor, evenemang, betalningar och innehållssäkerhet. Detta är viktigt eftersom en färdighet bara är användbar när resultatet är aktuellt, källkritiskt underbyggt och tillräckligt specifikt för att användas.
    
    För användare är den synliga effekten enkel: fylligare kort, bättre källhänvisning, fler direktlänkar och färre generiska svar när en leverantör kan returnera faktiska data.
    
    ## 5. Bättre inbäddningar och förhandsvisningar
    
    Inbäddningar blev mer användbara i hela appen. Sökresultat, bokningslänkar, genererade filer, kodutdata, bilder och offentliga exempel fick tydligare förhandsvisningar och helskärmsvyer, så att du kan granska resultat utan att tappa sammanhanget i konversationen.
    
    ## 6. Fler användbara exempel och offentliga sidor
    
    Meddelanden, tips, juridiska sidor och exempelchattar blev riktiga offentliga chattsidor. Det gör det enklare att dela vad OpenMates kan göra och att öppna användbara exempel igen senare.
    
    ## 7. Smidigare alternativ för registrering och betalning
    
    OpenMates lade även till SEPA-banköverföringar via Revolut Business, förbättrade Stripe-utcheckningen för användare utanför EU och lade till möjligheten att ändra e-postadress för kontot. Det här är inga flashiga funktioner, men de gör grunderna mindre bräckliga när du faktiskt vill använda produkten.
    
    # Vad detta innebär för vardagsanvändningen
    
    OpenMates bör kännas mer som en användbar arbetsyta nu: svar kan innehålla länkar för lärande, du kan markera och återkomma till viktiga delar, fler app-färdigheter kan returnera riktiga strukturerade resultat och offentliga exempel är lättare att dela.
    
    Som alltid bestod en stor del av arbetet även av osynliga buggfixar och förbättringar av tillförlitligheten – särskilt kring krypterad chattsynkronisering, inbäddningar, registrering och beteende i Safari.
    
