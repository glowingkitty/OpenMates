    이제 OpenMates는 유용한 워크스페이스처럼 느껴질 것입니다. 답변에는 학습 링크가 포함될 수 있고, 중요한 부분을 표시하고 다시 방문할 수 있으며, 더 많은 앱 스킬이 실제 구조화된 결과를 반환하고, 공개 예시를 더 쉽게 공유할 수 있습니다.
    
    언제나 그렇듯, 암호화된 채팅 동기화, 임베드, 가입, Safari 동작 등 보이지 않는 곳에서의 버그 수정과 안정성 개선 작업도 많이 이루어졌습니다.
    
