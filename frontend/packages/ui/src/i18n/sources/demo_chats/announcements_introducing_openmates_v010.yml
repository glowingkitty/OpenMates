message:
  context: 'Newsletter announcements/introducing-openmates-v010 — message'
  en: |-
    Hey there,
    
    OpenMates v0.10 was mostly about making the product feel more useful in normal day-to-day situations: clearer answers, smoother chats, better ways to learn, and more reliable ways to pay for usage credits.
    
    # ✨ The highlights
    
    ## 1. Wikipedia links directly inside answers
    
    OpenMates can now highlight relevant Wikipedia topics directly inside assistant responses. When a concept is worth exploring further, you can click the highlighted term and quickly learn more without leaving the flow of the chat.
    
    This is especially useful for learning, research, travel planning, history questions, science topics, or anything where the answer opens up a new rabbit hole.
    
    ## 2. Message highlights and comments
    
    You can now highlight parts of assistant messages and keep notes on them. This makes longer answers much more useful: save the important paragraph, mark something you want to revisit, or keep a comment next to a specific claim or recommendation.
    
    ## 3. Better public announcement and example pages
    
    Announcements, tips, legal pages and example chats became proper public chat pages. That means links to OpenMates content are easier to share, easier to open again, and better indexed by search engines.
    
    ## 4. Payments became more reliable and accessible
    
    OpenMates added SEPA bank transfers via Revolut Business and improved Stripe checkout for users outside the EU. The goal is simple: if you want to buy usage credits, the payment flow should work reliably instead of being the thing that gets in the way.
    
    ## 5. Account email changes
    
    You can now change the email address connected to your account. This is one of those features that should not be exciting, but absolutely needs to work when you need it.
    
    ## 6. Better onboarding and chat presentation
    
    The intro chat got a more polished video/slideshow header, the chat header became more stable on mobile and Safari, and the new-chat experience was refined so it is clearer when you are continuing from a public example versus starting something private.
    
    ## 7. Early native Apple app work
    
    v0.10 also included a lot of foundation work for the iOS, iPadOS and macOS app: encrypted chat sync, native settings, follow-up suggestions, embeds, accessibility, and i18n. The web app remains the source of truth, but the native app work started catching up quickly.
    
    # What this means for everyday use
    
    OpenMates should feel more like a useful workspace now: answers can contain learning links, you can mark and revisit important parts, public examples are easier to share, and the account/payment basics are less fragile.
    
    As always, a lot of the work was also invisible bug fixing and reliability improvements — especially around encrypted chat sync, embeds, signup, and Safari behavior.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates v0.10 drehte sich vor allem darum, das Produkt im Alltag nützlicher zu machen: klarere Antworten, flüssigere Chats, bessere Lernmöglichkeiten und zuverlässigere Wege, Nutzungsguthaben zu kaufen.
    
    # ✨ Die Highlights
    
    ## 1. Wikipedia-Links direkt in Antworten
    
    OpenMates kann jetzt relevante Wikipedia-Themen direkt in Antworten hervorheben. Wenn ein Begriff oder Konzept spannend ist, kannst du ihn anklicken und schnell mehr erfahren, ohne den Chatfluss zu verlassen.
    
    Das ist besonders praktisch beim Lernen, Recherchieren, Reisen, bei Geschichts- und Wissenschaftsfragen oder überall dort, wo eine Antwort neue Fragen aufmacht.
    
    ## 2. Textstellen markieren und kommentieren
    
    Du kannst jetzt wichtige Stellen in Antworten markieren und Notizen dazu speichern. Dadurch werden längere Antworten deutlich nützlicher: wichtige Absätze sichern, etwas für später markieren oder einen Kommentar direkt neben einer konkreten Empfehlung behalten.
    
    ## 3. Bessere öffentliche Ankündigungs- und Beispielseiten
    
    Ankündigungen, Tipps, rechtliche Seiten und Beispiel-Chats wurden zu richtigen öffentlichen Chat-Seiten. Links zu OpenMates-Inhalten lassen sich dadurch besser teilen, wieder öffnen und von Suchmaschinen erfassen.
    
    ## 4. Zahlungen wurden zuverlässiger und zugänglicher
    
    OpenMates unterstützt jetzt SEPA-Überweisungen über Revolut Business und einen verbesserten Stripe-Checkout für Nutzer:innen außerhalb der EU. Ziel ist einfach: Wenn du Credits kaufen möchtest, soll die Zahlung zuverlässig funktionieren und nicht im Weg stehen.
    
    ## 5. Account-E-Mail ändern
    
    Du kannst jetzt die E-Mail-Adresse deines Accounts ändern. Nicht besonders spektakulär, aber extrem wichtig, wenn man es braucht.
    
    ## 6. Besseres Onboarding und bessere Chat-Darstellung
    
    Der Intro-Chat bekam einen polierteren Video-/Slideshow-Header, der Chat-Header wurde auf Mobile und Safari stabiler, und der Neue-Chat-Flow wurde klarer, besonders wenn du von öffentlichen Beispielen aus weiterarbeitest.
    
    ## 7. Frühe native Apple-App-Arbeit
    
    v0.10 enthielt außerdem viel Grundlagenarbeit für die iOS-, iPadOS- und macOS-App: verschlüsselte Chat-Synchronisation, native Einstellungen, Follow-up-Vorschläge, Embeds, Barrierefreiheit und i18n. Die Web-App bleibt die visuelle Quelle der Wahrheit, aber die native App holte schnell auf.
    
    # Was das im Alltag bedeutet
    
    OpenMates fühlt sich damit mehr wie ein nützlicher Arbeitsbereich an: Antworten enthalten Lernlinks, wichtige Stellen lassen sich markieren, öffentliche Beispiele sind besser teilbar und Account-/Zahlungsgrundlagen sind weniger fragil.
    
    Wie immer bestand ein großer Teil der Arbeit auch aus unsichtbaren Fehlerbehebungen und Stabilitätsverbesserungen, vor allem bei verschlüsselter Chat-Synchronisation, Embeds, Registrierung und Safari-Verhalten.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
