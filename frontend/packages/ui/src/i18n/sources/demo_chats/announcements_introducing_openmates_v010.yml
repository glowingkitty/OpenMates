    # ✨ أبرز التحديثات
    
    ## 1. روابط ويكيبيديا مباشرة داخل الإجابات
    
    يمكن لـ OpenMates الآن تمييز مواضيع ويكيبيديا ذات الصلة مباشرة داخل ردود المساعد. عندما يستحق مفهوم ما المزيد من الاستكشاف، يمكنك النقر على المصطلح المميز والتعلم بسرعة دون مغادرة سياق المحادثة.
    
    هذا مفيد بشكل خاص للتعلم، والبحث، والتخطيط للسفر، والأسئلة التاريخية، والمواضيع العلمية، أو أي شيء تفتح فيه الإجابة آفاقاً جديدة للبحث.
    
    ## 2. تمييز الرسائل والتعليقات
    
    يمكنك الآن تمييز أجزاء من رسائل المساعد وتدوين ملاحظات عليها. وهذا يجعل الإجابات الطويلة أكثر فائدة بكثير: احفظ الفقرة المهمة، أو حدد شيئاً تريد العودة إليه لاحقاً، أو ضع تعليقاً بجانب ادعاء أو توصية محددة.
    
    ## 3. تطبيقات ومهارات تطبيقات جديدة
    
    حصل OpenMates على مهارات تطبيقات أكثر فائدة عبر الفئات اليومية. أصبحت عمليات البحث عن السفر أكثر عملية مع توفر اتصالات القطارات وروابط الحجز، واكتسبت "الفعاليات" مصادر أكثر فائدة، وأصبح "البرمجة" أفضل في فهم المستودعات، كما أصبحت عدة أنواع من العناصر المضمنة أوضح وأسهل في التعامل معها.
    
    بدلاً من الإجابة فقط من ذاكرة النموذج، يمكن لـ OpenMates بشكل متزايد استخدام أدوات مخصصة: البحث، المقارنة، التلخيص، إنشاء الملفات، فحص المصادر، وعرض نتائج منظمة مباشرة في المحادثة.
    
    ## 4. المزيد من المزودين لنتائج واقعية
    
    أضاف إصدار v0.10 وحسّن المزودين في الخلفية، على سبيل المثال للسفر، والفعاليات، والمدفوعات، وسلامة المحتوى. هذا أمر مهم لأن المهارة تكون مفيدة فقط عندما تكون النتيجة حديثة، ومدعومة بالمصادر، ومحددة بما يكفي للاستخدام.
    
    بالنسبة للمستخدمين، التأثير المرئي بسيط: بطاقات أكثر ثراءً، إسناد أفضل للمصادر، المزيد من الروابط المباشرة، وإجابات عامة أقل عندما يتمكن المزود من تقديم بيانات حقيقية.
    
    ## 5. تحسين العناصر المضمنة والمعاينات
    
    أصبحت العناصر المضمنة أكثر فائدة في جميع أنحاء التطبيق. حصلت نتائج البحث، وروابط الحجز، والملفات المنشأة، ومخرجات البرمجة، والصور، والأمثلة العامة على معاينات أوضح وعروض بملء الشاشة، بحيث يمكنك فحص النتائج دون فقدان سياق المحادثة.
    
    ## 6. أمثلة وصفحات عامة أكثر فائدة
    
    أصبحت الإعلانات، والنصائح، والصفحات القانونية، ومحادثات الأمثلة صفحات محادثة عامة حقيقية. وهذا يسهل مشاركة ما يمكن لـ OpenMates فعله وفتح الأمثلة المفيدة مرة أخرى لاحقاً.
    
    ## 7. خيارات تسجيل ومدفوعات أكثر سلاسة
    
    أضاف OpenMates أيضاً تحويلات SEPA البنكية عبر Revolut Business، وحسّن عملية الدفع عبر Stripe للمستخدمين خارج الاتحاد الأوروبي، وأضاف إمكانية تغيير بريد الحساب الإلكتروني. هذه ليست ميزات مبهرة، لكنها تجعل الأساسيات أكثر استقراراً عندما تريد فعلياً استخدام المنتج.
    
    # ماذا يعني هذا للاستخدام اليومي
    
    يجب أن يبدو OpenMates الآن كمساحة عمل مفيدة أكثر: يمكن أن تحتوي الإجابات على روابط تعليمية، ويمكنك تمييز الأجزاء المهمة والعودة إليها، ويمكن لمزيد من مهارات التطبيقات تقديم نتائج منظمة حقيقية، كما أصبحت الأمثلة العامة أسهل في المشاركة.
    
    وكما هو الحال دائماً، كان جزء كبير من العمل غير مرئي في إصلاح الأخطاء وتحسين الموثوقية — خاصة فيما يتعلق بمزامنة المحادثات المشفرة، والعناصر المضمنة، والتسجيل، وسلوك متصفح Safari.
    
    مع التحية،
    
