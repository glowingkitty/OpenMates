email_body:
  context: 'Newsletter announcements/introducing-openmates-v010 — email_body'
  en: |-
    Hey there,
    
    OpenMates v0.10 was mostly about making the product feel more useful in normal day-to-day situations: clearer answers, smoother chats, more apps and providers, and better ways to learn and get things done.
    
    [cta]
    
    # ✨ The highlights
    
    ## 1. Wikipedia links directly inside answers
    
    OpenMates can now highlight relevant Wikipedia topics directly inside assistant responses. When a concept is worth exploring further, you can click the highlighted term and quickly learn more without leaving the flow of the chat.
    
    This is especially useful for learning, research, travel planning, history questions, science topics, or anything where the answer opens up a new rabbit hole.
    
    ## 2. Message highlights and comments
    
    You can now highlight parts of assistant messages and keep notes on them. This makes longer answers much more useful: save the important paragraph, mark something you want to revisit, or keep a comment next to a specific claim or recommendation.
    
    ## 3. New apps and app skills
    
    OpenMates got more useful app skills across everyday categories. Travel searches became more practical with train connections and booking links, Events gained more useful event sources, Code became better at understanding repositories, and several embed types became clearer and easier to act on.
    
    Instead of only answering from the model's memory, OpenMates can increasingly use dedicated tools: search, compare, summarize, create files, inspect source material, and show structured results directly in the chat.
    
    ## 4. More providers for real-world results
    
    v0.10 added and improved providers behind the scenes, for example for travel, events, payments, and content safety. This matters because a skill is only useful when the result is current, source-backed, and specific enough to use.
    
    For users, the visible effect is simple: richer cards, better source attribution, more direct links, and fewer generic answers when a provider can return real data.
    
    ## 5. Better embeds and previews
    
    Embeds became more useful throughout the app. Search results, booking links, generated files, code outputs, images and public examples got clearer previews and fullscreen views, so you can inspect results without losing the conversation context.
    
    ## 6. More useful examples and public pages
    
    Announcements, tips, legal pages and example chats became proper public chat pages. That makes it easier to share what OpenMates can do and to open useful examples again later.
    
    ## 7. Smoother signup and payment options
    
    OpenMates also added SEPA bank transfers via Revolut Business, improved Stripe checkout for users outside the EU, and added account email changes. These are not flashy features, but they make the basics less fragile when you actually want to use the product.
    
    # What this means for everyday use
    
    OpenMates should feel more like a useful workspace now: answers can contain learning links, you can mark and revisit important parts, more app skills can return real structured results, and public examples are easier to share.
    
    As always, a lot of the work was also invisible bug fixing and reliability improvements — especially around encrypted chat sync, embeds, signup, and Safari behavior.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates v0.10 drehte sich vor allem darum, das Produkt im Alltag nützlicher zu machen: klarere Antworten, flüssigere Chats, mehr Apps und Provider sowie bessere Möglichkeiten zum Lernen und Erledigen konkreter Aufgaben.
    
    [cta]
    
    # ✨ Die Highlights
    
    ## 1. Wikipedia-Links direkt in Antworten
    
    OpenMates kann jetzt relevante Wikipedia-Themen direkt in Antworten hervorheben. Wenn ein Begriff oder Konzept spannend ist, kannst du ihn anklicken und schnell mehr erfahren, ohne den Chatfluss zu verlassen.
    
    Das ist besonders praktisch beim Lernen, Recherchieren, Reisen, bei Geschichts- und Wissenschaftsfragen oder überall dort, wo eine Antwort neue Fragen aufmacht.
    
    ## 2. Textstellen markieren und kommentieren
    
    Du kannst jetzt wichtige Stellen in Antworten markieren und Notizen dazu speichern. Dadurch werden längere Antworten deutlich nützlicher: wichtige Absätze sichern, etwas für später markieren oder einen Kommentar direkt neben einer konkreten Empfehlung behalten.
    
    ## 3. Neue Apps und App-Skills
    
    OpenMates bekam mehr nützliche App-Skills für Alltagsaufgaben. Reisesuchen wurden mit Zugverbindungen und Buchungslinks praktischer, Events bekamen nützlichere Quellen, Code wurde besser beim Verstehen von Repositories, und mehrere Embed-Typen wurden klarer und leichter nutzbar.
    
    Statt nur aus dem Modellgedächtnis zu antworten, kann OpenMates immer häufiger gezielte Werkzeuge nutzen: suchen, vergleichen, zusammenfassen, Dateien erstellen, Quellen prüfen und strukturierte Ergebnisse direkt im Chat anzeigen.
    
    ## 4. Mehr Provider für echte Ergebnisse
    
    v0.10 ergänzte und verbesserte Provider im Hintergrund, zum Beispiel für Reisen, Events, Zahlungen und Inhaltssicherheit. Das ist wichtig, weil ein Skill nur dann wirklich hilft, wenn die Ergebnisse aktuell, quellengestützt und konkret genug sind.
    
    Für Nutzer:innen heißt das sichtbar: bessere Karten, klarere Quellen, direktere Links und weniger generische Antworten, wenn ein Provider echte Daten liefern kann.
    
    ## 5. Bessere Embeds und Vorschauen
    
    Embeds wurden in der App nützlicher. Suchergebnisse, Buchungslinks, generierte Dateien, Code-Ausgaben, Bilder und öffentliche Beispiele bekamen klarere Vorschauen und Vollbildansichten, sodass du Ergebnisse prüfen kannst, ohne den Chat-Kontext zu verlieren.
    
    ## 6. Nützlichere Beispiele und öffentliche Seiten
    
    Ankündigungen, Tipps, rechtliche Seiten und Beispiel-Chats wurden zu richtigen öffentlichen Chat-Seiten. Dadurch lässt sich besser teilen, was OpenMates kann, und nützliche Beispiele lassen sich später leichter wieder öffnen.
    
    ## 7. Stabilere Registrierung und Zahlungsoptionen
    
    OpenMates unterstützt außerdem SEPA-Überweisungen über Revolut Business, einen verbesserten Stripe-Checkout für Nutzer:innen außerhalb der EU und das Ändern der Account-E-Mail. Das sind keine auffälligen Features, machen aber die Grundlagen weniger fragil, wenn man das Produkt tatsächlich nutzen möchte.
    
    # Was das im Alltag bedeutet
    
    OpenMates fühlt sich damit mehr wie ein nützlicher Arbeitsbereich an: Antworten enthalten Lernlinks, wichtige Stellen lassen sich markieren, mehr App-Skills liefern echte strukturierte Ergebnisse und öffentliche Beispiele sind besser teilbar.
    
    Wie immer bestand ein großer Teil der Arbeit auch aus unsichtbaren Fehlerbehebungen und Stabilitätsverbesserungen, vor allem bei verschlüsselter Chat-Synchronisation, Embeds, Registrierung und Safari-Verhalten.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
  zh: |
    嘿，你好，
    
    OpenMates v0.10 的重点在于提升产品在日常场景中的实用性：更清晰的回答、更流畅的对话、更多的应用和提供商，以及更高效的学习和办事方式。
    
    [cta]
    
    # ✨ 亮点概览
    
    ## 1. 回答中直接集成维基百科链接
    
    OpenMates 现在可以直接在助手回答中高亮显示相关的维基百科主题。当某个概念值得深入探索时，你可以点击高亮词汇快速了解更多信息，而无需离开当前的对话流。
    
    这对于学习、研究、旅行规划、历史问题、科学话题，或者任何会引出新知识领域的回答都非常有用。
    
    ## 2. 消息高亮与备注
    
    你现在可以高亮显示助手消息的部分内容并添加笔记。这让长篇回答变得更有价值：你可以保存重要段落、标记需要复看的内容，或者在特定的观点或建议旁添加备注。
    
    ## 3. 新应用与应用技能
    
    OpenMates 在各个日常类别中增加了更多实用的应用技能。旅行搜索变得更加实用，增加了火车班次和预订链接；“活动”获得了更多有用的活动来源；“代码”在理解代码库方面表现更佳；几种嵌入类型也变得更清晰、更易于操作。
    
    OpenMates 不再仅仅依靠模型的记忆来回答，而是越来越多地使用专用工具：搜索、对比、总结、创建文件、检查源材料，并直接在对话中显示结构化结果。
    
    ## 4. 更多提供商，提供真实世界的结果
    
    v0.10 在后台添加并改进了提供商，例如旅行、活动、支付和内容安全方面。这很重要，因为只有当结果是实时的、有来源支持且足够具体可用时，一项技能才真正有用。
    
    对用户而言，直观的效果很简单：更丰富的卡片、更好的来源归属、更多的直接链接，以及当提供商能返回真实数据时，减少泛泛而谈的回答。
    
    ## 5. 更好的嵌入与预览
    
    整个应用中的嵌入功能变得更加实用。搜索结果、预订链接、生成的文件、代码输出、图像和公开示例现在拥有更清晰的预览和全屏视图，让你可以在不丢失对话上下文的情况下查看结果。
    
    ## 6. 更有用的示例与公开页面
    
    公告、提示、法律页面和示例对话现在都变成了正式的公开对话页面。这使得分享 OpenMates 的功能以及日后重新打开有用示例变得更加容易。
    
    ## 7. 更顺畅的注册与支付选项
    
    OpenMates 还增加了通过 Revolut Business 进行的 SEPA 银行转账，改进了欧盟以外用户的 Stripe 结账流程，并增加了更改账户邮箱的功能。这些虽然不是华丽的功能，但在你真正想要使用产品时，它们能让基础体验更加稳健。
    
    # 这对日常使用意味着什么
    
    OpenMates 现在应该更像一个实用的工作空间：回答可以包含学习链接，你可以标记并复看重要部分，更多应用技能可以返回真实的结构化结果，公开示例也更容易分享。
    
    一如既往，我们也做了大量幕后的 Bug 修复和可靠性改进——特别是在加密对话同步、嵌入、注册以及 Safari 浏览器表现方面。
    
    祝好，
    
    Marco  
    OpenMates 创始人
  es: |
    Hola,
    
    OpenMates v0.10 se centró principalmente en hacer que el producto sea más útil en situaciones cotidianas: respuestas más claras, chats más fluidos, más aplicaciones y proveedores, y mejores formas de aprender y hacer cosas.
    
    [cta]
    
    # ✨ Lo más destacado
    
    ## 1. Enlaces de Wikipedia directamente en las respuestas
    
    OpenMates ahora puede resaltar temas relevantes de Wikipedia directamente en las respuestas del asistente. Cuando valga la pena profundizar en un concepto, puedes hacer clic en el término resaltado y aprender más rápidamente sin salir del flujo del chat.
    
    Esto es especialmente útil para el aprendizaje, la investigación, la planificación de viajes, preguntas de historia, temas científicos o cualquier cosa en la que la respuesta abra un nuevo tema en el que profundizar.
    
    ## 2. Resaltados de mensajes y comentarios
    
    Ahora puedes resaltar partes de los mensajes del asistente y añadir notas sobre ellas. Esto hace que las respuestas largas sean mucho más útiles: guarda el párrafo importante, marca algo que quieras volver a consultar o deja un comentario junto a una afirmación o recomendación específica.
    
    ## 3. Nuevas aplicaciones y habilidades
    
    OpenMates ha incorporado habilidades de aplicaciones más útiles en categorías cotidianas. Las búsquedas de viajes son ahora más prácticas con conexiones de tren y enlaces de reserva, Eventos ha ganado fuentes más útiles, Código ha mejorado en la comprensión de repositorios y varios tipos de elementos incrustados son ahora más claros y fáciles de usar.
    
    En lugar de limitarse a responder basándose en la memoria del modelo, OpenMates puede utilizar cada vez más herramientas específicas: buscar, comparar, resumir, crear archivos, inspeccionar material de origen y mostrar resultados estructurados directamente en el chat.
    
    ## 4. Más proveedores para resultados del mundo real
    
    La v0.10 ha añadido y mejorado proveedores internos, por ejemplo para viajes, eventos, pagos y seguridad de contenido. Esto es importante porque una habilidad solo es útil cuando el resultado es actual, está respaldado por fuentes y es lo suficientemente específico como para ser utilizado.
    
    Para los usuarios, el efecto visible es sencillo: tarjetas más completas, mejor atribución de fuentes, más enlaces directos y menos respuestas genéricas cuando un proveedor puede devolver datos reales.
    
    ## 5. Mejores elementos incrustados y vistas previas
    
    Los elementos incrustados son ahora más útiles en toda la aplicación. Los resultados de búsqueda, los enlaces de reserva, los archivos generados, las salidas de código, las imágenes y los ejemplos públicos tienen vistas previas más claras y vistas a pantalla completa, para que puedas inspeccionar los resultados sin perder el contexto de la conversación.
    
    ## 6. Ejemplos y páginas públicas más útiles
    
    Los anuncios, consejos, páginas legales y chats de ejemplo se han convertido en páginas de chat públicas propiamente dichas. Esto facilita compartir lo que OpenMates puede hacer y volver a abrir ejemplos útiles más tarde.
    
    ## 7. Opciones de registro y pago más fluidas
    
    OpenMates también ha añadido transferencias bancarias SEPA a través de Revolut Business, ha mejorado el proceso de pago con Stripe para usuarios de fuera de la UE y ha añadido la posibilidad de cambiar el correo electrónico de la cuenta. No son funciones espectaculares, pero hacen que lo básico sea menos frágil cuando realmente quieres usar el producto.
    
    # Qué significa esto para el uso diario
    
    OpenMates debería sentirse ahora más como un espacio de trabajo útil: las respuestas pueden contener enlaces de aprendizaje, puedes marcar y volver a consultar partes importantes, más habilidades de aplicaciones pueden devolver resultados estructurados reales y los ejemplos públicos son más fáciles de compartir.
    
    Como siempre, gran parte del trabajo también ha consistido en la corrección de errores invisibles y mejoras de fiabilidad, especialmente en lo que respecta a la sincronización de chats cifrados, los elementos incrustados, el registro y el comportamiento en Safari.
    
    Saludos,
    
    Marco  
    Creador de OpenMates
  fr: |
    Salut,
    
    OpenMates v0.10 visait principalement à rendre le produit plus utile au quotidien : des réponses plus claires, des discussions plus fluides, plus d'applications et de fournisseurs, et de meilleures façons d'apprendre et d'avancer dans tes tâches.
    
    [cta]
    
    # ✨ Les points forts
    
    ## 1. Des liens Wikipédia directement dans les réponses
    
    OpenMates peut désormais mettre en avant des sujets Wikipédia pertinents directement dans les réponses de l'assistant. Lorsqu'un concept mérite d'être approfondi, tu peux cliquer sur le terme mis en évidence et en apprendre plus rapidement sans quitter le fil de la discussion.
    
    C'est particulièrement utile pour l'apprentissage, la recherche, la planification de voyages, les questions d'histoire, les sujets scientifiques ou tout ce qui ouvre de nouvelles pistes d'exploration.
    
    ## 2. Surlignage de messages et commentaires
    
    Tu peux désormais surligner des parties des messages de l'assistant et y ajouter des notes. Cela rend les réponses longues bien plus utiles : sauvegarde un paragraphe important, marque un élément à revoir plus tard ou ajoute un commentaire à côté d'une affirmation ou d'une recommandation spécifique.
    
    ## 3. Nouvelles applications et compétences
    
    OpenMates s'est enrichi de compétences applicatives utiles dans des catégories du quotidien. Les recherches de voyage sont devenues plus pratiques avec les liaisons ferroviaires et les liens de réservation, les Événements bénéficient de sources plus pertinentes, le Code comprend mieux les dépôts, et plusieurs types d'intégrations sont devenus plus clairs et interactifs.
    
    Au lieu de répondre uniquement à partir de la mémoire du modèle, OpenMates peut de plus en plus utiliser des outils dédiés : rechercher, comparer, résumer, créer des fichiers, inspecter les sources et afficher des résultats structurés directement dans le chat.
    
    ## 4. Plus de fournisseurs pour des résultats concrets
    
    La v0.10 a ajouté et amélioré des fournisseurs en coulisses, par exemple pour les voyages, les événements, les paiements et la sécurité du contenu. C'est important car une compétence n'est utile que si le résultat est actuel, sourcé et suffisamment précis pour être exploité.
    
    Pour les utilisateurs, l'effet visible est simple : des fiches plus riches, une meilleure attribution des sources, plus de liens directs et moins de réponses génériques lorsqu'un fournisseur peut renvoyer des données réelles.
    
    ## 5. Meilleures intégrations et aperçus
    
    Les intégrations sont devenues plus utiles dans toute l'application. Les résultats de recherche, les liens de réservation, les fichiers générés, les sorties de code, les images et les exemples publics bénéficient d'aperçus plus clairs et de vues plein écran, pour que tu puisses inspecter les résultats sans perdre le contexte de la conversation.
    
    ## 6. Des exemples et des pages publiques plus utiles
    
    Les annonces, conseils, pages légales et exemples de discussions sont devenus de véritables pages de chat publiques. Cela facilite le partage des capacités d'OpenMates et permet de retrouver facilement des exemples utiles plus tard.
    
    ## 7. Inscription et options de paiement simplifiées
    
    OpenMates a également ajouté les virements bancaires SEPA via Revolut Business, amélioré le paiement Stripe pour les utilisateurs hors UE et ajouté la modification de l'adresse e-mail du compte. Ce ne sont pas des fonctionnalités spectaculaires, mais elles rendent l'utilisation de base plus robuste quand on en a besoin.
    
    # Ce que cela change au quotidien
    
    OpenMates ressemble désormais davantage à un espace de travail utile : les réponses peuvent contenir des liens d'apprentissage, tu peux marquer et revenir sur des parties importantes, plus de compétences applicatives peuvent renvoyer des résultats structurés concrets, et les exemples publics sont plus faciles à partager.
    
    Comme toujours, une grande partie du travail a porté sur la correction de bugs invisibles et l'amélioration de la fiabilité — notamment concernant la synchronisation chiffrée des discussions, les intégrations, l'inscription et le comportement sur Safari.
    
    Salutations,
    
    Marco  
    Créateur d'OpenMates
  pt: |
    Olá,
    
    O OpenMates v0.10 focou principalmente em tornar o produto mais útil em situações do dia a dia: respostas mais claras, conversas mais fluidas, mais apps e provedores, e melhores formas de aprender e realizar tarefas.
    
    [cta]
    
    # ✨ Os destaques
    
    ## 1. Links da Wikipedia diretamente nas respostas
    
    O OpenMates agora pode destacar tópicos relevantes da Wikipedia diretamente nas respostas do assistente. Quando um conceito vale a pena ser explorado, você pode clicar no termo destacado e aprender mais rapidamente sem sair do fluxo da conversa.
    
    Isso é especialmente útil para aprendizado, pesquisa, planejamento de viagens, perguntas de história, tópicos científicos ou qualquer coisa em que a resposta abra caminho para novas descobertas.
    
    ## 2. Destaques e comentários em mensagens
    
    Agora você pode destacar partes das mensagens do assistente e fazer anotações nelas. Isso torna as respostas longas muito mais úteis: salve o parágrafo importante, marque algo que deseja revisitar ou mantenha um comentário ao lado de uma afirmação ou recomendação específica.
    
    ## 3. Novos apps e habilidades de app
    
    O OpenMates ganhou habilidades de app mais úteis em categorias do cotidiano. As buscas de viagens tornaram-se mais práticas com conexões de trem e links de reserva, Eventos ganhou fontes de eventos mais úteis, Código ficou melhor em entender repositórios, e vários tipos de embeds tornaram-se mais claros e fáceis de interagir.
    
    Em vez de apenas responder com base na memória do modelo, o OpenMates pode usar cada vez mais ferramentas dedicadas: pesquisar, comparar, resumir, criar arquivos, inspecionar material de origem e mostrar resultados estruturados diretamente no chat.
    
    ## 4. Mais provedores para resultados do mundo real
    
    A v0.10 adicionou e melhorou provedores nos bastidores, por exemplo, para viagens, eventos, pagamentos e segurança de conteúdo. Isso é importante porque uma habilidade só é útil quando o resultado é atual, baseado em fontes e específico o suficiente para ser usado.
    
    Para os usuários, o efeito visível é simples: cards mais ricos, melhor atribuição de fontes, mais links diretos e menos respostas genéricas quando um provedor pode retornar dados reais.
    
    ## 5. Melhores embeds e pré-visualizações
    
    Os embeds tornaram-se mais úteis em todo o app. Resultados de busca, links de reserva, arquivos gerados, saídas de código, imagens e exemplos públicos ganharam pré-visualizações mais claras e visualizações em tela cheia, para que você possa inspecionar os resultados sem perder o contexto da conversa.
    
    ## 6. Exemplos e páginas públicas mais úteis
    
    Anúncios, dicas, páginas legais e chats de exemplo tornaram-se páginas de chat públicas propriamente ditas. Isso facilita o compartilhamento do que o OpenMates pode fazer e permite abrir exemplos úteis novamente mais tarde.
    
    ## 7. Opções de cadastro e pagamento mais fluidas
    
    O OpenMates também adicionou transferências bancárias SEPA via Revolut Business, melhorou o checkout do Stripe para usuários fora da UE e adicionou a alteração de e-mail da conta. Essas não são funcionalidades chamativas, mas tornam o básico menos frágil quando você realmente quer usar o produto.
    
    # O que isso significa para o uso diário
    
    O OpenMates deve parecer mais um espaço de trabalho útil agora: as respostas podem conter links de aprendizado, você pode marcar e revisitar partes importantes, mais habilidades de app podem retornar resultados estruturados reais e os exemplos públicos são mais fáceis de compartilhar.
    
