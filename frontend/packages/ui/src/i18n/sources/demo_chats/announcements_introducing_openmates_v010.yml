    # ✨ 주요 업데이트 내용
    
    ## 1. 답변 내 위키백과 링크 직접 연결
    
    이제 OpenMates는 어시스턴트 답변 내에서 관련 위키백과 주제를 직접 강조 표시할 수 있습니다. 더 자세히 알아볼 가치가 있는 개념이 나오면, 강조된 용어를 클릭하여 채팅의 흐름을 끊지 않고도 빠르게 더 많은 정보를 확인할 수 있습니다.
    
    이는 학습, 조사, 여행 계획, 역사 질문, 과학 주제 등 답변을 통해 새로운 지식의 세계로 빠져들게 되는 모든 상황에서 특히 유용합니다.
    
    ## 2. 메시지 하이라이트 및 댓글
    
    이제 어시스턴트 메시지의 일부를 하이라이트하고 메모를 남길 수 있습니다. 이를 통해 긴 답변을 훨씬 더 유용하게 활용할 수 있습니다. 중요한 단락을 저장하거나, 나중에 다시 확인하고 싶은 부분을 표시하거나, 특정 주장이나 추천 사항 옆에 의견을 남겨보세요.
    
    ## 3. 새로운 앱 및 앱 스킬
    
    OpenMates가 일상적인 카테고리 전반에 걸쳐 더 유용한 앱 스킬을 갖추게 되었습니다. 여행 검색은 기차 연결편과 예약 링크를 통해 더 실용적으로 변했고, 이벤트는 더 유용한 정보 소스를 확보했으며, 코드는 저장소를 더 잘 이해하게 되었습니다. 또한 여러 임베드 유형이 더 명확해지고 작업하기 쉬워졌습니다.
    
    모델의 기억에만 의존하여 답변하는 대신, OpenMates는 검색, 비교, 요약, 파일 생성, 소스 자료 검토와 같은 전용 도구를 점점 더 많이 사용하여 채팅창에 직접 구조화된 결과를 보여줄 수 있습니다.
    
    ## 4. 실질적인 결과를 위한 더 많은 제공업체
    
    v0.10에서는 여행, 이벤트, 결제, 콘텐츠 안전 등 보이지 않는 곳에서 제공업체들을 추가하고 개선했습니다. 이는 결과가 최신 상태이고, 출처가 뒷받침되며, 바로 사용할 수 있을 만큼 구체적일 때만 스킬이 유용하기 때문에 중요합니다.
    
    사용자 입장에서 눈에 띄는 효과는 간단합니다. 제공업체가 실제 데이터를 반환할 수 있을 때 더 풍부한 카드, 더 나은 출처 표시, 더 많은 직접 링크를 제공하며 일반적인 답변은 줄어듭니다.
    
    ## 5. 더 나은 임베드 및 미리보기
    
    앱 전반에서 임베드가 더 유용해졌습니다. 검색 결과, 예약 링크, 생성된 파일, 코드 출력, 이미지 및 공개 예시의 미리보기가 더 명확해졌고 전체 화면 보기가 추가되어 대화의 맥락을 잃지 않고도 결과를 자세히 살펴볼 수 있습니다.
    
    ## 6. 더 유용한 예시 및 공개 페이지
    
    공지사항, 팁, 법적 고지 페이지 및 예시 채팅이 정식 공개 채팅 페이지로 전환되었습니다. 이를 통해 OpenMates의 기능을 더 쉽게 공유하고 나중에 유용한 예시를 다시 열어볼 수 있습니다.
    
    ## 7. 더 원활한 가입 및 결제 옵션
    
    또한 OpenMates는 Revolut Business를 통한 SEPA 은행 송금을 추가하고, EU 외부 사용자를 위한 Stripe 결제를 개선했으며, 계정 이메일 변경 기능을 추가했습니다. 화려한 기능은 아니지만, 제품을 실제로 사용하고자 할 때 기본적인 부분들을 더 견고하게 만들어 줍니다.
    
    # 일상적인 사용에 미치는 영향
    
    이제 OpenMates는 더 유용한 작업 공간처럼 느껴질 것입니다. 답변에 학습 링크가 포함될 수 있고, 중요한 부분을 표시하고 다시 방문할 수 있으며, 더 많은 앱 스킬이 실제 구조화된 결과를 반환하고, 공개 예시를 더 쉽게 공유할 수 있습니다.
    
    언제나 그렇듯, 암호화된 채팅 동기화, 임베드, 가입 및 Safari 동작과 관련된 보이지 않는 버그 수정과 안정성 개선 작업도 많이 이루어졌습니다.
    
    감사합니다.
    
