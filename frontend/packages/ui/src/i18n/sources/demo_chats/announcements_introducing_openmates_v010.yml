    ## 1. קישורי ויקיפדיה ישירות בתוך התשובות
    
    OpenMates יכולה כעת להדגיש נושאי ויקיפדיה רלוונטיים ישירות בתוך תגובות העוזר. כשמושג מסוים שווה בדיקה מעמיקה יותר, ניתן ללחוץ על המונח המודגש וללמוד עליו במהירות מבלי לצאת מרצף הצ'אט.
    
    זה שימושי במיוחד ללמידה, מחקר, תכנון טיולים, שאלות בהיסטוריה, נושאי מדע, או כל דבר שבו התשובה פותחת "מחילת ארנב" חדשה.
    
    ## 2. הדגשות והערות בהודעות
    
    כעת ניתן להדגיש חלקים מהודעות העוזר ולשמור עליהם הערות. זה הופך תשובות ארוכות להרבה יותר שימושיות: שמירת פסקה חשובה, סימון משהו שרוצים לחזור אליו, או הוספת הערה לצד טענה או המלצה ספציפית.
    
    ## 3. אפליקציות ומיומנויות אפליקציה חדשות
    
    OpenMates קיבלה מיומנויות אפליקציה שימושיות יותר בקטגוריות יומיומיות. חיפושי נסיעות הפכו למעשיים יותר עם חיבורי רכבות וקישורי הזמנה, אירועים קיבלו מקורות מידע שימושיים יותר, קוד הפך לטוב יותר בהבנת מאגרי קוד (repositories), ומספר סוגי הטמעות הפכו לברורים יותר וקלים יותר לתפעול.
    
    במקום לענות רק מהזיכרון של המודל, OpenMates יכולה להשתמש יותר ויותר בכלים ייעודיים: חיפוש, השוואה, סיכום, יצירת קבצים, בדיקת חומרי מקור והצגת תוצאות מובנות ישירות בצ'אט.
    
    ## 4. יותר ספקים לתוצאות מהעולם האמיתי
    
    גרסה 0.10 הוסיפה ושיפרה ספקים "מאחורי הקלעים", למשל עבור נסיעות, אירועים, תשלומים ובטיחות תוכן. זה חשוב כי מיומנות היא שימושית רק כשהתוצאה עדכנית, מבוססת על מקורות וספציפית מספיק לשימוש.
    
    עבור המשתמשים, ההשפעה הנראית לעין היא פשוטה: כרטיסים עשירים יותר, ייחוס טוב יותר למקורות, יותר קישורים ישירים ופחות תשובות גנריות כאשר ספק יכול להחזיר נתונים אמיתיים.
    
    ## 5. הטמעות ותצוגות מקדימות טובות יותר
    
    הטמעות הפכו לשימושיות יותר בכל האפליקציה. תוצאות חיפוש, קישורי הזמנה, קבצים שנוצרו, פלטי קוד, תמונות ודוגמאות ציבוריות קיבלו תצוגות מקדימות ברורות יותר ותצוגות מסך מלא, כך שניתן לבחון תוצאות מבלי לאבד את הקשר השיחה.
    
    ## 6. דוגמאות ודפים ציבוריים שימושיים יותר
    
    הודעות, טיפים, דפים משפטיים וצ'אטים לדוגמה הפכו לדפי צ'אט ציבוריים של ממש. זה מקל על שיתוף היכולות של OpenMates ועל פתיחה חוזרת של דוגמאות שימושיות מאוחר יותר.
    
    ## 7. אפשרויות הרשמה ותשלום חלקות יותר
    
    OpenMates הוסיפה גם העברות בנקאיות מסוג SEPA דרך Revolut Business, שיפרה את התשלום ב-Stripe למשתמשים מחוץ לאיחוד האירופי, והוסיפה אפשרות לשינוי אימייל בחשבון. אלו לא תכונות נוצצות, אבל הן הופכות את הבסיס לפחות שברירי כשבאמת רוצים להשתמש במוצר.
    
    # מה זה אומר לשימוש היומיומי
    
    OpenMates אמורה להרגיש עכשיו יותר כמו סביבת עבודה שימושית: תשובות יכולות להכיל קישורי למידה, ניתן לסמן ולחזור לחלקים חשובים, יותר מיומנויות אפליקציה יכולות להחזיר תוצאות מובנות אמיתיות, ודוגמאות ציבוריות קלות יותר לשיתוף.
    
    כרגיל, חלק גדול מהעבודה היה גם תיקון באגים בלתי נראים ושיפורי אמינות — במיוחד סביב סנכרון צ'אט מוצפן, הטמעות, הרשמה והתנהגות ב-Safari.
    
    בברכה,
    
    מרקו  
    יוצר OpenMates
