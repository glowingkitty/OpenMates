    [cta]
    
    # ✨ 主なアップデート内容
    
    ## 1. 回答内にWikipediaリンクを直接表示
    
    アシスタントの回答内で、関連するWikipediaのトピックを直接ハイライトできるようになりました。さらに詳しく知りたい概念がある場合、ハイライトされた用語をクリックするだけで、チャットの流れを止めることなくすぐに詳細を確認できます。
    
    これは、学習、リサーチ、旅行の計画、歴史や科学に関する質問など、回答からさらに興味が広がるような場面で特に役立ちます。
    
    ## 2. メッセージのハイライトとコメント
    
    アシスタントのメッセージの一部をハイライトし、メモを残せるようになりました。これにより、長い回答がより使いやすくなります。重要な段落を保存したり、後で見返したい箇所に印を付けたり、特定の主張や推奨事項の横にコメントを残したりすることが可能です。
    
    ## 3. 新しいアプリとアプリスキル
    
    日常的なカテゴリーにおいて、より便利なアプリスキルが追加されました。旅行検索では電車の乗り換えや予約リンクが表示されるようになり、イベント検索ではより有用な情報源が追加されました。コード関連ではリポジトリの理解度が向上し、いくつかの埋め込みタイプもより明確で操作しやすくなりました。
    
    モデルの記憶から回答するだけでなく、検索、比較、要約、ファイル作成、ソース資料の調査、構造化された結果の表示など、専用のツールをチャット内で直接活用できるようになっています。
    
    ## 4. 実用的な結果のためのプロバイダー拡充
    
    v0.10では、旅行、イベント、決済、コンテンツの安全性など、バックグラウンドで動作するプロバイダーを追加・改善しました。スキルが真に役立つためには、結果が最新で、根拠があり、具体的である必要があるからです。
    
    ユーザーにとってのメリットは明確です。より詳細なカード、適切な出典表示、直接的なリンクが増え、プロバイダーから実際のデータを取得できる場合には、抽象的な回答が少なくなります。
    
    ## 5. 埋め込みとプレビューの改善
    
    アプリ全体で埋め込み機能がより便利になりました。検索結果、予約リンク、生成されたファイル、コード出力、画像、公開サンプルなどのプレビューがより鮮明になり、全画面表示も可能になったため、会話の文脈を維持したまま結果を確認できます。
    
    ## 6. より便利なサンプルと公開ページ
    
    お知らせ、ヒント、法的ページ、チャットのサンプルが、適切な公開チャットページとして整備されました。これにより、OpenMatesでできることを共有したり、役立つサンプルを後で開き直したりすることが容易になります。
    
    ## 7. 登録と決済オプションの円滑化
    
    Revolut Business経由のSEPA銀行振込の追加、EU圏外のユーザー向けのStripeチェックアウトの改善、アカウントメールアドレスの変更機能を追加しました。これらは派手な機能ではありませんが、製品を実際に使用する際の基本的な利便性を高めるものです。
    
    # 日常での利用における変化
    
    OpenMatesは、より便利なワークスペースのように感じられるはずです。回答に学習用リンクが含まれ、重要な箇所をマークして後で見返すことができ、より多くのアプリスキルが構造化された実際の結果を返し、公開サンプルも簡単に共有できるようになりました。
    
    いつものように、暗号化されたチャットの同期、埋め込み、登録、Safariでの動作など、目に見えない部分でのバグ修正や信頼性の向上にも多くの時間を費やしました。
    
