    OpenMates v0.10 मुख्य रूप से उत्पाद को सामान्य दैनिक स्थितियों में अधिक उपयोगी बनाने के बारे में था: स्पष्ट उत्तर, सहज चैट, अधिक ऐप्स और प्रदाता, और सीखने और काम पूरा करने के बेहतर तरीके।
    
    [cta]
    
    # ✨ मुख्य आकर्षण
    
    ## 1. उत्तरों के भीतर सीधे विकिपीडिया लिंक
    
    OpenMates अब सहायक की प्रतिक्रियाओं के भीतर सीधे प्रासंगिक विकिपीडिया विषयों को हाइलाइट कर सकता है। जब कोई अवधारणा आगे जानने लायक हो, तो आप हाइलाइट किए गए शब्द पर क्लिक कर सकते हैं और चैट के प्रवाह को छोड़े बिना जल्दी से अधिक जान सकते हैं।
    
    यह विशेष रूप से सीखने, शोध, यात्रा योजना, इतिहास के प्रश्नों, विज्ञान के विषयों, या ऐसी किसी भी चीज़ के लिए उपयोगी है जहाँ उत्तर एक नई जिज्ञासा जगाता है।
    
    ## 2. मैसेज हाइलाइट्स और कमेंट्स
    
    अब आप सहायक के संदेशों के कुछ हिस्सों को हाइलाइट कर सकते हैं और उन पर नोट्स रख सकते हैं। यह लंबे उत्तरों को बहुत अधिक उपयोगी बनाता है: महत्वपूर्ण पैराग्राफ को सहेजें, किसी ऐसी चीज़ को चिह्नित करें जिसे आप फिर से देखना चाहते हैं, या किसी विशिष्ट दावे या सिफारिश के बगल में एक टिप्पणी रखें।
    
    ## 3. नए ऐप्स और ऐप स्किल्स
    
    OpenMates को रोज़मर्रा की श्रेणियों में अधिक उपयोगी ऐप स्किल्स मिले हैं। ट्रेन कनेक्शन और बुकिंग लिंक के साथ यात्रा खोजें अधिक व्यावहारिक हो गईं, इवेंट्स को अधिक उपयोगी इवेंट स्रोत मिले, कोड रिपॉजिटरी को समझने में बेहतर हो गया, और कई एम्बेड प्रकार स्पष्ट और उन पर कार्रवाई करना आसान हो गया।
    
    केवल मॉडल की मेमोरी से उत्तर देने के बजाय, OpenMates तेजी से समर्पित टूल का उपयोग कर सकता है: खोजें, तुलना करें, सारांशित करें, फ़ाइलें बनाएं, स्रोत सामग्री का निरीक्षण करें, और सीधे चैट में संरचित परिणाम दिखाएं।
    
    ## 4. वास्तविक दुनिया के परिणामों के लिए अधिक प्रदाता
    
    v0.10 ने पर्दे के पीछे प्रदाताओं को जोड़ा और सुधारा है, उदाहरण के लिए यात्रा, इवेंट्स, भुगतान और सामग्री सुरक्षा के लिए। यह मायने रखता है क्योंकि एक स्किल तभी उपयोगी होती है जब परिणाम वर्तमान, स्रोत-समर्थित और उपयोग करने के लिए पर्याप्त विशिष्ट हो।
    
    उपयोगकर्ताओं के लिए, दृश्य प्रभाव सरल है: समृद्ध कार्ड, बेहतर स्रोत एट्रिब्यूशन, अधिक सीधे लिंक, और जब कोई प्रदाता वास्तविक डेटा लौटा सकता है तो कम सामान्य उत्तर।
    
    ## 5. बेहतर एम्बेड और प्रीव्यू
    
    पूरे ऐप में एम्बेड अधिक उपयोगी हो गए हैं। खोज परिणाम, बुकिंग लिंक, जेनरेट की गई फ़ाइलें, कोड आउटपुट, चित्र और सार्वजनिक उदाहरणों को स्पष्ट प्रीव्यू और फुलस्क्रीन व्यू मिले हैं, ताकि आप बातचीत के संदर्भ को खोए बिना परिणामों का निरीक्षण कर सकें।
    
    ## 6. अधिक उपयोगी उदाहरण और सार्वजनिक पेज
    
    घोषणाएं, टिप्स, कानूनी पेज और उदाहरण चैट उचित सार्वजनिक चैट पेज बन गए। इससे यह साझा करना आसान हो जाता है कि OpenMates क्या कर सकता है और बाद में उपयोगी उदाहरणों को फिर से खोलना आसान हो जाता है।
    
    ## 7. आसान साइनअप और भुगतान विकल्प
    
    OpenMates ने Revolut Business के माध्यम से SEPA बैंक ट्रांसफर भी जोड़ा, यूरोपीय संघ के बाहर के उपयोगकर्ताओं के लिए Stripe चेकआउट में सुधार किया, और अकाउंट ईमेल परिवर्तन जोड़ा। ये कोई दिखावटी फीचर्स नहीं हैं, लेकिन जब आप वास्तव में उत्पाद का उपयोग करना चाहते हैं तो ये बुनियादी चीजों को कम जटिल बनाते हैं।
    
    # रोज़मर्रा के उपयोग के लिए इसका क्या अर्थ है
    
    OpenMates अब एक उपयोगी वर्कस्पेस की तरह महसूस होना चाहिए: उत्तरों में सीखने के लिंक हो सकते हैं, आप महत्वपूर्ण हिस्सों को चिह्नित कर सकते हैं और उन्हें फिर से देख सकते हैं, अधिक ऐप स्किल्स वास्तविक संरचित परिणाम लौटा सकते हैं, और सार्वजनिक उदाहरण साझा करना आसान है।
    
    हमेशा की तरह, बहुत सारा काम अदृश्य बग फिक्सिंग और विश्वसनीयता सुधार भी था — विशेष रूप से एन्क्रिप्टेड चैट सिंक, एम्बेड, साइनअप और सफारी व्यवहार के आसपास।
    
    शुभकामनाएँ,
    
