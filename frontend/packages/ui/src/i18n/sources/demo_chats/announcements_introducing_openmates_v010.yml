    OpenMates dodało również przelewy bankowe SEPA przez Revolut Business, ulepszyło płatności Stripe dla użytkowników spoza UE oraz dodało możliwość zmiany adresu e-mail konta. To nie są widowiskowe funkcje, ale sprawiają, że podstawy działają stabilniej, gdy faktycznie chcesz korzystać z produktu.
    
