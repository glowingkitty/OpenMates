    สวัสดีครับ
    
    OpenMates v0.10 เน้นการทำให้ผลิตภัณฑ์ใช้งานได้จริงมากขึ้นในชีวิตประจำวัน: คำตอบที่ชัดเจนขึ้น, การแชทที่ลื่นไหลกว่าเดิม, แอปและผู้ให้บริการที่มากขึ้น รวมถึงวิธีที่ดีกว่าในการเรียนรู้และจัดการสิ่งต่างๆ ให้เสร็จสิ้น
    
    [cta]
    
    # ✨ ไฮไลท์ที่สำคัญ
    
    ## 1. ลิงก์ Wikipedia ภายในคำตอบโดยตรง
    
    ตอนนี้ OpenMates สามารถไฮไลท์หัวข้อ Wikipedia ที่เกี่ยวข้องได้โดยตรงในคำตอบของ AI เมื่อมีแนวคิดที่น่าสนใจและควรศึกษาต่อ คุณสามารถคลิกที่คำที่ไฮไลท์เพื่อเรียนรู้เพิ่มเติมได้อย่างรวดเร็วโดยไม่ต้องออกจากหน้าแชท
    
    ฟีเจอร์นี้มีประโยชน์อย่างยิ่งสำหรับการเรียนรู้, การวิจัย, การวางแผนท่องเที่ยว, คำถามทางประวัติศาสตร์, หัวข้อวิทยาศาสตร์ หรือเรื่องใดก็ตามที่คำตอบนำไปสู่การค้นคว้าต่อยอด
    
    ## 2. การไฮไลท์ข้อความและคอมเมนต์
    
    ตอนนี้คุณสามารถไฮไลท์บางส่วนของข้อความจาก AI และจดบันทึกไว้ได้ ซึ่งช่วยให้คำตอบที่ยาวๆ มีประโยชน์มากขึ้น: บันทึกย่อหน้าที่สำคัญ, ทำเครื่องหมายสิ่งที่ต้องการกลับมาดูใหม่ หรือเขียนคอมเมนต์ไว้ข้างๆ ข้อความอ้างอิงหรือคำแนะนำที่เฉพาะเจาะจง
    
    ## 3. แอปและทักษะของแอปใหม่ๆ
    
    OpenMates มีทักษะของแอปที่มีประโยชน์มากขึ้นในหมวดหมู่ต่างๆ ที่ใช้ในชีวิตประจำวัน การค้นหาข้อมูลท่องเที่ยวใช้งานได้จริงมากขึ้นด้วยข้อมูลการเชื่อมต่อรถไฟและลิงก์การจอง, หมวดกิจกรรม (Events) มีแหล่งข้อมูลที่หลากหลายขึ้น, หมวดโค้ด (Code) เข้าใจ Repository ได้ดีขึ้น และรูปแบบการฝัง (embed) หลายประเภทก็ชัดเจนและใช้งานได้ง่ายขึ้น
    
    แทนที่จะตอบจากความจำของโมเดลเพียงอย่างเดียว OpenMates สามารถใช้เครื่องมือเฉพาะทางได้มากขึ้น: ค้นหา, เปรียบเทียบ, สรุปผล, สร้างไฟล์, ตรวจสอบแหล่งข้อมูล และแสดงผลลัพธ์แบบมีโครงสร้างในแชทได้โดยตรง
    
    ## 4. เพิ่มผู้ให้บริการเพื่อผลลัพธ์ที่ใช้งานได้จริง
    
    v0.10 ได้เพิ่มและปรับปรุงผู้ให้บริการเบื้องหลัง เช่น สำหรับการท่องเที่ยว, กิจกรรม, การชำระเงิน และความปลอดภัยของเนื้อหา สิ่งนี้สำคัญเพราะทักษะจะมีประโยชน์ก็ต่อเมื่อผลลัพธ์เป็นปัจจุบัน มีแหล่งข้อมูลอ้างอิง และมีความเฉพาะเจาะจงเพียงพอที่จะนำไปใช้งานได้
    
    สำหรับผู้ใช้ สิ่งที่เห็นได้ชัดคือ: การ์ดข้อมูลที่ละเอียดขึ้น, การระบุแหล่งที่มาที่ดีขึ้น, ลิงก์ตรงที่มากขึ้น และคำตอบทั่วไปที่ลดลงเมื่อผู้ให้บริการสามารถดึงข้อมูลจริงมาแสดงได้
    
    ## 5. การฝัง (Embeds) และการแสดงตัวอย่างที่ดีขึ้น
    
    การฝัง (Embeds) มีประโยชน์มากขึ้นทั่วทั้งแอป ผลการค้นหา, ลิงก์การจอง, ไฟล์ที่สร้างขึ้น, ผลลัพธ์ของโค้ด, รูปภาพ และตัวอย่างสาธารณะ มีการแสดงตัวอย่างที่ชัดเจนขึ้นและสามารถดูแบบเต็มหน้าจอได้ เพื่อให้คุณตรวจสอบผลลัพธ์ได้โดยไม่เสียบริบทของการสนทนา
    
    ## 6. ตัวอย่างและหน้าสาธารณะที่มีประโยชน์มากขึ้น
    
    ประกาศ, เคล็ดลับ, หน้าข้อกฎหมาย และตัวอย่างการแชท ได้กลายเป็นหน้าแชทสาธารณะอย่างเป็นทางการ ซึ่งช่วยให้แชร์ความสามารถของ OpenMates ได้ง่ายขึ้น และสามารถกลับมาเปิดดูตัวอย่างที่มีประโยชน์ได้อีกในภายหลัง
    
    ## 7. การสมัครใช้งานและตัวเลือกการชำระเงินที่ราบรื่นขึ้น
    
    OpenMates ยังได้เพิ่มการโอนเงินผ่านธนาคาร SEPA ผ่าน Revolut Business, ปรับปรุงการชำระเงินด้วย Stripe สำหรับผู้ใช้นอกสหภาพยุโรป และเพิ่มการเปลี่ยนอีเมลบัญชี ฟีเจอร์เหล่านี้อาจดูไม่หวือหวา แต่ช่วยให้ระบบพื้นฐานมีความเสถียรมากขึ้นเมื่อคุณต้องการใช้งานจริง
    
    # สิ่งนี้หมายความอย่างไรสำหรับการใช้งานในชีวิตประจำวัน
    
    ตอนนี้ OpenMates ควรจะให้ความรู้สึกเหมือนพื้นที่ทำงานที่มีประโยชน์มากขึ้น: คำตอบสามารถมีลิงก์เพื่อการเรียนรู้, คุณสามารถทำเครื่องหมายและกลับมาดูส่วนที่สำคัญได้, ทักษะของแอปที่มากขึ้นสามารถแสดงผลลัพธ์จริงแบบมีโครงสร้าง และตัวอย่างสาธารณะก็แชร์ได้ง่ายขึ้น
    
    และเช่นเคย งานส่วนใหญ่ยังรวมถึงการแก้ไขบั๊กที่มองไม่เห็นและการปรับปรุงความเสถียร โดยเฉพาะเรื่องการซิงค์แชทแบบเข้ารหัส, การฝัง (embeds), การสมัครใช้งาน และการทำงานบน Safari
    
