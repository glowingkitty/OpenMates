    Bu özellik özellikle öğrenme, araştırma, seyahat planlama, tarih soruları, bilim konuları veya yanıtın yeni bir merak konusuna kapı açtığı her durum için çok kullanışlıdır.
    
    ## 2. Mesaj vurgulama ve yorumlar
    
    Artık asistan mesajlarının belirli kısımlarını vurgulayabilir ve üzerlerine notlar alabilirsin. Bu, uzun yanıtları çok daha kullanışlı hale getirir: önemli bir paragrafı kaydet, tekrar bakmak istediğin bir yeri işaretle veya belirli bir iddia ya da önerinin yanına yorum ekle.
    
    ## 3. Yeni uygulamalar ve uygulama yetenekleri
    
    OpenMates günlük kategorilerde daha kullanışlı uygulama yetenekleri kazandı. Seyahat aramaları tren bağlantıları ve rezervasyon linkleri ile daha pratik hale geldi, Etkinlikler daha faydalı etkinlik kaynaklarına kavuştu, Kod depoları anlama konusunda gelişti ve çeşitli yerleştirme (embed) türleri daha net ve üzerinde işlem yapması daha kolay hale geldi.
    
    Sadece modelin hafızasından yanıt vermek yerine, OpenMates giderek daha fazla özel araç kullanabiliyor: arama yapma, karşılaştırma, özetleme, dosya oluşturma, kaynak materyali inceleme ve yapılandırılmış sonuçları doğrudan sohbette gösterme.
    
    ## 4. Gerçek dünya sonuçları için daha fazla sağlayıcı
    
    v0.10 ile arka planda seyahat, etkinlikler, ödemeler ve içerik güvenliği gibi alanlarda yeni sağlayıcılar eklendi ve mevcutlar iyileştirildi. Bu önemli, çünkü bir yetenek ancak sonuç güncel, kaynak destekli ve kullanılacak kadar spesifik olduğunda faydalıdır.
    
    Kullanıcılar için görünür etkisi basit: daha zengin kartlar, daha iyi kaynak atıfları, daha fazla doğrudan bağlantı ve bir sağlayıcı gerçek veri döndürebildiğinde daha az genel geçer yanıt.
    
    ## 5. Daha iyi yerleştirmeler ve önizlemeler
    
    Yerleştirmeler (embeds) uygulama genelinde daha kullanışlı hale geldi. Arama sonuçları, rezervasyon bağlantıları, oluşturulan dosyalar, kod çıktıları, görseller ve herkese açık örnekler daha net önizlemelere ve tam ekran görünümlere kavuştu; böylece sohbet bağlamını kaybetmeden sonuçları inceleyebilirsin.
    
    ## 6. Daha kullanışlı örnekler ve herkese açık sayfalar
    
    Duyurular, ipuçları, yasal sayfalar ve örnek sohbetler düzgün birer kamuya açık sohbet sayfası haline geldi. Bu, OpenMates'in neler yapabileceğini paylaşmayı ve faydalı örnekleri daha sonra tekrar açmayı kolaylaştırıyor.
    
    ## 7. Daha sorunsuz kayıt ve ödeme seçenekleri
    
    OpenMates ayrıca Revolut Business üzerinden SEPA banka transferlerini ekledi, AB dışındaki kullanıcılar için Stripe ödeme ekranını iyileştirdi ve hesap e-postası değiştirme özelliğini getirdi. Bunlar gösterişli özellikler değil, ancak ürünü gerçekten kullanmak istediğinde temel işlemlerin daha sağlam olmasını sağlıyorlar.
    
    # Günlük kullanım için ne anlama geliyor?
    
    OpenMates artık daha çok kullanışlı bir çalışma alanı gibi hissettirmeli: yanıtlar öğrenme bağlantıları içerebilir, önemli kısımları işaretleyip tekrar ziyaret edebilirsin, daha fazla uygulama yeteneği gerçek yapılandırılmış sonuçlar döndürebilir ve herkese açık örnekleri paylaşmak daha kolaydır.
    
    Her zamanki gibi, çalışmaların büyük bir kısmı görünmez hata düzeltmeleri ve güvenilirlik iyileştirmeleriydi; özellikle şifreli sohbet senkronizasyonu, yerleştirmeler, kayıt olma ve Safari davranışı konularında.
    
