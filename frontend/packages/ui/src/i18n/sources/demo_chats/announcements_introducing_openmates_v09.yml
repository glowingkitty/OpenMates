    ## 2. 🔒 个人数据占位符
    
    与大型科技公司和典型初创公司的 AI 聊天机器人不同，OpenMates 在设计时将你的隐私作为首要任务。它已经具备了各种隐私保护措施：
    - 🔐 你的所有聊天记录仅在你的设备上进行加密和解密
    - 🖼️ 所有外部图片都通过我们的 OpenMates 服务器加载（因此外部网站看不到你的 IP 地址或设备信息）
    - 📉 OpenMates 不使用 Google Analytics 或任何其他分析软件（这也是为什么你在 OpenMates 上看不到 Cookie 横幅的原因）
    
    新功能：当你起草并向 OpenMates 发送消息时，电子邮件地址、电话号码、API 密钥等敏感数据会自动被检测并替换为占位符。你随时可以在用户界面中切换回原始值，也可以点击检测到的数据以防止替换。但默认情况下，此功能可确保 OpenMates 和处理你消息的 AI 提供商从一开始就看不到这些敏感数据。
    
    [亲自尝试一下](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) —— 点击此链接查看个人数据占位符的实际效果：你的电子邮件和电话号码在发送给 AI 之前将被自动检测并替换。
    
    ## 3. 🧠 记忆
    
    OpenMates 现在可以记住特定应用的记忆，例如你即将到来的旅行或项目详情。但是：所有记忆仅在你的设备上加密和解密，并且只有在你明确确认该对话时，才会临时与 OpenMates 服务器和 AI 提供商共享。这让你能够充分利用个性化的回复，而无需不断重复你的项目细节 —— 同时仍能完全掌控你共享的数据、共享的时间以及共享给哪个 AI 提供商。查看 [OpenMates 应用中的记忆](#settings/apps/all/memories)。
    
    ## 4. 🎯 专注模式
    
    了解如何向 AI 聊天机器人提供正确的指令，对于聊天机器人的帮助程度和回复质量有着巨大的影响。有了专注模式，你不需要成为提示词工程专家，也能充分利用出色的针对性指令。例如，只需向 OpenMates 询问职业见解，“职业见解”专注模式就会自动激活，引导你完成整个过程。当然：这仅仅是个开始。接下来的几周内将添加更多专注模式，并进一步提高现有模式的质量。欢迎查看 [OpenMates 应用中的专注模式](#settings/apps/all/focus-modes)。
    
    ## 5. 🤖 新模型
    
    OpenMates 提供了广泛的高效且性能卓越的 AI 模型供选择。默认情况下，它会根据任务自动选择合适的模型。但你随时可以[在 AI 设置中](#settings/ai)永久覆盖此行为，或者通过在消息栏中使用 `@{modelname}` 提及特定模型来按需覆盖。你现在可以从广泛的 AI 模型中进行选择，例如：
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) 和 [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) 和 [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - `@best` 和 `@fast` 模型别名 —— 输入 `@best` 自动路由到最强大的模型，输入 `@fast` 使用 OpenMates 上可用的最快模型。
    
    ## 6. 💡 每日灵感与维基百科链接
    
    如果使用得当，AI 可以成为学习的绝佳工具。OpenMates 经过优化，旨在鼓励人们学习、探索和获取灵感。这就是你登录后在界面顶部看到的“每日灵感”的作用。它们会展示有趣的新视频 —— 很快还会包含维基百科文章、OpenMates 新功能、艺术品的照片和详情、重要的历史事件等其他内容。每日灵感是根据你的聊天内容定制的，然后使用只有你拥有的密钥锁定在你的设备上 —— 因此它们对你来说是私密的。
    此外，OpenMates 还会自动在助手消息的回复中高亮显示维基百科文章。这让你只需点击带有学习图标的橙色高亮单词，即可轻松了解有关该主题的更多信息。
    
    # 🚀 接下来的计划
    
