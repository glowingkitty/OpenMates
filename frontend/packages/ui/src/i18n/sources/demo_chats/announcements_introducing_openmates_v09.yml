    [video]
    
    # 🙏 Primeiro, algumas palavras de agradecimento
    
    No final de dezembro, no âmbito do Chaos Communication Congress, fui inesperadamente convidado para uma entrevista no canal de televisão alemão ZDF [(uma reportagem sobre a importância de alternativas focadas na privacidade face às grandes empresas tecnológicas de IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). E uau, que experiência. Apesar de o OpenMates estar ainda menos polido na altura, as primeiras pessoas começaram a registar-se e a usá-lo — e também a encontrar bugs e casos específicos que eu não tinha experienciado nos meus testes nos meus próprios dispositivos, e que felizmente reportaram. Muito obrigado a todos os que o fizeram — ajudou imenso a tornar o OpenMates mais polido, mais estável e mais completo! E, claro, és super bem-vindo a continuar a reportar problemas se notares algo que pareça errado ou avariado no OpenMates.
    
    Embora este não tenha sido o primeiro software que criei, foi a primeira vez que mais do que um punhado de pessoas começou a usar software que eu construí — mais de 180 utilizadores ativos estão a usar o OpenMates até agora! O que tem sido super entusiasmante e, confesso, no início também um pouco avassalador.
    
    Desde então, foquei-me completamente em melhorar e depurar o OpenMates, tornando-o funcionalmente mais completo e polido — e fiz imensas alterações ao código. Correções de bugs, novas funcionalidades, uma interface de utilizador melhorada e muitas outras melhorias. 
    
    E hoje, tenho o prazer de te dar uma atualização com as mudanças mais entusiasmantes dos últimos meses! Lembra-te que falar de todas as alterações seria demasiado para uma única newsletter — por isso, vou focar-me nos destaques e também publicar vários vídeos curtos sobre diversas funcionalidades do OpenMates nas próximas semanas, no:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Os destaques dos últimos meses
    
    ## 1. 🧩 Novas apps e competências
    
    Além das capacidades existentes de pesquisar na web, ler e analisar websites e ler as transcrições de vídeos do YouTube para iniciar discussões — o OpenMates ganhou muitas novas apps e competências de apps. Aqui estão alguns destaques:
    
    - 🏥 **[Saúde](https://openmates.org/#settings/apps/health/skills/search_appointments):** À procura de consultas médicas? A app Saúde pode agora verificar o Doctolib e o Jameda para encontrar vagas disponíveis.
    - 🏠 **[Casa](https://openmates.org/#settings/apps/home/skills/search):** Pesquisa apartamentos no ImmoScout24, WG-Gesucht e Kleinanzeigen — com os detalhes principais diretamente visíveis no OpenMates.
    - 🎉 **[Eventos](https://openmates.org/#settings/apps/events/skills/search):** Pesquisa e filtra eventos no Meetup, Luma, Resident Advisor e Google — com detalhes como descrições, imagens, quando e onde são os eventos, e links diretos para confirmar presença ou participar.
    - ✈️ **[Viagens](https://openmates.org/#settings/apps/travel):** A nova competência '[Pesquisar ligação](https://openmates.org/#settings/apps/travel/skills/search_connections)' permite-te pesquisar voos via Google, em várias ligações e em vários dias simultaneamente — incluindo detalhes completos do voo e links de reserva. O suporte para ligações de comboio virá a seguir. E a competência '[Calendário de preços](https://openmates.org/#settings/apps/travel/skills/price_calendar)' mostra-te uma visão rápida da evolução dos preços ao longo de um mês.
    - ⏰ **[Lembretes](https://openmates.org/#settings/apps/reminder):** Cria um lembrete para uma conversa para voltares a ela mais tarde — ou até faz com que o OpenMates pesquise e resuma as últimas notícias diárias sobre um determinado tópico, por exemplo.
    - 🖼️ **[Imagens](https://openmates.org/#settings/apps/images):** [Pesquisa](https://openmates.org/#settings/apps/images/skills/search) imagens na web, [gera](https://openmates.org/#settings/apps/images/skills/generate) imagens e [gráficos vetoriais](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDFs](https://openmates.org/#settings/apps/pdf):** Faz o upload de PDFs e faz perguntas sobre o texto ou até sobre o layout visual — o OpenMates consegue tanto ler como visualizar PDFs! 
    - 💻 **[Código](https://openmates.org/#settings/apps/code):** O OpenMates pode [pesquisar a documentação mais recente](https://openmates.org/#settings/apps/code/skills/get_docs) para responder a perguntas relacionadas com programação, depois escrever código — e até permitir-te pré-visualizar designs de websites e código diretamente no browser! E este é apenas o início das suas capacidades de programação.
    - 🧮 **[Matemática](https://openmates.org/#settings/apps/math):** Calcula expressões e até visualiza gráficos, tudo dentro do OpenMates.
    - 📝 **[Documentos](https://openmates.org/#settings/apps/docs):** Pede para gerar documentos Word — e descarrega-os como ficheiros .docx.
    - 📊 **[Folhas de cálculo](https://openmates.org/#settings/apps/sheets):** O OpenMates também pode criar tabelas e permitir que as descarregues como ficheiros .xlsx. E tanto os Documentos como as Folhas de cálculo tornar-se-ão ainda melhores e mais poderosos nas próximas semanas.
    - 📧 **[Correio](https://openmates.org/#settings/apps/mail):** O OpenMates pode rascunhar emails para ti, que podes depois abrir e enviar facilmente através do teu programa de email predefinido no teu dispositivo.
    - 🎙️ **[Áudio](https://openmates.org/#settings/apps/audio):** Não queres escrever? Grava e envia uma mensagem de voz para o OpenMates, diretamente do campo de mensagem.
    
    E foram adicionadas ainda mais competências às apps. Basta [conferir e explorar as Apps do OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Placeholders de Dados Pessoais
    
    Ao contrário dos chatbots de IA das grandes empresas tecnológicas e das startups típicas, o OpenMates foi concebido com a tua privacidade como prioridade principal. E já tinha várias proteções de privacidade em vigor:
    - 🔐 todas as tuas conversas são encriptadas e desencriptadas apenas no teu dispositivo
    - 🖼️ todas as imagens externas são carregadas através do nosso servidor OpenMates (para que os websites externos não vejam o teu endereço IP ou informações do dispositivo)
    - 📉 não é utilizado o Google Analytics nem qualquer outro software de análise no OpenMates (razão pela qual também não vês um banner de cookies no OpenMates)
    
    A novidade: dados sensíveis como endereços de email, números de telefone, chaves de API e outros são automaticamente detetados e substituídos por placeholders no teu dispositivo, quando rascunhas e envias uma mensagem para o OpenMates. Podes sempre voltar ao valor original na interface de utilizador e podes clicar nos dados detetados para impedir a substituição. Mas, por predefinição, esta funcionalidade garante que nem o OpenMates nem os fornecedores de IA que processam as tuas mensagens verão os dados sensíveis.
    
    [Experimenta tu mesmo](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — clica neste link para veres os Placeholders de Dados Pessoais em ação: o teu email e número de telefone serão detetados automaticamente e substituídos antes de serem enviados para a IA.
    
    ## 3. 🧠 Memórias
    
    O OpenMates pode agora lembrar-se de memórias específicas de apps, como as tuas próximas viagens ou detalhes de projetos. MAS: todas as memórias são encriptadas e desencriptadas apenas no teu dispositivo, e só são partilhadas temporariamente com o servidor do OpenMates e o fornecedor de IA se o confirmares explicitamente para a conversa em questão. Isto permite-te tirar total partido de respostas personalizadas sem repetires constantemente os detalhes do teu projeto — mantendo sempre o controlo total sobre que dados partilhas, quando e com que fornecedor de IA. Espreita as [Memórias nas Apps do OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Modos de Foco
    
    Saber dar as instruções certas a um chatbot de IA faz uma enorme diferença na utilidade do chatbot e na qualidade das respostas. Com os Modos de Foco, não precisas de ser um especialista em engenharia de prompts para tirar total partido de instruções excelentes e direcionadas. Basta pedires ao OpenMates insights de carreira, por exemplo, e o modo de foco 'Insights de carreira' deverá ser ativado automaticamente para te guiar no processo. E, claro: isto é apenas o início. Muitos mais Modos de Foco serão adicionados e a qualidade dos existentes será melhorada nas próximas semanas. Sente-te à vontade para conferir os [Modos de Foco nas Apps do OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Novos modelos
    
    O OpenMates tem uma vasta seleção dos modelos de IA mais eficientes e com melhor desempenho do mercado. Por predefinição, seleciona automaticamente o modelo certo com base na tarefa. Mas podes sempre substituir este comportamento [nas definições de IA](https://openmates.org/#settings/ai) permanentemente, ou a pedido, mencionando um modelo específico no campo de mensagem via `@{modelname}`. Podes agora selecionar entre uma vasta gama de modelos de IA, por exemplo:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) e [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) e [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - aliases de modelos `@best` e `@fast` — escreve `@best` para encaminhar automaticamente para o modelo mais forte, `@fast` para usar o modelo mais rápido disponível no OpenMates.
    
    ## 6. 💡 Inspirações Diárias e links da Wikipédia
    
    A IA, se usada corretamente, pode ser uma ferramenta incrível para a aprendizagem. E o OpenMates está otimizado para encorajar as pessoas a aprender, a explorar e a inspirarem-se. É para isso que servem as Inspirações Diárias, que vês no topo da interface depois de fazeres login. Elas mostram novos vídeos interessantes — e em breve também outros conteúdos como artigos da Wikipédia, novas funcionalidades do OpenMates, fotos e detalhes de obras de arte, eventos históricos importantes e muito mais. As Inspirações Diárias são adaptadas às tuas conversas e, depois, bloqueadas no teu dispositivo com uma chave que só tu tens — para que permaneçam privadas.
    Além disso, o OpenMates também destaca automaticamente artigos da Wikipédia nas respostas das mensagens do assistente. O que torna super fácil aprender mais sobre um tópico, bastando clicar na palavra destacada a laranja com o ícone de estudo ao lado.
    
    # 🚀 O que vem a seguir
    
    Nas próximas semanas, vou publicar vários clipes curtos a mostrar as muitas funcionalidades do OpenMates e as coisas úteis que se podem fazer com ele, além de continuar a melhorar o software e a adicionar mais apps, fornecedores e funcionalidades.
    
    A partir de agora, o meu plano é enviar emails da newsletter para anúncios e atualizações a cada poucas semanas e, separadamente, também dicas e truques sobre como usar o OpenMates. Sente-te à vontade para [verificares as tuas definições da newsletter a qualquer momento](https://openmates.org/#settings/newsletter), se quiseres receber mais ou menos emails.
    
    Diverte-te a usar o OpenMates e fica atento a mais novidades!
    
