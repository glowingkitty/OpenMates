    Olá,
    
    O OpenMates v0.11 já está disponível. Esta atualização baseia-se nas melhorias da v0.10 e adiciona funcionalidades práticas para o dia a dia: Inspirações Diárias mais ricas, execução de código, pesquisa de repositórios, geração de música, melhorias nos fornecedores de geração de imagem, resultados de apps mais claros e fontes de interface locais.
    
    # Primeiro, um rápido resumo da v0.10
    
    A v0.10 adicionou links da Wikipédia dentro das respostas, destaques e comentários em mensagens, melhores páginas de anúncios públicos/exemplos, transferências bancárias SEPA e alterações de e-mail da conta.
    
    Essas mudanças tornaram o OpenMates mais útil como um espaço de trabalho diário: mais fácil para aprender, mais fácil de partilhar e menos frágil no que toca ao básico da conta e pagamentos.
    
    # ✨ O que há de novo na v0.11
    
    ## 1. Inspirações Diárias expandidas
    
    As Inspirações Diárias tornaram-se mais ricas e variadas. Podem mostrar vídeos públicos, ideias de funcionalidades úteis e pontos de partida concretos para coisas que possas querer fazer no OpenMates.
    
    O objetivo é fazer com que o OpenMates pareça menos uma caixa de chatbot vazia e mais um lugar que te ajuda a descobrir coisas úteis para fazer: pesquisar um tópico, compreender um vídeo, planear uma tarefa, explorar uma ferramenta ou continuar a partir de um exemplo.
    
    ## 2. Melhorias na execução e pesquisa de código
    
    A app de Código deu um grande passo em frente. O OpenMates agora pode executar código numa sandbox, mostrar resultados, ajudar com pesquisas em repositórios e lidar com mais ações de acompanhamento relacionadas com código.
    
    Para os utilizadores comuns, isto é útil mesmo que não sejas um programador profissional: pequenos scripts, limpeza de dados, geração de documentos, pré-visualizações de websites, explicações de logs e questões técnicas podem tornar-se mais interativos.
    
    ## 3. Geração de música e melhorias nos fornecedores de imagem
    
    A v0.11 expande os fluxos de trabalho de media gerada com a geração de música e melhorias nos fornecedores de geração de imagem. Isso significa que o OpenMates pode suportar mais tarefas criativas diretamente no chat: criar uma ideia musical rápida, gerar conceitos visuais, iterar em prompts ou transformar uma ideia bruta em media que podes realmente inspecionar e reutilizar.
    
    O trabalho também melhora a forma como a media gerada é apresentada, para que os resultados sejam mais fáceis de pré-visualizar, abrir e dar continuidade.
    
    ## 4. Resultados de apps e detalhes de fornecedores mais claros
    
    Muitos cartões de apps e pré-visualizações incorporadas mostram agora melhores exemplos reais, logótipos de fornecedores, informações de origem e metadados mais claros. Isto torna mais fácil compreender o que aconteceu, de onde veio um resultado e qual a competência da app que foi utilizada.
    
    Para o uso diário, isso significa menos adivinhação: resultados de viagens, resultados web, ficheiros gerados, outputs de media e resultados de código devem ser mais fáceis de reconhecer e utilizar.
    
    ## 5. Melhor apresentação de acompanhamento
    
    As sugestões de acompanhamento já existiam, mas a sua apresentação é agora mais limpa e fácil de usar. Servem para te ajudar a continuar uma tarefa sem teres de pensar sozinho no próximo prompt perfeito.
    
    ## 6. Fontes de interface locais
    
    Agora podes escolher preferências de fontes de interface locais. É uma definição pequena, mas importa se passas muito tempo a ler e a escrever no OpenMates.
    
    ## 7. Melhorias de estabilidade e desempenho
    
    Também houve melhorias de estabilidade e desempenho na sincronização do chat, incorporações, pré-visualizações de ficheiros e pré-visualizações de resultados de imagem.
    
    # O que vem a seguir
    
    O próximo passo é continuar a tornar o OpenMates mais fácil de compreender e de usar: melhores exemplos, fluxos de apps mais claros, ferramentas criativas e de pesquisa mais polidas e menos arestas por limar na experiência de chat.
    
    Obrigado por usares o OpenMates e por dares feedback quando algo parece confuso ou não funciona bem.
    
    Saudações,
    
    Marco  
    Criador do OpenMates
  ru: |
    Привет!
    
    Вышла версия OpenMates v0.11. Это обновление развивает улучшения версии v0.10 и добавляет практичные функции для повседневного использования: более насыщенные «Ежедневные идеи», выполнение кода, поиск по репозиториям, генерацию музыки, улучшения провайдеров генерации изображений, более понятные результаты приложений и локальные шрифты интерфейса.
    
    # Сначала краткий обзор v0.10
    
    В v0.10 появились ссылки на Википедию в ответах, выделение сообщений и комментарии, улучшенные страницы публичных анонсов и примеров, банковские переводы SEPA и возможность смены почты аккаунта.
    
    Эти изменения сделали OpenMates полезнее как рабочее пространство на каждый день: стало проще учиться, легче делиться результатами, а базовые функции аккаунта и оплаты стали надежнее.
    
    # ✨ Что нового в v0.11
    
    ## 1. Расширенные «Ежедневные идеи»
    
    «Ежедневные идеи» стали насыщеннее и разнообразнее. Теперь там могут появляться публичные видео, идеи полезных функций и конкретные отправные точки для того, что ты захочешь сделать в OpenMates.
    
    Цель — сделать так, чтобы OpenMates меньше напоминал пустое окно чат-бота и больше походил на место, которое помогает находить полезные занятия: изучить тему, понять содержание видео, спланировать задачу, освоить инструмент или продолжить работу на основе примера.
    
    ## 2. Выполнение кода и улучшения поиска по коду
    
    Приложение «Код» сделало большой шаг вперед. Теперь OpenMates может запускать код в песочнице, показывать результаты, помогать с поиском по репозиториям и выполнять больше последующих действий, связанных с кодом.
    
    Для обычных пользователей это полезно, даже если ты не профессиональный разработчик: небольшие скрипты, очистка данных, генерация документов, предпросмотр сайтов, объяснение логов и технические вопросы станут более интерактивными.
    
    ## 3. Генерация музыки и улучшения провайдеров изображений
    
    Версия v0.11 расширяет возможности работы с медиаконтентом: добавлена генерация музыки и улучшена работа с провайдерами генерации изображений. Это значит, что OpenMates теперь поддерживает больше творческих задач прямо в чате: создание музыкальных набросков, генерация визуальных концептов, работа над промптами или превращение сырой идеи в медиафайл, который можно просмотреть и использовать.
    
    Также мы улучшили отображение сгенерированного контента, чтобы результаты было проще просматривать, открывать и использовать дальше.
    
    ## 4. Более понятные результаты приложений и детали провайдеров
    
    Многие карточки приложений и превью теперь содержат наглядные примеры, логотипы провайдеров, информацию об источниках и более четкие метаданные. Это позволяет легче понять, что произошло, откуда взялся результат и какой навык приложения был задействован.
    
    В повседневном использовании это избавит от лишних догадок: результаты поиска путешествий, веб-результаты, созданные файлы, медиа и результаты выполнения кода станет проще распознавать и использовать.
    
    ## 5. Улучшенное отображение подсказок
    
    Подсказки для продолжения диалога уже были, но теперь они выглядят аккуратнее и ими удобнее пользоваться. Они помогают продолжать работу над задачей, избавляя тебя от необходимости самому придумывать идеальный следующий промпт.
    
    ## 6. Локальные шрифты интерфейса
    
    Теперь можно настраивать предпочтения по локальным шрифтам интерфейса. Это небольшая настройка, но она важна, если ты проводишь много времени за чтением и письмом в OpenMates.
    
    ## 7. Улучшения стабильности и производительности
    
    Также мы повысили стабильность и производительность синхронизации чатов, встраиваемых объектов, предпросмотра файлов и изображений.
    
    # Что дальше
    
    Наш следующий шаг — продолжать делать OpenMates проще и понятнее: больше качественных примеров, наглядные процессы в приложениях, отточенные инструменты для творчества и исследований, а также устранение шероховатостей в работе чата.
    
    Спасибо, что пользуешься OpenMates и делишься отзывами, когда что-то кажется непонятным или работает не так.
    
    С наилучшими пожеланиями,
    
