    # 🙏 Kilka słów podziękowania na początek
    
    Pod koniec grudnia, przy okazji Chaos Communication Congress, niespodziewanie poproszono mnie o wywiad dla niemieckiego kanału telewizyjnego ZDF [(reportaż o znaczeniu alternatyw dla sztucznej inteligencji wielkich korporacji technologicznych, skupionych na prywatności)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). I wow, co to było za doświadczenie. Mimo że OpenMates miało wtedy jeszcze sporo niedociągnięć, pierwsi użytkownicy zaczęli się rejestrować i korzystać z serwisu — a także znajdować błędy i przypadki brzegowe, których nie doświadczyłem podczas testów na własnych urządzeniach, i co ważne, zgłaszać je. Wielkie dzięki dla wszystkich, którzy to zrobili — to naprawdę pomogło uczynić OpenMates bardziej dopracowanym, stabilnym i kompletnym! Oczywiście zachęcam do dalszego zgłaszania problemów, jeśli zauważysz, że coś w OpenMates działa nie tak lub jest zepsute.
    
    Choć nie było to pierwsze oprogramowanie, które stworzyłem, po raz pierwszy z moich rozwiązań zaczęło korzystać więcej niż garstka osób — obecnie OpenMates ma ponad 180 aktywnych użytkowników! To niezwykle ekscytujące, choć przyznam, że na początku było też nieco przytłaczające.
    
    Od tego czasu skupiłem się całkowicie na ulepszaniu i debugowaniu OpenMates oraz na dopracowywaniu funkcji — wprowadziłem mnóstwo zmian w kodzie. Poprawki błędów, nowe funkcje, ulepszony interfejs użytkownika i wiele innych usprawnień. 
    
    Dziś z radością przekazuję aktualizację z najciekawszymi zmianami z ostatnich miesięcy! Pamiętaj, że opisanie wszystkich nowości zajęłoby zbyt wiele miejsca w jednym newsletterze — dlatego skupię się na najważniejszych punktach, a w nadchodzących tygodniach opublikuję serię krótkich filmów o różnych funkcjach OpenMates na:
    - [Instagramie](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodonie](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Najważniejsze zmiany z ostatnich miesięcy
    
    ## 1. 🧩 Nowe aplikacje i umiejętności
    
    Oprócz istniejących możliwości przeszukiwania sieci, czytania i analizowania stron internetowych oraz czytania transkrypcji filmów z YouTube w celu rozpoczęcia dyskusji — OpenMates zyskało wiele nowych aplikacji i umiejętności. Oto niektóre z nich:
    
    - 🏥 **[Zdrowie](#settings/apps/health/skills/search_appointments):** Szukasz wizyty u lekarza? Aplikacja Zdrowie może teraz sprawdzać wolne terminy w serwisach Doctolib i Jameda.
    - 🏠 **[Dom](#settings/apps/home/skills/search):** Szukaj mieszkań na ImmoScout24, WG-Gesucht i Kleinanzeigen — kluczowe szczegóły są widoczne bezpośrednio w OpenMates.
    - 🎉 **[Wydarzenia](#settings/apps/events/skills/search):** Wyszukuj i filtruj wydarzenia w serwisach Meetup, Luma, Resident Advisor i Google — wraz ze szczegółami takimi jak opisy, zdjęcia, czas i miejsce oraz bezpośrednie linki do potwierdzenia udziału.
    - ✈️ **[Podróże](#settings/apps/travel):** Nowa umiejętność „[Wyszukaj połączenie](#settings/apps/travel/skills/search_connections)” pozwala wyszukiwać loty przez Google, sprawdzając wiele połączeń w różnych dniach jednocześnie — wraz z pełnymi szczegółami lotu i linkami do rezerwacji. Wsparcie dla połączeń kolejowych pojawi się wkrótce. Z kolei umiejętność „[Kalendarz cen](#settings/apps/travel/skills/price_calendar)” pokazuje szybki przegląd zmian cen w ciągu miesiąca.
    - ⏰ **[Przypomnienia](#settings/apps/reminder):** Utwórz przypomnienie dla czatu, aby wrócić do niego później — lub nawet skłoń OpenMates do wyszukania i podsumowania najnowszych codziennych wiadomości na dany temat.
    - 🖼️ **[Obrazy](#settings/apps/images):** [Wyszukuj](#settings/apps/images/skills/search) obrazy w sieci, [generuj](#settings/apps/images/skills/generate) obrazy i [grafiki wektorowe](#settings/apps/images/skills/vectorize).
    - 📄 **[Pliki PDF](#settings/apps/pdf):** Przesyłaj pliki PDF i zadawaj pytania dotyczące tekstu, a nawet układu wizualnego — OpenMates potrafi zarówno czytać, jak i przeglądać pliki PDF! 
    - 💻 **[Kod](#settings/apps/code):** OpenMates może [wyszukiwać najnowszą dokumentację](#settings/apps/code/skills/get_docs), aby odpowiadać na pytania związane z programowaniem, a następnie pisać kod — a nawet pozwalać na podgląd projektów stron i kodu bezpośrednio w przeglądarce! A to dopiero początek możliwości programistycznych.
    - 🧮 **[Matematyka](#settings/apps/math):** Obliczaj wyrażenia, a nawet wizualizuj wykresy, wszystko w ramach OpenMates.
    - 📝 **[Dokumenty](#settings/apps/docs):** Poproś o wygenerowanie dokumentów Word — i pobierz je jako pliki .docx.
    - 📊 **[Arkusze](#settings/apps/sheets):** OpenMates może również tworzyć tabele i pozwalać na ich pobranie jako pliki .xlsx. Zarówno Dokumenty, jak i Arkusze staną się jeszcze lepsze i potężniejsze w nadchodzących tygodniach.
    - 📧 **[Poczta](#settings/apps/mail):** OpenMates może przygotowywać dla Ciebie szkice e-maili, które następnie łatwo otworzysz i wyślesz za pomocą domyślnego programu pocztowego na swoim urządzeniu.
    - 🎙️ **[Audio](#settings/apps/audio):** Nie chcesz pisać? Nagraj i wyślij wiadomość głosową do OpenMates bezpośrednio z pola wiadomości.
    
    Dodano jeszcze więcej umiejętności aplikacji. Po prostu [sprawdź i odkryj aplikacje OpenMates](#settings/apps).
    
    ## 2. 🔒 Symbole zastępcze danych osobowych
    
    W przeciwieństwie do chatbotów AI od wielkich firm technologicznych i typowych startupów, OpenMates zostało zaprojektowane z priorytetem dla Twojej prywatności. Już wcześniej stosowaliśmy różne zabezpieczenia:
    - 🔐 wszystkie Twoje czaty są szyfrowane i deszyfrowane wyłącznie na Twoim urządzeniu
    - 🖼️ wszystkie zewnętrzne obrazy są ładowane przez nasz serwer OpenMates (dzięki czemu zewnętrzne strony nie widzą Twojego adresu IP ani informacji o urządzeniu)
    - 📉 w OpenMates nie korzystamy z Google Analytics ani żadnego innego oprogramowania analitycznego (dlatego też nie widzisz u nas banera o plikach cookie)
    
    Co nowego: wrażliwe dane, takie jak adresy e-mail, numery telefonów, klucze API i inne, są automatycznie wykrywane i zastępowane symbolami zastępczymi na Twoim urządzeniu podczas tworzenia i wysyłania wiadomości do OpenMates. Zawsze możesz wrócić do oryginalnej wartości w interfejsie użytkownika, możesz też kliknąć wykryte dane, aby zapobiec ich zastąpieniu. Domyślnie jednak funkcja ta gwarantuje, że ani OpenMates, ani dostawcy AI przetwarzający Twoje wiadomości, w ogóle nie zobaczą wrażliwych danych.
    
    [Wypróbuj to samodzielnie](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — kliknij ten link, aby zobaczyć symbole zastępcze danych osobowych w akcji: Twój e-mail i numer telefonu zostaną automatycznie wykryte i zastąpione przed wysłaniem do AI.
    
    ## 3. 🧠 Wspomnienia
    
    OpenMates może teraz zapamiętywać informacje powiązane z konkretnymi aplikacjami, takie jak nadchodzące podróże czy szczegóły projektów. ALE: wszystkie wspomnienia są szyfrowane i deszyfrowane tylko na Twoim urządzeniu i są udostępniane tymczasowo serwerowi OpenMates oraz dostawcy AI tylko wtedy, gdy wyraźnie to potwierdzisz dla danego czatu. Pozwala to w pełni korzystać ze spersonalizowanych odpowiedzi bez ciągłego powtarzania szczegółów projektu — przy jednoczesnym zachowaniu pełnej kontroli nad tym, jakie dane udostępniasz, kiedy i któremu dostawcy AI. Sprawdź [Wspomnienia w aplikacjach OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Tryby skupienia
    
    Wiedza o tym, jak wydawać odpowiednie instrukcje chatbotowi AI, robi ogromną różnicę w tym, jak pomocny będzie chatbot i jaka będzie jakość odpowiedzi. Dzięki Trybom skupienia nie musisz być ekspertem od prompt engineeringu, aby w pełni korzystać ze świetnych, ukierunkowanych instrukcji. Wystarczy, że zapytasz OpenMates np. o porady zawodowe, a tryb skupienia „Porady zawodowe” powinien automatycznie się aktywować, aby poprowadzić Cię przez ten proces. I oczywiście: to dopiero początek. W nadchodzących tygodniach dodamy znacznie więcej Trybów skupienia, a jakość istniejących będzie dalej poprawiana. Zapraszamy do sprawdzenia [Trybów skupienia w aplikacjach OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nowe modele
    
    OpenMates oferuje szeroki wybór najwydajniejszych i najlepiej działających modeli AI na rynku. Domyślnie system automatycznie wybiera odpowiedni model w zależności od zadania. Możesz jednak zawsze zmienić to zachowanie na stałe [w ustawieniach AI](#settings/ai) lub doraźnie, wymieniając konkretny model w polu wiadomości za pomocą `@{nazwamodelu}`. Możesz teraz wybierać spośród szerokiej gamy modeli AI, na przykład:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) i [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) i [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - aliasy modeli `@best` i `@fast` — wpisz `@best`, aby automatycznie skorzystać z najsilniejszego modelu, lub `@fast`, aby użyć najszybszego modelu dostępnego w OpenMates.
    
    ## 6. 💡 Codzienne inspiracje i linki do Wikipedii
    
    Sztuczna inteligencja, jeśli jest używana właściwie, może być niesamowitym narzędziem do nauki. OpenMates jest zoptymalizowane tak, aby zachęcać ludzi do nauki, odkrywania i szukania inspiracji. Temu służą Codzienne inspiracje, które widzisz u góry interfejsu po zalogowaniu. Pokazują one ciekawe nowe filmy — a wkrótce także inne treści, takie jak artykuły z Wikipedii, nowe funkcje OpenMates, zdjęcia i szczegóły dzieł sztuki, ważne wydarzenia historyczne i wiele innych. Codzienne inspiracje są dopasowane do Twoich czatów, a następnie blokowane na Twoim urządzeniu kluczem, który masz tylko Ty — dzięki czemu pozostają Twoją prywatną sprawą.
    Dodatkowo OpenMates automatycznie wyróżnia artykuły z Wikipedii w odpowiedziach asystenta. Dzięki temu bardzo łatwo dowiedzieć się więcej na dany temat, klikając pomarańczowe słowo z ikoną nauki obok niego.
    
    # 🚀 Co dalej
    
    W nadchodzących tygodniach będę publikować krótkie klipy pokazujące liczne funkcje OpenMates i przydatne rzeczy, które można z nim robić, a także dalej ulepszać oprogramowanie i dodawać kolejne aplikacje, dostawców i funkcje.
    
    Od teraz planuję wysyłać newslettery z ogłoszeniami i aktualizacjami co kilka tygodni, a oddzielnie także wskazówki i triki dotyczące korzystania z OpenMates. W każdej chwili możesz [sprawdzić swoje ustawienia newslettera](#settings/newsletter), jeśli chcesz otrzymywać więcej lub mniej wiadomości.
    
    Baw się dobrze korzystając z OpenMates i czekaj na kolejne aktualizacje!
  nl: |
    Hoi,
    
    OpenMates v0.11 is nu live. Deze update bouwt voort op de verbeteringen van v0.10 en voegt praktische alledaagse functies toe: rijkere Dagelijkse Inspiraties, code-uitvoering, repository-onderzoek, muziekgeneratie, verbeteringen voor aanbieders van beeldgeneratie, duidelijkere app-resultaten en lokale interface-lettertypen.
    
    # Eerst een korte terugblik op v0.10
    
    v0.10 voegde Wikipedia-links toe in antwoorden, berichtmarkeringen en opmerkingen, betere openbare aankondigings-/voorbeeldpagina's, SEPA-bankoverschrijvingen en wijzigingen van e-mailadressen.
    
    Deze wijzigingen maakten OpenMates nuttiger als dagelijkse werkplek: makkelijker om van te leren, makkelijker om te delen en minder kwetsbaar wat betreft de basis van accounts en betalingen.
    
    # ✨ Wat is nieuw in v0.11
    
    ## 1. Uitgebreide Dagelijkse Inspiraties
    
    Dagelijkse Inspiraties zijn rijker en gevarieerder geworden. Ze kunnen openbare video's, nuttige functie-ideeën en concrete startpunten tonen voor dingen die je in OpenMates wilt doen.
    
    Het doel is om OpenMates minder te laten voelen als een leeg chatbot-venster en meer als een plek die je helpt nuttige dingen te ontdekken: een onderwerp onderzoeken, een video begrijpen, een taak plannen, een tool verkennen of verdergaan vanuit een voorbeeld.
    
    ## 2. Verbeteringen in code-uitvoering en code-onderzoek
    
    De Code-app heeft een grote stap voorwaarts gemaakt. OpenMates kan nu code uitvoeren in een sandbox, resultaten tonen, helpen bij het zoeken in repositories en meer code-gerelateerde vervolgacties afhandelen.
    
    Voor alledaagse gebruikers is dit nuttig, zelfs als je geen professionele ontwikkelaar bent: kleine scripts, het opschonen van gegevens, het genereren van documenten, website-previews, uitleg van logs en technische vragen kunnen interactiever worden.
    
    ## 3. Muziekgeneratie en verbeteringen voor beeldaanbieders
    
    v0.11 breidt workflows voor gegenereerde media uit met muziekgeneratie en verbeteringen rond aanbieders van beeldgeneratie. Dat betekent dat OpenMates meer creatieve taken direct in de chat kan ondersteunen: een snel muziekidee maken, visuele concepten genereren, prompts verfijnen of een ruw idee omzetten in media die je daadwerkelijk kunt bekijken en hergebruiken.
    
    Dit werk verbetert ook de manier waarop gegenereerde media worden gepresenteerd, zodat resultaten makkelijker te bekijken, te openen en te vervolgen zijn.
    
    ## 4. Duidelijkere app-resultaten en details van aanbieders
    
    Veel app-kaarten en previews tonen nu betere praktijkvoorbeelden, logo's van aanbieders, broninformatie en duidelijkere metadata. Dit maakt het makkelijker om te begrijpen wat er is gebeurd, waar een resultaat vandaan kwam en welke app-vaardigheid is gebruikt.
    
    Voor dagelijks gebruik betekent dit minder giswerk: reisresultaten, webresultaten, gegenereerde bestanden, media-outputs en coderesultaten zouden makkelijker te herkennen en te gebruiken moeten zijn.
    
    ## 5. Betere presentatie van vervolgstappen
    
    Suggesties voor vervolgstappen bestonden al, maar de presentatie ervan is nu strakker en gebruiksvriendelijker. Ze zijn bedoeld om je te helpen een taak voort te zetten zonder dat je zelf de perfecte volgende prompt hoeft te bedenken.
    
    ## 6. Lokale interface-lettertypen
    
    Je kunt nu voorkeuren voor lokale interface-lettertypen kiezen. Het is een kleine instelling, maar het maakt uit als je veel tijd besteedt aan lezen en schrijven in OpenMates.
    
    ## 7. Stabiliteits- en prestatieverbeteringen
    
    Er zijn ook stabiliteits- en prestatieverbeteringen doorgevoerd in de chatsynchronisatie, embeds, bestandsvoorbeelden en previews van afbeeldingsresultaten.
    
    # Wat volgt
    
    De volgende stap is om OpenMates steeds begrijpelijker en gebruiksvriendelijker te maken: betere voorbeelden, duidelijkere app-flows, verfijndere creatieve en onderzoekstools, en minder ruwe kantjes in de chatervaring.
    
    Bedankt voor het gebruiken van OpenMates en voor het geven van feedback wanneer iets verwarrend aanvoelt of niet werkt.
    
    Groeten,
    
    Marco  
    Maker van OpenMates
  ar: |
    أهلاً بك،
    
    إصدار OpenMates v0.11 متاح الآن. يبني هذا التحديث على تحسينات الإصدار v0.10 ويضيف ميزات عملية يومية: إلهامات يومية أغنى، تنفيذ الأكواد، البحث في المستودعات، توليد الموسيقى، تحسينات لمزودي توليد الصور، نتائج تطبيقات أوضح، وخطوط واجهة محلية.
    
    # أولاً، ملخص سريع للإصدار v0.10
    
    أضاف الإصدار v0.10 روابط ويكيبيديا داخل الإجابات، وتمييز الرسائل والتعليقات، وصفحات إعلانات وأمثلة عامة أفضل، وتحويلات SEPA البنكية، وتغيير البريد الإلكتروني للحساب.
    
    جعلت هذه التغييرات OpenMates أكثر فائدة كمساحة عمل يومية: أسهل للتعلم منها، أسهل للمشاركة، وأكثر استقراراً فيما يخص أساسيات الحساب والدفع.
    
    # ✨ ما الجديد في الإصدار v0.11
    
    ## 1. إلهامات يومية موسعة
    
    أصبحت الإلهامات اليومية أغنى وأكثر تنوعاً. يمكنها الآن عرض فيديوهات عامة، أفكار لميزات مفيدة، ونقاط انطلاق ملموسة لأشياء قد ترغب في القيام بها في OpenMates.
    
    الهدف هو جعل OpenMates يبدو أقل كصندوق دردشة فارغ وأكثر كمكان يساعدك على اكتشاف أشياء مفيدة للقيام بها: البحث في موضوع ما، فهم فيديو، التخطيط لمهمة، استكشاف أداة، أو المتابعة من مثال سابق.
    
    ## 2. تحسينات تنفيذ الأكواد والبحث البرمجي
    
    خطى تطبيق الكود (Code) خطوة كبيرة للأمام. يمكن لـ OpenMates الآن تشغيل الأكواد في بيئة معزولة (sandbox)، وإظهار المخرجات، والمساعدة في البحث في المستودعات، والتعامل مع المزيد من إجراءات المتابعة المتعلقة بالكود.
    
    بالنسبة للمستخدمين العاديين، هذا مفيد حتى لو لم تكن مطوراً محترفاً: السكربتات الصغيرة، تنظيف البيانات، توليد المستندات، معاينة المواقع، شرح السجلات (logs)، والأسئلة التقنية يمكن أن تصبح أكثر تفاعلية.
    
    ## 3. توليد الموسيقى وتحسينات مزودي الصور
    
    يوسع الإصدار v0.11 سير عمل الوسائط المولدة عبر توليد الموسيقى وتحسينات لمزودي توليد الصور. هذا يعني أن OpenMates يمكنه دعم المزيد من المهام الإبداعية مباشرة في الدردشة: إنشاء فكرة موسيقية سريعة، توليد مفاهيم بصرية، تطوير الأوامر (prompts)، أو تحويل فكرة أولية إلى وسائط يمكنك فحصها وإعادة استخدامها.
    
    كما يحسن هذا العمل كيفية عرض الوسائط المولدة، لتصبح النتائج أسهل في المعاينة والفتح والمتابعة.
    
    ## 4. نتائج تطبيقات وتفاصيل مزودين أوضح
    
    تعرض العديد من بطاقات التطبيقات ومعاينات التضمين الآن أمثلة واقعية أفضل، وشعارات المزودين، ومعلومات المصدر، وبيانات وصفية أوضح. هذا يسهل فهم ما حدث، ومن أين أتت النتيجة، وأي مهارة تطبيق تم استخدامها.
    
    للاستخدام اليومي، يعني هذا تخميناً أقل: نتائج السفر، نتائج الويب، الملفات المولدة، مخرجات الوسائط، ونتائج الأكواد ستكون أسهل في التعرف عليها والتعامل معها.
    
    ## 5. عرض أفضل للمتابعة
    
    كانت اقتراحات المتابعة موجودة بالفعل، لكن عرضها الآن أصبح أكثر ترتيباً وسهولة في الاستخدام. تهدف لمساعدتك على إكمال المهمة دون الحاجة للتفكير في الأمر التالي المثالي بنفسك.
    
    ## 6. خطوط الواجهة المحلية
    
    يمكنك الآن اختيار تفضيلات خطوط الواجهة المحلية. إنه إعداد صغير، لكنه مهم إذا كنت تقضي وقتاً طويلاً في القراءة والكتابة في OpenMates.
    
    ## 7. تحسينات في الاستقرار والأداء
    
    كانت هناك أيضاً تحسينات في الاستقرار والأداء في مزامنة الدردشة، والتضمينات، ومعاينات الملفات، ومعاينات نتائج الصور.
    
    # ما التالي
    
    الخطوة التالية هي الاستمرار في جعل OpenMates أسهل في الفهم والاستخدام: أمثلة أفضل، تدفقات تطبيقات أوضح، أدوات إبداعية وبحثية أكثر صقلاً، وتقليل العقبات في تجربة الدردشة.
    
    شكراً لاستخدامك OpenMates ولتقديم ملاحظاتك عندما تشعر أن شيئاً ما محير أو لا يعمل.
    
    تحياتي،
    
    ماركو  
    مؤسس OpenMates
  hi: |
    नमस्ते,
    यहाँ मार्को (उर्फ [glowingkitty](https://github.com/glowingkitty)) हूँ — OpenMates का निर्माता।
    मैं OpenMates को भूला नहीं हूँ — बल्कि इसके बिल्कुल विपरीत है। 
    
    # 🙏 सबसे पहले धन्यवाद के कुछ शब्द
    
    दिसंबर के अंत में, Chaos Communication Congress के संदर्भ में, मुझसे अचानक जर्मन टीवी चैनल ZDF पर एक इंटरव्यू के लिए पूछा गया [(बड़ी टेक AI कंपनियों के गोपनीयता-केंद्रित विकल्पों के महत्व पर चर्चा करने वाली एक रिपोर्ट)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html)। और वाह, क्या अनुभव था। उस समय OpenMates पूरी तरह से परिष्कृत नहीं होने के बावजूद, पहले लोगों ने साइन अप करना और इसका उपयोग करना शुरू कर दिया — और ऐसे बग्स और असामान्य स्थितियों (edge cases) को भी ढूँढा जिनका अनुभव मुझे अपने डिवाइस पर टेस्टिंग के दौरान नहीं हुआ था, और शुक्र है कि उन्होंने इसकी रिपोर्ट की। ऐसा करने वाले सभी लोगों को बहुत-बहुत धन्यवाद — इसने OpenMates को अधिक बेहतर, अधिक स्थिर और अधिक पूर्ण बनाने में वास्तव में बहुत मदद की! और निश्चित रूप से, यदि आपको OpenMates पर कुछ भी गलत या टूटा हुआ महसूस होता है, तो आप बेझिझक समस्याओं की रिपोर्ट करना जारी रख सकते हैं।
    
    हालाँकि यह मेरे द्वारा बनाया गया पहला सॉफ़्टवेयर नहीं था, लेकिन यह पहली बार था जब मुट्ठी भर से अधिक लोगों ने मेरे द्वारा बनाए गए सॉफ़्टवेयर का उपयोग करना शुरू किया — अब तक 180 से अधिक सक्रिय उपयोगकर्ता OpenMates का उपयोग कर रहे हैं! जो बहुत रोमांचक रहा है, और सच कहूँ तो शुरू में थोड़ा भारी (overwhelming) भी था।
    
    तब से, मैंने पूरी तरह से OpenMates को बेहतर बनाने और बग्स को ठीक करने, और इसे अधिक फीचर-पूर्ण और परिष्कृत बनाने पर ध्यान केंद्रित किया है — और कोड में बहुत सारे बदलाव किए हैं। बग फिक्स, नए फीचर्स, एक बेहतर यूजर इंटरफेस और कई अन्य सुधार। 
    
    और आज, मुझे आपको पिछले कुछ महीनों के सबसे रोमांचक बदलावों के साथ अपडेट देते हुए खुशी हो रही है! ध्यान रखें, सभी बदलावों के बारे में बात करना एक न्यूज़लेटर के लिए बहुत अधिक होगा — इसलिए इसके बजाय मैं मुख्य आकर्षणों पर ध्यान केंद्रित करूँगा और आने वाले हफ्तों में OpenMates की विभिन्न विशेषताओं के बारे में कई छोटे वीडियो भी प्रकाशित करूँगा:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ पिछले महीनों की मुख्य विशेषताएँ
    
    ## 1. 🧩 नए ऐप्स और ऐप स्किल्स
    
    वेब खोजने, वेबसाइटों को पढ़ने और उनका विश्लेषण करने, और चर्चा शुरू करने के लिए YouTube वीडियो के ट्रांसक्रिप्ट पढ़ने की मौजूदा क्षमताओं के अलावा — OpenMates में बहुत सारे नए ऐप्स और ऐप स्किल्स जोड़े गए हैं। यहाँ कुछ मुख्य आकर्षण दिए गए हैं:
    
    - 🏥 **[Health](#settings/apps/health/skills/search_appointments):** डॉक्टर के अपॉइंटमेंट की तलाश है? हेल्थ ऐप अब उपलब्ध स्लॉट के लिए Doctolib और Jameda की जाँच कर सकता है।
    - 🏠 **[Home](#settings/apps/home/skills/search):** ImmoScout24, WG-Gesucht और Kleinanzeigen पर अपार्टमेंट खोजें — मुख्य विवरण सीधे OpenMates पर दिखाई देंगे।
    - 🎉 **[Events](#settings/apps/events/skills/search):** Meetup, Luma, Resident Advisor और Google पर इवेंट्स खोजें और फ़िल्टर करें — विवरण जैसे विवरण, चित्र, इवेंट कब और कहाँ हैं, और RSVP करने या उनमें शामिल होने के लिए सीधे लिंक के साथ।
    - ✈️ **[Travel](#settings/apps/travel):** नया '[Search connection](#settings/apps/travel/skills/search_connections)' स्किल आपको Google के माध्यम से उड़ानों को खोजने की अनुमति देता है, विभिन्न दिनों में एक साथ कई कनेक्शनों में — जिसमें उड़ान का पूरा विवरण और बुकिंग लिंक शामिल हैं। ट्रेन कनेक्शन के लिए सपोर्ट जल्द ही आएगा। और '[Price calendar](#settings/apps/travel/skills/price_calendar)' स्किल आपको एक महीने के दौरान कीमतों के विकास का त्वरित अवलोकन दिखाता है।
    - ⏰ **[Reminders](#settings/apps/reminder):** किसी चैट के लिए रिमाइंडर बनाएँ ताकि आप बाद में उस पर वापस आ सकें — या OpenMates को किसी दिए गए विषय के लिए नवीनतम दैनिक समाचार खोजने और सारांशित करने के लिए ट्रिगर करें।
    - 🖼️ **[Images](#settings/apps/images):** वेब पर इमेज [खोजें](#settings/apps/images/skills/search), इमेज [बनाएँ](#settings/apps/images/skills/generate) और [वेक्टर ग्राफिक्स](#settings/apps/images/skills/vectorize) तैयार करें।
    - 📄 **[PDFs](#settings/apps/pdf):** पीडीएफ अपलोड करें और टेक्स्ट या विजुअल लेआउट के बारे में प्रश्न पूछें — OpenMates पीडीएफ को पढ़ और देख दोनों सकता है! 
    - 💻 **[Code](#settings/apps/code):** OpenMates कोडिंग से संबंधित प्रश्नों के उत्तर देने के लिए [नवीनतम डॉक्स खोज सकता है](#settings/apps/code/skills/get_docs), फिर कोड लिख सकता है — और यहाँ तक कि आपको सीधे ब्राउज़र में वेबसाइट डिज़ाइन और कोड का पूर्वावलोकन करने की सुविधा भी देता है! और यह इसकी कोडिंग क्षमताओं की शुरुआती शुरुआत है।
    - 🧮 **[Math](#settings/apps/math):** OpenMates के भीतर ही एक्सप्रेशन की गणना करें और यहाँ तक कि प्लॉट्स को विज़ुअलाइज़ करें।
    - 📝 **[Docs](#settings/apps/docs):** वर्ड दस्तावेज़ बनाने के लिए कहें — और उन्हें .docx फ़ाइलों के रूप में डाउनलोड करें।
    - 📊 **[Sheets](#settings/apps/sheets):** OpenMates टेबल भी बना सकता है और आपको उन्हें .xlsx फ़ाइलों के रूप में डाउनलोड करने की सुविधा दे सकता है। और आने वाले हफ्तों में Docs और Sheets दोनों और भी बेहतर और शक्तिशाली हो जाएंगे।
    - 📧 **[Mail](#settings/apps/mail):** OpenMates आपके लिए ईमेल ड्राफ्ट कर सकता है, जिसे आप फिर अपने डिवाइस पर अपने डिफ़ॉल्ट ईमेल प्रोग्राम के माध्यम से आसानी से खोल और भेज सकते।
    - 🎙️ **[Audio](#settings/apps/audio):** टाइप नहीं करना चाहते? सीधे मैसेज फ़ील्ड से OpenMates को वॉयस मैसेज रिकॉर्ड करें और भेजें।
    
    और भी कई ऐप स्किल्स जोड़े गए हैं। बस [OpenMates ऐप्स को देखें और एक्सप्लोर करें](#settings/apps)।
    
    ## 2. 🔒 पर्सनल डेटा प्लेसहोल्डर्स
    
    बड़ी टेक कंपनियों और सामान्य स्टार्टअप्स के AI चैटबॉट्स के विपरीत, OpenMates को आपकी गोपनीयता को मुख्य प्राथमिकता देते हुए डिज़ाइन किया गया है। और इसमें पहले से ही विभिन्न गोपनीयता सुरक्षा उपाय मौजूद थे:
    - 🔐 आपकी सभी चैट्स केवल आपके डिवाइस पर एन्क्रिप्ट और डिक्रिप्ट की जाती हैं
    - 🖼️ सभी बाहरी इमेज हमारे OpenMates सर्वर के माध्यम से लोड की जाती हैं (ताकि बाहरी वेबसाइटें आपका आईपी पता या डिवाइस की जानकारी न देख सकें)
    - 📉 OpenMates पर Google Analytics या किसी अन्य एनालिटिक्स सॉफ़्टवेयर का उपयोग नहीं किया जाता है (यही कारण है कि आपको OpenMates पर कुकी बैनर नहीं दिखता है)
    
    नया क्या है: जब आप OpenMates को संदेश ड्राफ्ट करते और भेजते हैं, तो ईमेल पते, फोन नंबर, API कीज़ और बहुत कुछ जैसे संवेदनशील डेटा को स्वचालित रूप से पहचाना जाता है और आपके डिवाइस पर प्लेसहोल्डर्स के साथ बदल दिया जाता है। आप यूजर इंटरफेस में हमेशा मूल मान पर वापस जा सकते हैं, और आप बदलाव को रोकने के लिए पहचाने गए डेटा पर क्लिक कर सकते हैं। लेकिन डिफ़ॉल्ट रूप से, यह सुविधा सुनिश्चित करती है कि न तो OpenMates और न ही आपके संदेशों को प्रोसेस करने वाले AI प्रदाता कभी भी संवेदनशील डेटा को देख पाएंगे।
    
    [इसे स्वयं आज़माएं](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — पर्सनल डेटा प्लेसहोल्डर्स को काम करते हुए देखने के लिए इस लिंक पर क्लिक करें: AI को भेजे जाने से पहले आपका ईमेल और फोन नंबर ऑटो-डिटेक्ट और बदल दिया जाएगा।
    
    ## 3. 🧠 Memories
    
    OpenMates अब ऐप-विशिष्ट यादें (memories) याद रख सकता है, जैसे आपकी आगामी यात्राएं या प्रोजेक्ट विवरण। लेकिन: सभी यादें केवल आपके डिवाइस पर एन्क्रिप्ट और डिक्रिप्ट की जाती हैं, और केवल तभी OpenMates सर्वर और AI प्रदाता के साथ अस्थायी रूप से साझा की जाती हैं जब आप स्पष्ट रूप से दी गई चैट के लिए इसकी पुष्टि करते हैं। यह आपको अपने प्रोजेक्ट विवरणों को बार-बार दोहराए बिना व्यक्तिगत प्रतिक्रियाओं का पूरा उपयोग करने देता है — जबकि आप किस डेटा को, कब और किस AI प्रदाता के साथ साझा करते हैं, इस पर पूरी तरह से नियंत्रण में रहते हैं। [OpenMates ऐप्स में Memories](#settings/apps/all/memories) देखें।
    
    ## 4. 🎯 फोकस मोड्स (Focus Modes)
    
    AI चैटबॉट को सही निर्देश देना सीखने से इस बात में बहुत बड़ा अंतर आता है कि चैटबॉट कितना मददगार होगा और जवाबों की गुणवत्ता क्या होगी। फोकस मोड्स के साथ, आपको बेहतरीन, लक्षित निर्देशों का पूरा उपयोग करने के लिए प्रॉम्प्ट इंजीनियरिंग में विशेषज्ञ होने की आवश्यकता नहीं है। उदाहरण के लिए, बस OpenMates से करियर अंतर्दृष्टि (career insights) मांगें, और प्रक्रिया में आपका मार्गदर्शन करने के लिए 'Career insights' फोकस मोड स्वचालित रूप से सक्रिय हो जाना चाहिए। और निश्चित रूप से: यह केवल शुरुआत है। आने वाले हफ्तों में और भी बहुत सारे फोकस मोड्स जोड़े जाएंगे, और मौजूदा मोड्स की गुणवत्ता में और सुधार किया जाएगा। बेझिझक [OpenMates ऐप्स में फोकस मोड्स](#settings/apps/all/focus-modes) देखें।
    
    ## 5. 🤖 नए मॉडल्स
    
    OpenMates के पास सबसे कुशल और बेहतरीन प्रदर्शन करने वाले AI मॉडल्स का विस्तृत चयन है। डिफ़ॉल्ट रूप से, यह कार्य के आधार पर स्वचालित रूप से सही मॉडल का चयन करता है। लेकिन आप हमेशा [AI सेटिंग्स में](#settings/ai) इस व्यवहार को स्थायी रूप से बदल सकते हैं, या मैसेज फ़ील्ड में `@{modelname}` के माध्यम से किसी विशिष्ट मॉडल का उल्लेख करके मांग पर बदल सकते हैं। अब आप AI मॉडल्स की एक विस्तृत श्रृंखला से चयन कर सकते हैं, उदाहरण के लिए:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) और [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) और [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - `@best` और `@fast` मॉडल उपनाम (aliases) — सबसे मजबूत मॉडल पर ऑटो-रूट करने के लिए `@best` टाइप करें, OpenMates पर उपलब्ध सबसे तेज़ मॉडल का उपयोग करने के लिए `@fast` टाइप करें।
    
    ## 6. 💡 डेली इंस्पिरेशन और विकिपीडिया लिंक्स
    
    AI, यदि सही तरीके से उपयोग किया जाए, तो सीखने के लिए एक अद्भुत उपकरण हो सकता है। और OpenMates को लोगों को सीखने, एक्सप्लोर करने और प्रेरित होने के लिए प्रोत्साहित करने के लिए अनुकूलित किया गया है। डेली इंस्पिरेशन (Daily Inspirations) इसी के लिए हैं, जिन्हें आप लॉग इन करने के बाद इंटरफेस के शीर्ष पर देखते हैं। वे दिलचस्प नए वीडियो दिखाते हैं — और जल्द ही अन्य सामग्री जैसे विकिपीडिया लेख, नए OpenMates फीचर्स, कलाकृतियों की तस्वीरें और विवरण, महत्वपूर्ण ऐतिहासिक घटनाएं और बहुत कुछ। डेली इंस्पिरेशन आपकी चैट्स के अनुसार तैयार किए जाते हैं, फिर आपके डिवाइस पर एक ऐसी की (key) के साथ लॉक कर दिए जाते हैं जो केवल आपके पास होती है — इसलिए वे आपके लिए निजी रहते हैं।
    इसके अलावा, OpenMates असिस्टेंट संदेशों के जवाबों में विकिपीडिया लेखों को ऑटो-हाइलाइट भी कर रहा है। जिससे अध्ययन आइकन वाले नारंगी रंग के हाइलाइट किए गए शब्द पर क्लिक करके किसी विषय के बारे में अधिक जानना बहुत आसान हो जाता है।
    
    # 🚀 आगे क्या है
    
    आने वाले हफ्तों में मैं OpenMates की कई विशेषताओं और इसके साथ किए जा सकने वाले उपयोगी कार्यों को दिखाते हुए विभिन्न छोटे क्लिप पोस्ट करूँगा, साथ ही सॉफ़्टवेयर में और सुधार करूँगा और अधिक ऐप्स, प्रदाता और सुविधाएँ जोड़ूँगा।
    
    अब से मेरी योजना हर कुछ हफ्तों में घोषणाओं और अपडेट के लिए न्यूज़लेटर ईमेल भेजने की है, और अलग से OpenMates का उपयोग करने के तरीके पर टिप्स और ट्रिक्स भी भेजने की है। यदि आप अधिक या कम न्यूज़लेटर ईमेल प्राप्त करना चाहते हैं, तो बेझिझक किसी भी समय अपनी [न्यूज़लेटर सेटिंग्स](#settings/newsletter) देखें।
    
    OpenMates का उपयोग करने का आनंद लें, और अधिक अपडेट के लिए बने रहें!
