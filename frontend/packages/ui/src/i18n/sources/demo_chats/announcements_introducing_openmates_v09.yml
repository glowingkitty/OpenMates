  es: |
    Hola,
    
    OpenMates v0.11 ya está disponible. Esta actualización se basa en las mejoras de la v0.10 y añade funciones prácticas para el día a día: Inspiraciones Diarias más completas, ejecución de código, investigación de repositorios, generación de música, mejoras en los proveedores de generación de imágenes, resultados de aplicaciones más claros y fuentes de interfaz locales.
    
    [cta]
    
    # Primero, un breve resumen de la v0.10
    
    La v0.10 añadió enlaces de Wikipedia dentro de las respuestas, destacados y comentarios en los mensajes, mejores páginas públicas de anuncios y ejemplos, transferencias bancarias SEPA y cambios de correo electrónico de la cuenta.
    
    Esos cambios hicieron que OpenMates fuera más útil como espacio de trabajo diario: más fácil para aprender, más fácil de compartir y menos frágil en lo que respecta a los aspectos básicos de la cuenta y los pagos.
    
    # ✨ Novedades de la v0.11
    
    ## 1. Inspiraciones Diarias ampliadas
    
    Las Inspiraciones Diarias son ahora más completas y variadas. Pueden mostrar vídeos públicos, ideas de funciones útiles y puntos de partida concretos para cosas que quieras hacer en OpenMates.
    
    El objetivo es que OpenMates no parezca tanto una caja de chatbot vacía y se sienta más como un lugar que te ayuda a descubrir cosas útiles que hacer: investigar un tema, entender un vídeo, planificar una tarea, explorar una herramienta o continuar a partir de un ejemplo.
    
    ## 2. Mejoras en la ejecución e investigación de código
    
    La aplicación de Código ha dado un gran paso adelante. OpenMates ahora puede ejecutar código en un entorno seguro (sandbox), mostrar resultados, ayudar con búsquedas en repositorios y gestionar más acciones de seguimiento relacionadas con el código.
    
    Para los usuarios habituales, esto es útil incluso si no eres un desarrollador profesional: pequeños scripts, limpieza de datos, generación de documentos, vistas previas de sitios web, explicaciones de registros y preguntas técnicas pueden volverse más interactivos.
    
    ## 3. Generación de música y mejoras en los proveedores de imágenes
    
    La v0.11 amplía los flujos de trabajo de contenido generado con la generación de música y mejoras en los proveedores de generación de imágenes. Esto significa que OpenMates puede admitir más tareas creativas directamente en el chat: crear una idea musical rápida, generar conceptos visuales, iterar sobre prompts o convertir una idea aproximada en contenido multimedia que realmente puedas inspeccionar y reutilizar.
    
    Este trabajo también mejora la forma en que se presenta el contenido generado, para que los resultados sean más fáciles de previsualizar, abrir y continuar.
    
    ## 4. Resultados de aplicaciones y detalles de proveedores más claros
    
    Muchas tarjetas de aplicaciones y vistas previas integradas muestran ahora mejores ejemplos reales, logotipos de proveedores, información de origen y metadatos más claros. Esto facilita la comprensión de lo que ha ocurrido, de dónde procede un resultado y qué habilidad de la aplicación se ha utilizado.
    
    Para el uso diario, esto significa menos conjeturas: los resultados de viajes, los resultados web, los archivos generados, los contenidos multimedia y los resultados de código deberían ser más fáciles de reconocer y de utilizar.
    
    ## 5. Mejor presentación de los seguimientos
    
    Las sugerencias de seguimiento ya existían, pero ahora su presentación es más limpia y fácil de usar. Están pensadas para ayudarte a continuar una tarea sin tener que pensar tú mismo en el siguiente prompt perfecto.
    
    ## 6. Fuentes de interfaz locales
    
    Ahora puedes elegir tus preferencias de fuentes de interfaz locales. Es un ajuste pequeño, pero importa si pasas mucho tiempo leyendo y escribiendo en OpenMates.
    
    ## 7. Mejoras de estabilidad y rendimiento
    
    También ha habido mejoras de estabilidad y rendimiento en la sincronización del chat, los elementos integrados, las vistas previas de archivos y las vistas previas de resultados de imágenes.
    
    # Lo que viene a continuación
    
    El siguiente paso es seguir haciendo que OpenMates sea más fácil de entender y de usar: mejores ejemplos, flujos de aplicaciones más claros, herramientas creativas y de investigación más pulidas y menos asperezas en la experiencia del chat.
    
    Gracias por usar OpenMates y por enviarnos tus comentarios cuando algo te parezca confuso o no funcione bien.
    
    Saludos,
    
    Marco  
    Creador de OpenMates
  fr: |
    Salut,
    
    OpenMates v0.11 est maintenant disponible. Cette mise à jour s'appuie sur les améliorations de la v0.10 et ajoute des fonctionnalités pratiques au quotidien : des Inspirations Quotidiennes plus riches, l'exécution de code, la recherche de dépôts, la génération de musique, des améliorations pour les fournisseurs de génération d'images, des résultats d'applications plus clairs et des polices d'interface locales.
    
    [cta]
    
    # D'abord, un petit récapitulatif de la v0.10
    
    La v0.10 a ajouté des liens Wikipédia dans les réponses, la mise en évidence et les commentaires de messages, de meilleures pages d'annonces publiques et d'exemples, les virements bancaires SEPA et le changement d'e-mail du compte.
    
    Ces changements ont rendu OpenMates plus utile comme espace de travail quotidien : plus facile pour apprendre, plus facile à partager et moins fragile concernant les bases du compte et du paiement.
    
    # ✨ Quoi de neuf dans la v0.11
    
    ## 1. Inspirations Quotidiennes enrichies
    
    Les Inspirations Quotidiennes sont devenues plus riches et plus variées. Elles peuvent mettre en avant des vidéos publiques, des idées de fonctionnalités utiles et des points de départ concrets pour ce que tu souhaites faire dans OpenMates.
    
    L'objectif est de faire en sorte qu'OpenMates ressemble moins à une boîte de chatbot vide et plus à un endroit qui t'aide à découvrir des choses utiles à faire : faire des recherches sur un sujet, comprendre une vidéo, planifier une tâche, explorer un outil ou continuer à partir d'un exemple.
    
    ## 2. Améliorations de l'exécution et de la recherche de code
    
    L'application Code a fait un grand pas en avant. OpenMates peut désormais exécuter du code dans un bac à sable, afficher les résultats, aider à la recherche de dépôts et gérer davantage d'actions de suivi liées au code.
    
    Pour les utilisateurs quotidiens, c'est utile même si tu n'es pas un développeur professionnel : les petits scripts, le nettoyage de données, la génération de documents, les aperçus de sites web, les explications de logs et les questions techniques peuvent devenir plus interactifs.
    
    ## 3. Génération de musique et améliorations des fournisseurs d'images
    
    La v0.11 étend les flux de travail de médias générés avec la génération de musique et des améliorations concernant les fournisseurs de génération d'images. Cela signifie qu'OpenMates peut prendre en charge plus de tâches créatives directement dans le chat : créer une idée musicale rapide, générer des concepts visuels, itérer sur des prompts ou transformer une idée brute en un média que tu peux réellement inspecter et réutiliser.
    
    Ce travail améliore également la présentation des médias générés, afin que les résultats soient plus faciles à prévisualiser, à ouvrir et à utiliser comme base pour la suite.
    
    ## 4. Résultats d'applications et détails des fournisseurs plus clairs
    
    De nombreuses cartes d'applications et aperçus intégrés affichent désormais de meilleurs exemples réels, les logos des fournisseurs, les informations sur les sources et des métadonnées plus claires. Il est ainsi plus facile de comprendre ce qui s'est passé, d'où vient un résultat et quelle compétence d'application a été utilisée.
    
    Pour une utilisation quotidienne, cela signifie moins de devinettes : les résultats de voyage, les résultats web, les fichiers générés, les sorties multimédias et les résultats de code devraient être plus faciles à reconnaître et à exploiter.
    
    ## 5. Meilleure présentation des suggestions de suivi
    
    Les suggestions de suivi existaient déjà, mais leur présentation est désormais plus propre et plus facile à utiliser. Elles sont destinées à t'aider à poursuivre une tâche sans avoir à réfléchir toi-même au prochain prompt parfait.
    
    ## 6. Polices d'interface locales
    
    Tu peux désormais choisir tes préférences de polices d'interface locales. C'est un petit réglage, mais il compte si tu passes beaucoup de temps à lire et à écrire dans OpenMates.
    
    ## 7. Améliorations de la stabilité et des performances
    
    Il y a également eu des améliorations de stabilité et de performance dans la synchronisation du chat, les intégrations, les aperçus de fichiers et les aperçus de résultats d'images.
    
    # Et après ?
    
    La prochaine étape consiste à continuer de rendre OpenMates plus facile à comprendre et à utiliser : de meilleurs exemples, des flux d'applications plus clairs, des outils de création et de recherche plus aboutis, et moins d'aspérités dans l'expérience du chat.
    
    Merci d'utiliser OpenMates et de nous faire part de tes commentaires quand quelque chose semble confus ou cassé.
    
    Bien à toi,
    
    Marco  
    Créateur d'OpenMates
