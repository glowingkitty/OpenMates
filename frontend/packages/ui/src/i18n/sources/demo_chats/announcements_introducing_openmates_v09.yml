  it: |
    Ciao,
    sono Marco (alias [glowingkitty](https://github.com/glowingkitty)), il creatore di OpenMates.
    Non mi sono dimenticato di OpenMates — anzi, tutt'altro. 
    
    [video]
    
    # 🙏 Prima di tutto, qualche parola di ringraziamento
    
    A fine dicembre, nell'ambito del Chaos Communication Congress, mi è stata inaspettatamente chiesta un'intervista per il canale televisivo tedesco ZDF [(un servizio sull'importanza delle alternative incentrate sulla privacy rispetto alle grandi aziende tecnologiche di IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). E wow, che esperienza. Nonostante all'epoca OpenMates fosse ancora piuttosto acerbo, i primi utenti hanno iniziato a iscriversi e a usarlo — trovando anche bug e casi limite che non avevo riscontrato durante i test sui miei dispositivi, e segnalandoli prontamente. Grazie mille a tutti coloro che lo hanno fatto — ha aiutato davvero molto a rendere OpenMates più rifinito, stabile e completo! E naturalmente sei il benvenuto se vorrai continuare a segnalare problemi se noti qualcosa che non va o non funziona su OpenMates.
    
    Anche se questo non è stato il primo software che ho creato, è stata la prima volta che più di una manciata di persone ha iniziato a usare qualcosa costruito da me — finora oltre 180 utenti attivi usano OpenMates! È stato entusiasmante e, devo ammetterlo, all'inizio anche un po' travolgente.
    
    Da allora, mi sono concentrato completamente sul miglioramento e sul debug di OpenMates, rendendolo più completo e rifinito — e ho apportato un'infinità di modifiche al codice. Correzioni di bug, nuove funzionalità, un'interfaccia utente migliorata e molti altri perfezionamenti. 
    
    E oggi sono felice di darti un aggiornamento sulle modifiche più interessanti degli ultimi mesi! Tieni presente che parlare di tutti i cambiamenti sarebbe troppo per una singola newsletter — quindi mi concentrerò sui punti salienti e pubblicherò anche diversi brevi video sulle varie funzionalità di OpenMates nelle prossime settimane su:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ I punti salienti degli ultimi mesi
    
    ## 1. 🧩 Nuove app e competenze
    
    Oltre alle attuali capacità di ricerca sul web, lettura e analisi di siti web e lettura delle trascrizioni dei video di YouTube per avviare discussioni — OpenMates ha ottenuto molte nuove app e competenze. Ecco alcuni punti salienti:
    
    - 🏥 **[Salute](https://openmates.org/#settings/apps/health/skills/search_appointments):** Cerchi appuntamenti medici? L'app Salute ora può controllare le disponibilità su Doctolib e Jameda.
    - 🏠 **[Casa](https://openmates.org/#settings/apps/home/skills/search):** Cerca appartamenti su ImmoScout24, WG-Gesucht e Kleinanzeigen — con i dettagli principali visibili direttamente su OpenMates.
    - 🎉 **[Eventi](https://openmates.org/#settings/apps/events/skills/search):** Cerca e filtra eventi su Meetup, Luma, Resident Advisor e Google — con dettagli come descrizioni, immagini, data e luogo, e link diretti per confermare la partecipazione o iscriverti.
    - ✈️ **[Viaggi](https://openmates.org/#settings/apps/travel):** La nuova competenza "[Cerca collegamento](https://openmates.org/#settings/apps/travel/skills/search_connections)" ti permette di cercare voli tramite Google, su più collegamenti in vari giorni contemporaneamente — inclusi i dettagli completi del volo e i link per la prenotazione. Seguirà il supporto per i collegamenti ferroviari. E la competenza "[Calendario prezzi](https://openmates.org/#settings/apps/travel/skills/price_calendar)" ti mostra una rapida panoramica dell'andamento dei prezzi nell'arco di un mese.
    - ⏰ **[Promemoria](https://openmates.org/#settings/apps/reminder):** Crea un promemoria per una chat per tornarci più tardi — o chiedi a OpenMates di cercare e riassumere le ultime notizie quotidiane su un determinato argomento, ad esempio.
    - 🖼️ **[Immagini](https://openmates.org/#settings/apps/images):** [Cerca](https://openmates.org/#settings/apps/images/skills/search) immagini sul web, [genera](https://openmates.org/#settings/apps/images/skills/generate) immagini e [grafica vettoriale](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** Carica PDF e fai domande sul testo o persino sul layout visivo — OpenMates può sia leggere che visualizzare i PDF! 
    - 💻 **[Codice](https://openmates.org/#settings/apps/code):** OpenMates può [cercare la documentazione più recente](https://openmates.org/#settings/apps/code/skills/get_docs) per rispondere a domande relative alla programmazione, scrivere codice — e persino farti visualizzare in anteprima il design di siti web e il codice direttamente nel browser! E questo è solo l'inizio delle sue capacità di programmazione.
    - 🧮 **[Matematica](https://openmates.org/#settings/apps/math):** Calcola espressioni e visualizza grafici, tutto all'interno di OpenMates.
    - 📝 **[Documenti](https://openmates.org/#settings/apps/docs):** Chiedi di generare documenti Word — e scaricali come file .docx.
    - 📊 **[Fogli](https://openmates.org/#settings/apps/sheets):** OpenMates può anche creare tabelle e farti scaricare file .xlsx. Sia Documenti che Fogli diventeranno ancora migliori e più potenti nelle prossime settimane.
    - 📧 **[Email](https://openmates.org/#settings/apps/mail):** OpenMates può scrivere bozze di email per te, che potrai poi aprire e inviare facilmente tramite il tuo programma di posta predefinito sul dispositivo.
    - 🎙️ **[Audio](https://openmates.org/#settings/apps/audio):** Non vuoi scrivere? Registra e invia un messaggio vocale a OpenMates, direttamente dal campo del messaggio.
    
    E sono state aggiunte ancora più competenze. [Dai un'occhiata ed esplora le App di OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Segnaposto per i dati personali
    
    A differenza dei chatbot IA delle grandi aziende tecnologiche e delle startup tipiche, OpenMates è progettato con la tua privacy come priorità assoluta. E aveva già diverse protezioni della privacy attive:
    - 🔐 tutte le tue chat sono criptate e decriptate solo sul tuo dispositivo
    - 🖼️ tutte le immagini esterne vengono caricate tramite il nostro server OpenMates (così i siti web esterni non vedono il tuo indirizzo IP o le informazioni sul dispositivo)
    - 📉 su OpenMates non viene utilizzato Google Analytics né alcun altro software di analisi (motivo per cui non vedi un banner dei cookie)
    
    Novità: i dati sensibili come indirizzi email, numeri di telefono, chiavi API e altro vengono rilevati automaticamente e sostituiti con segnaposto sul tuo dispositivo quando scrivi e invii un messaggio a OpenMates. Puoi sempre tornare al valore originale nell'interfaccia utente e puoi cliccare sui dati rilevati per impedire la sostituzione. Ma per impostazione predefinita, questa funzione garantisce che né OpenMates né i fornitori di IA che elaborano i tuoi messaggi vedano mai i dati sensibili.
    
    [Prova tu stesso](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — clicca su questo link per vedere i segnaposto per i dati personali in azione: la tua email e il tuo numero di telefono verranno rilevati automaticamente e sostituiti prima di essere inviati all'IA.
    
    ## 3. 🧠 Ricordi
    
    OpenMates ora può ricordare informazioni specifiche delle app, come i tuoi prossimi viaggi o i dettagli di un progetto. MA: tutti i ricordi sono criptati e decriptati solo sul tuo dispositivo, e vengono condivisi temporaneamente con il server di OpenMates e il fornitore di IA solo se lo confermi esplicitamente per la chat in corso. Questo ti permette di sfruttare appieno le risposte personalizzate senza ripetere costantemente i dettagli del progetto — mantenendo il pieno controllo su quali dati condividi, quando e con quale fornitore di IA. Dai un'occhiata ai [Ricordi nelle App di OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Modalità Focus
    
    Sapere come dare le istruzioni giuste a un chatbot IA fa una grande differenza in termini di utilità e qualità delle risposte. Con le Modalità Focus, non serve essere esperti di prompt engineering per sfruttare istruzioni mirate ed efficaci. Chiedi a OpenMates informazioni sulla carriera, ad esempio, e la modalità focus "Career insights" dovrebbe attivarsi automaticamente per guidarti nel processo. E naturalmente: questo è solo l'inizio. Verranno aggiunte molte altre Modalità Focus e la qualità di quelle esistenti sarà ulteriormente migliorata nelle prossime settimane. Dai un'occhiata alle [Modalità Focus nelle App di OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nuovi modelli
    
    OpenMates offre un'ampia selezione dei modelli di IA più efficienti e performanti sul mercato. Per impostazione predefinita, seleziona automaticamente quello giusto in base al compito. Ma puoi sempre sovrascrivere questo comportamento [nelle impostazioni IA](https://openmates.org/#settings/ai) in modo permanente, o su richiesta menzionando un modello specifico nel campo del messaggio tramite `@{modelname}`. Ora puoi scegliere tra una vasta gamma di modelli di IA, ad esempio:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) e [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) e [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - Alias dei modelli `@best` e `@fast` — scrivi `@best` per indirizzare automaticamente al modello più potente, `@fast` per usare il modello più veloce disponibile su OpenMates.
    
    ## 6. 💡 Ispirazioni quotidiane e link a Wikipedia
    
    L'IA, se usata correttamente, può essere uno strumento straordinario per l'apprendimento. E OpenMates è ottimizzato per incoraggiare le persone a imparare, esplorare e lasciarsi ispirare. A questo servono le Ispirazioni Quotidiane, che vedi nella parte superiore dell'interfaccia dopo l'accesso. Mostrano nuovi video interessanti — e presto anche altri contenuti come articoli di Wikipedia, nuove funzionalità di OpenMates, foto e dettagli di opere d'arte, eventi storici importanti e altro ancora. Le Ispirazioni Quotidiane sono personalizzate in base alle tue chat, quindi bloccate sul tuo dispositivo con una chiave che solo tu possiedi — così rimangono private.
    Inoltre, OpenMates evidenzia automaticamente gli articoli di Wikipedia nelle risposte dei messaggi dell'assistente. Questo rende semplicissimo approfondire un argomento cliccando sulla parola evidenziata in arancione con l'icona dello studio accanto.
    
    # 🚀 Cosa succederà ora
    
    Nelle prossime settimane pubblicherò vari brevi filmati che mostrano le numerose funzionalità di OpenMates e le cose utili che si possono fare, oltre a continuare a migliorare il software e ad aggiungere altre app, fornitori e funzioni.
    
    Da ora in poi, il mio piano è di inviare email della newsletter per annunci e aggiornamenti ogni poche settimane e, separatamente, anche consigli e trucchi su come usare OpenMates. Sentiti libero di [controllare le tue impostazioni della newsletter in qualsiasi momento](https://openmates.org/#settings/newsletter), se desideri ricevere più o meno email.
    
    Buon divertimento con OpenMates e resta sintonizzato per altri aggiornamenti!
    
