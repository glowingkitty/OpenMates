    ## 2. 🔒 Platshållare för personuppgifter
    
    Till skillnad från AI-chatbottar från stora teknikföretag och typiska startups är OpenMates designat med din integritet som högsta prioritet. Och det fanns redan flera integritetsskydd på plats:
    - 🔐 alla dina chattar krypteras och dekrypteras endast på din enhet
    - 🖼️ alla externa bilder laddas via vår OpenMates-server (så att externa webbplatser inte ser din IP-adress eller enhetsinformation)
    - 📉 ingen Google Analytics eller annan analysprogramvara används i OpenMates (vilket också är anledningen till att du inte ser någon cookie-banner i OpenMates)
    
    Vad som är nytt: känsliga uppgifter som e-postadresser, telefonnummer, API-nycklar och mer upptäcks automatiskt och ersätts med platshållare på din enhet när du skriver och skickar ett meddelande till OpenMates. Du kan alltid växla tillbaka till det ursprungliga värdet i användargränssnittet, och du kan klicka på upptäckt data för att förhindra ersättningen. Men som standard säkerställer den här funktionen att varken OpenMates eller de AI-leverantörer som behandlar dina meddelanden någonsin ser de känsliga uppgifterna i första hand.
    
    [Prova själv](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — klicka på den här länken för att se platshållare för personuppgifter i praktiken: din e-postadress och ditt telefonnummer kommer att upptäckas automatiskt och ersättas innan de skickas till AI:n.
    
    ## 3. 🧠 Minnen
    
    OpenMates kan nu komma ihåg app-specifika minnen, som dina kommande resor eller projektdetaljer. MEN: alla minnen krypteras och dekrypteras endast på din enhet, och delas endast tillfälligt med OpenMates-servern och AI-leverantören om du uttryckligen bekräftar det för den aktuella chatten. Detta gör att du kan dra full nytta av personliga svar utan att ständigt upprepa dina projektdetaljer — samtidigt som du behåller full kontroll över vilken data du delar, när och med vilken AI-leverantör. Kolla in [Minnen i OpenMates-appar](#settings/apps/all/memories).
    
    ## 4. 🎯 Fokuslägen
    
    Att veta hur man ger rätt instruktioner till en AI-chatbot gör en enorm skillnad för hur hjälpsam chatboten blir och kvaliteten på svaren. Med Fokuslägen behöver du inte vara expert på prompt engineering för att dra full nytta av bra, riktade instruktioner. Fråga bara OpenMates om till exempel karriärinsikter, så börjar fokusläget "Karriärinsikter" automatiskt vägleda dig genom processen. Och självklart: detta är bara början. Många fler fokuslägen kommer att läggas till, och kvaliteten på de befintliga kommer att förbättras ytterligare under de kommande veckorna. Kolla gärna in [Fokuslägen i OpenMates-appar](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nya modeller
    
    OpenMates har ett brett urval av de mest effektiva och bäst presterande AI-modellerna som finns. Som standard väljs rätt modell automatiskt baserat på uppgiften. Men du kan alltid åsidosätta detta beteende permanent [i AI-inställningarna](#settings/ai), eller vid behov genom att nämna en specifik modell i meddelandefältet via `@{modelname}`. Du kan nu välja mellan ett brett utbud av AI-modeller, till exempel:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - `@best` och `@fast` modellalias — skriv `@best` för att automatiskt styra till den starkaste modellen, `@fast` för att använda den snabbaste modellen som finns tillgänglig på OpenMates.
    
    ## 6. 💡 Daglig inspiration & Wikipedia-länkar
    
    AI kan, om det används på rätt sätt, vara ett fantastiskt verktyg för lärande. Och OpenMates är optimerat för att uppmuntra människor att lära sig, utforska och bli inspirerade. Det är vad Daglig inspiration är till för, som du ser högst upp i gränssnittet när du har loggat in. De visar intressanta nya videor — och snart även annat innehåll som Wikipedia-artiklar, nya OpenMates-funktioner, foton och detaljer om konstverk, viktiga historiska händelser och mer. Daglig inspiration är anpassad efter dina chattar och låses sedan på din enhet med en nyckel som bara du har — så att de förblir privata för dig.
    Dessutom markerar OpenMates automatiskt Wikipedia-artiklar i svaren från assistenten. Det gör det superenkelt att lära sig mer om ett ämne genom att bara klicka på det orangefärgade ordet med studieikonen bredvid.
    
