    Ahoj,
    tady Marco (neboli [glowingkitty](https://github.com/glowingkitty)) – tvůrce OpenMates.
    Na OpenMates jsem nezapomněl – právě naopak. 
    
    [video]
    
    # 🙏 Nejdříve pár slov díků
    
    Koncem prosince jsem byl v souvislosti s konferencí Chaos Communication Congress nečekaně požádán o rozhovor pro německý televizní kanál ZDF [(reportáž o důležitosti alternativ k AI velkých technologických firem zaměřených na soukromí)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). A páni, to byl zážitek. Přestože OpenMates v té době nebylo zdaleka tak vyladěné, začali se registrovat a používat ho první lidé – a také nacházet chyby a okrajové případy, na které jsem při testování na vlastních zařízeních nenarazil, a naštěstí je nahlásili. Velké díky všem, kteří tak učinili – opravdu to pomohlo k tomu, aby bylo OpenMates vybroušenější, stabilnější a ucelenější! A samozřejmě můžeš chyby hlásit i nadále, pokud si všimneš čehokoli, co na OpenMates nefunguje správně.
    
    I když to nebyl první software, který jsem vytvořil, bylo to poprvé, co můj výtvor začalo používat více než jen hrstka lidí – OpenMates má k dnešnímu dni přes 180 aktivních uživatelů! Což je super vzrušující a přiznám se, že zpočátku to bylo i trochu ohromující.
    
    Od té doby jsem se plně soustředil na vylepšování a ladění OpenMates a na to, aby bylo funkčně kompletnější a vyladěnější – a v kódu jsem provedl spoustu změn. Opravy chyb, nové funkce, vylepšené uživatelské rozhraní a mnoho dalších vylepšení. 
    
    A dnes ti s radostí přináším přehled nejzajímavějších změn za posledních několik měsíců! Měj na paměti, že mluvit o všech změnách by vydalo na víc než jeden newsletter – proto se zaměřím na to nejdůležitější a v nadcházejících týdnech budu také publikovat několik krátkých videí o různých funkcích OpenMates na:
    - [Instagramu](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodonu](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ To nejdůležitější z posledních měsíců
    
    ## 1. 🧩 Nové aplikace a dovednosti aplikací
    
    Kromě stávajících možností vyhledávání na webu, čtení a analýzy webových stránek a čtení přepisů videí na YouTube pro zahájení diskusí – OpenMates získalo spoustu nových aplikací a dovedností. Zde jsou některé z nich:
    
    - 🏥 **[Zdraví](https://openmates.org/#settings/apps/health/skills/search_appointments):** Hledáš termín u lékaře? Aplikace Zdraví nyní dokáže prověřit volné termíny na Doctolib a Jameda.
    - 🏠 **[Domov](https://openmates.org/#settings/apps/home/skills/search):** Vyhledávej byty na ImmoScout24, WG-Gesucht a Kleinanzeigen – s klíčovými údaji viditelnými přímo v OpenMates.
    - 🎉 **[Události](https://openmates.org/#settings/apps/events/skills/search):** Vyhledávej a filtruj události na Meetup, Luma, Resident Advisor a Google – včetně podrobností, jako jsou popisy, obrázky, čas a místo konání a přímé odkazy na potvrzení účasti nebo připojení se.
    - ✈️ **[Cestování](https://openmates.org/#settings/apps/travel):** Nová dovednost „[Hledat spojení](https://openmates.org/#settings/apps/travel/skills/search_connections)“ ti umožní vyhledávat lety přes Google, a to napříč více spojeními v různých dnech současně – vč. kompletních podrobností o letu a odkazů na rezervaci. Podpora vlakových spojení bude následovat. A dovednost „[Cenový kalendář](https://openmates.org/#settings/apps/travel/skills/price_calendar)“ ti ukáže rychlý přehled vývoje cen v průběhu měsíce.
    - ⏰ **[Připomínky](https://openmates.org/#settings/apps/reminder):** Vytvoř si připomínku k chatu, aby ses k němu mohl/a vrátit později – nebo dokonce nechej OpenMates vyhledat a shrnout nejnovější denní zprávy pro dané téma.
    - 🖼️ **[Obrázky](https://openmates.org/#settings/apps/images):** [Vyhledávej](https://openmates.org/#settings/apps/images/skills/search) obrázky na webu, [generuj](https://openmates.org/#settings/apps/images/skills/generate) obrázky a [vektorovou grafiku](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF soubory](https://openmates.org/#settings/apps/pdf):** Nahrávej PDF a pokládej otázky k textu nebo i vizuálnímu rozvržení – OpenMates umí PDF číst i prohlížet! 
    - 💻 **[Kód](https://openmates.org/#settings/apps/code):** OpenMates dokáže [vyhledat nejnovější dokumentaci](https://openmates.org/#settings/apps/code/skills/get_docs) pro zodpovězení otázek týkajících se programování, následně napsat kód – a dokonce ti umožní zobrazit náhledy webových návrhů a kódu přímo v prohlížeči! A to je jen začátek jeho programátorských schopností.
    - 🧮 **[Matematika](https://openmates.org/#settings/apps/math):** Počítej výrazy a dokonce vizualizuj grafy, to vše v rámci OpenMates.
    - 📝 **[Dokumenty](https://openmates.org/#settings/apps/docs):** Požádej o vygenerování dokumentů Word – a stáhni si je jako soubory .docx.
    - 📊 **[Tabulky](https://openmates.org/#settings/apps/sheets):** OpenMates umí také vytvářet tabulky a nechat tě je stáhnout jako soubory .xlsx. Dokumenty i Tabulky se v nadcházejících týdnech dočkají dalších vylepšení.
    - 📧 **[E-mail](https://openmates.org/#settings/apps/mail):** OpenMates pro tebe může připravit koncepty e-mailů, které pak snadno otevřeš a odešleš prostřednictvím výchozího e-mailového programu ve svém zařízení.
    - 🎙️ **[Zvuk](https://openmates.org/#settings/apps/audio):** Nechce se ti psát? Nahraj a pošli OpenMates hlasovou zprávu přímo z pole pro zprávu.
    
    A přibylo ještě více dovedností aplikací. Stačí se [podívat a prozkoumat aplikace OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Zástupné symboly pro osobní údaje
    
    Na rozdíl od AI chatbotů od velkých technologických firem a běžných startupů je OpenMates navrženo s ohledem na tvé soukromí jako na hlavní prioritu. A už nyní má zavedeny různé ochrany soukromí:
    - 🔐 všechny tvé chaty jsou šifrovány a dešifrovány pouze ve tvém zařízení
    - 🖼️ všechny externí obrázky se načítají přes náš server OpenMates (takže externí weby nevidí tvou IP adresu ani informace o zařízení)
    - 📉 v OpenMates se nepoužívá Google Analytics ani žádný jiný analytický software (proto také v OpenMates nevidíš cookie lištu)
    
    Co je nového: citlivé údaje, jako jsou e-mailové adresy, telefonní čísla, API klíče a další, jsou při psaní a odesílání zprávy do OpenMates automaticky detekovány a nahrazeny zástupnými symboly přímo ve tvém zařízení. V uživatelském rozhraní se můžeš kdykoli vrátit k původní hodnotě a kliknutím na detekované údaje nahrazení zabránit. Ve výchozím nastavení však tato funkce zajišťuje, že ani OpenMates, ani poskytovatelé AI, kteří zpracovávají tvé zprávy, citlivé údaje vůbec neuvidí.
    
    [Vyzkoušej si to sám/sama](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) – klikni na tento odkaz a uvidíš zástupné symboly pro osobní údaje v akci: tvůj e-mail a telefonní číslo budou před odesláním do AI automaticky detekovány a nahrazeny.
    
    ## 3. 🧠 Vzpomínky
    
    OpenMates si nyní může pamatovat vzpomínky specifické pro danou aplikaci, jako jsou tvé nadcházející cesty nebo podrobnosti o projektech. ALE: všechny vzpomínky jsou šifrovány a dešifrovány pouze ve tvém zařízení a se serverem OpenMates a poskytovatelem AI jsou sdíleny pouze dočasně, pokud to pro daný chat výslovně potvrdíš. To ti umožní plně využívat personalizované odpovědi, aniž bys musel/a neustále opakovat podrobnosti o svém projektu – a přitom si zachováš plnou kontrolu nad tím, jaká data sdílíš, kdy a se kterým poskytovatelem AI. Podívej se na [Vzpomínky v aplikacích OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Režimy soustředění
    
    Vědět, jak dát AI chatbotovi správné pokyny, hraje obrovskou roli v tom, jak moc bude chatbot užitečný a jak kvalitní budou jeho odpovědi. S režimy soustředění nemusíš být odborníkem na prompt engineering, abys mohl/a plně využívat skvělé a cílené instrukce. Stačí se OpenMates zeptat například na kariérní postřehy a režim soustředění „Kariérní postřehy“ by se měl automaticky aktivovat, aby tě procesem provedl. A samozřejmě: toto je jen začátek. V nadcházejících týdnech přibude mnohem více režimů soustředění a kvalita těch stávajících se bude dále zvyšovat. Neváhej a prozkoumej [Režimy soustředění v aplikacích OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nové modely
    
    OpenMates nabízí široký výběr nejefektivnějších a nejvýkonnějších modelů AI, které jsou k dispozici. Ve výchozím nastavení automaticky vybírá ten správný podle daného úkolu. Toto chování však můžeš kdykoli změnit [v nastavení AI](https://openmates.org/#settings/ai) natrvalo, nebo podle potřeby zmíněním konkrétního modelu v poli pro zprávu pomocí `@{nazevmodelu}`. Nyní si můžeš vybrat ze široké škály modelů AI, například:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) a [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) a [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - Aliasy modelů `@best` a `@fast` – napiš `@best` pro automatické směrování na nejsilnější model, `@fast` pro použití nejrychlejšího modelu dostupného v OpenMates.
    
    ## 6. 💡 Denní inspirace a odkazy na Wikipedii
    
    AI, pokud se používá správně, může být úžasným nástrojem pro učení. A OpenMates je optimalizováno tak, aby lidi povzbuzovalo k učení, zkoumání a hledání inspirace. K tomu slouží Denní inspirace, které uvidíš v horní části rozhraní po přihlášení. Zobrazují zajímavá nová videa – a brzy i další obsah, jako jsou články na Wikipedii, nové funkce OpenMates, fotografie a detaily uměleckých děl, důležité historické události a další. Denní inspirace jsou přizpůsobeny tvým chatům a poté uzamčeny ve tvém zařízení klíčem, který máš pouze ty – takže zůstávají soukromé.
    Kromě toho OpenMates v odpovědích asistenta automaticky zvýrazňuje články na Wikipedii. Díky tomu je velmi snadné dozvědět se o tématu více pouhým kliknutím na oranžově zvýrazněné slovo s ikonou studia vedle něj.
    
