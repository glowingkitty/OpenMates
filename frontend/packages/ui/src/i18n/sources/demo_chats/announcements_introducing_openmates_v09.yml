    # 🙏 Eerst een paar woorden van dank
    
    Eind december werd ik, in de context van het Chaos Communication Congress, onverwacht gevraagd voor een interview op de Duitse tv-zender ZDF [(een verslag over het belang van privacygerichte alternatieven voor AI-bedrijven van big tech)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). En wauw, wat een ervaring. Hoewel OpenMates destijds nog wat ruwe kantjes had, begonnen de eerste mensen zich aan te melden en het te gebruiken — en vonden ze ook bugs en randgevallen die ik tijdens het testen op mijn eigen apparaten niet was tegengekomen, en die ze gelukkig rapporteerden. Veel dank aan iedereen die dat heeft gedaan — het heeft echt enorm geholpen om OpenMates gepolijster, stabieler en completer te maken! En natuurlijk ben je van harte welkom om problemen te blijven melden als je merkt dat er iets niet goed voelt of kapot is op OpenMates.
    
    Hoewel dit niet de eerste software was die ik maakte, was het de eerste keer dat meer dan een handvol mensen software begon te gebruiken die ik had gebouwd — inmiddels gebruiken meer dan 180 actieve gebruikers OpenMates! Dat was super spannend en, eerlijk is eerlijk, in het begin ook een beetje overweldigend.
    
    Sindsdien heb ik me volledig gericht op het verbeteren en debuggen van OpenMates, en op het completer en gepolijster maken van de functies — en ik heb een heleboel wijzigingen in de code aangebracht. Bugfixes, nieuwe functies, een verbeterde gebruikersinterface en nog veel meer verbeteringen. 
    
    En vandaag geef ik je graag een update met de meest opwindende veranderingen van de afgelopen maanden! Houd er rekening mee dat het bespreken van alle wijzigingen te veel zou zijn voor één nieuwsbrief — daarom focus ik me op de hoogtepunten en publiceer ik de komende weken ook meerdere korte video's over verschillende functies van OpenMates op:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ De hoogtepunten van de afgelopen maanden
    
    ## 1. 🧩 Nieuwe apps & app-vaardigheden
    
    Naast de bestaande mogelijkheden om op het web te zoeken, websites te lezen en te analyseren, en transcripties van YouTube-video's te lezen om discussies te starten — heeft OpenMates veel nieuwe apps en app-vaardigheden gekregen. Hier zijn enkele hoogtepunten:
    
    - 🏥 **[Gezondheid](https://openmates.org/#settings/apps/health/skills/search_appointments):** Op zoek naar doktersafspraken? De Gezondheid-app kan nu Doctolib en Jameda controleren op beschikbare plekken.
    - 🏠 **[Wonen](https://openmates.org/#settings/apps/home/skills/search):** Zoek naar appartementen op ImmoScout24, WG-Gesucht en Kleinanzeigen — met de belangrijkste details direct zichtbaar op OpenMates.
    - 🎉 **[Evenementen](https://openmates.org/#settings/apps/events/skills/search):** Zoek en filter op evenementen op Meetup, Luma, Resident Advisor en Google — met details zoals beschrijvingen, afbeeldingen, wanneer en waar de evenementen zijn, en directe links om je aan te melden of deel te nemen.
    - ✈️ **[Reizen](https://openmates.org/#settings/apps/travel):** Met de nieuwe vaardigheid '[Verbinding zoeken](https://openmates.org/#settings/apps/travel/skills/search_connections)' kun je via Google naar vluchten zoeken, over meerdere verbindingen op verschillende dagen tegelijk — incl. volledige vluchtgegevens en boekingslinks. Ondersteuning voor treinverbindingen volgt nog. En de vaardigheid '[Prijskalender](https://openmates.org/#settings/apps/travel/skills/price_calendar)' toont je een snel overzicht van de prijsontwikkeling gedurende een maand.
    - ⏰ **[Herinneringen](https://openmates.org/#settings/apps/reminder):** Maak een herinnering aan voor een chat om er later op terug te komen — of laat OpenMates bijvoorbeeld het laatste dagelijkse nieuws over een bepaald onderwerp zoeken en samenvatten.
    - 🖼️ **[Afbeeldingen](https://openmates.org/#settings/apps/images):** [Zoek](https://openmates.org/#settings/apps/images/skills/search) naar afbeeldingen op het web, [genereer](https://openmates.org/#settings/apps/images/skills/generate) afbeeldingen en [vectorafbeeldingen](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF's](https://openmates.org/#settings/apps/pdf):** Upload PDF's en stel vragen over de tekst of zelfs de visuele lay-out — OpenMates kan PDF's zowel lezen als bekijken! 
    - 💻 **[Code](https://openmates.org/#settings/apps/code):** OpenMates kan [zoeken naar de nieuwste documentatie](https://openmates.org/#settings/apps/code/skills/get_docs) om programmeergerelateerde vragen te beantwoorden, vervolgens code schrijven — en je zelfs website-ontwerpen en code direct in de browser laten bekijken! En dit is nog maar het prille begin van de programmeermogelijkheden.
    - 🧮 **[Wiskunde](https://openmates.org/#settings/apps/math):** Bereken expressies en visualiseer zelfs grafieken, allemaal binnen OpenMates.
    - 📝 **[Documenten](https://openmates.org/#settings/apps/docs):** Vraag om Word-documenten te genereren — en download ze als .docx-bestanden.
    - 📊 **[Sheets](https://openmates.org/#settings/apps/sheets):** OpenMates kan ook tabellen maken en je deze laten downloaden als .xlsx-bestanden. En zowel Documenten als Sheets zullen de komende weken nog beter en krachtiger worden.
    - 📧 **[Mail](https://openmates.org/#settings/apps/mail):** OpenMates kan concept-e-mails voor je opstellen, die je vervolgens eenvoudig kunt openen en verzenden via je standaard e-mailprogramma op je apparaat.
    - 🎙️ **[Audio](https://openmates.org/#settings/apps/audio):** Geen zin om te typen? Neem een spraakbericht op en stuur het naar OpenMates, rechtstreeks vanuit het berichtveld.
    
    En er zijn nog meer app-vaardigheden toegevoegd. [Bekijk en ontdek de OpenMates Apps](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Tijdelijke aanduidingen voor persoonlijke gegevens
    
    In tegenstelling tot AI-chatbots van grote techbedrijven en typische startups, is OpenMates ontworpen met jouw privacy als belangrijkste prioriteit. En er waren al verschillende privacybeschermingen aanwezig:
    - 🔐 al je chats worden alleen op jouw apparaat versleuteld en ontsleuteld
    - 🖼️ alle externe afbeeldingen worden geladen via onze OpenMates-server (zodat externe websites jouw IP-adres of apparaatinformatie niet zien)
    - 📉 er wordt geen Google Analytics of andere analysesoftware gebruikt op OpenMates (daarom zie je ook geen cookiebanner op OpenMates)
    
    Wat nieuw is: gevoelige gegevens zoals e-mailadressen, telefoonnummers, API-sleutels en meer worden automatisch gedetecteerd en vervangen door tijdelijke aanduidingen op je apparaat wanneer je een bericht opstelt en naar OpenMates verzendt. Je kunt in de gebruikersinterface altijd terugschakelen naar de oorspronkelijke waarde, en je kunt op gedetecteerde gegevens klikken om de vervanging te voorkomen. Maar standaard zorgt deze functie ervoor dat noch OpenMates, noch de AI-providers die je berichten verwerken, de gevoelige gegevens überhaupt te zien krijgen.
    
    [Probeer het zelf](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — klik op deze link om de tijdelijke aanduidingen voor persoonlijke gegevens in actie te zien: je e-mailadres en telefoonnummer worden automatisch gedetecteerd en vervangen voordat ze naar de AI worden verzonden.
    
    ## 3. 🧠 Geheugen
    
    OpenMates kan nu app-specifieke herinneringen onthouden, zoals je komende reizen of projectdetails. MAAR: alle herinneringen worden alleen op jouw apparaat versleuteld en ontsleuteld, en worden alleen tijdelijk gedeeld met de OpenMates-server en AI-provider als je dit expliciet bevestigt voor de betreffende chat. Hierdoor kun je optimaal gebruikmaken van gepersonaliseerde antwoorden zonder constant je projectdetails te herhalen — terwijl je toch de volledige controle houdt over welke gegevens je deelt, wanneer en met welke AI-provider. Bekijk het [Geheugen in de OpenMates Apps](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Focusmodi
    
    Weten hoe je de juiste instructies aan een AI-chatbot geeft, maakt een enorm verschil in hoe behulpzaam de chatbot zal zijn en de kwaliteit van de antwoorden. Met Focusmodi hoef je geen expert te zijn in prompt engineering om optimaal gebruik te maken van geweldige, gerichte instructies. Vraag OpenMates bijvoorbeeld om loopbaaninzichten, en de focusmodus 'Loopbaaninzichten' wordt automatisch geactiveerd om je door het proces te leiden. En natuurlijk: dit is pas het begin. Er zullen nog veel meer Focusmodi worden toegevoegd en de kwaliteit van de bestaande modi zal de komende weken verder worden verbeterd. Neem gerust een kijkje bij de [Focusmodi in de OpenMates Apps](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nieuwe modellen
    
    OpenMates heeft een brede selectie van de meest efficiënte en best presterende AI-modellen die er zijn. Standaard selecteert het automatisch de juiste op basis van de taak. Maar je kunt dit gedrag altijd permanent overschrijven [in de AI-instellingen](https://openmates.org/#settings/ai), of op verzoek door een specifiek model in het berichtveld te noemen via `@{modelname}`. Je kunt nu kiezen uit een breed scala aan AI-modellen, bijvoorbeeld:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` en `@fast` model-aliassen — typ `@best` om automatisch naar het sterkste model te routeren, `@fast` om het snelste model te gebruiken dat beschikbaar is op OpenMates.
    
    ## 6. 💡 Dagelijkse inspiratie & Wikipedia-links
    
    AI kan, mits goed gebruikt, een geweldig hulpmiddel zijn om te leren. En OpenMates is geoptimaliseerd om mensen aan te moedigen om te leren, te ontdekken en geïnspireerd te raken. Daarvoor is de Dagelijkse inspiratie bedoeld, die je bovenaan de interface ziet nadat je bent ingelogd. Ze tonen interessante nieuwe video's — en binnenkort ook andere inhoud zoals Wikipedia-artikelen, nieuwe OpenMates-functies, foto's en details van kunstwerken, belangrijke historische gebeurtenissen en meer. Dagelijkse inspiraties zijn afgestemd op jouw chats en vervolgens op jouw apparaat vergrendeld met een sleutel die alleen jij hebt — zodat ze privé blijven voor jou.
    Daarnaast markeert OpenMates ook automatisch Wikipedia-artikelen in de antwoorden van assistent-berichten. Dit maakt het super eenvoudig om meer over een onderwerp te leren door simpelweg op het oranje gemarkeerde woord met het studie-icoontje ernaast te klikken.
    
    # 🚀 Wat volgt
    
    In de komende weken zal ik verschillende korte clips plaatsen waarin de vele functies van OpenMates worden getoond en de nuttige dingen die je ermee kunt doen, evenals het verder verbeteren van de software en het toevoegen van meer apps, providers en functies.
    
    Vanaf nu is mijn plan om om de paar weken nieuwsbrieven te sturen voor aankondigingen en updates, en afzonderlijk ook tips en trucs over het gebruik van OpenMates. [Controleer gerust op elk gewenst moment je nieuwsbriefinstellingen](https://openmates.org/#settings/newsletter) als je meer of minder nieuwsbrieven wilt ontvangen.
    
    Veel plezier met het gebruik van OpenMates, en houd ons in de gaten voor meer updates!
    
