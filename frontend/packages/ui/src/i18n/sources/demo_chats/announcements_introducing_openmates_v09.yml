    # ✨ Lo más destacado de los últimos meses
    
    ## 1. 🧩 Nuevas apps y habilidades de apps
    
    Además de las capacidades existentes de búsqueda en la web, lectura y análisis de sitios web, y lectura de transcripciones de vídeos de YouTube para iniciar debates, OpenMates ha incorporado muchas apps y habilidades nuevas. Aquí tienes algunos aspectos destacados:
    
    - 🏥 **[Salud](#settings/apps/health/skills/search_appointments):** ¿Buscas citas médicas? La app de Salud ahora puede consultar Doctolib y Jameda para ver huecos disponibles.
    - 🏠 **[Vivienda](#settings/apps/home/skills/search):** Busca pisos en ImmoScout24, WG-Gesucht y Kleinanzeigen, con los detalles clave visibles directamente en OpenMates.
    - 🎉 **[Eventos](#settings/apps/events/skills/search):** Busca y filtra eventos en Meetup, Luma, Resident Advisor y Google, con detalles como descripciones, imágenes, cuándo y dónde son los eventos, y enlaces directos para confirmar asistencia o unirse.
    - ✈️ **[Viajes](#settings/apps/travel):** La nueva habilidad "[Buscar conexión](#settings/apps/travel/skills/search_connections)" te permite buscar vuelos a través de Google, en múltiples conexiones en varios días simultáneamente, incluyendo detalles completos del vuelo y enlaces de reserva. Próximamente habrá soporte para conexiones de tren. Y la habilidad "[Calendario de precios](#settings/apps/travel/skills/price_calendar)" te muestra un resumen rápido de la evolución de los precios a lo largo de un mes.
    - ⏰ **[Recordatorios](#settings/apps/reminder):** Crea un recordatorio para un chat para volver a él más tarde, o incluso haz que OpenMates busque y resuma las últimas noticias diarias sobre un tema determinado, por ejemplo.
    - 🖼️ **[Imágenes](#settings/apps/images):** [Busca](#settings/apps/images/skills/search) imágenes en la web, [genera](#settings/apps/images/skills/generate) imágenes y [gráficos vectoriales](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf):** Sube archivos PDF y haz preguntas sobre el texto o incluso sobre el diseño visual: ¡OpenMates puede leer y ver PDFs! 
    - 💻 **[Código](#settings/apps/code):** OpenMates puede [buscar la documentación más reciente](#settings/apps/code/skills/get_docs) para responder preguntas relacionadas con la programación, luego escribir código e incluso permitirte previsualizar diseños de sitios web y código directamente en el navegador. Y esto es solo el principio de sus capacidades de programación.
    - 🧮 **[Matemáticas](#settings/apps/math):** Calcula expresiones e incluso visualiza gráficos, todo dentro de OpenMates.
    - 📝 **[Documentos](#settings/apps/docs):** Pide que se generen documentos de Word y descárgalos como archivos .docx.
    - 📊 **[Hojas de cálculo](#settings/apps/sheets):** OpenMates también puede crear tablas y permitirte descargarlas como archivos .xlsx. Tanto Documentos como Hojas de cálculo mejorarán y serán más potentes en las próximas semanas.
    - 📧 **[Correo](#settings/apps/mail):** OpenMates puede redactar borradores de correos electrónicos por ti, que luego puedes abrir y enviar fácilmente a través de tu programa de correo predeterminado en tu dispositivo.
    - 🎙️ **[Audio](#settings/apps/audio):** ¿No quieres escribir? Graba y envía un mensaje de voz a OpenMates directamente desde el campo de mensaje.
    
    Y se han añadido aún más habilidades de apps. Solo tienes que [echar un vistazo y explorar las Apps de OpenMates](#settings/apps).
    
    ## 2. 🔒 Marcadores de datos personales
    
    A diferencia de los chatbots de IA de las grandes tecnológicas y las startups típicas, OpenMates está diseñado con tu privacidad como prioridad principal. Y ya contaba con varias protecciones de privacidad:
    - 🔐 todos tus chats se cifran y descifran solo en tu dispositivo
    - 🖼️ todas las imágenes externas se cargan a través de nuestro servidor de OpenMates (para que los sitios web externos no vean tu dirección IP ni la información de tu dispositivo)
    - 📉 no se utiliza Google Analytics ni ningún otro software de análisis en OpenMates (por eso tampoco ves un banner de cookies en OpenMates)
    
    Novedad: los datos sensibles como direcciones de correo electrónico, números de teléfono, claves API y más se detectan automáticamente y se reemplazan por marcadores de posición en tu dispositivo cuando redactas y envías un mensaje a OpenMates. Siempre puedes volver al valor original en la interfaz de usuario y puedes hacer clic en los datos detectados para evitar el reemplazo. Pero, por defecto, esta función garantiza que ni OpenMates ni los proveedores de IA que procesan tus mensajes vean nunca los datos sensibles en primer lugar.
    
    [Pruébalo tú mismo](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.): haz clic en este enlace para ver los Marcadores de datos personales en acción: tu correo electrónico y número de teléfono se detectarán automáticamente y se reemplazarán antes de enviarse a la IA.
    
    ## 3. 🧠 Recuerdos
    
    OpenMates ahora puede recordar datos específicos de las apps, como tus próximos viajes o detalles de proyectos. PERO: todos los recuerdos se cifran y descifran solo en tu dispositivo, y solo se comparten temporalmente con el servidor de OpenMates y el proveedor de IA si lo confirmas explícitamente para el chat en cuestión. Esto te permite aprovechar al máximo las respuestas personalizadas sin tener que repetir constantemente los detalles de tu proyecto, manteniendo el control total sobre qué datos compartes, cuándo y con qué proveedor de IA. Consulta los [Recuerdos en las Apps de OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Modos de enfoque
    
    Saber dar las instrucciones adecuadas a un chatbot de IA marca una gran diferencia en cuanto a lo útil que será el chatbot y la calidad de las respuestas. Con los Modos de enfoque, no necesitas ser un experto en ingeniería de prompts para aprovechar al máximo unas instrucciones excelentes y específicas. Solo tienes que pedirle a OpenMates perspectivas profesionales, por ejemplo, y el modo de enfoque "Perspectivas profesionales" debería activarse automáticamente para guiarte en el proceso. Y, por supuesto, esto es solo el principio. Se añadirán muchos más Modos de enfoque y la calidad de los existentes seguirá mejorando en las próximas semanas. No dudes en consultar los [Modos de enfoque en las Apps de OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nuevos modelos
    
    OpenMates tiene una amplia selección de los modelos de IA más eficientes y con mejor rendimiento que existen. Por defecto, selecciona automáticamente el adecuado en función de la tarea. Pero siempre puedes anular este comportamiento en los [ajustes de IA](#settings/ai) de forma permanente, o bajo demanda mencionando un modelo específico en el campo de mensaje mediante `@{nombre_del_modelo}`. Ahora puedes seleccionar entre una amplia gama de modelos de IA, por ejemplo:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) y [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) y [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Alias de modelos `@best` y `@fast`: escribe `@best` para dirigirte automáticamente al modelo más potente, o `@fast` para usar el modelo más rápido disponible en OpenMates.
    
    ## 6. 💡 Inspiraciones diarias y enlaces de Wikipedia
    
    La IA, si se usa correctamente, puede ser una herramienta increíble para el aprendizaje. Y OpenMates está optimizado para animar a la gente a aprender, explorar e inspirarse. Para eso sirven las Inspiraciones diarias, que ves en la parte superior de la interfaz tras iniciar sesión. Muestran nuevos vídeos interesantes y, pronto, también otros contenidos como artículos de Wikipedia, nuevas funciones de OpenMates, fotos y detalles de obras de arte, eventos históricos importantes y más. Las Inspiraciones diarias se adaptan a tus chats y luego se bloquean en tu dispositivo con una clave que solo tú tienes, por lo que siguen siendo privadas para ti.
    Además, OpenMates también resalta automáticamente los artículos de Wikipedia en las respuestas de los mensajes del asistente. Esto hace que sea muy fácil aprender más sobre un tema con solo hacer clic en la palabra resaltada en naranja con el icono de estudio al lado.
    
    # 🚀 Qué viene ahora
    
    En las próximas semanas publicaré varios clips cortos mostrando las numerosas funciones de OpenMates y las cosas útiles que se pueden hacer con él, además de seguir mejorando el software y añadiendo más apps, proveedores y funciones.
    
    A partir de ahora, mi plan es enviar correos electrónicos del boletín para anuncios y actualizaciones cada pocas semanas y, por separado, también consejos y trucos sobre cómo usar OpenMates. No dudes en [consultar tus ajustes del boletín en cualquier momento](#settings/newsletter) si quieres recibir más o menos correos electrónicos.
    
    ¡Diviértete usando OpenMates y mantente al tanto de más actualizaciones!
