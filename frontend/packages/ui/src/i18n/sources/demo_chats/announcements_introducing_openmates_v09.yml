    Je n'ai pas oublié OpenMates — bien au contraire. 
    
    # 🙏 Quelques mots de remerciement pour commencer
    
    Fin décembre, dans le cadre du Chaos Communication Congress, on m'a contre toute attente demandé une interview pour la chaîne de télévision allemande ZDF [(un reportage traitant de l'importance des alternatives axées sur la confidentialité face aux géants de l'IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Et wow, quelle expérience. Bien qu'OpenMates ait été un peu moins abouti à l'époque, les premiers utilisateurs ont commencé à s'inscrire et à l'utiliser — et ont aussi trouvé des bugs et des cas limites que je n'avais pas rencontrés lors de mes propres tests, et les ont heureusement signalés. Un grand merci à tous ceux qui l'ont fait — cela a vraiment aidé à rendre OpenMates plus soigné, plus stable et plus complet ! Et bien sûr, tu es le bienvenu pour continuer à signaler tout problème si tu remarques quelque chose d'anormal ou de cassé sur OpenMates.
    
    Bien que ce ne soit pas le premier logiciel que je crée, c'était la première fois que plus d'une poignée de personnes commençaient à utiliser un outil que j'ai construit — plus de 180 utilisateurs actifs utilisent OpenMates à ce jour ! C'est super excitant et, je l'avoue, c'était aussi un peu impressionnant au début.
    
    Depuis, je me suis concentré entièrement sur l'amélioration et le débogage d'OpenMates, pour le rendre plus complet et plus fluide — et j'ai apporté énormément de modifications au code. Des corrections de bugs, de nouvelles fonctionnalités, une interface utilisateur améliorée et bien d'autres optimisations. 
    
    Et aujourd'hui, je suis heureux de te donner des nouvelles avec les changements les plus excitants de ces derniers mois ! Garde à l'esprit que parler de tous les changements serait trop long pour une seule newsletter — je vais donc me concentrer sur les points forts et publier également plusieurs courtes vidéos sur diverses fonctionnalités d'OpenMates dans les semaines à venir, sur :
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Les points forts des derniers mois
    
    ## 1. 🧩 Nouvelles applications et compétences
    
    En plus des capacités existantes de recherche sur le web, de lecture et d'analyse de sites web, et de lecture de transcriptions de vidéos YouTube pour lancer des discussions — OpenMates s'est enrichi de nombreuses nouvelles applications et compétences. Voici quelques points forts :
    
    - 🏥 **[Santé](#settings/apps/health/skills/search_appointments) :** Tu cherches un rendez-vous chez le médecin ? L'application Santé peut désormais consulter Doctolib et Jameda pour trouver des créneaux disponibles.
    - 🏠 **[Logement](#settings/apps/home/skills/search) :** Recherche des appartements sur ImmoScout24, WG-Gesucht et Kleinanzeigen — avec les détails clés directement visibles sur OpenMates.
    - 🎉 **[Événements](#settings/apps/events/skills/search) :** Recherche et filtre des événements sur Meetup, Luma, Resident Advisor et Google — avec des détails comme les descriptions, les images, les dates et lieux, et des liens directs pour confirmer ta participation ou les rejoindre.
    - ✈️ **[Voyage](#settings/apps/travel) :** La nouvelle compétence « [Rechercher une liaison](#settings/apps/travel/skills/search_connections) » te permet de rechercher des vols via Google, sur plusieurs liaisons et différents jours simultanément — avec tous les détails du vol et les liens de réservation. Le support pour les liaisons ferroviaires suivra. Et la compétence « [Calendrier des prix](#settings/apps/travel/skills/price_calendar) » te donne un aperçu rapide de l'évolution des prix sur un mois.
    - ⏰ **[Rappels](#settings/apps/reminder) :** Crée un rappel pour une discussion afin d'y revenir plus tard — ou demande même à OpenMates de rechercher et de résumer les dernières actualités quotidiennes sur un sujet donné, par exemple.
    - 🖼️ **[Images](#settings/apps/images) :** [Recherche](#settings/apps/images/skills/search) des images sur le web, [génère](#settings/apps/images/skills/generate) des images et des [graphiques vectoriels](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf) :** Télécharge des PDF et pose des questions sur le texte ou même sur la mise en page visuelle — OpenMates peut à la fois lire et voir les PDF ! 
    - 💻 **[Code](#settings/apps/code) :** OpenMates peut [rechercher la documentation la plus récente](#settings/apps/code/skills/get_docs) pour répondre à des questions liées au code, puis écrire du code — et même te permettre de prévisualiser des designs de sites web et du code directement dans le navigateur ! Et ce n'est que le tout début de ses capacités en programmation.
    - 🧮 **[Maths](#settings/apps/math) :** Calcule des expressions et visualise même des graphiques, le tout au sein d'OpenMates.
    - 📝 **[Docs](#settings/apps/docs) :** Demande la génération de documents Word — et télécharge-les en fichiers .docx.
    - 📊 **[Tableurs](#settings/apps/sheets) :** OpenMates peut également créer des tableaux et te permettre de les télécharger en fichiers .xlsx. Les applications Docs et Tableurs deviendront encore plus puissantes dans les semaines à venir.
    - 📧 **[E-mail](#settings/apps/mail) :** OpenMates peut rédiger des brouillons d'e-mails pour toi, que tu peux ensuite facilement ouvrir et envoyer via ton programme de messagerie par défaut sur ton appareil.
    - 🎙️ **[Audio](#settings/apps/audio) :** Pas envie de taper ? Enregistre et envoie un message vocal à OpenMates, directement depuis le champ de message.
    
    Et encore plus de compétences d'application ont été ajoutées. Viens [découvrir et explorer les applications OpenMates](#settings/apps).
    
    ## 2. 🔒 Espaces réservés pour les données personnelles
    
    Contrairement aux chatbots IA des géants de la tech et des startups classiques, OpenMates est conçu avec ta vie privée comme priorité absolue. Diverses protections étaient déjà en place :
    - 🔐 toutes tes discussions sont chiffrées et déchiffrées uniquement sur ton appareil
    - 🖼️ toutes les images externes sont chargées via notre serveur OpenMates (ainsi, les sites externes ne voient pas ton adresse IP ou les informations de ton appareil)
    - 📉 aucun logiciel d'analyse comme Google Analytics n'est utilisé sur OpenMates (c'est aussi pourquoi tu ne vois pas de bandeau de cookies sur OpenMates)
    
    Nouveauté : les données sensibles comme les adresses e-mail, les numéros de téléphone, les clés API et plus encore sont automatiquement détectées et remplacées par des espaces réservés sur ton appareil, lorsque tu rédiges et envoies un message à OpenMates. Tu peux toujours revenir à la valeur d'origine dans l'interface utilisateur, et tu peux cliquer sur les données détectées pour empêcher le remplacement. Mais par défaut, cette fonctionnalité garantit que ni OpenMates ni les fournisseurs d'IA qui traitent tes messages ne verront jamais ces données sensibles.
    
    [Essaie par toi-même](#message=R%C3%A9dige%20un%20e-mail%20de%20marco.rossi%40gmail.com%20%C3%A0%20hausverwaltung%40immobilien-weber.de%20pour%20demander%20o%C3%B9%20en%20est%20la%20r%C3%A9paration%20du%20chauffage%20en%20panne%20dans%20mon%20appartement.%20La%20r%C3%A9paration%20a%20%C3%A9t%C3%A9%20signal%C3%A9e%20le%2028%20mars%20et%20mon%20num%C3%A9ro%20de%20t%C3%A9l%C3%A9phone%20est%20le%20%2B49%20170%209876543.%20Sois%20poli%20mais%20ferme%20%E2%80%94%20cela%20fait%20presque%203%20semaines.) — clique sur ce lien pour voir les espaces réservés pour les données personnelles en action : ton e-mail et ton numéro de téléphone seront auto-détectés et remplacés avant d'être envoyés à l'IA.
    
    ## 3. 🧠 Souvenirs
    
    OpenMates peut désormais mémoriser des souvenirs spécifiques aux applications, comme tes prochains voyages ou des détails de projets. MAIS : tous les souvenirs sont chiffrés et déchiffrés uniquement sur ton appareil, et ne sont partagés temporairement avec le serveur OpenMates et le fournisseur d'IA que si tu le confirmes explicitement pour la discussion donnée. Cela te permet de profiter pleinement de réponses personnalisées sans répéter constamment les détails de tes projets — tout en gardant le contrôle total sur les données que tu partages, quand et avec quel fournisseur d'IA. Découvre les [Souvenirs dans les applications OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Modes Focus
    
    Savoir donner les bonnes instructions à un chatbot IA fait une énorme différence sur son utilité et la qualité des réponses. Avec les Modes Focus, pas besoin d'être un expert en ingénierie de prompt pour profiter d'instructions ciblées et efficaces. Demande par exemple à OpenMates des conseils de carrière, et le mode focus « Perspectives de carrière » devrait s'activer automatiquement pour te guider. Et bien sûr : ce n'est que le début. De nombreux autres Modes Focus seront ajoutés, et la qualité des modes existants sera encore améliorée dans les semaines à venir. N'hésite pas à consulter les [Modes Focus dans les applications OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nouveaux modèles
    
    OpenMates propose une large sélection des modèles d'IA les plus efficaces et performants du marché. Par défaut, il sélectionne automatiquement le bon modèle en fonction de la tâche. Mais tu peux toujours modifier ce comportement [dans les paramètres d'IA](#settings/ai) de façon permanente, ou à la demande en mentionnant un modèle spécifique dans le champ de message via `@{modelname}`. Tu peux désormais choisir parmi une vaste gamme de modèles d'IA, par exemple :
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Les alias de modèles `@best` et `@fast` — tape `@best` pour utiliser automatiquement le modèle le plus puissant, ou `@fast` pour le modèle le plus rapide disponible sur OpenMates.
    
    ## 6. 💡 Inspirations quotidiennes & liens Wikipédia
    
    L'IA, bien utilisée, peut être un outil d'apprentissage incroyable. Et OpenMates est optimisé pour encourager les gens à apprendre, à explorer et à s'inspirer. C'est le but des Inspirations quotidiennes, que tu vois en haut de l'interface après t'être connecté. Elles présentent de nouvelles vidéos intéressantes — et bientôt d'autres contenus comme des articles Wikipédia, de nouvelles fonctionnalités OpenMates, des photos et détails d'œuvres d'art, des événements historiques importants et plus encore. Les Inspirations quotidiennes sont adaptées à tes discussions, puis verrouillées sur ton appareil avec une clé que tu es le seul à posséder — elles restent donc privées.
    De plus, OpenMates surligne automatiquement les articles Wikipédia dans les réponses de l'assistant. Il est ainsi très facile d'en savoir plus sur un sujet en cliquant simplement sur le mot surligné en orange avec l'icône d'étude à côté.
    
    # 🚀 La suite
    
    Dans les semaines à venir, je publierai divers courts clips montrant les nombreuses fonctionnalités d'OpenMates et les choses utiles que l'on peut faire avec, tout en continuant à améliorer le logiciel et à ajouter de nouvelles applications, fournisseurs et fonctionnalités.
    
    Désormais, mon plan est d'envoyer des e-mails pour les annonces et mises à jour toutes les quelques semaines, et séparément des conseils et astuces sur l'utilisation d'OpenMates. N'hésite pas à [consulter tes paramètres de newsletter à tout moment](#settings/newsletter), si tu souhaites recevoir plus ou moins d'e-mails.
    
    Amuse-toi bien sur OpenMates, et reste à l'écoute pour les prochaines mises à jour !
