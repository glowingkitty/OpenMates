    नमस्ते,
    यहाँ मार्को (उर्फ [glowingkitty](https://github.com/glowingkitty)) हूँ — OpenMates का निर्माता।
    मैं OpenMates को भूला नहीं हूँ — बल्कि इसके बिल्कुल उलट है। 
    
    [video]
    
    # 🙏 सबसे पहले धन्यवाद के कुछ शब्द
    
    दिसंबर के अंत में, कैओस कम्युनिकेशन कांग्रेस (Chaos Communication Congress) के दौरान, मुझसे अचानक जर्मन टीवी चैनल ZDF पर एक इंटरव्यू के लिए पूछा गया [(एक रिपोर्ट जिसमें बड़ी टेक एआई कंपनियों के प्राइवेसी-केंद्रित विकल्पों के महत्व पर चर्चा की गई थी)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html)। और सच में, वह क्या अनुभव था। उस समय OpenMates शुरुआती दौर में और थोड़ा कच्चा होने के बावजूद, पहले लोगों ने साइन अप करना और इसका उपयोग करना शुरू कर दिया — और उन बग्स और असामान्य स्थितियों (edge cases) को भी ढूँढा जो मुझे अपने डिवाइस पर टेस्टिंग के दौरान नहीं मिले थे, और शुक्र है कि उन्होंने इसकी रिपोर्ट की। ऐसा करने वाले सभी लोगों को बहुत-बहुत धन्यवाद — इसने OpenMates को और अधिक बेहतर, स्थिर और पूर्ण बनाने में वास्तव में बहुत मदद की! और निश्चित रूप से, यदि तुम्हें OpenMates पर कुछ भी गलत या टूटा हुआ महसूस होता है, तो तुम बेझिझक समस्याओं की रिपोर्ट करना जारी रख सकते हो।
    
    हालाँकि यह मेरा बनाया हुआ पहला सॉफ्टवेयर नहीं था, लेकिन यह पहली बार था जब मुट्ठी भर से अधिक लोगों ने मेरे बनाए सॉफ्टवेयर का उपयोग करना शुरू किया — अब तक 180 से अधिक सक्रिय उपयोगकर्ता OpenMates का उपयोग कर रहे हैं! यह बहुत रोमांचक रहा है, और सच कहूँ तो शुरू में थोड़ा भारी भी लगा।
    
    तब से, मैंने पूरी तरह से OpenMates को बेहतर बनाने और बग्स को ठीक करने, और इसे और अधिक फीचर-कंप्लीट और बेहतर बनाने पर ध्यान केंद्रित किया है — और कोड में बहुत सारे बदलाव किए हैं। बग फिक्स, नई सुविधाएँ, एक बेहतर यूजर इंटरफेस और कई अन्य सुधार। 
    
    और आज, मुझे पिछले कुछ महीनों के सबसे रोमांचक बदलावों के साथ तुम्हें अपडेट देते हुए खुशी हो रही है! ध्यान रखें, सभी बदलावों के बारे में बात करना एक न्यूज़लेटर के लिए बहुत अधिक होगा — इसलिए इसके बजाय मैं मुख्य बातों पर ध्यान केंद्रित करूँगा और आने वाले हफ्तों में OpenMates की विभिन्न विशेषताओं के बारे में कई छोटे वीडियो भी प्रकाशित करूँगा:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ पिछले महीनों की मुख्य बातें
    
    ## 1. 🧩 नए ऐप्स और ऐप स्किल्स
    
    वेब पर खोजने, वेबसाइटों को पढ़ने और उनका विश्लेषण करने, और चर्चा शुरू करने के लिए यूट्यूब वीडियो के ट्रांसक्रिप्ट पढ़ने की मौजूदा क्षमताओं के अलावा — OpenMates को बहुत सारे नए ऐप्स और ऐप स्किल्स मिले हैं। यहाँ कुछ मुख्य बातें दी गई हैं:
    
    - 🏥 **[Health](https://openmates.org/#settings/apps/health/skills/search_appointments):** डॉक्टर के अपॉइंटमेंट ढूँढ रहे हो? हेल्थ ऐप अब उपलब्ध स्लॉट के लिए Doctolib और Jameda को चेक कर सकता है।
    - 🏠 **[Home](https://openmates.org/#settings/apps/home/skills/search):** ImmoScout24, WG-Gesucht और Kleinanzeigen पर अपार्टमेंट खोजें — मुख्य विवरण सीधे OpenMates पर दिखाई देंगे।
    - 🎉 **[Events](https://openmates.org/#settings/apps/events/skills/search):** Meetup, Luma, Resident Advisor और Google पर इवेंट्स खोजें और फ़िल्टर करें — विवरण जैसे कि डिस्क्रिप्शन, इमेज, इवेंट कब और कहाँ है, और RSVP करने या उनमें शामिल होने के लिए सीधे लिंक के साथ।
    - ✈️ **[Travel](https://openmates.org/#settings/apps/travel):** नया '[Search connection](https://openmates.org/#settings/apps/travel/skills/search_connections)' स्किल तुम्हें Google के माध्यम से फ्लाइट्स खोजने की सुविधा देता है, विभिन्न दिनों में एक साथ कई कनेक्शनों पर — जिसमें पूरी फ्लाइट डिटेल्स और बुकिंग लिंक शामिल हैं। ट्रेन कनेक्शन के लिए सपोर्ट जल्द ही आएगा। और '[Price calendar](https://openmates.org/#settings/apps/travel/skills/price_calendar)' स्किल तुम्हें एक महीने के दौरान कीमतों के उतार-चढ़ाव का त्वरित अवलोकन दिखाता है।
    - ⏰ **[Reminders](https://openmates.org/#settings/apps/reminder):** किसी चैट के लिए रिमाइंडर बनाएँ ताकि बाद में उस पर वापस आ सकें — या उदाहरण के लिए, किसी दिए गए विषय के लिए नवीनतम दैनिक समाचार खोजने और सारांशित करने के लिए OpenMates को ट्रिगर करें।
    - 🖼️ **[Images](https://openmates.org/#settings/apps/images):** वेब पर इमेज [खोजें](https://openmates.org/#settings/apps/images/skills/search), इमेज [जनरेट](https://openmates.org/#settings/apps/images/skills/generate) करें और [वेक्टर ग्राफिक्स](https://openmates.org/#settings/apps/images/skills/vectorize) बनाएँ।
    - 📄 **[PDFs](https://openmates.org/#settings/apps/pdf):** PDF अपलोड करें और टेक्स्ट या विजुअल लेआउट के बारे में सवाल पूछें — OpenMates PDF को पढ़ और देख दोनों सकता है! 
    - 💻 **[Code](https://openmates.org/#settings/apps/code):** कोडिंग से संबंधित सवालों के जवाब देने के लिए OpenMates [नवीनतम डॉक्स खोज सकता है](https://openmates.org/#settings/apps/code/skills/get_docs), फिर कोड लिख सकता है — और यहाँ तक कि तुम्हें सीधे ब्राउज़र में वेबसाइट डिज़ाइन और कोड का प्रीव्यू भी देखने देता है! और यह इसकी कोडिंग क्षमताओं की केवल शुरुआती शुरुआत है।
    - 🧮 **[Math](https://openmates.org/#settings/apps/math):** एक्सप्रेशन की गणना करें और यहाँ तक कि प्लॉट्स को विजुअलाइज करें, सब कुछ OpenMates के भीतर।
    - 📝 **[Docs](https://openmates.org/#settings/apps/docs):** वर्ड डॉक्यूमेंट जनरेट करने के लिए कहें — और उन्हें .docx फ़ाइलों के रूप में डाउनलोड करें।
    - 📊 **[Sheets](https://openmates.org/#settings/apps/sheets):** OpenMates टेबल भी बना सकता है और तुम्हें उन्हें .xlsx फ़ाइलों के रूप में डाउनलोड करने देता है। और आने वाले हफ्तों में डॉक्स और शीट्स दोनों और भी बेहतर और शक्तिशाली हो जाएंगे।
    - 📧 **[Mail](https://openmates.org/#settings/apps/mail):** OpenMates तुम्हारे लिए ईमेल ड्राफ्ट कर सकता है, जिसे तुम फिर अपने डिवाइस पर अपने डिफॉल्ट ईमेल प्रोग्राम के माध्यम से आसानी से खोल और भेज सकते हो।
    - 🎙️ **[Audio](https://openmates.org/#settings/apps/audio):** टाइप नहीं करना चाहते? सीधे मैसेज फील्ड से OpenMates को वॉयस मैसेज रिकॉर्ड करें और भेजें।
    
    और भी कई ऐप स्किल्स जोड़े गए हैं। बस [OpenMates ऐप्स को देखें और एक्सप्लोर करें](https://openmates.org/#settings/apps)।
    
    ## 2. 🔒 पर्सनल डेटा प्लेसहोल्डर्स (Personal Data Placeholders)
    
    बड़ी टेक कंपनियों और सामान्य स्टार्टअप्स के एआई चैटबॉट्स के विपरीत, OpenMates को तुम्हारी प्राइवेसी को मुख्य प्राथमिकता के रूप में रखकर डिज़ाइन किया गया है। और इसमें पहले से ही विभिन्न प्राइवेसी सुरक्षा उपाय मौजूद थे:
    - 🔐 तुम्हारी सभी चैट केवल तुम्हारे डिवाइस पर एन्क्रिप्ट और डिक्रिप्ट की जाती हैं
    - 🖼️ सभी बाहरी इमेज हमारे OpenMates सर्वर के माध्यम से लोड की जाती हैं (ताकि बाहरी वेबसाइटें तुम्हारा आईपी एड्रेस या डिवाइस की जानकारी न देख सकें)
    - 📉 OpenMates पर Google Analytics या किसी अन्य एनालिटिक्स सॉफ्टवेयर का उपयोग नहीं किया जाता है (यही कारण है कि तुम्हें OpenMates पर कुकी बैनर नहीं दिखता है)
    
    नया क्या है: जब तुम OpenMates को मैसेज ड्राफ्ट करते और भेजते हो, तो ईमेल एड्रेस, फोन नंबर, एपीआई की (API keys) और बहुत कुछ जैसे संवेदनशील डेटा का स्वचालित रूप से पता लगाया जाता है और तुम्हारे डिवाइस पर प्लेसहोल्डर्स के साथ बदल दिया जाता है। तुम यूजर इंटरफेस में हमेशा मूल वैल्यू पर वापस जा सकते हो, और तुम रिप्लेसमेंट को रोकने के लिए डिटेक्ट किए गए डेटा पर क्लिक कर सकते हो। लेकिन डिफॉल्ट रूप से, यह सुविधा सुनिश्चित करती है कि न तो OpenMates और न ही एआई प्रदाता जो तुम्हारे मैसेज को प्रोसेस करते हैं, कभी भी संवेदनशील डेटा को देख पाएंगे।
    
    [इसे खुद आज़माएँ](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — पर्सनल डेटा प्लेसहोल्डर्स को काम करते हुए देखने के लिए इस लिंक पर क्लिक करें: एआई को भेजे जाने से पहले तुम्हारा ईमेल और फोन नंबर ऑटो-डिटेक्ट हो जाएगा और बदल दिया जाएगा।
    
    ## 3. 🧠 मेमोरीज़ (Memories)
    
    OpenMates अब ऐप-विशिष्ट यादें रख सकता है, जैसे तुम्हारी आने वाली यात्राएं या प्रोजेक्ट विवरण। लेकिन: सभी यादें केवल तुम्हारे डिवाइस पर एन्क्रिप्ट और डिक्रिप्ट की जाती हैं, और केवल तभी OpenMates सर्वर और एआई प्रदाता के साथ अस्थायी रूप से साझा की जाती हैं जब तुम स्पष्ट रूप से दी गई चैट के लिए इसकी पुष्टि करते हो। यह तुम्हें अपने प्रोजेक्ट विवरणों को बार-बार दोहराए बिना व्यक्तिगत प्रतिक्रियाओं का पूरा उपयोग करने देता है — जबकि तुम पूरी तरह से नियंत्रण में रहते हो कि तुम कौन सा डेटा, कब और किस एआई प्रदाता के साथ साझा करते हो। [OpenMates ऐप्स में मेमोरीज़](https://openmates.org/#settings/apps/all/memories) देखें।
    
    ## 4. 🎯 फोकस मोड्स (Focus Modes)
    
    एआई चैटबॉट को सही निर्देश देना कैसे है, यह जानने से इस बात में बहुत बड़ा अंतर आता है कि चैटबॉट कितना मददगार होगा और प्रतिक्रियाओं की गुणवत्ता क्या होगी। फोकस मोड्स के साथ, तुम्हें बेहतरीन, लक्षित निर्देशों का पूरा उपयोग करने के लिए प्रॉम्प्ट इंजीनियरिंग में विशेषज्ञ होने की आवश्यकता नहीं है। उदाहरण के लिए, बस OpenMates से करियर अंतर्दृष्टि (career insights) मांगें, और प्रक्रिया के माध्यम से तुम्हारा मार्गदर्शन करने के लिए 'करियर इनसाइट्स' फोकस मोड स्वचालित रूप से सक्रिय हो जाना चाहिए। और निश्चित रूप से: यह केवल शुरुआत है। आने वाले हफ्तों में और भी बहुत सारे फोकस मोड्स जोड़े जाएंगे, और मौजूदा मोड्स की गुणवत्ता में और सुधार किया जाएगा। बेझिझक [OpenMates ऐप्स में फोकस मोड्स](https://openmates.org/#settings/apps/all/focus-modes) देखें।
    
    ## 5. 🤖 नए मॉडल्स
    
    OpenMates के पास सबसे कुशल और बेहतरीन प्रदर्शन करने वाले एआई मॉडल्स का विस्तृत चयन है। डिफॉल्ट रूप से, यह कार्य के आधार पर सही मॉडल को ऑटो-सेलेक्ट करता है। लेकिन तुम हमेशा इस व्यवहार को [एआई सेटिंग्स में](https://openmates.org/#settings/ai) स्थायी रूप से बदल सकते हो, या मैसेज फील्ड में `@{modelname}` के माध्यम से किसी विशिष्ट मॉडल का उल्लेख करके मांग पर बदल सकते हो। अब तुम एआई मॉडल्स की एक विस्तृत श्रृंखला से चुन सकते हो, उदाहरण के लिए:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) और [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) और [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` और `@fast` मॉडल एलियास — सबसे मजबूत मॉडल पर ऑटो-रूट करने के लिए `@best` टाइप करें, OpenMates पर उपलब्ध सबसे तेज़ मॉडल का उपयोग करने के लिए `@fast` टाइप करें।
    
    ## 6. 💡 डेली इंस्पिरेशन और विकिपीडिया लिंक
    
    एआई, यदि ठीक से उपयोग किया जाए, तो सीखने के लिए एक अद्भुत उपकरण हो सकता है। और OpenMates लोगों को सीखने, एक्सप्लोर करने और प्रेरित होने के लिए प्रोत्साहित करने के लिए अनुकूलित है। डेली इंस्पिरेशन (Daily Inspirations) इसी के लिए हैं, जिन्हें तुम लॉग इन करने के बाद इंटरफेस के शीर्ष पर देखते हो। वे दिलचस्प नए वीडियो दिखाते हैं — और जल्द ही अन्य सामग्री जैसे विकिपीडिया लेख, नई OpenMates सुविधाएँ, कला के नमूनों की तस्वीरें और विवरण, महत्वपूर्ण ऐतिहासिक घटनाएं और बहुत कुछ। डेली इंस्पिरेशन तुम्हारी चैट के अनुसार तैयार की जाती हैं, फिर तुम्हारे डिवाइस पर एक ऐसी की (key) के साथ लॉक कर दी जाती हैं जो केवल तुम्हारे पास होती है — इसलिए वे तुम्हारे लिए निजी रहती हैं।
    इसके अलावा, OpenMates असिस्टेंट मैसेज की प्रतिक्रियाओं में विकिपीडिया लेखों को ऑटो-हाइलाइट भी कर रहा है। जिससे किसी विषय के बारे में अधिक जानना बहुत आसान हो जाता है, बस उसके बगल में स्टडी आइकन वाले नारंगी रंग के हाइलाइट किए गए शब्द पर क्लिक करके।
    
    # 🚀 आगे क्या होगा
    
    आने वाले हफ्तों में मैं OpenMates की कई विशेषताओं और इसके साथ की जा सकने वाली उपयोगी चीजों को दिखाते हुए विभिन्न छोटे क्लिप पोस्ट करूँगा, साथ ही सॉफ्टवेयर में और सुधार करूँगा और अधिक ऐप्स, प्रदाता और सुविधाएँ जोड़ूँगा।
    
    अब से मेरी योजना हर कुछ हफ्तों में घोषणाओं और अपडेट के लिए न्यूज़लेटर ईमेल भेजने की है, और अलग से OpenMates का उपयोग करने के तरीके पर टिप्स और ट्रिक्स भी भेजने की है। यदि तुम अधिक या कम न्यूज़लेटर ईमेल प्राप्त करना चाहते हो, तो बेझिझक [किसी भी समय अपनी न्यूज़लेटर सेटिंग्स चेक करें](https://openmates.org/#settings/newsletter)।
    
    OpenMates का उपयोग करने का आनंद लें, और अधिक अपडेट के लिए बने रहें!
    
