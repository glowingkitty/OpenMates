    # 🙏 ขอขอบคุณสักเล็กน้อยก่อนนะครับ
    
    เมื่อช่วงปลายเดือนธันวาคม ในงาน Chaos Communication Congress ผมได้รับคำขอสัมภาษณ์จากช่องโทรทัศน์ ZDF ของเยอรมนีอย่างไม่คาดคิด [(รายงานเกี่ยวกับความสำคัญของทางเลือก AI ที่เน้นความเป็นส่วนตัวแทนที่บริษัทเทคโนโลยียักษ์ใหญ่)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html) และว้าว เป็นประสบการณ์ที่ยอดเยี่ยมมากครับ แม้ว่าในตอนนั้น OpenMates จะยังมีจุดที่ต้องปรับปรุงอยู่บ้าง แต่ผู้ใช้กลุ่มแรกๆ ก็เริ่มลงทะเบียนและใช้งานกันแล้ว — แถมยังช่วยหาบั๊กและกรณีการใช้งานแปลกๆ ที่ผมไม่เคยเจอตอนทดสอบบนอุปกรณ์ของตัวเอง และแจ้งรายงานเข้ามา ขอบคุณทุกคนมากจริงๆ ครับ สิ่งนี้ช่วยให้ OpenMates สมบูรณ์แบบขึ้น เสถียรขึ้น และครบครันยิ่งขึ้น! และแน่นอนว่าคุณสามารถรายงานปัญหาเข้ามาได้เสมอหากพบสิ่งผิดปกติหรือจุดที่ใช้งานไม่ได้บน OpenMates
    
    แม้ว่านี่จะไม่ใช่ซอฟต์แวร์ตัวแรกที่ผมสร้างขึ้น แต่นี่เป็นครั้งแรกที่มีคนมากกว่าหยิบมือเริ่มใช้งานซอฟต์แวร์ที่ผมสร้าง — ตอนนี้มีผู้ใช้ที่ใช้งานอยู่กว่า 180 คนแล้ว! ซึ่งเป็นเรื่องที่น่าตื่นเต้นมาก และยอมรับเลยว่าช่วงแรกก็แอบรู้สึกรับมือไม่ทันอยู่เหมือนกันครับ
    
    ตั้งแต่นั้นมา ผมจึงทุ่มเทให้กับการปรับปรุงและแก้ไขบั๊กของ OpenMates รวมถึงทำให้ฟีเจอร์ต่างๆ ครบถ้วนและขัดเกลาให้ดียิ่งขึ้น — ผมได้เปลี่ยนแปลงโค้ดไปเยอะมาก ทั้งการแก้บั๊ก, ฟีเจอร์ใหม่, ส่วนติดต่อผู้ใช้ (UI) ที่ดีขึ้น และการปรับปรุงอื่นๆ อีกมากมาย
    
    และวันนี้ ผมยินดีที่จะอัปเดตการเปลี่ยนแปลงที่น่าตื่นเต้นที่สุดในช่วงไม่กี่เดือนที่ผ่านมาให้คุณทราบครับ! โปรดจำไว้ว่า การพูดถึงการเปลี่ยนแปลงทั้งหมดในจดหมายข่าวฉบับเดียวอาจจะยาวเกินไป — ดังนั้นผมจะเน้นไปที่ไฮไลท์สำคัญ และจะทยอยเผยแพร่วิดีโอสั้นๆ เกี่ยวกับฟีเจอร์ต่างๆ ของ OpenMates ในสัปดาห์ต่อๆ ไปทาง:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates)
    
    # ✨ ไฮไลท์เด่นในช่วงไม่กี่เดือนที่ผ่านมา
    
    ## 1. 🧩 แอปใหม่และทักษะของแอป (App skills)
    
    นอกเหนือจากความสามารถเดิมที่มีอยู่ เช่น การค้นหาเว็บ, การอ่านและวิเคราะห์เว็บไซต์ และการอ่านสคริปต์วิดีโอ YouTube เพื่อเริ่มการสนทนา — OpenMates ยังมีแอปใหม่และทักษะของแอปเพิ่มขึ้นอีกมากมาย นี่คือไฮไลท์บางส่วนครับ:
    
    - 🏥 **[สุขภาพ (Health)](https://openmates.org/#settings/apps/health/skills/search_appointments):** กำลังมองหาคิวนัดหมายแพทย์อยู่ใช่ไหม? แอปสุขภาพสามารถตรวจสอบคิวว่างจาก Doctolib และ Jameda ได้แล้ว
    - 🏠 **[บ้าน (Home)](https://openmates.org/#settings/apps/home/skills/search):** ค้นหาอพาร์ตเมนต์ใน ImmoScout24, WG-Gesucht และ Kleinanzeigen — พร้อมรายละเอียดสำคัญที่แสดงให้เห็นโดยตรงบน OpenMates
    - 🎉 **[กิจกรรม (Events)](https://openmates.org/#settings/apps/events/skills/search):** ค้นหาและกรองกิจกรรมบน Meetup, Luma, Resident Advisor และ Google — พร้อมรายละเอียด เช่น คำอธิบาย, รูปภาพ, วันเวลาและสถานที่จัดงาน และลิงก์โดยตรงเพื่อตอบรับคำเชิญหรือเข้าร่วม
    - ✈️ **[การเดินทาง (Travel)](https://openmates.org/#settings/apps/travel):** ทักษะใหม่ '[ค้นหาการเชื่อมต่อ (Search connection)](https://openmates.org/#settings/apps/travel/skills/search_connections)' ช่วยให้คุณค้นหาเที่ยวบินผ่าน Google จากการเชื่อมต่อหลายรายการในหลายวันพร้อมกัน — รวมถึงรายละเอียดเที่ยวบินฉบับเต็มและลิงก์การจอง ส่วนการรองรับการเชื่อมต่อรถไฟจะตามมาในภายหลัง และทักษะ '[ปฏิทินราคา (Price calendar)](https://openmates.org/#settings/apps/travel/skills/price_calendar)' จะแสดงภาพรวมการเปลี่ยนแปลงของราคาตลอดทั้งเดือนให้คุณเห็นอย่างรวดเร็ว
    - ⏰ **[การแจ้งเตือน (Reminders)](https://openmates.org/#settings/apps/reminder):** สร้างการแจ้งเตือนสำหรับการแชทเพื่อกลับมาดูภายหลัง — หรือแม้แต่ตั้งค่าให้ OpenMates ค้นหาและสรุปข่าวรายวันล่าสุดในหัวข้อที่กำหนด เป็นต้น
    - 🖼️ **[รูปภาพ (Images)](https://openmates.org/#settings/apps/images):** [ค้นหา](https://openmates.org/#settings/apps/images/skills/search) รูปภาพบนเว็บ, [สร้าง](https://openmates.org/#settings/apps/images/skills/generate) รูปภาพ และ [กราฟิกเวกเตอร์](https://openmates.org/#settings/apps/images/skills/vectorize)
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** อัปโหลด PDF และถามคำถามเกี่ยวกับข้อความหรือแม้แต่เลย์เอาต์ที่มองเห็น — OpenMates สามารถทั้งอ่านและดู PDF ได้!
    - 💻 **[โค้ด (Code)](https://openmates.org/#settings/apps/code):** OpenMates สามารถ [ค้นหาเอกสารล่าสุด](https://openmates.org/#settings/apps/code/skills/get_docs) เพื่อตอบคำถามเกี่ยวกับการเขียนโค้ด จากนั้นเขียนโค้ด — และยังให้คุณดูตัวอย่างการออกแบบเว็บไซต์และโค้ดได้โดยตรงในเบราว์เซอร์! และนี่เป็นเพียงจุดเริ่มต้นของความสามารถด้านการเขียนโค้ดเท่านั้น
    - 🧮 **[คณิตศาสตร์ (Math)](https://openmates.org/#settings/apps/math):** คำนวณนิพจน์และแสดงภาพพล็อต ทั้งหมดนี้ทำได้ภายใน OpenMates
    - 📝 **[เอกสาร (Docs)](https://openmates.org/#settings/apps/docs):** สั่งให้สร้างเอกสาร Word — และดาวน์โหลดเป็นไฟล์ .docx
    - 📊 **[ชีต (Sheets)](https://openmates.org/#settings/apps/sheets):** OpenMates ยังสามารถสร้างตารางและให้คุณดาวน์โหลดเป็นไฟล์ .xlsx ได้ด้วย ทั้ง Docs และ Sheets จะเก่งขึ้นและทรงพลังยิ่งขึ้นในสัปดาห์ต่อๆ ไป
    - 📧 **[เมล (Mail)](https://openmates.org/#settings/apps/mail):** OpenMates สามารถร่างอีเมลให้คุณ ซึ่งคุณสามารถเปิดและส่งผ่านโปรแกรมอีเมลเริ่มต้นบนอุปกรณ์ของคุณได้อย่างง่ายดาย
    - 🎙️ **[เสียง (Audio)](https://openmates.org/#settings/apps/audio):** ไม่อยากพิมพ์ใช่ไหม? บันทึกและส่งข้อความเสียงถึง OpenMates ได้โดยตรงจากช่องข้อความ
    
    และยังมีทักษะของแอปอื่นๆ อีกมากมายที่เพิ่มเข้ามา ลอง [เข้าไปสำรวจ OpenMates Apps ได้เลยครับ](https://openmates.org/#settings/apps)
    
    ## 2. 🔒 ตัวแทนข้อมูลส่วนบุคคล (Personal Data Placeholders)
    
    ไม่เหมือนกับ AI แชทบอทจากบริษัทเทคโนโลยียักษ์ใหญ่และสตาร์ทอัพทั่วไป OpenMates ถูกออกแบบโดยให้ความเป็นส่วนตัวของคุณเป็นลำดับความสำคัญสูงสุด และเรามีมาตรการคุ้มครองความเป็นส่วนตัวอยู่แล้วหลายประการ:
    - 🔐 แชททั้งหมดของคุณจะถูกเข้ารหัสและถอดรหัสบนอุปกรณ์ของคุณเท่านั้น
    - 🖼️ รูปภาพภายนอกทั้งหมดจะถูกโหลดผ่านเซิร์ฟเวอร์ OpenMates ของเรา (ดังนั้นเว็บไซต์ภายนอกจะไม่เห็นที่อยู่ IP หรือข้อมูลอุปกรณ์ของคุณ)
    - 📉 ไม่มีการใช้ Google Analytics หรือซอฟต์แวร์วิเคราะห์อื่นๆ บน OpenMates (นั่นคือสาเหตุที่คุณไม่เห็นแบนเนอร์คุกกี้บน OpenMates)
    
    สิ่งใหม่ที่เพิ่มเข้ามา: ข้อมูลที่ละเอียดอ่อน เช่น ที่อยู่อีเมล, หมายเลขโทรศัพท์, คีย์ API และอื่นๆ จะถูกตรวจพบโดยอัตโนมัติและแทนที่ด้วย "ตัวแทน (Placeholders)" บนอุปกรณ์ของคุณ เมื่อคุณร่างและส่งข้อความถึง OpenMates คุณสามารถสลับกลับไปเป็นค่าเดิมได้เสมอในหน้าจอผู้ใช้ และคุณสามารถคลิกที่ข้อมูลที่ตรวจพบเพื่อป้องกันการแทนที่ได้ แต่โดยค่าเริ่มต้น ฟีเจอร์นี้จะช่วยให้มั่นใจว่าทั้ง OpenMates และผู้ให้บริการ AI ที่ประมวลผลข้อความของคุณจะไม่เห็นข้อมูลที่ละเอียดอ่อนตั้งแต่แรก
    
    [ลองด้วยตัวเองสิครับ](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — คลิกที่ลิงก์นี้เพื่อดูการทำงานของตัวแทนข้อมูลส่วนบุคคล: อีเมลและหมายเลขโทรศัพท์ของคุณจะถูกตรวจพบโดยอัตโนมัติและแทนที่ก่อนที่จะถูกส่งไปยัง AI
    
    ## 3. 🧠 ความทรงจำ (Memories)
    
    ตอนนี้ OpenMates สามารถจดจำความทรงจำเฉพาะแอปได้แล้ว เช่น ทริปที่กำลังจะมาถึงหรือรายละเอียดโปรเจกต์ แต่: ความทรงจำทั้งหมดจะถูกเข้ารหัสและถอดรหัสบนอุปกรณ์ของคุณเท่านั้น และจะถูกแชร์ชั่วคราวกับเซิร์ฟเวอร์ OpenMates และผู้ให้บริการ AI ก็ต่อเมื่อคุณยืนยันอย่างชัดเจนสำหรับการแชทนั้นๆ เท่านั้น สิ่งนี้ช่วยให้คุณใช้ประโยชน์จากการตอบกลับที่ปรับให้เหมาะกับคุณได้อย่างเต็มที่โดยไม่ต้องพูดซ้ำรายละเอียดโปรเจกต์เดิมๆ — ในขณะที่ยังคงควบคุมได้อย่างเต็มที่ว่าคุณจะแชร์ข้อมูลใด เมื่อไหร่ และกับผู้ให้บริการ AI รายใด ลองดู [ความทรงจำใน OpenMates Apps](https://openmates.org/#settings/apps/all/memories)
    
    ## 4. 🎯 โหมดโฟกัส (Focus Modes)
    
    การรู้วิธีให้คำแนะนำที่ถูกต้องแก่ AI แชทบอทนั้นสร้างความแตกต่างอย่างมากในแง่ของความช่วยเหลือและคุณภาพของการตอบกลับ ด้วยโหมดโฟกัส คุณไม่จำเป็นต้องเป็นผู้เชี่ยวชาญด้านการเขียนพรอมต์ (Prompt Engineering) เพื่อใช้ประโยชน์จากคำแนะนำที่ตรงจุดและยอดเยี่ยม เพียงแค่ถาม OpenMates เกี่ยวกับข้อมูลเชิงลึกด้านอาชีพ โหมดโฟกัส 'Career insights' ก็จะถูกเปิดใช้งานโดยอัตโนมัติเพื่อนำทางคุณตลอดกระบวนการ และแน่นอนว่านี่เป็นเพียงจุดเริ่มต้นเท่านั้น จะมีการเพิ่มโหมดโฟกัสอีกมากมาย และคุณภาพของโหมดที่มีอยู่จะได้รับการปรับปรุงให้ดียิ่งขึ้นในสัปดาห์ต่อๆ ไป ลองดู [โหมดโฟกัสใน OpenMates Apps](https://openmates.org/#settings/apps/all/focus-modes)
    
    ## 5. 🤖 โมเดลใหม่ๆ
    
    OpenMates มีโมเดล AI ที่มีประสิทธิภาพสูงสุดและทำงานได้ดีที่สุดให้เลือกมากมาย โดยค่าเริ่มต้น ระบบจะเลือกโมเดลที่เหมาะสมตามงานโดยอัตโนมัติ แต่คุณสามารถเปลี่ยนการตั้งค่านี้ได้เสมอ [ในการตั้งค่า AI](https://openmates.org/#settings/ai) แบบถาวร หรือเลือกใช้ตามต้องการโดยระบุชื่อโมเดลในช่องข้อความผ่าน `@{modelname}` ตอนนี้คุณสามารถเลือกจากโมเดล AI ที่หลากหลาย เช่น:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) และ [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) และ [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - นามแฝงโมเดล `@best` และ `@fast` — พิมพ์ `@best` เพื่อเลือกโมเดลที่แข็งแกร่งที่สุดโดยอัตโนมัติ หรือ `@fast` เพื่อใช้โมเดลที่เร็วที่สุดที่มีบน OpenMates
    
    ## 6. 💡 แรงบันดาลใจรายวัน (Daily Inspirations) และลิงก์ Wikipedia
    
    หากใช้อย่างเหมาะสม AI สามารถเป็นเครื่องมือที่ยอดเยี่ยมสำหรับการเรียนรู้ และ OpenMates ได้รับการปรับแต่งเพื่อส่งเสริมให้ผู้คนเรียนรู้ สำรวจ และรับแรงบันดาลใจ นั่นคือที่มาของแรงบันดาลใจรายวัน ซึ่งคุณจะเห็นที่ด้านบนของหน้าจอหลังจากเข้าสู่ระบบ โดยจะแสดงวิดีโอใหม่ๆ ที่น่าสนใจ — และในเร็วๆ นี้จะมีเนื้อหาอื่นๆ เช่น บทความ Wikipedia, ฟีเจอร์ใหม่ของ OpenMates, ภาพถ่ายและรายละเอียดของงานศิลปะ, เหตุการณ์สำคัญทางประวัติศาสตร์ และอื่นๆ แรงบันดาลใจรายวันจะถูกปรับให้เหมาะกับการแชทของคุณ จากนั้นจะถูกล็อคไว้บนอุปกรณ์ของคุณด้วยกุญแจที่มีเพียงคุณเท่านั้นที่มี — ดังนั้นข้อมูลเหล่านี้จึงเป็นส่วนตัวสำหรับคุณ
    นอกจากนี้ OpenMates ยังไฮไลท์บทความ Wikipedia โดยอัตโนมัติในการตอบกลับของข้อความผู้ช่วย ซึ่งช่วยให้เรียนรู้เพิ่มเติมเกี่ยวกับหัวข้อต่างๆ ได้ง่ายมาก เพียงแค่คลิกที่คำที่ไฮไลท์สีส้มพร้อมไอคอนรูปการศึกษาข้างๆ
    
    # 🚀 สิ่งที่จะเกิดขึ้นต่อไป
    
    ในสัปดาห์ต่อๆ ไป ผมจะโพสต์คลิปสั้นๆ หลายคลิปเพื่อแสดงฟีเจอร์ต่างๆ ของ OpenMates และสิ่งที่มีประโยชน์ที่สามารถทำได้ รวมถึงปรับปรุงซอฟต์แวร์เพิ่มเติมและเพิ่มแอป, ผู้ให้บริการ และฟีเจอร์ใหม่ๆ
    
    จากนี้ไป ผมวางแผนที่จะส่งอีเมลจดหมายข่าวเพื่อประกาศและอัปเดตทุกๆ สองสามสัปดาห์ และจะแยกส่งเคล็ดลับและเทคนิคในการใช้งาน OpenMates ด้วย คุณสามารถ [ตรวจสอบการตั้งค่าจดหมายข่าวได้ตลอดเวลา](https://openmates.org/#settings/newsletter) หากคุณต้องการรับอีเมลจดหมายข่าวมากขึ้นหรือน้อยลง
    
    ขอให้สนุกกับการใช้งาน OpenMates และคอยติดตามอัปเดตใหม่ๆ นะครับ!
    
