    Halo,
    Di sini Marco (alias [glowingkitty](https://github.com/glowingkitty)) — pencipta OpenMates.
    Aku tidak melupakan OpenMates — justru sebaliknya. 
    
    # 🙏 Sepatah kata terima kasih terlebih dahulu
    
    Pada akhir Desember, dalam konteks Chaos Communication Congress, aku secara tak terduga diminta untuk wawancara di saluran TV Jerman ZDF [(sebuah laporan yang membahas pentingnya alternatif yang berfokus pada privasi dibandingkan perusahaan AI teknologi besar)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Dan wah, sungguh sebuah pengalaman. Meskipun OpenMates saat itu masih memiliki banyak kekurangan, orang-orang pertama mulai mendaftar dan menggunakannya — dan juga menemukan bug serta kasus-kasus langka yang tidak aku alami selama pengujian di perangkatku sendiri, dan untungnya mereka melaporkannya. Terima kasih banyak kepada semua orang yang telah melakukannya — itu sangat membantu dalam membuat OpenMates lebih terpoles, lebih stabil, dan lebih lengkap! Dan tentu saja kamu sangat dipersilakan untuk terus melaporkan masalah jika kamu melihat ada sesuatu yang terasa salah atau rusak di OpenMates.
    
    Meskipun ini bukan perangkat lunak pertama yang aku buat, ini adalah pertama kalinya lebih dari segelintir orang mulai menggunakan perangkat lunak yang aku bangun — sejauh ini sudah lebih dari 180 pengguna aktif yang menggunakan OpenMates! Hal ini sangat menyenangkan, dan harus diakui pada awalnya juga sedikit membuat kewalahan.
    
    Sejak saat itu, aku fokus sepenuhnya pada peningkatan dan perbaikan bug OpenMates, serta menjadikannya lebih lengkap fiturnya dan lebih halus — dan melakukan banyak perubahan pada kode. Perbaikan bug, fitur baru, antarmuka pengguna yang ditingkatkan, dan banyak lagi peningkatan lainnya. 
    
    Dan hari ini, aku senang bisa memberimu pembaruan dengan perubahan paling menarik dari beberapa bulan terakhir! Ingatlah, membicarakan semua perubahan akan terlalu banyak untuk satu buletin — jadi aku akan fokus pada sorotan utamanya dan juga mempublikasikan beberapa video pendek tentang berbagai fitur di OpenMates dalam minggu-minggu mendatang, di:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Sorotan utama beberapa bulan terakhir
    
    ## 1. 🧩 Aplikasi & keahlian aplikasi baru
    
    Selain kemampuan yang sudah ada untuk mencari di web, membaca & menganalisis situs web, dan membaca transkrip video YouTube untuk memulai diskusi — OpenMates mendapatkan banyak aplikasi dan keahlian aplikasi baru. Berikut adalah beberapa sorotannya:
    
    - 🏥 **[Kesehatan](#settings/apps/health/skills/search_appointments):** Mencari janji temu dokter? Aplikasi Kesehatan sekarang dapat memeriksa Doctolib dan Jameda untuk slot yang tersedia.
    - 🏠 **[Rumah](#settings/apps/home/skills/search):** Cari apartemen di ImmoScout24, WG-Gesucht, dan Kleinanzeigen — dengan detail utama yang langsung terlihat di OpenMates.
    - 🎉 **[Acara](#settings/apps/events/skills/search):** Cari & filter acara di Meetup, Luma, Resident Advisor, dan Google — dengan detail seperti deskripsi, gambar, kapan dan di mana acara tersebut, serta tautan langsung untuk RSVP atau bergabung.
    - ✈️ **[Perjalanan](#settings/apps/travel):** Keahlian baru '[Cari koneksi](#settings/apps/travel/skills/search_connections)' memungkinkanmu mencari penerbangan melalui Google, di berbagai koneksi pada berbagai hari secara bersamaan — termasuk detail penerbangan lengkap dan tautan pemesanan. Dukungan untuk koneksi kereta api akan menyusul. Dan keahlian '[Kalender harga](#settings/apps/travel/skills/price_calendar)' menunjukkan ringkasan cepat perkembangan harga selama sebulan.
    - ⏰ **[Pengingat](#settings/apps/reminder):** Buat pengingat untuk sebuah chat agar bisa kembali lagi nanti — atau bahkan memicu OpenMates untuk mencari & merangkum berita harian terbaru untuk topik tertentu, misalnya.
    - 🖼️ **[Gambar](#settings/apps/images):** [Cari](#settings/apps/images/skills/search) gambar di web, [buat](#settings/apps/images/skills/generate) gambar dan [grafis vektor](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf):** Unggah PDF dan ajukan pertanyaan tentang teks atau bahkan tata letak visualnya — OpenMates dapat membaca sekaligus melihat PDF! 
    - 💻 **[Kode](#settings/apps/code):** OpenMates dapat [mencari dokumentasi terbaru](#settings/apps/code/skills/get_docs) untuk menjawab pertanyaan terkait pemrograman, lalu menulis kode — dan bahkan membiarkanmu melihat pratinjau desain situs web dan kode langsung di browser! Dan ini hanyalah awal dari kemampuan pemrogramannya.
    - 🧮 **[Matematika](#settings/apps/math):** Hitung ekspresi dan bahkan visualisasikan plot, semuanya di dalam OpenMates.
    - 📝 **[Dokumen](#settings/apps/docs):** Minta dokumen Word untuk dibuat — dan unduh sebagai file .docx.
    - 📊 **[Lembar Kerja](#settings/apps/sheets):** OpenMates juga dapat membuat tabel dan membiarkanmu mengunduhnya sebagai file .xlsx. Baik Dokumen maupun Lembar Kerja akan menjadi lebih baik dan lebih kuat dalam minggu-minggu mendatang.
    - 📧 **[Email](#settings/apps/mail):** OpenMates dapat membuat draf email untukmu, yang kemudian dapat kamu buka & kirim dengan mudah melalui program email default di perangkatmu.
    - 🎙️ **[Audio](#settings/apps/audio):** Tidak ingin mengetik? Rekam dan kirim pesan suara ke OpenMates, langsung dari kolom pesan.
    
    Dan masih banyak lagi keahlian aplikasi yang telah ditambahkan. Silakan [lihat & jelajahi Aplikasi OpenMates](#settings/apps).
    
    ## 2. 🔒 Placeholder Data Pribadi
    
    Berbeda dengan chatbot AI dari perusahaan teknologi besar dan startup pada umumnya, OpenMates dirancang dengan privasi sebagai prioritas utama. Dan OpenMates sudah memiliki berbagai perlindungan privasi:
    - 🔐 semua chat kamu dienkripsi & didekripsi hanya di perangkatmu
    - 🖼️ semua gambar eksternal dimuat melalui server OpenMates kami (sehingga situs web eksternal tidak melihat alamat IP atau informasi perangkatmu)
    - 📉 tidak ada Google Analytics atau perangkat lunak analitik lainnya yang digunakan di OpenMates (itulah sebabnya kamu tidak melihat spanduk cookie di OpenMates)
    
    Yang baru: data sensitif seperti alamat email, nomor telepon, kunci API, dan lainnya secara otomatis dideteksi dan diganti dengan placeholder di perangkatmu, saat kamu membuat draf dan mengirim pesan ke OpenMates. Kamu selalu dapat beralih kembali ke nilai asli di antarmuka pengguna, dan kamu dapat mengeklik data yang terdeteksi untuk mencegah penggantian. Namun secara default, fitur ini memastikan bahwa baik OpenMates maupun penyedia AI yang memproses pesanmu tidak akan pernah melihat data sensitif tersebut sejak awal.
    
    [Coba sendiri](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — klik tautan ini untuk melihat Placeholder Data Pribadi beraksi: email dan nomor teleponmu akan terdeteksi secara otomatis dan diganti sebelum dikirim ke AI.
    
    ## 3. 🧠 Memori
    
    OpenMates sekarang dapat mengingat memori spesifik aplikasi, seperti perjalananmu yang akan datang atau detail proyek. TAPI: semua memori tersebut dienkripsi & didekripsi hanya di perangkatmu, dan hanya dibagikan sementara dengan server OpenMates dan penyedia AI jika kamu mengonfirmasinya secara eksplisit untuk chat tersebut. Ini memungkinkanmu memanfaatkan sepenuhnya respons yang dipersonalisasi tanpa terus-menerus mengulangi detail proyekmu — sambil tetap memegang kendali penuh atas data apa yang kamu bagikan, kapan, dan dengan penyedia AI mana. Lihat [Memori di Aplikasi OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Mode Fokus
    
    Mengetahui cara memberikan instruksi yang tepat kepada chatbot AI memberikan perbedaan besar dalam hal seberapa membantu chatbot tersebut dan kualitas responsnya. Dengan Mode Fokus, kamu tidak perlu menjadi ahli dalam rekayasa prompt untuk memanfaatkan instruksi yang hebat dan terarah. Cukup tanya OpenMates tentang wawasan karier, misalnya, dan mode fokus 'Wawasan karier' akan otomatis aktif untuk memandumu melalui proses tersebut. Dan tentu saja: ini hanyalah permulaan. Lebih banyak Mode Fokus akan ditambahkan, dan kualitas yang sudah ada akan terus ditingkatkan dalam minggu-minggu mendatang. Jangan ragu untuk melihat [Mode Fokus di Aplikasi OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Model baru
    
    OpenMates memiliki berbagai pilihan model AI yang paling efisien dan berkinerja terbaik di luar sana. Secara default, ia memilih model yang tepat secara otomatis berdasarkan tugasnya. Namun kamu selalu dapat mengubah perilaku ini [di pengaturan AI](#settings/ai) secara permanen, atau sesuai permintaan dengan menyebutkan model tertentu di kolom pesan melalui `@{modelname}`. Kamu sekarang dapat memilih dari berbagai model AI, misalnya:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Alias model `@best` dan `@fast` — ketik `@best` untuk merutekan otomatis ke model terkuat, `@fast` untuk menggunakan model tercepat yang tersedia di OpenMates.
    
    ## 6. 💡 Inspirasi Harian & tautan Wikipedia
    
    AI, jika digunakan dengan benar, dapat menjadi alat yang luar biasa untuk belajar. Dan OpenMates dioptimalkan untuk mendorong orang belajar, menjelajah, dan mendapatkan inspirasi. Itulah gunanya Inspirasi Harian, yang kamu lihat di bagian atas antarmuka setelah masuk. Mereka menampilkan video baru yang menarik — dan segera juga konten lain seperti artikel Wikipedia, fitur baru OpenMates, foto dan detail karya seni, peristiwa sejarah penting, dan banyak lagi. Inspirasi Harian disesuaikan dengan chat kamu, lalu dikunci di perangkatmu dengan kunci yang hanya kamu miliki — sehingga tetap pribadi bagimu.
    Selain itu, OpenMates juga secara otomatis menyoroti artikel Wikipedia dalam respons pesan asisten. Hal ini memudahkanmu untuk mempelajari lebih lanjut tentang suatu topik hanya dengan mengeklik kata yang disorot oranye dengan ikon studi di sampingnya.
    
    # 🚀 Apa selanjutnya
    
    Dalam minggu-minggu mendatang aku akan memposting berbagai klip pendek yang menunjukkan banyak fitur OpenMates dan hal-hal berguna yang dapat dilakukan dengannya, serta terus meningkatkan perangkat lunak dan menambahkan lebih banyak aplikasi, penyedia, dan fitur.
    
    Mulai sekarang rencanaku adalah mengirim email buletin untuk pengumuman & pembaruan setiap beberapa minggu, dan secara terpisah juga tips & trik tentang cara menggunakan OpenMates. Jangan ragu untuk [memeriksa pengaturan buletinmu kapan saja](#settings/newsletter), jika kamu ingin menerima lebih banyak atau lebih sedikit email buletin.
    
    Selamat menggunakan OpenMates, dan nantikan pembaruan lainnya!
