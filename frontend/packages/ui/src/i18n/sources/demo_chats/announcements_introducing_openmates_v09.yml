    # 🙏 먼저 감사의 말씀을 전합니다
    
    지난 12월 말, Chaos Communication Congress 행사 중에 예상치 못하게 독일 TV 채널 ZDF로부터 인터뷰 요청을 받았습니다. [(빅테크 AI 기업에 대한 개인정보 보호 중심 대안의 중요성을 다룬 리포트)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). 정말 놀라운 경험이었습니다. 당시 OpenMates는 다소 미흡한 점이 많았음에도 불구하고, 첫 사용자들이 가입하여 사용하기 시작했습니다. 제가 개인 기기에서 테스트할 때는 발견하지 못했던 버그와 예외 상황들을 찾아내어 감사하게도 제보해 주셨습니다. 도움을 주신 모든 분께 진심으로 감사드립니다. 덕분에 OpenMates를 더욱 정교하고 안정적이며 완성도 있게 만드는 데 큰 도움이 되었습니다! 물론 앞으로도 OpenMates를 사용하시면서 이상하거나 고장 난 부분이 있다면 언제든지 제보해 주세요.
    
    이전에도 소프트웨어를 만든 적은 있지만, 제가 만든 소프트웨어를 대중이 사용하기 시작한 것은 이번이 처음입니다. 현재까지 180명이 넘는 활성 사용자가 OpenMates를 사용하고 있습니다! 정말 흥분되는 일이었고, 솔직히 처음에는 조금 벅차기도 했습니다.
    
    그 이후로 저는 OpenMates의 개선과 디버깅, 그리고 기능을 완성하고 다듬는 데 전념하며 코드에 수많은 변화를 주었습니다. 버그 수정, 새로운 기능, 개선된 사용자 인터페이스 등 수많은 개선이 이루어졌습니다.
    
    그리고 오늘, 지난 몇 달간의 가장 흥미로운 변화들을 업데이트해 드리게 되어 기쁩니다! 모든 변화를 다루기에는 뉴스레터 한 통으로는 부족하기에, 주요 하이라이트에 집중하고 앞으로 몇 주 동안 다음 채널을 통해 다양한 기능에 대한 짧은 영상들을 게시할 예정입니다:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ 지난 몇 달간의 주요 하이라이트
    
    ## 1. 🧩 새로운 앱 및 앱 기술
    
    웹 검색, 웹사이트 읽기 및 분석, 토론을 위한 YouTube 동영상 스크립트 읽기 등 기존 기능 외에도 OpenMates에 많은 새로운 앱과 앱 기술이 추가되었습니다. 주요 내용은 다음과 같습니다:
    
    - 🏥 **[건강(Health)](https://openmates.org/#settings/apps/health/skills/search_appointments):** 병원 예약을 찾고 계신가요? 이제 건강 앱이 Doctolib과 Jameda에서 예약 가능한 시간대를 확인할 수 있습니다.
    - 🏠 **[주거(Home)](https://openmates.org/#settings/apps/home/skills/search):** ImmoScout24, WG-Gesucht, Kleinanzeigen에서 아파트를 검색하세요. 주요 세부 정보를 OpenMates에서 바로 확인할 수 있습니다.
    - 🎉 **[이벤트(Events)](https://openmates.org/#settings/apps/events/skills/search):** Meetup, Luma, Resident Advisor, Google에서 이벤트를 검색하고 필터링하세요. 설명, 이미지, 일시 및 장소와 같은 세부 정보와 함께 참가 신청(RSVP) 또는 참여를 위한 직접 링크를 제공합니다.
    - ✈️ **[여행(Travel)](https://openmates.org/#settings/apps/travel):** 새로운 '[연결편 검색(Search connection)](https://openmates.org/#settings/apps/travel/skills/search_connections)' 기술을 사용하면 Google을 통해 여러 날짜의 다양한 연결편을 동시에 검색할 수 있습니다. 전체 비행 세부 정보와 예약 링크가 포함됩니다. 기차 연결편 지원도 곧 추가될 예정입니다. 또한 '[가격 캘린더(Price calendar)](https://openmates.org/#settings/apps/travel/skills/price_calendar)' 기술은 한 달 동안의 가격 변동 추이를 한눈에 보여줍니다.
    - ⏰ **[알림(Reminders)](https://openmates.org/#settings/apps/reminder):** 나중에 다시 확인하고 싶은 채팅에 대한 알림을 생성하세요. 또는 특정 주제에 대한 최신 일일 뉴스를 검색하고 요약하도록 OpenMates를 설정할 수도 있습니다.
    - 🖼️ **[이미지(Images)](https://openmates.org/#settings/apps/images):** 웹에서 이미지를 [검색](https://openmates.org/#settings/apps/images/skills/search)하고, 이미지를 [생성](https://openmates.org/#settings/apps/images/skills/generate)하며, [벡터 그래픽](https://openmates.org/#settings/apps/images/skills/vectorize)을 만듭니다.
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** PDF를 업로드하고 텍스트나 시각적 레이아웃에 대해 질문하세요. OpenMates는 PDF를 읽고 볼 수 있습니다! 
    - 💻 **[코드(Code)](https://openmates.org/#settings/apps/code):** OpenMates는 코딩 관련 질문에 답하기 위해 [최신 문서를 검색](https://openmates.org/#settings/apps/code/skills/get_docs)하고, 코드를 작성하며, 브라우저에서 직접 웹사이트 디자인과 코드를 미리 볼 수 있게 해줍니다! 이는 코딩 기능의 초기 단계일 뿐입니다.
    - 🧮 **[수학(Math)](https://openmates.org/#settings/apps/math):** 수식을 계산하고 플롯을 시각화하는 작업을 모두 OpenMates 내에서 수행하세요.
    - 📝 **[문서(Docs)](https://openmates.org/#settings/apps/docs):** Word 문서 생성을 요청하고 .docx 파일로 다운로드하세요.
    - 📊 **[시트(Sheets)](https://openmates.org/#settings/apps/sheets):** OpenMates는 표를 만들고 .xlsx 파일로 다운로드할 수 있게 해줍니다. 문서와 시트 기능은 앞으로 몇 주 동안 더욱 강력해질 예정입니다.
    - 📧 **[메일(Mail)](https://openmates.org/#settings/apps/mail):** OpenMates가 이메일 초안을 작성해 주면, 기기의 기본 이메일 프로그램을 통해 쉽게 열고 보낼 수 있습니다.
    - 🎙️ **[오디오(Audio)](https://openmates.org/#settings/apps/audio):** 타이핑하기 귀찮으신가요? 메시지 입력창에서 바로 OpenMates에 음성 메시지를 녹음해서 보내세요.
    
    이 외에도 더 많은 앱 기술이 추가되었습니다. [OpenMates 앱을 직접 확인하고 탐색해 보세요](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 개인 데이터 자리 표시자 (Personal Data Placeholders)
    
    빅테크 기업이나 일반적인 스타트업의 AI 챗봇과 달리, OpenMates는 사용자의 개인정보 보호를 최우선으로 설계되었습니다. 이미 다음과 같은 다양한 개인정보 보호 장치가 마련되어 있었습니다:
    - 🔐 모든 채팅은 사용자의 기기에서만 암호화 및 복호화됩니다.
    - 🖼️ 모든 외부 이미지는 OpenMates 서버를 통해 로드되므로 외부 웹사이트에서 사용자의 IP 주소나 기기 정보를 볼 수 없습니다.
    - 📉 OpenMates에서는 Google Analytics나 기타 분석 소프트웨어를 사용하지 않습니다(OpenMates에서 쿠키 배너가 보이지 않는 이유이기도 합니다).
    
    새로운 기능: OpenMates에 메시지를 작성하여 보낼 때 이메일 주소, 전화번호, API 키 등과 같은 민감한 데이터가 자동으로 감지되어 기기에서 자리 표시자(placeholder)로 대체됩니다. 사용자 인터페이스에서 언제든지 원래 값으로 되돌릴 수 있으며, 감지된 데이터를 클릭하여 대체를 방지할 수도 있습니다. 하지만 기본적으로 이 기능은 OpenMates나 메시지를 처리하는 AI 제공업체가 민감한 데이터를 아예 보지 못하도록 보장합니다.
    
    [직접 시도해 보세요](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — 이 링크를 클릭하여 개인 데이터 자리 표시자가 작동하는 모습을 확인하세요. 이메일과 전화번호가 자동으로 감지되어 AI로 전송되기 전에 대체됩니다.
    
    ## 3. 🧠 기억 (Memories)
    
    OpenMates는 이제 다가오는 여행이나 프로젝트 세부 정보와 같은 앱별 기억을 저장할 수 있습니다. 하지만 중요한 점은 모든 기억은 사용자의 기기에서만 암호화 및 복호화되며, 해당 채팅에 대해 명시적으로 확인한 경우에만 OpenMates 서버 및 AI 제공업체와 일시적으로 공유된다는 것입니다. 이를 통해 프로젝트 세부 정보를 계속 반복하지 않고도 개인화된 응답을 최대한 활용할 수 있으며, 어떤 데이터를 언제 어떤 AI 제공업체와 공유할지에 대해 완벽한 통제권을 유지할 수 있습니다. [OpenMates 앱의 기억(Memories)](https://openmates.org/#settings/apps/all/memories) 기능을 확인해 보세요.
    
    ## 4. 🎯 집중 모드 (Focus Modes)
    
    AI 챗봇에게 올바른 지침을 주는 방법을 아는 것은 챗봇의 유용성과 응답 품질에 큰 차이를 만듭니다. 집중 모드를 사용하면 프롬프트 엔지니어링 전문가가 아니어도 훌륭하고 타겟팅된 지침을 최대한 활용할 수 있습니다. 예를 들어 OpenMates에 커리어 인사이트를 요청하면 '커리어 인사이트' 집중 모드가 자동으로 활성화되어 과정을 안내합니다. 물론 이것은 시작일 뿐입니다. 앞으로 몇 주 동안 더 많은 집중 모드가 추가될 예정이며 기존 모드의 품질도 더욱 개선될 것입니다. [OpenMates 앱의 집중 모드(Focus Modes)](https://openmates.org/#settings/apps/all/focus-modes)를 자유롭게 확인해 보세요.
    
    ## 5. 🤖 새로운 모델
    
    OpenMates는 시중에서 가장 효율적이고 성능이 뛰어난 다양한 AI 모델을 제공합니다. 기본적으로 작업에 따라 적절한 모델을 자동으로 선택합니다. 하지만 [AI 설정](https://openmates.org/#settings/ai)에서 이 동작을 영구적으로 변경하거나, 메시지 입력창에서 `@{modelname}`을 통해 특정 모델을 언급하여 필요할 때마다 변경할 수 있습니다. 이제 다음과 같은 다양한 AI 모델 중에서 선택할 수 있습니다:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) 및 [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) 및 [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` 및 `@fast` 모델 별칭 — `@best`를 입력하면 가장 강력한 모델로, `@fast`를 입력하면 OpenMates에서 사용 가능한 가장 빠른 모델로 자동 연결됩니다.
    
    ## 6. 💡 일일 영감 (Daily Inspirations) 및 위키백과 링크
    
    AI는 올바르게 사용하면 학습을 위한 놀라운 도구가 될 수 있습니다. OpenMates는 사람들이 배우고, 탐구하고, 영감을 얻도록 장려하는 데 최적화되어 있습니다. 로그인 후 인터페이스 상단에 표시되는 '일일 영감'이 바로 그 역할을 합니다. 흥미로운 새 동영상을 보여주며, 곧 위키백과 문서, 새로운 OpenMates 기능, 예술 작품의 사진 및 세부 정보, 중요한 역사적 사건 등과 같은 다른 콘텐츠도 추가될 예정입니다. 일일 영감은 사용자의 채팅에 맞춰 조정된 후 사용자만이 가진 키로 기기에 잠금 처리되므로 비공개로 유지됩니다.
    또한 OpenMates는 어시스턴트 메시지의 응답에서 위키백과 문서를 자동으로 강조 표시합니다. 학습 아이콘이 있는 주황색 강조 단어를 클릭하기만 하면 해당 주제에 대해 아주 쉽게 더 자세히 알아볼 수 있습니다.
    
    # 🚀 향후 계획
    
    앞으로 몇 주 동안 OpenMates의 다양한 기능과 유용한 활용법을 보여주는 여러 짧은 클립을 게시할 예정이며, 소프트웨어를 지속적으로 개선하고 더 많은 앱, 제공업체 및 기능을 추가할 계획입니다.
    
    앞으로는 몇 주마다 공지 사항 및 업데이트를 위한 뉴스레터 이메일을 보내고, 이와 별도로 OpenMates 사용 팁과 요령도 보내드릴 계획입니다. 뉴스레터 수신 빈도를 조절하고 싶으시다면 언제든지 [뉴스레터 설정](https://openmates.org/#settings/newsletter)을 확인해 주세요.
    
    OpenMates를 즐겁게 사용하시길 바라며, 다음 업데이트도 기대해 주세요!
    
