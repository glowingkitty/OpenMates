    # 🙏 كلمات شكر في البداية
    
    في نهاية ديسمبر، وضمن فعاليات مؤتمر "كايوس للاتصالات" (Chaos Communication Congress)، طُلب مني بشكل غير متوقع إجراء مقابلة مع القناة التلفزيونية الألمانية ZDF [(تقرير يناقش أهمية البدائل التي تركز على الخصوصية لشركات الذكاء الاصطناعي الكبرى)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). ويا لها من تجربة! على الرغم من أن OpenMates كان في مراحله الأولى وغير مكتمل تماماً في ذلك الوقت، بدأ أوائل المستخدمين في التسجيل واستخدامه — واكتشفوا أيضاً أخطاءً وحالات استثنائية لم أواجهها أثناء اختباري على أجهزتي الخاصة، وقاموا مشكورين بالإبلاغ عنها. شكراً جزيلاً لكل من فعل ذلك — لقد ساعد هذا حقاً في جعل OpenMates أكثر صقلاً واستقراراً واكتمالاً! وبالطبع، نرحب دائماً باستمرارك في الإبلاغ عن أي مشكلات إذا لاحظت أي شيء غير صحيح أو معطل في OpenMates.
    
    على الرغم من أن هذا لم يكن أول برنامج أصممه، إلا أنها كانت المرة الأولى التي يبدأ فيها أكثر من مجرد حفنة من الأشخاص في استخدام برنامج بنيته — هناك أكثر من 180 مستخدماً نشطاً يستخدمون OpenMates حتى الآن! كان هذا مثيراً للغاية، وبصراحة، كان الأمر غامراً بعض الشيء في البداية.
    
    منذ ذلك الحين، ركزت تماماً على تحسين OpenMates وإصلاح الأخطاء، وجعله أكثر اكتمالاً من حيث الميزات — وأجريت الكثير من التغييرات على الكود. إصلاحات للأخطاء، ميزات جديدة، واجهة مستخدم محسنة، والعديد من التحسينات الأخرى. 
    
    واليوم، يسعدني أن أقدم لك تحديثاً بأكثر التغييرات إثارة من الأشهر القليلة الماضية! تذكر أن الحديث عن جميع التغييرات سيكون أكثر من أن تحتويه رسالة إخبارية واحدة — لذا سأركز بدلاً من ذلك على أبرز الميزات وسأنشر أيضاً عدة فيديوهات قصيرة حول الميزات المختلفة في OpenMates في الأسابيع القادمة على:
    - [إنستغرام](https://instagram.com/openmates_official)
    - [بلوسكاي](https://bsky.app/profile/openmates.bsky.social)
    - [ماستودون](https://mastodon.social/@OpenMates)
    - [يوتيوب](https://www.youtube.com/@OpenMates).
    
    # ✨ أبرز ميزات الأشهر الماضية
    
    ## 1. 🧩 تطبيقات ومهارات تطبيقات جديدة
    
    بالإضافة إلى القدرات الحالية للبحث في الويب، وقراءة وتحليل المواقع الإلكترونية، وقراءة نصوص فيديوهات يوتيوب لبدء المناقشات — حصل OpenMates على الكثير من التطبيقات ومهارات التطبيقات الجديدة. إليك بعض الميزات البارزة:
    
    - 🏥 **[الصحة](https://openmates.org/#settings/apps/health/skills/search_appointments):** هل تبحث عن مواعيد أطباء؟ يمكن لتطبيق الصحة الآن التحقق من Doctolib و Jameda لمعرفة المواعيد المتاحة.
    - 🏠 **[المنزل](https://openmates.org/#settings/apps/home/skills/search):** ابحث عن شقق على ImmoScout24 و WG-Gesucht و Kleinanzeigen — مع ظهور التفاصيل الرئيسية مباشرة على OpenMates.
    - 🎉 **[الفعاليات](https://openmates.org/#settings/apps/events/skills/search):** ابحث وقم بتصفية الفعاليات على Meetup و Luma و Resident Advisor و Google — مع تفاصيل مثل الأوصاف، الصور، وقت ومكان الفعاليات، وروابط مباشرة لتأكيد الحضور أو الانضمام إليها.
    - ✈️ **[السفر](https://openmates.org/#settings/apps/travel):** تتيح لك مهارة "[البحث عن رحلات](https://openmates.org/#settings/apps/travel/skills/search_connections)" الجديدة البحث عن رحلات طيران عبر Google، عبر اتصالات متعددة في أيام مختلفة في وقت واحد — بما في ذلك تفاصيل الرحلة الكاملة وروابط الحجز. سيتبع ذلك دعم لرحلات القطارات. وتُظهر لك مهارة "[تقويم الأسعار](https://openmates.org/#settings/apps/travel/skills/price_calendar)" نظرة عامة سريعة على تطور الأسعار على مدار الشهر.
    - ⏰ **[التذكيرات](https://openmates.org/#settings/apps/reminder):** أنشئ تذكيراً لمحادثة للعودة إليها لاحقاً — أو حتى اطلب من OpenMates البحث وتلخيص آخر الأخبار اليومية لموضوع معين، على سبيل المثال.
    - 🖼️ **[الصور](https://openmates.org/#settings/apps/images):** [ابحث](https://openmates.org/#settings/apps/images/skills/search) عن الصور على الويب، [أنشئ](https://openmates.org/#settings/apps/images/skills/generate) صوراً و[رسومات متجهة](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[ملفات PDF](https://openmates.org/#settings/apps/pdf):** ارفع ملفات PDF واطرح أسئلة حول النص أو حتى التنسيق المرئي — يمكن لـ OpenMates قراءة وعرض ملفات PDF! 
    - 💻 **[البرمجة](https://openmates.org/#settings/apps/code):** يمكن لـ OpenMates [البحث عن أحدث الوثائق التقنية](https://openmates.org/#settings/apps/code/skills/get_docs) للإجابة على الأسئلة المتعلقة بالبرمجة، ثم كتابة الكود — وحتى السماح لك بمعاينة تصاميم المواقع والكود مباشرة في المتصفح! وهذه ليست سوى البداية لقدراته البرمجية.
    - 🧮 **[الرياضيات](https://openmates.org/#settings/apps/math):** احسب التعبيرات الرياضية وحتى ارسم الرسوم البيانية، كل ذلك داخل OpenMates.
    - 📝 **[المستندات](https://openmates.org/#settings/apps/docs):** اطلب إنشاء مستندات Word — وقم بتنزيلها كملفات .docx.
    - 📊 **[الجداول](https://openmates.org/#settings/apps/sheets):** يمكن لـ OpenMates أيضاً إنشاء جداول والسماح لك بتنزيلها كملفات .xlsx. سيصبح كل من "المستندات" و"الجداول" أفضل وأقوى في الأسابيع القادمة.
    - 📧 **[البريد](https://openmates.org/#settings/apps/mail):** يمكن لـ OpenMates كتابة مسودات رسائل البريد الإلكتروني لك، والتي يمكنك بعد ذلك فتحها وإرسالها بسهولة عبر برنامج البريد الافتراضي على جهازك.
    - 🎙️ **[الصوت](https://openmates.org/#settings/apps/audio):** لا ترغب في الكتابة؟ سجل وأرسل رسالة صوتية إلى OpenMates مباشرة من حقل الرسائل.
    
    تمت إضافة المزيد من مهارات التطبيقات. ما عليك سوى [الاطلاع واستكشاف تطبيقات OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 عناصر نائبة للبيانات الشخصية
    
    على عكس روبوتات الدردشة المدعومة بالذكاء الاصطناعي من شركات التكنولوجيا الكبرى والشركات الناشئة التقليدية، تم تصميم OpenMates مع وضع خصوصيتك كأولوية قصوى. وهو يحتوي بالفعل على تدابير حماية خصوصية متنوعة:
    - 🔐 يتم تشفير وفك تشفير جميع محادثاتك على جهازك فقط.
    - 🖼️ يتم تحميل جميع الصور الخارجية عبر خادم OpenMates الخاص بنا (حتى لا ترى المواقع الخارجية عنوان IP الخاص بك أو معلومات جهازك).
    - 📉 لا يتم استخدام Google Analytics أو أي برنامج تحليلات آخر في OpenMates (وهذا هو السبب أيضاً في عدم رؤيتك لإشعار ملفات تعريف الارتباط).
    
    ما الجديد: يتم اكتشاف البيانات الحساسة مثل عناوين البريد الإلكتروني وأرقام الهواتف ومفاتيح API وغيرها تلقائياً واستبدالها بعناصر نائبة (placeholders) على جهازك، عند كتابة وإرسال رسالة إلى OpenMates. يمكنك دائماً العودة إلى القيمة الأصلية في واجهة المستخدم، ويمكنك النقر فوق البيانات المكتشفة لمنع الاستبدال. ولكن بشكل افتراضي، تضمن هذه الميزة ألا يرى OpenMates ولا مزودو الذكاء الاصطناعي الذين يعالجون رسائلك البيانات الحساسة في المقام الأول.
    
    [جربها بنفسك](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — انقر فوق هذا الرابط لرؤية "عناصر نائبة للبيانات الشخصية" وهي تعمل: سيتم اكتشاف بريدك الإلكتروني ورقم هاتفك تلقائياً واستبدالهما قبل إرسالهما إلى الذكاء الاصطناعي.
    
    ## 3. 🧠 الذكريات
    
    يمكن لـ OpenMates الآن تذكر ذكريات خاصة بالتطبيقات، مثل رحلاتك القادمة أو تفاصيل المشروع. ولكن: يتم تشفير وفك تشفير جميع الذكريات على جهازك فقط، ولا تتم مشاركتها إلا مؤقتاً مع خادم OpenMates ومزود الذكاء الاصطناعي إذا قمت بتأكيد ذلك صراحةً للمحادثة المعنية. يتيح لك ذلك الاستفادة الكاملة من الردود المخصصة دون تكرار تفاصيل مشروعك باستمرار — مع البقاء في تحكم كامل في البيانات التي تشاركها، ومتى، ومع أي مزود ذكاء اصطناعي. اطلع على [الذكريات في تطبيقات OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 أوضاع التركيز
    
    إن معرفة كيفية إعطاء التعليمات الصحيحة لروبوت دردشة يعمل بالذكاء الاصطناعي يحدث فرقاً كبيراً في مدى فائدة الروبوت وجودة الردود. مع "أوضاع التركيز"، لست بحاجة إلى أن تكون خبيراً في هندسة الأوامر للاستفادة الكاملة من التعليمات الرائعة والموجهة. ما عليك سوى أن تطلب من OpenMates رؤى مهنية، على سبيل المثال، وسيتم تفعيل وضع التركيز "رؤى مهنية" تلقائياً لإرشادك خلال العملية. وبالطبع: هذه ليست سوى البداية. سيتم إضافة الكثير من أوضاع التركيز الأخرى، وسيتم تحسين جودة الأوضاع الحالية في الأسابيع القادمة. لا تتردد في الاطلاع على [أوضاع التركيز في تطبيقات OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 نماذج جديدة
    
    يحتوي OpenMates على مجموعة واسعة من نماذج الذكاء الاصطناعي الأكثر كفاءة وأفضل أداءً. بشكل افتراضي، يختار النموذج المناسب تلقائياً بناءً على المهمة. ولكن يمكنك دائماً تجاوز هذا السلوك [في إعدادات الذكاء الاصطناعي](https://openmates.org/#settings/ai) بشكل دائم، أو عند الطلب من خلال ذكر نموذج معين في حقل الرسالة عبر `@{modelname}`. يمكنك الآن الاختيار من بين مجموعة واسعة من نماذج الذكاء الاصطناعي، على سبيل المثال:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) و [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) و [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - الأسماء المستعارة للنماذج `@best` و `@fast` — اكتب `@best` للتوجيه التلقائي إلى أقوى نموذج، و `@fast` لاستخدام أسرع نموذج متاح على OpenMates.
    
    ## 6. 💡 إلهامات يومية وروابط ويكيبيديا
    
    الذكاء الاصطناعي، إذا تم استخدامه بشكل صحيح، يمكن أن يكون أداة مذهلة للتعلم. وOpenMates مُحسَّن لتشجيع الناس على التعلم والاستكشاف والحصول على الإلهام. هذا هو الغرض من "الإلهامات اليومية" التي تراها في الجزء العلوي من الواجهة بعد تسجيل الدخول. فهي تعرض فيديوهات جديدة مثيرة للاهتمام — وقريباً أيضاً محتويات أخرى مثل مقالات ويكيبيديا، وميزات OpenMates الجديدة، وصور وتفاصيل لأعمال فنية، وأحداث تاريخية مهمة والمزيد. يتم تخصيص "الإلهامات اليومية" وفقاً لمحادثاتك، ثم يتم قفلها على جهازك بمفتاح تملكه أنت وحدك — لذا تظل خاصة بك.
    بالإضافة إلى ذلك، يقوم OpenMates أيضاً بتمييز مقالات ويكيبيديا تلقائياً في ردود المساعد. مما يجعل من السهل جداً معرفة المزيد عن موضوع ما بمجرد النقر على الكلمة المميزة باللون البرتقالي مع أيقونة الدراسة بجانبها.
    
    # 🚀 ماذا بعد
    
    في الأسابيع القادمة، سأنشر مقاطع قصيرة متنوعة تعرض الميزات العديدة لـ OpenMates والأشياء المفيدة التي يمكن القيام بها باستخدامه، بالإضافة إلى مواصلة تحسين البرنامج وإضافة المزيد من التطبيقات والمزودين والميزات.
    
    من الآن فصاعداً، خطتي هي إرسال رسائل إخبارية للإعلانات والتحديثات كل بضعة أسابيع، وبشكل منفصل أيضاً نصائح وحيل حول كيفية استخدام OpenMates. لا تتردد في [التحقق من إعدادات الرسائل الإخبارية في أي وقت](https://openmates.org/#settings/newsletter)، إذا كنت ترغب في تلقي رسائل إخبارية أكثر أو أقل.
    
    استمتع باستخدام OpenMates، وابقَ على تواصل لمزيد من التحديثات!
    
