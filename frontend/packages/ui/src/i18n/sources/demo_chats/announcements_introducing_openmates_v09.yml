    # ✨ 지난 몇 달간의 주요 업데이트
    
    ## 1. 🧩 새로운 앱 및 앱 기술
    
    기존의 웹 검색, 웹사이트 읽기 및 분석, YouTube 영상 스크립트 기반 토론 기능에 더해 OpenMates에 수많은 새로운 앱과 기술이 추가되었습니다. 주요 내용은 다음과 같습니다:
    
    - 🏥 **[건강](#settings/apps/health/skills/search_appointments):** 병원 예약을 찾고 계신가요? 건강 앱이 이제 Doctolib와 Jameda에서 예약 가능한 시간대를 확인할 수 있습니다.
    - 🏠 **[주거](#settings/apps/home/skills/search):** ImmoScout24, WG-Gesucht, Kleinanzeigen에서 아파트를 검색하고 주요 상세 정보를 OpenMates에서 바로 확인할 수 있습니다.
    - 🎉 **[이벤트](#settings/apps/events/skills/search):** Meetup, Luma, Resident Advisor, Google에서 이벤트를 검색하고 필터링하세요. 설명, 이미지, 일시, 장소 등의 상세 정보와 함께 참가 신청(RSVP) 또는 참여 링크를 바로 제공합니다.
    - ✈️ **[여행](#settings/apps/travel):** 새로운 '[경로 검색](#settings/apps/travel/skills/search_connections)' 기술을 통해 Google에서 여러 날짜의 다양한 항공편을 동시에 검색할 수 있습니다. 상세 항공 정보와 예약 링크가 포함됩니다. 기차 경로 검색 기능도 곧 추가될 예정입니다. 또한 '[가격 캘린더](#settings/apps/travel/skills/price_calendar)' 기술은 한 달간의 가격 변동 추이를 한눈에 보여줍니다.
    - ⏰ **[리마인더](#settings/apps/reminder):** 나중에 다시 확인하고 싶은 채팅에 대한 리마인더를 생성하세요. 특정 주제에 대한 최신 일일 뉴스를 검색하고 요약하도록 설정할 수도 있습니다.
    - 🖼️ **[이미지](#settings/apps/images):** 웹에서 이미지를 [검색](#settings/apps/images/skills/search)하고, 이미지를 [생성](#settings/apps/images/skills/generate)하거나 [벡터 그래픽](#settings/apps/images/skills/vectorize)을 만들 수 있습니다.
    - 📄 **[PDF](#settings/apps/pdf):** PDF를 업로드하고 텍스트나 시각적 레이아웃에 대해 질문하세요. OpenMates는 PDF를 읽고 볼 수 있습니다! 
    - 💻 **[코드](#settings/apps/code):** OpenMates는 코딩 관련 질문에 답하기 위해 [최신 문서](#settings/apps/code/skills/get_docs)를 검색하고 코드를 작성하며, 브라우저에서 웹사이트 디자인과 코드를 직접 미리 볼 수 있게 해줍니다! 이는 코딩 기능의 시작일 뿐입니다.
    - 🧮 **[수학](#settings/apps/math):** OpenMates 내에서 수식을 계산하고 플롯을 시각화할 수 있습니다.
    - 📝 **[문서](#settings/apps/docs):** Word 문서 생성을 요청하고 .docx 파일로 다운로드하세요.
    - 📊 **[시트](#settings/apps/sheets):** 표를 생성하고 .xlsx 파일로 다운로드할 수 있습니다. 문서와 시트 기능은 앞으로 몇 주 안에 더욱 강력해질 예정입니다.
    - 📧 **[메일](#settings/apps/mail):** OpenMates가 이메일 초안을 작성해 주면, 기기의 기본 이메일 프로그램을 통해 간편하게 열고 보낼 수 있습니다.
    - 🎙️ **[오디오](#settings/apps/audio):** 타이핑하기 귀찮으신가요? 메시지 입력창에서 바로 음성 메시지를 녹음하여 OpenMates에 보내세요.
    
    이 외에도 더 많은 앱 기술이 추가되었습니다. [OpenMates 앱](#settings/apps)에서 직접 확인해 보세요.
    
    ## 2. 🔒 개인 정보 플레이스홀더
    
    빅테크 기업이나 일반적인 스타트업의 AI 챗봇과 달리, OpenMates는 사용자의 개인정보 보호를 최우선으로 설계되었습니다. 이미 다음과 같은 다양한 보호 조치가 적용되어 있습니다:
    - 🔐 모든 채팅은 사용자의 기기에서만 암호화 및 복호화됩니다.
    - 🖼️ 모든 외부 이미지는 OpenMates 서버를 통해 로드되므로, 외부 웹사이트가 사용자의 IP 주소나 기기 정보를 볼 수 없습니다.
    - 📉 Google Analytics나 기타 분석 소프트웨어를 사용하지 않습니다. (OpenMates에 쿠키 배너가 없는 이유이기도 합니다.)
    
    새로운 기능: 이메일 주소, 전화번호, API 키와 같은 민감한 데이터가 자동으로 감지되어, 메시지를 작성하고 보낼 때 기기 내에서 플레이스홀더로 대체됩니다. 사용자 인터페이스에서 언제든지 원래 값으로 되돌릴 수 있으며, 감지된 데이터를 클릭하여 대체를 방지할 수도 있습니다. 하지만 기본적으로 이 기능은 OpenMates나 메시지를 처리하는 AI 제공업체가 민감한 데이터를 아예 보지 못하도록 보장합니다.
    
    [직접 확인해 보세요](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — 이 링크를 클릭하여 개인 정보 플레이스홀더가 작동하는 모습을 확인하세요. 이메일과 전화번호가 AI로 전송되기 전에 자동으로 감지되어 대체됩니다.
    
    ## 3. 🧠 기억 (Memories)
    
    OpenMates는 이제 예정된 여행이나 프로젝트 세부 정보와 같은 앱별 기억을 저장할 수 있습니다. 하지만 이 모든 기억은 사용자의 기기에서만 암호화 및 복호화되며, 해당 채팅에서 사용자가 명시적으로 확인한 경우에만 OpenMates 서버 및 AI 제공업체와 일시적으로 공유됩니다. 이를 통해 프로젝트 세부 정보를 매번 반복할 필요 없이 개인화된 응답을 최대한 활용하면서도, 어떤 데이터를 언제 어느 AI 제공업체와 공유할지 완벽하게 제어할 수 있습니다. [OpenMates 앱의 기억](#settings/apps/all/memories) 기능을 확인해 보세요.
    
    ## 4. 🎯 포커스 모드
    
    AI 챗봇에게 올바른 지침을 주는 법을 알면 답변의 품질과 유용성이 크게 달라집니다. 포커스 모드를 사용하면 프롬프트 엔지니어링 전문가가 아니어도 정교하고 타겟팅된 지침을 활용할 수 있습니다. 예를 들어 OpenMates에게 커리어 조언을 구하면 '커리어 인사이트' 포커스 모드가 자동으로 활성화되어 과정을 안내합니다. 물론 이것은 시작일 뿐입니다. 앞으로 더 많은 포커스 모드가 추가될 예정이며, 기존 모드의 품질도 지속적으로 개선될 것입니다. [OpenMates 앱의 포커스 모드](#settings/apps/all/focus-modes)를 확인해 보세요.
    
    ## 5. 🤖 새로운 모델
    
    OpenMates는 시중에서 가장 효율적이고 성능이 뛰어난 AI 모델들을 엄선하여 제공합니다. 기본적으로 작업에 따라 적절한 모델을 자동 선택하지만, [AI 설정](#settings/ai)에서 영구적으로 변경하거나 메시지 창에서 `@{모델이름}`을 입력하여 필요할 때마다 특정 모델을 지정할 수 있습니다. 이제 다음과 같은 다양한 AI 모델을 선택할 수 있습니다:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) 및 [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) 및 [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - `@best` 및 `@fast` 모델 별칭 — 가장 강력한 모델을 사용하려면 `@best`를, 가장 빠른 모델을 사용하려면 `@fast`를 입력하세요.
    
    ## 6. 💡 일일 영감 및 위키백과 링크
    
    AI를 제대로 활용하면 학습을 위한 놀라운 도구가 될 수 있습니다. OpenMates는 사용자가 배우고 탐구하며 영감을 얻도록 최적화되어 있습니다. 로그인 후 인터페이스 상단에 표시되는 '일일 영감'이 바로 그 역할을 합니다. 흥미로운 새 영상은 물론, 곧 위키백과 문서, 새로운 OpenMates 기능, 예술 작품의 사진과 상세 정보, 중요한 역사적 사건 등 다양한 콘텐츠가 추가될 예정입니다. 일일 영감은 사용자의 채팅 내용에 맞춰 제공되지만, 오직 사용자만이 가진 키로 기기에 잠금 처리되어 비공개로 유지됩니다.
    또한 OpenMates는 어시스턴트 메시지의 응답에서 위키백과 문서를 자동으로 강조 표시합니다. 학습 아이콘이 있는 주황색 강조 단어를 클릭하기만 하면 해당 주제에 대해 더 자세히 알아볼 수 있습니다.
    
    # 🚀 향후 계획
    
    앞으로 몇 주 동안 OpenMates의 다양한 기능과 유용한 활용법을 보여주는 짧은 영상들을 게시할 예정이며, 소프트웨어를 지속적으로 개선하고 더 많은 앱, 제공업체 및 기능을 추가할 계획입니다.
    
    앞으로는 몇 주마다 공지 및 업데이트를 위한 뉴스레터를 보내드리고, 이와 별도로 OpenMates 활용 팁과 요령도 공유해 드릴 예정입니다. 뉴스레터 수신 빈도를 조절하고 싶으시다면 언제든지 [뉴스레터 설정](#settings/newsletter)을 확인해 주세요.
    
    OpenMates와 함께 즐거운 시간 보내시고, 다음 업데이트도 기대해 주세요!
  it: |
    Ehi,
    sono Marco (alias [glowingkitty](https://github.com/glowingkitty)), il creatore di OpenMates.
    Non mi sono dimenticato di OpenMates — anzi, tutt'altro. 
    
    # 🙏 Prima di tutto, qualche parola di ringraziamento
    
    Alla fine di dicembre, nel contesto del Chaos Communication Congress, mi è stata inaspettatamente chiesta un'intervista per il canale televisivo tedesco ZDF [(un servizio sull'importanza delle alternative orientate alla privacy rispetto alle grandi aziende tecnologiche di IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). E wow, che esperienza. Nonostante OpenMates fosse molto meno rifinito all'epoca, le prime persone hanno iniziato a iscriversi e a usarlo — trovando anche bug e casi limite che non avevo riscontrato durante i test sui miei dispositivi, e segnalandoli prontamente. Grazie mille a tutti coloro che lo hanno fatto — ha aiutato davvero molto a rendere OpenMates più curato, più stabile e più completo! E ovviamente sei il benvenuto se vorrai continuare a segnalare problemi se noti qualcosa che non va o che sembra rotto su OpenMates.
    
    Anche se questo non è stato il primo software che ho creato, è stata la prima volta che più di una manciata di persone ha iniziato a usare qualcosa che ho costruito — finora oltre 180 utenti attivi stanno usando OpenMates! È stato super emozionante e, ammetto, all'inizio anche un po' travolgente.
    
    Da allora, mi sono concentrato completamente sul miglioramento e sul debugging di OpenMates, rendendolo più completo e rifinito — e ho apportato un'infinità di modifiche al codice. Correzioni di bug, nuove funzionalità, un'interfaccia utente migliorata e molti altri perfezionamenti. 
    
    E oggi sono felice di darti un aggiornamento con i cambiamenti più entusiasmanti degli ultimi mesi! Tieni presente che parlare di tutte le modifiche sarebbe troppo per una singola newsletter — quindi mi concentrerò sui punti salienti e pubblicherò anche diversi brevi video sulle varie funzionalità di OpenMates nelle settimane a venire su:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ I punti salienti degli ultimi mesi
    
    ## 1. 🧩 Nuove app e competenze delle app
    
    Oltre alle funzionalità esistenti di ricerca sul web, lettura e analisi di siti web e lettura delle trascrizioni dei video di YouTube per avviare discussioni — OpenMates ha ottenuto molte nuove app e competenze. Ecco alcuni punti salienti:
    
    - 🏥 **[Salute](#settings/apps/health/skills/search_appointments):** Cerchi un appuntamento dal medico? L'app Salute ora può controllare Doctolib e Jameda per trovare slot disponibili.
    - 🏠 **[Casa](#settings/apps/home/skills/search):** Cerca appartamenti su ImmoScout24, WG-Gesucht e Kleinanzeigen — con i dettagli principali direttamente visibili su OpenMates.
    - 🎉 **[Eventi](#settings/apps/events/skills/search):** Cerca e filtra eventi su Meetup, Luma, Resident Advisor e Google — con dettagli come descrizioni, immagini, data e luogo, e link diretti per confermare la partecipazione o iscriverti.
    - ✈️ **[Viaggi](#settings/apps/travel):** La nuova competenza "[Cerca collegamento](#settings/apps/travel/skills/search_connections)" ti consente di cercare voli tramite Google, su più collegamenti in vari giorni contemporaneamente — inclusi i dettagli completi del volo e i link per la prenotazione. Seguirà il supporto per i collegamenti ferroviari. E la competenza "[Calendario prezzi](#settings/apps/travel/skills/price_calendar)" ti mostra una rapida panoramica dell'andamento dei prezzi nell'arco di un mese.
    - ⏰ **[Promemoria](#settings/apps/reminder):** Crea un promemoria per una chat per tornarci più tardi — o persino chiedi a OpenMates di cercare e riassumere le ultime notizie quotidiane su un determinato argomento, ad esempio.
    - 🖼️ **[Immagini](#settings/apps/images):** [Cerca](#settings/apps/images/skills/search) immagini sul web, [genera](#settings/apps/images/skills/generate) immagini e [grafica vettoriale](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf):** Carica PDF e fai domande sul testo o persino sul layout visivo — OpenMates può sia leggere che visualizzare i PDF! 
    - 💻 **[Codice](#settings/apps/code):** OpenMates può [cercare la documentazione più recente](#settings/apps/code/skills/get_docs) per rispondere a domande relative alla programmazione, quindi scrivere codice — e persino farti visualizzare in anteprima il design di siti web e il codice direttamente nel browser! E questo è solo l'inizio delle sue capacità di programmazione.
    - 🧮 **[Matematica](#settings/apps/math):** Calcola espressioni e visualizza persino grafici, tutto all'interno di OpenMates.
    - 📝 **[Documenti](#settings/apps/docs):** Chiedi di generare documenti Word — e scaricali come file .docx.
    - 📊 **[Fogli](#settings/apps/sheets):** OpenMates può anche creare tabelle e farti scaricare file .xlsx. Sia Documenti che Fogli diventeranno ancora migliori e più potenti nelle prossime settimane.
    - 📧 **[Email](#settings/apps/mail):** OpenMates può scrivere bozze di email per te, che potrai poi facilmente aprire e inviare tramite il programma di posta predefinito sul tuo dispositivo.
    - 🎙️ **[Audio](#settings/apps/audio):** Non vuoi scrivere? Registra e invia un messaggio vocale a OpenMates, direttamente dal campo del messaggio.
    
    E sono state aggiunte ancora più competenze alle app. [Dai un'occhiata ed esplora le App di OpenMates](#settings/apps).
    
    ## 2. 🔒 Segnaposto per i dati personali
    
    A differenza dei chatbot IA delle grandi aziende tecnologiche e delle startup tipiche, OpenMates è progettato con la tua privacy come priorità assoluta. E aveva già diverse protezioni della privacy in atto:
    - 🔐 tutte le tue chat sono criptate e decriptate solo sul tuo dispositivo
    - 🖼️ tutte le immagini esterne vengono caricate tramite il nostro server OpenMates (così i siti web esterni non vedono il tuo indirizzo IP o le informazioni sul dispositivo)
    - 📉 non viene utilizzato Google Analytics o qualsiasi altro software di analisi su OpenMates (motivo per cui non vedi un banner dei cookie su OpenMates)
    
    Novità: i dati sensibili come indirizzi email, numeri di telefono, chiavi API e altro vengono rilevati automaticamente e sostituiti con segnaposto sul tuo dispositivo quando scrivi e invii un messaggio a OpenMates. Puoi sempre tornare al valore originale nell'interfaccia utente e puoi cliccare sui dati rilevati per impedire la sostituzione. Ma per impostazione predefinita, questa funzione garantisce che né OpenMates né i fornitori di IA che elaborano i tuoi messaggi vedano mai i dati sensibili.
    
    [Provalo tu stesso](#message=Scrivi%20una%20bozza%20di%20email%20da%20marco.rossi%40gmail.com%20a%20hausverwaltung%40immobilien-weber.de%20chiedendo%20informazioni%20sullo%20stato%20del%20riscaldamento%20rotto%20nel%20mio%20appartamento.%20Il%20guasto%20%C3%A8%20stato%20segnalato%20il%2028%20marzo%20e%20il%20mio%20numero%20di%20telefono%20%C3%A8%20%2B49%20170%209876543.%20Per%20favore%2C%20sii%20gentile%20ma%20fermo%20%E2%80%94%20sono%20passate%20quasi%203%20settimane.) — clicca su questo link per vedere i Segnaposto per i dati personali in azione: la tua email e il tuo numero di telefono verranno rilevati automaticamente e sostituiti prima di essere inviati all'IA.
    
    ## 3. 🧠 Ricordi
    
    OpenMates ora può ricordare informazioni specifiche delle app, come i tuoi prossimi viaggi o i dettagli di un progetto. MA: tutti i ricordi sono criptati e decriptati solo sul tuo dispositivo, e vengono condivisi temporaneamente con il server OpenMates e il fornitore di IA solo se lo confermi esplicitamente per la chat in questione. Questo ti consente di sfruttare appieno le risposte personalizzate senza ripetere costantemente i dettagli del tuo progetto — mantenendo il pieno controllo su quali dati condividi, quando e con quale fornitore di IA. Dai un'occhiata ai [Ricordi nelle App di OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Modalità Focus
    
    Sapere come dare le istruzioni giuste a un chatbot IA fa un'enorme differenza in termini di utilità del chatbot e qualità delle risposte. Con le Modalità Focus, non è necessario essere un esperto di prompt engineering per sfruttare appieno istruzioni mirate ed efficaci. Chiedi a OpenMates approfondimenti sulla carriera, ad esempio, e la modalità focus "Approfondimenti sulla carriera" dovrebbe attivarsi automaticamente per guidarti nel processo. E naturalmente: questo è solo l'inizio. Verranno aggiunte molte altre Modalità Focus e la qualità di quelle esistenti verrà ulteriormente migliorata nelle settimane a venire. Sentiti libero di dare un'occhiata alle [Modalità Focus nelle App di OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nuovi modelli
    
    OpenMates offre un'ampia selezione dei modelli di IA più efficienti e performanti sul mercato. Per impostazione predefinita, seleziona automaticamente quello giusto in base all'attività. Ma puoi sempre sovrascrivere questo comportamento [nelle impostazioni dell'IA](#settings/ai) in modo permanente, o su richiesta menzionando un modello specifico nel campo del messaggio tramite `@{nomemodello}`. Ora puoi scegliere tra una vasta gamma di modelli di IA, ad esempio:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) e [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) e [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Alias dei modelli `@best` e `@fast` — digita `@best` per indirizzare automaticamente al modello più potente, `@fast` per usare il modello più veloce disponibile su OpenMates.
    
    ## 6. 💡 Ispirazioni quotidiane e link a Wikipedia
    
    L'IA, se usata correttamente, può essere uno strumento straordinario per l'apprendimento. E OpenMates è ottimizzato per incoraggiare le persone a imparare, esplorare e lasciarsi ispirare. A questo servono le Ispirazioni quotidiane, che vedi nella parte superiore dell'interfaccia dopo aver effettuato l'accesso. Mostrano nuovi video interessanti — e presto anche altri contenuti come articoli di Wikipedia, nuove funzionalità di OpenMates, foto e dettagli di opere d'arte, eventi storici importanti e altro ancora. Le Ispirazioni quotidiane sono personalizzate in base alle tue chat, quindi bloccate sul tuo dispositivo con una chiave che solo tu possiedi — in modo che rimangano private.
    Inoltre, OpenMates evidenzia automaticamente gli articoli di Wikipedia nelle risposte dei messaggi dell'assistente. Ciò rende semplicissimo saperne di più su un argomento cliccando sulla parola evidenziata in arancione con l'icona dello studio accanto.
    
    # 🚀 Cosa succederà ora
    
    Nelle settimane a venire pubblicherò vari brevi filmati che mostrano le numerose funzionalità di OpenMates e le cose utili che si possono fare con esso, oltre a migliorare ulteriormente il software e aggiungere altre app, fornitori e funzionalità.
    
    D'ora in poi il mio piano è di inviare email della newsletter per annunci e aggiornamenti ogni poche settimane e, separatamente, anche consigli e trucchi su come usare OpenMates. Sentiti libero di [controllare le impostazioni della tua newsletter in qualsiasi momento](#settings/newsletter), se desideri ricevere più o meno email.
    
    Divertiti a usare OpenMates e resta sintonizzato per altri aggiornamenti!
  tr: |
    Selam,
    
    OpenMates v0.11 yayında. Bu güncelleme, v0.10 iyileştirmelerinin üzerine inşa ediliyor ve pratik günlük özellikler ekliyor: daha zengin Günlük İlhamlar, kod yürütme, depo araştırması, müzik oluşturma, görsel oluşturma sağlayıcısı iyileştirmeleri, daha net uygulama sonuçları ve yerel arayüz yazı tipleri.
    
    # İlk olarak, kısa bir v0.10 özeti
    
    v0.10; yanıtlara Wikipedia bağlantıları, mesaj vurguları ve yorumlar, daha iyi genel duyuru/örnek sayfaları, SEPA banka transferleri ve hesap e-postası değişiklikleri ekledi.
    
    Bu değişiklikler OpenMates'i günlük bir çalışma alanı olarak daha kullanışlı hale getirdi: öğrenmesi daha kolay, paylaşması daha kolay ve hesap ile ödeme temelleri konusunda daha sağlam.
    
    # ✨ v0.11'deki yenilikler
    
    ## 1. Genişletilmiş Günlük İlhamlar
    
    Günlük İlhamlar daha zengin ve çeşitli hale geldi. Herkese açık videoları, faydalı özellik fikirlerini ve OpenMates'te yapmak isteyebileceğin şeyler için somut başlangıç noktalarını ortaya çıkarabilirler.
    
    Hedef, OpenMates'in boş bir sohbet robotu kutusu gibi değil, faydalı şeyler keşfetmene yardımcı olan bir yer gibi hissettirmesini sağlamak: bir konuyu araştırmak, bir videoyu anlamak, bir görevi planlamak, bir aracı keşfetmek veya bir örnekten devam etmek.
    
    ## 2. Kod yürütme ve kod araştırması iyileştirmeleri
    
    Kod uygulaması büyük bir adım attı. OpenMates artık bir kum havuzunda (sandbox) kod çalıştırabilir, çıktıları gösterebilir, depo aramalarına yardımcı olabilir ve kodla ilgili daha fazla takip işlemini gerçekleştirebilir.
    
    Günlük kullanıcılar için bu, profesyonel bir yazılımcı olmasan bile faydalıdır: küçük betikler, veri temizleme, belge oluşturma, web sitesi önizlemeleri, günlük (log) açıklamaları ve teknik sorular daha etkileşimli hale gelebilir.
    
    ## 3. Müzik oluşturma ve görsel sağlayıcı iyileştirmeleri
    
    v0.11, müzik oluşturma ve görsel oluşturma sağlayıcılarındaki iyileştirmelerle oluşturulan medya iş akışlarını genişletiyor. Bu, OpenMates'in doğrudan sohbette daha fazla yaratıcı görevi destekleyebileceği anlamına geliyor: hızlı bir müzik fikri oluşturmak, görsel konseptler üretmek, istemler (prompts) üzerinde yineleme yapmak veya kaba bir fikri gerçekten inceleyebileceğin ve yeniden kullanabileceğin bir medyaya dönüştürmek.
    
    Bu çalışma aynı zamanda oluşturulan medyanın sunulma şeklini de iyileştiriyor, böylece sonuçları önizlemek, açmak ve onlardan devam etmek daha kolay hale geliyor.
    
    ## 4. Daha net uygulama sonuçları ve sağlayıcı ayrıntıları
    
    Birçok uygulama kartı ve yerleştirme önizlemesi artık daha iyi gerçek örnekler, sağlayıcı logoları, kaynak bilgileri ve daha net meta veriler gösteriyor. Bu, ne olduğunu, bir sonucun nereden geldiğini ve hangi uygulama becerisinin kullanıldığını anlamayı kolaylaştırıyor.
    
    Günlük kullanım için bu, daha az tahmin yürütmek anlamına geliyor: seyahat sonuçları, web sonuçları, oluşturulan dosyalar, medya çıktıları ve kod sonuçlarının tanınması ve üzerinde işlem yapılması daha kolay olmalı.
    
    ## 5. Daha iyi takip sunumu
    
    Takip önerileri zaten vardı, ancak sunumları artık daha temiz ve kullanımı daha kolay. Bir sonraki mükemmel istemi kendin düşünmek zorunda kalmadan bir göreve devam etmene yardımcı olmayı amaçlıyorlar.
    
    ## 6. Yerel arayüz yazı tipleri
    
    Artık yerel arayüz yazı tipi tercihlerini seçebilirsin. Küçük bir ayar gibi görünebilir ancak OpenMates'te okumak ve yazmak için çok zaman harcıyorsan önemlidir.
    
    ## 7. Kararlılık ve performans iyileştirmeleri
    
    Sohbet senkronizasyonu, yerleştirmeler, dosya önizlemeleri ve görsel sonucu önizlemelerinde de kararlılık ve performans iyileştirmeleri yapıldı.
    
    # Sırada ne var
    
    Bir sonraki adım, OpenMates'i anlamayı ve kullanmayı kolaylaştırmaya devam etmek: daha iyi örnekler, daha net uygulama akışları, daha gelişmiş yaratıcı ve araştırma araçları ve sohbet deneyimindeki pürüzlerin giderilmesi.
    
    OpenMates'i kullandığın ve bir şeyler kafa karıştırıcı veya bozuk göründüğünde geri bildirim verdiğin için teşekkürler.
    
    Selamlar,
    
    Marco  
    OpenMates'in Yaratıcısı
  vi: |
    Chào bạn,
    Mình là Marco (hay còn gọi là [glowingkitty](https://github.com/glowingkitty)) — người sáng tạo ra OpenMates.
    Mình không hề quên OpenMates đâu — hoàn toàn ngược lại là đằng khác. 
    
    # 🙏 Đôi lời cảm ơn trước hết
    
    Vào cuối tháng 12, trong khuôn khổ Chaos Communication Congress, mình đã bất ngờ được mời phỏng vấn trên kênh truyền hình ZDF của Đức [(một phóng sự thảo luận về tầm quan trọng của các giải pháp thay thế tập trung vào quyền riêng tư cho các công ty AI công nghệ lớn)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Và ồ, thật là một trải nghiệm tuyệt vời. Mặc dù OpenMates lúc đó còn nhiều thiếu sót, những người dùng đầu tiên đã bắt đầu đăng ký và sử dụng — đồng thời phát hiện ra các lỗi và các trường hợp biên mà mình không gặp phải trong quá trình thử nghiệm trên thiết bị cá nhân, và thật may mắn là họ đã báo cáo chúng. Cảm ơn rất nhiều đến tất cả những ai đã làm điều đó — nó thực sự giúp ích rất nhiều trong việc làm cho OpenMates trở nên trau chuốt hơn, ổn định hơn và hoàn thiện hơn! Và tất nhiên, mình rất hoan nghênh bạn tiếp tục báo cáo các vấn đề nếu bạn nhận thấy bất cứ điều gì không ổn hoặc bị lỗi trên OpenMates.
    
    Mặc dù đây không phải là phần mềm đầu tiên mình tạo ra, nhưng đây là lần đầu tiên có nhiều hơn một nhóm nhỏ người bắt đầu sử dụng phần mềm mình xây dựng — cho đến nay đã có hơn 180 người dùng đang hoạt động sử dụng OpenMates! Điều này cực kỳ thú vị, và thú thật là lúc đầu cũng có chút choáng ngợp.
    
    Kể từ đó, mình đã tập trung hoàn toàn vào việc cải thiện và sửa lỗi cho OpenMates, giúp nó hoàn thiện hơn về tính năng và trau chuốt hơn — đồng thời thực hiện rất nhiều thay đổi đối với mã nguồn. Sửa lỗi, tính năng mới, giao diện người dùng được cải thiện và nhiều cải tiến khác nữa. 
    
    Và hôm nay, mình rất vui được cập nhật cho bạn những thay đổi thú vị nhất trong vài tháng qua! Hãy nhớ rằng, nói về tất cả các thay đổi sẽ là quá nhiều cho một bản tin duy nhất — vì vậy thay vào đó, mình sẽ tập trung vào những điểm nổi bật và cũng sẽ xuất bản nhiều video ngắn về các tính năng khác nhau trên OpenMates trong những tuần tới, tại:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Những điểm nổi bật trong những tháng qua
    
    ## 1. 🧩 Các ứng dụng & kỹ năng ứng dụng mới
    
    Ngoài các khả năng hiện có như tìm kiếm web, đọc & phân tích trang web và đọc bản ghi video YouTube để bắt đầu thảo luận — OpenMates đã có thêm rất nhiều ứng dụng và kỹ năng ứng dụng mới. Dưới đây là một số điểm nổi bật:
    
    - 🏥 **[Sức khỏe](#settings/apps/health/skills/search_appointments):** Bạn đang tìm lịch hẹn bác sĩ? Ứng dụng Sức khỏe hiện có thể kiểm tra Doctolib và Jameda để tìm các khung giờ còn trống.
    - 🏠 **[Nhà ở](#settings/apps/home/skills/search):** Tìm kiếm căn hộ trên ImmoScout24, WG-Gesucht và Kleinanzeigen — với các chi tiết chính có thể xem trực tiếp trên OpenMates.
    - 🎉 **[Sự kiện](#settings/apps/events/skills/search):** Tìm kiếm & lọc các sự kiện trên Meetup, Luma, Resident Advisor và Google — với các chi tiết như mô tả, hình ảnh, thời gian và địa điểm diễn ra sự kiện, cùng các liên kết trực tiếp để đăng ký tham gia.
    - ✈️ **[Du lịch](#settings/apps/travel):** Kỹ năng '[Tìm chuyến hành trình](#settings/apps/travel/skills/search_connections)' mới cho phép bạn tìm kiếm các chuyến bay qua Google, trên nhiều kết nối vào các ngày khác nhau cùng lúc — bao gồm đầy đủ chi tiết chuyến bay và liên kết đặt vé. Hỗ trợ cho các chuyến tàu sẽ sớm được cập nhật. Và kỹ năng '[Lịch giá](#settings/apps/travel/skills/price_calendar)' hiển thị cho bạn cái nhìn tổng quan nhanh chóng về sự thay đổi giá trong một tháng.
    - ⏰ **[Lời nhắc](#settings/apps/reminder):** Tạo lời nhắc cho một cuộc trò chuyện để quay lại sau — hoặc thậm chí yêu cầu OpenMates tìm kiếm & tóm tắt tin tức hàng ngày mới nhất cho một chủ đề nhất định, chẳng hạn.
    - 🖼️ **[Hình ảnh](#settings/apps/images):** [Tìm kiếm](#settings/apps/images/skills/search) hình ảnh trên web, [tạo](#settings/apps/images/skills/generate) hình ảnh và [đồ họa vector](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf):** Tải lên các tệp PDF và đặt câu hỏi về nội dung văn bản hoặc thậm chí là bố cục hình ảnh — OpenMates có thể vừa đọc vừa xem các tệp PDF! 
    - 💻 **[Lập trình](#settings/apps/code):** OpenMates có thể [tìm kiếm các tài liệu hướng dẫn mới nhất](#settings/apps/code/skills/get_docs) để trả lời các câu hỏi liên quan đến lập trình, sau đó viết mã — và thậm chí cho phép bạn xem trước các thiết kế trang web và mã trực tiếp trong trình duyệt! Và đây mới chỉ là bước khởi đầu cho khả năng lập trình của nó.
    - 🧮 **[Toán học](#settings/apps/math):** Tính toán các biểu thức và thậm chí trực quan hóa các đồ thị, tất cả đều nằm trong OpenMates.
    - 📝 **[Tài liệu](#settings/apps/docs):** Yêu cầu tạo các tài liệu Word — và tải chúng xuống dưới dạng tệp .docx.
    - 📊 **[Bảng tính](#settings/apps/sheets):** OpenMates cũng có thể tạo các bảng và cho phép bạn tải chúng xuống dưới dạng tệp .xlsx. Cả Tài liệu và Bảng tính sẽ còn trở nên tốt hơn và mạnh mẽ hơn trong những tuần tới.
    - 📧 **[Thư điện tử](#settings/apps/mail):** OpenMates có thể soạn thảo email cho bạn, sau đó bạn có thể dễ dàng mở & gửi qua chương trình email mặc định trên thiết bị của mình.
    - 🎙️ **[Âm thanh](#settings/apps/audio):** Bạn không muốn gõ phím? Hãy ghi âm và gửi tin nhắn thoại cho OpenMates, trực tiếp từ trường nhập tin nhắn.
    
    Và thậm chí còn nhiều kỹ năng ứng dụng khác đã được thêm vào. Chỉ cần [kiểm tra & khám phá các Ứng dụng OpenMates](#settings/apps).
    
    ## 2. 🔒 Trình giữ chỗ dữ liệu cá nhân
    
    Không giống như các chatbot AI từ các công ty công nghệ lớn và các công ty khởi nghiệp điển hình, OpenMates được thiết kế với quyền riêng tư của bạn là ưu tiên hàng đầu. Và nó đã có sẵn các biện pháp bảo vệ quyền riêng tư khác nhau:
    - 🔐 tất cả các cuộc trò chuyện của bạn đều được mã hóa & giải mã chỉ trên thiết bị của bạn
    - 🖼️ tất cả các hình ảnh bên ngoài đều được tải qua máy chủ OpenMates của chúng mình (vì vậy các trang web bên ngoài không thấy địa chỉ IP hoặc thông tin thiết bị của bạn)
    - 📉 không sử dụng Google Analytics hoặc bất kỳ phần mềm phân tích nào khác trên OpenMates (đó cũng là lý do tại sao bạn không thấy biểu ngữ cookie trên OpenMates)
    
    Điểm mới: các dữ liệu nhạy cảm như địa chỉ email, số điện thoại, khóa API và nhiều dữ liệu khác sẽ tự động được phát hiện và thay thế bằng các trình giữ chỗ trên thiết bị của bạn khi bạn soạn thảo và gửi tin nhắn cho OpenMates. Bạn luôn có thể chuyển lại giá trị ban đầu trong giao diện người dùng và bạn có thể nhấp vào dữ liệu được phát hiện để ngăn chặn việc thay thế. Nhưng theo mặc định, tính năng này đảm bảo rằng cả OpenMates lẫn các nhà cung cấp AI xử lý tin nhắn của bạn sẽ không bao giờ nhìn thấy dữ liệu nhạy cảm ngay từ đầu.
    
    [Hãy tự mình thử nghiệm](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — nhấp vào liên kết này để xem Trình giữ chỗ dữ liệu cá nhân hoạt động: email và số điện thoại của bạn sẽ được tự động phát hiện và thay thế trước khi được gửi đến AI.
    
    ## 3. 🧠 Ký ức
    
    OpenMates hiện có thể ghi nhớ các ký ức riêng cho từng ứng dụng, như các chuyến đi sắp tới hoặc chi tiết dự án của bạn. NHƯNG: tất cả các ký ức đều được mã hóa & giải mã chỉ trên thiết bị của bạn và chỉ được chia sẻ tạm thời với máy chủ OpenMates và nhà cung cấp AI nếu bạn xác nhận rõ ràng cho cuộc trò chuyện đó. Điều này cho phép bạn tận dụng tối đa các phản hồi được cá nhân hóa mà không cần liên tục lặp lại các chi tiết dự án của mình — trong khi vẫn hoàn toàn kiểm soát được dữ liệu nào bạn chia sẻ, khi nào và với nhà cung cấp AI nào. Hãy xem [Ký ức trong các Ứng dụng OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Chế độ tập trung
    
    Biết cách đưa ra các hướng dẫn phù hợp cho một chatbot AI sẽ tạo ra sự khác biệt rất lớn về mức độ hữu ích của chatbot và chất lượng của các phản hồi. Với Chế độ tập trung, bạn không cần phải là một chuyên gia về kỹ thuật đặt câu lệnh (prompt engineering) để tận dụng tối đa các hướng dẫn tuyệt vời và có mục tiêu. Ví dụ: chỉ cần hỏi OpenMates về các thông tin nghề nghiệp, và chế độ tập trung 'Thông tin nghề nghiệp' sẽ tự động được kích hoạt để hướng dẫn bạn thực hiện quy trình. Và tất nhiên: đây mới chỉ là bắt đầu. Sẽ có thêm nhiều Chế độ tập trung được bổ sung và chất lượng của những chế độ hiện có sẽ được cải thiện hơn nữa trong những tuần tới. Đừng ngần ngại xem qua các [Chế độ tập trung trong các Ứng dụng OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Các mô hình mới
    
    OpenMates có một danh sách đa dạng các mô hình AI hiệu quả và có hiệu suất tốt nhất hiện nay. Theo mặc định, nó sẽ tự động chọn mô hình phù hợp dựa trên nhiệm vụ. Nhưng bạn luôn có thể thay đổi hành vi này [trong cài đặt AI](#settings/ai) một cách vĩnh viễn, hoặc theo yêu cầu bằng cách nhắc đến một mô hình cụ thể trong trường tin nhắn qua `@{tênmôhình}`. Hiện tại bạn có thể chọn từ một loạt các mô hình AI, ví dụ:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Các bí danh mô hình `@best` và `@fast` — gõ `@best` để tự động chuyển đến mô hình mạnh nhất, `@fast` để sử dụng mô hình nhanh nhất hiện có trên OpenMates.
    
    ## 6. 💡 Cảm hứng hàng ngày & liên kết Wikipedia
    
    AI, nếu được sử dụng đúng cách, có thể là một công cụ tuyệt vời để học tập. Và OpenMates được tối ưu hóa để khuyến khích mọi người học hỏi, khám phá và tìm cảm hứng. Đó là mục đích của Cảm hứng hàng ngày, mà bạn thấy ở đầu giao diện sau khi đăng nhập. Chúng hiển thị các video mới thú vị — và sắp tới là các nội dung khác như các bài viết Wikipedia, các tính năng mới của OpenMates, ảnh và chi tiết về các tác phẩm nghệ thuật, các sự kiện lịch sử quan trọng và hơn thế nữa. Cảm hứng hàng ngày được điều chỉnh theo các cuộc trò chuyện của bạn, sau đó được khóa trên thiết bị của bạn bằng một chiếc chìa khóa mà chỉ bạn có — vì vậy chúng luôn được giữ riêng tư cho bạn.
    Ngoài ra, OpenMates cũng tự động làm nổi bật các bài viết Wikipedia trong các phản hồi của tin nhắn trợ lý. Điều này giúp bạn cực kỳ dễ dàng tìm hiểu thêm về một chủ đề chỉ bằng cách nhấp vào từ được làm nổi bật màu cam với biểu tượng học tập bên cạnh.
    
    # 🚀 Điều gì sẽ diễn ra tiếp theo
    
    Trong những tuần tới, mình sẽ đăng các đoạn clip ngắn giới thiệu nhiều tính năng của OpenMates và những điều hữu ích mà mọi người có thể làm với nó, cũng như tiếp tục cải thiện phần mềm và thêm nhiều ứng dụng, nhà cung cấp và tính năng hơn.
    
    Từ giờ, kế hoạch của mình là gửi email bản tin cho các thông báo & cập nhật vài tuần một lần, và riêng biệt là các mẹo & thủ thuật về cách sử dụng OpenMates. Bạn có thể [kiểm tra cài đặt bản tin của mình bất cứ lúc nào](#settings/newsletter), nếu bạn muốn nhận nhiều hoặc ít email bản tin hơn.
    
    Chúc bạn có những trải nghiệm thú vị khi sử dụng OpenMates, và hãy đón chờ thêm nhiều cập nhật mới nhé!
