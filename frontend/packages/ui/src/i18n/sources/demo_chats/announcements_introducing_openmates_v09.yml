    aquí Marco (también conocido como [glowingkitty](https://github.com/glowingkitty)), el creador de OpenMates.
    No me he olvidado de OpenMates; todo lo contrario. 
    
    # 🙏 Primero, unas palabras de agradecimiento
    
    A finales de diciembre, en el contexto del Chaos Communication Congress, me pidieron inesperadamente una entrevista para el canal de televisión alemán ZDF [(un reportaje sobre la importancia de las alternativas centradas en la privacidad frente a las grandes empresas tecnológicas de IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Y guau, qué experiencia. A pesar de que OpenMates tenía bastantes más asperezas en aquel momento, las primeras personas empezaron a registrarse y a usarlo, y también a encontrar errores y casos límite que yo no había experimentado durante mis pruebas en mis propios dispositivos, y que afortunadamente reportaron. Muchas gracias a todos los que lo hicisteis; ¡ayudó mucho a que OpenMates fuera más pulido, estable y completo! Y, por supuesto, eres más que bienvenido a seguir informando de cualquier problema si notas algo que no funcione bien o esté roto en OpenMates.
    
    Aunque este no era el primer software que creaba, era la primera vez que más de un puñado de personas empezaba a usar algo que yo había construido: ¡más de 180 usuarios activos están usando OpenMates hasta ahora! Lo cual ha sido super emocionante y, hay que admitirlo, al principio también un poco abrumador.
    
    Desde entonces, me he centrado completamente en mejorar y depurar OpenMates, y en conseguir que sea más completo en cuanto a funciones y esté más pulido, realizando un montón de cambios en el código. Correcciones de errores, nuevas funciones, una interfaz de usuario mejorada y muchas más mejoras. 
    
    Y hoy, ¡me alegra darte una actualización con los cambios más emocionantes de los últimos meses! Ten en cuenta que hablar de todos los cambios sería demasiado para un solo boletín, así que me centraré en lo más destacado y también publicaré varios vídeos cortos sobre diversas funciones de OpenMates en las próximas semanas en:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
