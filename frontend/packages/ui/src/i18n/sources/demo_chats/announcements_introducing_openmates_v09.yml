    - ⏰ **[תזכורות](https://openmates.org/#settings/apps/reminder):** צור תזכורת לצ'אט כדי לחזור אליו מאוחר יותר — או אפילו הגדר ל-OpenMates לחפש ולסכם את חדשות היום האחרונות בנושא מסוים, למשל.
