    # 🙏 Lời cảm ơn đầu tiên
    
    Vào cuối tháng 12, trong khuôn khổ Chaos Communication Congress, mình đã bất ngờ được mời phỏng vấn trên kênh truyền hình Đức ZDF [(một báo cáo thảo luận về tầm quan trọng của các lựa chọn thay thế tập trung vào quyền riêng tư cho các công ty AI công nghệ lớn)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Và ồ, thật là một trải nghiệm tuyệt vời. Mặc dù OpenMates lúc đó còn khá sơ khai, những người dùng đầu tiên đã bắt đầu đăng ký và sử dụng — đồng thời phát hiện ra các lỗi và trường hợp đặc biệt mà mình không gặp phải khi thử nghiệm trên thiết bị cá nhân, và thật may mắn là họ đã báo cáo chúng. Cảm ơn tất cả mọi người đã làm điều đó — nó thực sự giúp ích rất nhiều trong việc làm cho OpenMates trở nên trau chuốt, ổn định và hoàn thiện hơn! Và tất nhiên, bạn luôn được chào đón để tiếp tục báo cáo các vấn đề nếu nhận thấy bất cứ điều gì không ổn hoặc bị lỗi trên OpenMates.
    
    Mặc dù đây không phải là phần mềm đầu tiên mình tạo ra, nhưng đây là lần đầu tiên có hơn một nhóm nhỏ người bắt đầu sử dụng phần mềm mình xây dựng — cho đến nay đã có hơn 180 người dùng tích cực đang sử dụng OpenMates! Điều này cực kỳ thú vị, và thú thật là lúc đầu cũng hơi choáng ngợp.
    
    Kể từ đó, mình đã tập trung hoàn toàn vào việc cải thiện và sửa lỗi OpenMates, giúp nó hoàn thiện hơn về tính năng và trau chuốt hơn — đồng thời thực hiện rất nhiều thay đổi đối với mã nguồn. Sửa lỗi, tính năng mới, giao diện người dùng được cải thiện và nhiều cải tiến khác. 
    
    Và hôm nay, mình rất vui được cập nhật cho bạn những thay đổi thú vị nhất trong vài tháng qua! Hãy nhớ rằng, nói về tất cả các thay đổi sẽ là quá nhiều cho một bản tin duy nhất — vì vậy thay vào đó, mình sẽ tập trung vào những điểm nổi bật và cũng sẽ xuất bản nhiều video ngắn về các tính năng khác nhau trên OpenMates trong những tuần tới, trên:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Những điểm nổi bật trong những tháng qua
    
    ## 1. 🧩 Các ứng dụng & kỹ năng ứng dụng mới
    
    Ngoài các khả năng hiện có như tìm kiếm trên web, đọc & phân tích trang web và đọc bản ghi video YouTube để bắt đầu thảo luận — OpenMates đã có thêm rất nhiều ứng dụng và kỹ năng ứng dụng mới. Dưới đây là một số điểm nổi bật:
    
    - 🏥 **[Sức khỏe](https://openmates.org/#settings/apps/health/skills/search_appointments):** Bạn đang tìm lịch hẹn bác sĩ? Ứng dụng Sức khỏe hiện có thể kiểm tra Doctolib và Jameda để tìm các khung giờ còn trống.
    - 🏠 **[Nhà ở](https://openmates.org/#settings/apps/home/skills/search):** Tìm kiếm căn hộ trên ImmoScout24, WG-Gesucht và Kleinanzeigen — với các chi tiết chính hiển thị trực tiếp trên OpenMates.
    - 🎉 **[Sự kiện](https://openmates.org/#settings/apps/events/skills/search):** Tìm kiếm & lọc các sự kiện trên Meetup, Luma, Resident Advisor và Google — với các chi tiết như mô tả, hình ảnh, thời gian và địa điểm diễn ra sự kiện, cùng các liên kết trực tiếp để đăng ký tham gia.
    - ✈️ **[Du lịch](https://openmates.org/#settings/apps/travel):** Kỹ năng '[Tìm kiếm kết nối](https://openmates.org/#settings/apps/travel/skills/search_connections)' mới cho phép bạn tìm kiếm các chuyến bay qua Google, trên nhiều kết nối vào các ngày khác nhau cùng lúc — bao gồm đầy đủ chi tiết chuyến bay và liên kết đặt vé. Hỗ trợ cho các kết nối tàu hỏa sẽ sớm ra mắt. Và kỹ năng '[Lịch giá](https://openmates.org/#settings/apps/travel/skills/price_calendar)' hiển thị cho bạn cái nhìn tổng quan nhanh về sự biến động giá trong một tháng.
    - ⏰ **[Nhắc nhở](https://openmates.org/#settings/apps/reminder):** Tạo lời nhắc cho một cuộc trò chuyện để quay lại sau — hoặc thậm chí kích hoạt OpenMates tìm kiếm & tóm tắt tin tức hàng ngày mới nhất cho một chủ đề nhất định, chẳng hạn.
    - 🖼️ **[Hình ảnh](https://openmates.org/#settings/apps/images):** [Tìm kiếm](https://openmates.org/#settings/apps/images/skills/search) hình ảnh trên web, [tạo](https://openmates.org/#settings/apps/images/skills/generate) hình ảnh và [đồ họa vector](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** Tải lên các tệp PDF và đặt câu hỏi về văn bản hoặc thậm chí là bố cục trực quan — OpenMates có thể vừa đọc vừa xem các tệp PDF! 
    - 💻 **[Mã nguồn](https://openmates.org/#settings/apps/code):** OpenMates có thể [tìm kiếm các tài liệu mới nhất](https://openmates.org/#settings/apps/code/skills/get_docs) để trả lời các câu hỏi liên quan đến lập trình, sau đó viết mã — và thậm chí cho phép bạn xem trước các thiết kế trang web và mã trực tiếp trong trình duyệt! Và đây mới chỉ là bước đầu trong khả năng lập trình của nó.
    - 🧮 **[Toán học](https://openmates.org/#settings/apps/math):** Tính toán các biểu thức và thậm chí trực quan hóa các đồ thị, tất cả đều nằm trong OpenMates.
    - 📝 **[Tài liệu](https://openmates.org/#settings/apps/docs):** Yêu cầu tạo các tài liệu Word — và tải chúng xuống dưới dạng tệp .docx.
    - 📊 **[Bảng tính](https://openmates.org/#settings/apps/sheets):** OpenMates cũng có thể tạo các bảng và cho phép bạn tải chúng xuống dưới dạng tệp .xlsx. Cả Tài liệu và Bảng tính sẽ còn tốt hơn và mạnh mẽ hơn nữa trong những tuần tới.
    - 📧 **[Thư điện tử](https://openmates.org/#settings/apps/mail):** OpenMates có thể soạn thảo email cho bạn, sau đó bạn có thể dễ dàng mở & gửi qua chương trình email mặc định trên thiết bị của mình.
    - 🎙️ **[Âm thanh](https://openmates.org/#settings/apps/audio):** Bạn không muốn gõ phím? Hãy ghi âm và gửi tin nhắn thoại cho OpenMates, trực tiếp từ trường tin nhắn.
    
    Và thậm chí còn nhiều kỹ năng ứng dụng khác đã được thêm vào. Chỉ cần [kiểm tra & khám phá các Ứng dụng OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Trình giữ chỗ dữ liệu cá nhân
    
    Không giống như các chatbot AI từ các công ty công nghệ lớn và các công ty khởi nghiệp điển hình, OpenMates được thiết kế với quyền riêng tư của bạn là ưu tiên hàng đầu. Và nó đã có sẵn nhiều biện pháp bảo vệ quyền riêng tư:
    - 🔐 tất cả các cuộc trò chuyện của bạn đều được mã hóa & giải mã chỉ trên thiết bị của bạn
    - 🖼️ tất cả các hình ảnh bên ngoài đều được tải qua máy chủ OpenMates của chúng mình (vì vậy các trang web bên ngoài không thấy địa chỉ IP hoặc thông tin thiết bị của bạn)
    - 📉 không sử dụng Google Analytics hoặc bất kỳ phần mềm phân tích nào khác trên OpenMates (đó cũng là lý do tại sao bạn không thấy biểu ngữ cookie trên OpenMates)
    
    Điểm mới: các dữ liệu nhạy cảm như địa chỉ email, số điện thoại, khóa API và nhiều dữ liệu khác sẽ tự động được phát hiện và thay thế bằng các trình giữ chỗ trên thiết bị của bạn khi bạn soạn thảo và gửi tin nhắn cho OpenMates. Bạn luôn có thể chuyển lại giá trị ban đầu trong giao diện người dùng và bạn có thể nhấp vào dữ liệu đã phát hiện để ngăn chặn việc thay thế. Nhưng theo mặc định, tính năng này đảm bảo rằng cả OpenMates và các nhà cung cấp AI xử lý tin nhắn của bạn sẽ không bao giờ thấy dữ liệu nhạy cảm ngay từ đầu.
    
    [Tự mình trải nghiệm](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — nhấp vào liên kết này để xem Trình giữ chỗ dữ liệu cá nhân hoạt động: email và số điện thoại của bạn sẽ được tự động phát hiện và thay thế trước khi được gửi đến AI.
    
    ## 3. 🧠 Ký ức
    
    OpenMates hiện có thể ghi nhớ các ký ức dành riêng cho ứng dụng, như các chuyến đi sắp tới hoặc chi tiết dự án của bạn. NHƯNG: tất cả các ký ức đều được mã hóa & giải mã chỉ trên thiết bị của bạn và chỉ được chia sẻ tạm thời với máy chủ OpenMates và nhà cung cấp AI nếu bạn xác nhận rõ ràng cho cuộc trò chuyện đó. Điều này cho phép bạn tận dụng tối đa các phản hồi được cá nhân hóa mà không cần lặp lại liên tục các chi tiết dự án của mình — trong khi vẫn hoàn toàn kiểm soát được dữ liệu nào bạn chia sẻ, khi nào và với nhà cung cấp AI nào. Hãy xem [Ký ức trong các Ứng dụng OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Chế độ tập trung
    
    Biết cách đưa ra các hướng dẫn phù hợp cho chatbot AI sẽ tạo ra sự khác biệt lớn về mức độ hữu ích của chatbot và chất lượng của các phản hồi. Với Chế độ tập trung, bạn không cần phải là một chuyên gia về kỹ thuật đặt câu lệnh để tận dụng tối đa các hướng dẫn tuyệt vời và có mục tiêu. Ví dụ, chỉ cần hỏi OpenMates về thông tin nghề nghiệp, và chế độ tập trung 'Thông tin nghề nghiệp' sẽ tự động được kích hoạt để hướng dẫn bạn thực hiện quy trình. Và tất nhiên: đây mới chỉ là bắt đầu. Rất nhiều Chế độ tập trung khác sẽ được thêm vào và chất lượng của những chế độ hiện có sẽ được cải thiện hơn nữa trong những tuần tới. Đừng ngần ngại xem qua các [Chế độ tập trung trong các Ứng dụng OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Các mô hình mới
    
    OpenMates có sự lựa chọn phong phú các mô hình AI hiệu quả và có hiệu suất tốt nhất hiện nay. Theo mặc định, nó sẽ tự động chọn mô hình phù hợp dựa trên nhiệm vụ. Nhưng bạn luôn có thể ghi đè hành vi này [trong cài đặt AI](https://openmates.org/#settings/ai) vĩnh viễn hoặc theo yêu cầu bằng cách đề cập đến một mô hình cụ thể trong trường tin nhắn qua `@{modelname}`. Hiện tại bạn có thể chọn từ một loạt các mô hình AI, ví dụ:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - Các bí danh mô hình `@best` và `@fast` — nhập `@best` để tự động điều hướng đến mô hình mạnh nhất, `@fast` để sử dụng mô hình nhanh nhất hiện có trên OpenMates.
    
    ## 6. 💡 Cảm hứng hàng ngày & Liên kết Wikipedia
    
    AI, nếu được sử dụng đúng cách, có thể là một công cụ tuyệt vời để học tập. Và OpenMates được tối ưu hóa để khuyến khích mọi người học hỏi, khám phá, lấy cảm hứng. Đó là mục đích của Cảm hứng hàng ngày, mà bạn thấy ở đầu giao diện sau khi đăng nhập. Chúng hiển thị các video mới thú vị — và sắp tới là các nội dung khác như bài viết Wikipedia, các tính năng mới của OpenMates, ảnh và chi tiết về các tác phẩm nghệ thuật, các sự kiện lịch sử quan trọng và hơn thế nữa. Cảm hứng hàng ngày được điều chỉnh phù hợp với các cuộc trò chuyện của bạn, sau đó được khóa trên thiết bị của bạn bằng một chiếc chìa khóa mà chỉ bạn mới có — vì vậy chúng luôn riêng tư đối với bạn.
    Ngoài ra, OpenMates cũng tự động làm nổi bật các bài viết Wikipedia trong các phản hồi của tin nhắn trợ lý. Điều này giúp bạn cực kỳ dễ dàng tìm hiểu thêm về một chủ đề bằng cách chỉ cần nhấp vào từ được làm nổi bật màu cam có biểu tượng học tập bên cạnh.
    
    # 🚀 Điều gì sẽ diễn ra tiếp theo
    
    Trong những tuần tới, mình sẽ đăng nhiều đoạn clip ngắn giới thiệu nhiều tính năng của OpenMates và những điều hữu ích mà người ta có thể làm với nó, cũng như tiếp tục cải thiện phần mềm và thêm nhiều ứng dụng, nhà cung cấp và tính năng hơn.
    
    Từ giờ trở đi, kế hoạch của mình là gửi email bản tin cho các thông báo & cập nhật vài tuần một lần, và riêng biệt là các mẹo & thủ thuật về cách sử dụng OpenMates. Đừng ngần ngại [kiểm tra cài đặt bản tin của bạn bất cứ lúc nào](https://openmates.org/#settings/newsletter), nếu bạn muốn nhận nhiều hơn hoặc ít hơn các email bản tin.
    
    Chúc bạn có những trải nghiệm thú vị khi sử dụng OpenMates, và hãy đón chờ thêm nhiều cập nhật mới nhé!
    
