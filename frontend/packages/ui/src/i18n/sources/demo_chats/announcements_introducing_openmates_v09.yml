    # ✨ ไฮไลท์เด่นในช่วงไม่กี่เดือนที่ผ่านมา
    
    ## 1. 🧩 แอปและทักษะใหม่ ๆ ของแอป
    
    นอกเหนือจากความสามารถเดิมในการค้นหาเว็บ การอ่านและวิเคราะห์เว็บไซต์ และการอ่านสคริปต์จากวิดีโอ YouTube เพื่อเริ่มการสนทนา — OpenMates ยังมีแอปและทักษะใหม่ ๆ เพิ่มเติมอีกมากมาย นี่คือไฮไลท์บางส่วนครับ:
    
    - 🏥 **[สุขภาพ](#settings/apps/health/skills/search_appointments):** กำลังมองหานัดหมายแพทย์อยู่ใช่ไหม? แอปสุขภาพสามารถตรวจสอบช่วงเวลาที่ว่างจาก Doctolib และ Jameda ได้แล้ว
    - 🏠 **[บ้าน](#settings/apps/home/skills/search):** ค้นหาอพาร์ตเมนต์ใน ImmoScout24, WG-Gesucht และ Kleinanzeigen — พร้อมรายละเอียดสำคัญที่แสดงให้เห็นโดยตรงบน OpenMates
    - 🎉 **[กิจกรรม](#settings/apps/events/skills/search):** ค้นหาและกรองกิจกรรมใน Meetup, Luma, Resident Advisor และ Google — พร้อมรายละเอียด เช่น คำอธิบาย รูปภาพ เวลาและสถานที่จัดงาน และลิงก์โดยตรงเพื่อตอบรับคำเชิญหรือเข้าร่วม
    - ✈️ **[การเดินทาง](#settings/apps/travel):** ทักษะใหม่ '[ค้นหาเส้นทาง](#settings/apps/travel/skills/search_connections)' ช่วยให้คุณค้นหาเที่ยวบินผ่าน Google ในหลายเส้นทางและหลายวันพร้อมกัน — รวมถึงรายละเอียดเที่ยวบินและลิงก์การจอง ส่วนการรองรับเส้นทางรถไฟจะตามมาในภายหลัง และทักษะ '[ปฏิทินราคา](#settings/apps/travel/skills/price_calendar)' จะแสดงภาพรวมการเปลี่ยนแปลงของราคาตลอดทั้งเดือนให้คุณเห็นอย่างรวดเร็ว
    - ⏰ **[การแจ้งเตือน](#settings/apps/reminder):** สร้างการแจ้งเตือนสำหรับแชทเพื่อกลับมาดูภายหลัง — หรือแม้แต่ตั้งให้ OpenMates ค้นหาและสรุปข่าวประจำวันล่าสุดในหัวข้อที่กำหนด เป็นต้น
    - 🖼️ **[รูปภาพ](#settings/apps/images):** [ค้นหา](#settings/apps/images/skills/search)รูปภาพบนเว็บ [สร้าง](#settings/apps/images/skills/generate)รูปภาพ และ[กราฟิกเวกเตอร์](#settings/apps/images/skills/vectorize)
    - 📄 **[PDF](#settings/apps/pdf):** อัปโหลด PDF และถามคำถามเกี่ยวกับข้อความหรือแม้แต่เลย์เอาต์ที่มองเห็น — OpenMates สามารถทั้งอ่านและดู PDF ได้! 
    - 💻 **[โค้ด](#settings/apps/code):** OpenMates สามารถ[ค้นหาเอกสารล่าสุด](#settings/apps/code/skills/get_docs)เพื่อตอบคำถามเกี่ยวกับการเขียนโค้ด จากนั้นเขียนโค้ด — และยังให้คุณดูตัวอย่างการออกแบบเว็บไซต์และโค้ดได้โดยตรงในเบราว์เซอร์! และนี่เป็นเพียงจุดเริ่มต้นของความสามารถด้านการเขียนโค้ดเท่านั้น
    - 🧮 **[คณิตศาสตร์](#settings/apps/math):** คำนวณนิพจน์และแสดงกราฟพล็อต ทั้งหมดนี้ทำได้ภายใน OpenMates
    - 📝 **[เอกสาร](#settings/apps/docs):** สั่งให้สร้างเอกสาร Word — และดาวน์โหลดเป็นไฟล์ .docx
    - 📊 **[ชีต](#settings/apps/sheets):** OpenMates ยังสามารถสร้างตารางและให้คุณดาวน์โหลดเป็นไฟล์ .xlsx ได้ด้วย ทั้ง Docs และ Sheets จะเก่งขึ้นและทรงพลังยิ่งขึ้นในสัปดาห์ต่อ ๆ ไป
    - 📧 **[เมล](#settings/apps/mail):** OpenMates สามารถร่างอีเมลให้คุณ ซึ่งคุณสามารถเปิดและส่งผ่านโปรแกรมอีเมลหลักบนอุปกรณ์ของคุณได้อย่างง่ายดาย
    - 🎙️ **[เสียง](#settings/apps/audio):** ไม่อยากพิมพ์ใช่ไหม? บันทึกและส่งข้อความเสียงถึง OpenMates ได้โดยตรงจากช่องข้อความ
    
    และยังมีทักษะแอปอื่น ๆ อีกมากมายที่ถูกเพิ่มเข้ามา ลอง[ตรวจสอบและสำรวจแอป OpenMates](#settings/apps) ได้เลยครับ
    
    ## 2. 🔒 ตัวแทนที่ข้อมูลส่วนบุคคล (Personal Data Placeholders)
    
    ต่างจากแชทบอท AI จากบริษัทเทคโนโลยียักษ์ใหญ่และสตาร์ทอัพทั่วไป OpenMates ถูกออกแบบโดยให้ความเป็นส่วนตัวของคุณเป็นสิ่งสำคัญอันดับแรก และเรามีมาตรการคุ้มครองความเป็นส่วนตัวต่าง ๆ อยู่แล้ว:
    - 🔐 แชททั้งหมดของคุณจะถูกเข้ารหัสและถอดรหัสบนอุปกรณ์ของคุณเท่านั้น
    - 🖼️ รูปภาพภายนอกทั้งหมดจะถูกโหลดผ่านเซิร์ฟเวอร์ OpenMates ของเรา (ดังนั้นเว็บไซต์ภายนอกจะไม่เห็นที่อยู่ IP หรือข้อมูลอุปกรณ์ของคุณ)
    - 📉 ไม่มีการใช้ Google Analytics หรือซอฟต์แวร์วิเคราะห์อื่น ๆ บน OpenMates (ซึ่งเป็นเหตุผลว่าทำไมคุณถึงไม่เห็นแบนเนอร์คุกกี้บน OpenMates)
    
    สิ่งใหม่: ข้อมูลที่ละเอียดอ่อน เช่น ที่อยู่อีเมล เบอร์โทรศัพท์ คีย์ API และอื่น ๆ จะถูกตรวจพบโดยอัตโนมัติและแทนที่ด้วยตัวแทนที่บนอุปกรณ์ของคุณ เมื่อคุณร่างและส่งข้อความถึง OpenMates คุณสามารถสลับกลับไปใช้ค่าเดิมได้เสมอในส่วนติดต่อผู้ใช้ และคุณสามารถคลิกที่ข้อมูลที่ตรวจพบเพื่อป้องกันการแทนที่ได้ แต่โดยค่าเริ่มต้น ฟีเจอร์นี้จะช่วยให้มั่นใจว่าทั้ง OpenMates และผู้ให้บริการ AI ที่ประมวลผลข้อความของคุณจะไม่เห็นข้อมูลที่ละเอียดอ่อนตั้งแต่แรก
    
    [ลองด้วยตัวเอง](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — คลิกที่ลิงก์นี้เพื่อดูการทำงานของตัวแทนที่ข้อมูลส่วนบุคคล: อีเมลและเบอร์โทรศัพท์ของคุณจะถูกตรวจพบและแทนที่โดยอัตโนมัติก่อนที่จะถูกส่งไปยัง AI
    
    ## 3. 🧠 ความจำ (Memories)
    
    ตอนนี้ OpenMates สามารถจดจำข้อมูลเฉพาะของแอปได้แล้ว เช่น ทริปที่กำลังจะมาถึงหรือรายละเอียดโปรเจกต์ แต่: ความจำทั้งหมดจะถูกเข้ารหัสและถอดรหัสบนอุปกรณ์ของคุณเท่านั้น และจะถูกแชร์กับเซิร์ฟเวอร์ OpenMates และผู้ให้บริการ AI เป็นการชั่วคราวก็ต่อเมื่อคุณยืนยันอย่างชัดเจนสำหรับแชทนั้น ๆ เท่านั้น สิ่งนี้ช่วยให้คุณใช้ประโยชน์จากการตอบกลับที่ปรับให้เหมาะกับคุณได้อย่างเต็มที่โดยไม่ต้องพูดซ้ำรายละเอียดโปรเจกต์ของคุณ — ในขณะที่ยังคงควบคุมข้อมูลที่คุณแชร์ได้เต็มที่ ว่าจะแชร์เมื่อไหร่ และแชร์กับผู้ให้บริการ AI รายใด ตรวจสอบ[ความจำในแอป OpenMates](#settings/apps/all/memories)
    
    ## 4. 🎯 โหมดโฟกัส (Focus Modes)
    
    การรู้วิธีให้คำสั่งที่ถูกต้องแก่แชทบอท AI จะสร้างความแตกต่างอย่างมากในแง่ของความช่วยเหลือและคุณภาพของการตอบกลับ ด้วยโหมดโฟกัส คุณไม่จำเป็นต้องเป็นผู้เชี่ยวชาญด้านการเขียนคำสั่ง (Prompt Engineering) เพื่อใช้ประโยชน์จากคำสั่งที่ยอดเยี่ยมและตรงจุด เพียงแค่ถาม OpenMates เกี่ยวกับข้อมูลเชิงลึกด้านอาชีพ เป็นต้น โหมดโฟกัส 'ข้อมูลเชิงลึกด้านอาชีพ' ก็จะเปิดใช้งานโดยอัตโนมัติเพื่อแนะนำคุณตลอดกระบวนการ และแน่นอน: นี่เป็นเพียงจุดเริ่มต้นเท่านั้น โหมดโฟกัสอื่น ๆ จะถูกเพิ่มเข้ามาอีกมากมาย และคุณภาพของโหมดที่มีอยู่จะถูกปรับปรุงให้ดียิ่งขึ้นในสัปดาห์ต่อ ๆ ไป ลองตรวจสอบ[โหมดโฟกัสในแอป OpenMates](#settings/apps/all/focus-modes)
    
    ## 5. 🤖 โมเดลใหม่ ๆ
    
    OpenMates มีโมเดล AI ที่มีประสิทธิภาพและทำงานได้ดีที่สุดให้เลือกมากมาย โดยค่าเริ่มต้น ระบบจะเลือกโมเดลที่เหมาะสมตามงานให้โดยอัตโนมัติ แต่คุณสามารถเปลี่ยนการตั้งค่านี้[ในการตั้งค่า AI](#settings/ai) ได้อย่างถาวร หรือเลือกใช้ตามต้องการโดยระบุชื่อโมเดลในช่องข้อความผ่าน `@{modelname}` ตอนนี้คุณสามารถเลือกจากโมเดล AI ที่หลากหลาย เช่น:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) และ [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) และ [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - ชื่อเรียกโมเดล `@best` และ `@fast` — พิมพ์ `@best` เพื่อเลือกโมเดลที่แข็งแกร่งที่สุดโดยอัตโนมัติ หรือ `@fast` เพื่อใช้โมเดลที่เร็วที่สุดที่มีใน OpenMates
    
    ## 6. 💡 แรงบันดาลใจรายวันและลิงก์ Wikipedia
    
    หากใช้ AI อย่างเหมาะสม มันจะเป็นเครื่องมือที่ยอดเยี่ยมสำหรับการเรียนรู้ และ OpenMates ถูกปรับแต่งมาเพื่อส่งเสริมให้ผู้คนได้เรียนรู้ สำรวจ และรับแรงบันดาลใจ นั่นคือที่มาของแรงบันดาลใจรายวัน (Daily Inspirations) ที่คุณเห็นที่ด้านบนของหน้าจอหลังจากเข้าสู่ระบบ ซึ่งจะแสดงวิดีโอใหม่ ๆ ที่น่าสนใจ — และในเร็ว ๆ นี้จะมีเนื้อหาอื่น ๆ เช่น บทความ Wikipedia, ฟีเจอร์ใหม่ของ OpenMates, ภาพถ่ายและรายละเอียดของงานศิลปะ, เหตุการณ์สำคัญทางประวัติศาสตร์ และอื่น ๆ แรงบันดาลใจรายวันจะถูกปรับให้เหมาะกับแชทของคุณ จากนั้นจะถูกล็อกไว้บนอุปกรณ์ของคุณด้วยกุญแจที่มีเพียงคุณเท่านั้นที่มี — ดังนั้นข้อมูลเหล่านี้จึงเป็นส่วนตัวสำหรับคุณ
    นอกจากนี้ OpenMates ยังไฮไลท์บทความ Wikipedia ในการตอบกลับของข้อความผู้ช่วยโดยอัตโนมัติ ซึ่งช่วยให้เรียนรู้เพิ่มเติมเกี่ยวกับหัวข้อต่าง ๆ ได้ง่ายมาก เพียงแค่คลิกที่คำที่ไฮไลท์สีส้มพร้อมไอคอนรูปการศึกษาข้าง ๆ
    
    # 🚀 สิ่งที่จะเกิดขึ้นต่อไป
    
    ในสัปดาห์ต่อ ๆ ไป ผมจะโพสต์คลิปสั้น ๆ หลายคลิปเพื่อแสดงฟีเจอร์ต่าง ๆ ของ OpenMates และสิ่งที่มีประโยชน์ที่คุณสามารถทำได้ รวมถึงปรับปรุงซอฟต์แวร์เพิ่มเติมและเพิ่มแอป ผู้ให้บริการ และฟีเจอร์ใหม่ ๆ
    
    จากนี้ไป ผมวางแผนที่จะส่งอีเมลจดหมายข่าวเพื่อประกาศและอัปเดตทุก ๆ สองสามสัปดาห์ และจะแยกส่งเคล็ดลับและเทคนิคการใช้งาน OpenMates ด้วย คุณสามารถ[ตรวจสอบการตั้งค่าจดหมายข่าวของคุณได้ตลอดเวลา](#settings/newsletter) หากต้องการรับอีเมลจดหมายข่าวมากขึ้นหรือน้อยลง
    
    ขอให้สนุกกับการใช้งาน OpenMates และคอยติดตามการอัปเดตเพิ่มเติมนะครับ!
  cs: |
    Ahoj,
    tady Marco (neboli [glowingkitty](https://github.com/glowingkitty)) – tvůrce OpenMates.
    Na OpenMates jsem nezapomněl – právě naopak. 
    
    # 🙏 Nejdříve pár slov díků
    
    Koncem prosince jsem byl v souvislosti s akcí Chaos Communication Congress nečekaně požádán o rozhovor pro německý televizní kanál ZDF [(reportáž o významu alternativ k AI velkých technologických firem zaměřených na soukromí)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). A páni, to byl zážitek. Přestože OpenMates v té době mělo ještě své mouchy, začali se registrovat a používat ho první lidé – a také nacházet chyby a okrajové případy, na které jsem při testování na vlastních zařízeních nenarazil, a díky bohu je nahlásili. Velké díky všem, kteří tak učinili – opravdu to moc pomohlo k tomu, aby bylo OpenMates vyladěnější, stabilnější a kompletnější! A samozřejmě můžete chyby hlásit i nadále, pokud si všimnete čehokoli, co na OpenMates nefunguje správně.
    
    I když to nebyl první software, který jsem vytvořil, bylo to poprvé, co můj výtvor začalo používat více než jen hrstka lidí – OpenMates má k dnešnímu dni přes 180 aktivních uživatelů! Bylo to nesmírně vzrušující a přiznám se, že zpočátku i trochu ohromující.
    
    Od té doby jsem se plně soustředil na vylepšování a ladění OpenMates, aby bylo funkčně kompletnější a vyladěnější – a v kódu jsem provedl spoustu změn. Opravy chyb, nové funkce, vylepšené uživatelské rozhraní a mnoho dalších vylepšení. 
    
    A dnes ti s radostí přináším přehled nejzajímavějších změn za posledních několik měsíců! Měj na paměti, že mluvit o všech změnách by vydalo na víc než jeden newsletter – proto se zaměřím na to nejdůležitější a v nadcházejících týdnech také zveřejním několik krátkých videí o různých funkcích OpenMates na:
    - [Instagramu](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodonu](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ To nejdůležitější z posledních měsíců
    
    ## 1. 🧩 Nové aplikace a dovednosti
    
    Kromě stávajících schopností prohledávat web, číst a analyzovat webové stránky a číst přepisy videí na YouTube pro zahájení diskusí – OpenMates získalo spoustu nových aplikací a dovedností. Zde jsou některé z nich:
    
    - 🏥 **[Zdraví](#settings/apps/health/skills/search_appointments):** Hledáš termín u lékaře? Aplikace Zdraví nyní dokáže zkontrolovat volné termíny na Doctolib a Jameda.
    - 🏠 **[Domov](#settings/apps/home/skills/search):** Hledej byty na ImmoScout24, WG-Gesucht a Kleinanzeigen – s klíčovými detaily viditelnými přímo v OpenMates.
    - 🎉 **[Události](#settings/apps/events/skills/search):** Hledej a filtruj události na Meetup, Luma, Resident Advisor a Google – s podrobnostmi, jako jsou popisy, obrázky, čas a místo konání a přímé odkazy na registraci nebo účast.
    - ✈️ **[Cestování](#settings/apps/travel):** Nová dovednost „[Hledat spojení](#settings/apps/travel/skills/search_connections)“ ti umožní vyhledávat lety přes Google, a to napříč více spojeními v různých dnech současně – vč. kompletních podrobností o letu a odkazů na rezervaci. Podpora vlakových spojení bude následovat. A dovednost „[Cenový kalendář](#settings/apps/travel/skills/price_calendar)“ ti ukáže rychlý přehled vývoje cen v průběhu měsíce.
    - ⏰ **[Připomínky](#settings/apps/reminder):** Vytvoř si připomínku k chatu, aby ses k němu mohl vrátit později – nebo dokonce nechej OpenMates vyhledat a shrnout nejnovější denní zprávy pro dané téma.
    - 🖼️ **[Obrázky](#settings/apps/images):** [Hledej](#settings/apps/images/skills/search) obrázky na webu, [generuj](#settings/apps/images/skills/generate) obrázky a [vektorovou grafiku](#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](#settings/apps/pdf):** Nahraj PDF a ptej se na text nebo dokonce na vizuální rozvržení – OpenMates umí PDF číst i prohlížet! 
    - 💻 **[Kód](#settings/apps/code):** OpenMates dokáže [vyhledat nejnovější dokumentaci](#settings/apps/code/skills/get_docs) pro zodpovězení otázek týkajících se programování, poté napsat kód – a dokonce ti umožní zobrazit náhledy webového designu a kódu přímo v prohlížeči! A to je jen začátek jeho programátorských schopností.
    - 🧮 **[Matematika](#settings/apps/math):** Počítej výrazy a dokonce vizualizuj grafy, to vše v rámci OpenMates.
    - 📝 **[Dokumenty](#settings/apps/docs):** Nechej si vygenerovat dokumenty Word – a stáhni si je jako soubory .docx.
    - 📊 **[Tabulky](#settings/apps/sheets):** OpenMates umí také vytvářet tabulky a umožní ti je stáhnout jako soubory .xlsx. Dokumenty i Tabulky budou v nadcházejících týdnech ještě lepší a výkonnější.
    - 📧 **[E-mail](#settings/apps/mail):** OpenMates pro tebe může připravit návrhy e-mailů, které pak snadno otevřeš a odešleš prostřednictvím výchozího e-mailového programu ve tvém zařízení.
    - 🎙️ **[Audio](#settings/apps/audio):** Nechce se ti psát? Nahraj a pošli OpenMates hlasovou zprávu přímo z pole pro zprávu.
    
    A přibylo ještě více dovedností aplikací. Stačí se [podívat a prozkoumat aplikace OpenMates](#settings/apps).
    
    ## 2. 🔒 Zástupné symboly pro osobní údaje
    
    Na rozdíl od AI chatbotů velkých technologických firem a typických startupů je OpenMates navrženo s důrazem na tvé soukromí jako hlavní prioritu. Již nyní má zavedeny různé ochrany soukromí:
    - 🔐 všechny tvé chaty jsou šifrovány a dešifrovány pouze ve tvém zařízení
    - 🖼️ všechny externí obrázky se načítají přes náš server OpenMates (takže externí webové stránky nevidí tvou IP adresu ani informace o zařízení)
    - 📉 v OpenMates se nepoužívá Google Analytics ani žádný jiný analytický software (proto také v OpenMates nevidíš cookie lištu)
    
    Co je nového: citlivé údaje, jako jsou e-mailové adresy, telefonní čísla, API klíče a další, jsou ve tvém zařízení automaticky detekovány a nahrazeny zástupnými symboly, když připravuješ a odesíláš zprávu OpenMates. V uživatelském rozhraní se můžeš kdykoli vrátit k původní hodnotě a kliknutím na detekované údaje nahrazení zabránit. Ve výchozím nastavení však tato funkce zajišťuje, že ani OpenMates, ani poskytovatelé AI, kteří zpracovávají tvé zprávy, citlivé údaje vůbec neuvidí.
    
    [Vyzkoušej si to sám](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) – klikni na tento odkaz a uvidíš zástupné symboly pro osobní údaje v akci: tvůj e-mail a telefonní číslo budou před odesláním do AI automaticky detekovány a nahrazeny.
    
    ## 3. 🧠 Vzpomínky
    
    OpenMates si nyní může pamatovat vzpomínky specifické pro aplikaci, jako jsou tvé nadcházející cesty nebo detaily projektů. ALE: všechny vzpomínky jsou šifrovány a dešifrovány pouze ve tvém zařízení a se serverem OpenMates a poskytovatelem AI jsou sdíleny pouze dočasně, pokud to pro daný chat výslovně potvrdíš. To ti umožní plně využívat personalizované odpovědi, aniž bys musel neustále opakovat detaily svého projektu – a přitom si zachováš plnou kontrolu nad tím, jaká data sdílíš, kdy a se kterým poskytovatelem AI. Podívej se na [Vzpomínky v aplikacích OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Režimy soustředění
    
    Vědět, jak dát AI chatbotovi správné instrukce, hraje obrovskou roli v tom, jak užitečný chatbot bude a jaká bude kvalita jeho odpovědí. S Režimy soustředění nemusíš být odborníkem na prompt engineering, abys mohl plně využívat skvělé a cílené instrukce. Stačí se OpenMates zeptat například na kariérní postřehy a režim soustředění „Kariérní postřehy“ by se měl automaticky aktivovat, aby tě procesem provedl. A samozřejmě: toto je jen začátek. Přibude mnohem více režimů soustředění a kvalita těch stávajících se bude v nadcházejících týdnech dále zlepšovat. Neváhej prozkoumat [Režimy soustředění v aplikacích OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nové modely
    
    OpenMates nabízí široký výběr nejefektivnějších a nejvýkonnějších AI modelů na trhu. Ve výchozím nastavení automaticky vybírá ten správný podle úkolu. Toto chování však můžeš kdykoli trvale změnit [v nastavení AI](#settings/ai), nebo podle potřeby zmíněním konkrétního modelu v poli pro zprávu pomocí `@{modelname}`. Nyní si můžeš vybrat ze široké škály AI modelů, například:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - aliasy modelů `@best` a `@fast` – napiš `@best` pro automatické směrování na nejsilnější model, `@fast` pro použití nejrychlejšího modelu dostupného v OpenMates.
    
    ## 6. 💡 Denní inspirace a odkazy na Wikipedii
    
    AI, pokud se používá správně, může být úžasným nástrojem pro učení. A OpenMates je optimalizováno tak, aby povzbuzovalo lidi k učení, objevování a hledání inspirace. K tomu slouží Denní inspirace, které vidíš v horní části rozhraní po přihlášení. Ukazují zajímavá nová videa – a brzy i další obsah, jako jsou články na Wikipedii, nové funkce OpenMates, fotografie a detaily uměleckých děl, důležité historické události a další. Denní inspirace jsou přizpůsobeny tvým chatům a poté uzamčeny ve tvém zařízení klíčem, který máš pouze ty – takže zůstávají soukromé.
    Kromě toho OpenMates v odpovědích asistenta automaticky zvýrazňuje články na Wikipedii. Díky tomu je velmi snadné dozvědět se o tématu více pouhým kliknutím na oranžově zvýrazněné slovo s ikonou studia vedle něj.
    
