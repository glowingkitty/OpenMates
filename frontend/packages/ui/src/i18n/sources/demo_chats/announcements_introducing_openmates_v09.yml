    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** העלה קבצי PDF ושאל שאלות על הטקסט או אפילו על הפריסה הוויזואלית — OpenMates יכולה גם לקרוא וגם להציג קבצי PDF! 
    - 💻 **[קוד](https://openmates.org/#settings/apps/code):** OpenMates יכולה [לחפש את התיעוד העדכני ביותר](https://openmates.org/#settings/apps/code/skills/get_docs) כדי לענות על שאלות הקשורות לתכנות, ואז לכתוב קוד — ואפילו לאפשר לך לראות תצוגה מקדימה של עיצובי אתרים וקוד ישירות בדפדפן! וזו רק ההתחלה המוקדמת של יכולות התכנות שלה.
    - 🧮 **[מתמטיקה](https://openmates.org/#settings/apps/math):** חשב ביטויים ואפילו הצג גרפים, הכל בתוך OpenMates.
    - 📝 **[מסמכים](https://openmates.org/#settings/apps/docs):** בקש ליצור מסמכי Word — והורד אותם כקבצי .docx.
    - 📊 **[גיליונות נתונים](https://openmates.org/#settings/apps/sheets):** OpenMates יכולה גם ליצור טבלאות ולאפשר לך להוריד אותן כקבצי .xlsx. גם 'מסמכים' וגם 'גיליונות נתונים' יהפכו לטובים וחזקים עוד יותר בשבועות הקרובים.
    - 📧 **[דוא"ל](https://openmates.org/#settings/apps/mail):** OpenMates יכולה לנסח עבורך מיילים, אותם תוכל לפתוח ולשלוח בקלות דרך תוכנת המייל המוגדרת כברירת מחדל במכשיר שלך.
    - 🎙️ **[אודיו](https://openmates.org/#settings/apps/audio):** לא רוצה להקליד? הקלט ושלח הודעה קולית ל-OpenMates, ישירות משדה ההודעה.
    
    ומיומנויות אפליקציה נוספות נוספו. פשוט [כנס וחקור את אפליקציות OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 ממלאי מקום לנתונים אישיים
    
    בניגוד לצ'אטבוטים של חברות טכנולוגיה גדולות וסטארט-אפים טיפוסיים, OpenMates תוכננה כשהפרטיות שלך היא בעדיפות עליונה. וכבר היו בה הגנות פרטיות שונות:
    - 🔐 כל הצ'אטים שלך מוצפנים ומפוענחים במכשיר שלך בלבד
    - 🖼️ כל התמונות החיצוניות נטענות דרך שרת OpenMates שלנו (כך שאתרים חיצוניים לא רואים את כתובת ה-IP שלך או את פרטי המכשיר שלך)
    - 📉 לא נעשה שימוש ב-Google Analytics או בכל תוכנת ניתוח אחרת ב-OpenMates (וזו גם הסיבה שאתה לא רואה באנר עוגיות ב-OpenMates)
    
    מה חדש: נתונים רגישים כמו כתובות אימייל, מספרי טלפון, מפתחות API ועוד מזוהים אוטומטית ומוחלפים בממלאי מקום במכשיר שלך, כשאתה מנסח ושולח הודעה ל-OpenMates. תמיד תוכל לחזור לערך המקורי בממשק המשתמש, ותוכל ללחוץ על נתונים שזוהו כדי למנוע את ההחלפה. אך כברירת מחדל, תכונה זו מבטיחה שלא OpenMates ולא ספקי ה-AI שמעבדים את ההודעות שלך יראו אי פעם את הנתונים הרגישים מלכתחילה.
    
    [נסה זאת בעצמך](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — לחץ על קישור זה כדי לראות את ממלאי המקום לנתונים אישיים בפעולה: האימייל ומספר הטלפון שלך יזוהו אוטומטית ויוחלפו לפני שיישלחו ל-AI.
    
    ## 3. 🧠 זיכרונות
    
    OpenMates יכולה כעת לזכור זיכרונות ספציפיים לאפליקציה, כמו הטיולים הקרובים שלך או פרטי פרויקט. אבל: כל הזיכרונות מוצפנים ומפוענחים רק במכשיר שלך, ומשותפים באופן זמני עם שרת OpenMates וספק ה-AI רק אם תאשר זאת במפורש עבור הצ'אט הנתון. זה מאפשר לך להפיק את המרב מתגובות מותאמות אישית מבלי לחזור כל הזמן על פרטי הפרויקט שלך — תוך שמירה על שליטה מלאה באילו נתונים אתה משתף, מתי ועם איזה ספק AI. בדוק את ה[זיכרונות באפליקציות OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 מצבי מיקוד
    
    הידיעה כיצד לתת את ההנחיות הנכונות לצ'אטבוט AI עושה הבדל עצום במידת העזרה של הצ'אטבוט ובאיכות התגובות. עם מצבי מיקוד, אינך צריך להיות מומחה בהנדסת פרומפטים כדי להפיק את המרב מהנחיות מצוינות וממוקדות. פשוט בקש מ-OpenMates תובנות קריירה, למשל, ומצב המיקוד 'תובנות קריירה' אמור להיות מופעל אוטומטית כדי להדריך אותך בתהליך. וכמובן: זו רק ההתחלה. מצבי מיקוד רבים נוספים יתווספו, ואיכות הקיימים תשתפר עוד יותר בשבועות הקרובים. אתה מוזמן לבדוק את [מצבי המיקוד באפליקציות OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 מודלים חדשים
    
    ל-OpenMates יש מבחר רחב של מודלי ה-AI היעילים והביצועיים ביותר שיש. כברירת מחדל, היא בוחרת אוטומטית את המודל הנכון בהתאם למשימה. אבל תמיד תוכל לשנות התנהגות זו [בהגדרות ה-AI](https://openmates.org/#settings/ai) לצמיתות, או לפי דרישה על ידי ציון מודל ספציפי בשדה ההודעה באמצעות `@{modelname}`. כעת תוכל לבחור מתוך מגוון רחב של מודלי AI, למשל:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) ו-[Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) ו-[Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - כינויי מודל `@best` ו-`@fast` — הקלד `@best` כדי לנתב אוטומטית למודל החזק ביותר, ו-`@fast` כדי להשתמש במודל המהיר ביותר הזמין ב-OpenMates.
    
    ## 6. 💡 השראות יומיות וקישורי ויקיפדיה
    
    AI, אם משתמשים בו נכון, יכול להיות כלי מדהים ללמידה. ו-OpenMates מותאמת לעודד אנשים ללמוד, לחקור ולקבל השראה. לשם כך נועדו ה'השראות היומיות', אותן ניתן לראות בחלק העליון של הממשק לאחר ההתחברות. הן מציגות סרטונים חדשים ומעניינים — ובקרוב גם תכנים אחרים כמו ערכי ויקיפדיה, תכונות חדשות של OpenMates, תמונות ופרטים של יצירות אמנות, אירועים היסטוריים חשובים ועוד. ההשראות היומיות מותאמות אישית לצ'אטים שלך, ואז ננעלות על המכשיר שלך עם מפתח שיש רק לך — כך שהן נשארות פרטיות עבורך.
    בנוסף, OpenMates מדגישה אוטומטית ערכי ויקיפדיה בתגובות של הודעות העוזר. זה הופך את הלמידה על נושא לקלה במיוחד על ידי לחיצה על המילה המודגשת בכתום עם סמל הלמידה לידה.
    
    # 🚀 מה הלאה
    
    בשבועות הקרובים אפרסם סרטונים קצרים שונים המציגים את התכונות הרבות של OpenMates ואת הדברים המועילים שניתן לעשות איתה, וכן אמשיך לשפר את התוכנה ולהוסיף עוד אפליקציות, ספקים ותכונות.
    
    מעתה התוכנית שלי היא לשלוח מיילים של ניוזלטר עבור הודעות ועדכונים מדי כמה שבועות, ובנפרד גם טיפים וטריקים כיצד להשתמש ב-OpenMates. אתה מוזמן [לבדוק את הגדרות הניוזלטר שלך בכל עת](https://openmates.org/#settings/newsletter), אם תרצה לקבל יותר או פחות מיילים של ניוזלטר.
    
    תהנה מהשימוש ב-OpenMates, והישאר מעודכן לעדכונים נוספים!
    
