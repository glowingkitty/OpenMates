    # 🙏 Först några tackord
    
    I slutet av december, i samband med Chaos Communication Congress, blev jag oväntat tillfrågad om en intervju i den tyska TV-kanalen ZDF [(ett reportage om vikten av integritetsfokuserade alternativ till big tech-AI-företag)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Och wow, vilken upplevelse. Trots att OpenMates var betydligt mer oslipat på den tiden började de första personerna registrera sig och använda det — och de hittade även buggar och specialfall som jag inte upplevt under mina egna tester, och som de tack och lov rapporterade. Stort tack till alla som gjorde det — det hjälpte verkligen till att göra OpenMates mer polerat, stabilt och komplett! Och du är självklart mer än välkommen att fortsätta rapportera problem om du märker att något känns fel eller trasigt i OpenMates.
    
    Även om detta inte var den första programvaran jag skapat, var det första gången som mer än en handfull människor började använda något jag byggt — över 180 aktiva användare använder OpenMates hittills! Det har varit superroligt, och ärligt talat även lite överväldigande till en början.
    
    Sedan dess har jag fokuserat helt på att förbättra och felsöka OpenMates, och göra det mer komplett och polerat — och jag har gjort massor av ändringar i koden. Buggfixar, nya funktioner, ett förbättrat användargränssnitt och många andra förbättringar. 
    
    Och idag är jag glad att kunna ge dig en uppdatering med de mest spännande ändringarna från de senaste månaderna! Tänk på att det skulle bli för mycket för ett enda nyhetsbrev att prata om alla ändringar — så istället fokuserar jag på höjdpunkterna och kommer även att publicera flera korta videor om olika funktioner i OpenMates under de kommande veckorna på:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Höjdpunkterna från de senaste månaderna
    
    ## 1. 🧩 Nya appar & app-färdigheter
    
    Utöver de befintliga funktionerna för att söka på webben, läsa och analysera webbplatser och läsa transkriptioner av YouTube-videor för att starta diskussioner — har OpenMates fått massor av nya appar och app-färdigheter. Här är några höjdpunkter:
    
    - 🏥 **[Hälsa](https://openmates.org/#settings/apps/health/skills/search_appointments):** Letar du efter läkartider? Hälso-appen kan nu söka på Doctolib och Jameda efter lediga tider.
    - 🏠 **[Hem](https://openmates.org/#settings/apps/home/skills/search):** Sök efter lägenheter på ImmoScout24, WG-Gesucht och Kleinanzeigen — med de viktigaste detaljerna direkt synliga i OpenMates.
    - 🎉 **[Events](https://openmates.org/#settings/apps/events/skills/search):** Sök och filtrera efter evenemang på Meetup, Luma, Resident Advisor och Google — med detaljer som beskrivningar, bilder, när och var evenemangen äger rum, samt direktlänkar för att osa eller delta.
    - ✈️ **[Resor](https://openmates.org/#settings/apps/travel):** Den nya färdigheten '[Sök anslutning](https://openmates.org/#settings/apps/travel/skills/search_connections)' låter dig söka efter flyg via Google, över flera anslutningar på olika dagar samtidigt — inkl. fullständiga flyguppgifter och bokningslänkar. Stöd för tåganslutningar kommer senare. Och färdigheten '[Priskalender](https://openmates.org/#settings/apps/travel/skills/price_calendar)' ger dig en snabb överblick över prisutvecklingen under en månad.
    - ⏰ **[Påminnelser](https://openmates.org/#settings/apps/reminder):** Skapa en påminnelse för en chatt för att återkomma till den senare — eller få OpenMates att till exempel söka efter och sammanfatta de senaste dagliga nyheterna om ett visst ämne.
    - 🖼️ **[Bilder](https://openmates.org/#settings/apps/images):** [Sök](https://openmates.org/#settings/apps/images/skills/search) efter bilder på webben, [generera](https://openmates.org/#settings/apps/images/skills/generate) bilder och [vektorgrafik](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF-filer](https://openmates.org/#settings/apps/pdf):** Ladda upp PDF-filer och ställ frågor om texten eller till och med den visuella layouten — OpenMates kan både läsa och se PDF-filer! 
    - 💻 **[Kod](https://openmates.org/#settings/apps/code):** OpenMates kan [söka efter den senaste dokumentationen](https://openmates.org/#settings/apps/code/skills/get_docs) för att svara på kodningsrelaterade frågor, sedan skriva kod — och till och med låta dig förhandsgranska webbplatsdesign och kod direkt i webbläsaren! Och detta är bara den tidiga början på dess kodningsförmåga.
    - 🧮 **[Matematik](https://openmates.org/#settings/apps/math):** Beräkna uttryck och till och med visualisera grafer, allt inom OpenMates.
    - 📝 **[Dokument](https://openmates.org/#settings/apps/docs):** Be om att få Word-dokument genererade — och ladda ner dem som .docx-filer.
    - 📊 **[Kalkylark](https://openmates.org/#settings/apps/sheets):** OpenMates kan också skapa tabeller och låta dig ladda ner dem som .xlsx-filer. Och både Docs och Sheets kommer att bli ännu bättre och kraftfullare under de kommande veckorna.
    - 📧 **[E-post](https://openmates.org/#settings/apps/mail):** OpenMates kan skriva utkast till e-postmeddelanden åt dig, som du sedan enkelt kan öppna och skicka via ditt standardprogram för e-post på din enhet.
    - 🎙️ **[Ljud](https://openmates.org/#settings/apps/audio):** Vill du inte skriva? Spela in och skicka ett röstmeddelande till OpenMates, direkt från meddelandefältet.
    
    Och ännu fler app-färdigheter har lagts till. Det är bara att [kolla in och utforska OpenMates-apparna](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Platshållare för personuppgifter
    
    Till skillnad från AI-chatbottar från stora teknikföretag och typiska startups är OpenMates designat med din integritet som högsta prioritet. Och det hade redan flera integritetsskydd på plats:
    - 🔐 alla dina chattar krypteras och dekrypteras endast på din enhet
    - 🖼️ alla externa bilder laddas via vår OpenMates-server (så att externa webbplatser inte ser din IP-adress eller enhetsinformation)
    - 📉 ingen Google Analytics eller annan analysprogramvara används på OpenMates (vilket också är anledningen till att du inte ser någon cookie-banner på OpenMates)
    
    Vad som är nytt: känsliga data som e-postadresser, telefonnummer, API-nycklar med mera upptäcks automatiskt och ersätts med platshållare på din enhet när du skriver och skickar ett meddelande till OpenMates. Du kan alltid växla tillbaka till det ursprungliga värdet i användargränssnittet, och du kan klicka på upptäckt data för att förhindra ersättningen. Men som standard säkerställer denna funktion att varken OpenMates eller de AI-leverantörer som bearbetar dina meddelanden någonsin ser de känsliga uppgifterna överhuvudtaget.
    
    [Prova själv](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — klicka på den här länken för att se platshållare för personuppgifter i praktiken: din e-postadress och ditt telefonnummer kommer att upptäckas automatiskt och ersättas innan de skickas till AI:n.
    
    ## 3. 🧠 Minnen
    
    OpenMates kan nu komma ihåg app-specifika minnen, som dina kommande resor eller projektdetaljer. MEN: alla minnen krypteras och dekrypteras endast på din enhet, och delas bara tillfälligt med OpenMates-servern och AI-leverantören om du uttryckligen bekräftar det för den aktuella chatten. Detta gör att du kan dra full nytta av personliga svar utan att ständigt upprepa dina projektdetaljer — samtidigt som du behåller full kontroll över vilken data du delar, när och med vilken AI-leverantör. Kolla in [Minnen i OpenMates-apparna](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Fokuslägen
    
    Att veta hur man ger rätt instruktioner till en AI-chatbot gör en enorm skillnad för hur hjälpsam chatboten blir och kvaliteten på svaren. Med Fokuslägen behöver du inte vara expert på prompt engineering för att dra full nytta av bra, riktade instruktioner. Fråga bara OpenMates om till exempel karriärinsikter, så bör fokusläget 'Karriärinsikter' aktiveras automatiskt för att guida dig genom processen. Och självklart: detta är bara början. Många fler fokuslägen kommer att läggas till, och kvaliteten på de befintliga kommer att förbättras ytterligare under de kommande veckorna. Kolla gärna in [Fokuslägen i OpenMates-apparna](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nya modeller
    
    OpenMates har ett brett urval av de mest effektiva och bäst presterande AI-modellerna som finns. Som standard väljs rätt modell automatiskt baserat på uppgiften. Men du kan alltid åsidosätta detta beteende [i AI-inställningarna](https://openmates.org/#settings/ai) permanent, eller vid behov genom att nämna en specifik modell i meddelandefältet via `@{modellnamn}`. Du kan nu välja mellan ett brett utbud av AI-modeller, till exempel:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` och `@fast` modell-alias — skriv `@best` för att automatiskt styra till den starkaste modellen, `@fast` för att använda den snabbaste modellen som finns tillgänglig på OpenMates.
    
    ## 6. 💡 Daglig inspiration & Wikipedia-länkar
    
    AI kan, om den används på rätt sätt, vara ett fantastiskt verktyg för lärande. Och OpenMates är optimerat för att uppmuntra människor att lära sig, utforska och bli inspirerade. Det är vad Daglig inspiration är till för, som du ser högst upp i gränssnittet när du har loggat in. De visar intressanta nya videor — och snart även annat innehåll som Wikipedia-artiklar, nya OpenMates-funktioner, foton och detaljer om konstverk, viktiga historiska händelser med mera. Daglig inspiration skräddarsys efter dina chattar och låses sedan på din enhet med en nyckel som bara du har — så de förblir privata för dig.
    Dessutom markerar OpenMates automatiskt Wikipedia-artiklar i svaren från assistenten. Det gör det superenkelt att lära sig mer om ett ämne genom att bara klicka på det orangefärgade ordet med studieikonen bredvid.
    
    # 🚀 Vad händer härnäst
    
    Under de kommande veckorna kommer jag att lägga upp olika korta klipp som visar de många funktionerna i OpenMates och de användbara saker man kan göra med det, samt fortsätta att förbättra programvaran och lägga till fler appar, leverantörer och funktioner.
    
    Från och med nu är min plan att skicka nyhetsbrev med tillkännagivanden och uppdateringar med några veckors mellanrum, och separat även tips och tricks om hur man använder OpenMates. [Kontrollera dina inställningar för nyhetsbrev när som helst](https://openmates.org/#settings/newsletter) om du vill få fler eller färre nyhetsbrev.
    
    Ha så kul med OpenMates, och håll utkik efter fler uppdateringar!
    
