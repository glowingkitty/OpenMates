    # 🙏 まずは感謝の言葉を
    
    12月末、Chaos Communication Congressに関連して、ドイツのテレビ局ZDFから思いがけずインタビューを依頼されました（[大手テック企業のAIに代わる、プライバシー重視の選択肢の重要性についてのレポート](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html)）。それは素晴らしい経験でした。当時のOpenMatesはまだ荒削りな部分も多かったのですが、最初の方々が登録して使い始めてくれました。そして、私が自分のデバイスでテストしていた時には遭遇しなかったバグやエッジケースを見つけ、ありがたいことに報告してくれました。報告してくださった皆さんに心から感謝します。おかげで、OpenMatesをより洗練させ、安定させ、完成度を高めることができました！もちろん、OpenMatesを使っていて違和感や不具合を感じた場合は、引き続き遠慮なく報告してください。
    
    これは私が作った最初のソフトウェアではありませんが、数人以上の人たちが自分の作ったソフトウェアを使い始めたのは初めてのことでした。現在、180人以上のアクティブユーザーがOpenMatesを利用しています！これは非常にエキサイティングなことであり、正直なところ、最初は少し圧倒される思いもありました。
    
    それ以来、私はOpenMatesの改善とデバッグ、そして機能の充実とブラッシュアップに完全に集中し、コードに膨大な変更を加えました。バグ修正、新機能、ユーザーインターフェースの改善など、数多くの改良を行いました。
    
    そして今日、ここ数ヶ月の最もエキサイティングな変更点についてアップデートをお伝えできることを嬉しく思います！すべての変更について話すと1通のニュースレターでは長くなりすぎてしまうため、今回はハイライトに絞ってお伝えします。また、今後数週間にわたって、OpenMatesの様々な機能についての短い動画を以下のSNSで公開していく予定です：
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates)
    
    # ✨ ここ数ヶ月のハイライト
    
    ## 1. 🧩 新しいアプリとアプリスキル
    
    既存のウェブ検索、ウェブサイトの閲覧・分析、YouTube動画の文字起こしを読み取って議論を開始する機能に加え、OpenMatesに多くの新しいアプリとアプリスキルが加わりました。以下はそのハイライトです：
    
    - 🏥 **[Health（健康）](https://openmates.org/#settings/apps/health/skills/search_appointments):** 医者の予約をお探しですか？HealthアプリでDoctolibやJamedaの空き状況を確認できるようになりました。
    - 🏠 **[Home（住まい）](https://openmates.org/#settings/apps/home/skills/search):** ImmoScout24、WG-Gesucht、Kleinanzeigenでアパートを検索できます。主要な詳細はOpenMates上で直接確認可能です。
    - 🎉 **[Events（イベント）](https://openmates.org/#settings/apps/events/skills/search):** Meetup、Luma、Resident Advisor、Googleでイベントを検索・フィルタリングできます。説明、画像、日時、場所などの詳細が表示され、RSVP（参加申し込み）や参加へのダイレクトリンクも含まれます。
    - ✈️ **[Travel（旅行）](https://openmates.org/#settings/apps/travel):** 新しい「[Search connection（乗り換え・便の検索）](https://openmates.org/#settings/apps/travel/skills/search_connections)」スキルでは、Google経由でフライトを検索できます。複数の日程の複数の便を同時に検索でき、フライトの詳細や予約リンクも表示されます。鉄道の検索も今後対応予定です。また、「[Price calendar（料金カレンダー）](https://openmates.org/#settings/apps/travel/skills/price_calendar)」スキルでは、1ヶ月間の価格推移を素早く確認できます。
    - ⏰ **[Reminders（リマインダー）](https://openmates.org/#settings/apps/reminder):** チャットにリマインダーを作成して、後で戻ってくることができます。また、特定のトピックに関する最新のデイリーニュースを検索して要約するようOpenMatesに設定することも可能です。
    - 🖼️ **[Images（画像）](https://openmates.org/#settings/apps/images):** ウェブ上の画像を[検索](https://openmates.org/#settings/apps/images/skills/search)したり、画像を[生成](https://openmates.org/#settings/apps/images/skills/generate)したり、[ベクターグラフィックス](https://openmates.org/#settings/apps/images/skills/vectorize)を作成したりできます。
    - 📄 **[PDFs](https://openmates.org/#settings/apps/pdf):** PDFをアップロードして、テキストや視覚的なレイアウトについて質問できます。OpenMatesはPDFの読み取りと表示の両方が可能です！
    - 💻 **[Code（コード）](https://openmates.org/#settings/apps/code):** OpenMatesは[最新のドキュメントを検索](https://openmates.org/#settings/apps/code/skills/get_docs)してコーディングに関する質問に答え、コードを書き、さらにウェブサイトのデザインやコードをブラウザで直接プレビューさせることもできます！これはコーディング機能のほんの始まりに過ぎません。
    - 🧮 **[Math（数学）](https://openmates.org/#settings/apps/math):** 式の計算やプロットの可視化を、すべてOpenMates内で行えます。
    - 📝 **[Docs（文書）](https://openmates.org/#settings/apps/docs):** Word文書の生成を依頼し、.docxファイルとしてダウンロードできます。
    - 📊 **[Sheets（スプレッドシート）](https://openmates.org/#settings/apps/sheets):** 表を作成し、.xlsxファイルとしてダウンロードできます。DocsとSheetsは今後数週間でさらに強力になる予定です。
    - 📧 **[Mail（メール）](https://openmates.org/#settings/apps/mail):** メールの下書きを作成できます。作成した下書きは、デバイスのデフォルトのメールプログラムで簡単に開いて送信できます。
    - 🎙️ **[Audio（オーディオ）](https://openmates.org/#settings/apps/audio):** 入力が面倒ですか？メッセージフィールドから直接、音声メッセージを録音してOpenMatesに送信できます。
    
    さらに多くのアプリスキルが追加されています。[OpenMatesアプリをチェックして探索](https://openmates.org/#settings/apps)してみてください。
    
    ## 2. 🔒 個人データプレースホルダー
    
    大手テック企業や一般的なスタートアップのAIチャットボットとは異なり、OpenMatesはプライバシーを最優先事項として設計されています。すでに以下のような様々なプライバシー保護機能が備わっています：
    - 🔐 すべてのチャットは、あなたのデバイス上でのみ暗号化・復号されます。
    - 🖼️ すべての外部画像はOpenMatesサーバー経由で読み込まれます（外部サイトにあなたのIPアドレスやデバイス情報が知られることはありません）。
    - 📉 Googleアナリティクスなどの分析ソフトウェアは一切使用していません（OpenMatesにクッキーバナーが表示されないのはそのためです）。
    
    新機能：メールアドレス、電話番号、APIキーなどの機密データが自動的に検出され、メッセージを下書きしてOpenMatesに送信する際に、デバイス上でプレースホルダーに置き換えられるようになりました。ユーザーインターフェース上でいつでも元の値に戻すことができますし、検出されたデータをクリックして置換を無効にすることもできます。しかし、デフォルトではこの機能により、OpenMatesもメッセージを処理するAIプロバイダーも、機密データを最初から目にすることはありません。
    
    [自分で試してみる](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — このリンクをクリックして、個人データプレースホルダーの動作を確認してください。AIに送信される前に、メールアドレスと電話番号が自動検出され、置き換えられます。
    
    ## 3. 🧠 メモリ
    
    OpenMatesは、今後の旅行の予定やプロジェクトの詳細など、アプリ固有のメモリ（記憶）を保持できるようになりました。ただし、すべてのメモリはあなたのデバイス上でのみ暗号化・復号され、特定のチャットであなたが明示的に承認した場合にのみ、OpenMatesサーバーおよびAIプロバイダーと一時的に共有されます。これにより、プロジェクトの詳細を何度も繰り返すことなくパーソナライズされた回答を最大限に活用でき、同時に、どのデータをいつ、どのAIプロバイダーと共有するかを完全にコントロールできます。[OpenMatesアプリのメモリ](https://openmates.org/#settings/apps/all/memories)をチェックしてみてください。
    
    ## 4. 🎯 フォーカスモード
    
    AIチャットボットに適切な指示を与える方法を知っているかどうかで、チャットボットの有用性や回答の質に大きな差が出ます。フォーカスモードを使えば、プロンプトエンジニアリングの専門家でなくても、優れた的を絞った指示を最大限に活用できます。例えば、OpenMatesにキャリアに関する洞察を求めると、「キャリアインサイト」フォーカスモードが自動的に有効になり、プロセスをガイドします。もちろん、これは始まりに過ぎません。今後数週間でさらに多くのフォーカスモードが追加され、既存のモードの質もさらに向上する予定です。[OpenMatesアプリのフォーカスモード](https://openmates.org/#settings/apps/all/focus-modes)をぜひご覧ください。
    
    ## 5. 🤖 新しいモデル
    
    OpenMatesは、現在利用可能な最も効率的でパフォーマンスの高いAIモデルを幅広く取り揃えています。デフォルトでは、タスクに基づいて最適なモデルが自動選択されます。しかし、[AI設定](https://openmates.org/#settings/ai)でこの動作を永続的に変更したり、メッセージフィールドで `@{モデル名}` を使って特定のモデルを指定したりすることも可能です。現在、以下のような幅広いAIモデルから選択できます：
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` と `@fast` のモデルエイリアス — `@best` と入力すると最強のモデルに、`@fast` と入力するとOpenMatesで利用可能な最速のモデルに自動ルーティングされます。
    
    ## 6. 💡 今日のインスピレーションとWikipediaリンク
    
    AIは、適切に使用すれば学習のための素晴らしいツールになります。OpenMatesは、人々が学び、探索し、インスピレーションを得ることを促進するように最適化されています。ログイン後のインターフェース上部に表示される「今日のインスピレーション」はそのためのものです。興味深い新しい動画や、将来的にはWikipediaの記事、OpenMatesの新機能、芸術作品の写真や詳細、重要な歴史的出来事などが表示されます。今日のインスピレーションはあなたのチャットに合わせてカスタマイズされ、あなただけが持つキーでデバイス上にロックされるため、プライバシーは守られます。
    さらに、OpenMatesはアシスタントの回答内でWikipediaの記事を自動的にハイライトします。オレンジ色にハイライトされた単語（横に学習アイコンがあるもの）をクリックするだけで、そのトピックについて簡単に詳しく学ぶことができます。
    
    # 🚀 今後の予定
    
    今後数週間にわたり、OpenMatesの多くの機能や便利な使い方を紹介する短いクリップを投稿するほか、ソフトウェアのさらなる改善、アプリ、プロバイダー、機能の追加を行っていきます。
    
    今後は、数週間ごとに発表やアップデートのためのニュースレターを、またそれとは別にOpenMatesの使い方のヒントやコツをお送りする予定です。ニュースレターの受信頻度を変更したい場合は、いつでも[ニュースレターの設定を確認](https://openmates.org/#settings/newsletter)してください。
    
    OpenMatesをぜひお楽しみください。今後のアップデートにもご期待ください！
    
