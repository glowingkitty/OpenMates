    # ✨ נקודות השיא של החודשים האחרונים
    
    ## 1. 🧩 אפליקציות ומיומנויות חדשות
    
    בנוסף ליכולות הקיימות של חיפוש באינטרנט, קריאה וניתוח של אתרי אינטרנט וקריאת תמלולים של סרטוני YouTube כדי להתחיל דיונים — OpenMates קיבלה המון אפליקציות ומיומנויות חדשות. הנה כמה נקודות שיא:
    
    - 🏥 **[בריאות](https://openmates.org/#settings/apps/health/skills/search_appointments):** מחפש תור לרופא? אפליקציית הבריאות יכולה כעת לבדוק ב-Doctolib וב-Jameda אם יש תורים פנויים.
    - 🏠 **[בית](https://openmates.org/#settings/apps/home/skills/search):** חפש דירות ב-ImmoScout24, WG-Gesucht ו-Kleinanzeigen — כשהפרטים העיקריים גלויים ישירות ב-OpenMates.
    - 🎉 **[אירועים](https://openmates.org/#settings/apps/events/skills/search):** חפש וסנן אירועים ב-Meetup, Luma, Resident Advisor ו-Google — עם פרטים כמו תיאורים, תמונות, מתי ואיפה האירועים מתקיימים, וקישורים ישירים להרשמה או הצטרפות.
