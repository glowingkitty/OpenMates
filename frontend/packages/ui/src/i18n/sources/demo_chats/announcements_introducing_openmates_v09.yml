    # 🙏 ขอขอบคุณสักเล็กน้อยก่อนนะครับ
    
    เมื่อช่วงปลายเดือนธันวาคม ในงาน Chaos Communication Congress ผมได้รับคำขอสัมภาษณ์จากช่องโทรทัศน์ ZDF ของเยอรมนีอย่างไม่คาดคิด [(รายงานที่พูดถึงความสำคัญของทางเลือกที่เน้นความเป็นส่วนตัวแทนบริษัท AI ยักษ์ใหญ่)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html) และว้าว เป็นประสบการณ์ที่ยอดเยี่ยมมากครับ แม้ว่าในตอนนั้น OpenMates จะยังไม่ค่อยสมบูรณ์นัก แต่ผู้คนกลุ่มแรกก็เริ่มลงทะเบียนและใช้งาน — รวมถึงช่วยหาบั๊กและกรณีปัญหาต่าง ๆ ที่ผมไม่พบระหว่างการทดสอบบนอุปกรณ์ของตัวเอง และขอบคุณมากที่ช่วยรายงานเข้ามา ขอบคุณทุกคนที่ทำเช่นนั้นครับ — มันช่วยให้ OpenMates ดูดีขึ้น เสถียรขึ้น และสมบูรณ์ยิ่งขึ้นมาก! และแน่นอนว่าคุณสามารถรายงานปัญหาต่อได้เสมอหากพบสิ่งผิดปกติหรือส่วนที่ใช้งานไม่ได้ใน OpenMates
    
    แม้ว่านี่จะไม่ใช่ซอฟต์แวร์ตัวแรกที่ผมสร้างขึ้น แต่นี่เป็นครั้งแรกที่มีคนมากกว่าหยิบมือเริ่มใช้งานซอฟต์แวร์ที่ผมสร้าง — จนถึงตอนนี้มีผู้ใช้งานจริงกว่า 180 คนที่ใช้ OpenMates! ซึ่งเป็นเรื่องที่น่าตื่นเต้นมาก และยอมรับว่าตอนแรกก็รู้สึกล้นหลามอยู่บ้างครับ
    
    ตั้งแต่นั้นมา ผมมุ่งเน้นไปที่การปรับปรุงและแก้ไขบั๊กของ OpenMates อย่างเต็มที่ เพื่อให้มีฟีเจอร์ครบถ้วนและสมบูรณ์ยิ่งขึ้น — และได้เปลี่ยนแปลงโค้ดไปมากมาย ทั้งการแก้ไขบั๊ก ฟีเจอร์ใหม่ ส่วนติดต่อผู้ใช้ที่ปรับปรุงใหม่ และการปรับปรุงอื่น ๆ อีกเพียบ
    
    และวันนี้ ผมยินดีที่จะแจ้งอัปเดตเกี่ยวกับการเปลี่ยนแปลงที่น่าตื่นเต้นที่สุดในช่วงไม่กี่เดือนที่ผ่านมา! โปรดจำไว้ว่า การพูดถึงการเปลี่ยนแปลงทั้งหมดในจดหมายข่าวฉบับเดียวคงจะยาวเกินไป — ดังนั้นผมจะเน้นไปที่ไฮไลท์สำคัญ และจะเผยแพร่วิดีโอสั้น ๆ เกี่ยวกับฟีเจอร์ต่าง ๆ ของ OpenMates ในสัปดาห์ต่อ ๆ ไปทาง:
