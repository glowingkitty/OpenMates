    לא שכחתי מ-OpenMates — בדיוק להפך. 
    
    # 🙏 כמה מילות תודה תחילה
    
    בסוף דצמבר, במסגרת ה-Chaos Communication Congress, התבקשתי במפתיע להתראיין לערוץ הטלוויזיה הגרמני ZDF [(כתבה הדנה בחשיבותן של חלופות ממוקדות פרטיות לחברות ה-AI של ענקיות הטכנולוגיה)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). ו-וואו, איזו חוויה. למרות ש-OpenMates היה הרבה פחות מלוטש באותו זמן, האנשים הראשונים התחילו להירשם ולהשתמש בו — וגם למצוא באגים ומקרי קצה שלא חוויתי במהלך הבדיקות שלי במכשירים שלי, ולשמחתי דיווחו עליהם. תודה רבה לכל מי שעשה זאת — זה באמת עזר מאוד להפוך את OpenMates למלוטש יותר, יציב יותר ושלם יותר! וכמובן שאתם מוזמנים מאוד להמשיך לדווח על בעיות אם אתם מבחינים במשהו שמרגיש לא תקין או שבור ב-OpenMates.
    
    למרות שזו לא הייתה התוכנה הראשונה שיצרתי, זו הייתה הפעם הראשונה שיותר מקומץ אנשים התחילו להשתמש בתוכנה שבניתי — מעל 180 משתמשים פעילים משתמשים ב-OpenMates עד כה! זה היה מרגש מאוד, וצריך להודות שבהתחלה גם קצת מציף.
    
    מאז, התמקדתי לחלוטין בשיפור ובניפוי באגים ב-OpenMates, ובהפיכתו ליותר שלם ומלוטש — וביצעתי המון שינויים בקוד. תיקוני באגים, תכונות חדשות, ממשק משתמש משופר ועוד שיפורים רבים. 
    
    והיום, אני שמח לעדכן אתכם בשינויים המרגשים ביותר מהחודשים האחרונים! קחו בחשבון שלדבר על כל השינויים יהיה יותר מדי עבור ניוזלטר אחד — לכן במקום זאת אתמקד בנקודות השיא ואפרסם גם מספר סרטונים קצרים על תכונות שונות ב-OpenMates בשבועות הקרובים, ב-:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ נקודות השיא של החודשים האחרונים
    
    ## 1. 🧩 אפליקציות ומיומנויות אפליקציה חדשות
    
    בנוסף ליכולות הקיימות של חיפוש באינטרנט, קריאה וניתוח של אתרי אינטרנט וקריאת תמלולים של סרטוני יוטיוב כדי להתחיל דיונים — OpenMates קיבל הרבה אפליקציות ומיומנויות אפליקציה חדשות. הנה כמה נקודות שיא:
    
    - 🏥 **[בריאות](#settings/apps/health/skills/search_appointments):** מחפשים תור לרופא? אפליקציית הבריאות יכולה כעת לבדוק את Doctolib ו-Jameda עבור תורים פנויים.
    - 🏠 **[בית](#settings/apps/home/skills/search):** חפשו דירות ב-ImmoScout24, WG-Gesucht ו-Kleinanzeigen — כשהפרטים העיקריים גלויים ישירות ב-OpenMates.
    - 🎉 **[אירועים](#settings/apps/events/skills/search):** חפשו וסננו אירועים ב-Meetup, Luma, Resident Advisor ו-Google — עם פרטים כמו תיאורים, תמונות, מתי ואיפה האירועים מתקיימים, וקישורים ישירים לאישור הגעה או הצטרפות.
    - ✈️ **[נסיעות](#settings/apps/travel):** מיומנות '[חיפוש חיבור](#settings/apps/travel/skills/search_connections)' החדשה מאפשרת לכם לחפש טיסות דרך גוגל, על פני מספר חיבורים בימים שונים בו-זמנית — כולל פרטי טיסה מלאים וקישורי הזמנה. תמיכה בחיבורי רכבת תגיע בהמשך. ומיומנות '[לוח מחירים](#settings/apps/travel/skills/price_calendar)' מציגה לכם סקירה מהירה של התפתחות המחירים לאורך חודש.
    - ⏰ **[תזכורות](#settings/apps/reminder):** צרו תזכורת לצ'אט כדי לחזור אליו מאוחר יותר — או אפילו גרמו ל-OpenMates לחפש ולסכם את החדשות היומיות האחרונות בנושא מסוים, למשל.
    - 🖼️ **[תמונות](#settings/apps/images):** [חפשו](#settings/apps/images/skills/search) תמונות באינטרנט, [צרו](#settings/apps/images/skills/generate) תמונות ו[גרפיקה וקטורית](#settings/apps/images/skills/vectorize).
    - 📄 **[קבצי PDF](#settings/apps/pdf):** העלו קבצי PDF ושאלו שאלות על הטקסט או אפילו על הפריסה הוויזואלית — OpenMates יכול גם לקרוא וגם להציג קבצי PDF! 
    - 💻 **[קוד](#settings/apps/code):** OpenMates יכול [לחפש את התיעוד העדכני ביותר](#settings/apps/code/skills/get_docs) כדי לענות על שאלות הקשורות לתכנות, ואז לכתוב קוד — ואפילו לאפשר לכם לצפות בתצוגה מקדימה של עיצובי אתרים וקוד ישירות בדפדפן! וזו רק ההתחלה המוקדמת של יכולות התכנות שלו.
    - 🧮 **[מתמטיקה](#settings/apps/math):** חשבו ביטויים ואפילו הציגו גרפים, הכל בתוך OpenMates.
    - 📝 **[מסמכים](#settings/apps/docs):** בקשו יצירת מסמכי Word — והורידו אותם כקבצי .docx.
    - 📊 **[גיליונות נתונים](#settings/apps/sheets):** OpenMates יכול גם ליצור טבלאות ולאפשר לכם להוריד אותן כקבצי .xlsx. גם Docs וגם Sheets יהפכו לטובים וחזקים עוד יותר בשבועות הקרובים.
    - 📧 **[מייל](#settings/apps/mail):** OpenMates יכול לנסח עבורכם מיילים, אותם תוכלו לפתוח ולשלוח בקלות דרך תוכנת המייל המוגדרת כברירת מחדל במכשיר שלכם.
    - 🎙️ **[אודיו](#settings/apps/audio):** לא רוצים להקליד? הקליטו ושלחו הודעה קולית ל-OpenMates, ישירות משדה ההודעה.
    
    ועוד מיומנויות אפליקציה נוספו. פשוט [בדקו וחקרו את אפליקציות OpenMates](#settings/apps).
    
    ## 2. 🔒 שומרי מקום לנתונים אישיים
    
    בניגוד לצ'אטבוטים של AI מחברות טכנולוגיה גדולות וסטארט-אפים טיפוסיים, OpenMates תוכנן כשהפרטיות שלכם היא בעדיפות עליונה. וכבר היו בו הגנות פרטיות שונות:
    - 🔐 כל הצ'אטים שלכם מוצפנים ומפוענחים במכשיר שלכם בלבד
    - 🖼️ כל התמונות החיצוניות נטענות דרך שרת OpenMates שלנו (כך שאתרים חיצוניים לא רואים את כתובת ה-IP או את פרטי המכשיר שלכם)
    - 📉 לא נעשה שימוש ב-Google Analytics או בכל תוכנת ניתוח אחרת ב-OpenMates (וזו גם הסיבה שאתם לא רואים באנר עוגיות ב-OpenMates)
    
    מה חדש: נתונים רגישים כמו כתובות אימייל, מספרי טלפון, מפתחות API ועוד מזוהים אוטומטית ומוחלפים בשומרי מקום במכשיר שלכם, כשאתם מנסחים ושולחים הודעה ל-OpenMates. אתם תמיד יכולים לחזור לערך המקורי בממשק המשתמש, ותוכלו ללחוץ על נתונים שזוהו כדי למנוע את ההחלפה. אך כברירת מחדל, תכונה זו מבטיחה שלא OpenMates ולא ספקי ה-AI שמעבדים את ההודעות שלכם יראו את הנתונים הרגישים מלכתחילה.
    
    [נסו זאת בעצמכם](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — לחצו על קישור זה כדי לראות את שומרי המקום לנתונים אישיים בפעולה: האימייל ומספר הטלפון שלכם יזוהו אוטומטית ויוחלפו לפני שיישלחו ל-AI.
    
    ## 3. 🧠 זיכרונות
    
    OpenMates יכול כעת לזכור זיכרונות ספציפיים לאפליקציה, כמו הטיולים הקרובים שלכם או פרטי פרויקט. אבל: כל הזיכרונות מוצפנים ומפוענחים רק במכשיר שלכם, ומשותפים באופן זמני בלבד עם שרת OpenMates וספק ה-AI אם אתם מאשרים זאת במפורש עבור הצ'אט הנתון. זה מאפשר לכם לנצל עד תום תגובות מותאמות אישית מבלי לחזור שוב ושוב על פרטי הפרויקט שלכם — תוך שמירה על שליטה מלאה בנתונים שאתם משתפים, מתי ועם איזה ספק AI. בדקו את [הזיכרונות באפליקציות OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 מצבי מיקוד
    
    הידיעה כיצד לתת את ההנחיות הנכונות לצ'אטבוט AI עושה הבדל עצום במידת העזרה של הצ'אטבוט ובאיכות התגובות. עם מצבי מיקוד, אתם לא צריכים להיות מומחים בהנדסת פרומפטים כדי לנצל עד תום הנחיות מעולות וממוקדות. פשוט בקשו מ-OpenMates תובנות קריירה, למשל, ומצב המיקוד 'תובנות קריירה' אמור להיות מופעל אוטומטית כדי להדריך אתכם בתהליך. וכמובן: זו רק ההתחלה. מצבי מיקוד רבים נוספים יתווספו, ואיכות הקיימים תשתפר עוד יותר בשבועות הקרובים. אתם מוזמנים לבדוק את [מצבי המיקוד באפליקציות OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 מודלים חדשים
    
    ל-OpenMates יש מבחר רחב של מודלי ה-AI היעילים והביצועיים ביותר שיש. כברירת מחדל, הוא בוחר אוטומטית את המודל הנכון בהתבסס על המשימה. אבל אתם תמיד יכולים לעקוף התנהגות זו [בהגדרות ה-AI](#settings/ai) לצמיתות, או לפי דרישה על ידי אזכור מודל ספציפי בשדה ההודעה באמצעות `@{modelname}`. כעת תוכלו לבחור מתוך מגוון רחב של מודלי AI, למשל:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) ו-[Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) ו-[Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - כינויי מודל `@best` ו-`@fast` — הקלידו `@best` כדי לנתב אוטומטית למודל החזק ביותר, `@fast` כדי להשתמש במודל המהיר ביותר הזמין ב-OpenMates.
    
    ## 6. 💡 השראות יומיות וקישורי ויקיפדיה
    
    AI, אם משתמשים בו נכון, יכול להיות כלי מדהים ללמידה. ו-OpenMates מותאם לעודד אנשים ללמוד, לחקור, לקבל השראה. לשם כך נועדו ה-'השראות היומיות', אותן אתם רואים בחלק העליון של הממשק לאחר ההתחברות. הן מציגות סרטונים חדשים ומעניינים — ובקרוב גם תכנים אחרים כמו ערכי ויקיפדיה, תכונות חדשות של OpenMates, תמונות ופרטים של יצירות אמנות, אירועים היסטוריים חשובים ועוד. ההשראות היומיות מותאמות לצ'אטים שלכם, ואז ננעלות במכשיר שלכם עם מפתח שיש רק לכם — כך שהן נשארות פרטיות עבורכם.
    בנוסף, OpenMates מדגיש אוטומטית ערכי ויקיפדיה בתגובות של הודעות העוזר. מה שהופך את הלמידה על נושא לקלה במיוחד על ידי לחיצה על המילה המודגשת בכתום עם סמל הלמידה לידה.
    
    # 🚀 מה הלאה
    
    בשבועות הקרובים אפרסם סרטונים קצרים שונים המציגים את התכונות הרבות של OpenMates ואת הדברים המועילים שניתן לעשות איתו, וכן אמשיך לשפר את התוכנה ולהוסיף עוד אפליקציות, ספקים ותכונות.
    
    מעתה התוכנית שלי היא לשלוח מיילים של ניוזלטר להכרזות ועדכונים מדי כמה שבועות, ובנפרד גם טיפים וטריקים כיצד להשתמש ב-OpenMates. אתם מוזמנים [לבדוק את הגדרות הניוזלטר שלכם בכל עת](#settings/newsletter), אם תרצו לקבל יותר או פחות מיילים של ניוזלטר.
    
    תהנו מהשימוש ב-OpenMates, והישארו מעודכנים לעדכונים נוספים!
