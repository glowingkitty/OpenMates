    Привет!
    
    Вышла версия OpenMates v0.11. Это обновление развивает улучшения версии v0.10 и добавляет практичные функции для повседневного использования: более насыщенные «Ежедневные идеи», выполнение кода, поиск по репозиториям, генерацию музыки, улучшения провайдеров генерации изображений, более понятные результаты приложений и локальные шрифты интерфейса.
    
    [cta]
    
    # Сначала краткий обзор v0.10
    
    В версии v0.10 появились ссылки на Википедию в ответах, выделение сообщений и комментарии, улучшенные страницы публичных анонсов и примеров, банковские переводы SEPA и возможность смены email в аккаунте.
    
    Эти изменения сделали OpenMates более полезным рабочим пространством на каждый день: стало проще учиться, делиться результатами, а базовые функции аккаунта и оплаты стали надежнее.
    
    # ✨ Что нового в v0.11
    
    ## 1. Расширенные «Ежедневные идеи»
    
    «Ежедневные идеи» стали насыщеннее и разнообразнее. Теперь они могут предлагать публичные видео, полезные идеи функций и конкретные отправные точки для того, что ты захочешь сделать в OpenMates.
    
    Наша цель — сделать так, чтобы OpenMates ощущался не просто как пустое окно чат-бота, а как место, помогающее находить полезные занятия: изучить тему, разобраться в видео, спланировать задачу, изучить инструмент или продолжить работу на основе примера.
    
    ## 2. Улучшения выполнения и поиска кода
    
    Приложение «Код» сделало большой шаг вперед. Теперь OpenMates может запускать код в песочнице, показывать результаты выполнения, помогать с поиском по репозиториям и выполнять больше последующих действий, связанных с кодом.
    
    Для обычных пользователей это полезно, даже если ты не профессиональный разработчик: небольшие скрипты, очистка данных, генерация документов, предпросмотр сайтов, объяснение логов и технические вопросы станут более интерактивными.
    
    ## 3. Генерация музыки и улучшения провайдеров изображений
    
    Версия v0.11 расширяет рабочие процессы с медиафайлами: добавлена генерация музыки и улучшена работа с провайдерами генерации изображений. Это значит, что OpenMates теперь поддерживает больше творческих задач прямо в чате: создание музыкальных набросков, генерацию визуальных концептов, работу над промптами или превращение сырой идеи в медиафайл, который можно просмотреть и использовать.
    
    Также мы улучшили отображение сгенерированных медиафайлов, чтобы результаты было проще просматривать, открывать и использовать дальше.
    
    ## 4. Более понятные результаты приложений и данные о провайдерах
    
    Многие карточки приложений и окна предпросмотра теперь содержат наглядные примеры, логотипы провайдеров, информацию об источниках и более четкие метаданные. Это помогает лучше понять, что произошло, откуда взялся результат и какой навык приложения был задействован.
    
    В повседневном использовании это избавит от лишних догадок: результаты поиска путешествий, веб-результаты, сгенерированные файлы, медиа и код станет проще распознавать и использовать.
    
    ## 5. Улучшенное отображение уточняющих вопросов
    
    Предложения по продолжению диалога уже были, но теперь они выглядят аккуратнее и удобнее. Они помогают продолжать работу над задачей, избавляя от необходимости самому придумывать идеальный следующий промпт.
    
    ## 6. Локальные шрифты интерфейса
    
    Теперь можно настраивать предпочтения по локальным шрифтам интерфейса. Это небольшая настройка, но она важна, если ты проводишь много времени за чтением и написанием текстов в OpenMates.
    
    ## 7. Стабильность и производительность
    
    Также была повышена стабильность и производительность синхронизации чатов, встраиваемых элементов, предпросмотра файлов и изображений.
    
    # Что дальше
    
    Наш следующий шаг — продолжать делать OpenMates проще и понятнее: больше качественных примеров, наглядные процессы в приложениях, отточенные инструменты для творчества и исследований, а также устранение шероховатостей в работе чата.
    
    Спасибо, что пользуешься OpenMates и делишься отзывами, когда что-то кажется непонятным или работает не так.
    
