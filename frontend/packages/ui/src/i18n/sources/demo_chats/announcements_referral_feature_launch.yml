    # ✨ Sorotan beberapa bulan terakhir
    
    ## 1. 🧩 Aplikasi & keahlian aplikasi baru
    
    Selain kemampuan yang sudah ada untuk mencari di web, membaca & menganalisis situs web, dan membaca transkrip video YouTube untuk memulai diskusi — OpenMates mendapatkan banyak aplikasi dan keahlian aplikasi baru. Berikut adalah beberapa sorotannya:
    
    - 🏥 **[Kesehatan](https://openmates.org/#settings/apps/health/skills/search_appointments):** Mencari janji temu dokter? Aplikasi Kesehatan sekarang dapat memeriksa Doctolib dan Jameda untuk slot yang tersedia.
    - 🏠 **[Rumah](https://openmates.org/#settings/apps/home/skills/search):** Cari apartemen di ImmoScout24, WG-Gesucht, dan Kleinanzeigen — dengan detail utama yang langsung terlihat di OpenMates.
    - 🎉 **[Acara](https://openmates.org/#settings/apps/events/skills/search):** Cari & filter acara di Meetup, Luma, Resident Advisor, dan Google — dengan detail seperti deskripsi, gambar, kapan dan di mana acara tersebut, serta tautan langsung untuk RSVP atau bergabung.
    - ✈️ **[Perjalanan](https://openmates.org/#settings/apps/travel):** Keahlian '[Cari koneksi](https://openmates.org/#settings/apps/travel/skills/search_connections)' yang baru memungkinkanmu mencari penerbangan melalui Google, di berbagai koneksi pada beberapa hari secara bersamaan — termasuk detail penerbangan lengkap dan tautan pemesanan. Dukungan untuk koneksi kereta api akan menyusul. Dan keahlian '[Kalender harga](https://openmates.org/#settings/apps/travel/skills/price_calendar)' menunjukkan ringkasan cepat perkembangan harga selama sebulan.
    - ⏰ **[Pengingat](https://openmates.org/#settings/apps/reminder):** Buat pengingat untuk chat agar bisa kembali lagi nanti — atau bahkan memicu OpenMates untuk mencari & merangkum berita harian terbaru untuk topik tertentu, misalnya.
    - 🖼️ **[Gambar](https://openmates.org/#settings/apps/images):** [Cari](https://openmates.org/#settings/apps/images/skills/search) gambar di web, [hasilkan](https://openmates.org/#settings/apps/images/skills/generate) gambar dan [grafik vektor](https://openmates.org/#settings/apps/images/skills/vectorize).
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf):** Unggah PDF dan ajukan pertanyaan tentang teks atau bahkan tata letak visualnya — OpenMates dapat membaca sekaligus melihat PDF! 
    - 💻 **[Kode](https://openmates.org/#settings/apps/code):** OpenMates dapat [mencari dokumentasi terbaru](https://openmates.org/#settings/apps/code/skills/get_docs) untuk menjawab pertanyaan terkait pemrograman, lalu menulis kode — dan bahkan memungkinkanmu melihat pratinjau desain situs web dan kode langsung di browser! Dan ini baru awal dari kemampuan pemrogramannya.
    - 🧮 **[Matematika](https://openmates.org/#settings/apps/math):** Hitung ekspresi dan bahkan visualisasikan plot, semuanya di dalam OpenMates.
    - 📝 **[Dokumen](https://openmates.org/#settings/apps/docs):** Minta dokumen Word dibuat — dan unduh sebagai file .docx.
    - 📊 **[Sheet](https://openmates.org/#settings/apps/sheets):** OpenMates juga dapat membuat tabel dan memungkinkanmu mengunduhnya sebagai file .xlsx. Baik Dokumen maupun Sheet akan menjadi lebih baik dan lebih kuat dalam minggu-minggu mendatang.
    - 📧 **[Email](https://openmates.org/#settings/apps/mail):** OpenMates dapat membuat draf email untukmu, yang kemudian dapat kamu buka & kirim dengan mudah melalui program email default di perangkatmu.
    - 🎙️ **[Audio](https://openmates.org/#settings/apps/audio):** Tidak ingin mengetik? Rekam dan kirim pesan suara ke OpenMates, langsung dari kolom pesan.
    
    Dan masih banyak lagi keahlian aplikasi yang telah ditambahkan. Silakan [lihat & jelajahi Aplikasi OpenMates](https://openmates.org/#settings/apps).
    
    ## 2. 🔒 Placeholder Data Pribadi
    
    Berbeda dengan chatbot AI dari perusahaan teknologi besar dan startup pada umumnya, OpenMates dirancang dengan privasimu sebagai prioritas utama. Dan OpenMates sudah memiliki berbagai perlindungan privasi:
    - 🔐 semua chat kamu dienkripsi & didekripsi hanya di perangkatmu
    - 🖼️ semua gambar eksternal dimuat melalui server OpenMates kami (sehingga situs web eksternal tidak melihat alamat IP atau informasi perangkatmu)
    - 📉 tidak ada Google Analytics atau perangkat lunak analitik lainnya yang digunakan di OpenMates (itulah sebabnya kamu tidak melihat spanduk cookie di OpenMates)
    
    Yang baru: data sensitif seperti alamat email, nomor telepon, kunci API, dan lainnya secara otomatis terdeteksi dan diganti dengan placeholder di perangkatmu, saat kamu membuat draf dan mengirim pesan ke OpenMates. Kamu selalu dapat beralih kembali ke nilai asli di antarmuka pengguna, dan kamu dapat mengeklik data yang terdeteksi untuk mencegah penggantian. Namun secara default, fitur ini memastikan bahwa baik OpenMates maupun penyedia AI yang memproses pesanmu tidak akan pernah melihat data sensitif tersebut sejak awal.
    
    [Coba sendiri](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) — klik tautan ini untuk melihat Placeholder Data Pribadi beraksi: email dan nomor teleponmu akan terdeteksi otomatis dan diganti sebelum dikirim ke AI.
    
    ## 3. 🧠 Memori
    
    OpenMates sekarang dapat mengingat memori khusus aplikasi, seperti perjalananmu yang akan datang atau detail proyek. TAPI: semua memori dienkripsi & didekripsi hanya di perangkatmu, dan hanya dibagikan sementara dengan server OpenMates dan penyedia AI jika kamu mengonfirmasinya secara eksplisit untuk chat tersebut. Ini memungkinkanmu memanfaatkan sepenuhnya respons yang dipersonalisasi tanpa terus-menerus mengulangi detail proyekmu — sambil tetap memegang kendali penuh atas data apa yang kamu bagikan, kapan, dan dengan penyedia AI mana. Lihat [Memori di Aplikasi OpenMates](https://openmates.org/#settings/apps/all/memories).
    
    ## 4. 🎯 Mode Fokus
    
    Mengetahui cara memberikan instruksi yang tepat kepada chatbot AI memberikan perbedaan besar dalam hal seberapa membantu chatbot tersebut dan kualitas responsnya. Dengan Mode Fokus, kamu tidak perlu menjadi ahli dalam rekayasa prompt untuk memanfaatkan instruksi yang hebat dan terarah. Cukup tanyakan wawasan karier kepada OpenMates, misalnya, dan mode fokus 'Wawasan karier' akan otomatis aktif untuk memandumu melalui proses tersebut. Dan tentu saja: ini baru permulaan. Lebih banyak Mode Fokus akan ditambahkan, dan kualitas yang sudah ada akan terus ditingkatkan dalam minggu-minggu mendatang. Jangan ragu untuk melihat [Mode Fokus di Aplikasi OpenMates](https://openmates.org/#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Model baru
    
    OpenMates memiliki berbagai pilihan model AI yang paling efisien dan berkinerja terbaik di luar sana. Secara default, ia memilih secara otomatis model yang tepat berdasarkan tugasnya. Namun kamu selalu dapat mengganti perilaku ini [di pengaturan AI](https://openmates.org/#settings/ai) secara permanen, atau sesuai permintaan dengan menyebutkan model tertentu di kolom pesan melalui `@{modelname}`. Kamu sekarang dapat memilih dari berbagai model AI, misalnya:
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) & [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) & [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - Alias model `@best` dan `@fast` — ketik `@best` untuk merutekan otomatis ke model terkuat, `@fast` untuk menggunakan model tercepat yang tersedia di OpenMates.
    
    ## 6. 💡 Inspirasi Harian & tautan Wikipedia
    
    AI, jika digunakan dengan benar, bisa menjadi alat yang luar biasa untuk belajar. Dan OpenMates dioptimalkan untuk mendorong orang belajar, menjelajah, dan mendapatkan inspirasi. Itulah gunanya Inspirasi Harian, yang kamu lihat di bagian atas antarmuka setelah kamu masuk. Mereka menampilkan video baru yang menarik — dan segera juga konten lain seperti artikel Wikipedia, fitur baru OpenMates, foto dan detail karya seni, peristiwa sejarah penting, dan banyak lagi. Inspirasi Harian disesuaikan dengan chat kamu, lalu dikunci di perangkatmu dengan kunci yang hanya kamu miliki — sehingga tetap pribadi bagimu.
    Selain itu, OpenMates juga menyoroti artikel Wikipedia secara otomatis dalam respons pesan asisten. Hal ini memudahkanmu untuk mempelajari lebih lanjut tentang suatu topik hanya dengan mengeklik kata yang disorot oranye dengan ikon studi di sampingnya.
    
    # 🚀 Apa selanjutnya
    
    Dalam minggu-minggu mendatang saya akan memposting berbagai klip pendek yang menunjukkan banyak fitur OpenMates dan hal-hal berguna yang dapat dilakukan dengannya, serta terus meningkatkan perangkat lunak dan menambahkan lebih banyak aplikasi, penyedia, dan fitur.
    
    Mulai sekarang rencana saya adalah mengirimkan email buletin untuk pengumuman & pembaruan setiap beberapa minggu, dan secara terpisah juga tips & trik tentang cara menggunakan OpenMates. Jangan ragu untuk [memeriksa pengaturan buletinmu kapan saja](https://openmates.org/#settings/newsletter), jika kamu ingin menerima lebih banyak atau lebih sedikit email buletin.
    
