message:
  context: 'Newsletter announcements/referral-feature-launch — message'
  en: |-
    Hey there,
    
    OpenMates now has a referral feature: you can share your personal referral link with friends, and when someone joins through it and makes their first eligible credit purchase, both of you receive free OpenMates credits.
    
    Here's how it works:
    
    - You share your referral link or QR code from the billing settings.
    - Your friend signs up through that link and makes their first eligible credit purchase.
    - They receive 2,000 free credits, and you receive 2,000 free credits too.
    
    The current referral campaign applies to first purchases of 10 EUR or more within 7 days. Each account can use one referral code once, and each referrer can receive rewards for up to 10 successful referrals while the referral budget is available.
    
    I added this because word of mouth is the most meaningful way OpenMates can grow: not through tracking ads or dark patterns, but through people recommending it when they genuinely find it useful.
    
    If you know someone who would like a more privacy-focused, flexible alternative to typical AI chatbots, feel free to invite them.
    
    Thanks for helping OpenMates grow in a way that fits the project.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates hat jetzt eine Empfehlungsfunktion: Du kannst deinen persönlichen Empfehlungslink mit Freund:innen teilen. Wenn jemand darüber beitritt und den ersten berechtigten Guthaben-Kauf macht, bekommt ihr beide kostenlose OpenMates-Credits.
    
    So funktioniert es:
    
    - Du teilst deinen Empfehlungslink oder QR-Code aus den Zahlungs-Einstellungen.
    - Dein:e Freund:in registriert sich über diesen Link und macht den ersten berechtigten Guthaben-Kauf.
    - Die eingeladene Person erhält 2.000 Gratis-Credits, und du erhältst ebenfalls 2.000 Gratis-Credits.
    
    Die aktuelle Empfehlungsaktion gilt für erste Käufe ab 10 EUR innerhalb von 7 Tagen. Jeder Account kann einmal einen Empfehlungscode nutzen, und Empfehlende können für bis zu 10 erfolgreiche Empfehlungen Belohnungen erhalten, solange das Empfehlungsbudget verfügbar ist.
    
    Ich habe diese Funktion hinzugefügt, weil persönliche Empfehlungen die sinnvollste Art sind, wie OpenMates wachsen kann: nicht durch Tracking-Anzeigen oder Dark Patterns, sondern dadurch, dass Menschen OpenMates weiterempfehlen, wenn sie es wirklich nützlich finden.
    
    Wenn du jemanden kennst, der eine datenschutzfreundlichere und flexiblere Alternative zu typischen KI-Chatbots gut gebrauchen könnte, kannst du OpenMates jetzt einfach einladen.
    
    Danke, dass du OpenMates auf eine Art beim Wachsen hilfst, die zum Projekt passt.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
  zh: |
    已经在用 OpenMates 并且想参加 5 月 19 日周二 19:00 在柏林举行的 OpenMates 见面会吗？
    
    在过去的一年半里，我一直在开发 OpenMates.org：一个比 ChatGPT、Claude、OpenClaw、Manus 等更好的替代方案。它通常能提供更好的回答，拥有更出色的用户体验设计，通过各种功能优先考虑隐私、安全和用户利益，并且不会将你锁定在某个生态系统中，同时仍允许你使用已经熟悉和使用的 AI 模型。它可以使用各种应用技能来查找活动、火车班次、医生预约、公寓等等，并且已经拥有了首批 200 名付费用户（购买一次性使用额度）。
    
    话虽如此：我目前还无法以此维持生计（主要仍靠失业救济金维持），而且最近几周和几个月的工作量巨大，让我感到越来越精疲力竭。我意识到这是一个庞大的项目，需要一个团队，而不是一直作为一个单人项目。因此，我现在正更多地致力于将其转变为一个团队协作项目，让 AI 的实用功能惠及普通大众，而不是只专注于企业。我希望建立一个可持续发展的业务和产品，让人们在未来几年依然喜爱使用，而不是成为另一家走向“平台腐烂”（enshittification）的初创公司。我对诸如“责任制所有权”（steward ownership）之类的概念更感兴趣，而不是讨论退出策略以及如何卖给科技巨头。
    
    由于我主要将自己定位为产品负责人（具有 UX 设计和软件开发背景），我特别希望能结识专注于市场营销/传播的人才——但也非常欢迎其他资深软件开发者的支持。此外，任何使用 OpenMates 的人的反馈都弥足珍贵，无论你的背景如何，我们都非常欢迎。
    
    如果你对此感兴趣，并希望提供反馈、结识志同道合的人，甚至进行长期合作，请参加 OpenMates 见面会或[给我发邮件](mailto:marco@openmates.org)！:)
    
    问候，
    
    Marco  
    OpenMates 创始人
  es: |
    ¿Ya usas OpenMates y quieres unirte al Meetup de OpenMates el martes 19 de mayo a las 19:00 en Berlín?
    
    Durante el último año y medio, he estado construyendo OpenMates.org: una mejor alternativa a ChatGPT, Claude, OpenClaw, Manus y otros. Normalmente ofrece mejores respuestas, tiene un mejor diseño de experiencia de usuario, prioriza la privacidad, la seguridad y los intereses del usuario con diversas funciones, y no te encierra en un ecosistema, permitiéndote seguir usando los modelos de IA que ya conoces y utilizas. Puede usar varias habilidades de la aplicación para encontrar eventos, conexiones de tren, citas médicas, apartamentos y mucho más, y ya cuenta con los primeros 200 usuarios de pago (compras de créditos de uso único).
    
    Dicho esto: aún no estoy en un punto en el que pueda vivir de ello (sigo financiado principalmente por la prestación por desempleo) y he trabajado tanto en las últimas semanas y meses que he empezado a quemarme cada vez más. Soy consciente de que este es un proyecto enorme y requiere un equipo en lugar de seguir siendo un proyecto de una sola persona. Por eso, ahora me estoy centrando más en convertir esto en un esfuerzo de equipo, para que los aspectos útiles de la IA sean accesibles para la gente común en lugar de centrarme en las empresas. Y para construir un negocio y un producto sostenibles que a la gente le siga gustando usar en los próximos años, en lugar de convertirme en una startup más en su camino hacia la "enshittification". Me interesan mucho más conceptos como la propiedad responsable (steward ownership), por ejemplo, en lugar de hablar de estrategias de salida y de cómo venderse a las grandes tecnológicas.
    
    Como me veo principalmente como el responsable de producto (con experiencia en diseño UX y desarrollo de software), me interesan especialmente las personas con un enfoque en marketing/comunicación, pero también me encantaría recibir apoyo de otros desarrolladores de software experimentados. Y los comentarios de cualquiera que use OpenMates son genuinamente valiosos y muy bienvenidos, independientemente de tu formación.
    
    Si esto te suena interesante y quieres contribuir con tus comentarios, conectar con otras personas o tal vez incluso colaborar a más largo plazo, ¡únete al meetup de OpenMates o [envíame un mensaje](mailto:marco@openmates.org)! :)
    
    Saludos,
    
    Marco  
    Creador de OpenMates
  fr: |
    Salut,
    
    OpenMates propose désormais un programme de parrainage : tu peux partager ton lien de parrainage personnel avec tes amis, et quand quelqu'un s'inscrit via ce lien et effectue son premier achat de crédits éligible, vous recevez tous les deux des crédits OpenMates gratuits.
    
    Voici comment ça marche :
    
    - Tu partages ton lien de parrainage ou ton code QR depuis les paramètres de facturation.
    - Ton ami s'inscrit via ce lien et effectue son premier achat de crédits éligible.
    - Il reçoit 2 000 crédits gratuits, et tu reçois également 2 000 crédits gratuits.
    
    La campagne de parrainage actuelle s'applique aux premiers achats de 10 EUR ou plus effectués dans les 7 jours. Chaque compte peut utiliser un code de parrainage une seule fois, et chaque parrain peut recevoir des récompenses pour un maximum de 10 parrainages réussis tant que le budget de parrainage est disponible.
    
    J'ai ajouté cela parce que le bouche-à-oreille est le moyen le plus significatif pour OpenMates de se développer : non pas par des publicités de suivi ou des interfaces trompeuses, mais par des personnes qui le recommandent lorsqu'elles le trouvent vraiment utile.
    
    Si tu connais quelqu'un qui aimerait une alternative aux chatbots IA classiques, plus respectueuse de la vie privée et plus flexible, n'hésite pas à l'inviter.
    
    Merci d'aider OpenMates à grandir d'une manière qui correspond au projet.
    
    Salutations,
    
    Marco  
    Créateur d'OpenMates
  pt: |
    Olá,
    
    O OpenMates agora tem uma funcionalidade de recomendação: podes partilhar o teu link de recomendação pessoal com amigos e, quando alguém se registar através dele e fizer a sua primeira compra de créditos elegível, ambos recebem créditos OpenMates grátis.
    
    Eis como funciona:
    
    - Partilhas o teu link de recomendação ou código QR a partir das definições de faturação.
    - O teu amigo regista-se através desse link e faz a sua primeira compra de créditos elegível.
    - Ele recebe 2.000 créditos grátis e tu também recebes 2.000 créditos grátis.
    
    A campanha de recomendação atual aplica-se a primeiras compras de 10 EUR ou mais no prazo de 7 dias. Cada conta pode usar um código de recomendação uma vez, e cada recomendador pode receber recompensas por até 10 recomendações bem-sucedidas enquanto o orçamento de recomendação estiver disponível.
    
    Adicionei isto porque o passa-palavra é a forma mais significativa de o OpenMates crescer: não através de anúncios de rastreio ou padrões obscuros, mas através de pessoas que o recomendam quando o consideram genuinamente útil.
    
    Se conheceres alguém que gostaria de uma alternativa mais focada na privacidade e flexível aos chatbots de IA típicos, sente-te à vontade para os convidar.
    
    Obrigado por ajudares o OpenMates a crescer de uma forma que se ajusta ao projeto.
    
    Saudações,
    
    Marco  
    Criador do OpenMates
  ru: |
    Привет,
    
    В OpenMates появилась реферальная функция: теперь ты можешь делиться своей персональной реферальной ссылкой с друзьями. Когда кто-то зарегистрируется по ней и совершит свою первую подходящую покупку кредитов, вы оба получите бесплатные кредиты OpenMates.
    
    Вот как это работает:
    
    - Ты делишься своей реферальной ссылкой или QR-кодом из настроек оплаты.
    - Твой друг регистрируется по этой ссылке и совершает свою первую подходящую покупку кредитов.
    - Он получает 2 000 бесплатных кредитов, и ты тоже получаешь 2 000 бесплатных кредитов.
    
    Текущая реферальная кампания распространяется на первые покупки на сумму от 10 EUR в течение 7 дней. Каждый аккаунт может использовать один реферальный код один раз, а каждый приглашающий может получить вознаграждение максимум за 10 успешных рефералов, пока доступен реферальный бюджет.
    
    Я добавил эту функцию, потому что «сарафанное радио» — это самый правильный способ роста для OpenMates: не через рекламную слежку или темные паттерны, а через рекомендации людей, которым проект действительно полезен.
    
    Если ты знаешь кого-то, кому подошла бы более конфиденциальная и гибкая альтернатива типичным ИИ-чат-ботам, смело приглашай их.
    
    Спасибо, что помогаешь OpenMates расти так, как это соответствует духу проекта.
    
    С наилучшими пожеланиями,
    
    Марко  
    Создатель OpenMates
  ja: |
    こんにちは。
    
    OpenMatesに紹介機能が追加されました。個人の紹介リンクを友だちにシェアして、そのリンクから誰かが参加して初めて対象となるクレジットを購入すると、あなたと友だちの両方が無料のOpenMatesクレジットを受け取れます。
    
    仕組みは以下の通りです：
    
    - お支払い設定から紹介リンクまたはQRコードをシェアします。
    - 友だちがそのリンクから登録し、初めて対象となるクレジットを購入します。
    - 友だちに2,000クレジット、あなたにも2,000クレジットの無料クレジットが付与されます。
    
    現在の紹介キャンペーンは、7日以内に行われた10ユーロ以上の初回購入に適用されます。各アカウントは紹介コードを1回のみ使用でき、紹介者は紹介予算がある限り、最大10件の成功した紹介に対して報酬を受け取ることができます。
    
    この機能を追加したのは、口コミこそがOpenMatesが成長するための最も意義のある方法だからです。追跡型広告やダークパターンではなく、本当に便利だと感じた人が勧めてくれることで成長したいと考えています。
    
    プライバシーを重視した、一般的なAIチャットボットに代わる柔軟な選択肢を求めている人がいれば、ぜひ招待してください。
    
    プロジェクトの趣旨に沿った形でOpenMatesの成長をサポートしていただき、ありがとうございます。
    
    よろしくお願いします。
    
    Marco  
    OpenMates 開発者
  ko: |
    안녕하세요,
    
    OpenMates에 추천 기능이 생겼어요. 친구에게 개인 추천 링크를 공유하고, 친구가 가입 후 첫 크레딧을 구매하면 두 분 모두에게 무료 OpenMates 크레딧을 드립니다.
    
    이용 방법은 다음과 같아요:
    
    - 결제 설정에서 추천 링크나 QR 코드를 공유합니다.
    - 친구가 해당 링크로 가입하고 첫 크레딧을 구매합니다.
    - 친구와 본인 모두 각각 2,000 무료 크레딧을 받습니다.
    
    현재 추천 캠페인은 7일 이내에 10유로 이상 처음 구매하는 경우에 적용됩니다. 각 계정은 추천 코드를 한 번만 사용할 수 있으며, 추천인은 추천 예산이 소진될 때까지 최대 10명의 성공적인 추천에 대해 보상을 받을 수 있습니다.
    
    추적 광고나 다크 패턴이 아니라, 사람들이 진심으로 유용하다고 느껴서 추천하는 입소문이야말로 OpenMates가 성장할 수 있는 가장 의미 있는 방법이라고 생각해서 이 기능을 추가했습니다.
    
    일반적인 AI 챗봇보다 개인정보 보호를 중시하고 유연한 대안을 찾는 분을 알고 계신다면 편하게 초대해 주세요.
    
    프로젝트의 방향에 맞게 OpenMates가 성장할 수 있도록 도와주셔서 감사합니다.
    
    그럼 이만,
    
    OpenMates 제작자 Marco 드림
  it: |
    Usi già OpenMates e vuoi partecipare all'OpenMates Meetup martedì 19 maggio alle 19:00 a Berlino?
    
    Negli ultimi un anno e mezzo, ho sviluppato OpenMates.org: un'alternativa migliore a ChatGPT, Claude, OpenClaw, Manus e altri. In genere offre risposte migliori, ha un design dell'esperienza utente superiore, dà priorità alla privacy, alla sicurezza e agli interessi degli utenti con varie funzionalità e non ti vincola a un ecosistema, pur permettendoti di utilizzare i modelli di IA che già conosci e usi. Può utilizzare diverse abilità dell'app per trovare eventi, collegamenti ferroviari, appuntamenti medici, appartamenti e molto altro, e ha già i primi 200 utenti paganti (acquisti di crediti di utilizzo una tantum).
    
    Detto questo: non sono ancora al punto di poterne vivere (è ancora finanziato principalmente dal sussidio di disoccupazione) e ho lavorato così tanto nelle ultime settimane e mesi che ho iniziato ad andare sempre più in burnout. Sono consapevole che si tratta di un progetto enorme e che richiede un team invece di rimanere un progetto individuale. Quindi, ora mi sto concentrando maggiormente sul rendere questo un lavoro di squadra, per rendere gli aspetti utili dell'IA accessibili alle persone comuni invece di concentrarmi sulle aziende. E per costruire un'attività e un prodotto sostenibili che le persone amino ancora usare negli anni a venire, invece di diventare l'ennesima startup sulla strada della "enshittification". Sono molto più interessato a concetti come la steward ownership, ad esempio, invece di parlare di strategie di uscita e di come svendersi alle big tech.
    
    Dato che mi vedo principalmente come un "product guy" (background in UX design + sviluppo software), sono particolarmente interessato a persone con un focus su marketing/comunicazione, ma mi piacerebbe anche ricevere supporto da altri sviluppatori software esperti. E il feedback di chiunque utilizzi OpenMates è davvero prezioso e molto gradito, indipendentemente dal tuo background.
    
    Se questo ti sembra interessante e vuoi contribuire con il tuo feedback, connetterti con altre persone o magari collaborare a lungo termine, partecipa al meetup di OpenMates o [inviami un messaggio](mailto:marco@openmates.org)! :)
    
    Un saluto,
    
    Marco  
    Creatore di OpenMates
  tr: |
    Selam,
    
    OpenMates'te artık bir referans özelliği var: Kişisel referans bağlantını arkadaşlarınla paylaşabilirsin; birisi bu bağlantı üzerinden katıldığında ve ilk uygun kredi satın alımını yaptığında, her ikiniz de ücretsiz OpenMates kredisi kazanırsınız.
    
    İşte nasıl çalıştığı:
    
    - Ödeme ayarlarından referans bağlantını veya QR kodunu paylaşırsın.
    - Arkadaşın bu bağlantı üzerinden kaydolur ve ilk uygun kredi satın alımını yapar.
    - O 2.000 ücretsiz kredi kazanır, sen de 2.000 ücretsiz kredi kazanırsın.
    
    Mevcut referans kampanyası, 7 gün içindeki 10 EUR veya üzeri ilk satın alımlar için geçerlidir. Her hesap bir referans kodunu bir kez kullanabilir ve her referans veren, referans bütçesi mevcut olduğu sürece en fazla 10 başarılı referans için ödül alabilir.
    
    Bunu ekledim çünkü kulaktan kulağa yayılma OpenMates'in büyümesi için en anlamlı yol: Takip reklamları veya karanlık tasarımlar (dark patterns) yoluyla değil, insanların gerçekten faydalı bulduklarında tavsiye etmeleriyle.
    
    Tipik yapay zeka sohbet botlarına daha gizlilik odaklı, esnek bir alternatif arayan birini tanıyorsan, onları davet etmekten çekinme.
    
    OpenMates'in projeye uygun bir şekilde büyümesine yardımcı olduğun için teşekkürler.
    
    Selamlar,
    
    Marco  
    OpenMates'in Yaratıcısı
  vi: |
    Chào bạn,
    
    OpenMates hiện đã có tính năng giới thiệu: bạn có thể chia sẻ liên kết giới thiệu cá nhân của mình với bạn bè, và khi ai đó tham gia qua liên kết đó và thực hiện giao dịch mua credit đủ điều kiện đầu tiên, cả hai sẽ nhận được credit OpenMates miễn phí.
    
    Cách thức hoạt động như sau:
    
    - Bạn chia sẻ liên kết giới thiệu hoặc mã QR từ cài đặt thanh toán.
    - Bạn của bạn đăng ký qua liên kết đó và thực hiện giao dịch mua credit đủ điều kiện đầu tiên.
    - Họ nhận được 2.000 credit miễn phí, và bạn cũng nhận được 2.000 credit miễn phí.
    
    Chiến dịch giới thiệu hiện tại áp dụng cho các giao dịch mua đầu tiên từ 10 EUR trở lên trong vòng 7 ngày. Mỗi tài khoản có thể sử dụng một mã giới thiệu một lần, và mỗi người giới thiệu có thể nhận phần thưởng cho tối đa 10 lần giới thiệu thành công trong khi ngân sách giới thiệu vẫn còn.
    
    Tôi thêm tính năng này vì truyền miệng là cách ý nghĩa nhất để OpenMates phát triển: không phải thông qua quảng cáo theo dõi hay các thủ thuật tâm lý, mà thông qua việc mọi người giới thiệu khi họ thực sự thấy nó hữu ích.
    
    Nếu bạn biết ai đó muốn một giải pháp thay thế linh hoạt, tập trung vào quyền riêng tư hơn cho các chatbot AI thông thường, đừng ngần ngại mời họ.
    
    Cảm ơn bạn đã giúp OpenMates phát triển theo cách phù hợp với dự án.
    
    Thân ái,
    
    Marco  
    Người sáng lập OpenMates
  id: |
    Sudah menggunakan OpenMates dan ingin bergabung dalam OpenMates Meetup pada hari Selasa, 19 Mei pukul 19:00 di Berlin?
    
    Selama 1 1/2 tahun terakhir, saya telah membangun OpenMates.org: Alternatif yang lebih baik untuk ChatGPT, Claude, OpenClaw, Manus, dan lainnya. Biasanya memberikan respons yang lebih baik, memiliki desain pengalaman pengguna yang lebih baik, memprioritaskan privasi, keamanan, dan kepentingan pengguna dengan berbagai fitur, serta tidak mengunci kamu dalam satu ekosistem, sambil tetap memungkinkan kamu menggunakan model AI yang sudah kamu kenal dan gunakan. Aplikasi ini dapat menggunakan berbagai keahlian aplikasi untuk mencari acara, koneksi kereta api, janji temu dokter, apartemen, dan banyak lagi, serta telah memiliki 200 pengguna berbayar pertama (pembelian kredit penggunaan satu kali).
    
    Meski begitu: Saya belum berada di titik di mana saya bisa hidup dari proyek ini (masih dibiayai terutama oleh tunjangan pengangguran) dan saya bekerja sangat keras dalam beberapa minggu dan bulan terakhir hingga saya mulai merasa semakin burn out. Saya sadar bahwa ini adalah proyek besar dan membutuhkan tim alih-alih tetap menjadi proyek satu orang. Jadi, sekarang saya lebih fokus untuk menjadikan ini proyek upaya tim, untuk membuat aspek AI yang bermanfaat dapat diakses oleh orang biasa alih-alih berfokus pada perusahaan besar. Dan untuk membangun bisnis serta produk berkelanjutan yang tetap disukai orang di tahun-tahun mendatang, alih-alih menjadi sekadar startup lain dalam perjalanannya menuju enshittification. Saya jauh lebih tertarik pada konsep-konsep seperti steward ownership, misalnya, daripada membicarakan strategi keluar dan bagaimana menjual diri ke perusahaan teknologi besar.
    
    Karena saya melihat diri saya terutama sebagai orang produk (latar belakang desain UX + pengembangan perangkat lunak), saya sangat tertarik pada orang-orang dengan fokus pemasaran/komunikasi - tetapi juga ingin mendapatkan dukungan dari pengembang perangkat lunak berpengalaman lainnya. Dan umpan balik dari siapa pun yang menggunakan OpenMates sangatlah berharga dan sangat disambut baik, apa pun latar belakangmu.
    
    Jika ini terdengar menarik bagimu dan kamu ingin berkontribusi dengan umpan balikmu, terhubung dengan orang lain atau bahkan mungkin berkolaborasi dalam jangka panjang - bergabunglah dalam meetup OpenMates atau [kirimkan pesan kepada saya](mailto:marco@openmates.org)! :)
    
    Salam,
    
    Marco  
    Kreator OpenMates
  pl: |
    Cześć,
    
    OpenMates ma teraz program poleceń: możesz udostępnić znajomym swój osobisty link polecający, a gdy ktoś dołączy za jego pośrednictwem i dokona pierwszego kwalifikującego się zakupu kredytów, oboje otrzymacie darmowe kredyty OpenMates.
    
    Oto jak to działa:
    
    - Udostępniasz swój link polecający lub kod QR z ustawień rozliczeń.
    - Twój znajomy rejestruje się przez ten link i dokonuje pierwszego kwalifikującego się zakupu kredytów.
    - On otrzymuje 2000 darmowych kredytów i Ty również otrzymujesz 2000 darmowych kredytów.
    
    Obecna kampania poleceń dotyczy pierwszych zakupów o wartości co najmniej 10 EUR dokonanych w ciągu 7 dni. Każde konto może raz użyć jednego kodu polecającego, a każdy polecający może otrzymać nagrody za maksymalnie 10 udanych poleceń, dopóki dostępny jest budżet programu.
    
    Dodałem tę funkcję, ponieważ polecenia ustne to najbardziej wartościowy sposób na rozwój OpenMates: nie przez śledzące reklamy czy zwodnicze interfejsy (dark patterns), ale dzięki ludziom, którzy polecają serwis, gdy uznają go za naprawdę przydatny.
    
    Jeśli znasz kogoś, komu przydałaby się bardziej dbająca o prywatność i elastyczna alternatywa dla typowych chatbotów AI, śmiało zaproś tę osobę.
    
    Dzięki za pomoc w rozwoju OpenMates w sposób zgodny z duchem projektu.
    
    Pozdrawiam,
    
    Marco  
    Twórca OpenMates
  nl: |
    Hey daar,
    
    OpenMates heeft nu een referral-functie: je kunt je persoonlijke referral-link delen met vrienden, en wanneer iemand zich via die link aanmeldt en hun eerste in aanmerking komende credit-aankoop doet, ontvangen jullie allebei gratis OpenMates-credits.
    
    Zo werkt het:
    
    - Je deelt je referral-link of QR-code vanuit de facturatie-instellingen.
    - Je vriend meldt zich aan via die link en doet hun eerste in aanmerking komende credit-aankoop.
    - Zij ontvangen 2.000 gratis credits, en jij ontvangt ook 2.000 gratis credits.
    
    De huidige referral-campagne is van toepassing op eerste aankopen van 10 EUR of meer binnen 7 dagen. Elk account kan één referral-code één keer gebruiken, en elke verwijzer kan beloningen ontvangen voor maximaal 10 succesvolle referrals zolang het referral-budget beschikbaar is.
    
    Ik heb dit toegevoegd omdat mond-tot-mondreclame de meest betekenisvolle manier is waarop OpenMates kan groeien: niet via tracking-advertenties of dark patterns, maar doordat mensen het aanbevelen wanneer ze het echt nuttig vinden.
    
    Als je iemand kent die een meer privacygerichte, flexibele alternatief voor typische AI-chatbots zou willen, voel je dan vrij om hen uit te nodigen.
    
    Bedankt voor het helpen groeien van OpenMates op een manier die bij het project past.
    
    Groeten,
    
    Marco  
    Maker van OpenMates
  ar: |
    أهلاً بك،
    
    أصبح لدى OpenMates الآن ميزة إحالة: يمكنك مشاركة رابط الإحالة الشخصي الخاص بك مع الأصدقاء، وعندما ينضم شخص ما من خلاله ويقوم بأول عملية شراء رصيد مؤهلة، يحصل كلاكما على رصيد OpenMates مجاني.
    
    إليك كيفية العمل:
    
    - تشارك رابط الإحالة أو رمز الاستجابة السريعة (QR code) من إعدادات الفوترة.
    - يقوم صديقك بالتسجيل عبر هذا الرابط ويقوم بأول عملية شراء رصيد مؤهلة.
    - يحصل هو على 2,000 رصيد مجاني، وتحصل أنت أيضاً على 2,000 رصيد مجاني.
    
    تنطبق حملة الإحالة الحالية على أول عملية شراء بقيمة 10 يورو أو أكثر خلال 7 أيام. يمكن لكل حساب استخدام رمز إحالة واحد لمرة واحدة، ويمكن لكل محيل الحصول على مكافآت لما يصل إلى 10 إحالات ناجحة طالما أن ميزانية الإحالة متاحة.
    
    لقد أضفت هذه الميزة لأن التوصية الشخصية هي الطريقة الأكثر أهمية لنمو OpenMates: ليس من خلال إعلانات التتبع أو الأساليب الملتوية، ولكن من خلال توصية الأشخاص بها عندما يجدونها مفيدة حقاً.
    
    إذا كنت تعرف شخصاً يرغب في بديل أكثر مرونة وتركيزاً على الخصوصية لروبوتات الدردشة التقليدية التي تعمل بالذكاء الاصطناعي، فلا تتردد في دعوته.
    
    شكراً لمساعدتك في نمو OpenMates بطريقة تناسب المشروع.
    
