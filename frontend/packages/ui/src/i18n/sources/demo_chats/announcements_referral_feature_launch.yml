  hi: |
    नमस्ते,
    
    OpenMates में अब एक रेफरल फीचर है: तुम अपने दोस्तों के साथ अपना व्यक्तिगत रेफरल लिंक साझा कर सकते हो, और जब कोई इसके माध्यम से जुड़ता है और अपनी पहली योग्य क्रेडिट खरीदारी करता है, तो तुम दोनों को मुफ्त OpenMates क्रेडिट मिलते हैं।
    
    यह इस तरह काम करता है:
    
    - तुम बिलिंग सेटिंग्स से अपना रेफरल लिंक या QR कोड साझा करते हो।
    - तुम्हारा दोस्त उस लिंक के माध्यम से साइन अप करता है और अपनी पहली योग्य क्रेडिट खरीदारी करता है।
    - उन्हें 2,000 मुफ्त क्रेडिट मिलते हैं, और तुम्हें भी 2,000 मुफ्त क्रेडिट मिलते हैं।
    
    वर्तमान रेफरल अभियान 7 दिनों के भीतर 10 EUR या उससे अधिक की पहली खरीदारी पर लागू होता है। प्रत्येक खाता एक बार एक रेफरल कोड का उपयोग कर सकता है, और प्रत्येक रेफरर रेफरल बजट उपलब्ध होने तक 10 सफल रेफरल तक पुरस्कार प्राप्त कर सकता है।
    
    मैंने इसे इसलिए जोड़ा क्योंकि OpenMates के बढ़ने का सबसे सार्थक तरीका लोगों की सिफारिशें हैं: ट्रैकिंग विज्ञापनों या डार्क पैटर्न के माध्यम से नहीं, बल्कि लोगों द्वारा इसे तब सुझाने के माध्यम से जब वे इसे वास्तव में उपयोगी पाते हैं।
    
    यदि तुम किसी ऐसे व्यक्ति को जानते हो जो सामान्य AI चैटबॉट्स के लिए अधिक गोपनीयता-केंद्रित, लचीला विकल्प चाहता है, तो बेझिझक उन्हें आमंत्रित करें।
    
    OpenMates को इस तरह से बढ़ने में मदद करने के लिए धन्यवाद जो प्रोजेक्ट के अनुकूल हो।
    
    शुभकामनाएं,
    
    मार्को  
    OpenMates के निर्माता
  th: |
    สวัสดี
    
    ตอนนี้ OpenMates มีฟีเจอร์แนะนำเพื่อนแล้ว: เธอสามารถแชร์ลิงก์แนะนำส่วนตัวกับเพื่อนๆ และเมื่อมีคนสมัครผ่านลิงก์นั้นและซื้อเครดิตครั้งแรกตามเงื่อนไข ทั้งเธอและเพื่อนจะได้รับเครดิต OpenMates ฟรี
    
    วิธีการมีดังนี้:
    
    - แชร์ลิงก์แนะนำหรือรหัส QR จากการตั้งค่าการเรียกเก็บเงิน
    - เพื่อนของเธอสมัครใช้งานผ่านลิงก์นั้นและซื้อเครดิตครั้งแรกตามเงื่อนไข
    - เพื่อนจะได้รับ 2,000 เครดิตฟรี และเธอจะได้รับ 2,000 เครดิตฟรีเช่นกัน
    
    แคมเปญแนะนำเพื่อนปัจจุบันใช้กับการซื้อครั้งแรกตั้งแต่ 10 EUR ขึ้นไปภายใน 7 วัน แต่ละบัญชีสามารถใช้รหัสแนะนำได้หนึ่งครั้ง และผู้แนะนำแต่ละคนสามารถรับรางวัลได้สูงสุดสำหรับการแนะนำที่สำเร็จ 10 ครั้ง ตราบเท่าที่ยังมีงบประมาณสำหรับแคมเปญนี้อยู่
    
    ฉันเพิ่มฟีเจอร์นี้เพราะการบอกต่อเป็นวิธีที่มีความหมายที่สุดที่ OpenMates จะเติบโตได้: ไม่ใช่ผ่านโฆษณาติดตามตัวหรือรูปแบบที่หลอกล่อ (dark patterns) แต่ผ่านการที่ผู้คนแนะนำเมื่อพวกเขารู้สึกว่ามันมีประโยชน์จริงๆ
    
    หากเธอรู้จักใครที่ต้องการทางเลือกอื่นนอกเหนือจากแชทบอท AI ทั่วไป ที่เน้นความเป็นส่วนตัวและยืดหยุ่นกว่า อย่าลังเลที่จะชวนพวกเขามาใช้งานนะ
    
    ขอบคุณที่ช่วยให้ OpenMates เติบโตในแนวทางที่เหมาะสมกับโปรเจกต์นี้
    
    ด้วยความเคารพ
    
    Marco  
    ผู้สร้าง OpenMates
  cs: |
    Ahoj,
    
    OpenMates má nyní funkci doporučení: můžeš sdílet svůj osobní odkaz s přáteli, a když se někdo přidá přes tvůj odkaz a provede svůj první nákup kreditů splňující podmínky, oba získáte kredity OpenMates zdarma.
    
    Takhle to funguje:
    
    - Sdílíš svůj odkaz pro doporučení nebo QR kód z nastavení fakturace.
    - Tvůj přítel se zaregistruje přes tento odkaz a provede svůj první nákup kreditů splňující podmínky.
    - Získá 2 000 kreditů zdarma a ty získáš také 2 000 kreditů zdarma.
    
    Současná kampaň se vztahuje na první nákupy v hodnotě 10 EUR a více provedené do 7 dní. Každý účet může použít jeden kód pro doporučení jednou a každý doporučující může získat odměnu až za 10 úspěšných doporučení, dokud je k dispozici rozpočet kampaně.
    
    Tuto funkci jsem přidal, protože osobní doporučení je pro OpenMates ten nejsmysluplnější způsob růstu: ne přes sledovací reklamy nebo nekalé praktiky (dark patterns), ale díky lidem, kteří projekt doporučí, protože jim přijde skutečně užitečný.
    
    Pokud znáš někoho, kdo by ocenil flexibilní alternativu k běžným AI chatbotům zaměřenou na soukromí, neváhej ho pozvat.
    
    Díky, že pomáháš OpenMates růst způsobem, který k projektu sedí.
    
    Zdraví tě,
    
    Marco  
    tvůrce OpenMates
  sv: |
    Hej,
    
    OpenMates har nu en värvningsfunktion: du kan dela din personliga värvningslänk med vänner, och när någon går med via den och gör sitt första berättigade köp av krediter får ni båda gratis OpenMates-krediter.
    
    Så här fungerar det:
    
    - Du delar din värvningslänk eller QR-kod från faktureringsinställningarna.
    - Din vän registrerar sig via länken och gör sitt första berättigade köp av krediter.
    - De får 2 000 gratis krediter, och du får också 2 000 gratis krediter.
    
    Den nuvarande värvningskampanjen gäller för första köp på 10 EUR eller mer inom 7 dagar. Varje konto kan använda en värvningskod en gång, och varje värvare kan få belöningar för upp till 10 framgångsrika värvningar så länge värvningsbudgeten räcker.
    
    Jag lade till detta eftersom rekommendationer är det mest meningsfulla sättet för OpenMates att växa: inte genom spårningsannonser eller dark patterns, utan genom att människor rekommenderar tjänsten när de verkligen tycker att den är användbar.
    
    Om du känner någon som skulle vilja ha ett mer integritetsfokuserat och flexibelt alternativ till typiska AI-chatbottar, får du gärna bjuda in dem.
    
    Tack för att du hjälper OpenMates att växa på ett sätt som passar projektet.
    
    Hälsningar,
    
    Marco  
    Skapare av OpenMates
  he: |
    היי,
    
    ל-OpenMates יש עכשיו פיצ'ר הפניות: תוכל לשתף את קישור ההפניה האישי שלך עם חברים, וכשמישהו יצטרף דרכו ויבצע את רכישת הקרדיטים הראשונה המתאימה שלו, שניכם תקבלו קרדיטים של OpenMates בחינם.
    
    כך זה עובד:
    
    - משתפים את קישור ההפניה או את קוד ה-QR מהגדרות החיוב.
    - החבר נרשם דרך הקישור ומבצע את רכישת הקרדיטים הראשונה המתאימה שלו.
    - הוא מקבל 2,000 קרדיטים בחינם, וגם אתה מקבל 2,000 קרדיטים בחינם.
    
    קמפיין ההפניות הנוכחי חל על רכישות ראשונות של 10 אירו ומעלה בתוך 7 ימים. כל חשבון יכול להשתמש בקוד הפניה אחד פעם אחת, וכל מפנה יכול לקבל תגמולים עבור עד 10 הפניות מוצלחות כל עוד תקציב ההפניות זמין.
    
    הוספתי את זה כי "מפה לאוזן" היא הדרך המשמעותית ביותר שבה OpenMates יכולה לצמוח: לא דרך מודעות מעקב או דפוסים אפלים, אלא דרך אנשים שממליצים עליה כשהם באמת מוצאים אותה שימושית.
    
    אם אתה מכיר מישהו שמעוניין בחלופה גמישה וממוקדת פרטיות לצ'אטבוטים רגילים של AI, אל תהסס להזמין אותו.
    
    תודה שעזרת ל-OpenMates לצמוח בדרך שמתאימה לפרויקט.
    
    בברכה,
    
    מרקו  
    היוצר של OpenMates
