  en: |-
    Hey there,
    
    OpenMates now has a referral feature: you can share your personal referral link with friends, and when someone joins through it and makes their first eligible credit purchase, both of you receive free OpenMates credits.
    
    [cta]
    
    Here's how it works:
    
    - You share your referral link or QR code from the billing settings.
    - Your friend signs up through that link and makes their first eligible credit purchase.
    - They receive 2,000 free credits, and you receive 2,000 free credits too.
    
    The current referral campaign applies to first purchases of 10 EUR or more within 7 days. Each account can use one referral code once, and each referrer can receive rewards for up to 10 successful referrals while the referral budget is available.
    
    I added this because word of mouth is the most meaningful way OpenMates can grow: not through tracking ads or dark patterns, but through people recommending it when they genuinely find it useful.
    
    If you know someone who would like a more privacy-focused, flexible alternative to typical AI chatbots, feel free to invite them.
    
    Thanks for helping OpenMates grow in a way that fits the project.
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Hallo,
    
    OpenMates hat jetzt eine Empfehlungsfunktion: Du kannst deinen persönlichen Empfehlungslink mit Freund:innen teilen. Wenn jemand darüber beitritt und den ersten berechtigten Guthaben-Kauf macht, bekommt ihr beide kostenlose OpenMates-Credits.
    
    [cta]
    
    So funktioniert es:
    
    - Du teilst deinen Empfehlungslink oder QR-Code aus den Zahlungs-Einstellungen.
    - Dein:e Freund:in registriert sich über diesen Link und macht den ersten berechtigten Guthaben-Kauf.
    - Die eingeladene Person erhält 2.000 Gratis-Credits, und du erhältst ebenfalls 2.000 Gratis-Credits.
    
    Die aktuelle Empfehlungsaktion gilt für erste Käufe ab 10 EUR innerhalb von 7 Tagen. Jeder Account kann einmal einen Empfehlungscode nutzen, und Empfehlende können für bis zu 10 erfolgreiche Empfehlungen Belohnungen erhalten, solange das Empfehlungsbudget verfügbar ist.
    
    Ich habe diese Funktion hinzugefügt, weil persönliche Empfehlungen die sinnvollste Art sind, wie OpenMates wachsen kann: nicht durch Tracking-Anzeigen oder Dark Patterns, sondern dadurch, dass Menschen OpenMates weiterempfehlen, wenn sie es wirklich nützlich finden.
    
    Wenn du jemanden kennst, der eine datenschutzfreundlichere und flexiblere Alternative zu typischen KI-Chatbots gut gebrauchen könnte, kannst du OpenMates jetzt einfach einladen.
    
    Danke, dass du OpenMates auf eine Art beim Wachsen hilfst, die zum Projekt passt.
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
  zh: |
    你好，
    
    我是 Marco（又名 [glowingkitty](https://github.com/glowingkitty)）—— OpenMates 的开发者。
    我没有忘记 OpenMates —— 恰恰相反。
    
    [video]
    
    # 🙏 首先，我想说几句感谢的话
    
    12 月底，在 Chaos Communication Congress (CCC) 期间，我意外地收到了德国电视台 ZDF 的采访邀请[（这是一篇讨论针对大型科技公司 AI 的隐私保护替代方案重要性的报道）](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html)。哇，那真是一次难忘的经历。尽管当时的 OpenMates 还比较粗糙，但第一批用户已经开始注册并使用它了 —— 他们还发现了一些我在自己设备上测试时没遇到的 Bug 和极端情况，并热心地报告了这些问题。非常感谢每一位提供反馈的朋友 —— 这对让 OpenMates 变得更精炼、更稳定、更完备起到了巨大的帮助！当然，如果你在使用 OpenMates 时发现任何感觉不对劲或损坏的地方，非常欢迎继续报告问题。
    
    虽然这并不是我开发的第一个软件，但这是第一次有这么多（不仅仅是几个人）开始使用我构建的软件 —— 到目前为止，OpenMates 已经有超过 180 名活跃用户了！这非常令人兴奋，坦白说，起初也让我感到有些应接不暇。
    
    从那时起，我完全专注于改进和调试 OpenMates，使其功能更趋完备和精炼 —— 并对代码进行了大量更改。包括 Bug 修复、新功能、改进的用户界面以及许多其他优化。
    
    今天，我很高兴能为你带来过去几个月最令人兴奋的变化更新！请记住，在一个简报中讨论所有更改内容太多了 —— 因此我将重点介绍亮点，并在接下来的几周内发布多个关于 OpenMates 各种功能的短视频，发布平台包括：
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates)。
    
    # ✨ 过去几个月的亮点
    
    ## 1. 🧩 新应用与应用技能
    
    除了现有的搜索网页、阅读和分析网站以及读取 YouTube 视频字幕以发起讨论的功能外 —— OpenMates 还新增了许多应用和应用技能。以下是一些亮点：
    
    - 🏥 **[健康 (Health)](https://openmates.org/#settings/apps/health/skills/search_appointments)：** 正在寻找医生预约？健康应用现在可以检查 Doctolib 和 Jameda 上的可用时段。
    - 🏠 **[房产 (Home)](https://openmates.org/#settings/apps/home/skills/search)：** 在 ImmoScout24、WG-Gesucht 和 Kleinanzeigen 上搜索公寓 —— 关键细节直接在 OpenMates 上可见。
    - 🎉 **[活动 (Events)](https://openmates.org/#settings/apps/events/skills/search)：** 在 Meetup、Luma、Resident Advisor 和 Google 上搜索和筛选活动 —— 包含描述、图片、活动时间和地点等详情，以及直接 RSVP 或加入的链接。
    - ✈️ **[旅行 (Travel)](https://openmates.org/#settings/apps/travel)：** 新的“[搜索交通连接](https://openmates.org/#settings/apps/travel/skills/search_connections)”技能让你通过 Google 搜索航班，可同时跨多天搜索多个连接 —— 包括完整的航班详情和预订链接。对火车连接的支持即将推出。而“[价格日历](https://openmates.org/#settings/apps/travel/skills/price_calendar)”技能可以让你快速概览一个月的价格走势。
    - ⏰ **[提醒 (Reminders)](https://openmates.org/#settings/apps/reminder)：** 为聊天创建提醒以便稍后处理 —— 甚至可以触发 OpenMates 搜索并总结特定主题的每日最新新闻。
    - 🖼️ **[图片 (Images)](https://openmates.org/#settings/apps/images)：** 在网页上[搜索](https://openmates.org/#settings/apps/images/skills/search)图片、[生成](https://openmates.org/#settings/apps/images/skills/generate)图片和[矢量图形](https://openmates.org/#settings/apps/images/skills/vectorize)。
    - 📄 **[PDF](https://openmates.org/#settings/apps/pdf)：** 上传 PDF 并针对文本甚至视觉布局提问 —— OpenMates 既能阅读也能查看 PDF！
    - 💻 **[代码 (Code)](https://openmates.org/#settings/apps/code)：** OpenMates 可以[搜索最新的文档](https://openmates.org/#settings/apps/code/skills/get_docs)来回答编程相关问题，然后编写代码 —— 甚至让你直接在浏览器中预览网站设计和代码！而这仅仅是其编程能力的初步阶段。
    - 🧮 **[数学 (Math)](https://openmates.org/#settings/apps/math)：** 在 OpenMates 中计算表达式，甚至可视化绘图。
    - 📝 **[文档 (Docs)](https://openmates.org/#settings/apps/docs)：** 请求生成 Word 文档 —— 并将其下载为 .docx 文件。
    - 📊 **[表格 (Sheets)](https://openmates.org/#settings/apps/sheets)：** OpenMates 还可以创建表格并让你将其下载为 .xlsx 文件。在接下来的几周内，文档和表格功能都将变得更好、更强大。
    - 📧 **[邮件 (Mail)](https://openmates.org/#settings/apps/mail)：** OpenMates 可以为你起草电子邮件，然后你可以通过设备上的默认邮件程序轻松打开并发送。
    - 🎙️ **[音频 (Audio)](https://openmates.org/#settings/apps/audio)：** 不想打字？直接从消息栏录制并向 OpenMates 发送语音消息。
    
    还有更多应用技能已添加。只需[查看并探索 OpenMates 应用](https://openmates.org/#settings/apps)。
    
    ## 2. 🔒 个人数据占位符
    
    与大型科技公司和典型初创公司的 AI 聊天机器人不同，OpenMates 将你的隐私作为首要任务。它已经具备了各种隐私保护措施：
    - 🔐 你所有的聊天内容仅在你的设备上进行加密和解密
    - 🖼️ 所有外部图片都通过我们的 OpenMates 服务器加载（因此外部网站看不到你的 IP 地址或设备信息）
    - 📉 OpenMates 不使用 Google Analytics 或任何其他分析软件（这也是为什么你在 OpenMates 上看不到 Cookie 横幅的原因）
    
    新功能：当你起草并向 OpenMates 发送消息时，电子邮件地址、电话号码、API 密钥等敏感数据会在你的设备上被自动检测并替换为占位符。你随时可以在用户界面中切换回原始值，也可以点击检测到的数据以防止替换。但默认情况下，此功能可确保 OpenMates 和处理你消息的 AI 提供商从一开始就看不到这些敏感数据。
    
    [亲自尝试一下](https://openmates.org/#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.) —— 点击此链接查看个人数据占位符的实际效果：你的电子邮件和电话号码将在发送给 AI 之前被自动检测并替换。
    
    ## 3. 🧠 记忆 (Memories)
    
    OpenMates 现在可以记住特定应用的记忆，例如你即将到来的旅行或项目详情。但是：所有记忆仅在你的设备上加密和解密，并且只有在你为特定聊天明确确认后，才会临时与 OpenMates 服务器和 AI 提供商共享。这让你能够充分利用个性化回复，而无需不断重复你的项目细节 —— 同时仍能完全控制你共享的数据、共享时间以及与哪个 AI 提供商共享。查看 [OpenMates 应用中的记忆](https://openmates.org/#settings/apps/all/memories)。
    
    ## 4. 🎯 专注模式 (Focus Modes)
    
    了解如何向 AI 聊天机器人提供正确的指令，对于聊天机器人的帮助程度和回复质量有着巨大的影响。有了专注模式，你不需要成为提示词工程专家，也能充分利用出色的、有针对性的指令。例如，只需向 OpenMates 询问职业见解，“职业见解”专注模式就会自动激活，引导你完成整个过程。当然：这仅仅是个开始。接下来的几周内将添加更多专注模式，并进一步提高现有模式的质量。欢迎查看 [OpenMates 应用中的专注模式](https://openmates.org/#settings/apps/all/focus-modes)。
    
    ## 5. 🤖 新模型
    
    OpenMates 提供了广泛的高效且性能卓越的 AI 模型选择。默认情况下，它会根据任务自动选择合适的模型。但你随时可以[在 AI 设置中](https://openmates.org/#settings/ai)永久覆盖此行为，或者通过在消息栏中使用 `@{modelname}` 提及特定模型来按需覆盖。你现在可以从多种 AI 模型中进行选择，例如：
    
    - [Claude Opus 4.7](https://openmates.org/#settings/ai/model/claude-opus-4-7) 和 [Claude Sonnet 4.6](https://openmates.org/#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](https://openmates.org/#settings/ai/model/gemini-3.1-pro-preview) 和 [Gemini 3 Flash](https://openmates.org/#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](https://openmates.org/#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](https://openmates.org/#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](https://openmates.org/#settings/ai/model/devstral-2512)
    - `@best` 和 `@fast` 模型别名 —— 输入 `@best` 自动路由到最强模型，输入 `@fast` 使用 OpenMates 上可用的最快模型。
    
    ## 6. 💡 每日灵感与维基百科链接
    
    如果使用得当，AI 可以成为一个极好的学习工具。OpenMates 经过优化，旨在鼓励人们学习、探索和获取灵感。这就是你登录后在界面顶部看到的“每日灵感”的作用。它们会展示有趣的新视频 —— 很快还会包含其他内容，如维基百科文章、OpenMates 新功能、艺术品的照片和详情、重要的历史事件等。每日灵感是根据你的聊天内容量身定制的，然后使用只有你拥有的密钥锁定在你的设备上 —— 因此它们对你来说是私密的。
    此外，OpenMates 还会自动在助手消息的回复中突出显示维基百科文章。这使得你只需点击带有学习图标的橙色高亮单词，即可轻松了解有关某个主题的更多信息。
    
    # 🚀 后续计划
    
    在接下来的几周里，我将发布各种短视频，展示 OpenMates 的众多功能以及可以用它做的有用事情，同时进一步改进软件并添加更多应用、提供商和功能。
    
    从现在起，我的计划是每隔几周发送一次关于公告和更新的简报邮件，并单独发送关于如何使用 OpenMates 的提示和技巧。如果你想接收更多或更少的简报邮件，请随时[检查你的简报设置](https://openmates.org/#settings/newsletter)。
    
    祝你使用 OpenMates 愉快，并敬请期待更多更新！
    
    [cta]
  es: |
    [image]
    
    [cta]
    
    ¿Ya usas OpenMates y quieres unirte al Meetup de OpenMates el martes 19 de mayo a las 19:00 en Berlín?
    
    Durante el último año y medio, he estado construyendo OpenMates.org: una mejor alternativa a ChatGPT, Claude, OpenClaw, Manus y otros. Normalmente ofrece mejores respuestas, tiene un mejor diseño de experiencia de usuario, prioriza la privacidad, la seguridad y los intereses del usuario con varias funciones, y no te encierra en un ecosistema, permitiéndote seguir usando los modelos de IA que ya conoces y utilizas. Puede usar varias habilidades de aplicación para encontrar eventos, conexiones de tren, citas médicas, apartamentos y mucho más, y ya cuenta con los primeros 200 usuarios de pago (compras de créditos de uso único).
    
    Dicho esto: aún no estoy en un punto en el que pueda vivir de ello (todavía se financia principalmente con la prestación por desempleo) y he trabajado tanto en las últimas semanas y meses que he empezado a quemarme cada vez más. Soy consciente de que este es un proyecto enorme y requiere un equipo en lugar de seguir siendo un proyecto de una sola persona. Por eso, ahora me estoy centrando más en convertir esto en un esfuerzo de equipo, para que los aspectos útiles de la IA sean accesibles para la gente común en lugar de centrarme en el sector empresarial. Y para construir un negocio y un producto sostenibles que la gente siga amando usar en los próximos años, en lugar de convertirme en otra startup más en su camino hacia la mierdificación (*enshittification*). Me interesan mucho más conceptos como la propiedad responsable (*steward ownership*), por ejemplo, en lugar de hablar de estrategias de salida y de cómo venderse a las grandes tecnológicas.
    
    Como me veo principalmente como el responsable de producto (con experiencia en diseño UX y desarrollo de software), me interesan especialmente las personas con un enfoque en marketing/comunicación, pero también me encantaría recibir apoyo de otros desarrolladores de software experimentados. Y el feedback de cualquier persona que use OpenMates es genuinamente valioso y muy bienvenido, independientemente de tu formación.
    
    Si esto te suena interesante y quieres contribuir con tus comentarios, conectar con otras personas o tal vez incluso colaborar a más largo plazo, ¡únete al meetup de OpenMates o [envíame un mensaje](mailto:marco@openmates.org)! :)
    
    Saludos,
    
    Marco  
    Creador de OpenMates
  fr: |
    Salut,
    
    OpenMates propose désormais un programme de parrainage : tu peux partager ton lien de parrainage personnel avec tes amis, et quand quelqu'un s'inscrit via ce lien et effectue son premier achat de crédits éligible, vous recevez tous les deux des crédits OpenMates gratuits.
    
    [cta]
    
    Voici comment ça marche :
    
    - Tu partages ton lien de parrainage ou ton code QR depuis les paramètres de facturation.
    - Ton ami s'inscrit via ce lien et effectue son premier achat de crédits éligible.
    - Il reçoit 2 000 crédits gratuits, et tu reçois également 2 000 crédits gratuits.
    
    La campagne de parrainage actuelle s'applique aux premiers achats de 10 EUR ou plus effectués dans les 7 jours. Chaque compte peut utiliser un code de parrainage une seule fois, et chaque parrain peut recevoir des récompenses pour un maximum de 10 parrainages réussis tant que le budget de parrainage est disponible.
    
    J'ai ajouté cela parce que le bouche-à-oreille est le moyen le plus significatif pour OpenMates de se développer : non pas par des publicités de suivi ou des interfaces trompeuses, mais par des personnes qui le recommandent lorsqu'elles le trouvent vraiment utile.
    
    Si tu connais quelqu'un qui aimerait une alternative aux chatbots IA classiques, plus respectueuse de la vie privée et plus flexible, n'hésite pas à l'inviter.
    
    Merci d'aider OpenMates à grandir d'une manière qui correspond au projet.
    
    Salutations,
    
    Marco  
    Créateur d'OpenMates
  pt: |
    Olá,
    
    O OpenMates agora tem uma funcionalidade de recomendação: podes partilhar o teu link de recomendação pessoal com amigos e, quando alguém se registar através dele e fizer a sua primeira compra de créditos elegível, ambos recebem créditos OpenMates grátis.
    
    [cta]
    
    Eis como funciona:
    
    - Partilhas o teu link de recomendação ou código QR a partir das definições de faturação.
    - O teu amigo regista-se através desse link e faz a sua primeira compra de créditos elegível.
    - Ele recebe 2.000 créditos grátis e tu também recebes 2.000 créditos grátis.
    
    A campanha de recomendação atual aplica-se a primeiras compras de 10 EUR ou mais no prazo de 7 dias. Cada conta pode usar um código de recomendação uma vez, e cada recomendador pode receber recompensas por até 10 recomendações bem-sucedidas enquanto o orçamento de recomendação estiver disponível.
    
    Adicionei isto porque o passa-palavra é a forma mais significativa de o OpenMates crescer: não através de anúncios de rastreio ou padrões obscuros, mas através de pessoas que o recomendam quando o consideram genuinamente útil.
    
    Se conheceres alguém que gostaria de uma alternativa mais focada na privacidade e flexível aos chatbots de IA típicos, sente-te à vontade para os convidar.
    
    Obrigado por ajudares o OpenMates a crescer de uma forma que se ajusta ao projeto.
    
    Saudações,
    
    Marco  
    Criador do OpenMates
  ru: |
    Привет,
    
    В OpenMates появилась реферальная функция: теперь ты можешь делиться своей персональной реферальной ссылкой с друзьями. Когда кто-то зарегистрируется по ней и совершит свою первую подходящую покупку кредитов, вы оба получите бесплатные кредиты OpenMates.
    
    [cta]
    
    Вот как это работает:
    
    - Ты делишься своей реферальной ссылкой или QR-кодом из настроек оплаты.
    - Твой друг регистрируется по этой ссылке и совершает свою первую подходящую покупку кредитов.
    - Он получает 2 000 бесплатных кредитов, и ты тоже получаешь 2 000 бесплатных кредитов.
    
    Текущая реферальная кампания распространяется на первые покупки на сумму от 10 EUR в течение 7 дней. Каждый аккаунт может использовать один реферальный код один раз, а каждый приглашающий может получить вознаграждение максимум за 10 успешных рефералов, пока доступен реферальный бюджет.
    
    Я добавил эту функцию, потому что «сарафанное радио» — это самый правильный способ роста для OpenMates: не через рекламную слежку или темные паттерны, а через рекомендации людей, которым проект действительно полезен.
    
    Если ты знаешь кого-то, кому подошла бы более конфиденциальная и гибкая альтернатива типичным ИИ-чат-ботам, смело приглашай их.
    
    Спасибо, что помогаешь OpenMates расти так, как это соответствует духу проекта.
    
    С наилучшими пожеланиями,
    
    Марко  
    Создатель OpenMates
  ja: |
    こんにちは。
    
    OpenMatesに紹介機能が追加されました。個人の紹介リンクを友だちにシェアして、そのリンクから誰かが参加して初めて対象となるクレジットを購入すると、あなたと友だちの両方が無料のOpenMatesクレジットを受け取れます。
    
    [cta]
    
    仕組みは以下の通りです：
    
