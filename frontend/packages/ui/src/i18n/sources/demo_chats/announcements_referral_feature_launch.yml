    # 🙏 Sepatah kata terima kasih terlebih dahulu
    
    Di akhir Desember, dalam konteks Chaos Communication Congress, saya secara tidak terduga diminta untuk wawancara di saluran TV Jerman ZDF [(sebuah laporan yang membahas pentingnya alternatif yang berfokus pada privasi dibandingkan perusahaan AI teknologi besar)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Dan wow, sungguh sebuah pengalaman yang luar biasa. Meskipun OpenMates saat itu masih banyak kekurangan, orang-orang pertama mulai mendaftar dan menggunakannya — dan juga menemukan bug serta kasus-kasus langka yang tidak saya alami selama pengujian di perangkat saya sendiri, dan untungnya mereka melaporkannya. Terima kasih banyak kepada semua orang yang telah melakukannya — ini sangat membantu dalam membuat OpenMates lebih terpoles, lebih stabil, dan lebih lengkap! Dan tentu saja kamu sangat dipersilakan untuk terus melaporkan masalah jika kamu melihat ada sesuatu yang terasa salah atau rusak di OpenMates.
    
    Meskipun ini bukan perangkat lunak pertama yang saya buat, ini adalah pertama kalinya lebih dari segelintir orang mulai menggunakan perangkat lunak yang saya bangun — sejauh ini sudah lebih dari 180 pengguna aktif yang menggunakan OpenMates! Hal ini sangat menggembirakan, dan harus diakui pada awalnya juga sedikit membuat kewalahan.
    
    Sejak saat itu, saya fokus sepenuhnya pada peningkatan dan perbaikan bug OpenMates, serta menjadikannya lebih lengkap fiturnya dan lebih halus — dan melakukan banyak perubahan pada kode. Perbaikan bug, fitur baru, antarmuka pengguna yang ditingkatkan, dan banyak lagi peningkatan lainnya. 
    
    Dan hari ini, saya senang bisa memberikan pembaruan dengan perubahan paling menarik dari beberapa bulan terakhir! Perlu diingat, membahas semua perubahan akan terlalu banyak untuk satu buletin — jadi saya akan fokus pada sorotan utama dan juga menerbitkan beberapa video pendek tentang berbagai fitur di OpenMates dalam minggu-minggu mendatang, di:
