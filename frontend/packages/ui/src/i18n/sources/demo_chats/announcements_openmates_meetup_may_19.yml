    Använder du redan OpenMates och vill komma på OpenMates Meetup tisdagen den 19 maj kl. 19:00 i Berlin?
    
    Under de senaste 1,5 åren har jag byggt OpenMates.org: Ett bättre alternativ till ChatGPT, Claude, OpenClaw, Manus och andra. Det ger vanligtvis bättre svar, har en bättre användarupplevelse, prioriterar integritet, säkerhet och användarnas intressen med olika funktioner, och låser inte in dig i ett ekosystem, samtidigt som du fortfarande kan använda de AI-modeller du redan känner till och använder. Det kan använda olika app-färdigheter för att hitta evenemang, tågförbindelser, läkartider, lägenheter och mycket mer, och har även de första 200 betalande användarna (köp av engångskrediter).
    
    Med det sagt: Jag är ännu inte vid en punkt där jag kan försörja mig på det (finansieras fortfarande främst av a-kassa) och jag har arbetat så mycket under de senaste veckorna och månaderna att jag har börjat bli alltmer utbränd. Jag är medveten om att detta är ett enormt projekt som kräver ett team istället för att förbli ett enmansprojekt. Därför fokuserar jag nu mer på att göra detta till ett lagarbete, för att göra de användbara aspekterna av AI tillgängliga för vanliga människor istället för att fokusera på företag. Och för att bygga ett hållbart företag och en produkt som människor fortfarande älskar att använda i många år framöver, istället för att bli ännu ett startup-bolag på väg mot enshittification. Jag är mycket mer intresserad av koncept som steward ownership, till exempel, istället för att prata om exit-strategier och hur man säljer ut till Big Tech.
    
    Eftersom jag främst ser mig själv som en produktkille (bakgrund inom UX-design + mjukvaruutveckling), är jag särskilt intresserad av personer med fokus på marknadsföring/kommunikation – men skulle också gärna få stöd från andra erfarna mjukvaruutvecklare. Och feedback från alla som använder OpenMates är genuint värdefull och mycket välkommen, oavsett din bakgrund.
    
    Om detta låter intressant för dig och du vill bidra med din feedback, knyta kontakter med andra eller kanske till och med samarbeta mer långsiktigt – kom på OpenMates meetup eller [skicka ett meddelande till mig](mailto:marco@openmates.org)! :)
    
    Hälsningar,
    
    Marco  
    Skapare av OpenMates
