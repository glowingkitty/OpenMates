    이미 OpenMates를 사용 중이신가요? 5월 19일 화요일 19:00에 베를린에서 열리는 OpenMates 밋업에 참여하고 싶으신가요?
    
    지난 1년 반 동안 저는 ChatGPT, Claude, OpenClaw, Manus 등의 더 나은 대안인 OpenMates.org를 만들어 왔습니다. 이 서비스는 일반적으로 더 나은 답변을 제공하고, 더 우수한 사용자 경험 디자인을 갖추고 있으며, 다양한 기능을 통해 개인정보 보호, 안전 및 사용자 이익을 우선시합니다. 또한 특정 생태계에 종속되지 않으면서도 이미 알고 사용 중인 AI 모델을 그대로 사용할 수 있게 해줍니다. 이벤트 찾기, 기차 연결편 확인, 병원 예약, 아파트 매물 찾기 등 다양한 앱 스킬을 사용할 수 있으며, 이미 첫 200명의 유료 사용자(일회성 사용 크레딧 구매)를 확보했습니다.
    
    하지만 솔직히 말씀드리면, 아직 이 서비스로 생계를 유지할 수 있는 수준은 아니며(여전히 주로 실업 급여로 운영 중입니다), 최근 몇 주와 몇 달 동안 너무 많이 일한 나머지 점점 번아웃이 오기 시작했습니다. 저는 이것이 거대한 프로젝트이며, 1인 프로젝트로 남기보다는 팀이 필요하다는 점을 잘 알고 있습니다. 그래서 이제는 기업용 솔루션에 집중하기보다 AI의 유용한 측면을 일반인들이 쉽게 접할 수 있도록 팀 프로젝트로 전환하는 데 더 집중하고 있습니다. 또한, 단순히 '망가지는 길(enshittification)'을 걷는 또 하나의 스타트업이 되는 대신, 사람들이 앞으로도 오랫동안 애용할 수 있는 지속 가능한 비즈니스와 제품을 만들고자 합니다. 저는 엑시트 전략이나 거대 기술 기업에 회사를 매각하는 방법보다는, 예를 들어 '책임 소유(steward ownership)'와 같은 개념에 훨씬 더 관심이 많습니다.
    
    저는 제 자신을 주로 제품 담당자(UX 디자인 + 소프트웨어 개발 배경)로 생각하기 때문에, 특히 마케팅이나 커뮤니케이션에 집중할 수 있는 분들에게 관심이 많습니다. 하지만 숙련된 다른 소프트웨어 개발자분들의 지원도 언제나 환영합니다. 그리고 배경에 상관없이 OpenMates를 사용하는 모든 분의 피드백은 진심으로 소중하며 언제든 환영합니다.
    
    이 내용이 흥미롭게 들리고 피드백을 통해 기여하고 싶거나, 다른 사람들과 교류하고 싶거나, 혹은 장기적으로 협력하고 싶다면 OpenMates 밋업에 참여하거나 [저에게 메시지를 보내주세요](mailto:marco@openmates.org)! :)
    
    그럼,
    
    마르코  
    OpenMates 제작자
