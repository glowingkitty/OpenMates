    すでにOpenMatesをご利用中で、5月19日（火）19:00にベルリンで開催されるOpenMates Meetupに参加しませんか？
    
    この1年半、私はOpenMates.orgを開発してきました。これはChatGPT、Claude、OpenClaw、Manusなどに代わる、より優れた選択肢です。通常、より優れた回答を提供し、UXデザインも洗練されています。プライバシー、安全性、ユーザーの利益を優先する様々な機能を備え、特定のエコシステムに縛られることなく、すでにお馴染みのAIモデルをそのまま利用できます。イベント検索、電車の乗り換え、病院の予約、アパート探しなど、様々なアプリスキルを利用可能で、すでに最初の200人の有料ユーザー（単発の利用クレジット購入）を獲得しています。
    
    とはいえ、まだこれだけで生計を立てられる段階ではなく（現在は主に失業保険で賄っています）、ここ数週間から数ヶ月間働きすぎたため、徐々に燃え尽き症候群（バーンアウト）の兆候が出始めています。これが巨大なプロジェクトであり、個人プロジェクトのままではなくチームが必要であることは自覚しています。そのため、現在はエンタープライズ（企業向け）に注力するのではなく、AIの有用な側面を一般の人々が利用できるようにするため、チーム体制でのプロジェクトへと移行することに力を入れています。そして、単に「質の低下（enshittification）」を辿るだけのスタートアップになるのではなく、何年も先まで愛され続ける持続可能なビジネスとプロダクトを構築したいと考えています。出口戦略（エグジット）や大手テック企業への売却について話すよりも、例えばスチュワード・オーナーシップ（受託者所有）のような概念にずっと興味があります。
    
    私は自分自身を主にプロダクト担当（UXデザイン＋ソフトウェア開発のバックグラウンド）と考えているため、特にマーケティングやコミュニケーションに重点を置いている方に興味がありますが、経験豊富な他のソフトウェア開発者からのサポートも大歓迎です。また、バックグラウンドに関わらず、OpenMatesを利用している方からのフィードバックは本当に貴重であり、心から歓迎します。
    
    もし興味をお持ちいただけたなら、フィードバックでの貢献、他の方々との交流、あるいは長期的なコラボレーションなど、ぜひOpenMatesのミートアップに参加するか、[私にメッセージを送ってください](mailto:marco@openmates.org)！ :)
    
    よろしくお願いします。
    
    Marco  
    OpenMates開発者
