    Nutzt du OpenMates bereits und möchtest am Dienstag, den 19. Mai um 19:00 Uhr in Berlin zum OpenMates Meetup kommen?
    
    Seit den letzten 1 1/2 Jahren arbeite ich an OpenMates.org: einer besseren Alternative zu ChatGPT, Claude, OpenClaw, Manus und anderen. OpenMates gibt meistens bessere Antworten, hat ein besseres User-Experience-Design, priorisiert Datenschutz, Sicherheit und Nutzerinteressen mit verschiedenen Funktionen und sperrt dich nicht in ein Ökosystem ein, während du trotzdem die KI-Modelle nutzen kannst, die du bereits kennst und verwendest. OpenMates kann verschiedene App-Skills nutzen, um Events, Zugverbindungen, Arzttermine, Wohnungen und vieles mehr zu finden, und hat inzwischen die ersten 200 zahlenden Nutzer:innen (einmalige Guthaben-Käufe).
    
    Gleichzeitig bin ich noch nicht an dem Punkt, an dem ich davon leben kann (aktuell finanziere ich mich noch hauptsächlich über Arbeitslosengeld), und ich habe in den letzten Wochen und Monaten so viel gearbeitet, dass ich immer mehr in Richtung Burnout gerutscht bin. Mir ist bewusst, dass OpenMates ein sehr großes Projekt ist und ein Team braucht, statt ein Ein-Personen-Projekt zu bleiben. Deshalb fokussiere ich mich jetzt stärker darauf, daraus ein gemeinsames Team-Projekt zu machen: um die nützlichen Seiten von KI für uns alle im Alltag zugänglich zu machen, anstatt Großunternehmen noch mehr zu unterstützen als notwendig. Und um ein nachhaltiges Unternehmen und Produkt aufzubauen, das Menschen auch in den kommenden Jahren noch gerne nutzen, statt nur ein weiteres Startup auf dem Weg zur Enshittification zu werden. Mich interessieren Konzepte wie Steward Ownership zum Beispiel deutlich mehr als Exit-Strategien und der Verkauf an Big Tech.
    
    Da ich mich selbst vor allem als Produktmensch sehe (UX-Design + Software-Development-Background), bin ich besonders an Menschen mit Marketing-/Kommunikationsfokus interessiert. Aber ich würde mich genauso über Unterstützung von anderen erfahrenen Softwareentwickler:innen freuen. Und Feedback von allen, die OpenMates nutzen, ist unabhängig vom eigenen Hintergrund sehr wertvoll und ausdrücklich willkommen.
    
    Wenn das für dich interessant klingt und du mit Feedback beitragen, Kontakte empfehlen magst oder vielleicht sogar längerfristig mitarbeiten möchtest, komm zum OpenMates Meetup oder [schreib mir eine Nachricht](mailto:marco@openmates.org)! :)
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
