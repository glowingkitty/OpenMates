    如果你已经在使用 OpenMates，并想参加 5 月 19 日星期二 19:00 在柏林举行的 OpenMates 见面会？
    
    在过去的一年半里，我一直在开发 OpenMates.org：它是 ChatGPT、Claude、OpenClaw、Manus 等工具的更佳替代方案。它通常能提供更好的回复，拥有更出色的用户体验设计，通过各种功能优先考虑隐私、安全和用户利益，并且不会将你锁定在某个生态系统中，同时仍允许你使用已经熟悉和使用的 AI 模型。它可以使用各种应用技能来查找活动、火车班次、医生预约、公寓等等，并且已经拥有了首批 200 名付费用户（购买一次性使用额度）。
    
    话虽如此：我目前还无法以此维持生计（主要仍靠失业救济金维持），而且最近几周和几个月的工作量巨大，让我感到越来越精疲力竭。我意识到这是一个巨大的项目，需要一个团队，而不是仅靠个人维持。因此，我现在正更多地致力于将此转变为一个团队协作项目，让普通人也能接触到 AI 的实用功能，而不是专注于企业市场。我希望建立一个可持续发展的业务和产品，让人们在未来几年仍能喜爱使用，而不是成为另一家走向“平台劣化”（enshittification）的初创公司。我对“责任制所有权”（steward ownership）等概念更感兴趣，而不是讨论退出策略以及如何卖给科技巨头。
    
    由于我主要将自己定位为产品人（具有用户体验设计和软件开发背景），我特别希望能结识专注于营销/传播的人才——但也非常欢迎其他资深软件开发者的支持。无论你的背景如何，任何使用 OpenMates 的人的反馈都非常有价值，且备受欢迎。
    
    如果你对此感兴趣，并希望提供反馈、结识志同道合的人，甚至进行长期合作——请参加 OpenMates 见面会或[给我发消息](mailto:marco@openmates.org)！:)
    
    祝好，
    
    Marco  
    OpenMates 创始人
