    Gebruik je OpenMates al en wil je naar de OpenMates Meetup komen op dinsdag 19 mei om 19:00 in Berlijn?
    
    De afgelopen anderhalf jaar heb ik gebouwd aan OpenMates.org: een beter alternatief voor ChatGPT, Claude, OpenClaw, Manus en anderen. Het geeft doorgaans betere antwoorden, heeft een beter UX-design, geeft prioriteit aan privacy, veiligheid en gebruikersbelangen met verschillende functies, en sluit je niet op in een ecosysteem, terwijl je nog steeds de AI-modellen kunt gebruiken die je al kent en gebruikt. Het kan verschillende app-skills gebruiken voor het vinden van evenementen, treinverbindingen, doktersafspraken, appartementen en nog veel meer, en heeft inmiddels de eerste 200 betalende gebruikers (eenmalige aankopen van gebruikstegoed).
    
    Dat gezegd hebbende: ik ben nog niet op een punt dat ik ervan kan rondkomen (nog steeds voornamelijk gefinancierd door een uitkering) en ik heb de afgelopen weken en maanden zo hard gewerkt dat ik steeds meer tegen een burn-out aanliep. Ik ben me ervan bewust dat dit een enorm project is dat een team vereist in plaats van een eenmansproject te blijven. Daarom richt ik me er nu meer op om hier een teaminspanning van te maken, om de nuttige aspecten van AI toegankelijk te maken voor gewone mensen in plaats van me te richten op de zakelijke markt. En om een duurzaam bedrijf en product te bouwen dat mensen over een paar jaar nog steeds graag gebruiken, in plaats van de zoveelste startup te worden op weg naar 'enshittification'. Ik ben veel meer geïnteresseerd in concepten als steward-ownership, bijvoorbeeld, in plaats van te praten over exit-strategieën en hoe het te verkopen aan big tech.
    
    Omdat ik mezelf vooral zie als de 'product guy' (achtergrond in UX-design + softwareontwikkeling), ben ik vooral geïnteresseerd in mensen met een focus op marketing/communicatie - maar ik zou ook graag ondersteuning krijgen van andere ervaren softwareontwikkelaars. En feedback van iedereen die OpenMates gebruikt is oprecht waardevol en zeer welkom, ongeacht je achtergrond.
    
    Als dit je interessant in de oren klinkt en je wilt bijdragen met je feedback, in contact wilt komen met anderen of misschien zelfs op de langere termijn wilt samenwerken - kom dan naar de OpenMates meetup of [stuur me een bericht](mailto:marco@openmates.org)! :)
    
    Groeten,
    
    Marco  
    Maker van OpenMates
