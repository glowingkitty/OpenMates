    כבר משתמשים ב-OpenMates ורוצים להצטרף למפגש OpenMates ביום שלישי, ה-19 במאי בשעה 19:00 בברלין?
    
    בשנה וחצי האחרונות אני בונה את OpenMates.org: חלופה טובה יותר ל-ChatGPT, Claude, OpenClaw, Manus ואחרים. היא בדרך כלל נותנת תשובות טובות יותר, בעלת עיצוב חוויית משתמש טוב יותר, מתעדפת פרטיות, בטיחות ואינטרסים של המשתמשים עם מגוון פיצ'רים, ולא כובלת אתכם לאקוסיסטם מסוים, תוך שהיא עדיין מאפשרת לכם להשתמש במודלי ה-AI שאתם כבר מכירים ומשתמשים בהם. היא יכולה להשתמש במגוון מיומנויות אפליקציה למציאת אירועים, חיבורי רכבות, תורים לרופאים, דירות ועוד הרבה יותר, ויש לה כבר את 200 המשתמשים המשלמים הראשונים (רכישות חד-פעמיות של קרדיט לשימוש).
    
    עם זאת: אני עדיין לא בנקודה שבה אני יכול להתפרנס מזה (עדיין ממומן בעיקר מדמי אבטלה) ועבדתי כל כך הרבה בשבועות ובחודשים האחרונים שהתחלתי להישחק יותר ויותר. אני מודע לכך שמדובר בפרויקט ענק שדורש צוות במקום להישאר פרויקט של אדם אחד. לכן, אני מתמקד עכשיו יותר בהפיכת הפרויקט למאמץ צוותי, כדי להנגיש את ההיבטים השימושיים של AI לאנשים רגילים במקום להתמקד בארגונים. וכדי לבנות עסק ומוצר בני-קיימא שאנשים עדיין יאהבו להשתמש בהם בשנים הבאות, במקום להפוך לעוד סטארט-אפ בדרך ל-enshittification. אני הרבה יותר מתעניין בקונספטים כמו בעלות נאמנות (steward ownership), למשל, במקום לדבר על אסטרטגיות אקזיט ואיך למכור לענקיות הטכנולוגיה.
    
    מכיוון שאני רואה את עצמי בעיקר כאיש מוצר (רקע בעיצוב UX + פיתוח תוכנה), אני מעוניין במיוחד באנשים עם דגש על שיווק/תקשורת - אבל אשמח מאוד לקבל תמיכה גם ממפתחי תוכנה מנוסים אחרים. ומשוב מכל מי שמשתמש ב-OpenMates הוא בעל ערך רב באמת וברוך הבא, ללא קשר לרקע שלכם.
    
    אם זה נשמע לכם מעניין ואתם רוצים לתרום מהמשוב שלכם, ליצור קשר עם אנשים אחרים או אולי אפילו לשתף פעולה לטווח ארוך יותר - הצטרפו למפגש OpenMates או [שלחו לי הודעה](mailto:marco@openmates.org)! :)
    
    בברכה,
    
    מרקו  
    היוצר של OpenMates
