    Zaten OpenMates kullanıyor musun ve 19 Mayıs Salı günü saat 19:00'da Berlin'de gerçekleşecek OpenMates Meetup'ına katılmak mı istiyorsun?
    
    Son 1,5 yıldır OpenMates.org'u geliştiriyorum: ChatGPT, Claude, OpenClaw, Manus ve diğerlerine daha iyi bir alternatif. Genellikle daha iyi yanıtlar veriyor, daha iyi bir kullanıcı deneyimi tasarımına sahip, çeşitli özelliklerle gizliliğe, güvenliğe ve kullanıcı çıkarlarına öncelik veriyor ve seni bir ekosisteme hapsetmeden zaten bildiğin ve kullandığın yapay zeka modellerini kullanmana olanak tanıyor. Etkinlik bulma, tren bağlantıları, doktor randevuları, daireler ve çok daha fazlası için çeşitli uygulama becerilerini kullanabiliyor ve şimdiden ilk 200 ödeme yapan kullanıcıya (tek seferlik kullanım kredisi alımları) sahip.
    
    Bununla birlikte: Henüz bundan geçimimi sağlayabileceğim bir noktada değilim (hâlâ esas olarak işsizlik maaşıyla finanse ediliyor) ve son haftalarda ve aylarda o kadar çok çalıştım ki giderek daha fazla tükenmeye başladım. Bunun devasa bir proje olduğunun ve tek kişilik bir proje olarak kalmak yerine bir ekip gerektirdiğinin farkındayım. Bu yüzden, kurumsal odaklı olmak yerine yapay zekanın faydalı yönlerini sıradan insanlar için erişilebilir kılmak adına bunu bir ekip çalışması projesine dönüştürmeye odaklanıyorum. Ve "enshittification" (hizmet kalitesinin düşmesi) yolundaki sıradan bir girişim olmak yerine, insanların gelecek yıllarda da severek kullanacağı sürdürülebilir bir iş ve ürün inşa etmek istiyorum. Örneğin, çıkış stratejileri ve büyük teknoloji şirketlerine nasıl satılacağı hakkında konuşmak yerine, "steward ownership" (emanetçi sahiplik) gibi kavramlarla çok daha fazla ilgileniyorum.
    
    Kendimi öncelikle ürün odaklı biri olarak gördüğüm için (UX tasarımı + yazılım geliştirme geçmişi), özellikle pazarlama/iletişim odaklı kişilerle ilgileniyorum - ancak diğer deneyimli yazılım geliştiricilerden de destek almayı çok isterim. Ve geçmişin ne olursa olsun, OpenMates kullanan herkesten gelecek geri bildirimler gerçekten değerli ve memnuniyetle karşılanır.
    
    Eğer bu sana ilginç geliyorsa ve geri bildirimlerinle katkıda bulunmak, diğer insanlarla bağlantı kurmak veya belki de uzun vadeli iş birliği yapmak istiyorsan - OpenMates meetup'ına katıl veya [bana bir mesaj gönder](mailto:marco@openmates.org)! :)
    
    Selamlar,
    
