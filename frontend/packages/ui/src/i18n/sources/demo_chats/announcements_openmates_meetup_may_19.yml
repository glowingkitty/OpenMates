    คุณใช้ OpenMates อยู่แล้วและอยากเข้าร่วมงาน OpenMates Meetup ในวันอังคารที่ 19 พฤษภาคม เวลา 19:00 น. ที่เบอร์ลินใช่ไหม?
    
    ตลอด 1 ปีครึ่งที่ผ่านมา ผมได้สร้าง OpenMates.org ขึ้นมา ซึ่งเป็นทางเลือกที่ดีกว่า ChatGPT, Claude, OpenClaw, Manus และอื่นๆ โดยปกติแล้วมันจะให้คำตอบที่ดีกว่า มีการออกแบบประสบการณ์ผู้ใช้ (UX) ที่ดีกว่า ให้ความสำคัญกับความเป็นส่วนตัว ความปลอดภัย และผลประโยชน์ของผู้ใช้ด้วยฟีเจอร์ต่างๆ และไม่ผูกมัดคุณไว้กับระบบนิเวศใดระบบหนึ่ง ในขณะที่ยังคงให้คุณใช้โมเดล AI ที่คุณรู้จักและใช้งานอยู่แล้วได้ มันสามารถใช้ทักษะของแอปต่างๆ เพื่อค้นหากิจกรรม, การเชื่อมต่อรถไฟ, การนัดหมายแพทย์, อพาร์ตเมนต์ และอื่นๆ อีกมากมาย และตอนนี้ก็มีผู้ใช้ที่ชำระเงิน 200 รายแรกแล้ว (การซื้อเครดิตการใช้งานแบบครั้งเดียว)
    
    อย่างไรก็ตาม ผมยังไม่อยู่ในจุดที่สามารถหาเลี้ยงชีพจากมันได้ (ยังคงได้รับเงินสนับสนุนหลักจากเงินช่วยเหลือผู้ว่างงาน) และผมทำงานหนักมากในช่วงไม่กี่สัปดาห์และไม่กี่เดือนที่ผ่านมาจนเริ่มรู้สึกหมดไฟ (burn out) มากขึ้นเรื่อยๆ ผมตระหนักดีว่านี่เป็นโปรเจกต์ขนาดใหญ่และต้องการทีมงาน แทนที่จะเป็นโปรเจกต์ที่ทำคนเดียวต่อไป ดังนั้น ตอนนี้ผมจึงมุ่งเน้นไปที่การทำให้โปรเจกต์นี้เป็นความร่วมมือของทีม เพื่อให้ผู้คนทั่วไปสามารถเข้าถึงแง่มุมที่เป็นประโยชน์ของ AI ได้ แทนที่จะมุ่งเน้นไปที่ระดับองค์กร และเพื่อสร้างธุรกิจและผลิตภัณฑ์ที่ยั่งยืนซึ่งผู้คนยังคงรักที่จะใช้งานในอีกหลายปีข้างหน้า แทนที่จะเป็นเพียงสตาร์ทอัพอีกรายที่เดินไปตามเส้นทางของความเสื่อมถอย (enshittification) ผมสนใจในแนวคิดอย่างเช่น การเป็นเจ้าของแบบผู้ดูแล (steward ownership) มากกว่าการพูดถึงกลยุทธ์การถอนตัว (exit strategies) และวิธีขายกิจการให้กับบริษัทเทคโนโลยียักษ์ใหญ่
    
    เนื่องจากผมมองว่าตัวเองเป็นคนสายผลิตภัณฑ์เป็นหลัก (พื้นฐานด้านการออกแบบ UX + การพัฒนาซอฟต์แวร์) ผมจึงสนใจเป็นพิเศษในกลุ่มคนที่มีความเชี่ยวชาญด้านการตลาด/การสื่อสาร แต่ก็ยินดีอย่างยิ่งที่จะได้รับการสนับสนุนจากนักพัฒนาซอฟต์แวร์ที่มีประสบการณ์คนอื่นๆ ด้วย และความคิดเห็นจากทุกคนที่ใช้ OpenMates นั้นมีค่าอย่างยิ่งและยินดีรับฟังเสมอ ไม่ว่าคุณจะมีพื้นฐานอย่างไรก็ตาม
    
    หากสิ่งนี้ฟังดูน่าสนใจสำหรับคุณ และคุณต้องการร่วมแสดงความคิดเห็น เชื่อมต่อกับผู้คนอื่นๆ หรืออาจจะร่วมมือกันในระยะยาว เชิญเข้าร่วมงาน OpenMates meetup หรือ [ส่งข้อความหาผม](mailto:marco@openmates.org) ได้เลย! :)
    
    ด้วยความเคารพ,
    
    Marco  
    ผู้สร้าง OpenMates
