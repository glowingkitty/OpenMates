    Sudah menggunakan OpenMates dan ingin bergabung dalam OpenMates Meetup pada hari Selasa, 19 Mei pukul 19:00 di Berlin?
    
    Selama 1 1/2 tahun terakhir, saya telah membangun OpenMates.org: Alternatif yang lebih baik untuk ChatGPT, Claude, OpenClaw, Manus, dan lainnya. Biasanya memberikan respons yang lebih baik, memiliki desain pengalaman pengguna yang lebih baik, memprioritaskan privasi, keamanan, dan kepentingan pengguna dengan berbagai fitur, serta tidak mengunci kamu ke dalam satu ekosistem, sambil tetap memungkinkan kamu menggunakan model AI yang sudah kamu kenal dan gunakan. Aplikasi ini dapat menggunakan berbagai keahlian aplikasi untuk mencari acara, koneksi kereta api, janji temu dokter, apartemen, dan banyak lagi, serta sudah memiliki 200 pengguna berbayar pertama (pembelian kredit penggunaan satu kali).
    
    Meskipun begitu: Saya belum berada di titik di mana saya bisa hidup dari proyek ini (masih dibiayai terutama oleh tunjangan pengangguran) dan saya bekerja sangat keras dalam beberapa minggu dan bulan terakhir hingga saya mulai merasa semakin burn out. Saya sadar bahwa ini adalah proyek besar dan membutuhkan tim, alih-alih tetap menjadi proyek satu orang. Jadi, sekarang saya lebih fokus untuk menjadikan ini proyek upaya tim, untuk membuat aspek AI yang bermanfaat dapat diakses oleh orang awam, alih-alih berfokus pada perusahaan (enterprise). Dan untuk membangun bisnis serta produk berkelanjutan yang tetap disukai orang di tahun-tahun mendatang, alih-alih menjadi sekadar startup lain dalam perjalanannya menuju enshittification. Saya jauh lebih tertarik pada konsep-konsep seperti steward ownership, misalnya, daripada membicarakan strategi keluar (exit strategy) dan bagaimana menjual diri ke perusahaan teknologi besar.
    
    Karena saya melihat diri saya terutama sebagai orang produk (latar belakang desain UX + pengembangan perangkat lunak), saya sangat tertarik pada orang-orang dengan fokus pemasaran/komunikasi - tetapi juga ingin mendapatkan dukungan dari pengembang perangkat lunak berpengalaman lainnya. Dan umpan balik dari siapa pun yang menggunakan OpenMates sangatlah berharga dan sangat disambut baik, apa pun latar belakang kamu.
    
    Jika ini terdengar menarik bagi kamu dan kamu ingin berkontribusi dengan umpan balik, terhubung dengan orang lain, atau bahkan mungkin berkolaborasi dalam jangka panjang - bergabunglah dalam meetup OpenMates atau [kirim pesan kepada saya](mailto:marco@openmates.org)! :)
    
    Salam,
    
    Marco  
    Pencipta OpenMates
