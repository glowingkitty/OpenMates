    Comme je me considère avant tout comme le responsable produit (formation en design UX + développement logiciel), je suis particulièrement intéressé par des personnes axées sur le marketing/la communication - mais j'aimerais aussi recevoir le soutien d'autres développeurs logiciels expérimentés. Et les retours de quiconque utilise OpenMates sont sincèrement précieux et les bienvenus, quel que soit ton parcours.
    
    Si cela t'intéresse et que tu souhaites contribuer avec tes retours, échanger avec d'autres personnes ou peut-être même collaborer à plus long terme - rejoins le meetup OpenMates ou [envoie-moi un message](mailto:marco@openmates.org) ! :)
    
    Salutations,
    
    Marco  
    Créateur d'OpenMates
  pt: |
    Já usa o OpenMates e quer participar do OpenMates Meetup na terça-feira, 19 de maio, às 19:00, em Berlim?
    
    Há 1 ano e meio, venho construindo o OpenMates.org: uma alternativa melhor ao ChatGPT, Claude, OpenClaw, Manus e outros. Ele geralmente oferece respostas melhores, tem um design de experiência do usuário superior, prioriza a privacidade, a segurança e os interesses do usuário com diversos recursos, e não te prende a um ecossistema, permitindo que você continue usando os modelos de IA que já conhece e utiliza. Ele pode usar várias habilidades de aplicativos para encontrar eventos, conexões de trem, consultas médicas, apartamentos e muito mais, e já conta com os primeiros 200 usuários pagantes (compras de créditos de uso único).
    
    Dito isso: ainda não cheguei ao ponto de conseguir viver disso (ainda sou financiado principalmente pelo seguro-desemprego) e trabalhei tanto nas últimas semanas e meses que comecei a me sentir cada vez mais exausto. Tenho consciência de que este é um projeto enorme e exige uma equipe, em vez de continuar sendo um projeto de uma só pessoa. Por isso, agora estou focando mais em tornar isso um esforço de equipe, para tornar os aspectos úteis da IA acessíveis às pessoas comuns, em vez de focar em empresas. E para construir um negócio e um produto sustentáveis que as pessoas continuem amando usar nos próximos anos, em vez de se tornar apenas mais uma startup no caminho da merdificação (enshittification). Estou muito mais interessado em conceitos como steward ownership, por exemplo, em vez de falar sobre estratégias de saída e como se vender para as grandes empresas de tecnologia.
    
    Como me vejo principalmente como o "cara do produto" (background em design de UX + desenvolvimento de software), estou especialmente interessado em pessoas com foco em marketing/comunicação — mas também adoraria receber apoio de outros desenvolvedores experientes. E o feedback de qualquer pessoa que use o OpenMates é genuinamente valioso e muito bem-vindo, independentemente da sua formação.
    
    Se isso parece interessante para você e você quer contribuir com seu feedback, conectar-se com outras pessoas ou talvez até colaborar a longo prazo — participe do meetup do OpenMates ou [envie-me uma mensagem](mailto:marco@openmates.org)! :)
    
    Saudações,
    
    Marco  
    Criador do OpenMates
  ru: |
    Уже пользуешься OpenMates и хочешь прийти на встречу OpenMates Meetup во вторник, 19 мая, в 19:00 в Берлине?
    
    Последние полтора года я создаю OpenMates.org — лучшую альтернативу ChatGPT, Claude, OpenClaw, Manus и другим. Обычно он дает более качественные ответы, обладает более продуманным дизайном интерфейса, уделяет приоритетное внимание приватности, безопасности и интересам пользователей благодаря различным функциям и не привязывает тебя к одной экосистеме, позволяя при этом использовать уже знакомые ИИ-модели. Он умеет использовать различные навыки приложений для поиска мероприятий, расписания поездов, записи к врачу, поиска квартир и многого другого. У проекта уже есть первые 200 платных пользователей (покупки разовых кредитов).
    
    Тем не менее, я пока не могу полностью обеспечивать себя за счет проекта (он все еще финансируется в основном за счет пособия по безработице), и в последние недели и месяцы я работал так много, что начал выгорать. Я понимаю, что это огромный проект, который требует команды, а не усилий одного человека. Поэтому сейчас я сосредоточен на том, чтобы превратить это в командную работу, сделать полезные возможности ИИ доступными для обычных людей, а не только для корпораций. Я хочу построить устойчивый бизнес и продукт, которым люди будут с удовольствием пользоваться долгие годы, а не просто очередной стартап на пути к «эншиттификации». Меня гораздо больше интересуют такие концепции, как ответственное владение (steward ownership), чем разговоры о стратегиях выхода и продаже бигтеху.
    
    Поскольку я вижу себя прежде всего как «человека продукта» (с опытом в UX-дизайне и разработке ПО), мне особенно интересны люди с фокусом на маркетинг и коммуникации, но я также буду рад поддержке опытных разработчиков. И отзывы от любого пользователя OpenMates по-настоящему ценны и приветствуются, независимо от твоего опыта.
    
    Если это звучит интересно и ты хочешь поделиться отзывом, познакомиться с другими людьми или, возможно, даже сотрудничать в долгосрочной перспективе — приходи на встречу OpenMates или [напиши мне](mailto:marco@openmates.org)! :)
    
    Привет,
    
    Марко  
    Создатель OpenMates
  ja: |
    すでにOpenMatesを利用していて、5月19日（火）19:00にベルリンで開催されるOpenMates Meetupに参加したいですか？
    
    この1年半、私はOpenMates.orgを構築してきました。これはChatGPT、Claude、OpenClaw、Manusなどのより優れた代替手段です。通常、より優れた回答を提供し、UXデザインも優れており、さまざまな機能でプライバシー、安全性、ユーザーの利益を優先しています。また、特定のエコシステムに縛られることなく、すでに使い慣れているAIモデルをそのまま利用できます。イベント検索、電車の乗り換え、病院の予約、アパート探しなど、さまざまなアプリスキルを利用でき、すでに最初の200人の有料ユーザー（単発の利用クレジット購入）がいます。
    
    とはいえ、まだこれだけで生計を立てられる段階ではなく（主に失業保険で賄っています）、ここ数週間から数ヶ月間働きすぎて、ますます燃え尽き症候群になりつつあります。これが巨大なプロジェクトであり、個人のプロジェクトのままではなくチームが必要であることは自覚しています。そのため、現在はエンタープライズ（企業向け）に焦点を当てるのではなく、AIの有用な側面を一般の人々が利用できるようにするために、チームでの取り組みに注力しています。そして、単に「質の低下（enshittification）」へと向かうだけのスタートアップになるのではなく、何年も先まで人々に愛され続ける持続可能なビジネスと製品を構築したいと考えています。私は、出口戦略や大手テック企業への売却について話すよりも、例えばスチュワード・オーナーシップのような概念にはるかに興味があります。
    
    私は自分自身を主にプロダクト担当（UXデザイン＋ソフトウェア開発のバックグラウンド）と考えているため、特にマーケティングやコミュニケーションに重点を置いている方に興味がありますが、経験豊富な他のソフトウェア開発者からのサポートも大歓迎です。また、OpenMatesを利用している方からのフィードバックは、バックグラウンドに関わらず本当に貴重であり、大歓迎です。
    
    もしこれに興味を持ち、フィードバックで貢献したい、他の人々とつながりたい、あるいは長期的に協力したいと思われたなら、ぜひOpenMatesのミートアップに参加するか、[私にメッセージを送ってください](mailto:marco@openmates.org)！ :)
    
    よろしくお願いします。
    
    Marco  
    OpenMates クリエイター
  ko: |
    이미 OpenMates를 사용 중이며 5월 19일 화요일 19:00에 베를린에서 열리는 OpenMates 밋업에 참여하고 싶으신가요?
    
    지난 1년 반 동안 저는 ChatGPT, Claude, OpenClaw, Manus 등의 더 나은 대안인 OpenMates.org를 만들어 왔습니다. 이 서비스는 일반적으로 더 나은 답변을 제공하고, 더 나은 사용자 경험 디자인을 갖추고 있으며, 다양한 기능을 통해 개인정보 보호, 안전 및 사용자 이익을 우선시합니다. 또한 특정 생태계에 종속되지 않으면서도 이미 알고 사용 중인 AI 모델을 그대로 사용할 수 있게 해줍니다. 이벤트 찾기, 기차 연결, 병원 예약, 아파트 찾기 등 다양한 앱 스킬을 사용할 수 있으며, 이미 첫 200명의 유료 사용자(일회성 사용 크레딧 구매)를 확보했습니다.
    
    하지만 아직 이 서비스로 생계를 유지할 수 있는 단계는 아니며(여전히 주로 실업 급여로 운영 중입니다), 최근 몇 주와 몇 달 동안 너무 많이 일해서 점점 번아웃이 오기 시작했습니다. 저는 이것이 거대한 프로젝트이며 1인 프로젝트로 남기보다는 팀이 필요하다는 것을 알고 있습니다. 그래서 이제는 기업용 서비스에 집중하기보다 AI의 유용한 측면을 일반 사람들이 쉽게 접할 수 있도록 팀 프로젝트로 만드는 데 더 집중하고 있습니다. 그리고 단순히 '엔시티피케이션(enshittification, 플랫폼의 질적 하락)'의 길을 걷는 또 다른 스타트업이 되는 대신, 사람들이 앞으로도 오랫동안 즐겁게 사용할 수 있는 지속 가능한 비즈니스와 제품을 만들고 싶습니다. 저는 엑시트 전략이나 빅테크에 회사를 매각하는 것보다 스튜어드 소유권(steward ownership) 같은 개념에 훨씬 더 관심이 많습니다.
    
    저는 제 자신을 주로 제품 담당자(UX 디자인 + 소프트웨어 개발 배경)로 생각하기 때문에 마케팅/커뮤니케이션에 집중할 수 있는 분들에게 특히 관심이 많습니다. 하지만 숙련된 다른 소프트웨어 개발자분들의 지원도 환영합니다. 그리고 배경에 상관없이 OpenMates를 사용하는 모든 분의 피드백은 정말 소중하며 언제나 환영합니다.
    
    이 내용이 흥미롭게 느껴지고 피드백을 통해 기여하고 싶거나, 다른 사람들과 교류하고 싶거나, 장기적으로 협업하고 싶다면 OpenMates 밋업에 참여하거나 [저에게 메시지를 보내주세요](mailto:marco@openmates.org)! :)
    
    감사합니다.
    
    Marco  
    OpenMates 제작자
  it: |
    Usi già OpenMates e vuoi partecipare all'OpenMates Meetup martedì 19 maggio alle 19:00 a Berlino?
    
    Da un anno e mezzo sto sviluppando OpenMates.org: un'alternativa migliore a ChatGPT, Claude, OpenClaw, Manus e altri. Solitamente fornisce risposte migliori, ha un design dell'esperienza utente superiore, dà priorità alla privacy, alla sicurezza e agli interessi degli utenti con varie funzionalità, e non ti vincola a un ecosistema, pur permettendoti di utilizzare i modelli di IA che già conosci e usi. Può utilizzare diverse skill dell'app per trovare eventi, collegamenti ferroviari, appuntamenti medici, appartamenti e molto altro, e ha già i primi 200 utenti paganti (acquisti di crediti di utilizzo una tantum).
    
    Detto questo: non sono ancora al punto di poterne vivere (è ancora finanziato principalmente dal sussidio di disoccupazione) e ho lavorato così tanto nelle ultime settimane e mesi che ho iniziato ad andare sempre più in burnout. Sono consapevole che si tratta di un progetto enorme che richiede un team invece di rimanere un progetto individuale. Quindi, ora mi sto concentrando maggiormente sul renderlo un lavoro di squadra, per rendere gli aspetti utili dell'IA accessibili alle persone comuni invece di concentrarmi sulle aziende. E per costruire un'attività e un prodotto sostenibili che le persone amino ancora usare negli anni a venire, invece di diventare l'ennesima startup sulla strada della "merdificazione" (enshittification). Sono molto più interessato a concetti come la proprietà fiduciaria (steward ownership), ad esempio, invece di parlare di strategie di uscita e di come vendersi alle grandi aziende tecnologiche.
    
    Dato che mi vedo principalmente come il responsabile del prodotto (background in UX design + sviluppo software), sono particolarmente interessato a persone con un focus su marketing/comunicazione, ma mi piacerebbe anche ricevere supporto da altri sviluppatori software esperti. E il feedback di chiunque utilizzi OpenMates è sinceramente prezioso e molto gradito, a prescindere dal tuo background.
    
    Se questo ti sembra interessante e vuoi contribuire con il tuo feedback, connetterti con altre persone o magari collaborare a lungo termine, partecipa al meetup di OpenMates o [inviami un messaggio](mailto:marco@openmates.org)! :)
    
    Un saluto,
    
    Marco  
    Creatore di OpenMates
  tr: |
    Zaten OpenMates kullanıyor musun ve 19 Mayıs Salı günü saat 19:00'da Berlin'deki OpenMates Meetup'ına katılmak ister misin?
    
    Son 1,5 yıldır OpenMates.org'u geliştiriyorum: ChatGPT, Claude, OpenClaw, Manus ve diğerlerine daha iyi bir alternatif. Genellikle daha iyi yanıtlar veriyor, daha iyi bir kullanıcı deneyimi tasarımına sahip, çeşitli özelliklerle gizliliğe, güvenliğe ve kullanıcı çıkarlarına öncelik veriyor ve seni bir ekosisteme hapsetmiyor; üstelik halihazırda bildiğin ve kullandığın yapay zeka modellerini kullanmana da olanak tanıyor. Etkinlik bulma, tren bağlantıları, doktor randevuları, daireler ve çok daha fazlası için çeşitli uygulama becerilerini kullanabiliyor ve şimdiden ilk 200 ödeme yapan kullanıcıya (tek seferlik kullanım kredisi alımları) ulaştı.
    
    Bununla birlikte: Henüz hayatımı bundan kazanabileceğim bir noktada değilim (hâlâ temel olarak işsizlik maaşıyla finanse ediliyor) ve son haftalarda ve aylarda o kadar çok çalıştım ki giderek daha fazla tükenmeye başladım. Bunun devasa bir proje olduğunun ve tek kişilik bir proje olarak kalmak yerine bir ekip gerektirdiğinin farkındayım. Bu yüzden, kurumsal odaklı olmak yerine yapay zekanın faydalı yönlerini sıradan insanlar için erişilebilir kılmak adına bunu bir ekip çalışması projesine dönüştürmeye odaklanıyorum. Ve enshittification (hizmet kalitesinin düşmesi) yolundaki sıradan bir girişim olmak yerine, insanların gelecek yıllarda da severek kullanacağı sürdürülebilir bir iş ve ürün inşa etmek istiyorum. Çıkış stratejileri ve büyük teknoloji şirketlerine nasıl satılacağı hakkında konuşmak yerine, örneğin emanetçi sahiplik (steward ownership) gibi kavramlarla çok daha fazla ilgileniyorum.
    
    Kendimi öncelikle ürün odaklı biri (UX tasarımı + yazılım geliştirme geçmişi) olarak gördüğüm için, özellikle pazarlama/iletişim odaklı kişilerle ilgileniyorum - ancak diğer deneyimli yazılım geliştiricilerden de destek almayı çok isterim. Ve geçmişin ne olursa olsun, OpenMates kullanan herkesten gelecek geri bildirimler gerçekten değerli ve memnuniyetle karşılanır.
    
    Eğer bu kulağına ilginç geliyorsa ve geri bildirimlerinle katkıda bulunmak, diğer insanlarla bağlantı kurmak veya belki de uzun vadeli iş birliği yapmak istersen - OpenMates meetup'ına katıl veya [bana bir mesaj gönder](mailto:marco@openmates.org)! :)
    
    Selamlar,
    
    Marco  
    OpenMates'in Yaratıcısı
  vi: |
