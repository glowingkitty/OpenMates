    Trong 1 năm rưỡi qua, mình đã và đang xây dựng OpenMates.org: Một lựa chọn thay thế tốt hơn cho ChatGPT, Claude, OpenClaw, Manus và những công cụ khác. Nó thường đưa ra các câu trả lời tốt hơn, có thiết kế trải nghiệm người dùng tốt hơn, ưu tiên quyền riêng tư, an toàn và lợi ích của người dùng với nhiều tính năng khác nhau, và không khóa bạn vào một hệ sinh thái cố định, trong khi vẫn cho phép bạn sử dụng các mô hình AI mà bạn đã biết và đang dùng. Nó có thể sử dụng nhiều kỹ năng ứng dụng khác nhau để tìm kiếm sự kiện, kết nối chuyến tàu, hẹn lịch bác sĩ, tìm căn hộ và nhiều hơn thế nữa, đồng thời đã có 200 người dùng trả phí đầu tiên (mua gói tín dụng sử dụng một lần).
    
    Tuy nhiên: Mình vẫn chưa đến mức có thể sống dựa vào nó (vẫn chủ yếu được tài trợ bởi tiền trợ cấp thất nghiệp) và mình đã làm việc quá nhiều trong những tuần và tháng gần đây đến mức bắt đầu cảm thấy kiệt sức ngày càng nhiều. Mình nhận thức được rằng đây là một dự án khổng lồ và cần một đội ngũ thay vì chỉ là dự án của một cá nhân. Vì vậy, hiện tại mình đang tập trung nhiều hơn vào việc biến đây thành một dự án nỗ lực của tập thể, để đưa những khía cạnh hữu ích của AI đến với mọi người thay vì chỉ tập trung vào doanh nghiệp. Và để xây dựng một doanh nghiệp và sản phẩm bền vững mà mọi người vẫn yêu thích sử dụng trong những năm tới, thay vì chỉ trở thành một startup khác trên con đường "thoái hóa chất lượng" (enshittification). Mình quan tâm nhiều hơn đến các khái niệm như sở hữu ủy thác (steward ownership), chẳng hạn, thay vì nói về các chiến lược thoái vốn và cách bán mình cho các tập đoàn công nghệ lớn.
    
    Vì mình tự thấy bản thân chủ yếu là một người làm sản phẩm (nền tảng thiết kế UX + phát triển phần mềm), mình đặc biệt quan tâm đến những người có chuyên môn về marketing/truyền thông - nhưng cũng rất mong nhận được sự hỗ trợ từ các nhà phát triển phần mềm giàu kinh nghiệm khác. Và phản hồi từ bất kỳ ai đang sử dụng OpenMates đều thực sự quý giá và luôn được chào đón, bất kể nền tảng của bạn là gì.
    
    Nếu bạn thấy điều này thú vị và muốn đóng góp ý kiến, kết nối với những người khác hoặc thậm chí có thể hợp tác lâu dài hơn - hãy tham gia buổi gặp mặt OpenMates hoặc [gửi tin nhắn cho mình](mailto:marco@openmates.org)! :)
    
    Thân ái,
    
    Marco  
    Người sáng lập OpenMates
