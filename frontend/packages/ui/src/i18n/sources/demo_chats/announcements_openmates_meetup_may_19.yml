    هل تستخدم OpenMates بالفعل وترغب في الانضمام إلى لقاء OpenMates يوم الثلاثاء 19 مايو الساعة 19:00 في برلين؟
    
    على مدار العام ونصف الماضيين، كنت أعمل على بناء OpenMates.org: بديل أفضل لـ ChatGPT وClaude وOpenClaw وManus وغيرها. عادةً ما يقدم استجابات أفضل، ويتميز بتصميم تجربة مستخدم أفضل، ويعطي الأولوية للخصوصية والأمان ومصالح المستخدم من خلال ميزات متنوعة، ولا يحصرك في نظام بيئي معين، مع السماح لك باستخدام نماذج الذكاء الاصطناعي التي تعرفها وتستخدمها بالفعل. يمكنه استخدام مهارات تطبيقات متنوعة للعثور على الفعاليات، ومواعيد القطارات، ومواعيد الأطباء، والشقق وغير ذلك الكثير، كما يضم أول 200 مستخدم مدفوع (عمليات شراء رصيد استخدام لمرة واحدة).
    
    ومع ذلك: لم أصل بعد إلى نقطة تمكنني من كسب لقمة العيش منه (لا يزال ممولاً بشكل أساسي من إعانات البطالة) وقد عملت كثيراً في الأسابيع والأشهر الأخيرة لدرجة أنني بدأت أشعر بالاحتراق النفسي أكثر فأكثر. أدرك أن هذا مشروع ضخم ويتطلب فريقاً بدلاً من البقاء كمشروع لشخص واحد. لذا، أركز الآن بشكل أكبر على جعل هذا المشروع جهداً جماعياً، لجعل الجوانب المفيدة للذكاء الاصطناعي في متناول الناس العاديين بدلاً من التركيز على الشركات الكبرى. ولبناء عمل تجاري ومنتج مستدام يظل الناس يحبون استخدامه في السنوات القادمة، بدلاً من أن يصبح مجرد شركة ناشئة أخرى في طريقها إلى التدهور. أنا مهتم أكثر بمفاهيم مثل "ملكية الوصاية" (steward ownership)، على سبيل المثال، بدلاً من التحدث عن استراتيجيات الخروج وكيفية البيع لشركات التكنولوجيا الكبرى.
    
    بما أنني أرى نفسي في المقام الأول كمسؤول عن المنتج (خلفية في تصميم تجربة المستخدم وتطوير البرمجيات)، فأنا مهتم بشكل خاص بالأشخاص ذوي التركيز على التسويق/التواصل - ولكنني أود أيضاً الحصول على دعم من مطوري برمجيات ذوي خبرة. كما أن الملاحظات من أي شخص يستخدم OpenMates قيمة حقاً ومرحب بها للغاية، بغض النظر عن خلفيتك.
    
    إذا كان هذا يبدو مثيراً للاهتمام بالنسبة لك وترغب في المساهمة بملاحظاتك، أو التواصل مع أشخاص آخرين أو حتى التعاون على المدى الطويل - انضم إلى لقاء OpenMates أو [أرسل لي رسالة](mailto:marco@openmates.org)! :)
    
    تحياتي،
    
    ماركو  
