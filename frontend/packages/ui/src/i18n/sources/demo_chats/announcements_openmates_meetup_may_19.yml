    Už používáš OpenMates a chceš se přidat k OpenMates Meetupu v úterý 19. května v 19:00 v Berlíně?
    
    Poslední rok a půl stavím OpenMates.org: Lepší alternativu k ChatGPT, Claude, OpenClaw, Manus a dalším. Obvykle dává lepší odpovědi, má lepší design uživatelského prostředí, upřednostňuje soukromí, bezpečnost a zájmy uživatelů díky různým funkcím a neuzamyká tě do jednoho ekosystému, zatímco ti stále umožňuje používat AI modely, které už znáš a používáš. Dokáže využívat různé dovednosti aplikací pro hledání událostí, vlakových spojení, termínů u lékaře, bytů a mnoho dalšího, a má také prvních 200 platících uživatelů (nákupy jednorázových kreditů).
    
    Nicméně: Ještě nejsem ve fázi, kdy by mě to živilo (stále jsem financován hlavně z podpory v nezaměstnanosti) a v posledních týdnech a měsících jsem pracoval tolik, že jsem začal čím dál víc vyhořívat. Jsem si vědom toho, že je to obrovský projekt a vyžaduje tým, místo aby zůstal projektem jednoho člověka. Proto se teď víc soustředím na to, aby se z toho stal týmový projekt, aby byly užitečné aspekty AI přístupné běžným lidem, místo abych se zaměřoval na enterprise sféru. A abych vybudoval udržitelný byznys a produkt, který budou lidé rádi používat i v nadcházejících letech, místo aby se stal jen dalším startupem na cestě k „enshittifikaci“. Mnohem víc mě zajímají koncepty jako steward ownership, místo mluvení o exit strategiích a o tom, jak se prodat velkým technologickým firmám.
    
    Protože se vidím primárně jako produktový člověk (zkušenosti s UX designem a vývojem softwaru), zajímají mě hlavně lidé se zaměřením na marketing/komunikaci – ale také bych rád získal podporu od dalších zkušených softwarových vývojářů. A zpětná vazba od kohokoli, kdo OpenMates používá, je skutečně cenná a velmi vítaná, bez ohledu na tvé zaměření.
    
    Pokud ti to zní zajímavě a chceš přispět svou zpětnou vazbou, spojit se s ostatními lidmi nebo třeba i spolupracovat dlouhodoběji – přidej se k OpenMates meetupu nebo mi [napiš zprávu](mailto:marco@openmates.org)! :)
    
    Zdravím,
    
    Marco  
    Tvůrce OpenMates
