    Korzystasz już z OpenMates i chcesz dołączyć do OpenMates Meetup we wtorek, 19 maja o 19:00 w Berlinie?
    
    Przez ostatnie półtora roku budowałem OpenMates.org: lepszą alternatywę dla ChatGPT, Claude, OpenClaw, Manus i innych. Zazwyczaj udziela lepszych odpowiedzi, ma lepiej zaprojektowany interfejs (UX), priorytetyzuje prywatność, bezpieczeństwo i interesy użytkownika dzięki różnym funkcjom oraz nie zamyka Cię w jednym ekosystemie, pozwalając jednocześnie na korzystanie z modeli AI, które już znasz i których używasz. Potrafi korzystać z różnych umiejętności aplikacji do znajdowania wydarzeń, połączeń kolejowych, wizyt u lekarza, mieszkań i wielu innych rzeczy, a także ma już pierwszych 200 płacących użytkowników (zakupy jednorazowych kredytów).
    
    To powiedziawszy: nie jestem jeszcze w punkcie, w którym mógłbym się z tego utrzymać (wciąż finansuję się głównie z zasiłku dla bezrobotnych) i w ostatnich tygodniach oraz miesiącach pracowałem tak dużo, że zacząłem się coraz bardziej wypalać. Mam świadomość, że to ogromny projekt i wymaga zespołu, zamiast pozostawać projektem jednoosobowym. Dlatego teraz skupiam się bardziej na uczynieniu z tego projektu zespołowego, aby udostępnić przydatne aspekty AI zwykłym ludziom, zamiast koncentrować się na korporacjach. I aby zbudować zrównoważony biznes i produkt, z którego ludzie nadal będą chętnie korzystać w nadchodzących latach, zamiast stać się kolejnym startupem na drodze do „enshittification”. O wiele bardziej interesują mnie koncepcje takie jak własność powiernicza (steward ownership), zamiast rozmawiania o strategiach wyjścia i o tym, jak sprzedać się wielkim firmom technologicznym.
    
    Ponieważ postrzegam siebie przede wszystkim jako osobę od produktu (doświadczenie w projektowaniu UX + tworzeniu oprogramowania), szczególnie interesują mnie osoby skupione na marketingu/komunikacji – ale chętnie przyjmę też wsparcie od innych doświadczonych programistów. A opinie od każdego, kto korzysta z OpenMates, są naprawdę cenne i bardzo mile widziane, bez względu na Twoje doświadczenie.
    
    Jeśli brzmi to dla Ciebie interesująco i chcesz podzielić się swoją opinią, nawiązać kontakt z innymi ludźmi lub może nawet współpracować długofalowo – dołącz do meetup-u OpenMates lub [wyślij mi wiadomość](mailto:marco@openmates.org)! :)
    
