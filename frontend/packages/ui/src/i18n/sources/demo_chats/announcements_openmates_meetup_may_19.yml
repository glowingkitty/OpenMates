    ¿Ya usas OpenMates y quieres unirte al Meetup de OpenMates el martes 19 de mayo a las 19:00 en Berlín?
    
    Durante el último año y medio, he estado construyendo OpenMates.org: una mejor alternativa a ChatGPT, Claude, OpenClaw, Manus y otros. Normalmente ofrece mejores respuestas, tiene un mejor diseño de experiencia de usuario, prioriza la privacidad, la seguridad y los intereses del usuario con diversas funciones, y no te encierra en un ecosistema, permitiéndote seguir usando los modelos de IA que ya conoces y utilizas. Puede usar varias habilidades de aplicaciones para encontrar eventos, conexiones de tren, citas médicas, apartamentos y mucho más, y ya cuenta con los primeros 200 usuarios de pago (compras de créditos de uso único).
    
    Dicho esto: aún no estoy en un punto en el que pueda vivir de ello (sigo financiado principalmente por el subsidio de desempleo) y he trabajado tanto en las últimas semanas y meses que he empezado a quemarme cada vez más. Soy consciente de que este es un proyecto enorme y requiere un equipo en lugar de seguir siendo un proyecto unipersonal. Por eso, ahora me estoy centrando más en convertirlo en un esfuerzo de equipo, para que los aspectos útiles de la IA sean accesibles para la gente común en lugar de centrarme en las empresas. Y para construir un negocio y un producto sostenibles que la gente siga amando usar en los próximos años, en lugar de convertirme en otra startup más en su camino hacia la "enshittification". Me interesan mucho más conceptos como la propiedad responsable (steward ownership), por ejemplo, en lugar de hablar de estrategias de salida y de cómo venderse a las grandes tecnológicas.
    
    Como me veo principalmente como el responsable de producto (con experiencia en diseño UX y desarrollo de software), me interesan especialmente las personas con un enfoque en marketing/comunicación, pero también me encantaría recibir apoyo de otros desarrolladores de software experimentados. Y el feedback de cualquier persona que use OpenMates es realmente valioso y muy bienvenido, independientemente de tu formación.
    
    Si esto te suena interesante y quieres contribuir con tu feedback, conectar con otras personas o tal vez incluso colaborar a más largo plazo, ¡únete al meetup de OpenMates o [envíame un mensaje](mailto:marco@openmates.org)! :)
    
