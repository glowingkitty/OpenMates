    Tuy nhiên: Mình vẫn chưa đến mức có thể sống dựa vào nó (vẫn chủ yếu được tài trợ bởi tiền trợ cấp thất nghiệp) và mình đã làm việc quá nhiều trong những tuần và tháng gần đây đến mức bắt đầu kiệt sức dần. Mình nhận thức được rằng đây là một dự án khổng lồ và cần một đội ngũ thay vì duy trì là dự án của một cá nhân. Vì vậy, hiện tại mình đang tập trung nhiều hơn vào việc biến đây thành một dự án nỗ lực của tập thể, để đưa những khía cạnh hữu ích của AI đến với mọi người thay vì chỉ tập trung vào doanh nghiệp. Và để xây dựng một doanh nghiệp và sản phẩm bền vững mà mọi người vẫn yêu thích sử dụng trong những năm tới, thay vì chỉ trở thành một startup khác trên con đường thoái hóa dịch vụ (enshittification). Mình quan tâm nhiều hơn đến các khái niệm như sở hữu ủy thác (steward ownership), chẳng hạn, thay vì nói về các chiến lược thoái vốn và cách bán mình cho các tập đoàn công nghệ lớn.
    
    Vì mình tự thấy bản thân chủ yếu là một người làm sản phẩm (nền tảng thiết kế UX + phát triển phần mềm), mình đặc biệt quan tâm đến những người có chuyên môn về marketing/truyền thông - nhưng cũng rất mong nhận được sự hỗ trợ từ các nhà phát triển phần mềm giàu kinh nghiệm khác. Và phản hồi từ bất kỳ ai đang sử dụng OpenMates đều thực sự quý giá và luôn được chào đón, bất kể nền tảng của bạn là gì.
    
    Nếu điều này nghe có vẻ thú vị với bạn và bạn muốn đóng góp ý kiến, kết nối với những người khác hoặc thậm chí có thể hợp tác lâu dài hơn - hãy tham gia buổi gặp mặt OpenMates hoặc [gửi tin nhắn cho mình](mailto:marco@openmates.org)! :)
    
    Thân ái,
    
    Marco  
    Người sáng tạo OpenMates
  id: |
    Sudah menggunakan OpenMates dan ingin bergabung dalam OpenMates Meetup pada hari Selasa, 19 Mei pukul 19:00 di Berlin?
    
    Selama 1 1/2 tahun terakhir, saya telah membangun OpenMates.org: Alternatif yang lebih baik untuk ChatGPT, Claude, OpenClaw, Manus, dan lainnya. Biasanya memberikan respons yang lebih baik, memiliki desain pengalaman pengguna yang lebih baik, memprioritaskan privasi, keamanan, dan kepentingan pengguna dengan berbagai fitur, serta tidak mengunci kamu ke dalam satu ekosistem, sambil tetap memungkinkan kamu menggunakan model AI yang sudah kamu kenal dan gunakan. Ia dapat menggunakan berbagai keahlian aplikasi untuk mencari acara, koneksi kereta api, janji temu dokter, apartemen, dan banyak lagi, serta telah memiliki 200 pengguna berbayar pertama (pembelian kredit penggunaan satu kali).
    
    Meski begitu: Saya belum berada di titik di mana saya bisa hidup darinya (masih didanai terutama oleh tunjangan pengangguran) dan saya bekerja sangat keras dalam beberapa minggu dan bulan terakhir hingga saya mulai merasa semakin lelah (burn out). Saya sadar bahwa ini adalah proyek besar dan membutuhkan tim alih-alih tetap menjadi proyek satu orang. Jadi, sekarang saya lebih fokus untuk menjadikan ini proyek upaya tim, untuk membuat aspek-aspek AI yang berguna dapat diakses oleh orang awam alih-alih berfokus pada perusahaan. Dan untuk membangun bisnis serta produk berkelanjutan yang tetap dicintai orang untuk digunakan di tahun-tahun mendatang, alih-alih menjadi sekadar startup lain dalam perjalanannya menuju "enshittification". Saya jauh lebih tertarik pada konsep-konsep seperti steward ownership, misalnya, alih-alih membicarakan strategi keluar dan bagaimana menjual diri ke perusahaan teknologi besar.
    
    Karena saya melihat diri saya terutama sebagai orang produk (latar belakang desain UX + pengembangan perangkat lunak), saya sangat tertarik pada orang-orang dengan fokus pemasaran/komunikasi - tetapi juga ingin mendapatkan dukungan dari pengembang perangkat lunak berpengalaman lainnya. Dan umpan balik dari siapa pun yang menggunakan OpenMates sangatlah berharga dan sangat disambut baik, apa pun latar belakangmu.
    
    Jika ini terdengar menarik bagimu dan kamu ingin berkontribusi dengan umpan balikmu, terhubung dengan orang lain, atau bahkan mungkin berkolaborasi dalam jangka panjang - bergabunglah dalam meetup OpenMates atau [kirimi saya pesan](mailto:marco@openmates.org)! :)
    
    Salam,
    
    Marco  
    Pencipta OpenMates
  pl: |
    Korzystasz już z OpenMates i chcesz dołączyć do OpenMates Meetup we wtorek, 19 maja o 19:00 w Berlinie?
    
    Przez ostatnie 1,5 roku budowałem OpenMates.org: lepszą alternatywę dla ChatGPT, Claude, OpenClaw, Manus i innych. Zazwyczaj daje lepsze odpowiedzi, ma lepszy design (UX), stawia na prywatność, bezpieczeństwo i interesy użytkownika dzięki różnym funkcjom i nie zamyka Cię w jednym ekosystemie, pozwalając jednocześnie na korzystanie z modeli AI, które już znasz i których używasz. Potrafi korzystać z różnych umiejętności aplikacji do znajdowania wydarzeń, połączeń kolejowych, wizyt u lekarza, mieszkań i wielu innych rzeczy, a także ma już pierwszych 200 płacących użytkowników (zakupy jednorazowych kredytów).
    
    To powiedziawszy: nie jestem jeszcze w punkcie, w którym mógłbym się z tego utrzymać (wciąż finansuję to głównie z zasiłku dla bezrobotnych) i w ostatnich tygodniach oraz miesiącach pracowałem tak dużo, że zacząłem się coraz bardziej wypalać. Mam świadomość, że to ogromny projekt i wymaga zespołu, zamiast pozostawać przedsięwzięciem jednoosobowym. Dlatego teraz skupiam się bardziej na uczynieniu z tego wysiłku zespołowego, aby udostępnić przydatne aspekty AI zwykłym ludziom, zamiast koncentrować się na sektorze korporacyjnym. I aby zbudować zrównoważony biznes i produkt, z którego ludzie będą chętnie korzystać przez lata, zamiast stać się kolejnym startupem na drodze do „enshittification”. O wiele bardziej interesują mnie koncepcje takie jak steward ownership (własność powiernicza), zamiast rozmawiania o strategiach wyjścia i o tym, jak sprzedać się gigantom technologicznym.
    
    Ponieważ postrzegam siebie przede wszystkim jako osobę od produktu (doświadczenie w projektowaniu UX i programowaniu), szczególnie interesują mnie osoby skupione na marketingu i komunikacji – ale z chęcią przyjmę też wsparcie od innych doświadczonych programistów. A opinie od każdego, kto korzysta z OpenMates, są naprawdę cenne i mile widziane, niezależnie od Twojego doświadczenia.
    
    Jeśli brzmi to dla Ciebie interesująco i chcesz podzielić się swoją opinią, nawiązać kontakt z innymi ludźmi lub może nawet nawiązać dłuższą współpracę – dołącz do meetup OpenMates lub [wyślij mi wiadomość](mailto:marco@openmates.org)! :)
    
    Pozdrawiam,
    
    Marco  
    Twórca OpenMates
  nl: |
    Gebruik je OpenMates al en wil je naar de OpenMates Meetup komen op dinsdag 19 mei om 19:00 in Berlijn?
    
    De afgelopen anderhalf jaar heb ik gebouwd aan OpenMates.org: een beter alternatief voor ChatGPT, Claude, OpenClaw, Manus en anderen. Het geeft doorgaans betere antwoorden, heeft een beter UX-ontwerp, geeft prioriteit aan privacy, veiligheid en gebruikersbelangen met diverse functies, en sluit je niet op in een ecosysteem, terwijl je nog steeds de AI-modellen kunt gebruiken die je al kent en gebruikt. Het kan verschillende app-skills gebruiken voor het vinden van evenementen, treinverbindingen, doktersafspraken, appartementen en nog veel meer, en heeft inmiddels de eerste 200 betalende gebruikers (eenmalige aankopen van gebruikstegoed).
    
    Dat gezegd hebbende: ik ben nog niet op een punt waar ik ervan kan rondkomen (nog steeds voornamelijk gefinancierd door een werkloosheidsuitkering) en ik heb de afgelopen weken en maanden zo hard gewerkt dat ik steeds meer opgebrand raakte. Ik ben me ervan bewust dat dit een enorm project is dat een team vereist in plaats van een eenmansproject te blijven. Daarom richt ik me nu meer op het maken van een teamproject, om de nuttige aspecten van AI toegankelijk te maken voor gewone mensen in plaats van me te richten op de zakelijke markt. En om een duurzaam bedrijf en product te bouwen dat mensen over een paar jaar nog steeds graag gebruiken, in plaats van de zoveelste startup te worden op weg naar 'enshittification'. Ik ben veel meer geïnteresseerd in concepten als steward-ownership, bijvoorbeeld, in plaats van te praten over exit-strategieën en hoe ik de boel kan verkopen aan Big Tech.
    
    Omdat ik mezelf primair zie als de 'product guy' (achtergrond in UX-design + softwareontwikkeling), ben ik vooral geïnteresseerd in mensen met een focus op marketing/communicatie – maar ik zou ook graag ondersteuning krijgen van andere ervaren softwareontwikkelaars. En feedback van iedereen die OpenMates gebruikt is oprecht waardevol en zeer welkom, ongeacht je achtergrond.
    
    Als dit je interessant in de oren klinkt en je wilt bijdragen met je feedback, in contact wilt komen met anderen of misschien zelfs op de langere termijn wilt samenwerken – kom dan naar de OpenMates meetup of [stuur me een bericht](mailto:marco@openmates.org)! :)
    
    Groeten,
    
    Marco  
    Maker van OpenMates
  ar: |
    هل تستخدم OpenMates بالفعل وترغب في الانضمام إلى لقاء OpenMates يوم الثلاثاء، 19 مايو الساعة 19:00 في برلين؟
    
    على مدار العام ونصف الماضي، كنت أعمل على بناء OpenMates.org: بديل أفضل لـ ChatGPT وClaude وOpenClaw وManus وغيرها. عادةً ما يقدم استجابات أفضل، ويتمتع بتصميم أفضل لتجربة المستخدم، ويمنح الأولوية للخصوصية والأمان ومصالح المستخدم من خلال ميزات متنوعة، ولا يحصرك في نظام بيئي معين، بينما لا يزال يسمح لك باستخدام نماذج الذكاء الاصطناعي التي تعرفها وتستخدمها بالفعل. يمكنه استخدام مهارات تطبيقات مختلفة للعثور على الفعاليات، ومواعيد القطارات، ومواعيد الأطباء، والشقق وغير ذلك الكثير، كما يضم أول 200 مستخدم مدفوع (عمليات شراء رصيد استخدام لمرة واحدة).
    
    ومع ذلك: لم أصل بعد إلى نقطة تمكنني من كسب لقمة العيش منه (لا يزال ممولاً بشكل أساسي من إعانات البطالة) وقد عملت كثيراً في الأسابيع والأشهر الأخيرة لدرجة أنني بدأت أشعر بالاحتراق النفسي أكثر فأكثر. أدرك أن هذا مشروع ضخم ويتطلب فريقاً بدلاً من البقاء كمشروع فردي. لذا، أركز الآن بشكل أكبر على جعل هذا المشروع جهداً جماعياً، لجعل الجوانب المفيدة للذكاء الاصطناعي في متناول الناس العاديين بدلاً من التركيز على الشركات. وبناء عمل تجاري ومنتج مستدام يستمر الناس في حبه واستخدامه في السنوات القادمة، بدلاً من أن يصبح مجرد شركة ناشئة أخرى في طريقها إلى التدهور (enshittification). أنا مهتم أكثر بمفاهيم مثل "ملكية الوصاية" (steward ownership)، على سبيل المثال، بدلاً من الحديث عن استراتيجيات الخروج وكيفية البيع لشركات التكنولوجيا الكبرى.
    
    بما أنني أرى نفسي في المقام الأول كمسؤول عن المنتج (خلفية في تصميم تجربة المستخدم وتطوير البرمجيات)، فأنا مهتم بشكل خاص بالأشخاص ذوي التركيز على التسويق/التواصل - ولكنني أود أيضاً الحصول على دعم من مطوري برمجيات ذوي خبرة. كما أن الملاحظات من أي شخص يستخدم OpenMates قيمة حقاً ومرحب بها للغاية، بغض النظر عن خلفيتك.
    
    إذا كان هذا يبدو مثيراً للاهتمام بالنسبة لك وترغب في المساهمة بملاحظاتك، أو التواصل مع أشخاص آخرين أو ربما التعاون على المدى الطويل - انضم إلى لقاء OpenMates أو [أرسل لي رسالة](mailto:marco@openmates.org)! :)
    
    تحياتي،
    
    ماركو  
    مؤسس OpenMates
  hi: |
    क्या तुम पहले से ही OpenMates का उपयोग कर रहे हो और मंगलवार, 19 मई को 19:00 बजे बर्लिन में होने वाले OpenMates Meetup में शामिल होना चाहते हो?
    
    पिछले 1 1/2 वर्षों से, मैं OpenMates.org बना रहा हूँ: ChatGPT, Claude, OpenClaw, Manus और अन्य का एक बेहतर विकल्प। यह आमतौर पर बेहतर प्रतिक्रियाएं देता है, इसका यूजर एक्सपीरियंस डिज़ाइन बेहतर है, यह विभिन्न फीचर्स के साथ प्राइवेसी, सुरक्षा और यूजर के हितों को प्राथमिकता देता है, और तुम्हें किसी एक इकोसिस्टम में बांधता नहीं है, जबकि तुम्हें उन AI मॉडल्स का उपयोग करने की अनुमति देता है जिन्हें तुम पहले से जानते हो और उपयोग करते हो। यह इवेंट्स, ट्रेन कनेक्शन, डॉक्टर अपॉइंटमेंट, अपार्टमेंट और बहुत कुछ खोजने के लिए विभिन्न ऐप स्किल्स का उपयोग कर सकता है और इसके पहले 200 भुगतान करने वाले यूजर्स (वन-टाइम यूसेज क्रेडिट खरीदारी) भी हैं।
    
    इसके बावजूद: मैं अभी उस स्थिति में नहीं हूँ जहाँ मैं इससे अपनी आजीविका चला सकूँ (अभी भी मुख्य रूप से बेरोजगारी भत्ते से वित्तपोषित है) और मैंने हाल के हफ्तों और महीनों में इतना काम किया है कि मैं धीरे-धीरे बर्नआउट महसूस करने लगा हूँ। मुझे पता है कि यह एक बहुत बड़ा प्रोजेक्ट है और इसके लिए एक व्यक्ति के प्रोजेक्ट के बजाय एक टीम की आवश्यकता है। इसलिए, अब मैं इसे एक टीम वर्क प्रोजेक्ट बनाने पर अधिक ध्यान केंद्रित कर रहा हूँ, ताकि एंटरप्राइज पर ध्यान केंद्रित करने के बजाय AI के उपयोगी पहलुओं को आम लोगों के लिए सुलभ बनाया जा सके। और एक ऐसा टिकाऊ व्यवसाय और उत्पाद बनाने के लिए जिसे लोग आने वाले वर्षों में भी उपयोग करना पसंद करें, बजाय इसके कि यह 'enshittification' की राह पर चलने वाला एक और स्टार्टअप बन जाए। मैं एग्जिट स्ट्रेटेजी और बड़ी टेक कंपनियों को बिकने के बारे में बात करने के बजाय स्टीवर्ड ओनरशिप (steward ownership) जैसे कॉन्सेप्ट्स में अधिक रुचि रखता हूँ।
    
    चूंकि मैं खुद को मुख्य रूप से एक प्रोडक्ट पर्सन (UX डिज़ाइन + सॉफ्टवेयर देव बैकग्राउंड) के रूप में देखता हूँ, इसलिए मेरी विशेष रुचि मार्केटिंग/कम्युनिकेशन पर ध्यान केंद्रित करने वाले लोगों में है - लेकिन मुझे अन्य अनुभवी सॉफ्टवेयर डेवलपर्स से भी सहयोग पाकर खुशी होगी। और OpenMates का उपयोग करने वाले किसी भी व्यक्ति का फीडबैक वास्तव में मूल्यवान है और उसका स्वागत है, चाहे तुम्हारा बैकग्राउंड कुछ भी हो।
    
    यदि यह तुम्हें दिलचस्प लगता है और तुम अपने फीडबैक के साथ योगदान देना चाहते हो, अन्य लोगों से जुड़ना चाहते हो या शायद लंबे समय तक सहयोग करना चाहते हो - तो OpenMates मीटअप में शामिल हो या [मुझे एक संदेश भेजें](mailto:marco@openmates.org)! :)
    
    नमस्ते,
    
    मार्को  
    OpenMates के निर्माता
  th: |
    คุณใช้ OpenMates อยู่แล้วและอยากเข้าร่วม OpenMates Meetup ในวันอังคารที่ 19 พฤษภาคม เวลา 19:00 น. ที่เบอร์ลินไหม?
    
    ตลอด 1 ปีครึ่งที่ผ่านมา ผมได้สร้าง OpenMates.org ขึ้นมา ซึ่งเป็นทางเลือกที่ดีกว่า ChatGPT, Claude, OpenClaw, Manus และอื่นๆ โดยปกติแล้วมันจะให้คำตอบที่ดีกว่า มีการออกแบบประสบการณ์ผู้ใช้ (UX) ที่ดีกว่า ให้ความสำคัญกับความเป็นส่วนตัว ความปลอดภัย และผลประโยชน์ของผู้ใช้ด้วยฟีเจอร์ต่างๆ และไม่ผูกมัดคุณไว้กับระบบนิเวศใดระบบนิเวศหนึ่ง ในขณะที่ยังคงให้คุณใช้โมเดล AI ที่คุณรู้จักและใช้งานอยู่แล้วได้ มันสามารถใช้ทักษะของแอปต่างๆ เพื่อค้นหากิจกรรม, การเชื่อมต่อรถไฟ, การนัดหมายแพทย์, อพาร์ตเมนต์ และอื่นๆ อีกมากมาย และตอนนี้มีผู้ใช้ที่ชำระเงิน 200 รายแรกแล้ว (การซื้อเครดิตการใช้งานแบบครั้งเดียว)
    
    อย่างไรก็ตาม ผมยังไม่อยู่ในจุดที่สามารถเลี้ยงชีพจากมันได้ (ยังคงได้รับเงินสนับสนุนหลักจากเงินชดเชยการว่างงาน) และผมทำงานหนักมากในช่วงไม่กี่สัปดาห์และไม่กี่เดือนที่ผ่านมาจนเริ่มรู้สึกหมดไฟ (burn out) มากขึ้นเรื่อยๆ ผมตระหนักดีว่านี่เป็นโปรเจกต์ที่ใหญ่มากและต้องการทีมงาน แทนที่จะเป็นโปรเจกต์ที่ทำเพียงคนเดียวต่อไป ดังนั้น ตอนนี้ผมจึงมุ่งเน้นไปที่การทำให้โปรเจกต์นี้เป็นความร่วมมือของทีม เพื่อให้แง่มุมที่เป็นประโยชน์ของ AI เข้าถึงได้สำหรับคนทั่วไป แทนที่จะมุ่งเน้นไปที่ระดับองค์กร และเพื่อสร้างธุรกิจและผลิตภัณฑ์ที่ยั่งยืนซึ่งผู้คนยังคงรักที่จะใช้งานในอีกหลายปีข้างหน้า แทนที่จะกลายเป็นเพียงสตาร์ทอัพอีกรายที่กำลังก้าวไปสู่ความเสื่อมถอย (enshittification) ผมสนใจแนวคิดอย่างเช่น การเป็นเจ้าของแบบดูแลผลประโยชน์ (steward ownership) มากกว่าการพูดถึงกลยุทธ์การถอนตัว (exit strategies) และวิธีขายกิจการให้กับบริษัทเทคโนโลยียักษ์ใหญ่
    
    เนื่องจากผมมองว่าตัวเองเป็นคนสายผลิตภัณฑ์เป็นหลัก (พื้นฐานด้านการออกแบบ UX + การพัฒนาซอฟต์แวร์) ผมจึงสนใจเป็นพิเศษในกลุ่มคนที่มีความเชี่ยวชาญด้านการตลาด/การสื่อสาร แต่ก็ยินดีรับการสนับสนุนจากนักพัฒนาซอฟต์แวร์ที่มีประสบการณ์ท่านอื่นๆ ด้วยเช่นกัน และคำติชมจากทุกคนที่ใช้ OpenMates นั้นมีค่าอย่างยิ่งและยินดีรับฟังเสมอ ไม่ว่าคุณจะมีพื้นฐานอย่างไรก็ตาม
    
    หากสิ่งนี้ฟังดูน่าสนใจสำหรับคุณ และคุณต้องการร่วมแสดงความคิดเห็น ทำความรู้จักกับคนอื่นๆ หรืออาจจะร่วมงานกันในระยะยาว เข้าร่วม OpenMates meetup หรือ [ส่งข้อความหาผม](mailto:marco@openmates.org) ได้เลย! :)
    
    ด้วยความเคารพ
    
    มาร์โก  
    ผู้สร้าง OpenMates
  cs: |
    Už používáš OpenMates a chceš se přidat k OpenMates Meetupu v úterý 19. května v 19:00 v Berlíně?
    
    Poslední rok a půl stavím OpenMates.org: Lepší alternativu k ChatGPT, Claude, OpenClaw, Manus a dalším. Obvykle dává lepší odpovědi, má lepší design uživatelského prostředí, díky různým funkcím upřednostňuje soukromí, bezpečnost a zájmy uživatelů a neuzamyká tě do jednoho ekosystému, přičemž ti stále umožňuje používat AI modely, které už znáš a používáš. Dokáže využívat různé dovednosti aplikací pro vyhledávání událostí, vlakových spojení, termínů u lékaře, bytů a mnoho dalšího a má už také prvních 200 platících uživatelů (jednorázové nákupy kreditů).
    
    Nicméně: Ještě nejsem ve fázi, kdy by mě to uživilo (stále je to financováno hlavně z podpory v nezaměstnanosti) a v posledních týdnech a měsících jsem pracoval tolik, že jsem začal čím dál víc vyhořívat. Jsem si vědom toho, že jde o obrovský projekt, který vyžaduje tým, místo aby zůstal projektem jednoho člověka. Proto se teď více soustředím na to, aby se z toho stalo týmové úsilí a aby užitečné aspekty AI byly dostupné běžným lidem, místo abych se zaměřoval na korporátní sféru. A abych vybudoval udržitelný byznys a produkt, který budou lidé rádi používat i v nadcházejících letech, místo aby se stal jen dalším startupem na cestě k „enshittifikaci“. Mnohem více mě zajímají koncepty jako například steward ownership, místo mluvení o exit strategiích a o tom, jak se prodat velkým technologickým firmám.
    
    Protože se vidím především jako produktový člověk (zkušenosti s UX designem a vývojem softwaru), zajímají mě zejména lidé se zaměřením na marketing/komunikaci – ale rád bych získal podporu i od dalších zkušených softwarových vývojářů. A zpětná vazba od kohokoli, kdo OpenMates používá, je skutečně cenná a velmi vítaná, bez ohledu na tvé zázemí.
    
    Pokud ti to zní zajímavě a chceš přispět svou zpětnou vazbou, spojit se s ostatními nebo třeba i spolupracovat dlouhodoběji – přidej se k OpenMates meetupu nebo mi [napiš zprávu](mailto:marco@openmates.org)! :)
    
    Zdravím,
    
    Marco  
    Tvůrce OpenMates
  sv: |
    Använder du redan OpenMates och vill komma på OpenMates Meetup tisdagen den 19 maj kl. 19:00 i Berlin?
    
    Under de senaste 1,5 åren har jag byggt OpenMates.org: Ett bättre alternativ till ChatGPT, Claude, OpenClaw, Manus med flera. Det ger vanligtvis bättre svar, har en bättre användarupplevelse, prioriterar integritet, säkerhet och användarnas intressen med olika funktioner, och låser inte in dig i ett ekosystem, samtidigt som du fortfarande kan använda de AI-modeller du redan känner till och använder. Det kan använda olika app-färdigheter för att hitta evenemang, tågförbindelser, läkarbesök, lägenheter och mycket mer, och har även de första 200 betalande användarna (engångsköp av användningskrediter).
    
    Med det sagt: Jag är ännu inte vid en punkt där jag kan leva på det (finansieras fortfarande främst av a-kassa) och jag har jobbat så mycket de senaste veckorna och månaderna att jag har börjat bli alltmer utbränd. Jag är medveten om att detta är ett enormt projekt som kräver ett team istället för att förbli ett enmansprojekt. Därför fokuserar jag nu mer på att göra detta till ett lagarbete, för att göra de användbara aspekterna av AI tillgängliga för vanliga människor istället för att fokusera på företag. Och för att bygga en hållbar verksamhet och produkt som folk fortfarande älskar att använda i många år framöver, istället för att bli ännu en startup på väg mot "enshittification". Jag är mycket mer intresserad av koncept som steward ownership, till exempel, istället för att prata om exit-strategier och hur man säljer ut sig till techjättarna.
    
    Eftersom jag främst ser mig själv som produktkillen (bakgrund inom UX-design + mjukvaruutveckling), är jag särskilt intresserad av personer med fokus på marknadsföring/kommunikation – men skulle också gärna få stöd från andra erfarna mjukvaruutvecklare. Och feedback från alla som använder OpenMates är genuint värdefull och mycket välkommen, oavsett din bakgrund.
    
    Om detta låter intressant för dig och du vill bidra med din feedback, knyta kontakter med andra eller kanske till och med samarbeta mer långsiktigt – kom på OpenMates meetup eller [skicka ett meddelande till mig](mailto:marco@openmates.org)! :)
    
    Hälsningar,
    
    Marco  
    Skapare av OpenMates
  he: |
    כבר משתמשים ב-OpenMates ורוצים להצטרף למפגש (Meetup) של OpenMates ביום שלישי, ה-19 במאי בשעה 19:00 בברלין?
    
    במשך שנה וחצי האחרונות, אני בונה את OpenMates.org: חלופה טובה יותר ל-ChatGPT, Claude, OpenClaw, Manus ואחרים. היא בדרך כלל נותנת תשובות טובות יותר, בעלת עיצוב חוויית משתמש טוב יותר, מתעדפת פרטיות, בטיחות ואינטרסים של המשתמשים עם מגוון פיצ'רים, ולא כובלת אתכם לאקו-סיסטם מסוים, תוך שהיא עדיין מאפשרת לכם להשתמש במודלי ה-AI שאתם כבר מכירים ואוהבים. היא יכולה להשתמש בכישורי אפליקציה (app skills) שונים למציאת אירועים, חיבורי רכבות, תורים לרופאים, דירות ועוד הרבה יותר, ויש לה כבר את 200 המשתמשים המשלמים הראשונים (רכישות חד-פעמיות של קרדיטים לשימוש).
    
    עם זאת: אני עדיין לא בנקודה שבה אני יכול להתפרנס מזה (עדיין ממומן בעיקר מדמי אבטלה) ועבדתי כל כך הרבה בשבועות ובחודשים האחרונים שהתחלתי להרגיש שחיקה הולכת וגוברת. אני מודע לכך שזה פרויקט ענק שדורש צוות במקום להישאר פרויקט של אדם אחד. לכן, אני מתמקד עכשיו יותר בהפיכת הפרויקט למאמץ צוותי, כדי להנגיש את ההיבטים השימושיים של AI לאנשים מן השורה במקום להתמקד במגזר העסקי (enterprise). וכדי לבנות עסק ומוצר בר-קיימא שאנשים ימשיכו לאהוב להשתמש בו בשנים הבאות, במקום להפוך לעוד סטארט-אפ בדרך ל-"en-shittification". אני הרבה יותר מתעניין במושגים כמו בעלות נאמנות (steward ownership), למשל, במקום לדבר על אסטרטגיות אקזיט ואיך למכור את העסק לענקיות הטכנולוגיה.
    
    מכיוון שאני רואה את עצמי בעיקר כאיש מוצר (רקע בעיצוב UX ופיתוח תוכנה), אני מעוניין במיוחד באנשים עם דגש על שיווק/תקשורת - אבל אשמח מאוד לקבל תמיכה גם ממפתחי תוכנה מנוסים אחרים. ומשוב מכל מי שמשתמש ב-OpenMates הוא בעל ערך אמיתי וברוך הבא, ללא קשר לרקע שלכם.
    
    אם זה נשמע לכם מעניין ואתם רוצים לתרום מהמשוב שלכם, ליצור קשר עם אנשים אחרים או אולי אפילו לשתף פעולה לטווח ארוך יותר - הצטרפו למפגש של OpenMates או [שלחו לי הודעה](mailto:marco@openmates.org)! :)
    
    בברכה,
    
    מרקו  
    היוצר של OpenMates
