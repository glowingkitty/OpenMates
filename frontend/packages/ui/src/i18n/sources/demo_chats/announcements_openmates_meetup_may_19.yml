message:
  context: 'Newsletter announcements/openmates-meetup-may-19 — message'
  en: |-
    Already using OpenMates and want to join the OpenMates Meetup on Tuesday, May 19 at 19:00 in Berlin?
    
    For the past 1 1/2 years, I’ve been building OpenMates.org: A better alternative to ChatGPT, Claude, OpenClaw, Manus and others. It typically gives better responses, has a better user experience design, prioritizes privacy, safety and user interests with various features, and doesn’t lock you into an ecosystem, while still allowing you to use the AI models you already know and use. It can use various app skills for finding events, train connections, doctor appointments, apartments and much more and also has the first 200 paying users (one-time usage credit purchases).
    
    That said: I’m not yet at a point where I can make a living from it (still primarily financed by unemployment money) and I worked so much in recent weeks and months that I started to burn out more and more. I am aware that this is a huge project and requires a team instead of remaining a single-person project. So, I’m now focusing more on making this a team effort project, to make the useful aspects of AI accessible to everyday people instead of focusing on enterprise. And to build a sustainable business and product that people still love using in the years to come, instead of becoming just another startup on its path to enshittification. I am much more interested in concepts like steward ownership, for example, instead of talking about exit strategies and how to sell out to big tech.
    
    Since I see myself primarily as the product guy (UX design + software dev background), I am especially interested in people with a marketing/communication focus - but also would love to get support from other experienced software developers. And feedback from anyone using OpenMates is genuinely valuable and very welcome, regardless of your background.
    
    If this sounds interesting to you and you want to contribute with your feedback, connect with other people or maybe even collaborate more long term - join the OpenMates meetup or [send me a message](mailto:marco@openmates.org)! :)
    
    Greetings,
    
    Marco  
    Creator of OpenMates
  de: |-
    Nutzt du OpenMates bereits und möchtest am Dienstag, den 19. Mai um 19:00 Uhr in Berlin zum OpenMates Meetup kommen?
    
    Seit den letzten 1 1/2 Jahren arbeite ich an OpenMates.org: einer besseren Alternative zu ChatGPT, Claude, OpenClaw, Manus und anderen. OpenMates gibt meistens bessere Antworten, hat ein besseres User-Experience-Design, priorisiert Datenschutz, Sicherheit und Nutzerinteressen mit verschiedenen Funktionen und sperrt dich nicht in ein Ökosystem ein, während du trotzdem die KI-Modelle nutzen kannst, die du bereits kennst und verwendest. OpenMates kann verschiedene App-Skills nutzen, um Events, Zugverbindungen, Arzttermine, Wohnungen und vieles mehr zu finden, und hat inzwischen die ersten 200 zahlenden Nutzer:innen (einmalige Guthaben-Käufe).
    
    Gleichzeitig bin ich noch nicht an dem Punkt, an dem ich davon leben kann (aktuell finanziere ich mich noch hauptsächlich über Arbeitslosengeld), und ich habe in den letzten Wochen und Monaten so viel gearbeitet, dass ich immer mehr in Richtung Burnout gerutscht bin. Mir ist bewusst, dass OpenMates ein sehr großes Projekt ist und ein Team braucht, statt ein Ein-Personen-Projekt zu bleiben. Deshalb fokussiere ich mich jetzt stärker darauf, daraus ein gemeinsames Team-Projekt zu machen: um die nützlichen Seiten von KI für uns alle im Alltag zugänglich zu machen, anstatt Großunternehmen noch mehr zu unterstützen als notwendig. Und um ein nachhaltiges Unternehmen und Produkt aufzubauen, das Menschen auch in den kommenden Jahren noch gerne nutzen, statt nur ein weiteres Startup auf dem Weg zur Enshittification zu werden. Mich interessieren Konzepte wie Steward Ownership zum Beispiel deutlich mehr als Exit-Strategien und der Verkauf an Big Tech.
    
    Da ich mich selbst vor allem als Produktmensch sehe (UX-Design + Software-Development-Background), bin ich besonders an Menschen mit Marketing-/Kommunikationsfokus interessiert. Aber ich würde mich genauso über Unterstützung von anderen erfahrenen Softwareentwickler:innen freuen. Und Feedback von allen, die OpenMates nutzen, ist unabhängig vom eigenen Hintergrund sehr wertvoll und ausdrücklich willkommen.
    
    Wenn das für dich interessant klingt und du mit Feedback beitragen, Kontakte empfehlen magst oder vielleicht sogar längerfristig mitarbeiten möchtest, komm zum OpenMates Meetup oder [schreib mir eine Nachricht](mailto:marco@openmates.org)! :)
    
    Liebe Grüße,
    
    Marco  
    Creator of OpenMates
  zh: |
    你是否已经在使用 OpenMates，并想参加 5 月 19 日星期二 19:00 在柏林举行的 OpenMates 见面会？
    
    在过去的 1 年半里，我一直在开发 OpenMates.org：一个比 ChatGPT、Claude、OpenClaw、Manus 等更好的替代方案。它通常能提供更好的回复，拥有更佳的用户体验设计，通过各种功能优先考虑隐私、安全和用户利益，并且不会将你锁定在某个生态系统中，同时仍允许你使用已经熟悉和使用的 AI 模型。它可以利用各种应用技能来查找活动、火车班次、医生预约、公寓等等，并且已经拥有了首批 200 名付费用户（购买一次性使用额度）。
    
    话虽如此：我目前还无法以此维持生计（主要仍靠失业金资助），而且最近几周和几个月我工作强度太大，开始感到越来越疲惫。我意识到这是一个巨大的项目，需要一个团队，而不能一直是一个人的项目。因此，我现在正更多地致力于将其转变为一个团队协作项目，让普通人也能享受到 AI 的实用之处，而不是只专注于企业端。并且去打造一个可持续发展的业务和产品，让人们在未来几年依然喜爱使用，而不是成为另一家走上“平台劣化”（enshittification）道路的初创公司。例如，我对“责任制所有权”（steward ownership）等概念更感兴趣，而不是讨论退出策略以及如何卖给科技巨头。
    
    既然我主要把自己定位为产品负责人（具有 UX 设计和软件开发背景），我特别希望能结识专注于市场营销/沟通的人才——但也非常欢迎其他资深软件开发者的支持。无论你的背景如何，任何 OpenMates 使用者的反馈对我们来说都弥足珍贵，非常欢迎。
    
    如果你对此感兴趣，并希望提供反馈、结识他人，甚至进行更长期的合作——请参加 OpenMates 见面会或[给我发消息](mailto:marco@openmates.org)！:)
    
    祝好，
    
    Marco  
    OpenMates 创始人
  es: |
    Hola,
    Aquí Marco (también conocido como [glowingkitty](https://github.com/glowingkitty)), el creador de OpenMates.
    No me he olvidado de OpenMates; todo lo contrario. 
    
    # 🙏 Unas palabras de agradecimiento primero
    
    A finales de diciembre, en el marco del Chaos Communication Congress, me pidieron inesperadamente una entrevista para el canal de televisión alemán ZDF [(un reportaje sobre la importancia de las alternativas centradas en la privacidad frente a las grandes empresas tecnológicas de IA)](https://www.zdfheute.de/wirtschaft/39c3-hamburg-ki-alternativen-chatgpt-100.html). Y guau, qué experiencia. A pesar de que OpenMates estaba mucho menos pulido en aquel momento, las primeras personas empezaron a registrarse y a usarlo, y también a encontrar errores y casos límite que yo no había experimentado durante mis pruebas en mis propios dispositivos, y que afortunadamente reportaron. Muchas gracias a todos los que lo hicieron: ¡ayudó muchísimo a que OpenMates fuera más refinado, más estable y más completo! Y, por supuesto, eres más que bienvenido a seguir informando de cualquier problema si notas algo que no funcione bien o esté roto en OpenMates.
    
    Aunque este no era el primer software que creaba, era la primera vez que más de un puñado de personas empezaba a usar algo que yo había construido: ¡más de 180 usuarios activos están usando OpenMates hasta ahora! Lo cual ha sido súper emocionante y, admito que al principio, también un poco abrumador.
    
    Desde entonces, me he centrado completamente en mejorar y depurar OpenMates, y en conseguir que sea más completo y refinado, realizando un montón de cambios en el código. Correcciones de errores, nuevas funciones, una interfaz de usuario mejorada y muchas más mejoras. 
    
    Y hoy, ¡me alegra darte una actualización con los cambios más emocionantes de los últimos meses! Ten en cuenta que hablar de todos los cambios sería demasiado para un solo boletín, así que me centraré en lo más destacado y también publicaré varios vídeos cortos sobre diversas funciones de OpenMates en las próximas semanas en:
    - [Instagram](https://instagram.com/openmates_official)
    - [Bluesky](https://bsky.app/profile/openmates.bsky.social)
    - [Mastodon](https://mastodon.social/@OpenMates)
    - [YouTube](https://www.youtube.com/@OpenMates).
    
    # ✨ Lo más destacado de los últimos meses
    
    ## 1. 🧩 Nuevas apps y habilidades
    
    Además de las capacidades existentes de búsqueda en la web, lectura y análisis de sitios web, y lectura de transcripciones de vídeos de YouTube para iniciar debates, OpenMates ha incorporado muchas aplicaciones y habilidades nuevas. Aquí tienes algunos puntos destacados:
    
    - 🏥 **[Salud](#settings/apps/health/skills/search_appointments):** ¿Buscas citas médicas? La aplicación de Salud ahora puede consultar Doctolib y Jameda para ver los huecos disponibles.
    - 🏠 **[Hogar](#settings/apps/home/skills/search):** Busca apartamentos en ImmoScout24, WG-Gesucht y Kleinanzeigen, con los detalles clave visibles directamente en OpenMates.
    - 🎉 **[Eventos](#settings/apps/events/skills/search):** Busca y filtra eventos en Meetup, Luma, Resident Advisor y Google, con detalles como descripciones, imágenes, cuándo y dónde son los eventos, y enlaces directos para confirmar asistencia o unirse.
    - ✈️ **[Viajes](#settings/apps/travel):** La nueva habilidad "[Buscar conexión](#settings/apps/travel/skills/search_connections)" te permite buscar vuelos a través de Google, en múltiples conexiones en varios días simultáneamente, incluyendo detalles completos del vuelo y enlaces de reserva. El soporte para conexiones de tren llegará pronto. Y la habilidad "[Calendario de precios](#settings/apps/travel/skills/price_calendar)" te muestra una vista rápida de la evolución de los precios a lo largo de un mes.
    - ⏰ **[Recordatorios](#settings/apps/reminder):** Crea un recordatorio para un chat para volver a él más tarde, o incluso haz que OpenMates busque y resuma las últimas noticias diarias sobre un tema determinado, por ejemplo.
    - 🖼️ **[Imágenes](#settings/apps/images):** [Busca](#settings/apps/images/skills/search) imágenes en la web, [genera](#settings/apps/images/skills/generate) imágenes y [gráficos vectoriales](#settings/apps/images/skills/vectorize).
    - 📄 **[PDFs](#settings/apps/pdf):** Sube PDFs y haz preguntas sobre el texto o incluso sobre el diseño visual. ¡OpenMates puede leer y ver PDFs! 
    - 💻 **[Código](#settings/apps/code):** OpenMates puede [buscar la documentación más reciente](#settings/apps/code/skills/get_docs) para responder preguntas relacionadas con la programación, luego escribir código e incluso permitirte previsualizar diseños de sitios web y código directamente en el navegador. Y esto es solo el principio de sus capacidades de programación.
    - 🧮 **[Matemáticas](#settings/apps/math):** Calcula expresiones e incluso visualiza gráficas, todo dentro de OpenMates.
    - 📝 **[Documentos](#settings/apps/docs):** Pide que se generen documentos de Word y descárgalos como archivos .docx.
    - 📊 **[Hojas de cálculo](#settings/apps/sheets):** OpenMates también puede crear tablas y permitirte descargarlas como archivos .xlsx. Tanto Documentos como Hojas de cálculo mejorarán y serán aún más potentes en las próximas semanas.
    - 📧 **[Correo](#settings/apps/mail):** OpenMates puede redactar correos electrónicos por ti, que luego puedes abrir y enviar fácilmente a través de tu programa de correo predeterminado en tu dispositivo.
    - 🎙️ **[Audio](#settings/apps/audio):** ¿No quieres escribir? Graba y envía un mensaje de voz a OpenMates, directamente desde el campo de mensaje.
    
    Y se han añadido aún más habilidades de aplicaciones. Solo tienes que [echar un vistazo y explorar las Apps de OpenMates](#settings/apps).
    
    ## 2. 🔒 Marcadores de datos personales
    
    A diferencia de los chatbots de IA de las grandes empresas tecnológicas y las startups típicas, OpenMates está diseñado con tu privacidad como prioridad principal. Y ya contaba con varias protecciones de privacidad:
    - 🔐 todos tus chats se cifran y descifran solo en tu dispositivo
    - 🖼️ todas las imágenes externas se cargan a través de nuestro servidor OpenMates (para que los sitios web externos no vean tu dirección IP ni la información de tu dispositivo)
    - 📉 no se utiliza Google Analytics ni ningún otro software de análisis en OpenMates (por eso tampoco ves un banner de cookies en OpenMates)
    
    Novedad: los datos sensibles como direcciones de correo electrónico, números de teléfono, claves API y más se detectan automáticamente y se sustituyen por marcadores de posición en tu dispositivo cuando redactas y envías un mensaje a OpenMates. Siempre puedes volver al valor original en la interfaz de usuario, y puedes hacer clic en los datos detectados para evitar la sustitución. Pero, por defecto, esta función garantiza que ni OpenMates ni los proveedores de IA que procesan tus mensajes vean nunca los datos sensibles en primer lugar.
    
    [Pruébalo tú mismo](#message=Draft%20an%20email%20from%20marco.rossi%40gmail.com%20to%20hausverwaltung%40immobilien-weber.de%20asking%20about%20the%20status%20of%20the%20broken%20heater%20in%20my%20apartment.%20The%20repair%20was%20reported%20on%20March%2028th%20and%20my%20phone%20number%20is%20%2B49%20170%209876543.%20Please%20be%20polite%20but%20firm%20%E2%80%94%20it%E2%80%99s%20been%20almost%203%20weeks.): haz clic en este enlace para ver los Marcadores de datos personales en acción: tu correo electrónico y tu número de teléfono se detectarán automáticamente y se sustituirán antes de enviarse a la IA.
    
    ## 3. 🧠 Recuerdos
    
    OpenMates ahora puede recordar datos específicos de las aplicaciones, como tus próximos viajes o detalles de proyectos. PERO: todos los recuerdos se cifran y descifran solo en tu dispositivo, y solo se comparten temporalmente con el servidor de OpenMates y el proveedor de IA si lo confirmas explícitamente para el chat en cuestión. Esto te permite aprovechar al máximo las respuestas personalizadas sin tener que repetir constantemente los detalles de tu proyecto, manteniendo el control total sobre qué datos compartes, cuándo y con qué proveedor de IA. Consulta los [Recuerdos en las Apps de OpenMates](#settings/apps/all/memories).
    
    ## 4. 🎯 Modos de enfoque
    
    Saber dar las instrucciones adecuadas a un chatbot de IA marca una gran diferencia en cuanto a lo útil que será el chatbot y la calidad de las respuestas. Con los Modos de enfoque, no necesitas ser un experto en ingeniería de prompts para aprovechar al máximo unas instrucciones excelentes y específicas. Solo tienes que pedirle a OpenMates información sobre tu carrera, por ejemplo, y el modo de enfoque "Perspectivas profesionales" debería activarse automáticamente para guiarte en el proceso. Y, por supuesto: esto es solo el principio. Se añadirán muchos más Modos de enfoque y la calidad de los existentes seguirá mejorando en las próximas semanas. No dudes en consultar los [Modos de enfoque en las Apps de OpenMates](#settings/apps/all/focus-modes).
    
    ## 5. 🤖 Nuevos modelos
    
    OpenMates tiene una amplia selección de los modelos de IA más eficientes y con mejor rendimiento que existen. Por defecto, selecciona automáticamente el adecuado en función de la tarea. Pero siempre puedes anular este comportamiento [en los ajustes de IA](#settings/ai) de forma permanente, o bajo demanda mencionando un modelo específico en el campo de mensaje mediante `@{nombre_del_modelo}`. Ahora puedes seleccionar entre una amplia gama de modelos de IA, por ejemplo:
    
    - [Claude Opus 4.7](#settings/ai/model/claude-opus-4-7) y [Claude Sonnet 4.6](#settings/ai/model/claude-sonnet-4-6)
    - [Gemini 3.1 Pro](#settings/ai/model/gemini-3.1-pro-preview) y [Gemini 3 Flash](#settings/ai/model/gemini-3-flash-preview)
    - [GPT-5.4](#settings/ai/model/gpt-5.4)
    - [DeepSeek V3.2](#settings/ai/model/deepseek-v3.2)
    - [Devstral 2](#settings/ai/model/devstral-2512)
    - Alias de modelos `@best` y `@fast`: escribe `@best` para dirigirte automáticamente al modelo más potente, o `@fast` para usar el modelo más rápido disponible en OpenMates.
    
    ## 6. 💡 Inspiraciones diarias y enlaces a Wikipedia
    
    La IA, si se usa correctamente, puede ser una herramienta increíble para el aprendizaje. Y OpenMates está optimizado para animar a la gente a aprender, a explorar, a inspirarse. Para eso sirven las Inspiraciones diarias, que verás en la parte superior de la interfaz tras iniciar sesión. Muestran nuevos vídeos interesantes y, pronto, también otros contenidos como artículos de Wikipedia, nuevas funciones de OpenMates, fotos y detalles de obras de arte, eventos históricos importantes y más. Las Inspiraciones diarias se adaptan a tus chats y luego se bloquean en tu dispositivo con una clave que solo tú tienes, por lo que siguen siendo privadas para ti.
    Además, OpenMates también resalta automáticamente los artículos de Wikipedia en las respuestas de los mensajes del asistente. Esto hace que sea súper fácil aprender más sobre un tema con solo hacer clic en la palabra resaltada en naranja con el icono de estudio al lado.
    
    # 🚀 Qué viene ahora
    
    En las próximas semanas publicaré varios clips cortos mostrando las numerosas funciones de OpenMates y las cosas útiles que se pueden hacer con él, además de seguir mejorando el software y añadiendo más aplicaciones, proveedores y funciones.
    
    A partir de ahora, mi plan es enviar correos electrónicos del boletín para anuncios y actualizaciones cada pocas semanas y, por separado, también consejos y trucos sobre cómo usar OpenMates. No dudes en [consultar los ajustes de tu boletín en cualquier momento](#settings/newsletter), si quieres recibir más o menos correos electrónicos.
    
    ¡Diviértete usando OpenMates y permanece atento a más actualizaciones!
