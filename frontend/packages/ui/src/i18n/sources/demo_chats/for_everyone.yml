  cs: "# ✨ Digitální spoluhráči pro všechny


    S OpenMates máte tým specializovaných AI chatbotů, kteří vás mohou inspirovat, učit nové znalosti a pomocí aplikací plnit různé úkoly. Díky tomu jsou užitečné aspekty AI dostupné pro všechny, přičemž je chráněno vaše soukromí a máte přístup k nejlepším AI modelům.

    ## Ukázkové chaty:

    Stačí kliknout na ukázkové chaty a otevřít je.

    [[example_chats_group]]


    ## 🚀 Rychlý start


    Stiskněte tlačítko Registrovat v pravém horním rohu, kupte kreditů a začněte OpenMates používat.


    ## 📱 Aplikace


    Protože pouhé vyhledávání na webu nestačí pro každodenní úkoly, OpenMates podporuje různé další aplikace.

    [[app_store_group]]

    V [App Store](#settings/appstore) najdete přehled všech aplikací, které mohou vaši digitální spoluhráči používat, spolu s jejich dovednostmi, režimy zaměření a nastaveními a vzpomínkami.


    ### 🛠️ Dovednosti


    Umožňují vašim spoluhráčům komunikovat s externími službami: prohledávat web, číst přepisy videí a weby, hledat místa a jejich otevírací doby, hledat videa a mnohem více.

    [[skills_group]]


    ### 🎯 Režimy zaměření


    Dočasně změňte zaměření chatu k dosažení konkrétního cíle. Přináší velký rozdíl v získávání lepších odpovědí od chatbotů.

    [[focus_modes_group]]


    ### 💾 Nastavení a vzpomínky


    Umožní OpenMates poskytovat osobnější odpovědi na základě vašich zájmů, cest, knih, projektů a dalšího. Ale:

    - ✅ pouze když je to potřeba

    - ✅ pouze pro konkrétní chat, kde je to potřeba

    - ✅ pouze s daty, ke sdílení kterých jasně souhlasíte

    - ✅ citlivá data nejsou nikdy uložena na serveru

    Všechna nastavení a vzpomínky jsou šifrovány a dešifrovány na vašich zařízeních, stejně jako vaše chaty. Server je nikdy nemůže sám dešifrovat.

    [[settings_memories_group]]


    ## 🎨 Navrženo pro snadné použití


    Standardně OpenMates automaticky zpracovává váš požadavek s nejvhodnějším AI modelem, spoluhráčem, dovednostmi aplikací, režimy zaměření a nastaveními (po vašem souhlasu).


    ### 🤖 AI modely


    OpenMates automaticky vybírá nejlepší AI model pro každý váš požadavek. Pro plnou kontrolu napište **@** ve zprávě pro výběr konkrétního modelu.

    [[ai_models_group]]


    ## 🎓 Učení a inspirace


    Při správném použití mohou být AI chatboti nejúžasnějším personalizovaným nástrojem pro učení. OpenMates implementuje různé funkce, které vám pomáhají se každý den učit.


    ## 🔒 Soukromí a šifrování


    Pouze vaše zařízení může dešifrovat vaše chaty a citlivá nastavení aplikací.

    Máte plnou kontrolu nad tím, jaká data jsou odesílána do OpenMates.

    Na server je odesíláno pouze minimální množství dat a nikdy není uloženo na disku.


    ## 💰 Ceny


    Bez předplatného, bez reklam, bez sdílení dat, bez rizikového kapitálu.

    Místo toho: jednoduchý a spravedlivý systém platby za použití. Kupíte kredity a pak platíte za požadavek podle cen každé App dovednosti v App Store. A samozřejmě: kredity nevyprší.


    ---


    👨‍💻 Jste vývojář softwaru? Prohlédněte si úvod pro vývojáře a dozvíte se více o tom, jak může být OpenMates velmi výkonný pro vývoj nového softwaru.

    [[for_developers_embed]]

    "
  sv: "# ✨ Digitala lagkamrater för alla


    Med OpenMates har du ett team av specialiserade AI-chatbottar som inte bara kan inspirera dig och lära ut ny kunskap, utan också utföra olika uppgifter med hjälp av appar. Detta gör AI:s användbara aspekter tillgängliga för alla, medan din integritet skyddas och du får tillgång till de bästa AI-modellerna.

    ## Exempelchatter:

    Klicka bara på exempelchatterna för att öppna dem.

    [[example_chats_group]]


    ## 🚀 Snabbstart


    Tryck på knappen Registrera dig uppe till höger för att registrera dig, köp användningskrediter och börja använda OpenMates.


    ## 📱 Appar


    Eftersom enbart webbsökning inte räcker för att klara vardagliga uppgifter stöder OpenMates också en rad andra appar.

    [[app_store_group]]

    I [App Store](#settings/appstore) har du en översikt över alla appar som dina digitala lagkamrater kan använda, med deras färdigheter, fokusmoder och inställningar och minnen.


    ### 🛠️ Färdigheter


    Låter dina lagkamrater interagera med externa tjänster: söka på webben, läsa videotranskript och webbplatser, söka efter platser och öppettider, söka efter videor och mycket mer.

    [[skills_group]]


    ### 🎯 Fokusmoder


    Ändra fokus på en chatt tillfälligt för att nå ett specifikt mål. Gör stor skillnad i att få mycket bättre svar från dina chatbottar.

    [[focus_modes_group]]


    ### 💾 Inställningar och minnen


    Låter OpenMates ge dig mer personanpassade svar baserade på dina intressen, resor, böcker, projekt och mer. Men:

    - ✅ bara när det behövs

    - ✅ bara för den specifika chatten där det behövs

    - ✅ bara med data du uttryckligen samtycker till att dela

    - ✅ känslig data lagras aldrig på servern

    Alla inställningar och minnen krypteras och dekrypteras på dina enheter, precis som dina chattar. Servern kan aldrig dekryptera dem på egen hand.

    [[settings_memories_group]]


    ## 🎨 Designad för enkel användning


    Som standard behandlar OpenMates automatiskt din förfrågan med den mest passande AI-modellen, lagkamraten, app-färdigheterna, fokusmoderna och inställningarna (efter ditt samtycke).


    ### 🤖 AI-modeller


    OpenMates väljer automatiskt den bästa AI-modellen för varje förfrågan. Om du vill ha full kontroll skriver du **@** i ditt meddelande för att välja en specifik modell.

    [[ai_models_group]]


    ## 🎓 Lärande och inspiration


    När de används på rätt sätt kan AI-chatbottar vara det mest fantastiska personanpassade läroverktyget. OpenMates erbjuder funktioner för att hjälpa dig att lära dig varje dag.


    ## 🔒 Integritet och kryptering


    Bara din enhet kan dekryptera dina chattar och känsliga appinställningar.

    Du behåller full kontroll över vilken data som skickas till OpenMates.

    Bara den minimala mängden data som behövs skickas till servern och lagras aldrig på disk.


    ## 💰 Priser


    Ingen prenumeration krävs, inga annonser, ingen delning av användardata, inget riskkapital.

    Istället: ett enkelt och rättvist betala-per-användning-system. Du köper användningskrediter och debiteras per förfrågan enligt priserna för varje App-färdighet i App Store. Och självklart: krediter går inte ut.


    ---


    👨‍💻 Är du mjukvaruutvecklare? Kolla då in introduktionen för utvecklare för att lära dig mer om hur OpenMates kan vara kraftfullt för att bygga ny mjukvara.

    [[for_developers_embed]]

