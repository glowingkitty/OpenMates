message:
  context: Main for_everyone message content explaining OpenMates core features
  en: "# ✨ Digital team mates for everyone


    With OpenMates you have a team of specialized AI chatbots that can not only inspire you & teach new knowledge but also fulfill various tasks using apps. Making the useful aspects of AI accessible to everyone, while protecting your privacy & giving you access to all the best AI models.

    ## 💬 Example chats:

    Just click on the example chats to open them.

    [[example_chats_group]]


    ## 🚀 Quick start


    Press the Sign up button in the top right to sign up, buy usage credits and start using OpenMates. Or keep reading to learn more about OpenMates, and check the example chats in the chats menu in the top left to explore what OpenMates can do.


    ## 📱 Apps


    Since only searching the web is not enough for fulfilling everyday tasks, OpenMates supports various other apps.

    [[app_store_group]]

    In the [App Store](#settings/appstore) you have an overview over all the various apps your digital team mates can use to fulfill your requests. And their skills, focus modes and settings & memories.


    ### 🛠️ Skills


    Allow your mates to interact with external services. To search the web, read video transcripts & websites, search for locations and their opening hours, search for videos and much more.

    [[skills_group]]


    ### 🎯 Focus modes


    Change the focus of a chat temporarily to reach a specific goal. Makes a huge difference in getting much better responses & help by your chatbots. Without you having to be an expert in knowing how to design complex requests for chatbots.

    [[focus_modes_group]]


    ### 💾 Settings & memories


    Allows OpenMates to give you more personalized answers based on your interests, trips, books you wanted to read, projects and more. But:

    - ✅ only when it's needed

    - ✅ only for the specific chat where it's needed

    - ✅ only with the data you clearly consent to share

    - ✅ no sensitive data are ever stored on the server on disk

    All settings & memories are encrypted & decrypted on your devices. Just like your chats. This means the server can never decrypt them by itself. Only your devices can, using your login method.

    [[settings_memories_group]]


    ## 🎨 Designed for ease of use


    By default, OpenMates automatically processes your request with the best fitting AI model, mate, app skills, app focus modes and settings & memories (after your consent). While allowing you to overwrite the auto selection at any time in the settings menu or by typing @ in your message.


    ### 🤖 AI models


    OpenMates automatically selects the best AI model for each of your requests — so you don't have to keep up with the ever changing landscape of new AI models. But if you want full control, simply type **@** in your message to choose a specific model yourself.

    [[ai_models_group]]


    ## 🎓 Learning & inspiration


    If used properly, AI chatbots can be the most amazing personalized learning tool ever developed. OpenMates implements various functionalities to help you not only with tasks, but to keep learning every day. With followup suggestions and new chat suggestions based on your chats, and the soon to be added 'Daily Inspiration' feature.


    ## 🔒 Privacy & Encryption


    Only your device can decrypt your chats and your sensitive app settings & memories.

    You stay in full control over which data are sent to OpenMates.

    Only the minimum amount of data needed is sent to the server for processing your request - and never stored on disk.

    Only encrypted data secured by your login method are stored for sync on the server. Ensuring even attackers could not read your past chats.

    The AI providers we use will never see who exactly sent a request. And we work on even more measures to even further strengthen your privacy.


    ## 💰 Pricing


    No subscription required, no ads, no sharing of your user data, no venture capital (to ensure OpenMates remains user interests first).

    Instead: a simple and fair pay-per-use system. You buy usage credits, then - depending on the prices which you can find for each App skill in the App Store - you get charged per request. And of course: credits don't expire.


    ---


    👨‍💻 Are you a software developer? Then check out the introduction for developers to learn more about how OpenMates can be super powerful for building new software.

    [[for_developers_embed]]

    "
  de: "# ✨ Digitale Team-Mates für alle


    Mit OpenMates hast du ein Team von spezialisierten KI-Chatbots, die dich nicht nur inspirieren und neues Wissen vermitteln können, sondern auch verschiedene Aufgaben mit Apps erfüllen. Das macht die nützlichen Aspekte von KI für alle zugänglich, während deine Privatsphäre geschützt wird und du Zugang zu allen besten KI-Modellen erhältst.

    ## Beispiel-Chats:

    Klicke einfach auf die Beispiel-Chats, um sie zu öffnen.

    [[example_chats_group]]


    ## 🚀 Schnellstart


    Klicke oben rechts auf die Registrieren-Schaltfläche, um dich anzumelden, kaufe Nutzungs-Credits und beginne OpenMates zu nutzen. Oder lies weiter, um mehr über OpenMates zu erfahren, und sieh dir die Beispiel-Chats im Chat-Menü oben links an, um zu erkunden, was OpenMates kann.


    ## 📱 Apps


    Da nur die Websuche nicht ausreicht, um alltägliche Aufgaben zu erfüllen, unterstützt OpenMates auch verschiedene andere Apps.

    [[app_store_group]]

    Im [App Store](#settings/appstore) hast du eine Übersicht über alle verschiedenen Apps, die deine digitalen Team-Mates nutzen können, um deine Anfragen zu erfüllen. Und ihre Fähigkeiten, Fokus-Modi und Einstellungen & Erinnerungen.


    ### 🛠️ Fähigkeiten


    Ermöglichen deinen Mates die Interaktion mit externen Diensten. Um im Web zu suchen, Video-Transkripte & Websites zu lesen, nach Standorten und deren Öffnungszeiten zu suchen, nach Videos zu suchen und vieles mehr.

    [[skills_group]]


    ### 🎯 Fokus-Modi


    Ändere den Fokus eines Chats vorübergehend, um ein bestimmtes Ziel zu erreichen. Macht einen großen Unterschied dabei, viel bessere Antworten und Hilfe von deinen Chatbots zu bekommen. Ohne dass du Experte darin sein musst, komplexe Anfragen für Chatbots zu gestalten.

    [[focus_modes_group]]


    ### 💾 Einstellungen & Erinnerungen


    Ermöglicht OpenMates, dir personalisiertere Antworten basierend auf deinen Interessen, Reisen, Büchern, die du lesen wolltest, Projekten und mehr zu geben. Aber:

    - ✅ nur wenn es benötigt wird

    - ✅ nur für den spezifischen Chat, wo es benötigt wird

    - ✅ nur mit Daten, deren Weitergabe du eindeutig zustimmst

    - ✅ keine sensiblen Daten werden jemals auf dem Server auf der Festplatte gespeichert

    Alle Einstellungen & Erinnerungen werden auf deinen Geräten verschlüsselt und entschlüsselt. Genau wie deine Chats. Das bedeutet, der Server kann sie niemals selbst entschlüsseln. Nur deine Geräte können das, mit deiner Anmeldemethode.

    [[settings_memories_group]]


    ## 🎨 Für einfache Bedienung entwickelt


    Standardmäßig verarbeitet OpenMates deine Anfrage automatisch mit dem am besten passenden KI-Modell, Mate, App-Fähigkeiten, App-Fokus-Modi und Einstellungen & Erinnerungen (nach deiner Zustimmung). Während du jederzeit die automatische Auswahl im Einstellungsmenü oder durch Eingabe von @ in deiner Nachricht überschreiben kannst.


    ### 🤖 KI-Modelle


    OpenMates wählt automatisch das beste KI-Modell für jede deiner Anfragen — damit du nicht mit der sich ständig verändernden Landschaft neuer KI-Modelle Schritt halten musst. Aber wenn du volle Kontrolle möchtest, tippe einfach **@** in deine Nachricht, um ein bestimmtes Modell selbst auszuwählen.

    [[ai_models_group]]


    ## 🎓 Lernen & Inspiration


    Bei richtiger Nutzung können KI-Chatbots das erstaunlichste personalisierte Lernwerkzeug sein, das je entwickelt wurde. OpenMates implementiert verschiedene Funktionen, um dir nicht nur bei Aufgaben zu helfen, sondern auch jeden Tag weiter zu lernen. Mit Folgeanregungen und neuen Chat-Vorschlägen basierend auf deinen Chats, und der bald hinzugefügten 'Tägliche Inspiration'-Funktion.


    ## 🔒 Datenschutz & Verschlüsselung


    Nur dein Gerät kann deine Chats und deine sensiblen App-Einstellungen & Erinnerungen entschlüsseln.

    Du behältst die volle Kontrolle darüber, welche Daten an OpenMates gesendet werden.

    Nur die minimal benötigte Datenmenge wird zur Verarbeitung deiner Anfrage an den Server gesendet - und niemals auf der Festplatte gespeichert.

    Nur verschlüsselte Daten, die durch deine Anmeldemethode gesichert sind, werden zur Synchronisierung auf dem Server gespeichert. So können selbst Angreifer deine vergangenen Chats nicht lesen.

    Die KI-Anbieter, die wir verwenden, sehen nie, wer genau eine Anfrage gesendet hat. Und wir arbeiten an noch mehr Maßnahmen, um deine Privatsphäre noch weiter zu stärken.


    ## 💰 Preise


    Kein Abonnement erforderlich, keine Werbung, keine Weitergabe deiner Nutzerdaten, kein Risikokapital (um sicherzustellen, dass OpenMates die Nutzerinteressen an erste Stelle setzt).

    Stattdessen: ein einfaches und faires Pay-per-Use-System. Du kaufst Nutzungs-Credits, dann - je nach den Preisen, die du für jede App-Fähigkeit im App Store findest - zahlst du pro Anfrage. Und natürlich: Credits verfallen nicht.


    ---


    👨‍💻 Bist du Softwareentwickler? Dann schau dir die Einführung für Entwickler an, um mehr darüber zu erfahren, wie OpenMates super nützlich für die Entwicklung neuer Software sein kann.

    [[for_developers_embed]]

    "
  es: "# ✨ Compañeros de equipo digitales para todos


    Con OpenMates tienes un equipo de chatbots de IA especializados que no solo pueden inspirarte y enseñarte nuevos conocimientos, sino también realizar diversas tareas usando apps. Haciendo accesibles los aspectos útiles de la IA para todos, mientras protege tu privacidad y te da acceso a todos los mejores modelos de IA.

    ## Chats de ejemplo:

    Simplemente haz clic en los chats de ejemplo para abrirlos.

    [[example_chats_group]]


    ## 🚀 Inicio rápido


    Pulsa el botón de Registrarse en la parte superior derecha para registrarte, compra créditos de uso y comienza a usar OpenMates. O sigue leyendo para aprender más sobre OpenMates, y revisa los chats de ejemplo en el menú de chats en la parte superior izquierda para explorar lo que OpenMates puede hacer.


    ## 📱 Apps


    Como solo buscar en la web no es suficiente para cumplir tareas cotidianas, OpenMates también soporta otras apps.

    [[app_store_group]]

    En la [Tienda de Apps](#settings/appstore) tienes una visión general de todas las apps que tus compañeros de equipo digitales pueden usar para cumplir tus solicitudes. Y sus habilidades, modos de enfoque y ajustes y memorias.


    ### 🛠️ Habilidades


    Permiten a tus compañeros interactuar con servicios externos. Para buscar en la web, leer transcripciones de videos y sitios web, buscar ubicaciones y sus horarios de apertura, buscar videos y mucho más.

    [[skills_group]]


    ### 🎯 Modos de enfoque


    Cambia el enfoque de un chat temporalmente para alcanzar un objetivo específico. Marca una gran diferencia para obtener respuestas y ayuda mucho mejores de tus chatbots. Sin que tengas que ser un experto en diseñar solicitudes complejas para chatbots.

    [[focus_modes_group]]


    ### 💾 Ajustes y memorias


    Permite que OpenMates te dé respuestas más personalizadas basadas en tus intereses, viajes, libros que querías leer, proyectos y más. Pero:

    - ✅ solo cuando es necesario

    - ✅ solo para el chat específico donde se necesita

    - ✅ solo con los datos que consientes compartir claramente

    - ✅ nunca se almacenan datos sensibles en el servidor en disco

    Todos los ajustes y memorias se cifran y descifran en tus dispositivos. Igual que tus chats. Esto significa que el servidor nunca puede descifrarlos por sí solo. Solo tus dispositivos pueden, usando tu método de inicio de sesión.

    [[settings_memories_group]]


    ## 🎨 Diseñado para facilidad de uso


    Por defecto, OpenMates procesa automáticamente tu solicitud con el modelo de IA más adecuado, compañero, habilidades de apps, modos de enfoque de apps y ajustes y memorias (después de tu consentimiento). Mientras te permite sobrescribir la selección automática en cualquier momento en el menú de ajustes o escribiendo @ en tu mensaje.


    ### 🤖 Modelos de IA


    OpenMates selecciona automáticamente el mejor modelo de IA para cada una de tus solicitudes — para que no tengas que seguir el ritmo del cambiante panorama de nuevos modelos de IA. Pero si quieres control total, simplemente escribe **@** en tu mensaje para elegir un modelo específico tú mismo.

    [[ai_models_group]]


    ## 🎓 Aprendizaje e inspiración


    Si se usa correctamente, los chatbots de IA pueden ser la herramienta de aprendizaje personalizado más increíble jamás desarrollada. OpenMates implementa varias funcionalidades para ayudarte no solo con tareas, sino para seguir aprendiendo cada día. Con sugerencias de seguimiento y sugerencias de nuevos chats basadas en tus chats, y la función 'Inspiración Diaria' que se añadirá pronto.


    ## 🔒 Privacidad y cifrado


    Solo tu dispositivo puede descifrar tus chats y tus ajustes y memorias sensibles de apps.

    Mantienes el control total sobre qué datos se envían a OpenMates.

    Solo la cantidad mínima de datos necesarios se envía al servidor para procesar tu solicitud, y nunca se almacena en disco.

    Solo los datos cifrados asegurados por tu método de inicio de sesión se almacenan para sincronización en el servidor. Asegurando que incluso los atacantes no puedan leer tus chats pasados.

    Los proveedores de IA que usamos nunca verán quién envió exactamente una solicitud. Y trabajamos en aún más medidas para fortalecer aún más tu privacidad.


    ## 💰 Precios


    Sin suscripción requerida, sin anuncios, sin compartir tus datos de usuario, sin capital de riesgo (para asegurar que OpenMates priorice los intereses de los usuarios).

    En su lugar: un sistema simple y justo de pago por uso. Compras créditos de uso, luego - dependiendo de los precios que puedes encontrar para cada habilidad de App en la Tienda de Apps - se te cobra por solicitud. Y por supuesto: los créditos no expiran.


    ---


    👨‍💻 ¿Eres desarrollador de software? Entonces echa un vistazo a la introducción para desarrolladores para aprender más sobre cómo OpenMates puede ser muy potente para construir nuevo software.

    [[for_developers_embed]]

