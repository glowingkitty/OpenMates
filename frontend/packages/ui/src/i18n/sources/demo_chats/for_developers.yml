message:
  context: Main for_developers message content explaining OpenMates features for developers
  en: "# 👨‍💻 Digital team mates for developers


    OpenMates is also an awesome tool for developers. For everything from quick questions, planning large projects, generating code based on the most up-to-date docs and much more. All without any complicated MCP server setups and all while protecting your privacy & giving you access to all the best AI models. A REST API for all app skills included, and a powerful CLI and pip & npm packages are also planned, to allow you to interact with your chats from anywhere.

    ## 💬 Example chats:

    Just click on the example chats to open them.

    [[dev_example_chats_group]]


    ## 🚀 Quick start


    Press the Sign up button in the top right to sign up, buy usage credits and start using OpenMates. Or keep reading to learn more about OpenMates for developers, and check the example chats in the chats menu in the top left to explore what OpenMates can do.


    ## 📱 Apps for developers


    With Apps on OpenMates, there is no need for complicated, time-consuming and insecure MCP setups with clear text API keys in JSON config files.

    Instead, OpenMates will automatically use the right AI model, app skill, focus mode, settings & memories optimized for your request (while allowing you to overwrite the auto selection via @ in your message).

    Some examples of how Apps make OpenMates more useful:

    - 📖 [Code | Get docs](#settings/appstore/code/skills/get-docs): Checks the latest documentation for an API, framework or language before generating code files.

    - 🔍 [Web | Search](#settings/appstore/web/skills/search): Searches the web to improve response accuracy.

    - ✅ Auto linter checks for generated code (coming soon).

    [[dev_app_store_group]]


    ### 🛠️ Developer skills


    Skills specific to developer apps that allow your mates to interact with external developer services.

    [[dev_skills_group]]


    ### 🎯 Developer focus modes


    Focus modes for developer tasks like planning projects, writing tests, improving security, and more.

    [[dev_focus_modes_group]]


    ### 💾 Developer settings & memories


    Settings & memories for developer apps, so you don't need to mention project details, preferred tech stack, or frameworks all the time.

    [[dev_settings_memories_group]]


    ## 🔌 REST API


    The OpenMates REST API allows you to use OpenMates similar to other LLM APIs, and interact with all the App skills from OpenMates. So you can implement OpenMates and its App skills easily into your own software.


    ## 💻 CLI, pip & npm packages - a usability-focused approach


    The soon-to-be-released CLI and pip & npm packages will allow you full access to your OpenMates account from anywhere. While ensuring client-side encryption of your content and you staying in control. Access all your chats and App skills from your terminal.

    Or task OpenMates with building or debugging a software project on your VM / dev server, but with the convenience of managing that task in your web browser instead of from a terminal.


    ## 🔒 Privacy & encryption


    OpenMates never trains any models on any of your data. All your chats, project details and other app settings & memories are encrypted in your browser with a key derived from your login credential, and are stored on our servers only as ciphertext. When you make a request, our servers decrypt the minimum amount of data needed to fulfill it in memory, use it, and discard the plaintext — nothing is ever written to disk, logs, or traces. Before your prompts reach any third-party AI model, real names, emails, and addresses are replaced with placeholders on your device. This is **not** end-to-end encryption (our servers can decrypt your content transiently to serve you), but when you delete your account, destroying your encryption key cryptographically shreds every encrypted field we still hold.


    ## 🛡️ Open source as enshittification protection


    User interests first, is the core philosophy behind OpenMates. To ensure this also in the future, [OpenMates is fully open source under AGPL 3](https://github.com/glowingkitty/openmates). Because being open source is the foundation for preventing enshittification from making the software worse over time.

    In addition, you can check the architecture & security of OpenMates at any time yourself and are welcome to contribute, to make the project even better for everyone.

    If you want to self-host OpenMates and take care of all the setup and maintenance, you can as well. Using your own API keys for the various AI services, and in the future also using offline models, for maximum privacy and control.


    ---


    📚 Did you already read the introduction for everyone? If not, then [click here](#chat-id=demo-for-everyone) to learn all the core basics of OpenMates.

    "
  de: "# 👨‍💻 Digitale Team-Mates für Entwickler


    OpenMates ist auch ein großartiges Tool für Entwickler. Für alles von schnellen Fragen, Planung großer Projekte, Code-Generierung basierend auf der aktuellsten Dokumentation und vieles mehr. Alles ohne komplizierte MCP-Server-Setups und unter Wahrung deiner Privatsphäre & mit Zugang zu allen besten KI-Modellen. Eine REST API für alle App-Skills inklusive, und ein leistungsstarkes CLI sowie pip & npm Pakete sind ebenfalls geplant, damit du von überall mit deinen Chats interagieren kannst.

    ## Beispiel-Chats:

    Klicke einfach auf die Beispiel-Chats, um sie zu öffnen.

    [[dev_example_chats_group]]


    ## 🚀 Schnellstart


    Klicke oben rechts auf die Registrieren-Schaltfläche, um dich anzumelden, kaufe Nutzungs-Credits und beginne OpenMates zu nutzen. Oder lies weiter, um mehr über OpenMates für Entwickler zu erfahren, und sieh dir die Beispiel-Chats im Chat-Menü oben links an, um zu erkunden, was OpenMates kann.


    ## 📱 Apps für Entwickler


    Mit Apps auf OpenMates brauchst du keine komplizierten, zeitaufwändigen und unsicheren MCP-Setups mit Klartext-API-Schlüsseln in JSON-Konfigurationsdateien.

    Stattdessen wird OpenMates automatisch das richtige KI-Modell, die App-Skills, den Fokus-Modus, Einstellungen & Erinnerungen verwenden, die für deine Anfrage optimiert sind (während du die automatische Auswahl jederzeit über @ in deiner Nachricht überschreiben kannst).

    Einige Beispiele, wie Apps OpenMates nützlicher machen:

    - 📖 [Code | Dokumentation abrufen](#settings/appstore/code/skills/get-docs): Prüft die neueste Dokumentation für eine API, ein Framework oder eine Sprache, bevor Code-Dateien generiert werden.

    - 🔍 [Web | Suche](#settings/appstore/web/skills/search): Durchsucht das Web, um die Antwortgenauigkeit zu verbessern.

    - ✅ Automatische Linter-Prüfungen für generierten Code (demnächst).

    [[dev_app_store_group]]


    ### 🛠️ Entwickler-Fähigkeiten


    Fähigkeiten speziell für Entwickler-Apps, die deinen Mates die Interaktion mit externen Entwicklerdiensten ermöglichen.

    [[dev_skills_group]]


    ### 🎯 Entwickler-Fokus-Modi


    Fokus-Modi für Entwickleraufgaben wie Projektplanung, Tests schreiben, Sicherheit verbessern und mehr.

    [[dev_focus_modes_group]]


    ### 💾 Entwickler-Einstellungen & Erinnerungen


    Einstellungen & Erinnerungen für Entwickler-Apps, damit du Projektdetails, bevorzugten Tech-Stack oder Frameworks nicht jedes Mal erwähnen musst.

    [[dev_settings_memories_group]]


    ## 🔌 REST API


    Die OpenMates REST API ermöglicht es dir, OpenMates ähnlich wie andere LLM-APIs zu nutzen und mit allen App-Skills von OpenMates zu interagieren. So kannst du OpenMates und seine App-Skills einfach in deine eigene Software implementieren.


    ## 💻 CLI, pip & npm Pakete - ein benutzerfreundlicher Ansatz


    Das bald erscheinende CLI und die pip & npm Pakete geben dir vollen Zugriff auf dein OpenMates-Konto von überall. Bei gleichzeitiger Zero-Knowledge-Verschlüsselung und voller Kontrolle. Greife auf alle deine Chats und App-Skills über dein Terminal zu.

    Oder beauftrage OpenMates mit dem Erstellen oder Debuggen eines Softwareprojekts auf deiner VM / deinem Dev-Server, aber mit dem Komfort, diese Aufgabe in deinem Webbrowser statt im Terminal zu verwalten.


    ## 🔒 Datenschutz & Verschlüsselung


    OpenMates trainiert niemals Modelle mit deinen Daten. Und alle deine Chats, Projektdetails und andere App-Einstellungen & Erinnerungen werden auf deinem Gerät mit Zero-Knowledge verschlüsselt und entschlüsselt. Wenn du eine Anfrage stellst, wird nur die minimal benötigte Datenmenge auf dem Server verarbeitet und niemals so auf der Festplatte gespeichert, dass der Server oder Hacker die Chats oder deine App-Einstellungen & Erinnerungen entschlüsseln könnten.


    ## 🛡️ Open Source als Schutz vor Enshittification


    Nutzerinteressen zuerst, ist die Kernphilosophie hinter OpenMates. Um dies auch in Zukunft zu gewährleisten, ist [OpenMates vollständig Open Source unter AGPL 3](https://github.com/glowingkitty/openmates). Denn Open Source zu sein ist die Grundlage dafür, Enshittification zu verhindern und die Software nicht mit der Zeit zu verschlechtern.

    Außerdem kannst du die Architektur & Sicherheit von OpenMates jederzeit selbst überprüfen und bist herzlich eingeladen, beizutragen, um das Projekt für alle noch besser zu machen.

    Wenn du OpenMates selbst hosten und dich um Setup und Wartung kümmern möchtest, kannst du das ebenfalls. Mit deinen eigenen API-Schlüsseln für die verschiedenen KI-Dienste, und in Zukunft auch mit Offline-Modellen, für maximale Privatsphäre und Kontrolle.


    ---


    📚 Hast du schon die Einführung für alle gelesen? Falls nicht, dann [klicke hier](#chat-id=demo-for-everyone), um alle Grundlagen von OpenMates zu lernen.

    "
  es: "# 👨‍💻 Compañeros de equipo digitales para desarrolladores


    OpenMates es también una herramienta increíble para desarrolladores. Para todo, desde preguntas rápidas, planificación de grandes proyectos, generación de código basado en la documentación más actualizada y mucho más. Todo sin configuraciones complicadas de servidores MCP y protegiendo tu privacidad y dándote acceso a todos los mejores modelos de IA. Una REST API para todas las habilidades de apps incluida, y un potente CLI y paquetes pip y npm también están planeados, para permitirte interactuar con tus chats desde cualquier lugar.

    ## Chats de ejemplo:

    Simplemente haz clic en los chats de ejemplo para abrirlos.

    [[dev_example_chats_group]]


    ## 🚀 Inicio rápido


    Pulsa el botón de Registrarse en la parte superior derecha para registrarte, compra créditos de uso y comienza a usar OpenMates. O sigue leyendo para aprender más sobre OpenMates para desarrolladores, y revisa los chats de ejemplo en el menú de chats en la parte superior izquierda para explorar lo que OpenMates puede hacer.


    ## 📱 Apps para desarrolladores


    Con Apps en OpenMates, no hay necesidad de configuraciones MCP complicadas, lentas e inseguras con claves API en texto plano en archivos de configuración JSON.

    En su lugar, OpenMates usará automáticamente el modelo de IA adecuado, habilidad de app, modo de enfoque, ajustes y memorias optimizados para tu solicitud (mientras te permite sobrescribir la selección automática vía @ en tu mensaje).

    Algunos ejemplos de cómo las Apps hacen OpenMates más útil:

    - 📖 [Código | Obtener docs](#settings/appstore/code/skills/get-docs): Consulta la documentación más reciente de una API, framework o lenguaje antes de generar archivos de código.

    - 🔍 [Web | Buscar](#settings/appstore/web/skills/search): Busca en la web para mejorar la precisión de las respuestas.

    - ✅ Verificaciones automáticas de linter para código generado (próximamente).

    [[dev_app_store_group]]


    ### 🛠️ Habilidades para desarrolladores


    Habilidades específicas para apps de desarrollo que permiten a tus compañeros interactuar con servicios externos de desarrollo.

    [[dev_skills_group]]


    ### 🎯 Modos de enfoque para desarrolladores


    Modos de enfoque para tareas de desarrollo como planificar proyectos, escribir tests, mejorar la seguridad y más.

    [[dev_focus_modes_group]]


    ### 💾 Ajustes y memorias para desarrolladores


    Ajustes y memorias para apps de desarrollo, para que no tengas que mencionar detalles del proyecto, stack tecnológico preferido o frameworks todo el tiempo.

    [[dev_settings_memories_group]]


    ## 🔌 REST API


    La REST API de OpenMates te permite usar OpenMates de forma similar a otras APIs de LLM, e interactuar con todas las habilidades de Apps de OpenMates. Así puedes implementar OpenMates y sus habilidades de Apps fácilmente en tu propio software.


    ## 💻 CLI, paquetes pip y npm - un enfoque centrado en la usabilidad


    El CLI y los paquetes pip y npm, que se lanzarán pronto, te permitirán acceso completo a tu cuenta de OpenMates desde cualquier lugar. Asegurando cifrado de conocimiento cero y que mantengas el control. Accede a todos tus chats y habilidades de Apps desde tu terminal.

    O encarga a OpenMates construir o depurar un proyecto de software en tu VM / servidor de desarrollo, pero con la comodidad de gestionar esa tarea en tu navegador web en lugar de desde una terminal.


    ## 🔒 Privacidad y cifrado


    OpenMates nunca entrena ningún modelo con tus datos. Y todos tus chats, detalles de proyectos y otros ajustes y memorias de apps se cifran y descifran con conocimiento cero en tu dispositivo. Cuando haces una solicitud, solo la cantidad mínima de datos necesaria se procesa en el servidor y nunca se almacena en disco de manera que el servidor o hackers puedan descifrar los chats o tus ajustes y memorias de Apps.


    ## 🛡️ Código abierto como protección contra la enshittification


    Los intereses de los usuarios primero, es la filosofía central detrás de OpenMates. Para asegurar esto también en el futuro, [OpenMates es completamente de código abierto bajo AGPL 3](https://github.com/glowingkitty/openmates). Porque ser de código abierto es la base para prevenir que la enshittification empeore el software con el tiempo.

    Además, puedes verificar la arquitectura y seguridad de OpenMates en cualquier momento y eres bienvenido a contribuir, para hacer el proyecto aún mejor para todos.

    Si quieres alojar OpenMates tú mismo y encargarte de toda la configuración y mantenimiento, también puedes. Usando tus propias claves API para los diversos servicios de IA, y en el futuro también usando modelos offline, para máxima privacidad y control.


    ---


    📚 ¿Ya leíste la introducción para todos? Si no, entonces [haz clic aquí](#chat-id=demo-for-everyone) para aprender todos los conceptos básicos de OpenMates.

    "
  fr: "# 👨‍💻 Des coéquipiers numériques pour les développeurs


    OpenMates est aussi un outil formidable pour les développeurs. Pour tout, des questions rapides à la planification de grands projets, la génération de code basée sur la documentation la plus récente et bien plus encore. Le tout sans configurations compliquées de serveurs MCP et en protégeant votre vie privée et en vous donnant accès à tous les meilleurs modèles d'IA. Une REST API pour toutes les compétences d'apps incluse, et un puissant CLI ainsi que des packages pip et npm sont également prévus, pour vous permettre d'interagir avec vos chats de n'importe où.

    ## Chats d'exemple :

    Cliquez simplement sur les chats d'exemple pour les ouvrir.

    [[dev_example_chats_group]]


    ## 🚀 Démarrage rapide


    Appuyez sur le bouton S'inscrire en haut à droite pour vous inscrire, achetez des crédits d'utilisation et commencez à utiliser OpenMates. Ou continuez à lire pour en savoir plus sur OpenMates pour les développeurs, et consultez les chats d'exemple dans le menu des chats en haut à gauche pour explorer ce que OpenMates peut faire.


    ## 📱 Apps pour les développeurs


    Avec les Apps sur OpenMates, pas besoin de configurations MCP compliquées, chronophages et non sécurisées avec des clés API en clair dans des fichiers de configuration JSON.

    À la place, OpenMates utilisera automatiquement le bon modèle d'IA, la compétence d'app, le mode de focus, les paramètres et mémoires optimisés pour votre demande (tout en vous permettant de remplacer la sélection automatique via @ dans votre message).

    Quelques exemples de comment les Apps rendent OpenMates plus utile :

    - 📖 [Code | Obtenir la doc](#settings/appstore/code/skills/get-docs) : Vérifie la dernière documentation d'une API, framework ou langage avant de générer des fichiers de code.

    - 🔍 [Web | Recherche](#settings/appstore/web/skills/search) : Recherche sur le web pour améliorer la précision des réponses.

    - ✅ Vérifications automatiques du linter pour le code généré (bientôt disponible).

    [[dev_app_store_group]]


    ### 🛠️ Compétences développeur


    Compétences spécifiques aux apps développeur qui permettent à vos coéquipiers d'interagir avec des services externes de développement.

    [[dev_skills_group]]


    ### 🎯 Modes de focus développeur


    Modes de focus pour les tâches de développement comme planifier des projets, écrire des tests, améliorer la sécurité et plus encore.

    [[dev_focus_modes_group]]


    ### 💾 Paramètres et mémoires développeur


    Paramètres et mémoires pour les apps développeur, pour ne pas avoir à mentionner les détails du projet, stack technique préféré ou frameworks à chaque fois.

    [[dev_settings_memories_group]]


    ## 🔌 REST API


    La REST API d'OpenMates vous permet d'utiliser OpenMates de manière similaire aux autres API LLM, et d'interagir avec toutes les compétences d'Apps d'OpenMates. Vous pouvez ainsi implémenter facilement OpenMates et ses compétences d'Apps dans votre propre logiciel.


    ## 💻 CLI, packages pip et npm - une approche axée sur l'utilisabilité


    Le CLI et les packages pip et npm, bientôt disponibles, vous donneront un accès complet à votre compte OpenMates de n'importe où. Tout en garantissant un chiffrement à connaissance nulle et en vous laissant le contrôle. Accédez à tous vos chats et compétences d'Apps depuis votre terminal.

    Ou confiez à OpenMates la construction ou le débogage d'un projet logiciel sur votre VM / serveur de développement, avec le confort de gérer cette tâche dans votre navigateur web plutôt que depuis un terminal.


    ## 🔒 Confidentialité et chiffrement


    OpenMates n'entraîne jamais de modèles sur vos données. Et tous vos chats, détails de projets et autres paramètres et mémoires d'apps sont chiffrés et déchiffrés à connaissance nulle sur votre appareil. Lorsque vous faites une demande, seule la quantité minimale de données nécessaire est traitée sur le serveur et jamais stockée sur disque d'une manière permettant au serveur ou à des pirates de déchiffrer les chats ou vos paramètres et mémoires d'Apps.


    ## 🛡️ Open source comme protection contre l'enshittification


    Les intérêts des utilisateurs d'abord, est la philosophie centrale derrière OpenMates. Pour garantir cela aussi à l'avenir, [OpenMates est entièrement open source sous AGPL 3](https://github.com/glowingkitty/openmates). Car être open source est la base pour empêcher l'enshittification de détériorer le logiciel au fil du temps.

    De plus, vous pouvez vérifier l'architecture et la sécurité d'OpenMates à tout moment et êtes invité à contribuer, pour rendre le projet encore meilleur pour tous.

    Si vous souhaitez auto-héberger OpenMates et vous occuper de toute la configuration et la maintenance, vous le pouvez également. En utilisant vos propres clés API pour les différents services d'IA, et à l'avenir aussi des modèles hors ligne, pour une confidentialité et un contrôle maximum.


    ---


    📚 Avez-vous déjà lu l'introduction pour tous ? Si non, alors [cliquez ici](#chat-id=demo-for-everyone) pour apprendre toutes les bases d'OpenMates.

    "
  it: "# 👨‍💻 Compagni di squadra digitali per sviluppatori


    OpenMates è anche uno strumento fantastico per gli sviluppatori. Per tutto, dalle domande rapide alla pianificazione di grandi progetti, generazione di codice basata sulla documentazione più aggiornata e molto altro. Il tutto senza complicate configurazioni di server MCP e proteggendo la tua privacy e dandoti accesso a tutti i migliori modelli di IA. Una REST API per tutte le competenze delle app inclusa, e un potente CLI e pacchetti pip e npm sono anche previsti, per permetterti di interagire con le tue chat da qualsiasi luogo.

    ## Chat di esempio:

    Clicca semplicemente sulle chat di esempio per aprirle.

    [[dev_example_chats_group]]


    ## 🚀 Avvio rapido


    Premi il pulsante Registrati in alto a destra per registrarti, acquista crediti di utilizzo e inizia a usare OpenMates. Oppure continua a leggere per saperne di più su OpenMates per gli sviluppatori, e consulta le chat di esempio nel menu delle chat in alto a sinistra per esplorare cosa può fare OpenMates.


    ## 📱 App per sviluppatori


    Con le App su OpenMates, non c'è bisogno di configurazioni MCP complicate, dispendiose in termini di tempo e insicure con chiavi API in chiaro in file di configurazione JSON.

    Invece, OpenMates utilizzerà automaticamente il modello di IA giusto, la competenza dell'app, la modalità di focus, le impostazioni e memorie ottimizzate per la tua richiesta (permettendoti di sovrascrivere la selezione automatica tramite @ nel tuo messaggio).

    Alcuni esempi di come le App rendono OpenMates più utile:

    - 📖 [Codice | Ottieni doc](#settings/appstore/code/skills/get-docs): Controlla l'ultima documentazione per un'API, framework o linguaggio prima di generare file di codice.

    - 🔍 [Web | Cerca](#settings/appstore/web/skills/search): Cerca sul web per migliorare la precisione delle risposte.

    - ✅ Controlli automatici del linter per il codice generato (in arrivo).

    [[dev_app_store_group]]


    ### 🛠️ Competenze sviluppatore


    Competenze specifiche per le app sviluppatore che permettono ai tuoi compagni di interagire con servizi esterni di sviluppo.

    [[dev_skills_group]]


    ### 🎯 Modalità di focus sviluppatore


    Modalità di focus per attività di sviluppo come pianificare progetti, scrivere test, migliorare la sicurezza e altro.

    [[dev_focus_modes_group]]


    ### 💾 Impostazioni e memorie sviluppatore


    Impostazioni e memorie per le app sviluppatore, così non devi menzionare dettagli del progetto, stack tecnologico preferito o framework ogni volta.

    [[dev_settings_memories_group]]


    ## 🔌 REST API


    La REST API di OpenMates ti permette di usare OpenMates in modo simile ad altre API LLM, e di interagire con tutte le competenze delle App di OpenMates. Così puoi implementare facilmente OpenMates e le sue competenze delle App nel tuo software.


    ## 💻 CLI, pacchetti pip e npm - un approccio incentrato sull'usabilità


    Il CLI e i pacchetti pip e npm, di prossimo rilascio, ti daranno pieno accesso al tuo account OpenMates da qualsiasi luogo. Garantendo crittografia a conoscenza zero e mantenendo il controllo. Accedi a tutte le tue chat e competenze delle App dal tuo terminale.

    Oppure incarica OpenMates di costruire o fare il debug di un progetto software sulla tua VM / server di sviluppo, con la comodità di gestire quel compito nel tuo browser web invece che da un terminale.


    ## 🔒 Privacy e crittografia


    OpenMates non addestra mai alcun modello con i tuoi dati. E tutte le tue chat, i dettagli dei progetti e altre impostazioni e memorie delle app vengono cifrate e decifrate a conoscenza zero sul tuo dispositivo. Quando fai una richiesta, solo la quantità minima di dati necessaria viene elaborata sul server e mai memorizzata su disco in modo che il server o gli hacker possano decifrare le chat o le tue impostazioni e memorie delle App.


    ## 🛡️ Open source come protezione contro l'enshittification


    Gli interessi degli utenti prima di tutto, è la filosofia centrale dietro OpenMates. Per garantire questo anche in futuro, [OpenMates è completamente open source sotto AGPL 3](https://github.com/glowingkitty/openmates). Perché essere open source è la base per prevenire che l'enshittification peggiori il software nel tempo.

    Inoltre, puoi verificare l'architettura e la sicurezza di OpenMates in qualsiasi momento e sei il benvenuto a contribuire, per rendere il progetto ancora migliore per tutti.

    Se vuoi auto-ospitare OpenMates e occuparti di tutta la configurazione e manutenzione, puoi farlo. Usando le tue chiavi API per i vari servizi di IA, e in futuro anche usando modelli offline, per la massima privacy e controllo.


    ---


    📚 Hai già letto l'introduzione per tutti? Se no, allora [clicca qui](#chat-id=demo-for-everyone) per imparare tutte le basi di OpenMates.

    "
