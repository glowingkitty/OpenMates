polar_mor_note:
  context: Footer note in payment confirmation PDF explaining that Polar issued the official tax invoice (legally required)
  en: "Your official tax invoice was issued by Polar (polar.sh) as Merchant of Record."
  de: "Deine offizielle Steuerrechnung wurde von Polar (polar.sh) als Merchant of Record ausgestellt."
  zh: "您的官方税务发票由 Polar（polar.sh）作为销售方（Merchant of Record）开具。"
  es: "Tu factura fiscal oficial fue emitida por Polar (polar.sh) como Merchant of Record."
  fr: "Votre facture fiscale officielle a été émise par Polar (polar.sh) en tant que Merchant of Record."
  pt: "Sua fatura fiscal oficial foi emitida pela Polar (polar.sh) como Merchant of Record."
  ru: "Ваш официальный налоговый счёт был выставлен компанией Polar (polar.sh) в качестве Merchant of Record."
  ja: "公式の税務請求書は、Merchant of Recordとして Polar（polar.sh）により発行されました。"
  ko: "귀하의 공식 세금 계산서는 Polar(polar.sh)가 Merchant of Record로서 발행했습니다."
  it: "La tua fattura fiscale ufficiale è stata emessa da Polar (polar.sh) in qualità di Merchant of Record."
  tr: "Resmi vergi faturanız, Merchant of Record olarak Polar (polar.sh) tarafından düzenlenmiştir."
  vi: "Hóa đơn thuế chính thức của bạn được Polar (polar.sh) phát hành với tư cách là Merchant of Record."
  id: "Faktur pajak resmi Anda diterbitkan oleh Polar (polar.sh) sebagai Merchant of Record."
  pl: "Twoja oficjalna faktura podatkowa została wystawiona przez Polar (polar.sh) jako Merchant of Record."
  nl: "Uw officiële belastingfactuur werd uitgegeven door Polar (polar.sh) als Merchant of Record."
  ar: "تم إصدار فاتورتك الضريبية الرسمية من قِبل Polar (polar.sh) بصفتها Merchant of Record."
  hi: "आपका आधिकारिक कर चालान Polar (polar.sh) द्वारा Merchant of Record के रूप में जारी किया गया था।"
  th: "ใบกำกับภาษีอย่างเป็นทางการของคุณออกโดย Polar (polar.sh) ในฐานะ Merchant of Record"
  cs: "Vaše oficiální daňová faktura byla vystavena společností Polar (polar.sh) jako Merchant of Record."
  sv: "Din officiella skattefaktura utfärdades av Polar (polar.sh) som Merchant of Record."
  he: החשבונית המס הרשמית שלך הוצאה על ידי Polar (polar.sh) בתור Merchant of Record.
  verified_by_human: []
