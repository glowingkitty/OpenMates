this_invoice_is_a_translation:
  context: translation disclaimer
  en: "This invoice is a translation of the original invoice in english.\nThe english version remains the legally binding document for tax purposes.\n"
  de: "Diese Rechnung ist eine Übersetzung der Originalrechnung auf Englisch.\nDie englische Version bleibt für steuerliche Zwecke das rechtsverbindliche Dokument.\n"
  zh: "此发票是英文原始发票的翻译。\n英文版本仍然是税务用途的具有法律约束力的文件。\n"
  es: "Esta factura es una traducción de la factura original en inglés.\nLa versión en inglés sigue siendo el documento legalmente vinculante para fines fiscales.\n"
  fr: "Cette facture est une traduction de la facture originale en anglais.\nLa version anglaise reste le document juridiquement contraignant à des fins fiscales.\n"
