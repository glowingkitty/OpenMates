credits_explainer:
  context: Credits explainer
  en:
    "Credits on OpenMates are used to chat with your digital team mates and to use apps on OpenMates.

    Credits cannot be payed out and a refund is only possible within the first 14 days of purchase, and only for the remaining credits in your user account.

    "
  de:
    "Credits auf OpenMates werden verwendet, um mit deinen digitalen Kollegen zu chatten und Apps auf OpenMates zu nutzen.

    Credits können nicht ausgezahlt werden und eine Erstattung ist nur innerhalb der ersten 14 Tage nach dem Kauf möglich, und nur für die verbleibenden Credits in deinem Benutzerkonto.

    "
  zh:
    "OpenMates 上的点数用于与您的数字团队伙伴聊天并使用 OpenMates 上的应用程序。

    点数不能提现，仅在购买后的前 14 天内可以退款，且仅限于用户账户中剩余的点数。

    "
  es:
    "Los créditos en OpenMates se utilizan para chatear con tus compañeros de equipo digitales y para usar aplicaciones en OpenMates.

    Los créditos no pueden ser reembolsados y una devolución solo es posible dentro de los primeros 14 días de la compra, y solo para los créditos restantes en tu cuenta de usuario.

    "
  fr:
    "Les crédits sur OpenMates sont utilisés pour discuter avec vos collègues numériques et utiliser des applications sur OpenMates.

    Les crédits ne peuvent pas être versés et un remboursement n'est possible que dans les 14 premiers jours suivant l'achat, et uniquement pour les crédits restants sur votre compte utilisateur.

    "
  pt: "Créditos no OpenMates são usados para conversar com seus companheiros de equipe digitais e usar aplicativos no OpenMates.

    Créditos não podem ser reembolsados em dinheiro e um reembolso é possível apenas nos primeiros 14 dias após a compra, e apenas para os créditos restantes em sua conta de usuário.

    "
  ru: "Кредиты на OpenMates используются для общения с вашими цифровыми коллегами и использования приложений на OpenMates.

    Кредиты не могут быть выплачены наличными, и возврат возможен только в течение первых 14 дней после покупки, и только для оставшихся кредитов в вашем аккаунте.

    "
  ja:
    "OpenMatesのクレジットは、デジタルチームメイトとチャットしたり、OpenMatesのアプリを使用するために使用されます。

    クレジットは現金化できず、返金は購入後14日以内かつユーザーアカウントに残っているクレジットに対してのみ可能です。

    "
  ko: "OpenMates의 크레딧은 디지털 팀원들과 채팅하고 OpenMates의 앱을 사용하는 데 사용됩니다.

    크레딧은 현금으로 출금할 수 없으며, 환불은 구매 후 첫 14일 이내에만 가능하고, 사용자 계정의 남은 크레딧에 대해서만 가능합니다.

    "
  it: "I crediti su OpenMates vengono utilizzati per chattare con i tuoi colleghi digitali e usare le app su OpenMates.

    I crediti non possono essere convertiti in denaro e un rimborso è possibile solo entro i primi 14 giorni dall'acquisto, e solo per i crediti rimanenti nel tuo account utente.

    "
  tr: "OpenMates'teki krediler, dijital ekip arkadaşlarınızla sohbet etmek ve OpenMates'teki uygulamaları kullanmak için kullanılır.

    Krediler nakit olarak ödenemez ve geri ödeme yalnızca satın alma tarihinden itibaren ilk 14 gün içinde ve yalnızca kullanıcı hesabınızdaki kalan krediler için mümkündür.

    "
  vi: "Tín dụng trên OpenMates được sử dụng để trò chuyện với các đồng đội kỹ thuật số và sử dụng các ứng dụng trên OpenMates.

    Tín dụng không thể được rút ra thành tiền mặt và việc hoàn tiền chỉ có thể thực hiện trong 14 ngày đầu tiên sau khi mua, và chỉ cho các tín dụng còn lại trong tài khoản người dùng của bạn.

    "
  id: "Kredit di OpenMates digunakan untuk mengobrol dengan rekan tim digital Anda dan menggunakan aplikasi di OpenMates.

    Kredit tidak dapat dicairkan dan pengembalian dana hanya mungkin dalam 14 hari pertama setelah pembelian, dan hanya untuk kredit yang tersisa di akun pengguna Anda.

    "
  pl: "Kredyty w OpenMates służą do chatowania z cyfrowymi współpracownikami i korzystania z aplikacji w OpenMates.

    Kredytów nie można wypłacić w gotówce, a zwrot jest możliwy tylko w ciągu pierwszych 14 dni od zakupu i tylko dla pozostałych kredytów na koncie użytkownika.

    "
  nl: "Credits op OpenMates worden gebruikt om te chatten met uw digitale teamgenoten en apps op OpenMates te gebruiken.

    Credits kunnen niet worden uitbetaald en een terugbetaling is alleen mogelijk binnen de eerste 14 dagen na aankoop, en alleen voor de resterende credits in uw gebruikersaccount.

    "
  ar: "تُستخدم الأرصدة في OpenMates للدردشة مع أعضاء فريقك الرقميين واستخدام التطبيقات في OpenMates.

    لا يمكن صرف الأرصدة نقداً، ولا يمكن الاسترداد إلا خلال أول 14 يوماً من الشراء، وفقط للأرصدة المتبقية في حساب المستخدم.

    "
  hi: "OpenMates पर क्रेडिट का उपयोग आपके डिजिटल टीम मेट्स के साथ चैट करने और OpenMates पर ऐप्स का उपयोग करने के लिए किया जाता है।

    क्रेडिट का भुगतान नहीं किया जा सकता है और वापसी केवल खरीद के पहले 14 दिनों के भीतर संभव है, और केवल आपके उपयोगकर्ता खाते में शेष क्रेडिट के लिए।

    "
  th: "เครดิตบน OpenMates ใช้เพื่อแชทกับเพื่อนร่วมทีมดิจิทัลของคุณ และใช้แอปบน OpenMates

    เครดิตไม่สามารถถอนเป็นเงินสดได้ และการคืนเงินเป็นไปได้เฉพาะในช่วง 14 วันแรกหลังการซื้อ และสำหรับเครดิตที่เหลืออยู่ในบัญชีผู้ใช้ของคุณเท่านั้น

    "
  cs: "Kredity na OpenMates se používají k chatování s vašimi digitálními spolupracovníky a k používání aplikací na OpenMates.

    Kredity nelze vyplatit v hotovosti a vrácení je možné pouze do 14 dnů od nákupu a pouze pro zbývající kredity v uživatelském účtu.

    "
  sv: "Credits på OpenMates används för att chatta med dina digitala teamkollegor och för att använda appar på OpenMates.

    Credits kan inte betalas ut och en återbetalning är bara möjlig inom de första 14 dagarna efter köpet, och endast för de återstående credits i ditt användarkonto.

    "
  he: |
    קרדיטים ב-OpenMates משמשים לצ'אט עם חברי הצוות הדיגיטליים שלך ולשימוש באפליקציות ב-OpenMates.
    קרדיטים לא ניתן לפדות ולהחזר כספי ניתן רק תוך 14 הימים הראשונים מהרכישה, ורק עבור הקרדיטים הנותרים בחשבון המשתמש שלך.
  verified_by_human: []
vat_disclaimer:
  context: VAT disclaimer
  en: According to §19 UStG, no VAT is shown as the seller is a small business under German law.
  de: Gemäß §19 UStG wird keine Umsatzsteuer ausgewiesen, da der Verkäufer Kleinunternehmer nach deutschem Recht ist.
  zh: 根据德国法律 §19 UStG，卖方为小型企业，不显示增值税。
  es: Según §19 UStG, no se muestra IVA ya que el vendedor es una pequeña empresa según la ley alemana.
  fr: Conformément au §19 UStG, aucune TVA n'est indiquée car le vendeur est une petite entreprise selon la loi allemande.
  pt: De acordo com o §19 UStG, nenhum IVA é mostrado pois o vendedor é uma pequena empresa segundo a lei alemã.
  ru: В соответствии с §19 UStG НДС не указывается, так как продавец является малым предприятием по немецкому законодательству.
  ja: ドイツ法に基づく小規模事業者であるため、§19 UStGにより消費税は表示されません。
  ko: §19 UStG에 따라 판매자는 독일 법상 소규모 사업자이므로 부가세가 표시되지 않습니다.
  it: In base al §19 UStG, l'IVA non è indicata in quanto il venditore è una piccola impresa ai sensi della legge tedesca.
  tr: §19 UStG uyarınca, satıcının Alman hukukuna göre küçük işletme olması nedeniyle KDV gösterilmemektedir.
  vi: Theo §19 UStG, không hiển thị thuế GTGT vì người bán là doanh nghiệp nhỏ theo luật Đức.
  id: Menurut §19 UStG, tidak ada PPN yang ditampilkan karena penjual adalah usaha kecil menurut hukum Jerman.
  pl: Zgodnie z §19 UStG, nie nalicza się podatku VAT, ponieważ sprzedawca jest małym przedsiębiorcą według prawa niemieckiego.
  nl: Overeenkomstig §19 UStG wordt geen btw vermeld omdat de verkoper een kleine ondernemer is onder het Duitse recht.
  ar: وفقاً للمادة §19 UStG، لا يُظهَر ضريبة القيمة المضافة لأن البائع شركة صغيرة بموجب القانون الألماني.
  hi: §19 UStG के अनुसार, कोई वैट नहीं दिखाया जाता क्योंकि विक्रेता जर्मन कानून के तहत एक लघु व्यवसाय है।
  th: ตาม §19 UStG ไม่มีการแสดง VAT เนื่องจากผู้ขายเป็นธุรกิจขนาดเล็กภายใต้กฎหมายเยอรมัน
  cs: Podle §19 UStG se DPH nezobrazuje, protože prodejce je malým podnikem dle německého práva.
  sv: Enligt §19 UStG visas ingen moms eftersom säljaren är ett litet företag enligt tysk lag.
  he: לפי §19 UStG, לא מוצג מע"מ מכיוון שהמוכר הוא עסק קטן לפי החוק הגרמני.
  verified_by_human: []
withdrawal_waiver_notice:
  context: Legal notice about withdrawal waiver in invoice PDF (required for EU/German consumer law compliance)
  en: "You have expressly requested that we begin providing the digital service before the withdrawal period ends. You acknowledge that your right of withdrawal expires once you start using the service. Purchased gift cards are excluded and cannot be refunded once they have been used."
  de: "Sie haben ausdrücklich verlangt, dass wir mit der Bereitstellung des digitalen Dienstes beginnen, bevor die Widerrufsfrist endet. Sie erkennen an, dass Ihr Widerrufsrecht erlischt, sobald Sie mit der Nutzung des Dienstes beginnen. Gekaufte Geschenkkarten sind ausgeschlossen und können nach Verwendung nicht erstattet werden."
  zh: "您已明确要求我们在撤回期结束之前开始提供数字服务。您承认一旦开始使用该服务，您的撤回权即告失效。购买的礼品卡被排除在外，使用后无法退款。"
  es: "Ha solicitado expresamente que comencemos a prestar el servicio digital antes de que finalice el período de desistimiento. Reconoce que su derecho de desistimiento expira una vez que comience a utilizar el servicio. Las tarjetas de regalo compradas están excluidas y no pueden reembolsarse una vez utilizadas."
  fr: "Vous avez expressément demandé que nous commencions à fournir le service numérique avant la fin de la période de rétractation. Vous reconnaissez que votre droit de rétractation expire une fois que vous commencez à utiliser le service. Les cartes cadeaux achetées sont exclues et ne peuvent pas être remboursées une fois utilisées."
  pt: "Você solicitou expressamente que começássemos a fornecer o serviço digital antes do término do período de desistência. Você reconhece que o seu direito de desistência expira assim que começar a utilizar o serviço. Os cartões-presente comprados estão excluídos e não podem ser reembolsados depois de usados."
  ru: "Вы явно запросили начало предоставления цифровой услуги до окончания периода отказа. Вы подтверждаете, что ваше право на отказ истекает после начала использования услуги. Приобретённые подарочные карты не возвращаются и не подлежат возврату после использования."
  ja: "お客様は、撤回期間が終了する前にデジタルサービスの提供を開始するよう明示的に要求されました。サービスの使用を開始すると撤回権が失効することを承認されます。購入したギフトカードは除外され、使用後は返金できません。"
  ko: "귀하는 철회 기간이 끝나기 전에 디지털 서비스 제공을 시작해 달라고 명시적으로 요청했습니다. 귀하는 서비스 사용을 시작하면 철회 권리가 만료됨을 인정합니다. 구매한 상품권은 제외되며 사용 후 환불할 수 없습니다."
  it: "Ha espressamente richiesto che iniziassimo a fornire il servizio digitale prima della fine del periodo di recesso. Riconosce che il suo diritto di recesso scade una volta iniziato l'utilizzo del servizio. Le carte regalo acquistate sono escluse e non possono essere rimborsate una volta utilizzate."
  tr: "Dijital hizmetin sağlanmasına geri çekilme süresi dolmadan başlamamızı açıkça talep ettiniz. Hizmeti kullanmaya başladığınızda geri çekilme hakkınızın sona ereceğini kabul edersiniz. Satın alınan hediye kartları hariç tutulmakta olup kullanıldıktan sonra iade edilemez."
  vi: "Bạn đã yêu cầu rõ ràng rằng chúng tôi bắt đầu cung cấp dịch vụ kỹ thuật số trước khi kết thúc thời gian rút tiền. Bạn xác nhận rằng quyền rút tiền của bạn hết hạn ngay khi bạn bắt đầu sử dụng dịch vụ. Thẻ quà tặng đã mua bị loại trừ và không thể hoàn tiền sau khi sử dụng."
  id: "Anda telah secara tegas meminta kami mulai menyediakan layanan digital sebelum berakhirnya masa penarikan. Anda mengakui bahwa hak penarikan Anda berakhir setelah Anda mulai menggunakan layanan. Kartu hadiah yang dibeli dikecualikan dan tidak dapat dikembalikan setelah digunakan."
  pl: "Wyraźnie zażądałeś, abyśmy zaczęli świadczyć usługę cyfrową przed upływem okresu odstąpienia. Potwierdzasz, że Twoje prawo do odstąpienia wygasa z chwilą rozpoczęcia korzystania z usługi. Kupione karty podarunkowe są wyłączone i nie podlegają zwrotowi po ich użyciu."
  nl: "U heeft uitdrukkelijk verzocht dat wij beginnen met het leveren van de digitale dienst voordat de herroepingstermijn afloopt. U erkent dat uw herroepingsrecht vervalt zodra u de dienst begint te gebruiken. Gekochte cadeaukaarten zijn uitgesloten en kunnen niet worden terugbetaald zodra ze zijn gebruikt."
  ar: "لقد طلبت صراحةً أن نبدأ في تقديم الخدمة الرقمية قبل انتهاء فترة الانسحاب. تُقرّ بأن حق الانسحاب الخاص بك ينتهي بمجرد أن تبدأ في استخدام الخدمة. بطاقات الهدايا المشتراة مستثناة ولا يمكن استرداد قيمتها بعد استخدامها."
  hi: "आपने स्पष्ट रूप से अनुरोध किया था कि हम निकासी अवधि समाप्त होने से पहले डिजिटल सेवा प्रदान करना शुरू करें। आप स्वीकार करते हैं कि एक बार सेवा का उपयोग शुरू करने पर आपका निकासी अधिकार समाप्त हो जाता है। खरीदे गए गिफ्ट कार्ड बाहर हैं और एक बार उपयोग किए जाने के बाद वापस नहीं किए जा सकते।"
  th: "คุณร้องขออย่างชัดแจ้งให้เราเริ่มให้บริการดิจิทัลก่อนที่ระยะเวลาการถอนตัวจะสิ้นสุดลง คุณยอมรับว่าสิทธิ์การถอนตัวของคุณจะหมดอายุเมื่อคุณเริ่มใช้บริการ บัตรของขวัญที่ซื้อไม่รวมอยู่และไม่สามารถคืนเงินได้หลังจากใช้งานแล้ว"
  cs: "Výslovně jste požádali, abychom zahájili poskytování digitální služby před uplynutím lhůty pro odstoupení. Berete na vědomí, že vaše právo na odstoupení zaniká, jakmile začnete používat službu. Zakoupené dárkové karty jsou vyloučeny a nelze je vrátit po jejich použití."
  sv: "Du har uttryckligen begärt att vi ska börja tillhandahålla den digitala tjänsten innan ångerperioden löper ut. Du bekräftar att din ångerrätt upphör när du börjar använda tjänsten. Köpta presentkort är undantagna och kan inte återbetalas efter att de har använts."
  he: ביקשת במפורש שנתחיל לספק את השירות הדיגיטלי לפני תום תקופת הביטול. אתה מאשר שזכות הביטול שלך פוקעת ברגע שתתחיל להשתמש בשירות. כרטיסי מתנה שנרכשו אינם נכללים ולא ניתן להחזירם לאחר שנוצלו.
  verified_by_human: []
