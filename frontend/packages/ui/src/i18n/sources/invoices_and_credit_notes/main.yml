  ru: "Этот счёт является переводом оригинального счёта на английском языке.\nАнглийская версия остаётся юридически обязывающим документом для налоговых целей.\n"
  ja: "この請求書は英語の原本を翻訳したものです。\n税務目的においては英語版が法的拘束力のある文書となります。\n"
  ko: "이 청구서는 원본 영어 청구서의 번역본입니다.\n영문 버전은 세금 목적의 법적 구속력 있는 문서로 남아 있습니다.\n"
  it: "Questa fattura è una traduzione della fattura originale in inglese.\nLa versione in inglese rimane il documento legalmente vincolante per scopi fiscali.\n"
  tr: "Bu fatura, orijinal İngilizce faturanın bir çevirisidir.\nİngilizce sürüm, vergi amaçları için yasal olarak bağlayıcı belge olarak kalmaktadır.\n"
  vi: "Hóa đơn này là bản dịch của hóa đơn gốc bằng tiếng Anh.\nPhiên bản tiếng Anh vẫn là tài liệu ràng buộc pháp lý cho mục đích thuế.\n"
  id: "Faktur ini adalah terjemahan dari faktur asli dalam bahasa Inggris.\nVersi bahasa Inggris tetap menjadi dokumen yang mengikat secara hukum untuk tujuan pajak.\n"
  pl: "Ta faktura jest tłumaczeniem oryginalnej faktury w języku angielskim.\nWersja angielska pozostaje dokumentem prawnie wiążącym dla celów podatkowych.\n"
  nl: "Deze factuur is een vertaling van de originele factuur in het Engels.\nDe Engelse versie blijft het juridisch bindende document voor belastingdoeleinden.\n"
  ar: "هذه الفاتورة ترجمة للفاتورة الأصلية باللغة الإنجليزية.\nالنسخة الإنجليزية تظل الوثيقة الملزمة قانونياً لأغراض ضريبية.\n"
  hi: "यह चालान अंग्रेजी में मूल चालान का अनुवाद है।\nअंग्रेजी संस्करण कर उद्देश्यों के लिए कानूनी रूप से बाध्यकारी दस्तावेज़ बना रहता है।\n"
  th: "ใบแจ้งหนี้นี้เป็นการแปลจากใบแจ้งหนี้ต้นฉบับเป็นภาษาอังกฤษ\nเวอร์ชันภาษาอังกฤษยังคงเป็นเอกสารที่มีผลผูกพันทางกฎหมายสำหรับวัตถุประสงค์ทางภาษี\n"
  cs: "Tato faktura je překladem originální faktury v angličtině.\nAnglická verze zůstává právně závazným dokumentem pro daňové účely.\n"
  sv: "Den här fakturan är en översättning av originalfakturan på engelska.\nDen engelska versionen är fortfarande det rättsligt bindande dokumentet för skatteändamål.\n"
  verified_by_human: []
