  pt: "Sua nota de crédito oficial foi emitida pela Polar (polar.sh) como Merchant of Record."
  ru: "Ваш официальный кредитный документ был выставлен компанией Polar (polar.sh) в качестве Merchant of Record."
  ja: "公式のクレジットノートは、Merchant of Recordとして Polar（polar.sh）により発行されました。"
  ko: "귀하의 공식 신용 메모는 Polar(polar.sh)가 Merchant of Record로서 발행했습니다."
