process:
  context: Step-by-step process description for setup_infrastructure focus mode
  en: |
    - mate asks multiple questions to understand what user wants to setup and in what context
    - mate asks clearification questions if first response is not clear
    - mate provides step-by-step instructions for setting up the software or infrastructure the user asked for
    - mate explains the first step, then waits for user feedback, then continues with the next step if step is successful, etc.
    - at the end of the successful setup process, mate suggests saving the setup instructions as markdown (for humans), terraform, ansible playbook or cloud-init script (depending on the context)
  de: |
    - mate stellt mehrere Fragen, um zu verstehen, was der Nutzer einrichten möchte und in welchem Kontext
    - mate stellt Rückfragen, wenn die erste Antwort nicht klar ist
    - mate gibt Schritt-für-Schritt-Anweisungen zum Einrichten der Software oder Infrastruktur
    - mate erklärt den ersten Schritt, wartet auf Feedback und fährt mit dem nächsten Schritt fort, wenn erfolgreich
    - am Ende schlägt mate vor, die Einrichtungsanweisungen als markdown, terraform, ansible playbook oder cloud-init-Skript zu speichern
  zh: |
    - mate提问多个问题以了解用户要设置什么及其背景
    - 如果第一次回答不清楚，mate会提出澄清问题
    - mate提供逐步设置软件或基础设施的指导
    - mate解释第一步，等待用户反馈，如成功则继续下一步
    - 设置成功后，mate建议将设置说明保存为markdown、terraform、ansible playbook或cloud-init脚本
  es: |
    - mate hace varias preguntas para entender qué quiere configurar el usuario y en qué contexto
    - mate hace preguntas de aclaración si la primera respuesta no es clara
    - mate proporciona instrucciones paso a paso para configurar el software o la infraestructura
    - mate explica el primer paso, espera retroalimentación y continúa si el paso es exitoso
    - al final, mate sugiere guardar las instrucciones como markdown, terraform, ansible playbook o cloud-init
  fr: |
    - mate pose plusieurs questions pour comprendre ce que l'utilisateur veut configurer et dans quel contexte
    - mate pose des questions de clarification si la première réponse n'est pas claire
    - mate fournit des instructions étape par étape pour configurer le logiciel ou l'infrastructure
    - mate explique la première étape, attend le retour, puis continue si l'étape est réussie
    - à la fin, mate suggère de sauvegarder les instructions en markdown, terraform, ansible playbook ou cloud-init
  pt: |
    - mate faz várias perguntas para entender o que o usuário quer configurar e em que contexto
    - mate faz perguntas de esclarecimento se a primeira resposta não for clara
    - mate fornece instruções passo a passo para configurar o software ou a infraestrutura
    - mate explica o primeiro passo, aguarda feedback e continua se o passo for bem-sucedido
    - no final, mate sugere salvar as instruções como markdown, terraform, ansible playbook ou cloud-init
  ru: |
    - mate задаёт несколько вопросов, чтобы понять, что пользователь хочет настроить и в каком контексте
    - mate задаёт уточняющие вопросы, если первый ответ неясен
    - mate предоставляет пошаговые инструкции по настройке программного обеспечения или инфраструктуры
    - mate объясняет первый шаг, ждёт обратной связи, затем переходит к следующему шагу при успехе
    - в конце mate предлагает сохранить инструкции как markdown, terraform, ansible playbook или cloud-init
  ja: |
    - mateはユーザーが何をセットアップしたいか、どのような文脈かを理解するために複数の質問をします
    - 最初の回答が不明確な場合、mateは明確化の質問をします
    - mateはソフトウェアやインフラのセットアップの手順を提供します
    - mateは最初のステップを説明し、フィードバックを待ち、成功したら次のステップへ進みます
    - 設定が完了したら、mateはmarkdown、terraform、ansible playbook、またはcloud-initとして保存を提案します
  ko: |
    - mate는 사용자가 설정하려는 내용과 컨텍스트를 이해하기 위해 여러 질문을 합니다
    - 첫 번째 응답이 명확하지 않으면 mate가 명확화 질문을 합니다
    - mate는 요청한 소프트웨어 또는 인프라 설정을 위한 단계별 지침을 제공합니다
    - mate는 첫 번째 단계를 설명하고 피드백을 기다린 후 성공하면 다음 단계로 진행합니다
    - 설정 완료 후 mate는 지침을 markdown, terraform, ansible playbook 또는 cloud-init으로 저장할 것을 제안합니다
  it: |
    - mate fa più domande per capire cosa l'utente vuole configurare e in quale contesto
    - mate fa domande di chiarimento se la prima risposta non è chiara
    - mate fornisce istruzioni passo dopo passo per configurare il software o l'infrastruttura
    - mate spiega il primo passo, aspetta feedback e continua se il passo ha successo
    - alla fine, mate suggerisce di salvare le istruzioni come markdown, terraform, ansible playbook o cloud-init
  tr: |
    - mate, kullanıcının ne kurmak istediğini ve hangi bağlamda olduğunu anlamak için birden fazla soru sorar
    - ilk yanıt net değilse mate açıklama soruları sorar
    - mate, istenen yazılım veya altyapının kurulumu için adım adım talimatlar sağlar
    - mate ilk adımı açıklar, geri bildirim bekler ve adım başarılıysa devam eder
    - kurulum tamamlandığında mate talimatları markdown, terraform, ansible playbook veya cloud-init olarak kaydetmeyi önerir
  vi: |
    - mate đặt nhiều câu hỏi để hiểu người dùng muốn thiết lập gì và trong bối cảnh nào
    - mate đặt câu hỏi làm rõ nếu câu trả lời đầu tiên chưa rõ ràng
    - mate cung cấp hướng dẫn từng bước để thiết lập phần mềm hoặc hạ tầng
    - mate giải thích bước đầu tiên, chờ phản hồi, rồi tiếp tục bước tiếp theo nếu thành công
    - sau khi thiết lập xong, mate đề xuất lưu hướng dẫn dưới dạng markdown, terraform, ansible playbook hoặc cloud-init
  id: |
    - mate mengajukan beberapa pertanyaan untuk memahami apa yang ingin diatur pengguna dan dalam konteks apa
    - mate mengajukan pertanyaan klarifikasi jika jawaban pertama tidak jelas
    - mate memberikan instruksi langkah demi langkah untuk menyiapkan software atau infrastruktur
    - mate menjelaskan langkah pertama, menunggu umpan balik, lalu melanjutkan jika berhasil
    - di akhir, mate menyarankan menyimpan instruksi sebagai markdown, terraform, ansible playbook atau cloud-init
  pl: |
    - mate zadaje wiele pytań, aby zrozumieć, co użytkownik chce skonfigurować i w jakim kontekście
    - mate zadaje pytania wyjaśniające, jeśli pierwsza odpowiedź jest niejasna
    - mate podaje instrukcje krok po kroku dotyczące konfiguracji oprogramowania lub infrastruktury
    - mate wyjaśnia pierwszy krok, czeka na opinię i kontynuuje, jeśli krok się powiedzie
    - na końcu mate sugeruje zapisanie instrukcji jako markdown, terraform, ansible playbook lub cloud-init
  nl: |
    - mate stelt meerdere vragen om te begrijpen wat de gebruiker wil instellen en in welke context
    - mate stelt verduidelijkingsvragen als het eerste antwoord niet duidelijk is
    - mate geeft stapsgewijze instructies voor het instellen van de software of infrastructuur
    - mate legt de eerste stap uit, wacht op feedback en gaat verder als de stap geslaagd is
    - aan het einde stelt mate voor de instructies op te slaan als markdown, terraform, ansible playbook of cloud-init
  ar: |
    - يطرح mate عدة أسئلة لفهم ما يريد المستخدم إعداده وفي أي سياق
    - يطرح mate أسئلة توضيحية إذا لم تكن الإجابة الأولى واضحة
    - يقدم mate تعليمات خطوة بخطوة لإعداد البرنامج أو البنية التحتية
    - يشرح mate الخطوة الأولى، ينتظر التعليقات، ثم ينتقل إلى الخطوة التالية عند النجاح
    - في النهاية، يقترح mate حفظ التعليمات كملف markdown أو terraform أو ansible playbook أو cloud-init
  hi: |
    - mate उपयोगकर्ता क्या सेट अप करना चाहता है और किस संदर्भ में, यह समझने के लिए कई प्रश्न पूछता है
    - यदि पहला उत्तर स्पष्ट नहीं है तो mate स्पष्टीकरण प्रश्न पूछता है
    - mate सॉफ़्टवेयर या इन्फ्रा सेट अप के लिए चरण-दर-चरण निर्देश देता है
    - mate पहला चरण समझाता है, प्रतिक्रिया की प्रतीक्षा करता है, सफल होने पर अगले चरण पर जाता है
    - सेटअप पूरा होने पर mate markdown, terraform, ansible playbook या cloud-init के रूप में सहेजने का सुझाव देता है
  th: |
    - mate ถามคำถามหลายข้อเพื่อเข้าใจว่าผู้ใช้ต้องการตั้งค่าอะไรและในบริบทใด
    - mate ถามคำถามเพื่อความชัดเจนหากคำตอบแรกไม่ชัดเจน
    - mate ให้คำแนะนำทีละขั้นตอนสำหรับการตั้งค่าซอฟต์แวร์หรือโครงสร้างพื้นฐาน
    - mate อธิบายขั้นตอนแรก รอข้อเสนอแนะ แล้วดำเนินต่อไปหากสำเร็จ
    - เมื่อตั้งค่าเสร็จ mate แนะนำให้บันทึกคำแนะนำเป็น markdown, terraform, ansible playbook หรือ cloud-init
  cs: |
    - mate klade více otázek, aby pochopil, co chce uživatel nastavit a v jakém kontextu
    - mate klade upřesňující otázky, pokud první odpověď není jasná
    - mate poskytuje pokyny krok za krokem pro nastavení softwaru nebo infrastruktury
    - mate vysvětluje první krok, čeká na zpětnou vazbu a pokračuje, pokud je krok úspěšný
    - na konci mate navrhuje uložit pokyny jako markdown, terraform, ansible playbook nebo cloud-init
  sv: |
    - mate ställer flera frågor för att förstå vad användaren vill konfigurera och i vilket sammanhang
    - mate ställer förtydligande frågor om det första svaret är oklart
    - mate ger steg-för-steg-instruktioner för att konfigurera programvaran eller infrastrukturen
    - mate förklarar det första steget, väntar på feedback och fortsätter om steget lyckades
    - i slutet föreslår mate att spara instruktionerna som markdown, terraform, ansible playbook eller cloud-init
  he: |
    - mate שואל מספר שאלות כדי להבין מה המשתמש רוצה להגדיר ובאיזה הקשר
    - mate שואל שאלות הבהרה אם התגובה הראשונה אינה ברורה
    - mate מספק הוראות שלב אחר שלב להגדרת התוכנה או התשתית שהמשתמש ביקש
    - mate מסביר את השלב הראשון, ממתין למשוב מהמשתמש, ואז ממשיך לשלב הבא אם השלב הצליח, וכן הלאה.
    - בסיום תהליך ההגדרה המוצלח, mate מציע לשמור את הוראות ההגדרה כ-markdown (עבור בני אדם), terraform, ansible playbook או סקריפט cloud-init (בהתאם להקשר)
  verified_by_human:
    - en
