description:
  context: Focus mode description for prepare_discussion
  en: Plan questions, check facts, and understand opposing arguments before a political conversation.
  de: Plane Fragen, prüfe Fakten und verstehe Gegenargumente vor einem politischen Gespräch.
  zh: 在政治对话前规划问题、核查事实并理解对立观点。
  es: Planifica preguntas, verifica hechos y entiende argumentos opuestos antes de una conversación política.
  fr: Planifiez des questions, vérifiez les faits et comprenez les arguments opposés avant une conversation politique.
  pt: Planeje perguntas, verifique fatos e entenda argumentos contrários antes de uma conversa política.
  ru: Подготовьте вопросы, проверьте факты и поймите противоположные аргументы перед политическим разговором.
  ja: 政治的な会話の前に、質問を計画し、事実を確認し、反対意見を理解します。
  ko: 정치적 대화 전에 질문을 계획하고 사실을 확인하며 반대 논리를 이해합니다.
  it: Pianifica domande, verifica i fatti e comprendi argomenti opposti prima di una conversazione politica.
  tr: Siyasi bir konuşmadan önce soruları planlayın, gerçekleri kontrol edin ve karşı argümanları anlayın.
  vi: Lập kế hoạch câu hỏi, kiểm tra sự thật và hiểu lập luận đối lập trước một cuộc trò chuyện chính trị.
  id: Rencanakan pertanyaan, periksa fakta, dan pahami argumen lawan sebelum percakapan politik.
  pl: Zaplanuj pytania, sprawdź fakty i zrozum argumenty przeciwne przed rozmową polityczną.
  nl: Plan vragen, check feiten en begrijp tegenargumenten vóór een politiek gesprek.
  ar: خطط للأسئلة، تحقق من الحقائق، وافهم الحجج المعارضة قبل محادثة سياسية.
  hi: राजनीतिक बातचीत से पहले सवालों की योजना बनाएं, तथ्य जांचें और विरोधी तर्क समझें।
  th: วางแผนคำถาม ตรวจสอบข้อเท็จจริง และเข้าใจข้อโต้แย้งฝ่ายตรงข้ามก่อนการสนทนาทางการเมือง
  cs: Naplánujte otázky, ověřte fakta a pochopte protichůdné argumenty před politickým rozhovorem.
  sv: Planera frågor, faktakolla och förstå motargument inför ett politiskt samtal.
  he: תכננו שאלות, בדקו עובדות והבינו טיעונים נגדיים לפני שיחה פוליטית.
  verified_by_human:
    - en
process:
  context: Step-by-step process description for prepare_discussion focus mode
  en: |
    - clarifies who you will talk with, the topic, the setting, and what a good outcome would look like
    - separates factual claims, values, assumptions, predictions, and personal experiences
    - plans neutral, good-faith questions that invite explanation instead of escalating conflict
    - researches current facts and primary sources when accuracy depends on recent or contested information
    - maps the strongest arguments, counterarguments, uncertainties, and points of agreement on each side
    - helps you prepare calm wording, boundaries, and follow-up questions without manipulative tactics
    - produces a concise discussion prep sheet with facts to verify, questions to ask, and claims to avoid overstating
  de: |
    - klärt, mit wem du sprichst, das Thema, den Rahmen und wie ein gutes Ergebnis aussehen würde
    - trennt Tatsachenbehauptungen, Werte, Annahmen, Vorhersagen und persönliche Erfahrungen
    - plant neutrale, gutgläubige Fragen, die Erklärungen einladen statt Konflikte zu eskalieren
    - recherchiert aktuelle Fakten und Primärquellen, wenn Genauigkeit von frischen oder umstrittenen Informationen abhängt
    - kartiert die stärksten Argumente, Gegenargumente, Unsicherheiten und Übereinstimmungen jeder Seite
    - hilft, ruhige Formulierungen, Grenzen und Anschlussfragen ohne manipulative Taktiken vorzubereiten
    - erstellt ein knappes Vorbereitungsblatt mit zu prüfenden Fakten, Fragen und Behauptungen, die nicht überzogen werden sollten
  zh: |
    - 明确你将与谁交谈、主题、场景，以及怎样才算好的结果
    - 区分事实主张、价值判断、假设、预测和个人经历
    - 规划中立、善意的问题，邀请解释而不是升级冲突
    - 当准确性依赖最新或有争议信息时，研究当前事实和一手来源
    - 梳理各方最强论点、反论点、不确定性和共识点
    - 帮助你准备平和措辞、边界和追问，不使用操纵性策略
    - 生成简明讨论准备表，包含需验证事实、可提问题和避免夸大的主张
  es: |
    - aclara con quién hablarás, el tema, el contexto y cómo sería un buen resultado
    - separa afirmaciones fácticas, valores, supuestos, predicciones y experiencias personales
    - planifica preguntas neutrales y de buena fe que inviten a explicar en lugar de escalar el conflicto
    - investiga hechos actuales y fuentes primarias cuando la precisión depende de información reciente o disputada
    - mapea los argumentos más fuertes, contraargumentos, incertidumbres y puntos de acuerdo de cada lado
    - ayuda a preparar lenguaje calmado, límites y preguntas de seguimiento sin tácticas manipuladoras
    - produce una hoja concisa de preparación con hechos a verificar, preguntas para hacer y afirmaciones que conviene no exagerar
  fr: |
    - clarifie avec qui vous allez parler, le sujet, le cadre et ce à quoi ressemblerait un bon résultat
    - sépare affirmations factuelles, valeurs, hypothèses, prédictions et expériences personnelles
    - prépare des questions neutres et de bonne foi qui invitent à expliquer plutôt qu'à faire monter le conflit
    - recherche des faits actuels et des sources primaires quand l'exactitude dépend d'informations récentes ou contestées
    - cartographie les arguments les plus forts, contre-arguments, incertitudes et points d'accord de chaque côté
    - aide à préparer une formulation calme, des limites et des questions de suivi sans tactiques manipulatrices
    - produit une fiche concise de préparation avec faits à vérifier, questions à poser et affirmations à éviter d'exagérer
  pt: |
    - esclarece com quem você vai falar, o tema, o contexto e como seria um bom resultado
    - separa alegações factuais, valores, pressupostos, previsões e experiências pessoais
    - planeja perguntas neutras e de boa-fé que convidam à explicação em vez de escalar conflito
    - pesquisa fatos atuais e fontes primárias quando a precisão depende de informação recente ou contestada
    - mapeia os argumentos mais fortes, contra-argumentos, incertezas e pontos de concordância de cada lado
    - ajuda a preparar linguagem calma, limites e perguntas de acompanhamento sem táticas manipuladoras
    - produz uma ficha concisa de preparação com fatos a verificar, perguntas a fazer e alegações a evitar exagerar
  ru: |
    - уточняет, с кем вы будете говорить, тему, обстановку и как выглядел бы хороший результат
    - отделяет фактические утверждения, ценности, предположения, прогнозы и личный опыт
    - планирует нейтральные вопросы добросовестного тона, которые приглашают объяснить, а не усиливают конфликт
    - исследует текущие факты и первоисточники, когда точность зависит от свежей или спорной информации
    - отображает сильнейшие аргументы, контраргументы, неопределенности и точки согласия каждой стороны
    - помогает подготовить спокойные формулировки, границы и последующие вопросы без манипулятивных приемов
    - создает краткий лист подготовки с фактами для проверки, вопросами и утверждениями, которые не стоит преувеличивать
  ja: |
    - 誰と話すのか、テーマ、場面、望ましい結果を明確にする
    - 事実主張、価値観、前提、予測、個人的経験を分ける
    - 対立を煽らず説明を促す、中立で善意ある質問を計画する
    - 正確性が新しい情報や争点に依存する場合、最新事実と一次資料を調べる
    - 各側の最も強い主張、反論、不確実性、合意点を整理する
    - 操作的な手法を使わず、落ち着いた言い回し、境界線、追質問の準備を助ける
    - 確認すべき事実、尋ねる質問、誇張を避ける主張を含む簡潔な議論準備シートを作る
  ko: |
    - 누구와 이야기할지, 주제, 상황, 좋은 결과가 무엇인지 명확히 합니다
    - 사실 주장, 가치, 가정, 예측, 개인 경험을 구분합니다
    - 갈등을 키우기보다 설명을 이끌어내는 중립적이고 선의의 질문을 계획합니다
    - 정확성이 최신 또는 논쟁적 정보에 달려 있을 때 현재 사실과 1차 출처를 조사합니다
    - 각 측의 가장 강한 주장, 반론, 불확실성, 합의점을 정리합니다
    - 조작적 전술 없이 차분한 표현, 경계, 후속 질문을 준비하도록 돕습니다
    - 검증할 사실, 물어볼 질문, 과장하지 말아야 할 주장을 담은 간결한 토론 준비표를 만듭니다
  it: |
    - chiarisce con chi parlerai, il tema, il contesto e come apparirebbe un buon risultato
    - separa affermazioni fattuali, valori, assunzioni, previsioni ed esperienze personali
    - pianifica domande neutrali e in buona fede che invitano alla spiegazione invece di aumentare il conflitto
    - ricerca fatti attuali e fonti primarie quando l'accuratezza dipende da informazioni recenti o contestate
    - mappa gli argomenti più forti, controargomenti, incertezze e punti di accordo di ogni lato
    - aiuta a preparare formulazioni calme, limiti e domande di follow-up senza tattiche manipolative
    - produce una scheda concisa di preparazione con fatti da verificare, domande da porre e affermazioni da non esagerare
  tr: |
    - kiminle konuşacağını, konuyu, ortamı ve iyi bir sonucun nasıl görüneceğini netleştirir
    - olgusal iddiaları, değerleri, varsayımları, tahminleri ve kişisel deneyimleri ayırır
    - çatışmayı tırmandırmak yerine açıklamaya davet eden tarafsız, iyi niyetli sorular planlar
    - doğruluk güncel veya tartışmalı bilgiye bağlı olduğunda güncel gerçekleri ve birincil kaynakları araştırır
    - her tarafın en güçlü argümanlarını, karşı argümanlarını, belirsizliklerini ve uzlaşma noktalarını haritalar
    - manipülatif taktikler olmadan sakin ifade, sınırlar ve takip soruları hazırlamana yardım eder
    - doğrulanacak gerçekler, sorulacak sorular ve abartılmaması gereken iddialarla kısa bir tartışma hazırlık sayfası üretir
  vi: |
    - làm rõ bạn sẽ nói chuyện với ai, chủ đề, bối cảnh và kết quả tốt sẽ trông như thế nào
    - tách biệt tuyên bố sự thật, giá trị, giả định, dự đoán và trải nghiệm cá nhân
    - lập kế hoạch câu hỏi trung lập, thiện chí, mời giải thích thay vì leo thang xung đột
    - nghiên cứu sự thật hiện tại và nguồn sơ cấp khi độ chính xác phụ thuộc vào thông tin mới hoặc còn tranh cãi
    - lập bản đồ các lập luận mạnh nhất, phản biện, điều không chắc chắn và điểm đồng thuận của mỗi bên
    - giúp chuẩn bị cách diễn đạt bình tĩnh, ranh giới và câu hỏi tiếp theo mà không dùng chiến thuật thao túng
    - tạo một tờ chuẩn bị thảo luận ngắn gọn với sự thật cần xác minh, câu hỏi cần hỏi và tuyên bố cần tránh phóng đại
  id: |
    - memperjelas dengan siapa Anda akan berbicara, topik, situasi, dan seperti apa hasil yang baik
    - memisahkan klaim faktual, nilai, asumsi, prediksi, dan pengalaman pribadi
    - merencanakan pertanyaan netral dan beritikad baik yang mengundang penjelasan alih-alih memperuncing konflik
    - meneliti fakta terkini dan sumber primer ketika akurasi bergantung pada informasi baru atau diperdebatkan
    - memetakan argumen terkuat, kontraargumen, ketidakpastian, dan titik kesepakatan di setiap sisi
    - membantu menyiapkan kata-kata tenang, batasan, dan pertanyaan lanjutan tanpa taktik manipulatif
    - menghasilkan lembar persiapan ringkas dengan fakta untuk diverifikasi, pertanyaan untuk diajukan, dan klaim yang tidak perlu dilebih-lebihkan
  pl: |
    - wyjaśnia, z kim będziesz rozmawiać, temat, sytuację i jak wyglądałby dobry wynik
    - oddziela twierdzenia faktualne, wartości, założenia, przewidywania i osobiste doświadczenia
    - planuje neutralne pytania w dobrej wierze, które zapraszają do wyjaśnienia zamiast eskalować konflikt
    - bada aktualne fakty i źródła pierwotne, gdy dokładność zależy od świeżych lub spornych informacji
    - mapuje najsilniejsze argumenty, kontrargumenty, niepewności i punkty zgody po każdej stronie
    - pomaga przygotować spokojne sformułowania, granice i pytania uzupełniające bez taktyk manipulacyjnych
    - tworzy zwięzłą kartę przygotowania z faktami do sprawdzenia, pytaniami i twierdzeniami, których nie należy wyolbrzymiać
  nl: |
    - verduidelijkt met wie je gaat praten, het onderwerp, de setting en hoe een goed resultaat eruitziet
    - scheidt feitelijke claims, waarden, aannames, voorspellingen en persoonlijke ervaringen
    - plant neutrale vragen te goeder trouw die uitnodigen tot uitleg in plaats van conflict te escaleren
    - onderzoekt actuele feiten en primaire bronnen wanneer nauwkeurigheid afhangt van recente of betwiste informatie
    - brengt de sterkste argumenten, tegenargumenten, onzekerheden en overeenkomsten aan elke kant in kaart
    - helpt kalme formuleringen, grenzen en vervolgvraagstukken voorbereiden zonder manipulatieve tactieken
    - maakt een beknopt voorbereidingsblad met feiten om te verifiëren, vragen om te stellen en claims die je niet moet overdrijven
  ar: |
    - يوضح مع من ستتحدث، والموضوع، والسياق، وما الذي سيُعد نتيجة جيدة
    - يفصل بين الادعاءات الواقعية والقيم والافتراضات والتوقعات والتجارب الشخصية
    - يخطط لأسئلة محايدة وبحسن نية تدعو إلى الشرح بدلاً من تصعيد الخلاف
    - يبحث في الحقائق الحالية والمصادر الأولية عندما تعتمد الدقة على معلومات حديثة أو متنازع عليها
    - يرسم أقوى الحجج والحجج المضادة والشكوك ونقاط الاتفاق لدى كل طرف
    - يساعدك على إعداد صياغة هادئة وحدود وأسئلة متابعة من دون تكتيكات تلاعبية
    - ينتج ورقة تحضير موجزة للنقاش تتضمن حقائق للتحقق وأسئلة لطرحها وادعاءات يجب تجنب المبالغة فيها
  hi: |
    - स्पष्ट करता है कि आप किससे बात करेंगे, विषय क्या है, setting क्या है और अच्छा outcome कैसा होगा
    - factual claims, values, assumptions, predictions और personal experiences को अलग करता है
    - ऐसे neutral, good-faith questions योजना बनाता है जो conflict बढ़ाने के बजाय explanation आमंत्रित करें
    - जब accuracy ताज़ा या contested information पर निर्भर हो, तो current facts और primary sources research करता है
    - हर पक्ष के strongest arguments, counterarguments, uncertainties और agreement points map करता है
    - manipulative tactics के बिना calm wording, boundaries और follow-up questions तैयार करने में मदद करता है
    - facts to verify, questions to ask और overstating से बचने वाले claims के साथ concise discussion prep sheet बनाता है
  th: |
    - ทำให้ชัดเจนว่าคุณจะคุยกับใคร หัวข้อคืออะไร บริบทเป็นแบบไหน และผลลัพธ์ที่ดีหน้าตาเป็นอย่างไร
    - แยก factual claims, values, assumptions, predictions และ personal experiences
    - วางแผนคำถามที่เป็นกลางและสุจริตซึ่งชวนให้อธิบายแทนที่จะทำให้ความขัดแย้งลุกลาม
    - research ข้อเท็จจริงปัจจุบันและ primary sources เมื่อความถูกต้องขึ้นกับข้อมูลใหม่หรือข้อมูลที่ยังถกเถียง
    - map arguments ที่แข็งแรงที่สุด counterarguments ความไม่แน่นอน และจุดเห็นพ้องของแต่ละฝ่าย
    - ช่วยเตรียมถ้อยคำที่สงบ boundaries และ follow-up questions โดยไม่ใช้กลยุทธ์ชักจูง
    - สร้าง discussion prep sheet สั้น ๆ พร้อม facts to verify, questions to ask และ claims ที่ควรเลี่ยงการกล่าวเกินจริง
  cs: |
    - vyjasní, s kým budete mluvit, téma, prostředí a jak by vypadal dobrý výsledek
    - odděluje faktická tvrzení, hodnoty, předpoklady, předpovědi a osobní zkušenosti
    - plánuje neutrální otázky v dobré víře, které zvou k vysvětlení místo eskalace konfliktu
    - zkoumá aktuální fakta a primární zdroje, když přesnost závisí na čerstvých nebo sporných informacích
    - mapuje nejsilnější argumenty, protiargumenty, nejistoty a body shody na každé straně
    - pomáhá připravit klidné formulace, hranice a navazující otázky bez manipulačních taktik
    - vytvoří stručný přípravný list s fakty k ověření, otázkami k položení a tvrzeními, která se nemají přehánět
  sv: |
    - klargör vem du ska prata med, ämnet, sammanhanget och hur ett bra resultat skulle se ut
    - skiljer faktapåståenden, värderingar, antaganden, förutsägelser och personliga erfarenheter åt
    - planerar neutrala frågor i god tro som bjuder in till förklaring i stället för att eskalera konflikt
    - undersöker aktuella fakta och primärkällor när noggrannhet beror på färsk eller omstridd information
    - kartlägger de starkaste argumenten, motargumenten, osäkerheterna och punkterna av samförstånd på varje sida
    - hjälper dig förbereda lugna formuleringar, gränser och följdfrågor utan manipulativa taktiker
    - skapar ett kort diskussionsunderlag med fakta att verifiera, frågor att ställa och påståenden att undvika att överdriva
  he: |
    - מבהיר עם מי תדברו, מה הנושא, מה ההקשר ואיך תיראה תוצאה טובה
    - מפריד בין טענות עובדתיות, ערכים, הנחות, תחזיות וחוויות אישיות
    - מתכנן שאלות ניטרליות ובתום לב שמזמינות הסבר במקום להסלים קונפליקט
    - חוקר עובדות עדכניות ומקורות ראשוניים כאשר הדיוק תלוי במידע חדש או שנוי במחלוקת
    - ממפה את הטיעונים החזקים ביותר, טיעוני הנגד, אי-הוודאויות ונקודות ההסכמה בכל צד
    - עוזר להכין ניסוח רגוע, גבולות ושאלות המשך בלי טקטיקות מניפולטיביות
    - מפיק דף הכנה תמציתי לדיון עם עובדות לאימות, שאלות לשאול וטענות שכדאי לא להפריז בהן
