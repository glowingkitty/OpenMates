description:
  context: Focus mode description for research
  en: Research a topic from multiple angles.
  de: Ein Thema aus mehreren Blickwinkeln recherchieren.
  zh: 从多个角度研究一个主题。
  es: Investiga un tema desde múltiples ángulos.
  fr: Rechercher un sujet sous plusieurs angles.
  pt: Pesquisar um tema de múltiplos ângulos.
  ru: Исследовать тему с разных сторон.
  ja: 複数の角度からトピックを調査する。
  ko: 여러 각도에서 주제를 조사합니다.
  it: Ricerca un argomento da più angolazioni.
  tr: Bir konuyu birden fazla açıdan araştırın.
  vi: Nghiên cứu một chủ đề từ nhiều góc độ.
  id: Teliti topik dari berbagai sudut pandang.
  pl: Zbadaj temat z wielu perspektyw.
  nl: Onderzoek een onderwerp vanuit meerdere hoeken.
  ar: ابحث في موضوع من زوايا متعددة.
  hi: किसी विषय को कई दृष्टिकोणों से शोध करें।
  th: วิจัยหัวข้อจากหลายมุมมอง
  cs: Prozkoumejte téma z více úhlů pohledu.
  sv: Undersök ett ämne från flera vinklar.
  he: מחקר נושא ממספר זוויות.
  verified_by_human:
    - en
process:
  context: Step-by-step process description for research focus mode
  en: |
    - understands what the user wants to research and clarifies the scope if needed
    - performs multiple targeted web searches to gather information from diverse sources
    - explores the topic from different angles (causes, effects, context, counterarguments)
    - synthesizes findings into a clear, well-structured response
    - cites sources and highlights areas of uncertainty or conflicting information
  he: |
    - מבין מה המשתמש רוצה לחקור ומבהיר את ההיקף במידת הצורך
    - מבצע מספר חיפושי רשת ממוקדים כדי לאסוף מידע ממקורות מגוונים
    - בוחן את הנושא מזוויות שונות (סיבות, השפעות, הקשר, טיעוני נגד)
    - מסכם את הממצאים לכדי תגובה ברורה ומובנית היטב
    - מצטט מקורות ומדגיש אזורים של אי-ודאות או מידע סותר
  verified_by_human:
    - en
systemprompt:
  context: System prompt for the LLM when research focus mode is active
  en: You are an expert researcher. Your role is to conduct thorough web research by making multiple searches to understand a topic comprehensively, including its causes, effects, and broader context.
  he: אתה חוקר מומחה. תפקידך הוא לבצע מחקר רשת יסודי על ידי ביצוע מספר חיפושים כדי להבין נושא בצורה מקיפה, כולל הסיבות שלו, ההשפעות שלו וההקשר הרחב יותר.
  verified_by_human:
    - en
