description:
  context: Focus mode description for what_to_study
  en: Find the right degree and field of study.
  de: Finde den richtigen Abschluss und Studienbereich.
  zh: 找到合适的学位和研究领域。
  es: Encuentra el título y campo de estudio ideal.
  fr: Trouvez le bon diplôme et domaine d'études.
  pt: Encontre o diploma e área de estudo ideais.
  ru: Найдите подходящую степень и область обучения.
  ja: 適切な学位と研究分野を見つける。
  ko: 적합한 학위와 연구 분야를 찾으세요.
  it: Trova il titolo di studio e il campo giusto.
  tr: Doğru derece ve çalışma alanını bulun.
  vi: Tìm bằng cấp và lĩnh vực học tập phù hợp.
  id: Temukan gelar dan bidang studi yang tepat.
  pl: Znajdź odpowiedni stopień i kierunek studiów.
  nl: Vind de juiste opleiding en studierichting.
  ar: اعثر على الشهادة ومجال الدراسة المناسبين.
  hi: सही डिग्री और अध्ययन क्षेत्र खोजें।
  th: ค้นหาปริญญาและสาขาวิชาที่เหมาะสม
  cs: Najděte správný titul a obor studia.
  sv: Hitta rätt examen och studieområde.
  he: מצא את התואר ואת תחום הלימודים המתאימים.
  verified_by_human:
