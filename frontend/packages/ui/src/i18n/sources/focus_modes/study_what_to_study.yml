process:
  context: Step-by-step process description for what_to_study focus mode
  en: |
    - asks about your interests, hobbies, and what subjects you naturally gravitate towards
    - explores your strengths, talents, and what comes naturally to you
    - discusses your career aspirations and what kind of work environment you prefer
    - questions about your learning style and educational preferences (hands-on, theoretical, etc.)
    - explores your values and what matters most in a career (impact, creativity, stability, etc.)
    - asks about practical constraints (location, finances, time availability)
    - analyzes the information gathered to identify aligned degree programs and fields
    - suggests specific degrees, universities, and alternative educational paths
    - provides guidance on next steps and resources to explore further
  de: |
    - fragt nach deinen Interessen, Hobbys und welchen Fächern du dich natürlich zuneigst
    - erkundet deine Stärken, Talente und was dir leicht fällt
    - bespricht deine Berufsaspirationen und welche Art von Arbeitsumgebung du bevorzugst
    - stellt Fragen zu deinem Lernstil und Bildungspräferenzen (praxisorientiert, theoretisch usw.)
    - erkundet deine Werte und was in einem Beruf am wichtigsten ist (Wirkung, Kreativität, Stabilität usw.)
    - fragt nach praktischen Einschränkungen (Standort, Finanzen, Zeitverfügbarkeit)
    - analysiert die gesammelten Informationen, um passende Studienprogramme und Bereiche zu identifizieren
    - schlägt bestimmte Abschlüsse, Universitäten und alternative Bildungswege vor
    - bietet Orientierung für die nächsten Schritte und Ressourcen für weiteres Erkunden
  zh: |
    - 询问您的兴趣、爱好以及您自然倾向于哪些学科
    - 探索您的优势、才能以及什么对您来说是自然而然的
    - 讨论您的职业抱负和您喜欢哪种工作环境
    - 询问您的学习风格和教育偏好（动手实践、理论等）
    - 探索您的价值观以及职业中最重要的是什么（影响力、创造力、稳定性等）
    - 询问实际限制（地点、财务、时间可用性）
    - 分析收集到的信息以识别对应的学位课程和领域
    - 建议具体的学位、大学和替代教育路径
    - 为进一步探索提供下一步指导和资源
  es: |
    - pregunta sobre tus intereses, pasatiempos y qué materias te atraen naturalmente
    - explora tus fortalezas, talentos y qué te sale con naturalidad
    - habla de tus aspiraciones profesionales y qué tipo de entorno laboral prefieres
    - preguntas sobre tu estilo de aprendizaje y preferencias educativas (práctico, teórico, etc.)
    - explora tus valores y qué importa más en una carrera (impacto, creatividad, estabilidad, etc.)
    - pregunta sobre limitaciones prácticas (ubicación, finanzas, disponibilidad de tiempo)
    - analiza la información recopilada para identificar programas y campos alineados
    - sugiere títulos específicos, universidades y caminos educativos alternativos
    - proporciona orientación sobre próximos pasos y recursos para explorar más
  fr: |
    - demande tes intérêts, loisirs et les matières vers lesquelles tu te diriges naturellement
    - explore tes forces, talents et ce qui vient naturellement pour toi
    - discute de tes aspirations professionnelles et du type d'environnement de travail que tu préfères
    - questions sur ton style d'apprentissage et tes préférences éducatives (pratique, théorique, etc.)
    - explore tes valeurs et ce qui compte le plus dans une carrière (impact, créativité, stabilité, etc.)
    - demande les contraintes pratiques (localisation, finances, disponibilité de temps)
    - analyse les informations collectées pour identifier des programmes de diplômes et des domaines alignés
    - suggère des diplômes spécifiques, des universités et des parcours éducatifs alternatifs
    - fournit des conseils sur les prochaines étapes et des ressources à explorer davantage
  pt: |
    - pergunta sobre seus interesses, hobbies e quais matérias você naturalmente se atrai
    - explora seus pontos fortes, talentos e o que vem naturalmente para você
    - discute suas aspirações de carreira e que tipo de ambiente de trabalho você prefere
    - perguntas sobre seu estilo de aprendizagem e preferências educacionais (prático, teórico, etc.)
    - explora seus valores e o que mais importa em uma carreira (impacto, criatividade, estabilidade, etc.)
    - pergunta sobre restrições práticas (localização, finanças, disponibilidade de tempo)
    - analisa as informações coletadas para identificar programas de graduação e campos alinhados
    - sugere diplomas específicos, universidades e caminhos educacionais alternativos
    - fornece orientação sobre próximos passos e recursos para explorar mais
  ru: |
    - спрашивает о ваших интересах, хобби и к каким предметам вы естественно тяготеете
    - исследует ваши сильные стороны, таланты и что даётся вам легко
    - обсуждает ваши карьерные устремления и предпочтительную рабочую среду
    - вопросы о стиле обучения и образовательных предпочтениях (практическое, теоретическое и т.д.)
    - исследует ваши ценности и что важнее всего в карьере (влияние, творчество, стабильность и т.д.)
    - спрашивает о практических ограничениях (место, финансы, доступность времени)
    - анализирует собранную информацию для выявления подходящих образовательных программ и областей
    - предлагает конкретные степени, университеты и альтернативные образовательные пути
    - даёт рекомендации по следующим шагам и ресурсам для дальнейшего изучения
  ja: |
    - 興味、趣味、自然に引き寄せられる科目について尋ねる
    - 強み、才能、自然にできることを探る
    - キャリアの抱負と好む仕事環境の種類を話し合う
    - 学習スタイルと教育の好み（実践的、理論的など）について質問する
    - 価値観とキャリアで最も重要なこと（影響力、創造性、安定性など）を探る
    - 実際の制約（場所、財務、時間の可用性）について尋ねる
    - 収集した情報を分析して適合する学位プログラムと分野を特定する
    - 特定の学位、大学、代替教育パスを提案する
    - 次のステップと更に探求するためのリソースのガイダンスを提供する
  ko: |
    - 관심사, 취미 및 자연스럽게 끌리는 과목에 대해 묻습니다
    - 강점, 재능, 자연스럽게 잘하는 것을 탐색합니다
    - 진로 포부와 선호하는 근무 환경에 대해 이야기합니다
    - 학습 스타일과 교육 선호도(실습, 이론 등)에 대한 질문을 합니다
    - 가치관과 직업에서 가장 중요한 것(영향력, 창의성, 안정성 등)을 탐색합니다
    - 실제적인 제약 조건(위치, 재정, 시간 가용성)에 대해 묻습니다
    - 수집된 정보를 분석하여 적합한 학위 프로그램과 분야를 파악합니다
    - 특정 학위, 대학교 및 대안적인 교육 경로를 제안합니다
    - 다음 단계와 추가 탐색을 위한 리소스에 대한 안내를 제공합니다
  it: |
    - chiede dei tuoi interessi, hobby e quali materie ti attraggono naturalmente
    - esplora i tuoi punti di forza, talenti e cosa ti viene naturale
    - discute delle tue aspirazioni di carriera e del tipo di ambiente lavorativo preferito
    - domande sul tuo stile di apprendimento e preferenze educative (pratico, teorico, ecc.)
    - esplora i tuoi valori e cosa conta di più in una carriera (impatto, creatività, stabilità, ecc.)
    - chiede dei vincoli pratici (posizione, finanze, disponibilità di tempo)
    - analizza le informazioni raccolte per identificare programmi di laurea e campi allineati
    - suggerisce lauree specifiche, università e percorsi educativi alternativi
    - fornisce indicazioni sui prossimi passi e risorse da esplorare ulteriormente
  tr: |
    - ilgi alanlarınız, hobilerınız ve doğal olarak hangi konulara yöneldiğinizi sorar
    - güçlü yönlerinizi, yeteneklerinizi ve size doğal gelen şeyleri araştırır
    - kariyer hedeflerinizi ve hangi tür çalışma ortamını tercih ettiğinizi tartışır
    - öğrenme stiliniz ve eğitim tercihleriniz (uygulamalı, teorik vb.) hakkında sorular sorar
    - değerlerinizi ve kariyerde en önemli olanı araştırır (etki, yaratıcılık, istikrar vb.)
    - pratik kısıtlamaları sorar (konum, finanslar, zaman müsaitliği)
    - uyumlu derece programları ve alanları belirlemek için toplanan bilgileri analiz eder
    - belirli dereceler, üniversiteler ve alternatif eğitim yolları önerir
    - sonraki adımlar ve daha fazla araştırma için kaynaklar konusunda rehberlik sağlar
  vi: |
    - hỏi về sở thích, thú vui và những môn học bạn tự nhiên hướng đến
    - khám phá điểm mạnh, tài năng và những gì đến tự nhiên với bạn
    - thảo luận về nguyện vọng nghề nghiệp và môi trường làm việc bạn thích
    - câu hỏi về phong cách học tập và sở thích giáo dục (thực hành, lý thuyết, v.v.)
    - khám phá giá trị và điều quan trọng nhất trong sự nghiệp (tác động, sáng tạo, ổn định, v.v.)
    - hỏi về các hạn chế thực tế (vị trí, tài chính, thời gian rảnh)
    - phân tích thông tin thu thập để xác định các chương trình bằng cấp và lĩnh vực phù hợp
    - đề xuất bằng cấp cụ thể, trường đại học và con đường giáo dục thay thế
    - cung cấp hướng dẫn về các bước tiếp theo và tài nguyên để khám phá thêm
  id: |
    - menanyakan tentang minat, hobi, dan mata pelajaran apa yang secara alami Anda sukai
    - mengeksplorasi kekuatan, bakat, dan apa yang datang secara alami pada Anda
    - mendiskusikan aspirasi karier dan lingkungan kerja yang Anda inginkan
    - pertanyaan tentang gaya belajar dan preferensi pendidikan (praktis, teoritis, dll.)
    - mengeksplorasi nilai-nilai Anda dan apa yang terpenting dalam karier (dampak, kreativitas, stabilitas, dll.)
    - menanyakan tentang kendala praktis (lokasi, keuangan, ketersediaan waktu)
    - menganalisis informasi yang dikumpulkan untuk mengidentifikasi program gelar dan bidang yang sesuai
    - menyarankan gelar spesifik, universitas, dan jalur pendidikan alternatif
    - memberikan panduan tentang langkah selanjutnya dan sumber daya untuk dijelajahi lebih lanjut
  pl: |
    - pyta o twoje zainteresowania, hobby i jakie przedmioty naturalnie cię przyciągają
    - bada twoje mocne strony, talenty i co przychodzi ci naturalne
    - omawia twoje aspiracje zawodowe i jaki rodzaj środowiska pracy preferujesz
    - pytania o twój styl uczenia się i preferencje edukacyjne (praktyczne, teoretyczne itp.)
    - bada twoje wartości i co jest najważniejsze w karierze (wpływ, kreatywność, stabilność itp.)
    - pyta o praktyczne ograniczenia (lokalizacja, finanse, dostępność czasu)
    - analizuje zebrane informacje, aby zidentyfikować odpowiednie programy i dziedziny studiów
    - sugeruje konkretne stopnie, uczelnie i alternatywne ścieżki edukacyjne
    - zapewnia wskazówki dotyczące kolejnych kroków i zasobów do dalszego odkrywania
  nl: |
    - vraagt naar uw interesses, hobby's en welke vakken u van nature aantrekken
    - onderzoekt uw sterktes, talenten en wat u van nature goed ligt
    - bespreekt uw carrièreambities en wat voor werkomgeving u prefereert
    - vragen over uw leerstijl en educatieve voorkeuren (hands-on, theoretisch, enz.)
    - onderzoekt uw waarden en wat het belangrijkste is in een carrière (impact, creativiteit, stabiliteit, enz.)
    - vraagt naar praktische beperkingen (locatie, financiën, beschikbare tijd)
    - analyseert de verzamelde informatie om geschikte opleidingen en vakgebieden te identificeren
    - stelt specifieke diploma's, universiteiten en alternatieve educatieve paden voor
    - biedt begeleiding over volgende stappen en bronnen om verder te verkennen
  ar: |
    - يسأل عن اهتماماتك وهواياتك والمواضيع التي تنجذب إليها بشكل طبيعي
    - يستكشف نقاط قوتك ومواهبك وما يأتي بشكل طبيعي لك
    - يناقش تطلعاتك المهنية وبيئة العمل التي تفضلها
    - أسئلة حول أسلوب تعلمك وتفضيلاتك التعليمية (عملي، نظري، إلخ)
    - يستكشف قيمك وأهم ما يهمك في مسيرة مهنية (تأثير، إبداع، استقرار، إلخ)
    - يسأل عن القيود العملية (الموقع، الشؤون المالية، توفر الوقت)
    - يحلل المعلومات المجمعة لتحديد برامج الشهادات والمجالات المتوافقة
    - يقترح شهادات ودرجات علمية وجامعات ومسارات تعليمية بديلة
    - يوفر توجيهاً بشأن الخطوات التالية والموارد للاستكشاف الإضافي
  hi: |
    - आपकी रुचियों, शौक और आप स्वाभाविक रूप से किन विषयों की ओर आकर्षित होते हैं, के बारे में पूछता है
    - आपकी ताकत, प्रतिभाओं और जो आपको स्वाभाविक रूप से आता है, उसकी जांच करता है
    - आपकी करियर आकांक्षाओं और आप किस प्रकार के कार्य वातावरण को पसंद करते हैं, पर चर्चा करता है
    - आपकी सीखने की शैली और शैक्षिक प्राथमिकताओं (व्यावहारिक, सैद्धांतिक आदि) के बारे में प्रश्न करता है
    - आपके मूल्यों और करियर में क्या सबसे महत्वपूर्ण है (प्रभाव, रचनात्मकता, स्थिरता आदि) की जांच करता है
    - व्यावहारिक बाधाओं (स्थान, वित्त, समय की उपलब्धता) के बारे में पूछता है
    - संग्रहीत जानकारी का विश्लेषण करके संरेखित डिग्री कार्यक्रमों और क्षेत्रों की पहचान करता है
    - विशिष्ट डिग्री, विश्वविद्यालयों और वैकल्पिक शैक्षिक मार्गों का सुझाव देता है
    - अगले कदमों और आगे खोज के लिए संसाधनों पर मार्गदर्शन प्रदान करता है
  th: |
    - ถามเกี่ยวกับความสนใจ งานอดิเรก และวิชาที่คุณโน้มเอียงตามธรรมชาติ
    - สำรวจจุดแข็ง ความสามารถพิเศษ และสิ่งที่มาตามธรรมชาติสำหรับคุณ
    - หารือเกี่ยวกับแรงบันดาลใจด้านอาชีพและสภาพแวดล้อมการทำงานที่คุณชอบ
    - คำถามเกี่ยวกับรูปแบบการเรียนรู้และความชอบด้านการศึกษา (ปฏิบัติ ทฤษฎี ฯลฯ)
    - สำรวจคุณค่าและสิ่งที่สำคัญที่สุดในอาชีพ (ผลกระทบ ความคิดสร้างสรรค์ ความมั่นคง ฯลฯ)
    - ถามเกี่ยวกับข้อจำกัดในทางปฏิบัติ (สถานที่ การเงิน ความพร้อมของเวลา)
    - วิเคราะห์ข้อมูลที่รวบรวมเพื่อระบุโปรแกรมปริญญาและสาขาที่สอดคล้อง
    - แนะนำปริญญาเฉพาะ มหาวิทยาลัย และเส้นทางการศึกษาทางเลือก
    - ให้คำแนะนำเกี่ยวกับขั้นตอนต่อไปและทรัพยากรสำหรับการสำรวจเพิ่มเติม
  cs: |
    - ptá se na vaše zájmy, koníčky a jaké předměty vás přirozeně přitahují
    - zkoumá vaše silné stránky, talenty a co vám přichází přirozeně
    - diskutuje o vašich kariérních aspiracích a jakém pracovním prostředí preferujete
    - otázky o vašem stylu učení a vzdělávacích preferencích (praktické, teoretické atd.)
    - zkoumá vaše hodnoty a co je v kariéře nejdůležitější (dopad, kreativita, stabilita atd.)
    - ptá se na praktická omezení (lokalita, finance, dostupnost času)
    - analyzuje shromážděné informace pro identifikaci odpovídajících studijních programů a oborů
    - navrhuje konkrétní tituly, univerzity a alternativní vzdělávací cesty
    - poskytuje pokyny pro další kroky a zdroje k dalšímu prozkoumání
  sv: |
    - frågar om dina intressen, hobbyer och vilka ämnen du naturligt dras till
    - utforskar dina styrkor, talanger och vad som kommer naturligt för dig
    - diskuterar dina karriärambitioner och vilken typ av arbetsmiljö du föredrar
    - frågor om din inlärningsstil och utbildningspreferenser (praktisk, teoretisk, osv.)
    - utforskar dina värderingar och vad som är viktigast i en karriär (påverkan, kreativitet, stabilitet osv.)
    - frågar om praktiska begränsningar (plats, ekonomi, tidstillgänglighet)
    - analyserar den insamlade informationen för att identifiera matchande examensprogram och fält
    - föreslår specifika examina, universitet och alternativa utbildningsvägar
    - ger vägledning om nästa steg och resurser att utforska vidare
  he: |
    - שואל על תחומי העניין, התחביבים והנושאים שאתה נמשך אליהם באופן טבעי
    - בוחן את החוזקות, הכישרונות ומה שבא לך בקלות
    - דן בשאיפות הקריירה שלך ובסוג סביבת העבודה המועדפת עליך
    - שואל על סגנון הלמידה והעדפות חינוכיות (מעשי, תיאורטי וכו')
    - בוחן את הערכים שלך ומה הכי חשוב לך בקריירה (השפעה, יצירתיות, יציבות וכו')
    - שואל על מגבלות מעשיות (מיקום, כספים, זמינות זמן)
    - מנתח את המידע שנאסף כדי לזהות תוכניות לימוד ותחומים תואמים
    - מציע תארים ספציפיים, אוניברסיטאות ומסלולי חינוך חלופיים
    - מספק הכוונה לגבי הצעדים הבאים ומשאבים להמשך מחקר
