process:
  context: Step-by-step process description for check_reputation focus mode
  en: |
    - Identifies the exact business, domain, seller, or marketplace listing the user wants checked
    - Searches across independent reputation sources, complaints, scam reports, and official business profiles
    - Reads the target website for contact details, refund and shipping policies, terms, and privacy information
    - Checks domain and website signals such as mismatched domains, recent registration clues, redirects, broken pages, or risky payment methods
    - Separates confirmed evidence from weak signals, missing data, and inference
    - Gives a calibrated risk verdict with practical next steps before the user buys, signs up, or shares data
  de: |
    - Identifiziert das genaue Unternehmen, die Domain, den Verkäufer oder das Marktplatz-Angebot, das du überprüft haben möchtest
    - Durchsucht unabhängige Reputationsquellen, Beschwerden, Betrugsmeldungen und offizielle Unternehmensprofile
    - Analysiert die Ziel-Website nach Kontaktdaten, Rückerstattungs- und Versandrichtlinien, AGB und Datenschutzinformationen
    - Prüft Domain- und Website-Signale wie abweichende Domains, Hinweise auf eine neue Registrierung, Weiterleitungen, defekte Seiten oder riskante Zahlungsmethoden
    - Trennt bestätigte Belege von schwachen Signalen, fehlenden Daten und Vermutungen
    - Liefert ein fundiertes Risikourteil mit praktischen Handlungsempfehlungen, bevor du kaufst, dich anmeldest oder Daten teilst
  zh: |
    - 识别用户想要检查的具体商家、域名、卖家或平台列表
    - 在独立信誉来源、投诉、诈骗报告和官方商业资料中进行搜索
    - 读取目标网站的联系方式、退款和发货政策、条款以及隐私信息
    - 检查域名和网站信号，如域名不匹配、近期注册线索、重定向、失效页面或高风险支付方式
    - 将确凿证据与微弱信号、缺失数据和推论区分开来
    - 在用户购买、注册或共享数据前，提供精准的风险判定及实用的后续建议
  es: |
    - Identifica la empresa, el dominio, el vendedor o el anuncio exacto que el usuario desea verificar
    - Busca en fuentes de reputación independientes, quejas, informes de estafas y perfiles comerciales oficiales
    - Lee el sitio web de destino para obtener datos de contacto, políticas de reembolso y envío, términos e información de privacidad
    - Comprueba señales del dominio y del sitio web, como dominios que no coinciden, indicios de registro reciente, redirecciones, páginas rotas o métodos de pago arriesgados
    - Separa las pruebas confirmadas de las señales débiles, los datos faltantes y las inferencias
    - Ofrece un veredicto de riesgo calibrado con pasos prácticos antes de que el usuario compre, se registre o comparta datos
  fr: |
    - Identifie l'entreprise, le domaine, le vendeur ou l'annonce exacte que tu souhaites vérifier
    - Recherche parmi des sources de réputation indépendantes, des plaintes, des rapports d'arnaque et des profils d'entreprise officiels
    - Analyse le site web cible pour trouver les coordonnées, les politiques de remboursement et d'expédition, les conditions générales et les informations de confidentialité
    - Vérifie les signaux du domaine et du site web tels que les domaines incohérents, les indices d'enregistrement récent, les redirections, les pages cassées ou les méthodes de paiement risquées
    - Distingue les preuves confirmées des signaux faibles, des données manquantes et des déductions
    - Donne un verdict de risque calibré avec des étapes concrètes avant que tu n'achètes, ne t'inscrives ou ne partages des données
  pt: |
    - Identifica a empresa, domínio, vendedor ou anúncio de marketplace exato que o usuário quer verificar
    - Pesquisa em fontes de reputação independentes, reclamações, relatórios de fraudes e perfis oficiais de empresas
    - Lê o site de destino em busca de detalhes de contato, políticas de reembolso e envio, termos e informações de privacidade
    - Verifica sinais do domínio e do site, como domínios incompatíveis, indícios de registro recente, redirecionamentos, páginas quebradas ou métodos de pagamento arriscados
    - Separa evidências confirmadas de sinais fracos, dados ausentes e inferências
    - Fornece um veredito de risco calibrado com os próximos passos práticos antes de o usuário comprar, se cadastrar ou compartilhar dados
  ru: |
    - Определяет конкретную компанию, домен, продавца или объявление на маркетплейсе, которые нужно проверить
    - Ищет информацию в независимых источниках репутации, жалобах, отчетах о мошенничестве и официальных профилях компаний
    - Изучает целевой сайт на наличие контактных данных, правил возврата и доставки, условий использования и политики конфиденциальности
    - Проверяет сигналы домена и сайта, такие как несовпадающие домены, признаки недавней регистрации, редиректы, битые страницы или рискованные способы оплаты
    - Отделяет подтвержденные доказательства от слабых сигналов, недостающих данных и предположений
    - Выносит взвешенный вердикт о рисках с практическими рекомендациями перед тем, как пользователь совершит покупку, зарегистрируется или передаст данные
  ja: |
    - 調査対象となる特定の企業、ドメイン、販売者、または出品情報を特定します
    - 独立した評判サイト、苦情、詐欺レポート、公式プロフィールを横断的に検索します
    - 対象サイトの連絡先、返金・配送ポリシー、利用規約、プライバシー情報を確認します
    - ドメインの不一致、新規登録、リダイレクト、リンク切れ、不審な決済方法などのシグナルを検証します
    - 確定的な証拠と、信憑性の低い情報、不足データ、推測を切り分けます
    - 購入や登録、データ共有の前に、具体的な対策を含めたリスク判定を提示します
  ko: |
    - 사용자가 확인하려는 정확한 업체, 도메인, 판매자 또는 마켓플레이스 매물을 식별합니다
    - 독립적인 평판 소스, 불만 사항, 사기 신고 및 공식 비즈니스 프로필을 검색합니다
    - 대상 웹사이트에서 연락처 정보, 환불 및 배송 정책, 약관, 개인정보 보호 정보를 읽습니다
    - 일치하지 않는 도메인, 최근 등록 흔적, 리디렉션, 깨진 페이지 또는 위험한 결제 수단과 같은 도메인 및 웹사이트 신호를 확인합니다
    - 확인된 증거를 약한 신호, 누락된 데이터 및 추론과 분리합니다
    - 사용자가 구매, 가입 또는 데이터를 공유하기 전에 실질적인 다음 단계와 함께 정밀한 위험 판정을 제공합니다
  it: |
    - Identifica l'esatta attività, dominio, venditore o annuncio del marketplace che l'utente desidera controllare
    - Cerca tra fonti di reputazione indipendenti, reclami, segnalazioni di truffe e profili aziendali ufficiali
    - Analizza il sito web di destinazione per dettagli di contatto, politiche di rimborso e spedizione, termini e informazioni sulla privacy
    - Controlla i segnali del dominio e del sito web come domini non corrispondenti, indizi di registrazione recente, reindirizzamenti, pagine interrotte o metodi di pagamento rischiosi
    - Separa le prove confermate dai segnali deboli, dai dati mancanti e dalle inferenze
    - Fornisce un verdetto di rischio calibrato con passaggi pratici successivi prima che l'utente acquisti, si registri o condivida dati
  tr: |
    - Kullanıcının kontrol edilmesini istediği işletmeyi, alanı, satıcıyı veya pazar yeri ilanını tam olarak belirler
    - Bağımsız itibar kaynakları, şikayetler, dolandırıcılık raporları ve resmi işletme profilleri arasında arama yapar
    - Hedef web sitesini iletişim bilgileri, iade ve gönderim politikaları, şartlar ve gizlilik bilgileri için okur
    - Uyuşmayan alan adları, yeni kayıt ipuçları, yönlendirmeler, bozuk sayfalar veya riskli ödeme yöntemleri gibi alan adı ve web sitesi sinyallerini kontrol eder
    - Doğrulanmış kanıtları zayıf sinyallerden, eksik verilerden ve çıkarımlardan ayırır
    - Kullanıcı satın almadan, kaydolmadan veya veri paylaşmadan önce pratik adımlar içeren kalibre edilmiş bir risk kararı verir
  vi: |
    - Xác định chính xác doanh nghiệp, tên miền, người bán hoặc danh sách sàn thương mại điện tử mà người dùng muốn kiểm tra
    - Tìm kiếm trên các nguồn uy tín độc lập, khiếu nại, báo cáo lừa đảo và hồ sơ doanh nghiệp chính thức
    - Đọc trang web mục tiêu để biết chi tiết liên hệ, chính sách hoàn tiền và vận chuyển, các điều khoản và thông tin quyền riêng tư
    - Kiểm tra các tín hiệu của tên miền và trang web như tên miền không khớp, dấu hiệu đăng ký gần đây, chuyển hướng, trang lỗi hoặc phương thức thanh toán rủi ro
    - Phân tách bằng chứng đã xác nhận với các tín hiệu yếu, dữ liệu thiếu và suy luận
    - Đưa ra phán quyết rủi ro đã được hiệu chỉnh cùng các bước tiếp theo thực tế trước khi người dùng mua hàng, đăng ký hoặc chia sẻ dữ liệu
  id: |
    - Mengidentifikasi bisnis, domain, penjual, atau listing marketplace yang ingin diperiksa pengguna
    - Mencari di berbagai sumber reputasi independen, keluhan, laporan penipuan, dan profil bisnis resmi
    - Membaca situs web target untuk detail kontak, kebijakan pengembalian dan pengiriman, ketentuan, serta informasi privasi
    - Memeriksa sinyal domain dan situs web seperti domain yang tidak cocok, petunjuk pendaftaran baru, pengalihan, halaman rusak, atau metode pembayaran berisiko
    - Memisahkan bukti yang terkonfirmasi dari sinyal lemah, data yang hilang, dan inferensi
    - Memberikan penilaian risiko yang terkalibrasi dengan langkah selanjutnya yang praktis sebelum pengguna membeli, mendaftar, atau membagikan data
  pl: |
    - Identyfikuje konkretną firmę, domenę, sprzedawcę lub ofertę, którą użytkownik chce sprawdzić
    - Przeszukuje niezależne źródła opinii, skargi, raporty o oszustwach i oficjalne profile firm
    - Analizuje docelową stronę pod kątem danych kontaktowych, polityki zwrotów i wysyłki, regulaminu oraz informacji o prywatności
    - Sprawdza sygnały dotyczące domeny i strony, takie jak niezgodne domeny, niedawna rejestracja, przekierowania, niedziałające podstrony lub ryzykowne metody płatności
    - Oddziela potwierdzone dowody od słabych sygnałów, brakujących danych i wniosków
    - Daje precyzyjny werdykt dotyczący ryzyka wraz z praktycznymi krokami przed zakupem, rejestracją lub udostępnieniem danych
  nl: |
    - Identificeert het exacte bedrijf, domein, de verkoper of de marktplaatsadvertentie die de gebruiker wil laten controleren
    - Zoekt in onafhankelijke reputatiebronnen, klachten, oplichtingsrapporten en officiële bedrijfsprofielen
    - Leest de doelwebsite voor contactgegevens, retour- en verzendbeleid, voorwaarden en privacyinformatie
    - Controleert domein- en websitesignalen zoals niet-overeenkomende domeinen, aanwijzingen voor recente registratie, redirects, kapotte pagina's of risicovolle betaalmethoden
    - Scheidt bevestigd bewijs van zwakke signalen, ontbrekende gegevens en aannames
    - Geeft een gekalibreerd risico-oordeel met praktische vervolgstappen voordat de gebruiker iets koopt, zich aanmeldt of gegevens deelt
  ar: |
    - يحدد النشاط التجاري أو النطاق أو البائع أو قائمة السوق المحددة التي يريد المستخدم فحصها
    - يبحث في مصادر السمعة المستقلة، والشكاوى، وبلاغات الاحتيال، والملفات التجارية الرسمية
    - يقرأ الموقع المستهدف للحصول على تفاصيل الاتصال، وسياسات الاسترداد والشحن، والشروط، ومعلومات الخصوصية
    - يفحص إشارات النطاق والموقع مثل النطاقات غير المتطابقة، أو أدلة التسجيل الحديثة، أو إعادة التوجيه، أو الصفحات المعطلة، أو طرق الدفع المحفوفة بالمخاطر
    - يفصل بين الأدلة المؤكدة والإشارات الضعيفة والبيانات المفقودة والاستنتاجات
    - يقدم حكماً مدروساً بشأن المخاطر مع خطوات عملية تالية قبل أن يقوم المستخدم بالشراء أو التسجيل أو مشاركة البيانات
  hi: |
    - उस सटीक व्यवसाय, डोमेन, विक्रेता या मार्केटप्लेस लिस्टिंग की पहचान करता है जिसे उपयोगकर्ता चेक करना चाहता है
    - स्वतंत्र प्रतिष्ठा स्रोतों, शिकायतों, स्कैम रिपोर्टों और आधिकारिक व्यावसायिक प्रोफाइल में खोज करता है
    - संपर्क विवरण, रिफंड और शिपिंग नीतियों, शर्तों और गोपनीयता जानकारी के लिए लक्षित वेबसाइट को पढ़ता है
    - डोमेन और वेबसाइट संकेतों की जांच करता है जैसे कि बेमेल डोमेन, हालिया पंजीकरण सुराग, रीडायरेक्ट, टूटे हुए पेज, या जोखिम भरे भुगतान के तरीके
    - पुष्ट साक्ष्यों को कमजोर संकेतों, गायब डेटा और अनुमानों से अलग करता है
    - उपयोगकर्ता द्वारा खरीदने, साइन अप करने या डेटा साझा करने से पहले व्यावहारिक अगले कदमों के साथ एक नपा-तुला जोखिम फैसला देता है
  th: |
    - ระบุธุรกิจ โดเมน ผู้ขาย หรือรายการในมาร์เก็ตเพลสที่ผู้ใช้ต้องการตรวจสอบอย่างชัดเจน
    - ค้นหาจากแหล่งข้อมูลชื่อเสียงที่เป็นอิสระ ข้อร้องเรียน รายงานการหลอกลวง และโปรไฟล์ธุรกิจอย่างเป็นทางการ
    - อ่านข้อมูลในเว็บไซต์เป้าหมายเพื่อหาข้อมูลติดต่อ นโยบายการคืนเงินและการจัดส่ง ข้อกำหนด และข้อมูลความเป็นส่วนตัว
    - ตรวจสอบสัญญาณของโดเมนและเว็บไซต์ เช่น โดเมนที่ไม่ตรงกัน เบาะแสการจดทะเบียนล่าสุด การเปลี่ยนเส้นทาง หน้าที่เสีย หรือวิธีการชำระเงินที่มีความเสี่ยง
    - แยกหลักฐานที่ได้รับการยืนยันออกจากสัญญาณที่อ่อน ข้อมูลที่ขาดหาย และการอนุมาน
    - ให้คำตัดสินความเสี่ยงที่แม่นยำพร้อมขั้นตอนถัดไปที่นำไปใช้ได้จริง ก่อนที่ผู้ใช้จะซื้อ ลงทะเบียน หรือแชร์ข้อมูล
  cs: |
    - Identifikuje konkrétní firmu, doménu, prodejce nebo nabídku na tržišti, kterou chceš prověřit
    - Prohledává nezávislé zdroje hodnocení, stížnosti, hlášení o podvodech a oficiální profily firem
    - Prochází cílový web a hledá kontaktní údaje, zásady vracení peněz a dopravy, obchodní podmínky a informace o ochraně soukromí
    - Kontroluje signály domény a webu, jako jsou neshodující se domény, nedávná registrace, přesměrování, nefunkční stránky nebo rizikové platební metody
    - Odděluje potvrzené důkazy od slabých signálů, chybějících dat a domněnek
    - Poskytuje vyvážený verdikt o riziku s praktickými dalšími kroky, než nakoupíš, zaregistruješ se nebo nasdílíš údaje
  sv: |
    - Identifierar exakt det företag, den domän, säljare eller marknadsplatsannons som användaren vill kontrollera
    - Söker i oberoende rykteskällor, klagomål, bedrägerirapporter och officiella företagsprofiler
    - Läser målwebbplatsen för kontaktuppgifter, återbetalnings- och fraktpolicyer, villkor och integritetsinformation
    - Kontrollerar domän- och webbplatssignaler som felaktiga domäner, ledtrådar om nyligen gjorda registreringar, omdirigeringar, trasiga sidor eller riskfyllda betalningsmetoder
    - Skiljer bekräftade bevis från svaga signaler, saknade data och slutsatser
    - Ger ett kalibrerat riskutlåtande med praktiska nästa steg innan användaren köper, registrerar sig eller delar data
  he: |
    - מזהה את העסק, הדומיין, המוכר או הרישום בזירת המסחר המדויקים שהמשתמש רוצה לבדוק
    - מחפש במקורות מוניטין עצמאיים, תלונות, דיווחי הונאה ופרופילי עסק רשמיים
    - סורק את אתר היעד לאיתור פרטי התקשרות, מדיניות החזרים ומשלוחים, תנאי שימוש ומידע על פרטיות
    - בודק סימנים בדומיין ובאתר כגון חוסר התאמה בין דומיינים, רמזים לרישום לאחרונה, הפניות, דפים שבורים או אמצעי תשלום מסוכנים
