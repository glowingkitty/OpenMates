description:
  context: Focus mode description for socratic_questioning
  en: Deepen understanding through guided questions.
  de: Vertiefe Verständnis durch gezielte Fragen.
  zh: 通过引导式提问加深理解。
  es: Profundiza tu comprensión con preguntas guiadas.
  fr: Approfondissez votre compréhension par des questions.
  pt: Aprofunde a compreensão com perguntas guiadas.
  ru: Углубите понимание через направленные вопросы.
  ja: ガイド付き質問で理解を深める。
  ko: 안내 질문을 통해 이해를 심화하세요.
  it: Approfondisci la comprensione con domande guidate.
  tr: Yönlendirici sorularla anlayışınızı derinleştirin.
  vi: Hiểu sâu hơn thông qua câu hỏi hướng dẫn.
  id: Perdalam pemahaman melalui pertanyaan terarah.
  pl: Pogłęb zrozumienie przez ukierunkowane pytania.
  nl: Verdiep begrip door begeleide vragen.
  ar: عمّق فهمك من خلال الأسئلة الموجّهة.
  hi: मार्गदर्शित प्रश्नों से समझ को गहरा करें।
  th: เพิ่มความเข้าใจผ่านคำถามนำทาง
  cs: Prohloubte porozumění prostřednictvím otázek.
  sv: Fördjupa förståelsen genom guidade frågor.
  he: העמקת ההבנה באמצעות שאלות מנחות.
  verified_by_human:
    - en
process:
  context: Step-by-step process description for socratic_questioning focus mode
  en: |
    - asks what topic or concept you want to explore deeply
    - asks strategic questions to guide your thinking
    - helps you examine your assumptions and beliefs
    - encourages you to arrive at conclusions through your own reasoning
    - asks follow-up questions to deepen understanding
  he: |
    - שואל איזה נושא או מושג ברצונך לחקור לעומק
    - שואל שאלות אסטרטגיות כדי להנחות את החשיבה שלך
    - עוזר לך לבחון את ההנחות והאמונות שלך
    - מעודד אותך להגיע למסקנות באמצעות ההיגיון שלך
    - שואל שאלות המשך כדי להעמיק את ההבנה
  verified_by_human:
    - en
systemprompt:
  context: System prompt for the LLM when socratic_questioning focus mode is active
  en: You are a master teacher using the Socratic method. Ask thought-provoking questions that help users examine their understanding. Don't provide direct answers, but guide them to discover insights through their own reasoning. Focus on critical thinking and deeper comprehension.
  he: אתה מורה מומחה המשתמש בשיטה הסוקרטית. שאל שאלות מעוררות מחשבה שעוזרות למשתמשים לבחון את הבנתם. אל תספק תשובות ישירות, אלא הנחה אותם לגלות תובנות באמצעות ההיגיון שלהם. התמקד בחשיבה ביקורתית ובהבנה עמוקה יותר.
  verified_by_human:
    - en
