this_email_was_sent_by_self_hosted:
  context: text in the footer of the email for self-hosted versions
  en: "This email was sent by a self hosted version of OpenMates. Which is independently run &amp; maintained. Check OpenMates.org for the official cloud edition."
  de: "Diese E-Mail wurde von einer selbst gehosteten Version von OpenMates gesendet. Diese wird unabhängig betrieben &amp; gewartet. Besuche OpenMates.org für die offizielle Cloud-Version."
  zh: "此电子邮件由 OpenMates 的自托管版本发送。该版本独立运行和维护。访问 OpenMates.org 获取官方云版本。"
  es: "Este correo fue enviado por una versión auto alojada de OpenMates. Que es ejecutada y mantenida de forma independiente. Consulta OpenMates.org para la edición oficial en la nube."
  fr: "Cet e-mail a été envoyé par une version auto-hébergée de OpenMates. Qui est gérée et maintenue de manière indépendante. Consultez OpenMates.org pour l'édition cloud officielle."
  pt: "Este e-mail foi enviado por uma versão auto-hospedada do OpenMates. Que é executada e mantida de forma independente. Consulte OpenMates.org para a edição oficial na nuvem."
  ru: "Это письмо было отправлено самостоятельно размещённой версией OpenMates. Которая работает и обслуживается независимо. Проверьте OpenMates.org для официального облачного издания."
  ja: "このメールは、OpenMatesのセルフホスト版から送信されました。これは独立して運営・保守されています。公式クラウド版についてはOpenMates.orgをご確認ください。"
  ko: "이 이메일은 OpenMates의 자체 호스팅 버전에서 보낸 것입니다. 독립적으로 운영 및 유지 관리됩니다. 공식 클라우드 버전은 OpenMates.org를 확인하세요."
  it: "Questa email è stata inviata da una versione self-hosted di OpenMates. Che è gestita e mantenuta in modo indipendente. Controlla OpenMates.org per l'edizione cloud ufficiale."
  tr: "Bu e-posta, OpenMates'in kendi kendine barındırılan bir sürümü tarafından gönderildi. Bağımsız olarak çalıştırılır ve bakımı yapılır. Resmi bulut sürümü için OpenMates.org'a bakın."
  vi: "Email này được gửi bởi phiên bản tự lưu trữ của OpenMates. Được vận hành và bảo trì độc lập. Kiểm tra OpenMates.org để biết phiên bản đám mây chính thức."
  id: "Email ini dikirim oleh versi self-hosted dari OpenMates. Yang dijalankan dan dipelihara secara independen. Periksa OpenMates.org untuk edisi cloud resmi."
  pl: "Ten e-mail został wysłany przez samodzielnie hostowaną wersję OpenMates. Która jest niezależnie uruchamiana i utrzymywana. Sprawdź OpenMates.org dla oficjalnej edycji w chmurze."
  nl: "Dit e-mailbericht is verzonden door een zelf gehoste versie van OpenMates. Die onafhankelijk wordt beheerd en onderhouden. Bekijk OpenMates.org voor de officiële cloud-editie."
  ar: "تم إرسال هذا البريد الإلكتروني بواسطة نسخة مستضافة ذاتيًا من OpenMates. يتم تشغيلها وصيانتها بشكل مستقل. تحقق من OpenMates.org للإصدار الرسمي السحابي."
  hi: "यह ईमेल OpenMates के स्व-होस्टेड संस्करण द्वारा भेजा गया था। जो स्वतंत्र रूप से चलाया और रखरखाव किया जाता है। आधिकारिक क्लाउड संस्करण के लिए OpenMates.org देखें।"
  th: "อีเมลนี้ถูกส่งโดยเวอร์ชันที่โฮสต์เองของ OpenMates ซึ่งดำเนินการและบำรุงรักษาอย่างอิสระ ตรวจสอบ OpenMates.org สำหรับฉบับคลาวด์ทางการ"
  cs: "Tento e-mail byl odeslán vlastní hostovanou verzí OpenMates. Která je nezávisle provozována a udržována. Zkontrolujte OpenMates.org pro oficiální cloudové vydání."
  sv: "Detta e-postmeddelande skickades av en självhostad version av OpenMates. Som körs och underhålls oberoende. Kolla OpenMates.org för den officiella molneditionen."
  he: אימייל זה נשלח על ידי גרסה באירוח עצמי של OpenMates, המופעלת ומתוחזקת באופן עצמאי. בדוק ב-OpenMates.org את מהדורת הענן הרשמית.
