storage_billing_failed_2.body:
  context: "Email body for second storage billing failure. Variables: {storage_gb}, {credits_needed}"
  en: "This is your second missed storage payment. You have {storage_gb} GB stored on OpenMates requiring {credits_needed} credits per week, but your balance is still too low."
  de: "Dies ist deine zweite verpasste Speicherzahlung. Du hast {storage_gb} GB bei OpenMates gespeichert, wofür {credits_needed} Credits pro Woche benötigt werden, aber dein Guthaben ist immer noch zu niedrig."
  zh: "这是您第二次错过存储付款。您在 OpenMates 存储了 {storage_gb} GB，每周需要 {credits_needed} 个积分，但您的余额仍然不足。"
  es: "Este es tu segundo pago de almacenamiento fallido. Tienes {storage_gb} GB almacenados en OpenMates que requieren {credits_needed} créditos por semana, pero tu saldo sigue siendo demasiado bajo."
  fr: "C'est votre deuxième paiement de stockage manqué. Vous avez {storage_gb} Go stockés sur OpenMates nécessitant {credits_needed} crédits par semaine, mais votre solde est toujours trop faible."
  pt: "Este é o seu segundo pagamento de armazenamento perdido. Você tem {storage_gb} GB armazenados no OpenMates requerendo {credits_needed} créditos por semana, mas seu saldo ainda está muito baixo."
  ru: "Это ваш второй пропущенный платёж за хранилище. У вас хранится {storage_gb} ГБ на OpenMates, что требует {credits_needed} кредитов в неделю, но баланс всё ещё слишком мал."
  ja: "2回目のストレージ支払いの未払いです。OpenMatesに{storage_gb} GBを保存しており、週{credits_needed}クレジットが必要ですが、残高がまだ不足しています。"
  ko: "두 번째 저장소 결제 미납입니다. OpenMates에 {storage_gb} GB가 저장되어 있으며 주당 {credits_needed} 크레딧이 필요하지만 잔액이 여전히 너무 낮습니다."
  it: "Questo è il tuo secondo pagamento di archiviazione mancato. Hai {storage_gb} GB archiviati su OpenMates che richiedono {credits_needed} crediti a settimana, ma il saldo è ancora troppo basso."
  tr: "Bu, kaçırdığınız ikinci depolama ödemesidir. OpenMates'te {storage_gb} GB depolanmış olup haftada {credits_needed} kredi gerekmektedir, ancak bakiyeniz hâlâ çok düşüktür."
  vi: "Đây là lần thanh toán lưu trữ thứ hai bị bỏ lỡ. Bạn có {storage_gb} GB được lưu trữ trên OpenMates yêu cầu {credits_needed} tín dụng mỗi tuần, nhưng số dư vẫn còn quá thấp."
  id: "Ini adalah pembayaran penyimpanan kedua yang terlewat. Anda memiliki {storage_gb} GB tersimpan di OpenMates yang memerlukan {credits_needed} kredit per minggu, tetapi saldo Anda masih terlalu rendah."
  pl: "To jest drugi niewykonany płatność za przechowywanie. Masz {storage_gb} GB przechowywane w OpenMates wymagające {credits_needed} kredytów tygodniowo, ale saldo jest wciąż zbyt niskie."
  nl: "Dit is je tweede gemiste opslagbetaling. Je hebt {storage_gb} GB opgeslagen op OpenMates dat {credits_needed} credits per week vereist, maar je saldo is nog steeds te laag."
  ar: "هذه هي المدفوعة الثانية للتخزين التي فاتتك. لديك {storage_gb} جيجابايت مخزنة على OpenMates تتطلب {credits_needed} رصيدًا في الأسبوع، لكن رصيدك لا يزال منخفضًا جدًا."
  hi: "यह आपका दूसरा छूटा हुआ स्टोरेज भुगतान है। आपके OpenMates पर {storage_gb} GB संग्रहीत है जिसके लिए प्रति सप्ताह {credits_needed} क्रेडिट की आवश्यकता है, लेकिन आपका शेष अभी भी बहुत कम है।"
  th: "นี่คือการชำระเงินพื้นที่จัดเก็บครั้งที่สองที่พลาดไป คุณมี {storage_gb} GB จัดเก็บอยู่บน OpenMates ซึ่งต้องใช้ {credits_needed} เครดิตต่อสัปดาห์ แต่ยอดคงเหลือยังต่ำเกินไป"
  cs: "Toto je vaše druhá zmeškaná platba za úložiště. Máte uloženo {storage_gb} GB na OpenMates vyžadující {credits_needed} kreditů týdně, ale váš zůstatek je stále příliš nízký."
  sv: "Det här är din andra missade lagringsbetalning. Du har {storage_gb} GB lagrat på OpenMates som kräver {credits_needed} credits per vecka, men ditt saldo är fortfarande för lågt."
  he: 'זהו התשלום השני על האחסון שלא בוצע. יש לך {storage_gb} ג"ב מאוחסנים ב-OpenMates הדורשים {credits_needed} קרדיטים בשבוע, אך היתרה שלך עדיין נמוכה מדי.'
  verified_by_human: []
storage_billing_failed_2.action:
  context: Call-to-action text in second storage billing failure email
  en: "Top up your credits now. Your files will be deleted if payment fails for 2 more weeks."
  de: "Lade dein Guthaben jetzt auf. Deine Dateien werden gelöscht, wenn die Zahlung noch 2 weitere Wochen fehlschlägt."
  zh: "请立即充值积分。如果再连续 2 周付款失败，您的文件将被删除。"
  es: "Recarga tus créditos ahora. Tus archivos serán eliminados si el pago falla durante 2 semanas más."
  fr: "Rechargez vos crédits maintenant. Vos fichiers seront supprimés si le paiement échoue pendant encore 2 semaines."
  pt: "Recarregue seus créditos agora. Seus arquivos serão excluídos se o pagamento falhar por mais 2 semanas."
  ru: "Пополните кредиты прямо сейчас. Ваши файлы будут удалены, если платёж не пройдёт ещё 2 недели."
  ja: "今すぐクレジットをチャージしてください。あと2週間支払いが失敗すると、ファイルは削除されます。"
  ko: "지금 크레딧을 충전하세요. 결제가 2주 더 실패하면 파일이 삭제됩니다."
  it: "Ricarica subito i tuoi crediti. I tuoi file verranno eliminati se il pagamento fallisce per altre 2 settimane."
  tr: "Kredinizi hemen doldurun. Ödeme 2 hafta daha başarısız olursa dosyalarınız silinecektir."
  vi: "Nạp thêm tín dụng ngay bây giờ. Tệp của bạn sẽ bị xóa nếu thanh toán thất bại thêm 2 tuần nữa."
  id: "Isi ulang kredit Anda sekarang. File Anda akan dihapus jika pembayaran gagal selama 2 minggu lagi."
  pl: "Doładuj kredyty teraz. Twoje pliki zostaną usunięte jeśli płatność nie powiedzie się przez kolejne 2 tygodnie."
  nl: "Vul nu je credits aan. Je bestanden worden verwijderd als de betaling nog 2 weken mislukt."
  ar: "أعد تعبئة رصيدك الآن. سيتم حذف ملفاتك إذا فشل الدفع لمدة أسبوعين آخرين."
  hi: "अभी क्रेडिट टॉप अप करें। यदि 2 और सप्ताह भुगतान विफल होता है तो आपकी फ़ाइलें हटा दी जाएंगी।"
  th: "เติมเครดิตของคุณตอนนี้ ไฟล์ของคุณจะถูกลบหากการชำระเงินล้มเหลวอีก 2 สัปดาห์"
  cs: "Dobijte si kredity nyní. Vaše soubory budou smazány, pokud platba selže ještě 2 týdny."
  sv: "Fyll på dina credits nu. Dina filer raderas om betalningen misslyckas i ytterligare 2 veckor."
  he: עליך להטעין קרדיטים כעת. הקבצים שלך יימחקו אם התשלום ייכשל במשך שבועיים נוספים.
