withdrawal_waiver_notice:
  context: Legal notice about withdrawal waiver in purchase confirmation email
  en: "You have expressly requested that we begin providing the digital service before the withdrawal period ends. You acknowledge that your right of withdrawal expires once you start using the service. Purchased gift cards are excluded and cannot be refunded once they have been used."
  de: "Sie haben ausdrücklich verlangt, dass wir mit der Bereitstellung des digitalen Dienstes beginnen, bevor die Widerrufsfrist endet. Sie erkennen an, dass Ihr Widerrufsrecht erlischt, sobald Sie mit der Nutzung des Dienstes beginnen. Gekaufte Geschenkkarten sind ausgeschlossen und können nach Verwendung nicht erstattet werden."
  zh: "您已明确要求我们在撤回期结束之前开始提供数字服务。您承认一旦开始使用该服务，您的撤回权即告失效。购买的礼品卡被排除在外，使用后无法退款。"
  es: "Ha solicitado expresamente que comencemos a prestar el servicio digital antes de que finalice el período de desistimiento. Reconoce que su derecho de desistimiento expira una vez que comience a utilizar el servicio. Las tarjetas de regalo compradas están excluidas y no pueden reembolsarse una vez utilizadas."
  fr: "Vous avez expressément demandé que nous commencions à fournir le service numérique avant la fin de la période de rétractation. Vous reconnaissez que votre droit de rétractation expire une fois que vous commencez à utiliser le service. Les cartes cadeaux achetées sont exclues et ne peuvent pas être remboursées une fois utilisées."
  pt: "Você solicitou expressamente que começássemos a fornecer o serviço digital antes do término do período de rescisão. Você reconhece que seu direito de rescisão expira assim que você começa a usar o serviço. Os cartões-presente adquiridos estão excluídos e não podem ser reembolsados após serem utilizados."
  ru: "Вы прямо потребовали начать предоставление цифровой услуги до истечения периода отзыва. Вы подтверждаете, что ваше право на отзыв истекает после начала использования услуги. Приобретённые подарочные карты исключены и не могут быть возвращены после использования."
  ja: "お客様は、撤回期間が終了する前にデジタルサービスの提供を開始するよう明示的に要求されました。サービスの使用を開始すると撤回権が失効することを承認されます。購入したギフトカードは除外され、使用後は返金できません。"
  ko: "귀하는 철회 기간이 종료되기 전에 디지털 서비스 제공을 시작하도록 명시적으로 요청하였습니다. 서비스 이용을 시작하면 철회권이 소멸됨을 인정합니다. 구입한 기프트 카드는 제외되며 사용 후 환불이 불가능합니다."
  it: "Ha espressamente richiesto che iniziassimo a fornire il servizio digitale prima della scadenza del periodo di recesso. Riconosce che il diritto di recesso scade nel momento in cui inizia a utilizzare il servizio. Le carte regalo acquistate sono escluse e non possono essere rimborsate una volta utilizzate."
  tr: "Dijital hizmetin, cayma süresi sona ermeden önce sağlanmaya başlanmasını açıkça talep ettiniz. Hizmeti kullanmaya başladığınızda cayma hakkınızın sona ereceğini kabul ediyorsunuz. Satın alınan hediye kartları kapsam dışındadır ve kullanıldıktan sonra iade edilemez."
  vi: "Bạn đã yêu cầu rõ ràng rằng chúng tôi bắt đầu cung cấp dịch vụ kỹ thuật số trước khi thời gian rút lui kết thúc. Bạn thừa nhận rằng quyền rút lui của bạn hết hiệu lực khi bạn bắt đầu sử dụng dịch vụ. Thẻ quà tặng đã mua bị loại trừ và không thể hoàn tiền sau khi đã sử dụng."
  id: "Anda telah secara tegas meminta kami untuk mulai menyediakan layanan digital sebelum periode penarikan berakhir. Anda mengakui bahwa hak penarikan Anda berakhir begitu Anda mulai menggunakan layanan. Kartu hadiah yang dibeli dikecualikan dan tidak dapat dikembalikan setelah digunakan."
  pl: "Wyraźnie zażądałeś, abyśmy rozpoczęli świadczenie usługi cyfrowej przed upływem okresu odstąpienia. Przyjmujesz do wiadomości, że prawo do odstąpienia wygasa z chwilą rozpoczęcia korzystania z usługi. Zakupione karty podarunkowe są wykluczone i nie podlegają zwrotowi po ich użyciu."
  nl: "U heeft uitdrukkelijk verzocht dat we de digitale dienst beginnen te verlenen voordat de herroepingstermijn afloopt. U erkent dat uw herroepingsrecht vervalt zodra u de dienst begint te gebruiken. Gekochte cadeaukaarten zijn uitgesloten en kunnen niet worden terugbetaald nadat ze zijn gebruikt."
  ar: "لقد طلبت صراحةً أن نبدأ في تقديم الخدمة الرقمية قبل انتهاء فترة الانسحاب. تقر بأن حق الانسحاب الخاص بك ينتهي بمجرد بدء استخدام الخدمة. بطاقات الهدايا المشتراة مستثناة ولا يمكن استردادها بعد استخدامها."
  hi: "आपने स्पष्ट रूप से अनुरोध किया है कि हम वापसी अवधि समाप्त होने से पहले डिजिटल सेवा प्रदान करना शुरू करें। आप स्वीकार करते हैं कि सेवा का उपयोग शुरू करने पर आपका वापसी का अधिकार समाप्त हो जाता है। खरीदे गए गिफ्ट कार्ड बाहर रखे गए हैं और उपयोग के बाद वापस नहीं किए जा सकते।"
  th: "คุณได้ร้องขออย่างชัดเจนให้เราเริ่มให้บริการดิจิทัลก่อนที่ระยะเวลาการถอนตัวจะสิ้นสุดลง คุณรับทราบว่าสิทธิ์ในการถอนตัวของคุณจะหมดอายุเมื่อคุณเริ่มใช้บริการ บัตรของขวัญที่ซื้อจะถูกยกเว้นและไม่สามารถขอเงินคืนได้หลังจากใช้แล้ว"
  cs: "Výslovně jste požádal, abychom začali poskytovat digitální službu před uplynutím doby na odstoupení. Berete na vědomí, že vaše právo na odstoupení zaniká, jakmile začnete službu využívat. Zakoupené dárkové karty jsou vyloučeny a po jejich použití je nelze vrátit."
  sv: "Du begärde uttryckligen att vi ska börja tillhandahålla den digitala tjänsten innan ångerfristen löper ut. Du erkänner att din ångerrätt upphör när du börjar använda tjänsten. Köpta presentkort är undantagna och kan inte återbetalas efter att de har använts."
  he: ביקשת במפורש שנתחיל לספק את השירות הדיגיטלי לפני סיום תקופת הביטול. אתה מאשר שזכות הביטול שלך פוקעת ברגע שהתחלת להשתמש בשירות. כרטיסי מתנה שנרכשו אינם נכללים ולא ניתן לקבל עבורם החזר לאחר שנעשה בהם שימוש.
  verified_by_human: []
