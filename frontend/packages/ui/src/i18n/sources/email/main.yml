storage_billing_failed_1.body:
  context: "Email body for first storage billing failure. Variables: {storage_gb} = total storage in GB, {credits_needed} = credits required"
  en: "You have {storage_gb} GB of files stored on OpenMates, which requires {credits_needed} credits per week. We were unable to charge your account this week because your credit balance is too low."
  de: "Du hast {storage_gb} GB an Dateien bei OpenMates gespeichert, wofür {credits_needed} Credits pro Woche benötigt werden. Wir konnten dein Konto diese Woche nicht belasten, da dein Guthaben zu niedrig ist."
  zh: "您在 OpenMates 存储了 {storage_gb} GB 的文件，每周需要 {credits_needed} 个积分。由于您的积分余额不足，本周无法扣费。"
  es: "Tienes {storage_gb} GB de archivos almacenados en OpenMates, lo que requiere {credits_needed} créditos por semana. No pudimos cobrar tu cuenta esta semana porque tu saldo de créditos es demasiado bajo."
  fr: "Vous avez {storage_gb} Go de fichiers stockés sur OpenMates, ce qui nécessite {credits_needed} crédits par semaine. Nous n'avons pas pu facturer votre compte cette semaine car votre solde de crédits est trop faible."
  pt: "Você tem {storage_gb} GB de arquivos armazenados no OpenMates, o que requer {credits_needed} créditos por semana. Não conseguimos cobrar sua conta esta semana porque seu saldo de créditos está muito baixo."
  ru: "У вас хранится {storage_gb} ГБ файлов на OpenMates, что требует {credits_needed} кредитов в неделю. Мы не смогли списать средства с вашего аккаунта на этой неделе, так как баланс кредитов слишком мал."
  ja: "OpenMatesに{storage_gb} GBのファイルを保存しており、週{credits_needed}クレジットが必要です。クレジット残高が不足しているため、今週の請求ができませんでした。"
  ko: "OpenMates에 {storage_gb} GB의 파일이 저장되어 있으며, 주당 {credits_needed} 크레딧이 필요합니다. 크레딧 잔액이 너무 낮아 이번 주에 청구할 수 없었습니다."
  it: "Hai {storage_gb} GB di file archiviati su OpenMates, che richiedono {credits_needed} crediti a settimana. Non siamo riusciti ad addebitare il tuo account questa settimana perché il saldo crediti è troppo basso."
  tr: "OpenMates'te {storage_gb} GB dosyanız depolanmış olup haftada {credits_needed} kredi gerekmektedir. Kredi bakiyeniz çok düşük olduğundan bu hafta hesabınızı tahsil edemedik."
  vi: "Bạn có {storage_gb} GB tệp được lưu trữ trên OpenMates, yêu cầu {credits_needed} tín dụng mỗi tuần. Chúng tôi không thể tính phí tài khoản của bạn tuần này vì số dư tín dụng quá thấp."
  id: "Anda memiliki {storage_gb} GB file yang tersimpan di OpenMates, yang memerlukan {credits_needed} kredit per minggu. Kami tidak dapat menagih akun Anda minggu ini karena saldo kredit terlalu rendah."
  pl: "Masz {storage_gb} GB plików przechowywanych w OpenMates, co wymaga {credits_needed} kredytów tygodniowo. Nie mogliśmy obciążyć Twojego konta w tym tygodniu, ponieważ saldo kredytów jest zbyt niskie."
  nl: "Je hebt {storage_gb} GB bestanden opgeslagen op OpenMates, waarvoor {credits_needed} credits per week nodig zijn. We konden je account deze week niet in rekening brengen omdat je creditsaldo te laag is."
  ar: "لديك {storage_gb} جيجابايت من الملفات المخزنة على OpenMates، مما يتطلب {credits_needed} رصيدًا في الأسبوع. لم نتمكن من تحصيل رسوم حسابك هذا الأسبوع لأن رصيدك منخفض جدًا."
  hi: "आपके OpenMates पर {storage_gb} GB फ़ाइलें संग्रहीत हैं, जिसके लिए प्रति सप्ताह {credits_needed} क्रेडिट की आवश्यकता होती है। इस सप्ताह आपके खाते से शुल्क नहीं लिया जा सका क्योंकि आपका क्रेडिट शेष बहुत कम है।"
  th: "คุณมีไฟล์ {storage_gb} GB ที่จัดเก็บอยู่บน OpenMates ซึ่งต้องใช้ {credits_needed} เครดิตต่อสัปดาห์ เราไม่สามารถเรียกเก็บเงินจากบัญชีของคุณสัปดาห์นี้เนื่องจากยอดคงเหลือเครดิตต่ำเกินไป"
  cs: "Máte uloženo {storage_gb} GB souborů na OpenMates, což vyžaduje {credits_needed} kreditů týdně. Tento týden jsme nemohli strhnout platbu z vašeho účtu, protože zůstatek kreditů je příliš nízký."
  sv: "Du har {storage_gb} GB filer lagrade på OpenMates, vilket kräver {credits_needed} credits per vecka. Vi kunde inte debitera ditt konto denna vecka eftersom ditt creditsaldo är för lågt."
  he: 'יש לך {storage_gb} ג"ב של קבצים המאוחסנים ב-OpenMates, הדורשים {credits_needed} קרדיטים בשבוע. לא הצלחנו לחייב את חשבונך השבוע מכיוון שיתרת הקרדיטים שלך נמוכה מדי.'
  verified_by_human: []
storage_billing_failed_1.action:
  context: Call-to-action text in first storage billing failure email
  en: "Please top up your credits to keep your files safe. If payment fails for 4 weeks in a row, your files will be permanently deleted."
  de: "Bitte lade dein Guthaben auf, um deine Dateien zu sichern. Wenn die Zahlung 4 Wochen in Folge fehlschlägt, werden deine Dateien dauerhaft gelöscht."
  zh: "请充值积分以保护您的文件安全。如果连续 4 周付款失败，您的文件将被永久删除。"
  es: "Por favor, recarga tus créditos para mantener tus archivos seguros. Si el pago falla durante 4 semanas seguidas, tus archivos serán eliminados permanentemente."
  fr: "Veuillez recharger vos crédits pour garder vos fichiers en sécurité. Si le paiement échoue pendant 4 semaines consécutives, vos fichiers seront supprimés définitivement."
  pt: "Por favor, recarregue seus créditos para manter seus arquivos seguros. Se o pagamento falhar por 4 semanas seguidas, seus arquivos serão excluídos permanentemente."
  ru: "Пожалуйста, пополните кредиты, чтобы ваши файлы оставались в безопасности. Если платёж не будет совершён 4 недели подряд, ваши файлы будут удалены навсегда."
  ja: "ファイルを安全に保つためにクレジットをチャージしてください。4週間連続で支払いが失敗した場合、ファイルは永久に削除されます。"
  ko: "파일을 안전하게 보관하려면 크레딧을 충전해 주세요. 4주 연속으로 결제에 실패하면 파일이 영구적으로 삭제됩니다."
  it: "Ricarica i tuoi crediti per mantenere i tuoi file al sicuro. Se il pagamento fallisce per 4 settimane consecutive, i tuoi file verranno eliminati definitivamente."
  tr: "Dosyalarınızı güvende tutmak için kredinizi doldurun. Ödeme 4 hafta üst üste başarısız olursa dosyalarınız kalıcı olarak silinecektir."
  vi: "Vui lòng nạp thêm tín dụng để giữ các tệp của bạn an toàn. Nếu thanh toán thất bại 4 tuần liên tiếp, tệp của bạn sẽ bị xóa vĩnh viễn."
  id: "Silakan isi ulang kredit Anda untuk menjaga file Anda tetap aman. Jika pembayaran gagal selama 4 minggu berturut-turut, file Anda akan dihapus permanen."
  pl: "Proszę doładuj kredyty, aby zachować bezpieczeństwo swoich plików. Jeśli płatność nie powiedzie się przez 4 kolejne tygodnie, pliki zostaną trwale usunięte."
  nl: "Vul je credits aan om je bestanden veilig te houden. Als de betaling 4 weken achter elkaar mislukt, worden je bestanden permanent verwijderd."
  ar: "يرجى تعبئة رصيدك للحفاظ على ملفاتك آمنة. إذا فشل الدفع 4 أسابيع متتالية، فسيتم حذف ملفاتك بشكل دائم."
  hi: "अपनी फ़ाइलों को सुरक्षित रखने के लिए कृपया क्रेडिट टॉप अप करें। यदि 4 सप्ताह लगातार भुगतान विफल होता है, तो आपकी फ़ाइलें स्थायी रूप से हटा दी जाएंगी।"
  th: "กรุณาเติมเครดิตเพื่อให้ไฟล์ของคุณปลอดภัย หากการชำระเงินล้มเหลว 4 สัปดาห์ติดต่อกัน ไฟล์ของคุณจะถูกลบอย่างถาวร"
  cs: "Dobijte prosím kredity, aby byly vaše soubory v bezpečí. Pokud platba selže 4 týdny za sebou, vaše soubory budou trvale smazány."
  sv: "Fyll på dina credits för att hålla dina filer säkra. Om betalningen misslyckas 4 veckor i rad kommer dina filer att raderas permanent."
  he: כדי לשמור על הקבצים שלך, עליך להטעין קרדיטים. אם התשלום ייכשל במשך 4 שבועות ברציפות, הקבצים שלך יימחקו לצמיתות.
  verified_by_human: []
