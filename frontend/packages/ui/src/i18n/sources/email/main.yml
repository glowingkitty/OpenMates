area_is_estimate:
  context: Explainer text for location estimate
  en: "The area is an estimate based on the IP address.

    Do you use a VPN? Then you will likely be shown

    in a different location than you actually are.

    "
  de: "Der Bereich ist eine Schätzung basierend auf der IP-Adresse.

    Verwendest du ein VPN? Dann wirst du wahrscheinlich

    an einem anderen Ort angezeigt, als du tatsächlich bist.

    "
  zh: "该区域是基于IP地址的估计。

    您使用VPN吗？如果是，您可能会

    显示在与实际位置不同的地方。

    "
  es: "El área es una estimación basada en la dirección IP.

    ¿Usas una VPN? Entonces probablemente se te mostrará

    en una ubicación diferente a la que realmente estás.

    "
  fr: "La localisation est une estimation basée sur l'adresse IP.

    Utilisez-vous un VPN ? Si oui, vous apparaîtrez probablement

    à un endroit différent de votre emplacement réel.

    "
  pt: "A área é uma estimativa baseada no endereço IP.

    Você usa uma VPN? Nesse caso, você provavelmente será exibido

    em um local diferente do que realmente está.

    "
  ru: "Область является приблизительной на основе IP-адреса.

    Вы используете VPN? В таком случае вы, вероятно, будете показаны

    в другом месте, чем вы находитесь на самом деле.

    "
  ja: "この場所はIPアドレスに基づく推定です。

    VPNを使用していますか？その場合、

    実際の場所とは異なる場所が表示されている可能性があります。

    "
  ko: "해당 지역은 IP 주소를 기반으로 한 추정입니다.

    VPN을 사용하고 계신가요? 그렇다면 실제 위치와

    다른 위치가 표시될 수 있습니다.

    "
  it: "L'area è una stima basata sull'indirizzo IP.

    Usi una VPN? In tal caso, probabilmente verrai mostrato

    in una posizione diversa da quella in cui ti trovi realmente.

    "
  tr: "Alan, IP adresine dayalı bir tahmindir.

    VPN kullanıyor musunuz? Öyleyse muhtemelen

    gerçekte bulunduğunuzdan farklı bir konumda gösterilirsiniz.

    "
  vi: "Khu vực này là ước tính dựa trên địa chỉ IP.

    Bạn có dùng VPN không? Nếu có, bạn có thể được hiển thị

    ở một vị trí khác so với vị trí thực của bạn.

    "
  id: "Area ini merupakan perkiraan berdasarkan alamat IP.

    Apakah Anda menggunakan VPN? Jika ya, Anda mungkin akan ditampilkan

    di lokasi yang berbeda dari lokasi Anda sebenarnya.

    "
  pl: "Obszar jest szacunkowy na podstawie adresu IP.

    Czy używasz VPN? W takim przypadku prawdopodobnie

    zostaniesz wyświetlony w innym miejscu niż faktycznie się znajdujesz.

    "
  nl: "Het gebied is een schatting op basis van het IP-adres.

    Gebruik je een VPN? Dan word je waarschijnlijk

    op een andere locatie weergegeven dan je werkelijk bent.

    "
  ar: "المنطقة تقدير مبني على عنوان IP.

    هل تستخدم VPN؟ إذا كان الأمر كذلك، فمن المحتمل أن يظهر

    موقع مختلف عن موقعك الحقيقي.

    "
  hi: "क्षेत्र IP पते के आधार पर एक अनुमान है।

    क्या आप VPN का उपयोग करते हैं? यदि हाँ, तो आप संभवतः

    अपनी वास्तविक स्थिति से भिन्न स्थान पर दिखाई देंगे।

    "
  th: "พื้นที่นี้เป็นการประมาณการตามที่อยู่ IP

    คุณใช้ VPN หรือไม่? ถ้าใช่ คุณอาจจะถูกแสดง

    ในสถานที่ที่แตกต่างจากที่คุณอยู่จริง

    "
  cs: "Oblast je odhad na základě IP adresy.

    Používáte VPN? V takovém případě budete pravděpodobně

    zobrazeni na jiném místě, než kde se skutečně nacházíte.

    "
  sv: "Området är en uppskattning baserad på IP-adressen.

    Använder du ett VPN? I så fall kommer du troligen att visas

    på en annan plats än du faktiskt befinner dig.

    "
  he: |
    האזור הוא הערכה המבוססת על כתובת ה-IP.
    האם אתה משתמש ב-VPN? אם כן, סביר להניח שיוצג
    מיקום שונה מהמיקום האמיתי שלך.
  verified_by_human: []
if_this_wasnt_you_react:
  context: Security advice in email body
  en: "If this was you, you can ignore this e-mail.

    If this wasn't you, react immediately:

    <a href='{logout_link}'>Click here to report this urgent incident.</a>

    "
  de: "Wenn das du warst, kannst du diese E-Mail ignorieren.

    Wenn das nicht du warst, reagiere sofort:

    <a href='{logout_link}'>Klicke hier, um diesen Vorfall zu melden.</a>

    "
  zh: "如果是您本人操作，可以忽略此电子邮件。

    如果不是您，请立即采取行动：

    <a href='{logout_link}'>点击此处报告此紧急事件。</a>

    "
  es: "Si fuiste tú, puedes ignorar este correo electrónico.

    Si no fuiste tú, reacciona inmediatamente:

    <a href='{logout_link}'>Haz clic aquí para reportar este incidente urgente.</a>

    "
  fr: "Si c'était vous, vous pouvez ignorer cet e-mail.

    Si ce n'était pas vous, réagissez immédiatement :

    <a href='{logout_link}'>Cliquez ici pour signaler cet incident urgent.</a>

    "
  pt: "Se foi você, pode ignorar este e-mail.

    Se não foi você, reaja imediatamente:

    <a href='{logout_link}'>Clique aqui para reportar este incidente urgente.</a>

    "
  ru: "Если это были вы, вы можете проигнорировать это письмо.

    Если это были не вы, реагируйте немедленно:

    <a href='{logout_link}'>Нажмите здесь, чтобы сообщить об этом срочном инциденте.</a>

    "
  ja: "あなた自身の操作であれば、このメールは無視してください。

    あなたの操作でない場合は、すぐに対応してください：

    <a href='{logout_link}'>ここをクリックして、この緊急事態を報告してください。</a>

    "
  ko: "이것이 본인의 행동이라면 이 이메일을 무시해도 됩니다.

    본인이 아니라면 즉시 조치하세요:

    <a href='{logout_link}'>여기를 클릭하여 이 긴급 사건을 보고하세요.</a>

    "
  it: "Se sei stato tu, puoi ignorare questa e-mail.

    Se non sei stato tu, reagisci immediatamente:

    <a href='{logout_link}'>Clicca qui per segnalare questo incidente urgente.</a>

    "
  tr: "Bu siz olduysanız, bu e-postayı yoksayabilirsiniz.

    Bu siz olmadıysanız, hemen harekete geçin:

    <a href='{logout_link}'>Bu acil olayı bildirmek için buraya tıklayın.</a>

    "
  vi: "Nếu đây là bạn, bạn có thể bỏ qua email này.

    Nếu không phải bạn, hãy phản ứng ngay lập tức:

    <a href='{logout_link}'>Nhấp vào đây để báo cáo sự cố khẩn cấp này.</a>

    "
  id: "Jika ini adalah Anda, Anda dapat mengabaikan email ini.

    Jika bukan Anda, segera ambil tindakan:

    <a href='{logout_link}'>Klik di sini untuk melaporkan insiden mendesak ini.</a>

    "
  pl: "Jeśli to byłeś ty, możesz zignorować ten e-mail.

    Jeśli to nie byłeś ty, zareaguj natychmiast:

    <a href='{logout_link}'>Kliknij tutaj, aby zgłosić ten pilny incydent.</a>

    "
  nl: "Als dit jij was, kun je deze e-mail negeren.

    Als dit jij niet was, reageer dan onmiddellijk:

    <a href='{logout_link}'>Klik hier om dit dringende incident te melden.</a>

    "
  ar: "إذا كنت أنت من فعل هذا، يمكنك تجاهل هذا البريد الإلكتروني.

    إذا لم تكن أنت، فتصرف فوراً:

    <a href='{logout_link}'>انقر هنا للإبلاغ عن هذا الحادث العاجل.</a>

    "
  hi: "यदि यह आप थे, तो आप इस ईमेल को अनदेखा कर सकते हैं।

    यदि यह आप नहीं थे, तो तुरंत प्रतिक्रिया करें:

    <a href='{logout_link}'>इस तत्काल घटना की रिपोर्ट करने के लिए यहां क्लिक करें।</a>

    "
  th: "ถ้าคุณทำสิ่งนี้ คุณสามารถเพิกเฉยต่ออีเมลนี้ได้

    ถ้าไม่ใช่คุณ ให้ดำเนินการทันที:

    <a href='{logout_link}'>คลิกที่นี่เพื่อรายงานเหตุการณ์เร่งด่วนนี้</a>

    "
  cs: "Pokud jste to byli vy, můžete tento e-mail ignorovat.

    Pokud jste to nebyli vy, okamžitě reagujte:

    <a href='{logout_link}'>Kliknutím zde nahlaste tento naléhavý incident.</a>

    "
  sv: "Om det var du kan du ignorera detta e-postmeddelande.

    Om det inte var du, reagera omedelbart:

    <a href='{logout_link}'>Klicka här för att rapportera detta brådskande incident.</a>

    "
  he: |
    אם זה היית אתה, ניתן להתעלם ממייל זה.
    אם זה לא היית אתה, פעל מיד:
    <a href='{logout_link}'>לחץ כאן כדי לדווח על אירוע דחוף זה.</a>
  verified_by_human: []
