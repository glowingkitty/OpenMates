click_here_for_refund:
  context: Refund instructions text in email body
  en: "Want a refund? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Click here</a> to request a refund for unused credits within 14 days after purchase."
  de: "Möchtest du eine Rückerstattung? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Klicke hier</a>, um eine Rückerstattung für ungenutzte Credits innerhalb von 14 Tagen nach dem Kauf anzufordern."
  zh: "想要退款？<a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>点击这里</a>在购买后14天内申请未使用点数的退款。"
  es: "¿Quieres un reembolso? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Haz clic aquí</a> para solicitar un reembolso por créditos no utilizados dentro de los 14 días posteriores a la compra."
  fr: "Vous souhaitez un remboursement ? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Cliquez ici</a> pour demander un remboursement des crédits non utilisés dans les 14 jours suivant l'achat."
  pt: "Quer um reembolso? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Clique aqui</a> para solicitar um reembolso por créditos não utilizados dentro de 14 dias após a compra."
  ru: "Хотите вернуть деньги? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Нажмите здесь</a>, чтобы запросить возврат за неиспользованные кредиты в течение 14 дней после покупки."
  ja: "返金をご希望ですか？<a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>ここをクリック</a>購入後14日以内の未使用クレジットの返金をリクエストするには。"
  ko: "환불을 원하시나요? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>여기를 클릭</a>하여 구매 후 14일 이내에 미사용 크레딧에 대한 환불을 요청하세요."
  it: "Vuoi un rimborso? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Clicca qui</a> per richiedere un rimborso per i crediti non utilizzati entro 14 giorni dall'acquisto."
  tr: "Para iadesi ister misiniz? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Buraya tıklayın</a> ve satın alma işleminden sonraki 14 gün içinde kullanılmayan krediler için para iadesi talep edin."
  vi: "Muốn hoàn tiền? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Nhấp vào đây</a> để yêu cầu hoàn tiền cho các tín dụng chưa sử dụng trong vòng 14 ngày sau khi mua."
  id: "Ingin pengembalian dana? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Klik di sini</a> untuk meminta pengembalian dana untuk kredit yang tidak digunakan dalam 14 hari setelah pembelian."
  pl: "Chcesz zwrot pieniędzy? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Kliknij tutaj</a>, aby poprosić o zwrot za niewykorzystane kredyty w ciągu 14 dni od zakupu."
  nl: "Wil je een terugbetaling? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>Klik hier</a> om een terugbetaling aan te vragen voor ongebruikte credits binnen 14 dagen na aankoop."
  ar: "هل تريد استردادًا؟ <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>انقر هنا</a> لطلب استرداد الأموال للرصيد غير المستخدم خلال 14 يومًا من الشراء."
  hi: "वापसी चाहते हैं? <a href='{refund_link}' style='color: #4867CD; text-decoration: underline;'>यहां क्लिक करें</a> खरीद के 14 दिनों के भीतर अप्रयुक्त क्रेडिट के लिए वापसी का अनुरोध करने के लिए।"
