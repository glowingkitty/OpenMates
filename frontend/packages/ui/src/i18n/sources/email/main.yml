storage_files_deleted.body:
  context: "Email body for files deleted confirmation. Variables: {storage_gb} = amount that was stored"
  en: "Your uploaded files ({storage_gb} GB) have been permanently deleted from OpenMates because your storage payment failed for 4 consecutive weeks. Your chat history is preserved — only the uploaded files were removed."
  de: "Deine hochgeladenen Dateien ({storage_gb} GB) wurden dauerhaft von OpenMates gelöscht, da deine Speicherzahlung 4 Wochen in Folge fehlgeschlagen ist. Dein Chatverlauf bleibt erhalten — nur die hochgeladenen Dateien wurden entfernt."
  zh: "由于您的存储付款连续 4 周失败，您上传的文件（{storage_gb} GB）已从 OpenMates 永久删除。您的聊天记录已保留 — 仅删除了上传的文件。"
  es: "Tus archivos subidos ({storage_gb} GB) han sido eliminados permanentemente de OpenMates porque tu pago de almacenamiento falló durante 4 semanas consecutivas. Tu historial de chat se conserva — solo se eliminaron los archivos subidos."
  fr: "Vos fichiers téléchargés ({storage_gb} Go) ont été définitivement supprimés d'OpenMates car votre paiement de stockage a échoué pendant 4 semaines consécutives. Votre historique de chat est préservé — seuls les fichiers téléchargés ont été supprimés."
  pt: "Seus arquivos enviados ({storage_gb} GB) foram excluídos permanentemente do OpenMates porque o pagamento de armazenamento falhou por 4 semanas consecutivas. Seu histórico de chat foi preservado — apenas os arquivos enviados foram removidos."
  ru: "Ваши загруженные файлы ({storage_gb} ГБ) были навсегда удалены из OpenMates, так как платёж за хранилище не прошёл 4 недели подряд. История чатов сохранена — удалены только загруженные файлы."
  ja: "4週間連続でストレージ支払いが失敗したため、アップロードされたファイル（{storage_gb} GB）はOpenMatesから永久に削除されました。チャット履歴は保持されています — アップロードされたファイルのみが削除されました。"
  ko: "저장소 결제가 4주 연속으로 실패하여 업로드한 파일({storage_gb} GB)이 OpenMates에서 영구적으로 삭제되었습니다. 채팅 기록은 보존됩니다 — 업로드된 파일만 제거되었습니다."
  it: "I tuoi file caricati ({storage_gb} GB) sono stati eliminati definitivamente da OpenMates perché il pagamento di archiviazione è fallito per 4 settimane consecutive. La cronologia delle chat è preservata — sono stati rimossi solo i file caricati."
  tr: "Yüklediğiniz dosyalar ({storage_gb} GB), depolama ödemeniz 4 hafta üst üste başarısız olduğu için OpenMates'ten kalıcı olarak silindi. Sohbet geçmişiniz korunmaktadır — yalnızca yüklenen dosyalar kaldırıldı."
  vi: "Các tệp đã tải lên của bạn ({storage_gb} GB) đã bị xóa vĩnh viễn khỏi OpenMates vì thanh toán lưu trữ thất bại trong 4 tuần liên tiếp. Lịch sử trò chuyện của bạn được bảo toàn — chỉ các tệp đã tải lên mới bị xóa."
  id: "File yang diunggah ({storage_gb} GB) telah dihapus permanen dari OpenMates karena pembayaran penyimpanan gagal selama 4 minggu berturut-turut. Riwayat obrolan Anda dipertahankan — hanya file yang diunggah yang dihapus."
  pl: "Twoje przesłane pliki ({storage_gb} GB) zostały trwale usunięte z OpenMates, ponieważ płatność za przechowywanie nie powiodła się przez 4 kolejne tygodnie. Historia czatów jest zachowana — usunięto tylko przesłane pliki."
  nl: "Je geüploade bestanden ({storage_gb} GB) zijn permanent verwijderd van OpenMates omdat je opslagbetaling 4 opeenvolgende weken is mislukt. Je chatgeschiedenis is bewaard — alleen de geüploade bestanden zijn verwijderd."
  ar: "تم حذف ملفاتك المرفوعة ({storage_gb} جيجابايت) بشكل دائم من OpenMates لأن الدفع مقابل التخزين فشل لمدة 4 أسابيع متتالية. تاريخ محادثاتك محفوظ — تم إزالة الملفات المرفوعة فقط."
  hi: "आपके अपलोड किए गए फ़ाइलें ({storage_gb} GB) OpenMates से स्थायी रूप से हटा दी गई हैं क्योंकि स्टोरेज भुगतान 4 लगातार सप्ताह विफल हुआ। आपका चैट इतिहास सुरक्षित है — केवल अपलोड की गई फ़ाइलें हटाई गई थीं।"
  th: "ไฟล์ที่อัปโหลดของคุณ ({storage_gb} GB) ถูกลบออกจาก OpenMates อย่างถาวรเพราะการชำระเงินพื้นที่จัดเก็บล้มเหลว 4 สัปดาห์ติดต่อกัน ประวัติแชทของคุณได้รับการเก็บรักษาไว้ — มีเพียงไฟล์ที่อัปโหลดเท่านั้นที่ถูกลบ"
  cs: "Vaše nahrané soubory ({storage_gb} GB) byly trvale odstraněny z OpenMates, protože platba za úložiště selhala 4 týdny za sebou. Historie chatů je zachována — odstraněny byly pouze nahrané soubory."
  sv: "Dina uppladdade filer ({storage_gb} GB) har raderats permanent från OpenMates eftersom din lagringsbetalning misslyckades 4 veckor i rad. Din chatthistorik är bevarad — bara de uppladdade filerna togs bort."
  he: "הקבצים שהעלית ({storage_gb} GB) נמחקו לצמיתות מ-OpenMates מכיוון שהתשלום עבור האחסון נכשל במשך 4 שבועות רצופים. היסטוריית הצ'אט שלך נשמרה – רק הקבצים שהועלו הוסרו."
  verified_by_human: []
storage_files_deleted.action:
  context: Text after deletion confirmation, encouraging user to top up and continue
  en: "You can continue using OpenMates and upload new files at any time by topping up your credits."
  de: "Du kannst OpenMates weiterhin nutzen und jederzeit neue Dateien hochladen, indem du dein Guthaben aufladest."
  zh: "您可以通过充值积分随时继续使用 OpenMates 并上传新文件。"
  es: "Puedes seguir usando OpenMates y subir nuevos archivos en cualquier momento recargando tus créditos."
  fr: "Vous pouvez continuer à utiliser OpenMates et télécharger de nouveaux fichiers à tout moment en rechargeant vos crédits."
  pt: "Você pode continuar usando o OpenMates e fazer upload de novos arquivos a qualquer momento recarregando seus créditos."
  ru: "Вы можете продолжать пользоваться OpenMates и загружать новые файлы в любое время, пополнив кредиты."
  ja: "クレジットをチャージすることで、引き続きOpenMatesを使用し、いつでも新しいファイルをアップロードできます。"
  ko: "크레딧을 충전하면 언제든지 OpenMates를 계속 사용하고 새 파일을 업로드할 수 있습니다."
  it: "Puoi continuare a usare OpenMates e caricare nuovi file in qualsiasi momento ricaricando i tuoi crediti."
  tr: "Kredinizi doldurarak OpenMates'i kullanmaya devam edebilir ve istediğiniz zaman yeni dosyalar yükleyebilirsiniz."
  vi: "Bạn có thể tiếp tục sử dụng OpenMates và tải lên các tệp mới bất kỳ lúc nào bằng cách nạp thêm tín dụng."
  id: "Anda dapat terus menggunakan OpenMates dan mengunggah file baru kapan saja dengan mengisi ulang kredit."
  pl: "Możesz nadal korzystać z OpenMates i przesyłać nowe pliki w dowolnym momencie, doładowując kredyty."
  nl: "Je kunt OpenMates blijven gebruiken en op elk gewenst moment nieuwe bestanden uploaden door je credits aan te vullen."
  ar: "يمكنك الاستمرار في استخدام OpenMates ورفع ملفات جديدة في أي وقت عن طريق تعبئة رصيدك."
  hi: "आप क्रेडिट टॉप अप करके किसी भी समय OpenMates का उपयोग जारी रख सकते हैं और नई फ़ाइलें अपलोड कर सकते हैं।"
  th: "คุณสามารถใช้ OpenMates ต่อไปและอัปโหลดไฟล์ใหม่ได้ทุกเมื่อโดยการเติมเครดิต"
