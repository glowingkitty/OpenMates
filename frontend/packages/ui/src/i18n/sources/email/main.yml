issue_report_confirmation.support_note:
  context: Note telling the user they can email support if they haven't heard back within a week
  en: "If you haven't heard back within a week, feel free to reach out to us at support@openmates.org for an update."
  de: "Sollten Sie innerhalb einer Woche keine Rückmeldung erhalten haben, können Sie sich gerne an support@openmates.org wenden."
  zh: "如果一周内未收到回复，请随时发送邮件至 support@openmates.org 询问进展。"
  es: "Si no ha recibido respuesta en una semana, no dude en escribirnos a support@openmates.org para obtener una actualización."
  fr: "Si vous n'avez pas reçu de réponse sous une semaine, n'hésitez pas à nous contacter à support@openmates.org."
  pt: "Se não receber uma resposta dentro de uma semana, sinta-se à vontade para nos contactar em support@openmates.org."
  ru: "Если вы не получили ответ в течение недели, напишите нам на support@openmates.org."
  ja: "1週間以内に返答がない場合は、support@openmates.org までお気軽にお問い合わせください。"
  ko: "1주일 이내에 답변을 받지 못하셨다면 support@openmates.org로 문의해 주세요."
  it: "Se non hai ricevuto risposta entro una settimana, non esitare a scriverci a support@openmates.org."
  tr: "Bir hafta içinde yanıt almadıysanız, güncelleme için support@openmates.org adresine yazabilirsiniz."
  vi: "Nếu bạn không nhận được phản hồi trong vòng một tuần, vui lòng liên hệ support@openmates.org để biết thêm thông tin."
  id: "Jika Anda belum menerima tanggapan dalam seminggu, silakan hubungi kami di support@openmates.org."
  pl: "Jeśli nie otrzymasz odpowiedzi w ciągu tygodnia, napisz do nas na support@openmates.org."
  nl: "Als u binnen een week geen reactie heeft ontvangen, neem dan gerust contact met ons op via support@openmates.org."
  ar: "إذا لم تتلقَ ردًا خلال أسبوع، لا تتردد في التواصل معنا على support@openmates.org."
  hi: "यदि एक सप्ताह के भीतर कोई जवाब नहीं मिलता है, तो कृपया अपडेट के लिए support@openmates.org पर हमसे संपर्क करें।"
  th: "หากไม่ได้รับการตอบกลับภายในหนึ่งสัปดาห์ สามารถติดต่อเราได้ที่ support@openmates.org"
  cs: "Pokud do týdne neobdržíte odpověď, neváhejte nás kontaktovat na support@openmates.org."
  sv: "Om du inte har fått svar inom en vecka, kontakta oss gärna på support@openmates.org."
  he: אם לא קיבלת מענה תוך שבוע, ניתן ליצור איתנו קשר בכתובת support@openmates.org לקבלת עדכון.
