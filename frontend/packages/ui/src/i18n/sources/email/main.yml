backup_reminder.description:
  context: Intro paragraph in backup reminder email
  en: Your chats, settings, and files are encrypted and stored securely — but keeping a local backup is always a good idea.
  de: Deine Chats, Einstellungen und Dateien sind verschlüsselt gespeichert — dennoch ist ein lokales Backup immer empfehlenswert.
  zh: 您的聊天记录、设置和文件已加密并安全存储，但保留本地备份始终是个好主意。
  es: Tus chats, configuraciones y archivos están cifrados y almacenados de forma segura, pero mantener una copia de seguridad local siempre es una buena idea.
  fr: Vos discussions, paramètres et fichiers sont chiffrés et stockés en toute sécurité, mais conserver une sauvegarde locale est toujours une bonne idée.
  pt: Seus chats, configurações e arquivos são criptografados e armazenados com segurança — mas manter um backup local é sempre uma boa ideia.
  ru: Ваши чаты, настройки и файлы зашифрованы и хранятся в безопасности — но всегда хорошо иметь локальную резервную копию.
  ja: チャット、設定、ファイルは暗号化されて安全に保存されていますが、ローカルバックアップを保持することは常に良いアイデアです。
  ko: 채팅, 설정 및 파일은 암호화되어 안전하게 저장됩니다. 하지만 로컬 백업을 유지하는 것은 항상 좋은 생각입니다.
  it: Le tue chat, impostazioni e file sono crittografati e archiviati in modo sicuro, ma mantenere un backup locale è sempre una buona idea.
  tr: Sohbetleriniz, ayarlarınız ve dosyalarınız şifreli ve güvenli bir şekilde depolanmaktadır — ancak yerel bir yedek tutmak her zaman iyi bir fikirdir.
  vi: Các cuộc trò chuyện, cài đặt và tệp của bạn được mã hóa và lưu trữ an toàn — nhưng giữ bản sao lưu cục bộ luôn là một ý tưởng hay.
  id: Obrolan, pengaturan, dan file Anda dienkripsi dan disimpan dengan aman — namun menyimpan cadangan lokal selalu merupakan ide yang baik.
  pl: Twoje czaty, ustawienia i pliki są zaszyfrowane i bezpiecznie przechowywane — ale posiadanie lokalnej kopii zapasowej zawsze jest dobrym pomysłem.
  nl: Je chats, instellingen en bestanden zijn versleuteld en veilig opgeslagen — maar een lokale back-up bewaren is altijd een goed idee.
  ar: محادثاتك وإعداداتك وملفاتك مشفرة ومخزنة بأمان — لكن الاحتفاظ بنسخة احتياطية محلية فكرة جيدة دائمًا.
  hi: आपकी चैट, सेटिंग्स और फ़ाइलें एन्क्रिप्टेड हैं और सुरक्षित रूप से संग्रहीत हैं — लेकिन स्थानीय बैकअप रखना हमेशा एक अच्छा विचार है।
  th: แชท การตั้งค่า และไฟล์ของคุณได้รับการเข้ารหัสและจัดเก็บอย่างปลอดภัย แต่การเก็บสำรองข้อมูลในเครื่องไว้เสมอเป็นความคิดที่ดี
  cs: Vaše chaty, nastavení a soubory jsou zašifrovány a bezpečně uloženy — ale mít místní zálohu je vždy dobrý nápad.
  sv: Dina chattar, inställningar och filer är krypterade och säkert lagrade — men att ha en lokal säkerhetskopia är alltid en bra idé.
  he: הצ'אטים, ההגדרות והקבצים שלך מוצפנים ומאוחסנים בצורה מאובטחת — אך שמירת גיבוי מקומי היא תמיד רעיון טוב.
  verified_by_human: []
