complete_signup_info:
  context: Email body for account created confirmation
  en: Once you completed the signup process by purchasing usage credits or redeeming a gift card, you can start using OpenMates!
  de: Sobald du den Registrierungsprozess durch den Kauf von Nutzungsguthaben oder das Einlösen einer Geschenkkarte abgeschlossen hast, kannst du OpenMates nutzen!
  es: Una vez que hayas completado el proceso de registro comprando créditos de uso o canjeando una tarjeta de regalo, ¡podrás empezar a usar OpenMates!
  fr: Une fois que vous aurez terminé le processus d'inscription en achetant des crédits d'utilisation ou en utilisant une carte-cadeau, vous pourrez commencer à utiliser OpenMates !
  ja: 利用クレジットの購入またはギフトカードの引き換えによりサインアッププロセスが完了すると、OpenMatesの使用を開始できます。
  zh: 一旦您通过购买使用额度或兑换礼品卡完成了注册流程，您就可以开始使用 OpenMates 了！
  pt: Depois de completar o processo de registro comprando créditos de uso ou resgatando um cartão-presente, você pode começar a usar o OpenMates!
  ru: После завершения процесса регистрации путём покупки кредитов использования или активации подарочной карты вы сможете начать пользоваться OpenMates!
  ko: 사용 크레딧을 구매하거나 기프트 카드를 사용하여 가입 과정을 완료하면 OpenMates를 사용할 수 있습니다!
  it: Una volta completato il processo di registrazione acquistando crediti di utilizzo o riscattando una carta regalo, puoi iniziare a usare OpenMates!
  tr: Kullanım kredisi satın alarak veya hediye kartı kullanarak kayıt işlemini tamamladığınızda, OpenMates'i kullanmaya başlayabilirsiniz!
  vi: Khi bạn hoàn tất quá trình đăng ký bằng cách mua tín dụng sử dụng hoặc đổi thẻ quà tặng, bạn có thể bắt đầu sử dụng OpenMates!
  id: Setelah menyelesaikan proses pendaftaran dengan membeli kredit penggunaan atau menukarkan kartu hadiah, Anda dapat mulai menggunakan OpenMates!
  pl: Po zakończeniu procesu rejestracji poprzez zakup kredytów użytkowania lub realizację karty podarunkowej możesz zacząć korzystać z OpenMates!
  nl: Zodra je het aanmeldingsproces hebt voltooid door gebruikskredieten te kopen of een cadeaukaart in te wisselen, kun je OpenMates gaan gebruiken!
  ar: بمجرد إكمال عملية التسجيل عن طريق شراء رصيد الاستخدام أو استرداد بطاقة هدية، يمكنك البدء في استخدام OpenMates!
  hi: एक बार जब आप उपयोग क्रेडिट खरीदकर या गिफ्ट कार्ड रिडीम करके साइनअप प्रक्रिया पूरी कर लेते हैं, तो आप OpenMates का उपयोग शुरू कर सकते हैं!
  th: เมื่อคุณดำเนินการสมัครเสร็จสมบูรณ์โดยการซื้อเครดิตการใช้งานหรือแลกบัตรของขวัญ คุณสามารถเริ่มใช้ OpenMates ได้!
  cs: Jakmile dokončíte proces registrace zakoupením kreditů využití nebo uplatněním dárkové karty, můžete začít používat OpenMates!
  sv: När du har slutfört registreringsprocessen genom att köpa användningskrediter eller lösa in ett presentkort kan du börja använda OpenMates!
  he: "ברגע שתשלים את תהליך ההרשמה על ידי רכישת קרדיטים לשימוש או מימוש כרטיס מתנה, תוכל להתחיל להשתמש ב-OpenMates!"
auto_delete_warning:
  context: Email body warning for account created confirmation
  en: "Please note: Accounts that haven't completed the signup process will be automatically deleted after 7 days."
  de: "Bitte beachte: Konten, die den Registrierungsprozess nicht abgeschlossen haben, werden nach 7 Tagen automatisch gelöscht."
  es: "Ten en cuenta: Las cuentas que no hayan completado el process de registro se eliminarán automáticamente después de 7 días."
  fr: "Remarque : les comptes qui n'ont pas terminé le processus d'inscription seront automatiquement supprimés après 7 jours."
  ja: "注意：サインアップが完了していないアカウントは、7日後に自動的に削除されます。"
  zh: "请注意：未完成注册流程的账户将在 7 天后自动删除。"
  pt: "Atenção: Contas que não concluíram o processo de registro serão excluídas automaticamente após 7 dias."
  ru: "Обратите внимание: аккаунты, не завершившие процесс регистрации, будут автоматически удалены через 7 дней."
  ko: "참고: 가입 과정을 완료하지 않은 계정은 7일 후 자동으로 삭제됩니다."
  it: "Nota bene: gli account che non hanno completato il processo di registrazione saranno automaticamente eliminati dopo 7 giorni."
  tr: "Lütfen dikkat: Kayıt işlemini tamamlamamış hesaplar 7 gün sonra otomatik olarak silinecektir."
  vi: "Lưu ý: Các tài khoản chưa hoàn thành quá trình đăng ký sẽ tự động bị xóa sau 7 ngày."
  id: "Perhatian: Akun yang belum menyelesaikan proses pendaftaran akan otomatis dihapus setelah 7 hari."
  pl: "Uwaga: Konta, które nie ukończyły procesu rejestracji, zostaną automatycznie usunięte po 7 dniach."
  nl: "Let op: Accounts die het aanmeldingsproces niet hebben voltooid, worden na 7 dagen automatisch verwijderd."
  ar: "يُرجى الملاحظة: سيتم حذف الحسابات التي لم تستكمل عملية التسجيل تلقائيًا بعد 7 أيام."
  hi: "कृपया ध्यान दें: जिन खातों ने साइनअप प्रक्रिया पूरी नहीं की है उन्हें 7 दिनों के बाद स्वचालित रूप से हटा दिया जाएगा।"
  th: "โปรดทราบ: บัญชีที่ยังไม่ได้ดำเนินการสมัครให้เสร็จสมบูรณ์จะถูกลบโดยอัตโนมัติหลังจาก 7 วัน"
  cs: "Upozornění: Účty, které nedokončily proces registrace, budou automaticky smazány po 7 dnech."
  sv: "Observera: Konton som inte har slutfört registreringsprocessen kommer att raderas automatiskt efter 7 dagar."
  he: "לתשומת לבך: חשבונות שלא השלימו את תהליך ההרשמה יימחקו אוטומטית לאחר 7 ימים."
