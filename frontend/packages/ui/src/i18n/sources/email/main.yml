email_body_someone_accessed_my_account_backup_code:
  context: Email body for account access report
  en: "Hello.

    Someone accessed my account without my permission!

    Here are the details:


    Time of login: {login_time}

    Backup code used: {backup_code}

    Account email: {account_email}


    Please help me to secure my account.


    Thanks.

    "
  de: "Hallo.

    Jemand hat auf mein Konto zugegriffen ohne meine Erlaubnis!

    Hier sind die Details:


    Zeitpunkt der Anmeldung: {login_time}

    Verwendeter Backup-Code: {backup_code}

    Konto-E-Mail: {account_email}


    Bitte helfe mir, mein Konto zu sichern.


    Danke.

    "
  zh: "您好。

    有人在未经我许可的情况下访问了我的账户！

    以下是详细信息：


    登录时间：{login_time}

    使用的备用码：{backup_code}

    账户邮箱：{account_email}


    请帮助我保护我的账户。


    谢谢。

    "
  es: "Hola.

    ¡Alguien ha accedido a mi cuenta sin mi permiso!

    Aquí están los detalles:


    Hora de inicio de sesión: {login_time}

    Código de respaldo utilizado: {backup_code}

    Correo electrónico de la cuenta: {account_email}


    Por favor, ayúdame a asegurar mi cuenta.


    Gracias.

    "
  fr: "Bonjour.

    Quelqu'un a accédé à mon compte sans ma permission !

    Voici les détails :


    Heure de connexion : {login_time}

    Code de secours utilisé : {backup_code}

    E-mail du compte : {account_email}


    Merci de m'aider à sécuriser mon compte.


    Merci.

    "
  pt: "Olá.

    Alguém acessou minha conta sem minha permissão!

    Aqui estão os detalhes:


    Hora de login: {login_time}

    Código de backup usado: {backup_code}

    E-mail da conta: {account_email}


    Por favor, ajude-me a proteger minha conta.


    Obrigado.

    "
  ru: "Здравствуйте.

    Кто-то получил доступ к моей учётной записи без моего разрешения!

    Вот подробности:


    Время входа: {login_time}

    Использованный резервный код: {backup_code}

    Email аккаунта: {account_email}


    Пожалуйста, помогите мне защитить мою учётную запись.


    Спасибо.

    "
  ja: "こんにちは。

    誰かが私の許可なくアカウントにアクセスしました！

    詳細は以下の通りです：


    ログイン時刻: {login_time}

    使用されたバックアップコード: {backup_code}

    アカウントメール: {account_email}


    アカウントの保護にご協力ください。


    よろしくお願いいたします。

    "
  ko: "안녕하세요.

    누군가가 제 허락 없이 제 계정에 접근했습니다!

    세부 정보는 다음과 같습니다:


    로그인 시간: {login_time}

    사용된 백업 코드: {backup_code}

    계정 이메일: {account_email}


    제 계정을 보호하는 데 도움을 주세요.


    감사합니다.

    "
  it: "Salve.

    Qualcuno ha acceduto al mio account senza il mio permesso!

    Ecco i dettagli:


    Ora di accesso: {login_time}

    Codice di backup utilizzato: {backup_code}

    Email dell'account: {account_email}


    Per favore aiutatemi a proteggere il mio account.


    Grazie.

    "
  tr: "Merhaba.

    Birisi iznim olmadan hesabıma erişti!

    İşte ayrıntılar:


    Giriş zamanı: {login_time}

    Kullanılan yedek kod: {backup_code}

    Hesap e-postası: {account_email}


    Hesabımı güvence altına almama yardım edin lütfen.


    Teşekkürler.

    "
  vi: "Xin chào.

    Ai đó đã truy cập vào tài khoản của tôi mà không có sự cho phép của tôi!

    Đây là các chi tiết:


    Thời gian đăng nhập: {login_time}

    Mã sao lưu đã dùng: {backup_code}

    Email tài khoản: {account_email}


    Vui lòng giúp tôi bảo mật tài khoản của mình.


    Cảm ơn.

    "
  id: "Halo.

    Seseorang mengakses akun saya tanpa izin saya!

    Berikut detailnya:


    Waktu login: {login_time}

    Kode cadangan yang digunakan: {backup_code}

    Email akun: {account_email}


    Tolong bantu saya mengamankan akun saya.


    Terima kasih.

    "
  pl: "Witaj.

    Ktoś uzyskał dostęp do mojego konta bez mojego pozwolenia!

    Oto szczegóły:


    Czas logowania: {login_time}

    Użyty kod zapasowy: {backup_code}

    E-mail konta: {account_email}


    Proszę pomóż mi zabezpieczyć moje konto.


    Dziękuję.

    "
  nl: "Hallo.

    Iemand heeft toegang gekregen tot mijn account zonder mijn toestemming!

    Hier zijn de details:


    Inlogtijd: {login_time}

    Gebruikte back-upcode: {backup_code}

    Account e-mail: {account_email}


    Help me alstublieft mijn account te beveiligen.


    Dank u.

    "
  ar: "مرحباً.

    قام شخص ما بالوصول إلى حسابي دون إذني!

    إليك التفاصيل:


    وقت تسجيل الدخول: {login_time}

    رمز النسخ الاحتياطي المستخدم: {backup_code}

    البريد الإلكتروني للحساب: {account_email}


    يرجى مساعدتي في تأمين حسابي.


    شكراً.

    "
  hi: "नमस्ते।

    किसी ने मेरी अनुमति के बिना मेरे खाते तक पहुंच प्राप्त की!

    यहाँ विवरण हैं:


    लॉगिन समय: {login_time}

    उपयोग किया गया बैकअप कोड: {backup_code}

    खाता ईमेल: {account_email}


    कृपया मेरे खाते को सुरक्षित करने में मेरी सहायता करें।


    धन्यवाद।

    "
  th: "สวัสดี

    มีคนเข้าถึงบัญชีของฉันโดยไม่ได้รับอนุญาต!

    นี่คือรายละเอียด:


    เวลาเข้าสู่ระบบ: {login_time}

    รหัสสำรองที่ใช้: {backup_code}

    อีเมลบัญชี: {account_email}


    กรุณาช่วยฉันรักษาความปลอดภัยบัญชีของฉัน


    ขอบคุณ

    "
  cs: "Dobrý den.

    Někdo přistoupil k mému účtu bez mého svolení!

    Zde jsou podrobnosti:


    Čas přihlášení: {login_time}

    Použitý záložní kód: {backup_code}

    E-mail účtu: {account_email}


    Prosím pomozte mi zabezpečit můj účet.


    Děkuji.

    "
  sv: "Hej.

    Någon har fått tillgång till mitt konto utan mitt tillstånd!

    Här är detaljerna:


    Inloggningstid: {login_time}

    Använd reservkod: {backup_code}

    Konto-e-post: {account_email}


    Hjälp mig att säkra mitt konto.


    Tack.

    "
  he: |
    שלום.
    מישהו ניגש לחשבון שלי ללא רשותי!
    להלן הפרטים:

    זמן התחברות: {login_time}
    קוד גיבוי ששימש: {backup_code}
    אימייל החשבון: {account_email}

    אנא עזרו לי לאבטח את החשבון שלי.

    תודה.
  verified_by_human: []
