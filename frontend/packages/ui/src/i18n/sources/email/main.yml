new_api_key_device_blocked:
  context: Explains that the API request was blocked and the user must approve the device
  en: "The request was blocked. You must approve this device in Developer Settings before it can use your API key."
  de: "Die Anfrage wurde blockiert. Sie müssen dieses Gerät in den Entwicklereinstellungen genehmigen, bevor es Ihren API-Schlüssel verwenden kann."
  zh: "该请求已被拦截。您必须在开发者设置中批准此设备，才能使用您的 API 密钥。"
  es: "La solicitud fue bloqueada. Debes aprobar este dispositivo en la Configuración de desarrollador antes de que pueda usar tu clave de API."
  fr: "La requête a été bloquée. Vous devez approuver cet appareil dans les Paramètres développeur avant qu'il puisse utiliser votre clé d'API."
  pt: "A solicitação foi bloqueada. Você deve aprovar este dispositivo nas Configurações do desenvolvedor antes que ele possa usar sua chave de API."
  ru: "Запрос был заблокирован. Вы должны одобрить это устройство в настройках разработчика, прежде чем оно сможет использовать ваш ключ API."
  ja: "リクエストはブロックされました。APIキーを使用する前に、開発者設定でこのデバイスを承認する必要があります。"
  ko: "요청이 차단되었습니다. API 키를 사용하려면 먼저 개발자 설정에서 이 기기를 승인해야 합니다."
  it: "La richiesta è stata bloccata. Devi approvare questo dispositivo nelle Impostazioni sviluppatore prima che possa usare la tua chiave API."
  tr: "İstek engellendi. Bu cihazın API anahtarınızı kullanabilmesi için Geliştirici Ayarları'ndan onaylamanız gerekiyor."
  vi: "Yêu cầu đã bị chặn. Bạn phải phê duyệt thiết bị này trong Cài đặt dành cho nhà phát triển trước khi nó có thể sử dụng khóa API của bạn."
  id: "Permintaan diblokir. Anda harus menyetujui perangkat ini di Pengaturan Developer sebelum dapat menggunakan kunci API Anda."
  pl: "Żądanie zostało zablokowane. Musisz zatwierdzić to urządzenie w Ustawieniach dewelopera, zanim będzie mogło używać Twojego klucza API."
  nl: "Het verzoek is geblokkeerd. Je moet dit apparaat goedkeuren in Ontwikkelaarsinstellingen voordat het je API-sleutel kan gebruiken."
  ar: "تم حظر الطلب. يجب عليك الموافقة على هذا الجهاز في إعدادات المطور قبل أن يتمكن من استخدام مفتاح API الخاص بك."
  hi: "अनुरोध अवरुद्ध कर दिया गया था। इस डिवाइस को आपकी API कुंजी का उपयोग करने से पहले आपको डेवलपर सेटिंग में इसे अनुमोदित करना होगा।"
  th: "คำขอถูกบล็อก คุณต้องอนุมัติอุปกรณ์นี้ในการตั้งค่านักพัฒนาก่อนที่จะสามารถใช้คีย์ API ของคุณได้"
  cs: "Požadavek byl zablokován. Musíte toto zařízení schválit v Nastavení pro vývojáře, než bude moci používat váš API klíč."
  sv: "Begäran blockerades. Du måste godkänna den här enheten i Utvecklarinställningar innan den kan använda din API-nyckel."
  he: "הבקשה נחסמה. עליך לאשר מכשיר זה בהגדרות המפתח לפני שיוכל להשתמש במפתח ה-API שלך."
