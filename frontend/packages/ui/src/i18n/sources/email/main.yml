storage_billing_failed_3.body:
  context: "Email body for third storage billing failure (final warning). Variables: {storage_gb}, {credits_needed}"
  en: "Your storage payment has failed 3 times. You have {storage_gb} GB stored on OpenMates requiring {credits_needed} credits per week. If payment fails again next week, all your uploaded files will be permanently deleted."
  de: "Deine Speicherzahlung ist 3 Mal fehlgeschlagen. Du hast {storage_gb} GB bei OpenMates gespeichert, wofür {credits_needed} Credits pro Woche benötigt werden. Wenn die Zahlung nächste Woche erneut fehlschlägt, werden alle deine hochgeladenen Dateien dauerhaft gelöscht."
  zh: "您的存储付款已连续失败 3 次。您在 OpenMates 存储了 {storage_gb} GB，每周需要 {credits_needed} 个积分。如果下周付款再次失败，您上传的所有文件将被永久删除。"
  es: "Tu pago de almacenamiento ha fallado 3 veces. Tienes {storage_gb} GB almacenados en OpenMates que requieren {credits_needed} créditos por semana. Si el pago falla de nuevo la próxima semana, todos tus archivos subidos serán eliminados permanentemente."
  fr: "Votre paiement de stockage a échoué 3 fois. Vous avez {storage_gb} Go stockés sur OpenMates nécessitant {credits_needed} crédits par semaine. Si le paiement échoue à nouveau la semaine prochaine, tous vos fichiers téléchargés seront définitivement supprimés."
  pt: "O pagamento de armazenamento falhou 3 vezes. Você tem {storage_gb} GB armazenados no OpenMates requerendo {credits_needed} créditos por semana. Se o pagamento falhar novamente na próxima semana, todos os seus arquivos enviados serão excluídos permanentemente."
  ru: "Платёж за хранилище не прошёл 3 раза. У вас хранится {storage_gb} ГБ на OpenMates, что требует {credits_needed} кредитов в неделю. Если на следующей неделе платёж снова не пройдёт, все загруженные файлы будут удалены навсегда."
  ja: "ストレージ支払いが3回失敗しました。OpenMatesに{storage_gb} GBを保存しており、週{credits_needed}クレジットが必要です。来週も支払いが失敗すると、アップロードしたすべてのファイルが永久に削除されます。"
  ko: "저장소 결제가 3번 실패했습니다. OpenMates에 {storage_gb} GB가 저장되어 있으며 주당 {credits_needed} 크레딧이 필요합니다. 다음 주에 결제가 다시 실패하면 업로드한 모든 파일이 영구적으로 삭제됩니다."
  it: "Il pagamento di archiviazione ha fallito 3 volte. Hai {storage_gb} GB archiviati su OpenMates che richiedono {credits_needed} crediti a settimana. Se il pagamento fallisce di nuovo la settimana prossima, tutti i file caricati verranno eliminati definitivamente."
  tr: "Depolama ödemeniz 3 kez başarısız oldu. OpenMates'te {storage_gb} GB depolanmış olup haftada {credits_needed} kredi gerekmektedir. Gelecek hafta ödeme yeniden başarısız olursa yüklediğiniz tüm dosyalar kalıcı olarak silinecektir."
  vi: "Thanh toán lưu trữ của bạn đã thất bại 3 lần. Bạn có {storage_gb} GB được lưu trữ trên OpenMates yêu cầu {credits_needed} tín dụng mỗi tuần. Nếu thanh toán thất bại lần nữa vào tuần tới, tất cả các tệp đã tải lên sẽ bị xóa vĩnh viễn."
  id: "Pembayaran penyimpanan Anda telah gagal 3 kali. Anda memiliki {storage_gb} GB tersimpan di OpenMates yang memerlukan {credits_needed} kredit per minggu. Jika pembayaran gagal lagi minggu depan, semua file yang diunggah akan dihapus permanen."
  pl: "Twoja płatność za przechowywanie nie powiodła się 3 razy. Masz {storage_gb} GB przechowywane w OpenMates wymagające {credits_needed} kredytów tygodniowo. Jeśli płatność znowu nie powiedzie się w przyszłym tygodniu, wszystkie przesłane pliki zostaną trwale usunięte."
  nl: "Je opslagbetaling is 3 keer mislukt. Je hebt {storage_gb} GB opgeslagen op OpenMates dat {credits_needed} credits per week vereist. Als de betaling volgende week weer mislukt, worden alle geüploade bestanden permanent verwijderd."
  ar: "فشل الدفع مقابل التخزين 3 مرات. لديك {storage_gb} جيجابايت مخزنة على OpenMates تتطلب {credits_needed} رصيدًا في الأسبوع. إذا فشل الدفع مرة أخرى الأسبوع المقبل، سيتم حذف جميع الملفات المرفوعة بشكل دائم."
  hi: "आपका स्टोरेज भुगतान 3 बार विफल हो चुका है। आपके OpenMates पर {storage_gb} GB संग्रहीत है जिसके लिए प्रति सप्ताह {credits_needed} क्रेडिट की आवश्यकता है। यदि अगले सप्ताह भुगतान फिर से विफल हो जाता है, तो सभी अपलोड की गई फ़ाइलें स्थायी रूप से हटा दी जाएंगी।"
  th: "การชำระเงินพื้นที่จัดเก็บของคุณล้มเหลว 3 ครั้งแล้ว คุณมี {storage_gb} GB จัดเก็บอยู่บน OpenMates ซึ่งต้องใช้ {credits_needed} เครดิตต่อสัปดาห์ หากการชำระเงินล้มเหลวอีกครั้งสัปดาห์หน้า ไฟล์ที่อัปโหลดทั้งหมดจะถูกลบอย่างถาวร"
  cs: "Vaše platba za úložiště selhala 3×. Máte uloženo {storage_gb} GB na OpenMates vyžadující {credits_needed} kreditů týdně. Pokud platba příští týden opět selže, všechny nahrané soubory budou trvale smazány."
  sv: "Din lagringsbetalning har misslyckats 3 gånger. Du har {storage_gb} GB lagrat på OpenMates som kräver {credits_needed} credits per vecka. Om betalningen misslyckas igen nästa vecka kommer alla uppladdade filer att raderas permanent."
  he: 'התשלום על האחסון שלך נכשל 3 פעמים. יש לך {storage_gb} ג"ב מאוחסנים ב-OpenMates הדורשים {credits_needed} קרדיטים בשבוע. אם התשלום ייכשל שוב בשבוע הבא, כל הקבצים שהעלית יימחקו לצמיתות.'
  verified_by_human: []
storage_billing_failed_3.action:
  context: Urgent call-to-action text in final warning storage billing failure email
  en: "Add credits immediately to prevent deletion. This is your last chance."
  de: "Füge sofort Guthaben hinzu, um die Löschung zu verhindern. Dies ist deine letzte Chance."
  zh: "请立即充值积分以防止删除。这是您最后的机会。"
  es: "Agrega créditos de inmediato para evitar la eliminación. Esta es tu última oportunidad."
  fr: "Ajoutez des crédits immédiatement pour éviter la suppression. C'est votre dernière chance."
  pt: "Adicione créditos imediatamente para evitar a exclusão. Esta é sua última chance."
  ru: "Немедленно пополните кредиты, чтобы предотвратить удаление. Это ваш последний шанс."
  ja: "削除を防ぐために今すぐクレジットを追加してください。これが最後のチャンスです。"
  ko: "삭제를 방지하려면 즉시 크레딧을 추가하세요. 이것이 마지막 기회입니다."
  it: "Aggiungi crediti immediatamente per evitare l'eliminazione. Questa è la tua ultima possibilità."
  tr: "Silmeyi önlemek için hemen kredi ekleyin. Bu son şansınız."
  vi: "Thêm tín dụng ngay lập tức để ngăn chặn việc xóa. Đây là cơ hội cuối cùng của bạn."
  id: "Tambahkan kredit segera untuk mencegah penghapusan. Ini adalah kesempatan terakhir Anda."
  pl: "Dodaj kredyty natychmiast, aby zapobiec usunięciu. To twoja ostatnia szansa."
  nl: "Voeg onmiddellijk credits toe om verwijdering te voorkomen. Dit is je laatste kans."
  ar: "أضف رصيدًا فورًا لمنع الحذف. هذه فرصتك الأخيرة."
  hi: "हटाने से रोकने के लिए तुरंत क्रेडिट जोड़ें। यह आपका आखिरी मौका है।"
  th: "เพิ่มเครดิตทันทีเพื่อป้องกันการลบ นี่คือโอกาสสุดท้ายของคุณ"
  cs: "Okamžitě přidejte kredity, abyste zabránili smazání. Toto je vaše poslední šance."
  sv: "Lägg till credits omedelbart för att förhindra radering. Detta är din sista chans."
  he: עליך להוסיף קרדיטים באופן מיידי כדי למנוע מחיקה. זוהי ההזדמנות האחרונה שלך.
