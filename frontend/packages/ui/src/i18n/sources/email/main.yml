  id: Anda membuat {count} kode undangan baru untuk pengguna baru bergabung ke server Anda.
  pl: Utworzyłeś {count} nowych kodów zaproszeń dla nowych użytkowników do dołączenia do Twojego serwera.
  nl: Je hebt {count} nieuwe uitnodigingscodes aangemaakt zodat nieuwe gebruikers je server kunnen joinen.
  ar: لقد أنشأت {count} رموز دعوة جديدة للمستخدمين الجدد للانضمام إلى خادمك.
  hi: आपने नए उपयोगकर्ताओं के लिए अपने सर्वर में शामिल होने के लिए {count} नए आमंत्रण कोड बनाए।
