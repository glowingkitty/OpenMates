if_this_wasnt_you_react_invite_codes:
  context: Security advice in email body for new invite codes
  en: "If this wasn't you, react immediately!

    <a href='{logout_link_delete_invite_codes}'>Click here to delete the invite codes, logout all connected devices & reset your login data.</a>

    "
  de: "Wenn du das nicht warst, reagiere sofort!

    <a href='{logout_link_delete_invite_codes}'>Klicke hier, um die Einladungscodes zu löschen, alle verbundenen Geräte abzumelden & deine Anmeldedaten zurückzusetzen.</a>

    "
  zh: "如果这不是您的操作，请立即采取行动！

    <a href='{logout_link_delete_invite_codes}'>点击此处删除邀请码，登出所有已连接设备并重置您的登录数据。</a>

    "
  es: "Si no fuiste tú, ¡reacciona inmediatamente!

    <a href='{logout_link_delete_invite_codes}'>Haz clic aquí para eliminar los códigos de invitación, cerrar sesión en todos los dispositivos conectados y restablecer tus datos de inicio de sesión.</a>

    "
  fr: "Si ce n'était pas vous, réagissez immédiatement !

    <a href='{logout_link_delete_invite_codes}'>Cliquez ici pour supprimer les codes d'invitation, déconnecter tous les appareils connectés et réinitialiser vos données de connexion.</a>

    "
  pt: "Se não foi você, reaja imediatamente!

    <a href='{logout_link_delete_invite_codes}'>Clique aqui para excluir os códigos de convite, fazer logout de todos os dispositivos conectados e redefinir seus dados de login.</a>

    "
  ru: "Если это были не вы, реагируйте немедленно!

    <a href='{logout_link_delete_invite_codes}'>Нажмите здесь, чтобы удалить коды приглашений, выйти со всех подключённых устройств и сбросить данные входа.</a>

    "
  ja: "これがあなたではない場合、すぐに対応してください！

    <a href='{logout_link_delete_invite_codes}'>ここをクリックして、招待コードを削除し、接続されているすべてのデバイスをログアウトし、ログイン情報をリセットしてください。</a>

    "
  ko: "본인이 아니라면 즉시 조치하세요!

    <a href='{logout_link_delete_invite_codes}'>여기를 클릭하여 초대 코드를 삭제하고, 연결된 모든 기기에서 로그아웃하고 로그인 데이터를 재설정하세요.</a>

    "
  it: "Se non sei stato tu, reagisci immediatamente!

    <a href='{logout_link_delete_invite_codes}'>Clicca qui per eliminare i codici invito, disconnettere tutti i dispositivi collegati e reimpostare i tuoi dati di accesso.</a>

    "
  tr: "Bu siz olmadıysanız, hemen harekete geçin!

    <a href='{logout_link_delete_invite_codes}'>Davet kodlarını silmek, bağlı tüm cihazların oturumunu kapatmak ve giriş bilgilerinizi sıfırlamak için buraya tıklayın.</a>

    "
  vi: "Nếu không phải bạn, hãy phản ứng ngay lập tức!

    <a href='{logout_link_delete_invite_codes}'>Nhấp vào đây để xóa mã mời, đăng xuất tất cả các thiết bị được kết nối và đặt lại dữ liệu đăng nhập của bạn.</a>

    "
  id: "Jika bukan Anda, segera ambil tindakan!

    <a href='{logout_link_delete_invite_codes}'>Klik di sini untuk menghapus kode undangan, keluar dari semua perangkat yang terhubung & mengatur ulang data login Anda.</a>

    "
  pl: "Jeśli to nie byłeś ty, zareaguj natychmiast!

    <a href='{logout_link_delete_invite_codes}'>Kliknij tutaj, aby usunąć kody zaproszeń, wylogować wszystkie podłączone urządzenia i zresetować dane logowania.</a>

    "
  nl: "Als dit jij niet was, reageer dan onmiddellijk!

    <a href='{logout_link_delete_invite_codes}'>Klik hier om de uitnodigingscodes te verwijderen, alle verbonden apparaten uit te loggen en je inloggegevens te resetten.</a>

    "
  ar: "إذا لم تكن أنت، فتصرف فوراً!

    <a href='{logout_link_delete_invite_codes}'>انقر هنا لحذف رموز الدعوة وتسجيل الخروج من جميع الأجهزة المتصلة وإعادة تعيين بيانات تسجيل الدخول.</a>

    "
  hi: "यदि यह आप नहीं थे, तो तुरंत प्रतिक्रिया करें!

    <a href='{logout_link_delete_invite_codes}'>आमंत्रण कोड हटाने, सभी कनेक्टेड डिवाइस से लॉगआउट करने और अपना लॉगिन डेटा रीसेट करने के लिए यहां क्लिक करें।</a>

    "
  th: "ถ้าไม่ใช่คุณ ให้ดำเนินการทันที!

    <a href='{logout_link_delete_invite_codes}'>คลิกที่นี่เพื่อลบรหัสเชิญ ออกจากระบบอุปกรณ์ที่เชื่อมต่อทั้งหมด และรีเซ็ตข้อมูลการเข้าสู่ระบบของคุณ</a>

    "
  cs: "Pokud jste to nebyli vy, okamžitě reagujte!

    <a href='{logout_link_delete_invite_codes}'>Kliknutím zde odstraňte pozvánkové kódy, odhlaste všechna připojená zařízení a resetujte přihlašovací údaje.</a>

    "
  sv: "Om det inte var du, reagera omedelbart!

    <a href='{logout_link_delete_invite_codes}'>Klicka här för att ta bort inbjudningskoderna, logga ut alla anslutna enheter och återställa dina inloggningsuppgifter.</a>

    "
  he: |
    אם זה לא היית אתה, פעל מיד!
    <a href='{logout_link_delete_invite_codes}'>לחץ כאן כדי למחוק את קודי ההזמנה, לנתק את כל המכשירים המחוברים ולאפס את נתוני ההתחברות שלך.</a>
  verified_by_human: []
