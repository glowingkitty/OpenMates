issue_report_confirmation.thank_you:
  context: Thank you message in confirmation email telling the user their report was received
  en: Thank you for submitting your issue report. We have received it and will review it as soon as possible.
  de: Vielen Dank für Ihre Problemmeldung. Wir haben sie erhalten und werden sie so schnell wie möglich prüfen.
  zh: 感谢您提交问题报告。我们已收到，并将尽快进行审查。
  es: Gracias por enviar su reporte de problema. Lo hemos recibido y lo revisaremos lo antes posible.
  fr: Merci d'avoir soumis votre signalement. Nous l'avons bien reçu et l'examinerons dès que possible.
  pt: Obrigado por enviar seu relatório de problema. Nós o recebemos e o analisaremos o mais breve possível.
  ru: Спасибо за отправку отчёта о проблеме. Мы его получили и рассмотрим как можно скорее.
  ja: 問題報告をお送りいただきありがとうございます。受け付けましたので、できるだけ早く確認いたします。
  ko: 문제 보고를 제출해 주셔서 감사합니다. 접수되었으며 가능한 빨리 검토하겠습니다.
  it: Grazie per aver inviato la segnalazione. L'abbiamo ricevuta e la esamineremo il prima possibile.
  tr: Sorun bildiriminizi gönderdiğiniz için teşekkür ederiz. Aldık ve en kısa sürede inceleyeceğiz.
  vi: Cảm ơn bạn đã gửi báo cáo sự cố. Chúng tôi đã nhận được và sẽ xem xét trong thời gian sớm nhất.
  id: Terima kasih telah mengirimkan laporan masalah Anda. Kami telah menerimanya dan akan segera meninjaunya.
  pl: Dziękujemy za przesłanie zgłoszenia problemu. Otrzymaliśmy je i przejrzymy tak szybko, jak to możliwe.
  nl: Bedankt voor het indienen van uw probleemmelding. We hebben deze ontvangen en zullen deze zo snel mogelijk bekijken.
  ar: شكرًا لك على إرسال تقرير المشكلة. لقد استلمناه وسنقوم بمراجعته في أقرب وقت ممكن.
  hi: अपनी समस्या रिपोर्ट सबमिट करने के लिए धन्यवाद। हमने इसे प्राप्त कर लिया है और जल्द से जल्द इसकी समीक्षा करेंगे।
  th: ขอบคุณที่ส่งรายงานปัญหา เราได้รับแล้วและจะตรวจสอบโดยเร็วที่สุด
  cs: Děkujeme za odeslání hlášení problému. Obdrželi jsme ho a prověříme ho co nejdříve.
  sv: Tack för att du skickade din problemrapport. Vi har mottagit den och kommer att granska den så snart som möjligt.
  he: תודה על שליחת הדיווח. קיבלנו אותו ונבדוק אותו בהקדם האפשרי.
  verified_by_human: []
