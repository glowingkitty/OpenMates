account_recovery_description:
  context: Email description for account recovery
  en: "You requested to reset your account. WARNING: This will permanently delete all your chats, settings, and memories."
  de: "Du hast eine Kontozurücksetzung angefordert. WARNUNG: Dadurch werden alle deine Chats, Einstellungen und Erinnerungen dauerhaft gelöscht."
  zh: "您请求重置账户。警告：这将永久删除您的所有聊天记录、设置和回忆。"
  es: "Has solicitado restablecer tu cuenta. ADVERTENCIA: Esto eliminará permanentemente todos tus chats, configuraciones y recuerdos."
  fr: "Vous avez demandé la réinitialisation de votre compte. AVERTISSEMENT : Cela supprimera définitivement tous vos chats, paramètres et souvenirs."
  pt: "Você solicitou redefinir sua conta. AVISO: Isso excluirá permanentemente todos os seus chats, configurações e memórias."
  ru: "Вы запросили сброс вашей учётной записи. ПРЕДУПРЕЖДЕНИЕ: Это навсегда удалит все ваши чаты, настройки и воспоминания."
  ja: "アカウントのリセットをリクエストしました。警告：すべてのチャット、設定、メモリーが永久に削除されます。"
  ko: "계정 재설정을 요청했습니다. 경고: 이렇게 하면 모든 채팅, 설정 및 기억이 영구적으로 삭제됩니다."
  it: "Hai richiesto di reimpostare il tuo account. AVVISO: Questo eliminerà definitivamente tutte le tue chat, impostazioni e ricordi."
  tr: "Hesabınızı sıfırlamayı talep ettiniz. UYARI: Bu, tüm sohbetlerinizi, ayarlarınızı ve anılarınızı kalıcı olarak silecektir."
  vi: "Bạn đã yêu cầu đặt lại tài khoản của mình. CẢNH BÁO: Điều này sẽ xóa vĩnh viễn tất cả các cuộc trò chuyện, cài đặt và ký ức của bạn."
  id: "Anda meminta untuk mereset akun Anda. PERINGATAN: Ini akan menghapus semua obrolan, pengaturan, dan kenangan Anda secara permanen."
  pl: "Poprosiłeś o zresetowanie konta. OSTRZEŻENIE: Spowoduje to trwałe usunięcie wszystkich Twoich czatów, ustawień i wspomnień."
  nl: "Je hebt verzocht om je account te resetten. WAARSCHUWING: Dit zal al je chats, instellingen en herinneringen permanent verwijderen."
  ar: "طلبت إعادة تعيين حسابك. تحذير: سيؤدي هذا إلى حذف جميع محادثاتك وإعداداتك وذكرياتك بشكل دائم."
  hi: "आपने अपना खाता रीसेट करने का अनुरोध किया। चेतावनी: इससे आपके सभी चैट, सेटिंग्स और यादें स्थायी रूप से हट जाएंगी।"
  th: "คุณร้องขอให้รีเซ็ตบัญชีของคุณ คำเตือน: การดำเนินการนี้จะลบแชท การตั้งค่า และความทรงจำทั้งหมดของคุณอย่างถาวร"
  cs: "Požádali jste o resetování svého účtu. VAROVÁNÍ: Tím se trvale odstraní všechny vaše chaty, nastavení a vzpomínky."
  sv: "Du begärde att återställa ditt konto. VARNING: Detta kommer att permanent radera alla dina chattar, inställningar och minnen."
  he: "ביקשת לאפס את החשבון שלך. אזהרה: פעולה זו תמחק לצמיתות את כל הצ'אטים, ההגדרות והזיכרונות שלך."
  verified_by_human: []
