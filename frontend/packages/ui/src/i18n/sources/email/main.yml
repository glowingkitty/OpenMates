new_api_key_device_not_you:
  context: Security note at the bottom of the new API key device email — if the user didn't make the request
  en: "If this was you, you can ignore this email.\nIf this wasn't you, revoke your API key immediately in Developer Settings."
  de: "Wenn Sie das waren, können Sie diese E-Mail ignorieren.\nWenn Sie das nicht waren, widerrufen Sie sofort Ihren API-Schlüssel in den Entwicklereinstellungen."
  zh: "如果是您本人操作，可以忽略此邮件。\n如果不是，请立即在开发者设置中吊销您的 API 密钥。"
  es: "Si fuiste tú, puedes ignorar este correo.\nSi no fuiste tú, revoca tu clave de API de inmediato en Configuración de desarrollador."
  fr: "Si c'était vous, vous pouvez ignorer cet e-mail.\nSi ce n'était pas vous, révoquez immédiatement votre clé d'API dans les Paramètres développeur."
  pt: "Se foi você, pode ignorar este e-mail.\nSe não foi você, revogue sua chave de API imediatamente nas Configurações do desenvolvedor."
  ru: "Если это были вы, можете проигнорировать это письмо.\nЕсли это были не вы, немедленно отзовите свой ключ API в настройках разработчика."
  ja: "ご自身の操作であればこのメールは無視してください。\n身に覚えがない場合は、開発者設定でAPIキーを直ちに無効化してください。"
  ko: "본인이 한 것이라면 이 이메일을 무시해도 됩니다.\n본인이 아니라면 즉시 개발자 설정에서 API 키를 취소하세요."
  it: "Se eri tu, puoi ignorare questa email.\nSe non eri tu, revoca immediatamente la tua chiave API nelle Impostazioni sviluppatore."
