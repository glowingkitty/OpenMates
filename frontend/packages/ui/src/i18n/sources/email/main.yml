test_failure_notification.footer_note:
  context: Footer note in test failure notification email
  en: This notification was sent by the automated E2E test monitoring system.
  de: Diese Benachrichtigung wurde vom automatisierten E2E-Testüberwachungssystem gesendet.
  zh: 此通知由自动E2E测试监控系统发送。
  es: Esta notificación fue enviada por el sistema automatizado de monitoreo de pruebas E2E.
  fr: Cette notification a été envoyée par le système de surveillance automatisé des tests E2E.
  pt: Esta notificação foi enviada pelo sistema automatizado de monitoramento de testes E2E.
  ru: Это уведомление было отправлено автоматизированной системой мониторинга E2E тестов.
  ja: この通知は自動E2Eテスト監視システムから送信されました。
  ko: 이 알림은 자동화된 E2E 테스트 모니터링 시스템에서 전송되었습니다.
  it: Questa notifica è stata inviata dal sistema automatizzato di monitoraggio dei test E2E.
  tr: Bu bildirim otomatik E2E test izleme sistemi tarafından gönderildi.
  vi: Thông báo này được gửi bởi hệ thống giám sát kiểm tra E2E tự động.
  id: Pemberitahuan ini dikirim oleh sistem pemantauan tes E2E otomatis.
  pl: To powiadomienie zostało wysłane przez zautomatyzowany system monitorowania testów E2E.
  nl: Deze melding is verzonden door het geautomatiseerde E2E-testmonitoringsysteem.
  ar: تم إرسال هذا الإشعار بواسطة نظام مراقبة اختبار E2E الآلي.
  hi: यह अधिसूचना स्वचालित E2E परीक्षण निगरानी प्रणाली द्वारा भेजी गई थी।
  th: การแจ้งเตือนนี้ถูกส่งโดยระบบตรวจสอบการทดสอบ E2E อัตโนมัติ
