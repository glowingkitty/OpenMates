calendar.description:
  context: Description for the Calendar app
  en: Connect your calendar so mates can read, create, update, and delete events with your permission.
  de: Verbinde deinen Kalender, damit Mates mit deiner Erlaubnis Termine lesen, erstellen, bearbeiten und löschen können.
  zh: 连接你的日历，让 Mates 在获得你许可后读取、创建、更新和删除事件。
  es: Conecta tu calendario para que los mates puedan leer, crear, actualizar y eliminar eventos con tu permiso.
  fr: Connectez votre calendrier afin que les mates puissent lire, créer, mettre à jour et supprimer des événements avec votre autorisation.
  pt: Conecte seu calendário para que os mates possam ler, criar, atualizar e excluir eventos com sua permissão.
  ru: Подключите календарь, чтобы mates могли с вашего разрешения читать, создавать, обновлять и удалять события.
  ja: カレンダーを接続すると、あなたの許可に基づいて Mates が予定の読み取り、作成、更新、削除を行えます。
  ko: 캘린더를 연결하면 Mates가 사용자의 허락을 받아 일정을 읽고, 만들고, 업데이트하고, 삭제할 수 있습니다.
  it: Collega il tuo calendario così i mates possono leggere, creare, aggiornare ed eliminare eventi con il tuo permesso.
  tr: Takviminizi bağlayın; mates izninizle etkinlikleri okuyabilir, oluşturabilir, güncelleyebilir ve silebilir.
  vi: Kết nối lịch của bạn để mates có thể đọc, tạo, cập nhật và xóa sự kiện khi bạn cho phép.
  id: Hubungkan kalender Anda agar mates dapat membaca, membuat, memperbarui, dan menghapus acara dengan izin Anda.
  pl: Połącz kalendarz, aby mates mogły za Twoją zgodą czytać, tworzyć, aktualizować i usuwać wydarzenia.
  nl: Koppel je agenda zodat mates met jouw toestemming afspraken kunnen lezen, maken, bijwerken en verwijderen.
  ar: اربط تقويمك ليتمكن mates من قراءة الأحداث وإنشائها وتحديثها وحذفها بإذنك.
  hi: अपना कैलेंडर कनेक्ट करें ताकि mates आपकी अनुमति से इवेंट पढ़, बना, अपडेट और हटा सकें।
  th: เชื่อมต่อปฏิทินของคุณเพื่อให้ mates อ่าน สร้าง อัปเดต และลบกิจกรรมได้เมื่อคุณอนุญาต
  cs: Připojte svůj kalendář, aby mates mohli s vaším svolením číst, vytvářet, aktualizovat a mazat události.
  sv: Anslut din kalender så att mates kan läsa, skapa, uppdatera och ta bort händelser med din tillåtelse.
  he: חבר את לוח השנה שלך כדי ש-mates יוכלו לקרוא, ליצור, לעדכן ולמחוק אירועים בהרשאתך.
