search.description:
  context: Description for searching social media posts
  en: Search recent social media posts around a topic.
  de: Suche aktuelle Social-Media-Beiträge zu einem Thema.
  zh: 搜索某个主题的近期社交媒体帖子。
  es: Busca publicaciones recientes en redes sociales sobre un tema.
  fr: Recherchez des publications sociales récentes autour d’un sujet.
  pt: Pesquise publicações recentes de mídia social sobre um tema.
  ru: Ищите свежие публикации в соцсетях по теме.
  ja: トピックに関する最近のソーシャルメディア投稿を検索します。
  ko: 주제와 관련된 최신 소셜 미디어 게시물을 검색합니다.
  it: Cerca post social recenti su un argomento.
  tr: Bir konu hakkındaki son sosyal medya gönderilerini arayın.
  vi: Tìm các bài đăng mạng xã hội gần đây về một chủ đề.
  id: Cari postingan media sosial terbaru tentang suatu topik.
  pl: Szukaj najnowszych postów społecznościowych wokół tematu.
  nl: Zoek recente socialmediaberichten rond een onderwerp.
  ar: ابحث عن منشورات حديثة على وسائل التواصل حول موضوع.
  hi: किसी विषय पर हाल की सोशल मीडिया पोस्ट खोजें।
  th: ค้นหาโพสต์โซเชียลมีเดียล่าสุดเกี่ยวกับหัวข้อหนึ่ง
  cs: Hledejte nejnovější příspěvky na sociálních sítích k tématu.
  sv: Sök efter nya inlägg i sociala medier om ett ämne.
  he: חפש פוסטים אחרונים ברשתות חברתיות סביב נושא.
  verified_by_human:
    - en
