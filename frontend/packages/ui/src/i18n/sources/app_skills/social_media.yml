get_posts.description:
  context: Description for fetching social media posts
  en: Fetch recent posts and comments from a social media page.
  de: Rufe aktuelle Beiträge und Kommentare von einer Social-Media-Seite ab.
  zh: 从社交媒体页面获取近期帖子和评论。
  es: Obtén publicaciones y comentarios recientes de una página de redes sociales.
  fr: Récupérez les publications et commentaires récents d’une page sociale.
  pt: Busque publicações e comentários recentes de uma página de mídia social.
  ru: Получайте свежие публикации и комментарии со страницы соцсети.
  ja: ソーシャルメディアページの最近の投稿とコメントを取得します。
  ko: 소셜 미디어 페이지의 최신 게시물과 댓글을 가져옵니다.
  it: Recupera post e commenti recenti da una pagina social.
  tr: Bir sosyal medya sayfasından son gönderileri ve yorumları alın.
  vi: Lấy bài đăng và bình luận gần đây từ một trang mạng xã hội.
  id: Ambil postingan dan komentar terbaru dari halaman media sosial.
  pl: Pobierz najnowsze posty i komentarze ze strony społecznościowej.
  nl: Haal recente berichten en reacties op van een socialmediapagina.
  ar: اجلب المنشورات والتعليقات الحديثة من صفحة تواصل اجتماعي.
  hi: किसी सोशल मीडिया पेज से हाल की पोस्ट और टिप्पणियां प्राप्त करें।
  th: ดึงโพสต์และความคิดเห็นล่าสุดจากหน้าโซเชียลมีเดีย
  cs: Získejte nejnovější příspěvky a komentáře ze stránky sociálních médií.
  sv: Hämta nya inlägg och kommentarer från en social mediesida.
  he: הבא פוסטים ותגובות אחרונים מדף ברשת חברתית.
  verified_by_human:
    - en
    - de

