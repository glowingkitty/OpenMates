skills.create_or_modify.description:
  context: Description for creating or modifying workflows
  en: Create a new workflow or update an existing one from chat.
  de: Erstelle einen neuen Workflow oder aktualisiere einen bestehenden aus dem Chat.
  zh: 从聊天中创建新工作流或更新现有工作流。
  es: Crea un flujo de trabajo nuevo o actualiza uno existente desde el chat.
  fr: Créez un nouveau workflow ou mettez à jour un workflow existant depuis le chat.
  pt: Crie um novo fluxo de trabalho ou atualize um existente a partir do chat.
  ru: Создайте новый рабочий процесс или обновите существующий из чата.
  ja: チャットから新しいワークフローを作成するか、既存のものを更新します。
  ko: 채팅에서 새 워크플로를 만들거나 기존 워크플로를 업데이트합니다.
  it: Crea un nuovo workflow o aggiorna uno esistente dalla chat.
  tr: Sohbetten yeni bir iş akışı oluşturun veya mevcut olanı güncelleyin.
  vi: Tạo quy trình công việc mới hoặc cập nhật quy trình hiện có từ cuộc trò chuyện.
  id: Buat alur kerja baru atau perbarui yang sudah ada dari chat.
  pl: Utwórz nowy przepływ pracy lub zaktualizuj istniejący z czatu.
  nl: Maak een nieuwe workflow of werk een bestaande bij vanuit chat.
  ar: أنشئ سير عمل جديدًا أو حدّث سير عمل موجودًا من الدردشة.
  hi: चैट से नया वर्कफ़्लो बनाएं या मौजूदा को अपडेट करें।
  th: สร้างเวิร์กโฟลว์ใหม่หรืออัปเดตเวิร์กโฟลว์ที่มีอยู่จากแชต
  cs: Vytvořte nový pracovní postup nebo aktualizujte stávající z chatu.
  sv: Skapa ett nytt arbetsflöde eller uppdatera ett befintligt från chatten.
  he: צרו תהליך עבודה חדש או עדכנו תהליך קיים מהצ'אט.
  verified_by_human: []
