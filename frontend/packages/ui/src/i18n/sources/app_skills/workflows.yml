skills.search.description:
  context: Description for finding user workflows
  en: Find user-owned workflows that match a chat intent.
  de: Nutzer-Workflows finden, die zu einer Chat-Absicht passen.
  zh: 查找符合聊天意图的用户自有工作流。
  es: Encuentra flujos de trabajo del usuario que coincidan con una intención del chat.
  fr: Trouver les workflows appartenant à l'utilisateur qui correspondent à une intention de chat.
  pt: Encontre fluxos de trabalho do usuário que correspondam a uma intenção do chat.
  ru: Найти рабочие процессы пользователя, соответствующие намерению чата.
  ja: チャットの意図に一致するユーザー所有のワークフローを見つけます。
  ko: 채팅 의도와 일치하는 사용자 소유 워크플로를 찾습니다.
  it: Trova workflow dell'utente che corrispondono a un intento della chat.
  tr: Sohbet amacına uyan kullanıcıya ait iş akışlarını bulun.
  vi: Tìm các quy trình công việc do người dùng sở hữu phù hợp với ý định trò chuyện.
  id: Temukan alur kerja milik pengguna yang cocok dengan maksud chat.
  pl: Znajdź przepływy pracy użytkownika pasujące do intencji czatu.
  nl: Vind workflows van de gebruiker die passen bij een chatintentie.
  ar: ابحث عن سير العمل المملوك للمستخدم والذي يطابق هدف الدردشة.
  hi: चैट इरादे से मेल खाने वाले उपयोगकर्ता-स्वामित्व वाले वर्कफ़्लो खोजें।
  th: ค้นหาเวิร์กโฟลว์ของผู้ใช้ที่ตรงกับเจตนาในแชต
  cs: Najděte pracovní postupy vlastněné uživatelem, které odpovídají záměru chatu.
  sv: Hitta användarägda arbetsflöden som matchar en chattavsikt.
  he: מציאת תהליכי עבודה בבעלות המשתמש שמתאימים לכוונת הצ'אט.
  verified_by_human: [en, de]
