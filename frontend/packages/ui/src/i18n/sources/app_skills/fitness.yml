search_locations.description:
  context: Description for fitness location search skill
  en: Find Urban Sports Club fitness locations by city, address, radius, activity, and plan.
  de: Finde Urban Sports Club Fitness-Standorte nach Stadt, Adresse, Umkreis, Aktivität und Tarif.
  zh: 按城市、地址、半径、活动和会员方案查找 Urban Sports Club 健身地点。
  es: Encuentra centros de fitness de Urban Sports Club por ciudad, dirección, radio, actividad y plan.
  fr: Trouvez des lieux de fitness Urban Sports Club par ville, adresse, rayon, activité et abonnement.
  pt: Encontre locais de fitness da Urban Sports Club por cidade, endereço, raio, atividade e plano.
  ru: Находите фитнес-локации Urban Sports Club по городу, адресу, радиусу, активности и тарифу.
  ja: 都市、住所、半径、アクティビティ、プランで Urban Sports Club のフィットネス施設を探します。
  ko: 도시, 주소, 반경, 활동, 플랜별로 Urban Sports Club 피트니스 장소를 찾습니다.
  it: Trova luoghi fitness Urban Sports Club per città, indirizzo, raggio, attività e piano.
  tr: Urban Sports Club fitness konumlarını şehir, adres, yarıçap, aktivite ve plana göre bulun.
  vi: Tìm địa điểm thể dục Urban Sports Club theo thành phố, địa chỉ, bán kính, hoạt động và gói.
  id: Temukan lokasi fitness Urban Sports Club berdasarkan kota, alamat, radius, aktivitas, dan paket.
  pl: Znajdź lokalizacje fitness Urban Sports Club według miasta, adresu, promienia, aktywności i planu.
  nl: Vind Urban Sports Club-fitnesslocaties op stad, adres, straal, activiteit en abonnement.
  ar: اعثر على مواقع اللياقة البدنية في Urban Sports Club حسب المدينة أو العنوان أو نصف القطر أو النشاط أو الخطة.
  hi: शहर, पते, दायरे, गतिविधि और प्लान के आधार पर Urban Sports Club फिटनेस स्थान खोजें।
  th: ค้นหาสถานที่ออกกำลังกายของ Urban Sports Club ตามเมือง ที่อยู่ รัศมี กิจกรรม และแพ็กเกจ
  cs: Najděte fitness místa Urban Sports Club podle města, adresy, okruhu, aktivity a plánu.
  sv: Hitta Urban Sports Club-fitnessplatser efter stad, adress, radie, aktivitet och plan.
  he: מצאו מקומות כושר של Urban Sports Club לפי עיר, כתובת, רדיוס, פעילות ותוכנית.
  verified_by_human: [en, de, zh, es, fr, pt, ru, ja, ko, it, tr, vi, id, pl, nl, ar, hi, th, cs, sv, he]

