search_classes.description:
  context: Description for fitness class search skill
  en: Find available Urban Sports Club classes by date, address, radius, activity, attendance mode, spots, and plan.
  de: Finde verfügbare Urban Sports Club Kurse nach Datum, Adresse, Umkreis, Aktivität, Teilnahmeart, freien Plätzen und Tarif.
  zh: 按日期、地址、半径、活动、参加方式、名额和会员方案查找可预约的 Urban Sports Club 课程。
  es: Encuentra clases disponibles de Urban Sports Club por fecha, dirección, radio, actividad, modalidad de asistencia, plazas y plan.
  fr: Trouvez des cours Urban Sports Club disponibles par date, adresse, rayon, activité, mode de participation, places et abonnement.
  pt: Encontre aulas disponíveis da Urban Sports Club por data, endereço, raio, atividade, modo de participação, vagas e plano.
  ru: Находите доступные занятия Urban Sports Club по дате, адресу, радиусу, активности, формату участия, местам и тарифу.
  ja: 日付、住所、半径、アクティビティ、参加形式、空き枠、プランで予約可能な Urban Sports Club クラスを探します。
  ko: 날짜, 주소, 반경, 활동, 참석 방식, 자리, 플랜별로 예약 가능한 Urban Sports Club 수업을 찾습니다.
  it: Trova corsi Urban Sports Club disponibili per data, indirizzo, raggio, attività, modalità di partecipazione, posti e piano.
  tr: Uygun Urban Sports Club derslerini tarih, adres, yarıçap, aktivite, katılım modu, kontenjan ve plana göre bulun.
  vi: Tìm các lớp Urban Sports Club còn chỗ theo ngày, địa chỉ, bán kính, hoạt động, hình thức tham gia, số chỗ và gói.
  id: Temukan kelas Urban Sports Club yang tersedia berdasarkan tanggal, alamat, radius, aktivitas, mode kehadiran, tempat, dan paket.
  pl: Znajdź dostępne zajęcia Urban Sports Club według daty, adresu, promienia, aktywności, trybu uczestnictwa, miejsc i planu.
  nl: Vind beschikbare Urban Sports Club-lessen op datum, adres, straal, activiteit, deelnamevorm, plekken en abonnement.
  ar: اعثر على حصص Urban Sports Club المتاحة حسب التاريخ أو العنوان أو نصف القطر أو النشاط أو طريقة الحضور أو المقاعد أو الخطة.
  hi: तारीख, पते, दायरे, गतिविधि, उपस्थिति मोड, उपलब्ध स्थानों और प्लान के आधार पर Urban Sports Club की उपलब्ध क्लास खोजें।
  th: ค้นหาคลาส Urban Sports Club ที่ว่างตามวันที่ ที่อยู่ รัศมี กิจกรรม รูปแบบการเข้าร่วม จำนวนที่ว่าง และแพ็กเกจ
  cs: Najděte dostupné lekce Urban Sports Club podle data, adresy, okruhu, aktivity, způsobu účasti, volných míst a plánu.
  sv: Hitta tillgängliga Urban Sports Club-pass efter datum, adress, radie, aktivitet, deltagandeform, platser och plan.
  he: מצאו שיעורי Urban Sports Club זמינים לפי תאריך, כתובת, רדיוס, פעילות, אופן השתתפות, מקומות פנויים ותוכנית.
