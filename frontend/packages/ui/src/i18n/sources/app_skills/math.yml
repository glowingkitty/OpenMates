  ja: 方程式を解き、導関数や積分を計算する。
  ko: 방정식을 풀고 미분 또는 적분을 계산하세요.
  it: Risolvi equazioni e calcola derivate o integrali.
  tr: Denklemleri çözün, türev ve integralleri hesaplayın.
  vi: Giải phương trình và tính đạo hàm hoặc tích phân.
  id: Selesaikan persamaan dan hitung turunan atau integral.
  pl: Rozwiązuj równania i obliczaj pochodne lub całki.
  nl: Los vergelijkingen op en bereken afgeleiden/integralen.
  ar: حل المعادلات واحسب المشتقات أو التكاملات.
  hi: समीकरण हल करें और अवकलज या समाकल की गणना करें।
