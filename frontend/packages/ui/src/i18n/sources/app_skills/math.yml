# app_skills/math.yml
# Translation keys for the Math app's skills.
# Keys here live in the "app_skills.math" namespace.
# The generate-apps-metadata.js script auto-prepends "app_skills." to skill
# translation keys, so app.yml uses "math.calculate" → resolves to "app_skills.math.calculate".

calculate:
  context: Skill name for calculate in Math app
  en: Calculate
  de: Berechnen
  zh: 计算
  es: Calcular
  fr: Calculer
  pt: Calcular
  ru: Вычислить
  ja: 計算する
  ko: 계산하기
  it: Calcola
  tr: Hesapla
  vi: Tính toán
  id: Hitung
  pl: Oblicz
  nl: Berekenen
  ar: احسب
  hi: गणना करें
  th: คำนวณ
  cs: Vypočítat
  sv: Beräkna
