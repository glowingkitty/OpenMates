search_recipes.description:
  context: Description for the recipe search skill in Nutrition app
  en: Search for recipes by dietary filters and categories.
  de: Rezepte nach Ernährungsfiltern und Kategorien suchen.
  zh: 按饮食过滤器和分类搜索食谱。
  es: Busca recetas por filtros dietéticos y categorías.
  fr: Recherchez des recettes par filtres alimentaires et catégories.
  pt: Pesquise receitas por filtros alimentares e categorias.
  ru: Ищите рецепты по диетическим фильтрам и категориям.
  ja: 食事フィルターやカテゴリーでレシピを検索。
  ko: 식이 필터와 카테고리로 레시피를 검색하세요.
  it: Cerca ricette per filtri dietetici e categorie.
  tr: Diyet filtreleri ve kategorilere göre tarif arayın.
  vi: Tìm công thức theo bộ lọc dinh dưỡng và danh mục.
  id: Cari resep berdasarkan filter diet dan kategori.
  pl: Szukaj przepisów według filtrów dietetycznych i kategorii.
  nl: Zoek recepten op dieetfilters en categorieën.
  ar: ابحث عن وصفات حسب فلاتر النظام الغذائي والفئات.
  hi: आहार फ़िल्टर और श्रेणियों के अनुसार रेसिपी खोजें।
  th: ค้นหาสูตรอาหารตามตัวกรองโภชนาการและหมวดหมู่
  cs: Hledejte recepty podle dietních filtrů a kategorií.
  sv: Sök recept efter kostfilter och kategorier.
  he: חפש מתכונים לפי סינון תזונתי וקטגוריות.
  verified_by_human: [en, de]

