create.description:
  context: Description for Remotion video creation skill
  en: Create deterministic videos with editable Remotion code.
  de: Erstelle deterministische Videos mit bearbeitbarem Remotion-Code.
  zh: 使用可编辑的 Remotion 代码创建确定性视频。
