  it: Esegui il codice della chat corrente in una sandbox isolata.
  tr: Mevcut sohbetten kodu izole bir kum havuzunda çalıştır.
  vi: Chạy mã từ cuộc trò chuyện hiện tại trong một hộp cát (sandbox) biệt lập.
  id: Jalankan kode dari obrolan saat ini di sandbox terisolasi.
  pl: Uruchamiaj kod z bieżącego czatu w odizolowanej piaskownicy.
