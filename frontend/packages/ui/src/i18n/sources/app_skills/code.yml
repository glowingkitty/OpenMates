run.select_files_description:
  context: Code Run file selection panel subtitle
  en: Choose which current-chat files are copied into the sandbox.
  de: Wähle aus, welche Dateien aus dem aktuellen Chat in die Sandbox kopiert werden.
  zh: 选择要复制到沙箱中的当前对话文件。
  fr: Choisis les fichiers de la discussion actuelle à copier dans le bac à sable.
  pt: Escolhe quais arquivos do chat atual serão copiados para o sandbox.
  ru: Выбери, какие файлы из текущего чата будут скопированы в песочницу.
  ja: 現在のチャットからサンドボックスにコピーするファイルを選択してください。
  ko: 현재 채팅 파일 중 샌드박스로 복사할 파일을 선택하세요.
  it: Scegli quali file della chat corrente copiare nella sandbox.
  tr: Mevcut sohbetten hangi dosyaların kum havuzuna kopyalanacağını seç.
  vi: Chọn các tệp trong cuộc trò chuyện hiện tại để sao chép vào hộp cát.
  id: Pilih file obrolan saat ini yang akan disalin ke sandbox.
  pl: Wybierz, które pliki z bieżącego czatu zostaną skopiowane do piaskownicy.
  nl: Kies welke bestanden uit de huidige chat naar de sandbox worden gekopieerd.
