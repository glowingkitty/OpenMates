search_icons.description:
  context: Description for Design icon search skill
  en: Find open-source SVG icons from Iconify collections.
  de: Finde Open-Source-SVG-Icons aus Iconify-Sammlungen.
  zh: 从 Iconify 图标库中查找开源 SVG 图标。
  es: Encuentra iconos SVG de código abierto en colecciones de Iconify.
  fr: Trouvez des icônes SVG open source dans les collections Iconify.
  pt: Encontre ícones SVG de código aberto nas coleções do Iconify.
  ru: Находите SVG-иконки с открытым исходным кодом из коллекций Iconify.
  ja: Iconify コレクションからオープンソースの SVG アイコンを探します。
  ko: Iconify 컬렉션에서 오픈소스 SVG 아이콘을 찾으세요.
  it: Trova icone SVG open source dalle raccolte Iconify.
  tr: Iconify koleksiyonlarından açık kaynak SVG simgeleri bulun.
  vi: Tìm biểu tượng SVG mã nguồn mở từ các bộ sưu tập Iconify.
  id: Temukan ikon SVG sumber terbuka dari koleksi Iconify.
  pl: Znajdź ikony SVG open source z kolekcji Iconify.
  nl: Vind open-source SVG-iconen uit Iconify-collecties.
  ar: ابحث عن أيقونات SVG مفتوحة المصدر من مجموعات Iconify.
  hi: Iconify संग्रहों से ओपन-सोर्स SVG आइकन खोजें।
  th: ค้นหาไอคอน SVG แบบโอเพนซอร์สจากคอลเลกชัน Iconify
  cs: Najděte open-source SVG ikony z kolekcí Iconify.
  sv: Hitta SVG-ikoner med öppen källkod från Iconify-samlingar.
  he: מצא אייקוני SVG בקוד פתוח מאוספי Iconify.
  verified_by_human:
    - en
