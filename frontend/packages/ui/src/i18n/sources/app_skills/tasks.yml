skills.create.description:
  context: Description for the create task skill
  en: Create tasks with titles, descriptions, and assignees.
  de: Erstelle Aufgaben mit Titeln, Beschreibungen und Zuständigen.
  zh: 创建包含标题、描述和负责人的任务。
  es: Crea tareas con títulos, descripciones y responsables.
  fr: Créez des tâches avec des titres, des descriptions et des responsables.
  pt: Crie tarefas com títulos, descrições e responsáveis.
  ru: Создавайте задачи с названиями, описаниями и исполнителями.
  ja: タイトル、説明、担当者付きのタスクを作成します。
  ko: 제목, 설명, 담당자가 포함된 작업을 만듭니다.
  it: Crea attività con titoli, descrizioni e assegnatari.
  tr: Başlıklar, açıklamalar ve sorumlularla görevler oluşturun.
  vi: Tạo nhiệm vụ với tiêu đề, mô tả và người phụ trách.
  id: Buat tugas dengan judul, deskripsi, dan penanggung jawab.
  pl: Twórz zadania z tytułami, opisami i osobami odpowiedzialnymi.
  nl: Maak taken met titels, beschrijvingen en verantwoordelijken.
  ar: أنشئ مهامًا بعناوين وأوصاف ومكلفين.
  hi: शीर्षक, विवरण और असाइनी के साथ कार्य बनाएं।
  th: สร้างงานพร้อมชื่อ คำอธิบาย และผู้รับผิดชอบ
  cs: Vytvářejte úkoly s názvy, popisy a odpovědnými osobami.
  sv: Skapa uppgifter med titlar, beskrivningar och ansvariga.
  he: צרו משימות עם כותרות, תיאורים ואחראים.
  verified_by_human: []
