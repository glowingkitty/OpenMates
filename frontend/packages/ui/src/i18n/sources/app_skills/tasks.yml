skills.search.description:
  context: Description for the search tasks skill
  en: Find tasks by title, description, assignee, or status.
  de: Finde Aufgaben nach Titel, Beschreibung, zuständiger Person oder Status.
  zh: 按标题、描述、负责人或状态查找任务。
  es: Encuentra tareas por título, descripción, responsable o estado.
  fr: Trouvez des tâches par titre, description, responsable ou statut.
  pt: Encontre tarefas por título, descrição, responsável ou status.
  ru: Находите задачи по названию, описанию, исполнителю или статусу.
  ja: タイトル、説明、担当者、ステータスでタスクを検索します。
  ko: 제목, 설명, 담당자 또는 상태로 작업을 찾습니다.
  it: Trova attività per titolo, descrizione, assegnatario o stato.
  tr: Görevleri başlığa, açıklamaya, sorumluya veya duruma göre bulun.
  vi: Tìm nhiệm vụ theo tiêu đề, mô tả, người phụ trách hoặc trạng thái.
  id: Temukan tugas berdasarkan judul, deskripsi, penanggung jawab, atau status.
  pl: Znajduj zadania według tytułu, opisu, osoby odpowiedzialnej lub statusu.
  nl: Vind taken op titel, beschrijving, verantwoordelijke of status.
  ar: ابحث عن المهام حسب العنوان أو الوصف أو المكلف أو الحالة.
  hi: शीर्षक, विवरण, असाइनी या स्थिति से कार्य खोजें।
  th: ค้นหางานตามชื่อ คำอธิบาย ผู้รับผิดชอบ หรือสถานะ
  cs: Najděte úkoly podle názvu, popisu, odpovědné osoby nebo stavu.
  sv: Hitta uppgifter efter titel, beskrivning, ansvarig eller status.
  he: מצאו משימות לפי כותרת, תיאור, אחראי או סטטוס.
  verified_by_human: []
