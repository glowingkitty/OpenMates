share_usecase.description:
  context: Description for the share use case skill — anonymously shares how the user wants to use OpenMates
  en: Share your OpenMates use case anonymously.
  de: Teile deinen Anwendungsfall anonym.
  zh: 匿名分享你的 OpenMates 用例。
  es: Comparte tu caso de uso de forma anónima.
  fr: Partagez votre cas d'usage anonymement.
  pt: Compartilhe seu caso de uso anonimamente.
  ru: Поделитесь своим сценарием использования анонимно.
  ja: 使い方を匿名で共有してください。
  ko: 사용 사례를 익명으로 공유하세요.
  it: Condividi il tuo caso d'uso in modo anonimo.
  tr: Kullanım durumunu anonim olarak paylaş.
  vi: Chia sẻ trường hợp dùng của bạn ẩn danh.
  id: Bagikan kasus penggunaan kamu secara anonim.
  pl: Podziel się swoim przypadkiem użycia anonimowo.
  nl: Deel je gebruiksgeval anoniem.
  ar: شارك حالة استخدامك بشكل مجهول.
  hi: अपना उपयोग का मामला गुमनाम रूप से साझा करें।
  th: แชร์กรณีใช้งานของคุณแบบไม่ระบุตัวตน
  cs: Sdílejte svůj případ použití anonymně.
  sv: Dela ditt användningsfall anonymt.
  he: שתף את מקרה השימוש שלך ב-OpenMates באופן אנונימי.
  verified_by_human: []

