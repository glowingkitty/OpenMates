search.how_to_use.3:
  context: Example instruction for events search skill - local events by city
  en: What **tech events** are happening in London in January?
  de: Welche Tech-Veranstaltungen finden im Januar in London statt?
  zh: 一月份伦敦有哪些科技活动？
  es: ¿Qué eventos tecnológicos hay en Londres en enero?
  fr: Quels événements tech ont lieu à Londres en janvier ?
  pt: Quais eventos de tecnologia acontecem em Londres em janeiro?
  ru: Какие технические мероприятия проходят в Лондоне в январе?
  ja: 1月にロンドンで開催されるテックイベントは？
  ko: 1월에 런던에서 어떤 기술 행사가 열리나요?
  it: Quali eventi tech si tengono a Londra a gennaio?
  tr: Ocak ayında Londra'da hangi teknoloji etkinlikleri var?
  vi: Sự kiện công nghệ nào diễn ra ở London vào tháng Giêng?
  id: Acara teknologi apa yang berlangsung di London bulan Januari?
  pl: Jakie wydarzenia technologiczne odbywają się w Londynie w styczniu?
  nl: Welke tech-evenementen vinden er in januari in Londen plaats?
  ar: ما الفعاليات التقنية التي تجري في لندن في يناير؟
  hi: जनवरी में लंदन में कौन से टेक इवेंट हो रहे हैं?
  th: กิจกรรมเทคโนโลยีอะไรบ้างที่เกิดขึ้นในลอนดอนในเดือนมกราคม?
  cs: Jaké technologické akce se konají v Londýně v lednu?
  sv: Vilka tech-evenemang äger rum i London i januari?
  he: "אילו **אירועי טכנולוגיה** מתקיימים בלונדון בינואר?"
  verified_by_human: [en, de]
