create_event.description:
  context: Description for creating calendar events
  en: Create a calendar event after you approve the proposed details.
  de: Erstelle einen Kalendertermin, nachdem du die vorgeschlagenen Details genehmigt hast.
  zh: 在你批准建议的详情后创建日历事件。
  es: Crea un evento de calendario después de que apruebes los detalles propuestos.
  fr: Créer un événement de calendrier après votre approbation des détails proposés.
  pt: Crie um evento de calendário depois que você aprovar os detalhes propostos.
  ru: Создайте событие календаря после вашего подтверждения предложенных деталей.
  ja: 提案された詳細を承認した後、カレンダーの予定を作成します。
  ko: 제안된 세부 정보를 승인한 후 캘린더 일정을 만듭니다.
  it: Crea un evento del calendario dopo che hai approvato i dettagli proposti.
  tr: Önerilen ayrıntıları onayladıktan sonra bir takvim etkinliği oluşturun.
  vi: Tạo sự kiện lịch sau khi bạn phê duyệt các chi tiết được đề xuất.
  id: Buat acara kalender setelah Anda menyetujui detail yang diusulkan.
  pl: Utwórz wydarzenie w kalendarzu po zatwierdzeniu proponowanych szczegółów.
  nl: Maak een agenda-afspraak nadat je de voorgestelde details hebt goedgekeurd.
  ar: أنشئ حدثًا في التقويم بعد موافقتك على التفاصيل المقترحة.
  hi: प्रस्तावित विवरणों को आपकी मंज़ूरी के बाद कैलेंडर इवेंट बनाएं।
  th: สร้างกิจกรรมในปฏิทินหลังจากคุณอนุมัติรายละเอียดที่เสนอ
  cs: Vytvořte událost v kalendáři poté, co schválíte navržené podrobnosti.
  sv: Skapa en kalenderhändelse efter att du har godkänt de föreslagna detaljerna.
  he: יצירת אירוע בלוח השנה לאחר שתאשר את הפרטים המוצעים.
  verified_by_human: [en, de]

