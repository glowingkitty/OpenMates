get_events.description:
  context: Description for reading calendar events
  en: Read events, agendas, availability, and event details from a connected calendar.
  de: Lies Termine, Agenden, Verfügbarkeiten und Termindetails aus einem verbundenen Kalender.
  zh: 从已连接的日历读取事件、议程、可用时间和事件详情。
  es: Lee eventos, agendas, disponibilidad y detalles de eventos desde un calendario conectado.
  fr: Lire les événements, agendas, disponibilités et détails depuis un calendrier connecté.
  pt: Leia eventos, agendas, disponibilidade e detalhes de eventos de um calendário conectado.
  ru: Читайте события, повестки, доступность и сведения о событиях из подключённого календаря.
  ja: 接続されたカレンダーから予定、議題、空き時間、予定の詳細を読み取ります。
  ko: 연결된 캘린더에서 일정, 안건, 가능 시간, 일정 세부 정보를 읽습니다.
  it: Leggi eventi, agende, disponibilità e dettagli da un calendario collegato.
  tr: Bağlı bir takvimden etkinlikleri, gündemleri, uygunluğu ve etkinlik ayrıntılarını okuyun.
  vi: Đọc sự kiện, lịch trình, thời gian rảnh và chi tiết sự kiện từ lịch đã kết nối.
  id: Baca acara, agenda, ketersediaan, dan detail acara dari kalender yang terhubung.
  pl: Odczytuj wydarzenia, agendy, dostępność i szczegóły wydarzeń z połączonego kalendarza.
  nl: Lees afspraken, agenda's, beschikbaarheid en afspraakdetails uit een gekoppelde agenda.
  ar: اقرأ الأحداث والجداول والتوفر وتفاصيل الأحداث من تقويم متصل.
  hi: कनेक्टेड कैलेंडर से इवेंट, एजेंडा, उपलब्धता और इवेंट विवरण पढ़ें।
  th: อ่านกิจกรรม กำหนดการ เวลาว่าง และรายละเอียดกิจกรรมจากปฏิทินที่เชื่อมต่อ
  cs: Čtěte události, agendy, dostupnost a podrobnosti událostí z připojeného kalendáře.
  sv: Läs händelser, agendor, tillgänglighet och händelsedetaljer från en ansluten kalender.
  he: קריאת אירועים, סדרי יום, זמינות ופרטי אירועים מלוח שנה מחובר.
  verified_by_human: [en, de]

