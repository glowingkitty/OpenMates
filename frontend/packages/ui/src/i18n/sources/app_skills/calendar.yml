update_event.description:
  context: Description for updating calendar events
  en: Update an existing calendar event after permission checks.
  de: Bearbeite einen bestehenden Kalendertermin nach den Berechtigungsprüfungen.
  zh: 在权限检查后更新现有日历事件。
  es: Actualiza un evento de calendario existente después de las comprobaciones de permisos.
  fr: Mettre à jour un événement de calendrier existant après vérification des autorisations.
  pt: Atualize um evento de calendário existente após verificações de permissão.
  ru: Обновите существующее событие календаря после проверки разрешений.
  ja: 権限チェック後に既存のカレンダー予定を更新します。
  ko: 권한 확인 후 기존 캘린더 일정을 업데이트합니다.
  it: Aggiorna un evento del calendario esistente dopo i controlli delle autorizzazioni.
  tr: İzin kontrollerinden sonra mevcut bir takvim etkinliğini güncelleyin.
  vi: Cập nhật sự kiện lịch hiện có sau khi kiểm tra quyền.
  id: Perbarui acara kalender yang ada setelah pemeriksaan izin.
  pl: Aktualizuj istniejące wydarzenie w kalendarzu po sprawdzeniu uprawnień.
  nl: Werk een bestaande agenda-afspraak bij na toestemmingscontroles.
  ar: حدّث حدثًا موجودًا في التقويم بعد فحص الأذونات.
  hi: अनुमति जांच के बाद मौजूदा कैलेंडर इवेंट अपडेट करें।
  th: อัปเดตกิจกรรมปฏิทินที่มีอยู่หลังจากตรวจสอบสิทธิ์
  cs: Aktualizujte existující událost v kalendáři po kontrolách oprávnění.
  sv: Uppdatera en befintlig kalenderhändelse efter behörighetskontroller.
  he: עדכון אירוע קיים בלוח השנה לאחר בדיקות הרשאה.
  verified_by_human: [en, de]

delete_event:
  context: Skill name for deleting calendar events
  en: Delete Event
  de: Termin löschen
  zh: 删除事件
  es: Eliminar evento
  fr: Supprimer l'événement
  pt: Excluir evento
  ru: Удалить событие
  ja: 予定を削除
  ko: 일정 삭제
  it: Elimina evento
  tr: Etkinliği sil
  vi: Xóa sự kiện
  id: Hapus acara
  pl: Usuń wydarzenie
  nl: Afspraak verwijderen
  ar: حذف الحدث
  hi: इवेंट हटाएं
  th: ลบกิจกรรม
  cs: Smazat událost
  sv: Ta bort händelse
  he: מחיקת אירוע
  verified_by_human: [en, de]
delete_event.description:
  context: Description for deleting calendar events
  en: Delete calendar events only after explicit permission or an allowed automation rule.
  de: Lösche Kalendertermine nur nach ausdrücklicher Erlaubnis oder einer erlaubten Automatisierungsregel.
  zh: 仅在获得明确许可或符合允许的自动化规则后删除日历事件。
  es: Elimina eventos de calendario solo tras permiso explícito o una regla de automatización permitida.
  fr: Supprimer des événements de calendrier uniquement après autorisation explicite ou règle d'automatisation autorisée.
  pt: Exclua eventos do calendário somente após permissão explícita ou uma regra de automação permitida.
  ru: Удаляйте события календаря только после явного разрешения или разрешённого правила автоматизации.
  ja: 明示的な許可または許可された自動化ルールがある場合にのみ、カレンダーの予定を削除します。
  ko: 명시적 허가 또는 허용된 자동화 규칙이 있을 때만 캘린더 일정을 삭제합니다.
  it: Elimina eventi del calendario solo dopo un permesso esplicito o una regola di automazione consentita.
  tr: Takvim etkinliklerini yalnızca açık izin veya izin verilen bir otomasyon kuralından sonra silin.
  vi: Chỉ xóa sự kiện lịch sau khi có quyền rõ ràng hoặc quy tắc tự động hóa được cho phép.
  id: Hapus acara kalender hanya setelah izin eksplisit atau aturan otomatisasi yang diizinkan.
  pl: Usuwaj wydarzenia z kalendarza tylko po wyraźnej zgodzie lub zgodnie z dozwoloną regułą automatyzacji.
  nl: Verwijder agenda-afspraken alleen na expliciete toestemming of een toegestane automatiseringsregel.
  ar: احذف أحداث التقويم فقط بعد إذن صريح أو قاعدة أتمتة مسموح بها.
  hi: स्पष्ट अनुमति या अनुमत ऑटोमेशन नियम के बाद ही कैलेंडर इवेंट हटाएं।
  th: ลบกิจกรรมในปฏิทินเฉพาะหลังจากได้รับอนุญาตอย่างชัดเจนหรือมีกฎอัตโนมัติที่อนุญาต
  cs: Mažte události kalendáře pouze po výslovném svolení nebo povoleném automatizačním pravidle.
  sv: Ta endast bort kalenderhändelser efter uttrycklig tillåtelse eller en tillåten automatiseringsregel.
  he: מחיקת אירועי לוח שנה רק לאחר הרשאה מפורשת או כלל אוטומציה מורשה.
  verified_by_human: [en, de]
