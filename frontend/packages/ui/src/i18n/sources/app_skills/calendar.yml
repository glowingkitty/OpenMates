  en: Update Event
  de: Termin bearbeiten
  zh: 更新事件
  es: Actualizar evento
  fr: Mettre à jour l'événement
  pt: Atualizar evento
  ru: Обновить событие
  ja: 予定を更新
  ko: 일정 업데이트
  it: Aggiorna evento
  tr: Etkinliği güncelle
  vi: Cập nhật sự kiện
  id: Perbarui acara
  pl: Aktualizuj wydarzenie
  nl: Afspraak bijwerken
  ar: تحديث الحدث
  hi: इवेंट अपडेट करें
  th: อัปเดตกิจกรรม
  cs: Aktualizovat událost
