  zh: 查找上周来自银行的邮件
  es: Busca correos de mi banco en la última semana
  fr: Trouve les e-mails de ma banque de la semaine dernière
  pt: Encontre e-mails do meu banco na última semana
  ru: Найдите письма от банка за последнюю неделю
  ja: 先週の銀行からのメールを検索
  ko: 지난 주 은행에서 온 이메일 찾기
  it: Trova e-mail dalla mia banca nell'ultima settimana
  tr: Son haftaki bankamdan gelen e-postaları bul
  vi: Tìm email từ ngân hàng trong tuần qua
  id: Cari email dari bank saya minggu lalu
  pl: Znajdź e-maile z mojego banku z ostatniego tygodnia
  nl: Vind e-mails van mijn bank van afgelopen week
  ar: ابحث عن رسائل من بنكي في الأسبوع الماضي
  hi: पिछले हफ्ते बैंक से आए ईमेल खोजें
  th: ค้นหาอีเมลจากธนาคารในสัปดาห์ที่ผ่านมา
  cs: Najděte e-maily od mé banky za poslední týden
  sv: Hitta e-post från min bank den senaste veckan
  he: "**חפש מיילים** מהבנק שלי בשבוע האחרון"
  verified_by_human: [en, de]

