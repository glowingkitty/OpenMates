search_products.description:
  context: Description for shopping search products skill
  en: Search for products in online shops & online supermarkets.
  de: Produkte in Online-Shops und Online-Supermärkten suchen.
  zh: 在网上商店和网上超市中搜索产品。
  es: Busca productos en tiendas en línea y supermercados en línea.
  fr: Recherchez des produits dans les boutiques en ligne et les supermarchés en ligne.
  pt: Pesquise produtos em lojas online e supermercados online.
  ru: Ищите товары в интернет-магазинах и онлайн-супермаркетах.
  ja: オンラインショップとオンラインスーパーマーケットで商品を検索する。
  ko: 온라인 쇼핑몰 및 온라인 슈퍼마켓에서 제품을 검색하세요.
  it: Cerca prodotti nei negozi online e nei supermercati online.
  tr: Online mağazalarda ve online süpermarketlerde ürün arayın.
  vi: Tìm kiếm sản phẩm trong các cửa hàng trực tuyến và siêu thị trực tuyến.
  id: Cari produk di toko online dan supermarket online.
  pl: Szukaj produktów w sklepach internetowych i internetowych supermarketach.
  nl: Zoek producten in online winkels en online supermarkten.
  ar: ابحث عن المنتجات في المتاجر الإلكترونية والسوبرماركت الإلكتروني.
  hi: ऑनलाइन दुकानों और ऑनलाइन सुपरमार्केट में उत्पाद खोजें।
  th: ค้นหาสินค้าในร้านค้าออนไลน์และซุปเปอร์มาร์เก็ตออนไลน์
  cs: Hledejte produkty v online obchodech a online supermarketech.
  sv: Sök efter produkter i onlinebutiker och onlinesupermarkets.
  he: חפש מוצרים בחנויות מקוונות וסופרמרקטים מקוונים.
  verified_by_human: []

