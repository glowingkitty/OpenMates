search_products.description:
  context: Description for shopping search products skill
  en: Search and compare products across supermarkets.
  de: Produkte in Supermärkten suchen und vergleichen.
  zh: 在超市中搜索和比较产品。
  es: Busca y compara productos en supermercados.
  fr: Cherchez et comparez des produits dans les supermarchés.
  pt: Pesquise e compare produtos em supermercados.
  ru: Ищите и сравнивайте товары в супермаркетах.
  ja: スーパーの商品を検索して比較する。
  ko: 슈퍼마켓 상품을 검색하고 비교하세요.
  it: Cerca e confronta prodotti nei supermercati.
  tr: Süpermarketlerde ürün arayın ve karşılaştırın.
  vi: Tìm kiếm và so sánh sản phẩm tại siêu thị.
  id: Cari dan bandingkan produk di supermarket.
  pl: Szukaj i porównuj produkty w supermarketach.
  nl: Zoek en vergelijk producten in supermarkten.
  ar: ابحث عن منتجات وقارنها في السوبرماركت.
  hi: सुपरमार्केट में उत्पाद खोजें और तुलना करें।
  th: ค้นหาและเปรียบเทียบสินค้าในซุปเปอร์มาร์เก็ต
  cs: Hledejte a porovnávejte produkty v supermarketech.
  sv: Sök och jämför produkter i supermarkets.
  he: חיפוש והשוואת מוצרים בסופרמרקטים.
  verified_by_human: []

