providers.web_and_search.firecrawl.description:
  context: Firecrawl description
  en: >-
    Firecrawl powers the web read skill, scraping and extracting content from
    web pages you ask about. Firecrawl sees the URL you requested and the full
    content of the scraped page.
  de: Firecrawl betreibt den Web-Read-Skill, indem es Inhalte von Webseiten extrahiert, nach denen du fragst. Firecrawl sieht die von dir angeforderte URL und den vollständigen Inhalt der gescrapten Seite.
  zh: Firecrawl 为网页阅读技能提供支持，从您咨询的网页中抓取并提取内容。Firecrawl 会看到您请求的 URL 以及抓取页面的完整内容。
  es: Firecrawl potencia la habilidad de lectura web, extrayendo contenido de las páginas web por las que preguntas. Firecrawl ve la URL que solicitaste y el contenido completo de la página extraída.
  pt: O Firecrawl alimenta a skill de leitura web, extraindo conteúdo de páginas web sobre as quais perguntas. O Firecrawl vê o URL que solicitaste e o conteúdo completo da página extraída.
  ja: Firecrawlはウェブ閲覧（web-read）スキルを支えており、指定されたウェブページからコンテンツをスクレイピングして抽出する。Firecrawlは、リクエストされたURLとスクレイピングされたページの全コンテンツを参照する。
  ko: Firecrawl은 웹 읽기 스킬을 구동하여 사용자가 요청한 웹 페이지의 콘텐츠를 스크레이핑하고 추출합니다. Firecrawl은 요청된 URL과 스크레이핑된 페이지의 전체 콘텐츠를 확인합니다.
  it: "Firecrawl gestisce la skill web read, estraendo il contenuto dalle pagine web su cui chiedi informazioni. Firecrawl vede l'URL che hai richiesto e il contenuto completo della pagina estratta."
  tr: "Firecrawl, hakkında soru sorduğun web sayfalarından içerik tarayan ve çıkaran web okuma yeteneğine güç verir. Firecrawl, istediğin URL'yi ve taranan sayfanın tam içeriğini görür."
  vi: Firecrawl cung cấp sức mạnh cho kỹ năng đọc web, thu thập và trích xuất nội dung từ các trang web bạn yêu cầu. Firecrawl thấy URL bạn đã yêu cầu và toàn bộ nội dung của trang web được thu thập.
  id: Firecrawl mendukung keahlian baca web, mengeruk dan mengekstrak konten dari halaman web yang kamu tanyakan. Firecrawl melihat URL yang kamu minta dan konten lengkap dari halaman yang dikeruk.
  pl: Firecrawl obsługuje umiejętność czytania stron internetowych, pobierając i wyodręärbcając treść ze stron, o które pytasz. Firecrawl widzi żądany adres URL oraz pełną treść pobranej strony.
  nl: "Firecrawl drijft de web-lees-skill aan door inhoud te scrapen en te extraheren van webpagina's waar je naar vraagt. Firecrawl ziet de door jou opgevraagde URL en de volledige inhoud van de gescrapete pagina."
  hi: Firecrawl वेब रीड स्किल को पावर देता है, जो आपके द्वारा पूछे गए वेब पेजों से कंटेंट को स्क्रैप और एक्सट्रैक्ट करता है। Firecrawl आपके द्वारा अनुरोधित URL और स्क्रैप किए गए पेज का पूरा कंटेंट देखता है।
  th: Firecrawl ขับเคลื่อนทักษะการอ่านเว็บ โดยทำการดึงข้อมูลและสกัดเนื้อหาจากหน้าเว็บที่คุณสอบถาม โดย Firecrawl จะเห็น URL ที่คุณขอและเนื้อหาทั้งหมดของหน้าที่ถูกดึงข้อมูลมา
  sv: Firecrawl driver färdigheten för webbläsning genom att skrapa och extrahera innehåll från webbsidor du frågar om. Firecrawl ser webbadressen du begärde och det fullständiga innehållet på den skrapade sidan.
  fr: "Firecrawl alimente la compétence de lecture web, en récupérant et en extrayant le contenu des pages web que tu mentionnes. Firecrawl voit l'URL que tu as demandée et l'intégralité du contenu de la page récupérée."
  ru: Firecrawl обеспечивает работу навыка чтения веб-страниц, собирая и извлекая контент со страниц, о которых ты спрашиваешь. Firecrawl видит запрошенный тобой URL и полное содержимое полученной страницы.
  ar: يدعم Firecrawl مهارة قراءة الويب، حيث يقوم بمسح واستخراج المحتوى من صفحات الويب التي تسأل عنها. يرى Firecrawl عنوان URL الذي طلبته والمحتوى الكامل للصفحة الممسوحة ضوئياً.
  cs: Firecrawl pohání funkci čtení webu, kdy získává a extrahuje obsah z webových stránek, na které se ptáš. Firecrawl vidí URL, o kterou jsi požádal, a celý obsah stažené stránky.
  he: Firecrawl מפעיל את יכולת קריאת האינטרנט, סורק ומחלץ תוכן מדפי אינטרנט שאתה שואל עליהם. Firecrawl רואה את כתובת ה-URL שביקשת ואת התוכן המלא של הדף שנסרק.
  verified_by_human: []
