  sv: Luma driver evenemangssökning för teknik-, kreativa och community-evenemang. Luma tar emot dina sökfrågor utan en användaridentifierare.
  he: Luma מפעילה חיפוש אירועים עבור אירועי טכנולוגיה, יצירה וקהילה. Luma מקבלת את שאילתות החיפוש שלך ללא מזהה משתמש.
