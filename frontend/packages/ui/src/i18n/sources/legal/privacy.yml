  en: >-
    Google Gemini processes requests for Gemini-family models when you select
    one. Google receives your chat messages with PII placeholders already
    substituted client-side.
  de: Google Gemini verarbeitet Anfragen für Modelle der Gemini-Familie, wenn du eines auswählst. Google erhält deine Chat-Nachrichten mit bereits clientseitig ersetzten PII-Platzhaltern.
  zh: 当您选择 Gemini 系列模型时，Google Gemini 会处理相关请求。Google 接收您的聊天消息时，其中的 PII（个人身份信息）占位符已在客户端完成替换。
  es: Google Gemini procesa solicitudes para modelos de la familia Gemini cuando seleccionas uno. Google recibe tus mensajes de chat con los marcadores de PII ya sustituidos en el lado del cliente.
  pt: O Google Gemini processa pedidos para modelos da família Gemini quando selecionas um. A Google recebe as tuas mensagens de chat com marcadores de PII já substituídos no lado do cliente.
  ja: Google Geminiは、Geminiファミリーのモデルを選択した際にそのリクエストを処理する。Googleは、クライアント側でPII（個人を特定できる情報）プレースホルダーに置換済みのチャットメッセージを受信する。
  ko: Google Gemini는 사용자가 Gemini 제품군 모델을 선택할 때 요청을 처리합니다. Google은 클라이언트 측에서 PII 자리표시자가 이미 대체된 상태로 채팅 메시지를 수신합니다.
  it: Google Gemini elabora le richieste per i modelli della famiglia Gemini quando ne selezioni uno. Google riceve i tuoi messaggi di chat con i segnaposto PII già sostituiti lato client.
  tr: Google Gemini, bir Gemini ailesi modeli seçtiğinde istekleri işler. Google, sohbet mesajlarını PII yer tutucuları istemci tarafında değiştirilmiş olarak alır.
  vi: Google Gemini xử lý các yêu cầu cho các mô hình dòng Gemini khi bạn chọn một mô hình. Google nhận tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế ở phía máy khách.
  id: Google Gemini memproses permintaan untuk model keluarga Gemini saat kamu memilihnya. Google menerima pesan obrolanmu dengan placeholder PII yang sudah diganti di sisi klien.
  pl: Google Gemini przetwarza żądania dla modeli z rodziny Gemini po ich wybraniu. Google otrzymuje Twoje wiadomości czatu z symbolami zastępczymi PII podstawionymi już po stronie klienta.
  nl: Google Gemini verwerkt verzoeken voor modellen uit de Gemini-familie wanneer je er een selecteert. Google ontvangt je chatberichten waarbij PII-placeholders al aan de clientzijde zijn vervangen.
  hi: जब आप Gemini-फ़ैमिली के किसी मॉडल को चुनते हैं, तो Google Gemini उन अनुरोधों को प्रोसेस करता है। Google आपके चैट संदेशों को क्लाइंट-साइड पर पहले से ही बदले गए PII प्लेसहोल्डर्स के साथ प्राप्त करता है।
  th: Google Gemini ประมวลผลคำขอสำหรับโมเดลตระกูล Gemini เมื่อคุณเลือกใช้งาน โดย Google จะได้รับข้อความแชทของคุณที่แทนที่ตัวสำรอง PII เรียบร้อยแล้วจากฝั่งไคลเอนต์
  sv: Google Gemini behandlar förfrågningar för modeller i Gemini-familjen när du väljer en sådan. Google tar emot dina chattmeddelanden med PII-platshållare redan utbytta på klientsidan.
  fr: Google Gemini traite les requêtes pour les modèles de la famille Gemini lorsque tu en sélectionnes un. Google reçoit tes messages de chat avec les espaces réservés PII déjà substitués côté client.
  ar: يعالج Google Gemini طلبات نماذج عائلة Gemini عند اختيار أحدها. تتلقى Google رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية مسبقاً في متصفحك.
  cs: Google Gemini zpracovává požadavky pro modely z rodiny Gemini, když si některý z nich vybereš. Google přijímá tvé zprávy s osobními údaji (PII) již nahrazenými zástupnými symboly na straně klienta.
  ru: Google Gemini обрабатывает запросы для моделей семейства Gemini, когда ты выбираешь одну из них. Google получает твои сообщения в чате с уже замененными на стороне клиента персональными данными.
  he: "Google Gemini מעבדת בקשות למודלים ממשפחת Gemini כשבוחרים באחד מהם. Google מקבלת את הודעות הצ'אט שלך כשממלאי מקום ל-PII כבר הוחלפו בצד הלקוח."
