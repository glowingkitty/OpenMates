providers.travel.serpapi.description:
  context: SerpAPI description
  en: >-
    SerpAPI powers flight and hotel search via its Google Flights and Google
    Hotels endpoints. SerpAPI receives your search queries — origin,
    destination, dates, and preferences — without a user identifier.
  de: SerpAPI ermöglicht die Flug- und Hotelsuche über seine Google Flights- und Google Hotels-Endpunkte. SerpAPI erhält deine Suchanfragen – Abflugort, Ziel, Daten und Präferenzen – ohne eine Benutzerkennung.
  zh: SerpAPI 通过其 Google Flights 和 Google Hotels 端点提供航班和酒店搜索功能。SerpAPI 接收你的查询请求（出发地、目的地、日期和偏好），且不包含用户标识符。
  fr: "SerpAPI alimente la recherche de vols et d'hôtels via ses points de terminaison Google Flights et Google Hotels. SerpAPI reçoit tes requêtes de recherche — origine, destination, dates et préférences — sans identifiant d'utilisateur."
  pt: A SerpAPI alimenta a pesquisa de voos e hotéis através dos seus endpoints Google Flights e Google Hotels. A SerpAPI recebe as tuas consultas de pesquisa — origem, destino, datas e preferências — sem um identificador de utilizador.
  ru: SerpAPI обеспечивает поиск авиабилетов и отелей через эндпоинты Google Flights и Google Hotels. SerpAPI получает твои поисковые запросы — пункт отправления, пункт назначения, даты и предпочтения — без идентификатора пользователя.
  ja: SerpAPIは、Google FlightsおよびGoogle Hotelsのエンドポイントを介してフライトとホテルの検索を提供します。SerpAPIは、出発地、目的地、日付、設定などの検索クエリを受け取りますが、ユーザー識別子は受け取りません。
  it: SerpAPI alimenta la ricerca di voli e hotel tramite i suoi endpoint Google Flights e Google Hotels. SerpAPI riceve le tue query di ricerca — origine, destinazione, date e preferenze — senza un identificativo utente.
  tr: SerpAPI, Google Uçuşlar ve Google Oteller uç noktaları aracılığıyla uçuş ve otel aramasını destekler. SerpAPI; kalkış noktası, varış noktası, tarihler ve tercihler gibi arama sorgularını kullanıcı tanımlayıcısı olmadan alır.
  vi: SerpAPI hỗ trợ tìm kiếm chuyến bay và khách sạn thông qua các điểm cuối Google Flights và Google Hotels. SerpAPI nhận các truy vấn tìm kiếm của bạn — điểm khởi hành, điểm đến, ngày tháng và tùy chọn ưu tiên — mà không có mã định danh người dùng.
  id: SerpAPI mendukung pencarian penerbangan dan hotel melalui endpoint Google Flights dan Google Hotels miliknya. SerpAPI menerima kueri pencarianmu — asal, tujuan, tanggal, dan preferensi — tanpa pengidentifikasi pengguna.
  pl: SerpAPI obsługuje wyszukiwanie lotów i hoteli poprzez punkty końcowe Google Flights i Google Hotels. SerpAPI otrzymuje Twoje zapytania — miejsce wylotu, cel, daty i preferencje — bez identyfikatora użytkownika.
  nl: SerpAPI drijft het zoeken naar vluchten en hotels aan via de Google Flights- en Google Hotels-endpoints. SerpAPI ontvangt je zoekopdrachten — vertrekpunt, bestemming, data en voorkeuren — zonder een gebruikersidentificatie.
  hi: SerpAPI अपने Google Flights और Google Hotels एंडपॉइंट्स के माध्यम से फ्लाइट और होटल खोज को संचालित करता है। SerpAPI आपके खोज प्रश्न — प्रस्थान स्थान, गंतव्य, तिथियां और प्राथमिकताएं — बिना किसी उपयोगकर्ता पहचानकर्ता के प्राप्त करता है।
  th: SerpAPI ขับเคลื่อนการค้นหาเที่ยวบินและโรงแรมผ่านปลายทาง Google Flights และ Google Hotels โดย SerpAPI จะได้รับคำค้นหาของคุณ — ต้นทาง, ปลายทาง, วันที่ และความต้องการส่วนตัว — โดยไม่มีตัวระบุตัวตนผู้ใช้
  cs: SerpAPI pohání vyhledávání letů a hotelů prostřednictvím svých koncových bodů Google Flights a Google Hotels. SerpAPI přijímá tvé vyhledávací dotazy — místo odjezdu, cíl, data a preference — bez identifikátoru uživatele.
  sv: SerpAPI driver flyg- och hotellsökning via sina slutpunkter för Google Flights och Google Hotels. SerpAPI tar emot dina sökfrågor — avreseort, destination, datum och preferenser — utan en användaridentifierare.
  he: SerpAPI מפעילה חיפוש טיסות ומלונות באמצעות נקודות הקצה של Google Flights ו-Google Hotels. ‏SerpAPI מקבלת את שאילתות החיפוש שלך — מוצא, יעד, תאריכים והעדפות — ללא מזהה משתמש.
  es: SerpAPI impulsa la búsqueda de vuelos y hoteles a través de sus puntos finales de Google Flights y Google Hotels. SerpAPI recibe tus consultas de búsqueda —origen, destino, fechas y preferencias— sin un identificador de usuario.
  ko: SerpAPI는 Google Flights 및 Google Hotels 엔드포인트를 통해 항공권 및 호텔 검색 기능을 제공합니다. SerpAPI는 사용자 식별자 없이 출발지, 목적지, 날짜 및 선호도와 같은 검색 쿼리를 수신합니다.
  ar: يدعم SerpAPI البحث عن الرحلات الجوية والفنادق عبر نقاط نهاية Google Flights وGoogle Hotels الخاصة به. يتلقى SerpAPI استعلامات البحث الخاصة بك — نقطة الانطلاق، والوجهة، والتواريخ، والتفضيلات — بدون معرف مستخدم.
