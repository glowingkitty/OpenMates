legal_rights.intro:
  context: Intro for rights section
  en: "Depending on your jurisdiction, you may have certain rights over your personal data. The following summarizes key rights under GDPR and CCPA/CPRA and how to exercise them:"
  de: "Je nach Ihrem Wohnsitzland haben Sie möglicherweise bestimmte Rechte bezüglich Ihrer personenbezogenen Daten. Im Folgenden sind die wichtigsten Rechte gemäß DSGVO und CCPA/CPRA sowie deren Ausübung zusammengefasst:"
  zh: "根据您所在的司法管辖区，您可能对您的个人数据拥有某些权利。以下总结了GDPR和CCPA/CPRA下的主要权利及其行使方式："
  es: "Dependiendo de su jurisdicción, puede tener ciertos derechos sobre sus datos personales. A continuación se resumen los derechos clave bajo el GDPR y CCPA/CPRA y cómo ejercerlos:"
  fr: "Selon votre juridiction, vous pouvez disposer de certains droits sur vos données personnelles. Ce qui suit résume les droits clés au titre du RGPD et du CCPA/CPRA et la manière de les exercer :"
  pt: "Dependendo da sua jurisdição, você pode ter certos direitos sobre seus dados pessoais. A seguir, um resumo dos principais direitos sob o GDPR e CCPA/CPRA e como exercê-los:"
  ru: "В зависимости от вашей юрисдикции у вас могут быть определённые права в отношении ваших персональных данных. Ниже приводится краткое изложение ключевых прав в соответствии с GDPR и CCPA/CPRA и порядок их реализации:"
  ja: "お住まいの地域の法律によっては、個人データに関して一定の権利を有する場合があります。以下に、GDPRおよびCCPA/CPRAに基づく主な権利とその行使方法を要約します："
  ko: "귀하의 관할 구역에 따라 개인 데이터에 관한 특정 권리를 가질 수 있습니다. 다음은 GDPR 및 CCPA/CPRA에 따른 주요 권리와 이를 행사하는 방법을 요약한 것입니다:"
  it: "A seconda della tua giurisdizione, potresti avere determinati diritti sui tuoi dati personali. Di seguito sono riassunti i diritti principali ai sensi del GDPR e del CCPA/CPRA e come esercitarli:"
  tr: "Yargı bölgenize bağlı olarak kişisel verileriniz üzerinde belirli haklara sahip olabilirsiniz. Aşağıda GDPR ve CCPA/CPRA kapsamındaki temel haklar ve bunların nasıl kullanılacağı özetlenmektedir:"
  vi: "Tùy thuộc vào thẩm quyền pháp lý của bạn, bạn có thể có một số quyền nhất định đối với dữ liệu cá nhân của mình. Dưới đây tóm tắt các quyền chính theo GDPR và CCPA/CPRA và cách thực hiện chúng:"
  id: "Bergantung pada yurisdiksi Anda, Anda mungkin memiliki hak-hak tertentu atas data pribadi Anda. Berikut ini merangkum hak-hak utama di bawah GDPR dan CCPA/CPRA dan cara menggunakannya:"
  pl: "W zależności od jurysdykcji możesz mieć pewne prawa w odniesieniu do swoich danych osobowych. Poniżej podsumowano kluczowe prawa wynikające z RODO i CCPA/CPRA oraz sposoby ich realizacji:"
  nl: "Afhankelijk van uw jurisdictie kunt u bepaalde rechten hebben met betrekking tot uw persoonsgegevens. Het volgende geeft een overzicht van de belangrijkste rechten onder de AVG en CCPA/CPRA en hoe u deze kunt uitoefenen:"
  ar: "بناءً على سلطتك القضائية، قد يكون لديك حقوق معينة تتعلق ببياناتك الشخصية. فيما يلي ملخص للحقوق الرئيسية بموجب GDPR وCCPA/CPRA وكيفية ممارستها:"
  hi: "आपके न्यायक्षेत्र के आधार पर, आपके पास अपने व्यक्तिगत डेटा पर कुछ अधिकार हो सकते हैं। नीचे GDPR और CCPA/CPRA के तहत प्रमुख अधिकारों और उन्हें कैसे प्रयोग करें, इसका सारांश दिया गया है:"
  th: "ขึ้นอยู่กับเขตอำนาจศาลของคุณ คุณอาจมีสิทธิ์บางอย่างเกี่ยวกับข้อมูลส่วนตัวของคุณ ต่อไปนี้สรุปสิทธิ์หลักภายใต้ GDPR และ CCPA/CPRA และวิธีใช้สิทธิ์เหล่านั้น:"
  cs: "V závislosti na vaší jurisdikci můžete mít určitá práva ohledně svých osobních údajů. Níže jsou shrnuty klíčová práva podle GDPR a CCPA/CPRA a způsob jejich uplatnění:"
  sv: "Beroende på din jurisdiktion kan du ha vissa rättigheter beträffande dina personuppgifter. Följande sammanfattar viktiga rättigheter enligt GDPR och CCPA/CPRA och hur du utövar dem:"
  verified_by_human: []
  he: 'בהתאם לסמכות השיפוט שלך, ייתכן שיש לך זכויות מסוימות על הנתונים האישיים שלך. הסעיף הבא מסכם את הזכויות הרלוונטיות:'
