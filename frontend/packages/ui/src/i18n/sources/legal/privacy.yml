providers.community.discord.description:
  context: Discord description
  en: >-
    If you join the OpenMates community Discord server, Discord will see
    anything you post on its platform, plus your Discord username and whatever
    data Discord itself collects per its own privacy policy. We have no
    control over what Discord does with that data.
  de: Wenn du dem OpenMates Community-Discord-Server beitrittst, sieht Discord alles, was du auf seiner Plattform postest, sowie deinen Discord-Benutzernamen und alle Daten, die Discord gemäß seiner eigenen Datenschutzrichtlinie sammelt. Wir haben keinen Einfluss darauf, was Discord mit diesen Daten macht.
  zh: 如果您加入 OpenMates 社区 Discord 服务器，Discord 将看到您在其平台上发布的任何内容，以及您的 Discord 用户名和 Discord 根据其自身隐私政策收集的任何数据。我们无法控制 Discord 如何处理这些数据。
  es: Si te unes al servidor de Discord de la comunidad de OpenMates, Discord verá todo lo que publiques en su plataforma, además de tu nombre de usuario de Discord y cualquier dato que Discord recopile según su propia política de privacidad. No tenemos control sobre lo que Discord hace con esos datos.
  fr: "Si tu rejoins le serveur Discord de la communauté OpenMates, Discord verra tout ce que tu publies sur sa plateforme, ainsi que ton nom d'utilisateur Discord et toutes les données que Discord collecte lui-même conformément à sa propre politique de confidentialité. Nous n'avons aucun contrôle sur ce que Discord fait de ces données."
  pt: Se te juntares ao servidor de Discord da comunidade OpenMates, o Discord verá tudo o que publicares na sua plataforma, além do teu nome de utilizador do Discord e quaisquer dados que o próprio Discord recolha de acordo com a sua própria política de privacidade. Não temos controlo sobre o que o Discord faz com esses dados.
  ru: Если ты присоединишься к серверу сообщества OpenMates в Discord, Discord будет видеть всё, что ты публикуешь на его платформе, а также твоё имя пользователя Discord и любые данные, которые Discord собирает в соответствии со своей политикой конфиденциальности. Мы не контролируем то, что Discord делает с этими данными.
  ja: OpenMates のコミュニティ Discord サーバーに参加すると、Discord はあなたがそのプラットフォームに投稿したすべての内容に加え、あなたの Discord ユーザー名、および Discord 自体が独自のプライバシーポリシーに従って収集するあらゆるデータを閲覧することになります。当社は、Discord がそれらのデータをどのように扱うかについて制御権を持ちません。
  ko: OpenMates 커뮤니티 Discord 서버에 참여하면, Discord는 귀하가 해당 플랫폼에 게시하는 모든 내용과 Discord 사용자 이름, 그리고 Discord 자체 개인정보 처리방침에 따라 수집하는 모든 데이터를 볼 수 있습니다. 당사는 Discord가 해당 데이터를 어떻게 처리하는지에 대해 통제권이 없습니다.
  it: Se ti unisci al server Discord della community di OpenMates, Discord vedrà tutto ciò che pubblichi sulla sua piattaforma, oltre al tuo nome utente Discord e a tutti i dati che Discord stesso raccoglie in base alla propria informativa sulla privacy. Non abbiamo alcun controllo su ciò che Discord fa con tali dati.
  tr: "OpenMates topluluk Discord sunucusuna katılırsan, Discord platformunda paylaştığın her şeyi, Discord kullanıcı adını ve Discord'un kendi gizlilik politikası uyarınca topladığı tüm verileri görür. Discord'un bu verilerle ne yaptığı üzerinde hiçbir kontrolümüz yoktur."
  vi: Nếu bạn tham gia máy chủ Discord của cộng đồng OpenMates, Discord sẽ thấy bất cứ điều gì bạn đăng trên nền tảng của họ, cộng với tên người dùng Discord của bạn và bất kỳ dữ liệu nào mà chính Discord thu thập theo chính sách quyền riêng tư của họ. Chúng tôi không có quyền kiểm soát những gì Discord làm với dữ liệu đó.
  id: Jika kamu bergabung dengan server Discord komunitas OpenMates, Discord akan melihat apa pun yang kamu kirimkan di platformnya, ditambah nama pengguna Discord kamu dan data apa pun yang dikumpulkan Discord sendiri sesuai kebijakan privasinya sendiri. Kami tidak memiliki kendali atas apa yang dilakukan Discord dengan data tersebut.
  pl: Jeśli dołączysz do serwera społeczności OpenMates na Discordzie, Discord będzie widzieć wszystko, co publikujesz na jego platformie, a także Twoją nazwę użytkownika Discord i wszelkie dane, które Discord sam gromadzi zgodnie z własną polityką prywatności. Nie mamy kontroli nad tym, co Discord robi z tymi danymi.
  nl: Als je lid wordt van de OpenMates community Discord-server, ziet Discord alles wat je op hun platform plaatst, plus je Discord-gebruikersnaam en alle gegevens die Discord zelf verzamelt volgens hun eigen privacybeleid. Wij hebben geen controle over wat Discord met die gegevens doet.
  ar: إذا انضممت إلى خادم Discord الخاص بمجتمع OpenMates، فسيرى Discord أي شيء تنشره على منصته، بالإضافة إلى اسم مستخدم Discord الخاص بك وأي بيانات يجمعها Discord نفسه وفقًا لسياسة الخصوصية الخاصة به. ليس لدينا أي سيطرة على ما يفعله Discord بهذه البيانات.
  hi: यदि तुम OpenMates कम्युनिटी Discord सर्वर में शामिल होते हो, तो Discord वह सब कुछ देख पाएगा जो तुम उसके प्लेटफॉर्म पर पोस्ट करते हो, साथ ही तुम्हारा Discord यूजरनेम और वह डेटा जो Discord अपनी गोपनीयता नीति के अनुसार एकत्र करता है। Discord उस डेटा के साथ क्या करता है, इस पर हमारा कोई नियंत्रण नहीं है।
  th: หากคุณเข้าร่วมเซิร์ฟเวอร์ Discord ของชุมชน OpenMates ทาง Discord จะเห็นทุกสิ่งที่คุณโพสต์บนแพลตฟอร์ม รวมถึงชื่อผู้ใช้ Discord ของคุณและข้อมูลใดๆ ที่ Discord เก็บรวบรวมตามนโยบายความเป็นส่วนตัวของตนเอง เราไม่มีอำนาจควบคุมสิ่งที่ Discord ทำกับข้อมูลเหล่านั้น
  cs: Pokud se připojíš ke komunitnímu Discord serveru OpenMates, Discord uvidí vše, co na jeho platformu napíšeš, plus tvé uživatelské jméno na Discordu a veškerá data, která Discord sám sbírá podle svých vlastních zásad ochrany osobních údajů. Nemáme žádnou kontrolu nad tím, co Discord s těmito daty dělá.
  sv: Om du går med i OpenMates community-server på Discord kommer Discord att se allt du skriver på plattformen, plus ditt Discord-användarnamn och den data som Discord själva samlar in enligt deras egen integritetspolicy. Vi har ingen kontroll över vad Discord gör med den datan.
  he: אם תצטרף/י לשרת הקהילה של OpenMates בדיסקורד, דיסקורד תראה כל מה שתפרסם/י בפלטפורמה שלה, בנוסף לשם המשתמש שלך בדיסקורד וכל נתון אחר שדיסקורד עצמה אוספת בהתאם למדיניות הפרטיות שלה. אין לנו שליטה על מה שדיסקורד עושה עם הנתונים הללו.
  verified_by_human: []
providers.community.discord.admin_access:
  context: Discord admin access disclosure
  en: >-
    OpenMates administrators with Discord server admin rights can read all
    messages posted in the OpenMates Discord server. Do not share sensitive
    information on Discord.
  de: OpenMates-Administratoren mit Discord-Server-Admin-Rechten können alle Nachrichten lesen, die auf dem OpenMates-Discord-Server gepostet werden. Teile keine sensiblen Informationen auf Discord.
  zh: 拥有 Discord 服务器管理员权限的 OpenMates 管理员可以阅读 OpenMates Discord 服务器中发布的所有消息。请勿在 Discord 上分享敏感信息。
  es: Los administradores de OpenMates con derechos de administración en el servidor de Discord pueden leer todos los mensajes publicados en el servidor de Discord de OpenMates. No compartas información sensible en Discord.
  fr: "Les administrateurs d'OpenMates disposant de droits d'administration sur le serveur Discord peuvent lire tous les messages publiés sur le serveur Discord d'OpenMates. Ne partage pas d'informations sensibles sur Discord."
  pt: Os administradores do OpenMates com direitos de administração no servidor de Discord podem ler todas as mensagens publicadas no servidor de Discord do OpenMates. Não partilhes informações sensíveis no Discord.
  ru: Администраторы OpenMates с правами администратора сервера Discord могут читать все сообщения, опубликованные на сервере OpenMates в Discord. Не делись конфиденциальной информацией в Discord.
  ja: Discord サーバーの管理者権限を持つ OpenMates の管理者は、OpenMates Discord サーバーに投稿されたすべてのメッセージを読むことができます。機密情報を Discord で共有しないでください。
  ko: Discord 서버 관리 권한이 있는 OpenMates 관리자는 OpenMates Discord 서버에 게시된 모든 메시지를 읽을 수 있습니다. Discord에서 민감한 정보를 공유하지 마세요.
  it: Gli amministratori di OpenMates con diritti di amministrazione del server Discord possono leggere tutti i messaggi pubblicati nel server Discord di OpenMates. Non condividere informazioni sensibili su Discord.
  tr: "Discord sunucusu yönetici haklarına sahip OpenMates yöneticileri, OpenMates Discord sunucusunda paylaşılan tüm mesajları okuyabilir. Discord'da hassas bilgiler paylaşma."
  vi: Quản trị viên OpenMates có quyền quản trị máy chủ Discord có thể đọc tất cả các tin nhắn được đăng trong máy chủ Discord của OpenMates. Không chia sẻ thông tin nhạy cảm trên Discord.
  id: Administrator OpenMates dengan hak admin server Discord dapat membaca semua pesan yang dikirim di server Discord OpenMates. Jangan bagikan informasi sensitif di Discord.
  pl: Administratorzy OpenMates posiadający uprawnienia administratora serwera Discord mogą czytać wszystkie wiadomości publikowane na serwerze Discord OpenMates. Nie udostępniaj poufnych informacji na Discordzie.
  nl: OpenMates-beheerders met Discord-serverbeheerdersrechten kunnen alle berichten lezen die in de OpenMates Discord-server worden geplaatst. Deel geen gevoelige informatie op Discord.
  ar: يمكن لمسؤولي OpenMates الذين يتمتعون بحقوق مسؤول خادم Discord قراءة جميع الرسائل المنشورة في خادم Discord الخاص بـ OpenMates. لا تشارك معلومات حساسة على Discord.
  hi: Discord सर्वर एडमिन अधिकारों वाले OpenMates एडमिनिस्ट्रेटर OpenMates Discord सर्वर में पोस्ट किए गए सभी संदेशों को पढ़ सकते हैं। Discord पर संवेदनशील जानकारी साझा न करें।
  th: ผู้ดูแลระบบ OpenMates ที่มีสิทธิ์ดูแลเซิร์ฟเวอร์ Discord สามารถอ่านข้อความทั้งหมดที่โพสต์ในเซิร์ฟเวอร์ Discord ของ OpenMates ได้ โปรดอย่าแบ่งปันข้อมูลที่ละเอียดอ่อนบน Discord
  cs: Administrátoři OpenMates s právy správce Discord serveru mohou číst všechny zprávy zveřejněné na Discord serveru OpenMates. Nesdílej na Discordu citlivé informace.
  sv: OpenMates-administratörer med administratörsrättigheter på Discord-servern kan läsa alla meddelanden som postas på OpenMates Discord-server. Dela inte känslig information på Discord.
  he: מנהלי OpenMates עם הרשאות ניהול בשרת הדיסקורד יכולים לקרוא את כל ההודעות המפורסמות בשרת הדיסקורד של OpenMates. אל תשתף/י מידע רגיש בדיסקורד.
  verified_by_human: []
