polar.description:
  context: Description of Polar payment processing service
  en: We use Polar (US company) for payment processing for purchases made through the Polar Storefront in the web application. When you make a purchase, your payment card type, last 4 digits of your payment card, billing address, phone number, and email address are processed by Polar to complete the transaction securely.
  de: Wir verwenden Polar (US-Unternehmen) für die Zahlungsabwicklung von Käufen im Polar Storefront der Webanwendung. Wenn Sie einen Kauf tätigen, werden Ihr Kartentyp, die letzten 4 Ziffern Ihrer Zahlungskarte, Ihre Rechnungsadresse, Telefonnummer und E-Mail-Adresse von Polar zur sicheren Abwicklung der Transaktion verarbeitet.
  zh: 我们使用 Polar（美国公司）处理通过 Web 应用程序中 Polar 商店进行的购买付款。当您进行购买时，Polar 会处理您的支付卡类型、支付卡末四位数字、账单地址、电话号码和电子邮件地址，以安全完成交易。
  es: Utilizamos Polar (empresa estadounidense) para el procesamiento de pagos de compras realizadas a través de la Polar Storefront en la aplicación web. Cuando realiza una compra, Polar procesa el tipo de tarjeta de pago, los últimos 4 dígitos de su tarjeta, la dirección de facturación, el número de teléfono y el correo electrónico para completar la transacción de forma segura.
  fr: Nous utilisons Polar (entreprise américaine) pour le traitement des paiements des achats effectués via la Polar Storefront dans l'application web. Lors d'un achat, Polar traite le type de carte de paiement, les 4 derniers chiffres de votre carte, l'adresse de facturation, le numéro de téléphone et l'adresse e-mail pour finaliser la transaction en toute sécurité.
  pt: Usamos Polar (empresa dos EUA) para processamento de pagamentos de compras feitas através da Polar Storefront no aplicativo web. Quando você realiza uma compra, a Polar processa o tipo do cartão de pagamento, os últimos 4 dígitos do seu cartão, endereço de cobrança, número de telefone e endereço de e-mail para concluir a transação com segurança.
  ru: Мы используем Polar (американская компания) для обработки платежей за покупки, совершенные через Polar Storefront в веб-приложении. При совершении покупки Polar обрабатывает тип платежной карты, последние 4 цифры карты, платежный адрес, номер телефона и адрес электронной почты для безопасного завершения транзакции.
  ja: 当社は、ウェブアプリケーションのPolar Storefrontを通じた購入の決済処理にPolar（米国企業）を使用しています。購入時に、Polarはお客様の支払いカードの種類、カード番号の下4桁、請求先住所、電話番号、メールアドレスを処理して取引を安全に完了します。
  ko: 웹 애플리케이션의 Polar Storefront를 통한 구매에 대한 결제 처리를 위해 Polar(미국 회사)를 사용합니다. 구매 시 Polar는 결제 카드 유형, 카드 마지막 4자리, 청구 주소, 전화번호 및 이메일 주소를 처리하여 거래를 안전하게 완료합니다.
  it: Utilizziamo Polar (azienda statunitense) per l'elaborazione dei pagamenti per gli acquisti effettuati tramite Polar Storefront nell'applicazione web. Quando effettui un acquisto, Polar elabora il tipo di carta di pagamento, le ultime 4 cifre della tua carta, l'indirizzo di fatturazione, il numero di telefono e l'indirizzo e-mail per completare la transazione in modo sicuro.
  tr: Web uygulamasında Polar Storefront üzerinden yapılan satın alımlar için ödeme işleme amacıyla Polar (ABD şirketi) kullanıyoruz. Bir satın alma işlemi gerçekleştirdiğinizde, Polar işlemi güvenli bir şekilde tamamlamak için ödeme kartı türünüzü, kartınızın son 4 hanesini, fatura adresinizi, telefon numaranızı ve e-posta adresinizi işler.
  vi: Chúng tôi sử dụng Polar (công ty Hoa Kỳ) để xử lý thanh toán cho các giao dịch mua hàng thực hiện qua Polar Storefront trong ứng dụng web. Khi bạn thực hiện giao dịch mua hàng, Polar xử lý loại thẻ thanh toán, 4 chữ số cuối của thẻ, địa chỉ thanh toán, số điện thoại và địa chỉ email để hoàn tất giao dịch một cách an toàn.
  id: Kami menggunakan Polar (perusahaan AS) untuk pemrosesan pembayaran untuk pembelian yang dilakukan melalui Polar Storefront di aplikasi web. Saat Anda melakukan pembelian, Polar memproses jenis kartu pembayaran, 4 digit terakhir kartu Anda, alamat penagihan, nomor telepon, dan alamat email untuk menyelesaikan transaksi dengan aman.
  pl: Używamy Polar (firma amerykańska) do przetwarzania płatności za zakupy dokonane przez Polar Storefront w aplikacji internetowej. Podczas zakupu Polar przetwarza typ karty płatniczej, ostatnie 4 cyfry karty, adres rozliczeniowy, numer telefonu i adres e-mail w celu bezpiecznego sfinalizowania transakcji.
  nl: We gebruiken Polar (Amerikaans bedrijf) voor de verwerking van betalingen voor aankopen die via de Polar Storefront in de webapplicatie worden gedaan. Wanneer u een aankoop doet, verwerkt Polar het type betaalkaart, de laatste 4 cijfers van uw kaart, het factuuradres, het telefoonnummer en het e-mailadres om de transactie veilig te voltooien.
  ar: نستخدم Polar (شركة أمريكية) لمعالجة المدفوعات للمشتريات التي تتم من خلال Polar Storefront في تطبيق الويب. عند إجراء عملية شراء، تعالج Polar نوع بطاقة الدفع، والأرقام الأربعة الأخيرة من بطاقتك، وعنوان إرسال الفواتير، ورقم الهاتف، وعنوان البريد الإلكتروني لإتمام المعاملة بأمان.
  hi: हम वेब एप्लिकेशन में Polar Storefront के माध्यम से की गई खरीदारी के लिए भुगतान प्रसंस्करण के लिए Polar (अमेरिकी कंपनी) का उपयोग करते हैं। जब आप खरीदारी करते हैं, तो Polar लेनदेन को सुरक्षित रूप से पूरा करने के लिए आपके भुगतान कार्ड का प्रकार, कार्ड के अंतिम 4 अंक, बिलिंग पता, फोन नंबर और ईमेल पता संसाधित करता है।
  th: เราใช้ Polar (บริษัทสหรัฐอเมริกา) สำหรับการประมวลผลการชำระเงินสำหรับการซื้อที่ทำผ่าน Polar Storefront ในแอปพลิเคชันเว็บ เมื่อคุณทำการซื้อ Polar จะประมวลผลประเภทบัตรชำระเงิน 4 หลักสุดท้ายของบัตร ที่อยู่สำหรับวางบิล หมายเลขโทรศัพท์ และที่อยู่อีเมลเพื่อดำเนินการธุรกรรมอย่างปลอดภัย
  cs: Používáme Polar (americká společnost) pro zpracování plateb za nákupy provedené prostřednictvím Polar Storefront v webové aplikaci. Při nákupu Polar zpracovává typ platební karty, poslední 4 číslice vaší karty, fakturační adresu, telefonní číslo a e-mailovou adresu pro bezpečné dokončení transakce.
  sv: Vi använder Polar (amerikanskt företag) för betalningshantering för köp som görs via Polar Storefront i webbapplikationen. När du gör ett köp bearbetar Polar betalkortstyp, de sista 4 siffrorna på ditt kort, faktureringsadress, telefonnummer och e-postadress för att slutföra transaktionen på ett säkert sätt.
  verified_by_human: []
  he: אנו משתמשים ב-Polar (חברה אמריקאית) לעיבוד תשלומים עבור רכישות שבוצעו דרך חנות Polar. פרטי תשלום ומידע חיוב נשלחים ל-Polar.
