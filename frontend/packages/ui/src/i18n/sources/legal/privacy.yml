discord_integration.description:
  context: Description of Discord data collection
  en: If you choose to join our Discord community through links provided on this website, please note that Discord will collect and process your data according to their privacy policy. This includes account information, usage data, communication content, and other information as outlined in Discord's privacy policy.
  de: "Wenn Sie über die auf dieser Website bereitgestellten Links unserer Discord-Community beitreten, beachten Sie bitte, dass Discord Ihre Daten gemäß ihrer Datenschutzerklärung erfasst und verarbeitet. Dies umfasst:"
  zh: 如果您选择通过本网站提供的链接加入我们的 Discord 社区，请注意，Discord 将根据其隐私政策收集和处理您的数据。 这包括：
  es: "Si elige unirse a nuestra comunidad de Discord a través de los enlaces proporcionados en este sitio web, tenga en cuenta que Discord recopilará y procesará sus datos de acuerdo con su política de privacidad. Esto incluye:"
  fr: "Si vous choisissez de rejoindre notre communauté Discord via les liens fournis sur ce site web, veuillez noter que Discord collectera et traitera vos données conformément à sa politique de confidentialité.  Cela inclut :"
  pt: Se optar por entrar na nossa comunidade Discord através de links neste site, note que o Discord coletará e processará os seus dados de acordo com a sua política de privacidade. Isso inclui informações de conta, dados de uso, conteúdo de comunicação e outras informações descritas na política de privacidade do Discord.
  ru: Если вы решите присоединиться к нашему сообществу Discord по ссылкам на этом сайте, обратите внимание, что Discord будет собирать и обрабатывать ваши данные в соответствии со своей политикой конфиденциальности. Это включает информацию об аккаунте, данные об использовании, содержимое коммуникаций и другую информацию, описанную в политике конфиденциальности Discord.
  ja: 当ウェブサイトで提供されているリンクを通じてDiscordコミュニティに参加する場合、Discordはそのプライバシーポリシーに従ってデータを収集・処理することにご注意ください。これには以下が含まれます：
  ko: 이 웹사이트의 링크를 통해 Discord 커뮤니티에 참여하면 Discord가 자체 개인정보처리방침에 따라 귀하의 데이터를 수집하고 처리합니다. 여기에는 계정 정보, 사용 데이터, 통신 내용 및 Discord 개인정보처리방침에 명시된 기타 정보가 포함됩니다.
  it: Se scegli di unirti alla nostra comunità Discord tramite i link forniti su questo sito web, tieni presente che Discord raccoglierà ed elaborerà i tuoi dati in base alla sua informativa sulla privacy. Ciò include informazioni sull'account, dati di utilizzo, contenuti delle comunicazioni e altre informazioni descritte nell'informativa sulla privacy di Discord.
  tr: Bu web sitesinde sağlanan bağlantılar aracılığıyla Discord topluluğumuza katılmayı seçerseniz, Discord'un gizlilik politikalarına göre verilerinizi toplayıp işleyeceğini lütfen unutmayın. Bu; hesap bilgileri, kullanım verileri, iletişim içeriği ve Discord'un gizlilik politikasında belirtilen diğer bilgileri kapsar.
  vi: Nếu bạn chọn tham gia cộng đồng Discord của chúng tôi qua các liên kết trên trang web này, hãy lưu ý rằng Discord sẽ thu thập và xử lý dữ liệu của bạn theo chính sách quyền riêng tư của họ. Điều này bao gồm thông tin tài khoản, dữ liệu sử dụng, nội dung liên lạc và các thông tin khác được nêu trong chính sách quyền riêng tư của Discord.
  id: Jika Anda memilih bergabung dengan komunitas Discord kami melalui tautan di situs web ini, harap diketahui bahwa Discord akan mengumpulkan dan memproses data Anda sesuai kebijakan privasi mereka. Ini mencakup informasi akun, data penggunaan, konten komunikasi, dan informasi lainnya sebagaimana diuraikan dalam kebijakan privasi Discord.
  pl: Jeśli zdecydujesz się dołączyć do naszej społeczności Discord poprzez linki na tej stronie, pamiętaj, że Discord będzie zbierać i przetwarzać Twoje dane zgodnie z własną polityką prywatności. Obejmuje to informacje o koncie, dane dotyczące użytkowania, treści komunikacji i inne informacje opisane w polityce prywatności Discord.
  nl: Als u ervoor kiest om via links op deze website deel te nemen aan onze Discord-community, wees er dan van bewust dat Discord uw gegevens zal verzamelen en verwerken volgens hun privacybeleid. Dit omvat accountinformatie, gebruiksgegevens, communicatie-inhoud en andere informatie zoals beschreven in het privacybeleid van Discord.
  ar: إذا اخترت الانضمام إلى مجتمع Discord الخاص بنا من خلال الروابط المقدمة على هذا الموقع، يُرجى العلم بأن Discord سيجمع بياناتك ويعالجها وفقاً لسياسة الخصوصية الخاصة به. يشمل ذلك معلومات الحساب وبيانات الاستخدام ومحتوى الاتصالات وغيرها من المعلومات المنصوص عليها في سياسة خصوصية Discord.
  hi: यदि आप इस वेबसाइट पर प्रदान किए गए लिंक के माध्यम से हमारे Discord समुदाय में शामिल होना चुनते हैं, तो कृपया ध्यान दें कि Discord अपनी गोपनीयता नीति के अनुसार आपके डेटा को एकत्र और संसाधित करेगा। इसमें खाता जानकारी, उपयोग डेटा, संचार सामग्री और Discord की गोपनीयता नीति में उल्लिखित अन्य जानकारी शामिल है।
  th: หากคุณเลือกที่จะเข้าร่วมชุมชน Discord ของเราผ่านลิงก์ที่ให้ไว้บนเว็บไซต์นี้ โปรดทราบว่า Discord จะรวบรวมและประมวลผลข้อมูลของคุณตามนโยบายความเป็นส่วนตัวของพวกเขา ซึ่งรวมถึงข้อมูลบัญชี ข้อมูลการใช้งาน เนื้อหาการสื่อสาร และข้อมูลอื่นๆ ตามที่ระบุในนโยบายความเป็นส่วนตัวของ Discord
  cs: Pokud se rozhodnete připojit k naší komunitě Discord prostřednictvím odkazů na tomto webu, vezměte prosím na vědomí, že Discord bude shromažďovat a zpracovávat vaše údaje v souladu se svými zásadami ochrany osobních údajů. To zahrnuje informace o účtu, data o používání, obsah komunikace a další informace uvedené v zásadách ochrany osobních údajů Discord.
  sv: Om du väljer att gå med i vår Discord-community via länkar på den här webbplatsen, observera att Discord kommer att samla in och bearbeta dina uppgifter enligt sin sekretesspolicy. Detta inkluderar kontoinformation, användningsdata, kommunikationsinnehåll och annan information som beskrivs i Discords sekretesspolicy.
  verified_by_human: []
  he: אם תבחר להצטרף לקהילת Discord שלנו דרך קישורים המסופקים באתר זה, שים לב שהשימוש שלך ב-Discord כפוף למדיניות הפרטיות ולתנאי השירות של Discord.
discord_integration.admin_access:
  context: Description of admin access to Discord data
  en: As Discord server administrators, we have access to all public communications, member lists, and other information shared within our Discord community. However, this information is hosted and primarily processed by Discord. We do not extract, store, or process this data outside of Discord's platform. For more information about how Discord handles your data, please review Discord's Privacy Policy.
  de: Als Discord-Server-Administratoren haben wir Zugang zu allen öffentlichen Kommunikationen, Mitgliederlisten und anderen Informationen, die innerhalb unserer Discord-Community geteilt werden. Diese Informationen werden jedoch von Discord gehostet und hauptsächlich verarbeitet. Wir extrahieren, speichern oder verarbeiten diese Daten nicht außerhalb der Discord-Plattform. Weitere Informationen darüber, wie Discord mit Ihren Daten umgeht, finden Sie in der Discord-Datenschutzerklärung.
  zh: 作为 Discord 服务器管理员，我们可以访问我们 Discord 社区内共享的所有公共通信、成员列表和其他信息。 但是，此信息由 Discord 托管和主要处理。 我们不会在 Discord 平台之外提取、存储或处理此数据。 有关 Discord 如何处理您的数据的更多信息，请查看 Discord 的隐私政策。
  es: Como administradores del servidor de Discord, tenemos acceso a todas las comunicaciones públicas, listas de miembros y otra información compartida dentro de nuestra comunidad de Discord. Sin embargo, esta información está alojada y procesada principalmente por Discord. No extraemos, almacenamos ni procesamos estos datos fuera de la plataforma de Discord. Para obtener más información sobre cómo Discord maneja sus datos, consulte la Política de privacidad de Discord.
  fr: En tant qu'administrateurs du serveur Discord, nous avons accès à toutes les communications publiques, aux listes de membres et aux autres informations partagées au sein de notre communauté Discord.  Cependant, ces informations sont hébergées et principalement traitées par Discord.  Nous n'extrayons, ne stockons ni ne traitons ces données en dehors de la plateforme Discord.  Pour plus d'informations sur la manière dont Discord traite vos données, veuillez consulter la politique de confidentialité de Discord.
  pt: Como administradores do servidor Discord, temos acesso a todas as comunicações públicas, listas de membros e outras informações partilhadas na nossa comunidade Discord. No entanto, estas informações são alojadas e principalmente processadas pelo Discord. Não extraímos, armazenamos ou processamos estes dados fora da plataforma Discord. Para mais informações sobre como o Discord trata os seus dados, consulte a Política de Privacidade do Discord.
  ru: Как администраторы сервера Discord, мы имеем доступ ко всем публичным коммуникациям, спискам участников и другой информации, размещённой в нашем сообществе Discord. Однако эта информация хранится и обрабатывается преимущественно Discord. Мы не извлекаем, не храним и не обрабатываем эти данные за пределами платформы Discord. Для получения дополнительной информации о том, как Discord обрабатывает ваши данные, ознакомьтесь с Политикой конфиденциальности Discord.
  ja: Discordサーバーの管理者として、私たちはDiscordコミュニティ内のすべての公開コミュニケーション、メンバーリスト、その他の共有情報にアクセスできます。ただし、これらの情報はDiscordでホストされ、主にDiscordによって処理されます。私たちはDiscordプラットフォーム外でこれらのデータを抽出、保存、処理することはありません。Discordのデータ取り扱いについての詳細は、Discordのプライバシーポリシーをご確認ください。
  ko: Discord 서버 관리자로서 우리는 Discord 커뮤니티 내에서 공유되는 모든 공개 통신, 회원 목록 및 기타 정보에 접근할 수 있습니다. 그러나 이 정보는 Discord에 의해 호스팅되고 주로 처리됩니다. 우리는 Discord 플랫폼 외부에서 이 데이터를 추출, 저장 또는 처리하지 않습니다. Discord가 데이터를 처리하는 방법에 대한 자세한 내용은 Discord 개인정보처리방침을 검토하십시오.
  it: In qualità di amministratori del server Discord, abbiamo accesso a tutte le comunicazioni pubbliche, agli elenchi dei membri e ad altre informazioni condivise all'interno della nostra comunità Discord. Tuttavia, queste informazioni sono ospitate ed elaborate principalmente da Discord. Non estraiamo, archiviamo o elaboriamo questi dati al di fuori della piattaforma Discord. Per ulteriori informazioni su come Discord gestisce i tuoi dati, consulta l'Informativa sulla privacy di Discord.
  tr: Discord sunucu yöneticileri olarak, Discord topluluğumuz içinde paylaşılan tüm genel iletişimlere, üye listelerine ve diğer bilgilere erişimimiz vardır. Ancak bu bilgiler Discord tarafından barındırılmakta ve öncelikli olarak Discord tarafından işlenmektedir. Bu verileri Discord platformu dışında çıkarmıyor, depolamıyor veya işlemiyoruz. Discord'un verilerinizi nasıl işlediği hakkında daha fazla bilgi için Discord'un Gizlilik Politikasını inceleyin.
  vi: Là quản trị viên máy chủ Discord, chúng tôi có quyền truy cập vào tất cả các thông tin liên lạc công khai, danh sách thành viên và các thông tin khác được chia sẻ trong cộng đồng Discord của chúng tôi. Tuy nhiên, thông tin này được lưu trữ và xử lý chủ yếu bởi Discord. Chúng tôi không trích xuất, lưu trữ hoặc xử lý dữ liệu này ngoài nền tảng Discord. Để biết thêm thông tin về cách Discord xử lý dữ liệu của bạn, vui lòng xem Chính sách quyền riêng tư của Discord.
  id: Sebagai administrator server Discord, kami memiliki akses ke semua komunikasi publik, daftar anggota, dan informasi lain yang dibagikan dalam komunitas Discord kami. Namun, informasi ini di-hosting dan terutama diproses oleh Discord. Kami tidak mengekstrak, menyimpan, atau memproses data ini di luar platform Discord. Untuk informasi lebih lanjut tentang cara Discord menangani data Anda, tinjau Kebijakan Privasi Discord.
  pl: Jako administratorzy serwera Discord mamy dostęp do wszystkich publicznych komunikatów, list członków i innych informacji udostępnianych w naszej społeczności Discord. Informacje te są jednak hostowane i przetwarzane głównie przez Discord. Nie wyodrębniamy, nie przechowujemy ani nie przetwarzamy tych danych poza platformą Discord. Aby uzyskać więcej informacji o tym, jak Discord przetwarza Twoje dane, zapoznaj się z Polityką prywatności Discord.
  nl: Als Discord-serverbeheerders hebben we toegang tot alle openbare communicatie, ledenlijsten en andere informatie die wordt gedeeld in onze Discord-community. Deze informatie wordt echter gehost en hoofdzakelijk verwerkt door Discord. We extraheren, slaan op of verwerken deze gegevens niet buiten het Discord-platform. Voor meer informatie over hoe Discord uw gegevens verwerkt, raadpleegt u het privacybeleid van Discord.
  ar: بوصفنا مسؤولي خادم Discord، لدينا إمكانية الوصول إلى جميع الاتصالات العامة وقوائم الأعضاء والمعلومات الأخرى المشتركة داخل مجتمع Discord الخاص بنا. غير أن هذه المعلومات مستضافة ومعالجة بشكل رئيسي من قِبل Discord. نحن لا نستخرج هذه البيانات أو نخزنها أو نعالجها خارج منصة Discord. لمزيد من المعلومات حول كيفية تعامل Discord مع بياناتك، يرجى مراجعة سياسة خصوصية Discord.
  hi: Discord सर्वर प्रशासकों के रूप में, हमारे पास हमारे Discord समुदाय के भीतर साझा की गई सभी सार्वजनिक संचार, सदस्य सूचियों और अन्य जानकारी तक पहुंच है। हालांकि, यह जानकारी Discord द्वारा होस्ट और मुख्य रूप से संसाधित की जाती है। हम इस डेटा को Discord के प्लेटफ़ॉर्म के बाहर निकालते, संग्रहीत या संसाधित नहीं करते। Discord आपके डेटा को कैसे संभालता है, इसके बारे में अधिक जानकारी के लिए Discord की गोपनीयता नीति देखें।
  th: ในฐานะผู้ดูแลระบบเซิร์ฟเวอร์ Discord เราสามารถเข้าถึงการสื่อสารสาธารณะทั้งหมด รายชื่อสมาชิก และข้อมูลอื่นๆ ที่แชร์ภายในชุมชน Discord ของเรา อย่างไรก็ตาม ข้อมูลนี้ถูกโฮสต์และประมวลผลหลักโดย Discord เราไม่ดึง จัดเก็บ หรือประมวลผลข้อมูลนี้นอกแพลตฟอร์ม Discord สำหรับข้อมูลเพิ่มเติมเกี่ยวกับวิธีที่ Discord จัดการข้อมูลของคุณ โปรดตรวจสอบนโยบายความเป็นส่วนตัวของ Discord
  cs: Jako administrátoři Discord serveru máme přístup ke všem veřejným komunikacím, seznamům členů a dalším informacím sdíleným v naší komunitě Discord. Tyto informace jsou však hostovány a primárně zpracovávány společností Discord. Tato data nevytěžujeme, neukládáme ani nezpracováváme mimo platformu Discord. Další informace o tom, jak Discord nakládá s vašimi daty, naleznete v Zásadách ochrany osobních údajů Discord.
  sv: Som Discord-serveradministratörer har vi tillgång till all offentlig kommunikation, medlemslistor och annan information som delas inom vår Discord-community. Denna information är dock hostad och behandlas huvudsakligen av Discord. Vi extraherar, lagrar eller behandlar inte dessa uppgifter utanför Discords plattform. För mer information om hur Discord hanterar dina uppgifter, läs igenom Discords sekretesspolicy.
  verified_by_human: []
  he: כמנהלי שרת Discord, יש לנו גישה לכל התקשורת הציבורית, רשימות החברים ומידע אחר הזמין לנהלי שרת.
