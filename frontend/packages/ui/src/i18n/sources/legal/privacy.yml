providers.always_active.vercel.description:
  context: Vercel description
  en: >-
    We use Vercel to host the static frontend of our website and web app.
    Vercel receives page requests and serves static assets.
  de: Wir nutzen Vercel für das Hosting des statischen Frontends unserer Website und Web-App. Vercel empfängt Seitenanfragen und liefert statische Inhalte aus.
  zh: 我们使用 Vercel 托管网站和 Web 应用的静态前端。Vercel 接收页面请求并提供静态资源。
  es: Utilizamos Vercel para alojar el frontend estático de nuestro sitio web y aplicación web. Vercel recibe las solicitudes de página y sirve los activos estáticos.
  ru: Мы используем Vercel для хостинга статического фронтенда нашего сайта и веб-приложения. Vercel получает запросы страниц и обслуживает статические ресурсы.
  ja: ウェブサイトとウェブアプリの静的フロントエンドのホスティングにVercelを使用しています。Vercelはページリクエストを受け取り、静的アセットを配信します。
  ko: Vercel을 사용하여 웹사이트와 웹 앱의 정적 프론트엔드를 호스팅합니다. Vercel은 페이지 요청을 수신하고 정적 자산을 제공합니다.
  it: Utilizziamo Vercel per ospitare il frontend statico del nostro sito web e della nostra web app. Vercel riceve le richieste di pagina e fornisce gli asset statici.
  tr: Web sitemizin ve web uygulamamızın statik ön ucunu barındırmak için Vercel kullanıyoruz. Vercel sayfa isteklerini alır ve statik varlıkları sunar.
  vi: Chúng tôi sử dụng Vercel để lưu trữ frontend tĩnh của trang web và ứng dụng web của mình. Vercel nhận các yêu cầu trang và cung cấp các tài nguyên tĩnh.
  id: Kami menggunakan Vercel untuk menghosting frontend statis situs web dan aplikasi web kami. Vercel menerima permintaan halaman dan menyajikan aset statis.
  pl: Używamy Vercel do hostowania statycznego frontendu naszej strony i aplikacji internetowej. Vercel odbiera żądania stron i serwuje zasoby statyczne.
  nl: We gebruiken Vercel om de statische frontend van onze website en web-app te hosten. Vercel ontvangt paginaverzoeken en levert statische bestanden.
  ar: نحن نستخدم Vercel لاستضافة الواجهة الأمامية الثابتة لموقعنا وتطبيق الويب الخاص بنا. يتلقى Vercel طلبات الصفحات ويقدم الأصول الثابتة.
  hi: हम अपनी वेबसाइट और वेब ऐप के स्टैटिक फ्रंटएंड को होस्ट करने के लिए Vercel का उपयोग करते हैं। Vercel पेज अनुरोध प्राप्त करता है और स्टैटिक एसेट्स सर्व करता है।
  th: เราใช้ Vercel เพื่อโฮสต์ส่วนหน้า (frontend) แบบสแตติกของเว็บไซต์และเว็บแอปของเรา Vercel จะได้รับคำขอหน้าเว็บและให้บริการไฟล์สแตติกต่างๆ
  cs: Vercel používáme k hostování statického frontendu našeho webu a webové aplikace. Vercel přijímá požadavky na stránky a poskytuje statické soubory.
  sv: Vi använder Vercel för att vara värd för den statiska frontend-delen av vår webbplats och webbapp. Vercel tar emot sidförfrågningar och tillhandahåller statiska tillgångar.
  he: אנחנו משתמשים ב-Vercel כדי לארח את ממשק המשתמש הסטטי של האתר ואפליקציית האינטרנט שלנו. Vercel מקבלת בקשות דפים ומגישה נכסים סטטיים.
  pt: Utilizamos a Vercel para hospedar o frontend estático do nosso site e aplicativo web. A Vercel recebe solicitações de página e serve ativos estáticos.
  fr: Nous utilisons Vercel pour héberger le frontend statique de notre site web et de notre application web. Vercel reçoit les requêtes de pages et sert les ressources statiques.
  verified_by_human: []
