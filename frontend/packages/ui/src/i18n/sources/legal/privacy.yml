  it: "I seguenti diritti sono disponibili su richiesta (contattaci via email all'indirizzo contact@openmates.org e li gestiremo manualmente):"
  tr: "Aşağıdaki haklar talep üzerine mevcuttur (lütfen contact@openmates.org adresinden e-posta yoluyla bizimle iletişime geç, bunları manuel olarak işleme alacağız):"
  vi: "Các quyền sau đây có sẵn theo yêu cầu (vui lòng liên hệ với chúng tôi qua email tại contact@openmates.org và chúng tôi sẽ xử lý thủ công):"
  id: "Hak-hak berikut tersedia berdasarkan permintaan (silakan hubungi kami melalui email di contact@openmates.org dan kami akan menanganinya secara manual):"
  pl: "Poniższe prawa są dostępne na żądanie (prosimy o kontakt e-mailowy pod adresem contact@openmates.org, a zajmiemy się nimi ręcznie):"
  nl: "De volgende rechten zijn op verzoek beschikbaar (neem contact met ons op via e-mail op contact@openmates.org en we zullen deze handmatig afhandelen):"
  ar: "الحقوق التالية متاحة عند الطلب (يرجى الاتصال بنا عبر البريد الإلكتروني على contact@openmates.org وسنتعامل معها يدويًا):"
  hi: "निम्नलिखित अधिकार अनुरोध पर उपलब्ध हैं (कृपया हमें contact@openmates.org पर ईमेल करें और हम उन्हें मैन्युअल रूप से संभालेंगे):"
  th: "สิทธิ์ต่อไปนี้สามารถขอใช้ได้ตามคำขอ (โปรดติดต่อเราทางอีเมลที่ contact@openmates.org และเราจะดำเนินการให้ด้วยตนเอง):"
  cs: "Následující práva jsou k dispozici na vyžádání (kontaktuj nás prosím e-mailem na adrese contact@openmates.org a my je vyřídíme ručně):"
  sv: "Följande rättigheter är tillgängliga på begäran (vänligen kontakta oss via e-post på contact@openmates.org så hanterar vi dem manuellt):"
  he: "הזכויות הבאות זמינות לפי בקשה (אנא צור איתנו קשר בדוא\"ל בכתובת contact@openmates.org ונטפל בהן ידנית):"
  verified_by_human: []
