limitations_of_erasure.observability_traces.description:
  context: Observability traces limitation description
  en: >-
    OpenTelemetry spans from our internal tracing pipeline are retained for up
    to 30 days for operational debugging. User IDs in traces use a hash that
    rotates every 24 hours, so traces older than one day cannot be joined back
    to a specific user. Chat content is never included in traces.
  de: OpenTelemetry-Spans aus unserer internen Tracing-Pipeline werden für bis zu 30 Tage zur betrieblichen Fehlersuche aufbewahrt. Benutzer-IDs in Traces verwenden einen Hash, der alle 24 Stunden rotiert, sodass Traces, die älter als einen Tag sind, nicht mehr einem bestimmten Benutzer zugeordnet werden können. Chat-Inhalte sind niemals in Traces enthalten.
  zh: 来自我们内部追踪流水线的 OpenTelemetry span 会保留最长 30 天，用于运行调试。追踪中的用户 ID 使用每 24 小时轮换一次的哈希值，因此超过一天的追踪无法重新关联到特定用户。聊天内容绝不会包含在追踪中。
  es: Los tramos de OpenTelemetry de nuestro flujo de trazado interno se conservan hasta 30 días para la depuración operativa. Los ID de usuario en las trazas utilizan un hash que rota cada 24 horas, por lo que las trazas de más de un día no pueden vincularse de nuevo a un usuario específico. El contenido del chat nunca se incluye en las trazas.
  fr: "Les spans OpenTelemetry de notre pipeline de traçage interne sont conservés jusqu'à 30 jours pour le débogage opérationnel. Les identifiants d'utilisateur dans les traces utilisent un hachage qui change toutes les 24 heures, de sorte que les traces datant de plus d'un jour ne peuvent pas être rattachées à un utilisateur spécifique. Le contenu des discussions n'est jamais inclus dans les traces."
  pt: Os spans do OpenTelemetry do nosso pipeline de rastreio interno são retidos por até 30 dias para depuração operacional. Os IDs de utilizador nos rastreios usam um hash que roda a cada 24 horas, pelo que os rastreios com mais de um dia não podem ser associados a um utilizador específico. O conteúdo do chat nunca é incluído nos rastreios.
  ru: Интервалы OpenTelemetry из нашего внутреннего конвейера трассировки хранятся до 30 дней для операционной отладки. Идентификаторы пользователей в трассировках используют хеш, который меняется каждые 24 часа, поэтому трассировки старше одного дня невозможно связать с конкретным пользователем. Содержимое чата никогда не включается в трассировки.
  ja: 運用上のデバッグのため、内部トレースパイプラインからの OpenTelemetry スパンは最大30日間保持されます。トレース内のユーザー ID は24時間ごとにローテーションされるハッシュを使用しているため、1日以上経過したトレースを特定のユーザーに紐付けることはできません。チャットの内容がトレースに含まれることはありません。
  ko: 내부 추적 파이프라인의 OpenTelemetry 스팬(span)은 운영 디버깅을 위해 최대 30일 동안 보관됩니다. 추적에 포함된 사용자 ID는 24시간마다 교체되는 해시를 사용하므로, 하루가 지난 추적 데이터는 특정 사용자와 다시 연결할 수 없습니다. 채팅 내용은 추적 데이터에 절대 포함되지 않습니다.
  it: Gli span di OpenTelemetry della nostra pipeline di tracciamento interna vengono conservati per un massimo di 30 giorni per il debug operativo. Gli ID utente nelle tracce utilizzano un hash che ruota ogni 24 ore, quindi le tracce più vecchie di un giorno non possono essere ricollegate a un utente specifico. Il contenuto delle chat non viene mai incluso nelle tracce.
  tr: Dahili izleme hattımızdaki OpenTelemetry aralıkları, operasyonel hata ayıklama için 30 güne kadar saklanır. İzlerdeki kullanıcı kimlikleri, her 24 saatte bir değişen bir karma kullanır, bu nedenle bir günden eski izler belirli bir kullanıcıyla yeniden ilişkilendirilemez. Sohbet içeriği hiçbir zaman izlere dahil edilmez.
  vi: Các phân đoạn OpenTelemetry từ hệ thống theo dõi nội bộ của chúng tôi được lưu giữ tối đa 30 ngày để phục vụ việc gỡ lỗi vận hành. ID người dùng trong các dấu vết sử dụng mã băm thay đổi sau mỗi 24 giờ, vì vậy các dấu vết cũ hơn một ngày không thể được liên kết ngược lại với một người dùng cụ thể. Nội dung trò chuyện không bao giờ được đưa vào các dấu vết này.
  id: Rentang OpenTelemetry dari pipa pelacakan internal kami disimpan hingga 30 hari untuk debugging operasional. ID pengguna dalam jejak menggunakan hash yang berputar setiap 24 jam, sehingga jejak yang lebih lama dari satu hari tidak dapat dihubungkan kembali ke pengguna tertentu. Konten obrolan tidak pernah disertakan dalam jejak.
  pl: Fragmenty (spans) OpenTelemetry z naszego wewnętrznego potoku śledzenia są przechowywane przez okres do 30 dni w celu debugowania operacyjnego. Identyfikatory użytkowników w śladach wykorzystują skrót, który zmienia się co 24 godziny, więc ślady starsze niż jeden dzień nie mogą zostać powiązane z konkretnym użytkownikiem. Treść czatu nigdy nie jest uwzględniana w śladach.
  nl: "OpenTelemetry-spans van onze interne tracing-pipeline worden tot 30 dagen bewaard voor operationele debugging. Gebruikers-ID's in traces gebruiken een hash die elke 24 uur roteert, waardoor traces ouder dan één dag niet aan een specifieke gebruiker kunnen worden gekoppeld. Chatinhoud wordt nooit opgenomen in traces."
  ar: يتم الاحتفاظ بنطاقات OpenTelemetry من خط أنابيب التتبع الداخلي لدينا لمدة تصل إلى 30 يومًا لتصحيح الأخطاء التشغيلية. تستخدم معرفات المستخدمين في التتبعات تجزئة تتغير كل 24 ساعة، لذا لا يمكن ربط التتبعات الأقدم من يوم واحد بمستخدم معين. لا يتم تضمين محتوى الدردشة أبدًا في التتبعات.
  hi: हमारे आंतरिक ट्रेसिंग पाइपलाइन से OpenTelemetry स्पैन ऑपरेशनल डिबगिंग के लिए 30 दिनों तक रखे जाते हैं। ट्रेसेस में यूजर आईडी एक हैश का उपयोग करते हैं जो हर 24 घंटे में बदलता है, इसलिए एक दिन से पुराने ट्रेसेस को किसी विशिष्ट उपयोगकर्ता से वापस नहीं जोड़ा जा सकता है। चैट कंटेंट को कभी भी ट्रेसेस में शामिल नहीं किया जाता है।
  th: OpenTelemetry spans จากไปป์ไลน์การติดตามภายในของเราจะถูกเก็บรักษาไว้สูงสุด 30 วันเพื่อการแก้ไขจุดบกพร่องในการดำเนินงาน ID ผู้ใช้ในร่องรอยการติดตามจะใช้แฮชที่เปลี่ยนทุก 24 ชั่วโมง ดังนั้นร่องรอยที่เก่ากว่าหนึ่งวันจึงไม่สามารถเชื่อมโยงกลับไปยังผู้ใช้รายใดรายหนึ่งได้ เนื้อหาการแชทจะไม่ถูกรวมไว้ในร่องรอยการติดตาม
  cs: OpenTelemetry spany z našeho interního trasovacího kanálu jsou uchovávány po dobu až 30 dnů pro účely provozního ladění. ID uživatelů v trasách používají hash, který se mění každých 24 hodin, takže trasy starší než jeden den nelze zpětně spojit s konkrétním uživatelem. Obsah chatu není v trasách nikdy zahrnut.
  sv: "OpenTelemetry-spann från vår interna spårningspipeline sparas i upp till 30 dagar för operativ felsökning. Användar-ID:n i spårningarna använder en hash som roterar var 24:e timme, så spårningar äldre än en dag kan inte kopplas tillbaka till en specifik användare. Chattinnehåll inkluderas aldrig i spårningarna."
  he: "מקטעי OpenTelemetry מצינור הניטור הפנימי שלנו נשמרים למשך עד 30 יום לצורך ניפוי שגיאות תפעולי. מזהי משתמש בעקבות משתמשים ב-hash שמתחלף כל 24 שעות, כך שלא ניתן לקשר עקבות ישנים מיום אחד למשתמש ספציפי. תוכן צ'אט לעולם אינו נכלל בעקבות."
  verified_by_human: []
