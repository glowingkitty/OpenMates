webshare.description:
  context: Description of Webshare service
  en: "We use Webshare as a third-party service for making network requests to external services in the web application. When you use the videos get transcript, health get appointments, or events search skills, the relevant request URLs are routed through Webshare to the respective services. Webshare sees which URLs are requested, but all data is shared without user identifiers — Webshare does not know which specific user made each request. This data sharing only occurs when you actively use these skills."
  de: "Wir verwenden Webshare als Drittanbieter-Dienst für Netzwerkanfragen an externe Dienste in der Webanwendung. Wenn Sie die Funktionen Videos Transkript abrufen, Gesundheit Termine suchen oder Veranstaltungen suchen verwenden, werden die entsprechenden Anfrage-URLs über Webshare an die jeweiligen Dienste weitergeleitet. Webshare sieht, welche URLs angefragt werden, aber alle Daten werden ohne Benutzerkennungen geteilt — Webshare weiß nicht, welcher spezifische Benutzer jede Anfrage gestellt hat. Diese Datenweitergabe erfolgt nur, wenn Sie diese Funktionen aktiv verwenden."
  zh: "我们在 Web 应用程序中使用 Webshare 作为第三方服务向外部服务发出网络请求。当您使用视频获取转录、健康获取预约或活动搜索功能时，相关请求 URL 会通过 Webshare 路由到相应服务。Webshare 会看到请求的 URL，但所有数据都是在没有用户标识符的情况下共享的 — Webshare 不知道哪个特定用户发出了每个请求。这种数据共享仅在您主动使用这些功能时发生。"
  es: "Utilizamos Webshare como servicio de terceros para realizar solicitudes de red a servicios externos en la aplicación web. Cuando utiliza las funciones de obtener transcripción de videos, obtener citas de salud o buscar eventos, las URLs de solicitud relevantes se enrutan a través de Webshare a los servicios correspondientes. Webshare ve qué URLs se solicitan, pero todos los datos se comparten sin identificadores de usuario — Webshare no sabe qué usuario específico realizó cada solicitud. Este intercambio de datos solo ocurre cuando utiliza activamente estas funciones."
  fr: "Nous utilisons Webshare comme service tiers pour effectuer des requêtes réseau vers des services externes dans l'application web. Lorsque vous utilisez les fonctions d'obtention de transcription vidéo, d'obtention de rendez-vous santé ou de recherche d'événements, les URL de requête correspondantes sont acheminées via Webshare vers les services respectifs. Webshare voit quelles URL sont demandées, mais toutes les données sont partagées sans identifiants d'utilisateur — Webshare ne sait pas quel utilisateur spécifique a effectué chaque demande. Ce partage de données ne se produit que lorsque vous utilisez activement ces fonctions."
  pt: "Usamos Webshare como serviço de terceiros para fazer solicitações de rede a serviços externos no aplicativo web. Quando você usa as funções de obter transcrição de vídeos, obter consultas de saúde ou pesquisar eventos, os URLs de solicitação relevantes são roteados através do Webshare para os respectivos serviços. Webshare vê quais URLs são solicitados, mas todos os dados são compartilhados sem identificadores de usuário — Webshare não sabe qual usuário específico fez cada solicitação. Este compartilhamento de dados ocorre apenas quando você usa ativamente essas funções."
  ru: "Мы используем Webshare как сторонний сервис для отправки сетевых запросов к внешним службам в веб-приложении. Когда вы используете функции получения транскрипции видео, поиска записей к врачу или поиска мероприятий, соответствующие URL-адреса запросов маршрутизируются через Webshare к соответствующим службам. Webshare видит, какие URL-адреса запрашиваются, но все данные передаются без идентификаторов пользователей — Webshare не знает, какой конкретный пользователь сделал каждый запрос. Эта передача данных происходит только тогда, когда вы активно используете эти функции."
  ja: "当社は、ウェブアプリケーションで外部サービスへのネットワークリクエストを行うためのサードパーティサービスとしてWebshareを使用しています。動画の文字起こし取得、健康の予約取得、またはイベント検索機能を使用すると、関連するリクエストURLがWebshare経由で各サービスにルーティングされます。WebshareはどのようなURLが要求されているかを確認しますが、すべてのデータはユーザー識別子なしで共有されます — Webshareはどの特定のユーザーが各リクエストを行ったかを知りません。このデータ共有は、これらの機能を積極的に使用する場合にのみ発生します。"
  ko: "웹 애플리케이션에서 외부 서비스에 네트워크 요청을 하기 위한 서드파티 서비스로 Webshare를 사용합니다. 비디오 전사 가져오기, 건강 예약 가져오기 또는 이벤트 검색 기능을 사용하면 관련 요청 URL이 Webshare를 통해 각 서비스로 라우팅됩니다. Webshare는 어떤 URL이 요청되는지 볼 수 있지만 모든 데이터는 사용자 식별자 없이 공유됩니다 — Webshare는 어떤 특정 사용자가 각 요청을 했는지 알 수 없습니다. 이 데이터 공유는 이러한 기능을 적극적으로 사용할 때만 발생합니다."
  it: "Utilizziamo Webshare come servizio di terze parti per effettuare richieste di rete a servizi esterni nell'applicazione web. Quando utilizzi le funzioni di ottenere trascrizione video, ottenere appuntamenti sanitari o ricerca di eventi, gli URL delle richieste pertinenti vengono instradati tramite Webshare ai rispettivi servizi. Webshare vede quali URL vengono richiesti, ma tutti i dati sono condivisi senza identificatori utente — Webshare non sa quale utente specifico ha effettuato ciascuna richiesta. Questa condivisione dei dati si verifica solo quando utilizzi attivamente queste funzioni."
  tr: "Web uygulamasında harici hizmetlere ağ istekleri yapmak için bir üçüncü taraf hizmet olarak Webshare kullanıyoruz. Video transkript alma, sağlık randevusu alma veya etkinlik arama özelliklerini kullandığınızda, ilgili istek URL'leri Webshare üzerinden ilgili hizmetlere yönlendirilir. Webshare hangi URL'lerin istendiğini görür, ancak tüm veriler kullanıcı tanımlayıcıları olmadan paylaşılır — Webshare hangi belirli kullanıcının her isteği yaptığını bilmez. Bu veri paylaşımı yalnızca bu özellikleri aktif olarak kullandığınızda gerçekleşir."
  vi: "Chúng tôi sử dụng Webshare như một dịch vụ bên thứ ba để thực hiện các yêu cầu mạng đến các dịch vụ bên ngoài trong ứng dụng web. Khi bạn sử dụng các tính năng lấy bản ghi video, lấy lịch hẹn sức khỏe hoặc tìm kiếm sự kiện, các URL yêu cầu liên quan sẽ được định tuyến qua Webshare đến các dịch vụ tương ứng. Webshare thấy URL nào được yêu cầu, nhưng tất cả dữ liệu được chia sẻ mà không có định danh người dùng — Webshare không biết người dùng cụ thể nào đã thực hiện mỗi yêu cầu. Việc chia sẻ dữ liệu này chỉ xảy ra khi bạn tích cực sử dụng các tính năng này."
  id: "Kami menggunakan Webshare sebagai layanan pihak ketiga untuk membuat permintaan jaringan ke layanan eksternal di aplikasi web. Saat Anda menggunakan fitur mendapatkan transkrip video, mendapatkan janji kesehatan, atau mencari acara, URL permintaan yang relevan diarahkan melalui Webshare ke layanan masing-masing. Webshare melihat URL mana yang diminta, tetapi semua data dibagikan tanpa pengenal pengguna — Webshare tidak tahu pengguna spesifik mana yang membuat setiap permintaan. Berbagi data ini hanya terjadi ketika Anda secara aktif menggunakan fitur-fitur ini."
  pl: "Używamy Webshare jako usługi firm zewnętrznych do wykonywania żądań sieciowych do zewnętrznych usług w aplikacji internetowej. Gdy używasz funkcji pobierania transkrypcji filmów, pobierania wizyt zdrowotnych lub wyszukiwania wydarzeń, odpowiednie adresy URL żądań są kierowane przez Webshare do odpowiednich usług. Webshare widzi, które adresy URL są żądane, ale wszystkie dane są udostępniane bez identyfikatorów użytkownika — Webshare nie wie, który konkretny użytkownik wysłał każde żądanie. To udostępnianie danych następuje tylko wtedy, gdy aktywnie używasz tych funkcji."
  nl: "We gebruiken Webshare als dienst van derden voor het doen van netwerkaanvragen aan externe diensten in de webapplicatie. Wanneer u de functies voor het ophalen van videotranscripten, het ophalen van gezondheidsafspraken of het zoeken naar evenementen gebruikt, worden de relevante verzoek-URL's via Webshare naar de respectieve diensten doorgestuurd. Webshare ziet welke URL's worden aangevraagd, maar alle gegevens worden gedeeld zonder gebruikersidentificatoren — Webshare weet niet welke specifieke gebruiker elk verzoek heeft ingediend. Deze gegevensdeling vindt alleen plaats wanneer u deze functies actief gebruikt."
  ar: "نستخدم Webshare كخدمة طرف ثالث لإجراء طلبات الشبكة إلى الخدمات الخارجية في تطبيق الويب. عند استخدام وظائف الحصول على نص الفيديو، أو الحصول على مواعيد الرعاية الصحية، أو البحث عن الفعاليات، يتم توجيه عناوين URL للطلبات ذات الصلة عبر Webshare إلى الخدمات المعنية. يرى Webshare عناوين URL المطلوبة، ولكن يتم مشاركة جميع البيانات دون معرفات المستخدم — لا يعرف Webshare المستخدم المحدد الذي أجرى كل طلب. يحدث تبادل البيانات هذا فقط عند استخدام هذه الوظائف بنشاط."
  hi: "हम वेब एप्लिकेशन में बाहरी सेवाओं को नेटवर्क अनुरोध करने के लिए एक तृतीय-पक्ष सेवा के रूप में Webshare का उपयोग करते हैं। जब आप वीडियो ट्रांसक्रिप्ट प्राप्त करने, स्वास्थ्य अपॉइंटमेंट प्राप्त करने, या इवेंट खोजने की क्षमताओं का उपयोग करते हैं, तो संबंधित अनुरोध URL Webshare के माध्यम से संबंधित सेवाओं पर रूट किए जाते हैं। Webshare देखता है कि कौन से URL अनुरोध किए जाते हैं, लेकिन सभी डेटा उपयोगकर्ता पहचानकर्ताओं के बिना साझा किया जाता है — Webshare नहीं जानता कि किस विशिष्ट उपयोगकर्ता ने प्रत्येक अनुरोध किया। यह डेटा साझाकरण केवल तब होता है जब आप इन क्षमताओं का सक्रिय रूप से उपयोग करते हैं।"
  th: "เราใช้ Webshare เป็นบริการจากบุคคลที่สามสำหรับส่งคำขอเครือข่ายไปยังบริการภายนอกในแอปพลิเคชันเว็บ เมื่อคุณใช้ทักษะดึงคำบรรยายวิดีโอ รับนัดหมายด้านสุขภาพ หรือค้นหากิจกรรม URL คำขอที่เกี่ยวข้องจะถูกส่งผ่าน Webshare ไปยังบริการที่เกี่ยวข้อง Webshare เห็น URL ที่ถูกร้องขอ แต่ข้อมูลทั้งหมดจะถูกแชร์โดยไม่มีตัวระบุผู้ใช้ — Webshare ไม่ทราบว่าผู้ใช้เฉพาะรายใดส่งคำขอแต่ละรายการ การแชร์ข้อมูลนี้เกิดขึ้นเฉพาะเมื่อคุณใช้ทักษะเหล่านี้อย่างแข็งขัน"
  cs: "Používáme Webshare jako službu třetí strany pro síťové požadavky na externí služby v webové aplikaci. Když používáte funkce získání přepisu videa, získání zdravotních schůzek nebo vyhledávání událostí, příslušné adresy URL požadavků jsou směrovány přes Webshare k příslušným službám. Webshare vidí, které adresy URL jsou požadovány, ale všechna data jsou sdílena bez identifikátorů uživatelů — Webshare neví, který konkrétní uživatel podal každý požadavek. Toto sdílení dat nastává pouze tehdy, když aktivně používáte tyto funkce."
  sv: "Vi använder Webshare som en tredjepartstjänst för att göra nätverksförfrågningar till externa tjänster i webbapplikationen. När du använder funktionerna för att hämta videoavskrifter, hämta hälsomöten eller söka efter evenemang dirigeras de relevanta förfrågnings-URL:erna via Webshare till respektive tjänster. Webshare ser vilka URL:er som begärs, men all data delas utan användaridentifierare — Webshare vet inte vilken specifik användare som gjorde varje begäran. Denna datadelning sker endast när du aktivt använder dessa funktioner."
  verified_by_human: []
  he: אנו משתמשים ב-Webshare כשירות צד שלישי לביצוע בקשות רשת לשירותים חיצוניים באפליקציית האינטרנט. בקשות רשת מסוימות עשויות לעבור דרך Webshare.
