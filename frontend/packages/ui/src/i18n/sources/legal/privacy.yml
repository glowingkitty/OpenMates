providers.ai_models.aws_bedrock.description:
  context: AWS Bedrock description
  en: >-
    AWS Bedrock hosts Anthropic Claude models in its Frankfurt EU region.
    This is the primary path for Claude requests. AWS receives your chat
    messages with PII placeholders already substituted client-side.
  de: AWS Bedrock hostet Anthropic Claude-Modelle in seiner EU-Region Frankfurt. Dies ist der primäre Pfad für Claude-Anfragen. AWS erhält deine Chat-Nachrichten mit bereits clientseitig ersetzten PII-Platzhaltern.
  zh: AWS Bedrock 在其法兰克福欧盟区域托管 Anthropic Claude 模型。这是处理 Claude 请求的主要路径。AWS 接收您的聊天消息时，其中的 PII（个人身份信息）占位符已在客户端完成替换。
  es: AWS Bedrock aloja modelos Anthropic Claude en su región de la UE en Frankfurt. Esta es la ruta principal para las solicitudes de Claude. AWS recibe tus mensajes de chat con los marcadores de PII ya sustituidos en el lado del cliente.
  pt: O AWS Bedrock aloja modelos Anthropic Claude na sua região Frankfurt EU. Este é o caminho principal para pedidos do Claude. A AWS recebe as tuas mensagens de chat com marcadores de PII já substituídos no lado do cliente.
  ja: AWS Bedrockは、フランクフルト（EU）リージョンでAnthropic Claudeモデルをホストしている。これはClaudeへのリクエストのプライマリパスである。AWSは、クライアント側でPII（個人を特定できる情報）プレースホルダーに置換済みのチャットメッセージを受信する。
  ko: AWS Bedrock은 프랑크푸르트 EU 지역에서 Anthropic Claude 모델을 호스팅합니다. 이는 Claude 요청을 위한 기본 경로입니다. AWS는 클라이언트 측에서 PII 자리표시자가 이미 대체된 상태로 채팅 메시지를 수신합니다.
  it: AWS Bedrock ospita i modelli Anthropic Claude nella sua regione UE di Francoforte. Questo è il percorso primario per le richieste Claude. AWS riceve i tuoi messaggi di chat con i segnaposto PII già sostituiti lato client.
  tr: AWS Bedrock, Anthropic Claude modellerini Frankfurt AB bölgesinde barındırır. Bu, Claude istekleri için birincil yoldur. AWS, sohbet mesajlarını PII yer tutucuları istemci tarafında değiştirilmiş olarak alır.
  vi: AWS Bedrock lưu trữ các mô hình Anthropic Claude tại khu vực Frankfurt EU. Đây là luồng chính cho các yêu cầu Claude. AWS nhận tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế ở phía máy khách.
  id: AWS Bedrock menghosting model Anthropic Claude di wilayah Frankfurt UE. Ini adalah jalur utama untuk permintaan Claude. AWS menerima pesan obrolanmu dengan placeholder PII yang sudah diganti di sisi klien.
  pl: AWS Bedrock hostuje modele Anthropic Claude w regionie UE (Frankfurt). Jest to główna ścieżka dla żądań Claude. AWS otrzymuje Twoje wiadomości czatu z symbolami zastępczymi PII podstawionymi już po stronie klienta.
  nl: AWS Bedrock host Anthropic Claude-modellen in de EU-regio Frankfurt. Dit is het primaire pad voor Claude-verzoeken. AWS ontvangt je chatberichten waarbij PII-placeholders al aan de clientzijde zijn vervangen.
  hi: AWS Bedrock अपने फ्रैंकफर्ट EU क्षेत्र में Anthropic Claude मॉडल को होस्ट करता है। यह Claude अनुरोधों के लिए प्राथमिक पाथ है। AWS आपके चैट संदेशों को क्लाइंट-साइड पर पहले से ही बदले गए PII प्लेसहोल्डर्स के साथ प्राप्त करता है।
  th: AWS Bedrock โฮสต์โมเดล Anthropic Claude ในภูมิภาคแฟรงก์เฟิร์ต EU นี่คือเส้นทางหลักสำหรับคำขอของ Claude โดย AWS จะได้รับข้อความแชทของคุณที่แทนที่ตัวสำรอง PII เรียบร้อยแล้วจากฝั่งไคลเอนต์
  sv: AWS Bedrock är värd för Anthropic Claude-modeller i sin EU-region i Frankfurt. Detta är den primära vägen för Claude-förfrågningar. AWS tar emot dina chattmeddelanden med PII-platshållare redan utbytta på klientsidan.
  fr: "AWS Bedrock héberge les modèles Anthropic Claude dans sa région EU de Francfort. C'est le chemin principal pour les requêtes Claude. AWS reçoit tes messages de chat avec les espaces réservés PII déjà substitués côté client."
  ar: تستضيف AWS Bedrock نماذج Anthropic Claude في منطقة فرانكفورت بالاتحاد الأوروبي. هذا هو المسار الأساسي لطلبات Claude. تتلقى AWS رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية مسبقاً في متصفحك.
  cs: AWS Bedrock hostuje modely Anthropic Claude ve svém regionu EU (Frankfurt). Toto je primární cesta pro požadavky na Claude. AWS přijímá tvé zprávy s osobními údaji (PII) již nahrazenými zástupnými symboly na straně klienta.
  ru: AWS Bedrock размещает модели Anthropic Claude в регионе Франкфурт (ЕС). Это основной путь для запросов к Claude. AWS получает твои сообщения в чате с уже замененными на стороне клиента персональными данными.
  he: "AWS Bedrock מארחת את מודלי Claude של Anthropic באזור פרנקפורט (האיחוד האירופי). זהו הנתיב הראשי לבקשות Claude. AWS מקבלת את הודעות הצ'אט שלך כשממלאי מקום ל-PII כבר הוחלפו בצד הלקוח."
  verified_by_human: []
