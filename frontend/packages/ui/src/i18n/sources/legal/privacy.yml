limitations_of_erasure.audit_logs.description:
  context: Audit logs limitation description
  en: >-
    Authentication and data-access audit logs are retained for 2 years under
    BSI §34 BDSG (German security audit obligations). These logs contain
    timestamp, user identifier, event type, and status — no content.
  de: Audit-Protokolle für Authentifizierung und Datenzugriff werden gemäß BSI §34 BDSG (deutsche Sicherheitsaudit-Verpflichtungen) für 2 Jahre aufbewahrt. Diese Protokolle enthalten Zeitstempel, Benutzerkennung, Ereignistyp und Status – keinen Inhalt.
  zh: 根据 BSI §34 BDSG（德国安全审计义务），身份验证和数据访问审计日志将保留 2 年。这些日志包含时间戳、用户标识符、事件类型和状态，不包含内容。
  es: Los registros de auditoría de autenticación y acceso a datos se conservan durante 2 años según el BSI §34 BDSG (obligaciones de auditoría de seguridad alemanas). Estos registros contienen la marca de tiempo, el identificador de usuario, el tipo de evento y el estado; no contienen contenido.
  fr: "Les journaux d'audit d'authentification et d'accès aux données sont conservés pendant 2 ans en vertu du BSI §34 BDSG (obligations d'audit de sécurité allemandes). Ces journaux contiennent l'horodatage, l'identifiant de l'utilisateur, le type d'événement et le statut — aucun contenu."
  pt: Os registos de auditoria de autenticação e acesso a dados são retidos por 2 anos ao abrigo do BSI §34 BDSG (obrigações de auditoria de segurança alemãs). Estes registos contêm carimbo de data/hora, identificador de utilizador, tipo de evento e estado — sem conteúdo.
  ru: Журналы аудита аутентификации и доступа к данным хранятся в течение 2 лет в соответствии с BSI §34 BDSG (обязательства Германии по аудиту безопасности). Эти журналы содержат метку времени, идентификатор пользователя, тип события и статус — без содержимого.
  ja: 認証およびデータアクセス監査ログは、BSI §34 BDSG（ドイツのセキュリティ監査義務）に基づき、2年間保持されます。これらのログには、タイムスタンプ、ユーザー識別子、イベントタイプ、ステータスが含まれますが、コンテンツは含まれません。
  ko: 인증 및 데이터 액세스 감사 로그는 BSI §34 BDSG(독일 보안 감사 의무)에 따라 2년 동안 보관됩니다. 이 로그에는 타임스탬프, 사용자 식별자, 이벤트 유형 및 상태가 포함되며 콘텐츠는 포함되지 않습니다.
  it: "I log di audit per l'autenticazione e l'accesso ai dati vengono conservati per 2 anni ai sensi del BSI §34 BDSG (obblighi di audit di sicurezza tedeschi). Questi log contengono timestamp, identificativo utente, tipo di evento e stato — nessun contenuto."
  tr: Kimlik doğrulama ve veri erişimi denetim günlükleri, BSI §34 BDSG (Alman güvenlik denetimi yükümlülükleri) uyarınca 2 yıl boyunca saklanır. Bu günlükler zaman damgası, kullanıcı tanımlayıcısı, olay türü ve durum içerir; içerik içermez.
  vi: Nhật ký kiểm tra xác thực và truy cập dữ liệu được lưu giữ trong 2 năm theo BSI §34 BDSG (nghĩa vụ kiểm tra an ninh của Đức). Các nhật ký này chứa dấu thời gian, mã định danh người dùng, loại sự kiện và trạng thái — không chứa nội dung.
  id: Log audit autentikasi dan akses data disimpan selama 2 tahun berdasarkan BSI §34 BDSG (kewajiban audit keamanan Jerman). Log ini berisi stempel waktu, pengenal pengguna, jenis peristiwa, dan status — tanpa konten.
  pl: Logi audytowe dotyczące uwierzytelniania i dostępu do danych są przechowywane przez 2 lata zgodnie z BSI §34 BDSG (niemieckie obowiązki w zakresie audytu bezpieczeństwa). Logi te zawierają znacznik czasu, identyfikator użytkownika, typ zdarzenia i status — bez treści.
  nl: Auditlogs voor authenticatie en gegevenstoegang worden gedurende 2 jaar bewaard onder BSI §34 BDSG (Duitse beveiligingsauditverplichtingen). Deze logs bevatten een tijdstempel, gebruikers-ID, gebeurtenistype en status — geen inhoud.
  ar: يتم الاحتفاظ بسجلات تدقيق المصادقة والوصول إلى البيانات لمدة سنتين بموجب BSI §34 BDSG (التزامات تدقيق الأمن الألمانية). تحتوي هذه السجلات على الطابع الزمني، ومعرف المستخدم، ونوع الحدث، والحالة — بدون محتوى.
  hi: प्रमाणीकरण और डेटा-एक्सेस ऑडिट लॉग BSI §34 BDSG (जर्मन सुरक्षा ऑडिट दायित्वों) के तहत 2 साल के लिए रखे जाते हैं। इन लॉग में टाइमस्टैम्प, यूजर आईडी, इवेंट का प्रकार और स्थिति होती है — कोई कंटेंट नहीं।
  th: บันทึกการตรวจสอบการยืนยันตัวตนและการเข้าถึงข้อมูลจะถูกเก็บรักษาไว้เป็นเวลา 2 ปีตาม BSI §34 BDSG (ภาระผูกพันในการตรวจสอบความปลอดภัยของเยอรมนี) บันทึกเหล่านี้ประกอบด้วยการประทับเวลา ตัวระบุผู้ใช้ ประเภทเหตุการณ์ และสถานะ — ไม่รวมเนื้อหา
  cs: Auditní protokoly o autentizaci a přístupu k datům jsou uchovávány po dobu 2 let podle BSI §34 BDSG (německé povinnosti bezpečnostního auditu). Tyto protokoly obsahují časové razítko, identifikátor uživatele, typ události a stav – žádný obsah.
  sv: Loggar för autentisering och dataåtkomst sparas i 2 år enligt BSI §34 BDSG (tyska skyldigheter för säkerhetsgranskning). Dessa loggar innehåller tidsstämpel, användaridentifierare, händelsetyp och status – inget innehåll.
  he: יומני ביקורת של אימות וגישה לנתונים נשמרים למשך שנתיים תחת BSI §34 BDSG (חובות ביקורת אבטחה גרמניות). יומנים אלו מכילים חותמת זמן, מזהה משתמש, סוג אירוע וסטטוס — ללא תוכן.
