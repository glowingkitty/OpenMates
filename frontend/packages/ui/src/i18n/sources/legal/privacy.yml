providers.always_active.brevo.description:
  context: Brevo description
  en: >-
    We use Brevo to send transactional email — account verification, password
    reset links, payment receipts, and credit notes — and, if you opt in, the
    OpenMates newsletter. Brevo sees recipient email addresses and the content
    of the emails we send you.
  de: Wir nutzen Brevo zum Versenden von Transaktions-E-Mails – Kontoverifizierung, Links zum Zurücksetzen des Passworts, Zahlungsbelege und Gutschriften – sowie, falls du dich dafür entscheidest, für den OpenMates-Newsletter. Brevo sieht die E-Mail-Adressen der Empfänger und den Inhalt der E-Mails, die wir dir senden.
  zh: 我们使用 Brevo 发送事务性邮件——账户验证、密码重置链接、付款收据和贷记单——以及（如果你选择订阅）OpenMates 时事通讯。Brevo 会看到收件人的电子邮件地址以及我们发送给你的邮件内容。
  es: Utilizamos Brevo para enviar correos electrónicos transaccionales (verificación de cuenta, enlaces de restablecimiento de contraseña, recibos de pago y notas de crédito) y, si te suscribes, el boletín de OpenMates. Brevo ve las direcciones de correo electrónico de los destinatarios y el contenido de los correos que te enviamos.
  ru: Мы используем Brevo для отправки транзакционных писем — подтверждения аккаунта, ссылок для сброса пароля, квитанций об оплате и кредитовых авизо — а также, если ты подпишешься, рассылки OpenMates. Brevo видит адреса электронной почты получателей и содержание писем, которые мы тебе отправляем.
  ja: アカウント確認、パスワードリセットリンク、領収書、クレジットノートなどのトランザクションメールの送信、および（オプトインした場合）OpenMatesニュースレターの送信にBrevoを使用しています。Brevoは、受信者のメールアドレスと送信されるメールの内容を閲覧します。
  ko: 계정 확인, 비밀번호 재설정 링크, 결제 영수증, 마이너스 세금 계산서 발송을 위해 Brevo를 사용하며, 동의한 경우 OpenMates 뉴스레터 발송에도 사용합니다. Brevo는 수신자 이메일 주소와 발송되는 이메일 내용을 확인하게 됩니다.
  it: "Utilizziamo Brevo per inviare email transazionali — verifica dell'account, link per il ripristino della password, ricevute di pagamento e note di credito — e, se acconsenti, la newsletter di OpenMates. Brevo vede gli indirizzi email dei destinatari e il contenuto delle email che ti inviamo."
  tr: İşlemsel e-postaları (hesap doğrulama, şifre sıfırlama bağlantıları, ödeme makbuzları ve iade dekontları) ve istersen OpenMates bültenini göndermek için Brevo kullanıyoruz. Brevo, alıcı e-posta adreslerini ve sana gönderdiğimiz e-postaların içeriğini görür.
  vi: Chúng tôi sử dụng Brevo để gửi email giao dịch — xác minh tài khoản, liên kết đặt lại mật khẩu, biên lai thanh toán và giấy báo có — và, nếu bạn đồng ý, bản tin OpenMates. Brevo nhìn thấy địa chỉ email người nhận và nội dung của các email chúng tôi gửi cho bạn.
  id: Kami menggunakan Brevo untuk mengirim email transaksional — verifikasi akun, tautan pengaturan ulang kata sandi, tanda terima pembayaran, dan nota kredit — dan, jika kamu memilih ikut serta, buletin OpenMates. Brevo melihat alamat email penerima dan konten email yang kami kirimkan kepadamu.
  pl: Używamy Brevo do wysyłania e-maili transakcyjnych — weryfikacji konta, linków do resetowania hasła, potwierdzeń płatności i not kredytowych — oraz, jeśli wyrazisz zgodę, newslettera OpenMates. Brevo widzi adresy e-mail odbiorców i treść e-maili, które do Ciebie wysyłamy.
  nl: "We gebruiken Brevo om transactionele e-mails te sturen — accountverificatie, links voor het herstellen van wachtwoorden, betalingsbewijzen en creditnota's — en, als je je hiervoor aanmeldt, de OpenMates-nieuwsbrief. Brevo ziet de e-mailadressen van ontvangers en de inhoud van de e-mails die we je sturen."
  ar: نستخدم Brevo لإرسال رسائل البريد الإلكتروني الخاصة بالمعاملات — التحقق من الحساب، وروابط إعادة تعيين كلمة المرور، وإيصالات الدفع، والإشعارات الدائنة — وإذا اخترت ذلك، نشرة OpenMates الإخبارية. يرى Brevo عناوين البريد الإلكتروني للمستلمين ومحتوى رسائل البريد الإلكتروني التي نرسلها إليك.
  hi: हम ट्रांज़ैक्शनल ईमेल — अकाउंट वेरिफिकेशन, पासवर्ड रीसेट लिंक, भुगतान रसीदें और क्रेडिट नोट्स — और यदि तुम चुनते हो, तो OpenMates न्यूज़लेटर भेजने के लिए Brevo का उपयोग करते हैं। Brevo प्राप्तकर्ता के ईमेल पते और हमारे द्वारा तुम्हें भेजे जाने वाले ईमेल की सामग्री को देखता है।
  th: เราใช้ Brevo เพื่อส่งอีเมลแจ้งเตือนการทำรายการ — การยืนยันบัญชี, ลิงก์รีเซ็ตรหัสผ่าน, ใบเสร็จรับเงิน และใบลดหนี้ — และหากคุณเลือกรับ เราจะส่งจดหมายข่าว OpenMates ด้วย Brevo จะเห็นที่อยู่อีเมลของผู้รับและเนื้อหาของอีเมลที่เราส่งให้คุณ
  cs: Brevo používáme k zasílání transakčních e-mailů – ověření účtu, odkazů pro resetování hesla, potvrzení o platbě a dobropisů – a pokud se přihlásíš, také newsletteru OpenMates. Brevo vidí e-mailové adresy příjemců a obsah e-mailů, které ti posíláme.
  sv: Vi använder Brevo för att skicka transaktionella e-postmeddelanden — kontoverifiering, länkar för återställning av lösenord, betalningskvitton och kreditnotor — samt, om du väljer det, OpenMates nyhetsbrev. Brevo ser mottagarens e-postadress och innehållet i de e-postmeddelanden vi skickar till dig.
  he: אנחנו משתמשים ב-Brevo כדי לשלוח אימיילים תפעוליים — אימות חשבון, קישורים לאיפוס סיסמה, קבלות תשלום וזיכויים — ואם תבחר בכך, גם את הניוזלטר של OpenMates. Brevo רואה את כתובות האימייל של הנמענים ואת תוכן האימיילים שאנו שולחים לך.
  pt: Utilizamos a Brevo para enviar e-mails transacionais — verificação de conta, links de redefinição de senha, recibos de pagamento e notas de crédito — e, se você optar, a newsletter do OpenMates. A Brevo vê os endereços de e-mail dos destinatários e o conteúdo dos e-mails que enviamos a você.
  fr: "Nous utilisons Brevo pour envoyer des e-mails transactionnels — vérification de compte, liens de réinitialisation de mot de passe, reçus de paiement et notes de crédit — et, si tu l'acceptes, la newsletter OpenMates. Brevo voit les adresses e-mail des destinataires et le contenu des e-mails que nous t'envoyons."
  verified_by_human: []
