providers.payments.description:
  context: Description of Group B
  en: >-
    These providers are only used when you purchase credits, subscribe to
    monthly auto top-up, or receive a refund. If you never make a purchase,
    none of your data is shared with them.
  de: Diese Anbieter werden nur genutzt, wenn du Credits kaufst, das monatliche automatische Aufladen aktivierst oder eine Rückerstattung erhältst. Wenn du nie einen Kauf tätigst, werden keine deiner Daten mit ihnen geteilt.
  zh: 这些服务商仅在你购买额度、订阅每月自动充值或收到退款时使用。如果你从未进行过购买，则不会与它们共享任何数据。
  es: Estos proveedores solo se utilizan cuando compras créditos, te suscribes a la recarga automática mensual o recibes un reembolso. Si nunca realizas una compra, no se comparte ninguno de tus datos con ellos.
  ru: Эти провайдеры используются только тогда, когда ты покупаешь кредиты, подписываешься на ежемесячное автопополнение или получаешь возврат средств. Если ты никогда не совершаешь покупок, твои данные им не передаются.
  ja: これらのプロバイダーは、クレジットの購入、月次自動チャージの購読、または返金を受ける場合にのみ使用されます。購入を行わない限り、データが共有されることはありません。
  ko: 이 제공업체들은 크레딧을 구매하거나, 월간 자동 충전을 구독하거나, 환불을 받을 때만 사용됩니다. 구매를 하지 않는다면 어떠한 데이터도 이들과 공유되지 않습니다.
  it: Questi fornitori vengono utilizzati solo quando acquisti crediti, ti iscrivi alla ricarica automatica mensile o ricevi un rimborso. Se non effettui mai un acquisto, nessuno dei tuoi dati viene condiviso con loro.
  tr: Bu sağlayıcılar yalnızca kredi satın aldığında, aylık otomatik yüklemeye abone olduğunda veya iade aldığında kullanılır. Hiç satın alma yapmazsan, verilerinin hiçbiri onlarla paylaşılmaz.
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn mua tín dụng, đăng ký tự động nạp tiền hàng tháng hoặc nhận hoàn tiền. Nếu bạn không bao giờ thực hiện giao dịch mua hàng, không có dữ liệu nào của bạn được chia sẻ với họ.
  id: Penyedia ini hanya digunakan saat kamu membeli kredit, berlangganan pengisian otomatis bulanan, atau menerima pengembalian dana. Jika kamu tidak pernah melakukan pembelian, tidak ada datamu yang dibagikan kepada mereka.
  pl: Ci dostawcy są używani tylko wtedy, gdy kupujesz kredyty, subskrybujesz miesięczne automatyczne doładowanie lub otrzymujesz zwrot pieniędzy. Jeśli nigdy nie dokonasz zakupu, żadne Twoje dane nie zostaną im udostępnione.
  nl: Deze providers worden alleen gebruikt wanneer je credits koopt, je aanmeldt voor maandelijks automatisch opwaarderen of een terugbetaling ontvangt. Als je nooit een aankoop doet, worden er geen gegevens met hen gedeeld.
  ar: يتم استخدام هؤلاء المزودين فقط عندما تشتري رصيداً، أو تشترك في الشحن التلقائي الشهري، أو تسترد أموالاً. إذا لم تقم بإجراء أي عملية شراء، فلن تتم مشاركة أي من بياناتك معهم.
  hi: इन प्रदाताओं का उपयोग केवल तब किया जाता है जब तुम क्रेडिट खरीदते हो, मासिक ऑटो टॉप-अप की सदस्यता लेते हो, या रिफंड प्राप्त करते हो। यदि तुम कभी कोई खरीदारी नहीं करते हो, तो तुम्हारा कोई भी डेटा उनके साथ साझा नहीं किया जाता है।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้เมื่อคุณซื้อเครดิต สมัครบริการเติมเงินอัตโนมัติรายเดือน หรือรับเงินคืนเท่านั้น หากคุณไม่เคยทำการซื้อ ข้อมูลของคุณจะไม่มีการแชร์กับผู้ให้บริการเหล่านี้
  cs: Tito poskytovatelé jsou využíváni pouze tehdy, když si zakoupíš kredity, předplatíš si měsíční automatické dobíjení nebo obdržíš refundaci. Pokud nikdy neprovedeš nákup, žádná tvá data s nimi nejsou sdílena.
  sv: Dessa leverantörer används endast när du köper krediter, prenumererar på månatlig automatisk påfyllning eller får en återbetalning. Om du aldrig gör ett köp delas inga av dina data med dem.
  he: ספקים אלו משמשים רק כשאתה רוכש קרדיטים, נרשם לטעינה חודשית אוטומטית או מקבל החזר. אם לא תבצע רכישה לעולם, אף אחד מהנתונים שלך לא ישותף איתם.
  pt: Estes provedores só são utilizados quando você compra créditos, assina a recarga automática mensal ou recebe um reembolso. Se você nunca fizer uma compra, nenhum de seus dados será compartilhado com eles.
  fr: "Ces fournisseurs ne sont utilisés que lorsque tu achètes des crédits, que tu t'abonnes à la recharge automatique mensuelle ou que tu reçois un remboursement. Si tu n'effectues jamais d'achat, aucune de tes données n'est partagée avec eux."
  verified_by_human: []
