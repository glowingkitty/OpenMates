providers.ai_models.cerebras.description:
  context: Cerebras description
  en: >-
    Cerebras hosts some of the high-speed models routed through OpenRouter.
    Only used when you select a Cerebras-hosted model.
  de: Cerebras hostet einige der Hochgeschwindigkeitsmodelle, die über OpenRouter geroutet werden. Wird nur verwendet, wenn du ein von Cerebras gehostetes Modell auswählst.
  zh: Cerebras 托管了一些通过 OpenRouter 路由的高速模型。仅在您选择由 Cerebras 托管的模型时使用。
  es: Cerebras aloja algunos de los modelos de alta velocidad enrutados a través de OpenRouter. Solo se utiliza cuando seleccionas un modelo alojado en Cerebras.
  pt: A Cerebras aloja alguns dos modelos de alta velocidade encaminhados através do OpenRouter. Apenas utilizado quando selecionas um modelo alojado pela Cerebras.
  ja: Cerebrasは、OpenRouter経由でルーティングされる高速モデルの一部をホストしている。Cerebrasがホストするモデルを選択した場合にのみ使用される。
  ko: Cerebras는 OpenRouter를 통해 라우팅되는 일부 고속 모델을 호스팅합니다. Cerebras 호스팅 모델을 선택한 경우에만 사용됩니다.
  it: Cerebras ospita alcuni dei modelli ad alta velocità instradati tramite OpenRouter. Utilizzato solo quando selezioni un modello ospitato da Cerebras.
  tr: Cerebras, OpenRouter üzerinden yönlendirilen bazı yüksek hızlı modellere ev sahipliği yapar. Yalnızca Cerebras tarafından barındırılan bir model seçtiğinde kullanılır.
  vi: Cerebras lưu trữ một số mô hình tốc độ cao được định tuyến qua OpenRouter. Chỉ được sử dụng khi bạn chọn một mô hình do Cerebras lưu trữ.
  id: Cerebras menghosting beberapa model berkecepatan tinggi yang dirutekan melalui OpenRouter. Hanya digunakan saat kamu memilih model yang dihosting Cerebras.
  pl: Cerebras hostuje niektóre z szybkich modeli routowanych przez OpenRouter. Używane tylko po wybraniu modelu hostowanego przez Cerebras.
  nl: Cerebras host enkele van de hogesnelheidsmodellen die via OpenRouter worden gerouteerd. Wordt alleen gebruikt wanneer je een door Cerebras gehost model selecteert.
  hi: Cerebras उन कुछ हाई-स्पीड मॉडल को होस्ट करता है जिन्हें OpenRouter के माध्यम से रूट किया जाता है। इसका उपयोग केवल तब किया जाता है जब आप Cerebras-होस्टेड मॉडल चुनते हैं।
  th: Cerebras โฮสต์โมเดลความเร็วสูงบางรุ่นที่กำหนดเส้นทางผ่าน OpenRouter จะถูกใช้เมื่อคุณเลือกโมเดลที่โฮสต์โดย Cerebras เท่านั้น
  sv: Cerebras är värd för några av de höghastighetsmodeller som styrs via OpenRouter. Används endast när du väljer en modell som hostas av Cerebras.
  fr: Cerebras héberge certains des modèles haute vitesse acheminés via OpenRouter. Utilisé uniquement lorsque tu sélectionnes un modèle hébergé par Cerebras.
  ar: تستضيف Cerebras بعض النماذج عالية السرعة التي يتم توجيهها عبر OpenRouter. تُستخدم فقط عندما تختار نموذجاً تستضيفه Cerebras.
  cs: Cerebras hostuje některé z vysokorychlostních modelů směrovaných přes OpenRouter. Používá se pouze tehdy, když si vybereš model hostovaný společností Cerebras.
  ru: Cerebras размещает некоторые высокоскоростные модели, маршрутизируемые через OpenRouter. Используется только при выборе модели, размещенной на Cerebras.
  he: Cerebras מארחת חלק מהמודלים המהירים המנותבים דרך OpenRouter. בשימוש רק כשבוחרים מודל המארח על ידי Cerebras.
