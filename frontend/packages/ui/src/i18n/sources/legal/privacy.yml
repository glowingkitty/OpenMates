protection.encrypted_at_rest.description:
  context: Description of encrypted-at-rest posture
  en: >-
    Our PostgreSQL database, Redis caches, S3 object storage, and backup
    snapshots hold only ciphertext for any field containing user content. When
    our servers need to read your content to run an AI response, render an
    invoice, or deliver a reminder, decryption happens transiently in process
    memory and is discarded immediately after. Key material is released on
    demand by HashiCorp Vault and never stored in raw form outside it.
  de: >-
    Unsere PostgreSQL-Datenbank, Redis-Caches, S3-Objektspeicher und
    Backup-Snapshots enthalten für jedes Feld mit Benutzerinhalten nur
    Chiffretext. Wenn unsere Server deine Inhalte lesen müssen, um eine
    KI-Antwort zu generieren, eine Rechnung zu rendern oder eine Erinnerung
    zuzustellen, erfolgt die Entschlüsselung flüchtig im Prozessspeicher und
    wird unmittelbar danach verworfen. Schlüsselmaterial wird bei Bedarf von
    HashiCorp Vault freigegeben und außerhalb davon niemals im Rohformat
    gespeichert.
  zh: >-
    我们的 PostgreSQL 数据库、Redis 缓存、S3 对象存储和备份快照对包含用户内容的任何字段只保存密文。当我们的服务器需要读取你的内容以运行
    AI 响应、呈现发票或发送提醒时，解密会在进程内存中瞬时发生并在之后立即丢弃。密钥材料由 HashiCorp Vault 按需释放，并且永远不会以原始形式存储在其外部。
  es: >-
    Nuestra base de datos PostgreSQL, las cachés de Redis, el almacenamiento
    de objetos S3 y los snapshots de respaldo contienen solo texto cifrado
    para cualquier campo que contenga contenido del usuario. Cuando nuestros
    servidores necesitan leer tu contenido para ejecutar una respuesta de IA,
    generar una factura o enviar un recordatorio, el descifrado ocurre de
    forma transitoria en la memoria del proceso y se descarta inmediatamente
    después. El material de clave es liberado bajo demanda por HashiCorp
    Vault y nunca se almacena en forma cruda fuera de él.
  fr: >-
    Notre base de données PostgreSQL, les caches Redis, le stockage d'objets
    S3 et les instantanés de sauvegarde ne contiennent que du texte chiffré
    pour tout champ contenant du contenu utilisateur. Lorsque nos serveurs
    doivent lire ton contenu pour générer une réponse d'IA, rendre une
    facture ou envoyer un rappel, le déchiffrement se produit de manière
    transitoire dans la mémoire de processus et est immédiatement rejeté. Le
    matériel de clé est libéré à la demande par HashiCorp Vault et n'est
    jamais stocké sous forme brute en dehors de celui-ci.
  pt: >-
    Nosso banco de dados PostgreSQL, caches Redis, armazenamento de objetos
    S3 e snapshots de backup contêm apenas texto cifrado para qualquer campo
    que contenha conteúdo do usuário. Quando nossos servidores precisam ler
    seu conteúdo para executar uma resposta de IA, gerar uma fatura ou
    entregar um lembrete, a descriptografia ocorre de forma transitória na
    memória do processo e é descartada imediatamente depois. O material da
    chave é liberado sob demanda pelo HashiCorp Vault e nunca é armazenado
    em formato bruto fora dele.
  ru: >-
    Наша база данных PostgreSQL, кэши Redis, объектное хранилище S3 и
    резервные снимки содержат только шифротекст для любого поля, содержащего
    пользовательский контент. Когда нашим серверам необходимо прочитать ваш
    контент для запуска ответа ИИ, рендеринга счёта или доставки
    напоминания, расшифровка происходит кратковременно в памяти процесса и
    сразу после этого отбрасывается. Ключевой материал выдаётся по запросу
    HashiCorp Vault и никогда не хранится в необработанном виде за его
    пределами.
  ja: >-
    当社の PostgreSQL データベース、Redis キャッシュ、S3 オブジェクトストレージ、バックアップスナップショットは、ユーザーコンテンツを含むフィールドについては暗号文のみを保持します。当社のサーバーが
    AI 応答の実行、請求書のレンダリング、リマインダーの配信のためにあなたのコンテンツを読む必要がある場合、復号はプロセスメモリ内で一時的に行われ、その後すぐに破棄されます。鍵素材は
    HashiCorp Vault によってオンデマンドで解放され、Vault の外部で生の形式で保存されることはありません。
  ko: >-
    저희 PostgreSQL 데이터베이스, Redis 캐시, S3 객체 저장소, 백업 스냅샷은 사용자 콘텐츠가 포함된 모든 필드에
    대해 암호문만 보관합니다. 저희 서버가 AI 응답 실행, 청구서 렌더링 또는 알림 전달을 위해 귀하의 콘텐츠를 읽어야 할 때,
    복호화는 프로세스 메모리에서 일시적으로 발생하며 즉시 폐기됩니다. 키 자료는 HashiCorp Vault에 의해 요청 시 공개되며,
    Vault 외부에서는 원시 형태로 저장되지 않습니다.
  it: >-
    Il nostro database PostgreSQL, le cache Redis, l'archiviazione oggetti S3
    e gli snapshot di backup contengono solo testo cifrato per qualsiasi
    campo contenente contenuti utente. Quando i nostri server devono leggere
    i tuoi contenuti per eseguire una risposta IA, generare una fattura o
    consegnare un promemoria, la decifratura avviene transitoriamente nella
    memoria del processo e viene scartata immediatamente dopo. Il materiale
    chiave viene rilasciato su richiesta da HashiCorp Vault e non viene mai
    memorizzato in forma grezza al di fuori di esso.
  tr: >-
    PostgreSQL veritabanımız, Redis önbelleklerimiz, S3 nesne depolamamız ve
    yedekleme anlık görüntülerimiz, kullanıcı içeriği içeren tüm alanlar için
    yalnızca şifreli metin tutar. Sunucularımızın bir AI yanıtı çalıştırmak,
    bir fatura oluşturmak veya bir hatırlatıcı göndermek için içeriğinizi
    okuması gerektiğinde, şifre çözme işlem belleğinde geçici olarak
    gerçekleşir ve hemen ardından atılır. Anahtar malzemesi, HashiCorp Vault
    tarafından talep üzerine serbest bırakılır ve bunun dışında asla ham
    biçimde saklanmaz.
  vi: >-
    Cơ sở dữ liệu PostgreSQL, bộ nhớ đệm Redis, lưu trữ đối tượng S3 và các
    snapshot sao lưu của chúng tôi chỉ chứa văn bản mã hóa cho bất kỳ trường
    nào chứa nội dung người dùng. Khi máy chủ của chúng tôi cần đọc nội dung
    của bạn để chạy phản hồi AI, kết xuất hóa đơn hoặc gửi lời nhắc, việc giải
    mã diễn ra thoáng qua trong bộ nhớ tiến trình và bị loại bỏ ngay sau đó.
    Vật liệu khóa được HashiCorp Vault phát hành theo yêu cầu và không bao
    giờ được lưu trữ ở dạng thô bên ngoài nó.
  id: >-
    Basis data PostgreSQL, cache Redis, penyimpanan objek S3, dan snapshot
    cadangan kami hanya menyimpan teks terenkripsi untuk bidang apa pun yang
    berisi konten pengguna. Ketika server kami perlu membaca konten Anda
    untuk menjalankan respons AI, merender faktur, atau mengirim pengingat,
    dekripsi terjadi secara sementara dalam memori proses dan dibuang
    segera setelahnya. Materi kunci dilepaskan sesuai permintaan oleh
    HashiCorp Vault dan tidak pernah disimpan dalam bentuk mentah di
    luarnya.
  pl: >-
    Nasza baza danych PostgreSQL, pamięci podręczne Redis, pamięć obiektowa
    S3 i migawki kopii zapasowych zawierają tylko szyfrogram dla każdego pola
    zawierającego treści użytkownika. Gdy nasze serwery muszą odczytać twoją
    treść, aby uruchomić odpowiedź AI, wygenerować fakturę lub dostarczyć
    przypomnienie, odszyfrowanie odbywa się przejściowo w pamięci procesu i
    jest odrzucane natychmiast po tym. Materiał klucza jest udostępniany na
    żądanie przez HashiCorp Vault i nigdy nie jest przechowywany w surowej
    postaci poza nim.
  nl: >-
    Onze PostgreSQL-database, Redis-caches, S3-objectopslag en back-up
    snapshots bevatten alleen versleutelde tekst voor elk veld dat
    gebruikerscontent bevat. Wanneer onze servers je content moeten lezen om
    een AI-reactie uit te voeren, een factuur weer te geven of een herinnering
    te bezorgen, vindt ontsleuteling voorbijgaand plaats in het procesgeheugen
    en wordt direct daarna weggegooid. Sleutelmateriaal wordt op aanvraag
    vrijgegeven door HashiCorp Vault en wordt daarbuiten nooit in ruwe vorm
    opgeslagen.
  ar: >-
    تحتفظ قاعدة بيانات PostgreSQL الخاصة بنا وذاكرات التخزين المؤقت Redis
    وتخزين كائنات S3 ولقطات النسخ الاحتياطي بالنص المشفر فقط لأي حقل يحتوي
    على محتوى مستخدم. عندما تحتاج خوادمنا إلى قراءة محتواك لتشغيل استجابة
    ذكاء اصطناعي أو عرض فاتورة أو تسليم تذكير، يحدث فك التشفير بشكل عابر في
    ذاكرة العملية ويتم تجاهله مباشرة بعد ذلك. يتم إصدار مواد المفتاح عند
    الطلب بواسطة HashiCorp Vault ولا يتم تخزينها أبدًا في شكلها الخام خارجها.
  hi: >-
    हमारा PostgreSQL डेटाबेस, Redis कैश, S3 ऑब्जेक्ट स्टोरेज और बैकअप स्नैपशॉट
    उपयोगकर्ता सामग्री वाले किसी भी फ़ील्ड के लिए केवल सिफरटेक्स्ट रखते हैं।
    जब हमारे सर्वरों को AI प्रतिक्रिया चलाने, चालान प्रस्तुत करने या रिमाइंडर
    वितरित करने के लिए आपकी सामग्री पढ़ने की आवश्यकता होती है, तो डिक्रिप्शन
    प्रक्रिया मेमोरी में क्षणिक रूप से होता है और तुरंत बाद में त्याग दिया
    जाता है। कुंजी सामग्री को HashiCorp Vault द्वारा मांग पर जारी किया जाता
    है और इसके बाहर कभी भी कच्चे रूप में संग्रहीत नहीं किया जाता है।
  th: >-
    ฐานข้อมูล PostgreSQL ของเรา, แคช Redis, ที่เก็บวัตถุ S3 และสแน็ปช็อตสำรองของเราเก็บเฉพาะข้อความเข้ารหัสสำหรับฟิลด์ใด
    ๆ ที่มีเนื้อหาของผู้ใช้ เมื่อเซิร์ฟเวอร์ของเราต้องการอ่านเนื้อหาของคุณเพื่อรันการตอบกลับของ
    AI, แสดงใบแจ้งหนี้, หรือส่งการแจ้งเตือน การถอดรหัสจะเกิดขึ้นชั่วคราวในหน่วยความจำของโปรเซสและถูกทิ้งทันทีหลังจากนั้น
    วัสดุกุญแจจะถูกปล่อยตามความต้องการโดย HashiCorp Vault และไม่เคยถูกเก็บในรูปดิบนอกจากนั้น
  cs: >-
    Naše databáze PostgreSQL, Redis cache, objektové úložiště S3 a zálohové
    snapshoty obsahují pouze šifrovaný text pro jakékoliv pole obsahující
    uživatelský obsah. Když naše servery potřebují číst váš obsah, aby
    spustily AI odpověď, vykreslily fakturu nebo doručily připomenutí,
    dešifrování probíhá přechodně v paměti procesu a je okamžitě zahozeno.
    Klíčový materiál je na vyžádání uvolněn z HashiCorp Vaultu a nikdy není
    ukládán v surové podobě mimo něj.
  sv: >-
    Vår PostgreSQL-databas, Redis-cachar, S3-objektlagring och
    säkerhetskopieringssnapshots innehåller endast chiffertext för alla fält
    som innehåller användarinnehåll. När våra servrar behöver läsa ditt
    innehåll för att köra ett AI-svar, rendera en faktura eller leverera en
    påminnelse, sker dekrypteringen kortvarigt i processminnet och kastas
    omedelbart efteråt. Nyckelmaterial frigörs på begäran av HashiCorp Vault
    och lagras aldrig i rå form utanför det.
  he: >-
    מסד הנתונים PostgreSQL שלנו, מטמון Redis, אחסון האובייקטים S3 ותצלומי
    הגיבוי מחזיקים רק טקסט מוצפן עבור כל שדה המכיל תוכן משתמש. כאשר השרתים
    שלנו צריכים לקרוא את התוכן שלך כדי להריץ תגובת AI, להציג חשבונית או
    לספק תזכורת, הפענוח מתרחש באופן זמני בזיכרון התהליך ונזרק מיד לאחר מכן.
    חומר המפתח משוחרר לפי דרישה על ידי HashiCorp Vault ואינו נשמר לעולם
    בצורה גולמית מחוצה לו.
  verified_by_human: []
