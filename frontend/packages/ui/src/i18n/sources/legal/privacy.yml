providers.intro:
  context: Intro paragraph explaining the conditional grouping
  en: >-
    Most of the providers below are only reached when you use a specific
    feature — for example, image generation providers are only used when you
    invoke an image skill. The groups below tell you exactly which providers
    are involved for each feature, so you can opt in or out of data sharing by
    choosing which features to use.
  de: Die meisten der unten aufgeführten Anbieter werden nur kontaktiert, wenn du eine bestimmte Funktion nutzt – zum Beispiel werden Anbieter für Bildgenerierung nur genutzt, wenn du einen Bild-Skill aufrufst. Die folgenden Gruppen zeigen dir genau, welche Anbieter für welche Funktion involviert sind, damit du durch die Wahl der Funktionen selbst entscheiden kannst, ob Daten geteilt werden sollen.
  zh: 下方的大多数服务商仅在你使用特定功能时才会被访问——例如，图像生成服务商仅在你调用图像技能时使用。下方的分组详细说明了每项功能涉及的服务商，因此你可以通过选择使用的功能来决定是否共享数据。
  es: La mayoría de los proveedores a continuación solo se contactan cuando utilizas una función específica; por ejemplo, los proveedores de generación de imágenes solo se utilizan cuando invocas una habilidad de imagen. Los grupos a continuación te indican exactamente qué proveedores intervienen en cada función, para que puedas optar por compartir datos o no eligiendo qué funciones usar.
  ru: Большинство провайдеров ниже задействуются только при использовании определенной функции — например, провайдеры генерации изображений используются только при вызове навыка работы с изображениями. Группы ниже показывают, какие именно провайдеры участвуют в каждой функции, чтобы ты мог разрешить или запретить передачу данных, выбирая используемые функции.
  ja: 以下のプロバイダーのほとんどは、特定の機能を使用した場合にのみアクセスされます。例えば、画像生成プロバイダーは、画像スキルを呼び出した場合にのみ使用されます。以下のグループは、各機能にどのプロバイダーが関与しているかを正確に示しています。使用する機能を選択することで、データ共有のオプトインまたはオプトアウトを行うことができます。
  ko: 아래 제공업체 대부분은 특정 기능을 사용할 때만 연결됩니다. 예를 들어, 이미지 생성 제공업체는 이미지 스킬을 호출할 때만 사용됩니다. 아래 그룹은 각 기능에 어떤 제공업체가 관여하는지 정확히 알려주므로, 사용할 기능을 선택하여 데이터 공유 여부를 결정할 수 있습니다.
  it: "La maggior parte dei fornitori indicati di seguito viene contattata solo quando utilizzi una funzione specifica — ad esempio, i fornitori di generazione di immagini vengono utilizzati solo quando invochi una competenza d'immagine. I gruppi sottostanti ti dicono esattamente quali fornitori sono coinvolti per ogni funzione, così puoi scegliere se condividere o meno i dati selezionando quali funzioni utilizzare."
  tr: Aşağıdaki sağlayıcıların çoğuna yalnızca belirli bir özelliği kullandığında erişilir — örneğin, görsel oluşturma sağlayıcıları yalnızca bir görsel yeteneğini çağırdığında kullanılır. Aşağıdaki gruplar, her bir özellik için tam olarak hangi sağlayıcıların dahil olduğunu söyler; böylece hangi özellikleri kullanacağını seçerek veri paylaşımına dahil olabilir veya bundan kaçınabilirsin.
  vi: "Hầu hết các nhà cung cấp dưới đây chỉ được tiếp cận khi bạn sử dụng một tính năng cụ thể — ví dụ: các nhà cung cấp tạo hình ảnh chỉ được sử dụng khi bạn gọi một kỹ năng hình ảnh. Các nhóm bên dưới cho bạn biết chính xác nhà cung cấp nào tham gia vào từng tính năng, vì vậy bạn có thể chọn tham gia hoặc không chia sẻ dữ liệu bằng cách chọn tính năng sẽ sử dụng."
  id: Sebagian besar penyedia di bawah ini hanya diakses saat kamu menggunakan fitur tertentu — misalnya, penyedia pembuatan gambar hanya digunakan saat kamu memanggil keahlian gambar. Grup di bawah ini memberi tahumu secara tepat penyedia mana yang terlibat untuk setiap fitur, sehingga kamu dapat memilih untuk ikut serta atau tidak dalam berbagi data dengan memilih fitur mana yang akan digunakan.
  pl: Większość poniższych dostawców jest angażowana tylko wtedy, gdy korzystasz z konkretnej funkcji — na przykład dostawcy generowania obrazów są używani tylko wtedy, gdy wywołasz umiejętność obrazu. Poniższe grupy informują dokładnie, którzy dostawcy biorą udział w danej funkcji, dzięki czemu możesz zdecydować o udostępnianiu danych, wybierając funkcje, z których chcesz korzystać.
  nl: De meeste van de onderstaande providers worden alleen aangesproken wanneer je een specifieke functie gebruikt — providers voor het genereren van afbeeldingen worden bijvoorbeeld alleen gebruikt wanneer je een afbeeldingsvaardigheid aanroept. De onderstaande groepen vertellen je precies welke providers bij elke functie betrokken zijn, zodat je kunt kiezen voor het wel of niet delen van gegevens door te bepalen welke functies je gebruikt.
  ar: يتم الوصول إلى معظم المزودين أدناه فقط عند استخدام ميزة معينة — على سبيل المثال، يتم استخدام مزودي توليد الصور فقط عند استدعاء مهارة الصور. توضح لك المجموعات أدناه بالضبط المزودين المشاركين في كل ميزة، بحيث يمكنك اختيار المشاركة في مشاركة البيانات أو عدمها من خلال اختيار الميزات التي تستخدمها.
  hi: नीचे दिए गए अधिकांश प्रदाताओं तक केवल तभी पहुँचा जाता है जब तुम किसी विशिष्ट सुविधा का उपयोग करते हो — उदाहरण के लिए, इमेज जनरेशन प्रदाताओं का उपयोग केवल तब किया जाता है जब तुम इमेज स्किल का उपयोग करते हो। नीचे दिए गए समूह तुम्हें बताते हैं कि प्रत्येक सुविधा के लिए कौन से प्रदाता शामिल हैं, ताकि तुम यह चुन सको कि किन सुविधाओं का उपयोग करना है और इस तरह डेटा साझाकरण में शामिल होने या न होने का निर्णय ले सको।
  th: ผู้ให้บริการส่วนใหญ่ด้านล่างจะถูกเรียกใช้เมื่อคุณใช้ฟีเจอร์เฉพาะเท่านั้น — เช่น ผู้ให้บริการสร้างรูปภาพจะถูกใช้เมื่อคุณเรียกใช้ทักษะด้านรูปภาพ กลุ่มด้านล่างนี้จะบอกคุณอย่างชัดเจนว่ามีผู้ให้บริการรายใดบ้างที่เกี่ยวข้องกับแต่ละฟีเจอร์ เพื่อให้คุณสามารถเลือกยินยอมหรือไม่ยินยอมในการแชร์ข้อมูลได้โดยการเลือกฟีเจอร์ที่จะใช้งาน
  cs: Většina níže uvedených poskytovatelů je kontaktována pouze tehdy, když použiješ konkrétní funkci – například poskytovatelé generování obrázků jsou využiti pouze tehdy, když vyvoláš dovednost pro obrázky. Níže uvedené skupiny ti přesně řeknou, kteří poskytovatelé jsou zapojeni do jednotlivých funkcí, takže se můžeš rozhodnout pro sdílení dat nebo proti němu výběrem funkcí, které budeš používat.
  sv: De flesta av leverantörerna nedan nås endast när du använder en specifik funktion — till exempel används leverantörer av bildgenerering endast när du anropar en bildfärdighet. Grupperna nedan visar exakt vilka leverantörer som är involverade för varje funktion, så att du kan välja att dela eller inte dela data genom att välja vilka funktioner du vill använda.
  he: רוב הספקים המפורטים להלן מופעלים רק כשאתה משתמש בתכונה ספציפית — לדוגמה, ספקי יצירת תמונות משמשים רק כשאתה מפעיל מיומנות תמונה. הקבוצות להלן מפרטות בדיוק אילו ספקים מעורבים בכל תכונה, כדי שתוכל לבחור אם לשתף נתונים או לא על ידי בחירת התכונות שבהן תשתמש.
  pt: A maioria dos provedores abaixo só é acessada quando você utiliza uma funcionalidade específica — por exemplo, provedores de geração de imagens só são utilizados quando você invoca uma habilidade de imagem. Os grupos abaixo informam exatamente quais provedores estão envolvidos em cada funcionalidade, para que você possa optar por compartilhar ou não dados ao escolher quais funcionalidades usar.
  fr: "La plupart des fournisseurs ci-dessous ne sont sollicités que lorsque tu utilises une fonctionnalité spécifique — par exemple, les fournisseurs de génération d'images ne sont utilisés que lorsque tu appelles une compétence d'image. Les groupes ci-dessous t'indiquent exactement quels fournisseurs sont impliqués pour chaque fonctionnalité, afin que tu puisses accepter ou refuser le partage de données en choisissant les fonctionnalités à utiliser."
  verified_by_human: []
