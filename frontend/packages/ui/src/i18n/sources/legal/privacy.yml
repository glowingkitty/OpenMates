providers.always_active.hetzner.description:
  context: Hetzner description
  en: >-
    We host all of our backend services — API servers, Directus CMS, Postgres
    database, Redis caches, S3-compatible object storage, and our self-hosted
    OpenObserve observability platform — on Hetzner infrastructure in the EU.
    OpenObserve runs on our own Hetzner servers and is not a third-party
    service; traces never leave the EU.
  de: Wir hosten alle unsere Backend-Dienste – API-Server, Directus CMS, Postgres-Datenbank, Redis-Caches, S3-kompatiblen Objektspeicher und unsere selbst gehostete OpenObserve-Plattform – auf Hetzner-Infrastruktur in der EU. OpenObserve läuft auf unseren eigenen Hetzner-Servern und ist kein Drittanbieter-Dienst; Traces verlassen niemals die EU.
  zh: 我们在欧盟境内的 Hetzner 基础设施上托管所有后端服务——包括 API 服务器、Directus CMS、Postgres 数据库、Redis 缓存、兼容 S3 的对象存储以及我们自托管的 OpenObserve 可观测性平台。OpenObserve 在我们自己的 Hetzner 服务器上运行，并非第三方服务；追踪数据从未离开欧盟。
  es: Alojamos todos nuestros servicios de backend (servidores API, CMS Directus, base de datos Postgres, cachés Redis, almacenamiento de objetos compatible con S3 y nuestra plataforma de observabilidad OpenObserve autoalojada) en la infraestructura de Hetzner en la UE. OpenObserve se ejecuta en nuestros propios servidores de Hetzner y no es un servicio de terceros; los rastreos nunca salen de la UE.
  ru: Мы размещаем все наши бэкенд-сервисы — API-серверы, Directus CMS, базу данных Postgres, кэши Redis, S3-совместимое объектное хранилище и нашу собственную платформу наблюдаемости OpenObserve — на инфраструктуре Hetzner в ЕС. OpenObserve работает на наших собственных серверах Hetzner и не является сторонним сервисом; трассировки никогда не покидают ЕС.
  ja: APIサーバー、Directus CMS、Postgresデータベース、Redisキャッシュ、S3互換オブジェクトストレージ、およびセルフホストされたOpenObserveオブザーバビリティプラットフォームを含むすべてのバックエンドサービスを、EU内のHetznerインフラストラクチャでホストしています。OpenObserveは自社のHetznerサーバー上で動作しており、サードパーティのサービスではありません。トレースがEU外に出ることはありません。
  ko: API 서버, Directus CMS, Postgres 데이터베이스, Redis 캐시, S3 호환 오브젝트 스토리지, 자체 호스팅 OpenObserve 관측성 플랫폼 등 모든 백엔드 서비스를 EU 내 Hetzner 인프라에서 호스팅합니다. OpenObserve는 자체 Hetzner 서버에서 실행되며 타사 서비스가 아닙니다. 추적 데이터는 EU를 벗어나지 않습니다.
  it: "Ospitiamo tutti i nostri servizi backend — server API, Directus CMS, database Postgres, cache Redis, archiviazione oggetti compatibile con S3 e la nostra piattaforma di osservabilità self-hosted OpenObserve — su infrastruttura Hetzner nell'UE. OpenObserve gira sui nostri server Hetzner e non è un servizio di terze parti; le tracce non lasciano mai l'UE."
  tr: "Tüm arka uç servislerimizi — API sunucuları, Directus CMS, Postgres veritabanı, Redis önbellekleri, S3 uyumlu nesne depolama ve kendi barındırdığımız OpenObserve gözlemlenebilirlik platformu — AB'deki Hetzner altyapısında barındırıyoruz. OpenObserve kendi Hetzner sunucularımızda çalışır ve üçüncü taraf bir hizmet değildir; izler asla AB dışına çıkmaz."
  vi: Chúng tôi lưu trữ tất cả các dịch vụ backend của mình — máy chủ API, Directus CMS, cơ sở dữ liệu Postgres, bộ nhớ đệm Redis, lưu trữ đối tượng tương thích S3 và nền tảng quan sát OpenObserve tự lưu trữ — trên cơ sở hạ tầng của Hetzner tại EU. OpenObserve chạy trên các máy chủ Hetzner của riêng chúng tôi và không phải là dịch vụ của bên thứ ba; các dấu vết truy vết không bao giờ rời khỏi EU.
  id: Kami menghosting semua layanan backend kami — server API, Directus CMS, basis data Postgres, cache Redis, penyimpanan objek yang kompatibel dengan S3, dan platform observabilitas OpenObserve yang kami hosting sendiri — di infrastruktur Hetzner di UE. OpenObserve berjalan di server Hetzner kami sendiri dan bukan layanan pihak ketiga; jejak tidak pernah meninggalkan UE.
  pl: Hostujemy wszystkie nasze usługi backendowe — serwery API, Directus CMS, bazę danych Postgres, pamięci podręczne Redis, pamięć obiektową zgodną z S3 oraz naszą własną platformę obserwowalności OpenObserve — na infrastrukturze Hetzner w UE. OpenObserve działa na naszych własnych serwerach Hetzner i nie jest usługą zewnętrzną; ślady nigdy nie opuszczają UE.
  nl: We hosten al onze backend-diensten — API-servers, Directus CMS, Postgres-database, Redis-caches, S3-compatibele objectopslag en ons zelfgehoste OpenObserve observability-platform — op de infrastructuur van Hetzner in de EU. OpenObserve draait op onze eigen Hetzner-servers en is geen dienst van derden; traces verlaten de EU nooit.
  ar: نستضيف جميع خدماتنا الخلفية — خوادم API، ونظام Directus CMS، وقاعدة بيانات Postgres، وذاكرة التخزين المؤقت Redis، وتخزين الكائنات المتوافق مع S3، ومنصة المراقبة OpenObserve المستضافة ذاتياً — على بنية Hetzner التحتية في الاتحاد الأوروبي. يعمل OpenObserve على خوادم Hetzner الخاصة بنا وليس خدمة تابعة لجهة خارجية؛ التتبعات لا تغادر الاتحاد الأوروبي أبداً.
  hi: हम अपनी सभी बैकएंड सेवाएं — API सर्वर, Directus CMS, Postgres डेटाबेस, Redis कैश, S3-संगत ऑब्जेक्ट स्टोरेज और हमारा स्व-होस्टेड OpenObserve ऑब्जर्वेबिलिटी प्लेटफ़ॉर्म — यूरोपीय संघ (EU) में Hetzner इंफ्रास्ट्रक्चर पर होस्ट करते हैं। OpenObserve हमारे अपने Hetzner सर्वर पर चलता है और यह कोई तीसरे पक्ष की सेवा नहीं है; ट्रेस कभी भी EU से बाहर नहीं जाते हैं।
  th: เราโฮสต์บริการหลังบ้านทั้งหมดของเรา — เซิร์ฟเวอร์ API, Directus CMS, ฐานข้อมูล Postgres, แคช Redis, พื้นที่จัดเก็บออบเจกต์ที่รองรับ S3 และแพลตฟอร์มการตรวจสอบ OpenObserve ที่เราโฮสต์เอง — บนโครงสร้างพื้นฐานของ Hetzner ในสหภาพยุโรป OpenObserve ทำงานบนเซิร์ฟเวอร์ Hetzner ของเราเองและไม่ใช่บริการของบุคคลที่สาม ข้อมูลการติดตามจะไม่ถูกส่งออกนอกสหภาพยุโรป
  cs: Všechny naše backendové služby – API servery, Directus CMS, databázi Postgres, mezipaměti Redis, objektové úložiště kompatibilní s S3 a naši vlastní hostovanou platformu pro pozorovatelnost OpenObserve – hostujeme na infrastruktuře Hetzner v EU. OpenObserve běží na našich vlastních serverech Hetzner a není službou třetí strany; trasování nikdy neopustí EU.
  sv: Vi är värdar för alla våra backend-tjänster — API-servrar, Directus CMS, Postgres-databas, Redis-cachar, S3-kompatibel objektlagring och vår egenhostade OpenObserve-plattform för observerbarhet — på Hetzners infrastruktur inom EU. OpenObserve körs på våra egna Hetzner-servrar och är inte en tredjepartstjänst; spårningsdata lämnar aldrig EU.
  he: אנחנו מארחים את כל שירותי השרת שלנו — שרתי API, Directus CMS, מסד נתונים Postgres, מטמוני Redis, אחסון אובייקטים תואם S3, ופלטפורמת הניטור OpenObserve באירוח עצמי — על תשתית Hetzner באיחוד האירופי. OpenObserve רצה על שרתי Hetzner משלנו ואינה שירות צד שלישי; נתוני הניטור לעולם לא עוזבים את האיחוד האירופי.
  pt: Hospedamos todos os nossos serviços de backend — servidores de API, Directus CMS, banco de dados Postgres, caches Redis, armazenamento de objetos compatível com S3 e nossa plataforma de observabilidade OpenObserve auto-hospedada — na infraestrutura da Hetzner na UE. O OpenObserve roda em nossos próprios servidores Hetzner e não é um serviço de terceiros; os rastros nunca saem da UE.
  fr: "Nous hébergeons tous nos services backend — serveurs API, CMS Directus, base de données Postgres, caches Redis, stockage d'objets compatible S3 et notre plateforme d'observabilité auto-hébergée OpenObserve — sur l'infrastructure Hetzner dans l'UE. OpenObserve fonctionne sur nos propres serveurs Hetzner et n'est pas un service tiers ; les traces ne quittent jamais l'UE."
  verified_by_human: []
