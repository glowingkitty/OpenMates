providers.health.description:
  context: Description of Group H with special-category data disclosure
  en: >-
    These upstream services are reached through the Webshare rotating proxy
    (see Group E) only when you invoke the health app's appointment search
    skill. The queries you send — for example "dermatologist in Berlin next
    Tuesday" — are transmitted without user identifiers, but the content of
    the query itself can imply a health concern. By invoking the skill you
    consent to this processing under GDPR Art. 9(2)(a) (explicit consent for
    special-category data).
  de: Diese vorgeschalteten Dienste werden über den rotierenden Webshare-Proxy (siehe Gruppe E) nur dann erreicht, wenn du den Skill zur Terminsuche der Gesundheits-App aufrufst. Die von dir gesendeten Anfragen – zum Beispiel „Hautarzt in Berlin am nächsten Dienstag“ – werden ohne Benutzerkennungen übertragen, aber der Inhalt der Anfrage selbst kann auf ein gesundheitliches Anliegen hindeuten. Durch das Aufrufen des Skills stimmst du dieser Verarbeitung gemäß DSGVO Art. 9 Abs. 2 lit. a (ausdrückliche Einwilligung für besondere Kategorien personenbezogener Daten) zu.
  zh: 仅当你调用健康应用的预约搜索技能时，才会通过 Webshare 轮换代理（见 E 组）访问这些上游服务。你发送的查询（例如“下周二柏林的皮肤科医生”）在传输时不包含用户标识符，但查询内容本身可能暗示健康状况。调用该技能即表示你根据 GDPR 第 9(2)(a) 条（对特殊类别数据的明确同意）同意此类处理。
  fr: "Ces services en amont sont contactés via le proxy rotatif Webshare (voir Groupe E) uniquement lorsque tu appelles la compétence de recherche de rendez-vous de l'application de santé. Les requêtes que tu envoies — par exemple « dermatologue à Berlin mardi prochain » — sont transmises sans identifiants d'utilisateur, mais le contenu de la requête lui-même peut impliquer un problème de santé. En appelant la compétence, tu consens à ce traitement en vertu de l'article 9(2)(a) du RGPD (consentement explicite pour les données de catégories particulières)."
  pt: "Estes serviços a montante são contactados através do proxy rotativo da Webshare (vê o Grupo E) apenas quando invocas a skill de pesquisa de consultas da app de saúde. As consultas que envias — por exemplo, \"dermatologista em Berlim na próxima terça-feira\" — são transmitidas sem identificadores de utilizador, mas o conteúdo da própria consulta pode implicar uma preocupação de saúde. Ao invocar a skill, consentes este processamento ao abrigo do Art. 9.º, n.º 2, alínea a), do RGPD (consentimento explícito para categorias especiais de dados)."
  ru: Доступ к этим вышестоящим сервисам осуществляется через ротируемый прокси Webshare (см. Группу E) только тогда, когда ты вызываешь навык поиска записей в приложении «Здоровье». Отправляемые тобой запросы — например, «дерматолог в Берлине в следующий вторник» — передаются без идентификаторов пользователя, но само содержание запроса может указывать на проблемы со здоровьем. Вызывая этот навык, ты даешь согласие на такую обработку в соответствии со ст. 9(2)(a) GDPR (явное согласие на обработку данных особых категорий).
  ja: これらのアップストリームサービスには、ヘルスケアアプリの予約検索スキルを呼び出した場合にのみ、Webshareローテーションプロキシ（グループEを参照）を介してアクセスします。送信されるクエリ（例：「来週の火曜日のベルリンの皮膚科」）はユーザー識別子なしで送信されますが、クエリの内容自体が健康上の懸念を示唆する場合があります。このスキルを呼び出すことにより、GDPR第9条(2)(a)（特別なカテゴリーのデータに対する明示的な同意）に基づくこの処理に同意したものとみなされます。
  it: "Questi servizi a monte vengono raggiunti tramite il proxy rotativo Webshare (vedi Gruppo E) solo quando invochi la skill di ricerca appuntamenti dell'app salute. Le query che invii — ad esempio \"dermatologo a Berlino martedì prossimo\" — vengono trasmesse senza identificativi utente, ma il contenuto della query stessa può implicare un problema di salute. Invocando la skill acconsenti a questo trattamento ai sensi dell'Art. 9(2)(a) del GDPR (consenso esplicito per categorie particolari di dati)."
  tr: "Bu üst hizmetlere, yalnızca sağlık uygulamasının randevu arama yeteneğini çağırdığında Webshare dönen proxy'si (bkz. Grup E) aracılığıyla ulaşılır. Gönderdiğin sorgular — örneğin \"gelecek Salı Berlin'de dermatolog\" — kullanıcı tanımlayıcıları olmadan iletilir, ancak sorgunun içeriği bir sağlık sorununa işaret edebilir. Yeteneği çağırarak, GDPR Madde 9(2)(a) (özel nitelikli veriler için açık rıza) uyarınca bu işlemeye rıza göstermiş olursun."
  vi: "Các dịch vụ thượng nguồn này được truy cập thông qua proxy xoay vòng Webshare (xem Nhóm E) chỉ khi bạn sử dụng kỹ năng tìm kiếm lịch hẹn của ứng dụng sức khỏe. Các truy vấn bạn gửi — ví dụ: \"bác sĩ da liễu ở Berlin vào thứ Ba tới\" — được truyền đi mà không có mã định danh người dùng, nhưng bản thân nội dung của truy vấn có thể ngụ ý một vấn đề sức khỏe. Bằng cách sử dụng kỹ năng này, bạn đồng ý với việc xử lý này theo Điều 9(2)(a) của GDPR (sự đồng ý rõ ràng đối với dữ liệu thuộc danh mục đặc biệt)."
  id: "Layanan hulu ini dijangkau melalui rotating proxy Webshare (lihat Grup E) hanya saat kamu memanggil keahlian pencarian janji temu aplikasi kesehatan. Kueri yang kamu kirimkan — misalnya \"dokter kulit di Berlin Selasa depan\" — dikirimkan tanpa pengidentifikasi pengguna, tetapi konten kueri itu sendiri dapat menyiratkan masalah kesehatan. Dengan memanggil keahlian ini, kamu menyetujui pemrosesan ini berdasarkan GDPR Pasal 9(2)(a) (persetujuan eksplisit untuk data kategori khusus)."
  pl: Dostęp do tych usług nadrzędnych odbywa się za pośrednictwem rotacyjnego proxy Webshare (patrz Grupa E) tylko wtedy, gdy wywołasz umiejętność wyszukiwania wizyt w aplikacji zdrowotnej. Wysyłane zapytania — na przykład „dermatolog w Berlinie w przyszły wtorek” — są przesyłane bez identyfikatorów użytkownika, ale treść samego zapytania może sugerować problem zdrowotny. Wywołując tę umiejętność, wyrażasz zgodę na takie przetwarzanie zgodnie z art. 9 ust. 2 lit. a RODO (wyraźna zgoda na dane szczególnych kategorii).
  nl: "Deze upstream-diensten worden bereikt via de roterende proxy van Webshare (zie Groep E), alleen wanneer je de vaardigheid voor het zoeken naar afspraken van de gezondheids-app aanroept. De zoekopdrachten die je verzendt — bijvoorbeeld \"dermatoloog in Berlijn aanstaande dinsdag\" — worden verzonden zonder gebruikersidentificatie, maar de inhoud van de zoekopdracht zelf kan een gezondheidsprobleem impliceren. Door de vaardigheid aan te roepen, stem je in met deze verwerking onder AVG Art. 9(2)(a) (expliciete toestemming voor bijzondere categorieën persoonsgegevens)."
  hi: "इन अपस्ट्रीम सेवाओं तक Webshare रोटेटिंग प्रॉक्सी (समूह E देखें) के माध्यम से केवल तब पहुँचा जाता है जब आप स्वास्थ्य ऐप की अपॉइंटमेंट खोज स्किल का उपयोग करते हैं। आपके द्वारा भेजे गए प्रश्न — उदाहरण के लिए \"अगले मंगलवार को बर्लिन में त्वचा विशेषज्ञ\" — बिना उपयोगकर्ता पहचानकर्ता के प्रसारित किए जाते हैं, लेकिन प्रश्न की सामग्री स्वयं स्वास्थ्य संबंधी चिंता का संकेत दे सकती है। स्किल का उपयोग करके आप GDPR अनुच्छेद 9(2)(a) (विशेष-श्रेणी डेटा के लिए स्पष्ट सहमति) के तहत इस प्रोसेसिंग के लिए सहमति देते हैं।"
  th: "บริการต้นน้ำเหล่านี้จะถูกเข้าถึงผ่านพร็อกซีแบบหมุนเวียนของ Webshare (ดูกลุ่ม E) เฉพาะเมื่อคุณเรียกใช้ทักษะการค้นหานัดหมายของแอปสุขภาพเท่านั้น คำค้นหาที่คุณส่ง — เช่น \"นักผิวหนังในเบอร์ลินวันอังคารหน้า\" — จะถูกส่งไปโดยไม่มีตัวระบุตัวตนผู้ใช้ แต่เนื้อหาของคำค้นหาเองอาจบ่งบอกถึงปัญหาสุขภาพได้ การเรียกใช้ทักษะนี้ถือว่าคุณยินยอมให้มีการประมวลผลภายใต้ GDPR Art. 9(2)(a) (ความยินยอมโดยชัดแจ้งสำหรับข้อมูลประเภทพิเศษ)"
  cs: K těmto navazujícím službám se přistupuje přes rotující proxy Webshare (viz skupina E) pouze tehdy, když vyvoláš dovednost vyhledávání termínů ve zdravotní aplikaci. Dotazy, které odešleš — například „dermatolog v Berlíně příští úterý“ — jsou přenášeny bez identifikátorů uživatele, ale samotný obsah dotazu může naznačovat zdravotní problém. Vyvoláním dovednosti souhlasíš s tímto zpracováním podle čl. 9 odst. 2 písm. a) GDPR (výslovný souhlas se zpracováním zvláštních kategorií údajů).
  sv: "Dessa bakomliggande tjänster nås via Webshares roterande proxy (se grupp E) endast när du anropar hälsoappens färdighet för tidsbokning. De frågor du skickar — till exempel \"hudläkare i Berlin nästa tisdag\" — överförs utan användaridentifierare, men innehållet i själva frågan kan antyda ett hälsotillstånd. Genom att anropa färdigheten samtycker du till denna behandling enligt GDPR art. 9.2 a (uttryckligt samtycke för känsliga personuppgifter)."
  he: "הגישה לשירותי צד שלישי אלו מתבצעת דרך הפרוקסי המסתובב של Webshare (ראו קבוצה E) רק כאשר מופעלת מיומנות חיפוש התורים של אפליקציית הבריאות. השאילתות שנשלחות — למשל \"רופא עור בברלין ביום שלישי הבא\" — מועברות ללא מזהי משתמש, אך תוכן השאילתה עצמה עשוי לרמוז על בעיה בריאותית. על ידי הפעלת המיומנות, ניתנת הסכמה לעיבוד זה תחת סעיף 9(2)(a) של ה-GDPR (הסכמה מפורשת לנתונים מקטגוריה מיוחדת)."
  es: "Se accede a estos servicios ascendentes a través del proxy rotativo de Webshare (ver Grupo E) solo cuando invocas la habilidad de búsqueda de citas de la aplicación de salud. Las consultas que envías —por ejemplo, \"dermatólogo en Berlín el próximo martes\"— se transmiten sin identificadores de usuario, pero el contenido de la consulta en sí puede implicar una preocupación de salud. Al invocar la habilidad, das tu consentimiento para este procesamiento bajo el Art. 9(2)(a) del RGPD (consentimiento explícito para datos de categorías especiales)."
  ko: "이 업스트림 서비스는 건강 앱의 예약 검색 스킬을 호출할 때만 Webshare 순환 프록시(그룹 E 참조)를 통해 연결됩니다. 사용자가 보내는 쿼리(예: \"베를린 피부과 다음 주 화요일\")는 사용자 식별자 없이 전송되지만, 쿼리 내용 자체가 건강상의 문제를 암시할 수 있습니다. 스킬을 호출함으로써 귀하는 GDPR 제9조 제2항 (a)호(특수 범주 데이터에 대한 명시적 동의)에 따라 이 처리에 동의하게 됩니다."
  ar: "يتم الوصول إلى هذه الخدمات الأساسية من خلال بروكسي Webshare الدوار (انظر المجموعة E) فقط عند استدعاء مهارة البحث عن المواعيد في التطبيق الصحي. يتم إرسال الاستعلامات التي ترسلها — على سبيل المثال \"طبيب جلدية في برلين الثلاثاء القادم\" — بدون معرفات مستخدم، ولكن محتوى الاستعلام نفسه يمكن أن يشير إلى مشكلة صحية. من خلال استدعاء المهارة، فإنك توافق على هذه المعالجة بموجب المادة 9(2)(أ) من اللائحة العامة لحماية البيانات (GDPR) (موافقة صريحة لبيانات الفئات الخاصة)."
  verified_by_human: []
