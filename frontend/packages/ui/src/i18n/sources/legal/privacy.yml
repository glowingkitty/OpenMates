providers.web_and_search.webshare.description:
  context: Webshare description
  en: >-
    Webshare provides a rotating proxy for requests to services that would
    otherwise block us. We route YouTube transcript requests (for the videos
    get-transcript skill) and doctor appointment searches (for the health
    search-appointments skill — see Group H) through Webshare. Webshare sees
    the URLs we route through it.
  de: "Webshare bietet einen rotierenden Proxy für Anfragen an Dienste, die uns andernfalls blockieren würden. Wir leiten YouTube-Transkript-Anfragen (für den Skill „Videos: Transkript abrufen“) und die Suche nach Arztterminen (für den Skill „Gesundheit: Termine suchen“ – siehe Gruppe H) über Webshare. Webshare sieht die URLs, die wir darüber leiten."
  zh: Webshare 为可能会阻止我们的服务请求提供轮换代理。我们通过 Webshare 路由 YouTube 字幕请求（用于视频获取字幕技能）和医生预约搜索（用于健康搜索预约技能 —— 见 H 组）。Webshare 会看到我们通过其路由的 URL。
  fr: Webshare fournit un proxy rotatif pour les requêtes vers des services qui nous bloqueraient autrement. Nous acheminons les demandes de transcription YouTube (pour la compétence videos get-transcript) et les recherches de rendez-vous médicaux (pour la compétence health search-appointments — voir Groupe H) via Webshare. Webshare voit les URL que nous acheminons par son intermédiaire.
  pt: A Webshare fornece um proxy rotativo para pedidos a serviços que, de outra forma, nos bloqueariam. Encaminhamos pedidos de transcrição do YouTube (para a skill get-transcript de vídeos) e pesquisas de consultas médicas (para a skill search-appointments de saúde — vê o Grupo H) através da Webshare. A Webshare vê os URLs que encaminhamos através dela.
  ru: Webshare предоставляет ротируемый прокси для запросов к сервисам, которые в противном случае заблокировали бы нас. Мы направляем запросы на получение транскрипции YouTube (для навыка get-transcript) и поиск записей к врачу (для навыка search-appointments — см. Группу H) через Webshare. Webshare видит URL-адреса, которые мы через него пропускаем.
  ja: Webshareは、ブロックされる可能性のあるサービスへのリクエストに対してローテーションプロキシを提供します。YouTubeの文字起こしリクエスト（動画の文字起こし取得スキル用）や医師の予約検索（ヘルスケアの予約検索スキル用 — グループHを参照）は、Webshareを経由してルーティングされます。Webshareは、経由するURLを閲覧します。
  it: Webshare fornisce un proxy rotativo per le richieste a servizi che altrimenti ci bloccherebbero. Instradiamo le richieste di trascrizione di YouTube (per la skill videos get-transcript) e le ricerche di appuntamenti medici (per la skill health search-appointments — vedi Gruppo H) tramite Webshare. Webshare vede gli URL che instradiamo attraverso di esso.
  tr: "Webshare, bizi engelleyebilecek hizmetlere yönelik istekler için dönen bir proxy sağlar. YouTube transkript isteklerini (videoların transkriptini al yeteneği için) ve doktor randevusu aramalarını (sağlık randevu arama yeteneği için — bkz. Grup H) Webshare üzerinden yönlendiririz. Webshare, üzerinden yönlendirdiğimiz URL'leri görür."
  vi: Webshare cung cấp proxy xoay vòng cho các yêu cầu đến các dịch vụ mà nếu không có nó sẽ chặn chúng tôi. Chúng tôi định tuyến các yêu cầu bản ghi YouTube (cho kỹ năng get-transcript của video) và tìm kiếm lịch hẹn bác sĩ (cho kỹ năng search-appointments của sức khỏe — xem Nhóm H) thông qua Webshare. Webshare nhìn thấy các URL mà chúng tôi định tuyến qua đó.
  id: Webshare menyediakan rotating proxy untuk permintaan ke layanan yang mungkin memblokir kami. Kami merutekan permintaan transkrip YouTube (untuk keahlian get-transcript video) dan pencarian janji temu dokter (untuk keahlian search-appointments kesehatan — lihat Grup H) melalui Webshare. Webshare melihat URL yang kami rutekan melaluinya.
  pl: Webshare zapewnia rotacyjne proxy dla żądań do usług, które w przeciwnym razie by nas blokowały. Przekierowujemy żądania transkrypcji YouTube (dla umiejętności pobierania transkrypcji wideo) oraz wyszukiwania wizyt lekarskich (dla umiejętności wyszukiwania wizyt zdrowotnych — patrz Grupa H) przez Webshare. Webshare widzi adresy URL, które przez nie przesyłamy.
  nl: "Webshare biedt een roterende proxy voor verzoeken aan diensten die ons anders zouden blokkeren. We leiden verzoeken voor YouTube-transcripten (voor de 'get-transcript'-vaardigheid voor video's) en zoekopdrachten voor doktersafspraken (voor de 'search-appointments'-vaardigheid voor gezondheid — zie Groep H) via Webshare. Webshare ziet de URL's die we erdoorheen leiden."
  hi: Webshare उन सेवाओं के अनुरोधों के लिए एक रोटेटिंग प्रॉक्सी प्रदान करता है जो अन्यथा हमें ब्लॉक कर सकती हैं। हम YouTube ट्रांसक्रिप्ट अनुरोधों (वीडियो get-transcript स्किल के लिए) और डॉक्टर अपॉइंटमेंट खोजों (हेल्थ search-appointments स्किल के लिए — समूह H देखें) को Webshare के माध्यम से रूट करते हैं। Webshare उन URL को देखता है जिन्हें हम इसके माध्यम से रूट करते हैं।
  th: Webshare ให้บริการพร็อกซีแบบหมุนเวียนสำหรับคำขอไปยังบริการที่อาจบล็อกเรา เราส่งคำขอถอดสคริปต์ YouTube (สำหรับทักษะ get-transcript ของวิดีโอ) และการค้นหาการนัดหมายแพทย์ (สำหรับทักษะ search-appointments ของสุขภาพ — ดูกลุ่ม H) ผ่าน Webshare โดย Webshare จะเห็น URL ที่เราส่งผ่านระบบ
  cs: Webshare poskytuje rotující proxy pro požadavky na služby, které by nás jinak blokovaly. Přes Webshare směrujeme požadavky na přepisy z YouTube (pro dovednost videos get-transcript) a vyhledávání termínů u lékaře (pro dovednost health search-appointments — viz skupina H). Webshare vidí URL adresy, které přes něj směrujeme.
  sv: Webshare tillhandahåller en roterande proxy för förfrågningar till tjänster som annars skulle blockera oss. Vi dirigerar förfrågningar om YouTube-transkriptioner (för färdigheten videos get-transcript) och sökningar efter läkartider (för färdigheten health search-appointments — se grupp H) via Webshare. Webshare ser de webbadresser vi dirigerar genom dem.
  he: Webshare מספקת פרוקסי מסתובב עבור בקשות לשירותים שעלולים לחסום אותנו. אנחנו מנתבים בקשות לתמלול מיוטיוב (עבור מיומנות ה-get-transcript של הסרטונים) וחיפושי תורים לרופאים (עבור מיומנות ה-search-appointments של הבריאות — ראו קבוצה H) דרך Webshare. ‏Webshare רואה את כתובות ה-URL שאנו מנתבים דרכה.
  es: Webshare proporciona un proxy rotativo para solicitudes a servicios que, de otro modo, nos bloquearían. Enrutamos las solicitudes de transcripción de YouTube (para la habilidad de obtener transcripción de videos) y las búsquedas de citas médicas (para la habilidad de búsqueda de citas de salud — ver Grupo H) a través de Webshare. Webshare ve las URL que enrutamos a través de él.
  ko: Webshare는 요청을 차단할 수 있는 서비스에 대한 순환 프록시를 제공합니다. YouTube 자막 요청(동영상 자막 가져오기 스킬용) 및 병원 예약 검색(건강 예약 검색 스킬용 — 그룹 H 참조)을 Webshare를 통해 라우팅합니다. Webshare는 이를 통해 라우팅되는 URL을 볼 수 있습니다.
  ar: يوفر Webshare بروكسي دواراً للطلبات الموجهة إلى الخدمات التي قد تحظرنا لولا ذلك. نقوم بتوجيه طلبات نصوص YouTube (لمهارة الحصول على نص الفيديو) وعمليات البحث عن مواعيد الأطباء (لمهارة البحث عن المواعيد الصحية — انظر المجموعة H) عبر Webshare. يرى Webshare عناوين URL التي نوجهها من خلاله.
  verified_by_human: []
