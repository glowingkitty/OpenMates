providers.ai_models.description:
  context: Description of Group C with PII placeholder note
  en: >-
    OpenMates routes AI requests to different providers depending on which
    model you select. Before any message is sent to a provider in this group,
    your browser replaces real names, emails, and physical addresses with
    placeholders (see the "PII placeholder substitution" measure above). You
    can always see which provider a model uses in the model details panel in
    AI settings.
  de: OpenMates leitet KI-Anfragen je nach gewähltem Modell an verschiedene Anbieter weiter. Bevor eine Nachricht an einen Anbieter in dieser Gruppe gesendet wird, ersetzt dein Browser echte Namen, E-Mails und physische Adressen durch Platzhalter (siehe die Maßnahme „PII-Platzhalterersetzung“ oben). Welchen Anbieter ein Modell nutzt, kannst du jederzeit in den Modelldetails in den KI-Einstellungen einsehen.
  zh: OpenMates 根据你选择的模型将 AI 请求路由到不同的服务商。在向该组中的服务商发送任何消息之前，你的浏览器会将真实姓名、电子邮件和实际地址替换为占位符（参见上方的“PII 占位符替换”措施）。你始终可以在 AI 设置的模型详情面板中查看模型使用的服务商。
  es: "OpenMates enruta las solicitudes de IA a diferentes proveedores según el modelo que selecciones. Antes de que se envíe cualquier mensaje a un proveedor de este grupo, tu navegador reemplaza los nombres reales, correos electrónicos y direcciones físicas con marcadores de posición (consulta la medida \"Sustitución de marcadores de posición de PII\" anterior). Siempre puedes ver qué proveedor utiliza un modelo en el panel de detalles del modelo en la configuración de IA."
  ru: OpenMates направляет ИИ-запросы разным провайдерам в зависимости от выбранной тобой модели. Перед отправкой любого сообщения провайдеру из этой группы твой браузер заменяет реальные имена, адреса электронной почты и физические адреса плейсхолдерами (см. меру «Замена персональных данных плейсхолдерами» выше). Ты всегда можешь увидеть, какого провайдера использует модель, в панели сведений о модели в настройках ИИ.
  ja: OpenMatesは、選択されたモデルに応じて、AIリクエストを異なるプロバイダーにルーティングします。このグループのプロバイダーにメッセージが送信される前に、ブラウザが実名、メールアドレス、住所をプレースホルダーに置き換えます（上記の「PIIプレースホルダー置換」対策を参照）。モデルがどのプロバイダーを使用しているかは、AI設定のモデル詳細パネルでいつでも確認できます。
  ko: "OpenMates는 선택한 모델에 따라 AI 요청을 다른 제공업체로 라우팅합니다. 이 그룹의 제공업체에 메시지가 전송되기 전에 브라우저는 실명, 이메일, 실제 주소를 자리 표시자(위의 \"개인 식별 정보(PII) 자리 표시자 대체\" 조치 참조)로 대체합니다. AI 설정의 모델 상세 패널에서 모델이 어떤 제공업체를 사용하는지 언제든지 확인할 수 있습니다."
  it: "OpenMates instrada le richieste AI a diversi fornitori a seconda del modello selezionato. Prima che qualsiasi messaggio venga inviato a un fornitore di questo gruppo, il tuo browser sostituisce nomi reali, email e indirizzi fisici con segnaposto (vedi la misura \"Sostituzione dei segnaposto PII\" sopra). Puoi sempre vedere quale fornitore utilizza un modello nel pannello dei dettagli del modello nelle impostazioni AI."
  tr: "OpenMates, seçtiğin modele bağlı olarak yapay zeka isteklerini farklı sağlayıcılara yönlendirir. Bu gruptaki bir sağlayıcıya herhangi bir mesaj gönderilmeden önce, tarayıcın gerçek isimleri, e-postaları ve fiziksel adresleri yer tutucularla değiştirir (yukarıdaki \"Kişisel Veri (PII) yer tutucu değişimi\" önlemine bak). Bir modelin hangi sağlayıcıyı kullandığını her zaman yapay zeka ayarlarındaki model detayları panelinde görebilirsin."
  vi: "OpenMates chuyển hướng các yêu cầu AI đến các nhà cung cấp khác nhau tùy thuộc vào mô hình bạn chọn. Trước khi bất kỳ tin nhắn nào được gửi đến nhà cung cấp trong nhóm này, trình duyệt của bạn sẽ thay thế tên thật, email và địa chỉ thực bằng các trình giữ chỗ (xem biện pháp \"Thay thế trình giữ chỗ PII\" ở trên). Bạn luôn có thể xem nhà cung cấp nào mà một mô hình sử dụng trong bảng chi tiết mô hình tại cài đặt AI."
  id: "OpenMates mengarahkan permintaan AI ke penyedia yang berbeda tergantung pada model yang kamu pilih. Sebelum pesan apa pun dikirim ke penyedia dalam grup ini, perambanmu mengganti nama asli, email, dan alamat fisik dengan placeholder (lihat tindakan \"Substitusi placeholder PII\" di atas). Kamu selalu dapat melihat penyedia mana yang digunakan model di panel detail model di pengaturan AI."
  pl: OpenMates kieruje żądania AI do różnych dostawców w zależności od wybranego modelu. Zanim jakakolwiek wiadomość zostanie wysłana do dostawcy z tej grupy, Twoja przeglądarka zastępuje prawdziwe nazwiska, adresy e-mail i adresy fizyczne symbolami zastępczymi (patrz środek „Zastępowanie danych osobowych symbolami zastępczymi” powyżej). Zawsze możesz sprawdzić, z którego dostawcy korzysta dany model, w panelu szczegółów modelu w ustawieniach AI.
  nl: "OpenMates stuurt AI-verzoeken naar verschillende providers, afhankelijk van welk model je selecteert. Voordat een bericht naar een provider in deze groep wordt verzonden, vervangt je browser echte namen, e-mails en fysieke adressen door tijdelijke aanduidingen (zie de maatregel \"PII-placeholder-vervanging\" hierboven). Je kunt in het paneel met modeldetails in de AI-instellingen altijd zien welke provider een model gebruikt."
  ar: "يقوم OpenMates بتوجيه طلبات الذكاء الاصطناعي إلى مزودين مختلفين اعتماداً على النموذج الذي تختاره. قبل إرسال أي رسالة إلى مزود في هذه المجموعة، يستبدل متصفحك الأسماء الحقيقية ورسائل البريد الإلكتروني والعناوين الفعلية بعناصر نائبة (انظر إجراء \"استبدال العناصر النائبة لبيانات الهوية الشخصية\" أعلاه). يمكنك دائماً معرفة المزود الذي يستخدمه النموذج في لوحة تفاصيل النموذج في إعدادات الذكاء الاصطناعي."
  hi: "OpenMates तुम्हारे द्वारा चुने गए मॉडल के आधार पर AI अनुरोधों को अलग-अलग प्रदाताओं को भेजता है। इस समूह के किसी प्रदाता को कोई भी संदेश भेजे जाने से पहले, तुम्हारा ब्राउज़र वास्तविक नामों, ईमेल और भौतिक पतों को प्लेसहोल्डर्स से बदल देता है (ऊपर \"PII प्लेसहोल्डर प्रतिस्थापन\" उपाय देखें)। तुम हमेशा देख सकते हो कि कोई मॉडल किस प्रदाता का उपयोग करता है, इसके लिए AI सेटिंग्स में मॉडल विवरण पैनल देखें।"
  th: "OpenMates จะส่งคำขอ AI ไปยังผู้ให้บริการต่างๆ ตามโมเดลที่คุณเลือก ก่อนที่ข้อความใดๆ จะถูกส่งไปยังผู้ให้บริการในกลุ่มนี้ เบราว์เซอร์ของคุณจะแทนที่ชื่อจริง อีเมล และที่อยู่จริงด้วยตัวสำรองข้อมูล (ดูมาตรการ \"การแทนที่ข้อมูลส่วนบุคคลด้วยตัวสำรอง\" ด้านบน) คุณสามารถดูได้เสมอว่าโมเดลนั้นใช้ผู้ให้บริการรายใดในแผงรายละเอียดโมเดลในการตั้งค่า AI"
  cs: OpenMates směruje požadavky AI k různým poskytovatelům v závislosti na tom, který model vybereš. Před odesláním jakékoli zprávy poskytovateli v této skupině tvůj prohlížeč nahradí skutečná jména, e-maily a fyzické adresy zástupnými symboly (viz opatření „Nahrazení osobních údajů zástupnými symboly“ výše). To, kterého poskytovatele model používá, můžeš vždy vidět v panelu podrobností o modelu v nastavení AI.
  sv: "OpenMates dirigerar AI-förfrågningar till olika leverantörer beroende på vilken modell du väljer. Innan ett meddelande skickas till en leverantör i denna grupp ersätter din webbläsare riktiga namn, e-postadresser och fysiska adresser med platshållare (se åtgärden \"Ersättning med PII-platshållare\" ovan). Du kan alltid se vilken leverantör en modell använder i panelen för modellinformation i AI-inställningarna."
  he: "OpenMates מנתבת בקשות בינה מלאכותית לספקים שונים בהתאם למודל שבחרת. לפני שכל הודעה נשלחת לספק בקבוצה זו, הדפדפן שלך מחליף שמות אמיתיים, כתובות אימייל וכתובות פיזיות בממלאי מקום (ראה את אמצעי ה-\"החלפת פרטי זיהוי אישיים בממלאי מקום\" לעיל). תמיד תוכל לראות באיזה ספק מודל משתמש בחלונית פרטי המודל בהגדרות ה-AI."
  pt: "O OpenMates encaminha solicitações de IA para diferentes provedores, dependendo do modelo que você selecionar. Antes de qualquer mensagem ser enviada para um provedor deste grupo, seu navegador substitui nomes reais, e-mails e endereços físicos por espaços reservados (veja a medida \"Substituição de espaços reservados de PII\" acima). Você sempre pode ver qual provedor um modelo utiliza no painel de detalhes do modelo nas configurações de IA."
  fr: "OpenMates achemine les requêtes d'IA vers différents fournisseurs selon le modèle que tu sélectionnes. Avant que tout message ne soit envoyé à un fournisseur de ce groupe, ton navigateur remplace les noms réels, les e-mails et les adresses physiques par des placeholders (voir la mesure « Substitution de PII par des placeholders » ci-dessus). Tu peux toujours voir quel fournisseur un modèle utilise dans le panneau des détails du modèle dans les paramètres d'IA."
  verified_by_human: []
