aggregate_analytics.items:
  context: Comma-separated list of collected analytics data points
  en: "Daily page load counts; approximate unique visit counts (probabilistic HyperLogLog, ~0.81% error); country distribution (GeoIP lookup — IP discarded immediately, never stored); device class (mobile/tablet/desktop); browser family and major version; OS family; referrer domain (domain only, never full URL); screen size class; session duration distribution (bucketed)"
  de: "Tägliche Seitenaufrufe; ungefähre eindeutige Besuchszahlen (probabilistisches HyperLogLog, ~0,81 % Fehler); Länderverteilung (GeoIP-Abfrage — IP sofort verworfen, nie gespeichert); Geräteklasse; Browser-Familie und Hauptversion; Betriebssystemfamilie; Referrer-Domain; Bildschirmgrößenklasse; Sitzungsdauerverteilung"
  zh: "每日页面加载次数；近似唯一访问次数（概率性HyperLogLog，约0.81%误差）；国家分布（GeoIP查询——IP立即丢弃，从不存储）；设备类型；浏览器系列及主版本；操作系统系列；来源域名；屏幕尺寸类别；会话时长分布"
  es: "Recuentos diarios de cargas de página; recuentos aproximados de visitas únicas (HyperLogLog probabilístico, ~0,81 % de error); distribución por países (consulta GeoIP — IP descartada inmediatamente, nunca almacenada); clase de dispositivo; familia de navegador y versión principal; familia de SO; dominio referente; clase de tamaño de pantalla; distribución de duración de sesión"
  fr: "Comptages journaliers de chargements de page ; comptages approximatifs de visites uniques (HyperLogLog probabiliste, ~0,81 % d'erreur) ; répartition géographique (requête GeoIP — IP immédiatement supprimée, jamais stockée) ; classe d'appareil ; famille de navigateur et version majeure ; famille de système d'exploitation ; domaine référent ; classe de taille d'écran ; distribution de la durée de session"
  pt: "Contagens diárias de carregamento de página; contagens aproximadas de visitas únicas (HyperLogLog probabilístico, ~0,81% de erro); distribuição por país (pesquisa GeoIP — IP descartado imediatamente, nunca armazenado); classe do dispositivo (móvel/tablet/desktop); família do navegador e versão principal; família do SO; domínio de referência (apenas domínio, nunca URL completa); classe de tamanho de tela; distribuição de duração de sessão (por intervalos)"
  ru: "Ежедневные счётчики загрузок страниц; приближённое количество уникальных посетителей (вероятностный HyperLogLog, ~0,81% погрешности); распределение по странам (GeoIP — IP удаляется немедленно, никогда не сохраняется); класс устройства (мобильный/планшет/ПК); семейство браузера и основная версия; семейство ОС; домен реферера (только домен, никогда полный URL); класс размера экрана; распределение длительности сессий (по интервалам)"
  ja: "1日あたりのページ読み込み回数；近似ユニーク訪問数（確率的HyperLogLog、誤差約0.81%）；国別分布（GeoIP参照 — IPは即座に廃棄、保存しない）；デバイスクラス；ブラウザファミリーとメジャーバージョン；OSファミリー；リファラードメイン；画面サイズクラス；セッション時間分布"
  ko: "일일 페이지 로드 수; 근사 고유 방문 수 (확률적 HyperLogLog, ~0.81% 오류); 국가 분포 (GeoIP 조회 — IP 즉시 폐기, 저장되지 않음); 기기 클래스 (모바일/태블릿/데스크톱); 브라우저 계열 및 주요 버전; OS 계열; 참조 도메인 (도메인만, 전체 URL 없음); 화면 크기 클래스; 세션 지속 시간 분포 (버킷화)"
  it: "Conteggi giornalieri di caricamento pagina; conteggi approssimativi di visite uniche (HyperLogLog probabilistico, ~0,81% di errore); distribuzione per paese (ricerca GeoIP — IP eliminato immediatamente, mai memorizzato); classe del dispositivo (mobile/tablet/desktop); famiglia del browser e versione principale; famiglia del SO; dominio referrer (solo dominio, mai URL completo); classe dimensione schermo; distribuzione durata sessione (per intervalli)"
  tr: "Günlük sayfa yükleme sayıları; yaklaşık benzersiz ziyaret sayıları (olasılıksal HyperLogLog, ~%0,81 hata); ülke dağılımı (GeoIP araması — IP anında atılır, hiçbir zaman saklanmaz); cihaz sınıfı (mobil/tablet/masaüstü); tarayıcı ailesi ve ana sürüm; işletim sistemi ailesi; referrer alanı (yalnızca alan adı, tam URL yok); ekran boyutu sınıfı; oturum süresi dağılımı (gruplandırılmış)"
  vi: "Số lượt tải trang hàng ngày; số lượt truy cập duy nhất gần đúng (HyperLogLog xác suất, ~0,81% sai số); phân bổ theo quốc gia (tra cứu GeoIP — IP bị loại bỏ ngay lập tức, không bao giờ được lưu trữ); loại thiết bị (di động/máy tính bảng/máy tính để bàn); họ trình duyệt và phiên bản chính; họ hệ điều hành; tên miền giới thiệu (chỉ tên miền, không bao giờ URL đầy đủ); lớp kích thước màn hình; phân bổ thời lượng phiên (phân nhóm)"
  id: "Jumlah pemuatan halaman harian; jumlah kunjungan unik perkiraan (HyperLogLog probabilistik, ~0,81% kesalahan); distribusi negara (pencarian GeoIP — IP langsung dibuang, tidak pernah disimpan); kelas perangkat (mobile/tablet/desktop); keluarga browser dan versi utama; keluarga OS; domain referrer (domain saja, tidak pernah URL lengkap); kelas ukuran layar; distribusi durasi sesi (dikelompokkan)"
  pl: "Dzienne liczniki ładowania stron; przybliżone liczniki unikalnych wizyt (probabilistyczny HyperLogLog, ~0,81% błędu); rozkład krajów (wyszukiwanie GeoIP — IP odrzucane natychmiast, nigdy nie przechowywane); klasa urządzenia (mobile/tablet/desktop); rodzina przeglądarki i główna wersja; rodzina systemu OS; domena odsyłacza (tylko domena, nigdy pełny URL); klasa rozmiaru ekranu; rozkład czasu trwania sesji (przedziałowy)"
  nl: "Dagelijkse paginalaadtelling; benaderde unieke bezoekerstellingen (probabilistische HyperLogLog, ~0,81% fout); landverdeling (GeoIP-zoekopdracht — IP direct weggegooid, nooit opgeslagen); apparaatklasse (mobiel/tablet/desktop); browserfamilie en hoofdversie; OS-familie; verwijzingsdomein (alleen domein, nooit volledige URL); schermsgrootteklasse; verdeling sessieduur (in groepen)"
  ar: "أعداد تحميلات الصفحة اليومية؛ أعداد الزيارات الفريدة التقريبية (HyperLogLog الاحتمالي، خطأ ~0.81%)؛ توزيع الدول (بحث GeoIP — يُتخلص من عنوان IP فورًا، لا يُخزَّن أبدًا)؛ فئة الجهاز (جوال/لوحي/سطح مكتب)؛ عائلة المتصفح والإصدار الرئيسي؛ عائلة نظام التشغيل؛ نطاق المُحيل (النطاق فقط، لا URL كامل)؛ فئة حجم الشاشة؛ توزيع مدة الجلسة (مُجمَّع)"
  hi: "दैनिक पेज लोड गिनती; अनुमानित अद्वितीय विज़िट गिनती (प्रायिकता HyperLogLog, ~0.81% त्रुटि); देश वितरण (GeoIP लुकअप — IP तुरंत त्याग, कभी संग्रहीत नहीं); डिवाइस वर्ग (मोबाइल/टैबलेट/डेस्कटॉप); ब्राउज़र परिवार और प्रमुख संस्करण; OS परिवार; रेफरर डोमेन (केवल डोमेन, कभी पूर्ण URL नहीं); स्क्रीन आकार वर्ग; सत्र अवधि वितरण (बकेटेड)"
  th: "จำนวนการโหลดหน้าต่อวัน; จำนวนการเข้าชมที่ไม่ซ้ำกันโดยประมาณ (HyperLogLog เชิงความน่าจะเป็น ข้อผิดพลาด ~0.81%); การกระจายตามประเทศ (การค้นหา GeoIP — IP ถูกทิ้งทันที ไม่เคยจัดเก็บ); ระดับอุปกรณ์ (มือถือ/แท็บเล็ต/เดสก์ท็อป); ตระกูลเบราว์เซอร์และเวอร์ชันหลัก; ตระกูล OS; โดเมน referrer (เฉพาะโดเมน ไม่เคยเป็น URL เต็ม); ระดับขนาดหน้าจอ; การกระจายระยะเวลาเซสชัน (แบบจัดกลุ่ม)"
  cs: "Denní počty načtení stránek; přibližné počty jedinečných návštěv (pravděpodobnostní HyperLogLog, ~0,81% chyba); rozložení zemí (vyhledávání GeoIP — IP okamžitě zahozena, nikdy neuložena); třída zařízení (mobilní/tablet/desktop); rodina prohlížeče a hlavní verze; rodina OS; doména odkazující stránky (pouze doména, nikdy celá URL); třída velikosti obrazovky; rozložení délky relace (rozdělené do skupin)"
  sv: "Dagliga sidladdningsräkningar; ungefärliga räkningar för unika besök (probabilistisk HyperLogLog, ~0,81% fel); landsfördelning (GeoIP-sökning — IP kasseras omedelbart, lagras aldrig); enhetsklass (mobil/surfplatta/dator); webbläsarfamilj och huvudversion; OS-familj; referrerdomän (enbart domän, aldrig fullständig URL); skärmstorleksklass; sessionslängdsfördelning (grupperad)"
  verified_by_human: []
  he: ספירות טעינת עמוד יומיות; ספירות ביקור ייחודיות משוערות (HyperLogLog הסתברותי, שגיאה ~0.81%); אירועי שימוש בתכונות ונתונים טכניים אחרים על ביצועי השירות.
aggregate_analytics.no_pii:
  context: Statement that no PII is stored
  en: IP addresses are used transiently for GeoIP lookup only and are never written to disk or any database. User-Agent strings are parsed to metadata only (browser name, OS) — the raw string is never stored. All data is stored as daily aggregate counters, not as individual records.
  de: IP-Adressen werden nur vorübergehend für die GeoIP-Abfrage verwendet und niemals auf Datenträgern oder in Datenbanken gespeichert. User-Agent-Strings werden nur zu Metadaten (Browser-Name, Betriebssystem) verarbeitet — der Rohstring wird nie gespeichert. Alle Daten werden als tägliche Aggregatzähler gespeichert, nicht als Einzeldatensätze.
  zh: IP地址仅短暂用于GeoIP查询，从不写入磁盘或任何数据库。User-Agent字符串仅解析为元数据（浏览器名称、操作系统）——原始字符串从不存储。所有数据存储为每日聚合计数器，而非个人记录。
  es: Las direcciones IP se usan transitoriamente solo para la consulta GeoIP y nunca se escriben en disco o en ninguna base de datos. Las cadenas User-Agent se procesan únicamente como metadatos (nombre del navegador, SO) — la cadena en bruto nunca se almacena. Todos los datos se almacenan como contadores diarios agregados, no como registros individuales.
  fr: Les adresses IP sont utilisées de manière transitoire uniquement pour la recherche GeoIP et ne sont jamais écrites sur disque ou dans une base de données. Les chaînes User-Agent sont traitées uniquement en métadonnées (nom du navigateur, système d'exploitation) — la chaîne brute n'est jamais stockée. Toutes les données sont stockées comme compteurs agrégés quotidiens, pas comme enregistrements individuels.
  pt: "Endereços IP são usados transitoriamente apenas para pesquisa de GeoIP e nunca são gravados em disco ou em qualquer banco de dados. Strings User-Agent são analisadas apenas como metadados (nome do navegador, SO) — a string bruta nunca é armazenada. Todos os dados são armazenados como contadores agregados diários, não como registros individuais."
  ru: "IP-адреса используются только временно для GeoIP-запроса и никогда не записываются на диск или в базу данных. Строки User-Agent преобразуются только в метаданные (название браузера, ОС) — исходная строка никогда не сохраняется. Все данные хранятся как ежедневные агрегированные счётчики, а не индивидуальные записи."
  ja: IPアドレスはGeoIP参照のためのみに一時的に使用され、ディスクやデータベースには一切書き込まれません。User-Agentはメタデータ（ブラウザ名、OS）のみに変換されます。すべてのデータは日次の集計カウンターとして保存され、個人レコードとしては保存されません。
  ko: "IP 주소는 GeoIP 조회에만 일시적으로 사용되며 디스크나 데이터베이스에 절대 기록되지 않습니다. User-Agent 문자열은 메타데이터로만 파싱됩니다(브라우저 이름, OS) — 원시 문자열은 저장되지 않습니다. 모든 데이터는 개별 기록이 아닌 일일 집계 카운터로 저장됩니다."
  it: "Gli indirizzi IP vengono utilizzati transitoriamente solo per la ricerca GeoIP e non vengono mai scritti su disco o in alcun database. Le stringhe User-Agent vengono analizzate solo come metadati (nome del browser, OS) — la stringa grezza non viene mai memorizzata. Tutti i dati sono memorizzati come contatori aggregati giornalieri, non come record individuali."
  tr: "IP adresleri yalnızca GeoIP araması için geçici olarak kullanılır ve hiçbir zaman diske veya herhangi bir veritabanına yazılmaz. User-Agent dizeleri yalnızca meta veriye (tarayıcı adı, işletim sistemi) dönüştürülür — ham dize hiçbir zaman saklanmaz. Tüm veriler bireysel kayıtlar olarak değil, günlük toplam sayaçlar olarak depolanır."
  vi: "Địa chỉ IP chỉ được sử dụng tạm thời cho tra cứu GeoIP và không bao giờ được ghi vào đĩa hoặc bất kỳ cơ sở dữ liệu nào. Chuỗi User-Agent chỉ được phân tích thành siêu dữ liệu (tên trình duyệt, hệ điều hành) — chuỗi thô không bao giờ được lưu trữ. Tất cả dữ liệu được lưu trữ dưới dạng bộ đếm tổng hợp hàng ngày, không phải bản ghi cá nhân."
  id: "Alamat IP hanya digunakan sementara untuk pencarian GeoIP dan tidak pernah ditulis ke disk atau database mana pun. String User-Agent hanya diurai menjadi metadata (nama browser, OS) — string mentah tidak pernah disimpan. Semua data disimpan sebagai penghitung agregat harian, bukan sebagai catatan individual."
  pl: "Adresy IP są używane wyłącznie przejściowo do wyszukiwania GeoIP i nigdy nie są zapisywane na dysku ani w żadnej bazie danych. Ciągi User-Agent są analizowane tylko do metadanych (nazwa przeglądarki, OS) — surowy ciąg nigdy nie jest przechowywany. Wszystkie dane są przechowywane jako dzienne liczniki zagregowane, a nie jako rekordy indywidualne."
  nl: "IP-adressen worden alleen tijdelijk gebruikt voor GeoIP-zoekopdrachten en worden nooit naar schijf of een database geschreven. User-Agent-strings worden alleen verwerkt tot metadata (browsernaam, OS) — de ruwe string wordt nooit opgeslagen. Alle gegevens worden opgeslagen als dagelijkse geaggregeerde tellers, niet als individuele records."
  ar: "تُستخدم عناوين IP بشكل عابر فقط لبحث GeoIP ولا تُكتب أبدًا على القرص أو في أي قاعدة بيانات. يتم تحليل سلاسل User-Agent إلى بيانات وصفية فقط (اسم المتصفح، نظام التشغيل) — لا تُخزَّن السلسلة الخام أبدًا. تُخزَّن جميع البيانات كعدادات يومية مجمّعة، وليس كسجلات فردية."
  hi: "IP पते केवल GeoIP लुकअप के लिए क्षणिक रूप से उपयोग किए जाते हैं और कभी डिस्क या किसी डेटाबेस में नहीं लिखे जाते। User-Agent स्ट्रिंग्स केवल मेटाडेटा (ब्राउज़र नाम, OS) में पार्स की जाती हैं — कच्ची स्ट्रिंग कभी संग्रहीत नहीं होती। सभी डेटा व्यक्तिगत रिकॉर्ड के रूप में नहीं बल्कि दैनिक समेकित काउंटर के रूप में संग्रहीत होता है।"
  th: "ที่อยู่ IP ถูกใช้ชั่วคราวเฉพาะสำหรับการค้นหา GeoIP เท่านั้น และไม่เคยถูกเขียนลงดิสก์หรือฐานข้อมูลใดๆ สตริง User-Agent ถูกแยกวิเคราะห์เป็นเมตาดาต้าเท่านั้น (ชื่อเบราว์เซอร์, OS) — สตริงดิบไม่เคยถูกจัดเก็บ ข้อมูลทั้งหมดถูกจัดเก็บเป็นตัวนับรวมรายวัน ไม่ใช่บันทึกรายบุคคล"
  cs: "IP adresy jsou používány přechodně pouze pro vyhledávání GeoIP a nikdy nejsou zapisovány na disk nebo do jakékoli databáze. Řetězce User-Agent jsou analyzovány pouze do metadat (název prohlížeče, OS) — surový řetězec není nikdy uložen. Všechna data jsou uložena jako denní agregované čítače, nikoli jako jednotlivé záznamy."
  sv: "IP-adresser används övergående enbart för GeoIP-sökning och skrivs aldrig till disk eller någon databas. User-Agent-strängar tolkas endast till metadata (webbläsarnamn, OS) — den råa strängen lagras aldrig. All data lagras som dagliga aggregerade räknare, inte som individuella poster."
  verified_by_human: []
  he: כתובות IP משמשות באופן חולף לחיפוש GeoIP בלבד ואינן נכתבות לדיסק או לכל מסד נתונים. לא נאסף מידע מזהה אישי.
