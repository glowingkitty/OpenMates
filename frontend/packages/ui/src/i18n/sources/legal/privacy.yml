protection.cryptographic_erasure.description:
  context: Description of cryptographic erasure via Vault key destruction
  en: >-
    When you delete your account we destroy your HashiCorp Vault Transit key in
    addition to removing your rows from our database. Any encrypted field still
    sitting in a backup, cache, or running process becomes mathematically
    unrecoverable ciphertext at that moment — cryptographic erasure on top of
    row-level deletion.
  de: Wenn du dein Konto löschst, vernichten wir zusätzlich zum Entfernen deiner Datensätze aus unserer Datenbank deinen HashiCorp Vault Transit-Key. Jedes verschlüsselte Feld, das sich noch in einem Backup, Cache oder laufenden Prozess befindet, wird in diesem Moment zu mathematisch unwiederbringlichem Geheimtext – kryptografische Löschung zusätzlich zur Löschung auf Datensatzebene.
  zh: 当你删除账户时，除了从数据库中移除相关行外，我们还会销毁你的 HashiCorp Vault Transit 密钥。此时，任何仍存在于备份、缓存或运行进程中的加密字段都会变成数学上不可恢复的密文——在行级删除的基础上实现了加密擦除。
  es: "Cuando eliminas tu cuenta, destruimos tu clave de HashiCorp Vault Transit además de eliminar tus filas de nuestra base de datos. Cualquier campo cifrado que aún se encuentre en una copia de seguridad, caché o proceso en ejecución se convierte en ese momento en texto cifrado matemáticamente irrecuperable: borrado criptográfico además de la eliminación a nivel de fila."
  ru: Когда ты удаляешь свой аккаунт, мы уничтожаем твой ключ HashiCorp Vault Transit в дополнение к удалению строк из нашей базы данных. Любое зашифрованное поле, оставшееся в резервной копии, кэше или запущенном процессе, в этот момент становится математически невосстановимым шифротекстом — криптографическое стирание поверх удаления на уровне строк.
  ja: アカウントを削除すると、データベースから行を削除するだけでなく、HashiCorp Vault Transitキーも破棄します。バックアップ、キャッシュ、または実行中のプロセスに残っている暗号化されたフィールドは、その瞬間に数学的に復元不可能な暗号文になります。これは、行レベルの削除に加えた暗号化消去（クリプトグラフィック・イレイジャー）です。
  ko: 계정을 삭제하면 데이터베이스에서 해당 행을 제거할 뿐만 아니라 HashiCorp Vault Transit 키도 파괴합니다. 이 시점에 백업, 캐시 또는 실행 중인 프로세스에 남아 있는 모든 암호화된 필드는 수학적으로 복구가 불가능한 암호문이 됩니다. 이는 행 수준 삭제에 더해진 암호학적 삭제 조치입니다.
  it: "Quando elimini il tuo account, distruggiamo la tua chiave HashiCorp Vault Transit oltre a rimuovere le tue righe dal nostro database. Qualsiasi campo crittografato ancora presente in un backup, in una cache o in un processo in esecuzione diventa in quel momento un testo cifrato matematicamente irrecuperabile — cancellazione crittografica in aggiunta all'eliminazione a livello di riga."
  tr: Hesabını sildiğinde, veritabanımızdaki satırlarını kaldırmanın yanı sıra HashiCorp Vault Transit anahtarını da yok ederiz. Yedeklerde, önbellekte veya çalışan bir işlemde kalan tüm şifrelenmiş alanlar o anda matematiksel olarak kurtarılamaz şifreli metne dönüşür; bu, satır düzeyinde silmenin üzerine kriptografik imhadır.
  vi: Khi bạn xóa tài khoản, chúng tôi sẽ hủy khóa HashiCorp Vault Transit của bạn bên cạnh việc xóa các hàng dữ liệu khỏi cơ sở dữ liệu. Bất kỳ trường dữ liệu được mã hóa nào còn nằm trong bản sao lưu, bộ nhớ đệm hoặc tiến trình đang chạy sẽ trở thành bản mã không thể khôi phục về mặt toán học tại thời điểm đó — xóa bỏ bằng mật mã bên cạnh việc xóa ở cấp độ hàng.
  id: Saat kamu menghapus akun, kami menghancurkan kunci HashiCorp Vault Transit milikmu selain menghapus baris data dari basis data kami. Bidang terenkripsi apa pun yang masih ada di cadangan, cache, atau proses yang sedang berjalan menjadi teks sandi yang secara matematis tidak dapat dipulihkan pada saat itu — penghapusan kriptografis di atas penghapusan tingkat baris.
  pl: Gdy usuwasz konto, niszczymy Twój klucz HashiCorp Vault Transit, oprócz usunięcia wierszy z naszej bazy danych. Każde zaszyfrowane pole znajdujące się w kopii zapasowej, pamięci podręcznej lub uruchomionym procesie staje się w tym momencie matematycznie nieodwracalnym szyfrogramem — to czyszczenie kryptograficzne jako dodatek do usuwania na poziomie wierszy.
  nl: Wanneer je je account verwijdert, vernietigen we je HashiCorp Vault Transit-sleutel naast het verwijderen van je rijen uit onze database. Elk versleuteld veld dat zich nog in een back-up, cache of actief proces bevindt, wordt op dat moment wiskundig onherstelbare cijfertekst — cryptografische wissing bovenop verwijdering op rijniveau.
  ar: عندما تحذف حسابك، نقوم بتدمير مفتاح HashiCorp Vault Transit الخاص بك بالإضافة إلى إزالة بياناتك من قاعدة بياناتنا. أي حقل مشفر لا يزال موجوداً في نسخة احتياطية أو ذاكرة مؤقتة أو عملية جارية يصبح نصاً مشفراً غير قابل للاسترداد رياضياً في تلك اللحظة — وهو إتلاف تشفيري يضاف إلى الحذف على مستوى السجل.
  hi: जब तुम अपना अकाउंट हटाते हो, तो हम अपने डेटाबेस से तुम्हारी पंक्तियों को हटाने के साथ-साथ तुम्हारी HashiCorp Vault Transit की (key) को भी नष्ट कर देते हैं। बैकअप, कैश या चल रही प्रक्रिया में मौजूद कोई भी एन्क्रिप्टेड फ़ील्ड उस समय गणितीय रूप से अप्राप्य सिफरटेक्स्ट (ciphertext) बन जाता है — यह रो-लेवल डिलीशन के ऊपर क्रिप्टोग्राफ़िक इरेज़र की एक परत है।
  th: เมื่อคุณลบบัญชี เราจะทำลายคีย์ HashiCorp Vault Transit ของคุณ นอกเหนือจากการลบข้อมูลออกจากฐานข้อมูลของเรา ฟิลด์ที่เข้ารหัสซึ่งยังคงอยู่ในข้อมูลสำรอง แคช หรือกระบวนการที่กำลังทำงานอยู่ จะกลายเป็นข้อความรหัสที่ไม่สามารถกู้คืนได้ในทางคณิตศาสตร์ทันที — นี่คือการลบข้อมูลด้วยวิธีทางรหัสวิทยา (cryptographic erasure) นอกเหนือจากการลบข้อมูลในระดับแถว
  cs: Když smažeš svůj účet, zničíme tvůj klíč HashiCorp Vault Transit a zároveň odstraníme tvé řádky z naší databáze. Jakékoli šifrované pole, které se stále nachází v záloze, mezipaměti nebo běžícím procesu, se v tu chvíli stane matematicky neobnovitelným šifrovaným textem – jde o kryptografické smazání nad rámec smazání na úrovni řádků.
  sv: När du raderar ditt konto förstör vi din HashiCorp Vault Transit-nyckel utöver att vi tar bort dina rader från vår databas. Alla krypterade fält som fortfarande finns kvar i en säkerhetskopia, cache eller pågående process blir i det ögonblicket matematiskt oåterkallelig chiffertext — kryptografisk radering utöver radering på radnivå.
  he: כשאתה מוחק את החשבון שלך, אנחנו משמידים את מפתח ה-HashiCorp Vault Transit שלך בנוסף להסרת השורות שלך ממסד הנתונים שלנו. כל שדה מוצפן שעדיין נמצא בגיבוי, במטמון או בתהליך פעיל הופך באותו רגע לטקסט מוצפן שלא ניתן לשחזור מתמטי — מחיקה קריפטוגרפית בנוסף למחיקה ברמת השורה.
  pt: Quando você exclui sua conta, destruímos sua chave do HashiCorp Vault Transit, além de removermos suas linhas do nosso banco de dados. Qualquer campo criptografado que ainda esteja em um backup, cache ou processo em execução torna-se um texto cifrado matematicamente irrecuperável nesse momento — exclusão criptográfica além da exclusão no nível da linha.
  fr: Lorsque tu supprimes ton compte, nous détruisons ta clé HashiCorp Vault Transit en plus de supprimer tes données de notre base de données. Tout champ chiffré encore présent dans une sauvegarde, un cache ou un processus en cours devient à ce moment-là un texte chiffré mathématiquement irrécupérable — un effacement cryptographique en plus de la suppression au niveau des lignes.
  verified_by_human: []
