  ar: تستضيف Together AI نماذج تابعة لجهات خارجية مثل Kimi K2.5 على نقطة نهاية متوافقة مع OpenAI. تُستخدم فقط عندما تختار نموذجاً تستضيفه Together. تتلقى Together رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية مسبقاً في متصفحك.
  cs: Together AI hostuje modely třetích stran, jako je Kimi K2.5, na koncovém bodu kompatibilním s OpenAI. Používá se pouze tehdy, když si vybereš model hostovaný společností Together. Together přijímá tvé zprávy s osobními údaji (PII) již nahrazenými zástupnými symboly na straně klienta.
  ru: Together AI размещает сторонние модели, такие как Kimi K2.5, на OpenAI-совместимом эндпоинте. Используется только при выборе модели, размещенной на Together. Together получает твои сообщения в чате с уже замененными на стороне клиента персональными данными.
  he: "Together AI מארחת מודלים של צד שלישי כגון Kimi K2.5 בנקודת קצה תואמת OpenAI. בשימוש רק כשבוחרים מודל המארח על ידי Together. Together מקבלת את הודעות הצ'אט שלך כשממלאי מקום ל-PII כבר הוחלפו בצד הלקוח."
