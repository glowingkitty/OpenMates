providers.events.meetup.description:
  context: Meetup description
  en: >-
    Meetup powers event search for community events. Meetup receives your
    search queries — city, category, dates — without a user identifier.
  de: Meetup ermöglicht die Eventsuche für Community-Events. Meetup erhält deine Suchanfragen – Stadt, Kategorie, Daten – ohne eine Benutzerkennung.
  zh: Meetup 为社区活动提供搜索功能。Meetup 接收你的查询请求（城市、类别、日期），且不包含用户标识符。
  fr: "Meetup alimente la recherche d'événements pour les événements communautaires. Meetup reçoit tes requêtes de recherche — ville, catégorie, dates — sans identifiant d'utilisateur."
  pt: O Meetup alimenta a pesquisa de eventos para eventos comunitários. O Meetup recebe as tuas consultas de pesquisa — cidade, categoria, datas — sem um identificador de utilizador.
  ru: Meetup обеспечивает поиск общественных мероприятий. Meetup получает твои поисковые запросы — город, категорию, даты — без идентификатора пользователя.
  ja: Meetupはコミュニティイベントの検索を提供します。Meetupは、都市、カテゴリー、日付などの検索クエリを受け取りますが、ユーザー識別子は受け取りません。
  it: Meetup alimenta la ricerca di eventi per eventi della community. Meetup riceve le tue query di ricerca — città, categoria, date — senza un identificativo utente.
  tr: Meetup, topluluk etkinlikleri için etkinlik aramasını destekler. Meetup; şehir, kategori, tarihler gibi arama sorgularını kullanıcı tanımlayıcısı olmadan alır.
  vi: Meetup hỗ trợ tìm kiếm sự kiện cho các sự kiện cộng đồng. Meetup nhận các truy vấn tìm kiếm của bạn — thành phố, danh mục, ngày tháng — mà không có mã định danh người dùng.
  id: Meetup mendukung pencarian acara untuk acara komunitas. Meetup menerima kueri pencarianmu — kota, kategori, tanggal — tanpa pengidentifikasi pengguna.
  pl: Meetup obsługuje wyszukiwanie wydarzeń społecznościowych. Meetup otrzymuje Twoje zapytania — miasto, kategorię, daty — bez identyfikatora użytkownika.
  nl: Meetup drijft het zoeken naar evenementen voor community-evenementen aan. Meetup ontvangt je zoekopdrachten — stad, categorie, data — zonder een gebruikersidentificatie.
  hi: Meetup सामुदायिक कार्यक्रमों के लिए इवेंट खोज को संचालित करता है। Meetup आपके खोज प्रश्न — शहर, श्रेणी, तिथियां — बिना किसी उपयोगकर्ता पहचानकर्ता के प्राप्त करता है।
  th: Meetup ขับเคลื่อนการค้นหากิจกรรมสำหรับกิจกรรมชุมชน Meetup จะได้รับคำค้นหาของคุณ — เมือง, หมวดหมู่, วันที่ — โดยไม่มีตัวระบุตัวตนผู้ใช้
