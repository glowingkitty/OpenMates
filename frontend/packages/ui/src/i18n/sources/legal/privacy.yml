limitations_of_erasure.user_data_backups.description:
  context: User data backups limitation description
  en: >-
    Ciphertext backups of your own data exports live in S3 for 60 days via a
    lifecycle rule, so you can retrieve an export if your device is lost.
    Because we destroyed your encryption key when you deleted your account,
    we cannot decrypt these backups either — they are effectively inert
    ciphertext until they expire.
  de: Geheimtext-Backups deiner eigenen Datenexporte verbleiben über eine Lifecycle-Regel für 60 Tage in S3, damit du einen Export wiederherstellen kannst, falls dein Gerät verloren geht. Da wir deinen Verschlüsselungsschlüssel bei der Kontolöschung vernichtet haben, können auch wir diese Backups nicht entschlüsseln – sie sind praktisch inaktiver Geheimtext, bis sie ablaufen.
  zh: 您自己导出的数据密文备份通过生命周期规则在 S3 中保存 60 天，以便在设备丢失时检索导出内容。由于我们在您注销账号时已销毁了您的加密密钥，我们也无法解密这些备份——在过期之前，它们实际上是无效的密文。
  es: Las copias de seguridad de texto cifrado de tus propias exportaciones de datos permanecen en S3 durante 60 días mediante una regla de ciclo de vida, para que puedas recuperar una exportación si pierdes tu dispositivo. Como destruimos tu clave de cifrado al eliminar tu cuenta, nosotros tampoco podemos descifrar estas copias; son efectivamente texto cifrado inerte hasta que caducan.
  fr: "Les sauvegardes en texte chiffré de tes propres exports de données résident dans S3 pendant 60 jours via une règle de cycle de vie, afin que tu puisses récupérer un export si ton appareil est perdu. Comme nous avons détruit ta clé de chiffrement lors de la suppression de ton compte, nous ne pouvons pas non plus déchiffrer ces sauvegardes — elles sont de fait du texte chiffré inerte jusqu'à leur expiration."
  pt: Cópias de segurança em texto cifrado das tuas próprias exportações de dados permanecem no S3 por 60 dias através de uma regra de ciclo de vida, para que possas recuperar uma exportação se o teu dispositivo for perdido. Como destruímos a tua chave de encriptação quando eliminaste a tua conta, também não podemos desencriptar estas cópias de segurança — são efetivamente texto cifrado inerte até expirarem.
  ru: Резервные копии твоих собственных экспортов данных в виде зашифрованного текста хранятся в S3 в течение 60 дней согласно правилу жизненного цикла, чтобы ты мог восстановить экспорт в случае потери устройства. Поскольку мы уничтожили твой ключ шифрования при удалении аккаунта, мы также не можем расшифровать эти резервные копии — они фактически представляют собой инертный зашифрованный текст до истечения срока их хранения.
  ja: ユーザー自身のデータエクスポートの暗号文バックアップは、ライフサイクルルールにより S3 に60日間保存されるため、デバイスを紛失した場合でもエクスポートを復元できます。アカウント削除時に暗号化キーを破棄しているため、当社もこれらのバックアップを復号することはできません。これらは期限が切れるまで、実質的に機能しない暗号文として存在します。
  ko: 귀하의 데이터 내보내기 암호문 백업은 수명 주기 규칙을 통해 60일 동안 S3에 보관되므로, 기기를 분실한 경우 내보낸 데이터를 복구할 수 있습니다. 계정 삭제 시 당사가 귀하의 암호화 키를 파기했기 때문에 당사도 이 백업을 복호화할 수 없으며, 만료될 때까지 사실상 비활성 상태인 암호문으로 남게 됩니다.
  it: "I backup in testo cifrato delle tue esportazioni di dati risiedono in S3 per 60 giorni tramite una regola del ciclo di vita, in modo che tu possa recuperare un'esportazione in caso di smarrimento del dispositivo. Poiché abbiamo distrutto la tua chiave di crittografia quando hai cancellato l'account, non possiamo decifrare nemmeno questi backup — sono a tutti gli effetti testo cifrato inerte fino alla loro scadenza."
  tr: "Kendi veri dışa aktarımlarının şifreli metin yedekleri, bir yaşam döngüsü kuralı aracılığıyla 60 gün boyunca S3'te tutulur, böylece cihazın kaybolursa bir dışa aktarımı geri alabilirsin. Hesabını sildiğinde şifreleme anahtarını imha ettiğimiz için bu yedeklerin şifresini biz de çözemeyiz; bunlar süreleri dolana kadar etkisiz şifreli metinlerdir."
  vi: Các bản sao lưu bản mã từ việc xuất dữ liệu của chính bạn được lưu trữ trong S3 trong 60 ngày thông qua quy tắc vòng đời, để bạn có thể lấy lại bản xuất nếu thiết bị của mình bị mất. Vì chúng tôi đã hủy khóa mã hóa của bạn khi bạn xóa tài khoản, chúng tôi cũng không thể giải mã các bản sao lưu này — chúng thực chất là bản mã vô hiệu cho đến khi hết hạn.
  id: Cadangan ciphertext dari ekspor data kamu sendiri berada di S3 selama 60 hari melalui aturan siklus hidup, sehingga kamu dapat mengambil ekspor jika perangkatmu hilang. Karena kami memusnahkan kunci enkripsi kamu saat kamu menghapus akun, kami juga tidak dapat mendekripsi cadangan ini — mereka secara efektif adalah ciphertext yang tidak aktif hingga kedaluwarsa.
  pl: Zaszyfrowane kopie zapasowe Twoich własnych eksportów danych są przechowywane w S3 przez 60 dni zgodnie z regułą cyklu życia, dzięki czemu możesz odzyskać eksport w przypadku utraty urządzenia. Ponieważ zniszczyliśmy Twój klucz szyfrowania podczas usuwania konta, my również nie możemy odszyfrować tych kopii zapasowych — pozostają one nieaktywnym szyfrogramem aż do wygaśnięcia.
  nl: Ciphertext-back-ups van je eigen gegevensexports blijven via een lifecycle-regel 60 dagen in S3 staan, zodat je een export kunt ophalen als je je apparaat verliest. Omdat we je encryptiesleutel hebben vernietigd toen je je account verwijderde, kunnen wij deze back-ups ook niet ontsleutelen — het is in feite inerte ciphertext totdat ze verlopen.
  ar: تظل النسخ الاحتياطية للنصوص المشفرة لعمليات تصدير بياناتك الخاصة في S3 لمدة 60 يومًا عبر قاعدة دورة حياة، بحيث يمكنك استرداد التصدير في حالة فقدان جهازك. نظرًا لأننا دمرنا مفتاح التشفير الخاص بك عند حذف حسابك، فلا يمكننا فك تشفير هذه النسخ الاحتياطية أيضًا — فهي فعليًا نصوص مشفرة خاملة حتى تنتهي صلاحيتها.
  hi: तुम्हारे अपने डेटा एक्सपोर्ट का सिफरटेक्स्ट बैकअप लाइफसाइकिल नियम के माध्यम से 60 दिनों तक S3 में रहता है, ताकि यदि तुम्हारा डिवाइस खो जाए तो तुम एक्सपोर्ट प्राप्त कर सको। क्योंकि हमने तुम्हारा अकाउंट डिलीट करते समय तुम्हारी एन्क्रिप्शन कुंजी नष्ट कर दी थी, हम इन बैकअप को भी डिक्रिप्ट नहीं कर सकते — वे समाप्त होने तक प्रभावी रूप से निष्क्रिय सिफरटेक्स्ट हैं।
  th: ข้อมูลสำรองในรูปแบบข้อความเข้ารหัส (ciphertext) ของการส่งออกข้อมูลของคุณเองจะอยู่ใน S3 เป็นเวลา 60 วันผ่านกฎวงจรชีวิตข้อมูล เพื่อให้คุณสามารถกู้คืนข้อมูลที่ส่งออกได้หากอุปกรณ์ของคุณสูญหาย เนื่องจากเราได้ทำลายคีย์การเข้ารหัสของคุณไปแล้วเมื่อคุณลบบัญชี เราจึงไม่สามารถถอดรหัสข้อมูลสำรองเหล่านี้ได้เช่นกัน — ข้อมูลเหล่านี้จะเป็นเพียงข้อความเข้ารหัสที่ใช้งานไม่ได้จนกว่าจะหมดอายุ
  cs: Zálohy tvých vlastních exportů dat v podobě šifrovaného textu jsou uloženy v S3 po dobu 60 dnů prostřednictvím pravidla životního cyklu, takže si můžeš export vyzvednout, pokud ztratíš své zařízení. Protože jsme při smazání tvého účtu zničili tvůj šifrovací klíč, nemůžeme tyto zálohy dešifrovat ani my – jsou to v podstatě neaktivní šifrovaná data, dokud nevyprší jejich platnost.
  sv: Krypterade säkerhetskopior av dina egna dataexporter sparas i S3 i 60 dagar via en livscykelregel, så att du kan återställa en export om din enhet försvinner. Eftersom vi förstörde din krypteringsnyckel när du raderade ditt konto kan vi inte heller dekryptera dessa säkerhetskopior – de är i praktiken obrukbar chiffertext tills de löper ut.
  he: גיבויי טקסט מוצפן (Ciphertext) של ייצוא הנתונים שלך נשמרים ב-S3 למשך 60 יום באמצעות כלל מחזור חיים, כך שתוכל/י לשחזר ייצוא אם המכשיר שלך אבד. מכיוון שהשמדנו את מפתח ההצפנה שלך כשמחקת את החשבון, גם אנחנו לא יכולים לפענח את הגיבויים הללו — הם למעשה טקסט מוצפן חסר פעילות עד שהם פגים.
  verified_by_human: []
data_retention.compliance_logs:
  context: Data retention bullet for compliance logs
  en: >-
    **Compliance logs:** audit logs retained 2 years (BSI §34 BDSG); financial
    compliance logs retained 10 years (AO §147 and HGB §257)
  de: "**Compliance-Protokolle:** Audit-Protokolle werden 2 Jahre aufbewahrt (BSI §34 BDSG); Finanz-Compliance-Protokolle werden 10 Jahre aufbewahrt (AO §147 und HGB §257)"
  zh: "**合规日志：** 审计日志保留 2 年 (BSI §34 BDSG)；财务合规日志保留 10 年 (AO §147 和 HGB §257)"
  es: "**Registros de cumplimiento:** los registros de auditoría se conservan 2 años (BSI §34 BDSG); los registros de cumplimiento financiero se conservan 10 años (AO §147 y HGB §257)"
  fr: "**Journaux de conformité :** journaux d'audit conservés 2 ans (BSI §34 BDSG) ; journaux de conformité financière conservés 10 ans (AO §147 et HGB §257)"
  pt: "**Registos de conformidade:** registos de auditoria retidos por 2 anos (BSI §34 BDSG); registos de conformidade financeira retidos por 10 anos (AO §147 e HGB §257)"
  ru: "**Журналы соответствия:** журналы аудита хранятся 2 года (BSI §34 BDSG); журналы финансового соответствия хранятся 10 лет (AO §147 и HGB §257)"
  ja: "**コンプライアンスログ：** 監査ログは2年間保持（BSI §34 BDSG）、財務コンプライアンスログは10年間保持（AO §147 および HGB §257）"
  ko: "**준수 로그:** 감사 로그 2년 보관(BSI §34 BDSG); 재무 준수 로그 10년 보관(AO §147 및 HGB §257)"
  it: "**Log di conformità:** log di audit conservati per 2 anni (BSI §34 BDSG); log di conformità finanziaria conservati per 10 anni (AO §147 e HGB §257)"
  tr: "**Uyumluluk günlükleri:** 2 yıl saklanan denetim günlükleri (BSI §34 BDSG); 10 yıl saklanan finansal uyumluluk günlükleri (AO §147 ve HGB §257)"
  vi: "**Nhật ký tuân thủ:** nhật ký kiểm tra được lưu giữ trong 2 năm (BSI §34 BDSG); nhật ký tuân thủ tài chính được lưu giữ trong 10 năm (AO §147 và HGB §257)"
  id: "**Log kepatuhan:** log audit disimpan 2 tahun (BSI §34 BDSG); log kepatuhan keuangan disimpan 10 tahun (AO §147 dan HGB §257)"
  pl: "**Logi zgodności:** logi audytowe przechowywane przez 2 lata (BSI §34 BDSG); logi zgodności finansowej przechowywane przez 10 lat (AO §147 i HGB §257)"
  nl: "**Nalevingslogs:** auditlogs worden 2 jaar bewaard (BSI §34 BDSG); financiële nalevingslogs worden 10 jaar bewaard (AO §147 en HGB §257)"
  ar: "**سجلات الامتثال:** يتم الاحتفاظ بسجلات التدقيق لمدة سنتين (BSI §34 BDSG)؛ ويتم الاحتفاظ بسجلات الامتثال المالي لمدة 10 سنوات (AO §147 وHGB §257)"
  hi: "**अनुपालन लॉग (Compliance logs):** ऑडिट लॉग 2 साल के लिए रखे जाते हैं (BSI §34 BDSG); वित्तीय अनुपालन लॉग 10 साल के लिए रखे जाते हैं (AO §147 और HGB §257)"
  th: "**บันทึกการปฏิบัติตามข้อกำหนด:** บันทึกการตรวจสอบเก็บรักษาไว้ 2 ปี (BSI §34 BDSG); บันทึกการปฏิบัติตามข้อกำหนดทางการเงินเก็บรักษาไว้ 10 ปี (AO §147 และ HGB §257)"
  cs: "**Protokoly o souladu:** auditní protokoly uchovávané 2 roky (BSI §34 BDSG); protokoly o finančním souladu uchovávané 10 let (AO §147 a HGB §257)"
  sv: "**Efterlevnadsloggar:** granskningsloggar sparas i 2 år (BSI §34 BDSG); finansiella efterlevnadsloggar sparas i 10 år (AO §147 och HGB §257)"
  he: "**יומני ציות (Compliance logs):** יומני ביקורת נשמרים למשך שנתיים (BSI §34 BDSG); יומני ציות פיננסיים נשמרים למשך 10 שנים (AO §147 ו-HGB §257)"
  verified_by_human: []
data_retention.observability_traces:
  context: Data retention bullet for observability traces
  en: >-
    **Observability traces:** up to 30 days; user IDs in traces use a hash
    that rotates every 24 hours, so older traces cannot be joined to a
    specific user
  de: "**Observability-Traces:** bis zu 30 Tage; Benutzer-IDs in Traces verwenden einen Hash, der alle 24 Stunden rotiert, sodass ältere Traces nicht einem bestimmten Benutzer zugeordnet werden können"
  zh: "**可观测性追踪：** 最长 30 天；追踪中的用户 ID 使用每 24 小时轮换一次的哈希值，因此较旧的追踪无法关联到特定用户"
  es: "**Trazas de observabilidad:** hasta 30 días; los ID de usuario en las trazas utilizan un hash que rota cada 24 horas, por lo que las trazas más antiguas no pueden vincularse a un usuario específico"
  fr: "**Traces d'observabilité :** jusqu'à 30 jours ; les identifiants d'utilisateur dans les traces utilisent un hachage qui change toutes les 24 heures, de sorte que les traces plus anciennes ne peuvent pas être rattachées à un utilisateur spécifique"
  pt: "**Rastreios de observabilidade:** até 30 dias; os IDs de utilizador nos rastreios usam um hash que roda a cada 24 horas, pelo que os rastreios mais antigos não podem ser associados a um utilizador específico"
  ru: "**Трассировки наблюдаемости:** до 30 дней; идентификаторы пользователей в трассировках используют хеш, который меняется каждые 24 часа, поэтому более старые трассировки нельзя связать с конкретным пользователем"
  ja: "**オブザーバビリティトレース：** 最大30日間。トレース内のユーザー ID は24時間ごとにローテーションされるハッシュを使用するため、古いトレースを特定のユーザーに紐付けることはできません。"
  ko: "**관찰 가능성 추적:** 최대 30일; 추적 내 사용자 ID는 24시간마다 교체되는 해시를 사용하므로 오래된 추적 데이터는 특정 사용자와 연결할 수 없음"
  it: "**Tracce di osservabilità:** fino a 30 giorni; gli ID utente nelle tracce utilizzano un hash che ruota ogni 24 ore, quindi le tracce più vecchie non possono essere collegate a un utente specifico"
  tr: "**Gözlemlenebilirlik izleri:** 30 güne kadar; izlerdeki kullanıcı kimlikleri her 24 saatte bir değişen bir karma kullanır, bu nedenle eski izler belirli bir kullanıcıyla ilişkilendirilemez"
  vi: "**Dấu vết quan sát (observability traces):** tối đa 30 ngày; ID người dùng trong các dấu vết sử dụng mã băm thay đổi sau mỗi 24 giờ, vì vậy các dấu vết cũ hơn không thể được liên kết với một người dùng cụ thể"
  id: "**Jejak observabilitas:** hingga 30 hari; ID pengguna dalam jejak menggunakan hash yang berputar setiap 24 jam, sehingga jejak yang lebih lama tidak dapat dihubungkan ke pengguna tertentu"
  pl: "**Ślady obserwowalności:** do 30 dni; identyfikatory użytkowników w śladach wykorzystują skrót zmieniający się co 24 godziny, więc starsze ślady nie mogą zostać powiązane z konkretnym użytkownikiem"
  nl: "**Observability-traces:** tot 30 dagen; gebruikers-ID's in traces gebruiken een hash die elke 24 uur roteert, zodat oudere traces niet aan een specifieke gebruiker kunnen worden gekoppeld"
  ar: "**تتبعات المراقبة:** حتى 30 يومًا؛ تستخدم معرفات المستخدمين في التتبعات تجزئة تتغير كل 24 ساعة، لذا لا يمكن ربط التتبعات القديمة بمستخدم معين"
  hi: "**ऑब्जर्वेबिलिटी ट्रेसेस (Observability traces):** 30 दिनों तक; ट्रेसेस में यूजर आईडी एक हैश का उपयोग करते हैं जो हर 24 घंटे में बदलता है, इसलिए पुराने ट्रेसेस को किसी विशिष्ट उपयोगकर्ता से नहीं जोड़ा जा सकता है"
  th: "**ร่องรอยการสังเกตการณ์:** สูงสุด 30 วัน; ID ผู้ใช้ในร่องรอยการติดตามใช้แฮชที่เปลี่ยนทุก 24 ชั่วโมง ดังนั้นร่องรอยที่เก่ากว่าจึงไม่สามารถเชื่อมโยงกับผู้ใช้รายใดรายหนึ่งได้"
  cs: "**Trasování pozorovatelnosti:** až 30 dní; ID uživatelů v trasách používají hash, který se mění každých 24 hodin, takže starší trasy nelze spojit s konkrétním uživatelem"
  sv: "**Spårningsdata för observerbarhet:** upp till 30 dagar; användar-ID:n i spårningar använder en hash som roterar var 24:e timme, så äldre spårningar kan inte kopplas till en specifik användare"
  he: "**עקבות ניטור (Observability traces):** עד 30 יום; מזהי משתמש בעקבות משתמשים ב-hash שמתחלף כל 24 שעות, כך שלא ניתן לקשר עקבות ישנים למשתמש ספציפי"
  verified_by_human: []
data_retention.user_data_backups:
  context: Data retention bullet for user data backups
  en: >-
    **User data backups:** 60 days via S3 lifecycle; backups contain only
    ciphertext encrypted with your own key
  de: "**Benutzerdatensicherungen:** 60 Tage via S3-Lifecycle; Backups enthalten nur mit deinem eigenen Schlüssel verschlüsselten Geheimtext"
  zh: "**用户数据备份：** 通过 S3 生命周期保留 60 天；备份仅包含使用您自己的密钥加密的密文"
  es: "**Copias de seguridad de datos de usuario:** 60 días mediante el ciclo de vida de S3; las copias contienen solo texto cifrado con tu propia clave"
  fr: "**Sauvegardes de données utilisateur :** 60 jours via le cycle de vie S3 ; les sauvegardes ne contiennent que du texte chiffré avec ta propre clé"
  pt: "**Cópias de segurança de dados do utilizador:** 60 dias via ciclo de vida S3; as cópias de segurança contêm apenas texto cifrado encriptado com a tua própria chave"
  ru: "**Резервные копии данных пользователя:** 60 дней через жизненный цикл S3; резервные копии содержат только зашифрованный текст, зашифрованный твоим собственным ключом"
  ja: "**ユーザーデータバックアップ：** S3 ライフサイクルにより60日間。バックアップには、ユーザー自身のキーで暗号化された暗号文のみが含まれます。"
  ko: "**사용자 데이터 백업:** S3 수명 주기를 통해 60일간 보관; 백업에는 귀하의 키로 암호화된 암호문만 포함됨"
  it: "**Backup dei dati utente:** 60 giorni tramite ciclo di vita S3; i backup contengono solo testo cifrato con la tua chiave"
  tr: "**Kullanıcı verisi yedekleri:** S3 yaşam döngüsü aracılığıyla 60 gün; yedekler yalnızca kendi anahtarınla şifrelenmiş şifreli metinleri içerir"
  vi: "**Bản sao lưu dữ liệu người dùng:** 60 ngày thông qua quy trình vòng đời S3; các bản sao lưu chỉ chứa bản mã được mã hóa bằng khóa riêng của bạn"
  id: "**Cadangan data pengguna:** 60 hari melalui siklus hidup S3; cadangan hanya berisi ciphertext yang dienkripsi dengan kuncimu sendiri"
  pl: "**Kopie zapasowe danych użytkownika:** 60 dni zgodnie z cyklem życia S3; kopie zapasowe zawierają wyłącznie szyfrogram zaszyfrowany Twoim własnym kluczem"
  nl: "**Back-ups van gebruikersgegevens:** 60 dagen via S3-lifecycle; back-ups bevatten alleen ciphertext die is versleuteld met je eigen sleutel"
  ar: "**النسخ الاحتياطية لبيانات المستخدم:** 60 يومًا عبر دورة حياة S3؛ تحتوي النسخ الاحتياطية فقط على نص مشفر بمفتاحك الخاص"
  hi: "**उपयोगकर्ता डेटा बैकअप:** S3 लाइफसाइकिल के माध्यम से 60 दिन; बैकअप में केवल आपकी अपनी कुंजी (key) से एन्क्रिप्टेड सिफरटेक्स्ट (ciphertext) होता है"
  th: "**ข้อมูลสำรองของผู้ใช้:** 60 วันผ่านวงจรชีวิต S3; ข้อมูลสำรองประกอบด้วยเพียงข้อความเข้ารหัสที่เข้ารหัสด้วยคีย์ของคุณเอง"
  cs: "**Zálohy uživatelských dat:** 60 dní prostřednictvím životního cyklu S3; zálohy obsahují pouze šifrovaný text zašifrovaný tvým vlastním klíčem"
  sv: "**Säkerhetskopior av användardata:** 60 dagar via S3-livscykel; säkerhetskopior innehåller endast chiffertext krypterad med din egen nyckel"
  he: "**גיבויי נתוני משתמש:** 60 יום באמצעות מחזור חיים של S3; הגיבויים מכילים רק טקסט מוצפן (ciphertext) שהוצפן באמצעות המפתח שלך"
  verified_by_human: []
legal_rights.gdpr.manual_note:
  context: Note explaining which GDPR rights are handled manually by email
  en: >-
    The following rights are available on request (please contact us by email
    at contact@openmates.org and we will handle them manually):
  de: "Die folgenden Rechte sind auf Anfrage verfügbar (bitte kontaktiere uns per E-Mail unter contact@openmates.org, und wir werden sie manuell bearbeiten):"
  zh: 以下权利可根据要求提供（请通过电子邮件 contact@openmates.org 与我们联系，我们将手动处理）：
  es: "Los siguientes derechos están disponibles bajo petición (por favor, contáctanos por correo electrónico en contact@openmates.org y los gestionaremos manualmente):"
  fr: "Les droits suivants sont disponibles sur demande (merci de nous contacter par e-mail à contact@openmates.org et nous les traiterons manuellement) :"
  pt: "Os seguintes direitos estão disponíveis mediante pedido (por favor, contacta-nos por e-mail para contact@openmates.org e trataremos deles manualmente):"
  ru: "Следующие права предоставляются по запросу (пожалуйста, свяжись с нами по электронной почте contact@openmates.org, и мы обработаем их вручную):"
  ja: 以下の権利はリクエストに応じて利用可能です（contact@openmates.org までメールでご連絡ください。手動で対応いたします）：
