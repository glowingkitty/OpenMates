promises.intro:
  context: Intro paragraph for the Privacy Promises section
  en: Below are the privacy promises we make to every user. Each one is backed by code in our open-source repository and verified by automated tests. When the enforcing code changes, a registry-linked check reminds us to rerun those tests before release.
  verified_by_human: []
promises.client_side_chat_encryption.heading:
  context: Privacy promise heading — client-side chat encryption
  en: Client-side chat encryption
  verified_by_human: []
promises.client_side_chat_encryption.description:
  context: Privacy promise description — client-side chat encryption
  en: "Your chats, settings, and memories are encrypted on your device with AES-256-GCM before they leave your browser. The server stores only ciphertext on disk, in caches, and in backups. This is not end-to-end encryption: when a server-side task needs to read content (to run an AI response, render an invoice, or deliver a reminder), it decrypts in memory via HashiCorp Vault and discards the plaintext immediately after use."
  verified_by_human: []
promises.email_encryption_at_rest.heading:
  context: Privacy promise heading — email encryption at rest
  en: Email addresses encrypted at rest
  verified_by_human: []
promises.email_encryption_at_rest.description:
  context: Privacy promise description — email encryption at rest
  en: Your email address is stored only as ciphertext. The server decrypts it transiently in memory during login, billing, and notification delivery, and never writes plaintext to disk or logs.
  verified_by_human: []
promises.no_third_party_tracking.heading:
  context: Privacy promise heading — no third-party tracking
  en: No third-party tracking cookies or analytics
  verified_by_human: []
promises.no_third_party_tracking.description:
  context: Privacy promise description — no third-party tracking
  en: We do not use Google Analytics, Plausible, PostHog, Mixpanel, Amplitude, Segment, or any other third-party analytics platform. Our telemetry is server-side, cookie-free, and contains no individually stored identifiers. A pre-edit check in our repository blocks the introduction of analytics SDKs.
  verified_by_human: []
promises.pii_placeholder_substitution.heading:
  context: Privacy promise heading — PII placeholder substitution
  en: Personal information never reaches AI providers
  verified_by_human: []
promises.pii_placeholder_substitution.description:
  context: Privacy promise description — PII placeholder substitution
  en: Before any message is sent to an AI provider, your browser detects 32 categories of personal data — emails, phone numbers, credit card numbers, API keys, and more — and replaces them with placeholders like `[EMAIL_com]`. The substitution map is encrypted with your chat key so only your devices can restore the original values.
  verified_by_human: []
promises.telemetry_privacy_filter.heading:
  context: Privacy promise heading — telemetry privacy filter
  en: Telemetry stripped of sensitive data
  verified_by_human: []
promises.telemetry_privacy_filter.description:
  context: Privacy promise description — telemetry privacy filter
  en: Our internal tracing pipeline (OpenTelemetry) strips authentication headers, cookies, and database statements from every span, and pseudonymises your user ID with a salt that rotates every 24 hours. Regular users never have their raw identifiers in telemetry.
  verified_by_human: []
promises.cryptographic_erasure.heading:
  context: Privacy promise heading — cryptographic erasure
  en: Deleted accounts are cryptographically erased
  verified_by_human: []
promises.cryptographic_erasure.description:
  context: Privacy promise description — cryptographic erasure
  en: When you delete your account, the first step destroys your encryption keys. Any residual ciphertext in backups, caches, or audit logs is rendered permanently unreadable — no key, no content.
  verified_by_human: []
promises.argon2_password_hashing.heading:
  context: Privacy promise heading — Argon2 password hashing
  en: Passwords stored as Argon2 hashes
  verified_by_human: []
promises.argon2_password_hashing.description:
  context: Privacy promise description — Argon2 password hashing
  en: We store password and backup-code verifiers as Argon2 hashes. Plaintext passwords are never persisted to disk, never written to logs, and never recoverable — even by us.
  verified_by_human: []
promises.payment_data_minimization.heading:
  context: Privacy promise heading — payment data minimization
  en: No card numbers ever touch our servers
  verified_by_human: []
promises.payment_data_minimization.description:
  context: Privacy promise description — payment data minimization
  en: Payments flow directly from your browser to Stripe or Polar. We store only their provider tokens and customer identifiers. We never see, receive, or persist full card numbers, security codes, or bank account details.
  verified_by_human: []
promises.logging_redaction.heading:
  context: Privacy promise heading — logging redaction
  en: Logs are scrubbed of sensitive data
  verified_by_human: []
promises.logging_redaction.description:
  context: Privacy promise description — logging redaction
  en: Every log line passes through a redaction filter that strips email addresses, IP addresses, bearer tokens, and password values. Compliance logs preserve pseudonymous user IDs but remove all other personal data.
  verified_by_human: []
promises.prompt_injection_defense.heading:
  context: Privacy promise heading — prompt injection defense
  en: Defense against prompt injection
  verified_by_human: []
promises.prompt_injection_defense.description:
  context: Privacy promise description — prompt injection defense
  en: Two layers protect your conversations from malicious content in web pages, files, and URLs you reference. Invisible Unicode characters are stripped first, then a dedicated safety model detects semantic injection attempts and blocks or replaces high-risk content before it reaches your assistant.
  verified_by_human: []
promises.no_training_on_user_data.heading:
  context: Privacy promise heading — no training on user data
  en: Your conversations are not used to train AI models
  verified_by_human: []
promises.no_training_on_user_data.description:
  context: Privacy promise description — no training on user data
  en: "All AI chat providers we use (Anthropic, OpenAI, Mistral, Google Gemini, Google Vertex AI, Together AI, Groq, Cerebras, and OpenRouter) have explicit no-training clauses in their terms — your conversations are never used to fine-tune, evaluate, or otherwise train AI models. For image generation, Recraft has a training opt-out which we have activated. fal.ai (used for draft image generation) may use anonymized, aggregated derivatives of prompts for model improvement under their standard API terms; no full opt-out is available outside an enterprise contract. A per-provider audit with verbatim policy quotes and verification dates is published in our open-source repository."
  verified_by_human: []
promises.no_external_resources.heading:
  context: Privacy promise heading — no external images or scripts
  en: The web app never loads external images or scripts
  verified_by_human: []
promises.no_external_resources.description:
  context: Privacy promise description — no external images or scripts
  en: "Every external image, favicon, or preview shown in the app is fetched through our own preview.openmates.org proxy — the originating website never sees your IP address. The only third-party scripts the web app loads are the payment SDKs (Stripe and Polar) needed to process a purchase, and those only when you explicitly open the payment flow. There is no ad network, tag manager, CDN font loader, or third-party analytics library."
  verified_by_human: []
promises.cli_no_credential_prompts.heading:
  context: Privacy promise heading — CLI never prompts for credentials
  en: The command-line tool never asks for your password
  verified_by_human: []
promises.cli_no_credential_prompts.description:
  context: Privacy promise description — CLI never prompts for credentials
  en: "The OpenMates CLI never prompts you for your email, password, 2FA code, or any other login credential. Authentication uses a browser-based pair-auth handshake: the CLI shows a QR code and URL, you approve the session in your logged-in web browser, and you type a short 6-character binding PIN back into the CLI to confirm. Your credentials never pass through the terminal."
  verified_by_human: []
promises.open_source_transparency.heading:
  context: Privacy promise heading — open source transparency
  en: Every claim on this page is independently auditable
  verified_by_human: []
promises.open_source_transparency.description:
  context: Privacy promise description — open source transparency
  en: OpenMates is open source. Every promise above is backed by code you can read, tests you can run, and architecture documents you can audit in our public repository. Our privacy-promises registry links each claim to the exact files that enforce it.
  verified_by_human: []
