  en: >-
    FAL hosts Flux image generation models used by the images.generate_draft
    skill. FAL receives your image generation prompts and, when editing, the
    source images you supply.
  de: FAL hostet Flux-Bilderzeugungsmodelle, die vom Skill images.generate_draft verwendet werden. FAL erhält deine Prompts zur Bilderzeugung und, bei der Bearbeitung, die von dir bereitgestellten Quellbilder.
  zh: FAL 托管了 images.generate_draft 技能所使用的 Flux 图像生成模型。FAL 会接收您的图像生成提示词，并在编辑时接收您提供的源图像。
  es: FAL aloja modelos de generación de imágenes Flux utilizados por la habilidad images.generate_draft. FAL recibe tus instrucciones de generación de imágenes y, al editar, las imágenes de origen que proporciones.
  pt: A FAL aloja modelos de geração de imagem Flux utilizados pela skill images.generate_draft. A FAL recebe os teus prompts de geração de imagem e, ao editar, as imagens de origem que forneces.
  ja: FALは、images.generate_draftスキルで使用されるFlux画像生成モデルをホストしている。FALは画像生成プロンプトを受信し、編集時には提供されたソース画像も受信する。
  ko: FAL은 images.generate_draft 스킬에서 사용되는 Flux 이미지 생성 모델을 호스팅합니다. FAL은 이미지 생성 프롬프트를 수신하며, 편집 시에는 사용자가 제공한 원본 이미지를 수신합니다.
  it: FAL ospita i modelli di generazione di immagini Flux utilizzati dalla skill images.generate_draft. FAL riceve i tuoi prompt di generazione di immagini e, in caso di modifica, le immagini sorgente che fornisci.
  tr: FAL, images.generate_draft yeteneği tarafından kullanılan Flux görsel oluşturma modellerine ev sahipliği yapar. FAL, görsel oluşturma istemlerini ve düzenleme yaparken sağladığın kaynak görselleri alır.
  vi: FAL lưu trữ các mô hình tạo hình ảnh Flux được sử dụng bởi kỹ năng images.generate_draft. FAL nhận các câu lệnh tạo hình ảnh của bạn và các hình ảnh nguồn bạn cung cấp khi chỉnh sửa.
  id: FAL menghosting model pembuatan gambar Flux yang digunakan oleh keahlian images.generate_draft. FAL menerima perintah pembuatan gambarmu dan, saat mengedit, gambar sumber yang kamu berikan.
  pl: FAL hostuje modele generowania obrazów Flux używane przez umiejętność images.generate_draft. FAL otrzymuje Twoje polecenia generowania obrazów oraz, w przypadku edycji, dostarczone przez Ciebie obrazy źródłowe.
  nl: FAL host Flux-beeldgeneratiemodellen die worden gebruikt door de skill images.generate_draft. FAL ontvangt je prompts voor beeldgeneratie en, bij bewerking, de bronafbeeldingen die je verstrekt.
  hi: FAL उन Flux इमेज जनरेशन मॉडल को होस्ट करता है जिनका उपयोग images.generate_draft स्किल द्वारा किया जाता है। FAL आपके इमेज जनरेशन प्रॉम्प्ट और एडिटिंग के दौरान आपके द्वारा दी गई सोर्स इमेज प्राप्त करता है।
  th: FAL โฮสต์โมเดลการสร้างรูปภาพ Flux ที่ใช้โดยทักษะ images.generate_draft โดย FAL จะได้รับพรอมต์การสร้างรูปภาพของคุณ และรูปภาพต้นฉบับที่คุณระบุเมื่อมีการแก้ไข
  sv: FAL är värd för Flux-bildgenereringsmodeller som används av färdigheten images.generate_draft. FAL tar emot dina instruktioner för bildgenerering och, vid redigering, källbilderna du tillhandahåller.
  fr: "FAL héberge les modèles de génération d'images Flux utilisés par la compétence images.generate_draft. FAL reçoit tes instructions de génération d'images et, lors de l'édition, les images sources que tu fournis."
  ar: تستضيف FAL نماذج إنشاء الصور Flux المستخدمة بواسطة مهارة images.generate_draft. تتلقى FAL مطالبات إنشاء الصور الخاصة بك، وعند التحرير، الصور المصدر التي تقدمها.
  cs: FAL hostuje modely pro generování obrázků Flux používané dovedností images.generate_draft. FAL přijímá tvá zadání pro generování obrázků a při úpravách také zdrojové obrázky, které poskytneš.
  ru: FAL размещает модели генерации изображений Flux, используемые навыком images.generate_draft. FAL получает твои промпты для генерации изображений и, при редактировании, предоставленные тобой исходные изображения.
  he: FAL מארחת מודלי יצירת תמונות Flux המשמשים את המיומנות images.generate_draft. FAL מקבלת את הנחיות יצירת התמונה שלך, ובעת עריכה, את תמונות המקור שסיפקת.
  verified_by_human: []
