legal_rights.gdpr.exercise:
  context: How to exercise GDPR rights
  en: To exercise your GDPR rights, contact us at contact@openmates.org or via the Imprint. We may need to verify your identity before fulfilling your request.
  de: Um Ihre DSGVO-Rechte auszuüben, kontaktieren Sie uns unter contact@openmates.org oder über das Impressum. Wir müssen möglicherweise Ihre Identität vor der Erfüllung Ihrer Anfrage überprüfen.
  zh: 如需行使您的GDPR权利，请通过contact@openmates.org或通过版权信息联系我们。在履行您的请求之前，我们可能需要验证您的身份。
  es: Para ejercer sus derechos en virtud del RGPD, contáctenos en contact@openmates.org o a través del Aviso Legal. Es posible que necesitemos verificar su identidad antes de atender su solicitud.
  fr: Pour exercer vos droits RGPD, contactez-nous à contact@openmates.org ou via la page Mentions légales. Nous pourrions avoir besoin de vérifier votre identité avant de répondre à votre demande.
  pt: Para exercer os seus direitos ao abrigo do RGPD, contacte-nos em contact@openmates.org ou através do Aviso Legal. Poderemos precisar verificar a sua identidade antes de atender o seu pedido.
  ru: Чтобы воспользоваться правами по GDPR, свяжитесь с нами по адресу contact@openmates.org или через Импринт. Перед выполнением запроса нам может потребоваться подтвердить вашу личность.
  ja: GDPRの権利を行使するには、contact@openmates.orgまたはインプリントを通じてお問い合わせください。リクエストを処理する前に、お客様の身元を確認させていただく場合があります。
  ko: GDPR 권리를 행사하려면 contact@openmates.org 또는 임프린트를 통해 문의하세요. 요청 처리 전에 신원 확인이 필요할 수 있습니다.
  it: Per esercitare i tuoi diritti GDPR, contattaci all'indirizzo contact@openmates.org o tramite la pagina Imprint. Potremmo dover verificare la tua identità prima di soddisfare la tua richiesta.
  tr: GDPR haklarınızı kullanmak için contact@openmates.org adresinden veya Künye aracılığıyla bizimle iletişime geçin. Talebinizi yerine getirmeden önce kimliğinizi doğrulamamız gerekebilir.
  vi: Để thực hiện quyền GDPR của bạn, hãy liên hệ với chúng tôi tại contact@openmates.org hoặc qua trang Imprint. Chúng tôi có thể cần xác minh danh tính của bạn trước khi thực hiện yêu cầu.
  id: Untuk menggunakan hak GDPR Anda, hubungi kami di contact@openmates.org atau melalui Imprint. Kami mungkin perlu memverifikasi identitas Anda sebelum memenuhi permintaan Anda.
  pl: Aby skorzystać z praw RODO, skontaktuj się z nami pod adresem contact@openmates.org lub przez stronę Impressum. Przed realizacją wniosku możemy potrzebować zweryfikować Twoją tożsamość.
  nl: Om uw AVG-rechten uit te oefenen, neem contact met ons op via contact@openmates.org of via de Imprint. We moeten mogelijk uw identiteit verifiëren voordat we uw verzoek uitvoeren.
  ar: لممارسة حقوقك بموجب اللائحة العامة لحماية البيانات، تواصل معنا على contact@openmates.org أو عبر صفحة الإقرار. قد نحتاج إلى التحقق من هويتك قبل تلبية طلبك.
  hi: अपने GDPR अधिकारों का प्रयोग करने के लिए, contact@openmates.org पर या इम्प्रिंट के माध्यम से हमसे संपर्क करें। आपके अनुरोध को पूरा करने से पहले हमें आपकी पहचान सत्यापित करने की आवश्यकता हो सकती है।
  th: เพื่อใช้สิทธิ์ GDPR ของคุณ โปรดติดต่อเราที่ contact@openmates.org หรือผ่านหน้า Imprint เราอาจต้องยืนยันตัวตนของคุณก่อนดำเนินการตามคำขอ
  cs: Chcete-li uplatnit svá práva podle GDPR, kontaktujte nás na contact@openmates.org nebo prostřednictvím stránky Impressum. Před splněním vašeho požadavku možná budeme muset ověřit vaši totožnost.
  sv: För att utöva dina GDPR-rättigheter, kontakta oss på contact@openmates.org eller via Impressum. Vi kan behöva verifiera din identitet innan vi uppfyller din begäran.
  verified_by_human: []
  he: לממש את זכויות ה-GDPR שלך, צור קשר עם contact@openmates.org או דרך האימפרינט. ייתכן שנצטרך לאמת את זהותך.
