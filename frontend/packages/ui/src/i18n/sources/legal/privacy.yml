legal_rights.ccpa_cpra.exercise:
  context: How to exercise CCPA rights
  en: California residents can exercise CCPA/CPRA rights by contacting us at contact@openmates.org. We do not sell personal information.
  de: Einwohner Kaliforniens können ihre CCPA/CPRA-Rechte ausüben, indem sie uns unter contact@openmates.org kontaktieren. Wir verkaufen keine personenbezogenen Daten.
  zh: 加利福尼亚州居民可以通过联系contact@openmates.org行使CCPA/CPRA权利。我们不出售个人信息。
  es: Los residentes de California pueden ejercer sus derechos CCPA/CPRA contactándonos en contact@openmates.org. No vendemos información personal.
  fr: Les résidents de Californie peuvent exercer leurs droits CCPA/CPRA en nous contactant à contact@openmates.org. Nous ne vendons pas d'informations personnelles.
  pt: Os residentes da Califórnia podem exercer os direitos CCPA/CPRA contactando-nos em contact@openmates.org. Não vendemos informações pessoais.
  ru: Жители Калифорнии могут воспользоваться правами по CCPA/CPRA, связавшись с нами по адресу contact@openmates.org. Мы не продаём персональные данные.
  ja: カリフォルニア州の居住者は、contact@openmates.orgにお問い合わせいただくことでCCPA/CPRAの権利を行使できます。個人情報の販売は行いません。
  ko: 캘리포니아 거주자는 contact@openmates.org로 문의하여 CCPA/CPRA 권리를 행사할 수 있습니다. 당사는 개인정보를 판매하지 않습니다.
  it: I residenti in California possono esercitare i diritti CCPA/CPRA contattandoci all'indirizzo contact@openmates.org. Non vendiamo informazioni personali.
  tr: Kaliforniya sakinleri, contact@openmates.org adresinden bizimle iletişime geçerek CCPA/CPRA haklarını kullanabilir. Kişisel bilgileri satmıyoruz.
  vi: Cư dân California có thể thực hiện quyền CCPA/CPRA bằng cách liên hệ với chúng tôi tại contact@openmates.org. Chúng tôi không bán thông tin cá nhân.
  id: Warga California dapat menggunakan hak CCPA/CPRA dengan menghubungi kami di contact@openmates.org. Kami tidak menjual informasi pribadi.
  pl: Mieszkańcy Kalifornii mogą korzystać z praw CCPA/CPRA, kontaktując się z nami pod adresem contact@openmates.org. Nie sprzedajemy danych osobowych.
  nl: Inwoners van Californië kunnen CCPA/CPRA-rechten uitoefenen door contact met ons op te nemen via contact@openmates.org. Wij verkopen geen persoonsgegevens.
  ar: يمكن لسكان كاليفورنيا ممارسة حقوق CCPA/CPRA عن طريق التواصل معنا على contact@openmates.org. نحن لا نبيع المعلومات الشخصية.
  hi: कैलिफ़ोर्निया निवासी contact@openmates.org पर संपर्क करके CCPA/CPRA अधिकारों का प्रयोग कर सकते हैं। हम व्यक्तिगत जानकारी नहीं बेचते।
  th: ผู้อยู่อาศัยในแคลิฟอร์เนียสามารถใช้สิทธิ์ CCPA/CPRA ได้โดยติดต่อเราที่ contact@openmates.org เราไม่ขายข้อมูลส่วนบุคคล
  cs: Obyvatelé Kalifornie mohou uplatnit práva CCPA/CPRA kontaktováním na contact@openmates.org. Neprodáváme osobní údaje.
  sv: Invånare i Kalifornien kan utöva CCPA/CPRA-rättigheter genom att kontakta oss på contact@openmates.org. Vi säljer inte personuppgifter.
  verified_by_human: []
  he: תושבי קליפורניה יכולים לממש את זכויות CCPA/CPRA שלהם על ידי יצירת קשר עם contact@openmates.org. איננו מוכרים נתונים אישיים.
