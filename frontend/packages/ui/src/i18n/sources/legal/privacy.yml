protection.intro:
  context: Intro paragraph for the six protection measures
  en: >-
    We rely on six technical measures to protect your data. Each is verifiable
    in our open-source code and maps to a specific GDPR obligation.
  de: >-
    Wir verlassen uns auf sechs technische Maßnahmen zum Schutz deiner Daten.
    Jede ist in unserem Open-Source-Code überprüfbar und entspricht einer
    bestimmten DSGVO-Verpflichtung.
  zh: 我们依靠六项技术措施来保护你的数据。每一项都可以在我们的开源代码中验证，并对应特定的 GDPR 义务。
  es: >-
    Nos basamos en seis medidas técnicas para proteger tus datos. Cada una es
    verificable en nuestro código abierto y corresponde a una obligación
    específica del RGPD.
  fr: >-
    Nous nous appuyons sur six mesures techniques pour protéger tes données.
    Chacune est vérifiable dans notre code open-source et correspond à une
    obligation spécifique du RGPD.
  pt: >-
    Nós dependemos de seis medidas técnicas para proteger seus dados. Cada uma
    é verificável em nosso código aberto e corresponde a uma obrigação
    específica do RGPD.
  ru: >-
    Мы используем шесть технических мер для защиты ваших данных. Каждая
    проверяема в нашем открытом исходном коде и соответствует конкретному
    обязательству по GDPR.
  ja: >-
    お客様のデータを保護するために、6 つの技術的対策を採用しています。それぞれ、当社のオープンソースコードで検証可能であり、特定の
    GDPR 義務に対応しています。
  ko: >-
    우리는 데이터를 보호하기 위해 6가지 기술적 조치에 의존합니다. 각각은 오픈소스 코드에서 검증 가능하며 특정 GDPR 의무에
    대응합니다.
  it: >-
    Ci basiamo su sei misure tecniche per proteggere i tuoi dati. Ciascuna è
    verificabile nel nostro codice open-source e corrisponde a uno specifico
    obbligo del GDPR.
  tr: >-
    Verilerinizi korumak için altı teknik önleme dayanıyoruz. Her biri açık
    kaynak kodumuzda doğrulanabilir ve belirli bir GDPR yükümlülüğüne karşılık
    gelir.
  vi: >-
    Chúng tôi dựa vào sáu biện pháp kỹ thuật để bảo vệ dữ liệu của bạn. Mỗi
    biện pháp có thể xác minh trong mã nguồn mở của chúng tôi và tương ứng
    với một nghĩa vụ GDPR cụ thể.
  id: >-
    Kami mengandalkan enam tindakan teknis untuk melindungi data Anda.
    Masing-masing dapat diverifikasi dalam kode sumber terbuka kami dan
    dipetakan ke kewajiban GDPR tertentu.
  pl: >-
    Opieramy się na sześciu środkach technicznych, aby chronić twoje dane.
    Każdy z nich jest weryfikowalny w naszym kodzie open-source i odpowiada
    konkretnemu obowiązkowi wynikającemu z RODO.
  nl: >-
    We vertrouwen op zes technische maatregelen om je gegevens te beschermen.
    Elk is verifieerbaar in onze open-source code en komt overeen met een
    specifieke AVG-verplichting.
  ar: >-
    نعتمد على ستة تدابير تقنية لحماية بياناتك. كل منها قابل للتحقق في الكود
    مفتوح المصدر لدينا ويطابق التزامًا محددًا بموجب اللائحة العامة لحماية
    البيانات.
  hi: >-
    हम आपके डेटा की सुरक्षा के लिए छह तकनीकी उपायों पर भरोसा करते हैं। प्रत्येक
    हमारे ओपन-सोर्स कोड में सत्यापन योग्य है और एक विशिष्ट GDPR दायित्व से
    मेल खाता है।
  th: >-
    เราพึ่งพามาตรการทางเทคนิคหกประการเพื่อปกป้องข้อมูลของคุณ แต่ละมาตรการสามารถตรวจสอบได้ในโค้ดโอเพนซอร์สของเรา
    และสอดคล้องกับข้อผูกพัน GDPR เฉพาะ
  cs: >-
    Spoléháme na šest technických opatření k ochraně vašich dat. Každé je
    ověřitelné v našem open-source kódu a odpovídá konkrétní povinnosti podle
    GDPR.
  sv: >-
    Vi förlitar oss på sex tekniska åtgärder för att skydda din data. Var och
    en är verifierbar i vår öppna källkod och motsvarar en specifik
    GDPR-skyldighet.
  he: >-
    אנו מסתמכים על שישה אמצעים טכניים להגנה על הנתונים שלך. כל אחד ניתן לאימות
    בקוד הפתוח שלנו ומתאים לחובה ספציפית לפי GDPR.
  verified_by_human: []
