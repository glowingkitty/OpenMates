providers.ai_models.openrouter.description:
  context: OpenRouter description
  en: >-
    OpenRouter is used as a routing aggregator for several third-party models,
    including Cerebras-hosted models. OpenRouter sees your chat messages with
    PII placeholders substituted client-side and forwards them to the
    underlying model host.
  de: OpenRouter wird als Routing-Aggregator für mehrere Drittanbieter-Modelle verwendet, einschließlich von Cerebras gehosteter Modelle. OpenRouter sieht deine Chat-Nachrichten mit clientseitig ersetzten PII-Platzhaltern und leitet sie an den zugrunde liegenden Modell-Host weiter.
  zh: OpenRouter 作为多个第三方模型（包括 Cerebras 托管的模型）的路由聚合器。OpenRouter 会看到 PII 占位符已在客户端替换后的聊天消息，并将其转发给底层的模型托管商。
  es: OpenRouter se utiliza como agregador de enrutamiento para varios modelos de terceros, incluidos los modelos alojados en Cerebras. OpenRouter ve tus mensajes de chat con los marcadores de PII sustituidos en el lado del cliente y los reenvía al host del modelo subyacente.
  pt: O OpenRouter é utilizado como um agregador de encaminhamento para vários modelos de terceiros, incluindo modelos alojados pela Cerebras. O OpenRouter vê as tuas mensagens de chat com marcadores de PII substituídos no lado do cliente e encaminha-as para o anfitrião do modelo subjacente.
  ja: OpenRouterは、Cerebrasがホストするモデルを含む、複数のサードパーティモデルのルーティングアグリゲーターとして使用される。OpenRouterは、クライアント側でPIIプレースホルダーに置換されたチャットメッセージを参照し、それを基盤となるモデルホストに転送する。
  ko: OpenRouter는 Cerebras 호스팅 모델을 포함한 여러 서드파티 모델의 라우팅 애그리게이터로 사용됩니다. OpenRouter는 클라이언트 측에서 PII 자리표시자가 대체된 채팅 메시지를 확인하고 이를 기본 모델 호스트로 전달합니다.
  it: "OpenRouter viene utilizzato come aggregatore di routing per diversi modelli di terze parti, inclusi i modelli ospitati da Cerebras. OpenRouter vede i tuoi messaggi di chat con i segnaposto PII sostituiti lato client e li inoltra all'host del modello sottostante."
  tr: OpenRouter, Cerebras tarafından barındırılan modeller de dahil olmak üzere çeşitli üçüncü taraf modeller için bir yönlendirme toplayıcı olarak kullanılır. OpenRouter, sohbet mesajlarını PII yer tutucuları istemci tarafında değiştirilmiş olarak görür ve bunları ilgili model ana bilgisayarına iletir.
  vi: OpenRouter được sử dụng làm bộ tổng hợp định tuyến cho một số mô hình bên thứ ba, bao gồm các mô hình do Cerebras lưu trữ. OpenRouter thấy tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế ở phía máy khách và chuyển tiếp chúng đến máy chủ lưu trữ mô hình cơ sở.
  id: OpenRouter digunakan sebagai agregator perutean untuk beberapa model pihak ketiga, termasuk model yang dihosting Cerebras. OpenRouter melihat pesan obrolanmu dengan placeholder PII yang diganti di sisi klien dan meneruskannya ke host model yang mendasarinya.
  pl: OpenRouter służy jako agregator routingu dla kilku modeli zewnętrznych, w tym modeli hostowanych przez Cerebras. OpenRouter widzi Twoje wiadomości czatu z symbolami zastępczymi PII podstawionymi po stronie klienta i przekazuje je do hosta danego modelu.
  nl: OpenRouter wordt gebruikt als routing-aggregator voor verschillende modellen van derden, waaronder modellen die door Cerebras worden gehost. OpenRouter ziet je chatberichten met aan de clientzijde vervangen PII-placeholders en stuurt deze door naar de onderliggende model-host.
  hi: OpenRouter का उपयोग Cerebras-होस्टेड मॉडल सहित कई थर्ड-पार्टी मॉडल के लिए रूटिंग एग्रीगेटर के रूप में किया जाता है। OpenRouter आपके चैट संदेशों को क्लाइंट-साइड पर बदले गए PII प्लेसहोल्डर्स के साथ देखता है और उन्हें संबंधित मॉडल होस्ट को फॉरवर्ड करता है।
  th: OpenRouter ถูกใช้เป็นตัวรวบรวมการกำหนดเส้นทางสำหรับโมเดลจากบุคคลที่สามหลายราย รวมถึงโมเดลที่โฮสต์โดย Cerebras โดย OpenRouter จะเห็นข้อความแชทของคุณที่แทนที่ตัวสำรอง PII จากฝั่งไคลเอนต์แล้ว และส่งต่อไปยังผู้โฮสต์โมเดลต้นทาง
  sv: OpenRouter används som en routing-aggregator för flera tredjepartsmodeller, inklusive modeller hostade av Cerebras. OpenRouter ser dina chattmeddelanden med PII-platshållare utbytta på klientsidan och skickar dem vidare till den underliggande modellvärden.
  fr: "OpenRouter est utilisé comme agrégateur de routage pour plusieurs modèles tiers, y compris les modèles hébergés par Cerebras. OpenRouter voit tes messages de chat avec les espaces réservés PII substitués côté client et les transmet à l'hôte du modèle sous-jacent."
  ar: يُستخدم OpenRouter كمجمع توجيه للعديد من نماذج الجهات الخارجية، بما في ذلك النماذج التي تستضيفها Cerebras. يرى OpenRouter رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية في متصفحك ويوجهها إلى مضيف النموذج الأساسي.
  cs: OpenRouter se používá jako agregátor směrování pro několik modelů třetích stran, včetně modelů hostovaných společností Cerebras. OpenRouter vidí tvé zprávy s osobními údaji (PII) nahrazenými na straně klienta a předává je hostiteli daného modelu.
  ru: OpenRouter используется как агрегатор маршрутизации для нескольких сторонних моделей, включая модели, размещенные на Cerebras. OpenRouter видит твои сообщения в чате с замененными на стороне клиента персональными данными и пересылает их хосту соответствующей модели.
  he: "OpenRouter משמש כאגרגטור ניתוב עבור מספר מודלים של צד שלישי, כולל מודלים המארחים על ידי Cerebras. OpenRouter רואה את הודעות הצ'אט שלך עם ממלאי מקום ל-PII שהוחלפו בצד הלקוח ומעבירה אותן למארח המודל הבסיסי."
  verified_by_human: []
