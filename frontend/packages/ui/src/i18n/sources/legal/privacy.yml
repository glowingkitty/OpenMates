protection.hashed_identifiers.description:
  context: Description of hashed identifiers and zero-knowledge password verification
  en: >-
    Your user ID is stored in most database tables as a SHA-256 hash rather
    than as a direct reference. Login uses a zero-knowledge password
    verification flow: we verify that you know your password without ever
    learning it. API-key device records anonymize the IP address to its first
    two octets before encryption, so we can recognize a device without storing
    a precise location.
  de: "Deine Benutzer-ID wird in den meisten Datenbanktabellen als SHA-256-Hash statt als direkter Verweis gespeichert. Die Anmeldung nutzt ein Zero-Knowledge-Verfahren zur Passwortverifizierung: Wir prüfen, ob du dein Passwort kennst, ohne es jemals selbst zu erfahren. API-Key-Gerätedatensätze anonymisieren die IP-Adresse vor der Verschlüsselung auf die ersten zwei Oktette, sodass wir ein Gerät erkennen können, ohne einen genauen Standort zu speichern."
  zh: 你的用户 ID 在大多数数据库表中以 SHA-256 哈希值而非直接引用的形式存储。登录采用零知识密码验证流程：我们在不获取你密码的情况下验证你是否知晓密码。API 密钥设备记录在加密前会将 IP 地址匿名化为前两个八位字节，因此我们可以在不存储精确位置的情况下识别设备。
  es: "Tu ID de usuario se almacena en la mayoría de las tablas de la base de datos como un hash SHA-256 en lugar de una referencia directa. El inicio de sesión utiliza un flujo de verificación de contraseña de conocimiento cero: verificamos que conoces tu contraseña sin llegar a conocerla nunca. Los registros de dispositivos con clave de API anonimizan la dirección IP a sus dos primeros octetos antes del cifrado, para que podamos reconocer un dispositivo sin almacenar una ubicación precisa."
  ru: "Твой ID пользователя хранится в большинстве таблиц базы данных в виде хеша SHA-256, а не в виде прямой ссылки. Вход в систему использует процесс проверки пароля с нулевым разглашением: мы проверяем, что ты знаешь свой пароль, никогда не узнавая его. Записи устройств для API-ключей анонимизируют IP-адрес до первых двух октетов перед шифрованием, поэтому мы можем распознать устройство, не сохраняя точное местоположение."
  ja: ユーザーIDは、直接的な参照ではなく、SHA-256ハッシュとしてほとんどのデータベーステーブルに保存されます。ログインにはゼロ知識パスワード検証フローを使用しています。パスワードそのものを知ることなく、あなたがパスワードを知っていることを検証します。APIキーのデバイス記録では、暗号化前にIPアドレスの最初の2オクテットを匿名化するため、正確な位置情報を保存せずにデバイスを認識できます。
  ko: 사용자 ID는 직접적인 참조 대신 SHA-256 해시로 대부분의 데이터베이스 테이블에 저장됩니다. 로그인은 영지식(zero-knowledge) 비밀번호 검증 흐름을 사용합니다. 즉, 비밀번호 자체를 배우지 않고도 사용자가 비밀번호를 알고 있는지 확인합니다. API 키 기기 기록은 암호화 전에 IP 주소의 처음 두 옥텟만 남기고 익명화하므로, 정확한 위치를 저장하지 않고도 기기를 인식할 수 있습니다.
  it: "Il tuo ID utente è memorizzato nella maggior parte delle tabelle del database come hash SHA-256 anziché come riferimento diretto. L'accesso utilizza un flusso di verifica della password zero-knowledge: verifichiamo che tu conosca la tua password senza mai apprenderla. I record dei dispositivi con chiave API anonimizzano l'indirizzo IP ai primi due ottetti prima della crittografia, così possiamo riconoscere un dispositivo senza memorizzare una posizione precisa."
  tr: "Kullanıcı kimliğin, çoğu veritabanı tablosunda doğrudan bir referans yerine SHA-256 karması olarak saklanır. Giriş işlemi sıfır bilgi (zero-knowledge) şifre doğrulama akışını kullanır: Şifreni asla öğrenmeden, onu bildiğini doğrularız. API anahtarı cihaz kayıtları, şifrelemeden önce IP adresini ilk iki oktetine kadar anonimleştirir; böylece kesin bir konum saklamadan bir cihazı tanıyabiliriz."
  vi: "ID người dùng của bạn được lưu trữ trong hầu hết các bảng cơ sở dữ liệu dưới dạng mã băm SHA-256 thay vì tham chiếu trực tiếp. Việc đăng nhập sử dụng quy trình xác minh mật khẩu không tri thức (zero-knowledge): chúng tôi xác minh rằng bạn biết mật khẩu của mình mà không bao giờ thực sự biết mật khẩu đó là gì. Các bản ghi thiết bị khóa API ẩn danh địa chỉ IP thành hai bộ tám (octet) đầu tiên trước khi mã hóa, vì vậy chúng tôi có thể nhận diện thiết bị mà không cần lưu trữ vị trí chính xác."
  id: "ID penggunamu disimpan di sebagian besar tabel basis data sebagai hash SHA-256, bukan sebagai referensi langsung. Login menggunakan alur verifikasi kata sandi zero-knowledge: kami memverifikasi bahwa kamu mengetahui kata sandimu tanpa pernah mempelajarinya. Catatan perangkat kunci API menganonimkan alamat IP ke dua oktet pertamanya sebelum enkripsi, sehingga kami dapat mengenali perangkat tanpa menyimpan lokasi yang tepat."
  pl: "Twój identyfikator użytkownika jest przechowywany w większości tabel bazy danych jako skrót SHA-256, a nie jako bezpośrednie odniesienie. Logowanie wykorzystuje przepływ weryfikacji hasła typu zero-knowledge: sprawdzamy, czy znasz swoje hasło, nigdy go nie poznając. Rekordy urządzeń z kluczami API anonimizują adres IP do jego pierwszych dwóch oktetów przed zaszyfrowaniem, dzięki czemu możemy rozpoznać urządzenie bez przechowywania dokładnej lokalizacji."
  nl: "Je gebruikers-ID wordt in de meeste databasetabellen opgeslagen als een SHA-256 hash in plaats van als een directe referentie. Inloggen maakt gebruik van een zero-knowledge wachtwoordverificatie: we verifiëren dat je je wachtwoord kent zonder het ooit zelf te weten te komen. API-sleutel apparaatgegevens anonimiseren het IP-adres tot de eerste twee octetten vóór versleuteling, zodat we een apparaat kunnen herkennen zonder een exacte locatie op te slaan."
  ar: "يتم تخزين معرف المستخدم الخاص بك في معظم جداول قاعدة البيانات كرمز SHA-256 بدلاً من مرجع مباشر. تستخدم عملية تسجيل الدخول تدفقاً للتحقق من كلمة المرور بمعرفة صفرية: نتحقق من معرفتك لكلمة المرور دون أن نعرفها أبداً. تقوم سجلات أجهزة مفاتيح API بإخفاء هوية عنوان IP إلى أول قسمين منه قبل التشفير، حتى نتمكن من التعرف على الجهاز دون تخزين موقع دقيق."
  hi: "तुम्हारी यूज़र आईडी अधिकांश डेटाबेस टेबल में सीधे संदर्भ के बजाय SHA-256 हैश के रूप में संग्रहीत की जाती है। लॉगिन एक ज़ीरो-नॉलेज पासवर्ड वेरिफिकेशन फ़्लो का उपयोग करता है: हम यह सत्यापित करते हैं कि तुम अपना पासवर्ड जानते हो, बिना उसे कभी जाने। API-की डिवाइस रिकॉर्ड एन्क्रिप्शन से पहले IP पते को उसके पहले दो ऑक्टेट तक अनाम (anonymize) कर देते हैं, ताकि हम सटीक स्थान संग्रहीत किए बिना डिवाइस को पहचान सकें।"
  th: "ID ผู้ใช้ของคุณจะถูกจัดเก็บในตารางฐานข้อมูลส่วนใหญ่เป็นรหัสแฮช SHA-256 แทนที่จะเป็นการอ้างอิงโดยตรง การเข้าสู่ระบบใช้กระบวนการตรวจสอบรหัสผ่านแบบ zero-knowledge: เราตรวจสอบว่าคุณรู้รหัสผ่านของคุณโดยที่เราไม่เคยล่วงรู้รหัสผ่านนั้นเลย บันทึกอุปกรณ์ของคีย์ API จะทำให้ที่อยู่ IP เป็นนิรนามโดยเก็บเพียงสองส่วนแรกก่อนการเข้ารหัส เพื่อให้เราจดจำอุปกรณ์ได้โดยไม่ต้องจัดเก็บตำแหน่งที่แม่นยำ"
  cs: "Tvé ID uživatele je ve většině databázových tabulek uloženo jako hash SHA-256, nikoli jako přímý odkaz. Přihlášení využívá proces ověření hesla s nulovou znalostí: ověřujeme, že své heslo znáš, aniž bychom se ho kdy dozvěděli. Záznamy zařízení pro API klíče anonymizují IP adresu na její první dva oktety před šifrováním, takže můžeme rozpoznat zařízení bez ukládání přesné polohy."
  sv: "Ditt användar-ID lagras i de flesta databastabeller som en SHA-256-hash snarare än som en direktreferens. Inloggning använder ett flöde för lösenordsverifiering med nollkunskap (zero-knowledge): vi verifierar att du kan ditt lösenord utan att någonsin få reda på det. Enhetsposter för API-nycklar anonymiserar IP-adressen till dess två första oktetter före kryptering, så att vi kan känna igen en enhet utan att lagra en exakt plats."
  he: "מזהה המשתמש שלך נשמר ברוב טבלאות מסד הנתונים כגיבוב (hash) מסוג SHA-256 ולא כהפניה ישירה. ההתחברות משתמשת בתהליך אימות סיסמה מסוג \"אפס ידיעה\" (zero-knowledge): אנחנו מוודאים שאתה יודע את הסיסמה שלך מבלי ללמוד אותה לעולם. רישומי מכשירים של מפתחות API הופכים את כתובת ה-IP לאנונימית על ידי שמירת שני המקטעים הראשונים בלבד לפני ההצפנה, כך שנוכל לזהות מכשיר מבלי לשמור מיקום מדויק."
  pt: "Seu ID de usuário é armazenado na maioria das tabelas do banco de dados como um hash SHA-256, em vez de uma referência direta. O login utiliza um fluxo de verificação de senha de conhecimento zero: verificamos que você conhece sua senha sem nunca aprendê-la. Os registros de dispositivos com chave de API anonimizam o endereço IP para seus dois primeiros octetos antes da criptografia, para que possamos reconhecer um dispositivo sem armazenar uma localização precisa."
  fr: "Ton identifiant utilisateur est stocké dans la plupart des tables de la base de données sous forme de hachage SHA-256 plutôt que comme une référence directe. La connexion utilise un flux de vérification de mot de passe à connaissance nulle (zero-knowledge) : nous vérifions que tu connais ton mot de passe sans jamais l'apprendre. Les enregistrements d'appareils liés aux clés API anonymisent l'adresse IP en ne conservant que les deux premiers octets avant le chiffrement, afin que nous puissions reconnaître un appareil sans stocker de localisation précise."
  verified_by_human: []
