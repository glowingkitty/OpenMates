providers.ai_models.anthropic.description:
  context: Anthropic direct description
  en: >-
    Anthropic's direct API is used as a fallback path for Claude models when
    AWS Bedrock is unreachable. Anthropic is based in the US and receives your
    chat messages with PII placeholders already substituted client-side.
  de: Die direkte API von Anthropic wird als Fallback-Pfad für Claude-Modelle verwendet, wenn AWS Bedrock nicht erreichbar ist. Anthropic hat seinen Sitz in den USA und erhält deine Chat-Nachrichten mit bereits clientseitig ersetzten PII-Platzhaltern.
  zh: 当 AWS Bedrock 无法访问时，Anthropic 的直接 API 将作为 Claude 模型的备选路径。Anthropic 总部位于美国，接收您的聊天消息时，其中的 PII（个人身份信息）占位符已在客户端完成替换。
  es: La API directa de Anthropic se utiliza como ruta de respaldo para los modelos Claude cuando AWS Bedrock no está disponible. Anthropic tiene su sede en EE. UU. y recibe tus mensajes de chat con los marcadores de PII ya sustituidos en el lado del cliente.
  pt: A API direta da Anthropic é usada como um caminho de fallback para os modelos Claude quando o AWS Bedrock está inacessível. A Anthropic está sediada nos EUA e recebe as tuas mensagens de chat com marcadores de PII já substituídos no lado do cliente.
  ja: Anthropicの直接APIは、AWS Bedrockが利用できない場合のClaudeモデルのフォールバックパスとして使用される。Anthropicは米国を拠点としており、クライアント側でPII（個人を特定できる情報）プレースホルダーに置換済みのチャットメッセージを受信する。
  ko: Anthropic의 직접 API는 AWS Bedrock에 연결할 수 없을 때 Claude 모델을 위한 보조 경로로 사용됩니다. Anthropic은 미국에 기반을 두고 있으며, 클라이언트 측에서 PII 자리표시자가 이미 대체된 상태로 채팅 메시지를 수신합니다.
  it: "L'API diretta di Anthropic viene utilizzata come percorso di fallback per i modelli Claude quando AWS Bedrock non è raggiungibile. Anthropic ha sede negli Stati Uniti e riceve i tuoi messaggi di chat con i segnaposto PII già sostituiti lato client."
  tr: "Anthropic'in doğrudan API'si, AWS Bedrock'a ulaşılamadığında Claude modelleri için yedek yol olarak kullanılır. Anthropic ABD merkezlidir ve sohbet mesajlarını PII yer tutucuları istemci tarafında değiştirilmiş olarak alır."
  vi: API trực tiếp của Anthropic được sử dụng làm luồng dự phòng cho các mô hình Claude khi không thể kết nối với AWS Bedrock. Anthropic có trụ sở tại Hoa Kỳ và nhận tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế ở phía máy khách.
  id: API langsung Anthropic digunakan sebagai jalur cadangan untuk model Claude saat AWS Bedrock tidak dapat dijangkau. Anthropic berbasis di AS dan menerima pesan obrolanmu dengan placeholder PII yang sudah diganti di sisi klien.
  pl: Bezpośrednie API Anthropic jest używane jako ścieżka zapasowa dla modeli Claude, gdy AWS Bedrock jest nieosiągalny. Anthropic ma siedzibę w USA i otrzymuje Twoje wiadomości czatu z symbolami zastępczymi PII podstawionymi już po stronie klienta.
  nl: De directe API van Anthropic wordt gebruikt als fallback-pad voor Claude-modellen wanneer AWS Bedrock onbereikbaar is. Anthropic is gevestigd in de VS en ontvangt je chatberichten waarbij PII-placeholders al aan de clientzijde zijn vervangen.
  hi: Anthropic के डायरेक्ट API का उपयोग Claude मॉडल के लिए फ़ॉलबैक पाथ के रूप में किया जाता है जब AWS Bedrock उपलब्ध नहीं होता है। Anthropic अमेरिका में स्थित है और आपके चैट संदेशों को क्लाइंट-साइड पर पहले से ही बदले गए PII प्लेसहोल्डर्स के साथ प्राप्त करता है।
  th: API โดยตรงของ Anthropic ถูกใช้เป็นเส้นทางสำรองสำหรับโมเดล Claude เมื่อไม่สามารถเข้าถึง AWS Bedrock ได้ Anthropic ตั้งอยู่ในสหรัฐฯ และได้รับข้อความแชทของคุณที่แทนที่ตัวสำรอง PII เรียบร้อยแล้วจากฝั่งไคลเอนต์
  sv: Anthropics direkta API används som en reservväg för Claude-modeller när AWS Bedrock inte är tillgängligt. Anthropic är baserat i USA och tar emot dina chattmeddelanden med PII-platshållare redan utbytta på klientsidan.
  fr: "L'API directe d'Anthropic est utilisée comme solution de secours pour les modèles Claude lorsque AWS Bedrock est inaccessible. Anthropic est basé aux États-Unis et reçoit tes messages de chat avec les espaces réservés PII déjà substitués côté client."
  ar: تُستخدم واجهة برمجة التطبيقات المباشرة لشركة Anthropic كمسار احتياطي لنماذج Claude عندما يتعذر الوصول إلى AWS Bedrock. يقع مقر Anthropic في الولايات المتحدة وتتلقى رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية مسبقاً في متصفحك.
  cs: Přímé API Anthropic se používá jako záložní cesta pro modely Claude, když je AWS Bedrock nedostupný. Anthropic sídlí v USA a přijímá tvé zprávy s osobními údaji (PII) již nahrazenými zástupnými symboly na straně klienta.
  ru: Прямой API Anthropic используется как резервный путь для моделей Claude, когда AWS Bedrock недоступен. Anthropic базируется в США и получает твои сообщения в чате с уже замененными на стороне клиента персональными данными.
  he: "ה-API הישיר של Anthropic משמש כנתיב חלופי למודלי Claude כאשר AWS Bedrock אינו זמין. Anthropic ממוקמת בארה\"ב ומקבלת את הודעות הצ'אט שלך כשממלאי מקום ל-PII כבר הוחלפו בצד הלקוח."
  verified_by_human: []
