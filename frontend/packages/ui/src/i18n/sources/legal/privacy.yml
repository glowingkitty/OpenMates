providers.web_and_search.brave.description:
  context: Brave Search description
  en: >-
    Brave Search powers the web, videos, and news search skills. Brave sees
    the text of your search queries and your country and language preferences
    for localized results, but no user identifier.
  de: Brave Search betreibt die Such-Skills für Web, Videos und News. Brave sieht den Text deiner Suchanfragen sowie deine Länder- und Spracheinstellungen für lokalisierte Ergebnisse, aber keine Benutzerkennung.
  zh: Brave Search 为网页、视频和新闻搜索技能提供支持。Brave 会看到您的搜索查询文本以及用于提供本地化结果的国家和语言偏好，但不会看到用户标识符。
  es: Brave Search potencia las habilidades de búsqueda web, de vídeos y de noticias. Brave ve el texto de tus consultas de búsqueda y tus preferencias de país e idioma para obtener resultados localizados, pero ningún identificador de usuario.
  pt: O Brave Search alimenta as skills de pesquisa na web, vídeos e notícias. O Brave vê o texto das tuas consultas de pesquisa e as tuas preferências de país e idioma para resultados localizados, mas nenhum identificador de utilizador.
  ja: Brave Searchは、ウェブ、動画、ニュースの検索スキルを支えている。Braveは検索クエリのテキスト、およびローカライズされた結果を表示するための国と言語の設定を参照するが、ユーザー識別子は参照しない。
  ko: Brave Search는 웹, 동영상 및 뉴스 검색 스킬을 구동합니다. Brave는 검색 쿼리 텍스트와 현지화된 결과를 위한 국가 및 언어 설정을 확인하지만, 사용자 식별자는 확인하지 않습니다.
  it: Brave Search gestisce le skill di ricerca web, video e news. Brave vede il testo delle tue query di ricerca e le tue preferenze di paese e lingua per i risultati localizzati, ma nessun identificativo utente.
  tr: Brave Search; web, video ve haber arama yeteneklerine güç verir. Brave, arama sorgularının metnini ve yerelleştirilmiş sonuçlar için ülke ve dil tercihlerini görür ancak kullanıcı tanımlayıcısı görmez.
  vi: Brave Search cung cấp sức mạnh cho các kỹ năng tìm kiếm web, video và tin tức. Brave thấy văn bản của các truy vấn tìm kiếm và tùy chọn quốc gia, ngôn ngữ của bạn để có kết quả bản địa hóa, nhưng không có mã định danh người dùng.
  id: Brave Search mendukung keahlian pencarian web, video, dan berita. Brave melihat teks kueri pencarianmu serta preferensi negara dan bahasamu untuk hasil yang dilokalkan, tetapi tanpa pengenal pengguna.
  pl: Brave Search obsługuje umiejętności wyszukiwania w internecie, wideo i wiadomościach. Brave widzi tekst Twoich zapytań oraz preferencje dotyczące kraju i języka dla wyników lokalnych, ale bez identyfikatora użytkownika.
  nl: "Brave Search drijft de zoek-skills voor web, video's en nieuws aan. Brave ziet de tekst van je zoekopdrachten en je land- en taalvoorkeuren voor gelokaliseerde resultaten, maar geen gebruikers-ID."
  hi: Brave Search वेब, वीडियो और न्यूज़ सर्च स्किल्स को पावर देता है। Brave आपके सर्च क्वेरी के टेक्स्ट और स्थानीय परिणामों के लिए आपकी देश और भाषा की प्राथमिकताएं देखता है, लेकिन कोई यूज़र आइडेंटिफ़ायर नहीं।
  th: Brave Search ขับเคลื่อนทักษะการค้นหาเว็บ วิดีโอ และข่าวสาร โดย Brave จะเห็นข้อความของคำค้นหาของคุณ รวมถึงการตั้งค่าประเทศและภาษาสำหรับผลลัพธ์ที่ปรับตามท้องถิ่น แต่ไม่มีตัวระบุผู้ใช้
  sv: Brave Search driver sökfärdigheterna för webb, video och nyheter. Brave ser texten i dina sökfrågor samt dina lands- och språkinställningar för lokaliserade resultat, men ingen användaridentifierare.
  fr: "Brave Search alimente les compétences de recherche web, de vidéos et d'actualités. Brave voit le texte de tes requêtes de recherche ainsi que tes préférences de pays et de langue pour des résultats localisés, mais aucun identifiant d'utilisateur."
  ar: يدعم Brave Search مهارات البحث في الويب والفيديوهات والأخبار. يرى Brave نص استعلامات البحث الخاصة بك وتفضيلات البلد واللغة للحصول على نتائج محلية، ولكن دون أي معرف للمستخدم.
  cs: Brave Search pohání dovednosti pro vyhledávání na webu, ve videích a ve zprávách. Brave vidí text tvých vyhledávacích dotazů a tvé preference země a jazyka pro lokalizované výsledky, ale žádný identifikátor uživatele.
  ru: Brave Search обеспечивает работу навыков поиска в вебе, видео и новостях. Brave видит текст твоих поисковых запросов, а также твои настройки страны и языка для локализации результатов, но не видит идентификатор пользователя.
  he: Brave Search מפעילה את מיומנויות החיפוש באינטרנט, בסרטונים ובחדשות. Brave רואה את טקסט שאילתות החיפוש שלך ואת העדפות המדינה והשפה שלך לתוצאות מותאמות מקומית, אך ללא מזהה משתמש.
  verified_by_human: []
