providers.events.description:
  context: Description of Group G
  en: >-
    These providers are only used when you invoke the events search skill. The
    specific set of providers called depends on the city and event type you
    search for.
  de: Diese Anbieter werden nur genutzt, wenn du den Skill zur Eventsuche aufrufst. Welche Anbieter genau aufgerufen werden, hängt von der Stadt und der Art des Events ab, nach dem du suchst.
  zh: 这些提供商仅在你调用活动搜索技能时使用。调用的具体提供商取决于你搜索的城市和活动类型。
  fr: "Ces fournisseurs ne sont utilisés que lorsque tu appelles la compétence de recherche d'événements. L'ensemble spécifique de fournisseurs sollicités dépend de la ville et du type d'événement que tu recherches."
  pt: Estes fornecedores só são utilizados quando invocas a skill de pesquisa de eventos. O conjunto específico de fornecedores contactados depende da cidade e do tipo de evento que pesquisas.
  ru: Эти провайдеры используются только тогда, когда ты вызываешь навык поиска событий. Конкретный набор используемых провайдеров зависит от города и типа события, которые ты ищешь.
  ja: これらのプロバイダーは、イベント検索スキルを呼び出した場合にのみ使用されます。呼び出されるプロバイダーは、検索する都市やイベントの種類によって異なります。
  it: Questi fornitori vengono utilizzati solo quando invochi la skill di ricerca eventi. Il set specifico di fornitori chiamati dipende dalla città e dal tipo di evento che cerchi.
  tr: Bu sağlayıcılar yalnızca etkinlik arama yeteneğini çağırdığında kullanılır. Çağrılan belirli sağlayıcı seti, aradığın şehre ve etkinlik türüne bağlıdır.
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn sử dụng kỹ năng tìm kiếm sự kiện. Tập hợp các nhà cung cấp cụ thể được gọi tùy thuộc vào thành phố và loại sự kiện mà bạn tìm kiếm.
  id: Penyedia ini hanya digunakan saat kamu memanggil keahlian pencarian acara. Kumpulan penyedia tertentu yang dipanggil bergantung pada kota dan jenis acara yang kamu cari.
  pl: Dostawcy ci są wykorzystywani tylko wtedy, gdy wywołasz umiejętność wyszukiwania wydarzeń. Konkretny zestaw wywoływanych dostawców zależy od miasta i rodzaju wyszukiwanego wydarzenia.
  nl: Deze providers worden alleen gebruikt wanneer je de vaardigheid voor het zoeken naar evenementen aanroept. De specifieke set providers die wordt aangeroepen, hangt af van de stad en het type evenement waarnaar je zoekt.
  hi: इन प्रदाताओं का उपयोग केवल तब किया जाता है जब आप इवेंट खोज स्किल का उपयोग करते हैं। बुलाए गए प्रदाताओं का विशिष्ट सेट आपके द्वारा खोजे गए शहर और इवेंट के प्रकार पर निर्भर करता है।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้งานเมื่อคุณเรียกใช้ทักษะการค้นหากิจกรรมเท่านั้น ชุดผู้ให้บริการที่ถูกเรียกจะขึ้นอยู่กับเมืองและประเภทกิจกรรมที่คุณค้นหา
  cs: Tito poskytovatelé se využívají pouze tehdy, když vyvoláš dovednost vyhledávání událostí. Konkrétní sada volaných poskytovatelů závisí na městě a typu události, kterou hledáš.
  sv: Dessa leverantörer används endast när du anropar färdigheten för evenemangssökning. Vilka specifika leverantörer som anropas beror på staden och typen av evenemang du söker efter.
  he: ספקים אלו נמצאים בשימוש רק כאשר מופעלת מיומנות חיפוש האירועים. קבוצת הספקים הספציפית שתיקרא תלויה בעיר ובסוג האירוע שמחפשים.
  es: Estos proveedores solo se utilizan cuando invocas la habilidad de búsqueda de eventos. El conjunto específico de proveedores consultados depende de la ciudad y el tipo de evento que busques.
  ko: 이 제공업체는 이벤트 검색 스킬을 호출할 때만 사용됩니다. 호출되는 특정 제공업체 세트는 검색하는 도시와 이벤트 유형에 따라 달라집니다.
  ar: يتم استخدام هؤلاء المزودين فقط عند استدعاء مهارة البحث عن الفعاليات. تعتمد مجموعة المزودين المحددة التي يتم الاتصال بها على المدينة ونوع الفعالية التي تبحث عنها.
  verified_by_human: []
