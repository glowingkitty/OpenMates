providers.web_and_search.description:
  context: Description of Group E
  en: >-
    These providers are only used when you invoke a web, videos, news, or
    web-read skill. They see the content of what you search for or the URLs
    you ask to read, but no user identifier — they do not know which OpenMates
    user made each request.
  de: Diese Anbieter werden nur verwendet, wenn du einen Web-, Video-, News- oder Web-Read-Skill aufrufst. Sie sehen den Inhalt deiner Suche oder die URLs, die du lesen möchtest, aber keine Benutzerkennung – sie wissen nicht, welcher OpenMates-Nutzer die jeweilige Anfrage gestellt hat.
  zh: 这些提供商仅在您调用网页、视频、新闻或网页阅读技能时使用。他们会看到您搜索的内容或请求阅读的 URL，但不会看到用户标识符——他们不知道是哪个 OpenMates 用户发起了请求。
  es: Estos proveedores solo se utilizan cuando invocas una habilidad de web, vídeos, noticias o lectura web. Ven el contenido de lo que buscas o las URL que pides leer, pero ningún identificador de usuario; no saben qué usuario de OpenMates realizó cada solicitud.
  pt: Estes fornecedores só são utilizados quando invocas uma skill de web, vídeos, notícias ou leitura web. Eles veem o conteúdo do que pesquisas ou os URLs que pedes para ler, mas nenhum identificador de utilizador — não sabem qual utilizador do OpenMates fez cada pedido.
  ja: これらのプロバイダーは、ウェブ、動画、ニュース、またはウェブ閲覧（web-read）スキルを呼び出した場合にのみ使用される。検索内容や閲覧を依頼したURLの内容は参照するが、ユーザー識別子は参照しないため、どのOpenMatesユーザーがリクエストを行ったかを知ることはない。
  ko: 이 제공업체들은 웹, 동영상, 뉴스 또는 웹 읽기 스킬을 호출할 때만 사용됩니다. 이들은 검색 내용이나 읽기를 요청한 URL을 확인하지만, 사용자 식별자는 확인하지 않으므로 어떤 OpenMates 사용자가 요청했는지 알 수 없습니다.
  it: Questi fornitori vengono utilizzati solo quando invochi una skill web, video, news o web-read. Vedono il contenuto di ciò che cerchi o gli URL che chiedi di leggere, ma nessun identificativo utente — non sanno quale utente di OpenMates abbia effettuato ogni richiesta.
  tr: "Bu sağlayıcılar yalnızca web, video, haber veya web okuma yeteneğini çağırdığında kullanılır. Aradığın şeyin içeriğini veya okunmasını istediğin URL'leri görürler ancak kullanıcı tanımlayıcısı görmezler; hangi OpenMates kullanıcısının hangi isteği yaptığını bilmezler."
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn gọi một kỹ năng web, video, tin tức hoặc đọc web. Họ thấy nội dung bạn tìm kiếm hoặc các URL bạn yêu cầu đọc, nhưng không có mã định danh người dùng — họ không biết người dùng OpenMates nào đã thực hiện mỗi yêu cầu.
  id: Penyedia ini hanya digunakan saat kamu memanggil keahlian web, video, berita, atau baca-web. Mereka melihat konten dari apa yang kamu cari atau URL yang kamu minta untuk dibaca, tetapi tanpa pengenal pengguna — mereka tidak tahu pengguna OpenMates mana yang membuat setiap permintaan.
  pl: Dostawcy ci są używani tylko po wywołaniu umiejętności internetowych, wideo, wiadomości lub czytania stron. Widzą oni treść wyszukiwania lub adresy URL, o których przeczytanie prosisz, ale bez identyfikatora użytkownika — nie wiedzą, który użytkownik OpenMates wysłał dane zapytanie.
  nl: "Deze providers worden alleen gebruikt wanneer je een skill voor web, video's, nieuws of web-lezen aanroept. Ze zien de inhoud van wat je zoekt of de URL's die je wilt laten lezen, maar geen gebruikers-ID — ze weten niet welke OpenMates-gebruiker welk verzoek heeft gedaan."
  hi: इन प्रोवाइडर्स का उपयोग केवल तब किया जाता है जब आप वेब, वीडियो, न्यूज़ या वेब-रीड स्किल का उपयोग करते हैं। वे आपके द्वारा खोजी गई चीज़ों या आपके द्वारा पढ़ने के लिए दिए गए URL को देखते हैं, लेकिन कोई यूज़र आइडेंटिफ़ायर नहीं — उन्हें यह नहीं पता होता कि किस OpenMates उपयोगकर्ता ने अनुरोध किया है।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้เมื่อคุณเรียกใช้ทักษะเว็บ วิดีโอ ข่าวสาร หรือการอ่านเว็บเท่านั้น พวกเขาจะเห็นเนื้อหาที่คุณค้นหาหรือ URL ที่คุณขอให้อ่าน แต่ไม่มีตัวระบุผู้ใช้ — พวกเขาจะไม่ทราบว่าผู้ใช้ OpenMates รายใดเป็นผู้ส่งคำขอแต่ละรายการ
  sv: Dessa leverantörer används endast när du anropar en färdighet för webb, video, nyheter eller webbläsning. De ser innehållet i det du söker efter eller de webbadresser du vill läsa, men ingen användaridentifierare — de vet inte vilken OpenMates-användare som gjorde förfrågan.
  fr: "Ces fournisseurs ne sont utilisés que lorsque tu invoques une compétence web, vidéos, actualités ou web-read. Ils voient le contenu de ce que tu recherches ou les URL que tu demandes de lire, mais aucun identifiant d'utilisateur — ils ne savent pas quel utilisateur d'OpenMates a effectué chaque requête."
  ar: يتم استخدام هؤلاء المزودين فقط عندما تستخدم مهارة الويب أو الفيديوهات أو الأخبار أو قراءة الويب. يرون محتوى ما تبحث عنه أو عناوين URL التي تطلب قراءتها، ولكن دون أي معرف للمستخدم — فهم لا يعرفون أي مستخدم في OpenMates قام بكل طلب.
  cs: Tito poskytovatelé se používají pouze tehdy, když vyvoláš dovednost pro web, videa, zprávy nebo čtení webu. Vidí obsah toho, co vyhledáváš, nebo URL adresy, které chceš přečíst, ale žádný identifikátor uživatele – nevědí, který uživatel OpenMates daný požadavek odeslal.
  ru: Эти провайдеры используются только тогда, когда ты вызываешь навыки web, videos, news или web-read. Они видят содержание твоих поисковых запросов или URL-адреса, которые ты просишь прочитать, но не видят идентификатор пользователя — они не знают, какой именно пользователь OpenMates сделал запрос.
  he: ספקים אלו נמצאים בשימוש רק כשמפעילים מיומנות אינטרנט, סרטונים, חדשות או קריאת דפי אינטרנט. הם רואים את תוכן החיפוש שלך או את כתובות ה-URL שביקשת לקרוא, אך ללא מזהה משתמש — הם אינם יודעים איזה משתמש OpenMates ביצע כל בקשה.
