providers.always_active.sightengine.description:
  context: Sightengine description
  en: >-
    Every image and video you upload is scanned by Sightengine for safety
    moderation before it is stored. Sightengine sees the image or video
    content.
  de: Jedes Bild und jedes Video, das du hochlädst, wird vor der Speicherung von Sightengine auf Sicherheitsaspekte geprüft. Sightengine sieht dabei den Bild- oder Videoinhalt.
  zh: 你上传的每张图片和每段视频在存储前都会由 Sightengine 进行安全审核。Sightengine 会看到图片或视频内容。
  es: Cada imagen y vídeo que subes es escaneado por Sightengine para moderación de seguridad antes de ser almacenado. Sightengine ve el contenido de la imagen o el vídeo.
  ru: Каждое загружаемое тобой изображение и видео сканируется Sightengine для модерации безопасности перед сохранением. Sightengine видит содержимое изображений или видео.
  ja: アップロードされたすべての画像と動画は、保存前に安全性のモデレーションのためにSightengineによってスキャンされます。Sightengineは画像または動画の内容を閲覧します。
  ko: 업로드하는 모든 이미지와 동영상은 저장되기 전에 안전 모니터링을 위해 Sightengine에서 스캔합니다. Sightengine은 이미지 또는 동영상 콘텐츠를 확인합니다.
  it: "Ogni immagine e video che carichi viene scansionato da Sightengine per la moderazione della sicurezza prima di essere archiviato. Sightengine vede il contenuto dell'immagine o del video."
  tr: Yüklediğin her görsel ve video, saklanmadan önce güvenlik denetimi için Sightengine tarafından taranır. Sightengine görsel veya video içeriğini görür.
  vi: Mọi hình ảnh và video bạn tải lên đều được Sightengine quét để kiểm duyệt an toàn trước khi được lưu trữ. Sightengine nhìn thấy nội dung hình ảnh hoặc video đó.
  id: Setiap gambar dan video yang kamu unggah dipindai oleh Sightengine untuk moderasi keamanan sebelum disimpan. Sightengine melihat konten gambar atau video tersebut.
  pl: Każdy przesłany przez Ciebie obraz i film jest skanowany przez Sightengine pod kątem bezpieczeństwa przed zapisaniem. Sightengine widzi treść obrazu lub wideo.
  nl: Elke afbeelding en video die je uploadt, wordt door Sightengine gescand op veiligheidsmoderatie voordat deze wordt opgeslagen. Sightengine ziet de inhoud van de afbeelding of video.
  ar: يتم فحص كل صورة وفيديو تقوم بتحميله بواسطة Sightengine للإشراف على السلامة قبل تخزينه. يرى Sightengine محتوى الصورة أو الفيديو.
  hi: तुम्हारे द्वारा अपलोड किए गए प्रत्येक इमेज और वीडियो को स्टोर करने से पहले सुरक्षा मॉडरेशन के लिए Sightengine द्वारा स्कैन किया जाता है। Sightengine इमेज या वीडियो सामग्री को देखता है।
  th: ทุกรูปภาพและวิดีโอที่คุณอัปโหลดจะถูกสแกนโดย Sightengine เพื่อตรวจสอบความปลอดภัยก่อนที่จะถูกจัดเก็บ Sightengine จะเห็นเนื้อหารูปภาพหรือวิดีโอนั้น
  cs: Každý obrázek a video, které nahraješ, je před uložením zkontrolováno službou Sightengine z hlediska moderování bezpečnosti. Sightengine vidí obsah obrázku nebo videa.
  sv: Varje bild och video du laddar upp skannas av Sightengine för säkerhetsmoderering innan den lagras. Sightengine ser bild- eller videoinnehållet.
  he: כל תמונה ווידאו שאתה מעלה נסרקים על ידי Sightengine לצורך סינון תוכן לפני שהם נשמרים. Sightengine רואה את תוכן התמונה או הווידאו.
  pt: Cada imagem e vídeo que você carrega é verificado pela Sightengine para moderação de segurança antes de ser armazenado. A Sightengine vê o conteúdo da imagem ou vídeo.
  fr: "Chaque image et vidéo que tu télécharges est scannée par Sightengine pour la modération de sécurité avant d'être stockée. Sightengine voit le contenu de l'image ou de la vidéo."
  verified_by_human: []
