providers.always_active.ip_api.description:
  context: IP-API description
  en: >-
    We use IP-API to resolve IP addresses to approximate geolocation for abuse
    prevention, rate limiting, and regional compliance. The resolved country
    and city are used transiently and are not stored against your account.
  de: Wir nutzen IP-API, um IP-Adressen zur Missbrauchsprävention, Ratenbegrenzung und Einhaltung regionaler Vorschriften einer ungefähren Geolokalisierung zuzuordnen. Das ermittelte Land und die Stadt werden nur flüchtig verwendet und nicht in deinem Konto gespeichert.
  zh: 我们使用 IP-API 将 IP 地址解析为大致地理位置，用于防滥用、速率限制和区域合规。解析出的国家和城市仅供临时使用，不会存储在你的账户中。
  es: Utilizamos IP-API para resolver direcciones IP en una geolocalización aproximada para la prevención de abusos, limitación de tasa y cumplimiento regional. El país y la ciudad resueltos se utilizan de forma transitoria y no se almacenan en tu cuenta.
  ru: Мы используем IP-API для определения примерного местоположения по IP-адресу в целях предотвращения злоупотреблений, ограничения частоты запросов и соблюдения региональных норм. Определенные страна и город используются временно и не привязываются к твоему аккаунту.
  ja: 不正防止、レート制限、および地域のコンプライアンスのために、IPアドレスをおおよその地理的位置に解決するためにIP-APIを使用しています。解決された国や都市は一時的に使用されるだけで、アカウントに紐づけて保存されることはありません。
  ko: 남용 방지, 속도 제한 및 지역 규정 준수를 위해 IP 주소를 대략적인 지리적 위치로 변환하는 데 IP-API를 사용합니다. 확인된 국가 및 도시는 일시적으로만 사용되며 계정에 저장되지 않습니다.
  it: Utilizziamo IP-API per risolvere gli indirizzi IP in una geolocalizzazione approssimativa per la prevenzione degli abusi, la limitazione della frequenza e la conformità regionale. Il paese e la città risolti vengono utilizzati in modo transitorio e non vengono memorizzati nel tuo account.
  tr: Kötüye kullanımı önleme, hız sınırlama ve bölgesel uyumluluk için IP adreslerini yaklaşık coğrafi konuma çözümlemek amacıyla IP-API kullanıyoruz. Çözümlenen ülke ve şehir geçici olarak kullanılır ve hesabına kaydedilmez.
  vi: Chúng tôi sử dụng IP-API để phân giải địa chỉ IP thành vị trí địa lý xấp xỉ nhằm ngăn chặn lạm dụng, giới hạn tốc độ và tuân thủ khu vực. Quốc gia và thành phố được phân giải chỉ được sử dụng tạm thời và không được lưu trữ cùng với tài khoản của bạn.
  id: Kami menggunakan IP-API untuk mengonversi alamat IP ke perkiraan geolokasi untuk pencegahan penyalahgunaan, pembatasan laju, dan kepatuhan regional. Negara dan kota yang dihasilkan digunakan secara transien dan tidak disimpan di akunmu.
  pl: Używamy IP-API do ustalania przybliżonej geolokalizacji na podstawie adresów IP w celu zapobiegania nadużyciom, ograniczania liczby żądań i zachowania zgodności regionalnej. Rozpoznany kraj i miasto są używane przejściowo i nie są przypisane do Twojego konta.
  nl: We gebruiken IP-API om IP-adressen te herleiden naar een geschatte geolocatie voor misbruikpreventie, rate limiting en regionale naleving. Het herleide land en de stad worden tijdelijk gebruikt en worden niet bij je account opgeslagen.
  ar: نستخدم IP-API لتحويل عناوين IP إلى موقع جغرافي تقريبي لمنع الإساءة، وتحديد معدل الطلبات، والامتثال الإقليمي. يتم استخدام الدولة والمدينة اللتين تم تحديدهما بشكل عابر ولا يتم تخزينهما في حسابك.
  hi: हम दुरुपयोग की रोकथाम, रेट लिमिटिंग और क्षेत्रीय अनुपालन के लिए IP पतों को अनुमानित भौगोलिक स्थान में बदलने के लिए IP-API का उपयोग करते हैं। प्राप्त किए गए देश और शहर का उपयोग अस्थायी रूप से किया जाता है और उन्हें तुम्हारे अकाउंट में संग्रहीत नहीं किया जाता है।
  th: เราใช้ IP-API เพื่อระบุตำแหน่งทางภูมิศาสตร์โดยประมาณจากที่อยู่ IP เพื่อป้องกันการใช้งานในทางที่ผิด การจำกัดอัตราการใช้งาน และการปฏิบัติตามกฎระเบียบในแต่ละภูมิภาค ประเทศและเมืองที่ระบุได้จะถูกใช้เพียงชั่วคราวและไม่มีการจัดเก็บไว้ในบัญชีของคุณ
  cs: IP-API používáme k převodu IP adres na přibližnou geolokaci pro účely prevence zneužití, omezování četnosti požadavků a dodržování regionálních předpisů. Zjištěná země a město se používají pouze přechodně a neukládají se k tvému účtu.
  sv: Vi använder IP-API för att översätta IP-adresser till ungefärlig geografisk plats för att förebygga missbruk, hastighetsbegränsning och regional efterlevnad. Det land och den stad som fastställs används endast tillfälligt och lagras inte på ditt konto.
  he: אנחנו משתמשים ב-IP-API כדי לתרגם כתובות IP למיקום גיאוגרפי מקורב לצורך מניעת שימוש לרעה, הגבלת קצב בקשות ועמידה ברגולציה אזורית. המדינה והעיר שזוהו משמשות באופן זמני בלבד ואינן נשמרות בחשבון שלך.
  pt: Utilizamos a IP-API para resolver endereços IP para geolocalização aproximada para prevenção de abusos, limitação de taxa e conformidade regional. O país e a cidade resolvidos são usados de forma transitória e não são armazenados em sua conta.
  fr: Nous utilisons IP-API pour résoudre les adresses IP en géolocalisation approximative à des fins de prévention des abus, de limitation de débit et de conformité régionale. Le pays et la ville résolus sont utilisés de manière transitoire et ne sont pas stockés sur ton compte.
  verified_by_human: []
