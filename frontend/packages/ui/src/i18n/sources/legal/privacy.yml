limitations_of_erasure.intro:
  context: Intro to the limitations of erasure section
  en: >-
    When you delete your account we destroy your encryption key and remove
    your rows from our database. A small number of things are retained for
    limited, legally justified reasons:
  de: "Wenn du dein Konto löschst, vernichten wir deinen Verschlüsselungsschlüssel und entfernen deine Einträge aus unserer Datenbank. Eine geringe Anzahl von Dingen wird aus begrenzten, rechtlich gerechtfertigten Gründen aufbewahrt:"
  zh: 当您注销账号时，我们会销毁您的加密密钥并从数据库中删除您的记录。出于有限的、合法的理由，会保留少量内容：
  es: "Cuando eliminas tu cuenta, destruimos tu clave de cifrado y eliminamos tus filas de nuestra base de datos. Se conserva un pequeño número de elementos por razones limitadas y legalmente justificadas:"
  fr: "Lorsque tu supprimes ton compte, nous détruisons ta clé de chiffrement et supprimons tes données de notre base de données. Un petit nombre d'éléments sont conservés pour des raisons limitées et légalement justifiées :"
  pt: "Quando eliminas a tua conta, destruímos a tua chave de encriptação e removemos as tuas linhas da nossa base de dados. Um pequeno número de itens é retido por motivos limitados e legalmente justificados:"
  ru: "Когда ты удаляешь свой аккаунт, мы уничтожаем твой ключ шифрования и удаляем твои строки из нашей базы данных. Небольшое количество данных сохраняется по ограниченным, юридически обоснованным причинам:"
  ja: アカウントを削除すると、当社はあなたの暗号化キーを破棄し、データベースからあなたのデータを削除します。ただし、法的に正当化される限定的な理由により、以下の少数の項目が保持されます。
  ko: "계정을 삭제하면 당사는 귀하의 암호화 키를 파기하고 데이터베이스에서 귀하의 데이터를 삭제합니다. 다만, 법적으로 정당한 사유로 인해 다음과 같은 소수의 항목은 제한적으로 보관됩니다:"
  it: "Quando cancelli il tuo account, distruggiamo la tua chiave di crittografia e rimuoviamo le tue righe dal nostro database. Un piccolo numero di elementi viene conservato per motivi limitati e legalmente giustificati:"
  tr: "Hesabını sildiğinde şifreleme anahtarını imha ederiz ve veritabanımızdaki satırlarını kaldırırız. Sınırlı ve yasal olarak gerekçelendirilmiş nedenlerle az sayıda öğe saklanır:"
  vi: "Khi bạn xóa tài khoản, chúng tôi sẽ hủy khóa mã hóa của bạn và xóa các hàng dữ liệu của bạn khỏi cơ sở dữ liệu của chúng tôi. Một số ít thứ được giữ lại vì các lý do hạn chế, có cơ sở pháp lý:"
  id: "Saat kamu menghapus akun, kami memusnahkan kunci enkripsi kamu dan menghapus baris data kamu dari basis data kami. Sejumlah kecil hal dipertahankan untuk alasan yang terbatas dan dibenarkan secara hukum:"
  pl: "Kiedy usuwasz konto, niszczymy Twój klucz szyfrowania i usuwamy Twoje dane z naszej bazy danych. Niewielka liczba elementów jest zachowywana z ograniczonych, prawnie uzasadnionych powodów:"
  nl: "Wanneer je je account verwijdert, vernietigen we je encryptiesleutel en verwijderen we je gegevens uit onze database. Een klein aantal zaken wordt bewaard om beperkte, wettelijk gerechtvaardigde redenen:"
  ar: "عندما تحذف حسابك، نقوم بتدمير مفتاح التشفير الخاص بك وإزالة سجلاتك من قاعدة بياناتنا. يتم الاحتفاظ بعدد قليل من الأشياء لأسباب محدودة ومبررة قانونًا:"
  hi: "जब तुम अपना अकाउंट डिलीट करते हो, तो हम तुम्हारी एन्क्रिप्शन कुंजी को नष्ट कर देते हैं और हमारे डेटाबेस से तुम्हारी पंक्तियों (rows) को हटा देते हैं। सीमित, कानूनी रूप से उचित कारणों से कुछ चीजें रखी जाती हैं:"
  th: "เมื่อคุณลบบัญชี เราจะทำลายคีย์การเข้ารหัสของคุณและลบแถวข้อมูลของคุณออกจากฐานข้อมูลของเรา ข้อมูลจำนวนเล็กน้อยจะถูกเก็บรักษาไว้ด้วยเหตุผลทางกฎหมายที่จำกัดดังนี้:"
  cs: "Když smažeš svůj účet, zničíme tvůj šifrovací klíč a odstraníme tvé záznamy z naší databáze. Malé množství věcí je uchováváno z omezených, právně odůvodněných důvodů:"
  sv: "När du raderar ditt konto förstör vi din krypteringsnyckel och tar bort dina rader från vår databas. Ett litet antal uppgifter sparas av begränsade, lagligt motiverade skäl:"
  he: "כאשר את/ה מוחק/ת את החשבון שלך, אנחנו משמידים את מפתח ההצפנה שלך ומסירים את השורות שלך מבסיס הנתונים שלנו. מספר קטן של דברים נשמר מסיבות מוגבלות ומוצדקות משפטית:"
  verified_by_human: []
