providers.community.description:
  context: Description of Group J
  en: >-
    These providers are only involved if you choose to join our community or
    developer channels. You can use OpenMates without ever touching them.
  de: Diese Anbieter sind nur involviert, wenn du dich entscheidest, unseren Community- oder Entwickler-Kanälen beizutreten. Du kannst OpenMates nutzen, ohne jemals mit ihnen in Berührung zu kommen.
  zh: 只有在您选择加入我们的社区或开发者频道时，才会涉及这些提供商。您可以在完全不接触它们的情况下使用 OpenMates。
  es: Estos proveedores solo intervienen si decides unirte a nuestros canales de comunidad o de desarrolladores. Puedes usar OpenMates sin llegar a utilizarlos nunca.
  fr: "Ces fournisseurs n'interviennent que si tu choisis de rejoindre nos canaux communautaires ou de développement. Tu peux utiliser OpenMates sans jamais y avoir recours."
  pt: Estes fornecedores só estão envolvidos se escolheres juntar-te aos nossos canais da comunidade ou de desenvolvedores. Podes usar o OpenMates sem nunca lhes tocares.
  ru: Эти провайдеры задействуются только в том случае, если ты решишь присоединиться к нашему сообществу или каналам разработчиков. Ты можешь пользоваться OpenMates, никогда не касаясь их.
  ja: これらのプロバイダーは、当社のコミュニティまたは開発者向けチャンネルへの参加を選択した場合にのみ関与します。これらに一切触れることなく OpenMates を利用することも可能です。
  ko: 이 제공업체들은 귀하가 당사의 커뮤니티 또는 개발자 채널에 참여하기로 선택한 경우에만 관여합니다. 이들을 전혀 이용하지 않고도 OpenMates를 사용할 수 있습니다.
  it: Questi fornitori sono coinvolti solo se scegli di unirti ai nostri canali della community o degli sviluppatori. Puoi usare OpenMates senza mai entrarci in contatto.
  tr: "Bu sağlayıcılar, yalnızca topluluk veya geliştirici kanallarımıza katılmayı seçersen dahil olur. OpenMates'i onlara hiç dokunmadan kullanabilirsin."
  vi: Các nhà cung cấp này chỉ tham gia nếu bạn chọn tham gia các kênh cộng đồng hoặc kênh dành cho nhà phát triển của chúng tôi. Bạn có thể sử dụng OpenMates mà không bao giờ cần chạm đến họ.
  id: Penyedia ini hanya terlibat jika kamu memilih untuk bergabung dengan saluran komunitas atau pengembang kami. Kamu dapat menggunakan OpenMates tanpa pernah menyentuh mereka.
  pl: Dostawcy ci są zaangażowani tylko wtedy, gdy zdecydujesz się dołączyć do naszych kanałów społecznościowych lub deweloperskich. Możesz korzystać z OpenMates, nigdy z nich nie korzystając.
  nl: Deze providers zijn alleen betrokken als je ervoor kiest om lid te worden van onze community- of ontwikkelaarskanalen. Je kunt OpenMates gebruiken zonder ooit met hen in aanraking te komen.
  ar: يتم إشراك هؤلاء المزودين فقط إذا اخترت الانضمام إلى قنوات المجتمع أو المطورين الخاصة بنا. يمكنك استخدام OpenMates دون التعامل معهم على الإطلاق.
  hi: ये प्रदाता केवल तभी शामिल होते हैं जब तुम हमारे कम्युनिटी या डेवलपर चैनलों में शामिल होने का विकल्प चुनते हो। तुम इनका उपयोग किए बिना भी OpenMates का उपयोग कर सकते हो।
  th: ผู้ให้บริการเหล่านี้จะมีส่วนเกี่ยวข้องก็ต่อเมื่อคุณเลือกเข้าร่วมช่องทางชุมชนหรือนักพัฒนาของเราเท่านั้น คุณสามารถใช้ OpenMates ได้โดยไม่ต้องยุ่งเกี่ยวกับช่องทางเหล่านี้เลย
  cs: Tito poskytovatelé jsou zapojeni pouze v případě, že se rozhodneš připojit k našim komunitním nebo vývojářským kanálům. OpenMates můžeš používat, aniž bys s nimi kdy přišel do styku.
  sv: Dessa leverantörer är endast involverade om du väljer att gå med i våra community- eller utvecklarkanaler. Du kan använda OpenMates utan att någonsin komma i kontakt med dem.
  he: ספקים אלו מעורבים רק אם תבחר/י להצטרף לערוצי הקהילה או המפתחים שלנו. ניתן להשתמש ב-OpenMates מבלי לבוא איתם במגע לעולם.
  verified_by_human: []
