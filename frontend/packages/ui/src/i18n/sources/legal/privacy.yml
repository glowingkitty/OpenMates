limitations_of_erasure.third_party_ai_logs.description:
  context: Third-party AI logs limitation description
  en: >-
    Each AI provider we send your prompts to (Anthropic, OpenAI, Google,
    Together, Mistral, Groq, Cerebras) retains its own request logs for
    trust-and-safety windows independent of OpenMates — typically 30 days. We
    cannot reach into their systems to delete your data. The PII placeholder
    substitution described in "How we protect your data" above limits what is
    in those logs in the first place — the providers see only placeholders,
    not your real names or addresses.
  de: Jeder KI-Anbieter, an den wir deine Prompts senden (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), bewahrt seine eigenen Anfrageprotokolle für Sicherheitszeitfenster unabhängig von OpenMates auf – in der Regel 30 Tage. Wir können nicht auf deren Systeme zugreifen, um deine Daten zu löschen. Die oben unter „Wie wir deine Daten schützen“ beschriebene Ersetzung von personenbezogenen Daten durch Platzhalter begrenzt von vornherein, was in diesen Protokollen steht – die Anbieter sehen nur Platzhalter, nicht deine echten Namen oder Adressen.
  zh: 我们向其发送提示词的每个 AI 提供商（Anthropic、OpenAI、Google、Together、Mistral、Groq、Cerebras）都会在独立于 OpenMates 的信任与安全窗口期内保留其自身的请求日志，通常为 30 天。我们无法进入其系统删除您的数据。上文“我们如何保护您的数据”中描述的 PII 占位符替换从根本上限制了这些日志中的内容——提供商只能看到占位符，而看不到您的真实姓名或地址。
  es: "Cada proveedor de IA al que enviamos tus prompts (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) conserva sus propios registros de solicitudes durante periodos de confianza y seguridad independientes de OpenMates, normalmente 30 días. No podemos acceder a sus sistemas para eliminar tus datos. La sustitución de marcadores de posición de PII descrita anteriormente en \"Cómo protegemos tus datos\" limita lo que aparece en esos registros en primer lugar: los proveedores solo ven marcadores de posición, no tus nombres o direcciones reales."
  fr: "Chaque fournisseur d'IA auquel nous envoyons tes prompts (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) conserve ses propres journaux de requêtes pour des périodes de confiance et de sécurité indépendantes d'OpenMates — généralement 30 jours. Nous ne pouvons pas accéder à leurs systèmes pour supprimer tes données. La substitution par des espaces réservés pour les données personnelles (PII) décrite dans « Comment nous protégeons tes données » ci-dessus limite ce qui se trouve dans ces journaux dès le départ — les fournisseurs ne voient que des espaces réservés, pas tes vrais noms ou adresses."
  pt: "Cada fornecedor de IA para o qual enviamos os teus prompts (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) retém os seus próprios registos de pedidos para janelas de confiança e segurança independentes do OpenMates — normalmente 30 dias. Não podemos aceder aos sistemas deles para eliminar os teus dados. A substituição de marcadores de PII descrita em \"Como protegemos os teus dados\" acima limita o que consta nesses registos em primeiro lugar — os fornecedores veem apenas marcadores, não os teus nomes ou endereços reais."
  ru: Каждый ИИ-провайдер, которому мы отправляем твои промпты (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), хранит свои собственные журналы запросов для обеспечения безопасности независимо от OpenMates — обычно в течение 30 дней. Мы не можем получить доступ к их системам, чтобы удалить твои данные. Замена PII-заполнителями, описанная выше в разделе «Как мы защищаем твои данные», ограничивает то, что попадает в эти журналы изначально — провайдеры видят только заполнители, а не твои настоящие имена или адреса.
  ja: 当社がプロンプトを送信する各 AI プロバイダー（Anthropic、OpenAI、Google、Together、Mistral、Groq、Cerebras）は、OpenMates とは独立して、信頼と安全のための期間（通常30日間）独自のリクエストログを保持します。当社がそれらのシステムにアクセスしてデータを削除することはできません。上記の「データの保護方法」で説明した PII（個人を特定できる情報）のプレースホルダー置換により、そもそもそれらのログに含まれる内容は制限されています。プロバイダーには本名や住所ではなく、プレースホルダーのみが表示されます。
  ko: "당사가 귀하의 프롬프트를 전송하는 각 AI 제공업체(Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras)는 OpenMates와는 별개로 신뢰 및 안전 검토 기간을 위해 자체 요청 로그를 보관하며, 기간은 보통 30일입니다. 당사는 해당 업체의 시스템에 접근하여 귀하의 데이터를 삭제할 수 없습니다. 위의 \"데이터 보호 방법\"에서 설명한 PII 자리 표시자 대체 기능은 처음부터 해당 로그에 포함되는 내용을 제한합니다. 제공업체는 실제 이름이나 주소가 아닌 자리 표시자만 보게 됩니다."
  it: "Ogni fornitore di IA a cui inviamo i tuoi prompt (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) conserva i propri log delle richieste per finestre temporali di fiducia e sicurezza indipendenti da OpenMates — in genere 30 giorni. Non possiamo accedere ai loro sistemi per cancellare i tuoi dati. La sostituzione dei segnaposto PII descritta sopra in \"Come proteggiamo i tuoi dati\" limita ciò che finisce in quei log fin dall'inizio — i fornitori vedono solo segnaposto, non i tuoi veri nomi o indirizzi."
  tr: "İstemlerini gönderdiğimiz her yapay zeka sağlayıcısı (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), OpenMates'ten bağımsız olarak güven ve güvenlik pencereleri için kendi istek günlüklerini tutar (genellikle 30 gün). Verilerini silmek için onların sistemlerine erişemeyiz. Yukarıdaki \"Verilerini nasıl koruyoruz\" bölümünde açıklanan PII yer tutucu ikamesi, en başta bu günlüklerde nelerin yer alacağını sınırlar; sağlayıcılar gerçek adlarını veya adreslerini değil, yalnızca yer tutucuları görür."
  vi: "Mỗi nhà cung cấp AI mà chúng tôi gửi lời nhắc của bạn đến (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) đều lưu giữ nhật ký yêu cầu riêng của họ cho các khoảng thời gian tin cậy và an toàn độc lập với OpenMates — thường là 30 ngày. Chúng tôi không thể can thiệp vào hệ thống của họ để xóa dữ liệu của bạn. Việc thay thế trình giữ chỗ PII được mô tả trong phần \"Cách chúng tôi bảo vệ dữ liệu của bạn\" ở trên sẽ hạn chế những gì có trong các nhật ký đó ngay từ đầu — các nhà cung cấp chỉ thấy các trình giữ chỗ, không phải tên hoặc địa chỉ thật của bạn."
  id: "Setiap penyedia AI yang kami kirimi perintah kamu (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) menyimpan log permintaannya sendiri untuk jendela kepercayaan dan keamanan yang independen dari OpenMates — biasanya 30 hari. Kami tidak dapat menjangkau sistem mereka untuk menghapus data kamu. Substitusi placeholder PII yang dijelaskan dalam \"Cara kami melindungi data kamu\" di atas membatasi apa yang ada dalam log tersebut sejak awal — penyedia hanya melihat placeholder, bukan nama atau alamat asli kamu."
  pl: Każdy dostawca AI, do którego wysyłamy Twoje prompty (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), przechowuje własne logi żądań w celach bezpieczeństwa (trust-and-safety) niezależnie od OpenMates — zazwyczaj przez 30 dni. Nie mamy możliwości ingerencji w ich systemy w celu usunięcia Twoich danych. Zastępowanie danych osobowych (PII) symbolami zastępczymi, opisane powyżej w sekcji „Jak chronimy Twoje dane”, ogranicza to, co w ogóle trafia do tych logów — dostawcy widzą tylko symbole zastępcze, a nie Twoje prawdziwe imię, nazwisko czy adres.
  nl: "Elke AI-provider waarnaar we je prompts sturen (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) bewaart zijn eigen verzoeklogs voor trust-and-safety-doeleinden, onafhankelijk van OpenMates — doorgaans 30 dagen. We hebben geen toegang tot hun systemen om je gegevens te verwijderen. De PII-placeholder-vervanging die hierboven wordt beschreven in \"Hoe we je gegevens beschermen\", beperkt wat er in die logs terechtkomt — de providers zien alleen placeholders, niet je echte namen of adressen."
  ar: "يحتفظ كل مزود ذكاء اصطناعي نرسل إليه مطالباتك (Anthropic، OpenAI، Google، Together، Mistral، Groq، Cerebras) بسجلات الطلبات الخاصة به لفترات الثقة والأمان بشكل مستقل عن OpenMates — عادةً لمدة 30 يومًا. لا يمكننا الوصول إلى أنظمتهم لحذف بياناتك. إن استبدال العناصر النائبة لمعلومات الهوية الشخصية (PII) الموضح في قسم \"كيف نحمي بياناتك\" أعلاه يحد مما يوجد في تلك السجلات في المقام الأول — حيث يرى المزودون فقط العناصر النائبة، وليس أسماءك أو عناوينك الحقيقية."
  hi: "प्रत्येक AI प्रदाता जिसे हम तुम्हारे प्रॉम्प्ट भेजते हैं (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), OpenMates से स्वतंत्र ट्रस्ट-एंड-सेफ्टी विंडो के लिए अपने स्वयं के अनुरोध लॉग रखता है — आमतौर पर 30 दिन। हम तुम्हारा डेटा डिलीट करने के लिए उनके सिस्टम तक नहीं पहुँच सकते। ऊपर \"हम आपके डेटा की सुरक्षा कैसे करते हैं\" में वर्णित PII प्लेसहोल्डर प्रतिस्थापन उन लॉग में मौजूद जानकारी को सीमित करता है — प्रदाता केवल प्लेसहोल्डर देखते हैं, तुम्हारे असली नाम या पते नहीं।"
  th: "ผู้ให้บริการ AI แต่ละรายที่เราส่งพรอมต์ของคุณไปให้ (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) จะเก็บรักษาบันทึกคำขอของตนเองเพื่อวัตถุประสงค์ด้านความไว้วางใจและความปลอดภัยโดยไม่ขึ้นกับ OpenMates — โดยปกติคือ 30 วัน เราไม่สามารถเข้าไปในระบบของพวกเขาเพื่อลบข้อมูลของคุณได้ การแทนที่ด้วยตัวสำรอง (placeholder) สำหรับข้อมูลที่ระบุตัวบุคคลได้ (PII) ตามที่อธิบายไว้ในหัวข้อ \"วิธีที่เราปกป้องข้อมูลของคุณ\" ด้านบน ช่วยจำกัดข้อมูลที่อยู่ในบันทึกเหล่านั้นตั้งแต่แรก — ผู้ให้บริการจะเห็นเพียงตัวสำรองเท่านั้น ไม่ใช่ชื่อหรือที่อยู่จริงของคุณ"
  cs: Každý poskytovatel AI, kterému posíláme tvé prompty (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras), si uchovává vlastní protokoly požadavků pro účely bezpečnosti a důvěryhodnosti nezávisle na OpenMates – obvykle po dobu 30 dnů. Nemůžeme zasahovat do jejich systémů a tvá data smazat. Nahrazování osobních údajů (PII) zástupnými symboly popsané výše v části „Jak chráníme tvá data“ omezuje to, co se v těchto protokolech vůbec nachází – poskytovatelé vidí pouze zástupné symboly, nikoli tvá skutečná jména nebo adresy.
  sv: "Varje AI-leverantör som vi skickar dina prompter till (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) sparar sina egna anropsloggar för säkerhetsgranskning oberoende av OpenMates – vanligtvis i 30 dagar. Vi kan inte komma åt deras system för att radera din data. Den PII-ersättning med platshållare som beskrivs i \"Hur vi skyddar din data\" ovan begränsar vad som hamnar i dessa loggar från början – leverantörerna ser endast platshållare, inte dina riktiga namn eller adresser."
  he: "כל ספק AI שאליו אנו שולחים את הפרומפטים שלך (Anthropic, OpenAI, Google, Together, Mistral, Groq, Cerebras) שומר יומני בקשות משלו לצורכי בטיחות ואמון באופן עצמאי מ-OpenMates — בדרך כלל למשך 30 יום. אין לנו אפשרות לגשת למערכות שלהם כדי למחוק את הנתונים שלך. החלפת ה-PII בסימני מקום (placeholders) המתוארת בסעיף \"כיצד אנו מגנים על הנתונים שלך\" לעיל מגבילה את מה שנמצא ביומנים אלו מלכתחילה — הספקים רואים רק סימני מקום, לא את השמות או הכתובות האמיתיים שלך."
  verified_by_human: []
