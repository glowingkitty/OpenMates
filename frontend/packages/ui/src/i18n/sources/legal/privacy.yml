data_categories.intro:
  context: Intro for data categories
  en: "We collect and process the following categories of data to operate and secure our services:"
  de: "Wir sammeln und verarbeiten die folgenden Datenskategorien, um unsere Dienste zu betreiben und zu sichern:"
  zh: "我们收集和处理以下类别的数据以运营和保护我们的服务："
  es: "Recopilamos y procesamos las siguientes categorías de datos para operar y asegurar nuestros servicios:"
  fr: "Nous collectons et traitons les catégories de données suivantes pour exploiter et sécuriser nos services :"
  pt: "Coletamos e processamos as seguintes categorias de dados para operar e proteger nossos serviços:"
  ru: "Мы собираем и обрабатываем следующие категории данных для работы и защиты наших услуг:"
  ja: "当社は、サービスを運営し、保護するために、以下のデータカテゴリを収集および処理します："
  ko: "서비스를 운영하고 보호하기 위해 다음 데이터 범주를 수집 및 처리합니다:"
  it: "Raccogliamo ed elaboriamo le seguenti categorie di dati per operare e proteggere i nostri servizi:"
  tr: "Hizmetlerimizi işletmek ve güvence altına almak için aşağıdaki veri kategorilerini topluyor ve işliyoruz:"
  vi: "Chúng tôi thu thập và xử lý các danh mục dữ liệu sau để vận hành và bảo mật dịch vụ của chúng tôi:"
  id: "Kami mengumpulkan dan memproses kategori data berikut untuk mengoperasikan dan mengamankan layanan kami:"
  pl: "Zbieramy i przetwarzamy następujące kategorie danych w celu obsługi i zabezpieczenia naszych usług:"
  nl: "We verzamelen en verwerken de volgende gegevenscategorieën om onze diensten te exploiteren en te beveiligen:"
  ar: "نجمع ونعالج فئات البيانات التالية لتشغيل خدماتنا وتأمينها:"
  hi: "हम अपनी सेवाओं को संचालित करने और सुरक्षित करने के लिए डेटा की निम्नलिखित श्रेणियों को एकत्र और संसाधित करते हैं:"
  th: "เรารวบรวมและประมวลผลหมวดหมู่ข้อมูลต่อไปนี้เพื่อดำเนินการและรักษาความปลอดภัยบริการของเรา:"
  cs: "Shromažďujeme a zpracováváme následující kategorie údajů za účelem provozu a zabezpečení našich služeb:"
  sv: "Vi samlar in och bearbetar följande datakategorier för att driva och säkra våra tjänster:"
  verified_by_human: []
  he: 'אנו אוספים ומעבדים את קטגוריות הנתונים הבאות להפעלה ואבטחה של שירותינו:'
data_categories.account:
  context: Account data category
  en: "Account: Email address, username/display name, profile image, locale, and security settings (e.g., 2FA enabled). Passwords are stored as salted hashes."
  de: "Konto: E-Mail-Adresse, Benutzername/Anzeigename, Profilbild, Gebietsschema und Sicherheitseinstellungen (z. B. 2FA aktiviert). Passwörter werden als gesalzene Hashes gespeichert."
  zh: "帐户：电子邮件地址、用户名/显示名称、个人资料图片、区域设置和安全设置（例如，启用 2FA）。密码以加盐哈希值的形式存储。"
  es: "Cuenta: Dirección de correo electrónico, nombre de usuario/nombre para mostrar, imagen de perfil, configuración regional y configuración de seguridad (por ejemplo, 2FA habilitado). Las contraseñas se almacenan como hashes con sal."
  fr: "Compte : Adresse e-mail, nom d'utilisateur/nom d'affichage, image de profil, paramètres régionaux et paramètres de sécurité (par exemple, 2FA activé). Les mots de passe sont stockés sous forme de hachages salés."
  pt: "Conta: Endereço de e-mail, nome de usuário/nome de exibição, imagem de perfil, localidade e configurações de segurança (por exemplo, 2FA habilitado). As senhas são armazenadas como hashes com sal."
  ru: "Учетная запись: Адрес электронной почты, имя пользователя/отображаемое имя, изображение профиля, локаль и настройки безопасности (например, включена 2FA). Пароли хранятся в виде соленых хешей."
  ja: "アカウント：メールアドレス、ユーザー名/表示名、プロフィール画像、ロケール、セキュリティ設定（例：2FA有効）。パスワードはソルト付きハッシュとして保存されます。"
  ko: "계정: 이메일 주소, 사용자 이름/표시 이름, 프로필 이미지, 로케일 및 보안 설정(예: 2FA 활성화). 비밀번호는 솔트가 포함된 해시로 저장됩니다."
  it: "Account: Indirizzo email, nome utente/nome visualizzato, immagine del profilo, impostazioni locali e impostazioni di sicurezza (ad esempio, 2FA abilitato). Le password sono memorizzate come hash con sale."
  tr: "Hesap: E-posta adresi, kullanıcı adı/görünen ad, profil resmi, yerel ayarlar ve güvenlik ayarları (örneğin, 2FA etkin). Şifreler tuzlu hash olarak saklanır."
  vi: "Tài khoản: Địa chỉ email, tên người dùng/tên hiển thị, hình ảnh hồ sơ, ngôn ngữ và cài đặt bảo mật (ví dụ: bật 2FA). Mật khẩu được lưu trữ dưới dạng hàm băm có muối."
  id: "Akun: Alamat email, nama pengguna/nama tampilan, gambar profil, lokal, dan pengaturan keamanan (misalnya, 2FA diaktifkan). Kata sandi disimpan sebagai hash yang di-garam."
  pl: "Konto: Adres e-mail, nazwa użytkownika/nazwa wyświetlana, obraz profilu, ustawienia regionalne i ustawienia bezpieczeństwa (np. 2FA włączone). Hasła są przechowywane jako zahaszowane z solą."
  nl: "Account: E-mailadres, gebruikersnaam/weergavenaam, profielfoto, landinstellingen en beveiligingsinstellingen (bijv. 2FA ingeschakeld). Wachtwoorden worden opgeslagen als gezouten hashes."
  ar: "الحساب: عنوان البريد الإلكتروني واسم المستخدم/اسم العرض وصورة الملف الشخصي والإعدادات المحلية وإعدادات الأمان (على سبيل المثال، تم تمكين 2FA). يتم تخزين كلمات المرور كتجزئات مملحة."
  hi: "खाता: ईमेल पता, उपयोगकर्ता नाम/प्रदर्शन नाम, प्रोफ़ाइल छवि, लोकेल और सुरक्षा सेटिंग्स (उदाहरण के लिए, 2FA सक्षम)। पासवर्ड नमकीन हैश के रूप में संग्रहीत किए जाते हैं।"
  th: "บัญชี: ที่อยู่อีเมล ชื่อผู้ใช้/ชื่อที่แสดง รูปภาพโปรไฟล์ ภาษาและตั้งค่าความปลอดภัย (เช่น เปิดใช้งาน 2FA) รหัสผ่านจะถูกเก็บเป็นแฮชที่เติมเกลือ"
  cs: "Účet: E-mailová adresa, uživatelské jméno/zobrazované jméno, obrázek profilu, místní nastavení a bezpečnostní nastavení (např. 2FA povoleno). Hesla jsou uložena jako solené hash."
  sv: "Konto: E-postadress, användarnamn/visningsnamn, profilbild, språkinställningar och säkerhetsinställningar (t.ex. 2FA aktiverat). Lösenord lagras som saltade hash-värden."
  verified_by_human: []
  he: 'חשבון: כתובת דוא"ל, שם משתמש/שם תצוגה, תמונת פרופיל, שפה, והגדרות אבטחה (למשל, אימות דו-שלבי, מפתחות גישה).'
data_categories.usage:
  context: Usage data category
  en: "Usage: Server logs, event timestamps, feature usage, error logs, and device recognition identifiers (hashed). IP addresses may be temporarily processed for security and rate limiting."
  de: "Nutzung: Serverprotokolle, Ereigniszeitstempel, Funktionsnutzung, Fehlerprotokolle und Geräteerkennungs-IDs (gehasht). IP-Adressen können vorübergehend für Sicherheit und Ratenbegrenzung verarbeitet werden."
  zh: "使用情况：服务器日志、事件时间戳、功能使用情况、错误日志和设备识别标识符（已哈希）。IP 地址可能会临时处理以用于安全和速率限制。"
  es: "Uso: Registros del servidor, marcas de tiempo de eventos, uso de funciones, registros de errores e identificadores de reconocimiento de dispositivos (con hash). Las direcciones IP pueden procesarse temporalmente para seguridad y limitación de velocidad."
  fr: "Utilisation : Journaux du serveur, horodatages des événements, utilisation des fonctionnalités, journaux d'erreurs et identifiants de reconnaissance des appareils (hachés). Les adresses IP peuvent être traitées temporairement pour la sécurité et la limitation du débit."
  pt: "Uso: Logs do servidor, timestamps de eventos, uso de recursos, logs de erros e identificadores de reconhecimento de dispositivos (com hash). Endereços IP podem ser processados temporariamente para segurança e limitação de taxa."
  ru: "Использование: Журналы сервера, временные метки событий, использование функций, журналы ошибок и идентификаторы распознавания устройств (хешированные). IP-адреса могут временно обрабатываться для безопасности и ограничения скорости."
  ja: "使用状況：サーバーログ、イベントのタイムスタンプ、機能の使用状況、エラーログ、デバイス認識識別子（ハッシュ化）。IPアドレスは、セキュリティとレート制限のために一時的に処理される場合があります。"
  ko: "사용: 서버 로그, 이벤트 타임스탬프, 기능 사용, 오류 로그 및 장치 인식 식별자(해시됨). IP 주소는 보안 및 속도 제한을 위해 일시적으로 처리될 수 있습니다."
  it: "Utilizzo: Log del server, timestamp degli eventi, utilizzo delle funzionalità, log degli errori e identificatori di riconoscimento del dispositivo (hash). Gli indirizzi IP possono essere elaborati temporaneamente per sicurezza e limitazione della velocità."
  tr: "Kullanım: Sunucu günlükleri, olay zaman damgaları, özellik kullanımı, hata günlükleri ve cihaz tanıma tanımlayıcıları (hash). IP adresleri güvenlik ve hız sınırlama için geçici olarak işlenebilir."
  vi: "Sử dụng: Nhật ký máy chủ, dấu thời gian sự kiện, sử dụng tính năng, nhật ký lỗi và định danh nhận dạng thiết bị (đã băm). Địa chỉ IP có thể được xử lý tạm thời cho mục đích bảo mật và giới hạn tốc độ."
  id: "Penggunaan: Log server, stempel waktu peristiwa, penggunaan fitur, log kesalahan, dan pengenal pengenalan perangkat (hash). Alamat IP dapat diproses sementara untuk keamanan dan pembatasan kecepatan."
  pl: "Użycie: Dzienniki serwera, znaczniki czasu zdarzeń, użycie funkcji, dzienniki błędów i identyfikatory rozpoznawania urządzeń (hash). Adresy IP mogą być tymczasowo przetwarzane w celach bezpieczeństwa i ograniczania szybkości."
  nl: "Gebruik: Serverlogboeken, gebeurtenistijdstempels, functiegebruik, foutlogboeken en apparaatherkenningsidentificatoren (gehasht). IP-adressen kunnen tijdelijk worden verwerkt voor beveiliging en snelheidsbeperking."
  ar: "الاستخدام: سجلات الخادم وطوابع زمنية للأحداث واستخدام الميزات وسجلات الأخطاء ومعرفات التعرف على الأجهزة (مشفرة). قد تتم معالجة عناوين IP مؤقتًا للأمان والحد من المعدل."
  hi: "उपयोग: सर्वर लॉग, इवेंट टाइमस्टैम्प, सुविधा उपयोग, त्रुटि लॉग और डिवाइस मान्यता पहचानकर्ता (हैश किए गए)। IP पते सुरक्षा और दर सीमित करने के लिए अस्थायी रूप से संसाधित किए जा सकते हैं।"
  th: "การใช้งาน: บันทึกของเซิร์ฟเวอร์ ประทับเวลาของเหตุการณ์ การใช้ฟีเจอร์ บันทึกข้อผิดพลาด และตัวระบุการจดจำอุปกรณ์ (แฮช) ที่อยู่ IP อาจถูกประมวลผลชั่วคราวเพื่อความปลอดภัยและการจำกัดอัตรา"
  cs: "Použití: Protokoly serveru, časové značky událostí, použití funkcí, protokoly chyb a identifikátory rozpoznávání zařízení (hash). IP adresy mohou být dočasně zpracovány pro zabezpečení a omezení rychlosti."
  sv: "Användning: Serverloggar, händelsetidsstämplar, funktionsanvändning, felloggar och enhetsigenkänningsidentifierare (hashade). IP-adresser kan tillfälligt bearbetas för säkerhet och hastighetsbegränsning."
  verified_by_human: []
  he: 'שימוש: יומני שרת, חותמות זמן אירועים, שימוש בתכונות, יומני שגיאות ומזהי זיהוי מכשיר לאבטחה.'
data_categories.content:
  context: Content data category
  en: "Content: Chat messages, prompts, attachments, and uploaded images/videos necessary to deliver the service (subject to moderation where applicable)."
  de: "Inhalt: Chat-Nachrichten, Eingabeaufforderungen, Anhänge und hochgeladene Bilder/Videos, die für die Bereitstellung des Dienstes erforderlich sind (unterliegen gegebenenfalls der Moderation)."
  zh: "内容：提供服务所需的聊天消息、提示、附件和上传的图片/视频（在适用的情况下需经过审核）。"
  es: "Contenido: Mensajes de chat, solicitudes, archivos adjuntos e imágenes/videos cargados necesarios para proporcionar el servicio (sujetos a moderación cuando corresponda)."
  fr: "Contenu : Messages de chat, invites, pièces jointes et images/vidéos téléchargées nécessaires pour fournir le service (soumis à modération le cas échéant)."
  pt: "Conteúdo: Mensagens de chat, prompts, anexos e imagens/vídeos carregados necessários para fornecer o serviço (sujeitos à moderação quando aplicável)."
  ru: "Контент: Сообщения в чате, запросы, вложения и загруженные изображения/видео, необходимые для предоставления услуги (подлежат модерации, где применимо)."
  ja: "コンテンツ：サービスを提供するために必要なチャットメッセージ、プロンプト、添付ファイル、アップロードされた画像/動画（該当する場合はモデレーションの対象）。"
  ko: "콘텐츠: 서비스를 제공하는 데 필요한 채팅 메시지, 프롬프트, 첨부 파일 및 업로드된 이미지/비디오(해당되는 경우 조정 대상)."
  it: "Contenuto: Messaggi di chat, prompt, allegati e immagini/video caricati necessari per fornire il servizio (soggetti a moderazione ove applicabile)."
  tr: "İçerik: Hizmeti sağlamak için gerekli sohbet mesajları, istemler, ekler ve yüklenen görüntüler/videolar (uygulanabilir olduğunda moderasyona tabi)."
  vi: "Nội dung: Tin nhắn trò chuyện, lời nhắc, tệp đính kèm và hình ảnh/video đã tải lên cần thiết để cung cấp dịch vụ (chịu sự kiểm duyệt khi áp dụng)."
  id: "Konten: Pesan obrolan, prompt, lampiran, dan gambar/video yang diunggah yang diperlukan untuk menyediakan layanan (tunduk pada moderasi jika berlaku)."
  pl: "Treść: Wiadomości czatu, monity, załączniki i przesłane obrazy/filmy niezbędne do świadczenia usługi (podlegają moderacji, jeśli dotyczy)."
  nl: "Inhoud: Chatberichten, prompts, bijlagen en geüploade afbeeldingen/video's die nodig zijn om de service te leveren (onderworpen aan moderatie waar van toepassing)."
  ar: "المحتوى: رسائل الدردشة والطلبات والمرفقات والصور/مقاطع الفيديو المرفوعة اللازمة لتقديم الخدمة (خاضعة للتعديل عند الاقتضاء)."
  hi: "सामग्री: सेवा प्रदान करने के लिए आवश्यक चैट संदेश, प्रॉम्प्ट, अनुलग्नक और अपलोड की गई छवियां/वीडियो (जहां लागू हो वहां मॉडरेशन के अधीन)।"
  th: "เนื้อหา: ข้อความแชท คำขอ ไฟล์แนบ และรูปภาพ/วิดีโอที่อัปโหลดซึ่งจำเป็นสำหรับการให้บริการ (อยู่ภายใต้การกลั่นกรองตามความเหมาะสม)"
  cs: "Obsah: Chatové zprávy, výzvy, přílohy a nahrané obrázky/videa nezbytné pro poskytování služby (podléhají moderaci, pokud je to vhodné)."
  sv: "Innehåll: Chattmeddelanden, uppmaningar, bilagor och uppladdade bilder/videor som behövs för att leverera tjänsten (underkastade moderering där tillämpligt)."
  verified_by_human: []
  he: "תוכן: הודעות צ'אט, הנחיות, קבצים מצורפים ותמונות/סרטונים שהועלו הנחוצים לאספקת השירות."
data_categories.payments:
  context: Payments data category
  en: "Payments: Payment method tokens, transaction IDs, billing address and VAT information as required for invoicing (processed primarily by Stripe). We do not store full card numbers."
  de: "Zahlungen: Zahlungsmethoden-Tokens, Transaktions-IDs, Rechnungsadresse und Mehrwertsteuerinformationen, wie für die Rechnungsstellung erforderlich (hauptsächlich von Stripe verarbeitet). Wir speichern keine vollständigen Kartennummern."
  zh: "付款：开具发票所需的付款方式令牌、交易 ID、账单地址和增值税信息（主要由 Stripe 处理）。我们不存储完整的卡号。"
  es: "Pagos: Tokens de método de pago, ID de transacciones, dirección de facturación e información de IVA según se requiera para la facturación (procesados principalmente por Stripe). No almacenamos números de tarjeta completos."
  fr: "Paiements : Jetons de méthode de paiement, ID de transaction, adresse de facturation et informations TVA selon les besoins pour la facturation (traités principalement par Stripe). Nous ne stockons pas les numéros de carte complets."
  pt: "Pagamentos: Tokens de método de pagamento, IDs de transação, endereço de cobrança e informações de IVA conforme necessário para faturamento (processados principalmente pelo Stripe). Não armazenamos números de cartão completos."
  ru: "Платежи: Токены платёжных методов, идентификаторы транзакций, платёжный адрес и информация о НДС, необходимые для выставления счетов (обрабатываются преимущественно через Stripe). Мы не храним полные номера карт."
  ja: "支払い：請求書発行に必要な支払い方法トークン、取引ID、請求先住所、VAT情報（主にStripeで処理）。完全なカード番号は保存しません。"
  ko: "결제: 청구서 발행에 필요한 결제 수단 토큰, 거래 ID, 청구 주소 및 VAT 정보(주로 Stripe에서 처리). 전체 카드 번호는 저장하지 않습니다."
  it: "Pagamenti: Token del metodo di pagamento, ID di transazione, indirizzo di fatturazione e informazioni IVA necessarie per la fatturazione (elaborati principalmente da Stripe). Non memorizziamo numeri di carta completi."
  tr: "Ödemeler: Faturalama için gerektiği şekilde ödeme yöntemi tokenları, işlem kimlikleri, fatura adresi ve KDV bilgileri (esas olarak Stripe tarafından işlenir). Tam kart numaralarını saklamıyoruz."
  vi: "Thanh toán: Mã thông báo phương thức thanh toán, ID giao dịch, địa chỉ thanh toán và thông tin VAT theo yêu cầu để lập hóa đơn (được xử lý chủ yếu bởi Stripe). Chúng tôi không lưu trữ số thẻ đầy đủ."
  id: "Pembayaran: Token metode pembayaran, ID transaksi, alamat penagihan dan informasi PPN sebagaimana diperlukan untuk faktur (diproses terutama oleh Stripe). Kami tidak menyimpan nomor kartu lengkap."
  pl: "Płatności: Tokeny metod płatności, identyfikatory transakcji, adres rozliczeniowy i informacje VAT wymagane do fakturowania (przetwarzane głównie przez Stripe). Nie przechowujemy pełnych numerów kart."
  nl: "Betalingen: Betaalmethode-tokens, transactie-ID's, factuuradres en btw-informatie zoals vereist voor facturering (verwerkt voornamelijk door Stripe). We slaan geen volledige kaartnummers op."
  ar: "المدفوعات: رموز طرق الدفع ومعرّفات المعاملات وعنوان الفوترة ومعلومات ضريبة القيمة المضافة حسب الحاجة للفوترة (تُعالَج أساسًا بواسطة Stripe). لا نحتفظ بأرقام البطاقات كاملةً."
  hi: "भुगतान: चालान के लिए आवश्यक भुगतान विधि टोकन, लेनदेन आईडी, बिलिंग पता और वैट जानकारी (मुख्य रूप से Stripe द्वारा संसाधित)। हम पूर्ण कार्ड नंबर संग्रहीत नहीं करते।"
  th: "การชำระเงิน: โทเค็นวิธีชำระเงิน รหัสธุรกรรม ที่อยู่สำหรับการเรียกเก็บเงิน และข้อมูล VAT ตามที่จำเป็นสำหรับการออกใบแจ้งหนี้ (ประมวลผลโดย Stripe เป็นหลัก) เราไม่จัดเก็บหมายเลขบัตรเต็ม"
  cs: "Platby: Tokeny platebních metod, identifikátory transakcí, fakturační adresa a informace o DPH podle potřeby pro fakturaci (zpracovávány převážně přes Stripe). Neukládáme úplná čísla karet."
  sv: "Betalningar: Betalningstokens, transaktions-ID, faktureringsadress och momsinformation som krävs för fakturering (behandlas huvudsakligen av Stripe). Vi lagrar inte fullständiga kortnummer."
  he: 'תשלומים: טוקנים של אמצעי תשלום, מזהי עסקאות, כתובת חיוב ומידע מע"מ כנדרש לחיוב (מעובד בעיקר על ידי Stripe). איננו מאחסנים מספרי כרטיס מלאים.'
data_categories.newsletter:
  context: Newsletter subscription data category
  en: "Newsletter: If you choose to subscribe to our newsletter, we store your email address in encrypted form. Newsletter subscription is optional and separate from account creation. Creating an account does not automatically subscribe you to the newsletter."
  de: "Newsletter: Wenn Sie sich für unseren Newsletter anmelden, speichern wir Ihre E-Mail-Adresse in verschlüsselter Form. Die Newsletter-Anmeldung ist optional und getrennt von der Kontenerstellung. Die Erstellung eines Kontos abonniert Sie nicht automatisch für den Newsletter."
  zh: "新闻通讯：如果您选择订阅我们的新闻通讯，我们会以加密形式存储您的电子邮件地址。新闻通讯订阅是可选的，与帐户创建分开。创建帐户不会自动订阅新闻通讯。"
  es: "Boletín: Si elige suscribirse a nuestro boletín, almacenamos su dirección de correo electrónico en forma cifrada. La suscripción al boletín es opcional y está separada de la creación de cuenta. Crear una cuenta no le suscribe automáticamente al boletín."
  fr: "Newsletter : Si vous choisissez de vous abonner à notre newsletter, nous stockons votre adresse e-mail sous forme cryptée. L'abonnement à la newsletter est facultatif et distinct de la création de compte. La création d'un compte ne vous abonne pas automatiquement à la newsletter."
  pt: "Newsletter: Se você optar por se inscrever em nosso boletim informativo, armazenamos seu endereço de e-mail em forma criptografada. A assinatura do boletim informativo é opcional e separada da criação de conta. Criar uma conta não o inscreve automaticamente no boletim informativo."
  ru: "Рассылка: Если вы решите подписаться на нашу рассылку, мы храним ваш адрес электронной почты в зашифрованном виде. Подписка на рассылку является необязательной и отделена от создания учетной записи. Создание учетной записи не подписывает вас автоматически на рассылку."
  ja: "ニュースレター：ニュースレターに登録することを選択した場合、メールアドレスを暗号化された形式で保存します。ニュースレターの登録は任意であり、アカウント作成とは別です。アカウントを作成しても、自動的にニュースレターに登録されることはありません。"
  ko: "뉴스레터: 뉴스레터를 구독하기로 선택한 경우 이메일 주소를 암호화된 형식으로 저장합니다. 뉴스레터 구독은 선택 사항이며 계정 생성과 별개입니다. 계정을 생성해도 자동으로 뉴스레터에 가입되지 않습니다."
  it: "Newsletter: Se scegli di iscriverti alla nostra newsletter, memorizziamo il tuo indirizzo email in forma crittografata. L'iscrizione alla newsletter è facoltativa e separata dalla creazione dell'account. La creazione di un account non ti iscrive automaticamente alla newsletter."
  tr: "Bülten: Bültenimize abone olmayı seçerseniz, e-posta adresinizi şifrelenmiş biçimde saklarız. Bülten aboneliği isteğe bağlıdır ve hesap oluşturmadan ayrıdır. Bir hesap oluşturmak sizi otomatik olarak bültene abone etmez."
  vi: "Bản tin: Nếu bạn chọn đăng ký bản tin của chúng tôi, chúng tôi lưu trữ địa chỉ email của bạn ở dạng mã hóa. Đăng ký bản tin là tùy chọn và tách biệt với việc tạo tài khoản. Tạo tài khoản không tự động đăng ký bạn vào bản tin."
  id: "Newsletter: Jika Anda memilih untuk berlangganan newsletter kami, kami menyimpan alamat email Anda dalam bentuk terenkripsi. Langganan newsletter bersifat opsional dan terpisah dari pembuatan akun. Membuat akun tidak secara otomatis berlangganan Anda ke newsletter."
  pl: "Newsletter: Jeśli zdecydujesz się zapisać do naszego newslettera, przechowujemy Twój adres e-mail w zaszyfrowanej formie. Subskrypcja newslettera jest opcjonalna i oddzielona od tworzenia konta. Utworzenie konta nie zapisuje Cię automatycznie do newslettera."
  nl: "Nieuwsbrief: Als u ervoor kiest om u te abonneren op onze nieuwsbrief, slaan we uw e-mailadres op in versleutelde vorm. Nieuwsbriefabonnement is optioneel en gescheiden van accountaanmaak. Het aanmaken van een account abonneert u niet automatisch op de nieuwsbrief."
  ar: "النشرة الإخبارية: إذا اخترت الاشتراك في نشرتنا الإخبارية، فإننا نخزن عنوان بريدك الإلكتروني في شكل مشفر. الاشتراك في النشرة الإخبارية اختياري ومنفصل عن إنشاء الحساب. إنشاء حساب لا يشترك لك تلقائياً في النشرة الإخبارية."
  hi: "न्यूज़लेटर: यदि आप हमारे न्यूज़लेटर की सदस्यता लेने का विकल्प चुनते हैं, तो हम आपका ईमेल पता एन्क्रिप्टेड रूप में संग्रहीत करते हैं। न्यूज़लेटर सदस्यता वैकल्पिक है और खाता निर्माण से अलग है। खाता बनाना आपको स्वचालित रूप से न्यूज़लेटर की सदस्यता नहीं देता है।"
  th: "จดหมายข่าว: หากคุณเลือกสมัครรับจดหมายข่าวของเรา เราจะจัดเก็บที่อยู่อีเมลของคุณในรูปแบบที่เข้ารหัส การสมัครรับจดหมายข่าวเป็นทางเลือกและแยกจากการสร้างบัญชี การสร้างบัญชีจะไม่สมัครรับจดหมายข่าวให้คุณโดยอัตโนมัติ"
  cs: "Zpravodaj: Pokud se rozhodnete přihlásit k odběru našeho zpravodaje, ukládáme vaši e-mailovou adresu v zašifrované podobě. Přihlášení k odběru zpravodaje je volitelné a oddělené od vytvoření účtu. Vytvoření účtu vás automaticky nepřihlásí k odběru zpravodaje."
  sv: "Nyhetsbrev: Om du väljer att prenumerera på vårt nyhetsbrev lagrar vi din e-postadress i krypterad form. Nyhetsbrevsprenumeration är valfri och separat från kontoskapande. Att skapa ett konto prenumererar inte automatiskt dig på nyhetsbrevet."
  verified_by_human: []
  he: 'תשלומים: טוקנים של אמצעי תשלום, מזהי עסקאות, כתובת חיוב ומידע מע"מ כנדרש לעיבוד תשלומים ועמידה במס.'
data_categories.stability_logs:
  context: Stability logs data category — anonymized console logs for error diagnosis
  en: "Stability Logs: To diagnose technical errors, anonymized browser console logs (error messages, component status, connection events) are collected from authenticated users and stored for up to 48 hours. If an error occurs, surrounding context is retained for up to 14 days. No message content, chat titles, names, email addresses, or other personally identifiable information is included. A random session identifier (generated per browser tab, not linked to your account) is used for log correlation. You can disable this at any time in Settings > Privacy > Stability Logs."
  de: "Stabilitätsprotokolle: Zur Diagnose technischer Fehler werden anonymisierte Browser-Konsolenprotokolle (Fehlermeldungen, Komponentenstatus, Verbindungsereignisse) von authentifizierten Benutzern erfasst und bis zu 48 Stunden gespeichert. Bei einem Fehler wird der umgebende Kontext bis zu 14 Tage aufbewahrt. Es werden keine Nachrichteninhalte, Chat-Titel, Namen, E-Mail-Adressen oder andere personenbezogene Daten erfasst. Ein zufälliger Sitzungsbezeichner (pro Browser-Tab generiert, nicht mit Ihrem Konto verknüpft) wird zur Protokollkorrelation verwendet. Sie können dies jederzeit unter Einstellungen > Datenschutz > Stabilitätsprotokolle deaktivieren."
  zh: "稳定性日志：为诊断技术错误，系统会收集经过匿名处理的浏览器控制台日志（错误消息、组件状态、连接事件），并存储最多 48 小时。如果发生错误，周围的上下文会保留最多 14 天。不包含消息内容、聊天标题、姓名、电子邮件地址或其他个人身份信息。使用随机会话标识符（每个浏览器标签页生成，不与您的帐户关联）进行日志关联。您可以随时在设置 > 隐私 > 稳定性日志中禁用此功能。"
  es: "Registros de estabilidad: Para diagnosticar errores técnicos, se recopilan registros de consola del navegador anónimos (mensajes de error, estado de componentes, eventos de conexión) de usuarios autenticados y se almacenan hasta 48 horas. Si ocurre un error, el contexto circundante se retiene hasta 14 días. No se incluye contenido de mensajes, títulos de chat, nombres, direcciones de correo electrónico ni otra información personal identificable. Se utiliza un identificador de sesión aleatorio (generado por pestaña del navegador, no vinculado a su cuenta) para la correlación de registros. Puede desactivar esto en cualquier momento en Configuración > Privacidad > Registros de estabilidad."
  fr: "Journaux de stabilité : Pour diagnostiquer les erreurs techniques, des journaux de console de navigateur anonymisés (messages d'erreur, état des composants, événements de connexion) sont collectés auprès des utilisateurs authentifiés et stockés jusqu'à 48 heures. Si une erreur survient, le contexte environnant est conservé jusqu'à 14 jours. Aucun contenu de message, titre de chat, nom, adresse e-mail ou autre information personnellement identifiable n'est inclus. Un identifiant de session aléatoire (généré par onglet de navigateur, non lié à votre compte) est utilisé pour la corrélation des journaux. Vous pouvez désactiver cela à tout moment dans Paramètres > Confidentialité > Journaux de stabilité."
  pt: "Logs de estabilidade: Para diagnosticar erros técnicos, logs de console do navegador anonimizados (mensagens de erro, status de componentes, eventos de conexão) são coletados de usuários autenticados e armazenados por até 48 horas. Se um erro ocorrer, o contexto ao redor é retido por até 14 dias. Nenhum conteúdo de mensagens, títulos de chat, nomes, endereços de e-mail ou outras informações pessoalmente identificáveis são incluídos. Um identificador de sessão aleatório (gerado por aba do navegador, não vinculado à sua conta) é usado para correlação de logs. Você pode desativar isso a qualquer momento em Configurações > Privacidade > Logs de estabilidade."
  ru: "Журналы стабильности: Для диагностики технических ошибок собираются анонимизированные журналы консоли браузера (сообщения об ошибках, состояние компонентов, события подключения) от аутентифицированных пользователей и хранятся до 48 часов. Если произошла ошибка, окружающий контекст сохраняется до 14 дней. Содержимое сообщений, заголовки чатов, имена, адреса электронной почты или другая идентифицирующая информация не включаются. Для корреляции журналов используется случайный идентификатор сессии (генерируется для каждой вкладки браузера, не связан с вашей учетной записью). Вы можете отключить это в любое время в Настройках > Конфиденциальность > Журналы стабильности."
  ja: "安定性ログ：技術的なエラーを診断するために、認証済みユーザーから匿名化されたブラウザコンソールログ（エラーメッセージ、コンポーネントの状態、接続イベント）が収集され、最大48時間保存されます。エラーが発生した場合、周囲のコンテキストは最大14日間保持されます。メッセージの内容、チャットのタイトル、名前、メールアドレス、その他の個人を特定できる情報は含まれません。ログの相関にはランダムなセッション識別子（ブラウザタブごとに生成され、アカウントにリンクされない）が使用されます。設定 > プライバシー > 安定性ログでいつでも無効にできます。"
  ko: "안정성 로그: 기술적 오류를 진단하기 위해 인증된 사용자로부터 익명화된 브라우저 콘솔 로그(오류 메시지, 컴포넌트 상태, 연결 이벤트)가 수집되어 최대 48시간 저장됩니다. 오류가 발생하면 주변 컨텍스트가 최대 14일간 보존됩니다. 메시지 내용, 채팅 제목, 이름, 이메일 주소 또는 기타 개인 식별 정보는 포함되지 않습니다. 로그 상관 관계를 위해 임의 세션 식별자(브라우저 탭당 생성, 계정에 연결되지 않음)가 사용됩니다. 설정 > 개인 정보 > 안정성 로그에서 언제든지 비활성화할 수 있습니다."
  it: "Log di stabilità: Per diagnosticare errori tecnici, vengono raccolti log della console del browser anonimizzati (messaggi di errore, stato dei componenti, eventi di connessione) dagli utenti autenticati e conservati per un massimo di 48 ore. Se si verifica un errore, il contesto circostante viene conservato per un massimo di 14 giorni. Non è incluso alcun contenuto di messaggi, titoli di chat, nomi, indirizzi email o altre informazioni personalmente identificabili. Per la correlazione dei log viene utilizzato un identificatore di sessione casuale (generato per scheda del browser, non collegato al tuo account). Puoi disattivarlo in qualsiasi momento in Impostazioni > Privacy > Log di stabilità."
  tr: "Kararlılık günlükleri: Teknik hataları teşhis etmek için, kimliği gizlenmiş tarayıcı konsol günlükleri (hata mesajları, bileşen durumu, bağlantı olayları) kimliği doğrulanmış kullanıcılardan toplanır ve 48 saate kadar saklanır. Bir hata meydana gelirse, çevredeki bağlam 14 güne kadar saklanır. Mesaj içeriği, sohbet başlıkları, isimler, e-posta adresleri veya diğer kişisel bilgiler dahil edilmez. Günlük korelasyonu için rastgele bir oturum tanımlayıcısı (tarayıcı sekmesi başına oluşturulur, hesabınıza bağlı değildir) kullanılır. Bunu istediğiniz zaman Ayarlar > Gizlilik > Kararlılık Günlükleri'nden devre dışı bırakabilirsiniz."
  vi: "Nhật ký ổn định: Để chẩn đoán lỗi kỹ thuật, nhật ký bảng điều khiển trình duyệt ẩn danh (thông báo lỗi, trạng thái thành phần, sự kiện kết nối) được thu thập từ người dùng đã xác thực và lưu trữ tối đa 48 giờ. Nếu xảy ra lỗi, ngữ cảnh xung quanh được giữ lại tối đa 14 ngày. Không bao gồm nội dung tin nhắn, tiêu đề trò chuyện, tên, địa chỉ email hoặc thông tin nhận dạng cá nhân khác. Một mã định danh phiên ngẫu nhiên (được tạo cho mỗi tab trình duyệt, không liên kết với tài khoản) được sử dụng để tương quan nhật ký. Bạn có thể tắt tính năng này bất kỳ lúc nào trong Cài đặt > Quyền riêng tư > Nhật ký ổn định."
  id: "Log stabilitas: Untuk mendiagnosis kesalahan teknis, log konsol browser anonim (pesan kesalahan, status komponen, peristiwa koneksi) dikumpulkan dari pengguna terautentikasi dan disimpan hingga 48 jam. Jika terjadi kesalahan, konteks sekitarnya disimpan hingga 14 hari. Tidak ada konten pesan, judul obrolan, nama, alamat email, atau informasi identitas pribadi lainnya yang disertakan. Pengenal sesi acak (dibuat per tab browser, tidak ditautkan ke akun Anda) digunakan untuk korelasi log. Anda dapat menonaktifkan ini kapan saja di Pengaturan > Privasi > Log Stabilitas."
  pl: "Dzienniki stabilności: W celu diagnozowania błędów technicznych, anonimizowane dzienniki konsoli przeglądarki (komunikaty o błędach, stan komponentów, zdarzenia połączeń) są zbierane od uwierzytelnionych użytkowników i przechowywane do 48 godzin. Jeśli wystąpi błąd, otaczający kontekst jest przechowywany do 14 dni. Nie są uwzględniane treści wiadomości, tytuły czatów, nazwy, adresy e-mail ani inne informacje umożliwiające identyfikację osoby. Do korelacji dzienników używany jest losowy identyfikator sesji (generowany dla każdej karty przeglądarki, niepowiązany z Twoim kontem). Możesz to wyłączyć w dowolnym momencie w Ustawieniach > Prywatność > Dzienniki stabilności."
  nl: "Stabiliteitslogboeken: Om technische fouten te diagnosticeren, worden geanonimiseerde browserconsolelogboeken (foutmeldingen, componentstatus, verbindingsgebeurtenissen) verzameld van geauthenticeerde gebruikers en tot 48 uur bewaard. Als er een fout optreedt, wordt de omringende context tot 14 dagen bewaard. Er wordt geen berichtinhoud, chattitels, namen, e-mailadressen of andere persoonlijk identificeerbare informatie opgenomen. Een willekeurige sessie-identificator (gegenereerd per browsertabblad, niet gekoppeld aan uw account) wordt gebruikt voor logcorrelatie. U kunt dit op elk moment uitschakelen in Instellingen > Privacy > Stabiliteitslogboeken."
  ar: "سجلات الاستقرار: لتشخيص الأخطاء التقنية، يتم جمع سجلات وحدة تحكم المتصفح المجهولة (رسائل الخطأ، حالة المكونات، أحداث الاتصال) من المستخدمين المصادق عليهم وتخزينها لمدة تصل إلى 48 ساعة. في حالة حدوث خطأ، يتم الاحتفاظ بالسياق المحيط لمدة تصل إلى 14 يومًا. لا يتم تضمين محتوى الرسائل أو عناوين المحادثات أو الأسماء أو عناوين البريد الإلكتروني أو أي معلومات تعريف شخصية أخرى. يُستخدم معرف جلسة عشوائي (يُنشأ لكل علامة تبويب متصفح، غير مرتبط بحسابك) لربط السجلات. يمكنك تعطيل هذا في أي وقت من الإعدادات > الخصوصية > سجلات الاستقرار."
  hi: "स्थिरता लॉग: तकनीकी त्रुटियों का निदान करने के लिए, प्रमाणित उपयोगकर्ताओं से अनामिकृत ब्राउज़र कंसोल लॉग (त्रुटि संदेश, कंपोनेंट स्थिति, कनेक्शन इवेंट) एकत्र किए जाते हैं और 48 घंटे तक संग्रहीत किए जाते हैं। यदि कोई त्रुटि होती है, तो आसपास का संदर्भ 14 दिनों तक बनाए रखा जाता है। कोई संदेश सामग्री, चैट शीर्षक, नाम, ईमेल पते या अन्य व्यक्तिगत रूप से पहचान योग्य जानकारी शामिल नहीं होती। लॉग सहसंबंध के लिए एक यादृच्छिक सत्र पहचानकर्ता (प्रति ब्राउज़र टैब जेनरेट, आपके खाते से जुड़ा नहीं) का उपयोग किया जाता है। आप इसे सेटिंग्स > गोपनीयता > स्थिरता लॉग में किसी भी समय अक्षम कर सकते हैं।"
  th: "บันทึกเสถียรภาพ: เพื่อวินิจฉัยข้อผิดพลาดทางเทคนิค ระบบจะรวบรวมบันทึกคอนโซลเบราว์เซอร์ที่ไม่ระบุตัวตน (ข้อความข้อผิดพลาด สถานะคอมโพเนนต์ เหตุการณ์การเชื่อมต่อ) จากผู้ใช้ที่ผ่านการยืนยันตัวตน และจัดเก็บไว้สูงสุด 48 ชั่วโมง หากเกิดข้อผิดพลาด บริบทโดยรอบจะถูกเก็บรักษาไว้สูงสุด 14 วัน ไม่มีเนื้อหาข้อความ ชื่อแชท ชื่อ ที่อยู่อีเมล หรือข้อมูลที่ระบุตัวบุคคลอื่นๆ รวมอยู่ด้วย ตัวระบุเซสชันแบบสุ่ม (สร้างขึ้นต่อแท็บเบราว์เซอร์ ไม่เชื่อมโยงกับบัญชีของคุณ) ใช้สำหรับการเชื่อมโยงบันทึก คุณสามารถปิดการใช้งานได้ตลอดเวลาที่ การตั้งค่า > ความเป็นส่วนตัว > บันทึกเสถียรภาพ"
  cs: "Protokoly stability: Pro diagnostiku technických chyb se od ověřených uživatelů shromažďují anonymizované protokoly konzole prohlížeče (chybové zprávy, stav komponent, události připojení) a uchovávají se po dobu až 48 hodin. Pokud dojde k chybě, okolní kontext se uchová po dobu až 14 dnů. Nejsou zahrnuty žádné obsahy zpráv, názvy chatů, jména, e-mailové adresy ani jiné osobně identifikovatelné informace. Pro korelaci protokolů se používá náhodný identifikátor relace (generovaný pro každou záložku prohlížeče, nepropojený s vaším účtem). Toto můžete kdykoli vypnout v Nastavení > Soukromí > Protokoly stability."
  sv: "Stabilitetsloggar: För att diagnostisera tekniska fel samlas anonymiserade webbläsarkonsolloggar (felmeddelanden, komponentstatus, anslutningshändelser) in från autentiserade användare och lagras i upp till 48 timmar. Om ett fel inträffar behålls omgivande kontext i upp till 14 dagar. Inget meddelandeinnehåll, chatttitlar, namn, e-postadresser eller annan personligt identifierbar information inkluderas. En slumpmässig sessionsidentifierare (genererad per webbläsarflik, inte kopplad till ditt konto) används för loggkorrelation. Du kan inaktivera detta när som helst under Inställningar > Integritet > Stabilitetsloggar."
  he: "יומני יציבות: לצורך אבחון שגיאות טכניות, נאספים יומני קונסולת דפדפן אנונימיים (הודעות שגיאה, מצב רכיבים, אירועי חיבור) ממשתמשים מאומתים ונשמרים עד 48 שעות. אם מתרחשת שגיאה, ההקשר הסובב נשמר עד 14 יום. לא נכלל תוכן הודעות, כותרות צ'אט, שמות, כתובות דוא\"ל או מידע מזהה אישי אחר. מזהה סשן אקראי (נוצר לכל כרטיסיית דפדפן, לא מקושר לחשבון שלך) משמש לקורלציית יומנים. ניתן להשבית זאת בכל עת בהגדרות > פרטיות > יומני יציבות."
  verified_by_human: []
