providers.always_active.description:
  context: Description of Group A
  en: >-
    These providers are used for every user, regardless of which features you
    use. Using OpenMates at all means your data passes through them.
  de: Diese Anbieter werden für jeden Nutzer verwendet, unabhängig davon, welche Funktionen du nutzt. Die Nutzung von OpenMates bedeutet grundsätzlich, dass deine Daten über diese Anbieter laufen.
  zh: 无论你使用哪些功能，这些服务商都会为每位用户提供服务。只要使用 OpenMates，你的数据就会经过它们。
  es: Estos proveedores se utilizan para todos los usuarios, independientemente de las funciones que utilices. El simple hecho de usar OpenMates significa que tus datos pasan por ellos.
  ru: Эти провайдеры используются для каждого пользователя, независимо от того, какие функции ты используешь. Использование OpenMates означает, что твои данные проходят через них.
  ja: これらのプロバイダーは、使用する機能に関わらず、すべてのユーザーに使用されます。OpenMatesを利用するということは、データがこれらのプロバイダーを経由することを意味します。
  ko: 이 제공업체들은 사용 중인 기능과 관계없이 모든 사용자에게 사용됩니다. OpenMates를 사용한다는 것은 데이터가 이들을 거친다는 것을 의미합니다.
  it: "Questi fornitori vengono utilizzati per ogni utente, indipendentemente dalle funzioni utilizzate. L'uso di OpenMates implica che i tuoi dati passino attraverso di loro."
  tr: "Bu sağlayıcılar, hangi özellikleri kullandığından bağımsız olarak her kullanıcı için kullanılır. OpenMates'i kullanman, verilerinin bu sağlayıcılardan geçtiği anlamına gelir."
  vi: Các nhà cung cấp này được sử dụng cho mọi người dùng, bất kể bạn sử dụng tính năng nào. Việc sử dụng OpenMates đồng nghĩa với việc dữ liệu của bạn sẽ đi qua họ.
  id: Penyedia ini digunakan untuk setiap pengguna, terlepas dari fitur mana yang kamu gunakan. Menggunakan OpenMates berarti datamu melewati mereka.
  pl: Ci dostawcy są używani dla każdego użytkownika, niezależnie od tego, z jakich funkcji korzystasz. Korzystanie z OpenMates w ogóle oznacza, że Twoje dane przechodzą przez nich.
  nl: Deze providers worden voor elke gebruiker gebruikt, ongeacht welke functies je gebruikt. Het gebruik van OpenMates betekent dat je gegevens via hen worden verwerkt.
  ar: يتم استخدام هؤلاء المزودين لكل مستخدم، بغض النظر عن الميزات التي تستخدمها. استخدام OpenMates يعني أن بياناتك تمر عبرهم.
  hi: इन प्रदाताओं का उपयोग प्रत्येक उपयोगकर्ता के लिए किया जाता है, चाहे तुम किसी भी सुविधा का उपयोग करो। OpenMates का उपयोग करने का मतलब है कि तुम्हारा डेटा इनके माध्यम से गुज़रता है।
  th: ผู้ให้บริการเหล่านี้ถูกใช้สำหรับผู้ใช้ทุกคน ไม่ว่าคุณจะใช้ฟีเจอร์ใดก็ตาม การใช้งาน OpenMates หมายความว่าข้อมูลของคุณจะผ่านผู้ให้บริการเหล่านี้
  cs: Tito poskytovatelé jsou využíváni pro každého uživatele bez ohledu na to, které funkce používáš. Samotné používání OpenMates znamená, že tvá data jimi procházejí.
  sv: Dessa leverantörer används för varje användare, oavsett vilka funktioner du använder. Att använda OpenMates överhuvudtaget innebär att dina data passerar genom dem.
  he: ספקים אלו משמשים עבור כל משתמש, ללא קשר לתכונות שבהן אתה משתמש. שימוש ב-OpenMates פירושו שהנתונים שלך עוברים דרכם.
  pt: Estes provedores são utilizados para todos os usuários, independentemente de quais funcionalidades você use. Usar o OpenMates significa que seus dados passam por eles.
  fr: Ces fournisseurs sont utilisés pour chaque utilisateur, quelles que soient les fonctionnalités que tu utilises. Utiliser OpenMates signifie que tes données passent par eux.
  verified_by_human: []
