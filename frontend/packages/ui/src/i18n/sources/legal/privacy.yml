protection.client_side_encryption.description:
  context: Description of client-side encryption
  en: >-
    Your chat content, titles, summaries, tags, per-chat keys, app settings and
    memories, reminders, and sensitive profile fields (encrypted username,
    auto-top-up email, 2FA secrets) are encrypted in your browser before being
    sent to our servers. The browser uses a key derived from your login
    credential; our servers reject writes that contain anything but ciphertext.
    This is *not* end-to-end encryption — our servers can decrypt your content
    in memory when they need to (for AI responses, invoice rendering, reminder
    delivery). The difference from end-to-end encryption is that decryption
    happens transiently in process memory and the plaintext is never persisted
    to disk, logs, or traces.
  de: >-
    Deine Chat-Inhalte, Titel, Zusammenfassungen, Tags, Chat-spezifischen
    Schlüssel, App-Einstellungen und Erinnerungen, Reminder und sensible
    Profilfelder (verschlüsselter Benutzername, E-Mail für automatisches
    Aufladen, 2FA-Geheimnisse) werden in deinem Browser verschlüsselt, bevor
    sie an unsere Server gesendet werden. Der Browser verwendet einen
    Schlüssel, der aus deinen Anmeldedaten abgeleitet wird; unsere Server
    lehnen Schreibvorgänge ab, die nichts anderes als Chiffretext enthalten.
    Dies ist *keine* Ende-zu-Ende-Verschlüsselung – unsere Server können deine
    Inhalte bei Bedarf im Arbeitsspeicher entschlüsseln (für KI-Antworten, das
    Rendern von Rechnungen, das Zustellen von Erinnerungen). Der Unterschied
    zur Ende-zu-Ende-Verschlüsselung besteht darin, dass die Entschlüsselung
    flüchtig im Prozessspeicher erfolgt und der Klartext niemals dauerhaft auf
    der Festplatte, in Logs oder Traces gespeichert wird.
  zh: >-
    你的聊天内容、标题、摘要、标签、每个聊天的密钥、应用设置和记忆、提醒以及敏感的个人资料字段（加密的用户名、自动充值邮箱、2FA
    密钥）在发送到我们的服务器之前会在你的浏览器中加密。浏览器使用从你的登录凭据派生的密钥；我们的服务器拒绝任何除密文以外的写入请求。这*不是*端到端加密——当需要时（用于
    AI 响应、发票生成、提醒发送），我们的服务器可以在内存中解密你的内容。与端到端加密的区别在于，解密在进程内存中是瞬时发生的，明文永远不会持久化到磁盘、日志或追踪记录中。
  es: >-
    El contenido de tus chats, títulos, resúmenes, etiquetas, claves por chat,
    ajustes de la aplicación y memorias, recordatorios y campos de perfil
    sensibles (nombre de usuario cifrado, correo de recarga automática,
    secretos de 2FA) se cifran en tu navegador antes de enviarse a nuestros
    servidores. El navegador utiliza una clave derivada de tus credenciales de
    inicio de sesión; nuestros servidores rechazan escrituras que contengan
    cualquier cosa que no sea texto cifrado. Esto *no* es cifrado de extremo a
    extremo: nuestros servidores pueden descifrar tu contenido en memoria
    cuando lo necesitan (para respuestas de IA, generación de facturas, envío
    de recordatorios). La diferencia con el cifrado de extremo a extremo es
    que el descifrado ocurre de forma transitoria en la memoria del proceso y
    el texto plano nunca se persiste en disco, registros o trazas.
  fr: >-
    Le contenu de tes discussions, titres, résumés, étiquettes, clés par
    discussion, paramètres d'applications et mémoires, rappels et champs de
    profil sensibles (nom d'utilisateur chiffré, e-mail de recharge
    automatique, secrets 2FA) sont chiffrés dans ton navigateur avant d'être
    envoyés à nos serveurs. Le navigateur utilise une clé dérivée de tes
    identifiants de connexion ; nos serveurs refusent toute écriture qui ne
    serait pas du texte chiffré. Il ne s'agit *pas* de chiffrement de bout en
    bout — nos serveurs peuvent déchiffrer ton contenu en mémoire lorsqu'ils
    en ont besoin (pour les réponses de l'IA, l'édition de factures, l'envoi
    de rappels). La différence avec le chiffrement de bout en bout est que le
    déchiffrement se produit de manière transitoire dans la mémoire du
    processus et que le texte en clair n'est jamais conservé sur le disque,
    dans les journaux ou les traces.
  pt: >-
    O conteúdo dos seus chats, títulos, resumos, tags, chaves por chat,
    configurações e memórias de aplicativos, lembretes e campos sensíveis do
    perfil (nome de usuário criptografado, e-mail de recarga automática,
    segredos 2FA) são criptografados no seu navegador antes de serem enviados
    aos nossos servidores. O navegador usa uma chave derivada das suas
    credenciais de login; nossos servidores rejeitam gravações que contenham
    qualquer coisa que não seja texto cifrado. Isto *não* é criptografia de
    ponta a ponta — nossos servidores podem descriptografar seu conteúdo na
    memória quando necessário (para respostas de IA, geração de faturas,
    entrega de lembretes). A diferença da criptografia de ponta a ponta é que
    a descriptografia acontece de forma transitória na memória do processo e
    o texto simples nunca é persistido em disco, logs ou rastros.
  ru: >-
    Содержимое ваших чатов, заголовки, резюме, теги, ключи каждого чата,
    настройки и воспоминания приложений, напоминания и конфиденциальные поля
    профиля (зашифрованное имя пользователя, email автопополнения, секреты
    2FA) шифруются в вашем браузере до отправки на наши серверы. Браузер
    использует ключ, полученный из ваших учётных данных; наши серверы
    отклоняют запись, содержащую что-либо кроме шифротекста. Это *не*
    сквозное шифрование — наши серверы могут расшифровать ваш контент в
    памяти при необходимости (для ответов ИИ, рендеринга счетов, доставки
    напоминаний). Отличие от сквозного шифрования в том, что расшифровка
    происходит кратковременно в памяти процесса, и открытый текст никогда не
    сохраняется на диск, в логи или трассы.
  ja: >-
    あなたのチャットコンテンツ、タイトル、要約、タグ、チャットごとのキー、アプリ設定とメモリー、リマインダー、機密性の高いプロフィールフィールド（暗号化されたユーザー名、自動チャージ用メール、2FA
    シークレット）は、当社のサーバーに送信される前にブラウザ内で暗号化されます。ブラウザはログイン認証情報から派生したキーを使用します。当社のサーバーは暗号文以外の書き込みを拒否します。これはエンドツーエンド暗号化では*ありません*——当社のサーバーは必要な場合（AI
    応答、請求書レンダリング、リマインダー配信のため）メモリ内であなたのコンテンツを復号できます。エンドツーエンド暗号化との違いは、復号はプロセスメモリ内で一時的に行われ、平文がディスク、ログ、トレースに永続化されることは決してないという点です。
  ko: >-
    채팅 콘텐츠, 제목, 요약, 태그, 채팅별 키, 앱 설정 및 메모리, 알림, 민감한 프로필 필드(암호화된 사용자명, 자동
    충전 이메일, 2FA 비밀)는 우리 서버로 전송되기 전에 브라우저에서 암호화됩니다. 브라우저는 로그인 자격 증명에서 파생된
    키를 사용합니다. 우리 서버는 암호문이 아닌 어떤 것도 포함된 쓰기를 거부합니다. 이것은 *종단간 암호화가 아닙니다* —
    우리 서버는 필요할 때(AI 응답, 청구서 렌더링, 알림 전달을 위해) 메모리에서 콘텐츠를 복호화할 수 있습니다. 종단간 암호화와의
    차이점은 복호화가 프로세스 메모리에서 일시적으로 발생하고 평문이 디스크, 로그 또는 추적에 절대로 지속되지 않는다는 점입니다.
  it: >-
    Il contenuto delle tue chat, titoli, riassunti, tag, chiavi per chat,
    impostazioni e memorie delle app, promemoria e campi sensibili del profilo
    (nome utente crittografato, email per la ricarica automatica, segreti 2FA)
    vengono cifrati nel tuo browser prima di essere inviati ai nostri server.
    Il browser utilizza una chiave derivata dalle tue credenziali di accesso;
    i nostri server rifiutano scritture che contengano qualcosa di diverso da
    testo cifrato. Questa *non* è cifratura end-to-end — i nostri server
    possono decifrare i tuoi contenuti in memoria quando ne hanno bisogno (per
    le risposte IA, la generazione di fatture, l'invio di promemoria). La
    differenza rispetto alla cifratura end-to-end è che la decifratura avviene
    transitoriamente nella memoria di processo e il testo in chiaro non viene
    mai persistito su disco, log o tracce.
  tr: >-
    Sohbet içeriğiniz, başlıklar, özetler, etiketler, sohbet başına anahtarlar,
    uygulama ayarları ve bellekleri, hatırlatıcılar ve hassas profil alanları
    (şifrelenmiş kullanıcı adı, otomatik yükleme e-postası, 2FA sırları)
    sunucularımıza gönderilmeden önce tarayıcınızda şifrelenir. Tarayıcı,
    oturum açma kimlik bilgilerinizden türetilen bir anahtar kullanır;
    sunucularımız, şifreli metin dışında bir şey içeren yazmaları reddeder.
    Bu *uçtan uca şifreleme değildir* — sunucularımız ihtiyaç duyduğunda (AI
    yanıtları, fatura oluşturma, hatırlatıcı teslimatı için) içeriğinizin
    şifresini bellekte çözebilir. Uçtan uca şifrelemeden farkı, şifre
    çözmenin işlem belleğinde geçici olarak gerçekleşmesi ve düz metnin
    diske, günlüklere veya izlere asla kalıcı olarak yazılmamasıdır.
  vi: >-
    Nội dung trò chuyện, tiêu đề, bản tóm tắt, thẻ, khóa cho từng cuộc trò
    chuyện, cài đặt và ký ức ứng dụng, lời nhắc và các trường hồ sơ nhạy cảm
    (tên người dùng được mã hóa, email nạp tự động, bí mật 2FA) của bạn được
    mã hóa trong trình duyệt của bạn trước khi được gửi đến máy chủ của chúng
    tôi. Trình duyệt sử dụng khóa được lấy từ thông tin đăng nhập của bạn; máy
    chủ của chúng tôi từ chối các yêu cầu ghi chứa bất kỳ thứ gì ngoài văn bản
    mã hóa. Đây *không phải là* mã hóa đầu cuối — máy chủ của chúng tôi có
    thể giải mã nội dung của bạn trong bộ nhớ khi cần (để trả lời AI, kết xuất
    hóa đơn, gửi lời nhắc). Sự khác biệt so với mã hóa đầu cuối là việc giải
    mã diễn ra thoáng qua trong bộ nhớ tiến trình và văn bản thuần không bao
    giờ được lưu vào đĩa, nhật ký hoặc dấu vết.
  id: >-
    Konten obrolan, judul, ringkasan, tag, kunci per obrolan, pengaturan dan
    memori aplikasi, pengingat, dan bidang profil sensitif (nama pengguna
    terenkripsi, email isi ulang otomatis, rahasia 2FA) Anda dienkripsi di
    peramban Anda sebelum dikirim ke server kami. Peramban menggunakan kunci
    yang diturunkan dari kredensial login Anda; server kami menolak penulisan
    yang berisi apa pun selain teks terenkripsi. Ini *bukan* enkripsi
    ujung-ke-ujung — server kami dapat mendekripsi konten Anda di memori ketika
    diperlukan (untuk respons AI, rendering faktur, pengiriman pengingat).
    Perbedaan dari enkripsi ujung-ke-ujung adalah dekripsi terjadi secara
    sementara dalam memori proses dan teks biasa tidak pernah dipertahankan di
    disk, log, atau jejak.
  pl: >-
    Treść twoich czatów, tytuły, podsumowania, tagi, klucze poszczególnych
    czatów, ustawienia i pamięci aplikacji, przypomnienia oraz wrażliwe pola
    profilu (zaszyfrowana nazwa użytkownika, email automatycznego doładowania,
    sekrety 2FA) są szyfrowane w twojej przeglądarce przed wysłaniem na nasze
    serwery. Przeglądarka używa klucza wyprowadzonego z twoich danych
    logowania; nasze serwery odrzucają zapisy zawierające cokolwiek innego niż
    szyfrogram. To *nie jest* szyfrowanie end-to-end — nasze serwery mogą
    odszyfrować twoją treść w pamięci, gdy jest to potrzebne (do odpowiedzi
    AI, generowania faktur, dostarczania przypomnień). Różnica w stosunku do
    szyfrowania end-to-end polega na tym, że odszyfrowanie odbywa się
    przejściowo w pamięci procesu, a tekst jawny nigdy nie jest trwale
    zapisywany na dysku, w logach ani w śladach.
  nl: >-
    De inhoud van je chats, titels, samenvattingen, tags, sleutels per chat,
    app-instellingen en -herinneringen, reminders en gevoelige profielvelden
    (versleutelde gebruikersnaam, e-mail voor automatisch aanvullen,
    2FA-geheimen) worden versleuteld in je browser voordat ze naar onze
    servers worden verzonden. De browser gebruikt een sleutel die is afgeleid
    van je inloggegevens; onze servers weigeren schrijfbewerkingen die iets
    anders dan versleutelde tekst bevatten. Dit is *geen*
    end-to-end-versleuteling — onze servers kunnen je content in het geheugen
    ontsleutelen wanneer dat nodig is (voor AI-reacties, factuurweergave,
    herinneringsbezorging). Het verschil met end-to-end-versleuteling is dat
    de ontsleuteling voorbijgaand plaatsvindt in het procesgeheugen en dat de
    platte tekst nooit wordt opgeslagen op schijf, in logs of traces.
  ar: >-
    محتوى محادثاتك، العناوين، الملخصات، الوسوم، مفاتيح كل محادثة، إعدادات
    وذكريات التطبيق، التذكيرات، وحقول الملف الشخصي الحساسة (اسم المستخدم
    المشفر، البريد الإلكتروني للشحن التلقائي، أسرار المصادقة الثنائية) يتم
    تشفيرها في متصفحك قبل إرسالها إلى خوادمنا. يستخدم المتصفح مفتاحًا مشتقًا
    من بيانات تسجيل الدخول الخاصة بك؛ ترفض خوادمنا عمليات الكتابة التي تحتوي
    على أي شيء سوى النص المشفر. هذا *ليس* تشفيرًا طرفيًا — يمكن لخوادمنا فك
    تشفير محتواك في الذاكرة عند الحاجة (لاستجابات الذكاء الاصطناعي، وعرض
    الفواتير، وتسليم التذكيرات). الفرق عن التشفير الطرفي هو أن فك التشفير يحدث
    بشكل عابر في ذاكرة العملية ولا يتم أبدًا الاحتفاظ بالنص العادي على القرص
    أو في السجلات أو التتبعات.
  hi: >-
    आपकी चैट सामग्री, शीर्षक, सारांश, टैग, प्रति-चैट कुंजियाँ, ऐप सेटिंग्स
    और यादें, रिमाइंडर और संवेदनशील प्रोफ़ाइल फ़ील्ड (एन्क्रिप्टेड उपयोगकर्ता
    नाम, ऑटो-टॉप-अप ईमेल, 2FA रहस्य) हमारे सर्वर पर भेजे जाने से पहले आपके
    ब्राउज़र में एन्क्रिप्ट की जाती हैं। ब्राउज़र आपके लॉगिन क्रेडेंशियल से
    व्युत्पन्न कुंजी का उपयोग करता है; हमारे सर्वर सिफरटेक्स्ट के अलावा कुछ
    भी शामिल करने वाले लेखन को अस्वीकार कर देते हैं। यह एंड-टू-एंड
    एन्क्रिप्शन *नहीं है* — हमारे सर्वर आवश्यकता होने पर मेमोरी में आपकी सामग्री
    को डिक्रिप्ट कर सकते हैं (AI प्रतिक्रियाओं, चालान रेंडरिंग, रिमाइंडर
    डिलीवरी के लिए)। एंड-टू-एंड एन्क्रिप्शन से अंतर यह है कि डिक्रिप्शन
    प्रक्रिया मेमोरी में क्षणिक रूप से होता है और प्लेनटेक्स्ट को कभी भी
    डिस्क, लॉग या ट्रेस में संग्रहीत नहीं किया जाता।
  th: >-
    เนื้อหาการแชท หัวข้อ ข้อมูลสรุป แท็ก กุญแจต่อการแชท การตั้งค่าและความทรงจำของแอป
    การแจ้งเตือน และฟิลด์โปรไฟล์ที่ละเอียดอ่อน (ชื่อผู้ใช้ที่เข้ารหัส อีเมลเติมเงินอัตโนมัติ
    รหัสลับ 2FA) ของคุณจะถูกเข้ารหัสในเบราว์เซอร์ของคุณก่อนที่จะถูกส่งไปยังเซิร์ฟเวอร์ของเรา
    เบราว์เซอร์ใช้กุญแจที่ได้มาจากข้อมูลประจำตัวการเข้าสู่ระบบของคุณ เซิร์ฟเวอร์ของเราปฏิเสธการเขียนที่มีสิ่งอื่นใดนอกจากข้อความเข้ารหัส
    นี่*ไม่ใช่*การเข้ารหัสแบบเอนด์ทูเอนด์ — เซิร์ฟเวอร์ของเราสามารถถอดรหัสเนื้อหาของคุณในหน่วยความจำเมื่อจำเป็น
    (สำหรับการตอบกลับของ AI การแสดงใบแจ้งหนี้ การส่งการแจ้งเตือน) ความแตกต่างจากการเข้ารหัสแบบเอนด์ทูเอนด์คือการถอดรหัสเกิดขึ้นชั่วคราวในหน่วยความจำของโปรเซส
    และข้อความที่ไม่เข้ารหัสจะไม่ถูกเก็บลงในดิสก์ บันทึก หรือร่องรอย
  cs: >-
    Obsah vašich chatů, názvy, shrnutí, štítky, klíče pro jednotlivé chaty,
    nastavení a paměti aplikací, připomenutí a citlivá pole profilu
    (šifrované uživatelské jméno, e-mail pro automatické dobíjení, tajemství
    2FA) jsou šifrovány ve vašem prohlížeči před odesláním na naše servery.
    Prohlížeč používá klíč odvozený z vašich přihlašovacích údajů; naše
    servery odmítají zápisy obsahující cokoli jiného než šifrovaný text.
    Toto *není* end-to-end šifrování — naše servery mohou váš obsah v případě
    potřeby dešifrovat v paměti (pro AI odpovědi, vykreslování faktur,
    doručování připomenutí). Rozdíl oproti end-to-end šifrování spočívá v
    tom, že dešifrování probíhá přechodně v paměti procesu a prostý text
    nikdy není trvale uložen na disk, do logů ani do trasování.
  sv: >-
    Ditt chattinnehåll, titlar, sammanfattningar, taggar, nycklar per chatt,
    appinställningar och minnen, påminnelser och känsliga profilfält
    (krypterat användarnamn, e-post för automatisk påfyllning, 2FA-hemligheter)
    krypteras i din webbläsare innan de skickas till våra servrar. Webbläsaren
    använder en nyckel som härletts från dina inloggningsuppgifter; våra
    servrar avvisar skrivningar som innehåller något annat än chiffertext.
    Detta är *inte* end-to-end-kryptering — våra servrar kan dekryptera ditt
    innehåll i minnet när de behöver det (för AI-svar, fakturagenerering,
    påminnelseleverans). Skillnaden från end-to-end-kryptering är att
    dekryptering sker kortvarigt i processminnet och att klartexten aldrig
    skrivs till disk, loggar eller spårningar.
  he: >-
    תוכן הצ'אטים שלך, הכותרות, הסיכומים, התגיות, המפתחות לכל צ'אט, הגדרות
    וזיכרונות האפליקציה, התזכורות ושדות פרופיל רגישים (שם משתמש מוצפן, אימייל
    לטעינה אוטומטית, סודות 2FA) מוצפנים בדפדפן שלך לפני שהם נשלחים לשרתים
    שלנו. הדפדפן משתמש במפתח שנגזר מנתוני הכניסה שלך; השרתים שלנו דוחים
    כתיבות המכילות כל דבר מלבד טקסט מוצפן. זו *אינה* הצפנה מקצה לקצה —
    השרתים שלנו יכולים לפענח את התוכן שלך בזיכרון כאשר הם צריכים (עבור תגובות
    AI, הצגת חשבוניות, משלוח תזכורות). ההבדל מהצפנה מקצה לקצה הוא שהפענוח
    מתרחש באופן זמני בזיכרון התהליך והטקסט הגלוי לעולם אינו נשמר באופן קבוע
    בדיסק, בלוגים או במעקבים.
  verified_by_human: []
