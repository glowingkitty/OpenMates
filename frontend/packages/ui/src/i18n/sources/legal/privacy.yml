providers.ai_models.groq.description:
  context: Groq description
  en: >-
    Groq is used server-side to sanitize external content (search results and
    scraped web pages) before it is included in AI responses. Groq sees the
    external content we fetched on your behalf, not your chat messages, and
    never learns which user requested each piece of content.
  de: Groq wird serverseitig verwendet, um externe Inhalte (Suchergebnisse und gescrapte Webseiten) zu bereinigen, bevor sie in KI-Antworten aufgenommen werden. Groq sieht die externen Inhalte, die wir in deinem Namen abgerufen haben, nicht deine Chat-Nachrichten, und erfährt nie, welcher Nutzer welchen Inhalt angefordert hat.
  zh: Groq 在服务器端用于在外部内容（搜索结果和抓取的网页）包含在 AI 回复之前对其进行清理。Groq 会看到我们代表您获取的外部内容，但不会看到您的聊天消息，也永远不会知道是哪个用户请求了这些内容。
  es: Groq se utiliza en el lado del servidor para sanear el contenido externo (resultados de búsqueda y páginas web extraídas) antes de que se incluya en las respuestas de la IA. Groq ve el contenido externo que recuperamos en tu nombre, no tus mensajes de chat, y nunca sabe qué usuario solicitó cada fragmento de contenido.
  pt: O Groq é utilizado no lado do servidor para higienizar conteúdo externo (resultados de pesquisa e páginas web extraídas) antes de ser incluído nas respostas da IA. O Groq vê o conteúdo externo que recolhemos em teu nome, não as tuas mensagens de chat, e nunca sabe qual utilizador solicitou cada parte do conteúdo.
  ja: Groqは、外部コンテンツ（検索結果やスクレイピングされたウェブページ）をAIの回答に含める前に、サーバー側でサニタイズするために使用される。Groqは、ユーザーに代わって取得された外部コンテンツを参照するが、ユーザーのチャットメッセージは参照せず、どのユーザーがどのコンテンツをリクエストしたかを知ることもない。
  ko: Groq은 AI 응답에 포함되기 전 외부 콘텐츠(검색 결과 및 스크레이핑된 웹 페이지)를 정화하기 위해 서버 측에서 사용됩니다. Groq은 사용자의 채팅 메시지가 아닌, 사용자를 대신해 가져온 외부 콘텐츠를 확인하며, 어떤 사용자가 각 콘텐츠를 요청했는지 알 수 없습니다.
  it: "Groq viene utilizzato lato server per sanitizzare i contenuti esterni (risultati di ricerca e pagine web estratte) prima che vengano inclusi nelle risposte dell'IA. Groq vede i contenuti esterni che abbiamo recuperato per tuo conto, non i tuoi messaggi di chat, e non sa mai quale utente abbia richiesto ogni contenuto."
  tr: Groq, dış içeriği (arama sonuçları ve taranan web sayfaları) yapay zeka yanıtlarına dahil edilmeden önce temizlemek için sunucu tarafında kullanılır. Groq, sohbet mesajlarını değil, senin adına getirdiğimiz dış içeriği görür ve hangi kullanıcının hangi içeriği istediğini asla öğrenmez.
  vi: Groq được sử dụng ở phía máy chủ để làm sạch nội dung bên ngoài (kết quả tìm kiếm và các trang web được thu thập) trước khi đưa vào phản hồi của AI. Groq thấy nội dung bên ngoài mà chúng tôi đã lấy thay mặt bạn, chứ không phải tin nhắn trò chuyện của bạn, và không bao giờ biết người dùng nào đã yêu cầu từng phần nội dung đó.
  id: Groq digunakan di sisi server untuk membersihkan konten eksternal (hasil pencarian dan halaman web yang dikeruk) sebelum disertakan dalam respons AI. Groq melihat konten eksternal yang kami ambil atas namamu, bukan pesan obrolanmu, dan tidak pernah mengetahui pengguna mana yang meminta setiap bagian konten tersebut.
  pl: Groq jest używany po stronie serwera do sanityzacji treści zewnętrznych (wyników wyszukiwania i pobranych stron internetowych) przed ich dołączeniem do odpowiedzi AI. Groq widzi treści zewnętrzne pobrane w Twoim imieniu, a nie Twoje wiadomości czatu, i nigdy nie dowiaduje się, który użytkownik prosił o dany element treści.
  nl: "Groq wordt aan de serverzijde gebruikt om externe inhoud (zoekresultaten en gescrapete webpagina's) op te schonen voordat deze in AI-antwoorden wordt opgenomen. Groq ziet de externe inhoud die we namens jou hebben opgehaald, niet je chatberichten, en komt nooit te weten welke gebruiker om welk stukje inhoud heeft gevraagd."
  hi: Groq का उपयोग सर्वर-साइड पर बाहरी कंटेंट (खोज परिणाम और स्क्रैप किए गए वेब पेज) को AI प्रतिक्रियाओं में शामिल करने से पहले साफ़ (sanitize) करने के लिए किया जाता है। Groq वह बाहरी कंटेंट देखता है जिसे हमने आपकी ओर से प्राप्त किया है, न कि आपके चैट संदेश, और उसे कभी पता नहीं चलता कि किस उपयोगकर्ता ने किस कंटेंट के लिए अनुरोध किया था।
  th: Groq ถูกใช้ในฝั่งเซิร์ฟเวอร์เพื่อล้างข้อมูลเนื้อหาภายนอก (ผลการค้นหาและหน้าเว็บที่ดึงข้อมูลมา) ก่อนที่จะรวมเข้าในคำตอบของ AI โดย Groq จะเห็นเนื้อหาภายนอกที่เราดึงมาในนามของคุณ ไม่ใช่ข้อความแชทของคุณ และจะไม่ทราบว่าผู้ใช้รายใดเป็นผู้ขอเนื้อหาแต่ละส่วน
  sv: Groq används på serversidan för att sanera externt innehåll (sökresultat och skrapade webbsidor) innan det inkluderas i AI-svar. Groq ser det externa innehåll vi hämtat åt dig, inte dina chattmeddelanden, och får aldrig veta vilken användare som begärde respektive innehåll.
  fr: "Groq est utilisé côté serveur pour assainir le contenu externe (résultats de recherche et pages web extraites) avant qu'il ne soit inclus dans les réponses de l'IA. Groq voit le contenu externe que nous avons récupéré pour toi, pas tes messages de chat, et ne sait jamais quel utilisateur a demandé chaque élément de contenu."
  ar: يُستخدم Groq من جانب الخادم لتنقية المحتوى الخارجي (نتائج البحث وصفحات الويب المسحوبة) قبل تضمينه في ردود الذكاء الاصطناعي. يرى Groq المحتوى الخارجي الذي جلبناه نيابة عنك، وليس رسائل الدردشة الخاصة بك، ولا يعرف أبداً أي مستخدم طلب كل قطعة من المحتوى.
  cs: Groq se používá na straně serveru k sanitizaci externího obsahu (výsledků vyhledávání a stažených webových stránek) předtím, než je zahrnut do odpovědí AI. Groq vidí externí obsah, který jsme tvým jménem stáhli, nikoli tvé zprávy, a nikdy se nedozví, který uživatel o daný obsah požádal.
  ru: Groq используется на стороне сервера для очистки внешнего контента (результатов поиска и извлеченных веб-страниц) перед его включением в ответы ИИ. Groq видит внешний контент, полученный нами от твоего имени, а не твои сообщения в чате, и никогда не узнает, какой именно пользователь запрашивал тот или иной фрагмент контента.
  he: "Groq משמשת בצד השרת לניקוי תוכן חיצוני (תוצאות חיפוש ודפי אינטרנט שנסרקו) לפני הכללתו בתגובות ה-AI. Groq רואה את התוכן החיצוני שאחזרנו עבורך, לא את הודעות הצ'אט שלך, ולעולם אינה יודעת איזה משתמש ביקש כל פיסת תוכן."
  verified_by_human: []
