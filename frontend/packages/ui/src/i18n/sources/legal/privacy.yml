providers.travel.description:
  context: Description of Group F
  en: >-
    These providers are only used when you invoke a travel skill — flight
    search, hotel search, or flight tracking. If you never use the travel app,
    none of your data is shared with them.
  de: Diese Anbieter werden nur genutzt, wenn du einen Reise-Skill aufrufst – Flugsuche, Hotelsuche oder Flugverfolgung. Wenn du die Reise-App nie nutzt, werden keine deiner Daten mit ihnen geteilt.
  zh: 这些提供商仅在你调用旅游技能（航班搜索、酒店搜索或航班跟踪）时使用。如果你从不使用旅游应用，则不会与他们共享任何数据。
  fr: "Ces fournisseurs ne sont utilisés que lorsque tu appelles une compétence de voyage — recherche de vols, recherche d'hôtels ou suivi de vols. Si tu n'utilises jamais l'application de voyage, aucune de tes données n'est partagée avec eux."
  pt: Estes fornecedores só são utilizados quando invocas uma skill de viagens — pesquisa de voos, pesquisa de hotéis ou seguimento de voos. Se nunca usares a app de viagens, nenhum dos teus dados é partilhado com eles.
  ru: Эти провайдеры используются только тогда, когда ты вызываешь навык для путешествий — поиск авиабилетов, отелей или отслеживание рейсов. Если ты никогда не пользуешься приложением для путешествий, твои данные им не передаются.
  ja: これらのプロバイダーは、フライト検索、ホテル検索、フライト追跡などの旅行スキルを呼び出した場合にのみ使用されます。旅行アプリを使用しない限り、データが共有されることはありません。
  it: "Questi fornitori vengono utilizzati solo quando invochi una skill di viaggio: ricerca voli, ricerca hotel o tracciamento voli. Se non usi mai l'app viaggi, nessuno dei tuoi dati viene condiviso con loro."
  tr: Bu sağlayıcılar yalnızca bir seyahat yeteneğini (uçuş arama, otel arama veya uçuş takibi) çağırdığında kullanılır. Seyahat uygulamasını hiç kullanmazsan, verilerinin hiçbiri onlarla paylaşılmaz.
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn sử dụng một kỹ năng du lịch — tìm kiếm chuyến bay, tìm kiếm khách sạn hoặc theo dõi chuyến bay. Nếu bạn không bao giờ sử dụng ứng dụng du lịch, không có dữ liệu nào của bạn được chia sẻ với họ.
  id: Penyedia ini hanya digunakan saat kamu memanggil keahlian perjalanan — pencarian penerbangan, pencarian hotel, atau pelacakan penerbangan. Jika kamu tidak pernah menggunakan aplikasi perjalanan, tidak ada datamu yang dibagikan kepada mereka.
  pl: Dostawcy ci są wykorzystywani tylko wtedy, gdy wywołasz umiejętność podróżniczą — wyszukiwanie lotów, hoteli lub śledzenie lotów. Jeśli nigdy nie korzystasz z aplikacji podróżniczej, żadne Twoje dane nie są im udostępniane.
  nl: Deze providers worden alleen gebruikt wanneer je een reisvaardigheid aanroept — vluchten zoeken, hotels zoeken of vluchten volgen. Als je de reis-app nooit gebruikt, worden er geen gegevens met hen gedeeld.
  hi: इन प्रदाताओं का उपयोग केवल तब किया जाता है जब आप किसी यात्रा स्किल — फ्लाइट खोज, होटल खोज, या फ्लाइट ट्रैकिंग का उपयोग करते हैं। यदि आप कभी भी यात्रा ऐप का उपयोग नहीं करते हैं, तो आपका कोई भी डेटा उनके साथ साझा नहीं किया जाता है।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้งานเมื่อคุณเรียกใช้ทักษะการเดินทางเท่านั้น เช่น การค้นหาเที่ยวบิน การค้นหาโรงแรม หรือการติดตามเที่ยวบิน หากคุณไม่เคยใช้แอปการเดินทาง จะไม่มีการแชร์ข้อมูลของคุณกับผู้ให้บริการเหล่านี้
  cs: Tito poskytovatelé se využívají pouze tehdy, když vyvoláš cestovní dovednost — vyhledávání letů, hotelů nebo sledování letů. Pokud cestovní aplikaci nikdy nepoužiješ, žádná tvá data s nimi nejsou sdílena.
  sv: Dessa leverantörer används endast när du anropar en resefärdighet — flygsökning, hotellsökning eller flygspårning. Om du aldrig använder reseappen delas ingen av din data med dem.
  he: ספקים אלו נמצאים בשימוש רק כאשר מופעלת מיומנות נסיעות — חיפוש טיסות, חיפוש מלונות או מעקב טיסות. אם לא תשתמש באפליקציית הנסיעות, אף פרט מהמידע שלך לא ישותף איתם.
  es: "Estos proveedores solo se utilizan cuando invocas una habilidad de viajes: búsqueda de vuelos, búsqueda de hoteles o seguimiento de vuelos. Si nunca usas la aplicación de viajes, no se comparte ninguno de tus datos con ellos."
  ko: 이 제공업체는 항공편 검색, 호텔 검색 또는 항공편 추적과 같은 여행 스킬을 호출할 때만 사용됩니다. 여행 앱을 사용하지 않으면 어떠한 데이터도 이들과 공유되지 않습니다.
  ar: يتم استخدام هؤلاء المزودين فقط عند استدعاء مهارة سفر — البحث عن الرحلات الجوية، أو البحث عن الفنادق، أو تتبع الرحلات الجوية. إذا لم تستخدم تطبيق السفر أبداً، فلن تتم مشاركة أي من بياناتك معهم.
  verified_by_human: []
