protection.observability_without_tracking.description:
  context: Description of OpenTelemetry privacy filter and cookieless analytics
  en: >-
    Our internal tracing pipeline (OpenTelemetry) replaces your user ID with a
    hash that rotates every 24 hours, strips authentication headers and cookies
    from every span, and redacts chat content before any trace leaves the
    backend. Our web analytics use a server-side beacon with no cookies and no
    stored individual identifiers. We do not use Google Analytics, Plausible,
    PostHog, or any third-party analytics platform.
  de: Unsere interne Tracing-Pipeline (OpenTelemetry) ersetzt deine Benutzer-ID durch einen Hash, der alle 24 Stunden rotiert, entfernt Authentifizierungs-Header und Cookies aus jedem Span und schwärzt Chat-Inhalte, bevor ein Trace das Backend verlässt. Unsere Web-Analyse nutzt einen serverseitigen Beacon ohne Cookies und ohne gespeicherte individuelle Identifikatoren. Wir nutzen weder Google Analytics, Plausible, PostHog noch andere Analyseplattformen von Drittanbietern.
  zh: 我们的内部追踪流水线 (OpenTelemetry) 会将你的用户 ID 替换为每 24 小时轮换一次的哈希值，从每个 span 中剥离身份验证标头和 Cookie，并在任何追踪离开后端之前脱敏聊天内容。我们的网站分析使用无 Cookie 且不存储个人标识符的服务端信标。我们不使用 Google Analytics、Plausible、PostHog 或任何第三方分析平台。
  es: Nuestra canalización de rastreo interna (OpenTelemetry) reemplaza tu ID de usuario con un hash que rota cada 24 horas, elimina los encabezados de autenticación y las cookies de cada tramo (span) y anonimiza el contenido del chat antes de que cualquier rastro salga del backend. Nuestras analíticas web utilizan una baliza del lado del servidor sin cookies ni identificadores individuales almacenados. No utilizamos Google Analytics, Plausible, PostHog ni ninguna plataforma de analíticas de terceros.
  ru: Наш внутренний конвейер трассировки (OpenTelemetry) заменяет твой ID пользователя хешем, который обновляется каждые 24 часа, удаляет заголовки аутентификации и файлы cookie из каждого спана, а также скрывает содержимое чата до того, как трассировка покинет бэкенд. Наша веб-аналитика использует серверный маяк без файлов cookie и сохраненных индивидуальных идентификаторов. Мы не используем Google Analytics, Plausible, PostHog или любые другие сторонние платформы аналитики.
  ja: 内部のトレースパイプライン（OpenTelemetry）は、ユーザーIDを24時間ごとにローテーションされるハッシュに置き換え、すべてのスパンから認証ヘッダーとクッキーを削除し、トレースがバックエンドを離れる前にチャット内容を秘匿化します。ウェブ分析には、クッキーを使用せず、個別の識別子も保存しないサーバーサイドビーコンを使用しています。Google Analytics、Plausible、PostHog、その他のサードパーティ製分析プラットフォームは一切使用していません。
  ko: 내부 추적 파이프라인(OpenTelemetry)은 사용자 ID를 24시간마다 교체되는 해시로 대체하고, 모든 스팬(span)에서 인증 헤더와 쿠키를 제거하며, 추적이 백엔드를 떠나기 전에 채팅 내용을 수정합니다. 웹 분석은 쿠키와 저장된 개별 식별자 없이 서버 측 비콘을 사용합니다. Google Analytics, Plausible, PostHog 또는 기타 타사 분석 플랫폼을 사용하지 않습니다.
  it: La nostra pipeline di tracciamento interna (OpenTelemetry) sostituisce il tuo ID utente con un hash che ruota ogni 24 ore, rimuove gli header di autenticazione e i cookie da ogni span e oscura il contenuto della chat prima che qualsiasi traccia lasci il backend. Le nostre analisi web utilizzano un beacon lato server senza cookie e senza identificatori individuali memorizzati. Non utilizziamo Google Analytics, Plausible, PostHog o altre piattaforme di analisi di terze parti.
  tr: Dahili izleme hattımız (OpenTelemetry), kullanıcı kimliğini her 24 saatte bir değişen bir karma ile değiştirir, her bir aralıktan (span) kimlik doğrulama başlıklarını ve çerezleri çıkarır ve herhangi bir iz arka uçtan ayrılmadan önce sohbet içeriğini gizler. Web analizlerimiz, çerez içermeyen ve saklanan bireysel kimlik bilgileri barındırmayan sunucu taraflı bir işaretçi (beacon) kullanır. Google Analytics, Plausible, PostHog veya herhangi bir üçüncü taraf analiz platformu kullanmıyoruz.
  vi: Quy trình truy vết nội bộ của chúng tôi (OpenTelemetry) thay thế ID người dùng của bạn bằng một mã băm thay đổi sau mỗi 24 giờ, loại bỏ các tiêu đề xác thực và cookie khỏi mọi phân đoạn (span), và ẩn nội dung trò chuyện trước khi bất kỳ dấu vết nào rời khỏi backend. Công cụ phân tích web của chúng tôi sử dụng tín hiệu phía máy chủ không có cookie và không lưu trữ các mã định danh cá nhân. Chúng tôi không sử dụng Google Analytics, Plausible, PostHog hay bất kỳ nền tảng phân tích bên thứ ba nào khác.
  id: Pipa pelacakan internal kami (OpenTelemetry) mengganti ID penggunamu dengan hash yang diputar setiap 24 jam, menghapus header autentikasi dan cookie dari setiap span, serta menyunting konten obrolan sebelum jejak apa pun meninggalkan backend. Analitik web kami menggunakan suar sisi server tanpa cookie dan tanpa identifikasi individu yang disimpan. Kami tidak menggunakan Google Analytics, Plausible, PostHog, atau platform analitik pihak ketiga lainnya.
  pl: Nasz wewnętrzny potok śledzenia (OpenTelemetry) zastępuje Twój identyfikator użytkownika haszem, który zmienia się co 24 godziny, usuwa nagłówki uwierzytelniania i pliki cookie z każdego segmentu (span) oraz redaguje treść czatu, zanim jakikolwiek ślad opuści backend. Nasza analityka internetowa wykorzystuje sygnał nawigacyjny (beacon) po stronie serwera bez plików cookie i bez przechowywanych indywidualnych identyfikatorów. Nie korzystamy z Google Analytics, Plausible, PostHog ani żadnej innej zewnętrznej platformy analitycznej.
  nl: Onze interne tracing-pipeline (OpenTelemetry) vervangt je gebruikers-ID door een hash die elke 24 uur roteert, verwijdert authenticatie-headers en cookies uit elke span, en anonimiseert chat-inhoud voordat een trace de backend verlaat. Onze webstatistieken maken gebruik van een server-side beacon zonder cookies en zonder opgeslagen individuele identifiers. We gebruiken geen Google Analytics, Plausible, PostHog of enig ander analyseplatform van derden.
  ar: يقوم خط تتبعنا الداخلي (OpenTelemetry) باستبدال معرف المستخدم الخاص بك برمز مشفر يتغير كل 24 ساعة، ويزيل رؤوس المصادقة وملفات تعريف الارتباط من كل نطاق تتبع (span)، ويحجب محتوى الدردشة قبل أن يغادر التتبع الواجهة الخلفية. تستخدم تحليلات الويب لدينا منارة (beacon) من جهة الخادم بدون ملفات تعريف ارتباط وبدون معرفات فردية مخزنة. نحن لا نستخدم Google Analytics أو Plausible أو PostHog أو أي منصة تحليلات تابعة لجهة خارجية.
  hi: हमारी आंतरिक ट्रेसिंग पाइपलाइन (OpenTelemetry) तुम्हारी यूज़र आईडी को एक ऐसे हैश से बदल देती है जो हर 24 घंटे में बदलता है, हर स्पैन से ऑथेंटिकेशन हेडर और कुकीज़ हटा देती है, और बैकएंड से कोई भी ट्रेस बाहर जाने से पहले चैट सामग्री को संपादित (redact) कर देती है। हमारे वेब एनालिटिक्स बिना किसी कुकीज़ और बिना किसी संग्रहीत व्यक्तिगत पहचानकर्ता के सर्वर-साइड बीकन का उपयोग करते हैं। हम Google Analytics, Plausible, PostHog या किसी अन्य तीसरे पक्ष के एनालिटिक्स प्लेटफ़ॉर्म का उपयोग नहीं करते हैं।
  th: ไปป์ไลน์การติดตามภายในของเรา (OpenTelemetry) จะแทนที่ ID ผู้ใช้ของคุณด้วยรหัสแฮชที่จะเปลี่ยนทุก 24 ชั่วโมง ตัดส่วนหัวการยืนยันตัวตนและคุกกี้ออกจากทุกช่วงข้อมูล (span) และปกปิดเนื้อหาการแชทก่อนที่ข้อมูลการติดตามจะออกจากส่วนหลังบ้าน การวิเคราะห์เว็บของเราใช้บีคอนฝั่งเซิร์ฟเวอร์โดยไม่มีคุกกี้และไม่มีการจัดเก็บตัวระบุตัวตนรายบุคคล เราไม่ใช้ Google Analytics, Plausible, PostHog หรือแพลตฟอร์มการวิเคราะห์ของบุคคลที่สามใดๆ
  cs: Náš interní trasovací kanál (OpenTelemetry) nahrazuje tvé ID uživatele hashem, který se mění každých 24 hodin, odstraňuje autentizační hlavičky a cookies z každého spanu a anonymizuje obsah chatu dříve, než jakákoli stopa opustí backend. Naše webová analytika používá serverový beacon bez souborů cookie a bez uložených individuálních identifikátorů. Nepoužíváme Google Analytics, Plausible, PostHog ani žádnou jinou analytickou platformu třetích stran.
  sv: "Vår interna spårningspipeline (OpenTelemetry) ersätter ditt användar-ID med en hash som roterar var 24:e timme, rensar autentiseringsrubriker och cookies från varje \"span\" och maskerar chattinnehåll innan någon spårning lämnar backend. Vår webbanalys använder en beacon på serversidan utan cookies och utan lagrade individuella identifierare. Vi använder inte Google Analytics, Plausible, PostHog eller någon annan analysplattform från tredje part."
  he: "צינור הניטור הפנימי שלנו (OpenTelemetry) מחליף את מזהה המשתמש שלך בגיבוב שמתחלף כל 24 שעות, מסיר כותרות אימות ועוגיות מכל מקטע (span), ומצנזר תוכן צ'אט לפני שכל נתיב ניטור עוזב את השרת. ניתוח נתוני הגלישה שלנו משתמש במשואת צד-שרת (server-side beacon) ללא עוגיות וללא מזהים אישיים שמורים. אנחנו לא משתמשים ב-Google Analytics, Plausible, PostHog או בכל פלטפורמת ניתוח נתונים אחרת של צד שלישי."
  pt: Nosso pipeline de rastreamento interno (OpenTelemetry) substitui seu ID de usuário por um hash que muda a cada 24 horas, remove cabeçalhos de autenticação e cookies de cada span e oculta o conteúdo do chat antes que qualquer rastro saia do backend. Nossas análises web utilizam um beacon do lado do servidor sem cookies e sem identificadores individuais armazenados. Não utilizamos Google Analytics, Plausible, PostHog ou qualquer plataforma de análise de terceiros.
  fr: "Notre pipeline de traçage interne (OpenTelemetry) remplace ton identifiant utilisateur par un hachage qui change toutes les 24 heures, supprime les en-têtes d'authentification et les cookies de chaque segment (span), et occulte le contenu du chat avant que toute trace ne quitte le backend. Nos analyses web utilisent une balise côté serveur sans cookies et sans identifiants individuels stockés. Nous n'utilisons pas Google Analytics, Plausible, PostHog ou toute autre plateforme d'analyse tierce."
  verified_by_human: []
