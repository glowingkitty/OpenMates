providers.health.doctolib.description:
  context: Doctolib description
  en: >-
    Doctolib lists doctors and specialists across supported EU regions. We
    query Doctolib for available appointments matching your criteria, routed
    through the Webshare proxy, without a user identifier.
  de: Doctolib listet Ärzte und Spezialisten in den unterstützten EU-Regionen auf. Wir fragen Doctolib nach verfügbaren Terminen ab, die deinen Kriterien entsprechen, geleitet über den Webshare-Proxy, ohne eine Benutzerkennung.
  zh: Doctolib 列出了支持的欧盟地区的医生和专家。我们通过 Webshare 代理向 Doctolib 查询符合你条件的可用预约，且不包含用户标识符。
  fr: "Doctolib répertorie les médecins et spécialistes dans les régions de l'UE prises en charge. Nous interrogeons Doctolib pour trouver les rendez-vous disponibles correspondant à tes critères, via le proxy Webshare, sans identifiant d'utilisateur."
  pt: O Doctolib lista médicos e especialistas em regiões da UE suportadas. Consultamos o Doctolib para encontrar consultas disponíveis que correspondam aos teus critérios, encaminhadas através do proxy da Webshare, sem um identificador de utilizador.
  ru: Doctolib содержит списки врачей и специалистов в поддерживаемых регионах ЕС. Мы запрашиваем у Doctolib доступные записи, соответствующие твоим критериям, через прокси Webshare без идентификатора пользователя.
  ja: Doctolibは、サポートされているEU地域の医師や専門医を掲載しています。Webshareプロキシを経由して、ユーザー識別子なしで、条件に一致する予約可能な枠をDoctolibに照会します。
  it: Doctolib elenca medici e specialisti nelle regioni UE supportate. Interroghiamo Doctolib per gli appuntamenti disponibili che corrispondono ai tuoi criteri, instradati tramite il proxy Webshare, senza un identificativo utente.
  tr: "Doctolib, desteklenen AB bölgelerindeki doktorları ve uzmanları listeler. Kriterlerine uyan uygun randevular için Doctolib'i, Webshare proxy'si üzerinden yönlendirerek kullanıcı tanımlayıcısı olmadan sorgularız."
  vi: Doctolib liệt kê các bác sĩ và chuyên gia trên khắp các khu vực EU được hỗ trợ. Chúng tôi truy vấn Doctolib để tìm các lịch hẹn còn trống phù hợp với tiêu chí của bạn, được định tuyến qua proxy Webshare, mà không có mã định danh người dùng.
  id: Doctolib mencantumkan dokter dan spesialis di seluruh wilayah UE yang didukung. Kami menanyakan Doctolib untuk janji temu yang tersedia yang sesuai dengan kriteriamu, dirutekan melalui proksi Webshare, tanpa pengidentifikasi pengguna.
  pl: Doctolib zawiera listę lekarzy i specjalistów w obsługiwanych regionach UE. Wysyłamy zapytania do Doctolib o dostępne wizyty pasujące do Twoich kryteriów, przekierowywane przez proxy Webshare, bez identyfikatora użytkownika.
  nl: "Doctolib vermeldt artsen en specialisten in ondersteunde EU-regio's. We raadplegen Doctolib voor beschikbare afspraken die aan je criteria voldoen, geleid via de Webshare-proxy, zonder een gebruikersidentificatie."
  hi: Doctolib समर्थित यूरोपीय संघ (EU) क्षेत्रों में डॉक्टरों और विशेषज्ञों को सूचीबद्ध करता है। हम आपके मानदंडों से मेल खाने वाले उपलब्ध अपॉइंटमेंट के लिए Doctolib से पूछताछ करते हैं, जो Webshare प्रॉक्सी के माध्यम से रूट की जाती है, बिना किसी उपयोगकर्ता पहचानकर्ता के।
  th: Doctolib รวบรวมรายชื่อแพทย์และผู้เชี่ยวชาญในภูมิภาคต่างๆ ของสหภาพยุโรปที่รองรับ เราจะค้นหาการนัดหมายที่ว่างตามเกณฑ์ของคุณใน Doctolib โดยส่งผ่านพร็อกซี Webshare โดยไม่มีตัวระบุตัวตนผู้ใช้
  cs: Doctolib uvádí lékaře a specialisty v podporovaných regionech EU. Dotazujeme se Doctolib na dostupné termíny odpovídající tvým kritériím, směrované přes proxy Webshare, bez identifikátoru uživatele.
  sv: Doctolib listar läkare och specialister i stödda EU-regioner. Vi frågar Doctolib efter tillgängliga tider som matchar dina kriterier, dirigerat via Webshare-proxyn, utan en användaridentifierare.
  he: Doctolib מציגה רופאים ומומחים ברחבי אזורים נתמכים באיחוד האירופי. אנו שולחים שאילתות ל-Doctolib עבור תורים זמינים התואמים לקריטריונים שלך, המנותבות דרך הפרוקסי של Webshare, ללא מזהה משתמש.
  es: Doctolib enumera médicos y especialistas en las regiones de la UE compatibles. Consultamos a Doctolib para citas disponibles que coincidan con tus criterios, enrutadas a través del proxy de Webshare, sin un identificador de usuario.
  ko: Doctolib은 지원되는 EU 지역의 의사 및 전문의 목록을 제공합니다. Webshare 프록시를 통해 사용자 식별자 없이 사용자의 기준에 맞는 예약 가능한 일정을 Doctolib에 조회합니다.
  ar: يسرد Doctolib الأطباء والمتخصصين عبر مناطق الاتحاد الأوروبي المدعومة. نقوم بالاستعلام في Doctolib عن المواعيد المتاحة التي تطابق معاييرك، ويتم توجيهها عبر بروكسي Webshare، بدون معرف مستخدم.
