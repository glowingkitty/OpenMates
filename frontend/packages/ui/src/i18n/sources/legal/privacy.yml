overview.summary:
  context: One-paragraph honest summary of the privacy model
  en: >-
    OpenMates is designed so that most of your data is encrypted on your device
    before it reaches our servers. This is **not** end-to-end encryption: our
    servers briefly decrypt your content in memory to run AI responses, render
    invoices, and deliver reminders. But we never write decrypted content to
    disk, logs, or traces, and when you delete your account we destroy the
    encryption key that protects your data — cryptographically shredding every
    encrypted field we still hold.
  de: >-
    OpenMates ist so konzipiert, dass die meisten deiner Daten auf deinem Gerät
    verschlüsselt werden, bevor sie unsere Server erreichen. Dies ist **keine**
    Ende-zu-Ende-Verschlüsselung: Unsere Server entschlüsseln deine Inhalte
    kurzzeitig im Arbeitsspeicher, um KI-Antworten zu generieren, Rechnungen zu
    erstellen und Erinnerungen zuzustellen. Wir schreiben entschlüsselte Inhalte
    jedoch niemals auf die Festplatte, in Logs oder Traces. Wenn du dein Konto
    löschst, vernichten wir den Verschlüsselungsschlüssel, der deine Daten
    schützt – dadurch wird jedes verschlüsselte Feld, das wir noch halten,
    kryptografisch vernichtet.
  zh: >-
    OpenMates 的设计理念是，你的大部分数据在到达我们的服务器之前就在你的设备上完成加密。这**不是**端到端加密：我们的服务器会在内存中短暂解密你的内容，以生成 AI
    响应、呈现发票和发送提醒。但我们绝不会将解密后的内容写入磁盘、日志或追踪记录。当你删除账户时，我们会销毁保护你数据的加密密钥——从密码学上粉碎我们仍持有的每一个加密字段。
  es: >-
    OpenMates está diseñado para que la mayor parte de tus datos se cifren en tu
    dispositivo antes de llegar a nuestros servidores. Esto **no** es cifrado
    de extremo a extremo: nuestros servidores descifran brevemente tu contenido
    en memoria para ejecutar respuestas de IA, generar facturas y enviar
    recordatorios. Pero nunca escribimos contenido descifrado en disco,
    registros ni trazas, y cuando eliminas tu cuenta destruimos la clave de
    cifrado que protege tus datos — destruyendo criptográficamente cada campo
    cifrado que aún conservemos.
  fr: >-
    OpenMates est conçu pour que la majeure partie de tes données soient
    chiffrées sur ton appareil avant d'atteindre nos serveurs. Il ne s'agit
    **pas** de chiffrement de bout en bout : nos serveurs déchiffrent
    brièvement ton contenu en mémoire pour générer les réponses de l'IA, éditer
    les factures et envoyer les rappels. Mais nous n'écrivons jamais de contenu
    déchiffré sur disque, dans les journaux ou dans les traces, et lorsque tu
    supprimes ton compte, nous détruisons la clé de chiffrement qui protège tes
    données — effectuant ainsi une destruction cryptographique de chaque champ
    chiffré que nous détenons encore.
  pt: >-
    OpenMates é projetado para que a maior parte dos seus dados seja
    criptografada no seu dispositivo antes de chegar aos nossos servidores.
    Isto **não** é criptografia de ponta a ponta: nossos servidores descriptam
    brevemente seu conteúdo na memória para executar respostas de IA, gerar
    faturas e entregar lembretes. Mas nunca escrevemos conteúdo descriptografado
    em disco, logs ou rastros, e quando você exclui sua conta destruímos a
    chave de criptografia que protege seus dados — destruindo criptograficamente
    cada campo criptografado que ainda mantemos.
  ru: >-
    OpenMates спроектирован так, чтобы большая часть ваших данных шифровалась
    на вашем устройстве до того, как они достигнут наших серверов. Это **не**
    сквозное шифрование: наши серверы кратковременно расшифровывают ваш контент
    в памяти для запуска ответов ИИ, создания счетов и доставки напоминаний. Но
    мы никогда не записываем расшифрованный контент на диск, в логи или трассы,
    а когда вы удаляете учётную запись, мы уничтожаем ключ шифрования,
    защищающий ваши данные, — криптографически уничтожая каждое зашифрованное
    поле, которое у нас ещё остаётся.
  ja: >-
    OpenMates は、あなたのデータの大部分がサーバーに到達する前にあなたのデバイス上で暗号化されるように設計されています。これはエンドツーエンド暗号化では**ありません**。私たちのサーバーは
    AI 応答の実行、請求書のレンダリング、リマインダーの配信のために、あなたのコンテンツをメモリ内で一時的に復号します。ただし、復号されたコンテンツをディスク、ログ、トレースに書き込むことは決してありません。アカウントを削除すると、あなたのデータを保護する暗号化キーを破棄し、私たちがまだ保持しているすべての暗号化フィールドを暗号学的に粉砕します。
  ko: >-
    OpenMates는 대부분의 데이터가 서버에 도달하기 전에 기기에서 암호화되도록 설계되었습니다. 이는 **종단간 암호화가 아닙니다**:
    서버는 AI 응답 실행, 청구서 렌더링, 알림 전달을 위해 콘텐츠를 메모리에서 잠시 복호화합니다. 하지만 복호화된 콘텐츠를 디스크,
    로그 또는 추적에 기록하지 않으며, 계정을 삭제하면 데이터를 보호하는 암호화 키를 파기하여 아직 보유 중인 모든 암호화된 필드를
    암호학적으로 파쇄합니다.
  it: >-
    OpenMates è progettato in modo che la maggior parte dei tuoi dati venga
    cifrata sul tuo dispositivo prima di raggiungere i nostri server. Questa
    **non** è cifratura end-to-end: i nostri server decifrano brevemente i tuoi
    contenuti in memoria per eseguire risposte IA, generare fatture e inviare
    promemoria. Ma non scriviamo mai contenuti decifrati su disco, log o
    tracce, e quando elimini il tuo account distruggiamo la chiave di cifratura
    che protegge i tuoi dati — distruggendo crittograficamente ogni campo
    cifrato che ancora conserviamo.
  tr: >-
    OpenMates, verilerinin çoğunun sunucularımıza ulaşmadan önce cihazında
    şifrelenecek şekilde tasarlanmıştır. Bu **uçtan uca şifreleme değildir**:
    sunucularımız, yapay zeka yanıtlarını çalıştırmak, fatura oluşturmak ve
    hatırlatıcı göndermek için içeriğini kısa süreliğine bellekte şifresini
    çözer. Ancak şifresi çözülmüş içeriği diske, günlüklere veya izlere asla
    yazmayız ve hesabını sildiğinde verilerini koruyan şifreleme anahtarını
    imha ederiz — hâlâ tuttuğumuz her şifrelenmiş alanı kriptografik olarak
    parçalarız.
  vi: >-
    OpenMates được thiết kế để hầu hết dữ liệu của bạn được mã hóa trên thiết
    bị trước khi đến máy chủ của chúng tôi. Đây **không phải** là mã hóa đầu
    cuối: máy chủ của chúng tôi giải mã nội dung của bạn trong bộ nhớ một cách
    thoáng qua để chạy phản hồi AI, kết xuất hóa đơn và gửi nhắc nhở. Nhưng
    chúng tôi không bao giờ ghi nội dung đã giải mã vào đĩa, nhật ký hoặc dấu
    vết, và khi bạn xóa tài khoản, chúng tôi hủy khóa mã hóa bảo vệ dữ liệu
    của bạn — phá hủy bằng mật mã mọi trường được mã hóa mà chúng tôi vẫn đang
    lưu giữ.
  id: >-
    OpenMates dirancang sedemikian rupa sehingga sebagian besar data Anda
    dienkripsi di perangkat Anda sebelum mencapai server kami. Ini **bukan**
    enkripsi ujung-ke-ujung: server kami mendekripsi konten Anda sebentar di
    memori untuk menjalankan respons AI, merender faktur, dan mengirim
    pengingat. Tetapi kami tidak pernah menulis konten yang didekripsi ke disk,
    log, atau jejak, dan ketika Anda menghapus akun Anda, kami menghancurkan
    kunci enkripsi yang melindungi data Anda — menghancurkan secara kriptografis
    setiap bidang terenkripsi yang masih kami miliki.
  pl: >-
    OpenMates jest zaprojektowany tak, aby większość twoich danych była
    szyfrowana na twoim urządzeniu zanim dotrze do naszych serwerów. To
    **nie jest** szyfrowanie end-to-end: nasze serwery krótko odszyfrowują
    twoją treść w pamięci, aby uruchomić odpowiedzi AI, wygenerować faktury
    i dostarczyć przypomnienia. Ale nigdy nie zapisujemy odszyfrowanej treści
    na dysku, w logach ani w śladach, a gdy usuniesz swoje konto, niszczymy
    klucz szyfrujący, który chroni twoje dane — kryptograficznie niszcząc
    każde zaszyfrowane pole, które nadal przechowujemy.
  nl: >-
    OpenMates is zo ontworpen dat het grootste deel van je gegevens op je
    apparaat wordt versleuteld voordat het onze servers bereikt. Dit is **geen**
    end-to-end-versleuteling: onze servers ontsleutelen je content kortstondig
    in het geheugen om AI-reacties uit te voeren, facturen weer te geven en
    herinneringen te bezorgen. Maar we schrijven ontsleutelde content nooit
    naar schijf, logs of traces, en wanneer je je account verwijdert
    vernietigen we de versleutelingssleutel die je gegevens beschermt — waarbij
    we elk versleuteld veld dat we nog hebben cryptografisch vernietigen.
  ar: >-
    تم تصميم OpenMates بحيث يتم تشفير معظم بياناتك على جهازك قبل وصولها إلى
    خوادمنا. هذا **ليس** تشفيرًا طرفيًا: تقوم خوادمنا بفك تشفير محتواك لفترة
    وجيزة في الذاكرة لتشغيل ردود الذكاء الاصطناعي، وإنشاء الفواتير، وتسليم
    التذكيرات. لكننا لا نكتب أبدًا المحتوى المفكوك التشفير إلى القرص أو
    السجلات أو التتبعات، وعندما تحذف حسابك نقوم بتدمير مفتاح التشفير الذي يحمي
    بياناتك — مما يؤدي إلى تدمير تشفيري لكل حقل مشفر لا نزال نحتفظ به.
  hi: >-
    OpenMates को इस तरह डिज़ाइन किया गया है कि आपका अधिकांश डेटा हमारे सर्वरों
    तक पहुँचने से पहले आपके डिवाइस पर एन्क्रिप्ट किया जाता है। यह **एंड-टू-एंड
    एन्क्रिप्शन नहीं है**: हमारे सर्वर AI प्रतिक्रियाएँ चलाने, चालान प्रस्तुत
    करने और रिमाइंडर भेजने के लिए आपकी सामग्री को मेमोरी में संक्षेप में
    डिक्रिप्ट करते हैं। लेकिन हम कभी भी डिक्रिप्ट की गई सामग्री को डिस्क,
    लॉग या ट्रेस में नहीं लिखते हैं, और जब आप अपना खाता हटाते हैं, तो हम उस
    एन्क्रिप्शन कुंजी को नष्ट कर देते हैं जो आपके डेटा की सुरक्षा करती है —
    जो अभी भी हमारे पास मौजूद हर एन्क्रिप्टेड फ़ील्ड को क्रिप्टोग्राफिक रूप
    से नष्ट कर देती है।
  th: >-
    OpenMates ได้รับการออกแบบมาเพื่อให้ข้อมูลส่วนใหญ่ของคุณถูกเข้ารหัสบนอุปกรณ์ของคุณก่อนที่จะไปถึงเซิร์ฟเวอร์ของเรา
    นี่**ไม่ใช่**การเข้ารหัสแบบเอนด์ทูเอนด์: เซิร์ฟเวอร์ของเราถอดรหัสเนื้อหาของคุณในหน่วยความจำชั่วครู่เพื่อรันการตอบกลับของ
    AI แสดงใบแจ้งหนี้ และส่งการแจ้งเตือน
    แต่เราไม่เคยเขียนเนื้อหาที่ถอดรหัสแล้วลงในดิสก์ บันทึก หรือร่องรอย
    และเมื่อคุณลบบัญชีของคุณ เราจะทำลายกุญแจเข้ารหัสที่ปกป้องข้อมูลของคุณ —
    ทำลายด้วยวิธีการเข้ารหัสทุกฟิลด์ที่เข้ารหัสที่เรายังเก็บอยู่
  cs: >-
    OpenMates je navržen tak, aby většina vašich dat byla šifrována na vašem
    zařízení dříve, než se dostanou na naše servery. Toto **není** end-to-end
    šifrování: naše servery krátce dešifrují váš obsah v paměti, aby spustily
    AI odpovědi, vygenerovaly faktury a doručily připomenutí. Nikdy však
    nezapisujeme dešifrovaný obsah na disk, do logů nebo trasování, a když
    smažete svůj účet, zničíme šifrovací klíč, který chrání vaše data — a tím
    kryptograficky rozdrtíme každé zašifrované pole, které stále uchováváme.
  sv: >-
    OpenMates är utformat så att det mesta av din data krypteras på din enhet
    innan den når våra servrar. Detta är **inte** end-to-end-kryptering: våra
    servrar dekrypterar ditt innehåll kortvarigt i minnet för att köra
    AI-svar, generera fakturor och leverera påminnelser. Men vi skriver aldrig
    dekrypterat innehåll till disk, loggar eller spårningar, och när du tar
    bort ditt konto förstör vi krypteringsnyckeln som skyddar din data — och
    förstör kryptografiskt varje krypterat fält som vi fortfarande håller.
  he: >-
    OpenMates מתוכנן כך שרוב הנתונים שלך מוצפנים במכשיר שלך לפני שהם מגיעים
    לשרתים שלנו. זו **אינה** הצפנה מקצה לקצה: השרתים שלנו מפענחים את התוכן
    שלך לזמן קצר בזיכרון כדי להריץ תגובות AI, להציג חשבוניות ולספק תזכורות.
    אבל אנחנו אף פעם לא כותבים תוכן מפוענח לדיסק, ללוגים או למעקבים, וכאשר
    אתה מוחק את החשבון שלך אנחנו משמידים את מפתח ההצפנה שמגן על הנתונים שלך
    — ובכך גורסים קריפטוגרפית כל שדה מוצפן שעדיין יש לנו.
