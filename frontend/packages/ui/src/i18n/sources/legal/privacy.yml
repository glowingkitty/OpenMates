providers.ai_models.google_vertex_maas.description:
  context: Google Vertex MaaS description with disambiguation from Gemini
  en: >-
    Google Vertex AI Model-as-a-Service hosts third-party open models (such as
    DeepSeek) on Google infrastructure via an OpenAI-compatible endpoint.
    This is a separate service from Google Gemini: the model weights are
    third-party, but the inference runs on Google's servers. Only used when
    you select a MaaS-hosted model.
  de: "Google Vertex AI Model-as-a-Service hostet offene Modelle von Drittanbietern (wie DeepSeek) auf der Google-Infrastruktur über einen OpenAI-kompatiblen Endpunkt. Dies ist ein separater Dienst von Google Gemini: Die Modellgewichte stammen von Drittanbietern, aber die Inferenz läuft auf den Servern von Google. Wird nur verwendet, wenn du ein MaaS-gehostetes Modell auswählst."
  zh: Google Vertex AI 模型即服务 (MaaS) 通过兼容 OpenAI 的端点在 Google 基础设施上托管第三方开放模型（如 DeepSeek）。这是一项独立于 Google Gemini 的服务：模型权重属于第三方，但推理在 Google 服务器上运行。仅在您选择由 MaaS 托管的模型时使用。
  es: "Google Vertex AI Model-as-a-Service aloja modelos abiertos de terceros (como DeepSeek) en la infraestructura de Google a través de un endpoint compatible con OpenAI. Este es un servicio independiente de Google Gemini: los pesos del modelo son de terceros, pero la inferencia se ejecuta en los servidores de Google. Solo se utiliza cuando seleccionas un modelo alojado en MaaS."
  pt: "O Google Vertex AI Model-as-a-Service aloja modelos abertos de terceiros (como o DeepSeek) na infraestrutura da Google através de um endpoint compatível com OpenAI. Este é um serviço separado do Google Gemini: os pesos do modelo são de terceiros, mas a inferência corre nos servidores da Google. Apenas utilizado quando selecionas um modelo alojado em MaaS."
  ja: Google Vertex AI Model-as-a-Serviceは、OpenAI互換のエンドポイントを介して、Googleのインフラ上でサードパーティのオープンモデル（DeepSeekなど）をホストしている。これはGoogle Geminiとは別のサービスであり、モデルの重みはサードパーティのものだが、推論はGoogleのサーバー上で実行される。MaaSでホストされているモデルを選択した場合にのみ使用される。
  ko: "Google Vertex AI Model-as-a-Service는 OpenAI 호환 엔드포인트를 통해 Google 인프라에서 서드파티 오픈 모델(예: DeepSeek)을 호스팅합니다. 이는 Google Gemini와는 별개의 서비스입니다. 모델 가중치는 서드파티의 것이지만 추론은 Google 서버에서 실행됩니다. MaaS 호스팅 모델을 선택한 경우에만 사용됩니다."
  it: "Google Vertex AI Model-as-a-Service ospita modelli aperti di terze parti (come DeepSeek) sull'infrastruttura Google tramite un endpoint compatibile con OpenAI. Si tratta di un servizio separato da Google Gemini: i pesi del modello sono di terze parti, ma l'inferenza viene eseguita sui server di Google. Utilizzato solo quando selezioni un modello ospitato da MaaS."
  tr: "Google Vertex AI Model-as-a-Service, OpenAI uyumlu bir uç nokta aracılığıyla Google altyapısında üçüncü taraf açık modellere (DeepSeek gibi) ev sahipliği yapar. Bu, Google Gemini'den ayrı bir hizmettir: model ağırlıkları üçüncü tarafa aittir ancak çıkarım Google sunucularında çalışır. Yalnızca MaaS tarafından barındırılan bir model seçtiğinde kullanılır."
  vi: "Google Vertex AI Model-as-a-Service lưu trữ các mô hình mở của bên thứ ba (như DeepSeek) trên hạ tầng của Google thông qua một điểm cuối tương thích với OpenAI. Đây là một dịch vụ tách biệt với Google Gemini: trọng số mô hình là của bên thứ ba, nhưng quá trình suy luận chạy trên máy chủ của Google. Chỉ được sử dụng khi bạn chọn một mô hình do MaaS lưu trữ."
  id: "Google Vertex AI Model-as-a-Service menghosting model terbuka pihak ketiga (seperti DeepSeek) di infrastruktur Google melalui endpoint yang kompatibel dengan OpenAI. Ini adalah layanan terpisah dari Google Gemini: bobot model adalah milik pihak ketiga, tetapi inferensi berjalan di server Google. Hanya digunakan saat kamu memilih model yang dihosting MaaS."
  pl: "Google Vertex AI Model-as-a-Service hostuje otwarte modele zewnętrzne (takie jak DeepSeek) na infrastrukturze Google poprzez punkt końcowy zgodny z OpenAI. Jest to usługa oddzielna od Google Gemini: wagi modeli należą do podmiotów zewnętrznych, ale wnioskowanie odbywa się na serwerach Google. Używane tylko po wybraniu modelu hostowanego w usłudze MaaS."
  nl: "Google Vertex AI Model-as-a-Service host open modellen van derden (zoals DeepSeek) op de Google-infrastructuur via een OpenAI-compatibel eindpunt. Dit is een aparte dienst van Google Gemini: de modelgewichten zijn van derden, maar de inferentie draait op de servers van Google. Wordt alleen gebruikt wanneer je een door MaaS gehost model selecteert."
  hi: "Google Vertex AI मॉडल-एज़-ए-सर्विस (MaaS) OpenAI-संगत एंडपॉइंट के माध्यम से Google इंफ्रास्ट्रक्चर पर थर्ड-पार्टी ओपन मॉडल (जैसे DeepSeek) को होस्ट करता है। यह Google Gemini से एक अलग सेवा है: मॉडल वेट्स थर्ड-पार्टी के हैं, लेकिन इन्फरेंस Google के सर्वर पर चलता है। इसका उपयोग केवल तब किया जाता है जब आप MaaS-होस्टेड मॉडल चुनते हैं।"
  th: "Google Vertex AI Model-as-a-Service โฮสต์โมเดลแบบเปิดจากบุคคลที่สาม (เช่น DeepSeek) บนโครงสร้างพื้นฐานของ Google ผ่านเอนด์พอยต์ที่เข้ากันได้กับ OpenAI นี่เป็นบริการที่แยกจาก Google Gemini: น้ำหนักของโมเดลเป็นของบุคคลที่สาม แต่การอนุมานทำงานบนเซิร์ฟเวอร์ของ Google จะถูกใช้เมื่อคุณเลือกโมเดลที่โฮสต์แบบ MaaS เท่านั้น"
  sv: "Google Vertex AI Model-as-a-Service är värd för öppna tredjepartsmodeller (som DeepSeek) på Googles infrastruktur via en OpenAI-kompatibel slutpunkt. Detta är en separat tjänst från Google Gemini: modellvikterna kommer från tredje part, men inferensen körs på Googles servrar. Används endast när du väljer en MaaS-hostad modell."
  fr: "Google Vertex AI Model-as-a-Service héberge des modèles ouverts tiers (tels que DeepSeek) sur l'infrastructure Google via un point de terminaison compatible OpenAI. Il s'agit d'un service distinct de Google Gemini : les poids des modèles sont tiers, mais l'inférence s'exécute sur les serveurs de Google. Utilisé uniquement lorsque tu sélectionnes un modèle hébergé par MaaS."
  ar: "تستضيف خدمة Google Vertex AI Model-as-a-Service نماذج مفتوحة تابعة لجهات خارجية (مثل DeepSeek) على بنية Google التحتية عبر نقطة نهاية متوافقة مع OpenAI. هذه خدمة منفصلة عن Google Gemini: أوزان النماذج تابعة لجهة خارجية، لكن الاستدلال يتم على خوادم Google. تُستخدم فقط عندما تختار نموذجاً مستضافاً عبر MaaS."
  cs: "Google Vertex AI Model-as-a-Service hostuje otevřené modely třetích stran (například DeepSeek) na infrastruktuře Google prostřednictvím koncového bodu kompatibilního s OpenAI. Jedná se o službu oddělenou od Google Gemini: váhy modelů jsou od třetích stran, ale inference běží na serverech Google. Používá se pouze tehdy, když si vybereš model hostovaný jako MaaS."
  ru: "Google Vertex AI Model-as-a-Service размещает сторонние открытые модели (такие как DeepSeek) на инфраструктуре Google через OpenAI-совместимый эндпоинт. Этот сервис отделен от Google Gemini: веса моделей являются сторонними, но вычисления выполняются на серверах Google. Используется только при выборе модели, размещенной в MaaS."
  he: "Google Vertex AI Model-as-a-Service מארחת מודלים פתוחים של צד שלישי (כגון DeepSeek) על תשתית Google דרך נקודת קצה תואמת OpenAI. זהו שירות נפרד מ-Google Gemini: משקלי המודל הם של צד שלישי, אך ההסקה (inference) מתבצעת בשרתים של Google. בשימוש רק כשבוחרים מודל המארח ב-MaaS."
  verified_by_human: []
