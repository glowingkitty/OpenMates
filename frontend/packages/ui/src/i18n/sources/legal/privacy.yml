providers.shopping.description:
  context: Description of Group I
  en: >-
    These providers are only used when you invoke the shopping search skill
    for live product and price lookups.
  de: Diese Anbieter werden nur genutzt, wenn du den Skill zur Shopping-Suche für Live-Produkt- und Preisabfragen aufrufst.
  zh: 这些提供商仅在你调用购物搜索技能以进行实时产品和价格查询时使用。
  fr: Ces fournisseurs ne sont utilisés que lorsque tu appelles la compétence de recherche de shopping pour des consultations de produits et de prix en direct.
  pt: Estes fornecedores só são utilizados quando invocas a skill de pesquisa de compras para consultas de produtos e preços em tempo real.
  ru: Эти провайдеры используются только тогда, когда ты вызываешь навык поиска покупок для получения актуальных данных о товарах и ценах.
  ja: これらのプロバイダーは、最新の商品や価格の検索のためにショッピング検索スキルを呼び出した場合にのみ使用されます。
  it: Questi fornitori vengono utilizzati solo quando invochi la skill di ricerca shopping per la ricerca di prodotti e prezzi in tempo reale.
  tr: Bu sağlayıcılar yalnızca canlı ürün ve fiyat aramaları için alışveriş arama yeteneğini çağırdığında kullanılır.
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn sử dụng kỹ năng tìm kiếm mua sắm để tra cứu sản phẩm và giá trực tiếp.
  id: Penyedia ini hanya digunakan saat kamu memanggil keahlian pencarian belanja untuk pencarian produk dan harga secara langsung.
  pl: Dostawcy ci są wykorzystywani tylko wtedy, gdy wywołasz umiejętność wyszukiwania zakupów w celu sprawdzenia produktów i cen w czasie rzeczywistym.
  nl: Deze providers worden alleen gebruikt wanneer je de vaardigheid voor het zoeken naar producten aanroept voor actuele product- en prijsinformatie.
  hi: इन प्रदाताओं का उपयोग केवल तब किया जाता है जब आप लाइव उत्पाद और मूल्य खोज के लिए शॉपिंग खोज स्किल का उपयोग करते हैं।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้งานเมื่อคุณเรียกใช้ทักษะการค้นหาเพื่อช้อปปิ้งเพื่อดูข้อมูลสินค้าและราคาแบบเรียลไทม์เท่านั้น
  cs: Tito poskytovatelé se využívají pouze tehdy, když vyvoláš dovednost vyhledávání nákupů pro aktuální vyhledání produktů a cen.
  sv: Dessa leverantörer används endast när du anropar färdigheten för shoppingsökning för produkt- och prisuppslag i realtid.
  he: ספקים אלו נמצאים בשימוש רק כאשר מופעלת מיומנות חיפוש הקניות עבור בדיקת מוצרים ומחירים בזמן אמת.
  es: Estos proveedores solo se utilizan cuando invocas la habilidad de búsqueda de compras para consultas de productos y precios en tiempo real.
  ko: 이 제공업체는 실시간 제품 및 가격 조회를 위해 쇼핑 검색 스킬을 호출할 때만 사용됩니다.
  ar: يتم استخدام هؤلاء المزودين فقط عند استدعاء مهارة البحث عن التسوق للبحث المباشر عن المنتجات والأسعار.
