protection.pii_placeholder_substitution.description:
  context: Description of client-side PII placeholder substitution with honest limitation caveat
  en: >-
    Before any message is sent to a third-party AI model, your browser scans
    your message for real names, email addresses, and physical addresses that
    you have saved in your privacy settings (or that match common patterns)
    and replaces any matches with neutral placeholders (for example [USER_0]).
    The mapping back to your real values is stored encrypted with your key and
    is never decrypted on our servers. **Important limitation:** this
    substitution only protects personal data that our client-side detector
    actually recognizes — typically the values you have explicitly saved in
    your privacy settings and values highlighted in the message field before
    you send. Anything the detector does not recognize (typos of your own
    name, uncommon address formats, other people's personal data, sensitive
    topics that are not formally PII) will be transmitted as you typed it.
    Please treat every message as you would treat a note passed to a
    third-party AI provider and be cautious with personal data.
  de: "Bevor eine Nachricht an ein KI-Modell eines Drittanbieters gesendet wird, scannt dein Browser deine Nachricht nach echten Namen, E-Mail-Adressen und physischen Adressen, die du in deinen Privatsphäre-Einstellungen gespeichert hast (oder die gängigen Mustern entsprechen), und ersetzt alle Treffer durch neutrale Platzhalter (zum Beispiel [USER_0]). Die Rückzuordnung zu deinen echten Werten wird mit deinem Schlüssel verschlüsselt gespeichert und niemals auf unseren Servern entschlüsselt. **Wichtige Einschränkung:** Diese Ersetzung schützt nur personenbezogene Daten, die unser clientseitiger Detektor tatsächlich erkennt – in der Regel die Werte, die du explizit in deinen Privatsphäre-Einstellungen gespeichert hast, sowie Werte, die vor dem Absenden im Nachrichtenfeld hervorgehoben werden. Alles, was der Detektor nicht erkennt (Tippfehler im eigenen Namen, ungewöhnliche Adressformate, personenbezogene Daten anderer Personen, sensible Themen, die formal keine PII sind), wird so übertragen, wie du es eingegeben hast. Bitte behandle jede Nachricht so, wie du eine Notiz an einen Drittanbieter von KI behandeln würdest, und sei vorsichtig mit personenbezogenen Daten."
  zh: "在任何消息发送到第三方 AI 模型之前，你的浏览器会扫描消息中你在隐私设置中保存的（或符合常见模式的）真实姓名、电子邮件地址和物理地址，并将任何匹配项替换为中性占位符（例如 [USER_0]）。映射回真实值的对应关系使用你的密钥加密存储，且绝不会在我们的服务器上解密。**重要限制：** 此替换仅保护我们的客户端检测器实际识别出的个人数据——通常是你明确保存在隐私设置中的值，以及发送前在消息字段中突出显示的值。任何检测器无法识别的内容（你自己姓名的拼写错误、不常见的地址格式、他人的个人数据、非正式 PII 的敏感话题）都将按你输入的内容原样传输。请像对待传递给第三方 AI 提供商的便条一样对待每条消息，并谨慎处理个人数据。"
  es: "Antes de que cualquier mensaje se envíe a un modelo de IA de terceros, tu navegador escanea tu mensaje en busca de nombres reales, direcciones de correo electrónico y direcciones físicas que hayas guardado en tu configuración de privacidad (o que coincidan con patrones comunes) y reemplaza cualquier coincidencia con marcadores de posición neutros (por ejemplo, [USER_0]). El mapeo de vuelta a tus valores reales se almacena cifrado con tu clave y nunca se descifra en nuestros servidores. **Limitación importante:** esta sustitución solo protege los datos personales que nuestro detector del lado del cliente reconoce realmente; normalmente los valores que has guardado explícitamente en tu configuración de privacidad y los valores resaltados en el campo de mensaje antes de enviarlo. Cualquier cosa que el detector no reconozca (errores tipográficos de tu propio nombre, formatos de dirección poco comunes, datos personales de otras personas, temas sensibles que no son formalmente PII) se transmitirá tal como lo escribiste. Por favor, trata cada mensaje como tratarías una nota entregada a un proveedor de IA de terceros y ten precaución con los datos personales."
  pt: "Antes de qualquer mensagem ser enviada para um modelo de IA de terceiros, seu navegador verifica sua mensagem em busca de nomes reais, endereços de e-mail e endereços físicos que você salvou em suas configurações de privacidade (ou que correspondam a padrões comuns) e substitui quaisquer correspondências por espaços reservados neutros (por exemplo, [USER_0]). O mapeamento de volta para seus valores reais é armazenado criptografado com sua chave e nunca é descriptografado em nossos servidores. **Limitação importante:** esta substituição protege apenas os dados pessoais que nosso detector do lado do cliente realmente reconhece — normalmente os valores que você salvou explicitamente em suas configurações de privacidade e valores destacados no campo de mensagem antes de enviar. Qualquer coisa que o detector não reconheça (erros de digitação do seu próprio nome, formatos de endereço incomuns, dados pessoais de outras pessoas, tópicos sensíveis que não sejam formalmente PII) será transmitida conforme você a digitou. Por favor, trate cada mensagem como trataria um bilhete passado a um provedor de IA de terceiros e seja cauteloso com dados pessoais."
  ja: "メッセージがサードパーティのAIモデルに送信される前に、ブラウザはメッセージをスキャンし、プライバシー設定に保存されている（または一般的なパターンに一致する）実名、メールアドレス、住所を探し、一致したものを中立的なプレースホルダー（例：[USER_0]）に置き換えます。元の値へのマッピングはあなたのキーで暗号化されて保存され、当社のサーバーで復号されることはありません。**重要な制限事項：** この置換は、クライアント側の検出器が実際に認識した個人データのみを保護します。通常、これにはプライバシー設定に明示的に保存した値や、送信前にメッセージフィールドで強調表示された値が含まれます。検出器が認識できないもの（自分の名前の入力ミス、一般的でない住所形式、他人の個人データ、正式な個人情報ではない機密性の高いトピックなど）は、入力した通りの内容で送信されます。すべてのメッセージをサードパーティのAIプロバイダーに渡すメモとして扱い、個人データの取り扱いには十分注意してください。"
  ko: "메시지가 제3자 AI 모델로 전송되기 전에, 브라우저는 메시지에서 사용자가 개인정보 설정에 저장한 실명, 이메일 주소, 실제 주소(또는 일반적인 패턴과 일치하는 정보)를 스캔하고, 일치하는 항목을 중립적인 자리표시자(예: [USER_0])로 바꿉니다. 실제 값으로 다시 매핑하는 정보는 사용자의 키로 암호화되어 저장되며, 당사 서버에서 복호화되지 않습니다. **중요한 제한 사항:** 이 치환은 클라이언트 측 감지기가 실제로 인식하는 개인 데이터(일반적으로 개인정보 설정에 명시적으로 저장한 값 및 전송 전 메시지 필드에 강조 표시된 값)만 보호합니다. 감지기가 인식하지 못하는 항목(본인 이름의 오타, 흔하지 않은 주소 형식, 타인의 개인 데이터, 공식적인 개인정보가 아닌 민감한 주제 등)은 입력한 그대로 전송됩니다. 모든 메시지는 제3자 AI 제공업체에 전달되는 쪽지처럼 취급하고 개인 데이터에 주의해 주세요."
  it: "Prima che qualsiasi messaggio venga inviato a un modello IA di terze parti, il tuo browser scansiona il messaggio alla ricerca di nomi reali, indirizzi email e indirizzi fisici che hai salvato nelle tue impostazioni sulla privacy (o che corrispondono a pattern comuni) e sostituisce ogni corrispondenza con segnaposto neutri (ad esempio [USER_0]). La mappatura inversa ai tuoi valori reali viene memorizzata in modo crittografato con la tua chiave e non viene mai decifrata sui nostri server. **Limitazione importante:** questa sostituzione protegge solo i dati personali che il nostro rilevatore lato client riconosce effettivamente — tipicamente i valori che hai salvato esplicitamente nelle tue impostazioni sulla privacy e i valori evidenziati nel campo del messaggio prima dell'invio. Tutto ciò che il rilevatore non riconosce (errori di battitura del tuo nome, formati di indirizzo non comuni, dati personali di altre persone, argomenti sensibili che non sono formalmente PII) verrà trasmesso così come lo hai digitato. Tratta ogni messaggio come faresti con una nota passata a un fornitore di IA di terze parti e presta attenzione ai dati personali."
  tr: "Herhangi bir mesaj üçüncü taraf bir yapay zeka modeline gönderilmeden önce, tarayıcın mesajını gizlilik ayarlarında kaydettiğin (veya yaygın kalıplarla eşleşen) gerçek isimler, e-posta adresleri ve fiziksel adresler için tarar ve eşleşenleri nötr yer tutucularla (örneğin [USER_0]) değiştirir. Gerçek değerlerine geri eşleme, anahtarınla şifrelenmiş olarak saklanır ve sunucularımızda asla çözülmez. **Önemli sınırlama:** Bu değiştirme işlemi yalnızca istemci tarafı algılayıcımızın gerçekten tanıdığı kişisel verileri korur — genellikle gizlilik ayarlarında açıkça kaydettiğin değerler ve göndermeden önce mesaj alanında vurgulanan değerler. Algılayıcının tanımadığı her şey (kendi ismindeki yazım hataları, yaygın olmayan adres biçimleri, başkalarının kişisel verileri, resmi olarak PII olmayan hassas konular) yazdığın gibi iletilecektir. Lütfen her mesaja, üçüncü taraf bir yapay zeka sağlayıcısına iletilen bir not gibi yaklaş ve kişisel veriler konusunda dikkatli ol."
  vi: "Trước khi bất kỳ tin nhắn nào được gửi đến mô hình AI của bên thứ ba, trình duyệt của bạn sẽ quét tin nhắn để tìm tên thật, địa chỉ email và địa chỉ thực mà bạn đã lưu trong cài đặt quyền riêng tư (hoặc khớp với các mẫu phổ biến) và thay thế mọi kết quả khớp bằng các phần giữ chỗ trung lập (ví dụ: [USER_0]). Việc ánh xạ ngược lại các giá trị thực của bạn được lưu trữ dưới dạng mã hóa bằng khóa của bạn và không bao giờ được giải mã trên máy chủ của chúng tôi. **Hạn chế quan trọng:** việc thay thế này chỉ bảo vệ dữ liệu cá nhân mà trình phát hiện phía máy khách của chúng tôi thực sự nhận dạng được — thường là các giá trị bạn đã lưu rõ ràng trong cài đặt quyền riêng tư và các giá trị được làm nổi bật trong trường tin nhắn trước khi bạn gửi. Bất cứ điều gì trình phát hiện không nhận dạng được (lỗi đánh máy tên của chính bạn, định dạng địa chỉ không phổ biến, dữ liệu cá nhân của người khác, các chủ đề nhạy cảm không phải là PII chính thức) sẽ được truyền đi đúng như những gì bạn đã nhập. Vui lòng coi mọi tin nhắn như một ghi chú được gửi cho nhà cung cấp AI bên thứ ba và hãy thận trọng với dữ liệu cá nhân."
  id: "Sebelum pesan apa pun dikirim ke model AI pihak ketiga, perambanmu memindai pesanmu untuk mencari nama asli, alamat email, dan alamat fisik yang telah kamu simpan di pengaturan privasi (atau yang cocok dengan pola umum) dan mengganti setiap kecocokan dengan placeholder netral (misalnya [USER_0]). Pemetaan kembali ke nilai aslimu disimpan terenkripsi dengan kuncimu dan tidak pernah didekripsi di server kami. **Batasan penting:** substitusi ini hanya melindungi data pribadi yang benar-benar dikenali oleh detektor sisi klien kami — biasanya nilai yang telah kamu simpan secara eksplisit di pengaturan privasi dan nilai yang disorot di kolom pesan sebelum kamu mengirimnya. Apa pun yang tidak dikenali oleh detektor (salah ketik namamu sendiri, format alamat yang tidak umum, data pribadi orang lain, topik sensitif yang secara formal bukan PII) akan dikirimkan sesuai yang kamu ketik. Harap perlakukan setiap pesan seperti kamu memperlakukan catatan yang diberikan kepada penyedia AI pihak ketiga dan berhati-hatilah dengan data pribadi."
  pl: "Zanim jakakolwiek wiadomość zostanie wysłana do zewnętrznego modelu AI, Twoja przeglądarka skanuje ją pod kątem imion i nazwisk, adresów e-mail oraz adresów fizycznych zapisanych w Twoich ustawieniach prywatności (lub pasujących do typowych wzorców) i zastępuje wszelkie dopasowania neutralnymi symbolami zastępczymi (na przykład [USER_0]). Mapowanie powrotne do Twoich rzeczywistych danych jest przechowywane w formie zaszyfrowanej Twoim kluczem i nigdy nie jest odszyfrowywane na naszych serwerach. **Ważne ograniczenie:** to zastępowanie chroni tylko te dane osobowe, które nasz detektor po stronie klienta faktycznie rozpozna — zazwyczaj są to wartości jawnie zapisane w Twoich ustawieniach prywatności oraz wartości wyróżnione w polu wiadomości przed wysłaniem. Wszystko, czego detektor nie rozpozna (literówki w Twoim nazwisku, nietypowe formaty adresów, dane osobowe innych osób, wrażliwe tematy, które nie są formalnie danymi osobowymi), zostanie przesłane w takiej formie, w jakiej zostało wpisane. Traktuj każdą wiadomość tak, jak notatkę przekazywaną zewnętrznemu dostawcy AI i zachowaj ostrożność w przypadku danych osobowych."
  nl: "Voordat een bericht naar een extern AI-model wordt verzonden, scant je browser je bericht op echte namen, e-mailadressen en fysieke adressen die je hebt opgeslagen in je privacyinstellingen (of die overeenkomen met veelvoorkomende patronen) en vervangt deze door neutrale placeholders (bijvoorbeeld [USER_0]). De koppeling terug naar je echte waarden wordt versleuteld opgeslagen met jouw sleutel en wordt nooit ontsleuteld op onze servers. **Belangrijke beperking:** deze vervanging beschermt alleen persoonsgegevens die onze client-side detector daadwerkelijk herkent — meestal de waarden die je expliciet hebt opgeslagen in je privacyinstellingen en waarden die in het berichtveld zijn gemarkeerd voordat je het verzendt. Alles wat de detector niet herkent (typefouten in je eigen naam, ongebruikelijke adresformaten, persoonsgegevens van anderen, gevoelige onderwerpen die formeel geen PII zijn) wordt verzonden zoals je het hebt getypt. Behandel elk bericht zoals je een briefje zou behandelen dat aan een externe AI-provider wordt doorgegeven en wees voorzichtig met persoonsgegevens."
  ar: "قبل إرسال أي رسالة إلى نموذج ذكاء اصطناعي تابع لجهة خارجية، يقوم متصفحك بفحص رسالتك بحثاً عن الأسماء الحقيقية وعناوين البريد الإلكتروني والعناوين الفعلية التي قمت بحفظها في إعدادات الخصوصية الخاصة بك (أو التي تطابق الأنماط الشائعة) ويستبدل أي تطابقات بعناصر نائبة محايدة (على سبيل المثال [USER_0]). يتم تخزين عملية الربط بالقيم الحقيقية الخاصة بك مشفرة بمفتاحك ولا يتم فك تشفيرها أبداً على خوادمنا. **تنبيه هام:** يحمي هذا الاستبدال فقط البيانات الشخصية التي يتعرف عليها الكاشف الموجود في متصفحك بالفعل — عادةً القيم التي قمت بحفظها صراحةً في إعدادات الخصوصية والقيم المظللة في حقل الرسالة قبل الإرسال. أي شيء لا يتعرف عليه الكاشف (الأخطاء الإملائية في اسمك، تنسيقات العناوين غير الشائعة، البيانات الشخصية لأشخاص آخرين، المواضيع الحساسة التي لا تعتبر رسمياً معلومات تعريف شخصية) سيتم إرساله كما كتبته. يرجى التعامل مع كل رسالة كما لو كنت تتعامل مع ملاحظة يتم تمريرها إلى مزود ذكاء اصطناعي تابع لجهة خارجية وتوخي الحذر مع البيانات الشخصية."
  hi: "किसी भी संदेश को तीसरे पक्ष के AI मॉडल पर भेजे जाने से पहले, आपका ब्राउज़र आपके संदेश में उन असली नामों, ईमेल पतों और भौतिक पतों को स्कैन करता है जिन्हें आपने अपनी गोपनीयता सेटिंग्स में सहेजा है (या जो सामान्य पैटर्न से मेल खाते हैं) और किसी भी मिलान को तटस्थ प्लेसहोल्डर्स (उदाहरण के लिए [USER_0]) से बदल देता है। आपके वास्तविक मानों पर वापस मैपिंग आपकी कुंजी के साथ एन्क्रिप्टेड रूप में संग्रहीत की जाती है और हमारे सर्वर पर कभी भी डिक्रिप्ट नहीं की जाती है। **महत्वपूर्ण सीमा:** यह प्रतिस्थापन केवल उसी व्यक्तिगत डेटा की सुरक्षा करता है जिसे हमारा क्लाइंट-साइड डिटेक्टर वास्तव में पहचानता है — आमतौर पर वे मान जिन्हें आपने स्पष्ट रूप से अपनी गोपनीयता सेटिंग्स में सहेजा है और वे मान जो आपके भेजने से पहले संदेश फ़ील्ड में हाइलाइट किए गए हैं। डिटेक्टर जिसे नहीं पहचान पाता है (आपके अपने नाम की टाइपिंग गलतियाँ, असामान्य पते के प्रारूप, अन्य लोगों का व्यक्तिगत डेटा, संवेदनशील विषय जो औपचारिक रूप से PII नहीं हैं) वह वैसे ही प्रसारित किया जाएगा जैसा आपने टाइप किया था। कृपया प्रत्येक संदेश को वैसे ही मानें जैसे आप किसी तीसरे पक्ष के AI प्रदाता को दिए गए नोट को मानते हैं और व्यक्तिगत डेटा के प्रति सावधान रहें।"
  th: "ก่อนที่จะส่งข้อความใดๆ ไปยังโมเดล AI ของบุคคลที่สาม เบราว์เซอร์ของคุณจะสแกนข้อความเพื่อหาชื่อจริง อีเมล และที่อยู่จริงที่คุณบันทึกไว้ในการตั้งค่าความเป็นส่วนตัว (หรือที่ตรงกับรูปแบบทั่วไป) และแทนที่ข้อมูลที่ตรงกันด้วยตัวแทนที่เป็นกลาง (เช่น [USER_0]) การจับคู่กลับไปยังค่าจริงของคุณจะถูกจัดเก็บแบบเข้ารหัสด้วยคีย์ของคุณ และจะไม่ถูกถอดรหัสบนเซิร์ฟเวอร์ของเรา **ข้อจำกัดที่สำคัญ:** การแทนที่นี้จะปกป้องเฉพาะข้อมูลส่วนบุคคลที่ตัวตรวจจับฝั่งไคลเอนต์ของเรารู้จักเท่านั้น — โดยปกติจะเป็นค่าที่คุณบันทึกไว้อย่างชัดเจนในการตั้งค่าความเป็นส่วนตัวและค่าที่ไฮไลต์ในช่องข้อความก่อนที่คุณจะส่ง สิ่งใดก็ตามที่ตัวตรวจจับไม่รู้จัก (การพิมพ์ชื่อตัวเองผิด รูปแบบที่อยู่ที่พบไม่บ่อย ข้อมูลส่วนบุคคลของผู้อื่น หัวข้อที่ละเอียดอ่อนซึ่งไม่ใช่ PII อย่างเป็นทางการ) จะถูกส่งไปตามที่คุณพิมพ์ โปรดปฏิบัติต่อทุกข้อความเสมือนเป็นบันทึกที่ส่งไปยังผู้ให้บริการ AI ภายนอก และโปรดระมัดระวังข้อมูลส่วนบุคคล"
  cs: "Před odesláním jakékoli zprávy modelu AI třetí strany tvůj prohlížeč prohledá zprávu a vyhledá skutečná jména, e-mailové adresy a fyzické adresy, které máš uložené v nastavení soukromí (nebo které odpovídají běžným vzorům), a nahradí všechny nalezené shody neutrálními zástupnými symboly (například [USER_0]). Zpětné mapování na tvé skutečné hodnoty je uloženo zašifrované tvým klíčem a na našich serverech není nikdy dešifrováno. **Důležité omezení:** toto nahrazení chrání pouze osobní údaje, které náš detektor na straně klienta skutečně rozpozná – obvykle se jedná o hodnoty, které jsi výslovně uložil v nastavení soukromí, a hodnoty zvýrazněné v poli zprávy před odesláním. Cokoli, co detektor nerozpozná (překlepy ve tvém vlastním jméně, neobvyklé formáty adres, osobní údaje jiných osob, citlivá témata, která nejsou formálně osobními údaji), bude přeneseno tak, jak jsi to napsal. Ke každé zprávě prosím přistupuj jako k vzkazu předanému poskytovateli AI třetí strany a s osobními údaji nakládej opatrně."
  sv: "Innan ett meddelande skickas till en tredjeparts AI-modell skannar din webbläsare ditt meddelande efter riktiga namn, e-postadresser och fysiska adresser som du har sparat i dina integritetsinställningar (eller som matchar vanliga mönster) och ersätter alla träffar med neutrala platshållare (till exempel [USER_0]). Kopplingen tillbaka till dina riktiga värden lagras krypterad med din nyckel och dekrypteras aldrig på våra servrar. **Viktig begränsning:** denna ersättning skyddar endast personuppgifter som vår detektor i webbläsaren faktiskt känner igen – vanligtvis de värden du uttryckligen har sparat i dina integritetsinställningar och värden som markeras i meddelandefältet innan du skickar. Allt som detektorn inte känner igen (stavfel i ditt eget namn, ovanliga adressformat, andras personuppgifter, känsliga ämnen som inte formellt är personuppgifter) kommer att överföras precis som du skrev det. Behandla varje meddelande som du skulle behandla en anteckning som skickas till en tredjeparts AI-leverantör och var försiktig med personuppgifter."
  fr: "Avant que tout message ne soit envoyé à un modèle d'IA tiers, ton navigateur scanne ton message pour y trouver les noms réels, les adresses e-mail et les adresses physiques que tu as enregistrés dans tes paramètres de confidentialité (ou qui correspondent à des modèles courants) et remplace toute correspondance par des placeholders neutres (par exemple [USER_0]). La correspondance avec tes valeurs réelles est stockée de manière chiffrée avec ta clé et n'est jamais déchiffrée sur nos serveurs. **Limitation importante :** cette substitution ne protège que les données personnelles que notre détecteur côté client reconnaît réellement — généralement les valeurs que tu as explicitement enregistrées dans tes paramètres de confidentialité et les valeurs surlignées dans le champ de message avant l'envoi. Tout ce que le détecteur ne reconnaît pas (fautes de frappe dans ton propre nom, formats d'adresse peu communs, données personnelles d'autres personnes, sujets sensibles qui ne sont pas formellement des PII) sera transmis tel que tu l'as tapé. Traite chaque message comme tu le ferais pour une note transmise à un fournisseur d'IA tiers et reste prudent avec les données personnelles."
  ru: "Перед отправкой любого сообщения сторонней модели ИИ твой браузер сканирует его на наличие настоящих имен, адресов электронной почты и физических адресов, которые ты сохранил в настройках конфиденциальности (или которые соответствуют общим шаблонам), и заменяет любые совпадения нейтральными заполнителями (например, [USER_0]). Обратное сопоставление с твоими реальными данными хранится в зашифрованном виде с помощью твоего ключа и никогда не расшифровывается на наших серверах. **Важное ограничение:** эта замена защищает только те персональные данные, которые наш клиентский детектор действительно распознает — обычно это значения, которые ты явно сохранил в настройках конфиденциальности, и значения, выделенные в поле сообщения перед отправкой. Все, что детектор не распознает (опечатки в твоем имени, необычные форматы адресов, персональные данные других людей, конфиденциальные темы, которые формально не являются персональными данными), будет передано в том виде, в котором ты это ввел. Пожалуйста, относись к каждому сообщению так же, как к записке, передаваемой стороннему поставщику ИИ, и будь осторожен с персональными данными."
  he: "לפני שכל הודעה נשלחת למודל AI של צד שלישי, הדפדפן שלך סורק את ההודעה לאיתור שמות אמיתיים, כתובות אימייל וכתובות פיזיות ששמרת בהגדרות הפרטיות שלך (או שתואמים לתבניות נפוצות) ומחליף כל התאמה בממלאי מקום ניטרליים (לדוגמה [USER_0]). המיפוי חזרה לערכים האמיתיים שלך נשמר מוצפן עם המפתח שלך ולעולם אינו מפוענח בשרתים שלנו. **מגבלה חשובה:** החלפה זו מגנה רק על נתונים אישיים שגלאי צד-הלקוח שלנו מזהה בפועל — בדרך כלל הערכים ששמרת במפורש בהגדרות הפרטיות וערכים המודגשים בשדה ההודעה לפני השליחה. כל דבר שהגלאי אינו מזהה (שגיאות כתיב בשמך, פורמטים לא נפוצים של כתובות, נתונים אישיים של אנשים אחרים, נושאים רגישים שאינם מוגדרים רשמית כ-PII) יועבר כפי שהקלדת אותו. אנא התייחס לכל הודעה כפי שהיית מתייחס לפתק המועבר לספק AI של צד שלישי והיה זהיר עם נתונים אישיים."
  verified_by_human: []
protection.encrypted_at_rest.heading:
  context: Subheading for encrypted-at-rest measure
  en: Encrypted at rest, decrypted only in memory
