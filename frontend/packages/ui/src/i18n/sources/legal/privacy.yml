aggregate_analytics.overview:
  context: Explanation of what is collected and why it is privacy-safe
  en: We collect anonymous, aggregate statistics about how our website and web application are used. This data is genuinely anonymous — it cannot be linked to any individual user, and no cookies or tracking identifiers are set. No consent banner is required because no personal data is collected.
  de: Wir erheben anonyme, aggregierte Statistiken über die Nutzung unserer Website und Web-App. Diese Daten sind wirklich anonym — sie können keiner einzelnen Person zugeordnet werden, und es werden keine Cookies oder Tracking-IDs gesetzt.
  zh: 我们收集关于网站和Web应用使用情况的匿名聚合统计数据。这些数据是真正匿名的——无法与任何个人用户关联，也不设置Cookie或跟踪标识符。
  es: "Recopilamos estadísticas anónimas y agregadas sobre el uso de nuestro sitio web y aplicación web. Estos datos son genuinamente anónimos: no se pueden vincular a ningún usuario individual y no se establecen cookies ni identificadores de seguimiento."
  fr: Nous collectons des statistiques anonymes et agrégées sur l'utilisation de notre site web et application web. Ces données sont réellement anonymes — elles ne peuvent être liées à aucun utilisateur individuel, et aucun cookie ni identifiant de suivi n'est installé.
  pt: Coletamos estatísticas anônimas e agregadas sobre como nosso site e aplicativo web são usados. Esses dados são genuinamente anônimos — não podem ser vinculados a nenhum usuário individual e nenhum cookie ou identificador de rastreamento é definido. Nenhum banner de consentimento é necessário porque nenhum dado pessoal é coletado.
  ru: Мы собираем анонимную агрегированную статистику об использовании нашего веб-сайта и веб-приложения. Эти данные действительно анонимны — они не могут быть привязаны к какому-либо конкретному пользователю, и никакие файлы cookie или идентификаторы отслеживания не устанавливаются. Баннер согласия не требуется, так как никакие персональные данные не собираются.
  ja: 当ウェブサイトおよびウェブアプリの利用状況について、匿名の集計統計を収集します。このデータは真に匿名であり、特定の個人に結びつけることはできません。Cookieやトラッキング識別子は一切設定しません。
  ko: 당사 웹사이트 및 웹 애플리케이션 사용 방식에 대한 익명 집계 통계를 수집합니다. 이 데이터는 진정으로 익명이며 개별 사용자와 연결될 수 없고 쿠키나 추적 식별자가 설정되지 않습니다. 개인 데이터가 수집되지 않으므로 동의 배너가 필요하지 않습니다.
  it: Raccogliamo statistiche anonime e aggregate sull'utilizzo del nostro sito web e dell'applicazione web. Questi dati sono genuinamente anonimi — non possono essere collegati a nessun utente individuale e non vengono impostati cookie o identificatori di tracciamento. Non è richiesto nessun banner di consenso perché non vengono raccolti dati personali.
  tr: Web sitemizin ve web uygulamamızın nasıl kullanıldığına ilişkin anonim, toplu istatistikler topluyoruz. Bu veriler gerçek anlamda anonimdir — herhangi bir bireysel kullanıcıyla ilişkilendirilemez ve çerez veya izleme tanımlayıcısı kullanılmaz. Hiçbir kişisel veri toplanmadığından onay afişi gerekmez.
  vi: Chúng tôi thu thập thống kê ẩn danh và tổng hợp về cách trang web và ứng dụng web của chúng tôi được sử dụng. Dữ liệu này thực sự ẩn danh — không thể liên kết với bất kỳ người dùng cá nhân nào và không có cookie hoặc mã nhận dạng theo dõi nào được đặt. Không cần banner đồng ý vì không có dữ liệu cá nhân nào được thu thập.
  id: Kami mengumpulkan statistik anonim dan agregat tentang cara situs web dan aplikasi web kami digunakan. Data ini benar-benar anonim — tidak dapat dikaitkan dengan pengguna individu mana pun, dan tidak ada cookie atau pengidentifikasi pelacakan yang ditetapkan. Tidak diperlukan banner persetujuan karena tidak ada data pribadi yang dikumpulkan.
  pl: Zbieramy anonimowe statystyki zbiorcze dotyczące korzystania z naszej strony internetowej i aplikacji webowej. Dane te są autentycznie anonimowe — nie można ich powiązać z żadnym indywidualnym użytkownikiem, a żadne pliki cookie ani identyfikatory śledzenia nie są ustawiane. Baner zgody nie jest wymagany, ponieważ żadne dane osobowe nie są gromadzone.
  nl: We verzamelen anonieme, geaggregeerde statistieken over hoe onze website en webapplicatie worden gebruikt. Deze gegevens zijn echt anoniem — ze kunnen niet worden gekoppeld aan een individuele gebruiker en er worden geen cookies of tracking-ID's ingesteld. Een toestemmingsbanner is niet vereist omdat er geen persoonsgegevens worden verzameld.
  ar: نجمع إحصاءات مجهولة ومجمعة حول كيفية استخدام موقعنا الإلكتروني وتطبيقنا على الويب. هذه البيانات مجهولة الهوية حقاً — لا يمكن ربطها بأي مستخدم فردي، ولا يتم تعيين ملفات تعريف الارتباط أو معرفات التتبع. لا يلزم وجود لافتة موافقة لأنه لا يتم جمع أي بيانات شخصية.
  hi: हम अपनी वेबसाइट और वेब एप्लिकेशन के उपयोग के बारे में अनाम, समग्र आंकड़े एकत्र करते हैं। यह डेटा वास्तव में अनाम है — इसे किसी भी व्यक्तिगत उपयोगकर्ता से नहीं जोड़ा जा सकता, और कोई कुकी या ट्रैकिंग पहचानकर्ता सेट नहीं किया जाता। कोई सहमति बैनर आवश्यक नहीं है क्योंकि कोई व्यक्तिगत डेटा एकत्र नहीं किया जाता।
  th: เราเก็บรวบรวมสถิติที่ไม่ระบุตัวตนและรวมกลุ่มเกี่ยวกับวิธีการใช้เว็บไซต์และแอปพลิเคชันเว็บของเรา ข้อมูลนี้เป็นข้อมูลนิรนามอย่างแท้จริง — ไม่สามารถเชื่อมโยงกับผู้ใช้รายบุคคลใดได้ และไม่มีการตั้งค่าคุกกี้หรือตัวระบุการติดตาม ไม่จำเป็นต้องมีแบนเนอร์ขอความยินยอมเนื่องจากไม่มีการเก็บข้อมูลส่วนบุคคล
  cs: Shromažďujeme anonymní agregovanou statistiku o tom, jak jsou využívány naše webové stránky a webová aplikace. Tato data jsou skutečně anonymní — nelze je spojit s žádným konkrétním uživatelem a nejsou nastaveny žádné cookies ani sledovací identifikátory. Souhlas není vyžadován, protože nejsou shromažďována žádná osobní data.
  sv: Vi samlar in anonym, aggregerad statistik om hur vår webbplats och webbapplikation används. Dessa uppgifter är genuint anonyma — de kan inte kopplas till någon enskild användare och inga cookies eller spårningsidentifierare ställs in. Inget samtyckesmeddelande krävs eftersom inga personuppgifter samlas in.
  verified_by_human: []
  he: אנו אוספים סטטיסטיקות אנונימיות ומצטברות על אופן השימוש באתר ובאפליקציית האינטרנט שלנו. זה עוזר לנו לשפר את השירות ולהבין דפוסי שימוש כלליים מבלי לזהות משתמשים בודדים.
