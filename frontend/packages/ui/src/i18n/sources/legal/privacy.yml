providers.travel.flightradar24.description:
  context: Flightradar24 description
  en: >-
    Flightradar24 provides real flight track data when you ask about a
    specific flight number. It receives IATA flight numbers and departure
    dates without a user identifier.
  de: Flightradar24 liefert echte Flugverfolgungsdaten, wenn du nach einer bestimmten Flugnummer fragst. Es erhält IATA-Flugnummern und Abflugdaten ohne eine Benutzerkennung.
  zh: 当你查询特定航班号时，Flightradar24 提供真实的航班追踪数据。它接收 IATA 航班号和出发日期，且不包含用户标识符。
  fr: "Flightradar24 fournit des données de suivi de vol réelles lorsque tu poses une question sur un numéro de vol spécifique. Il reçoit les numéros de vol IATA et les dates de départ sans identifiant d'utilisateur."
  pt: O Flightradar24 fornece dados reais de seguimento de voos quando perguntas sobre um número de voo específico. Recebe números de voo IATA e datas de partida sem um identificador de utilizador.
  ru: Flightradar24 предоставляет данные об отслеживании рейсов в реальном времени, когда ты спрашиваешь о конкретном номере рейса. Он получает номера рейсов IATA и даты вылета без идентификатора пользователя.
  ja: Flightradar24は、特定の便名について問い合わせた際に、実際のフライト追跡データを提供します。IATA便名と出発日を受け取りますが、ユーザー識別子は受け取りません。
  it: Flightradar24 fornisce dati reali di tracciamento dei voli quando chiedi informazioni su un numero di volo specifico. Riceve i numeri di volo IATA e le date di partenza senza un identificativo utente.
  tr: Flightradar24, belirli bir uçuş numarasını sorduğunda gerçek uçuş takip verilerini sağlar. IATA uçuş numaralarını ve kalkış tarihlerini kullanıcı tanımlayıcısı olmadan alır.
  vi: Flightradar24 cung cấp dữ liệu theo dõi chuyến bay thực tế khi bạn hỏi về một số hiệu chuyến bay cụ thể. Nó nhận các số hiệu chuyến bay IATA và ngày khởi hành mà không có mã định danh người dùng.
  id: Flightradar24 menyediakan data pelacakan penerbangan nyata saat kamu menanyakan nomor penerbangan tertentu. Layanan ini menerima nomor penerbangan IATA dan tanggal keberangkatan tanpa pengidentifikasi pengguna.
  pl: Flightradar24 dostarcza rzeczywiste dane o trasach lotów, gdy pytasz o konkretny numer lotu. Otrzymuje numery lotów IATA i daty odlotów bez identyfikatora użytkownika.
  nl: Flightradar24 biedt actuele vluchtgegevens wanneer je naar een specifiek vluchtnummer vraagt. Het ontvangt IATA-vluchtnummers en vertrekdata zonder een gebruikersidentificatie.
  hi: जब आप किसी विशिष्ट फ्लाइट नंबर के बारे में पूछते हैं, तो Flightradar24 वास्तविक फ्लाइट ट्रैक डेटा प्रदान करता है। यह बिना किसी उपयोगकर्ता पहचानकर्ता के IATA फ्लाइट नंबर और प्रस्थान तिथियां प्राप्त करता है।
  th: Flightradar24 ให้ข้อมูลการติดตามเที่ยวบินจริงเมื่อคุณถามเกี่ยวกับหมายเลขเที่ยวบินที่ระบุ โดยจะได้รับหมายเลขเที่ยวบิน IATA และวันที่ออกเดินทางโดยไม่มีตัวระบุตัวตนผู้ใช้
  cs: Flightradar24 poskytuje reálná data o trasách letů, když se zeptáš na konkrétní číslo letu. Přijímá čísla letů IATA a data odletů bez identifikátoru uživatele.
  sv: Flightradar24 tillhandahåller faktiska flygspårningsdata när du frågar om ett specifikt flygnummer. De tar emot IATA-flygnummer och avresedatum utan en användaridentifierare.
  he: Flightradar24 מספקת נתוני מעקב טיסות בזמן אמת כאשר שואלים על מספר טיסה ספציפי. היא מקבלת מספרי טיסה של IATA ותאריכי המראה ללא מזהה משתמש.
  es: Flightradar24 proporciona datos reales de seguimiento de vuelos cuando preguntas por un número de vuelo específico. Recibe números de vuelo IATA y fechas de salida sin un identificador de usuario.
  ko: Flightradar24는 특정 편명을 문의할 때 실제 항공편 추적 데이터를 제공합니다. 사용자 식별자 없이 IATA 항공편 번호와 출발 날짜를 수신합니다.
  ar: يوفر Flightradar24 بيانات تتبع الرحلات الجوية الحقيقية عندما تسأل عن رقم رحلة معين. يتلقى أرقام رحلات IATA وتواريخ المغادرة بدون معرف مستخدم.
  verified_by_human: []
