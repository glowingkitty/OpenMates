providers.image_generation.recraft.description:
  context: Recraft description
  en: >-
    Recraft powers the images.generate and images.vectorize skills, producing
    vector and raster images and converting bitmaps to SVG. Recraft receives
    your prompts, style preferences, and — when vectorizing — your source
    images.
  de: Recraft betreibt die Skills images.generate und images.vectorize, erstellt Vektor- und Rasterbilder und konvertiert Bitmaps in SVG. Recraft erhält deine Prompts, Stilpräferenzen und – beim Vektorisieren – deine Quellbilder.
  zh: Recraft 为 images.generate 和 images.vectorize 技能提供支持，生成矢量图和位图，并将位图转换为 SVG。Recraft 会接收您的提示词、风格偏好，以及在进行矢量化时接收您的源图像。
  es: Recraft potencia las habilidades images.generate e images.vectorize, produciendo imágenes vectoriales y rasterizadas y convirtiendo mapas de bits a SVG. Recraft recibe tus instrucciones, preferencias de estilo y, al vectorizar, tus imágenes de origen.
  pt: O Recraft alimenta as skills images.generate e images.vectorize, produzindo imagens vetoriais e raster e convertendo bitmaps para SVG. O Recraft recebe os teus prompts, preferências de estilo e — ao vetorizar — as tuas imagens de origem.
  ja: Recraftはimages.generateおよびimages.vectorizeスキルを支えており、ベクター画像やラスター画像を生成し、ビットマップをSVGに変換する。Recraftは、プロンプト、スタイルの好み、およびベクター化の際にはソース画像を受信する。
  ko: Recraft는 images.generate 및 images.vectorize 스킬을 구동하여 벡터 및 래스터 이미지를 생성하고 비트맵을 SVG로 변환합니다. Recraft는 프롬프트, 스타일 기본 설정 및 벡터화 시 원본 이미지를 수신합니다.
  it: Recraft gestisce le skill images.generate e images.vectorize, producendo immagini vettoriali e raster e convertendo bitmap in SVG. Recraft riceve i tuoi prompt, le preferenze di stile e — durante la vettorializzazione — le tue immagini sorgente.
  tr: "Recraft; vektör ve raster görseller üreten, bitmap'leri SVG'ye dönüştüren images.generate ve images.vectorize yeteneklerine güç verir. Recraft; istemlerini, stil tercihlerini ve vektörleştirme yaparken kaynak görsellerini alır."
  vi: Recraft cung cấp sức mạnh cho các kỹ năng images.generate và images.vectorize, tạo ra hình ảnh vector và raster cũng như chuyển đổi bitmap sang SVG. Recraft nhận các câu lệnh, tùy chọn phong cách và — khi vector hóa — các hình ảnh nguồn của bạn.
  id: Recraft mendukung keahlian images.generate dan images.vectorize, menghasilkan gambar vektor dan raster serta mengonversi bitmap ke SVG. Recraft menerima perintahmu, preferensi gaya, dan — saat melakukan vektorisasi — gambar sumbermu.
  pl: Recraft obsługuje umiejętności images.generate i images.vectorize, tworząc obrazy wektorowe i rastrowe oraz konwertując mapy bitowe na format SVG. Recraft otrzymuje Twoje polecenia, preferencje stylu oraz — w przypadku wektoryzacji — obrazy źródłowe.
  nl: Recraft drijft de skills images.generate en images.vectorize aan, genereert vector- en rasterafbeeldingen en converteert bitmaps naar SVG. Recraft ontvangt je prompts, stijlvoorkeuren en — bij vectoriseren — je bronafbeeldingen.
  hi: Recraft, images.generate और images.vectorize स्किल्स को पावर देता है, जो वेक्टर और रास्टर इमेज बनाता है और बिटमैप्स को SVG में बदलता है। Recraft आपके प्रॉम्प्ट, स्टाइल प्राथमिकताएं और — वेक्टराइज़ करते समय — आपकी सोर्स इमेज प्राप्त करता है।
  th: Recraft ขับเคลื่อนทักษะ images.generate และ images.vectorize โดยสร้างรูปภาพเวกเตอร์และราสเตอร์ รวมถึงแปลงบิตแมปเป็น SVG โดย Recraft จะได้รับพรอมต์ ความชอบด้านสไตล์ และรูปภาพต้นฉบับของคุณเมื่อมีการแปลงเป็นเวกเตอร์
  sv: Recraft driver färdigheterna images.generate och images.vectorize, skapar vektor- och rasterbilder samt konverterar bitmappar till SVG. Recraft tar emot dina instruktioner, stilpreferenser och — vid vektorisering — dina källbilder.
  fr: Recraft alimente les compétences images.generate et images.vectorize, produisant des images vectorielles et matricielles et convertissant les bitmaps en SVG. Recraft reçoit tes instructions, tes préférences de style et — lors de la vectorisation — tes images sources.
  ar: يدعم Recraft مهارات images.generate و images.vectorize، حيث ينتج صوراً شعاعية ونقطية ويحول الصور النقطية إلى SVG. يتلقى Recraft مطالباتك وتفضيلات النمط الخاصة بك، وعند التحويل لشعاعي، يتلقى صورك المصدر.
  cs: Recraft pohání dovednosti images.generate a images.vectorize, vytváří vektorové i rastrové obrázky a převádí bitmapy na SVG. Recraft přijímá tvá zadání, preference stylu a – při vektorizaci – tvé zdrojové obrázky.
  ru: Recraft обеспечивает работу навыков images.generate и images.vectorize, создавая векторные и растровые изображения и преобразуя растровые изображения в SVG. Recraft получает твои промпты, предпочтения по стилю и — при векторизации — твои исходные изображения.
  he: Recraft מפעילה את המיומנויות images.generate ו-images.vectorize, מייצרת תמונות וקטוריות ורסטר והופכת מפות סיביות (bitmaps) ל-SVG. Recraft מקבלת את ההנחיות שלך, העדפות סגנון, ובעת וקטוריזציה — את תמונות המקור שלך.
  verified_by_human: []
