providers.image_generation.description:
  context: Description of Group D
  en: >-
    These providers are only used when you invoke an image generation or
    editing skill. If you never use the images app, none of your data is
    shared with them.
  de: Diese Anbieter werden nur verwendet, wenn du einen Skill zur Bilderzeugung oder -bearbeitung aufrufst. Wenn du die Bilder-App nie nutzt, werden keine deiner Daten mit ihnen geteilt.
  zh: 这些提供商仅在您调用图像生成或编辑技能时使用。如果您从不使用图像应用，则不会与他们共享任何数据。
  es: Estos proveedores solo se utilizan cuando invocas una habilidad de generación o edición de imágenes. Si nunca usas la aplicación de imágenes, no se comparte ninguno de tus datos con ellos.
  pt: Estes fornecedores só são utilizados quando invocas uma skill de geração ou edição de imagem. Se nunca utilizares a app de imagens, nenhum dos teus dados é partilhado com eles.
  ja: これらのプロバイダーは、画像生成または編集スキルを呼び出した場合にのみ使用される。画像アプリを一度も使用しない場合、データがこれらのプロバイダーと共有されることはない。
  ko: 이 제공업체들은 이미지 생성 또는 편집 스킬을 호출할 때만 사용됩니다. 이미지 앱을 사용하지 않는다면 어떠한 데이터도 이들과 공유되지 않습니다.
  it: "Questi fornitori vengono utilizzati solo quando invochi una skill di generazione o modifica di immagini. Se non usi mai l'app immagini, nessuno dei tuoi dati verrà condiviso con loro."
  tr: Bu sağlayıcılar yalnızca bir görsel oluşturma veya düzenleme yeteneğini çağırdığında kullanılır. Görsel uygulamasını hiç kullanmazsan hiçbir verin onlarla paylaşılmaz.
  vi: Các nhà cung cấp này chỉ được sử dụng khi bạn gọi một kỹ năng tạo hoặc chỉnh sửa hình ảnh. Nếu bạn không bao giờ sử dụng ứng dụng hình ảnh, không có dữ liệu nào của bạn được chia sẻ với họ.
  id: Penyedia ini hanya digunakan saat kamu memanggil keahlian pembuatan atau pengeditan gambar. Jika kamu tidak pernah menggunakan aplikasi gambar, tidak ada datamu yang dibagikan kepada mereka.
  pl: Dostawcy ci są używani tylko po wywołaniu umiejętności generowania lub edycji obrazów. Jeśli nigdy nie korzystasz z aplikacji do obrazów, żadne Twoje dane nie są im udostępniane.
  nl: Deze providers worden alleen gebruikt wanneer je een skill voor beeldgeneratie of -bewerking aanroept. Als je de afbeeldingen-app nooit gebruikt, worden er geen gegevens met hen gedeeld.
  hi: इन प्रोवाइडर्स का उपयोग केवल तब किया जाता है जब आप इमेज जनरेशन या एडिटिंग स्किल का उपयोग करते हैं। यदि आप कभी भी इमेज ऐप का उपयोग नहीं करते हैं, तो आपका कोई भी डेटा उनके साथ साझा नहीं किया जाता है।
  th: ผู้ให้บริการเหล่านี้จะถูกใช้เมื่อคุณเรียกใช้ทักษะการสร้างหรือแก้ไขรูปภาพเท่านั้น หากคุณไม่เคยใช้แอปรูปภาพ ข้อมูลของคุณจะไม่ถูกแชร์กับผู้ให้บริการเหล่านี้เลย
  sv: Dessa leverantörer används endast när du anropar en färdighet för bildgenerering eller redigering. Om du aldrig använder bild-appen delas ingen av din data med dem.
  fr: "Ces fournisseurs ne sont utilisés que lorsque tu invoques une compétence de génération ou de modification d'image. Si tu n'utilises jamais l'application d'images, aucune de tes données n'est partagée avec eux."
  ar: يتم استخدام هؤلاء المزودين فقط عندما تستخدم مهارة إنشاء الصور أو تحريرها. إذا لم تستخدم تطبيق الصور أبداً، فلن تتم مشاركة أي من بياناتك معهم.
  cs: Tito poskytovatelé se používají pouze tehdy, když vyvoláš dovednost pro generování nebo úpravu obrázků. Pokud aplikaci pro obrázky nikdy nepoužiješ, žádná tvá data s nimi nebudou sdílena.
  ru: Эти провайдеры используются только тогда, когда ты вызываешь навык генерации или редактирования изображений. Если ты никогда не пользуешься приложением для работы с изображениями, никакие твои данные им не передаются.
  he: ספקים אלו נמצאים בשימוש רק כשמפעילים מיומנות יצירה או עריכה של תמונות. אם אינך משתמש באפליקציית התמונות, אף אחד מהנתונים שלך לא משותף איתם.
  verified_by_human: []
