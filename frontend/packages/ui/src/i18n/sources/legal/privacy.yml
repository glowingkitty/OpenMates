providers.shopping.rewe.description:
  context: REWE description
  en: >-
    REWE's product catalogue is queried for live product and price data when
    you search German grocery items. REWE receives your search queries
    without a user identifier.
  de: Der Produktkatalog von REWE wird nach Live-Produkt- und Preisdaten abgefragt, wenn du nach deutschen Lebensmitteln suchst. REWE erhält deine Suchanfragen ohne eine Benutzerkennung.
  zh: 当你搜索德国杂货商品时，我们会查询 REWE 的产品目录以获取实时产品和价格数据。REWE 接收你的查询请求，且不包含用户标识符。
  fr: "Le catalogue de produits de REWE est interrogé pour obtenir des données sur les produits et les prix en direct lorsque tu recherches des articles d'épicerie allemands. REWE reçoit tes requêtes de recherche sans identifiant d'utilisateur."
  pt: O catálogo de produtos da REWE é consultado para obter dados de produtos e preços em tempo real quando pesquisas artigos de mercearia alemães. A REWE recebe as tuas consultas de pesquisa sem um identificador de utilizador.
  ru: Каталог товаров REWE запрашивается для получения актуальных данных о товарах и ценах при поиске продуктов в Германии. REWE получает твои поисковые запросы без идентификатора пользователя.
  ja: ドイツの食料品を検索すると、REWEの商品カタログから最新の商品および価格データが照会されます。REWEは検索クエリを受け取りますが、ユーザー識別子は受け取りません。
  it: Il catalogo prodotti di REWE viene consultato per dati su prodotti e prezzi in tempo reale quando cerchi articoli alimentari tedeschi. REWE riceve le tue query di ricerca senza un identificativo utente.
  tr: "Alman market ürünlerini aradığında, canlı ürün ve fiyat verileri için REWE'nin ürün kataloğu sorgulanır. REWE, arama sorgularını kullanıcı tanımlayıcısı olmadan alır."
  vi: Danh mục sản phẩm của REWE được truy vấn để lấy dữ liệu sản phẩm và giá trực tiếp khi bạn tìm kiếm các mặt hàng bách hóa Đức. REWE nhận các truy vấn tìm kiếm của bạn mà không có mã định danh người dùng.
  id: Katalog produk REWE ditanyakan untuk data produk dan harga secara langsung saat kamu mencari item toko kelontong Jerman. REWE menerima kueri pencarianmu tanpa pengidentifikasi pengguna.
  pl: Katalog produktów REWE jest przeszukiwany pod kątem aktualnych danych o produktach i cenach, gdy szukasz niemieckich artykułów spożywczych. REWE otrzymuje Twoje zapytania bez identyfikatora użytkownika.
  nl: De productcatalogus van REWE wordt geraadpleegd voor actuele product- en prijsgegevens wanneer je naar Duitse supermarktartikelen zoekt. REWE ontvangt je zoekopdrachten zonder een gebruikersidentificatie.
  hi: जब आप जर्मन ग्रोसरी आइटम खोजते हैं, तो लाइव उत्पाद और मूल्य डेटा के लिए REWE के उत्पाद कैटलॉग से पूछताछ की जाती है। REWE बिना किसी उपयोगकर्ता पहचानकर्ता के आपके खोज प्रश्न प्राप्त करता है।
  th: แคตตาล็อกสินค้าของ REWE จะถูกค้นหาเพื่อขอข้อมูลสินค้าและราคาแบบเรียลไทม์เมื่อคุณค้นหาสินค้าอุปโภคบริโภคในเยอรมนี REWE จะได้รับคำค้นหาของคุณโดยไม่มีตัวระบุตัวตนผู้ใช้
  cs: Při vyhledávání německých potravin se v katalogu produktů REWE hledají aktuální údaje o produktech a cenách. REWE přijímá tvé vyhledávací dotazy bez identifikátoru uživatele.
  sv: "REWE:s produktkatalog genomsöks efter produkt- och prisdata i realtid när du söker efter tyska livsmedel. REWE tar emot dina sökfrågor utan en användaridentifierare."
  he: קטלוג המוצרים של REWE נסרק עבור נתוני מוצרים ומחירים בזמן אמת כאשר מחפשים מוצרי מכולת גרמניים. REWE מקבלת את שאילתות החיפוש שלך ללא מזהה משתמש.
  es: El catálogo de productos de REWE se consulta para obtener datos de productos y precios en tiempo real cuando buscas artículos de supermercado alemanes. REWE recibe tus consultas de búsqueda sin un identificador de usuario.
  ko: 독일 식료품 품목을 검색할 때 실시간 제품 및 가격 데이터를 위해 REWE의 제품 카탈로그를 조회합니다. REWE는 사용자 식별자 없이 검색 쿼리를 수신합니다.
  ar: يتم الاستعلام في كتالوج منتجات REWE للحصول على بيانات المنتجات والأسعار المباشرة عند البحث عن سلع البقالة الألمانية. يتلقى REWE استعلامات البحث الخاصة بك بدون معرف مستخدم.
  verified_by_human: []
