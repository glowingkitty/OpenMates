providers.ai_models.openai.description:
  context: OpenAI description
  en: >-
    OpenAI processes requests for GPT-family models when you select one.
    OpenAI receives your chat messages with PII placeholders already
    substituted client-side.
  de: OpenAI verarbeitet Anfragen für Modelle der GPT-Familie, wenn du eines auswählst. OpenAI erhält deine Chat-Nachrichten mit bereits clientseitig ersetzten PII-Platzhaltern.
  zh: 当您选择 GPT 系列模型时，OpenAI 会处理相关请求。OpenAI 接收您的聊天消息时，其中的 PII（个人身份信息）占位符已在客户端完成替换。
  es: OpenAI procesa solicitudes para modelos de la familia GPT cuando seleccionas uno. OpenAI recibe tus mensajes de chat con los marcadores de PII ya sustituidos en el lado del cliente.
  pt: A OpenAI processa pedidos para modelos da família GPT quando selecionas um. A OpenAI recebe as tuas mensagens de chat com marcadores de PII já substituídos no lado do cliente.
  ja: OpenAIは、GPTファミリーのモデルを選択した際にそのリクエストを処理する。OpenAIは、クライアント側でPII（個人を特定できる情報）プレースホルダーに置換済みのチャットメッセージを受信する。
  ko: OpenAI는 사용자가 GPT 제품군 모델을 선택할 때 요청을 처리합니다. OpenAI는 클라이언트 측에서 PII 자리표시자가 이미 대체된 상태로 채팅 메시지를 수신합니다.
  it: OpenAI elabora le richieste per i modelli della famiglia GPT quando ne selezioni uno. OpenAI riceve i tuoi messaggi di chat con i segnaposto PII già sostituiti lato client.
  tr: OpenAI, bir GPT ailesi modeli seçtiğinde istekleri işler. OpenAI, sohbet mesajlarını PII yer tutucuları istemci tarafında değiştirilmiş olarak alır.
  vi: OpenAI xử lý các yêu cầu cho các mô hình dòng GPT khi bạn chọn một mô hình. OpenAI nhận tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế ở phía máy khách.
  id: OpenAI memproses permintaan untuk model keluarga GPT saat kamu memilihnya. OpenAI menerima pesan obrolanmu dengan placeholder PII yang sudah diganti di sisi klien.
  pl: OpenAI przetwarza żądania dla modeli z rodziny GPT po ich wybraniu. OpenAI otrzymuje Twoje wiadomości czatu z symbolami zastępczymi PII podstawionymi już po stronie klienta.
  nl: OpenAI verwerkt verzoeken voor modellen uit de GPT-familie wanneer je er een selecteert. OpenAI ontvangt je chatberichten waarbij PII-placeholders al aan de clientzijde zijn vervangen.
  hi: जब आप GPT-फ़ैमिली के किसी मॉडल को चुनते हैं, तो OpenAI उन अनुरोधों को प्रोसेस करता है। OpenAI आपके चैट संदेशों को क्लाइंट-साइड पर पहले से ही बदले गए PII प्लेसहोल्डर्स के साथ प्राप्त करता है।
  th: OpenAI ประมวลผลคำขอสำหรับโมเดลตระกูล GPT เมื่อคุณเลือกใช้งาน โดย OpenAI จะได้รับข้อความแชทของคุณที่แทนที่ตัวสำรอง PII เรียบร้อยแล้วจากฝั่งไคลเอนต์
  sv: OpenAI behandlar förfrågningar för modeller i GPT-familjen när du väljer en sådan. OpenAI tar emot dina chattmeddelanden med PII-platshållare redan utbytta på klientsidan.
  fr: OpenAI traite les requêtes pour les modèles de la famille GPT lorsque tu en sélectionnes un. OpenAI reçoit tes messages de chat avec les espaces réservés PII déjà substitués côté client.
  ar: تعالج OpenAI طلبات نماذج عائلة GPT عند اختيار أحدها. تتلقى OpenAI رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لمعلومات التعريف الشخصية مسبقاً في متصفحك.
  cs: OpenAI zpracovává požadavky pro modely z rodiny GPT, když si některý z nich vybereš. OpenAI přijímá tvé zprávy s osobními údaji (PII) již nahrazenými zástupnými symboly na straně klienta.
  ru: OpenAI обрабатывает запросы для моделей семейства GPT, когда ты выбираешь одну из них. OpenAI получает твои сообщения в чате с уже замененными на стороне клиента персональными данными.
  he: "OpenAI מעבדת בקשות למודלים ממשפחת GPT כשבוחרים באחד מהם. OpenAI מקבלת את הודעות הצ'אט שלך כשממלאי מקום ל-PII כבר הוחלפו בצד הלקוח."
  verified_by_human: []
