providers.payments.stripe.description:
  context: Stripe description
  en: >-
    Stripe processes one-time credit purchases and monthly auto top-up
    subscriptions. We send Stripe your email address, a tokenized payment
    method (we never see your card number), billing address and VAT
    information when required for invoicing, and transaction metadata.
  de: Stripe wickelt einmalige Credit-Käufe und Abonnements für das monatliche automatische Aufladen ab. Wir übermitteln an Stripe deine E-Mail-Adresse, eine tokenisierte Zahlungsmethode (wir sehen deine Kartennummer nie), die Rechnungsadresse und USt-Informationen, sofern für die Rechnungsstellung erforderlich, sowie Transaktions-Metadaten.
  zh: Stripe 处理单次额度购买和每月自动充值订阅。我们会向 Stripe 发送你的电子邮件地址、令牌化的支付方式（我们从未看到你的卡号）、开具发票所需的账单地址和增值税信息，以及交易元数据。
  es: Stripe procesa compras de crédito únicas y suscripciones de recarga automática mensual. Enviamos a Stripe tu dirección de correo electrónico, un método de pago tokenizado (nunca vemos tu número de tarjeta), la dirección de facturación y la información del IVA cuando sea necesario para la facturación, y los metadatos de la transacción.
  ru: Stripe обрабатывает разовые покупки кредитов и подписки на ежемесячное автопополнение. Мы передаем Stripe твой адрес электронной почты, токенизированный способ оплаты (мы никогда не видим номер твоей карты), платежный адрес и информацию о НДС, когда это необходимо для выставления счета, а также метаданные транзакции.
  ja: Stripeは、単発のクレジット購入と月次自動チャージの購読を処理します。Stripeには、メールアドレス、トークン化された支払い方法（カード番号を弊社が知ることはありません）、請求書発行に必要な場合の請求先住所とVAT情報、および取引メタデータを送信します。
  ko: Stripe는 일회성 크레딧 구매 및 월간 자동 충전 구독을 처리합니다. 당사는 Stripe에 이메일 주소, 토큰화된 결제 수단(카드 번호는 당사에 노출되지 않음), 청구서 발행에 필요한 경우 청구 주소 및 부가세 정보, 거래 메타데이터를 전송합니다.
  it: "Stripe elabora gli acquisti di crediti una tantum e gli abbonamenti con ricarica automatica mensile. Inviamo a Stripe il tuo indirizzo email, un metodo di pagamento tokenizzato (non vediamo mai il numero della tua carta), l'indirizzo di fatturazione e le informazioni sulla partita IVA quando richiesto per la fatturazione, oltre ai metadati della transazione."
  tr: "Stripe, tek seferlik kredi satın alımlarını ve aylık otomatik yükleme aboneliklerini işler. Stripe'a e-posta adresini, simgeleştirilmiş bir ödeme yöntemini (kart numaranı asla görmeyiz), faturalandırma için gerektiğinde fatura adresini ve KDV bilgilerini ve işlem meta verilerini göndeririz."
  vi: Stripe xử lý các giao dịch mua tín dụng một lần và đăng ký tự động nạp tiền hàng tháng. Chúng tôi gửi cho Stripe địa chỉ email của bạn, phương thức thanh toán được mã hóa mã thông báo (chúng tôi không bao giờ thấy số thẻ của bạn), địa chỉ thanh toán và thông tin VAT khi cần để lập hóa đơn, cùng siêu dữ liệu giao dịch.
  id: Stripe memproses pembelian kredit satu kali dan langganan pengisian otomatis bulanan. Kami mengirimkan alamat emailmu, metode pembayaran yang ditokenisasi (kami tidak pernah melihat nomor kartumu), alamat penagihan, dan informasi PPN jika diperlukan untuk penagihan, serta metadata transaksi ke Stripe.
  pl: Stripe przetwarza jednorazowe zakupy kredytów i miesięczne subskrypcje automatycznego doładowania. Przesyłamy do Stripe Twój adres e-mail, ztokenizowaną metodę płatności (nigdy nie widzimy numeru Twojej karty), adres rozliczeniowy i dane NIP, gdy są wymagane do wystawienia faktury, oraz metadane transakcji.
  nl: Stripe verwerkt eenmalige aankopen van credits en maandelijkse abonnementen voor automatisch opwaarderen. We sturen Stripe je e-mailadres, een getokeniseerde betaalmethode (we zien nooit je kaartnummer), factuuradres en btw-informatie wanneer dit vereist is voor facturering, en transactiemetadata.
  ar: يقوم Stripe بمعالجة عمليات شراء الرصيد لمرة واحدة واشتراكات الشحن التلقائي الشهري. نرسل إلى Stripe عنوان بريدك الإلكتروني، وطريقة دفع مرمزة (لا نرى رقم بطاقتك أبداً)، وعنوان الفواتير ومعلومات ضريبة القيمة المضافة عند الحاجة لإصدار الفواتير، وبيانات المعاملة الوصفية.
  hi: Stripe एक बार की क्रेडिट खरीदारी और मासिक ऑटो टॉप-अप सदस्यता को प्रोसेस करता है। हम Stripe को तुम्हारा ईमेल पता, एक टोकनयुक्त भुगतान विधि (हम तुम्हारा कार्ड नंबर कभी नहीं देखते), बिलिंग पता और चालान के लिए आवश्यक होने पर VAT जानकारी, और ट्रांज़ैक्शन मेटाडेटा भेजते हैं।
  th: Stripe ดำเนินการซื้อเครดิตแบบครั้งเดียวและสมัครสมาชิกเติมเงินอัตโนมัติรายเดือน เราส่งที่อยู่อีเมลของคุณ วิธีการชำระเงินแบบโทเค็น (เราไม่เคยเห็นหมายเลขบัตรของคุณ) ที่อยู่สำหรับเรียกเก็บเงิน และข้อมูลภาษีมูลค่าเพิ่มเมื่อจำเป็นสำหรับการออกใบแจ้งหนี้ รวมถึงข้อมูลเมตาของรายการให้แก่ Stripe
  cs: Stripe zpracovává jednorázové nákupy kreditů a měsíční předplatné automatického dobíjení. Službě Stripe zasíláme tvou e-mailovou adresu, tokenizovanou platební metodu (nikdy nevidíme číslo tvé karty), fakturační adresu a údaje o DPH, pokud jsou vyžadovány pro fakturaci, a metadata transakce.
  sv: Stripe hanterar engångsköp av krediter och prenumerationer för månatlig automatisk påfyllning. Vi skickar din e-postadress, en tokeniserad betalningsmetod (vi ser aldrig ditt kortnummer), faktureringsadress och moms-information när det krävs för fakturering, samt transaktionsmetadata till Stripe.
  he: "Stripe מעבדת רכישות קרדיטים חד-פעמיות ומנויי טעינה חודשית אוטומטית. אנחנו שולחים ל-Stripe את כתובת האימייל שלך, אמצעי תשלום מוצפן (אנחנו לעולם לא רואים את מספר הכרטיס שלך), כתובת לחיוב ופרטי מע\"מ במידת הצורך להפקת חשבונית, ונתוני מטא של העסקה."
  pt: A Stripe processa compras únicas de créditos e assinaturas de recarga automática mensal. Enviamos à Stripe seu endereço de e-mail, um método de pagamento tokenizado (nunca vemos o número do seu cartão), endereço de faturamento e informações de IVA quando necessário para faturamento, além de metadados da transação.
  fr: "Stripe traite les achats de crédits ponctuels et les abonnements de recharge automatique mensuelle. Nous envoyons à Stripe ton adresse e-mail, un mode de paiement tokenisé (nous ne voyons jamais ton numéro de carte), l'adresse de facturation et les informations de TVA si nécessaire pour la facturation, ainsi que les métadonnées de transaction."
  verified_by_human: []
