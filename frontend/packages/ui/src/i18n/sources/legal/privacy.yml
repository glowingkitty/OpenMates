providers.web_and_search.google_maps.description:
  context: Google Maps description
  en: >-
    Google Maps powers the places search skill. Google sees the text of your
    place queries and an approximate location for localized results, but no
    user identifier.
  de: Google Maps ermöglicht den Skill zur Ortssuche. Google sieht den Text deiner Suchanfragen und einen ungefähren Standort für lokalisierte Ergebnisse, aber keine Benutzerkennung.
  zh: Google Maps 为地点搜索技能提供支持。Google 会看到你的地点查询文本和用于本地化结果的大致位置，但不会看到用户标识符。
  fr: "Google Maps alimente la compétence de recherche de lieux. Google voit le texte de tes requêtes de lieux et une localisation approximative pour les résultats localisés, mais aucun identifiant d'utilisateur."
  pt: O Google Maps alimenta a skill de pesquisa de locais. O Google vê o texto das tuas consultas de locais e uma localização aproximada para resultados localizados, mas nenhum identificador de utilizador.
  ru: Google Maps обеспечивает работу навыка поиска мест. Google видит текст твоих запросов о местах и примерное местоположение для локализованных результатов, но не получает идентификатор пользователя.
  ja: Google Mapsは場所検索スキルを提供します。Googleは、場所のクエリのテキストと、ローカライズされた結果を表示するためのおおよその位置情報を取得しますが、ユーザー識別子は取得しません。
  it: Google Maps alimenta la skill di ricerca dei luoghi. Google vede il testo delle tue query sui luoghi e una posizione approssimativa per i risultati localizzati, ma nessun identificativo utente.
  tr: Google Maps, yer arama yeteneğini destekler. Google, yer sorgularının metnini ve yerelleştirilmiş sonuçlar için yaklaşık bir konumu görür, ancak kullanıcı tanımlayıcısı görmez.
  vi: Google Maps hỗ trợ kỹ năng tìm kiếm địa điểm. Google nhìn thấy nội dung văn bản của các truy vấn địa điểm và vị trí xấp xỉ của bạn để đưa ra kết quả được bản địa hóa, nhưng không có mã định danh người dùng.
  id: Google Maps mendukung keahlian pencarian tempat. Google melihat teks kueri tempatmu dan perkiraan lokasi untuk hasil lokal, tetapi tanpa pengidentifikasi pengguna.
  pl: Google Maps obsługuje umiejętność wyszukiwania miejsc. Google widzi tekst Twoich zapytań o miejsca oraz przybliżoną lokalizację dla wyników lokalnych, ale nie otrzymuje identyfikatora użytkownika.
  nl: Google Maps drijft de vaardigheid voor het zoeken naar plaatsen aan. Google ziet de tekst van je zoekopdrachten voor plaatsen en een geschatte locatie voor lokale resultaten, maar geen gebruikersidentificatie.
  hi: Google Maps स्थान खोज स्किल को संचालित करता है। Google आपके स्थान प्रश्नों का टेक्स्ट और स्थानीय परिणामों के लिए एक अनुमानित स्थान देखता है, लेकिन कोई उपयोगकर्ता पहचानकर्ता (user identifier) नहीं।
  th: Google Maps ขับเคลื่อนทักษะการค้นหาสถานที่ Google จะเห็นข้อความคำค้นหาสถานที่ของคุณและตำแหน่งโดยประมาณสำหรับผลลัพธ์ในพื้นที่ แต่จะไม่เห็นตัวระบุตัวตนผู้ใช้
  cs: Google Maps pohání dovednost vyhledávání míst. Google vidí text tvých dotazů na místa a přibližnou polohu pro lokalizované výsledky, ale žádný identifikátor uživatele.
  sv: Google Maps driver färdigheten för platssökning. Google ser texten i dina platssökningar och en ungefärlig plats för lokaliserade resultat, men ingen användaridentifierare.
  he: Google Maps מפעילה את מיומנות חיפוש המקומות. Google רואה את הטקסט של שאילתות המקומות שלך ומיקום משוער עבור תוצאות מקומיות, אך ללא מזהה משתמש.
  es: Google Maps impulsa la habilidad de búsqueda de lugares. Google ve el texto de tus consultas de lugares y una ubicación aproximada para resultados localizados, pero ningún identificador de usuario.
  ko: Google Maps는 장소 검색 스킬을 구동합니다. Google은 장소 쿼리 텍스트와 지역화된 결과를 위한 대략적인 위치를 볼 수 있지만, 사용자 식별자는 볼 수 없습니다.
  ar: تدعم خرائط جوجل مهارة البحث عن الأماكن. ترى جوجل نص استعلامات الأماكن الخاصة بك وموقعاً تقريبياً للنتائج المحلية، ولكن بدون معرف مستخدم.
  verified_by_human: []
