limitations_of_erasure.financial_records.description:
  context: Financial records limitation description
  en: >-
    Invoices, credit notes, and financial compliance log entries are retained
    for up to 10 years under GDPR Art. 17(3)(b) — legal obligation (German tax
    and commercial law, AO §147 and HGB §257). The retained records contain
    only transaction metadata, an invoice number, and a user identifier — not
    chat content or any other personal data.
  de: Rechnungen, Gutschriften und Finanz-Compliance-Protokolleinträge werden gemäß DSGVO Art. 17(3)(b) – rechtliche Verpflichtung (deutsches Steuer- und Handelsrecht, AO §147 und HGB §257) – bis zu 10 Jahre lang aufbewahrt. Die aufbewahrten Unterlagen enthalten nur Transaktions-Metadaten, eine Rechnungsnummer und eine Benutzerkennung – keine Chat-Inhalte oder andere personenbezogene Daten.
  zh: 根据 GDPR 第 17(3)(b) 条——法律义务（德国税务和商业法，AO §147 和 HGB §257），发票、贷记单和财务合规日志条目将保留最长 10 年。保留的记录仅包含交易元数据、发票号码和用户标识符，不包含聊天内容或任何其他个人数据。
  es: Las facturas, notas de crédito y entradas de registros de cumplimiento financiero se conservan hasta 10 años según el RGPD Art. 17(3)(b) — obligación legal (ley fiscal y comercial alemana, AO §147 y HGB §257). Los registros conservados contienen solo metadatos de la transacción, un número de factura y un identificador de usuario; no contienen el contenido del chat ni ningún otro dato personal.
  fr: "Les factures, avoirs et entrées de journaux de conformité financière sont conservés jusqu'à 10 ans en vertu de l'article 17(3)(b) du RGPD — obligation légale (droit fiscal et commercial allemand, AO §147 et HGB §257). Les dossiers conservés ne contiennent que des métadonnées de transaction, un numéro de facture et un identifiant d'utilisateur — pas le contenu des discussions ni aucune autre donnée personnelle."
  pt: Faturas, notas de crédito e entradas de registos de conformidade financeira são retidos por até 10 anos ao abrigo do Art. 17(3)(b) do RGPD — obrigação legal (lei fiscal e comercial alemã, AO §147 e HGB §257). Os registos retidos contêm apenas metadados de transação, um número de fatura e um identificador de utilizador — não o conteúdo do chat ou quaisquer outros dados pessoais.
  ru: Счета-фактуры, кредит-ноты и записи журналов финансового соответствия хранятся до 10 лет в соответствии со ст. 17(3)(b) GDPR — юридическое обязательство (налоговое и коммерческое право Германии, AO §147 и HGB §257). Сохранённые записи содержат только метаданные транзакций, номер счета и идентификатор пользователя — но не содержимое чатов или любые другие персональные данные.
  ja: 請求書、クレジットノート、および財務コンプライアンスログのエントリは、GDPR 第17条(3)(b)（法的義務：ドイツの税法および商法、AO §147 および HGB §257）に基づき、最大10年間保持されます。保持される記録には、取引メタデータ、請求書番号、ユーザー識別子のみが含まれ、チャットの内容やその他の個人データは含まれません。
  ko: 송장, 신용 전표 및 재무 준수 로그 항목은 GDPR 제17조 제3항 (b)호 — 법적 의무(독일 세법 및 상법, AO §147 및 HGB §257)에 따라 최대 10년 동안 보관됩니다. 보관된 기록에는 거래 메타데이터, 송장 번호 및 사용자 식별자만 포함되며, 채팅 내용이나 기타 개인 데이터는 포함되지 않습니다.
  it: "Fatture, note di credito e voci dei log di conformità finanziaria vengono conservati per un massimo di 10 anni ai sensi dell'Art. 17(3)(b) del GDPR — obbligo legale (legge fiscale e commerciale tedesca, AO §147 e HGB §257). I record conservati contengono solo metadati delle transazioni, un numero di fattura e un identificativo utente — non il contenuto delle chat o altri dati personali."
  tr: Faturalar, alacak dekontları ve finansal uyumluluk günlüğü girişleri, GDPR Madde 17(3)(b) — yasal yükümlülük (Alman vergi ve ticaret hukuku, AO §147 ve HGB §257) uyarınca 10 yıla kadar saklanır. Saklanan kayıtlar yalnızca işlem meta verilerini, fatura numarasını ve kullanıcı tanımlayıcısını içerir; sohbet içeriğini veya diğer kişisel verileri içermez.
  vi: Hóa đơn, chứng từ ghi có và các mục nhật ký tuân thủ tài chính được lưu giữ tối đa 10 năm theo GDPR Điều 17(3)(b) — nghĩa vụ pháp lý (luật thuế và thương mại của Đức, AO §147 và HGB §257). Các hồ sơ được lưu giữ chỉ chứa siêu dữ liệu giao dịch, số hóa đơn và mã định danh người dùng — không chứa nội dung trò chuyện hoặc bất kỳ dữ liệu cá nhân nào khác.
  id: Faktur, nota kredit, dan entri log kepatuhan keuangan disimpan hingga 10 tahun berdasarkan GDPR Pasal 17(3)(b) — kewajiban hukum (hukum pajak dan komersial Jerman, AO §147 dan HGB §257). Catatan yang disimpan hanya berisi metadata transaksi, nomor faktur, dan pengenal pengguna — bukan konten obrolan atau data pribadi lainnya.
  pl: Faktury, noty kredytowe i wpisy w logach zgodności finansowej są przechowywane przez okres do 10 lat na podstawie art. 17 ust. 3 lit. b RODO — obowiązek prawny (niemieckie prawo podatkowe i handlowe, AO §147 i HGB §257). Przechowywana dokumentacja zawiera wyłącznie metadane transakcji, numer faktury i identyfikator użytkownika — nie zawiera treści czatów ani żadnych innych danych osobowych.
  nl: "Facturen, creditnota's en vermeldingen in financiële nalevingslogs worden tot 10 jaar bewaard onder AVG Art. 17(3)(b) — wettelijke verplichting (Duitse belasting- en handelswetgeving, AO §147 en HGB §257). De bewaarde gegevens bevatten alleen transactiemetadata, een factuurnummer en een gebruikers-ID — geen chatinhoud of andere persoonlijke gegevens."
  ar: يتم الاحتفاظ بالفواتير، والإشعارات الدائنة، ومدخلات سجل الامتثال المالي لمدة تصل إلى 10 سنوات بموجب المادة 17(3)(ب) من اللائحة العامة لحماية البيانات (GDPR) — التزام قانوني (قانون الضرائب والتجارة الألماني، AO §147 وHGB §257). تحتوي السجلات المحتفظ بها فقط على البيانات الوصفية للمعاملة، ورقم الفاتورة، ومعرف المستخدم — وليس محتوى الدردشة أو أي بيانات شخصية أخرى.
  hi: इनवॉइस, क्रेडिट नोट्स और वित्तीय अनुपालन लॉग प्रविष्टियों को GDPR Art. 17(3)(b) — कानूनी दायित्व (जर्मन टैक्स और वाणिज्यिक कानून, AO §147 और HGB §257) के तहत 10 साल तक रखा जाता है। रखे गए रिकॉर्ड में केवल ट्रांजेक्शन मेटाडेटा, एक इनवॉइस नंबर और एक यूजर आईडी होती है — चैट कंटेंट या कोई अन्य व्यक्तिगत डेटा नहीं।
  th: ใบแจ้งหนี้ ใบลดหนี้ และรายการบันทึกการปฏิบัติตามข้อกำหนดทางการเงินจะถูกเก็บรักษาไว้สูงสุด 10 ปีตาม GDPR มาตรา 17(3)(b) — ภาระผูกพันทางกฎหมาย (กฎหมายภาษีและพาณิชย์ของเยอรมนี AO §147 และ HGB §257) บันทึกที่เก็บรักษาไว้จะมีเพียงข้อมูลเมตาของธุรกรรม เลขที่ใบแจ้งหนี้ และตัวระบุผู้ใช้เท่านั้น — ไม่รวมเนื้อหาการแชทหรือข้อมูลส่วนบุคคลอื่นใด
  cs: Faktury, dobropisy a záznamy v protokolech o finančním souladu jsou uchovávány po dobu až 10 let podle čl. 17 odst. 3 písm. b) GDPR – právní povinnost (německé daňové a obchodní právo, AO §147 a HGB §257). Uchovávané záznamy obsahují pouze metadata transakcí, číslo faktury a identifikátor uživatele – nikoli obsah chatu ani žádné jiné osobní údaje.
  sv: Fakturor, kreditnotor och loggposter för finansiell efterlevnad sparas i upp till 10 år enligt GDPR art. 17(3)(b) – rättslig förpliktelse (tysk skatte- och handelslagstiftning, AO §147 och HGB §257). De sparade posterna innehåller endast transaktionsmetadata, ett fakturanummer och en användaridentifierare – inte chattinnehåll eller andra personuppgifter.
  he: "חשבוניות, זיכויים ורישומי יומן ציות פיננסי נשמרים למשך עד 10 שנים תחת GDPR Art. 17(3)(b) — חובה משפטית (חוק המס והמסחר הגרמני, AO §147 ו-HGB §257). הרשומות שנשמרות מכילות רק מטא-דאטה של עסקאות, מספר חשבונית ומזהה משתמש — לא תוכן צ'אט או כל נתון אישי אחר."
  verified_by_human: []
