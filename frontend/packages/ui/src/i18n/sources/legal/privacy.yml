legal_basis.contract:
  context: Contract legal basis
  en: "Contract: Processing necessary to perform our contract with you or to take steps at your request prior to entering into a contract (e.g., account creation, delivering web app features)."
  de: "Vertrag: Verarbeitung, die zur Erfüllung unseres Vertrags mit Ihnen oder zur Durchführung vorvertraglicher Maßnahmen auf Ihre Anfrage hin erforderlich ist (z. B. Kontoerstellung, Bereitstellung von Web-App-Funktionen)."
  zh: "合同：为履行我们与您的合同或在签订合同前根据您的要求采取步骤所必需的处理（例如，账户创建、提供网络应用功能）。"
  es: "Contrato: Procesamiento necesario para ejecutar nuestro contrato con usted o para tomar medidas a su solicitud antes de celebrar un contrato (por ejemplo, creación de cuenta, entrega de funciones de la aplicación web)."
  fr: "Contrat : Traitement nécessaire à l'exécution de notre contrat avec vous ou pour prendre des mesures à votre demande avant la conclusion d'un contrat (p. ex., création de compte, fourniture des fonctionnalités de l'application web)."
  pt: "Contrato: Processamento necessário para cumprir nosso contrato com você ou para tomar medidas a seu pedido antes de celebrar um contrato (por exemplo, criação de conta, entrega de recursos do aplicativo web)."
  ru: "Договор: Обработка, необходимая для исполнения нашего договора с вами или для принятия мер по вашему запросу до заключения договора (например, создание учётной записи, предоставление функций веб-приложения)."
  ja: "契約：お客様との契約を履行するため、またはお客様のご要望に応じて契約締結前に必要な手続きを行うための処理（例：アカウント作成、ウェブアプリ機能の提供）。"
  ko: "계약: 귀하와의 계약 이행 또는 계약 체결 전 귀하의 요청에 따른 조치를 취하기 위해 필요한 처리 (예: 계정 생성, 웹 앱 기능 제공)."
  it: "Contratto: Elaborazione necessaria per eseguire il nostro contratto con te o per adottare misure su tua richiesta prima di concludere un contratto (ad es., creazione account, fornitura delle funzionalità dell'app web)."
  tr: "Sözleşme: Sizinle aramızdaki sözleşmeyi yerine getirmek veya bir sözleşme imzalanmadan önce talebiniz üzerine adım atmak için gerekli işlem (ör. hesap oluşturma, web uygulaması özelliklerinin sunulması)."
  vi: "Hợp đồng: Xử lý cần thiết để thực hiện hợp đồng của chúng tôi với bạn hoặc để thực hiện các bước theo yêu cầu của bạn trước khi ký hợp đồng (ví dụ: tạo tài khoản, cung cấp các tính năng ứng dụng web)."
  id: "Kontrak: Pemrosesan yang diperlukan untuk melaksanakan kontrak kami dengan Anda atau untuk mengambil langkah-langkah atas permintaan Anda sebelum membuat kontrak (misalnya, pembuatan akun, pengiriman fitur aplikasi web)."
  pl: "Umowa: Przetwarzanie niezbędne do wykonania naszej umowy z Tobą lub do podjęcia kroków na Twoje żądanie przed zawarciem umowy (np. tworzenie konta, dostarczanie funkcji aplikacji internetowej)."
  nl: "Contract: Verwerking die noodzakelijk is voor de uitvoering van onze overeenkomst met u of om op uw verzoek stappen te ondernemen vóór het sluiten van een overeenkomst (bijv. het aanmaken van een account, het leveren van web-app-functies)."
  ar: "العقد: المعالجة اللازمة لتنفيذ عقدنا معك أو لاتخاذ خطوات بناءً على طلبك قبل إبرام عقد (مثل إنشاء حساب، وتقديم ميزات تطبيق الويب)."
  hi: "अनुबंध: आपके साथ हमारे अनुबंध को पूरा करने या अनुबंध में प्रवेश से पहले आपके अनुरोध पर कदम उठाने के लिए आवश्यक प्रसंस्करण (उदाहरण के लिए, खाता निर्माण, वेब ऐप सुविधाएं प्रदान करना)।"
  th: "สัญญา: การประมวลผลที่จำเป็นเพื่อปฏิบัติตามสัญญาของเรากับคุณหรือเพื่อดำเนินการตามคำขอของคุณก่อนทำสัญญา (เช่น การสร้างบัญชี การส่งมอบฟีเจอร์เว็บแอป)"
  cs: "Smlouva: Zpracování nezbytné ke splnění naší smlouvy s vámi nebo k přijetí kroků na váš požadavek před uzavřením smlouvy (např. vytvoření účtu, poskytování funkcí webové aplikace)."
  sv: "Avtal: Behandling som är nödvändig för att fullgöra vårt avtal med dig eller för att vidta åtgärder på din begäran innan ett avtal ingås (t.ex. kontoskapande, leverans av webbappfunktioner)."
  verified_by_human: []
  he: 'חוזה: עיבוד הנחוץ לביצוע החוזה שלנו איתך או לנקיטת צעדים לפי בקשתך לפני כריתת חוזה.'
legal_basis.consent:
  context: Consent legal basis
  en: "Consent: Processing based on your consent, where applicable (e.g., optional communications, certain analytics or marketing where used). You can withdraw consent at any time."
  de: "Einwilligung: Verarbeitung auf der Grundlage Ihrer Einwilligung, soweit zutreffend (z. B. optionale Kommunikation, bestimmte Analysen oder Marketing). Sie können Ihre Einwilligung jederzeit widerrufen."
  zh: "同意：在适用情况下基于您同意的处理（例如，可选通讯、某些分析或营销）。您可以随时撤回同意。"
  es: "Consentimiento: Procesamiento basado en su consentimiento, cuando corresponda (por ejemplo, comunicaciones opcionales, ciertas analíticas o marketing donde se utilicen). Puede retirar el consentimiento en cualquier momento."
  fr: "Consentement : Traitement basé sur votre consentement, le cas échéant (p. ex., communications optionnelles, certaines analyses ou marketing). Vous pouvez retirer votre consentement à tout moment."
  pt: "Consentimento: Processamento baseado no seu consentimento, quando aplicável (por exemplo, comunicações opcionais, certas análises ou marketing onde utilizados). Você pode retirar o consentimento a qualquer momento."
  ru: "Согласие: Обработка на основании вашего согласия, где применимо (например, необязательные сообщения, определённая аналитика или маркетинг). Вы можете отозвать согласие в любое время."
  ja: "同意：該当する場合、お客様の同意に基づく処理（例：任意のコミュニケーション、特定の分析やマーケティング）。同意はいつでも撤回できます。"
  ko: "동의: 해당되는 경우 귀하의 동의를 기반으로 한 처리 (예: 선택적 커뮤니케이션, 특정 분석 또는 마케팅). 동의는 언제든지 철회할 수 있습니다."
  it: "Consenso: Elaborazione basata sul tuo consenso, ove applicabile (ad es., comunicazioni facoltative, determinati analytics o marketing). Puoi revocare il consenso in qualsiasi momento."
  tr: "Onay: Geçerli olduğu durumlarda onayınıza dayalı işlem (örn. isteğe bağlı iletişimler, kullanıldığı yerlerde belirli analizler veya pazarlama). Onayı istediğiniz zaman geri çekebilirsiniz."
  vi: "Sự đồng ý: Xử lý dựa trên sự đồng ý của bạn, khi có thể áp dụng (ví dụ: truyền thông tùy chọn, một số phân tích hoặc tiếp thị khi sử dụng). Bạn có thể rút lại sự đồng ý bất cứ lúc nào."
  id: "Persetujuan: Pemrosesan berdasarkan persetujuan Anda, jika berlaku (misalnya, komunikasi opsional, analitik atau pemasaran tertentu jika digunakan). Anda dapat menarik persetujuan kapan saja."
  pl: "Zgoda: Przetwarzanie na podstawie Twojej zgody, gdzie ma to zastosowanie (np. opcjonalna komunikacja, określone analizy lub marketing tam, gdzie są stosowane). Możesz wycofać zgodę w dowolnym momencie."
  nl: "Toestemming: Verwerking op basis van uw toestemming, waar van toepassing (bijv. optionele communicatie, bepaalde analyses of marketing waar gebruikt). U kunt toestemming op elk moment intrekken."
  ar: "الموافقة: المعالجة بناءً على موافقتك، حيثما كان ذلك مناسبًا (مثل الاتصالات الاختيارية، وبعض التحليلات أو التسويق حيثما تُستخدم). يمكنك سحب موافقتك في أي وقت."
  hi: "सहमति: जहां लागू हो, आपकी सहमति के आधार पर प्रसंस्करण (उदाहरण के लिए, वैकल्पिक संचार, जहां उपयोग किया जाए वहां कुछ विश्लेषण या मार्केटिंग)। आप किसी भी समय सहमति वापस ले सकते हैं।"
  th: "ความยินยอม: การประมวลผลตามความยินยอมของคุณเมื่อนำไปใช้ได้ (เช่น การสื่อสารแบบเลือกได้ การวิเคราะห์หรือการตลาดบางอย่างเมื่อมีการใช้) คุณสามารถถอนความยินยอมได้ตลอดเวลา"
  cs: "Souhlas: Zpracování na základě vašeho souhlasu, pokud je to relevantní (např. volitelná komunikace, určitá analytika nebo marketing). Souhlas můžete kdykoli odvolat."
  sv: "Samtycke: Behandling baserad på ditt samtycke, där tillämpligt (t.ex. valfri kommunikation, viss analys eller marknadsföring där det används). Du kan återkalla samtycket när som helst."
  verified_by_human: []
  he: 'הסכמה: עיבוד המבוסס על הסכמתך, כאשר רלוונטי (למשל, תקשורת אופציונלית, שימושים מסוימים בנתונים).'
legal_basis.legitimate_interests:
  context: Legitimate interests legal basis
  en: "Legitimate interests: Processing necessary for our legitimate interests, such as service security, fraud prevention, abuse detection, and improving the service, provided these interests are not overridden by your rights and interests."
  de: "Berechtigte Interessen: Verarbeitung, die für unsere berechtigten Interessen erforderlich ist, wie Dienstsicherheit, Betrugsprävention, Missbrauchserkennung und Serviceverbesserung, sofern diese Interessen nicht Ihre Rechte und Interessen überwiegen."
  zh: "合法利益：为我们的合法利益（如服务安全、欺诈预防、滥用检测和改善服务）所必需的处理，前提是这些利益不被您的权利和利益所凌驾。"
  es: "Intereses legítimos: Procesamiento necesario para nuestros intereses legítimos, como la seguridad del servicio, la prevención del fraude, la detección de abusos y la mejora del servicio, siempre que estos intereses no sean anulados por sus derechos e intereses."
  fr: "Intérêts légitimes : Traitement nécessaire à nos intérêts légitimes, tels que la sécurité du service, la prévention de la fraude, la détection des abus et l'amélioration du service, à condition que ces intérêts ne l'emportent pas sur vos droits et intérêts."
  pt: "Interesses legítimos: Processamento necessário para nossos interesses legítimos, como segurança do serviço, prevenção de fraudes, detecção de abusos e melhoria do serviço, desde que esses interesses não sejam sobrepujados pelos seus direitos e interesses."
  ru: "Законные интересы: Обработка, необходимая для наших законных интересов, таких как безопасность сервиса, предотвращение мошенничества, обнаружение злоупотреблений и улучшение сервиса, при условии что эти интересы не преобладают над вашими правами и интересами."
  ja: "正当な利益：サービスのセキュリティ、詐欺防止、不正使用の検出、サービスの改善など、当社の正当な利益のために必要な処理。ただし、これらの利益がお客様の権利および利益に優先しない場合に限ります。"
  ko: "정당한 이익: 서비스 보안, 사기 방지, 악용 탐지, 서비스 개선 등 당사의 정당한 이익을 위해 필요한 처리. 단, 이러한 이익이 귀하의 권리와 이익에 의해 무효화되지 않는 경우에 한합니다."
  it: "Interessi legittimi: Elaborazione necessaria per i nostri interessi legittimi, come la sicurezza del servizio, la prevenzione delle frodi, il rilevamento degli abusi e il miglioramento del servizio, a condizione che tali interessi non siano prevalenti rispetto ai tuoi diritti e interessi."
  tr: "Meşru menfaatler: Hizmet güvenliği, dolandırıcılığı önleme, kötüye kullanımı tespit etme ve hizmeti geliştirme gibi meşru menfaatlerimiz için gerekli işlemler. Bu menfaatler, haklarınız ve çıkarlarınız tarafından geçersiz kılınmadığı sürece geçerlidir."
  vi: "Lợi ích hợp pháp: Xử lý cần thiết cho các lợi ích hợp pháp của chúng tôi, chẳng hạn như bảo mật dịch vụ, ngăn chặn gian lận, phát hiện lạm dụng và cải thiện dịch vụ, miễn là các lợi ích này không bị ghi đè bởi quyền và lợi ích của bạn."
  id: "Kepentingan sah: Pemrosesan yang diperlukan untuk kepentingan sah kami, seperti keamanan layanan, pencegahan penipuan, deteksi penyalahgunaan, dan peningkatan layanan, asalkan kepentingan ini tidak dikalahkan oleh hak dan kepentingan Anda."
  pl: "Uzasadnione interesy: Przetwarzanie niezbędne dla naszych uzasadnionych interesów, takich jak bezpieczeństwo usługi, zapobieganie oszustwom, wykrywanie nadużyć i ulepszanie usługi, pod warunkiem że interesy te nie są nadrzędne wobec Twoich praw i interesów."
  nl: "Gerechtvaardigde belangen: Verwerking die noodzakelijk is voor onze gerechtvaardigde belangen, zoals de veiligheid van de dienst, fraudepreventie, misbruikdetectie en verbetering van de dienst, mits deze belangen niet worden overschreden door uw rechten en belangen."
  ar: "المصالح المشروعة: المعالجة اللازمة لمصالحنا المشروعة، كأمن الخدمة، ومنع الاحتيال، واكتشاف الإساءة، وتحسين الخدمة، شريطة ألا تطغى هذه المصالح على حقوقك ومصالحك."
  hi: "वैध हित: हमारे वैध हितों के लिए आवश्यक प्रसंस्करण, जैसे सेवा सुरक्षा, धोखाधड़ी की रोकथाम, दुरुपयोग का पता लगाना और सेवा में सुधार, बशर्ते ये हित आपके अधिकारों और हितों से अधिरोहित न हों।"
  th: "ผลประโยชน์ที่ชอบด้วยกฎหมาย: การประมวลผลที่จำเป็นสำหรับผลประโยชน์ที่ชอบด้วยกฎหมายของเรา เช่น ความปลอดภัยของบริการ การป้องกันการฉ้อโกง การตรวจจับการละเมิด และการปรับปรุงบริการ โดยมีเงื่อนไขว่าผลประโยชน์เหล่านี้ไม่ได้ถูกเอาชนะโดยสิทธิ์และผลประโยชน์ของคุณ"
  cs: "Oprávněné zájmy: Zpracování nezbytné pro naše oprávněné zájmy, jako je bezpečnost služby, prevence podvodů, detekce zneužití a zlepšování služby, za předpokladu, že tyto zájmy nepřevažují nad vašimi právy a zájmy."
  sv: "Berättigade intressen: Behandling som är nödvändig för våra berättigade intressen, såsom tjänstesäkerhet, bedrägeriförebyggande, missbruks­detektion och förbättring av tjänsten, förutsatt att dessa intressen inte åsidosätts av dina rättigheter och intressen."
  verified_by_human: []
  he: 'אינטרסים לגיטימיים: עיבוד הנחוץ לאינטרסים הלגיטימיים שלנו, כגון אבטחת שירות, מניעת הונאה ושיפור המוצר.'
legal_basis.legal_obligation:
  context: Legal obligation basis
  en: "Legal obligation: Processing necessary to comply with legal obligations (e.g., tax and accounting requirements for invoices and transaction records)."
  de: "Rechtliche Verpflichtung: Verarbeitung, die zur Erfüllung gesetzlicher Pflichten erforderlich ist (z. B. steuerliche und buchhalterische Anforderungen für Rechnungen und Transaktionsaufzeichnungen)."
  zh: "法律义务：为遵守法律义务而必需的处理（例如，发票和交易记录的税务和会计要求）。"
  es: "Obligación legal: Procesamiento necesario para cumplir con obligaciones legales (por ejemplo, requisitos fiscales y contables para facturas y registros de transacciones)."
  fr: "Obligation légale : Traitement nécessaire au respect des obligations légales (p. ex., exigences fiscales et comptables pour les factures et les enregistrements de transactions)."
  pt: "Obrigação legal: Processamento necessário para cumprir obrigações legais (por exemplo, requisitos fiscais e contábeis para faturas e registros de transações)."
  ru: "Юридическое обязательство: Обработка, необходимая для соблюдения правовых обязательств (например, налоговые и бухгалтерские требования для счетов и записей о транзакциях)."
  ja: "法的義務：法的義務の遵守に必要な処理（例：請求書および取引記録に関する税務・会計要件）。"
  ko: "법적 의무: 법적 의무를 준수하기 위해 필요한 처리 (예: 청구서 및 거래 기록에 대한 세금 및 회계 요건)."
  it: "Obbligo legale: Elaborazione necessaria per adempiere agli obblighi legali (ad es., requisiti fiscali e contabili per fatture e registrazioni delle transazioni)."
  tr: "Yasal yükümlülük: Yasal yükümlülüklere uymak için gerekli işlem (örn. faturalar ve işlem kayıtları için vergi ve muhasebe gereksinimleri)."
  vi: "Nghĩa vụ pháp lý: Xử lý cần thiết để tuân thủ các nghĩa vụ pháp lý (ví dụ: yêu cầu thuế và kế toán đối với hóa đơn và hồ sơ giao dịch)."
  id: "Kewajiban hukum: Pemrosesan yang diperlukan untuk mematuhi kewajiban hukum (misalnya, persyaratan pajak dan akuntansi untuk faktur dan catatan transaksi)."
  pl: "Obowiązek prawny: Przetwarzanie niezbędne do wypełnienia zobowiązań prawnych (np. wymogi podatkowe i księgowe dotyczące faktur i rejestrów transakcji)."
  nl: "Wettelijke verplichting: Verwerking die noodzakelijk is om te voldoen aan wettelijke verplichtingen (bijv. fiscale en boekhoudkundige vereisten voor facturen en transactiegegevens)."
  ar: "الالتزام القانوني: المعالجة اللازمة للامتثال للالتزامات القانونية (مثل متطلبات الضرائب والمحاسبة للفواتير وسجلات المعاملات)."
  hi: "कानूनी दायित्व: कानूनी दायित्वों का पालन करने के लिए आवश्यक प्रसंस्करण (उदाहरण के लिए, चालान और लेनदेन रिकॉर्ड के लिए कर और लेखांकन आवश्यकताएं)।"
  th: "ภาระผูกพันทางกฎหมาย: การประมวลผลที่จำเป็นเพื่อปฏิบัติตามภาระผูกพันทางกฎหมาย (เช่น ข้อกำหนดด้านภาษีและการบัญชีสำหรับใบแจ้งหนี้และบันทึกธุรกรรม)"
  cs: "Právní povinnost: Zpracování nezbytné ke splnění zákonných povinností (např. daňové a účetní požadavky pro faktury a záznamy o transakcích)."
  sv: "Rättslig förpliktelse: Behandling som är nödvändig för att uppfylla rättsliga förpliktelser (t.ex. skatte- och redovisningskrav för fakturor och transaktionsregister)."
  verified_by_human: []
  he: 'התחייבות משפטית: עיבוד הנחוץ לציות להתחייבויות משפטיות (למשל, דרישות מס וחשבונאות).'
