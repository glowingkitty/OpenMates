providers.ai_models.mistral.description:
  context: Mistral description
  en: >-
    Mistral hosts its own family of models in the EU. Only used when you
    select a Mistral model. Mistral receives your chat messages with PII
    placeholders already substituted client-side.
  de: Mistral hostet seine eigene Modellfamilie in der EU. Wird nur verwendet, wenn du ein Mistral-Modell auswählst. Mistral erhält deine Chat-Nachrichten, wobei PII-Platzhalter bereits clientseitig ersetzt wurden.
  zh: Mistral 在欧盟境内托管其自有的系列模型。仅在你选择 Mistral 模型时使用。Mistral 接收的聊天消息中，PII 占位符已在客户端完成替换。
  es: Mistral aloja su propia familia de modelos en la UE. Solo se utiliza cuando seleccionas un modelo de Mistral. Mistral recibe tus mensajes de chat con los marcadores de posición de PII ya sustituidos en el lado del cliente.
  ru: Mistral размещает собственное семейство моделей в ЕС. Используется только при выборе модели Mistral. Mistral получает твои сообщения чата с плейсхолдерами персональных данных, уже замененными на стороне клиента.
  ja: Mistralは、EU内で独自のモデルファミリーをホストしています。Mistralモデルを選択した場合にのみ使用されます。Mistralは、クライアント側ですでにPIIプレースホルダーに置換されたチャットメッセージを受信します。
  ko: Mistral은 EU 내에서 자체 모델 제품군을 호스팅합니다. Mistral 모델을 선택한 경우에만 사용됩니다. Mistral은 클라이언트 측에서 이미 PII가 자리 표시자로 대체된 채팅 메시지를 수신합니다.
  it: "Mistral ospita la propria famiglia di modelli nell'UE. Utilizzato solo quando selezioni un modello Mistral. Mistral riceve i tuoi messaggi di chat con i segnaposto PII già sostituiti lato client."
  tr: "Mistral, kendi model ailesini AB'de barındırır. Yalnızca bir Mistral modeli seçtiğinde kullanılır. Mistral, sohbet mesajlarını istemci tarafında zaten yer tutucularla değiştirilmiş kişisel verilerle (PII) birlikte alır."
  vi: Mistral lưu trữ dòng mô hình riêng của họ tại EU. Chỉ được sử dụng khi bạn chọn một mô hình Mistral. Mistral nhận các tin nhắn trò chuyện của bạn với các trình giữ chỗ PII đã được thay thế từ phía máy khách.
  id: Mistral menghosting keluarga modelnya sendiri di UE. Hanya digunakan saat kamu memilih model Mistral. Mistral menerima pesan obrolanmu dengan placeholder PII yang sudah disubstitusi di sisi klien.
  pl: Mistral hostuje własną rodzinę modeli w UE. Używany tylko po wybraniu modelu Mistral. Mistral otrzymuje Twoje wiadomości czatu z danymi osobowymi zastąpionymi symbolami zastępczymi już po stronie klienta.
  nl: Mistral host zijn eigen modelfamilie in de EU. Wordt alleen gebruikt wanneer je een Mistral-model selecteert. Mistral ontvangt je chatberichten waarbij PII-placeholders al aan de clientzijde zijn vervangen.
  ar: تستضيف Mistral عائلتها الخاصة من النماذج في الاتحاد الأوروبي. تُستخدم فقط عندما تختار نموذج Mistral. تتلقى Mistral رسائل الدردشة الخاصة بك مع استبدال العناصر النائبة لبيانات الهوية الشخصية بالفعل من جهة العميل.
  hi: Mistral यूरोपीय संघ (EU) में अपने स्वयं के मॉडलों की श्रृंखला को होस्ट करता है। इसका उपयोग केवल तब किया जाता है जब तुम Mistral मॉडल चुनते हो। Mistral को तुम्हारे चैट संदेश मिलते हैं जिनमें PII प्लेसहोल्डर्स पहले से ही क्लाइंट-साइड पर बदल दिए गए होते हैं।
  th: Mistral โฮสต์โมเดลตระกูลของตนเองในสหภาพยุโรป จะถูกใช้เมื่อคุณเลือกโมเดล Mistral เท่านั้น Mistral จะได้รับข้อความแชทของคุณที่ถูกแทนที่ข้อมูลส่วนบุคคลด้วยตัวสำรองข้อมูลจากฝั่งไคลเอนต์แล้ว
  cs: Mistral hostuje svou vlastní rodinu modelů v EU. Používá se pouze tehdy, když vybereš model Mistral. Mistral přijímá tvé zprávy chatu se zástupnými symboly pro osobní údaje, které byly nahrazeny již na straně klienta.
  sv: Mistral är värd för sin egen familj av modeller inom EU. Används endast när du väljer en Mistral-modell. Mistral tar emot dina chattmeddelanden med PII-platshållare som redan ersatts på klientsidan.
  he: "Mistral מארחת את משפחת המודלים שלה בתוך האיחוד האירופי. בשימוש רק כשאתה בוחר במודל של Mistral. Mistral מקבלת את הודעות הצ'אט שלך כשפרטי הזיהוי האישיים כבר הוחלפו בממלאי מקום בצד הלקוח."
  fr: "Mistral héberge sa propre famille de modèles dans l'UE. Utilisé uniquement lorsque tu sélectionnes un modèle Mistral. Mistral reçoit tes messages de chat avec les espaces réservés PII déjà substitués côté client."
  pt: A Mistral hospeda a sua própria família de modelos na UE. Usado apenas quando selecionas um modelo Mistral. A Mistral recebe as tuas mensagens de chat com marcadores de PII já substituídos no lado do cliente.
  verified_by_human: []
