  pl: 'Aby przetworzyć Twoje żądania, OpenMates wysyła Twoje prompty i dane do zewnętrznych dostawców usług AI (jak szczegółowo opisano w naszej Polityce Prywatności). Chociaż ci dostawcy twierdzą, że nie trenują modeli na danych użytkowników, nie możemy niezależnie zweryfikować tych twierdzeń. Dlatego zdecydowanie odradzamy przesyłanie wysoce wrażliwych danych osobowych, finansowych, medycznych lub poufnych do OpenMates. Prosimy o rozważenie potencjalnych konsekwencji przed udostępnieniem wrażliwych danych. Jesteśmy zaangażowani w prywatność, ale nie możemy zagwarantować, w jaki sposób zewnętrzni partnerzy przetwarzają Twoje dane.'
  nl: 'Om uw verzoeken te verwerken, stuurt OpenMates uw prompts en gegevens naar externe AI-serviceproviders (zoals beschreven in ons Privacybeleid). Hoewel deze providers beweren dat ze geen modellen trainen op gebruikersgegevens, kunnen we deze beweringen niet onafhankelijk verifiëren. Daarom raden we u ten zeerste aan om geen zeer gevoelige persoonlijke, financiële, medische of vertrouwelijke informatie naar OpenMates te sturen. Overweeg alstublieft de mogelijke gevolgen voordat u gevoelige gegevens deelt. We zijn toegewijd aan privacy, maar we kunnen niet garanderen hoe externe partners uw gegevens verwerken.'
  ar: 'لمعالجة طلباتك، يرسل OpenMates مطالباتك وبياناتك إلى مزودي خدمات الذكاء الاصطناعي من الأطراف الثالثة (كما هو مفصل في سياسة الخصوصية الخاصة بنا). على الرغم من أن هؤلاء المزودين يدعون أنهم لا يدربون النماذج على بيانات المستخدمين، لا يمكننا التحقق من ذلك بشكل مستقل. لذلك، ننصح بشدة بعدم إرسال معلومات شخصية أو مالية أو طبية أو سرية حساسة إلى OpenMates. يرجى النظر في العواقب المحتملة قبل مشاركة البيانات الحساسة. نحن ملتزمون بالخصوصية لكننا لا نستطيع ضمان كيفية معالجة الشركاء الخارجيين لبياناتك.'
  hi: 'आपके अनुरोधों को संसाधित करने के लिए, OpenMates आपके प्रॉम्प्ट और डेटा को तृतीय-पक्ष AI सेवा प्रदाताओं को भेजता है (जैसा कि हमारी गोपनीयता नीति में विस्तृत है)। हालांकि ये प्रदाता दावा करते हैं कि वे उपयोगकर्ता डेटा पर मॉडल प्रशिक्षित नहीं करते हैं, हम इन दावों को स्वतंत्र रूप से सत्यापित नहीं कर सकते। इसलिए, हम अत्यधिक संवेदनशील व्यक्तिगत, वित्तीय, चिकित्सा या गोपनीय जानकारी OpenMates को भेजने के खिलाफ दृढ़ता से सलाह देते हैं। संवेदनशील डेटा साझा करने से पहले संभावित परिणामों पर विचार करें। हम गोपनीयता के प्रति प्रतिबद्ध हैं लेकिन गारंटी नहीं दे सकते कि बाहरी साझेदार आपके डेटा को कैसे संसाधित करते हैं।'
  th: 'เพื่อประมวลผลคำขอของคุณ OpenMates ส่งคำขอและข้อมูลของคุณไปยังผู้ให้บริการ AI ของบุคคลที่สาม (ตามที่ระบุไว้ในนโยบายความเป็นส่วนตัวของเรา) แม้ว่าผู้ให้บริการเหล่านี้จะอ้างว่าพวกเขาไม่ฝึกโมเดลด้วยข้อมูลผู้ใช้ แต่เราไม่สามารถตรวจสอบข้อเรียกร้องเหล่านี้ได้อย่างอิสระ ดังนั้นเราขอแนะนำอย่างยิ่งให้ไม่ส่งข้อมูลส่วนบุคคลทางการเงินทางการแพทย์หรือข้อมูลที่เป็นความลับที่มีความละเอียดอ่อนสูงไปยัง OpenMates โปรดพิจารณาผลที่ตามมาก่อนแชร์ข้อมูลที่ละเอียดอ่อน เรามุ่งมั่นในความเป็นส่วนตัวแต่ไม่สามารถรับประกันได้ว่าคู่ค้าภายนอกจะประมวลผลข้อมูลของคุณอย่างไร'
  cs: 'Pro zpracování vašich požadavků OpenMates odesílá vaše dotazy a data poskytovatelům služeb AI třetích stran (jak je podrobně popsáno v našich Zásadách ochrany osobních údajů). I když tito poskytovatelé tvrdí, že netrénují modely na uživatelských datech, nemůžeme tyto tvrzení nezávisle ověřit. Proto důrazně doporučujeme neodesílat vysoce citlivé osobní, finanční, lékařské nebo důvěrné informace do OpenMates. Před sdílením citlivých údajů zvažte možné důsledky. Jsme oddáni soukromí, ale nemůžeme zaručit, jak externí partneři zpracovávají vaše data.'
  sv: 'För att bearbeta dina förfrågningar skickar OpenMates dina prompts och data till tredjepartsleverantörer av AI-tjänster (som beskrivs i vår integritetspolicy). Även om dessa leverantörer hävdar att de inte tränar modeller på användardata kan vi inte oberoende verifiera dessa påståenden. Därför rekommenderar vi starkt att inte skicka mycket känslig personlig, finansiell, medicinsk eller konfidentiell information till OpenMates. Överväg potentiella konsekvenser innan du delar känsliga data. Vi är engagerade i integritet men kan inte garantera hur externa partners bearbetar dina data.'
  verified_by_human: []
  he: לעיבוד בקשותיך, OpenMates שולחת את ההנחיות והנתונים שלך לספקי שירותי AI של צד שלישי (כמפורט במדיניות הפרטיות שלנו). בעוד שספקים אלו טוענים שאינם מאמנים מודלים על נתוני משתמשים, איננו יכולים לאמת טענות אלו באופן עצמאי. לכן, אנו ממליצים בחוזקה לא להגיש מידע אישי, פיננסי, רפואי או סודי רגיש ביותר ל-OpenMates. אנא שקול את ההשלכות האפשריות לפני שיתוף נתונים רגישים. אנו מחויבים לפרטיות ותכננו את OpenMates תוך התחשבות בפרטיות, אך איננו יכולים להבטיח כיצד שותפים חיצוניים מעבדים את הנתונים שלך.
