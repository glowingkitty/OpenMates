service_availability.description:
  context: Service availability explanation
  en: We aim to provide reliable and fast access to OpenMates. However, we do not guarantee specific uptime percentages. Our focus is on scaling sustainably to serve all users effectively. The service may experience interruptions for maintenance, updates, or due to technical issues beyond our control.
  de: 'Wir streben danach, einen zuverlässigen und schnellen Zugang zu OpenMates zu bieten. Wir garantieren jedoch keine bestimmten Uptime-Prozentsätze. Unser Fokus liegt auf nachhaltigem Wachstum, um alle Nutzer effektiv zu bedienen. Der Dienst kann für Wartungsarbeiten, Updates oder aufgrund technischer Probleme außerhalb unserer Kontrolle unterbrochen werden.'
  zh: '我们旨在提供可靠且快速的 OpenMates 访问。但是，我们不保证特定的正常运行时间百分比。我们的重点是可持续扩展，以有效服务所有用户。该服务可能因维护、更新或超出我们控制范围的技术问题而中断。'
  es: 'Nuestro objetivo es proporcionar acceso confiable y rápido a OpenMates. Sin embargo, no garantizamos porcentajes específicos de tiempo de actividad. Nuestro enfoque está en escalar de forma sostenible para servir a todos los usuarios de manera efectiva. El servicio puede experimentar interrupciones por mantenimiento, actualizaciones o debido a problemas técnicos fuera de nuestro control.'
  fr: 'Nous visons à fournir un accès fiable et rapide à OpenMates. Cependant, nous ne garantissons pas des pourcentages de disponibilité spécifiques. Notre objectif est de nous développer de manière durable pour servir efficacement tous les utilisateurs. Le service peut connaître des interruptions pour maintenance, mises à jour ou en raison de problèmes techniques indépendants de notre volonté.'
  pt: 'Nosso objetivo é fornecer acesso confiável e rápido ao OpenMates. No entanto, não garantimos porcentagens específicas de tempo de atividade. Nosso foco é escalar de forma sustentável para atender a todos os usuários de forma eficaz. O serviço pode sofrer interrupções para manutenção, atualizações ou devido a problemas técnicos fora do nosso controle.'
  ru: 'Мы стремимся обеспечить надёжный и быстрый доступ к OpenMates. Однако мы не гарантируем конкретных показателей доступности. Мы ориентированы на устойчивое масштабирование для эффективного обслуживания всех пользователей. Сервис может испытывать перебои в работе из-за технического обслуживания, обновлений или технических проблем, находящихся вне нашего контроля.'
  ja: 'OpenMatesへの信頼性が高く高速なアクセスを提供することを目指しています。ただし、特定のアップタイムパーセンテージを保証するものではありません。私たちは、すべてのユーザーを効果的にサービスするために持続可能なスケーリングに注力しています。サービスは、メンテナンス、アップデート、または私たちのコントロール外の技術的問題により中断される場合があります。'
  ko: 'OpenMates에 대한 안정적이고 빠른 접근을 제공하는 것을 목표로 합니다. 그러나 특정 가동 시간 비율을 보장하지 않습니다. 모든 사용자를 효과적으로 서비스하기 위해 지속 가능하게 확장하는 것이 우리의 초점입니다. 서비스는 유지 관리, 업데이트 또는 우리의 통제 범위를 벗어난 기술적 문제로 인해 중단될 수 있습니다.'
  it: 'Il nostro obiettivo è fornire un accesso affidabile e veloce a OpenMates. Tuttavia, non garantiamo percentuali specifiche di disponibilità. Il nostro obiettivo è scalare in modo sostenibile per servire efficacemente tutti gli utenti. Il servizio potrebbe subire interruzioni per manutenzione, aggiornamenti o a causa di problemi tecnici al di fuori del nostro controllo.'
  tr: 'OpenMates''e güvenilir ve hızlı erişim sağlamayı hedefliyoruz. Ancak belirli çalışma süresi yüzdelerini garanti etmiyoruz. Odak noktamız, tüm kullanıcılara etkin bir şekilde hizmet vermek için sürdürülebilir bir şekilde ölçeklendirmektir. Hizmet, bakım, güncellemeler veya kontrolümüz dışındaki teknik sorunlar nedeniyle kesintiler yaşayabilir.'
  vi: 'Chúng tôi nhằm cung cấp quyền truy cập đáng tin cậy và nhanh chóng vào OpenMates. Tuy nhiên, chúng tôi không đảm bảo tỷ lệ thời gian hoạt động cụ thể. Trọng tâm của chúng tôi là mở rộng bền vững để phục vụ tất cả người dùng hiệu quả. Dịch vụ có thể bị gián đoạn để bảo trì, cập nhật hoặc do các vấn đề kỹ thuật ngoài tầm kiểm soát của chúng tôi.'
  id: 'Kami bertujuan untuk menyediakan akses yang andal dan cepat ke OpenMates. Namun, kami tidak menjamin persentase waktu aktif tertentu. Fokus kami adalah pada penskalaan yang berkelanjutan untuk melayani semua pengguna secara efektif. Layanan dapat mengalami gangguan untuk pemeliharaan, pembaruan, atau karena masalah teknis di luar kendali kami.'
  pl: 'Staramy się zapewnić niezawodny i szybki dostęp do OpenMates. Nie gwarantujemy jednak konkretnych procentów czasu pracy. Skupiamy się na zrównoważonym skalowaniu, aby skutecznie obsługiwać wszystkich użytkowników. Usługa może ulec przerwaniom ze względu na konserwację, aktualizacje lub problemy techniczne poza naszą kontrolą.'
  nl: 'We streven ernaar betrouwbare en snelle toegang tot OpenMates te bieden. We garanderen echter geen specifieke uptime-percentages. Onze focus ligt op duurzame schaalbaarheid om alle gebruikers effectief te bedienen. De dienst kan onderbrekingen ondervinden voor onderhoud, updates of vanwege technische problemen buiten onze controle.'
  ar: 'نهدف إلى توفير وصول موثوق وسريع إلى OpenMates. ومع ذلك، لا نضمن نسب توفر خدمة محددة. تركيزنا على التوسع المستدام لخدمة جميع المستخدمين بفعالية. قد تتعرض الخدمة لانقطاعات للصيانة أو التحديثات أو بسبب مشاكل تقنية خارجة عن سيطرتنا.'
  hi: 'हम OpenMates तक विश्वसनीय और तेज़ पहुंच प्रदान करने का लक्ष्य रखते हैं। हालांकि, हम विशिष्ट अपटाइम प्रतिशत की गारंटी नहीं देते हैं। हमारा ध्यान सभी उपयोगकर्ताओं को प्रभावी ढंग से सेवा देने के लिए टिकाऊ तरीके से स्केल करने पर है। सेवा रखरखाव, अपडेट या हमारे नियंत्रण से परे तकनीकी समस्याओं के कारण बाधाओं का अनुभव कर सकती है।'
  th: 'เรามุ่งมั่นที่จะให้การเข้าถึง OpenMates ที่เชื่อถือได้และรวดเร็ว อย่างไรก็ตาม เราไม่รับประกันเปอร์เซ็นต์เวลาการทำงานที่ระบุ จุดเน้นของเราคือการขยายขนาดอย่างยั่งยืนเพื่อให้บริการผู้ใช้ทุกคนอย่างมีประสิทธิภาพ บริการอาจประสบการหยุดชะงักเพื่อการบำรุงรักษา การอัปเดต หรือเนื่องจากปัญหาทางเทคนิคที่อยู่นอกเหนือการควบคุมของเรา'
  cs: 'Snažíme se poskytovat spolehlivý a rychlý přístup k OpenMates. Nezaručujeme však konkrétní procenta dostupnosti. Zaměřujeme se na udržitelné škálování pro efektivní obsluhu všech uživatelů. Služba může zaznamenat přerušení kvůli údržbě, aktualizacím nebo z důvodu technických problémů mimo naši kontrolu.'
  sv: 'Vi strävar efter att tillhandahålla tillförlitlig och snabb åtkomst till OpenMates. Vi garanterar dock inte specifika drifttidsprocentandelar. Vår fokus är på hållbar skalning för att betjäna alla användare effektivt. Tjänsten kan uppleva avbrott för underhåll, uppdateringar eller på grund av tekniska problem utanför vår kontroll.'
  verified_by_human: []
  he: אנו שואפים לספק גישה אמינה ומהירה ל-OpenMates. עם זאת, איננו מבטיחים אחוזי זמינות ספציפיים. המיקוד שלנו הוא על הרחבה ברת-קיימא לשרת את כל המשתמשים ביעילות. השירות עשוי לחוות הפרעות לתחזוקה, עדכונים, או עקב בעיות טכניות מחוץ לשליטתנו.
