use_license.description:
  context: License terms explanation
  en: You are granted permission to use OpenMates' cloud-hosted web application, developer API and CLI tool for any lawful purpose, including commercial purposes. This applies to the use of our service, not to the website content itself. The OpenMates software is available under AGPL-3.0 license - you may use, modify, and distribute it according to the license terms. See our [GitHub repository](https://github.com/glowingkitty/OpenMates) for the full license.
  de: 'Die Erlaubnis wird erteilt, vorübergehend auf die Materialien auf unserer Website ausschließlich für persönliche, nicht-kommerzielle Informationszwecke zuzugreifen. Dies ist die Gewährung einer Lizenz, nicht die Übertragung eines Titels, und unter dieser Lizenz dürfen Sie nicht:'
  zh: 仅允许出于个人、非商业信息目的临时访问我们网站上的材料。 这是许可的授予，而不是所有权的转让，根据此许可，您不得：
  es: 'Se otorga permiso para acceder temporalmente a los materiales en nuestro sitio web únicamente con fines informativos personales y no comerciales. Esto es la concesión de una licencia, no la transferencia de un título, y bajo esta licencia no puede:'
  fr: 'Vous êtes autorisé à utiliser l''application web, l''API développeur et l''outil CLI hébergés dans le cloud d''OpenMates à toute fin légale, y compris à des fins commerciales. Cela s''applique à l''utilisation de notre service, pas au contenu du site web lui-même. Le logiciel OpenMates est disponible sous licence AGPL-3.0 - vous pouvez l''utiliser, le modifier et le distribuer selon les termes de la licence. Consultez notre [dépôt GitHub](https://github.com/glowingkitty/OpenMates) pour la licence complète.'
  pt: 'Você tem permissão para usar o aplicativo web, API de desenvolvedor e ferramenta CLI hospedados na nuvem do OpenMates para qualquer finalidade lícita, incluindo fins comerciais. Isso se aplica ao uso de nosso serviço, não ao conteúdo do site em si. O software OpenMates está disponível sob licença AGPL-3.0 - você pode usá-lo, modificá-lo e distribuí-lo de acordo com os termos da licença. Veja nosso [repositório GitHub](https://github.com/glowingkitty/OpenMates) para a licença completa.'
  ru: 'Вам разрешено использовать облачное веб-приложение OpenMates, API для разработчиков и инструмент CLI в любых законных целях, включая коммерческие. Это относится к использованию нашего сервиса, а не к содержимому сайта. Программное обеспечение OpenMates доступно по лицензии AGPL-3.0 — вы можете использовать, изменять и распространять его согласно условиям лицензии. Полная лицензия доступна в нашем [репозитории GitHub](https://github.com/glowingkitty/OpenMates).'
  ja: 個人的、非商業的な情報目的に限り、当ウェブサイト上の資料に一時的にアクセスすることを許可します。これはライセンスの付与であり、権原の譲渡ではありません。このライセンスの下では、以下の行為は禁止されています：
  ko: '귀하는 상업적 목적을 포함한 모든 합법적 목적을 위해 OpenMates의 클라우드 호스팅 웹 애플리케이션, 개발자 API 및 CLI 도구를 사용할 권한이 부여됩니다. 이는 웹사이트 콘텐츠 자체가 아닌 서비스 사용에 적용됩니다. OpenMates 소프트웨어는 AGPL-3.0 라이선스 하에 제공됩니다 - 라이선스 조건에 따라 사용, 수정 및 배포할 수 있습니다. 전체 라이선스는 [GitHub 저장소](https://github.com/glowingkitty/OpenMates)를 참조하세요.'
  it: 'Viene concessa l''autorizzazione di utilizzare l''applicazione web, l''API sviluppatore e lo strumento CLI ospitati nel cloud di OpenMates per qualsiasi scopo lecito, inclusi scopi commerciali. Ciò si applica all''utilizzo del nostro servizio, non al contenuto del sito web stesso. Il software OpenMates è disponibile sotto licenza AGPL-3.0 - è possibile usarlo, modificarlo e distribuirlo secondo i termini della licenza. Vedi il nostro [repository GitHub](https://github.com/glowingkitty/OpenMates) per la licenza completa.'
  tr: 'Ticari amaçlar da dahil olmak üzere herhangi bir yasal amaç için OpenMates''in bulut tabanlı web uygulamasını, geliştirici API''sini ve CLI aracını kullanmanıza izin verilmektedir. Bu, web sitesi içeriğinin kendisi için değil, hizmetimizin kullanımı için geçerlidir. OpenMates yazılımı AGPL-3.0 lisansı altında mevcuttur - lisans koşullarına göre kullanabilir, değiştirebilir ve dağıtabilirsiniz. Tam lisans için [GitHub depomuza](https://github.com/glowingkitty/OpenMates) bakın.'
  vi: 'Bạn được cấp phép sử dụng ứng dụng web được lưu trữ trên đám mây, API dành cho nhà phát triển và công cụ CLI của OpenMates cho bất kỳ mục đích hợp pháp nào, bao gồm mục đích thương mại. Điều này áp dụng cho việc sử dụng dịch vụ của chúng tôi, không phải nội dung trang web. Phần mềm OpenMates có sẵn theo giấy phép AGPL-3.0 - bạn có thể sử dụng, sửa đổi và phân phối theo các điều khoản của giấy phép. Xem [kho lưu trữ GitHub](https://github.com/glowingkitty/OpenMates) của chúng tôi để biết giấy phép đầy đủ.'
  id: 'Anda diberikan izin untuk menggunakan aplikasi web yang dihosting di cloud, API pengembang, dan alat CLI OpenMates untuk tujuan sah apa pun, termasuk tujuan komersial. Ini berlaku untuk penggunaan layanan kami, bukan konten situs web itu sendiri. Perangkat lunak OpenMates tersedia di bawah lisensi AGPL-3.0 - Anda dapat menggunakannya, memodifikasinya, dan mendistribusikannya sesuai ketentuan lisensi. Lihat [repositori GitHub](https://github.com/glowingkitty/OpenMates) kami untuk lisensi lengkap.'
  pl: 'Masz uprawnienie do korzystania z hostowanej w chmurze aplikacji internetowej OpenMates, API dla deweloperów i narzędzia CLI w dowolnym legalnym celu, w tym celach komercyjnych. Dotyczy to korzystania z naszej usługi, a nie samej zawartości strony internetowej. Oprogramowanie OpenMates jest dostępne na licencji AGPL-3.0 - możesz go używać, modyfikować i dystrybuować zgodnie z warunkami licencji. Pełna licencja dostępna jest w naszym [repozytorium GitHub](https://github.com/glowingkitty/OpenMates).'
  nl: 'U krijgt toestemming om de cloud-gehoste webapplicatie, ontwikkelaars-API en CLI-tool van OpenMates te gebruiken voor elk wettig doel, inclusief commerciële doeleinden. Dit is van toepassing op het gebruik van onze service, niet op de website-inhoud zelf. De OpenMates-software is beschikbaar onder AGPL-3.0-licentie - u kunt deze gebruiken, wijzigen en distribueren volgens de licentievoorwaarden. Zie ons [GitHub-repository](https://github.com/glowingkitty/OpenMates) voor de volledige licentie.'
  ar: 'يُمنح الإذن لاستخدام تطبيق OpenMates على الويب المستضاف في السحابة وواجهة برمجة التطبيقات للمطورين وأداة CLI لأي غرض قانوني، بما في ذلك الأغراض التجارية. ينطبق هذا على استخدام خدمتنا، وليس على محتوى الموقع نفسه. برنامج OpenMates متاح بموجب ترخيص AGPL-3.0 - يمكنك استخدامه وتعديله وتوزيعه وفقًا لشروط الترخيص. راجع [مستودع GitHub](https://github.com/glowingkitty/OpenMates) للحصول على الترخيص الكامل.'
  hi: 'आपको किसी भी वैध उद्देश्य के लिए, जिसमें व्यावसायिक उद्देश्य भी शामिल हैं, OpenMates के क्लाउड-होस्टेड वेब एप्लिकेशन, डेवलपर API और CLI टूल का उपयोग करने की अनुमति दी जाती है। यह हमारी सेवा के उपयोग पर लागू होता है, वेबसाइट सामग्री पर नहीं। OpenMates सॉफ्टवेयर AGPL-3.0 लाइसेंस के तहत उपलब्ध है - आप लाइसेंस शर्तों के अनुसार इसका उपयोग, संशोधन और वितरण कर सकते हैं। पूर्ण लाइसेंस के लिए हमारा [GitHub रिपॉजिटरी](https://github.com/glowingkitty/OpenMates) देखें।'
  th: 'คุณได้รับอนุญาตให้ใช้เว็บแอปพลิเคชัน API สำหรับนักพัฒนา และเครื่องมือ CLI ที่โฮสต์บนคลาวด์ของ OpenMates เพื่อวัตถุประสงค์ที่ถูกกฎหมายใดๆ รวมถึงวัตถุประสงค์เชิงพาณิชย์ นี้ใช้กับการใช้บริการของเรา ไม่ใช่เนื้อหาเว็บไซต์เอง ซอฟต์แวร์ OpenMates มีให้ใช้งานภายใต้ลิขสิทธิ์ AGPL-3.0 - คุณสามารถใช้ แก้ไข และแจกจ่ายตามเงื่อนไขของลิขสิทธิ์ ดู[ที่เก็บ GitHub](https://github.com/glowingkitty/OpenMates) สำหรับลิขสิทธิ์ฉบับเต็ม'
  cs: 'Je vám uděleno oprávnění používat cloudově hostovanou webovou aplikaci, API pro vývojáře a nástroj CLI OpenMates pro jakýkoliv zákonný účel, včetně komerčních účelů. To se vztahuje na používání naší služby, nikoli na samotný obsah webu. Software OpenMates je dostupný pod licencí AGPL-3.0 - můžete jej používat, upravovat a distribuovat v souladu s podmínkami licence. Viz náš [repozitář GitHub](https://github.com/glowingkitty/OpenMates) pro úplnou licenci.'
  sv: 'Du beviljas tillstånd att använda OpenMates molnbaserade webbapplikation, utvecklar-API och CLI-verktyg för alla lagliga ändamål, inklusive kommersiella ändamål. Detta gäller för användning av vår tjänst, inte för webbplatsens innehåll i sig. OpenMates-programvaran är tillgänglig under AGPL-3.0-licens - du kan använda, ändra och distribuera den enligt licensvillkoren. Se vårt [GitHub-repository](https://github.com/glowingkitty/OpenMates) för den fullständiga licensen.'
  verified_by_human: []
  he: ניתן לך אישור להשתמש ביישום האינטרנטי המתארח בענן של OpenMates, ב-API לפיתוח ובכלי CLI לכל מטרה חוקית, כולל מטרות מסחריות. הדבר חל על השימוש בשירות שלנו, לא על תוכן האתר עצמו. תוכנת OpenMates זמינה תחת רישיון AGPL-3.0 - ניתן להשתמש בה, לשנותה ולהפיצה בהתאם לתנאי הרישיון. ראה [מאגר GitHub](https://github.com/glowingkitty/OpenMates) לרישיון המלא.
