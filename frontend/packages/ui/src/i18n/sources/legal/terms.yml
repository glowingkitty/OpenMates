  he: החומרים והמידע באתר זה ובשירות OpenMates ניתנים 'כפי שהם' וללא אחריות מכל סוג שהוא. איננו מבטיחים את הדיוק, השלמות או השימושיות של כל מידע שסופק על ידי OpenMates. תגובות שנוצרו על ידי AI עלולות להכיל שגיאות, אי-דיוקים או מידע מיושן. כל הסתמכות שתציב על מידע כזה היא על אחריותך בלבד.
