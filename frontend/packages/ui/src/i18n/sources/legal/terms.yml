  zh: 本网站上的材料和信息“按原样”提供，不提供任何形式的保证。 我们不保证本网站上任何信息的准确性、完整性或有用性。 您对此类信息的任何依赖均由您自行承担风险。
  es: Los materiales e información en este sitio web se proporcionan 'tal cual' y sin garantías de ningún tipo. No garantizamos la precisión, integridad o utilidad de cualquier información en este sitio web. Cualquier confianza que deposite en dicha información es estrictamente bajo su propio riesgo.
  fr: Les documents et informations sur ce site web sont fournis "tels quels" et sans garantie d'aucune sorte. Nous ne garantissons pas l'exactitude, l'exhaustivité ou l'utilité des informations présentes sur ce site web. Toute confiance que vous accordez à ces informations est strictement à vos propres risques.
  pt: 'Os materiais e informações neste Site e no serviço OpenMates são fornecidos ''como estão'' e sem garantias de qualquer tipo. Não garantimos a precisão, integridade ou utilidade de qualquer informação fornecida pelo OpenMates. As respostas geradas por IA podem conter erros, imprecisões ou informações desatualizadas. Qualquer confiança que você deposite nessas informações é estritamente por sua própria conta e risco.'
  ru: 'Материалы и информация на этом Веб-сайте и в сервисе OpenMates предоставляются ''как есть'' без каких-либо гарантий. Мы не гарантируем точность, полноту или полезность какой-либо информации, предоставляемой OpenMates. Ответы, сгенерированные ИИ, могут содержать ошибки, неточности или устаревшую информацию. Любое доверие, которое вы оказываете такой информации, осуществляется исключительно на ваш страх и риск.'
  ja: このウェブサイト上の資料および情報は「現状のまま」提供され、いかなる種類の保証もありません。当ウェブサイト上の情報の正確性、完全性、有用性について保証するものではありません。そのような情報に依拠することは、完全にご自身の責任において行ってください。
  ko: '이 웹사이트와 OpenMates 서비스의 자료 및 정보는 ''있는 그대로'' 제공되며 어떠한 종류의 보증도 없습니다. OpenMates가 제공하는 어떤 정보의 정확성, 완전성 또는 유용성을 보장하지 않습니다. AI가 생성한 응답에는 오류, 부정확한 내용 또는 오래된 정보가 포함될 수 있습니다. 그러한 정보에 대한 신뢰는 전적으로 귀하의 책임입니다.'
  it: 'I materiali e le informazioni su questo Sito web e nel servizio OpenMates sono forniti ''così come sono'' e senza garanzie di alcun tipo. Non garantiamo l''accuratezza, la completezza o l''utilità di qualsiasi informazione fornita da OpenMates. Le risposte generate dall''AI possono contenere errori, inesattezze o informazioni obsolete. Qualsiasi affidamento che fai su tali informazioni è strettamente a tuo rischio e pericolo.'
  tr: 'Bu Web sitesindeki ve OpenMates hizmetindeki materyaller ve bilgiler ''olduğu gibi'' ve herhangi bir garanti olmaksızın sağlanmaktadır. OpenMates tarafından sağlanan herhangi bir bilginin doğruluğunu, eksiksizliğini veya kullanışlılığını garanti etmiyoruz. AI tarafından oluşturulan yanıtlar hatalar, yanlışlıklar veya güncel olmayan bilgiler içerebilir. Bu tür bilgilere duyduğunuz güven tamamen kendi riskinize aittir.'
  vi: 'Các tài liệu và thông tin trên Trang web này và dịch vụ OpenMates được cung cấp ''nguyên trạng'' và không có bảo đảm dưới bất kỳ hình thức nào. Chúng tôi không đảm bảo tính chính xác, đầy đủ hoặc hữu ích của bất kỳ thông tin nào được cung cấp bởi OpenMates. Phản hồi do AI tạo ra có thể chứa lỗi, sự không chính xác hoặc thông tin lỗi thời. Bất kỳ sự phụ thuộc nào bạn đặt vào thông tin đó là hoàn toàn chịu rủi ro của bạn.'
  id: 'Materi dan informasi di Situs web ini dan layanan OpenMates disediakan ''apa adanya'' dan tanpa jaminan apapun. Kami tidak menjamin keakuratan, kelengkapan, atau kegunaan informasi apapun yang disediakan oleh OpenMates. Respons yang dihasilkan AI mungkin mengandung kesalahan, ketidakakuratan, atau informasi yang sudah ketinggalan zaman. Setiap ketergantungan yang Anda tempatkan pada informasi tersebut sepenuhnya merupakan risiko Anda sendiri.'
  pl: 'Materiały i informacje na tej Stronie internetowej oraz w serwisie OpenMates są udostępniane ''w takim stanie, w jakim są'' i bez żadnych gwarancji. Nie gwarantujemy dokładności, kompletności ani przydatności jakichkolwiek informacji dostarczanych przez OpenMates. Odpowiedzi generowane przez AI mogą zawierać błędy, nieścisłości lub przestarzałe informacje. Wszelkie zaufanie pokładane w takich informacjach odbywa się wyłącznie na Twoje własne ryzyko.'
  nl: 'De materialen en informatie op deze Website en de OpenMates-dienst worden geleverd ''zoals ze zijn'' en zonder enige garantie. Wij garanderen niet de nauwkeurigheid, volledigheid of bruikbaarheid van enige informatie die door OpenMates wordt verstrekt. AI-gegenereerde antwoorden kunnen fouten, onnauwkeurigheden of verouderde informatie bevatten. Elk vertrouwen dat u in dergelijke informatie stelt, is strikt op eigen risico.'
  ar: 'المواد والمعلومات الموجودة على هذا الموقع وخدمة OpenMates مقدمة ''كما هي'' وبدون أي ضمانات. لا نضمن دقة أو اكتمال أو فائدة أي معلومات يقدمها OpenMates. قد تحتوي الردود التي يولدها الذكاء الاصطناعي على أخطاء أو معلومات غير دقيقة أو قديمة. أي اعتماد تضعه على هذه المعلومات يكون على مسؤوليتك الخاصة.'
  hi: 'इस वेबसाइट और OpenMates सेवा पर सामग्री और जानकारी ''जैसी है'' प्रदान की जाती है और किसी भी प्रकार की वारंटी के बिना। हम OpenMates द्वारा प्रदान की गई किसी भी जानकारी की सटीकता, पूर्णता या उपयोगिता की गारंटी नहीं देते हैं। AI-जनित प्रतिक्रियाओं में त्रुटियां, असंगतियां या पुरानी जानकारी हो सकती है। ऐसी जानकारी पर आप जो भी भरोसा करते हैं वह पूरी तरह से आपके अपने जोखिम पर है।'
  th: 'วัสดุและข้อมูลบนเว็บไซต์นี้และบริการ OpenMates ถูกจัดให้ ''ตามสภาพ'' และไม่มีการรับประกันใดๆ เราไม่รับประกันความถูกต้อง ความสมบูรณ์ หรือความเป็นประโยชน์ของข้อมูลใดๆ ที่ OpenMates ให้ การตอบสนองที่สร้างโดย AI อาจมีข้อผิดพลาด ความไม่ถูกต้อง หรือข้อมูลที่ล้าสมัย การพึ่งพาข้อมูลดังกล่าวถือเป็นความเสี่ยงของคุณเอง'
  cs: 'Materiály a informace na této Webové stránce a ve službě OpenMates jsou poskytovány ''tak jak jsou'' a bez jakýchkoli záruk. Nezaručujeme přesnost, úplnost ani užitečnost jakýchkoliv informací poskytovaných OpenMates. Odpovědi generované AI mohou obsahovat chyby, nepřesnosti nebo zastaralé informace. Veškerá důvěra, kterou v takovéto informace vkládáte, je přísně na vaše vlastní riziko.'
  sv: 'Materialet och informationen på denna Webbplats och OpenMates-tjänsten tillhandahålls ''i befintligt skick'' och utan garantier av något slag. Vi garanterar inte noggrannheten, fullständigheten eller användbarheten av information som tillhandahålls av OpenMates. AI-genererade svar kan innehålla fel, felaktigheter eller föråldrad information. Alla förlitanden du gör på sådan information sker strikt på egen risk.'
