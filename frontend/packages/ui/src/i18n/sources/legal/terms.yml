  hi: 'ये नियम और शर्तें संघीय गणराज्य जर्मनी के कानूनों द्वारा शासित और उनके अनुसार व्याख्या की जाती हैं। जिम्मेदार क्षेत्राधिकार और संपर्क जानकारी के विवरण के लिए, कृपया हमारे Impressum का संदर्भ लें।'
