encryption_keys.description:
  context: Encryption key and recovery warning
  en: OpenMates uses client-side encryption to protect your stored chats, titles, app settings, memories, and other sensitive fields. Chats are encrypted in your browser with keys derived from your login credentials before being sent to our servers, and are stored only as ciphertext. Our servers can decrypt your content transiently in memory when you need it — to run AI responses, render invoices, or deliver reminders — but we never write decrypted content to disk, logs, or traces, and we do not keep copies of your login credentials. If you lose access to all your login methods (password, passkey, recovery key, security key), we have no way to recover your encryption keys, which means your encrypted data becomes permanently inaccessible. This is an intentional security property — without your keys, neither you nor we can decrypt your stored content. Please keep your login credentials and recovery keys secure and backed up.
  de: 'OpenMates verwendet clientseitige Verschlüsselung, um Ihre dauerhaft gespeicherten Chats zu schützen. Chats werden mit Schlüsseln verschlüsselt, die auf Ihrem Gerät generiert werden und nur Ihre Geräte entschlüsseln können – unsere Server können Ihre gespeicherten Chats nicht entschlüsseln. Wenn Sie jedoch Nachrichten zur KI-Verarbeitung senden, wird der entschlüsselte Inhalt vorübergehend für die Inferenz an unsere Server gesendet. Nur Chats, die für die Langzeitspeicherung gespeichert werden, werden verschlüsselt. Wenn Sie den Zugang zu all Ihren Anmeldemethoden (Passwort, Passkey, Wiederherstellungsschlüssel, Sicherheitsschlüssel) verlieren, können wir den Zugang zu Ihren verschlüsselten Daten nicht wiederherstellen. Dies ist ein Sicherheitsmerkmal – wir können Ihre gespeicherten Chats ohne Ihre Verschlüsselungsschlüssel nicht entschlüsseln. Bitte halten Sie Ihre Anmeldedaten und Wiederherstellungsschlüssel sicher und sichern Sie diese.'
  zh: 'OpenMates 使用客户端加密来保护您长期存储的聊天记录。聊天记录使用在您设备上生成的密钥加密，只有您的设备才能解密 - 我们的服务器无法解密您存储的聊天记录。但是，当您发送消息进行 AI 处理时，解密的内容会临时发送到我们的服务器进行推理。只有保存用于长期存储的聊天记录才会被加密。如果您失去了所有登录方式（密码、通行密钥、恢复密钥、安全密钥）的访问权限，我们无法恢复您加密数据的访问权限。这是一项安全功能 - 我们无法在没有您的加密密钥的情况下解密您存储的聊天记录。请确保您的登录凭证和恢复密钥安全且有备份。'
  es: 'OpenMates utiliza cifrado del lado del cliente para proteger sus chats almacenados a largo plazo. Los chats se cifran con claves generadas en su dispositivo que solo sus dispositivos pueden descifrar: nuestros servidores no pueden descifrar sus chats almacenados. Sin embargo, cuando envía mensajes para procesamiento de IA, el contenido descifrado se envía temporalmente a nuestros servidores para inferencia. Solo los chats guardados para almacenamiento a largo plazo se cifran. Si pierde el acceso a todos sus métodos de inicio de sesión (contraseña, clave de acceso, clave de recuperación, clave de seguridad), no podemos restaurar el acceso a sus datos cifrados. Esta es una función de seguridad: no podemos descifrar sus chats almacenados sin sus claves de cifrado. Mantenga sus credenciales de inicio de sesión y claves de recuperación seguras y con copia de seguridad.'
  fr: 'OpenMates utilise un chiffrement côté client pour protéger vos chats stockés à long terme. Les chats sont chiffrés avec des clés générées sur votre appareil que seuls vos appareils peuvent déchiffrer - nos serveurs ne peuvent pas déchiffrer vos chats stockés. Cependant, lorsque vous envoyez des messages pour le traitement IA, le contenu déchiffré est temporairement envoyé à nos serveurs pour l''inférence. Seuls les chats sauvegardés pour un stockage à long terme sont chiffrés. Si vous perdez l''accès à toutes vos méthodes de connexion (mot de passe, passkey, clé de récupération, clé de sécurité), nous ne pouvons pas restaurer l''accès à vos données chiffrées. C''est une fonctionnalité de sécurité - nous ne pouvons pas déchiffrer vos chats stockés sans vos clés de chiffrement. Veuillez garder vos identifiants de connexion et vos clés de récupération en sécurité et sauvegardés.'
  pt: 'O OpenMates usa criptografia do lado do cliente para proteger seus chats armazenados a longo prazo. Os chats são criptografados com chaves geradas no seu dispositivo que apenas seus dispositivos podem descriptografar - nossos servidores não podem descriptografar seus chats armazenados. No entanto, quando você envia mensagens para processamento de IA, o conteúdo descriptografado é temporariamente enviado aos nossos servidores para inferência. Apenas chats salvos para armazenamento a longo prazo são criptografados. Se você perder acesso a todos os seus métodos de login (senha, chave de acesso, chave de recuperação, chave de segurança), não podemos restaurar o acesso aos seus dados criptografados. Este é um recurso de segurança - não podemos descriptografar seus chats armazenados sem suas chaves de criptografia. Mantenha suas credenciais de login e chaves de recuperação seguras e com backup.'
  ru: 'OpenMates использует шифрование на стороне клиента для защиты ваших чатов, хранящихся долгосрочно. Чаты шифруются ключами, генерируемыми на вашем устройстве, которые может расшифровать только ваше устройство — наши серверы не могут расшифровать ваши сохранённые чаты. Однако при отправке сообщений для обработки ИИ расшифрованный контент временно отправляется на наши серверы для вывода. Шифруются только чаты, сохранённые для долгосрочного хранения. Если вы потеряете доступ ко всем методам входа (пароль, passkey, ключ восстановления, ключ безопасности), мы не сможем восстановить доступ к вашим зашифрованным данным. Это функция безопасности — мы не можем расшифровать ваши сохранённые чаты без ваших ключей шифрования. Пожалуйста, храните свои учётные данные и ключи восстановления в надёжном месте и делайте резервные копии.'
  ja: 'OpenMatesはクライアントサイドの暗号化を使用して、長期保存されたチャットを保護します。チャットはデバイスで生成されたキーで暗号化され、あなたのデバイスのみが復号化できます。私たちのサーバーは保存されたチャットを復号化できません。ただし、AI処理のためにメッセージを送信すると、復号化されたコンテンツが推論のために一時的にサーバーに送信されます。長期保存のために保存されたチャットのみが暗号化されます。すべてのログイン方法（パスワード、パスキー、回復キー、セキュリティキー）へのアクセスを失った場合、暗号化されたデータへのアクセスを回復できません。これはセキュリティ機能です。暗号化キーなしでは保存されたチャットを復号化できません。ログイン認証情報と回復キーを安全に保ち、バックアップしてください。'
  ko: 'OpenMates는 클라이언트 측 암호화를 사용하여 장기 저장된 채팅을 보호합니다. 채팅은 기기에서 생성된 키로 암호화되어 기기만이 복호화할 수 있습니다. 서버는 저장된 채팅을 복호화할 수 없습니다. 그러나 AI 처리를 위해 메시지를 보낼 때 복호화된 내용이 추론을 위해 서버에 일시적으로 전송됩니다. 장기 저장을 위해 저장된 채팅만 암호화됩니다. 모든 로그인 방법(비밀번호, 패스키, 복구 키, 보안 키)에 대한 접근을 잃으면 암호화된 데이터에 대한 접근을 복원할 수 없습니다. 이는 보안 기능입니다 - 암호화 키 없이는 저장된 채팅을 복호화할 수 없습니다. 로그인 자격증명과 복구 키를 안전하게 보관하고 백업하세요.'
  it: 'OpenMates utilizza la crittografia lato client per proteggere le chat archiviate a lungo termine. Le chat vengono crittografate con chiavi generate sul tuo dispositivo che solo i tuoi dispositivi possono decrittografare: i nostri server non possono decrittografare le chat archiviate. Tuttavia, quando invii messaggi per l''elaborazione AI, il contenuto decrittografato viene temporaneamente inviato ai nostri server per l''inferenza. Solo le chat salvate per l''archiviazione a lungo termine vengono crittografate. Se perdi l''accesso a tutti i tuoi metodi di accesso (password, passkey, chiave di recupero, chiave di sicurezza), non possiamo ripristinare l''accesso ai tuoi dati crittografati. Questa è una funzionalità di sicurezza: non possiamo decrittografare le chat archiviate senza le tue chiavi di crittografia. Mantieni le credenziali di accesso e le chiavi di recupero al sicuro e conserva un backup.'
  tr: 'OpenMates, uzun vadeli olarak depolanan sohbetlerinizi korumak için istemci taraflı şifreleme kullanmaktadır. Sohbetler, yalnızca cihazlarınızın şifresini çözebileceği cihazınızda oluşturulan anahtarlarla şifrelenir; sunucularımız depolanan sohbetlerinizi şifreleyemez. Ancak AI işleme için mesaj gönderdiğinizde, şifresi çözülmüş içerik çıkarım için geçici olarak sunucularımıza gönderilir. Yalnızca uzun vadeli depolama için kaydedilen sohbetler şifrelenir. Tüm oturum açma yöntemlerinize erişimi kaybederseniz (şifre, parola anahtarı, kurtarma anahtarı, güvenlik anahtarı), şifrelenmiş verilerinize erişimi geri yükleyemeyiz. Bu bir güvenlik özelliğidir - şifreleme anahtarlarınız olmadan depolanan sohbetlerinizin şifresini çözemeyiz. Lütfen oturum açma kimlik bilgilerinizi ve kurtarma anahtarlarınızı güvende tutun ve yedekleyin.'
  vi: 'OpenMates sử dụng mã hóa phía máy khách để bảo vệ các cuộc trò chuyện được lưu trữ lâu dài của bạn. Các cuộc trò chuyện được mã hóa bằng các khóa được tạo trên thiết bị của bạn mà chỉ thiết bị của bạn mới có thể giải mã - máy chủ của chúng tôi không thể giải mã các cuộc trò chuyện được lưu trữ của bạn. Tuy nhiên, khi bạn gửi tin nhắn để xử lý AI, nội dung đã giải mã được gửi tạm thời đến máy chủ của chúng tôi để suy luận. Chỉ các cuộc trò chuyện được lưu để lưu trữ lâu dài mới được mã hóa. Nếu bạn mất quyền truy cập vào tất cả các phương thức đăng nhập (mật khẩu, passkey, khóa khôi phục, khóa bảo mật), chúng tôi không thể khôi phục quyền truy cập vào dữ liệu được mã hóa của bạn. Đây là tính năng bảo mật - chúng tôi không thể giải mã các cuộc trò chuyện được lưu trữ của bạn nếu không có khóa mã hóa. Vui lòng giữ thông tin đăng nhập và khóa khôi phục an toàn và sao lưu chúng.'
  id: 'OpenMates menggunakan enkripsi sisi klien untuk melindungi obrolan yang disimpan jangka panjang Anda. Obrolan dienkripsi dengan kunci yang dibuat di perangkat Anda yang hanya perangkat Anda yang dapat mendekripsi - server kami tidak dapat mendekripsi obrolan yang disimpan. Namun, ketika Anda mengirim pesan untuk pemrosesan AI, konten yang didekripsi sementara dikirim ke server kami untuk inferensi. Hanya obrolan yang disimpan untuk penyimpanan jangka panjang yang dienkripsi. Jika Anda kehilangan akses ke semua metode login Anda (kata sandi, passkey, kunci pemulihan, kunci keamanan), kami tidak dapat memulihkan akses ke data terenkripsi Anda. Ini adalah fitur keamanan - kami tidak dapat mendekripsi obrolan yang disimpan tanpa kunci enkripsi Anda. Harap simpan kredensial login dan kunci pemulihan Anda dengan aman dan cadangkan.'
  pl: 'OpenMates używa szyfrowania po stronie klienta, aby chronić długoterminowo przechowywane czaty. Czaty są szyfrowane kluczami generowanymi na Twoim urządzeniu, które tylko Twoje urządzenia mogą odszyfrować - nasze serwery nie mogą odszyfrować przechowywanych czatów. Jednak gdy wysyłasz wiadomości do przetwarzania AI, odszyfrowana treść jest tymczasowo wysyłana do naszych serwerów do wnioskowania. Tylko czaty zapisane do długoterminowego przechowywania są szyfrowane. Jeśli utracisz dostęp do wszystkich metod logowania (hasło, passkey, klucz odzyskiwania, klucz bezpieczeństwa), nie możemy przywrócić dostępu do zaszyfrowanych danych. Jest to funkcja bezpieczeństwa - nie możemy odszyfrować przechowywanych czatów bez Twoich kluczy szyfrowania. Przechowuj swoje dane logowania i klucze odzyskiwania bezpiecznie i twórz ich kopie zapasowe.'
  nl: 'OpenMates gebruikt client-side versleuteling om uw langdurig opgeslagen chats te beschermen. Chats worden versleuteld met sleutels die op uw apparaat worden gegenereerd en die alleen uw apparaten kunnen ontcijferen - onze servers kunnen uw opgeslagen chats niet ontcijferen. Wanneer u echter berichten verstuurt voor AI-verwerking, wordt de ontcijferde inhoud tijdelijk naar onze servers verzonden voor inferentie. Alleen chats die zijn opgeslagen voor langdurige opslag, worden versleuteld. Als u de toegang tot al uw inlogmethoden verliest (wachtwoord, passkey, herstelsleutel, beveiligingssleutel), kunnen we de toegang tot uw versleutelde gegevens niet herstellen. Dit is een beveiligingsfunctie - we kunnen uw opgeslagen chats niet ontcijferen zonder uw versleutelingssleutels. Houd uw inloggegevens en herstelsleutels veilig en maak er back-ups van.'
  ar: 'يستخدم OpenMates التشفير من جانب العميل لحماية المحادثات المخزنة طويل الأمد. يتم تشفير المحادثات بمفاتيح تُنشأ على جهازك ولا يمكن لأجهزتك وحدها فكّ تشفيرها - لا يمكن لخوادمنا فك تشفير محادثاتك المخزنة. ومع ذلك، عند إرسال رسائل لمعالجة الذكاء الاصطناعي، يُرسل المحتوى المفكوك تشفيره مؤقتًا إلى خوادمنا للاستدلال. يتم تشفير المحادثات المحفوظة للتخزين طويل الأمد فقط. إذا فقدت الوصول إلى جميع طرق تسجيل الدخول (كلمة المرور، مفتاح المرور، مفتاح الاسترداد، مفتاح الأمان)، فلا يمكننا استعادة الوصول إلى بياناتك المشفرة. هذه ميزة أمنية - لا يمكننا فك تشفير محادثاتك المخزنة بدون مفاتيح التشفير الخاصة بك. يرجى الحفاظ على أمان بيانات اعتماد تسجيل الدخول ومفاتيح الاسترداد والاحتفاظ بنسخ احتياطية منها.'
  hi: 'OpenMates आपके दीर्घकालिक संग्रहीत चैट की सुरक्षा के लिए क्लाइंट-साइड एन्क्रिप्शन का उपयोग करता है। चैट आपके डिवाइस पर उत्पन्न कुंजियों से एन्क्रिप्ट की जाती हैं जिन्हें केवल आपके डिवाइस ही डिक्रिप्ट कर सकते हैं - हमारे सर्वर आपके संग्रहीत चैट को डिक्रिप्ट नहीं कर सकते। हालांकि, जब आप AI प्रसंस्करण के लिए संदेश भेजते हैं, तो डिक्रिप्टेड सामग्री अनुमान के लिए अस्थायी रूप से हमारे सर्वर पर भेजी जाती है। केवल दीर्घकालिक संग्रहण के लिए सहेजे गए चैट एन्क्रिप्ट किए जाते हैं। यदि आप अपने सभी लॉगिन तरीकों (पासवर्ड, पासकी, रिकवरी कुंजी, सुरक्षा कुंजी) तक पहुंच खो देते हैं, तो हम आपके एन्क्रिप्टेड डेटा तक पहुंच को पुनर्स्थापित नहीं कर सकते। यह एक सुरक्षा विशेषता है - आपकी एन्क्रिप्शन कुंजियों के बिना हम आपके संग्रहीत चैट को डिक्रिप्ट नहीं कर सकते। कृपया अपने लॉगिन क्रेडेंशियल और रिकवरी कुंजियों को सुरक्षित रखें और बैकअप लें।'
  th: 'OpenMates ใช้การเข้ารหัสฝั่งไคลเอนต์เพื่อปกป้องการแชทที่จัดเก็บระยะยาวของคุณ การแชทได้รับการเข้ารหัสด้วยคีย์ที่สร้างขึ้นบนอุปกรณ์ของคุณซึ่งเฉพาะอุปกรณ์ของคุณเท่านั้นที่สามารถถอดรหัสได้ - เซิร์ฟเวอร์ของเราไม่สามารถถอดรหัสการแชทที่จัดเก็บของคุณได้ อย่างไรก็ตาม เมื่อคุณส่งข้อความเพื่อประมวลผล AI เนื้อหาที่ถอดรหัสแล้วจะถูกส่งไปยังเซิร์ฟเวอร์ของเราชั่วคราวสำหรับการอนุมาน เฉพาะการแชทที่บันทึกสำหรับการจัดเก็บระยะยาวเท่านั้นที่จะถูกเข้ารหัส หากคุณสูญเสียการเข้าถึงวิธีการเข้าสู่ระบบทั้งหมดของคุณ (รหัสผ่าน พาสคีย์ คีย์การกู้คืน คีย์ความปลอดภัย) เราไม่สามารถกู้คืนการเข้าถึงข้อมูลที่เข้ารหัสของคุณได้ นี่คือคุณสมบัติด้านความปลอดภัย - เราไม่สามารถถอดรหัสการแชทที่จัดเก็บของคุณได้โดยไม่มีคีย์เข้ารหัสของคุณ โปรดเก็บรักษาข้อมูลรับรองการเข้าสู่ระบบและคีย์การกู้คืนของคุณอย่างปลอดภัยและสำรองข้อมูลไว้'
  cs: 'OpenMates používá klientské šifrování k ochraně vašich dlouhodobě uložených chatů. Chaty jsou zašifrované klíči vygenerovanými na vašem zařízení, které mohou dešifrovat pouze vaše zařízení - naše servery nemohou dešifrovat vaše uložené chaty. Nicméně při odesílání zpráv ke zpracování AI je dešifrovaný obsah dočasně odeslán na naše servery pro inferenci. Šifrují se pouze chaty uložené pro dlouhodobé uchovávání. Pokud ztratíte přístup ke všem svým metodám přihlášení (heslo, passkey, obnovovací klíč, bezpečnostní klíč), nemůžeme obnovit přístup k vašim zašifrovaným datům. Toto je bezpečnostní funkce - bez vašich šifrovacích klíčů nemůžeme dešifrovat vaše uložené chaty. Prosím uchovávejte přihlašovací údaje a obnovovací klíče v bezpečí a zálohujte je.'
  sv: 'OpenMates använder klientsidig kryptering för att skydda dina långtidslagrade chattar. Chattar krypteras med nycklar som genereras på din enhet och som bara dina enheter kan dekryptera - våra servrar kan inte dekryptera dina lagrade chattar. När du dock skickar meddelanden för AI-bearbetning skickas det dekrypterade innehållet tillfälligt till våra servrar för inferens. Endast chattar som sparas för långtidslagring krypteras. Om du förlorar åtkomst till alla dina inloggningsmetoder (lösenord, passkey, återställningsnyckel, säkerhetsnyckel) kan vi inte återställa åtkomsten till din krypterade data. Detta är en säkerhetsfunktion - vi kan inte dekryptera dina lagrade chattar utan dina krypteringsnycklar. Håll dina inloggningsuppgifter och återställningsnycklar säkra och säkerhetskopierade.'
  verified_by_human: []
  he: OpenMates משתמשת בהצפנה בצד הלקוח להגנה על הצ'אטים השמורים לטווח ארוך שלך. הצ'אטים מוצפנים עם מפתחות שנוצרו במכשיר שלך אשר רק המכשירים שלך יכולים לפענח - השרתים שלנו אינם יכולים לפענח את הצ'אטים השמורים שלך. עם זאת, כאשר אתה שולח הודעות לעיבוד AI, התוכן המפוענח נשלח זמנית לשרתים שלנו לצורך הסקה. רק צ'אטים השמורים לאחסון ארוך טווח מוצפנים. אם תאבד גישה לכל שיטות ההתחברות שלך (סיסמה, מפתח גישה, מפתח שחזור, מפתח אבטחה), לא נוכל לשחזר גישה לנתונים המוצפנים שלך. זהו תכונת אבטחה - איננו יכולים לפענח את הצ'אטים השמורים שלך ללא מפתחות ההצפנה שלך. אנא שמור על פרטי ההתחברות ומפתחות השחזור שלך בצורה מאובטחת ומגובה.
