about.description:
  context: About section text
  en: OpenMates is an open-source AI agents platform available under AGPL-3.0 license. We provide a cloud-hosted service at openmates.org, a developer API for integration, and a CLI tool. The software can also be self-hosted - see our [GitHub repository](https://github.com/glowingkitty/OpenMates) and [documentation](https://docs.openmates.org) for details.
  de: OpenMates ist derzeit ein Closed-Source-Softwareprojekt in der ersten Entwicklungsphase. Dieser temporäre Closed-Source-Status wird beibehalten, um Sicherheit und Stabilität während der frühen Entwicklungs- und Beta-Testphasen zu gewährleisten. Das Projekt wird nach Abschluss der ersten Beta-Tests und Sicherheitsüberprüfungen zu Open-Source übergehen. Diese Website dient als Informationsplattform über das OpenMates-Projekt und seinen Entwicklungsfortschritt.
  zh: OpenMates 目前是一个处于初始开发阶段的闭源软件项目。 这种临时的闭源状态旨在确保早期开发和 beta 测试阶段的安全性和稳定性。 该项目将在完成初始 beta 测试和安全审查后过渡到开源。 本网站作为有关 OpenMates 项目及其开发进度的信息平台。
  es: OpenMates es actualmente un proyecto de software de código cerrado en su fase inicial de desarrollo. Este estado temporal de código cerrado se mantiene para garantizar la seguridad y estabilidad durante las primeras fases de desarrollo y pruebas beta. El proyecto pasará a ser de código abierto después de completar las pruebas beta iniciales y las revisiones de seguridad. Este sitio web sirve como plataforma informativa sobre el proyecto OpenMates y su progreso de desarrollo.
  fr: OpenMates est actuellement un projet de logiciel à code source fermé pendant sa phase de développement initiale. Ce statut temporaire de code source fermé est maintenu pour assurer la sécurité et la stabilité pendant les premières phases de développement et de test bêta. Le projet passera en open-source après la fin des premiers tests bêta et des examens de sécurité. Ce site web sert de plateforme d'information sur le projet OpenMates et sa progression de développement.
  pt: 'O OpenMates é uma plataforma de agentes de IA de código aberto disponível sob licença AGPL-3.0. Fornecemos um serviço hospedado na nuvem em openmates.org, uma API de desenvolvedor para integração e uma ferramenta CLI. O software também pode ser auto-hospedado - consulte nosso [repositório GitHub](https://github.com/glowingkitty/OpenMates) e [documentação](https://docs.openmates.org) para mais detalhes.'
  ru: 'OpenMates — это платформа ИИ-агентов с открытым исходным кодом, доступная по лицензии AGPL-3.0. Мы предоставляем облачный сервис на openmates.org, API для разработчиков и инструмент CLI. Программное обеспечение также может быть развёрнуто самостоятельно — подробности в нашем [репозитории GitHub](https://github.com/glowingkitty/OpenMates) и [документации](https://docs.openmates.org).'
  ja: OpenMatesは現在、初期開発段階にあるクローズドソースのソフトウェアプロジェクトです。この一時的なクローズドソースの状態は、初期開発とベータテスト段階におけるセキュリティと安定性を確保するために維持されています。プロジェクトは、初期ベータテストとセキュリティレビューの完了後、オープンソースに移行する予定です。このウェブサイトは、OpenMatesプロジェクトとその開発進捗に関する情報プラットフォームとして機能します。
  ko: 'OpenMates는 AGPL-3.0 라이선스 하에 제공되는 오픈소스 AI 에이전트 플랫폼입니다. openmates.org에서 클라우드 호스팅 서비스, 통합을 위한 개발자 API 및 CLI 도구를 제공합니다. 소프트웨어는 자체 호스팅도 가능합니다 - 자세한 내용은 [GitHub 저장소](https://github.com/glowingkitty/OpenMates) 및 [문서](https://docs.openmates.org)를 참조하세요.'
  it: 'OpenMates è una piattaforma di agenti AI open-source disponibile sotto licenza AGPL-3.0. Forniamo un servizio cloud-hosted su openmates.org, un''API per sviluppatori per l''integrazione e uno strumento CLI. Il software può anche essere auto-ospitato - vedere il nostro [repository GitHub](https://github.com/glowingkitty/OpenMates) e la [documentazione](https://docs.openmates.org) per i dettagli.'
  tr: 'OpenMates, AGPL-3.0 lisansı altında sunulan açık kaynaklı bir AI ajanları platformudur. openmates.org''da bulut tabanlı bir hizmet, entegrasyon için geliştirici API''si ve bir CLI aracı sunuyoruz. Yazılım ayrıca kendi kendine barındırılabilir - ayrıntılar için [GitHub deposumuza](https://github.com/glowingkitty/OpenMates) ve [belgelerimize](https://docs.openmates.org) bakın.'
  vi: 'OpenMates là một nền tảng tác nhân AI mã nguồn mở có sẵn theo giấy phép AGPL-3.0. Chúng tôi cung cấp dịch vụ được lưu trữ trên đám mây tại openmates.org, API dành cho nhà phát triển để tích hợp và công cụ CLI. Phần mềm cũng có thể tự lưu trữ - xem [kho lưu trữ GitHub](https://github.com/glowingkitty/OpenMates) và [tài liệu](https://docs.openmates.org) để biết chi tiết.'
  id: 'OpenMates adalah platform agen AI open-source yang tersedia di bawah lisensi AGPL-3.0. Kami menyediakan layanan yang dihosting di cloud di openmates.org, API pengembang untuk integrasi, dan alat CLI. Perangkat lunak ini juga dapat di-host sendiri - lihat [repositori GitHub](https://github.com/glowingkitty/OpenMates) dan [dokumentasi](https://docs.openmates.org) kami untuk detailnya.'
  pl: 'OpenMates to platforma agentów AI o otwartym kodzie źródłowym dostępna na licencji AGPL-3.0. Zapewniamy usługę hostowaną w chmurze na openmates.org, API dla deweloperów do integracji oraz narzędzie CLI. Oprogramowanie może być również self-hostowane - szczegóły znajdziesz w naszym [repozytorium GitHub](https://github.com/glowingkitty/OpenMates) i [dokumentacji](https://docs.openmates.org).'
  nl: 'OpenMates is een open-source AI-agentsplatform beschikbaar onder AGPL-3.0-licentie. We bieden een cloud-gehoste service op openmates.org, een ontwikkelaars-API voor integratie en een CLI-tool. De software kan ook zelf worden gehost - zie ons [GitHub-repository](https://github.com/glowingkitty/OpenMates) en [documentatie](https://docs.openmates.org) voor details.'
  ar: 'OpenMates هي منصة عوامل ذكاء اصطناعي مفتوحة المصدر متاحة بموجب ترخيص AGPL-3.0. نحن نقدم خدمة مستضافة على السحابة على openmates.org وواجهة برمجة تطبيقات للمطورين للتكامل وأداة CLI. يمكن أيضًا استضافة البرنامج ذاتيًا - راجع [مستودع GitHub](https://github.com/glowingkitty/OpenMates) و[الوثائق](https://docs.openmates.org) للتفاصيل.'
  hi: 'OpenMates एक ओपन-सोर्स AI एजेंट प्लेटफॉर्म है जो AGPL-3.0 लाइसेंस के तहत उपलब्ध है। हम openmates.org पर क्लाउड-होस्टेड सेवा, एकीकरण के लिए डेवलपर API और CLI टूल प्रदान करते हैं। सॉफ्टवेयर को स्व-होस्ट भी किया जा सकता है - विवरण के लिए हमारा [GitHub रिपॉजिटरी](https://github.com/glowingkitty/OpenMates) और [दस्तावेज़ीकरण](https://docs.openmates.org) देखें।'
  th: 'OpenMates เป็นแพลตฟอร์มตัวแทน AI โอเพ่นซอร์สที่มีให้ภายใต้ลิขสิทธิ์ AGPL-3.0 เราให้บริการที่โฮสต์บนคลาวด์ที่ openmates.org API สำหรับนักพัฒนาเพื่อการผสานรวม และเครื่องมือ CLI ซอฟต์แวร์นี้ยังสามารถโฮสต์เองได้ - ดู[ที่เก็บ GitHub](https://github.com/glowingkitty/OpenMates) และ[เอกสาร](https://docs.openmates.org) สำหรับรายละเอียด'
  cs: 'OpenMates je open-source platforma AI agentů dostupná pod licencí AGPL-3.0. Poskytujeme cloudově hostovanou službu na openmates.org, API pro vývojáře k integraci a nástroj CLI. Software může být také self-hostován - podrobnosti najdete v našem [repozitáři GitHub](https://github.com/glowingkitty/OpenMates) a [dokumentaci](https://docs.openmates.org).'
  sv: 'OpenMates är en open-source AI-agentsplattform tillgänglig under AGPL-3.0-licens. Vi erbjuder en molnbaserad tjänst på openmates.org, ett utvecklar-API för integration och ett CLI-verktyg. Programvaran kan också vara själv-hostad - se vår [GitHub-repository](https://github.com/glowingkitty/OpenMates) och [dokumentation](https://docs.openmates.org) för detaljer.'
  verified_by_human: []
  he: OpenMates היא פלטפורמת סוכני AI בקוד פתוח הזמינה תחת רישיון AGPL-3.0. אנו מספקים שירות מתארח בענן בכתובת openmates.org, API לפיתוח לשילוב, וכלי CLI. ניתן גם לאחסן את התוכנה בשרת עצמי - ראה [מאגר GitHub](https://github.com/glowingkitty/OpenMates) ו[תיעוד](https://docs.openmates.org) לפרטים.
