ai_accuracy.description:
  context: AI accuracy disclaimer
  en: OpenMates uses AI models that may generate inaccurate, incomplete, or misleading information. While we strive to minimize errors, AI responses can contain factual inaccuracies, outdated information, or hallucinations. You are responsible for verifying any critical information, especially for high-stakes situations such as medical, legal, financial, or safety-critical decisions. AI-generated responses do not replace professional advice from qualified experts such as lawyers, doctors, or financial advisors.
  de: 'OpenMates verwendet KI-Modelle, die ungenaue, unvollständige oder irreführende Informationen generieren können. Obwohl wir Fehler minimieren möchten, können KI-Antworten sachliche Ungenauigkeiten, veraltete Informationen oder Halluzinationen enthalten. Sie sind dafür verantwortlich, kritische Informationen zu überprüfen, insbesondere in wichtigen Situationen wie medizinischen, rechtlichen, finanziellen oder sicherheitskritischen Entscheidungen. KI-generierte Antworten ersetzen keine professionellen Ratschläge von qualifizierten Experten wie Anwälten, Ärzten oder Finanzberatern.'
  zh: 'OpenMates 使用可能生成不准确、不完整或误导性信息的 AI 模型。虽然我们努力减少错误，但 AI 回答可能包含事实错误、过时信息或幻觉。您有责任核实任何关键信息，尤其是在高风险情况下，例如医疗、法律、财务或安全关键决策。AI 生成的回答不能替代律师、医生或财务顾问等合格专家的专业建议。'
  es: 'OpenMates utiliza modelos de IA que pueden generar información inexacta, incompleta o engañosa. Si bien nos esforzamos por minimizar los errores, las respuestas de IA pueden contener inexactitudes factuales, información desactualizada o alucinaciones. Usted es responsable de verificar cualquier información crítica, especialmente en situaciones de alto riesgo como decisiones médicas, legales, financieras o de seguridad crítica. Las respuestas generadas por IA no reemplazan el asesoramiento profesional de expertos calificados como abogados, médicos o asesores financieros.'
  fr: 'OpenMates utilise des modèles d''IA qui peuvent générer des informations inexactes, incomplètes ou trompeuses. Bien que nous nous efforcions de minimiser les erreurs, les réponses de l''IA peuvent contenir des inexactitudes factuelles, des informations obsolètes ou des hallucinations. Vous êtes responsable de vérifier toute information critique, en particulier pour des situations à enjeux élevés telles que les décisions médicales, juridiques, financières ou critiques pour la sécurité. Les réponses générées par l''IA ne remplacent pas les conseils professionnels de spécialistes qualifiés tels que des avocats, des médecins ou des conseillers financiers.'
  pt: 'O OpenMates usa modelos de IA que podem gerar informações imprecisas, incompletas ou enganosas. Embora nos esforcemos para minimizar erros, as respostas de IA podem conter imprecisões factuais, informações desatualizadas ou alucinações. Você é responsável por verificar qualquer informação crítica, especialmente em situações de alto risco, como decisões médicas, legais, financeiras ou de segurança crítica. As respostas geradas por IA não substituem o conselho profissional de especialistas qualificados, como advogados, médicos ou consultores financeiros.'
  ru: 'OpenMates использует модели ИИ, которые могут генерировать неточную, неполную или вводящую в заблуждение информацию. Несмотря на то что мы стремимся минимизировать ошибки, ответы ИИ могут содержать фактические неточности, устаревшую информацию или галлюцинации. Вы несёте ответственность за проверку любой критической информации, особенно в ситуациях с высокими ставками, таких как медицинские, юридические, финансовые или критически важные для безопасности решения. Ответы, сгенерированные ИИ, не заменяют профессиональный совет квалифицированных специалистов.'
  ja: 'OpenMatesは不正確、不完全、または誤解を招く情報を生成する可能性のあるAIモデルを使用しています。エラーを最小化するよう努めていますが、AIの回答には事実の不正確さ、古い情報、幻覚が含まれる場合があります。特に医療、法律、財務、安全に関わる重要な状況では、重要な情報を確認する責任はあなたにあります。AI生成の回答は、弁護士、医師、財務アドバイザーなどの資格ある専門家からの専門的なアドバイスの代わりにはなりません。'
  ko: 'OpenMates는 부정확하거나 불완전하거나 오해를 불러일으키는 정보를 생성할 수 있는 AI 모델을 사용합니다. 오류를 최소화하기 위해 노력하지만 AI 응답에는 사실 오류, 오래된 정보 또는 환각이 포함될 수 있습니다. 특히 의료, 법률, 재정 또는 안전에 중요한 결정과 같은 고위험 상황에서는 중요한 정보를 확인할 책임이 있습니다. AI가 생성한 응답은 변호사, 의사 또는 재정 고문과 같은 자격을 갖춘 전문가의 전문적인 조언을 대체하지 않습니다.'
  it: 'OpenMates utilizza modelli AI che possono generare informazioni imprecise, incomplete o fuorvianti. Sebbene ci impegniamo a ridurre al minimo gli errori, le risposte AI possono contenere inesattezze fattuali, informazioni obsolete o allucinazioni. Sei responsabile di verificare qualsiasi informazione critica, specialmente in situazioni ad alto rischio come decisioni mediche, legali, finanziarie o critiche per la sicurezza. Le risposte generate dall''AI non sostituiscono il consiglio professionale di esperti qualificati come avvocati, medici o consulenti finanziari.'
  tr: 'OpenMates, yanlış, eksik veya yanıltıcı bilgiler üretebilen AI modelleri kullanmaktadır. Hataları en aza indirmeye çalışsak da, AI yanıtları olgusal yanlışlıklar, güncel olmayan bilgiler veya halüsinasyonlar içerebilir. Özellikle tıbbi, hukuki, finansal veya güvenlik açısından kritik kararlar gibi yüksek riskli durumlarda herhangi bir kritik bilgiyi doğrulamak sizin sorumluluğunuzdadır. AI tarafından üretilen yanıtlar, avukatlar, doktorlar veya finansal danışmanlar gibi nitelikli uzmanlardan gelen profesyonel tavsiyelerin yerini tutmaz.'
  vi: 'OpenMates sử dụng các mô hình AI có thể tạo ra thông tin không chính xác, không đầy đủ hoặc gây hiểu lầm. Mặc dù chúng tôi cố gắng giảm thiểu lỗi, phản hồi AI có thể chứa sự không chính xác về mặt thực tế, thông tin lỗi thời hoặc ảo giác. Bạn có trách nhiệm xác minh bất kỳ thông tin quan trọng nào, đặc biệt là trong các tình huống có rủi ro cao như quyết định y tế, pháp lý, tài chính hoặc an toàn quan trọng. Phản hồi do AI tạo ra không thay thế lời khuyên chuyên nghiệp từ các chuyên gia có trình độ.'
  id: 'OpenMates menggunakan model AI yang mungkin menghasilkan informasi yang tidak akurat, tidak lengkap, atau menyesatkan. Meskipun kami berusaha meminimalkan kesalahan, respons AI dapat mengandung ketidakakuratan faktual, informasi yang sudah ketinggalan zaman, atau halusinasi. Anda bertanggung jawab untuk memverifikasi informasi penting apa pun, terutama untuk situasi berisiko tinggi seperti keputusan medis, hukum, keuangan, atau keamanan kritis. Respons yang dihasilkan AI tidak menggantikan saran profesional dari para ahli yang berkualifikasi.'
  pl: 'OpenMates używa modeli AI, które mogą generować niedokładne, niekompletne lub wprowadzające w błąd informacje. Chociaż staramy się minimalizować błędy, odpowiedzi AI mogą zawierać nieścisłości faktyczne, nieaktualne informacje lub halucynacje. Jesteś odpowiedzialny za weryfikację wszelkich krytycznych informacji, zwłaszcza w sytuacjach o wysokiej stawce, takich jak decyzje medyczne, prawne, finansowe lub krytyczne dla bezpieczeństwa. Odpowiedzi generowane przez AI nie zastępują profesjonalnych porad od wykwalifikowanych ekspertów.'
  nl: 'OpenMates gebruikt AI-modellen die onnauwkeurige, onvolledige of misleidende informatie kunnen genereren. Hoewel we ernaar streven fouten te minimaliseren, kunnen AI-antwoorden feitelijke onnauwkeurigheden, verouderde informatie of hallucinaties bevatten. U bent verantwoordelijk voor het verifiëren van kritieke informatie, met name in situaties met hoge inzet zoals medische, juridische, financiële of veiligheidskritische beslissingen. AI-gegenereerde antwoorden vervangen niet het professionele advies van gekwalificeerde experts.'
  ar: 'يستخدم OpenMates نماذج ذكاء اصطناعي قد تولد معلومات غير دقيقة أو غير مكتملة أو مضللة. بينما نسعى إلى تقليل الأخطاء، قد تحتوي ردود الذكاء الاصطناعي على معلومات خاطئة أو قديمة أو هلاوس. أنت مسؤول عن التحقق من أي معلومات حاسمة، خاصة في المواقف عالية المخاطر مثل القرارات الطبية أو القانونية أو المالية أو الحرجة للسلامة. لا تحل الردود التي يولدها الذكاء الاصطناعي محل المشورة المهنية من خبراء مؤهلين.'
  hi: 'OpenMates AI मॉडल का उपयोग करता है जो गलत, अधूरी या भ्रामक जानकारी उत्पन्न कर सकते हैं। हालांकि हम त्रुटियों को कम करने का प्रयास करते हैं, AI प्रतिक्रियाओं में तथ्यात्मक असंगतियां, पुरानी जानकारी या भ्रम हो सकता है। आप किसी भी महत्वपूर्ण जानकारी को सत्यापित करने के लिए जिम्मेदार हैं, विशेष रूप से उच्च-दांव वाली स्थितियों में जैसे चिकित्सा, कानूनी, वित्तीय या सुरक्षा-महत्वपूर्ण निर्णयों में। AI-जनित प्रतिक्रियाएं योग्य विशेषज्ञों जैसे वकीलों, डॉक्टरों या वित्तीय सलाहकारों से पेशेवर सलाह की जगह नहीं लेती हैं।'
  th: 'OpenMates ใช้โมเดล AI ที่อาจสร้างข้อมูลที่ไม่ถูกต้อง ไม่สมบูรณ์ หรือทำให้เข้าใจผิด แม้ว่าเราพยายามลดข้อผิดพลาด การตอบสนองของ AI อาจมีความไม่ถูกต้องเชิงข้อเท็จจริง ข้อมูลที่ล้าสมัย หรือภาพหลอน คุณมีหน้าที่รับผิดชอบในการตรวจสอบข้อมูลสำคัญใดๆ โดยเฉพาะอย่างยิ่งสำหรับสถานการณ์ที่มีความเสี่ยงสูง เช่น การตัดสินใจทางการแพทย์ กฎหมาย การเงิน หรือที่สำคัญต่อความปลอดภัย การตอบสนองที่สร้างโดย AI ไม่สามารถแทนที่คำแนะนำจากผู้เชี่ยวชาญที่มีคุณสมบัติ'
  cs: 'OpenMates používá modely AI, které mohou generovat nepřesné, neúplné nebo zavádějící informace. Ačkoliv se snažíme chyby minimalizovat, odpovědi AI mohou obsahovat faktické nepřesnosti, zastaralé informace nebo halucinace. Jste odpovědní za ověření jakýchkoliv kritických informací, zejména v situacích s vysokými sázkami, jako jsou lékařská, právní, finanční nebo bezpečnostně kritická rozhodnutí. Odpovědi generované AI nenahrazují odborné poradenství od kvalifikovaných expertů.'
  sv: 'OpenMates använder AI-modeller som kan generera felaktig, ofullständig eller vilseledande information. Även om vi strävar efter att minimera fel kan AI-svar innehålla faktafel, föråldrad information eller hallucinationer. Du är ansvarig för att verifiera kritisk information, särskilt i situationer med hög insats som medicinska, juridiska, finansiella eller säkerhetskritiska beslut. AI-genererade svar ersätter inte professionell rådgivning från kvalificerade experter.'
  verified_by_human: []
  he: OpenMates משתמשת במודלי AI שעלולים לייצר מידע לא מדויק, חלקי או מטעה. למרות שאנו שואפים למזער שגיאות, תגובות AI עלולות להכיל אי-דיוקים עובדתיים, מידע מיושן או הזיות. אתה אחראי לאמת כל מידע קריטי, במיוחד במצבים בעלי סיכון גבוה כגון החלטות רפואיות, משפטיות, פיננסיות או קריטיות לבטיחות. תגובות שנוצרו על ידי AI אינן מחליפות ייעוץ מקצועי ממומחים מוסמכים כגון עורכי דין, רופאים או יועצים פיננסיים.
