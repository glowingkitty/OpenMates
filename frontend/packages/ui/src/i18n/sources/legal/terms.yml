credits.description:
  context: Credits system explanation
  en: OpenMates uses a credit-based payment system. You purchase credit packs which are consumed when using AI services. Credits do not expire and remain in your account until used. Payment processing is handled by Stripe - see our Privacy Policy for details about payment data handling.
  de: 'OpenMates verwendet ein kreditbasiertes Zahlungssystem. Sie kaufen Kreditpakete, die beim Einsatz von KI-Diensten verbraucht werden. Credits verfallen nicht und bleiben auf Ihrem Konto, bis sie genutzt werden. Die Zahlungsabwicklung erfolgt über Stripe - Details zur Handhabung von Zahlungsdaten finden Sie in unserer Datenschutzerklärung.'
  zh: 'OpenMates 使用基于积分的支付系统。您购买积分包，在使用 AI 服务时消耗积分。积分不会过期，将保留在您的账户中直到使用。支付处理由 Stripe 负责 - 有关支付数据处理的详细信息，请参阅我们的隐私政策。'
  es: 'OpenMates utiliza un sistema de pago basado en créditos. Usted compra paquetes de créditos que se consumen al usar los servicios de IA. Los créditos no caducan y permanecen en su cuenta hasta que se usen. El procesamiento de pagos es gestionado por Stripe - consulte nuestra Política de Privacidad para obtener detalles sobre el manejo de datos de pago.'
  fr: 'OpenMates utilise un système de paiement basé sur des crédits. Vous achetez des packs de crédits qui sont consommés lors de l''utilisation des services d''IA. Les crédits n''expirent pas et restent dans votre compte jusqu''à leur utilisation. Le traitement des paiements est géré par Stripe - consultez notre Politique de Confidentialité pour plus de détails sur le traitement des données de paiement.'
  pt: 'O OpenMates usa um sistema de pagamento baseado em créditos. Você compra pacotes de créditos que são consumidos ao usar os serviços de IA. Os créditos não expiram e permanecem em sua conta até serem usados. O processamento de pagamentos é realizado pela Stripe - consulte nossa Política de Privacidade para detalhes sobre o tratamento de dados de pagamento.'
  ru: 'OpenMates использует кредитную систему оплаты. Вы покупаете пакеты кредитов, которые расходуются при использовании сервисов ИИ. Кредиты не истекают и остаются на вашем счёте до их использования. Обработка платежей осуществляется через Stripe — подробности об обращении с платёжными данными см. в нашей Политике конфиденциальности.'
  ja: 'OpenMatesはクレジットベースの支払いシステムを使用しています。AIサービスを使用する際に消費されるクレジットパックを購入します。クレジットは期限切れにならず、使用されるまでアカウントに残ります。支払い処理はStripeが担当しています。支払いデータの取り扱いについてはプライバシーポリシーをご参照ください。'
  ko: 'OpenMates는 크레딧 기반 결제 시스템을 사용합니다. AI 서비스를 사용할 때 소비되는 크레딧 팩을 구입합니다. 크레딧은 만료되지 않으며 사용될 때까지 계정에 남아 있습니다. 결제 처리는 Stripe에서 처리합니다. 결제 데이터 처리에 대한 자세한 내용은 개인정보 보호정책을 참조하세요.'
  it: 'OpenMates utilizza un sistema di pagamento basato su crediti. Acquisti pacchetti di crediti che vengono consumati quando usi i servizi AI. I crediti non scadono e rimangono nel tuo account fino all''utilizzo. L''elaborazione dei pagamenti è gestita da Stripe - consulta la nostra Informativa sulla Privacy per i dettagli sulla gestione dei dati di pagamento.'
  tr: 'OpenMates, kredi bazlı bir ödeme sistemi kullanmaktadır. AI hizmetlerini kullanırken tüketilen kredi paketleri satın alırsınız. Krediler sona ermez ve kullanılana kadar hesabınızda kalır. Ödeme işlemi Stripe tarafından yönetilmektedir - ödeme verisi işleme hakkında ayrıntılar için Gizlilik Politikamıza bakın.'
  vi: 'OpenMates sử dụng hệ thống thanh toán dựa trên tín dụng. Bạn mua các gói tín dụng được tiêu thụ khi sử dụng các dịch vụ AI. Tín dụng không hết hạn và vẫn trong tài khoản của bạn cho đến khi được sử dụng. Xử lý thanh toán được thực hiện bởi Stripe - xem Chính sách Bảo mật của chúng tôi để biết chi tiết về việc xử lý dữ liệu thanh toán.'
  id: 'OpenMates menggunakan sistem pembayaran berbasis kredit. Anda membeli paket kredit yang dikonsumsi saat menggunakan layanan AI. Kredit tidak kedaluwarsa dan tetap di akun Anda hingga digunakan. Pemrosesan pembayaran ditangani oleh Stripe - lihat Kebijakan Privasi kami untuk detail tentang penanganan data pembayaran.'
  pl: 'OpenMates korzysta z systemu płatności opartego na kredytach. Kupujesz pakiety kredytów, które są zużywane podczas korzystania z usług AI. Kredyty nie wygasają i pozostają na Twoim koncie do czasu ich wykorzystania. Przetwarzanie płatności jest obsługiwane przez Stripe - szczegóły dotyczące obsługi danych płatniczych znajdziesz w naszej Polityce Prywatności.'
  nl: 'OpenMates gebruikt een op credits gebaseerd betalingssysteem. U koopt creditpakketten die worden verbruikt bij het gebruik van AI-diensten. Credits verlopen niet en blijven in uw account tot ze worden gebruikt. Betalingsverwerking wordt afgehandeld door Stripe - zie ons Privacybeleid voor details over het verwerken van betalingsgegevens.'
  ar: 'يستخدم OpenMates نظام دفع قائم على الرصيد. تشتري حزم رصيد يتم استهلاكها عند استخدام خدمات الذكاء الاصطناعي. لا تنتهي صلاحية الرصيد ويبقى في حسابك حتى استخدامه. تتم معالجة الدفع بواسطة Stripe - راجع سياسة الخصوصية الخاصة بنا للحصول على تفاصيل حول معالجة بيانات الدفع.'
  hi: 'OpenMates एक क्रेडिट-आधारित भुगतान प्रणाली का उपयोग करता है। आप क्रेडिट पैक खरीदते हैं जो AI सेवाओं का उपयोग करते समय उपयोग होते हैं। क्रेडिट समाप्त नहीं होते और उपयोग होने तक आपके खाते में रहते हैं। भुगतान प्रसंस्करण Stripe द्वारा संभाला जाता है - भुगतान डेटा प्रबंधन के बारे में विवरण के लिए हमारी गोपनीयता नीति देखें।'
  th: 'OpenMates ใช้ระบบการชำระเงินแบบเครดิต คุณซื้อแพ็คเครดิตที่ใช้เมื่อใช้บริการ AI เครดิตไม่หมดอายุและยังคงอยู่ในบัญชีของคุณจนกว่าจะถูกใช้ การประมวลผลการชำระเงินดำเนินการโดย Stripe - ดูนโยบายความเป็นส่วนตัวของเราสำหรับรายละเอียดเกี่ยวกับการจัดการข้อมูลการชำระเงิน'
  cs: 'OpenMates používá kreditní platební systém. Kupujete kreditní balíčky, které se spotřebovávají při používání služeb AI. Kredity nevyprší a zůstávají na vašem účtu, dokud nejsou použity. Zpracování plateb zajišťuje Stripe - podrobnosti o zpracování platebních dat najdete v našich Zásadách ochrany osobních údajů.'
  sv: 'OpenMates använder ett kreditbaserat betalningssystem. Du köper kreditpaket som förbrukas när du använder AI-tjänster. Krediter löper inte ut och finns kvar på ditt konto tills de används. Betalningshantering sköts av Stripe - se vår integritetspolicy för detaljer om hantering av betalningsdata.'
  verified_by_human: []
  he: OpenMates משתמשת במערכת תשלומים מבוססת קרדיטים. אתה רוכש חבילות קרדיטים הנצרכות בעת שימוש בשירותי AI. הקרדיטים אינם פגים ונשארים בחשבונך עד לשימוש בהם. עיבוד התשלומים מתבצע על ידי Stripe - ראה מדיניות הפרטיות שלנו לפרטים על טיפול בנתוני תשלום.
credits.refund:
  context: Refund policy explanation
  en: 'Refund Policy: You may request a refund for unused credits within 14 days after purchase. Your right of withdrawal expires once credits are used. See our signup process for the full refund consent details.'
  de: 'Rückgaberecht: Sie können innerhalb von 14 Tagen nach dem Kauf eine Rückerstattung für ungenutzte Credits beantragen. Ihr Widerrufsrecht erlischt, sobald Credits verbraucht sind. Weitere Details zu den Rückgabebedingungen finden Sie in unserem Anmeldeprozess.'
  zh: '退款政策：您可以在购买后14天内申请退还未使用的积分。一旦积分被使用，您的撤回权即告终止。请参阅我们的注册流程了解完整的退款同意详情。'
  es: 'Política de reembolso: puede solicitar un reembolso de créditos no utilizados dentro de los 14 días posteriores a la compra. Su derecho de desistimiento expira una vez que se usan los créditos. Consulte nuestro proceso de registro para obtener los detalles completos del consentimiento de reembolso.'
  fr: 'Politique de remboursement : vous pouvez demander un remboursement pour les crédits non utilisés dans les 14 jours suivant l''achat. Votre droit de rétractation expire une fois les crédits utilisés. Consultez notre processus d''inscription pour les détails complets du consentement de remboursement.'
  pt: 'Política de reembolso: Você pode solicitar um reembolso por créditos não utilizados dentro de 14 dias após a compra. Seu direito de cancelamento expira uma vez que os créditos são usados. Consulte nosso processo de cadastro para os detalhes completos do consentimento de reembolso.'
  ru: 'Политика возврата: вы можете запросить возврат средств за неиспользованные кредиты в течение 14 дней после покупки. Право на отзыв истекает после использования кредитов. Полные условия согласия на возврат средств см. в процессе регистрации.'
  ja: '返金ポリシー：購入後14日以内に未使用クレジットの返金を申請できます。クレジットを使用した時点で撤回権は消滅します。返金同意の詳細についてはサインアッププロセスをご参照ください。'
  ko: '환불 정책: 구매 후 14일 이내에 미사용 크레딧에 대한 환불을 요청할 수 있습니다. 크레딧이 사용되면 철회권이 만료됩니다. 전체 환불 동의 세부 사항은 가입 프로세스를 참조하세요.'
  it: 'Politica di rimborso: è possibile richiedere un rimborso per i crediti inutilizzati entro 14 giorni dall''acquisto. Il diritto di recesso scade una volta che i crediti vengono utilizzati. Consulta il processo di registrazione per i dettagli completi del consenso al rimborso.'
  tr: 'İade Politikası: Satın alma işleminden sonra 14 gün içinde kullanılmamış krediler için iade talep edebilirsiniz. Cayma hakkınız, krediler kullanıldığında sona erer. Tam iade onay ayrıntıları için kayıt sürecimize bakın.'
  vi: 'Chính sách hoàn tiền: Bạn có thể yêu cầu hoàn tiền cho tín dụng chưa sử dụng trong vòng 14 ngày sau khi mua. Quyền rút lui của bạn hết hạn khi tín dụng được sử dụng. Xem quy trình đăng ký của chúng tôi để biết chi tiết đầy đủ về sự đồng ý hoàn tiền.'
  id: 'Kebijakan Pengembalian Dana: Anda dapat meminta pengembalian dana untuk kredit yang tidak digunakan dalam 14 hari setelah pembelian. Hak penarikan Anda berakhir setelah kredit digunakan. Lihat proses pendaftaran kami untuk detail lengkap persetujuan pengembalian dana.'
  pl: 'Polityka zwrotów: Możesz złożyć wniosek o zwrot pieniędzy za niewykorzystane kredyty w ciągu 14 dni od zakupu. Twoje prawo do odstąpienia wygasa po wykorzystaniu kredytów. Zobacz nasz proces rejestracji, aby uzyskać pełne szczegóły zgody na zwrot.'
  nl: 'Terugbetalingsbeleid: U kunt binnen 14 dagen na aankoop een terugbetaling aanvragen voor ongebruikte credits. Uw herroepingsrecht vervalt zodra credits zijn gebruikt. Zie ons aanmeldingsproces voor de volledige details van de terugbetalingstoestemming.'
  ar: 'سياسة الاسترداد: يمكنك طلب استرداد الرصيد غير المستخدم في غضون 14 يومًا من الشراء. ينتهي حق الانسحاب الخاص بك بمجرد استخدام الرصيد. انظر عملية التسجيل لدينا للحصول على تفاصيل موافقة الاسترداد الكاملة.'
  hi: 'वापसी नीति: आप खरीद के 14 दिनों के भीतर अप्रयुक्त क्रेडिट के लिए धनवापसी का अनुरोध कर सकते हैं। एक बार क्रेडिट का उपयोग होने पर आपका वापसी अधिकार समाप्त हो जाता है। पूर्ण वापसी सहमति विवरण के लिए हमारी साइनअप प्रक्रिया देखें।'
  th: 'นโยบายการคืนเงิน: คุณสามารถขอคืนเงินสำหรับเครดิตที่ยังไม่ได้ใช้ภายใน 14 วันหลังการซื้อ สิทธิ์การถอนของคุณหมดอายุเมื่อมีการใช้เครดิต ดูกระบวนการลงทะเบียนของเราสำหรับรายละเอียดความยินยอมการคืนเงินฉบับเต็ม'
  cs: 'Zásady vrácení peněz: Můžete požádat o vrácení peněz za nevyužité kredity do 14 dnů od nákupu. Vaše právo na odstoupení zaniká, jakmile jsou kredity použity. Podrobnosti o souhlasu s vrácením peněz najdete v procesu registrace.'
  sv: 'Återbetalningspolicy: Du kan begära återbetalning för oanvända credits inom 14 dagar efter köpet. Din ångerrätt upphör när credits används. Se vår registreringsprocess för fullständiga detaljer om återbetalningssamtycket.'
  verified_by_human: []
  he: 'מדיניות החזרים: ניתן לבקש החזר כספי עבור קרדיטים שלא נוצלו תוך 14 יום מהרכישה. זכות הביטול שלך פוקעת לאחר שהקרדיטים נוצלו. עיין בתהליך ההרשמה שלנו לפרטים מלאים על הסכמת ההחזר.'
