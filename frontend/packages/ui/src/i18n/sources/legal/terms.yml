disclaimer.description:
  context: Disclaimer explanation
  en: The materials and information on this Website and the OpenMates service are provided 'as is' and without warranties of any kind. We do not guarantee the accuracy, completeness, or usefulness of any information provided by OpenMates. AI-generated responses may contain errors, inaccuracies, or outdated information. Any reliance you place on such information is strictly at your own risk.
