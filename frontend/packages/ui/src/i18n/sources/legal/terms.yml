  en: The OpenMates name and logo are trademarks of the service operator (see Imprint). The OpenMates software is available under AGPL-3.0 license - see our [GitHub repository](https://github.com/glowingkitty/OpenMates) for full license terms. We do not claim copyright on any AI-generated responses. You retain ownership of your prompts and data. We never train AI models on user data.
  de: Der OpenMates-Name, das Logo und alle zugehörigen Inhalte auf dieser Website sind geistiges Eigentum des Website-Betreibers (siehe Impressum) und durch geltende Urheber- und Markenrechte geschützt. Sobald das Projekt zu Open-Source übergeht, werden spezifische Lizenzbedingungen separat durch entsprechende Open-Source-Dokumentation bereitgestellt.
  zh: OpenMates 名称、徽标和本网站上的所有相关内容均为网站所有者（参见版本说明）的知识产权，并受适用的版权和商标法保护。 一旦项目过渡到开源，将通过适当的开源文档单独提供具体的许可条款。
  es: El nombre OpenMates, el logotipo y todo el contenido relacionado en este sitio web son propiedad intelectual del propietario del sitio web (ver Aviso legal) y están protegidos por las leyes de derechos de autor y marcas registradas aplicables. Una vez que el proyecto pase a ser de código abierto, se proporcionarán términos de licencia específicos por separado a través de la documentación de código abierto apropiada.
  fr: Le nom OpenMates, le logo et tout le contenu associé sur ce site web sont la propriété intellectuelle du propriétaire du site web (voir Mentions légales) et sont protégés par les lois applicables sur le droit d'auteur et les marques. Une fois que le projet sera passé en open-source, des conditions de licence spécifiques seront fournies séparément par le biais d'une documentation open-source appropriée.
  pt: 'O nome e logo do OpenMates são marcas registradas do operador do serviço (ver Impressum). O software OpenMates está disponível sob licença AGPL-3.0 - veja nosso [repositório GitHub](https://github.com/glowingkitty/OpenMates) para termos de licença completos. Não reivindicamos direitos autorais sobre quaisquer respostas geradas por IA. Você retém a propriedade de seus prompts e dados. Nunca treinamos modelos de IA com dados de usuários.'
  ru: 'Название и логотип OpenMates являются торговыми марками оператора сервиса (см. Импрессум). Программное обеспечение OpenMates доступно по лицензии AGPL-3.0 — полные условия лицензии см. в нашем [репозитории GitHub](https://github.com/glowingkitty/OpenMates). Мы не претендуем на авторские права на ответы, сгенерированные ИИ. Ваши запросы и данные остаются вашей собственностью. Мы никогда не обучаем модели ИИ на данных пользователей.'
  ja: OpenMatesの名称、ロゴ、およびこのウェブサイト上のすべての関連コンテンツは、ウェブサイト運営者（インプリントを参照）の知的財産であり、適用される著作権法および商標法によって保護されています。プロジェクトがオープンソースに移行した際には、具体的なライセンス条件が適切なオープンソースドキュメントを通じて別途提供されます。
  ko: 'OpenMates 이름과 로고는 서비스 운영자의 상표입니다(Imprint 참조). OpenMates 소프트웨어는 AGPL-3.0 라이선스 하에 제공됩니다 - 전체 라이선스 조건은 [GitHub 저장소](https://github.com/glowingkitty/OpenMates)를 참조하세요. AI가 생성한 답변에 대한 저작권을 주장하지 않습니다. 귀하의 프롬프트와 데이터의 소유권은 귀하에게 있습니다. 사용자 데이터로 AI 모델을 훈련하지 않습니다.'
  it: 'Il nome e il logo di OpenMates sono marchi registrati dell''operatore del servizio (vedi Imprint). Il software OpenMates è disponibile sotto licenza AGPL-3.0 - vedi il nostro [repository GitHub](https://github.com/glowingkitty/OpenMates) per i termini completi della licenza. Non rivendichiamo il copyright su alcuna risposta generata dall''AI. Mantieni la proprietà dei tuoi prompt e dati. Non addestriamo mai modelli AI sui dati degli utenti.'
  tr: 'OpenMates adı ve logosu, hizmet operatörünün ticari markalarıdır (bkz. Künye). OpenMates yazılımı AGPL-3.0 lisansı altında mevcuttur - tam lisans koşulları için [GitHub depomuza](https://github.com/glowingkitty/OpenMates) bakın. AI tarafından oluşturulan yanıtlar üzerinde telif hakkı talep etmiyoruz. İstemleriniz ve verilerinizin sahipliği size aittir. Kullanıcı verilerini kullanarak AI modellerini asla eğitmeyiz.'
  vi: 'Tên và logo OpenMates là thương hiệu của nhà điều hành dịch vụ (xem Imprint). Phần mềm OpenMates có sẵn theo giấy phép AGPL-3.0 - xem [kho lưu trữ GitHub](https://github.com/glowingkitty/OpenMates) để biết điều khoản giấy phép đầy đủ. Chúng tôi không yêu cầu bản quyền đối với bất kỳ phản hồi nào do AI tạo ra. Bạn giữ quyền sở hữu các lời nhắc và dữ liệu của mình. Chúng tôi không bao giờ huấn luyện mô hình AI trên dữ liệu người dùng.'
  id: 'Nama dan logo OpenMates adalah merek dagang dari operator layanan (lihat Imprint). Perangkat lunak OpenMates tersedia di bawah lisensi AGPL-3.0 - lihat [repositori GitHub](https://github.com/glowingkitty/OpenMates) kami untuk ketentuan lisensi lengkap. Kami tidak mengklaim hak cipta atas respons yang dihasilkan AI. Anda mempertahankan kepemilikan atas prompt dan data Anda. Kami tidak pernah melatih model AI pada data pengguna.'
  pl: 'Nazwa i logo OpenMates są znakami towarowymi operatora usługi (patrz Impressum). Oprogramowanie OpenMates jest dostępne na licencji AGPL-3.0 - pełne warunki licencji znajdziesz w naszym [repozytorium GitHub](https://github.com/glowingkitty/OpenMates). Nie rościmy sobie praw autorskich do żadnych odpowiedzi generowanych przez AI. Zachowujesz własność swoich promptów i danych. Nigdy nie trenujemy modeli AI na danych użytkowników.'
  nl: 'De naam en het logo van OpenMates zijn handelsmerken van de servicebeheerder (zie Impressum). De OpenMates-software is beschikbaar onder AGPL-3.0-licentie - zie ons [GitHub-repository](https://github.com/glowingkitty/OpenMates) voor volledige licentievoorwaarden. Wij claimen geen auteursrecht op door AI gegenereerde antwoorden. U behoudt de eigendom van uw prompts en gegevens. Wij trainen nooit AI-modellen op gebruikersgegevens.'
  ar: 'اسم وشعار OpenMates هما علامتان تجاريتان لمشغل الخدمة (انظر Imprint). برنامج OpenMates متاح بموجب ترخيص AGPL-3.0 - راجع [مستودع GitHub](https://github.com/glowingkitty/OpenMates) لشروط الترخيص الكاملة. لا ندعي حق المؤلف على أي ردود يولدها الذكاء الاصطناعي. تحتفظ بملكية مطالباتك وبياناتك. لا ندرّب نماذج الذكاء الاصطناعي أبدًا على بيانات المستخدمين.'
  hi: 'OpenMates का नाम और लोगो सेवा संचालक के ट्रेडमार्क हैं (Imprint देखें)। OpenMates सॉफ्टवेयर AGPL-3.0 लाइसेंस के तहत उपलब्ध है - पूर्ण लाइसेंस शर्तों के लिए हमारा [GitHub रिपॉजिटरी](https://github.com/glowingkitty/OpenMates) देखें। हम AI-जनित प्रतिक्रियाओं पर कोई कॉपीराइट का दावा नहीं करते। आप अपने प्रॉम्प्ट और डेटा का स्वामित्व बनाए रखते हैं। हम कभी भी उपयोगकर्ता डेटा पर AI मॉडल प्रशिक्षित नहीं करते।'
  th: 'ชื่อและโลโก้ของ OpenMates เป็นเครื่องหมายการค้าของผู้ดำเนินการบริการ (ดู Imprint) ซอฟต์แวร์ OpenMates มีให้ใช้งานภายใต้ลิขสิทธิ์ AGPL-3.0 - ดู[ที่เก็บ GitHub](https://github.com/glowingkitty/OpenMates) สำหรับเงื่อนไขลิขสิทธิ์ฉบับเต็ม เราไม่อ้างสิทธิ์ลิขสิทธิ์ใดๆ สำหรับคำตอบที่สร้างโดย AI คุณยังคงเป็นเจ้าของคำขอและข้อมูลของคุณ เราไม่เคยฝึกโมเดล AI บนข้อมูลผู้ใช้'
  cs: 'Název a logo OpenMates jsou ochranné známky provozovatele služby (viz Imprint). Software OpenMates je dostupný pod licencí AGPL-3.0 - úplné podmínky licence naleznete v našem [repozitáři GitHub](https://github.com/glowingkitty/OpenMates). Nenárokujeme si autorská práva na žádné odpovědi generované AI. Zachováváte vlastnictví svých dotazů a dat. Nikdy netrénujeme modely AI na uživatelských datech.'
  sv: 'OpenMates namn och logotyp är varumärken som tillhör tjänsteleverantören (se Impressum). OpenMates-programvaran är tillgänglig under AGPL-3.0-licens - se vårt [GitHub-repository](https://github.com/glowingkitty/OpenMates) för fullständiga licensvillkor. Vi gör inga upphovsrättsanspråk på AI-genererade svar. Du behåller äganderätten till dina prompts och data. Vi tränar aldrig AI-modeller på användardata.'
  verified_by_human: []
  he: שם OpenMates והלוגו הם סימנים מסחריים של מפעיל השירות (ראה אימפרינט). תוכנת OpenMates זמינה תחת רישיון AGPL-3.0 - ראה [מאגר GitHub](https://github.com/glowingkitty/OpenMates) לתנאי הרישיון המלאים. איננו תובעים זכויות יוצרים על תגובות שנוצרו על ידי AI. אתה שומר על הבעלות על ההנחיות והנתונים שלך. איננו מאמנים לעולם מודלי AI על נתוני משתמשים.
