agreement.description:
  context: Agreement explanation
  en: By accessing and using the OpenMates website ("Website"), you accept and agree to be bound by these Terms and Conditions. If you disagree with any part of these terms, you may not access the Website.
  de: Durch den Zugriff auf und die Nutzung der OpenMates-Website ("Website") akzeptieren Sie diese Allgemeinen Geschäftsbedingungen und erklären sich damit einverstanden, an diese gebunden zu sein. Wenn Sie mit einem Teil dieser Bedingungen nicht einverstanden sind, dürfen Sie nicht auf die Website zugreifen.
  zh: 访问和使用 OpenMates 网站（“网站”），即表示您接受并同意受这些条款和条件的约束。 如果您不同意这些条款的任何部分，则不得访问本网站。
  es: Al acceder y utilizar el sitio web de OpenMates ("Sitio web"), acepta y se compromete a cumplir estos Términos y condiciones. Si no está de acuerdo con alguna parte de estos términos, no puede acceder al Sitio web.
  fr: En accédant et en utilisant le site web OpenMates ("Site web"), vous acceptez et consentez à être lié par ces Conditions générales d'utilisation. Si vous n'êtes pas d'accord avec une partie de ces conditions, vous ne pouvez pas accéder au Site web.
  pt: 'Ao acessar e usar o site do OpenMates ("Site"), você aceita e concorda em ficar vinculado a estes Termos e Condições. Se você discordar de qualquer parte destes termos, não poderá acessar o Site.'
  ru: 'Получая доступ к веб-сайту OpenMates ("Веб-сайт") и используя его, вы принимаете и соглашаетесь соблюдать настоящие Условия и положения. Если вы не согласны с какой-либо частью этих условий, вы не можете получить доступ к Веб-сайту.'
  ja: OpenMatesウェブサイト（以下「ウェブサイト」）にアクセスし利用することで、あなたはこれらの利用規約に同意し、拘束されることを承諾するものとします。これらの規約の一部に同意できない場合は、ウェブサイトにアクセスすることはできません。
  ko: 'OpenMates 웹사이트("웹사이트")에 접속하고 사용함으로써 귀하는 이 이용 약관에 동의하고 구속받는 것을 수락합니다. 이 약관의 어떤 부분에도 동의하지 않으면 웹사이트에 접속할 수 없습니다.'
  it: 'Accedendo e utilizzando il sito web OpenMates (''Sito web''), accetti e acconsenti ad essere vincolato da questi Termini e Condizioni. Se non sei d''accordo con qualsiasi parte di questi termini, non puoi accedere al Sito web.'
  tr: 'OpenMates web sitesine (''Web sitesi'') erişerek ve kullanarak, bu Şartlar ve Koşulları kabul etmiş ve bunlarla bağlı olmayı onaylamış olursunuz. Bu şartların herhangi bir bölümüne katılmıyorsanız, Web sitesine erişemezsiniz.'
  vi: 'Bằng cách truy cập và sử dụng trang web OpenMates ("Trang web"), bạn chấp nhận và đồng ý bị ràng buộc bởi các Điều Khoản và Điều Kiện này. Nếu bạn không đồng ý với bất kỳ phần nào của các điều khoản này, bạn không được truy cập Trang web.'
  id: 'Dengan mengakses dan menggunakan situs web OpenMates ("Situs web"), Anda menerima dan setuju untuk terikat dengan Syarat dan Ketentuan ini. Jika Anda tidak setuju dengan bagian mana pun dari ketentuan ini, Anda tidak dapat mengakses Situs web.'
  pl: 'Uzyskując dostęp do strony internetowej OpenMates ("Strona") i korzystając z niej, akceptujesz niniejszy Regulamin i zgadzasz się nim związać. Jeśli nie zgadzasz się z jakąkolwiek częścią tych warunków, nie możesz korzystać ze Strony.'
  nl: 'Door de OpenMates-website ("Website") te bezoeken en te gebruiken, aanvaardt u deze Algemene Voorwaarden en gaat u ermee akkoord hieraan gebonden te zijn. Als u het niet eens bent met enig deel van deze voorwaarden, mag u de Website niet bezoeken.'
  ar: 'بالوصول إلى موقع OpenMates ("الموقع") واستخدامه، فإنك تقبل وتوافق على الالتزام بهذه الشروط والأحكام. إذا كنت لا توافق على أي جزء من هذه الشروط، فلا يمكنك الوصول إلى الموقع.'
  hi: 'OpenMates वेबसाइट ("वेबसाइट") तक पहुंचने और उपयोग करने से, आप इन नियमों और शर्तों से बाध्य होने के लिए स्वीकार और सहमत होते हैं। यदि आप इन शर्तों के किसी भी हिस्से से असहमत हैं, तो आप वेबसाइट तक नहीं पहुंच सकते।'
  th: 'โดยการเข้าถึงและใช้เว็บไซต์ OpenMates ("เว็บไซต์") คุณยอมรับและตกลงที่จะผูกพันตามข้อกำหนดและเงื่อนไขเหล่านี้ หากคุณไม่เห็นด้วยกับส่วนใดส่วนหนึ่งของข้อกำหนดเหล่านี้ คุณไม่สามารถเข้าถึงเว็บไซต์ได้'
  cs: 'Přístupem na webové stránky OpenMates ("Webové stránky") a jejich používáním přijímáte tyto Obchodní podmínky a souhlasíte s tím, že jimi budete vázáni. Pokud nesouhlasíte s jakoukoliv částí těchto podmínek, nesmíte Webové stránky navštěvovat.'
  sv: 'Genom att komma åt och använda OpenMates webbplats ("Webbplats") accepterar du och samtycker till att vara bunden av dessa Villkor och bestämmelser. Om du inte håller med om någon del av dessa villkor får du inte komma åt Webbplatsen.'
  verified_by_human: []
  he: בגישתך לאתר OpenMates ("האתר") ובשימוש בו, אתה מקבל ומסכים להיות מחויב לתנאים והגבלות אלה. אם אינך מסכים לאיזה מחלקי תנאים אלה, אינך רשאי לגשת לאתר.
