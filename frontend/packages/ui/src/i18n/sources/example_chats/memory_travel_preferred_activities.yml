message_2:
  context: "assistant message 2 in example chat: Preferred travel activity memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "4acacb44-fb75-4e5b-a3a4-206c21586469", "app_id": "images", "skill_id": "search", "query": "vibrant local food market stalls street food tour guide", "provider": "Brave Search"}
    ```
    
    Based on what you've shared in your [travel activities](/#settings/app_store/travel/settings_memories/preferred_activities), you have a clear preference for authentic culinary experiences, specifically **local food markets** and **small local food tours**. 
    
    When exploring a new city, you would likely find a "Flavor & Folklore" afternoon to be the most fulfilling. Here is a plan tailored to your interests:
    
    ### Your Ideal Afternoon Itinerary
    *   **2:00 PM: The Market Immersion** 
        Head to the city's oldest public market. Instead of just browsing the tourist stalls, look for where the locals are buying their daily produce or [gourmet](wiki:Gourmet) specialties. This is often where you'll find the most authentic atmosphere and unique regional ingredients.
    *   **4:00 PM: Guided Small-Group Tasting**
        Join a curated [street food](wiki:Street_food) tour with a local guide. Since you prefer small groups, this allows for a more intimate conversation about the history of the dishes and the culture of the neighborhood.
    *   **7:00 PM: The "Insider" Follow-up**
        End your afternoon at a small, family-run eatery that your guide pointed out during the tour—one that isn't featured in the major guidebooks.
    
    [!](embed:getyourguide.com-mPV)
    [!](embed:getyourguide.com-BGS)
    [!](embed:veronikasadventure.com-BOC)
    [!](embed:veronikasadventure.com-qG4)
    
    Exploring through food is a wonderful way to build a sense of [belonging](wiki:Belongingness) in a new place, as it connects you directly with the people and traditions that make a city unique.
    
    ```interactive_question
    {
      "type": "input",
      "id": "city_selection",
      "fields": [
        {
          "id": "destination",
          "label": "Is there a specific city you're planning to visit soon?",
          "placeholder": "e.g., Tokyo, Mexico City, Lisbon...",
          "required": true
        }
      ]
    }
    ```json
    {"type": "code", "embed_id": "2ede2ca2-f05d-4e5d-a49b-00f13ffd13b1"}
    ```
    
    
