message_2:
  context: "assistant message 2 in example chat: Summarize recent business finances. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: &message_2_en |
    ```json
    {"type": "app_skill_use", "embed_id": "cdffac4e-8176-40f0-a286-e0b98fff36f6", "app_id": "finance", "skill_id": "check_accounts", "provider": "Revolut Business", "period": "past 3 months"}
    ```

    Your business has a healthy recent cash position across the last 3 months.

    ### Financial snapshot
    * **Total value:** 30,842.58 EUR
    * **Income:** 26,000.00 EUR
    * **Expenses:** 4,129.42 EUR
    * **Net [cash flow](wiki:Cash_flow):** +21,870.58 EUR

    Revenue stayed consistent month to month, while expenses remained concentrated in software, contractors, marketing, and travel. The strongest month was June, with +8,459.80 EUR net cash flow.

    The fullscreen Finance embed shows the monthly graph, account balances, filters, and the redacted transaction list using placeholders such as [MERCHANT_SOFTWARE_001] instead of raw merchant names.

    *This is informational analysis, not financial, tax, or investment advice.*
