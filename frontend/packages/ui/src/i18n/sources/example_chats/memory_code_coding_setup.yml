message_2:
  context: "assistant message 2 in example chat: Coding setup memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your [coding setup preferences](/#settings/app_store/code/settings_memories/coding_setup) for a keyboard-first, **terminal-based** workflow with **low AI intervention**, here is a structured approach for your debugging session tonight. 
    
    Since you prefer **explicit commands** and **small diffs** you can review manually, this workflow focuses on local isolation and CLI-native tools.
    
    ### 1. State Isolation & Clean Slate
    Before changing any code, ensure you are working in a clean environment to make those "small diffs" meaningful.
    *   **Create a dedicated branch:** `git checkout -b debug/session-name`
    *   **Clear artifacts:** Run your project's clean command (e.g., `make clean`, `npm cache clean`, or `cargo clean`) to ensure you aren't chasing ghosts in compiled binaries.
    
    ### 2. The "Single-Command" Reproduction
    In line with your shell-first preference, your first goal is to reduce the bug to a single [shell](wiki:Shell_(computing)) command or a minimal script.
    *   **Draft a reproduction script:** Create a `repro.sh` that sets up the environment and triggers the failure.
    *   **Automate the test:** Use `watch` or a simple loop to run this command as you make changes:
        ```json
    {"type": "code", "embed_id": "2ff43224-0546-4f2f-ba70-3b305c2ed9f8"}
    ```
    
    
    
    ### 3. Explicit Trace & Observation
    Since you prefer a **low AI level**, rely on explicit [debugging](wiki:Debugging) and tracing tools rather than speculative fixes:
    *   **CLI Debuggers:** Use `gdb`, `lldb`, `pdb`, or `node inspect` depending on your language.
    *   **System Tracing:** If the bug involves file I/O or networking, use `strace` (Linux) or `dtrace` (macOS) to see exactly what the process is doing at the kernel level.
    *   **Grep-driven search:** Use `rg` (ripgrep) to explicitly trace data flow through your codebase from the terminal.
    
    ### 4. Incremental Patching & Diff Review
    To honor your preference for **small, reviewable diffs**:
    *   **Atomic Changes:** Make exactly one change at a time.
    *   **Review before Commit:** Use `git diff --color-words` to see exactly what changed in the terminal.
    *   **The "Check-in" Loop:**
        1.  Modify code in your [text editor](wiki:Text_editor) (likely Vim/Emacs/Nano given your keyboard-first preference).
        2.  Run `./repro.sh`.
        3.  If successful, commit the focused change. If it fails, inspect `git diff`, revert only the specific hunks you decide to abandon, and try a different hypothesis.
    
    ### 5. Final Verification
    Once the bug is squashed, convert your `repro.sh` into a permanent [unit test](wiki:Unit_testing) to prevent [regression](wiki:Software_regression).
    
    ***
    
    To help me give you more specific commands or tool suggestions, tell me what kind of issue you are tackling tonight: logic error, crash, environment/dependency issue, or performance bottleneck.

    ```json
    {"type": "code", "embed_id": "7d40d5c4-1ee4-4aec-ba2a-d55734f769bc"}
    ```
    
    
