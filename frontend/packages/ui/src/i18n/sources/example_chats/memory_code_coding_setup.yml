message_2:
  context: "assistant message 2 in example chat: Memory Code Coding Setup. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved coding setup, which prioritizes a **terminal-based workspace**, **low AI automation**, and a **keyboard-first** manual workflow, here is a suggested structure for your debugging session tonight.
    
    ### 1. Preparation: Terminal Environment
    Since you prefer explicit commands and keyboard-first work, start by setting up your [Tmux](wiki:Tmux) or terminal panes to keep your context visible without switching windows:
    *   **Pane A:** The active editor ([Vim](wiki:Vim) or [Nano](wiki:GNU_Nano)) for code inspection.
    *   **Pane B:** A continuous log tail or test runner (e.g., `tail -f logs/debug.log` or a file watcher).
    *   **Pane C:** The active debugger or shell for manual command execution.
    
    ### 2. Isolation: Small Diffs & Manual Reproduction
    In line with your preference for small diffs and manual review, avoid broad changes. Focus on creating a minimal reproduction script:
    *   Create a temporary test case that isolates the failure.
    *   Use explicit `diff` commands between your current state and a known-good commit to verify exactly what has changed in the environment.
    
    ### 3. Investigation: Explicit Debugging Commands
    Because you prefer low AI intervention and manual review, use high-granularity tools rather than automated "fix-it" scripts:
    *   **Tracepoints:** Manually insert logging at specific execution boundaries.
    *   **Step-through:** Use CLI debuggers (like `gdb`, `pdb`, or `node inspect`) to manually step through the logic. 
    *   **Manual Review:** Before applying any fix, use `git diff` to review the change line-by-line, ensuring no unintended side effects are introduced by the correction.
    
    ### 4. Resolution: Incremental Validation
    Once a potential fix is identified, apply it as a single, focused change:
    *   Run your isolation script from Phase 2.
    *   Verify the fix via explicit CLI commands rather than a full CI/CD suite until you are satisfied with the manual review.
    *   Commit with a detailed message describing the manual verification steps taken, honoring your preference for explicit control over the development cycle.
