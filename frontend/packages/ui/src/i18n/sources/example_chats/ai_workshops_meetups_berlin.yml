    ```

    ```json
    {"type": "app_skill_use", "embed_id": "c7b51044-a947-4471-a287-496459454ad6", "app_id": "web", "skill_id": "search", "query": "Berlin AI builder communities and recurring workshops", "provider": "Brave"}
    ```

    Berlin has one of Europe's most active [AI](wiki:Artificial_intelligence) builder scenes, transitioning from general theory to practical "hands-on" engineering. For someone learning to build with AI tools, the focus in June 2026 is heavily on [AI agents](wiki:Software_agent), [RAG (Retrieval-Augmented Generation)](wiki:Retrieval-augmented_generation), and production-ready architectures.

    Here are the top upcoming workshops and meetups in Berlin where you can build, demo, and learn from other practitioners.

    ### Featured Hands-On Workshops
    These sessions are specifically designed for those who want to write code and build prototypes.

    *   **BLISS x QuantCo: Build Your Own AI Agent**
        *   **Date:** June 10, 2026 | 17:30
        *   **Location:** Berlin-Mitte (Altonaer Str. 26)
        *   **Focus:** An interactive session transitioning from [LLM APIs](wiki:Large_language_model) to building a custom agent that automates complex document workflows. **Bring your laptop.**
        *   [Event Details & RSVP](embed:bliss-x-quantco-dWg)
    *   **Open Source Europe Tour: AI in Practice**
        *   **Date:** June 8, 2026 | 17:30
        *   **Location:** Netlight Consulting (Invalidenstraße 117)
        *   **Focus:** A "hype-free" walkthrough of modern AI, explaining Agentic AI, fine-tuning vs. RAG, and connecting AI to data architectures.
        *   [Event Details & RSVP](embed:open-source-europe-S4k)
    *   **AI Future-Club Kickoff (Hackers / Founders)**
        *   **Date:** June 11, 2026 | 18:00
        *   **Location:** TBD (Berlin)
        *   **Focus:** A session for developers to "get their hands dirty," discussing what to build and ship together, featuring live demos of recent projects.
        *   [Event Details & RSVP](embed:ai-future-club-XOk)

    ### Community Meetups for Builders
    These events are excellent for networking and seeing what other local developers are currently building.

    *   **OpenClaw Anonymous Berlin #9**
        *   **Date:** June 9, 2026 | 19:00
        *   **Location:** w3.hub (Möckernstraße 120)
        *   **Focus:** Informal "laptop-out" meetup where people showcase OpenClaw and AI agent setups. Perfect for sharing what works and what doesn't.
        *   [Event Details & RSVP](embed:openclaw-anonymous-berlin-JA8)
    *   **AI Tinkerers Berlin**
        *   **Date:** June 17, 2026
        *   **Focus:** A screened, demo-first, "no-pitch" community. Expect live code, architecture lessons, and technical Q&A from local founders and engineers.
        *   Berlin AI Tinkerers Portal
    *   **Spec-Driven Development: AI for Full-Stack Java**
        *   **Date:** June 9, 2026 | 18:30
        *   **Location:** Capgemini (Potsdamer Platz 5)
        *   **Focus:** Learning how AI can generate code, diagrams, and tests from structured specifications.
        *   [Event Details & RSVP](embed:spec-driven-development-rxI)

    ### Key Hubs to Follow
    If you want to stay in the loop, these organizations host the majority of builder-centric AI events in Berlin:

    *   **Merantix AI Campus**: Located in Nord-Mitte, this 6,000m² campus is the heart of the Berlin AI ecosystem, hosting weekly reading groups and tech talks.
        *   Campus Events Calendar
    *   **BLISS (Berlin AI Community)**: A student and professional community that organizes high-quality workshops and speaker series.
        *   BLISS Official Site
    *   **[CODE University](wiki:CODE_University_of_Applied_Sciences)**: Often hosts "Global AI Bootcamps" and hands-on sessions for students and the public at their Delta Campus in Neukölln.

    ### Practical Tips for Joining
    1.  **RSVP Early:** Many of these events (especially the BLISS and Tinkerers sessions) have limited spots and require screening or early registration.
    2.  **Bring a Laptop:** Most "workshops" expect you to follow along with code. Ensure you have a local environment or a [GitHub](wiki:GitHub) account ready.
    3.  **Join the Slacks:** Groups like AI Tinkerers and [Hackers/Founders](/#settings/apps/web) have local Slack/Discord channels where most "last-minute" build sessions are organized.

    Would you like me to help you find more specific resources for a particular AI tool you're learning, such as [PyTorch](wiki:PyTorch) or [LangChain](wiki:LangChain)?

    **Next Steps:**
    - [Browse more AI events in Berlin](/#settings/apps/events)
    - [Search for AI tutorials on YouTube](/#settings/apps/videos)
