    以下是本周（2026年5月25日至31日）学习更有效地使用 AI 工具的主要活动：
    
    ### 5月26日，星期二
    *   **[From RAG to AI Agents: Function Calling and Tool Use](embed:from-rag-to-RMQ)**（线上）
        *   **时间：** 11:30 – 13:00
        *   **重点：** 关于将简单的 RAG（检索增强生成）设置转变为能够调用外部工具并决定何时搜索或回答的自主智能体的实操技术研讨会。
    *   **[WTM Berlin x SPICED Academy: AI & Tech Careers](embed:wtm-berlin-x-H4s)**（线下：Ritterstrasse 12, Kreuzberg）
        *   **时间：** 18:00 – 21:00
        *   **重点：** 包含一场关于“高效智能体系统”的演讲，探讨如何将经典机器学习与 [LLM](wiki:Large_language_model) 驱动的智能体相结合，以实现更快、更可靠的工作流程。
    *   **[OpenClaw Anonymous Berlin #8](embed:openclaw-anonymous-berlin-O0V)**（线下：Möckernstraße 120, Kreuzberg）
        *   **时间：** 19:00 – 21:00
        *   **重点：** 一个非正式的、适合携带笔记本电脑的聚会，开发者们在这里展示他们的 AI 智能体设置，并分享在实际应用中哪些方法有效（以及哪些无效）。
    
    ### 5月27日，星期三
    *   **[Build Smarter AI: GraphRAG & Generative AI Workshop](embed:build-smarter-ai-R7C)**（线下：Harzer Straße 42, Neukölln）
        *   **时间：** 16:00 – 19:00
        *   **重点：** 在 [42 Berlin](wiki:42_(school)) 举行、由讲师指导的实操环节，重点是利用图数据库减少幻觉并改进上下文。
    *   **[Theory Meets Practice #4: Explainable Scientific Discovery with AI Memory](embed:theory-meets-practice-QSp)**（线下：Marchstraße 23, Charlottenburg）
        *   **时间：** 17:45 – 19:45
        *   **重点：** 在 [TU Berlin](wiki:Technical_University_of_Berlin) 举行的互动环节，探讨如何使用智能体 AI 连接不同科学领域的证据并生成假设。
    *   **[Beyond Prompts: Building Agents that actually work](embed:beyond-prompts-building-N0H)**（线下：Heidestraße 34, Moabit）
        *   **时间：** 18:00 – 20:45
        *   **重点：** 深入探讨“上下文工程”，以及为什么数据相关性比巧妙的 [prompt engineering](wiki:Prompt_engineering) 技巧更重要。
