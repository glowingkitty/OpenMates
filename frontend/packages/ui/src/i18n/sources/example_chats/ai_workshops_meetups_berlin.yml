    ```
    
    Berlin has a very active AI scene this week, with several workshops and meetups specifically focused on moving "beyond prompts" to build and use more sophisticated agentic systems.
    
    Here are the key events happening this week (May 25–31, 2026) for learning to use AI tools more effectively:
    
    ### Tuesday, May 26
    *   **[From RAG to AI Agents: Function Calling and Tool Use](embed:from-rag-to-RMQ)** (Online)
        *   **Time:** 11:30 – 13:00
        *   **Focus:** A hands-on technical workshop on turning simple RAG (Retrieval-Augmented Generation) setups into autonomous agents that can call external tools and decide when to search vs. answer.
    *   **[WTM Berlin x SPICED Academy: AI & Tech Careers](embed:wtm-berlin-x-H4s)** (Physical: Ritterstrasse 12, Kreuzberg)
        *   **Time:** 18:00 – 21:00
        *   **Focus:** Features a talk on "Efficient Agentic Systems," exploring how to combine classical machine learning with [LLM](wiki:Large_language_model)-powered agents for faster, more reliable workflows.
    *   **[OpenClaw Anonymous Berlin #8](embed:openclaw-anonymous-berlin-O0V)** (Physical: Möckernstraße 120, Kreuzberg)
        *   **Time:** 19:00 – 21:00
        *   **Focus:** An informal, laptop-friendly meetup where builders showcase their AI agent setups and share what works (and what doesn't) in real-world application.
    
    ### Wednesday, May 27
    *   **[Build Smarter AI: GraphRAG & Generative AI Workshop](embed:build-smarter-ai-R7C)** (Physical: Harzer Straße 42, Neukölln)
        *   **Time:** 16:00 – 19:00
        *   **Focus:** An instructor-led hands-on session at [42 Berlin](wiki:42_(school)) focused on reducing hallucinations and improving context using graph databases.
    *   **[Theory Meets Practice #4: Explainable Scientific Discovery with AI Memory](embed:theory-meets-practice-QSp)** (Physical: Marchstraße 23, Charlottenburg)
        *   **Time:** 17:45 – 19:45
        *   **Focus:** An interactive session at [TU Berlin](wiki:Technical_University_of_Berlin) on using agentic AI to connect evidence across scientific domains and generate hypotheses.
    *   **[Beyond Prompts: Building Agents that actually work](embed:beyond-prompts-building-N0H)** (Physical: Heidestraße 34, Moabit)
        *   **Time:** 18:00 – 20:45
        *   **Focus:** Deep dive into "context engineering" and why data relevance matters more than clever [prompt engineering](wiki:Prompt_engineering) tricks.
    *   **[AI Agent Builders Berlin powered by Dataiku](embed:ai-agent-builders-zGu)** (Physical: Lobeckstr 30-35, Kreuzberg)
        *   **Time:** 18:00 – 21:00
        *   **Focus:** Evening focused on operationalizing AI agents, from initial design to management in production environments.
    
    ### Recurring & Educational Context
    [!](embed:handpickedberlin.com-6hi)
    [!](embed:handpickedberlin.com-MwU)
    [!](embed:luma.com-4RY)
    [!](embed:ninalemm.com-uRq)
    
    Many of these workshops emphasize [Agentic AI](wiki:Autonomous_agent), which is currently the "next level" of using AI effectively—moving from simple chat interactions to systems that can perform multi-step tasks independently.
    
    **Pro-tip:** Most of these events require registration on [Meetup](wiki:Meetup) or [Luma](wiki:Luma_(company)) beforehand as capacity is often limited.
    
