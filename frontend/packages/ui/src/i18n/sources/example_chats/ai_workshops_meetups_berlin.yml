    Berlin hat eine der aktivsten [KI](wiki:Artificial_intelligence)-Builder-Szenen Europas, die sich von allgemeiner Theorie hin zu praktischem „Hands-on“-Engineering entwickelt. Für jemanden, der lernt, mit KI-Tools zu bauen, liegt der Fokus im Juni 2026 stark auf [KI-Agenten](wiki:Software_agent), [RAG (Retrieval-Augmented Generation)](wiki:Retrieval-augmented_generation) und produktionsreifen Architekturen.
    
    Hier sind die wichtigsten anstehenden Workshops und Meetups in Berlin, bei denen du bauen, Demos zeigen und von anderen Praktikern lernen kannst.
    
    ### Ausgewählte Hands-on-Workshops
    Diese Sessions sind speziell für diejenigen gedacht, die Code schreiben und Prototypen bauen wollen.
    
    *   **BLISS x QuantCo: Baue deinen eigenen KI-Agenten**
        *   **Datum:** 10. Juni 2026 | 17:30
        *   **Ort:** Berlin-Mitte (Altonaer Str. 26)
        *   **Fokus:** Eine interaktive Session, die den Übergang von [LLM-APIs](wiki:Large_language_model) zum Bau eines eigenen Agenten zeigt, der komplexe Dokumenten-Workflows automatisiert. **Bring deinen Laptop mit.**
        *   [Event-Details & Anmeldung](embed:bliss-x-quantco-dWg)
    *   **Open Source Europe Tour: KI in der Praxis**
        *   **Datum:** 8. Juni 2026 | 17:30
        *   **Ort:** Netlight Consulting (Invalidenstraße 117)
        *   **Fokus:** Ein „hype-freier“ Durchgang durch moderne KI, der Agentic AI, Fine-Tuning vs. RAG und die Anbindung von KI an Datenarchitekturen erklärt.
        *   [Event-Details & Anmeldung](embed:open-source-europe-S4k)
    *   **AI Future-Club Kickoff (Hackers / Founders)**
        *   **Datum:** 11. Juni 2026 | 18:00
        *   **Ort:** TBD (Berlin)
        *   **Fokus:** Eine Session für Entwickler, um „sich die Hände schmutzig zu machen“, darüber zu diskutieren, was man gemeinsam bauen und veröffentlichen kann, inklusive Live-Demos aktueller Projekte.
        *   [Event-Details & Anmeldung](embed:ai-future-club-XOk)
    
    ### Community-Meetups für Builder
    Diese Events eignen sich hervorragend zum Networking und um zu sehen, was andere lokale Entwickler gerade bauen.
    
    *   **OpenClaw Anonymous Berlin #9**
        *   **Datum:** 9. Juni 2026 | 19:00
        *   **Ort:** w3.hub (Möckernstraße 120)
        *   **Fokus:** Informelles „Laptop-raus“-Meetup, bei dem OpenClaw- und KI-Agenten-Setups vorgestellt werden. Perfekt, um zu teilen, was funktioniert und was nicht.
        *   [Event-Details & Anmeldung](embed:openclaw-anonymous-berlin-JA8)
    *   **AI Tinkerers Berlin**
        *   **Datum:** 17. Juni 2026
        *   **Fokus:** Eine kuratierte, Demo-fokussierte „No-Pitch“-Community. Erwarte Live-Code, Architektur-Lektionen und technische Q&A von lokalen Gründern und Ingenieuren.
        *   Berlin AI Tinkerers Portal
    *   **Spec-Driven Development: KI für Full-Stack Java**
        *   **Datum:** 9. Juni 2026 | 18:30
        *   **Ort:** Capgemini (Potsdamer Platz 5)
        *   **Fokus:** Lernen, wie KI Code, Diagramme und Tests aus strukturierten Spezifikationen generieren kann.
        *   [Event-Details & Anmeldung](embed:spec-driven-development-rxI)
    
    ### Wichtige Hubs, denen du folgen solltest
    Wenn du auf dem Laufenden bleiben willst: Diese Organisationen veranstalten den Großteil der Builder-zentrierten KI-Events in Berlin:
    
    *   **Merantix AI Campus**: Dieser 6.000 m² große Campus in Nord-Mitte ist das Herz des Berliner KI-Ökosystems und veranstaltet wöchentliche Reading Groups und Tech Talks.
        *   Campus-Veranstaltungskalender
    *   **BLISS (Berlin AI Community)**: Eine Community aus Studenten und Professionals, die hochwertige Workshops und Vortragsreihen organisiert.
        *   Offizielle BLISS-Website
    *   **[CODE University](wiki:CODE_University_of_Applied_Sciences)**: Veranstaltet oft „Global AI Bootcamps“ und Hands-on-Sessions für Studenten und die Öffentlichkeit auf ihrem Delta-Campus in Neukölln.
    
    ### Praktische Tipps für die Teilnahme
    1.  **Frühzeitig anmelden:** Viele dieser Events (besonders die BLISS- und Tinkerers-Sessions) haben begrenzte Plätze und erfordern eine Auswahl oder frühzeitige Registrierung.
    2.  **Laptop mitbringen:** Bei den meisten „Workshops“ wird erwartet, dass du den Code mitschreibst. Stelle sicher, dass du eine lokale Umgebung oder einen [GitHub](wiki:GitHub)-Account bereit hast.
    3.  **Tritt den Slack-Kanälen bei:** Gruppen wie AI Tinkerers und [Hackers/Founders](/#settings/apps/web) haben lokale Slack/Discord-Kanäle, in denen die meisten kurzfristigen Build-Sessions organisiert werden.
    
    Soll ich dir helfen, spezifischere Ressourcen für ein bestimmtes KI-Tool zu finden, das du gerade lernst, wie zum Beispiel [PyTorch](wiki:PyTorch) oder [LangChain](wiki:LangChain)?
    
    **Nächste Schritte:**
    - [Weitere KI-Events in Berlin durchsuchen](/#settings/apps/events)
    - [Nach KI-Tutorials auf YouTube suchen](/#settings/apps/videos)
