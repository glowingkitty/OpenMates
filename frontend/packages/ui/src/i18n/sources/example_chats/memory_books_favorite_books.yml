message_2:
  context: "assistant message 2 in example chat: Favorite books memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "77343df3-6d51-461d-99e3-89f7dadc0e55", "app_id": "web", "skill_id": "search", "query": "books similar to The Left Hand of Darkness philosophical science fiction humane political themes", "provider": "Brave"}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "09d53ec8-9c3b-4b2e-b7ce-7f182af1653f", "app_id": "images", "skill_id": "search", "query": "The Dispossessed Ursula K. Le Guin book cover", "provider": "Brave Search"}
    ```
    
    Based on your appreciation for **[The Left Hand of Darkness](wiki:The_Left_Hand_of_Darkness)** and your interest in "reflective worldbuilding and humane political themes," I highly recommend you read **[The Dispossessed](wiki:The_Dispossessed)** by [Ursula K. Le Guin](wiki:Ursula_K._Le_Guin).
    
    ### Why this novel?
    *The Dispossessed* is often considered the "other half" of Le Guin's greatest contributions to the **[Hainish Cycle](wiki:Hainish_Cycle)**. It perfectly aligns with the qualities you noted in your [favorite books](/#settings/app_store/books/settings_memories/favorite_books):
    
    *   **Humane Political Themes:** The book is subtitled "An Ambiguous Utopia." It follows a physicist named Shevek as he travels between the twin worlds of Anarres (an anarchist society) and Urras (a world divided into capitalist and authoritarian nations). It explores the complexities of freedom, property, and community without resorting to easy answers.
    *   **Reflective Worldbuilding:** Much like the ice-world of Gethen, the arid world of Anarres is built with incredible anthropological detail. Every social custom and linguistic quirk is rooted in the planet's harsh environment and the revolutionary ideals of its inhabitants.
    *   **Philosophical Depth:** It moves beyond simple "sci-fi" to ask deep questions about how we treat one another and how the structures of our society limit or enable human flourishing.
    
    [!](embed:ursulakleguin.com-GXg)
    
    If you've already read *The Dispossessed* or are looking for something by a different author that hits similar notes, **[A Memory Called Empire](wiki:A_Memory_Called_Empire)** by Arkady Martine is a fantastic modern alternative that focuses on the "humane politics" of cultural assimilation and memory.
    
    ***
    
    **Have you read any other books in the Hainish Cycle yet?**
    
    ```interactive_question
    {
      "type": "choice",
      "id": "reading_history",
      "multiple": false,
      "question": "Which of these best describes your reading history with Le Guin?",
      "options": [
        { "id": "only_left_hand", "text": "I've only read 'The Left Hand of Darkness' so far." },
        { "id": "read_dispossessed", "text": "I've already read 'The Dispossessed'!" },
        { "id": "different_author", "text": "I'd prefer a recommendation from a different author." }
      ]
    }
    ```json
    {"type": "code", "embed_id": "0c9e6a00-8fca-4ff1-9d6d-6f8229172d2f"}
    ```
    
    
