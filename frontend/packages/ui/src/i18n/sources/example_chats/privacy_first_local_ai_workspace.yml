  ru: |
    Let's lock down the **MVP Feature Scope and UX** for our local-only desktop app. 
    
    To make this product truly lovable (not just functional), we need to solve the friction of setting up local models while delivering an interface that feels as snappy and polished as a modern cloud SaaS tool (like Notion or Raycast), but running 100% offline.
    
    Here is the feature scope and UX roadmap categorized by priority:
    
    ---
    
    ### 1. Must-Have Features (Day 1 MVP Scope)
    *These are non-negotiable for our first private alpha release to design partners.*
    
    * **One-Click Local Model Setup (Onboarding):**
      * *UX:* Upon downloading the lightweight Tauri app, a clean setup wizard automatically checks the user's hardware (e.g., Apple Silicon vs. Windows/NVIDIA), downloads an optimized Small Language Model (like Llama 3 8B quantized), and runs a quick verification test. No command line required.
    * **Secure Local Folder Indexing:**
      * *UX:* A simple "Connect Workspace" button lets users select local folders (e.g., `/Client_Contracts/`) containing PDFs, Word docs, and markdown files. The app builds an embedded local vector index (using SQLite/LanceDB) entirely on device.
    * **Meeting Transcript Ingestion:**
      * *UX:* A drag-and-drop zone for raw audio/video files or text transcripts (.txt, .srt, .vtt) from local meeting recorders (like Otter exports or local OBS recordings). The app chunks and indexes the transcript instantly.
    * **Context-Aware Document Q&A & Synthesis:**
      * *UX:* A clean chat interface where users can query their indexed documents (`@ClientA contract terms`) and get precise, cited answers grounded strictly in local files without hitting external APIs.
    * **Draft Generation with Guardrails:**
      * *UX:* A side-by-side editor where users can highlight local notes or transcripts and prompt the model: *"Draft an executive summary email to the client based on this transcript."*
    * **Visible Privacy Status Bar:**
      * *UX:* A permanent, calming green badge in the corner of the app: `🟢 Air-Gapped / Zero Network Activity`, giving users instant psychological safety.
    
    ---
    
    ### 2. Should-Have Features (Fast Follows — Months 2–3)
    *Important for retention, but not strictly required to prove core value during initial user testing.*
    
    * **Local Audio Transcription Engine (Whisper.cpp):**
      * Allowing users to drop raw audio (.mp3, .wav) directly into the app and transcribing it locally via Whisper without needing third-party transcription tools.
    * **Template Library for Regulated Workflows:**
      * Pre-built, customizable prompt templates optimized for legal review checklists, financial disclosures, and technical spec audits.
    * **Document Diff / Redaction Helper:**
      * A tool that scans local drafts for accidental PII (names, SSNs, account numbers) before export or manual sharing.
    
    ---
    
    ### 3. Later Features (Post-MVP / Enterprise Tier)
    *Reserved for when we introduce hybrid or team-tier infrastructure.*
    
    * **Encrypted Peer-to-Peer Team Sync:** Allowing secure sharing of indexed workspaces between trusted colleagues via end-to-end encryption without central cloud storage.
    * **Opt-In Cloud Bursting:** Secure cloud fallback for power users whose hardware chokes on larger 70B models.
    * **Advanced Plugin Ecosystem:** Custom local WASM plugins for specialized industry compliance checkers.
    
    ---
    
    ### Summary Table: Feature Roadmap
    
