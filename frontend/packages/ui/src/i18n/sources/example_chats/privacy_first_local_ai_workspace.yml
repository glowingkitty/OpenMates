    * **How it works:** A native desktop application (built with Tauri or Electron) bundles a runtime like [Ollama](wiki:Ollama) or Llamafile along with lightweight Small Language Models (SLMs) such as Llama 3 (8B) or Mistral 7B. Inference runs entirely on the user's CPU/GPU.
    * **Data Flow:** Zero data leaves the local machine. Files are indexed locally (e.g., via SQLite/LanceDB embedded vector stores).
    
    #### Option B: Encrypted Cloud Workspace with Zero-Retention API Calls
    * **How it works:** A web or desktop app where user documents are encrypted client-side using user-held keys (zero-knowledge architecture). When an AI request is made, text is decrypted in memory on an isolated, ephemeral cloud container running open-source models on rented GPUs (e.g., AWS Nitro Enclaves or dedicated instances with non-logging vendor agreements).
    * **Data Flow:** Data transits in ciphertext, hits a stateless container, runs inference, and vanishes immediately with no logging.
    
    #### Option C: Hybrid Local-Plus-Cloud Routing
    * **How it works:** The app dynamically classifies user prompts. Simple or highly sensitive queries (e.g., parsing an unredacted legal contract) are processed locally by an SLM. Complex reasoning or heavy synthesis tasks are automatically scrubbed of PII locally, then routed to a secure enterprise-grade cloud API (e.g., Anthropic or OpenAI enterprise tiers).
    * **Data Flow:** Split between local execution and encrypted cloud payloads.
    
    ---
    
    ### 2. Tradeoff Matrix
    
    ```json
    {"type": "sheet", "embed_id": "bd4554c1-5ac6-46b1-8b53-a5450c95b717"}
    ```
    
    ---
    
    ### 3. Recommended First Version: Option A (Local-Only Desktop App)
    
    For our **First 90-Day MVP**, we should strictly commit to **Option A: Local-Only Desktop App**.
    
    #### Why this wins for a zero-to-one startup:
    1. **The "Zero-Trust" Shortcut:** During customer discovery, regulated prospects will immediately object to cloud architecture ("We need legal review for any new SaaS vendor handling data"). A local-only app completely bypasses vendor risk assessments and IT security sign-offs because *no data ever touches our servers*. 
    2. **Infinite Gross Margins on Day 1:** We don't have to raise capital just to pay for heavy GPU cloud inference bills while validating product-market fit.
    3. **Product Focus:** It forces us to build an incredible, tightly scoped UX for document chunking, meeting transcription, and local context retrieval without getting bogged down in secure multi-tenant cloud infrastructure.
    
    #### The Strategic Pivot Path:
    Once we lock down design partners who love the local app but complain about hardware limits or context length on their local laptops, we can introduce an opt-in **Option B (Zero-Retention Cloud Workspace)** as an enterprise tier down the road.
    
    ***
    
