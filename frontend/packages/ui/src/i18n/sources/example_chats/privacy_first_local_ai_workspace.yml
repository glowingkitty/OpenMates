    Since our core thesis is absolute data privacy and zero network leakage, our configuration must actively clamp down on default Tauri permissive settings.
    
    ---
    
    ### 1. Recommended Repository Structure
    
    A clean, modular layout separates our React/TypeScript frontend from the secure Rust backend and Tauri configuration:
    
    ```json
    {"type": "code", "embed_id": "fe39a10f-cf99-4083-bd2d-01c4813cc77a"}
    ```
    
    ---
    
    ### 2. `tauri.conf.json` Security Settings & CSP
    
    In Tauri v2, security policies are heavily fortified. We configure our app window with a strict Content Security Policy (CSP) that blocks all external network fetches, WebSockets, and CDN scripts, allowing only local loopback communication (`[link removed]` or Tauri's custom asset protocol).
    
    ```json
    {"type": "code", "embed_id": "c49bc081-7ca5-4734-904f-38826391ee72"}
    ```
    
    > **Security Note on `connect-src`:** The CSP explicitly restricts connections to `self` and local loopback port `11434` (reserved for local sidecar runtimes like Ollama or custom local inference servers). Any attempt by malicious frontend dependencies to phone home to external APIs will be blocked instantly by the browser engine.
    
    ---
    
    ### 3. Tauri v2 Capability Scopes (Filesystem Permissions)
    
    In Tauri v2, file system access is governed by explicit capability files inside `src-tauri/capabilities/`. We restrict the app's file reading capabilities to explicit user-selected folders, preventing arbitrary system traversal.
    
    ```json
    {"type": "code", "embed_id": "ab703220-347d-48f3-b19b-328c929dd471"}
    ```
    
    ---
    
    ### 4. Rust Command Boundaries & State Management
    
    We establish clean IPC boundaries in Rust (`src-tauri/src/lib.rs`) ensuring the frontend can only invoke explicitly registered commands.
    
    ```json
    {"type": "code", "embed_id": "86dc6188-8146-4da6-ad98-eeb594eb3de6"}
    ```
    
    ---
    
    ### 5. Build Scripts & Package Configuration
    
    ```json
    {"type": "code", "embed_id": "b084ff22-22a2-498d-9151-20ed97092883"}
    ```
    
    ---
    
    ### 6. Smoke Tests Before Feature Implementation
    
    Before moving on to local model integration (`ENG-02`) or file parsing (`ENG-03`), we should implement the following smoke tests to verify security and scaffolding integrity:
    
    1. **CSP Block Test (Frontend Smoke Test):**
       * Write a quick Playwright or manual test attempting `fetch('[link removed]')` from the React app.
       * **Expected Result:** The browser console must throw a CSP violation error, rejecting the outbound request.
    2. **Filesystem Scope Enforcement Test (Backend Smoke Test):**
       * Invoke a file read command via Tauri targeting `/etc/passwd` (on Unix) or `C:\Windows\System32\drivers\etc\hosts` outside allowed scopes.
       * **Expected Result:** The Tauri filesystem plugin must return a permission denied error.
    3. **Air-Gap Mock Test:**
       * Verify that Tauri builds without network dependencies during offline compilation (`cargo build --offline`).
    
    ---
    
    ### Suggested Next Steps
    Would you like to move forward with setting up **Ticket `ENG-02` (Local Model Manager & Runtime Integration)** to handle local GGUF/Ollama sidecar startup, or refine the Tauri capabilities further?
