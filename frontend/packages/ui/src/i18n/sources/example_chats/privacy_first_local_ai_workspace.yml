    * **NFR-1: Zero Telemetry & Network Isolation:** The application executable must operate 100% offline post-model download. Outbound network calls are strictly restricted to local model registry downloads (optional user action) and blocked otherwise.
    * **NFR-2: Local-Only Data Persistence:** All chat histories, embeddings, and vector indices must reside exclusively in encrypted or sandboxed local storage directories (`~/Library/Application Support/...` or equivalent OS paths). No database sync to external cloud buckets.
    * **NFR-3: Memory Hygiene:** Sensitive prompt strings and decrypted document chunks must be cleared from process memory immediately upon session termination or app close.
    
    ---
    
    ## 7. Acceptance Criteria (MVP Gate)
    * [ ] Application successfully installs on macOS (Apple Silicon) and Windows 11 via a signed installer.
    * [ ] One-click setup downloads and verifies Llama 3 8B within 3 minutes on standard hardware.
    * [ ] User can index a folder of 20 PDFs (approx. 50 pages each) locally without crashing or exceeding 4GB RAM utilization.
    * [ ] User can ask a targeted question about the documents and receive a grounded answer with inline citations in under 5 seconds.
    * [ ] Network monitor verification confirms **zero outgoing packets** to third-party endpoints during active chat and indexing operations.
    
    ---
    
    ## 8. Explicit Out-of-Scope (Deferred to Post-MVP)
    * Cloud-based fallback or hybrid routing to OpenAI/Anthropic APIs.
    * Real-time audio recording and transcription (Whisper.cpp integration deferred to Fast Follow).
    * Multi-user P2P workspace sharing or encrypted cloud sync.
    * Windows on ARM (WOA) optimization.
    
    ---
    
    ### Suggested Next Steps
    With our PRD complete, we can begin sketching the initial **UI Wireframe/Architecture** or start mapping out the **Sprint 1 Engineering Tasks** for the Tauri/Rust core. 
    
