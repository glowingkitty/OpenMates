    * **Ticket ID:** `ENG-08`
    * **Objective:** Configure Tauri bundler to produce signed macOS `.app`/`.dmg` and Windows `.msi` installers without relying on external cloud telemetry analytics.
    * **Dependencies:** `ENG-01` through `ENG-07`.
    * **Key Tasks:**
      * Set up code signing certificates for macOS Developer ID and Windows Authenticode.
      * Configure GitHub Releases or local network manifest for zero-tracking updates.
      * Write clean `README.md` installation instructions for alpha testers.
    * **Risks:** Apple Gatekeeper or Windows SmartScreen blocking unsigned/new binaries.
    * **Acceptance Checks:**
      * [ ] Clean installation on fresh macOS and Windows VMs without OS security blocks.
