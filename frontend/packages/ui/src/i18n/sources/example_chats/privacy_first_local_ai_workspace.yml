    ---
    
    ## Workstream 2: Local Model Manager & Runtime Integration
    * **Ticket ID:** `ENG-02`
    * **Objective:** Bundle or programmatically manage a local inference runtime (e.g., embedded `llama.cpp` via Rust bindings or automated local Ollama sidecar management) supporting quantized GGUF models.
    * **Dependencies:** `ENG-01` (App Shell).
    * **Key Tasks:**
      * Implement Rust sidecar manager to spawn/terminate local inference binary.
