      * Write Rust unit tests for PDF extraction and chunking edge cases.
      * Perform end-to-end load test with a 200-document repository to measure RAM stability.
      * Validate zero crash rates during abrupt app termination.
    * **Risks:** Edge cases in PDF text encoding (e.g., custom font encodings).
    * **Acceptance Checks:**
      * [ ] 90%+ unit test coverage on core parsing and retrieval Rust modules.
      * [ ] Memory consumption remains stable under 4GB RAM during prolonged Q&A sessions.
    
    ---
    
    ## Workstream 10: Measurement & Alpha Telemetry (Opt-In / Local)
    * **Ticket ID:** `ENG-10`
    * **Objective:** Implement a local-only usage logger that exports anonymized performance metrics (e.g., query latency, token generation speed, index build time) to a local JSON file for alpha testers to optionally share.
    * **Dependencies:** `ENG-05`, `ENG-07`.
