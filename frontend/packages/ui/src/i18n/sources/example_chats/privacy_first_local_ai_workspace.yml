    * **Objective:** Initialize the cross-platform Tauri (Rust + TypeScript/React) project repository with secure inter-process communication (IPC) boundaries and sandboxed file system access.
    * **Dependencies:** None (Greenfield repo initialization).
    * **Key Tasks:**
      * Initialize Tauri 2.x project with React and Vite template.
      * Configure `tauri.conf.json` with strict CSP (Content Security Policy) blocking all external network fetch/XHR requests except explicit localhost bindings.
      * Establish Rust backend state management for local process tracking.
    * **Risks:** Tauri permission scopes allowing accidental file leakage or loose CSP.
    * **Acceptance Checks:** 
      * [ ] `cargo tauri build` compiles clean on macOS (Apple Silicon) and Windows 11.
      * [ ] Network inspector confirms zero external domain sockets opened upon launch.
    
    ---
    
    ## Workstream 2: Local Model Manager & Runtime Integration
    * **Ticket ID:** `ENG-02`
    * **Objective:** Bundle or programmatically manage a local inference runtime (e.g., embedded `llama.cpp` via Rust bindings or automated local Ollama sidecar management) supporting quantized GGUF models.
    * **Dependencies:** `ENG-01` (App Shell).
    * **Key Tasks:**
      * Implement Rust sidecar manager to spawn/terminate local inference binary.
      * Create a model download utility with SHA-256 verification and resume support for Llama 3 8B Instruct (GGUF).
      * Expose local `/v1/chat/completions` or direct Rust FFI inference bridge to frontend.
    * **Risks:** Platform-specific binary compilation issues (Metal vs. CUDA vs. CPU fallback).
    * **Acceptance Checks:**
      * [ ] App successfully verifies, downloads, and loads Llama 3 8B GGUF.
      * [ ] Inference generates first-token response within 2 seconds locally on M-series Apple Silicon.
    
    ---
    
    ## Workstream 3: Local File Parsing Pipeline
    * **Ticket ID:** `ENG-03`
    * **Objective:** Build a robust, offline-first document parsing engine capable of extracting clean text and structural metadata from `.pdf`, `.docx`, `.txt`, and `.md` files.
    * **Dependencies:** `ENG-01`.
    * **Key Tasks:**
      * Integrate Rust-native PDF parser (`lopdf` or `pdf-extract`) and docx extractor.
      * Implement text chunking with configurable overlap (e.g., 512-token chunks with 64-token overlap) preserving paragraph boundaries.
      * Handle malformed or scanned PDFs gracefully with fallback warnings.
    * **Risks:** Memory bloat when parsing large multi-hundred-page legal PDFs.
    * **Acceptance Checks:**
      * [ ] Parses a 100-page `.docx` or `.pdf` file in under 3 seconds without exceeding 500MB RAM spike.
      * [ ] Preserves clean paragraph breaks and table text structure in chunk output.
    
    ---
    
    ## Workstream 4: Local Vector Database & Indexing Engine
    * **Ticket ID:** `ENG-04`
    * **Objective:** Embed text chunks using a lightweight local embedding model (e.g., `all-MiniLM-L6-v2` via ONNX Runtime or Candle) and persist vectors in a local SQLite + `sqlite-vss` or LanceDB store.
    * **Dependencies:** `ENG-03` (File Parser).
    * **Key Tasks:**
      * Integrate Rust embedding runner (`candle-nn` or ONNX).
      * Initialize local vector store in `~/Library/Application Support/ProjectCitadel/vectors.db`.
      * Implement incremental folder indexing (skip already hashed/unchanged files).
    * **Risks:** Slow CPU embedding generation on older Windows machines without AVX2 instructions.
    * **Acceptance Checks:**
      * [ ] Successfully indexes 50 test documents (approx. 500 pages total) in under 45 seconds.
      * [ ] Vector similarity search returns top-5 relevant chunks in <50ms.
    
    ---
    
