    Let's dive into customer discovery. The goal here is not to pitch our solution, but to diagnose how painful their current compliance friction is and whether they are actively losing billable hours or deals because of it.
    
    Here is a practical, rigorous interview plan for our first 20 prospects.
    
    ---
    
    ### 1. Prospect Segments to Recruit (Target: 20 Interviews)
    We want to balance density within specific verticals to find patterns:
    * **Segment A (Legal / Compliance — 7 prospects):** Partners or associates at boutique law firms (IP, corporate M&A) who handle sensitive contracts daily.
    * **Segment B (Finance / Wealth Management — 7 prospects):** Independent financial advisors, wealth managers, or boutique M&A/private equity analysts dealing with non-public financial data.
    * **Segment C (Deep-Tech / Engineering Consultancies — 6 prospects):** Technical founders or engineering leads whose clients require strict NDA/IP separation.
    
    ---
    
    ### 2. Outreach Positioning
    *Never pitch software.* Position the call around research into workflow security and productivity bottlenecks. 
    * **Subject Line:** Quick question on AI & client confidentiality at [Firm Name]
    * **Body Example:**
      > *"Hi [Name], I’m researching how boutique [law/wealth management] firms balance the productivity gains of AI with strict client confidentiality and NDA requirements. We're talking to 20 industry leaders to understand where current tools fail your compliance standards. Would you be open to a 20-minute chat next week? No sales pitch—just want to learn from your workflow challenges."*
    
    ---
    
    ### 3. Interview Script (20 Minutes)
    * **Context Setting (2 mins):** 
      > *"Thanks for making time. We’re exploring how professionals with high confidentiality standards handle modern productivity tools. I want to learn about your actual workflows, not pitch you anything."*
    * **Current State & Behavior (5 mins):**
      > * "Walk me through how you currently handle tasks like synthesizing long client depositions, confidential financial reports, or drafting complex agreements."
      > * "Have you or anyone on your team tried using mainstream AI tools (like ChatGPT or Claude) for these tasks? What happened?"
    * **The Pain & Friction (5 mins):**
      > * "If you *did* use AI for sensitive documents, what specific guardrails or partner policies stopped you? Were they enforced by firm policy, client contracts, or your own peace of mind?"
      > * "Can you estimate how many hours a week your team spends on manual drafting or synthesis because you can't use standard automation?"
    * **Economic Impact & Workarounds (5 mins):**
      > * "What workarounds do you use today? (e.g., sanitizing text, using generic templates, or just doing it all manually)?"
      > * "If a tool guaranteed zero data retention and local execution, how would that change your team's output?"
    * **Wrap-up (3 mins):**
      > * "If we built a secure utility for this, would you be open to testing an early prototype with your team?"
    
    ---
    
    ### 4. Signals That Validate Urgency (Green Lights 🟢)
    We look for behavioral evidence, not polite compliments:
    * **"Hair-on-fire" compliance fear:** They can cite a specific client contract clause, data breach fear, or partner mandate that explicitly bans cloud-based AI.
    * **Active shadow IT or workarounds:** They admit team members are already pasting sensitive data into consumer AI tools under personal accounts because the productivity boost is too tempting to ignore (massive risk = massive urgency).
    * **Quantifiable time loss:** They report losing 5+ hours per week per person on tasks an LLM could solve if privacy wasn't a barrier.
    * **Immediate willingness to pilot:** They agree on the spot to be a design partner for a restricted internal alpha.
    
    ---
    
    ### 5. Signals That Tell Us to Pivot (Red Lights 🔴)
    We must be honest with ourselves if the market isn't there:
    * **Indifference to AI:** If they say, *"We don't really use AI or see the need for it in our workflows,"* the productivity pain isn't acute enough.
    * **Enterprise lock-in:** If they say, *"We are an enterprise Microsoft/Google shop, and our IT department is rolling out an internal secure copilot next month anyway,"* boutique wedge buyers will just wait for their existing stack to solve it.
    * **Regulatory apathy:** If compliance is treated as a check-the-box formality rather than a core business risk, they won't pay a premium for ironclad privacy.
    
    ---
    
    Would you like to move on to sketching out the **MVP Technical Architecture** (local SLMs vs. zero-retention wrappers) to see how we'd technically satisfy these prospects?
