    Let's map out a comprehensive **Product Requirements Document (PRD)** for our privacy-first Tauri desktop client wrapper. This document will serve as our engineering north star for the 30-day MVP build.
    
    ---
    
    # Product Requirements Document (PRD): Privacy-First Local AI Workspace (Tauri MVP)
    
    ## 1. Document Metadata
    * **Product Name:** Project Citadel (Working Title)
    * **Target Release:** 30-Day MVP / Private Alpha
    * **Author:** Operating Partner & Engineering Lead
    * **Status:** Draft / Approved for Sprint 1
    
    ---
    
    ## 2. Target Users & Persona
    * **Primary Persona:** Boutique firm partners, senior associates, and independent consultants handling sensitive client files, legal contracts, or confidential financial data who are barred from using standard cloud AI tools due to NDA and compliance restrictions.
    
    ---
    
    ## 3. Core Jobs-To-Be-Done (JTBD)
    1. *"When I have a 50-page confidential client contract, I want to query specific clauses locally so I can find answers instantly without leaking proprietary text to a cloud server."*
    2. *"When I finish a sensitive client deposition or advisory call, I want to drop the raw audio or transcript into a private tool and generate an executive summary draft without data leaving my laptop."*
    
    ---
    
    ## 4. User Stories
    * **US-1 (Onboarding):** As a user, I want the app to automatically detect my hardware and download a secure local language model with one click, so I don't have to configure command-line runtimes.
    * **US-2 (Folder Indexing):** As a user, I want to select a local folder of PDF/docx files so the app can securely index them into an offline vector database.
    * **US-3 (Document Q&A):** As a user, I want to chat with my indexed documents and receive precise, cited answers grounded entirely in local files.
    * **US-4 (Draft Generation):** As a user, I want to highlight local notes or transcripts and prompt the model to draft an email or summary.
    * **US-5 (Privacy Assurance):** As a user, I want visual confirmation that my app is completely air-gapped so I have absolute peace of mind regarding data sovereignty.
    
    ---
    
    ## 5. Functional Requirements
    * **FR-1: Cross-Platform Desktop Shell:** Built using Tauri (Rust backend, web frontend) for lightweight resource usage and fast startup times.
    * **FR-2: Local Inference Runtime Integration:** Bundled or auto-managed local model runner (e.g., Ollama or embedded llama.cpp) supporting quantized models (Llama 3 8B / Mistral 7B).
    * **FR-3: Local File Parser & Vector Store:**
      * Support parsing `.pdf`, `.docx`, `.txt`, and `.md` files.
      * Embedded local vector storage (SQLite + SQLite-VSS or LanceDB) stored locally in the user's application support directory.
    * **FR-4: Chat & Prompt Interface:** Clean, split-pane chat interface supporting markdown output, source document citations, and prompt history saved locally.
    * **FR-5: Air-Gapped Status Indicator:** Persistent UI badge displaying network isolation status (`🟢 Air-Gapped`).
    
    ---
    
    ## 6. Non-Functional Privacy & Security Requirements
    * **NFR-1: Zero Telemetry & Network Isolation:** The application executable must operate 100% offline post-model download. Outbound network calls are strictly restricted to local model registry downloads (optional user action) and blocked otherwise.
    * **NFR-2: Local-Only Data Persistence:** All chat histories, embeddings, and vector indices must reside exclusively in encrypted or sandboxed local storage directories (`~/Library/Application Support/...` or equivalent OS paths). No database sync to external cloud buckets.
    * **NFR-3: Memory Hygiene:** Sensitive prompt strings and decrypted document chunks must be cleared from process memory immediately upon session termination or app close.
    
    ---
    
    ## 7. Acceptance Criteria (MVP Gate)
    * [ ] Application successfully installs on macOS (Apple Silicon) and Windows 11 via a signed installer.
    * [ ] One-click setup downloads and verifies Llama 3 8B within 3 minutes on standard hardware.
    * [ ] User can index a folder of 20 PDFs (approx. 50 pages each) locally without crashing or exceeding 4GB RAM utilization.
    * [ ] User can ask a targeted question about the documents and receive a grounded answer with inline citations in under 5 seconds.
    * [ ] Network monitor verification confirms **zero outgoing packets** to third-party endpoints during active chat and indexing operations.
    
    ---
    
    ## 8. Explicit Out-of-Scope (Deferred to Post-MVP)
    * Cloud-based fallback or hybrid routing to OpenAI/Anthropic APIs.
    * Real-time audio recording and transcription (Whisper.cpp integration deferred to Fast Follow).
    * Multi-user P2P workspace sharing or encrypted cloud sync.
    * Windows on ARM (WOA) optimization.
    
    ---
    
    ### Suggested Next Steps
    With our PRD complete, we can begin sketching the initial **UI Wireframe/Architecture** or start mapping out the **Sprint 1 Engineering Tasks** for the Tauri/Rust core. 
    
    What would you like to build or define next?
