    * **Objective:** Embed text chunks using a lightweight local embedding model (e.g., `all-MiniLM-L6-v2` via ONNX Runtime or Candle) and persist vectors in a local SQLite + `sqlite-vss` or LanceDB store.
    * **Dependencies:** `ENG-03` (File Parser).
    * **Key Tasks:**
      * Integrate Rust embedding runner (`candle-nn` or ONNX).
      * Initialize local vector store in `~/Library/Application Support/ProjectCitadel/vectors.db`.
      * Implement incremental folder indexing (skip already hashed/unchanged files).
    * **Risks:** Slow CPU embedding generation on older Windows machines without AVX2 instructions.
    * **Acceptance Checks:**
      * [ ] Successfully indexes 50 test documents (approx. 500 pages total) in under 45 seconds.
      * [ ] Vector similarity search returns top-5 relevant chunks in <50ms.
    
    ---
    
    ## Workstream 5: Chat UI & Prompt Workspace
    * **Ticket ID:** `ENG-05`
    * **Objective:** Build a responsive, distraction-free chat interface in React with Markdown rendering, syntax highlighting, and local conversation history persistence.
    * **Dependencies:** `ENG-01`, `ENG-02`.
    * **Key Tasks:**
      * Develop split-pane layout (left sidebar for file folders and chat history, right main pane for active chat).
      * Implement streaming response UI with auto-scroll and markdown rendering.
      * Save conversation sessions to local SQLite store (`chats.db`).
    * **Risks:** UI sluggishness during rapid streaming token rendering.
    * **Acceptance Checks:**
      * [ ] Smooth 60fps streaming token display during model generation.
      * [ ] Conversations persist across application restarts.
    
    ---
    
    ## Workstream 6: Citation & Source Grounding Engine
    * **Ticket ID:** `ENG-06`
    * **Objective:** Implement retrieval-augmented generation (RAG) context assembly and UI citation badges linking model answers back to specific local files and page numbers.
    * **Dependencies:** `ENG-04` (Vector DB), `ENG-05` (Chat UI).
    * **Key Tasks:**
      * Query vector store for top-k matching chunks on user prompt submission.
      * Construct prompt context with explicit source file markers (`[Source: filename.pdf, Page X]`).
      * Render interactive citation cards in UI that preview source snippet on hover/click.
    * **Risks:** Hallucinated citations or context window overflow with overly broad chunk retrieval.
    * **Acceptance Checks:**
      * [ ] 100% of factual answers derived from indexed files include verifiable source badges.
      * [ ] Clicking a citation opens the local file excerpt drawer.
    
    ---
    
    ## Workstream 7: Privacy Status Bar & Network Sandbox
    * **Ticket ID:** `ENG-07`
    * **Objective:** Build a persistent privacy monitoring widget and enforce strict OS-level network isolation verification.
    * **Dependencies:** `ENG-01`.
    * **Key Tasks:**
      * Create prominent header/footer status bar indicating `🟢 Air-Gapped / Zero Network Activity`.
      * Implement active socket monitor in Rust background thread that logs outbound connection attempts (alerting if non-localhost traffic is detected).
      * Add manual "Kill Switch" button that instantly halts all local inference and clears temporary caches.
    * **Risks:** False positives from local loopback address bindings (`127.0.0.1`).
    * **Acceptance Checks:**
      * [ ] Status indicator accurately reflects network state.
      * [ ] Automated test suite verifies zero external DNS lookups or HTTP requests during core operations.
    
    ---
    
    ## Workstream 8: Packaging & Auto-Updater (Local First)
    * **Ticket ID:** `ENG-08`
    * **Objective:** Configure Tauri bundler to produce signed macOS `.app`/`.dmg` and Windows `.msi` installers without relying on external cloud telemetry analytics.
    * **Dependencies:** `ENG-01` through `ENG-07`.
    * **Key Tasks:**
      * Set up code signing certificates for macOS Developer ID and Windows Authenticode.
      * Configure GitHub Releases or local network manifest for zero-tracking updates.
      * Write clean `README.md` installation instructions for alpha testers.
    * **Risks:** Apple Gatekeeper or Windows SmartScreen blocking unsigned/new binaries.
    * **Acceptance Checks:**
      * [ ] Clean installation on fresh macOS and Windows VMs without OS security blocks.
      * [ ] App launches into functional onboarding wizard on first boot.
    
    ---
    
    ## Workstream 9: QA & Performance Benchmarking
    * **Ticket ID:** `ENG-09`
    * **Objective:** Establish automated integration tests for document chunking, vector search accuracy, and memory leak detection.
    * **Dependencies:** `ENG-03`, `ENG-04`, `ENG-06`.
    * **Key Tasks:**
      * Write Rust unit tests for PDF extraction and chunking edge cases.
      * Perform end-to-end load test with a 200-document repository to measure RAM stability.
      * Validate zero crash rates during abrupt app termination.
    * **Risks:** Edge cases in PDF text encoding (e.g., custom font encodings).
    * **Acceptance Checks:**
      * [ ] 90%+ unit test coverage on core parsing and retrieval Rust modules.
      * [ ] Memory consumption remains stable under 4GB RAM during prolonged Q&A sessions.
    
    ---
    
    ## Workstream 10: Measurement & Alpha Telemetry (Opt-In / Local)
    * **Ticket ID:** `ENG-10`
    * **Objective:** Implement a local-only usage logger that exports anonymized performance metrics (e.g., query latency, token generation speed, index build time) to a local JSON file for alpha testers to optionally share.
    * **Dependencies:** `ENG-05`, `ENG-07`.
    * **Key Tasks:**
      * Build local metrics collector capturing latency percentiles and error rates.
      * Create "Export Diagnostics" button in settings that bundles logs into a local zip file for manual review by engineering.
      * Ensure zero automatic telemetry transmission over the internet.
    * **Risks:** Testers forgetting to export logs or encountering cryptic panic traces.
    * **Acceptance Checks:**
      * [ ] Diagnostics export generates a clean JSON summary of app performance without leaking document text or prompt contents.
    
    ---
    
    ### Suggested Next Steps
    With our Sprint 1 engineering backlog fully mapped out, we are ready to assign tasks or dive into the architectural implementation of **Ticket `ENG-01` (App Shell & Tauri/Rust Core Setup)** or **`ENG-03` (Local File Parsing Pipeline)**. 
    
