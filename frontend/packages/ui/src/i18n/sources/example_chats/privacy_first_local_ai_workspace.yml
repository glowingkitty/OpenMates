message_12:
  context: "assistant message 12 in example chat: Build a Privacy-First Local AI Workspace. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Here are the exact outbound and conversion assets for recruiting our first 10 design partners. Each asset is written with a tone of quiet competence, respecting their professional rigor and avoiding any hype-driven language.
    
    ---
    
    ### 1. LinkedIn DM (Short & Respectful)
    *Use this for direct, warm-to-cold outreach to boutique firm partners and consultants.*
    
    > "Hi [Name], I noticed your work in [Practice Area / Industry] at [Firm Name]. We’re currently developing a local-first, air-gapped AI workspace built specifically for firms bound by strict client confidentiality and NDAs. 
    > 
    > Because cloud AI tools present compliance hurdles for sensitive data, we’re running a small private alpha with 10 boutique partners to stress-test an entirely offline document and meeting synthesizer. 
    > 
    > Would you be open to a brief 20-minute feedback chat next week to see if it fits your workflow guardrails? No sales pitch—just want to learn from your security requirements."
    
    ---
    
    ### 2. Warm Intro Email
    *Use this when reaching out via email or when an investor/mutual contact makes an introduction.*
    
    > **Subject:** Research on AI productivity & client confidentiality at [Firm Name]
    > 
    > Hi [Name],
    > 
    > [Mutual Connection / "I came across your profile via..."] suggested I reach out. 
    > 
    > We are building an air-gapped AI productivity workspace designed for professionals who want the synthesis capabilities of modern LLMs without feeding proprietary client files or transcripts into cloud models. Everything runs locally on device with zero data retention.
    > 
    > We’re speaking with 20 leaders in [legal / wealth management / advisory] to understand how your firm navigates AI compliance and what bottlenecks you face. 
    > 
    > Would you have 20 minutes next Tuesday or Thursday for a quick conversation? I’d love to get your perspective on our early prototype guardrails.
    > 
    > Best,
    > [Your Name]
    
    ---
    
    ### 3. Follow-Up Email (4 Days Later)
    *Sent as a gentle, low-pressure bump.*
    
    > **Subject:** Re: Research on AI productivity & client confidentiality at [Firm Name]
    > 
    > Hi [Name],
    > 
    > I know how demanding client schedules are, so I'll keep this brief. 
    > 
    > We’ve finalized our private alpha cohort with 7 boutique firms and have 3 spots remaining for our initial design partner group. If confidentiality guardrails have kept your team from adopting AI tools for drafting or document review, I'd still love your feedback.
    > 
    > If timing doesn't work right now, no worries at all. If you're open to a 20-minute chat, you can grab a time that suits you here: [Calendar Link].
    > 
    > Best,
    > [Your Name]
    
    ---
    
    ### 4. Calendar Invite Description
    *Set expectations clearly so they arrive prepared for an advisory session rather than a high-pressure sales pitch.*
    
    > **Title:** 20-Minute Advisory Chat: Secure AI Workflows & Confidentiality
    > 
    > **Description:**
    > Thanks for making time to chat! 
    > 
    > **Goal of this call:**
    > To learn how [Firm Name] balances the productivity gains of AI with strict client confidentiality and NDA compliance, and to get your candid feedback on our local-first desktop prototype.
    > 
    > **Agenda (20 Mins):**
    > 1. Current workflow bottlenecks in document review & synthesis (5 mins)
    > 2. Security, compliance, and partner policy guardrails you deal with (5 mins)
    > 3. Quick walk-through of our air-gapped local app approach for your feedback (7 mins)
    > 4. Next steps & private alpha pilot fit (3 mins)
    
    ---
    
    ### 5. Short Landing-Page Section
    *Use this for a private, password-protected waitlist page shared via direct link.*
    
    > **[H1] AI Productivity Without Compromising Client Confidentiality.**
    > **[Subheadline]** Standard AI tools require trusting cloud servers with sensitive files and client data. We are building an air-gapped, local-first workspace for regulated professionals. Zero cloud logging. Zero data leakage. Full local sovereignty.
    > 
    > **[Bullet Points]**
    > * **100% Offline Inference:** Runs locally on your machine using optimized small language models.
    > * **Secure Local Indexing:** Query local PDFs, contracts, and transcripts without data transit.
    > * **Designed for Boutique Firms:** Built specifically for practices bound by strict NDAs and compliance standards.
    > 
    > **[Call to Action Button]** Request Private Alpha Access
    
    ---
    
    ### Suggested Next Steps
    1. **Interactive Review:** Would you like to test these out by simulating a prospect persona response, or shall we map out the **Product Requirements Document (PRD)** for our Tauri desktop client wrapper?
    2. **Follow-up Prompt:** If you'd like to adjust the tone or focus of these messages for a specific legal or financial sub-segment, let me know!
