    The **Artemis II** mission recently concluded as a historic success, marking the first time humans have traveled to the vicinity of the Moon in over 50 years. Following its launch on **April 1, 2026**, the mission reached its climax with a successful splashdown in the Pacific Ocean on **April 10, 2026**.
    
    As an [astronomy](/#settings/appstore/study) and physics enthusiast, I find this mission particularly exciting because it serves as the final "test drive" before the Artemis III mission, which aims to land the first woman and next man on the lunar surface.
    
    ### Mission Overview
    Artemis II was a 10-day flight test designed to verify that the **Space Launch System (SLS)** rocket and **Orion** spacecraft (named *Integrity* by the crew) could safely transport, sustain, and return astronauts from deep space.
    
    *   **The Crew:** The four-person crew consisted of Commander **Reid Wiseman**, Pilot **Victor Glover**, Mission Specialist **Christina Koch** (NASA), and Mission Specialist **Jeremy Hansen** (CSA).
    *   **The Record:** During the mission, the crew set a new record for the farthest distance from Earth ever traveled by a human-rated spacecraft, reaching **252,756 miles** from our home planet—surpassing the record set by [Apollo 13](embed:nasa.gov-haz) in 1970.
    *   **The Trajectory:** Unlike the Apollo missions, Artemis II used a "hybrid free-return trajectory." After orbiting Earth to test systems, the spacecraft performed a lunar flyby, using the Moon's gravity to "slingshot" back toward Earth without needing a major engine burn to return.
    
    ### Photo Highlights from the Mission
    Here are some of the most stunning visual moments captured during the mission, from the thunderous launch at Kennedy Space Center to the serene views of Earth and the Moon.
    
    [!](embed:nasa.gov-mEC)
    [!](embed:nasa.gov-k1v)
    [!](embed:space.com-idA)
    [!](embed:nasa.gov-7Me)
    [!](embed:cbsnews.com-H7E)
    [!](embed:plus.nasa.gov-Srx)
    
    ### Key Milestones
    *   **Launch (Flight Day 1):** The SLS rocket, the most powerful rocket ever built, lifted off from Launch Complex 39B, delivering the Orion spacecraft into a high Earth orbit.
    *   **Proximity Operations (Flight Day 2):** The crew practiced manual handling of the spacecraft, a critical skill for future missions that will require docking with the [Lunar Gateway](https://www.nasa.gov/mission/gateway/).
    *   **Lunar Flyby (Flight Day 6):** The crew passed behind the Moon, losing contact with Earth for a brief period before emerging to see the "Earthrise" over the lunar horizon.
    *   **Splashdown (Flight Day 10):** Orion re-entered the atmosphere at roughly 25,000 mph, with its heat shield enduring temperatures of nearly 5,000°F before splashing down safely off the coast of San Diego.
    
    Now that the crew is back home, NASA will begin an intensive review of the flight data to prepare for **Artemis III**. 
    
    What part of the Artemis program interests you most—the [rocket technology](/#settings/appstore/web), the [lunar science](/#settings/appstore/books), or the future [Mars missions](/#settings/appstore/videos)?
    
