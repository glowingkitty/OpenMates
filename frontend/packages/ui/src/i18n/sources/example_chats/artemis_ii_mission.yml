    משימת **Artemis II** הסתיימה לאחרונה בהצלחה היסטורית, והיא מסמנת את הפעם הראשונה ביותר מ-50 שנה שבני אדם נסעו לקרבת הירח. לאחר השיגור ב-**1 באפריל 2026**, המשימה הגיעה לשיאה עם נחיתה מוצלחת באוקיינוס השקט ב-**10 באפריל 2026**.

    כחובב [אסטרונומיה](/#settings/appstore/study) ופיזיקה, אני מוצא את המשימה הזו מרגשת במיוחד כי היא משמשת כ"נסיעת מבחן" אחרונה לפני משימת Artemis III, שמטרתה להנחית את האישה הראשונה והגבר הבא על פני הירח.

    ### סקירת המשימה
    Artemis II היה מבחן טיסה בן 10 ימים שתוכנן לאמת שרקטת **Space Launch System (SLS)** וחללית **Orion** (שנקראה *Integrity* על ידי הצוות) יכולות להעביר, לתחזק ולהחזיר אסטרונאוטים מהחלל העמוק בבטחה.

    *   **הצוות:** צוות ארבעת האנשים כלל את המפקד **ריד וייזמן**, הטייס **ויקטור גלובר**, מומחית המשימה **כריסטינה קוך** (NASA) ומומחה המשימה **ג'רמי הנסן** (CSA).
    *   **השיא:** במהלך המשימה, הצוות קבע שיא חדש למרחק הגדול ביותר מכדור הארץ שאליו הגיעה חללית מאוישת — **252,756 מייל** מכוכב הלכת שלנו, וחרג מהשיא שנקבע על ידי [Apollo 13](embed:nasa.gov-haz) ב-1970.
    *   **המסלול:** בניגוד למשימות Apollo, Artemis II השתמשה ב"מסלול חזרה חופשי היברידי". לאחר הקפת כדור הארץ לבדיקת מערכות, החללית ביצעה מעבר ליד הירח, תוך שימוש בכוח הכבידה של הירח כדי "להיקלע" בחזרה לכדור הארץ ללא צורך בהפעלת מנוע משמעותית.

    ### תמונות בולטות מהמשימה
    הנה כמה מהרגעים החזותיים המרהיבים ביותר שצולמו במהלך המשימה, מהשיגור הרועם במרכז החלל קנדי ועד למראות השלווים של כדור הארץ והירח.

    [!](embed:nasa.gov-mEC)
    [!](embed:nasa.gov-k1v)
    [!](embed:space.com-idA)
    [!](embed:nasa.gov-7Me)
    [!](embed:cbsnews.com-H7E)
    [!](embed:plus.nasa.gov-Srx)

    ### אבני דרך מרכזיות
    *   **שיגור (יום טיסה 1):** רקטת SLS, הרקטה החזקה ביותר שנבנתה אי פעם, המריאה מכן השיגור 39B והעבירה את חללית Orion למסלול גבוה סביב כדור הארץ.
    *   **פעולות קרבה (יום טיסה 2):** הצוות תרגל שליטה ידנית בחללית — מיומנות קריטית למשימות עתידיות הדורשות עגינה ב-[Lunar Gateway](https://www.nasa.gov/mission/gateway/).
    *   **מעבר ליד הירח (יום טיסה 6):** הצוות עבר מאחורי הירח, איבד קשר עם כדור הארץ לתקופה קצרה ואז חזה ב"זריחת כדור הארץ" מעל אופק הירח.
    *   **נחיתה (יום טיסה 10):** Orion נכנסה מחדש לאטמוספרה במהירות של כ-40,000 קמ"ש, מגן החום שלה עמד בטמפרטורות של כמעט 2,800 מעלות צלזיוס לפני שנחתה בבטחה מול חופי סן דייגו.

    כעת, כשהצוות חזר הביתה, NASA תתחיל בבדיקה מעמיקה של נתוני הטיסה כהכנה ל-**Artemis III**.

    איזה חלק בתוכנית Artemis מעניין אתכם ביותר — [טכנולוגיית הרקטות](/#settings/appstore/web), [מדע הירח](/#settings/appstore/books), או [משימות המאדים](/#settings/appstore/videos) העתידיות?

