    {"type": "pcb_schematic", "embed_id": "46d63593-516e-49b5-8e7d-600c4fe18836"}
    ```
    
    Zdrojový kód je připraven pro proces přípravy PCB: OpenMates jej mohou odeslat do sandboxed kompilátoru Atopile, zobrazit stav sestavení a po úspěšném dokončení zpřístupnit vygenerovaný balíček zdrojů.
  sv: |
    Här är en kompakt Atopile 0.15.7-utgångspunkt för ett USB-C-drivet 3,3V-regulatorsteg. Det håller schemat fristående, använder `module App` som startpunkt för bygget, modellerar USB-C-ingången och LDO:n som enkla power-interface-moduler, och lägger till 10uF/1uF avkoppling plus en diodindikator på den reglerade skenan.
    
    ```json
