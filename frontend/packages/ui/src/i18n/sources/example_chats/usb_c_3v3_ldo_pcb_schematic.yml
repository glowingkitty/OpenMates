    ```
    
    Källkoden är redo för PCB-förberedelseflödet: OpenMates kan skicka den till den isolerade Atopile-kompilatorn, visa byggstatus och exponera det genererade källkodspaketet när bygget lyckas.
  he: |
    הנה נקודת התחלה קומפקטית ב-Atopile 0.15.7 עבור דרגת מייצב 3.3V המוזנת מ-USB-C. היא שומרת על הסכימה עצמאית, משתמשת ב-`module App` כנקודת הכניסה לבנייה, ממדלת את כניסת ה-USB-C וה-LDO כמודולי ממשק-כוח פשוטים, ומוסיפה קבלי צימוד של 10uF/1uF בתוספת דיודת חיווי על הפס המיוצב.
    
    ```json
