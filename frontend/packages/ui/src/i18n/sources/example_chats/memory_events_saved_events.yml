message_2:
  context: "assistant message 2 in example chat: Memory Events Saved Events. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your [saved event](/#settings/app_store/events/settings_memories/saved_events) for the [Berlin AI Builders Meetup](wiki:Berlin) on June 18, 2026, here is a practical checklist to ensure you are ready for the session at Factory Berlin in [Kreuzberg](wiki:Kreuzberg).
    
    ### **Preparation & Content**
    *   **Draft your 30-second builder intro:** Focus on who you are, what you are currently building, and what you hope to learn or contribute to the community.
    *   **Refine your demo idea:** Since the notes specify having one demo idea ready, ensure you can explain the core value proposition and the [artificial intelligence](wiki:Artificial_intelligence) stack you intend to use.
    *   **Prepare a "Call to Action":** Think about one specific thing you need help with (e.g., a technical hurdle or a collaborator) so you can make the most of the networking time.
    
    ### **Logistics & Materials**
    *   **Charge your hardware:** Ensure your laptop and phone are fully charged if you plan to show any code or digital mockups.
    *   **Digital Contact Info:** Have a [QR code](wiki:QR_code) or a digital business card ready on your phone to quickly share your [GitHub](wiki:GitHub) or [LinkedIn](wiki:LinkedIn) profile.
    *   **Travel Planning:** Aim to arrive at the venue by 18:15 to settle in before the 18:30 start time.
    
    ### **Mental Preparation**
    *   **Set a Networking Goal:** Decide to speak with at least three new people about their projects to foster a sense of belonging in the local AI community.
    *   **Growth Mindset:** Approach the demo feedback as a learning opportunity to improve your idea rather than a critique of your skills.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
