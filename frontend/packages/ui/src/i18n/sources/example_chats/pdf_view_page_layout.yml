message_2:
  context: "assistant message 2 in example chat: View a PDF page. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "54a8d949-0a13-463f-bc6a-958e1f746f79", "app_id": "pdf", "skill_id": "view", "query": "Please describe the visual layout of this page, including the title and the structure of any bulleted lists."}
    ```
    
    _
    The first page of sample.pdf features a clean, professional layout with the following structure:
    
    ### **Visual Layout Overview**
    *   **Title:** The document begins with a prominent, bold heading: **"OpenMates PDF Test Document"**.
    *   **Subheading:** Immediately below the title is a line indicating the page and section: "Page 1 of 2 — Introduction".
    *   **Introductory Paragraph:** A brief paragraph explains that the document is intended for testing PDF upload and AI reading features.
    *   **Bullet List Structure:** 
        *   The list is introduced by the phrase "Key facts on this page:".
        *   It consists of **three bullet points**, each marked with a standard black circular bullet (•).
        *   The bullets highlight the document title, a "secret word" (ALPHA), and the nature of the text on the page.
    *   **Closing Text:** A final sentence notes that an AI assistant should be able to read the content and identify the secret word.
    
    Would you like me to [read the text](/#settings/apps/pdf) from page 2 or [search for specific keywords](/#settings/apps/pdf) within the document?
