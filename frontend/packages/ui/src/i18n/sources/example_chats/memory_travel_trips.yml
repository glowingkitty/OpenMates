    *   **09:00 – 13:00 | Remote Work:** Spend your morning working from your accommodation or a quiet local café to get your tasks done early.
    *   **13:00 – 14:30 | Local Lunch:** Head out for a quick, authentic lunch. Look for a local "Tasca" to try a *Bifana* (traditional pork sandwich) or some *Pastéis de Bacalhau* (codfish fritters).
    *   **14:30 – 16:30 | Alfama Wandering:** Take a slow walk through the winding, narrow streets of [Alfama](wiki:Alfama). This is the oldest district in the city, and the best way to see it is by simply getting "lost" among the tiled buildings and laundry-lined balconies.
    *   **16:30 – 18:00 | Viewpoint Relaxation:** Make your way to Miradouro de Santa Luzia or the nearby Miradouro das Portas do Sol. These spots offer stunning panoramic views of the red rooftops and the [Tagus](wiki:Tagus) river, perfect for a relaxed start to your trip.
    *   **19:30 | Dinner and Fado:** End your first day with a late dinner in one of the traditional restaurants in the heart of the district. If you find a spot that features [Fado](wiki:Fado) music, you can enjoy the soulful atmosphere of the city's traditional folk music while you eat.
