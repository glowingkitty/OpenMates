message_1:
  context: "user message 1 in example chat: Transcribe a voice note. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Please transcribe this audio file. Do not search the web and do not include any markdown links. Just quote the exact transcript:
    ```json
    {
      "type": "audio-recording",
      "embed_id": "4e7bca90-2a2a-4cf2-b773-ac5b3a4dc40b"
    }
    ```
  de: |
