message_1:
  context: "user message 1 in example chat: Task Planning Checklist. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "@skill:tasks:create Do not ask follow-up questions. Create exactly these three tasks for a public OpenMates demo release checklist. Task 1 title: Review transcript for private data. Description: Confirm the source chat does not contain secrets, personal data, or private account details before publishing. Assign to me. Task 2 title: Verify Tasks and Workflows embeds. Description: Open the public example pages and confirm both parent embeds and child previews render and open fullscreen. Assign to me. Task 3 title: Write public release note. Description: Draft a short release note for developers explaining that the examples come from real CLI-created app-skill chats. Assign to OpenMates."
  de: "@skill:tasks:create Stelle keine Rückfragen. Erstelle genau diese drei Aufgaben für eine öffentliche OpenMates-Demo-Release-Checkliste. Aufgabe 1 Titel: Transkript auf private Daten prüfen. Beschreibung: Bestätige vor der Veröffentlichung, dass der Quellchat keine Geheimnisse, personenbezogenen Daten oder privaten Kontodetails enthält. Weise sie mir zu. Aufgabe 2 Titel: Tasks- und Workflows-Embeds prüfen. Beschreibung: Öffne die öffentlichen Beispielseiten und bestätige, dass sowohl Parent-Embeds als auch Child-Previews rendern und im Vollbild öffnen. Weise sie mir zu. Aufgabe 3 Titel: Öffentliche Release-Notiz schreiben. Beschreibung: Entwirf eine kurze Release-Notiz für Entwickler, die erklärt, dass die Beispiele aus echten per CLI erstellten App-Skill-Chats stammen. Weise sie OpenMates zu."
