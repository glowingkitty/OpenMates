  context: "user message 1 in example chat: Memory Travel Saved Connections. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved travel connection memory to suggest what I should prepare before my saved trip. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
