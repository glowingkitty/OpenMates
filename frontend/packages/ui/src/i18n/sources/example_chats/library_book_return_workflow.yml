    ```
    
    I have created the **Library Book Return Checklist** workflow. This manual automation includes the following steps:
    
    1.  **Gather books**: Gather borrowed books from the shelf.
    2.  **Check due dates**: Check due dates in the library account.
    3.  **Pack tote bag**: Pack books in a tote bag before leaving home.
    
