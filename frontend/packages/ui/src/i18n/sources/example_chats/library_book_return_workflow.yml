message_1:
  context: "user message 1 in example chat: Library Book Return Workflow. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "@skill:workflows:create-or-modify Do not ask follow-up questions. Create a simple manual workflow titled Library Book Return Checklist. It should have a manual trigger and three manual steps: gather borrowed books from the shelf, check due dates in the library account, and pack books in a tote bag before leaving home. Keep it concise and suitable for a public demo."
  de: "@skill:workflows:create-or-modify Stelle keine Rückfragen. Erstelle einen einfachen manuellen Workflow mit dem Titel Bibliotheksbücher-Rückgabe-Checkliste. Er soll einen manuellen Trigger und drei manuelle Schritte haben: ausgeliehene Bücher aus dem Regal zusammensuchen, Fälligkeitsdaten im Bibliothekskonto prüfen und die Bücher vor dem Verlassen des Hauses in eine Stofftasche packen. Halte ihn knapp und für eine öffentliche Demo geeignet."
