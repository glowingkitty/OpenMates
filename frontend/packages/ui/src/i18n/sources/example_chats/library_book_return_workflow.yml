message_2:
  context: "assistant message 2 in example chat: Library Book Return Workflow. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "cda4695f-7f68-42d7-9cfe-d719aa08dc3e", "app_id": "workflows", "skill_id": "create-or-modify"}
    ```
    
    Ich habe den Workflow **Bibliotheksbücher-Rückgabe-Checkliste** erstellt. Diese manuelle Automatisierung enthält die folgenden Schritte:
    
    1.  **Bücher zusammensuchen**: Ausgeliehene Bücher aus dem Regal nehmen.
    2.  **Fälligkeitsdaten prüfen**: Fälligkeitsdaten im Bibliothekskonto prüfen.
    3.  **Stofftasche packen**: Bücher vor dem Verlassen des Hauses in eine Stofftasche packen.
    
    Du kannst diese Checkliste in der [Workflows-App](/#settings/apps/workflows) ansehen und verwalten.
