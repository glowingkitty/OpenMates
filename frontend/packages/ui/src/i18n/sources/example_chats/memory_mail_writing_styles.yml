message_2:
  context: "assistant message 2 in example chat: Email writing style memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your **Friday client update** writing style from your [mail settings](/#settings/apps/mail), I've prepared a draft for you. This style focuses on being warm, concise, and specific, with clear bullet points for next steps.
    
    ***
    
    **Subject:** Progress Update: [Project Name] | Friday, June 12
    
    Hi [Client Name],
    
    I hope you’ve had a productive week! 
    
    We’ve made some great progress on [Project Name] over the last few days. Specifically, we have successfully completed [Specific Task 1] and are currently finalizing the [Specific Task 2]. Everything is tracking well according to our timeline.
    
    **Next steps:**
    * [Action Item 1] – Scheduled for completion by [Day]
    * [Action Item 2] – Internal review of [Deliverable]
    * [Action Item 3] – Follow-up meeting on [Date/Time]
    
    I'll keep you posted as these items progress. Have a wonderful weekend!
    
    Best,  
    Alex
    
    ***
    
    Would you like me to save this as a draft in your email account, or should we adjust any of the details first?
    
    ```interactive_question
    {
      "type": "choice",
      "id": "draft_action",
      "multiple": false,
      "question": "What would you like to do with this draft?",
      "options": [
        { "id": "save_draft", "text": "Save as draft in Mail app" },
        { "id": "edit_tone", "text": "Adjust the tone" },
        { "id": "add_details", "text": "Add specific project details" }
      ]
    }
    ```

    ```json
    {"type": "mail-email", "embed_id": "45ef1cc5-abac-40cb-89ba-ee703709ce73"}
    ```
    
    
