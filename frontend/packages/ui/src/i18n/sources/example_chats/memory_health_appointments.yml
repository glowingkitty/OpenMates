message_2:
  context: "assistant message 2 in example chat: Memory Health Appointments. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved health records, your next appointment is a **Dermatology follow-up** at the **Mitte Skin Clinic** on **June 20, 2026**.

    Here is a simple preparation checklist based on your notes:

    *   [ ] **Photos:** Gather and organize the photos of your rash flare-ups to show the specialist.
    *   [ ] **Questions:** Write down a list of specific questions regarding your different treatment options.
    *   [ ] **Logistics:** Confirm your travel time to [Mitte](wiki:Mitte) to ensure you arrive at the clinic on time.
    *   [ ] **Symptoms:** Note any recent changes or triggers you've observed since your last flare-up.
    ---
    *⚠️ This is educational information only and not medical advice. Consult your doctor for medical decisions.*
  de: |
    Basierend auf deinen gespeicherten Gesundheitsdaten ist dein nächster Termin eine **dermatologische Nachuntersuchung** in der **Mitte Skin Clinic** am **20. Juni 2026**.
    
    Hier ist eine einfache Checkliste zur Vorbereitung basierend auf deinen Notizen:
    
    *   [ ] **Fotos:** Sammle und ordne die Fotos deiner Hautausschläge, um sie dem Spezialisten zu zeigen.
    *   [ ] **Fragen:** Schreibe eine Liste mit spezifischen Fragen zu deinen verschiedenen Behandlungsoptionen auf.
    *   [ ] **Logistik:** Bestätige deine Fahrzeit nach [Mitte](wiki:Mitte), um sicherzustellen, dass du pünktlich in der Klinik ankommst.
    *   [ ] **Symptome:** Notiere alle kürzlichen Veränderungen oder Auslöser, die du seit deinem letzten Schub beobachtet hast.
    ---
    *⚠️ Dies dient nur zu Informationszwecken und ist keine medizinische Beratung. Konsultiere für medizinische Entscheidungen deinen Arzt.*
