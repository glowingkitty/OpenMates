summary:
  context: Summary of example chat where user searched flights from Berlin to Bangkok and received airline options
  en: User searched for flights from Berlin to Bangkok on April 14, 2026, and received options from Qatar Airways, Turkish Airlines, Air France, and KLM.
  de: Der Benutzer suchte nach Flügen von Berlin nach Bangkok am 14. April 2026 und erhielt Optionen von Qatar Airways, Turkish Airlines, Air France und KLM.
  zh: 用户搜索了2026年4月14日从柏林到曼谷的航班，并收到了卡塔尔航空、土耳其航空、法国航空和荷兰皇家航空的选项。
  es: El usuario buscó vuelos de Berlín a Bangkok para el 14 de abril de 2026 y recibió opciones de Qatar Airways, Turkish Airlines, Air France y KLM.
  fr: L'utilisateur a recherché des vols de Berlin à Bangkok pour le 14 avril 2026 et a reçu des options de Qatar Airways, Turkish Airlines, Air France et KLM.
  pt: O utilizador pesquisou voos de Berlim para Banguecoque em 14 de abril de 2026 e recebeu opções da Qatar Airways, Turkish Airlines, Air France e KLM.
  ru: Пользователь искал рейсы из Берлина в Бангкок на 14 апреля 2026 года и получил варианты от Qatar Airways, Turkish Airlines, Air France и KLM.
  ja: ユーザーが2026年4月14日のベルリンからバンコク行きのフライトを検索し、Qatar Airways、Turkish Airlines、Air France、KLMの選択肢を受け取りました。
  ko: 사용자가 2026년 4월 14일 베를린에서 방콕으로 가는 항공편을 검색했으며, Qatar Airways, Turkish Airlines, Air France, KLM의 옵션을 받았습니다.
  it: L'utente ha cercato voli da Berlino a Bangkok per il 14 aprile 2026 e ha ricevuto opzioni da Qatar Airways, Turkish Airlines, Air France e KLM.
  tr: Kullanıcı 14 Nisan 2026 tarihinde Berlin'den Bangkok'a uçuş aradı ve Qatar Airways, Turkish Airlines, Air France ve KLM seçeneklerini aldı.
  vi: Người dùng đã tìm kiếm chuyến bay từ Berlin đến Bangkok vào ngày 14 tháng 4 năm 2026 và nhận được các tùy chọn từ Qatar Airways, Turkish Airlines, Air France và KLM.
  id: Pengguna mencari penerbangan dari Berlin ke Bangkok pada 14 April 2026, dan menerima pilihan dari Qatar Airways, Turkish Airlines, Air France, dan KLM.
  pl: Użytkownik wyszukał loty z Berlina do Bangkoku na 14 kwietnia 2026 roku i otrzymał opcje od Qatar Airways, Turkish Airlines, Air France i KLM.
  nl: De gebruiker zocht vluchten van Berlijn naar Bangkok op 14 april 2026 en ontving opties van Qatar Airways, Turkish Airlines, Air France en KLM.
  ar: بحث المستخدم عن رحلات من برلين إلى بانكوك في 14 أبريل 2026، وتلقّى خيارات من Qatar Airways وTurkish Airlines وAir France وKLM.
  hi: उपयोगकर्ता ने 14 अप्रैल 2026 को बर्लिन से बैंकॉक तक उड़ानें खोजीं, और Qatar Airways, Turkish Airlines, Air France तथा KLM के विकल्प प्राप्त किए।
  th: ผู้ใช้ค้นหาเที่ยวบินจากเบอร์ลินไปบางกอกในวันที่ 14 เมษายน 2026 และได้รับตัวเลือกจาก Qatar Airways, Turkish Airlines, Air France และ KLM
  cs: Uživatel hledal lety z Berlína do Bangkoku na 14. dubna 2026 a obdržel nabídky od Qatar Airways, Turkish Airlines, Air France a KLM.
  sv: Användaren sökte efter flyg från Berlin till Bangkok den 14 april 2026 och fick alternativ från Qatar Airways, Turkish Airlines, Air France och KLM.
  he: "המשתמש חיפש טיסות מברלין לבנגקוק ב-14 באפריל 2026, וקיבל אפשרויות מ-Qatar Airways, Turkish Airlines, Air France ו-KLM."
