message_2:
  context: "assistant message 2 in example chat: AI communication style memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your preference for a **Concise technical coach** style, here is a high-efficiency 3-hour [Monday](wiki:Monday) work block designed for maximum output.
    
    ### Monday Morning Focus Block (08:00 – 11:00)
    
    ```json
    {"type": "sheet", "embed_id": "bb2f5aa1-d838-4d88-8c2e-d54ecf3cd069"}
    ```
    
    
    ### Practical Execution
    *   **Environment:** Place your phone in another room to eliminate cognitive switching.
    *   **Intervals:** Use the **[Pomodoro Technique](wiki:Pomodoro_Technique)** (50/10) if you find your focus waning.
    *   **Priority:** Identify your "One Big Thing" the night before to avoid decision fatigue at 08:00.
    
    How would you like to refine this block for your specific stack or project type?
    
    ```interactive_question
    {
      "type": "choice",
      "id": "work_block_refinement",
      "multiple": false,
      "question": "What is your primary objective for this Monday block?",
      "options": [
        { "id": "coding", "text": "Deep Feature Development / Coding" },
        { "id": "architecture", "text": "System Design & Architecture" },
        { "id": "maintenance", "text": "Debugging & Maintenance" },
        { "id": "planning", "text": "Strategic Planning & Meetings" }
      ]
    }
    ```

