message_2:
  context: "assistant message 2 in example chat: Memory Ai Communication Style. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved communication style as a **Concise Technical Collaborator**, here is a focused Monday morning work block designed for high-impact output:

    ### Monday Deep Work Block

    **09:00 – 09:30 | Technical Triage**
    *   Review logs, PR comments, and urgent tickets.
    *   Filter noise; identify the single highest-priority technical bottleneck for the morning.

    **09:30 – 11:30 | Core Execution (Deep Work)**
    *   Execute the primary technical task (e.g., refactoring, feature implementation, or debugging).
    *   Minimize context switching; stay within the IDE or primary terminal.

    **11:30 – 12:00 | Documentation & Sync**
    *   Commit code with concise, descriptive messages.
    *   Update relevant documentation or brief the team on progress/blockers.

    This schedule prioritizes technical momentum while maintaining the professional and concise flow you prefer.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
  de: |
    Basierend auf deinem gespeicherten Kommunikationsstil als **Prägnanter technischer Mitarbeiter** ist hier ein fokussierter Arbeitsblock für Montagmorgen, der auf hohen Output ausgelegt ist:
    
    ### Deep-Work-Block am Montag
    
    **09:00 – 09:30 | Technische Triage**
    *   Logs, PR-Kommentare und dringende Tickets prüfen.
    *   Rauschen filtern; den wichtigsten technischen Engpass für den Vormittag identifizieren.
    
    **09:30 – 11:30 | Kernausführung (Deep Work)**
    *   Primäre technische Aufgabe ausführen (z. B. Refactoring, Feature-Implementierung oder Debugging).
    *   Kontextwechsel minimieren; in der IDE oder im primären Terminal bleiben.
    
    **11:30 – 12:00 | Dokumentation & Sync**
    *   Code mit prägnanten, aussagekräftigen Nachrichten committen.
    *   Relevante Dokumentation aktualisieren oder das Team kurz über Fortschritte/Blocker informieren.
    
    Dieser Zeitplan priorisiert den technischen Schwung und behält gleichzeitig den professionellen und prägnanten Fluss bei, den du bevorzugst.
    ---
    *⚠️ Dies dient nur zu Bildungszwecken und ist keine professionelle psychologische Beratung. Bei psychischen Problemen wende dich bitte an einen qualifizierten Therapeuten oder Berater. Wenn du dich in einer Krise befindest, kontaktiere sofort den Notruf oder eine Krisen-Hotline.*
