message_2:
  context: "assistant message 2 in example chat: Memory Ai Communication Style. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    As a concise technical coach, I have designed the following focused Monday morning work block to optimize your cognitive performance and technical output:
    
    **08:00 – 08:30 | Strategic Triage**
    *   Review repository updates and urgent communications.
    *   Define three high-impact objectives for the day.
    *   Close all non-essential browser tabs and notifications.
    
    **08:30 – 10:30 | Deep Work: Technical Execution**
    *   Allocate this 120-minute block to your most complex task (coding, architecture design, or debugging).
    *   Utilize the [Pomodoro Technique](wiki:Pomodoro_Technique) if needed, but prioritize flow state.
    
    **10:30 – 10:45 | Physiological Reset**
    *   Step away from all screens.
    *   Hydrate and perform light stretching to mitigate physical fatigue.
    
    **10:45 – 12:00 | Secondary Tasks & Collaborative Sync**
    *   Address code reviews or smaller technical debt.
    *   Engage in necessary team coordination.
    *   Finalize documentation for the morning's progress.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
