summary:
  context: "Summary of example chat: Berlin Morning Bike Forecast"
  en: "A concise Berlin weather forecast that helps decide whether to bike to Tempelhofer Feld."
  de: Eine kompakte Wettervorhersage für Berlin, die bei der Entscheidung hilft, ob man zum Tempelhofer Feld radeln sollte.
  zh: 一份简洁的柏林天气预报，帮助你决定是否骑车前往滕佩尔霍夫机场。
  es: Un pronóstico del tiempo conciso para Berlín que ayuda a decidir si ir en bici a Tempelhofer Feld.
  fr: "Une météo concise de Berlin pour t'aider à décider si tu vas à Tempelhofer Feld à vélo."
  pt: Uma previsão meteorológica concisa de Berlim que ajuda a decidir se deves ir de bicicleta para Tempelhofer Feld.
  ru: Краткий прогноз погоды в Берлине, который поможет решить, стоит ли ехать на велосипеде на Темпельхофское поле.
  ja: テンペルホーフ空港公園まで自転車で行くかどうかを決めるのに役立つ、ベルリンの簡潔な天気予報。
  ko: 템펠호퍼 펠트까지 자전거를 타고 갈지 결정하는 데 도움이 되는 간결한 베를린 일기 예보입니다.
  it: Una previsione meteo concisa per Berlino che aiuta a decidere se andare in bici a Tempelhofer Feld.
  tr: "Tempelhofer Feld'e bisikletle gidip gitmemeye karar vermene yardımcı olan kısa bir Berlin hava durumu tahmini."
  vi: Bản tin dự báo thời tiết Berlin ngắn gọn giúp bạn quyết định có nên đạp xe đến Tempelhofer Feld hay không.
  id: Prakiraan cuaca Berlin yang ringkas untuk membantumu memutuskan apakah akan bersepeda ke Tempelhofer Feld.
  pl: Zwięzła prognoza pogody dla Berlina, która pomoże Ci zdecydować, czy wybrać się rowerem na Tempelhofer Feld.
  nl: Een beknopte weersverwachting voor Berlijn die helpt beslissen of je naar Tempelhofer Feld gaat fietsen.
  ar: توقعات موجزة لطقس برلين تساعدك في اتخاذ قرار ركوب الدراجة إلى تمبلهوفر فيلد.
  hi: बर्लिन के मौसम का एक संक्षिप्त पूर्वानुमान जो यह तय करने में मदद करता है कि टेम्पेलहोफ़र फेल्ड तक बाइक से जाना चाहिए या नहीं।
  th: พยากรณ์อากาศเบอร์ลินแบบย่อที่ช่วยตัดสินใจว่าจะปั่นจักรยานไป Tempelhofer Feld หรือไม่
  cs: Stručná předpověď počasí pro Berlín, která ti pomůže rozhodnout se, zda vyrazit na kole na Tempelhofer Feld.
  sv: En kortfattad väderprognos för Berlin som hjälper dig att avgöra om du ska cykla till Tempelhofer Feld.
