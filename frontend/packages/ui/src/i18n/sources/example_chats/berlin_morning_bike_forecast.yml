message_1:
  context: "user message 1 in example chat: Berlin Morning Bike Forecast. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "@skill:weather:forecast What's the weather forecast for Berlin tomorrow morning, and should I bike to Tempelhofer Feld? Keep the answer concise."
  de: "@skill:weather:forecast Wie ist die Wettervorhersage für Berlin morgen früh und sollte ich zum Tempelhofer Feld radeln? Halte die Antwort kurz."
  zh: "@skill:weather:forecast 柏林明天早上的天气预报如何，我应该骑车去滕佩尔霍夫机场（Tempelhofer Feld）吗？请简短回答。"
  es: "@skill:weather:forecast ¿Cuál es el pronóstico del tiempo para Berlín mañana por la mañana y debería ir en bici a Tempelhofer Feld? Mantén la respuesta concisa."
  fr: "@skill:weather:forecast Quelles sont les prévisions météo pour Berlin demain matin, et devrais-je aller à Tempelhofer Feld à vélo ? Sois concis."
  pt: "@skill:weather:forecast Qual é a previsão do tempo para Berlim amanhã de manhã e devo ir de bicicleta para Tempelhofer Feld? Mantém a resposta concisa."
  ru: "@skill:weather:forecast Какой прогноз погоды в Берлине на завтрашнее утро и стоит ли мне ехать на велосипеде на Темпельхофское поле? Ответь кратко."
  ja: "@skill:weather:forecast 明日の朝のベルリンの天気予報を教えて。テンペルホーフ空港公園まで自転車で行っても大丈夫かな？簡潔に答えて。"
  ko: "@skill:weather:forecast 내일 아침 베를린 날씨가 어때? 그리고 템펠호퍼 펠트까지 자전거를 타고 가도 될까? 답변은 간결하게 해줘."
  it: "@skill:weather:forecast Quali sono le previsioni meteo per Berlino domani mattina? Mi consigli di andare in bici a Tempelhofer Feld? Sii conciso nella risposta."
  tr: "@skill:weather:forecast Yarın sabah Berlin için hava durumu tahmini nedir ve Tempelhofer Feld'e bisikletle gitmeli miyim? Cevabı kısa tut."
  vi: "@skill:weather:forecast Dự báo thời tiết Berlin sáng mai thế nào, và tôi có nên đạp xe đến Tempelhofer Feld không? Trả lời ngắn gọn thôi nhé."
  id: "@skill:weather:forecast Bagaimana prakiraan cuaca untuk Berlin besok pagi, dan apakah aku sebaiknya bersepeda ke Tempelhofer Feld? Berikan jawaban yang ringkas."
  pl: "@skill:weather:forecast Jaka jest prognoza pogody dla Berlina na jutro rano i czy warto wybrać się rowerem na Tempelhofer Feld? Odpowiedz zwięźle."
  nl: "@skill:weather:forecast Wat is de weersverwachting voor Berlijn morgenochtend, en moet ik naar Tempelhofer Feld fietsen? Houd het antwoord beknopt."
  ar: "@skill:weather:forecast ما هي توقعات الطقس في برلين صباح الغد، وهل تنصحني بركوب الدراجة إلى تمبلهوفر فيلد؟ اجعل الإجابة موجزة."
  hi: "@skill:weather:forecast कल सुबह बर्लिन के मौसम का पूर्वानुमान क्या है, और क्या मुझे टेम्पेलहोफ़र फेल्ड तक बाइक से जाना चाहिए? उत्तर संक्षिप्त रखें।"
  th: "@skill:weather:forecast พยากรณ์อากาศสำหรับเบอร์ลินเช้าวันพรุ่งนี้เป็นอย่างไร และฉันควรปั่นจักรยานไป Tempelhofer Feld ไหม? ขอคำตอบแบบกระชับ"
  cs: "@skill:weather:forecast Jaká je předpověď počasí pro Berlín na zítřejší ráno a mám jet na kole na Tempelhofer Feld? Odpověz stručně."
  sv: "@skill:weather:forecast Hur ser väderprognosen ut för Berlin i morgon bitti, och bör jag cykla till Tempelhofer Feld? Håll svaret kortfattat."
  he: "@skill:weather:forecast מהי תחזית מזג האוויר לברלין מחר בבוקר, והאם כדאי לי לרכוב על אופניים לטמפלהופר פלד? שמור על תשובה תמציתית."
  verified_by_human: []

message_2:
  context: "assistant message 2 in example chat: Berlin Morning Bike Forecast. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Tomorrow morning in [Berlin](wiki:Berlin) (Friday, June 19, 2026), the weather will be dry and partly cloudy, with temperatures starting around 18–20°C and rising quickly toward a high of 32°C.
    
    **Should you bike to [Tempelhofer Feld](wiki:Tempelhofer_Feld)?**
    Yes, it's a great idea! Conditions are ideal for biking:
    *   **Dry:** No rain expected (4% probability).
    *   **Calm:** Wind speeds are light (approx. 11 km/h).
    *   **Morning Window:** Biking in the morning is highly recommended to avoid the afternoon heat peak of 32°C, especially since the airfield offers very little shade.
    
    **What's your plan for the rest of the day?**
    *   Would you like to find a [beer garden](wiki:Beer_garden) or cafe near Tempelhof to cool off afterward?
    *   Do you need a more detailed [hourly forecast](/#settings/apps/weather) to time your ride perfectly?
  de: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Morgen früh in [Berlin](wiki:Berlin) (Freitag, 19. Juni 2026) wird das Wetter trocken und teils bewölkt sein, mit Temperaturen, die bei etwa 18–20 °C beginnen und schnell auf einen Höchstwert von 32 °C steigen.
    
    **Solltest du zum [Tempelhofer Feld](wiki:Tempelhofer_Feld) radeln?**
    Ja, das ist eine tolle Idee! Die Bedingungen zum Radfahren sind ideal:
    *   **Trocken:** Kein Regen erwartet (4 % Wahrscheinlichkeit).
    *   **Ruhig:** Die Windgeschwindigkeiten sind gering (ca. 11 km/h).
    *   **Zeitfenster am Morgen:** Radfahren am Morgen ist sehr empfehlenswert, um die Mittagshitze von 32 °C zu vermeiden, da das Flugfeld kaum Schatten bietet.
    
    **Was hast du für den Rest des Tages geplant?**
    *   Möchtest du einen [Biergarten](wiki:Beer_garden) oder ein Café in der Nähe von Tempelhof finden, um dich danach abzukühlen?
    *   Benötigst du eine detailliertere [stündliche Vorhersage](/#settings/apps/weather), um deine Fahrt perfekt zu planen?
  zh: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    明天早上在[柏林](wiki:Berlin)（2026年6月19日，星期五），天气干燥且多云，气温从 18–20°C 左右开始，并迅速升至最高温 32°C。
    
    **你应该骑车去[滕佩尔霍夫机场](wiki:Tempelhofer_Feld)吗？**
    是的，这是个好主意！天气条件非常适合骑行：
    *   **干燥：** 预计无雨（降水概率 4%）。
    *   **风力微弱：** 风速较小（约 11 公里/小时）。
    *   **早间时段：** 强烈建议在早上骑行，以避开下午 32°C 的高温巅峰，尤其是因为机场跑道几乎没有遮荫处。
    
    **你今天剩下的时间有什么计划？**
    *   你想在滕佩尔霍夫附近找一家[啤酒花园](wiki:Beer_garden)或咖啡馆消暑吗？
    *   你需要更详细的[逐小时预报](/#settings/apps/weather)来完美规划你的骑行时间吗？
  es: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Mañana por la mañana en [Berlín](wiki:Berlin) (viernes 19 de junio de 2026), el tiempo estará seco y parcialmente nublado, con temperaturas que comenzarán alrededor de los 18-20 °C y subirán rápidamente hacia una máxima de 32 °C.
    
    **¿Deberías ir en bici a [Tempelhofer Feld](wiki:Tempelhofer_Feld)?**
    ¡Sí, es una gran idea! Las condiciones son ideales para ir en bici:
    *   **Seco:** No se espera lluvia (4 % de probabilidad).
    *   **Calma:** La velocidad del viento es leve (aprox. 11 km/h).
    *   **Franja matutina:** Se recomienda encarecidamente ir en bici por la mañana para evitar el pico de calor de 32 °C de la tarde, especialmente porque el aeródromo ofrece muy poca sombra.
    
    **¿Cuál es tu plan para el resto del día?**
    *   ¿Te gustaría buscar un [beer garden](wiki:Beer_garden) o una cafetería cerca de Tempelhof para refrescarte después?
    *   ¿Necesitas un [pronóstico por horas](/#settings/apps/weather) más detallado para planificar tu paseo a la perfección?
  fr: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Demain matin à [Berlin](wiki:Berlin) (vendredi 19 juin 2026), le temps sera sec et partiellement nuageux, avec des températures débutant autour de 18–20°C et grimpant rapidement vers un maximum de 32°C.
    
    **Devrais-tu aller à [Tempelhofer Feld](wiki:Tempelhofer_Feld) à vélo ?**
    Oui, c'est une excellente idée ! Les conditions sont idéales pour le vélo :
    *   **Sec :** Pas de pluie prévue (probabilité de 4 %).
    *   **Calme :** Le vent est faible (env. 11 km/h).
    *   **Créneau matinal :** Il est fortement recommandé de faire du vélo le matin pour éviter le pic de chaleur de 32°C l'après-midi, d'autant plus que l'ancien aérodrome offre très peu d'ombre.
    
    **Quel est ton programme pour le reste de la journée ?**
    *   Aimerais-tu trouver un [beer garden](wiki:Beer_garden) ou un café près de Tempelhof pour te rafraîchir après ?
    *   As-tu besoin de [prévisions horaires](/#settings/apps/weather) plus détaillées pour planifier ton trajet au moment idéal ?
  pt: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Amanhã de manhã em [Berlim](wiki:Berlin) (sexta-feira, 19 de junho de 2026), o tempo estará seco e parcialmente nublado, com temperaturas a começar por volta dos 18–20°C e a subir rapidamente para uma máxima de 32°C.
    
    **Deves ir de bicicleta para [Tempelhofer Feld](wiki:Tempelhofer_Feld)?**
    Sim, é uma excelente ideia! As condições são ideais para pedalar:
    *   **Seco:** Não se espera chuva (4% de probabilidade).
    *   **Calmo:** A velocidade do vento é ligeira (aprox. 11 km/h).
    *   **Janela da Manhã:** Recomenda-se vivamente andar de bicicleta de manhã para evitar o pico de calor de 32°C da tarde, especialmente porque o aeródromo oferece muito pouca sombra.
    
    **Qual é o teu plano para o resto do dia?**
    *   Gostarias de encontrar um [beer garden](wiki:Beer_garden) ou café perto de Tempelhof para te refrescares depois?
    *   Precisas de uma [previsão horária](/#settings/apps/weather) mais detalhada para programares o teu passeio na perfeição?
  ru: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    Завтра утром в [Берлине](wiki:Berlin) (пятница, 19 июня 2026 г.) будет сухо и малооблачно. Температура составит около 18–20°C и быстро поднимется до максимума в 32°C.
    
    **Стоит ли ехать на велосипеде на [Темпельхофское поле](wiki:Tempelhofer_Feld)?**
    Да, это отличная идея! Условия идеальны для поездки:
    *   **Сухо:** Осадков не ожидается (вероятность 4%).
    *   **Спокойно:** Ветер слабый (около 11 км/ч).
    *   **Утреннее окно:** Рекомендую ехать именно утром, чтобы избежать дневного пика жары в 32°C, так как на территории аэродрома почти нет тени.
    
    **Какие планы на остаток дня?**
    *   Хочешь найти [биргартен](wiki:Beer_garden) или кафе рядом с Темпельхофом, чтобы освежиться после поездки?
    *   Нужен более подробный [почасовой прогноз](/#settings/apps/weather), чтобы идеально рассчитать время прогулки?
  ja: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    明日（2026年6月19日金曜日）の朝の[ベルリン](wiki:Berlin)は、晴れ時々曇りで雨の心配はありません。気温は18〜20°C前後から始まり、日中の最高気温32°Cに向かって急速に上昇する見込みです。
    
    **[テンペルホーフ空港公園](wiki:Tempelhofer_Feld)まで自転車で行くべき？**
    はい、おすすめです！サイクリングには理想的な条件です：
    *   **乾燥:** 雨の心配はありません（降水確率4%）。
    *   **穏やか:** 風は弱いです（時速約11km）。
    *   **朝の時間帯:** 公園内は日陰が非常に少ないため、午後の最高気温32°Cを避けて、朝のうちにサイクリングを楽しむのが強く推奨されます。
    
    **午後の予定はどうする？**
    *   サイクリングの後に涼める、テンペルホーフ近くの[ビアガーデン](wiki:Beer_garden)やカフェを探す？
    *   出発時間を正確に決めるために、より詳細な[1時間ごとの予報](/#settings/apps/weather)が必要？
  ko: |
    ```json
    {"type": "app_skill_use", "embed_id": "324eba33-3622-409c-b401-183f95d6183e", "app_id": "weather", "skill_id": "forecast", "query": "Berlin weather forecast", "provider": "Deutscher Wetterdienst (DWD) + Open-Meteo", "location": "Berlin"}
    ```
    
    내일 아침 [베를린](wiki:Berlin)(2026년 6월 19일 금요일) 날씨는 건조하고 구름이 조금 끼겠습니다. 기온은 18~20°C 정도로 시작해 최고 기온인 32°C를 향해 빠르게 오를 것으로 보입니다.
    
    **[템펠호퍼 펠트](wiki:Tempelhofer_Feld)까지 자전거를 타고 가도 될까?**
    네, 아주 좋은 생각이야! 자전거 타기에 이상적인 조건이야:
    *   **건조함:** 비 소식 없음(확률 4%).
    *   **잔잔함:** 풍속이 낮음(약 11km/h).
    *   **오전 시간대:** 비행장 부지에 그늘이 거의 없으므로, 오후 최고 기온인 32°C를 피해 아침에 자전거를 타는 것을 강력히 추천해.
    
    **남은 하루 동안 어떤 계획이 있어?**
    *   라이딩 후에 열기를 식힐 수 있도록 템펠호프 근처의 [비어 가든](wiki:Beer_garden)이나 카페를 찾아볼까?
    *   라이딩 시간을 완벽하게 맞추기 위해 더 자세한 [시간별 예보](/#settings/apps/weather)가 필요해?
