  context: "user message 1 in example chat: Memory Videos To Watch List. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved videos-to-watch memory to suggest how I should take notes while watching a saved video tonight. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
  de: Nutze meinen gespeicherten Speicher für die Video-Merkliste, um mir vorzuschlagen, wie ich heute Abend beim Anschauen eines gespeicherten Videos Notizen machen sollte. Du kannst diesen gespeicherten Speicher anfordern und verwenden. Nachdem du den gespeicherten Speicher verwendet hast, suche nicht im Web, nutze keine App-Skills, erstelle keine Dokumente oder Dateien, erstelle keine Embeds und stelle keine Folgefrage.
