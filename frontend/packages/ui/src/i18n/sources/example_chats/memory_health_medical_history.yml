message_2:
  context: "assistant message 2 in example chat: Medical history memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "000adbd5-e6db-4685-9dd9-41632f75d554", "app_id": "web", "skill_id": "search", "query": "what to tell a new doctor medical history checklist", "provider": "Brave"}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "47d5449e-0f94-436d-92b5-0e2bede2b924", "app_id": "images", "skill_id": "search", "query": "medical history checklist for new doctor", "provider": "Brave Search"}
    ```
    
    Based on your saved medical history, the most critical piece of information you should communicate to a new doctor is your **penicillin allergy**.
    
    Your records note that this allergy causes **[hives](wiki:Hives)** and was documented in June 2020. Since this is a significant [drug allergy](wiki:Drug_allergy), it is vital to mention it before any [antibiotics](wiki:Antibiotic) or new medications are prescribed.
    
    Beyond your saved memory, it is standard practice to provide a comprehensive overview during a first visit. Here is a checklist of what you should prepare:
    
    ### 1. Specific Medical Conditions & History
    *   **Current Conditions:** Any ongoing issues like [hypertension](wiki:Hypertension), [diabetes](wiki:Diabetes), or [asthma](wiki:Asthma).
    *   **Past Surgeries:** The dates and types of any operations you’ve had, including any complications with [anesthesia](wiki:Anesthesia).
    *   **Major Illnesses:** Previous hospitalizations or chronic illnesses from your past.
    
    ### 2. Medications and Supplements
    Doctors need a full list of everything you take to avoid dangerous [drug interactions](wiki:Drug_interaction). This includes:
    *   Prescription drugs (name and dosage).
    *   Over-the-counter medicines (like [aspirin](wiki:Aspirin) or [ibuprofen](wiki:Ibuprofen)).
    *   Vitamins, herbal supplements, and minerals.
    
    ### 3. Family Health History
    Mention if immediate family members (parents, siblings) have had:
    *   [Cancer](wiki:Cancer) (especially early-onset).
    *   Heart disease or [stroke](wiki:Stroke).
    *   Genetic conditions.
    
    ### 4. Recent Healthcare Encounters
    *   Recent visits to the [emergency department](wiki:Emergency_department) or urgent care.
    *   Names and contact information of previous doctors or specialists you've seen.
    
    ### Visual Checklists
    [!](embed:patienttalker.com-ytx)
    [!](embed:etsy.com-1Os)
    [!](embed:doctorsolve.com-wQE)
    
    ---
    
    ### New Doctor Information Sheet
    I have drafted a structured summary that you can print or share digitally to make your first appointment smoother.
    
    ```json
    {"type": "document", "embed_id": "02c68b38-b587-42ca-8717-e32187b77a10"}
    ```
    
    
    
    Preparing this information in advance helps you feel more in control and ensures your new doctor has the best possible "big picture" of your health. 
    
    Would you like help looking for [questions to ask](/#settings/apps/web) a new primary care doctor, or should I help you find [nearby clinics](/#settings/apps/maps) that accept your insurance?
    ---
    *⚠️ This is educational information only and not medical advice. Consult your doctor for medical decisions.*
