message_2:
  context: "assistant message 2 in example chat: Memory Health Medical History. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved medical history, here are the key details you should share with a new doctor:

    *   **Penicillin Allergy:** You have a documented allergy to [Penicillin](wiki:Penicillin) (noted June 2020) that causes hives. It is important to mention this specifically before any antibiotics are prescribed.
    *   **Pollen Allergy:** You experience seasonal [pollen](wiki:Pollen) allergies (noted April 2021). These typically cause symptoms during the spring.
    ---
    *⚠️ This is educational information only and not medical advice. Consult your doctor for medical decisions.*
  de: |
    Basierend auf deiner gespeicherten Krankengeschichte sind hier die wichtigsten Details, die du einem neuen Arzt mitteilen solltest:
    
    *   **Penicillin-Allergie:** Du hast eine dokumentierte Allergie gegen [Penicillin](wiki:Penicillin) (notiert im Juni 2020), die Nesselsucht verursacht. Es ist wichtig, dies explizit zu erwähnen, bevor Antibiotika verschrieben werden.
    *   **Pollenallergie:** Du leidest unter saisonalen [Pollenallergien](wiki:Pollen) (notiert im April 2021). Diese verursachen typischerweise Symptome im Frühjahr.
    ---
    *⚠️ Dies dient nur zu Informationszwecken und ist keine medizinische Beratung. Konsultiere für medizinische Entscheidungen deinen Arzt.*
