message_1:
  context: "user message 1 in example chat: Memory Health Medical History. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved medical history memory to list what I should remember to tell a new doctor. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
