message_2:
  context: "assistant message 2 in example chat: Furnished apartments in Berlin. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "f266a349-f41f-4af3-950f-91c464fe6f29", "app_id": "home", "skill_id": "search", "query": "Berlin", "provider": "Multi", "providers": ["ImmoScout24", "Kleinanzeigen", "WG-Gesucht"]}
    ```

    ```json
    {"type": "app_skill_use", "embed_id": "e92eb735-8d47-491a-8d7f-18b0ae3ed444", "app_id": "images", "skill_id": "search", "query": "furnished apartment Berlin interior", "provider": "Brave Search"}
    ```

    I found several furnished living options currently available in [Berlin](wiki:Berlin), ranging from private one-room apartments to upscale shared rooms in popular districts.

    ### Featured Furnished Apartment
    The most direct match for a private furnished apartment is this unit in [Weissensee](wiki:Weißensee_(Berlin)):

    [!](embed:m-bliertes-einzimmerapartment-pDA)

    ### Furnished Rooms & Shared Living
    If you are open to high-end shared housing (WGs) which often include all utilities and designer furniture, these options in [Friedrichshain](wiki:Friedrichshain) and [Prenzlauer Berg](wiki:Prenzlauer_Berg) are available:

    *   **[Urban Elite Luxury Room - Friedrichshain](embed:urbanelite-com-no-5OK):** €999/month, all-inclusive, close to metro.
    *   **[Urban Elite Luxury Room - Prenzlauer Berg](embed:urbanelite-com-no-WkT):** €999/month, located near [Schönhauser Allee](wiki:Schönhauser_Allee).
    *   **[Spacious WG Room in Wedding](embed:ruhiges-wg-zimmer-usg):** €680/month for a 28 sqm room in Wedding.
    *   **[Central Girls WG Room](embed:girls-wg-with-xxC):** €690/month in Prenzlauer Berg with two balconies.

    ### Visual Preview of Berlin Furnished Interiors
    To give you an idea of the typical style and layout of modern furnished rentals in the city, here is a gallery of current listings and interiors:

    [!](embed:e-homes.de-zw3)
    [!](embed:e-homes.de-2Vt)
    [!](embed:theblueground.com-ocO)
    [!](embed:gettyimages.com-LBA)
    [!](embed:theblueground.com-IAO)
    [!](embed:rentberry.com-V29)

    ### Specialized Platforms
    For fully furnished "business" or short-term apartments, you might also want to check platforms like:
    *   Wunderflats — Specialized in mid-to-long term furnished rentals.
    *   Blueground — Offers designer-furnished apartments with flexible leases.
    *   Coming Home — A local Berlin agency for high-end furnished housing.

    **Note:** Furnished apartments in Berlin move very quickly. It is recommended to have your [SCHUFA](wiki:Schufa) and proof of income ready before applying. You can [search for more specific areas](/#settings/apps/home) if you have a preferred district in mind.

    Do you have a specific budget range or a preferred neighborhood (e.g., near Mitte or [Kreuzberg](wiki:Kreuzberg))?
