message_2:
  context: "assistant message 2 in example chat: Memory Code Want To Learn. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your interest in learning [Rust](wiki:Rust_(programming_language)) and [WebAssembly](wiki:WebAssembly), a perfect practical mini-project for this weekend would be building a **Real-time Markdown-to-HTML Previewer**.
    
    This project allows you to explore the core strengths of both technologies: Rust's performance and safety for string processing, and WebAssembly's ability to run that logic at near-native speed within a web browser.
    
    ### Project Concept: Rust Markdown Previewer
    You can create a simple web interface where a user types [Markdown](wiki:Markdown) into a text area on the left, and the rendered [HTML](wiki:HTML) appears instantly on the right.
    
    **Why this is a great first step:**
    *   **Performance:** Text parsing is a CPU-intensive task where Rust excels.
    *   **Interoperability:** You will learn how to pass strings between [JavaScript](wiki:JavaScript) and Rust.
    *   **Ecosystem:** You can use existing Rust crates like `pulldown-cmark` to handle the heavy lifting of parsing, focusing your time on the Wasm integration.
    *   **Immediate Feedback:** You get a visual result in the browser quickly, which is highly motivating when learning a new stack.
    
    **Weekend Roadmap:**
    1.  **Set up your environment:** Install `wasm-pack`, which is the one-stop shop for compiling Rust to WebAssembly.
    2.  **Logic in Rust:** Write a small Rust function that takes a string of Markdown and returns a string of HTML.
    3.  **Compile to Wasm:** Use `wasm-pack build --target web` to generate the Wasm binary and the JavaScript glue code.
    4.  **Frontend Integration:** Create a basic `index.html` and `main.js`. Import your generated Wasm module and call your Rust function inside an event listener triggered by the `input` event of your text area.
