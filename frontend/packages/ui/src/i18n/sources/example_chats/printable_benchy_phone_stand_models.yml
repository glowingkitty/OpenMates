message_2:
  context: "assistant message 2 in example chat: Printable Benchy and Phone Stand Models. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "184d8df7-75ff-4220-805f-e9615a9f0628", "app_id": "models3d", "skill_id": "search", "query": "Benchy", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "99a93bec-fb8b-4f2e-ad60-7b9148cc7f01", "app_id": "models3d", "skill_id": "search", "query": "phone stand", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    For your next 3D printing projects, I've found some of the most popular and creative models on Printables. Whether you're looking for the classic [calibration](wiki:Calibration_(statistics)) tugboat or a functional [phone](wiki:Smartphone) accessory, these options are excellent starting points.
    
    ### The 3DBenchy Collection
    The [3DBenchy](wiki:3DBenchy) is the gold standard for testing your [3D printer's](wiki:3D_printing) capabilities. Beyond the original, there are several "remixes" that add character to your workbench.
    
    [!](embed:3d-benchy-TPb)
    [!](embed:all-terrain-assault-HqB)
    [!](embed:blocky-benchy-D1T)
    [!](embed:benchy-kraken-attack-SiS)
    [!](embed:ben-the-floating-eMA)
    
    *   **Original 3DBenchy**: Best for [benchmarking](wiki:Benchmark_(computing)) [overhangs](wiki:3D_printing#Support_structures), [bridging](wiki:3D_printing#Support_structures), and surface finish.
    *   **Assault Benchy**: A poseable [mecha](wiki:Mecha) version for those who want a bit of flair.
    *   **Floating BEN**: Specially designed with a hollow hull so it actually floats—perfect for the bath!
    
    ### Functional Phone Stands
    A phone stand is a great practical print. These designs vary from minimalist to complex mechanical gears.
    
    [!](embed:phone-stand-Jnb)
    [!](embed:geared-phone-stand-3Bl)
    [!](embed:phone-stand-no-VTM)
    [!](embed:phone-stand-modern-G4X)
    [!](embed:phone-stand-industrial-Au7)
    
    *   **Honeycomb Stand**: Very popular for its high [strength-to-weight ratio](wiki:Specific_strength) and modern look.
    *   **Geared Stand**: A "print-in-place" mechanical marvel that allows for adjustable viewing angles.
    *   **Modern Curved**: A sleek, one-piece design that fits perfectly in a minimalist office setup.
    
    **Pro Tip:** When printing the [Geared Phone stand](embed:geared-phone-stand-3Bl), ensure your [extrusion multiplier](wiki:3D_printing#Fused_deposition_modeling) is well-calibrated to prevent the moving parts from fusing together.
    
    What kind of [filament](wiki:3D_printing_filament) (PLA, PETG, etc.) are you planning to use for these? I can give you some specific slicing tips based on your material!
    
    **What would you like to do next?**
    - [Search for more 3D models](/#settings/apps/models3d)
    - [Get 3D printing tips](/#settings/apps/web)
  de: |
    ```json
    {"type": "app_skill_use", "embed_id": "184d8df7-75ff-4220-805f-e9615a9f0628", "app_id": "models3d", "skill_id": "search", "query": "Benchy", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "99a93bec-fb8b-4f2e-ad60-7b9148cc7f01", "app_id": "models3d", "skill_id": "search", "query": "phone stand", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    Für deine nächsten 3D-Druckprojekte habe ich einige der beliebtesten und kreativsten Modelle auf Printables gefunden. Egal, ob du nach dem klassischen [Kalibrierungs](wiki:Calibration_(statistics))-Schlepper oder einem funktionalen [Smartphone](wiki:Smartphone)-Zubehör suchst, diese Optionen sind hervorragende Ausgangspunkte.
    
    ### Die 3DBenchy-Kollektion
    Das [3DBenchy](wiki:3DBenchy) ist der Goldstandard zum Testen der Fähigkeiten deines [3D-Druckers](wiki:3D_printing). Neben dem Original gibt es mehrere „Remixe“, die deiner Werkbank Charakter verleihen.
    
    [!](embed:3d-benchy-TPb)
    [!](embed:all-terrain-assault-HqB)
    [!](embed:blocky-benchy-D1T)
    [!](embed:benchy-kraken-attack-SiS)
    [!](embed:ben-the-floating-eMA)
    
    *   **Original 3DBenchy**: Am besten geeignet für das [Benchmarking](wiki:Benchmark_(computing)) von [Überhängen](wiki:3D_printing#Support_structures), [Brückenbildung](wiki:3D_printing#Support_structures) und Oberflächenbeschaffenheit.
    *   **Assault Benchy**: Eine bewegliche [Mecha](wiki:Mecha)-Version für alle, die ein bisschen Flair wollen.
    *   **Floating BEN**: Speziell mit einem hohlen Rumpf entworfen, damit es tatsächlich schwimmt – perfekt für die Badewanne!
    
    ### Funktionale Handyhalterungen
    Eine Handyhalterung ist ein toller praktischer Druck. Diese Designs reichen von minimalistisch bis hin zu komplexen mechanischen Zahnrädern.
    
    [!](embed:phone-stand-Jnb)
    [!](embed:geared-phone-stand-3Bl)
    [!](embed:phone-stand-no-VTM)
    [!](embed:phone-stand-modern-G4X)
    [!](embed:phone-stand-industrial-Au7)
    
    *   **Waben-Halterung**: Sehr beliebt wegen ihres hohen [Festigkeits-Gewichts-Verhältnisses](wiki:Specific_strength) und ihres modernen Looks.
    *   **Zahnrad-Halterung**: Ein mechanisches „Print-in-Place“-Wunder, das verstellbare Betrachtungswinkel ermöglicht.
    *   **Modern Curved**: Ein schlankes, einteiliges Design, das perfekt in ein minimalistisches Büro-Setup passt.
    
    **Profi-Tipp:** Achte beim Drucken der [Zahnrad-Handyhalterung](embed:geared-phone-stand-3Bl) darauf, dass dein [Extrusionsmultiplikator](wiki:3D_printing#Fused_deposition_modeling) gut kalibriert ist, um zu verhindern, dass die beweglichen Teile miteinander verschmelzen.
    
    Welche Art von [Filament](wiki:3D_printing_filament) (PLA, PETG usw.) möchtest du dafür verwenden? Ich kann dir spezifische Slicing-Tipps basierend auf deinem Material geben!
    
    **Was möchtest du als Nächstes tun?**
    - [Nach weiteren 3D-Modellen suchen](/#settings/apps/models3d)
    - [Tipps zum 3D-Drucken erhalten](/#settings/apps/web)
  zh: |
    ```json
    {"type": "app_skill_use", "embed_id": "184d8df7-75ff-4220-805f-e9615a9f0628", "app_id": "models3d", "skill_id": "search", "query": "Benchy", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "99a93bec-fb8b-4f2e-ad60-7b9148cc7f01", "app_id": "models3d", "skill_id": "search", "query": "phone stand", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    对于你的下一个 3D 打印项目，我在 Printables 上找到了一些最受欢迎且极具创意的模型。无论你是在寻找经典的[校准](wiki:Calibration_(statistics))小船，还是实用的[手机](wiki:Smartphone)配件，这些选项都是绝佳的起点。
    
    ### 3DBenchy 系列
    [3DBenchy](wiki:3DBenchy) 是测试 [3D 打印机](wiki:3D_printing)性能的金标准。除了原版之外，还有几种“重混”版本可以为你的工作台增添个性。
    
    [!](embed:3d-benchy-TPb)
    [!](embed:all-terrain-assault-HqB)
    [!](embed:blocky-benchy-D1T)
    [!](embed:benchy-kraken-attack-SiS)
    [!](embed:ben-the-floating-eMA)
    
    *   **原版 3DBenchy**：最适合[基准测试](wiki:Benchmark_(computing))[悬垂](wiki:3D_printing#Support_structures)、[架桥](wiki:3D_printing#Support_structures)和表面光洁度。
    *   **突击 Benchy**：一个可活动的[机甲](wiki:Mecha)版本，适合想要点个性的玩家。
    *   **漂浮 BEN**：特别设计的空心船体，使其能够真正漂浮——非常适合洗澡时玩！
    
    ### 实用手机支架
    手机支架是一个非常实用的打印件。这些设计从极简风格到复杂的机械齿轮应有尽有。
    
    [!](embed:phone-stand-Jnb)
    [!](embed:geared-phone-stand-3Bl)
    [!](embed:phone-stand-no-VTM)
    [!](embed:phone-stand-modern-G4X)
    [!](embed:phone-stand-industrial-Au7)
    
    *   **蜂窝支架**：因其高[比强度](wiki:Specific_strength)和现代外观而备受欢迎。
    *   **齿轮支架**：一个“原地打印”的机械奇迹，允许调节观看角度。
    *   **现代曲线**：时尚的一体式设计，完美适配极简办公环境。
    
    **专业提示：** 打印[齿轮手机支架](embed:geared-phone-stand-3Bl)时，请确保你的[挤出倍率](wiki:3D_printing#Fused_deposition_modeling)已校准好，以防止活动部件熔合在一起。
    
    你打算用哪种[耗材](wiki:3D_printing_filament)（PLA、PETG 等）来打印这些？我可以根据你的材料提供一些具体的切片建议！
    
    **接下来你想做什么？**
    - [搜索更多 3D 模型](/#settings/apps/models3d)
    - [获取 3D 打印技巧](/#settings/apps/web)
  es: |
    ```json
    {"type": "app_skill_use", "embed_id": "184d8df7-75ff-4220-805f-e9615a9f0628", "app_id": "models3d", "skill_id": "search", "query": "Benchy", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "99a93bec-fb8b-4f2e-ad60-7b9148cc7f01", "app_id": "models3d", "skill_id": "search", "query": "phone stand", "provider": "Printables", "providers": ["Printables"]}
    ```
    
    Para tus próximos proyectos de impresión 3D, he encontrado algunos de los modelos más populares y creativos en Printables. Ya sea que busques el clásico remolcador de [calibración](wiki:Calibration_(statistics)) o un accesorio funcional para el [teléfono](wiki:Smartphone), estas opciones son excelentes puntos de partida.
    
    ### La colección 3DBenchy
    El [3DBenchy](wiki:3DBenchy) es el estándar de oro para probar las capacidades de tu [impresora 3D](wiki:3D_printing). Más allá del original, hay varios "remixes" que añaden personalidad a tu mesa de trabajo.
    
    [!](embed:3d-benchy-TPb)
    [!](embed:all-terrain-assault-HqB)
    [!](embed:blocky-benchy-D1T)
    [!](embed:benchy-kraken-attack-SiS)
    [!](embed:ben-the-floating-eMA)
    
    *   **Original 3DBenchy**: El mejor para realizar [benchmarking](wiki:Benchmark_(computing)) de [voladizos](wiki:3D_printing#Support_structures), [puentes](wiki:3D_printing#Support_structures) y acabado superficial.
    *   **Assault Benchy**: Una versión de [mecha](wiki:Mecha) articulada para quienes buscan un toque de estilo.
    *   **Floating BEN**: Diseñado especialmente con un casco hueco para que flote de verdad, ¡perfecto para el baño!
    
    ### Soportes funcionales para el teléfono
    Un soporte para el teléfono es una impresión práctica excelente. Estos diseños varían desde lo minimalista hasta complejos engranajes mecánicos.
    
    [!](embed:phone-stand-Jnb)
    [!](embed:geared-phone-stand-3Bl)
    [!](embed:phone-stand-no-VTM)
    [!](embed:phone-stand-modern-G4X)
    [!](embed:phone-stand-industrial-Au7)
    
    *   **Soporte Honeycomb**: Muy popular por su alta [relación resistencia-peso](wiki:Specific_strength) y su aspecto moderno.
    *   **Soporte con engranajes**: Una maravilla mecánica "print-in-place" (impresión en sitio) que permite ángulos de visión ajustables.
    *   **Moderno curvo**: Un diseño elegante de una sola pieza que encaja perfectamente en una oficina minimalista.
    
    **Consejo profesional:** Al imprimir el [soporte con engranajes](embed:geared-phone-stand-3Bl), asegúrate de que tu [multiplicador de extrusión](wiki:3D_printing#Fused_deposition_modeling) esté bien calibrado para evitar que las piezas móviles se fusionen.
    
    ¿Qué tipo de [filamento](wiki:3D_printing_filament) (PLA, PETG, etc.) tienes pensado usar para estos? ¡Puedo darte algunos consejos específicos de laminado según tu material!
    
    **¿Qué te gustaría hacer a continuación?**
    - [Buscar más modelos 3D](/#settings/apps/models3d)
    - [Obtener consejos de impresión 3D](/#settings/apps/web)
