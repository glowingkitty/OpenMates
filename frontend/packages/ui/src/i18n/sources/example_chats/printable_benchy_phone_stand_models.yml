    *   **מעמד עם גלגלי שיניים**: פלא מכני מסוג "הדפסה במקום" (print-in-place) המאפשר זוויות צפייה מתכווננות.
    *   **מעמד מעוקל מודרני**: עיצוב חלק מקשה אחת שמתאים בצורה מושלמת לסביבת עבודה מינימליסטית.
    
    **טיפ מקצועי:** כשמדפיסים את ה-[מעמד עם גלגלי שיניים](embed:geared-phone-stand-3Bl), ודאו ש[מכפיל ההזרקה (extrusion multiplier)](wiki:3D_printing#Fused_deposition_modeling) שלכם מכויל היטב כדי למנוע מהחלקים הנעים להתמזג זה עם זה.
    
    באיזה סוג [פילמנט](wiki:3D_printing_filament) (PLA, PETG וכו') את/ה מתכנן/ת להשתמש עבורם? אוכל לתת לך טיפים ספציפיים לפריסה (slicing) בהתאם לחומר שלך!
    
    **מה תרצה/י לעשות עכשיו?**
