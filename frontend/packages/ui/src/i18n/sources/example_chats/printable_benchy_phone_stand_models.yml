    *   **オリジナル3DBenchy**: [オーバーハング](wiki:3D_printing#Support_structures)や[ブリッジ](wiki:3D_printing#Support_structures)、表面の仕上がりなどの[ベンチマーク](wiki:Benchmark_(computing))に最適です。
