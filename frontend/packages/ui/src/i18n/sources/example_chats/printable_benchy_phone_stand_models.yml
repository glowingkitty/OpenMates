    ### 3DBenchyコレクション
    [3DBenchy](wiki:3DBenchy)は、[3Dプリンター](wiki:3D_printing)の性能をテストするための指標（ゴールドスタンダード）です。オリジナル以外にも、作業スペースに個性を添えてくれる「リミックス」版がいくつかあります。
    
