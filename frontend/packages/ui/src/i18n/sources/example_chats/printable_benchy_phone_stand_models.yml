    *   **フローティング・ベン**: 船体が中空になるよう特別に設計されており、実際に水に浮きます。お風呂にぴったりです！
    
    ### 実用的なスマホスタンド
    スマホスタンドは、実用的なプリントとして最適です。ミニマルなものから複雑なメカニカルギアまで、さまざまなデザインがあります。
    
    [!](embed:phone-stand-Jnb)
    [!](embed:geared-phone-stand-3Bl)
    [!](embed:phone-stand-no-VTM)
    [!](embed:phone-stand-modern-G4X)
    [!](embed:phone-stand-industrial-Au7)
    
    *   **ハニカムスタンド**: [比強度](wiki:Specific_strength)（軽さと強さの比率）の高さとモダンな外観で非常に人気があります。
    *   **ギアスタンド**: 組み立て不要の「プリント・イン・プレイス」方式で、視聴角度を調整できる驚きのメカニズムです。
    *   **モダン・カーブ**: 洗練された一体型デザインで、ミニマルなオフィス環境に完璧にフィットします。
    
    **プロのヒント:** [ギア付きスマホスタンド](embed:geared-phone-stand-3Bl)をプリントする際は、可動パーツ同士がくっついてしまわないよう、[押し出し倍率](wiki:3D_printing#Fused_deposition_modeling)をしっかり調整しておきましょう。
    
