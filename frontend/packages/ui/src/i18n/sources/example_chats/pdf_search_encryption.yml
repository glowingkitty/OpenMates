message_2:
  context: "assistant message 2 in example chat: Search inside a PDF. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    I've received your uploaded file test_document.pdf. It's currently being processed and will be ready for us to search through whenever you're ready.
    
    What kind of information are you planning to look for in this document later?
    
    **Next steps:**
    - You can ask me to search for specific keywords or topics within the PDF.
    - I can also summarize the contents of the document for you once it's finished processing.
  de: |
    Ich habe deine hochgeladene Datei test_document.pdf erhalten. Sie wird derzeit verarbeitet und steht für unsere Suche bereit, sobald du so weit bist.
    
    Nach welcher Art von Informationen möchtest du später in diesem Dokument suchen?
    
