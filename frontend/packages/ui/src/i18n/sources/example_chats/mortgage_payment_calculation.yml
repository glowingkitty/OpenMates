    ### 1. The Formula
    To calculate the monthly payment ($M$), we use the standard [amortization](wiki:Amortization) formula:

    $$M = P \frac{r(1+r)^n}{(1+r)^n - 1}$$

    **Where:**
    *   **$P$ (Principal):** €350,000
    *   **$r$ (Monthly Interest Rate):** $3.8\% / 12$ months = $0.00316667$
    *   **$n$ (Total Number of Payments):** $25 \text{ years} \times 12 \text{ months} = 300$

