message_2:
  context: "assistant message 2 in example chat: Mortgage Payment Calculation. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "3c8e7c97-7502-4407-a07b-79911ca4bbaf", "app_id": "math", "skill_id": "calculate"}
    ```

    ```json
    {"type": "app_skill_use", "embed_id": "965d7fc9-15be-4eba-a774-b0a16bfa2da7", "app_id": "math", "skill_id": "calculate"}
    ```

    For a **€350,000** mortgage with an annual interest rate of **3.8%** over **25 years**, here is the breakdown of your monthly payments and the total interest you would pay.

    ### 1. The Formula
    To calculate the monthly payment ($M$), we use the standard [amortization](wiki:Amortization) formula:

    $$M = P \frac{r(1+r)^n}{(1+r)^n - 1}$$

    **Where:**
    *   **$P$ (Principal):** €350,000
    *   **$r$ (Monthly Interest Rate):** $3.8\% / 12$ months = $0.00316667$
    *   **$n$ (Total Number of Payments):** $25 \text{ years} \times 12 \text{ months} = 300$

    ### 2. Monthly Payment Calculation
    Based on the values above, your monthly payment would be:
    **€1,809.00** Calculation result

    ### 3. Total Interest Paid
    To find the total interest, we multiply the monthly payment by the number of months and subtract the original loan amount:
    $$\text{Total Interest} = (M \times n) - P$$

    *   **Total Amount Paid:** €542,699.39
    *   **Total Interest:** **€192,699.39**

    ***

    ### Summary Table
    ```json
    {"type": "sheet", "embed_id": "551d18d6-164a-41e3-aaa7-f6c92ca882e9"}
    ```


    Keep in mind that this calculation assumes a [fixed-rate mortgage](wiki:Fixed-rate_mortgage) and does not include additional costs like [home insurance](wiki:Home_insurance), property taxes, or potential bank fees.

    **Would you like to see how much you could save by increasing your monthly payment or shortening the term to 20 years?**

    **Next Steps:**
    - [Explore 20-year mortgage comparison](/#)
    - [Calculate the impact of an extra €200/month payment](/#)
    ---
    *⚠️ This is educational information only and not financial advice. Consult a qualified financial professional or tax advisor for financial decisions.*
