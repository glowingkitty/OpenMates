    {"type": "app_skill_use", "embed_id": "965d7fc9-15be-4eba-a774-b0a16bfa2da7", "app_id": "math", "skill_id": "calculate"}
    ```
    
    Für eine Hypothek über **350.000 €** mit einem jährlichen Zinssatz von **3,8 %** über **25 Jahre** findest du hier die Aufschlüsselung deiner monatlichen Zahlungen und der Gesamtzinsen, die du zahlen würdest.
    
    ### 1. Die Formel
    Um die monatliche Rate ($M$) zu berechnen, verwenden wir die Standardformel für die [Amortisation](wiki:Amortization):
    
    $$M = P \frac{r(1+r)^n}{(1+r)^n - 1}$$
    
    **Wobei:**
    *   **$P$ (Darlehensbetrag):** 350.000 €
    *   **$r$ (Monatlicher Zinssatz):** $3,8\% / 12$ Monate = $0,00316667$
    *   **$n$ (Gesamtzahl der Zahlungen):** $25 \text{ Jahre} \times 12 \text{ Monate} = 300$
    
    ### 2. Berechnung der monatlichen Rate
    Basierend auf den obigen Werten würde deine monatliche Rate wie folgt aussehen:
    **1.809,00 €** Berechnungsergebnis
    
    ### 3. Gezahlte Gesamtzinsen
    Um die Gesamtzinsen zu ermitteln, multiplizieren wir die monatliche Rate mit der Anzahl der Monate und ziehen den ursprünglichen Darlehensbetrag ab:
    $$\text{Gesamtzinsen} = (M \times n) - P$$
    
    *   **Gezahlter Gesamtbetrag:** 542.699,39 €
    *   **Gesamtzinsen:** **192.699,39 €**
    
    ***
    
    ### Zusammenfassung
    ```json
    {"type": "sheet", "embed_id": "551d18d6-164a-41e3-aaa7-f6c92ca882e9"}
    ```
    
    
    Bitte beachte, dass diese Berechnung von einer [Festhypothek](wiki:Fixed-rate_mortgage) ausgeht und keine zusätzlichen Kosten wie [Wohngebäudeversicherung](wiki:Home_insurance), Grundsteuern oder potenzielle Bankgebühren enthält.
    
    **Möchtest du sehen, wie viel du sparen könntest, wenn du deine monatliche Rate erhöhst oder die Laufzeit auf 20 Jahre verkürzt?**
    
    **Nächste Schritte:**
    - [Vergleich mit 20-jähriger Hypothek ansehen](/#)
    - [Auswirkungen einer zusätzlichen Zahlung von 200 €/Monat berechnen](/#)
    ---
    *⚠️ Dies dient nur zu Informationszwecken und stellt keine Finanzberatung dar. Konsultiere einen qualifizierten Finanzexperten oder Steuerberater für finanzielle Entscheidungen.*
