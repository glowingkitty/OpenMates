summary:
  context: "Summary of example chat: Identify a Classic Car from a Photo"
  en: "Use reverse image search to identify a Mercedes-Benz 300 SL Gullwing from an uploaded photo."
  de: Nutze die umgekehrte Bildsuche, um einen Mercedes-Benz 300 SL Flügeltürer auf einem hochgeladenen Foto zu identifizieren.
  zh: 通过以图搜图功能，从上传的照片中识别出梅赛德斯-奔驰 300 SL Gullwing。
  es: Utiliza la búsqueda inversa de imágenes para identificar un Mercedes-Benz 300 SL Gullwing a partir de una foto subida.
  fr: "Utilise la recherche d'image inversée pour identifier une Mercedes-Benz 300 SL Gullwing à partir d'une photo téléchargée."
  pt: Usa a pesquisa inversa de imagens para identificar um Mercedes-Benz 300 SL Gullwing a partir de uma foto carregada.
  ru: Используй обратный поиск по изображениям, чтобы определить Mercedes-Benz 300 SL Gullwing на загруженном фото.
  ja: アップロードされた写真から画像検索を使用して、メルセデス・ベンツ 300 SL ガルウィングを特定します。
  ko: 이미지 역검색을 사용하여 업로드된 사진 속의 메르세데스-벤츠 300 SL 걸윙을 식별해 보세요.
  it: Usa la ricerca inversa per immagini per identificare una Mercedes-Benz 300 SL Gullwing da una foto caricata.
  tr: "Yüklenen bir fotoğraftan Mercedes-Benz 300 SL Gullwing'i tanımlamak için tersine görsel aramayı kullan."
  vi: Sử dụng tính năng tìm kiếm hình ảnh ngược để nhận diện chiếc Mercedes-Benz 300 SL Gullwing từ ảnh đã tải lên.
  id: Gunakan pencarian gambar terbalik untuk mengidentifikasi Mercedes-Benz 300 SL Gullwing dari foto yang diunggah.
  pl: Użyj wyszukiwania obrazem, aby zidentyfikować Mercedesa-Benz 300 SL Gullwing na podstawie przesłanego zdjęcia.
  nl: Gebruik omgekeerd zoeken naar afbeeldingen om een Mercedes-Benz 300 SL Gullwing te identificeren op een geüploade foto.
  ar: استخدم البحث العكسي عن الصور للتعرف على سيارة مرسيدس-بنز 300 SL Gullwing من صورة مرفوعة.
  hi: अपलोड की गई फोटो से Mercedes-Benz 300 SL Gullwing की पहचान करने के लिए रिवर्स इमेज सर्च का उपयोग करें।
  th: ใช้การค้นหาด้วยรูปภาพเพื่อระบุรุ่น Mercedes-Benz 300 SL Gullwing จากรูปถ่ายที่อัปโหลด
  cs: Použij zpětné vyhledávání obrázků k identifikaci vozu Mercedes-Benz 300 SL Gullwing z nahrané fotografie.
  sv: Använd omvänd bildsökning för att identifiera en Mercedes-Benz 300 SL Gullwing från ett uppladdat foto.
  he: שימוש בחיפוש תמונה הפוך כדי לזהות מרצדס-בנץ 300 SL גולווינג מתמונה שהועלתה.
  verified_by_human: []

message_1:
  context: "user message 1 in example chat: Identify a Classic Car from a Photo. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Use reverse image search on this uploaded classic car photo and identify the exact car model. Reply with the model name and one sentence explaining the visual clues.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  de: |
    Nutze die umgekehrte Bildsuche für dieses hochgeladene Foto eines Oldtimers und identifiziere das genaue Modell. Antworte mit dem Modellnamen und einem Satz, der die optischen Merkmale erklärt.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  zh: |
    对这张上传的经典车照片进行以图搜图，并识别出确切的车系型号。请回复型号名称，并用一句话说明视觉识别线索。
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  es: |
    Utiliza la búsqueda inversa de imágenes en esta foto de un coche clásico e identifica el modelo exacto. Responde con el nombre del modelo y una frase que explique las pistas visuales.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  fr: |
    Utilise la recherche d'image inversée sur cette photo de voiture de collection téléchargée et identifie le modèle exact. Réponds avec le nom du modèle et une phrase expliquant les indices visuels.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  pt: |
    Usa a pesquisa inversa de imagens nesta foto de um carro clássico carregada e identifica o modelo exato do carro. Responde com o nome do modelo e uma frase a explicar as pistas visuais.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  ru: |
    Используй обратный поиск по этому загруженному фото классического автомобиля и определи точную модель. В ответе укажи название модели и одно предложение с описанием визуальных признаков.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  ja: |
    アップロードされたこのクラシックカーの写真に画像検索を使用し、正確な車種を特定してください。車種名と、視覚的な手がかりを説明する1文で回答してください。
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  ko: |
    업로드된 이 클래식 카 사진에 이미지 역검색을 사용하여 정확한 자동차 모델을 식별해 줘. 모델 이름과 시각적 단서를 설명하는 한 문장으로 답해 줘.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  it: |
    Usa la ricerca inversa per immagini su questa foto di un'auto d'epoca caricata e identifica l'esatto modello dell'auto. Rispondi con il nome del modello e una frase che spieghi gli indizi visivi.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  tr: |
    Yüklenen bu klasik araba fotoğrafında tersine görsel arama yap ve tam araba modelini belirle. Model adıyla ve görsel ipuçlarını açıklayan bir cümleyle yanıt ver.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  vi: |
    Sử dụng tính năng tìm kiếm hình ảnh ngược trên ảnh xe cổ đã tải lên này và nhận diện chính xác mẫu xe. Trả lời bằng tên mẫu xe và một câu giải thích các manh mối hình ảnh.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  id: |
    Gunakan pencarian gambar terbalik pada foto mobil klasik yang diunggah ini dan identifikasi model mobil yang tepat. Balas dengan nama model dan satu kalimat yang menjelaskan petunjuk visualnya.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  pl: |
    Użyj wyszukiwania obrazem dla tego przesłanego zdjęcia klasycznego samochodu i zidentyfikuj dokładny model. Odpowiedz, podając nazwę modelu i jedno zdanie wyjaśniające wskazówki wizualne.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  nl: |
    Gebruik omgekeerd zoeken naar afbeeldingen op deze geüploade foto van een klassieke auto en identificeer het exacte automodel. Antwoord met de modelnaam en één zin die de visuele aanwijzingen uitlegt.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  ar: |
    استخدم البحث العكسي عن الصور على صورة السيارة الكلاسيكية المرفوعة هذه وحدد طراز السيارة بدقة. أجب باسم الطراز وجملة واحدة تشرح الأدلة المرئية.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  hi: |
    इस अपलोड की गई क्लासिक कार की फोटो पर रिवर्स इमेज सर्च का उपयोग करें और कार के सटीक मॉडल की पहचान करें। मॉडल का नाम और विजुअल सुरागों को समझाने वाला एक वाक्य लिखकर उत्तर दें।
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  th: |
    ใช้การค้นหาด้วยรูปภาพกับรูปถ่ายรถคลาสสิกที่อัปโหลดนี้และระบุรุ่นรถที่ถูกต้อง ตอบกลับด้วยชื่อรุ่นและประโยคหนึ่งประโยคที่อธิบายเบาะแสทางสายตา
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  cs: |
    Použij zpětné vyhledávání obrázků u této nahrané fotky veterána a identifikuj přesný model auta. Odpověz názvem modelu a jednou větou vysvětlující vizuální znaky.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  sv: |
    Använd omvänd bildsökning på det här uppladdade fotot av en klassisk bil och identifiera den exakta bilmodellen. Svara med modellnamnet och en mening som förklarar de visuella ledtrådarna.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  he: |
    השתמש בחיפוש תמונה הפוך על תמונת המכונית הקלאסית שהועלתה וזהה את דגם המכונית המדויק. השב עם שם הדגם ומשפט אחד המסביר את הרמזים הוויזואליים.
    [!](embed:mercedes-300-sl-gullwing-example-jpg-b41-baf4d7)
  verified_by_human: []

