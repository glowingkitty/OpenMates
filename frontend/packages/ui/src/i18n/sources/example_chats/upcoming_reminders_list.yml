message_2:
  context: "assistant message 2 in example chat: Upcoming Reminders List. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "3640d177-a970-4f2e-bf5f-16eed4c34db5", "app_id": "reminder", "skill_id": "list-reminders"}
    ```
    
    It looks like your schedule is completely clear—you don't have any upcoming [reminders](/#settings/apps/reminder) set at the moment.
    
    Since we're starting with a blank slate, is there anything you'd like to get off your mind and onto a list? I can help you [set a reminder](/#settings/apps/reminder) for a specific task, a daily habit you're building, or even a random nudge later this week.
    
    **What would you like to do next?**
    *   **Set a new reminder?** Just let me know what it's for and when.
    *   **Explore habit tracking?** We could set up a recurring reminder for something you're working on.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
  de: |
    ```json
    {"type": "app_skill_use", "embed_id": "3640d177-a970-4f2e-bf5f-16eed4c34db5", "app_id": "reminder", "skill_id": "list-reminders"}
    ```
    
    Es sieht so aus, als wäre dein Zeitplan völlig leer – du hast momentan keine anstehenden [Erinnerungen](/#settings/apps/reminder) festgelegt.
    
    Da wir bei Null anfangen: Gibt es etwas, das du aus dem Kopf und auf eine Liste bringen möchtest? Ich kann dir dabei helfen, eine [Erinnerung festzulegen](/#settings/apps/reminder) für eine bestimmte Aufgabe, eine tägliche Gewohnheit, die du entwickelst, oder einfach einen kleinen Anstoß später in dieser Woche.
    
    **Was möchtest du als Nächstes tun?**
    *   **Eine neue Erinnerung festlegen?** Sag mir einfach, wofür und wann.
    *   **Gewohnheitstracking ausprobieren?** Wir könnten eine wiederkehrende Erinnerung für etwas einrichten, an dem du gerade arbeitest.
