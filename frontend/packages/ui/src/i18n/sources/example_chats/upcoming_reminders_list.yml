    *⚠️ Dies dient ausschließlich zu Bildungszwecken und stellt keine professionelle psychologische Beratung dar. Bei psychischen Problemen wende dich bitte an einen qualifizierten Therapeuten oder Berater. Wenn du dich in einer Krise befindest, kontaktiere umgehend den Notruf oder eine Krisen-Hotline.*
