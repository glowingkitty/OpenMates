    ### 개인정보 보호 우선 출시를 위한 디자인 노트
    개인정보 보호는 사용자 신뢰와 깊이 연결되어 있으므로, UI 및 UX 디자인 선택은 백엔드 엔지니어링만큼이나 중요해. 인터페이스(특히 이 맵의 **UX** 가지)를 디자인할 때 다음 원칙을 염두에 두어봐:
    *   **시각적 투명성:** 복잡한 하위 메뉴에 데이터 토글을 숨기지 마. 깔끔하고 여유 있는 개인정보 보호 대시보드는 사용자에게 통제권을 갖고 있다는 느낌을 줘. 
    *   **쉬운 언어 디자인:** "쉬운 언어로 된 개인정보 처리방침"을 단순한 아이콘과 결합해봐. 예: 열린 자물쇠 vs. 닫힌 자물쇠.
    *   **AI와 너의 작업 결합:** 이번 출시를 위해 자리 표시용 아이콘, UI 목업 또는 와이어프레임이 필요하다면 종이나 간단한 도구에 스케치해서 여기에 업로드해줘. AI를 사용해 그 거친 개념들을 함께 다듬을 수 있어. 속도를 높이면서도 개인적인 터치를 유지할 수 있는 좋은 방법이지!
    
    지금 출시 맵의 어느 영역이 가장 큰 장애물로 느껴져? 마케팅 자산을 브레인스토밍하거나 동의 화면을 위한 UI 흐름을 스케치하는 걸 기꺼이 도와줄게!
