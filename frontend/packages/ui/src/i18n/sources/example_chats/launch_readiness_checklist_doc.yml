message_1:
  context: "user message 1 in example chat: Launch readiness checklist document. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "@mate:general_knowledge Create a short formatted document titled 'Launch Readiness Checklist' for a small product launch. Include a heading, a short intro paragraph, and a bullet list of exactly five practical launch tasks. Please create it as a document artifact, then summarize in one sentence what the document contains."
