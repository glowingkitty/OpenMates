message_2:
  context: "assistant message 2 in example chat: Memory Reminder Defaults. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your [saved reminder defaults](/#settings/apps/reminder), you will be nudged for any saved event next week at two distinct times prior to the start of the event:
    
    *   **One day before** (based on the 1440-minute offset)
    *   **One hour before** (based on the 60-minute offset)
    
    These settings, which you added to your memories on June 12, 2026, ensure you have both a 24-hour window to finalize your plans and a final reminder right before the event begins.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
