message_1:
  context: "user message 1 in example chat: Memory Reminder Defaults. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved reminder defaults memory to explain when I should be nudged for a saved event next week. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
  de: Nutze meinen gespeicherten Memory-Eintrag für Standard-Erinnerungen, um zu erklären, wann ich für ein gespeichertes Ereignis in der nächsten Woche benachrichtigt werden sollte. Du darfst diesen gespeicherten Memory-Eintrag anfordern und verwenden. Suche nach der Verwendung des Memory-Eintrags nicht im Web, nutze keine App-Skills, erstelle keine Dokumente oder Dateien, erstelle keine Embeds und stelle keine Folgefrage.
