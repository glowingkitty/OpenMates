message_2:
  context: "assistant message 2 in example chat: Reminder defaults memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your [saved reminder settings](/#settings/apps/reminder), you have configured a default notification schedule for your events. According to your preferences, you will receive two nudges for any event you save for next week:
    
    1.  **One day before:** A reminder will trigger exactly **1,440 minutes** (24 hours) prior to the event start time.
    2.  **One hour before:** A second reminder will trigger **60 minutes** before the event begins.
    
    For example, if you have an event scheduled for next **Wednesday, June 17, at 2:00 PM**, you should expect to be nudged at:
    *   **Tuesday, June 16, at 2:00 PM**
    *   **Wednesday, June 17, at 1:00 PM**
    
    These defaults ensure you have enough lead time to prepare a day in advance and a final prompt just before you need to be ready.
    
    How are you feeling about your schedule for next week? If you'd like to adjust these offsets or add more specific reminders, you can always [update your reminder defaults](/#settings/apps/reminder).
    
    **Would you like me to help you schedule any specific events for next week now?**
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
