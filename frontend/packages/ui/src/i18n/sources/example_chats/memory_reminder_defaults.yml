message_2:
  context: "assistant message 2 in example chat: Memory Reminder Defaults. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved settings for `saved_item_reminder_defaults`, you have configured two specific nudges for your events. Your settings use offsets of **1440** and **60** minutes.

    For any event you have saved for next week, you will be nudged at the following times:

    1.  **24 hours before the event:** The 1440-minute offset ensures you receive a reminder exactly one day in advance.
    2.  **1 hour before the event:** The 60-minute offset provides a final nudge shortly before the event begins.
    ---
    *⚠️ This is educational information only and not professional psychological advice. For mental health concerns, please consult a qualified therapist or counselor. If you're experiencing a crisis, contact emergency services or a crisis hotline immediately.*
  de: |
    Basierend auf deinen gespeicherten Einstellungen für `saved_item_reminder_defaults` hast du zwei spezifische Benachrichtigungen für deine Ereignisse konfiguriert. Deine Einstellungen verwenden Offsets von **1440** und **60** Minuten.
    
    Für jedes Ereignis, das du für nächste Woche gespeichert hast, wirst du zu folgenden Zeiten benachrichtigt:
    
    1.  **24 Stunden vor dem Ereignis:** Der Offset von 1440 Minuten stellt sicher, dass du genau einen Tag im Voraus eine Erinnerung erhältst.
    2.  **1 Stunde vor dem Ereignis:** Der Offset von 60 Minuten bietet eine letzte Benachrichtigung kurz vor Beginn des Ereignisses.
    ---
    *⚠️ Dies dient ausschließlich zu Informationszwecken und stellt keine professionelle psychologische Beratung dar. Bei psychischen Problemen wende dich bitte an einen qualifizierten Therapeuten oder Berater. Wenn du dich in einer Krise befindest, kontaktiere bitte umgehend den Notruf oder eine Krisen-Hotline.*
