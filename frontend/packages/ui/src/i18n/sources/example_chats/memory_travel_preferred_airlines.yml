message_2:
  context: "assistant message 2 in example chat: Preferred airline memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on the preferences in your [travel settings](/#settings/apps/travel), your top choice for flights is **[Lufthansa](wiki:Lufthansa)**. 
    
    For a work trip, focusing on your preferred airline first is a smart move for several reasons:
    
    1.  **Direct Routes & Scheduling:** Lufthansa offers extensive connections through its hubs in **[Frankfurt](wiki:Frankfurt_Airport)** and **[Munich](wiki:Munich_Airport)**. For business travel, prioritizing direct flights or well-timed connections on your preferred carrier reduces travel fatigue and maximizes your time.
    2.  **[Star Alliance](wiki:Star_Alliance) Benefits:** Since Lufthansa is a founding member of Star Alliance, your first comparison should also include partners like **[United Airlines](wiki:United_Airlines)**, **[Swiss International Air Lines](wiki:Swiss_International_Air_Lines)**, and **[Austrian Airlines](wiki:Austrian_Airlines)**. This allows you to maintain consistent service standards and continue accruing miles within the same ecosystem.
    3.  **Lounge Access & Priority:** If you have status with Lufthansa, you'll likely have access to priority check-in and lounges, which are essential for staying productive or resting during a work trip.
    
    **Recommendation for your search:**
    1.  **First Look:** Lufthansa direct flights for the best schedule.
    2.  **Second Look:** Star Alliance partners if the Lufthansa schedule doesn't align perfectly.
    3.  **Third Look:** Other major carriers only if there is a significant price or time advantage that outweighs your loyalty benefits.
    
    To help you find specific options, could you share some details about your upcoming trip?
    
    ```interactive_question
    {
      "type": "input",
      "id": "work_trip_details",
      "fields": [
        {
          "id": "origin",
          "label": "Departure City",
          "placeholder": "e.g., Berlin",
          "required": true
        },
        {
          "id": "destination",
          "label": "Arrival City",
          "placeholder": "e.g., New York",
          "required": true
        },
        {
          "id": "date",
          "label": "Departure Date",
          "placeholder": "YYYY-MM-DD",
          "required": true
        }
      ]
    }
    ```

    ```json
    {"type": "code", "embed_id": "2dfaadf5-b662-48e5-b130-a35ddd667689"}
    ```
    
    
