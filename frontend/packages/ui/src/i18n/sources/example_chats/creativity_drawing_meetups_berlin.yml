    柏林拥有充满活力的创意场景，下周（2026年4月13日至19日）有多场绘画和艺术相关聚会。以下是一些精选活动：

    ### 周一，4月13日
    *   **[Open Draw](embed:open-draw-iPc)**（18:00 – 21:00）在Offenes Wohnzimmer, Moabit。一个轻松的绘画、绘图和社交之夜。提供炭笔、水彩和丙烯颜料等材料。
    *   **[Watercolours for Beginners](embed:watercolours-for-beginners-WY8)**（18:00 – 19:30）在Friedrichshain。一个专注于湿画法和调色等基本技巧的练习小组。

    ### 周二，4月14日
    *   **[Collaborative Drawing & Printing](embed:collaborative-drawing-printing-651)**（18:00 – 19:30）在Studio Good, Prenzlauer Berg。一个独特的环节，参与者轮流绘画以创作协作作品，之后进行个人版画制作。
    *   **[Lino Café](embed:lino-caf-51i)**（18:00 – 20:00）在kunstraum heartspace, Prenzlauer Berg。一个面向各级别版画爱好者的创意空间。
    *   **[Fantastic Anatomy Watercolour Workshop](embed:fantastic-anatomy-watercolour-Sq3)**（18:00 – 19:30）在Friedrichshain。这个工作坊将科学与想象力结合，用水彩探索人体。
    *   **[Cozy Life Drawing Session](embed:cozy-life-drawing-ASz)**（18:15 – 21:45）在Wilhelmine-Gemberg-Weg附近。一个亲密的环节，参与者可以在尊重、酷儿友好的氛围中绘画和担任模特。
    *   **[Classical Drawing Course](embed:klassisches-zeichnen-kurs-ia6)**（18:30 – 21:30）在PAKD Gallery, Lichtenberg。一个循序渐进的写实铅笔画课程，涵盖透视、光影。
    *   **[Realistic Oil Painting](embed:realistic-oil-painting-8b1)**（18:45 – 21:45）同样在PAKD Gallery。专注于写实油画的学院传统。
    *   **[Neurodivergent Creative Tuesdays](embed:neurodivergent-creative-tuesdays-RQX)**（20:00 – 22:00）在Friedrichshain。一个低压、无负罪感的创意空间，提供各种材料。

    ### 周四，4月16日
    *   **[Improv Thursdays](embed:improv-thursdays-zos)**（18:30 – 20:30）在Theatre Pool, Friedrichshain。虽然不完全是绘画，但这个环节专注于通过戏剧游戏进行即兴创作和讲故事。

    ### 在线 / 联合办公
    如果你想和其他人一起进行自己的创意项目，**[周一](embed:creatives-co-working-LpA)**和**[周三](embed:creatives-co-working-kZe)**（15:00 – 17:00）有由Artists and Creatives Co-working小组主办的联合办公活动。

    想了解更多关于这些活动的详情，或者其他类型的创意活动吗？

    **建议：**
    *   [搜索柏林周末艺术展览](/#settings/appstore/web)
    *   [查找附近的美术用品店](/#settings/appstore/maps)
