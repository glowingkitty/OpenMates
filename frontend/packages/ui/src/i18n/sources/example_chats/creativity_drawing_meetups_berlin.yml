    [Berlin](wiki:Berlin) has a vibrant creative scene with several drawing and art-related meetups scheduled for next week (April 13–19, 2026). Here are some of the highlights:

    ### Monday, April 13
    *   **[Open Draw](embed:open-draw-iPc)** (18:00 – 21:00) at Offenes Wohnzimmer, Moabit. A relaxed evening for drawing, painting, and socialising. Materials like charcoal, watercolors, and acrylics are provided.
    *   **[Watercolours for Beginners](embed:watercolours-for-beginners-WY8)** (18:00 – 19:30) in Friedrichshain. A practice group focused on fundamental techniques like wet-on-wet and color mixing.

    ### Tuesday, April 14
    *   **[Collaborative Drawing & Printing](embed:collaborative-drawing-printing-651)** (18:00 – 19:30) at Studio Good, Prenzlauer Berg. A unique session where participants rotate drawings to create collaborative pieces, followed by individual printing work.
    *   **[Lino Café](embed:lino-caf-51i)** (18:00 – 20:00) at kunstraum heartspace, Prenzlauer Berg. A creative space dedicated to [linocut](wiki:Linocut) enthusiasts of all levels.
    *   **[Fantastic Anatomy Watercolour Workshop](embed:fantastic-anatomy-watercolour-Sq3)** (18:00 – 19:30) in Friedrichshain. This workshop combines science and imagination to explore the human body through watercolor.
    *   **[Cozy Life Drawing Session](embed:cozy-life-drawing-ASz)** (18:15 – 21:45) near Wilhelmine-Gemberg-Weg. An intimate session for participants to both draw and model in a respectful, queer-friendly atmosphere.
    *   **[Classical Drawing Course](embed:klassisches-zeichnen-kurs-ia6)** (18:30 – 21:30) at PAKD Gallery, Lichtenberg. A step-by-step course on realistic pencil drawing, covering perspective, light, and shadow.
    *   **[Realistic Oil Painting](embed:realistic-oil-painting-8b1)** (18:45 – 21:45) also at PAKD Gallery. Focuses on the academic traditions of realistic oil painting.
    *   **[Neurodivergent Creative Tuesdays](embed:neurodivergent-creative-tuesdays-RQX)** (20:00 – 22:00) in Friedrichshain. A low-pressure, guilt-free creative space with various supplies provided.

    ### Thursday, April 16
    *   **[Improv Thursdays](embed:improv-thursdays-zos)** (18:30 – 20:30) at Theatre Pool, Friedrichshain. While not strictly drawing, this session focuses on spontaneous creativity and storytelling through theater games.

    ### Online / Co-working
    If you're looking to work on your own creative projects alongside others, there are co-working sessions on **[Monday](embed:creatives-co-working-LpA)** and **[Wednesday](embed:creatives-co-working-kZe)** (15:00 – 17:00) hosted by the Artists and Creatives Co-working group.

