  en: |
    Here is a complete, runnable Vite project for your **Habit Garden**. It uses vanilla JavaScript, CSS, and HTML. The app stores your habits in the browser's `localStorage` so you won't lose your progress when you refresh. 
    
    Every habit you add gets assigned a unique flower. When you complete a habit for the day, that flower blooms in your garden grid; if you miss it, it stays a tiny sprout.
    
