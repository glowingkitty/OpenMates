message_1:
  context: "user message 1 in example chat: Habit Garden Vite App. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Create a complete runnable Vite browser app called Habit Garden as a multi-file project. Include package.json, index.html, src/main.js, src/style.css, and any other needed files. The app should let me add habits, mark today's progress, and show a weekly garden visualization. Please return the full project files so OpenMates can preview it as an application."
  de: Erstelle eine vollständige, ausführbare Vite-Browser-App namens Habit Garden als Multi-Datei-Projekt. Füge package.json, index.html, src/main.js, src/style.css und alle anderen benötigten Dateien hinzu. Die App soll es mir ermöglichen, Gewohnheiten hinzuzufügen, den heutigen Fortschritt zu markieren und eine wöchentliche Garten-Visualisierung anzuzeigen. Bitte gib die vollständigen Projektdateien zurück, damit OpenMates sie als Anwendung in der Vorschau anzeigen kann.
