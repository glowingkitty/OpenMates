  en: |
    Based on your [web bookmarks](/#settings/apps/web), you should start by opening the **SvelteKit Documentation**.
    
    You have this specific resource saved multiple times (including the svelte.dev/docs/kit mirror), which is the authoritative guide for [SvelteKit](wiki:Svelte).
    
    For planning a dashboard, I recommend looking at these specific sections within those docs first:
    1.  **Routing:** To plan how your dashboard sub-pages and layouts will be structured.
    2.  **Loading data:** To understand how you'll fetch the statistics and data your dashboard will display.
    3.  **Form actions:** To plan how user inputs (like settings or data entry) will be handled.
    
    How far along are you with the dashboard design? Are you planning to use a specific UI library like Svelte UI or Skeleton?
    
