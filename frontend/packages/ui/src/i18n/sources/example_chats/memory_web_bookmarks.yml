message_1:
  context: "user message 1 in example chat: Memory Web Bookmarks. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved web bookmarks memory to tell me which saved bookmark I should open first while planning a SvelteKit dashboard, and why. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
  de: Nutze meine gespeicherten Web-Lesezeichen, um mir zu sagen, welches Lesezeichen ich bei der Planung eines SvelteKit-Dashboards zuerst öffnen sollte und warum. Du kannst diesen Speicher anfordern und nutzen. Suche nach der Nutzung des Speichers nicht im Web, nutze keine App-Skills, erstelle keine Dokumente oder Dateien, erstelle keine Embeds und stelle keine Anschlussfrage.
  zh: "Use my saved web bookmarks memory to tell me which saved bookmark I should open first while planning a SvelteKit dashboard, and why. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
