message_2:
  context: "assistant message 2 in example chat: To-read list memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "a5ce4cb1-e3c1-4ff0-8a42-49655d5e971e", "app_id": "images", "skill_id": "search", "query": "Dune Frank Herbert book cover", "provider": "Brave Search"}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "e3a0ccde-d849-4737-8d8c-ceda75df47d8", "app_id": "web", "skill_id": "search", "query": "Dune Frank Herbert book summary and length for reading time", "provider": "Brave"}
    ```
    
    ```json
    {"type": "app_skill_use", "embed_id": "9ff43565-7cfa-4841-b2a4-90e832750dc7", "app_id": "web", "skill_id": "search", "query": "best immersive science fiction books for long train rides similar to Dune", "provider": "Brave"}
    ```
    
    Based on your **to-read list**, you have a very clear winner for your train ride: [Dune](wiki:Dune_(novel)) by [Frank Herbert](wiki:Frank_Herbert).
    
    Interestingly, you have this book saved twice in your memories—once noting it as a "big immersive book for a quiet vacation" and again as a "high priority for worldbuilding inspiration." A long train ride is the perfect environment for this; the "labor of reading" it often requires (due to its dense political and ecological detail) is much easier to tackle when you have hours of uninterrupted travel.
    
    ### Why *Dune* fits your trip:
    *   **Immersion & Scale:** At roughly 133,000 words (about 600–800 pages), it is a massive epic that will easily span a long cross-country journey. 
    *   **Worldbuilding Masterclass:** Since you are looking for "worldbuilding inspiration," *Dune* is the gold standard. It creates a complete ecosystem on the desert planet [Arrakis](wiki:Arrakis), featuring complex cultures like the [Fremen](wiki:Fremen) and the intricate "spice" economy.
    *   **Atmosphere:** The vast, sweeping landscapes of the novel often pair beautifully with watching the world go by through a train window.
    
    [!](embed:etsy.com-gY2)
    [!](embed:postmarkedfromthestars.com-NuH)
    [!](embed:amazon.com-9SY)
    
    ### Backups (In case you've already started *Dune*):
    Since your list is currently focused entirely on *Dune*, I searched for a few alternatives that match your preference for "big, immersive worldbuilding":
    
    1.  **Foundation by [Isaac Asimov](wiki:Isaac_Asimov):** If you enjoy the "galactic empire" scale and political intrigue of *Dune*, this is the other pillar of classic sci-fi. It focuses on the fall of a civilization and the use of "psychohistory" to save it.
    2.  **[Hyperion](wiki:Hyperion_(Simmons_novel)) by [Dan_Simmons](wiki:Dan_Simmons):** Often described as the *Canterbury Tales* of science fiction, it features multiple perspectives and some of the most haunting worldbuilding in the genre (including the mysterious Shrike).
    3.  **[The Fifth Season](wiki:The_Fifth_Season_(novel)) by [N. K. Jemisin](wiki:N._K._Jemisin):** For something more modern, this provides incredible worldbuilding inspiration centered on a planet plagued by catastrophic geological "seasons."
    
    **Next Steps:**
    *   Do you already have a physical copy of *Dune*, or would you like me to find the [nearest bookstore](/#settings/apps/maps) along your route?
    *   Would you like me to add one of those backups to your [to-read list](/#settings/apps/books) as a "Plan B"?
