    Here are three delicious, protein-packed vegetarian chickpea and spinach dinner recipes that you can whip up in under 35 minutes.

    ### 1. 10-Minute Chickpea and Spinach Curry
    This is an incredibly fast [curry](wiki:Curry) that relies on aromatics and pantry staples for a rich, satisfying flavor in record time.

    [!](embed:thefieryvegetarian.com-3sr)
    [!](embed:vegancocotte.com-IZt)
    [!](embed:vegancocotte.com-rFn)

    *   **Total Time:** 10 minutes
    *   **Protein Content:** ~10.5g per serving
    *   **Servings:** 4

    **Ingredients:**
    *   1 (15 oz) can [chickpeas](wiki:Chickpea) (drained and rinsed)
    *   1 (15 oz) can diced [tomatoes](wiki:Tomato)
    *   1 [onion](wiki:Onion), 4 [garlic](wiki:Garlic) cloves, 1 red chili, 1 tbsp ginger (all finely diced)
    *   3 tbsp curry paste & 2 tbsp [tomato paste](wiki:Tomato_paste)
    *   3 cups fresh [spinach](wiki:Spinach)
    *   1 tsp vegetable oil

    **Instructions:**
    1.  **Sauté Aromatics:** Heat oil in a large pot. Add diced onion, garlic, ginger, and chili. Sauté for about 1 minute until fragrant.
    2.  **Build Flavor:** Stir in the tomato paste and curry paste, sautéing for another minute to release the oils.
    3.  **Simmer:** Pour in the canned tomatoes and chickpeas. Cover and simmer on medium-high heat for 3–5 minutes.
    4.  **Wilt Spinach:** Stir in the fresh spinach leaves until they wilt (about 1–2 minutes). Serve immediately.

    ---

    ### 2. 15-Minute Skillet Chickpeas with Spinach and Tomatoes
    This Mediterranean-style dish uses spices like [turmeric](wiki:Turmeric) and a finishing touch of lemon juice for a bright, healthy meal.

    [!](embed:runningonrealfood.com-R8H)
    [!](embed:americanhomecook.com-Alt)
    [!](embed:shortgirltallorder.com-QXv)

    *   **Total Time:** 15 minutes
    *   **Protein Content:** ~23.1g per serving
    *   **Servings:** 2

    **Ingredients:**
    *   1 (15 oz) can chickpeas (drained and rinsed)
    *   1 (14.5 oz) can diced tomatoes
    *   5 oz baby spinach
    *   1 small onion (diced) & 4 garlic cloves (sliced)
    *   ½ tsp ground turmeric & ½ tsp [red pepper flakes](wiki:Crushed_red_pepper)
    *   3 tbsp [olive oil](wiki:Olive_oil), lemon juice, and fresh herbs ([cilantro](wiki:Coriander) or [parsley](wiki:Parsley))

    **Instructions:**
    1.  **Fry Aromatics:** Heat oil in a skillet over low heat. Cook onion and garlic until translucent and slightly browned (3–5 minutes).
    2.  **Toast Spices:** Add turmeric and red pepper flakes. Toast for 1 minute, then add chickpeas with a drizzle of oil and salt/pepper. Sizzle for 5–7 minutes.
    3.  **Combine:** Stir in the tomatoes and simmer until the liquid reduces slightly.
    4.  **Finish:** Add spinach and stir until wilted. Off the heat, stir in lemon juice and top with fresh herbs and a dollop of [yogurt](wiki:Yogurt).

