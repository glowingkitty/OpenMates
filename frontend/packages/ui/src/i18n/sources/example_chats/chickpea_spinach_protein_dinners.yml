    *   1 [onion](wiki:Onion), 4 [garlic](wiki:Garlic) cloves, 1 red chili, 1 tbsp ginger (all finely diced)
    *   3 tbsp curry paste & 2 tbsp [tomato paste](wiki:Tomato_paste)
    *   3 cups fresh [spinach](wiki:Spinach)
    *   1 tsp vegetable oil

    **Instructions:**
    1.  **Sauté Aromatics:** Heat oil in a large pot. Add diced onion, garlic, ginger, and chili. Sauté for about 1 minute until fragrant.
    2.  **Build Flavor:** Stir in the tomato paste and curry paste, sautéing for another minute to release the oils.
    3.  **Simmer:** Pour in the canned tomatoes and chickpeas. Cover and simmer on medium-high heat for 3–5 minutes.
    4.  **Wilt Spinach:** Stir in the fresh spinach leaves until they wilt (about 1–2 minutes). Serve immediately.

