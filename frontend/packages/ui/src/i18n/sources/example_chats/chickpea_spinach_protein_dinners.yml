    ```
    
    Hier sind drei köstliche, proteinreiche vegetarische Abendessen-Rezepte mit Kichererbsen und Spinat, die du in weniger als 35 Minuten zubereiten kannst.
    
    ### 1. 10-Minuten-Kichererbsen-Spinat-Curry
    Dies ist ein unglaublich schnelles [Curry](wiki:Curry), das auf Aromen und Vorratskammer-Basics setzt, um in Rekordzeit einen reichhaltigen, sättigenden Geschmack zu erzielen.
    
    [!](embed:thefieryvegetarian.com-3sr)
    [!](embed:vegancocotte.com-IZt)
    [!](embed:vegancocotte.com-rFn)
    
    *   **Gesamtzeit:** 10 Minuten
    *   **Proteingehalt:** ~10,5 g pro Portion
    *   **Portionen:** 4
    
    **Zutaten:**
    *   1 Dose (15 oz) [Kichererbsen](wiki:Chickpea) (abgetropft und abgespült)
    *   1 Dose (15 oz) gewürfelte [Tomaten](wiki:Tomato)
    *   1 [Zwiebel](wiki:Onion), 4 [Knoblauchzehen](wiki:Garlic), 1 rote Chili, 1 EL Ingwer (alles fein gewürfelt)
    *   3 EL Currypaste & 2 EL [Tomatenmark](wiki:Tomato_paste)
    *   3 Tassen frischer [Spinat](wiki:Spinach)
    *   1 TL Pflanzenöl
    
    **Anleitung:**
    1.  **Aromen anbraten:** Öl in einem großen Topf erhitzen. Gewürfelte Zwiebel, Knoblauch, Ingwer und Chili hinzufügen. Etwa 1 Minute anbraten, bis es duftet.
    2.  **Geschmack aufbauen:** Tomatenmark und Currypaste einrühren und eine weitere Minute anbraten, damit sich die Aromen entfalten.
    3.  **Köcheln lassen:** Tomaten aus der Dose und Kichererbsen hinzufügen. Abdecken und bei mittlerer bis hoher Hitze 3–5 Minuten köcheln lassen.
    4.  **Spinat unterheben:** Frische Spinatblätter einrühren, bis sie zusammenfallen (etwa 1–2 Minuten). Sofort servieren.
    
    ---
    
    ### 2. 15-Minuten-Pfannen-Kichererbsen mit Spinat und Tomaten
    Dieses mediterrane Gericht verwendet Gewürze wie [Kurkuma](wiki:Turmeric) und einen Schuss Zitronensaft für eine frische, gesunde Mahlzeit.
    
    [!](embed:runningonrealfood.com-R8H)
    [!](embed:americanhomecook.com-Alt)
    [!](embed:shortgirltallorder.com-QXv)
    
    *   **Gesamtzeit:** 15 Minuten
    *   **Proteingehalt:** ~23,1 g pro Portion
    *   **Portionen:** 2
    
    **Zutaten:**
    *   1 Dose (15 oz) Kichererbsen (abgetropft und abgespült)
    *   1 Dose (14,5 oz) gewürfelte Tomaten
    *   5 oz Babyspinat
    *   1 kleine Zwiebel (gewürfelt) & 4 Knoblauchzehen (in Scheiben geschnitten)
    *   ½ TL gemahlener Kurkuma & ½ TL [Chiliflocken](wiki:Crushed_red_pepper)
    *   3 EL [Olivenöl](wiki:Olive_oil), Zitronensaft und frische Kräuter ([Koriander](wiki:Coriander) oder [Petersilie](wiki:Parsley))
    
    **Anleitung:**
    1.  **Aromen anbraten:** Öl in einer Pfanne bei niedriger Hitze erhitzen. Zwiebel und Knoblauch glasig und leicht gebräunt dünsten (3–5 Minuten).
    2.  **Gewürze anrösten:** Kurkuma und Chiliflocken hinzufügen. 1 Minute anrösten, dann Kichererbsen mit einem Schuss Öl sowie Salz/Pfeffer hinzufügen. 5–7 Minuten braten.
    3.  **Kombinieren:** Tomaten einrühren und köcheln lassen, bis die Flüssigkeit etwas reduziert ist.
    4.  **Vollenden:** Spinat hinzufügen und rühren, bis er zusammenfällt. Von der Kochstelle nehmen, Zitronensaft einrühren und mit frischen Kräutern sowie einem Klecks [Joghurt](wiki:Yogurt) garnieren.
    
    ---
    
    ### 3. 20-Minuten-Kichererbsen mit Spinat nach nahöstlicher Art
    Eine einfachere, puristischere Version des klassischen [Tapas](wiki:Tapas)-Gerichts, die auf die natürliche Süße von gedünsteten Zwiebeln und weißen Bohnen setzt.
    
    [!](embed:carolinescooking.com-Dy7)
    [!](embed:simpleveganblog.com-8dt)
    [!](embed:ourplantbasedworld.com-Krr)
    
    *   **Gesamtzeit:** 20 Minuten
    *   **Proteingehalt:** ~8,7 g pro Portion
    *   **Portionen:** 4
    
    **Zutaten:**
    *   3 Tassen natriumarme Kichererbsen aus der Dose (abgetropft und abgespült)
    *   2 Tassen Babyspinat
    *   2/3 Tasse gewürfelte Tomaten
    *   ½ große weiße Zwiebel (gewürfelt)
    *   2 TL gehackter Knoblauch
    *   1½ EL [natives Olivenöl extra](wiki:Olive_oil#Grades)
    
    **Anleitung:**
    1.  **Zwiebeln dünsten:** Olivenöl in einer Pfanne erhitzen. Die Zwiebel 2–3 Minuten dünsten.
    2.  **Würzen:** Knoblauch einrühren und eine weitere Minute dünsten.
    3.  **Einkochen:** Tomaten hinzufügen und 1 Minute garen.
    4.  **Bohnen köcheln:** Kichererbsen und etwa 3–4 Esslöffel Wasser (oder [Gemüsebrühe](wiki:Broth)) hinzufügen. 10 Minuten garen.
    5.  **Spinat unterheben:** Den Babyspinat vorsichtig unterheben, bis er gerade so zusammengefallen ist. Nach Geschmack würzen und servieren.
    
    ---
    
    **Nächste Schritte für deine Essensplanung:**
    *   Möchtest du Vorschläge für Beilagen finden, wie zum Beispiel ein Rezept für [Basmati-Reis](wiki:Basmati) oder [Naan](wiki:Naan), die dazu passen?
    *   Hast du Interesse an proteinreichen veganen Dessert-Ideen, um dein Abendessen abzurunden?
