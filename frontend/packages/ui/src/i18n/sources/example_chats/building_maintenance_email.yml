    - De e-mail vermeldt duidelijk het probleem, wanneer het begon en wat je nodig hebt
    - Hij vraagt om zowel schriftelijke informatie als een terugbelverzoek
    - Je kunt de naam van de ontvanger en je handtekening personaliseren

    Wil je dat ik de toon aanpas (formeler/informeler), extra details toevoeg of een deel van het bericht wijzig?
  ar: |
    سأصيغ لك رسالة بريد إلكتروني بشأن التدفئة المعطلة. إليك رسالة مهنية:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **بعض الملاحظات:**
    - أبقيت النبرة مهنية ولكن حازمة نظرًا لإلحاح مشكلة التدفئة المعطلة
    - توضح الرسالة المشكلة بوضوح، ومتى بدأت، وما الذي تحتاجه
    - تطلب الرسالة معلومات مكتوبة ومكالمة عودة
    - يمكنك تخصيص اسم المستلمة وتوقيعك

    هل تريد أن أعدل النبرة (أكثر رسمية/أكثر بساطة)، أو أضيف تفاصيل، أو أغير أي جزء من الرسالة؟
  hi: |
    मैं खराब हीटर के बारे में आपके लिए एक ईमेल का मसौदा तैयार करूँगा। यह एक पेशेवर संदेश है:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **कुछ नोट्स:**
    - खराब हीटर की तात्कालिकता को देखते हुए मैंने स्वर पेशेवर लेकिन दृढ़ रखा है
    - ईमेल समस्या, उसके शुरू होने का समय और आपकी ज़रूरत स्पष्ट रूप से बताता है
    - यह लिखित जानकारी और कॉल बैक दोनों का अनुरोध करता है
    - आप प्राप्तकर्ता का नाम और अपना हस्ताक्षर व्यक्तिगत बना सकते हैं

