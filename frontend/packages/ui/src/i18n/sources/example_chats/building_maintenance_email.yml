  th: |
    ฉันจะร่างอีเมลเกี่ยวกับฮีตเตอร์เสียให้คุณ นี่คือข้อความแบบมืออาชีพ:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **หมายเหตุเล็กน้อย:**
    - ฉันใช้โทนที่เป็นมืออาชีพแต่ชัดเจน เพราะฮีตเตอร์เสียเป็นเรื่องเร่งด่วน
    - อีเมลระบุปัญหา เวลาที่เริ่มเกิดขึ้น และสิ่งที่คุณต้องการอย่างชัดเจน
    - อีเมลขอทั้งข้อมูลเป็นลายลักษณ์อักษรและการโทรกลับ
    - คุณสามารถปรับชื่อผู้รับและลายเซ็นของคุณได้

    ต้องการให้ฉันปรับโทน (เป็นทางการขึ้น/เป็นกันเองขึ้น), เพิ่มรายละเอียด หรือแก้ไขส่วนใดของข้อความไหม?
  cs: |
    Připravím ti e-mail ohledně rozbitého topení. Tady je profesionální zpráva:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Několik poznámek:**
    - Zachoval jsem profesionální, ale důrazný tón vzhledem k naléhavosti rozbitého topení
    - E-mail jasně uvádí problém, kdy začal a co potřebuješ
    - Žádá jak písemné informace, tak zpětné zavolání
    - Jméno příjemkyně a podpis si můžeš upravit

    Chceš, abych upravil tón (formálnější/neformálnější), přidal další detaily nebo změnil některou část zprávy?
  sv: |
    Jag skriver ett utkast till ett mejl om den trasiga värmen. Här är ett professionellt meddelande:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Några kommentarer:**
    - Jag har hållit tonen professionell men tydlig, eftersom trasig värme är brådskande
    - Mejlet anger problemet, när det började och vad du behöver
    - Det begär både skriftlig information och återuppringning
    - Du kan anpassa mottagarens namn och din signatur

    Vill du att jag justerar tonen (mer formell/ledig), lägger till fler detaljer eller ändrar någon del av meddelandet?
  he: |
