  nl: |
    Ik stel een e-mail voor je op over de kapotte verwarming. Hier is een professionele boodschap:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Een paar opmerkingen:**
