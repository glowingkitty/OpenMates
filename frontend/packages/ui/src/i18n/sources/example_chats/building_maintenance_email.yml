summary:
  context: Summary of example chat about drafting an email for a broken heater using placeholders for email addresses and phone numbers
  en: "OpenMates turns a tenant's broken-heater request into a professional email while keeping email addresses and phone numbers hidden behind private-detail placeholders."
  de: "OpenMates verwandelt die Heizungsbeschwerde eines Mieters in eine professionelle E-Mail und hält E-Mail-Adressen sowie Telefonnummern hinter Platzhaltern verborgen."
  zh: "OpenMates 将租户关于暖气故障的请求整理成专业邮件，同时用占位符隐藏邮箱地址和电话号码。"
  es: "OpenMates convierte la solicitud de un inquilino sobre una calefacción averiada en un correo profesional mientras oculta correos y teléfonos tras marcadores privados."
  fr: "OpenMates transforme la demande d'un locataire au sujet d'un chauffage en panne en e-mail professionnel, tout en masquant les e-mails et numéros derrière des espaces réservés privés."
  pt: "OpenMates transforma o pedido de um inquilino sobre um aquecedor quebrado em um e-mail profissional, mantendo e-mails e telefones ocultos por placeholders privados."
  ru: "OpenMates превращает просьбу жильца о сломанном отоплении в профессиональное письмо, скрывая адреса электронной почты и номера телефонов за приватными плейсхолдерами."
  ja: "OpenMates は暖房故障に関する入居者の依頼を、メールアドレスや電話番号をプレースホルダーで隠したまま、丁寧なメールに整えます。"
  ko: "OpenMates는 고장 난 난방 문제에 대한 세입자의 요청을 전문적인 이메일로 바꾸면서 이메일 주소와 전화번호를 비공개 플레이스홀더 뒤에 숨깁니다."
  it: "OpenMates trasforma la richiesta di un inquilino su un termosifone rotto in un'email professionale, mantenendo email e numeri di telefono nascosti dietro segnaposto privati."
  tr: "OpenMates, kiracının bozuk kalorifer talebini profesyonel bir e-postaya dönüştürürken e-posta adreslerini ve telefon numaralarını özel yer tutucularla gizler."
  vi: "OpenMates biến yêu cầu của người thuê về máy sưởi bị hỏng thành một email chuyên nghiệp, đồng thời ẩn email và số điện thoại sau các placeholder riêng tư."
  id: "OpenMates mengubah permintaan penyewa tentang pemanas rusak menjadi email profesional sambil menyembunyikan alamat email dan nomor telepon di balik placeholder detail pribadi."
  pl: "OpenMates zmienia prośbę najemcy dotyczącą zepsutego ogrzewania w profesjonalny e-mail, ukrywając adresy e-mail i numery telefonów za prywatnymi placeholderami."
  nl: "OpenMates zet het verzoek van een huurder over een kapotte verwarming om in een professionele e-mail en houdt e-mailadressen en telefoonnummers verborgen achter privé-placeholders."
  ar: "يحوّل OpenMates طلب المستأجر بشأن عطل في التدفئة إلى رسالة مهنية مع إبقاء عناوين البريد وأرقام الهاتف مخفية خلف عناصر نائبة خاصة."
  hi: "OpenMates खराब हीटर के बारे में किरायेदार के अनुरोध को पेशेवर ईमेल में बदलता है, जबकि ईमेल पते और फोन नंबर निजी placeholder के पीछे छिपे रहते हैं।"
  th: "OpenMates เปลี่ยนคำขอของผู้เช่าเรื่องฮีตเตอร์เสียให้เป็นอีเมลแบบมืออาชีพ พร้อมซ่อนอีเมลและเบอร์โทรหลัง placeholder ส่วนตัว"
  cs: "OpenMates převede žádost nájemníka o rozbitém topení na profesionální e-mail a ponechá e-mailové adresy i telefonní čísla skryté za soukromými placeholdery."
  sv: "OpenMates gör en hyresgästs fråga om trasig värme till ett professionellt mejl och håller e-postadresser och telefonnummer dolda bakom privata platshållare."
  he: "OpenMates הופך בקשה של דייר לגבי חימום מקולקל לאימייל מקצועי, תוך הסתרת כתובות אימייל ומספרי טלפון מאחורי מצייני מקום פרטיים."
  verified_by_human: []

user_message_1:
  context: User asks OpenMates to write an email about a broken heater; private email addresses and phone number are represented as placeholders and must remain unchanged
  en: "Write an email from my [EMAIL_1_.de] address to [EMAIL_2_com] to inform her about the broken heater in the building which is broken since May 15, asking for when it will be fixed and requesting a call back to my [PHONE_1_171] number."
  de: "Schreibe eine E-Mail von meiner Adresse [EMAIL_1_.de] an [EMAIL_2_com], um sie über die defekte Heizung im Gebäude zu informieren, die seit dem 15. Mai kaputt ist. Frage, wann sie repariert wird, und bitte um einen Rückruf unter meiner Nummer [PHONE_1_171]."
  zh: "请从我的 [EMAIL_1_.de] 地址给 [EMAIL_2_com] 写一封邮件，告知她楼里的暖气自 5 月 15 日起就坏了，询问什么时候能修好，并请她回拨我的 [PHONE_1_171] 电话。"
  es: "Escribe un correo desde mi dirección [EMAIL_1_.de] a [EMAIL_2_com] para informarle de que la calefacción del edificio está averiada desde el 15 de mayo, preguntando cuándo se arreglará y solicitando que me llame al número [PHONE_1_171]."
  fr: "Écris un e-mail depuis mon adresse [EMAIL_1_.de] à [EMAIL_2_com] pour l'informer que le chauffage de l'immeuble est en panne depuis le 15 mai, demander quand il sera réparé et solliciter un rappel à mon numéro [PHONE_1_171]."
  pt: "Escreva um e-mail do meu endereço [EMAIL_1_.de] para [EMAIL_2_com] para informá-la sobre o aquecedor quebrado no prédio, que está quebrado desde 15 de maio, perguntando quando será consertado e pedindo uma ligação de volta para meu número [PHONE_1_171]."
  ru: "Напиши письмо с моего адреса [EMAIL_1_.de] на [EMAIL_2_com], чтобы сообщить ей о сломанном отоплении в здании, которое не работает с 15 мая, спросить, когда его починят, и попросить перезвонить мне на номер [PHONE_1_171]."
  ja: "私の [EMAIL_1_.de] アドレスから [EMAIL_2_com] 宛てにメールを書いてください。建物の暖房が5月15日から故障していることを伝え、いつ修理されるのかを尋ね、私の [PHONE_1_171] 番号へ折り返し電話を依頼してください。"
  ko: "제 [EMAIL_1_.de] 주소에서 [EMAIL_2_com]로 이메일을 작성해 주세요. 건물의 난방기가 5월 15일부터 고장 났다는 점을 알리고, 언제 수리될지 묻고, 제 [PHONE_1_171] 번호로 전화 회신을 요청해 주세요."
  it: "Scrivi un'email dal mio indirizzo [EMAIL_1_.de] a [EMAIL_2_com] per informarla del riscaldamento rotto nell'edificio, guasto dal 15 maggio, chiedendo quando verrà riparato e richiedendo una richiamata al mio numero [PHONE_1_171]."
  tr: "[EMAIL_1_.de] adresimden [EMAIL_2_com] adresine, binadaki ısıtıcının 15 Mayıs'tan beri bozuk olduğunu bildiren, ne zaman tamir edileceğini soran ve [PHONE_1_171] numarama geri arama isteyen bir e-posta yaz."
  vi: "Viết một email từ địa chỉ [EMAIL_1_.de] của tôi gửi đến [EMAIL_2_com] để thông báo về máy sưởi trong tòa nhà bị hỏng từ ngày 15 tháng 5, hỏi khi nào sẽ được sửa và yêu cầu gọi lại cho tôi theo số [PHONE_1_171]."
  id: "Tulis email dari alamat [EMAIL_1_.de] saya ke [EMAIL_2_com] untuk memberitahukan bahwa pemanas di gedung rusak sejak 15 Mei, menanyakan kapan akan diperbaiki, dan meminta telepon balik ke nomor [PHONE_1_171] saya."
  pl: "Napisz e-mail z mojego adresu [EMAIL_1_.de] do [EMAIL_2_com], aby poinformować ją, że ogrzewanie w budynku jest zepsute od 15 maja, zapytać, kiedy zostanie naprawione, i poprosić o oddzwonienie na mój numer [PHONE_1_171]."
  nl: "Schrijf een e-mail vanaf mijn adres [EMAIL_1_.de] naar [EMAIL_2_com] om haar te informeren over de kapotte verwarming in het gebouw, die sinds 15 mei defect is, te vragen wanneer die wordt gerepareerd en om een terugbelverzoek naar mijn nummer [PHONE_1_171]."
  ar: "اكتب رسالة بريد إلكتروني من عنواني [EMAIL_1_.de] إلى [EMAIL_2_com] لإبلاغها بأن التدفئة في المبنى معطلة منذ 15 مايو، والسؤال عن موعد إصلاحها، وطلب معاودة الاتصال بي على رقمي [PHONE_1_171]."
  hi: "मेरे [EMAIL_1_.de] पते से [EMAIL_2_com] को ईमेल लिखें, जिसमें इमारत में 15 मई से खराब हीटर के बारे में बताया जाए, पूछा जाए कि इसे कब ठीक किया जाएगा, और मेरे [PHONE_1_171] नंबर पर कॉल बैक का अनुरोध किया जाए।"
  th: "เขียนอีเมลจากที่อยู่ [EMAIL_1_.de] ของฉันถึง [EMAIL_2_com] เพื่อแจ้งเรื่องฮีตเตอร์ในอาคารเสียตั้งแต่วันที่ 15 พฤษภาคม ถามว่าจะซ่อมเมื่อไหร่ และขอให้โทรกลับมาที่หมายเลข [PHONE_1_171] ของฉัน"
  cs: "Napiš e-mail z mé adresy [EMAIL_1_.de] na [EMAIL_2_com], ve kterém ji informuješ o rozbitém topení v budově, které nefunguje od 15. května, zeptáš se, kdy bude opraveno, a požádáš o zavolání zpět na mé číslo [PHONE_1_171]."
  sv: "Skriv ett mejl från min adress [EMAIL_1_.de] till [EMAIL_2_com] för att informera henne om den trasiga värmen i byggnaden, som har varit trasig sedan 15 maj, fråga när den kommer att åtgärdas och be om återuppringning till mitt nummer [PHONE_1_171]."
  he: "כתוב אימייל מהכתובת שלי [EMAIL_1_.de] אל [EMAIL_2_com] כדי לעדכן אותה על החימום המקולקל בבניין, שמקולקל מאז 15 במאי, לשאול מתי הוא יתוקן ולבקש שתחזור אליי למספר [PHONE_1_171]."
  verified_by_human: []

assistant_message_1:
  context: Assistant drafts a professional email about the broken heater. Keep the JSON mail embed block and private-detail placeholders unchanged.
  en: |
    I'll draft an email for you about the broken heater. Here's a professional message:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **A few notes:**
    - I've kept the tone professional but firm, given the urgency of a broken heater
    - The email clearly states the problem, when it started, and what you need
    - It requests both written information and a callback
    - Feel free to personalize the recipient's name and your signature

    Would you like me to adjust the tone (more formal/casual), add any additional details, or modify any part of the message?
  de: |
    Ich entwerfe dir eine E-Mail wegen der defekten Heizung. Hier ist eine professionelle Nachricht:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Ein paar Hinweise:**
    - Ich habe den Ton professionell, aber bestimmt gehalten, da eine defekte Heizung dringend ist
    - Die E-Mail nennt klar das Problem, seit wann es besteht und was du brauchst
    - Sie bittet sowohl um schriftliche Informationen als auch um einen Rückruf
    - Du kannst den Namen der Empfängerin und deine Signatur gern personalisieren

    Möchtest du, dass ich den Ton anpasse (formeller/lockerer), weitere Details ergänze oder einen Teil der Nachricht ändere?
  zh: |
    我来为你起草一封关于暖气故障的邮件。这里是一封专业的邮件：

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **几点说明：**
    - 鉴于暖气故障的紧急性，我保持了专业但坚定的语气
    - 邮件清楚说明了问题、开始时间以及你的诉求
    - 它同时请求书面信息和回电
    - 你可以自行补充收件人姓名和你的签名

    你想让我调整语气（更正式/更随意）、增加其他细节，或修改邮件的某一部分吗？
  es: |
    Te preparo un borrador de correo sobre la calefacción averiada. Aquí tienes un mensaje profesional:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Algunas notas:**
    - He mantenido un tono profesional pero firme, dada la urgencia de una calefacción averiada
    - El correo explica claramente el problema, cuándo empezó y qué necesitas
    - Solicita tanto información por escrito como una llamada de vuelta
    - Puedes personalizar el nombre de la destinataria y tu firma

    ¿Quieres que ajuste el tono (más formal/informal), añada algún detalle o modifique alguna parte del mensaje?
  fr: |
    Je vais te rédiger un e-mail au sujet du chauffage en panne. Voici un message professionnel :

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Quelques remarques :**
    - J'ai gardé un ton professionnel mais ferme, compte tenu de l'urgence d'un chauffage en panne
    - L'e-mail indique clairement le problème, depuis quand il existe et ce dont tu as besoin
    - Il demande à la fois des informations écrites et un rappel téléphonique
    - Tu peux personnaliser le nom de la destinataire et ta signature

    Veux-tu que j'ajuste le ton (plus formel/plus décontracté), que j'ajoute des détails ou que je modifie une partie du message ?
  pt: |
    Vou redigir um e-mail para você sobre o aquecedor quebrado. Aqui está uma mensagem profissional:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Algumas observações:**
    - Mantive um tom profissional, mas firme, pela urgência de um aquecedor quebrado
    - O e-mail informa claramente o problema, quando começou e o que você precisa
    - Ele solicita tanto informações por escrito quanto uma ligação de retorno
    - Você pode personalizar o nome da destinatária e sua assinatura

    Quer que eu ajuste o tom (mais formal/casual), adicione mais detalhes ou modifique alguma parte da mensagem?
  ru: |
    Я подготовлю для вас письмо о сломанном отоплении. Вот профессиональный вариант:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Несколько замечаний:**
    - Тон оставлен профессиональным, но настойчивым, учитывая срочность проблемы с отоплением
    - В письме ясно указана проблема, когда она началась и что вам нужно
    - В нем запрашивается как письменная информация, так и обратный звонок
    - При желании можно персонализировать имя получателя и подпись

    Хотите, чтобы я изменил тон (более официальный/более непринужденный), добавил детали или изменил какую-либо часть письма?
  ja: |
    暖房故障についてのメールを下書きします。こちらが丁寧な文面です。

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **補足:**
    - 暖房故障は緊急性があるため、丁寧ながらもはっきりしたトーンにしています
    - メールでは問題、発生時期、必要な対応を明確にしています
    - 書面での回答と折り返し電話の両方を依頼しています
    - 宛名と署名は自由に調整できます

    トーンを変更したり（よりフォーマル/カジュアル）、詳細を追加したり、文面の一部を修正しましょうか？
  ko: |
    고장 난 난방기에 대한 이메일을 작성해 드릴게요. 전문적인 메시지는 다음과 같습니다:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **몇 가지 참고 사항:**
    - 난방기 고장의 긴급성을 고려해 전문적이지만 단호한 어조를 유지했습니다
    - 이메일은 문제, 시작 시점, 필요한 조치를 명확히 설명합니다
    - 서면 정보와 전화 회신을 모두 요청합니다
    - 수신자 이름과 서명은 자유롭게 개인화할 수 있습니다

    어조를 조정하거나(더 공식적/더 편안하게), 추가 세부 정보를 넣거나, 메시지 일부를 수정할까요?
  it: |
    Preparo una bozza di email per il riscaldamento rotto. Ecco un messaggio professionale:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Alcune note:**
    - Ho mantenuto un tono professionale ma deciso, vista l'urgenza di un riscaldamento rotto
    - L'email indica chiaramente il problema, da quando è iniziato e cosa ti serve
    - Richiede sia informazioni scritte sia una chiamata di ritorno
    - Puoi personalizzare il nome della destinataria e la tua firma

    Vuoi che modifichi il tono (più formale/informale), aggiunga dettagli o cambi qualche parte del messaggio?
  tr: |
    Bozuk ısıtıcı hakkında senin için bir e-posta taslağı hazırlayacağım. İşte profesyonel bir mesaj:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Birkaç not:**
    - Bozuk bir ısıtıcının aciliyeti nedeniyle tonu profesyonel ama net tuttum
    - E-posta sorunu, ne zaman başladığını ve neye ihtiyacın olduğunu açıkça belirtiyor
    - Hem yazılı bilgi hem de geri arama talep ediyor
    - Alıcının adını ve imzanı kişiselleştirebilirsin

    Tonu değiştirmemi (daha resmi/daha gündelik), ek ayrıntılar eklememi veya mesajın herhangi bir bölümünü değiştirmemi ister misin?
  vi: |
    Tôi sẽ soạn một email cho bạn về máy sưởi bị hỏng. Đây là một nội dung chuyên nghiệp:

    ```json
    {"type": "mail", "embed_id": "ec9c840d-75d8-4ab6-91ff-aa4a25ff4227"}
    ```

    **Một vài ghi chú:**
