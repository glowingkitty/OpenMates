    जून 2026 तक, "राइट टू रिपेयर" (मरम्मत का अधिकार) आंदोलन [यूरोपीय संघ](wiki:European_Union) और [संयुक्त राज्य अमेरिका](wiki:United_States) दोनों में एक महत्वपूर्ण कार्यान्वयन चरण में पहुंच गया है। जहाँ यूरोपीय संघ एक एकीकृत महाद्वीपीय जनादेश की ओर बढ़ रहा है, वहीं अमेरिका में राज्य-स्तरीय जीत और गहन लॉबिंग की लड़ाई जारी है।
    
    ### यूरोपीय संघ में हालिया घटनाक्रम
    
    सबसे महत्वपूर्ण हालिया घटना 3 जून, 2026 को यूरोपीय संघ द्वारा अपने **"तकनीकी संप्रभुता" (Tech Sovereignty) पैकेज** का अनावरण है। इस पहल का उद्देश्य स्वदेशी विकल्पों को बढ़ावा देकर और उपभोक्ता अधिकारों को मजबूत करके अमेरिकी बिग टेक पर निर्भरता कम करना है।
    
    *   **कार्यान्वयन की उल्टी गिनती:** ऐतिहासिक [यूरोपीय संघ राइट टू रिपेयर निर्देश](wiki:Right_to_repair) (निर्देश (EU) 2024/1799) **31 जुलाई, 2026** तक सभी सदस्य देशों में पूरी तरह से लागू होने वाला है।
    *   **डिजिटल प्रोडक्ट पासपोर्ट:** 19 जुलाई, 2026 से, यूरोपीय संघ **डिजिटल प्रोडक्ट पासपोर्ट (DPP)** रजिस्ट्री लॉन्च करेगा। इसके लिए उत्पादों (बैटरी और कपड़ों से शुरू) पर एक QR कोड होना आवश्यक होगा जो टिकाऊपन और मरम्मत योग्यता पर डेटा प्रदान करेगा।
    *   **कानूनी चेतावनियाँ:** 4 जून, 2026 को, यूरोपीय आयोग ने **20 सदस्य देशों** को औपचारिक चेतावनी जारी की, जो "हरित संक्रमण" (Green Transition) निर्देश को राष्ट्रीय कानून में बदलने की मार्च 2026 की समय सीमा से चूक गए थे। यह निर्देश [ग्रीनवाशिंग](wiki:Greenwashing) और "समय से पहले [अप्रचलन](wiki:Obsolescence)" को रोकने के लिए महत्वपूर्ण है।
    
