    K červnu 2026 dosáhlo hnutí za „právo na opravu“ kritické fáze implementace jak v [Evropské unii](wiki:European_Union), tak ve [Spojených státech](wiki:United_States). Zatímco EU směřuje k jednotnému kontinentálnímu mandátu, v USA je i nadále patrná mozaika vítězství na úrovni jednotlivých států a intenzivní lobbistické bitvy.
    
    ### Nedávný vývoj v Evropské unii
    
    Nejvýznamnější nedávnou událostí je představení balíčku **„Technologické suverenity“** ze strany EU dne 3. června 2026. Tato iniciativa má za cíl snížit závislost na amerických Big Tech společnostech podporou vlastních alternativ a posílením práv spotřebitelů.
    
    *   **Odpočítávání k implementaci:** Přelomová [Směrnice EU o právu na opravu](wiki:Right_to_repair) (směrnice (EU) 2024/1799) má být plně vymahatelná ve všech členských státech do **31. července 2026**.
    *   **Digitální pasy výrobků:** Od 19. července 2026 spustí EU registr **Digitálních pasů výrobků (DPP)**. Ten bude vyžadovat, aby výrobky (počínaje bateriemi a textilem) obsahovaly QR kód, který poskytne údaje o jejich odolnosti a opravitelnosti.
    *   **Právní varování:** Dne 4. června 2026 vydala Evropská komise formální varování **20 členským státům**, které zmeškaly březnový termín pro transpozici směrnice o „zelené transformaci“ do vnitrostátního práva. Tato směrnice je klíčová pro prevenci [greenwashingu](wiki:Greenwashing) a „předčasného [zastarávání](wiki:Obsolescence)“.
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Nedávný vývoj ve Spojených státech
    
    V USA se hnutí nadále soustředí na úroveň jednotlivých států, protože federální legislativa v [Kongresu](wiki:United_States_Congress) zůstává zablokovaná.
    
    *   **Expanze na úrovni států:** K polovině roku 2026 žije více než **čtvrtina Američanů** ve státech s vymahatelnými zákony o právu na opravu. Očekává se, že do **podzimu 2026 tento podíl vzroste na 35 %**, jakmile vstoupí v plnou platnost nové zákony v **Texasu** a **Connecticutu**.
    *   **Korporátní lobbing:** Zájmové skupiny jako [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) informovaly o pokračujících lobbistických snahách společností jako [Google](wiki:Google) a [Apple](wiki:Apple_Inc.) proti omezením „párování dílů“ – což je praktika, kdy software uzamkne náhradní díly ke konkrétnímu zařízení.
    
    ### Co říkají odborníci
    
    Právní a techničtí odborníci nabízejí směs optimismu i opatrnosti ohledně těchto nových zákonů:
    
    1.  **Debata o „technologickém osvobození“:** Zatímco představitelé EU oslavovali 3. červen 2026 jako „Den technologického osvobození“, odborníci z *Computer & Communications Industry Association* tvrdí, že skutečná nezávislost na [Big Tech](wiki:Big_Tech) potrvá desetiletí, a poznamenávají, že Evropě stále chybí konkurent pro [Nvidia](wiki:Nvidia) nebo [TSMC](wiki:TSMC).
    2.  **Mezery v zákonech a párování dílů:** Odborníci z *Cybernews* a *Earth911* varují, že ačkoliv zákony nařizují *právo* na opravu, výrobci stále „mají v rukou všechny trumfy“ díky vysokým cenám originálních dílů a [softwarovým zámkům](wiki:Digital_rights_management) (párování dílů). Tvrdí, že bez přísnější regulace cen náhradních dílů může oprava zůstat dražší než výměna.
    3.  **Záruční pobídky:** Právní analytici z *Fieldfisher* vyzdvihují „skrytý klenot“ v zákoně EU: pokud se spotřebitel během záruční doby rozhodne pro opravu místo výměny, **záruka se prodlužuje o 12 měsíců**. To je vnímáno jako významný podnět ke změně chování spotřebitelů směrem od „kultury vyhazování“.
    
    > [Výrobci budou povinni opravovat výrobky spadající do působnosti, i když byly tyto výrobky zakoupeny spotřebiteli před 31. červencem 2026.](embed:fieldfisher.com-e9q)
    
