    ### พัฒนาการล่าสุดในสหภาพยุโรป
    
    เหตุการณ์ล่าสุดที่สำคัญที่สุดคือการเปิดตัวแพ็กเกจ **"อธิปไตยทางเทคโนโลยี" (Tech Sovereignty)** ของ EU เมื่อวันที่ 3 มิถุนายน 2026 ความคิดริเริ่มนี้มีจุดมุ่งหมายเพื่อลดการพึ่งพาบริษัทเทคโนโลยีรายใหญ่ (Big Tech) ของสหรัฐฯ โดยการส่งเสริมทางเลือกภายในท้องถิ่นและเสริมสร้างสิทธิของผู้บริโภค
    
    *   **นับถอยหลังการบังคับใช้:** [คำสั่งสิทธิในการซ่อมแซมของ EU](wiki:Right_to_repair) (Directive (EU) 2024/1799) ที่เป็นหมุดหมายสำคัญจะมีผลบังคับใช้อย่างเต็มรูปแบบในทุกประเทศสมาชิกภายในวันที่ **31 กรกฎาคม 2026** 
    *   **หนังสือเดินทางผลิตภัณฑ์ดิจิทัล:** เริ่มตั้งแต่วันที่ 19 กรกฎาคม 2026 EU จะเปิดตัวทะเบียน **หนังสือเดินทางผลิตภัณฑ์ดิจิทัล (Digital Product Passport - DPP)** ซึ่งจะกำหนดให้ผลิตภัณฑ์ (เริ่มจากแบตเตอรี่และสิ่งทอ) ต้องมีรหัส QR ที่ให้ข้อมูลเกี่ยวกับความทนทานและความสามารถในการซ่อมแซม
    *   **คำเตือนทางกฎหมาย:** เมื่อวันที่ 4 มิถุนายน 2026 คณะกรรมาธิการยุโรปได้ออกคำเตือนอย่างเป็นทางการไปยัง **20 ประเทศสมาชิก** ที่พลาดกำหนดเส้นตายในเดือนมีนาคม 2026 ในการนำคำสั่ง "การเปลี่ยนผ่านสีเขียว" (Green Transition) มาใช้เป็นกฎหมายระดับชาติ คำสั่งนี้มีความสำคัญอย่างยิ่งในการป้องกัน [การฟอกเขียว](wiki:Greenwashing) และ "[การทำให้ล้าสมัยก่อนเวลาอันควร](wiki:Obsolescence)"
    
