    Vanaf juni 2026 heeft de "Recht op reparatie"-beweging een kritieke implementatiefase bereikt in zowel de [Europese Unie](wiki:European_Union) als de [Verenigde Staten](wiki:United_States). Terwijl de EU toewerkt naar een uniform continentaal mandaat, blijven de VS een lappendeken zien van overwinningen op staatsniveau en intense lobbygevechten.
    
    ### Recente ontwikkelingen in de Europese Unie
    
    De belangrijkste recente gebeurtenis is de onthulling door de EU van haar **"Tech Sovereignty"-pakket** op 3 juni 2026. Dit initiatief is bedoeld om de afhankelijkheid van Amerikaanse Big Tech te verminderen door eigen alternatieven te stimuleren en consumentenrechten te versterken.
    
    *   **Aftellen naar implementatie:** De baanbrekende [EU-richtlijn inzake het recht op reparatie](wiki:Right_to_repair) (Richtlijn (EU) 2024/1799) moet uiterlijk op **31 juli 2026** volledig afdwingbaar zijn in alle lidstaten.
    *   **Digitale productpaspoorten:** Vanaf 19 juli 2026 lanceert de EU het register voor het **Digitaal Productpaspoort (DPP)**. Dit vereist dat producten (te beginnen met batterijen en textiel) een QR-code dragen die gegevens bevat over duurzaamheid en herstelbaarheid.
    *   **Juridische waarschuwingen:** Op 4 juni 2026 heeft de Europese Commissie formele waarschuwingen gestuurd naar **20 lidstaten** die de deadline van maart 2026 hebben gemist voor de omzetting van de richtlijn "Groene transitie" in nationaal recht. Deze richtlijn is cruciaal voor het voorkomen van [greenwashing](wiki:Greenwashing) en "voortijdige [veroudering](wiki:Obsolescence)."
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Recente ontwikkelingen in de Verenigde Staten
    
    In de VS blijft de beweging gericht op het niveau van de deelstaten, aangezien federale wetgeving in het [Congres](wiki:United_States_Congress) vastloopt.
    
    *   **Uitbreiding op staatsniveau:** Vanaf medio 2026 woont meer dan **een kwart van de Amerikanen** in staten met afdwingbare wetten op het recht op reparatie. Dit zal naar verwachting stijgen naar **35% tegen het najaar van 2026**, wanneer nieuwe wetten in **Texas** en **Connecticut** volledig van kracht worden.
    *   **Lobbyen door bedrijven:** Belangenorganisaties zoals de [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) hebben melding gemaakt van aanhoudende lobby-inspanningen van bedrijven als [Google](wiki:Google) en [Apple](wiki:Apple_Inc.) tegen beperkingen op "parts pairing" — een praktijk waarbij software vervangende onderdelen koppelt aan een specifiek apparaat.
    
    ### Wat experts zeggen
    
    Juridische en technische experts bieden een mix van optimisme en voorzichtigheid met betrekking tot deze nieuwe wetten:
    
    1.  **Het debat over "Tech-bevrijding":** Hoewel EU-functionarissen 3 juni 2026 hebben uitgeroepen tot "Tech Liberation Day", stellen experts van de *Computer & Communications Industry Association* dat echte onafhankelijkheid van [Big Tech](wiki:Big_Tech) decennia zal duren, waarbij ze opmerken dat Europa nog steeds een rivaal voor [Nvidia](wiki:Nvidia) of [TSMC](wiki:TSMC) mist.
    2.  **Mazen in de wet en Parts Pairing:** Experts van *Cybernews* en *Earth911* waarschuwen dat hoewel de wetten het *recht* op reparatie verplichten, fabrikanten nog steeds "de touwtjes in handen hebben" door de hoge kosten van originele onderdelen en [softwareblokkades](wiki:Digital_rights_management) (parts pairing). Ze stellen dat zonder strengere prijscontroles op reserveonderdelen, reparatie duurder kan blijven dan vervanging.
    3.  **Garantieprikkels:** Juridische analisten van *Fieldfisher* wijzen op een "verborgen juweeltje" in de EU-wetgeving: als een consument tijdens de garantieperiode kiest voor reparatie in plaats van vervanging, wordt de **garantie met 12 maanden verlengd**. Dit wordt gezien als een belangrijke stimulans om het consumentengedrag weg te sturen van een "wegwerpcultuur".
    
    > [Fabrikanten zijn verplicht om producten die binnen het toepassingsgebied vallen te repareren, zelfs als die producten door consumenten zijn gekocht vóór 31 juli 2026.](embed:fieldfisher.com-e9q)
    
