    Haziran 2026 itibarıyla, "Onarım Hakkı" hareketi hem [Avrupa Birliği](wiki:European_Union) hem de [Amerika Birleşik Devletleri](wiki:United_States)'nde kritik bir uygulama aşamasına ulaştı. AB kıta çapında birleşik bir yetkiye doğru ilerlerken, ABD eyalet düzeyindeki zaferler ve yoğun lobi mücadelelerinden oluşan parçalı bir yapı görmeye devam ediyor.
    
    ### Avrupa Birliği'ndeki Son Gelişmeler
    
    En önemli son gelişme, AB'nin 3 Haziran 2026'da duyurduğu **"Teknoloji Egemenliği" paketidir**. Bu girişim, yerli alternatifleri teşvik ederek ve tüketici haklarını güçlendirerek ABD'li Büyük Teknoloji şirketlerine olan bağımlılığı azaltmayı hedefliyor.
    
    *   **Uygulama Geri Sayımı:** Dönüm noktası niteliğindeki [AB Onarım Hakkı Direktifi](wiki:Right_to_repair) (Direktif (AB) 2024/1799), **31 Temmuz 2026** tarihine kadar tüm üye devletlerde tam olarak uygulanabilir hale gelecek. 
    *   **Dijital Ürün Pasaportları:** 19 Temmuz 2026'dan itibaren AB, **Dijital Ürün Pasaportu (DPP)** sicilini başlatacak. Bu, ürünlerin (piller ve tekstil ürünlerinden başlayarak) dayanıklılık ve onarılabilirlik hakkında veri sağlayan bir QR kodu taşımasını gerektirecek.
    *   **Yasal Uyarılar:** 4 Haziran 2026'da Avrupa Komisyonu, "Yeşil Geçiş" direktifini ulusal hukuka aktarmak için Mart 2026 son tarihini kaçıran **20 üye devlete** resmi uyarıda bulundu. Bu direktif, [yeşil aklamayı](wiki:Greenwashing) ve "erken [eskimeyi](wiki:Obsolescence)" önlemek için kritik öneme sahip.
    
