    As of June 2026, the "Right to Repair" movement has reached a critical implementation phase in both the [European Union](wiki:European_Union) and the [United States](wiki:United_States). While the EU is moving toward a unified continental mandate, the US continues to see a patchwork of state-level victories and intense lobbying battles.
    
    ### Recent Developments in the European Union
    
    The most significant recent event is the EU's unveiling of its **"Tech Sovereignty" package** on June 3, 2026. This initiative aims to reduce dependence on US Big Tech by fostering homegrown alternatives and strengthening consumer rights.
    
    *   **Implementation Countdown:** The landmark [EU Right to Repair Directive](wiki:Right_to_repair) (Directive (EU) 2024/1799) is set to be fully enforceable across all member states by **July 31, 2026**. 
    *   **Digital Product Passports:** Starting July 19, 2026, the EU will launch the **Digital Product Passport (DPP)** registry. This will require products (starting with batteries and textiles) to carry a QR code that provides data on durability and repairability.
    *   **Legal Warnings:** On June 4, 2026, the European Commission issued formal warnings to **20 member states** that missed the March 2026 deadline to transpose the "Green Transition" directive into national law. This directive is crucial for preventing [greenwashing](wiki:Greenwashing) and "premature [obsolescence](wiki:Obsolescence)."
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Recent Developments in the United States
    
    In the US, the movement remains focused on the state level, as federal legislation remains stalled in [Congress](wiki:United_States_Congress).
    
    *   **State-Level Expansion:** As of mid-2026, over **one-quarter of Americans** live in states with enforceable Right to Repair laws. This is expected to jump to **35% by fall 2026** as new laws in **Texas** and **Connecticut** take full effect.
    *   **Corporate Lobbying:** Advocacy groups like the [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) have reported continued lobbying efforts from companies like [Google](wiki:Google) and [Apple](wiki:Apple_Inc.) against "parts pairing" restrictions—a practice where software locks replacement parts to a specific device.
    
    ### What Experts are Saying
    
    Legal and technical experts are offering a mix of optimism and caution regarding these new laws:
    
    1.  **The "Tech Liberation" Debate:** While EU officials have hailed June 3, 2026, as "Tech Liberation Day," experts from the *Computer & Communications Industry Association* argue that true independence from [Big Tech](wiki:Big_Tech) will take decades, noting that Europe still lacks a rival to [Nvidia](wiki:Nvidia) or [TSMC](wiki:TSMC).
    2.  **Loopholes and Parts Pairing:** Experts at *Cybernews* and *Earth911* warn that while the laws mandate the *right* to repair, manufacturers still "hold the cards" through the high cost of original parts and [software locks](wiki:Digital_rights_management) (parts pairing). They argue that without stricter price controls on spare parts, repair may remain more expensive than replacement.
    3.  **Warranty Incentives:** Legal analysts from *Fieldfisher* highlight a "hidden gem" in the EU law: if a consumer chooses repair over replacement during the warranty period, the **warranty is extended by 12 months**. This is viewed as a major incentive to shift consumer behavior away from a "throwaway culture."
    
    > [Manufacturers will be obliged to repair in scope products, even if those products were purchased by consumers before 31 July 2026.](embed:fieldfisher.com-e9q)
    
