    I juni 2026 har rörelsen för "rätten att reparera" nått en kritisk genomförandefas i både [Europeiska unionen](wiki:European_Union) och [USA](wiki:United_States). Medan EU rör sig mot ett enhetligt kontinentalt mandat fortsätter USA att se ett lapptäcke av segrar på delstatsnivå och intensiva lobbystrider.
    
    ### Senaste utvecklingen i Europeiska unionen
    
    Den viktigaste aktuella händelsen är EU:s presentation av sitt **paket för "teknisk suveränitet"** den 3 juni 2026. Initiativet syftar till att minska beroendet av amerikanska Big Tech genom att främja inhemska alternativ och stärka konsumenträttigheter.
    
    *   **Nedräkning till genomförande:** Det banbrytande [EU-direktivet om rätten att reparera](wiki:Right_to_repair) (direktiv (EU) 2024/1799) ska vara fullt verkställbart i alla medlemsstater senast **31 juli 2026**.
    *   **Digitala produktpass:** Från och med den 19 juli 2026 lanserar EU registret för **digitala produktpass (DPP)**. Det innebär att produkter (med start för batterier och textilier) måste bära en QR-kod med data om hållbarhet och reparerbarhet.
    *   **Juridiska varningar:** Den 4 juni 2026 utfärdade Europeiska kommissionen formella varningar till **20 medlemsstater** som missade tidsfristen i mars 2026 för att införliva direktivet om "grön omställning" i nationell rätt. Direktivet är avgörande för att förhindra [greenwashing](wiki:Greenwashing) och "förtida [föråldring](wiki:Obsolescence)".
    
    [!](embed:euronewsweek.co.uk-aq1)
