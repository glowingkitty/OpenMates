    По состоянию на июнь 2026 года движение за «право на ремонт» перешло в критическую фазу реализации как в [Европейском союзе](wiki:European_Union), так и в [Соединенных Штатах](wiki:United_States). В то время как ЕС движется к единому континентальному мандату, в США по-прежнему наблюдается мозаика побед на уровне штатов и интенсивные лоббистские баталии.
    
    ### Последние события в Европейском союзе
    
    Самым значимым недавним событием стало обнародование ЕС 3 июня 2026 года **пакета мер по «технологическому суверенитету»**. Эта инициатива направлена на снижение зависимости от американских бигтехов путем поддержки местных альтернатив и укрепления прав потребителей.
    
    *   **Обратный отсчет до внедрения:** Знаковая [Директива ЕС о праве на ремонт](wiki:Right_to_repair) (Директива (ЕС) 2024/1799) должна стать полностью обязательной к исполнению во всех государствах-членах к **31 июля 2026 года**.
    *   **Цифровые паспорта продукции:** С 19 июля 2026 года ЕС запустит реестр **цифровых паспортов продукции (DPP)**. Это потребует, чтобы товары (начиная с аккумуляторов и текстиля) имели QR-код с данными о долговечности и ремонтопригодности.
    *   **Юридические предупреждения:** 4 июня 2026 года Европейская комиссия вынесла официальные предупреждения **20 государствам-членам**, которые пропустили крайний срок (март 2026 года) для переноса директивы о «зеленом переходе» в национальное законодательство. Эта директива имеет решающее значение для предотвращения [гринвошинга](wiki:Greenwashing) и «преждевременного [устаревания](wiki:Obsolescence)».
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Последние события в Соединенных Штатах
    
    В США движение по-прежнему сосредоточено на уровне штатов, поскольку федеральное законодательство в [Конгрессе](wiki:United_States_Congress) остается в тупике.
    
    *   **Расширение на уровне штатов:** По состоянию на середину 2026 года более **четверти американцев** живут в штатах, где действуют законы о праве на ремонт. Ожидается, что к **осени 2026 года** эта цифра вырастет до **35%**, когда вступят в полную силу новые законы в **Техасе** и **Коннектикуте**.
    *   **Корпоративное лоббирование:** Группы по защите интересов, такие как [Группа по исследованию общественных интересов (PIRG)](wiki:Public_Interest_Research_Group), сообщают о продолжающихся лоббистских усилиях таких компаний, как [Google](wiki:Google) и [Apple](wiki:Apple_Inc.), против ограничений на «сопряжение деталей» (parts pairing) — практики, при которой программное обеспечение привязывает запасные части к конкретному устройству.
    
    ### Что говорят эксперты
    
    Юридические и технические эксперты выражают смесь оптимизма и осторожности в отношении этих новых законов:
    
    1.  **Дискуссия о «технологическом освобождении»:** Хотя официальные лица ЕС провозгласили 3 июня 2026 года «Днем технологического освобождения», эксперты из *Ассоциации компьютерной и коммуникационной индустрии* утверждают, что для достижения истинной независимости от [бигтехов](wiki:Big_Tech) потребуются десятилетия, отмечая, что в Европе все еще нет конкурента [Nvidia](wiki:Nvidia) или [TSMC](wiki:TSMC).
    2.  **Лазейки и сопряжение деталей:** Эксперты из *Cybernews* и *Earth911* предупреждают, что хотя законы закрепляют *право* на ремонт, производители по-прежнему «держат все карты в руках» из-за высокой стоимости оригинальных запчастей и [программных блокировок](wiki:Digital_rights_management) (сопряжение деталей). Они утверждают, что без более строгого контроля цен на запчасти ремонт может оставаться дороже замены.
    3.  **Гарантийные стимулы:** Юристы-аналитики из *Fieldfisher* выделяют «скрытую жемчужину» в законе ЕС: если потребитель выбирает ремонт вместо замены в течение гарантийного срока, **гарантия продлевается на 12 месяцев**. Это рассматривается как важный стимул для изменения поведения потребителей и отказа от «культуры одноразовых вещей».
    
    > [Производители будут обязаны ремонтировать товары, подпадающие под действие закона, даже если эти товары были приобретены потребителями до 31 июля 2026 года.](embed:fieldfisher.com-e9q)
    
