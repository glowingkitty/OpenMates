    Tính đến tháng 6 năm 2026, phong trào "Quyền được sửa chữa" đã bước vào giai đoạn thực thi quan trọng ở cả [Liên minh Châu Âu](wiki:European_Union) và [Hoa Kỳ](wiki:United_States). Trong khi EU đang hướng tới một quy định thống nhất trên toàn châu lục, Hoa Kỳ tiếp tục chứng kiến sự chắp vá của các chiến thắng ở cấp tiểu bang và các cuộc chiến vận động hành lang gay gắt.
    
    ### Những diễn biến gần đây tại Liên minh Châu Âu
    
    Sự kiện gần đây quan trọng nhất là việc EU công bố **gói "Chủ quyền Công nghệ"** vào ngày 3 tháng 6 năm 2026. Sáng kiến này nhằm giảm bớt sự phụ thuộc vào các Big Tech của Hoa Kỳ bằng cách thúc đẩy các giải pháp thay thế nội địa và tăng cường quyền lợi của người tiêu dùng.
    
    *   **Đếm ngược thời gian thực thi:** [Chỉ thị về Quyền được sửa chữa của EU](wiki:Right_to_repair) mang tính bước ngoặt (Chỉ thị (EU) 2024/1799) dự kiến sẽ có hiệu lực đầy đủ tại tất cả các quốc gia thành viên trước ngày **31 tháng 7 năm 2026**. 
    *   **Hộ chiếu Sản phẩm Kỹ thuật số:** Bắt đầu từ ngày 19 tháng 7 năm 2026, EU sẽ triển khai hệ thống đăng ký **Hộ chiếu Sản phẩm Kỹ thuật số (DPP)**. Hệ thống này yêu cầu các sản phẩm (bắt đầu với pin và dệt may) phải có mã QR cung cấp dữ liệu về độ bền và khả năng sửa chữa.
    *   **Cảnh báo pháp lý:** Vào ngày 4 tháng 6 năm 2026, Ủy ban Châu Âu đã đưa ra cảnh báo chính thức cho **20 quốc gia thành viên** đã bỏ lỡ thời hạn tháng 3 năm 2026 để chuyển đổi chỉ thị "Chuyển đổi Xanh" thành luật quốc gia. Chỉ thị này rất quan trọng để ngăn chặn tình trạng [tẩy xanh](wiki:Greenwashing) và "[lỗi thời](wiki:Obsolescence) sớm".
    
