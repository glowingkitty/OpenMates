    ### التطورات الأخيرة في الولايات المتحدة
    
    في الولايات المتحدة، تظل الحركة مركزة على مستوى الولايات، حيث لا يزال التشريع الفيدرالي متعثراً في [الكونغرس](wiki:United_States_Congress).
    
    *   **التوسع على مستوى الولايات:** اعتباراً من منتصف عام 2026، يعيش أكثر من **ربع الأمريكيين** في ولايات تطبق قوانين "الحق في الإصلاح". ومن المتوقع أن ترتفع هذه النسبة إلى **35% بحلول خريف 2026** مع دخول القوانين الجديدة في **تكساس** و**كونيتيكت** حيز التنفيذ الكامل.
    *   **ضغط الشركات:** أفادت مجموعات الدفاع مثل [مجموعة أبحاث المصلحة العامة (PIRG)](wiki:Public_Interest_Research_Group) باستمرار جهود الضغط من شركات مثل [جوجل](wiki:Google) و[أبل](wiki:Apple_Inc.) ضد قيود "ربط القطع"—وهي ممارسة حيث تقفل البرمجيات قطع الغيار بجهاز معين.
    
    ### ماذا يقول الخبراء
    
    يقدم الخبراء القانونيون والتقنيون مزيجاً من التفاؤل والحذر بشأن هذه القوانين الجديدة:
    
    1.  **نقاش "التحرر التقني":** بينما أشاد مسؤولو الاتحاد الأوروبي بيوم 3 يونيو 2026 باعتباره "يوم التحرر التقني"، يرى خبراء من *جمعية صناعة الكمبيوتر والاتصالات* أن الاستقلال الحقيقي عن [شركات التقنية الكبرى](wiki:Big_Tech) سيستغرق عقوداً، مشيرين إلى أن أوروبا لا تزال تفتقر إلى منافس لشركة [إنفيديا](wiki:Nvidia) أو [TSMC](wiki:TSMC).
    2.  **الثغرات وربط القطع:** يحذر خبراء في *Cybernews* و*Earth911* من أنه بينما تفرض القوانين *الحق* في الإصلاح، لا تزال الشركات المصنعة "تمسك بزمام الأمور" من خلال التكلفة العالية للقطع الأصلية و[الأقفال البرمجية](wiki:Digital_rights_management) (ربط القطع). ويجادلون بأنه بدون ضوابط أكثر صرامة على أسعار قطع الغيار، قد يظل الإصلاح أغلى من الاستبدال.
    3.  **حوافز الضمان:** يسلط المحللون القانونيون من *Fieldfisher* الضوء على "جوهرة مخفية" في قانون الاتحاد الأوروبي: إذا اختار المستهلك الإصلاح بدلاً من الاستبدال خلال فترة الضمان، **يتم تمديد الضمان لمدة 12 شهراً**. يُنظر إلى هذا كحافز رئيسي لتغيير سلوك المستهلك بعيداً عن "ثقافة الهدر".
    
    > [سيكون المصنعون ملزمين بإصلاح المنتجات المشمولة، حتى لو تم شراؤها من قبل المستهلكين قبل 31 يوليو 2026.](embed:fieldfisher.com-e9q)
    
