    [!](embed:ecomondo.com-9xC)
    
    ### Senaste utvecklingen i USA
    
    I USA ligger rörelsens fokus fortfarande på delstatsnivå, eftersom federal lagstiftning fortsatt är blockerad i [kongressen](wiki:United_States_Congress).
    
    *   **Expansion på delstatsnivå:** I mitten av 2026 bor mer än **en fjärdedel av amerikanerna** i delstater med verkställbara lagar om rätten att reparera. Den siffran väntas öka till **35% till hösten 2026** när nya lagar i **Texas** och **Connecticut** får full verkan.
    *   **Företagslobbying:** Intresseorganisationer som [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) har rapporterat fortsatta lobbyinsatser från företag som [Google](wiki:Google) och [Apple](wiki:Apple_Inc.) mot begränsningar av "parts pairing", en praxis där programvara låser reservdelar till en specifik enhet.
    
    ### Vad experterna säger
    
    Juridiska och tekniska experter uttrycker en blandning av optimism och försiktighet kring de nya lagarna:
    
    1.  **Debatten om "teknisk befrielse":** Medan EU-tjänstemän har hyllat den 3 juni 2026 som "Tech Liberation Day" menar experter från *Computer & Communications Industry Association* att verkligt oberoende från [Big Tech](wiki:Big_Tech) kommer att ta årtionden, och påpekar att Europa fortfarande saknar en rival till [Nvidia](wiki:Nvidia) eller [TSMC](wiki:TSMC).
    2.  **Kryphål och parts pairing:** Experter på *Cybernews* och *Earth911* varnar för att även om lagarna kräver *rätten* att reparera har tillverkarna fortfarande "korten på handen" genom höga priser på originaldelar och [programvarulås](wiki:Digital_rights_management) (parts pairing). De menar att reparation utan striktare priskontroller på reservdelar kan förbli dyrare än ersättning.
    3.  **Garantiincitament:** Juridiska analytiker på *Fieldfisher* lyfter fram en "dold pärla" i EU-lagen: om en konsument väljer reparation framför ersättning under garantitiden förlängs **garantin med 12 månader**. Det ses som ett viktigt incitament för att styra konsumentbeteende bort från en "slit och släng-kultur".
    
    > [Tillverkare kommer att vara skyldiga att reparera produkter som omfattas, även om dessa produkter köptes av konsumenter före den 31 juli 2026.](embed:fieldfisher.com-e9q)
    
