    ### Amerika Birleşik Devletleri'ndeki Son Gelişmeler
    
    ABD'de hareket eyalet düzeyinde odaklanmaya devam ediyor, zira federal mevzuat [Kongre](wiki:United_States_Congress)'de duraksamış durumda.
    
    *   **Eyalet Düzeyinde Genişleme:** 2026 ortası itibarıyla, **Amerikalıların dörtte birinden fazlası** uygulanabilir Onarım Hakkı yasalarına sahip eyaletlerde yaşıyor. **Teksas** ve **Connecticut**'taki yeni yasaların tam olarak yürürlüğe girmesiyle bu oranın **2026 sonbaharına kadar %35'e** çıkması bekleniyor.
    *   **Kurumsal Lobicilik:** [Kamu Yararı Araştırma Grubu (PIRG)](wiki:Public_Interest_Research_Group) gibi savunucu gruplar, [Google](wiki:Google) ve [Apple](wiki:Apple_Inc.) gibi şirketlerin, yazılımın yedek parçaları belirli bir cihaza kilitlediği bir uygulama olan "parça eşleştirme" kısıtlamalarına karşı lobi faaliyetlerini sürdürdüğünü bildirdi.
    
    ### Uzmanlar Ne Diyor?
    
    Hukuk ve teknik uzmanlar bu yeni yasalarla ilgili iyimserlik ve temkinli bir yaklaşım sergiliyor:
    
    1.  **"Teknoloji Özgürleşmesi" Tartışması:** AB yetkilileri 3 Haziran 2026'yı "Teknoloji Özgürleşme Günü" olarak selamlasa da, *Bilgisayar ve İletişim Endüstrisi Birliği* uzmanları, Avrupa'nın hala [Nvidia](wiki:Nvidia) veya [TSMC](wiki:TSMC)'ye rakip bir kuruluşu olmadığını belirterek, [Büyük Teknoloji](wiki:Big_Tech) şirketlerinden gerçek bağımsızlığın on yıllar alacağını savunuyor.
    2.  **Boşluklar ve Parça Eşleştirme:** *Cybernews* ve *Earth911* uzmanları, yasalar onarım *hakkını* zorunlu kılsa da, üreticilerin orijinal parçaların yüksek maliyeti ve [yazılım kilitleri](wiki:Digital_rights_management) (parça eşleştirme) yoluyla hala "ipleri elinde tuttuğu" konusunda uyarıyor. Yedek parçalar üzerinde daha sıkı fiyat kontrolleri olmazsa, onarımın yenisiyle değiştirmekten daha pahalı kalabileceğini savunuyorlar.
    3.  **Garanti Teşvikleri:** *Fieldfisher* hukuk analistleri, AB yasasındaki "gizli bir cevhere" dikkat çekiyor: Bir tüketici garanti süresi içinde değişim yerine onarımı seçerse, **garanti 12 ay uzatılıyor**. Bu, tüketici davranışını "kullan-at kültürü"nden uzaklaştırmak için büyük bir teşvik olarak görülüyor.
    
    > [Üreticiler, kapsam dahilindeki ürünleri, bu ürünler tüketiciler tarafından 31 Temmuz 2026'dan önce satın alınmış olsa dahi onarmakla yükümlü olacaklardır.](embed:fieldfisher.com-e9q)
    
