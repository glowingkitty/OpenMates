    נכון ליוני 2026, תנועת "הזכות לתיקון" הגיעה לשלב יישום קריטי הן ב[איחוד האירופי](wiki:European_Union) והן ב[ארצות הברית](wiki:United_States). בעוד שהאיחוד האירופי מתקדם לעבר מנדט יבשתי מאוחד, ארצות הברית ממשיכה לראות אוסף של ניצחונות ברמת המדינות לצד מאבקי לוביזם אינטנסיביים.
    
    ### התפתחויות אחרונות באיחוד האירופי
    
    האירוע המשמעותי ביותר לאחרונה הוא חשיפת **חבילת "הריבונות הטכנולוגית"** של האיחוד האירופי ב-3 ביוני 2026. יוזמה זו נועדה לצמצם את התלות בענקיות הטכנולוגיה האמריקאיות על ידי עידוד חלופות מקומיות וחיזוק זכויות הצרכן.
    
    *   **ספירה לאחור ליישום:** [הנחיית הזכות לתיקון של האיחוד האירופי](wiki:Right_to_repair) (Directive (EU) 2024/1799) אמורה להיכנס לתוקף מלא בכל המדינות החברות עד ל-**31 ביולי 2026**. 
    *   **דרכוני מוצר דיגיטליים:** החל מה-19 ביולי 2026, האיחוד האירופי ישיק את רישום **דרכון המוצר הדיגיטלי (DPP)**. הדבר יחייב מוצרים (החל מסוללות וטקסטיל) לשאת קוד QR המספק נתונים על עמידות ואפשרות לתיקון.
    *   **אזהרות משפטיות:** ב-4 ביוני 2026, הנציבות האירופית הוציאה אזהרות רשמיות ל-**20 מדינות חברות** שפספסו את המועד האחרון של מרץ 2026 להטמעת הנחיית "המעבר הירוק" בחוק הלאומי. הנחיה זו חיונית למניעת [גרינוושינג](wiki:Greenwashing) ו"התיישנות מוקדמת" ([obsolescence](wiki:Obsolescence)).
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### התפתחויות אחרונות בארצות הברית
    
    בארצות הברית, התנועה נותרת ממוקדת ברמת המדינות, שכן החקיקה הפדרלית נותרה תקועה ב[קונגרס](wiki:United_States_Congress).
    
    *   **התרחבות ברמת המדינות:** נכון לאמצע 2026, למעלה מ-**רבע מהאמריקאים** חיים במדינות עם חוקי "זכות לתיקון" אכיפים. נתון זה צפוי לזנק ל-**35% עד סתיו 2026** כאשר חוקים חדשים ב**טקסס** וב**קונטיקט** ייכנסו לתוקף מלא.
    *   **לוביזם תאגידי:** קבוצות תמיכה כמו [הקבוצה למחקר האינטרס הציבורי (PIRG)](wiki:Public_Interest_Research_Group) דיווחו על מאמצי לוביזם מתמשכים מצד חברות כמו [גוגל](wiki:Google) ו[אפל](wiki:Apple_Inc.) נגד הגבלות על "צימוד חלקים" (parts pairing) – פרקטיקה שבה תוכנה נועלת חלקי חילוף למכשיר ספציפי.
    
    ### מה אומרים המומחים
    
    מומחים משפטיים וטכניים מציעים שילוב של אופטימיות וזהירות בנוגע לחוקים החדשים הללו:
    
    1.  **דיון "השחרור הטכנולוגי":** בעוד שגורמים רשמיים באיחוד האירופי הכריזו על ה-3 ביוני 2026 כ"יום השחרור הטכנולוגי", מומחים מ*איגוד תעשיית המחשבים והתקשורת* טוענים כי עצמאות אמיתית מ[ענקיות הטכנולוגיה](wiki:Big_Tech) תיקח עשורים, וציינו כי לאירופה עדיין חסרה מתחרה ל-[Nvidia](wiki:Nvidia) או ל-[TSMC](wiki:TSMC).
    2.  **פרצות וצימוד חלקים:** מומחים ב-*Cybernews* וב-*Earth911* מזהירים כי בעוד שהחוקים מחייבים את ה*זכות* לתקן, היצרנים עדיין "מחזיקים בקלפים" באמצעות העלות הגבוהה של חלקים מקוריים ו[נעילות תוכנה](wiki:Digital_rights_management) (צימוד חלקים). הם טוענים כי ללא פיקוח הדוק יותר על מחירי חלקי החילוף, התיקון עשוי להישאר יקר יותר מהחלפה.
    3.  **תמריצי אחריות:** אנליסטים משפטיים מ-*Fieldfisher* מדגישים "פנינה נסתרת" בחוק האירופי: אם צרכן בוחר בתיקון על פני החלפה במהלך תקופת האחריות, **האחריות מוארכת ב-12 חודשים**. הדבר נתפס כתמריץ מרכזי לשינוי התנהגות הצרכנים והתרחקות מתרבות ה"השתמש וזרוק".
    
    > [יצרנים יהיו מחויבים לתקן מוצרים הכלולים בהנחיה, גם אם מוצרים אלו נרכשו על ידי צרכנים לפני 31 ביולי 2026.](embed:fieldfisher.com-e9q)
    
