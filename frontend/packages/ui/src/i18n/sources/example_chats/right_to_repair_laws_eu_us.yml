    Stand Juni 2026 hat die „Recht auf Reparatur“-Bewegung sowohl in der [Europäischen Union](wiki:European_Union) als auch in den [Vereinigten Staaten](wiki:United_States) eine kritische Umsetzungsphase erreicht. Während die EU sich auf ein einheitliches kontinentales Mandat zubewegt, gibt es in den USA weiterhin ein Mosaik aus Siegen auf Bundesstaatsebene und intensiven Lobbykämpfen.
    
    ### Aktuelle Entwicklungen in der Europäischen Union
    
    Das bedeutendste Ereignis der letzten Zeit ist die Vorstellung des **„Tech-Souveränitäts-Pakets“** der EU am 3. Juni 2026. Diese Initiative zielt darauf ab, die Abhängigkeit von US-Big-Tech zu verringern, indem heimische Alternativen gefördert und Verbraucherrechte gestärkt werden.
    
    *   **Countdown zur Umsetzung:** Die wegweisende [EU-Richtlinie zum Recht auf Reparatur](wiki:Right_to_repair) (Richtlinie (EU) 2024/1799) soll bis zum **31. Juli 2026** in allen Mitgliedstaaten vollständig durchsetzbar sein.
    *   **Digitale Produktpässe:** Ab dem 19. Juli 2026 wird die EU das Register für den **Digitalen Produktpass (DPP)** einführen. Dies erfordert, dass Produkte (beginnend mit Batterien und Textilien) einen QR-Code tragen, der Daten zur Haltbarkeit und Reparierbarkeit liefert.
    *   **Rechtliche Verwarnungen:** Am 4. Juni 2026 sprach die Europäische Kommission formelle Verwarnungen gegen **20 Mitgliedstaaten** aus, die die Frist im März 2026 zur Umsetzung der Richtlinie zum „grünen Wandel“ in nationales Recht versäumt hatten. Diese Richtlinie ist entscheidend, um [Greenwashing](wiki:Greenwashing) und „vorzeitige [Obsoleszenz](wiki:Obsolescence)“ zu verhindern.
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Aktuelle Entwicklungen in den Vereinigten Staaten
    
    In den USA konzentriert sich die Bewegung weiterhin auf die Ebene der Bundesstaaten, da die Bundesgesetzgebung im [Kongress](wiki:United_States_Congress) feststeckt.
    
    *   **Ausweitung auf Bundesstaatsebene:** Seit Mitte 2026 lebt über **ein Viertel der Amerikaner** in Bundesstaaten mit durchsetzbaren „Right to Repair“-Gesetzen. Es wird erwartet, dass dieser Anteil bis **Herbst 2026 auf 35 %** ansteigt, wenn neue Gesetze in **Texas** und **Connecticut** voll in Kraft treten.
    *   **Lobbyarbeit von Unternehmen:** Interessengruppen wie die [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) berichten von anhaltenden Lobbybemühungen von Unternehmen wie [Google](wiki:Google) und [Apple](wiki:Apple_Inc.) gegen Beschränkungen beim „Parts Pairing“ – einer Praxis, bei der Software Ersatzteile an ein bestimmtes Gerät koppelt.
    
    ### Was Experten sagen
    
    Rechts- und Technikexperten äußern sich mit einer Mischung aus Optimismus und Vorsicht zu diesen neuen Gesetzen:
    
    1.  **Die Debatte über die „Tech-Befreiung“:** Während EU-Beamte den 3. Juni 2026 als „Tag der Tech-Befreiung“ feierten, argumentieren Experten der *Computer & Communications Industry Association*, dass eine echte Unabhängigkeit von [Big Tech](wiki:Big_Tech) Jahrzehnte dauern wird, und weisen darauf hin, dass Europa immer noch ein Pendant zu [Nvidia](wiki:Nvidia) oder [TSMC](wiki:TSMC) fehlt.
    2.  **Schlupflöcher und Parts Pairing:** Experten von *Cybernews* und *Earth911* warnen, dass die Hersteller trotz der gesetzlich verankerten *Rechte* auf Reparatur durch hohe Kosten für Originalteile und [Softwaresperren](wiki:Digital_rights_management) (Parts Pairing) weiterhin „am längeren Hebel sitzen“. Sie argumentieren, dass Reparaturen ohne strengere Preiskontrollen für Ersatzteile teurer bleiben könnten als ein Neukauf.
    3.  **Garantieanreize:** Rechtsanalysten von *Fieldfisher* heben einen „versteckten Schatz“ im EU-Recht hervor: Wenn sich ein Verbraucher während der Garantiezeit für eine Reparatur statt für einen Ersatz entscheidet, wird die **Garantie um 12 Monate verlängert**. Dies wird als wichtiger Anreiz gesehen, das Verbraucherverhalten weg von einer „Wegwerfkultur“ zu lenken.
    
    > [Hersteller sind verpflichtet, Produkte im Anwendungsbereich zu reparieren, auch wenn diese Produkte vor dem 31. Juli 2026 von Verbrauchern gekauft wurden.](embed:fieldfisher.com-e9q)
    
