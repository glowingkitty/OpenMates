    A giugno 2026, il movimento per il "Diritto alla riparazione" ha raggiunto una fase di attuazione critica sia nell'[Unione Europea](wiki:European_Union) che negli [Stati Uniti](wiki:United_States). Mentre l'UE si sta muovendo verso un mandato continentale unificato, gli Stati Uniti continuano a vedere un mosaico di vittorie a livello statale e intense battaglie di lobbying.
    
    ### Sviluppi recenti nell'Unione Europea
    
    L'evento recente più significativo è la presentazione da parte dell'UE del suo **pacchetto "Sovranità tecnologica"** il 3 giugno 2026. Questa iniziativa mira a ridurre la dipendenza dalle Big Tech statunitensi promuovendo alternative locali e rafforzando i diritti dei consumatori.
    
    *   **Conto alla rovescia per l'attuazione:** La storica [Direttiva UE sul diritto alla riparazione](wiki:Right_to_repair) (Direttiva (UE) 2024/1799) diventerà pienamente esecutiva in tutti gli Stati membri entro il **31 luglio 2026**. 
    *   **Passaporti digitali dei prodotti:** A partire dal 19 luglio 2026, l'UE lancerà il registro del **Passaporto digitale dei prodotti (DPP)**. Questo richiederà che i prodotti (iniziando da batterie e tessili) abbiano un codice QR che fornisca dati sulla durata e sulla riparabilità.
    *   **Avvertimenti legali:** Il 4 giugno 2026, la Commissione Europea ha emesso avvertimenti formali a **20 Stati membri** che hanno mancato la scadenza di marzo 2026 per recepire la direttiva sulla "Transizione verde" nel diritto nazionale. Questa direttiva è fondamentale per prevenire il [greenwashing](wiki:Greenwashing) e l'"[obsolescenza](wiki:Obsolescence) prematura".
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Sviluppi recenti negli Stati Uniti
    
    Negli Stati Uniti, il movimento rimane concentrato a livello statale, poiché la legislazione federale resta bloccata al [Congresso](wiki:United_States_Congress).
    
    *   **Espansione a livello statale:** A metà del 2026, oltre **un quarto degli americani** vive in stati con leggi sul diritto alla riparazione applicabili. Si prevede che questa cifra salirà al **35% entro l'autunno 2026**, quando le nuove leggi in **Texas** e **Connecticut** entreranno pienamente in vigore.
    *   **Lobbying aziendale:** Gruppi di difesa come il [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) hanno segnalato continui sforzi di lobbying da parte di aziende come [Google](wiki:Google) e [Apple](wiki:Apple_Inc.) contro le restrizioni al "parts pairing" (abbinamento dei componenti), una pratica in cui il software blocca le parti di ricambio a un dispositivo specifico.
    
    ### Cosa dicono gli esperti
    
    Gli esperti legali e tecnici offrono un mix di ottimismo e cautela riguardo a queste nuove leggi:
    
    1.  **Il dibattito sulla "Liberazione tecnologica":** Mentre i funzionari dell'UE hanno salutato il 3 giugno 2026 come il "Giorno della liberazione tecnologica", gli esperti della *Computer & Communications Industry Association* sostengono che la vera indipendenza dalle [Big Tech](wiki:Big_Tech) richiederà decenni, notando che l'Europa manca ancora di un rivale per [Nvidia](wiki:Nvidia) o [TSMC](wiki:TSMC).
    2.  **Scappatoie e abbinamento dei componenti:** Gli esperti di *Cybernews* ed *Earth911* avvertono che, sebbene le leggi impongano il *diritto* alla riparazione, i produttori hanno ancora "il coltello dalla parte del manico" a causa dell'alto costo dei componenti originali e dei [blocchi software](wiki:Digital_rights_management) (parts pairing). Sostengono che senza controlli più severi sui prezzi dei pezzi di ricambio, la riparazione potrebbe rimanere più costosa della sostituzione.
    3.  **Incentivi sulla garanzia:** Gli analisti legali di *Fieldfisher* evidenziano una "perla nascosta" nella legge UE: se un consumatore sceglie la riparazione invece della sostituzione durante il periodo di garanzia, la **garanzia viene estesa di 12 mesi**. Questo è visto come un importante incentivo per allontanare il comportamento dei consumatori dalla "cultura dell'usa e getta".
    
    > [I produttori saranno obbligati a riparare i prodotti che rientrano nell'ambito di applicazione, anche se tali prodotti sono stati acquistati dai consumatori prima del 31 luglio 2026.](embed:fieldfisher.com-e9q)
    
