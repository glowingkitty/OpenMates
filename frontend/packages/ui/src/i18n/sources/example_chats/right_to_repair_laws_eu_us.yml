    Em junho de 2026, o movimento pelo "Direito ao Reparo" atingiu uma fase crítica de implementação tanto na [União Europeia](wiki:European_Union) quanto nos [Estados Unidos](wiki:United_States). Enquanto a UE avança em direção a um mandato continental unificado, os EUA continuam a ver um mosaico de vitórias a nível estadual e intensas batalhas de lobby.
    
    ### Desenvolvimentos Recentes na União Europeia
    
    O evento recente mais significativo é a apresentação do **pacote de "Soberania Tecnológica"** da UE em 3 de junho de 2026. Esta iniciativa visa reduzir a dependência das Big Tech dos EUA, promovendo alternativas locais e fortalecendo os direitos dos consumidores.
    
    *   **Contagem Decrescente para a Implementação:** A histórica [Diretiva da UE sobre o Direito ao Reparo](wiki:Right_to_repair) (Diretiva (UE) 2024/1799) deverá ser totalmente aplicável em todos os Estados-Membros até **31 de julho de 2026**. 
    *   **Passaportes Digitais de Produtos:** A partir de 19 de julho de 2026, a UE lançará o registo do **Passaporte Digital de Produto (DPP)**. Isto exigirá que os produtos (começando por baterias e têxteis) ostentem um código QR que forneça dados sobre durabilidade e reparabilidade.
    *   **Avisos Legais:** Em 4 de junho de 2026, a Comissão Europeia emitiu avisos formais a **20 Estados-Membros** que falharam o prazo de março de 2026 para transpor a diretiva da "Transição Verde" para a legislação nacional. Esta diretiva é crucial para prevenir o [greenwashing](wiki:Greenwashing) e a "[obsolescência](wiki:Obsolescence) prematura".
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Desenvolvimentos Recentes nos Estados Unidos
    
    Nos EUA, o movimento continua focado no nível estadual, uma vez que a legislação federal permanece estagnada no [Congresso](wiki:United_States_Congress).
    
    *   **Expansão a Nível Estadual:** Em meados de 2026, mais de **um quarto dos americanos** vive em estados com leis de Direito ao Reparo aplicáveis. Espera-se que este número salte para **35% até ao outono de 2026**, à medida que novas leis no **Texas** e no **Connecticut** entrem em pleno vigor.
    *   **Lobbying Corporativo:** Grupos de defesa como o [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) relataram esforços contínuos de lobby de empresas como a [Google](wiki:Google) e a [Apple](wiki:Apple_Inc.) contra restrições de "emparelhamento de peças" — uma prática em que o software bloqueia peças de substituição a um dispositivo específico.
    
    ### O que dizem os Especialistas
    
    Especialistas jurídicos e técnicos oferecem uma mistura de otimismo e cautela em relação a estas novas leis:
    
    1.  **O Debate da "Libertação Tecnológica":** Embora os funcionários da UE tenham saudado o dia 3 de junho de 2026 como o "Dia da Libertação Tecnológica", especialistas da *Computer & Communications Industry Association* argumentam que a verdadeira independência das [Big Tech](wiki:Big_Tech) levará décadas, observando que a Europa ainda carece de um rival para a [Nvidia](wiki:Nvidia) ou a [TSMC](wiki:TSMC).
    2.  **Lacunas e Emparelhamento de Peças:** Especialistas da *Cybernews* e *Earth911* alertam que, embora as leis exijam o *direito* ao reparo, os fabricantes ainda "têm as cartas na mão" através do elevado custo das peças originais e dos [bloqueios de software](wiki:Digital_rights_management) (emparelhamento de peças). Argumentam que, sem controlos de preços mais rigorosos nas peças sobressalentes, a reparação pode continuar a ser mais cara do que a substituição.
    3.  **Incentivos de Garantia:** Analistas jurídicos da *Fieldfisher* destacam uma "joia escondida" na lei da UE: se um consumidor optar pela reparação em vez da substituição durante o período de garantia, a **garantia é alargada por 12 meses**. Isto é visto como um grande incentivo para mudar o comportamento do consumidor, afastando-o de uma "cultura do descartável".
    
    > [Manufacturers will be obliged to repair in scope products, even if those products were purchased by consumers before 31 July 2026.](embed:fieldfisher.com-e9q)
    
