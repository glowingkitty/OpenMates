    Według stanu na czerwiec 2026 r. ruch „Prawo do naprawy” (Right to Repair) wszedł w krytyczną fazę wdrażania zarówno w [Unii Europejskiej](wiki:European_Union), jak i w [Stanach Zjednoczonych](wiki:United_States). Podczas gdy UE zmierza w stronę ujednoliconego mandatu kontynentalnego, w USA nadal obserwujemy mozaikę zwycięstw na szczeblu stanowym i intensywne bitwy lobbingowe.
    
    ### Najnowsze wydarzenia w Unii Europejskiej
    
    Najważniejszym niedawnym wydarzeniem jest zaprezentowanie przez UE **pakietu „Suwerenność Technologiczna”** w dniu 3 czerwca 2026 r. Inicjatywa ta ma na celu zmniejszenie zależności od amerykańskich gigantów technologicznych (Big Tech) poprzez wspieranie rodzimych alternatyw i wzmacnianie praw konsumentów.
    
    *   **Odliczanie do wdrożenia:** Przełomowa [dyrektywa UE w sprawie prawa do naprawy](wiki:Right_to_repair) (Dyrektywa (UE) 2024/1799) ma stać się w pełni egzekwowalna we wszystkich państwach członkowskich do **31 lipca 2026 r.** 
    *   **Cyfrowe Paszporty Produktów:** Od 19 lipca 2026 r. UE uruchomi rejestr **Cyfrowych Paszportów Produktów (DPP)**. Będzie on wymagał, aby produkty (zaczynając od baterii i tekstyliń) posiadały kod QR dostarczający danych na temat trwałości i możliwości naprawy.
    *   **Ostrzeżenia prawne:** 4 czerwca 2026 r. Komisja Europejska wystosowała formalne ostrzeżenia do **20 państw członkowskich**, które przekroczyły termin (marzec 2026 r.) na transpozycję dyrektywy w sprawie „zielonej transformacji” do prawa krajowego. Dyrektywa ta ma kluczowe znaczenie dla zapobiegania [greenwashingowi](wiki:Greenwashing) i „przedwczesnemu [postarzaniu produktów](wiki:Obsolescence)”.
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Najnowsze wydarzenia w Stanach Zjednoczonych
    
    W USA ruch pozostaje skoncentrowany na szczeblu stanowym, ponieważ legislacja federalna utknęła w [Kongresie](wiki:United_States_Congress).
    
    *   **Ekspansja na szczeblu stanowym:** Według stanu na połowę 2026 r. ponad **jedna czwarta Amerykanów** mieszka w stanach z egzekwowalnym prawem do naprawy. Oczekuje się, że liczba ta wzrośnie do **35% do jesieni 2026 r.**, gdy w pełni wejdą w życie nowe przepisy w **Teksasie** i **Connecticut**.
    *   **Lobbing korporacyjny:** Grupy wsparcia, takie jak [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group), donoszą o dalszych wysiłkach lobbingowych firm takich jak [Google](wiki:Google) i [Apple](wiki:Apple_Inc.) przeciwko ograniczeniom „parowania części” (parts pairing) – praktyce, w której oprogramowanie blokuje części zamienne do konkretnego urządzenia.
    
    ### Co mówią eksperci
    
    Eksperci prawni i techniczni oferują mieszankę optymizmu i ostrożności w odniesieniu do nowych przepisów:
    
    1.  **Debata o „wyzwoleniu technologicznym”:** Podczas gdy urzędnicy UE okrzyknęli 3 czerwca 2026 r. „Dniem Wyzwolenia Technologicznego”, eksperci z *Computer & Communications Industry Association* twierdzą, że prawdziwa niezależność od [Big Tech](wiki:Big_Tech) zajmie dziesięciolecia, zauważając, że Europie wciąż brakuje rywala dla [Nvidii](wiki:Nvidia) czy [TSMC](wiki:TSMC).
    2.  **Luki prawne i parowanie części:** Eksperci z *Cybernews* i *Earth911* ostrzegają, że choć przepisy nakazują *prawo* do naprawy, producenci nadal „rozdają karty” poprzez wysokie koszty oryginalnych części i [blokady programowe](wiki:Digital_rights_management) (parowanie części). Twierdzą oni, że bez ściślejszej kontroli cen części zamiennych, naprawa może pozostać droższa niż wymiana.
    3.  **Zachęty gwarancyjne:** Analitycy prawni z *Fieldfisher* zwracają uwagę na „ukryty klejnot” w prawie UE: jeśli konsument wybierze naprawę zamiast wymiany w okresie gwarancyjnym, **gwarancja zostaje przedłużona o 12 miesięcy**. Jest to postrzegane jako główna zachęta do zmiany zachowań konsumenckich i odejścia od „kultury wyrzucania”.
    
    > [Producenci będą zobowiązani do naprawy produktów objętych zakresem, nawet jeśli produkty te zostały zakupione przez konsumentów przed 31 lipca 2026 r.](embed:fieldfisher.com-e9q)
    
