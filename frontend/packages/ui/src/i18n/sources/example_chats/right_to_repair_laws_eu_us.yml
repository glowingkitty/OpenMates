    ### 미국의 최근 동향
    
    미국에서는 연방 입법이 [의회](wiki:United_States_Congress)에서 정체됨에 따라 운동의 초점이 주 단위에 머물러 있습니다.
    
    *   **주 단위의 확대:** 2026년 중반 현재, **미국인의 4분의 1 이상**이 수리할 권리 법이 시행되는 주에 거주하고 있습니다. **텍사스**와 **커네티컷**의 새로운 법안이 전면 시행됨에 따라 이 수치는 **2026년 가을까지 35%**로 급증할 것으로 예상됩니다.
    *   **기업 로비:** [공익연구그룹(PIRG)](wiki:Public_Interest_Research_Group)과 같은 옹호 단체들은 소프트웨어를 통해 교체 부품을 특정 기기에 고정하는 관행인 "부품 페어링(parts pairing)" 제한에 반대하는 [구글](wiki:Google) 및 [애플](wiki:Apple_Inc.)과 같은 기업들의 지속적인 로비 활동을 보고했습니다.
    
    ### 전문가 의견
    
    법률 및 기술 전문가들은 이러한 새로운 법안에 대해 낙관론과 신중론이 섞인 의견을 내놓고 있습니다.
    
    1.  **"기술 해방" 논쟁:** EU 관리들은 2026년 6월 3일을 "기술 해방의 날"로 칭송했지만, *컴퓨터 및 통신 산업 협회(CCIA)* 전문가들은 유럽에 여전히 [엔비디아](wiki:Nvidia)나 [TSMC](wiki:TSMC)에 필적할 만한 경쟁자가 없다는 점을 지적하며 [빅테크](wiki:Big_Tech)로부터의 진정한 독립에는 수십 년이 걸릴 것이라고 주장합니다.
    2.  **허점 및 부품 페어링:** *Cybernews* 및 *Earth911*의 전문가들은 법이 수리할 *권리*를 의무화하고 있지만, 제조업체들이 여전히 순정 부품의 높은 가격과 [소프트웨어 잠금](wiki:Digital_rights_management)(부품 페어링)을 통해 "주도권을 쥐고 있다"고 경고합니다. 이들은 예비 부품에 대한 엄격한 가격 통제가 없다면 수리 비용이 교체 비용보다 여전히 더 비쌀 수 있다고 주장합니다.
    3.  **보증 혜택:** *Fieldfisher*의 법률 분석가들은 EU 법의 "숨겨진 보석"을 강조합니다. 소비자가 보증 기간 동안 교체 대신 수리를 선택하면 **보증 기간이 12개월 연장**됩니다. 이는 소비자의 행동을 "일회용 문화"에서 벗어나게 하는 주요 유인책으로 간주됩니다.
    
    > [제조업체는 소비자가 2026년 7월 31일 이전에 구매한 제품이라 하더라도 해당 범위 내의 제품을 수리할 의무가 있습니다.](embed:fieldfisher.com-e9q)
    
