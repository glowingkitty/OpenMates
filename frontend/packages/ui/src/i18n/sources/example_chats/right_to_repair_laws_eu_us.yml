    Hingga Juni 2026, gerakan "Hak untuk Memperbaiki" (Right to Repair) telah mencapai fase implementasi kritis baik di [Uni Eropa](wiki:European_Union) maupun [Amerika Serikat](wiki:United_States). Sementara UE bergerak menuju mandat kontinental yang terpadu, AS terus menyaksikan perpaduan kemenangan di tingkat negara bagian dan pertempuran lobi yang sengit.
    
    ### Perkembangan Terkini di Uni Eropa
    
    Peristiwa terbaru yang paling signifikan adalah peluncuran **paket "Kedaulatan Teknologi"** oleh UE pada 3 Juni 2026. Inisiatif ini bertujuan untuk mengurangi ketergantungan pada Raksasa Teknologi AS dengan membina alternatif lokal dan memperkuat hak-hak konsumen.
    
    *   **Hitung Mundur Implementasi:** [Petunjuk Hak untuk Memperbaiki UE](wiki:Right_to_repair) yang bersejarah (Petunjuk (UE) 2024/1799) akan diberlakukan sepenuhnya di seluruh negara anggota pada **31 Juli 2026**. 
    *   **Paspor Produk Digital:** Mulai 19 Juli 2026, UE akan meluncurkan registri **Paspor Produk Digital (DPP)**. Ini akan mewajibkan produk (dimulai dengan baterai dan tekstil) untuk menyertakan kode QR yang menyediakan data tentang daya tahan dan kemampuan perbaikan.
    *   **Peringatan Hukum:** Pada 4 Juni 2026, Komisi Eropa mengeluarkan peringatan resmi kepada **20 negara anggota** yang melewatkan tenggat waktu Maret 2026 untuk mentransposisikan petunjuk "Transisi Hijau" ke dalam hukum nasional. Petunjuk ini sangat penting untuk mencegah [greenwashing](wiki:Greenwashing) dan "[keusangan](wiki:Obsolescence) dini."
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Perkembangan Terkini di Amerika Serikat
    
    Di AS, gerakan ini tetap terfokus pada tingkat negara bagian, karena undang-undang federal masih tertahan di [Kongres](wiki:United_States_Congress).
    
    *   **Ekspansi Tingkat Negara Bagian:** Hingga pertengahan 2026, lebih dari **seperempat warga Amerika** tinggal di negara bagian dengan undang-undang Hak untuk Memperbaiki yang dapat ditegakkan. Angka ini diperkirakan akan melonjak menjadi **35% pada musim gugur 2026** seiring dengan berlakunya undang-undang baru di **Texas** dan **Connecticut**.
    *   **Lobi Korporat:** Kelompok advokasi seperti [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) melaporkan upaya lobi yang terus berlanjut dari perusahaan seperti [Google](wiki:Google) dan [Apple](wiki:Apple_Inc.) terhadap pembatasan "pemasangan suku cadang" (parts pairing)—sebuah praktik di mana perangkat lunak mengunci suku cadang pengganti ke perangkat tertentu.
    
    ### Apa yang Dikatakan Para Ahli
    
    Para ahli hukum dan teknis menawarkan campuran optimisme dan kehati-hatian terkait undang-undang baru ini:
    
    1.  **Debat "Pembebasan Teknologi":** Meskipun pejabat UE memuji 3 Juni 2026 sebagai "Hari Pembebasan Teknologi," para ahli dari *Computer & Communications Industry Association* berpendapat bahwa kemandirian sejati dari [Raksasa Teknologi](wiki:Big_Tech) akan memakan waktu puluhan tahun, mengingat Eropa masih belum memiliki saingan bagi [Nvidia](wiki:Nvidia) atau [TSMC](wiki:TSMC).
    2.  **Celah Hukum dan Pemasangan Suku Cadang:** Para ahli di *Cybernews* dan *Earth911* memperingatkan bahwa meskipun undang-undang mewajibkan *hak* untuk memperbaiki, produsen masih "memegang kendali" melalui biaya suku cadang asli yang tinggi dan [penguncian perangkat lunak](wiki:Digital_rights_management) (parts pairing). Mereka berpendapat bahwa tanpa kontrol harga yang lebih ketat pada suku cadang, perbaikan mungkin tetap lebih mahal daripada penggantian.
    3.  **Insentif Garansi:** Analis hukum dari *Fieldfisher* menyoroti "permata tersembunyi" dalam hukum UE: jika konsumen memilih perbaikan daripada penggantian selama masa garansi, **garansi akan diperpanjang selama 12 bulan**. Ini dipandang sebagai insentif utama untuk mengubah perilaku konsumen agar menjauh dari "budaya sekali pakai."
    
    > [Produsen akan berkewajiban untuk memperbaiki produk yang masuk dalam cakupan, bahkan jika produk tersebut dibeli oleh konsumen sebelum 31 Juli 2026.](embed:fieldfisher.com-e9q)
    
