    En juin 2026, le mouvement du « droit à la réparation » a atteint une phase de mise en œuvre critique tant dans l'[Union européenne](wiki:European_Union) que dans les [États-Unis](wiki:United_States). Alors que l'UE s'oriente vers un mandat continental unifié, les États-Unis continuent de voir une mosaïque de victoires au niveau des États et d'intenses batailles de lobbying.
    
    ### Développements récents dans l'Union européenne
    
    L'événement récent le plus significatif est le dévoilement par l'UE de son **paquet « Souveraineté technologique »** le 3 juin 2026. Cette initiative vise à réduire la dépendance vis-à-vis des Big Tech américaines en favorisant des alternatives locales et en renforçant les droits des consommateurs.
    
    *   **Compte à rebours de la mise en œuvre :** La directive historique de l'[UE sur le droit à la réparation](wiki:Right_to_repair) (Directive (UE) 2024/1799) devrait être pleinement applicable dans tous les États membres d'ici le **31 juillet 2026**.
    *   **Passeports numériques des produits :** À partir du 19 juillet 2026, l'UE lancera le registre du **Passeport numérique des produits (DPP)**. Cela exigera que les produits (en commençant par les batteries et les textiles) portent un code QR fournissant des données sur la durabilité et la réparabilité.
    *   **Avertissements juridiques :** Le 4 juin 2026, la Commission européenne a adressé des avertissements formels à **20 États membres** qui ont manqué la date limite de mars 2026 pour transposer la directive sur la « Transition verte » dans leur droit national. Cette directive est cruciale pour prévenir l'[écoblanchiment](wiki:Greenwashing) et l'« [obsolescence](wiki:Obsolescence) prématurée ».
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### Développements récents aux États-Unis
    
    Aux États-Unis, le mouvement reste concentré au niveau des États, car la législation fédérale reste bloquée au [Congrès](wiki:United_States_Congress).
    
    *   **Expansion au niveau des États :** À la mi-2026, plus d'**un quart des Américains** vivent dans des États dotés de lois applicables sur le droit à la réparation. Ce chiffre devrait grimper à **35 % d'ici l'automne 2026**, à mesure que les nouvelles lois au **Texas** et dans le **Connecticut** entreront pleinement en vigueur.
    *   **Lobbying des entreprises :** Des groupes de défense comme le [Public Interest Research Group (PIRG)](wiki:Public_Interest_Research_Group) ont signalé des efforts de lobbying continus de la part d'entreprises comme [Google](wiki:Google) et [Apple](wiki:Apple_Inc.) contre les restrictions sur l'« appariement de pièces » — une pratique où le logiciel verrouille les pièces de rechange à un appareil spécifique.
    
    ### Ce que disent les experts
    
    Les experts juridiques et techniques offrent un mélange d'optimisme et de prudence concernant ces nouvelles lois :
    
    1.  **Le débat sur la « libération technologique » :** Alors que les responsables de l'UE ont salué le 3 juin 2026 comme le « Jour de la libération technologique », les experts de la *Computer & Communications Industry Association* soutiennent qu'une véritable indépendance vis-à-vis des [Big Tech](wiki:Big_Tech) prendra des décennies, notant que l'Europe manque encore d'un rival à [Nvidia](wiki:Nvidia) ou [TSMC](wiki:TSMC).
    2.  **Failles et appariement de pièces :** Les experts de *Cybernews* et *Earth911* préviennent que si les lois imposent le *droit* à la réparation, les fabricants « gardent toujours les cartes en main » en raison du coût élevé des pièces d'origine et des [verrous logiciels](wiki:Digital_rights_management) (appariement de pièces). Ils soutiennent que sans un contrôle plus strict des prix des pièces détachées, la réparation peut rester plus coûteuse que le remplacement.
    3.  **Incitations liées à la garantie :** Les analystes juridiques de *Fieldfisher* soulignent un « joyau caché » dans la loi européenne : si un consommateur choisit la réparation plutôt que le remplacement pendant la période de garantie, la **garantie est prolongée de 12 mois**. Cela est considéré comme une incitation majeure pour détourner le comportement des consommateurs de la « culture du jetable ».
    
    > [Les fabricants seront tenus de réparer les produits concernés, même si ces produits ont été achetés par les consommateurs avant le 31 juillet 2026.](embed:fieldfisher.com-e9q)
    
