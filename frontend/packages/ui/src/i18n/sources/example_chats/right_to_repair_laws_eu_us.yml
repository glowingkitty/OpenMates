    ### アメリカ合衆国における最近の動向
    
    米国では、連邦法案が[議会](wiki:United_States_Congress)で停滞しているため、運動の焦点は依然として州レベルにあります。
    
    *   **州レベルの拡大：** 2026年半ばの時点で、**アメリカ人の4分の1以上**が、施行可能な修理する権利法を持つ州に居住しています。**テキサス州**と**コネチカット州**の新法が本格的に施行される**2026年秋までには、この割合は35%**に跳ね上がると予想されています。
    *   **企業のロビー活動：** [公共利益調査グループ（PIRG）](wiki:Public_Interest_Research_Group)などの擁護団体は、[Google](wiki:Google)や[Apple](wiki:Apple_Inc.)といった企業が、ソフトウェアによって交換部品を特定のデバイスにロックする「パーツペアリング」の制限に対して、引き続きロビー活動を行っていると報告しています。
    
    ### 専門家の見解
    
    法的および技術的な専門家は、これらの新しい法律について、楽観論と慎重論を織り交ぜた見解を示しています。
    
    1.  **「テック解放」論争：** EU当局は2026年6月3日を「テック解放の日」と称賛していますが、*コンピュータ・通信産業協会（CCIA）*の専門家は、ヨーロッパには依然として[Nvidia](wiki:Nvidia)や[TSMC](wiki:TSMC)に対抗できる企業が存在しないことを指摘し、[ビッグテック](wiki:Big_Tech)からの真の独立には数十年かかると主張しています。
    2.  **抜け穴とパーツペアリング：** *Cybernews*や*Earth911*の専門家は、法律が修理する「権利」を義務付けている一方で、純正部品の高コストや[ソフトウェアロック](wiki:Digital_rights_management)（パーツペアリング）を通じて、依然としてメーカーが「主導権を握っている」と警告しています。彼らは、予備部品のより厳格な価格管理がなければ、修理は買い替えよりも高価なままになる可能性があると主張しています。
    3.  **保証によるインセンティブ：** *Fieldfisher*の法律アナリストは、EU法の「隠れた逸品」を強調しています。保証期間中に消費者が交換ではなく修理を選択した場合、**保証期間が12ヶ月延長される**というものです。これは、消費者の行動を「使い捨て文化」から脱却させるための大きなインセンティブと見なされています。
    
    > [メーカーは、2026年7月31日より前に消費者が購入した製品であっても、対象製品を修理する義務を負います。](embed:fieldfisher.com-e9q)
    
