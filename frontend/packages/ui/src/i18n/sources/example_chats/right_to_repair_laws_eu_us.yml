    ### التطورات الأخيرة في الاتحاد الأوروبي
    
    أهم حدث وقع مؤخراً هو كشف الاتحاد الأوروبي عن **حزمة "السيادة التقنية"** في 3 يونيو 2026. تهدف هذه المبادرة إلى تقليل الاعتماد على شركات التقنية الكبرى في الولايات المتحدة من خلال تعزيز البدائل المحلية وتقوية حقوق المستهلك.
    
    *   **العد التنازلي للتنفيذ:** من المقرر أن يصبح [توجيه الاتحاد الأوروبي بشأن الحق في الإصلاح](wiki:Right_to_repair) (التوجيه (EU) 2024/1799) قابلاً للتنفيذ بالكامل في جميع الدول الأعضاء بحلول **31 يوليو 2026**. 
    *   **جوازات سفر المنتجات الرقمية:** بدءاً من 19 يوليو 2026، سيطلق الاتحاد الأوروبي سجل **جواز سفر المنتج الرقمي (DPP)**. سيتطلب ذلك من المنتجات (بدءاً من البطاريات والمنسوجات) حمل رمز QR يوفر بيانات حول المتانة وقابلية الإصلاح.
    *   **تحذيرات قانونية:** في 4 يونيو 2026، أصدرت المفوضية الأوروبية تحذيرات رسمية لـ **20 دولة عضواً** فاتت الموعد النهائي في مارس 2026 لنقل توجيه "التحول الأخضر" إلى القانون الوطني. هذا التوجيه ضروري لمنع [الغسل الأخضر](wiki:Greenwashing) و"[التقادم](wiki:Obsolescence) المبكر".
    
