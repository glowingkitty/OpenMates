    ### संयुक्त राज्य अमेरिका में हालिया घटनाक्रम
    
    अमेरिका में, यह आंदोलन राज्य स्तर पर केंद्रित है, क्योंकि संघीय कानून [कांग्रेस](wiki:United_States_Congress) में अटका हुआ है।
    
    *   **राज्य-स्तरीय विस्तार:** 2026 के मध्य तक, **एक-चौथाई से अधिक अमेरिकी** उन राज्यों में रहते हैं जहाँ राइट टू रिपेयर कानून लागू हैं। **टेक्सास** और **कनेक्टिकट** में नए कानूनों के पूरी तरह प्रभावी होने के साथ **2026 की शरद ऋतु तक इसके 35%** तक पहुँचने की उम्मीद है।
    *   **कॉर्पोरेट लॉबिंग:** [पब्लिक इंटरेस्ट रिसर्च ग्रुप (PIRG)](wiki:Public_Interest_Research_Group) जैसे वकालत समूहों ने [गूगल](wiki:Google) और [एप्पल](wiki:Apple_Inc.) जैसी कंपनियों द्वारा "पार्ट्स पेयरिंग" (parts pairing) प्रतिबंधों के खिलाफ निरंतर लॉबिंग प्रयासों की सूचना दी है—यह एक ऐसी प्रथा है जहाँ सॉफ्टवेयर रिप्लेसमेंट पार्ट्स को एक विशिष्ट डिवाइस के साथ लॉक कर देता है।
    
    ### विशेषज्ञ क्या कह रहे हैं
    
    कानूनी और तकनीकी विशेषज्ञ इन नए कानूनों के संबंध में आशावाद और सावधानी का मिश्रण पेश कर रहे हैं:
    
    1.  **"तकनीकी मुक्ति" (Tech Liberation) पर बहस:** जहाँ यूरोपीय संघ के अधिकारियों ने 3 जून, 2026 को "तकनीकी मुक्ति दिवस" के रूप में सराहा है, वहीं *कंप्यूटर एंड कम्युनिकेशंस इंडस्ट्री एसोसिएशन* के विशेषज्ञों का तर्क है कि [बिग टेक](wiki:Big_Tech) से वास्तविक स्वतंत्रता में दशकों लगेंगे, यह देखते हुए कि यूरोप में अभी भी [एनवीडिया](wiki:Nvidia) या [TSMC](wiki:TSMC) का कोई प्रतिद्वंद्वी नहीं है।
    2.  **खामियां और पार्ट्स पेयरिंग:** *Cybernews* और *Earth911* के विशेषज्ञों ने चेतावनी दी है कि जहाँ कानून मरम्मत के *अधिकार* को अनिवार्य बनाते हैं, वहीं निर्माता अभी भी मूल पुर्जों की उच्च लागत और [सॉफ्टवेयर लॉक](wiki:Digital_rights_management) (पार्ट्स पेयरिंग) के माध्यम से "कमान अपने हाथ में रखते हैं"। उनका तर्क है कि स्पेयर पार्ट्स पर सख्त मूल्य नियंत्रण के बिना, मरम्मत करना नया खरीदने की तुलना में अधिक महंगा बना रह सकता है।
    3.  **वारंटी प्रोत्साहन:** *Fieldfisher* के कानूनी विश्लेषकों ने यूरोपीय संघ के कानून में एक "छिपे हुए रत्न" पर प्रकाश डाला है: यदि कोई उपभोक्ता वारंटी अवधि के दौरान रिप्लेसमेंट के बजाय मरम्मत चुनता है, तो **वारंटी 12 महीने के लिए बढ़ा दी जाती है**। इसे उपभोक्ता व्यवहार को "फेंको और नया लो" (throwaway culture) वाली संस्कृति से दूर ले जाने के लिए एक बड़े प्रोत्साहन के रूप में देखा जा रहा है।
    
    > [निर्माताओं को दायरे में आने वाले उत्पादों की मरम्मत करने के लिए बाध्य किया जाएगा, भले ही वे उत्पाद उपभोक्ताओं द्वारा 31 जुलाई 2026 से पहले खरीदे गए हों।](embed:fieldfisher.com-e9q)
    
