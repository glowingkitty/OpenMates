    ### Những diễn biến gần đây tại Hoa Kỳ
    
    Tại Hoa Kỳ, phong trào vẫn tập trung ở cấp tiểu bang, vì luật pháp liên bang vẫn đang bị đình trệ tại [Quốc hội](wiki:United_States_Congress).
    
    *   **Mở rộng ở cấp tiểu bang:** Tính đến giữa năm 2026, hơn **một phần tư người Mỹ** sống ở các tiểu bang có luật Quyền được sửa chữa có hiệu lực. Con số này dự kiến sẽ tăng lên **35% vào mùa thu năm 2026** khi các luật mới tại **Texas** và **Connecticut** có hiệu lực đầy đủ.
    *   **Vận động hành lang của doanh nghiệp:** Các nhóm vận động như [Nhóm Nghiên cứu Lợi ích Công cộng (PIRG)](wiki:Public_Interest_Research_Group) đã báo cáo về những nỗ lực vận động hành lang liên tục từ các công ty như [Google](wiki:Google) và [Apple](wiki:Apple_Inc.) chống lại các hạn chế về "ghép nối linh kiện" (parts pairing) — một hành vi mà phần mềm khóa các linh kiện thay thế vào một thiết bị cụ thể.
    
    ### Các chuyên gia nói gì
    
    Các chuyên gia pháp lý và kỹ thuật đang đưa ra những ý kiến trái chiều về sự lạc quan và thận trọng đối với các luật mới này:
    
    1.  **Cuộc tranh luận về "Giải phóng Công nghệ":** Trong khi các quan chức EU ca ngợi ngày 3 tháng 6 năm 2026 là "Ngày Giải phóng Công nghệ", các chuyên gia từ *Hiệp hội Công nghiệp Máy tính & Truyền thông* lập luận rằng sự độc lập thực sự khỏi [Big Tech](wiki:Big_Tech) sẽ mất nhiều thập kỷ, lưu ý rằng Châu Âu vẫn thiếu một đối thủ cạnh tranh với [Nvidia](wiki:Nvidia) hoặc [TSMC](wiki:TSMC).
    2.  **Lỗ hổng và Ghép nối linh kiện:** Các chuyên gia tại *Cybernews* và *Earth911* cảnh báo rằng mặc dù luật pháp quy định *quyền* được sửa chữa, các nhà sản xuất vẫn "nắm đằng chuôi" thông qua chi phí cao của các linh kiện chính hãng và [khóa phần mềm](wiki:Digital_rights_management) (ghép nối linh kiện). Họ lập luận rằng nếu không có sự kiểm soát giá chặt chẽ hơn đối với các phụ tùng thay thế, việc sửa chữa có thể vẫn đắt hơn so với việc thay mới.
    3.  **Ưu đãi bảo hành:** Các nhà phân tích pháp lý từ *Fieldfisher* nhấn mạnh một "viên ngọc ẩn" trong luật của EU: nếu người tiêu dùng chọn sửa chữa thay vì thay thế trong thời gian bảo hành, **thời gian bảo hành sẽ được gia hạn thêm 12 tháng**. Đây được coi là một động lực lớn để thay đổi hành vi của người tiêu dùng, thoát khỏi "văn hóa dùng rồi bỏ".
    
    > [Các nhà sản xuất sẽ có nghĩa vụ sửa chữa các sản phẩm trong phạm vi điều chỉnh, ngay cả khi những sản phẩm đó được người tiêu dùng mua trước ngày 31 tháng 7 năm 2026.](embed:fieldfisher.com-e9q)
    
