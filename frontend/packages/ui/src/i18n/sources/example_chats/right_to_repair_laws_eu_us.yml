    2026年6月現在、「修理する権利（Right to Repair）」運動は、[欧州連合](wiki:European_Union)と[アメリカ合衆国](wiki:United_States)の両方で重要な実施段階に達しています。EUが大陸全土で統一された義務化へと進んでいる一方で、米国では州レベルでの勝利と激しいロビー活動の攻防が入り混じった状況が続いています。
    
    ### 欧州連合における最近の動向
    
    最も重要な最近の出来事は、2026年6月3日にEUが発表した**「技術主権（Tech Sovereignty）」パッケージ**です。この取り組みは、自国独自の代替手段を育成し、消費者権利を強化することで、米国のビッグテックへの依存を減らすことを目的としています。
    
    *   **実施へのカウントダウン：** 画期的な[EU修理する権利指令](wiki:Right_to_repair)（指令 (EU) 2024/1799）は、**2026年7月31日**までにすべての加盟国で完全に施行される予定です。
    *   **デジタル製品パスポート：** 2026年7月19日より、EUは**デジタル製品パスポート（DPP）**登録を開始します。これにより、製品（まずはバッテリーと繊維製品から）に耐久性と修理可能性に関するデータを提供するQRコードの貼付が義務付けられます。
    *   **法的警告：** 2026年6月4日、欧州委員会は「グリーン移行」指令を国内法に置き換える2026年3月の期限を守らなかった**20の加盟国**に対し、正式な警告を発しました。この指令は、[グリーンウォッシング](wiki:Greenwashing)や「早期の[陳腐化](wiki:Obsolescence)」を防ぐために不可欠なものです。
    
