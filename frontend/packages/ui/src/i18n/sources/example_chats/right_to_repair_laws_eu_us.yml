    ### 유럽 연합(EU)의 최근 동향
    
    가장 중요한 최근 사건은 2026년 6월 3일에 발표된 EU의 **"기술 주권(Tech Sovereignty) 패키지"**입니다. 이 이니셔티브는 자체적인 대안을 육성하고 소비자 권리를 강화함으로써 미국 빅테크 기업에 대한 의존도를 낮추는 것을 목표로 합니다.
    
    *   **구현 카운트다운:** 획기적인 [EU 수리할 권리 지침](wiki:Right_to_repair)(지침 (EU) 2024/1799)이 **2026년 7월 31일**까지 모든 회원국에서 전면 시행될 예정입니다.
    *   **디지털 제품 여권:** 2026년 7월 19일부터 EU는 **디지털 제품 여권(DPP)** 등록을 시작합니다. 이에 따라 배터리와 섬유를 시작으로 제품에 내구성과 수리 가능성에 대한 데이터를 제공하는 QR 코드를 부착해야 합니다.
    *   **법적 경고:** 2026년 6월 4일, 유럽 집행위원회는 "녹색 전환(Green Transition)" 지침을 국가 법률로 전환해야 하는 2026년 3월 마감 기한을 지키지 못한 **20개 회원국**에 공식 경고를 발령했습니다. 이 지침은 [그린워싱](wiki:Greenwashing)과 "조기 [노후화](wiki:Obsolescence)"를 방지하는 데 매우 중요합니다.
    
