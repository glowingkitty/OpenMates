    截至2026年6月，“维修权”运动在[欧盟](wiki:European_Union)和[美国](wiki:United_States)都已进入关键的实施阶段。虽然欧盟正朝着统一的大陆指令迈进，但美国仍处于各州层面的胜利与激烈的游说战并存的局面。
    
    ### 欧洲联盟的最新进展
    
    最近最重要的事件是欧盟在2026年6月3日公布了其**“技术主权”方案**。该倡议旨在通过培育本土替代方案和加强消费者权益，减少对美国大型科技公司的依赖。
    
    *   **实施倒计时：** 具有里程碑意义的[《欧盟维修权指令》](wiki:Right_to_repair)（指令 (EU) 2024/1799）定于**2026年7月31日**起在所有成员国全面强制执行。
    *   **数字产品护照：** 从2026年7月19日开始，欧盟将启动**数字产品护照 (DPP)** 注册。这将要求产品（从电池和纺织品开始）携带二维码，以提供耐用性和可维修性的数据。
    *   **法律警告：** 2026年6月4日，欧盟委员会向**20个成员国**发出正式警告，这些国家错过了将“绿色转型”指令转化为国内法律的2026年3月截止日期。该指令对于防止[漂绿](wiki:Greenwashing)和“过早[报废](wiki:Obsolescence)”至关重要。
    
    [!](embed:euronewsweek.co.uk-aq1)
    [!](embed:termopasty.com-0tB)
    [!](embed:ecomondo.com-9xC)
    
    ### 美国的最新进展
    
    在美国，由于联邦立法在[国会](wiki:United_States_Congress)陷入停滞，该运动仍集中在州一级。
    
    *   **州级扩张：** 截至2026年中期，超过**四分之一的美国人**生活在拥有可执行维修权法律的州。随着**德克萨斯州**和**康涅狄格州**的新法律全面生效，预计到**2026年秋季**这一比例将跳升至**35%**。
    *   **企业游说：** [公共利益研究小组 (PIRG)](wiki:Public_Interest_Research_Group) 等倡导团体报告称，[谷歌](wiki:Google)和[苹果](wiki:Apple_Inc.)等公司继续针对“零件配对”限制进行游说——这种做法通过软件将更换零件锁定在特定设备上。
    
    ### 专家观点
    
    法律和技术专家对这些新法律持乐观与谨慎并存的态度：
    
    1.  **“技术解放”辩论：** 虽然欧盟官员称2026年6月3日为“技术解放日”，但*计算机与通信工业协会*的专家认为，要真正独立于[大型科技公司](wiki:Big_Tech)还需要几十年的时间，并指出欧洲仍然缺乏能与[英伟达](wiki:Nvidia)或[台积电](wiki:TSMC)抗衡的企业。
    2.  **漏洞与零件配对：** *Cybernews* 和 *Earth911* 的专家警告说，虽然法律规定了维修*权*，但制造商仍通过原装零件的高昂成本和[软件锁定](wiki:Digital_rights_management)（零件配对）“掌握着主动权”。他们认为，如果不对备件进行更严格的价格控制，维修可能仍然比更换更昂贵。
    3.  **保修激励：** *Fieldfisher* 的法律分析师强调了欧盟法律中的一个“隐藏亮点”：如果消费者在保修期内选择维修而非更换，**保修期将延长12个月**。这被视为改变消费者行为、摆脱“一次性文化”的主要激励措施。
    
    > [制造商将有义务维修范围内的产品，即使这些产品是消费者在2026年7月31日之前购买的。](embed:fieldfisher.com-e9q)
    
