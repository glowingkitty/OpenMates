message_2:
  context: "assistant message 2 in example chat: RAG Explained for Beginners. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "11ff377e-a0a2-40ed-81c3-9556b68142f3", "app_id": "videos", "skill_id": "search", "query": "retrieval augmented generation explained for beginners", "provider": "Brave"}
    ```

    I've found some excellent beginner-friendly videos that explain Retrieval-Augmented Generation (RAG). Here is a curated selection to get you started:

    [!](embed:youtube.com-OCK)
    [!](embed:youtube.com-20R)
    [!](embed:youtube.com-8SW)
    [!](embed:youtube.com-Fn4)
    [!](embed:youtube.com-rgp)

    ### Which one should you watch first?

    I highly recommend starting with **[What is Retrieval-Augmented Generation (RAG)?](embed:youtube.com-OCK)** by **IBM Technology**.

    **Why this one first?**
    *   **Conciseness:** At just 6 and a half minutes, it provides the most efficient "conceptual hook" without getting bogged down in implementation details.
    *   **High-Level Clarity:** IBM’s explanations are famous for being professional and easy to follow. They focus on the *why* (fixing LLM hallucinations and outdated data) before diving into the *what*.
    *   **Authoritative:** It establishes a solid foundation from a reputable industry leader, which helps you better understand the more technical or "hands-on" videos later.

    ### What to watch next?

    Once you have the concept down, here are two paths depending on your interest:

    1.  **For a better intuitive understanding:** Watch **[RAG Explained in 12 Minutes](embed:youtube.com-20R)** by **Aishwarya Srinivasan**. She uses a brilliant "Open-Book Exam" analogy that makes the whole process click instantly for most beginners.
    2.  **For a technical overview:** If you want to see the "moving parts" (like vector databases and embeddings), check out **[RAG Explained For Beginners](embed:youtube.com-8SW)** by **KodeKloud**. It breaks the process down into a simple 3-step framework: Retrieval, Augmentation, and Generation.

    If you're interested in building a RAG system yourself, I can help you find documentation for popular tools like [LangChain](wiki:LangChain) or LlamaIndex. Would you like to see how a simple RAG implementation looks in code?

    **Further exploration:**
    *   [Check out more AI tutorials](/#settings/apps/videos)
    *   [Search for RAG documentation](/#settings/apps/code)
