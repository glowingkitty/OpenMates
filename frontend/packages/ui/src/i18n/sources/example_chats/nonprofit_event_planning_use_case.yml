message_2:
  context: "assistant message 2 in example chat: Nonprofit Event Planning Use Case. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "bbd60a9e-95f4-491e-8cfc-70888ca110a6", "app_id": "openmates", "skill_id": "share-usecase"}
    ```
    
    That is a fantastic use case! It highlights exactly how OpenMates can help teams collaborate more effectively by handling the information-heavy side of planning.
    
    Here is the drafted summary for the public use-case gallery:
    
    **Nonprofit Event Coordination**
    > "Small nonprofit organizations use OpenMates to streamline event planning and coordination. By leveraging [web research](/#settings/apps/web) for venues and vendors, setting automated [reminders](/#settings/apps/reminder) for team deadlines, and generating shared summaries backed by verified sources, teams can stay aligned and efficient. This collaborative approach ensures all members have access to the same source-backed information, allowing the organization to focus more on its community mission."
    
    I've shared this anonymously with the OpenMates team to help showcase how the platform is being used in the real world.
    
    Would you like to explore how to set up [automated reminders](/#settings/apps/reminder) for your team, or should we look into how to [share summaries](/#settings/apps/docs) effectively?
  de: |
    ```json
    {"type": "app_skill_use", "embed_id": "bbd60a9e-95f4-491e-8cfc-70888ca110a6", "app_id": "openmates", "skill_id": "share-usecase"}
    ```
    
    Das ist ein fantastischer Anwendungsfall! Er verdeutlicht genau, wie OpenMates Teams dabei helfen kann, effektiver zusammenzuarbeiten, indem es den informationsintensiven Teil der Planung übernimmt.
    
    Hier ist der Entwurf der Zusammenfassung für die öffentliche Use-Case-Galerie:
    
    **Event-Koordination für Non-Profit-Organisationen**
    > "Kleine Non-Profit-Organisationen nutzen OpenMates, um die Eventplanung und -koordination zu optimieren. Durch die Nutzung von [Web-Recherche](/#settings/apps/web) für Veranstaltungsorte und Dienstleister, das Einrichten automatisierter [Erinnerungen](/#settings/apps/reminder) für Team-Fristen und das Erstellen geteilter, durch verifizierte Quellen gestützter Zusammenfassungen können Teams abgestimmt und effizient arbeiten. Dieser kollaborative Ansatz stellt sicher, dass alle Mitglieder Zugriff auf dieselben quellenbasierten Informationen haben, sodass sich die Organisation stärker auf ihre gemeinnützige Mission konzentrieren kann."
    
    Ich habe dies anonym mit dem OpenMates-Team geteilt, um zu zeigen, wie die Plattform in der Praxis eingesetzt wird.
    
    Möchtest du erfahren, wie du [automatisierte Erinnerungen](/#settings/apps/reminder) für dein Team einrichtest, oder sollen wir uns ansehen, wie man [Zusammenfassungen effektiv teilt](/#settings/apps/docs)?
