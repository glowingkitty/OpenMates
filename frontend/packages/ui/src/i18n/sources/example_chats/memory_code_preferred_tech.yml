message_2:
  context: "assistant message 2 in example chat: Memory Code Preferred Tech. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved preferences, you have an advanced proficiency in [SvelteKit](wiki:SvelteKit). For a small personal dashboard you can realistically build and deploy this weekend, I suggest the following starter stack:
    
    *   **Framework:** [SvelteKit](wiki:SvelteKit) — Utilizing your primary strength for efficient routing and server-side rendering.
    *   **Styling:** [Tailwind CSS](wiki:Tailwind_CSS) — Ideal for building custom dashboard layouts quickly without writing verbose CSS.
    *   **UI Components:** **bits-ui** or **shadcn-svelte** — These libraries provide accessible, unstyled components that integrate perfectly with the Svelte ecosystem and Tailwind.
    *   **Database & Auth:** Supabase — It offers a PostgreSQL database, authentication, and real-time listeners out of the box, which minimizes the time spent on backend boilerplate.
    *   **Icons:** Lucide (specifically the `lucide-svelte` package) — Provides a clean and consistent icon set for navigation and data visualization.
    *   **Deployment:** [Vercel](wiki:Vercel) — Offers first-class support for SvelteKit and can have your dashboard live in minutes.
    
    This stack focuses on minimizing configuration time so you can spend the majority of your weekend building the actual dashboard features.
