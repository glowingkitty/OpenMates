summary:
  context: Summary of example chat discussing specialized cargo aircraft like An-225, Super Guppy, and BelugaXL
  en: Discussed specialized cargo aircraft like the An-225, Super Guppy, and BelugaXL used to transport rocket and airplane parts.
  de: Besprochen wurden spezialisierte Frachtflugzeuge wie die An-225, Super Guppy und BelugaXL, die für den Transport von Raketen- und Flugzeugteilen eingesetzt werden.
  zh: 讨论了用于运输火箭和飞机零件的专用货运飞机，如An-225、超级古比鱼和白鲸XL。
  es: Se discutieron aviones de carga especializados como el An-225, Super Guppy y BelugaXL utilizados para transportar piezas de cohetes y aviones.
  fr: Discussion sur les avions-cargos spécialisés comme l'An-225, le Super Guppy et le BelugaXL utilisés pour transporter des pièces de fusées et d'avions.
  pt: Discutimos aeronaves de carga especializadas como o An-225, Super Guppy e BelugaXL usados para transportar peças de foguetes e aviões.
  ru: Обсуждались специализированные грузовые самолёты, такие как Ан-225, Super Guppy и BelugaXL, используемые для перевозки деталей ракет и самолётов.
  ja: An-225、スーパーグッピー、ベルーガXLなど、ロケットや航空機の部品輸送に使われる専用貨物機について話しました。
  ko: An-225, 슈퍼 구피, 벨루가XL 등 로켓 및 항공기 부품 운송에 사용되는 특수 화물기에 대해 논의했습니다.
  it: Discussi aerei cargo specializzati come l'An-225, il Super Guppy e il BelugaXL usati per trasportare parti di razzi e aerei.
  tr: An-225, Super Guppy ve BelugaXL gibi roket ve uçak parçalarını taşımak için kullanılan özel kargo uçakları tartışıldı.
  vi: Thảo luận về các máy bay chở hàng chuyên dụng như An-225, Super Guppy và BelugaXL được sử dụng để vận chuyển bộ phận tên lửa và máy bay.
  id: Membahas pesawat kargo khusus seperti An-225, Super Guppy, dan BelugaXL yang digunakan untuk mengangkut suku cadang roket dan pesawat.
  pl: Omówiono wyspecjalizowane samoloty transportowe takie jak An-225, Super Guppy i BelugaXL używane do transportu części rakiet i samolotów.
  nl: Besproken werden gespecialiseerde vrachtvliegtuigen zoals de An-225, Super Guppy en BelugaXL die worden gebruikt om raket- en vliegtuigonderdelen te vervoeren.
  ar: ناقشنا طائرات الشحن المتخصصة مثل An-225 وSuper Guppy وBelugaXL المستخدمة لنقل أجزاء الصواريخ والطائرات.
  hi: An-225, सुपर गप्पी और बेलुगाXL जैसे विशेष कार्गो विमानों पर चर्चा की गई जो रॉकेट और हवाई जहाज के पुर्जों के परिवहन के लिए उपयोग किए जाते हैं।
  th: พูดคุยเกี่ยวกับเครื่องบินขนส่งสินค้าพิเศษ เช่น An-225, Super Guppy และ BelugaXL ที่ใช้ขนส่งชิ้นส่วนจรวดและเครื่องบิน
  cs: Diskutovali jsme o specializovaných nákladních letadlech jako An-225, Super Guppy a BelugaXL používaných k přepravě součástí raket a letadel.
  sv: Vi diskuterade specialiserade fraktflygplan som An-225, Super Guppy och BelugaXL som används för att transportera raket- och flygplansdelar.
  he: "דנו במטוסי מטען מיוחדים כמו An-225, סופר גאפי ו-BelugaXL המשמשים להובלת חלקי טילים ומטוסים."
  verified_by_human: []

user_message_1:
  context: First user message asking about giant airplane for rocket transport
  en: Name of the airplane that was used to transport rocket parts? The gigantic airplane?
  de: Name des Flugzeugs, das für den Transport von Raketenteilen verwendet wurde? Das riesige Flugzeug?
  zh: 用来运输火箭部件的那架飞机叫什么名字？那架巨大的飞机？
  es: ¿Nombre del avión que se usaba para transportar partes de cohetes? ¿El avión gigante?
  fr: Le nom de l'avion qui était utilisé pour transporter des pièces de fusée ? L'avion gigantesque ?
  pt: Nome do avião que era usado para transportar peças de foguetes? O avião gigantesco?
  ru: Как называется самолёт, который использовался для перевозки деталей ракет? Тот гигантский самолёт?
  ja: ロケットの部品を運ぶのに使われていた飛行機の名前は？あの巨大な飛行機？
  ko: 로켓 부품을 운반하는 데 사용된 비행기 이름이 뭐였죠? 그 거대한 비행기요?
  it: Il nome dell'aereo che veniva usato per trasportare parti di razzi? Quell'aereo gigantesco?
  tr: Roket parçalarını taşımak için kullanılan uçağın adı neydi? O devasa uçak?
  vi: Tên chiếc máy bay được dùng để vận chuyển các bộ phận tên lửa là gì? Chiếc máy bay khổng lồ đó?
  id: Apa nama pesawat yang digunakan untuk mengangkut bagian roket? Pesawat raksasa itu?
  pl: Jak nazywał się samolot używany do transportu części rakiet? Ten gigantyczny samolot?
  nl: Wat was de naam van het vliegtuig dat werd gebruikt om raketonderdelen te vervoeren? Dat gigantische vliegtuig?
  ar: ما اسم الطائرة التي كانت تُستخدم لنقل أجزاء الصواريخ؟ تلك الطائرة العملاقة؟
  hi: रॉकेट के पुर्जे ले जाने के लिए इस्तेमाल किए जाने वाले उस विमान का नाम क्या है? वह विशाल विमान?
  th: ชื่อเครื่องบินที่ใช้ขนส่งชิ้นส่วนจรวดคืออะไร? เครื่องบินลำยักษ์นั่น?
  cs: Jak se jmenuje to letadlo, které se používalo k přepravě součástí raket? To obrovské letadlo?
  sv: Vad heter flygplanet som användes för att transportera raketdelar? Det gigantiska flygplanet?
  he: "מה שם המטוס שהשתמשו בו להובלת חלקי טילים? המטוס הענק?"
  verified_by_human: []

user_message_2:
  context: Second user message asking about Airbus Beluga/BelugaXL for airplane parts
  en: Wasn't there a new version of the guppy or something similar that is used in Europe to transport airplane parts?
  de: Gab es nicht eine neue Version des Guppy oder etwas Ähnliches, das in Europa zum Transport von Flugzeugteilen verwendet wird?
  zh: 欧洲不是有一种古比鱼的新版本或类似的飞机用来运输飞机零件吗？
  es: ¿No había una nueva versión del guppy o algo similar que se usa en Europa para transportar piezas de aviones?
  fr: N'y avait-il pas une nouvelle version du guppy ou quelque chose de similaire utilisé en Europe pour transporter des pièces d'avion ?
  pt: Não havia uma nova versão do guppy ou algo semelhante usado na Europa para transportar peças de avião?
  ru: Разве не было новой версии Guppy или чего-то подобного, что используется в Европе для перевозки деталей самолётов?
  ja: ヨーロッパで飛行機の部品を運ぶのに使われているグッピーの新しいバージョンか何か似たようなものがなかったっけ？
  ko: 유럽에서 비행기 부품을 운반하는 데 사용되는 구피의 새로운 버전이나 비슷한 것이 있지 않았나요?
  it: Non c'era una nuova versione del guppy o qualcosa di simile usato in Europa per trasportare parti di aerei?
  tr: Avrupa'da uçak parçalarını taşımak için kullanılan guppy'nin yeni bir versiyonu veya benzeri bir şey yok muydu?
  vi: Chẳng phải có một phiên bản mới của guppy hoặc thứ gì đó tương tự được sử dụng ở châu Âu để vận chuyển bộ phận máy bay sao?
  id: Bukankah ada versi baru guppy atau sesuatu yang serupa yang digunakan di Eropa untuk mengangkut suku cadang pesawat?
  pl: Czy nie było nowej wersji guppy'ego lub czegoś podobnego używanego w Europie do transportu części samolotów?
  nl: Was er niet een nieuwe versie van de guppy of iets vergelijkbaars dat in Europa wordt gebruikt om vliegtuigonderdelen te vervoeren?
  ar: ألم يكن هناك نسخة جديدة من الغوبي أو شيء مشابه يُستخدم في أوروبا لنقل أجزاء الطائرات؟
  hi: क्या गप्पी का कोई नया संस्करण या ऐसा ही कुछ नहीं था जो यूरोप में हवाई जहाज के पुर्जों के परिवहन के लिए उपयोग किया जाता है?
  th: ไม่ใช่มีเวอร์ชันใหม่ของ guppy หรืออะไรคล้ายๆ กันที่ใช้ในยุโรปเพื่อขนส่งชิ้นส่วนเครื่องบินหรือ?
  cs: Nebyla tam nová verze guppy nebo něco podobného, co se v Evropě používá k přepravě dílů letadel?
  sv: Fanns det inte en ny version av guppy eller något liknande som används i Europa för att transportera flygplansdelar?
  he: "לא הייתה גרסה חדשה של הגאפי או משהו דומה שמשתמשים בו באירופה להובלת חלקי מטוסים?"
  verified_by_human: []

