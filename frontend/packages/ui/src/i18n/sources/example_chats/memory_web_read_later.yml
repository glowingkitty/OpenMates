message_2:
  context: "assistant message 2 in example chat: Read-later memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your [read-later settings](/#settings/apps/web), you have two articles saved that are highly relevant to engineering strategy and quality assurance. Given your upcoming planning session, the most prominent one is:
    
    **The Practical Test Pyramid** by Ham Vocke (on [Martin Fowler](wiki:Martin_Fowler)’s site).
    
    ### Why this is useful for your planning session:
    
    1.  **Resource Allocation:** The [Test Pyramid](wiki:Test_automation) concept helps engineering teams decide where to invest their time. It argues for a high volume of fast, low-level [unit tests](wiki:Unit_testing) and fewer expensive, slow UI-driven tests. During planning, this helps you justify why you might be spending more time on codebase health rather than end-to-end automation.
    2.  **Defining "Done":** If you are revising your testing strategy (as your notes suggest), this article provides a framework for what "quality" looks like. It helps prevent the "Ice Cream Cone" anti-pattern where a team relies too heavily on manual or integration tests that are brittle and slow.
    3.  **CI/CD Optimization:** Planning often involves discussing deployment frequency. The article explains how a balanced pyramid leads to faster [Continuous Integration](wiki:Continuous_integration) feedback loops, which is essential if your goal for the next quarter is increasing velocity.
    4.  **Regression Coverage:** Your second saved article from `example.com` specifically mentions **regression coverage**. Using these together, you can plan a transition from manual regression cycles to a more automated, layered approach.
    
    ### Summary of your saved items:
    *   **Practical Test Pyramid**: Focused on the "how-to" of balancing different test types.
    *   **Testing Strategy & Regression**: Focused on broader ideas for practical coverage.
    
    To help narrow down how to use this in your meeting, what is the primary goal of this planning session?
    
    ```interactive_question
    {
      "type": "choice",
      "id": "planning_focus",
      "multiple": false,
      "question": "What is the main objective of your engineering planning session?",
      "options": [
        { "id": "velocity", "text": "Increasing development velocity/speed" },
        { "id": "quality", "text": "Reducing bugs and improving reliability" },
        { "id": "tech_debt", "text": "Addressing technical debt and test maintenance" },
        { "id": "new_process", "text": "Establishing a completely new testing culture" }
      ]
    }
    ```json
    {"type": "code", "embed_id": "e494adf8-3ae6-4e95-b4d6-0556e5964cfa"}
    ```
    
    
