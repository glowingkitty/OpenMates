      - id: "116489379650011503"
        platform: mastodon
        page: Mastodon@mastodon.social
        title: "@Mastodon: We’re thrilled to bring back our blog series: Platform Progress. First up, we share"
        body: "We’re thrilled to bring back our blog series: Platform Progress.\nFirst up, we share an update on everything we’ve been working on since the start of 2026, including the launch of internal groups, improvements to onboarding, and progress on the authoring experience.\nhttps://blog.joinmastodon.org/2026/04/platform-progress-q1-2026/\n#Mastodon #Fediverse"
        author: Mastodon
        author_display_name: Mastodon
        author_avatar_url: "https://files.mastodon.social/accounts/avatars/000/013/179/original/b4ceb19c9c54ec7e.png"
        url: "https://mastodon.social/@Mastodon/116489379650011503"
        published_at: "2026-04-29T18:22:20.597Z"
        reply_count: 53
        repost_count: 457
        like_count: 994
        media_url: null
        thumbnail_url: null
        external_url: "https://blog.joinmastodon.org/2026/04/platform-progress-q1-2026/"
        external_title: "Platform Progress: Q1 2026"
        comments[5]{id,author,author_display_name,body,url,published_at,like_count,reply_count,repost_count}:
          "116489387431189914",vladcampos,Vladimir Campos,@Mastodon Very nice update. One request. I'm using the Mastodon app for iOS and I can't follow the blog link. Please make links clickable.,"https://mastodon.social/@vladcampos/116489387431189914","2026-04-29T18:24:47.464Z",12,4,0
          "116489437194883446",renchap@oisaur.com,Renaud Chaput,"@vladcampos @Mastodon\nLinks are clickable in the iOS app, but maybe not if you tap the thumbnail. Tapping the link in the text should work though?","https://oisaur.com/@renchap/116489437158739923","2026-04-29T18:37:26.000Z",2,3,0
          "116489456488730999",vladcampos,Vladimir Campos,"@renchap @Mastodon\nI don't even have a thumbnail. I see the text and the link in blue, but nothing happens when I tap on it. Also, the hashtags are not clickable. I'm using iOS 17.4.1.","https://mastodon.social/@vladcampos/116489456488730999","2026-04-29T18:42:20.528Z",1,1,0
          "116489467664687556",renchap@oisaur.com,Renaud Chaput,"@vladcampos @Mastodon\nWait, hashtags are not clickable either? That sounds like a bug in the app, or maybe something specific to your device/settings. If you can, please report it on GitHub with some screenshots/videos!","https://oisaur.com/@renchap/116489467618032749","2026-04-29T18:45:11.000Z",3,1,1
          "116489481232822180",vladcampos,Vladimir Campos,"@renchap @Mastodon\nSure, I'll do that. I've tried restarting the app but it didn't help. I'll open an issue. Thanks!","https://mastodon.social/@vladcampos/116489481232822180","2026-04-29T18:48:37.766Z",2,0,0
        fetched_comment_count: 5
        provider: Mastodon
        embed_ref: mastodon-we-re-p7U
