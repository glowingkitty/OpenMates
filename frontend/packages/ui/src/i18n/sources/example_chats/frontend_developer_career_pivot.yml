summary:
  context: "Summary of example chat: Frontend Developer Career Pivot"
  en: "Explore realistic career directions for a burned-out frontend developer and turn them into a low-risk 30-day experiment."
  de: "Erkunde realistische Karrierewege für einen ausgebrannten Frontend-Entwickler und mache daraus ein risikoarmes 30-Tage-Experiment."
  zh: "为一位感到倦怠的前端开发者探索现实的职业方向，并把它们转化为低风险的 30 天实验。"
  es: "Explora direcciones profesionales realistas para un desarrollador frontend agotado y conviértelas en un experimento de 30 días de bajo riesgo."
  fr: "Explorer des pistes professionnelles réalistes pour un développeur frontend épuisé et les transformer en expérience de 30 jours à faible risque."
  pt: "Explore caminhos de carreira realistas para um desenvolvedor frontend esgotado e transforme-os em um experimento de 30 dias de baixo risco."
  ru: "Изучите реалистичные карьерные направления для выгоревшего фронтенд-разработчика и превратите их в низкорисковый 30-дневный эксперимент."
  ja: "燃え尽き気味のフロントエンド開発者に現実的なキャリアの方向性を示し、低リスクな30日間の実験に落とし込みます。"
  ko: "번아웃을 겪는 프론트엔드 개발자를 위한 현실적인 커리어 방향을 살펴보고, 위험이 낮은 30일 실험으로 바꿉니다."
  it: "Esplora direzioni di carriera realistiche per uno sviluppatore frontend in burnout e trasformale in un esperimento di 30 giorni a basso rischio."
  tr: "Tükenmişlik yaşayan bir frontend geliştirici için gerçekçi kariyer yönlerini keşfedin ve bunları düşük riskli 30 günlük bir deneye dönüştürün."
  vi: "Khám phá các hướng nghề nghiệp thực tế cho một lập trình viên frontend bị kiệt sức và biến chúng thành một thử nghiệm 30 ngày ít rủi ro."
  id: "Jelajahi arah karier realistis untuk pengembang frontend yang mengalami burnout dan ubah menjadi eksperimen 30 hari yang berisiko rendah."
  pl: "Poznaj realistyczne kierunki kariery dla wypalonego frontend developera i zamień je w niskiego ryzyka 30-dniowy eksperyment."
  nl: "Verken realistische loopbaanrichtingen voor een opgebrande frontendontwikkelaar en zet ze om in een 30-daags experiment met weinig risico."
  ar: "استكشف مسارات مهنية واقعية لمطور واجهات أمامية يعاني من الاحتراق المهني، وحولها إلى تجربة منخفضة المخاطر لمدة 30 يوما."
  hi: "एक बर्नआउट महसूस कर रहे फ्रंटएंड डेवलपर के लिए वास्तविक करियर दिशाएं खोजें और उन्हें कम जोखिम वाले 30-दिन के प्रयोग में बदलें।"
  th: "สำรวจเส้นทางอาชีพที่เป็นจริงสำหรับนักพัฒนา frontend ที่หมดไฟ และเปลี่ยนให้เป็นการทดลอง 30 วันที่มีความเสี่ยงต่ำ"
  cs: "Prozkoumejte realistické kariérní směry pro vyhořelého frontend vývojáře a převeďte je do nízkorizikového 30denního experimentu."
