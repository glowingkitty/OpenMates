  context: "assistant message 2 in example chat: Organic Grocery Delivery in Berlin. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "91a1a938-12c3-47f9-a00b-e9a59d2a8ad2", "app_id": "web", "skill_id": "search", "query": "organic grocery delivery Berlin", "provider": "Brave"}
    ```

