message_2:
  context: "assistant message 2 in example chat: Memory Books Currently Reading. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved memory for [Project Hail Mary](wiki:Project_Hail_Mary) by [Andy Weir](wiki:Andy_Weir), you are currently around page 250 and prefer a pace of 25 pages per night.

    Here is your spoiler-free one-week reading plan to keep you on track:

    *   **Night 1:** Page 250 to 275
    *   **Night 2:** Page 275 to 300
    *   **Night 3:** Page 300 to 325
    *   **Night 4:** Page 325 to 350
    *   **Night 5:** Page 350 to 375
    *   **Night 6:** Page 375 to 400
    *   **Night 7:** Page 400 to 425

    By the end of the week, you'll have progressed 175 pages deeper into the story. Enjoy the journey with Ryland Grace!
  de: |
    Basierend auf deinem gespeicherten Gedächtnis für [Der Astronaut](wiki:Project_Hail_Mary) von [Andy Weir](wiki:Andy_Weir) bist du gerade etwa auf Seite 250 und bevorzugst ein Tempo von 25 Seiten pro Abend.
    
    Hier ist dein spoilerfreier Leseplan für eine Woche, um dich auf Kurs zu halten:
    
    *   **Abend 1:** Seite 250 bis 275
    *   **Abend 2:** Seite 275 bis 300
    *   **Abend 3:** Seite 300 bis 325
    *   **Abend 4:** Seite 325 bis 350
    *   **Abend 5:** Seite 350 bis 375
    *   **Abend 6:** Seite 375 bis 400
    *   **Abend 7:** Seite 400 bis 425
    
    Bis zum Ende der Woche wirst du 175 Seiten tiefer in die Geschichte eingetaucht sein. Viel Spaß auf der Reise mit Ryland Grace!
