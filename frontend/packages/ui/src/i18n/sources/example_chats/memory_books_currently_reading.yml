message_1:
  context: "user message 1 in example chat: Memory Books Currently Reading. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Use my saved currently-reading memory to make a simple spoiler-free one-week reading plan. You may request and use that saved memory. After using the saved memory, do not search the web, do not use app skills, do not create documents or files, do not create embeds, and do not ask a follow-up question."
  de: Nutze mein gespeichertes Gedächtnis für aktuell gelesene Bücher, um einen einfachen, spoilerfreien Leseplan für eine Woche zu erstellen. Du darfst dieses gespeicherte Gedächtnis anfordern und verwenden. Nachdem du das gespeicherte Gedächtnis verwendet hast, suche nicht im Web, nutze keine App-Skills, erstelle keine Dokumente oder Dateien, erstelle keine Embeds und stelle keine Folgefrage.
