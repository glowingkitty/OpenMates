    ```
    
    Since you're a **hands-on learner** who prefers starting with tiny examples and immediate exercises, I've designed a 30-minute "Sprints" plan for you. 
    
    We’ll focus on the [JavaScript](wiki:JavaScript) [Event Loop](wiki:Event_loop), which is the engine that allows code to be non-blocking even though it's single-threaded.
    
    ### ⏱️ The 30-Minute Sprint Plan
    
    ```json
    {"type": "sheet", "embed_id": "10eeaf07-1a2b-4a97-95b5-c6061babfcf8"}
    ```
    
    
    ---
    
    ### Phase 1: The Call Stack (0-5 mins)
    The [Call Stack](wiki:Call_stack) is like a stack of plates. JavaScript can only do one thing at a time, working from the top down.
    
    **Tiny Example:**
    ```json
    {"type": "code", "embed_id": "070166e4-c07e-46dc-9e47-52c959c4ed54"}
    ```
    
    
    *Logic: `Start` → `greet()` is called → `Hello!` → `greet()` finishes → `End`.*
    
    #### 🛠️ Exercise 1: Quick Predict
    What is the exact output of this code?
    ```json
    {"type": "code", "embed_id": "1b8ce624-5dbe-46ea-90d3-cbe74f16709c"}
    ```
    
    
    
    ---
    
    ### Visual Aid: How it looks
    Before we move to the async parts, keep this mental model in mind. The Event Loop's job is simply to look at the **Task Queues** and move things to the **Call Stack** only when it's empty.
    
    [!](embed:dev.to-wqJ)
    [!](embed:medium.com-gBU)
    [!](embed:rapidops.com-3RC)
    
    ---
    
    ### Phase 2: The Task Queue (5-15 mins)
    When you use `setTimeout`, the browser doesn't stop. It hands the timer to a "Web API" helper. Once the timer finishes, the helper puts the callback into the **Task Queue**.
    
    **Tiny Example:**
    ```json
    {"type": "code", "embed_id": "4040d5e4-4969-4df4-9ac5-fe1104f60ece"}
    ```
    
    
    *Output: `A`, `C`, `B`. Because the stack must be empty before the Event Loop picks up `B`.*
    
    #### 🛠️ Exercise 2: The Delay Twist
    How long does it take for `Message 2` to appear?
    
    
    
    ---
    
    ### Phase 3: The Microtask Queue (15-25 mins)
    [Promises](wiki:Futures_and_promises) go into a high-priority "Microtask Queue." The Event Loop checks this queue **after every single task** and empties it entirely before moving to the next regular Task (like `setTimeout`).
    
    **Tiny Example:**
    
    
    *Output: `Promise` then `Timer`. Promises always cut the line.*
    
    ---
    
    ### Phase 4: The Final Boss (25-30 mins)
    Ready for the ultimate test? Try to predict this full sequence.
    
    ```interactive_question
    {
      "type": "choice",
      "id": "event_loop_boss",
      "multiple": false,
      "question": "What is the correct output order for this code snippet?",
      "options": [
        { "id": "ans_1", "text": "Start, End, Promise, Timeout" },
        { "id": "ans_2", "text": "Start, Promise, End, Timeout" },
        { "id": "ans_3", "text": "Start, End, Timeout, Promise" }
      ]
    }
    ```
    
    javascript:boss_challenge.js
    console.log("Start");
    
    setTimeout(() => {
      console.log("Timeout");
    }, 0);
    
    Promise.resolve().then(() => {
      console.log("Promise");
    });
    
    console.log("End");
    
    
