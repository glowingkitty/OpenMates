message_2:
  context: "assistant message 2 in example chat: Memory Ai Learning Preferences. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    PRACTICE PLAN: JAVASCRIPT PROMISES (30 MINUTES)
    
    Based on your preference for hands-on learning with tiny runnable examples, this plan skips long explanations and focuses on immediate coding.
    
    SECTION 1: THE COMPLETED PROMISE (5 MINUTES)
    A Promise is an object representing the eventual result of an asynchronous operation. You use .then() to handle the result once it arrives.
    Example: const simplePromise = Promise.resolve('Hello World'); simplePromise.then(value => console.log(value));
    
    SECTION 2: EXERCISE 1 - BUILDING A TIMER (10 MINUTES)
    Task: Create a function named waitOneSecond. It should return a new Promise. Inside that promise, use the setTimeout function to call resolve with the string 'Time is up' after 1000 milliseconds. 
    Goal: Practice the Promise constructor syntax and the resolve callback.
    Test: Call waitOneSecond().then(message => console.log(message)) to see if the message appears after a delay.
    
    SECTION 3: EXERCISE 2 - CONDITIONAL OUTCOMES (10 MINUTES)
    Task: Create a promise that checks a variable called 'batteryLevel'. If batteryLevel is greater than 20, resolve with 'System OK'. If it is 20 or less, reject with 'Low Battery'. 
    Goal: Practice using both resolve and reject, then handling them with .then() and .catch().
    Test: Set batteryLevel to 15 and ensure your .catch() block logs the error message correctly.
    
    SECTION 4: FINAL REVIEW (5 MINUTES)
    Reflect on the three states of a promise:
    1. Pending: Initial state, neither fulfilled nor rejected.
    2. Fulfilled: The operation completed successfully.
    3. Rejected: The operation failed.
    Understanding these states helps you debug why a piece of code might be stuck or failing.
