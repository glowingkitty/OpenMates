message_1:
  context: "user message 1 in example chat: Vital Farms SEC Financials. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "For ticker VITL only, get the latest annual financials from official SEC filings. Use one company lookup only. Include revenue, net income, operating cash flow, assets, liabilities, equity, form, filing date, and source. No web search and no investment advice."
  de: Rufe nur für das Tickersymbol VITL die neuesten jährlichen Finanzdaten aus den offiziellen SEC-Einreichungen ab. Nutze nur eine Unternehmenssuche. Beziehe Umsatz, Nettoeinkommen, operativen Cashflow, Vermögenswerte, Verbindlichkeiten, Eigenkapital, Formular, Einreichungsdatum und Quelle mit ein. Keine Websuche und keine Anlageberatung.
  zh: 仅针对股票代码 VITL，从官方 SEC 申报文件中获取最新的年度财务数据。仅使用一次公司查询。包括营收、净利润、经营活动现金流、资产、负债、权益、表格类型、申报日期和来源。不进行网络搜索，不提供投资建议。
  es: Solo para el ticker VITL, obtén los últimos estados financieros anuales de los registros oficiales de la SEC. Usa solo una búsqueda de empresa. Incluye ingresos, ingresos netos, flujo de caja operativo, activos, pasivos, patrimonio neto, formulario, fecha de presentación y fuente. Sin búsqueda web y sin asesoramiento de inversión.
  fr: "Pour le symbole VITL uniquement, obtiens les dernières données financières annuelles à partir des dépôts officiels de la SEC. Utilise une seule recherche d'entreprise. Inclus le chiffre d'affaires, le résultat net, le flux de trésorerie opérationnel, l'actif, le passif, les capitaux propres, le formulaire, la date de dépôt et la source. Pas de recherche sur le web ni de conseils en investissement."
  pt: Apenas para o ticker VITL, obtém os dados financeiros anuais mais recentes dos registros oficiais da SEC. Usa apenas uma consulta de empresa. Inclui receita, lucro líquido, fluxo de caixa operacional, ativos, passivos, patrimônio líquido, formulário, data de arquivamento e fonte. Sem pesquisa na web e sem aconselhamento de investimento.
  ru: "Только для тикера VITL: получи последние годовые финансовые показатели из официальных отчетов SEC. Используй только один поиск по компании. Включи выручку, чистую прибыль, операционный денежный поток, активы, обязательства, капитал, форму, дату подачи и источник. Без поиска в интернете и инвестиционных советов."
  ja: ティッカー VITL についてのみ、公式の SEC 提出書類から最新の年次財務情報を取得してください。会社検索は 1 回のみ使用してください。収益、純利益、営業キャッシュフロー、資産、負債、資本、フォーム、提出日、およびソースを含めてください。ウェブ検索や投資アドバイスは行わないでください。
  ko: 티커 VITL에 대해서만 공식 SEC 공시 자료에서 최신 연간 재무 정보를 가져와 줘. 기업 조회는 한 번만 사용해. 매출, 순이익, 영업 현금 흐름, 자산, 부채, 자본, 양식, 공시 날짜 및 출처를 포함해 줘. 웹 검색과 투자 조언은 제외해.
  it: Solo per il ticker VITL, ottieni i dati finanziari annuali più recenti dai depositi ufficiali SEC. Usa una sola ricerca aziendale. Includi ricavi, utile netto, flusso di cassa operativo, attività, passività, patrimonio netto, modulo, data di deposito e fonte. Nessuna ricerca web e nessuna consulenza finanziaria.
  tr: Yalnızca VITL sembolü için, resmi SEC dosyalarından en son yıllık finansal verileri getir. Yalnızca bir şirket araması kullan. Gelir, net gelir, işletme nakit akışı, varlıklar, yükümlülükler, özkaynaklar, form, dosyalama tarihi ve kaynağı dahil et. Web araması yapma ve yatırım tavsiyesi verme.
  vi: Chỉ đối với mã cổ phiếu VITL, hãy lấy báo cáo tài chính hàng năm mới nhất từ các hồ sơ SEC chính thức. Chỉ sử dụng một lần tra cứu công ty. Bao gồm doanh thu, thu nhập ròng, dòng tiền hoạt động, tài sản, nợ phải trả, vốn chủ sở hữu, mẫu đơn, ngày nộp và nguồn. Không tìm kiếm trên web và không đưa ra lời khuyên đầu tư.
  id: Khusus untuk ticker VITL, dapatkan laporan keuangan tahunan terbaru dari pengajuan resmi SEC. Gunakan satu pencarian perusahaan saja. Sertakan pendapatan, laba bersih, arus kas operasional, aset, liabilitas, ekuitas, formulir, tanggal pengajuan, dan sumber. Tanpa pencarian web dan tanpa saran investasi.
  pl: Tylko dla symbolu VITL, pobierz najnowsze roczne dane finansowe z oficjalnych zgłoszeń SEC. Użyj tylko jednego wyszukiwania firmy. Uwzględnij przychody, dochód netto, operacyjne przepływy pieniężne, aktywa, zobowiązania, kapitał własny, formularz, datę złożenia i źródło. Bez wyszukiwania w internecie i bez porad inwestycyjnych.
  nl: Haal alleen voor ticker VITL de meest recente jaarcijfers op uit officiële SEC-indieningen. Gebruik slechts één bedrijfszoekopdracht. Vermeld omzet, nettoresultaat, operationele kasstroom, activa, passiva, eigen vermogen, formulier, indieningsdatum en bron. Geen zoekopdrachten op internet en geen beleggingsadvies.
  ar: لرمز التداول VITL فقط، احصل على أحدث البيانات المالية السنوية من تقارير هيئة الأوراق المالية والبورصات (SEC) الرسمية. استخدم بحثاً واحداً فقط عن الشركة. قم بتضمين الإيرادات، وصافي الدخل، والتدفق النقدي التشغيلي، والأصول، والالتزامات، وحقوق الملكية، والنموذج، وتاريخ التقديم، والمصدر. لا تستخدم البحث في الويب ولا تقدم نصائح استثمارية.
  hi: केवल टिकर VITL के लिए, आधिकारिक SEC फाइलिंग से नवीनतम वार्षिक वित्तीय विवरण प्राप्त करें। केवल एक कंपनी लुकअप का उपयोग करें। इसमें राजस्व (revenue), शुद्ध आय (net income), परिचालन नकदी प्रवाह (operating cash flow), संपत्ति (assets), देनदारियां (liabilities), इक्विटी (equity), फॉर्म, फाइलिंग तिथि और स्रोत शामिल करें। कोई वेब खोज नहीं और कोई निवेश सलाह नहीं।
  th: สำหรับ ticker VITL เท่านั้น ให้ดึงข้อมูลทางการเงินประจำปีล่าสุดจากการยื่นแบบอย่างเป็นทางการต่อ SEC ใช้การค้นหาบริษัทเพียงครั้งเดียวเท่านั้น ระบุรายได้, กำไรสุทธิ, กระแสเงินสดจากการดำเนินงาน, สินทรัพย์, หนี้สิน, ส่วนของผู้ถือหุ้น, รูปแบบแบบฟอร์ม, วันที่ยื่น และแหล่งที่มา ไม่ต้องค้นหาเว็บและไม่มีคำแนะนำด้านการลงทุน
  cs: Pouze pro ticker VITL získej nejnovější výroční finanční údaje z oficiálních podání SEC. Použij pouze jedno vyhledání společnosti. Uveď tržby, čistý zisk, provozní peněžní toky, aktiva, závazky, vlastní kapitál, typ formuláře, datum podání a zdroj. Žádné vyhledávání na webu a žádné investiční poradenství.
  sv: Endast för tickern VITL, hämta de senaste årsredovisningarna från officiella SEC-arkiveringar. Använd endast en företagsuppslagning. Inkludera intäkter, nettoresultat, operativt kassaflöde, tillgångar, skulder, eget kapital, formulär, arkiveringsdatum och källa. Ingen webbsökning och ingen investeringsrådgivning.
  he: עבור הטיקר VITL בלבד, קבל את הנתונים הפיננסיים השנתיים העדכניים ביותר מדיווחים רשמיים של ה-SEC. השתמש בחיפוש חברה אחד בלבד. כלול הכנסות, רווח נקי, תזרים מזומנים מפעילות שוטפת, נכסים, התחייבויות, הון עצמי, סוג הטופס, תאריך הדיווח ומקור. ללא חיפוש באינטרנט וללא ייעוץ השקעות.
  verified_by_human: []

