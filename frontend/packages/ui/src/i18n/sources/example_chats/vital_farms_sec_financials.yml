  en: "A Business app example that retrieves Vital Farms annual financials from official SEC EDGAR filings."
  de: Ein Beispiel für eine Business-App, die jährliche Finanzdaten von Vital Farms aus offiziellen SEC EDGAR-Einreichungen abruft.
  zh: 一个商业应用示例，用于从官方 SEC EDGAR 申报文件中检索 Vital Farms 的年度财务数据。
  es: Un ejemplo de aplicación empresarial que recupera los estados financieros anuales de Vital Farms a partir de los registros oficiales de la SEC EDGAR.
  fr: "Un exemple d'application Business qui récupère les données financières annuelles de Vital Farms à partir des dépôts officiels SEC EDGAR."
  pt: Um exemplo de app de negócios que recupera os dados financeiros anuais da Vital Farms a partir dos registros oficiais da SEC EDGAR.
  ru: Пример бизнес-приложения, которое извлекает годовую финансовую отчетность Vital Farms из официальных документов SEC EDGAR.
  ja: SEC EDGAR の公式提出書類から Vital Farms の年次財務情報を取得するビジネスアプリの例。
