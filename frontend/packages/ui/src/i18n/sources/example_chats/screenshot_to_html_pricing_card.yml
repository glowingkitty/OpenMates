summary:
  context: "Summary of example chat: Screenshot to HTML pricing card"
  en: "Watch OpenMates turn a pricing-card screenshot into a standalone inline HTML code embed with visual QA metadata."
  de: "Sieh, wie OpenMates aus einem Screenshot einer Preiskarte ein eigenständiges Inline-HTML-Code-Embed mit visuellen QA-Metadaten erstellt."
  zh: "观看 OpenMates 如何把价格卡片截图转换成带有视觉 QA 元数据的独立内联 HTML 代码嵌入。"
  es: "Mira cómo OpenMates convierte una captura de una tarjeta de precios en un embed de código HTML inline e independiente con metadatos de QA visual."
  fr: "Regardez OpenMates transformer la capture d'une carte tarifaire en embed de code HTML inline autonome avec des métadonnées de QA visuelle."
  pt: "Veja o OpenMates transformar uma captura de um cartão de preços em um embed de código HTML inline e autônomo com metadados de QA visual."
  ru: "Посмотрите, как OpenMates превращает скриншот ценовой карточки в автономный inline HTML-embed с метаданными визуального QA."
  ja: "OpenMates が料金カードのスクリーンショットを、視覚 QA メタデータ付きの独立したインライン HTML コード埋め込みに変換する様子をご覧ください。"
  ko: "OpenMates가 가격 카드 스크린샷을 시각적 QA 메타데이터가 포함된 독립형 인라인 HTML 코드 임베드로 바꾸는 과정을 확인하세요."
  it: "Guarda OpenMates trasformare lo screenshot di una scheda prezzi in un embed di codice HTML inline autonomo con metadati di QA visiva."
  tr: "OpenMates'in bir fiyat kartı ekran görüntüsünü görsel QA meta verileriyle bağımsız bir inline HTML kod embed'ine dönüştürmesini izleyin."
  vi: "Xem OpenMates biến ảnh chụp thẻ giá thành một embed mã HTML inline độc lập kèm siêu dữ liệu QA trực quan."
  id: "Lihat OpenMates mengubah tangkapan layar kartu harga menjadi embed kode HTML inline mandiri dengan metadata QA visual."
  pl: "Zobacz, jak OpenMates zamienia zrzut ekranu karty cenowej w samodzielny embed kodu HTML inline z metadanymi wizualnego QA."
  nl: "Bekijk hoe OpenMates een screenshot van een prijskaart omzet in een zelfstandige inline HTML-code-embed met visuele QA-metadata."
  ar: "شاهد كيف يحول OpenMates لقطة شاشة لبطاقة تسعير إلى تضمين كود HTML مضمن ومستقل مع بيانات QA مرئية."
  hi: "देखें कि OpenMates कैसे एक मूल्य कार्ड स्क्रीनशॉट को विज़ुअल QA मेटाडेटा वाले स्वतंत्र inline HTML कोड embed में बदलता है।"
  th: "ดู OpenMates เปลี่ยนภาพหน้าจอการ์ดราคาให้เป็น embed โค้ด HTML แบบ inline ที่ทำงานได้เอง พร้อมข้อมูล QA ด้านภาพ"
  cs: "Podívejte se, jak OpenMates mění snímek cenové karty na samostatný inline embed HTML kódu s metadaty vizuální QA."
  sv: "Se hur OpenMates gör om en skärmbild av ett priskort till en fristående inline HTML-kodembed med visuell QA-metadata."
  he: "צפו ב-OpenMates הופך צילום מסך של כרטיס תמחור להטמעת קוד HTML עצמאית ו-inline עם מטא-נתוני QA חזותיים."
  verified_by_human: []

message_1:
  context: "user message 1 in example chat: Screenshot to HTML pricing card. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Please turn this screenshot into a standalone inline HTML code embed. Match the screenshot closely and keep it self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  de: |
    Bitte wandle diesen Screenshot in ein eigenständiges Inline-HTML-Code-Embed um. Triff den Screenshot möglichst genau und halte alles in sich abgeschlossen.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  zh: |
    请把这个截图转换成一个独立的 inline HTML 代码 embed。请尽量贴近截图，并保持自包含。
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  es: |
    Convierte esta captura en un embed de código HTML inline e independiente. Haz que se parezca mucho a la captura y mantenlo autocontenido.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  fr: |
    Transforme cette capture en embed de code HTML inline autonome. Reproduis la capture aussi fidèlement que possible et garde le tout autonome.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  pt: |
    Transforme esta captura em um embed de código HTML inline e independente. Faça ficar bem próximo da captura e mantenha tudo autocontido.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  ru: |
    Преврати этот скриншот в автономный inline HTML code embed. Сделай его максимально похожим на скриншот и полностью самодостаточным.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  ja: |
    このスクリーンショットを、独立したインライン HTML コード embed に変換してください。スクリーンショットにできるだけ近づけ、自包含にしてください。
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  ko: |
    이 스크린샷을 독립형 인라인 HTML 코드 embed로 변환해 주세요. 스크린샷과 최대한 비슷하게 만들고 자체 포함 상태를 유지해 주세요.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  it: |
    Trasforma questo screenshot in un embed di codice HTML inline autonomo. Rendilo il più fedele possibile allo screenshot e mantienilo autocontenuto.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  tr: |
    Lütfen bu ekran görüntüsünü bağımsız bir inline HTML kod embed'ine dönüştür. Ekran görüntüsüne çok yakın olsun ve tamamen kendi içinde çalışsın.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  vi: |
    Hãy biến ảnh chụp màn hình này thành một embed mã HTML inline độc lập. Hãy khớp sát ảnh chụp và giữ mọi thứ tự chứa.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  id: |
    Ubah tangkapan layar ini menjadi embed kode HTML inline mandiri. Buat semirip mungkin dengan tangkapan layar dan tetap self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  pl: |
    Zamień ten zrzut ekranu w samodzielny inline HTML code embed. Dopasuj go możliwie blisko do zrzutu i zachowaj pełną samowystarczalność.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  nl: |
    Zet deze screenshot om in een zelfstandige inline HTML-code-embed. Laat hem nauw aansluiten op de screenshot en houd alles self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  ar: |
    حوّل لقطة الشاشة هذه إلى embed مستقل لكود HTML inline. اجعله مطابقا للقطة قدر الإمكان ومكتفيا بذاته.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  hi: |
    कृपया इस स्क्रीनशॉट को एक स्वतंत्र inline HTML code embed में बदल दें। इसे स्क्रीनशॉट से जितना हो सके मिलाएं और self-contained रखें।
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  th: |
    โปรดเปลี่ยนภาพหน้าจอนี้ให้เป็น embed โค้ด HTML แบบ inline ที่ทำงานได้เอง ให้ใกล้เคียงกับภาพหน้าจอและเก็บทุกอย่างไว้ในตัวเอง
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  cs: |
    Přeměň tento snímek obrazovky na samostatný inline HTML code embed. Co nejvěrněji ho přizpůsob snímku a zachovej ho jako self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  sv: |
    Gör om den här skärmbilden till en fristående inline HTML-kodembed. Matcha skärmbilden noggrant och håll allt self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  he: |
    הפוך את צילום המסך הזה להטמעת קוד HTML עצמאית ו-inline. התאם אותו מקרוב לצילום המסך ושמור עליו self-contained.
    [!](embed:simple-card-input-png-fcfe81c4-5baa-4580-afa07b)
  verified_by_human: []

