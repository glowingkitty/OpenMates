    * **Inelastic Demand:** Economic metrics confirm egg demand elasticity is roughly -0.15. This means consumers consider eggs an essential staple; a mere 1% drop in national supply forces market prices to rise by about 6.67% to balance demand.
    * **Historical Collusion:** It is a legal fact that major egg producers have manipulated markets before. In late 2023, a federal jury found Cal-Maine and others liable for an antitrust conspiracy to artificially restrict egg supplies between 1998 and 2008.
    
    **Inferred Evidence:**
    * **Current Price Fixing:** While record profits are confirmed, the idea that the 2024–2026 price spikes were driven by *illegal collusion* remains inferred. The DOJ opened an investigation in April 2026, and class-action lawsuits allege producers used industry benchmarking software to coordinate prices, but definitive legal proof for this recent period is still pending.
    * **"Greedflation" vs. Windfall:** Policymakers infer that the narrative of "bird flu" is being used as a smokescreen to artificially inflate profit margins. 
    * **Retailer Gouging:** Consumers widely infer that local grocery stores are price-gouging them. However, industry data suggests this is largely false; standard retail margins on eggs remain a modest 10% to 15%, with the massive margin expansions happening entirely at the producer level.
    
