    ## Evidence
    To accurately assess the situation, it is critical to separate verifiable facts from economic theories and allegations.
    
    **Confirmed Evidence:**
    *   **USDA and Industry Data:** It is confirmed that production dropped to 9.1 billion dozen in 2022 due to the culling of over 50 million birds, and that baseline costs for feed, labor, and packaging definitively increased.
    *   **Retailer Admissions of Price Gouging:** During an August 2024 FTC antitrust trial, an internal email revealed a senior Kroger executive admitting that retail inflation on eggs and milk was intentionally kept "significantly higher than cost inflation." 
    *   **Record Corporate Profits:** SEC filings confirm that Cal-Maine Foods recorded historic profits during the crisis while simultaneously receiving approximately $42 million in USDA compensation for culled flocks.
    *   **Prop 12 Regional Costs:** Peer-reviewed analysis (Purdue University) confirmed through structural break tests that Prop 12 directly added $0.25 to $0.73 per dozen strictly to the cost of eggs in California.
    *   **Historical Antitrust Guilt:** In late 2023, a federal jury confirmed that Cal-Maine and Rose Acre Farms engaged in illegal price-fixing to limit supply from 2004 to 2008, resulting in a $53 million penalty.
    
    **Inferred Evidence:**
    *   **Nationwide Regulatory Impact:** The DOJ's 2025 lawsuit claiming that California's Prop 12 caused egg prices to skyrocket *nationwide* is inferred. Economists note it is difficult to untangle Prop 12's national impact from HPAI and general inflation.
    *   **Coordinated Supply Restriction (2022–2025):** Advocacy groups infer that the major producers deliberately slowed the replenishment of flocks to artificially restrict supply and sustain high prices. This theory is the basis of an ongoing 2025 DOJ antitrust probe, but illegal collusion for this specific period has not yet been proven in court.
    *   **Market Clearing Mechanism:** Macroeconomists infer that the high prices during the HPAI outbreaks were a necessary function to ration limited supply. If prices hadn't spiked, they infer grocery stores would have faced total stock-outs.
    
    ## Counterarguments
    Industry defenders argue that blaming "greedflation" ignores the macroeconomic realities of food production, asserting that the new prices reflect permanently higher baseline input costs.
    
    *   **Feed Costs:** Layer feed relies heavily on corn and soybean meal, which saw massive global inflation between 2022 and 2024 due to geopolitical conflicts and fertilizer shortages. 
    *   **Labor and Transportation:** Following the "Great Resignation," agricultural and retail sectors had to permanently raise wages to retain workers. Furthermore, spikes in diesel prices increased the "last-mile" transportation costs of refrigerated goods, and the cost of corrugated cardboard for egg cartons experienced heavy inflation. 
    *   **Biosecurity Overhead:** The constant, unpredictable threat of wild bird migrations carrying HPAI has forced farms to spend significantly more on permanent biosecurity infrastructure, which gets baked into the wholesale cost.
    
    ## Bottom Line
    The initial explosion in egg prices was a legitimate result of the avian flu wiping out tens of millions of hens, compounded by soaring global feed, labor, and transportation costs. However, once the flocks recovered and wholesale prices began to cool, highly consolidated egg producers and dominant grocery retailers used the ongoing narrative of supply chain chaos as a smokescreen. By exploiting inelastic consumer demand, they delayed price drops and padded their profit margins, turning a temporary biological crisis into a permanent shift in consumer costs.
