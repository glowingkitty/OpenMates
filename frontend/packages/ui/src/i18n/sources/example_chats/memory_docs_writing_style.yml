message_2:
  context: "assistant message 2 in example chat: Document writing style memory. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved [writing style preferences](/#settings/app_store/docs/settings_memories/writing_style), I've outlined a changelog entry for your new import feature. I applied your "Plain-language" and "Changelog Brief" rules: short headings, active voice, concrete user impact, and zero hype.
    
    ### Import from CSV and JSON
    **Upload data directly from CSV and JSON files.** You can now import external datasets to populate your projects automatically. This eliminates manual data entry, prevents copy-paste errors, and allows you to sync data from other tools in seconds.
    
    ***
    
    **How this matches your style:**
    *   **Short Heading:** Focused on the action and file types.
    *   **Active Voice:** Starts with "Upload" and "Import" rather than "A new feature has been added."
    *   **User Impact:** Clearly explains that it saves time and prevents errors.
    *   **No Hype:** Avoided adjectives like "powerful," "easy," or "amazing."
    
    Would you like me to generate this as a [formal document](/#settings/apps/docs) for your internal records, or should we refine the technical details?
    
    **Next steps:**
    *   Do you want to add specific details about file size limits or field mapping?
    *   Should I draft a longer version for a blog post using a similar "no-hype" style?
