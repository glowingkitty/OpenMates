    ### Practical Exercise: The "Hand-Drawn" Transformation

    To build your intuition for graphics and matrix operations, perform the following exercise:

    1.  **Define a Shape:** On a piece of graph paper (or a digital equivalent), plot three points: $A(1, 1)$, $B(3, 1)$, and $C(2, 3)$. Connect them to form a triangle.
