message_2:
  context: "assistant message 2 in example chat: Memory Home Saved Listings. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    Based on your saved listing for the [Neukölln](wiki:Berlin-Neukölln) canal studio near Weserstraße, here are the specific questions you should ask the provider before your viewing. These questions incorporate the concerns you already noted in your memory and expand on them for a [Berlin](wiki:Berlin) rental context:
    
    *   **Noise & Nightlife:** "As the apartment is located near Weserstraße, how effective is the [soundproofing](wiki:Soundproofing) of the windows against evening street noise and nearby bar activity?"
    *   **Internet Infrastructure:** "What is the maximum [internet speed](wiki:Internet_access) currently available at this address, and which providers are active in the building?"
    *   **Heating & Utility Breakdown:** "Could you provide a detailed breakdown of the 'warm' rent? Specifically, what type of [heating](wiki:Heating) system is used (e.g., gas floor heating or central district heating), and what was the actual consumption cost for the previous tenant?"
    *   **Thermal Insulation:** "Are the canal-facing windows double or triple-glazed, and has the building undergone recent energy-efficient renovations to help with [thermal insulation](wiki:Building_insulation)?"
    *   **Basement & Storage:** "Does the studio include a dedicated cellar (Keller) space for storage, and is there a secure area for bicycle parking?"
    *   **Rental Contract Specifics:** "Is the rental agreement limited-term (befristet) or indefinite (unbefristet), and is there a minimum rental period (Mindestmietdauer) required?"
