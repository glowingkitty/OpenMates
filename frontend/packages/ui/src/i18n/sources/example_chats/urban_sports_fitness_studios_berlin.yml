    *   **[Fenriz Gym](embed:fenriz-gym-aaZ)** (0.88 km)
        Ein bekannter Ort fuer [Mixed Martial Arts](wiki:Mixed_martial_arts), [Brazilian Jiu-Jitsu](wiki:Brazilian_jiu-jitsu) und allgemeines Fitnesstraining. Das Gym liegt in der Lobeckstrasse und ist fuer seine professionelle Trainingsatmosphaere beliebt.
    *   **[BOULDERKLUB Kreuzberg](embed:boulderklub-kreuzberg-DAJ)** (0.89 km)
        Eine der beliebtesten [Boulder](wiki:Bouldering)-Hallen der Stadt, nahe dem [Goerlitzer Park](wiki:Görlitzer_Park). Dort gibt es viele Routen fuer unterschiedliche Levels.
    *   **[Sommerbad Kreuzberg](embed:sommerbad-kreuzberg-8o7)** (0.88 km)
        Lokal als "Prinzenbad" bekannt, ist dieses ikonische Freibad ideal zum Bahnenziehen oder zum Abkuehlen im Sommer.
    *   **[STORM Bootcamp Berlin - Neue Welt](embed:storm-bootcamp-berlin-Y1M)** (1.54 km)
        Nahe [Hermannplatz](wiki:Hermannplatz) bietet dieses Studio intensive [HIIT](wiki:High-intensity_interval_training)-Einheiten, die Laufband-Intervalle mit Krafttraining kombinieren.
    *   **[HYROX Performance Center Kreuzberg](embed:hyrox-performance-center-Kyk)** (1.20 km)
        Spezialisiert auf [HYROX](wiki:Hyrox)-Training, [Crosstraining](wiki:Crossfit) und allgemeine Fitness fuer alle, die wettkampforientiert trainieren moechten.
    *   **[presence+blade @Bethanien](embed:presence-blade-bethanien-4U9)** (0.69 km)
        Eine besondere Option, wenn du dich fuer [Fechten](wiki:Fencing) interessierst, direkt am Mariannenplatz.
    
    ### Kurze Uebersicht der Optionen
    ```json
    {"type": "sheet", "embed_id": "5a802314-c1ad-49b2-9eff-2c80f20c7cb1"}
    ```
    
