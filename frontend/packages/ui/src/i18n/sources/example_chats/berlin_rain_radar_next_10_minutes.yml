summary:
  context: "Summary of example chat: Berlin Rain Radar for the Next 10 Minutes"
  en: "A quick weather chat that checks DWD rain radar for Berlin and answers whether rain is expected soon."
  de: Ein kurzer Wetter-Chat, der das DWD-Regenradar für Berlin prüft und beantwortet, ob bald Regen zu erwarten ist.
  zh: 一个快速的天气对话，通过查询 DWD 柏林降雨雷达来回答近期是否会有降雨。
  es: Un chat meteorológico rápido que consulta el radar de lluvia del DWD para Berlín y responde si se espera lluvia pronto.
  fr: Une discussion météo rapide qui consulte le radar de pluie du DWD pour Berlin et indique si de la pluie est prévue prochainement.
  pt: Um chat meteorológico rápido que verifica o radar de chuva do DWD para Berlim e responde se há previsão de chuva em breve.
  ru: Короткий чат о погоде, который проверяет дождевой радар DWD для Берлина и сообщает, ожидается ли дождь в ближайшее время.
  ja: ベルリンのDWD雨量レーダーを確認し、すぐに雨が降るかどうかを回答するクイックお天気チャット。
  ko: 베를린의 DWD 강수 레이더를 확인하여 곧 비가 올지 알려주는 간단한 날씨 채팅입니다.
  it: Una rapida chat meteo che controlla il radar pioggia del DWD per Berlino e risponde se è prevista pioggia a breve.
  tr: Berlin için DWD yağmur radarını kontrol eden ve yakında yağmur beklenip beklenmediğini yanıtlayan hızlı bir hava durumu sohbeti.
  vi: Một cuộc trò chuyện nhanh về thời tiết để kiểm tra radar mưa của DWD cho Berlin và trả lời xem liệu sắp có mưa hay không.
  id: Obrolan cuaca singkat yang memeriksa radar hujan DWD untuk Berlin dan menjawab apakah hujan akan segera turun.
  pl: Krótki czat pogodowy, który sprawdza radar opadów DWD dla Berlina i odpowiada, czy wkrótce spodziewany jest deszcz.
  nl: Een korte weerchat die de DWD-regenradar voor Berlijn controleert en antwoordt of er binnenkort regen wordt verwacht.
  ar: دردشة سريعة حول الطقس تتحقق من رادار المطر التابع لـ DWD في برلين وتجيب عما إذا كان من المتوقع هطول الأمطار قريباً.
  hi: मौसम के बारे में एक त्वरित चैट जो बर्लिन के लिए DWD रेन रडार की जाँच करती है और बताती है कि क्या जल्द ही बारिश होने की संभावना है।
  th: แชทพยากรณ์อากาศสั้นๆ ที่ตรวจสอบเรดาร์ฝน DWD สำหรับเบอร์ลิน และตอบว่าจะมีฝนตกเร็วๆ นี้หรือไม่
  cs: Rychlý chat o počasí, který kontroluje srážkový radar DWD pro Berlín a odpovídá na otázku, zda se brzy očekává déšť.
  sv: "En snabb väderchatt som kollar DWD:s regnradar för Berlin och svarar på om det förväntas regna snart."
  he: "צ'אט מזג אוויר מהיר שבודק את מכ\"ם הגשם של ה-DWD עבור ברלין ועונה אם צפוי גשם בקרוב."
  verified_by_human: []

message_1:
  context: "user message 1 in example chat: Berlin Rain Radar for the Next 10 Minutes. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Will it rain in Berlin in the next 10 minutes? Show me the rain radar."
  de: "Wird es in Berlin in den nächsten 10 Minuten regnen? Zeig mir das Regenradar."
  zh: 柏林未来 10 分钟内会下雨吗？给我看下降雨雷达图。
  es: "¿Va a llover en Berlín en los próximos 10 minutos? Muéstrame el radar de lluvia."
  fr: "Va-t-il pleuvoir à Berlin dans les 10 prochaines minutes ? Montre-moi le radar de pluie."
  pt: "Vai chover em Berlim nos próximos 10 minutos? Mostra-me o radar de chuva."
  ru: "Будет ли дождь в Берлине в ближайшие 10 минут? Покажи мне дождевой радар."
  ja: ベルリンで今後10分間に雨は降りますか？雨量レーダーを見せてください。
  ko: "향후 10분 동안 베를린에 비가 올까요? 강수 레이더를 보여주세요."
  it: "Pioverà a Berlino nei prossimi 10 minuti? Mostrami il radar pioggia."
  tr: "Önümüzdeki 10 dakika içinde Berlin'de yağmur yağacak mı? Bana yağmur radarını göster."
  vi: "Liệu Berlin có mưa trong 10 phút tới không? Cho tôi xem radar mưa."
  id: "Apakah akan hujan di Berlin dalam 10 menit ke depan? Tunjukkan radar hujannya."
  pl: "Czy w ciągu najbliższych 10 minut będzie padać w Berlinie? Pokaż mi radar opadów."
  nl: "Gaat het de komende 10 minuten regenen in Berlijn? Laat me de regenradar zien."
  ar: هل ستمطر في برلين خلال العشر دقائق القادمة؟ أرني رادار المطر.
  hi: "क्या अगले 10 मिनट में बर्लिन में बारिश होगी? मुझे रेन रडार दिखाओ।"
  th: "ในอีก 10 นาทีข้างหน้าฝนจะตกในเบอร์ลินไหม? ขอดูเรดาร์ฝนหน่อย"
  cs: "Bude v Berlíně v příštích 10 minutách pršet? Ukaž mi srážkový radar."
  sv: "Kommer det att regna i Berlin de närmaste 10 minuterna? Visa mig regnradarn."
  he: "האם ירד גשם בברלין ב-10 הדקות הקרובות? תראה לי את מכ\"ם הגשם."
  verified_by_human: []

message_2:
