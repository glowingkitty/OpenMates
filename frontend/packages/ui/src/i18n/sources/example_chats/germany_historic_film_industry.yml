    C’est un chapitre fascinant de l’histoire du cinéma ! Tu as raison : dans les **années 1920**, surtout pendant la [République de Weimar](wiki:Weimar_Republic), l’Allemagne centrée sur Berlin était le seul véritable concurrent mondial d’Hollywood. En innovation artistique et en prestige technique, beaucoup d’historiens diraient même qu’elle était alors plus avancée que l’industrie américaine.
    
    Voici pourquoi Berlin est devenue une capitale du cinéma pendant cette décennie dorée :
    
    ### 1. Le "Hollywood sur la Spree"
    Berlin a reçu le surnom de **"Hollywood sur la Spree"** grâce à son immense infrastructure de production. Au centre se trouvait [Studio Babelsberg](wiki:Babelsberg_Studio), fondé en 1912 et toujours le **plus ancien grand studio de cinéma du monde**.
    
    Hollywood produisait plus de films en quantité, mais l’[UFA](wiki:UFA_GmbH) allemande faisait partie des studios les plus avancés techniquement. Elle a popularisé la "caméra déchaînée", les mouvements complexes de grue et de dolly, ainsi que des effets spéciaux qui ont façonné le cinéma moderne.
    
    [!](embed:portlandgermanfilmfestival.com-7p8)
    [!](embed:studiobabelsberg.com-PK8)
    
    ### 2. La naissance de chefs-d’œuvre visuels
    Nombre des films muets les plus influents étaient allemands. L’[expressionnisme allemand](wiki:German_Expressionism) utilisait des décors déformés, des ombres dramatiques et une profondeur psychologique qui ont marqué l’horreur, la science-fiction et le [film noir](wiki:Film_noir).
    
    *   **[Metropolis](wiki:Metropolis_(1927_film)) (1927) :** Le jalon de science-fiction de [Fritz Lang](wiki:Fritz_Lang), avec des décors et des images qu’Hollywood pouvait à peine égaler.
    *   **[Le Cabinet du docteur Caligari](wiki:The_Cabinet_of_Dr._Caligari) (1920) :** Un film qui a contribué à inventer le langage visuel de l’horreur et du noir.
    *   **[Nosferatu](wiki:Nosferatu) (1922) :** L’adaptation non officielle de *Dracula* par [F.W. Murnau](wiki:F.W._Murnau), encore l’un des films d’horreur les plus saisissants.
    
    [!](embed:gcfphotography.com-dSE)
    [!](embed:dailyartmagazine.com-9Tk)
    
    ### 3. Pourquoi cela a changé
    La domination berlinoise a décliné au début des années 1930 pour deux raisons principales :
    
    1.  **Crise économique :** La Grande Dépression a durement frappé l’Allemagne, et des épopées coûteuses comme *Metropolis* ont presque ruiné les studios.
    2.  **Montée du nazisme :** Après 1933, de nombreux artistes juifs et antinazis ont fui vers les États-Unis.
    
    Des réalisateurs comme [Fritz Lang](wiki:Fritz_Lang), [Billy Wilder](wiki:Billy_Wilder) et [Ernst Lubitsch](wiki:Ernst_Lubitsch), ainsi que des stars comme [Marlene Dietrich](wiki:Marlene_Dietrich), ont apporté le style berlinois à Hollywood. C’est pourquoi le film noir américain des années 1940 et l’horreur Universal doivent tant au cinéma allemand des années 1920.
    
    ### 4. Babelsberg aujourd’hui
    [Studio Babelsberg](wiki:Babelsberg_Studio) est toujours actif. Depuis les années 2000, des productions comme *[The Grand Budapest Hotel](wiki:The_Grand_Budapest_Hotel)*, *[Inglourious Basterds](wiki:Inglourious_Basterds)* et *[John Wick: Chapter 4](wiki:John_Wick:_Chapter_4)* y ont été tournées.
    
