    ¡Es una parte fascinante de la historia del cine! Tienes razón: durante los **años veinte**, especialmente en la época de la [República de Weimar](wiki:Weimar_Republic), Alemania, con Berlín como centro, fue el único competidor global real de Hollywood. En innovación artística y prestigio técnico, muchos historiadores dirían incluso que estaba por delante de la industria estadounidense de entonces.
    
    Así fue como Berlín se convirtió durante una década dorada en una capital del cine:
    
    ### 1. El "Hollywood del Spree"
    Berlín recibió el apodo de **"Hollywood del Spree"** por su enorme infraestructura de producción. En el centro estaba [Studio Babelsberg](wiki:Babelsberg_Studio), fundado en 1912 y todavía el **estudio cinematográfico a gran escala más antiguo del mundo**.
    
    Hollywood producía más películas en volumen, pero la [UFA](wiki:UFA_GmbH) alemana estaba entre los estudios más avanzados técnicamente. Pionera de la "cámara desencadenada", los movimientos elaborados de grúa y dolly, y efectos especiales que moldearon el cine moderno.
    
    [!](embed:portlandgermanfilmfestival.com-7p8)
    [!](embed:studiobabelsberg.com-PK8)
    
    ### 2. El nacimiento de obras maestras visuales
    Muchas de las películas más influyentes del cine mudo fueron alemanas. El [expresionismo alemán](wiki:German_Expressionism) usó decorados distorsionados, sombras dramáticas y profundidad psicológica para definir después el terror, la ciencia ficción y el [cine negro](wiki:Film_noir).
    
    *   **[Metropolis](wiki:Metropolis_(1927_film)) (1927):** La película de ciencia ficción fundamental de [Fritz Lang](wiki:Fritz_Lang), con decorados e imágenes que Hollywood apenas podía igualar.
    *   **[El gabinete del Dr. Caligari](wiki:The_Cabinet_of_Dr._Caligari) (1920):** Una obra que ayudó a inventar el lenguaje visual del terror y el noir.
    *   **[Nosferatu](wiki:Nosferatu) (1922):** La adaptación no oficial de *Dracula* de [F.W. Murnau](wiki:F.W._Murnau), todavía una de las películas de terror más impactantes.
    
    [!](embed:gcfphotography.com-dSE)
    [!](embed:dailyartmagazine.com-9Tk)
    
    ### 3. Por qué cambió
    El dominio de Berlín se desvaneció a comienzos de los años treinta por dos razones principales:
    
    1.  **Crisis económica:** La Gran Depresión golpeó duramente a Alemania, y epopeyas caras como *Metropolis* casi arruinaron a los estudios.
    2.  **Ascenso del nazismo:** Después de 1933, muchos artistas judíos y antinazis huyeron a Estados Unidos.
    
    Directores como [Fritz Lang](wiki:Fritz_Lang), [Billy Wilder](wiki:Billy_Wilder) y [Ernst Lubitsch](wiki:Ernst_Lubitsch), junto con estrellas como [Marlene Dietrich](wiki:Marlene_Dietrich), llevaron el estilo berlinés a Hollywood. Por eso el noir estadounidense de los cuarenta y el terror de Universal deben tanto al cine alemán de los veinte.
    
    ### 4. Babelsberg hoy
    [Studio Babelsberg](wiki:Babelsberg_Studio) sigue activo. Desde los años 2000, producciones como *[The Grand Budapest Hotel](wiki:The_Grand_Budapest_Hotel)*, *[Inglourious Basterds](wiki:Inglourious_Basterds)* y *[John Wick: Chapter 4](wiki:John_Wick:_Chapter_4)* se han rodado allí.
    
