summary:
  context: Summary of example chat about Weimar cinema, Studio Babelsberg, German Expressionism, and Hollywood
  en: "A discussion of Germany's 1920s film industry, Berlin's influence, Studio Babelsberg, German Expressionism, and how the rise of Nazism shifted talent to Hollywood."
  de: "Eine Diskussion über Deutschlands Filmindustrie der 1920er, Berlins Einfluss, Studio Babelsberg, den deutschen Expressionismus und wie der Aufstieg des Nationalsozialismus Talente nach Hollywood trieb."
  zh: "讨论德国 1920 年代电影产业、柏林的影响、巴贝尔斯贝格制片厂、德国表现主义，以及纳粹崛起如何将人才推向好莱坞。"
  es: "Una conversación sobre la industria cinematográfica alemana de los años veinte, la influencia de Berlín, Studio Babelsberg, el expresionismo alemán y cómo el ascenso del nazismo desplazó talento a Hollywood."
