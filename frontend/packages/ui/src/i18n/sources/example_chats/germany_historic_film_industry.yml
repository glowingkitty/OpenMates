    ```
    
    Das ist ein faszinierendes Kapitel der Filmgeschichte! Du hast recht: In den **1920er-Jahren**, besonders während der [Weimarer Republik](wiki:Weimar_Republic), war Deutschland mit Berlin als Zentrum der einzige echte globale Konkurrent Hollywoods. In künstlerischer Innovation und technischem Prestige war es nach Ansicht vieler Historiker sogar weiter als die US-Industrie dieser Zeit.
    
    Darum wurde Berlin für ein goldenes Jahrzehnt zur Filmhauptstadt:
    
    ### 1. Das "Hollywood an der Spree"
    Berlin bekam den Spitznamen **"Hollywood an der Spree"** wegen seiner riesigen Produktionsinfrastruktur. Im Mittelpunkt stand [Studio Babelsberg](wiki:Babelsberg_Studio), gegründet 1912 und bis heute das **älteste Großfilmstudio der Welt**.
    
    Hollywood produzierte mengenmäßig mehr Filme, aber Deutschlands [UFA](wiki:UFA_GmbH) gehörte zu den technisch fortschrittlichsten Studios überhaupt. Sie prägte die "entfesselte Kamera", aufwendige Kran- und Dollyfahrten sowie Spezialeffekte, die das moderne Kino beeinflussten.
    
    [!](embed:portlandgermanfilmfestival.com-7p8)
    [!](embed:studiobabelsberg.com-PK8)
    
    ### 2. Die Geburt visueller Meisterwerke
    Viele der einflussreichsten Stummfilme kamen aus Deutschland. Der [deutsche Expressionismus](wiki:German_Expressionism) nutzte verzerrte Kulissen, dramatische Schatten und psychologische Tiefe und prägte später Horror, Science-Fiction und [Film Noir](wiki:Film_noir).
    
    *   **[Metropolis](wiki:Metropolis_(1927_film)) (1927):** [Fritz Lang](wiki:Fritz_Lang)s wegweisender Science-Fiction-Film mit gewaltigen Sets und Bildern, mit denen Hollywood kaum mithalten konnte.
    *   **[Das Cabinet des Dr. Caligari](wiki:The_Cabinet_of_Dr._Caligari) (1920):** Ein Film, der die Bildsprache von Horror und Noir mitbegründete.
    *   **[Nosferatu](wiki:Nosferatu) (1922):** [F.W. Murnau](wiki:F.W._Murnau)s inoffizielle *Dracula*-Adaption, bis heute einer der visuell eindrucksvollsten Horrorfilme.
    
    [!](embed:gcfphotography.com-dSE)
    [!](embed:dailyartmagazine.com-9Tk)
    
    ### 3. Warum sich das änderte
    Berlins Dominanz schwand Anfang der 1930er-Jahre aus zwei Hauptgründen:
    
    1.  **Wirtschaftskrise:** Die Weltwirtschaftskrise traf Deutschland hart, und teure Epen wie *Metropolis* brachten Studios fast in den Bankrott.
    2.  **Aufstieg des Nationalsozialismus:** Nach 1933 flohen viele jüdische und regimekritische Künstler in die USA.
    
    Regisseure wie [Fritz Lang](wiki:Fritz_Lang), [Billy Wilder](wiki:Billy_Wilder) und [Ernst Lubitsch](wiki:Ernst_Lubitsch) sowie Stars wie [Marlene Dietrich](wiki:Marlene_Dietrich) brachten den Berliner Stil nach Hollywood. Deshalb verdanken der amerikanische Noir der 1940er und der Universal-Horror so viel dem deutschen Kino der 1920er.
    
    ### 4. Babelsberg heute
    [Studio Babelsberg](wiki:Babelsberg_Studio) ist weiterhin aktiv. Seit den 2000ern wurden dort Produktionen wie *[The Grand Budapest Hotel](wiki:The_Grand_Budapest_Hotel)*, *[Inglourious Basterds](wiki:Inglourious_Basterds)* und *[John Wick: Chapter 4](wiki:John_Wick:_Chapter_4)* gedreht.
    
    **Hast du einige dieser Stummfilmklassiker gesehen, oder interessieren dich eher moderne Filme, die in Berlin gedreht wurden?** Ich kann dir auch helfen, sie zum Streamen zu finden oder eine [Erinnerung](/#settings/apps/reminder) für eine Doku zu setzen.
