  context: Assistant explains Germany and Berlin as major 1920s film centers. JSON tool-call blocks and embed references must stay unchanged.
  en: |
    ```json
    {"type": "app_skill_use", "embed_id": "3f242ede-30f8-44e1-9419-9f832e457982", "app_id": "web", "skill_id": "search", "query": "German cinema vs Hollywood history 1920s production volume influence", "provider": "Brave"}
