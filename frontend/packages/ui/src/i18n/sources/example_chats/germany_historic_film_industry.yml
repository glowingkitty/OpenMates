    Это увлекательная часть истории кино! Вы правы: в **1920-е годы**, особенно во времена [Веймарской республики](wiki:Weimar_Republic), Германия с центром в Берлине была единственным настоящим мировым конкурентом Голливуда. По художественным инновациям и техническому престижу многие историки даже считают её более передовой, чем американскую индустрию того времени.
    
    Вот почему Берлин на золотое десятилетие стал кинематографической столицей:
    
    ### 1. "Голливуд на Шпрее"
    Берлин получил прозвище **"Голливуд на Шпрее"** благодаря огромной производственной инфраструктуре. В центре был [Studio Babelsberg](wiki:Babelsberg_Studio), основанный в 1912 году и до сих пор являющийся **старейшей крупной киностудией в мире**.
    
    Голливуд выпускал больше фильмов по количеству, но немецкая [UFA](wiki:UFA_GmbH) была одной из самых технически продвинутых студий. Она развивала "раскованную камеру", сложные движения кранов и тележек, а также спецэффекты, повлиявшие на современное кино.
    
    [!](embed:portlandgermanfilmfestival.com-7p8)
    [!](embed:studiobabelsberg.com-PK8)
    
    ### 2. Рождение визуальных шедевров
    Многие из самых влиятельных фильмов немой эпохи были немецкими. [Немецкий экспрессионизм](wiki:German_Expressionism) использовал искажённые декорации, драматические тени и психологическую глубину, сформировав будущие хоррор, научную фантастику и [film noir](wiki:Film_noir).
    
    *   **[Metropolis](wiki:Metropolis_(1927_film)) (1927):** веха научной фантастики [Фрица Ланга](wiki:Fritz_Lang) с грандиозными декорациями и образами, с которыми Голливуд едва мог соперничать.
    *   **[Кабинет доктора Калигари](wiki:The_Cabinet_of_Dr._Caligari) (1920):** фильм, помогший изобрести визуальный язык хоррора и нуара.
    *   **[Nosferatu](wiki:Nosferatu) (1922):** неофициальная адаптация *Dracula* от [F.W. Murnau](wiki:F.W._Murnau), до сих пор один из самых впечатляющих фильмов ужасов.
    
    [!](embed:gcfphotography.com-dSE)
    [!](embed:dailyartmagazine.com-9Tk)
    
    ### 3. Почему всё изменилось
    Доминирование Берлина ослабло в начале 1930-х по двум главным причинам:
    
    1.  **Экономический кризис:** Великая депрессия тяжело ударила по Германии, а дорогие эпопеи вроде *Metropolis* почти разорили студии.
    2.  **Приход нацизма:** После 1933 года многие еврейские и антинацистские художники бежали в США.
    
    Режиссёры [Fritz Lang](wiki:Fritz_Lang), [Billy Wilder](wiki:Billy_Wilder), [Ernst Lubitsch](wiki:Ernst_Lubitsch), а также звёзды вроде [Marlene Dietrich](wiki:Marlene_Dietrich) перенесли берлинский стиль в Голливуд. Поэтому американский нуар 1940-х и хорроры Universal так многим обязаны немецкому кино 1920-х.
    
    ### 4. Babelsberg сегодня
    [Studio Babelsberg](wiki:Babelsberg_Studio) всё ещё работает. С 2000-х там снимались *[The Grand Budapest Hotel](wiki:The_Grand_Budapest_Hotel)*, *[Inglourious Basterds](wiki:Inglourious_Basterds)* и *[John Wick: Chapter 4](wiki:John_Wick:_Chapter_4)*.
    
