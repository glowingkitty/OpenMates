    ```
    
    Das Wetter in [Berlin](wiki:Berlin) wird in den nächsten Tagen eine Mischung aus warmem Sonnenschein und einer kurzen Regenperiode sein, gefolgt von kühleren, windigen Bedingungen. Hier ist die Vorhersage und was sie für deinen Alltag bedeutet.
    
    ### 🌤️ Wettervorhersage (8. Juni – 12. Juni)
    
    *   **Montag (8. Juni):** Der wärmste Tag der Woche. Erwarte eine Höchsttemperatur von **24,3 °C** und eine Tiefsttemperatur von **12,1 °C**. Es wird überwiegend trocken und teils bewölkt sein.
    *   **Dienstag (9. Juni):** Ein spürbarer Umschwung. Die Temperaturen sinken auf maximal **18,3 °C** bei einer **Regenwahrscheinlichkeit von 44 %** über den Tag verteilt. Erwarte etwa 10 Stunden leichten Regen und böigen Wind bis zu 40 km/h.
    *   **Mittwoch – Freitag (10.–12. Juni):** Beständiges „Berliner Grau“, aber meist trocken. Die Höchstwerte liegen zwischen **16 °C und 19 °C**, mit kühlen Morgenstunden um **10 °C**. Der Freitag wird besonders windig mit Böen bis zu 40 km/h.
    
    [!](embed:berlin-weather-2026-KeQ)
    [!](embed:berlin-weather-2026-ywP)
    [!](embed:berlin-weather-2026-4Gl)
    
    ---
    
    ### 🧥 Praktische Kleidungstipps
    
    Der Schlüssel für diese Woche ist der **Zwiebellook**. Die Temperaturunterschiede in Berlin zwischen dem frühen Morgen und dem späten Nachmittag können erheblich sein.
    
    1.  **Montag:** Standard-Sommerkleidung wie T-Shirts und leichte Hosen. Packe einen leichten Pullover oder eine Jeansjacke für den Morgen oder späte Abende ein.
    2.  **Dienstag (der Regentag):** Du brauchst eine zuverlässige wasserdichte Shell oder einen Regenmantel. Da die Temperaturen mild sind (18 °C), vermeide schwere, gefütterte Mäntel; eine atmungsaktive Regenjacke über einer leichten Schicht ist am besten, um beim Gehen nicht zu überhitzen.
    3.  **Mi–Fr:** Übergang zurück in den „Frühlingsmodus“. Eine leichte Bomberjacke, ein Windbreaker oder ein mittelschwerer Pullover sind ratsam. Wenn du kälteempfindlich bist, hilft ein leichter Schal gegen die ständige Brise.
    
    [!](embed:vogue.com-d6E)
    [!](embed:vogue.com-mqs)
    [!](embed:vogue.com-sZU)
    
    ---
    
    ### 🚲 Tipps für den Arbeitsweg mit dem Rad
    
    Die Berliner Fahrradkultur ist hart im Nehmen, aber Wind und Regen in dieser Woche erfordern etwas Vorbereitung.
    
    *   **Achte auf den Wind:** Böen von 40 km/h am Dienstag und Freitag können einen erheblichen [Windchill-Effekt](wiki:Wind_chill) erzeugen und das Treten gegen den Gegenwind deutlich anstrengender machen. Wenn du ein E-Bike hast, erhöhe die Unterstützung; wenn nicht, fahre 5–10 Minuten früher los als sonst.
    *   **Der Regen am Dienstag:** Wenn du am Dienstag radeln musst, sind Schutzbleche ein Lebensretter für deine Kleidung. Trage eine Regenhose oder nimm Wechselkleidung mit. Sei vorsichtig bei Kopfsteinpflaster („Berliner Pflaster“) und Straßenbahnschienen, da diese bei Nässe extrem rutschig werden.
    *   **Sichtbarkeit:** Bei bewölktem Himmel und Regen solltest du darauf achten, dass deine Fahrradbeleuchtung geladen ist. Auch tagsüber hilft Licht, bei grauem Regenwetter für Autofahrer sichtbar zu bleiben.
    
    !
    [!](embed:gettyimages.com-Wh8)
    
    **Nächste Schritte:**
    *   Soll ich einen [Fahrradladen in der Nähe](/#settings/apps/maps) für einen kurzen Check-up vor den windigen Tagen suchen?
    *   Ich kann auch eine [Erinnerung einstellen](/#settings/apps/reminder), damit du am Dienstagmorgen an deinen Regenschirm oder deine Regenkleidung denkst.
