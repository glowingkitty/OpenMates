summary:
  context: "Summary of example chat: Rostock Heavy Rain Radar"
  en: "A live weather chat that checks DWD rain radar for Rostock and shows heavy rain on the radar timeline."
  de: Ein Live-Wetter-Chat, der das DWD-Regenradar für Rostock prüft und Starkregen auf der Radar-Timeline anzeigt.
  zh: 一个实时天气聊天，用于检查德国气象局（DWD）针对罗斯托克的降雨雷达，并在雷达时间轴上显示大雨情况。
  es: Un chat meteorológico en vivo que consulta el radar de lluvia del DWD para Rostock y muestra lluvia intensa en la línea de tiempo del radar.
  fr: Un chat météo en direct qui consulte le radar de pluie du DWD pour Rostock et affiche les fortes pluies sur la chronologie du radar.
  pt: Um chat meteorológico em direto que consulta o radar de chuva do DWD para Rostock e mostra chuva forte na linha do tempo do radar.
  ru: Погодный чат в реальном времени, который проверяет радар осадков DWD для Ростока и показывает сильный дождь на временной шкале радара.
  ja: ロストックのDWD雨雲レーダーを確認し、レーダーのタイムライン上で激しい雨を表示するライブ気象チャットです。
  ko: 로스토크의 DWD 강수 레이더를 확인하고 레이더 타임라인에 폭우 상황을 표시해 주는 실시간 날씨 채팅이야.
  it: Una chat meteo in tempo reale che controlla il radar della pioggia del DWD per Rostock e mostra le forti piogge sulla timeline del radar.
  tr: Rostock için DWD yağmur radarını kontrol eden ve radar zaman çizelgesinde şiddetli yağmuru gösteren canlı bir hava durumu sohbeti.
  vi: Một cuộc trò chuyện thời tiết trực tiếp kiểm tra radar mưa DWD cho Rostock và hiển thị mưa lớn trên dòng thời gian radar.
  id: Obrolan cuaca langsung yang memeriksa radar hujan DWD untuk Rostock dan menunjukkan hujan deras pada linimasa radar.
  pl: Czat pogodowy na żywo, który sprawdza radar opadów DWD dla Rostocku i pokazuje ulewne deszcze na osi czasu radaru.
  nl: Een live weer-chat die de DWD-regenradar voor Rostock controleert en zware regenval op de radartijdlijn toont.
  ar: دردشة طقس مباشرة تتحقق من رادار الأمطار التابع لـ DWD لمدينة روستوك وتعرض الأمطار الغزيرة على الجدول الزمني للرادار.
  hi: एक लाइव मौसम चैट जो रोस्टॉक के लिए DWD बारिश रडार की जाँच करती है और रडार टाइमलाइन पर भारी बारिश दिखाती है।
  th: แชทพยากรณ์อากาศสดที่ตรวจสอบเรดาร์ฝน DWD สำหรับเมืองรอสต็อก และแสดงฝนตกหนักบนไทม์ไลน์ของเรดาร์
  cs: Živý meteorologický chat, který kontroluje srážkový radar DWD pro Rostock a zobrazuje silný déšť na časové ose radaru.
  sv: "En väderchatt i realtid som kontrollerar DWD:s regnradar för Rostock och visar kraftigt regn på radartidslinjen."
  he: "צ'אט מזג אוויר חי שבודק את מכ\"ם הגשם של DWD עבור רוסטוק ומציג גשם כבד על ציר הזמן של המכ\"ם."
  verified_by_human: []

message_1:
  context: "user message 1 in example chat: Rostock Heavy Rain Radar. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: "Is it raining in Rostock right now? Show me the rain radar."
  de: "Regnet es gerade in Rostock? Zeig mir das Regenradar."
  zh: 罗斯托克现在在下雨吗？给我看下雨量雷达图。
  es: "¿Está lloviendo en Rostock ahora mismo? Muéstrame el radar de lluvia."
  fr: "Est-ce qu'il pleut à Rostock en ce moment ? Montre-moi le radar de pluie."
  pt: "Está a chover em Rostock agora? Mostra-me o radar de chuva."
  ru: "В Ростоке сейчас идет дождь? Покажи мне радар осадков."
  ja: ロストックで今、雨は降っていますか？雨雲レーダーを見せてください。
  ko: "지금 로스토크에 비가 오고 있니? 강수 레이더를 보여줘."
  it: "Sta piovendo a Rostock in questo momento? Mostrami il radar della pioggia."
  tr: "Şu an Rostock'ta yağmur yağıyor mu? Bana yağmur radarını göster."
  vi: "Hiện tại ở Rostock có đang mưa không? Cho tôi xem radar mưa."
  id: "Apakah sedang hujan di Rostock sekarang? Tunjukkan radar hujannya."
  pl: "Czy w Rostocku teraz pada? Pokaż mi radar opadów."
  nl: "Regent het momenteel in Rostock? Laat me de regenradar zien."
  ar: هل تمطر في روستوك الآن؟ أرني رادار الأمطار.
  hi: "क्या अभी रोस्टॉक में बारिश हो रही है? मुझे बारिश का रडार दिखाओ।"
  th: "ตอนนี้ที่รอสต็อกฝนตกไหม? ขอดูเรดาร์ฝนหน่อย"
  cs: "Prší teď v Rostocku? Ukaž mi srážkový radar."
  sv: "Regnar det i Rostock just nu? Visa mig regnradarn."
  he: "האם יורד גשם ברוסטוק כרגע? הראה לי את מכ\"ם הגשם."
  verified_by_human: []

message_2:
  context: "assistant message 2 in example chat: Rostock Heavy Rain Radar. Keep markdown, JSON code blocks, embed links, source quote links, and placeholders unchanged."
  en: |
    ```json
