    Oui, il pleut actuellement beaucoup à [Rostock](wiki:Rostock). Selon les dernières données du [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst), la ville subit des précipitations importantes, qui devraient se poursuivre pendant au moins les deux prochaines heures.
    
    Le radar indique une couverture de zone de pluie de 100 % dans ton voisinage, avec des intensités atteignant des niveaux records. Tu devrais peut-être rester à l'intérieur pendant un moment !
    
    Veux-tu voir les [prévisions horaires détaillées](/#settings/apps/weather) pour le reste de la nuit ?
  pt: |
    ```json
