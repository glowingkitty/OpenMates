    Ya, saat ini sedang hujan deras di [Rostock](wiki:Rostock). Menurut data terbaru dari [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst), kota ini sedang mengalami curah hujan yang signifikan, yang diperkirakan akan berlanjut setidaknya selama dua jam ke depan.
    
    Radar menunjukkan cakupan area hujan 100% di sekitarmu, dengan intensitas mencapai level puncak. Kamu mungkin sebaiknya tetap berada di dalam ruangan untuk sementara waktu!
    
