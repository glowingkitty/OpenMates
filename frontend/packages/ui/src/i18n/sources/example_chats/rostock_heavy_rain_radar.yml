    是的，目前 [罗斯托克](wiki:Rostock) 正在下大雨。根据 [德国气象局](wiki:Deutscher_Wetterdienst) 的最新数据，该市正经历显著降水，预计将持续至少接下来的两个小时。
    
    雷达显示你附近区域的降雨覆盖率为 100%，强度已达到峰值。你可能需要待在室内一段时间！
    
    你想查看今晚剩余时间的 [详细每小时预报](/#settings/apps/weather) 吗？
