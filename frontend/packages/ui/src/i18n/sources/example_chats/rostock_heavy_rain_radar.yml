    Ja, in [Rostock](wiki:Rostock) regnet es derzeit stark. Nach den neuesten Daten des [Deutschen Wetterdienstes](wiki:Deutscher_Wetterdienst) gibt es in der Stadt erhebliche Niederschläge, die voraussichtlich noch mindestens zwei Stunden anhalten werden.
    
    Das Radar zeigt eine 100%ige Regenabdeckung in deiner Nähe mit Intensitäten auf Höchstniveau. Vielleicht solltest du erst einmal drinnen bleiben!
    
    Möchtest du die [detaillierte stündliche Vorhersage](/#settings/apps/weather) für den Rest der Nacht sehen?
