    Да, в [Ростоке](wiki:Rostock) сейчас идет сильный дождь. Согласно последним данным [Немецкой метеорологической службы](wiki:Deutscher_Wetterdienst), в городе наблюдаются значительные осадки, которые, как ожидается, продлятся еще как минимум два часа.
    
    Радар показывает 100% охват зоны дождя в твоем районе, при этом интенсивность достигает пиковых значений. Возможно, стоит на время остаться в помещении!
    
