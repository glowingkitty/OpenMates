    はい、現在[ロストック](wiki:Rostock)では激しい雨が降っています。[ドイツ気象局](wiki:Deutscher_Wetterdienst)の最新データによると、市内ではかなりの降水が観測されており、少なくとも今後2時間は続く見込みです。
    
    レーダーでは、周辺地域の100%が雨雲に覆われており、強度はピークに達しています。しばらくは屋内にいたほうがいいかもしれません！
    
    今夜の残りの時間の[詳細な1時間ごとの予報](/#settings/apps/weather)を確認しますか？
  ko: |
    ```json
    {"type": "app_skill_use", "embed_id": "deb8e4c2-e07c-49c3-ae5c-300a21859563", "app_id": "weather", "skill_id": "rain_radar", "query": "Rostock rain radar", "provider": "Deutscher Wetterdienst (DWD) via Bright Sky", "location": "Rostock"}
    ```
    
    응, 현재 [로스토크](wiki:Rostock)에 폭우가 내리고 있어. [독일 기상청](wiki:Deutscher_Wetterdienst)의 최신 데이터에 따르면, 도시에 상당한 강수량이 기록되고 있으며 이는 적어도 향후 2시간 동안 지속될 것으로 예상돼.
    
    레이더를 보면 네 주변 지역의 강수 구역 범위가 100%이며, 강도는 최고 수준에 도달했어. 당분간은 실내에 머무는 게 좋겠어!
    
    남은 밤 시간 동안의 [상세한 시간별 예보](/#settings/apps/weather)를 확인해 볼래?
  it: |
    ```json
    {"type": "app_skill_use", "embed_id": "deb8e4c2-e07c-49c3-ae5c-300a21859563", "app_id": "weather", "skill_id": "rain_radar", "query": "Rostock rain radar", "provider": "Deutscher Wetterdienst (DWD) via Bright Sky", "location": "Rostock"}
    ```
    
    Sì, attualmente sta piovendo forte a [Rostock](wiki:Rostock). Secondo gli ultimi dati del [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst), la città sta registrando precipitazioni significative, che dovrebbero continuare per almeno le prossime due ore.
    
    Il radar indica una copertura dell'area piovosa del 100% nelle tue vicinanze, con intensità che raggiungono livelli di picco. Potrebbe essere meglio restare al chiuso per un po'!
    
    Vuoi vedere le [previsioni orarie dettagliate](/#settings/apps/weather) per il resto della notte?
  tr: |
    ```json
    {"type": "app_skill_use", "embed_id": "deb8e4c2-e07c-49c3-ae5c-300a21859563", "app_id": "weather", "skill_id": "rain_radar", "query": "Rostock rain radar", "provider": "Deutscher Wetterdienst (DWD) via Bright Sky", "location": "Rostock"}
    ```
    
    Evet, şu anda [Rostock](wiki:Rostock)'ta şiddetli yağmur yağıyor. [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst)'ten alınan son verilere göre, şehirde en az önümüzdeki iki saat boyunca devam etmesi beklenen önemli miktarda yağış görülüyor.
    
    Radar, çevrende %100 yağmur alanı kapsamı ve zirve seviyelere ulaşan yoğunluklar gösteriyor. Bir süre kapalı alanda kalmak isteyebilirsin!
    
    Gecenin geri kalanı için [ayrıntılı saatlik tahmini](/#settings/apps/weather) görmek ister misin?
  vi: |
    ```json
