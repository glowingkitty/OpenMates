    ```
    
    Vâng, hiện tại trời đang mưa lớn ở [Rostock](wiki:Rostock). Theo dữ liệu mới nhất từ [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst), thành phố đang có lượng mưa đáng kể, dự kiến sẽ kéo dài trong ít nhất hai giờ tới.
    
    Radar cho thấy độ bao phủ vùng mưa là 100% ở khu vực lân cận của bạn, với cường độ đạt mức đỉnh điểm. Bạn có lẽ nên ở trong nhà một lát!
    
    Bạn có muốn xem [dự báo chi tiết theo giờ](/#settings/apps/weather) cho thời gian còn lại của đêm nay không?
  id: |
    ```json
    {"type": "app_skill_use", "embed_id": "deb8e4c2-e07c-49c3-ae5c-300a21859563", "app_id": "weather", "skill_id": "rain_radar", "query": "Rostock rain radar", "provider": "Deutscher Wetterdienst (DWD) via Bright Sky", "location": "Rostock"}
