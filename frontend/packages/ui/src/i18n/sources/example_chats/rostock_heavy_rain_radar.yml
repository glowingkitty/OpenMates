    Sim, está a chover intensamente em [Rostock](wiki:Rostock) neste momento. De acordo com os dados mais recentes do [Deutscher Wetterdienst](wiki:Deutscher_Wetterdienst), a cidade está a registar precipitação significativa, que deverá continuar durante, pelo menos, as próximas duas horas.
    
    O radar indica uma cobertura de 100% de área de chuva nas tuas proximidades, com intensidades a atingir níveis de pico. Talvez queiras ficar em casa por uns tempos!
    
    Queres ver a [previsão horária detalhada](/#settings/apps/weather) para o resto da noite?
  ru: |
    ```json
    {"type": "app_skill_use", "embed_id": "deb8e4c2-e07c-49c3-ae5c-300a21859563", "app_id": "weather", "skill_id": "rain_radar", "query": "Rostock rain radar", "provider": "Deutscher Wetterdienst (DWD) via Bright Sky", "location": "Rostock"}
