    ```
    
    Since you prefer traveling by **[train](wiki:Train)**, there are some fantastic scenic getaways perfect for a June weekend. Since I don't have your current city in your settings, I've selected a few of the most popular rail-accessible destinations for this time of year:
    
    ### 🚆 Recommended Weekend Rail Getaways (June 2026)
    
    *   **Napa Valley, California:** Perfect for a "car-free" weekend. You can take the train into Northern California and use the **[Napa Valley Wine Train](wiki:Napa_Valley_Wine_Train)** for a scenic tour of the vineyards without the hassle of driving.
    *   **[Glacier National Park](wiki:Glacier_National_Park_(U.S.)), Montana:** The **[Empire Builder](wiki:Empire_Builder)** route offers breathtaking views of the Rockies. June is ideal as the snow has mostly melted from the lower trails, but the peaks are still capped.
    *   **The [Hudson Valley](wiki:Hudson_Valley), New York:** If you're on the East Coast, the ride from **Penn Station** up the Hudson River is one of the most beautiful short trips in the country, leading to charming towns like **[Hudson](wiki:Hudson,_New_York)** or **[Beacon](wiki:Beacon,_New_York)**.
    *   **[Canadian Rockies](wiki:Canadian_Rockies):** For a slightly longer weekend, a rail journey from **[Vancouver](wiki:Vancouver)** into the mountains offers world-class service and glass-domed cars for 360-degree views.
    
