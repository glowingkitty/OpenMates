security_reminder.message:
  context: Message in the security reminder notification prompting the user to set up 2FA or passkey
  en: Properly secure your account by setting up 2FA or a passkey.
  de: Sichern Sie Ihr Konto richtig ab, indem Sie 2FA oder einen Passkey einrichten.
  zh: 通过设置两步验证或通行密钥来正确保护您的账户。
  es: Proteja correctamente su cuenta configurando 2FA o una clave de acceso.
  fr: Sécurisez correctement votre compte en configurant la 2FA ou une clé d'accès.
  pt: Proteja adequadamente sua conta configurando 2FA ou uma chave de acesso.
  ru: Надёжно защитите свой аккаунт, настроив двухфакторную аутентификацию или ключ доступа.
  ja: 二要素認証またはパスキーを設定して、アカウントを適切に保護してください。
  ko: 2FA 또는 패스키를 설정하여 계정을 올바르게 보호하세요.
  it: Proteggi correttamente il tuo account configurando la 2FA o una passkey.
  tr: 2FA veya bir geçiş anahtarı ayarlayarak hesabınızı düzgün şekilde güvence altına alın.
  vi: Bảo mật tài khoản đúng cách bằng cách thiết lập 2FA hoặc passkey.
  id: Amankan akun Anda dengan benar dengan mengatur 2FA atau passkey.
  pl: Prawidłowo zabezpiecz swoje konto, konfigurując 2FA lub klucz dostępu.
  nl: Beveilig uw account goed door 2FA of een passkey in te stellen.
