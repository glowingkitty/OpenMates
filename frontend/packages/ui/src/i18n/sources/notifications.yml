  nl: Tik om opnieuw verbinding te maken
  ar: اضغط لإعادة الاتصال
  hi: पुनः कनेक्ट करने के लिए टैप करें
  th: แตะเพื่อเชื่อมต่อใหม่
  cs: Klepnutím se znovu připojte
  sv: Tryck för att återansluta
  he: הקש להתחברות מחדש
