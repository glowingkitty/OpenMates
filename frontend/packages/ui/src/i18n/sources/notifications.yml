# Notifications translations
# Used for system notifications, chat message notifications, and notification permission UI
# Note: Chat settings translations are in settings/chat.yml (settings.chat.* keys)
# All keys must be at root level with flat dot-notation, only language codes (en, de, etc.) are nested

# Auto-logout notifications
auto_logout.title:
  context: Title for auto logout notification
  en: Auto logout
  de: Automatische Abmeldung
  zh: 自动退出
  es: Cierre de sesión automático
  fr: Déconnexion automatique
  pt: Logout automático
  ru: Автовыход
  ja: 自動ログアウト
  ko: 자동 로그아웃
  it: Logout automatico
  tr: Otomatik çıkış
  vi: Tự động đăng xuất
  id: Logout otomatis
  pl: Automatyczne wylogowanie
  nl: Automatisch uitloggen
  ar: تسجيل خروج تلقائي
  hi: स्वचालित लॉगआउट
  th: ออกจากระบบอัตโนมัติ
  cs: Automatické odhlášení
  sv: Automatisk utloggning
  he: התנתקות אוטומטית
auto_logout.consider_stay_logged_in:
  context: Message suggesting to enable stay logged in
  en: "Consider activating 'Stay logged in'."
  de: "Erwägen Sie, 'Eingeloggt bleiben' zu aktivieren."
  zh: "考虑启用\"保持登录\"。"
  es: "Considera activar 'Mantener sesión iniciada'."
  fr: "Envisagez d'activer 'Rester connecté'."
  pt: "Considere ativar 'Manter conectado'."
  ru: "Рассмотрите активацию 'Оставаться в системе'."
  ja: "「ログイン状態を保つ」の有効化を検討してください。"
  ko: "'로그인 유지'를 활성화하는 것을 고려하세요."
  it: "Valuta di attivare 'Rimani connesso'."
  tr: "'Oturumu açık tut' seçeneğini etkinleştirmeyi düşünün."
  vi: "Hãy cân nhắc bật 'Duy trì đăng nhập'."
  id: "Pertimbangkan mengaktifkan 'Tetap masuk'."
  pl: "Rozważ aktywację 'Pozostań zalogowany'."
  nl: "Overweeg 'Ingelogd blijven' te activeren."
  ar: "فكّر في تفعيل 'الإبقاء على تسجيل الدخول'."
  hi: "'लॉगिन रहें' सक्रिय करने पर विचार करें।"
  th: "ลองเปิดใช้ 'คงสถานะเข้าสู่ระบบ'"
  cs: "Zvažte aktivaci 'Zůstat přihlášen'."
  sv: "Överväg att aktivera 'Håll mig inloggad'."
  he: "כדאי להפעיל את 'הישאר מחובר'."
auto_logout.during_login:
  context: Secondary message about when to enable the setting
  en: During login, to remain connected.
  de: Beim Einloggen, um verbunden zu bleiben.
  zh: 登录时启用，以保持连接。
  es: Durante el inicio de sesión, para permanecer conectado.
  fr: Lors de la connexion, pour rester connecté.
  pt: Durante o login, para permanecer conectado.
  ru: При входе, чтобы оставаться в системе.
  ja: ログイン中に接続を維持するために。
  ko: 연결을 유지하려면 로그인 시 설정하세요.
  it: Durante il login, per rimanere connesso.
  tr: Bağlantıda kalmak için giriş sırasında.
  vi: Trong khi đăng nhập, để duy trì kết nối.
  id: Saat login, agar tetap terhubung.
  pl: Podczas logowania, aby pozostać połączonym.
  nl: Tijdens het inloggen, om verbonden te blijven.
  ar: أثناء تسجيل الدخول، للبقاء متصلاً.
  hi: लॉगिन के दौरान, कनेक्टेड रहने के लिए।
  th: ระหว่างเข้าสู่ระบบ เพื่อคงการเชื่อมต่อ
  cs: Při přihlášení, abyste zůstali připojeni.
  sv: Vid inloggning, för att förbli ansluten.
  he: במהלך ההתחברות, כדי להישאר מחובר.

# Connection problem notifications
connection.title:
  context: Title for connection problem notification
  en: "Can't connect to server."
  de: "Verbindung zum Server nicht möglich."
  zh: "无法连接到服务器。"
  es: "No se puede conectar al servidor."
  fr: "Impossible de se connecter au serveur."
  pt: "Não é possível conectar ao servidor."
  ru: "Не удаётся подключиться к серверу."
  ja: "サーバーに接続できません。"
  ko: "서버에 연결할 수 없습니다."
  it: "Impossibile connettersi al server."
  tr: "Sunucuya bağlanılamıyor."
  vi: "Không thể kết nối đến máy chủ."
  id: "Tidak dapat terhubung ke server."
  pl: "Nie można połączyć się z serwerem."
  nl: "Kan geen verbinding maken met de server."
  ar: "تعذّر الاتصال بالخادم."
  hi: "सर्वर से कनेक्ट नहीं हो सका।"
  th: "ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้"
  cs: "Nelze se připojit k serveru."
  sv: "Kan inte ansluta till servern."
  he: לא ניתן להתחבר לשרת.
connection.trying_to_reconnect:
  context: Message about reconnection attempt
  en: Trying to reconnect for {seconds} seconds.
  de: Versuche seit {seconds} Sekunden die Verbindung wiederherzustellen.
  zh: 已尝试重新连接 {seconds} 秒。
  es: Intentando reconectar durante {seconds} segundos.
  fr: Tentative de reconnexion depuis {seconds} secondes.
  pt: Tentando reconectar há {seconds} segundos.
  ru: Попытка переподключения в течение {seconds} секунд.
  ja: "{seconds}秒間再接続を試みています。"
  ko: "{seconds}초 동안 재연결을 시도하고 있습니다."
  it: Tentativo di riconnessione da {seconds} secondi.
  tr: "{seconds} saniyedir yeniden bağlanmaya çalışılıyor."
  vi: Đang cố kết nối lại trong {seconds} giây.
  id: Mencoba menyambung kembali selama {seconds} detik.
  pl: Próba ponownego połączenia przez {seconds} sekund.
  nl: Probeert {seconds} seconden opnieuw verbinding te maken.
  ar: "جارٍ محاولة إعادة الاتصال منذ {seconds} ثانية."
  hi: "{seconds} सेकंड से पुनः कनेक्ट करने का प्रयास।"
  th: "พยายามเชื่อมต่อใหม่มา {seconds} วินาที"
  cs: Pokus o opětovné připojení po dobu {seconds} sekund.
  sv: Försöker återansluta sedan {seconds} sekunder.
  he: "מנסה להתחבר מחדש במשך {seconds} שניות."
connection.offline_mode:
  context: Secondary message about offline mode activation
  en: Else Offline Mode will be activated.
  de: Andernfalls wird der Offline-Modus aktiviert.
  zh: 否则将激活离线模式。
  es: De lo contrario, se activará el modo sin conexión.
  fr: Sinon, le mode hors ligne sera activé.
  pt: Caso contrário, o modo offline será ativado.
  ru: Иначе будет активирован офлайн-режим.
  ja: そうでなければオフラインモードが有効になります。
  ko: 그렇지 않으면 오프라인 모드가 활성화됩니다.
  it: Altrimenti verrà attivata la modalità offline.
  tr: Aksi takdirde Çevrimdışı Modu etkinleştirilecek.
  vi: Nếu không, Chế độ ngoại tuyến sẽ được kích hoạt.
  id: Jika tidak, Mode Offline akan diaktifkan.
  pl: W przeciwnym razie zostanie aktywowany tryb offline.
  nl: Anders wordt de offlinemodus geactiveerd.
  ar: وإلا سيتم تفعيل وضع عدم الاتصال.
  hi: अन्यथा ऑफलाइन मोड सक्रिय हो जाएगा।
  th: มิฉะนั้นโหมดออฟไลน์จะถูกเปิดใช้งาน
  cs: Jinak bude aktivován offline režim.
  sv: Annars aktiveras offlineläge.
  he: אחרת, מצב לא מקוון יופעל.
connection.offline_banner:
  context: Message shown in the notification when the device loses network connectivity
  en: You are offline. Your chats are still available.
  de: Du bist offline. Deine Chats sind weiterhin verfügbar.
  zh: 您处于离线状态。您的聊天仍然可用。
  es: Estás sin conexión. Tus chats siguen disponibles.
  fr: Vous êtes hors ligne. Vos chats sont toujours disponibles.
  pt: Você está offline. Seus chats ainda estão disponíveis.
  ru: Вы в офлайне. Ваши чаты по-прежнему доступны.
  ja: オフラインです。チャットは引き続き利用できます。
  ko: 오프라인 상태입니다. 채팅은 여전히 사용 가능합니다.
  it: Sei offline. Le tue chat sono ancora disponibili.
  tr: Çevrimdışısınız. Sohbetleriniz hâlâ erişilebilir.
  vi: Bạn đang ngoại tuyến. Các chat vẫn khả dụng.
  id: Anda sedang offline. Obrolan Anda masih tersedia.
  pl: Jesteś offline. Twoje czaty są nadal dostępne.
  nl: Je bent offline. Je chats zijn nog steeds beschikbaar.
  ar: أنت غير متصل. محادثاتك لا تزال متاحة.
  hi: आप ऑफलाइन हैं। आपकी चैट अभी भी उपलब्ध हैं।
  th: คุณออฟไลน์อยู่ แต่แชทของคุณยังใช้งานได้
  cs: Jste offline. Vaše chaty jsou stále dostupné.
  sv: Du är offline. Dina chattar är fortfarande tillgängliga.
  he: "אין חיבור לאינטרנט. הצ'אטים שלך עדיין זמינים."
