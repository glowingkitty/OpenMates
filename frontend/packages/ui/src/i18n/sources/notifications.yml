connection.server_updating.title:
  context: Title for the notification shown when the server is restarting after a deployment/update. Distinct from "You are offline" — the user's network is fine, the server is temporarily unavailable.
  en: Server updating
  de: Server wird aktualisiert
  zh: 服务器更新中
  es: Actualizando el servidor
  fr: Mise à jour du serveur
  pt: Atualizando servidor
  ru: Сервер обновляется
  ja: サーバー更新中
  ko: 서버 업데이트 중
  it: Aggiornamento server
  tr: Sunucu güncelleniyor
  vi: Máy chủ đang cập nhật
  id: Server sedang diperbarui
  pl: Aktualizacja serwera
  nl: Server wordt bijgewerkt
  ar: تحديث الخادم
  hi: सर्वर अपडेट हो रहा है
  th: กำลังอัปเดตเซิร์ฟเวอร์
  cs: Server se aktualizuje
  sv: Servern uppdateras
  he: השרת מתעדכן
  verified_by_human: []

connection.server_updating:
  context: Body message shown when the server is restarting. Should reassure the user that reconnection is automatic and no action is needed.
  en: The server is being updated. You'll reconnect automatically in a moment.
  de: Der Server wird aktualisiert. Du wirst gleich automatisch wieder verbunden.
  zh: 服务器正在更新。片刻后您将自动重新连接。
  es: El servidor se está actualizando. Te reconectarás automáticamente en un momento.
  fr: Le serveur est en cours de mise à jour. Vous serez reconnecté automatiquement dans un instant.
  pt: O servidor está sendo atualizado. Você se reconectará automaticamente em breve.
  ru: Сервер обновляется. Вы автоматически переподключитесь через мгновение.
  ja: サーバーが更新されています。まもなく自動的に再接続します。
  ko: 서버가 업데이트 중입니다. 곧 자동으로 재연결됩니다.
  it: Il server è in fase di aggiornamento. Ti riconnetterai automaticamente tra un momento.
  tr: Sunucu güncelleniyor. Bir an içinde otomatik olarak yeniden bağlanacaksınız.
  vi: Máy chủ đang được cập nhật. Bạn sẽ tự động kết nối lại sau một lúc.
  id: Server sedang diperbarui. Anda akan terhubung kembali secara otomatis sebentar lagi.
  pl: Serwer jest aktualizowany. Za chwilę zostaniesz automatycznie ponownie połączony.
  nl: De server wordt bijgewerkt. U wordt over een ogenblik automatisch opnieuw verbonden.
  ar: يتم تحديث الخادم. ستتصل مجددًا تلقائيًا خلال لحظة.
  hi: सर्वर अपडेट हो रहा है। एक पल में आप स्वचालित रूप से पुनः कनेक्ट हो जाएंगे।
  th: เซิร์ฟเวอร์กำลังได้รับการอัปเดต คุณจะเชื่อมต่อใหม่โดยอัตโนมัติในอีกสักครู่
  cs: Server se aktualizuje. Za chvíli se automaticky znovu připojíte.
  sv: Servern uppdateras. Du återansluts automatiskt inom ett ögonblick.
  he: השרת מתעדכן. תתחבר מחדש אוטומטית בעוד רגע.
  verified_by_human: []

# Software update notifications
software_update.title:
  context: Title for software update notification
  en: Software update available
  de: Software-Update verfügbar
  zh: 有可用的软件更新
  es: Actualización de software disponible
  fr: Mise à jour logicielle disponible
  pt: Atualização de software disponível
  ru: Доступно обновление программного обеспечения
  ja: ソフトウェアアップデートが利用可能
  ko: 소프트웨어 업데이트 사용 가능
  it: Aggiornamento software disponibile
  tr: Yazılım güncellemesi mevcut
  vi: Có bản cập nhật phần mềm
  id: Pembaruan perangkat lunak tersedia
  pl: Dostępna aktualizacja oprogramowania
  nl: Software-update beschikbaar
  ar: تحديث برنامج متاح
  hi: सॉफ़्टवेयर अपडेट उपलब्ध
  th: มีการอัปเดตซอฟต์แวร์
  cs: Dostupná aktualizace softwaru
  sv: Programuppdatering tillgänglig
  he: עדכון תוכנה זמין
software_update.new_version:
  context: Message about new version availability
  en: OpenMates {version} is available now.
  de: OpenMates {version} ist jetzt verfügbar.
  zh: OpenMates {version} 现已可用。
  es: OpenMates {version} ya está disponible.
  fr: OpenMates {version} est disponible maintenant.
  pt: OpenMates {version} está disponível agora.
  ru: OpenMates {version} доступен сейчас.
  ja: OpenMates {version} が利用可能になりました。
  ko: OpenMates {version}을(를) 지금 사용할 수 있습니다.
  it: OpenMates {version} è disponibile ora.
  tr: OpenMates {version} şimdi mevcut.
  vi: OpenMates {version} hiện đã có sẵn.
  id: OpenMates {version} kini tersedia.
