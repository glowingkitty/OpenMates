  vi: Đang cố kết nối lại với máy chủ.
  id: Mencoba menyambung kembali ke server.
  pl: Próba ponownego połączenia z serwerem.
  nl: Probeert opnieuw verbinding te maken met de server.
  ar: محاولة إعادة الاتصال بالخادم.
  hi: सर्वर से पुनः कनेक्ट करने का प्रयास।
