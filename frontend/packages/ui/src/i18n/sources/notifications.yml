  en: Connection to server restored.
  de: Verbindung zum Server wiederhergestellt.
  zh: 与服务器的连接已恢复。
  es: Conexión al servidor restaurada.
  fr: Connexion au serveur restaurée.
  pt: Conexão ao servidor restaurada.
  ru: Соединение с сервером восстановлено.
  ja: サーバーへの接続が回復しました。
  ko: 서버 연결이 복구되었습니다.
  it: Connessione al server ripristinata.
  tr: Sunucu bağlantısı geri yüklendi.
  vi: Kết nối đến máy chủ đã được khôi phục.
  id: Koneksi ke server dipulihkan.
  pl: Połączenie z serwerem przywrócone.
  nl: Verbinding met server hersteld.
  ar: تم استعادة الاتصال بالخادم.
  hi: सर्वर से कनेक्शन बहाल हो गया।
  th: การเชื่อมต่อกับเซิร์ฟเวอร์ได้รับการกู้คืนแล้ว
  cs: Připojení k serveru obnoveno.
  sv: Anslutning till servern återställd.
  he: החיבור לשרת חודש.
  verified_by_human: []

