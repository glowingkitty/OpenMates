desktop:
  context: Placeholder text shown in message input on desktop devices
  en: Click to ask anything...
  de: Klicken um etwas zu fragen...
  zh: 点击提问...
  es: Haz clic para preguntar lo que sea...
  fr: Cliquez pour poser une question...
  pt: Clique para perguntar qualquer coisa...
  ru: Нажмите, чтобы спросить что угодно...
  ja: クリックして何でも質問...
  ko: 클릭하여 무엇이든 질문...
  it: Clicca per chiedere qualsiasi cosa...
  tr: Herhangi bir şey sormak için tıklayın...
  vi: Nhấp để hỏi bất cứ điều gì...
  id: Klik untuk bertanya apa saja...
  pl: Kliknij, aby zapytać o cokolwiek...
  nl: Klik om iets te vragen...
  ar: انقر لتسأل عن أي شيء...
  hi: कुछ भी पूछने के लिए क्लिक करें...
  th: คลิกเพื่อถามอะไรก็ได้...
  cs: Klikněte a zeptejte se na cokoliv...
  sv: "Klicka för att fråga vad som helst..."
  he: לחץ כדי לשאול כל דבר...
  verified_by_human: []
touch:
  context: Placeholder text shown in message input on touch devices
  en: Tap to ask anything...
  de: Tippen um etwas zu fragen...
  zh: 轻触提问...
  es: Toca para preguntar lo que sea...
  fr: Appuyez pour poser une question...
  pt: Toque para perguntar qualquer coisa...
  ru: Нажмите, чтобы спросить что угодно...
  ja: タップして何でも質問...
  ko: 탭하여 무엇이든 질문...
  it: Tocca per chiedere qualsiasi cosa...
  tr: Herhangi bir şey sormak için dokunun...
  vi: Chạm để hỏi bất cứ điều gì...
  id: Ketuk untuk bertanya apa saja...
  pl: Dotknij, aby zapytać o cokolwiek...
  nl: Tik om iets te vragen...
  ar: اضغط لتسأل عن أي شيء...
  hi: कुछ भी पूछने के लिए टैप करें...
  th: แตะเพื่อถามอะไรก็ได้...
  cs: Klepněte a zeptejte se na cokoliv...
  sv: "Tryck för att fråga vad som helst..."
  he: הקש כדי לשאול כל דבר...
  verified_by_human: []
followup_desktop:
  context: Placeholder text shown in message input on desktop when viewing someone else's chat (encourages followup)
  en: Click to ask followup...
  de: Klicken um nachzufragen...
  zh: 点击提问后续问题...
  es: Haz clic para hacer una pregunta de seguimiento...
  fr: Cliquez pour poser une question de suivi...
  pt: Clique para perguntar mais...
  ru: Нажмите, чтобы задать уточняющий вопрос...
  ja: クリックしてフォローアップを質問...
  ko: 클릭하여 후속 질문...
  it: Clicca per chiedere un follow-up...
  tr: Takip sorusu sormak için tıklayın...
  vi: Nhấp để hỏi thêm...
  id: Klik untuk bertanya lebih lanjut...
  pl: Kliknij, aby zadać pytanie uzupełniające...
  nl: Klik om een vervolgvraag te stellen...
  ar: انقر لطرح سؤال متابعة...
  hi: फॉलो-अप पूछने के लिए क्लिक करें...
  th: คลิกเพื่อถามเพิ่มเติม...
  cs: Klikněte pro doplňující dotaz...
  sv: "Klicka för att ställa en följdfråga..."
  he: לחץ כדי לשאול שאלת המשך...
  verified_by_human: []
