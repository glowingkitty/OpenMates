desktop:
  context: Placeholder text shown in message input on desktop devices
  en: Click to ask anything...
  de: Klicken um etwas zu fragen...
  zh: 点击提问...
  es: Haz clic para preguntar lo que sea...
  fr: Cliquez pour poser une question...
  pt: Clique para perguntar qualquer coisa...
  ru: Нажмите, чтобы спросить что угодно...
  ja: クリックして何でも質問...
  ko: 클릭하여 무엇이든 질문...
  it: Clicca per chiedere qualsiasi cosa...
  tr: Herhangi bir şey sormak için tıklayın...
  vi: Nhấp để hỏi bất cứ điều gì...
  id: Klik untuk bertanya apa saja...
  pl: Kliknij, aby zapytać o cokolwiek...
  nl: Klik om iets te vragen...
  ar: انقر لتسأل عن أي شيء...
  hi: कुछ भी पूछने के लिए क्लिक करें...
  th: คลิกเพื่อถามอะไรก็ได้...
  cs: Klikněte a zeptejte se na cokoliv...
  sv: "Klicka för att fråga vad som helst..."
  he: לחץ כדי לשאול כל דבר...
  verified_by_human: []
