signup_required_body:
  context: Banner body shown when anonymous file uploads are blocked; text entered in the composer is kept for signup, but the selected file is not uploaded.
  en: Your message draft will be kept, but files are only uploaded after signup. Remove the file to keep chatting without an account.
  de: Dein Nachrichtenentwurf bleibt erhalten, aber Dateien werden erst nach der Registrierung hochgeladen. Entferne die Datei, um ohne Konto weiterzuchatten.
  zh: 你的消息草稿会被保留，但文件只会在注册后上传。移除文件即可继续无需账号聊天。
  es: Se conservará tu borrador del mensaje, pero los archivos solo se suben después de registrarte. Quita el archivo para seguir chateando sin una cuenta.
  fr: Votre brouillon de message sera conservé, mais les fichiers ne sont téléversés qu’après l’inscription. Supprimez le fichier pour continuer à discuter sans compte.
  pt: Seu rascunho de mensagem será mantido, mas os arquivos só serão enviados após o cadastro. Remova o arquivo para continuar conversando sem uma conta.
  ru: Черновик сообщения сохранится, но файлы загружаются только после регистрации. Удалите файл, чтобы продолжить чат без аккаунта.
  ja: メッセージの下書きは保持されますが、ファイルはサインアップ後にのみアップロードされます。アカウントなしでチャットを続けるにはファイルを削除してください。
  ko: 메시지 초안은 유지되지만 파일은 가입 후에만 업로드됩니다. 계정 없이 계속 채팅하려면 파일을 제거하세요.
  it: La bozza del messaggio verrà conservata, ma i file vengono caricati solo dopo la registrazione. Rimuovi il file per continuare a chattare senza un account.
  tr: Mesaj taslağınız korunur, ancak dosyalar yalnızca kayıt olduktan sonra yüklenir. Hesap olmadan sohbete devam etmek için dosyayı kaldırın.
  vi: Bản nháp tin nhắn của bạn sẽ được giữ lại, nhưng tệp chỉ được tải lên sau khi đăng ký. Hãy xóa tệp để tiếp tục trò chuyện mà không cần tài khoản.
  id: Draf pesan Anda akan tetap disimpan, tetapi file hanya diunggah setelah mendaftar. Hapus file untuk terus mengobrol tanpa akun.
  pl: Szkic wiadomości zostanie zachowany, ale pliki są przesyłane dopiero po rejestracji. Usuń plik, aby kontynuować czat bez konta.
  nl: Je berichtconcept blijft bewaard, maar bestanden worden pas na registratie geüpload. Verwijder het bestand om zonder account verder te chatten.
  ar: سيتم الاحتفاظ بمسودة رسالتك، لكن الملفات لا تُحمّل إلا بعد التسجيل. أزل الملف لمتابعة الدردشة بدون حساب.
  hi: आपका संदेश ड्राफ्ट सुरक्षित रहेगा, लेकिन फ़ाइलें साइन अप के बाद ही अपलोड होंगी। बिना खाते के चैट जारी रखने के लिए फ़ाइल हटाएँ।
  th: ระบบจะเก็บร่างข้อความของคุณไว้ แต่ไฟล์จะอัปโหลดได้หลังสมัครบัญชีเท่านั้น ลบไฟล์เพื่อแชทต่อโดยไม่ต้องมีบัญชี
  cs: Koncept zprávy zůstane zachován, ale soubory se nahrají až po registraci. Odeberte soubor, abyste mohli pokračovat v chatu bez účtu.
  sv: Ditt meddelandeutkast sparas, men filer laddas bara upp efter registrering. Ta bort filen för att fortsätta chatta utan konto.
  he: טיוטת ההודעה שלך תישמר, אבל קבצים יועלו רק אחרי ההרשמה. הסר את הקובץ כדי להמשיך לשוחח בלי חשבון.
  verified_by_human: []
