# PII (Personally Identifiable Information) detection and anonymization translations
# Used by PIIWarningBanner and PII highlighting in the message input

banner_title:
  context: Title shown in the PII warning banner when sensitive data is detected
  en: Sensitive data detected
  de: Sensible Daten erkannt
  zh: 检测到敏感数据
  es: Datos sensibles detectados
  fr: Données sensibles détectées
  pt: Dados sensíveis detectados
  ru: Обнаружены конфиденциальные данные
  ja: 機密データが検出されました
  ko: 민감한 데이터가 감지되었습니다
  it: Dati sensibili rilevati
  tr: Hassas veriler tespit edildi
  vi: Phát hiện dữ liệu nhạy cảm
  id: Data sensitif terdeteksi
  pl: Wykryto dane wrażliwe
  nl: Gevoelige gegevens gedetecteerd
  ar: تم اكتشاف بيانات حساسة
  hi: संवेदनशील डेटा पाया गया
  th: ตรวจพบข้อมูลที่ละเอียดอ่อน
  cs: Detekována citlivá data
  sv: Känsliga uppgifter hittades
  he: זוהו נתונים רגישים
banner_description:
  context: Description explaining what will happen to detected sensitive data. {summary} is replaced with a list like "2 emails, 1 API key"
  en: "Found {summary}. These will be replaced with placeholders before sending. Click on highlighted text to keep original."
  de: "{summary} gefunden. Diese werden vor dem Senden durch Platzhalter ersetzt. Klicke auf markierten Text, um das Original zu behalten."
  zh: "发现 {summary}。发送前将用占位符替换。单击高亮文本以保留原始内容。"
  es: "Se encontró {summary}. Serán reemplazados con marcadores antes de enviar. Haz clic en el texto resaltado para mantener el original."
  fr: "{summary} trouvé(s). Ceux-ci seront remplacés par des espaces réservés avant l'envoi. Cliquez sur le texte surligné pour conserver l'original."
  pt: "Encontrado {summary}. Estes serão substituídos por marcadores antes do envio. Clique no texto destacado para manter o original."
  ru: "Найдено: {summary}. Они будут заменены заполнителями перед отправкой. Нажмите на выделенный текст, чтобы сохранить оригинал."
  ja: "{summary} が見つかりました。送信前にプレースホルダーに置き換えられます。ハイライトされたテキストをクリックして元のまま保持。"
  ko: "{summary}을(를) 발견했습니다. 전송 전에 자리 표시자로 교체됩니다. 강조된 텍스트를 클릭하여 원본을 유지하세요."
  it: "Trovato {summary}. Questi verranno sostituiti con segnaposto prima dell'invio. Clicca sul testo evidenziato per mantenere l'originale."
  tr: "{summary} bulundu. Gönderilmeden önce yer tutucularla değiştirilecek. Orijinali korumak için vurgulanan metne tıklayın."
  vi: "Tìm thấy {summary}. Chúng sẽ được thay thế bằng ký tự giữ chỗ trước khi gửi. Nhấp vào văn bản được đánh dấu để giữ nguyên bản."
  id: "Ditemukan {summary}. Ini akan diganti dengan placeholder sebelum dikirim. Klik teks yang disorot untuk mempertahankan aslinya."
  pl: "Znaleziono {summary}. Zostaną zastąpione symbolami zastępczymi przed wysłaniem. Kliknij wyróżniony tekst, aby zachować oryginał."
  nl: "{summary} gevonden. Deze worden vervangen door tijdelijke aanduidingen voor verzending. Klik op gemarkeerde tekst om het origineel te behouden."
  ar: "تم العثور على {summary}. ستُستبدَل بعناصر نائبة قبل الإرسال. انقر على النص المميز للاحتفاظ بالنص الأصلي."
  hi: "{summary} मिला। भेजने से पहले इन्हें प्लेसहोल्डर से बदला जाएगा। मूल रखने के लिए हाइलाइट किए गए टेक्स्ट पर क्लिक करें।"
  th: "พบ {summary} จะถูกแทนที่ด้วย placeholder ก่อนส่ง คลิกที่ข้อความที่ไฮไลต์เพื่อเก็บต้นฉบับ"
  cs: "Nalezeno: {summary}. Před odesláním budou nahrazeny zástupnými symboly. Klikněte na zvýrazněný text pro zachování originálu."
  sv: "Hittade {summary}. Dessa ersätts med platshållare innan de skickas. Klicka på markerad text för att behålla originalet."
  he: "נמצאו {summary}. אלו יוחלפו בממלאי מקום לפני השליחה. לחץ על הטקסט המודגש כדי לשמור על המקור."
