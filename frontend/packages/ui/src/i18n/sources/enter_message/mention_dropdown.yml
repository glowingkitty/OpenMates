header:
  context: Header text explaining the auto-selection feature in the @ mention dropdown
  en:
    By default, OpenMates auto selects the AI model, mates, app- skills, focus modes
    and memories. Search to overwrite the auto selection
  de:
    OpenMates wählt standardmäßig das KI-Modell, Mates, App-Skills, Fokusmodi sowie
    Einstellungen & Erinnerungen automatisch aus. Suche, um die automatische Auswahl
    zu überschreiben
  zh: 默认情况下，OpenMates 自动选择 AI 模型、mates、应用技能、专注模式和设置与记忆。搜索以覆盖自动选择
  es:
    Por defecto, OpenMates selecciona automáticamente el modelo de IA, mates, habilidades
    de aplicación, modos de enfoque y configuraciones y memorias. Busca para sobrescribir
    la selección automática
  fr:
    Par défaut, OpenMates sélectionne automatiquement le modèle d'IA, les mates,
    les compétences d'application, les modes de focus et les paramètres et mémoires.
    Recherchez pour remplacer la sélection automatique
  pt: Por padrão, o OpenMates seleciona automaticamente o modelo de IA, mates, habilidades de aplicativo, modos de foco e configurações e memórias. Pesquise para substituir a seleção automática
  ru: По умолчанию OpenMates автоматически выбирает модель ИИ, помощников, навыки приложений, режимы фокуса и настройки и воспоминания. Выполните поиск, чтобы переопределить автовыбор
  ja: デフォルトでは、OpenMates は AI モデル、mates、アプリスキル、フォーカスモード、設定とメモリを自動選択します。自動選択を上書きするには検索してください
  ko: 기본적으로 OpenMates는 AI 모델, mates, 앱 스킬, 집중 모드 및 설정과 기억을 자동으로 선택합니다. 자동 선택을 덮어쓰려면 검색하세요
  it: Per impostazione predefinita, OpenMates seleziona automaticamente il modello AI, i mates, le competenze dell'app, le modalità di focus e le impostazioni e memorie. Cerca per sovrascrivere la selezione automatica
  tr: Varsayılan olarak OpenMates, AI modelini, mates'leri, uygulama becerilerini, odak modlarını ve ayarlar & anıları otomatik seçer. Otomatik seçimi geçersiz kılmak için arayın
  vi: Theo mặc định, OpenMates tự động chọn mô hình AI, mates, kỹ năng ứng dụng, chế độ tập trung và cài đặt & bộ nhớ. Tìm kiếm để ghi đè lựa chọn tự động
  id: Secara default, OpenMates otomatis memilih model AI, mates, keterampilan aplikasi, mode fokus dan pengaturan & memori. Cari untuk menimpa pemilihan otomatis
  pl: Domyślnie OpenMates automatycznie wybiera model AI, mates, umiejętności aplikacji, tryby skupienia oraz ustawienia i wspomnienia. Wyszukaj, aby nadpisać automatyczny wybór
  nl: Standaard selecteert OpenMates automatisch het AI-model, mates, app-vaardigheden, focusmodi en instellingen en herinneringen. Zoek om de automatische selectie te overschrijven
  ar: بشكل افتراضي، يختار OpenMates تلقائيًا نموذج الذكاء الاصطناعي والـ mates ومهارات التطبيق وأوضاع التركيز والإعدادات والذاكرة. ابحث لتجاوز الاختيار التلقائي
  hi: डिफ़ॉल्ट रूप से, OpenMates AI मॉडल, mates, ऐप कौशल, फोकस मोड और सेटिंग्स और यादें स्वचालित रूप से चुनता है। स्वचालित चयन को ओवरराइट करने के लिए खोजें
  th: โดยค่าเริ่มต้น OpenMates จะเลือกโมเดล AI, mates, ทักษะแอป, โหมดโฟกัส และการตั้งค่าและความจำโดยอัตโนมัติ ค้นหาเพื่อเขียนทับการเลือกอัตโนมัติ
  cs: Ve výchozím nastavení OpenMates automaticky vybírá model AI, mates, dovednosti aplikace, režimy soustředění a nastavení a vzpomínky. Vyhledejte pro přepsání automatického výběru
  sv: Som standard väljer OpenMates automatiskt AI-modell, mates, app-färdigheter, fokusmoder samt inställningar och minnen. Sök för att åsidosätta det automatiska valet
  he: כברירת מחדל, OpenMates בוחרת אוטומטית את מודל ה-AI, ה-mates, כישורי האפליקציה, מצבי המיקוד וההגדרות והזיכרונות. חפש כדי לדרוס את הבחירה האוטומטית
  verified_by_human: []
autocomplete_hint:
  context: Footer hint text in the @ mention dropdown suggesting how to autocomplete
  en: Press enter or tab to autocomplete.
  de: Drücke Enter oder Tab zum Vervollständigen.
  zh: 按回车或 Tab 键自动补全。
  es: Presiona enter o tab para autocompletar.
  fr: Appuyez sur entrée ou tab pour compléter.
  pt: Pressione enter ou tab para completar automaticamente.
  ru: Нажмите Enter или Tab для автозаполнения.
  ja: Enterまたは Tabキーでオートコンプリート。
  ko: Enter 또는 Tab을 눌러 자동 완성하세요.
  it: Premi invio o tab per l'autocompletamento.
  tr: Otomatik tamamlamak için enter veya tab'a basın.
  vi: Nhấn Enter hoặc Tab để tự động hoàn thành.
  id: Tekan enter atau tab untuk melengkapi otomatis.
  pl: Naciśnij enter lub tab, aby uzupełnić automatycznie.
  nl: Druk op enter of tab om automatisch aan te vullen.
  ar: اضغط Enter أو Tab للإكمال التلقائي.
  hi: ऑटोकंप्लीट के लिए Enter या Tab दबाएं।
  th: กด Enter หรือ Tab เพื่อเติมข้อความอัตโนมัติ
  cs: Stiskněte enter nebo tab pro automatické doplnění.
  sv: Tryck enter eller tab för att autofylla.
  he: לחץ על Enter או Tab להשלמה אוטומטית.
  verified_by_human: []
