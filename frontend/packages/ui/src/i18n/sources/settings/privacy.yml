encryption_note:
  context: Note explaining that personal data entries are client-side encrypted
  en: All your personal data entries are encrypted on your device. Not even the OpenMates server can read them.
  de: Alle deine persönlichen Dateneinträge werden auf deinem Gerät verschlüsselt. Nicht einmal der OpenMates-Server kann sie lesen.
  zh: 您所有的个人数据条目都在您的设备上加密。即使是 OpenMates 服务器也无法读取它们。
  es: Todas tus entradas de datos personales están cifradas en tu dispositivo. Ni siquiera el servidor de OpenMates puede leerlas.
  fr: Toutes vos entrées de données personnelles sont chiffrées sur votre appareil. Même le serveur OpenMates ne peut pas les lire.
  pt: Todas as suas entradas de dados pessoais são criptografadas no seu dispositivo. Nem mesmo o servidor OpenMates pode lê-las.
  ru: Все ваши личные данные зашифрованы на вашем устройстве. Даже сервер OpenMates не может их прочитать.
  ja: すべての個人データはデバイス上で暗号化されています。OpenMatesのサーバーでさえ読み取ることができません。
  ko: 모든 개인 데이터 항목이 기기에서 암호화됩니다. OpenMates 서버조차 읽을 수 없습니다.
  it: Tutte le tue voci di dati personali sono crittografate sul tuo dispositivo. Nemmeno il server di OpenMates può leggerle.
  tr: Tüm kişisel veri girişleriniz cihazınızda şifrelenir. OpenMates sunucusu bile onları okuyamaz.
  vi: Tất cả mục nhập dữ liệu cá nhân của bạn được mã hóa trên thiết bị của bạn. Ngay cả máy chủ OpenMates cũng không thể đọc chúng.
  id: Semua entri data pribadi Anda dienkripsi di perangkat Anda. Bahkan server OpenMates pun tidak dapat membacanya.
  pl: Wszystkie wpisy danych osobowych są szyfrowane na Twoim urządzeniu. Nawet serwer OpenMates nie może ich odczytać.
  nl: Al uw persoonlijke gegevensinvoer is versleuteld op uw apparaat. Zelfs de OpenMates-server kan ze niet lezen.
  ar: جميع إدخالات بياناتك الشخصية مشفرة على جهازك. حتى خادم OpenMates لا يمكنه قراءتها.
  hi: आपके सभी व्यक्तिगत डेटा प्रविष्टियां आपके डिवाइस पर एन्क्रिप्ट की गई हैं। यहां तक कि OpenMates सर्वर भी उन्हें नहीं पढ़ सकता।
  th: รายการข้อมูลส่วนตัวทั้งหมดของคุณถูกเข้ารหัสบนอุปกรณ์ของคุณ แม้แต่เซิร์ฟเวอร์ OpenMates ก็ไม่สามารถอ่านได้
  cs: Všechny vaše osobní datové záznamy jsou šifrovány na vašem zařízení. Ani server OpenMates je nemůže číst.
  sv: Alla dina personliga dataposter är krypterade på din enhet. Inte ens OpenMates-servern kan läsa dem.
  he: כל נתוניך האישיים מוצפנים במכשיר שלך. אפילו השרת של OpenMates לא יכול לקרוא אותם.
