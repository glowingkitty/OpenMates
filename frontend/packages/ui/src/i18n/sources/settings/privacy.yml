stability_logs_privacy_note:
  context: Privacy disclaimer shown below the stability logs toggle explaining that no personal data is collected
  en: Only sanitized technical warning/error details are collected, such as feature area, normalized route, browser/device info, status codes, and redacted error fingerprints. Logs are automatically deleted after 48 hours unless an error occurred. You can disable this at any time.
  de: Es werden nur anonymisierte technische Protokolle erfasst. Nachrichteninhalte, Chat-Titel, Namen oder E-Mail-Adressen sind niemals enthalten. Protokolle werden nach 48 Stunden automatisch gelöscht, es sei denn, ein Fehler ist aufgetreten. Sie können dies jederzeit deaktivieren.
  zh: 仅收集匿名化的技术日志。不包含任何消息内容、聊天标题、姓名或电子邮件地址。日志在 48 小时后自动删除，除非发生了错误。您可以随时禁用此功能。
  es: Solo se recopilan registros técnicos anonimizados. Nunca se incluye contenido de mensajes, títulos de chat, nombres o direcciones de correo electrónico. Los registros se eliminan automáticamente después de 48 horas a menos que haya ocurrido un error. Puedes desactivar esto en cualquier momento.
  fr: Seuls des journaux techniques anonymisés sont collectés. Aucun contenu de message, titre de chat, nom ou adresse e-mail n'est jamais inclus. Les journaux sont automatiquement supprimés après 48 heures sauf si une erreur s'est produite. Vous pouvez désactiver cela à tout moment.
  pt: Apenas logs técnicos anonimizados são coletados. Nenhum conteúdo de mensagens, títulos de chat, nomes ou endereços de e-mail são incluídos. Os logs são automaticamente excluídos após 48 horas, a menos que um erro tenha ocorrido. Você pode desativar isso a qualquer momento.
  ru: Собираются только анонимизированные технические журналы. Содержимое сообщений, заголовки чатов, имена и адреса электронной почты никогда не включаются. Журналы автоматически удаляются через 48 часов, если не произошла ошибка. Вы можете отключить это в любое время.
  ja: 匿名化された技術ログのみが収集されます。メッセージの内容、チャットのタイトル、名前、メールアドレスは含まれません。ログはエラーが発生しない限り、48時間後に自動的に削除されます。いつでも無効にできます。
  ko: 익명화된 기술 로그만 수집됩니다. 메시지 내용, 채팅 제목, 이름 또는 이메일 주소는 절대 포함되지 않습니다. 로그는 오류가 발생하지 않는 한 48시간 후 자동으로 삭제됩니다. 언제든지 비활성화할 수 있습니다.
  it: Vengono raccolti solo log tecnici anonimizzati. Nessun contenuto di messaggi, titoli di chat, nomi o indirizzi email è mai incluso. I log vengono eliminati automaticamente dopo 48 ore a meno che non si sia verificato un errore. Puoi disattivarlo in qualsiasi momento.
  tr: Yalnızca anonimleştirilmiş teknik günlükler toplanır. Mesaj içeriği, sohbet başlıkları, adlar veya e-posta adresleri asla dahil edilmez. Günlükler, bir hata oluşmadıkça 48 saat sonra otomatik olarak silinir. Bunu istediğiniz zaman devre dışı bırakabilirsiniz.
  vi: Chỉ thu thập nhật ký kỹ thuật ẩn danh. Không bao giờ bao gồm nội dung tin nhắn, tiêu đề trò chuyện, tên hoặc địa chỉ email. Nhật ký được tự động xóa sau 48 giờ trừ khi có lỗi xảy ra. Bạn có thể tắt tính năng này bất kỳ lúc nào.
  id: Hanya log teknis anonim yang dikumpulkan. Konten pesan, judul obrolan, nama, atau alamat email tidak pernah disertakan. Log otomatis dihapus setelah 48 jam kecuali terjadi kesalahan. Anda dapat menonaktifkan ini kapan saja.
  pl: Zbierane są tylko zanonimizowane dzienniki techniczne. Treść wiadomości, tytuły czatów, nazwy i adresy e-mail nigdy nie są uwzględniane. Dzienniki są automatycznie usuwane po 48 godzinach, chyba że wystąpił błąd. Możesz to wyłączyć w dowolnym momencie.
  nl: Alleen geanonimiseerde technische logs worden verzameld. Berichtinhoud, chattitels, namen of e-mailadressen worden nooit meegestuurd. Logs worden automatisch na 48 uur verwijderd, tenzij er een fout is opgetreden. U kunt dit op elk moment uitschakelen.
  ar: يتم جمع السجلات التقنية المجهولة فقط. لا يتم أبداً تضمين محتوى الرسائل أو عناوين المحادثات أو الأسماء أو عناوين البريد الإلكتروني. يتم حذف السجلات تلقائياً بعد 48 ساعة ما لم يحدث خطأ. يمكنك تعطيل هذا في أي وقت.
  hi: केवल अनामिकृत तकनीकी लॉग एकत्र किए जाते हैं। संदेश सामग्री, चैट शीर्षक, नाम या ईमेल पते कभी शामिल नहीं होते। 48 घंटे बाद लॉग स्वचालित रूप से हटा दिए जाते हैं जब तक कि कोई त्रुटि न हो। आप इसे किसी भी समय अक्षम कर सकते हैं।
  th: รวบรวมเฉพาะบันทึกทางเทคนิคที่ไม่ระบุตัวตนเท่านั้น ไม่มีเนื้อหาข้อความ ชื่อแชท ชื่อ หรืออีเมลรวมอยู่ด้วย บันทึกจะถูกลบโดยอัตโนมัติหลังจาก 48 ชั่วโมง เว้นแต่จะเกิดข้อผิดพลาด คุณสามารถปิดการใช้งานนี้ได้ตลอดเวลา
  cs: Jsou shromažďovány pouze anonymizované technické protokoly. Obsah zpráv, názvy chatů, jména ani e-mailové adresy nejsou nikdy zahrnuty. Protokoly jsou automaticky smazány po 48 hodinách, pokud nedošlo k chybě. Toto můžete kdykoli vypnout.
  sv: Endast anonymiserade tekniska loggar samlas in. Meddelandeinnehåll, chatttitlar, namn eller e-postadresser inkluderas aldrig. Loggar raderas automatiskt efter 48 timmar om inget fel har inträffat. Du kan inaktivera detta när som helst.
  he: רק יומנים טכניים אנונימיים נאספים. תוכן הודעות, כותרות צ'אט, שמות או כתובות דוא"ל אינם נכללים לעולם. היומנים נמחקים אוטומטית לאחר 48 שעות אלא אם התרחשה שגיאה. תוכל להשבית זאת בכל עת.
  verified_by_human: []
