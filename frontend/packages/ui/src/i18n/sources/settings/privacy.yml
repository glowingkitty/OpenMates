debug_logging_description:
  context: Description text explaining what debug logging collects
  en: Help improve OpenMates by sharing detailed trace data when errors occur. This includes request timing, service interactions, and error context.
  de: Helfen Sie, OpenMates zu verbessern, indem Sie detaillierte Trace-Daten teilen, wenn Fehler auftreten. Dies umfasst Anforderungszeiten, Service-Interaktionen und Fehlerkontext.
  zh: 通过在发生错误时分享详细的跟踪数据来帮助改进 OpenMates。这包括请求时间、服务交互和错误上下文。
  es: Ayuda a mejorar OpenMates compartiendo datos de rastreo detallados cuando ocurran errores. Esto incluye tiempos de solicitud, interacciones de servicios y contexto de errores.
  fr: Aidez à améliorer OpenMates en partageant des données de traçage détaillées lorsque des erreurs surviennent. Cela inclut les temps de requête, les interactions de services et le contexte des erreurs.
  pt: Ajude a melhorar o OpenMates compartilhando dados detalhados de rastreamento quando erros ocorrerem. Isso inclui tempos de solicitação, interações de serviços e contexto de erros.
  ru: Помогите улучшить OpenMates, делясь подробными данными трассировки при возникновении ошибок. Это включает время запросов, взаимодействия сервисов и контекст ошибок.
  ja: エラー発生時に詳細なトレースデータを共有して、OpenMates の改善にご協力ください。これにはリクエストのタイミング、サービスの相互作用、エラーのコンテキストが含まれます。
  ko: 오류 발생 시 상세한 추적 데이터를 공유하여 OpenMates 개선에 도움을 주세요. 여기에는 요청 타이밍, 서비스 상호작용 및 오류 컨텍스트가 포함됩니다.
  it: Aiuta a migliorare OpenMates condividendo dati di tracciamento dettagliati quando si verificano errori. Questo include tempi delle richieste, interazioni dei servizi e contesto degli errori.
  tr: Hatalar meydana geldiğinde ayrıntılı izleme verilerini paylaşarak OpenMates'i iyileştirmeye yardımcı olun. Bu, istek zamanlama, hizmet etkileşimleri ve hata bağlamını içerir.
  vi: Giúp cải thiện OpenMates bằng cách chia sẻ dữ liệu theo dõi chi tiết khi xảy ra lỗi. Bao gồm thời gian yêu cầu, tương tác dịch vụ và ngữ cảnh lỗi.
  id: Bantu tingkatkan OpenMates dengan berbagi data jejak terperinci saat terjadi kesalahan. Ini mencakup waktu permintaan, interaksi layanan, dan konteks kesalahan.
  pl: Pomóż ulepszyć OpenMates, udostępniając szczegółowe dane śledzenia, gdy wystąpią błędy. Obejmuje to czasy żądań, interakcje usług i kontekst błędów.
  nl: Help OpenMates te verbeteren door gedetailleerde tracegegevens te delen wanneer fouten optreden. Dit omvat verzoektijden, service-interacties en foutcontext.
  ar: ساعد في تحسين OpenMates من خلال مشاركة بيانات التتبع التفصيلية عند حدوث أخطاء. يشمل ذلك توقيت الطلبات وتفاعلات الخدمات وسياق الأخطاء.
  hi: त्रुटियाँ होने पर विस्तृत ट्रेस डेटा साझा करके OpenMates को बेहतर बनाने में मदद करें। इसमें अनुरोध का समय, सेवा इंटरैक्शन और त्रुटि संदर्भ शामिल हैं।
  th: ช่วยปรับปรุง OpenMates โดยการแชร์ข้อมูลการติดตามโดยละเอียดเมื่อเกิดข้อผิดพลาด ซึ่งรวมถึงเวลาร้องขอ การโต้ตอบของบริการ และบริบทของข้อผิดพลาด
  cs: Pomozte zlepšit OpenMates sdílením podrobných trasovacích dat při výskytu chyb. To zahrnuje časy požadavků, interakce služeb a kontext chyb.
  sv: Hjälp till att förbättra OpenMates genom att dela detaljerad spårningsdata när fel uppstår. Detta inkluderar förfrågningstider, tjänsteinteraktioner och felkontext.
  he: עזור לשפר את OpenMates על ידי שיתוף נתוני מעקב מפורטים כאשר מתרחשות שגיאות. זה כולל תזמון בקשות, אינטראקציות שירות והקשר שגיאות.
