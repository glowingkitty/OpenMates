auto_deletion.compliance_note:
  context: Note about legal compliance for auto deletion
  en: The compliance logs and invoices auto deletion time can not be reduced, because of legal compliance.
  de: Die automatische Löschzeit für Compliance-Protokolle und Rechnungen kann aufgrund gesetzlicher Vorschriften nicht reduziert werden.
  zh: 出于法律合规原因，合规日志和发票的自动删除时间不能缩短。
  es: El tiempo de eliminación automática de los registros de cumplimiento y facturas no puede reducirse por razones de cumplimiento legal.
  fr: Le délai de suppression automatique des journaux de conformité et des factures ne peut pas être réduit pour des raisons de conformité légale.
  pt: O tempo de exclusão automática dos registros de conformidade e faturas não pode ser reduzido por motivos de conformidade legal.
  ru: Время автоматического удаления журналов соответствия и счетов не может быть сокращено в связи с требованиями законодательства.
  ja: コンプライアンスログと請求書の自動削除時間は、法的コンプライアンスのため短縮できません。
  ko: 법적 규정 준수를 위해 규정 준수 로그와 청구서의 자동 삭제 시간은 줄일 수 없습니다.
  it: Il tempo di eliminazione automatica dei log di conformità e delle fatture non può essere ridotto per ragioni di conformità legale.
  tr: Yasal uyumluluk nedeniyle uyumluluk günlükleri ve faturaların otomatik silme süresi azaltılamaz.
  vi: Thời gian xóa tự động của nhật ký tuân thủ và hóa đơn không thể giảm vì lý do tuân thủ pháp lý.
  id: Waktu penghapusan otomatis log kepatuhan dan faktur tidak dapat dikurangi karena kepatuhan hukum.
  pl: Czas automatycznego usuwania dzienników zgodności i faktur nie może być skrócony ze względu na wymogi prawne.
  nl: De automatische verwijderingstijd voor nalevingslogboeken en facturen kan niet worden verkort vanwege wettelijke naleving.
  ar: لا يمكن تقليل وقت الحذف التلقائي لسجلات الامتثال والفواتير، وذلك للامتثال القانوني.
  hi: कानूनी अनुपालन के कारण अनुपालन लॉग और चालान का स्वचालित हटाने का समय कम नहीं किया जा सकता।
  th: ไม่สามารถลดเวลาการลบอัตโนมัติของบันทึกการปฏิบัติตามข้อกำหนดและใบแจ้งหนี้ได้ เนื่องจากการปฏิบัติตามกฎหมาย
  cs: Čas automatického mazání protokolů dodržování předpisů a faktur nelze zkrátit z důvodu právního souladu.
  sv: Den automatiska raderingstiden för efterlevnadsloggar och fakturor kan inte minskas på grund av juridisk efterlevnad.
  he: לא ניתן לקצר את זמן המחיקה האוטומטית של יומני הציות והחשבוניות, בשל דרישות ציות לחוק.
