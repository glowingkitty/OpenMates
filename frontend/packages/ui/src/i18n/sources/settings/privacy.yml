auto_deletion.chats.description:
  context: Description text on the chats auto-deletion editing page
  en: Choose how long your chats should be kept before being automatically deleted. Older chats will be permanently removed.
  de: Wähle, wie lange deine Chats aufbewahrt werden sollen, bevor sie automatisch gelöscht werden. Ältere Chats werden dauerhaft entfernt.
  zh: 选择聊天在自动删除之前应保留多长时间。较旧的聊天将被永久删除。
  es: Elige cuánto tiempo deben guardarse tus chats antes de eliminarse automáticamente. Los chats más antiguos se eliminarán permanentemente.
  fr: Choisissez combien de temps vos chats doivent être conservés avant d'être automatiquement supprimés. Les chats plus anciens seront définitivement supprimés.
  pt: Escolha por quanto tempo seus chats devem ser mantidos antes de serem excluídos automaticamente. Chats mais antigos serão removidos permanentemente.
  ru: Выберите, как долго ваши чаты должны храниться перед автоматическим удалением. Более старые чаты будут удалены навсегда.
  ja: チャットが自動削除される前にどのくらいの期間保持するかを選択してください。古いチャットは完全に削除されます。
  ko: 자동으로 삭제되기 전에 채팅을 얼마나 오래 보관할지 선택하세요. 오래된 채팅은 영구적으로 제거됩니다.
  it: Scegli per quanto tempo i tuoi messaggi devono essere conservati prima di essere eliminati automaticamente. Le chat più vecchie verranno rimosse definitivamente.
  tr: Otomatik olarak silinmeden önce sohbetlerinizin ne kadar süre saklanacağını seçin. Eski sohbetler kalıcı olarak kaldırılacaktır.
  vi: Chọn thời gian lưu trữ các cuộc trò chuyện trước khi bị tự động xóa. Các cuộc trò chuyện cũ hơn sẽ bị xóa vĩnh viễn.
  id: Pilih berapa lama obrolan Anda harus disimpan sebelum dihapus secara otomatis. Obrolan yang lebih lama akan dihapus secara permanen.
  pl: Wybierz, jak długo Twoje czaty powinny być przechowywane przed automatycznym usunięciem. Starsze czaty zostaną trwale usunięte.
  nl: Kies hoe lang uw chats bewaard moeten worden voordat ze automatisch worden verwijderd. Oudere chats worden permanent verwijderd.
  ar: اختر المدة التي يجب الاحتفاظ بمحادثاتك خلالها قبل حذفها تلقائيًا. سيتم حذف المحادثات الأقدم نهائيًا.
  hi: चुनें कि आपकी चैट को स्वचालित रूप से हटाए जाने से पहले कितने समय तक रखा जाए। पुरानी चैट को स्थायी रूप से हटा दिया जाएगा।
  th: เลือกระยะเวลาที่ต้องการเก็บการแชทของคุณก่อนที่จะถูกลบอัตโนมัติ การแชทที่เก่ากว่าจะถูกลบอย่างถาวร
  cs: Zvolte, jak dlouho mají být vaše chaty uchovávány před automatickým smazáním. Starší chaty budou trvale odstraněny.
  sv: Välj hur länge dina chattar ska sparas innan de raderas automatiskt. Äldre chattar tas bort permanent.
  he: "יש לבחור כמה זמן לשמור את הצ'אטים שלך לפני שיימחקו אוטומטית. צ'אטים ישנים יותר יוסרו לצמיתות."
  verified_by_human: []
auto_deletion.files.description:
  context: Description text on the files auto-deletion editing page
  en: Choose how long your uploaded files should be kept on OpenMates before being automatically deleted.
  de: Wähle, wie lange deine hochgeladenen Dateien auf OpenMates aufbewahrt werden sollen, bevor sie automatisch gelöscht werden.
  zh: 选择上传的文件在 OpenMates 上自动删除之前应保留多长时间。
  es: Elige cuánto tiempo deben mantenerse tus archivos cargados en OpenMates antes de eliminarse automáticamente.
  fr: Choisissez combien de temps vos fichiers téléchargés doivent être conservés sur OpenMates avant d'être automatiquement supprimés.
  pt: Escolha por quanto tempo seus arquivos enviados devem ser mantidos no OpenMates antes de serem excluídos automaticamente.
  ru: Выберите, как долго ваши загруженные файлы должны храниться в OpenMates перед автоматическим удалением.
  ja: アップロードされたファイルが自動削除される前に OpenMates に保持する期間を選択してください。
  ko: 업로드된 파일이 자동으로 삭제되기 전에 OpenMates에 보관할 기간을 선택하세요.
  it: Scegli per quanto tempo i tuoi file caricati devono essere conservati su OpenMates prima di essere eliminati automaticamente.
  tr: Yüklenen dosyalarınızın otomatik olarak silinmeden önce OpenMates'te ne kadar süre saklanacağını seçin.
  vi: Chọn thời gian lưu trữ các tệp đã tải lên trên OpenMates trước khi bị tự động xóa.
  id: Pilih berapa lama file yang diunggah harus disimpan di OpenMates sebelum dihapus secara otomatis.
  pl: Wybierz, jak długo przesłane pliki powinny być przechowywane w OpenMates przed automatycznym usunięciem.
  nl: Kies hoe lang uw geüploade bestanden op OpenMates bewaard moeten worden voordat ze automatisch worden verwijderd.
  ar: اختر المدة التي يجب الاحتفاظ بملفاتك المحملة على OpenMates خلالها قبل حذفها تلقائيًا.
  hi: चुनें कि आपकी अपलोड की गई फ़ाइलें स्वचालित रूप से हटाए जाने से पहले OpenMates पर कितने समय तक रखी जाएं।
  th: เลือกระยะเวลาที่ต้องการเก็บไฟล์ที่อัปโหลดบน OpenMates ก่อนที่จะถูกลบอัตโนมัติ
  cs: Zvolte, jak dlouho mají být vaše nahrané soubory uchovávány na OpenMates před automatickým smazáním.
  sv: Välj hur länge dina uppladdade filer ska sparas på OpenMates innan de raderas automatiskt.
  he: יש לבחור כמה זמן לשמור את הקבצים שהעלית ב-OpenMates לפני שיימחקו אוטומטית.
