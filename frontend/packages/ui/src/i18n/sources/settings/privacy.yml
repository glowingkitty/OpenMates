stability_logs_description:
  context: Description text explaining what anonymized stability logs collect — shown above the toggle
  en: Send privacy-safe warning and error diagnostics when OpenMates breaks. No message content, chat titles, prompts, model responses, file names, emails, or personal data are included.
  de: Helfen Sie, OpenMates zu verbessern, indem Sie anonymisierte Fehlerprotokolle teilen. Keine Nachrichteninhalte, Chat-Titel oder persönliche Daten sind enthalten — nur technische Fehlerinformationen.
  zh: 通过分享匿名错误日志帮助改进 OpenMates。不包含任何消息内容、聊天标题或个人数据——仅包含技术错误信息。
  es: Ayuda a mejorar OpenMates compartiendo registros de errores anónimos. No se incluye contenido de mensajes, títulos de chat ni datos personales, solo información técnica de errores.
  fr: Aidez à améliorer OpenMates en partageant des journaux d'erreurs anonymisés. Aucun contenu de message, titre de chat ou donnée personnelle n'est inclus — uniquement des informations techniques d'erreur.
  pt: Ajude a melhorar o OpenMates compartilhando logs de erros anonimizados. Nenhum conteúdo de mensagens, títulos de chat ou dados pessoais são incluídos — apenas informações técnicas de erros.
  ru: Помогите улучшить OpenMates, делясь анонимизированными журналами ошибок. Содержимое сообщений, заголовки чатов и личные данные не включаются — только техническая информация об ошибках.
  ja: 匿名化されたエラーログを共有して、OpenMates の改善にご協力ください。メッセージの内容、チャットのタイトル、個人データは含まれません。技術的なエラー情報のみです。
  ko: 익명화된 오류 로그를 공유하여 OpenMates 개선에 도움을 주세요. 메시지 내용, 채팅 제목 또는 개인 데이터는 포함되지 않으며 기술적인 오류 정보만 포함됩니다.
  it: Aiuta a migliorare OpenMates condividendo log degli errori anonimizzati. Nessun contenuto di messaggi, titoli di chat o dati personali è incluso — solo informazioni tecniche sugli errori.
  tr: Anonim hata günlüklerini paylaşarak OpenMates'i iyileştirmeye yardımcı olun. Mesaj içeriği, sohbet başlıkları veya kişisel veriler dahil değildir — yalnızca teknik hata bilgileri.
  vi: Giúp cải thiện OpenMates bằng cách chia sẻ nhật ký lỗi ẩn danh. Không bao gồm nội dung tin nhắn, tiêu đề trò chuyện hay dữ liệu cá nhân — chỉ có thông tin lỗi kỹ thuật.
  id: Bantu tingkatkan OpenMates dengan berbagi log kesalahan anonim. Tidak ada konten pesan, judul obrolan, atau data pribadi yang disertakan — hanya informasi kesalahan teknis.
  pl: Pomóż ulepszyć OpenMates, udostępniając zanonimizowane dzienniki błędów. Nie obejmuje treści wiadomości, tytułów czatów ani danych osobowych — tylko techniczne informacje o błędach.
  nl: Help OpenMates te verbeteren door geanonimiseerde foutlogs te delen. Geen berichtinhoud, chattitels of persoonlijke gegevens worden meegestuurd — alleen technische foutinformatie.
  ar: ساعد في تحسين OpenMates من خلال مشاركة سجلات الأخطاء المجهولة. لا يتم تضمين محتوى الرسائل أو عناوين المحادثات أو البيانات الشخصية — فقط معلومات الأخطاء التقنية.
  hi: अनामिकृत त्रुटि लॉग साझा करके OpenMates को बेहतर बनाने में मदद करें। कोई संदेश सामग्री, चैट शीर्षक या व्यक्तिगत डेटा शामिल नहीं है — केवल तकनीकी त्रुटि जानकारी।
  th: ช่วยปรับปรุง OpenMates โดยแชร์บันทึกข้อผิดพลาดที่ไม่ระบุตัวตน ไม่รวมเนื้อหาข้อความ ชื่อแชท หรือข้อมูลส่วนบุคคล — เฉพาะข้อมูลข้อผิดพลาดทางเทคนิคเท่านั้น
  cs: Pomozte zlepšit OpenMates sdílením anonymizovaných protokolů chyb. Nejsou zahrnuty žádné obsahy zpráv, názvy chatů ani osobní údaje — pouze technické informace o chybách.
  sv: Hjälp till att förbättra OpenMates genom att dela anonymiserade felloggar. Inget meddelandeinnehåll, chatttitlar eller personuppgifter ingår — bara teknisk felinformation.
  he: עזור לשפר את OpenMates על ידי שיתוף יומני שגיאות אנונימיים. לא נכלל תוכן הודעות, כותרות צ'אט או נתונים אישיים — רק מידע טכני על שגיאות.
  verified_by_human: []
