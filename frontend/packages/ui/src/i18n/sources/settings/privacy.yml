  ar: لا يتم جمع محتوى رسائلك المشفرة أبدًا، بغض النظر عن هذا الإعداد.
  hi: इस सेटिंग की परवाह किए बिना, आपकी एन्क्रिप्टेड संदेश सामग्री कभी एकत्र नहीं की जाती है।
  th: เนื้อหาข้อความที่เข้ารหัสของคุณจะไม่ถูกเก็บรวบรวม ไม่ว่าการตั้งค่านี้จะเป็นอย่างไร
