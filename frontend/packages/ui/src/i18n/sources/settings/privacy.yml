connected_accounts.description:
  context: Description for the Privacy connected accounts page.
  en: Connected accounts are stored as encrypted browser-managed records. OpenMates only receives encrypted account data and opaque hashes.
  de: Verbundene Konten werden als verschlüsselte, vom Browser verwaltete Datensätze gespeichert. OpenMates erhält nur verschlüsselte Kontodaten und undurchsichtige Hashes.
  zh: 已连接的账号会作为由浏览器管理的加密记录存储。OpenMates 只接收加密的账号数据和不透明哈希。
  es: Las cuentas conectadas se almacenan como registros cifrados gestionados por el navegador. OpenMates solo recibe datos de cuenta cifrados y hashes opacos.
  fr: Les comptes connectés sont stockés sous forme d'enregistrements chiffrés gérés par le navigateur. OpenMates ne reçoit que des données de compte chiffrées et des hachages opaques.
  pt: As contas conectadas são armazenadas como registros criptografados gerenciados pelo navegador. O OpenMates recebe apenas dados de conta criptografados e hashes opacos.
  ru: Подключенные аккаунты хранятся как зашифрованные записи, управляемые браузером. OpenMates получает только зашифрованные данные аккаунта и непрозрачные хэши.
  ja: 連携済みアカウントは、ブラウザが管理する暗号化レコードとして保存されます。OpenMates が受け取るのは、暗号化されたアカウントデータと不透明なハッシュのみです。
  ko: 연결된 계정은 브라우저가 관리하는 암호화된 기록으로 저장됩니다. OpenMates는 암호화된 계정 데이터와 불투명 해시만 받습니다.
  it: Gli account collegati vengono archiviati come record cifrati gestiti dal browser. OpenMates riceve solo dati account cifrati e hash opachi.
  tr: Bağlı hesaplar, tarayıcı tarafından yönetilen şifreli kayıtlar olarak saklanır. OpenMates yalnızca şifreli hesap verileri ve opak hash'ler alır.
  vi: Tài khoản đã kết nối được lưu dưới dạng bản ghi mã hóa do trình duyệt quản lý. OpenMates chỉ nhận dữ liệu tài khoản đã mã hóa và các hàm băm không thể đọc được.
  id: Akun terhubung disimpan sebagai catatan terenkripsi yang dikelola browser. OpenMates hanya menerima data akun terenkripsi dan hash buram.
  pl: Połączone konta są przechowywane jako zaszyfrowane rekordy zarządzane przez przeglądarkę. OpenMates otrzymuje tylko zaszyfrowane dane konta i nieprzezroczyste hashe.
  nl: Verbonden accounts worden opgeslagen als versleutelde, door de browser beheerde records. OpenMates ontvangt alleen versleutelde accountgegevens en ondoorzichtige hashes.
  ar: يتم تخزين الحسابات المتصلة كسجلات مشفرة يديرها المتصفح. لا يتلقى OpenMates إلا بيانات الحساب المشفرة وبصمات تجزئة مبهمة.
  hi: कनेक्ट किए गए खाते ब्राउज़र-प्रबंधित एन्क्रिप्टेड रिकॉर्ड के रूप में संग्रहीत होते हैं। OpenMates केवल एन्क्रिप्टेड खाता डेटा और अपारदर्शी हैश प्राप्त करता है।
  th: บัญชีที่เชื่อมต่อจะถูกจัดเก็บเป็นระเบียนเข้ารหัสที่เบราว์เซอร์จัดการ OpenMates จะได้รับเฉพาะข้อมูลบัญชีที่เข้ารหัสและแฮชแบบทึบเท่านั้น
  cs: Připojené účty se ukládají jako šifrované záznamy spravované prohlížečem. OpenMates přijímá pouze šifrovaná data účtu a neprůhledné hashe.
  sv: Anslutna konton lagras som krypterade poster som hanteras av webbläsaren. OpenMates tar bara emot krypterade kontodata och opaka hashar.
  he: חשבונות מחוברים נשמרים כרשומות מוצפנות המנוהלות על ידי הדפדפן. OpenMates מקבל רק נתוני חשבון מוצפנים וגיבובים אטומים.
  verified_by_human: [en, de, zh, es, fr, pt, ru, ja, ko, it, tr, vi, id, pl, nl, ar, hi, th, cs, sv, he]
