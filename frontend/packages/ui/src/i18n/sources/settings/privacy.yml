enhanced_pii_model.description:
  context: Settings description for optional on-device enhanced PII model.
  en: Download an optional on-device model to detect contextual personal data like names, addresses, and dates. Detection runs locally; your text is not sent anywhere.
  de: Lade ein optionales On-Device-Modell herunter, um kontextbezogene personenbezogene Daten wie Namen, Adressen und Daten zu erkennen. Die Erkennung läuft lokal; dein Text wird nirgendwohin gesendet.
  zh: 下载可选的设备端模型，用于检测姓名、地址和日期等上下文个人数据。检测在本地运行；你的文本不会发送到任何地方。
  es: Descarga un modelo opcional en el dispositivo para detectar datos personales contextuales como nombres, direcciones y fechas. La detección se ejecuta localmente; tu texto no se envía a ningún sitio.
  fr: Téléchargez un modèle optionnel sur l'appareil pour détecter les données personnelles contextuelles comme les noms, les adresses et les dates. La détection s'exécute localement ; votre texte n'est envoyé nulle part.
  pt: Baixe um modelo opcional no dispositivo para detectar dados pessoais contextuais, como nomes, endereços e datas. A detecção é executada localmente; seu texto não é enviado a lugar nenhum.
  ru: Скачайте дополнительную модель на устройстве, чтобы обнаруживать контекстные персональные данные, такие как имена, адреса и даты. Обнаружение выполняется локально; ваш текст никуда не отправляется.
  ja: 名前、住所、日付などの文脈上の個人データを検出するための任意のオンデバイスモデルをダウンロードします。検出はローカルで実行され、テキストはどこにも送信されません。
  ko: 이름, 주소, 날짜 같은 맥락상 개인 데이터를 감지하는 선택적 온디바이스 모델을 다운로드합니다. 감지는 로컬에서 실행되며 텍스트는 어디에도 전송되지 않습니다.
  it: Scarica un modello opzionale sul dispositivo per rilevare dati personali contestuali come nomi, indirizzi e date. Il rilevamento avviene in locale; il tuo testo non viene inviato da nessuna parte.
  tr: Adlar, adresler ve tarihler gibi bağlamsal kişisel verileri algılamak için isteğe bağlı bir cihaz içi model indirin. Algılama yerel olarak çalışır; metniniz hiçbir yere gönderilmez.
  vi: Tải xuống mô hình tùy chọn trên thiết bị để phát hiện dữ liệu cá nhân theo ngữ cảnh như tên, địa chỉ và ngày tháng. Việc phát hiện chạy cục bộ; văn bản của bạn không được gửi đi đâu cả.
  id: Unduh model opsional di perangkat untuk mendeteksi data pribadi kontekstual seperti nama, alamat, dan tanggal. Deteksi berjalan secara lokal; teks Anda tidak dikirim ke mana pun.
  pl: Pobierz opcjonalny model działający na urządzeniu, aby wykrywać kontekstowe dane osobowe, takie jak imiona, adresy i daty. Wykrywanie działa lokalnie; Twój tekst nie jest nigdzie wysyłany.
  nl: Download een optioneel model op het apparaat om contextuele persoonsgegevens zoals namen, adressen en datums te detecteren. Detectie draait lokaal; uw tekst wordt nergens naartoe verzonden.
  ar: نزّل نموذجًا اختياريًا يعمل على الجهاز لاكتشاف البيانات الشخصية السياقية مثل الأسماء والعناوين والتواريخ. يتم الاكتشاف محليًا؛ ولا يتم إرسال نصك إلى أي مكان.
