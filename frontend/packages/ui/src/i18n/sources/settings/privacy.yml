connected_accounts.cli_export_warning:
  context: Warning before exporting an encrypted connected account import command.
  en: This is for testing only. Anyone with the generated command and passcode can add this provider account to another OpenMates account.
  de: Dies ist nur für Tests gedacht. Jede Person mit dem generierten Befehl und dem Passcode kann dieses Anbieter-Konto zu einem anderen OpenMates-Konto hinzufügen.
  zh: 这仅用于测试。任何拥有生成命令和密码的人都可以将此提供商账号添加到另一个 OpenMates 账号。
  es: Esto es solo para pruebas. Cualquier persona con el comando generado y el código de acceso puede añadir esta cuenta de proveedor a otra cuenta de OpenMates.
  fr: Ceci est réservé aux tests. Toute personne disposant de la commande générée et du code d'accès peut ajouter ce compte fournisseur à un autre compte OpenMates.
  pt: Isto é apenas para testes. Qualquer pessoa com o comando gerado e o código de acesso pode adicionar esta conta de provedor a outra conta OpenMates.
  ru: Это только для тестирования. Любой, у кого есть сгенерированная команда и код доступа, может добавить этот аккаунт провайдера в другой аккаунт OpenMates.
  ja: これはテスト専用です。生成されたコマンドとパスコードを持っている人は誰でも、このプロバイダーアカウントを別の OpenMates アカウントに追加できます。
  ko: 테스트 전용입니다. 생성된 명령과 패스코드가 있는 사람은 누구나 이 제공업체 계정을 다른 OpenMates 계정에 추가할 수 있습니다.
  it: Questo è solo per i test. Chiunque abbia il comando generato e il passcode può aggiungere questo account provider a un altro account OpenMates.
  tr: Bu yalnızca test içindir. Oluşturulan komuta ve geçiş koduna sahip herkes bu sağlayıcı hesabını başka bir OpenMates hesabına ekleyebilir.
  vi: Nội dung này chỉ dùng để thử nghiệm. Bất kỳ ai có lệnh đã tạo và mật mã đều có thể thêm tài khoản nhà cung cấp này vào một tài khoản OpenMates khác.
  id: Ini hanya untuk pengujian. Siapa pun yang memiliki perintah yang dibuat dan kode sandi dapat menambahkan akun penyedia ini ke akun OpenMates lain.
  pl: To jest przeznaczone wyłącznie do testów. Każda osoba z wygenerowanym poleceniem i kodem dostępu może dodać to konto dostawcy do innego konta OpenMates.
  nl: Dit is alleen voor tests. Iedereen met de gegenereerde opdracht en toegangscode kan dit provideraccount toevoegen aan een ander OpenMates-account.
  ar: هذا مخصص للاختبار فقط. يمكن لأي شخص لديه الأمر المُنشأ ورمز المرور إضافة حساب المزود هذا إلى حساب OpenMates آخر.
  hi: यह केवल परीक्षण के लिए है। जेनरेट किए गए कमांड और पासकोड वाला कोई भी व्यक्ति इस प्रदाता खाते को किसी दूसरे OpenMates खाते में जोड़ सकता है।
  th: ใช้สำหรับการทดสอบเท่านั้น ทุกคนที่มีคำสั่งที่สร้างขึ้นและรหัสผ่านสามารถเพิ่มบัญชีผู้ให้บริการนี้ไปยังบัญชี OpenMates อื่นได้
  cs: Toto je určeno pouze pro testování. Každý s vygenerovaným příkazem a přístupovým kódem může tento účet poskytovatele přidat k jinému účtu OpenMates.
  sv: Detta är endast för testning. Vem som helst med det genererade kommandot och lösenkoden kan lägga till detta leverantörskonto till ett annat OpenMates-konto.
  he: זה מיועד לבדיקה בלבד. כל מי שיש לו את הפקודה שנוצרה ואת קוד הגישה יכול להוסיף את חשבון הספק הזה לחשבון OpenMates אחר.
  verified_by_human: [en, de, zh, es, fr, pt, ru, ja, ko, it, tr, vi, id, pl, nl, ar, hi, th, cs, sv, he]
