description:
  context: Description text on privacy settings page explaining data processing
  en: If you want to learn more about how OpenMates is processing your data, check the privacy policy.
  de: Wenn du mehr darüber erfahren möchtest, wie OpenMates deine Daten verarbeitet, schau dir die Datenschutzrichtlinie an.
  zh: 如果您想了解更多关于 OpenMates 如何处理您的数据，请查看隐私政策。
  es: Si deseas saber más sobre cómo OpenMates procesa tus datos, consulta la política de privacidad.
  fr: Si vous souhaitez en savoir plus sur la façon dont OpenMates traite vos données, consultez la politique de confidentialité.
  pt: Se você quiser saber mais sobre como o OpenMates processa seus dados, consulte a política de privacidade.
  ru: Если вы хотите узнать больше о том, как OpenMates обрабатывает ваши данные, ознакомьтесь с политикой конфиденциальности.
  ja: OpenMates があなたのデータをどのように処理しているか詳しく知りたい場合は、プライバシーポリシーをご確認ください。
  ko: OpenMates가 데이터를 처리하는 방법에 대해 더 알고 싶으시면 개인정보 보호정책을 확인하세요.
  it: Se vuoi sapere di più su come OpenMates elabora i tuoi dati, consulta l'informativa sulla privacy.
  tr: OpenMates'in verilerinizi nasıl işlediği hakkında daha fazla bilgi edinmek istiyorsanız gizlilik politikasını inceleyin.
  vi: Nếu bạn muốn tìm hiểu thêm về cách OpenMates xử lý dữ liệu của bạn, hãy xem chính sách quyền riêng tư.
  id: Jika Anda ingin mempelajari lebih lanjut tentang cara OpenMates memproses data Anda, lihat kebijakan privasi.
  pl: Jeśli chcesz dowiedzieć się więcej o tym, jak OpenMates przetwarza Twoje dane, zapoznaj się z polityką prywatności.
  nl: Als u meer wilt weten over hoe OpenMates uw gegevens verwerkt, raadpleeg dan het privacybeleid.
  ar: إذا أردت معرفة المزيد عن كيفية معالجة OpenMates لبياناتك، فراجع سياسة الخصوصية.
  hi: यदि आप जानना चाहते हैं कि OpenMates आपके डेटा को कैसे संसाधित करता है, तो गोपनीयता नीति देखें।
  th: หากคุณต้องการเรียนรู้เพิ่มเติมเกี่ยวกับวิธีที่ OpenMates ประมวลผลข้อมูลของคุณ โปรดดูนโยบายความเป็นส่วนตัว
  cs: Chcete-li se dozvědět více o tom, jak OpenMates zpracovává vaše data, přečtěte si zásady ochrany osobních údajů.
  sv: Om du vill veta mer om hur OpenMates behandlar dina data, läs integritetspolicyn.
  he: אם ברצונך ללמוד עוד על האופן שבו OpenMates מעבדת את הנתונים שלך, כדאי לעיין במדיניות הפרטיות.
