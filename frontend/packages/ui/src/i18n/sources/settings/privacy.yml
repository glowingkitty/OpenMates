enhanced_pii_model.composer_suggestion_description:
  context: Composer inline suggestion body for optional enhanced PII model.
  en: Download the optional on-device model to catch more personal details before sending. Your text stays local.
  de: Lade das optionale On-Device-Modell herunter, um vor dem Senden mehr persönliche Details zu erkennen. Dein Text bleibt lokal.
  zh: 下载可选的设备端模型，在发送前捕捉更多个人详细信息。你的文本会保留在本地。
  es: Descarga el modelo opcional en el dispositivo para detectar más detalles personales antes de enviar. Tu texto permanece local.
  fr: Téléchargez le modèle optionnel sur l'appareil pour repérer plus de détails personnels avant l'envoi. Votre texte reste local.
  pt: Baixe o modelo opcional no dispositivo para detectar mais detalhes pessoais antes de enviar. Seu texto permanece local.
  ru: Скачайте дополнительную модель на устройстве, чтобы находить больше личных сведений перед отправкой. Ваш текст остается локальным.
  ja: 送信前により多くの個人情報を検出するため、任意のオンデバイスモデルをダウンロードします。テキストはローカルに残ります。
  ko: 보내기 전에 더 많은 개인 정보를 잡아내도록 선택적 온디바이스 모델을 다운로드하세요. 텍스트는 로컬에 유지됩니다.
  it: Scarica il modello opzionale sul dispositivo per individuare più dettagli personali prima dell'invio. Il tuo testo resta in locale.
  tr: Göndermeden önce daha fazla kişisel ayrıntıyı yakalamak için isteğe bağlı cihaz içi modeli indirin. Metniniz yerel kalır.
  vi: Tải xuống mô hình tùy chọn trên thiết bị để phát hiện thêm thông tin cá nhân trước khi gửi. Văn bản của bạn vẫn ở cục bộ.
  id: Unduh model opsional di perangkat untuk menangkap lebih banyak detail pribadi sebelum mengirim. Teks Anda tetap lokal.
  pl: Pobierz opcjonalny model działający na urządzeniu, aby wykryć więcej danych osobowych przed wysłaniem. Twój tekst pozostaje lokalnie.
  nl: Download het optionele model op het apparaat om meer persoonlijke details te vinden vóór verzending. Uw tekst blijft lokaal.
  ar: نزّل النموذج الاختياري الذي يعمل على الجهاز لاكتشاف المزيد من التفاصيل الشخصية قبل الإرسال. يبقى نصك محليًا.
  hi: भेजने से पहले अधिक व्यक्तिगत विवरण पकड़ने के लिए वैकल्पिक ऑन-डिवाइस मॉडल डाउनलोड करें। आपका टेक्स्ट स्थानीय रहता है।
  th: ดาวน์โหลดโมเดลเสริมบนอุปกรณ์เพื่อตรวจจับรายละเอียดส่วนบุคคลเพิ่มเติมก่อนส่ง ข้อความของคุณจะอยู่ในเครื่อง
  cs: Stáhněte si volitelný model v zařízení, který před odesláním zachytí více osobních údajů. Váš text zůstane lokálně.
  sv: Ladda ner den valfria modellen på enheten för att hitta fler personliga uppgifter före sändning. Din text stannar lokalt.
  he: הורד את המודל האופציונלי במכשיר כדי לזהות יותר פרטים אישיים לפני השליחה. הטקסט שלך נשאר מקומי.
