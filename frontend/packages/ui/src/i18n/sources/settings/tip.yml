description:
  context: Introductory text explaining the tipping feature
  en: Support the creator by sending a tip from your credit balance.
  de: Unterstütze den Ersteller, indem du ein Trinkgeld aus deinem Guthaben sendest.
  zh: 通过从您的积分余额发送小费来支持创作者。
  es: Apoya al creador enviando una propina desde tu saldo de créditos.
  fr: Soutenez le créateur en envoyant un pourboire depuis votre solde de crédits.
  pt: Apoie o criador enviando uma gorjeta do seu saldo de créditos.
  ru: Поддержите создателя, отправив чаевые со своего кредитного баланса.
  ja: クレジット残高からチップを送ってクリエイターを支援しましょう。
  ko: 크레딧 잔액에서 팁을 보내 크리에이터를 지원하세요.
  it: Supporta il creatore inviando una mancia dal tuo saldo crediti.
  tr: Kredi bakiyenizden bahşiş göndererek yaratıcıyı destekleyin.
  vi: Hỗ trợ người tạo bằng cách gửi tiền tip từ số dư tín dụng của bạn.
  id: Dukung pembuat konten dengan mengirim tip dari saldo kredit Anda.
  pl: Wesprzyj twórcę, wysyłając napiwek ze swojego salda kredytów.
  nl: Ondersteun de maker door een fooi te sturen van uw creditbalans.
  ar: ادعم المبدع بإرسال إكرامية من رصيد رصيدك.
  hi: अपने क्रेडिट बैलेंस से टिप भेजकर निर्माता का समर्थन करें।
  th: สนับสนุนผู้สร้างโดยส่งทิปจากยอดคงเหลือเครดิตของคุณ
  cs: Podpořte tvůrce zasláním spropitného z vašeho kreditního zůstatku.
  sv: Stöd skaparen genom att skicka ett tips från ditt kreditssaldo.
  he: תמכו ביוצר על ידי שליחת טיפ מיתרת הקרדיטים שלכם.
  verified_by_human: []

