insufficient_balance:
  context: Warning when credit balance is less than selected tip amount. Uses {needed} interpolation.
  en: "You need {needed} more credits to send this tip."
  de: "Du benötigst noch {needed} Credits, um dieses Trinkgeld zu senden."
  zh: "您需要再 {needed} 个积分才能发送此小费。"
  es: "Necesitas {needed} créditos más para enviar esta propina."
  fr: "Vous avez besoin de {needed} crédits supplémentaires pour envoyer ce pourboire."
  pt: "Você precisa de {needed} créditos a mais para enviar esta gorjeta."
  ru: "Вам нужно ещё {needed} кредитов, чтобы отправить этот чаевой."
  ja: "このチップを送るには、あと {needed} クレジットが必要です。"
  ko: "이 팁을 보내려면 {needed} 크레딧이 더 필요합니다."
  it: "Hai bisogno di {needed} crediti in più per inviare questa mancia."
  tr: "Bu bahşişi göndermek için {needed} daha fazla krediye ihtiyacınız var."
  vi: "Bạn cần thêm {needed} tín dụng để gửi tip này."
  id: "Anda membutuhkan {needed} kredit lagi untuk mengirim tip ini."
  pl: "Potrzebujesz jeszcze {needed} kredytów, aby wysłać ten napiwek."
  nl: "U heeft {needed} meer credits nodig om deze fooi te sturen."
  ar: "تحتاج إلى {needed} رصيد إضافي لإرسال هذه الإكرامية."
  hi: "यह टिप भेजने के लिए आपको {needed} और क्रेडिट चाहिए।"
  th: "คุณต้องการเครดิตเพิ่มอีก {needed} เพื่อส่งทิปนี้"
  cs: "K odeslání tohoto spropitného potřebujete {needed} dalších kreditů."
  sv: "Du behöver {needed} fler krediter för att skicka det här tipset."
  he: "חסרים לך {needed} קרדיטים כדי לשלוח את הטיפ הזה."
