tip_info:
  context: Informational text explaining how tips work
  en: Tips are sent directly from your credit balance to the content creator.
  de: Trinkgelder werden direkt von deinem Guthaben an den Ersteller gesendet.
  zh: 小费直接从您的积分余额发送给内容创作者。
  es: Las propinas se envían directamente desde tu saldo de créditos al creador de contenido.
  fr: Les pourboires sont envoyés directement de votre solde de crédits au créateur de contenu.
  pt: As gorjetas são enviadas diretamente do seu saldo de créditos para o criador de conteúdo.
  ru: Чаевые отправляются напрямую с вашего кредитного баланса создателю контента.
  ja: チップはクレジット残高からコンテンツクリエイターに直接送られます。
  ko: 팁은 크레딧 잔액에서 콘텐츠 크리에이터에게 직접 전송됩니다.
  it: Le mance vengono inviate direttamente dal tuo saldo crediti al creatore di contenuti.
  tr: Bahşişler, kredi bakiyenizden doğrudan içerik oluşturucuya gönderilir.
  vi: Tips được gửi trực tiếp từ số dư tín dụng của bạn đến người tạo nội dung.
  id: Tips dikirim langsung dari saldo kredit Anda ke pembuat konten.
  pl: Napiwki są wysyłane bezpośrednio z salda kredytów do twórcy treści.
  nl: Fooien worden rechtstreeks van uw creditbalans naar de maker gestuurd.
  ar: يتم إرسال الإكراميات مباشرة من رصيدك إلى منشئ المحتوى.
  hi: टिप्स आपके क्रेडिट बैलेंस से सीधे कंटेंट क्रिएटर को भेजे जाते हैं।
  th: ทิปจะถูกส่งโดยตรงจากยอดคงเหลือเครดิตของคุณไปยังผู้สร้างเนื้อหา
  cs: Spropitné je odesíláno přímo z vašeho kreditního zůstatku tvůrci obsahu.
  sv: Tips skickas direkt från ditt kreditssaldo till innehållsskaparen.
  he: טיפים נשלחים ישירות מיתרת הקרדיטים שלך ליוצר התוכן.
  verified_by_human: []

channel_id_required:
  context: Info message when channel ID is missing for video tipping
  en: Channel ID is required to tip video creators.
  de: Die Kanal-ID ist erforderlich, um Video-Ersteller zu unterstützen.
  zh: 需要频道 ID 才能向视频创作者打赏。
  es: Se requiere el ID del canal para dar propina a los creadores de video.
  fr: L'ID de la chaîne est requis pour donner un pourboire aux créateurs vidéo.
  pt: O ID do canal é necessário para dar gorjeta a criadores de vídeo.
  ru: Для отправки чаевых видеоблогерам требуется ID канала.
  ja: 動画クリエイターへのチップにはチャンネルIDが必要です。
  ko: 동영상 크리에이터에게 팁을 보내려면 채널 ID가 필요합니다.
  it: L'ID del canale è necessario per dare la mancia ai creatori video.
  tr: Video yaratıcılarına bahşiş vermek için Kanal Kimliği gereklidir.
  vi: ID kênh là bắt buộc để tip cho người tạo video.
  id: ID saluran diperlukan untuk memberi tip kepada pembuat video.
  pl: ID kanału jest wymagane do napiwku dla twórców wideo.
  nl: Kanaal-ID is vereist om videocreators te fooien.
  ar: معرف القناة مطلوب لإرسال إكرامية لمنشئي الفيديو.
  hi: वीडियो क्रिएटर्स को टिप देने के लिए चैनल ID आवश्यक है।
  th: จำเป็นต้องมี ID ช่องเพื่อให้ทิปแก่ผู้สร้างวิดีโอ
  cs: Pro odeslání spropitného tvůrcům videí je vyžadováno ID kanálu.
  sv: Kanal-ID krävs för att ge tips till videoskapare.
  he: נדרש מזהה ערוץ כדי לתת טיפ ליוצרי וידאו.
  verified_by_human: []
