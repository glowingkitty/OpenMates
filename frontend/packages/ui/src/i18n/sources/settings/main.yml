support.disclaimer:
  context: Support contribution disclaimer text
  en: Support contributions help fund OpenMates development. They do not include additional credits.
  de: Unterstützungsbeiträge helfen, die Entwicklung von OpenMates zu finanzieren. Sie enthalten keine zusätzlichen Credits.
  zh: 支持捐助将用于资助 OpenMates 的开发，不包含额外积分。
  es: Las contribuciones de apoyo ayudan a financiar el desarrollo de OpenMates. No incluyen créditos adicionales.
  fr: Les contributions de soutien aident à financer le développement d’OpenMates. Elles n’incluent pas de crédits supplémentaires.
  pt: As contribuições de apoio ajudam a financiar o desenvolvimento do OpenMates. Elas não incluem créditos adicionais.
  ru: Взносы поддержки помогают финансировать разработку OpenMates. Они не включают дополнительные кредиты.
  ja: サポートの寄付は OpenMates の開発資金になります。追加クレジットは含まれません。
  ko: 후원금은 OpenMates 개발을 지원합니다. 추가 크레딧은 포함되지 않습니다.
  it: I contributi di supporto aiutano a finanziare lo sviluppo di OpenMates. Non includono crediti aggiuntivi.
  tr: Destek katkıları OpenMates'in geliştirilmesini finanse etmeye yardımcı olur. Ek kredi içermez.
  vi: Các khoản đóng góp hỗ trợ giúp tài trợ cho việc phát triển OpenMates. Không bao gồm tín dụng bổ sung.
  id: Kontribusi dukungan membantu mendanai pengembangan OpenMates. Tidak termasuk kredit tambahan.
  pl: Wpłaty wsparcia pomagają finansować rozwój OpenMates. Nie zawierają dodatkowych kredytów.
  nl: Steunbijdragen helpen de ontwikkeling van OpenMates te financieren. Ze bevatten geen extra credits.
  ar: تساهم مساهمات الدعم في تمويل تطوير OpenMates. لا تتضمن أرصدة إضافية.
  hi: समर्थन योगदान OpenMates के विकास को निधि देने में मदद करते हैं। इनमें अतिरिक्त क्रेडिट शामिल नहीं हैं।
  th: เงินสนับสนุนช่วยเป็นทุนในการพัฒนา OpenMates และไม่รวมเครดิตเพิ่มเติม
  cs: Příspěvky na podporu pomáhají financovat vývoj OpenMates. Neobsahují žádné další kredity.
  sv: Stödbidrag hjälper till att finansiera utvecklingen av OpenMates. De inkluderar inga extra krediter.
