developers_description:
  context: Developers settings description
  en: Manage your API keys and developer tools to integrate with OpenMates.
  de: Verwalten Sie Ihre API-Schlüssel und Entwicklertools für die Integration mit OpenMates.
  zh: 管理您的 API 密钥和开发者工具以与 OpenMates 集成。
  es: Administre sus claves API y herramientas de desarrollador para integrar con OpenMates.
  fr: Gérez vos clés API et outils de développeur pour intégrer avec OpenMates.
  pt: Gerencie suas chaves de API e ferramentas de desenvolvedor para integrar com o OpenMates.
  ru: Управляйте своими API-ключами и инструментами разработчика для интеграции с OpenMates.
  ja: OpenMatesと連携するためのAPIキーと開発者ツールを管理します。
  ko: OpenMates와 통합하기 위한 API 키와 개발자 도구를 관리합니다.
  it: Gestisci le tue chiavi API e gli strumenti per sviluppatori per integrarti con OpenMates.
  tr: OpenMates ile entegre olmak için API anahtarlarınızı ve geliştirici araçlarınızı yönetin.
  vi: Quản lý khóa API và công cụ nhà phát triển để tích hợp với OpenMates.
  id: Kelola kunci API dan alat pengembang Anda untuk berintegrasi dengan OpenMates.
  pl: Zarządzaj kluczami API i narzędziami deweloperskimi do integracji z OpenMates.
  nl: Beheer uw API-sleutels en ontwikkelaarstools voor integratie met OpenMates.
  ar: إدارة مفاتيح API وأدوات المطور الخاصة بك للتكامل مع OpenMates.
  hi: OpenMates के साथ एकीकृत करने के लिए अपनी API कुंजियाँ और डेवलपर टूल प्रबंधित करें।
  th: จัดการคีย์ API และเครื่องมือนักพัฒนาของคุณเพื่อผสานรวมกับ OpenMates
  cs: Spravujte své API klíče a vývojářské nástroje pro integraci s OpenMates.
  sv: Hantera dina API-nycklar och utvecklarverktyg för att integrera med OpenMates.
  he: נהל את מפתחות ה-API וכלי המפתחים שלך לשילוב עם OpenMates.
