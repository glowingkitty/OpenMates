incognito_explainer_description:
  context: Description of what incognito mode does
  en: "Incognito mode applies only to new chats you create. New chats created while incognito mode is active are not synced across devices, not stored on the server, and not cached. These chats exist only in your current browser session. Existing chats remain unchanged."
  de: "Der Inkognito-Modus gilt nur für neue Chats, die Sie erstellen. Neue Chats, die erstellt werden, während der Inkognito-Modus aktiv ist, werden nicht zwischen Geräten synchronisiert, nicht auf dem Server gespeichert und nicht zwischengespeichert. Diese Chats existieren nur in Ihrer aktuellen Browsersitzung. Bestehende Chats bleiben unverändert."
  zh: "隐身模式仅适用于您创建的新聊天。在隐身模式激活时创建的新聊天不会跨设备同步，不会存储在服务器上，也不会被缓存。这些聊天仅存在于您当前的浏览器会话中。现有聊天保持不变。"
  es: "El modo incógnito se aplica solo a los nuevos chats que cree. Los nuevos chats creados mientras el modo incógnito está activo no se sincronizan entre dispositivos, no se almacenan en el servidor y no se almacenan en caché. Estos chats solo existen en su sesión actual del navegador. Los chats existentes permanecen sin cambios."
  fr: "Le mode incognito s'applique uniquement aux nouveaux chats que vous créez. Les nouveaux chats créés lorsque le mode incognito est actif ne sont pas synchronisés entre les appareils, ne sont pas stockés sur le serveur et ne sont pas mis en cache. Ces chats n'existent que dans votre session de navigateur actuelle. Les chats existants restent inchangés."
  pt: "O modo incógnito aplica-se apenas aos novos chats que você cria. Os novos chats criados enquanto o modo incógnito está ativo não são sincronizados entre dispositivos, não são armazenados no servidor e não são armazenados em cache. Esses chats existem apenas na sua sessão atual do navegador. Os chats existentes permanecem inalterados."
  ru: "Режим инкогнито применяется только к новым чатам, которые вы создаёте. Новые чаты, созданные в режиме инкогнито, не синхронизируются между устройствами, не хранятся на сервере и не кэшируются. Эти чаты существуют только в текущей сессии браузера. Существующие чаты остаются без изменений."
  ja: "シークレットモードは、作成する新しいチャットにのみ適用されます。シークレットモードがアクティブな間に作成された新しいチャットは、デバイス間で同期されず、サーバーに保存されず、キャッシュされません。これらのチャットは、現在のブラウザセッションにのみ存在します。既存のチャットは変更されません。"
  ko: "시크릿 모드는 새로 만드는 채팅에만 적용됩니다. 시크릿 모드가 활성화된 동안 만들어진 새 채팅은 기기 간에 동기화되지 않고, 서버에 저장되지 않으며, 캐시되지 않습니다. 이 채팅은 현재 브라우저 세션에서만 존재합니다. 기존 채팅은 변경되지 않습니다."
  it: "La modalità incognito si applica solo alle nuove chat che crei. Le nuove chat create mentre la modalità incognito è attiva non vengono sincronizzate tra i dispositivi, non vengono memorizzate sul server e non vengono memorizzate nella cache. Queste chat esistono solo nella sessione corrente del browser. Le chat esistenti rimangono invariate."
  tr: "Gizli mod yalnızca oluşturduğunuz yeni sohbetlere uygulanır. Gizli mod etkinken oluşturulan yeni sohbetler cihazlar arasında senkronize edilmez, sunucuda saklanmaz ve önbelleğe alınmaz. Bu sohbetler yalnızca mevcut tarayıcı oturumunuzda mevcuttur. Mevcut sohbetler değişmeden kalır."
  vi: "Chế độ ẩn danh chỉ áp dụng cho các cuộc trò chuyện mới bạn tạo. Các cuộc trò chuyện mới được tạo khi chế độ ẩn danh đang hoạt động sẽ không được đồng bộ giữa các thiết bị, không được lưu trữ trên máy chủ và không được lưu vào bộ nhớ đệm. Các cuộc trò chuyện này chỉ tồn tại trong phiên trình duyệt hiện tại của bạn. Các cuộc trò chuyện hiện có vẫn không thay đổi."
  id: "Mode penyamaran hanya berlaku untuk obrolan baru yang Anda buat. Obrolan baru yang dibuat saat mode penyamaran aktif tidak disinkronkan antar perangkat, tidak disimpan di server, dan tidak di-cache. Obrolan ini hanya ada dalam sesi browser Anda saat ini. Obrolan yang ada tetap tidak berubah."
  pl: "Tryb incognito dotyczy tylko nowych czatów, które tworzysz. Nowe czaty tworzone w trybie incognito nie są synchronizowane między urządzeniami, nie są przechowywane na serwerze i nie są buforowane. Te czaty istnieją tylko w bieżącej sesji przeglądarki. Istniejące czaty pozostają bez zmian."
  nl: "Incognitomodus is alleen van toepassing op nieuwe chats die je aanmaakt. Nieuwe chats die zijn aangemaakt terwijl de incognitomodus actief is, worden niet gesynchroniseerd op apparaten, niet opgeslagen op de server en niet gecached. Deze chats bestaan alleen in je huidige browsersessie. Bestaande chats blijven ongewijzigd."
  ar: ينطبق وضع التصفح المتخفي فقط على الدردشات الجديدة التي تنشئها. الدردشات الجديدة التي يتم إنشاؤها أثناء تفعيل وضع التصفح المتخفي لا تتم مزامنتها عبر الأجهزة، ولا يتم تخزينها على الخادم، ولا يتم تخزينها مؤقتًا. توجد هذه الدردشات فقط في جلسة المتصفح الحالية. تظل الدردشات الحالية دون تغيير.
  hi: "गुप्त मोड केवल आपके द्वारा बनाए गए नए चैट पर लागू होता है। गुप्त मोड सक्रिय रहने के दौरान बनाए गए नए चैट डिवाइस में सिंक नहीं होते, सर्वर पर संग्रहीत नहीं होते और कैश नहीं होते। ये चैट केवल आपके वर्तमान ब्राउज़र सत्र में मौजूद हैं। मौजूदा चैट अपरिवर्तित रहते हैं।"
  th: "โหมดไม่ระบุตัวตนใช้ได้กับแชทใหม่ที่คุณสร้างเท่านั้น แชทใหม่ที่สร้างขณะที่โหมดไม่ระบุตัวตนเปิดใช้งานอยู่จะไม่ถูกซิงค์ข้ามอุปกรณ์ ไม่ถูกเก็บไว้บนเซิร์ฟเวอร์ และไม่ถูกแคช แชทเหล่านี้มีอยู่เฉพาะในเซสชันเบราว์เซอร์ปัจจุบันของคุณเท่านั้น แชทที่มีอยู่แล้วยังคงไม่เปลี่ยนแปลง"
  cs: "Anonymní režim se vztahuje pouze na nové chaty, které vytvoříte. Nové chaty vytvořené v anonymním režimu nejsou synchronizovány mezi zařízeními, nejsou uloženy na serveru a nejsou ukládány do mezipaměti. Tyto chaty existují pouze v aktuální relaci prohlížeče. Stávající chaty zůstávají nezměněny."
  sv: "Inkognitoläget gäller bara för nya chattar du skapar. Nya chattar som skapas i inkognitoläget synkroniseras inte mellan enheter, lagras inte på servern och cachas inte. Dessa chattar finns bara i din nuvarande webbläsarsession. Befintliga chattar förblir oförändrade."
  he: "מצב גלישה בסתר חל רק על צ'אטים חדשים שתיצור. צ'אטים חדשים שנוצרו בזמן שמצב גלישה בסתר פעיל אינם מסונכרנים בין מכשירים, אינם נשמרים בשרת ואינם נשמרים במטמון. צ'אטים אלו קיימים רק בהפעלת הדפדפן הנוכחית שלך. צ'אטים קיימים נותרים ללא שינוי."
  verified_by_human: []
