incognito_explainer_warning_providers:
  context: Warning that chats are still sent to third-party AI providers
  en: "Even in incognito mode, your chats are still sent to the selected third-party AI providers to process your requests. While these providers cannot directly see which user sent the request, your messages are still processed by their systems."
  de: "Auch im Inkognito-Modus werden Ihre Chats weiterhin an die ausgewählten Drittanbieter-KI-Anbieter gesendet, um Ihre Anfragen zu verarbeiten. Obwohl diese Anbieter nicht direkt sehen können, welcher Benutzer die Anfrage gesendet hat, werden Ihre Nachrichten dennoch von ihren Systemen verarbeitet."
  zh: "即使在隐身模式下，您的聊天仍会发送给选定的第三方AI提供商以处理您的请求。虽然这些提供商无法直接看到是哪个用户发送的请求，但您的消息仍会由他们的系统处理。"
  es: "Incluso en modo incógnito, sus chats se envían a los proveedores de IA de terceros seleccionados para procesar sus solicitudes. Aunque estos proveedores no pueden ver directamente qué usuario envió la solicitud, sus mensajes siguen siendo procesados por sus sistemas."
  fr: "Même en mode incognito, vos chats sont toujours envoyés aux fournisseurs d'IA tiers sélectionnés pour traiter vos demandes. Bien que ces fournisseurs ne puissent pas voir directement quel utilisateur a envoyé la demande, vos messages sont toujours traités par leurs systèmes."
  pt: "Mesmo no modo incógnito, seus chats ainda são enviados aos provedores de IA de terceiros selecionados para processar suas solicitações. Embora esses provedores não possam ver diretamente qual usuário enviou a solicitação, suas mensagens ainda são processadas por seus sistemas."
  ru: "Даже в режиме инкогнито ваши чаты всё равно отправляются выбранным сторонним провайдерам ИИ для обработки ваших запросов. Хотя эти провайдеры не могут напрямую видеть, какой пользователь отправил запрос, ваши сообщения всё равно обрабатываются их системами."
  ja: "シークレットモードでも、チャットは選択したサードパーティのAIプロバイダーに送信され、リクエストを処理します。これらのプロバイダーはどのユーザーがリクエストを送信したかを直接確認することはできませんが、メッセージは引き続きこれらのシステムによって処理されます。"
  ko: "시크릿 모드에서도 채팅은 여전히 선택된 타사 AI 제공업체로 전송되어 요청을 처리합니다. 이 제공업체들은 어느 사용자가 요청을 보냈는지 직접 볼 수 없지만, 메시지는 여전히 해당 시스템에 의해 처리됩니다."
  it: "Anche in modalità incognito, le tue chat vengono comunque inviate ai provider AI di terze parti selezionati per elaborare le tue richieste. Sebbene questi provider non possano vedere direttamente quale utente ha inviato la richiesta, i tuoi messaggi vengono comunque elaborati dai loro sistemi."
  tr: "Gizli modda bile sohbetleriniz isteklerinizi işlemek için seçilen üçüncü taraf yapay zeka sağlayıcılarına gönderilmeye devam eder. Bu sağlayıcılar hangi kullanıcının isteği gönderdiğini doğrudan göremese de mesajlarınız yine de sistemleri tarafından işlenir."
  vi: "Ngay cả trong chế độ ẩn danh, các cuộc trò chuyện của bạn vẫn được gửi đến các nhà cung cấp AI bên thứ ba đã chọn để xử lý yêu cầu của bạn. Mặc dù các nhà cung cấp này không thể trực tiếp xem người dùng nào đã gửi yêu cầu, tin nhắn của bạn vẫn được xử lý bởi hệ thống của họ."
  id: "Bahkan dalam mode penyamaran, obrolan Anda tetap dikirim ke penyedia AI pihak ketiga yang dipilih untuk memproses permintaan Anda. Meskipun penyedia ini tidak dapat langsung melihat pengguna mana yang mengirim permintaan, pesan Anda tetap diproses oleh sistem mereka."
  pl: "Nawet w trybie incognito Twoje czaty są nadal wysyłane do wybranych zewnętrznych dostawców AI w celu przetworzenia Twoich żądań. Chociaż ci dostawcy nie mogą bezpośrednio zobaczyć, który użytkownik wysłał żądanie, Twoje wiadomości są nadal przetwarzane przez ich systemy."
  nl: "Zelfs in incognitomodus worden je chats nog steeds naar de geselecteerde AI-providers van derden gestuurd om je verzoeken te verwerken. Hoewel deze providers niet direct kunnen zien welke gebruiker de aanvraag heeft ingediend, worden je berichten nog steeds verwerkt door hun systemen."
  ar: حتى في وضع التصفح المتخفي، لا تزال دردشاتك تُرسل إلى مزودي خدمات الذكاء الاصطناعي الخارجيين المحددين لمعالجة طلباتك. وبينما لا يمكن لهؤلاء المزودين معرفة أي مستخدم أرسل الطلب بشكل مباشر، إلا أن رسائلك لا تزال تُعالج بواسطة أنظمتهم.
  hi: "गुप्त मोड में भी, आपके चैट आपके अनुरोधों को संसाधित करने के लिए चयनित तृतीय-पक्ष AI प्रदाताओं को भेजे जाते हैं। हालांकि ये प्रदाता सीधे नहीं देख सकते कि किस उपयोगकर्ता ने अनुरोध भेजा, आपके संदेश अभी भी उनके सिस्टम द्वारा संसाधित किए जाते हैं।"
  th: "แม้ในโหมดไม่ระบุตัวตน แชทของคุณยังคงถูกส่งไปยังผู้ให้บริการ AI บุคคลที่สามที่เลือกไว้เพื่อประมวลผลคำขอของคุณ แม้ว่าผู้ให้บริการเหล่านี้จะไม่สามารถเห็นโดยตรงว่าผู้ใช้คนใดส่งคำขอ แต่ข้อความของคุณยังคงถูกประมวลผลโดยระบบของพวกเขา"
  cs: "I v anonymním režimu jsou vaše chaty stále odesílány vybraným poskytovatelům AI třetích stran ke zpracování vašich požadavků. Přestože tito poskytovatelé nemohou přímo vidět, který uživatel požadavek odeslal, vaše zprávy jsou stále zpracovávány jejich systémy."
  sv: "Även i inkognitoläget skickas dina chattar fortfarande till de valda AI-leverantörerna från tredje part för att behandla dina förfrågningar. Även om dessa leverantörer inte direkt kan se vilken användare som skickade förfrågan, behandlas dina meddelanden fortfarande av deras system."
  he: "גם במצב גלישה בסתר, הצ'אטים שלך עדיין נשלחים לספקי ה-AI הנבחרים של צד שלישי כדי לעבד את הבקשות שלך. למרות שספקים אלו אינם יכולים לראות ישירות איזה משתמש שלח את הבקשה, ההודעות שלך עדיין מעובדות על ידי המערכות שלהם."
  verified_by_human: []
incognito_explainer_warning_personal_info:
  context: Warning to not include personal information in incognito chats
  en: "It is strongly recommended to not include any personal information, sensitive data, or confidential details in incognito chats."
  de: "Es wird dringend empfohlen, keine persönlichen Informationen, sensiblen Daten oder vertraulichen Details in Inkognito-Chats einzufügen."
  zh: "强烈建议不要在隐身聊天中包含任何个人信息、敏感数据或机密详情。"
  es: "Se recomienda encarecidamente no incluir información personal, datos sensibles o detalles confidenciales en los chats incógnitos."
  fr: "Il est fortement recommandé de ne pas inclure d'informations personnelles, de données sensibles ou de détails confidentiels dans les chats incognito."
  pt: "É altamente recomendado não incluir nenhuma informação pessoal, dados confidenciais ou detalhes sigilosos nos chats incógnitos."
  ru: "Настоятельно рекомендуется не включать личную информацию, конфиденциальные данные или секретные сведения в чаты в режиме инкогнито."
  ja: "シークレットチャットには、個人情報、機密データ、または機密の詳細を含めないことを強くお勧めします。"
  ko: "시크릿 채팅에 개인 정보, 민감한 데이터 또는 기밀 세부 정보를 포함하지 않도록 강력히 권장합니다."
  it: "Si raccomanda vivamente di non includere informazioni personali, dati sensibili o dettagli riservati nelle chat incognito."
  tr: "Gizli sohbetlere herhangi bir kişisel bilgi, hassas veri veya gizli ayrıntı eklememek şiddetle tavsiye edilir."
  vi: "Rất khuyến nghị không bao gồm bất kỳ thông tin cá nhân, dữ liệu nhạy cảm hoặc chi tiết bí mật nào trong các cuộc trò chuyện ẩn danh."
  id: "Sangat disarankan untuk tidak menyertakan informasi pribadi, data sensitif, atau detail rahasia dalam obrolan penyamaran."
  pl: "Zdecydowanie zaleca się, aby nie umieszczać żadnych danych osobowych, wrażliwych danych ani poufnych szczegółów w czatach incognito."
  nl: "Het wordt sterk aanbevolen om geen persoonlijke informatie, gevoelige gegevens of vertrouwelijke details op te nemen in incognitochats."
  ar: يُنصح بشدة بعدم تضمين أي معلومات شخصية أو بيانات حساسة أو تفاصيل سرية في الدردشات المتخفية.
  hi: "गुप्त चैट में कोई भी व्यक्तिगत जानकारी, संवेदनशील डेटा या गोपनीय विवरण शामिल न करने की दृढ़ता से अनुशंसा की जाती है।"
  th: "แนะนำอย่างยิ่งว่าอย่าใส่ข้อมูลส่วนตัว ข้อมูลที่ละเอียดอ่อน หรือรายละเอียดที่เป็นความลับในแชทไม่ระบุตัวตน"
  cs: "Důrazně se doporučuje nezahrnovat žádné osobní informace, citlivé údaje ani důvěrné podrobnosti do anonymních chatů."
  sv: "Det rekommenderas starkt att inte inkludera personlig information, känsliga uppgifter eller konfidentiella detaljer i inkognitochattar."
  he: "מומלץ מאוד לא לכלול מידע אישי, נתונים רגישים או פרטים חסויים בצ'אטים במצב גלישה בסתר."
