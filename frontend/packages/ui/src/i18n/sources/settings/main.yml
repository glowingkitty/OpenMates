  context: Helper text shown to admins under the Share Debug Logs sub-setting in report issue settings
  en: You are an admin. Therefore your debug logs are automatically shared already. Regular users can turn on/off debug logs sharing here.
  de: Sie sind Administrator. Daher werden Ihre Debug-Protokolle bereits automatisch geteilt. Normale Nutzer können die Freigabe von Debug-Protokollen hier ein- und ausschalten.
  zh: 您是管理员，因此您的调试日志已自动共享。普通用户可以在此开启或关闭调试日志共享。
  es: Eres administrador. Por ello, tus registros de depuración ya se comparten automáticamente. Los usuarios normales pueden activar o desactivar aquí el uso compartido de registros de depuración.
  fr: Vous êtes administrateur. Vos journaux de débogage sont donc déjà partagés automatiquement. Les utilisateurs réguliers peuvent activer ou désactiver ici le partage des journaux de débogage.
  pt: Você é administrador. Portanto, seus logs de depuração já são compartilhados automaticamente. Usuários regulares podem ativar ou desativar aqui o compartilhamento de logs de depuração.
  ru: Вы администратор. Поэтому ваши журналы отладки уже автоматически передаются. Обычные пользователи могут включать или выключать передачу журналов отладки здесь.
  ja: あなたは管理者です。そのため、あなたのデバッグログはすでに自動的に共有されています。通常ユーザーはここでデバッグログ共有のオン/オフを切り替えられます。
  ko: 귀하는 관리자입니다. 따라서 디버그 로그는 이미 자동으로 공유됩니다. 일반 사용자는 여기에서 디버그 로그 공유를 켜거나 끌 수 있습니다.
  it: Sei un amministratore. Pertanto i tuoi log di debug sono già condivisi automaticamente. Gli utenti normali possono attivare o disattivare qui la condivisione dei log di debug.
  tr: Siz bir yöneticisiniz. Bu nedenle hata ayıklama günlükleriniz zaten otomatik olarak paylaşılır. Normal kullanıcılar hata ayıklama günlüğü paylaşımını burada açıp kapatabilir.
  vi: Bạn là quản trị viên. Vì vậy nhật ký gỡ lỗi của bạn đã được tự động chia sẻ. Người dùng thông thường có thể bật hoặc tắt chia sẻ nhật ký gỡ lỗi tại đây.
  id: Anda adalah admin. Karena itu, log debug Anda sudah otomatis dibagikan. Pengguna biasa dapat menyalakan atau mematikan berbagi log debug di sini.
  pl: Jesteś administratorem. Dlatego Twoje logi debugowania są już automatycznie udostępniane. Zwykli użytkownicy mogą tutaj włączać lub wyłączać udostępnianie logów debugowania.
  nl: Je bent een beheerder. Daarom worden je debuglogboeken al automatisch gedeeld. Gewone gebruikers kunnen hier het delen van debuglogboeken in- of uitschakelen.
  ar: أنت مسؤول، لذلك تتم مشاركة سجلات التصحيح الخاصة بك تلقائيًا بالفعل. يمكن للمستخدمين العاديين تشغيل أو إيقاف مشاركة سجلات التصحيح هنا.
  hi: आप एक एडमिन हैं। इसलिए आपके डिबग लॉग पहले से ही स्वचालित रूप से साझा किए जाते हैं। सामान्य उपयोगकर्ता यहां डिबग लॉग साझा करना चालू/बंद कर सकते हैं।
  th: คุณเป็นผู้ดูแลระบบ ดังนั้นบันทึกดีบักของคุณจึงถูกแชร์โดยอัตโนมัติอยู่แล้ว ผู้ใช้ทั่วไปสามารถเปิดหรือปิดการแชร์บันทึกดีบักได้ที่นี่
  cs: Jste administrátor. Proto jsou vaše ladicí protokoly již automaticky sdíleny. Běžní uživatelé zde mohou sdílení ladicích protokolů zapnout nebo vypnout.
  sv: Du är administratör. Därför delas dina felsökningsloggar redan automatiskt. Vanliga användare kan slå på eller av delning av felsökningsloggar här.
  he: אתה מנהל מערכת, ולכן יומני הדיבאג שלך כבר משותפים אוטומטית. משתמשים רגילים יכולים להפעיל או לכבות כאן את שיתוף יומני הדיבאג.
  verified_by_human: []
report_issue.description:
  context: Description text for the report issue form — encourages users to add details and a screenshot for faster resolution
  en: "Found a bug or have a suggestion? Let us know! The more details you include — and ideally a screenshot — the quicker we can identify and fix the issue."
  de: "Einen Fehler gefunden oder einen Vorschlag? Lass es uns wissen! Je mehr Details du angibst — und idealerweise ein Screenshot — desto schneller können wir das Problem identifizieren und beheben."
  zh: "发现了错误或有建议？告诉我们！您提供的细节越多——最好附上截图——我们就能越快地找到并修复问题。"
  es: "¿Encontraste un error o tienes una sugerencia? ¡Haznos saber! Cuantos más detalles incluyas — idealmente con una captura de pantalla — más rápido podremos identificar y solucionar el problema."
  fr: "Vous avez trouvé un bug ou avez une suggestion ? Faites-le nous savoir ! Plus vous fournissez de détails — et idéalement une capture d'écran — plus vite nous pourrons identifier et corriger le problème."
  pt: "Encontrou um bug ou tem uma sugestão? Avise-nos! Quanto mais detalhes você incluir — de preferência com uma captura de tela — mais rápido conseguiremos identificar e corrigir o problema."
  ru: "Нашли ошибку или есть предложение? Дайте нам знать! Чем больше деталей вы предоставите — и в идеале скриншот — тем быстрее мы сможем найти и исправить проблему."
  ja: "バグを見つけたり、提案がありますか？お知らせください！詳細を多く含めるほど — そしてできればスクリーンショットも — 問題をより早く特定して修正できます。"
  ko: "버그를 발견했거나 제안이 있으신가요? 알려주세요! 더 많은 세부 사항을 포함할수록 — 이상적으로는 스크린샷도 함께 — 더 빨리 문제를 파악하고 수정할 수 있습니다."
  it: "Hai trovato un bug o hai un suggerimento? Faccelo sapere! Più dettagli includi — idealmente con uno screenshot — più velocemente potremo identificare e risolvere il problema."
  tr: "Bir hata buldunuz mu veya bir öneriniz mi var? Bize bildirin! Ne kadar çok ayrıntı eklerseniz — ideal olarak bir ekran görüntüsüyle birlikte — sorunu o kadar hızlı tespit edip düzeltebiliriz."
  vi: "Tìm thấy lỗi hoặc có đề xuất? Hãy cho chúng tôi biết! Bạn cung cấp càng nhiều chi tiết — và lý tưởng nhất là có ảnh chụp màn hình — chúng tôi càng có thể xác định và khắc phục sự cố nhanh hơn."
  id: "Menemukan bug atau punya saran? Beri tahu kami! Semakin banyak detail yang Anda sertakan — idealnya dengan tangkapan layar — semakin cepat kami dapat mengidentifikasi dan memperbaiki masalah."
  pl: "Znalazłeś błąd lub masz sugestię? Daj nam znać! Im więcej szczegółów podasz — najlepiej ze zrzutem ekranu — tym szybciej będziemy mogli zidentyfikować i naprawić problem."
  nl: "Een bug gevonden of een suggestie? Laat het ons weten! Hoe meer details je toevoegt — bij voorkeur met een screenshot — hoe sneller we het probleem kunnen identificeren en oplossen."
  ar: "وجدت خطأ أو لديك اقتراح؟ أخبرنا! كلما أضفت تفاصيل أكثر — ومثالياً مع لقطة شاشة — كلما تمكنا من تحديد المشكلة وإصلاحها بشكل أسرع."
  hi: "बग मिला या सुझाव है? हमें बताएं! आप जितने अधिक विवरण शामिल करेंगे — आदर्श रूप से एक स्क्रीनशॉट के साथ — हम उतनी ही जल्दी समस्या की पहचान और समाधान कर सकेंगे।"
  th: "พบข้อผิดพลาดหรือมีข้อเสนอแนะ? แจ้งให้เราทราบ! ยิ่งคุณใส่รายละเอียดมาก — และโดยเฉพาะอย่างยิ่งภาพหน้าจอ — เราก็ยิ่งสามารถระบุและแก้ไขปัญหาได้เร็วขึ้น"
  cs: "Našli jste chybu nebo máte návrh? Dejte nám vědět! Čím více podrobností uvedete — ideálně se snímkem obrazovky — tím rychleji budeme moci problém identifikovat a vyřešit."
  sv: "Hittat en bugg eller har ett förslag? Låt oss veta! Ju mer detaljer du inkluderar — och helst en skärmbild — desto snabbare kan vi identifiera och åtgärda problemet."
  he: "מצאת באג או שיש לך הצעה? נשמח לשמוע! ככל שיהיו יותר פרטים — ובאופן אידיאלי גם צילום מסך — כך נוכל לזהות ולתקן את הבעיה מהר יותר."
  verified_by_human: []
