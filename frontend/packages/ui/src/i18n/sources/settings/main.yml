report_issue.confirmation_body:
  context: Body text on the confirmation page explaining what happens next
  en: We have received your report and will look into it. You can reference your issue using the ID below.
  de: Wir haben deine Meldung erhalten und werden sie prüfen. Du kannst dein Problem mit der folgenden ID referenzieren.
  zh: 我们已收到您的报告并将进行调查。您可以使用以下 ID 引用您的问题。
  es: Hemos recibido tu informe y lo investigaremos. Puedes referenciar tu problema usando el ID a continuación.
  fr: Nous avons reçu votre signalement et allons l'examiner. Vous pouvez référencer votre problème avec l'ID ci-dessous.
  pt: Recebemos seu relatório e vamos analisá-lo. Você pode referenciar seu problema usando o ID abaixo.
  ru: Мы получили ваш отчёт и рассмотрим его. Вы можете ссылаться на проблему по ID ниже.
  ja: ご報告を受け取りました。確認いたします。以下のIDで問題を参照できます。
  ko: 신고를 받았으며 검토하겠습니다. 아래 ID로 문제를 참조할 수 있습니다.
  it: Abbiamo ricevuto la tua segnalazione e la esamineremo. Puoi fare riferimento al tuo problema con l'ID qui sotto.
  tr: Raporunuzu aldık ve inceleyeceğiz. Sorununuzu aşağıdaki ID ile referans alabilirsiniz.
  vi: Chúng tôi đã nhận được báo cáo của bạn và sẽ xem xét. Bạn có thể tham chiếu vấn đề bằng ID bên dưới.
  id: Kami telah menerima laporan Anda dan akan menindaklanjutinya. Anda dapat merujuk masalah dengan ID di bawah.
  pl: Otrzymaliśmy Twoje zgłoszenie i zajmiemy się nim. Możesz odwoływać się do problemu używając poniższego ID.
  nl: We hebben uw rapport ontvangen en zullen het onderzoeken. U kunt uw probleem refereren met de ID hieronder.
  ar: لقد استلمنا تقريرك وسنتابعه. يمكنك الرجوع إلى مشكلتك باستخدام المعرف أدناه.
  hi: हमें आपकी रिपोर्ट मिल गई है और हम इसकी जांच करेंगे। आप नीचे दी गई ID का उपयोग करके अपनी समस्या का संदर्भ दे सकते हैं।
  th: เราได้รับรายงานของคุณแล้วและจะดำเนินการตรวจสอบ คุณสามารถอ้างอิงปัญหาด้วย ID ด้านล่าง
  cs: Obdrželi jsme váš report a prověříme ho. Na problém se můžete odvolávat pomocí níže uvedeného ID.
  sv: Vi har tagit emot din rapport och kommer att undersöka den. Du kan referera till ditt problem med ID:t nedan.
  he: קיבלנו את הדיווח שלך ונבדוק אותו. ניתן להתייחס לדיווח באמצעות המזהה (ID) שלמטה.
