developers_devices_description:
  context: Devices description
  en: Manage devices that can use your API keys. Approve or revoke device access.
  de: Verwalten Sie Geräte, die Ihre API-Schlüssel verwenden können. Genehmigen oder widerrufen Sie den Gerätezugriff.
  zh: 管理可以使用您的 API 密钥的设备。批准或撤销设备访问。
  es: Administre los dispositivos que pueden usar sus claves API. Apruebe o revoque el acceso del dispositivo.
  fr: Gérez les appareils qui peuvent utiliser vos clés API. Approuvez ou révoquez l'accès aux appareils.
  pt: Gerencie dispositivos que podem usar suas chaves de API. Aprove ou revogue o acesso do dispositivo.
  ru: Управляйте устройствами, которые могут использовать ваши API-ключи. Одобряйте или отзывайте доступ устройств.
  ja: APIキーを使用できるデバイスを管理します。デバイスアクセスを承認または取り消します。
  ko: API 키를 사용할 수 있는 기기를 관리합니다. 기기 액세스를 승인하거나 취소합니다.
  it: Gestisci i dispositivi che possono utilizzare le tue chiavi API. Approva o revoca l'accesso del dispositivo.
  tr: API anahtarlarınızı kullanabilen cihazları yönetin. Cihaz erişimini onaylayın veya iptal edin.
  vi: Quản lý các thiết bị có thể sử dụng khóa API của bạn. Phê duyệt hoặc thu hồi quyền truy cập thiết bị.
  id: Kelola perangkat yang dapat menggunakan kunci API Anda. Setujui atau cabut akses perangkat.
  pl: Zarządzaj urządzeniami, które mogą używać Twoich kluczy API. Zatwierdź lub cofnij dostęp urządzenia.
