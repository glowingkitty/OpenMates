report_issue.device_info.description:
  context: Description for the device information notice shown under the report issue submit button
  en: "To help debug your issue, the following technical information about your device will be included in your report and sent via email to our server admin:"
  de: "Um bei der Behebung Ihres Problems zu helfen, werden die folgenden technischen Informationen über Ihr Gerät in Ihren Bericht aufgenommen und per E-Mail an unseren Serveradministrator gesendet:"
  zh: "为了帮助调试您的问题，以下关于您设备的技术信息将包含在您的报告中并通过电子邮件发送给我们的服务器管理员："
  es: "Para ayudar a depurar tu problema, la siguiente información técnica sobre tu dispositivo se incluirá en tu reporte y se enviará por correo electrónico a nuestro administrador del servidor:"
  fr: "Pour aider à déboguer votre problème, les informations techniques suivantes sur votre appareil seront incluses dans votre rapport et envoyées par e-mail à notre administrateur serveur :"
  pt: "Para ajudar a depurar seu problema, as seguintes informações técnicas sobre seu dispositivo serão incluídas em seu relatório e enviadas por e-mail ao nosso administrador do servidor:"
  ru: "Чтобы помочь с отладкой вашей проблемы, следующая техническая информация о вашем устройстве будет включена в ваш отчет и отправлена по электронной почте нашему администратору сервера:"
  ja: "お客様の問題のデバッグをサポートするため、お客様のデバイスに関する以下の技術情報がレポートに含まれ、サーバー管理者にメールで送信されます："
  ko: "귀하의 문제를 디버깅하는 데 도움이 되도록, 귀하의 기기에 대한 다음 기술 정보가 보고서에 포함되어 서버 관리자에게 이메일로 전송됩니다:"
  it: "Per aiutare a risolvere il tuo problema, le seguenti informazioni tecniche sul tuo dispositivo saranno incluse nel tuo report e inviate via email al nostro amministratore del server:"
  tr: "Sorununuzu çözmeye yardımcı olmak için, cihazınızla ilgili aşağıdaki teknik bilgiler raporunuza dahil edilecek ve e-posta yoluyla sunucu yöneticimize gönderilecektir:"
  vi: "Để giúp gỡ lỗi vấn đề của bạn, các thông tin kỹ thuật sau về thiết bị của bạn sẽ được bao gồm trong báo cáo và gửi qua email tới quản trị viên máy chủ của chúng tôi:"
  id: "Untuk membantu men-debug masalah Anda, informasi teknis berikut tentang perangkat Anda akan disertakan dalam laporan Anda dan dikirim melalui email kepada admin server kami:"
  pl: "Aby pomóc w debugowaniu Twojego problemu, następujące informacje techniczne o Twoim urządzeniu zostaną uwzględnione w Twoim raporcie i wysłane e-mailem do naszego administratora serwera:"
  nl: "Om te helpen bij het debuggen van uw probleem, zal de volgende technische informatie over uw apparaat worden opgenomen in uw rapport en per e-mail worden verzonden naar onze serverbeheerder:"
  ar: "للمساعدة في حل مشكلتك، ستُدرج المعلومات التقنية التالية حول جهازك في تقريرك وسيتم إرسالها عبر البريد الإلكتروني إلى مدير الخادم لدينا:"
  hi: "आपकी समस्या को ठीक करने में मदद करने के लिए, आपके डिवाइस के बारे में निम्नलिखित तकनीकी जानकारी आपकी रिपोर्ट में शामिल की जाएगी और हमारे सर्वर एडमिन को ईमेल के माध्यम से भेजी जाएगी:"
  th: "เพื่อช่วยในการแก้ไขปัญหาของคุณ ข้อมูลทางเทคนิคต่อไปนี้เกี่ยวกับอุปกรณ์ของคุณจะถูกรวมไว้ในรายงานของคุณและส่งทางอีเมลไปยังผู้ดูแลเซิร์ฟเวอร์ของเรา:"
  cs: "Pro pomoc při ladění vašeho problému budou následující technické informace o vašem zařízení zahrnuty do vaší zprávy a odeslány e-mailem našemu správci serveru:"
  sv: "För att hjälpa till med debugging av ditt problem kommer följande tekniska information om din enhet att inkluderas i din rapport och skickas via e-post till vår serveradministratör:"
  he: "כדי לעזור בפתרון הבעיה, המידע הטכני הבא על המכשיר שלך ייכלל בדיווח ויישלח באימייל למנהל השרת:"
  verified_by_human: []
