last_warning_image_not_allowed:
  context: Last warning error message shown when profile image contains nudity or violence or gore
  en: "Last warning:

    No nudity, violence or gore in profile images.

    One more violation and your account will be deleted.

    "
  ar: "تحذير أخير: لا يُسمح بالعري أو العنف أو المحتوى الدموي في صور الملف الشخصي. انتهاك آخر وسيتم حذف حسابك."
  de: "Letzte Warnung:

    Keine Nacktheit, Gewalt oder Blut in Profilbildern.

    Noch eine Verletzung und dein Konto wird gelöscht.

    "
  zh: "最后警告：

    个人资料图片中不允许裸露、暴力或血腥。

    再次违规，您的帐户将被删除。

    "
  es: "Última advertencia:

    No se permiten desnudos, violencia o sangre en las imágenes

    "
  fr: "Dernier avertissement :

    Pas de nudité, de violence ou de sang dans les images de profil.

    Une violation supplémentaire et votre compte sera supprimé.

    "
  pt: "Último aviso:

    Sem nudez, violência ou gore em fotos de perfil.

    Mais uma violação e sua conta será excluída.

    "
  ru: "Последнее предупреждение:

    Никакой наготы, насилия или жестокости в фотографиях профиля.

    Ещё одно нарушение — и ваш аккаунт будет удалён.

    "
  ja: "最後の警告：

    プロフィール画像にヌード、暴力、またはグロテスクなものを含めないでください。

    もう1回違反するとアカウントが削除されます。

    "
  ko: "최후 경고:

    프로필 이미지에 노출, 폭력 또는 잔인한 콘텐츠를 사용할 수 없습니다.

    한 번 더 위반하면 계정이 삭제됩니다.

    "
  it: "Ultimo avviso:

    Vietate nudità, violenza o contenuti cruenti nelle immagini del profilo.

    Un'altra violazione e il tuo account verrà eliminato.

    "
  tr: "Son uyarı:

    Profil resimlerinde çıplaklık, şiddet veya kan içeriklerine izin verilmez.

    Bir ihlal daha ve hesabınız silinecek.

    "
  vi: "Cảnh báo cuối cùng:

    Không có khỏa thân, bạo lực hoặc nội dung rùng rợn trong ảnh hồ sơ.

    Thêm một vi phạm nữa và tài khoản của bạn sẽ bị xóa.

    "
  id: "Peringatan terakhir:

    Tidak ada ketelanjangan, kekerasan, atau konten mengerikan di foto profil.

    Satu pelanggaran lagi dan akun Anda akan dihapus.

    "
  pl: "Ostatnie ostrzeżenie:

    Brak nagości, przemocy lub makabrycznych treści w zdjęciach profilowych.

    Jeszcze jedno naruszenie i Twoje konto zostanie usunięte.

    "
  nl: "Laatste waarschuwing:

    Geen naaktheid, geweld of gore in profielfoto's.

    Nog één overtreding en uw account wordt verwijderd.

    "
  hi: "अंतिम चेतावनी:

    प्रोफ़ाइल छवियों में नग्नता, हिंसा या रक्तरंजित सामग्री नहीं।

    एक और उल्लंघन और आपका खाता हटा दिया जाएगा।

    "
  th: "คำเตือนครั้งสุดท้าย:

    ห้ามมีภาพเปลือย ความรุนแรง หรือเนื้อหาสยดสยองในรูปโปรไฟล์

    อีกหนึ่งการละเมิดและบัญชีของคุณจะถูกลบ

    "
  cs: "Poslední varování:

    Žádná nahota, násilí ani krvavé scény na profilových obrázcích.

    Ještě jedno porušení a váš účet bude smazán.

    "
  sv: "Sista varningen:

    Ingen nakenhet, våld eller blodbad i profilbilder.

    Ytterligare en överträdelse och ditt konto raderas.

    "
  he: |
    אזהרה אחרונה:
    אין להשתמש בעירום, אלימות או תכנים קשים בתמונות פרופיל.
    הפרה נוספת אחת וחשבונך יימחק.
