ai_ask_settings.models_description:
  context: Description above models list
  en: Enable or disable models for the AI Ask skill. Disabled models won't appear in @mention suggestions.
  de: Aktivieren oder deaktivieren Sie Modelle für die AI Ask-Funktion. Deaktivierte Modelle erscheinen nicht in @Erwähnungsvorschlägen.
  ar: مكّن أو عطّل النماذج لمهارة AI Ask. لن تظهر النماذج المعطّلة في اقتراحات @الإشارة.
  he: הפעל או השבת מודלים עבור מיומנות ה-AI Ask. מודלים מושבתים לא יופיעו בהצעות @mention.
  verified_by_human: []
  zh: 启用或禁用AI问答技能的模型。禁用的模型不会出现在@提及建议中。
  es: Habilita o deshabilita modelos para la habilidad AI Ask. Los modelos deshabilitados no aparecerán en las sugerencias de @mención.
  fr: Activez ou désactivez des modèles pour la compétence AI Ask. Les modèles désactivés n'apparaîtront pas dans les suggestions @mention.
  pt: Ative ou desative modelos para a habilidade AI Ask. Modelos desativados não aparecerão nas sugestões de @menção.
  ru: Включите или отключите модели для навыка AI Ask. Отключённые модели не будут отображаться в предложениях @упоминания.
  ja: AI Askスキルのモデルを有効または無効にします。無効にしたモデルは@メンションの候補に表示されません。
  ko: AI Ask 스킬의 모델을 활성화하거나 비활성화합니다. 비활성화된 모델은 @멘션 제안에 표시되지 않습니다.
  it: Abilita o disabilita i modelli per la skill AI Ask. I modelli disabilitati non appariranno nei suggerimenti @mention.
  tr: AI Ask becerisi için modelleri etkinleştirin veya devre dışı bırakın. Devre dışı bırakılan modeller @bahis önerilerinde görünmez.
  vi: Bật hoặc tắt các mô hình cho kỹ năng AI Ask. Các mô hình bị tắt sẽ không xuất hiện trong gợi ý @mention.
  id: Aktifkan atau nonaktifkan model untuk skill AI Ask. Model yang dinonaktifkan tidak akan muncul dalam saran @mention.
  pl: Włącz lub wyłącz modele dla umiejętności AI Ask. Wyłączone modele nie będą pojawiać się w sugestiach @wzmianka.
  nl: Schakel modellen in of uit voor de AI Ask-vaardigheid. Uitgeschakelde modellen verschijnen niet in @mention-suggesties.
  hi: AI Ask स्किल के लिए मॉडल सक्षम या अक्षम करें। अक्षम मॉडल @mention सुझावों में दिखाई नहीं देंगे।
  th: เปิดใช้งานหรือปิดใช้งานโมเดลสำหรับทักษะ AI Ask โมเดลที่ปิดใช้งานจะไม่ปรากฏในคำแนะนำ @mention
  cs: Povolte nebo zakažte modely pro dovednost AI Ask. Zakázané modely se nebudou zobrazovat v návrzích @zmínka.
  sv: Aktivera eller inaktivera modeller för AI Ask-färdigheten. Inaktiverade modeller visas inte i @mention-förslag.

