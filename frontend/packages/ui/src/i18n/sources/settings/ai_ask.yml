ai_ask_settings.quick_tips_description:
  context: Description for quick tips toggle
  en: Shows occasional product tips after assistant replies. Turn this off if you do not want OpenMates to generate quick tip cards.
  de: Zeigt gelegentliche Produkttipps nach Antworten des Assistenten. Deaktiviere dies, wenn OpenMates keine Kurztipp-Karten generieren soll.

  zh: 在助手回复后偶尔显示产品提示。如果你不希望 OpenMates 生成快捷提示卡片，请关闭此选项。
  es: Muestra consejos ocasionales sobre el producto después de las respuestas del asistente. Desactiva esta opción si no quieres que OpenMates genere tarjetas de consejos rápidos.
  fr: "Affiche occasionnellement des astuces produit après les réponses de l'assistant. Désactive cette option si tu ne souhaites pas qu'OpenMates génère des fiches d'astuces rapides."
  pt: Mostra dicas ocasionais do produto após as respostas do assistente. Desativa esta opção se não quiseres que o OpenMates gere cartões de dicas rápidas.
  ru: Показывает периодические советы по продукту после ответов ассистента. Выключи это, если не хочешь, чтобы OpenMates создавал карточки с быстрыми советами.
  ja: アシスタントの回答後に、製品のヒントを時々表示します。OpenMatesによるクイックチップカードの生成を希望しない場合は、これをオフにしてください。
  ko: 어시스턴트 응답 후 가끔 제품 팁을 표시합니다. OpenMates가 퀵 팁 카드를 생성하지 않도록 하려면 이 기능을 끄세요.
  tr: "Asistan yanıtlarından sonra ara sıra ürün ipuçları gösterir. OpenMates'in hızlı ipucu kartları oluşturmasını istemiyorsan bunu kapat."
  vi: Hiển thị các mẹo sản phẩm thỉnh thoảng sau khi trợ lý trả lời. Tắt tính năng này nếu bạn không muốn OpenMates tạo các thẻ mẹo nhanh.
  id: Menampilkan tips produk sesekali setelah asisten membalas. Matikan ini jika kamu tidak ingin OpenMates membuat kartu tips cepat.
  pl: Wyświetla sporadyczne wskazówki dotyczące produktu po odpowiedziach asystenta. Wyłącz tę opcję, jeśli nie chcesz, aby OpenMates generował karty z szybkimi wskazówkami.
  nl: Toont af en toe producttips na antwoorden van de assistent. Schakel dit uit als je niet wilt dat OpenMates kaarten met snelle tips genereert.
  ar: يعرض نصائح عرضية حول المنتج بعد ردود المساعد. قم بإيقاف تشغيل هذا إذا كنت لا تريد أن يقوم OpenMates بإنشاء بطاقات نصائح سريعة.
  hi: असिस्टेंट के जवाबों के बाद कभी-कभी प्रोडक्ट टिप्स दिखाता है। अगर तुम नहीं चाहते कि OpenMates त्वरित सुझाव कार्ड जनरेट करे, तो इसे बंद कर दो।
  th: แสดงเคล็ดลับการใช้งานผลิตภัณฑ์เป็นครั้งคราวหลังจากผู้ช่วยตอบกลับ ปิดส่วนนี้หากคุณไม่ต้องการให้ OpenMates สร้างการ์ดเคล็ดลับด่วน
  it: "Mostra occasionali suggerimenti sul prodotto dopo le risposte dell'assistente. Disattiva questa opzione se non vuoi che OpenMates generi schede di suggerimenti rapidi."
  cs: Po odpovědích asistenta občas zobrazí tipy k produktu. Vypni tuto možnost, pokud nechceš, aby OpenMates generoval karty s rychlými tipy.
  sv: Visar tillfälliga produkttips efter assistentens svar. Stäng av detta om du inte vill att OpenMates ska generera snabbtipskort.
  he: מציג מדי פעם טיפים על המוצר לאחר תשובות העוזר. כבה אפשרות זו אם אינך רוצה ש-OpenMates יפיק כרטיסי טיפים מהירים.
