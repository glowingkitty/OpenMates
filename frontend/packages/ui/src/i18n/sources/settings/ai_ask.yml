  fr: Sélectionnez les serveurs à utiliser pour ce modèle. Les serveurs désactivés seront ignorés lors du traitement.
  pt: Selecione quais servidores usar para este modelo. Servidores desativados serão ignorados durante o processamento.
  ru: Выберите серверы для использования с этой моделью. Отключённые серверы будут пропущены при обработке.
