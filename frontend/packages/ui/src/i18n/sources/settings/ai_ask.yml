  ar: مكّن أو عطّل النماذج لمهارة AI Ask. لن تظهر النماذج المعطّلة في اقتراحات @الإشارة.
  he: הפעל או השבת מודלים עבור מיומנות ה-AI Ask. מודלים מושבתים לא יופיעו בהצעות @mention.
