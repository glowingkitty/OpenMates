ai_ask_model_details.servers_description:
  context: Description explaining server options
  en: Select which servers to use for this model. Disabled servers will be skipped during processing.
  de: Wählen Sie die Server aus, die für dieses Modell verwendet werden sollen. Deaktivierte Server werden bei der Verarbeitung übersprungen.
  ar: اختر الخوادم التي ستُستخدم لهذا النموذج. سيتم تخطي الخوادم المعطّلة أثناء المعالجة.
  he: בחר באילו שרתים להשתמש עבור מודל זה. המערכת תדלג על שרתים מושבתים במהלך העיבוד.
  verified_by_human: []
  zh: 选择此模型使用的服务器。处理时将跳过禁用的服务器。
  es: Selecciona qué servidores usar para este modelo. Los servidores deshabilitados se omitirán durante el procesamiento.
  fr: Sélectionnez les serveurs à utiliser pour ce modèle. Les serveurs désactivés seront ignorés lors du traitement.
  pt: Selecione quais servidores usar para este modelo. Servidores desativados serão ignorados durante o processamento.
  ru: Выберите серверы для использования с этой моделью. Отключённые серверы будут пропущены при обработке.
  ja: このモデルに使用するサーバーを選択してください。無効なサーバーは処理中にスキップされます。
  ko: 이 모델에 사용할 서버를 선택하세요. 비활성화된 서버는 처리 중에 건너뜁니다.
  it: Seleziona i server da usare per questo modello. I server disabilitati verranno ignorati durante l'elaborazione.
  tr: Bu model için hangi sunucuların kullanılacağını seçin. Devre dışı bırakılan sunucular işleme sırasında atlanır.
  vi: Chọn máy chủ nào sẽ sử dụng cho mô hình này. Máy chủ bị tắt sẽ bị bỏ qua trong quá trình xử lý.
  id: Pilih server mana yang akan digunakan untuk model ini. Server yang dinonaktifkan akan dilewati selama pemrosesan.
  pl: Wybierz serwery do użycia dla tego modelu. Wyłączone serwery będą pomijane podczas przetwarzania.
  nl: Selecteer welke servers u voor dit model wilt gebruiken. Uitgeschakelde servers worden overgeslagen tijdens verwerking.
  hi: इस मॉडल के लिए उपयोग किए जाने वाले सर्वर चुनें। प्रसंस्करण के दौरान अक्षम सर्वर छोड़ दिए जाएंगे।
  th: เลือกเซิร์ฟเวอร์ที่จะใช้สำหรับโมเดลนี้ เซิร์ฟเวอร์ที่ปิดใช้งานจะถูกข้ามในระหว่างการประมวลผล
  cs: Vyberte servery pro použití s tímto modelem. Zakázané servery budou přeskočeny při zpracování.
  sv: Välj vilka servrar som ska användas för denna modell. Inaktiverade servrar hoppas över under bearbetning.

