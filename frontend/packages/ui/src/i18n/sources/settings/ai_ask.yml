ai_ask_settings.auto_select_description:
  context: Description of auto-select feature
  en: Automatically selects the best model based on your query complexity and preferences.
  de: Wählt automatisch das beste Modell basierend auf der Komplexität Ihrer Anfrage und Ihren Präferenzen.
  ar: يختار تلقائيًا أفضل نموذج بناءً على تعقيد استعلامك وتفضيلاتك.
  he: בוחר באופן אוטומטי את המודל הטוב ביותר בהתבסס על מורכבות השאילתה וההעדפות שלך.
  verified_by_human: []
  zh: 根据您的查询复杂度和偏好自动选择最佳模型。
  es: Selecciona automáticamente el mejor modelo según la complejidad de tu consulta y tus preferencias.
  fr: Sélectionne automatiquement le meilleur modèle en fonction de la complexité de votre requête et de vos préférences.
  pt: Seleciona automaticamente o melhor modelo com base na complexidade da sua consulta e preferências.
  ru: Автоматически выбирает наилучшую модель на основе сложности вашего запроса и предпочтений.
  ja: クエリの複雑さと設定に基づいて最適なモデルを自動的に選択します。
  ko: 쿼리 복잡도와 설정에 따라 최적의 모델을 자동으로 선택합니다.
  it: Seleziona automaticamente il modello migliore in base alla complessità della query e alle preferenze.
  tr: Sorgunuzun karmaşıklığına ve tercihlerinize göre otomatik olarak en iyi modeli seçer.
  vi: Tự động chọn mô hình tốt nhất dựa trên độ phức tạp của truy vấn và tùy chọn của bạn.
  id: Secara otomatis memilih model terbaik berdasarkan kompleksitas kueri dan preferensi Anda.
  pl: Automatycznie wybiera najlepszy model na podstawie złożoności zapytania i preferencji.
  nl: Selecteert automatisch het beste model op basis van uw querycomplexiteit en voorkeuren.
  hi: आपके क्वेरी की जटिलता और प्राथमिकताओं के आधार पर स्वतः सर्वोत्तम मॉडल चुनता है।
  th: เลือกโมเดลที่ดีที่สุดโดยอัตโนมัติตามความซับซ้อนของการสืบค้นและการตั้งค่าของคุณ
  cs: Automaticky vybírá nejlepší model na základě složitosti dotazu a preferencí.
  sv: Väljer automatiskt den bästa modellen baserat på din frågekomplexitet och inställningar.

