ai_ask_settings.pricing_note:
  context: Note explaining pricing varies by model
  en: Prices vary by model. Premium models cost more credits per token.
  de: Preise variieren je nach Modell. Premium-Modelle kosten mehr Credits pro Token.
  ar: تختلف الأسعار حسب الموديل. تكلف النماذج المميزة رصيدًا أكثر لكل رمز.
  he: המחירים משתנים לפי המודל. מודלי פרימיום עולים יותר קרדיטים לכל טוקן.
  verified_by_human: []
  zh: 价格因模型而异。高级模型每个令牌消耗更多积分。
  es: Los precios varían según el modelo. Los modelos premium cuestan más créditos por token.
  fr: Les prix varient selon le modèle. Les modèles premium coûtent plus de crédits par token.
  pt: Os preços variam de acordo com o modelo. Modelos premium custam mais créditos por token.
  ru: Цены варьируются в зависимости от модели. Премиум-модели стоят больше кредитов за токен.
  ja: 価格はモデルによって異なります。プレミアムモデルはトークンあたりのクレジットコストが高くなります。
  ko: 가격은 모델에 따라 다릅니다. 프리미엄 모델은 토큰당 더 많은 크레딧이 필요합니다.
  it: I prezzi variano in base al modello. I modelli premium costano più crediti per token.
  tr: Fiyatlar modele göre değişir. Premium modeller token başına daha fazla kredi gerektirir.
  vi: Giá cả khác nhau tùy theo mô hình. Các mô hình cao cấp tốn nhiều tín dụng hơn mỗi token.
  id: Harga bervariasi menurut model. Model premium membutuhkan lebih banyak kredit per token.
  pl: Ceny różnią się w zależności od modelu. Modele premium kosztują więcej kredytów za token.
  nl: Prijzen variëren per model. Premium modellen kosten meer credits per token.
  hi: कीमतें मॉडल के अनुसार भिन्न होती हैं। प्रीमियम मॉडल प्रति टोकन अधिक क्रेडिट खर्च करते हैं।
  th: ราคาขึ้นอยู่กับโมเดล โมเดลพรีเมียมใช้เครดิตต่อโทเคนมากกว่า
  cs: Ceny se liší podle modelu. Prémiové modely stojí více kreditů za token.
  sv: Priserna varierar beroende på modell. Premiummodeller kostar fler krediter per token.

