ai_ask_settings.default_models_save_error:
  context: Error notification shown when saving default model preferences to the server fails (optimistic save failure)
  en: Failed to save default model preference. Please try again.
  de: Standardmodell konnte nicht gespeichert werden. Bitte versuche es erneut.
  zh: 保存默认模型偏好失败，请重试。
  es: No se pudo guardar la preferencia de modelo predeterminado. Por favor, inténtalo de nuevo.
  fr: Impossible d'enregistrer la préférence du modèle par défaut. Veuillez réessayer.
  pt: Falha ao salvar a preferência de modelo padrão. Por favor, tente novamente.
  ru: Не удалось сохранить настройку модели по умолчанию. Пожалуйста, попробуйте ещё раз.
  ja: デフォルトモデルの設定を保存できませんでした。もう一度お試しください。
  ko: 기본 모델 설정을 저장하지 못했습니다. 다시 시도해 주세요.
  it: Impossibile salvare la preferenza del modello predefinito. Per favore riprova.
  tr: Varsayılan model tercihi kaydedilemedi. Lütfen tekrar deneyin.
  vi: Không thể lưu tùy chọn mô hình mặc định. Vui lòng thử lại.
  id: Gagal menyimpan preferensi model default. Silakan coba lagi.
  pl: Nie udało się zapisać preferencji modelu domyślnego. Spróbuj ponownie.
  nl: Kan de voorkeur voor het standaardmodel niet opslaan. Probeer het opnieuw.
  ar: فشل حفظ تفضيل النموذج الافتراضي. يرجى المحاولة مرة أخرى.
  hi: डिफ़ॉल्ट मॉडल प्राथमिकता सहेजने में विफल। कृपया पुनः प्रयास करें।
  th: ไม่สามารถบันทึกการตั้งค่าโมเดลเริ่มต้นได้ กรุณาลองอีกครั้ง
  cs: Nepodařilo se uložit předvolbu výchozího modelu. Zkuste to prosím znovu.
  sv: Det gick inte att spara standardmodellens inställning. Försök igen.
  he: שמירת העדפת המודל ברירת המחדל נכשלה. אנא נסה שנית.
  verified_by_human: []

