chats.delete_confirm_desc:
  context: Confirmation dialog body explaining what will be deleted, {days} is the number of days
  en: "This will permanently delete all chats older than {days} days. This action cannot be undone."
  de: "Dadurch werden alle Chats, die älter als {days} Tage sind, dauerhaft gelöscht. Diese Aktion kann nicht rückgängig gemacht werden."
  zh: "这将永久删除所有超过 {days} 天的聊天。此操作无法撤销。"
  es: "Esto eliminará permanentemente todos los chats con más de {days} días. Esta acción no se puede deshacer."
  fr: "Cela supprimera définitivement tous les chats de plus de {days} jours. Cette action ne peut pas être annulée."
  pt: "Isso excluirá permanentemente todos os chats com mais de {days} dias. Esta ação não pode ser desfeita."
  ru: "Это навсегда удалит все чаты старше {days} дней. Это действие нельзя отменить."
  ja: "{days}日を超えるすべてのチャットが永久に削除されます。この操作は元に戻せません。"
  ko: "{days}일보다 오래된 모든 채팅이 영구적으로 삭제됩니다. 이 작업은 취소할 수 없습니다."
  it: "Questo eliminerà definitivamente tutte le chat più vecchie di {days} giorni. Questa azione non può essere annullata."
  tr: "Bu, {days} günden eski tüm sohbetleri kalıcı olarak silecek. Bu işlem geri alınamaz."
  vi: "Thao tác này sẽ xóa vĩnh viễn tất cả cuộc trò chuyện cũ hơn {days} ngày. Không thể hoàn tác hành động này."
  id: "Ini akan menghapus secara permanen semua obrolan yang lebih dari {days} hari. Tindakan ini tidak dapat dibatalkan."
  pl: "Spowoduje to trwałe usunięcie wszystkich czatów starszych niż {days} dni. Tej czynności nie można cofnąć."
  nl: "Hiermee worden alle chats ouder dan {days} dagen permanent verwijderd. Deze actie kan niet ongedaan worden gemaakt."
  ar: "سيؤدي هذا إلى حذف جميع المحادثات الأقدم من {days} أيام بشكل دائم. لا يمكن التراجع عن هذا الإجراء."
  hi: "यह {days} दिनों से पुरानी सभी चैट को स्थायी रूप से हटा देगा। यह क्रिया पूर्ववत नहीं की जा सकती।"
  th: "การดำเนินการนี้จะลบแชททั้งหมดที่เก่ากว่า {days} วันอย่างถาวร ไม่สามารถยกเลิกการดำเนินการนี้ได้"
  cs: "Tím se trvale smaží všechny chaty starší než {days} dní. Tuto akci nelze vrátit zpět."
  sv: "Det här tar permanent bort alla chattar äldre än {days} dagar. Den här åtgärden kan inte ångras."
  he: "פעולה זו תמחק לצמיתות את כל הצ'אטים הישנים מ-{days} ימים. לא ניתן לבטל פעולה זו."
  verified_by_human: []
