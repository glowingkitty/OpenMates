email.privacy_info:
  context: Privacy information about email storage
  en: >-
    Your e-mail address is stored encrypted on your device and the server.
    Only you can decrypt it using your master key.
  de: >-
    Ihre E-Mail-Adresse wird verschlüsselt auf Ihrem Gerät und dem Server gespeichert.
    Nur Sie können sie mit Ihrem Hauptschlüssel entschlüsseln.
  zh: 您的电子邮件地址经加密存储在您的设备和服务器上。只有您才能使用主密钥解密。
  es: Tu dirección de correo electrónico se almacena cifrada en tu dispositivo y el servidor. Solo tú puedes descifrarla usando tu clave maestra.
  fr: Votre adresse e-mail est stockée chiffrée sur votre appareil et le serveur. Seul vous pouvez la déchiffrer en utilisant votre clé maître.
  pt: Seu endereço de e-mail é armazenado criptografado no seu dispositivo e no servidor. Apenas você pode descriptografá-lo usando sua chave mestra.
  ru: Ваш адрес электронной почты хранится в зашифрованном виде на вашем устройстве и сервере. Только вы можете расшифровать его с помощью своего мастер-ключа.
  ja: メールアドレスはデバイスとサーバー上に暗号化されて保存されます。マスターキーを使用してのみ復号できます。
  ko: 이메일 주소는 기기와 서버에 암호화되어 저장됩니다. 마스터 키를 사용하여 복호화할 수 있는 것은 본인뿐입니다.
  it: Il tuo indirizzo e-mail viene memorizzato in forma crittografata sul tuo dispositivo e sul server. Solo tu puoi decifrarlo usando la tua chiave master.
  tr: E-posta adresiniz cihazınızda ve sunucuda şifreli olarak saklanır. Yalnızca siz ana anahtarınızı kullanarak şifresini çözebilirsiniz.
  vi: Địa chỉ email của bạn được lưu trữ mã hóa trên thiết bị và máy chủ. Chỉ bạn mới có thể giải mã bằng khóa chính của mình.
  id: Alamat email Anda disimpan terenkripsi di perangkat dan server. Hanya Anda yang dapat mendekripsinya menggunakan kunci master Anda.
  pl: Twój adres e-mail jest przechowywany w formie zaszyfrowanej na Twoim urządzeniu i serwerze. Tylko Ty możesz go odszyfrować używając swojego klucza głównego.
  nl: Uw e-mailadres wordt versleuteld opgeslagen op uw apparaat en de server. Alleen u kunt het ontsleutelen met uw hoofdsleutel.
  ar: >-
    يتم تخزين عنوان بريدك الإلكتروني بشكل مشفر على جهازك والخادم.
    أنت وحدك يمكنك فك تشفيره باستخدام مفتاحك الرئيسي.
  hi: आपका ईमेल पता आपके डिवाइस और सर्वर पर एन्क्रिप्टेड रूप में संग्रहीत है। केवल आप अपनी मास्टर कुंजी से इसे डिक्रिप्ट कर सकते हैं।
  th: ที่อยู่อีเมลของคุณถูกจัดเก็บแบบเข้ารหัสบนอุปกรณ์และเซิร์ฟเวอร์ มีเพียงคุณเท่านั้นที่สามารถถอดรหัสได้โดยใช้มาสเตอร์คีย์ของคุณ
  cs: Vaše e-mailová adresa je uložena zašifrovaně na vašem zařízení a serveru. Pouze vy ji můžete dešifrovat pomocí svého hlavního klíče.
  sv: Din e-postadress lagras krypterad på din enhet och servern. Bara du kan dekryptera den med din huvudnyckel.
  he: כתובת האימייל שלך נשמרת מוצפנת במכשיר שלך ובשרת. רק לך יש אפשרות לפענח אותה באמצעות מפתח המאסטר שלך.
