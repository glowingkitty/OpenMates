delete_account_login_required_message:
  context: Message when login is required for account deletion
  en: This account has completed signup or has credits/usage. Please log in to delete it using the regular interface.
  de: Dieses Konto hat die Registrierung abgeschlossen oder verfügt über Guthaben/Nutzung. Bitte melde dich an, um es über die reguläre Oberfläche zu löschen.
  zh: 此账户已完成注册或有信用/使用记录。请登录后使用常规界面将其删除。
  es: Esta cuenta ha completado el registro o tiene créditos/uso. Por favor, inicia sesión para eliminarla usando la interfaz normal.
  fr: Ce compte a terminé son inscription ou possède des crédits/utilisations. Veuillez vous connecter pour le supprimer via l'interface habituelle.
  pt: Esta conta concluiu o cadastro ou tem créditos/uso. Por favor, faça login para excluí-la pela interface regular.
  ru: Этот аккаунт завершил регистрацию или имеет кредиты/историю использования. Войдите в систему, чтобы удалить его через обычный интерфейс.
  ja: このアカウントはサインアップを完了しているか、クレジットまたは使用履歴があります。通常のインターフェースを使用して削除するには、ログインしてください。
  ko: 이 계정은 가입을 완료했거나 크레딧/사용 기록이 있습니다. 일반 인터페이스를 사용하여 삭제하려면 로그인하세요.
  it: Questo account ha completato la registrazione o ha crediti/utilizzo. Per favore, accedi per eliminarlo tramite l'interfaccia normale.
  tr: Bu hesap kaydı tamamlamış veya kredi/kullanım geçmişi var. Normal arayüzü kullanarak silmek için lütfen giriş yapın.
  vi: Tài khoản này đã hoàn thành đăng ký hoặc có tín dụng/sử dụng. Vui lòng đăng nhập để xóa bằng giao diện thông thường.
  id: Akun ini telah menyelesaikan pendaftaran atau memiliki kredit/penggunaan. Silakan masuk untuk menghapusnya menggunakan antarmuka biasa.
  pl: To konto ukończyło rejestrację lub ma kredyty/historię użytkowania. Zaloguj się, aby usunąć je przez standardowy interfejs.
  nl: Dit account heeft de aanmelding voltooid of heeft credits/gebruik. Log in om het te verwijderen via de normale interface.
  ar: أكمل هذا الحساب عملية التسجيل أو لديه رصيد/استخدام. يرجى تسجيل الدخول لحذفه عبر الواجهة العادية.
  hi: इस खाते ने साइनअप पूरा कर लिया है या इसमें क्रेडिट/उपयोग है। नियमित इंटरफेस का उपयोग करके इसे हटाने के लिए कृपया लॉगिन करें।
  th: บัญชีนี้ดำเนินการลงทะเบียนเสร็จแล้วหรือมีเครดิต/การใช้งาน กรุณาเข้าสู่ระบบเพื่อลบโดยใช้อินเทอร์เฟซปกติ
  cs: Tento účet dokončil registraci nebo má kredity/historii použití. Přihlaste se prosím a smažte jej pomocí běžného rozhraní.
  sv: Det här kontot har slutfört registreringen eller har krediter/användning. Logga in för att radera det med det vanliga gränssnittet.
  he: חשבון זה השלים את ההרשמה או שיש בו קרדיטים/שימוש. עליך להתחבר כדי למחוק אותו דרך הממשק הרגיל.
