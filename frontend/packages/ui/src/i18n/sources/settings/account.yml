chats.delete_section_desc:
  context: Description below the delete old chats section title — activity means last message sent/received
  en: Permanently delete chats with no activity for the selected period. This cannot be undone.
  de: Chats, die älter als der ausgewählte Zeitraum sind, werden dauerhaft gelöscht. Dieser Vorgang kann nicht rückgängig gemacht werden.
  zh: 永久删除选定期间内没有活动的聊天。此操作无法撤销。
  es: Eliminar permanentemente chats sin actividad durante el período seleccionado. Esta acción no se puede deshacer.
  fr: Supprimer définitivement les chats sans activité pendant la période sélectionnée. Cette action ne peut pas être annulée.
  pt: Excluir permanentemente chats sem atividade no período selecionado. Esta ação não pode ser desfeita.
  ru: Навсегда удалить чаты без активности за выбранный период. Это действие нельзя отменить.
  ja: 選択した期間に活動のないチャットを永久に削除します。この操作は元に戻せません。
  ko: 선택한 기간 동안 활동이 없는 채팅을 영구적으로 삭제합니다. 이 작업은 취소할 수 없습니다.
  it: Elimina definitivamente le chat senza attività per il periodo selezionato. Questa azione non può essere annullata.
  tr: Seçilen dönem boyunca etkinlik olmayan sohbetleri kalıcı olarak sil. Bu işlem geri alınamaz.
  vi: Xóa vĩnh viễn các cuộc trò chuyện không có hoạt động trong khoảng thời gian đã chọn. Không thể hoàn tác thao tác này.
  id: Hapus secara permanen obrolan tanpa aktivitas selama periode yang dipilih. Tindakan ini tidak dapat dibatalkan.
  pl: Trwale usuń czaty bez aktywności w wybranym okresie. Tej czynności nie można cofnąć.
  nl: Verwijder permanent chats zonder activiteit in de geselecteerde periode. Dit kan niet ongedaan worden gemaakt.
  ar: حذف المحادثات الأقدم من الفترة المحددة بشكل دائم. لا يمكن التراجع عن هذا الإجراء.
  hi: चयनित अवधि के लिए कोई गतिविधि नहीं होने वाली चैट को स्थायी रूप से हटाएं। यह क्रिया पूर्ववत नहीं की जा सकती।
  th: ลบแชทที่ไม่มีกิจกรรมในช่วงเวลาที่เลือกอย่างถาวร ไม่สามารถยกเลิกการดำเนินการนี้ได้
  cs: Trvale smaže chaty bez aktivity za vybrané období. Tuto akci nelze vrátit zpět.
  sv: Ta permanent bort chattar utan aktivitet under den valda perioden. Detta kan inte ångras.
  he: מחיקה סופית של צ'אטים ישנים יותר מהתקופה הנבחרת. לא ניתן לבטל פעולה זו.
