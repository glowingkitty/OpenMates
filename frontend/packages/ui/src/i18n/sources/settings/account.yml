timezone_info:
  context: Info text explaining timezone usage
  en: Your timezone is used for scheduling reminders and displaying times. It was automatically detected from your browser but you can change it here.
  de: Ihre Zeitzone wird für die Planung von Erinnerungen und die Anzeige von Zeiten verwendet. Sie wurde automatisch von Ihrem Browser erkannt, aber Sie können sie hier ändern.
  zh: 您的时区用于安排提醒和显示时间。它已从您的浏览器自动检测，但您可以在此处更改。
  es: Su zona horaria se utiliza para programar recordatorios y mostrar horas. Se detectó automáticamente desde su navegador, pero puede cambiarla aquí.
  fr: Votre fuseau horaire est utilisé pour planifier les rappels et afficher les heures. Il a été détecté automatiquement depuis votre navigateur, mais vous pouvez le modifier ici.
  pt: Seu fuso horário é usado para agendar lembretes e exibir horários. Foi detectado automaticamente pelo seu navegador, mas você pode alterá-lo aqui.
  ru: Ваш часовой пояс используется для планирования напоминаний и отображения времени. Он был автоматически определён вашим браузером, но вы можете изменить его здесь.
  ja: タイムゾーンはリマインダーのスケジュールと時刻の表示に使用されます。ブラウザから自動的に検出されましたが、ここで変更できます。
  ko: 시간대는 알림 예약 및 시간 표시에 사용됩니다. 브라우저에서 자동으로 감지되었지만 여기서 변경할 수 있습니다.
  it: Il tuo fuso orario viene utilizzato per programmare promemoria e visualizzare gli orari. È stato rilevato automaticamente dal tuo browser, ma puoi modificarlo qui.
  tr: Saat diliminiz hatırlatıcıları planlamak ve zamanları görüntülemek için kullanılır. Tarayıcınızdan otomatik olarak algılandı, ancak burada değiştirebilirsiniz.
  vi: Múi giờ của bạn được sử dụng để lên lịch nhắc nhở và hiển thị thời gian. Nó được tự động phát hiện từ trình duyệt của bạn nhưng bạn có thể thay đổi nó ở đây.
  id: Zona waktu Anda digunakan untuk menjadwalkan pengingat dan menampilkan waktu. Ini terdeteksi secara otomatis dari browser Anda tetapi Anda dapat mengubahnya di sini.
  pl: Twoja strefa czasowa jest używana do planowania przypomnień i wyświetlania godzin. Została automatycznie wykryta z przeglądarki, ale możesz ją tutaj zmienić.
  nl: Uw tijdzone wordt gebruikt voor het plannen van herinneringen en het weergeven van tijden. Deze is automatisch gedetecteerd vanuit uw browser, maar u kunt deze hier wijzigen.
  ar: تُستخدم منطقتك الزمنية لجدولة التذكيرات وعرض الأوقات. تم اكتشافها تلقائيًا من متصفحك ولكن يمكنك تغييرها هنا.
  hi: आपका समय क्षेत्र रिमाइंडर शेड्यूल करने और समय प्रदर्शित करने के लिए उपयोग किया जाता है। यह आपके ब्राउज़र से स्वचालित रूप से पता लगाया गया था लेकिन आप इसे यहां बदल सकते हैं।
  th: เขตเวลาของคุณใช้สำหรับกำหนดเวลาเตือนความจำและแสดงเวลา ตรวจพบโดยอัตโนมัติจากเบราว์เซอร์ของคุณ แต่คุณสามารถเปลี่ยนได้ที่นี่
  cs: Vaše časové pásmo se používá pro plánování připomenutí a zobrazování časů. Bylo automaticky detekováno z vašeho prohlížeče, ale zde ho můžete změnit.
  sv: Din tidszon används för att schemalägga påminnelser och visa tider. Den detekterades automatiskt från din webbläsare men du kan ändra den här.
  he: אזור הזמן שלך משמש לתזמון תזכורות ולהצגת זמנים. הוא זוהה אוטומטית מהדפדפן שלך, אך ניתן לשנות אותו כאן.
