delete_account_2fa_description:
  context: Description for 2FA input during account deletion
  en: Please enter the 6-digit code from your authenticator app to confirm account deletion.
  de: Bitte geben Sie den 6-stelligen Code aus Ihrer Authenticator-App ein, um die Kontolöschung zu bestätigen.
  zh: 请输入您身份验证器应用程序中的6位数代码以确认删除帐户。
  es: Por favor, ingresa el código de 6 dígitos de tu aplicación de autenticación para confirmar la eliminación de la cuenta.
  fr: Veuillez entrer le code à 6 chiffres de votre application d'authentification pour confirmer la suppression du compte.
  pt: Por favor, digite o código de 6 dígitos do seu aplicativo autenticador para confirmar a exclusão da conta.
  ru: Пожалуйста, введите 6-значный код из вашего приложения-аутентификатора для подтверждения удаления аккаунта.
  ja: アカウント削除を確認するため、認証アプリの6桁のコードを入力してください。
  ko: 계정 삭제를 확인하려면 인증 앱의 6자리 코드를 입력하세요.
  it: Per favore, inserisci il codice a 6 cifre dalla tua app di autenticazione per confermare l'eliminazione dell'account.
  tr: Hesap silme işlemini onaylamak için kimlik doğrulama uygulamanızdaki 6 haneli kodu girin.
  vi: Vui lòng nhập mã 6 chữ số từ ứng dụng xác thực của bạn để xác nhận xóa tài khoản.
  id: Silakan masukkan kode 6 digit dari aplikasi autentikator Anda untuk mengonfirmasi penghapusan akun.
  pl: Proszę wprowadzić 6-cyfrowy kod z aplikacji uwierzytelniającej, aby potwierdzić usunięcie konta.
  nl: Voer de 6-cijferige code van uw authenticator-app in om het verwijderen van het account te bevestigen.
  ar: يرجى إدخال الرمز المكون من 6 أرقام من تطبيق المصادقة لتأكيد حذف الحساب.
  hi: कृपया खाता हटाने की पुष्टि के लिए अपने प्रमाणक ऐप से 6 अंकों का कोड दर्ज करें।
