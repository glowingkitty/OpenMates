import_safety_notice:
  context: Info notice explaining the safety scan on the import page
  en: Each message is safety-scanned for prompt injection before being stored. Blocked messages are replaced with a visible placeholder and are not charged.
  de: Jede Nachricht wird vor der Speicherung auf Prompt-Injection geprüft. Blockierte Nachrichten werden durch einen sichtbaren Platzhalter ersetzt und werden nicht berechnet.
  zh: 每条消息在存储前都会被安全扫描以防止提示注入。被拦截的消息将被替换为可见的占位符，不会收费。
  es: Cada mensaje es analizado por seguridad para detectar inyecciones de prompt antes de ser almacenado. Los mensajes bloqueados se reemplazan con un marcador visible y no se cobran.
  fr: Chaque message est analysé pour les injections de prompt avant d'être stocké. Les messages bloqués sont remplacés par un espace réservé visible et ne sont pas facturés.
  pt: Cada mensagem é verificada por injeção de prompt antes de ser armazenada. Mensagens bloqueadas são substituídas por um espaço reservado visível e não são cobradas.
  ru: Каждое сообщение проверяется на инъекцию подсказок перед сохранением. Заблокированные сообщения заменяются видимым заменителем и не тарифицируются.
  ja: 各メッセージは保存前にプロンプトインジェクションのセキュリティスキャンが行われます。ブロックされたメッセージは表示プレースホルダーに置き換えられ、課金されません。
  ko: 각 메시지는 저장 전에 프롬프트 주입에 대한 보안 검사를 받습니다. 차단된 메시지는 표시 자리 표시자로 대체되며 요금이 청구되지 않습니다.
  it: Ogni messaggio viene analizzato per l'iniezione di prompt prima di essere archiviato. I messaggi bloccati vengono sostituiti con un segnaposto visibile e non vengono addebitati.
  tr: Her mesaj depolanmadan önce istem enjeksiyonu için güvenlik taramasından geçirilir. Engellenen mesajlar görünür bir yer tutucu ile değiştirilir ve ücretlendirilmez.
  vi: Mỗi tin nhắn được quét an toàn để phát hiện chèn prompt trước khi được lưu trữ. Tin nhắn bị chặn được thay thế bằng placeholder hiển thị và không bị tính phí.
  id: Setiap pesan dipindai keamanan untuk injeksi prompt sebelum disimpan. Pesan yang diblokir diganti dengan placeholder yang terlihat dan tidak dikenakan biaya.
  pl: Każda wiadomość jest skanowana pod kątem wstrzyknięcia promptów przed zapisaniem. Zablokowane wiadomości są zastępowane widocznym symbolem zastępczym i nie są naliczane.
  nl: Elk bericht wordt vóór opslag gescand op promptinjectie. Geblokkeerde berichten worden vervangen door een zichtbare tijdelijke aanduiding en worden niet in rekening gebracht.
  hi: प्रत्येक संदेश को संग्रहीत करने से पहले प्रॉम्प्ट इंजेक्शन के लिए सुरक्षा स्कैन किया जाता है। अवरुद्ध संदेशों को दृश्यमान प्लेसहोल्डर से बदल दिया जाता है और शुल्क नहीं लगाया जाता।
  th: ข้อความแต่ละข้อความจะถูกสแกนความปลอดภัยสำหรับการแทรก prompt ก่อนจัดเก็บ ข้อความที่ถูกบล็อกจะถูกแทนที่ด้วย placeholder ที่มองเห็นได้และไม่มีการเรียกเก็บเงิน
  cs: Každá zpráva je před uložením prověřena na injekci promptů. Blokované zprávy jsou nahrazeny viditelným zástupným symbolem a nejsou účtovány.
  sv: Varje meddelande genomsöks för promptinjektion innan lagring. Blockerade meddelanden ersätts med en synlig platshållare och debiteras inte.
  ar: يتم فحص كل رسالة أمنيًا للكشف عن حقن التعليمات قبل تخزينها. تُستبدل الرسائل المحظورة بعنصر نائب مرئي ولا يُحتسب ثمنها.
  he: כל הודעה נסרקת לאבטחה לגילוי הזרקת פרומפט לפני האחסון. הודעות חסומות מוחלפות ב-placeholder גלוי ואינן מחויבות.
