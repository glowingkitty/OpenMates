username.error_failed:
  context: Generic error when username update fails on the server
  en: Failed to update username. Please try again.
  de: Benutzername konnte nicht aktualisiert werden. Bitte versuche es erneut.
  zh: 更新用户名失败，请重试。
  es: No se pudo actualizar el nombre de usuario. Inténtalo de nuevo.
  fr: Impossible de mettre à jour le nom d'utilisateur. Veuillez réessayer.
  pt: Falha ao atualizar o nome de usuário. Por favor, tente novamente.
  ru: Не удалось обновить имя пользователя. Пожалуйста, попробуйте снова.
  ja: ユーザー名の更新に失敗しました。再試行してください。
  ko: 사용자 이름을 업데이트하지 못했습니다. 다시 시도해 주세요.
  it: Impossibile aggiornare il nome utente. Per favore, riprova.
  tr: Kullanıcı adı güncellenemedi. Lütfen tekrar deneyin.
  vi: Không thể cập nhật tên người dùng. Vui lòng thử lại.
  id: Gagal memperbarui nama pengguna. Silakan coba lagi.
  pl: Nie udało się zaktualizować nazwy użytkownika. Spróbuj ponownie.
  nl: Gebruikersnaam bijwerken mislukt. Probeer het opnieuw.
  ar: فشل تحديث اسم المستخدم. يرجى المحاولة مرة أخرى.
  hi: उपयोगकर्ता नाम अपडेट करने में विफल। कृपया पुनः प्रयास करें।
  th: ไม่สามารถอัปเดตชื่อผู้ใช้ได้ กรุณาลองอีกครั้ง
  cs: Aktualizace uživatelského jména selhala. Zkuste to prosím znovu.
  sv: Det gick inte att uppdatera användarnamnet. Försök igen.
  he: עדכון שם המשתמש נכשל. יש לנסות שוב.
