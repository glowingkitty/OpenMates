  en: Failed to check account status. Please try again later.
  de: Kontostatus konnte nicht überprüft werden. Bitte versuche es später erneut.
  zh: 无法检查账户状态。请稍后再试。
  es: No se pudo verificar el estado de la cuenta. Por favor, inténtalo de nuevo más tarde.
  fr: Échec de la vérification de l'état du compte. Veuillez réessayer plus tard.
  pt: Falha ao verificar o status da conta. Por favor, tente novamente mais tarde.
  ru: Не удалось проверить статус аккаунта. Пожалуйста, попробуйте позже.
  ja: アカウントステータスの確認に失敗しました。後でもう一度お試しください。
  ko: 계정 상태 확인에 실패했습니다. 나중에 다시 시도해 주세요.
  it: Impossibile verificare lo stato dell'account. Per favore riprova più tardi.
  tr: Hesap durumu kontrol edilemedi. Lütfen daha sonra tekrar deneyin.
  vi: Không thể kiểm tra trạng thái tài khoản. Vui lòng thử lại sau.
  id: Gagal memeriksa status akun. Silakan coba lagi nanti.
  pl: Nie udało się sprawdzić statusu konta. Spróbuj ponownie później.
  nl: Kan de accountstatus niet controleren. Probeer het later opnieuw.
  ar: فشل التحقق من حالة الحساب. يرجى المحاولة مرة أخرى لاحقًا.
  hi: खाता स्थिति जांचने में विफल। कृपया बाद में पुनः प्रयास करें।
  th: ไม่สามารถตรวจสอบสถานะบัญชีได้ กรุณาลองอีกครั้งในภายหลัง
  cs: Nepodařilo se zkontrolovat stav účtu. Zkuste to prosím znovu později.
  sv: Det gick inte att kontrollera kontostatus. Försök igen senare.
  he: בדיקת סטטוס החשבון נכשלה. כדאי לנסות שוב מאוחר יותר.
