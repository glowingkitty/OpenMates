username.info:
  context: Informational note at the bottom of the username settings page explaining what the username is used for
  en: Your username is your display name across OpenMates. It must be 3–20 characters and can contain letters, numbers, dots and underscores.
  de: Dein Benutzername ist dein Anzeigename in OpenMates. Er muss 3–20 Zeichen lang sein und kann Buchstaben, Zahlen, Punkte und Unterstriche enthalten.
  zh: 您的用户名是您在 OpenMates 中的显示名称。它必须是 3–20 个字符，可以包含字母、数字、点和下划线。
  es: Tu nombre de usuario es tu nombre para mostrar en OpenMates. Debe tener entre 3 y 20 caracteres y puede contener letras, números, puntos y guiones bajos.
  fr: Votre nom d'utilisateur est votre nom d'affichage sur OpenMates. Il doit comporter entre 3 et 20 caractères et peut contenir des lettres, des chiffres, des points et des traits de soulignement.
  pt: Seu nome de usuário é seu nome de exibição no OpenMates. Deve ter entre 3 e 20 caracteres e pode conter letras, números, pontos e sublinhados.
  ru: Ваше имя пользователя — это ваше отображаемое имя в OpenMates. Оно должно содержать от 3 до 20 символов и может включать буквы, цифры, точки и символы подчёркивания.
  ja: ユーザー名はOpenMatesでの表示名です。3〜20文字で、文字、数字、ドット、アンダースコアを使用できます。
  ko: 사용자 이름은 OpenMates에서의 표시 이름입니다. 3~20자여야 하며 문자, 숫자, 점 및 밑줄을 포함할 수 있습니다.
  it: Il tuo nome utente è il nome visualizzato su OpenMates. Deve contenere 3–20 caratteri e può includere lettere, numeri, punti e trattini bassi.
  tr: Kullanıcı adınız OpenMates'teki görünen adınızdır. 3–20 karakter olmalı ve harfler, rakamlar, noktalar ve alt çizgiler içerebilir.
  vi: Tên người dùng của bạn là tên hiển thị trên OpenMates. Phải có từ 3–20 ký tự và có thể chứa chữ cái, số, dấu chấm và dấu gạch dưới.
  id: Nama pengguna Anda adalah nama tampilan Anda di OpenMates. Harus terdiri dari 3–20 karakter dan dapat berisi huruf, angka, titik, dan garis bawah.
  pl: Twoja nazwa użytkownika to Twoja nazwa wyświetlana w OpenMates. Musi mieć od 3 do 20 znaków i może zawierać litery, cyfry, kropki i podkreślenia.
  nl: Uw gebruikersnaam is uw weergavenaam in OpenMates. Deze moet 3–20 tekens lang zijn en kan letters, cijfers, punten en underscores bevatten.
  ar: اسم المستخدم الخاص بك هو اسمك المعروض على OpenMates. يجب أن يتراوح بين 3 و 20 حرفًا ويمكن أن يحتوي على حروف وأرقام ونقاط وشرطات سفلية.
  hi: आपका उपयोगकर्ता नाम OpenMates में आपका प्रदर्शन नाम है। यह 3–20 अक्षरों का होना चाहिए और इसमें अक्षर, संख्याएं, डॉट्स और अंडरस्कोर हो सकते हैं।
  th: ชื่อผู้ใช้ของคุณคือชื่อที่แสดงใน OpenMates ต้องมีความยาว 3–20 ตัวอักษร และสามารถประกอบด้วยตัวอักษร ตัวเลข จุด และขีดล่าง
  cs: Vaše uživatelské jméno je vaše zobrazovací jméno v OpenMates. Musí mít délku 3–20 znaků a může obsahovat písmena, číslice, tečky a podtržítka.
  sv: Ditt användarnamn är ditt visningsnamn på OpenMates. Det måste vara 3–20 tecken och kan innehålla bokstäver, siffror, punkter och understreck.
  he: שם המשתמש שלך הוא שם התצוגה שלך ב-OpenMates. עליו להכיל 3–20 תווים ויכול לכלול אותיות, מספרים, נקודות וקווים תחתונים.
  verified_by_human: []
