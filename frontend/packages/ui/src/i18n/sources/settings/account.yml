delete_account_auto_refund_description:
  context: Description of auto-refund process
  en: Purchases from the last 14 days with unused credits will be automatically refunded.
  de: Käufe der letzten 14 Tage mit ungenutzten Credits werden automatisch erstattet.
  zh: 过去 14 天内未使用积分的购买将自动退款。
  es: Las compras de los últimos 14 días con créditos no utilizados se reembolsarán automáticamente.
  fr: Les achats des 14 derniers jours avec des crédits non utilisés seront automatiquement remboursés.
  pt: Compras dos últimos 14 dias com créditos não utilizados serão reembolsadas automaticamente.
  ru: Покупки за последние 14 дней с неиспользованными кредитами будут автоматически возвращены.
  ja: 未使用のクレジットがある過去14日間の購入は自動的に返金されます。
  ko: 미사용 크레딧이 있는 지난 14일간의 구매는 자동으로 환불됩니다.
  it: Gli acquisti degli ultimi 14 giorni con crediti non utilizzati verranno automaticamente rimborsati.
  tr: Kullanılmayan kredileri olan son 14 günün satın alımları otomatik olarak iade edilecektir.
  vi: Các giao dịch mua trong 14 ngày qua có tín dụng chưa sử dụng sẽ được hoàn tiền tự động.
  id: Pembelian dari 14 hari terakhir dengan kredit yang tidak digunakan akan secara otomatis dikembalikan.
  pl: Zakupy z ostatnich 14 dni z niewykorzystanymi kredytami zostaną automatycznie zwrócone.
  nl: Aankopen van de afgelopen 14 dagen met ongebruikte credits worden automatisch terugbetaald.
  ar: سيتم استرداد المشتريات من آخر 14 يومًا مع الرصيد غير المستخدم تلقائيًا.
  hi: पिछले 14 दिनों की अप्रयुक्त क्रेडिट वाली खरीदारी स्वचालित रूप से वापस कर दी जाएगी।
