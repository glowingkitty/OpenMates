  context: Description shown on the import page (supports ZIP and YAML)
  en: Import chats from an OpenMates export ZIP or YAML file. Each message is safety-scanned before storage.
  de: Chats aus einer zuvor exportierten OpenMates-YAML-Datei importieren. Jede Nachricht wird vor der Speicherung auf Sicherheit geprüft.
  zh: 从之前导出的OpenMates YAML文件导入聊天记录。每条消息在存储前都会经过安全扫描。
  es: Importa chats desde un archivo YAML de OpenMates exportado previamente. Cada mensaje se analiza por seguridad antes de almacenarse.
  fr: Importez des chats depuis un fichier YAML OpenMates précédemment exporté. Chaque message est analysé pour la sécurité avant stockage.
  pt: Importe conversas de um arquivo YAML do OpenMates exportado anteriormente. Cada mensagem é verificada por segurança antes do armazenamento.
  ru: Импортируйте чаты из ранее экспортированного файла OpenMates YAML. Каждое сообщение проверяется на безопасность перед сохранением.
  ja: 以前にエクスポートしたOpenMates YAMLファイルからチャットをインポートします。各メッセージは保存前にセキュリティスキャンされます。
  ko: 이전에 내보낸 OpenMates YAML 파일에서 채팅을 가져옵니다. 각 메시지는 저장 전에 보안 검사를 받습니다。
  it: Importa le chat da un file YAML OpenMates precedentemente esportato. Ogni messaggio viene analizzato per la sicurezza prima dell'archiviazione.
  tr: OpenMates dışa aktarma ZIP veya YAML dosyasından sohbetleri içe aktarın. Her mesaj depolanmadan önce güvenlik taramasından geçirilir.
  vi: Nhập chats từ tệp ZIP hoặc YAML xuất khẩu OpenMates. Mỗi tin nhắn được quét an toàn trước khi lưu trữ.
  id: Impor obrolan dari file ZIP atau YAML ekspor OpenMates. Setiap pesan dipindai keamanan sebelum disimpan.
  pl: Importuj czaty z pliku ZIP lub YAML eksportu OpenMates. Każda wiadomość jest skanowana pod kątem bezpieczeństwa przed zapisaniem.
  nl: Importeer chats uit een OpenMates export ZIP- of YAML-bestand. Elk bericht wordt vóór opslag gescand op veiligheid.
  ar: استورد المحادثات من ملف ZIP أو YAML لتصدير OpenMates. يتم فحص كل رسالة أمنيًا قبل التخزين.
  hi: OpenMates एक्सपोर्ट ZIP या YAML फ़ाइल से चैट आयात करें। प्रत्येक संदेश को संग्रहीत करने से पहले सुरक्षा स्कैन किया जाता है।
