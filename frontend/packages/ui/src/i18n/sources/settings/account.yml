delete_account_data_deletion_warning_message:
  context: Message about data deletion
  en: All your data will be permanently deleted and cannot be recovered, including chats, embeds, uploaded files, settings, memories, etc.
  de: Alle Ihre Daten werden dauerhaft gelöscht und können nicht wiederhergestellt werden, einschließlich Chats, Einbettungen, hochgeladener Dateien, Einstellungen, Erinnerungen usw.
  zh: 您的所有数据将被永久删除且无法恢复，包括聊天、嵌入、上传的文件、设置、记忆等。
  es: Todos sus datos se eliminarán permanentemente y no se podrán recuperar, incluidas conversaciones, incrustaciones, archivos cargados, configuraciones, recuerdos, etc.
  fr: Toutes vos données seront définitivement supprimées et ne pourront pas être récupérées, y compris les chats, les intégrations, les fichiers téléchargés, les paramètres, les souvenirs, etc.
  pt: Todos os seus dados serão excluídos permanentemente e não poderão ser recuperados, incluindo conversas, incorporações, arquivos enviados, configurações, memórias, etc.
  ru: Все ваши данные будут навсегда удалены и не могут быть восстановлены, включая чаты, встраивания, загруженные файлы, настройки, воспоминания и т.д.
  ja: チャット、埋め込み、アップロードされたファイル、設定、メモリなどを含むすべてのデータが永続的に削除され、復元できません。
  ko: 채팅, 임베드, 업로드된 파일, 설정, 메모리 등을 포함한 모든 데이터가 영구적으로 삭제되며 복구할 수 없습니다.
  it: Tutti i tuoi dati verranno eliminati permanentemente e non potranno essere recuperati, inclusi chat, incorporazioni, file caricati, impostazioni, ricordi, ecc.
  tr: Tüm verileriniz kalıcı olarak silinecek ve kurtarılamayacak, sohbetler, gömülmeler, yüklenen dosyalar, ayarlar, anılar vb. dahil.
  vi: Tất cả dữ liệu của bạn sẽ bị xóa vĩnh viễn và không thể khôi phục, bao gồm cuộc trò chuyện, nhúng, tệp đã tải lên, cài đặt, ký ức, v.v.
  id: Semua data Anda akan dihapus secara permanen dan tidak dapat dipulihkan, termasuk obrolan, sematan, file yang diunggah, pengaturan, memori, dll.
  pl: Wszystkie Twoje dane zostaną trwale usunięte i nie będą mogły zostać odzyskane, w tym czaty, osadzenia, przesłane pliki, ustawienia, wspomnienia itp.
  nl: Al uw gegevens worden permanent verwijderd en kunnen niet worden hersteld, inclusief chats, embedments, geüploade bestanden, instellingen, herinneringen, enz.
  ar: سيتم حذف جميع بياناتك بشكل دائم ولا يمكن استعادتها، بما في ذلك الدردشات والدمجات والملفات المرفوعة والإعدادات والذكريات وما إلى ذلك.
  hi: आपका सभी डेटा स्थायी रूप से हटा दिया जाएगा और पुनर्प्राप्त नहीं किया जा सकता, जिसमें चैट, एम्बेड, अपलोड की गई फ़ाइलें, सेटिंग्स, यादें आदि शामिल हैं।
  th: ข้อมูลทั้งหมดของคุณจะถูกลบอย่างถาวรและไม่สามารถกู้คืนได้ รวมถึงการแชท การฝัง ไฟล์ที่อัปโหลด การตั้งค่า ความทรงจำ ฯลฯ
  cs: Všechna vaše data budou trvale smazána a nelze je obnovit, včetně chatů, vložení, nahraných souborů, nastavení, vzpomínek atd.
  sv: All din data kommer att raderas permanent och kan inte återställas, inklusive chattar, inbäddningar, uppladdade filer, inställningar, minnen, etc.
  he: "כל הנתונים שלך יימחקו לצמיתות ולא יהיה ניתן לשחזר אותם, כולל צ'אטים, הטמעות (embeds), קבצים שהועלו, הגדרות, זיכרונות וכו'."
