delete_account_auth_description:
  context: Description for the SecurityAuth modal when deleting account
  en: Please authenticate to confirm that you want to permanently delete your account.
  de: Bitte authentifizieren Sie sich, um zu bestätigen, dass Sie Ihr Konto dauerhaft löschen möchten.
  zh: 请验证身份以确认您要永久删除您的账户。
