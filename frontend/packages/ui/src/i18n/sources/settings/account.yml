  nl: Ik begrijp dat al mijn gegevens permanent worden verwijderd en niet kunnen worden hersteld, inclusief chats, embedments, geüploade bestanden, instellingen, herinneringen, enz.
  ar: أفهم أن جميع بياناتي سيتم حذفها بشكل دائم ولا يمكن استعادتها، بما في ذلك الدردشات والدمجات والملفات المرفوعة والإعدادات والذكريات وما إلى ذلك.
  hi: मैं समझता हूं कि मेरा सभी डेटा स्थायी रूप से हटा दिया जाएगा और पुनर्प्राप्त नहीं किया जा सकता, जिसमें चैट, एम्बेड, अपलोड की गई फ़ाइलें, सेटिंग्स, यादें आदि शामिल हैं।
  th: ฉันเข้าใจว่าข้อมูลทั้งหมดของฉันจะถูกลบอย่างถาวรและไม่สามารถกู้คืนได้ รวมถึงการแชท การฝัง ไฟล์ที่อัปโหลด การตั้งค่า ความทรงจำ ฯลฯ
  cs: Rozumím, že všechna má data budou trvale smazána a nelze je obnovit, včetně chatů, vložení, nahraných souborů, nastavení, vzpomínek atd.
  sv: Jag förstår att all min data kommer att raderas permanent och inte kan återställas, inklusive chattar, inbäddningar, uppladdade filer, inställningar, minnen, etc.
  he: "אני מבין שכל הנתונים שלי יימחקו לצמיתות ולא יהיה ניתן לשחזר אותם, כולל צ'אטים, הטמעות (embeds), קבצים שהועלו, הגדרות, זיכרונות וכו'."
