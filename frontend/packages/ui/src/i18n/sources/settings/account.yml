delete_account_uncompleted_message:
  context: Message for uncompleted account deletion
  en: This account hasn't completed the signup process yet. You can delete it now without logging in.
  de: Dieses Konto hat den Registrierungsprozess noch nicht abgeschlossen. Du kannst es jetzt ohne Anmeldung löschen.
  es: Esta cuenta aún no ha completado el proceso de registro. Puedes eliminarla ahora sin iniciar sesión.
  fr: Ce compte n'a pas encore terminé le processus d'inscription. Vous pouvez le supprimer maintenant sans vous connecter.
  ja: このアカウントはまだサインアッププロセスを完了していません。ログインせずに今すぐ削除できます。
  zh: 此账户尚未完成注册流程。您现在可以在不登录的情况下将其删除。
  ar: لم يكتمل هذا الحساب عملية التسجيل بعد. يمكنك حذفه الآن دون تسجيل الدخول.
  he: חשבון זה טרם השלים את תהליך ההרשמה. ניתן למחוק אותו כעת ללא צורך בהתחברות.
