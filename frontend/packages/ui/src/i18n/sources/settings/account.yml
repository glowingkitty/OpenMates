  en: Username can only contain letters, numbers, dots and underscores
  de: Benutzername darf nur Buchstaben, Zahlen, Punkte und Unterstriche enthalten
  zh: 用户名只能包含字母、数字、点和下划线
  es: El nombre de usuario solo puede contener letras, números, puntos y guiones bajos
  fr: Le nom d'utilisateur ne peut contenir que des lettres, des chiffres, des points et des traits de soulignement
  pt: O nome de usuário só pode conter letras, números, pontos e sublinhados
  ru: Имя пользователя может содержать только буквы, цифры, точки и символы подчёркивания
  ja: ユーザー名には文字、数字、ドット、アンダースコアのみ使用できます
  ko: 사용자 이름은 문자, 숫자, 점 및 밑줄만 포함할 수 있습니다
  it: Il nome utente può contenere solo lettere, numeri, punti e trattini bassi
  tr: Kullanıcı adı yalnızca harf, rakam, nokta ve alt çizgi içerebilir
  vi: Tên người dùng chỉ có thể chứa chữ cái, số, dấu chấm và dấu gạch dưới
  id: Nama pengguna hanya boleh mengandung huruf, angka, titik, dan garis bawah
  pl: Nazwa użytkownika może zawierać tylko litery, cyfry, kropki i podkreślenia
