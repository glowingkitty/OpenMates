# Notifications settings translations
# Used in Settings > Notifications menu
# Namespace: settings, key prefix: notifications (from filename)
# Keys should NOT include "settings.notifications." prefix - the build script adds it automatically
# All keys must be at root level with flat dot-notation, only language codes (en, de, etc.) are nested

description:
  context: Short description shown in the Notifications settings page gradient banner header
  en: Manage your notification preferences
  de: Benachrichtigungseinstellungen verwalten
  zh: 管理你的通知偏好设置
  fr: Gère tes préférences de notification
  es: Gestiona tus preferencias de notificación
  ja: 通知設定を管理します
  verified_by_human: []

chat:
  context: Chat Notifications sub-item in the Notifications settings hub
  en: Chat Notifications
