backup.email_toggle_info:
  context: Subtitle under the backup reminder email toggle explaining what it does
  en: Receive a periodic email reminder to export and back up your data
  de: Erhalte regelmäßige E-Mail-Erinnerungen zum Exportieren und Sichern deiner Daten
  zh: 定期接收提醒邮件，以导出并备份你的数据
  fr: Reçois un e-mail de rappel périodique pour exporter et sauvegarder tes données
  es: Recibe un recordatorio periódico por correo electrónico para exportar y hacer una copia de seguridad de tus datos
  pt: Receba um lembrete periódico por e-mail para exportar e fazer backup dos seus dados
  ru: Получайте периодические напоминания по электронной почте для экспорта и резервного копирования данных
  ja: データのバックアップとエクスポートを促すリマインダーメールを定期的に受け取ります
  ko: 데이터를 내보내고 백업하라는 정기적인 이메일 알림을 받으세요
  it: Ricevi un promemoria periodico via e-mail per esportare e fare il backup dei tuoi dati
  tr: Verilerinizi dışa aktarmak ve yedeklemek için periyodik bir e-posta hatırlatıcısı alın
  vi: Nhận email nhắc nhở định kỳ để xuất và sao lưu dữ liệu của bạn
  id: Terima pengingat email berkala untuk mengekspor dan mencadangkan data Anda
  pl: Otrzymuj okresowe przypomnienia e-mail, aby eksportować i tworzyć kopie zapasowe danych
  nl: Ontvang een periodieke e-mailherinnering om uw gegevens te exporteren en te back-uppen
  ar: احصل على تذكير دوري بالبريد الإلكتروني لتصدير بياناتك ونسخها احتياطياً
  hi: अपने डेटा को निर्यात और बैकअप करने के लिए समय-समय पर ईमेल रिमाइंडर प्राप्त करें
  th: รับการแจ้งเตือนทางอีเมลเป็นระยะเพื่อส่งออกและสำรองข้อมูลของคุณ
  cs: Dostávejte pravidelné e-mailové připomínky k exportu a zálohování dat
  sv: Ta emot periodiska e-postpåminnelser om att exportera och säkerhetskopiera dina data
  he: קבל תזכורת תקופתית באימייל לייצוא ולגיבוי הנתונים שלך
