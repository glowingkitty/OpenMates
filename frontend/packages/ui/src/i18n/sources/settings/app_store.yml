focus_modes.section_description:
  context: Description text shown under the Focus Modes section heading in app details, explaining what focus modes are
  en: "Ask your mates to have focused conversations to reach a goal:"
  de: "Bitte deine Mates, fokussierte Gespräche zu führen, um ein Ziel zu erreichen:"
  zh: 请求你的伙伴进行有针对性的对话以达成目标：
  es: "Pídele a tus compañeros que tengan conversaciones enfocadas para alcanzar un objetivo:"
  fr: "Demandez à vos compagnons d'avoir des conversations ciblées pour atteindre un objectif :"
  pt: "Peça aos seus companheiros para terem conversas focadas para alcançar um objetivo:"
  ru: "Попросите своих помощников вести целенаправленные беседы для достижения цели:"
  ja: mates に目標を達成するための集中した会話をお願いしてください：
  ko: "목표를 달성하기 위해 집중적인 대화를 해달라고 메이트에게 요청하세요:"
  it: "Chiedi ai tuoi compagni di avere conversazioni mirate per raggiungere un obiettivo:"
  tr: "Matelerinizden bir hedefe ulaşmak için odaklı konuşmalar yapmalarını isteyin:"
  vi: "Yêu cầu bạn đồng hành của bạn có những cuộc trò chuyện tập trung để đạt được mục tiêu:"
  id: "Minta teman-teman Anda untuk berdiskusi secara terfokus guna mencapai tujuan:"
  pl: "Poproś swoich towarzyszy o prowadzenie skupionych rozmów w celu osiągnięcia celu:"
  nl: "Vraag je maatjes om gerichte gesprekken te voeren om een doel te bereiken:"
  ar: "اطلب من رفاقك إجراء محادثات مركزة لتحقيق هدف:"
  hi: "अपने साथियों से किसी लक्ष्य तक पहुँचने के लिए केंद्रित बातचीत करने के लिए कहें:"
  th: "ขอให้เพื่อนของคุณสนทนาอย่างมีสมาธิเพื่อบรรลุเป้าหมาย:"
  cs: "Požádejte své spoluhráče o vedení soustředěných rozhovorů za účelem dosažení cíle:"
  sv: "Be dina kompisar att ha fokuserade samtal för att nå ett mål:"
  he: "בקש מהחברים שלך לנהל שיחות ממוקדות כדי להשיג מטרה:"
