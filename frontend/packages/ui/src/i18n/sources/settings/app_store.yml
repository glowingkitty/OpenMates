focus_modes.how_to_use_mention:
  context: Text shown after the how-to-use example cards on a focus mode detail page, explaining how to explicitly trigger the focus mode by @-mentioning it. {focusname} is replaced with the focus mode's @mention name (e.g., @Jobs-CareerInsights).
  en: "Or mention @{focusname}\nin your message to trigger the focus mode explicitly."
  de: "Oder erwähne @{focusname}\nin deiner Nachricht, um den Fokusmodus explizit zu aktivieren."
  zh: "或在消息中提及 @{focusname}\n以明确触发该专注模式。"
  es: "O menciona @{focusname}\nen tu mensaje para activar el modo de enfoque explícitamente."
  fr: "Ou mentionnez @{focusname}\ndans votre message pour déclencher explicitement le mode de concentration."
  pt: "Ou mencione @{focusname}\nna sua mensagem para ativar o modo de foco explicitamente."
  ru: "Или упомяните @{focusname}\nв своём сообщении, чтобы явно активировать режим фокуса."
  ja: "またはメッセージで @{focusname}\nと書いて、フォーカスモードを明示的にトリガーしてください。"
  ko: "또는 메시지에서 @{focusname}\n을 언급하여 포커스 모드를 명시적으로 트리거하세요."
  it: "Oppure menziona @{focusname}\nnel tuo messaggio per attivare esplicitamente la modalità di focus."
  tr: "Veya odak modunu açıkça tetiklemek için mesajınızda @{focusname}\nifadesini kullanın."
  vi: "Hoặc đề cập @{focusname}\ntrong tin nhắn của bạn để kích hoạt chế độ tập trung một cách rõ ràng."
  id: "Atau sebutkan @{focusname}\ndalam pesan Anda untuk memicu mode fokus secara eksplisit."
  pl: "Lub wspomnij @{focusname}\nw swojej wiadomości, aby jawnie uruchomić tryb skupienia."
  nl: "Of vermeld @{focusname}\nin je bericht om de focusmodus expliciet te activeren."
  ar: "أو اذكر @{focusname}\nفي رسالتك لتشغيل وضع التركيز صراحةً."
  hi: "या अपने संदेश में @{focusname}\nका उल्लेख करें ताकि फोकस मोड को स्पष्ट रूप से ट्रिगर किया जा सके।"
  th: "หรือกล่าวถึง @{focusname}\nในข้อความของคุณเพื่อเรียกใช้โหมดโฟกัสอย่างชัดเจน"
