settings_memories.section_description:
  context: Description text shown under the Settings & Memories section heading in app details, explaining what settings & memories are
  en: "Your mates can request these details from you, to give you even better responses. While you stay in control over what you share & when:"
  de: "Deine Mates können diese Details von dir anfordern, um dir noch bessere Antworten zu geben. Dabei behältst du immer die Kontrolle darüber, was du teilst und wann:"
  zh: "你的伙伴可以向你请求这些详细信息，以便给你提供更好的回答。同时，你始终控制自己分享的内容和时间："
  es: "Tus compañeros pueden pedirte estos detalles para darte respuestas aún mejores. Tú siempre tienes el control sobre qué compartes y cuándo:"
  fr: "Vos compagnons peuvent vous demander ces informations pour vous donner de meilleures réponses. Vous gardez le contrôle sur ce que vous partagez et quand :"
  pt: "Seus companheiros podem solicitar esses detalhes de você para dar respostas ainda melhores. Você mantém o controle sobre o que compartilha e quando:"
  ru: "Ваши помощники могут запрашивать у вас эти сведения, чтобы давать ещё лучшие ответы. Вы всегда контролируете, что и когда делитесь:"
  ja: "mates はより良い回答を提供するためにこれらの詳細を求めることがあります。何をいつ共有するかはあなたが決めます："
  ko: "메이트가 더 나은 응답을 제공하기 위해 이 세부 정보를 요청할 수 있습니다. 공유할 내용과 시기는 항상 당신이 결정합니다:"
  it: "I tuoi compagni possono chiederti questi dettagli per darti risposte ancora migliori. Tu mantieni sempre il controllo su cosa condividi e quando:"
  tr: "Mateleriniz sizi daha iyi yanıtlamak için bu ayrıntıları sizden isteyebilir. Ne zaman ve ne paylaşacağınız her zaman sizin kontrolünüzde:"
  vi: "Bạn đồng hành của bạn có thể yêu cầu những chi tiết này để cung cấp phản hồi tốt hơn. Bạn luôn kiểm soát những gì bạn chia sẻ và khi nào:"
  id: "Teman-teman Anda dapat meminta detail ini untuk memberikan jawaban yang lebih baik. Anda selalu mengontrol apa yang Anda bagikan dan kapan:"
  pl: "Twoi towarzysze mogą poprosić o te szczegóły, aby dawać Ci jeszcze lepsze odpowiedzi. Ty zawsze kontrolujesz, co udostępniasz i kiedy:"
  nl: "Je maatjes kunnen om deze details vragen om je nog betere antwoorden te geven. Jij blijft altijd in controle over wat je deelt en wanneer:"
  ar: "يمكن لرفاقك طلب هذه التفاصيل منك لإعطائك ردودًا أفضل. بينما تحتفظ بالسيطرة على ما تشارك ومتى:"
  hi: "आपके साथी आपको और बेहतर उत्तर देने के लिए ये विवरण आपसे मांग सकते हैं। आप हमेशा यह नियंत्रित करते हैं कि आप क्या और कब साझा करते हैं:"
  th: "เพื่อนของคุณสามารถขอข้อมูลเหล่านี้จากคุณเพื่อให้คำตอบที่ดีขึ้น คุณยังคงควบคุมสิ่งที่แบ่งปันและเมื่อใด:"
  cs: "Vaši spoluhráči vás mohou požádat o tyto podrobnosti, aby vám dávali ještě lepší odpovědi. Vy vždy kontrolujete, co sdílíte a kdy:"
  sv: "Dina kompisar kan be om dessa uppgifter för att ge dig ännu bättre svar. Du har alltid kontroll över vad du delar och när:"
  he: "החברים שלך יכולים לבקש ממך פרטים אלה כדי לתת לך תשובות טובות יותר. ואתה תמיד שולט במה שאתה משתף ומתי:"
  verified_by_human: []
