skills.section_description:
  context: Description text shown under the Skills section heading in app details, explaining what skills are
  en: "Just ask your mates to do any of these things:"
  de: "Bitte deine Mates einfach, eines dieser Dinge zu tun:"
  zh: 只需请求你的伙伴执行以下任一操作：
  es: "Solo pídele a tus compañeros que hagan cualquiera de estas cosas:"
  fr: "Demandez simplement à vos compagnons de faire l'une de ces choses :"
  pt: "Apenas peça aos seus companheiros para fazer qualquer uma dessas coisas:"
  ru: "Просто попросите своих помощников сделать любое из этих действий:"
  ja: mates に次のことをお願いするだけです：
  ko: "메이트에게 다음 중 하나를 해달라고 요청하세요:"
  it: "Chiedi semplicemente ai tuoi compagni di fare una di queste cose:"
  tr: "Matelerinizden şunlardan herhangi birini yapmasını isteyin:"
  vi: "Chỉ cần yêu cầu bạn đồng hành của bạn làm bất kỳ điều nào trong số này:"
  id: "Cukup minta teman-teman Anda melakukan salah satu hal berikut:"
  pl: "Po prostu poproś swoich towarzyszy, aby zrobili jedno z tych rzeczy:"
  nl: "Vraag je maatjes gewoon om een van deze dingen te doen:"
  ar: "فقط اطلب من رفاقك القيام بأي من هذه الأشياء:"
  hi: "बस अपने साथियों से इनमें से कोई भी काम करने के लिए कहें:"
  th: "เพียงขอให้เพื่อนของคุณทำสิ่งใดสิ่งหนึ่งเหล่านี้:"
  cs: "Stačí požádat své spoluhráče, aby udělali jednu z těchto věcí:"
  sv: "Be bara dina kompisar att göra någon av dessa saker:"
  he: "פשוט בקש מהחברים שלך לעשות אחד מהדברים האלה:"
  verified_by_human: []
