confirm_logout_others:
  context: Confirmation dialog text before logging out all other devices
  en: Log out all other devices? They will need to log in again.
  de: Alle anderen Geräte abmelden? Sie müssen sich erneut anmelden.
  zh: 注销所有其他设备？它们需要重新登录。
  es: ¿Cerrar sesión en todos los otros dispositivos? Tendrán que iniciar sesión de nuevo.
  fr: Déconnecter tous les autres appareils ? Ils devront se reconnecter.
  pt: Sair de todos os outros dispositivos? Eles precisarão fazer login novamente.
  ru: Выйти со всех других устройств? Им потребуется повторный вход.
  ja: 他のすべてのデバイスからログアウトしますか？再ログインが必要になります。
  ko: 다른 모든 기기에서 로그아웃하시겠습니까? 다시 로그인해야 합니다.
  it: Disconnettere tutti gli altri dispositivi? Dovranno accedere di nuovo.
  tr: Diğer tüm cihazlardan çıkış yapılsın mı? Yeniden giriş yapmaları gerekecek.
  vi: Đăng xuất khỏi tất cả thiết bị khác? Họ sẽ cần đăng nhập lại.
  id: Keluar dari semua perangkat lain? Mereka perlu masuk kembali.
  pl: Wylogować wszystkie inne urządzenia? Będą musiały zalogować się ponownie.
  nl: Afmelden bij alle andere apparaten? Ze moeten opnieuw inloggen.
  ar: هل تريد تسجيل الخروج من جميع الأجهزة الأخرى؟ ستحتاج إلى تسجيل الدخول مرة أخرى.
  hi: अन्य सभी डिवाइस से लॉग आउट करें? उन्हें फिर से लॉग इन करना होगा।
  th: ออกจากระบบในอุปกรณ์อื่นทั้งหมด? อุปกรณ์เหล่านั้นจะต้องเข้าสู่ระบบใหม่
  cs: Odhlásit všechna ostatní zařízení? Budou se muset znovu přihlásit.
  sv: Logga ut från alla andra enheter? De måste logga in igen.
  he: להתנתק מכל המכשירים האחרים? הם יצטרכו להתחבר מחדש.

