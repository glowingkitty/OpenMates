confirm_logout_all:
  context: Confirmation dialog text before logging out all devices
  en: Log out on all devices? This will also log you out of this device and clear all trusted devices. Every future login will require re-authentication.
  de: Von allen Geräten abmelden? Dies meldet dich auch von diesem Gerät ab und löscht alle vertrauenswürdigen Geräte. Jede zukünftige Anmeldung erfordert eine erneute Authentifizierung.
  zh: 从所有设备注销？这也将注销此设备并清除所有受信任的设备。每次未来登录都需要重新验证。
  es: ¿Cerrar sesión en todos los dispositivos? Esto también cerrará sesión en este dispositivo y eliminará todos los dispositivos de confianza. Cada inicio de sesión futuro requerirá reautenticación.
  fr: Déconnecter tous les appareils ? Cela vous déconnectera également de cet appareil et effacera tous les appareils de confiance. Chaque future connexion nécessitera une réauthentification.
  pt: Sair de todos os dispositivos? Isso também fará logout deste dispositivo e limpará todos os dispositivos confiáveis. Cada login futuro exigirá reautenticação.
  ru: Выйти со всех устройств? Это также выведет вас из этого устройства и удалит все доверенные устройства. Каждый будущий вход потребует повторной аутентификации.
  ja: すべてのデバイスからログアウトしますか？このデバイスからもログアウトし、すべての信頼済みデバイスがクリアされます。今後のすべてのログインに再認証が必要になります。
  ko: 모든 기기에서 로그아웃하시겠습니까? 이 기기에서도 로그아웃되고 신뢰할 수 있는 모든 기기가 삭제됩니다. 향후 모든 로그인에 재인증이 필요합니다.
  it: Disconnettersi da tutti i dispositivi? Verrai disconnesso anche da questo dispositivo e tutti i dispositivi attendibili verranno rimossi. Ogni futuro accesso richiederà una nuova autenticazione.
  tr: Tüm cihazlardan çıkış yapılsın mı? Bu, bu cihazdan da çıkış yapacak ve tüm güvenilen cihazları temizleyecek. Gelecekteki her oturum açma işlemi yeniden kimlik doğrulama gerektirecek.
  vi: Đăng xuất khỏi tất cả thiết bị? Điều này cũng sẽ đăng xuất bạn khỏi thiết bị này và xóa tất cả thiết bị đáng tin cậy. Mỗi lần đăng nhập trong tương lai sẽ yêu cầu xác thực lại.
  id: Keluar dari semua perangkat? Ini juga akan mengeluarkan Anda dari perangkat ini dan menghapus semua perangkat tepercaya. Setiap login di masa depan memerlukan autentikasi ulang.
  pl: Wylogować ze wszystkich urządzeń? Spowoduje to również wylogowanie z tego urządzenia i usunięcie wszystkich zaufanych urządzeń. Każde przyszłe logowanie będzie wymagać ponownego uwierzytelnienia.
  nl: Afmelden bij alle apparaten? Dit meldt u ook af bij dit apparaat en wist alle vertrouwde apparaten. Elke toekomstige aanmelding vereist hernieuwde verificatie.
  ar: هل تريد تسجيل الخروج من جميع الأجهزة؟ سيؤدي هذا أيضاً إلى تسجيل خروجك من هذا الجهاز ومسح جميع الأجهزة الموثوقة. كل تسجيل دخول مستقبلي سيتطلب إعادة المصادقة.
  hi: सभी डिवाइस से लॉग आउट करें? यह इस डिवाइस से भी लॉग आउट करेगा और सभी विश्वसनीय डिवाइस साफ़ करेगा। भविष्य में हर लॉगिन के लिए पुनः प्रमाणीकरण आवश्यक होगा।
  th: ออกจากระบบในทุกอุปกรณ์? การดำเนินการนี้จะออกจากระบบในอุปกรณ์นี้ด้วยและล้างอุปกรณ์ที่เชื่อถือไว้ทั้งหมด การเข้าสู่ระบบในอนาคตทุกครั้งจะต้องมีการยืนยันตัวตนใหม่
  cs: Odhlásit se ze všech zařízení? Tím se také odhlásíte z tohoto zařízení a vymažete všechna důvěryhodná zařízení. Každé budoucí přihlášení bude vyžadovat opětovné ověření.
  sv: Logga ut från alla enheter? Detta loggar dig även ut från den här enheten och tar bort alla betrodda enheter. Varje framtida inloggning kräver omautentisering.
  he: להתנתק מכל המכשירים? פעולה זו גם תנתק אותך ממכשיר זה ותמחק את כל המכשירים המהימנים. כל כניסה עתידית תדרוש אימות מחדש.

logout_all_hint:
  context: Warning hint text below the logout-all button
  en: This will also clear all trusted devices. Every future login will require full re-authentication.
  de: Dies löscht auch alle vertrauenswürdigen Geräte. Jede zukünftige Anmeldung erfordert vollständige Neu-Authentifizierung.
  zh: 这还将清除所有受信任的设备。每次未来登录都需要完整的重新验证。
  es: Esto también eliminará todos los dispositivos de confianza. Cada inicio de sesión futuro requerirá autenticación completa.
  fr: Cela effacera également tous les appareils de confiance. Chaque future connexion nécessitera une authentification complète.
  pt: Isso também limpará todos os dispositivos confiáveis. Cada login futuro exigirá reautenticação completa.
  ru: Это также удалит все доверенные устройства. Каждый будущий вход потребует полной повторной аутентификации.
  ja: これにより、すべての信頼済みデバイスもクリアされます。今後のすべてのログインに完全な再認証が必要になります。
  ko: 이렇게 하면 신뢰할 수 있는 모든 기기도 삭제됩니다. 향후 모든 로그인에 전체 재인증이 필요합니다.
  it: Questo rimuoverà anche tutti i dispositivi attendibili. Ogni futuro accesso richiederà una riautenticazione completa.
  tr: Bu aynı zamanda tüm güvenilen cihazları temizleyecek. Gelecekteki her oturum açma işlemi tam yeniden kimlik doğrulama gerektirecek.
  vi: Điều này cũng sẽ xóa tất cả thiết bị đáng tin cậy. Mỗi lần đăng nhập trong tương lai sẽ yêu cầu xác thực lại hoàn toàn.
  id: Ini juga akan menghapus semua perangkat tepercaya. Setiap login di masa depan memerlukan autentikasi ulang penuh.
  pl: Spowoduje to również usunięcie wszystkich zaufanych urządzeń. Każde przyszłe logowanie będzie wymagać pełnego ponownego uwierzytelnienia.
  nl: Dit wist ook alle vertrouwde apparaten. Elke toekomstige aanmelding vereist volledige hernieuwde verificatie.
  ar: سيؤدي هذا أيضاً إلى مسح جميع الأجهزة الموثوقة. كل تسجيل دخول مستقبلي سيتطلب إعادة مصادقة كاملة.
  hi: यह सभी विश्वसनीय डिवाइस भी साफ़ कर देगा। भविष्य में हर लॉगिन के लिए पूर्ण पुनः प्रमाणीकरण आवश्यक होगा।
  th: การดำเนินการนี้จะล้างอุปกรณ์ที่เชื่อถือไว้ทั้งหมดด้วย การเข้าสู่ระบบในอนาคตทุกครั้งจะต้องมีการยืนยันตัวตนใหม่อย่างสมบูรณ์
  cs: Tím se také vymažou všechna důvěryhodná zařízení. Každé budoucí přihlášení bude vyžadovat úplné opětovné ověření.
  sv: Detta rensar också alla betrodda enheter. Varje framtida inloggning kräver fullständig omautentisering.
  he: פעולה זו תמחק גם את כל המכשירים המהימנים. כל כניסה עתידית תדרוש אימות מחדש מלא.

