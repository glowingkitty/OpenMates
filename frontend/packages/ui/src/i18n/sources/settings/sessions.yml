confirm_remove:
  context: Confirmation dialog text before removing a session
  en: Remove this session? The device will be logged out immediately.
  de: Diese Sitzung entfernen? Das Gerät wird sofort abgemeldet.
  zh: 删除此会话？该设备将立即注销。
  es: ¿Eliminar esta sesión? El dispositivo cerrará sesión inmediatamente.
  fr: Supprimer cette session ? L'appareil sera déconnecté immédiatement.
  pt: Remover esta sessão? O dispositivo será desconectado imediatamente.
  ru: Удалить эту сессию? Устройство будет немедленно выведено из системы.
  ja: このセッションを削除しますか？デバイスは即座にログアウトされます。
  ko: 이 세션을 제거하시겠습니까? 기기가 즉시 로그아웃됩니다.
  it: Rimuovere questa sessione? Il dispositivo verrà disconnesso immediatamente.
  tr: Bu oturum kaldırılsın mı? Cihaz hemen oturumu kapatacak.
  vi: Xóa phiên này? Thiết bị sẽ bị đăng xuất ngay lập tức.
  id: Hapus sesi ini? Perangkat akan langsung keluar.
  pl: Usunąć tę sesję? Urządzenie zostanie natychmiast wylogowane.
  nl: Deze sessie verwijderen? Het apparaat wordt onmiddellijk afgemeld.
  ar: هل تريد إزالة هذه الجلسة؟ سيتم تسجيل خروج الجهاز فوراً.
  hi: इस सत्र को हटाएं? डिवाइस तुरंत लॉग आउट हो जाएगा।
  th: ลบเซสชันนี้? อุปกรณ์จะถูกออกจากระบบทันที
  cs: Odebrat tuto relaci? Zařízení bude okamžitě odhlášeno.
  sv: Ta bort den här sessionen? Enheten loggas ut omedelbart.
  he: להסיר את הסשן הזה? המכשיר יתנתק מיד.

