  en: Log In from Another Device
  de: Von einem anderen Gerät anmelden
  zh: 从另一台设备登录
  es: Iniciar sesión desde otro dispositivo
  fr: Se connecter depuis un autre appareil
  pt: Fazer login de outro dispositivo
  ru: Войти с другого устройства
  ja: 別のデバイスからログイン
  ko: 다른 기기에서 로그인
  it: Accedi da un altro dispositivo
  tr: Başka bir cihazdan giriş yap
  vi: Đăng nhập từ thiết bị khác
  id: Masuk dari perangkat lain
  pl: Zaloguj się z innego urządzenia
  nl: Inloggen vanaf een ander apparaat
  ar: تسجيل الدخول من جهاز آخر
  hi: किसी अन्य डिवाइस से लॉग इन करें
  th: เข้าสู่ระบบจากอุปกรณ์อื่น
  cs: Přihlásit se z jiného zařízení
  sv: Logga in från en annan enhet
  he: התחבר ממכשיר אחר

pair_initiate_description:
  context: Description shown on the pair initiation page
  en: Scan the QR code or enter the code below on your new device to log in.
  de: Scanne den QR-Code oder gib den Code unten auf deinem neuen Gerät ein, um dich anzumelden.
  zh: 扫描二维码或在您的新设备上输入以下代码以登录。
  es: Escanea el código QR o ingresa el código a continuación en tu nuevo dispositivo para iniciar sesión.
  fr: Scannez le code QR ou entrez le code ci-dessous sur votre nouvel appareil pour vous connecter.
  pt: Escaneie o código QR ou insira o código abaixo no seu novo dispositivo para fazer login.
  ru: Отсканируйте QR-код или введите код ниже на своём новом устройстве для входа.
  ja: QRコードをスキャンするか、新しいデバイスに以下のコードを入力してログインしてください。
  ko: QR 코드를 스캔하거나 새 기기에서 아래 코드를 입력하여 로그인하세요.
  it: Scansiona il codice QR o inserisci il codice qui sotto sul tuo nuovo dispositivo per accedere.
  tr: Giriş yapmak için yeni cihazınızda QR kodunu tarayın veya aşağıdaki kodu girin.
  vi: Quét mã QR hoặc nhập mã bên dưới trên thiết bị mới của bạn để đăng nhập.
  id: Pindai kode QR atau masukkan kode di bawah ini pada perangkat baru Anda untuk masuk.
  pl: Zeskanuj kod QR lub wprowadź poniższy kod na swoim nowym urządzeniu, aby się zalogować.
  nl: Scan de QR-code of voer de onderstaande code in op uw nieuwe apparaat om in te loggen.
  ar: امسح رمز QR أو أدخل الرمز أدناه على جهازك الجديد لتسجيل الدخول.
  hi: लॉग इन करने के लिए अपने नए डिवाइस पर QR कोड स्कैन करें या नीचे दिया गया कोड दर्ज करें।
  th: สแกนรหัส QR หรือป้อนรหัสด้านล่างบนอุปกรณ์ใหม่ของคุณเพื่อเข้าสู่ระบบ
  cs: Naskenujte QR kód nebo zadejte níže uvedený kód na svém novém zařízení pro přihlášení.
  sv: Skanna QR-koden eller ange koden nedan på din nya enhet för att logga in.
  he: סרוק את קוד ה-QR או הזן את הקוד למטה במכשיר החדש שלך כדי להתחבר.

