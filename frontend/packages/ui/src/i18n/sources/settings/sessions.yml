description:
  context: Description shown at the top of the active sessions page
  en: Manage your active sessions across all devices. You can remove individual sessions or log out from all devices at once.
  de: Verwalte deine aktiven Sitzungen auf allen Geräten. Du kannst einzelne Sitzungen entfernen oder dich von allen Geräten gleichzeitig abmelden.
  zh: 管理您在所有设备上的活跃会话。您可以删除单个会话或一次性从所有设备注销。
  es: Gestiona tus sesiones activas en todos los dispositivos. Puedes eliminar sesiones individuales o cerrar sesión en todos los dispositivos a la vez.
  fr: Gérez vos sessions actives sur tous les appareils. Vous pouvez supprimer des sessions individuelles ou vous déconnecter de tous les appareils en même temps.
  pt: Gerencie suas sessões ativas em todos os dispositivos. Você pode remover sessões individuais ou sair de todos os dispositivos de uma vez.
  ru: Управляйте активными сессиями на всех устройствах. Вы можете удалить отдельные сессии или выйти со всех устройств одновременно.
  ja: すべてのデバイスでのアクティブセッションを管理します。個々のセッションを削除したり、すべてのデバイスから一度にログアウトできます。
  ko: 모든 기기에서 활성 세션을 관리하세요. 개별 세션을 제거하거나 모든 기기에서 한 번에 로그아웃할 수 있습니다.
  it: Gestisci le tue sessioni attive su tutti i dispositivi. Puoi rimuovere singole sessioni o disconnetterti da tutti i dispositivi contemporaneamente.
  tr: Tüm cihazlarınızdaki aktif oturumları yönetin. Bireysel oturumları kaldırabilir veya tüm cihazlardan aynı anda çıkış yapabilirsiniz.
  vi: Quản lý các phiên hoạt động trên tất cả các thiết bị. Bạn có thể xóa từng phiên hoặc đăng xuất khỏi tất cả thiết bị cùng một lúc.
  id: Kelola sesi aktif Anda di semua perangkat. Anda dapat menghapus sesi individual atau keluar dari semua perangkat sekaligus.
  pl: Zarządzaj aktywnymi sesjami na wszystkich urządzeniach. Możesz usunąć poszczególne sesje lub wylogować się ze wszystkich urządzeń naraz.
  nl: Beheer uw actieve sessies op alle apparaten. U kunt individuele sessies verwijderen of u tegelijk afmelden bij alle apparaten.
  ar: أدر جلساتك النشطة على جميع أجهزتك. يمكنك إزالة جلسات فردية أو تسجيل الخروج من جميع الأجهزة دفعة واحدة.
  hi: सभी डिवाइस पर अपने सक्रिय सत्र प्रबंधित करें। आप अलग-अलग सत्र हटा सकते हैं या एक साथ सभी डिवाइस से लॉग आउट कर सकते हैं।
  th: จัดการเซสชันที่ใช้งานอยู่ในทุกอุปกรณ์ คุณสามารถลบเซสชันรายบุคคลหรือออกจากระบบจากทุกอุปกรณ์พร้อมกัน
  cs: Spravujte aktivní relace na všech zařízeních. Můžete odebrat jednotlivé relace nebo se odhlásit ze všech zařízení najednou.
  sv: Hantera dina aktiva sessioner på alla enheter. Du kan ta bort enskilda sessioner eller logga ut från alla enheter på en gång.
  he: נהל את הסשנים הפעילים שלך בכל המכשירים. תוכל להסיר סשנים בודדים או להתנתק מכל המכשירים בבת אחת.

