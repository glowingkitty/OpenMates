  fr: Trop de tentatives incorrectes. Ce code de couplage est maintenant invalide.
  pt: Muitas tentativas incorretas. Este código de emparelhamento agora é inválido.
  ru: Слишком много неверных попыток. Этот код сопряжения теперь недействителен.
  ja: 不正な試行が多すぎます。このペアリングコードは無効になりました。
  ko: 잘못된 시도가 너무 많습니다. 이 페어링 코드는 이제 유효하지 않습니다.
  it: Troppi tentativi errati. Questo codice di accoppiamento non è più valido.
  tr: Çok fazla yanlış deneme. Bu eşleştirme kodu artık geçersiz.
  vi: Quá nhiều lần thử không đúng. Mã ghép nối này hiện không hợp lệ.
  id: Terlalu banyak percobaan yang salah. Kode pasangan ini sekarang tidak valid.
  pl: Zbyt wiele nieprawidłowych prób. Ten kod parowania jest teraz nieważny.
  nl: Te veel onjuiste pogingen. Deze koppelingscode is nu ongeldig.
  ar: محاولات خاطئة كثيرة جداً. رمز الإقران هذا أصبح غير صالح الآن.
  hi: बहुत अधिक गलत प्रयास। यह पेयर कोड अब अमान्य है।
  th: มีการพยายามผิดพลาดมากเกินไป รหัสจับคู่นี้ใช้ไม่ได้แล้ว
  cs: Příliš mnoho nesprávných pokusů. Tento párovací kód je nyní neplatný.
  sv: För många felaktiga försök. Denna parkopplningskod är nu ogiltig.
  he: יותר מדי ניסיונות שגויים. קוד ההתאמה הזה כבר לא תקף.

