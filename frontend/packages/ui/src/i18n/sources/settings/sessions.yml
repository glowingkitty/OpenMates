pair_invalid_token:
  context: Error when the pair token is invalid or not found
  en: This pair code is invalid or has expired. Ask the other device to generate a new code.
  de: Dieser Kopplungscode ist ungültig oder abgelaufen. Bitte das andere Gerät, einen neuen Code zu generieren.
  zh: 此配对码无效或已过期。请让另一台设备生成新代码。
  es: Este código de emparejamiento no es válido o ha expirado. Pide al otro dispositivo que genere un nuevo código.
  fr: Ce code de couplage est invalide ou a expiré. Demandez à l'autre appareil de générer un nouveau code.
  pt: Este código de emparelhamento é inválido ou expirou. Peça ao outro dispositivo para gerar um novo código.
  ru: Этот код сопряжения недействителен или истёк. Попросите другое устройство сгенерировать новый код.
  ja: このペアリングコードは無効または期限切れです。別のデバイスに新しいコードを生成するよう依頼してください。
  ko: 이 페어링 코드가 유효하지 않거나 만료되었습니다. 다른 기기에서 새 코드를 생성해 달라고 요청하세요.
  it: Questo codice di accoppiamento non è valido o è scaduto. Chiedi all'altro dispositivo di generare un nuovo codice.
  tr: Bu eşleştirme kodu geçersiz veya süresi dolmuş. Diğer cihazdan yeni bir kod oluşturmasını isteyin.
  vi: Mã ghép nối này không hợp lệ hoặc đã hết hạn. Yêu cầu thiết bị kia tạo mã mới.
  id: Kode pasangan ini tidak valid atau sudah kedaluwarsa. Minta perangkat lain untuk membuat kode baru.
  pl: Ten kod parowania jest nieprawidłowy lub wygasł. Poproś inne urządzenie o wygenerowanie nowego kodu.
  nl: Deze koppelingscode is ongeldig of verlopen. Vraag het andere apparaat een nieuwe code te genereren.
  ar: رمز الإقران هذا غير صالح أو انتهت صلاحيته. اطلب من الجهاز الآخر إنشاء رمز جديد.
  hi: यह पेयर कोड अमान्य है या समाप्त हो गया है। दूसरे डिवाइस से नया कोड जनरेट करने के लिए कहें।
  th: รหัสจับคู่นี้ไม่ถูกต้องหรือหมดอายุแล้ว ขอให้อุปกรณ์อื่นสร้างรหัสใหม่
  cs: Tento párovací kód je neplatný nebo vypršel. Požádejte druhé zařízení o vygenerování nového kódu.
  sv: Den här parkopplningskoden är ogiltig eller har gått ut. Be den andra enheten att generera en ny kod.
  he: קוד ההתאמה הזה לא תקף או פג תוקפו. בקש מהמכשיר האחר לייצר קוד חדש.

