# Chat settings translations
# Used in Settings > Chat menu
# Namespace: settings, key prefix: chat (from filename)
# Keys should NOT include "chat." prefix - the build script adds it automatically
# All keys must be at root level with flat dot-notation, only language codes (en, de, etc.) are nested
description:
  context: Short description shown in the chat settings page gradient banner header
  en: Customize notifications and chat behaviour
  de: Benachrichtigungen und Chat-Verhalten anpassen
  zh: 自定义通知和聊天行为
  es: Personaliza las notificaciones y el comportamiento del chat
  fr: Personnalisez les notifications et le comportement du chat
  pt: Personalize as notificações e o comportamento do chat
  ru: Настройте уведомления и поведение чата
  ja: 通知とチャットの動作をカスタマイズする
  ko: 알림 및 채팅 동작 사용자 지정
  it: Personalizza le notifiche e il comportamento della chat
  tr: Bildirimleri ve sohbet davranışını özelleştirin
  vi: Tùy chỉnh thông báo và hành vi trò chuyện
  id: Sesuaikan notifikasi dan perilaku obrolan
  pl: Dostosuj powiadomienia i zachowanie czatu
  nl: Pas meldingen en chatgedrag aan
  ar: تخصيص الإشعارات وسلوك الدردشة
  hi: सूचनाओं और चैट व्यवहार को अनुकूलित करें
  th: ปรับแต่งการแจ้งเตือนและพฤติกรรมของแชท
  cs: Přizpůsobte si oznámení a chování chatu
  sv: Anpassa aviseringar och chattbeteende
  he: "התאמה אישית של התראות והתנהגות הצ'אט"
  verified_by_human: []

