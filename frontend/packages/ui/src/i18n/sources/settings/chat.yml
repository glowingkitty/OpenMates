notifications.email_how_it_works:
  context: Info banner explaining how email notifications work
  en: Email notifications are only sent when you're not actively using OpenMates on any device.
  de: E-Mail-Benachrichtigungen werden nur gesendet, wenn Sie OpenMates auf keinem Gerät aktiv nutzen.
  zh: 仅当您未在任何设备上主动使用 OpenMates 时才发送邮件通知。
  es: Las notificaciones por correo se envían solo cuando no estás usando activamente OpenMates en ningún dispositivo.
  fr: Les notifications par e-mail ne sont envoyées que lorsque vous n'utilisez pas activement OpenMates sur aucun appareil.
  pt: As notificações por e-mail só são enviadas quando você não está usando ativamente o OpenMates em nenhum dispositivo.
  ru: Уведомления по электронной почте отправляются только тогда, когда вы активно не используете OpenMates ни на одном устройстве.
  ja: メール通知は、どのデバイスでもOpenMatesを積極的に使用していない場合にのみ送信されます。
  ko: 이메일 알림은 어떤 기기에서도 OpenMates를 적극적으로 사용하지 않을 때만 전송됩니다.
  it: Le notifiche e-mail vengono inviate solo quando non stai usando attivamente OpenMates su nessun dispositivo.
  tr: E-posta bildirimleri yalnızca hiçbir cihazda OpenMates'i aktif olarak kullanmadığınızda gönderilir.
  vi: Thông báo email chỉ được gửi khi bạn không đang tích cực sử dụng OpenMates trên bất kỳ thiết bị nào.
  id: Notifikasi email hanya dikirim saat Anda tidak aktif menggunakan OpenMates di perangkat mana pun.
  pl: Powiadomienia e-mail są wysyłane tylko wtedy, gdy nie korzystasz aktywnie z OpenMates na żadnym urządzeniu.
  nl: E-mailmeldingen worden alleen verzonden wanneer u OpenMates op geen enkel apparaat actief gebruikt.
  ar: يتم إرسال إشعارات البريد الإلكتروني فقط عندما لا تستخدم OpenMates بنشاط على أي جهاز.
  hi: ईमेल सूचनाएं केवल तब भेजी जाती हैं जब आप किसी भी डिवाइस पर OpenMates का सक्रिय रूप से उपयोग नहीं कर रहे हों।
  th: การแจ้งเตือนทางอีเมลจะถูกส่งเฉพาะเมื่อคุณไม่ได้ใช้งาน OpenMates อย่างแข็งขันบนอุปกรณ์ใดๆ
  cs: E-mailová oznámení se odesílají pouze tehdy, když aktivně nepoužíváte OpenMates na žádném zařízení.
  sv: E-postaviseringar skickas bara när du inte aktivt använder OpenMates på någon enhet.
  he: התראות באימייל נשלחות רק כשאינך משתמש באופן פעיל ב-OpenMates באף מכשיר.
