notifications.not_supported:
  context: Warning when push notifications are not supported
  en: Push notifications are not supported on this browser or device.
  de: Push-Benachrichtigungen werden auf diesem Browser oder Gerät nicht unterstützt.
  zh: 此浏览器或设备不支持推送通知。
  es: Las notificaciones push no están disponibles en este navegador o dispositivo.
  fr: Les notifications push ne sont pas prises en charge sur ce navigateur ou appareil.
  pt: Notificações push não são suportadas neste navegador ou dispositivo.
  ru: Push-уведомления не поддерживаются в этом браузере или устройстве.
  ja: このブラウザまたはデバイスではプッシュ通知はサポートされていません。
  ko: 이 브라우저 또는 기기에서는 푸시 알림이 지원되지 않습니다.
  it: Le notifiche push non sono supportate su questo browser o dispositivo.
  tr: Bu tarayıcı veya cihazda anlık bildirimler desteklenmiyor.
  vi: Thông báo đẩy không được hỗ trợ trên trình duyệt hoặc thiết bị này.
  id: Notifikasi push tidak didukung di browser atau perangkat ini.
  pl: Powiadomienia push nie są obsługiwane w tej przeglądarce ani na tym urządzeniu.
  nl: Pushmeldingen worden niet ondersteund op deze browser of dit apparaat.
  ar: إشعارات الدفع غير مدعومة على هذا المتصفح أو الجهاز.
  hi: इस ब्राउज़र या डिवाइस पर पुश नोटिफिकेशन समर्थित नहीं हैं।
  th: การแจ้งเตือนแบบพุชไม่รองรับบนเบราว์เซอร์หรืออุปกรณ์นี้
  cs: Push oznámení nejsou v tomto prohlížeči nebo zařízení podporována.
  sv: Push-aviseringar stöds inte på den här webbläsaren eller enheten.
  he: התראות Push אינן נתמכות בדפדפן או במכשיר זה.
notifications.pwa_install_title:
  context: Title shown on iOS Safari when push requires PWA installation
  en: Add to Home Screen to Enable Notifications
  de: Zum Home-Bildschirm hinzufügen, um Benachrichtigungen zu aktivieren
  zh: 添加到主屏幕以启用通知
  es: Añadir a la pantalla de inicio para activar notificaciones
  fr: Ajouter à l'écran d'accueil pour activer les notifications
  pt: Adicionar à tela inicial para ativar notificações
  ru: Добавьте на главный экран для включения уведомлений
  ja: 通知を有効にするにはホーム画面に追加してください
  ko: 알림을 활성화하려면 홈 화면에 추가하세요
  it: Aggiungi alla schermata principale per abilitare le notifiche
  tr: Bildirimleri etkinleştirmek için ana ekrana ekleyin
  vi: Thêm vào màn hình chính để bật thông báo
  id: Tambahkan ke Layar Utama untuk Mengaktifkan Notifikasi
  pl: Dodaj do ekranu głównego, aby włączyć powiadomienia
  nl: Voeg toe aan beginscherm om meldingen in te schakelen
  ar: أضف إلى الشاشة الرئيسية لتفعيل الإشعارات
  hi: सूचनाएं सक्षम करने के लिए होम स्क्रीन में जोड़ें
  th: เพิ่มไปยังหน้าจอหลักเพื่อเปิดใช้การแจ้งเตือน
  cs: Přidejte na domovskou obrazovku pro povolení oznámení
  sv: Lägg till på startskärmen för att aktivera aviseringar
  he: הוספה למסך הבית כדי להפעיל התראות
notifications.pwa_install_desc:
  context: Description explaining why PWA installation is needed for push notifications
  en: "Push notifications require the app to be installed on your device. Follow these steps:"
  de: "Push-Benachrichtigungen erfordern, dass die App auf Ihrem Gerät installiert ist. Folgen Sie diesen Schritten:"
  zh: "推送通知需要在您的设备上安装该应用。请按以下步骤操作："
  es: "Las notificaciones push requieren que la app esté instalada en tu dispositivo. Sigue estos pasos:"
  fr: "Les notifications push nécessitent que l'app soit installée sur votre appareil. Suivez ces étapes :"
  pt: "As notificações push exigem que o app esteja instalado no seu dispositivo. Siga estes passos:"
  ru: "Push-уведомления требуют установки приложения на вашем устройстве. Следуйте этим шагам:"
  ja: "プッシュ通知には、アプリをデバイスにインストールする必要があります。次の手順に従ってください："
  ko: "푸시 알림을 사용하려면 앱이 기기에 설치되어 있어야 합니다. 다음 단계를 따르세요:"
  it: "Le notifiche push richiedono che l'app sia installata sul tuo dispositivo. Segui questi passaggi:"
  tr: "Anlık bildirimler, uygulamanın cihazınıza yüklenmesini gerektirir. Şu adımları izleyin:"
  vi: "Thông báo đẩy yêu cầu ứng dụng phải được cài đặt trên thiết bị của bạn. Làm theo các bước sau:"
  id: "Notifikasi push membutuhkan aplikasi yang terinstal di perangkat Anda. Ikuti langkah-langkah berikut:"
  pl: "Powiadomienia push wymagają zainstalowania aplikacji na urządzeniu. Wykonaj następujące kroki:"
  nl: "Pushmeldingen vereisen dat de app op uw apparaat is geïnstalleerd. Volg deze stappen:"
  ar: "تتطلب إشعارات الدفع تثبيت التطبيق على جهازك. اتبع هذه الخطوات:"
  hi: "पुश नोटिफिकेशन के लिए ऐप आपके डिवाइस पर इंस्टॉल होना आवश्यक है। इन चरणों का पालन करें:"
  th: "การแจ้งเตือนแบบพุชต้องการให้แอปติดตั้งบนอุปกรณ์ของคุณ ทำตามขั้นตอนเหล่านี้:"
  cs: "Push oznámení vyžadují instalaci aplikace na vašem zařízení. Postupujte podle těchto kroků:"
  sv: "Push-aviseringar kräver att appen är installerad på din enhet. Följ dessa steg:"
  he: "התראות Push דורשות שהאפליקציה תהיה מותקנת במכשיר שלך. בצע את השלבים הבאים:"
notifications.denied_info:
  context: Info text when permission is denied
  en: To enable notifications, please allow them in your browser settings and refresh the page.
  de: Um Benachrichtigungen zu aktivieren, erlauben Sie diese bitte in Ihren Browser-Einstellungen und aktualisieren Sie die Seite.
  zh: 要启用通知，请在浏览器设置中允许，然后刷新页面。
  es: Para activar las notificaciones, permítelas en la configuración del navegador y actualiza la página.
  fr: Pour activer les notifications, veuillez les autoriser dans les paramètres de votre navigateur et actualiser la page.
  pt: Para ativar notificações, permita-as nas configurações do navegador e atualize a página.
  ru: Чтобы включить уведомления, разрешите их в настройках браузера и обновите страницу.
  ja: 通知を有効にするには、ブラウザの設定で許可してページを更新してください。
  ko: 알림을 활성화하려면 브라우저 설정에서 허용하고 페이지를 새로 고침하세요.
  it: Per abilitare le notifiche, consentile nelle impostazioni del browser e aggiorna la pagina.
  tr: Bildirimleri etkinleştirmek için lütfen tarayıcı ayarlarınızda bunlara izin verin ve sayfayı yenileyin.
  vi: Để bật thông báo, hãy cho phép chúng trong cài đặt trình duyệt và làm mới trang.
  id: Untuk mengaktifkan notifikasi, izinkan di pengaturan browser Anda dan muat ulang halaman.
  pl: Aby włączyć powiadomienia, zezwól na nie w ustawieniach przeglądarki i odśwież stronę.
  nl: Om meldingen in te schakelen, staat u ze toe in uw browserinstellingen en vernieuwt u de pagina.
  ar: لتفعيل الإشعارات، يرجى السماح بها في إعدادات المتصفح وإعادة تحميل الصفحة.
  hi: सूचनाएं सक्षम करने के लिए, कृपया अपने ब्राउज़र सेटिंग्स में उन्हें अनुमति दें और पृष्ठ को रीफ्रेश करें।
  th: เพื่อเปิดใช้การแจ้งเตือน กรุณาอนุญาตในการตั้งค่าเบราว์เซอร์และรีเฟรชหน้า
  cs: Chcete-li povolit oznámení, povolte je v nastavení prohlížeče a obnovte stránku.
  sv: För att aktivera aviseringar, tillåt dem i webbläsarinställningarna och uppdatera sidan.
  he: כדי להפעיל התראות, יש לאשר אותן בהגדרות הדפדפן ולרענן את הדף.
