# frontend/packages/ui/src/i18n/sources/settings/app_store_examples.yml
#
# Localised query labels for the app-store "Examples" section shown
# beneath each skill detail page. Referenced from the fixture files at
# frontend/packages/ui/src/components/embeds/<app>/<Name>EmbedPreview.examples.ts
# via the `query_translation_key` field on each example. The Svelte
# renderer (SkillExamplesSection.svelte) resolves the key through the
# $text() store so the card label matches the user's UI language while
# the underlying provider results (titles, URLs, snippets) stay in
# whatever language the real web returned.
#
# Convention: `app_store_examples.<app>.<skill>.<n>` where n is 1..3 and
# matches the ordinal of the example inside its fixture file. Every key
# ships English up-front; the other locales are filled in automatically
# via scripts/auto_translate.py.

