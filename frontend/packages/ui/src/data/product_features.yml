# frontend/packages/ui/src/data/product_features.yml
# Canonical editorial feature highlights for logged-out product inspiration cards.
# These are concise public feature claims, not runtime feature availability flags.

translations:
  de:
    pii-detection:
      title: Ersatz persönlicher Daten
      headline: Ersetze E-Mails, Telefonnummern, Namen und Adressen durch sichere Platzhalter, bevor KI sie sieht.
      description: OpenMates kann sensible persönliche Details ersetzen, bevor eine Anfrage an einen KI-Anbieter gesendet wird.
    relevant-memories:
      title: Relevante Erinnerungen
      headline: Nutze app-spezifische Erinnerungen nur mit Zustimmung und nur, wenn sie relevant sind.
      description: OpenMates hält Erinnerungen auf Apps beschränkt und fügt sie nur ein, wenn sie bei der aktuellen Aufgabe helfen.
    trusted-quotes:
      title: Verlässliche Zitate
      headline: Vertraue Zitaten, weil unbelegte oder falsche Zitate automatisch entfernt werden.
      description: OpenMates entfernt Zitate, die nicht gegen das Quellmaterial verifiziert werden können.
    events-search:
      title: Events finden
      headline: Suche Meetup, Luma, Google Events, Resident Advisor und mehr von einem Chat aus.
      description: OpenMates kann mehrere Event-Quellen durchsuchen, damit du schneller passende Veranstaltungen findest.
    learning-mode:
      title: Lernmodus
      headline: Lerne Schritt für Schritt mit einem Modus für Verständnis statt nur schnellen Antworten.
      description: Der Lernmodus strukturiert Erklärungen, prüft Verständnis und hält den Chat aufs Lernen fokussiert.
    incognito-mode:
      title: Inkognito-Modus
      headline: Starte temporäre Chats, wenn du sie nicht im Verlauf speichern möchtest.
      description: Inkognito-Chats sind für Wegwerf-Unterhaltungen gedacht, die nicht in deiner Chatliste bleiben sollen.
    audio-messages:
      title: Audionachrichten
      headline: Sende Audionachrichten und erhalte korrigierte Transkripte, bevor die KI antwortet.
      description: OpenMates kann Sprachtranskripte bereinigen, damit die KI klareren Text erhält.
    chat-file-downloads:
      title: Chat- und Datei-Downloads
      headline: Lade Chats und Dateien einfach über das Chat-Menü herunter.
      description: Klicke mit der rechten Maustaste auf einen Chat, um nützliche Chat- und Dateidaten lokal zu exportieren.
    provider-independent:
      title: Anbieterunabhängig
      headline: Nutze verschiedene KI-Modelle über Anbieter hinweg, ohne deine Arbeit an ein Unternehmen zu binden.
      description: OpenMates lässt Fähigkeiten über mehrere Modellanbieter funktionieren, statt alles an einen einzelnen Chatbot-Stack zu koppeln.
    image-upload:
      title: Bild-Uploads
      headline: Lade Bilder hoch und bitte OpenMates, sie zu prüfen, zu erklären oder damit zu arbeiten.
      description: Bild-Uploads lassen Mates über Screenshots, Fotos, Designs und visuellen Kontext nachdenken.
    document-upload:
      title: Dokument-Uploads
      headline: Lade PDFs und Dokumente hoch, damit OpenMates sie lesen, zusammenfassen und daraus zitieren kann.
      description: Dokument-Uploads machen lange PDFs und Dateien direkt im Chat-Workflow verfügbar.
    sandbox-code-execution:
      title: Code-Ausführung in der Sandbox
      headline: Führe generierten Code in einer Sandbox aus, um zu testen, ob er wirklich funktioniert.
      description: Code-Ausführung hilft, generierte Snippets zu validieren, bevor du sie anderswo nutzt.
    offline-search:
      title: Offline-Suche
      headline: Suche lokal in Chats und Embeds, auch wenn du offline bist.
      description: Offline-Suche hilft dir, frühere Arbeit ohne Serveranfrage wiederzufinden.
    cli-parity:
      title: OpenMates CLI
      headline: Nutze die OpenMates CLI mit denselben Chats und Fähigkeiten wie in der Web-App.
      description: Die CLI kann auf dieselben Chats und Kernabläufe zugreifen, statt eine getrennte Spielzeugoberfläche zu sein.
    rest-api:
      title: REST API
      headline: Automatisiere OpenMates-Workflows über eine REST API.
      description: Die REST API lässt Entwickler OpenMates-Workflows in eigene Systeme integrieren.
    webhooks:
      title: Webhooks
      headline: Verbinde OpenMates über Webhooks mit deinen eigenen Tools.
      description: Webhooks lassen externe Systeme auf OpenMates-Ereignisse und Workflow-Updates reagieren.

features:
  - id: pii-detection
    title: Personal Data Replacement
    headline: Replace emails, phone numbers, names, and addresses with safe placeholders before AI sees them.
    description: OpenMates can replace sensitive personal details before sending a request to an AI provider.
    icon: shield-check
    tags: [privacy, legal_law, software_development]

  - id: relevant-memories
    title: Relevant Memories
    headline: Use app-specific memories only with consent and only when they are relevant.
    description: OpenMates keeps memories scoped to apps and includes them only when they help the current task.
    icon: heart
    tags: [privacy, learning, writing]

  - id: trusted-quotes
    title: Trusted Quotes
    headline: Trust quotes because unsupported or false quotes are automatically removed.
    description: OpenMates removes quotes it cannot verify against the source material.
    icon: quote
    tags: [learning, writing, discuss_news, discuss_videos, software_development]

  - id: events-search
    title: Find Events
    headline: Search Meetup, Luma, Google Events, Resident Advisor, and more from one chat.
    description: OpenMates can search multiple event sources so you find relevant events faster.
    icon: calendar-search
    tags: [find_events, find_restaurant, learning]

  - id: learning-mode
    title: Learning Mode
    headline: Learn step by step with a mode built for understanding, not just quick answers.
    description: Learning mode guides explanations, checks understanding, and keeps the chat focused on learning.
    icon: graduation-cap
    tags: [learning, software_development, video_tutorials, diy_projects]

  - id: incognito-mode
    title: Incognito Mode
    headline: Start temporary chats when you do not want them saved to history.
    description: Incognito chats are for throwaway conversations that should not remain in your chat list.
    icon: mask
    tags: [privacy]

  - id: audio-messages
    title: Audio Messages
    headline: Send audio messages and get corrected transcripts before the AI responds.
    description: OpenMates can clean up speech transcripts so the AI receives clearer text.
    icon: mic
    tags: [writing, learning, medical_health]

  - id: chat-file-downloads
    title: Chat and File Downloads
    headline: Download chats and files easily from the chat menu.
    description: Right-click a chat to export useful chat and file data when you need a local copy.
    icon: download
    tags: [privacy, writing]

  - id: provider-independent
    title: Provider Independent
    headline: Use different AI models across providers without locking work into one company.
    description: OpenMates lets capabilities work across multiple model providers instead of a single chatbot stack.
    icon: network
    tags: [privacy, software_development, run_code]

  - id: image-upload
    title: Image Uploads
    headline: Upload images and ask OpenMates to inspect, explain, or work with them.
    description: Image uploads let mates reason about screenshots, photos, designs, and visual context.
    icon: image
    tags: [design, learning, find_restaurant]

  - id: document-upload
    title: Document Uploads
    headline: Upload PDFs and documents so OpenMates can read, summarize, and quote them.
    description: Document uploads make long PDFs and files available inside the chat workflow.
    icon: file-text
    tags: [writing, learning, legal_law, software_development]

  - id: sandbox-code-execution
    title: Sandbox Code Execution
    headline: Run generated code in a sandbox to test whether it actually works.
    description: Code execution helps validate generated snippets before you use them elsewhere.
    icon: square-terminal
    tags: [software_development, run_code]

  - id: offline-search
    title: Offline Search
    headline: Search across chats and embeds locally, even when you are offline.
    description: Offline search helps you find previous work without depending on a server round trip.
    icon: search
    tags: [learning, discuss_news, privacy]

  - id: cli-parity
    title: OpenMates CLI
    headline: Use the OpenMates CLI with the same chats and capabilities as the web app.
    description: The CLI can access the same chats and core workflows instead of being a separate toy interface.
    icon: terminal
    tags: [run_code, software_development]

  - id: rest-api
    title: REST API
    headline: Automate OpenMates workflows through a REST API.
    description: The REST API lets developers integrate OpenMates workflows into their own systems.
    icon: braces
    tags: [software_development, run_code]

  - id: webhooks
    title: Webhooks
    headline: Connect OpenMates to your own tools with webhooks.
    description: Webhooks let outside systems react to OpenMates events and workflow updates.
    icon: webhook
    tags: [software_development, run_code]
