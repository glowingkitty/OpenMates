# Chat scenario: Code review conversation
# Shows the software development mate in action.

name: Code Review Chat
description: A code review conversation with the Dev mate

messages:
  - role: user
    content: "Can you review this function? It's supposed to debounce API calls but sometimes fires twice."

  - role: assistant
    category: software_development
    content: |
      The issue is likely a **stale closure** over the timeout ID. Here's the fix:

      ```typescript
      function debounce<T extends (...args: unknown[]) => void>(
        fn: T,
        delay: number
      ): T {
        let timeoutId: ReturnType<typeof setTimeout>;
        return ((...args: Parameters<T>) => {
          clearTimeout(timeoutId);
          timeoutId = setTimeout(() => fn(...args), delay);
        }) as T;
      }
      ```

      Key changes:
      - Use `clearTimeout` **before** setting a new timeout
      - Type the return properly with generics
      - Capture `args` in the closure scope

  - role: user
    content: "That fixed it, thanks! Should I also add a cancel method?"

  - role: assistant
    category: software_development
    content: |
      Yes — adding `cancel()` and `flush()` methods is good practice for cleanup (e.g. on component unmount):

      - **`cancel()`** — clears the pending timeout
      - **`flush()`** — executes immediately and clears the timeout

      Most utility libraries like `lodash.debounce` include these by default.
