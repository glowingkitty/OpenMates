# Chat scenario: Cooking conversation
# Shows the Chef mate helping with a recipe.

name: Cooking Chat
description: A cooking conversation with the Chef mate

messages:
  - role: user
    content: "What's a quick weeknight pasta that's not just tomato sauce?"

  - role: assistant
    category: cooking_food
    content: |
      Try **Pasta aglio e olio** — ready in 15 minutes:

      1. Cook spaghetti in salted water
      2. Slice **4 garlic cloves** thinly, sauté in olive oil on low heat
      3. Add **red pepper flakes** when garlic is golden
      4. Toss pasta in the pan with a ladle of pasta water
      5. Finish with fresh parsley and parmesan

      The secret is the *pasta water* — its starch creates a silky sauce that clings to every strand.

  - role: user
    content: "Can I add protein to this?"

  - role: assistant
    category: cooking_food
    content: |
      Absolutely! Great additions:
      - **Crispy pancetta** — cook first, set aside, add back at the end
      - **Shrimp** — sear 2 min per side in the garlic oil before adding pasta
      - **A fried egg** on top — runny yolk becomes extra sauce
