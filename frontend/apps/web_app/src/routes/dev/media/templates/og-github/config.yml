# OG image for GitHub repo / social sharing
# 1200x630px — standard Open Graph dimensions

template: og-github
format: og
width: 1200
height: 630

brand:
  headline: "Digital team mates"
  subtitle: "For everyone."
  features:
    - "AI for everyday tasks & learning"
    - "Privacy focus"
    - "No subscription"
    - "Fair pay per use"

phone:
  iframe_src: "/?media=1&seed=42&sidebar=closed&inspirations=fixed"
  screen_width: 220
  screen_height: 430
  scale: 0.52

laptop:
  iframe_src: "/?media=1&seed=42&sidebar=open&inspirations=none"
  # For chat view: append #chat-id={uuid} at runtime (from seeded media account)
  screen_width: 560
  screen_height: 340
  scale: 0.58
