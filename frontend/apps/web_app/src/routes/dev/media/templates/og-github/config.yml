# OG image for GitHub repo / social sharing
# 1200x630px — standard Open Graph dimensions

template: og-github
format: og
width: 1200
height: 630

brand:
  headline: "Digital team mates"
  subtitle: "For everyone."
  features:
    - "AI for everyday tasks & learning"
    - "Privacy focus"
    - "No subscription"
    - "Fair pay per use"

phone:
  screen: new-chat
  screen_width: 220
  screen_height: 430
  scale: 0.52

laptop:
  screen: chat
  scenario: cuttlefish-chat
  screen_width: 560
  screen_height: 340
  scale: 0.58
  show_sidebar: true
  chat_title: "Cuttlefish Colors"
  chat_category: "general_knowledge"
