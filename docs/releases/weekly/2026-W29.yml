llm_summary:
  overview: OpenMates focused on deep technical stabilization this week, primarily through a major overhaul of the cross-device
    chat recovery protocol and the expansion of CLI and SDK capabilities. Significant progress was made on foundational infrastructure
    for unreleased features including Workflows, Teams, and Tasks, while Apple platform parity work continued to align rendering
    across iOS, macOS, and Apple Watch.
  released_changes:
  - text: OpenMates introduced an OpenAI-compatible chat API and achieved SDK parity for API key management and model selection.
    evidence:
      commits:
      - b0e5f07af
      - ef1f64028
      - aff5a1f13
      - a94a9a2d3
    release_status: dev_only
  - text: New embed surfaces for 3D models were added, including fullscreen and preview components to improve the visualization
      experience.
    evidence:
      commits:
      - a19eb1f11
      - 93d9519c0
      - 773a2fa9e
      - d5aae10cb
    release_status: dev_only
  - text: Foundational support for account data portability was introduced, including encrypted web archive flows and export
      redaction.
    evidence:
      commits:
      - 6792664a0
      - c16997acf
      - ce08dd182
    release_status: dev_only
  - text: A local connector for Proton Bridge was added to the CLI, enabling secure mail integration for users on supported
      plans.
    evidence:
      commits:
      - e5de6fa73
      - b9966a53a
      - 7c3573a82
    release_status: dev_only
  - text: Design icon search capabilities were integrated into the platform, supporting native downloads and SVG previews.
    evidence:
      commits:
      - 7e396a73f
      - 1097daaf9
      - da51dc2ec
      - 4cbca44e6
    release_status: dev_only
  - text: Encrypted audio drafts were added to the IdeaBucket, allowing users to save and unwrap voice-based thoughts within
      the editor.
    evidence:
      commits:
      - e418cdde5
      - 749d0fc6f
      - b448d48b3
    release_status: dev_only
  bug_fixes:
  - text: The chat recovery system underwent a comprehensive overhaul to improve session resilience, including better job
      discovery on final streams and lease release on logout.
    evidence:
      commits:
      - 4b0d05a6b
      - 2b4566115
      - 75ed6baa9
      - 1341e4a21
      - a44b779e0
      - b6db66008
      - 4dc531185
      - 3997b47fa
      - f1295f340
      - 0365a441c
      - cdce04ef4
      - 4dc6d8f66
    release_status: dev_only
  - text: OpenMates addressed UI stability issues within the signup flow and sidebar components, alongside fixes for chat
      deep-link retries.
    evidence:
      commits:
      - 9e8fbe55b
      - 2e220c7ba
      - ebd785b28
      - 0bb56c466
      - d81b4433a
      - f31ed369e
    release_status: dev_only
  - text: Metadata synchronization for active chats was refined to prevent stale headers and ensure live title updates are
      broadcast correctly.
    evidence:
      commits:
      - ba3cd1d1f
      - 3401bdc7d
      - 5f572bfa7
      - 7218f0af9
      - 10ecaf439
    release_status: dev_only
  - text: The project restored SightEngine scanning for uploads and resolved input issues for 3D model processing.
    evidence:
      commits:
      - 216edbc3f
      - 3ca3c9dd6
      - 4cbc373b4
    release_status: dev_only
  - text: Security workflows were updated to require recent passkey proof for account deletion and to allow more granular
      control over OTP 2FA.
    evidence:
      commits:
      - 818338f13
      - 06fe77776
      - 2d6c53321
      - b20306a1e
    release_status: dev_only
  - text: Draft chat management was improved with better caching, tombstoning of deleted drafts, and more reliable hydration
      during search.
    evidence:
      commits:
      - d6ae8348f
      - 80fe79cc0
      - fb726b658
      - 7d22c5706
      - 90e7ac9bd
      - 8e6140df2
    release_status: dev_only
  - text: Account export logic was hardened to redact sensitive key wrappers and ensure secret fields match exactly during
      the export process.
    evidence:
      commits:
      - ce08dd182
      - d084297f8
      - 65c88cbe5
    release_status: dev_only
  - text: Handling of public design icons and image authenticity metadata was corrected to allow previews without unnecessary
      credential requirements.
    evidence:
      commits:
      - 074d766a8
      - 9768d4ad6
      - 0c4450be6
      - b5eb55a1a
    release_status: dev_only
  unreleased_progress:
  - text: Development of the Workflows platform continued with the addition of a CLI runtime, TUI graph tabs, and background
      task routing via Celery.
    evidence:
      commits:
      - dc669853e
      - 2d59e96b0
      - 934f79115
      - d8f0f701d
      - 3419f0269
      - e2d203c54
      - e0638d20e
      - 2d265accd
      - fe0d08762
    release_status: dev_only
  - text: Teams V1 support is being staged in the CLI and SDK, including encrypted invite handling and credit facades.
    evidence:
      commits:
      - 6d3e891b8
      - cfe919a6c
      - d5ef5b21b
    release_status: dev_only
  - text: Tasks V1 integration progressed with new main-processor tools and the ability to surface workflow runs on task boards.
    evidence:
      commits:
      - d62ae8800
      - b80bce5e1
      - 97ea2d3a5
    release_status: dev_only
  - text: Apple platform parity work focused on unifying embed fullscreen routing and stabilizing chat rendering across iOS
      and macOS.
    evidence:
      commits:
      - 41604acc2
      - 9cc06f642
      - 6cdeba971
      - 715306af7
      - 147cb95b4
    release_status: dev_only
  - text: Apple Watch support was advanced with remote message initializers and embed preview rendering for archived chats.
    evidence:
      commits:
      - a35dd0fa7
      - 99803eb49
      - e30e40783
      - 2a4045d95
    release_status: dev_only
  - text: The project is staging task and workflow app embeds to allow explicit app-skill mentions within chat sessions.
    evidence:
      commits:
      - 6d84564c7
      - 1676503ee
      - fe9012b2e
      - 2523aa8f2
    release_status: dev_only
  internal_progress:
  - text: Internal efforts focused on stabilizing the nightly regression suite, improving Playwright test reliability, and
      refining chat synchronization logic.
    evidence:
      commits:
      - 46d084480
      - 1ca2ce369
