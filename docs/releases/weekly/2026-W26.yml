llm_summary:
  overview: OpenMates focused on developer parity, core interface improvements, and chat reliability this week. Key highlights
    include achieving full parity between the SDK and CLI, the introduction of a new CLI Terminal User Interface, and the
    launch of a Politics focus mode. The update also refined shared chat visibility, enhanced Focus Mode indicators, and resolved
    several reliability issues in AI streaming, webhook encryption, and guest onboarding.
  released_changes:
  - text: OpenMates achieved full parity between the SDK and CLI surfaces, including normalized chat responses and memory
      type routing through the apps API.
    evidence:
      commits:
      - e17cfdf03
      - 0c0880d48
      - 5d4475623
      - 83d4711f8
      - 5a03100fb
    release_status: released_main
  - text: The CLI now features a Terminal User Interface (TUI) and supports typed guest interests.
    evidence:
      commits:
      - 83d2504fc
    release_status: released_main
  - text: A new Politics focus mode was added, featuring specialized skills for preparing discussions.
    evidence:
      commits:
      - 999b870fc
      - 088d03c5f
    release_status: released_main
  - text: Shared chats are now more visible with new indicators and labeling in the continue carousel for guests.
    evidence:
      commits:
      - 448eb1a09
      - baf314012
      - 371ffa774
    release_status: released_main
  - text: Mindmap embeds received visual rendering updates, including improved preview titles and icons.
    evidence:
      commits:
      - 048fd084b
      - a5472441b
    release_status: released_main
  - text: Webhook chat encryption keys are now persisted to ensure secure communication continuity.
    evidence:
      commits:
      - 81db88946
    release_status: released_main
  - text: Focus Mode visibility was enhanced with live badges in the chat row and active chat view.
    evidence:
      commits:
      - 75822e8b3
      - ee70c09d2
      - 9b345bb88
    release_status: released_main
  - text: The guest experience was refined with polished onboarding UI, better language detection, and corrected desktop banner
      sizing.
    evidence:
      commits:
      - 3635d5b7f
      - 922d6cf5a
    release_status: released_main
  - text: Chat reliability was improved by restoring cancelled drafts, localizing fork actions, and settling locales before
      processing deep links.
    evidence:
      commits:
      - 8b5916b39
      - ef63a0b78
      - 0b135c958
    release_status: released_main
  - text: Search embeds for weather, travel, and web results received stability updates to ensure consistent rendering.
    evidence:
      commits:
      - 1db2db282
    release_status: released_main
  bug_fixes:
  - text: OpenMates now recovers from malformed Gemini stream failures to ensure chat continuity.
    evidence:
      commits:
      - e9cd8fc3b
    release_status: released_main
  - text: Audio transcription now supports custom routing and improved ASCII sanitization.
    evidence:
      commits:
      - b1865b199
    release_status: released_main
  - text: Daily inspirations now include a content filter to block company promotions and specific keywords.
    evidence:
      commits:
      - f4e22dab2
    release_status: released_main
  - text: Authenticated issue reports now correctly include the user contact email.
    evidence:
      commits:
      - 9c126e423
    release_status: released_main
  - text: API key device verification now uses direct ownership checks for improved security.
    evidence:
      commits:
      - e1869f955
    release_status: released_main
  - text: Interactive questions received several fixes for embed reference handling and attachment during streaming.
    evidence:
      commits:
      - d3518ad2e
      - a2219a590
      - 8204f3690
    release_status: released_main
  - text: SDK CLI failures related to webhook parity and API key authentication were resolved.
    evidence:
      commits:
      - 868c16fb2
    release_status: released_main
  - text: The daily inspiration banner no longer enters infinite retry loops for guest users or immediately after login.
    evidence:
      commits:
      - fac000894
      - f8ef83e39
    release_status: released_main
  - text: WebSocket authorization is now verified before logout to ensure session security.
    evidence:
      commits:
      - cd05160b3
    release_status: released_main
  - text: API key device approval errors are now preserved to provide better feedback during authentication failures.
    evidence:
