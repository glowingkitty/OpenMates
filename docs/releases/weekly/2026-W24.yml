llm_summary:
  overview: OpenMates reached a milestone this week with the release of v0.12, introducing significant new capabilities including
    a weather rain radar and a transition to Edamam for nutrition data. The project focused heavily on chat scalability, durable
    sharing workflows, and a new content embed catalog. AI model support was also expanded with the addition of Kimi K2.7
    Code, while the core UX was refined through improved paste recovery and sidebar management.
  released_changes:
  - text: OpenMates added a weather rain radar skill, allowing users to view real-time precipitation data via the Bright Sky
      provider.
    evidence:
      commits:
      - bb069b142
    release_status: released_main
  - text: The nutrition app now utilizes Edamam for recipe searches, featuring updated fullscreen and preview embeds.
    evidence:
      commits:
      - adf726d84
      - 3746055f5
      - ab6360c88
      - eec48133b
    release_status: released_main
  - text: Durable share short links were implemented for chats, complemented by dynamic Open Graph previews featuring message
      bubbles and custom typography.
    evidence:
      commits:
      - 41faec7db
      - 8e2fecfb7
      - 3e404b3a7
      - 3966c90f6
    release_status: released_main
  - text: A content embed catalog was added to settings, providing live examples of how the platform handles audio, code,
      maps, and other media.
    evidence:
      commits:
      - 8d076440f
      - 3e667ad57
      - 7ac8aca03
      - f4b843df8
    release_status: released_main
  - text: OpenMates implemented scalable chat loading and compound window cursors to improve performance when opening large
      conversations.
    evidence:
      commits:
      - a6573cbd7
      - cc6351179
    release_status: released_main
  - text: Application previews now automatically start upon generation, streamlining the code-to-preview workflow.
    evidence:
      commits:
      - fb578aee9
    release_status: released_main
  - text: The Kimi K2.7 Code model was added to the platform's available AI models.
    evidence:
      commits:
      - 1d5ba2de6
    release_status: released_main
  - text: The sidebar now includes 'show more' controls for chat categories, providing better management of conversation history.
    evidence:
      commits:
      - c1063710e
    release_status: released_main
  - text: A free testing credits budget system was introduced with automated notifications and improved UI for tracking grants.
    evidence:
      commits:
      - e2ac23274
      - 91d503837
    release_status: released_main
  - text: A new GHCR self-host image mode was added, and the self-host edition now correctly hides payment status.
    evidence:
      commits:
      - 84604768d
      - 1d9d4e357
      - ad8d96839
    release_status: released_main
  bug_fixes:
  - text: The message input now defers paste recovery dismissal until the user begins editing, ensuring recovery chips remain
      available during automatic parser conversions.
    evidence:
      commits:
      - 953f7ffd8
      - b9200e8a4
      - f3ca91d28
    release_status: released_main
  - text: OpenMates resolved several issues with chat sharing, including ownership race conditions, metadata timing, and crawler
      routing.
    evidence:
      commits:
      - b2a51f186
      - 7b6ed8d81
      - d629ba26d
      - a4a7bd001
    release_status: released_main
  - text: A series of updates resolved race conditions and timing issues when sending draft chats, ensuring editor state is
      preserved.
    evidence:
      commits:
      - d922a3672
      - 0bc989a55
      - 6d3f0e2e9
      - f8ba9d82e
    release_status: released_main
  - text: Weather iconography was standardized using the meteocons package, and visual presentation was improved across daily
      and forecast embeds.
    evidence:
      commits:
      - f74ceef3e
      - 03246b875
    release_status: released_main
  - text: Search reliability was improved by persisting parent preview metadata and avoiding false 'no-results' states for
      legacy search.
    evidence:
      commits:
      - 3a84e8167
      - 11c93b528
      - 2d9fb638a
    release_status: released_main
  - text: Application previews were hardened through hostname isolation, stripping development-only HMR scripts, and preserving
      iframe origins.
    evidence:
      commits:
      - 99709fe58
      - 0893656b3
      - 973b76f04
      - 3c40b73bf
    release_status: released_main
  - text: Header navigation now correctly skips empty or draft-only chats when cycling through active conversations.
    evidence:
