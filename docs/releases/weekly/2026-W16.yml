llm_summary:
  overview: OpenMates introduced several major features this week, including a privacy-preserving Wikipedia inline link integration,
    SEPA bank transfer support, and end-to-end encrypted message highlights. The project also underwent a branding refresh,
    renaming the 'App Store' to 'Apps' and 'Settings & Memories' to 'Memories'. Visual polish was added to the onboarding
    experience with a new cinematic Ken-Burns slideshow, while the events system expanded to include the Berlin Philharmonic.
    Foundational work for native Apple platforms progressed significantly in the background, though those features remain
    unreleased.
  released_changes:
  - text: OpenMates implemented Wikipedia inline links with a privacy-preserving backend proxy that protects user IP addresses
      and includes differentiated rate limits.
    evidence:
      commits:
      - ab832b2f7
      - 17990ec7f
      - f08e2bde5
      - 136d2a44e
      - 4b02fa48b
