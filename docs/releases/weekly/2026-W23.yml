    release_status: released_main
  - text: Development began on a unified notification event system to support real-time updates and push notifications on
      Apple platforms.
    evidence:
      commits:
      - 34669e142
    release_status: released_main
  - text: The projects and tasks platforms received updates to workspace navigation and shell alignment, though these features
      remain disabled.
    evidence:
      commits:
      - 09ec7d8e5
      - 91e88f2d0
      - aa5147ba2
      - 6f5558ea4
    release_status: released_main
  - text: Initial development of application embed live previews, including backend task runners and frontend renderers, is
      underway.
    evidence:
      commits:
      - e3243f6ef
    release_status: released_main
  - text: A new internal Linear API CLI was introduced to streamline task management and credential handling.
    evidence:
      commits:
      - 360ce3448
      - 4af58d03e
      - 4a97ee18a
    release_status: released_main
  - text: Infrastructure for automatically fixing failed tests was expanded with session isolation and retry logic for developer
      workflows.
    evidence:
      commits:
      - 710393b28
      - cabcc3699
      - 841cdf7c7
      - 59d841418
      - 63faab728
      - 13349f8e1
      - 592734a47
      - a62ff9099
      - f5a4ac583
    release_status: released_main
  - text: An internal Discord digest was added for reporting degraded services and system health.
    evidence:
      commits:
      - '601499634'
    release_status: released_main
  - text: Internal workflows for user guide reviews and admin notifications for documentation updates were introduced.
    evidence:
      commits:
      - 3a58a6271
      - dee4a13f4
      - d533d00ae
    release_status: released_main
  internal_progress:
  - text: Docker port exposure was restricted to improve environment security for self-hosted installations.
    evidence:
      commits:
      - f7180da5f
    release_status: released_main
  - text: SwiftLint workflows were integrated to automate code quality checks for Apple-related codebases.
    evidence:
      commits:
      - d6efbafd2
    release_status: released_main
  - text: Core dependencies were updated, including @sveltejs/kit, vitest, and aiohttp, to address security advisories and
      improve stability.
    evidence:
      commits:
      - d791fbeb3
      - 33d5d421d
      - 337bdc168
    release_status: released_main
  - text: Infrastructure for self-hosted installations was hardened with a new smoke test suite covering browser sessions,
      admin promotion, and startup reliability.
    evidence:
      commits:
      - 24d791d85
      - 32fca5de7
      - 72433d032
      - 75f6a944e
      - 1f23125c8
      - 17041e55a
      - 5c3f910b0
      - e89396b09
    release_status: released_main
  - text: Backend healthchecks were updated to use Directus ping and configured database credentials for more accurate service
      monitoring.
    evidence:
      commits:
      - 5fbd457c9
      - fc464ec92
      - 5ead61303
      - d3c26adcc
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: New Weather Forecast skill with interactive daily drilldowns.
      evidence:
        commits:
        - a26752a67
        - 9f7aeb20c
      reason: A significant new user-facing capability with visual components and interactive drilldowns.
    - text: 'Explain in New Chat: Highlight any message text to start a focused clarification conversation.'
      evidence:
        commits:
        - 2fb4ffbfd
        - 41013cd8b
      reason: New user-facing interaction for chat clarification and context management.
    - text: 'Flexible Self-Host Signups: New support for invite-only and email-based registration modes on private instances.'
      evidence:
        commits:
        - 5ebb4f703
      reason: Significant update for the self-hosting community, adding flexible registration modes.
    - text: New example chats for app skills.
      evidence:
        commits:
        - 27f6e8775
      reason: Provides a visual way for users to understand app capabilities through practical demonstrations.
    - text: CLI settings parity and predefined commands.
      evidence:
        commits:
        - 76735f92a
        - 7343eec58
      reason: Significant expansion of CLI capabilities for power users and developers.
    - text: Enhanced sub-chat orchestration with fanout approval and sequential stop handling.
      evidence:
        commits:
        - '612705468'
        - 1bcd5dd98
      reason: Improves the core AI orchestration experience for complex tasks.
    - text: GPN and Congress event schedule search.
      evidence:
        commits:
        - 5a68b4abb
      reason: New user-facing search capability for major tech events.
    - text: Automated documentation claims verification.
      evidence:
        commits:
        - 75124fa6b
      reason: Introduces a robust way to ensure user-facing documentation remains accurate against the codebase.
    - text: Weekly accessibility audit emails.
      evidence:
        commits:
        - 8a7ede09f
      reason: New automated reporting feature for accessibility compliance.
    - text: Optimized route loading for the documentation web application.
      evidence:
        commits:
        - 2e9849b80
      reason: Significant performance improvement for the documentation platform.
    exclude:
    - text: Apple platform parity features (iOS/macOS).
      evidence:
