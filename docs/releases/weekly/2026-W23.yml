llm_summary:
  overview: This week, OpenMates delivered a suite of new user-facing capabilities, including a Weather Forecast skill with
    interactive drilldowns and an 'Explain in new chat' feature for focused message clarification. Significant progress was
    made on self-hosting flexibility with new signup modes, while system reliability was bolstered through a new documentation
    claims verification system and enhanced skill execution resilience. Power users also benefit from expanded CLI settings
    parity and new event search providers for major tech conferences.
  released_changes:
  - text: OpenMates added a Weather Forecast skill, allowing users to view forecasts and drill down into specific daily details
      with interactive cards.
    evidence:
      commits:
      - a26752a67
      - 9f7aeb20c
    release_status: released_main
  - text: A new 'Explain in new chat' action was introduced, allowing users to fork a conversation from a specific highlighted
      message for focused clarification.
    evidence:
      commits:
      - 2fb4ffbfd
      - 41013cd8b
    release_status: released_main
  - text: New signup modes for self-hosted instances now support invite codes and various authentication requirements for
      private registration.
    evidence:
      commits:
      - 5ebb4f703
    release_status: released_main
  - text: Example chats were added to app skill details, providing practical demonstrations of how specific skills function
      within the ecosystem.
    evidence:
      commits:
      - 27f6e8775
    release_status: released_main
  - text: The OpenMates CLI now features expanded settings parity with the web interface and new predefined commands for configuration
      management.
    evidence:
      commits:
      - 76735f92a
      - 7343eec58
    release_status: released_main
  - text: Sub-chat orchestration was enhanced with fanout approval and sequential stop handling for more controlled AI delegation.
    evidence:
      commits:
      - '612705468'
      - 1bcd5dd98
    release_status: released_main
  - text: A new event search provider was added to support searching schedules for major tech events like GPN and Congress.
    evidence:
      commits:
      - 5a68b4abb
    release_status: released_main
  - text: A new verification system now automatically checks documentation claims against the codebase to ensure the user
      guide remains accurate.
    evidence:
      commits:
      - 75124fa6b
    release_status: released_main
  - text: Automated weekly accessibility audit emails were implemented to track and report on UI compliance.
    evidence:
      commits:
      - 8a7ede09f
    release_status: released_main
  - text: Route loading for the documentation web application was optimized to improve navigation speed and performance.
    evidence:
      commits:
      - 2e9849b80
    release_status: released_main
  bug_fixes:
  - text: The weather embed experience was significantly stabilized with fixes for empty result filtering, normalized child
      preview structures, and restored interactions when opening day views from a forecast.
    evidence:
      commits:
      - f1d3d39bb
      - 1663f2505
      - 39d5877c8
      - ad9be9b6f
      - 0d66ca1c7
      - e9359a6d5
      - 4451ee9ab
    release_status: released_main
  - text: Authentication responses were hardened to prevent account enumeration, improving the security of the login flow.
    evidence:
      commits:
      - 59f63f60d
    release_status: released_main
  - text: Data portability was improved by ensuring imported chats are correctly indexed, cached, and included in account
      export manifests.
    evidence:
      commits:
      - c803769b1
      - 364323bb9
      - a83ab7b86
    release_status: released_main
  - text: Skill execution resilience was enhanced to ensure that malformed items within a batch do not block valid requests
      or results.
    evidence:
      commits:
      - 2d39d7463
      - a93737971
    release_status: released_main
  - text: Mobile UI refinements for chat message selection now ensure the selection toolbar remains within the viewport and
      guard the explain action on shared chats.
    evidence:
      commits:
      - '681860336'
      - d5ad431bb
    release_status: released_main
  - text: Sub-chats are now strictly scoped to their parent chats, and the synchronization of sub-chat previews has been optimized
      to prevent unnecessary network traffic.
    evidence:
      commits:
      - 2d5ded51c
      - 6904f92d1
    release_status: released_main
  - text: CLI file upload stability was improved by ensuring origin headers are sent and stabilizing success signals for image
      embed persistence.
    evidence:
      commits:
      - a68ceab76
      - 135110c9c
      - 0b36c3b13
      - 6a5d4038e
    release_status: released_main
  - text: Empty guest memory categories are now hidden in the settings view to streamline the experience for unauthenticated
      users.
    evidence:
      commits:
      - 5cd45e318
    release_status: released_main
  - text: A regression in the signup flow for users in the EU was resolved to ensure consistent account creation.
    evidence:
      commits:
      - f1b284ab7
    release_status: released_main
  - text: Image result embeds are now correctly grouped within the chat interface for better visual organization.
    evidence:
      commits:
      - 47c7dc345
    release_status: released_main
  unreleased_progress:
  - text: Progress on the unreleased iOS and macOS platforms included native offline prefetch sync, mention dropdowns, composer
      previews, and audio recording parity.
    evidence:
      commits:
      - 167ac38c0
      - dbb440c3f
