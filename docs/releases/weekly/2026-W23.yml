    rationale: The recommended items focus on major user-facing features like the Weather skill, chat clarification tools,
      and self-hosting improvements. Disabled platforms (Apple, Projects, Tasks) and unreleased application previews are excluded
      to ensure communication remains relevant to current users.
  social_video_recommendations:
  - idea: Showcase the new Weather Forecast skill by asking for a weekly outlook and demonstrating the interactive daily drilldown
      cards.
    priority: high
    reason: The weather skill is highly visual and demonstrates the project's ability to integrate real-time data into interactive
      UI components.
    evidence:
      commits:
      - a26752a67
      - f2dc454c8
  - idea: Demonstrate the 'Explain in new chat' workflow to show how OpenMates handles context and clarification.
    priority: high
    reason: It is a concrete, visual productivity feature that shows how OpenMates handles context.
    evidence:
      commits:
      - 2fb4ffbfd
      - 41013cd8b
  - idea: A short clip showing how to browse app skills and clicking into the new example chats to see them in action.
    priority: medium
    reason: This helps users understand the value of different apps within the ecosystem through visual discovery.
    evidence:
