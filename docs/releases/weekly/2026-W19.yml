llm_summary:
  overview: OpenMates introduced a major expansion of its memory system, allowing users to save interactive results from various
    apps directly to their personal knowledge base. The update also brought significant new integrations, including GitHub
    repository searching, real-time travel status, and native DOCX document generation, alongside extensive security hardening
    and mobile UI refinements.
  released_changes:
  - text: Users can now save interactive results from the Events, Health, Home, Reminder, and Travel apps directly into their
      personal memories.
    evidence:
      commits:
      - 7c464aa37
    release_status: released_main
  - text: A new code repository search skill and rich GitHub repository embeds allow for finding and previewing repositories
      within the chat.
    evidence:
      commits:
      - 46dfb56f6
      - 3fd120968
    release_status: released_main
  - text: Travel connection and search embeds now display real-time train status for DB connections.
    evidence:
      commits:
      - 1347f5710
    release_status: released_main
  - text: Event embeds now support calendar downloads, enabling users to export event details to personal calendars.
    evidence:
      commits:
      - bff6c0589
    release_status: released_main
  - text: The document generation system now produces real DOCX artifacts instead of simple text representations.
    evidence:
      commits:
      - 8ced9d773
    release_status: released_main
  - text: The web application now synchronizes the Safari browser chrome tint with the active app theme on iOS.
    evidence:
      commits:
      - 88642c5a6
      - 209eccfc1
    release_status: released_main
  - text: A GitHub repository button was added to the application header for easier access to the project source.
    evidence:
      commits:
      - 1b826f503
    release_status: released_main
  - text: Grouped embeds now support touch swipes, improving navigation on mobile devices.
    evidence:
      commits:
      - 96e1f7bc8
    release_status: released_main
  - text: Source-backed URL safety processing was added to the AI message pipeline, including normalization and updated safety
      documentation.
    evidence:
      commits:
      - 42241a5d4
    release_status: released_main
  - text: Account deletion reminder emails now include an announcement video.
    evidence:
      commits:
      - '320255205'
    release_status: released_main
  bug_fixes:
  - text: Security-sensitive fulfillment and reauthentication processes were hardened to improve account safety.
    evidence:
      commits:
      - ec7f6b011
    release_status: released_main
  - text: Passkey autofill now triggers before focusing the login input for a smoother authentication experience.
    evidence:
      commits:
      - 347d120e5
    release_status: released_main
  - text: The 2FA reconnection flow now correctly restores verification steps during account recovery.
    evidence:
      commits:
      - b5aaf7f73
    release_status: released_main
  - text: A crash that occurred when using back navigation during the signup process was resolved.
    evidence:
      commits:
      - 319890f0f
    release_status: released_main
  - text: The OpenMates CLI now handles rate limits more gracefully during settings updates and memory exports.
    evidence:
      commits:
      - 8e6311305
      - 793011e15
    release_status: released_main
  - text: The web application now correctly rejects and handles stale shared chat links.
    evidence:
      commits:
      - 2911b6461
    release_status: released_main
  - text: Internal app skill placeholders are now stripped from final AI response text to ensure cleaner output.
    evidence:
      commits:
      - a8070a931
    release_status: released_main
  - text: The reminder details view in settings now correctly displays the target chat associated with an active reminder.
    evidence:
      commits:
      - aa40ba1fb
    release_status: released_main
  - text: Fullscreen embeds and content chunks are now recoverable following network or load failures.
    evidence:
      commits:
      - 413418f13
      - e700a636d
    release_status: released_main
  unreleased_progress:
