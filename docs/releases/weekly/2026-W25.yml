llm_summary:
  overview: OpenMates introduced a comprehensive foundation for Calendar integration and connected account management, including
    granular permission controls, operation receipts, and undo/cancel capabilities. The update also launched an anonymous
    usage tier across Web and CLI, overhauled the guest onboarding experience with dynamic interest selection, and expanded
    technical visualization with PCB schematic generation. Security was a major focus, with the implementation of universal
    ASCII-smuggling guards and hardened session management.
  released_changes:
  - text: OpenMates added a robust Calendar and connected account system. This includes Google Calendar OAuth support, granular
      permission selection, operation journals, and 'receipts' in the chat that allow users to see, undo, or cancel actions
      taken by the AI.
    evidence:
      commits:
      - 275f1c292
      - 2662b0a3c
      - f0a384f3b
      - 486231b74
