      - dd5f11baf
      - 71c51571c
      - c9f3c7b98
      - d34ed0fa2
      - 3fb369186
    release_status: released_main
  - text: Anonymous usage is now supported via CLI inference and persistent web chat sessions, managed through new admin settings
      for session budgets.
