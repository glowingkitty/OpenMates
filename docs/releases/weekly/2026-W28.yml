llm_summary:
  overview: OpenMates focused on expanding assistant utility and hardening core infrastructure this week. Key highlights include
    the introduction of foreground-aware notifications, the launch of Urban Sports fitness search, and new product discovery
    videos. Significant progress was made on the CLI with self-update capabilities and more robust self-hosting backups. While
    extensive development continued on the Apple Watch, iOS, and macOS platforms—including a unified message composer and
    chat recovery protocols—these features remain unreleased under current configuration gates.
  released_changes:
  - text: OpenMates now supports foreground-aware notifications, allowing the system to suppress push alerts if the user is
      already active in the relevant chat.
    evidence:
      commits:
      - 71148ee87
    release_status: released_main
  - text: The project now supports Urban Sports fitness search, allowing users to find classes and locations via flat runtime
      arguments.
    evidence:
      commits:
      - '784198697'
      - aba6bab65
      - a16fb3474
      - c9fb3496b
    release_status: released_main
  - text: Daily inspiration product videos were added to the web application to highlight features like PII detection and
      image search.
    evidence:
      commits:
      - 911f4b92e
    release_status: released_main
  - text: The OpenMates CLI now supports self-update commands and a dedicated support command for easier maintenance.
    evidence:
      commits:
      - 11cfbf248
      - 867d10c48
    release_status: released_main
  - text: CLI self-hosting infrastructure was hardened with more robust backup handling and checksum verification.
    evidence:
      commits:
      - f305b3975
    release_status: released_main
  - text: Anonymous chat sessions are now more resilient, ensuring history is correctly hydrated and restored after browser
      reloads.
    evidence:
      commits:
      - 4798ee1be
      - 6b692d113
      - f8aadbed9
      - 3307b804b
    release_status: released_main
  - text: Usage tracking in settings now explicitly identifies and tags activity generated via Apple shortcuts for better
      billing transparency.
    evidence:
      commits:
      - d320dfa33
    release_status: released_main
