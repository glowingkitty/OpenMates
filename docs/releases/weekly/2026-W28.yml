unreleased_progress:
  dev_only: []
  unknown_release_status: []
risks:
  communication:
  - Use weekly themes for PR/release/newsletter drafting; do not list every daily item one-by-one.
  - Keep dev_only and unknown_release_status items out of public newsletters until released on main.
sources:
  daily_files:
  - /home/superdev/projects/OpenMates/docs/releases/daily/2026-07-06.yml
  - /home/superdev/projects/OpenMates/docs/releases/daily/2026-07-07.yml
  - /home/superdev/projects/OpenMates/docs/releases/daily/2026-07-08.yml
  - /home/superdev/projects/OpenMates/docs/releases/daily/2026-07-09.yml
llm_summary:
  overview: OpenMates introduced foreground-aware notifications to suppress redundant alerts and significantly expanded its
    assistant skills with Urban Sports fitness search and a major overhaul of health appointment filtering. The week also
    saw the introduction of CLI self-update commands and hardened self-hosting backups. While substantial progress was made
    on Apple Watch support and a unified message composer for Apple platforms, these features remain unreleased under current
    configuration gates.
  released_changes:
  - text: OpenMates now supports foreground-aware notifications, allowing the system to suppress push alerts if the user is
      already active in the relevant chat.
    evidence:
      commits:
      - 71148ee87
    release_status: released_main
  - text: The project now supports Urban Sports fitness search, enabling users to find classes and locations via flat runtime
      arguments.
    evidence:
      commits:
      - '784198697'
      - aba6bab65
      - a16fb3474
      - c9fb3496b
    release_status: released_main
  - text: The OpenMates CLI now supports self-update commands and a dedicated support command for easier maintenance.
    evidence:
      commits:
      - 11cfbf248
      - 867d10c48
    release_status: released_main
  - text: Daily inspiration product videos were added to the web application to highlight features like PII detection and
      image search.
    evidence:
      commits:
      - 911f4b92e
    release_status: released_main
  - text: Usage tracking in settings now explicitly identifies and tags activity generated via Apple shortcuts for better
      billing transparency.
    evidence:
      commits:
      - d320dfa33
    release_status: released_main
  - text: Package listings for SDKs are now linked directly from the settings footer for easier developer access.
    evidence:
      commits:
      - 6b4892fea
    release_status: released_main
  - text: The CLI now allows for managing backend-only server updates, providing more flexibility for environment maintenance.
    evidence:
      commits:
      - ab7addc9b
    release_status: released_main
  bug_fixes:
  - text: The health appointment search skill received a comprehensive logic overhaul to filter irrelevant motives, noise
      from specific providers like Doctolib and Jameda, and mismatched city data.
    evidence:
      commits:
      - d6f680aad
      - 7798fc76e
      - 62a5c1e25
      - f9321381b
      - 079f7e755
      - 6a6f7d082
      - 80fc7c6eb
      - a73588410
      - 300961d48
      - 00015cd70
      - f3e1d2a2c
      - 1adfa325d
      - 41b38db99
    release_status: released_main
  - text: Anonymous chat sessions are now more resilient, with fixes ensuring history is correctly hydrated and restored after
      browser reloads.
    evidence:
      commits:
      - 4798ee1be
      - 6b692d113
      - f8aadbed9
      - 3307b804b
    release_status: released_main
  - text: Issues with header navigation were resolved where authenticated actions and settings controls would occasionally
      become hidden or inaccessible.
    evidence:
      commits:
      - 3e6f2ab42
      - e54914057
    release_status: released_main
  - text: Project mention lookups were optimized to defer until the dropdown is opened and are now permitted during authenticated
      startup.
    evidence:
      commits:
      - 7608c8a6f
      - 11f925451
    release_status: released_main
  - text: The referral CTA label in settings was stabilized to prevent layout shifts on wide screen displays.
    evidence:
      commits:
      - ada5f3abe
    release_status: released_main
  - text: The OpenMates CLI now features hardened self-host backup logic to improve reliability during server planning and
      deployment.
    evidence:
      commits:
      - f305b3975
    release_status: released_main
  - text: Resolved issues with fitness embeds, including icon resolution, provider logo rendering, and search result routing
      for child search results.
    evidence:
      commits:
      - 0675c1138
      - d06226f2c
      - 8967260c5
    release_status: released_main
  unreleased_progress:
  - text: Development of the Apple Watch application continued with the addition of a chat runtime shell, QR-based pair login,
      and realtime sync sessions.
    evidence:
      commits:
      - 9a764915b
      - 52fbc5aff
      - c3881ac5a
      - 79d77ff73
      - 3688dfa86
      - f10a17426
      - 9ed1c7cc8
      - 2497982b9
      - e9089954b
    release_status: released_main
  - text: A unified message composer and a new Tiptap-based WebView composer were implemented for iOS and macOS to provide
      a consistent rich-text experience.
    evidence:
      commits:
      - 719cda95e
      - 30d480391
      - 0feb3b4b4
      - eca1bbe7d
      - b04573f3e
      - fc6d4b5f5
      - 523d40b11
    release_status: released_main
  - text: The workflow workspace now supports instant prefetching and improved editor state persistence for unreleased workflow
      features.
    evidence:
      commits:
      - 3af999140
      - 1014ca039
      - c42c65320
    release_status: released_main
  - text: Workflows, Tasks, and Plans features were hidden by default in the configuration while development continues.
    evidence:
      commits:
      - e944bb85d
      - 2faf8fed6
    release_status: released_main
  - text: Initial seams for an enhanced local PII detection model were added to the Apple platform targets.
    evidence:
      commits:
      - f02693d5c
      - e041a1e84
      - a51ddb225
    release_status: released_main
  - text: Performance metrics probes were introduced for iOS to monitor chat opening scalability and monitor performance.
    evidence:
      commits:
      - a0046d1de
      - 44eb7f0f5
      - 51839c11e
    release_status: released_main
  internal_progress:
  - text: The web application and CI test workflows migrated to the Node 24 runtime to align with modern deployment standards.
    evidence:
      commits:
      - def35b6ba
      - 85d7f6fbc
      - f96b844a0
      - e3099e135
    release_status: released_main
  - text: Deployment scripts were updated to handle Apple Watch targets and improve profile management for macOS TestFlight
      exports.
    evidence:
      commits:
      - 675f7592f
      - bc5468300
      - a72bf7e2d
      - 5a861c6a3
    release_status: released_main
  - text: Technical specifications were verified for Apple Watch support, fitness search, and foreground-aware notifications.
    evidence:
      commits:
      - 6c97a3694
      - 06822dec3
      - d59d4ba3c
      - a43449939
      - bc5abcb01
      - 41facc6b4
      - cc15774ef
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: Foreground-aware assistant notifications that suppress redundant alerts when a chat is already active.
      evidence:
        commits:
        - 71148ee87
      reason: This is a significant user-facing intelligence improvement for the web platform.
    - text: New Urban Sports fitness search support for finding classes and locations directly via the assistant.
      evidence:
        commits:
        - aba6bab65
        - a16fb3474
        - c9fb3496b
      reason: Expands the utility of the assistant for fitness-conscious users.
    - text: New CLI commands for self-updating and support, alongside startup reminders for self-hosted instances.
      evidence:
        commits:
        - 11cfbf248
        - 867d10c48
        - 527bad27f
      reason: Useful updates for developers and self-hosters using the CLI.
    - text: Daily inspiration product videos embedded in the web application to showcase features like PII detection.
      evidence:
        commits:
        - 911f4b92e
      reason: New content to help users discover core product features.
    - text: Detailed usage tracking for Apple shortcut interactions within billing settings.
      evidence:
        commits:
        - d320dfa33
      reason: Improves transparency for users utilizing Apple shortcuts.
    exclude:
    - text: Apple Watch integration, pair-login, and realtime sync sessions.
      evidence:
        commits:
        - 9a764915b
        - 52fbc5aff
        - c3881ac5a
        - 79d77ff73
        - 3688dfa86
      reason: Apple Watch support is currently a disabled feature.
    - text: Unified Apple message composer, Tiptap WebView integration, and voice recording refinements.
      evidence:
        commits:
        - 719cda95e
        - 30d480391
        - 0feb3b4b4
        - eca1bbe7d
      reason: iOS and macOS platforms are currently disabled features.
    - text: Workflow workspace prefetching and unfinished workspace management features.
      evidence:
        commits:
        - 3af999140
        - 1014ca039
        - e944bb85d
        - 2faf8fed6
      reason: Workflows, Tasks, and Plans are currently disabled features.
    rationale: The newsletter highlights released improvements to the web application, CLI, and core assistant skills (fitness
      and health) while excluding extensive work on the Apple Watch, iOS, and macOS platforms which remain disabled.
  social_video_recommendations:
  - idea: A walkthrough of the new Urban Sports fitness search, showing how to find yoga or fitness classes directly in the
      chat.
    priority: high
    reason: Fitness search is a concrete, high-value utility that is ready for public use.
    evidence:
      commits:
      - '784198697'
      - d06226f2c
  - idea: Demonstrate foreground-aware notifications by showing a mobile alert being suppressed when the user is active in
      the same chat on the web.
    priority: medium
    reason: Tangible demonstration of product intelligence and quality-of-life improvements.
    evidence:
      commits:
      - 71148ee87
  quality_notes:
  - The health skill filtering logic is exceptionally detailed, addressing many edge cases in provider data from Doctolib
    and Jameda.
  - The migration to Node 24 for web builds and CI ensures the project stays current with long-term support runtimes.
  - Extensive UI test coverage was added for the new unified composer components and anonymous session restoration.
  validation_warnings: []
