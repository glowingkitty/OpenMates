    release_status: released_main
  - text: Internal improvements were made to the serialization of mail and sheet draft embeds.
    evidence:
      commits:
      - 442c99eb6
    release_status: released_main
  internal_progress:
  - text: The project alpha version was bumped to v0.11.
    evidence:
      commits:
      - 126928ab5
    release_status: released_main
  - text: Upgraded several npm packages to address security vulnerabilities.
    evidence:
      commits:
      - 25492bbea
    release_status: released_main
  - text: Extensive stabilization of the end-to-end test suite was performed, covering sub-chats, interactive questions, and
      security-critical signup flows.
    evidence:
      commits:
      - d3b32c7db
      - 399a2a402
      - 268685bcb
      - e7102221a
      - 7bb8cc3f4
    release_status: released_main
  - text: Development environment hooks were aligned for parity between Claude and OpenCode plugins.
    evidence:
      commits:
