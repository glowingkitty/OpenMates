      reason: Adds significant user control over AI image generation.
    - text: Interactive touch drawer dragging for mobile and tablet users.
      evidence:
        commits:
        - 429aabb81
      reason: Major improvement to the touch and tablet navigation experience.
    - text: Dynamic chat header image bubbles and backgrounds.
      evidence:
        commits:
        - 6c4ed9181
        - c4989e40e
        - 599f4a712
      reason: Highly visible UI update that improves the aesthetic appeal of the chat interface.
    exclude:
    - text: Native Apple platform updates including share extensions, notification replies, and embed parity.
      evidence:
        commits:
