        - 2d5a7c613
        - 32edeb8a5
      reason: iOS, macOS, and Apple Watch platforms are currently listed as disabled features.
    - text: Meetup email template and location preparation.
      evidence:
        commits:
        - 95d3a256b
        - 8a921a338
        - 0f89d7918
      reason: This involves internal preparation for a future event and is not yet user-facing.
    - text: Manual bank transfer approval scripts.
      evidence:
        commits:
        - a12d05518
      reason: This is an internal administrative tool not intended for end users.
    rationale: The newsletter highlights major AI model additions, significant travel search improvements, and a series of
      high-visibility UI refinements, while excluding internal tools and features for unreleased platforms.
  social_video_recommendations:
  - idea: Showcase the new DeepSeek V4 model in action within the OpenMates interface.
    priority: high
    reason: New model support is a high-interest feature for AI users.
    evidence:
      commits:
      - 6eaa21ff8
  - idea: A short clip demonstrating the smooth new touch drawer dragging followed by interacting with the new AI follow-up
      suggestions.
    priority: high
    reason: Shows concrete UI improvements and a new functional AI feature.
    evidence:
      commits:
      - 429aabb81
      - 43b99e6b8
  - idea: A short clip showing the chat header backgrounds and bubbles cycling as a user interacts with the search.
    priority: medium
    reason: The new cycling animations provide a visually engaging product story for social media.
    evidence:
      commits:
      - 6c4ed9181
      - c4989e40e
      - 599f4a712
      - 9d780084a
  quality_notes:
  - Significant focus on UI polish for the 'continue' carousel, chat header, and event previews.
  - Proactive sanitization of external data sources added to search skills.
  - Regression tests were expanded to ensure the stability of chat synchronization in edge cases.
  - Administrative data integrity was improved with the inclusion of bank transfer revenue in daily statistics.
