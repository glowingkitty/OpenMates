    release_status: released_main
  - text: Calendar integrations now feature normalized account context and improved skill embed rendering to prevent unnecessary
      permission waits.
    evidence:
      commits:
      - 22f02dd06
      - 6f3f26104
    release_status: released_main
  - text: Video source citations were polished with improved quote matching across timestamps, better highlighting, and clearer
      badge labeling.
