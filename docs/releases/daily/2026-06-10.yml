llm_summary:
  overview: OpenMates introduced durable share short links and a comprehensive set of memory example chats to help users understand
    AI personalization. The update also includes a new free testing credits budget system, CLI-based billing provisioning,
    and numerous refinements to chat reliability and application preview security.
  released_changes:
  - text: Added a library of memory example chats and integrated them into app pages to showcase how the AI learns from user
      interactions.
    evidence:
      commits:
      - c9306f45f
      - 6df1ebe18
    release_status: released_main
  - text: Implemented durable share short links for chats, providing more stable and permanent URLs for shared content.
    evidence:
      commits:
      - 41faec7db
    release_status: released_main
  - text: Introduced a free testing credits budget system with automated email notifications and improved UI for tracking
      credit grants.
    evidence:
      commits:
      - e2ac23274
      - 91d503837
    release_status: released_main
  - text: Enhanced the CLI with support for signup billing provisioning and the ability to execute code-run app-skills directly
      from the terminal.
    evidence:
      commits:
      - 72cc3a20d
      - d8b5a2b9f
    release_status: released_main
  - text: Improved the Jobs Career Insights focus mode with updated skill definitions and localized content.
    evidence:
      commits:
      - 145787c1e
    release_status: released_main
  - text: Updated the billing system to deliver gift cards immediately following bank-transfer confirmation.
    evidence:
      commits:
      - 6a3616a28
    release_status: released_main
  bug_fixes:
  - text: Resolved several issues with chat sharing, including ownership race conditions, metadata timing, and crawler routing,
      while adding a fallback for short-link storage failures.
    evidence:
      commits:
      - b2a51f186
      - 7b6ed8d81
      - d629ba26d
      - a4a7bd001
    release_status: released_main
  - text: Improved chat reliability by ensuring AI streams route correctly to senders, flushing queued embeds after sending,
      and preserving draft history during followup or interrupted chat creation.
    evidence:
      commits:
      - c0dba5e51
      - 77d8d6b1d
      - df87cca7f
      - 56d0d5100
    release_status: released_main
  - text: Refined the draft sending process to require chat keys and proper save acknowledgments without blocking security
      checks.
    evidence:
      commits:
      - cba8eee54
      - cf00fb8e2
      - a7fd18c4f
      - 90ecbba30
    release_status: released_main
  - text: Corrected visibility of cloud-only credits on self-hosted instances and registered missing server settings routes.
    evidence:
      commits:
      - 7fd8acae6
      - f1f90a1ae
    release_status: released_main
  - text: Hardened application previews by isolating them by hostname, stripping development-only HMR scripts, and preserving
      iframe origins.
    evidence:
      commits:
      - 99709fe58
      - 0893656b3
      - 973b76f04
      - 3c40b73bf
    release_status: released_main
  - text: Restored the Doctolib appointment provider, fixed weather forecast rendering in skill groups, and improved recovery
      for unresolved AI model overrides.
    evidence:
      commits:
      - 9b34bd118
      - d2cee83fc
      - c6e6d50e8
    release_status: released_main
  unreleased_progress:
  - text: Extensive work on Apple platform parity, including billing UI fixtures, sub-chat focus modes, app store settings
      drilldowns, and embed rendering fixes.
    evidence:
      commits:
      - 0892220bf
      - 4113204e5
      - 31d6852d9
      - e75941874
      - 84a49d6a3
      - 46fb27c58
      - 3c8716446
      - 8dd678545
      - fb9976a61
      - 082943812
      - 0d95b44a3
      - 434c52333
      - e71d0ff59
      - 529e67b84
    release_status: released_main
  - text: Redesigned the code execution fullscreen overlay for mobile and desktop platforms.
    evidence:
      commits:
      - 11645c638
    release_status: released_main
  - text: Updated metadata for the Jobs Career Insights focus mode.
    evidence:
      commits:
      - 145787c1e
    release_status: released_main
  internal_progress:
  - text: Automated translation updates for memory settings, billing, and legal documentation.
    evidence:
      commits:
      - 5168b4883
    release_status: released_main
  - text: Optimized Playwright CI workflows to improve log visibility, timebox runs, and preserve artifacts during signal
      exits.
    evidence:
      commits:
      - 892c7c7dc
      - 1364746ae
      - d98b20c64
      - d5b06400c
      - c97f4ade1
      - 00664509c
      - d041302b1
    release_status: released_main
  - text: Enforced a cleanup of documentation claims across architecture and user guides.
    evidence:
      commits:
      - 595dc6a9c
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: New memory example chats integrated into app pages to demonstrate AI personalization.
      evidence:
        commits:
        - c9306f45f
        - 6df1ebe18
      reason: New user-facing feature providing educational value for the Memory system.
    - text: Durable share short links for more reliable chat sharing.
      evidence:
        commits:
        - 41faec7db
      reason: Significant improvement to the sharing experience.
    - text: New free testing credits budget and improved promo visibility management.
      evidence:
        commits:
        - e2ac23274
        - 91d503837
      reason: Important update for users on the cloud platform.
    - text: CLI enhancements including signup billing provisioning and app-skill code execution.
      evidence:
        commits:
        - 72cc3a20d
        - d8b5a2b9f
      reason: Key features for the developer and power-user community.
    exclude:
    - text: Apple platform (iOS/macOS) parity updates and UI fixes.
      evidence:
        commits:
