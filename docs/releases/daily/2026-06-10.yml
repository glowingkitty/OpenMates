      reason: Marked as not user-facing.
    rationale: The update introduces significant user-facing improvements to the Memory system and sharing workflows, alongside
      critical billing infrastructure for cloud users. Apple-specific work is excluded as those platforms remain unreleased.
  social_video_recommendations:
  - idea: A walkthrough of the new Memory example chats.
    priority: high
    reason: Visually demonstrates how OpenMates personalizes the experience over time, which is a core product value.
    evidence:
      commits:
      - c9306f45f
      - 6df1ebe18
  - idea: Demonstrating the new durable sharing flow.
    priority: medium
    reason: Shows the ease of sharing AI conversations with others using the new short-link system.
