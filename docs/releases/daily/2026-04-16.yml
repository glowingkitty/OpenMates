llm_summary:
  overview: OpenMates introduced end-to-end encrypted message highlights, added support for Claude Opus 4.7, and deployed
    significant infrastructure for newsletter management and SEO-optimized announcements. The update also includes critical
    UI stability fixes for chat headers and security patches.
  released_changes:
  - text: Launched message highlights with end-to-end encryption. The feature includes a floating selection toolbar for touch
      devices, quote-based anchoring for reliability, and per-row storage.
    evidence:
      commits:
      - 19e0062b6
      - '301970372'
      - 7ab11aa2b
      - 8bcdb0c01
      - 43f7504fd
      - 80e1d112b
      - 912e2125a
      - fb035d477
      - 49bbbb4f3
    release_status: released_main
  - text: Added Claude Opus 4.7 as an available model.
    evidence:
      commits:
      - 52cfa6f7a
    release_status: released_main
  - text: Deployed a new newsletter pipeline including per-category opt-in toggles, Markdown-to-demo-chat publishing, and
      SEO-friendly routes for announcements and tips.
    evidence:
      commits:
      - 59ce4d70d
      - 63b9979b4
      - d2e0f21f4
      - e0d0cb067
    release_status: released_main
  - text: Updated the intro slideshow with locale-specific title frames (English and German), Ken Burns animation directions,
      and a dark background theme.
    evidence:
      commits:
      - 7dc3ef36d
      - 3cba10323
    release_status: released_main
  - text: Enabled deep linking to AI settings for unauthenticated users.
    evidence:
      commits:
      - 05403433a
    release_status: released_main
  - text: Added newsletter subscriber breakdowns to the administrative server statistics.
    evidence:
      commits:
      - cd55b58c8
    release_status: released_main
  bug_fixes:
  - text: Resolved several UI glitches in the chat header, including flickering, invisible content, and compositor layer issues
      that occurred after closing fullscreen embeds.
    evidence:
      commits:
      - 64cc3ec41
      - ae024a6f9
      - df41c0377
      - f5950189c
    release_status: released_main
  - text: Improved AI quote verification by broadening detection for non-canonical blockquote formats and normalizing typography
      to prevent false-positive stripping.
    evidence:
      commits:
      - 215b1f73a
      - 2ab31da0b
    release_status: released_main
  - text: Refined PII detection to require qualifier suffixes for tax ID keywords, reducing false positives.
    evidence:
      commits:
      - 0efbf371c
    release_status: released_main
  - text: Upgraded DOMPurify to version 3.4.0 to address a security vulnerability.
    evidence:
      commits:
      - fac833003
    release_status: released_main
  - text: Fixed a build error by restoring a missing settings component.
    evidence:
      commits:
      - 94e569217
    release_status: released_main
  unreleased_progress:
  - text: Internal work on per-provider training policy audits and privacy policy rendering logic.
    evidence:
      commits:
      - 8a6c1b889
      - 1219b1039
      - f221830fd
      - 0255d603b
    release_status: released_main
  - text: Development of deep link filtering for the All Apps view.
    evidence:
      commits:
      - eb8d3d30a
