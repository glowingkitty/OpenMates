llm_summary:
  overview: OpenMates introduced enhanced privacy controls for file embeds, streamlined the signup security process, and refined
    payment consent logic. The update also includes significant internal test stabilization and AI model routing improvements.
  released_changes:
  - text: Added draft embed PII controls and improved client-side support for file-based personally identifiable information.
    evidence:
      commits:
      - 79f0000dc
      - 0032e41ff
    release_status: released_main
  - text: Shortened the security setup process during user signup to improve onboarding speed.
    evidence:
      commits:
      - 5d84ffdad
    release_status: released_main
  - text: The chat interface now displays more announcement chats by default.
    evidence:
      commits:
      - 77cf112db
    release_status: released_main
  - text: Added a monitoring service for OpenRouter models to track availability and updates.
    evidence:
      commits:
      - d56f00cd5
    release_status: released_main
  bug_fixes:
  - text: Refined the purchase flow to ensure refund consent is correctly requested and remains visible during the first transaction
      in settings.
    evidence:
      commits:
      - 311daf937
      - 5d24b2e5f
      - b99cd1092
    release_status: released_main
  - text: Resolved an issue where client-side email encryption keys were not correctly passed during bank transfer payments.
    evidence:
      commits:
      - c76dc21b9
    release_status: released_main
  - text: Fixed logic for handling stale signup paths, ensuring users can correctly resume or complete registration after
      logging in.
    evidence:
      commits:
      - 0ae60dccc
      - 963e38e95
    release_status: released_main
  - text: Blocked Gemini model inference on uploaded images to prevent unsupported processing attempts.
    evidence:
      commits:
      - b5db1cb46
    release_status: released_main
  - text: Added specific test identifiers to the recovery key success message in security settings.
    evidence:
      commits:
      - d320a1e27
    release_status: released_main
  unreleased_progress:
  - text: Internal adjustments to AI provider routing for Claude Opus 4.8.
    evidence:
