      - c35a3c759
    release_status: released_main
  - text: Internal improvements to the serialization of mail and sheet draft embeds.
    evidence:
      commits:
      - 442c99eb6
    release_status: released_main
  - text: Refined internal cache state management for completed signup flows.
    evidence:
