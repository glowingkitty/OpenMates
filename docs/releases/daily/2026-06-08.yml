llm_summary:
  overview: OpenMates focused on chat scalability, application preview refinements, and self-hosting improvements. Key updates
    include the introduction of scalable chat loading, encrypted thumbnails for application previews, and a new GHCR-based
    self-hosting mode. The project also refreshed its library of example chats to include audio transcription and new app
    skill demonstrations.
  released_changes:
  - text: OpenMates implemented scalable chat loading and compound window cursors to improve performance when opening large
      conversations.
    evidence:
      commits:
      - a6573cbd7
      - cc6351179
    release_status: released_main
  - text: The application preview system now supports encrypted thumbnails, earlier preview emission during streaming, and
      improved asset path rewriting for better reliability.
    evidence:
      commits:
      - ea7172f71
      - c69ffe0cc
      - 31064b5b7
      - 23a56d6ef
      - f44902f9e
      - f34e533b9
      - 4f5f5c8fa
      - d45048da1
      - f5d4cefca
    release_status: released_main
  - text: A new GHCR self-host image mode was added, and the self-host edition now correctly hides payment status and allows
      local browser API calls.
    evidence:
      commits:
      - 84604768d
      - 1d9d4e357
      - ad8d96839
    release_status: released_main
  - text: The sidebar now includes 'show more' controls for chat categories, providing better management of conversation history.
    evidence:
      commits:
      - c1063710e
    release_status: released_main
  - text: The example chat library was expanded with audio transcription and new app skill cases, supported by a refactored
      shared facade for skill helpers.
    evidence:
      commits:
      - 181284bcd
      - 721e2c530
      - ee79a7d62
      - 47300c4a1
    release_status: released_main
  bug_fixes:
  - text: The header navigation now correctly skips empty or draft-only chats when cycling through active conversations.
    evidence:
      commits:
      - bf15e3791
      - edc4bc0eb
    release_status: released_main
  - text: The logout notification toast now includes a functional link to re-open the login dialog for users wishing to stay
      logged in.
    evidence:
      commits:
      - 3f0522193
    release_status: released_main
  - text: OpenMates CLI received several stability fixes, including improved file embed skill resolution and normalized example
      chat categories.
    evidence:
      commits:
      - 3652d626d
      - 7a5af98a3
      - 8698a719e
    release_status: released_main
  - text: Embed previews for events and images were updated to ensure they remain metadata-only for improved performance.
    evidence:
      commits:
      - 9facfbeee
    release_status: released_main
  - text: Resolved a race condition in mocked stream startup to ensure more reliable local development and testing.
    evidence:
      commits:
      - ff764a7a3
    release_status: released_main
  unreleased_progress:
  - text: Development continued on Apple platform parity, including fixes for chat opening windows and build verification
      for iOS and macOS.
    evidence:
      commits:
      - 9757be514
      - a21e9f939
      - 6f6ada5c4
      - ad146188c
    release_status: released_main
  - text: A new habit garden application example chat was added but is currently not enabled for public use.
    evidence:
      commits:
      - fb017df56
    release_status: released_main
  internal_progress:
  - text: Deterministic quality audits and guardrails were added to the CI pipeline to enforce code quality and prevent sensitive
      logging.
    evidence:
      commits:
      - 7a3afec8c
      - bd910c8f3
    release_status: released_main
  - text: Contract audit summary emails were clarified to provide better internal reporting on automated test runs.
    evidence:
      commits:
      - 6dd7b1e3c
    release_status: released_main
  - text: Self-host smoke tests were updated to retry on build failures and trigger automatically for vault setup changes.
    evidence:
      commits:
      - b504e2f9f
      - fa70be979
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: Scalable chat loading and compound window cursors for faster conversation retrieval.
      evidence:
        commits:
        - a6573cbd7
        - cc6351179
      reason: Significant performance improvement for chat loading and navigation.
    - text: Enhanced application previews with encrypted thumbnails, improved asset path rewriting, and integrated billing
        gating.
      evidence:
        commits:
        - ea7172f71
        - c69ffe0cc
        - 31064b5b7
        - 23a56d6ef
      reason: Major functional update to the code application preview system.
    - text: New GHCR self-host image mode and improved local browser API support for private instances.
      evidence:
        commits:
        - 84604768d
        - 1d9d4e357
        - ad8d96839
      reason: Key updates for the self-hosting community.
    - text: New sidebar category controls allowing users to expand or collapse chat groups.
      evidence:
        commits:
        - c1063710e
      reason: User-facing UI improvement for sidebar management.
    - text: Expanded library of example chats, including new audio transcription and app skill demonstrations.
      evidence:
        commits:
        - 181284bcd
        - 721e2c530
        - ee79a7d62
      reason: New content to demonstrate platform capabilities.
    exclude:
    - text: Apple platform parity and build verification updates.
      evidence:
        commits:
        - 9757be514
        - a21e9f939
        - 6f6ada5c4
        - ad146188c
      reason: iOS and macOS platforms are currently listed as disabled features.
    - text: Habit garden application example chat.
      evidence:
        commits:
        - fb017df56
      reason: This feature is marked as not user-facing.
    rationale: The update introduces significant performance enhancements for chat loading and major refinements to the application
      preview system. Self-hosting capabilities were also expanded with a new image mode. Work on Apple platforms remains
      excluded as those features are currently disabled.
  social_video_recommendations:
  - idea: Demonstrate the new application preview system.
    priority: high
    reason: The application preview system is a core differentiator for OpenMates, and the new encrypted thumbnails and faster
      emission provide a smooth visual experience.
    evidence:
      commits:
      - ea7172f71
      - c69ffe0cc
  - idea: Showcase the new sidebar category controls.
    priority: medium
    reason: A quick UI-focused clip showing how users can now organize and expand their chat categories in the sidebar.
    evidence:
      commits:
      - c1063710e
  quality_notes:
  - Build stability for self-hosted images was improved with automated retries in CI.
  - Deterministic quality audits were introduced to enforce stricter code quality standards.
  - Application preview reliability was hardened through extensive E2E test coverage and asset path fixes.
  validation_warnings: []
