      reason: Documentation-only change regarding privacy providers.
    rationale: The introduction of a code execution sandbox and the upgrade to Gemini 3.5 Flash represent major functional
      milestones for the platform. The addition of Stoffe.de expands the utility of the shopping assistant.
  social_video_recommendations:
