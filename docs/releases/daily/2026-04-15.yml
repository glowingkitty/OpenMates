llm_summary:
  overview: OpenMates introduced a cinematic visual refresh for the intro chat experience and refined Wikipedia integration
    to ensure higher link accuracy. The update also includes significant stability improvements for automated testing and
    security patches for backend dependencies.
  released_changes:
  - text: The intro-chat header now features a crossfading Ken-Burns slideshow with 12 high-quality WebP frames, replacing
      the previous autoplay video. This includes dramatic panning effects and optimized timing for a better first-impression
      experience.
    evidence:
      commits:
      - e0986cdf8
      - 48005eaeb
      - 183a7afe3
      - 4f8500c6b
      - 616db8623
      - c7fb20f05
    release_status: released_main
  - text: Onboarding auto-creation has been disabled to streamline the signup process.
    evidence:
      commits:
      - 48b915361
    release_status: released_main
  bug_fixes:
  - text: Wikipedia linking logic now filters out disambiguation pages and includes specific AI instructions to improve link
      accuracy.
    evidence:
      commits:
      - 199d6a69b
      - 86049054f
      - c2b6eb503
    release_status: released_main
  - text: The user interface now hides the 'Completed' status on video embeds that lack metadata.
    evidence:
      commits:
      - 991019bf7
    release_status: released_main
  - text: Bank transfer availability is now gated on the presence of IBAN and BIC details, and the associated UI is hidden
      when these are missing.
    evidence:
      commits:
      - 6a73e835e
      - 2a00e7064
    release_status: released_main
  - text: Issue titles in the database were migrated to a text type to prevent overflow from long, HTML-escaped strings.
    evidence:
      commits:
      - 18031dc01
    release_status: released_main
  unreleased_progress:
  - text: The 'welcome' focus mode has been implemented but is currently hidden behind a feature flag for further testing.
    evidence:
      commits:
      - 48b915361
    release_status: released_main
  internal_progress:
  - text: Nightly E2E test stability was improved by adding assistant message helpers and recording missing fixtures for various
      chat flows.
    evidence:
      commits:
      - 552fdfa74
      - f2d83159e
      - 8a05e43c0
    release_status: released_main
  - text: The python-multipart dependency was upgraded to version 0.0.26 to address a security advisory.
    evidence:
      commits:
      - 8713bab99
      - 0ed724ff7
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: A new cinematic Ken-Burns slideshow replaces autoplay video in the intro chat, featuring high-quality WebP frames
        and smooth crossfading.
      evidence:
        commits:
        - e0986cdf8
        - 48005eaeb
        - 183a7afe3
        - 4f8500c6b
        - 616db8623
        - c7fb20f05
      reason: This is a significant visual upgrade to the first-time user experience.
    - text: Refined Wikipedia linking instructions for the AI to ensure more accurate topic references.
      evidence:
        commits:
        - 199d6a69b
      reason: Improves the quality of AI-generated Wikipedia links for users.
    exclude:
    - text: Welcome focus mode flag.
      evidence:
        commits:
        - 48b915361
      reason: The welcome focus mode is currently hidden behind a flag and not yet intended for general use.
    rationale: The visual overhaul of the intro chat is the most prominent user-facing change, while the Wikipedia improvements
      provide immediate value to chat quality.
  social_video_recommendations:
  - idea: A side-by-side comparison of the old autoplay video versus the new cinematic Ken-Burns slideshow.
    priority: high
    reason: The Ken-Burns effect is highly visual and demonstrates a polish in the user experience that translates well to
      short-form video.
    evidence:
      commits:
      - e0986cdf8
      - 48005eaeb
      - 183a7afe3
  quality_notes:
  - The transition from JPG to WebP for intro frames reduces initial load weight while increasing image quality.
  - E2E test reliability was a focus in this cycle, addressing flakiness in nightly builds.
  validation_warnings: []
