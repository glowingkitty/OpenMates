    release_status: released_main
  - text: The Daily Inspiration banner now supports cycling through embeds on mobile devices.
    evidence:
      commits:
      - 29d0483b5
    release_status: released_main
  bug_fixes:
  - text: Localization logic was updated to apply language preferences from URL parameters earlier in the loading process,
      preventing a brief flash of English content and ensuring intro chat titles are correctly translated.
    evidence:
      commits:
      - 83b582c3b
      - 1f805d6e8
      - 7155aaf94
    release_status: released_main
  - text: The Daily Inspiration banner received several layout corrections, including 16:9 aspect ratio fixes for large displays
      and height constraints when the settings panel is active.
