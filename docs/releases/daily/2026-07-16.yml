llm_summary:
  overview: OpenMates focused on achieving feature parity for the SDK and CLI, refining privacy-related routing and deep links,
    and establishing foundational gates for the Apple UI parity program. Significant work was also completed to unify embed
    fullscreen navigation and stabilize AI task processing.
  released_changes: []
  bug_fixes:
  - text: The OpenMates CLI and SDK received multiple fixes for chat model handling, including support for nested model names,
      OpenAI SDK compatibility, and improved routing for API-key authenticated sessions.
    evidence:
      commits:
      - 6be9a9569
      - e7416abde
      - a94a9a2d3
      - aff5a1f13
      - 6e5c402b0
      - e25a42508
      - d818a185e
      - 3ec843df0
      - b173d37a5
      - 54219826c
    release_status: dev_only
  - text: Privacy and legal routing was refined to ensure PII settings deep links are preserved in hash URLs and that short
      URLs for the privacy policy redirect correctly, including on Vercel deployments.
    evidence:
      commits:
      - eceb78098
      - 1383ecb32
      - ce34b116b
      - d44d8f7a0
      - e6e070452
    release_status: dev_only
  - text: Security updates now allow for disabling OTP 2FA, require recent passkey verification for account deletion, and
      protect active accounts from stale-signup cleanup tasks.
    evidence:
      commits:
      - 818338f13
      - 06fe77776
      - 052b7b311
    release_status: dev_only
  - text: AI processing for task-related skills was improved to better honor explicit mentions, skill overrides, and embed-based
      chat flows.
    evidence:
      commits:
      - 1676503ee
      - fe9012b2e
      - 221ca951d
      - 5caf604c4
      - 2523aa8f2
    release_status: dev_only
  - text: Chat recovery mechanisms were stabilized with fixes for sync caching and the persistence of recovered messages using
      stable identifiers.
    evidence:
      commits:
      - fabc1f80c
      - 815029dd8
      - 53f2745f2
    release_status: dev_only
  - text: Fullscreen routing for app-skill embeds was unified across platforms to ensure consistent navigation for grouped
      and child components.
    evidence:
      commits:
      - 715306af7
      - beec181f4
      - 0b2e74136
      - 8517ec0e5
    release_status: dev_only
  unreleased_progress:
  - text: OpenMates added initial gates and audit scripts for the Apple UI parity program to track consistency across iOS
      and macOS.
    evidence:
      commits:
      - 119a18103
    release_status: dev_only
  - text: Support for rendering task and workflow app embeds was introduced, enabling richer interactive previews within chats.
    evidence:
      commits:
      - 6d84564c7
    release_status: dev_only
  - text: The SDK now supports API key management parity, allowing developers to manage keys and devices directly via the
      CLI.
    evidence:
      commits:
      - ef1f64028
    release_status: dev_only
  - text: Documentation was expanded to include privacy policy quick answers and a streamlined self-hosting setup guide.
    evidence:
      commits:
      - 53a22ec14
      - 5d7ebd037
      - db8ce8254
    release_status: dev_only
  internal_progress:
  - text: The production smoke test suite was split into specialized suites with improved API-key user cache handling.
    evidence:
      commits:
      - 92a275561
      - 7206f4981
      - 02281a695
    release_status: dev_only
  - text: Domain security policy checks were hardened during application startup.
    evidence:
      commits:
      - a0573172d
    release_status: dev_only
  - text: Automated parity oracles and UI test harnesses were stabilized to better compare chat rendering across web and Apple
      platforms.
    evidence:
      commits:
      - 5e71aac74
      - 8d1de6383
      - 700945fd2
      - ebb08b2a5
    release_status: dev_only
  newsletter_recommendation:
    include: []
    exclude:
    - text: Apple UI parity program gates
      evidence:
        commits:
        - 119a18103
      reason: This feature is part of the Apple UI parity program and is currently dev-only.
    - text: Task and workflow app embed rendering
      evidence:
        commits:
        - 6d84564c7
      reason: Workflows and Tasks platforms are currently disabled features.
    - text: SDK API key management parity
      evidence:
        commits:
        - ef1f64028
      reason: SDK API key management is currently in dev-only status.
    rationale: All user-facing changes from this period are currently in dev_only status or related to disabled features (Workflows,
      Tasks, iOS, macOS), making them unsuitable for public communication at this time.
  social_video_recommendations:
  - idea: Demonstrate the new interactive task and workflow embeds within the chat interface.
    priority: medium
    reason: The visual nature of app-skill embeds provides a strong product story for how OpenMates handles complex workflows.
    evidence:
      commits:
      - 6d84564c7
  quality_notes:
  - Extensive testing was added for API key management and chat rendering parity.
  - Infrastructure hardening included stricter domain security checks and split smoke test suites.
  validation_warnings: []
