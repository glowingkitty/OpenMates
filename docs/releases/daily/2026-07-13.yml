  overview: 'OpenMates development focused on two major technical tracks: the introduction of a workflow runtime and TUI for
    the CLI, and a comprehensive overhaul of the cross-device chat recovery system to improve session resilience.'
  released_changes: []
  bug_fixes:
  - text: The chat recovery system received extensive updates to ensure session resilience across devices, including improved
      job discovery on final streams, lease release on logout, and better correlation of retry attempts.
    evidence:
      commits:
      - 4b0d05a6b
