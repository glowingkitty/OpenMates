    evidence:
      commits:
      - 0b56e8106
    release_status: released_main
  - text: A developer-only browser for viewing and managing test recordings was added to the web application.
    evidence:
      commits:
      - 648eda13d
      - 64dd5ca5e
      - 8b3c32932
      - 44894c61d
      - dabd98039
      - ae5042619
    release_status: released_main
