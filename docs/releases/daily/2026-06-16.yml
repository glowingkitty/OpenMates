llm_summary:
  overview: OpenMates introduced anonymous CLI inference, expanded Calendar integration with new undo and cancellation capabilities,
    and added granular privacy settings for connected accounts. The update also includes significant UI refinements for anonymous
    usage and video embeds.
  released_changes:
  - text: OpenMates now supports anonymous AI inference via the CLI and introduced upload gates and persistence for anonymous
      web chat sessions.
    evidence:
      commits:
      - 71c22e25e
      - b483543ca
      - ab8e545ba
    release_status: released_main
  - text: The Calendar integration now supports undoing snapshots for updates or deletions, canceling pending actions, and
      includes new CLI action helpers.
    evidence:
      commits:
      - dd5f11baf
      - 71c51571c
      - c9f3c7b98
      - d34ed0fa2
      - 3fb369186
    release_status: released_main
  - text: Added dedicated privacy settings for connected accounts, allowing users to manage permissions more granularly.
    evidence:
      commits:
      - 12f3595d6
    release_status: released_main
  - text: Chat history now includes direct feedback links to facilitate issue reporting.
    evidence:
      commits:
      - 7390d998a
    release_status: released_main
  - text: Improved the server update process for self-hosted OpenMates instances.
    evidence:
      commits:
      - 833b9a9b2
    release_status: released_main
  bug_fixes:
  - text: Resolved several issues with anonymous chat interactions, ensuring send buttons and action buttons remain visible
      and functional during the upload gate and draft restoration processes.
    evidence:
      commits:
      - 8c5860be5
      - 79a9c233d
      - 15ab83ce9
      - 808d660b2
      - f73d462d4
      - bd549044f
    release_status: released_main
  - text: Improved video source quotes by prioritizing transcript cards and enabling fullscreen playback for embedded video
      quotes.
    evidence:
      commits:
      - 09656aa1c
      - 0196ca170
    release_status: released_main
  - text: Fixed multiple routing and state issues within the connected account and OAuth flows, including preserving redirect
      origins and ensuring settings routes mount correctly after authentication.
    evidence:
      commits:
      - f75cb3060
      - 519ccce05
      - 7bc4f1626
      - 8b67c88cb
      - d24ad700b
      - 8c2aedc9b
      - 483fdc48f
    release_status: released_main
  - text: Aligned CLI PII detection patterns with the web application and restored PII redetection within the message composer.
    evidence:
      commits:
      - 72384e734
      - 2bf59e134
    release_status: released_main
  - text: Made the message composer focus state synchronous to improve input responsiveness.
    evidence:
      commits:
      - 86d48c827
    release_status: released_main
  unreleased_progress:
  - text: Internal helper functions for Calendar action cancellation were added to the connected account service.
    evidence:
      commits:
      - 609c82a39
    release_status: released_main
  internal_progress:
  - text: Updated technical specifications for Calendar permission management and connected account privacy.
    evidence:
      commits:
      - 46ca409da
      - 6224164f1
      - 87cbe816e
      - 0a3cebfd1
