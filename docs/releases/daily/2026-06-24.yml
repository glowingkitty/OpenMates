llm_summary:
  overview: OpenMates improved the guest onboarding experience and chat reliability while introducing more visible Focus Mode
    indicators. Significant backend work was also completed for the upcoming Workflows system.
  released_changes:
  - text: Focus Mode visibility was enhanced with live badges in the chat row and active chat view, and activation remains
      rejectable until fully active.
    evidence:
      commits:
      - 75822e8b3
      - ee70c09d2
      - 9b345bb88
    release_status: released_main
  - text: The guest experience was refined with polished onboarding UI, better language detection, and corrected desktop banner
      sizing.
    evidence:
      commits:
      - 3635d5b7f
      - 922d6cf5a
    release_status: released_main
  - text: Chat reliability was improved by restoring cancelled drafts, localizing fork actions, and settling locales before
      processing deep links.
    evidence:
      commits:
      - 8b5916b39
      - ef63a0b78
      - 0b135c958
    release_status: released_main
  bug_fixes:
  - text: Authentication and session security were improved by preserving device approval errors for API keys and verifying
      WebSocket authorization before logout.
    evidence:
      commits:
      - 6a08f6470
      - cd05160b3
    release_status: released_main
  - text: The CLI and embed systems received stability fixes for version keys and encrypted diff row synchronization.
    evidence:
      commits:
      - 9acee5e2d
      - 347f8a442
    release_status: released_main
  - text: Internal chat database schema repairs are now serialized to prevent race conditions during maintenance.
    evidence:
      commits:
      - 59afdea50
      - 917d053b2
      - 8b84db931
    release_status: released_main
  unreleased_progress:
  - text: The Workflows v1 durable backend was added, including support for recurring skills and encrypted data blobs, though
      the feature remains disabled for general use.
    evidence:
      commits:
      - b3874966d
      - 461ff46f9
      - fe850bde6
    release_status: released_main
  internal_progress:
  - text: Deployment scripts were updated to handle transient failures, and accidental code hunks were removed from the CLI.
    evidence:
      commits:
      - 1a396290c
      - b1ecc6c74
    release_status: released_main
  - text: Extensive test suite maintenance was performed across the web app and CLI, covering recovery flows, language detection,
      and conversation forking.
    evidence:
      commits:
      - 11da24aea
      - 30dfab98f
      - 041d4a0d7
      - a92143851
      - 253458a14
      - dea9bb20d
      - 885bfeb12
      - 47ef6a7fd
      - 42afb47b2
      - 16232472c
      - '982226885'
      - 0aba96d13
      - 50b9696e8
      - 76a6927bc
      - 400648bb8
      - 0386cd01a
      - cdf2ae85f
      - 00160a8bb
      - a4a4d636b
      - 5fae14a3d
      - 2e4cd16b4
      - e16a4eb35
      - 10b2795b2
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: OpenMates now restores cancelled new chat drafts, preventing lost work.
      evidence:
        commits:
        - 8b5916b39
      reason: Directly improves the chat drafting experience.
    - text: Focus Mode status is now more visible with live badges in the chat list and active chat view.
      evidence:
        commits:
        - 75822e8b3
        - ee70c09d2
      reason: Visual feedback for a core productivity feature.
    - text: The guest onboarding experience was polished with improved language detection and desktop UI refinements.
      evidence:
        commits:
        - 3635d5b7f
        - 922d6cf5a
      reason: Improves the first-run experience for new users.
    exclude:
    - text: Workflows v1 backend and stability updates.
      evidence:
        commits:
        - b3874966d
        - 461ff46f9
        - fe850bde6
      reason: Workflows are currently a disabled feature.
    - text: IndexedDB schema repair serialization.
      evidence:
        commits:
        - 59afdea50
        - 917d053b2
        - 8b84db931
      reason: Internal database maintenance details.
    rationale: The newsletter should highlight user-facing improvements to chat reliability, Focus Mode visibility, and the
      onboarding experience while excluding internal maintenance and disabled features like Workflows.
  social_video_recommendations:
  - idea: A short clip showing the new live Focus Mode badges appearing in the chat list as a user enters deep work.
    priority: medium
    reason: Provides a clear visual update to a core productivity feature.
    evidence:
      commits:
      - 75822e8b3
      - ee70c09d2
  quality_notes:
  - Extensive test coverage (23 commits) ensures stability for core flows like forking and language detection.
  - Internal database repairs were hardened to prevent data corruption during schema updates.
