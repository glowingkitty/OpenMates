llm_summary:
  overview: OpenMates expanded its Learning Mode capabilities to support both account-wide settings and guest access, while
    introducing support for self-hosted local models. The project also streamlined issue reporting with short identifiers
    and hardened the system against ASCII-smuggling attacks.
  released_changes:
  - text: Learning Mode is now available account-wide, allowing users to persist educational preferences across sessions.
    evidence:
      commits:
      - 51353ee18
    release_status: released_main
  - text: A guest Learning Mode was added to provide educational features for anonymous users.
    evidence:
      commits:
      - 4527e1820
    release_status: released_main
  - text: Self-hosters can now configure local OpenAI-compatible model providers for use within OpenMates.
    evidence:
      commits:
      - 0b3ffa18a
    release_status: released_main
  - text: Issue reporting now utilizes short IDs to simplify tracking and communication between users and maintainers.
    evidence:
      commits:
      - ba2c51132
      - bfbdf3d13
    release_status: released_main
  bug_fixes:
  - text: The anonymous usage flow was improved to better handle credit exhaustion, including keeping message drafts and rolling
      back chat states on budget rejection.
    evidence:
      commits:
      - 2c0d0c67c
      - e90d06739
      - 56fa4840e
      - 1b1263a3c
      - a568b5c2f
    release_status: released_main
  - text: Universal guards were implemented to prevent ASCII-smuggling in LLM outputs across various apps and skills.
    evidence:
      commits:
      - c4562d7c9
    release_status: released_main
  - text: The signup process now correctly emails existing users who attempt to sign up again, preventing duplicate account
      confusion.
    evidence:
      commits:
      - 6d90fb32b
    release_status: released_main
  - text: Several UI and stability issues in the Learning Mode settings were resolved, including header repairs, guest access
      fixes, and notification retry loops.
    evidence:
      commits:
      - 8bea98990
      - 09719b8bc
      - c46e9dd39
      - b69fa5add
      - 2e2455546
      - b9ec4debd
    release_status: released_main
  unreleased_progress:
  - text: Work continues on simplifying feature availability logic, including updates to how the platform handles workspace
      toggles and project-related gates.
    evidence:
      commits:
      - c5caae2db
      - 4ce6a280f
      - 36176b218
    release_status: released_main
  internal_progress:
  - text: Infrastructure updates were deployed to improve LLM streaming fallbacks and provider configurations.
    evidence:
      commits:
      - f20bfd7af
    release_status: released_main
  - text: Test coverage was expanded for password-protected sharing and IndexedDB schema recovery.
    evidence:
      commits:
      - fa6bc63ad
      - 7aefcdc36
      - bdbc3b791
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: Account-wide Learning Mode.
      evidence:
        commits:
        - 51353ee18
      reason: This is a major user-facing feature that allows educational preferences to persist across the account.
    - text: Guest Learning Mode.
      evidence:
        commits:
        - 4527e1820
      reason: Expands the accessibility of educational features to anonymous users.
    - text: Support for self-hosted local models.
      evidence:
        commits:
        - 0b3ffa18a
      reason: Significant update for technical users and self-hosters.
    - text: Short report issue identifiers.
      evidence:
        commits:
        - ba2c51132
        - bfbdf3d13
      reason: Improves the user experience when reporting and tracking issues.
    exclude:
    - text: Simplified feature availability logic.
      evidence:
        commits:
        - c5caae2db
      reason: This change is related to the disabled platform:projects feature and is marked as an unreleased feature.
    - text: Feature availability response and workspace toggle cleanups.
      evidence:
        commits:
        - 4ce6a280f
        - 36176b218
      reason: These are internal refactors and UI cleanups related to feature availability gates.
    rationale: The newsletter highlights major new features like expanded Learning Mode and local model support, while excluding
      internal refactors and work related to disabled platform features.
  social_video_recommendations:
  - idea: A video demonstrating how to connect OpenMates to a local LLM provider for a fully self-hosted experience.
    priority: high
    reason: Self-hosting and local model support are highly requested features for privacy-conscious users.
    evidence:
      commits:
      - 0b3ffa18a
  quality_notes:
  - Security hardening was a focus this update, with the implementation of universal ASCII-smuggling guards across all LLM-driven
    skills.
  - Anonymous user experience was refined through better state management during credit exhaustion.
  validation_warnings: []
