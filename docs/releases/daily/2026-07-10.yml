      - fe85386df
    release_status: dev_only
  - text: A searchable Figma reference index was added to streamline the design-to-code workflow for developers.
    evidence:
      commits:
      - 1cc5cb4f3
    release_status: dev_only
  - text: The OpenCode specification workflow was strengthened with new skills for planning, task generation, and verification
      from specs.
    evidence:
      commits:
      - c4340ce91
      - e61dc4075
    release_status: dev_only
  - text: Deterministic workflow guardrails were hardened to ensure more reliable CI processes and automated reviews.
