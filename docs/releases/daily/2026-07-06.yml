      reason: This is a user-facing feature improvement for the web platform.
    - text: Enhanced health appointment search with smarter filtering for relevant medical motives.
      evidence:
        commits:
        - d6f680aad
        - 300961d48
      reason: Significant improvement to the utility of the health search skill.
    - text: CLI support for backend-only server management and updates.
      evidence:
        commits:
        - ab7addc9b
      reason: Useful update for developers and self-hosters using the CLI.
    - text: Detailed usage tracking for Apple shortcut interactions in billing settings.
      evidence:
        commits:
        - d320dfa33
      reason: Improves transparency in billing for users utilizing shortcuts.
    exclude:
