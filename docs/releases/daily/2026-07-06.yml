llm_summary:
  overview: OpenMates introduced foreground-aware notifications to prevent redundant alerts and implemented a comprehensive
    refinement of the health appointment search skill. Significant internal progress was made on Apple Watch support and a
    unified message composer for Apple platforms, though these remain unreleased. The update also includes CLI enhancements
    and improved usage tracking for shortcuts.
  released_changes:
  - text: OpenMates now supports foreground-aware notifications, allowing the system to suppress push alerts if the user is
      already active in the relevant chat.
    evidence:
      commits:
      - 71148ee87
    release_status: released_main
  - text: The CLI now allows for managing backend-only server updates, providing more flexibility for environment maintenance.
    evidence:
      commits:
      - ab7addc9b
    release_status: released_main
  - text: Usage tracking in settings now explicitly identifies and tags activity generated via Apple shortcuts.
    evidence:
      commits:
      - d320dfa33
    release_status: released_main
  bug_fixes:
  - text: The health appointment search skill received a major logic overhaul to filter out irrelevant motives, noise from
      specific providers like Doctolib and Jameda, and mismatched city data.
    evidence:
      commits:
      - d6f680aad
      - 7798fc76e
      - 62a5c1e25
      - f9321381b
      - 079f7e755
      - 6a6f7d082
