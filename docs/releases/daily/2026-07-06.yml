      - 4d044d238
    release_status: released_main
  - text: Initial seams for an enhanced local PII detection model were added to the Apple platform targets.
    evidence:
      commits:
      - f02693d5c
      - e041a1e84
      - a51ddb225
    release_status: released_main
  - text: The workflow workspace now supports instant prefetching and improved editor state persistence.
    evidence:
      commits:
      - 3af999140
      - 1014ca039
      - c42c65320
    release_status: released_main
  - text: Project services were updated to support importing remote code previews.
    evidence:
      commits:
      - cea3b8e40
      - ad5d9bda0
    release_status: released_main
  - text: Native diagnostics for Apple devices were enriched to improve issue reporting.
    evidence:
      commits:
