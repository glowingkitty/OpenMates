      - 300961d48
      - 00015cd70
      - f3e1d2a2c
      - 1adfa325d
      - 41b38db99
    release_status: released_main
  - text: The referral CTA label in settings now remains stable on wide screen layouts.
    evidence:
      commits:
      - ada5f3abe
    release_status: released_main
  - text: Electronics component embeds now correctly support fullscreen mode.
    evidence:
      commits:
      - 66e64b453
    release_status: released_main
  - text: The OpenMates CLI now supports backend-only server updates.
    evidence:
      commits:
      - ab7addc9b
    release_status: released_main
  - text: The guest interest tag rail was expanded to improve visibility.
    evidence:
      commits:
      - 7727bc015
    release_status: released_main
  - text: Billing and usage tracking now correctly tags activity originating from Apple shortcuts.
    evidence:
      commits:
      - d320dfa33
    release_status: released_main
  unreleased_progress:
  - text: Development of the Apple Watch application continued with the addition of a chat runtime shell, encrypted data handling,
      and a QR-based pair login system.
    evidence:
      commits:
      - 9a764915b
      - 52fbc5aff
      - c3881ac5a
      - 79d77ff73
      - ac23d2660
      - a5f5ab73d
      - c4f50971d
      - 6a2078a1c
    release_status: released_main
  - text: A unified message composer was implemented for iOS and macOS to provide a consistent input experience across the
      main app, share extensions, and quick capture.
    evidence:
      commits:
      - 719cda95e
      - 30d480391
      - 0fecc2b26
      - 68427902b
      - 8700f698f
      - '243146138'
