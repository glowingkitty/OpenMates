llm_summary:
  overview: OpenMates expanded its AI model support with the addition of Claude Fable 5 and significantly refined the deep
    research experience. Key updates include the unification of research focus modes, the introduction of auto-starting application
    previews, and improved passkey compatibility for Linux users. Significant work also continued on platform parity for Apple
    devices, though these features remain unreleased.
  released_changes:
  - text: Support for the Claude Fable 5 model was added to the Anthropic direct API provider.
    evidence:
      commits:
      - 5bea51e1f
    release_status: released_main
  - text: The deep research focus mode was unified across the platform, and the OpenMates CLI now supports sub-chat parity
      for deep research tasks.
    evidence:
      commits:
      - 55e3ba1cd
      - 02f288cc1
    release_status: released_main
  - text: Application previews now automatically start upon generation, streamlining the code-to-preview workflow.
    evidence:
      commits:
      - fb578aee9
    release_status: released_main
  - text: Passkey registration was updated to support Linux-compatible registration flows.
    evidence:
      commits:
      - a9be1edf6
    release_status: released_main
  - text: Focus modes for video analysis and web reputation were improved, complemented by a new reputation check example
      chat.
    evidence:
      commits:
      - a16cac560
      - 641a3baaa
      - f9fda4429
    release_status: released_main
  bug_fixes:
  - text: A series of updates resolved race conditions and timing issues when sending draft chats, ensuring the editor state
      is correctly preserved and validated before transmission.
    evidence:
      commits:
      - d922a3672
      - 0bc989a55
      - 6d3f0e2e9
      - f8ba9d82e
      - d4a9c82e2
      - 3603dba04
      - 2e950ca7f
    release_status: released_main
  - text: UI stability was improved by hardening weather embed fields, preventing duplicate log keys, and resolving translation
      gaps in gift card settings and route titles.
    evidence:
      commits:
      - a46561c2d
      - 5772acbfd
      - 3447c8c9f
      - e711fc8c0
      - fcfd92503
    release_status: released_main
  - text: The code embed preview now correctly displays execution output alongside the source code.
    evidence:
      commits:
      - c4a016d75
    release_status: released_main
  - text: App skill embed previews were registered to ensure consistent rendering across example chats.
    evidence:
      commits:
      - a5f7f40ae
    release_status: released_main
  unreleased_progress:
  - text: Extensive work was completed on iOS and macOS parity, including embed rendering, chat message spacing, and UI contract
      probes for headers and recording overlays.
    evidence:
      commits:
      - 47c5a97e9
      - f4ba40916
      - 92537792a
      - 9f9cb86e3
      - 42904035e
      - 2061c2072
      - 0ee04fd6b
      - 72e7998da
    release_status: released_main
  - text: Initial support for sending sub-chat continuations as user tasks was added, though the tasks platform remains disabled.
    evidence:
      commits:
      - 6c48d11fb
    release_status: released_main
  internal_progress:
  - text: Service health monitoring was refined to reduce false positives for degraded service alerts.
    evidence:
      commits:
      - '331727558'
    release_status: released_main
  - text: Automatic handoff of admin issues to OpenCode was disabled to allow for manual investigation.
    evidence:
      commits:
      - f254e9a87
    release_status: released_main
  - text: A database migration was added to optimize chat message indexing.
    evidence:
      commits:
      - 01f54ff81
    release_status: released_main
  - text: Additional tracing and logging were implemented to debug chat preprocessing and early exit scenarios.
    evidence:
      commits:
      - b8b0b5861
      - d8dd35c7d
      - 6e9c084c8
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: OpenMates now supports the Claude Fable 5 model for direct API interactions.
      evidence:
        commits:
        - 5bea51e1f
      reason: This is a major model addition that expands the AI capabilities available to users.
    - text: The deep research focus mode has been unified, and the CLI now supports sub-chat parity for complex research tasks.
      evidence:
        commits:
        - 55e3ba1cd
        - 02f288cc1
      reason: These updates significantly improve the consistency and power of the research experience.
    - text: Application previews now start automatically when generated in the chat.
      evidence:
        commits:
        - fb578aee9
      reason: This improves the user experience by reducing manual steps when viewing generated code.
    - text: Passkey registration now supports Linux-compatible flows for improved account security.
      evidence:
        commits:
        - a9be1edf6
      reason: This expands security options for users on Linux systems.
    exclude:
    - text: Apple platform parity updates.
      evidence:
        commits:
        - 47c5a97e9
        - f4ba40916
        - 92537792a
        - 9f9cb86e3
        - 42904035e
        - 2061c2072
        - 0ee04fd6b
        - 72e7998da
      reason: Apple platform features (iOS and macOS) are currently disabled in the environment configuration.
    - text: Sub-chat continuation as user tasks.
      evidence:
        commits:
        - 6c48d11fb
      reason: The tasks platform is currently disabled in the environment configuration.
    rationale: The newsletter highlights major model additions, significant research tool improvements, and security updates
      that are ready for public use. It excludes platform-specific work that remains gated.
  social_video_recommendations:
  - idea: Showcase the speed and reasoning capabilities of the new Claude Fable 5 model within OpenMates.
    priority: high
    reason: New model additions are high-interest events for the community.
    evidence:
      commits:
      - 5bea51e1f
  - idea: A short clip showing a user asking for a web app and seeing it instantly boot up in the preview pane.
    priority: medium
    reason: The auto-start feature provides a 'magic' moment that is visually compelling.
    evidence:
      commits:
      - fb578aee9
  quality_notes:
  - Extensive testing was performed on Apple platform parity, including visual snapshots and UI contract assertions.
  - Deep research logic was strengthened with better synthesis formatting and sub-chat delegation gates.
  - Draft send reliability was a major focus, addressing several edge-case race conditions.
  validation_warnings: []
