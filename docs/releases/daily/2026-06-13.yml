llm_summary:
  overview: OpenMates transitioned its nutrition recipe provider to Edamam, improved the reliability of shared chat metadata,
    and officially bumped the project version to v0.12. The update also includes several UI refinements for daily inspiration
    and authentication flows.
  released_changes:
  - text: The nutrition app now utilizes Edamam for recipe searches, featuring updated fullscreen and preview embeds.
    evidence:
      commits:
      - adf726d84
      - 3746055f5
      - ab6360c88
      - eec48133b
    release_status: released_main
  - text: Chat sharing was enhanced with dedicated Open Graph metadata and improved error handling for short-link generation.
    evidence:
      commits:
      - 3e404b3a7
      - 3966c90f6
      - 0ddfa9d82
    release_status: released_main
  - text: AI model availability was updated to include Kimi K2.7 Code while removing the unavailable Claude Fable 5 model.
    evidence:
      commits:
      - 1d5ba2de6
