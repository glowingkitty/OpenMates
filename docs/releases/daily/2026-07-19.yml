    release_status: dev_only
  - text: The project improved the reliability of fullscreen embed rendering for app-skills by ensuring metadata is correctly
      passed from renderers and resolving registry content from merged metadata.
    evidence:
      commits:
      - 00916a523
      - 52ca8d618
      - 5b72feae6
