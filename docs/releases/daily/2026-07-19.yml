    release_status: dev_only
  unreleased_progress:
  - text: OpenMates added an encrypted account import flow to the web app, allowing users to migrate data securely.
    evidence:
      commits:
      - c16997acf
    release_status: dev_only
  - text: A new example chat featuring Vital Farms SEC financials was added to demonstrate business analysis capabilities.
    evidence:
      commits:
      - 2438e352f
    release_status: dev_only
  - text: Work began on protecting app-skill outputs to prevent prompt injection, specifically targeting the unreleased workflows
      platform.
    evidence:
      commits:
      - 71631b855
    release_status: dev_only
  - text: Device labeling for API keys was updated to maintain parity between the web interface and unreleased iOS/macOS platforms.
    evidence:
      commits:
      - 147cb95b4
    release_status: dev_only
  - text: Developer experience improvements include clearer SDK device labeling and the ability to pair the CLI with an active
      browser session.
