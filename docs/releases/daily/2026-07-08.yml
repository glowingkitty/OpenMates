llm_summary:
  overview: OpenMates focused on CLI maintenance, session reliability for anonymous users, and infrastructure upgrades. Key
    updates include new CLI self-update and support commands, stabilized chat history restoration on the web, and a migration
    to the Node 24 runtime for deployments.
  released_changes:
  - text: The OpenMates CLI now supports self-update commands and a dedicated support command, with added reminders for self-hosted
      users on startup.
    evidence:
      commits:
      - 11cfbf248
      - 867d10c48
      - 527bad27f
    release_status: released_main
  - text: Anonymous chat sessions are now more resilient, with fixes to ensure history is correctly hydrated and restored
      after browser reloads.
    evidence:
      commits:
      - 4798ee1be
      - 6b692d113
      - f8aadbed9
      - 3307b804b
    release_status: released_main
  - text: Package listings for SDKs are now linked directly from the settings footer for easier developer access.
    evidence:
      commits:
      - 6b4892fea
    release_status: released_main
  - text: Chat history hydration was improved to correctly pull from parent messages in threaded views.
    evidence:
      commits:
      - 2ebf96958
    release_status: released_main
  bug_fixes:
  - text: OpenMates resolved issues with header navigation where authenticated actions and settings controls would occasionally
      become hidden or inaccessible.
    evidence:
      commits:
      - 3e6f2ab42
      - e54914057
    release_status: released_main
  - text: Security maintenance addressed several dependency vulnerability alerts across the backend and frontend packages.
    evidence:
      commits:
      - ae19665b5
    release_status: released_main
  - text: The Vercel deployment pipeline was hardened to prevent build failures triggered by Dependabot and incorrect preflight
      pathing.
    evidence:
      commits:
      - 9e29d823e
      - ed6d08239
    release_status: released_main
  unreleased_progress:
  - text: Work continued on the unreleased Apple Watch platform, focusing on pair login stability and session diagnostics.
    evidence:
      commits:
      - 55819c275
      - 861fa49d4
      - 6fc54dd93
      - cb45684f1
    release_status: released_main
  - text: The unreleased iOS and macOS applications received updates for message composer parity, voice recording handling,
      and sync decryption performance.
    evidence:
      commits:
      - 15e373778
      - 6e4d29b19
      - 05d2ef53f
      - 047bfd7f1
      - e0140c033
      - 2b07fa68a
      - 55fccfed2
      - 9c3cb72d5
      - e08e5b1d5
      - be2df92f6
      - dd58a0882
      - 91f59a613
      - 51f45e191
    release_status: released_main
  - text: Internal test suites for the disabled Workflows, Projects, and Tasks features were stabilized.
    evidence:
      commits:
      - af39c769d
    release_status: released_main
  internal_progress:
  - text: The release pipeline now utilizes product version lines to align prereleases and patch slots for Python and CLI
      packages.
    evidence:
      commits:
      - 20d5d4b8e
      - 64cc86570
      - a36cb915f
    release_status: released_main
  - text: The web application and CI test workflows migrated to the Node 24 runtime.
    evidence:
      commits:
      - def35b6ba
      - 85d7f6fbc
      - f96b844a0
      - e3099e135
    release_status: released_main
  - text: Self-hosting image publishing was optimized with improved matrix handling and automated Discord notifications.
    evidence:
      commits:
      - 449b9edf7
      - be19b9156
      - 652abb47b
      - '554823411'
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: New CLI commands for support and self-updating, alongside a startup reminder for self-hosted instances.
      evidence:
        commits:
        - 11cfbf248
        - 867d10c48
        - 527bad27f
      reason: CLI features are released and ready for public communication.
    - text: Improved session persistence for anonymous users, ensuring chat history is correctly restored and synced after
        a page reload.
      evidence:
        commits:
        - 4798ee1be
        - 6b692d113
        - f8aadbed9
        - 3307b804b
      reason: Session persistence fixes are released and ready for public communication.
