      - 7188ee42a
      - 1ce216e7d
      - ba104a8bc
      - a0eee2d67
    release_status: released_main
  - text: UI refinements for Apple platforms, including redesigned input buttons, sidebar fixes, and incognito mode visual
      updates.
    evidence:
      commits:
      - 75a208557
      - ac12b777a
      - 6401e6525
    release_status: released_main
  - text: Refinement of event preprocessor hints to improve concert tag accuracy.
    evidence:
      commits:
      - 220d9bd08
    release_status: released_main
