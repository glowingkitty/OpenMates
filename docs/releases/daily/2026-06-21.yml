llm_summary:
  overview: OpenMates significantly overhauled the guest onboarding experience, introducing a dynamic interest selection flow
    and improved feature inspirations. The update also strengthens the self-hosting toolkit with new CLI capabilities for
    secret verification and account data migration.
  released_changes:
  - text: Improved guest feature inspirations with smart selection based on user interests.
    evidence:
      commits:
      - 841ec7b80
    release_status: released_main
  - text: The CLI now verifies server secrets imported from Vault to ensure configuration integrity.
    evidence:
      commits:
      - 1b55cf511
    release_status: released_main
  - text: Added support for importing connected accounts directly via the CLI.
    evidence:
      commits:
      - 2176194cf
    release_status: released_main
  bug_fixes:
  - text: Extensive polish of the guest onboarding experience, including icon alignment, responsive hero sizing, and visual
      stability for the interest tag rail.
    evidence:
      commits:
      - e82629f85
      - c948dc18c
      - e71a26af7
