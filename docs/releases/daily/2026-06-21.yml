      - 328f2c845
      - 5a28de32b
      - 742a5edd0
      - da433aac5
      - b5ce66a82
    release_status: released_main
  - text: Restored the back action during authentication to return users to the new chat screen.
    evidence:
      commits:
      - 7f6c7cd04
    release_status: released_main
  - text: Cloud-only routes for administration and payments are now hidden before user authentication.
    evidence:
      commits:
      - 63bdd6b1f
    release_status: released_main
  - text: Improved self-hosting reliability by ensuring existing services stop during a restore and increasing the capacity
      for larger backups.
    evidence:
      commits:
      - a921f3ea8
      - 8040ae074
    release_status: released_main
  - text: Search results now correctly preserve parent preview metadata when viewed in fullscreen mode.
    evidence:
      commits:
      - 542de2079
    release_status: released_main
  - text: Removed unintended placeholder elements from the PCB design application.
    evidence:
      commits:
      - a78cc0bbe
    release_status: released_main
  unreleased_progress:
  - text: Development continues on Mind Map embeds, including fullscreen navigation and collapse controls, though these remain
      gated by platform availability.
    evidence:
      commits:
      - bec2f6c51
      - 93bb79377
      - 8f2644922
      - 7336f979a
    release_status: released_main
  - text: Work on preserving parent embed preview metadata for iOS and macOS platforms.
    evidence:
      commits:
      - b7453bc40
    release_status: released_main
  - text: Added a privacy-first product launch mind map as an example chat for internal testing.
    evidence:
      commits:
      - 2891fd5c9
      - 92b5c6cf3
    release_status: released_main
  internal_progress:
  - text: Updated CI workflows to trigger self-host smoke tests upon changes to cloud-specific routes.
    evidence:
      commits:
      - d68cc5acb
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: Enhanced guest feature inspirations and smart selection.
      evidence:
        commits:
        - 841ec7b80
      reason: Directly improves the first-time user experience for guests.
    - text: Verification for Vault-imported server secrets.
      evidence:
        commits:
        - 1b55cf511
      reason: Critical security improvement for self-hosters using Vault.
    - text: Connected account import via CLI.
      evidence:
        commits:
        - 2176194cf
      reason: Simplifies account management for CLI users.
    exclude:
    - text: Mind map embeds and associated UI controls.
      evidence:
        commits:
        - bec2f6c51
        - 93bb79377
        - 8f2644922
        - 7336f979a
      reason: Mind map features are currently gated by disabled platform dependencies (iOS, macOS, and Projects).
    rationale: The focus of this update is the guest experience and self-hosting infrastructure. Mind map features are excluded
      as they rely on platforms currently disabled in the configuration.
  social_video_recommendations:
  - idea: A walkthrough of the new guest interest selection flow, showing how it dynamically updates chat suggestions.
    priority: High
    reason: This is the most visible user-facing change and demonstrates the project's focus on a smooth first-time experience.
    evidence:
      commits:
      - 841ec7b80
      - 14d96124f
  quality_notes:
  - A high volume of commits (over 30) was dedicated specifically to refining the visual and functional stability of the guest
    interest selection rail.
  - Self-hosting reliability was addressed through improved backup handling and service management during restores.
  validation_warnings: []
