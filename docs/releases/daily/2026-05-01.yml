    to PDF deduplication and OCR processing. The update also includes various stability fixes for the web application and
    continued development of the unreleased iOS platform.
  released_changes:
  - text: The travel application now supports train connection searches through Deutsche Bahn, including direct booking deeplinks
      and improved provider attribution.
    evidence:
