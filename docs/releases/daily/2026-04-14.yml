      reason: CI/Test infrastructure maintenance.
    rationale: The update is headlined by the introduction of SEPA bank transfers and a major privacy-focused overhaul of
      how Wikipedia content is handled. These changes, along with new privacy promises and a refined video onboarding experience,
      provide strong material for user communication.
  social_video_recommendations:
  - idea: A walkthrough of the new SEPA bank transfer flow, showing how users can now top up credits without a credit card.
    priority: high
    reason: This is a major accessibility feature for European users that differentiates the payment experience.
    evidence:
      commits:
