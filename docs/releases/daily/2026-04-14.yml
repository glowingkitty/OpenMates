llm_summary:
  overview: OpenMates introduced SEPA bank transfer support via Revolut Business, implemented a privacy-preserving Wikipedia
    proxy to protect user IP addresses, and significantly enhanced the video onboarding experience with new header controls
    and fullscreen capabilities. The update also includes new privacy promises regarding CLI usage and external resources,
    alongside extensive UI polish and security-related dependency upgrades.
  released_changes:
  - text: OpenMates now supports SEPA bank transfers via Revolut Business for credit purchases and support contributions,
      including automated reminder emails and admin notifications for transfer issues.
    evidence:
      commits:
      - 95fb183a2
      - fd941673a
      - 437fac490
    release_status: released_main
  - text: A new backend proxy for Wikipedia requests protects user IP addresses; the system now uses a credit-based auth model
      for these requests with differentiated rate limits for anonymous and authenticated users.
    evidence:
      commits:
      - 17990ec7f
      - f08e2bde5
      - 136d2a44e
      - 4b02fa48b
    release_status: released_main
  - text: The project added an enhanced video header to chats featuring autoplay, scroll-to-pause logic, and deep-linking
      support, alongside a unified fullscreen shell for intro videos.
    evidence:
      commits:
      - c14dc3091
      - 7417e7e35
      - 7b6b55b70
      - f2c8f6944
      - ba64e373e
      - 577f87228
    release_status: released_main
  - text: 'Two new privacy promises were added: a guarantee against credential prompts in CLI tools and a promise regarding
      the non-usage of external resources.'
    evidence:
      commits:
      - 110fdf27c
    release_status: released_main
  - text: UI improvements include an OpenMates badge for internal deep links, unified CTA-orange for clickable text, right-click
      context menus for example chats, and enabled search suggestions for unauthenticated users.
    evidence:
      commits:
      - a66d7b191
      - d59b95ca5
      - d3aa16ae7
      - edbe3365d
      - db21fe4f9
    release_status: released_main
  bug_fixes:
  - text: Resolved several Wikipedia embed issues, including mutual exclusivity between fullscreen modes, missing share buttons,
      and incorrect inline link colors.
    evidence:
      commits:
      - 2c0a9285a
      - eb3db9223
      - 2644c35ed
    release_status: released_main
  - text: Refined the bank transfer UI to use canonical settings elements, corrected reference hint text, and removed donation-related
      language from support sections.
    evidence:
      commits:
      - 096a122b0
      - 3d095cd88
      - b53174727
    release_status: released_main
  - text: Fixed a logic error where the preprocessing LLM would skip its final fallback attempt if the cache indicated an
      unhealthy state.
    evidence:
      commits:
      - 50035da3d
    release_status: released_main
  - text: Corrected intro video layout issues, including title positioning in side-by-side views and autoplay collisions.
    evidence:
      commits:
      - 769539b1c
      - a834972d7
      - 9a9bc69e8
    release_status: released_main
  - text: Resolved a Vercel build failure caused by an incorrect casing in the WebSocket service import.
    evidence:
      commits:
      - 3a3f5904a
    release_status: released_main
  unreleased_progress:
  - text: Added a window.onboarding() debug command to facilitate QA testing of the signup and intro flows.
    evidence:
      commits:
      - 5487f58ea
    release_status: released_main
  - text: Internal documentation was updated to cover the privacy-promises architecture and the decision to use api.video
      for hosting.
    evidence:
      commits:
      - 5847b9656
      - f3b36880f
      - b8f4dcd78
    release_status: released_main
  - text: Expanded the E2E test suite with dedicated specs for bank transfer tiers and signup flows.
    evidence:
      commits:
      - e37d83645
      - 9a9f477dd
      - 540b2db52
      - f7f910c44
    release_status: released_main
  internal_progress:
  - text: Upgraded Pillow to version 12.2.0 to address a security vulnerability (GHSA-whj4-6x5x-4v2j).
    evidence:
      commits:
      - eec550b6a
    release_status: released_main
  - text: Adjusted provider health checks to tolerate two transient failures before marking a service as unhealthy.
    evidence:
      commits:
      - 2b0faf453
    release_status: released_main
  - text: Prevented Temporal Dead Zone (TDZ) crashes by deferring store subscriptions in the WebSocket and ChatSync services.
    evidence:
      commits:
      - 57cfa67bc
      - b25fda17a
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: SEPA Bank Transfer Support via Revolut Business
      evidence:
        commits:
        - 95fb183a2
        - fd941673a
      reason: Major new payment method expanding accessibility for European users.
    - text: Privacy-Focused Wikipedia Proxy with Rate Limiting
      evidence:
        commits:
        - 17990ec7f
