llm_summary:
  overview: OpenMates launched a referral credit program, introduced interface font customization, and implemented encrypted
    chat compression checkpoints to improve synchronization performance.
  released_changes:
  - text: OpenMates added a referral credit program, including a new billing settings interface to track referral status and
      rewards.
    evidence:
      commits:
      - b904d5e3c
      - f1f8d2d40
    release_status: released_main
  - text: Users can now select and sync interface font preferences; this update includes fixes for font rendering and session
      restoration.
    evidence:
      commits:
      - 239565add
      - b9c4031fe
      - f0db57546
      - f443bc0a8
      - 59221210a
      - d1f547b52
    release_status: released_main
  - text: Encrypted chat compression checkpoints were added to optimize phased synchronization while ensuring server-side
      compression artifacts remain excluded from chat history.
    evidence:
      commits:
      - b716bdad5
      - 5d71207ab
    release_status: released_main
  - text: A privacy-safe telemetry digest and localized chat error report consent were implemented to improve issue reporting
      transparency.
    evidence:
      commits:
      - 1282d1f0b
      - 7f4090171
    release_status: released_main
  - text: Embed functionality was improved across nutrition, travel, and code search, including better metadata preservation
      and more accurate recipe examples.
    evidence:
      commits:
      - ff5b5b318
      - 103767acc
      - 69d3f9a13
      - 99528aa75
      - 901ee9f25
      - 26dd24538
    release_status: released_main
  bug_fixes:
  - text: UI polish for the settings menu includes matching the default icon gradient and ensuring the settings icon appears
      correctly in the profile menu.
    evidence:
      commits:
      - 10ae2aedb
      - e94ebf325
    release_status: released_main
  - text: The referral API is now correctly routed through the Caddy server configuration.
    evidence:
      commits:
      - e2e49ef36
    release_status: released_main
  - text: Resolved a rendering issue for the building maintenance email example embed.
    evidence:
      commits:
      - 65b64c377
    release_status: released_main
  - text: Added the Stoffe provider logo for the app store interface.
    evidence:
      commits:
      - fbad428fb
    release_status: released_main
  unreleased_progress:
  - text: A new example chat for building maintenance was added to the internal demo store.
    evidence:
      commits:
      - 8f6ac44dd
    release_status: released_main
  - text: Internal metadata structures for skills and image providers were updated to support better embed rendering.
    evidence:
      commits:
      - ff5b5b318
      - 99528aa75
      - 901ee9f25
    release_status: released_main
  internal_progress:
  - text: Test coverage was expanded for referral signups, chat error report consent, and travel metadata preview assertions.
    evidence:
      commits:
      - d3b32c7db
      - '293582813'
      - cfb29a3e8
      - b9edcf011
      - 1e2e938b1
      - b8aa22ae4
    release_status: released_main
  - text: Implemented automatic submission for chat failure reports.
    evidence:
      commits:
      - d360a79cd
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: A new referral credit program allows users to earn rewards, with integrated status tracking in billing settings.
      evidence:
        commits:
        - b904d5e3c
        - f1f8d2d40
      reason: New user-facing incentive program with associated UI fixes.
    - text: Interface font customization is now available, allowing users to choose and sync their preferred local fonts across
        sessions.
      evidence:
        commits:
        - 239565add
        - b9c4031fe
        - f0db57546
        - f443bc0a8
        - 59221210a
        - d1f547b52
      reason: Significant UI customization feature with robust synchronization.
    - text: Encrypted chat compression checkpoints improve synchronization performance while keeping server-side compression
        data out of user chat history.
      evidence:
        commits:
        - b716bdad5
        - 5d71207ab
      reason: Performance and privacy improvement for chat history.
    exclude:
    - text: PII-capable maintenance example chat.
      evidence:
        commits:
        - 8f6ac44dd
      reason: Marked as not user-facing.
    - text: Skill search and image provider metadata corrections.
      evidence:
        commits:
        - ff5b5b318
        - 99528aa75
        - 901ee9f25
      reason: Technical metadata and provider configuration updates.
    rationale: The referral program and font customization are the primary user-facing highlights of this update, supported
      by significant performance improvements to encrypted chat syncing.
  social_video_recommendations:
  - idea: A short clip demonstrating the new interface font selection in the settings menu and how it instantly updates the
      app's look.
    priority: medium
    reason: Visual customization is highly shareable and easy to demonstrate in a short video format.
    evidence:
      commits:
      - 239565add
