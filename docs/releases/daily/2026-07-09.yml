llm_summary:
  overview: OpenMates focused on hardening the CLI self-hosting infrastructure and advancing the development of native and
    web-based composers for Apple platforms. While the Apple platform features remain unreleased, significant progress was
    made on UI parity, accessibility, and automated testing.
  released_changes:
  - text: The CLI now features more robust self-host backup handling.
    evidence:
      commits:
      - f305b3975
    release_status: released_main
  bug_fixes:
  - text: OpenMates hardened the CLI self-host backup process to improve reliability during server maintenance.
    evidence:
      commits:
      - f305b3975
    release_status: released_main
  unreleased_progress:
  - text: Development of the Apple Tiptap WebView composer continued with improvements to focus handling, navigation delegates,
      and embed parity.
    evidence:
      commits:
      - 0feb3b4b4
      - eca1bbe7d
      - b04573f3e
      - fc6d4b5f5
      - 523d40b11
      - 442bf7cb8
    release_status: released_main
  - text: Prototyping of a fully native Apple message composer is underway, focusing on TextKit integration and document adapters.
    evidence:
      commits:
      - 71a73e9ae
      - 523e3dedc
      - d45b37a75
      - 65aeb81ef
      - 583e24445
      - 4aafd1a91
      - 712358f0b
    release_status: dev_only
  - text: The CLI is being updated with improved version update feedback, immediate server startup status, and reserved recovery
      account provisioning.
    evidence:
      commits:
      - 49747db34
