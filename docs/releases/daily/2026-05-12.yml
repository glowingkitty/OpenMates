llm_summary:
  overview: OpenMates introduced a new AI setting for follow-up suggestions and significantly improved the touch experience
    for drawer navigation. The social media skill was also enabled with corrected styling, alongside several refinements for
    tablet layouts and payment workflows.
  released_changes:
  - text: OpenMates added a toggle in AI settings to enable or disable follow-up suggestions after chat responses.
    evidence:
      commits:
      - 43b99e6b8
    release_status: released_main
  - text: The touch interface now supports interactive dragging for drawers, with specific fixes for wide layouts and tablet-specific
      jumpiness.
    evidence:
      commits:
      - 429aabb81
      - d1a53706b
      - 3c2fdb51b
    release_status: released_main
  - text: The social media skill is now active, featuring restored card styling and Reddit icon support.
    evidence:
      commits:
      - f0fc5d012
      - 1a019b539
    release_status: released_main
  - text: Tablet users will see improved chat headers with larger, better-scaled teaser text and tuned animation cycles.
    evidence:
      commits:
      - a09dfa0f7
      - 3cf5809e3
      - 63626c2ac
    release_status: released_main
  - text: Travel previews now display provider logos and departure/arrival times in the basic info bar.
    evidence:
      commits:
      - ef480ab58
    release_status: released_main
  bug_fixes:
  - text: Resolved an issue where backup codes were not accessible immediately after 2FA signup verification.
    evidence:
      commits:
      - 6bbbd84af
    release_status: released_main
  - text: Fixed managed checkout and bank transfer address handling in payment workflows and reminder emails.
    evidence:
      commits:
      - 4afd12659
    release_status: released_main
  - text: Corrected horizontal scrolling behavior within the settings menu to prevent layout shifts.
    evidence:
      commits:
      - 4977996f6
    release_status: released_main
  - text: Improved skill resolution by normalizing mixed identifiers during AI preprocessing.
    evidence:
      commits:
      - df255f923
    release_status: released_main
  - text: Ensured Open Graph (OG) images are correctly served for shared chats and embeds.
    evidence:
      commits:
      - ed08ce5f7
    release_status: released_main
  unreleased_progress:
  - text: Significant work continued on the iOS and macOS platforms, focusing on native embed parity and visual QA for travel
      and event renderers.
    evidence:
      commits:
      - 2d5a7c613
      - 32edeb8a5
    release_status: released_main
  - text: Internal agent tooling was expanded to improve parity across different development environments.
    evidence:
      commits:
      - 4185f224e
    release_status: released_main
  - text: Refinements were made to chat key recovery and synchronization logic during phased sync.
    evidence:
      commits:
      - 63b4e3a68
      - a3d1defb5
    release_status: released_main
  - text: Added logic to convert GitHub web results into specialized repository embeds.
    evidence:
      commits:
      - 7259f79fa
    release_status: released_main
  internal_progress:
  - text: Updated pricing metadata for the social media skill.
    evidence:
      commits:
      - f54965f32
    release_status: released_main
  - text: Expanded test coverage for follow-up suggestions and social media embed stability.
    evidence:
      commits:
      - 55b28ca1a
      - 04c4ec244
      - d9179cd6c
      - f897c5a5a
      - 95a41fbb6
    release_status: released_main
  - text: Merged development branch updates into the main repository.
    evidence:
      commits:
      - 49c524a1f
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: New AI setting for follow-up suggestions.
      evidence:
        commits:
        - 43b99e6b8
      reason: New user-facing AI setting for follow-up suggestions.
    - text: Interactive touch drawer dragging for mobile and tablet.
      evidence:
        commits:
        - 429aabb81
        - d1a53706b
        - 3c2fdb51b
      reason: Significant improvement to the touch and tablet navigation experience.
    - text: Activation of the social media skill with corrected styling.
      evidence:
        commits:
        - f0fc5d012
        - 1a019b539
      reason: The social media skill is now fully enabled and styled.
    - text: Travel previews now include provider logos and arrival/departure times.
      evidence:
        commits:
        - ef480ab58
      reason: Enhanced travel information in chat previews.
