llm_summary:
  overview: OpenMates underwent a significant branding update, renaming the 'App Store' to 'Apps' and 'Settings & Memories'
    to 'Memories'. The project also introduced Bluesky social integration, enhanced the newsletter experience with auto-subscriptions
    and dedicated sidebar sections, and implemented security measures against ASCII smuggling. Significant foundational work
    was added for native Apple platforms, though these remain unreleased.
  released_changes:
  - text: OpenMates added Bluesky social links to the footer, settings, and newsletter templates.
    evidence:
      commits:
      - 92fb629cd
      - 355bf5eea
    release_status: released_main
  - text: The 'App Store' has been renamed to 'Apps' and 'Settings & Memories' is now 'Memories' across the web application
      and documentation.
    evidence:
      commits:
      - 59319d871
      - b9185f269
      - 95328a406
    release_status: released_main
  - text: The sidebar now features dedicated sections for announcements and tips & tricks, and authenticated users are now
      automatically subscribed to the newsletter.
    evidence:
      commits:
      - 1ecae5a84
      - 16c4fc1a8
      - 63d867694
    release_status: released_main
  - text: Chat headers now support 16:9 media frames with centered play buttons and native browser fullscreen video playback.
    evidence:
      commits:
      - 368bb7448
      - ca70c7431
      - 4b56c2a92
      - 2fef57cf1
      - 787745aa3
      - 2da3113c8
      - 99099c360
    release_status: released_main
  - text: A new text sanitizer was implemented to prevent ASCII smuggling in message inputs and deep links.
    evidence:
      commits:
      - f97972528
    release_status: released_main
  bug_fixes:
  - text: Refined message highlights by fixing hover grouping across fragments, resolving invisible text issues, and scoping
      anchors to the message body to avoid overlapping with embeds.
    evidence:
      commits:
      - 58308bbc1
      - d0f33812a
      - fbae45887
      - cbaf1f5f0
      - b2be5ea27
      - 6a4f96027
    release_status: released_main
  - text: Resolved newsletter issues including deep link double-firing and incorrect webapp URL resolution in email tasks.
    evidence:
      commits:
      - f0aa1a406
      - fda1b84fe
    release_status: released_main
  - text: Fixed UI glitches where app icons rendered as white blocks and ensured follow-up suggestions and highlights are
      hidden in legal or public chats.
    evidence:
      commits:
      - 265a43f20
      - 91ff93665
      - 7f73cf5d6
    release_status: released_main
  - text: Capped Celery worker concurrency to prevent memory exhaustion during background tasks.
    evidence:
      commits:
      - 96085da22
    release_status: released_main
  unreleased_progress:
  - text: Foundational work for native Apple platforms (iOS, iPadOS, macOS) progressed with the addition of 10k lines of Swift
      code covering CLI pairing, StoreKit payments, offline sync, and PII detection.
    evidence:
      commits:
      - 43be73509
      - 0fe0e60c8
      - b3bad017f
      - da4577f2c
      - 6f94ce63f
      - b3ce82536
      - 1b3175832
      - bff3f05c9
    release_status: released_main
  internal_progress:
  - text: Internal updates include newsletter thumbnail scripts, CLI debug command enhancements for subscriptions, and cleanup
      of unused video store logic.
    evidence:
      commits:
      - 868c15188
      - 773918f99
      - 24bef4093
      - 6ba8b5ab2
      - 394bc0016
      - aac5d5af1
      - cac8b6ee3
      - 2e211a9a4
    release_status: released_main
  newsletter_recommendation:
    include:
    - text: Integration of Bluesky social links across the footer, settings, and email templates.
      evidence:
        commits:
        - 92fb629cd
        - 355bf5eea
      reason: New social integration available to all users.
    - text: Renaming of the 'App Store' to 'Apps' throughout the interface and documentation.
      evidence:
        commits:
        - 59319d871
        - b9185f269
      reason: Significant branding change for the core platform.
    - text: Renaming of 'Settings & Memories' to 'Memories' with updated deep link aliases.
      evidence:
        commits:
        - 95328a406
      reason: User-facing terminology update for settings.
    - text: New sidebar sections for announcements and tips & tricks within the chat list.
      evidence:
        commits:
        - 16c4fc1a8
        - 63d867694
      reason: Improves navigation and visibility of project updates.
    - text: Introduction of a text sanitizer to prevent ASCII smuggling in message inputs and deep links.
      evidence:
        commits:
        - f97972528
      reason: Important security enhancement for message safety.
    exclude:
    - text: Native Apple app foundation and features.
      evidence:
        commits:
        - 43be73509
        - 0fe0e60c8
        - b3bad017f
        - da4577f2c
        - 6f94ce63f
        - b3ce82536
        - 1b3175832
        - bff3f05c9
      reason: The native Apple platforms (iOS and macOS) are currently listed as disabled features.
    - text: Security-related dependency upgrades for math-codegen and protobufjs.
      evidence:
        commits:
        - 87ad5dd50
        - 1cdad0e9f
      reason: Dependency updates are generally not included in user-facing newsletters unless they provide a direct feature.
    rationale: The newsletter focuses on the major branding shift from 'App Store' to 'Apps', the new Bluesky social presence,
      and security improvements. Native Apple app work is excluded as those platforms remain disabled in the current configuration.
  social_video_recommendations:
  - idea: Demonstrate the new 16:9 chat header media frames and the seamless transition to native fullscreen video.
    priority: medium
    reason: Visual improvement to the announcement and media experience.
    evidence:
      commits:
      - 368bb7448
      - ca70c7431
      - 4b56c2a92
  - idea: A quick walkthrough of the renamed 'Apps' and 'Memories' sections to help users navigate the updated interface.
    priority: low
    reason: Helps users adjust to the new terminology.
    evidence:
      commits:
      - 59319d871
      - 95328a406
  quality_notes:
  - Extensive E2E test coverage was added or updated to reflect the new 'Apps' architecture and route renames.
  - Native Apple app work includes a comprehensive suite of XCUITests and unit tests for future stability.
  validation_warnings: []
