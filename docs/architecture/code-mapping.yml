# Architecture Doc → Code Path Mapping
#
# Used by scripts/sessions.py to detect stale architecture docs.
# When code files are newer than their corresponding doc by >24 hours,
# the session start command flags the doc as potentially stale.
#
# Format:
#   doc-name.md:
#     - glob/pattern/to/related/code/**/*.py
#
# Glob patterns are relative to the project root.

