- name: auth_refresh_token
  domain: .openmates.org
  path: /
  http_only: true
  secure: true
  same_site: Lax
  value_length: 64
  first_observed: '2026-04-08'
  last_observed: '2026-05-04'
  seen_in_specs:
  - settings-buy-credits-stripe.spec.ts
  - skill-images-generate-safety.spec.ts
  - settings-support-stripe.spec.ts
  - skill-images-generate-safety-upload.spec.ts
  purpose: 'Server-issued session refresh token. The sole mechanism that keeps an

    authenticated user logged in across page reloads and tab restores. Without

    this cookie the user would have to re-enter their credentials on every

    request.

    '
  consent_exempt: true
  exemption_basis: 'Strictly necessary under ePrivacy Art. 5(3) / TTDSG §25 — "user-provided

    authentication" is one of the canonical examples of the strictly-necessary

    exemption in Art. 29 WP Opinion 04/2012 and the EDPB guidance that

    succeeded it. The cookie exists solely to maintain the authenticated

    session the user has explicitly requested by logging in.

    '
  notes: 'HttpOnly + Secure. SameSite=Lax (not Strict) is intentional: the cookie

    must be sent on top-level GET navigations from external links such as

    email verification and password-reset callbacks. Lax still blocks

    cross-site POST/PUT, so CSRF protection is preserved. See

    backend/core/api/app/routes/auth_routes/auth_session.py:115,354.

    '
