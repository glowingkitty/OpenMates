  purpose: 'Stripe.js fraud-prevention identifier. Set by Stripe checkout/elements when

    the user explicitly initiates a payment (credits purchase). Used by Stripe

    to detect card-testing and account-takeover fraud.

    '
  consent_exempt: true
  exemption_basis: 'Strictly necessary under ePrivacy Art. 5(3) / TTDSG §25 for a service

    "explicitly requested" by the user (the payment itself). CNIL, EDPB and

    BfDI guidance consistently treat payment anti-fraud cookies set at the

    moment the user initiates checkout as strictly necessary. The cookie is

    only placed on pages where the user has actively chosen to pay — never on

    normal browsing.

    '
  notes: 'Set by Stripe (processor), not OpenMates. Disclosed in the privacy policy

    under the Stripe subprocessor entry.

    '
