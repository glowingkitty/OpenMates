implementation_plan:
  spec_path: docs/specs/app-skill-output-safety/spec.yml
  existing_patterns:
    - backend/core/api/app/utils/text_sanitization.py provides safe recursive ASCII-smuggling cleanup and skip fields for encrypted/base64 data.
    - backend/apps/ai/processing/content_sanitization.py provides fail-closed GPT-OSS semantic scanning.
    - backend/apps/ai/processing/external_result_sanitizer.py provides nested long-text field selection and skip rules.
    - backend/shared/python_utils/app_skill_helpers.py is the current app-neutral bridge for AI-owned sanitizer helpers.
  architecture: >
    Add an app-neutral output safety helper that receives app/skill metadata,
    execution surface, request security context, cache/secrets dependencies when
    available, and the raw result. It always applies recursive ASCII cleanup. It
    applies semantic GPT-OSS scanning when the skill is classified as external-data
    and prompt-injection protection is enabled for that surface. Assistant and
    Workflow surfaces never accept opt-out. REST surfaces may opt out only after
    explicit API authentication has accepted a direct app-skill request.
  data_flow:
    - Caller builds app-skill request.
    - Surface code classifies source as assistant, workflow, or rest_programmatic.
    - REST extracts and removes canonical `security.prompt_injection_protection` before skill validation/execute.
    - Skill executes and returns raw result.
    - Shared output safety helper applies mandatory ASCII cleanup.
    - If external-data and semantic scanning is enabled, helper scans selected text fields using GPT-OSS and fails closed on scan errors.
    - Caller receives sanitized result plus optional non-sensitive safety metadata.
  phase_gates:
    - Backend unit tests define and prove the shared contract first.
    - CLI direct app-skill command maps opt-out to REST and is verified against dev API before SDK changes are treated as complete.
    - npm SDK and pip SDK parity tests follow CLI evidence.
    - Web UI is not changed; no Playwright or user visual confirmation required.
    - Apple is not directly changed; no Apple parity run required unless backend chat behavior changes unexpectedly.
  affected_files:
    - path: docs/specs/app-skill-output-safety/spec.yml
      reason: Durable executable product contract.
    - path: backend/shared/python_utils/app_skill_output_safety.py
      reason: New shared output safety service and policy helpers.
    - path: backend/shared/python_utils/app_skill_helpers.py
      reason: Re-export output safety helper without eager AI imports if needed.
    - path: backend/shared/python_schemas/app_metadata_schemas.py
      reason: Optional output-safety metadata schema for app.yml policy.
    - path: backend/core/api/app/services/skill_registry.py
      reason: Provide protected/raw dispatch distinction or policy metadata helpers.
    - path: backend/core/api/app/routes/apps_api.py
      reason: REST direct app-skill output protection and canonical opt-out extraction.
    - path: backend/apps/ai/processing/skill_executor.py
      reason: Assistant app-skill output protection with no opt-out.
    - path: backend/core/api/app/services/workflow_app_skill_adapter.py
      reason: Workflow output protection and hardcoded opt-out rejection.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: CLI opt-out flag for direct app-skill commands.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Client request option mapping.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK direct app-skill option mapping.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK direct app-skill option mapping.
    - path: scripts/audit_app_skill_output_safety.py
      reason: Deterministic guardrail for future skills and dispatch surfaces.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/app-skill-output-safety/spec.yml
    - python3 -m pytest backend/tests/test_app_skill_output_safety.py backend/tests/test_app_skill_rest_context.py backend/tests/test_workflow_app_skill_adapter.py backend/tests/test_content_sanitization.py
    - python3 scripts/audit_app_skill_output_safety.py
    - npm --prefix frontend/packages/openmates-cli test -- --runInBand frontend/packages/openmates-cli/tests/cli.test.ts frontend/packages/openmates-cli/tests/sdk.test.ts
    - python3 -m pytest packages/openmates-python/tests/test_sdk.py
    - python3 scripts/audit_sdk_cli_parity.py
  verification_order:
    - Backend pytest red/green evidence first.
    - Deterministic audit script after backend wiring.
    - CLI direct app-skill opt-out contract before SDK parity.
    - npm SDK and pip SDK parity tests after CLI evidence.
    - No web Playwright or Apple verification unless implementation expands scope.

