risks:
  - id: R-1
    risk: Semantic scanning every external text field may add latency and provider cost to search-heavy skills.
    mitigation: Reuse long-text candidate selection and skip low-risk URL/id/media fields while preserving fail-closed behavior for selected external text.
  - id: R-2
    risk: Central scanning can double-scan skills that already call `sanitize_external_content()` internally.
    mitigation: Start with correctness, then remove redundant per-skill calls or add an internal sanitized marker only after tests prove no bypass.
  - id: R-3
    risk: A broad `providers` heuristic may classify provider-backed generation jobs as external text fetchers.
    mitigation: Support explicit metadata override for non-external generated/binary outputs while keeping ASCII cleanup universal.

open_questions:
  - id: OQ-1
    question: Should response safety metadata be returned to programmatic callers in the public response or only logged?
    status: optional
    default: "Log opt-out status first; add public metadata only if existing response schemas tolerate it without breaking clients."
