scenarios:
  - id: S-1
    title: Assistant app-skill output is always protected
    given:
      - The assistant invokes `web.search` and receives provider text containing hidden Unicode Tags plus visible prompt-injection instructions.
      - A malicious user asks the assistant to disable prompt-injection protection before searching.
    when:
      - The skill result is returned to the AI processor as a tool result.
    then:
      - ASCII-smuggling characters are removed from every model-visible output text field.
      - GPT-OSS prompt-injection scanning runs because the skill returns external data.
      - The user's attempted opt-out is ignored and does not become a sanitizer bypass.
      - If GPT-OSS scanning fails, the external text is blocked before it reaches the model.

  - id: S-2
    title: REST caller can explicitly opt out of GPT-OSS scanning only
    given:
      - Alice calls `/v1/apps/web/skills/search` with an API key.
      - "Her request body includes `security.prompt_injection_protection: disabled`."
    when:
      - The backend dispatches the app skill and prepares the response.
    then:
      - The semantic GPT-OSS scan is skipped for that direct REST response.
      - ASCII-smuggling removal still runs and removes hidden Unicode.
      - The response or logs record that prompt-injection protection was disabled by the programmatic caller.

  - id: S-3
    title: CLI and SDKs map opt-out to the same REST contract
    given:
      - A developer uses the OpenMates CLI, npm SDK, or pip SDK to run an app skill directly.
    when:
      - They pass the client-specific opt-out option.
    then:
      - "The client sends `security.prompt_injection_protection: disabled` in the REST request body."
      - Without the option, the security field is omitted and backend prompt-injection scanning remains enabled.
      - No client can disable ASCII-smuggling removal.

  - id: S-4
    title: Workflow app-skill output is always protected
    given:
      - A Workflow app-skill node calls `news.search` or `weather.forecast`.
      - "The Workflow definition or node input includes `security.prompt_injection_protection: disabled`."
    when:
      - The Workflow runner executes the app-skill node.
    then:
      - Workflow code strips or ignores the prompt-injection opt-out before dispatch.
      - GPT-OSS scanning remains enabled for external-data output.
      - ASCII-smuggling removal remains enabled.

  - id: S-5
    title: Internal and non-external skill outputs avoid unnecessary GPT-OSS calls
    given:
      - A skill returns deterministic OpenMates task data, encrypted blobs, hashes, base64 media, or generated file metadata.
    when:
      - The shared output safety layer processes the result.
    then:
      - ASCII-smuggling removal still sanitizes normal text fields.
      - Prompt-injection scanning is skipped only when the skill is classified as not carrying external promptable text.
      - Encrypted, hash, key, and base64/media fields are preserved.

  - id: S-6
    title: Audit prevents new unsafe external-data skill drift
    given:
      - A contributor adds a new skill with an external provider or direct provider calls.
    when:
      - The app-skill output safety audit runs.
    then:
      - The audit fails unless the skill has an explicit output-safety policy or is covered by deterministic external-data inference.
      - The audit also fails on direct public dispatch patterns that bypass the safety service.

