schema_version: 2
id: app-skill-output-safety
title: App Skill Output Safety
status: approved

goal: >
  Guarantee that every app-skill output that can carry external data is protected
  before it reaches any assistant, Workflow, REST API, CLI, npm SDK, or pip SDK
  caller: ASCII-smuggling removal is always applied and cannot be disabled, while
  GPT-OSS prompt-injection scanning is on by default and can only be disabled by
  direct programmatic REST/CLI/SDK callers through an explicit request-body
  security flag.

scope:
  in:
    - A shared backend app-skill output safety layer used by all protected app-skill dispatch surfaces.
    - Recursive ASCII-smuggling removal for app-skill outputs, always on and never opt-out.
    - GPT-OSS prompt-injection scanning for external-data app-skill outputs, default on and fail-closed while enabled.
    - "A canonical REST request-body opt-out contract: `security.prompt_injection_protection: disabled`."
    - CLI, npm SDK, and pip SDK options that map to the canonical REST request-body security field.
    - Hardcoded rejection/ignoring of prompt-injection opt-out attempts from assistant tool calls and Workflow app-skill nodes.
    - App-skill metadata or deterministic policy inference that identifies external-data skills.
    - Audit guardrails preventing newly-added external-data skills or dispatch surfaces from bypassing output safety.
    - Backend, CLI, npm SDK, and pip SDK contract tests for default-on protection, explicit REST/SDK/CLI opt-out, and assistant/Workflow no-opt-out behavior.
  out:
    - Any web UI toggle to disable prompt-injection protection.
    - Any Workflow definition or Workflow node field that can disable prompt-injection protection.
    - Any assistant-controlled tool argument that can disable prompt-injection protection.
    - Disabling ASCII-smuggling removal under any surface.
    - Replacing `openai/gpt-oss-safeguard-20b` with a different model.
    - Changing image/content-generation safety policy beyond app-skill output text scanning.
    - Scanning encrypted blobs, Vault ciphertext, AES keys, hashes, base64 media, binary payloads, or image bytes.

