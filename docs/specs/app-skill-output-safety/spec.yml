  findings:
    - Existing main backend `sanitize_external_content()` uses `openai/gpt-oss-safeguard-20b` and fails closed when scanning cannot complete.
    - Current REST app-skill output path performs recursive ASCII cleanup but not GPT-OSS prompt-injection scanning.
    - Current assistant tool-call output path performs central recursive ASCII cleanup but not central GPT-OSS prompt-injection scanning.
    - Current Workflow app-skill adapter calls `SkillRegistry.dispatch_skill()` directly and has no central output safety wrapper.
    - Several individual external-data skills call the sanitizer themselves, but coverage is decentralized and incomplete.
    - The architecture doc already promises programmatic opt-out, but no implemented request-body, CLI, npm SDK, or pip SDK opt-out flag was found.

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This is backend/API/CLI/SDK safety behavior and does not add an Apple UI or native app-skill execution surface.
    - Apple chat behavior benefits from assistant-side backend enforcement and must not gain any opt-out path.
  verification:
    - Apple not directly affected; backend tests prove assistant outputs are protected regardless of client.
  intentional_native_differences:
    - Apple exposes no programmatic direct app-skill opt-out.

clarification:
  rounds:
    - question: Should assistant and Workflow calls ever be allowed to disable prompt-injection protection?
      answer: No. Assistant and Workflow opt-out must be hardcoded prevented; only REST API, CLI, npm SDK, and pip SDK direct app-skill calls may opt out.
    - question: Should GPT-OSS scanner failure fail closed or degrade to ASCII-only?
      answer: Fail closed while prompt-injection protection is enabled.
    - question: Should the canonical programmatic opt-out be a request-body field instead of a header?
      answer: "Yes. Use request-body `security.prompt_injection_protection: disabled`, with CLI and SDK options mapping to that field."
  vision_summary: >
    App skill authors and callers should not need to remember output security. The
    backend should guarantee ASCII cleanup everywhere, run GPT-OSS scanning by
    default for external-data outputs, reject assistant/Workflow opt-outs by
    construction, and only honor a direct programmatic REST/CLI/SDK opt-out that
    remains explicit and auditable.
  approved_by_user: true

