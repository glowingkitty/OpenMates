decisions:
  - id: D-1
    status: active
    decision: ASCII-smuggling removal for app-skill outputs is mandatory and has no opt-out on any surface.
    reason: Hidden Unicode instructions are never legitimate model-visible control data and deterministic cleanup has no external dependency.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-2
    status: active
    decision: GPT-OSS prompt-injection scanning defaults on and fails closed while enabled.
    reason: Returning unscanned external content after a scanner failure would violate the security contract.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-3
    status: active
    decision: Only direct REST/CLI/npm SDK/pip SDK app-skill calls may disable semantic prompt-injection scanning.
    reason: Those are explicit programmatic calls where the authenticated caller owns the request body; assistant and Workflow calls can execute unattended or be influenced by untrusted content.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-4
    status: active
    decision: "The canonical opt-out wire contract is `security.prompt_injection_protection: disabled` in the request body."
    reason: One request-body contract can be generated into CLI and SDK options and remains visible in logs/audits without custom header handling.
    decided_at: "2026-07-19T00:00:00Z"

