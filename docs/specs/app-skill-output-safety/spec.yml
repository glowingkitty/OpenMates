contracts:
  api:
    - "Direct REST app-skill request bodies may include `security.prompt_injection_protection: disabled`."
    - Any other value, missing field, or malformed security object keeps prompt-injection protection enabled.
    - Internal request payloads should carry sanitized security context via underscore-prefixed fields only after REST authorization, never from assistant or Workflow inputs.
    - Public response data may include non-sensitive safety metadata indicating whether semantic protection was enabled or disabled by the caller.
  cli:
    - Direct app-skill commands expose `--disable-prompt-injection-protection`.
    - The flag only affects direct app-skill REST calls and does not affect chat, assistant, or Workflow execution.
  npm_sdk:
    - Direct generated app-skill methods accept an explicit option such as `{ promptInjectionProtection: false }`.
    - The generic `runAppSkill` path, if retained internally, maps the same option to the canonical request-body field.
  pip_sdk:
    - Direct generated app-skill methods accept an explicit option such as `prompt_injection_protection=False`.
    - The option maps to the canonical request-body field.
  workflow:
    - Workflow definitions, node configs, and input mappings cannot disable prompt-injection scanning.
    - "The Workflow adapter removes or ignores `security.prompt_injection_protection: disabled` before app-skill dispatch."
  privacy_security:
    - ASCII-smuggling removal runs on all app-skill outputs for all surfaces and cannot be turned off.
    - GPT-OSS scanning uses `openai/gpt-oss-safeguard-20b` through existing content sanitization plumbing.
    - GPT-OSS scanner failures fail closed while protection is enabled.
    - Logs may record counts, app/skill, user/API-key hashes, and opt-out status, but must not log full private provider payloads beyond existing truncated diagnostics.
    - Assistant and Workflow opt-out attempts are security events and must not be accepted as user-authorized programmatic opt-out.

