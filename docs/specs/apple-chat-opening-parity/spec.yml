implementation_plan:
  existing_patterns:
    - docs/specs/scalable-chat-embed-loading/spec.yml
    - frontend/apps/web_app/tests/chat-flow.spec.ts
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
    - apple/OpenMates/Sources/DevPreview/DevPreviewLaunchConfiguration.swift
  architecture: >
    Add an Apple-native chat-window loading abstraction that mirrors the web
    bounded loading model. `MainAppView` should pass chat identity and lightweight
    metadata into `ChatView`, while `ChatViewModel` requests/decrypts only the
    latest visible window first and hydrates older pages on demand. Add a UI test
    target and live-dev seed helper to verify opening a deterministic large chat.
  data_flow:
    - UI test logs into the live dev Apple app with a reserved test account.
    - Test seed helper creates or resets a deterministic encrypted large chat for that account.
    - App opens the seeded chat and obtains chat metadata plus a bounded latest-turn window.
    - ChatViewModel decrypts only visible messages and lightweight preview records.
    - Debug counters/signposts are exposed to the UI test through a test-only channel.
    - Older messages and full embeds hydrate only after explicit user action.
  affected_files:
    - path: scripts/apple_remote.py
      reason: Provide redacted local-only remote Mac/Xcode verification wrapper for Linux sessions.
    - path: backend/tests/test_apple_remote.py
      reason: Guard Apple remote wrapper discovery, redaction, cleanup, and destructive-command behavior without network access.
    - path: apple/OpenMates.xcodeproj/project.pbxproj
      reason: Add OpenMatesTests/OpenMatesUITests targets or equivalent test target wiring.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Stop passing full per-chat arrays as the initial open dependency for large user chats.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Introduce bounded source/cursor loading, counters, older-page hydration, and lazy embed behavior.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Add bounded local message/embed/compression metadata reads.
    - path: apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
      reason: Track chat metadata and visible windows without requiring complete per-chat arrays.
    - path: apple/OpenMates/Sources/Core/Networking/SyncManager.swift
      reason: Request and apply bounded content windows when opening a chat.
    - path: apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
      reason: Route any bounded chat-window response events needed by native open flow.
    - path: apple/OpenMates/Sources/Features/Embeds/Views/EmbedPreviewCard.swift
      reason: Ensure preview cards render from lightweight parent metadata and trigger full hydration only on explicit open.
    - path: apple/OpenMatesUITests/ChatOpeningScalabilityUITests.swift
      reason: Live-dev simulator E2E for seeded large chat opening.
    - path: apple/OpenMatesUITests/ChatFlowParityUITests.swift
      reason: Simulator parity screenshot and visible hierarchy checks.
    - path: apple/OpenMatesTests/ChatWindowLoadingTests.swift
      reason: Fast native unit coverage for bounded local window reads and compression metadata.
    - path: scripts/apple_chat_parity_audit.py
      reason: Deterministic parity guard for mapped chat-flow constants, identifiers, and forbidden native controls.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-chat-opening-parity/spec.yml
    - python3 scripts/spec_verify.py docs/specs/apple-chat-opening-parity/spec.yml --phase red
    - xcodebuild test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=<simulator>" -only-testing:OpenMatesTests/ChatWindowLoadingTests
    - python3 scripts/apple_chat_parity_audit.py --surface chat-flow
    - xcodebuild test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=<simulator>" -only-testing:OpenMatesUITests/ChatOpeningScalabilityUITests/testSeededLargeChatOpensWithinBoundedWork
    - xcodebuild test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=<simulator>" -only-testing:OpenMatesUITests/ChatFlowParityUITests/testVisibleChatFlowElementsMatchWebParitySnapshot
    - python3 scripts/spec_verify.py docs/specs/apple-chat-opening-parity/spec.yml

