id: apple-chat-opening-parity
title: Apple Chat Opening Scalability And Web Parity
status: implementing

goal: >
  Make the Apple app open large encrypted chats quickly and safely by matching
  the web app's bounded chat-window loading model, while preserving visual and
  interaction parity for the visible chat-flow UI. A deterministic live-dev iOS
  simulator test should prove a seeded large chat opens without loading or
  decrypting the full chat, without sending a new AI message.

scope:
  in:
    - Authenticated Apple iOS chat opening for existing user-owned chats.
    - Deterministic seeded large chat for a live dev backend test account.
    - Initial open at the latest user/assistant turn using a bounded message window.
    - Older message hydration on explicit upward scroll or equivalent native action.
    - Lightweight embed preview loading for visible-window embeds only.
    - Deferring full child embed content decryption/loading until explicit fullscreen/open/copy/download actions.
    - Multiple compression summaries represented as lightweight window metadata, without loading forgotten message ranges on initial open.
    - Debug counters or signposts proving bounded reads, decryptions, embed hydration, and first useful render timing.
    - Native iOS UI test target and simulator test that logs into the live dev backend, opens the seeded chat, and verifies load behavior only.
    - Web-rendered CSS inspection for visible chat-flow UI elements, with a deterministic parity check where practical.
  out:
    - Sending a new chat prompt or waiting for a new AI response in the large-chat load test.
    - Replacing the zero-knowledge encryption model.
    - Shared-chat recipient implementation in the first Apple slice.
    - Full Apple implementation of message deep links and copy-link actions in the first slice.
    - Rewriting the whole app shell to UIKit.
    - Hard performance tuning for exact device classes beyond a first generous simulator threshold.
    - Storing private test credentials, private chat IDs, raw logs, or device/host details in git.

