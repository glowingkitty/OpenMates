risks:
  - Adding an Xcode test target by editing project.pbxproj is fragile; verify with a real Xcode build/test on the Mac immediately after target wiring.
  - Live-dev UI tests can become flaky if they depend on real network latency; keep the threshold generous and prioritize bounded-work counters for regressions.
  - Browser CSS parity can become brittle if implemented as pixel-perfect screenshots; prefer token/constant/identifier audits and keep screenshot comparison manual unless a stable baseline is proven.
  - A test-only seed path must be locked to dev/test environments and must never expose private data or secrets.
  - Moving from full-chat arrays to bounded windows can affect notification replies, offline sends, previous/next navigation, and Handoff; include targeted review before deploy.

open_questions:
  - Which exact reserved Apple UI test account slot and seed endpoint name should be used? Keep the answer in environment/CI config, not in this spec.
  - Should the first seed helper live in an existing backend test/admin route, or in a dedicated dev-only test fixture route?
  - Which browser automation tool should capture the first web computed-style snapshot for the parity audit in this repo environment?
