    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift
    - apple/OpenMates/Sources/Core/Networking/SyncManager.swift
    - apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedPreviewCard.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedContentView.swift
    - apple/OpenMatesUITests/ChatOpeningScalabilityUITests.swift
    - apple/OpenMatesTests/ChatWindowLoadingTests.swift
  parity_expectations:
    - The visible chat-flow UI in the Apple app must match the rendered web app source of truth for the chat shell, chat header, message bubbles, composer, embed preview cards, loading states, and sidebar-open/closed assumptions that apply on iPhone.
    - Browser-rendered computed CSS values must be inspected before visual Swift changes; Svelte/CSS source alone is not enough when computed values differ.
    - The Apple data-flow contract must match the web scalability contract at the storage/sync boundary, not merely render a 50-message subset after full data has already been loaded or decrypted.
  verification:
    - Remote Mac or XcodeBuildMCP build of OpenMates_iOS.
    - Remote Mac or XcodeBuildMCP `xcodebuild test` for the new iOS UI test target against the live dev backend.
    - Simulator screenshot evidence of the seeded large chat after initial open.
    - Deterministic parity check output comparing captured web computed values against Apple token/constant mappings where practical.
  intentional_native_differences:
    - Native simulator tests use XCTest/XCUITest instead of Playwright.
    - Native can use UIKit/AppKit wrappers for the transcript hot path if SwiftUI profiling or the spec test shows scroll/render jank.
    - OS-owned controls remain native where `apple/AGENTS.md` explicitly allows them.

clarification:
  rounds:
    - question: Should the Apple simulator E2E use the live dev backend/test account like chat-flow.spec.ts, or a deterministic seeded/debug fixture for the long-chat/embed stress case?
      answer: >
        Use the live dev backend/test account like chat-flow.spec.ts.
    - question: Should the test create a deterministic chat or reuse an existing persistent test-account chat, and should it send a new prompt?
      answer: >
        Create a deterministic chat and only test loading the chat, not responding to it.
    - question: Should the first performance gate use bounded-work counters only or also a user-visible speed threshold?
      answer: >
        Use the recommended approach: both bounded-work counters and a generous
        first visible-load threshold.
    - question: Should chat-flow UI element parity be included using browser-rendered CSS as the source of truth, and should we look for a deterministic check?
      answer: >
        Yes. Ensure visible chat-flow UI elements render like the web app by
        opening the web app in a browser, analyzing exact rendered CSS values,
        using those as the source of truth for Apple, and checking whether a
        deterministic parity check can improve reliability.
  vision_summary: >
    The Apple app should open a seeded large encrypted chat on live dev quickly
    without loading or decrypting all messages, child embeds, or compression
    ranges. The simulator E2E should verify only the load/open path and visible
    chat-flow parity, not AI response generation. Visual behavior should be
    grounded in browser-rendered web CSS values and backed by deterministic
    parity checks where they are reliable.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple opens a seeded large chat at the latest turn
    given:
      - The iOS simulator is logged into a live dev test account.
      - A deterministic dev seed helper has created a large encrypted chat with hundreds of messages, many embeds, and multiple compression summaries.
      - The latest turn is a visible user message followed by a visible assistant response.
    when:
      - The UI test opens the seeded chat in the Apple app.
    then:
      - The latest user and assistant messages become visible within the initial generous threshold.
      - Initial open reads and decrypts only a bounded latest-turn message window.
      - Older message ranges and forgotten/compressed ranges are not loaded or decrypted during initial open.
      - The app remains responsive and the simulator can capture a screenshot of the loaded chat.

  - id: S-2
    title: Apple hydrates older messages only after explicit upward navigation
    given:
      - The seeded large chat has opened at the latest turn.
      - Older messages exist above the visible window.
    when:
      - The user scrolls upward or taps the native load-earlier control.
    then:
      - Apple requests, reads, and decrypts the next bounded older-message page.
      - The scroll anchor is preserved enough that the visible content does not jump unexpectedly.
      - Additional pages are not fetched until another explicit upward navigation trigger.

  - id: S-3
    title: Apple keeps full embed content lazy during initial chat open
    given:
      - The visible latest-turn window references parent embeds and child embeds.
      - Parent embed records include enough lightweight preview metadata to render useful preview cards.
    when:
      - The chat initially opens.
    then:
      - Visible parent embed previews render useful status, title, app/skill identity, and preview metadata.
      - Child embed content and full encrypted embed payloads are not decrypted or loaded for preview-only rendering.
      - Opening an embed fullscreen triggers on-demand full embed hydration for the selected embed only.

  - id: S-4
    title: Apple treats compression summaries as lightweight window metadata
    given:
      - The seeded chat has multiple compression summaries and forgotten message ranges.
    when:
      - Apple opens the chat at the latest turn.
    then:
      - The initial window can show relevant latest summary context if needed.
      - Forgotten ranges behind compression summaries are not loaded or decrypted during initial open.
      - Explicit older-message navigation can load a bounded page around a summary boundary.

  - id: S-5
    title: Apple chat-flow UI matches the rendered web source of truth
    given:
      - The web app chat flow is opened in a browser at the matching viewport and state.
      - Computed CSS values are captured for the visible chat shell, header, message bubbles, composer, embed previews, loading states, and sidebar-open/closed behavior.
    when:
      - The Apple app renders the same visible chat-flow state in the iOS simulator.
    then:
      - SwiftUI/Native values use generated tokens or documented justified literals that match the browser-computed CSS contract.
      - Product UI does not regress to default native controls forbidden by `apple/AGENTS.md`.
      - Any intentional native difference is documented in the spec evidence or parity report.

  - id: S-6
    title: Deterministic checks guard the scalable-loading and UI parity contracts
    given:
      - The Apple project has new tests/scripts for bounded loading and parity checking.
    when:
      - CI or a remote Mac runs the documented verification commands.
    then:
      - A native unit test fails if initial chat open requires full-chat in-memory arrays before rendering.
      - The UI test fails if initial load exceeds the first threshold or counters show full-chat decrypt/load work.
      - A deterministic parity audit flags drift for mapped chat-flow dimensions, tokens, identifiers, or forbidden native controls where practical.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Apple opens a seeded large live-dev chat at the latest turn without reading, decrypting, or publishing the full message history before first useful render.
  - id: AC-2
    scenario: S-2
    text: Older messages hydrate in bounded pages only after explicit upward navigation, with visible scroll position preserved.
  - id: AC-3
    scenario: S-3
    text: Initial chat open renders useful lightweight parent embed previews while deferring child/full embed content hydration until explicit embed actions.
  - id: AC-4
    scenario: S-4
    text: Compression summaries and forgotten ranges do not cause full pre-checkpoint message loads during initial Apple chat open.
  - id: AC-5
    scenario: S-5
    text: Visible Apple chat-flow UI matches browser-rendered web computed values for the mapped chat shell, header, messages, composer, embed previews, and loading states, except documented intentional native differences.
  - id: AC-6
    scenario: S-6
    text: Native tests and deterministic audits catch regressions in bounded loading, live-dev large-chat opening, testability identifiers, and mapped chat-flow visual constants.

contracts:
  api:
    - route: "Test-only deterministic seed path for live dev large chat"
      request: "Authenticated or admin/test-only request with placeholder test user, deterministic fixture name, message count, embed count, compression summary count, and idempotency key."
      response: "Seeded chat id, latest user message id, latest assistant message id, expected bounded counts, and optional cleanup metadata."
      errors:
        - Unavailable outside dev/test environments.
        - Unauthorized without approved test credentials.
        - Must not expose plaintext private user data, credentials, or raw keys in logs or responses.
    - route: "Existing or successor Apple chat window sync/read path"
      request: "chat id plus optional anchor, direction, and bounded limit."
      response: "Encrypted bounded message window, lightweight embed preview metadata, compression summary metadata, and key wrappers needed for visible content only."
      errors:
        - Unauthorized when the user cannot access the chat.
  data:
    - "`ChatStore` must not require complete `messagesByChat[chatId]` or `embedsByChat[chatId]` arrays before `ChatView` can first render a large existing chat."
    - "`OfflineStore` needs bounded message-window reads and, where needed, bounded embed/preview reads keyed by visible message refs."
    - "`ChatViewModel` should accept a chat-window source or cursor model rather than treating `allMessages` as the full chat history for existing synced chats."
    - Compression summaries should be represented as lightweight window metadata and not force forgotten message ranges into memory.
    - Debug counters/signposts must expose initial message rows read, message decrypt attempts, embed records read, full embed decrypt attempts, compression ranges read, and first useful render time.
  ui_states:
    - Initial large-chat loading.
    - Latest-turn visible.
    - Older-page loading.
    - Lightweight embed preview visible.
    - Full embed loading after explicit action.
    - Compression summary visible/collapsed older range.
    - Error state for failed seed/open/load.
  privacy_security:
    - Seeded live-dev chats must use test-only users and sanitized deterministic content.
    - Test credentials and seeded chat IDs must stay in local environment, CI secrets, or test artifacts, not committed specs/docs.
    - No test or debug counter may log plaintext encrypted message content, raw encryption keys, private emails, hostnames, IPs, or device names.
    - Client-side decryption remains local to the Apple app.

tests:
  - id: T-APPLE-UNIT-WINDOWS
    type: unit
    file: apple/OpenMatesTests/ChatWindowLoadingTests.swift
    command: xcodebuild test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=<simulator>" -only-testing:OpenMatesTests/ChatWindowLoadingTests
    covers:
      - AC-1
      - AC-2
      - AC-4
    assertions:
      - bounded latest-turn query returns only the configured message window for a synthetic large local store
      - older-page query returns one bounded page and does not materialize all older messages
      - compression summary metadata is returned without loading forgotten message ranges
      - first-render path can be driven without passing full-chat arrays through ChatStore
    red_phase:
      required: true
      expected: fail
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: ""
        run_id: ""
        timestamp: ""

  - id: T-APPLE-UI-LARGE-CHAT-OPEN
    type: manual
    file: apple/OpenMatesUITests/ChatOpeningScalabilityUITests.swift
    command: xcodebuild test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=<simulator>" -only-testing:OpenMatesUITests/ChatOpeningScalabilityUITests/testSeededLargeChatOpensWithinBoundedWork
    covers:
      - AC-1
      - AC-3
      - AC-4
      - AC-6
    assertions:
      - test logs into the live dev backend using a reserved Apple UI test account
      - test creates or resets the deterministic large chat through the approved seed path
      - opening the seeded chat shows the latest user and assistant messages within 5 seconds on the simulator
      - bounded-work counters show initial message decrypt/read count is limited to the configured window plus small overhead
      - counters show full child embed decrypt/load count is zero before explicit embed open
      - counters show forgotten compression ranges are not loaded during initial open
      - simulator screenshot is captured after latest turn is visible
    red_phase:
      required: true
      expected: fail
