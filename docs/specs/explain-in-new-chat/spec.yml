id: explain-in-new-chat
title: Explain Selected Text In New Chat
status: implementing

goal: >
  Let users select text inside an assistant response and start a background chat
  that explains the selected term or phrase without adding follow-up messages to
  the current chat history.

scope:
  in:
    - A selection-toolbar action labeled "Explain in new chat" for authenticated users selecting text in assistant messages.
    - Creating a new background chat from the current chat context up to the selected assistant message.
    - Automatically sending an explanation prompt in the new chat using the selected text.
    - Showing an immediate notification that the background explanation chat started, with an action to open it.
    - Reusing normal chat completion behavior once the background chat responds.
  out:
    - User-created sub-chat creation from selected text.
    - Backend API routes or Directus schema changes.
    - Auto-opening the new chat immediately after selection.
    - Explanation actions for unauthenticated, shared read-only, incognito, or user messages in the first slice.
    - Custom prompt editing before send.

context_discovery:
  github_issues:
    - "No matching public issue found via gh fallback search: explain selected text new chat fork selection toolbar."
  docs:
    - docs/architecture/data/sync.md
    - docs/architecture/phased_sync_handler.md
  code_patterns:
    - frontend/packages/ui/src/components/MessageSelectionToolbar.svelte
    - frontend/packages/ui/src/components/ChatMessage.svelte
    - frontend/packages/ui/src/services/forkChatService.ts
    - frontend/packages/ui/src/components/settings/fork/SettingsFork.svelte
    - frontend/packages/ui/src/stores/forkProgressStore.ts
  tests:
    - frontend/apps/web_app/tests/message-highlights.spec.ts
    - frontend/apps/web_app/tests/message-highlights-touch.spec.ts
    - frontend/apps/web_app/tests/fork-conversation.spec.ts

clarification:
  rounds:
    - question: Should the action prefill an editable prompt or auto-send the explanation request in the new chat?
      answer: >
        Auto-send it. Clicking "Explain in new chat" should open a new chat in
        the background with an instruction like "Tell me more about: (term)",
        notify the user that a background chat started, and provide a button to
        open the chat if desired.
  vision_summary: >
    The selected text is treated as a lightweight background follow-up. The
    current chat remains untouched, the new chat gets the prior context by
    forking up to the selected assistant message, and the user can either keep
    reading or jump to the background explanation chat from the notification.
  approved_by_user: true

scenarios:
  - id: "S-1"
    title: Start background explanation from selected assistant text
    given:
      - Alice is authenticated and viewing an assistant response in a normal chat.
      - Alice selects the phrase "vector database" inside that assistant response.
    when:
      - Alice clicks "Explain in new chat" in the floating selection toolbar.
    then:
      - The current chat stays open and receives no new user message.
      - A new chat is created in the background from the current chat through the selected assistant response.
      - "The new chat automatically sends a user message: Tell me more about: vector database."
      - Alice sees a notification that the background explanation chat started with an action to open it.

  - id: "S-2"
    title: Open the background explanation chat from notification
    given:
      - Alice started an explanation chat from selected assistant text.
      - The background chat exists locally and is processing its auto-sent prompt.
    when:
      - Alice clicks the notification action.
    then:
      - The app navigates to the new explanation chat.
      - The auto-sent explanation prompt is visible in the transcript.
      - The assistant response streams and completes like any other chat response.

  - id: "S-3"
    title: Hide explanation action where it is not allowed
    given:
      - Bob is unauthenticated, reading a shared read-only chat, using an incognito chat, or selecting text in a user message.
    when:
      - Bob selects message text.
    then:
      - The floating selection toolbar does not offer "Explain in new chat".
      - Existing Highlight and Highlight & comment behavior remains unchanged where those actions are allowed.

acceptance_criteria:
  - id: "AC-1"
    scenario: "S-1"
    text: Selecting text in an authenticated non-incognito assistant message exposes an "Explain in new chat" action.
  - id: "AC-2"
    scenario: "S-1"
    text: "Clicking the action creates a forked background chat through the selected assistant message and auto-sends Tell me more about: <selected text> without modifying the current chat transcript."
  - id: "AC-3"
    scenario: "S-1"
    text: The user receives an immediate notification that the background explanation chat started, with an action that opens the new chat.
  - id: "AC-4"
    scenario: "S-2"
    text: Opening the new chat shows the auto-sent prompt and normal assistant response lifecycle.
  - id: "AC-5"
    scenario: "S-3"
    text: The action is hidden for unauthenticated users, shared read-only chats, incognito chats, and user-message selections.

contracts:
  api:
    - route: none
      request: "No new backend route. Reuse existing encrypted chat persistence and normal send-message flow."
      response: "Normal WebSocket chat events for the auto-sent background message."
      errors:
        - Existing fork/send failures surface via notification errors.
  data:
    - The explanation chat is a normal chat, not a sub-chat, and must not set parent_id or is_sub_chat.
    - The explanation chat copies encrypted context using the existing fork pipeline up to the selected assistant message.
    - The explanation prompt is stored as a normal encrypted user message in the new chat.
  ui_states:
    - Selection toolbar with Highlight, Highlight & comment, and Explain in new chat for allowed assistant selections.
    - Immediate success notification with open-chat action after background chat start.
    - Existing fork/progress and normal chat notification behavior remain intact.
  privacy_security:
    - The selected text and forked transcript remain client-side plaintext only before normal encryption.
    - No plaintext selected text is sent outside the normal encrypted chat message flow.
    - Shared read-only and unauthenticated viewers cannot start explanation chats from protected content.

