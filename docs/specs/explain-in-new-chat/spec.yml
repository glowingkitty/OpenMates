implementation_plan:
  existing_patterns:
    - MessageSelectionToolbar already captures selected text actions in a touch-safe way.
    - ChatMessage already owns selection capture, current message identity, and fork context.
    - forkChatService already creates zero-knowledge background fork chats and notification actions.
    - MessageInput exposes sendCurrentMessage and setSuggestionText for normal auto-send flows.
  architecture: >
    Extend the existing selection toolbar with an optional explain action. Add a
    focused service or fork-service option that forks the source chat through the
    selected assistant message, saves the explanation prompt in the new chat, and
    dispatches the normal send flow in the background without changing the active
    source chat.
  data_flow:
    - User selects text in an assistant response.
    - ChatMessage captures both the selected text and the assistant message ID.
    - Explain action calls the fork/background-start flow with source chat ID, fork point message ID, selected text, and generated prompt.
    - The new chat is created locally and synced through existing encrypted storage.
    - The prompt is sent through the normal chat send path for the new chat.
    - Notification action sets activeChatStore to the new chat ID.
  affected_files:
    - path: frontend/packages/ui/src/components/MessageSelectionToolbar.svelte
      reason: Add optional Explain in new chat button.
    - path: frontend/packages/ui/src/components/ChatMessage.svelte
      reason: Wire selected assistant text to background explanation flow and hide action for disallowed states.
    - path: frontend/packages/ui/src/services/forkChatService.ts
      reason: Reuse fork creation for background explanation chat creation.
    - path: frontend/packages/ui/src/i18n/sources/chats.yml
      reason: Add user-visible labels and notifications.
    - path: frontend/apps/web_app/tests/explain-in-new-chat.spec.ts
      reason: Cover the feature end-to-end.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/explain-in-new-chat/spec.yml
    - python3 scripts/run_tests.py --spec explain-in-new-chat.spec.ts
    - bash scripts/lint_changed.sh --path docs/specs/explain-in-new-chat/spec.yml --path frontend/apps/web_app/tests/explain-in-new-chat.spec.ts --path frontend/packages/ui/src/components/MessageSelectionToolbar.svelte --path frontend/packages/ui/src/components/ChatMessage.svelte --path frontend/packages/ui/src/services/forkChatService.ts --path frontend/packages/ui/src/i18n/sources/chats.yml

