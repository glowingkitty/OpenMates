implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte
    - frontend/packages/ui/src/components/enter_message/editorConfig.ts
    - frontend/packages/ui/src/message_parsing/parse_message.ts
    - frontend/packages/ui/src/message_parsing/serializers.ts
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift
  architecture: >
    Add a TiptapComposerWebView Swift component and bridge model that can be
    hosted inside the existing MessageComposerView field area. Bundle a minimal
    local Tiptap composer asset and use WKScriptMessageHandler plus
    evaluateJavaScript for event and command flow. Preserve the current native
    composer shell and transcript renderers.
  data_flow:
    - Swift creates the composer host and loads the bundled editor asset.
    - JavaScript posts `ready` when the Tiptap editor is initialized.
    - User edits update Tiptap state and post canonical markdown, hasContent, and height to Swift.
    - Swift updates send button state and host diagnostics without logging private plaintext.
    - Native actions insert pending embed state or editor markdown through bridge commands as needed.
    - Send calls the existing native send pipeline with canonical markdown and clears the WebView editor on success.
  affected_files:
    - path: apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift
      reason: New WKWebView wrapper and bridge coordinator.
    - path: apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
      reason: Host WebView editor in place of SwiftUI TextField while preserving native shell.
    - path: apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
      reason: Remove or bypass TextField editor responsibility from product composer field.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Connect bridge content to messageText/sendMessage and native action callbacks.
    - path: apple/OpenMates.xcodeproj/project.pbxproj
      reason: Add new Swift files and local WebView editor asset bundle to app/test targets.
    - path: apple/OpenMatesTests/TiptapComposerBridgeTests.swift
      reason: Unit-test bridge event/command contracts.
    - path: apple/OpenMatesUITests/ComposerVisualParityUITests.swift
      reason: Verify WebView-backed composer readiness, typing, height, and send behavior.
    - path: scripts/apple_composer_audit.py
      reason: Guard against returning to native TextField product composer and against accidental transcript WebView scope creep.
  verification_strategy:
    - Validate this spec before implementation.
    - Confirm local bundling approach for the minimal Tiptap editor asset.
    - Add red static/unit/UI checks before source implementation where practical.
    - Implement bridge and host migration in the main chat/new-chat composer only.
    - Run remote Mac status, build, targeted unit/UI tests, then TestFlight upload.
  verification_order:
    - python3 scripts/spec_validate.py docs/specs/apple-tiptap-webview-composer/spec.yml
    - python3 scripts/apple_composer_audit.py red
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/TiptapComposerBridgeTests red
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ComposerVisualParityUITests red
    - implementation
    - python3 scripts/apple_composer_audit.py green
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - targeted Apple unit/UI tests green
    - TestFlight upload
  risks:
    - Reusing the full Svelte MessageInput component may pull in web app stores and runtime dependencies that are too heavy for a local WKWebView asset; a minimal Tiptap bridge bundle may be safer.
    - WKWebView focus and keyboard behavior can differ from SwiftUI TextField and may require explicit first-responder handling.
    - UI tests cannot type into a WebView exactly like native text fields unless the wrapper exposes stable focus and diagnostics hooks.
    - WebView content height and native layout can loop if both sides update too aggressively; height changes need throttling.
    - TestFlight upload may be blocked by signing, credentials, App Store Connect, or remote Mac availability.

