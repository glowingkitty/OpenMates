assumptions:
  - id: A-1
    text: The web Tiptap write-mode editor can be bundled as a local asset for WKWebView without loading the production web route or private server data.
    category: architecture
    required_before: implementation
    status: checking
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/MessageInput.svelte
        summary: The existing web editor is a component with many store dependencies; implementation must confirm whether to reuse it through a generated minimal bundle or extract a smaller bridge editor module.
  - id: A-2
    text: Keeping chat history native is the correct first-slice boundary.
    category: product_scope
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification
        summary: User selected composer-only scope.
      - source: docs/architecture/frontend/virtual-scrolling-chat-history.md
        summary: Web transcript Tiptap instances are already a performance concern, so introducing a transcript WebView requires separate evidence.
  - id: A-3
    text: TestFlight upload credentials and remote Mac signing/export setup are available through existing repo scripts or operator-provided local configuration.
    category: deployment
    required_before: completion
    status: unchecked
    evidence:
      - source: pending verification
        summary: Implementation must discover the current Apple deployment/TestFlight flow before attempting upload.

contracts:
  api:
    - No product API route changes are required.
    - Existing Apple send APIs receive canonical markdown from the WebView bridge.
  data:
    - Swift host state owns chat id, pending uploads, pending composer embeds, PII warnings, focus/incognito state, auth policy, recording state, and send lifecycle.
    - WebView editor state owns editable Tiptap document state, selection, paste normalization, markdown decorations, and canonical markdown serialization.
    - Bridge event payloads contain only sanitized fields: event type, content markdown when needed, hasContent, height, focus state, and error category/message without secrets.
  ui_states:
    - Default empty composer.
    - Focused empty composer.
    - Multiline typed composer with height changes.
    - Markdown/code/URL typed composer.
    - Pending attachment and upload progress around composer.
    - Recording short-tap hint and active overlay around composer.
    - New-chat welcome composer.
    - Explicit WebView load/bridge error state.
  privacy_security:
    - The bundled WebView composer must not fetch remote scripts, remote HTML, analytics, or the app web route at runtime.
    - Bridge logs must not include message plaintext, encryption keys, auth/session tokens, cookies, private file paths, full share URL fragments, or raw attachment contents.
    - WKWebView configuration must disable unnecessary navigation and constrain loaded content to local bundle assets.
  accessibility:
    - The native wrapper exposes `message-composer`, `message-field`, and `message-editor` identifiers for XCUITest.
    - Bridge diagnostics expose editor readiness and content state to UI tests without requiring private message content.
    - Native controls remain accessible and localized through AppStrings.

