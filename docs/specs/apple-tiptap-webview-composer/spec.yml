id: apple-tiptap-webview-composer
title: Apple Tiptap WebView Composer
status: implementing

goal: >
  Replace the Apple app's native SwiftUI text-field based message composer editor
  with a local WKWebView running the same Tiptap write-mode editor contract used
  by the web app, while keeping chat history native until a concrete read-only
  rendering gap justifies a separate transcript WebView decision.

scope:
  in:
    - A composer-only WKWebView bridge for the Apple main chat and new-chat composer surfaces.
    - A local, bundled Tiptap composer asset or generated bundle that does not load remote web app UI at runtime.
    - Swift-to-JavaScript and JavaScript-to-Swift messaging for editor readiness, content changes, focus, blur, submit, height changes, clear, set content, theme, disabled state, and test diagnostics.
    - Preservation of native host-owned controls around the editor, including attachment picker, maps, sketch, camera, audio recording, queued message indicator, focus/incognito pills, and send pipeline callbacks.
    - Apple tests that target the WebView-backed composer through stable accessibility identifiers and bridge diagnostics.
    - Remote Mac build/test verification and TestFlight deployment after implementation is green.
  out:
    - Moving chat history/transcript rendering to WebView in this slice.
    - Rewriting chat sending, encryption, WebSocket sync, background send, draft storage, or upload APIs beyond the adapter needed to send canonical markdown from the WebView editor.
    - Embedding a React Native runtime or adopting TenTap directly.
    - Loading the production web app route inside the native app composer.
    - Replacing OS-owned file, photo, camera, microphone, or share controllers.
    - TestFlight deployment before remote Mac build and targeted Apple tests pass or have accepted blockers.

context_discovery:
  github_issues:
    - "GitHub MCP get_me and issue search returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --search 'apple message input tiptap webview composer' --state all returned no matching issues."
  docs:
    - docs/architecture/messaging/message-input-field.md
    - docs/architecture/messaging/message-parsing.md
    - docs/architecture/frontend/virtual-scrolling-chat-history.md
    - docs/architecture/apple/parity-matrix.md
    - docs/specs/apple-unified-message-composer/spec.yml
    - docs/specs/apple-ui-contracts/spec.yml
    - apple/SVELTE_SWIFT_COUNTERPARTS.md
    - apple/AGENTS.md
  online_research:
    - "Tiptap official docs position the editor as a JavaScript/web editor with React, Vue, Svelte, and vanilla JS integrations."
    - "Tiptap maintainer answer in ueberdosis/tiptap discussion #3113 says native React Native support is not planned soon because ProseMirror depends heavily on the browser DOM and recommends embedding a WebView."
    - "ProseMirror forum guidance says ProseMirror can be put in a WebView for native mobile applications."
    - "TenTap is a React Native package based on Tiptap/ProseMirror plus react-native-webview; it is useful as architecture inspiration but not directly usable in the SwiftUI Apple app."
    - "Apple WKScriptMessageHandler is the supported bridge for receiving JavaScript messages from WKWebView content."
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte initializes a Tiptap Editor and owns write-mode parsing, paste handling, mentions, PII decorations, draft state, and send serialization.
    - frontend/packages/ui/src/components/enter_message/MessageInput.styles.css defines the rendered composer field, ProseMirror base styles, compact states, action row spacing, and decoration styles.
    - frontend/packages/ui/src/message_parsing/parse_message.ts and serializers.ts convert markdown to Tiptap JSON and back to canonical markdown.
    - frontend/packages/ui/src/components/ReadOnlyMessage.svelte uses Tiptap for read-only chat history, but docs flag accumulated editor instances as a web performance cost.
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift provides one native SwiftUI composer shell but delegates the editable area to OMMessageInputField.
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift implements OMMessageInputField with SwiftUI TextField, so it cannot match Tiptap contenteditable behavior.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift hosts MessageComposerView and currently passes native text through messageText/sendMessage.
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift and native embed renderers support read-only chat history without a WebView transcript.
  tests:
    - apple/OpenMatesTests/MessageComposerConfigurationTests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - scripts/apple_composer_audit.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
    - apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/App/OpenMatesApp.swift
    - apple/OpenMates.xcodeproj/project.pbxproj
    - apple/OpenMatesTests/MessageComposerConfigurationTests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - scripts/apple_composer_audit.py
    - scripts/apple_remote.py
  parity_expectations:
    - The editable composer area uses the same Tiptap/ProseMirror write-mode behavior as web instead of a SwiftUI TextField approximation.
    - The surrounding Apple composer host remains native and keeps the already unified field shape, action row, pending embed strip, PII banners, recording overlay, and app-owned buttons aligned with the web contract.
    - Chat history remains native in this slice because it is read-only, has native markdown/embed counterparts, and moving the transcript to WebView would add scroll/streaming/accessibility risk without fixing the write-mode composer problem.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-tiptap-webview-composer/spec.yml
    - python3 scripts/apple_composer_audit.py
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/MessageComposerConfigurationTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ComposerVisualParityUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAttachmentUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAudioRecordingUITests
    - TestFlight upload through the repo's Apple deployment flow after green native verification.
  intentional_native_differences:
    - Attachment, camera, map, sketch, audio recording, auth/signup, and OS permission flows remain native and call into or receive content from the composer bridge.
    - Chat history, message bubbles, avatars, markdown rendering, and embed cards remain native for this slice.
    - Apple can expose a native fallback error state if the local WebView asset fails to load, but it must be visible and logged rather than silently falling back to TextField behavior.

clarification:
  rounds:
    - question: Should the WebView/Tiptap bridge be scoped to the composer only while keeping chat history native unless a later parity audit proves a transcript gap?
      answer: Composer only.
  vision_summary: >
    The Apple app should stop approximating the web message editor with SwiftUI
    TextField and instead run the same Tiptap write-mode editor contract in a
    local WKWebView. Chat history should stay native in this first slice because
    the researched gap is write-mode composer behavior, not read-only transcript
    rendering.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Normal chat composer edits through Tiptap WebView
    given:
      - The Apple app shows a normal chat where the current composer host is visible.
      - The local Tiptap composer asset is bundled with the app.
    when:
      - The user focuses the message editor and types multiple lines, markdown, a URL, or a code fence.
    then:
      - The editable surface is a WKWebView-backed Tiptap editor, not a SwiftUI TextField or TextEditor.
      - Swift receives canonical markdown content changes from the bridge.
      - The send button enables from bridge content state and sends the canonical markdown through the existing send pipeline.
      - The native action row and pending upload UI remain outside the WebView.

  - id: S-2
    title: New-chat composer uses the same Tiptap bridge
    given:
      - The Apple app opens the signed-out or signed-in new-chat welcome composer.
    when:
      - The user focuses the editor, types text, and sends or records/attaches content.
    then:
      - The same Tiptap WebView composer bridge is used as normal chat.
      - Suggestions and welcome content remain host-owned native UI outside the composer.
      - Anonymous/signup send policy remains host-owned and visible.

  - id: S-3
    title: Bridge supports native-to-editor and editor-to-native commands
    given:
      - The WKWebView editor has finished loading.
    when:
      - Swift sends focus, blur, clear, setContent, setPlaceholder, setTheme, setDisabled, or test diagnostics commands.
    then:
      - The editor applies the command without reloading the WebView.
      - JavaScript posts ready, contentChanged, submit, heightChanged, focus, blur, and error events through WKScriptMessageHandler.
      - Bridge errors are logged with sanitized metadata and shown through an explicit native error state.

  - id: S-4
    title: Attachments and recording remain native while content stays canonical
    given:
      - The user adds native attachments, maps, sketches, images, files, or recordings from the Apple composer action row.
    when:
      - The native host receives upload results or pending embed state.
    then:
      - Native pending embed strips and upload progress remain visible around the editor.
      - The Tiptap editor can receive inserted markdown/embed references where needed.
      - Sending does not leak raw JSON or local file paths into visible text.

  - id: S-5
    title: Chat history remains native
    given:
      - The chat transcript contains user, assistant, streaming, markdown, and embed messages.
    when:
      - The composer WebView implementation is enabled.
    then:
      - Existing native MessageBubble, RichMarkdownRenderer, and embed renderer paths still render chat history.
      - Transcript scrolling and streaming behavior are not routed through a WebView.
      - Any future transcript WebView proposal requires a separate spec with profiling and accessibility evidence.

  - id: S-6
    title: App is verified and deployed to TestFlight
    given:
      - The composer bridge implementation and tests are complete.
    when:
      - The remote Mac verification and Apple deployment flow run.
    then:
      - The iOS app builds on the remote Mac.
      - Targeted composer UI/unit tests pass or have accepted external blockers.
      - A TestFlight build is uploaded only after green native verification.

