apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
    - apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
  parity_expectations:
    - Apple should eventually use the same active-context versus visual-history boundary language and faded forgotten-message semantics.
    - Apple work waits until the web/API contract is approved, implemented, deployed, and confirmed by the user.
    - If native full-history rendering is deferred, Apple must not claim that faded forgotten-message recovery exists until implemented.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios after web/user confirmation or a documented Apple deferral.
  intentional_native_differences:
    - Native UI may use platform-appropriate affordances for opacity and buttons, but must preserve the same meaning: full opacity is active context, faded is forgotten visual history.

clarification:
  rounds:
    - question: Should shared chats load old messages and support full-chat download?
      answer: Yes. Shared chats must load old messages and support full-chat download.
    - question: If full hydration fails during export, should export fail hard or allow a clearly labeled partial export?
      answer: Exports may be partial if full hydration fails, but they must try to hydrate beyond the current IndexedDB/window and clearly label or warn partial exports.
    - question: Should shared compression checkpoint support be included now?
      answer: Yes. Include shared compression checkpoint support now.
    - question: Should this slice add a secondary message-count compression trigger?
      answer: No. Keep token-triggered compression for now and make visual loading and compression boundaries robust first.
    - question: Should revealed forgotten raw messages re-enter active AI context?
      answer: No. Revealing forgotten messages is visual-only; faded messages remain excluded from active AI context unless a later explicit restore feature is specified.
  vision_summary: >
    The chat UI should distinguish rendering performance from AI memory. Opening a
    chat loads the latest 40 visible messages and older active history appears via
    a Show older messages button in 40-message pages. Token-triggered compression
    remains the only compression trigger for this slice; once compressed, the UI
    shows a summary and the latest full tail normally, while raw forgotten
    checkpoint messages are available only through Show old forgotten messages and
    render faded to show they are not active AI context. Per-chat downloads must
    hydrate full history or clearly report partial completeness.
  approved_by_user: true

