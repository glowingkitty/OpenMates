decisions:
  - id: D-1
    status: active
    decision: Keep the latest 40 messages as the initial visible loading window.
    reason: This is a UI performance boundary and already matches the current windowed loading direction.
    decided_at: "2026-07-22"
  - id: D-2
    status: active
    decision: Do not add message-count-triggered compression in this slice.
    reason: The user preferred fixing visual recovery and compression boundary UX before changing compression triggers beyond token pressure.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: Revealed forgotten messages are visual-only and remain excluded from active AI context.
    reason: Users need readable history without silently changing what the assistant remembers after compression.
    decided_at: "2026-07-22"
  - id: D-4
    status: active
    decision: Forgotten raw messages render with reduced opacity while active-context messages render at full opacity.
    reason: The user proposed opacity as a direct visual distinction between included and forgotten history.
    decided_at: "2026-07-22"
  - id: D-5
    status: active
    decision: Per-chat export/download must attempt full hydration and clearly label partial results.
    reason: Exporting only currently rendered/local messages creates false-complete archives for long, shared, and compressed chats.
    decided_at: "2026-07-22"
  - id: D-6
    status: active
    decision: Keep regular regression tests deterministic and provider-free, then run one on-demand real long-chat compression validation after deploy.
    reason: Daily tests should prove UI/API/export behavior without repeatedly paying for model calls, but the compression behavior still needs at least one real end-to-end proof with a realistic long chat and repeated compression checkpoints.
    decided_at: "2026-07-22"

