contracts:
  api:
    - route: WebSocket request_chat_content_batch or successor
      access_model: first-party client surface only
      auth: authenticated owner session required
      rate_limits: existing WebSocket limits apply; no credit or AI budget consumption
      encryption_boundary: returns client-encrypted chat material only
      request: "chat id, optional cursor/anchor, direction, limit=40, include_checkpoint_metadata boolean"
      response: "Encrypted bounded message window, has_more/cursors, durable count hints where safe, and compression checkpoint metadata needed for the boundary."
      errors:
        - Unauthorized when the user cannot access the chat.
        - Visible error event when a page cannot be loaded.
    - route: WebSocket get_compressed_chat_old_messages or successor
      access_model: first-party client surface only
      auth: authenticated owner session required
      rate_limits: existing WebSocket limits apply; no credit or AI budget consumption
      encryption_boundary: returns client-encrypted forgotten raw messages only
      request: "chat id, checkpoint id, cursor/before timestamp, limit=40"
      response: "Encrypted bounded forgotten-message page, has_more/cursor metadata, and checkpoint id."
      errors:
        - Unauthorized when the user cannot access the chat.
        - Checkpoint not found when checkpoint does not belong to the user/chat.
    - route: GET /v1/share/chat/{chat_id}/manifest
      access_model: unauthenticated public REST API with unguessable share id and client-held fragment key
      auth: valid share identifier; URL fragment key must not be sent
      rate_limits: existing shared-chat anti-enumeration and route limits apply; no credit or AI budget consumption
      encryption_boundary: returns encrypted shared metadata only
      request: "chat id path parameter; optional target/window query metadata only"
      response: "Encrypted chat metadata, latest-window hints, safe message counts/cursors, and encrypted compression checkpoint metadata when shared."
      errors:
        - Same unavailable-chat non-enumeration behavior as existing shared-chat routes.
    - route: GET /v1/share/chat/{chat_id}/messages
      access_model: unauthenticated public REST API with unguessable share id and client-held fragment key
      auth: valid share identifier; URL fragment key must not be sent
      rate_limits: existing shared-chat anti-enumeration and route limits apply; no credit or AI budget consumption
      encryption_boundary: returns encrypted shared messages only
      request: "cursor/anchor, direction, limit=40, optional checkpoint id for forgotten pages"
      response: "Encrypted bounded active or forgotten message page plus has_more/cursor metadata."
      errors:
        - Same unavailable-chat non-enumeration behavior as existing shared-chat routes.
  data:
    - "DEFAULT_MESSAGE_WINDOW_LIMIT remains 40 for initial render and normal pagination."
    - Compression checkpoints store enough boundary metadata to distinguish active post-checkpoint messages from forgotten pre-checkpoint raw messages.
    - "messages_v is not the only source of truth for pagination or export completeness."
    - Export metadata records complete, partial, failed_pages, message_count, checkpoint_count, and generated_at.
  ui_states:
    - Initial latest 40-message loading.
    - Show older messages available for active full-opacity older pages.
    - Loading older active messages.
    - Compression summary visible at the active/forgotten boundary.
    - Show old forgotten messages available for pre-checkpoint raw pages.
    - Forgotten raw messages visible with reduced opacity and accessible text explaining they are no longer active AI context.
    - Full-history export hydrating, complete, partial warning, and failed states.
  privacy_security:
    - Shared-chat URL fragment keys must never be sent to the server.
    - Faded forgotten raw messages remain decrypted client-side only.
    - Compression summaries and forgotten pages remain encrypted at rest and in transit until client decryption.
    - Export/download must not include raw chat keys, master keys, share URL fragments, reusable credentials, or private tokens.
    - Logs for messages_v mismatch must avoid plaintext message content and private user data.

