implementation_plan:
  spec_path: docs/specs/long-chat-compression-history/spec.yml
  existing_patterns:
    - docs/specs/scalable-chat-embed-loading/spec.yml
    - frontend/packages/ui/src/services/db/messageOperations.ts
    - frontend/packages/ui/src/components/ActiveChat.svelte
    - frontend/packages/ui/src/components/ChatHistory.svelte
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_compression_checkpoint_handler.py
    - backend/core/api/app/routes/share.py
  architecture: >
    Keep message windows, compression context, forgotten-message reveal state, and
    export hydration as separate layers. Backend/share APIs provide encrypted
    bounded pages and checkpoint metadata; frontend state marks each rendered row
    as active or forgotten; AI context construction ignores visual-only forgotten
    rows; export/download performs explicit hydration before packaging.
  data_flow:
    - Chat opens and requests latest 40-message active window plus latest checkpoint metadata.
    - Show older messages prepends the next active 40-message page until a checkpoint boundary or no older active messages remains.
    - Show old forgotten messages requests checkpoint-bound forgotten pages and marks returned rows as forgotten for rendering only.
    - Compression runs on token pressure, persists encrypted checkpoint summary, and retains the latest assistant/user tail in full context.
    - Download asks the hydration layer for all active and forgotten pages before calling ZIP/YAML serializers.
  affected_files:
    - path: backend/apps/ai/processing/chat_compressor.py
      reason: Retained-tail compression contract and tests.
    - path: backend/apps/ai/tasks/ask_skill_task.py
      reason: Compression trigger/context boundary integration if needed.
    - path: backend/core/api/app/routes/share.py
      reason: Shared checkpoint/window manifest support.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/chat_compression_checkpoint_handler.py
      reason: Forgotten-message paging and boundary metadata.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Owner/shared loading, reveal state, export hydration entry points.
    - path: frontend/packages/ui/src/components/ChatHistory.svelte
      reason: Buttons, faded forgotten messages, scroll anchoring, accessibility text.
    - path: frontend/packages/ui/src/services/db/messageOperations.ts
      reason: Window paging and durable completeness reads.
    - path: frontend/packages/ui/src/services/chatExportService.ts
      reason: Full-history export hydration and partial metadata.
    - path: frontend/packages/ui/src/services/zipExportService.ts
      reason: ZIP archive completeness metadata and secret-safe packaging.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/long-chat-compression-history/spec.yml
    - backend pytest red/green for compression, checkpoints, shared windows, and messages_v integrity
    - vitest red/green for frontend window state, active context construction, and export hydration
    - deploy before Playwright green runs against app.dev.openmates.org
    - on-demand real CLI long-chat compression run after deploy, with measured checkpoint behavior and cost review before any recurring schedule
    - user confirms deployed web UI semantics and visual quality
    - Apple parity or deferral after user confirmation
  verification_order:
    - Direct backend/WebSocket/share contract tests first, with access model and encryption-boundary checks.
    - Frontend unit/Vitest tests for local state, rendering semantics, and export hydration second.
    - Web Playwright tests after deployment third, using deterministic provider-free fixtures for regular regression coverage.
    - Real CLI long-chat compression validation fourth, on demand only and not part of daily tests unless the recorded cost review explicitly approves a cadence.
    - User confirmation fifth.
    - Apple status/build or documented deferral last.

