schema_version: 2
id: long-chat-compression-history
title: Long Chat Compression And History Boundaries
status: implementing

goal: >
  Make long chats understandable and recoverable by separating visible history
  loading from active AI context compression. Chats should open with a bounded
  recent window, load older active messages explicitly in 40-message pages, show
  token-compressed forgotten history only behind an explicit faded visual state,
  and export/download complete hydrated history with clear compression boundary
  metadata.

scope:
  in:
    - Authenticated owner chat history loading in the web app.
    - Shared-chat recipient history loading in the web app.
    - Initial chat open using the latest 40 visible messages as a UI loading window, not an AI-context boundary.
    - Explicit Show older messages pagination that loads the next older active 40-message page while preserving scroll position.
    - Token-triggered chat compression only; no secondary message-count trigger in this slice.
    - Compression that keeps the most recent assistant response and the most recent user follow-up/request in full when they exist, plus the latest compression summary for older context.
    - Explicit Show old forgotten messages loading for messages represented by a compression checkpoint.
    - Faded rendering for forgotten raw messages so users can see they are readable history but no longer part of active AI context.
    - Shared-chat manifests and message windows exposing enough encrypted checkpoint/window metadata to render the same boundaries without sending share URL fragment keys to the server.
    - Chat ZIP/YAML/download paths hydrating all available messages and checkpoint summaries before exporting, with explicit partial-export warnings when full hydration fails.
    - Regression coverage for compression checkpoint persistence, boundary rendering, shared chats, messages_v integrity, and export completeness.
  out:
    - Replacing the zero-knowledge encryption model or storing decrypted private chat history on the backend.
    - Adding message-count-triggered compression in this slice.
    - Reintroducing forgotten raw messages into active AI context when users reveal them visually.
    - Changing model/provider token budgets beyond the compression trigger and active-tail contract needed for this behavior.
    - Rewriting old chat history or bulk-generating missing compression checkpoints for existing chats.
    - Full Account Export V1 architecture changes; this spec only fixes per-chat download/export paths and records the overlap.
    - Apple implementation before web/API behavior is approved and verified.

