risks:
  - id: R-1
    risk: Shared checkpoint metadata may require careful key-envelope handling to avoid weakening share-link encryption boundaries.
    mitigation: Keep all checkpoint summaries/messages encrypted and prove fragment keys are never sent in shared Playwright/network tests.
  - id: R-2
    risk: Faded forgotten messages may be visually too subtle or inaccessible.
    mitigation: Pair opacity with accessible explanatory text and user confirmation on deployed dev UI.
  - id: R-3
    risk: Export hydration can be slow for very large chats.
    mitigation: Use bounded pages, visible progress, and explicit partial-export handling instead of blocking silently or exporting false-complete archives.
  - id: R-4
    risk: Existing chats with no checkpoints, stale messages_v, or partial local IndexedDB state may expose inconsistent has_more behavior.
    mitigation: Use durable cursors/rows for completeness checks and add integrity tests/logs for mismatches.

