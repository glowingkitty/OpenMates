scenarios:
  - id: S-1
    title: Owner opens a long uncompressed chat
    given:
      - Alice owns a chat with 101 durable messages and no compression checkpoint.
    when:
      - Alice opens or reloads the chat.
    then:
      - The latest 40 messages render first.
      - A Show older messages button appears above the visible history because older messages exist.
      - Clicking Show older messages loads the next older 40 active messages and preserves the current scroll anchor.
      - Loaded active messages render at full opacity because they remain part of uncompressed active history.

  - id: S-2
    title: Owner opens a compressed chat
    given:
      - Alice owns a chat with a valid latest compression checkpoint.
      - The checkpoint summarizes older messages before its compressed boundary.
      - The chat has recent post-checkpoint messages.
    when:
      - Alice opens or reloads the chat.
    then:
      - The latest 40 visible messages, latest compression summary, and current uncompressed tail render without loading forgotten raw messages.
      - Active post-checkpoint messages render at full opacity.
      - The compression summary card clearly separates active history from forgotten history.
      - A Show old forgotten messages button appears at the checkpoint boundary when forgotten raw messages are available.

  - id: S-3
    title: User reveals forgotten messages
    given:
      - Alice is viewing a compressed chat with hidden pre-checkpoint raw messages.
    when:
      - Alice clicks Show old forgotten messages.
    then:
      - OpenMates loads a bounded page of forgotten raw messages represented by that checkpoint.
      - The revealed raw messages appear before the compression summary in chronological order.
      - Revealed forgotten user and assistant messages render with reduced opacity.
      - The UI does not add those raw messages back into active AI context.
      - Additional forgotten pages remain behind the same explicit action if more exist.

  - id: S-4
    title: Compression keeps the latest conversational tail in full
    given:
      - Alice has a token-heavy chat that crosses the compression threshold.
      - The latest complete assistant response exists.
      - Alice may have sent a follow-up user request after that response.
    when:
      - Compression runs before the next AI preprocessing step.
    then:
      - Older messages are summarized into a client-encrypted checkpoint.
      - The latest complete assistant response remains available in full active context.
      - The most recent user follow-up/request after that assistant response remains available in full active context when present.
      - Active AI context after compression consists of the latest summary plus the retained full tail, not the faded forgotten raw messages.

  - id: S-5
    title: Shared-chat recipient sees the same boundaries
    given:
      - Bob opens a valid shared-chat link whose underlying chat has older messages and may have compression checkpoints.
    when:
      - Bob opens the shared-chat URL and loads older history.
    then:
      - Bob initially sees the latest 40-message window.
      - Bob can click Show older messages for older active full-opacity messages.
      - If the share includes compression checkpoints, Bob sees the summary and can click Show old forgotten messages for faded pre-checkpoint raw messages.
      - The URL fragment key remains client-only and is never sent to the server.

  - id: S-6
    title: Per-chat download hydrates complete history or warns partial
    given:
      - Alice starts a ZIP or YAML download from a chat whose current UI has only a 40-message window loaded.
    when:
      - The download begins.
    then:
      - OpenMates attempts to hydrate all available durable messages, embeds referenced by those messages, and compression checkpoint summaries needed for the selected chat.
      - The generated archive contains all hydrated messages in chronological order, including faded forgotten history and checkpoint summaries when available.
      - If any page or checkpoint cannot be hydrated, the user sees a clear partial-export warning before or during download.
      - The archive metadata records whether the export is complete or partial.

  - id: S-7
    title: Message version integrity does not hide history
    given:
      - A chat has durable message rows whose count differs from the chat metadata messages_v value.
    when:
      - The chat window, older-message pagination, shared manifest, or download flow calculates whether more messages exist.
    then:
      - OpenMates uses durable rows/window cursors as the source of truth for pagination and completeness.
      - The mismatch is surfaced to logs or deterministic integrity checks.
      - The mismatch does not cause the UI or export to stop early while durable messages remain accessible.

