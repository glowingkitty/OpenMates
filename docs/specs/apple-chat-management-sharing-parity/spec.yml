apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Shared/Components/ChatListRow.swift
    - apple/OpenMates/Sources/Features/Chat/Views/*.swift
    - apple/OpenMates/Sources/Core/Networking/DeepLinkHandler.swift
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
    - apple/OpenMatesUITests/ChatManagementSharingParityUITests.swift
    - apple/OpenMatesTests/ChatManagementSharingParityTests.swift
  parity_expectations:
    - Apple chat management must preserve encrypted chat/key semantics and web sync contracts.
    - App-owned menus, dialogs, share overlays, and action sheets use OpenMates custom UI unless invoking the OS-owned share sheet or file importer/exporter.
    - "`scripts/apple_chat_parity_audit.py` must pass, including shared identifiers like `chat-item-wrapper`."
  verification:
    - "`python3 scripts/apple_chat_parity_audit.py` on Linux."
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatManagementSharingParityUITests`.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatManagementSharingParityTests`.
  intentional_native_differences:
    - The system share sheet and file import/export panels are OS-owned.
    - If Projects remain web-only, this spec must record that as an approved product decision before verification.

scenarios:
  - id: S-1
    title: Chat list and context actions match web
    given:
      - A seeded account has visible, hidden, pinned, unread, and older chats.
    when:
      - Apple opens chat search, context menus, hide/show, pin/unpin, mark read, delete, and show-more flows.
    then:
      - Visible state, ordering, grouping, and synced backend effects match web.
      - Required controls expose stable identifiers and custom OpenMates chrome.
  - id: S-2
    title: Message interactions and privacy affordances match web
    given:
      - A seeded chat has copyable messages, highlights, follow-up suggestions, PII warnings, incognito state, and pasteable content.
    when:
      - The user copies, highlights, follows up, toggles incognito, pastes rich content, and accepts/rejects PII states.
    then:
      - Apple produces equivalent visible states and send payloads without leaking raw JSON or private data.
  - id: S-3
    title: Share import export and deeplink flows match web contracts
    given:
      - Test fixtures provide shareable chats, shareable embeds, import files, export requests, and webhook/deeplink URLs.
    when:
      - Apple opens, creates, imports, exports, or follows those links through native UI.
    then:
      - Web can open Apple-created shared artifacts where supported.
      - Apple can open web-created shared artifacts and deeplink messages with the same read-only or editable boundaries.
      - Secrets and private URLs remain out of committed evidence.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Apple chat list/search/context-action tests recreate web chat management behavior and pass the deterministic chat parity audit.
  - id: AC-2
    scenario: S-2
    text: Apple message interaction tests recreate web copy, highlight, follow-up, PII, incognito, and paste-classification behavior.
  - id: AC-3
    scenario: S-3
    text: Apple share/import/export/deeplink tests recreate web sharing and entry-point behavior without leaking secrets.

tests:
