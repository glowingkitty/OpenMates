    file: scripts/apple_chat_parity_audit.py
    command: python3 scripts/apple_chat_parity_audit.py
    covers:
      - AC-1
    assertions:
      - Chat identifier and structural parity guardrails pass.
      - No forbidden default product controls are added to chat management surfaces.
      - Web-to-Apple constants remain aligned for chat management surfaces covered by the audit.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_currently
        run_id: session-3725
        timestamp: "2026-06-10"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
  - id: T-UNIT-002
    type: unit
    file: apple/OpenMatesTests/ChatManagementSharingParityTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatManagementSharingParityTests
    covers:
      - AC-1
      - AC-2
      - AC-3
    assertions:
      - Chat action, privacy, share, import, export, and deeplink payloads match web contracts.
      - Share URLs and encryption keys are redacted from logs and fixtures.
      - Unsupported or web-only surfaces are explicitly classified.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
  - id: T-UNIT-003
    type: unit
    file: apple/OpenMatesUITests/ChatManagementSharingParityUITests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatManagementSharingParityUITests
    covers:
      - AC-1
      - AC-2
      - AC-3
    assertions:
      - Chat management, message action, and share/import/export flows are reachable and visible in native UI.
      - OS-owned share/file panels are used only at OS-owned boundaries.
      - Screenshots and attachments are synthetic or sanitized.
    red_phase:
