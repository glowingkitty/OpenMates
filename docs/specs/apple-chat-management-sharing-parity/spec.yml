id: apple-chat-management-sharing-parity
title: Apple Chat Management Sharing And Interaction Web Spec Parity
status: draft

goal: >
  Recreate the web app's chat management, sharing, import/export, highlighting,
  privacy, and interaction Playwright coverage in Apple so native chat operations
  remain behaviorally compatible with web and cross-device sync.

scope:
  in:
    - Native parity for chat search, context actions, hide/show, pin/sort, show more, recent dedupe, stop new chat draft, fork/explain in new chat, copy message, import/export, share chat, share embed, public/shared chat open, webhook/deeplink entry points, incognito, PII detection, paste classification, highlights, follow-up suggestions, interactive questions, and projects if product-required on Apple.
    - Cross-surface sync checks where Apple actions must appear in web and web-created states must appear in Apple.
    - Stable accessibility identifiers for chat list rows, menus, dialogs, banners, message actions, share controls, and highlighted text states.
  out:
    - Changing backend sharing, import/export, webhook, encryption, or project data contracts.
    - Treating web-only SEO/docs/dev-smoke specs as native product parity requirements.
    - Committing share URLs, encryption keys, webhook secrets, project ids, private chat content, or raw screenshots with private data.

