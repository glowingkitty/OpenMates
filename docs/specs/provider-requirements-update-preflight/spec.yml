decisions:
  - id: D-1
    status: active
    decision: Create a dedicated provider-requirements-update-preflight spec and cross-reference unified-server-cli-management S-9/AC-15.
    reason: The expanded scope owns provider metadata, setup URLs, source links, and env-layout decisions beyond the existing CLI update warning scenario.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-2
    status: active
    decision: Provider YAML metadata is the canonical source for API-key requirements; .env examples are generated or audited against it.
    reason: Update preflight must compare installed and target product requirements, not infer requirements from sample env files.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-3
    status: active
    decision: Setup URLs must be verified before they are committed as provider setup guidance.
    reason: Dead provider links create a worse operator experience during blocked updates.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-4
    status: active
    decision: Keep one canonical runtime .env and add focused CLI env commands instead of loading multiple runtime env files.
    reason: env/ folders are not universally gitignored, Docker Compose multi-env behavior is easy to misuse, and existing installs/scripts already depend on installPath/.env.
    decided_at: "2026-07-20T23:35:50Z"
  - id: D-5
    status: active
    decision: Provider-backed web/server features requiring missing API keys are hidden or disabled by default.
    reason: Users should not see provider choices or app skills that look usable but fail because the self-host server lacks required credentials.
    decided_at: "2026-07-20T23:35:50Z"

