contracts:
  data:
    - Provider metadata may declare required_keys, optional_keys, or no_api_key; required and optional keys include env_key, vault_path, vault_key, description, setup_url, and docs_url when applicable.
    - Generated provider-requirements manifest contains metadata only and never contains secret values.
    - Installed server metadata stores the provider manifest version or digest used at install/update time for later diffing.
  cli:
    - openmates server update --dry-run renders missing required keys, optional key warnings, setup links, and target source links without applying updates.
    - openmates server update --continuous records blocked status instead of applying updates when missing required keys block unattended mode.
    - openmates server update status --json includes target source link fields and blocked provider requirement details when present.
    - openmates server env list redacts secret values and groups keys by runtime, providers, integrations, observability, and advanced categories.
    - openmates server env set KEY prompts without echo unless --value is explicitly provided, writes to installPath/.env with 0600 permissions, and creates a timestamped backup.
    - openmates server env unset KEY removes or blanks the key after confirmation or --yes.
    - openmates server env check validates required runtime variables and provider requirements.
    - openmates server env doctor explains missing required and optional provider keys with setup links.
  docs:
    - Self-host docs explain that initial install can start without provider keys, but provider-backed skills may require keys before an update can safely enable them.
    - Env docs distinguish required runtime secrets from optional provider keys and optional integration settings.
    - Docs explain that provider setup guidance comes from metadata; the CLI and Docker runtime continue to use installPath/.env.
  privacy_security:
    - Audits and CLI output may print env key names and Vault paths but never secret values.
    - URL verification must not authenticate to provider dashboards or store private account URLs.
    - CLI env commands must not print secret values unless an explicit non-secret key is requested.

