schema_version: 2
id: provider-requirements-update-preflight
title: Provider Requirements Update Preflight
status: implementing

goal: >
  Make provider-backed self-host updates safe and understandable by deriving
  required API-key metadata from provider manifests, packaging that manifest with
  CLI releases, diffing installed versus target requirements before updates,
  showing exact source links for target releases or commits, and giving operators
  verified setup URLs without relying on the large root .env.example as the
  source of truth.

scope:
  in:
    - Backfill backend provider metadata so every provider declares required, optional, or no API-key requirements explicitly.
    - Generate a deterministic provider-requirements manifest for packaged CLI/runtime artifacts.
    - Diff installed and target provider requirements during manual and continuous server updates.
    - Show required versus optional missing keys with provider names, env keys, Vault paths, setup docs URLs, and target source links.
    - Verify provider setup URLs before adding them to metadata or docs.
    - Document self-host env setup around one canonical runtime .env, with provider-key guidance generated from or audited against provider metadata.
    - Add safe OpenMates CLI commands for focused .env listing, setting, unsetting, checking, doctoring, and scoped editing.
    - Hide or disable web/server provider-backed features by default when their required provider API key is not configured.
  out:
    - Collecting, storing, or validating real third-party provider API keys through the CLI.
    - Making provider API keys mandatory for initial self-host installation.
    - Changing hosted OpenMates cloud provider configuration or Vault secret values.
    - Shipping web or Apple UI for provider setup in this slice.
    - Replacing existing provider runtime code or model selection behavior.

context_discovery:
  github_issues:
    - GitHub MCP search failed with 401 Bad credentials while searching provider metadata API keys update preflight env.
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/unified-server-cli-management/spec.yml, especially S-9 and AC-15 for update preflight warnings.
    - docs/specs/release-catalog-v1/spec.yml for release/source provenance patterns.
    - docs/self-hosting/setup.md for current self-host provider-key guidance.
    - docs/user-guide/cli/server-management.md for current CLI server and no-key startup behavior.
    - docs/architecture/data/translations.md for generated provider metadata pipeline references.
  code_patterns:
    - backend/providers/*.yml
    - scripts/contract_audits.py
    - frontend/packages/openmates-cli/src/server.ts
    - frontend/packages/openmates-cli/src/serverPlanning.ts
    - frontend/packages/openmates-cli/tests/server.test.ts
    - .env.example
  tests:
    - frontend/packages/openmates-cli/tests/server.test.ts
    - scripts/tests/test_release_intelligence.py
    - scripts/contract_audits.py

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - Apple apps are not affected because this is host-level CLI, provider metadata, and self-host documentation behavior.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - Native apps do not run self-host server updates or edit server env files.

clarification:
  rounds:
    - question: Should newly required provider-key update warnings be implemented by diffing provider metadata rather than scraping .env.example?
      answer: Yes. The CLI should diff installed versus target provider requirements and not scrape .env.example.
    - question: Should update output include source links for both stable releases and alpha/dev updates?
      answer: Yes. Stable updates should show the GitHub Release URL; alpha/dev updates should show the target commit URL and a PR URL when known.
    - question: Should API-key setup help include provider documentation URLs only after they are verified?
      answer: Yes. Use Firecrawl or an equivalent deterministic URL audit to avoid dead or 404 links.
    - question: Should the large .env example be considered for splitting as part of this work?
      answer: Yes, split examples/docs by operator intent while keeping provider metadata as the source of truth.
    - question: Should self-host runtime load several env files, or keep one canonical .env and add CLI commands to avoid editing a giant file manually?
      answer: Keep one canonical runtime .env because env/ directories are not universally gitignored and Docker Compose multi-env behavior adds risk. Add CLI commands to modify secrets programmatically and provide focused editing.
    - question: What should happen in the web app/server when a provider requires an API key and no key is configured?
      answer: Hide or disable that provider-backed feature by default so users do not see a usable provider that fails at runtime.
  vision_summary: >
    Self-host operators should learn about newly required provider keys before a
    release or commit is applied, especially during unattended updates. Provider
    metadata, not .env.example, should be the canonical source for requirement
    diffs and setup guidance; release output should show the exact target source
    link so operators can inspect what they are about to run. The runtime should
    keep one canonical .env for compatibility and safety, while split examples
    plus focused CLI env commands make provider-key editing manageable. Web and
    server metadata should hide or disable provider-backed features whose
    required provider key is missing.
  approved_by_user: true

