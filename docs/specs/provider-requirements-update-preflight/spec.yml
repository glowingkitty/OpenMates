implementation_plan:
  spec_path: docs/specs/provider-requirements-update-preflight/spec.yml
  existing_patterns:
    - frontend/packages/openmates-cli/src/serverPlanning.ts findMissingRequiredSecrets already compares installed and target requirement arrays.
    - frontend/packages/openmates-cli/src/server.ts already reads installPath/.env and writes update status files.
    - scripts/contract_audits.py already audits app provider metadata for explicit auth/no-auth declarations.
    - docs/specs/unified-server-cli-management/spec.yml already requires CLI update preflight warnings for newly required API keys.
  architecture: >
    Add a deterministic provider-requirements manifest generated from
    backend/providers/*.yml, package or resolve that manifest for target updates,
    and use the existing CLI planning surface to diff installed versus target
     requirements. Keep .env runtime compatibility while reorganizing docs and
    docs so provider keys are generated from metadata rather than maintained as a
    flat hand-written list.
  data_flow:
    - Provider YAML declares required_keys, optional_keys, or no_api_key.
    - Manifest generation writes metadata-only provider requirements for CLI/runtime packaging.
    - Install/update records the installed manifest digest in server metadata.
    - Update dry-run resolves the target manifest, compares missing required and optional keys against .env and Vault presence, and renders guidance.
    - Continuous update records blocked status when required keys are missing.
  affected_files:
    - path: backend/providers/*.yml
      reason: Backfill provider requirement metadata and setup URLs.
    - path: scripts/contract_audits.py
      reason: Enforce explicit provider API-key/no-key declarations.
    - path: scripts/tests/test_provider_requirements_manifest.py
      reason: Deterministic manifest generation and provider metadata coverage.
    - path: scripts/tests/test_provider_setup_urls.py
      reason: URL validation/audit fixture coverage.
    - path: scripts/tests/test_selfhost_env_layout.py
      reason: Env layout and provider-example drift coverage.
