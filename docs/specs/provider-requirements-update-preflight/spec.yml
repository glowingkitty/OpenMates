scenarios:
  - id: S-1
    title: Provider metadata declares key requirements explicitly
    given:
      - backend/providers/brave.yml requires one or more Brave Search API keys for hosted search features.
      - backend/providers/open_meteo.yml does not require an API key.
    when:
      - The provider requirement manifest is generated.
    then:
      - Brave appears with required or optional secret entries, env keys, Vault paths, and setup URLs.
      - Open-Meteo appears as no_api_key with no missing-key warning.
      - Providers with neither explicit API-key metadata nor no_api_key fail the metadata audit.
  - id: S-2
    title: Update dry-run reports newly required keys before applying a target
    given:
      - The installed manifest does not require SECRET__FIRECRAWL__API_KEY.
      - The target manifest requires SECRET__FIRECRAWL__API_KEY for a newly enabled provider-backed skill.
      - The runtime .env and Vault do not contain that key.
    when:
      - The operator runs openmates server update --dry-run.
    then:
      - The CLI reports Firecrawl as a newly required provider key.
      - The output includes env key, Vault path, setup URL, and target release or commit link.
      - No Docker image is pulled or container is replaced.
  - id: S-3
    title: Manual and continuous updates fail safely when required keys are missing
    given:
      - The target manifest requires SECRET__BRAVE__API_KEY.
      - The runtime .env and Vault do not contain a Brave key.
    when:
      - The operator runs openmates server update manually.
      - The continuous updater checks the same target image digest.
    then:
      - Manual update requires explicit confirmation or a documented override flag before proceeding.
      - Continuous update skips the update and records a blocked status with actionable missing-key details.
      - Optional provider keys are reported as warnings only and do not block unattended update.
  - id: S-4
    title: Update output links to the exact target source
    given:
      - A stable release target resolves to v0.15.0-alpha.4.
      - A dev target resolves to commit abcdef1234567890 with a known pull request.
    when:
      - The CLI renders update availability, dry-run, blocked, and success output.
    then:
      - Stable output links to the GitHub Release URL for the target version.
      - Dev or alpha output links to the target commit URL.
      - Dev or alpha output includes the pull request URL when release metadata can identify it.
  - id: S-5
    title: Provider setup URLs are verified before publication
    given:
      - Provider metadata proposes a get_key_url or docs_url for Brave, Firecrawl, Context7, OpenAI, Anthropic, Google AI Studio, and Mistral.
    when:
      - The provider URL audit runs.
    then:
      - Each URL is checked for a successful, relevant page result.
      - Dead, redirected-to-login-without-guidance, or unrelated pages fail the audit.
      - The audit records evidence without storing API keys or private account details.
  - id: S-6
    title: Self-host env docs and CLI env commands reduce giant-file editing
    given:
      - A self-host operator wants to add SECRET__BRAVE__API_KEY without editing a large .env by hand.
    when:
      - They inspect provider-key guidance and run openmates server env set SECRET__BRAVE__API_KEY.
    then:
      - The runtime continues to use one canonical .env file.
      - The CLI prompts for secret values without echoing them, backs up .env, writes with 0600 permissions, and redacts secrets in list output.
      - Provider-key guidance is derived from provider metadata and does not drift from the packaged manifest.
  - id: S-7
    title: Missing required keys hide provider-backed features
    given:
      - A self-host server has Brave Search metadata installed.
      - SECRET__BRAVE__API_KEY is empty in .env and absent from Vault.
    when:
      - The web app loads available apps, skills, providers, and model metadata from the server.
    then:
      - Web search, videos search, and news search are not exposed as usable Brave-backed skills.
      - Brave-specific provider/model choices are hidden or marked unavailable by runtime metadata.
      - Adding the key and restarting makes those features available again.
      - Provider-key guidance is derived from provider metadata and does not drift from the packaged manifest.
      - Existing installs with a single .env file continue to work.

