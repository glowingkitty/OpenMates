risks:
  - Provider metadata backfill may surface many existing providers without clear setup URLs; record intentionally unavailable docs URLs rather than inventing links.
  - Continuous update blocking must be conservative enough to avoid enabling broken provider-backed features, but not so strict that optional providers stop security updates.
  - Extra env example files can confuse operators if runtime still uses one .env; docs and CLI help must state compatibility clearly.
  - PR URL derivation may be unavailable for some commits; output must degrade to the commit URL without inventing a PR.

open_questions:
  - Should manual update use --confirm-missing-provider-keys or reuse an existing --yes/--force pattern for required-key blockers?
  - Where should target manifests be fetched from when updating to a remote image digest that does not correspond to the local packaged CLI version?
