implementation_plan:
  spec_path: docs/specs/directus-test-control-plane/spec.yml
  existing_patterns:
    - scripts/tests.py owns the current CLI control-plane entrypoint.
    - scripts/run_tests.py owns GitHub Actions dispatch, polling, artifact download, and normalized run summaries.
    - backend/core/directus/schemas/*.yml define Directus collections.
    - backend/core/api/app/services/directus/directus.py provides generic Directus item operations.
    - backend/core/api/app/services/test_results_service.py currently reads local JSON test-result state for the status page.
  architecture: >
    Introduce a small Directus-backed test-control-plane adapter used by
    `scripts/tests.py`, the GitHub Actions sync path, and the backend status-page
    reader. Directus stores canonical catalog, runs, per-test results, current
    state, and claims. The adapter exposes the existing script-level operations
    so command behavior changes minimally while persistence moves out of local
    files.
  data_flow:
    - "`scripts/tests.py run` normalizes requested test keys, creates or updates a `test_runs` row, and sets active current-state rows before dispatching GitHub Actions."
    - GitHub Actions completion or poller ingestion upserts `test_results` rows and refreshes stable current-state fields.
    - "`scripts/tests.py next --lease` reads Directus-backed triage groups and creates one active `test_claims` record per group."
    - Status-page code reads current state from the shared adapter or Directus service.
    - Optional JSON import/export commands serialize Directus state for artifacts without becoming source of truth.
  affected_files:
    - path: docs/specs/directus-test-control-plane/spec.yml
      reason: Executable product contract and work ledger.
    - path: backend/core/directus/schemas/test_catalog.yml
      reason: Directus test catalog schema.
    - path: backend/core/directus/schemas/test_runs.yml
      reason: Directus run schema.
    - path: backend/core/directus/schemas/test_results.yml
      reason: Directus per-test result schema.
    - path: backend/core/directus/schemas/test_current_state.yml
      reason: Directus latest current-state schema.
    - path: backend/core/directus/schemas/test_claims.yml
      reason: Directus debug claim schema.
    - path: scripts/tests.py
      reason: CLI control-plane behavior and Directus-backed operations.
    - path: scripts/run_tests.py
      reason: Reuse or expose GitHub Actions run metadata/artifact ingestion for the Directus sync path.
    - path: scripts/sync-test-results.sh
      reason: Replace or route local result syncing through Directus-backed ingestion.
    - path: backend/core/api/app/services/test_results_service.py
      reason: Status page test results reader must stop depending on local JSON state.
    - path: scripts/tests/test_tests_control.py
      reason: Existing control-plane regression tests need Directus adapter coverage.
    - path: scripts/tests/test_tests_control_directus_schema.py
      reason: Schema contract regression coverage.
    - path: scripts/tests/test_tests_control_github_sync.py
      reason: GitHub Actions sync regression coverage.
    - path: scripts/tests/test_tests_control_apple.py
      reason: Apple suite normalization regression coverage.
    - path: backend/tests/test_test_results_service.py
      reason: Status-page service regression coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/directus-test-control-plane/spec.yml
    - python3 -m pytest scripts/tests/test_tests_control_directus_schema.py
    - python3 -m pytest scripts/tests/test_tests_control.py
    - python3 -m pytest scripts/tests/test_tests_control_github_sync.py
    - python3 -m pytest scripts/tests/test_tests_control_apple.py
    - python3 -m pytest backend/tests/test_test_results_service.py
    - python3 scripts/tests.py status --json
  verification_order:
    - Validate the spec before implementation.
    - Run red-phase pytest coverage for schema, adapter, GitHub sync, Apple normalization, and status service before feature code.
    - Implement Directus schemas and adapter behind existing `scripts/tests.py` operations.
    - Run green-phase targeted pytest coverage.
    - Run `python3 scripts/tests.py status --json` against the configured environment to prove operator command behavior.
    - Run `python3 scripts/spec_verify.py docs/specs/directus-test-control-plane/spec.yml` before completion.

