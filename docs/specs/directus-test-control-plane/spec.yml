risks:
  - id: R-1
    risk: Directus downtime could block test coordination commands.
    mitigation: Fail visibly with actionable errors; keep JSON export/import as an artifact tool, not silent fallback.
  - id: R-2
    risk: GitHub Actions polling may duplicate results when artifacts are reprocessed.
    mitigation: Use deterministic run/result idempotency keys and tests for repeated ingestion.
  - id: R-3
    risk: Raw test artifacts may contain private data.
    mitigation: Store only redacted summaries and artifact references in Directus.

open_questions:
  - id: OQ-1
    question: Which deployed environment should host the first Directus schema rollout for operator verification?
    status: non_blocking_until_deploy
  - id: OQ-2
    question: Should historical JSON records be bulk-imported once or only imported on demand?
    status: non_blocking_until_migration_slice
