contracts:
  data:
    - collection: test_catalog
      purpose: Stable inventory of suites and test identities.
      required_fields:
        - "test_key: Unique canonical key such as `playwright::chat-flow.spec.ts` or `apple::ChatStreamingParity`."
        - "suite: `playwright`, `vitest`, `pytest`, `cli`, `apple`, or future suite key."
        - "test_name: Human-readable test name."
        - "file_path: Nullable source path."
        - "verification_command: Nullable command used to rerun this test."
        - "metadata: JSON for linked files, tags, owner hints, and suite-specific fields."
    - collection: test_runs
      purpose: One execution request or discovered GitHub/Apple run.
      required_fields:
        - "run_key: Unique normalized run key."
        - "source: `scripts_tests`, `github_actions`, `apple_remote`, or `import`."
        - "external_run_id: Nullable GitHub Actions or Apple run identifier."
        - "status: queued, running, completed, failed, cancelled, or skipped."
        - "requested_tests: JSON list of requested canonical test keys."
        - "summary: JSON aggregate counts."
    - collection: test_results
      purpose: Per-test result events for history and triage.
      required_fields:
        - "result_key: Unique idempotency key combining run key, suite, test key, and attempt."
        - "run_key: Link or lookup key to `test_runs`."
        - "test_key: Link or lookup key to `test_catalog`."
        - "status: passed, failed, skipped, running, cancelled, or unknown."
        - "error_summary: Redacted failure summary."
        - "metadata: JSON for retries, flake state, artifacts, and external URLs."
    - collection: test_current_state
      purpose: One latest state row per canonical test key.
      required_fields:
        - "test_key: Unique canonical key."
        - "stable_status: Latest completed status."
        - "stable_result_key: Latest completed result key."
        - "active_status: Nullable active state such as running or queued."
        - "active_run_key: Nullable active run key."
        - "triage_group_id: Nullable deterministic triage group."
        - "updated_at_unix: Last control-plane update time."
    - collection: test_claims
      purpose: Parallel-safe debug leases for failed tests or triage groups.
      required_fields:
        - "claim_key: Unique claim id."
        - "group_id: Claimed deterministic triage group."
        - "status: active, completed, released, or expired."
        - "session_id: Claiming assistant/session id."
        - "worker_id: Optional worker id."
        - "expires_at_unix: Claim expiry time."
        - "completed_commit: Nullable commit that resolved the claim."
  api:
    - No new public user API route is required for the first slice.
    - Backend status-page internals may expose the same response shape they already return, but the source is Directus-backed state.
  cli:
    - "`python3 scripts/tests.py status --json` returns Directus-backed current state."
    - "`python3 scripts/tests.py next --lease --session <id> --json` writes a Directus `test_claims` row."
    - "`python3 scripts/tests.py complete <claim-id> --commit <sha>` completes the Directus claim."
    - "`python3 scripts/tests.py release <claim-id> --reason <reason>` releases the Directus claim."
    - "`python3 scripts/tests.py run ...` marks requested tests active before dispatch waits for completion."
  privacy_security:
    - Store redacted error summaries and artifact references, not raw private logs, screenshots, traces, cookies, API keys, or user data.
    - Directus writes must be idempotent; retries cannot duplicate run or result history.
    - If Directus is unreachable, commands must fail visibly unless explicitly invoked in an import/export-only mode.

