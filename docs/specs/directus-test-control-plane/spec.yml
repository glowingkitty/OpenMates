schema_version: 2
id: directus-test-control-plane
title: Directus Test Control Plane
status: verified

goal: >
  Make Directus the shared source of truth for OpenMates test catalog,
  runs, results, current status, and debugging claims so every assistant chat,
  dev-server-triggered GitHub Actions run, external GitHub Actions run, and
  Apple test run sees the same coordinated test state without relying on local
  JSON files for persistence.

scope:
  in:
    - Add Directus-backed test catalog, run, result, current-state, and claim collections.
    - Migrate `scripts/tests.py` current status, history, triage inputs, run archives, and failure leases to Directus as canonical state.
    - Keep JSON files only as transient import/export, artifact, or offline debugging formats.
    - Mark dev-server-triggered requested tests as running immediately before GitHub Actions completes.
    - Poll GitHub Actions for external or still-running test runs about every five minutes and ingest their latest status.
    - Represent previous stable status separately from an active rerun status for the same test.
    - Include Apple tests as first-class catalog, run, result, current-state, and claim records.
    - Update backend status-page test readers to consume Directus-backed state or the shared adapter, not local JSON state files.
  out:
    - Replacing GitHub Actions as the execution backend.
    - Rewriting Playwright, Vitest, pytest, or Apple test suites themselves except for control-plane tests.
    - Adding a user-facing web UI for editing test claims.
    - Storing raw screenshots, traces, private logs, credentials, or unredacted user data in Directus.
    - Maintaining local JSON files as an authoritative fallback after Directus is reachable.

context_discovery:
  github_issues:
    - GitHub MCP returned 401 Bad Credentials.
    - "`gh issue list --repo glowingkitty/OpenMates --search \"test control plane Directus\" --limit 10` returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/test-orchestration.md
    - docs/architecture/infrastructure/status-page.md
  code_patterns:
    - scripts/tests.py
    - scripts/run_tests.py
    - scripts/sync-test-results.sh
    - backend/core/api/app/services/test_results_service.py
    - backend/core/directus/schemas/workflow_runs.yml
    - backend/core/directus/schemas/issues.yml
    - backend/core/directus/setup/setup_schemas.py
    - backend/core/api/app/services/directus/directus.py
  tests:
    - scripts/tests/test_tests_control.py
  external_research:
    - none

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - The Apple product app is not changed by this developer-tooling work.
    - Apple test executions must still be represented as first-class test-control-plane records.
  verification:
    - Apple app build/test verification is not required for product parity.
    - Control-plane tests must include Apple suite/test records in catalog, current-state, and claim flows.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should Directus become the canonical storage for test status, claims, and history instead of local JSON files?
      answer: Yes. Move completely to the Directus-backed setup; JSON should not remain the persistent coordination state.
    - question: Which Directus collections should anchor the model?
      answer: Use `test_catalog`, `test_runs`, `test_results`, `test_current_state`, and `test_claims`.
    - question: Should a rerun overwrite the previous status immediately?
      answer: No. Show both previous stable status and active rerun status, such as failed but currently running.
    - question: How should tests not started by the dev server be updated?
      answer: Poll GitHub Actions about every five minutes and ingest external run status.
    - question: Are Apple tests part of this model?
      answer: Yes. Apple tests are first-class suite/test records.
  vision_summary: >
    Directus is the source of truth for shared test coordination. `scripts/tests.py`
    continues to be the operator entrypoint, but status, claims, history, and
    triage read/write through Directus so parallel sessions and GitHub Actions
    agree on what is running, failed, claimed, completed, or released. JSON output
    remains useful as an artifact/export format only.
  approved_by_user: true

