decisions:
  - id: D-1
    status: active
    decision: Directus is canonical for test-control-plane persistence.
    reason: Local JSON files cannot coordinate test claims and run status across assistant sessions, dev-server-triggered runs, external GitHub Actions runs, and Apple tests.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-2
    status: active
    decision: Store previous stable status separately from active run status in `test_current_state`.
    reason: Operators need to see that a failed test is currently rerunning without losing the last known stable failure details.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-3
    status: active
    decision: JSON files are allowed only as import/export or artifact formats after the Directus adapter is active.
    reason: Keeping JSON as a persistent fallback would preserve the split-brain behavior this change removes.
    decided_at: "2026-07-17T00:00:00Z"

