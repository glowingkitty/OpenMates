scenarios:
  - id: S-1
    title: Operator sees shared current test status from Directus
    given:
      - "`test_current_state` contains `playwright::chat-flow.spec.ts` with stable status `failed` from run `gha-100`."
      - No local `test-results/tests-state.json` file exists.
    when:
      - An operator runs `python3 scripts/tests.py status --json` from any assistant session.
    then:
      - The command returns the Directus-backed failed status.
      - The command does not recreate local JSON as the authoritative state file.
      - The status payload includes the Directus run/result identifiers needed for follow-up debugging.
  - id: S-2
    title: Dev-server-triggered run marks requested tests running immediately
    given:
      - "`playwright::chat-flow.spec.ts` has stable status `failed` in Directus."
    when:
      - An operator runs `python3 scripts/tests.py run --spec chat-flow.spec.ts`.
    then:
      - "`test_runs` records the dispatched run request."
      - "`test_current_state` keeps stable status `failed` and sets active status `running` for the requested test."
      - Other sessions see the running state before GitHub Actions artifacts finish syncing.
  - id: S-3
    title: GitHub Actions polling ingests external runs
    given:
      - A GitHub Actions test run starts outside `scripts/tests.py run`.
      - The run has no corresponding Directus `test_runs` record yet.
    when:
      - The poller runs on its five-minute cadence.
    then:
      - A `test_runs` record is created or updated with the GitHub run metadata.
      - Completed test results are upserted into `test_results`.
      - "`test_current_state` reflects the latest stable status and clears active running state for completed tests."
  - id: S-4
    title: Parallel workers claim different failed root-cause groups
    given:
      - Directus current state contains two failed Playwright tests in different triage groups.
      - No active non-expired claims exist for either group.
    when:
      - Worker A and Worker B both call `python3 scripts/tests.py next --lease --session <id> --json`.
    then:
      - Each worker receives a different active `test_claims` record.
      - Completing or releasing a claim updates Directus and is visible to later workers.
      - Local `failed-test-leases.json` is not used as the persistent claim source.
  - id: S-5
    title: Apple tests participate in the same catalog and claim flow
    given:
      - An Apple test named `apple::ChatStreamingParity` is known to the catalog.
      - Its latest stable status is `failed`.
    when:
      - An operator requests the next leased failure.
    then:
      - The Apple failure can be returned with suite `apple`, its verification command, and linked files when known.
      - Running or completing the Apple verification updates the same Directus collections as web and backend tests.

