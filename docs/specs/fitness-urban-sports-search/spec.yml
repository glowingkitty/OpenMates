assumptions:
  - id: A-1
    text: Urban Sports Club public web pages may be used for logged-out discovery, but no booking/member/partner APIs are available without credentials.
    category: provider
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs.urbansportsclub.io/documentation/introduction
        summary: Official partner API documentation requires contract and sandbox credentials.
      - source: live public endpoint probes
        summary: "`/en/venues`, `/en/activities`, `/en/class-details/{id}`, and `/en/venues/{slug}` returned logged-out public data."
  - id: A-2
    text: Address/radius filtering requires post-fetching venue detail pages because activity result cards do not contain coordinates.
    category: data_quality
    required_before: implementation
    status: confirmed
    evidence:
      - source: scripts/urban_sports_search.py research probe
        summary: Search cards included venue URLs and detail pages exposed schema.org LocalBusiness geo coordinates.
  - id: A-3
    text: Existing shared geocoding in `backend/shared/python_utils/geo_utils.py` is acceptable for resolving address/radius searches.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/shared/python_utils/geo_utils.py
        summary: Provides `geocode_address` with Nominatim throttling and city fallback.
  - id: A-4
    text: Urban Sports Club privacy policy URL must be verified before adding it to committed privacy-policy metadata.
    category: privacy
    required_before: implementation
    status: confirmed
    evidence:
      - source: https://urbansportsclub.com/en/privacy-policy
        summary: Firecrawl scrape returned HTTP 200 and title `Urban Sports Club Privacy Policy`; provider identity is Urban Sports GmbH.

contracts:
  provider:
    - name: Urban Sports Club public web provider
      module: backend/shared/providers/urban_sports
      endpoints:
        - GET https://urbansportsclub.com/{language}/venues
        - GET https://urbansportsclub.com/{language}/activities
        - GET https://urbansportsclub.com/{language}/class-details/{appointment_id}
        - GET https://urbansportsclub.com/{language}/venues/{slug}
      privacy:
        - Proxy requests through backend only; never call Urban Sports Club directly from the browser.
        - Do not send logged-in user identifiers to Urban Sports Club; query data may include address/location intent.
        - Cache public venue detail metadata with TTL to reduce repeated third-party requests.
  skills:
    - id: fitness.search_locations
      request: >
        { requests: [{ id?, query?, city?, address?, lat?, lon?, radius_km?, plan?, category?, limit?, language? }] }
      response: >
        { results: [{ id, query, provider, result_count, filters, results: [FitnessLocationResult], warnings?, relaxed? }], ignore_fields_for_inference? }
    - id: fitness.search_classes
      request: >
        { requests: [{ id?, query?, city?, address?, lat?, lon?, radius_km?, start_date?, end_date?, days?, plan?, attendance_mode?, min_spots?, category?, venue_id?, limit?, language? }] }
      response: >
        { results: [{ id, query, provider, result_count, filters, results: [FitnessClassResult], warnings?, relaxed? }], ignore_fields_for_inference? }
  data:
    - FitnessLocationResult includes provider, venue_id/address_id when available, name, url, address, postal_code, city, country, lat, lon, distance_km, disciplines, plans_required, image_url, rating/count if available, visit_limits/opening_times when available.
    - FitnessClassResult includes provider, appointment_id, name, category, class_type, date, time_range, attendance_mode, spots_left, spots_display, venue name/url/address/geo/distance, plans_required, detail_url, image_url, important_info/description when detail enrichment is enabled.
  ui_states:
    - Processing preview with query/location/date/radius/provider.
    - Finished preview with result count, mode, date/radius summary, and top result snippets.
    - Empty state with constraints and relaxation suggestions.
    - Error state with public-provider failure reason.
    - Fullscreen grid/list with class/location cards and sortable/filter-readable metadata.
  privacy_security:
    - No Urban Sports member credentials or booking attempts.
    - No private user profile data sent to Urban Sports Club.
    - User-entered addresses are transient request data; logs must use sanitized/truncated location text and coordinates rounded where needed.

