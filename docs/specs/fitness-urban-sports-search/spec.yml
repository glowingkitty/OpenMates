id: fitness-urban-sports-search
title: Fitness Urban Sports Search Skills
status: implementing

goal: >
  Let users search Urban Sports Club fitness locations and available classes from
  OpenMates through two separate Fitness app skills, with reliable radius/date/plan
  filtering, CLI and SDK parity, and event-style embed previews and fullscreen
  result grids.

scope:
  in:
    - "Replace the existing placeholder Fitness metadata skill with two separate skills: `search_locations` and `search_classes`."
    - Use public Urban Sports Club web endpoints and HTML/JSON-LD parsing only; no partner credentials or booking API access.
    - Support city, address, radius, postal-code-like text, discipline/category query, plan filters, on-site/online/all mode, date windows, and minimum available spots.
    - Add a shared Urban Sports provider module with deterministic parsing fixtures and no cross-skill imports.
    - Add CLI, npm SDK, and pip SDK generated/contract coverage for both skills before web Playwright verification.
    - Add Fitness search location/class embed preview and fullscreen components modeled on the Events search embed UX.
    - Update app metadata, i18n sources, provider metadata/privacy docs, and app-store examples needed for a shipped public provider skill.
  out:
    - Booking classes, cancelling bookings, checking in, reading member-specific eligibility, or exposing partner/private APIs.
    - Storing Urban Sports Club account credentials or member data.
    - Guaranteeing complete global Urban Sports coverage beyond fields visible on public logged-out web pages.
    - Replacing the existing Maps app or depending on another app skill from Fitness.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 bad credentials. Fallback `gh issue list --repo glowingkitty/OpenMates --search \"fitness Urban Sports search classes locations\" --state all --limit 10 --json number,title,state,labels,url` returned no matching issue."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/apps/app-skills.md
    - docs/specs/app-skill-processing-quality/spec.yml
    - docs/user-guide/apps/events.md
  code_patterns:
    - backend/apps/fitness/app.yml currently declares one placeholder `search_locations_and_courses` skill, but no `backend/apps/fitness/skills` implementation exists.
    - backend/apps/events/skills/search_skill.py shows multi-request app-skill schema, provider normalization, result grouping, and follow-up suggestion patterns.
    - backend/apps/maps/skills/search_skill.py shows direct async app-skill execution for quick I/O-bound searches.
    - backend/shared/python_utils/geo_utils.py provides `geocode_address` with Nominatim throttling and local city fallback.
    - frontend/packages/ui/src/components/embeds/events/EventsSearchEmbedPreview.svelte and EventsSearchEmbedFullscreen.svelte provide the requested event-style search card/grid reference.
    - frontend/packages/openmates-cli/src/cli.ts and sdk clients already support `openmates apps <app> <skill>` app-skill execution.
  tests:
    - backend/tests/test_app_skill_processing_quality.py
    - backend/tests/test_health_search_appointments_skill.py
    - frontend/apps/web_app/tests/skill-events-search.spec.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - frontend/packages/openmates-cli/tests/embedRenderers.test.ts
    - packages/openmates-python/tests/test_sdk.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
  parity_expectations:
    - Apple renders native Fitness search previews and fullscreen result cards for `search_locations` and `search_classes` instead of falling back to raw generic app-skill JSON.
    - Native Fitness cards preserve provider, summary, filters, top results, location/class metadata, plans, and provider links from the same parent app-skill payload used by web.
  verification:
    - Run `python3 scripts/apple_remote.py status` and `python3 scripts/apple_remote.py build-ios`, or record a sanitized failure class.
  intentional_native_differences:
    - Apple keeps the Fitness native renderer inside the existing app-skill renderer file so remote pre-commit verification can build tracked-file edits without a new Xcode project source entry.

clarification:
  rounds:
    - question: Should Fitness ship one combined skill or two separate skills?
      answer: "Two separate skills: one for search locations and one for search classes."
    - question: Should the default plan filter be one specific Urban Sports plan?
      answer: No. Default to all plans unless the user explicitly requests a plan; every result must show the required plans so BEAT81-style Classic/Premium/Max results are not silently missed.
    - question: Should CLI and SDK integration be included in the first spec?
      answer: Yes. Test CLI and SDK first before web, and include embed preview and fullscreen types that look similar to Events embeds.
  vision_summary: >
    Fitness should expose Urban Sports Club as a useful discovery provider, not a
    brittle demo scraper. Users should be able to ask for locations or available
    classes near an address/radius and get results that preserve plan, distance,
    date, availability, and online/on-site caveats. The first implementation
    should prove contracts through CLI, npm SDK, pip SDK, and web embeds before
    final verification.
  approved_by_user: false

scenarios:
  - id: S-1
    title: Search nearby Fitness locations by address and radius
    given:
      - Alice asks for Urban Sports locations within 1 km of Sorauer Str. 12, 10997 Berlin.
      - The request does not specify a plan.
    when:
      - The Fitness `search_locations` skill resolves the address and searches Urban Sports public venue pages.
    then:
      - Results include venues whose public detail-page coordinates are within 1 km of the resolved address.
      - Each result includes name, URL, address, postal code, coordinates when available, distance, disciplines, and required plans.
      - No venue is hidden only because it is unavailable on the Essential plan.

  - id: S-2
    title: Search available classes near an address without silently dropping higher-plan classes
    given:
      - Alice asks for available classes near Sorauer Str. 12 on 2026-07-07 within 1 km.
      - BEAT81 nearby classes require Classic, Premium, or Max plans.
    when:
      - The Fitness `search_classes` skill searches the public activity pages and post-filters by venue coordinates.
    then:
      - BEAT81 results are included when no plan filter is provided.
      - Each class includes date, time range, class name, category, venue, address, distance, spots left, required plans, detail URL, and provider.
      - The response clearly labels the plan requirements instead of implying every result is available to every membership.

  - id: S-3
    title: Plan filters narrow results intentionally
    given:
      - Alice asks for only Essential-plan classes near Sorauer Str. 12 on 2026-07-07.
    when:
      - The Fitness `search_classes` skill applies `plan=essential`.
    then:
      - Classes whose cards do not include Essential are excluded.
      - The result summary says the search was filtered to Essential.
      - A no-result or reduced-result explanation suggests removing the plan filter when appropriate.

  - id: S-4
    title: On-site and online modes are explicit
    given:
      - Alice asks for classes within 1 km of an address.
      - The public activity page includes online classes associated with nearby studios.
    when:
      - The request omits an online/on-site preference.
    then:
      - Radius/address searches default to on-site classes because online class distance is not meaningful.
      - Users can explicitly request online or all modes.
      - The result summary includes the mode used and the count before/after radius filtering.

  - id: S-5
    title: CLI, npm SDK, and pip SDK can run both skills
    given:
      - Alice has an API key or authenticated SDK client.
    when:
      - She runs the Fitness location and class searches from the CLI, npm SDK, and pip SDK.
    then:
      - Each client sends the same canonical request fields and receives the same canonical response shape.
      - Default CLI output is concise, while JSON output preserves full result details.
      - Generated SDK facades expose both skill IDs after metadata generation.

  - id: S-6
    title: Web chat renders event-style Fitness embeds
    given:
      - Alice asks in web chat for available Fitness classes near Sorauer Str. 12.
    when:
      - The AI triggers `fitness.search_classes` and the embed finishes.
    then:
      - The preview card shows the query/location/radius/date range, provider, result count, and mode summary.
      - Fullscreen opens a grid/list similar to Events search, with result cards for classes or locations and enough details to choose a result.
      - Processing, finished, empty, error, and cancelled states use UnifiedEmbed primitives and stable data-testid attributes.

