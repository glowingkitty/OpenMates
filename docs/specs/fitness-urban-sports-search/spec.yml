implementation_plan:
  existing_patterns:
    - backend/apps/events/skills/search_skill.py for grouped multi-request skill response shape and provider labels.
    - backend/apps/maps/skills/search_skill.py for direct async I/O-bound app-skill execution.
    - frontend/packages/ui/src/components/embeds/events/EventsSearchEmbedPreview.svelte for search preview layout.
    - frontend/packages/ui/src/components/embeds/events/EventsSearchEmbedFullscreen.svelte for fullscreen search grid UX.
    - backend/shared/python_utils/geo_utils.py for address geocoding.
  architecture: >
    Add a shared Urban Sports public-web provider that parses logged-out venue,
    activity, class-detail, and venue-detail pages. Fitness skills call that
    provider directly, normalize results into canonical location/class schemas,
    and return grouped app-skill outputs for embeds, CLI, and SDKs. Radius
    filtering geocodes the user address and enriches candidate venues with
    cached detail-page coordinates before applying haversine distance.
  data_flow:
    - User or SDK calls `fitness.search_locations` or `fitness.search_classes` with one or more requests.
    - Skill resolves city/address/radius/plan/mode filters and calls shared Urban Sports provider.
    - Provider fetches public search pages and only fetches detail pages needed for address/radius enrichment.
    - Skill deduplicates, filters, sorts by distance/date/time/relevance, and returns canonical grouped results plus warnings.
    - Embed preview receives parent result count and summary; fullscreen renders result cards using inline parent data or child embed extraction pattern.
  affected_files:
    - path: backend/shared/providers/urban_sports/__init__.py
      reason: Public Urban Sports provider package.
    - path: backend/shared/providers/urban_sports/client.py
      reason: HTTP client, endpoint builders, pagination, and rate/caching boundaries.
    - path: backend/shared/providers/urban_sports/parsers.py
      reason: HTML and JSON-LD parser functions with fixtures.
    - path: backend/apps/fitness/skills/search_locations.py
      reason: Location skill implementation.
    - path: backend/apps/fitness/skills/search_classes.py
      reason: Class availability skill implementation.
    - path: backend/apps/fitness/app.yml
      reason: Replace placeholder combined skill with two skills and two embed types.
    - path: frontend/packages/ui/src/components/embeds/fitness/FitnessSearchEmbedPreview.svelte
      reason: Shared location/class search preview component.
    - path: frontend/packages/ui/src/components/embeds/fitness/FitnessSearchEmbedFullscreen.svelte
      reason: Shared location/class search fullscreen component.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
      reason: Native Fitness app-skill preview/fullscreen routing and card renderer.
    - path: apple/OpenMates/Sources/Core/I18n/AppStrings.swift
      reason: Typed native accessors for Fitness skill labels.
    - path: frontend/packages/ui/src/i18n/sources/app_skills/fitness.yml
      reason: New skill names, descriptions, and examples.
    - path: frontend/packages/ui/src/i18n/sources/embeds.yml
      reason: Embed labels for Fitness search components if required by registry.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: CLI direct skill execution contract tests.
