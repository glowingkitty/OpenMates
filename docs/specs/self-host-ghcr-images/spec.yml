id: self-host-ghcr-images
title: Self-Host GHCR Image Mode
status: implementing

goal: >
  Make prebuilt GHCR images the default self-hosting distribution path so a
  normal operator can install and update OpenMates without cloning the source
  repository or building Docker images locally. Keep source builds available as
  an explicit contributor/fork path, and measure the actual setup speedup in the
  self-host smoke workflow.

scope:
  in:
    - Make image mode the default for openmates server install/start/update.
    - Remove Git as a prerequisite for regular image-mode installs and updates.
    - Preserve explicit source builds through --from-source and --source-path.
    - Publish OpenMates self-host images to GHCR from GitHub Actions.
    - Tag images from the actual OpenMates CLI/product version line, with commit metadata labels and build env vars.
    - Add a lightweight runtime install directory for image-mode installs instead of a full repository checkout.
    - Add image-mode smoke coverage and record before/after setup timing.
    - Update self-hosting and CLI documentation.
  out:
    - Docker Hub as the primary registry.
    - Removing source-build support.
    - Changing user data volumes, signup modes, or admin promotion behavior.
    - Production auto-deploy agent work unrelated to self-host image pulls.
    - Auto-rollback after failed self-host updates.

context_discovery:
  github_issues:
    - none found for "self-host Docker GHCR images compose update pipeline" using gh fallback; GitHub MCP returned 401.
  docs:
    - docs/self-hosting/setup.md
    - docs/user-guide/cli/server-management.md
    - docs/architecture/platforms/cli-package.md
    - docs/architecture/infrastructure/auto-deploy.md
    - docs/specs/self-host-signup-mode/spec.yml
  code_patterns:
    - frontend/packages/openmates-cli/src/server.ts
    - frontend/packages/openmates-cli/src/serverConfig.ts
    - frontend/packages/openmates-cli/package.json
    - setup.sh
    - backend/core/docker-compose.yml
    - backend/admin_sidecar/main.py
    - backend/core/api/app/routes/settings_software_update.py
    - scripts/prepare_cli_publish_version.mjs
    - shared/config/product_version.json
  tests:
    - frontend/packages/openmates-cli/tests/server.test.ts
    - .github/workflows/selfhost-smoke.yml
    - frontend/apps/web_app/tests/selfhost-smoke.spec.ts
  measurements:
    - Current successful self-host smoke run 27127171693 spent about 5s in install and 9m38s in openmates server start.
    - Current Compose stack resolves to 24 services, with about 14 locally built OpenMates images.
    - Current available image set compressed with docker save | gzip is about 2.2GB excluding the missing webapp image.

clarification:
  rounds:
    - question: Should image mode become the default install path, with --from-source and --source-path as explicit source-build alternatives?
      answer: correct, image mode is default, --from-source / --source-path is optional.
  vision_summary: >
    Default self-hosting should pull prebuilt GHCR images and should not require
    git pull, git clone, or local Docker builds. Source installs remain possible
    for contributors and forks, and the project should verify the real-world
    setup time improvement through GitHub Actions.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Operator installs without Git or source checkout
    given:
      - A fresh Linux server has Docker, Docker Compose, Node.js, and npm installed.
      - Git is not installed.
    when:
      - The operator runs openmates server install.
    then:
      - The CLI creates a lightweight install directory with runtime Compose and env files.
      - No OpenMates repository is cloned.
      - No git command is required.
      - The install output says image mode is active and source mode is optional.
  - id: S-2
    title: Operator starts prebuilt image stack
    given:
      - An image-mode install exists.
    when:
      - The operator runs openmates server start.
    then:
      - Docker Compose pulls GHCR OpenMates images and third-party images.
      - Docker Compose does not build any OpenMates image locally.
      - The web app and API become healthy at the documented localhost ports.
  - id: S-3
    title: Operator updates image-mode install
    given:
      - An image-mode install exists with a pinned OpenMates image tag or channel tag.
    when:
      - The operator runs openmates server update.
    then:
      - The CLI pulls updated images and restarts the stack.
      - The CLI does not run git pull.
      - Update status reports Docker/image deployment mode.
  - id: S-4
    title: Contributor chooses source build
    given:
      - A contributor wants to test local source changes or run a fork.
    when:
      - They run openmates server install --from-source or openmates server install --source-path /path/to/OpenMates.
    then:
      - The CLI requires Git for clone-based source installs.
      - The install uses source Compose files with build sections.
      - server update uses git pull and docker compose build only for source-mode installs.
  - id: S-5
    title: CI publishes versioned GHCR images
    given:
      - A change lands on dev or main, or a maintainer dispatches the image workflow.
    when:
      - The GHCR publish workflow runs.
    then:
      - It builds and pushes multi-architecture OpenMates images.
      - Image tags match the actual OpenMates CLI/product version line for that channel.
      - Images include commit SHA, build timestamp, and version tag metadata.
      - Images are public enough for unauthenticated self-host pulls.
  - id: S-6
    title: CI compares source and image setup time
    given:
      - The self-host smoke workflow can run both legacy source mode and new image mode.
    when:
      - The workflow runs the comparison job.
    then:
      - It records install, start, health-wait, and total durations for each mode.
      - The image-mode path is expected to skip local build time.
      - The workflow uploads timing JSON as an artifact and prints a concise summary.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Regular openmates server install no longer requires Git and does not clone the OpenMates repository.
  - id: AC-2
    scenario: S-1
    text: Image-mode installs create only the files needed to run the stack, including runtime Compose files and .env.
  - id: AC-3
    scenario: S-2
    text: Default Compose for image mode contains image references for OpenMates services and contains no build sections.
  - id: AC-4
    scenario: S-2
    text: Default image-mode start runs docker compose pull/up behavior and reaches healthy API and webapp containers.
  - id: AC-5
    scenario: S-3
    text: Image-mode update uses docker compose pull plus up/restart and never runs git pull.
  - id: AC-6
    scenario: S-3
    text: Backend software-update reporting can identify Docker/image mode using build metadata when no .git directory exists.
  - id: AC-7
    scenario: S-4
    text: --from-source and --source-path preserve the current source-build behavior and remain documented as advanced options.
  - id: AC-8
    scenario: S-5
    text: GHCR workflow publishes all required OpenMates self-host images for linux/amd64 and linux/arm64.
  - id: AC-9
    scenario: S-5
    text: GHCR image tags derive from shared/config/product_version.json and the package publish version logic, not hardcoded example versions.
  - id: AC-10
    scenario: S-5
    text: Published images expose BUILD_COMMIT_SHA, BUILD_COMMIT_MESSAGE, BUILD_TIMESTAMP, and BUILD_VERSION_TAG to runtime where relevant.
  - id: AC-11
    scenario: S-6
    text: Self-host smoke records before/after timing for source mode and image mode in GitHub Actions.
  - id: AC-12
    scenario: S-6
    text: Documentation explains expected download size, source-build fallback, and how updates differ by install mode.

contracts:
  cli:
    - openmates server install defaults to image mode.
    - openmates server install --from-source clones the official repository and builds from source.
    - openmates server install --source-path <dir> copies/clones from a local checkout and builds from source; intended for CI/testing/contributors.
    - openmates server update uses docker compose pull in image mode and git pull plus docker compose build in source mode.
    - openmates server restart --rebuild remains valid only for source mode or reports an actionable message in image mode.
  compose:
    - Image-mode Compose files use ghcr.io/glowingkitty/openmates-* image references for OpenMates-built services.
    - Image-mode Compose files do not mount the project source tree into runtime containers.
    - Source-mode Compose files may keep build sections and source bind mounts.
  ci_cd:
    - GitHub Actions publishes GHCR images with tags derived from product/CLI version plus channel aliases.
    - GitHub Actions can build PR-scoped images or otherwise make image-mode smoke test images available before a public release tag exists.
    - Self-host smoke emits timing evidence for both source and image modes.
  data:
    - Docker volumes and persisted user data names remain stable across source mode and image mode.
    - Existing .env keys continue to work in both modes.
  privacy_security:
    - No secrets are baked into images.
    - GHCR images must be public or otherwise pullable by unauthenticated self-host installs.
    - Images include provenance/metadata where supported by GitHub Actions and Docker Buildx.

