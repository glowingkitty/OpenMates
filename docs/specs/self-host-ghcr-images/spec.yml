implementation_plan:
  existing_patterns:
    - frontend/packages/openmates-cli/src/server.ts
    - frontend/packages/openmates-cli/src/serverConfig.ts
    - scripts/prepare_cli_publish_version.mjs
    - .github/workflows/publish-cli.yml
    - .github/workflows/selfhost-smoke.yml
    - backend/admin_sidecar/main.py
    - backend/core/api/app/routes/settings_software_update.py
  architecture: >
    The npm CLI becomes the installer for image-mode runtime assets. It writes a
    small install directory containing .env, image-mode Compose files, and any
    runtime config templates; source mode continues to clone/copy a repository
    and use build-based Compose. GHCR image publishing runs in GitHub Actions and
    stamps images with version and commit metadata used by update reporting.
  data_flow:
    - Maintainer pushes to dev/main or dispatches the GHCR workflow.
    - Workflow derives the OpenMates image version from shared/config/product_version.json and publish-version helpers.
    - Workflow builds and publishes GHCR images with commit metadata.
    - Operator installs via npm CLI; CLI writes image-mode runtime files and .env.
    - Start/update runs docker compose pull and docker compose up -d.
    - Source-mode operators opt in and keep clone/build/update behavior.
  affected_files:
    - path: .dockerignore
      reason: Prevent accidental local artifacts from entering source builds.
    - path: backend/core/docker-compose.selfhost.yml
      reason: Add image-mode Compose file with GHCR references and no build sections.
    - path: frontend/packages/openmates-cli/src/server.ts
      reason: Default install/start/update to image mode and keep explicit source mode.
    - path: frontend/packages/openmates-cli/src/serverConfig.ts
      reason: Persist install mode and image tag/channel metadata.
    - path: frontend/packages/openmates-cli/package.json
      reason: Include runtime templates if templates are packaged instead of embedded.
    - path: frontend/packages/openmates-cli/tests/server.test.ts
      reason: Cover image/source mode selection and update commands.
    - path: .github/workflows/publish-selfhost-images.yml
      reason: Build and publish GHCR images.
    - path: .github/workflows/selfhost-smoke.yml
      reason: Run image-mode smoke and timing comparison.
    - path: backend/core/api/app/routes/settings_software_update.py
      reason: Complete Docker/image-mode version reporting.
    - path: backend/admin_sidecar/main.py
      reason: Keep pull-based update behavior compatible with image mode if sidecar update endpoints remain active.
    - path: docs/self-hosting/setup.md
      reason: Document image default, source fallback, download size, and update behavior.
    - path: docs/user-guide/cli/server-management.md
      reason: Document install modes and update behavior.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/self-host-ghcr-images/spec.yml
    - cd frontend/packages/openmates-cli && npm run test:unit:server
    - docker compose --env-file .env -f backend/core/docker-compose.selfhost.yml config
    - python3 -m pytest backend/tests/test_software_update_docker_mode.py
    - GitHub Actions self-host smoke image-mode timing job
  risks:
    - First image-mode install still downloads a large image set, estimated around 2.3-2.5GB compressed before optimization.
    - PR image-mode smoke needs temporary image tags that are pullable inside GitHub Actions without becoming public release tags.
    - Frontend runtime config may need follow-up work if build-time VITE_API_URL prevents reusable webapp images for custom domains.
    - Multi-architecture builds can increase CI time and GHCR storage.

