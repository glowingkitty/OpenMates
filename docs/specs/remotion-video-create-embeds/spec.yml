risks:
  - Remotion rendering can be expensive or slow; worker timeouts and cancellation must be reliable.
  - Generated code may fetch arbitrary internet assets; E2B isolation and secret non-injection are required.
  - Timeline parsing may not fully understand dynamic Remotion code; UI must degrade to source view and safe metadata.
  - Storing every rendered version would increase storage cost; v1 keeps source history linear, active artifacts replaceable, and older-version renders temporary unless the user restores that source as current.
  - Apple parity increases implementation scope and requires remote Mac verification.
