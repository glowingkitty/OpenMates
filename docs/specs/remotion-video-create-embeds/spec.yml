      - Timeline manifest is recalculated after a successful diff.
      - Current-version diffs mark existing active artifacts stale and dispatch rerender.
      - Older source versions can be reconstructed and passed to a temporary render request without changing current_source_version.
      - Restoring an older source version truncates later source versions, marks current artifacts stale, and rerenders from the restored source.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: ""
        run_id: ""
        timestamp: ""

  - id: T-PYTEST-ROUTING
    type: pytest
    file: backend/tests/test_remotion_video_routing.py
    command: python3 -m pytest backend/tests/test_remotion_video_routing.py
    covers:
