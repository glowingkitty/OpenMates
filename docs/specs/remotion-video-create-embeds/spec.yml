id: remotion-video-create-embeds
title: Remotion Video Create Embeds
status: draft

goal: >
  Let users create deterministic product-style videos from assistant-generated
  Remotion TSX code inside chat. OpenMates should render these as first-class
  video embeds, auto-render them in isolated E2B sandboxes, keep Remotion source
  code as the durable editable history, and provide web and Apple parity for
  playback, timeline inspection, code inspection, cancellation, rerendering, and
  version-based rerendering.

scope:
  in:
    - Add a new Videos app Remotion creation embed type, rendered as an app-skill-use embed such as app:videos:create.
    - Add explicit assistant instructions for choosing Remotion code over Google Veo when the user asks for text, slides, product announcements, diagrams, UI-like motion graphics, or deterministic branded videos.
    - Add a dedicated Remotion fence contract, for example ```remotion:ProductAnnouncement.tsx, so the backend does not infer arbitrary TSX as video.
    - Convert explicit Remotion fences into videos.create processing embeds instead of code-code embeds.
    - Stream Remotion source into the embed while the assistant is writing, parse it into a timeline, and show a processing/timeline preview before rendering is complete.
    - Auto-start E2B rendering when the Remotion fence closes without asking for a separate confirmation.
    - Allow generated Remotion render code to fetch external internet assets from inside E2B.
    - Show render status transitions in the embed, including processing, rendering, finished, error, cancelled, and needs_rerender where applicable.
    - Let the user stop an active render from the embed, kill the E2B sandbox, preserve the Remotion code and parsed timeline, and rerender later.
    - Charge render runtime only when the render completes or when the user cancels/kills the render; auto-started E2B renders that begin without user consent get the first render minute free, while user-initiated rerenders are billable from the configured start point.
    - Store rendered MP4 and thumbnail outputs in the existing encrypted generated-media/object-storage pipeline for chat files, not in public marketing buckets.
    - Replace the active MP4 and thumbnail when a current Remotion source version is rerendered.
    - Reuse existing embed diff/versioning so user modifications are represented as diffs against the Remotion source instead of full regenerated files when possible.
    - Preserve full Remotion source history and expose a version timeline for code and parsed timeline changes.
    - Support rendering an older source version on demand from the version timeline as a temporary preview/download, and make that behavior part of test coverage.
    - Let users restore an older source version as the new current version by truncating later source changes and rerendering that restored source.
    - Add web preview and fullscreen UI with thumbnail/player, parsed Remotion timeline, code toggle, download, stop, rerender, and render-this-version controls.
    - Add Apple native parity for preview, fullscreen playback, timeline, code toggle, stop/rerender, download/share, and render older version controls.
    - Update privacy/provider disclosures because Remotion code/assets are automatically sent to E2B for this embed type.
  out:
    - Replacing the existing Google Veo videos.generate skill; Veo remains the path for photorealistic or generative video prompts.
    - Auto-detecting generic tsx/typescript/javascript fences as Remotion without an explicit Remotion fence marker.
    - Running generated Remotion code on the OpenMates app/API origin or on the production/dev server process.
    - Preserving every rendered MP4/thumbnail for every source version by default in v1.
    - Publicly deploying generated Remotion projects or exposing raw E2B URLs to clients.
    - Rendering or executing Remotion code inside the Apple app process.
    - Building a full Remotion visual editor in v1.
    - Guaranteeing frame-perfect timeline parsing for arbitrary Remotion code; v1 may use deterministic parser fallbacks and explicit warnings.

