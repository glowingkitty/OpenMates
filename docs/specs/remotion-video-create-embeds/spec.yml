implementation_plan:
  existing_patterns:
    - backend/apps/videos/skills/generate_skill.py for async video embed placeholders and generated-media result shape.
    - backend/apps/videos/tasks/generate_task.py for encrypted MP4 upload, generated asset indexing, and post-completion embed updates.
    - backend/shared/providers/e2b_application_preview.py for E2B sandbox lifecycle and secret-redaction patterns.
    - backend/apps/ai/tasks/stream_consumer.py for special code-fence conversion into first-class embeds.
    - backend/core/api/app/services/embed_service.py for code placeholder updates, app-skill-use embed updates, and versioning hooks.
    - frontend/packages/ui/src/components/embeds/videos/VideoCreateEmbedPreview.svelte for prototype preview UI.
    - frontend/packages/ui/src/components/embeds/videos/VideoCreateEmbedFullscreen.svelte for prototype fullscreen/timeline UI.
    - docs/specs/application-embeds/spec.yml for viewer-owned E2B session and billing isolation.
  architecture: >
    Add a Videos Create Remotion embed as a code-backed media artifact. The
    stream parser creates the embed from explicit remotion fences and stores the
    Remotion source as the editable content. A backend render worker runs the
    generated Remotion project in E2B, uploads encrypted artifacts through the
    generated-media pipeline, and updates the same embed. Diff-based editing
    patches Remotion source versions and triggers rerendering of the selected
    source version.
  data_flow:
    - User asks for deterministic video; AI chooses Remotion instructions.
    - Assistant emits explicit remotion fence.
    - Stream parser creates videos.create embed and source placeholder.
    - Source streams to client; frontend parses timeline.
    - Fence closes; backend finalizes source version and dispatches E2B render task.
    - Render task writes source into pinned Remotion project, renders MP4 and thumbnail, uploads encrypted artifacts, charges after completion/cancel with first minute free, and updates embed.
    - User modifications use diff blocks against embed_ref; source version increments and current active artifacts are replaced after rerender.
    - Older source versions can be reconstructed and rendered on demand as temporary preview/download artifacts.
    - Restoring an older source version truncates later source versions, marks active artifacts stale, and rerenders the restored source as current.
  affected_files:
    - path: backend/apps/videos/app.yml
      reason: Register videos.create embed type, i18n namespace, skill/instruction metadata, and provider disclosures.
    - path: backend/apps/ai/instructions/base_code_block_instruction.md
      reason: Add explicit Remotion fence guidance and prevent generic TSX ambiguity.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Convert remotion fences into videos.create embeds and dispatch render on closure.
    - path: backend/core/api/app/services/embed_service.py
      reason: Create/update videos.create embeds, source versions, render status, and artifact metadata.
    - path: backend/apps/videos/tasks/render_remotion_task.py
      reason: New E2B Remotion render worker.
    - path: backend/shared/providers/e2b_remotion_renderer.py
      reason: Deterministic E2B Remotion project setup, render command, sandbox kill, and log redaction.
    - path: backend/core/api/app/routes/video_remotion.py
      reason: Render, stop, and version metadata endpoints.
    - path: frontend/packages/ui/src/components/embeds/videos/VideoCreateEmbedPreview.svelte
      reason: Wire prototype to real decoded embed content and actions.
    - path: frontend/packages/ui/src/components/embeds/videos/VideoCreateEmbedFullscreen.svelte
      reason: Add real playback, code toggle, version timeline, stop/rerender, download, and render older version controls.
    - path: frontend/packages/ui/src/utils/remotionTimelineParser.ts
      reason: Harden parser for production fallback and test contracts.
    - path: frontend/packages/ui/src/data/embedRegistry.generated.ts
      reason: Regenerated from app.yml after registering videos.create.
    - path: frontend/packages/ui/src/i18n/sources/app_skills/videos.yml
      reason: Add create/render status/action labels.
    - path: shared/docs/privacy_policy.yml
      reason: Disclose E2B automatic Remotion render processing.
    - path: frontend/packages/ui/src/data/providersMetadata.ts
      reason: Update E2B provider description if needed.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/MediaRenderers.swift
      reason: Add native videos.create preview/fullscreen renderer logic.
    - path: apple/OpenMates/Sources/Core/I18n/AppStrings.swift
      reason: Add typed localized strings for Apple Remotion controls.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/remotion-video-create-embeds/spec.yml
    - python3 -m pytest backend/tests/test_remotion_video_embed_parser.py backend/tests/test_remotion_render_task.py backend/tests/test_remotion_embed_diff_versions.py backend/tests/test_remotion_video_routing.py
    - python3 scripts/run_tests.py --suite vitest
    - Deploy to dev before Playwright green-phase verification.
    - python3 scripts/run_tests.py --spec remotion-video-create.spec.ts
    - python3 scripts/run_tests.py --spec embed-showcase.spec.ts
    - python3 scripts/run_tests.py --spec apple-embed-rendering-contracts.spec.ts
    - Remote Mac iOS build and simulator evidence for Apple parity.

