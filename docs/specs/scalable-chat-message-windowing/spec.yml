implementation_plan:
  spec_path: docs/specs/scalable-chat-message-windowing/spec.yml
  existing_patterns:
    - docs/specs/long-chat-compression-history/spec.yml
    - docs/specs/apple-chat-opening-parity/spec.yml
    - frontend/packages/ui/src/services/db/messageOperations.ts
    - frontend/packages/ui/src/components/ActiveChat.svelte
    - frontend/packages/ui/src/components/ChatHistory.svelte
    - backend/core/api/app/routes/share.py
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_content_batch_handler.py
  architecture: >
    Keep viewing windows additive and separate from sync completeness. Existing
    full-history request_chat_content_batch remains the repair/recovery/export
    hammer, while new bounded REST/SDK/share APIs satisfy normal chat viewing.
    IndexedDB caches encrypted pages with explicit range metadata; the web UI
    keeps only a small decrypted active window.
  data_flow:
    - Chat open asks local IndexedDB for a 30-message window around last_visible_message_id or the latest 30 messages.
    - If the matching encrypted page is missing locally, the client requests the new bounded message-window endpoint and stores the encrypted page plus range metadata.
    - Upward scroll auto-loads the previous normal page while preserving the visible anchor.
    - Compression summaries are lightweight checkpoint metadata; forgotten raw pages require explicit reveal and use checkpoint paging.
    - CLI and SDK normal viewing use bounded windows, while explicit --all or chats.load compatibility uses existing full-history paths.
  affected_files:
    - path: backend/core/api/app/routes/chats.py
      reason: First-party bounded message-window endpoint.
    - path: backend/core/api/app/routes/sdk.py
      reason: API-key bounded SDK message-window endpoint.
    - path: backend/core/api/app/routes/share.py
      reason: Shared 30-message default and checkpoint/forgotten page contract.
    - path: backend/core/api/app/services/directus/chat_methods.py
      reason: Shared cursor-window query helper that does not affect full-history fetches.
    - path: frontend/packages/ui/src/services/db/messageOperations.ts
      reason: 30-message default, page-cache metadata, and safe eviction helpers.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Bounded server-window loading and sync-safe fallback behavior.
    - path: frontend/packages/ui/src/components/ChatHistory.svelte
      reason: Auto-load sentinel, pruning, and forgotten-message gate behavior.
    - path: frontend/apps/web_app/src/routes/share/chat/[chatId]/+page.svelte
      reason: Shared page size and compression boundary propagation.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Session CLI bounded chat message fetch/decrypt path.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: chats show bounded default and --all escape.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK bounded messages and iterator API.
    - path: packages/openmates-python
      reason: Pip SDK parity if this repository contains the relevant Python SDK surface.
  verification_strategy:
    - Validate this spec before implementation.
    - Backend unit tests prove new bounded endpoints and unchanged request_chat_content_batch semantics.
    - CLI and SDK unit/contract tests prove bounded defaults plus full-history escapes.
    - Frontend unit/Vitest tests prove page-cache metadata, safe eviction, and UI pruning.
    - Dev-server REST/CLI/SDK evidence runs before web Playwright green evidence.
    - Web Playwright green evidence runs only after deploy to app.dev.openmates.org.
    - User confirms deployed web behavior, then Apple status/build or approved deferral is recorded.
  verification_order:
    - Backend REST/route contracts first.
    - CLI second.
    - npm SDK and pip SDK third.
    - Web implementation and Playwright fourth after deploy.
    - User confirmation fifth.
    - Apple status/build or deferral last.

