contracts:
  api:
    - route: GET /v1/chats/{chat_id}/messages/window
      access_model: first-party client surface only
      auth: session auth; owner or authorized team membership required before encrypted reads
      rate_limits: existing first-party API limits plus normal auth throttling
      request: direction latest|before|after|around, limit default 30 max 100, before/after cursors, optional anchor_message_id, optional respect_compression_boundary=true
      response: encrypted messages only, has_more_before, has_more_after, start_cursor, end_cursor, anchor_found, server_message_count, compression_boundary_timestamp, compression_checkpoints metadata when relevant
      encryption: returns client-side encrypted chat data only; no plaintext private chat content or keys
    - route: GET /v1/sdk/chats/{chat_id}/messages
      access_model: developer API-key REST API
      auth: API key with chat:read_existing and approved device when required by existing SDK chat read policy
      rate_limits: SDK route limits and API-key budgets where applicable
      request: same bounded window query as first-party route
      response: same encrypted bounded message-window envelope plus wrappers needed by SDK decryption when not already loaded
      encryption: returns client-side encrypted chat data only; no plaintext account master keys or chat keys
    - route: GET /v1/share/chat/{chat_id}/messages
      access_model: unauthenticated public share REST API scoped by unguessable shared chat id and client-only fragment key
      auth: public share lookup; URL fragment key never sent
      request: limit default 30 max 100, before cursor, target_message_id, optional checkpoint_id for forgotten pages
      response: encrypted shared messages, has_more, next_before cursor, checkpoint metadata fields where relevant
      encryption: returns encrypted data only and strips encrypted_pii_mappings unless share_pii is true
    - route: WebSocket request_chat_content_batch
      access_model: first-party internal sync/repair path
      contract: unchanged full-history response semantics in this spec
  data:
    - messages_v remains a server message-version/count signal and must not be used as proof that all pages are cached in IndexedDB.
    - IndexedDB stores encrypted messages and page-cache metadata; Svelte stores only decrypted active UI windows.
    - Cached page metadata records chat_id, direction/range cursors, start/end cursors, has_more flags, cached_at, last_accessed_at, page_kind normal|forgotten, and cache generation.
    - Eviction excludes active chat visible-window messages, pending/offline local messages, streaming/sending/processing/failed messages, recovery-related messages, latest page, last-viewed page, and explicitly revealed forgotten pages until chat close.
  ui_states:
    - Initial latest 30 window.
    - Initial around-last-visible window.
    - Normal older page auto-loading.
    - Normal page-load retry/error affordance.
    - Compression summary collapsed forgotten range.
    - Explicit forgotten reveal and additional forgotten page loading.
    - Shared read-only normal and forgotten history.
  privacy_security:
    - Bounded endpoints must authorize before encrypted reads and hide cross-user chat existence using existing 404/permission behavior.
    - Shared endpoints must not receive URL fragment keys and must not widen access beyond existing shared encrypted records.
    - No endpoint added by this spec returns decrypted private message content.
    - Logs and test artifacts must not include plaintext private user data, raw encryption keys, private emails, or share URL fragments.

