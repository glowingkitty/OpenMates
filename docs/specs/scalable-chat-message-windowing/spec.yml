    mitigation: Keep messages_v separate from page-cache metadata and preserve request_chat_content_batch semantics.
  - id: R-2
    risk: Scroll-anchor preservation can regress on mobile when prepending or pruning pages.
    mitigation: Use explicit anchor message ids and Playwright/mobile viewport coverage.
  - id: R-3
    risk: Shared forgotten pages could leak PII mappings when share_pii=false.
    mitigation: Apply sanitize_shared_pii to every shared page response including checkpoint pages.
  - id: R-4
    risk: Eviction could delete pending/offline/recovery records needed for reliability.
    mitigation: Conservative exclusions and unit tests before enabling eviction.

