decisions:
  - id: D-1
    status: active
    decision: Keep request_chat_content_batch full-history semantics unchanged in the first slice.
    reason: Startup sync, repair, and recovery flows rely on it as a full encrypted history hydration path.
    decided_at: "2026-07-22"
  - id: D-2
    status: active
    decision: Use 30 as the default normal message-window/page size across web, share, CLI, and SDK viewing APIs.
    reason: Mobile and long-chat performance should be more conservative than the earlier 40-message window.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: Treat IndexedDB as an encrypted LRU page cache, not as active decrypted chat state.
    reason: This preserves scroll restoration and avoids repeated network/decryption churn while keeping UI memory bounded.
    decided_at: "2026-07-22"
  - id: D-4
    status: active
    decision: Shared links include compression summaries and explicit forgotten pages under existing share access and share_pii behavior.
    reason: A shared chat should be readable as the owner intentionally shared it, without adding a new share setting in this slice.
    decided_at: "2026-07-22"
  - id: D-5
    status: active
    decision: Preserve SDK chats.load(chatId) full-history behavior for compatibility.
    reason: Bounded SDK history should be additive through new messages APIs, not a breaking behavior change.
    decided_at: "2026-07-22"

attempts:
