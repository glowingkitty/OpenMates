scenarios:
  - id: S-1
    title: Owner opens a large chat without full-history hydration
    given:
      - Alice owns a chat with 300 durable encrypted messages.
      - Alice has no compression checkpoint in that chat.
    when:
      - Alice opens the chat in the web app.
    then:
      - The app loads a bounded 30-message normal window from IndexedDB or the new bounded server path.
      - If Alice has last_visible_message_id, the window is centered around that message when possible.
      - If no saved position exists, the latest 30 messages are shown.
      - request_chat_content_batch is not sent for normal viewing when a bounded server window can satisfy the open.

  - id: S-2
    title: Normal older messages auto-load on scroll
    given:
      - Alice is viewing a normal active message window with older active messages available.
    when:
      - Alice scrolls near the top of the loaded normal window.
    then:
      - The next older normal 30-message page loads automatically once.
      - The scroll anchor is preserved after prepending messages.
      - The primary Show older messages button is no longer required for normal active history.
      - Only one load per direction can be in flight for the chat.

  - id: S-3
    title: Web keeps decrypted UI state small
    given:
      - Alice scrolls through more than 90 normal messages in a chat.
    when:
      - New normal pages are loaded.
    then:
      - Decrypted Svelte message state targets 60 normal messages and is pruned before exceeding 90 normal messages.
      - Streaming, sending, failed, permission, highlighted, visible, latest-page, and last-viewed messages are not pruned unsafely.
      - IndexedDB can retain encrypted viewed pages according to the page cache budget.

  - id: S-4
    title: IndexedDB caches viewed encrypted pages without implying full sync
    given:
      - Alice has viewed latest and older pages for a chat.
    when:
      - Alice switches chats and later returns.
    then:
      - Cached encrypted pages can satisfy matching windows without refetching.
      - Page-cache metadata records cached ranges and cursors separately from messages_v.
      - Eviction never deletes pending, offline, streaming, recovery, active visible, latest-page, or last-viewed page messages.
      - Partial page cache does not mark full chat history as locally complete.

  - id: S-5
    title: Compressed and forgotten history stay explicitly gated
    given:
      - Alice opens a chat with a compression checkpoint and pre-checkpoint forgotten raw messages.
    when:
      - Alice opens the chat and scrolls normal active history.
    then:
      - Compression summary metadata is available without fetching forgotten raw pages.
      - Forgotten raw pages are not auto-loaded before Alice clicks Show old forgotten messages.
      - After explicit reveal, forgotten pages load in bounded 30-message pages and render faded.
      - Revealed forgotten raw messages do not re-enter active AI context.

  - id: S-6
    title: Shared viewer receives the same readable boundaries
    given:
      - Bob opens a shared-chat link for a chat with normal older messages and compression checkpoints.
    when:
      - Bob opens the link and scrolls or reveals forgotten history.
    then:
      - The shared page loads a latest 30-message normal window by default.
      - Shared compression summaries render from encrypted checkpoint metadata.
      - Bob can explicitly reveal old forgotten messages behind the same button.
      - share_pii=false strips encrypted_pii_mappings from all shared normal and forgotten pages.
      - The share URL fragment key remains client-only and is not sent to the server.

  - id: S-7
    title: CLI and SDK use bounded viewing APIs by default
    given:
      - Alice has a 300-message saved chat.
    when:
      - Alice runs openmates chats show <chat> without flags or developer code calls the new SDK messages API.
    then:
      - CLI prints the latest 30 messages by default and indicates that more history exists.
      - CLI --all explicitly uses the compatibility full-history path.
      - npm and pip SDK messages APIs return bounded windows and iterators page safely.
      - npm SDK chats.load(chatId) remains full-history compatible.

  - id: S-8
    title: Startup sync and recovery semantics are preserved
    given:
      - Alice logs in on a browser with empty IndexedDB and server-side chats.
    when:
      - Startup phased sync, recovery checks, and normal chat opening run.
    then:
      - Phased sync still reaches its normal complete state.
      - Existing full-history request_chat_content_batch responses still update full-history repair/recovery state.
      - Bounded window responses do not set flags that suppress future missing-page or full-repair fetches.
      - No re-sync loop is caused by partial page caches.

