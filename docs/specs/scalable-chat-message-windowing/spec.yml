schema_version: 2
id: scalable-chat-message-windowing
title: Scalable Chat Message Windowing
status: implementing

goal: >
  Make large chats scale safely across web, shared links, CLI, SDK, and Apple by
  using a bounded 30-message viewing window, encrypted IndexedDB page caching,
  automatic normal-history paging, and explicit forgotten-history reveal without
  changing existing full-history sync, repair, recovery, export, or login semantics.

scope:
  in:
    - Additive bounded normal-message window contract for authenticated first-party clients.
    - Additive bounded normal-message window contract for API-key SDK clients.
    - Shared-chat normal message windows unified to a 30-message default.
    - Shared-chat compression summaries and explicit forgotten-message pages available to shared viewers under existing share access and share_pii rules.
    - Web active chat opening around last_visible_message_id when possible, otherwise latest 30.
    - Web automatic normal older-message loading on upward scroll, replacing the normal Show older messages primary button.
    - Web decrypted UI state pruning with target 60 and hard cap 90 normal messages.
    - IndexedDB as an encrypted LRU page cache for viewed normal-history pages, with conservative safe exclusions.
    - CLI chats show defaulting to latest 30 unless --all is explicitly passed.
    - npm SDK bounded chat messages API and iterator while preserving chats.load(chatId) full-history compatibility.
    - Pip SDK bounded chat messages API and iterator if the Python SDK package is present for this surface.
    - Tests proving startup/login phased sync and request_chat_content_batch semantics are not changed.
  out:
    - Repurposing request_chat_content_batch or changing its full-history repair/recovery semantics.
    - Treating messages_v as proof that every message row is cached locally.
    - Replacing account export, per-chat export, or debug full-history hydration behavior.
    - Reintroducing forgotten raw messages into active AI context after visual reveal.
    - Adding a new owner-level setting to exclude forgotten messages from shared links.
    - Full Apple implementation before API, CLI, SDK, web, and user-confirmed dev behavior are verified.
    - A breaking change to npm SDK chats.load(chatId).

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials during discovery; issue search could not run in this environment."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/long-chat-compression-history/spec.yml
    - docs/specs/apple-chat-opening-parity/spec.yml
    - docs/specs/apple-live-chat-accessibility-fixes/spec.yml
    - docs/architecture/frontend/virtual-scrolling-chat-history.md
    - docs/user-guide/cli/chats.md
  code_patterns:
    - frontend/packages/ui/src/services/db/messageOperations.ts currently defaults local windows to 40 and max 100.
    - frontend/packages/ui/src/components/ActiveChat.svelte reads local windows but falls back to request_chat_content_batch when local messages are absent.
    - frontend/packages/ui/src/components/ChatHistory.svelte renders the normal Show older messages button and already gates forgotten history separately.
    - frontend/apps/web_app/src/routes/share/chat/[chatId]/+page.svelte fetches shared manifest plus a 40-message shared message window.
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_content_batch_handler.py returns full encrypted histories for requested chats.
    - backend/core/api/app/routes/chats.py exposes session-authenticated full encrypted message reads.
    - backend/core/api/app/routes/sdk.py exposes API-key chats.load full encrypted message reads.
    - backend/core/api/app/routes/share.py already returns encrypted shared compression checkpoints and can page old checkpoint messages.
    - frontend/packages/openmates-cli/src/cli.ts uses full-history chat load for chats show.
    - frontend/packages/openmates-cli/src/sdk.ts has chats.load(chatId) full-history compatibility but no bounded messages API.
  tests:
    - frontend/packages/ui/src/services/db/__tests__/messageWindowOperations.test.ts
    - backend/tests/test_native_chats_api.py
    - backend/tests/test_share_chat_window_loading.py
    - backend/tests/test_chat_compression_checkpoint_handler.py
    - frontend/apps/web_app/tests/startup-sync-contract.spec.ts
    - frontend/apps/web_app/tests/show-more-chats-flow.spec.ts
    - frontend/apps/web_app/tests/long-chat-history.spec.ts
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/sdk.test.ts
    - packages/openmates-python/tests/test_sdk.py
  risk_assessment:
    - Changing request_chat_content_batch in place is high risk because startup sync, recovery, and repair flows depend on full-history hydration.
    - Safe implementation is additive: new bounded window contract, separate page-cache metadata, and existing full-history paths preserved for repair/recovery/export/debug.

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
    - apple/OpenMates/Sources/Core/Networking/SyncManager.swift
  parity_expectations:
    - Apple should eventually consume the same bounded message-window contract and keep full sync semantics separate from viewing-window semantics.
    - Existing Apple chat-opening specs already require bounded window behavior; this web/API/SDK spec must not invalidate those expectations.
  verification:
    - python3 scripts/apple_remote.py status after web/API/SDK implementation.
    - build-ios or test-ios after user-confirmed dev web behavior, unless Apple is explicitly deferred by user-approved blocker.
  intentional_native_differences:
    - Native scrolling and page-trigger affordances may be platform-specific, but the data contract and forgotten-history gate must match.

clarification:
  rounds:
    - question: Should IndexedDB cache normal older pages or keep them memory-only?
      answer: Use IndexedDB as an encrypted LRU page cache for normal history, with memory-only decrypted UI windows.
    - question: Is this high risk for sync/login architecture?
      answer: Yes if request_chat_content_batch is changed. Use the safe additive implementation and ensure sync is not broken.
    - question: Should the page/window default become 30, with UI caps target 60 and hard 90?
      answer: Yes.
    - question: Should shared chats include compression summaries and old forgotten messages?
      answer: Yes. Shared viewers should access compressed summaries and explicit forgotten pages under existing share permissions and share_pii.
    - question: Should SDK compatibility be preserved?
      answer: Yes. Keep SDK chats.load full-history compatibility, add bounded messages/iterator APIs, and make CLI show bounded by default with --all.
    - question: Should IndexedDB eviction be included in the first implementation?
      answer: Yes, using conservative safe exclusions.
  vision_summary: >
    OpenMates should stop treating normal chat viewing as full-history hydration,
    while preserving full-history sync and recovery contracts. Users should open
    large chats at their saved position or latest 30 messages, scroll normally to
    auto-load active history, and reveal forgotten compressed history only through
    the explicit existing gate. Shared viewers, CLI users, and SDK developers get
    the same bounded normal-history model without breaking compatibility escapes.
  approved_by_user: true

