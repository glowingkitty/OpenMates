implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/settings/SkillExamplesSection.svelte
    - frontend/packages/ui/src/components/settings/AppSettingsMemoriesCategory.svelte
    - frontend/packages/ui/src/demo_chats/exampleChatStore.ts
    - frontend/packages/ui/scripts/generate-embed-registry.js
  architecture: >
    Treat content embed catalog membership as part of the existing embed type
    metadata contract. Source YAML marks eligible content types, the frontend
    metadata generator exposes those entries, AppDetails renders an app-scoped
    Content section, and a new content detail component reuses the existing chat
    preview card flow to open exactly one linked public example chat.
  data_flow:
    - App YAML/shared embed config declares catalog metadata for a content type.
    - Frontend generation emits content catalog metadata into static app or embed registry data.
    - AppDetails reads app-scoped catalog entries and renders Content cards.
    - Content detail route uses the catalog key to find description/guidance and one example chat.
    - Example chat store resolves `content_embed_examples` metadata to ChatPreviewCard data.
    - Audit validates coverage, matching embeds, and public safety.
  affected_files:
    - path: backend/shared/python_schemas/app_metadata_schemas.py
      reason: Accept optional content catalog fields on embed type definitions.
    - path: backend/apps/*/app.yml
      reason: Mark eligible content artifact embed types and add catalog metadata.
    - path: shared/config/embed_types.yml
      reason: Mark virtual/standalone content types such as sheet and repo.
    - path: frontend/packages/ui/scripts/generate-embed-registry.js
      reason: Emit content catalog metadata from source YAML.
    - path: frontend/packages/ui/src/types/apps.ts
      reason: Type generated app/content catalog metadata for settings UI.
    - path: frontend/packages/ui/src/components/settings/AppDetails.svelte
      reason: Render app-scoped Content section.
    - path: frontend/packages/ui/src/components/settings/AppDetailsWrapper.svelte
      reason: Route to content type detail pages.
    - path: frontend/packages/ui/src/components/settings/ContentEmbedDetails.svelte
      reason: New detail page for content type description and example chat.
    - path: frontend/packages/ui/src/demo_chats/types.ts
      reason: Add content embed example metadata.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Add lookup helper for content type examples.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/*.ts
      reason: Add or update canonical content example chats.
    - path: scripts/audit_example_chats.py
      reason: Enforce content example coverage and matching embed types.
    - path: frontend/apps/web_app/tests/content-embed-settings.spec.ts
      reason: Verify deployed settings content catalog behavior.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/content-embed-example-chats/spec.yml
    - python3 scripts/audit_example_chats.py
    - python3 scripts/run_tests.py --suite vitest --filter embedRegistry
    - python3 scripts/run_tests.py --spec content-embed-settings.spec.ts
    - python3 scripts/run_tests.py --spec example-chats-load.spec.ts
    - python3 scripts/apple_remote.py status and build-ios/test-ios if native files change
  verification_order:
    - Local deterministic audit and unit/generation tests first
    - Web Playwright red phase before deploy for new settings coverage
    - Deploy to dev and wait for Vercel Ready
    - Web Playwright green phase on app.dev.openmates.org
    - Apple remote status/build or recorded deferral after web evidence

