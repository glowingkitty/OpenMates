open_questions:
  - Should standalone child/result content types beyond Git repo and Website, such as events, products, places, stays, and travel connections, be added in a later v2 catalog pass?
  - Should the Content section be ordered before or after Focus modes when an app has all capability sections?
  - Should Apple native parity ship in the same implementation PR or be tracked as a follow-up after web settings launch?

risks:
  - Real example chats for generated artifacts can regress if the underlying assistant output quality is insufficient; each must be agent-reviewed before check-in.
  - Catalog membership can drift if future embed types omit the explicit content catalog flag; the audit should fail missing coverage for flagged entries but not infer product intent for unflagged entries.
  - Website and video examples can blur user-added, found-by-search, and assistant-created origins; v1 uses one canonical example per type and defers origin variants.
