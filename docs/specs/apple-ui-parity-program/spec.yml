scenarios:
  - id: S-1
    title: Program inventory ranks chat parity gaps from source and tests
    given:
      - The repository contains web chat specs, web chat source, Apple chat source, native tests, and the counterpart map.
      - The parity matrix lists product surfaces and known status definitions.
    when:
      - The parity inventory runs for the chat-first program scope.
    then:
      - It produces a machine-readable inventory of chat surfaces, web specs, web selectors, Apple files, Apple identifiers, native tests, contract fixtures, and visual artifacts.
      - It flags missing mappings, stale counterpart paths, missing identifiers, missing native tests, missing fixtures, and intentionally native differences.
      - It ranks chat gaps before settings, auth, billing, and broader non-chat surfaces.

  - id: S-2
    title: Web chat contracts capture rendered source-of-truth states
    given:
      - The deployed dev web app renders selected chat surfaces with synthetic or sanitized test data.
      - The contract extractor knows the chat selectors and states to capture.
    when:
      - The web contract Playwright specs run after deployment.
    then:
      - They capture normalized rendered DOM, computed style, layout, interaction state, accessibility-relevant semantics, and optional screenshot metadata.
      - The first promoted contracts cover shell, chat list, transcript, message bubbles, composer, attachments, streaming or processing, empty, loading, error, offline, and responsive states.
      - Private user data, raw chat IDs, credentials, local hostnames, and volatile timestamps are excluded.

  - id: S-3
    title: Deterministic Apple contract audits fail structural and testability drift
    given:
      - Promoted web chat contracts and the chat parity inventory exist.
      - Apple chat source and native test hierarchy can be inspected or exercised.
    when:
      - The deterministic Apple parity audit runs.
    then:
      - Missing mapped Apple identifiers, missing required states, stale fixtures, missing renderers, forbidden generic fallbacks, and structural ordering mismatches fail.
      - Visual/style drift is reported as warning-level unless the specific surface has been promoted to blocking.
      - Intentional native differences are allowed only when documented and scoped to OS-owned or explicitly approved native behavior.

  - id: S-4
    title: Targeted Apple UI tests prove chat-first user journeys
    given:
      - The Apple app can run on remote iPhone and iPad simulators, with macOS evidence collected when available.
      - Chat web contracts and synthetic fixtures are available to native tests or audit scripts.
    when:
      - Targeted native UI tests exercise chat shell, list, transcript, composer, attachments, streaming, restoration, and responsive states.
    then:
      - Native tests prove product behavior and structure for the same contracts rather than copying every web test line by line.
      - iPhone and iPad evidence is required for promoted chat gates; macOS evidence is required unless the spec records a sanitized external blocker or user-approved waiver.
      - Failures identify the owning surface and missing parity contract rather than producing only generic screenshot diffs.

  - id: S-5
    title: Visual artifacts are reviewed and promoted surface by surface
    given:
      - A deterministic chat contract passes for a selected surface.
      - Web and Apple screenshots or rendered artifacts are available for light, dark, compact, and regular layouts where applicable.
    when:
      - A reviewer compares visual artifacts for the selected surface.
    then:
      - Visual drift starts as warning-level with attached artifacts and clear owner notes.
      - Reviewed stable differences are either documented as intentional native differences or promoted to blocking checks.
      - Promotion requires a specific surface/state, tolerance, artifact source, and fallback rule; it is not applied globally by default.

  - id: S-6
    title: The program expands beyond chat through the matrix
    given:
      - Chat-first inventory, contract, audit, native-test, and visual-review gates are established.
      - The parity matrix still contains settings, auth, billing, embeds, sharing, offline/sync, and other non-chat surfaces.
    when:
      - The nightly Apple parity review or a follow-up implementation session runs.
    then:
      - It selects the next highest-value surfaces using missing identifiers, missing tests, user-visible risk, and recent web UI changes.
      - The same hybrid gate pattern is reused instead of creating unrelated one-off tests.
      - The matrix records which surfaces are missing, partial, visually gapped, functionally gapped, testability-gapped, or promoted parity candidates.

