contracts:
  api:
    - No product API changes are required for the parity program itself.
    - Test-only fixture injection, if added by implementation specs, must be gated by DEBUG or UI-test launch arguments and must not alter normal production behavior.
  data:
    - Program inventory records web source files, web specs, web selectors, Apple source files, Apple identifiers, native tests, web contract fixtures, artifact paths, statuses, owners, and intentional native differences.
    - Generated inventory artifacts live under `test-results/` and committed approved fixtures live under Apple/web test fixture directories already used by the contract pipeline.
    - Contract artifacts must sanitize private content, raw chat IDs, credentials, device names, local hostnames, and volatile values.
  ui_states:
    - Chat shell compact and regular navigation.
    - Chat list grouping, active, unread, empty, hidden, and context-action states.
    - Transcript user, assistant, system, loading, processing, streaming, completed, error, and restored states.
    - Message bubbles, markdown, citations, generated-by/report actions, highlights, avatars, and mate identity.
    - Composer default, focused, disabled, attachment, audio, processing, failed-send, and post-send clearance states.
    - Light, dark, compact iPhone, regular iPad, and macOS-equivalent layouts for promoted states.
  privacy_security:
    - No private test credentials, raw issue data, private screenshots, encryption keys, tokens, hostnames, or user content may be committed.
    - Native test identifiers and debug labels must be synthetic and must not expose decrypted chat content or secrets.
    - Visual artifacts from real accounts remain transient test artifacts unless manually sanitized.
  gate_policy:
    - Blocking from the start: missing mappings, missing required identifiers, missing fixtures, stale fixtures, missing native tests, missing known renderers, forbidden generic fallback, broken behavior, and structural order drift.
    - Warning from the start: unpromoted visual/style differences caused by typography, spacing, color, radius, shadow, animation, or rasterization.
    - Promotable to blocking: reviewed visual/style checks with explicit surface, state, tolerance, artifact source, and native-difference rule.

