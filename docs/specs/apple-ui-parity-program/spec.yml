risks:
  - Broad parity programs can become vague; this spec narrows the first rollout to chat and requires concrete inventory/test/artifact gates.
  - Native visual comparisons can be flaky if promoted too early; visual drift remains warning-only until reviewed per surface.
  - Existing vertical chat specs may overlap; this spec coordinates gates and priority but should not duplicate their detailed implementation ledgers.
  - Remote Apple verification can be blocked by simulator, signing, or runner availability; blockers must be sanitized and recorded in the spec.
  - Adding identifiers only for tests can distort accessibility if not implemented as real stable product semantics.

open_questions:
  - Which chat visual states should be promoted from warning to blocking first after the initial inventory: shell, transcript, composer, or streaming?
  - Should nightly Apple parity review become a blocking daily-test signal after chat gates stabilize, or remain advisory plus PR-scoped blocking checks?
  - What macOS evidence threshold is acceptable if remote execution remains unavailable but iPhone and iPad simulator coverage passes?
