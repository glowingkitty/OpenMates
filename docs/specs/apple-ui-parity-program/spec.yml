    - apple/OpenMates/Sources/Features/Embeds/**/*.swift
    - apple/OpenMatesUITests/*.swift
    - apple/OpenMatesTests/*.swift
  parity_expectations:
    - The rendered web app remains the source of truth for owned OpenMates UI hierarchy, behavior, state, semantics, tokens, and visual intent.
    - Apple may use native controls where the operating system owns the surface, but surrounding OpenMates UI must satisfy the same product contract.
    - Chat-first parity must prove behavior and structure through deterministic checks before visual review can be treated as meaningful.
    - Every intentionally native difference must be recorded with a reason and must not hide a missing owned OpenMates product state.
  verification:
    - Deterministic parity inventory and contract audit on Linux.
    - Web Playwright contract extraction after dev deployment for selected chat surfaces.
    - Remote Apple simulator build/test evidence for targeted chat UI tests.
    - Paired web/native artifact review for promoted chat visual states.
  intentional_native_differences:
    - Status bars, safe areas, system keyboards, OS file/photo/audio pickers, text rasterization, scrolling physics, and permission dialogs may differ.
    - XCTest/XCUITest and remote simulator screenshots replace Playwright as native interaction proof.
    - SwiftUI/AppKit/UIKit composition can differ internally while preserving owned product UI structure and visible state.

clarification:
  rounds:
    - question: For the first approved spec, should this be a broad Apple UI parity program or a focused first vertical slice?
      answer: Broad program.
    - question: How strict should the broad Apple UI parity program be at first?
      answer: "Hybrid gate: fail deterministic coverage/testability/contract drift, keep visual differences warning-only until each surface is reviewed and promoted."
    - question: Which surfaces should the first broad parity program prioritize for enforceable coverage?
      answer: Chat first.
  vision_summary: >
    The program should make actual Apple UI parity measurable and enforceable,
    not merely add disconnected native E2E tests. The first rollout is chat-first
    and broad enough to build reusable inventory, contract, native-test, visual
    review, and nightly gates for later settings/auth/billing/embed surfaces.
  approved_by_user: true

