schema_version: 2
id: apple-ui-parity-program
title: Apple UI Parity Program
status: implementing

goal: >
  Establish a durable Apple/web UI parity program that treats the rendered web
  app as the source of truth, turns the existing Apple parity matrix into
  enforceable contracts, and closes chat-first parity gaps through deterministic
  coverage, native UI tests, and reviewed visual artifacts. The first rollout
  prioritizes owned chat surfaces before expanding the same machinery to
  settings, auth, billing, embeds, and other Apple counterparts.

scope:
  in:
    - A broad Apple/web parity program contract anchored to `docs/architecture/apple/parity-matrix.md`.
    - Chat-first rollout across app shell, chat list/sidebar, transcript, message bubbles, composer, attachments, streaming, empty, loading, error, offline, and responsive states.
    - Reuse and expansion of the existing rendered web UI contract pipeline from `docs/specs/apple-ui-contracts/spec.yml`.
    - Deterministic failure gates for missing mappings, missing Apple accessibility identifiers, missing fixtures, missing native tests, stale contract artifacts, and structural or behavioral drift.
    - Warning-first visual/style drift reporting with an explicit promotion path to blocking failures per reviewed surface.
    - A machine-readable priority inventory connecting web specs, web source, Apple source, native tests, visual artifacts, and intentional native differences.
    - Nightly and CI-friendly checks that surface parity gaps without requiring every native visual comparison to run on every commit.
  out:
    - Blind one-to-one duplication of every web Playwright test in Apple UI tests.
    - Pixel-perfect screenshot failure gates across all Apple surfaces before each surface has been reviewed and promoted.
    - Replacing native SwiftUI/UIKit/AppKit owned product UI with a WebView to shortcut parity.
    - Rewriting existing chat architecture unless a specific approved chat parity spec requires it.
    - Watch-only parity work; watchOS remains governed by separate constrained-platform specs.
    - Committing private credentials, private screenshots, raw user content, device hostnames, or production identifiers.

