implementation_plan:
  spec_path: docs/specs/apple-ui-parity-program/spec.yml
  existing_patterns:
    - docs/architecture/apple/parity-matrix.md surface/status taxonomy
    - docs/specs/apple-ui-contracts/spec.yml hybrid contract severity model
    - scripts/apple_parity_audit.py inventory generation
    - scripts/apple_chat_parity_audit.py chat-specific deterministic checks
    - scripts/apple_ui_contracts.py contract fixture validation and promotion
    - frontend/apps/web_app/tests/apple-*-contracts.spec.ts web rendered contract extraction
    - apple/OpenMatesUITests/*ParityUITests.swift native parity UI tests
  architecture: >
    Extend the existing parity matrix, inventory scripts, web contract fixtures,
    and native UI test suite into one program-level gate. The program first
    ranks chat gaps, expands rendered web contracts for promoted chat states,
    fails deterministic Apple structure/testability drift, collects targeted
    native evidence, then uses reviewed visual artifacts to promote surface-level
    visual checks from warning to blocking.
  data_flow:
    - Web source, web specs, Apple source, native tests, and counterpart maps feed the parity inventory.
    - Deployed web Playwright contract specs produce sanitized rendered contract artifacts.
    - Contract promotion validates fixtures before native tests or audits consume them.
    - Apple deterministic audits compare fixtures, identifiers, structural order, renderer coverage, and allowed native differences.
    - Remote Apple UI tests produce simulator evidence and artifacts for promoted chat states.
    - Visual reviews update the matrix and may promote specific visual checks to blocking.
  affected_files:
    - path: docs/specs/apple-ui-parity-program/spec.yml
      reason: Program-level product contract and implementation ledger.
    - path: docs/architecture/apple/parity-matrix.md
      reason: Surface status, priority order, and promotion state source.
    - path: scripts/apple_parity_audit.py
      reason: Broad parity inventory generation and gap ranking.
    - path: scripts/apple_chat_parity_audit.py
      reason: Chat-first deterministic audit and failure policy.
    - path: scripts/apple_ui_contracts.py
      reason: Contract schema, fixture validation, and promotion support.
    - path: frontend/apps/web_app/tests/apple-chat-ui-contracts.spec.ts
      reason: Planned rendered web contract extraction for chat-first surfaces.
    - path: apple/OpenMatesUITests/ChatFlowParityUITests.swift
      reason: Planned native UI test consumption of promoted chat contracts.
    - path: apple/AGENTS.md
      reason: Apple development instructions now point agents at the parity program and hybrid gate.
    - path: .claude/skills/ios/SKILL.md
      reason: Canonical iOS skill now requires the parity program in Linux audit mode.
    - path: .agents/skills/ios/SKILL.md
      reason: Generated iOS skill mirror synchronized from the canonical Claude skill.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-ui-parity-program/spec.yml
    - python3 scripts/apple_parity_audit.py
    - python3 scripts/tests.py run --spec apple-chat-ui-contracts.spec.ts
    - python3 scripts/apple_chat_parity_audit.py
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatFlowParityUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPad Pro 13-inch (M5)" --only-testing OpenMatesUITests/ChatFlowParityUITests
    - Paired web/native visual artifact review for promoted chat states
  verification_order:
    - Validate spec shape.
    - Run inventory red phase before implementation.
    - Run web contract red phase against deployed dev before implementation is deployed.
    - Run deterministic Apple audit red phase before Apple fixes.
    - Implement inventory, contract, audit, native test, and matrix slices in that order.
    - Deploy web contract changes before green Playwright evidence.
    - Run iPhone and iPad native tests through `scripts/apple_remote.py` after web and deterministic gates.
    - Record visual artifact review and macOS evidence, blocker, or waiver before completion.

