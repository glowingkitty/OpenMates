id: search-parent-preview-metadata-sync
title: Search Parent Preview Metadata Sync
status: implementing

goal: >
  Make every search/result-list parent embed useful, reload-safe, and scalable by
  storing lightweight parent-level preview metadata at creation time and by
  persisting owner-only click backfills through the existing encrypted embed sync
  path. Parent previews must remain self-contained and must never hydrate child
  embeds during chat render.

scope:
  in:
    - Existing search/result-list composite parent embeds with child results, including web, images, events, maps, travel, shopping, nutrition, home, social/news/weather/videos-style result lists where the app.yml skill has `has_children: true` and renders a result-list preview.
    - Backend parent embed creation/update metadata for new search/result-list results.
    - Owner/write-only durable legacy backfill after explicit fullscreen/open action has already loaded child data.
    - Shared-chat recipient local-only/read-only backfill for the current device/session.
    - A deterministic synthetic example chat with many messages, parent embeds, and child embeds for repeatable load-performance testing without AI/provider calls.
    - A deterministic audit script and path-scoped hook coverage so new child/composite result-list embed types declare or implement parent preview metadata behavior.
    - Focused unit/pytest/vitest coverage and one targeted web E2E proposal for new and legacy behavior.
  out:
    - Background migration or chat-wide scans of legacy embeds.
    - Preview-render child hydration, child embed decryption, or child embed server requests.
    - Replacing the embed encryption/key wrapping model.
    - Versioned embed history or diff-based metadata patches for this derived preview backfill.
    - Changing billing, share permissions, ownership rules, or provider APIs.
    - Backfilling non-result-list composite embeds such as generated applications unless they explicitly opt into this contract later.

