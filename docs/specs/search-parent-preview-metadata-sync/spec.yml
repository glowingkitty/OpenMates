risks:
  - Some existing has_children skills may be composite but not result-list previews; the audit needs explicit exemptions to avoid noisy failures.
  - Owner/write detection must be conservative. If access is unclear, fall back to local-only backfill and warn rather than writing.
  - Re-encrypting parent content in place must preserve unknown fields to avoid losing app-specific metadata.
  - Playwright shared-recipient write assertions may need a network/mock hook if server logs are too noisy.
  - A large static example chat can bloat bundles if implemented as a hand-written array; prefer deterministic generation or dev/test-only registration.

open_questions:
  - Which exact non-search result-list skills should be covered in TASK-1 after app.yml enumeration, and which should be exempted as non-result-list composites?
