apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This spec defines backend/frontend web embed storage and sync contracts. Apple embed rendering parity can consume the same durable parent metadata later but is not changed in this first implementation.
  verification:
    - Apple not affected for this web/backend metadata and sync slice.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should v1 target all composite parent embeds, or only search/result-list parent embeds?
      answer: Focus v1 on search/result-list parent embeds while ensuring new child/composite embed types are created with the requirement in mind.
    - question: For legacy parents, may durable backfill write/sync only when the viewer has owner/write access, while shared-chat recipients stay local/read-only?
      answer: Yes. Owner/write viewers may persist and sync; shared-chat recipients may only apply local read-only backfill.
    - question: Should durable owner backfill rewrite parent encrypted content in place or use a versioned/diff-style update?
      answer: Rewrite in place with a guarded idempotent merge is preferred because these fields are derived lightweight preview metadata, not user-authored content.
    - question: Should legacy backfill happen only after explicit user action or include a background migration/audit command?
      answer: Only after explicit click/open action. Do not scan old chats or run background migrations in v1.
    - question: Should the deterministic guard be a required audit only, or also a path-scoped hook?
      answer: Add it as a hook as well so new child/composite embed types are checked when they are added.
    - question: Should implementation include a synthetic example chat with many messages, embeds, and child embeds for load testing?
      answer: Yes. Add an artificial deterministic example chat for testing fast loading of dense messages, parent embeds, and child embeds without invoking real providers or AI.
  vision_summary: >
    Search and result-list parent embeds should be self-contained cards: they show
    counts, sources/thumbnails/favicons, and enough summary data from the parent
    record without loading child content. New parent embeds must carry that
    metadata from creation, and legacy parent embeds may be upgraded only after a
    user explicitly opens them. Owner/write users can persist that metadata via
    encrypted sync; shared-chat recipients remain local/read-only.
  approved_by_user: true

scenarios:
  - id: S-1
    title: New search parent embeds store lightweight preview metadata
    given:
      - Alice is authenticated and owns a writable chat.
      - Alice asks OpenMates to search for "Berlin AI events" using a result-list search skill.
      - The skill returns multiple child results.
    when:
      - The backend creates or updates the parent app_skill_use embed.
    then:
      - The parent encrypted content includes app_id, skill_id, status, result_count, embed_ids, query/provider metadata, and lightweight preview_results or a skill-specific equivalent.
      - The preview metadata contains only allowlisted summary fields needed by the card, such as title, URL/source, favicon, thumbnail, date/location/price where applicable.
      - The parent metadata does not include full child payloads, long descriptions, raw provider blobs, or hidden child content.
      - Reloading the chat renders the preview from the parent record without loading child embeds.

  - id: S-2
    title: Legacy owner parent embed is durably backfilled after explicit open
    given:
      - Alice owns a writable chat with an older search parent embed.
      - The parent has result_count or embed_ids but lacks preview_results.
    when:
      - Alice opens the embed fullscreen and child results load because of that explicit action.
    then:
      - OpenMates derives lightweight parent preview metadata from the loaded child results.
      - OpenMates merges only allowlisted preview fields into the parent content, preserving existing fields and unknown fields.
      - OpenMates re-encrypts and syncs the parent through the existing store_embed path.
      - Reloading the chat shows the upgraded parent preview without reopening fullscreen.

  - id: S-3
    title: Shared-chat recipient backfill is local and read-only
    given:
      - Bob opens a shared-chat link as a recipient using the fragment key.
      - The shared chat contains an older search parent embed without preview_results.
    when:
      - Bob opens the embed fullscreen and child results load locally.
    then:
      - OpenMates may merge lightweight preview metadata into local memory or IndexedDB for Bob's device.
      - OpenMates does not call store_embed, store_embed_keys, or any server write endpoint for the backfill.
      - The owner's encrypted parent embed is unchanged.
      - Bob's local enhancement is treated as best-effort and read-only.

  - id: S-4
    title: Parent preview render never hydrates child embeds
    given:
      - A chat message contains search/result-list parent embeds with many child IDs.
      - Some parents have preview_results and some legacy parents only have result_count or child IDs.
    when:
      - The chat message enters the visible viewport.
    then:
      - Preview components render from parent metadata only.
      - Preview components do not call loadEmbedsWithRetry, request_embed, embedResolver child loading, or TOON decoding of child embeds.
      - Parents with positive result_count or child IDs but no preview_results show a non-empty "open to view results" state rather than "No results found".
      - Parents with explicit result_count zero show the no-results state.

  - id: S-5
    title: New result-list embed types are blocked without a parent preview contract
    given:
      - A developer adds or modifies an app.yml skill with has_children true and a search/result-list preview component.
    when:
      - The deterministic audit or path-scoped hook runs.
    then:
      - The check fails unless the skill is covered by parent preview metadata generation or has a documented exemption.
      - The check explains which app/skill and files need metadata or an exemption.
      - Existing non-result-list composite embeds are allowed only when explicitly exempted with a reason.

  - id: S-6
    title: Synthetic dense example chat opens quickly without provider calls
    given:
      - A deterministic example chat named search-parent-preview-stress-test exists in the local example-chat registry.
      - The chat contains many alternating user/assistant messages.
      - The assistant messages reference many search/result-list parent embeds and each parent has many child embed IDs.
      - The parent embeds include lightweight preview metadata while child embeds include full result content.
    when:
      - A test opens the example chat from the app or direct example-chat route.
    then:
      - The chat opens from static fixture data without AI inference or external provider calls.
      - Initial render shows useful parent previews from parent metadata.
      - Initial render does not load or decode every child embed.
      - The test can use this fixture to catch large-chat/embed graph regressions.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Every in-scope new search/result-list parent embed persists enough lightweight parent metadata for preview rendering without child hydration.
  - id: AC-2
    scenario: S-2
    text: Owner/write fullscreen backfill rewrites parent encrypted content in place through the existing encrypted sync path and survives reload.
  - id: AC-3
    scenario: S-3
    text: Shared-chat recipient backfill never writes to the server and remains local/read-only.
  - id: AC-4
    scenario: S-4
    text: Parent preview rendering never loads, decrypts, decodes, or requests child embeds before an explicit user action.
  - id: AC-5
    scenario: S-4
    text: Missing preview metadata with positive result_count or child IDs renders as an open-to-view state, while explicit zero result_count renders as no results.
  - id: AC-6
    scenario: S-5
    text: A deterministic audit and path-scoped hook block new in-scope child/result-list parent embeds without metadata support or explicit exemption.
  - id: AC-7
    scenario: S-6
    text: A deterministic synthetic large example chat exists and can be used by tests to verify dense parent/child embed graphs load without real AI or provider calls.

contracts:
  api:
    - route: store_embed WebSocket event
      request: "Existing encrypted parent embed payload with encrypted_content rewritten in place after owner/write backfill."
      response: "Existing ACK/retry behavior. No new public API route is required for v1."
      errors:
        - Shared-chat recipient contexts must not emit this event for preview metadata backfill.
        - Missing write access must leave backfill local-only and log a visible warning.
  data:
    - Parent embed content remains the durable source of truth for preview metadata.
    - Allowlisted backfill fields include result_count, preview_results, preview_results_json, preview_sources, preview_thumbnails, and skill-specific shallow card fields approved by tests.
    - Backfill must preserve app_id, skill_id, status, query, provider/providers, embed_ids, parent identifiers, embed_ref, and unknown fields.
    - Backfill must never copy full child content, raw provider blobs, full descriptions beyond preview needs, encrypted child payloads, or child keys into parent content.
    - Idempotent merge writes only when the merged parent content differs from the latest decoded parent content.
  ui_states:
    - Parent has preview metadata: render card details from parent fields.
    - Parent has explicit result_count zero: render no-results state.
    - Parent has child IDs or positive result_count but no preview metadata: render open-to-view state.
    - Parent fullscreen opened by owner/write user: derive and sync backfill after child results load.
    - Parent fullscreen opened by shared recipient: derive local-only backfill after child results load.
  privacy_security:
    - Shared-chat fragment keys are never sent to the server.
    - Shared-chat recipients cannot mutate owner embed records through preview metadata backfill.
    - Owner/write backfill uses the same encrypted embed-key model and store_embed retry behavior as finalized send_embed_data embeds.
    - Preview metadata must not expose more information to a recipient than the parent/child embeds already authorized for that chat.
  deterministic_guards:
    - Audit search/result-list has_children skills in backend/apps/*/app.yml against metadata-builder coverage or an explicit exemption list.
    - Audit preview components for forbidden child hydration calls.
    - Wire the metadata audit into a path-scoped hook for app.yml, embed_service.py, preview components, and audit/exemption files.
  fixtures:
    - The synthetic stress chat must be generated or represented compactly in source so it does not add a huge hand-written fixture.
    - The fixture must use deterministic IDs and content so tests are stable.
    - The fixture must be hidden from normal marketing/example-chat browsing unless explicitly intended for dev/test surfaces.

