implementation_plan:
  existing_patterns:
    - backend/core/api/app/services/embed_service.py:_build_parent_preview_metadata
    - frontend/packages/ui/src/components/embeds/embedPreviewHydration.ts
    - frontend/packages/ui/src/services/chatSyncServiceHandlersAI.ts send_embed_data/store_embed encryption path
    - scripts/audit_embed_preview_hydration.py
  architecture: >
    Keep parent previews self-contained by expanding server-side parent metadata
    builders for in-scope search/result-list skills. Add a frontend owner/write
    backfill helper that derives the same lightweight fields after fullscreen
    child loading, merges them into decoded parent content, re-encrypts, stores
    locally, and emits store_embed only when the current chat context is writable.
    Shared contexts reuse the merge locally without server writes.
  data_flow:
    - New skill result completes and EmbedService creates child embeds.
    - EmbedService builds parent preview metadata from the returned result objects before encrypting parent content.
    - Preview renders from parent metadata only.
    - Synthetic stress chat opens from static fixture data and exercises dense parent/child graphs without provider calls.
    - Legacy owner opens fullscreen, child results load explicitly, helper builds preview metadata from loaded child results.
    - Helper checks write access, merges allowlisted fields into parent content, encrypts with existing embed key, stores locally, and emits store_embed.
    - Shared recipient opens fullscreen, same metadata is merged locally without store_embed/store_embed_keys.
  affected_files:
    - path: backend/core/api/app/services/embed_service.py
      reason: Expand parent preview metadata builders for in-scope result-list skills.
    - path: backend/tests/test_skill_preview_metadata.py
      reason: Backend coverage for metadata generation and allowlists.
    - path: frontend/packages/ui/src/components/embeds/embedPreviewHydration.ts
      reason: Shared helpers for state classification, preview metadata builders, and idempotent parent merge.
    - path: frontend/packages/ui/src/services/embedStore.ts
      reason: Replace or supplement in-memory-only merge with local/durable owner-aware parent metadata update support.
    - path: frontend/packages/ui/src/services/embedSenders.ts
      reason: Reuse existing store_embed retry behavior if a small exported helper is needed.
    - path: frontend/packages/ui/src/components/embeds/*/*SearchEmbedFullscreen.svelte
      reason: Call backfill helper only after explicit fullscreen child loading.
    - path: scripts/audit_search_parent_preview_metadata.py
      reason: Deterministic audit for result-list parent metadata coverage.
    - path: scripts/tests/test_audit_search_parent_preview_metadata.py
      reason: Fixture coverage for deterministic audit.
    - path: .claude/hooks or existing hook adapter paths
      reason: Add path-scoped hook invocation for app.yml/embed metadata changes if the repo's hook architecture supports it.
    - path: docs/contributing/guides/add-embed-type.md
      reason: Document parent preview metadata requirement for new child/result-list embed types.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/search-parent-preview-stress-test.ts
      reason: Add deterministic dense example-chat fixture for load testing.
    - path: frontend/packages/ui/src/demo_chats/exampleChatData.ts
      reason: Register the synthetic stress chat behind a dev/test-only flag or internal fixture list.
    - path: frontend/apps/web_app/tests/search-parent-preview-stress.spec.ts
      reason: Verify dense synthetic parent/child embed graph loading behavior.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/search-parent-preview-metadata-sync/spec.yml
    - python3 scripts/audit_embed_preview_hydration.py
    - python3 scripts/audit_search_parent_preview_metadata.py
    - python3 -m pytest scripts/tests/test_audit_embed_preview_hydration.py scripts/tests/test_audit_search_parent_preview_metadata.py backend/tests/test_skill_preview_metadata.py
    - python3 scripts/run_tests.py --suite vitest
    - deploy to dev, wait for Vercel Ready, then python3 scripts/run_tests.py --spec legacy-search-parent-previews.spec.ts
    - deploy to dev, wait for Vercel Ready, then python3 scripts/run_tests.py --spec search-parent-preview-stress.spec.ts
  verification_order:
    - Backend pytest and audit red/green first.
    - Vitest helper/sync behavior second.
    - Web Playwright red before deploy and green after deploy for owner/shared behavior.
    - Synthetic stress Playwright red before deploy and green after deploy for bounded dense embed loading.
    - Apple not affected for v1.

