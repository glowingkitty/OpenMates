risks:
  - "Risk: Enforcing claims on all active docs immediately could freeze unrelated work. Mitigation: hooks are reminder-only and hard enforcement rolls out through explicit tests/deploy gates after cleanup."
  - "Risk: Agent cleanup could delete useful historical context. Mitigation: delete/fold decisions come from deterministic reports plus context-aware agent review, with GitHub issues created for planned work worth preserving."
  - "Risk: Claim markers can exist without meaningful assertions. Mitigation: add assertion-quality conventions first, then later add AST/body checks for no-op wrappers where feasible."
  - "Risk: Moving docs breaks source comments and external links. Mitigation: Markdown link validation plus code-link impact reporting must run after each cleanup batch."
  - "Risk: Public docs app accidentally publishes executable specs. Mitigation: docs/.docsignore plus manifest tests explicitly exclude docs/specs/."

open_questions:
  - Should docs/contributing/ remain excluded from the public /docs app, or should selected contributor docs be intentionally exposed after cleanup?
  - What GitHub label should be used when preserving planned work from deleted docs as issues?
  - Should `manual` claims require a review cadence after the initial rollout?
