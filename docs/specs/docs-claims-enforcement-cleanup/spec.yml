id: docs-claims-enforcement-cleanup
title: Documentation Claims Enforcement And Cleanup
status: verified

goal: >
  Create one durable documentation system where every kept active doc is useful,
  discoverable, linked, and backed by deterministic assertions whenever feasible.
  Non-blocking hooks should keep agents aware of connected docs/tests during edits,
  while regular static tests and deploy checks prevent broken Markdown links,
  invalid claim wiring, and stale low-quality docs from silently accumulating.

scope:
  in:
    - A unified claim schema for all active docs under docs/.
    - Deterministic Markdown link validation for all kept docs.
    - Non-blocking hook reminders when docs, specs, Playwright specs, unit tests, or backend tests change.
    - Static inventory and graph reporting for doc counts, statuses, claims, broken links, orphan docs, and folder health.
    - A docs cleanup workflow that uses deterministic reports plus an agent/skill for context-heavy link replacement, folding, and deletion decisions.
    - A target docs folder structure that prioritizes implemented behavior and contributor onboarding quality over quantity.
    - Exclusion of docs/specs/ from public /docs web app navigation and generated docs pages while keeping specs versioned in git.
    - Reorganization of user-facing billing docs into docs/user-guide/billing/.
    - Enforcement that planned, idea, todo, in-progress, and partial doc statuses are invalid outside docs/specs/.
    - A post-build cleanup campaign that uses the new system to update, fold, or delete existing docs until active docs are clean.
  out:
    - Running Playwright for Markdown link validation.
    - Blocking every edit through hooks; hooks inject context and reminders by default.
    - Keeping a long-lived archive or research docs folder.
    - Publishing executable specs as normal public /docs web app pages.
    - Preserving planned architecture docs as docs instead of moving worthwhile planned work to GitHub issues.
    - Rewriting the docs web app UI design beyond navigation/exclusion changes needed for the new structure.

