schema_version: 2
id: workspace-change-history
title: Workspace Change History And Ask Commands
status: verified

goal: >
  Add a privacy-preserving workspace change-history foundation and then ship
  working namespace-specific `ask` commands for tasks, plans, projects, and
  workflows. Every user or AI mutation creates a durable change entry before it
  is committed, recent history stays fast in Directus, older history is exported
  in encrypted S3 archive batches, and `ask` auto-applies clear changes while
  returning precise commands to undo individual changes or the whole action.

scope:
  in:
    - A shared change-set model for user-visible task, plan, project, and workflow mutations, regardless of whether the source is CLI, SDK, web, Apple, workflow input, or AI.
    - Per-object change entries that record create, update, delete, archive, restore, link, unlink, reorder, status, criteria, verification, assumption, and workflow graph/version changes.
    - Directus hot history capped at the latest 10 change entries per object.
    - Cold archive export to encrypted S3 batch files when an object reaches 20 hot entries, archiving the oldest 10 entries only after checksum verification succeeds.
    - Directus archive manifest rows that preserve searchable metadata for archived batches without private plaintext.
    - Zero-knowledge or Vault-compatible encrypted before/after snapshots and patches, matching each object family’s existing encryption model.
    - Non-destructive restore and undo semantics where rollback creates a new latest change entry or workflow version and never truncates previous history.
    - Backend enforcement that every mutating task, plan, project, and workflow API path writes a change history entry or fails visibly.
    - CLI, npm SDK, and pip SDK object-history, object-restore, and change-set undo contracts before web UI work.
    - Deterministic guardrails that block implementation of `tasks ask`, `plans ask`, `projects ask`, and `workflows ask` mutations until the change-history foundation is green.
    - Namespace-specific `openmates tasks ask`, `openmates plans ask`, `openmates projects ask`, and `openmates workflows ask` commands after the history foundation passes.
    - Auto-apply-by-default `ask` behavior for creates, edits, deletes, archives, links, and bulk changes, with a clear applied-change overview, namespace-specific per-entry rollback commands, and whole-change-set undo commands.
    - Optional `ask` confirmation mode for users who want preview-before-apply behavior, without making confirmation the default.
    - AI-backed parsing and mutation planning for long instruction-like inputs, plus direct deterministic creation for short title-like inputs when no inference is needed.
  out:
    - Team/shared multi-user collaborative history, branching history graphs, CRDTs, or merge UI.
    - Server-side decryption of durable task, plan, project, or client-encrypted workflow private content.
    - Full visual timeline UI for web or Apple in the first backend/CLI foundation slice.
    - Account-level configurable retention settings in V1, beyond schema fields that can support them later.
    - Long-term legal audit export for administrators; this feature is owner-scoped product history, not an admin surveillance log.
    - A global `openmates create` or global `openmates ask` command in V1.
    - Requiring default confirmation before applying `ask` changes when the request is authorized and valid.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials in this environment."
    - "Fallback `gh issue list --repo glowingkitty/OpenMates --search \"\\\"change history\\\" OR undo OR \\\"tasks ask\\\" OR \\\"workflow undo\\\"\" --state all --limit 20` found adjacent closed #153: Implement rendered preview of file/embeds changes over time."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/embed-diff-editing-parity/spec.yml
    - docs/architecture/messaging/embed-diff-editing.md
    - docs/specs/projects-remote-sources/spec.yml
  code_patterns:
    - backend/core/directus/schemas/embed_diffs.yml defines append-only encrypted snapshot/patch history for embeds.
    - backend/core/api/app/services/embed_diff_service.py must not decrypt, reconstruct, or restore embed history server-side.
    - frontend/packages/openmates-cli/src/client.ts reconstructs and restores embed versions client-side using the parent embed key.
    - backend/core/directus/schemas/workflow_versions.yml stores immutable workflow graph versions.
    - backend/core/api/app/services/workflow_service.py keeps the latest 25 active workflow versions and protects current/run-pinned versions.
    - backend/core/directus/schemas/workflow_input_mutations.yml stores workflow-input undo metadata with encrypted before/after blob refs.
    - backend/core/api/app/services/workflow_input_service.py stores workflow input sessions with a 7-day session TTL and mutation snapshots without an explicit snapshot expiry in the current save path.
    - backend/core/api/app/routes/user_tasks.py and backend/core/api/app/services/directus/user_task_methods.py currently expose hard task delete behavior.
    - backend/core/api/app/routes/user_plans.py and backend/core/api/app/services/user_plan_service.py expose plan mutations without shared undo/history.
    - backend/core/api/app/routes/projects.py and backend/core/api/app/services/directus/project_methods.py expose project mutations with archive metadata but no shared change-history contract.
    - frontend/packages/openmates-cli/src/cli.ts exposes deterministic tasks and plans commands but no `ask` commands yet.
  tests:
    - backend/tests/test_user_tasks_api.py
    - backend/tests/test_user_plans_api.py
    - backend/tests/test_projects.py
    - backend/tests/test_workflow_input_sessions.py
    - backend/tests/test_workflow_directus_pinned_version_contract.py
    - frontend/packages/openmates-cli/tests/tasks.test.ts
    - frontend/packages/openmates-cli/tests/plans.test.ts
    - frontend/packages/openmates-cli/tests/sdk-tasks.test.ts
    - frontend/packages/openmates-cli/tests/sdk-plans.test.ts

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Tasks/TaskBoardView.swift
    - apple/OpenMates/Sources/Projects/ProjectDetailView.swift
    - apple/OpenMates/Sources/Workflows/**
  parity_expectations:
    - Apple must eventually create the same change history entries for native task, plan, project, and workflow mutations before exposing native undo/history UI.
    - The first implementation may stop at shared API/client contract and static Apple impact review; native UI parity waits until web and SDK contracts are stable.
  verification:
    - Run or attempt python3 scripts/apple_remote.py status before marking Apple parity not affected or deferred.
    - Run build-ios or targeted Apple tests only when Swift API clients or native workspace mutation code are changed.
  intentional_native_differences:
    - Native timeline UI can be deferred; native mutations must still preserve server/API history once the shared endpoints are used.

clarification:
  rounds:
    - question: Should natural-language workspace creation use a global `openmates create` command or namespace-specific commands?
      answer: Use namespace-specific commands such as `openmates workflows ask`, `openmates tasks ask`, `openmates plans ask`, and `openmates projects ask`.
    - question: Should short title-like `ask` inputs create directly while long instruction-like prompts use the AI pipeline?
      answer: Yes. Short title-like inputs can create directly; long instruction-like inputs should use AI preprocessing/main/postprocessing.
    - question: Should shared undo/history be implemented before AI-assisted `ask` mutations?
      answer: Yes. Every change to a workflow, task, plan, or project must create a change history entry regardless of whether it is created by a user or AI.
    - question: How should retained history be capped?
      answer: Keep the latest 10 entries hot in Directus. When another batch causes the object to reach 20 hot entries, archive the oldest 10 as an encrypted S3 backup file and keep lightweight manifests.
    - question: Should `ask` auto-apply safe changes or require confirmation before applying?
      answer: Auto-apply all authorized valid changes by default, then show a clear overview of what was created or modified and provide commands to undo individual changes or the full change set. Users can opt into an extra confirmation command/flag when they want preview-before-apply behavior.
  vision_summary: >
    `ask` is blocked until a reliable history foundation exists, then the same
    spec must deliver working namespace-specific `ask` commands. The foundation
    must be universal across deterministic user actions and AI actions, cap hot
    Directus growth, preserve older history as encrypted S3 batches, and use
    restore-as-new-version semantics so history is never silently lost or
    rewritten. `ask` should auto-apply valid authorized changes by default and
    make rollback obvious by returning namespace-specific rollback commands for
    individual entries and a whole-change-set undo command.
  approved_by_user: true

product_contract:
  history_subjects:
    - task
    - plan
    - project
    - workflow
  mutation_sources:
    - cli
    - npm_sdk
    - pip_sdk
    - web
    - apple
    - ai_ask
    - workflow_input
    - system_migration
  hot_cold_retention:
    hot_limit_per_object: 10
    archive_trigger_hot_count: 20
    archive_batch_size: 10
    archive_destination: encrypted_s3_batch
    prune_rule: Directus hot entries may be pruned or marked archived only after S3 upload, checksum verification, and manifest persistence succeed.
    failure_rule: Archive failures keep Directus rows intact, log/alert visibly, and retry without data loss.
  restore_semantics:
    - Hot restore reads Directus history immediately.
    - Cold restore fetches the needed S3 archive batch using a manifest row.
    - Restore creates a new latest version/change entry; old entries and archives remain immutable.
    - Undo reverts an entire change set in reverse entry order by creating compensating mutations.
  ask_gate:
    - "`tasks ask`, `plans ask`, `projects ask`, and `workflows ask` may create proposed mutations only after this spec's required history tests pass."
    - Any implementation that adds AI workspace mutations before universal history enforcement must fail deterministic guardrail checks.
  ask_behavior:
    commands:
      - openmates tasks ask <instruction>
      - openmates plans ask <instruction>
      - openmates projects ask <instruction>
      - openmates workflows ask <instruction>
    default_apply_mode: auto_apply
    optional_confirmation_mode: true
    short_input_rule: Short title-like input creates one object directly with the input as title/goal/name when no AI inference is needed.
    long_input_rule: Long instruction-like input uses AI preprocessing, mutation planning, validation, application, and post-apply summary.
    output_rule: Every successful applied action returns a change overview, change_set_id, namespace-specific per-entry restore/rollback commands, and one command to undo the whole change set.
    invalid_or_ambiguous_rule: Invalid authorization, invalid generated mutations, or unresolved ambiguity fails before applying changes and does not create partial user-visible mutations.
    partial_failure_rule: If a multi-entry apply fails after one or more entries commit, the response must identify applied entries, failed entries, and rollback commands for the committed change set.
  history_command_contract:
    shared_backend_surface: /v1/workspace/history remains the common metadata and retention API for all object types.
    global_cli_commands:
      - openmates history list
      - openmates history show <change-set-id>
      - openmates history undo <change-set-id>
    namespace_cli_commands:
      - openmates tasks history <task-id>
      - openmates tasks restore <task-id> --entry <history-entry-id> [--state before|after]
      - openmates plans history <plan-id>
      - openmates plans restore <plan-id> --entry <history-entry-id> [--state before|after]
      - openmates projects history <project-id>
      - openmates projects restore <project-id> --entry <history-entry-id> [--state before|after]
      - openmates workflows history <workflow-id>
      - openmates workflows restore <workflow-id> --entry <history-entry-id> [--state before|after]
    command_rules:
      - Object-level history browsing and object restore must be exposed under the matching namespace, not as `openmates history restore ...`.
      - Per-entry rollback commands shown after mutations and ask actions must use the matching namespace command when the changed entry affects a single task, plan, project, or workflow.
      - Namespace restore defaults to `--state after` for restoring the historical version produced by an entry; generated rollback commands use `--state before` to undo that entry.
      - Whole-change-set undo may remain global because one change set can span multiple object namespaces.

data_contract:
  directus_collections:
    - collection: workspace_change_sets
      purpose: One user-visible action or AI action that can contain one or more object mutations.
      visible_fields:
        - id
        - hashed_user_id
        - source
        - namespace
        - action_type
        - status
        - redacted_summary
        - created_at
        - updated_at
        - undo_expires_at
    - collection: workspace_change_entries
      purpose: Per-object mutation entry with encrypted before/after refs or workflow version refs.
      visible_fields:
        - id
        - change_set_id
        - object_type
        - object_id
        - operation
        - version_before
        - version_after
        - encrypted_before_ref
        - encrypted_after_ref
        - encrypted_patch_ref
        - workflow_version_before_id
        - workflow_version_after_id
        - archived_manifest_id
        - created_at
        - archived_at
        - undone_at
    - collection: workspace_change_archives
      purpose: Lightweight Directus manifest for each encrypted S3 archive batch.
      visible_fields:
        - id
        - hashed_user_id
        - object_type
        - object_id
        - first_entry_created_at
        - last_entry_created_at
        - entry_count
        - s3_bucket_key
        - s3_object_key
        - checksum
        - encryption_mode
        - created_at
  privacy_contract:
    - Directus metadata must not store plaintext task titles, plan goals, project names, workflow prompts, descriptions, criteria text, labels, or private graph details when those fields are private in the parent object model.
    - Task, plan, and project snapshots/patches use client-side encrypted object keys or their established key-wrapper model.
    - Workflow history should prefer workflow_versions references for graph changes; workflow-input private state continues to use workflow encrypted blobs unless/until workflows move to a client-only encryption model.
    - S3 archive objects contain encrypted payloads only and are not useful without the same object/user keys needed for hot history.

api_contract:
  endpoints:
    - method: GET
      path: /v1/workspace/history
      behavior: List owner-scoped recent change sets and optional filters for object_type, object_id, source, action_type, and limit.
    - method: GET
      path: /v1/workspace/history/{change_set_id}
      behavior: Show one owner-scoped change set with hot entries and archive manifest references when entries are cold.
    - method: POST
      path: /v1/workspace/history/{change_set_id}/undo
      behavior: Undo one owner-scoped change set by creating compensating mutations and a new undo change set.
    - method: POST
      path: /v1/workspace/history/{object_type}/{object_id}/restore
      behavior: Restore an owner-scoped object to a chosen hot or cold historical entry by creating a new latest version/change entry.
    - method: POST
      path: /internal/workspace/history/archive-due
      behavior: Internal worker endpoint or job entrypoint that archives due hot entries in verified encrypted S3 batches.
    - method: POST
      path: /v1/user-tasks/ask
      behavior: Parse a natural-language task request, auto-apply valid authorized task mutations by default, and return applied changes plus namespace-specific rollback commands.
    - method: POST
      path: /v1/user-plans/ask
      behavior: Parse a natural-language plan request, auto-apply valid authorized plan mutations by default, and return applied changes plus namespace-specific rollback commands.
    - method: POST
      path: /v1/projects/ask
      behavior: Parse a natural-language project request, auto-apply valid authorized project mutations by default, and return applied changes plus namespace-specific rollback commands.
    - method: POST
      path: /v1/workflows/ask
      behavior: Parse a natural-language workflow request, auto-apply valid authorized workflow mutations by default, and return applied changes plus namespace-specific rollback commands.
  ask_payload:
    fields:
      - instruction
      - apply_mode
      - target_id
      - chat_id
      - project_id
      - idempotency_key
    apply_modes:
      - auto_apply
      - confirm_first
    response_fields:
      - applied
      - change_set_id
      - summary
      - changed_entries
      - undo_all_command
      - undo_entry_commands
      - warnings
      - clarification_required

