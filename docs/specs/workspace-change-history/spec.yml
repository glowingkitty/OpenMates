risks:
  - Hot/cold history touches persistence, encryption, S3, CLI, SDK, and workflow versioning, so incomplete implementation could create partial history or restore gaps.
  - Failure to make history writes atomic with mutations could leave objects updated without recoverable history.
  - Client-encrypted cold restore requires careful key availability across CLI, web, and Apple.
  - Archive retries must avoid duplicate archive manifests or accidental deletion of the only hot copy.
  - Workspace ask has two plaintext boundaries: transient server-side planning for instructions and first-party client-side encryption for durable task/plan/project payloads; logging must stay redacted.
  - Workflow app-skill grounding must fail closed when a requested capability is absent instead of creating plausible but non-executable graphs.

open_questions:
  - Whether archive batches should live in an existing `chatfiles` bucket namespace or a dedicated workspace-history bucket after A-1 is checked.
  - Whether Directus rows should be hard-pruned after manifest success or retained with an `archived_at` marker and null encrypted refs for an additional operational window.
