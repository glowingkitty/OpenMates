implementation_plan:
  spec_path: docs/specs/workspace-change-history/spec.yml
  architecture: >
    Introduce a shared history service used by task, plan, project, and workflow
    mutation boundaries. The service creates owner-scoped change sets and
    encrypted per-object entries inside the same transaction or explicit failure
    boundary as the user-visible mutation. A background archive job moves old hot
    entries into encrypted S3 batches and records Directus manifests. After the
    history foundation passes, namespace-specific ask handlers parse natural
    language into validated mutations, auto-apply by default, and return applied
    change summaries plus full-change-set undo and namespace-specific per-entry
    rollback commands. Workspace ask now uses a two-model processing pipeline:
    Mistral-small builds a WorkspaceAskIntentFrame against a compact real
    capability list, ModelSelector chooses the main model, the selected main
    model creates the canonical structured draft from loaded context, a
    deterministic postprocessor validates and repairs safe issues, and
    Mistral-small generates concise descriptions from the final validated data.
    CLI/SDK object history and ask commands land before web or Apple UI surfaces.
  existing_patterns:
    - Reuse embed_diffs append-only restore-as-new-version semantics for client-encrypted object histories.
    - Reuse workflow_versions references for workflow graph history instead of duplicating large graph snapshots when possible.
    - Reuse workflow_input_mutations concepts only as source-specific bridge data; do not make it the universal history table.
    - Reuse existing S3 upload/checksum patterns for encrypted archive batches after confirming A-1.
    - Reuse preprocessor/model-selector/main-processor/postprocessor patterns for ask prompts, but keep the mutation application step behind typed validators and the shared history service.
    - Reuse workflow_capability_registry for real app-skill grounding; do not let the preprocessor or main model invent app skills that are not in the registry.
  data_flow:
    - Caller opens mutation request with source, action_type, object context, and encrypted before/after or version refs.
    - Object service applies mutation and writes workspace_change_sets plus workspace_change_entries atomically where supported.
    - Response includes change_set_id and undo availability.
    - Archive worker detects objects with at least 20 hot entries, writes oldest 10 to encrypted S3, verifies checksum, stores manifest, then marks/prunes archived hot rows.
    - Undo/restore resolves hot rows or archive manifests, decrypts where the client has key material, and writes compensating latest mutations.
    - Ask commands call the workspace preprocessor to create an intent frame; short title-like input may skip the main model only when the frame says deterministic creation is safe.
    - The context loader expands only selected real workflow capabilities to full input/output schemas before the selected main model drafts the canonical output.
    - Ask postprocessors resolve targets, reject ambiguity, normalize safe fields, optionally run one repair pass, generate/update descriptions, authorize owner-scoped objects, and apply changes through the same mutation services that write history.
    - Ask responses include applied entries, unchanged/skipped entries, warnings, change_set_id, undo_all_command, and undo_entry_commands.
  affected_files:
    - path: backend/core/directus/schemas/workspace_change_sets.yml
      reason: New change-set metadata collection.
    - path: backend/core/directus/schemas/workspace_change_entries.yml
      reason: New per-object encrypted history entry collection.
    - path: backend/core/directus/schemas/workspace_change_archives.yml
      reason: New S3 archive manifest collection.
    - path: backend/core/api/app/services/workspace_change_history_service.py
      reason: Shared history write, list, archive, undo, and restore orchestration.
    - path: backend/core/api/app/routes/workspace_history.py
      reason: Shared owner-scoped REST history endpoints.
    - path: backend/core/api/app/services/workspace_ask_service.py
      reason: Shared ask planning, validation, auto-apply, and summary orchestration.
    - path: backend/core/api/app/routes/user_tasks.py
      reason: Task mutation paths must call shared history and expose /ask.
    - path: backend/core/api/app/routes/user_plans.py
      reason: Plan mutation paths and subresources must call shared history and expose /ask.
    - path: backend/core/api/app/routes/projects.py
      reason: Project mutation paths must call shared history and expose /ask.
    - path: backend/core/api/app/services/workflow_service.py
      reason: Workflow mutations must emit change entries, expose ask support, and preserve immutable workflow_versions.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Long ask prompts may reuse AI planning/instruction paths for typed workspace mutations.
    - path: backend/apps/ai/processing/workspace_ask_planner.py
      reason: Workspace ask intent-frame preprocessing, model selection, structured drafting, postprocessing, and description generation.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: CLI global change-set commands, namespace-specific object history/restore commands, and mutation output references.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI client history endpoints and restore/undo helpers.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK global change-set and namespace-specific object history/restore helper parity.
    - path: packages/openmates-python
      reason: pip SDK global change-set and namespace-specific object history/restore helper parity.
    - path: scripts/tests/test_workspace_ask_history_gate.py
      reason: Deterministic guardrail blocking ask mutations before history enforcement.
  verification_strategy:
    - Write backend red tests for history write enforcement, archive retention, workflow version references, and undo/restore before implementation.
    - Write backend and CLI red tests for ask behavior only after the history tests are present, then implement ask after history green.
    - Add CLI/SDK contract tests before exposing web UI.
    - Verify real history and ask CLI commands against the dev server before SDK parity, web, user confirmation, or Apple work.
    - Use spec_verify before declaring the foundation complete.
  verification_order:
    - Backend pytest red/green for schemas, service, routes, retention, and workflow bridge.
    - CLI contract tests and real dev-server CLI proof.
    - npm SDK and pip SDK local dev-server parity plus audit_sdk_cli_parity.
    - Guardrail test for future ask commands.
    - Backend ask red/green after history foundation is green.
    - CLI and SDK ask red/green after backend ask is green.
    - Real dev-server ask commands with preprocessor/main/description usage, varied complexity, full-change and single-entry undo proof.
    - Web UI and Apple parity only after the foundation is complete or explicitly scoped into a follow-up spec.

