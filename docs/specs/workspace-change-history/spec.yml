schema_version: 2
id: workspace-change-history
title: Workspace Change History And Ask Commands
status: implementing

goal: >
  Add a privacy-preserving workspace change-history foundation and then ship
  working namespace-specific `ask` commands for tasks, plans, projects, and
  workflows. Every user or AI mutation creates a durable change entry before it
  is committed, recent history stays fast in Directus, older history is exported
  in encrypted S3 archive batches, and `ask` auto-applies clear changes while
  returning precise commands to undo individual changes or the whole action.
  Unsafe, ambiguous, unsupported, or under-contextualized `ask` requests return
  `fallback_to_chat` so the normal chat flow can clarify or handle them.

scope:
  in:
    - A shared change-set model for user-visible task, plan, project, and workflow mutations, regardless of whether the source is CLI, SDK, web, Apple, workflow input, or AI.
    - Per-object change entries that record create, update, delete, archive, restore, link, unlink, reorder, status, criteria, verification, assumption, and workflow graph/version changes.
    - Directus hot history capped at the latest 10 change entries per object.
    - Cold archive export to encrypted S3 batch files when an object reaches 20 hot entries, archiving the oldest 10 entries only after checksum verification succeeds.
    - Directus archive manifest rows that preserve searchable metadata for archived batches without private plaintext.
    - Zero-knowledge or Vault-compatible encrypted before/after snapshots and patches, matching each object family’s existing encryption model.
    - Non-destructive restore and undo semantics where rollback creates a new latest change entry or workflow version and never truncates previous history.
    - Backend enforcement that every mutating task, plan, project, and workflow API path writes a change history entry or fails visibly.
    - CLI, npm SDK, and pip SDK object-history, object-restore, and change-set undo contracts before web UI work.
    - "Deterministic guardrails that block implementation of `tasks ask`, `plans ask`, `projects ask`, and `workflows ask` mutations until the change-history foundation is green."
    - "Namespace-specific `openmates tasks ask`, `openmates plans ask`, `openmates projects ask`, and `openmates workflows ask` commands after the history foundation passes."
    - "Auto-apply-by-default `ask` behavior for deterministic creates and exact safe mutations, with a clear applied-change overview, namespace-specific per-entry rollback commands, and whole-change-set undo commands."
    - "`fallback_to_chat` for unsafe, ambiguous, unsupported, or under-contextualized requests instead of default preview or clarification-required ask outcomes."
    - AI-backed parsing and mutation planning for long or structured instruction-like inputs, plus direct deterministic creation for inputs of 8 words or fewer that contain no newlines, bullets, or list structure.
  out:
    - Team/shared multi-user collaborative history, branching history graphs, CRDTs, or merge UI.
    - Server-side decryption of durable task, plan, project, or client-encrypted workflow private content.
    - Full visual timeline UI for web or Apple in the first backend/CLI foundation slice.
    - Account-level configurable retention settings in V1, beyond schema fields that can support them later.
    - Long-term legal audit export for administrators; this feature is owner-scoped product history, not an admin surveillance log.
    - A global `openmates create` or global `openmates ask` command in V1.
    - Preview-before-apply as a default ask outcome.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials in this environment."
    - "Fallback `gh issue list --repo glowingkitty/OpenMates --search \"\\\"change history\\\" OR undo OR \\\"tasks ask\\\" OR \\\"workflow undo\\\"\" --state all --limit 20` found adjacent closed #153: Implement rendered preview of file/embeds changes over time."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/embed-diff-editing-parity/spec.yml
    - docs/architecture/messaging/embed-diff-editing.md
    - docs/specs/projects-remote-sources/spec.yml
  code_patterns:
    - backend/core/directus/schemas/embed_diffs.yml defines append-only encrypted snapshot/patch history for embeds.
    - backend/core/api/app/services/embed_diff_service.py must not decrypt, reconstruct, or restore embed history server-side.
    - frontend/packages/openmates-cli/src/client.ts reconstructs and restores embed versions client-side using the parent embed key.
    - backend/core/directus/schemas/workflow_versions.yml stores immutable workflow graph versions.
    - backend/core/api/app/services/workflow_service.py keeps the latest 25 active workflow versions and protects current/run-pinned versions.
    - backend/core/directus/schemas/workflow_input_mutations.yml stores workflow-input undo metadata with encrypted before/after blob refs.
    - backend/core/api/app/services/workflow_input_service.py stores workflow input sessions with a 7-day session TTL and mutation snapshots without an explicit snapshot expiry in the current save path.
    - backend/core/api/app/routes/user_tasks.py and backend/core/api/app/services/directus/user_task_methods.py currently expose hard task delete behavior.
    - backend/core/api/app/routes/user_plans.py and backend/core/api/app/services/user_plan_service.py expose plan mutations without shared undo/history.
    - backend/core/api/app/routes/projects.py and backend/core/api/app/services/directus/project_methods.py expose project mutations with archive metadata but no shared change-history contract.
    - frontend/packages/openmates-cli/src/cli.ts exposes deterministic tasks and plans commands but no `ask` commands yet.
  tests:
    - backend/tests/test_user_tasks_api.py
    - backend/tests/test_user_plans_api.py
    - backend/tests/test_projects.py
    - backend/tests/test_workflow_input_sessions.py
    - backend/tests/test_workflow_directus_pinned_version_contract.py
    - frontend/packages/openmates-cli/tests/tasks.test.ts
    - frontend/packages/openmates-cli/tests/plans.test.ts
    - frontend/packages/openmates-cli/tests/sdk-tasks.test.ts
    - frontend/packages/openmates-cli/tests/sdk-plans.test.ts

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Tasks/TaskBoardView.swift
    - apple/OpenMates/Sources/Projects/ProjectDetailView.swift
    - apple/OpenMates/Sources/Workflows/**
  parity_expectations:
    - Apple must eventually create the same change history entries for native task, plan, project, and workflow mutations before exposing native undo/history UI.
    - The first implementation may stop at shared API/client contract and static Apple impact review; native UI parity waits until web and SDK contracts are stable.
  verification:
    - Run or attempt python3 scripts/apple_remote.py status before marking Apple parity not affected or deferred.
    - Run build-ios or targeted Apple tests only when Swift API clients or native workspace mutation code are changed.
  intentional_native_differences:
    - Native timeline UI can be deferred; native mutations must still preserve server/API history once the shared endpoints are used.

clarification:
  rounds:
    - question: Should natural-language workspace creation use a global `openmates create` command or namespace-specific commands?
      answer: Use namespace-specific commands such as `openmates workflows ask`, `openmates tasks ask`, `openmates plans ask`, and `openmates projects ask`.
    - question: Should short title-like `ask` inputs create directly while long instruction-like prompts use the AI pipeline?
      answer: Yes. Short title-like inputs can create directly; long instruction-like inputs should use AI preprocessing/main/postprocessing.
    - question: Should shared undo/history be implemented before AI-assisted `ask` mutations?
      answer: Yes. Every change to a workflow, task, plan, or project must create a change history entry regardless of whether it is created by a user or AI.
    - question: How should retained history be capped?
      answer: Keep the latest 10 entries hot in Directus. When another batch causes the object to reach 20 hot entries, archive the oldest 10 as an encrypted S3 backup file and keep lightweight manifests.
    - question: Should `ask` auto-apply safe changes or require confirmation before applying?
      answer: Auto-apply authorized valid deterministic creates and exact safe mutations by default, then show a clear overview of what was changed and provide commands to undo individual changes or the full change set. Preview and clarification-required are not primary ask outcomes; unsafe or under-contextualized requests fall back to chat.
    - question: What is the finalized ask outcome model for tasks, plans, projects, and workflows?
      answer: Short inputs of 8 words or fewer with no newlines, bullets, or list structure create deterministically. Long or structured inputs use the AI path. Safe exact mutations may auto-apply, while unsafe, ambiguous, unsupported, or under-contextualized requests return `fallback_to_chat` instead of preview or clarification-required ask outcomes.
  vision_summary: >
    `ask` is blocked until a reliable history foundation exists, then the same
    spec must deliver working namespace-specific `ask` commands. The foundation
    must be universal across deterministic user actions and AI actions, cap hot
    Directus growth, preserve older history as encrypted S3 batches, and use
    restore-as-new-version semantics so history is never silently lost or
    rewritten. `ask` should auto-apply valid authorized changes by default and
    make rollback obvious by returning namespace-specific rollback commands for
    individual entries and a whole-change-set undo command. Requests that need
    broader context, rich encrypted plaintext, unavailable workflow capabilities,
    or user clarification must return `fallback_to_chat` and create no history.
  approved_by_user: true

product_contract:
  history_subjects:
    - task
    - plan
    - project
    - workflow
  mutation_sources:
    - cli
    - npm_sdk
    - pip_sdk
    - web
    - apple
    - ai_ask
    - workflow_input
    - system_migration
  hot_cold_retention:
    hot_limit_per_object: 10
    archive_trigger_hot_count: 20
    archive_batch_size: 10
    archive_destination: encrypted_s3_batch
    prune_rule: Directus hot entries may be pruned or marked archived only after S3 upload, checksum verification, and manifest persistence succeed.
    failure_rule: Archive failures keep Directus rows intact, log/alert visibly, and retry without data loss.
  restore_semantics:
    - Hot restore reads Directus history immediately.
    - Cold restore fetches the needed S3 archive batch using a manifest row.
    - Restore creates a new latest version/change entry; old entries and archives remain immutable.
    - Undo reverts an entire change set in reverse entry order by creating compensating mutations.
  ask_gate:
    - "`tasks ask`, `plans ask`, `projects ask`, and `workflows ask` may create proposed mutations only after this spec's required history tests pass."
    - Any implementation that adds AI workspace mutations before universal history enforcement must fail deterministic guardrail checks.
  ask_behavior:
    commands:
      - openmates tasks ask <instruction>
      - openmates plans ask <instruction>
      - openmates projects ask <instruction>
      - openmates workflows ask <instruction>
    default_apply_mode: auto_apply
    allowed_outcomes:
      - applied
      - fallback_to_chat
    preview_mode: not_a_primary_outcome
    short_input_rule: Inputs with 8 words or fewer and no newline, bullet, or list structure create one object deterministically with the input as title, goal, or name for the selected namespace.
    long_input_rule: Inputs over 8 words or with newline, bullet, or list structure use AI preprocessing, mutation planning, validation, application, and post-apply summary when safe.
    output_rule: "Every successful applied action returns `outcome: applied`, a change overview, change_set_id, namespace-specific per-entry restore/rollback commands, and one command to undo the whole change set."
    fallback_rule: "Unsafe, ambiguous, unsupported, unauthorized, unavailable-capability, or under-contextualized requests return `outcome: fallback_to_chat`, `fallback_to_chat: true`, a human-readable fallback message, and no change_set_id or user-visible mutations."
    invalid_or_ambiguous_rule: Invalid authorization, invalid generated mutations, or unresolved ambiguity falls back before applying changes and does not create partial user-visible mutations.
    partial_failure_rule: If a multi-entry apply fails after one or more entries commit, the response must identify applied entries, failed entries, and rollback commands for the committed change set.
    global_safe_mutations:
      tasks: status changes, delete/archive only when the first-party client has resolved exact target IDs and current versions from local decrypted matches.
      plans: status changes such as complete/archive only when the first-party client has resolved exact target IDs and current versions from local decrypted matches.
      projects: archive/delete only when the first-party client has resolved exact target IDs and current versions from local decrypted matches.
      workflows: enable/disable/delete only when the request names one exact workflow ID or the currently selected workflow.
    rich_edit_context_rule: Rich edits require a selected object or exact `@` mention; first-party clients include only the selected or mentioned object details needed for the mutation.
    encrypted_object_rule: Task, plan, and project matching/decryption happens client-side; the backend receives exact IDs, current versions, and encrypted mutation payloads, not broad decrypted workspace dumps.
    workflow_context_rule: The backend may load a selected or exactly mentioned workflow graph for validation; broad global workflow graph edits must return fallback with a message such as `Open a specific workflow to instruct more complex changes.`
  history_command_contract:
    shared_backend_surface: /v1/workspace/history remains the common metadata and retention API for all object types.
    global_cli_commands:
      - openmates history list
      - openmates history show <change-set-id>
      - openmates history undo <change-set-id>
    namespace_cli_commands:
      - openmates tasks history <task-id>
      - openmates tasks restore <task-id> --entry <history-entry-id> [--state before|after]
      - openmates plans history <plan-id>
      - openmates plans restore <plan-id> --entry <history-entry-id> [--state before|after]
      - openmates projects history <project-id>
      - openmates projects restore <project-id> --entry <history-entry-id> [--state before|after]
      - openmates workflows history <workflow-id>
      - openmates workflows restore <workflow-id> --entry <history-entry-id> [--state before|after]
    command_rules:
      - Object-level history browsing and object restore must be exposed under the matching namespace, not as `openmates history restore ...`.
      - Per-entry rollback commands shown after mutations and ask actions must use the matching namespace command when the changed entry affects a single task, plan, project, or workflow.
      - Namespace restore defaults to `--state after` for restoring the historical version produced by an entry; generated rollback commands use `--state before` to undo that entry.
      - Whole-change-set undo may remain global because one change set can span multiple object namespaces.

data_contract:
  directus_collections:
    - collection: workspace_change_sets
      purpose: One user-visible action or AI action that can contain one or more object mutations.
      visible_fields:
        - id
        - hashed_user_id
        - source
        - namespace
        - action_type
        - status
        - redacted_summary
        - created_at
        - updated_at
        - undo_expires_at
    - collection: workspace_change_entries
      purpose: Per-object mutation entry with encrypted before/after refs or workflow version refs.
      visible_fields:
        - id
        - change_set_id
        - object_type
        - object_id
        - operation
        - version_before
        - version_after
        - encrypted_before_ref
        - encrypted_after_ref
        - encrypted_patch_ref
        - workflow_version_before_id
        - workflow_version_after_id
        - archived_manifest_id
        - created_at
        - archived_at
        - undone_at
    - collection: workspace_change_archives
      purpose: Lightweight Directus manifest for each encrypted S3 archive batch.
      visible_fields:
        - id
        - hashed_user_id
        - object_type
        - object_id
        - first_entry_created_at
        - last_entry_created_at
        - entry_count
        - s3_bucket_key
        - s3_object_key
        - checksum
        - encryption_mode
        - created_at
  privacy_contract:
    - Directus metadata must not store plaintext task titles, plan goals, project names, workflow prompts, descriptions, criteria text, labels, or private graph details when those fields are private in the parent object model.
    - Task, plan, and project snapshots/patches use client-side encrypted object keys or their established key-wrapper model.
    - Workflow history should prefer workflow_versions references for graph changes; workflow-input private state continues to use workflow encrypted blobs unless/until workflows move to a client-only encryption model.
    - S3 archive objects contain encrypted payloads only and are not useful without the same object/user keys needed for hot history.

api_contract:
  endpoints:
    - method: GET
      path: /v1/workspace/history
      behavior: List owner-scoped recent change sets and optional filters for object_type, object_id, source, action_type, and limit.
    - method: GET
      path: /v1/workspace/history/{change_set_id}
      behavior: Show one owner-scoped change set with hot entries and archive manifest references when entries are cold.
    - method: POST
      path: /v1/workspace/history/{change_set_id}/undo
      behavior: Undo one owner-scoped change set by creating compensating mutations and a new undo change set.
    - method: POST
      path: /v1/workspace/history/{object_type}/{object_id}/restore
      behavior: Restore an owner-scoped object to a chosen hot or cold historical entry by creating a new latest version/change entry.
    - method: POST
      path: /internal/workspace/history/archive-due
      behavior: Internal worker endpoint or job entrypoint that archives due hot entries in verified encrypted S3 batches.
    - method: POST
      path: /v1/user-tasks/ask
      behavior: Apply deterministic task creates or exact encrypted task mutations from a first-party client; otherwise return `fallback_to_chat` without changes.
    - method: POST
      path: /v1/user-plans/ask
      behavior: Apply deterministic plan creates or exact encrypted plan status/create mutations from a first-party client; otherwise return `fallback_to_chat` without changes.
    - method: POST
      path: /v1/projects/ask
      behavior: Apply deterministic project creates or exact encrypted project archive/delete mutations from a first-party client; otherwise return `fallback_to_chat` without changes.
    - method: POST
      path: /v1/workflows/ask
      behavior: Apply deterministic workflow creates, selected-workflow create payloads, or exact workflow enable/disable/delete mutations; otherwise return `fallback_to_chat` without changes.
  ask_payload:
    fields:
      - instruction
      - target_id
      - selected_object_id
      - mentioned_objects
      - chat_id
      - project_id
      - idempotency_key
      - encrypted_create
      - encrypted_creates
      - encrypted_update
      - exact_delete
      - exact_action
    apply_modes: []
    response_fields:
      - outcome
      - applied
      - fallback_to_chat
      - fallback_message
      - change_set_id
      - summary
      - changed_entries
      - undo_all_command
      - undo_entry_commands
      - warnings

workspace_ask_processing_contract:
  endpoint_access_model: first_party_client_surface_only
  auth: Session/device-authenticated first-party web, CLI, SDK, or native clients only.
  rate_limit: 20/minute per ask planning or apply endpoint.
  plaintext_boundary:
    - The raw user instruction is transient request data and must not be written to durable history or logs except redacted operational summaries.
    - Task, plan, and project final drafts are returned only to first-party clients for local encryption before durable apply.
    - Workflow graphs are currently server-readable product data and may be applied server-side after validation.
  phases:
    - name: workspace_preprocessor
      model: mistral/mistral-small-2506
      purpose: Produce a routing/context frame only; never final user-visible task, plan, project, or workflow data.
      output: WorkspaceAskIntentFrame
      rules:
        - Preprocessor receives a compact list of real available app skills and workflow capabilities before selecting any workflow-related capability.
        - Workflow capability IDs must come from the existing workflow capability registry using the `app.skill` format; unknown IDs are filtered and logged before any main-model call.
        - For workflows, the frame identifies candidate triggers, candidate app-skill actions, built-in node types, required context detail IDs, ambiguity, complexity, and model-selection hints.
        - For tasks, plans, and projects, the frame identifies operation, needed fields, existing-object context needs, ambiguity, complexity, and model-selection hints.
    - name: context_loader
      purpose: Load only context selected by the preprocessor.
      rules:
        - Main processor receives full workflow capability schemas only for selected real capabilities, not the entire app catalog.
        - Preprocessor receives only compact app/skill identifiers and hints so it can choose real skills without seeing full execution schemas.
        - Client-encrypted private task, plan, and project content is not decrypted server-side; first-party clients may provide transient plaintext when needed for future edit/delete matching.
    - name: model_selection
      purpose: Reuse chat-style automatic model selection policy for the main workspace processor.
      rules:
        - Simple extraction uses an economical/Flash-class model or deterministic no-main-model path when explicitly safe.
        - Medium structured requests use an economical/Flash-class main model selected from available auto-select-enabled providers.
        - Complex plan/workflow graph requests use a premium/Pro-class main model selected from available auto-select-enabled providers.
        - Selection reason, primary model, secondary model, fallback model, and filtered-provider decisions are recorded in redacted operational logs and returned in debug metadata for tests.
    - name: workspace_main_processor
      purpose: Produce the canonical structured draft using the selected main model.
      output: TaskAskDraft, PlanAskDraft, ProjectAskDraft, or WorkflowAskDraft
      rules:
        - Main output is structured JSON/tool arguments only.
        - The main processor may use full selected workflow capability schemas and built-in workflow node contracts.
        - It must not invent app skills, triggers, node types, enum values, or fields outside the loaded context.
    - name: deterministic_postprocessor
      purpose: Validate, normalize, safely repair, and decide whether applying is allowed.
      safe_cleanups:
        - Trim strings and drop empty optional fields.
        - Enforce max lengths and bounded list sizes.
        - Normalize enum casing only when unambiguous.
        - Generate stable workflow node IDs.
        - Validate workflow graph connectivity and edge endpoints.
        - Drop unknown workflow capabilities instead of preserving hallucinated app skills.
      unsafe_cleanups:
        - Do not guess destructive targets.
        - Do not invent missing provider accounts, Slack channels, secrets, repositories, calendars, or connected accounts.
        - Do not silently apply if a required workflow capability is unavailable or ambiguous.
      repair_rule: One constrained repair pass may run with validation errors and exact schema; if the repaired draft is still invalid, fail without applying.
    - name: description_generator
      model: mistral/mistral-small-2506
      purpose: Create or update concise object descriptions from the final validated created or updated data.
      rules:
        - Description generation runs after deterministic validation and before encryption/apply.
        - Generated descriptions are based on the final object draft, not raw user input alone.
        - If description generation fails and the description field is optional, keep the existing description or empty value and return a warning.
        - The description generator records redacted model usage evidence in real inference tests.
  example_flows:
    - id: EX-WCH-ASK-TASK-SIMPLE
      input: Remind me to verify rollback commands
      preprocessor_output:
        namespace: tasks
        operation: create
        complexity: simple
        requires_main_processor: false
        needed_fields: [title, description, status, assignee_type]
        model_recommendation: none_or_flash
        ambiguity: []
      main_processor_output:
        tasks:
          - title: Verify rollback commands
            description: ""
            status: todo
            assignee_type: user
      description_output:
        tasks:
          - title: Verify rollback commands
            description: Check that the generated rollback commands work before release.
    - id: EX-WCH-ASK-WORKFLOW-COMPLEX
      input: When a GitHub PR is opened for OpenMates, summarize changed files, check whether workspace history or encryption files were touched, and notify me if risk is high.
      preprocessor_output:
        namespace: workflows
        operation: create
        complexity: complex
        requires_main_processor: true
        selected_capability_ids: []
        built_in_nodes: [manual_trigger, app_skill_action, decision, send_notification, end]
        ambiguity:
          - GitHub pull-request-opened triggers may be unavailable; use manual trigger or ask clarification instead of hallucinating a trigger.
      main_processor_output:
        workflow:
          title: High-Risk PR Review
          enabled: false
          graph_contains_only_loaded_capabilities: true
      description_output:
        workflow:
          description: Reviews pull request changes for workspace-history or encryption risk and notifies the user when risk is high.

implementation_state:
  subject_commit: 707001f2c+working-tree

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-20T00:00:00Z"
  implementation_plan:
    status: approved
    approved_at: "2026-07-20T00:00:00Z"

decisions:
  - id: D-1
    status: active
    decision: Keep only the latest 10 change entries hot in Directus and archive oldest batches of 10 when an object reaches 20 hot entries.
    reason: This caps database growth while preserving long-term history and avoids inefficient one-entry S3 archives.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-2
    status: active
    decision: Block AI `ask` workspace mutations until universal change-history enforcement is implemented and verified.
    reason: AI mutations can create multiple changes at once, so reliable rollback/history must exist before exposing them.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-3
    status: active
    decision: Object history and restore commands are namespace-specific; the global history surface is only for cross-object change-set listing, inspection, and whole-change-set undo.
    reason: Users restore a task, plan, project, or workflow in that object's context, while a shared ledger still provides one retention, archive, and undo foundation.
    decided_at: "2026-07-20T23:15:00Z"
  - id: D-4
    status: active
    decision: "Workspace ask uses a two-model pipeline: Mistral-small intent-frame preprocessing, then chat-style auto-selected main-model structured drafting, then deterministic validation and Mistral-small description generation."
    reason: The earlier single Mistral-small planner proved history integration but did not match the intended AI processing architecture or quality bar for complex requests.
    decided_at: "2026-07-21T11:25:00Z"
  - id: D-5
    status: active
    decision: Workflow ask preprocessing receives only compact real workflow capability identifiers and hints, while the main processor receives full implementation schemas for the selected real capabilities.
    reason: This prevents hallucinated app skills such as nonexistent Slack skills while avoiding large full-schema prompts during cheap preprocessing.
    decided_at: "2026-07-21T11:25:00Z"

assumptions:
  - id: A-1
    text: Existing S3 service patterns can support encrypted workspace-history archive upload, existence checks, and checksum verification without introducing a new storage provider.
    status: confirmed
    evidence:
      - backend/core/api/app/services/s3/config.py now defines the workspace_history_archives bucket and backend/tests/test_workspace_change_history.py covers the S3 archive adapter.
    required_before: implementation
  - id: A-2
    text: Existing task, plan, project, and workflow version fields are sufficient to order object history; implementation may add monotonic per-object change sequence numbers if concurrent writes need stronger ordering.
    status: confirmed
    evidence:
      - backend/tests/test_workspace_change_history.py and backend/tests/test_workspace_ask_routes.py cover ordered object history, restore state selection, and workflow version-reference undo without adding sequence fields.
    required_before: implementation

scenarios:
  - id: S-1
    title: Every deterministic task mutation writes history
    given:
      - Alice has a task TASK-42 with encrypted title and description.
    when:
      - She edits its title through `openmates tasks edit TASK-42 --title "Prepare launch copy"`.
    then:
      - The task update succeeds only if a workspace change set and task change entry are persisted.
      - The change entry stores encrypted before/after data without plaintext title or description in Directus metadata.

  - id: S-2
    title: Plan and project subresource mutations write history
    given:
      - Alice has a plan PLAN-7 linked to project PROJECT-3.
    when:
      - She adds a plan criterion, records verification evidence, and archives the project.
    then:
      - Each user-visible mutation creates a change entry tied to the affected plan or project.
      - History entries preserve enough encrypted state to restore the previous user-visible state.

  - id: S-3
    title: Workflow graph update records both change history and immutable version references
    given:
      - Alice has workflow WF-9 at version 4.
    when:
      - She changes the workflow schedule and node graph from workflow input or a deterministic workflow edit path.
    then:
      - Workflow service creates a new immutable workflow_versions row.
      - Workspace change history records before/after workflow version references and source metadata.
      - Historical workflow_versions and workflow runs are not mutated.

  - id: S-4
    title: Hot history is archived in encrypted S3 batches
    given:
      - TASK-42 has 19 hot change entries in Directus.
    when:
      - Alice performs one more task edit.
    then:
      - The newest 10 entries remain hot.
      - The oldest 10 are uploaded as one encrypted S3 archive batch.
      - Directus keeps a manifest with object ID, range, entry count, S3 key, checksum, and encryption mode.
      - If upload or checksum verification fails, no hot entries are pruned or marked unavailable.

  - id: S-5
    title: Undo reverts a multi-entry action as a compensating change set
    given:
      - Alice ran one future AI action that created three tasks and linked them to one project.
    when:
      - She runs `openmates history undo <change-set-id>`.
    then:
      - OpenMates creates a new undo change set.
      - Entries are reverted in reverse order with owner-scoped authorization checks.
      - Created tasks are deleted or archived according to the object delete policy.
      - Project links are removed without rewriting the original history rows.
      - Per-object rollback commands shown for individual entries use namespace commands such as `openmates tasks restore <task-id> --entry <history-entry-id>`.

  - id: S-6
    title: Cold restore loads archive batch on demand
    given:
      - Alice wants to restore PLAN-7 to a version whose change entry is no longer hot.
    when:
      - She runs `openmates plans restore PLAN-7 --entry <archived-history-entry-id>`.
    then:
      - The backend resolves the owner-scoped archive manifest.
      - The client or service with the correct key material loads and decrypts only the needed encrypted archive batch.
      - Restore creates a new current plan version and a new change history entry.

  - id: S-7
    title: AI ask mutation implementation is blocked until history enforcement is green
    given:
      - A developer attempts to add `openmates tasks ask "prepare launch"` so it creates tasks.
    when:
      - Required history enforcement tests are still failing or absent.
    then:
      - Guardrail tests fail with a clear message that workspace `ask` mutations require universal change-history entries first.

  - id: S-8
    title: Short task ask creates directly and returns undo commands
    given:
      - Alice is logged in through the OpenMates CLI.
    when:
      - She runs `openmates tasks ask "Prepare launch copy"`.
    then:
      - OpenMates creates one task with the title "Prepare launch copy" without unnecessary AI inference.
      - The response lists the created task, the change_set_id, a namespace-specific rollback command for that task entry, and an undo command for the whole change set.

  - id: S-9
    title: Long task ask creates multiple tasks in one change set
    given:
      - Alice wants to plan a launch checklist.
    when:
      - "She runs `openmates tasks ask \"Prepare launch: update copy, test signup tracking, ask Anna, publish Monday.\"`."
    then:
      - OpenMates uses the AI planning path to create multiple task mutations.
      - All created tasks share one change_set_id.
      - The response shows each created task and commands to undo each entry or undo all created tasks together.

  - id: S-10
    title: Ask edits and deletes auto-apply with rollback visibility
    given:
      - Alice has an existing task TASK-42 and project PROJECT-3.
    when:
      - She runs an ask command that renames TASK-42, archives PROJECT-3, or deletes a completed task.
    then:
      - Authorized valid changes auto-apply by default without a confirmation prompt.
      - The overview separates modified, archived, deleted, and unchanged objects.
      - Delete/archive rollback commands restore the previous object state through the matching namespace command.

  - id: S-11
    title: Plan project and workflow ask use namespace-specific commands
    given:
      - Alice has workspace data in plans, projects, and workflows.
    when:
      - She runs `openmates plans ask`, `openmates projects ask`, or `openmates workflows ask` with natural-language instructions.
    then:
      - Each command uses its namespace-specific parser and mutation validator.
      - The command applies valid authorized changes and returns a change overview plus namespace-specific rollback commands.
      - No global `openmates create` or global `openmates ask` command is required.

  - id: S-12
    title: Unsupported ask starts fallback chat instead of preview
    given:
      - Alice asks for a rich workspace change without opening or mentioning the exact object to edit.
    when:
      - She asks `add a Discord notification to all my workflows once they are done` from the global workflows list.
    then:
      - "OpenMates returns `outcome: fallback_to_chat` and `fallback_to_chat: true`."
      - No workflow is changed and no change set is created.
      - The fallback message explains that a specific workflow must be opened or mentioned for complex graph edits.

  - id: S-13
    title: Ask falls back on ambiguity or invalid generated mutations before applying
    given:
      - Alice has two similarly named tasks and asks to "delete the launch one".
    when:
      - The target cannot be resolved safely or generated mutations fail validation.
    then:
      - OpenMates does not apply partial changes.
      - "The response returns `outcome: fallback_to_chat` with the ambiguous target reason."
      - No user-visible object changes occur without matching history entries.

  - id: S-14
    title: Workflow ask grounds app skills before main processing
    given:
      - Alice asks for a workflow that sounds like it could use external app skills.
      - The workflow capability registry contains only explicitly classified real capabilities.
    when:
      - The preprocessor builds a WorkspaceAskIntentFrame.
    then:
      - The frame can select only capability IDs returned by the registry.
      - Unknown or unavailable capabilities are filtered before main processing.
      - The main processor receives full input/output schemas only for the selected real capabilities and built-in workflow node contracts.

  - id: S-15
    title: Ask main processor uses chat-style selected model
    given:
      - Alice submits simple, medium, and complex ask requests.
    when:
      - Workspace ask runs after preprocessing.
    then:
      - Simple requests can use a deterministic/no-main-model path only when safe.
      - Medium requests use an auto-selected economical or Flash-class main model.
      - Complex plan/workflow requests use an auto-selected premium or Pro-class main model.
      - The response or test debug metadata includes the selected model and selection reason.

  - id: S-16
    title: Postprocessor validates repairs and generates descriptions
    given:
      - The main processor returns a draft with missing description, sloppy enum casing, or a workflow graph with safe-to-fix node IDs.
    when:
      - Deterministic postprocessing runs.
    then:
      - Safe normalizations are applied deterministically.
      - Unsafe ambiguity or missing provider/account data blocks apply.
      - A Mistral-small description generator creates or updates concise descriptions from the final validated created or updated data.

  - id: S-17
    title: Real inference smoke covers varied complexity
    given:
      - The dev API is running with real test-account auth and available model credentials.
    when:
      - OpenCode runs 20 real ask examples for short deterministic, medium AI-create, safe exact edit/delete/status, complex workflow, ambiguous destructive, and unsupported broad workflow requests.
    then:
      - Evidence records preprocessor usage, selected main model, main model usage, description-generator usage, repair status, generated outputs, change_set_id when applied, and undo result.
      - Ambiguous destructive requests produce no change set.

  - id: S-18
    title: First-party clients resolve encrypted targets before exact safe ask mutations
    given:
      - Alice has encrypted tasks, plans, and projects visible in the CLI or web client.
    when:
      - "She asks `mark my 3d printing tasks done` or `archive @project:launch` and the client resolves exact matching IDs locally."
    then:
      - The backend receives only exact IDs, current versions, and encrypted patches or exact actions.
      - Matching ambiguous or zero targets returns `fallback_to_chat` before mutation.
      - Applied exact mutations still create workspace history and rollback commands.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Every task create, update, status/reorder/action, and delete path creates an owner-scoped change set and change entry or fails visibly.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-BACKEND]
  - id: AC-2
    scenario: S-2
    text: Plan and project mutations, including plan criteria/verification/assumption changes and project archive/link changes, create restorable history entries.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-BACKEND]
  - id: AC-3
    scenario: S-3
    text: Workflow mutations record workspace change entries while preserving immutable workflow_versions and workflow_runs.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-WORKFLOWS]
  - id: AC-4
    scenario: S-4
    text: Per-object hot history keeps the latest 10 entries and archives the oldest 10 as an encrypted S3 batch only after verified upload and manifest persistence.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-ARCHIVE]
  - id: AC-5
    scenario: S-5
    text: Whole-change-set undo creates a compensating owner-scoped change set and reverts multi-entry changes in reverse order without mutating original history rows, while per-entry rollback output points to namespace-specific restore commands.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-CLI, T-WCH-SDK]
  - id: AC-6
    scenario: S-6
    text: Namespace-specific restore commands can discover archive manifests, fetch encrypted archive batches on demand, and restore the selected object version as a new current state.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-WCH-ARCHIVE, T-WCH-SDK]
  - id: AC-7
    scenario: S-7
    text: Deterministic guardrails prevent mutating workspace `ask` commands from shipping before universal change-history enforcement is implemented.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-WCH-ASK-GATE]
  - id: AC-8
    scenario: S-8
    text: Short title-like `tasks ask` input creates one task directly and returns a full-change-set undo command plus a namespace-specific per-entry rollback command.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-CLI, V-WCH-ASK-DEV-CLI]
  - id: AC-9
    scenario: S-9
    text: Long instruction-like `tasks ask` input can create multiple tasks in one auto-applied change set with rollback commands for each entry and all entries.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-CLI, V-WCH-ASK-DEV-CLI]
  - id: AC-10
    scenario: S-10
    text: Ask edits, archives, and deletes auto-apply by default when authorized and valid, and every changed object can be restored through generated namespace-specific rollback commands.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-BACKEND, T-WCH-ASK-CLI, V-WCH-ASK-DEV-CLI]
  - id: AC-11
    scenario: S-11
    text: Namespace-specific `tasks ask`, `plans ask`, `projects ask`, `workflows ask`, history, and restore commands work without a global create/ask/restore command and each uses shared history enforcement.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-BACKEND, T-WCH-ASK-CLI, T-WCH-ASK-SDK, V-WCH-ASK-DEV-CLI]
  - id: AC-12
    scenario: S-12
    text: "Unsupported, broad, or under-contextualized ask requests return `outcome: fallback_to_chat`, create no change set, and explain the missing exact context."
    required: true
    status: pending
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-BACKEND, T-WCH-ASK-CLI, T-WCH-ASK-SDK]
  - id: AC-13
    scenario: S-13
    text: Ambiguous targets, unauthorized targets, or invalid generated mutations return `fallback_to_chat` before applying user-visible changes and do not create partial mutations without history.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-ASK-BACKEND]
  - id: AC-14
    scenario: S-14
    text: Workflow ask preprocessing can select only real workflow capability IDs from the registry, and the main processor receives full schemas only for the selected available capabilities.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-ASK-PIPELINE, V-WCH-ASK-PIPELINE-DEV]
  - id: AC-15
    scenario: S-15
    text: Workspace ask uses chat-style automatic model selection for the main structured drafting phase, records the selected main model and selection reason, and avoids a fixed Mistral-small final-output model.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-ASK-PIPELINE, V-WCH-ASK-PIPELINE-DEV]
  - id: AC-16
    scenario: S-16
    text: Workspace ask postprocessing deterministically validates and normalizes drafts, attempts at most one constrained repair for invalid structured output, and generates or updates object descriptions with Mistral-small from final validated data.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WCH-ASK-PIPELINE, V-WCH-ASK-PIPELINE-DEV]
  - id: AC-17
    scenario: S-17
    text: Real dev-server inference evidence covers 20 short deterministic, medium AI-create, safe exact edit/delete/status, complex workflow, ambiguous destructive, and unsupported broad workflow ask examples with usage for preprocessor, main processor, and description generation where inference is used.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [V-WCH-ASK-PIPELINE-DEV]
  - id: AC-18
    scenario: S-18
    text: First-party clients resolve encrypted task, plan, and project targets locally and send only exact IDs, current versions, and encrypted create/update/delete payloads to ask endpoints.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: cli
    verification_ids: [T-WCH-ASK-BACKEND, T-WCH-ASK-CLI, T-WCH-ASK-SDK, V-WCH-ASK-PIPELINE-DEV]

