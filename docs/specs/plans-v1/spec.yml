risks:
  - Plan scope can become too broad if V1 tries to implement every app-specific planner at once; V1 should add the generic openmates.plan and wire existing code.project_planner first, then add more app planners incrementally.
  - Anti-drift can be annoying if too sensitive; thresholds must allow intentional user pivots and ask whether to update the plan when scope changes.
  - AI evaluation can produce false confidence; critical criteria require deterministic checks or user confirmation.
  - Client-encrypted plan data limits server-side search and routing; V1 should keep server-visible metadata sparse and explicit.
  - Verification tasks may clutter task boards; UI should visually distinguish work tasks from verification tasks while keeping them assignable and actionable.
  - Chat header can become overloaded; V1 should only show plan title/current task and navigation, with details in the Tasks tab.

open_questions:
  - Which app-specific planner focus modes beyond code.project_planner should ship in the first implementation slice versus later app-by-app follow-up specs?
  - Should @plan in a chat with an existing active plan update the existing plan by default, create a new draft plan, or ask the user which action they want?
  - Should plan cards on the Project page appear in the first project overview slice or behind an expandable section until there are linked plans?
  - What is the first acceptable AI evaluation threshold default for generic qualitative checks: 80, 85, or per-plan only?
