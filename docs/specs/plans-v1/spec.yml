implementation_plan:
  existing_patterns:
    - docs/specs/tasks-v1/spec.yml for user-facing encrypted task records, task API shape, and chat/project task surfaces.
    - backend/core/api/app/utils/override_parser.py for @ override parsing.
    - backend/apps/ai/tasks/ask_skill_task.py and backend/apps/ai/processing/main_processor.py for focus-mode override and active focus prompt injection.
    - backend/apps/ai/processing/chat_compressor.py plus chat_compression_checkpoints for compression behavior and the need for protected active-plan context.
    - frontend/packages/ui/src/components/tasks/ActiveChatTaskPreview.svelte for top-of-chat progress/active-work UI pattern.
    - frontend/packages/ui/src/components/settings/elements for chat details/settings plan and task sections.
  architecture: >
    Implement Plans V1 as a separate encrypted product model and API. Plan focus
    modes create and refine plans; plan records then drive task creation,
    verification tasks, active chat/project UI, protected assistant context, and
    anti-drift checks. Tasks remain the execution units and link back to plan
    steps and verification records.
  data_flow:
    - User sends @plan or a natural-language complex request.
    - Override/preprocessing detects planning intent and selects an app-specific planner or openmates.plan.
    - Planner asks one clarifying question at a time until it can draft a plan.
    - Client encrypts plan content and stores durable plan, steps, criteria, and verification records through /v1/user-plans.
    - Approved plan creates linked user_tasks for work and verification tasks.
    - Active-plan context is fetched and injected into future assistant requests separately from message history and compression summaries.
    - Assistant execution updates task, criteria, verification, and plan status.
    - Anti-drift checks run after assistant turns or task transitions and can send steering corrections to the LLM while rendering system/status messages in the UI.
  affected_files:
    - path: backend/core/directus/schemas/user_plans.yml
      reason: Durable plan, step, criterion, verification, activity, and artifact collections.
    - path: backend/core/directus/schemas/user_tasks.yml
      reason: Add plan_id, plan_step_id, task_type, and verification_id fields.
    - path: backend/core/api/app/routes/user_plans.py
      reason: User-facing /v1/user-plans API.
    - path: backend/core/api/app/services/user_plan_service.py
      reason: Plan orchestration, completion blockers, verification evidence, and active-plan context.
    - path: backend/core/api/app/services/directus/user_plan_methods.py
      reason: Directus storage methods for plans and related records.
    - path: backend/core/api/app/utils/override_parser.py
      reason: Add @plan parsing and cleaned-message behavior.
    - path: backend/apps/openmates/app.yml
      reason: Add generic openmates.plan focus mode.
    - path: backend/apps/code/app.yml
      reason: Ensure code.project_planner can be selected as an app-specific planner for @plan and natural-language routing.
    - path: backend/apps/ai/processing/preprocessor.py
      reason: Natural-language plan intent and planner focus routing.
    - path: backend/apps/ai/tasks/ask_skill_task.py
      reason: Apply @plan/active-plan context and exit planner focus mode after plan creation/approval.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Inject protected active-plan context and handle anti-drift correction messages.
    - path: frontend/packages/ui/src/services/userPlanService.ts
      reason: Client-side encryption/decryption and /v1/user-plans API client.
    - path: frontend/packages/ui/src/components/tasks/ActiveChatTaskPreview.svelte
      reason: Extend active header/preview state to show plan title and current task navigation.
    - path: frontend/packages/ui/src/components/tasks/TasksPage.svelte
      reason: Show plan section and verification tasks in task surfaces.
    - path: frontend/packages/ui/src/components/projects/ProjectsPage.svelte
      reason: Add project linked plans management surface.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI plan contract helpers.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK plan facade.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK plan facade.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/plans-v1/spec.yml
    - python3 scripts/spec_verify.py docs/specs/plans-v1/spec.yml --phase red
    - CLI contract tests before web E2E.
    - npm and pip SDK tests before web E2E.
    - Playwright red/green for chat and project plan flows after deploy.
    - Apple remote status/build attempt when Apple shared clients or native UI are touched.
  verification_order:
    - Backend pytest contracts.
    - CLI contract tests.
    - npm SDK contract tests.
    - pip SDK contract tests.
    - Web Playwright specs against app.dev.openmates.org after deploy.
    - Apple remote build/test when Apple files are affected.

