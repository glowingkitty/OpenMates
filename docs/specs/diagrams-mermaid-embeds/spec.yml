risks:
  - Mermaid SVG rendering can introduce XSS or external-resource risks if output is inserted without strict configuration and sanitization.
  - Large diagrams can become unreadable in preview if implementation scales down instead of cropping/readability-first rendering.
  - Apple native Mermaid rendering may require WebKit or a JavaScript rendering bridge; this must be isolated from app auth/session state.
  - Real natural-language example chat quality can vary by model/provider behavior; do not commit the example until the deployed implementation demonstrably produces the Mermaid embed without explicit app mention.
  - Playwright green evidence requires deployment to dev before running the spec.
  - Local Vitest commands are forbidden; use repo test dispatch scripts.

open_questions:
  - Should future versions support additional diagram syntaxes under the same Diagrams app, or should each syntax be its own direct embed type?
  - Should Mermaid rendered SVG snapshots ever be cached for offline Apple rendering, or is source-only storage sufficient for v1?
