id: diagrams-mermaid-embeds
title: Diagrams Mermaid Embeds
status: implementing

goal: >
  Add first-class Mermaid diagram embeds under a Diagrams app so assistant-created
  diagrams render as encrypted, shareable, editable embeds across CLI, web, and
  Apple clients. CLI shows a useful text/source representation, the web app shows
  a readable cropped preview plus a pan/zoom fullscreen diagram, and the Apple app
  implements native parity with the rendered web source of truth.

scope:
  in:
    - Add a Diagrams app metadata entry and a direct Mermaid embed type backed by assistant-emitted `mermaid` fenced code blocks.
    - Convert streamed assistant Mermaid fences into direct embeds instead of generic code embeds, preserving encrypted content, embed references, deduplication, sharing, and sync behavior.
    - Render web preview cards with a readable partial/cropped diagram rather than an unreadably zoomed-out whole diagram.
    - Render web fullscreen diagrams with easy pan and zoom controls, reset/fit behavior, keyboard or button controls, and raw-source fallback when rendering fails.
    - Render CLI preview/fullscreen output as text, including title, diagram kind, and Mermaid source snippets/full source.
    - Implement Apple native preview and fullscreen parity for Mermaid diagrams using OpenMates native embed primitives and web-computed visual contracts as source of truth.
    - Support assistant diff-based editing of Mermaid diagram embeds and show version timeline/restore controls wherever existing diffable embed timeline patterns apply.
    - Create a real natural-language OpenMates chat that triggers Mermaid diagram creation without an explicit app mention, verify it works, then publish it as the canonical Diagrams/Mermaid example chat.
    - Add deterministic backend, CLI, web, and Apple tests following the CLI -> web -> Apple verification ladder.
  out:
    - A graphical Mermaid editor or drag-and-drop diagram builder.
    - Server-side Mermaid rendering as the durable source of truth; v1 stores source and clients render it.
    - Supporting non-Mermaid diagram syntaxes such as Graphviz/DOT, PlantUML, Excalidraw, BPMN, or hand-drawn sketch formats.
    - Exact pixel matching between web and Apple screenshots; material visual parity is required, exact screenshot hashes are not.
    - Using unsandboxed script/style/HTML execution from Mermaid output.

