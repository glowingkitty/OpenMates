    - WebKit/native SVG text rasterization, platform scrolling physics, and safe-area dimensions may differ when they do not materially obscure diagram readability or controls.
    - Exact pixel matching is not a v1 gate; material parity and functional controls are required.

clarification:
  rounds:
    - question: Should v1 include editing/versioning of existing Mermaid diagram embeds, or should the first slice focus only on creation, rendering, CLI text output, web preview/fullscreen pan-zoom, Apple parity, sharing/copying, and tests?
      answer: Diff based editing via assistant and viewing timeline of course Supported.
    - question: >
        Confirm this vision before writing the spec: Diagrams/Mermaid v1 should
        add a first-class `diagrams` direct embed type that converts
        assistant-emitted Mermaid fences into encrypted embeds. CLI renders the
        text/source version, web renders a readable cropped/partial diagram
        preview plus fullscreen pan/zoom controls, Apple implements native parity
        with web, and assistant diff-based edits plus version timeline are in
        scope.
      answer: Go ahead.
  vision_summary: >
    Users should be able to ask for a diagram and receive a proper Diagrams app
    embed rather than a plain code block. The embed must remain useful on every
    client: CLI prints Mermaid text, web shows a readable visual preview plus
    controllable fullscreen, and Apple matches the web experience natively.
    Mermaid source is diff-editable by the assistant and users can inspect and
    restore diagram versions through the existing embed timeline pattern.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Assistant creates a Mermaid diagram embed
    given:
      - Alice asks OpenMates to draw a sequence diagram for a signup flow.
      - The Diagrams app is available in discovered app metadata.
    when:
      - The assistant emits a `mermaid` fenced code block with valid Mermaid source.
    then:
      - "The backend stream consumer creates a direct Mermaid embed with `type: mermaid`, `app_id: diagrams`, and `skill_id: mermaid`."
      - The message markdown contains only the JSON embed reference, not the raw fenced block.
      - The embed content stores the Mermaid source, title, diagram kind, status, and stable `embed_ref` in encrypted TOON content.

  - id: S-2
    title: CLI shows useful text output for Mermaid embeds
    given:
      - Alice runs the CLI and receives a Mermaid diagram embed in a chat.
    when:
      - The inline preview or `openmates embeds show <id>` renders the embed.
    then:
      - The preview prints a Diagrams/Mermaid label, title, diagram kind, and a short source excerpt.
      - Fullscreen CLI output prints the full Mermaid source in a fenced `mermaid` block.
      - CLI output does not attempt graphical rendering or emit raw encrypted content.

  - id: S-3
    title: Web preview renders a readable cropped diagram
    given:
      - Alice opens a chat containing a finished Mermaid embed in the web app.
      - The Mermaid diagram is larger than the 300 by 200 preview card.
    when:
      - The embed preview card renders in the message stream.
    then:
      - The preview shows a visible diagram area or safe rendering placeholder inside UnifiedEmbedPreview chrome.
      - The preview prioritizes readability by cropping/clipping part of the diagram instead of scaling the whole diagram until labels are unreadable.
      - Processing, error, cancelled, and invalid Mermaid states are visible and do not break surrounding chat rendering.

  - id: S-4
    title: Web fullscreen supports pan and zoom
    given:
      - Alice opens the Mermaid embed fullscreen in the web app.
    when:
      - Alice uses zoom in, zoom out, fit/reset, mouse/touch pan, and keyboard-accessible controls.
    then:
      - The diagram remains readable and controllable without leaving the fullscreen shell.
      - The user can reset to a fitted view and can inspect large diagrams by panning.
      - The fullscreen offers a source fallback or copyable Mermaid source when rendering fails.
      - The rendered SVG is sanitized and cannot execute scripts, event handlers, external resources, or unsafe links.

  - id: S-5
    title: Assistant edits a Mermaid embed via diff and timeline
    given:
      - Alice has an existing Mermaid diagram embed with version 1.
      - Alice asks the assistant to add an error branch to the diagram.
    when:
      - The assistant produces a supported diff edit targeting the Mermaid embed.
    then:
      - The backend applies the patch to the Mermaid source and stores a new version without replacing unrelated embed metadata.
      - Preview and fullscreen re-render from the updated source.
      - The version timeline shows the previous and current versions and restore returns the diagram to the selected source.

  - id: S-6
    title: Apple renders Mermaid diagrams with web parity
    given:
      - The web app has Mermaid preview and fullscreen contract artifacts for iPhone and iPad-equivalent viewports.
      - The Apple app debug embed gallery includes a Diagrams/Mermaid fixture.
    when:
      - Apple embed rendering parity tests run on iPhone and iPad simulators.
    then:
      - Native preview and fullscreen materially match the web layout, chrome, colors, typography, readable cropping, and pan/zoom controls.
      - The Apple app does not crash when decoding, previewing, full-screening, sharing, or restoring a Mermaid embed.
      - Native rendering avoids default platform product UI and protects untrusted Mermaid content from app/session access.

  - id: S-7
    title: Natural-language example chat demonstrates Mermaid embed creation
    given:
      - The Mermaid embed implementation is deployed and verified on dev.
      - A user starts a normal OpenMates chat without mentioning an app, skill, or `@` command.
    when:
      - The user asks in natural language for a diagram, such as "Draw a clear sequence diagram for how a user signs up with email verification."
    then:
      - The assistant chooses the Diagrams/Mermaid path without requiring an explicit app mention.
      - The resulting real chat contains a finished Diagrams/Mermaid embed that renders in preview and fullscreen.
      - After quality review confirms the real chat is public-safe and demonstrates the embed well, the transcript is converted into the canonical public example chat for the Diagrams/Mermaid content type.
      - The example chat metadata links to the Diagrams/Mermaid content type and passes deterministic public-safety and renderability audits.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Mermaid fences are converted into encrypted Diagrams direct embeds with stable references and no raw fence leakage in rendered chat messages.
  - id: AC-2
    scenario: S-2
    text: CLI preview and fullscreen commands render Mermaid embeds as readable text/source output.
  - id: AC-3
    scenario: S-3
    text: The web preview renders a readable cropped/partial diagram or explicit safe fallback inside UnifiedEmbedPreview for all required states.
  - id: AC-4
    scenario: S-4
    text: The web fullscreen renders sanitized Mermaid diagrams with pan, zoom, fit/reset, and source fallback controls.
  - id: AC-5
    scenario: S-5
    text: Mermaid embeds participate in assistant diff editing, version history, timeline viewing, and restore flows.
  - id: AC-6
    scenario: S-6
    text: Apple implements native Mermaid preview/fullscreen parity with web and passes remote build/test verification or records a sanitized infrastructure failure.
  - id: AC-7
    scenario: S-7
    text: A real natural-language chat, without explicit app mention, is verified to create a Mermaid embed and is published as the canonical public Diagrams/Mermaid example chat.

contracts:
  api:
    - No new public REST API route is required for basic Mermaid creation; stream conversion follows the existing embed service and WebSocket `send_embed_data` pattern.
    - Existing embed sharing, restore, and diff-edit routes must accept the new backend type `mermaid` wherever direct diffable embeds are supported.
    - Mermaid embed payloads sent to clients use encrypted stored content and plaintext WebSocket content only through existing authorized embed delivery paths.
  data:
    - "backend_type: mermaid"
    - "frontend_type: diagrams-mermaid"
    - "app_id: diagrams"
    - "skill_id: mermaid"
    - "content fields: type, app_id, skill_id, title, diagram_kind, diagram_code, embed_ref, status, version_number"
    - Mermaid source is the durable source of truth; rendered SVG is ephemeral client-side output unless a future spec adds generated artifacts.
    - "`content_hash` should be populated for finished Mermaid embeds so duplicate detection and version metadata follow code/file/sheet/document conventions."
  ui_states:
    - CLI inline preview.
    - CLI fullscreen/source output.
    - Web preview processing, finished, error, cancelled, invalid Mermaid, and mobile states.
    - Web fullscreen pan, zoom in, zoom out, fit/reset, copy source, render error, and version timeline states.
    - Apple preview processing, finished, error, invalid Mermaid, iPhone fullscreen, iPad fullscreen, and version timeline states.
    - Public Diagrams/Mermaid example chat card and transcript with a renderable finished Mermaid embed.
  privacy_security:
    - Mermaid SVG output must be sanitized before insertion into web DOM or native WebKit/native-rendered surfaces.
    - Mermaid initialization must use strict security settings where available and must not allow scripts, event handler attributes, unsafe URLs, external image loads, or OpenMates-origin DOM access from diagram content.
    - Diagram source may contain user/private data and must remain encrypted at rest with existing embed encryption/key wrapping behavior.
    - Error logging must not include full Mermaid source when source may contain private user data; logs may include length, diagram kind, embed id, and sanitized error class.
    - Apple implementation must not expose auth cookies, tokens, vault keys, or private app state to any WebKit/rendering context used for Mermaid.
    - The committed example chat must contain only public-safe synthetic or approved transcript content and no private chat IDs, share keys, raw AES material, S3 keys, credentials, internal prompts, or user identifiers.
  accessibility:
    - Preview and fullscreen controls have accessible names and keyboard/touch alternatives.
    - Fullscreen exposes title, diagram kind, zoom level, and source fallback to assistive technologies.
    - If rendered diagrams are not semantically navigable, source text remains available.

