implementation_plan:
  existing_patterns:
    - "Use `backend/apps/docs/app.yml` as the direct embed metadata template."
    - "Use `math-plot` stream conversion as the closest fenced-block conversion template."
    - "Use document/code/sheet diff-editing flows for Mermaid source patching and timeline metadata."
    - "Use `DocsMessage.svelte` only as a minimal Mermaid rendering/security reference, not as the embed UI implementation."
    - "Use Apple embed parity fixtures/tests from `apple-embed-rendering-parity` as the native verification pattern."
  architecture: >
    Mermaid embeds are source-first direct embeds. The backend detects `mermaid`
    fences, stores encrypted Mermaid source plus metadata, and sends normal embed
    updates. Web and Apple clients render sanitized visual diagrams from source;
    CLI renders source text. Diff editing patches the source string and reuses
    existing version metadata/timeline patterns.
  data_flow:
    - User asks for a diagram.
    - The assistant receives Diagrams/Mermaid instructions when the Diagrams app is discovered and relevant.
    - The assistant emits a `mermaid` fenced block.
    - "`stream_consumer.py` creates a Mermaid placeholder/embed and replaces the fence with an embed reference."
    - "`embed_service.py` encrypts/stores the Mermaid TOON content, sends WebSocket updates, and persists finished embeds."
    - CLI renders source text, web renders sanitized visual preview/fullscreen, and Apple renders native parity surfaces.
    - Assistant diff edits patch `diagram_code`, create a new version, and update preview/fullscreen/timeline.
  affected_files:
    - path: backend/apps/diagrams/app.yml
      reason: New Diagrams app metadata and direct Mermaid embed type.
    - path: backend/apps/ai/instructions/base_mermaid_diagram_instruction.md
      reason: Teach assistant when and how to emit Mermaid fences.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Inject Mermaid instructions when Diagrams is available/relevant.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Detect `mermaid` fences and convert them to embeds.
    - path: backend/core/api/app/services/embed_service.py
      reason: Create/update Mermaid embeds, content hashes, events, and persistence fallback.
    - path: frontend/packages/ui/package.json
      reason: Add Mermaid dependency to the UI package that owns embed components.
    - path: frontend/packages/ui/src/components/embeds/diagrams/*
      reason: New preview/fullscreen/text/sanitization/preview fixture components.
    - path: frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/GroupRenderer.ts
      reason: Mount Mermaid preview for direct embeds.
    - path: frontend/packages/ui/src/services/embedPreviewRegistry.ts
      reason: Resolve Mermaid preview props for saved/shared/direct embed loading.
    - path: frontend/packages/ui/src/data/embedTextRenderers.ts
      reason: Register text renderer for copy/export/CLI shared output paths.
    - path: frontend/packages/ui/src/i18n/sources/embeds.yml
      reason: Add localized embed labels/status/control text.
    - path: frontend/packages/openmates-cli/src/embedRenderers.ts
      reason: Render Mermaid preview/fullscreen as terminal text/source.
    - path: frontend/apps/web_app/tests/diagrams-mermaid-embed.spec.ts
      reason: New web E2E coverage for creation, preview, fullscreen, and diff editing.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Add `diagrams-mermaid` type and metadata.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/MermaidDiagramEmbedRenderer.swift
      reason: Native preview/fullscreen Mermaid renderer.
    - path: apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
      reason: Add Diagrams app fixture.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/<diagrams-mermaid-example>.ts
      reason: Canonical public example chat generated from a verified real natural-language chat.
    - path: frontend/packages/ui/src/i18n/sources/example_chats/<diagrams_mermaid_example>.yml
      reason: Localized public example chat title, description, and transcript text.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Link the canonical example chat to the Diagrams/Mermaid content type if existing metadata does not cover it automatically.
    - path: scripts/audit_example_chats.py
      reason: Enforce renderable/public-safe Mermaid example chat coverage if the existing content catalog audit needs a Mermaid-specific check.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/diagrams-mermaid-embeds/spec.yml
    - Write or extend the listed tests before feature code and record red-phase evidence.
    - Run backend/CLI/unit checks locally or via allowed scripts first.
    - Deploy to dev before Playwright green runs, wait for Vercel Ready, then run web specs.
    - Run Apple remote status/build/test after code is committed and pushed, recording sanitized evidence.
    - python3 scripts/spec_verify.py docs/specs/diagrams-mermaid-embeds/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/diagrams-mermaid-embeds/spec.yml --phase green
  verification_order:
    - Backend and CLI contract tests first.
    - Web unit/vitest and Playwright after deploy for green phase.
    - Apple remote unit/UI/build verification third.
    - Example chat audit and live public transcript smoke test after the real chat is approved and committed.

