  parity_expectations:
    - Apple preview card content must materially match the web Mermaid preview, including Diagrams app chrome, icon, color tokens, status bar, readable cropped diagram preview, and source fallback/error state.
    - Apple fullscreen must materially match web fullscreen shell and provide equivalent pan, zoom in/out, fit/reset, and readable source fallback behavior.
    - Apple must use OpenMates primitives and generated design tokens, not default platform product UI controls for embed chrome or zoom controls.
    - Apple may render Mermaid through a safe native WebKit wrapper or a native renderer only if untrusted Mermaid output cannot execute OpenMates-origin script, access auth/session state, or leak private content.
