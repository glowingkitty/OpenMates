assumptions:
  - id: A-1
    text: The existing backend `/v1/settings/issues`, `/v1/settings/issue-logs`, `/v1/settings/debug-logs`, and `/v1/client-logs` contracts can accept Apple diagnostics using existing schemas or backwards-compatible metadata.
    category: backend
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/settings.py
        summary: Issue report request already accepts `console_logs`, `runtime_debug_state`, `action_history`, screenshots, and trace IDs; issue/debug log endpoints accept formatted logs and metadata.
  - id: A-2
    text: The first implementation can prove MetricKit integration through unit-testable summaries and simulator build/tests, but real device MetricKit delivery must be treated as asynchronous and may not appear during CI.
    category: apple
    required_before: implementation
    status: confirmed
    evidence:
      - source: Apple MetricKit documentation
        summary: Metric reports are daily/periodic while diagnostics are event-based where supported.

contracts:
  api:
    - route: POST /v1/settings/issues
      request: >
        Existing web-compatible issue report body with Apple-provided `console_logs`,
        `runtime_debug_state`, `action_history`, optional screenshot, and trace IDs.
      response: Existing `IssueReportResponse` with internal and short issue identifiers.
      errors:
        - Native diagnostics collection failure must not block issue submission; the payload should include an explicit diagnostics error field where safe.
    - route: POST /v1/settings/issue-logs
      request: "{ issue_id: string, logs_text: string, page_url: string, user_agent: string }"
      errors:
        - Upload failure is non-fatal and logged locally.
    - route: POST /v1/settings/debug-logs
      request: "{ logs: LogEntry[], metadata: object, debugging_id: string }"
      errors:
        - Offline or failed batches remain queued or are dropped only after bounded retry/queue limits.
    - route: POST /v1/client-logs
      request: "Anonymized warn/error log batch matching the existing default diagnostic logging contract."
      errors:
        - Disabled when the user opts out or is unauthenticated.
  data:
    - Diagnostic buffers are bounded in memory and local queue storage.
    - Any persisted debug queue contains only sanitized entries and metadata.
    - MetricKit summaries are sanitized and capped before inclusion in reports.
  ui_states:
    - Report issue form remains usable if diagnostics collection fails.
    - Debug log sharing settings show active/inactive states and session ID using OpenMates settings primitives when touched.
  privacy_security:
    - Redaction must run before data enters durable queues or upload payloads where practical, not only at final upload time.
    - IDs in reports should be short prefixes or one-way hashes unless an endpoint requires a full issue ID for correlation.
    - Automatic diagnostics must never contain raw message text, encryption keys, auth/session headers, cookies, or request/response bodies.

