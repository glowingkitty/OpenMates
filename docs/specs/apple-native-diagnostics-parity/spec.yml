id: apple-native-diagnostics-parity
title: Apple Native Diagnostics And Report Issue Parity
status: verified

goal: >
  Make Apple issue reports and debug-log sharing at least as useful as the web
  app's report issue flow by collecting privacy-safe native logs, action
  history, runtime state, SwiftData/offline metadata, report-time performance
  snapshots, and MetricKit diagnostics without capturing private message
  plaintext, keys, tokens, or request/response bodies.

scope:
  in:
    - Extract native diagnostics helpers out of `ReportIssueView.swift` into a reusable `Core/Diagnostics` layer.
    - Route Apple native logs through a single privacy-safe diagnostics logger that feeds both unified logging and issue/debug buffers.
    - Bridge existing `NativeSyncPerfLog` output into report/debug buffers so chat opening, sync, embed hydration, and offline performance logs are captured automatically.
    - Include native runtime debug state in issue reports: current surface, WebSocket state, recent sync state, network flags, thermal/low-power state, pending uploads/sends, active streaming lifecycle, chat opening counters, and frame monitor summary.
    - Add a native action-history tracker for stable navigation/button actions, excluding user-entered text.
    - Add a SwiftData/ChatStore inspection report equivalent to web IndexedDB inspection, with counts, version fields, encrypted field presence/lengths, and hashed/prefixed identifiers only.
    - Add report-time rolling frame/jank metrics using a lightweight display-link monitor on iOS.
    - Add MetricKit setup for daily metric reports and event diagnostics where supported, storing recent sanitized summaries for issue report context.
    - Implement Apple debug-session live forwarding to `/v1/settings/debug-logs` and default anonymized warn/error telemetry to `/v1/client-logs` for authenticated users who have not opted out.
    - Update Apple agent instructions to require `NativeDiagnostics`/metrics APIs for new Apple logging and performance instrumentation.
    - Add unit/UI tests proving payload richness, redaction, log bridging, default telemetry sanitization, debug-session forwarding payload shape, and report issue upload behavior.
  out:
    - Capturing message plaintext automatically in logs, inspection reports, MetricKit metadata, or action history.
    - Capturing chat keys, embed keys, master keys, recovery keys, session tokens, cookies, push tokens, full share URL fragments, private file paths, or raw request/response bodies.
    - Uploading screenshots without explicit user attachment.
    - Adding new backend endpoints unless an existing contract cannot safely represent the native diagnostics.
    - Rewriting the Apple chat transcript or app shell for performance; this spec adds observability, not UI virtualization.
    - Making MetricKit reports a prerequisite for issue submission, because MetricKit delivery is periodic/event-based and may not be immediately available.

