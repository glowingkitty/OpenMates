implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/services/logCollector.ts
    - frontend/packages/ui/src/services/clientLogForwarder.ts
    - frontend/packages/ui/src/services/userActionTracker.ts
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
    - apple/OpenMates/Sources/Features/Settings/Views/ReportIssueView.swift
  architecture: >
    Add a `Core/Diagnostics` layer that centralizes native log capture,
    redaction, action history, runtime snapshots, offline inspection,
    frame metrics, MetricKit summaries, and forwarding payloads. Existing
    feature code should call `NativeDiagnostics` or specialized diagnostics
    helpers rather than writing ad-hoc `print` logs for product-debuggable
    events. `ReportIssueView` consumes a single diagnostics context provider
    when constructing `/v1/settings/issues` and `/v1/settings/issue-logs`
    payloads.
  data_flow:
    - Native feature code records sanitized events through `NativeDiagnostics`.
    - "`NativeClientLogCollector` keeps bounded all-level and warning/error buffers."
    - "`NativeActionTracker` records stable screen/control events."
    - "`NativeRuntimeSnapshotProvider` reads current app/session/chat/network/performance state at report time."
