    - apple/OpenMatesUITests/SettingsFullParityUITests.swift
    - apple/AGENTS.md
    - .claude/rules/apple-ui.md
  parity_expectations:
    - Apple diagnostics must mirror the web report issue privacy model while using native signals that web cannot provide, including frame pacing, thermal state, Low Power Mode, and MetricKit diagnostic summaries.
    - Apple report payloads must keep using `/v1/settings/issues` and `/v1/settings/issue-logs` with backend-compatible field names where possible.
    - Native debug-log sharing must follow web debug-session semantics: explicit session ID for user-enabled live logs, issue-time logs tied to a submitted issue, and default anonymized warn/error telemetry without user identity.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SettingsFullParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsFullParityUITests/testReportIssueSubmissionSucceedsAndUploadsSimulatorLogs
  intentional_native_differences:
    - MetricKit reports are not synchronous with issue submission; issue reports include the latest locally available MetricKit summaries, not a guaranteed fresh system report.
    - Native frame monitoring uses iOS display-link sampling rather than browser performance APIs.
    - Native action history uses stable Swift-side route/control identifiers instead of DOM selectors.

clarification:
  rounds:
    - question: Should Apple diagnostics include default anonymized warn/error telemetry for authenticated users who have not opted out, or only issue reports and explicit debug sessions?
      answer: Include default telemetry.
  vision_summary: >
    Apple diagnostics should become a first-class observability surface rather
    than a report-form-only helper. Support should be able to answer what screen
    the user was on, what safe actions led there, whether sync/WebSocket/offline
    work was active, how much local data was involved, whether the UI was janky,
    and whether native system diagnostics point to hangs/crashes, while preserving
    zero-knowledge and privacy boundaries.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple issue report contains rich native context
    given:
      - Alice is authenticated in the Apple app.
      - Alice experiences poor performance on a chat screen.
    when:
      - Alice opens Report issue and submits a report.
    then:
      - The issue payload includes native logs, action history, runtime debug state, offline/chat inspection metadata, frame metrics, and recent MetricKit summaries when available.
      - The payload excludes message plaintext, keys, auth tokens, cookies, full share fragments, request/response bodies, and private file paths.
      - The backend returns a report reference and Apple pushes issue-time logs to `/v1/settings/issue-logs` using the internal issue ID.

  - id: S-2
    title: Native sync and chat performance logs flow into issue reports
    given:
      - Apple has emitted `NativeSyncPerfLog` entries during cold load, phased sync, chat open, or embed hydration.
    when:
      - Alice submits an issue report after those events.
    then:
      - The submitted logs include those structured phase timing entries.
      - The same entries are redacted and capped by ring-buffer limits.
      - Critical warning/error entries survive high-volume info/debug noise.

  - id: S-3
    title: Apple records privacy-safe action history
    given:
      - Alice navigates from chats to settings, opens billing, returns to chat, and opens Report issue.
    when:
      - Alice submits the report.
    then:
      - The action history shows stable route/control labels and timestamps.
      - The action history does not include text typed into the composer or report form.
      - Report-issue form focus/input noise does not hide the meaningful actions that happened before the report.

  - id: S-4
    title: Apple debug-session forwarding mirrors web semantics
    given:
      - Alice starts a debug-log sharing session in Apple settings.
      - Native warn/error/info entries occur while the session is active.
    when:
      - The native forwarder flushes a batch.
    then:
      - The request targets `/v1/settings/debug-logs` with the active `debugging_id` and sanitized log entries.
      - The forwarder retries or queues locally when offline and does not block UI interactions.
      - Stopping the debug session stops live forwarding after a best-effort drain.

  - id: S-5
    title: Apple default telemetry sends only anonymized warn/error diagnostics
    given:
      - Alice is authenticated and has not opted out of diagnostic logging.
      - Native warnings or errors occur outside an explicit debug session.
    when:
      - The default telemetry forwarder flushes.
    then:
      - The request targets `/v1/client-logs` with a per-install/session pseudonym and no user email or user ID.
      - Only warn/error entries are sent.
      - Content-level sanitization strips emails, UUID-like chat/message/embed IDs, base64 blobs, tokens, long strings, and private paths.

  - id: S-6
    title: MetricKit and frame probes improve performance triage
    given:
      - Apple has sampled recent frame pacing and has received one or more MetricKit metric or diagnostic reports.
    when:
      - Alice submits an issue report.
    then:
      - Runtime state includes recent average FPS, worst frame, jank counts, Low Power Mode, and thermal state where supported.
      - Recent MetricKit summaries include report type, time range/event timestamp, app version/environment, and sanitized diagnostic categories.
      - MetricKit absence is represented explicitly rather than treated as an error.

  - id: S-7
    title: Agent instructions enforce native diagnostics APIs
    given:
      - A future agent edits Apple code that logs errors, warnings, network failures, sync phases, chat-open performance, or expensive operations.
    when:
      - The agent reads Apple instructions.
    then:
      - The instructions require `NativeDiagnostics` or the approved metrics/signpost helpers instead of new ad-hoc `print` or isolated `Logger` calls for product diagnostics.
      - The instructions restate privacy boundaries for diagnostics and issue reports.

