scenarios:
  - id: S-1
    title: User sees fast daily usage overview
    given:
      - Alice is logged in and has AI Ask usage today with token data.
      - Alice also has at least one app skill usage row without token data.
    when:
      - Alice runs `openmates settings billing usage overview --period daily --days 7 --json`.
    then:
      - The command returns seven daily periods in newest-first order.
      - Each period includes credits, entry_count, input_tokens, output_tokens, total_tokens, and entries_without_token_data.
      - Missing token data is counted explicitly and does not make token totals look complete.
      - The response includes freshness metadata and does not require scanning every raw row in the CLI process.

  - id: S-2
    title: User switches between daily, weekly, and monthly periods
    given:
      - Alice has usage across multiple weeks and months.
    when:
      - Alice requests daily, weekly, and monthly overview periods through CLI, web, npm SDK, or pip SDK.
    then:
      - Daily periods use YYYY-MM-DD keys.
      - Weekly periods use ISO YYYY-Www keys with period_start and period_end.
      - Monthly periods use YYYY-MM keys.
      - Totals for a weekly or monthly period equal the sum of authoritative raw rows in that period after reconciliation.

  - id: S-3
    title: User sees model, app, skill, source, and provider breakdowns
    given:
      - Alice has usage with at least two models, multiple app skills, and both chat and API key sources.
    when:
      - Alice requests the overview with breakdowns enabled.
    then:
      - by_model groups AI Ask token and credit totals by model_used.
      - by_app and by_skill group credits and entry counts by app_id and app_id/skill_id.
      - by_source groups chat, api_key, direct, and benchmark usage.
      - by_provider and by_region use decrypted provider/region data when present.
      - Breakdown totals never double-count the same raw usage row within one breakdown dimension.

  - id: S-4
    title: New usage becomes visible near-real-time
    given:
      - Alice sends a chat message that creates a raw usage row.
    when:
      - Alice requests the daily overview immediately and again after up to 60 seconds.
    then:
      - The raw usage row remains authoritative immediately after billing completes.
      - The overview response either includes the row or marks the relevant period stale/updating.
      - Within the freshness target, the daily rollup includes the row unless an explicit backlog/error state is reported.

  - id: S-5
    title: Reconciliation repairs stale or missing rollups
    given:
      - A raw usage row was created but incremental rollup update failed.
    when:
      - The reconciliation job processes the affected day/week/month.
    then:
      - The encrypted rollup is rebuilt from authoritative raw usage rows for recent periods.
      - Freshness metadata records the recompute time and source_max_created_at.
      - The overview no longer reports stale once the rebuild succeeds.

  - id: S-6
    title: Historical archived usage can be backfilled
    given:
      - Alice has monthly usage entries archived to encrypted S3 by the existing archive service.
    when:
      - A backfill/rebuild command processes the archived month.
    then:
      - The command retrieves and decrypts the archive with Alice's user vault key.
      - Daily, weekly, and monthly encrypted rollups are rebuilt for that month.
      - Existing monthly chat/app/API summaries keep their archived flags and archive_s3_key behavior.

  - id: S-7
    title: SDK callers get parity with CLI
    given:
      - Alice has an approved API key with billing read scope.
    when:
      - Developer code calls `om.billing.usageOverview(...)` in npm or `om.billing.usage_overview(...)` in Python.
    then:
      - Both SDKs call `/v1/sdk/billing/usage/overview` with the same query semantics as CLI.
      - Responses use the same JSON contract as the session API.
      - Missing or insufficient billing scope returns a typed permission error.

  - id: S-8
    title: Web settings uses the canonical overview while preserving drilldowns
    given:
      - Alice opens Settings > Usage in the web app.
    when:
      - The overview tab loads.
    then:
      - The aggregate overview is loaded from the canonical usage overview endpoint.
      - Existing chat/app/API drilldowns still use raw decrypted rows for per-entry receipts.
      - The UI shows stale/updating metadata when rollups are behind.

  - id: S-9
    title: OpenAI-compatible API persists token data for future overview accuracy
    given:
      - Alice uses an OpenAI-compatible API key request that returns provider usage metadata.
    when:
      - OpenMates charges credits for that request.
    then:
      - The raw usage row stores encrypted input_tokens and output_tokens when usage metadata is available.
      - The row remains tagged as app_id ai, skill_id ask, and source api_key.
      - Future rollups include those token totals.

