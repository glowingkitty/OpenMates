contracts:
  api:
    - route: GET /v1/settings/usage/overview
      auth: authenticated session, same user boundary as existing /v1/settings/usage endpoints
      query: >
        granularity=daily|weekly|monthly, days?, weeks?, months?, from?, to?,
        include_breakdowns=true|false, include_top_buckets=true|false
      response: >
        { granularity, periods: UsageOverviewPeriod[], totals, freshness,
        generated_at, range, token_coverage }
      errors:
        - 400 for invalid granularity or invalid range.
        - 401 when unauthenticated.
        - 503 when rollup rebuild is unavailable and no cached rollup can be returned.
    - route: GET /v1/sdk/billing/usage/overview
      auth: API key with billing read scope and approved device
      query: Same as /v1/settings/usage/overview.
      response: Same JSON shape as /v1/settings/usage/overview.
      errors:
        - 401 for missing/invalid API key.
        - 403 for unapproved device or missing billing read scope.
        - 400 for invalid query.
  data:
    - collection: usage_period_rollups
      fields:
        - id uuid primary key
        - user_id_hash string indexed
        - granularity string indexed, one of daily, weekly, monthly
        - period_key string indexed, YYYY-MM-DD, YYYY-Www, or YYYY-MM
        - period_start integer Unix seconds
        - period_end integer Unix seconds exclusive
        - rollup_version integer
        - encrypted_rollup_json text
        - entry_count integer cleartext for cheap completeness checks only
        - source_min_created_at integer nullable
        - source_max_created_at integer nullable
        - computed_at integer
        - stale_reason string nullable
        - created_at timestamp or integer consistent with Directus conventions
        - updated_at timestamp or integer consistent with Directus conventions
    - indexes:
        - unique user_id_hash, granularity, period_key
        - user_id_hash, granularity, period_start desc
        - user_id_hash, period_start desc on existing usage rows if missing
        - user_id_hash, year_month on existing usage_monthly_*_summaries tables
        - user_id_hash, date on existing usage_daily_*_summaries tables
  rollup_json:
    - version: 1
    - totals: credits, entries, input_tokens, output_tokens, total_tokens, user_input_tokens, system_prompt_tokens, tool_inference_iterations, entries_without_token_data
    - token_coverage: entries_with_token_data, entries_without_token_data, coverage_ratio
    - by_model: model_used, credits, entries, input_tokens, output_tokens, total_tokens
    - by_app: app_id, credits, entries, token totals where present
    - by_skill: app_id, skill_id, credits, entries, token totals where present
    - by_source: source, credits, entries, token totals where present
    - by_provider: server_provider, credits, entries, token totals where present
    - by_region: server_region, credits, entries, token totals where present
    - top_buckets: optional chat_id/api_key_hash/device_hash buckets with credits and entry_count but no decrypted chat titles or API key labels in the backend payload
  cli:
    - command: >
        openmates settings billing usage overview
        [--period daily|weekly|monthly] [--days N] [--weeks N] [--months N]
        [--from YYYY-MM-DD] [--to YYYY-MM-DD] [--json]
      behavior:
        - Defaults to --period daily --days 30 for human output.
        - Human output shows totals, top models, top skills, and freshness in a compact table.
        - JSON output returns the canonical API response without lossy formatting.
  npm_sdk:
    - method: >
        om.billing.usageOverview(options?: { granularity?: "daily" | "weekly" | "monthly",
        days?: number, weeks?: number, months?: number, from?: string, to?: string,
        includeBreakdowns?: boolean, includeTopBuckets?: boolean })
      response: Canonical usage overview JSON.
  pip_sdk:
    - method: >
        om.billing.usage_overview(granularity="daily", days=None, weeks=None,
        months=None, from_date=None, to_date=None, include_breakdowns=True,
        include_top_buckets=False)
      response: Canonical usage overview dict.
  privacy_security:
    - Rollup JSON is encrypted with the same user vault key boundary used by raw usage fields.
    - Cleartext rollup rows may contain only user_id_hash, period keys, timestamps, rollup version, and entry_count.
    - API responses are returned only to the owning authenticated user or approved API-key SDK device with billing read scope.
    - Logs must not include decrypted rollup JSON, model names, token totals, credit totals, provider names, region names, chat IDs tied to titles, or API key hashes beyond existing safe truncated diagnostics.
    - Rollup rebuild failure must be visible through stale/error metadata and logs; no silent success with incomplete totals.

