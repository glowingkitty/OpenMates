implementation_plan:
  spec_path: docs/specs/usage-overview-rollups/spec.yml
  existing_patterns:
    - backend/core/api/app/services/directus/usage.py for usage row encryption/decryption and summary updates.
    - backend/core/api/app/routes/settings.py for authenticated billing usage routes.
    - backend/core/api/app/routes/sdk.py for SDK billing surface dispatch.
    - frontend/packages/openmates-cli/src/cli.ts for settings billing command routing.
    - frontend/packages/openmates-cli/src/sdk.ts and packages/openmates-python/openmates/sdk.py for SDK billing methods.
    - frontend/packages/ui/src/components/settings/SettingsUsage.svelte for web usage overview/drilldown rendering.
  architecture: >
    Add a private encrypted rollup layer fed by raw usage rows. Raw usage rows
    remain authoritative. Incremental rollup update is best effort and near-real
    time; reconciliation and backfill rebuild rollups deterministically from raw
    rows or archived S3 month files. One canonical overview endpoint serves CLI,
    SDKs, and web, with client-specific formatting only at the edge.
  data_flow:
    - Billing writes a raw usage row with encrypted sensitive fields.
    - The usage service enqueues or performs a non-blocking rollup update for the affected day, ISO week, and month.
    - If incremental update fails, the raw row remains valid and the affected period is marked stale or queued for reconciliation.
    - Reconciliation rebuilds recent rollups from Directus raw rows.
    - Backfill rebuilds historical rollups from encrypted S3 archives.
    - Overview APIs fetch matching rollup rows, decrypt rollup JSON for the current user, and return periods plus freshness metadata.
  affected_files:
    - path: backend/core/directus/schemas/usage_period_rollups.yml
      reason: New encrypted rollup collection.
    - path: backend/core/directus/setup/migrate_usage_overview_indexes.sql
      reason: Unique rollup and hot-path usage summary indexes.
    - path: backend/core/api/app/services/directus/usage.py
      reason: Raw-row aggregation helpers, rollup update hooks, decrypt/aggregate behavior.
    - path: backend/core/api/app/services/usage_overview_service.py
      reason: Canonical period rollup aggregation, freshness, reconciliation, and backfill orchestration.
    - path: backend/core/api/app/tasks/usage_overview_tasks.py
      reason: Async rollup update, reconciliation, and backfill jobs.
    - path: backend/core/api/app/routes/settings.py
      reason: /v1/settings/usage/overview route.
    - path: backend/core/api/app/routes/sdk.py
      reason: /v1/sdk/billing/usage/overview dispatch and scope enforcement.
    - path: backend/core/api/app/routes/usage_api.py
      reason: OpenAPI visibility for new usage overview route.
    - path: backend/core/api/app/routes/openai_compat.py
      reason: Persist token counts for OpenAI-compatible requests when available.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Typed client helper for usage overview route.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: New CLI command and formatted output.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK billing.usageOverview.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK billing.usage_overview.
    - path: frontend/packages/ui/src/components/settings/SettingsUsage.svelte
      reason: Web aggregate overview uses canonical endpoint.
    - path: frontend/packages/ui/src/config/api.ts
      reason: Add endpoint constant.
    - path: frontend/packages/ui/src/i18n/sources/settings/usage.yml
      reason: Labels for token totals, freshness, stale states, and weekly/monthly toggles.
    - path: docs/user-guide/billing/usage.md
      reason: Document daily/weekly/monthly token and model overviews.
    - path: docs/user-guide/cli/settings.md
      reason: Document CLI usage overview command.
    - path: packages/openmates-python/README.md
      reason: Document Python usage overview helper.
  verification_strategy:
    - Validate spec before implementation.
    - Add backend red tests for aggregation, freshness/reconciliation, archive backfill, privacy, and OpenAI-compatible token persistence.
    - Add CLI and SDK unit tests for command/method routing.
    - Add real dev-server CLI, npm SDK, and pip SDK smoke script before web implementation.
    - Run SDK/CLI parity audit after CLI and SDK methods are added.
    - Deploy backend/web changes before Playwright green verification.
    - Get user confirmation for deployed web usage overview.
    - Run or waive Apple billing settings parity check last.
  verification_order:
    - Backend unit tests for rollup contract and privacy.
    - Real CLI command against https://api.dev.openmates.org with real auth/test-account state.
    - npm SDK and pip SDK real calls against https://api.dev.openmates.org with real approved API key/device state.
    - python3 scripts/audit_sdk_cli_parity.py.
    - Web Playwright after deploy to app.dev.openmates.org.
    - User confirmation of deployed web overview behavior.
    - Apple remote status/build/test or explicit waiver.

