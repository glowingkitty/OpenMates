schema_version: 2
id: usage-overview-rollups
title: Fast Usage Overview Rollups
status: implementing

goal: >
  Give users, CLI callers, and SDK callers a fast, trustworthy overview of
  OpenMates usage by day, week, and month, including total credits, token totals,
  model breakdowns, app and skill breakdowns, source breakdowns, and freshness
  metadata, without weakening the existing encrypted usage privacy model.

scope:
  in:
    - A canonical usage overview API for authenticated session clients.
    - API-key SDK access to the same overview through the billing-safe SDK surface.
    - Fast daily, weekly, and monthly usage periods with explicit range parameters.
    - Totals for credits, entries, input tokens, output tokens, total tokens, user input tokens, system prompt tokens, tool inference iterations, and entries without token data.
    - Breakdowns by model, app, skill, source, provider, region, and top chat/API/device buckets where safe and useful.
    - Encrypted per-user rollup payloads so model names, provider names, region names, credits, and token aggregates remain protected at rest.
    - Near-real-time freshness target of 30-60 seconds after raw usage row creation.
    - Deterministic reconciliation and backfill from authoritative Directus usage rows and archived S3 monthly usage files.
    - Directus schema and index migrations for rollups and existing usage summary lookup hot paths.
    - CLI command and formatted table/JSON output for daily, weekly, and monthly overview.
    - npm SDK and pip SDK parity methods for the overview contract.
    - Web Settings > Usage overview upgrade to use the canonical API for aggregate cards and charts while preserving existing drilldowns.
    - Documentation updates for billing usage, CLI settings, SDK usage, and privacy behavior.
  out:
    - Changing the authoritative raw usage row contract for existing entries beyond additive fields needed for future token persistence.
    - Server-side plaintext storage of user model names, token totals, credit totals, provider names, region names, chat titles, or API key labels.
    - Exact real-time dashboard guarantees in the billing write path.
    - Repricing historical credits or recalculating already charged usage.
    - Team billing usage rollups, unless a later task explicitly extends the personal usage overview contract to teams.
    - Browser-only payment purchase flows, invoices, refunds, gift cards, or auto-topup behavior.
    - Public/global product analytics; this spec is for user-owned private usage overviews.

context_discovery:
  github_issues:
    - GitHub MCP `get_me` returned 401 Bad credentials, so tracker search could not be completed in this session.
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/user-guide/billing/usage.md
    - docs/user-guide/cli/settings.md
    - docs/architecture/platforms/cli-feature-parity.md
    - docs/specs/sdk-packages-v1/spec.yml
    - docs/specs/sdk-cli-parity-v1/spec.yml
    - docs/specs/apple-settings-billing-parity/spec.yml
    - docs/specs/cli-model-benchmarks/spec.yml
    - docs/specs/free-testing-credits-budget/spec.yml
    - docs/specs/anonymous-free-usage-budget/spec.yml
  code_patterns:
    - backend/core/api/app/services/directus/usage.py creates raw usage rows, encrypts sensitive fields, updates daily/monthly summaries, and decrypts rows for detail views.
    - backend/core/directus/schemas/usage.yml defines encrypted token, model, credit, provider, region, and code-run usage fields.
    - backend/core/directus/schemas/usage_daily_*_summaries.yml and usage_monthly_*_summaries.yml currently store only total_credits and entry_count.
    - backend/core/api/app/routes/settings.py exposes /v1/settings/usage, summaries, details, daily-overview, chat-entries, message-cost, and export.
    - backend/core/api/app/routes/sdk.py maps /v1/sdk/billing/usage, summaries, daily, and export to settings routes.
    - backend/core/api/app/services/usage_archive_service.py archives old raw usage rows to encrypted S3 files and marks monthly summaries archived.
    - backend/core/api/app/tasks/usage_archive_tasks.py runs monthly archive work for rows older than about 3 months.
    - backend/core/api/app/services/billing_service.py passes AI Ask token usage details to usage row creation.
    - backend/core/api/app/routes/openai_compat.py calculates credits from OpenAI-compatible usage metadata but currently does not pass token counts into usage_details.
    - frontend/packages/ui/src/components/settings/SettingsUsage.svelte fetches existing daily overview and drilldown endpoints and displays per-entry token breakdowns.
    - frontend/packages/openmates-cli/src/cli.ts exposes settings billing usage, summaries, daily, and export commands as raw settings endpoint wrappers.
    - frontend/packages/openmates-cli/src/sdk.ts exposes OpenMatesBilling usage methods for npm SDK callers.
    - packages/openmates-python/openmates/sdk.py exposes matching Python billing usage methods.
  tests:
    - backend/tests/test_usage_entries.py
    - frontend/apps/web_app/tests/usage-token-breakdown.spec.ts
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/sdk.test.ts
    - packages/openmates-python/tests/test_sdk.py
    - scripts/audit_sdk_cli_parity.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Settings/**
    - apple/OpenMatesTests/SettingsBillingParityTests.swift
    - apple/OpenMatesUITests/SettingsBillingStoreKitParityUITests.swift
  parity_expectations:
    - Apple settings billing parity includes usage tabs, drilldowns, and exports under docs/specs/apple-settings-billing-parity/spec.yml.
    - This spec changes the shared billing usage API contract; Apple must continue to display correct usage data or record an explicit no-UI-change waiver for the first backend/CLI/SDK slice.
    - Apple can adopt the new aggregate overview after CLI, SDK, and web evidence is green unless the product owner waives native UI parity for this slice.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios or targeted Settings billing usage test after CLI, SDK, web, and user-confirmation gates, unless waived.
  intentional_native_differences:
    - Native chart rendering may differ from web as long as period totals, breakdown labels, stale-state messaging, and drilldown entry details remain equivalent.

clarification:
  rounds:
    - question: How fresh must the overview be after a chat/API request completes?
      answer: Use near-real-time rollups with deterministic reconciliation; do not make the billing write path fragile for immediate dashboard consistency.
  vision_summary: >
    Raw AI Ask usage rows already persist encrypted token fields, but the fast
    daily/monthly summaries do not include token or model aggregates and there is
    no weekly rollup. The new overview should be fast, privacy-preserving, and
    shared by CLI, npm SDK, pip SDK, web, and eventually Apple, with rollups
    typically fresh within 30-60 seconds and exact raw rows remaining the
    authoritative billing record.
  approved_by_user: true

