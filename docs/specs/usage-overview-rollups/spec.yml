decisions:
  - id: D-1
    status: active
    decision: Store fast overview payloads in a new per-user encrypted rollup collection rather than adding cleartext model/token aggregate columns.
    reason: Model names, token totals, provider/region, and credit totals are documented as sensitive encrypted usage details.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-2
    status: active
    decision: Treat raw usage rows as authoritative and rollups as near-real-time cached evidence with freshness metadata.
    reason: Billing writes should remain reliable; dashboards can tolerate short lag when stale state is explicit and reconciliation is deterministic.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-3
    status: active
    decision: Use ISO week keys in the format YYYY-Www for weekly rollups.
    reason: ISO weeks are unambiguous for CLI, SDK, CSV, and chart consumers.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-4
    status: active
    decision: >
      Preserve current raw row token semantics for historical data: token fields
      are complete for AI Ask rows, and missing token data is reported explicitly
      instead of inferred.
    reason: Non-AI app skills may charge by unit/request/duration and older rows cannot be retroactively tokenized.
    decided_at: "2026-07-20T00:00:00Z"

