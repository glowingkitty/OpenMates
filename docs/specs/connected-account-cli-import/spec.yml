risks:
  - Users may mistake this for a normal sharing feature; UI copy must clearly label it as test/developer transfer.
  - Browser clipboard and shell history hold the encrypted payload, so payload must remain strongly passcode-protected.
  - Provider token validation must avoid returning calendar names, emails, events, or token material.

open_questions:
  - Should the export UI be hidden outside dev/test mode in a later hardening slice?
