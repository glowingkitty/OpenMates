id: connected-account-cli-import
title: Connected Account CLI Import
status: implementing

goal: >
  Let a user copy one connected account from their normal OpenMates account to a
  separate test account by exporting the refresh-token bundle from the source
  client, protecting it with a passcode, and importing it through OpenMates CLI
  where it is re-encrypted for the destination account before storage.

scope:
  in:
    - Export command generation for one existing connected account from web settings.
    - Passcode-encrypted export payload containing the plaintext token bundle only inside ciphertext.
    - CLI import into the currently logged-in destination account.
    - Re-encryption of imported connected-account fields with the destination account master key.
    - Harmless provider validation read after import.
  out:
    - Server-side persistent refresh-token grants or offline automation credentials.
    - Bulk account export/import.
    - Exporting connected accounts without a user-entered passcode.
    - Sharing connected accounts through REST/API keys.

