apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This first slice is web-settings export plus CLI import for testing; Apple app import/export UI is out of scope.
  verification:
    - Apple not affected for this CLI-only test-support slice.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should transfer work between separate OpenMates accounts rather than only syncing across devices for the same account?
      answer: Yes. The source client decrypts locally, exports with a passcode, and the CLI re-encrypts for the separate test account.
  vision_summary: >
    Connected-account rows already sync across devices for the same user account because the same account master key can decrypt them. This feature is only for explicitly transferring one connected account to a different test account by re-encrypting token material client-side through a passcode-protected handoff.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Source user generates an encrypted import command
    given:
      - Alice is logged into the web app and has one Google Calendar connected account.
      - Alice opens connected account privacy settings and selects the account.
    when:
      - Alice enters a passcode and asks OpenMates to generate a CLI import command.
    then:
      - The browser decrypts the selected refresh-token bundle only in memory.
      - The generated command contains a passcode-encrypted payload and no plaintext refresh token.
      - Alice can copy the command to the clipboard.

  - id: S-2
    title: CLI imports into a separate test account
    given:
      - Alice is logged into OpenMates CLI as a separate test account.
      - Alice has copied the encrypted import command from the source account.
    when:
      - Alice runs the command and enters the passcode interactively.
    then:
      - The CLI decrypts the export payload locally.
      - The CLI encrypts provider, label, capabilities, permissions, directory hint, and refresh-token bundle with the destination account master key.
      - The API stores an owned encrypted connected-account row for the destination account.

  - id: S-3
    title: CLI validates imported credentials with a harmless read
    given:
      - The CLI has decrypted a valid Google Calendar refresh-token bundle during import.
    when:
      - The CLI asks the backend to validate the account.
    then:
      - The backend uses confidential OAuth credentials to exchange the refresh token transiently.
      - The backend performs a non-mutating provider read.
      - The backend returns only a success/failure summary without token material or provider-private details.

  - id: S-4
    title: Invalid imports fail safely
    given:
      - Alice runs the CLI import command with a wrong passcode, malformed payload, unsupported provider, or no logged-in CLI session.
    when:
      - The CLI attempts import.
    then:
      - The command fails with a generic actionable error.
      - No connected-account row is stored.
      - No refresh token, access token, provider account id, or provider email is printed or logged.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web settings can generate a CLI import command for one connected account using a user-entered passcode, and the command contains no plaintext token material.
  - id: AC-2
    scenario: S-2
    text: CLI import re-encrypts the connected-account row with the destination account master key before storing it through the existing connected-account API.
  - id: AC-3
    scenario: S-3
    text: CLI import validates the imported Google Calendar token through a harmless backend-assisted read without persisting or returning token material.
  - id: AC-4
    scenario: S-4
    text: Wrong passcodes, malformed payloads, unsupported providers, and missing CLI sessions fail without storing connected-account rows or leaking secrets.

contracts:
  ui:
    - surface: settings/privacy/connected-accounts
      behavior: >
        Add a selected-account action that prompts for a passcode, generates a
        passcode-encrypted CLI command, copies it, and shows explicit warning
        copy that this grants a separate OpenMates account access to the external
        provider account.
  cli:
    - command: openmates connected-accounts import --payload <OMCA1...>
      behavior: >
        Requires an existing CLI login, prompts for passcode interactively, imports
        exactly one connected account, validates it, and prints a redacted result.
      forbidden:
        - --passcode flag
        - plaintext token flags
        - printing decrypted payloads
  api:
    - route: POST /v1/connected-accounts/validate-import
      request: "provider_id, app_id, capabilities, refresh_token_envelope"
      response: "valid boolean, provider_id, app_id, checked_at"
      errors:
        - 400 for unsupported provider or malformed token envelope.
        - 401 when unauthenticated.
        - 502 when provider token exchange/read validation fails.
      security:
        - Does not store refresh tokens or access tokens.
        - Does not return account email, provider account id, calendar names, event data, or access tokens.
  data:
    - collection: connected_accounts
      behavior: >
        Import stores the same encrypted/hash field shape as OAuth handoff
        finalization, with a new destination-account-owned id and hashed_user_id.
  privacy_security:
    - Export payload version OMCA1 stores plaintext refresh-token bundle only inside passcode-encrypted ciphertext.
    - CLI import uses hidden passcode input and does not accept passcode as an argument.
    - Persistent storage receives only client-encrypted connected-account row fields.
    - Logs and output must redact refresh_token, access_token, provider_account_id, account_email, provider_email, account labels, and full payload internals.

