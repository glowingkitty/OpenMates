implementation_plan:
  existing_patterns:
    - connected-account OAuth finalization already builds encrypted rows client-side.
    - CLI crypto already supports AES-GCM and destination-account master key access.
    - Token broker/provider code already exchanges Google refresh tokens on the backend with Vault OAuth credentials.
  architecture: >
    Add a shared OMCA1 passcode-encrypted payload format. Web generates the import
    command by decrypting the selected account locally and encrypting the transfer
    payload with the passcode. CLI decrypts the payload, validates through a new
    transient backend endpoint, builds the destination encrypted row with its local
    master key, and stores it through POST /v1/connected-accounts.
  data_flow:
    - Web selected account row -> local decrypt -> OMCA1 ciphertext -> copied CLI command.
    - CLI command -> hidden passcode prompt -> local decrypt -> backend validation -> destination encrypted row -> connected_accounts create.
  affected_files:
    - path: docs/specs/connected-account-cli-import/spec.yml
      reason: Product/security contract.
    - path: frontend/packages/ui/src/services/connectedAccountCliTransfer.ts
      reason: Web export payload crypto and command generation.
    - path: frontend/packages/ui/src/components/settings/privacy/SettingsConnectedAccounts.svelte
      reason: Settings export UI.
    - path: frontend/packages/openmates-cli/src/connectedAccountImport.ts
      reason: CLI import payload crypto and row construction.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Command routing and help.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Connected account storage/validation client methods.
    - path: backend/core/api/app/routes/connected_accounts.py
      reason: Harmless import validation route.
    - path: backend/tests/test_connected_accounts_permissions.py
      reason: Backend route coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/connected-account-cli-import/spec.yml
    - cd frontend/packages/ui && npm run build
    - cd frontend/packages/openmates-cli && npm run test:unit:connected-account-import
    - cd frontend/packages/openmates-cli && npm run build && npm run test:unit:cli
    - docker exec api python -m pytest /app/backend/tests/test_connected_accounts_permissions.py
  verification_order:
    - Backend pytest for transient validation contract.
    - CLI unit/build tests for import behavior.
    - Web unit tests if package command is available; otherwise type/build verification.

