id: e2e-credential-isolation
title: E2E Credential Isolation
status: approved

goal: >
  Prevent Playwright specs that rotate, reset, or delete persistent credentials
  from corrupting regular shared E2E test accounts or the long-lived API key
  used by CLI and provider-backed skill specs.

scope:
  in:
    - Reserved Playwright account slots for auth-mutating and API-key lifecycle specs.
    - Runner-level account assignment so full-suite, only-failed, and single-spec runs use the same isolation policy.
    - Spec-level guards that prevent credential-mutating specs from falling back to the default test account.
    - API-key lifecycle cleanup that only deletes keys created by the lifecycle spec.
    - Local persistence of credential-update artifacts from GitHub Actions downloads.
    - Documentation of the reserved-account policy for future E2E specs.
  out:
    - Creating, deleting, or provisioning real test accounts in Directus.
    - Rotating existing GitHub Actions secrets during implementation.
    - Changing production or prod-smoke test account behavior.
    - Redesigning API-key creation, device approval, or account-recovery product flows.
    - Introducing new backend routes or Directus schema changes.

context_discovery:
  github_issues:
    - "No matching public issue found via gh search: e2e credential isolation test account recovery api keys."
  docs:
    - docs/contributing/guides/testing.md
    - docs/architecture/infrastructure/developer-settings.md
    - docs/architecture/core/account-recovery.md
  code_patterns:
    - scripts/run_tests.py
    - .github/workflows/playwright-spec.yml
    - frontend/apps/web_app/tests/signup-flow-helpers.ts
    - frontend/apps/web_app/tests/helpers/chat-test-helpers.ts
    - frontend/apps/web_app/tests/api-keys-flow.spec.ts
    - frontend/apps/web_app/tests/account-recovery-flow.spec.ts
    - frontend/apps/web_app/tests/backup-code-login-flow.spec.ts
    - frontend/apps/web_app/tests/backup-codes-settings.spec.ts
    - frontend/apps/web_app/tests/recovery-key-login-flow.spec.ts
    - frontend/apps/web_app/tests/recovery-key-settings.spec.ts
  tests:
    - python3 scripts/run_tests.py --suite playwright --dry-run
    - python3 scripts/run_tests.py --spec backup-code-login-flow.spec.ts --dry-run
    - python3 scripts/run_tests.py --spec api-keys-flow.spec.ts --dry-run
    - python3 scripts/spec_validate.py docs/specs/e2e-credential-isolation/spec.yml

clarification:
  rounds:
    - question: Should backup-code/account-recovery tests use separate exclusive accounts and never run on regular test accounts?
      answer: >
        Yes. Create specs and implement a proper fix so backup-code/account-recovery
        flows do not run against regular shared test accounts.
  vision_summary: >
    Credential-mutating E2E specs should be explicitly isolated instead of relying
    on sorted-suite position or manually updated secrets. Normal E2E accounts remain
    stable for chat, settings, and skill specs. API-key lifecycle tests may create
    and delete their own keys but must not invalidate the long-lived key used by
    other specs.
  approved_by_user: true

scenarios:
  - id: "S-1"
    title: Single destructive spec uses its reserved account
    given:
      - A developer runs python3 scripts/run_tests.py --spec backup-code-login-flow.spec.ts.
    when:
      - The orchestrator dispatches the GitHub Actions Playwright workflow.
    then:
      - The dispatch account is the reserved backup-code account, not account 1.
      - The spec receives OPENMATES_TEST_ACCOUNT_SOURCE_SLOT for that reserved slot.
      - If the workflow is manually dispatched with a non-reserved slot, the spec fails or skips before login with a clear isolation error.

  - id: "S-2"
    title: Full suite keeps regular specs away from reserved accounts
    given:
      - The nightly Playwright suite discovers all non-excluded specs.
    when:
      - The orchestrator assigns accounts across concurrent batches.
    then:
      - Auth-mutating specs are assigned only to their reserved slots.
      - API-key lifecycle specs are assigned only to their reserved slot.
      - Regular specs are assigned only to the normal account pool and never consume reserved slots by position.

  - id: "S-3"
    title: Auth-mutating specs cannot silently fall back to default credentials
    given:
      - A credential-mutating spec is started without the expected reserved slot credentials.
    when:
      - The spec resolves its test account.
    then:
      - The spec does not fall back to OPENMATES_TEST_ACCOUNT_EMAIL, OPENMATES_TEST_ACCOUNT_PASSWORD, or OPENMATES_TEST_ACCOUNT_OTP_KEY.
      - The failure message names the missing reserved slot and the expected spec policy.

  - id: "S-4"
    title: API-key lifecycle cleanup protects long-lived keys
    given:
      - The API-key lifecycle account already has five API keys.
      - Some keys do not have an E2E lifecycle prefix.
    when:
      - api-keys-flow.spec.ts needs a free slot for a new key.
    then:
      - The spec deletes only keys matching its E2E-owned prefixes.
      - The spec fails or skips with a clear cleanup-required message if no E2E-owned key can be removed.
      - The spec never deletes arbitrary first keys or non-E2E keys.

  - id: "S-5"
    title: Credential-update artifacts are visible locally
    given:
      - A GitHub Actions run uploads frontend/apps/web_app/artifacts/new_otp_key.txt or api_key.txt.
    when:
      - scripts/run_tests.py downloads and persists the run artifacts.
    then:
      - The files are copied to a local test-results credential-update directory grouped by spec.
      - Screenshot/report persistence continues to work as before.
      - Credential-update files are not mixed into screenshot-only directories.

acceptance_criteria:
  - id: "AC-1"
    scenario: "S-1"
    text: Single-spec dispatch for each configured credential-mutating spec uses its reserved account instead of default account 1.
  - id: "AC-2"
    scenario: "S-2"
    text: Full-suite and only-failed account assignment uses a normal account pool plus explicit reserved-slot overrides, independent of sorted spec position.
  - id: "AC-3"
    scenario: "S-3"
    text: Auth-mutating specs require isolated credentials for their configured policy and do not fall back to base test account env vars.
  - id: "AC-4"
    scenario: "S-4"
    text: API-key lifecycle tests delete only E2E-owned keys and never arbitrary existing keys.
  - id: "AC-5"
    scenario: "S-5"
    text: Downloaded new_otp_key.txt and api_key.txt artifacts are persisted locally under test-results/credential-updates/<spec>/.
  - id: "AC-6"
    scenario: "S-1"
    text: The reserved-account policy is documented so future credential-mutating specs must declare an isolation policy before joining daily runs.

contracts:
  api:
    - route: none
      request: "No backend API changes."
      response: "No backend response contract changes."
      errors:
        - Test specs may fail or skip before login when reserved credentials are missing or manually misrouted.
  data:
    - Runner policy maps specific spec filenames to reserved account slots.
    - Normal account selection excludes reserved slots unless the spec has an explicit reserved mapping.
    - Credential update artifacts are copied from downloaded GitHub artifacts to test-results/credential-updates/<spec>/.
    - API-key lifecycle cleanup treats E2E key-name prefixes as the ownership boundary.
  ui_states:
    - No product UI changes.
    - Existing Playwright UI flows continue to exercise backup-code, recovery-key, account-recovery, email-change, and API-key screens.
  privacy_security:
    - Specs and docs must not commit real emails, OTP secrets, API keys, raw credential artifacts, or GitHub secret values.
    - Console output that already prints newly generated credentials remains a CI/operator concern; local persistence must stay in ignored test-results paths.
    - Auth-mutating specs must fail closed when isolation is misconfigured, because silent fallback can corrupt a regular shared account.

tests:
  - id: "T-PY-E2E-CRED-001"
    type: pytest
    file: scripts/tests/test_run_tests_account_policy.py
    command: python3 -m pytest scripts/tests/test_run_tests_account_policy.py
    covers:
      - "AC-1"
      - "AC-2"
      - "AC-5"
    assertions:
      - reserved specs map to their configured reserved account for single-spec runs
      - normal suite account assignment skips reserved slots for regular specs
      - credential artifact persistence copies new_otp_key.txt and api_key.txt into test-results/credential-updates/<spec>/
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed
        run_id: "local-pytest-import-red"
        timestamp: "2026-06-07T22:08:00Z"
        note: "Initial local run failed before production code verification because the new importlib-based test harness did not register run_tests.py in sys.modules, exposing a test harness defect that was fixed before green."
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "local-pytest"
        timestamp: "2026-06-07T22:08:24Z"
        note: "python3 -m pytest scripts/tests/test_run_tests_account_policy.py passed 4 tests. Pytest emitted a non-fatal cache permission warning for .pytest_cache."

  - id: "T-LINT-E2E-CRED-001"
    type: lint
    file: frontend/apps/web_app/tests/signup-flow-helpers.ts
    command: bash scripts/lint_changed.sh --path docs/specs/e2e-credential-isolation/spec.yml --path scripts/run_tests.py --path scripts/tests/test_run_tests_account_policy.py --path frontend/apps/web_app/tests/signup-flow-helpers.ts --path frontend/apps/web_app/tests/api-keys-flow.spec.ts --path frontend/apps/web_app/tests/account-recovery-flow.spec.ts --path frontend/apps/web_app/tests/backup-code-login-flow.spec.ts --path frontend/apps/web_app/tests/backup-codes-settings.spec.ts --path frontend/apps/web_app/tests/recovery-key-login-flow.spec.ts --path frontend/apps/web_app/tests/recovery-key-settings.spec.ts --path frontend/apps/web_app/tests/settings-change-email.spec.ts --path docs/contributing/guides/testing.md
    covers:
      - "AC-3"
      - "AC-4"
      - "AC-6"
    assertions:
      - changed Python, TypeScript, and docs files pass repository focused lint checks
      - no real credential values are committed
    red_phase:
      required: false
      expected: not_applicable
      evidence:
        status: not_required
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "focused-lint-local"
        timestamp: "2026-06-07T22:09:43Z"
        note: "bash scripts/lint_changed.sh with the spec's changed-file list passed. The test TypeScript tsc phase reported tsc not found and was skipped by the lint script, while per-file TS checks passed."

  - id: "T-DRYRUN-E2E-CRED-001"
    type: lint
    file: scripts/run_tests.py
    command: python3 scripts/run_tests.py --suite playwright --dry-run
    covers:
      - "AC-1"
      - "AC-2"
    assertions:
      - dry-run output or unit-test-covered assignment logic shows reserved specs do not depend on sorted index positions
      - regular discovered specs remain runnable in daily/all Playwright mode
    red_phase:
      required: false
      expected: not_applicable
      evidence:
        status: not_required
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "playwright-dry-run-local"
        timestamp: "2026-06-07T22:09:01Z"
        note: "Full-suite dry-run showed reserved specs on accounts 14-20 and normal specs on accounts 1-13. Single-spec dry-runs routed backup-code-login-flow.spec.ts to account 15 and api-keys-flow.spec.ts to account 20."

implementation_plan:
  existing_patterns:
    - scripts/run_tests.py already centralizes GitHub Actions Playwright dispatch, artifact downloads, and account preflight.
    - frontend/apps/web_app/tests/signup-flow-helpers.ts already centralizes getTestAccount for slot-based credentials.
    - api-keys-flow.spec.ts already uses E2E key-name prefixes for several cleanup paths but still has unsafe arbitrary deletion fallbacks.
    - .github/workflows/playwright-spec.yml already updates the matching OTP GitHub secret when new_otp_key.txt is present.
  architecture: >
    Add a small runner-owned account policy for reserved specs and a spec-owned
    credential guard for destructive flows. Keep normal specs on the existing
    account shape, but make assignment deterministic by policy rather than sorted
    index. Persist generated credential files locally during artifact download so
    operators can see what changed without relying on screenshot directories.
  data_flow:
    - The orchestrator discovers specs.
    - For each spec, account assignment first checks reserved policy; otherwise it selects from the normal account pool excluding reserved slots.
    - GitHub Actions receives the chosen account as workflow_dispatch input and exposes it as OPENMATES_TEST_ACCOUNT_SOURCE_SLOT.
    - Mutating specs call the isolated-account helper with their policy key and fail closed if the slot is wrong or credentials are missing.
    - Artifact download copies screenshots/reports as before and copies credential-update text files to test-results/credential-updates/<spec>/.
  affected_files:
    - path: scripts/run_tests.py
      reason: Account policy, reserved-slot assignment, and credential-update artifact persistence.
    - path: scripts/tests/test_run_tests_account_policy.py
      reason: Unit coverage for account assignment and credential artifact persistence.
    - path: frontend/apps/web_app/tests/signup-flow-helpers.ts
      reason: Add isolated account resolver/guard for destructive specs.
    - path: frontend/apps/web_app/tests/api-keys-flow.spec.ts
      reason: Use reserved account and safe E2E-only key cleanup.
    - path: frontend/apps/web_app/tests/account-recovery-flow.spec.ts
      reason: Require isolated account for destructive recovery reset.
    - path: frontend/apps/web_app/tests/backup-code-login-flow.spec.ts
      reason: Require isolated account for OTP-rotating backup-code login flow.
    - path: frontend/apps/web_app/tests/backup-codes-settings.spec.ts
      reason: Require isolated account for backup-code reset flow.
    - path: frontend/apps/web_app/tests/recovery-key-login-flow.spec.ts
      reason: Require isolated account for recovery-key regeneration and login flow.
    - path: frontend/apps/web_app/tests/recovery-key-settings.spec.ts
      reason: Require isolated account for recovery-key regeneration flow.
    - path: frontend/apps/web_app/tests/settings-change-email.spec.ts
      reason: Require isolated account for email mutation flow.
    - path: docs/contributing/guides/testing.md
      reason: Document reserved E2E account policy and future-spec requirements.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/e2e-credential-isolation/spec.yml
    - python3 -m pytest scripts/tests/test_run_tests_account_policy.py
    - bash scripts/lint_changed.sh --path docs/specs/e2e-credential-isolation/spec.yml --path scripts/run_tests.py --path scripts/tests/test_run_tests_account_policy.py --path frontend/apps/web_app/tests/signup-flow-helpers.ts --path frontend/apps/web_app/tests/api-keys-flow.spec.ts --path frontend/apps/web_app/tests/account-recovery-flow.spec.ts --path frontend/apps/web_app/tests/backup-code-login-flow.spec.ts --path frontend/apps/web_app/tests/backup-codes-settings.spec.ts --path frontend/apps/web_app/tests/recovery-key-login-flow.spec.ts --path frontend/apps/web_app/tests/recovery-key-settings.spec.ts --path frontend/apps/web_app/tests/settings-change-email.spec.ts --path docs/contributing/guides/testing.md
    - python3 scripts/run_tests.py --suite playwright --dry-run

