schema_version: 2
id: apple-live-chat-accessibility-fixes
title: Apple Live Chat Accessibility And Runtime Fixes
status: implementing

goal: >
  Fix the Apple app regressions found during the July 22 Apple Remote exploratory
  pass so live-account chat sending, recent-chat opening, message accessibility,
  streaming rendering, large chat-list performance, and Finance embed registry
  coverage are deterministic, testable, and safe for iPhone users. The first
  implementation slice should repair the concrete failures without reopening the
  entire Apple parity program or changing backend/API contracts unless a required
  assumption is contradicted by red-phase evidence.

scope:
  in:
    - Apple iOS live-account chat send and assistant response smoke coverage.
    - Apple iOS recent-chat opening for user-owned synced chats with missing in-memory message windows.
    - Stable semantic message accessibility for user, assistant, and system messages.
    - Streaming markdown and accessibility performance for long assistant responses.
    - Apple chat-list merge/sidebar computed-work optimization where needed for live sync scale.
    - Apple Finance `app:finance:check_accounts` embed registry and debug fixture coverage.
    - Deterministic unit/UI/static tests plus Apple Remote verification on iPhone 17 simulator.
  out:
    - Watch UI/runtime changes.
    - A full UIKit/AppKit rewrite of the chat transcript or app shell.
    - Backend, Directus, CLI, SDK, or web behavior changes unless investigation proves the Apple-only contract cannot pass without them.
    - Changing client-side encryption formats, key wrapping, or persisted plaintext boundaries.
    - Adding new Finance provider functionality beyond native registry/debug-fixture/render classification for the existing `check_accounts` skill.
    - Committing private test-account data, real chat IDs, simulator hostnames, local Mac paths, screenshots with private account content, or raw logs.

