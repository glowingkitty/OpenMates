  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials during discovery."
    - "gh issue list --repo glowingkitty/OpenMates --search 'Apple message-user accessibility real account chat opens no messages finance check accounts embed' --state all --limit 20 returned no output."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - apple/AGENTS.md
    - apple/CLAUDE.md
    - .claude/rules/apple-ui.md
    - docs/architecture/apple/parity-matrix.md
    - docs/architecture/apple/sync-parity.md
    - docs/architecture/apple/message-processing-parity.md
    - docs/architecture/apple/responsive-and-next-spec-parity.md
    - docs/specs/apple-chat-streaming-parity/spec.yml
    - docs/specs/apple-chat-opening-parity/spec.yml
    - docs/specs/apple-sync-decryption-performance/spec.yml
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/specs/finance-check-accounts-v1/spec.yml
  code_patterns:
    - apple/OpenMates/Sources/App/MainAppView.swift opens authenticated ChatView with an in-memory initial message window from ChatStore.
    - apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift preloads latest message windows only for the first five startup chats.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift takes the `initialChat` path and calls `loadSyncedChat` even when the provided message window is empty.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift attaches `message-user`, `message-assistant`, and `message-system` identifiers to the MessageBubble wrapper with `.accessibilityElement(children: .contain)`.
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift parses full markdown synchronously in `RichMarkdownView.init` when no stable render document exists.
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift merges chat batches with repeated `firstIndex` scans and stores messages by full chat arrays.
    - apple/OpenMates/Sources/App/MainAppView.swift recomputes filtered pinned/unpinned chat arrays from ChatStore in computed properties.
    - apple/OpenMates/Sources/Core/Models/EmbedModels.swift owns the Apple EmbedType registry and is missing `app:finance:check_accounts`.
  tests:
    - apple/OpenMatesUITests/ChatFlowRealAccountUITests.swift
    - apple/OpenMatesUITests/ChatOpeningScalabilityUITests.swift
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/SettingsFullParityUITests.swift
    - apple/OpenMatesUITests/EmbedRenderingParityUITests.swift
    - scripts/apple_evidence_bundle.py
    - scripts/apple_ui_contracts.py

