scenarios:
  - id: S-1
    title: Sent user message is one semantic message element
    given:
      - Alice is logged into the Apple app on the iPhone simulator with the existing live test account.
    when:
      - Alice sends the prompt `Kyoto and Osaka quick tip test` from the native composer.
    then:
      - The prompt appears visually in the transcript.
      - A `message-user` accessibility element exists and exposes a label or value containing the normalized prompt text.
      - The message element keeps the parity render manifest needed by existing tests.
      - VoiceOver/test traversal does not require walking individual markdown word fragments to identify the message.
  - id: S-2
    title: Assistant streaming remains readable and bounded
    given:
      - A live or seeded assistant response streams a long markdown answer with thinking, bullets, emphasis, and follow-up suggestions.
    when:
      - The native transcript updates during streaming and after completion.
    then:
      - A `message-assistant` accessibility element appears once streaming content is visible.
      - During streaming, the accessibility tree does not expose hundreds of word-fragment static texts for one assistant message.
      - Expensive markdown parsing is throttled, cached, deferred, or temporarily simplified so streaming remains responsive.
      - On completion, the final rendered markdown remains visually equivalent to the stable render-document path.
  - id: S-3
    title: Selecting any recent user chat opens messages or a visible error state
    given:
      - Alice is logged into Apple and opens the chat history sidebar after initial sync completes.
      - The sidebar contains more user-owned chat rows than the in-memory startup prefetch window.
    when:
      - Alice opens row 0, row 1, and row 2 in sequence.
    then:
      - Each selected chat either renders at least one `message-user`, `message-assistant`, or `message-system` element within the timeout, or renders a localized visible error/retry state.
      - ChatViewModel does not treat `initialChat` plus an empty `initialMessages` array as a completed transcript load.
      - The app loads a bounded latest message window from in-memory store, offline store, or existing authenticated REST path without loading/decrypting the full chat history.
  - id: S-4
    title: Chat-list sync remains responsive at live-account scale
    given:
      - Apple receives a large chat batch through startup, offline restore, or phased sync.
    when:
      - The store merges chats and the shell computes sidebar rows.
    then:
      - Batch upsert avoids repeated linear scans over the growing chat list.
      - Sidebar visible pinned/unpinned rows avoid unnecessary repeated filtering/sorting during unrelated message/stream updates.
      - Existing seeded 600-chat and 1000-message UI performance tests continue to pass.
  - id: S-5
    title: Finance check-accounts embeds have Apple registry coverage
    given:
      - The Finance app skill registry exposes `app:finance:check_accounts`.
    when:
      - The Apple embed contract audit runs.
    then:
      - Apple EmbedType classifies `app:finance:check_accounts`.
      - A synthetic debug fixture exists with sanitized account-summary/projected-expense content.
      - The renderer path is classified as native-rendered, supported generic placeholder with reason, or intentionally native-limited; the contract audit passes with no missing key or missing fixture error.

