  parity_expectations:
    - Apple message accessibility identifiers match shared web product concepts and expose stable user-readable labels or values for tests and assistive technology.
    - Opening a synced user chat from the sidebar always reaches a visible transcript state or visible error state; an empty invisible transcript after selecting a row is not acceptable.
    - Streaming assistant output remains visually progressive but does not flood the accessibility tree with word-fragment elements or reparse expensive markdown work on every chunk when a cheaper transient representation can satisfy the streaming state.
    - Apple embed registry/debug fixtures stay in lockstep with currently registered app-skill output surfaces.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py doctor
    - python3 scripts/apple_remote.py verify-ios-startup --simulator "iPhone 17" --duration 60 --fresh-install
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatFlowRealAccountUITests/testPasswordOtpLoginCreatesChatAndReceivesAssistantResponse"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatFlowRealAccountUITests/testPasswordOtpLoginLoadsRecentChatsForWebParityManifest"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatOpeningScalabilityUITests"
    - python3 scripts/apple_evidence_bundle.py --surface all
    - python3 scripts/apple_remote.py cleanup --simulator "iPhone 17"
  intentional_native_differences:
    - Native tests use XCTest/XCUITest and Apple accessibility APIs rather than browser DOM selectors.
    - Apple may use SwiftUI, UIKit, or cached render data for streaming internals as long as product UI, encryption boundaries, and accessibility semantics remain equivalent.

