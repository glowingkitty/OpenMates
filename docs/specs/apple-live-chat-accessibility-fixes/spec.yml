assumptions:
  - id: A-1
    text: The real-account row-2 failure is caused by Apple opening a synced chat with `initialChat` but no in-memory message window, not by backend data loss.
    category: sync
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/App/MainAppView.swift:1536-1545
        summary: Authenticated ChatView receives `initialChat` and `initialMessages` from ChatStore.
      - source: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift:241-243
        summary: ChatViewModel returns through `loadSyncedChat` whenever `initialChat` is present.
      - source: apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift:204-208
        summary: Offline bridge preloads message windows only for the first five startup chats.
  - id: A-2
    text: The live chat-send failure is an accessibility semantics bug rather than failed message send.
    category: accessibility
    required_before: implementation
    status: confirmed
    evidence:
      - source: Apple Remote test output 2026-07-22T01:20Z
        summary: The prompt text and assistant response were visible, but no `message-user` element with prompt label existed.
      - source: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift:3534-3535
        summary: "The message identifier is attached to a wrapper with `.accessibilityElement(children: .contain)`."
  - id: A-3
    text: "`app:finance:check_accounts` is already an approved app-skill output from the Finance spec; this spec only adds missing Apple classification/fixture coverage."
    category: embed_registry
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/specs/finance-check-accounts-v1/spec.yml:487-491
        summary: Finance skill id is `check_accounts` with user-facing name `Check accounts`.
      - source: test-results/apple-evidence/latest-summary.json
        summary: Apple embed contract audit fails only on missing registry key and debug fixture for `app:finance:check_accounts`.
  - id: A-4
    text: No production API, CLI, SDK, or web contract change is required for the first fix slice.
    category: phase_gates
    required_before: task_execution
    status: unchecked
    evidence:
      - source: current investigation
        summary: Confirm during implementation by proving Apple can pass via existing authenticated REST/offline/sync paths.

contracts:
  api:
    - route: Existing authenticated Apple chat REST and WebSocket paths
      access_model: first-party client surface only
      auth: Existing session/device auth used by the native app and live UI tests.
      request: No API shape changes expected.
      response: Existing encrypted chat/message/embed payloads.
      errors:
        - Existing errors must remain visible in native UI/logs with sanitized diagnostics.
    - route: No new public/developer REST API is planned.
      access_model: not_applicable
      auth: not_applicable
      request: not_applicable
      response: not_applicable
      errors: []
  data:
    - Message accessibility label text may contain decrypted visible message text already rendered on screen; it must not be logged to diagnostics or committed artifacts.
    - DEBUG accessibility values may carry sanitized render manifests, but not plaintext private chat IDs, emails, tokens, keys, or hostnames.
    - Empty initial message windows for an existing chat must be treated as incomplete data, not as an empty chat.
    - ChatStore batch merge should preserve server sort order, pinned state, hidden/subchat classification, and existing decrypted metadata.
    - Finance embed fixtures must use synthetic, sanitized account names, balances, and projections only.
  ui_states:
    - Fresh signed-out launch.
    - Password/OTP login using existing test credentials.
    - New chat prompt send and assistant streaming.
    - Recent sidebar row open with populated window.
    - Recent sidebar row open with initially missing message window.
    - Streaming long markdown response before final render document exists.
    - Finance check-accounts embed preview/debug fixture.
    - Error/retry state when message loading fails.
  privacy_security:
    - Never log message plaintext, encryption keys, auth tokens, cookies, push tokens, full share URL fragments, private emails, private hostnames, or local Mac paths.
    - Apple Remote output in specs must be sanitized to command class, test name, failure class, timestamps, and redacted summaries.
    - Client-side encrypted chat/message/embed payloads remain decrypted only inside the first-party Apple client for rendering.
    - No screenshot or fixture generated from a live private account may be committed.

