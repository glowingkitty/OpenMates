implementation_plan:
  spec_path: docs/specs/apple-live-chat-accessibility-fixes/spec.yml
  existing_patterns:
    - Existing ChatFlowRealAccountUITests provide real-account login, send, sync, sidebar, manifest, and redacted credential handling.
    - Existing ChatOpeningScalabilityUITests provide deterministic performance fixture coverage that should stay green.
    - Existing apple_ui_contracts.py embed audit already detects missing registry/fixture keys.
    - Existing ChatHistoryRenderDocument stores stable render documents for final messages and should remain the final-render path.
  architecture: >
    Repair the native chat transcript semantics and missing-data path without
    changing shared backend contracts. Add explicit semantic message accessibility,
    teach ChatViewModel/MainAppView to recover from empty initial message windows,
    reduce streaming markdown/accessibility hot-path work, optimize only the
    measured chat-list merge/sidebar paths, and add the missing Finance embed
    registry/debug fixture classification.
  data_flow:
    - Sidebar row selection passes selected chat metadata and any available bounded latest message window to ChatView.
    - If the initial window is empty for a server-sync chat, ChatViewModel requests a bounded window from ChatStore/OfflineStore or the existing REST path before declaring the transcript loaded.
    - MessageBubble exposes a semantic message element with normalized text label/value plus DEBUG manifest metadata.
    - Streaming assistant chunks update a bounded transient render/accessibility model before final render-document presentation.
    - Finance embed contract audit reads EmbedType and debug fixtures and finds `app:finance:check_accounts` classified.
  affected_files:
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Message accessibility semantics and streaming render path.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Empty initial window fallback and streaming render throttling/caching.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: ChatView initial window handoff and sidebar computed-work optimization.
    - path: apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
      reason: Batch merge and bounded message-window helpers.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Bounded fallback reads if ChatStore lacks messages.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Finance check-accounts EmbedType registry coverage.
    - path: apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
      reason: Finance check-accounts synthetic fixture.
    - path: apple/OpenMatesUITests/ChatFlowRealAccountUITests.swift
      reason: Strengthen assertions and keep red/green live evidence.
    - path: apple/OpenMatesTests/ChatHistoryRenderDocumentTests.swift
      reason: New unit coverage for semantic message elements.
    - path: apple/OpenMatesTests/ChatWindowLoadingTests.swift
      reason: New unit coverage for empty initial window fallback.
    - path: apple/OpenMatesTests/ChatHistoryRenderDocumentTests.swift
      reason: New unit coverage for streaming markdown/accessibility bounds.
    - path: apple/OpenMatesTests/ChatWindowLoadingTests.swift
      reason: New unit coverage for batch merge behavior.
  verification_strategy:
    - Validate this spec before implementation.
    - Add or update the listed unit/UI/static checks in red phase before production code changes.
    - Implement the smallest Apple-only fixes that make each red check pass.
    - Run Apple Remote green checks in dependency order, then cleanup the simulator.
    - Run spec_verify before marking complete.
  verification_order:
    - No REST/API change planned; if contradicted, update this spec with access model and real dev API proof before continuing.
    - No CLI or SDK change planned; if contradicted, update this spec and run parity gates before Apple green evidence.
    - No web Playwright change planned; browser-rendered parity remains the source of truth for visual values but this fix is native-only.
    - Apple unit tests first for semantics, fallback, streaming, and batch behavior.
    - Apple UI tests second for live-account chat send and recent-chat opening.
    - Static Apple evidence bundle third for embed registry and parity guardrails.
    - Regression Apple UI suites last for startup, settings, composer, and scalability.

