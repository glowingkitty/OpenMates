id: anonymous-streaming-ui
title: Anonymous Streaming UI Parity
status: draft

goal: >
  Make unauthenticated anonymous chat use the same frontend messaging pipeline,
  streaming lifecycle, animations, pre-processing, main response rendering,
  post-processing, sidebar metadata, and embed behavior as authenticated chat,
  while billing a virtual anonymous budget instead of a user credit balance.

scope:
  in:
    - Official-cloud web anonymous text chat uses the same frontend UI event contract as authenticated chat.
    - Anonymous responses stream progressively through the same `aiTaskInitiated`, `aiTypingStarted`, `aiMessageChunk`, and completion lifecycle consumed by `ActiveChat` and `ChatHistory`.
    - Anonymous pre-processing, response rendering, status overlays, rainbow typing animation, thinking UI, embed parsing, code previews, fullscreen embeds, title/category/icon metadata, follow-up suggestions, and post-processing UI match authenticated chat unless the spec names an explicit difference.
    - Separate backend anonymous endpoint and budget service remain allowed, but the endpoint must produce or be adapted into the same frontend streaming event shape.
    - Anonymous chat, message, metadata, PII mappings, drafts, and embeds remain encrypted locally and are not persisted server-side before signup.
    - Anonymous charges are recorded against virtual anonymous accounting: per-anonymous local identity daily cap, per-IP daily cap, global daily cap, global weekly cap, and global monthly budget/usage accounting.
    - Anonymous requests never debit or grant a regular authenticated user credit balance.
    - Anonymous user-created chats appear before intro/example/legal chats and render their hydrated category/icon gradient correctly in the sidebar and navigation order.
    - Existing anonymous chats can be promoted after signup through the existing encrypted account sync path.
    - Web, backend, and Apple parity verification are required because the anonymous chat surface exists in all clients.
  out:
    - Anonymous file upload before signup.
    - Anonymous connected-account skills, memories, reminders, notifications, teams, sharing, billing settings, exports, or server-side durable chat sync before signup.
    - Replacing the authenticated WebSocket pipeline or rewriting `ActiveChat` wholesale.
    - Server-side storage of anonymous prompts, responses, embed content, or encrypted anonymous chat blobs before signup.
    - Strong fraud prevention beyond local anonymous ID, HMAC IP hash, rate limits, and global/per-identity budgets.
    - Retrofitting full anonymous parity into CLI and Apple UI in the first web implementation slice, except that backend/API contracts must not make native parity impossible.

