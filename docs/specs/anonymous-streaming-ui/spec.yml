implementation_plan:
  existing_patterns:
    - Authenticated web chat already uses `chatSyncService.sendNewMessage`, backend WebSocket/Celery processing, `aiTypingStarted`, `aiMessageChunk`, and `ActiveChat.handleAiMessageChunk`.
    - Anonymous chat currently uses `anonymousChatStorage.sendTextMessage`, HTTP final JSON, and `ActiveChat.handleAnonymousAssistantMessage`.
    - "`ActiveChat.handleAiMessageChunk` already skips `sendCompletedAIResponse` for `currentChat.is_anonymous`, but it still needs anonymous-safe local persistence."
    - Anonymous storage already encrypts local chat/message metadata and strips plaintext fields before IndexedDB persistence.
    - The Apple app has a separate native anonymous service that must remain compatible with backend changes.
  architecture: >
    Keep anonymous eligibility, transport, and virtual budget accounting separate, but remove the separate anonymous UI reducer. Add a small transport adapter that turns anonymous backend stream events into the same frontend AI lifecycle events consumed by ActiveChat. Extract or parameterize message persistence so ActiveChat streaming saves anonymous chunks through anonymous encrypted storage instead of raw chatDB plaintext writes. Treat anonymous generated embeds as local anonymous embed records or self-contained fallback payloads so preview/fullscreen does not require authenticated recovery.
  data_flow:
    - MessageInput calls handleSend for both authenticated and anonymous users.
    - Anonymous eligibility creates or loads an anonymous encrypted local chat and dispatches the same local sendMessage event as authenticated chat.
    - Anonymous transport reserves virtual budget and starts inference via a streaming endpoint or stream-compatible adapter.
    - The adapter emits aiTaskInitiated, aiTypingStarted, aiMessageChunk, and aiTaskEnded with the same payload semantics as authenticated chat.
    - ActiveChat.handleAiMessageChunk updates ChatHistory and persists chunks through a chat-storage adapter selected by chat type.
    - Anonymous post-processing metadata and embeds are encrypted locally and hydrated before sidebar rendering.
    - Usage finalization charges virtual local identity, IP identity, global daily, global weekly, and global monthly counters exactly once.
  affected_files:
    - path: backend/core/api/app/routes/anonymous.py
      reason: Anonymous endpoint must stream or expose stream-compatible events and finalize virtual budget usage correctly.
    - path: backend/core/api/app/services/anonymous_free_usage_service.py
      reason: Budget accounting must include reconcilable monthly usage and deterministic drift checks.
    - path: backend/tests/test_anonymous_free_usage_budget.py
      reason: Contract tests for daily/weekly/monthly virtual budget reconciliation.
    - path: backend/tests/test_anonymous_skill_access.py
      reason: Route-level streaming and anonymous-safe skill gating tests.
    - path: frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
      reason: Anonymous send should dispatch into the same lifecycle as authenticated send after local anonymous eligibility/storage setup.
    - path: frontend/packages/ui/src/services/anonymousChatStorage.ts
      reason: Anonymous encrypted local storage and hydration need to support streaming chunks and local embeds.
    - path: frontend/packages/ui/src/services/chatSyncServiceHandlersAI.ts
      reason: Reuse or expose event-shaping helpers for anonymous stream events without duplicating reducer logic.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Replace anonymous final-message handler with shared streaming path and chat-type-aware persistence.
    - path: frontend/packages/ui/src/components/chats/Chat.svelte
      reason: Hydrate anonymous metadata through anonymous storage before rendering category/icon gradient.
    - path: frontend/packages/ui/src/components/chats/Chats.svelte
      reason: Sort anonymous user-created chats before public chats for logged-out users.
    - path: frontend/packages/ui/src/services/embedResolver.ts
      reason: Anonymous local embeds must open without authenticated recovery.
    - path: frontend/apps/web_app/tests/anonymous-free-chat.spec.ts
      reason: End-to-end web parity coverage.
    - path: apple/OpenMates/Sources/Core/Services/AnonymousFreeUsageService.swift
      reason: Potential native compatibility updates for backend anonymous stream contract.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/anonymous-streaming-ui/spec.yml
    - python3 -m pytest backend/tests/test_anonymous_free_usage_budget.py
    - python3 -m pytest backend/tests/test_anonymous_skill_access.py
    - python3 scripts/run_tests.py --suite vitest
    - python3 scripts/run_tests.py --spec anonymous-free-chat.spec.ts
    - python3 scripts/run_tests.py --spec chat-scroll-streaming.spec.ts
