risks:
  - Streaming anonymous responses can accidentally persist plaintext if ActiveChat continues using raw chatDB writes for anonymous chunks.
  - Backend streaming contract changes can break Apple unless compatibility or native updates land in the same deployment.
  - Monthly budget accounting is currently less explicit than daily/weekly usage; implementation must avoid silent drift by adding or documenting a reconcilable monthly ledger.
  - Reusing authenticated pre-processing must not allow anonymous file bytes, connected-account data, memories, or account-only context to leave the browser.
  - E2E mocks can hide real streaming regressions unless at least one test observes multiple chunks before final completion.

open_questions:
  - Should the implementation add an explicit `monthly_used_credits` field, or define monthly remaining as the sum of finalized reservations in the current monthly window plus open reservations?
  - Should the first implementation slice use true backend streaming immediately, or use a stream-event adapter over a final JSON response as a temporary bridge while preserving the frontend event/reducer contract?
