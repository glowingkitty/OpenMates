schema_version: 2
id: workflow-app-skill-expansion
title: Workflow App Skill Expansion
status: approved

goal: >
  Expand Workflows from the initial five app-skill actions to every implemented
  public app skill that can safely run server-side without connected-account
  credentials, client-side encrypted user data, or uploaded/embed input files.
  Prove the expanded surface with real step tests first, then twenty realistic
  enabled workflows that run through near-future schedule triggers, and add real
  npm and pip SDK tests against the dev server.

scope:
  in:
    - Explicit workflow eligibility classification for every public non-internal app skill.
    - Workflow availability for implemented app skills that do not require connected accounts, client-side encrypted data, uploaded files, or existing embed/file inputs.
    - High-cost, async, generation, and sandboxed execution skills when they can run from plain workflow input, with test count and cost bounded to one or two real executions per paid skill.
    - Capability metadata including effect, execution mode, unattended eligibility, approval policy, binding requirements, output schema, and test example input.
    - YAML validation and capability help that fail closed for unclassified, connected-account, client-encrypted, file/embed-input, or unsupported async skills.
    - Step-test verification before full scheduled workflow verification.
    - Twenty realistic workflows using near-future schedule triggers, real dev-server execution, retained run output inspection, and cleanup.
    - Real npm SDK and pip SDK workflow tests against https://api.dev.openmates.org after CLI evidence is green.
  out:
    - Connected-account skills, including calendar and mail skills.
    - Skills that read or mutate client-side encrypted user data, including tasks.create, tasks.search, reminders, private memories, private projects, and private chat/history search.
    - File or existing embed input skills, including PDF read/search/view, audio transcription from uploaded audio, and image vectorization from an existing source image.
    - Offline/private encrypted task search design and server-side task creation encryption changes.
    - New web editor UI beyond showing metadata already returned by existing capability/help APIs.
    - Apple workflow parity for this expansion slice.
    - Public workflow marketplace changes.

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials, so issue discovery could not be completed through MCP. Existing workflow specs record the same credential failure."
  docs:
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/workflows-cli-runtime/spec.yml
    - docs/specs/workflows-sdk-runtime/spec.yml
    - docs/specs/anonymous-free-usage-budget/spec.yml
    - docs/specs/tasks-main-processor-tools/spec.yml
    - docs/architecture/apps/app-skills.md
    - docs/architecture/apps/function-calling.md
    - docs/architecture/core/security.md
    - docs/architecture/core/client-side-encryption.md
    - docs/contributing/guides/spec-driven-development.md
  code_patterns:
    - backend/core/api/app/services/workflow_capability_registry.py derives workflow capabilities from app.yml metadata and currently accepts execution_mode sync or workflow_ai plus effects read, notify, and chat_write.
    - backend/core/api/app/services/workflow_app_skill_adapter.py dispatches workflow app-skill nodes through SkillRegistry and normalizes weather/news/web-like outputs.
    - backend/core/api/app/services/workflow_yaml_compiler.py supports generic use_app_skill steps but currently hardcodes enable-readiness checks only for weather.forecast and news.search.
    - backend/apps/calendar/skills/*.py require connected_account_access_tokens and must remain unavailable for this scope.
    - backend/apps/mail/skills/search_skill.py uses connected-account/local connector execution and must remain unavailable for this scope.
    - backend/apps/tasks/skills/search_skill.py explicitly waits for a capable client because task content is client-side encrypted; tasks are deferred.
    - backend/apps/tasks/skills/create_skill.py currently stages client-encrypted durable persistence; task creation is deferred until a workflow-safe encrypted persistence contract exists.
    - backend/apps/reminder/skills/*.py read/write private reminder data and are deferred with the broader client-side encrypted/private-data action design.
    - frontend/packages/openmates-cli/src/cli.ts exposes workflow validate/create/update/run/step-test/runs/run-show/capabilities/help-app commands.
    - frontend/packages/openmates-cli/src/sdk.ts and packages/openmates-python/openmates/sdk.py expose workflow SDK facades over the same API routes.
  tests:
    - backend/tests/test_workflow_capability_metadata.py
    - backend/tests/test_workflow_app_skill_adapter.py
    - backend/tests/test_workflow_runner.py
    - backend/tests/test_workflow_step_test.py
    - backend/tests/test_workflow_yaml_validation.py
    - frontend/apps/web_app/tests/cli-workflows-step-test-real.spec.ts
    - frontend/apps/web_app/tests/cli-workflows-rain-real.spec.ts
    - frontend/apps/web_app/tests/cli-workflows-schedule-real.spec.ts
    - frontend/packages/openmates-cli/tests/sdk-workflows.test.ts
    - packages/openmates-python/tests/test_workflows.py

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This expansion changes backend workflow metadata/runtime, CLI verification, and SDK verification only.
    - Apple may consume the expanded capability list later, but no native UI or native workflow authoring work is part of this slice.
  verification:
    - Apple verification is not required for this spec.
  intentional_native_differences:
    - Apple remains behind CLI and SDK workflow capability expansion until a later parity spec.

clarification:
  rounds:
    - question: Should all other app skills include high-cost/async generation and sandboxed execution skills?
      answer: Yes, include those too, but limit tests for each paid skill to one or two real executions.
    - question: Should file/embed-input skills such as PDF read/search/view and image vectorization from existing source images be included now?
      answer: Exclude those for now.
    - question: Should verification use only step tests, or full workflow runs too?
      answer: First test steps, then run twenty real-life workflows with scheduled time triggers close enough that results are visible quickly.
  vision_summary: >
    Workflows should support every app skill that can run safely from plain
    server-side workflow input. Skills needing connected accounts, client-side
    encrypted data, or uploaded/embed inputs are explicitly deferred, including
    task create/search for now, while the implemented expansion proves real CLI
    and SDK behavior against dev with bounded paid-skill usage.
  approved_by_user: true

implementation_state:
  subject_commit: working-tree@40fd74deb

