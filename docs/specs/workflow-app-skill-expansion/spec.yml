scenarios:
  - id: S-1
    title: All public skills have explicit workflow classification
    given:
      - The repository contains app metadata under backend/apps/*/app.yml.
    when:
      - The workflow capability metadata audit runs.
    then:
      - Every public non-internal skill has a workflow block or a stable workflow unavailable reason.
      - Missing classification fails the audit.
      - Connected-account, client-encrypted, file/embed-input, unsupported async, and unimplemented skills fail closed with explicit reasons.

  - id: S-2
    title: Non-connected plain-input app skills appear as workflow capabilities
    given:
      - Alice is paired with the CLI on the dev server.
      - platform:workflows is enabled for the test account.
    when:
      - Alice runs openmates workflows capabilities --json.
    then:
      - Initial capabilities still include ai.ask, events.search, news.search, weather.forecast, and web.search.
      - Newly eligible skills such as math.calculate, web.read, videos.search, videos.get_transcript, travel.search_connections, travel.search_stays, maps.search, shopping.search_products, nutrition.search_recipes, images.generate, music.generate, models3d.generate, videos.generate, videos.create, code.get_docs, code.search_repos, and code.run are listed when their metadata and runtime adapters are complete.
      - Excluded skills are visible only as disabled capability records or deterministic audit rows with stable reasons.

  - id: S-3
    title: Workflow YAML can author expanded app-skill steps
    given:
      - Alice writes a workflow YAML using math.calculate, travel.search_connections, and send_chat_message.
    when:
      - Alice validates and creates the workflow from YAML.
    then:
      - The server accepts the generic use_app_skill steps based on capability metadata.
      - Enable readiness validates required fields from each skill schema rather than from a hardcoded weather/news list.
      - Help diagnostics point to openmates workflows help-app <app.skill> for missing required inputs.

  - id: S-4
    title: Step tests prove every enabled capability before full workflows
    given:
      - Alice has a disabled workflow containing one step for each newly enabled workflow capability.
    when:
      - Alice runs openmates workflows step-test for every step.
    then:
      - Each real app skill executes through the workflow app-skill adapter.
      - Paid skills run no more than one or two real step tests each.
      - Each step-test run is retained with node id, status, output summary, provider when available, credits when charged, and a clear error if the provider fails.

  - id: S-5
    title: Twenty realistic scheduled workflows execute on the dev server
    given:
      - Alice has twenty enabled workflows with near-future schedule triggers.
      - Each workflow combines one or more eligible app skills with decisions, wait/control steps, chat delivery, or notifications where useful.
    when:
      - The scheduler claims due triggers on https://api.dev.openmates.org.
    then:
      - Every workflow creates exactly one version-pinned accepted run for the scheduled occurrence.
      - Each run reaches completed, waiting, or a documented provider-failure status within the test timeout.
      - Run output contains inspectable node summaries for every executed app-skill step.
      - Workflows and temporary artifacts are cleaned up after the test run.

  - id: S-6
    title: Real npm SDK workflow execution works against dev
    given:
      - Alice has an approved SDK API key for the dev server.
    when:
      - The npm SDK real workflow test creates, enables, step-tests, runs, polls, inspects, and deletes workflows on https://api.dev.openmates.org.
    then:
      - The SDK uses the public workflow API, not mocked transport.
      - At least one expanded non-initial capability executes through the npm SDK path.
      - Run detail exposes retained node output.

  - id: S-7
    title: Real pip SDK workflow execution works against dev
    given:
      - Alice has an approved SDK API key for the dev server.
    when:
      - The pip SDK real workflow test creates, enables, step-tests, runs, polls, inspects, and deletes workflows on https://api.dev.openmates.org.
    then:
      - The SDK uses the public workflow API, not monkeypatched requests.
      - At least one expanded non-initial capability executes through the pip SDK path.
      - Run detail exposes retained node output.

  - id: S-8
    title: Deferred private-data skills fail closed
    given:
      - Alice asks for workflow capabilities for tasks, reminders, calendar, mail, PDF, audio transcription from uploaded audio, or image vectorization from an existing source image.
    when:
      - The CLI validates a workflow using one of those deferred skills.
    then:
      - Validation fails before enablement or execution with a stable unavailable reason.
      - No connected-account token, client-side encrypted task/reminder/chat content, or uploaded file content is read by the workflow runtime.

