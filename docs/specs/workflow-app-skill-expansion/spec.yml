decisions:
  - id: D-1
    status: active
    decision: Every public app skill must declare an explicit workflow classification after this spec.
    reason: Missing metadata must fail deterministic audits instead of relying on provider-name inference.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-2
    status: active
    decision: Connected-account and client-side encrypted data skills remain unavailable in this slice.
    reason: They need separate binding, permission, encryption, and connected-client contracts before unattended workflows can use them safely.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-3
    status: active
    decision: Async and paid skills are in scope but receive bounded real verification.
    reason: The product goal is broad workflow support, while verification must avoid runaway cost and runtime.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-4
    status: active
    decision: Step tests must pass before twenty full scheduled workflows are executed.
    reason: Step tests isolate app-skill failures and keep the full workflow matrix easier to diagnose.
    decided_at: "2026-07-19T00:00:00Z"
  - id: D-5
    status: active
    decision: Real SDK evidence is required against https://api.dev.openmates.org.
    reason: Mocked SDK transport tests prove method shapes only; this expansion needs real SDK workflow execution proof.
    decided_at: "2026-07-19T00:00:00Z"

