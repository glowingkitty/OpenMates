assumptions:
  - id: A-1
    text: SkillRegistry dispatch remains the single workflow app-skill execution boundary.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/services/workflow_app_skill_adapter.py
        summary: WorkflowAppSkillAdapter resolves the global SkillRegistry and calls dispatch_skill for app_skill_action nodes.
  - id: A-2
    text: App metadata is the right source for workflow eligibility, but current metadata is incomplete for most skills.
    category: metadata
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/services/workflow_capability_registry.py
        summary: Capabilities already derive from app.yml workflow blocks and fail closed when workflow metadata is missing.
  - id: A-3
    text: Tasks and task search are client-side encrypted/private-data flows and are intentionally deferred.
    category: privacy
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/apps/tasks/skills/search_skill.py
        summary: Task search creates a pending client search request and explicitly has no server metadata fallback.
      - source: backend/apps/tasks/skills/create_skill.py
        summary: Task creation stages client-encrypted durable persistence and marks pending_client_persistence.
  - id: A-4
    text: Calendar and mail require connected-account execution and are intentionally deferred.
    category: connected_accounts
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/apps/calendar/skills/get_events_skill.py
        summary: Calendar skills require connected_account_access_tokens.
      - source: backend/apps/mail/skills/search_skill.py
        summary: Mail search uses connected account and local connector execution paths.
  - id: A-5
    text: Real dev-server SDK tests need an approved dev SDK API key in the local environment.
    category: verification
    required_before: task_execution
    status: confirmed
    evidence:
      - source: scripts/sdk_cli_parity_live_smoke.py
        summary: Reused the existing settings-session pending-device approval pattern for temporary npm and pip SDK devices, then revoked the temporary API key after verification.

contracts:
  capability_metadata:
    availability_values:
      - available_true_for_plain_server_side_skill
      - unavailable_connected_account_required
      - unavailable_client_encrypted_data_required
      - unavailable_file_or_embed_input_required
      - unavailable_async_runtime_not_ready
      - unavailable_unimplemented_or_metadata_invalid
    required_enabled_fields:
      - available
      - execution_mode
      - effect
      - unattended
      - approval
      - binding_requirements
      - test_allowed
      - test_example_input
      - output_schema
    allowed_execution_modes:
      - sync
      - workflow_ai
      - async_job
      - sandbox
    allowed_effects:
      - read
      - notify
      - chat_write
      - generate
      - compute
      - code_execution
    blocked_reasons:
      connected_account_required: Skill needs OAuth, provider account tokens, local connector credentials, or connected-account permission continuation.
      client_encrypted_data_required: Skill needs private encrypted user data or writes durable client-encrypted user data.
      file_or_embed_input_required: Skill needs uploaded bytes, local file paths, or existing embed/file references.
      workflow_runtime_unsupported: Skill needs async/job behavior that has not yet been implemented safely.
      workflow_metadata_invalid: Skill metadata is incomplete or inconsistent.
  yaml:
    - use_app_skill remains the authoring form for expanded app skills.
    - Enable readiness validates required fields from the selected capability input schema.
    - Test example inputs are allowed only for step-test execution and never satisfy production readiness.
    - Unavailable capability diagnostics include app id, skill id, reason code, and help command.
  cli:
    - command: openmates workflows capabilities --json
      behavior: Lists enabled and unavailable app-skill capabilities with stable metadata and reasons.
    - command: openmates workflows help-app <app.skill> --json
      behavior: Shows input schema, output schema, cost metadata, execution mode, effect, example input, and unavailable reason.
    - command: openmates workflows step-test <workflow-id> <step-id> --yes --json
      behavior: Executes one real selected app-skill action through the dev server and records an inspectable step_test run.
    - command: openmates workflows run <workflow-id> --idempotency-key <key> --json
      behavior: Accepts and executes enabled workflows only; scheduled proof primarily comes through due-trigger scanning.
  sdk:
    - npm and pip real tests use API-key auth against https://api.dev.openmates.org.
    - SDK tests create uniquely named workflows, run bounded step/full tests, poll run detail, inspect node output, and delete created workflows.
    - Mocked SDK transport tests remain supplemental and do not satisfy this spec.
  privacy_security:
    - Workflow runtime must not request connected-account access tokens for excluded skills.
    - Workflow runtime must not read client-side encrypted tasks, reminders, chats, memories, or uploaded file content for excluded skills.
    - Test output records must redact secrets, private account identifiers, raw provider tokens, and private user data.
    - Paid skill tests must be bounded in count and input size.

