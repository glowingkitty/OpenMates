implementation_plan:
  spec_path: docs/specs/workflow-app-skill-expansion/spec.yml
  existing_patterns:
    - backend/core/api/app/services/workflow_capability_registry.py metadata-derived capability discovery
    - backend/core/api/app/services/workflow_app_skill_adapter.py generic SkillRegistry dispatch
    - backend/core/api/app/services/workflow_yaml_compiler.py YAML compilation and readiness diagnostics
    - frontend/packages/openmates-cli/src/cli.ts workflow CLI command surface
    - frontend/packages/openmates-cli/src/sdk.ts npm SDK workflow facade
    - packages/openmates-python/openmates/sdk.py pip SDK workflow facade
  architecture: >
    Keep the workflow runtime generic and expand skill support through explicit
    app metadata plus deterministic audits. Add only minimal adapter behavior for
    output normalization and async/sandbox result visibility; do not create
    app-specific branches in the runner for each skill.
  data_flow:
    - App metadata declares workflow eligibility and examples.
    - Capability registry validates metadata and exposes enabled or unavailable records.
    - YAML compiler validates use_app_skill steps against capability metadata.
    - Runner dispatches app_skill_action through WorkflowAppSkillAdapter and SkillRegistry.
    - Run content is retained through existing workflow encrypted run-content storage.
    - CLI and SDK tests call the real dev API and inspect run detail.
  affected_files:
    - path: backend/apps/*/app.yml
      reason: Add workflow availability or unavailable reason metadata.
    - path: backend/core/api/app/services/workflow_capability_registry.py
      reason: Support expanded execution modes/effects and unavailable reason validation.
    - path: backend/core/api/app/services/workflow_yaml_compiler.py
      reason: Schema-driven readiness and unavailable capability diagnostics.
    - path: backend/core/api/app/services/workflow_app_skill_adapter.py
      reason: Generic output normalization for expanded skills.
    - path: backend/tests/test_workflow_capability_metadata.py
      reason: Metadata audit contracts.
    - path: backend/tests/test_workflow_app_skill_adapter.py
      reason: Adapter output contracts.
    - path: backend/tests/test_workflow_yaml_validation.py
      reason: YAML readiness contracts.
    - path: backend/tests/test_workflow_deferred_contracts.py
      reason: Deferred-skill fail-closed contracts.
    - path: scripts/audit_workflow_capabilities.py
      reason: Deterministic all-skill workflow classification audit.
    - path: scripts/workflow_capability_real_test.py
      reason: Real dev capability CLI proof.
    - path: scripts/workflow_app_skill_step_tests_real.py
      reason: Real dev step-test proof for every capability.
    - path: scripts/workflow_twenty_real_workflows_test.py
      reason: Real dev twenty scheduled workflow proof.
    - path: scripts/workflow_chained_real_test.py
      reason: Real dev trigger-to-skill-to-skill-to-chat/notification proof.
    - path: frontend/packages/openmates-cli/tests/workflows-real-sdk-dev.test.ts
      reason: Real npm SDK dev-server proof.
    - path: packages/openmates-python/tests/test_workflows_real_dev.py
      reason: Real pip SDK dev-server proof.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/workflow-app-skill-expansion/spec.yml
    - Run red backend audit/tests before implementation.
    - Run green backend audit/tests after implementation.
    - Restart affected local Docker services before real dev-server tests.
    - Run real CLI capability test, then real CLI step tests, chained workflow proof, then twenty scheduled workflow runs.
    - Run real npm SDK and pip SDK tests against https://api.dev.openmates.org.
    - Run python3 scripts/audit_sdk_cli_parity.py if SDK/CLI method surfaces change.
    - python3 scripts/spec_verify.py docs/specs/workflow-app-skill-expansion/spec.yml
  verification_order:
    - Backend metadata/unit contracts first.
    - Real CLI capability and step-test proof against dev server second.
    - Twenty real scheduled workflows against dev server third.
    - Real npm and pip SDK proof against dev server fourth.
    - GitHub Actions or daily-test wiring only after local real dev evidence is green.
    - Web and Apple are out of scope for this spec.

