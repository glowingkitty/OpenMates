id: pcb-schematic-embed
title: PCB Schematic Atopile Embed
status: draft

goal: >
  Add a first-class Electronics/PCB schematic embed that renders assistant-written
  atopile source using the existing code-code preview/fullscreen visual system,
  lets users compile the schematic in an isolated E2B sandbox from fullscreen,
  and exposes downloadable KiCad/project artifacts after a successful build.
  The assistant should receive concise, current atopile guidance only when PCB
  schematic generation is relevant, with the existing code.get_docs skill made
  available for complex designs that need official documentation lookup before
  code is written.

scope:
  in:
    - Add a direct embed type for PCB schematics under the existing Electronics app metadata, backed by assistant-generated atopile code blocks.
    - Detect `atopile`, `ato`, and `pcb_schematic` fenced code blocks from the AI response stream and store them as PCB schematic embeds instead of generic code-code embeds.
    - Render the PCB schematic preview and fullscreen source panes with the same syntax highlighting, line gutter, typography, spacing, PII masking behavior, and responsive code-view styles used by `code-code` embeds.
    - Add a fullscreen `Prepare PCB files` action that compiles the stored atopile project in E2B, shows high-level status by default, hides detailed logs behind `Show logs`, and produces downloadable KiCad/project artifacts.
    - Pin E2B compilation to the current latest installable atopile version and require the compressed instruction source docs to use the same atopile version number.
    - Use current official atopile docs as the source for compressed atopile instructions, including language syntax, compiler/build workflow, components, packages, project structure, layout constraints, manufacturing export, and changelog notes.
    - Gate atopile instructions through existing embed-type instruction injection so they are loaded only when the preprocessor marks PCB schematic embeds as relevant.
    - Ensure `code.get_docs` can be preselected or made available when a PCB schematic task appears complex enough to need current docs research before code generation.
    - Create an OpenMates CLI chat from natural-language PCB schematic requests to prove the real assistant flow creates and compiles the embed, then promote the confirmed chat to an example chat and verify it renders in the deployed web app.
    - Add backend, frontend, registry, i18n, and deterministic tests that prove parsing, instruction gating, E2B compile security, download artifact metadata, and UI behavior.
  out:
    - Full PCB autorouting, high-speed routing validation, RF/DDR/PCIe/USB4 sign-off, or manufacturability sign-off.
    - Direct untrusted atopile compilation in the OpenMates API container, Celery worker filesystem, or browser.
    - Sending design files to third-party PCB quote/manufacturing providers.
    - A full KiCanvas/KiCad visual schematic or PCB viewer in this first slice.
    - Editing generated atopile code inside the embed and persisting edits as a new version, unless already supported by generic embed diff/version flows.
    - Apple native parity renderer in the first web/backend slice; Apple must not crash on the new embed type and can render a generic/fallback state until a follow-up parity task.

