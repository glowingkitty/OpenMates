implementation_plan:
  existing_patterns:
    - Use docs direct embed model from `backend/apps/docs/app.yml`, `stream_consumer.py`, and `EmbedService.create_document_embed_placeholder` as the direct-embed reference.
    - Use `code-code` source rendering from `CodeEmbedPreview.svelte`, `CodeEmbedFullscreen.svelte`, `codeHighlighting.ts`, and `codeEmbedContent.ts` as the visual and behavior contract.
    - Use E2B provider patterns from `backend/shared/providers/e2b_code_runner.py`, `backend/apps/code/tasks/run_code_task.py`, and E2B tests.
    - Use app instruction gating from `main_processor.py` `instruction_def.for_embed_types` and `PREVIEW_TO_EMBED_TYPE` normalization.
  architecture: >
    Add an Electronics-owned PCB schematic direct embed that stores atopile source as private embed
    content and renders it through shared code-view primitives. A PCB-specific
    compile API creates an E2B sandbox job, builds an isolated atopile project,
    stores logs/artifacts through existing secure storage, and updates compile
    metadata consumed by fullscreen. App instructions remain lightweight by
    default and are injected only when `pcb_schematic` relevance is detected;
    complex cases make `code.get_docs` available for current official docs lookup.
    The E2B compiler pin and docs-derived instruction summary must record the
    same atopile version, currently targeted at `0.15.7`.
  data_flow:
    - Preprocessor identifies PCB schematic relevance and optionally complex-docs-needed relevance.
    - Main processor injects compressed atopile instructions and makes `code.get_docs` available when needed.
    - Assistant streams an `atopile`/`ato` fenced block.
    - Stream consumer creates a `pcb_schematic` direct embed and replaces the visible block with a JSON embed ref.
    - Preview/fullscreen resolve and decode the embed, rendering source via shared code view utilities.
    - User clicks `Prepare PCB files`.
    - Backend validates ownership and queues/runs an E2B compile job.
    - E2B creates project files with pinned atopile, runs install/sync/build/export commands, returns logs and artifacts.
    - Backend stores artifact manifest and secure refs, then fullscreen updates status/download actions.
  affected_files:
    - path: backend/apps/electronics/app.yml
      reason: Register Electronics-owned embed type and official-docs-based gated instructions.
    - path: backend/apps/ai/processing/preprocessor.py
      reason: Ensure `pcb_schematic` and complex docs lookup signals are expressible/validated.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Map `pcb_schematic` preview relevance to schematic embed instructions and code.get_docs availability.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Detect atopile fences and create PCB schematic embeds.
    - path: backend/core/api/app/services/embed_service.py
      reason: Create/update PCB schematic embed content and compile metadata.
    - path: backend/core/api/app/routes/electronics_pcb_schematic.py
      reason: Compile/status/artifact download API routes.
    - path: backend/shared/providers/e2b_pcb_schematic_compiler.py
      reason: Pure E2B provider wrapper for atopile project build and artifact collection.
    - path: frontend/packages/ui/src/components/embeds/electronics/PcbSchematicEmbedPreview.svelte
      reason: PCB branded preview using shared code rendering primitives.
    - path: frontend/packages/ui/src/components/embeds/electronics/PcbSchematicEmbedFullscreen.svelte
      reason: PCB fullscreen source view and prepare-files compile UI.
    - path: frontend/packages/ui/src/services/pcbSchematicCompileService.ts
      reason: Frontend API/stream/status helper for prepare-files.
    - path: frontend/packages/ui/src/i18n/sources/embeds.yml
      reason: PCB schematic labels/actions/status strings.
    - path: frontend/packages/ui/src/tokens/sources/gradients.yml
      reason: Add/verify Electronics/PCB app gradient only if the existing Electronics token is insufficient.
    - path: frontend/packages/ui/static/icons/pcbdesign.svg
      reason: Reuse or add solid mask-compatible PCB icon.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/pcb-schematic-embed/spec.yml
    - python3 -m pytest backend/tests/test_code_block_detection.py
    - python3 -m pytest backend/tests/test_app_skills.py
    - python3 -m pytest backend/tests/test_pcb_schematic_compile.py
    - python3 scripts/run_tests.py --suite vitest
    - Deploy to dev, wait for Vercel Ready, then `python3 scripts/run_tests.py --spec pcb-schematic-embed.spec.ts`.
    - Create an OpenMates CLI natural-language PCB schematic chat, confirm the embed and compile behavior, promote that chat with the add-example-chat workflow after deploy, then verify the example chat renders in the web app.
  verification_order:
    - Backend/unit red phase first.
    - Frontend vitest/build red phase second.
    - Implementation.
    - Backend/unit green phase.
    - Frontend vitest/build green phase.
    - OpenMates CLI natural-language chat green phase.
    - Deploy to dev.
    - Playwright green phase on `app.dev.openmates.org`.
    - Promote confirmed CLI chat to an example chat and verify the deployed web example chat rendering.
    - Apple status/build only if native/shared generated Apple inputs change.

