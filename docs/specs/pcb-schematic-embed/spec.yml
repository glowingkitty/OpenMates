risks:
  - risk: Atopile CLI, package registry, or KiCad dependencies may be heavy or slow in fresh E2B sandboxes.
    mitigation: Cache nothing sensitive; bound runtime; capture package/install timing; consider a pinned E2B template in a follow-up if cold starts are too slow.
  - risk: Official atopile syntax changes again and the compressed summary becomes stale.
    mitigation: Store source URLs/version/date in app metadata, include changelog in update process, add a deterministic compiler/docs version-match check, and make code.get_docs available for complex tasks.
  - risk: Generated KiCad artifacts can be large.
    mitigation: Enforce max artifact sizes and prefer a single zip plus typed manifest.
  - risk: Users may misinterpret compile success as electrical correctness.
    mitigation: UI warning and assistant instruction state compile only checks project/build viability, not expert sign-off.
  - risk: Duplicating code-code styles would drift.
    mitigation: Reuse or extract shared code source rendering primitives instead of copying CSS blocks.

open_questions:
  - Exact matching docs source for `atopile==0.15.7` must be verified before implementation; the current public docs index discovered during planning advertises `atopile-0.14.x`.
  - When `Show logs` is clicked, should the first slice use SSE/WebSocket live streaming or polling-based log chunk refresh?
  - Which exact manufacturing artifacts are guaranteed by the first compile command versus best-effort when atopile/KiCad outputs them?
