implementation_plan:
  spec_path: docs/specs/business-company-financials/spec.yml
  existing_patterns:
    - backend/apps/weather/app.yml for sync read skill workflow metadata
    - backend/apps/news/app.yml for search/read app-skill metadata and output shape
    - backend/shared/providers/iconify/client.py for pure public-provider wrapper style
    - docs/specs/models3d-search/spec.yml for parent app-skill-use plus child result embed pattern
    - backend/core/api/app/services/workflow_app_skill_adapter.py for workflow app-skill dispatch
  architecture: >
    Implement SEC EDGAR as a pure backend shared provider with no secrets, then
    add a new Business app whose `company_financials` skill normalizes EDGAR
    companyfacts into stable public-company result objects. The skill returns a
    parent app-skill-use result and child company-financial result payloads,
    declares workflow-safe read metadata, and only later updates Web Research
    routing after CLI, SDK, web, example-chat, and user-confirmation gates pass.
  data_flow:
    - User, CLI, SDK, Workflow, or assistant provides explicit companies/tickers/CIKs.
    - Business skill validates inputs and caps request count.
    - SEC EDGAR provider resolves CIKs through cached ticker/submission metadata.
    - Provider fetches companyfacts and submissions with throttled server-side requests.
    - Normalizer maps US-GAAP/IFRS concepts into user-facing metrics and source metadata.
    - Skill returns parent summary plus child result payloads for embeds and workflow outputs.
    - Web Research may call the skill only after the verified focus-mode update gate.
  affected_files:
    - path: backend/shared/providers/sec_edgar/__init__.py
      reason: Export SEC EDGAR provider client and models.
    - path: backend/shared/providers/sec_edgar/client.py
      reason: Pure async SEC EDGAR API wrapper with User-Agent, throttling, caching, and typed errors.
    - path: backend/shared/providers/sec_edgar/models.py
      reason: Provider request/response and normalized financial models.
    - path: backend/apps/business/app.yml
      reason: New Business app metadata, skill schema, workflow metadata, embed definitions, i18n keys, and examples.
    - path: backend/apps/business/skills/company_financials.py
      reason: Business app skill implementation and preview metadata.
    - path: backend/apps/business/skills/__init__.py
      reason: Skill package exports.
    - path: backend/tests/test_sec_edgar_provider.py
      reason: Provider normalization, error, and rate-limit contract tests.
    - path: backend/tests/test_business_company_financials_skill.py
      reason: Skill input/output and app metadata tests.
    - path: backend/tests/test_business_company_financials_workflow.py
      reason: Workflow capability and adapter tests.
    - path: frontend/packages/openmates-cli/tests/sdk-business-company-financials.test.ts
      reason: npm SDK and CLI app-skill parity tests.
    - path: packages/openmates-python/tests/test_business_company_financials.py
      reason: pip SDK parity tests.
    - path: frontend/packages/ui/src/components/embeds/business/BusinessCompanyFinancialsEmbedPreview.svelte
      reason: Parent web preview component.
    - path: frontend/packages/ui/src/components/embeds/business/BusinessCompanyFinancialsEmbedFullscreen.svelte
      reason: Parent web fullscreen component.
    - path: frontend/packages/ui/src/components/embeds/business/BusinessCompanyFinancialResultEmbedPreview.svelte
      reason: Child financial-result preview component.
    - path: frontend/packages/ui/src/components/embeds/business/BusinessCompanyFinancialResultEmbedFullscreen.svelte
      reason: Child financial-result fullscreen/detail component.
    - path: frontend/apps/web_app/tests/business-company-financials.spec.ts
      reason: Deployed web embed Playwright coverage.
    - path: frontend/apps/web_app/tests/business-company-financials-example.spec.ts
      reason: Deployed example-chat Playwright coverage.
    - path: backend/tests/test_web_research_business_financials_routing.py
      reason: Focus-mode routing tests after example approval.
    - path: backend/apps/web/app.yml
      reason: Later Web Research preprocessor/system prompt update after approval gate.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Apple embed model parity after earlier gates.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
      reason: Apple parent/child render parity after earlier gates.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/business-company-financials/spec.yml
    - python3 -m pytest backend/tests/test_sec_edgar_provider.py
    - python3 -m pytest backend/tests/test_business_company_financials_skill.py
    - python3 -m pytest backend/tests/test_business_company_financials_workflow.py
    - Real CLI command against https://api.dev.openmates.org for CALM latest annual financials
    - Real Workflow validate/create/run against https://api.dev.openmates.org using business.company_financials
    - npm SDK live smoke against https://api.dev.openmates.org after CLI success
    - pip SDK live smoke against https://api.dev.openmates.org after CLI success
    - python3 scripts/audit_sdk_cli_parity.py when CLI/SDK surfaces change
    - python3 scripts/tests.py run --spec business-company-financials.spec.ts after deploy
    - Real CLI-created example chat, example audits, deploy, Playwright example spec, then user confirmation
    - backend/tests/test_web_research_business_financials_routing.py after user-approved example chat
    - python3 scripts/apple_remote.py status and targeted Apple build/test after earlier gates
    - python3 scripts/spec_verify.py docs/specs/business-company-financials/spec.yml
  verification_order:
    - Validate spec and write provider/backend red tests first.
    - Implement SEC EDGAR provider and Business skill locally with pytest green.
    - Restart affected dev API service, deploy to dev, then run real CLI command against https://api.dev.openmates.org.
    - Run real Workflow validation/create/run against dev using the skill.
    - Run npm and pip SDK parity locally against dev and wire daily coverage after local success.
    - Implement web parent/child embeds and run deployed Playwright green after deploy.
    - Create a real CLI example chat, deploy it, run example-chat checks, then ask user for approval.
    - Update Web Research focus-mode routing only after user approval.
    - Complete Apple parity last.

