schema_version: 2
id: business-company-financials
title: Business Get Company Financials Skill
status: approved

goal: >
  Add a workflow-safe Business app skill named Get company financials that uses
  SEC EDGAR to return normalized revenue, profit, cash-flow, balance-sheet, and
  filing-source data for explicit public-company inputs. The skill must prove the
  shared contract through provider tests, real dev-server CLI execution, npm and
  pip SDK parity, web parent/child embeds, a real deployed example chat approved
  by the user, then Web Research focus-mode routing and Apple parity.

scope:
  in:
    - Add a new enabled-by-default Business app with one public `company_financials` skill.
    - Add a pure shared SEC EDGAR provider wrapper under `backend/shared/providers/sec_edgar/`.
    - Support explicit company inputs by ticker, CIK, or exact company name resolvable through SEC ticker/submission metadata.
    - Return one parent Business app-skill-use embed and one child company-financial result embed per resolved company.
    - Normalize latest annual, latest quarter, annual history, and quarterly history for explicit companies.
    - Normalize summary, income, balance-sheet, cash-flow, and all metric groups without exposing raw SEC taxonomy terms as user-facing filters.
    - Mark the skill as workflow-safe with sync read execution, no approval, no connected-account binding, and deterministic test input.
    - Verify a real Workflow using the skill after CLI and SDK gates are green.
    - Update Web Research focus-mode routing only after CLI, SDK, web embed, deployed example-chat, and user-confirmation gates are complete.
    - Complete Apple parity after focus-mode update and web/user approval.
  out:
    - Paid providers such as EODHD, FMP, Alpha Vantage, Finnhub, Intrinio, or Tiingo.
    - EU/German filing coverage beyond foreign SEC filers that EDGAR already exposes.
    - Category/company discovery such as "find egg-selling companies" inside the EDGAR skill.
    - Private-company financials, registry scraping, or non-SEC sources.
    - Investment advice, stock-price forecasts, buy/sell recommendations, portfolio analysis, or valuation opinions.
    - Broad sector scans through SEC frames in v1 unless explicit company inputs are supplied.
    - A standalone Finance app or trading-oriented UI.
    - Updating Web Research before the skill is verified and example-chat-approved.

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials. Fallback `gh issue list --repo glowingkitty/OpenMates --search \"EDGAR OR company financials OR Business app OR SEC filings\" --state all --limit 20 --json number,title,state,labels,url` found no direct matching issue; issue #472 was unrelated adjacent app work."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/apps/app-skills.md
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/workflows-sdk-runtime/spec.yml
    - docs/specs/workflow-app-skill-expansion/spec.yml
    - docs/specs/models3d-search/spec.yml
    - docs/specs/edamam-nutrition-recipes/spec.yml
  code_patterns:
    - backend/apps/web/app.yml defines the existing Web Research focus mode and is the later routing update target.
    - backend/apps/weather/app.yml and backend/apps/news/app.yml show workflow metadata for sync read skills.
    - backend/core/api/app/services/workflow_capability_registry.py derives workflow availability from each skill's `workflow` block.
    - backend/core/api/app/services/workflow_app_skill_adapter.py dispatches workflow app-skill nodes through SkillRegistry and normalizes outputs.
    - docs/specs/models3d-search/spec.yml shows the approved parent app-skill-use plus child result embed pattern.
    - backend/shared/providers/iconify/client.py shows a pure no-secret public-provider wrapper pattern.
    - backend/apps/base_skill.py defines the async skill execution contract.
  tests:
    - backend/tests/test_workflow_capability_metadata.py
    - backend/tests/test_workflow_app_skill_adapter.py
    - backend/tests/test_workflow_step_test.py
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/sdk.test.ts
    - packages/openmates-python/tests/test_sdk.py
    - frontend/apps/web_app/tests/models3d-search.spec.ts
  external_research:
    - "SEC EDGAR API documentation confirms no API key is required for JSON endpoints on data.sec.gov."
    - "SEC EDGAR submissions endpoint: `https://data.sec.gov/submissions/CIK##########.json`."
    - "SEC EDGAR all-facts endpoint: `https://data.sec.gov/api/xbrl/companyfacts/CIK##########.json`."
    - "SEC EDGAR single-concept endpoint: `https://data.sec.gov/api/xbrl/companyconcept/CIK##########/{taxonomy}/{concept}.json`."
    - "SEC EDGAR frames endpoint: `https://data.sec.gov/api/xbrl/frames/{taxonomy}/{concept}/{unit}/{period}.json`, deferred for broad scans."
    - "SEC bulk companyfacts/submissions ZIPs are available nightly but deferred for v1."
    - "SEC developer FAQ states automated access should identify a User-Agent and stay within fair-access limits, commonly 10 requests per second."
    - "Live probes before this spec successfully extracted latest annual revenue/profit for CALM, VITL, MU, and SAP through EDGAR companyfacts."

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Models/EmbedModels.swift
    - apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMatesTests/SkillApplicationParityTests.swift
  parity_expectations:
    - Apple renders the same Business parent summary and child company-financial result cards after CLI, SDK, web, example-chat, focus-mode, and user-confirmation gates are complete.
    - Apple displays source filing metadata and no investment-advice language.
    - Apple work does not begin before the required earlier gates or an explicit waiver.
  verification:
    - Run `python3 scripts/apple_remote.py status` before native verification when this spec reaches the Apple phase.
    - Run targeted native embed/skill parity tests or `python3 scripts/apple_remote.py build-ios` after web and user-confirmation evidence.
  intentional_native_differences:
    - Native source filing links may open in the system browser instead of an in-app webview.

clarification:
  rounds:
    - question: Should the first implementation focus on EDGAR because EODHD commercial pricing is too expensive?
      answer: Yes. Focus first on the US-focused provider.
    - question: Should the product surface be Business and Get company financials rather than a trading-oriented Finance app?
      answer: Yes, use the suggested Business app and skill direction.
    - question: Should v1 use parent plus child embeds or a single embed?
      answer: Use parent plus child embeds because the skill should support one or more explicit companies and comparisons.
    - question: Should v1 require explicit companies/tickers while broader discovery stays in Web Research?
      answer: Yes. Discovery like finding egg-selling companies stays in Web Research, then calls this skill with identified companies.
    - question: Should Web Research focus-mode routing wait until CLI, SDK, web embed, deployed example-chat, user confirmation, then Apple parity gates?
      answer: Yes. Update the focus mode only after the skill is properly tested and confirmed, then complete Apple parity.
  vision_summary: >
    The user wants a Business app skill that answers public-company financial
    questions from EDGAR for explicit company inputs, not a broad discovery or
    investment-advice tool. It must be workflow-optimized and verified through
    the OpenMates phase ladder before Web Research focus mode is taught to call
    it for relevant company-financial research.
  approved_by_user: true

