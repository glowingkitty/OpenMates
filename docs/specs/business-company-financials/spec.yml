assumptions:
  - id: A-1
    text: SEC EDGAR fair-access guidance permits low-volume OpenMates backend requests with a descriptive User-Agent and rate limiting.
    category: provider
    required_before: implementation
    status: confirmed
    evidence:
      - source: https://www.sec.gov/os/webmaster-faq#developers
        summary: SEC developer guidance asks automated users to identify a User-Agent and preserve fair access; rate limit is 10 requests per second.
  - id: A-2
    text: The existing generic workflow app-skill adapter can execute this read-only skill without a custom workflow runner path.
    category: workflow
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/services/workflow_app_skill_adapter.py
        summary: Generic adapter dispatches any available app skill through SkillRegistry and returns normalized raw output.
  - id: A-3
    text: A new Business app has no existing Apple counterpart, but app-skill and embed rendering parity must still be added once web behavior is approved.
    category: apple
    required_before: completion
    status: confirmed
    evidence:
      - source: backend/apps
        summary: No existing business or finance app metadata was found; Apple parity is expected through generic app-skill/embed rendering patterns.

contracts:
  provider:
    name: SEC EDGAR
    auth: none
    base_urls:
      - https://www.sec.gov/files/company_tickers.json
      - https://data.sec.gov/submissions/CIK##########.json
      - https://data.sec.gov/api/xbrl/companyfacts/CIK##########.json
      - https://data.sec.gov/api/xbrl/companyconcept/CIK##########/{taxonomy}/{concept}.json
    required_headers:
      - "User-Agent: OpenMates contact URL or email, configurable and never blank"
      - "Accept-Encoding: identity"
    rate_limit:
      max_requests_per_second: 10
      behavior: throttle and cache, never tight-loop retries
    freshness:
      submissions: real-time as filings disseminate, typical delay under one second
      xbrl_facts: real-time as filings disseminate, typical delay under one minute
    unavailable_behavior:
      - Return typed provider errors with code and message.
      - Keep partial successful company results when one company fails.
      - Do not fabricate missing metrics.
  skill:
    app_id: business
    skill_id: company_financials
    user_facing_name: Get company financials
    description: Look up revenue, profit, cash flow, balance-sheet data, and filing sources from official SEC EDGAR public-company filings.
    input_schema:
      type: object
      properties:
        companies:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: object
            properties:
              query:
                type: string
                description: Explicit ticker, CIK, or exact public company name.
              identifier_type:
                type: string
                enum: [auto, ticker, cik, company_name]
              display_name:
                type: string
            required: [query]
        period:
          type: string
          enum: [latest_annual, latest_quarter, annual_history, quarterly_history]
          default: latest_annual
        metric_group:
          type: string
          enum: [summary, income, balance_sheet, cash_flow, all]
          default: summary
        years:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
        include_sources:
          type: boolean
          default: true
      required: [companies]
    output_shape:
      summary: string
      provider: SEC EDGAR
      result_count: integer
      results: list of normalized company financial result objects
      warnings: list of typed warning objects
      errors: list of typed per-company errors when applicable
  normalized_metrics:
    revenue:
      us_gaap: [RevenueFromContractWithCustomerExcludingAssessedTax, Revenues, SalesRevenueNet]
      ifrs_full: [Revenue]
    net_income:
      us_gaap: [NetIncomeLoss]
      ifrs_full: [ProfitLoss, ProfitLossAttributableToOwnersOfParent, ProfitLossAttributableToOrdinaryEquityHoldersOfParentEntity]
    gross_profit:
      us_gaap: [GrossProfit]
      ifrs_full: [GrossProfit]
    operating_income:
      us_gaap: [OperatingIncomeLoss]
      ifrs_full: [ProfitLossFromOperatingActivities]
    assets:
      us_gaap: [Assets]
      ifrs_full: [Assets]
    liabilities:
      us_gaap: [Liabilities]
      ifrs_full: [Liabilities]
    equity:
      us_gaap: [StockholdersEquity, StockholdersEquityIncludingPortionAttributableToNoncontrollingInterest]
      ifrs_full: [Equity, EquityAttributableToOwnersOfParent]
    operating_cash_flow:
      us_gaap: [NetCashProvidedByUsedInOperatingActivities]
      ifrs_full: [CashFlowsFromUsedInOperatingActivities]
  embeds:
    parent:
      id: company_financials
      category: app-skill-use
      skill_id: company_financials
      has_children: true
      child_type: company_financial_result
      child_frontend_type: business-company-financial-result
      content_fields: [query, period, metric_group, provider, result_count, warnings, embed_ids]
    child:
      id: company_financial_result
      content_fields:
        - company
        - ticker
        - cik
        - country
        - exchange
        - period_type
        - fiscal_year
        - fiscal_quarter
        - period_start
        - period_end
        - filed
        - form
        - currency
        - revenue
        - net_income
        - gross_profit
        - operating_income
        - operating_cash_flow
        - assets
        - liabilities
        - equity
        - source_url
        - accession_number
        - confidence
        - notes
  workflow:
    available: true
    execution_mode: sync
    effect: read
    unattended: true
    approval: never
    binding_requirements: [none]
    test_allowed: true
    test_example_input:
      companies:
        - query: CALM
      period: latest_annual
      metric_group: summary
      years: 1
      include_sources: true
    output_schema:
      type: object
      properties:
        summary:
          type: string
        result_count:
          type: integer
        provider:
          type: string
        results:
          type: array
  privacy_security:
    - No API key or user credential is needed for EDGAR.
    - Browser and Apple clients never call data.sec.gov directly; all provider access is server-side.
    - User requests may contain public company names/tickers only; no private account data is required.
    - Logs must not include full raw filings or excessive provider payloads.
    - Responses must label filing period and source to avoid implying live or investment-advice data.

scenarios:
  - id: S-1
    title: User gets latest annual financials for one US public company
    given:
      - Alice asks for Cal-Maine Foods revenue and profit.
      - The Business app and SEC EDGAR provider are enabled.
    when:
      - The mate calls `business.company_financials` with company `CALM`, period `latest_annual`, and metric group `summary`.
    then:
      - The skill resolves `CALM` to a CIK.
      - The skill returns one normalized company result with latest annual revenue and net income when present in EDGAR.
      - The result includes fiscal period, form type, filing date, accession number, provider, and source URL.
      - The answer labels the data as latest annual filing data, not live trailing-twelve-month data.

  - id: S-2
    title: User compares several explicit companies
    given:
      - Alice asks to compare recent financials for `CALM`, `VITL`, and `MU`.
    when:
      - The mate calls `business.company_financials` with three explicit company inputs.
    then:
      - The parent embed records the request and result count.
      - One child company-financial result embed is created for each resolved company.
      - The skill returns partial successes when one company fails without dropping successful companies.
      - The assistant can summarize the comparison from normalized output without reading raw XBRL.

  - id: S-3
    title: User asks for annual history
    given:
      - Alice asks for Micron's revenue and profit over the last five fiscal years.
    when:
      - The mate calls the skill with `MU`, period `annual_history`, metric group `income`, and years `5`.
    then:
      - The skill returns a chronological annual series capped to the requested year count.
      - Duplicate restated facts are deduplicated using period end, filing date, form, accession number, and duration.
      - Missing metrics remain null with notes instead of being fabricated.

  - id: S-4
    title: Workflow runs company financials unattended
    given:
      - Alice has a Workflow with a manual trigger, a `business.company_financials` app-skill step for `CALM`, and a chat output step.
      - The Workflow is run against the dev server through CLI or SDK tooling.
    when:
      - The Workflow runner executes the app-skill step.
    then:
      - Workflow capability metadata lists `business.company_financials` as available.
      - The step executes without connected-account binding or approval.
      - Run detail retains a concise normalized output summary and raw output according to workflow retention rules.

  - id: S-5
    title: Unknown or unsupported company returns an explicit error
    given:
      - Alice asks for financials for `NOTAREALTICKER`.
    when:
      - The skill attempts to resolve the company input.
    then:
      - The response includes a typed per-company error such as `company_not_found`.
      - The skill does not call unrelated web search or guess a replacement company.
      - The assistant tells Alice the company could not be resolved in SEC EDGAR.

  - id: S-6
    title: Web embeds render parent and child financial cards
    given:
      - The skill has passed provider, CLI, SDK, and workflow gates.
      - Alice runs a company-financials request in the deployed dev web app.
    when:
      - The web app receives the parent and child embed payloads.
    then:
      - The parent preview shows the query, period, provider, and result count.
      - Each child card shows company identity, period, revenue, profit, currency, and source filing link.
      - Fullscreen view supports single-company and comparison layouts without hiding source metadata.

  - id: S-7
    title: Example chat proves the deployed behavior
    given:
      - The web embed gate has passed on deployed dev.
    when:
      - A real CLI-created example chat demonstrates asking for financials of explicit companies.
    then:
      - The public example is based on real OpenMates skill output, not hand-authored fixture data.
      - The example chat includes source-aware financial cards.
      - The user confirms the deployed example chat is acceptable before focus-mode routing changes.

  - id: S-8
    title: Web Research uses company financials after verification
    given:
      - The deployed example chat is approved by the user.
      - Web Research identifies explicit public companies while researching an economic or market topic.
    when:
      - The focus-mode routing conditions match company financial-performance research.
    then:
      - Web Research may call `business.company_financials` for explicit companies it has identified.
      - Web Research does not call the skill for company discovery, private-company questions, or investment advice.
      - Research answers cite filing-source metadata when using EDGAR-derived facts.

  - id: S-9
    title: Apple renders the approved financial embeds
    given:
      - CLI, SDK, web, example-chat, focus-mode, and user-confirmation gates are complete.
    when:
      - Apple receives a Business company-financials parent embed with child result embeds.
    then:
      - Native preview and detail rendering preserve the same key fields as web.
      - Source filing links are available.
      - No native surface frames the output as investment advice.

