  external_research:
    - MCP Agent Mail uses project-scoped agent identities and renewable advisory file leases, but intentionally has no automatic wait queue.
    - Distributed-lock guidance recommends bounded leases and fencing/ownership checks because expired owners may still attempt writes.
    - Concurrent coding-agent projects commonly prefer worktree isolation; this contract instead uses explicit leases because the user requires one shared OpenCode web worktree.

