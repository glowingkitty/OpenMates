scenarios:
  - id: S-1
    title: An idle spec chat receives no synthetic continuation prompt
    given:
      - An OpenCode web chat mentions or owns an incomplete executable spec.
    when:
      - The chat becomes idle without waiting for a file lease.
    then:
      - No plugin prompt is injected.
      - Agent and skill instructions remain responsible for continuing approved work.
  - id: S-2
    title: Concurrent chats queue for one atomic file set
    given:
      - Chat A owns files `a.py` and `b.py` under a live lease.
      - Chat B requests both files for one task.
    when:
      - Chat B attempts its first edit.
    then:
      - Chat B edits neither file and enters `waiting_for_files` once.
      - Releasing or expiring Chat A grants both files atomically to Chat B.
      - Chat B receives one concise resume prompt tied to the granted request.
  - id: S-3
    title: A crashed owner cannot block progress forever
    given:
      - Chat A owns a file set but stops heartbeating.
      - Chat B is first in the compatible wait queue.
    when:
      - The central lease sweep observes expiry.
    then:
      - Chat A loses ownership with a monotonically newer lease generation.
      - Chat B receives the complete set and may edit.
      - A stale Chat A edit is rejected by generation or ownership checks.
  - id: S-4
    title: Instructions scale requirements by risk and continue execution
    given:
      - A product contract is approved and implementation tasks remain.
    when:
      - An agent encounters a failing test, context pressure, a temporary file wait, or a later-phase gate.
    then:
      - The agent continues the current actionable task or waits for its lease without ending.
      - Only important unresolved user input may pause the current task.
      - Ordinary changes use a lighter spec contract while high-risk domains retain full evidence requirements.

