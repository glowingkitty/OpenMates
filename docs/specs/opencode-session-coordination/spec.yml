decisions:
  - id: D-1
    status: active
    decision: OpenCode `ses_*` chat IDs are authoritative; repo session IDs are secondary metadata.
    reason: All OpenCode web chats share one process and Zellij identity, while the hook receives the exact OpenCode session ID.
    decided_at: "2026-07-12T17:55:34Z"
  - id: D-2
    status: active
    decision: Remove deterministic idle spec continuation completely.
    reason: It repeatedly injected long instructions into an unrelated chat and cannot be made safe through message-history inference.
    decided_at: "2026-07-12T17:55:34Z"
  - id: D-3
    status: active
    decision: Use atomic renewable file-set leases with a fair wait queue, central expiry sweep, and automatic resume only after lease grant.
    reason: This prevents partial acquisition deadlocks and avoids asking the user to manually retry temporary file conflicts.
    decided_at: "2026-07-12T17:55:34Z"
  - id: D-4
    status: active
    decision: Use risk-tiered spec requirements.
    reason: The current full ledger is valuable for high-risk changes but creates excessive administrative work for ordinary features.
    decided_at: "2026-07-12T17:55:34Z"

