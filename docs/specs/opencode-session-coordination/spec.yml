clarification:
  rounds:
    - question: Which identity is authoritative for OpenCode web sessions?
      answer: The OpenCode `ses_*` chat ID; do not use Zellij.
    - question: Which shared-worktree collision model should replace the current setup?
      answer: Atomic renewable file-set leases with an event-driven wait queue and automatic resume after grant.
    - question: Should deterministic idle spec auto-resume remain?
      answer: No. Remove it and enforce completion through agent and skill instructions instead.
    - question: How should spec complexity change?
      answer: Use risk-tiered specs; reserve the full evidence ledger for high-risk work.
    - question: How should crashed owners be handled?
      answer: Expire stale leases and automatically grant the next complete queued request.
  vision_summary: >
    OpenCode web chat IDs are the sole coordination identity. Chats share one
    worktree, request atomic renewable leases for their intended file set, wait
    without ending when files are busy, and are resumed when the set is granted.
    Generic idle spec prompting is removed; concise instructions require agents
    to continue approved work unless important user input is truly required.
  approved_by_user: true

