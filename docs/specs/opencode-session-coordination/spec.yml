schema_version: 2
id: opencode-session-coordination
title: OpenCode Web Session Coordination
status: verified

goal: >
  Make concurrent OpenCode web chats safe and persistent in one shared worktree.
  Use the OpenCode chat ID as the authoritative agent identity, remove the buggy
  idle spec auto-continuation trigger, coordinate writes through renewable
  file-set leases and an event-driven wait queue, and simplify spec instructions
  according to risk while requiring agents to continue approved work until done
  or genuinely blocked on important user input.

scope:
  in:
    - Remove deterministic idle spec auto-continuation and message-history spec detection.
    - Use each OpenCode `ses_*` chat ID as the authoritative identity for repo sessions, file ownership, and queued access.
    - Bind `sessions.py` records to the calling OpenCode chat without Zellij-based identity resolution.
    - Acquire requested file sets atomically in canonical order with one owner, renewable TTL, and heartbeat metadata.
    - Queue conflicting requests fairly and automatically grant the complete file set after release or stale-owner expiry.
    - Resume only chats waiting for file leases; never inject generic spec-completion prompts into idle chats.
    - Keep `spec.yml` single-writer while allowing non-conflicting files to progress concurrently.
    - Strengthen agent and skill instructions to continue approved tasks until complete or important user input is required.
    - Introduce risk-tiered spec guidance so normal work carries less ledger overhead than auth, encryption, billing, privacy, permissions, sync, migrations, and similarly high-risk work.
  out:
    - Separate Git worktrees or branches per OpenCode chat.
    - Zellij as an identity, routing, ownership, or lock primitive for OpenCode web chats.
    - Periodic per-chat polling for file availability.
    - Automatic continuation of arbitrary idle spec chats.
    - Merging conflicting edits automatically.

