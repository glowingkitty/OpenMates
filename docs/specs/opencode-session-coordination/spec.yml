implementation_plan:
  spec_path: docs/specs/opencode-session-coordination/spec.yml
  existing_patterns:
    - scripts/sessions.py atomic JSON state writes and stale-session pruning
    - .opencode/plugins/openmates-hooks.js access to exact OpenCode session IDs
    - scripts/spec_verify.py structured blocker semantics
  architecture: >
    Add a small deterministic lease coordinator with durable state, atomic
    acquire/release/heartbeat/sweep operations, FIFO queued requests, and lease
    generations. The OpenCode hook passes its exact `sessionID` to the
    coordinator before edits and prompts only sessions returned as newly granted
    waiters. Remove all session.idle prompting. Keep completion behavior in
    shared instructions and simplify spec requirements by risk tier.
  data_flow:
    - A chat starts a repo session; the hook records its exact OpenCode `ses_*` identity.
    - Before an edit, the hook requests the complete normalized file set atomically.
    - The coordinator grants it or records one queued request and rejects the edit.
    - Tool activity renews leases owned by that chat.
    - Release, deploy/end, or expiry grants compatible queued requests in FIFO order.
    - The hook sends one concise resume prompt only to newly granted waiting chats.
  affected_files:
    - path: .opencode/plugins/openmates-hooks.js
      reason: Remove idle continuation and integrate identity-aware lease operations.
    - path: scripts/opencode_file_leases.py
      reason: Durable lease, queue, expiry, and generation coordinator.
    - path: scripts/sessions.py
      reason: Store the authoritative OpenCode chat identity on repo session records.
    - path: .claude/rules/session-lifecycle.md
      reason: Define continue-until-complete and temporary file-wait behavior.
    - path: docs/contributing/guides/spec-driven-development.md
      reason: Define risk-tiered specs and narrow valid user blockers.
    - path: scripts/audit_opencode_spec_workflow.py
      reason: Deterministically enforce the new workflow and forbid idle continuation.
  verification_strategy:
    - node --test scripts/tests/test_opencode_spec_autocontinue.mjs
    - python3 -m pytest scripts/tests/test_opencode_file_leases.py
    - node --test scripts/tests/test_opencode_file_lease_hook.mjs
    - python3 -m pytest scripts/tests/test_opencode_spec_workflow_audit.py
  verification_order:
    - Remove idle prompting and prove no synthetic prompt first.
    - Verify lease coordinator state transitions second.
    - Verify hook identity, blocking, and targeted resume third.
    - Verify instruction and risk-tier audits last.

