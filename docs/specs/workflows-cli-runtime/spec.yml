decisions:
  - id: D-1
    status: active
    decision: Implement and verify CLI before SDK, web, or Apple parity.
    reason: The CLI is the cheapest deterministic proof of the backend Workflow contract.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-2
    status: active
    decision: Use YAML as the only Workflow authoring format in this phase.
    reason: One readable file is simpler for non-technical users than interactive graph-building commands or parallel JSON syntax.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-3
    status: active
    decision: Separate draft validity from enablement readiness.
    reason: Users must be able to save incomplete work without allowing it to execute with missing inputs.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-4
    status: active
    decision: Capability example inputs are exclusively for individual action tests.
    reason: Sample values must never silently affect a real workflow run.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-5
    status: active
    decision: Individual action tests execute real requests, billing, and side effects for enabled, disabled, and incomplete workflows.
    reason: A Test request must prove the actual action path rather than a mock or preview.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-6
    status: active
    decision: AI Ask gains an explicit Workflow mode with fresh context by default and optional run-local named conversations.
    reason: Reusing synthetic or persisted chat history would couple Workflow execution to chat storage and make offline behavior ambiguous.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-7
    status: active
    decision: Send chat message uses optional chat_id rather than a destination enum.
    reason: A supplied owner-authorized chat receives a new standalone message; no chat_id creates a new chat, which keeps YAML simple.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-8
    status: active
    decision: Failures stop the run and remain inspectable rather than exposing user-authored failure branches in this phase.
    reason: Saved per-step status and plain-language errors provide useful diagnosis without complicating the editor model.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-9
    status: active
    decision: This child spec supersedes the parent spec only for the current CLI command and authoring contract.
    reason: YAML create/update, step-test, and run-show are the canonical first-phase commands; existing inline JSON, edit, run --mode test, and run show behavior may remain as compatibility aliases but receives no new feature work in this phase.
    decided_at: "2026-07-13T00:00:00Z"
  - id: D-10
    status: active
    decision: Existing accepted runs remain pinned and may finish after disable; disable prevents only new run acceptance.
    reason: Disabling must not mutate or strand already accepted running or waiting executions, while deletion requests cancellation before removing future execution state.
    decided_at: "2026-07-13T00:00:00Z"

