assumptions:
  - id: A-1
    text: SkillRegistry and BaseApp.dispatch_skill remain the single app-skill execution boundary for API and worker processes.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/services/skill_registry.py
        summary: SkillRegistry.dispatch_skill delegates registered skills to BaseApp.dispatch_skill in-process.
  - id: A-2
    text: Existing app metadata tool_schema and pricing are reusable but insufficient alone for Workflow output schemas, effect classification, unattended eligibility, and test examples.
    category: metadata
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/shared/python_schemas/app_metadata_schemas.py
        summary: AppSkillDefinition has input tool_schema and pricing but no Workflow-specific lifecycle or output contract.
  - id: A-3
    text: Existing client chat-key guards and immutable persisted key handling can be extended with an atomic pending-delivery claim so Workflow chat delivery never requires backend-generated regular chat keys.
    category: chat
    required_before: task_execution
    status: confirmed
    evidence:
      - source: backend/core/api/app/tasks/persistence_tasks.py
        summary: Existing persistence keeps encrypted_chat_key immutable after first write and rejects ciphertext/metadata encrypted with a competing key.
      - source: frontend/packages/ui/src/services/chatKeyWriteGuard.ts
        summary: Existing clients refuse writes with conflicting keys and preserve candidate keys for recovery.
      - source: frontend/packages/ui/src/services/sendersChatMessages.ts
        summary: Existing-chat send paths decrypt the persisted key and explicitly refuse to generate a new key for an existing chat.
      - source: backend/core/api/app/routers/webhooks.py
        summary: Webhook delivery already pre-creates minimal chat routing metadata, sends online WebSocket delivery, and retains Vault-encrypted offline pending content; Workflow delivery extends this pattern with an atomic new-chat claim and acknowledgement.
  - id: A-4
    text: AI Ask needs an explicit Workflow execution mode because the current non-chat API path still synthesizes chat and message identities around the chat-oriented processing request.
    category: ai
    required_before: task_execution
    status: confirmed
    evidence:
      - source: backend/apps/ai/skills/ask_skill.py
        summary: OpenAI-compatible requests are transformed into AskSkillRequest with synthetic chat_id, message_id, and message_history.
  - id: A-5
    text: platform:workflows remains the authoritative server feature gate while this CLI phase is tested through an explicit dev-account override.
    category: rollout
    required_before: task_execution
    status: confirmed
    evidence:
      - source: docs/specs/workflows-v1/spec.yml
        summary: The parent contract keeps platform:workflows disabled by default until controlled dev verification is green.

contracts:
  cli:
    - command: openmates workflows validate --file <workflow.yml> [--json]
      behavior: Performs free local structural/readiness validation and authoritative server capability/readiness validation without saving.
    - command: openmates workflows create --file <workflow.yml> [--json]
      behavior: Auto-validates, rejects structural errors, and always creates a disabled workflow; enable is a separate explicit command.
    - command: openmates workflows update <workflow-id> --file <workflow.yml> [--json]
      behavior: Auto-validates and creates a new immutable version without mutating prior runs. A complete update preserves current enabled state; an incomplete update to an enabled workflow is rejected until the workflow is disabled.
    - command: openmates workflows enable <workflow-id> [--json]
      behavior: Revalidates readiness and enables only a complete safe current version.
    - command: openmates workflows disable <workflow-id> [--json]
      behavior: Prevents every new manual, scheduled, or event execution while preserving definitions and history.
    - command: openmates workflows run <workflow-id> [--input <json>] [--json]
      behavior: Executes an enabled ready workflow with idempotent accepted-run semantics; examples are never used.
    - command: openmates workflows step-test <workflow-id> <step-id> [--input <json>] [--yes] [--json]
      behavior: Executes exactly one real action and records run_type step_test; no upstream action executes implicitly. Input is resolved per field from explicit override, configured literal, then capability example. Explicit null is retained only for nullable fields and otherwise fails validation.
    - command: openmates workflows respond <workflow-id> <run-id> <step-id> --input <json> [--json]
      behavior: Submits one owner-authorized schema-valid response to an active Ask for user input wait. It resumes the accepted run exactly once and rejects duplicate, expired, cancelled, or cross-owner responses.
    - command: openmates workflows list [--json]
      behavior: Lists owner workflows with enabled, disabled, incomplete, and last-run state.
    - command: openmates workflows show <workflow-id> [--json]
      behavior: Shows the current YAML-compatible definition and readiness diagnostics.
    - command: openmates workflows runs <workflow-id> [--json]
      behavior: Lists accepted full and step-test runs without representing future schedule occurrences as runs.
    - command: openmates workflows run-show <workflow-id> <run-id> [--json]
      behavior: Shows per-step inputs/outputs/status/cost/timing/error subject to run-content retention.
    - command: openmates workflows delete <workflow-id> --yes [--json]
      behavior: Disables future execution and soft-deletes the owner workflow without rewriting run history.
    - command: openmates workflows capabilities [--json]
      behavior: Lists available triggers, controls, app skills, actions, execution limits, and unavailable reasons.
    - command: openmates workflows help app <app-id>.<skill-id>
      behavior: Explains one app skill from authoritative Workflow capability metadata.
    - command: openmates workflows help action <action-id>
      behavior: Explains one OpenMates action, including real side effects and test confirmation.
    - command: openmates workflows help control <control-id>
      behavior: Explains If, For every, Repeat until, or Wait with a valid YAML example.
  yaml:
    authoring_version: 1
    top_level_fields:
      - title
      - description
      - start_when
      - steps
      - run_content_retention
    principles:
      - YAML is parsed with duplicate-key rejection, anchors/aliases disabled, safe scalar types, size/depth/list limits, and no executable tags.
      - Every action and control has a stable user-authored id used by templates, help, tests, and run history.
      - The YAML document compiles deterministically to the internal immutable WorkflowGraph; clients never submit arbitrary executable expressions.
      - TypeScript local validation uses a generated schema and shared conformance fixtures from the authoritative Python compiler; server compilation remains authoritative and both surfaces return the same diagnostic codes and paths.
      - Empty If true or If false means Do nothing.
    action_forms:
      - "use_app_skill: <app-id>.<skill-id>"
      - "ask_ai: { instructions, input, conversation?, response_schema? } (compiler alias for use_app_skill: ai.ask with mode workflow)"
      - "send_chat_message: { chat_id?, title?, message }"
      - "send_notification: { title, body, link? }"
      - "ask_for_user_input: { prompt, input_schema, expires_in }"
    control_forms:
      - "if: <typed allowlisted comparison>; if_true: <steps>; if_false: <steps>"
      - "for_each: <typed list reference>; as: <item name>; max_items: <positive integer>; steps: <steps>"
      - "repeat_until: <typed condition>; max_attempts: <positive integer>; wait_between: <duration>; steps: <steps>"
      - "wait: <duration or absolute typed date/time>"
  variables:
    syntax: "{{ namespace.path | filter: argument }}"
    namespaces:
      - run.scheduled_at
      - run.triggered_at
      - run.started_at
      - run.input
      - clock.now
      - steps.<step-id>.<typed-output-field>
      - steps.<ask-for-user-input-step-id>.input after a resolved user-input wait
      - item within For every
    date_time_filters:
      - add_minutes
      - add_hours
      - add_days
      - start_of_day
      - start_of_week
      - start_of_weekend
      - date
      - time
      - in_timezone
    date_time_types:
      - run.triggered_at is always an immutable timezone-aware instant set at acceptance.
      - run.scheduled_at is available only for schedule-triggered runs and validation rejects it for other trigger contexts.
      - run.started_at is the immutable first worker-start instant and does not change across waits/resumes.
      - clock.now creates one timezone-aware snapshot per consuming step and the snapshot is retained in effective step input.
      - Workflow timezone defaults to the schedule timezone, then the account timezone, then UTC.
      - Durations use ISO-8601 forms such as PT30M, PT2H, and P1D.
      - add_minutes and add_hours use elapsed-time arithmetic; add_days and P1D use calendar-day arithmetic preserving local wall time.
      - A computed nonexistent DST local time shifts forward by the exact gap; a repeated local time uses the earlier offset unless in_timezone receives an explicit offset.
      - start_of_day, start_of_week, and start_of_weekend use the effective Workflow timezone; week starts Monday and weekend starts Saturday 00:00.
    rules:
      - run.scheduled_at and run.started_at are fixed for the accepted run.
      - clock.now is evaluated at the consuming step and its resolved value is retained in that step input.
      - Filters are parsed and type-checked; no dynamic attribute access, function calls, arithmetic language, or arbitrary code is allowed.
  validation:
    draft_valid:
      - YAML and graph structure are valid.
      - Exactly one supported trigger exists.
      - Step ids and references are unique and resolvable where declared.
      - Actions, controls, conditions, templates, date filters, and branch shapes are supported and typed.
      - Missing required runtime values are diagnostics but may remain in a disabled draft.
    enable_ready:
      - Every required action input is fixed, mapped from an earlier compatible output, or guaranteed by trigger/run input.
      - Every repetition has configured server-safe bounds.
      - Every action supports unattended execution for the configured trigger.
      - Current feature availability and owner permissions pass.
      - Test-only example inputs do not participate.
  capability_metadata:
    fields:
      - workflow.available
      - workflow.execution_mode
      - workflow.effect
      - workflow.unattended
      - workflow.test_allowed
      - workflow.test_example_input
      - workflow.output_schema
      - workflow.approval
      - workflow.binding_requirements
    schema:
      - available and test_allowed are booleans.
      - execution_mode is sync, async_callback, or workflow_ai; this phase allows sync and workflow_ai only.
      - effect is read, notify, chat_write, or external_write; external_write remains unavailable in this phase.
      - unattended is a boolean evaluated together with the trigger type.
      - approval is never, side_effect_confirmation, or always; notify/chat_write step tests require side_effect_confirmation or always.
      - binding_requirements is an array of none, location, provider_account, notification_preferences, or chat_owner; provider_account skills remain unavailable in this phase.
      - available=true requires execution_mode, effect, unattended, output_schema, approval, and binding_requirements; test_allowed=true additionally requires a schema-valid safe test_example_input.
    defaults:
      - Implemented non-internal skills are discoverable; absent Workflow metadata deterministically yields available=false with reason WORKFLOW_CLASSIFICATION_REQUIRED.
      - Initial classified skills are web.search, weather.forecast, news.search, events.search, and ai.ask.
      - workflow.available expresses Workflow eligibility only and does not replace platform, app, skill, owner, binding, approval, or provider availability checks.
      - Effective availability requires platform:workflows, registry presence, complete Workflow classification, enabled app/skill features, owner permissions/bindings, trigger-compatible unattended eligibility, and provider availability in that order.
    test_example_rules:
      - Every initial test_allowed action has a schema-valid per-field example.
      - Examples cannot contain secrets, credentials, account ids, chat ids, private destinations, or side-effect recipients.
      - Examples are absent from compiled graphs, normal run input/content, AI context, and persisted Workflow definitions.
  workflow_ai:
    mode: workflow
    default_context: fresh
    tools_enabled: false
    persistence:
      - No regular chats or messages are created by AI Ask itself.
      - Named conversations are scoped to one run and reconstructed only from encrypted run content.
      - Real chat ids are rejected as Workflow AI conversation identifiers.
    system_contract:
      - Execute one isolated Workflow AI action using only the product system instructions, user-configured instructions, and explicitly mapped inputs.
      - Supply user-configured instructions and mapped previous-step data in separate typed roles/containers so provider data cannot become product system instructions.
      - Do not access tools, memories, chats, connected accounts, or data not explicitly supplied to this action.
      - Do not modify Workflow state or perform side effects.
      - Return only the configured response shape.
    security:
      - Remove ASCII-smuggling Unicode tags, bidi controls, zero-width/disallowed controls, and annotation characters from instructions and mapped text.
      - Enforce input/output size, model allowlist, credit budget, timeout, and provider safety limits.
      - response_schema supports bounded JSON Schema object, array, string, number, integer, boolean, null, required, enum, min/max, and length/item constraints with maximum nesting and property counts.
      - Named server constants WORKFLOW_AI_MAX_INPUT_BYTES, WORKFLOW_AI_MAX_OUTPUT_BYTES, WORKFLOW_AI_MAX_SCHEMA_DEPTH, WORKFLOW_AI_MAX_SCHEMA_PROPERTIES, WORKFLOW_AI_TIMEOUT_SECONDS, and WORKFLOW_AI_DEFAULT_CREDIT_LIMIT define enforceable defaults and may only be changed with matching boundary tests.
      - Validate response_schema before downstream execution; invalid output performs no hidden retry, remains normally billed because inference occurred, and fails with WORKFLOW_AI_OUTPUT_INVALID.
      - Never log prompt, mapped input, output, named conversation content, or provider raw response.
  actions:
    send_chat_message:
      - chat_id is optional; when present it must be owner-authorized and receives a new standalone message without loading prior chat history.
      - Without chat_id, the backend pre-creates minimal owner-scoped chat routing metadata and title applies only to the later client-encrypted new chat.
      - The action stores title/message only in a Vault-encrypted pending delivery; it generates stable chat, message, and delivery ids but never a raw regular chat key or regular chat ciphertext.
      - An existing-chat delivery is processed by any owner client that decrypts its persisted immutable chat key and encrypts the standalone message without loading history.
      - A new-chat delivery requires an atomic owner-device claim before client encryption. The claim has an opaque token, issued/expiry timestamps, and fencing generation; encrypted persistence and acknowledgement require the current token/generation.
      - A disconnected claimant expires and another owner device may reclaim the delivery. Late persistence or acknowledgement from an expired/superseded token is rejected before writing regular chat ciphertext.
      - The winning client generates the chat key, encrypts/persists chat metadata and message with the stable ids, and acknowledges delivery; other clients wait for sync and never generate another key.
      - A successful action means durable pending-delivery acceptance, so later Workflow steps may continue. Run detail exposes delivery_pending, claimed, acknowledged, expired, cancelled, or failed rather than falsely reporting a persisted chat message.
      - The server keeps the pending delivery until acknowledgement, cancellation/deletion, or the run-content retention expiry. Expiry/cancellation terminally marks the delivery undelivered without reopening the already-completed Workflow run; WebSocket delivers immediately to active clients and unified notification links an offline owner to the pending delivery/run without including private content.
      - Delivery claim, encrypted persistence, acknowledgement, retry, and client reconnect are idempotent. Existing mismatch guards reject conflicting ciphertext and preserve candidate keys for recovery.
    ask_for_user_input:
      - prompt, input_schema, and expires_in are required; prompt/schema are Vault-encrypted and expires_in is server-bounded.
      - Execution creates a durable workflow_wait and sets the run waiting_for_input without creating a chat or message.
      - Unified notification links the owner to the Workflow run. The CLI response command and later Workflow run page call the same owner-scoped response endpoint.
      - The response validates against input_schema, is encrypted in the wait/run content, appears as steps.<step-id>.input, and resumes the accepted run once.
      - A due-wait worker atomically transitions an unresolved expired wait, step, and run to timed_out/failed with WORKFLOW_INPUT_TIMEOUT. The response acceptance and expiry transition compare the same active wait state, so only one wins.
      - Duplicate, expired, cancelled, malformed, or cross-owner responses fail visibly. Disabling does not cancel an accepted wait; run cancellation or Workflow deletion does.
    send_notification:
      - Submit one notification intent through the unified notification system rather than encoding delivery channels in Workflow YAML.
      - The notification system chooses in-app, push, and email delivery according to presence, preferences, and existing product policy.
      - The step records channel queued/skipped/failed results without exposing subscriptions or private delivery data.
  execution:
    - Every full run is accepted idempotently and pinned to one immutable Workflow version before execution.
    - Every action resolves and stores its effective typed input before dispatch.
    - Every executed action/control stores status, started/finished time, attempt, credits, provider, output shape, and encrypted retained content.
    - A failed step stops later steps and finalizes the run failed with a stable code and safe plain-language reason.
    - A branch not selected is visible as skipped without fabricating execution output.
    - Step tests create accepted run_type step_test records pinned to the tested version and execute only the selected action.
    - Side-effect step tests require a server-validated confirmation flag and idempotency key; retries, duplicate delivery, and worker recovery cannot create duplicate chat or notification effects.
    - Insufficient credits or missing confirmation fail before external side effects.
    - Create always starts disabled; update cannot make a Workflow enabled; enable is the only explicit transition to accepting runs.
    - Disable prevents new acceptance but already accepted running/waiting runs remain pinned and may finish; delete requests cancellation of active runs/waits before removing future execution state.
    - Future schedule occurrences remain trigger state and never appear as workflow_runs.
  feature_gate:
    - Static CLI help and local YAML syntax diagnostics do not require platform:workflows.
    - Authoritative validation, create, update, enable, run, and step-test require platform:workflows and fail before persistence, billing, or side effects when disabled.
  privacy_security:
    - Workflow definitions, prompts, inputs, outputs, chat content, notification bodies, replies, and named AI conversations use Automation Vault encryption and are decrypted only for authorized validation/execution/detail rendering.
    - Pending Workflow chat delivery stores content and title only as Automation Vault ciphertext until an owner client encrypts/persists the normal chat metadata/message. Push/email notifications contain no private delivery content.
    - The server never creates a raw regular chat key. An atomic owner-device claim elects one client for new-chat key generation; existing immutable chat-key, mismatch, candidate-key recovery, and encrypted-payload guards remain authoritative.
    - Ask for user input prompt, schema, response, and expiry are Automation Vault encrypted. The later web run page and CLI response command expose only owner-authorized wait metadata and input fields.
    - Plaintext storage and logs contain only allowlisted owner hashes, ids, routing/claim fields, status, timing, counts, costs, output shape, and stable error codes.
    - YAML, templates, prior step output, provider data, and AI output are untrusted inputs and cannot alter system policy or execute code.
    - Test requests use the same owner, feature, billing, provider, and action authorization as full execution.

tests:
  - id: T-PYTEST-001
    type: pytest
    file: backend/tests/test_workflow_yaml_validation.py
    command: python3 -m pytest backend/tests/test_workflow_yaml_validation.py
    covers: [AC-1, AC-2, AC-3]
    assertions:
      - safe YAML parsing rejects duplicate keys, aliases, executable tags, oversized/deep documents, and unknown fields
      - draft validity and enable readiness return stable field/step diagnostics
      - create/update repeat authoritative validation and never persist structurally invalid definitions
      - examples are excluded from readiness and persisted runtime definitions
      - normal full-run input resolution never reads examples; newly missing required input fails before dispatch/billing even if an already-enabled capability schema changes
      - complete updates preserve enabled state, incomplete updates to enabled workflows are rejected, and create/update never auto-enable
      - disabled workflow run acceptance creates no run
      - feature-off authoritative operations create no records, charges, or side effects while static help/local syntax remain available
