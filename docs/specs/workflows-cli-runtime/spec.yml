schema_version: 2
id: workflows-cli-runtime
title: Workflows CLI Runtime
status: implementing

parent_spec: docs/specs/workflows-v1/spec.yml

goal: >
  Make OpenMates workflows real and dependable from the CLI before expanding
  parity to SDK, web, or Apple clients. A non-technical user can describe one
  workflow in YAML, validate and save it as a disabled draft, enable only a
  complete workflow, execute real app skills and OpenMates actions, test any
  individual action with real billing and side effects, and inspect every run
  and step output or plain-language failure reason.

scope:
  in:
    - YAML-only workflow creation and update through the OpenMates CLI.
    - Automatic deterministic validation before create, update, enable, full run, and individual action test execution.
    - Disabled drafts that may be structurally valid while required runtime inputs are still incomplete.
    - Create always saves a disabled workflow; enable is the only transition that starts accepting runs.
    - Updating an enabled workflow preserves enabled state only when the new version is enable-ready; an incomplete update is rejected until the owner disables the workflow.
    - Enablement only when every required action input is fixed, mapped from an earlier typed output, or guaranteed by the trigger.
    - Disabled workflows cannot run through manual, schedule, or event execution.
    - Individual action tests can run for enabled, disabled, or incomplete workflows when that action can resolve test inputs.
    - Real individual action tests with normal credit charging, real provider calls, real chat messages, and real notifications.
    - Test-only example inputs from capability metadata; examples never satisfy production readiness or enter normal workflow execution.
    - A shared Workflow capability layer derived from app metadata and SkillRegistry rather than a hardcoded skill allowlist.
    - Initial app-skill actions for web.search, weather.forecast, news.search, events.search, and ai.ask in Workflow mode.
    - OpenMates actions for send_chat_message, send_notification, and Ask for user input.
    - Client-encrypted pending chat delivery: a Workflow creates an encrypted delivery request, an eligible client claims new-chat encryption, and existing chat keys remain immutable.
    - Durable Workflow input waits whose later web run-page response form and initial CLI response command use the same API.
    - Control steps named If, For every, Repeat until, and Wait, with If true and If false branch labels.
    - One trigger followed by any supported sequence or nesting of action and control steps.
    - Typed Workflow variables and deterministic date/time calculations without arbitrary code evaluation.
    - Real server-side execution while the user has no active device.
    - Real one-time and recurring scheduled execution, including due-trigger scanning, atomic claim, immutable version pinning, and recurrence advancement.
    - Durable immutable workflow versions, accepted runs, step runs, encrypted inputs/outputs, timing, costs, statuses, and plain-language failures.
    - CLI help for each app skill, OpenMates action, and control step, including inputs, outputs, cost, examples, and test commands.
  out:
    - npm SDK and pip SDK parity; these follow only after the CLI phase is fully green.
    - Web and Apple workflow parity; these follow after SDK parity. The later Workflow run page renders the existing Ask for user input API rather than defining a separate wait protocol.
    - Interactive command-by-command workflow construction in the CLI.
    - JSON as an authoring format in this phase.
    - Natural-language workflow generation or modification.
    - Workflow template sharing and import changes.
    - Connected-account app skills such as Mail or Calendar.
    - Async generation skills such as Images, Music, Video, or 3D generation.
    - User memories, interests, or preferences as implicit AI context.
    - Arbitrary code, arbitrary template expressions, unbounded loops, parallel branches, joins, or user-configured failure branches.
    - SDK, web, or Apple UI implementation and verification.
    - Event-trigger producer integration in this phase; event-trigger execution remains gated until a later contract.

context_discovery:
  github_issues:
    - No dedicated public Workflow CLI implementation issue was found in the parent workflows-v1 discovery.
  docs:
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/sdk-cli-parity-v1/spec.yml
    - docs/specs/unified-notifications/spec.yml
    - docs/architecture/apps/app-skills.md
    - docs/architecture/apps/function-calling.md
    - docs/architecture/core/security.md
    - docs/architecture/platforms/cli-package.md
    - docs/contributing/guides/testing.md
  code_patterns:
    - backend/core/api/app/services/workflow_models.py currently hardcodes weather.forecast and news.search as the only valid Workflow app skills.
    - backend/core/api/app/services/workflow_app_skill_adapter.py already dispatches through the shared in-process SkillRegistry.
    - backend/core/api/app/services/workflow_runner.py currently walks one next node at a time and does not implement real foreach, repeat-until, wait/resume, or Workflow AI conversations.
    - backend/core/api/app/services/workflow_action_adapter.py can enqueue push notifications but explicitly rejects chat creation and email notification actions.
    - backend/apps/ai/skills/ask_skill.py supports non-persisted API requests by constructing a synthetic chat identity, but it has no explicit Workflow execution mode.
    - backend/shared/python_schemas/app_metadata_schemas.py exposes class_path, tool_schema, pricing, provider, and LLM-exclusion metadata but no Workflow execution metadata.
    - frontend/packages/openmates-cli/src/cli.ts currently accepts inline graph JSON and lacks YAML create/update, deterministic help, and individual real action-test commands.
    - Existing CLI, npm, and pip Workflow tests use local mocked transport rather than real server-backed workflow execution.
  tests:
    - backend/tests/test_workflows_models.py
    - backend/tests/test_workflow_runner.py
    - backend/tests/test_workflow_scheduler_contract.py
    - frontend/packages/openmates-cli/tests/workflows.test.ts
    - frontend/packages/openmates-cli/tests/sdk-workflows.test.ts
    - packages/openmates-python/tests/test_workflows.py

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - Apple Workflow parity is intentionally deferred until CLI and then SDK parity are complete.
  verification:
    - Not required for this CLI-only phase.
  intentional_native_differences:
    - Apple may continue to lack these Workflow capabilities during this phase.

clarification:
  rounds:
    - question: What is the intended Workflow shape?
      answer: A workflow always starts with one trigger, followed by one or more action or control steps connected sequentially or nested together.
    - question: Which user-facing control-step names are required?
      answer: Use If with If true and If false branches, For every, Repeat until, and Wait. Do not expose technical graph terminology to users.
    - question: How should asking a user and sending chat output work?
      answer: Send chat message only delivers output. Ask for user input is a separate Workflow action that pauses the run and later receives structured input from the Workflow run page; the CLI phase exposes the same API through a response command.
    - question: How should a Workflow create a chat without backend-owned chat keys?
      answer: The backend creates a Vault-encrypted pending delivery and alerts an online or later-reconnecting device. One client atomically claims first encryption for a new chat, generates and persists its key and ciphertext, then acknowledges delivery; existing chats use their persisted key. The backend never generates a regular chat key.
    - question: How should individual action tests work?
      answer: Every action can execute a real Test request regardless of workflow enabled state. It uses normal billing and real side effects, records a step-test run, and uses test-only example inputs only when configured or supplied test values are absent.
    - question: May example inputs make a workflow runnable?
      answer: No. Capability example inputs are test-only and never satisfy production readiness, enablement, or full-run input resolution.
    - question: May incomplete workflows be saved?
      answer: Structurally valid incomplete workflows may be saved and updated as disabled drafts, but cannot be enabled until all required runtime inputs resolve.
    - question: May disabled workflows run manually?
      answer: No. Disabled workflows cannot run manually, on schedule, or from events; individual action tests remain available.
    - question: Which client is the first implementation target?
      answer: CLI only. SDK parity follows after the CLI is fully implemented and tested; web and Apple follow later.
    - question: Which app skills are required in the first real integration phase?
      answer: Web Search, Weather Forecast, News Search, Events Search, and AI Ask in Workflow mode.
    - question: How should Workflow AI history work?
      answer: Each AI Ask starts with fresh context by default. An optional Workflow-local conversation name can retain earlier AI inputs/outputs within the same run, stored only in encrypted Workflow run content and never linked to real chat IDs or regular chat/message records.
  vision_summary: >
    The first complete Workflow product slice is CLI-first and YAML-authored.
    It proves real app-skill, AI, chat, notification, control-flow, scheduling,
    per-action testing, client-encrypted pending chat delivery, durable user input,
    and run-inspection behavior before any SDK, web, or Apple parity work. The
    later Workflow run page renders the same durable input wait that this phase
    exposes through CLI. The product remains approachable to non-technical users
    through plain-language help and validation while the backend keeps typed
    graphs, immutable runs, encryption, billing, and idempotency deterministic.
  approved_by_user: true

