implementation_plan:
  spec_path: docs/specs/workflows-cli-runtime/spec.yml
  existing_patterns:
    - SkillRegistry and BaseApp.dispatch_skill for shared real app-skill execution.
    - Existing Workflow encrypted definitions, immutable versions, accepted runs, scheduler claims, and run-content retention from workflows-v1.
    - Existing CLI paired-session authentication and JSON output conventions.
    - Unified notification system for channel selection rather than Workflow-specific delivery logic.
    - Existing chat persistence/encryption services as the source to extract a server-side Send chat message command.
  architecture: >
    Add one authoritative Python YAML compiler/validator, generate its authoring
    schema for TypeScript local checks, and keep shared conformance fixtures for
    identical diagnostic codes and paths. Add one registry-derived Workflow
    capability model and typed executors for action and control steps. Extend the
    accepted-run engine with real step tests, bounded control flow, due-trigger
    scanning, durable user-input waits, Workflow AI mode, and safe chat and
    notification actions while preserving immutable version pinning, Automation
    Vault encryption, normal billing, and per-step inspectability. Send chat
    message creates a Vault-encrypted pending delivery, not server-encrypted chat
    content: one owner device claims new-chat encryption, uses the existing client
    key/persistence path, and acknowledges success. Ask for user input owns run
    pauses and later web run-page input rendering uses its shared response API.
  data_flow:
    - CLI parses safe YAML and requests authoritative validation.
    - Create/update compiles the YAML into an immutable typed graph and saves only structural-valid state.
    - Enable repeats readiness, capability, permission, and unattended checks without using examples.
    - Run acceptance rejects disabled workflows, pins a version, and dispatches the server worker.
    - Each step resolves typed effective input, executes a real capability/action/control, records metadata and encrypted content, then selects the next step or wait.
    - Step test accepts one selected action independently, resolves test input, performs real billing/effects, and writes an inspectable step_test run.
    - Send chat message writes a durable encrypted delivery request and returns delivery_pending; active clients receive it over WebSocket, offline clients receive a content-free notification and claim it on reconnect.
    - A new-chat delivery claim fences concurrent devices. The winner persists encrypted chat metadata/message with stable ids and acknowledges; existing-chat delivery encrypts with the persisted immutable key.
    - Ask for user input creates one encrypted workflow_wait. CLI response and the later web run page submit the same owner-scoped schema-validated response and resume it once.
    - A due-trigger scanner accepts scheduled runs independently of any client and completes or advances the claimed trigger atomically.
  affected_files:
    - path: backend/shared/python_schemas/app_metadata_schemas.py
      reason: Sparse Workflow capability metadata contract.
    - path: backend/apps/web/app.yml
      reason: Initial Web Search Workflow classification and output/test schema.
    - path: backend/apps/weather/app.yml
      reason: Initial Weather Forecast Workflow classification and output/test schema.
    - path: backend/apps/news/app.yml
      reason: Initial News Search Workflow classification and output/test schema.
    - path: backend/apps/events/app.yml
      reason: Initial Events Search Workflow classification and output/test schema.
    - path: backend/apps/ai/app.yml
      reason: AI Ask Workflow-mode classification and limits.
    - path: backend/core/api/app/services/workflow_models.py
      reason: YAML-normalized graph, readiness diagnostics, controls, run types, and typed step output contracts.
    - path: backend/core/api/app/services/workflow_yaml_compiler.py
      reason: Authoritative safe YAML parsing, compilation, typed diagnostics, and readiness checks.
    - path: frontend/packages/openmates-cli/src/generated/workflowAuthoringSchema.ts
      reason: Generated local-validation schema paired with shared server conformance fixtures.
    - path: scripts/generate_workflow_authoring_schema.py
      reason: Deterministic generator/check for the CLI authoring schema and diagnostic parity.
    - path: backend/tests/fixtures/workflow_yaml_conformance.yml
      reason: Shared valid/invalid YAML and expected diagnostic code/path fixtures consumed by Python and TypeScript tests.
    - path: backend/core/api/app/services/workflow_capability_registry.py
      reason: Registry-derived app skills, actions, controls, examples, help, and unavailable reasons.
    - path: backend/core/api/app/services/workflow_runner.py
      reason: Bounded controls, effective input resolution, failure stop, waits, and step tests.
    - path: backend/core/api/app/services/workflow_app_skill_adapter.py
      reason: Owner-scoped real dispatch and generic output contract.
    - path: backend/core/api/app/services/workflow_action_adapter.py
      reason: Real pending chat delivery, durable user-input waits, and unified notification actions.
    - path: backend/core/api/app/services/workflow_chat_delivery_service.py
      reason: Durable pending delivery, atomic new-chat claim, acknowledgement, reconnect pickup, and cancellation lifecycle.
    - path: backend/core/directus/schemas/workflow_chat_deliveries.yml
      reason: Owner-scoped encrypted pending delivery metadata, claim fencing, acknowledgement, and expiry state.
    - path: backend/core/api/app/routes/websockets.py
      reason: Authenticated online pending-delivery event and reconnect pickup.
    - path: frontend/packages/ui/src/services/chatSyncServiceHandlersAppSettings.ts
      reason: Client claim, first chat-key generation, encrypted persistence, and acknowledgement using existing chat key safeguards.
    - path: backend/apps/ai/skills/ask_skill.py
      reason: Explicit Workflow mode separated from normal and incognito chat lifecycle.
    - path: backend/core/api/app/routes/workflows.py
      reason: Validation, YAML create/update, enable readiness, disabled-run rejection, step test, help, and run detail APIs.
    - path: backend/core/api/app/tasks/workflow_tasks.py
      reason: Accepted full-run, wait/resume, and step-test worker entry points.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: YAML lifecycle, help, step-test, and inspectable run commands.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI transport models for validation, capabilities, response waits, pending-delivery pickup, claim, encrypted persistence, acknowledgement, and run detail.
    - path: scripts/audit_sdk_cli_parity.py
      reason: Deterministically accept only the exact spec-approved staged npm/pip deferrals while rejecting unrelated parity regressions.
    - path: backend/tests/test_workflow_chat_delivery.py
      reason: Atomic first-client claim, existing-key delivery, encrypted persistence, acknowledgement, retries, and multi-device safety contract.
  verification_strategy:
    - Write and run all listed pytest and CLI unit tests red before production implementation.
    - Implement shared metadata/validation first, runtime/control/Workflow input second, pending chat delivery/AI/actions third, and CLI commands fourth.
    - Deploy backend and CLI subject to dev before any real CLI E2E green run.
    - Run real E2E in CLI order: rain, AI/chat, action tests, then search/control coverage.
    - Run the scheduled CLI proof after the runtime scanner is deployed and no client remains connected.
    - Record npm and pip implementation as explicitly deferred by product scope; the Playwright harness is only a remote CLI process runner and performs no web UI verification.
    - Run python3 scripts/audit_sdk_cli_parity.py --approved-deferrals docs/specs/workflows-cli-runtime/spec.yml and accept only the recorded staged SDK deferrals.
    - Run python3 scripts/spec_verify.py docs/specs/workflows-cli-runtime/spec.yml before declaring the CLI phase complete.
  verification_order:
    - Backend deterministic unit contracts.
    - CLI parser/help/unit contracts.
    - Deploy and wait for the dev subject to be ready.
    - Real CLI rain workflow.
    - Real CLI Workflow AI, pending-chat delivery, and user-input wait workflow.
    - Real individual action tests.
    - Real search skills and bounded controls.
    - Real scheduled execution with the client disconnected.
  required_assumptions: [A-1, A-2, A-3, A-4, A-5]
  open_questions: []
  risks:
    - Real provider E2E can fail from external outages; retain provider/error evidence and distinguish product failures from external availability without substituting mocks.
    - Real notification/chat action tests create user-visible side effects; use dedicated test identities, explicit confirmation, unique labels, and cleanup where deletion is safe.
    - AI Ask currently assumes chat-oriented processing; partial reuse could accidentally persist synthetic chat state or enable tools.
    - Existing Workflow persistence and scheduler work is concurrent in workflows-v1; implementation must rebase on its verified subject instead of duplicating or reverting it.
    - A pending delivery that is never claimed must remain content-private and visible as delivery_pending, not be misreported as a persisted chat message.

