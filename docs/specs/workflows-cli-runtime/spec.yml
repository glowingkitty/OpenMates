scenarios:
  - id: S-1
    title: User validates and saves an incomplete YAML draft
    given:
      - Alice is paired with the OpenMates CLI.
      - daily-rain.yml contains one daily trigger, Weather Forecast, an If check, and Send notification.
      - The Weather location input is empty.
    when:
      - Alice runs openmates workflows validate --file daily-rain.yml.
      - Alice runs openmates workflows create --file daily-rain.yml.
    then:
      - Validation reports that the structure is valid but the workflow is not ready to enable.
      - The missing Weather location is identified by step id, field, expected type, and a relevant help command.
      - The workflow is saved as a disabled draft after server-side validation repeats the same structural checks.
      - Test-only example values are not copied into the saved Workflow definition.

  - id: S-2
    title: User cannot enable or run an incomplete or disabled workflow
    given:
      - Alice owns the incomplete disabled Daily rain alert draft.
    when:
      - Alice tries to enable it.
      - Alice tries to run it while disabled.
    then:
      - Enablement fails with the unresolved required input list.
      - Full execution fails because disabled workflows cannot run.
      - No workflow_run is created for either rejected request.
      - Disabling an already running or waiting run does not mutate its pinned version or prevent its authorized completion.

  - id: S-3
    title: User enables and runs a real daily rain notification
    given:
      - Alice updates daily-rain.yml with location Berlin and a valid daily schedule.
      - The graph uses Weather Forecast followed by a typed If condition.
      - If true runs Send notification and If false is empty and displayed as Do nothing.
    when:
      - Alice updates, enables, and manually runs the workflow.
    then:
      - Weather Forecast calls the real existing app skill and charges its normal credits.
      - The If condition evaluates typed Weather output deterministically.
      - If true, Send notification submits one real notification through the unified notification system.
      - If false, the run completes without sending a notification.
      - Run and step history records actual inputs, outputs, provider, credits, timing, selected branch, and status.
      - Integration verification uses one threshold below the output minimum and one above its maximum so both branches are deterministic while Weather remains a real provider request.

  - id: S-4
    title: Workflow AI creates a client-encrypted weather chat delivery
    given:
      - Alice creates a YAML workflow with Weather Forecast, AI Ask, and Send chat message.
      - AI Ask has no conversation name.
      - Send chat message has no chat_id and includes a title.
    when:
      - Alice enables and runs the workflow.
    then:
      - AI Ask runs in explicit Workflow mode with fresh context and receives only its configured instruction and mapped Weather data.
      - AI Ask creates no regular chat or message record.
      - Send chat message accepts one Vault-encrypted pending delivery with stable chat, message, and delivery ids.
      - An online client or a later reconnecting client atomically claims the new-chat delivery, generates the regular chat key locally, encrypts/persists title and message, and acknowledges delivery.
      - The backend never creates or persists a raw regular chat key.
      - Other devices wait for the persisted encrypted chat metadata and use its immutable key instead of generating a competing key.
      - The run records chat, message, delivery, claim, and acknowledgement state in encrypted step output.

  - id: S-5
    title: User searches events and supplies input through the Workflow run
    given:
      - Alice creates a weekly workflow with Events Search, AI Ask, and Ask for user input.
      - The AI instruction explicitly contains the interests relevant to ranking; no memory data is loaded.
    when:
      - The workflow reaches Ask for user input with a structured response schema and expiry.
      - Alice submits the response through openmates workflows respond <workflow-id> <run-id> <step-id> --input <json>.
    then:
      - The run enters waiting_for_input and exposes the waiting step in CLI run detail.
      - The normal notification system links Alice to the Workflow run.
      - The owner-authorized, schema-valid response resumes exactly that run once.
      - A later AI Ask can consume the typed response through steps.<step-id>.input.
      - Duplicate, expired, cross-owner, malformed, or cancelled responses are rejected without another continuation.
      - The later web run page uses the same response API and schema to render its input form.

  - id: S-6
    title: User continues Workflow AI context without creating a chat history
    given:
      - Two AI Ask actions use conversation weekend-planning in one run.
    when:
      - The second AI Ask executes after the first.
    then:
      - The second action receives the earlier Workflow AI exchange plus its new explicit inputs.
      - The conversation is scoped to that run and cannot reference a real chat id.
      - Conversation inputs and outputs are retained only in encrypted Workflow run content and expire with run-content retention.

  - id: S-7
    title: User tests any individual action with real execution
    given:
      - Alice owns a disabled incomplete workflow.
      - One Weather action has no configured location.
      - Weather capability metadata contains a test-only example location.
    when:
      - Alice runs openmates workflows step-test <workflow-id> forecast.
      - Alice later supplies --input with a different location.
    then:
      - The first test executes the real Weather skill using the capability example input.
      - The second test executes with the supplied override.
      - Both tests charge normal credits and create inspectable step_test run records pinned to the tested Workflow version and step id.
      - The example and override never modify the Workflow definition or make it enable-ready.
      - Testing a mapped input never executes upstream steps implicitly.

  - id: S-8
    title: User tests real side-effect actions
    given:
      - Alice owns a workflow containing Send notification and Send chat message.
    when:
      - Alice confirms each step test or supplies --yes.
    then:
      - Send notification sends a real notification through the unified system.
      - Send chat message accepts a real pending delivery and an online paired client persists the encrypted message; an existing chat uses its persisted key.
      - Each test is normally billed where applicable and records the actual result or failure.
      - Without confirmation, non-interactive side-effect tests fail closed without execution.

  - id: S-9
    title: User reads help for every Workflow building block
    given:
      - Alice does not know the internal graph schema.
    when:
      - Alice requests help for events.search, send-chat-message, and If.
    then:
      - Help uses plain language and includes availability, real-test support, cost, required and optional inputs, typed outputs, defaults, YAML example, and test command.
      - App-skill help is generated from the same metadata used by validation and execution.
      - Unknown capabilities return nearby valid identifiers and the capabilities command.

  - id: S-10
    title: User uses deterministic date and time calculations
    given:
      - A schedule crosses a timezone or daylight-saving boundary.
      - A YAML input references run.scheduled_at with date filters.
    when:
      - The workflow is validated and run.
    then:
      - Expressions use an allowlisted template grammar and typed date operations rather than arbitrary code.
      - run.scheduled_at and run.started_at are immutable for the run.
      - clock.now is resolved and saved each time it is explicitly used.
      - Invalid operations fail validation with the expression location and supported alternatives.

  - id: S-11
    title: User inspects successful and failed runs from CLI
    given:
      - Alice has completed, failed, waiting, and step-test runs.
    when:
      - Alice runs workflows runs and workflows run-show.
    then:
      - Run lists distinguish manual, scheduled, event, and step_test runs.
      - Run detail shows each executed step, skipped branch, waiting state, actual encrypted-content output, credits, duration, and provider where applicable.
      - A failed action stops later actions and records one safe plain-language reason plus a stable technical error code.
      - Missing or expired retained content is explicit and never replaced with fabricated output.

  - id: S-12
    title: Capability metadata enables the first five app skills
    given:
      - SkillRegistry has registered web.search, weather.forecast, news.search, events.search, and ai.ask.
    when:
      - Alice requests Workflow capabilities or validates YAML using those skills.
    then:
      - All five are available without adding skill-specific branches to Workflow graph validation.
      - Their Workflow eligibility, execution mode, effect classification, test example, input schema, output schema, and cost are metadata-derived.
      - Internal, connected-account, mutation, or async-generation skills remain unavailable with an explicit reason in this phase.

  - id: S-13
    title: Scheduler runs an enabled workflow while no client is connected
    given:
      - Alice has enabled a complete one-time Weather workflow due in the near future.
      - Alice closes the CLI and has no connected browser or app.
    when:
      - The due-trigger scanner finds the indexed occurrence.
      - Two workers contend for the same trigger claim.
    then:
      - Exactly one worker atomically accepts one run pinned to the trigger version.
      - The real Weather action executes and is billed normally without an active client.
      - A one-time trigger becomes complete and cannot be claimed again; recurring triggers advance next_run_at atomically.
      - Future occurrences are trigger state and never pre-created run rows.

  - id: S-14
    title: User runs bounded control steps
    given:
      - Alice has valid examples using If, For every, Repeat until, and Wait.
    when:
      - For every receives empty and non-empty lists.
      - Repeat until matches immediately and also reaches max_attempts.
      - Wait receives a future duration and an already-past absolute time.
    then:
      - Empty For every completes with zero iterations and typed empty aggregate output.
      - Each iteration has a stable item value, index, step history, and aggregate credit/time accounting.
      - Repeat until checks after each iteration, records each attempt, and fails visibly with REPEAT_LIMIT_REACHED when the condition never matches.
      - Wait resumes once at or after the requested instant, and cancellation prevents later continuation.
      - Nested repetition remains within one aggregate workflow item/attempt/credit/duration ceiling.

  - id: S-15
    title: Feature gate blocks Workflow operations without hiding help
    given:
      - platform:workflows is disabled for Alice.
    when:
      - Alice requests help or local YAML syntax validation.
      - Alice requests authoritative validation, create, update, enable, run, or step-test.
    then:
      - Static help and local syntax diagnostics remain available.
      - Every authenticated server operation rejects with FEATURE_DISABLED and creates no workflow, run, charge, chat, or notification.

