schema_version: 2
id: rest-api-security-hardening
title: REST API Security Hardening
status: implementing

goal: >
  Harden the OpenMates REST API and WebSocket contract so every externally
  reachable endpoint has an explicit access classification, auth model,
  owner/team scope check, rate or budget control, and encryption-boundary rule.
  The first implementation slice must fail closed for uncertain developer/API-key
  access, then reopen endpoints only when tests prove intended API behavior still
  works and unauthorized, cross-user, over-scope, and over-limit access is denied.
  Developer REST should get as close as possible to full web/CLI/SDK/Apple feature
  parity for endpoints that do not touch client-side encrypted data and are not
  sensitive account-security actions, while endpoints that do touch client-side
  encrypted data remain official-client-only surfaces.

scope:
  in:
    - Inventory every FastAPI route registered in `backend/core/api/main.py` and
      every path exposed by dev/prod Caddy API allowlists.
    - Classify each externally reachable route as unauthenticated public REST API,
      developer API-key REST API, first-party client surface only, or internal-only.
    - >
      Inventory every endpoint used by the web app, CLI, npm SDK, pip SDK, and
      Apple app and classify whether it touches client-side encrypted data,
      performs a sensitive account-security action, or is safe for public
      developer REST parity.
    - Add a deterministic route/access audit that fails when a Caddy-exposed route
      lacks classification, auth dependency, rate-limit/budget control, or an
      explicit reviewed exception.
    - Fail closed for uncertain developer/API-key access to encrypted product
      surfaces until a route-specific scope, limit, and test exists.
    - >
      Exclude client-side encrypted endpoints from the public developer REST API,
      even when those endpoints are used by the web app, CLI, SDK, or Apple app;
      those routes remain official-client-only surfaces unless a separate approved
      SDK/CLI encryption contract explicitly preserves opaque encrypted payloads.
    - >
      Preserve or add public developer REST access for endpoints used by the web
      app, CLI, SDK, or Apple app when they do not touch client-side encrypted
      content and are not sensitive account-security actions, so the developer API
      covers the full feature set as closely as safely possible.
    - >
      Keep workflow template access and modification available through scoped
      developer REST because workflow templates are not client-side encrypted;
      chat, message, encrypted memory, encrypted task content, encrypted files,
      key material, and sync material stay excluded from public developer REST.
    - >
      Preserve intended developer APIs: app-skill REST calls, SDK session/chats,
      OpenAI-compatible `/v1/models` and `/v1/chat/completions`, documented
      public metadata/docs routes, webhooks, and approved account portability
      endpoints.
    - Add direct REST/WebSocket tests before CLI/SDK/web tests for all changed
      shared product behavior.
    - Add or update API-key scope enforcement for product APIs that currently use
      generic session-or-API-key auth without route-specific scope checks.
    - Add route-level rate limits or explicit budget guards for all externally
      reachable routes that can do meaningful work or expensive reads.
    - Add ownership binding for async task polling so a valid user/API key cannot
      read another user's task result by knowing a task id.
    - Tighten account import endpoints because they transiently handle plaintext
      imported chats before client-side encrypted persistence.
    - Align dev and prod Caddy allowlists or add a deterministic mismatch audit
      that requires an explicit dev-only/prod-only justification per path.
    - >
      Update `docs/architecture/apps/rest-api.md` to reflect the new access
      taxonomy, REST/API-first verification ladder, concrete developer examples,
      scope requirements, request/response envelopes, typed error shapes, rate
      limit behavior, async polling contracts, and encryption-boundary rules.
  out:
    - Redesigning the entire API-key product UI.
    - Removing approved public endpoints such as geocode, analytics beacon,
      default inspirations, public docs, share GET routes, or status endpoints
      when their access model is explicitly documented and tested.
    - Replacing the SDK encrypted chat APIs with a different encryption protocol.
    - Rewriting app-skill dispatch or OpenAI-compatible chat completion behavior.
    - >
      Exposing client-side encrypted chat/message/memory/task/file/key/sync
      material or sensitive account-security actions such as passkey deletion as
      generic public developer REST endpoints.
    - Changing Apple app behavior beyond confirming no accidental API contract
      regression for shared authenticated surfaces.
    - Bulk migration of older specs that still say CLI-first; this spec only
      governs the hardening work and the current instruction update.

context_discovery:
  github_issues:
    - "GitHub MCP `get_me` failed with 401 Bad credentials during discovery."
    - "Fallback command `gh issue list --repo glowingkitty/OpenMates --search 'REST API security auth rate limit API key scope encryption' --state all --limit 20 --json number,title,state,labels,url` returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/contributing/guides/testing.md
    - docs/architecture/apps/rest-api.md
    - docs/specs/sdk-packages-v1/spec.yml
    - docs/specs/openai-compatible-api/spec.yml
    - docs/specs/account-export-v1/spec.yml
    - docs/specs/account-import-v1/spec.yml
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/tasks-v1/spec.yml
  code_patterns:
    - "`backend/core/api/main.py` registers all API routers and controls OpenAPI schema exposure."
    - "`deployment/dev_server/Caddyfile` and `deployment/prod_server/Caddyfile` are the external path allowlists before FastAPI auth runs."
    - "`backend/core/api/app/routes/auth_routes/auth_dependencies.py:get_current_user_or_api_key` authenticates API keys but returns only `User`, losing API-key metadata and scopes."
    - "`backend/core/api/app/routes/apps_api.py:get_session_or_api_key_info` preserves API-key metadata for app-skill and OpenAI-compatible billing/scope checks."
    - "`backend/core/api/app/routes/sdk.py` uses `_authenticate_sdk_request` plus explicit `ApiKeyAuthorizationService` scope checks for `/v1/sdk/*` encrypted chat operations."
    - "`backend/core/api/app/services/limiter.py` has no global default limits; externally reachable routes need explicit `@limiter.limit(...)` or explicit budget controls."
    - "`backend/core/api/app/routes/tasks_api.py` returns raw Celery task result by task id after auth but does not bind the task to the authenticated owner."
    - "`backend/core/api/app/routes/account_imports.py` handles transient plaintext import scans without visible route-level rate limits."
    - "`backend/core/api/app/routes/workflows.py` exposes workflow CRUD/run/test APIs with session-or-API-key auth and no visible route-level rate limits."
    - "`backend/core/api/app/routes/profile_api.py` intentionally decrypts profile images for any authenticated caller; this is allowed only if explicitly classified as authenticated public-profile media."
  tests:
    - backend/tests/test_auth_dependencies.py
    - backend/tests/test_api_key_scopes.py
    - backend/tests/test_apps_api.py
    - backend/tests/test_rest_api_ai.py
    - backend/tests/test_rest_api_events.py
    - backend/tests/test_webhook_auth.py
    - backend/tests/test_webhook_incoming.py
    - frontend/packages/openmates-cli/tests/sdk.test.ts
    - frontend/packages/openmates-cli/tests/sdk-workflows.test.ts
    - packages/openmates-python/tests/test_sdk.py
    - packages/openmates-python/tests/test_workflows.py
  verified_assumptions:
    - id: VA-1
      status: confirmed
      finding: Generic session-or-API-key auth drops API-key metadata and therefore cannot enforce scoped API-key access by itself.
      evidence: backend/core/api/app/routes/auth_routes/auth_dependencies.py:331
    - id: VA-2
      status: confirmed
      finding: "Workflows routes use generic session-or-API-key auth, are schema-included, and lack visible `@limiter.limit(...)` decorators."
      evidence: backend/core/api/app/routes/workflows.py:325
    - id: VA-3
      status: confirmed
      finding: "Celery task polling returns raw `AsyncResult.result` by task id without owner binding in the route."
      evidence: backend/core/api/app/routes/tasks_api.py:43
    - id: VA-4
      status: confirmed
      finding: Account import routes can process transient plaintext and lack visible route-level rate limits.
      evidence: backend/core/api/app/routes/account_imports.py:90
    - id: VA-5
      status: revised
      finding: "`/v1/chats` and `/v1/ideabucket` primary routes are session-authenticated, while `/v1/sdk/*` is the scoped API-key surface. Caddy still exposes first-party paths externally so FastAPI remains the boundary."
      evidence: backend/core/api/app/routes/chats.py:70; backend/core/api/app/routes/ideabucket.py:195; deployment/dev_server/Caddyfile:127
    - id: VA-6
      status: revised
      finding: Profile image server-side decryption is intentionally any-authenticated-user access, not necessarily a bug, but needs explicit classification and regression tests.
      evidence: backend/core/api/app/routes/profile_api.py:11
    - id: VA-7
      status: confirmed
      finding: Public docs routes are unauthenticated and lack route-level rate limits.
      evidence: backend/core/api/app/routes/docs_routes.py:111
    - id: VA-8
      status: confirmed
      finding: Dev and prod Caddy allowlists differ materially, so dev API proof can pass for paths not reachable in prod unless the difference is intentional and audited.
      evidence: deployment/dev_server/Caddyfile:127; deployment/prod_server/Caddyfile:124

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This is a backend/API security hardening spec. Apple continues using first-party session/device auth and should not gain API-key access to encrypted product routes.
    - If a route used by Apple is made stricter, Apple impact must be reclassified before implementation and the relevant remote Mac build/test attempted.
  verification:
    - Apple not affected for the initial fail-closed REST/API hardening slice unless implementation changes first-party Apple-consumed auth/session routes.
  intentional_native_differences:
    - Apple is a first-party client and must not be treated as a public/developer REST API consumer.

clarification:
  rounds:
    - question: "Should the first implementation slice be a strict safety pass that may temporarily remove or block developer API access for uncertain encrypted/product endpoints until each endpoint has explicit scopes, limits, and tests?"
      answer: Strict first.
    - question: "Confirm the product contract direction: strict fail-closed first for uncertain REST/API access, then endpoint-by-endpoint reopening with explicit scopes, rate/budget limits, encryption-boundary rules, and regression tests?"
      answer: Confirmed.
  vision_summary: >
    The REST/API surface should be safe by default, even if that temporarily blocks
    uncertain developer access while endpoints are classified and tested. The final
    system should preserve intended public/developer/first-party APIs, but only
    after tests prove both successful expected use and security denial behavior.
  approved_by_user: true

decisions:
  - id: D-1
    status: active
    decision: Use a strict fail-closed first slice for uncertain developer/API-key access to encrypted or plaintext-sensitive product routes.
    reason: It is safer to temporarily block ambiguous API exposure than to keep broad access to encrypted chat, memory, file, key, sync, share, import, workflow, or task material.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-2
    status: active
    decision: REST/API tests are the first required verification gate before CLI, SDK, web, or Apple evidence.
    reason: Direct route tests isolate auth, scope, Caddy exposure, rate limits, and encryption-boundary behavior before downstream clients add complexity.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-3
    status: active
    decision: API-key authorization must preserve metadata at the route boundary or use a dependency that returns a typed authenticated principal including session/API-key source and scopes.
    reason: "Returning only `User` prevents product routes from distinguishing full-access keys from limited keys and from enforcing per-surface scopes."
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-4
    status: active
    decision: Caddy dev/prod allowlist differences must be audited as code, not tracked by comments only.
    reason: A route that passes on dev but is blocked in prod causes false confidence in REST/API verification.
    decided_at: "2026-07-20T00:00:00Z"
  - id: D-5
    status: active
    decision: Public developer REST must pursue maximum safe parity with web, CLI, SDK, and Apple for non-client-side-encrypted, non-account-security endpoints, while client-side encrypted data endpoints and sensitive account-security actions stay official-client-only.
    reason: Developers need broad feature coverage, but generic REST access must not weaken zero-knowledge guarantees or expose destructive credential/security operations such as passkey deletion.
    decided_at: "2026-07-20T00:00:00Z"

scenarios:
  - id: S-1
    title: Unclassified API-key access fails closed
    given:
      - Alice has an approved API key with full access.
      - An externally reachable product endpoint handles encrypted chat, task, plan, workflow, memory, file, key, sync, share, or transient plaintext data.
      - The endpoint has not been classified with a developer API scope and rate/budget contract.
    when:
      - Alice calls the endpoint from a no-Origin REST client with `Authorization: Bearer <API_KEY>`.
    then:
      - The request returns 403 with a typed error such as `developer_api_access_not_classified`.
      - The endpoint remains available to approved first-party session clients only when its first-party auth contract is already explicit.

  - id: S-2
    title: Scoped API keys can use approved developer endpoints
    given:
      - Alice has an approved API key with only the scope needed for one approved surface.
      - The endpoint is classified as developer API-key REST API and has a documented scope.
    when:
      - Alice calls the endpoint within its rate/budget limit.
    then:
      - The request succeeds with the same response shape as before hardening.
      - A key missing the required scope receives 403 with the missing scope.
      - A key over budget receives a typed budget error where the endpoint spends credits.

  - id: S-3
    title: First-party encrypted product routes remain usable but not broad public APIs
    given:
      - Alice is logged in through a web/CLI/native session.
      - Alice calls `/v1/chats`, `/v1/sync/offline-prefetch`, `/v1/user-tasks`, `/v1/user-plans`, or another first-party encrypted product route.
    when:
      - The request carries valid first-party session/device auth.
    then:
      - The route returns only Alice-owned encrypted data or safe metadata.
      - The same route rejects unauthenticated callers.
      - Developer API-key access is rejected unless the endpoint has an explicit developer scope and test.

  - id: S-4
    title: Task polling cannot leak another user's async result
    given:
      - Alice starts a long-running app-skill task and receives task id `task_a`.
      - Bob has a valid session or approved API key.
    when:
      - Bob calls `GET /v1/tasks/task_a`.
    then:
      - The response is 404 or 403 and does not include Alice's raw Celery result or error details.
      - Alice can still poll `task_a` successfully.

  - id: S-5
    title: Account import plaintext scan is bounded and non-durable
    given:
      - Alice uploads a selected import batch containing plaintext source messages.
    when:
      - Alice calls the import scan endpoint through an approved first-party or explicitly scoped API-key flow.
    then:
      - The request is size-limited, rate-limited, and budget checked where applicable.
      - Plaintext is not logged, persisted, or returned except for the minimum reviewed scan result contract.
      - Unauthenticated, unscoped, over-limit, and oversized requests fail with typed errors.

  - id: S-6
    title: Public endpoints stay public but bounded
    given:
      - A user is unauthenticated.
    when:
      - The user calls approved public endpoints such as geocode, analytics beacon, default inspirations, status, share GET routes, or docs.
    then:
      - The endpoint behaves as documented without auth.
      - The endpoint has a route-level rate limit or an explicit reviewed exception.
      - The endpoint does not expose private user data, decrypted plaintext, API keys, presigned private URLs, or share URL fragments.

  - id: S-7
    title: Dev and prod route exposure are intentionally aligned
    given:
      - A route is added to dev Caddy's public API allowlist.
    when:
      - The route inventory audit compares dev and prod Caddyfiles.
    then:
      - The route is also present in prod or listed in a reviewed dev-only exception table.
      - API verification records whether the tested route is expected to be reachable in production.

  - id: S-8
    title: Developer REST reaches safe feature parity without exposing encrypted data
    given:
      - A feature is available through the web app, CLI, SDK, or Apple app.
      - The backing endpoint is reachable through FastAPI or Caddy.
    when:
      - The route inventory classifies the endpoint for public developer REST exposure.
    then:
      - Endpoints that touch client-side encrypted chat, message, memory, task, file, key, sync, or share material are excluded from public developer REST and marked official-client-only.
      - Sensitive account-security actions such as passkey deletion, two-factor secret changes, recovery-key changes, password changes, and account deletion are excluded from public developer REST unless a separate approved spec grants a constrained flow.
      - Endpoints that do not touch client-side encrypted content and are not sensitive account-security actions are exposed or preserved through scoped developer REST whenever feasible.
      - Workflow template list/create/update/delete remains available through scoped developer REST because workflow templates are not client-side encrypted.
      - Chat, message, encrypted task content, encrypted memory, encrypted files, key material, and encrypted sync payloads remain web/CLI/SDK/Apple official-client surfaces only.

acceptance_criteria:
