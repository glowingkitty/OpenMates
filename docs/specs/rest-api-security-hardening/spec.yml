    scenario: S-7
    text: Every route exposed by dev or prod Caddy has an explicit access classification and owner/team/encryption-boundary metadata in a deterministic inventory.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-ROUTE-INVENTORY-AUDIT]
  - id: AC-2
    scenario: S-1
    text: Routes that use generic session-or-API-key auth cannot accept API-key requests unless route-specific scope enforcement has access to API-key metadata.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-AUTH-PRINCIPAL-UNIT, T-API-SCOPE-DENIAL-DEV]
  - id: AC-3
    scenario: S-2
    text: Workflows API routes enforce explicit rate limits and API-key scopes before CRUD, run, step-test, or run-response behavior is available to developer keys.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-WORKFLOWS-SCOPE-RATE]
  - id: AC-4
    scenario: S-4
    text: Celery task polling proves owner binding and cannot return another user's task result to a valid but unauthorized caller.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: related_backend
