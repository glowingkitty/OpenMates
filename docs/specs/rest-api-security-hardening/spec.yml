    verification_ids: [T-ACCOUNT-IMPORT-HARDENING]
  - id: AC-6
    scenario: S-2
    text: Intended public/developer APIs still work after hardening, including app-skill REST, SDK session/chats, OpenAI-compatible models/chat completions, webhooks, public docs, geocode, analytics, status, and approved account export/import flows.
