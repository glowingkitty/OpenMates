  - id: R-1
    severity: high
    risk: Strict fail-closed changes can temporarily block developer workflows that currently depend on broad API-key access.
    mitigation: Preserve app-skill, SDK, OpenAI-compatible, webhook, and approved portability surfaces with explicit tests; record user confirmation for changed availability.
  - id: R-2
    severity: high
    risk: Route inventory audits can produce noisy false positives for dynamic routes or method-specific public/private behavior.
    mitigation: Support reviewed exception entries with owner, reason, expiry/review date, and method-level matching.
  - id: R-3
    severity: medium
    risk: Adding per-route rate limits can break high-frequency legitimate polling or streaming flows.
    mitigation: Use endpoint-specific limits, preserve streaming/WebSocket behavior, and include intended-surface REST/CLI/SDK smokes.
  - id: R-4
    severity: medium
    risk: Task ownership binding may require task metadata not currently stored with Celery results.
    mitigation: Add a task owner registry at creation time or signed task tokens; fail closed when owner metadata is absent unless a legacy migration exception is approved.

