implementation_plan:
  status: implementing
  spec_path: docs/specs/rest-api-security-hardening/spec.yml
  architecture: >
    Add a deterministic REST API surface inventory that joins FastAPI routes,
    Caddy exposure, auth dependencies, API-key scopes, rate/budget controls,
    ownership checks, and encryption-boundary classification. Use that inventory
    to fail closed for ambiguous developer REST access, then reopen safe
    non-client-side-encrypted endpoints with explicit scopes, tests, and docs.
  existing_patterns:
    - "`apps_api.py` preserves API-key metadata for scoped app-skill and OpenAI-compatible calls."
    - "`sdk.py` authenticates official SDK encrypted routes separately from generic public developer REST."
    - "`limiter.py` requires explicit route-level or custom limits because there is no global default."
    - "Architecture docs use frontmatter claims verified by `scripts/tests/test_architecture_*` tests."
  data_flow:
    - FastAPI and Caddy route inventory classify each route before authorization behavior changes.
    - Session/device clients keep first-party access to encrypted product routes.
    - Developer API keys reach only scoped, rate/budget-limited, safe developer REST surfaces by default.
    - Official CLI/SDK encrypted routes remain separate from generic public developer REST and preserve opaque client-side encrypted payloads.
  affected_files:
    - path: scripts/audit_rest_api_surface.py
      reason: New deterministic route/access/safe-parity audit.
    - path: backend/core/api/app/routes/auth_routes/auth_dependencies.py
      reason: Preserve API-key metadata where route-level scopes are enforced.
    - path: backend/core/api/app/services/api_key_authorization.py
      reason: Centralize scope checks and denial behavior for developer REST surfaces.
    - path: backend/core/api/app/routes/workflows.py
      reason: Keep non-encrypted workflow template CRUD available through scoped developer REST with limits.
    - path: backend/core/api/app/routes/tasks_api.py
      reason: Bind async task polling to authenticated owners before returning results.
    - path: backend/core/api/app/routes/account_imports.py
      reason: Bound plaintext import scans and API-key exposure.
    - path: deployment/dev_server/Caddyfile
      reason: Audit externally exposed dev API paths.
    - path: deployment/prod_server/Caddyfile
      reason: Audit prod exposure parity with dev.
    - path: docs/architecture/apps/rest-api.md
      reason: Document access taxonomy, safe parity, examples, types, errors, scopes, and encryption boundaries.
  verification_strategy:
    - Run the route inventory audit red before implementation and green after classifications/guards exist.
    - Run backend pytest for auth metadata, workflows, task ownership, and account import hardening.
    - Run direct dev-server REST smokes before CLI, npm SDK, pip SDK, web, user confirmation, or Apple checks.
    - Run docs static/behavioral claim tests after updating developer REST documentation.
  verification_order:
    - Route inventory and safe-parity audit red phase.
    - Backend auth/scope/ownership/rate-limit pytest red phase.
    - Implementation and local backend green checks.
    - Direct REST dev-server smoke after restarting affected Docker services.
    - CLI, npm SDK, and pip SDK live smokes against `https://api.dev.openmates.org`.
    - Documentation claim tests and user confirmation.
    - Current live dev blockers: task/workflow platform feature gates prevent full CLI task and workflow CRUD smokes, and the combined SDK live smoke fails on temporary API-key device approval/retry before npm/pip assertions.
  first_slice: >
    Build `scripts/audit_rest_api_surface.py` with enough inventory metadata to
    fail on current unclassified Caddy/FastAPI exposure, distinguish generic
    public developer REST from official SDK/CLI encrypted routes, and prove the
    safe-parity exclusions for client-side encrypted data and sensitive
    account-security actions before changing route behavior.
  api_impacts:
    - Developer REST access becomes explicit and scoped by route group instead of implied by any session-or-API-key dependency.
    - Workflow template CRUD is preserved as scoped developer REST because templates are not client-side encrypted.
    - Generic developer REST denies client-side encrypted data endpoints and sensitive account-security actions with typed 403 errors.
    - Official CLI/SDK encrypted endpoints remain available only through their approved encrypted protocol and are documented separately from generic developer REST.
  privacy_security_impacts:
    - Client-side encrypted chat, message, memory, user task, file, key, sync, and share-secret material must not become generic developer REST payloads.
    - Plaintext account-import scanning remains bounded, non-durable, and rate-limited.
    - Account-security operations such as passkey deletion and two-factor secret changes stay first-party or explicitly constrained flows.
    - Route docs must identify any server-side decryption exception, such as approved profile media or generated assets, separately from zero-knowledge chat/memory data.
  migration_rollout:
    - No database migration is planned for the initial audit slice.
    - Task ownership binding may require a task owner registry or signed task token before green implementation; fail closed for missing metadata unless a reviewed legacy exception is added.
    - Deploy backend changes to the local dev Docker API service before live REST/CLI/SDK smokes against `https://api.dev.openmates.org`.
  observability:
    - Log typed denial reasons without plaintext payloads, decrypted data, API keys, passkey material, or share fragments.
    - Preserve existing auth/rate-limit/compliance logging for developer API-key access.
    - Add audit output that lists route group, method, access model, scope, rate/budget control, Caddy exposure, and safe-parity classification.
  required_assumption_checks:
    - Confirm exact workflow template route methods and payload fields before marking workflow CRUD as public developer REST.
    - Confirm which task endpoints store client-side encrypted content versus non-encrypted async skill polling metadata.
    - Confirm generated file/embed download routes do not leak client-side encrypted user files before developer REST exposure.
    - Confirm passkey, 2FA, password, account deletion, and API-key secret routes are excluded or covered by a separate constrained-flow spec.
  phases:
    - id: P-1
      title: Route inventory and fail-closed guardrails
      description: Build the deterministic audit and add conservative blocking for unclassified developer/API-key access to sensitive routes.
      exit_criteria: [AC-1, AC-2, AC-7, AC-9]
    - id: P-2
      title: Scope/rate/ownership fixes for high-risk routes
