    text: REST API architecture docs and developer-facing reference docs describe the hardened access taxonomy, REST/API-first phase gate, concrete examples, request/response bodies, async task polling, scope names, rate-limit headers/errors, typed error variants, and encryption-boundary rules for each externally supported surface.
    required: true
    status: blocked
    coverage_status: blocked
    verification_scope: custom
    verification_ids: [T-DOCS-ARCHITECTURE]
  - id: AC-9
    scenario: S-8
    text: Every endpoint shared with web, CLI, SDK, or Apple is classified for safe parity; non-client-side-encrypted and non-account-security feature endpoints are exposed or preserved through scoped developer REST where feasible, while client-side encrypted data endpoints and sensitive account-security actions are excluded from public developer REST.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-DEVELOPER-REST-SAFE-PARITY, T-REST-SMOKE-DEV]

contracts:
  access_models:
    - id: public_rest
      name: Unauthenticated public REST API
      allowed_auth: none_optional
      requirements:
        - No private user data, decrypted plaintext, keys, token secrets, share fragments, or user-specific presigned private URLs.
        - Route-level rate limit or explicit low-risk reviewed exception.
        - CORS behavior intentionally supports public use.
    - id: developer_api_key
      name: Developer API-key REST API
      allowed_auth: approved_api_key_required
      requirements:
        - API-key metadata available to the route at authorization time.
        - Explicit scope per surface/action.
        - Device approval enforced.
        - Credit/budget check for paid work.
        - Owner/team checks for user data.
        - Public developer REST exposure is limited to endpoints that do not touch client-side encrypted data and are not sensitive account-security actions unless a separate approved spec grants a narrower contract.
    - id: first_party_only
      name: First-party client surface only
      allowed_auth: session_or_approved_device_or_official_sdk_cli_auth
      requirements:
        - No broad developer API-key access unless separately classified.
        - Caddy may route requests to FastAPI for correct 401/403/CORS, but FastAPI remains the security boundary.
        - Encrypted chat, memory, file, key, sync, share, task, plan, and import material defaults here.
        - Official CLI/SDK access may use API keys only when the endpoint preserves client-side encryption boundaries and is not documented as generic public developer REST.
    - id: internal_only
      name: Internal-only service API
      allowed_auth: internal_service_token_or_private_network_only
      requirements:
        - Not reachable through public Caddy allowlists except narrowly approved HMAC webhook/tunnel paths.
        - Internal token verification fails closed when the token is missing or misconfigured.
  developer_rest_parity_policy:
    target: maximum_safe_parity
    include_when_all_true:
      - The endpoint backs a feature available in web, CLI, SDK, or Apple.
      - The request and response do not include client-side encrypted payloads, encrypted object material, plaintext derived from client-side encrypted material, or key material.
      - The endpoint is not a sensitive account-security action.
      - The endpoint can enforce API-key scope, owner/team checks, rate limits, and budget controls where applicable.
    required_inclusions:
      - Workflow template list/create/update/delete must remain available through scoped developer REST because templates are not client-side encrypted.
      - Non-encrypted app metadata, skill metadata, public docs, model metadata, safe account portability metadata, feature metadata, and task/plan status metadata should be public or developer REST accessible according to their auth needs.
      - Runtime-public utility routes such as geocode, analytics beacons, and default inspirations may stay callable but must not appear in developer REST docs unless they are intentionally supported as developer APIs.
    excluded_from_public_developer_rest:
      - Client-side encrypted chats, messages, memory entries, user task content, files, keys, sync payloads, share secrets, and decrypted material derived from those payloads.
      - Sensitive account-security actions such as passkey deletion, two-factor secret changes, recovery-key changes, password changes, API-key secret disclosure, and account deletion unless a separate approved spec defines a constrained developer flow.
    official_client_only_surfaces:
      - Web app session/device authenticated routes.
      - Apple app session/device authenticated routes.
      - CLI and SDK encrypted protocol routes that preserve opaque client-side encrypted payloads and are tested separately from generic public developer REST.
  route_groups:
    - group: app_skills_rest
      paths: ["/v1/apps", "/v1/apps/*"]
      target_access_model: developer_api_key
      must_preserve: true
      notes:
        - Existing `apps_api.py` scope and budget checks are the pattern for approved developer API surfaces.
    - group: sdk_rest
      paths: ["/v1/sdk", "/v1/sdk/*"]
      target_access_model: first_party_only
      must_preserve: true
      notes:
        - Existing `_authenticate_sdk_request` plus route-specific scope checks should remain the model for official SDK/CLI encrypted access.
        - SDK encrypted chat/sync routes are not generic public developer REST even when they authenticate with API keys.
    - group: openai_compat
      paths: ["/v1/models", "/v1/models/*", "/v1/chat/completions"]
      target_access_model: developer_api_key
      must_preserve: true
      notes:
        - Must keep external client tools separate from OpenMates app skills.
        - Must add explicit rate limit or documented credit-budget guard if missing.
    - group: workflows
      paths: ["/v1/workflows", "/v1/workflows/*"]
      target_access_model: developer_api_key
      must_preserve: true
      notes:
        - Workflow template list/create/update/delete must be available through scoped developer REST because templates are not client-side encrypted.
        - Workflow execution or step testing must still enforce scopes, owner/team checks, rate limits, and encryption-boundary checks for any encrypted inputs or outputs.
    - group: encrypted_chat_sync
      paths: ["/v1/chats", "/v1/chats/*", "/v1/sync", "/v1/sync/*", "/v1/ideabucket", "/v1/ideabucket/*"]
      target_access_model: first_party_only
      must_preserve: true
      notes:
        - Client-side encrypted chat, message, idea bucket, and sync payload endpoints are excluded from generic public developer REST.
        - Official web, CLI, SDK, and Apple clients may continue using these routes only through their approved encrypted/session/device contracts.
    - group: tasks_plans_teams_history
      paths: ["/v1/user-tasks", "/v1/user-tasks/*", "/v1/user-plans", "/v1/user-plans/*", "/v1/teams", "/v1/teams/*", "/v1/workspace/history", "/v1/workspace/history/*"]
      target_access_model: first_party_only_until_scoped
      must_preserve: false
      notes:
        - Client-side encrypted task, plan, chat-history, or workspace-history content defaults official-client-only.
        - Non-encrypted metadata may become scoped developer REST only after safe-parity classification and tests.
        - Safe task/plan status metadata is exposed only through `GET /v1/user-tasks/metadata`, `GET /v1/user-tasks/{task_id}/metadata`, `GET /v1/user-plans/metadata`, and `GET /v1/user-plans/{plan_id}/metadata`.
    - group: sensitive_account_security
      paths: ["/v1/settings/passkeys", "/v1/settings/passkeys/*", "/v1/auth/2fa", "/v1/auth/2fa/*", "/v1/settings/update-password", "/v1/settings/delete-account", "/v1/settings/api-keys", "/v1/settings/api-keys/*"]
      target_access_model: first_party_only
      must_preserve: true
      notes:
        - Sensitive account-security actions are excluded from generic public developer REST even when they do not contain client-side encrypted data.
        - API-key management may have dedicated guided CLI or settings flows, but raw destructive/security-secret operations require explicit constrained-flow specs before developer exposure.
    - group: account_portability
      paths: ["/v1/account-exports", "/v1/account-exports/*", "/v1/account-imports", "/v1/account-imports/*"]
      target_access_model: explicit_scoped_portability
      must_preserve: true
      notes:
        - Export/import are allowed developer surfaces only with data-portability scope, bounds, and plaintext/import-specific guards.
    - group: celery_task_polling
      paths: ["/v1/tasks/*"]
      target_access_model: developer_api_key_or_session_with_owner_binding
      must_preserve: true
      notes:
        - Task result ownership must be proven before returning raw Celery result.
    - group: profile_images
      paths: ["/v1/users/*/profile-image"]
      target_access_model: authenticated_public_profile_media
      must_preserve: true
      notes:
        - Server-side decrypts plaintext bytes; allowed only as authenticated profile media with explicit rate limit and no private image assumption.
    - group: public_safe
      paths: ["/v1/geocode/*", "/v1/analytics/*", "/v1/default-inspirations", "/v1/docs", "/v1/docs/*", "/v1/status", "/v1/status/*", "/v1/share/*"]
      target_access_model: public_rest
      must_preserve: true
      notes:
        - Share POST/write routes are not public merely because share GET routes are public; method-level classification is required.
        - Public runtime utility routes are not automatically developer REST documentation routes; geocode, analytics beacon, and default inspirations stay hidden from OpenAPI unless explicitly productized for developers.
  error_contracts:
    unauthorized: 401 with typed detail for missing/invalid credentials.
    forbidden_scope: "403 with `missing_scope` or `developer_api_access_not_classified`."
    forbidden_owner: 404 or 403 without leaking foreign object existence, using existing route conventions.
    rate_limited: 429 with retry metadata where SlowAPI or custom limiter supports it.
    budget_limited: 402 or typed 429/403 according to existing API-key budget conventions.

