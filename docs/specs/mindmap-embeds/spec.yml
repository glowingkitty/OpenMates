risks:
  - Mind maps could become unreadable in the preview if layout tries to render every label at full size; v1 needs fit-to-overview plus label simplification for large maps.
  - Uploading JSON broadens the upload attack surface; v1 should only accept explicit `.ommindmap` or `.openmates-mindmap.json` files that pass marker/schema validation and size caps.
  - LLMs may produce malformed JSON or prose around artifacts; one deterministic repair pass and explicit invalid-source fallback avoids silent corruption.
  - Cross-platform native parity may be non-trivial because Apple needs a layout/gesture renderer, not just text output.
  - Separating Mind Maps from Diagrams means new app metadata, icons, examples, and i18n must be kept in sync with generated registries.

open_questions:
  - Should v1 include OPML or FreeMind import/export if implementation turns out cheap, or keep those explicitly deferred until after native `.ommindmap` is stable?
  - Should mind maps support cross-link edge labels visually in v1 fullscreen, or preserve them in data/source and show them only in details/accessibility until a graph layout is added?
