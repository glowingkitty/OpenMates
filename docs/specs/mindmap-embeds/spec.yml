clarification:
  rounds:
    - question: Should v1 mind maps be assistant-created artifacts only, or should users also be able to upload existing mindmap files?
      answer: Users should be able to download a mindmap from the web app and upload it again in OpenMates, where it is auto-detected as a mindmap embed.
    - question: Should invalid nodes be hidden entirely, or rendered as visible placeholders when recoverable?
      answer: Render what worked, show recoverable invalid nodes as `Invalid content` placeholders, and surface invalid parts visibly instead of silently hiding everything.
  vision_summary: >
    Mind maps should be their own OpenMates app, not a sub-feature of Diagrams,
    because users understand brainstorming and topic maps as a separate product
    intent. The canonical format is OpenMates JSON emitted in an
    `openmates_mindmap` fence and exported as `.ommindmap`; the renderer is
    strict enough to reject broken maps at creation/import boundaries but
    tolerant enough to render valid portions with visible validation warnings.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Assistant creates a mind map embed from natural language
    given:
      - Alice asks OpenMates to create a mind map for planning a product launch.
      - The Mind Maps app is available in app metadata.
    when:
      - The assistant emits a fenced `openmates_mindmap` JSON block that follows the canonical schema.
    then:
      - "The backend stream consumer creates a direct mindmap embed with `type: mindmap`, `app_id: mindmaps`, and `skill_id: mindmap`."
      - The message markdown contains only the JSON embed reference, not the raw fenced JSON block.
      - The encrypted embed content stores the original source JSON, normalized validated model, title, node/edge counts, validation warnings, status, version number, and stable `embed_ref`.

  - id: S-2
    title: LLM instructions constrain mindmap JSON generation
    given:
      - The main processor is preparing assistant instructions for a user request that asks for a mind map.
    when:
      - The mindmap instruction is included.
    then:
      - The instruction requires valid JSON only inside an `openmates_mindmap` fence.
      - The instruction defines required fields, stable lowercase IDs, no Markdown inside JSON strings, maximum depth, maximum children, maximum node/edge counts, and no remote resources.
      - The instruction tells the assistant to use `collapsedNodeIds` for secondary detail and not to use Mermaid, OPML, FreeMind XML, or prose outlines as the mindmap source.

  - id: S-3
    title: Partially invalid generated maps render valid content with warnings
    given:
      - Alice receives a mindmap embed whose JSON parses but includes one node without a label, one duplicate node ID, and one edge pointing to a missing node.
    when:
      - The embed is normalized and rendered.
    then:
      - Valid nodes and valid edges render normally.
      - The missing-label node renders as an `Invalid content` placeholder if it can still be connected by ID.
      - The duplicate ID is deterministically renamed or dropped according to the validation contract and reported as a warning.
      - The missing-target edge is dropped and reported as a warning.
      - No label, ID, relationship, or semantic branch is invented by the renderer.

  - id: S-4
    title: Entirely invalid maps show a source/error fallback instead of a broken preview
    given:
      - Alice receives or uploads a mindmap source that cannot be parsed as JSON after one deterministic repair attempt.
    when:
      - OpenMates tries to create or render the mindmap embed.
    then:
      - A finished visual mindmap is not created from unparseable source.
      - The user sees an explicit `Invalid mind map JSON` state with a copyable source panel and non-sensitive error details.
      - Logs record only error class, size, embed id, and validation counts, not the full private source content.

  - id: S-5
    title: Web preview shows a zoomed-out overview
    given:
      - Alice opens a chat containing a finished mindmap embed with at least 30 nodes.
    when:
      - The inline embed preview renders in the message stream.
    then:
      - The preview uses `UnifiedEmbedPreview` and shows the whole mind map zoomed out to fit the card.
      - Labels remain legible where possible, with large maps allowed to simplify tiny secondary labels while preserving visible structure.
      - Collapsed branches show their parent node and an affordance/count for hidden descendants.
      - The preview never overflows outside the card and clicking opens fullscreen.

  - id: S-6
    title: Web fullscreen supports pan, zoom, fit, collapse, and touch navigation
    given:
      - Alice opens a finished mindmap embed fullscreen on desktop or a touch device.
    when:
      - Alice drags the canvas, pinches, uses the mouse wheel/trackpad where supported, taps zoom in/out/reset buttons, and expands or collapses a branch.
    then:
      - The mind map pans without selecting text or scrolling the surrounding chat.
      - Zoom in, zoom out, and fit/reset controls use the shared `EmbedZoomControls` visual pattern.
      - Touch pinch zooms around the gesture midpoint and one-finger drag pans on touch devices.
      - Expanding/collapsing a branch updates only view state and does not mutate the canonical nodes/edges.
      - The current zoom level and invalid-content warning count are accessible to screen readers.

  - id: S-7
    title: Users download and re-upload native mindmap files
    given:
      - Alice opens a valid mindmap embed in fullscreen.
    when:
      - Alice downloads the mind map, then uploads the downloaded file into OpenMates later.
    then:
      - The fullscreen exposes a visible download button that exports the canonical file.
      - The downloaded file has extension `.ommindmap` and contains canonical OpenMates mindmap JSON.
      - Upload accepts `.ommindmap` and `.openmates-mindmap.json` only when the JSON includes `openmatesType: mindmap` and a supported `schemaVersion`.
      - The uploaded file is auto-detected as a `mindmaps-mindmap` embed instead of a generic code/file embed.
      - Generic `.json` files without the OpenMates mindmap marker remain generic code/file uploads.

  - id: S-8
    title: CLI renders useful text for mindmap embeds
    given:
      - Alice uses the OpenMates CLI and receives a mindmap embed.
    when:
      - The inline preview or `openmates embeds show <id>` renders the embed.
    then:
      - The preview prints a Mind Maps label, title, node count, edge count, validation warning count, and a compact indented outline from the root.
      - Fullscreen CLI output prints the canonical JSON in an `openmates_mindmap` fenced block and includes validation warnings.
      - CLI output does not expose encrypted content or attempt graphical rendering.

  - id: S-9
    title: Apple renders mind maps with material web parity
    given:
      - Alice opens a chat containing a mindmap embed on iOS or macOS.
    when:
      - The preview and fullscreen render.
    then:
      - The preview uses Mind Maps app chrome and shows a zoomed-out overview.
      - Fullscreen supports pan, zoom in/out, fit/reset, collapsed branches, invalid-content warnings, and source fallback.
      - User-visible labels are localized through the Apple i18n pipeline.

  - id: S-10
    title: Natural-language CLI run becomes the canonical example chat
    given:
      - The Mind Maps implementation is deployed to dev and the CLI can send authenticated chat messages.
    when:
      - Alice runs a natural-language CLI prompt such as `Create a mind map for planning a privacy-first product launch` without mentioning `@Mind Maps` or any app ID.
    then:
      - The assistant chooses the Mind Maps app behavior and creates a `mindmaps-mindmap` embed.
      - The created chat is verified through the CLI output and web rendering.
      - The verified chat is published as the canonical Mind Maps example chat.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Assistant-emitted `openmates_mindmap` fences are converted into encrypted direct `mindmap` embeds with Mind Maps app metadata.
  - id: AC-2
    scenario: S-2
    text: The assistant instruction defines the canonical JSON schema, size limits, ID rules, view-state rules, and explicitly forbids Mermaid or prose outlines as the durable source.
  - id: AC-3
    scenario: S-3
    text: Parsed but partially invalid maps render valid content with visible validation warnings and `Invalid content` placeholders for recoverable invalid nodes.
  - id: AC-4
    scenario: S-4
    text: Unparseable maps show an explicit invalid-source fallback and do not silently create a fake finished mindmap.
  - id: AC-5
    scenario: S-5
    text: Web previews render a zoomed-out whole-map overview inside `UnifiedEmbedPreview`.
  - id: AC-6
    scenario: S-6
    text: Web fullscreen supports pan, zoom controls, fit/reset, touch pinch/drag, and branch collapse/expand without mutating canonical content.
  - id: AC-7
    scenario: S-7
    text: Users can download `.ommindmap` files and upload them back into OpenMates as mindmap embeds; unmarked generic JSON is not misclassified.
  - id: AC-8
    scenario: S-8
    text: CLI preview/fullscreen output provides readable text and canonical JSON for mindmap embeds.
  - id: AC-9
    scenario: S-9
    text: Apple preview/fullscreen renders mindmap embeds with material web parity and localized strings.
  - id: AC-10
    scenario: S-3
    text: Mindmap normalization is deterministic, bounded, and never invents semantic content not present in source JSON.
  - id: AC-11
    scenario: S-10
    text: A natural-language CLI chat without an app mention triggers mindmap creation and is published as the canonical Mind Maps example chat.

contracts:
  data:
    - name: MindMapDocument
      shape: >
        { openmatesType: "mindmap", schemaVersion: 1, title: string, rootId:
        string, nodes: MindMapNode[], edges?: MindMapEdge[], view?:
        MindMapViewState, metadata?: MindMapMetadata }
      rules:
        - "`openmatesType` must equal `mindmap`."
        - "`schemaVersion` must equal `1` for v1."
        - "`title` is required, trimmed, and capped at 120 characters."
        - "`rootId` must reference a valid node after normalization or the map is invalid."
        - "`nodes` must contain at least one node and at most 250 nodes."
        - "`edges` are optional and capped at 400 edges; v1 layout treats `parent-child` edges as hierarchy and other edge types as cross-links."
        - Unknown top-level fields are preserved under normalized metadata only if they are plain JSON primitives/objects below size caps.
    - name: MindMapNode
      shape: >
        { id: string, label: string, summary?: string, icon?: string, color?:
        string, tags?: string[], children?: string[], data?: object }
      rules:
        - Node IDs are stable lowercase kebab-case or snake_case strings capped at 80 characters.
        - "`label` is required and capped at 120 characters for valid nodes."
        - Missing or non-string labels on connected nodes become visible `Invalid content` placeholders.
        - "`summary` is optional, plain text only, capped at 500 characters."
        - "`children` may define hierarchy by child IDs; `edges` may also define parent-child links, but the normalized model must dedupe conflicts deterministically."
        - "`icon` may reference approved OpenMates icon names only; unknown icons fall back to the Mind Maps icon and produce a warning."
        - "`color` may reference approved token/category names only; raw CSS colors are ignored and reported as warnings."
    - name: MindMapEdge
      shape: "{ id?: string, source: string, target: string, type?: parent-child | related | dependency | reference, label?: string }"
      rules:
        - Edges with missing source or target nodes are dropped and reported as warnings.
        - Duplicate edges are deduped by source, target, and type.
        - Cycles in parent-child hierarchy are broken deterministically and reported as warnings.
    - name: MindMapViewState
      shape: "{ layout?: radial-tree | tree | graph, collapsedNodeIds?: string[], hiddenNodeIds?: string[], focusNodeId?: string }"
      rules:
        - View state must never remove canonical nodes from the normalized model.
        - "`collapsedNodeIds` hide descendants while keeping the collapsed node visible."
        - "`hiddenNodeIds` hide listed nodes and incident edges from the rendered view only."
        - Unknown node IDs in view state are ignored and reported as warnings.
    - name: MindMapEmbedContent
      shape: >
        { type: "mindmap", app_id: "mindmaps", skill_id: "mindmap", title:
        string, source_json: string, model: MindMapDocument, validation:
        MindMapValidationResult, embed_ref: string, status: string,
        version_number: number, node_count: number, edge_count: number }
      rules:
        - "`source_json` preserves the original assistant/upload source after size caps for repair/diff editing."
        - "`model` is the normalized validated model used for rendering."
        - Validation results are visible in UI and CLI, not just logs.
  llm_instruction:
    - Include the Mind Maps instruction only when the user asks for a mind map, concept map, brainstorm map, topic map, study map, knowledge map, or structured visual outline.
    - Require exactly one fenced block using language `openmates_mindmap` for the artifact source.
    - Require valid JSON with double-quoted keys/strings, no trailing commas, no comments, no Markdown outside JSON values, and no remote URLs or HTML.
    - Tell the assistant to prefer 8-60 nodes, maximum depth 5, maximum children per node 8, and to use collapsed branches for secondary details.
    - Tell the assistant to use stable semantic IDs, e.g. `launch-plan`, `audience-research`, not random UUIDs unless the concept has no stable name.
    - Tell the assistant to use `summary` for optional detail and keep `label` short.
    - Tell the assistant to create `children` hierarchy for tree mind maps and use `edges` only for cross-links or when a graph layout is explicitly requested.
    - Tell the assistant not to output Mermaid, OPML, FreeMind XML, Graphviz, Markdown headings, or prose lists as the durable mindmap source.
  validation:
    - Try one deterministic repair pass for common JSON syntax mistakes such as BOM, surrounding prose, smart quotes, and trailing commas before declaring parse failure.
    - If parsing still fails, create or update an error/source fallback state, not a fake normalized mind map.
    - If parsing succeeds, normalize IDs, trim strings, cap lengths, dedupe duplicates, break hierarchy cycles, drop invalid edges, and record warnings.
    - Recoverable connected nodes missing a valid label render as `Invalid content` placeholders.
    - Do not call an LLM from the renderer to repair invalid content in v1.
  ui_states:
    - Processing mindmap preview placeholder.
    - Finished preview zoomed to show the full rendered map.
    - Finished fullscreen with canvas, controls, collapsed branch affordances, warning badge, source panel, copy, download, and share actions.
    - Partially invalid fullscreen with valid map content plus validation warning panel.
    - Entirely invalid source fallback with copyable source and error message.
    - Upload rejected as not a mindmap because marker/schema is missing.
  privacy_security:
    - Mindmap content is encrypted like other direct embeds and must not be logged in full.
    - Validation logs may include error class, size, node count, edge count, warning count, and embed id only.
    - Renderer must treat every label, summary, icon, color, and metadata field as untrusted text/data.
    - Mindmap JSON must not trigger network requests, script execution, inline HTML rendering, or external resource loading.
    - Downloaded `.ommindmap` files contain user-visible mindmap content and must be treated as private user data.

tests:
  - id: T-PYTEST-MINDMAP-STREAMING
    type: pytest
    file: backend/tests/test_mindmap_embed_streaming.py
    command: python3 -m pytest backend/tests/test_mindmap_embed_streaming.py
    covers:
      - AC-1
      - AC-2
      - AC-4
      - AC-10
    assertions:
      - "stream consumer converts complete `openmates_mindmap` fences into `type: mindmap` embed references"
      - malformed JSON creates an invalid-source fallback/error state without raw source logs
      - embed service stores source_json, normalized model, validation warnings, counts, app_id, skill_id, and embed_ref
      - assistant instructions include schema and anti-Mermaid/anti-prose requirements
    red_phase:
      required: true
      expected: fail
      evidence:
        status: not_run
        run_id: ""
        timestamp: "2026-06-20"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: local:python3-m-pytest-backend-tests-test_mindmap_embed_streaming.py; docker:backend/tests/test_preprocessor.py+test_preprocessor_skill_resolver.py
