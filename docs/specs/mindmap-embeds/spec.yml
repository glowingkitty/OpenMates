  parity_expectations:
    - Apple recognizes the `mindmaps-mindmap` embed type and renders Mind Maps app chrome with generated tokens and icons.
    - Apple preview renders a zoomed-out whole-map overview, not raw JSON, while preserving an accessible text/source fallback.
    - Apple fullscreen supports equivalent fit/reset, zoom in/out, pan, touch gestures, collapsed branches, invalid-content warnings, copy, download/share where native surfaces support those actions.
    - Apple must not execute untrusted mindmap content or load remote resources declared inside the JSON.
