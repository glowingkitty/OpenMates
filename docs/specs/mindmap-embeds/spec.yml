implementation_plan:
  existing_patterns:
    - Diagrams/Mermaid direct embeds already define an app metadata pattern, stream fence conversion, safe rendering, source fallback, text rendering, and pan/zoom fullscreen behavior.
    - "`UnifiedEmbedPreview` and `UnifiedEmbedFullscreen` provide mandatory embed chrome, update subscription, sharing, and fullscreen shell behavior."
    - "`EmbedZoomControls` provides the shared zoom button visual pattern from document embeds."
    - Upload currently accepts images, PDFs, and audio only, so `.ommindmap` upload requires an explicit safe JSON upload/classification path.
  architecture: >
    Add Mind Maps as a separate metadata app with a direct `mindmap` embed type.
    The backend detects `openmates_mindmap` fences, validates and normalizes the
    JSON, and stores both source and normalized model in encrypted embed content.
    The web renderer uses pure deterministic layout/validation helpers, renders a
    fit-to-preview overview, and provides a canvas-like fullscreen with shared
    zoom controls and pointer/touch interactions. Upload/download uses the native
    `.ommindmap` format and validates explicit OpenMates markers before creating
    embeds.
  data_flow:
    - User asks for a mind map.
    - Assistant emits one `openmates_mindmap` fenced JSON block according to the instruction.
    - Stream consumer parses, repairs once if needed, validates, normalizes, and creates a direct encrypted mindmap embed.
    - Web preview renders the normalized model fit to the card.
    - Fullscreen renders the same model with view-state controls, source panel, warnings, download, and share actions.
    - Download writes canonical `.ommindmap` JSON.
    - Upload validates `.ommindmap` or `.openmates-mindmap.json` marker/schema and creates the same direct embed type.
  affected_files:
    - path: backend/apps/mindmaps/app.yml
      reason: New Mind Maps app metadata, direct embed type, icon, i18n, and assistant instruction hooks.
    - path: backend/apps/ai/instructions/base_mindmap_instruction.md
      reason: LLM instructions for canonical `openmates_mindmap` JSON output.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Detect `openmates_mindmap` fences and convert them to embeds.
    - path: backend/core/api/app/services/embed_service.py
      reason: Create/update mindmap direct embed content, validation metadata, content hashes, and update events.
    - path: backend/upload/routes/upload_route.py
      reason: Accept and safely classify native `.ommindmap` uploads without broad generic JSON upload behavior.
    - path: frontend/packages/ui/src/components/embeds/mindmaps/MindMapEmbedPreview.svelte
      reason: Zoomed-out preview renderer.
    - path: frontend/packages/ui/src/components/embeds/mindmaps/MindMapEmbedFullscreen.svelte
      reason: Pan/zoom/collapse/source/warning fullscreen renderer.
    - path: frontend/packages/ui/src/components/embeds/mindmaps/mindMapContent.ts
      reason: Pure schema validation, normalization, deterministic repair, layout, text rendering, and export helpers.
    - path: frontend/packages/ui/src/components/enter_message/services/uploadService.ts
      reason: Client-side upload response and classification support for `.ommindmap`.
    - path: frontend/packages/ui/src/data/embedTextRenderers.ts
      reason: Text output for CLI/search/export surfaces.
    - path: frontend/packages/openmates-cli/src/embedRenderers.ts
      reason: CLI preview/fullscreen support.
    - path: frontend/packages/ui/src/i18n/sources/**/*.yml
      reason: Mind Maps labels, errors, controls, and app metadata translations.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/MindMapEmbedRenderer.swift
      reason: Apple parity renderer.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/mindmap-embeds/spec.yml
    - python3 scripts/spec_verify.py docs/specs/mindmap-embeds/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/mindmap-embeds/spec.yml --phase green
  verification_order:
    - Backend pytest and Vitest content/upload/registry tests first.
    - CLI rendering tests second.
    - Deploy to dev, wait for Vercel Ready, then run Playwright.
    - Apple remote status/build or targeted test-ios after CLI and web evidence.

