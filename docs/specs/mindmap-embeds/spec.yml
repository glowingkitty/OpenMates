id: mindmap-embeds
title: Mind Map Embeds
status: verified

goal: >
  Add a first-class Mind Maps app and direct mindmap embed type so users can ask
  OpenMates to generate structured, encrypted, shareable, downloadable, and
  re-uploadable mind maps from natural language. The assistant writes a strict
  OpenMates JSON mindmap structure, the web app renders a zoomed-out overview in
  preview plus a touch-friendly pan/zoom fullscreen, and invalid or partially
  hallucinated structures are handled visibly without silently inventing content.

scope:
  in:
    - Add a separate Mind Maps app metadata entry, distinct from the Diagrams/Mermaid app.
    - Add a direct `mindmap` embed type with backend type `mindmap` and frontend type `mindmaps-mindmap`.
    - Define the canonical OpenMates mindmap JSON schema and native download format `.ommindmap`.
    - Add assistant instructions for emitting `openmates_mindmap` fenced JSON blocks only when the user asks for a mind map, concept map, brainstorm map, topic map, or structured visual outline.
    - Convert valid streamed assistant `openmates_mindmap` fences into encrypted direct embeds.
    - Render web preview cards as a zoomed-out whole-map overview inside `UnifiedEmbedPreview`.
    - Render web fullscreen mind maps with pan, zoom in/out, fit/reset controls using the shared `EmbedZoomControls` pattern, mouse/pointer drag, wheel/trackpad zoom where appropriate, and touch pinch/pan on mobile/tablet.
    - Support expand/collapse and hidden-node view state in the mindmap data model, with selected collapsed branches visible as nodes whose descendants are not rendered.
    - Let users download the canonical `.ommindmap` JSON file and upload it back into OpenMates, where it is detected and recreated as a mindmap embed.
    - Show a download action in the mindmap fullscreen that exports the canonical `.ommindmap` file.
    - Preserve original source JSON and a normalized validated model so assistant repair/diff editing can inspect what changed.
    - Render valid portions of partially invalid maps while surfacing validation warnings and `Invalid content` placeholder nodes for recoverable invalid nodes.
    - Add CLI text rendering and Apple embed parity for preview/fullscreen semantics.
    - Create a real natural-language OpenMates chat through the CLI that triggers mindmap creation without an `@` app mention and publish it as the canonical Mind Maps example chat after verification.
    - Add deterministic backend, frontend, CLI, upload, Playwright, and Apple verification following the CLI -> web -> Apple ladder.
  out:
    - Using Mermaid as the durable or LLM authoring format for mind maps.
    - A drag-and-drop graphical mind map editor in v1.
    - Real-time collaborative mind map editing.
    - Import/export support for XMind `.xmind`, MindManager `.mmap`, SimpleMind `.smmx`, OPML, or FreeMind `.mm` in v1.
    - Server-side profiling, analytics, or model personalization based on mind map content.
    - Rendering arbitrary HTML, script, images, or remote resources from mindmap JSON.

