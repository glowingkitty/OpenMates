clarification:
  rounds:
    - question: What is the smallest V1 task flow that must work end-to-end?
      answer: >
        User asks in chat to plan work, assistant proposes tasks, user edits a
        task, assistant progresses/completes tasks, and /tasks shows them linked
        back to the chat. Tasks must also link to projects, be assignable to AI
        or a specific user identity/hash, support Kanban drag/drop/touch, and
        support AI creation from text or voice-transcript flow.
    - question: Should task contents be readable/searchable by the server, or should server-visible fields stay minimal?
      answer: >
        Start with the privacy-focused option: client-side encryption and
        minimal backend metadata only.
    - question: What task states should V1 support, and should they be fixed or customizable?
      answer: >
        Use fixed V1 statuses backlog, todo, in_progress, blocked, and done.
        Blocked is for tasks requiring user input or another missing condition.
        Backlog means intentionally parked; manual new tasks should default to
        todo.
    - question: What should be the explicit AI-start trigger?
      answer: >
        Assigning AI should generally mean execution intent. A task assigned to
        AI with no due date should start immediately. Moving an AI-capable task
        to in_progress can also start work after confirmation if no working chat
        exists.
    - question: Should each task have one primary source context, or can it belong to multiple contexts?
      answer: >
        A task should have one primary linked chat and optional links to multiple
        projects. Project mentions should be included when the assistant is
        instructed to work on a project-linked task.
    - question: For V1, how rich should task details be?
      answer: >
        Include title, description, status, assignee, linked chat, linked
        projects, due date, priority, tags, and activity/history. If a due date
        is set and AI is assigned, AI should wait until due time using a
        reliable server-side scheduler that survives restarts.
  vision_summary: >
    Tasks V1 is a separate privacy-preserving product model that sits beside
    chats, projects, and workflows. Tasks appear in chat task lists, project
    filters, and the central /tasks Kanban board; users and assistants can both
    edit them, and AI-assigned tasks can start immediately or at a due time.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Assistant creates and updates chat-linked tasks
    given:
      - Alice is logged into the web app and has an active chat.
      - Alice asks the assistant to plan a website launch.
    when:
      - The assistant proposes five tasks and Alice accepts them.
      - Alice edits one task title from the chat task list.
    then:
      - Five durable task records are created in the task collection.
      - Each task is linked to the active chat and visible in that chat's task list.
      - The edited title is client-encrypted for durable storage and appears correctly after reload.

  - id: S-2
    title: Central Kanban shows tasks across chats and projects
    given:
      - Alice has tasks linked to multiple chats, sub-chats, and projects.
      - Some tasks are assigned to Alice and some are assigned to AI.
    when:
      - Alice opens /tasks.
      - Alice filters by project and drags a task from todo to backlog on a touch-capable device.
    then:
      - The board shows backlog, todo, in_progress, blocked, and done columns.
      - The project filter shows only tasks linked to that project.
      - The status change persists and syncs after reload.
      - The board remains usable with pointer, keyboard, and touch interactions.

  - id: S-3
    title: Direct task creation supports text and voice instruction flows
    given:
      - Alice is on /tasks.
    when:
      - Alice creates one task from typed text.
      - Alice creates another through voice recording, transcript, corrected transcript, and AI task extraction.
    then:
      - Both tasks default to todo when no AI execution is requested.
      - The voice-created task stores only encrypted task content durably.
      - Alice can review and edit extracted tasks before they are committed.

  - id: S-4
    title: AI-assigned task starts immediately when no due date exists
    given:
      - Alice creates a task from /tasks with assignee set to AI.
      - The task has no due date and is linked to one project.
    when:
      - Alice confirms AI assignment.
    then:
      - The task status becomes in_progress.
      - A working chat is created or selected for the task.
      - The assistant receives an instruction equivalent to Complete the task plus the linked project mention.
      - The task links back to the working chat.

  - id: S-5
    title: AI-assigned due task starts reliably at due time
    given:
      - Alice creates a task assigned to AI with a due date in the future.
      - The server restarts before the due date.
    when:
      - The due time arrives.
    then:
      - The server-side scheduler claims the due task once.
      - The task moves to in_progress and starts its working chat.
      - Duplicate assistant runs are not created after restart or retry.

  - id: S-6
    title: Chat sequentially works through AI-assigned tasks
    given:
      - A chat has three todo tasks assigned to AI.
      - The chat is not currently working on a task.
    when:
      - The first AI task starts.
    then:
      - The assistant works on tasks one after another in that chat.
      - Completed tasks move to done.
      - The next eligible task starts only after the previous task finishes or blocks.

  - id: S-7
    title: Task blocks when user input or permission is required
    given:
      - The assistant is working on an AI-assigned task.
    when:
      - The assistant needs user input, a permission approval, a connected account, file access, or another missing dependency.
    then:
      - The task status becomes blocked.
      - The linked chat or sub-chat records the waiting context.
      - The central /tasks board shows the blocked task with a clear open-chat action.
      - When Alice resolves the blocker, the task can resume from the linked chat.

  - id: S-8
    title: Tasks use privacy-preserving durable storage
    given:
      - Alice creates tasks with private titles, descriptions, tags, and activity entries.
    when:
      - The backend stores and later lists those tasks.
    then:
      - Durable private task content is client-encrypted.
      - The server stores only minimal metadata needed for ownership, filtering, scheduling, status, ordering, and execution safety.
      - Temporary AI execution context is Vault-encrypted and expires according to the task execution retention policy.

  - id: S-9
    title: Screenshot-aligned task surfaces stay visually and structurally consistent
    given:
      - Alice has a chat with four tasks where the second task is currently active.
      - Alice has a project with linked tasks across backlog, todo, in_progress, and done.
    when:
      - Alice opens /tasks on desktop.
      - Alice opens the project page task section.
      - Alice opens the active chat and clicks the top task preview.
    then:
      - /tasks and the project page render task boards with the same shared component classes, card styles, filter pills, column layout, and task actions.
      - The active chat top area shows a compact current-task preview with current task title, Task 2/4 progress, checkbox, progress bar, and open/next affordance.
      - Clicking the preview opens the unified chat details/settings page.
      - The chat details/settings page uses the settings header pattern and exposes Tasks, Files, Usage details, and Share sections as one unified chat management surface.
      - The mobile layout matches the screenshot intent with a stacked hero card, segmented icon tabs, task checklist, add task action, and cancel-all-tasks action.

  - id: S-10
    title: Chat settings replaces the existing share menu and unifies chat management
    given:
      - Alice opens a chat that has tasks, uploaded/generated files, usage entries, and share controls.
      - The existing chat share menu/process is still present in the current product.
    when:
      - Alice opens chat settings/details from the active-chat task preview or chat actions.
      - Alice switches between Tasks, Files, Usage details, and Share tabs.
      - Alice creates a share link, reveals the QR code, reveals the short URL, stops sharing, downloads chat data, downloads files, and downloads usage data.
    then:
      - The old standalone share menu/process is replaced by the settings-style Share tab.
      - The settings page uses canonical settings UI components and the shared settings header pattern rather than one-off inline CSS.
      - Files, Usage details, and Share tabs match the provided mobile designs and remain usable on desktop.
      - Existing share behavior, QR/link display, auto-expire, stop sharing, download chat, and privacy options continue to work through the new surface.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Assistant-created tasks are durable records linked to the originating chat and editable by the user from the chat task list.
  - id: AC-2
    scenario: S-2
    text: /tasks renders a central Kanban board with fixed backlog, todo, in_progress, blocked, and done columns, project filtering, and persisted drag/drop or touch status changes.
  - id: AC-3
    scenario: S-3
    text: Users can create tasks directly on /tasks from text and from a voice-to-corrected-transcript-to-AI extraction flow, with review before commit.
  - id: AC-4
    scenario: S-4
    text: Assigning AI to an unscheduled task starts execution immediately by moving the task to in_progress and creating or reusing a working chat.
  - id: AC-5
    scenario: S-5
    text: AI-assigned tasks with due dates start once at due time through a restart-safe server-side scheduler.
  - id: AC-6
    scenario: S-6
    text: A chat with multiple AI-assigned tasks executes them sequentially and does not start the next task until the active task finishes or blocks.
  - id: AC-7
    scenario: S-7
    text: Tasks that need user input, permissions, connected accounts, file access, or dependencies are marked blocked and resume only after the blocker is resolved.
  - id: AC-8
    scenario: S-8
    text: Durable task content uses client-side encryption while AI execution uses only short-lived Vault-encrypted context and minimal server-visible metadata.
  - id: AC-9
    scenario: S-2
    text: Tasks can link to one primary chat and multiple projects, and project pages can filter or list tasks linked to that project.
  - id: AC-10
    scenario: S-4
    text: Project-linked AI task instructions include project mentions/context so the assistant can access relevant project data.
  - id: AC-11
    scenario: S-9
    text: The central /tasks page and project task page reuse the same task board, column, card, pill filter, and action classes so their visual design and behavior remain consistent.
  - id: AC-12
    scenario: S-9
    text: Active chats show a top current-task preview with title, Task N/total count, progress bar, checkbox state, and click behavior that opens chat task details.
  - id: AC-13
    scenario: S-9
    text: Chat-level Tasks, Files, Usage details, and Share controls are unified into one settings-style chat details surface with a shared settings header pattern.
  - id: AC-14
    scenario: S-10
    text: The new chat settings Share tab replaces the existing standalone share menu/process while preserving share link creation, QR code display, short URL display, stop sharing, auto-expire, and download chat behavior.
  - id: AC-15
    scenario: S-10
    text: The chat settings Files and Usage details tabs match the provided designs and support downloading chat files and usage data from the unified settings surface.
  - id: AC-16
    scenario: S-10
    text: Chat settings implementation uses existing canonical settings UI components and shared settings header patterns, with no custom inline settings UI styling.

contracts:
  api:
    - route: GET /v1/user-tasks
      auth: session_or_api_key
      request: "query: status?, project_id?, chat_id?, assignee?, due_before?, limit?, cursor?"
      response: "{ tasks: TaskSummary[], next_cursor?: string }"
      notes:
        - Does not return decrypted private content; clients decrypt encrypted fields locally.
        - Supports pagination for central /tasks and project filters.
    - route: POST /v1/user-tasks
      auth: session_or_api_key
      request: "{ encrypted_title, encrypted_description?, status?, assignee, primary_chat_id?, project_ids?, due_at?, priority?, encrypted_tags? }"
      response: "{ task_id, status, encrypted_fields, metadata }"
      notes:
        - Defaults status to todo when no status is provided and no AI execution starts.
        - Starts AI immediately only when assignment/execution fields request AI work and due_at is absent or already due.
    - route: PATCH /v1/user-tasks/{task_id}
      auth: session_or_api_key
      request: "partial task encrypted fields and metadata with client version"
      response: "{ task_id, version, updated_at }"
      notes:
        - Rejects stale versions with a visible conflict response rather than silently overwriting user or assistant edits.
    - route: POST /v1/user-tasks/{task_id}/start-ai
      auth: session_or_api_key
      request: "{ chat_id?, project_ids?, encrypted_instruction_context }"
      response: "{ task_id, status: in_progress, chat_id, ai_run_id }"
      notes:
        - Creates or reuses a working chat and sends the task execution instruction.
    - route: POST /v1/user-tasks/extract
      auth: session_or_api_key
      request: "{ encrypted_corrected_transcript_or_text, mode: create|update, context_chat_id?, project_ids? }"
      response: "{ proposed_tasks: ProposedTask[] }"
      notes:
        - Returns proposals for user review before POST /v1/user-tasks commits them.
  data:
    collections:
      - name: user_tasks
        purpose: Durable user-facing task records.
        server_visible_fields:
          - id
          - hashed_user_id
          - status
          - assignee_type: ai|user
          - assignee_hash
          - primary_chat_id
          - linked_project_ids
          - parent_task_id
          - due_at
          - priority
          - position
          - version
          - created_at
          - updated_at
          - started_at
          - completed_at
          - blocked_reason_code
          - ai_execution_state
        encrypted_fields:
          - encrypted_title
          - encrypted_task_key
          - encrypted_description
          - encrypted_tags
          - encrypted_activity_summary
          - encrypted_latest_instruction
      - name: user_task_activity
        purpose: Append-only activity entries for task changes and AI progress.
        encrypted_fields:
          - encrypted_message
          - encrypted_snapshot
        server_visible_fields:
          - id
          - task_id
          - actor_type
          - actor_hash
          - event_type
          - created_at
    statuses:
      - backlog
      - todo
      - in_progress
      - blocked
      - done
    defaults:
      manual_status: todo
      parked_status: backlog
      ai_immediate_status: in_progress
  websocket:
    - event: user_task_updated
      direction: server_to_client
      payload: "{ task_id, status?, version, updated_at, primary_chat_id?, linked_project_ids? }"
      behavior:
        - Active chat task lists and /tasks update without full reload.
    - event: user_task_execution_started
      direction: server_to_client
      payload: "{ task_id, chat_id, ai_run_id }"
      behavior:
        - Client opens or highlights the working chat when the user requested AI start.
    - event: user_task_blocked
      direction: server_to_client
      payload: "{ task_id, chat_id, blocked_reason_code, awaiting_user_input_id? }"
      behavior:
        - Kanban and chat task list show blocked status and open-chat action.
  ui_states:
    - Empty central task board.
    - Board with many tasks and pagination or lazy loading.
    - Central /tasks board matching the screenshot style.
    - Project page task board using the same board/card classes as /tasks.
    - Task creation from text.
    - Voice transcript recording, correction, proposal review, and commit.
    - Chat task list collapsed and expanded.
    - Active chat top current-task preview collapsed and clicked/opened.
    - Unified chat details/settings page with tasks, files, usage details, and share sections.
    - Chat settings Files tab with download files, dev-server/project path, file rows, and per-file download actions.
    - Chat settings Usage details tab with download CSV/YAML, grouped usage entries, providers, and credit amounts.
    - Chat settings Share tab before share link creation.
    - Chat settings Share tab after share link creation with copy, QR, URL, stop sharing, and download chat states.
    - Project-filtered tasks on project page.
    - AI assigned and starting.
    - AI scheduled for due time.
    - AI in progress.
    - Blocked waiting for user.
    - Done.
    - Edit conflict.
  privacy_security:
    - Never store plaintext private task title, description, tags, transcript, or instruction content in durable server storage.
    - Server-visible linked_project_ids and primary_chat_id are acceptable metadata for filtering and execution; reassess if project IDs become sensitive beyond existing project access assumptions.
    - Use hashed user identifiers for assignee identity and ownership lookups.
    - Vault-encrypted AI execution context must have bounded retention and be deleted after task completion, cancellation, or expiration.
    - AI cannot start project-linked task work unless the user owns the linked projects and the feature is enabled.
    - Task API must enforce ownership for task, chat, and project links.
  naming:
    - /v1/tasks remains Celery/background task polling.
    - /v1/user-tasks is the user-facing product task API namespace.
  design:
    shared_components:
      - name: TaskBoard
        used_by:
          - /tasks central workspace
          - Project page task section
          - Chat details/settings Tasks section when wide enough
        required_classes:
          - tasks-board
          - tasks-board-column
          - task-card
          - task-filter-pill
          - task-action-pill
      - name: TaskCard
        style_contract:
          - White rounded card on light grey column background.
          - Soft shadow and compact typography matching the provided Figma screenshots.
          - Shows encrypted title, linked project/chat pill, AI assignee affordance, status, and open-chat action when linked.
      - name: ActiveChatTaskPreview
        style_contract:
          - Floating rounded pill in the active chat top area.
          - Shows task icon, Task N/total, progress bar, checkbox, current task title, and open/next affordance.
          - Remains usable on mobile without covering message content.
      - name: ChatDetailsSettingsPage
        style_contract:
          - Uses the settings header pattern similar to app settings pages.
          - Provides a chat hero summary card and segmented icon navigation for Tasks, Files, Usage details, and Share.
          - Tasks section shows progress, add task, editable checklist rows, drag/reorder, and cancel-all-tasks action.
          - Files section shows Download files, linked dev-server/project path when available, folder/file rows, file metadata, and per-file download buttons.
          - Usage details section shows Download usage data with CSV and YAML formats, grouped usage rows, provider names, and credit amounts.
          - Share section replaces the existing share menu/process and includes share-with-community, password protection, auto-expire, Share chat, generated-link success, copy to clipboard, QR show/hide, URL show/hide, stop sharing, and Download chat.
          - Uses canonical settings/elements components for rows, sections, toggles, buttons, icon tiles, dividers, and headers instead of custom inline CSS.
    visual_requirements:
      - Match the conversation-provided Figma style before inventing new task UI patterns.
      - Reuse existing design tokens and settings/elements components where the surface is settings-like.
      - Chat settings surfaces must follow docs/design-guide/settings-ui.md and use canonical settings/elements components.
      - Do not use custom one-off project task card styles that diverge from the central task board.
      - Use data-testid attributes for every interactive task control used by tests.
      - Replacement of the old share menu must be complete enough that users do not have two competing share flows.

tests:
  - id: T-PYTEST-DATA
    type: pytest
    file: backend/tests/test_user_tasks_api.py
    command: python3 -m pytest backend/tests/test_user_tasks_api.py
    covers:
      - AC-1
      - AC-8
      - AC-9
    assertions:
      - authenticated create stores a user_tasks row with encrypted title and description fields only.
      - list filters by primary_chat_id and linked_project_ids without decrypting private content.
      - unauthenticated and wrong-owner task, chat, or project access is rejected.
      - /v1/tasks Celery polling behavior remains unchanged.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "local-pytest-2026-06-26"
        timestamp: "2026-06-26"

  - id: T-PYTEST-SCHED
    type: pytest
    file: backend/tests/test_user_tasks_scheduler.py
    command: python3 -m pytest backend/tests/test_user_tasks_scheduler.py
    covers:
      - AC-5
      - AC-6
      - AC-7
    assertions:
      - due AI tasks are claimed once after restart-safe scheduler recovery.
      - duplicate scheduler retries do not create duplicate working chats or AI runs.
      - chat task queues start the next AI task only after the active task finishes or blocks.
