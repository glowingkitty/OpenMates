id: tasks-v1
title: Tasks V1
status: implementing

goal: >
  Add a privacy-preserving Tasks product surface where users and assistants can
  create, edit, assign, schedule, and complete durable tasks across chats,
  sub-chats, and projects. V1 introduces a separate task database model, a
  central /tasks Kanban page, chat-level task lists, project task filtering, and
  AI execution that can work through linked tasks sequentially while preserving
  client-side encryption for long-term task content.

scope:
  in:
    - A separate durable Directus task collection for user-facing tasks, distinct from Celery task polling and chat messages.
    - Privacy-first storage with client-encrypted task title, description, tags, activity text, and AI instruction content for durable storage.
    - One unique client-generated symmetric task key per task, with owner/master, primary chat, and linked-project access following the same client-side envelope-encryption model as chats, embeds, projects, and plans.
    - Short-lived Vault-encrypted task execution contexts for every AI-assigned task in active chats so the assistant can continue task queues without server-side durable plaintext.
    - Minimal server-visible task metadata needed for authorization, filtering, scheduling, ordering, and safe execution.
    - A new product task API namespace under /v1/user-tasks, avoiding collision with /v1/tasks/{task_id} Celery polling.
    - Central /tasks Kanban page with backlog, todo, in_progress, blocked, and done columns.
    - Account-wide task-view items that include normal user tasks plus read-only workflow run projections, so the Tasks view shows currently running and recently completed automation work related to the user's account.
    - Account export/import includes encrypted user task records, task keys/wrappers, label indexes, priority metadata, and enough link metadata to restore tasks across CLI, SDK, and web account backup flows.
    - Workflow run cards in Tasks are inspectable and cancellable while active, but are not editable task records and cannot be dragged, assigned, or mutated through task-edit controls.
    - The default Done column only shows tasks and workflow run projections completed in the last seven days; older completed items are hidden from the default board, not auto-deleted at seven days.
    - Mouse drag-and-drop and touch-friendly Kanban status changes.
    - Task creation and editing from /tasks, from chat, and from assistant-generated task proposals.
    - Text and voice creation flow: audio transcript, corrected transcript, AI instruction, then task creation or update.
    - Tasks linked to one primary chat and zero or more projects for chat task lists and project filtering.
    - Screenshot-aligned Tasks UI surfaces using the Figma style shown in the conversation: rounded white/grey boards, soft shadows, pill filters, compact task cards, and floating create/assign controls.
    - A shared task board/card component used by both the central /tasks page and project task sections, with common classes and behavior.
    - Active chat task preview at the top of the chat showing the currently worked task, progress count, and a click target to open chat task details.
    - Unified chat details/settings page that uses the settings header pattern and consolidates chat tasks, files, usage details, and share controls.
    - Replacement of the existing chat share menu/process with the new settings-style chat Share section shown in the provided designs.
    - Shared chat exports include chat-primary tasks by default as read-only shared task records; task decrypt authority is carried in the share URL fragment payload, matching the existing chat/embed share-link pattern.
    - AI and user assignees, including AI execution when assigned or scheduled.
    - AI sequentially working through a chat's AI-assigned tasks, marking blocked when user input or permissions are required.
    - Due-date scheduling for AI-assigned tasks that survives server restarts.
    - Retention and cleanup policies for completed/archived tasks, key wrappers, and expired execution contexts so stale task data does not grow indefinitely.
    - CLI, npm SDK, and pip SDK task-management contracts before web E2E verification.
    - User-defined labels as the official task organization term, with tag terminology accepted as CLI/SDK aliases.
    - Labels stored as client-encrypted task content plus master-key-derived HMAC blind indexes for private server-side equality filtering.
    - Friendly task priority levels none, low, medium, high, and urgent mapped to server-visible numeric priority for filtering and sorting.
    - Standalone tasks that can optionally attach to one chat, one or more projects, a plan, and either OpenMates/AI or a user assignee.
    - CLI task management through both account-wide `openmates tasks ...` commands and chat-scoped `openmates chats ... tasks ...` commands.
    - Terminal Kanban rendering and a Tasks workspace inside the CLI TUI with keyboard navigation and task-detail action parity.
    - Human-readable task short IDs derived from project, plan, chat, or standalone scope while preserving globally unique task IDs for storage.
    - Explicit AI/runtime task tools for create, update, delete, reorder, complete, block, unblock, skip, and continuation enforcement.
  out:
    - Replacing Celery /v1/tasks/{task_id} polling for long-running app skills.
    - Fully customizable Kanban columns in V1.
    - Multi-assignee tasks in V1.
    - Server-side full-text search over private task title, description, or label plaintext.
    - Public task sharing, team task boards, or cross-user collaboration beyond a single owner account.
    - Complex dependency graphs, recurring tasks, or workflow-style automation beyond one due-date trigger.
    - Editing workflow run definitions or node state from the Tasks view; workflow definitions remain managed in Workflows, and running workflow runs are immutable except for cancellation/resume-style controls explicitly owned by the workflow runner.
    - Server-side decryption of durable task title, description, tags, activity, or instruction fields.
    - Native Apple implementation in the first web/API slice, although the spec records expected parity.
    - Remote filesystem access, code mutation, or high-stakes agentic coding permissions.
    - Complex dependency graphs between tasks in V1.
    - Archived-task restore/list UI in the first label/priority hardening slice; archived encrypted bundles are write-only cold storage until a later retrieval surface is specified.
    - A separate skipped Kanban column; skipped tasks use backlog plus queue metadata.

