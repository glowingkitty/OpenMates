  parity_expectations:
    - Apple should eventually list tasks, show chat-linked tasks, filter project tasks, edit status, and start AI-assigned tasks through the same /v1/user-tasks contracts.
    - Apple must preserve the same client-side encryption model for durable task content.
    - Apple may defer drag-and-drop Kanban in the first native slice if it exposes equivalent status changes accessibly.
  verification:
    - Run or attempt python3 scripts/apple_remote.py status when Apple task UI or shared API clients are implemented.
    - Run or attempt python3 scripts/apple_remote.py build-ios after web/API contracts are stable.
  intentional_native_differences:
    - Native task status changes may use segmented controls or accessible move actions instead of board drag-and-drop.

clarification:
  rounds:
    - question: What is the smallest V1 task flow that must work end-to-end?
      answer: >
        User asks in chat to plan work, assistant proposes tasks, user edits a
        task, assistant progresses/completes tasks, and /tasks shows them linked
        back to the chat. Tasks must also link to projects, be assignable to AI
        or a specific user identity/hash, support Kanban drag/drop/touch, and
        support AI creation from text or voice-transcript flow.
    - question: Should task contents be readable/searchable by the server, or should server-visible fields stay minimal?
      answer: >
        Start with the privacy-focused option: client-side encryption and
        minimal backend metadata only.
    - question: What task states should V1 support, and should they be fixed or customizable?
      answer: >
        Use fixed V1 statuses backlog, todo, in_progress, blocked, and done.
        Blocked is for tasks requiring user input or another missing condition.
        Backlog means intentionally parked; manual new tasks should default to
        todo.
    - question: What should be the explicit AI-start trigger?
      answer: >
        Assigning AI should generally mean execution intent. A task assigned to
        AI with no due date should start immediately. Moving an AI-capable task
        to in_progress can also start work after confirmation if no working chat
        exists.
    - question: Should each task have one primary source context, or can it belong to multiple contexts?
      answer: >
        A task should have one primary linked chat and optional links to multiple
        projects. Project mentions should be included when the assistant is
        instructed to work on a project-linked task.
    - question: For V1, how rich should task details be?
      answer: >
        Include title, description, status, assignee, linked chat, linked
        projects, due date, priority, tags, and activity/history. If a due date
        is set and AI is assigned, AI should wait until due time using a
        reliable server-side scheduler that survives restarts.
    - question: Should standalone tasks be supported in the CLI-ready slice?
      answer: >
        Standalone tasks must be supported. A task can optionally attach to a
        chat, project, or plan, and can be assigned to OpenMates/AI or to a user
        ID. If a standalone AI task starts, OpenMates automatically creates a
        working chat so the user can inspect what was worked on and connected
        devices can sync that context.
    - question: How should blockers, skip, and queue continuation behave?
      answer: >
        A blocked task pauses the remaining queue in that chat by default until
        the user or assistant explicitly resolves it. If the user sets the task
        back to todo, marks it done, unblocks it, or runs skip, the next eligible
        task can auto-start. Skip moves the task to backlog, keeps the chat link,
        marks it clearly skipped through queue metadata, and starts the next
        eligible todo task.
    - question: How should task state be detected and enforced during AI work?
      answer: >
        Do not infer task completion, blockers, or unblock events from prose.
        The AI runtime must expose explicit task tools/API actions for create,
        update, delete, reorder, complete, block, unblock, skip, and continue.
        Assistant task execution is not complete until all eligible tasks are
        done/skipped/backlogged or a blocker requiring input is recorded.
    - question: What task identifiers and CLI output should V1 use?
      answer: >
        Every task needs a globally unique storage ID plus a human-friendly short
        ID usable in CLI commands. Short ID prefixes use fixed precedence:
        project, then plan, then chat, then standalone. CLI output always
        decrypts task content locally before displaying it; users should not need
        a special flag to see plaintext on an authenticated device.
    - question: Which CLI and TUI surfaces are required for V1?
      answer: >
        V1 must include account-wide `openmates tasks ...` commands and
        chat-scoped `openmates chats ... tasks ...` commands for list, show,
        create, edit, delete, start, status, block, unblock, skip, done, reorder,
        and board. The CLI TUI must add a Tasks workspace with keyboard-navigable
        Kanban, task detail pages, and full parity for those actions. Real
        dev-server CLI/TUI smoke evidence is required before web work.
  vision_summary: >
    Tasks V1 is a separate privacy-preserving product model that sits beside
    chats, projects, and workflows. Tasks appear in chat task lists, project
    filters, and the central /tasks Kanban board; users and assistants can both
    edit them, and AI-assigned tasks can start immediately or at a due time.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Assistant creates and updates chat-linked tasks
    given:
      - Alice is logged into the web app and has an active chat.
      - Alice asks the assistant to plan a website launch.
    when:
      - The assistant proposes five tasks and Alice accepts them.
      - Alice edits one task title from the chat task list.
    then:
      - Five durable task records are created in the task collection.
      - Each task is linked to the active chat and visible in that chat's task list.
      - The edited title is client-encrypted for durable storage and appears correctly after reload.

  - id: S-2
    title: Central Kanban shows tasks across chats and projects
    given:
      - Alice has tasks linked to multiple chats, sub-chats, and projects.
      - Some tasks are assigned to Alice and some are assigned to AI.
    when:
      - Alice opens /tasks.
      - Alice filters by project and drags a task from todo to backlog on a touch-capable device.
    then:
      - The board shows backlog, todo, in_progress, blocked, and done columns.
      - The project filter shows only tasks linked to that project.
      - The status change persists and syncs after reload.
      - The board remains usable with pointer, keyboard, and touch interactions.

  - id: S-3
    title: Direct task creation supports text and voice instruction flows
    given:
      - Alice is on /tasks.
    when:
      - Alice creates one task from typed text.
      - Alice creates another through voice recording, transcript, corrected transcript, and AI task extraction.
    then:
      - Both tasks default to todo when no AI execution is requested.
      - The voice-created task stores only encrypted task content durably.
      - Alice can review and edit extracted tasks before they are committed.

  - id: S-4
    title: AI-assigned task starts immediately when no due date exists
    given:
      - Alice creates a task from /tasks with assignee set to AI.
      - The task has no due date and is linked to one project.
    when:
      - Alice confirms AI assignment.
    then:
      - The task status becomes in_progress.
      - A working chat is created or selected for the task.
      - The assistant receives an instruction equivalent to Complete the task plus the linked project mention.
      - The task links back to the working chat.

  - id: S-5
    title: AI-assigned due task starts reliably at due time
    given:
      - Alice creates a task assigned to AI with a due date in the future.
      - The server restarts before the due date.
    when:
      - The due time arrives.
    then:
      - The server-side scheduler claims the due task once.
      - The task moves to in_progress and starts its working chat.
      - Duplicate assistant runs are not created after restart or retry.

  - id: S-6
    title: Chat sequentially works through AI-assigned tasks
    given:
      - A chat has three todo tasks assigned to AI.
      - The chat is not currently working on a task.
    when:
      - The first AI task starts.
    then:
      - The assistant works on tasks one after another in that chat.
      - Completed tasks move to done.
      - The next eligible task starts only after the previous task finishes or blocks.

  - id: S-7
    title: Task blocks when user input or permission is required
    given:
      - The assistant is working on an AI-assigned task.
    when:
      - The assistant needs user input, a permission approval, a connected account, file access, or another missing dependency.
    then:
      - The task status becomes blocked.
      - The linked chat or sub-chat records the waiting context.
      - The central /tasks board shows the blocked task with a clear open-chat action.
      - When Alice resolves the blocker, the task can resume from the linked chat.

  - id: S-8
    title: Tasks use privacy-preserving durable storage
    given:
      - Alice creates tasks with private titles, descriptions, tags, and activity entries.
    when:
      - The backend stores and later lists those tasks.
    then:
      - Durable private task content is client-encrypted.
      - The server stores only minimal metadata needed for ownership, filtering, scheduling, status, ordering, and execution safety.
      - Temporary AI execution context is Vault-encrypted and expires according to the task execution retention policy.

  - id: S-9
    title: Screenshot-aligned task surfaces stay visually and structurally consistent
    given:
      - Alice has a chat with four tasks where the second task is currently active.
      - Alice has a project with linked tasks across backlog, todo, in_progress, and done.
    when:
      - Alice opens /tasks on desktop.
      - Alice opens the project page task section.
      - Alice opens the active chat and clicks the top task preview.
    then:
      - /tasks and the project page render task boards with the same shared component classes, card styles, filter pills, column layout, and task actions.
      - The active chat top area shows a compact current-task preview with current task title, Task 2/4 progress, checkbox, progress bar, and open/next affordance.
      - Clicking the preview opens the unified chat details/settings page.
      - The chat details/settings page uses the settings header pattern and exposes Tasks, Files, Usage details, and Share sections as one unified chat management surface.
      - The mobile layout matches the screenshot intent with a stacked hero card, segmented icon tabs, task checklist, add task action, and cancel-all-tasks action.

  - id: S-10
    title: Chat settings replaces the existing share menu and unifies chat management
    given:
      - Alice opens a chat that has tasks, uploaded/generated files, usage entries, and share controls.
      - The existing chat share menu/process is still present in the current product.
    when:
      - Alice opens chat settings/details from the active-chat task preview or chat actions.
      - Alice switches between Tasks, Files, Usage details, and Share tabs.
      - Alice creates a share link, reveals the QR code, reveals the short URL, stops sharing, downloads chat data, downloads files, and downloads usage data.
    then:
      - The old standalone share menu/process is replaced by the settings-style Share tab.
      - The settings page uses canonical settings UI components and the shared settings header pattern rather than one-off inline CSS.
      - Files, Usage details, and Share tabs match the provided mobile designs and remain usable on desktop.
      - Existing share behavior, QR/link display, auto-expire, stop sharing, download chat, and privacy options continue to work through the new surface.

  - id: S-11
    title: Shared chats include decryptable read-only task records
    given:
      - Alice owns a chat with three tasks whose primary_chat_id is the chat.
      - One additional task is linked only through a project and has no primary_chat_id for the chat.
    when:
      - Alice creates a shared chat link with the default task-sharing option enabled.
      - Bob opens the shared chat link.
    then:
      - Bob can decrypt and view the three chat-primary tasks using each existing task key wrapped by the share-link fragment key inside the exported bundle.
      - Bob sees those tasks as read-only shared context, not editable owner tasks.
      - The project-only task is not included unless Alice explicitly includes project context in a future share flow.

  - id: S-14
    title: Task sharing uses URL-fragment key material, not server-readable share grants
    given:
      - Alice owns a chat-primary task encrypted with a per-task key.
      - Alice creates a shared chat link with optional password protection.
    when:
      - OpenMates builds the shared chat payload.
    then:
      - The share payload includes the task id and the existing task key wrapped by the share-link fragment key; no new durable task key is created for sharing.
      - The wrapped existing task key is decryptable only from the URL fragment key and optional password, following the existing chat/embed share contract.
      - The backend never receives the URL fragment key, optional password, raw task key, or a server-readable durable share wrapper.
      - Existing chat and embed share links continue to work without format changes.

  - id: S-15
    title: Workflow runs appear as read-only task-view cards
    given:
      - Alice has one workflow run currently running and one workflow run completed two days ago.
      - Alice has one workflow run completed more than seven days ago.
    when:
      - Alice opens the central Tasks view.
      - Alice cancels the running workflow run from its task-view card.
      - Alice opens the completed workflow run card.
    then:
      - The running workflow run appears in the in_progress column with workflow identity, current step/progress when available, and actions to cancel or open the workflow run.
      - The recently completed workflow run appears in the Done column with an Open workflow run action.
      - The workflow run completed more than seven days ago is hidden from the default Done column but remains inspectable from workflow run history or an explicit older/completed history view.
      - Workflow run cards are read-only projections, not editable user_tasks rows, and cannot be dragged between task columns or assigned to AI.
      - Cancelling the active card requests workflow-run cancellation and stops future workflow steps when the runner reaches a cancellation checkpoint.

  - id: S-16
    title: CLI manages standalone and chat-scoped tasks
    given:
      - Alice is logged into the OpenMates CLI on a device with access to her master key.
      - Alice has one existing chat, one project with short ID OM, and one active plan.
    when:
      - Alice creates a standalone task from `openmates tasks create` and assigns it to OpenMates.
      - Alice creates a chat-scoped task from `openmates chats <chat> tasks create`.
      - Alice lists, shows, edits, deletes, starts, blocks, unblocks, skips, marks done, and reorders tasks from both command groups.
    then:
      - CLI output shows locally decrypted task titles, descriptions, tags, status, assignee, short ID, linked chat/project/plan, queue state, and blocker state.
      - The standalone OpenMates task automatically creates a working chat when started.
      - Chat-scoped commands operate only on tasks for the selected chat unless the user explicitly changes scope.
      - Commands accept human-readable short IDs such as OM-6 as well as full task IDs.

  - id: S-17
    title: Terminal board and TUI workspace manage tasks
    given:
      - Alice has tasks across backlog, todo, in_progress, blocked, and done.
      - Alice opens the CLI in an interactive terminal.
    when:
      - Alice runs `openmates tasks board` with a project filter.
      - Alice opens the CLI TUI and switches from Chats to Tasks.
      - Alice navigates the Kanban board with the keyboard and opens a task detail page.
    then:
      - The non-interactive board groups tasks into fixed status columns, truncates long lists, and falls back to stacked columns on narrow terminals.
      - The TUI Tasks workspace supports keyboard navigation across columns, cards, and task details.
      - Task detail pages expose the same actions as CLI commands, including create, edit, delete, start, block, unblock, skip, done, and reorder.
      - "`--json` remains available for script-friendly command output and is not replaced by the board renderer."

  - id: S-18
    title: Assistant task execution cannot stop before queue completion or blocker
    given:
      - A chat has three eligible todo tasks assigned to OpenMates.
      - The AI runtime has task tools available for task state transitions.
    when:
      - OpenMates starts the first task.
      - The assistant response ends after completing one task while eligible tasks remain.
    then:
      - The runtime records completion through a task tool, not inferred prose.
      - If no blocker exists, the runtime injects an internal continuation instruction and starts the next eligible task.
      - The user sees a system/activity entry that OpenMates continued to the next task, not a fake user-authored message.
      - If a task blocks, the chat queue pauses until the user or assistant explicitly resolves, skips, marks done, or requeues the task.

  - id: S-12
    title: AI task queue resumes from Vault-encrypted execution context
    given:
      - Alice has an active chat with three AI-assigned tasks.
      - Each task has durable client-encrypted fields and a short-lived Vault-encrypted execution context.
    when:
      - The first task completes.
    then:
      - The backend can start the next eligible task by decrypting only the Vault execution context, not durable task fields.
      - If the execution context is expired or missing, the next task becomes blocked with missing_execution_context.
      - Execution contexts are deleted on task completion, cancellation, expiry, or user/account deletion.

  - id: S-13
    title: Old task data is archived or retained according to lifecycle policy
    given:
      - Alice has completed, archived, blocked, and active tasks from several months ago.
      - Alice has configured chat auto-delete and default task retention settings.
    when:
      - The daily retention job runs.
    then:
      - Expired execution contexts and orphan key wrappers are deleted first.
      - Completed tasks past the hot-storage retention window are compressed, archived to encrypted S3 cold storage, and only then removed from Directus hot task tables with their activity, key wrappers, and execution contexts.
      - Active, blocked, due, or explicitly kept tasks are not deleted.
      - Chat auto-delete either deletes chat-primary tasks with the chat or preserves them only when explicitly detached/kept by the user.

  - id: S-19
    title: Labels and priority organize many private tasks efficiently
    given:
      - Alice has hundreds of OpenMates tasks across Apple, marketing, SDK, billing, and release work.
      - Several tasks have labels apple and bug, stored only as encrypted label content plus blind label indexes.
    when:
      - Alice runs `openmates tasks list --label apple --label bug --priority high`.
      - Alice edits TASK-1770 with `--add-label ios --remove-label bug --priority urgent`.
    then:
      - The API filters by owner, status/project/chat when present, label_hashes, and priority using indexed server-visible metadata.
      - The server never stores or logs plaintext label names.
      - CLI and SDK output uses label terminology, while tag flags and SDK fields continue to work as aliases.
      - Priority displays as a friendly string and persists as numeric metadata for efficient sorting.

  - id: S-20
    title: Account export and import preserve encrypted tasks
    given:
      - Alice has tasks with encrypted title, description, labels, linked projects, priority, queue state, and key wrappers.
      - Alice starts an account export from the CLI, npm SDK, pip SDK, or web app account settings.
    when:
      - Alice imports the exported account data into a fresh account/device flow with the correct account key material.
    then:
      - The export manifest lists tasks as an included encrypted account data domain.
      - The exported data contains encrypted task records, task key material/wrappers, label blind indexes, priority metadata, and safe link metadata without durable task plaintext.
      - The import restores tasks so CLI, SDK, and web task lists decrypt the same titles, descriptions, labels, statuses, priorities, and project/chat links.
      - The import is idempotent and does not duplicate tasks when the same export bundle is applied twice.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Assistant-created tasks are durable records linked to the originating chat and editable by the user from the chat task list.
  - id: AC-2
    scenario: S-2
    text: /tasks renders a central Kanban board with fixed backlog, todo, in_progress, blocked, and done columns, project filtering, and persisted drag/drop or touch status changes.
  - id: AC-3
    scenario: S-3
    text: Users can create tasks directly on /tasks from text and from a voice-to-corrected-transcript-to-AI extraction flow, with review before commit.
  - id: AC-4
    scenario: S-4
    text: Assigning AI to an unscheduled task starts execution immediately by moving the task to in_progress and creating or reusing a working chat.
  - id: AC-5
    scenario: S-5
    text: AI-assigned tasks with due dates start once at due time through a restart-safe server-side scheduler.
  - id: AC-6
    scenario: S-6
    text: A chat with multiple AI-assigned tasks executes them sequentially and does not start the next task until the active task finishes or blocks.
  - id: AC-7
    scenario: S-7
    text: Tasks that need user input, permissions, connected accounts, file access, or dependencies are marked blocked and resume only after the blocker is resolved.
  - id: AC-8
    scenario: S-8
    text: Durable task content uses client-side encryption while AI execution uses only short-lived Vault-encrypted context and minimal server-visible metadata.
  - id: AC-9
    scenario: S-2
    text: Tasks can link to one primary chat and multiple projects, and project pages can filter or list tasks linked to that project.
  - id: AC-10
    scenario: S-4
    text: Project-linked AI task instructions include project mentions/context so the assistant can access relevant project data.
  - id: AC-11
    scenario: S-9
    text: The central /tasks page and project task page reuse the same task board, column, card, pill filter, and action classes so their visual design and behavior remain consistent.
  - id: AC-12
    scenario: S-9
    text: Active chats show a top current-task preview with title, Task N/total count, progress bar, checkbox state, and click behavior that opens chat task details.
  - id: AC-13
    scenario: S-9
    text: Chat-level Tasks, Files, Usage details, and Share controls are unified into one settings-style chat details surface with a shared settings header pattern.
  - id: AC-14
    scenario: S-10
    text: The new chat settings Share tab replaces the existing standalone share menu/process while preserving share link creation, QR code display, short URL display, stop sharing, auto-expire, and download chat behavior.
  - id: AC-15
    scenario: S-10
    text: The chat settings Files and Usage details tabs match the provided designs and support downloading chat files and usage data from the unified settings surface.
  - id: AC-16
    scenario: S-10
    text: Chat settings implementation uses existing canonical settings UI components and shared settings header patterns, with no custom inline settings UI styling.
  - id: AC-17
    scenario: S-11
    text: Every task has a per-task key and owner/chat/project access contexts; shared chat links include chat-primary task records and the existing task keys wrapped by the share URL fragment key by default.
  - id: AC-18
    scenario: S-12
    text: AI-assigned tasks in active chats have short-lived Vault-encrypted execution contexts, and queue continuation uses that context rather than durable task plaintext.
  - id: AC-19
    scenario: S-13
    text: Task retention jobs delete expired execution contexts and orphan key wrappers, archive eligible completed tasks to encrypted S3 cold storage, and remove archived hot rows without deleting active or blocked work.
  - id: AC-20
    scenario: S-14
    text: Shared task decryptability is granted by share-link fragment key material, not by a persistent server-readable share key grant.
  - id: AC-21
    scenario: S-15
    text: The central Tasks view includes workflow run projections in in_progress and Done, with active runs cancellable and all workflow run cards read-only except for workflow-run actions.
  - id: AC-22
    scenario: S-15
    text: The default Done column shows only user tasks and workflow run projections completed in the last seven days; older completed items are hidden from the default board rather than auto-deleted at seven days.
  - id: AC-23
    scenario: S-16
    text: The CLI exposes account-wide `openmates tasks ...` and chat-scoped `openmates chats ... tasks ...` commands for list, show, create, edit, delete, start, status, block, unblock, skip, done, reorder, and board.
  - id: AC-24
    scenario: S-16
    text: Standalone OpenMates/AI tasks create a working chat when started, sync that chat to connected devices, and remain inspectable from both task and chat views.
  - id: AC-25
    scenario: S-17
    text: CLI task output decrypts task content locally by default, supports JSON output for automation, and renders a terminal Kanban board for human review.
  - id: AC-26
    scenario: S-17
    text: The CLI TUI includes a Tasks workspace with keyboard-navigable Kanban, task detail pages, and full action parity with task commands.
  - id: AC-27
    scenario: S-16
    text: Every task has a globally unique task_id and a human-readable short_id whose prefix precedence is project, plan, chat, then standalone.
  - id: AC-28
    scenario: S-18
    text: A skipped task keeps its chat link, moves to backlog, records queue_state skipped, and starts the next eligible todo task in the same chat queue.
  - id: AC-29
    scenario: S-18
    text: AI task execution state transitions are explicit tool/API actions, and the assistant cannot stop task-mode execution while eligible tasks remain unless a blocker requiring user input is recorded.
  - id: AC-30
    scenario: S-19
    text: Users can create, list, edit, and filter tasks by custom labels; labels are official UX terminology, tags remain aliases, and plaintext labels are encrypted with the task key.
  - id: AC-31
    scenario: S-19
    text: Label filters use master-key-derived HMAC blind indexes stored in label_hashes so the server can filter efficiently without knowing label plaintext.
  - id: AC-32
    scenario: S-19
    text: Task priority is exposed as none, low, medium, high, and urgent in CLI/SDK while remaining server-visible numeric metadata for indexed sorting and filtering.
  - id: AC-33
    scenario: S-13
    text: Hot Directus task tables stay bounded by real Postgres indexes and a daily archive job that moves completed tasks older than 30 days to encrypted S3 before deleting hot rows.
  - id: AC-34
    scenario: S-20
    text: Account export manifest and data include encrypted user task records, wrappers, labels, label_hashes, priority, and safe metadata with no decrypted task plaintext.
  - id: AC-35
    scenario: S-20
    text: Account import restores exported tasks idempotently across CLI, npm SDK, pip SDK, and web account flows so local task decryption and filtering still work after import.

contracts:
  api:
    - route: GET /v1/user-tasks
      auth: session_or_api_key
      request: "query: status?, project_id?, chat_id?, assignee?, due_before?, label_hash?, label_hashes?, priority?, limit?, cursor?"
      response: "{ tasks: TaskSummary[], next_cursor?: string }"
      notes:
        - Does not return decrypted private content; clients decrypt encrypted fields locally.
        - Supports pagination for central /tasks and project filters.
        - Label filters are AND semantics: every requested blind label hash must be present in label_hashes.
    - route: GET /v1/settings/export-account-manifest
      auth: session_or_api_key
      request: "none"
      response: "{ success: true, manifest: { total_tasks: number, has_tasks: boolean, ... } }"
      notes:
        - The tasks export domain advertises encrypted task records and key material as included account data for web account export.
        - SDK facades expose the same data through GET /v1/sdk/account/export/manifest.
    - route: GET /v1/settings/export-account-data
      auth: session_or_api_key
      request: "query: include_usage?, include_invoices?, include_settings?, include_profile?, include_tasks?"
      response: "{ success: true, data: { user_tasks: UserTaskExportRecord[], ... } }"
      notes:
        - Task exports contain encrypted task fields, encrypted task keys/wrappers, label_hashes, priority, and safe metadata only.
        - Task exports must not include decrypted title, description, labels, tags, latest instruction, or activity plaintext.
        - SDK facades expose the same data through GET /v1/sdk/account/export/data.
    - route: POST /v1/settings/import-chat or future account import endpoint
      auth: session_or_api_key
      request: "account export ZIP or structured import payload containing user_tasks"
      response: "{ imported: { tasks: { created: number, updated: number, skipped: number } }, errors?: ImportError[] }"
      notes:
        - Import upserts task_id-scoped encrypted records for the authenticated owner and is safe to retry.
        - Import preserves encrypted fields and wrappers without server-side decryption.
        - If the current import-chat endpoint remains chat-only, task account import must be added before AC-35 is considered complete.
    - route: POST /v1/user-tasks
      auth: session_or_api_key
      request: "{ encrypted_title, encrypted_description?, status?, assignee, primary_chat_id?, project_ids?, due_at?, priority?, encrypted_labels|encrypted_tags?, label_hashes?, key_wrappers? }"
      response: "{ task_id, status, encrypted_fields, metadata }"
      notes:
        - Defaults status to todo when no status is provided and no AI execution starts.
        - Starts AI immediately only when assignment/execution fields request AI work and due_at is absent or already due.
        - linked_project_ids is request-only raw project ID input. The backend stores linked_project_hashes for filtering and encrypted_linked_project_ids for owner-side client use.
        - encrypted_labels is the preferred durable encrypted field; encrypted_tags remains accepted during the transition and contains the same JSON array.
        - label_hashes contains HMAC-SHA256 blind indexes derived client-side from a master-key label index key and normalized label text.
        - key_wrappers must include a master wrapper and should include chat/project wrappers whenever primary_chat_id or linked_project_ids are present.
    - route: PATCH /v1/user-tasks/{task_id}
      auth: session_or_api_key
      request: "partial task encrypted fields and metadata with client version; key_wrappers when primary_chat_id or linked_project_ids changes"
      response: "{ task_id, version, updated_at }"
      notes:
        - Rejects stale versions with a visible conflict response rather than silently overwriting user or assistant edits.
        - Project/chat relinks update linked_project_hashes, encrypted_linked_project_ids, and replacement key wrappers together so access contexts do not drift.
        - Label edits update encrypted_labels/encrypted_tags and label_hashes together; add/remove convenience fields are client-side helpers, not durable plaintext storage.
    - route: POST /v1/user-tasks/{task_id}/start-ai
      auth: session_or_api_key
      request: "{ chat_id?, project_ids?, encrypted_instruction_context?, vault_execution_context? }"
      response: "{ task_id, status: in_progress, chat_id, ai_run_id }"
      notes:
        - Creates or reuses a working chat and sends the task execution instruction.
        - Stores a short-lived Vault-encrypted execution context when AI work is queued, then deletes it on completion/cancel/expiry.
    - route: POST /v1/user-tasks/extract
      auth: session_or_api_key
      request: "{ encrypted_corrected_transcript_or_text, mode: create|update, context_chat_id?, project_ids? }"
      response: "{ proposed_tasks: ProposedTask[] }"
      notes:
        - Returns proposals for user review before POST /v1/user-tasks commits them.
    - route: POST /v1/user-tasks/{task_id}/key-wrappers
      auth: session_or_api_key
      request: "{ key_wrappers: TaskKeyWrapper[] }"
      response: "{ key_wrappers: TaskKeyWrapper[] }"
      notes:
        - Adds or replaces owner/chat/project wrappers for the task key without exposing the raw task key to the server.
        - Persistent share wrappers are intentionally not part of the task source-of-truth; share decryptability is bundle/link scoped and uses existing task keys wrapped by URL-fragment key material.
    - route: POST /v1/user-tasks/{task_id}/execution-context
      auth: session_or_api_key
      request: "{ vault_encrypted_context, expires_at, context_version }"
      response: "{ task_id, expires_at }"
      notes:
        - Used only for AI-assigned active-chat tasks. This is not durable private task storage.
        - Missing or expired execution context blocks queue continuation with missing_execution_context.
    - route: POST /v1/user-tasks/{task_id}/complete
      auth: session_or_api_key
      request: "{ version, encrypted_activity_message?, completed_at? }"
      response: "{ task_id, status: done, queue_state, next_task_id? }"
      notes:
        - Used by users, CLI, and assistant task tools. Prose alone is not a completion signal.
        - If the task belongs to an active queue and no blocker exists, completion may claim the next eligible todo task.
    - route: POST /v1/user-tasks/{task_id}/block
      auth: session_or_api_key
      request: "{ version, blocked_reason_code, encrypted_activity_message? }"
      response: "{ task_id, status: blocked, queue_state: waiting_for_user }"
      notes:
        - Blocks the remaining queue for the task's primary chat until explicit unblock, skip, done, or todo requeue.
        - blocked_reason_code is safe metadata and must not include private task content.
    - route: POST /v1/user-tasks/{task_id}/unblock
      auth: session_or_api_key
      request: "{ version, next_status?: todo|in_progress, encrypted_activity_message? }"
      response: "{ task_id, status, queue_state, next_task_id? }"
      notes:
        - May be called by the user or assistant after the missing condition is resolved.
        - If the task returns to todo or completes, the queue can start the next eligible task according to queue rules.
    - route: POST /v1/user-tasks/{task_id}/skip
      auth: session_or_api_key
      request: "{ version, encrypted_activity_message? }"
      response: "{ task_id, status: backlog, queue_state: skipped, next_task_id? }"
      notes:
        - Skip does not create a new skipped status or column.
        - The task remains linked to its chat/project/plan and is visually marked as skipped through queue metadata/activity.
        - If the skipped task was blocking a chat queue, the next eligible todo task auto-starts.
    - route: POST /v1/user-tasks/reorder
      auth: session_or_api_key
      request: "{ moves: [{ task_id, status?, position, before_task_id?, after_task_id? }] }"
      response: "{ tasks: [{ task_id, status, position, version }] }"
      notes:
        - Supports changing order within a status and moving across statuses from CLI, TUI, and web.
        - Must enforce owner/chat/project permissions for every moved task.
    - route: GET /v1/user-tasks/view
      auth: session_or_api_key
      request: "query: status?, project_id?, chat_id?, include_workflow_runs=true, done_since?, limit?, cursor?"
      response: "{ items: TaskViewItem[], next_cursor?: string }"
      notes:
        - Returns a mixed account overview for the Tasks surface: normal user_task items plus workflow_run projection items owned by the user.
        - The default done_since is now minus seven days for Done-column requests. This filters default visibility only and must not delete older completed user tasks or workflow run records.
        - Workflow run projection items are derived from workflow_runs/workflow metadata and are not written into user_tasks.
        - Workflow run projection items expose only safe summary fields needed for the card: workflow_id, run_id, title, status, trigger_type, started_at, finished_at, current_node_summary/progress when available, content_available, and open/cancel capability flags.
        - Workflow run projection items cannot be updated through PATCH /v1/user-tasks/{task_id}; run cancellation uses the Workflows API.
  data:
    view_models:
      - name: TaskViewItem
        purpose: Unified Tasks-board item rendered by the central task surface.
        variants:
          - kind: user_task
            source: user_tasks
            mutable_from_tasks_view: true
          - kind: workflow_run
            source: workflow_runs joined to workflow summary metadata
            mutable_from_tasks_view: false
            allowed_actions:
              - open_workflow_run
              - cancel_workflow_run when status is queued, running, or waiting
        status_mapping:
          - workflow queued or running -> in_progress
          - workflow completed -> done
          - workflow failed, cancelled, or waiting_for_input -> blocked unless a future Needs attention column is introduced
        notes:
          - Workflow run projections keep workflow_runs as the source of truth and avoid duplicating automation execution records into encrypted user task rows.
          - Cards may show workflow run title, workflow name, trigger type, current node/progress, and run status, but must not expose encrypted run content outside the workflow authorization boundary.
    collections:
      - name: user_tasks
        purpose: Durable user-facing task records.
        server_visible_fields:
          - id
          - hashed_user_id
          - status
          - short_id
          - short_id_prefix
          - assignee_type: ai|user
          - assignee_hash
          - primary_chat_id
          - linked_project_hashes
          - label_hashes
          - parent_task_id
          - plan_id
          - plan_step_id
          - task_type
          - verification_id
          - due_at
          - priority
          - position
          - queue_state: none|waiting|active|skipped|waiting_for_user
          - version
          - created_at
          - updated_at
          - started_at
          - completed_at
          - blocked_reason_code
          - ai_execution_state
        encrypted_fields:
          - encrypted_title
          - encrypted_task_key
          - encrypted_description
          - encrypted_labels
          - encrypted_tags
          - encrypted_linked_project_ids
          - encrypted_activity_summary
          - encrypted_latest_instruction
      - name: user_task_activity
        purpose: Append-only activity entries for task changes and AI progress.
        encrypted_fields:
          - encrypted_message
          - encrypted_snapshot
        server_visible_fields:
          - id
          - task_id
          - actor_type
          - actor_hash
          - event_type
          - created_at
      - name: user_task_key_wrappers
        purpose: Per-task key grants for owner, chat, and project access.
        encrypted_fields:
          - encrypted_task_key
        server_visible_fields:
          - id
          - hashed_task_id
          - hashed_user_id
          - key_type: master|chat|project
          - hashed_chat_id
          - hashed_project_id
          - created_at
          - expires_at
        notes:
          - master wrappers are wrapped with the owner master key.
          - chat wrappers are wrapped with the primary chat key.
          - project wrappers are wrapped with the project key.
          - share links do not create durable server-side task share wrappers; shared payloads include task id plus the existing task key wrapped for the share URL fragment key and optional password.
      - name: user_task_archives
        purpose: Cold-storage index records for encrypted completed-task bundles moved out of Directus hot tables.
        server_visible_fields:
          - id
          - hashed_user_id
          - archive_s3_key
          - task_count
          - archived_at
          - completed_before
          - retention_days
          - content_checksum
        encrypted_fields:
          - encrypted_manifest
        notes:
          - Archive bundles are gzip-compressed JSON and encrypted before S3 upload using the same user-key encryption pattern as usage archives.
          - The first slice writes archives and deletes hot rows after upload; restore/list archived tasks is explicitly deferred.
      - name: shared_task_payload
        purpose: Ephemeral/exported task data included in shared chats or future project shares.
        fields:
          - task_id
          - encrypted_task_record
          - existing_task_key_wrapped_by_share_key
          - generated_at
          - duration_seconds
          - password_protected
        notes:
          - The backend may store or serve the encrypted payload, but it must never receive the URL fragment key, optional password, raw task key, or decrypted task fields.
          - The share payload re-wraps the existing task key for this bundle only; it does not create a new task key and does not persist a durable share wrapper.
          - Recipients can view shared tasks read-only unless they explicitly import/copy them into their own account with new owner keys.
      - name: user_task_execution_contexts
        purpose: Short-lived Vault-encrypted plaintext context for AI execution and queue continuation.
        encrypted_fields:
          - vault_encrypted_context
        server_visible_fields:
          - id
          - task_id
          - hashed_user_id
          - hashed_primary_chat_id
          - context_version
          - created_at
          - expires_at
          - consumed_at
        notes:
          - Must be deleted on task completion, cancellation, expiry, user deletion, or chat deletion.
          - Must never be sent to shared chat viewers.
    statuses:
      - backlog
      - todo
      - in_progress
      - blocked
      - done
    defaults:
      manual_status: todo
      parked_status: backlog
      ai_immediate_status: in_progress
      skipped_status: backlog
      completed_hot_retention_days: 30
    priorities:
      none: 0
      low: 1
      medium: 2
      high: 3
      urgent: 4
    labels:
      official_name: labels
      aliases:
        - tags
      normalization: trim, lowercase, collapse internal whitespace, preserve user-facing punctuation after normalization.
      blind_index: HMAC-SHA256(HKDF(master_key, "openmates-task-label-index-v1"), normalized_label)
      filter_semantics: AND across all requested labels.
    queue_states:
      - none
      - waiting
      - active
      - skipped
      - waiting_for_user
    short_ids:
      - Every task has a globally unique task_id plus a human-readable short_id for CLI/TUI use.
      - short_id prefix precedence is project, then plan, then chat, then standalone.
      - Project-linked task IDs use the project short ID when present, for example OM-6.
      - Plan-linked task IDs use the plan short ID only when no project short ID applies.
      - Chat-linked task IDs use the chat short ID only when neither project nor plan short ID applies.
      - Standalone task IDs use a stable standalone prefix chosen by the implementation.
      - Project and plan short IDs must be introduced or verified before task short IDs depend on them.
  cli:
    commands:
      - openmates tasks list [--status <status>] [--project <short-id|id>] [--plan <short-id|id>] [--chat <short-id|id>] [--json]
      - openmates tasks list [--label <label>...] [--priority none|low|medium|high|urgent] [--json]
      - openmates tasks board [--project <short-id|id>] [--plan <short-id|id>] [--chat <short-id|id>] [--page <n>] [--json]
      - openmates tasks board [--label <label>...] [--priority none|low|medium|high|urgent] [--json]
      - openmates tasks show <task-short-id|task-id> [--json]
      - openmates tasks create --title <text> [--description <text>] [--assign openmates|<user-id>] [--project <id>] [--plan <id>] [--chat <id>] [--due <time>] [--label <label>...] [--labels <csv>] [--priority <level>]
      - openmates tasks edit <task-short-id|task-id> [--title <text>] [--description <text>] [--status <status>] [--assign <assignee>] [--project <id>] [--plan <id>] [--chat <id>] [--label <label>...] [--labels <csv>] [--add-label <label>...] [--remove-label <label>...] [--priority <level>]
      - openmates tasks delete <task-short-id|task-id> --confirm
      - openmates tasks start <task-short-id|task-id>
      - openmates tasks status [<task-short-id|task-id>] [--chat <id>] [--json]
      - openmates tasks block <task-short-id|task-id> --reason <code>
      - openmates tasks unblock <task-short-id|task-id>
      - openmates tasks skip <task-short-id|task-id>
      - openmates tasks done <task-short-id|task-id>
      - openmates tasks reorder <task-short-id|task-id> [--before <id>|--after <id>|--status <status>]
      - openmates chats <chat-short-id|chat-id> tasks list|board|show|create|edit|delete|start|status|block|unblock|skip|done|reorder
    behavior:
      - CLI output always decrypts task content locally on authenticated devices before displaying titles, descriptions, tags, instructions, and activity summaries.
      - CLI help uses labels as official terminology and documents tags as accepted aliases for users migrating from tag-based workflows.
      - CLI must never print ciphertext as the normal human-facing output.
      - "`--json` returns structured decrypted fields plus safe metadata for local automation; sensitive output follows existing CLI redaction rules when logs are forwarded."
      - Chat-scoped commands default to the specified chat and never mutate tasks outside that chat unless the user explicitly passes another scope-changing flag.
      - Account-wide commands can manage standalone tasks and tasks attached to chats, projects, or plans.
      - Starting a standalone OpenMates task creates a working chat, links the task to it, and emits sync events for connected or later-online devices.
      - "`tasks board` renders a non-interactive Kanban board grouped by backlog, todo, in_progress, blocked, and done; narrow terminals stack columns vertically."
  tui:
    workspaces:
      - Chats
      - Tasks
    tasks_workspace:
      - Keyboard-navigable Kanban with columns for backlog, todo, in_progress, blocked, and done.
      - Task cards show short ID, title, assignee, queue position/state, blocker reason, and linked chat/project/plan.
      - Task detail pages expose create, edit, delete, start, block, unblock, skip, done, and reorder actions.
      - Reorder supports moving within a column and across statuses.
      - The TUI must remain usable when there are only a few tasks and when there are many tasks with pagination/truncation.
  ai_runtime:
    task_tools:
      - task.create
      - task.update
      - task.delete
      - task.reorder
      - task.complete
      - task.block
      - task.unblock
      - task.skip
      - task.continue
    enforcement:
      - Completion, blocker, unblock, skip, and continuation decisions must be committed through task tools/API actions, not inferred from assistant prose.
      - If an assistant response ends in task mode while eligible todo tasks remain and no blocker is recorded, the runtime injects an internal continuation instruction to keep working.
      - Internal continuation renders to users as a system/activity entry such as OpenMates continued to the next task, not as a fake user-authored message.
      - A blocked task pauses the chat queue until explicit user or assistant action resolves, skips, completes, or requeues it.
  websocket:
    - event: user_task_updated
      direction: server_to_client
      payload: "{ task_id, status?, version, updated_at, primary_chat_id?, linked_project_ids? }"
      behavior:
        - Active chat task lists and /tasks update without full reload.
    - event: user_task_execution_started
      direction: server_to_client
      payload: "{ task_id, chat_id, ai_run_id }"
      behavior:
        - Client opens or highlights the working chat when the user requested AI start.
    - event: user_task_blocked
      direction: server_to_client
      payload: "{ task_id, chat_id, blocked_reason_code, awaiting_user_input_id? }"
      behavior:
        - Kanban and chat task list show blocked status and open-chat action.
  ui_states:
    - Empty central task board.
    - Board with many tasks and pagination or lazy loading.
    - Central /tasks board matching the screenshot style.
    - Project page task board using the same board/card classes as /tasks.
    - Task creation from text.
    - Voice transcript recording, correction, proposal review, and commit.
    - Chat task list collapsed and expanded.
    - Active chat top current-task preview collapsed and clicked/opened.
    - Unified chat details/settings page with tasks, files, usage details, and share sections.
    - Chat settings Files tab with download files, dev-server/project path, file rows, and per-file download actions.
    - Chat settings Usage details tab with download CSV/YAML, grouped usage entries, providers, and credit amounts.
    - Chat settings Share tab before share link creation.
    - Chat settings Share tab after share link creation with copy, QR, URL, stop sharing, and download chat states.
    - Project-filtered tasks on project page.
    - Workflow run card in in_progress with Open workflow run and Cancel run actions.
    - Workflow run card in Done with Open workflow run action only.
    - Older completed items hidden from the default Done column after seven days, with an explicit history/older completed path if needed.
    - AI assigned and starting.
    - AI scheduled for due time.
    - AI in progress.
    - Blocked waiting for user.
    - Done.
    - Edit conflict.
  privacy_security:
    - Never store plaintext private task title, description, tags, transcript, or instruction content in durable server storage.
    - Never store plaintext private labels in durable server storage; label_hashes are keyed blind indexes, not raw hashes.
    - Server-visible label_hashes may reveal equality and counts for labels under one user, but not label text without the master-key-derived index key.
    - Server-visible linked_project_hashes and primary_chat_id are acceptable metadata for filtering and execution; raw linked_project_ids are stored only inside encrypted_linked_project_ids.
    - Use hashed user identifiers for assignee identity and ownership lookups.
    - Vault-encrypted AI execution context must have bounded retention and be deleted after task completion, cancellation, or expiration.
    - Durable task keys must never be stored raw; only wrapped task keys are stored.
    - Shared chats include only existing task keys wrapped for the shared task subset, protected by the share URL fragment key and optional password, not owner/master wrappers.
    - AI cannot start project-linked task work unless the user owns the linked projects and the feature is enabled.
    - Task API must enforce ownership for task, chat, and project links.
  retention:
    done_column_default_window_days: 7
    done_column_visibility:
      - The central Tasks board defaults the Done column to user tasks and workflow run projections completed in the last seven days.
      - Completed items older than seven days are hidden from the default board for focus, not deleted at seven days.
      - Deletion remains governed by the task retention policy, workflow run-content retention, workflow metadata retention, and user/account deletion rules.
    execution_context_ttl_seconds: 259200 # 3 days by default; refreshed while active execution continues.
    completed_task_default_retention_days: 30
    archived_task_default_retention_days: 90
    archive_storage: encrypted_s3_cold_storage
    cleanup_schedule: daily, staggered after chat auto-delete and usage archival jobs.
    delete_with_chat:
      - Chat-primary tasks are deleted when their primary chat is auto-deleted unless the user explicitly detaches or keeps them.
      - Project-linked tasks without primary_chat_id survive chat deletion and remain under project retention.
    cleanup_order:
      - Expired execution contexts.
      - Orphan key wrappers whose task no longer exists.
      - Completed tasks past hot retention are archived to S3 as encrypted gzip bundles that include task rows, key wrappers, and activity rows.
      - Hot user_tasks, user_task_key_wrappers, user_task_activity, and execution-context rows are deleted only after successful archive upload and archive index write.
      - Archived S3 objects follow the task archive bucket lifecycle and user/account deletion rules.
  naming:
    - /v1/tasks remains Celery/background task polling.
    - /v1/user-tasks is the user-facing product task API namespace.
  design:
    shared_components:
      - name: TaskBoard
        used_by:
          - /tasks central workspace
          - Project page task section
          - Chat details/settings Tasks section when wide enough
        required_classes:
          - tasks-board
          - tasks-board-column
          - task-card
          - task-filter-pill
          - task-action-pill
      - name: TaskCard
        style_contract:
          - White rounded card on light grey column background.
          - Soft shadow and compact typography matching the provided Figma screenshots.
          - Shows encrypted title, linked project/chat pill, AI assignee affordance, status, and open-chat action when linked.
      - name: ActiveChatTaskPreview
        style_contract:
          - Floating rounded pill in the active chat top area.
          - Shows task icon, Task N/total, progress bar, checkbox, current task title, and open/next affordance.
          - Remains usable on mobile without covering message content.
      - name: ChatDetailsSettingsPage
        style_contract:
          - Uses the settings header pattern similar to app settings pages.
          - Provides a chat hero summary card and segmented icon navigation for Tasks, Files, Usage details, and Share.
          - Tasks section shows progress, add task, editable checklist rows, drag/reorder, and cancel-all-tasks action.
          - Files section shows Download files, linked dev-server/project path when available, folder/file rows, file metadata, and per-file download buttons.
          - Usage details section shows Download usage data with CSV and YAML formats, grouped usage rows, provider names, and credit amounts.
          - Share section replaces the existing share menu/process and includes share-with-community, password protection, auto-expire, Share chat, generated-link success, copy to clipboard, QR show/hide, URL show/hide, stop sharing, and Download chat.
          - Uses canonical settings/elements components for rows, sections, toggles, buttons, icon tiles, dividers, and headers instead of custom inline CSS.
    visual_requirements:
      - Match the conversation-provided Figma style before inventing new task UI patterns.
      - Reuse existing design tokens and settings/elements components where the surface is settings-like.
      - Chat settings surfaces must follow docs/design-guide/settings-ui.md and use canonical settings/elements components.
      - Do not use custom one-off project task card styles that diverge from the central task board.
      - Use data-testid attributes for every interactive task control used by tests.
      - Replacement of the old share menu must be complete enough that users do not have two competing share flows.

