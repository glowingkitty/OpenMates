implementation_plan:
  existing_patterns:
    - backend/core/api/app/routes/tasks_api.py for the namespace to avoid, not to reuse for product tasks.
    - backend/core/api/app/routes/projects.py and frontend/packages/ui/src/services/projectService.ts for project authorization and encrypted project patterns.
    - backend/core/directus/schemas/chats.yml for chat/sub-chat link metadata and encryption notes.
    - backend/core/directus/schemas/embeds.yml for hashed identifiers and encrypted durable content notes.
    - docs/specs/workflows-v1/spec.yml for restart-safe scheduler and run-history concepts.
    - frontend/packages/ui/src/components/Header.svelte for platform:tasks navigation gating.
    - frontend/packages/ui/src/components/projects/ProjectsPage.svelte for project page integration points.
    - frontend/packages/ui/src/services/chatSyncService.ts for realtime task/sub-chat event routing patterns.
    - frontend/packages/ui/src/components/settings/elements for canonical settings-style chat details surfaces.
    - Conversation-provided Figma screenshots for the task board, project task board, active-chat preview, and chat details task panel visual contracts.
  architecture: >
    Add user-facing tasks as a first-class encrypted product model under
    /v1/user-tasks. The backend owns metadata, authorization, scheduling,
    realtime fanout, and AI execution orchestration. Clients own encryption,
    decryption, editing, Kanban presentation, and voice transcript review.
  data_flow:
    - User or assistant creates encrypted task content and minimal metadata.
    - Backend stores user_tasks and optional user_task_activity rows.
    - /tasks lists metadata plus encrypted fields; clients decrypt locally.
    - Chat and project pages query by primary_chat_id or linked_project_ids.
    - The central /tasks page and project page render the same decrypted task view models through shared TaskBoard and TaskCard components.
    - Active chat derives the current task preview from the linked chat task queue and opens ChatDetailsSettingsPage on click.
    - AI assignment without due_at creates or reuses a working chat and sends an execution instruction.
    - AI assignment with due_at is claimed by a restart-safe scheduler at due time.
    - AI completion, blockage, or user edits update task status and append encrypted activity entries.
  affected_files:
    - path: backend/core/directus/schemas/user_tasks.yml
      reason: New durable task collection and activity collection.
    - path: backend/core/api/app/routes/user_tasks.py
      reason: Product task API under /v1/user-tasks.
    - path: backend/core/api/app/services/user_task_service.py
      reason: Authorization, metadata filtering, conflict checks, and AI start orchestration.
    - path: backend/core/api/app/tasks/user_task_scheduler.py
      reason: Restart-safe due-date task claiming and execution dispatch.
    - path: backend/core/api/app/services/user_task_scheduler_service.py
      reason: Testable scheduler logic for due AI task claiming without Celery imports.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Assistant task creation/update and task execution instruction handling.
    - path: backend/apps/ai/processing/task_proposals.py
      reason: Bounded review-only assistant task proposals before client encryption and commit.
    - path: frontend/packages/ui/src/components/tasks/TasksPage.svelte
      reason: Central Kanban UI.
    - path: frontend/packages/ui/src/components/tasks/TaskBoard.svelte
      reason: Shared screenshot-aligned Kanban board for /tasks, project pages, and chat details.
    - path: frontend/packages/ui/src/components/tasks/TaskCard.svelte
      reason: Shared task card style and interactions across all task boards.
    - path: frontend/packages/ui/src/components/tasks/ActiveChatTaskPreview.svelte
      reason: Floating current-task preview in active chat.
    - path: frontend/packages/ui/src/components/tasks/TaskProposalReview.svelte
      reason: Review and accept assistant task proposals with client-side encrypted commit.
    - path: frontend/packages/ui/src/components/tasks/ChatTaskList.svelte
      reason: Chat-level task list and sequential task controls.
    - path: frontend/packages/ui/src/components/chats/ChatDetailsSettingsPage.svelte
      reason: Unified settings-style chat management surface for tasks, files, usage details, and share.
    - path: frontend/packages/ui/src/components/chats/ChatSettingsTasksSection.svelte
      reason: Settings-style task checklist section for chat details.
    - path: frontend/packages/ui/src/components/chats/ChatSettingsFilesSection.svelte
      reason: Settings-style file list and download section for chat details.
    - path: frontend/packages/ui/src/components/chats/ChatSettingsUsageSection.svelte
      reason: Settings-style usage details and export section for chat details.
    - path: frontend/packages/ui/src/components/chats/ChatSettingsShareSection.svelte
      reason: Replacement for existing share menu/process inside unified chat settings.
    - path: frontend/packages/ui/src/services/userTaskService.ts
      reason: Encrypted frontend task API client and local decrypt/encrypt helpers.
    - path: frontend/packages/ui/src/components/settings/elements
      reason: Existing canonical settings UI components must be reused for chat settings tabs.
    - path: frontend/packages/ui/src/components/projects/ProjectsPage.svelte
      reason: Project task filtering integration using the shared TaskBoard/TaskCard components.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Mount active chat current-task preview and open chat details surface.
    - path: frontend/apps/web_app/src/routes/tasks/+page.svelte
      reason: /tasks route.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI/npm SDK task methods.
    - path: packages/openmates-python/openmates/client.py
      reason: pip SDK task methods.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/tasks-v1/spec.yml
    - python3 scripts/audit_sdk_cli_parity.py after CLI/SDK task methods are added.
    - Backend pytest red/green for data model, API, scheduler, and AI queue semantics.
    - CLI, npm SDK, and pip SDK red/green before Playwright.
    - Deploy before Playwright green because web specs run against app.dev.openmates.org.
    - Apple remote status/build attempt if shared API client or native task UI is touched.
  verification_order:
    - Backend pytest contracts.
    - CLI contract.
    - npm SDK contract.
    - pip SDK contract.
    - Web Playwright after deploy.
    - Apple remote check/build when applicable.
  risks:
    - Naming confusion between Celery tasks and product user tasks.
    - Accidentally storing plaintext private task content in server logs, Directus, Redis, or activity rows.
    - Duplicate AI execution after scheduler restart or websocket retry.
    - Conflicts between user edits and assistant task updates.
    - Drag/drop accessibility and touch reliability.
    - Divergence between /tasks, project task boards, and chat task lists if shared components/classes are not enforced.
    - Chat details page scope creep while unifying tasks, files, usage details, and share controls.
    - Regressing existing share behavior while replacing the old share menu/process.
    - Violating settings UI consistency by implementing chat settings with one-off inline CSS instead of canonical settings components.
    - Scope creep into full workflows, recurring tasks, or agentic coding permissions.
  open_questions:
    - Should priority be server-visible metadata for sorting, or encrypted-only with client-side sorting after fetch?
    - Should tags be encrypted-only in V1, which limits server-side tag filters, or should there be optional hashed tag filters later?
    - Should blocked_reason_code use a fixed enum in V1 or be extensible per app/permission type?
    - Should task activity history be append-only forever, or follow a retention limit per task?
    - Should AI task execution use the parent chat key for linked chat instructions or create a task-specific key for task context payloads?
    - Standalone tasks use encrypted_task_key wrapped with the user's master key; linked task execution still needs a final decision on when to reuse chat/project keys for generated chat instructions.

