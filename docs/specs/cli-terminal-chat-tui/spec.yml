implementation_plan:
  existing_patterns:
    - frontend/packages/openmates-cli/src/cli.ts already routes commands and prints top-level help for no args.
    - frontend/packages/openmates-cli/src/client.ts already supports authenticated WebSocket sends and anonymous sends.
    - frontend/packages/openmates-cli/src/exampleChats.ts already exposes bundled public example chats to the CLI.
    - frontend/packages/openmates-cli/src/embedRenderers.ts already knows how to render many embed previews, but currently writes to stdout.
    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts is the web source for public example continuation cloning.
    - frontend/packages/ui/src/services/anonymousChatStorage.ts is the web source for anonymous local chat entries and anonymous message_history payloads.
  architecture: >
    Add a thin terminal UI layer around the existing CLI SDK: a terminal lifecycle
    helper, pure state transitions, pure line renderers, and small adapters from
    OpenMatesClient streaming callbacks into TUI state. Refactor embed preview
    rendering so compact previews can be returned as lines and existing stdout
    commands remain wrappers. Add shared example-continuation helpers where
    possible so CLI behavior mirrors the web duplication flow without copying
    large logic into the command router.
  data_flow:
    - "`openmates` detects TTY context and chooses TUI, quickstart, or help."
    - TUI start screen renders static intro copy and collects input.
    - "`/examples` collects local interest tags and ranks `ALL_EXAMPLE_CHATS` deterministically."
    - Opening an example renders public transcript and compact embed previews.
    - Sending from an example creates a new continuation chat, copies or serializes full example history, and sends the user's new message through authenticated or anonymous client paths.
    - Stream events update TUI message state; render throttling redraws the alternate screen.
    - Exiting always runs terminal cleanup in a `finally` path.
  affected_files:
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: no-arg dispatch, explicit help preservation, quickstart output
    - path: frontend/packages/openmates-cli/src/tui.ts
      reason: new TUI event loop and command handling
    - path: frontend/packages/openmates-cli/src/tuiTerminal.ts
      reason: raw mode, alternate screen, cleanup, resize handling
    - path: frontend/packages/openmates-cli/src/tuiRenderer.ts
      reason: pure frame rendering and scroll slicing
    - path: frontend/packages/openmates-cli/src/tuiExamples.ts
      reason: local interest selection and deterministic example ranking
    - path: frontend/packages/openmates-cli/src/tuiExampleContinuation.ts
      reason: CLI example continuation parity with web duplication flow
    - path: frontend/packages/openmates-cli/src/embedRenderers.ts
      reason: pure compact preview lines plus existing stdout wrappers
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: expose any missing non-stdout hooks needed by TUI sends
    - path: frontend/packages/ui/src/services/anonymousChatStorage.ts
      reason: web anonymous example continuation must send full public example history
    - path: frontend/packages/openmates-cli/README.md
      reason: npm onboarding docs for TUI and quickstart
    - path: docs/user-guide/cli/README.md
      reason: user guide update for TUI and programmatic usage
    - path: docs/user-guide/cli/chats.md
      reason: document example continuation and file references in TUI context
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/cli-terminal-chat-tui/spec.yml
    - CLI unit tests for TUI state/render/cleanup and continuation helpers.
    - CLI embed renderer unit tests for compact line previews.
    - Web unit test for anonymous example message_history parity through `scripts/tests.py run --suite vitest`.
    - Playwright red/green for logged-out web anonymous example continuation after deploy.
  verification_order:
    - CLI unit contracts first for TUI and continuation helpers.
    - Web anonymous unit contract for full example history payload.
    - Web Playwright red/green for user-visible anonymous continuation after deploy.
    - Apple impact check only if shared native-facing anonymous contracts change.

