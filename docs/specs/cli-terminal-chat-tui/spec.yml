risks:
  - Terminal raw-mode bugs can leave the shell in a bad state; cleanup paths need unit coverage and manual smoke testing.
  - Reusing sendMessageStreaming directly would corrupt TUI rendering because it writes to stdout; implementation must route streaming events into state instead.
  - Text width for emoji/CJK can be imperfect without a dependency; v1 should use simple width handling and add a dependency only if tests expose unacceptable layout breakage.
  - Anonymous example continuation will send public example text as context; keep this limited to public example content and avoid sending private local-only metadata.
  - Copying large example histories and embeds must stay bounded and deterministic; avoid broad IndexedDB scans or loading unrelated examples.
  - Npm registry checks add a network dependency to version/update commands; failures must be explicit and should not hide the installed version.

open_questions:
  - Should TUI interest selections persist across CLI invocations after v1, or remain terminal-session only long term?
