id: cli-terminal-chat-tui
title: CLI Terminal Chat TUI
status: approved

goal: >
  Make `openmates` with no arguments feel like a modern terminal chat client:
  interactive terminals open a clean full-screen TUI for chatting, browsing
  recommended example chats, continuing examples, and viewing compact embed
  previews, while non-interactive use remains script-friendly with a concise
  quickstart. The CLI TUI must reuse the existing OpenMates client/chat/embed
  contracts instead of introducing a heavy terminal framework.

scope:
  in:
    - "`openmates` with no positional arguments launches a terminal chat UI when stdin and stdout are interactive TTYs."
    - "`openmates --help` and `openmates help` continue to show command help."
    - Plain `openmates` in non-interactive or redirected contexts prints a compact programmatic quickstart and exits successfully.
    - The TUI start screen shows OpenMates ASCII/text logo, the for-everyone intro teaser copy, `/examples` guidance, file-reference hints, and a message input field.
    - "`/examples` first asks for local interest tags when no local TUI interest selection exists, then ranks bundled public example chats using the same deterministic interest semantics as the web guest-interest flow."
    - Example-chat screens render the full public transcript and the same message input footer as normal chats.
    - Continuing from an example creates a new real chat or anonymous chat entry and sends the full example history as context, matching web app processing parity.
    - Authenticated CLI example continuation clones the full example transcript and embeds into the new encrypted chat before sending the user's continuation message.
    - Logged-out CLI and web anonymous example continuation create an anonymous local chat entry and send the full example history in the anonymous `message_history` payload.
    - Chat messages, markdown-ish text, code blocks, follow-up suggestions, sub-chat progress, and interactive waiting states render inside the TUI without direct stdout streaming.
    - Embed previews render as compact cards. Text-heavy embeds such as code, docs, PDFs, transcripts, and generated applications show only a capped excerpt plus a command to open the full embed.
    - Full embed detail opens inside a dedicated scrollable TUI detail view and remains available through the existing `openmates embeds show <id>` command outside the TUI.
    - The TUI uses terminal alternate-screen cleanup so exiting restores the user's shell contents.
    - The first implementation uses no new runtime dependencies unless a later implementation task records a concrete terminal-width correctness need.
  out:
    - Mouse support in v1.
    - Full markdown rendering parity with the web TipTap/Markdown renderer.
    - Running live app/application previews inside the terminal.
    - Replacing existing CLI subcommands or changing their flags.
    - Browser-based payment, passkey, password, or raw security settings flows.
    - Apple native TUI implementation.
    - Server-side storage of logged-out anonymous example continuation history beyond existing anonymous request processing.
    - Adding ML/LLM-based example ranking; ranking remains deterministic and local.

