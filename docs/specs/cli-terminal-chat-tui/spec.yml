apple_impact:
  affected_files:
    - none
  parity_expectations:
    - The CLI TUI has no Apple terminal counterpart.
    - The web anonymous example-continuation parity fix must not change backend contracts in a way that breaks Apple anonymous chat.
    - If implementation touches shared example-chat ranking or anonymous request contracts used by Apple, run the Apple impact check from the testing guide before completion.
  verification:
    - Apple not affected for CLI-only TUI work.
    - Reassess with `python3 scripts/apple_remote.py status` plus build/test if shared anonymous or example-chat contracts change beyond web/CLI callers.
  intentional_native_differences:
    - Native Apple chat remains a platform-native UI rather than a terminal UI.

clarification:
  rounds:
    - question: When a user types into the input field while viewing a public example chat, should the continuation include the example transcript as context for the first real/anonymous message, or only use the user’s new message plus a lightweight source reference?
      answer: Check existing web code. The web app creates a new real chat based on the full example chat history, and the CLI must ensure full parity with that processing.
    - question: For logged-out users continuing from an example in the TUI, should we match today's anonymous web behavior exactly, or require parity-aligning anonymous continuation so the full example history is also sent/available as context?
      answer: Both web app and CLI must create a local chat entry as usual and send the full history when the user is not authenticated.
    - question: Should `openmates` with no arguments launch the TUI only for interactive TTYs, and what should non-interactive/script contexts do?
      answer: Interactive `openmates` should launch the TUI. Non-interactive `openmates` should output the most common programmatic commands for asking a question, files, login, examples, and command discovery, plus point to help.
    - question: How should `/login`, `/signup`, `/embed <id>`, and TUI interest persistence work in v1?
      answer: "`/login` should run inside the TUI as a pair-auth modal/status screen. `/signup` should cleanly leave the TUI before running or handing off to the existing guided signup flow. `/embed <id>` should resolve visible/current-chat embeds first, then current example/session embeds, then local/client lookup; `/embed` with no ID lists current chat embeds. TUI interests remain terminal-session only for v1."
    - question: For `/` autocomplete in the TUI, which interaction should be the v1 target?
      answer: "Show suggestions as the user types `/`; Up/Down can select a suggestion, Tab completes the highlighted suggestion, and users can still manually type and press Enter to run the exact command they entered."
    - question: Should `openmates version` and `openmates --version` only print the local CLI version, or also check for available updates?
      answer: "Print the CLI version number, check for available updates, and show when an update is available with the command to upgrade."
  vision_summary: >
    OpenMates CLI should become a chat-first terminal experience for humans while
    preserving script-friendly command behavior. Example chats are not a separate
    dead-end viewer: every example screen has the same input field, and continuing
    from it creates a new real or anonymous chat with the full example history and
    embeds available as context, matching web app semantics. The implementation
    should stay lean by using Node terminal primitives, pure render helpers, and
    existing OpenMates client/embed logic instead of a large TUI dependency.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Interactive `openmates` opens the terminal chat UI
    given:
      - A user installed the npm package and runs `openmates` in a normal interactive terminal.
      - stdin and stdout are both TTYs.
    when:
      - The command starts.
    then:
      - The CLI enters an alternate-screen terminal UI.
      - The top of the screen shows OpenMates logo text.
      - The start screen shows the existing for-everyone teaser lines `AI team mates.`, `For everyday tasks & learning.`, and `With privacy & safety by design.`
      - The start screen shows `Check example chats via /examples`.
      - The start screen explains file references such as `@./notes.md`, `@~/Downloads/report.pdf`, and `@src/app.ts`.
      - A message input field is visible at the bottom.

  - id: S-2
    title: Non-interactive `openmates` stays script-friendly
    given:
      - A user or script runs plain `openmates` with stdout redirected or piped.
    when:
      - The command detects that stdin or stdout is not an interactive TTY.
    then:
      - The CLI does not enter alternate-screen mode.
      - The CLI prints a compact programmatic quickstart and exits with status 0.
      - The quickstart includes examples for `openmates chats new`, `openmates chats new --json`, `openmates chats send --chat <chat-id>`, `openmates login`, `openmates signup`, `openmates chats list`, `openmates chats show <example>`, file references, `openmates apps list`, `openmates mentions list`, `openmates embeds show <embed-id>`, and `openmates --help`.

  - id: S-3
    title: Explicit help still shows command help
    given:
      - A user runs `openmates --help` or `openmates help` in any terminal context.
    when:
      - The CLI parses the command.
    then:
      - The existing command help is printed.
      - The TUI does not launch.
      - Existing subcommands and flags keep their current behavior.

  - id: S-4
    title: TUI sends a new chat message through the existing client pipeline
    given:
      - A user is on the TUI start screen.
      - The user types `Explain SQLite strict tables`.
    when:
      - The user presses Enter.
    then:
      - The TUI creates or uses the appropriate chat context through existing OpenMatesClient behavior.
      - Logged-in sends use the authenticated WebSocket client path and stream chunks into TUI state instead of writing directly to stdout.
      - Logged-out sends use the anonymous chat path and render lifecycle state inside the TUI.
      - The input field stays available after the response completes.
      - Existing terminal command output mode for `openmates chats new` and `openmates chats send` is unchanged.

  - id: S-5
    title: "`/examples` asks for interests before first recommendation"
    given:
      - A user is in the TUI.
      - The TUI has no local interest selection for this terminal session.
    when:
      - The user enters `/examples`.
    then:
      - The TUI shows the local personalization prompt `What are you interested in?` with selectable interest tags aligned with the web guest-interest tag registry.
      - The user can move with arrow keys, toggle tags with Space, and continue with Enter.
      - The prompt states that choices stay local in the terminal session unless a future signed-in settings flow explicitly saves account interests.
      - No network request sends cleartext selected interest tags.
      - Mouse support is not required.

  - id: S-6
    title: Example recommendations are ranked and keyboard navigable
    given:
      - A TUI user selected interests such as `software development`, `travel`, or `research`.
    when:
      - The user continues from the interest prompt.
    then:
      - Bundled example chats from `ALL_EXAMPLE_CHATS` are ranked deterministically from the selected interests.
      - Relevant examples such as Habit Garden Vite App, Svelte Runes Docs, Flights from Berlin to Bangkok, Why US Egg Prices Stayed High, and Read a PDF page can appear in the list when their topics match.
      - The list is navigable with arrow keys and Enter.
      - A search/filter input can narrow examples without leaving the TUI.

  - id: S-7
    title: Example chat screen includes transcript and input field
    given:
      - A user opens an example chat such as Svelte Runes Docs or Flights from Berlin to Bangkok.
    when:
      - The TUI renders the example chat screen.
    then:
      - The full public transcript is rendered in the scrollable message area.
      - Existing example embeds render as compact preview cards.
      - The bottom input field remains visible just like in real chats.
      - The example transcript itself remains read-only.
      - Typing into the input starts a continuation chat rather than mutating the bundled example.

  - id: S-8
    title: Authenticated example continuation clones full history and embeds
    given:
      - A signed-in CLI user is viewing a public example chat in the TUI.
      - The example contains messages and embeds.
    when:
      - The user types a continuation question and presses Enter.
    then:
      - The CLI creates a new regular encrypted chat with a new UUID.
      - The new chat records `source_demo_id` as the source example ID.
      - The full example transcript is copied into the new chat history before the new user message.
      - Example embed records needed by the transcript are cloned into the CLI/local embed store equivalent before rendering or sync.
      - The new user message is sent with the full copied history available to the backend through the same recovery/history semantics as web-created chats.
      - The public example remains unchanged.

  - id: S-9
    title: Logged-out example continuation sends full anonymous history in web and CLI
    given:
      - A logged-out user is viewing a public example chat in either the web app or CLI TUI.
      - Anonymous free usage is active.
    when:
      - The user types a continuation question and sends it.
    then:
      - The client creates a local anonymous chat entry as usual.
      - The local anonymous chat records `source_demo_id`.
      - The initial anonymous `message_history` payload includes the full public example conversation history before the new user message.
      - The full history sent to the backend excludes hidden implementation-only fields and includes only conversation roles, content, sender names, and timestamps required for AI context.
      - The anonymous local chat displays the example transcript plus the new user and assistant messages.
      - No durable server-side anonymous transcript is created beyond existing anonymous request processing.

  - id: S-10
    title: Text and embed rendering stays compact in chat view
    given:
      - A chat response contains markdown text, code fences, app-skill embed references, generated code/application embeds, docs embeds, PDF reads, or transcript embeds.
    when:
      - The TUI renders the chat view.
    then:
      - Text is wrapped to the current terminal width.
      - Code fences in normal assistant text are rendered as bounded text blocks.
      - Embed references render as compact cards rather than full inline content.
      - Text-heavy embeds show a capped excerpt, a truncation marker when needed, and `openmates embeds show <short-id>`.
      - Full code projects or long documents are not dumped into the main chat scrollback.

  - id: S-11
    title: Full embed detail is available on demand
    given:
      - A TUI chat contains a compact embed preview card.
    when:
      - The user enters a TUI embed command such as `/embed <short-id>` or uses the existing external command `openmates embeds show <short-id>` outside the TUI.
    then:
      - The full embed content is shown in a dedicated scrollable TUI detail view or the existing non-TUI renderer.
      - Multi-file code/application embeds provide file navigation or clearly separated file sections.
      - The user can return to the chat without losing scroll or input state.

  - id: S-12
    title: TUI scroll and resize behavior is predictable
    given:
      - A TUI chat has more lines than fit on screen.
    when:
      - The user presses Up, Down, PageUp, PageDown, Home, End, or resizes the terminal.
    then:
      - The scrollable message region moves without corrupting the input footer.
      - When pinned to bottom, new streaming chunks keep the viewport pinned.
      - When the user scrolls up, new chunks do not force the viewport to bottom.
      - Resizing rewraps and re-slices the visible lines.

  - id: S-13
    title: Terminal cleanup always restores the shell
    given:
      - A user has launched the TUI.
    when:
      - The user exits with `/exit`, Ctrl+C, EOF, SIGTERM, or an unexpected handled error.
    then:
      - Raw mode is disabled.
      - The cursor is shown.
      - Alternate screen mode is exited.
      - Mouse tracking remains disabled.
      - Event listeners installed by the TUI are removed.
      - The previous shell contents are restored by the terminal.

  - id: S-14
    title: Documentation explains both interactive and programmatic usage
    given:
      - A user reads the npm README or CLI user guide after installing OpenMates.
    when:
      - The docs describe the default `openmates` behavior.
    then:
      - The docs explain that `openmates` opens the TUI in an interactive terminal.
      - The docs explain that `openmates --help` shows the command reference.
      - The docs include programmatic examples for asking questions, JSON output, file references, examples, login/signup, apps, mentions, and embeds.

  - id: S-15
    title: TUI command autocomplete appears after `/`
    given:
      - A user is focused in the TUI input field.
    when:
      - The user types `/` or a partial command such as `/ch`.
    then:
      - The TUI shows likely command suggestions near the input without leaving the current screen.
      - Suggestions include `/help`, `/examples`, `/chats`, `/login`, `/signup`, `/embed`, `/clear`, and `/exit` when they match the typed prefix.
      - Up/Down changes the highlighted suggestion while suggestions are visible.
      - Tab completes the highlighted suggestion into the input.
      - Enter runs exactly the command currently in the input, so manually typed commands still work even if the highlighted suggestion differs.

  - id: S-16
    title: TUI follow-ups continue the same persisted account chat
    given:
      - A signed-in user sends the first normal message from the TUI.
      - The existing authenticated client returns a `chatId` for the persisted encrypted account chat.
    when:
      - The user sends a follow-up message without leaving the TUI.
    then:
      - The follow-up passes the active `chatId` to the existing authenticated send path.
      - The account chat appears in `openmates chats list` and the web app like other CLI-created chats.
      - The TUI does not create a new chat for each follow-up in the same active conversation.
      - Starting from a public example still creates a new continuation chat first, then subsequent follow-ups continue that new chat.

  - id: S-17
    title: "`/chats` lists recent account chats inside the TUI"
    given:
      - A signed-in user has recent account chats available through CLI sync.
    when:
      - The user enters `/chats` in the TUI.
    then:
      - The TUI shows a recent chats screen with short ID, title or fallback label, mate/category when known, and updated timestamp when available.
      - The screen uses the existing `OpenMatesClient.listChats()` encrypted sync/decryption path.
      - Logged-out users see a clear login prompt instead of a fake account history.
      - The command does not delete, mutate, or re-encrypt chats.

  - id: S-18
    title: Self-update output is branded, quiet, and explicit
    given:
      - A user runs `openmates update` or `openmates upgrade`.
    when:
      - The CLI starts the self-update flow.
    then:
      - The command prints the corrected OpenMates text logo, not the misspelled `OPENMATS` variant.
      - The command prints a checking status, current version, and latest target version.
      - If the current version is already the latest target version, the command prints `OpenMates CLI is already up to date.` and skips package installation.
      - If an update is needed, the command runs the package-manager install and then prints the installed target version.
      - Raw package-manager output is hidden by default, available with `--verbose`, and surfaced on failures.

  - id: S-19
    title: Version command reports installed version and update availability
    given:
      - A user runs `openmates version` or `openmates --version`.
    when:
      - The CLI can reach npm package metadata for the target dist-tag.
    then:
      - The command prints the installed OpenMates CLI version.
      - The command checks the latest available npm version.
      - If a newer version exists, the command prints the latest version and `Run: openmates upgrade`.
      - If no newer version exists, the command clearly says the CLI is up to date.
      - If the update check fails, the command still prints the installed version and an explicit non-fatal update-check warning.

  - id: S-20
    title: "`/workflows` lists and runs saved workflows inside the TUI"
    given:
      - A signed-in user has saved workflows available through the Workflow CLI API.
    when:
      - The user enters `/workflows` or `/workflow <id>` in the TUI.
    then:
      - The TUI shows a keyboard-navigable workflow list with enabled state, trigger summary, ID, and last run status.
      - Opening a workflow shows recent runs and retained node output summaries when the server returns them.
      - Pressing `r` starts an enabled workflow run through the existing manual-run API.
      - Pressing `u` refreshes the run list.
      - Pressing `c` cancels the latest queued, running, or waiting run.
      - YAML authoring and editing remain outside the TUI in the normal `openmates workflows ... --file` commands.

