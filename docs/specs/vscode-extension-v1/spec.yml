apple_impact:
  affected_files:
    - none
  parity_expectations:
    - VS Code extension V1 is a new desktop/editor platform shell around the shared web app UI and does not change Apple product surfaces.
    - Existing Project remote-source Apple impact remains governed by `docs/specs/projects-remote-sources/spec.yml`.
  verification:
    - Apple not affected for this extension shell spec.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should V1 load the live web app in a webview, or bundle app assets?
      answer: Bundle/native webview is preferred because production web security must not be weakened.
    - question: Should the VS Code surface show only a coding area or the full app shell?
      answer: Show the entire app shell exactly like the web browser, including settings, projects, workflows, and normal navigation.
    - question: Which authentication flows should V1 expose in VS Code?
      answer: Pair-login only. Passkey is likely not reliable in the bundled VS Code webview origin, and CLI-auth precedent avoids credential prompts.
    - question: What setup should users see before login or before project access is available?
      answer: Show VS Code-specific instructions to install and start the OpenMates CLI on every machine where they want OpenMates to access local project files.
    - question: Should V1 allow automatic file edits or commands?
      answer: No. Existing remote-source spec keeps V1 read/preview/import-only with non-mutating diff proposals. Patch application and commands are later-phase capabilities.
  vision_summary: >
    VS Code V1 should be the full OpenMates app, not a custom or limited coding
    UI. It should run from bundled shared Svelte assets inside a secured VS Code
    webview, use pair-login only, and guide users toward the CLI remote-access
    daemon for project access. V1 remains read-only for remote sources so the
    team can test the extension, webview parity, reconnect behavior, and Project
    previews while continuing to harden write/command security architecture.
  approved_by_user: true
  resolved_open_questions:
    - id: OQ-1
      decision: "Use `extensionKind: [\"workspace\", \"ui\"]`, preferring the workspace host while allowing UI-host fallback when no workspace is open."
    - id: OQ-2
      decision: Reuse the existing OpenMates app shell and pair-login components wherever possible; add only the minimum VS Code platform adapter or shell code needed for webview constraints.

scenarios:
  - id: S-1
    title: Internal tester opens the bundled full app shell
    given:
      - Alice installs the internal VSIX on her Mac.
      - "Alice opens VS Code and runs `OpenMates: Open`."
    when:
      - The extension creates the OpenMates webview.
    then:
      - The bundled OpenMates app shell loads without iframing `app.openmates.org`.
      - The UI uses the same shared Svelte app shell and design system as the browser app.
      - Browser-only production frame/CSP protections remain unchanged.

  - id: S-2
    title: Pair-only login in VS Code
    given:
      - Alice is not logged into OpenMates in the VS Code extension.
      - Alice is logged into OpenMates on another trusted device.
    when:
      - Alice starts login in the VS Code extension.
    then:
      - The extension shows pair-login instructions, QR/link, and PIN flow.
      - The extension does not show passkey, password, 2FA, recovery-key, or backup-code login options in V1.
      - The pair session can authenticate the bundled app shell and start normal app sync.

  - id: S-3
    title: Pre-login project setup guidance
    given:
      - Alice opens the VS Code extension before logging in or before connecting any Project source.
    when:
      - The pre-login or no-source state is shown.
    then:
      - The extension explains that OpenMates can view projects only when the CLI is installed and `openmates remote-access start` is running on the machine that has the project files.
      - The instructions distinguish local Mac project access from dev-server project access.
      - The extension remains usable as the full OpenMates app even when no CLI source is connected.

  - id: S-4
    title: Connected remote-access source appears in the full app
    given:
      - Alice has paired into the VS Code extension.
      - Alice has a Project source attached by `openmates remote-access start` on a dev server.
    when:
      - Alice opens Projects in the VS Code extension.
    then:
      - The Project source appears with connected/offline status from OpenMates state.
      - Virtual remote previews and upload-selected behavior match the browser app.
      - The VS Code extension does not read files directly to construct Project previews.

  - id: S-5
    title: Native VS Code open-file and diff bridge is optional and bounded
    given:
      - Alice has a VS Code workspace open that maps to a connected remote-access source.
      - The OpenMates app shows a remote file preview or non-mutating diff proposal.
    when:
      - Alice chooses Open in VS Code or Show diff.
    then:
      - The webview sends a typed message to the extension host.
      - The extension opens the matching workspace file or readonly diff using VS Code APIs.
      - If the source does not map to the active workspace, the app shows an actionable explanation instead of guessing a path.

  - id: S-6
    title: V1 cannot mutate files or run commands
    given:
      - Alice asks the assistant to update a remote Project file.
    when:
      - The assistant produces a proposed change.
    then:
      - OpenMates renders a non-mutating remote diff proposal.
      - No local or remote file is modified by the VS Code extension or remote-access CLI.
      - No terminal command, package install, test command, or git command is executed by the VS Code extension or remote-access CLI.
      - If Alice asks to apply the patch, V1 explains that patch application is a later-phase capability.

  - id: S-7
    title: Work continues when VS Code disconnects
    given:
      - Alice starts an OpenMates chat/task from the VS Code extension.
      - A remote-access CLI daemon remains connected on the dev server.
    when:
      - Alice closes her laptop or loses network connectivity.
    then:
      - OpenMates backend jobs and the remote-access daemon are not tied to the VS Code webview process.
      - On reconnect, the VS Code extension reloads current chat, Project, and source status from OpenMates.
      - Any blocked approval or offline state is shown clearly.

  - id: S-8
    title: GitHub Actions verifies the internal extension build
    given:
      - A pull request or dev branch changes the VS Code extension or shared VS Code webview build.
    when:
      - GitHub Actions runs extension checks.
    then:
      - The extension builds and packages into a VSIX artifact.
      - VS Code Extension Host smoke tests run headlessly.
      - Webview bridge and no-mutation guard tests pass.
      - Test artifacts are available for manual install when needed.

