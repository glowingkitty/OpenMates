assumptions:
  - id: A-1
    text: VS Code webviews can host the bundled OpenMates app shell if app runtime configuration is supplied by a VS Code platform adapter.
    category: vscode
    required_before: implementation
    status: unchecked
    evidence:
      - source: VS Code Extension API documentation
        summary: Webviews can run scripts, load local extension resources through `asWebviewUri`, and communicate through `postMessage`.
  - id: A-2
    text: Pair-login can be adapted for the bundled VS Code app shell without exposing account credentials in the webview.
    category: auth
    required_before: implementation
    status: unchecked
    evidence:
      - source: frontend/packages/openmates-cli/src/client.ts
        summary: CLI pair login already initiates, polls, completes PIN authorization, and stores a paired session without credential prompts.
  - id: A-3
    text: Internal V1 does not require marketplace packaging, publisher identity, extension signing, or public update channels.
    category: release
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification
        summary: User selected internal/manual build/test first with GitHub Actions coverage.

contracts:
  extension:
    package:
      location: frontend/apps/vscode_extension
      distribution: internal_vsix
      extension_kind:
        - workspace
        - ui
      commands:
        - "OpenMates: Open"
        - "OpenMates: Show Logs"
        - "OpenMates: Check Remote Access Setup"
      forbidden_commands_v1:
        - apply patch
        - write file
        - run terminal command
        - install package
        - run tests
        - git commit
        - git push
    webview:
      source: bundled_shared_openmates_app_assets
      live_iframe: false
      csp:
        - default-src 'none'
        - script-src webview nonce only
        - style-src webview nonce or bundled styles only
        - img-src webview https data as needed by existing app image proxy rules
      bridge_messages:
        inbound_from_webview:
          - openFile
          - showDiff
          - copyText
          - reportReady
        outbound_to_webview:
          - vscodeEnvironment
          - workspaceMappingStatus
          - nativeActionResult
    auth:
      allowed_v1:
        - pair_login
      blocked_v1:
        - passkey
        - password
        - 2fa_otp
        - recovery_key
        - backup_code
  web_app_adapter:
    behavior: >
      Add the minimum platform adapter needed for the same Svelte app shell to run
      in browser and VS Code webview builds. The adapter supplies API base URL,
      pair-login mode, VS Code bridge availability, and asset/base-path handling
      without forking UI components.
  remote_access:
    source_of_truth: docs/specs/projects-remote-sources/spec.yml
    allowed_v1:
      - source status
      - bounded search/read context
      - virtual remote previews
      - upload selected files to OpenMates
      - non-mutating diff proposals
    blocked_v1:
      - apply patch
      - shell command
      - package install
      - git mutation
      - local or remote filesystem mutation
  ci:
    required_jobs:
      - extension_unit
      - extension_package
      - extension_host_smoke
      - no_mutation_guard
      - related_cli_remote_access
    environment:
      - GitHub Actions Ubuntu runner
      - Xvfb for VS Code Extension Host when required
      - mocked OpenMates API/auth responses for extension smoke tests
  manual_install:
    build_command: cd frontend/apps/vscode_extension && npm run package
    install_command: code --install-extension openmates-vscode-<version>.vsix
    smoke_flow:
      - "Run OpenMates: Open."
      - Confirm full app shell loads.
      - Pair-login from another trusted device.
      - Start CLI remote-access separately on the machine with project files.
      - Confirm connected source and virtual previews appear.

privacy_security:
  - Production web app frame/CSP protections must not be weakened for VS Code.
  - VS Code V1 must not collect account credentials because login is pair-only.
  - VS Code V1 must not become a filesystem authority for OpenMates remote-source data; the CLI remote-access bridge remains the source-machine authority.
  - Source paths, repository remotes, CLI bridge credentials, runtime grants, and local filesystem details must not be shared in Project share payloads.
  - No write or shell capability can be hidden behind webview bridge messages in V1.
  - Webview messages must be typed and allowlisted; arbitrary command URIs are disabled unless a future spec approves exact commands.
  - Logs and CI artifacts must not include pair tokens, session cookies, project paths with private user names, API keys, or raw file contents.

