id: vscode-extension-v1
title: VS Code Extension V1
status: implementing

goal: >
  Provide an internal/manual-test VS Code extension that renders the full
  OpenMates web app shell 1:1 inside a VS Code webview, uses pair-only login,
  and connects users to existing read-only Project remote-access capabilities
  without weakening the production web app's frame/CSP security or introducing
  remote filesystem mutation in V1.

scope:
  in:
    - Internal/manual VSIX build and install flow for OpenMates team testing.
    - GitHub Actions coverage for extension build, package, activation,
      webview smoke behavior, VS Code bridge messages, and no-mutation guardrails.
    - A bundled VS Code webview build of the same OpenMates Svelte app shell and
      shared UI components used by the browser app.
    - Full app shell parity by default, including chat, settings, projects,
      tasks, workflows, app store, and normal navigation surfaces that are
      available in the browser app.
    - VS Code-specific pre-login setup guidance explaining that Project access
      requires installing and starting the OpenMates CLI on the machine where
      project files live.
    - Pair-only VS Code login for V1, reusing the existing pair-login security
      model rather than passkey, password, or 2FA credential entry inside the
      VS Code webview.
    - A minimal VS Code native bridge for opening files and showing proposed
      diffs when a remote-access source maps to the active VS Code workspace.
    - >
      Read-only Project remote-source behavior only: source status, previews,
      bounded search/read context, upload-selected files, and non-mutating
      remote diff proposals as defined by `projects-remote-sources`.
    - Reconnect behavior where the VS Code extension reloads existing OpenMates
      chat/job/source state after the editor or laptop disconnects.
  out:
    - Public VS Code Marketplace publishing, signing, marketplace metadata,
      paid listing, or release automation.
    - >
      Relaxing production web app `X-Frame-Options: DENY` or CSP
      `frame-ancestors 'none'`.
    - Loading the live production web app in an iframe as the V1 implementation.
    - Passkey, password, 2FA, recovery-key, or backup-code login inside the VS
      Code webview.
    - Applying patches, editing local or remote files, running terminal commands,
      package installs, test commands, git mutations, or any remote-source
      filesystem mutation from the VS Code extension or CLI in V1.
    - Reimplementing a separate limited VS Code-only OpenMates UI.
    - Depending on VS Code staying connected for backend AI jobs or
      remote-access daemon work to continue.
    - Full automated Remote-SSH end-to-end testing in V1 CI; remote-host behavior
      is covered by unit/contract tests plus manual smoke testing.

