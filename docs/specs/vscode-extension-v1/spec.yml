implementation_plan:
  existing_patterns:
    - Full Svelte app shell and shared UI package under frontend/apps/web_app and frontend/packages/ui.
    - CLI pair-login flow in frontend/packages/openmates-cli/src/client.ts.
    - Project remote-source read-only contract in docs/specs/projects-remote-sources/spec.yml.
    - VS Code webview message passing and ExtensionKind model from VS Code Extension API.
  architecture: >
    Add a new internal VS Code extension app that packages a VS Code-specific
    build of the same OpenMates app shell. The extension owns only webview
    lifecycle, environment injection, pair-only VS Code startup mode, and a tiny
    native bridge for open-file/show-diff actions. Project access remains routed
    through OpenMates backend state and the existing CLI remote-access source
    model; V1 exposes no mutation or shell-execution authority.
  data_flow:
    - "User installs internal VSIX and runs OpenMates: Open."
    - Extension creates webview with bundled app assets and VS Code environment config.
    - Bundled app shows VS Code pre-login setup instructions and pair-only login.
    - User pairs from another trusted OpenMates device.
    - App loads normal OpenMates state through API/WebSocket using the paired session.
    - Project remote-source status and previews come from OpenMates/CLI remote-access contracts.
    - Webview can request native open-file/show-diff only for mapped active workspace paths.
    - Disconnecting VS Code does not own or cancel backend jobs or remote-access daemon work.
  affected_files:
    - path: frontend/apps/vscode_extension/package.json
      reason: New internal extension package and scripts.
    - path: frontend/apps/vscode_extension/src/extension.ts
      reason: VS Code extension activation, commands, and webview lifecycle.
    - path: frontend/apps/vscode_extension/src/webviewHtml.ts
      reason: Strict CSP and bundled asset loading.
    - path: frontend/apps/vscode_extension/src/bridge.ts
      reason: Typed open-file/show-diff/native action bridge.
    - path: frontend/apps/vscode_extension/src/authMode.ts
      reason: Pair-only VS Code login mode wiring.
    - path: frontend/apps/vscode_extension/src/test/**
      reason: VS Code Extension Host smoke tests.
    - path: frontend/packages/ui/src/platform/**
      reason: Minimal shared platform adapter for browser versus VS Code runtime.
    - path: frontend/apps/web_app/**
      reason: Possible app-shell build target or adapter injection points while preserving browser behavior.
    - path: scripts/audit_vscode_extension_v1.py
      reason: Deterministic no-mutation guard for V1.
    - path: .github/workflows/vscode-extension.yml
      reason: CI build/package/smoke workflow.
    - path: docs/user-guide/cli/remote-access.md
      reason: Update only if setup wording changes after implementation.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/vscode-extension-v1/spec.yml
    - cd frontend/apps/vscode_extension && npm run test:unit
    - python3 scripts/audit_vscode_extension_v1.py
    - cd frontend/apps/vscode_extension && npm run test:vscode
    - cd frontend/apps/vscode_extension && npm run package
    - cd frontend/packages/openmates-cli && npm run test:unit:remote-access
    - python3 scripts/tests.py run --spec projects-remote-sources.spec.ts after deploy when shared Projects UI is affected
  verification_order:
    - Extension unit tests and no-mutation guard first.
    - CLI remote-access read-only tests second.
    - VS Code Extension Host smoke tests third.
    - Package VSIX artifact fourth.
    - Browser Projects Playwright after deploy only when shared Project UI changes.
    - Manual Mac VSIX smoke after CI artifact is green.

