risks:
  - id: R-1
    risk: The full Svelte app shell may rely on browser deployment assumptions that need careful platform-adapter seams for VS Code webviews.
    mitigation: Keep adapter narrow, write unit tests for config/base-path/auth mode, and avoid component forks.
  - id: R-2
    risk: Pair-login session storage may differ between browser and VS Code webview enough to require auth adapter work.
    mitigation: Treat A-2 as implementation-blocking and test pair-only auth before other extension UX.
  - id: R-3
    risk: Remote-SSH behavior may differ from local VS Code in ways not fully covered by GitHub Actions.
    mitigation: Add unit coverage for remoteName/workspace mapping and require manual Remote-SSH smoke before wider testing.
  - id: R-4
    risk: Future mutation features could accidentally slip into V1 bridge code.
    mitigation: Add `scripts/audit_vscode_extension_v1.py` and keep command/message allowlists explicit.

open_questions:
  - id: OQ-1
    question: Should the extension run as workspace-preferred or UI-preferred when no workspace is open?
    impact: Affects package `extensionKind`, Remote-SSH install location, and native open-file behavior.
    status: resolved
    resolution: "Use workspace-preferred `extensionKind: [\"workspace\", \"ui\"]`; no-workspace UI fallback can show the full app and disable workspace file actions."
  - id: OQ-2
    question: Can the current pair-login web components be reused directly in bundled VS Code mode, or is a small VS Code pair-login shell required?
    impact: Affects TASK-2 scope and auth storage tests.
    status: resolved
    resolution: Reuse existing components by default and keep any VS Code-only pair shell to the absolute minimum required by webview runtime constraints.
