implementation_plan:
  existing_patterns:
    - docs/specs/user-data-permission-audit/spec.yml
    - backend/core/api/app/security/user_data_permissions.yml
    - backend/apps/ai/processing/main_processor.py app settings/memories permission pause/resume flow
    - backend/core/api/app/routes/handlers/websocket_handlers/phased_sync_handler.py app settings/memories encrypted sync
    - frontend/packages/openmates-cli/src/client.ts app settings/memories and sub-chat approval handling
    - frontend/packages/ui/src/components/ChatMessage.svelte permission and sub-chat confirmation cards
    - backend/apps/reminder/app.yml create/list/cancel action split
    - backend/apps/mail/app.yml mail draft/search embed patterns
  architecture: >
    Implement connected accounts as a zero-knowledge sync surface similar to app
    settings/memories, but use a dedicated collection because provider accounts
    span multiple apps. Add an action-level permission broker in the AI pipeline
    before high-risk app skill execution. Add a token broker boundary so normal
    chat turns can continue after device lock for Auto decide and Allow automatically
    without persisting long-lived refresh tokens server-side. The broker stores
    active-turn refresh-token envelopes only Vault-encrypted under short-lived refs
    and exchanges them lazily after action authorization. Calendar v1 uses the
    framework first with Google OAuth, action-scoped permission settings,
    REST/API-key exclusion for client-mediated provider skills, and dedicated embeds.
  data_flow:
    - Client connects Google Calendar and chooses capability toggles.
    - Backend OAuth broker exchanges authorization code, returns token bundle once, and discards plaintext tokens.
    - Client encrypts connected account record and stores it through backend/Directus with hashed_user_id.
    - Login sync sends encrypted connected accounts to client alongside app settings/memories.
    - On message send, client builds coarse preprocessor capabilities and anonymized main-processor account directory.
    - For Auto decide and Allow automatically eligible accounts/actions, client submits refresh-token envelopes to token broker during message send.
    - Token broker stores refresh-token envelopes Vault-encrypted in Redis/memory under short-lived turn-token refs and returns ref acceptance before the client marks the message Sent.
    - Main processor proposes Calendar actions and asks permission broker.
    - Permission broker applies deterministic rules and optional safeguard LLM for Auto decide.
    - Auto-approved mutations create a pending operation journal entry and, when a foreground client is available, expose a short cancel window before provider mutation.
    - Calendar skill uses approved account/action refs server-side; token broker lazily exchanges only the selected ref after authorization; provider execution uses a short-lived access-token handle; the skill creates normalized result/embed payloads, writes encrypted decision receipts, records undo snapshots for mutations, and deletes refs/handles on completion.
    - Undo requests verify operation journal ownership, provider revision state, undo expiry, and action-specific undo support before reversing a provider mutation.
  affected_files:
    - path: docs/specs/calendar-permission-management/spec.yml
      reason: Executable product/security contract.
    - path: backend/core/directus/schemas/connected_accounts.yml
      reason: New encrypted connected account collection.
    - path: backend/core/directus/schemas/connected_account_action_decisions.yml
      reason: Encrypted decision audit collection.
    - path: backend/core/directus/schemas/connected_account_operation_journal.yml
      reason: Encrypted mutation operation journal for cancel and undo.
    - path: backend/core/api/app/routes/connected_accounts.py
      reason: Connected account CRUD and sync APIs.
    - path: backend/core/api/app/routes/provider_oauth_google_calendar.py
      reason: Google Calendar OAuth start/callback/update routes.
    - path: backend/core/api/app/routes/token_broker.py
      reason: Active-turn token ref storage, lazy refresh-token exchange, and access-token handle creation.
    - path: backend/core/api/app/routes/apps_api.py
      reason: Keep REST/API-key skill execution from invoking client-mediated connected-account skills without offline automation grants.
    - path: backend/core/api/app/services/connected_accounts_service.py
      reason: Owner checks, sync, and encrypted row validation.
    - path: backend/apps/ai/processing/permission_broker.py
      reason: Deterministic action policy, Auto decide ask/allow semantics, safeguard integration, receipt/cancel/undo policy.
    - path: backend/apps/calendar/app.yml
      reason: Calendar app, skills, permissions, embed metadata.
    - path: backend/apps/calendar/skills/*.py
      reason: Calendar get/create/update/delete skills.
    - path: backend/shared/providers/google_calendar/*.py
      reason: Pure Google Calendar provider wrapper.
    - path: frontend/packages/ui/src/services/connectedAccountsService.ts
      reason: Client-side encrypted connected account persistence and sync.
    - path: frontend/packages/ui/src/services/chatSyncService*.ts
      reason: Send account directory and token-ref metadata, gate Sent status on broker acceptance, handle permission pause/resume.
    - path: frontend/packages/ui/src/components/settings/**
      reason: Privacy Connected accounts and Calendar Accounts settings.
    - path: frontend/packages/ui/src/components/embeds/calendar/**
      reason: Calendar embed preview/fullscreen components, Undo controls, and context menu actions.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI connected account sync, token-ref submission, Sent status gating, REST/API exclusion awareness, and approval handling.
    - path: apple/OpenMates/Sources/**
      reason: Native parity for connected account settings and approval/cards when implemented.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/calendar-permission-management/spec.yml
    - python3 -m pytest backend/tests/test_connected_accounts_permissions.py backend/tests/test_token_broker_refs.py backend/tests/test_calendar_permission_broker.py
    - cd frontend/packages/openmates-cli && npm run build && npm run test:unit:cli
    - python3 scripts/run_tests.py --spec calendar-connected-accounts.spec.ts after deploy for green phase
    - python3 scripts/run_tests.py --spec calendar-permission-flow.spec.ts after deploy for green phase
    - python3 scripts/apple_remote.py status and targeted build/test evidence if Apple parity is implemented in the slice
  verification_order:
    - Backend permission/token broker pytest first.
    - CLI/client contract tests second.
    - Web Playwright red before deploy and green after deploy.
    - Apple remote status/build/test after web green when native files are touched.

