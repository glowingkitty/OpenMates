risks:
  - Refresh tokens transiting the backend token broker raise privacy risk; mitigation is Vault-encrypted Redis/memory storage under short-lived refs, isolated route, no logging, plaintext only inside the broker call stack during lazy exchange, immediate plaintext discard after exchange, tests that fail on plaintext persistence, and access-token-only handles for provider execution.
  - Google OAuth scope behavior for shared writable calendars must be verified during implementation; the spec requires minimal scopes but allows provider-specific mapping to choose the narrowest scope that supports shared calendar write/delete.
  - Auto decide can annoy users if it asks too often or erode trust if it approves too much; deterministic ask rules, transparent encrypted receipts, and easy setting changes are required.
  - Allow automatically can execute surprising mutations if users misunderstand the setting; mitigation is plain-language mode copy, mutation cancel windows, undo where possible, and visible encrypted receipts.
  - Undo cannot be guaranteed for all providers or actions; every mutation must declare undo availability before execution and show a disabled Undo reason when reversal is impossible or expired.
  - LLM prompt injection in event descriptions or external calendar content could try to manipulate tool use; provider content must be treated as untrusted and cannot influence permission policy.
  - Apple parity may lag if web/backend slices are large; API and sync contracts must remain platform-neutral even if native UI implementation is split.

open_questions:
  - Should Calendar Read Allow automatically pre-create turn-token refs for all connected Calendar accounts with that mode, or only accounts whose client-side label/app mention heuristic matches the user message? The current spec requires eligible accounts/actions but leaves the exact local filtering heuristic to implementation.
  - What exact Google Calendar scopes are required to support shared writable calendars with least privilege? Implementation must verify before final OAuth route work.
  - Should active-turn token refs and access-token handles use a 5, 10, or 15 minute TTL? The spec requires short-lived and completion deletion but leaves the exact constant for implementation review.
  - What exact non-interactive CLI flags or JSON output shape should permission approval, auto-cancel windows, and undo use?
