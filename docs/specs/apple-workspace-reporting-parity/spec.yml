implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/Header.svelte for rendered workspace/header behavior.
    - frontend/packages/ui/src/components/settings/SettingsReportIssue.svelte for report form states and payload intent.
    - frontend/packages/ui/src/services/clientLogForwarder.ts and logCollector.ts for logging modes and sanitization behavior.
    - apple/OpenMates/Sources/App/MainAppView.swift for current Apple header, workspace switcher, welcome cards, and suggestions.
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsView.swift and SettingsSubPages.swift for OpenMates settings primitives and routing patterns.
  architecture: >
    Implement the Apple shell changes as native UI slices using existing
    OpenMates primitives. Keep backend contracts unchanged by mapping native
    reporting/logging payloads onto existing web endpoints. Treat workspace
    destinations as presentation/navigation state only until each product spec's
    native API/UI implementation lands.
  data_flow:
    - User taps a workspace entry in the header.
    - MainAppView updates selected workspace state and renders an implemented native screen or a placeholder/read-only screen.
    - User opens report issue from chat/header/settings context.
    - Native report form gathers safe fields, sanitized runtime state, optional screenshot, and bounded logs.
    - APIClient posts /v1/settings/issues and stores returned issue_id/short_issue_id for confirmation.
    - Authenticated reports push bounded logs to /v1/settings/issue-logs; optional debug/admin/default logging runs independently.
  affected_files:
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Header workspace switcher, compact logo, invite/referral affordance, report issue entry, welcome parity.
    - path: apple/OpenMates/Sources/Shared/Components/NetworkStatusView.swift
      reason: Reconnect/offline banner localization, debounce, and testability.
    - path: apple/OpenMates/Sources/Features/Settings/Views/ReportIssueView.swift
      reason: Replace stock UI and backend endpoint mapping.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsView.swift
      reason: Settings/report/invite routing integration.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsBillingView.swift
      reason: Confirm invite/referral/gift settings path and avoid billing gift-card substitution.
    - path: apple/OpenMates/Sources/Core/I18n/AppStrings.swift
      reason: Add typed string accessors for new Apple UI labels.
    - path: frontend/packages/ui/src/i18n/sources/**/*.yml
      reason: Add source translation keys for any missing Apple-visible strings.
    - path: apple/OpenMatesUITests/ChatFlowParityUITests.swift
      reason: Workspace, header, welcome, and suggestion UI coverage.
    - path: apple/OpenMatesUITests/SettingsFullParityUITests.swift
      reason: Report issue UI coverage.
    - path: apple/OpenMatesUITests/SettingsBillingParityUITests.swift
      reason: Invite/referral gift affordance coverage if that path lives under billing/settings.
    - path: apple/OpenMatesTests/SettingsFullParityTests.swift
      reason: Payload/logging/banner unit coverage candidates.
  verification_strategy:
    - Run red-phase Apple UI/unit tests before implementation when feasible through scripts/apple_remote.py.
    - Run python3 scripts/apple_parity_audit.py after Apple product UI changes.
    - Run python3 scripts/apple_remote.py status before native build/test verification.
    - Run python3 scripts/apple_remote.py build-ios --simulator "iPhone 17" as the minimum native build proof.
    - Run targeted Apple UI tests after implementation.
    - Record skipped/blocked Mac evidence only as sanitized failure classes.
  verification_order:
    - Web source-of-truth discovery for invite/referral gift affordance.
    - Static Apple/product UI audit.
    - Apple unit/payload/sanitization tests.
    - Apple UI tests for workspace/header/report/welcome flows.
    - Apple build proof.

