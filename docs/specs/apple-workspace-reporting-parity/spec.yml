id: apple-workspace-reporting-parity
title: Apple Workspace Switcher And Reporting Parity
status: draft

goal: >
  Bring the Apple app shell closer to the rendered web app by enabling the
  workspace switcher entries for Projects, Plans, Tasks, and Workflows as
  polished first-slice destinations, aligning compact header/logo and invite
  affordances, and replacing the native issue-reporting/logging gaps with the
  existing privacy-safe web/backend reporting contracts.

scope:
  in:
    - Enable Apple workspace switcher entries for Chats, Projects, Plans, Tasks, and Workflows without presenting them as disabled controls.
    - Route incomplete Apple workspace entries to polished placeholder or read-only first-slice screens that clearly explain availability and link to the existing workspace product specs.
    - Replace the compact Apple workspace dropdown placeholder with a native iOS dropdown selection anchored by the existing custom workspace button, matching the web app's styled shell around a native select element.
    - Match compact web header logo behavior with the rounded-square mate icon affordance and correct tap behavior.
    - Reproduce the web header invite/referral gift affordance once its exact web source-of-truth is located; it must open the settings path where users share an invite/referral code for free-credit signup benefits.
    - Add a main chat/header report issue affordance that opens a native OpenMates report form with current chat/reporting context.
    - Replace ReportIssueView stock NavigationStack/Form/Picker/toolbar product UI with OpenMates settings primitives.
    - Submit Apple issue reports through /v1/settings/issues and push report-time logs through /v1/settings/issue-logs where authenticated.
    - Add native privacy-safe log collection/forwarding that mirrors web admin, debug-session, issue-time, and default diagnostic modes where applicable.
    - Improve reconnect/offline banner UX and instrumentation so transient WebSocket reconnects do not immediately show noisy user-facing banners.
    - Align welcome resume cards and new-chat suggestions with rendered web responsive behavior using Apple parity tests and source references.
  out:
    - Full native implementations of Projects, Plans, Tasks, and Workflows beyond placeholder/read-only first-slice destinations.
    - Creating new backend reporting endpoints when existing /v1/settings/issues, /v1/settings/issue-logs, /v1/settings/debug-logs, /v1/admin/client-logs, and /v1/client-logs contracts can be used.
    - Server-side decryption of chat, project, plan, task, workflow, or issue content.
    - Sending raw private message content, encryption keys, share URL fragments, credentials, device names, hostnames, private filesystem paths, or full screenshots without explicit user action.
    - Using stock SwiftUI product UI controls for the report issue form, dialogs, banners, or placeholder screens; the compact workspace selector has a narrow explicit native-dropdown exception.
    - Implementing billing gift-card purchase/redemption flows as part of the header invite/referral affordance.

context_discovery:
  github_issues:
    - "GitHub MCP issue lookup failed with 401 Bad credentials in the prior session."
    - "gh issue list --repo glowingkitty/OpenMates --search 'Apple workspace switcher projects plans tasks workflows report issue debug logs' --state all --limit 20 returned no matches."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/specs/apple-responsive-shell-parity/spec.yml
    - docs/specs/projects-remote-sources/spec.yml
    - docs/specs/plans-v1/spec.yml
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/short-report-issue-ids/spec.yml
    - docs/specs/simplified-feature-availability/spec.yml
    - .claude/rules/apple-ui.md
    - apple/AGENTS.md
  code_patterns:
    - apple/OpenMates/Sources/App/MainAppView.swift currently renders WorkspaceSwitcherTabs and hardcodes projects/plans/tasks/workflows disabled.
    - apple/OpenMates/Sources/App/MainAppView.swift contains welcome cards and suggestions approximating web responsive behavior.
    - apple/OpenMates/Sources/Shared/Components/NetworkStatusView.swift shows hardcoded English offline/reconnecting banners immediately.
    - apple/OpenMates/Sources/Features/Settings/Views/ReportIssueView.swift uses NavigationStack, Form, Picker, toolbar, hardcoded English strings, and posts to /v1/issues/report.
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsBillingView.swift and SettingsSubPages.swift already contain gift-card settings surfaces, but the header invite/referral gift affordance source still needs exact web mapping.
    - frontend/packages/ui/src/components/Header.svelte is the web source for workspace tabs, compact select shell, mobile logo icon, and header layout.
    - frontend/packages/ui/src/components/ActiveChat.svelte is the web source for report issue entry behavior from chat context.
    - frontend/packages/ui/src/components/settings/SettingsReportIssue.svelte and frontend/packages/ui/src/services/issueReportSubmission.ts are the web issue form and payload sources.
    - frontend/packages/ui/src/services/clientLogForwarder.ts and logCollector.ts define web admin/debug/ephemeral/E2E log forwarding modes.
    - backend/core/api/app/routes/settings.py owns /v1/settings/issues, /v1/settings/issue-logs, and /v1/settings/debug-logs.
    - backend/core/api/app/routes/admin_client_logs.py owns /v1/admin/client-logs.
    - backend/core/api/app/routes/client_logs_ephemeral.py owns /v1/client-logs and server-side sanitization.
  tests:
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift already checks workspace-switcher and workspace nav identifiers.
    - apple/OpenMatesUITests/ChatShellResponsiveParityUITests.swift covers shell responsive behavior.
    - apple/OpenMatesUITests/SettingsBillingParityUITests.swift and SettingsBillingStoreKitParityUITests.swift cover billing/settings surfaces.
    - apple/OpenMatesUITests/SettingsFullParityUITests.swift covers settings shell behavior.
    - apple/OpenMatesTests/SettingsFullParityTests.swift and SettingsBillingParityTests.swift are candidates for native settings/reporting unit coverage.
    - frontend/apps/web_app/tests/report-issue-flow.spec.ts covers web report issue behavior.

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Shared/Components/NetworkStatusView.swift
    - apple/OpenMates/Sources/Features/Settings/Views/ReportIssueView.swift
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsView.swift
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsBillingView.swift
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsSubPages.swift
    - apple/OpenMates/Sources/Core/Networking/APIClient.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - apple/OpenMatesUITests/ChatShellResponsiveParityUITests.swift
    - apple/OpenMatesUITests/SettingsFullParityUITests.swift
    - apple/OpenMatesUITests/SettingsBillingParityUITests.swift
    - apple/OpenMatesTests/SettingsFullParityTests.swift
  parity_expectations:
    - The rendered web app remains the source of truth for header layout, workspace switcher behavior, compact logo treatment, report issue entry placement, and welcome-card/suggestion responsive values.
    - Apple must use custom OpenMates primitives and generated design tokens, not stock product UI controls, except for the compact workspace native selection explicitly requested to match web select behavior.
    - Workspace entries are enabled as navigation affordances, but incomplete workspaces can land on polished placeholder/read-only screens until their native product specs are implemented.
    - Native diagnostic logging must preserve the same privacy model as web logging: explicit consent for debug sessions, admin/dev-only identified live logs, default warn/error telemetry without user identity, and issue-time logs tied only to a submitted issue.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatFlowParityUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsFullParityUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsBillingParityUITests
  intentional_native_differences:
    - Apple can use a native iOS dropdown selection for compact workspace selection because the web app also uses a native select inside a custom styled shell at small viewports.
    - Placeholder workspace destinations may be native read-only explanatory screens even when web has a richer implementation; deeper parity remains governed by the existing Projects, Plans, Tasks, and Workflows specs.
    - OS-owned screenshot/photo attachment pickers may remain native, but the surrounding report form and confirmation UI must use OpenMates primitives.

  clarification:
  rounds:
    - question: For Apple Projects, Plans, Tasks, and Workflows, what should the first enabled version do?
      answer: Show all tabs/dropdown entries now, but route incomplete workspaces to polished coming-soon/read-only screens while deeper native parity is phased in.
    - question: When you mentioned the Apple gift button, what should the spec require?
      answer: Reproduce the same logic and UI elements from the web app involving the header gift/invite affordance; it should link to the settings path where users can share their invite code so they and new users can receive free credits on signup.
    - question: Should the compact workspace selector use a custom OpenMates overlay or native dropdown selection?
      answer: Use the iOS native dropdown selection on click from the existing custom dropdown button, similar to the web app using a native select. Do not build a custom dropdown overlay UI for this control.
  vision_summary: >
    Apple should stop looking partially disabled in the main app shell: workspace
    entries should be reachable, compact navigation should use native selection
    from the custom button, and header/reporting affordances should match the web
    source of truth. Reporting and diagnostics should be useful for support while
    preserving existing privacy guarantees and avoiding stock SwiftUI product UI.
  approved_by_user: false

scenarios:
  - id: S-1
    title: User opens enabled workspace entries from the Apple header
    given:
      - Alice is authenticated in the Apple app.
      - The workspace switcher is visible in regular-width header layout.
    when:
      - Alice taps Projects, Plans, Tasks, and Workflows.
    then:
      - Each entry is enabled and reachable, not disabled or dimmed as unavailable.
      - Complete native workspaces open their native screen.
      - Incomplete native workspaces open polished placeholder or read-only screens that explain the current Apple status and point to the matching product area.
      - Returning to Chats restores the chat/new-chat surface without data loss.

  - id: S-2
    title: Compact Apple workspace switcher opens native selection
    given:
      - Alice uses the Apple app on a compact iPhone layout.
      - The header shows the active workspace pill.
    when:
      - Alice taps the workspace switcher.
    then:
      - The existing custom gradient workspace button opens native iOS dropdown selection.
      - The native selection lists Chats, Projects, Plans, Tasks, and Workflows.
      - The active workspace is selected visually and accessibly.
      - Choosing a workspace navigates to that destination.
      - No additional custom dropdown overlay UI is introduced beyond the existing custom button shell.

  - id: S-3
    title: Compact header logo and invite gift affordance match web intent
    given:
      - Alice is using a compact Apple layout.
      - Alice is authenticated where the web app would show the invite/referral gift affordance.
    when:
      - Alice looks at and taps the compact header logo and gift/invite affordance.
    then:
      - The logo uses the rounded-square mate icon treatment and behavior derived from the rendered web header.
      - The gift/invite affordance uses the same icon, label, visibility rules, and settings destination as the web app after the exact source component is confirmed.
      - The destination lets Alice share her invite/referral code for signup free-credit benefits.
      - Billing gift-card purchase/redemption screens are not introduced as a substitute for the header invite/referral flow.

  - id: S-4
    title: User reports an issue from active chat context on Apple
    given:
      - Alice is using the Apple app with an active chat or new-chat surface.
      - The report issue entry is visible from the same app context where web exposes reporting.
    when:
      - Alice opens Report issue, enters a short description, optionally attaches screenshot/context, and submits.
    then:
      - The form uses OpenMates settings/page primitives, not stock Form/Picker/NavigationStack toolbar product UI.
      - The request posts to /v1/settings/issues with the web-compatible title, issue_type, description/context, device_info, runtime_debug_state, action_history, trace_ids, and optional screenshot fields that Apple can safely provide.
      - The confirmation displays the backend issue reference, preferring short_issue_id when returned.
      - If Alice is authenticated, report-time native logs are pushed to /v1/settings/issue-logs using the created issue_id.

  - id: S-5
    title: Native client logging mirrors web privacy modes
    given:
      - Alice is authenticated in the Apple app.
      - Alice may be an admin, may enable a debug session, or may rely on default diagnostics.
    when:
      - Native warnings/errors occur, a debug session is active, or Alice submits a report.
    then:
      - Admin/dev live logs use /v1/admin/client-logs only when the authenticated user/server mode permits it.
      - User-enabled debug sessions use /v1/settings/debug-session and /v1/settings/debug-logs with the active debugging_id.
      - Default diagnostics send warn/error telemetry only to /v1/client-logs with a pseudonymous session id and PII-sanitized messages.
      - Issue-time logs are attached to submitted reports via /v1/settings/issue-logs.
      - Logging failures never break the visible app flow, but are visible to developers through native debug logs.

  - id: S-6
    title: Reconnect banner avoids noisy transient states
    given:
      - Alice is online and the WebSocket enters a short reconnecting state during normal lifecycle churn.
    when:
      - The reconnect succeeds quickly or the device is truly offline.
    then:
      - Short reconnects do not immediately show a scary banner.
      - Persistent reconnecting and offline states show localized, token-styled OpenMates banners.
      - The banner exposes stable accessibility identifiers and diagnostic state for tests.
      - Hardcoded English strings are removed from the product UI.

  - id: S-7
    title: Welcome cards and suggestions follow rendered web responsive behavior
    given:
      - Alice opens the Apple new-chat welcome surface on compact iPhone and regular iPad layouts.
      - The corresponding web source has rendered welcome/resume cards and new-chat suggestions at comparable viewport widths.
    when:
      - The native parity tests inspect visible card widths, spacing, scroll behavior, and suggestion filtering/selection.
    then:
      - Apple welcome cards and suggestion chips match the rendered web structure and responsive intent within documented native tolerances.
      - Interest filtering and suggestion selection remain functional.
      - Product UI still avoids default List/table chrome.

