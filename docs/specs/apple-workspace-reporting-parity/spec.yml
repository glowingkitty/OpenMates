open_questions:
  - id: OQ-1
    question: Which exact rendered web component currently owns the header invite/referral gift affordance?
    status: open
    resolution_needed_before: implementation
  - id: OQ-2
    question: Should placeholder workspace screens show links to web routes, or only native explanatory content until native parity is ready?
    status: open
    resolution_needed_before: task_execution

risks:
  - id: R-1
    risk: Enabling workspace entries could imply full native feature readiness if placeholder copy is vague.
    mitigation: Use explicit placeholder/read-only copy and link each screen to the relevant product surface/spec intent.
  - id: R-2
    risk: Native log forwarding could leak private content if sanitizer rules diverge from web.
    mitigation: Port web/server sanitizer patterns and cover them with native unit tests before forwarding logs.
  - id: R-3
    risk: Reconnect banner debounce could hide real outage feedback.
    mitigation: Suppress only short reconnect windows and always show offline/persistent reconnect states with test coverage.
  - id: R-4
    risk: The invite/referral gift affordance may be confused with existing gift-card billing screens.
    mitigation: Confirm web source-of-truth first and explicitly route to invite/referral sharing, not gift-card purchase/redemption, unless the web flow says otherwise.
