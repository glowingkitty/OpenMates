contracts:
  api:
    - route: POST /v1/settings/issues
      request: >
        { title: string, description?: string, issue_type: bug_report|feature_request,
        chat_or_embed_url?: string, contact_email?: string, language: string,
        device_info?: object, console_logs?: string, runtime_debug_state?: object,
        action_history?: string, screenshot_png_base64?: string, trace_ids?: string[] }
      response: >
        { success: boolean, message: string, issue_id?: string, short_issue_id?: string,
        screenshot_uploaded: boolean }
      errors:
        - 400/422 for invalid required fields.
        - 429 for issue-report rate limit.
        - 500 for visible backend creation/upload failures.
    - route: POST /v1/settings/issue-logs
      request: "{ issue_id: string, logs_text: string, page_url: string, user_agent: string }"
      response: "{ success: boolean }"
      errors:
        - 401 when unauthenticated.
        - 429 for issue-log rate limit.
    - route: POST /v1/admin/client-logs
      request: "{ logs: LogEntry[], metadata?: ClientMetadata }"
      response: "{ success: boolean }"
      errors:
        - 401 when unauthenticated.
        - 403 for non-admin users outside development mode.
    - route: POST /v1/settings/debug-logs
      request: "{ logs: LogEntry[], metadata?: ClientMetadata, debugging_id: string }"
      response: "{ success: boolean }"
      errors:
        - 401 when unauthenticated.
        - 403 when the debugging_id belongs to a different user.
    - route: POST /v1/client-logs
      request: "{ logs: WarnOrErrorLogEntry[], metadata?: ClientMetadata, session_pseudonym: string }"
      response: "{ success: boolean }"
      errors:
        - 401 when unauthenticated.
        - 422 for invalid log level or session_pseudonym format.
  data:
    - Workspace destination state is local UI state until deeper native workspace API slices are implemented.
    - Placeholder/read-only workspace screens must not invent or persist fake Projects, Plans, Tasks, or Workflows records.
    - Native log buffers store bounded, sanitized entries in memory or OS-local storage and clear them on logout/session end unless a debug session explicitly remains active.
    - Invite/referral state must use existing backend/settings data contracts once the web source is confirmed; do not create parallel referral storage.
  ui_states:
    - Regular header workspace switcher with enabled tabs.
    - Compact workspace switcher closed, opened, selected, dismissed, and keyboard/accessibility states.
    - Workspace placeholder/read-only screen for Projects, Plans, Tasks, and Workflows.
    - Compact logo state and invite/referral gift affordance visible/hidden states.
    - Report issue form empty, invalid, submitting, error, and submitted confirmation states.
    - Debug log sharing inactive, active, expired, and revoked states where surfaced.
    - Offline, transient reconnect suppressed, persistent reconnect visible, and connected states.
    - Welcome cards and suggestions at compact and regular viewport equivalents.
  privacy_security:
    - Native logs must sanitize emails, UUID-like chat/message/embed identifiers, base64 blobs, long quoted strings, share URL fragments, tokens, and credentials before network submission.
    - Default diagnostics must send warn/error logs only with a pseudonymous session id, not user id or email.
    - Admin/dev live logging can include authenticated user context only through the existing backend access policy.
    - Issue reports must never include chat encryption keys, share URL fragments, raw private message bodies, private device names, private hostnames, or filesystem paths.
    - Screenshot attachment must require explicit user action or an OS-owned picker/capture flow.
  i18n:
    - All new user-visible Apple strings require i18n YML source keys and AppStrings accessors.
    - Existing hardcoded English in ReportIssueView and NetworkStatusBanner must be replaced when touched.
  forbidden_native_controls:
    - Do not use Form, List, NavigationStack chrome, toolbar, system alert/sheet, default Button styling, or Image(systemName:) for app-owned product UI in touched Apple screens; a native Menu/Picker is allowed only for the compact workspace selector exception.

