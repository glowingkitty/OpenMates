id: interactive-questions-parity
title: Interactive Questions Parity
status: approved

goal: >
  Make interactive questions a reliable cross-platform protocol for structured
  assistant follow-ups. Backend streaming must never persist malformed question
  blocks, and web, CLI, and Apple must render, answer, lock, and recover from
  interactive questions consistently without exposing protocol JSON to users.

scope:
  in:
    - Backend validation and streaming protection for `interactive_question` and `interactive_response` fenced blocks.
    - Backend/CLI support for `awaiting_user_input` sub-chat prompts without timing out parent chat collection.
    - CLI TTY prompts for choice, input, slider, swipe, and rating questions.
    - CLI non-TTY/JSON output that returns structured `waiting_for_user` state and supports a follow-up answer command.
    - Web rendering and response cleanup so user bubbles show only the answer text, never `Selected: ...` or protocol JSON.
    - Web malformed-question fallback using translated `Failed to display question.` copy.
    - Apple native rendering and submission parity for choice, input, slider, swipe, and rating questions.
    - Apple routing for backend `awaiting_user_input` events and hidden rendering of `interactive_response` protocol fences.
  out:
    - Repairing existing malformed messages in storage.
    - Changing the encrypted message format or chat key design.
    - Adding new interactive question types beyond choice, input, slider, swipe, and rating.
    - Replacing the general markdown renderer or chat transcript architecture.
    - Shipping Apple visual redesign unrelated to interactive question cards.

