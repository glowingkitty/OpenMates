apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
  parity_expectations:
    - Apple must natively render all supported interactive question types rather than showing code blocks.
    - Apple user response bubbles must show only the human answer text and hide the protocol `interactive_response` block.
    - Apple must show translated `Failed to display question.` for malformed question payloads.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios or python3 scripts/apple_remote.py test-ios after CLI and web are green
  intentional_native_differences:
    - CLI can render terminal-native prompts rather than cards; Apple should use SwiftUI controls matching web behavior and tokens.

clarification:
  rounds:
    - question: "Should the first implementation slice include full native Apple interactive-question UI for all 5 types, or Apple fallback only while backend/web/CLI are fixed?"
      answer: Full implementation parity across all platforms is required.
    - question: "Should CLI use interactive terminal prompts by default and structured JSON for automation?"
      answer: Yes; TTY should prompt humans, while non-TTY/JSON should expose `waiting_for_user` and a follow-up command path.
    - question: "Should user messages include `Selected: ...` before the answer?"
      answer: No. User bubbles/output must show only the rendered answer text; protocol JSON can still exist in the message but must be hidden in rendering.
    - question: "Should existing malformed interactive questions be repaired or rendered as a fallback?"
      answer: Render a translated clear fallback, `Failed to display question.`, without storage repair.
    - question: "What implementation and verification order should be followed?"
      answer: Implement and test CLI/backend first, then web and its Playwright spec, then Apple last.
  vision_summary: >
    Interactive questions are a shared protocol, not web-only UI. Backend and CLI
    must be proven first because they define durable data and automation behavior;
    web then verifies product UX and live chat behavior; Apple follows once the
    protocol and reference UI are stable. Across all platforms, users see only
    their answer text in response bubbles/output and never the `Selected:` prefix
    or hidden protocol JSON.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Backend protects interactive question persistence
    given:
      - The assistant streams markdown containing an `interactive_question` fence.
    when:
      - The provider emits malformed JSON, an unclosed fence, a later code fence, an embed JSON block, or a disclaimer during the same turn.
    then:
      - The backend does not persist a malformed `interactive_question` as renderable protocol content.
      - Code/embed extraction does not run inside an open interactive question fence.
      - Final persisted content is either a valid closed interactive question block or safe fallback prose.

  - id: S-2
    title: CLI answers interactive questions in TTY mode
    given:
      - Alice sends a CLI chat message from an interactive terminal.
      - The assistant response contains a valid interactive question of any supported type.
    when:
      - Alice selects or enters an answer in the terminal prompt.
    then:
      - The CLI displays only user-friendly question controls and answer text.
      - The CLI submits an `interactive_response` protocol block hidden from terminal output.
      - The parent collection continues or ends without timing out.

  - id: S-3
    title: CLI exposes waiting-for-user state for automation
    given:
      - Alice sends a CLI chat message with `--json` or in a non-TTY environment.
      - The assistant needs interactive input.
    when:
      - The CLI receives a normal `interactive_question` response or an `awaiting_user_input` sub-chat event.
    then:
      - The CLI result is valid JSON with `status: waiting_for_user`, chat/message identifiers, and a structured question payload.
      - A follow-up CLI command can answer the question by id and send the same hidden protocol format used by web.
      - Events with child `chat_id` and parent `parent_id` are not dropped for the active parent chat.

  - id: S-4
    title: Web renders and locks questions cleanly
    given:
      - Alice is using the web app and receives an interactive question.
    when:
      - Alice answers it and reloads the chat.
    then:
      - The assistant card renders and locks after the answer.
      - The user message displays only the chosen/entered answer text.
      - The hidden `interactive_response` JSON is not visible.
      - A malformed question shows translated `Failed to display question.`.

  - id: S-5
    title: Apple renders and answers questions natively
    given:
      - Alice is using the Apple app and receives an interactive question.
    when:
      - Alice answers any supported type and later reloads from local persistence.
    then:
      - The native UI renders choice, input, slider, swipe, and rating questions.
      - The answer is sent through the existing encrypted chat send pipeline.
      - The user bubble shows only answer text and hides protocol JSON.
      - Answered cards remain locked after reload.
      - Malformed payloads show translated `Failed to display question.`.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Backend finalization validates interactive question fenced blocks before persistence and strips or downgrades malformed blocks to non-protocol fallback text.
  - id: AC-2
    scenario: S-1
    text: Backend code/embed extraction and post-processing cannot append JSON embed references or disclaimers inside an unclosed interactive question block.
  - id: AC-3
    scenario: S-2
    text: CLI TTY mode can prompt and submit choice, input, slider, swipe, and rating answers without exposing protocol JSON.
  - id: AC-4
    scenario: S-3
    text: CLI JSON/non-TTY mode returns structured `waiting_for_user` output and supports a follow-up answer command.
  - id: AC-5
    scenario: S-3
    text: CLI handles `awaiting_user_input` events for parent and child chat IDs without timing out or dropping active-parent events.
  - id: AC-6
    scenario: S-4
    text: "Web user response bubbles render only the answer text, never `Selected: ...` or the hidden `interactive_response` JSON block."
  - id: AC-7
    scenario: S-4
    text: Web locks answered questions after submit and after reload using the matching question id and message order.
  - id: AC-8
    scenario: S-4
    text: Web shows translated `Failed to display question.` for malformed question payloads.
  - id: AC-9
    scenario: S-5
    text: Apple renders all five question types natively with OpenMates tokens and no raw code-block fallback for valid payloads.
  - id: AC-10
    scenario: S-5
    text: Apple submits hidden protocol responses through the encrypted send pipeline and renders only answer text in user bubbles.
  - id: AC-11
    scenario: S-5
    text: Apple routes `awaiting_user_input`, preserves answered state after reload, and shows translated malformed-question fallback.

contracts:
  protocol:
    - name: interactive_question
      fence: "```interactive_question"
      payload: "{ type: choice|input|slider|swipe|rating, id: string, question: string, ...typeSpecificFields }"
      persistence: Must be closed and valid JSON to remain protocol content.
      malformed_behavior: Render translated fallback in clients; backend must not create new malformed persisted protocol content.
    - name: interactive_response
      fence: "```interactive_response"
      payload: "{ id: string, ...answerFields }"
      display: Hidden from user-visible transcript on web, CLI, and Apple.
      user_visible_answer: Only the selected/entered answer text, with no `Selected:` prefix.
  websocket:
    - event: awaiting_user_input
      direction: server_to_client
      payload: "{ type: awaiting_user_input, chat_id: string, parent_id?: string, message_id: string, task_id?: string, question: string }"
      behavior:
        - Web stores/renders the prompt for the child chat or parent-visible context.
        - CLI matches either `chat_id` or `parent_id` against the active parent and resolves to a waiting state when no final answer follows.
        - Apple routes the event to chat UI/state instead of treating it as unknown.
  data:
    - Existing malformed messages are left untouched in storage.
    - New persisted assistant messages must not contain newly generated invalid interactive question blocks.
    - Answered-state detection must consider message order so an older response with a reused id does not lock a newer question.
  ui_states:
    - Valid unanswered question.
    - Valid answered/locked question.
    - Malformed question fallback.
    - Disabled submit until required answer data is present.
    - CLI non-TTY `waiting_for_user` JSON.
  privacy_security:
    - Protocol JSON can remain encrypted in message content but must not be exposed as user-facing UI text.
    - CLI and Apple must use existing encrypted send/persistence paths; no plaintext answer cache outside existing chat storage.

tests:
  - id: T-BACKEND-001
    type: pytest
    file: backend/tests/test_interactive_questions_streaming.py
    command: python3 -m pytest backend/tests/test_interactive_questions_streaming.py
    covers:
      - AC-1
      - AC-2
    assertions:
      - Valid interactive question content remains unchanged.
      - Unclosed or invalid interactive question content is downgraded before persistence.
      - Code/embed JSON after an open malformed interactive question is not converted into a visible trailing protocol leak.
