risks:
  - Backend over-sanitizing could remove valid assistant content; tests must cover valid blocks unchanged.
  - CLI prompting could block automation if TTY/non-TTY detection is wrong; JSON mode must never prompt.
  - Apple parity may require new Swift UI components and i18n accessors; remote Mac verification may fail for environment reasons.

