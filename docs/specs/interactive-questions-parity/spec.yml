    file: backend/tests/test_interactive_questions_streaming.py
    command: python3 -m pytest backend/tests/test_interactive_questions_streaming.py
    covers:
      - AC-1
      - AC-2
      - AC-12
    assertions:
      - Valid interactive question content remains unchanged.
      - Unclosed or invalid interactive question content is downgraded before persistence.
      - Code/embed JSON after an open malformed interactive question is not converted into a visible trailing protocol leak.
      - Choice and swipe `embed_ids` arrays are preserved when structurally valid and rejected when malformed.
