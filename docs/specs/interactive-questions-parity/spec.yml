implementation_plan:
  existing_patterns:
    - backend/apps/ai/tasks/stream_consumer.py code-fence state and post-processing helpers
    - frontend/packages/ui/src/components/interactive_questions/types.ts payload schema
    - frontend/packages/ui/src/components/interactive_questions/utils/questionState.ts response scanning
    - frontend/packages/openmates-cli/src/ws.ts collectAiResponse event collection
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift markdown block parsing
  architecture: >
    Add a small shared protocol layer per platform: backend validates final
    interactive fences before persistence; CLI and clients parse the same payload
    shape and format response messages as answer text plus hidden protocol fence;
    renderers hide protocol fences and show a translated failure fallback for bad
    payloads.
  data_flow:
    - Assistant streams markdown containing an interactive question.
    - Backend protects the interactive fence while streaming and validates final content.
    - Client renders native/terminal/web controls from the JSON payload.
    - User answer is formatted as answer-only display text plus hidden `interactive_response` JSON.
    - Existing encrypted send/sync paths persist the response.
    - Renderers scan later messages by order and id to lock the answered question.
  affected_files:
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Validate/protect interactive question protocol before persistence.
    - path: backend/tests/test_interactive_questions_streaming.py
      reason: Backend regression tests.
    - path: frontend/packages/openmates-cli/src/ws.ts
      reason: Waiting-for-user routing and collector status.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: TTY prompt and answer command UX.
    - path: frontend/packages/openmates-cli/tests/interactiveQuestions.test.ts
      reason: CLI protocol tests.
    - path: frontend/packages/ui/src/components/interactive_questions/**
      reason: Web response formatting, fallback, and answer locking.
    - path: frontend/apps/web_app/tests/interactive-questions.spec.ts
      reason: Web E2E regression.
    - path: apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift
      reason: Native markdown parsing/rendering.
    - path: apple/OpenMates/Sources/Features/Chat/Views/InteractiveQuestionView.swift
      reason: Native cards for supported types.
    - path: apple/OpenMatesTests/InteractiveQuestionsParityTests.swift
      reason: Apple unit parity tests.
  verification_strategy:
    - Run backend and CLI red/green tests first.
    - Run web unit and Playwright tests only after CLI/backend are green; Playwright green happens after deploy.
    - Run Apple remote status and test/build last.
  verification_order:
    - Backend + CLI tests first.
    - Web unit + Playwright second.
    - Apple remote tests/build third.

