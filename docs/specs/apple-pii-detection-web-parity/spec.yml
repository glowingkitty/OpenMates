    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
  parity_expectations:
    - Apple uses the web regex categories and placeholder semantics as the source of truth.
    - Apple reads the same privacy setting concepts as web: master toggle, category toggles, and enabled user-defined personal data entries.
    - Apple product UI uses OpenMates custom primitives and generated tokens, not default platform product UI.
    - Native logs and test evidence use sanitized content only and never include raw private values beyond synthetic fixtures.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/BackgroundChatSenderParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAttachmentUITests
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
  intentional_native_differences:
    - Text input implementation can use native SwiftUI/AppKit/UIKit editing primitives where needed, but the visible behavior and accessibility identifiers must match web test semantics.
    - Share sheets, file pickers, and notification permissions remain OS-owned.
    - Local AI PII model detection remains a follow-up enhancement only.

clarification:
  rounds:
    - question: Should OpenAI Privacy Filter or a local model replace the current regex PII system on Apple?
      answer: No. Keep deterministic regex detection; any model would be future additive enhancement only.
    - question: Is the current target only Apple full parity with the existing web app behavior?
      answer: Yes. Focus now on Apple full parity with the web app.
    - question: Should Apple text/code attachment original reveal be required in this slice even if renderers cannot yet consume attachment-level mappings?
      answer: Yes. Original PII reveal must work just like the web app; full parity with the web app is required.
  vision_summary: >
    Apple should behave like the web app for PII detection and replacement: detect
    locally, show the same warning/highlight affordances, let users exclude false
    positives, send placeholders instead of originals, sync encrypted mappings for
    owner-only reveal, and cover native send surfaces beyond the foreground chat
    composer. The existing regex system remains the contract; model-based PII
    detection is not part of this implementation.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple detector respects web patterns and privacy settings
    given:
      - Alice has Apple privacy settings with PII detection enabled.
      - Alice has enabled custom personal-data entries stored encrypted on device/sync.
    when:
      - Alice types or pastes text containing web-supported regex PII and enabled personal-data values.
    then:
      - Apple detects the same enabled categories as web.
      - Apple skips categories disabled by settings and skips all detection when the master toggle is off.
      - Apple detects enabled personal-data entries using the configured placeholders.

  - id: S-2
    title: Apple foreground composer matches web warning and exclusion UX
    given:
      - Alice is composing a chat message on Apple.
      - The message contains multiple detected PII values.
    when:
      - Detection completes after paste or debounce.
      - Alice taps one highlighted value to keep it original.
      - Alice taps Undo All on the warning banner.
    then:
      - "Apple shows an accessible warning banner equivalent to web `pii-warning-banner`."
      - "Apple exposes inline highlighted PII elements equivalent to web `pii-highlight` with type metadata for tests."
      - Tapping one highlight excludes only that item from replacement.
      - Undo All excludes all current detections and removes highlights/banner.

  - id: S-3
    title: Apple foreground sends placeholders and encrypted mappings
    given:
      - Alice composes a regular Apple chat message with active PII detections and one excluded false positive.
    when:
      - Alice sends the message.
    then:
      - The sent user content contains placeholders for active detections and original text only for excluded detections.
      - The outbound payload includes encrypted PII mappings for active detections.
      - Local/offline message state keeps decrypted mappings only in memory and encrypted mappings in persisted/synced state.
      - The server and AI providers receive placeholders, not originals.

  - id: S-4
    title: Apple background and extension sends protect PII
    given:
      - Alice sends text through a native path outside the foreground composer.
    when:
      - The path is new-chat welcome, notification reply, quick capture/background sender, iOS share extension, or macOS share extension.
    then:
      - The send path runs the same local PII replacement before network send.
      - The outbound payload and encrypted storage package include encrypted PII mappings when mappings exist.
      - Synthetic tests prove no raw fixture PII leaves through these paths.

  - id: S-5
    title: Apple PII visibility toggle restores owner-only originals
    given:
      - Alice has a chat containing messages with encrypted PII mappings.
    when:
      - Alice opens the chat on Apple and toggles PII visibility.
    then:
      - PII is hidden by default with placeholders shown.
      - The toggle is visible only when the chat has PII mappings.
      - Toggling reveal restores originals in user and assistant content using cumulative mappings.
      - Toggling hide restores placeholders.
      - Reload/session start resets to hidden.

  - id: S-6
    title: Apple text/code attachment mappings remain owner-only
    given:
      - Alice attaches a supported UTF-8 text/code file containing PII on Apple.
    when:
      - Apple redacts the attachment before upload.
    then:
      - Uploaded bytes contain placeholders instead of originals.
      - Generated embed/message mapping metadata needed for owner reveal is encrypted.
      - Owner reveal restores original PII in supported text/code attachment renderers wherever web can reveal it.
      - Unsupported/binary files keep the existing upload behavior.

