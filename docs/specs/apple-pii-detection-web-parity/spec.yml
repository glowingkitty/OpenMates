implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte
    - frontend/packages/ui/src/stores/personalDataStore.ts
    - frontend/packages/ui/src/stores/piiVisibilityStore.ts
    - apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMatesShared/BackgroundChatSender.swift
  architecture: >
    Extract Apple PII detection into a settings-aware native privacy service that
    can be reused by foreground composer, send pipeline, background sender, and
    share extensions. Keep UI state in the composer for highlights/exclusions,
    keep visibility state per chat and session-local, and keep encrypted mappings
    attached to messages/storage payloads using existing chat-key encryption.
  data_flow:
    - User enters text in foreground or background/send-extension surface.
    - Apple loads local privacy settings/custom entries when available and builds detection options.
    - Local detector finds active matches and creates deterministic placeholders/mappings.
    - Foreground composer renders warning/highlight/exclusion UI before send.
    - Send path replaces active matches with placeholders and encrypts mappings with the chat key.
    - Message render aggregates decrypted owner mappings to reveal originals only when the chat visibility state is revealed.
  affected_files:
    - path: apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
      reason: Convert detector/banner into web-parity settings-aware behavior and expose UI identifiers.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Add inline highlight/exclusion UI and PII visibility toggle integration.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsHidePersonalDataView.swift
      reason: Load, edit, and save web-compatible encrypted privacy settings/custom personal-data entries using OpenMates primitives.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Ensure mappings survive send, storage, render, sync, and supported text attachment paths.
    - path: apple/OpenMatesShared/BackgroundChatSender.swift
      reason: Redact and attach encrypted mappings for quick capture, notification replies, and share-extension sends.
    - path: apple/OpenMatesShareExtension/ShareViewController.swift
      reason: Use background redaction contract for iOS share messages.
    - path: apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
      reason: Use background redaction contract for macOS share messages.
    - path: apple/OpenMatesTests/ChatSendPipelineParityTests.swift
      reason: Unit contract coverage for detector options and foreground send redaction behavior.
    - path: apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
      reason: Unit contract coverage for background sender and share-extension redaction behavior.
    - path: apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
      reason: UI parity coverage for composer warning/highlights/exclusions, reveal/hide toggle, and attachment behavior.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-pii-detection-web-parity/spec.yml
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/BackgroundChatSenderParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAttachmentUITests
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/spec_verify.py docs/specs/apple-pii-detection-web-parity/spec.yml
  verification_order:
    - Apple unit tests for detector and send contracts first.
    - Apple UI tests for composer and visibility parity second.
    - Apple build after targeted tests or as fallback if UI tests are blocked.
    - Web Playwright only if web source-of-truth fixtures or behavior are changed.

