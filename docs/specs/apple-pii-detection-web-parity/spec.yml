assumptions:
  - id: A-1
    text: Web PII behavior remains the source of truth for regex patterns, settings concepts, placeholders, click-to-exclude, Undo All, and visibility toggle semantics.
    category: product
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
        summary: Defines regex categories, disabled category filtering, personal-data entries, placeholders, mappings, and restore helpers.
      - source: frontend/apps/web_app/tests/pii-detection-flow.spec.ts
        summary: Encodes highlight, banner, click-to-exclude, send placeholders, and visibility toggle expectations.

  - id: A-2
    text: Apple already has partial detector, banner, main-composer replacement, and encrypted mapping plumbing but lacks full web parity.
    category: source_audit
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
        summary: Contains regex detector and warning banner but no settings/custom personal data source.
      - source: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
        summary: Main composer redacts and passes mappings, but no inline tap-to-exclude equivalent or visibility toggle parity is evident.
      - source: apple/OpenMatesShared/BackgroundChatSender.swift
        summary: "Background send builds `sendContent` and sends it without PII detection or encrypted PII mappings."

contracts:
  api:
    - "Existing WebSocket and encrypted storage payloads remain unchanged except that Apple sends `encrypted_pii_mappings` where web already does."
    - No new backend route is required.
  data:
    - "Message-level mappings contain `placeholder`, `original`, and `type`."
    - "`encrypted_pii_mappings` is encrypted with the chat key before remote send or persistent storage."
    - Plaintext mappings may exist only in transient in-memory state needed for current-owner rendering.
    - PII visibility state is per-chat and session-local, defaulting to hidden.
  ui_states:
    - PII warning banner visible with active detections.
    - Inline highlight visible for each active detection with stable accessibility/test identity and type metadata.
    - Single highlight tap/click exclusion.
    - Undo All exclusion.
    - Chat-level PII visibility toggle hidden/visible states.
    - Settings-driven master/category/custom entry detection states.
  privacy_security:
    - Detection runs locally before message or supported text/code upload content leaves the device.
    - Raw original PII must not be sent in active PII outbound payloads, storage packages, or logs.
    - Share-extension and background-send tests use synthetic PII fixtures only.
    - Local model/AI detection is out of scope and must not be added as a replacement.

