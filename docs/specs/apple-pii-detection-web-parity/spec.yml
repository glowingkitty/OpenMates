id: apple-pii-detection-web-parity
title: Apple PII Detection Web Parity
status: implementing

goal: >
  Bring Apple PII detection, replacement, visibility, and encrypted mapping
  behavior to web parity without replacing the existing deterministic regex
  system. Apple should protect user text before it leaves the device across all
  native send surfaces, while preserving owner-only reveal semantics through
  encrypted PII mappings.

scope:
  in:
    - Apple foreground chat composer parity with web PII detection, banner, inline highlights, individual click/tap-to-exclude, and Undo All behavior.
    - Apple privacy settings/custom personal data parity for detection inputs, including master toggle, per-category toggles, and enabled encrypted personal-data entries.
    - Apple message send parity for regular chats, new-chat welcome sends, deferred sends while uploads finish, notification replies, quick capture/background sends, and iOS/macOS share extension sends.
    - Apple encrypted PII mappings on messages so owner devices can restore placeholders in user and assistant content like web.
    - Apple PII visibility toggle parity: hidden by default, reveal/hide owner-only originals, and reset to hidden on reload/session start.
    - "Apple supported UTF-8 text/code attachment redaction mapping parity where not already covered by `text-file-pii-redaction-parity`."
  out:
    - Replacing deterministic regex detection with OpenAI Privacy Filter or any local AI model.
    - Server-side parsing of original personal data from messages or uploaded files.
    - Detecting names, addresses, birthdays, or custom text unless the user has configured encrypted personal-data entries.
    - Changing web PII behavior except for tests/fixtures needed to define Apple parity.
    - Persisting PII exclusions across sessions.

