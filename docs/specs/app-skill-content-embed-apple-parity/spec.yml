risks:
  - id: R-1
    text: Passing static registry coverage does not prove visual equivalence for every embed state.
    mitigation: Keep the broader apple-embed-rendering-parity screenshot/artifact review program as the visual completion gate.
  - id: R-2
    text: Generic search-style product renderers may be visually incomplete for Design, Models3D, Tasks, or Workflows.
    mitigation: This slice blocks silent fallback; later artifact review promotes specific visual gaps to blocking fixes.
  - id: R-3
    text: Remote Mac verification can fail for environment reasons unrelated to this patch.
    mitigation: Record the sanitized failure class and keep Linux deterministic checks green.

