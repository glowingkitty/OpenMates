implementation_plan:
  spec_path: docs/specs/app-skill-content-embed-apple-parity/spec.yml
  existing_patterns:
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - scripts/apple_ui_contracts.py
    - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
    - apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
  architecture: >
    Keep the current web registry and Svelte preview/fullscreen components as the
    source of truth. Extend the deterministic Apple embed audit and native debug
    fixture surface so new web app-skill/content keys must be intentionally
    represented in Apple before visual review can claim parity.
  data_flow:
    - The generated web registry exposes preview and fullscreen keys.
    - The deterministic audit compares registry keys with Apple enum raw values, fixture IDs, and renderer dispatch.
    - "Apple debug fixtures construct synthetic `EmbedRecord` graphs for parent and child embeds."
    - Apple UI tests open each debug gallery app slug and capture product-chrome screenshots.
  affected_files:
    - path: docs/specs/app-skill-content-embed-apple-parity/spec.yml
      reason: Durable executable contract for this parity slice.
    - path: scripts/apple_ui_contracts.py
      reason: Include current web showcase apps and aliases in deterministic embed audit.
    - path: backend/tests/test_apple_ui_contracts.py
      reason: Keep audit behavior covered as required keys evolve.
    - path: frontend/apps/web_app/tests/apple-embed-rendering-contracts.spec.ts
      reason: Align web contract capture with current showcase app set.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Add missing Apple classifications and child mappings.
    - path: apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
      reason: Add synthetic fixtures for missing app-skill/content keys.
    - path: apple/OpenMates/Sources/Features/Embeds/Views/EmbedContentView.swift
      reason: "Route newly classified keys and `code-application` away from generic fallback."
    - path: apple/OpenMatesUITests/EmbedRenderingParityUITests.swift
      reason: Include current web showcase app slugs in Apple smoke coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/app-skill-content-embed-apple-parity/spec.yml
    - python3 scripts/apple_ui_contracts.py audit --surface embeds
    - python3 -m pytest backend/tests/test_apple_ui_contracts.py
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
  verification_order:
    - Spec validation first.
    - Linux deterministic embed audit second.
    - Backend pytest coverage for the audit third.
    - Apple remote status/build attempt last because Apple runtime verification requires Mac/Xcode access.

