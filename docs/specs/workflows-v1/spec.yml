implementation_plan:
  existing_patterns:
    - backend/apps/reminder/tasks.py for schedule claim, DB fallback, offline execution, and email fallback patterns.
    - backend/core/api/app/routers/webhooks.py for trigger-created chats and pending confirmation patterns.
    - backend/core/api/app/services/feature_availability_service.py for platform and app-skill gating.
    - backend/core/api/app/services/skill_registry.py for dispatching feature-enabled app skills in-process.
    - backend/apps/weather/app.yml and backend/apps/news/app.yml for canonical V1 app-skill action nodes.
    - frontend/packages/ui/src/components/Header.svelte for the gated Workflows tab.
    - frontend/packages/ui/src/components/projects/ProjectsPage.svelte as a starting point for a gated workspace route pattern.
    - frontend/packages/openmates-cli/src/client.ts and packages/openmates-python/openmates/sdk.py for CLI/SDK API client patterns.
  architecture: >
    Build Workflows as a server-side state machine with durable graph snapshots
    and run records. The editor creates readable vertical workflow graphs; the
    runner executes only validated node types through a workflow service, app
    skill adapter, scheduler task, and notification adapters. The API is shared
    by web, CLI, npm SDK, pip SDK, and Apple. Sensitive definitions and run
    content are stored in Automation Vault encrypted blobs, while Directus keeps
    only minimal scheduler, ownership, billing, and status metadata.
  data_flow:
    - User creates or edits a workflow through web, CLI, SDK, or Apple.
    - Backend validates the graph, encrypts the full graph into an Automation Vault blob, stores a workflow metadata row, creates an immutable version, and computes trigger metadata.
    - Scheduler claims due workflow_triggers server-side and creates workflow_runs.
    - Runner decrypts the workflow graph for execution, executes nodes by graph edges, stores workflow_node_run metadata, evaluates decisions, and queues notification/report actions.
    - Runner stores sensitive run content as encrypted durable blobs for last_5 retention, or encrypted ephemeral cache for none retention.
    - Clients fetch workflow_runs and workflow_node_runs to render history and request encrypted run-content details only when content_available is true.
  affected_files:
    - path: backend/core/directus/schemas/workflows.yml
      reason: Durable workflow records.
    - path: backend/core/directus/schemas/workflow_versions.yml
      reason: Immutable graph snapshots.
    - path: backend/core/directus/schemas/workflow_triggers.yml
      reason: Scheduler query and trigger metadata.
    - path: backend/core/directus/schemas/workflow_runs.yml
      reason: Durable run history.
    - path: backend/core/directus/schemas/workflow_node_runs.yml
      reason: Per-node debug history.
    - path: backend/core/directus/schemas/workflow_waits.yml
      reason: Ask-user, approval, delay, and callback wait-state foundation.
    - path: backend/core/api/app/routes/workflows.py
      reason: Workflow CRUD, run, capabilities, and history API.
    - path: backend/core/api/app/services/workflow_service.py
      reason: Ownership, validation, versioning, and graph persistence.
    - path: backend/core/api/app/services/workflow_runner.py
      reason: Server-side execution engine.
    - path: backend/core/api/app/services/workflow_app_skill_adapter.py
      reason: Generated app-skill workflow actions and output summaries.
    - path: backend/core/api/app/tasks/workflow_tasks.py
      reason: Scheduler and queued run execution.
    - path: frontend/apps/web_app/src/routes/workflows/+page.svelte
      reason: Workflows workspace route.
    - path: frontend/packages/ui/src/components/workflows/WorkflowListPage.svelte
      reason: Workflow list UI.
    - path: frontend/packages/ui/src/components/workflows/WorkflowEditor.svelte
      reason: Shortcuts-style editor.
    - path: frontend/packages/ui/src/components/workflows/nodes/*.svelte
      reason: Trigger, app skill, decision, repeat, notification, report, and end cards.
    - path: frontend/packages/ui/src/i18n/sources/workflows.yml
      reason: Localized workflow UI strings.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Workflow API client methods.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Workflow CLI commands.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK workflow methods and types.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK workflow methods and types.
    - path: apple/OpenMates/Sources/Workflows/WorkflowListView.swift
      reason: Native workflow list.
    - path: apple/OpenMates/Sources/Workflows/WorkflowDetailView.swift
      reason: Native workflow detail and run history.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/workflows-v1/spec.yml
    - python3 -m pytest backend/tests/test_workflows_models.py backend/tests/test_workflow_runner.py
    - python3 scripts/tests.py run --suite vitest
    - python3 -m pytest packages/openmates-python/tests/test_workflows.py
    - python3 scripts/audit_sdk_cli_parity.py
    - Deploy to dev and wait for Vercel Ready before Playwright green.
    - python3 scripts/tests.py run -- --spec workflows-editor.spec.ts
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WorkflowsParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/WorkflowsParityUITests
  verification_order:
    - Backend pytest and direct API contract first.
    - OpenMates CLI contract second.
    - npm SDK contract third.
    - pip SDK contract fourth.
    - Web Playwright after deploy fifth.
    - Apple remote tests after shared surfaces are green sixth.
  risks:
    - Workflow data encryption boundaries may conflict with server-side execution needs; V1 must clearly separate routing metadata from encrypted sensitive payloads.
    - Automation Vault encryption is weaker than chat-style client-only encryption because the backend must decrypt during execution; product copy must be explicit and retention controls must be conservative.
    - Notification nodes may depend on partially implemented unified notification work; V1 should reuse the safest existing push/email paths and preserve preferences.
    - App skill output schemas vary; workflow adapters need conservative summary extraction before broad app-skill automation is safe.
    - Multi-platform parity makes this too large for one implementation slice unless tasks remain independently deployable.
    - Apple full editor parity may be expensive; spec permits limited native edit controls if list/detail/run parity is complete.

