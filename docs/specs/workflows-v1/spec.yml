    - Directus atomic-update semantics may be insufficient for leases without an existing transaction/RPC pattern; resolve in P1 before implementation rather than emulating claims in process memory.
    - Event producers can bypass safety if they do not authenticate owner/source identity; only explicitly integrated producers may dispatch, and advanced producers stay gated.
    - Client-created projection keys mean legacy workflows cannot become shareable through a server-only backfill; UI must clearly request an authorized client refresh/edit instead of silently weakening encryption.
    - Reusing share.py must not preserve its current private-id logging for workflow shares; touched paths must emit redacted identifiers only.
    - Provider scope drift can fail unattended runs; failures must be visible and must never fall back to cached credentials or stale grants.

