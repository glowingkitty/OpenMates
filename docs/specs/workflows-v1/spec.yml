implementation_plan:
  spec_path: docs/specs/workflows-v1/spec.yml
  existing_patterns:
    - backend/apps/reminder/tasks.py for schedule claim, DB fallback, offline execution, and email fallback patterns.
    - backend/core/api/app/routers/webhooks.py for trigger-created chats and pending confirmation patterns.
    - backend/apps/reminder/skills/set_reminder_skill.py for current natural-language reminder inputs that should compile to workflow schedules once workflow-backed reminders are released.
    - backend/apps/ai/processing/skill_executor.py for assistant skill dispatch and app-skill execution context.
    - backend/core/api/app/services/feature_availability_service.py for platform and app-skill gating.
    - backend/core/api/app/services/skill_registry.py for dispatching feature-enabled app skills in-process.
    - backend/apps/audio/skills/transcribe_skill.py and frontend/packages/ui/src/components/enter_message/embedHandlers.ts for voice recording transcription/correction patterns.
    - backend/preview/app/services/text_sanitization.py, backend/apps/ai/utils/llm_utils.py, and frontend/packages/ui/src/utils/textSanitizer.ts for ASCII-smuggling and unsafe text cleanup.
    - backend/core/api/app/routes/projects.py and frontend/packages/ui/src/services/projectService.ts for project_items linking with item_type workflow.
    - backend/apps/weather/app.yml and backend/apps/news/app.yml for canonical V1 app-skill action nodes.
    - frontend/packages/ui/src/components/Header.svelte for the gated Workflows tab.
    - frontend/packages/ui/src/components/DailyInspirationBanner.svelte already supports workspace surfaces and is reused directly for workflow recommendations instead of recreating its carousel/style.
    - frontend/packages/ui/src/components/ChatHeader.svelte provides the rendered gradient detail-header style; extract only the reusable visual shell needed by both chat and workflow headers rather than copying its CSS or chat-specific state.
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte for visual and interaction references only; workflow input must extract/reuse safe primitives instead of coupling to chat send/storage services.
    - frontend/packages/ui/src/components/projects/ProjectsPage.svelte as a starting point for a gated workspace route pattern.
    - frontend/packages/openmates-cli/src/client.ts and packages/openmates-python/openmates/sdk.py for CLI/SDK API client patterns.
  architecture: >
    Build Workflows as a server-side state machine with durable graph snapshots
    and run records plus durable workflow-input sessions. The editor creates
    readable vertical workflow graphs; the workflow-input pipeline creates,
    updates, links, deletes, stops, follows up, and undoes workflow changes from
    text or voice through a separate planner that is not the chat pre/main/post
    pipeline. REST session endpoints are the correctness source of truth, with
    WebSocket/event polling used only for live step-by-step UI streaming. The
    runner executes only validated node types through a workflow service, app
    skill adapter, platform action adapters, scheduler task, assistant workflow
    skills, and event trigger matcher. The API is shared by web, CLI, npm SDK,
    pip SDK, and Apple. Sensitive definitions, workflow-input drafts, transcripts,
    undo payloads, and run content are stored in Automation Vault encrypted blobs,
    while Directus keeps only minimal scheduler, ownership, lifecycle, billing,
    expiry, status, and event cursor metadata. For the core UI milestone, extract
    the monolithic web route into workflow home/editor/run components and add a
    workspace-navigation provider boundary so every sidebar renders the active
    workspace list. Web is implemented and visually approved first. Apple then
    consumes the same contracts through a native store and full vertical editor,
    using the rendered web surface as its parity target rather than raw Figma
    values. Workflow recommendations compose DailyInspirationBanner with the
    workflows surface. The workflow header and ChatHeader share an extracted
    gradient/header-layout primitive while keeping chat media/navigation state
    and workflow status/actions in their owning components.
  data_flow:
    - User changes active workspace; the shared shell selects the matching chat/workflow/project list provider for mobile drawers and persistent sidebars.
    - User enters Daily school weather in the fixed workflow composer; the client creates a disabled empty draft with that exact title and opens the focused editor without invoking general AI planning.
    - User edits trigger/action/decision nodes locally; dirty state remains client-side until Save, while Undo restores the last persisted graph and leaving requires an explicit choice.
    - User creates or edits a workflow through web, CLI, SDK, or Apple.
    - Assistant-created one-time workflow requests use workflows.schedule_once to create a temporary workflow with auto_delete_at, while recurring chat requests use workflows.schedule_recurring to create a persisted workflow.
    - Backend validates the graph, encrypts the full graph into an Automation Vault blob, stores a workflow metadata row, creates an immutable version, and computes trigger metadata.
    - Scheduler claims due workflow_triggers server-side and creates workflow_runs.
    - Manual run requests for any workflow validate and collect required trigger input before execution.
    - Runner decrypts the workflow graph for execution, executes nodes by graph edges, dispatches app-skill nodes through real adapters, calls platform action adapters, stores workflow_node_run metadata, evaluates decisions, and completes branches naturally when no outgoing edge remains.
    - Running workflow runs remain tied to their immutable version_id; workflow definition edits create future versions and never mutate in-flight run behavior.
    - Tasks view reads workflow run projections from workflow run metadata for account-wide running/recent completed automation visibility.
    - Cancellation requests update run cancellation metadata and the runner cooperatively stops before the next cancellable node/checkpoint.
    - Runner stores sensitive run content as encrypted durable blobs for last_5 retention, or encrypted ephemeral cache for none retention.
    - Temporary workflow cleanup deletes expired temporary workflow definitions and sensitive content after seven days unless the user keeps the workflow.
    - Clients fetch workflow_runs and workflow_node_runs to render history and request encrypted run-content details only when content_available is true.
    - User submits text, corrected transcript, or voice audio reference to POST /v1/workflows/input.
    - Backend creates or resumes a durable workflow_input_session, transcribes/corrects voice when needed, sanitizes all input, loads compact owner-scoped workflow/project/capability context server-side, and runs a workflow-specific planner.
    - Backend streams append-only workflow_input_events for transcription, planning, assumptions, draft node creation, validation, confirmation, commit, stop, follow-up, undo, and failure.
    - Draft workflow graphs or graph patches are encrypted on the input session and validated before commit; create/update mutations call WorkflowService, and workflow-to-project linking calls the Projects item API/service only after workflow ownership validation.
    - Stop requests mark cancellation_requested and prevent later draft commit; follow-up requests resume the same session context; undo creates a new workflow version or compensating project-item mutation for the last committed instruction.
