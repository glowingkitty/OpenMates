contracts:
  api:
    - route: GET /v1/workflows
      auth: session_or_api_key
      response: "{ workflows: WorkflowSummary[], next_cursor?: string }"
      notes:
        - Returns only workflows owned by the authenticated user.
        - Summaries include id, title, enabled, status, trigger_summary, next_run_at, last_run_status, updated_at, and current_version_id.
    - route: POST /v1/workflows
      auth: session_or_api_key
      request: "{ title: string, graph: WorkflowGraph, enabled?: boolean, run_content_retention?: last_5 | none, lifecycle?: persisted | temporary, source?: string, source_chat_id?: string, created_by_assistant?: boolean, auto_delete_at?: integer }"
      response: "WorkflowDetail"
      errors:
        - 400 for invalid graph, unsupported nodes, unsafe action, missing app skill, or invalid decision rule.
        - 400 when a temporary workflow auto_delete_at is sooner than seven days after creation.
        - 403 FEATURE_DISABLED when platform:workflows is disabled.
    - route: GET /v1/workflows/temporary
      auth: session_or_api_key
      response: "{ workflows: WorkflowSummary[], next_cursor?: string }"
      notes:
        - Returns recent user-owned temporary workflows that are hidden from the primary reusable workflow list but can still be inspected, run manually, kept, disabled, or deleted before auto_delete_at.
    - route: GET /v1/workflows/{workflow_id}
      auth: session_or_api_key
      response: "WorkflowDetail"
    - route: PATCH /v1/workflows/{workflow_id}
      auth: session_or_api_key
      request: "{ title?, graph?, enabled?, run_content_retention?: last_5 | none }"
      response: "WorkflowDetail"
      notes:
        - Every graph update creates a new immutable workflow_versions row.
        - Existing workflow_runs continue to reference the version they used.
        - Workflow definition version retention is applied after creating the new version and never deletes the current version or versions still referenced by retained workflow_runs.
    - route: GET /v1/workflows/{workflow_id}/versions
      auth: session_or_api_key
      response: "{ versions: WorkflowVersionSummary[], current_version_id: string, retention: { mode: last_25_versions, max_versions: 25 } }"
      notes:
        - Returns owner-scoped workflow definition history for the time-machine timeline.
        - Summaries include version_id, version_number, created_at, created_by_client, graph_hash, restored_from_version_id, current, and a redacted graph change summary when available.
    - route: GET /v1/workflows/{workflow_id}/versions/{version_id}
      auth: session_or_api_key
      response: "WorkflowVersionDetail with decrypted graph for authorized owner rendering only"
      notes:
        - Backend decrypts the selected graph from Automation Vault on demand and does not cache plaintext graph content in Directus, Redis, logs, traces, or long-lived service state.
    - route: POST /v1/workflows/{workflow_id}/versions/{version_id}/restore
      auth: session_or_api_key
      response: "WorkflowDetail"
      behavior: Creates a new immutable workflow_version from the selected historical graph, marks restored_from_version_id, and makes the new version current.
      errors:
        - 404 when the workflow or version does not belong to the user or was pruned by version retention.
        - 409 when the target version is already current.
      notes:
        - Restore never rewrites old workflow_versions and never changes version_id on existing workflow_runs.
    - route: DELETE /v1/workflows/{workflow_id}
      auth: session_or_api_key
      behavior: Soft-deletes the workflow and disables future triggers without deleting run history.
    - route: POST /v1/workflows/{workflow_id}/enable
      auth: session_or_api_key
      behavior: Validates graph safety, computes next_run_at, and enables scheduled execution.
    - route: POST /v1/workflows/{workflow_id}/disable
      auth: session_or_api_key
      behavior: Disables future triggers and leaves data intact.
    - route: POST /v1/workflows/{workflow_id}/run
      auth: session_or_api_key
      request: "{ mode: test | manual, input?: object }"
      response: "{ run_id: string, status: queued | running | completed | failed }"
      errors:
        - 400 MISSING_WORKFLOW_INPUT when the workflow requires start input and the run request does not provide it.
        - 403 APPROVAL_REQUIRED when the workflow action mix requires explicit approval instead of immediate manual execution.
      notes:
        - The run record is created only after the manual/test execution is accepted and is pinned to the current immutable version in the same idempotent acceptance boundary.
    - route: POST /v1/workflows/{workflow_id}/keep
      auth: session_or_api_key
      behavior: Converts a temporary chat-created workflow into a persisted reusable workflow before auto_delete_at.
    - route: GET /v1/workflows/{workflow_id}/runs
      auth: session_or_api_key
      response: "{ runs: WorkflowRunSummary[], next_cursor?: string }"
      notes:
        - Returns the execution/run timeline, separate from workflow definition versions.
        - Run metadata remains visible after encrypted run content expires or is pruned, with content_available=false and content_storage=deleted.
    - route: GET /v1/workflows/{workflow_id}/runs/{run_id}
      auth: session_or_api_key
      response: "WorkflowRunDetail with node_runs plus content_available, content_storage, content_expires_at, and encrypted content reference metadata. Sensitive run content is returned only from Automation Vault after authorization, never from plaintext Directus rows."
    - route: POST /v1/workflows/{workflow_id}/runs/{run_id}/cancel
      auth: session_or_api_key
      response: "{ run_id: string, status: cancellation_requested | cancelled }"
      behavior: Requests cooperative cancellation for a queued, running, or waiting workflow run owned by the user.
      errors:
        - 400 RUN_NOT_CANCELLABLE when the run is already completed, failed, cancelled, or past a non-cancellable terminal point.
        - 404 when the workflow or run does not belong to the user.
      notes:
        - Cancellation must not mutate the workflow graph or workflow_version used by the run.
        - Already-started external calls may finish; the runner must stop before the next cancellable node/checkpoint and record the final cancellation state visibly.
    - route: GET /v1/workflows/capabilities
      auth: session_or_api_key_optional
      response: "Available node types, feature-enabled app skills, workflow metadata, user-owned persisted workflow run capabilities, required input schemas, lifecycle metadata, and disabled reasons."
    - route: PUT /v1/workflows/{workflow_id}/template-projection
      auth: session_or_api_key
      request: "{ template_id, source_version, ciphertext, owner_wrapped_key, ciphertext_checksum, projection_schema_version }"
      response: "{ template_id, source_version, updated_at }"
      errors:
        - 403 when the user does not own the workflow.
        - 409 when source_version is older than the current accepted projection version.
      notes:
        - The client builds, allowlists, sanitizes, and encrypts the portable projection; the server does not receive its plaintext or unwrapped template key.
        - Projection updates flow from runtime edits to a new client snapshot only. Projection state never mutates authoritative runtime workflow/version state.
    - route: POST /v1/share/short-url
      auth: session_or_api_key
      request: "{ token, encrypted_url, content_type: workflow_template, content_id: template_id, ttl_seconds? } where token, shortKey, and encrypted_url are generated client-side"
      response: "{ success, expires_at? }"
      errors:
        - 403 when the workflow/template projection is not owner-authorized.
        - 409 when the projection source_version is stale relative to the current workflow version.
      notes:
        - Reuse the existing Chat short-link service by extending its content_type allowlist and ownership check for workflow_template; do not create a parallel Workflow short-link implementation.
        - The client encrypts the long template URL under shortKey, sends only encrypted_url and token, and assembles /s/{token}#{shortKey} locally after success.
        - Short shares are revocable and store only opaque encrypted_url plus lookup/revocation metadata; URL fragment keys never reach the server.
        - Offline/API fallback is /share/workflow-template/{templateId}#key={templateKeyBlob}, generated from the persistent encrypted projection without creating runtime or share plaintext.
    - route: DELETE /v1/share/short-url/{token}
      auth: session_or_api_key
      behavior: Extends the generic short-link service with owner-authorized revocation and prevents future retrieval of encrypted_url without mutating sender or recipient runtime workflows.
    - route: POST /v1/workflows/template-import
      auth: session_or_api_key
      request: "Client-decrypted and locally validated WorkflowTemplateProjectionPayload"
      response: "WorkflowDetail with new recipient-owned ids, enabled=false, and binding_requirements[]"
      errors:
        - 400 for invalid templates, unsupported nodes, missing required capability declarations, or forbidden runtime/sensitive fields.
        - 403 FEATURE_DISABLED when platform:workflows is disabled.
      notes:
        - Import creates new Automation Vault runtime state only after client-side decryption and recursive allowlist validation.
        - Recipient must rebind connected accounts, schedules, permissions, webhook secrets, notification preferences, and required inputs before enabling.
    - route: POST /v1/workflows/input
      auth: session_or_api_key
      request: "{ action?: start | followup | stop | confirm | reject | undo, session_id?: string, input_type?: text | audio | transcript, text?: string, audio_ref?: object, selected_workflow_id?: string, selected_project_id?: string, client_event_cursor?: integer }"
      response: "200 WorkflowInputSessionResult when completed synchronously, or 202 { session_id, status, event_cursor } when processing continues asynchronously"
      behavior: Starts, continues, stops, confirms, rejects, or undoes a durable workflow-input session. REST is the source of truth; WebSocket streaming is optional live UI transport.
      errors:
        - 400 for invalid request shape, unsupported action, invalid session transition, invalid generated graph, invalid project target, unsupported attachment, or unsafe action.
        - 401 when no session/API auth exists.
        - 402 when credits are insufficient for transcription or planner execution.
        - 403 FEATURE_DISABLED when platform:workflows is disabled.
        - 404 when the session, selected workflow, selected project, or referenced target does not belong to the user.
        - 409 when a follow-up or undo conflicts with a terminal session state.
      notes:
        - Text, transcript, and extracted attachment text are sanitized on the backend before LLM use, even when the frontend already sanitized the editor text.
        - Voice input is transcribed and corrected server-side before planner execution.
        - The workflow planner receives compact server-loaded workflow/project/capability context, not arbitrary client-supplied workflow records.
        - Draft workflow graph changes are stored on the workflow-input session and are not committed to workflows until validation passes.
        - Stop requests mark cancellation_requested and the worker stops at safe checkpoints; already-started provider calls may finish but must not commit after cancellation.
        - Undo reverts only the last committed mutation for that session instruction via versioned workflow updates or compensating project-item mutations.
    - route: GET /v1/workflows/input/{session_id}
      auth: session_or_api_key
      response: "WorkflowInputSessionDetail with status, transcript metadata, current draft, committed mutations, undo availability, clarification prompt, events after cursor, and latest event_cursor"
      behavior: Lets web, CLI, and SDKs recover after connection drops or poll when streaming is unavailable.
    - route: GET /v1/workflows/input/{session_id}/events
      auth: session_or_api_key
      request: "?after_event_id=integer"
      response: "{ events: WorkflowInputEvent[], event_cursor: integer, terminal: boolean }"
      behavior: Polling fallback for clients that do not use WebSocket.
    - route: WS /v1/workflows/input/{session_id}/stream
      auth: session_cookie_or_token
      request: "?after_event_id=integer"
      response: "Append-only WorkflowInputEvent stream"
      behavior: Streams live workflow-input events while connected. The backend continues processing if the socket disconnects.
    - route: POST /v1/projects/{project_id}/items
      auth: session
      request: "ProjectItemCreateRequest with item_type workflow"
      response: "{ item: ProjectItemRecord }"
      notes:
        - Workflow targets must be owner-validated before storing the project item. Schema-level item_type support alone is insufficient.
  assistant_skills:
    - id: workflows.search
      behavior: Finds user-owned persisted workflows and templates that match the current chat intent; temporary workflows are excluded unless explicitly requested.
    - id: workflows.run
      behavior: Starts a pending manual run for an existing workflow, using a countdown for safe workflows and explicit approval for high-risk or high-cost workflows.
    - id: workflows.schedule_once
      behavior: Creates a temporary one-time workflow from structured graph input, default auto_delete_at seven days after creation, and optional keep action.
    - id: workflows.schedule_recurring
      behavior: Creates a persisted recurring workflow from structured graph input.
    - id: workflows.cancel_pending
      behavior: Cancels a pending countdown/approval workflow execution before it starts.
    - id: workflows.keep_temporary
      behavior: Converts a temporary workflow to persisted reusable state.
  data:
    - collection: workflows
      fields: id, hashed_user_id, encrypted_user_id, encrypted_title_ref, encrypted_description_ref, status, enabled, lifecycle, source, current_version_id, trigger_type, next_run_at, last_run_id, run_content_retention, version_retention_mode, auto_delete_at, kept_at, deleted_at, created_at, updated_at.
      plaintext: id, hashed_user_id, status, enabled, lifecycle, source, current_version_id, trigger_type, next_run_at, last_run_id, run_content_retention, version_retention_mode, auto_delete_at, kept_at, deleted_at, timestamps.
      encrypted_or_redacted: raw user id, title, description, source chat/runtime references, graph display labels, trigger summary derived from private configuration, and all user-authored text.
      behavior: lifecycle is persisted for reusable workflows and temporary for chat-created one-time workflows. Temporary workflows are auto-deleted after auto_delete_at unless kept_at is set.
    - collection: workflow_versions
      fields: id, workflow_id, hashed_user_id, version_number, encrypted_graph_blob_ref, graph_hash, created_at, created_by_client, restored_from_version_id, pruned_at, vault_key_ref.
      behavior: Immutable authoritative runtime snapshot used by workflow_runs and the definition timeline. Full graph JSON includes bounded loop/repeat semantics and opaque provider binding references or capability requirements, never credentials or connected-account ids. Directus stores only references, hashes, restore provenance, and routing metadata.
      retention: Keep the newest 25 definition versions by default, always keep the current version, and do not prune versions still referenced by retained workflow_runs. Pruned versions are unavailable for restore but run records that referenced them retain their original version_id metadata.
    - collection: workflow_encrypted_blobs
      fields: id, ref, hashed_user_id, kind, ciphertext, checksum, vault_key_ref, key_version, expires_at, created_at.
      behavior: Stores only Vault Transit ciphertext and integrity/key metadata. The plaintext workflow title, graph, run inputs, node outputs, provider raw responses, and notification bodies are decrypted only on demand for authorized execution or detail rendering and are never persisted in repository record_json, Redis, logs, traces, or long-lived service caches.
    - collection: workflow_triggers
      fields: id, workflow_id, version_id, hashed_user_id, trigger_type, source, event_type, enabled, next_run_at, claim_status, claim_token_hash, claimed_at, claim_expires_at, encrypted_schedule_config_ref, encrypted_event_predicate_ref, encrypted_webhook_config_ref, encrypted_required_start_input_schema_ref, created_at, updated_at.
      plaintext: id, workflow_id, version_id, hashed_user_id, trigger_type, source, event_type, enabled, next_run_at, claim_status, claim token hash, claim timestamps, created_at, updated_at.
      encrypted_or_redacted: full recurrence schedule_config, webhook secret/config, event predicates and filters, required start-input schemas containing user text, and payload defaults.
      behavior: Recurrence is authoritative here. Scheduler/event workers query only indexed routing fields, atomically acquire expiring claims, create one accepted run pinned to version_id, then decrypt configuration. No planned workflow_runs are materialized.
    - collection: workflow_runs
      fields: id, workflow_id, version_id, hashed_user_id, trigger_id, trigger_type, acceptance_idempotency_key, claim_token_hash, status, accepted_at, started_at, finished_at, cancellation_requested_at, cancelled_at, cancelled_by_hash, cost_summary, error_code, content_retention_mode, content_available, content_storage, content_expires_at, encrypted_content_ref, encrypted_content_checksum.
      behavior: Exactly one durable metadata record per claimed/accepted execution, created at acceptance and never for a future occurrence. Full inputs, event payloads retained beyond dispatch, outputs, provider responses, notification payloads, report content, and node summaries are stored only in encrypted run-content blobs according to retention. Runs remain pinned to immutable version_id.
      task_view_projection:
        - Queued/running workflow runs project into Tasks as read-only in_progress cards with cancel and open-run actions.
        - Completed workflow runs project into the default Tasks Done column only when finished_at is within the last seven days.
        - Failed, cancelled, or waiting_for_input workflow runs project as blocked unless a future Needs attention column exists.
        - Projections are derived views and do not create user_tasks rows.
    - collection: workflow_node_runs
      fields: id, run_id, workflow_id, node_id, node_type, status, started_at, finished_at, attempt, skipped_reason, error_code, credit_cost, output_shape, content_available.
      behavior: Per-node debugging metadata only. Sensitive input/output summaries live in the encrypted run-content blob and are not stored plaintext in node-run rows.
    - collection: workflow_waits
      fields: id, run_id, workflow_id, node_id, wait_type, status, expires_at, resume_token_hash, encrypted_prompt, encrypted_response, created_at, resolved_at.
      behavior: Reserved for ask-user, approval, delay, and callback nodes; V1 may create only delay/test waits.
    - collection: workflow_event_receipts
      fields: id, hashed_user_id, trigger_id, event_id, source, event_type, received_at, dispatch_status, run_id, expires_at.
      plaintext: owner hash, trigger/event ids, source, event_type, timestamps, status, run id.
      behavior: Durable unique trigger_id plus event_id receipt used for idempotent dispatch and recursion protection. It contains no event payload; transient payloads are discarded after predicate evaluation unless copied into an accepted run's Vault-encrypted content.
    - collection: workflow_template_projections
      fields: template_id, workflow_id, hashed_user_id, source_version, projection_schema_version, ciphertext, ciphertext_checksum, owner_wrapped_key, created_at, updated_at, revoked_at.
      plaintext: stable template_id, workflow_id, owner hash, source_version, schema version, ciphertext/checksum, wrapped key, timestamps, revocation metadata.
      encrypted_payload_allowlist: portable title, description, trigger template without live secrets, nodes, edges, variable schemas, required capabilities, and binding requirements.
      forbidden_payload: workflow/run/version/runtime ids or refs, connected-account ids, credentials, grants, webhook secrets, next_run_at, claims, waits, outputs, source chat ids, provider responses, and sender runtime keys.
      behavior: Client-encrypted one-way sharing projection. Runtime workflow/version remains Automation Vault encrypted and authoritative; source_version exposes stale projections. The persistent ciphertext and owner's wrapped key support cross-device maintenance and offline long-link sharing without two-way sync.
    - collection: workflow_input_sessions
      fields: id, hashed_user_id, status, action_type, selected_workflow_id_hash, selected_project_id_hash, transcript_status, planner_status, draft_graph_ref, draft_diff_ref, committed_mutation_ref, undo_available, cancellation_requested_at, stopped_at, completed_at, failed_at, created_at, updated_at, expires_at.
      plaintext: id, hashed_user_id, status, action_type, selected target hashes, progress/status fields, cancellation/completion timestamps, expires_at.
      encrypted_or_redacted: raw text input, corrected transcript, extracted attachment text, draft graph, draft diff, assumptions, clarification messages, committed mutation details, and undo payloads.
      behavior: Durable source of truth for workflow input processing. Sessions continue after browser/WebSocket disconnects and are recoverable by GET /v1/workflows/input/{session_id}. Drafts expire if abandoned and are never treated as committed workflows.
    - collection: workflow_input_events
      fields: id, session_id, event_id, hashed_user_id, event_type, status, redacted_summary, encrypted_payload_ref, created_at.
      behavior: Append-only event log for transcription, planning, assumptions, draft node additions, validation, confirmation, commit, stop, follow-up, undo, and failure events. Clients resume with after_event_id; events must never contain raw private text in plaintext fields.
    - collection: workflow_input_mutations
      fields: id, session_id, instruction_id, hashed_user_id, mutation_type, target_type, target_id_hash, encrypted_before_ref, encrypted_after_ref, committed_at, undone_at, undo_status.
      behavior: Audit-safe mutation journal for undo. Undo creates a compensating workflow version or project-item deletion/update instead of rewriting historical workflow_versions, workflow_runs, or event logs.
    - object: WorkflowTemplateProjectionPayload
      fields: template_version, title, description, trigger_template, node_templates, edge_templates, variables_schema, required_capabilities, binding_requirements.
      behavior: Portable plaintext exists only client-side after decryption. It is recursively allowlisted before encryption and again before import; imported templates create recipient-owned disabled runtime records.
      forbidden_recursive_keys: token, refresh_token, access_token, secret, credential, connected_account_id, webhook_secret, api_key, password, vault, grant, run_id, version_id, workflow_id, next_run_at, claim, wait, output, encrypted_graph_blob_ref, encrypted_content_ref.
  workflow_graph:
    - WorkflowGraph contains version, trigger_node_id, nodes, edges, variables, limits, and ui_layout.
    - V1 graph must contain exactly one trigger node.
    - Every workflow can be run manually on demand. If the trigger expects payload input, manual runs must collect that input before execution.
    - Edges from Decision nodes include branch labels such as yes, no, otherwise, and error.
    - Action node input mappings reference previous outputs through stable paths such as $nodes.weather.output.summary.
    - Decisions use a JSON-safe predicate AST with operators eq, neq, gt, gte, lt, lte, contains, starts_with, exists, and, or, not.
    - Repeat nodes must include max_iterations, max_duration_seconds, max_credits, and per_iteration_timeout_seconds.
    - Schedule recurrence is not graph execution history: workflow_triggers owns encrypted recurrence config and next_run_at, while repeat/loop behavior within one run is defined only by this immutable graph.
    - Provider-backed nodes carry opaque runtime binding references or portable capability/binding requirements only; they never contain credentials, grants, or connected-account identifiers.
    - A workflow branch completes when the current node has no matching outgoing executable edge. End nodes are not required in persisted graphs.
    - Workflow-input generated drafts must pass the same WorkflowGraph validation as manual editor graphs before commit.
    - Workflow-input generated updates are applied as graph patches to the selected/current graph, then normalized into a full WorkflowGraph and validated before persistence.
  node_types:
    - schedule_trigger: generic schedule kind for one-time, daily, weekly, interval, and selected weekdays in a user timezone; full recurrence config is encrypted on workflow_triggers.
    - manual_trigger: generic manual kind used for test and run-now flows.
    - webhook_trigger: generic webhook kind with secret/config encrypted outside the graph; execution remains gated until its authenticated claim contract is implemented.
    - event_trigger: generic event kind for normalized chat skill use, assistant action, app-skill, terminal, remote-dev, and sandbox command envelopes.
    - app_skill_action: dispatches feature-enabled app skills through SkillRegistry with workflow-safe input/output adapters.
    - decision: evaluates structured predicates over prior node outputs.
    - repeat: bounded container, initially executable only for explicitly implemented safe modes.
    - create_chat_report: creates a workflow-owned chat/report with generated summary content.
    - start_new_chat: creates a deterministic new chat with configured title, initial message, and optional linked workflow outputs.
    - send_notification: queues safe push notification respecting user preferences.
    - send_email_notification: queues safe workflow email respecting user preferences.
    - ask_user: represented in graph schema but disabled for execution unless implemented in this slice.
    - custom_code: represented as future disabled/gated node, not executable in V1.
  cli:
    - command: openmates workflows list --json
    - command: openmates workflows show <workflow-id> --json
    - command: openmates workflows create --file workflow.yml --json
    - command: openmates workflows edit <workflow-id> --file workflow.yml --json
    - command: openmates workflows enable <workflow-id> --json
    - command: openmates workflows disable <workflow-id> --json
    - command: openmates workflows delete <workflow-id> --yes --json
    - command: openmates workflows run <workflow-id> --mode test --json
    - command: openmates workflows runs <workflow-id> --json
    - command: openmates workflows run show <workflow-id> <run-id> --json
    - command: openmates workflows capabilities --json
    - command: openmates workflows input "create a rain alert" --json
    - command: openmates workflows input --audio <upload-ref> --json
    - command: openmates workflows input status <session-id> --json
    - command: openmates workflows input events <session-id> --after <event-id> --json
    - command: openmates workflows input stop <session-id> --json
    - command: openmates workflows input followup <session-id> "actually run it at 8am" --json
    - command: openmates workflows input undo <session-id> --json
  sdk:
    - npm: om.workflows.list(), get(), create(), update(), enable(), disable(), delete(), run(), runs(), getRun(), capabilities().
    - pip: om.workflows.list(), get(), create(), update(), enable(), disable(), delete(), run(), runs(), get_run(), capabilities().
    - npm: om.workflows.input.start(), status(), events(), stop(), followUp(), undo().
    - pip: om.workflows.input_start(), input_status(), input_events(), input_stop(), input_follow_up(), input_undo().
    - SDK methods use API-key scopes and approved SDK devices.
    - SDK types expose WorkflowGraph, WorkflowNode, WorkflowRun, WorkflowNodeRun, WorkflowCapability, WorkflowInputSession, WorkflowInputEvent, WorkflowInputMutation, and WorkflowValidationError.
  ui_states:
    - Empty workflows list with create button and example starter suggestions.
    - Workflow list with enabled/disabled/error statuses, lifecycle badges for persisted and temporary workflows, next run, last run, and action menu.
    - Figma-specific Workflow detail header with low-radius gradient, fixed white title/description without shadows, enabled toggle below title, relative Created or applicable next-run metadata, and top-left back arrow plus orange New workflow, Share, and Report Issue actions.
    - Routed Workflow and Workflow runs tabs at /workflows/{workflow_id} and /workflows/{workflow_id}/runs; no top-right Report Issue button and no duplicate below-header Workflow/status/New workflow row.
    - Shortcuts-style editor with compact vertical cards matching Figma geometry, app-skill previews, sentence-style Decision editor, and Repeat container; expansion grows the selected card in place on desktop/mobile and never creates a sibling editor panel.
    - Workflow definition time-machine timeline with capped version dots/cards, selected historical date/version, read-only historical graph rendering, current marker, and restore-as-new-version confirmation.
    - Workflow run-history route matching Figma node 5488:39515 with completed/failed/cancelled/waiting states, trigger source, duration, cost, node-by-node status, input/output availability, and clear durable/ephemeral/expired/deleted content labels.
    - Temporary workflow history surface with keep, run manually, disable, and delete controls before auto_delete_at.
    - Assistant pending workflow execution countdown with workflow name, expected actions, cost/permission summary, required inputs, cancel, and approve controls.
    - Manual run input form when a webhook/event-triggered workflow or reusable workflow requires start payload fields.
    - Chat-like Workflow landing with Daily Inspiration followed by one horizontal row containing recent user workflows by updated_at newest first and curated examples after them.
    - No separate recent/continue section; cards render Next run, Last run, Draft, or Manual only as appropriate.
    - Visible non-functional Search affordance that makes no search-result claim in the core milestone.
    - Show all browsing mode hides Daily Inspiration and the mixed row, renders a vertical scrollable grid of all workflows, and keeps the bottom workflow input visible.
    - Workflow input running state with stop button, transcript progress, streamed assumptions, draft nodes appearing step by step, validation markers, commit result, follow-up input, and undo affordance.
    - Workflow input clarification state with inline question, Try again, and Start chat to clarify options when the request is too broad for the workflow surface.
    - Workflow input stopped state with partial draft visible, plus Continue, Discard, and follow-up controls.
    - Workflow input undo state showing the last instruction that can be reverted and the result after undo completes.
    - Test/run panel with queued, running, waiting, completed, failed, skipped, and cancelled states.
    - Tasks-section workflow run card with read-only in_progress state, current node/progress when available, Open workflow run, and Cancel run.
    - Tasks-section workflow run card with read-only Done state for runs completed in the last seven days and Open workflow run only.
    - Disabled feature state when platform:workflows is off.
    - Validation state for unsupported node type, unsafe action, disabled app skill, invalid mapping, invalid condition, and missing notification preference.
    - Core Workflow composer visually matches the chat input, centers its placeholder, and reveals submit only while focused with valid non-empty text; it creates title-only drafts without chat send behavior.
    - Workflow detail visual composition is owned by this spec; docs/specs/unified-detail-pages/spec.yml retains only Workflow metadata API/version/encryption contracts.
    - Workflow detail canvas starts directly below the Workflow-owned header and omits the prototype retention picker, duplicate metadata form, run-content pill, permanent management/test/delete rows, sibling node editor, and duplicate Workflow/status/New workflow row.
    - Native Figma frame exports are available for all approved Workflow states. Structured node metadata must be fetched after the temporary 429 rate limit resets; no implementation or test may invent nested values that have not been inspected.
  privacy_security:
    - Workflows always run on the server; the runner must never depend on browser local storage or connected WebSocket state.
    - Server-readable schedule/routing metadata is minimized to fields needed for ownership checks, scheduler queries, run status, and feature gating.
    - Workflows V1 uses a single cloud workflow model backed by Automation Vault encryption; do not split V1 into separate private-device and cloud workflow product modes.
    - Unattended server execution cannot be cryptographically inaccessible to the backend. Automation Vault with least-privilege service authorization and audited decrypt operations is the explicit security boundary.
    - Sensitive node config, prompt text, notification bodies, trigger payloads, app-skill raw outputs, decision operand values, report content, and user-authored workflow titles are encrypted with existing Vault Transit encryption functions in Automation Vault blobs or redacted according to collection contracts. Placeholder, reversible obfuscation, hardcoded local keys, or base64-only storage are forbidden for workflow payloads.
    - Backend runtime decrypt is allowed only for authorized validation, claim-time recurrence advancement, event predicate evaluation, execution, and run-detail retrieval; every decrypt path must be least-privilege and auditable.
    - Backend code must decrypt workflow title, graph, version content, and run content on demand only and must not copy plaintext into repository record_json, Directus rows, Redis, logs, traces, analytics, or long-lived service/module caches.
    - run_content_retention defaults to last_5 and keeps only the newest five durable encrypted run-content blobs per workflow.
    - Workflow definition version retention is separate from run-content retention and defaults to the newest 25 definition versions, preserving the current version and versions referenced by retained runs.
    - run_content_retention none must not write permanent run-content blobs; it keeps only the latest run content in encrypted ephemeral cache for at most seven days, while metadata remains for billing and status.
    - Workflow notification actions must respect existing email and push notification preferences and unsubscribe/disable behavior.
    - Connected-account credentials remain in the provider credential Vault. Workflow versions carry only opaque binding references or capability requirements, and every run revalidates owner, consent, capability, and current scopes before provider access.
    - Assistant-created workflow proposals must disclose whether the workflow is temporary or persisted, whether AI will run, expected side effects, cost category, and whether it can run offline.
    - Persisted user-created workflows are available to the assistant only as owner-scoped capabilities; workflow matching must not expose one user's workflow metadata to another user.
    - Temporary workflow auto-delete removes workflow definition and sensitive run content after seven days unless kept, while required billing/status/audit metadata may remain according to retention contracts.
    - Event triggers consume one authenticated normalized envelope with event_id, owner hash, source, event_type, scope, occurred_at, and payload. Routing uses only owner/source/type; structured encrypted predicates use allowlisted operators and never arbitrary code.
    - Event payloads remain transient for predicate evaluation and are discarded unless retention is required for an accepted run, in which case they are Vault-encrypted. Logs contain no event payload or user text.
    - Terminal, remote-dev, and sandbox matching requires explicit user consent and scope, authenticated source identity, input redaction and size/rate limits, no cross-owner/project access, and recursion protection against workflow-generated command events.
    - Custom code nodes are not executable in V1.
    - Workflow execution enforces feature availability for platform:workflows and child app/skill features at run time, not only at edit time.
    - Every schedule/webhook/event/manual acceptance has durable idempotency. Scheduler workers atomically claim indexed due triggers, create exactly one run pinned to the trigger version, then decrypt recurrence and advance next_run_at; no future run rows are pre-created.
    - Running workflow runs are immutable. Cancellation requests may change run status/cancellation metadata, but cannot edit node config, graph structure, input payload, or workflow_version for the active run.
    - Runner cancellation is cooperative and checked before each node, before retries, before resuming waits, and after long app-skill/action nodes return.
    - Workflow sharing is template-projection-only. The client maintains a persistent, client-encrypted, recursively allowlisted one-way projection keyed by stable template_id and source_version; runtime state is authoritative and never updated from projection sync.
    - Short shares use /s/{token}#{shortKey}; offline/API fallback uses /share/workflow-template/{templateId}#key={templateKeyBlob}. The server may store ciphertext, wrapped owner key, lookup, and revocation metadata but never receives fragment keys.
    - Projection plaintext excludes definition/runtime ids and refs, history, runs/content, connected-account ids, credentials, grants, webhook secrets, next_run_at, claims, waits, outputs, source_chat_id, provider responses, and sender runtime keys.
    - Imported workflow templates create new recipient-owned disabled runtime workflows and require the recipient to configure their own account bindings, notification settings, schedule/timezone, permissions, webhook secrets if applicable, and required inputs before enabling.
    - Workflow input text, corrected transcripts, OCR/PDF/photo extracted text, location notes, pasted content, and project metadata are untrusted user or external content. They must never override the workflow-input system prompt or backend policy.
    - Backend workflow-input sanitization must remove ASCII-smuggling Unicode tags, bidi controls, zero-width characters, disallowed control characters, and annotation characters before LLM use; frontend sanitization is defense-in-depth only.
    - Extracted attachment content is supplied to the planner as quoted evidence or user-provided context, never as developer/system instructions.
    - The workflow-input planner may output only strict structured commands and graph patches from an allowlisted schema. It must not output arbitrary endpoint names, SQL, code, shell commands, or free-form tool calls.
    - Workflow-input execution is limited to allowlisted actions: create workflow, update selected or unambiguously resolved workflow, delete exact workflow after confirmation, link workflow to project after ownership validation, stop, follow up, undo, confirm, reject, and request clarification.
    - Workflow-input generated graphs and patches must pass WorkflowGraph validation plus capability, app-skill schema, decision operand, repeat bound, schedule/timezone, unsafe side-effect, ownership, and feature-availability checks before commit.
    - Workflow input must not log raw input, transcript, extracted attachment text, prompt text, notification body text, draft graph plaintext, provider raw responses, or private target names. Logs may include session ids, event ids, hashed target ids, status, counts, error codes, and sanitized summaries.
    - Workflow input requires credit checks before transcription and planner execution, and rate limits must apply per user/session/action type.
    - Workflow input undo must not restore or expose data the user no longer owns, must not cross project/workflow ownership boundaries, and must not mutate historical workflow_versions or workflow_runs.
  routing:
    - /workflows is the Workflow landing/browse route.
    - /workflows/{workflow_id} is the canonical Workflow tab and detail/editor route.
    - /workflows/{workflow_id}/runs is the canonical Workflow runs tab and Figma 5488:39515 run-history route.
    - /s/{token}#{shortKey} is the online default encrypted template share URL; the fragment key is client-only.
    - /share/workflow-template/{templateId}#key={templateKeyBlob} is the offline/API long-link fallback backed by the persistent encrypted projection.

tests:
  - id: T-PYTEST-001
    type: pytest
    file: backend/tests/test_workflows_models.py
    command: python3 -m pytest backend/tests/test_workflows_models.py
    covers:
      - AC-3
      - AC-8
      - AC-9
      - AC-10
      - AC-11
      - AC-12
      - AC-13
      - AC-14
      - AC-15
      - AC-16
      - AC-19
      - AC-23
      - AC-24
    assertions:
      - workflow graph validation requires one trigger node
      - app-skill action nodes resolve feature-enabled skills and reject disabled or missing skills
      - decision predicates accept supported operators and reject arbitrary code
      - repeat nodes require max iterations, duration, credits, and timeout
      - workflow records enforce owner isolation and minimal plaintext metadata
      - workflow definitions are stored as encrypted Automation Vault blobs while plaintext repository rows keep only allowed metadata
      - workflow encrypted blobs use existing Vault Transit encryption functions and reject placeholder local obfuscation
      - run_content_retention accepts last_5 and none and rejects unknown values
      - workflow definition versions are immutable, capped separately from run content, and restores create a new version instead of mutating old versions or runs
      - workflow lifecycle accepts persisted and temporary and rejects unknown values
      - temporary workflows require auto_delete_at no sooner than seven days after creation and can be converted to persisted with kept_at
      - manual runs validate required start input schemas before execution
      - graph validation allows natural branch completion without an explicit end node
      - event trigger metadata requires source, scope, filters, and rate-limit policy before enablement
      - platform:workflows disabled state blocks creation and execution without deleting data
      - workflow template export uses an allowlisted builder, rejects sensitive recursive keys, excludes runtime records, and imports disabled until the recipient binds runtime context
      - workflow template export excludes definition version history, restore provenance, encrypted blob refs, and run history
    red_phase:
      required: true
      expected: fail
      evidence:
        status: skipped_with_reason
        run_id: ""
        timestamp: "2026-07-05T16:46:27Z"
        summary: Workflow model tests already had prior green evidence when this session resumed; no separate red phase was run before the implementation slice.
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: local-pytest-workflows-33-passed-1-local-celery-skip-2026-06-24
        timestamp: "2026-06-24T13:05:32Z"
        note: "Local pytest passed 33 workflow tests and skipped the Celery task import path because celery is unavailable in /usr/bin/python3; the selected Celery task test passed inside the api container."

  - id: T-PYTEST-002
    type: pytest
    file: backend/tests/test_workflow_runner.py
    command: python3 -m pytest backend/tests/test_workflow_runner.py
    covers:
      - AC-2
      - AC-3
      - AC-4
      - AC-8
      - AC-10
      - AC-11
      - AC-12
      - AC-13
      - AC-14
      - AC-15
      - AC-16
      - AC-18
      - AC-19
      - AC-21
      - AC-22
    assertions:
      - scheduled rain workflow claims one due trigger and creates one run
      - weather action runs through the app-skill adapter with fake provider output
      - decision node records matched and skipped branches
      - notification actions enqueue safe push and email requests when condition matches
      - AI news workflow runs news app-skill actions and creates a report/chat reference
      - default retention keeps only the newest five durable run-content blobs per workflow
      - none retention stores latest run content only in encrypted ephemeral cache with an expiry and no durable content reference
      - duplicate scheduler claims do not double-run the same trigger
      - temporary one-time workflows remain inspectable after first run and are deleted only by cleanup after auto_delete_at
      - persisted recurring workflows remain enabled after successful runs
      - workflow branches complete when no outgoing edge remains
      - app-skill nodes dispatch through a workflow app-skill adapter instead of hardcoded runner output
      - notification and chat/report actions call adapter/service test doubles rather than returning mocked summaries from the runner
      - workflow runs expose task-view projection metadata without creating user_tasks rows
      - cooperative cancellation stops future workflow nodes at runner checkpoints and preserves the run's original workflow_version reference
    red_phase:
      required: true
      expected: fail
      evidence:
        status: skipped_with_reason
        run_id: ""
        timestamp: "2026-07-05T16:46:27Z"
        summary: Workflow runner tests already had prior green evidence when this session resumed; no separate red phase was run before the implementation slice.
    green_phase:
      required: true
      expected: pass
      evidence:
