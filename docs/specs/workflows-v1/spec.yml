  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/workflows-v1/spec.yml
    - python3 scripts/spec_verify.py docs/specs/workflows-v1/spec.yml --phase red before implementation
    - python3 scripts/spec_validate.py docs/specs/workflows-v1/spec.yml
    - python3 -m pytest backend/tests/test_workflows_models.py backend/tests/test_workflow_runner.py backend/tests/test_workflow_input_sessions.py
    - cd frontend/packages/openmates-cli && npm run build && npm run test:unit:workflows && npm run test:unit:sdk-workflows
    - python3 -m pytest packages/openmates-python/tests/test_workflows.py
    - python3 scripts/audit_sdk_cli_parity.py
    - Deploy to dev and wait for Vercel Ready before Playwright green.
    - python3 scripts/tests.py run --spec workflows-editor.spec.ts
    - python3 scripts/tests.py run --spec workflows-input.spec.ts
    - python3 scripts/tests.py run --spec workspace-sidebar.spec.ts
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WorkflowsParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/WorkflowsParityUITests
  verification_order:
    - Red contract tests for core API ordering/title drafts, web home/editor/sidebar, and real Apple UI behavior.
    - Backend core UI contracts and OpenMates CLI workflow-management contract.
    - npm SDK and pip SDK workflow-management contracts.
    - Deployed web workspace sidebar, home, title composer, focused editor, and run history Playwright.
    - Figma-intent artifact review of the approved rendered web UI.
    - Apple model/store tests, then iPhone/iPad/macOS editor UI tests and screenshot evidence.
    - Feature-gated rollout and complete spec verification only after all required evidence is current for the subject commit.
  rollout:
    - Keep platform:workflows disabled by default while required core UI checks are red or pending.
    - Enable for dev test accounts only after backend, CLI, npm SDK, and pip SDK contracts are green.
    - Enable web discovery after deployed web Playwright and Figma-intent review pass.
    - Enable Apple discovery only when native feature availability, sidebar, home, editor, and run-history UI evidence pass on iPhone, iPad, and macOS.
  observability:
    - Log workflow UI/API failures using sanitized workflow/run id prefixes, operation names, statuses, and durations only.
    - Never log titles, descriptions, node config, composer text, run input/output, or private sidebar item names.
    - Record workspace switch, list load, editor save, manual run, and run-detail phase durations through existing web and NativeDiagnostics boundaries.
  required_assumptions:
    - A-1
    - A-2
    - A-3
  open_questions:
    - none for the approved core UI alignment milestone
  risks:
    - Workflow data encryption boundaries may conflict with server-side execution needs; V1 must clearly separate routing metadata from encrypted sensitive payloads.
    - Automation Vault encryption is weaker than chat-style client-only encryption because the backend must decrypt during execution; product copy must be explicit and retention controls must be conservative.
    - Notification nodes may depend on partially implemented unified notification work; V1 should reuse the safest existing push/email paths and preserve preferences.
    - App skill output schemas vary; workflow adapters need conservative summary extraction before broad app-skill automation is safe.
    - Exposing user-created workflows as assistant-considerable capabilities can become noisy; matching must use owner-scoped metadata, relevance ranking, and countdown/approval gates.
    - Event triggers can become noisy or dangerous without scope filters, rate limits, and side-effect approval policies.
    - Replacing reminders with workflow-backed reminders requires a careful transition period because existing reminder records must continue firing until migrated.
    - Multi-platform parity makes this too large for one implementation slice unless tasks remain independently deployable.
    - Apple full editor parity is expensive but required for the approved core milestone; split implementation into model/store and view slices without reducing native edit scope.
    - Users may confuse workflow run cards in Tasks with editable user tasks; the UI must label them as workflow runs and expose only open/cancel/run-specific actions.
    - Cancelling in-progress external calls is inherently cooperative; UI copy must avoid promising rollback of side effects that already started.
    - Workflow-input prompt injection from transcripts or attachments can cause unsafe graph drafts unless every input is sanitized, quoted, schema-constrained, and validated before commit.
    - Reusing the full chat MessageInput directly would couple Workflows to chatSyncService, IndexedDB chat drafts, and chat send handlers; the web implementation should reuse smaller primitives and styling instead.
    - Undo may be mistaken for undoing already-executed external side effects. In V1 undo only reverts OpenMates workflow/project mutations and must label any non-reversible external effects explicitly.

