scenarios:
  - id: S-1
    title: User creates a daily rain alert workflow in the web editor
    given:
      - Alice is logged into the web app.
      - The platform:workflows feature is enabled on the dev server.
      - Alice opens the Workflows workspace.
    when:
      - Alice creates a workflow named Daily rain alert.
      - Alice adds a schedule trigger for every day at 07:00 in Europe/Berlin.
      - Alice adds a Weather forecast action for Berlin.
      - Alice adds a Decision node that continues only when rain probability is at least 60 percent.
      - Alice adds push and email notification actions using weather summary fields.
      - Alice saves and enables the workflow.
    then:
      - The workflow appears in the workflow list with enabled status and trigger summary.
      - The editor shows the workflow as a vertical Shortcuts-style flow.
      - The saved graph references the weather app skill and structured decision rule.
      - The workflow can be manually test-run from the web UI.

  - id: S-2
    title: Server runs the daily rain alert without an active user device
    given:
      - Alice has enabled the Daily rain alert workflow.
      - Alice has no active web or Apple session.
      - The schedule trigger is due.
    when:
      - The workflow scheduler claims the due trigger.
    then:
      - A workflow run is created on the server.
      - The Weather forecast app skill executes through the workflow app-skill adapter.
      - The Decision node evaluates against the weather output.
      - If the condition matches, OpenMates queues safe push and email notifications.
      - If the condition does not match, the run completes silently with a visible skipped branch in history.

  - id: S-3
    title: User creates a twice-weekly AI news brief workflow
    given:
      - Alice is logged into the web app.
      - Alice opens the Workflows editor.
    when:
      - Alice creates a workflow named AI news brief.
      - Alice adds a schedule trigger for Monday and Thursday at 09:00.
      - Alice adds three News search action requests for OpenAI news, Anthropic news, and Google Gemini news.
      - Alice adds a Create chat/report action that summarizes the results.
      - Alice adds push and email notification actions linking to the generated report chat.
      - Alice saves, tests, and enables the workflow.
    then:
      - The workflow graph stores the three news searches as structured app-skill action inputs.
      - The report action produces a durable chat or report reference.
      - The workflow list shows the next scheduled run.
      - Run history shows each news action and the report action separately.

  - id: S-4
    title: CLI manages workflows with parity to the web surface
    given:
      - Alice has paired the OpenMates CLI.
      - Alice has a workflow definition file for the Daily rain alert workflow.
    when:
      - Alice runs workflow list, show, create, edit, enable, disable, run, runs, and delete commands.
    then:
      - CLI commands call the same workflow API as the web app.
      - JSON output contains stable workflow, version, trigger, run, and node-run fields.
      - CLI can create and edit workflows from JSON or YAML without requiring browser-only state.
      - CLI failures return actionable validation errors for invalid nodes, missing app skills, disabled features, unsupported repeat modes, and unsafe actions.

  - id: S-5
    title: npm and pip SDKs manage workflows with CLI parity
    given:
      - Alice has approved API-key SDK devices for npm and pip SDK usage.
      - The workflow API exposes SDK-safe workflow operations.
    when:
      - Developer code uses npm and pip SDK methods to list, get, create, update, enable, disable, run, inspect runs, and delete workflows.
    then:
      - SDK methods expose typed workflow graph, node, trigger, run, and node-run models.
      - SDK behavior matches CLI command semantics for the same workflows.
      - SDK calls use API-key scopes and approved SDK devices.
      - SDK methods cannot bypass feature availability, workflow ownership, approval, or unsafe-action restrictions.

  - id: S-6
    title: Apple app can view and manage workflows after shared surfaces are green
    given:
      - Alice is logged into the Apple app.
      - The Daily rain alert and AI news brief workflows exist.
    when:
      - Alice opens the native Workflows section.
      - Alice views workflow details and run history.
      - Alice disables, re-enables, and manually runs a workflow.
    then:
      - Apple shows the same workflow names, status, trigger summary, node summaries, next run, and last run state as web.
      - Apple actions use the same API contracts and authorization rules.
      - Apple manual runs create the same workflow_run and workflow_node_run records as web, CLI, and SDK runs.

  - id: S-7
    title: Decision nodes are structured and safe
    given:
      - Alice edits a workflow with a Weather forecast action.
    when:
      - Alice configures a Decision node through the sentence-style rule UI.
    then:
      - The UI stores a structured rule over typed previous-node output fields.
      - The backend evaluates the rule without executing arbitrary user code.
      - The run history records the evaluated operands, result, and branch taken.
      - Invalid or missing output fields fail the node visibly without silently continuing.

  - id: S-8
    title: Repeat nodes are bounded and not arbitrary loops
    given:
      - Alice adds a Repeat node in the editor.
    when:
      - Alice configures repeat-for-each, repeat-N-times, or poll-until behavior.
    then:
      - The editor requires max iterations, max duration, max credits, and per-node timeout before the workflow can be enabled.
      - Unsupported repeat modes can be saved as disabled draft nodes but cannot run.
      - The runner enforces all bounds server-side.
      - Run history shows each repeat iteration or a concise aggregate when iteration details are large.

  - id: S-9
    title: Workflow data is privacy-aware and user-owned
    given:
      - Alice creates workflows containing prompts, notification text, app-skill inputs, and run outputs.
    when:
      - OpenMates stores workflow definitions and run history.
    then:
      - Owner lookup and scheduler routing use minimal plaintext metadata such as hashed_user_id, enabled status, next_run_at, trigger type, node types, and status.
      - Sensitive node configuration, prompt text, notification body templates, trigger payloads, and run outputs are encrypted or redacted according to the workflow data contract.
      - Bob cannot list, view, run, edit, or delete Alice's workflows or runs.
      - Logs redact workflow payloads, notification bodies, provider raw responses, and user private text.

  - id: S-10
    title: Feature availability gates workflow access and execution
    given:
      - The platform:workflows feature is off by default.
      - An administrator has not enabled platform:workflows.
    when:
      - Alice opens /workflows, calls workflow API routes, or uses CLI/SDK workflow commands.
    then:
      - Discoverability is hidden or the route returns a disabled/not-found state.
      - API, CLI, and SDK execution paths reject workflow creation and runs with FEATURE_DISABLED or typed unavailable errors.
      - Historical workflow data is not deleted when the feature is disabled.

  - id: S-11
    title: Workflow run content retention limits sensitive long-term storage
    given:
      - Alice has a workflow that produces sensitive run outputs.
      - The workflow uses the default run_content_retention value last_5.
    when:
      - The workflow completes more than five runs.
    then:
      - Only the newest five encrypted run-content blobs remain durably available for that workflow.
      - Older run metadata remains for billing, usage, and status history, but content_available is false and no plaintext output remains.
      - If Alice sets run_content_retention to none, completed run content is stored only as encrypted ephemeral cache for the latest run and expires no later than seven days.
      - The UI and API show whether run content is durable, ephemeral, expired, or unavailable.

  - id: S-12
    title: Assistant creates a temporary one-time weather reminder workflow from chat
    given:
      - Alice is chatting with her mate.
      - Alice asks "Remind me tomorrow what the weather will be for the coming week."
    when:
      - The assistant selects the workflow creation skill for a one-time scheduled action.
      - OpenMates proposes a temporary workflow with a one-time schedule trigger, Weather forecast action, create chat/report action, and notification action.
      - Alice does not cancel during the countdown or explicit approval window.
    then:
      - The workflow is created with lifecycle temporary, auto_delete_at no sooner than seven days after creation, and source_chat_id set.
      - The workflow does not delete itself immediately after the first run.
      - The workflow is hidden from primary reusable workflow lists by default but visible in recent temporary workflow/run history.
      - Alice can keep the workflow before expiry, converting it to a persisted reusable workflow.

  - id: S-13
    title: Assistant creates a regular recurring workflow from chat
    given:
      - Alice is chatting with her mate.
      - Alice asks "Remind me every week to check the weather for the coming weekend."
    when:
      - The assistant selects the workflow creation skill for a recurring scheduled action.
    then:
      - The workflow is created with lifecycle persisted, not temporary.
      - The weekly schedule remains enabled until Alice disables or deletes it.
      - The workflow appears in the normal workflows list and can be edited, disabled, run manually, or deleted.

  - id: S-14
    title: Assistant proposes and runs an existing user workflow
    given:
      - Alice has a persisted workflow named Weekly AI News Brief.
      - Alice asks the assistant for a task that matches that workflow.
    when:
      - The assistant finds the matching workflow capability.
      - OpenMates shows a pending execution countdown with workflow name, required inputs, expected actions, and cancel control.
    then:
      - If Alice cancels before the countdown ends, the workflow is not run.
      - If Alice does not cancel and no explicit approval is required, the workflow runs manually.
      - If the workflow has missing required start input, OpenMates asks Alice for that input before starting.
      - High-risk or high-cost workflows require explicit approval rather than only a countdown.

  - id: S-15
    title: Workflow triggers can subscribe to assistant and command events
    given:
      - Alice creates an advanced workflow trigger for assistant action or command events.
    when:
      - A chat message, assistant app-skill execution, terminal command, remote-dev command, or sandbox command emits a workflow event.
    then:
      - The trigger matches only events with the configured type, source, scope, and filters.
      - Phrase filters can use deterministic contains/starts-with rules without requiring AI.
      - Semantic matching requires an explicit AI action/classifier node or trigger mode.
      - Trigger events are rate-limited and do not run side-effecting workflows without the required approval policy.

  - id: S-16
    title: Workflow execution uses real adapters instead of mocked node output
    given:
      - Alice manually runs the Daily rain alert or AI news brief workflow.
    when:
      - The workflow runner reaches app-skill and OpenMates action nodes.
    then:
      - App-skill nodes dispatch through the real SkillRegistry and workflow app-skill adapter.
      - Notification and chat/report action nodes call real OpenMates services or test doubles in tests, not hardcoded runner summaries.
      - Decisions evaluate stable output aliases produced by the adapters.
      - Run history records real adapter status, timing, cost, summarized inputs, summarized outputs, and visible errors.

  - id: S-17
    title: User shares a safe workflow template without runtime context
    given:
      - Alice owns an enabled workflow with connected-account bindings, scheduler metadata, prior runs, and workflow run content.
      - Alice chooses to share the workflow as a reusable template.
    when:
      - OpenMates builds the shared workflow template payload.
      - Bob imports the template.
    then:
      - The exported payload is built from an allowlisted template builder, not by serializing workflow, workflow_version, workflow_run, or connected-account records directly.
      - The payload includes only safe template definition fields such as title, description, trigger/action/decision node definitions, typed input schemas, required app capabilities, and placeholder binding requirements.
      - The payload excludes previous runs, run content, connected-account identifiers, access tokens, refresh tokens, API keys, webhook secrets, scheduler claim state, next_run_at, runtime wait/resume tokens, source_chat_id, execution grants, and provider raw responses.
      - Workflow template sharing does not use task/plan/project record-key wrapping; imported templates create recipient-owned workflow records and runtime bindings.
      - Bob's imported workflow is disabled by default until Bob explicitly binds his own connected accounts, webhook endpoint/secrets if supported, schedule/timezone, notification preferences, and required start inputs.
      - The import creates new workflow ids, version ids, owner metadata, and encryption/runtime context for Bob; it never grants access to Alice's workflow execution context.
      - A recursive export guard rejects sensitive keys such as token, refresh_token, access_token, secret, credential, connected_account_id, webhook_secret, api_key, password, vault, and run_id anywhere in the template payload.

  - id: S-18
    title: Workflow runs appear in Tasks and active runs can be cancelled
    given:
      - Alice owns a running workflow run and a workflow run completed two days ago.
      - Alice also has a workflow run completed more than seven days ago.
    when:
      - Alice opens the Tasks section.
      - Alice cancels the running workflow run from its task-view card.
      - Alice edits the workflow definition while the original run is still in flight.
    then:
      - The running workflow run appears as a read-only in_progress task-view projection with open-run and cancel-run actions.
      - The recently completed workflow run appears as a read-only Done task-view projection with an open-run action.
      - The workflow run completed more than seven days ago is hidden from the default Tasks Done column but remains visible in workflow run history.
      - The cancellation request marks the run cancellation_requested or cancelled and the runner stops before starting the next cancellable node.
      - The in-flight run continues to reference its original workflow_version; workflow definition edits create a new version for future runs and do not mutate the running run.

  - id: S-19
    title: User views and restores previous workflow definitions
    given:
      - Alice owns a workflow that she has modified several times.
      - The workflow has completed runs tied to older and newer workflow versions.
    when:
      - Alice opens the workflow version timeline.
      - Alice selects a previous day or version.
      - Alice chooses to restore that previous workflow definition.
    then:
      - The editor renders the selected historical workflow graph as read-only until Alice restores or duplicates it.
      - The timeline shows version number, created timestamp, client/source, current marker, and restore provenance when available.
      - Restoring an older definition creates a new immutable current workflow_version copied from the selected version instead of mutating or deleting existing versions.
      - Existing workflow_runs remain attached to the version_id they originally executed.
      - Workflow definition history is capped by a separate version-retention policy, while run history and run-content retention continue to follow the workflow run retention policy.

  - id: S-20
    title: User opens the chat-like Workflows home
    given:
      - Alice is logged into the web app.
      - The platform:workflows feature is enabled.
      - Alice has active scheduled workflows, disabled workflows, manual-only workflows, and workflow recommendation templates available.
    when:
      - Alice opens the Workflows workspace.
    then:
      - The screen uses the same basic layout model as the chat screen.
      - A recommendation area appears first, initially using curated example workflows and later personalized workflow recommendations based on user interests and chats.
      - Recent workflows appear under the recommendation area.
      - Active enabled workflows are listed first, sorted by soonest next_run_at.
      - Disabled, draft, manual-only, or unscheduled workflows follow, sorted by updated_at newest first.
      - Workflow cards show Next run when next_run_at exists and fall back to Last run, Draft, or Manual only when it does not.
      - A bottom title composer remains visible for title-only draft creation in the core milestone; text/voice workflow planning is deferred.

  - id: S-21
    title: User switches to Show all workflow browsing mode
    given:
      - Alice is on the Workflows home.
      - Alice can see workflow recommendations and recent workflows.
    when:
      - Alice selects Show all.
    then:
      - The recommendation area and recent-workflows carousel move out of view.
      - The screen shows a vertical scrollable grid of all workflows.
      - The same ordering is used as the recent list unless search or filters are active.
      - The bottom workflow input remains visible.
      - The interaction pattern can be reused by Projects and Chats all-items browsing later.

  - id: S-22
    title: User creates a workflow through a durable streaming input session
    given:
      - Alice is on the Workflows home.
      - Alice says or types "Tell me when it is going to rain."
    when:
      - The frontend starts a workflow input session.
      - If the request is voice, the server transcribes and corrects the transcript first.
      - The workflow input planner receives the corrected transcript and compact server-loaded workflow/project/capability context.
      - The planner decides the request is clear enough to create a workflow.
    then:
      - The backend creates a durable workflow-input session that continues if the browser disconnects.
      - While connected, the UI streams events for transcription, assumptions, draft nodes, validation, and commit.
      - The workflow is built as a draft graph first and only committed after backend validation passes.
      - Reasonable assumptions, such as using push notification as the default alert channel, are shown to Alice.
      - The created workflow appears in the Workflows list with computed next_run_at when it has a schedule.

  - id: S-23
    title: User stops, follows up, and undoes workflow input changes
    given:
      - Alice has an active workflow input session that is creating or updating a workflow.
    when:
      - Alice presses the stop button in the workflow input field.
    then:
      - The frontend sends a stop request for the durable workflow-input session.
      - The backend marks cancellation_requested and stops at the next planner/tool/checkpoint.
      - No partial draft is committed to the real workflow after stop.
      - The UI keeps the stopped draft visible with follow-up, discard, and continue affordances.
    when:
      - Alice sends a follow-up text or voice instruction in the same session.
    then:
      - The backend resumes from the persisted draft or committed workflow context and streams the next changes.
    when:
      - Alice chooses Undo after a committed workflow input instruction.
    then:
      - The last committed mutation caused by that instruction is reverted as a new workflow version or compensating project-item deletion.
      - Undo never mutates historical workflow_versions or workflow_runs in place.

  - id: S-24
    title: User updates or links existing workflows from workflow input
    given:
      - Alice has existing workflows and projects.
      - Alice has a specific workflow open or names exactly one unambiguous workflow.
    when:
      - Alice asks to update workflow nodes, delete a workflow, or add a workflow to a project.
    then:
      - The command planner resolves only owner-scoped workflow and project targets.
      - Node updates require a selected/open workflow unless exactly one workflow match is unambiguous.
      - Project linking uses project_items with item_type workflow and validates that the workflow belongs to Alice before storing the link.
      - Destructive, broad, or high-impact actions require confirmation before commit.
      - Ambiguous requests return an inline clarification prompt and may offer to start a normal chat for broader discussion.

  - id: S-25
    title: Workflow input rejects prompt injection and invalid generated nodes
    given:
      - Alice submits workflow input containing text, voice transcript, PDF/photo extracted text, location text, or pasted external content.
      - The content includes hidden ASCII-smuggling characters, prompt-injection instructions, unsupported node types, or invalid app-skill inputs.
    when:
      - The workflow input session processes the request.
    then:
      - Backend sanitization removes ASCII-smuggling, bidi, zero-width, and control-character payloads before LLM use.
      - Extracted attachment content is treated as quoted evidence, never instructions.
      - The planner can output only strict structured workflow commands and draft graph patches.
      - Backend validation rejects unsupported nodes, arbitrary code, arbitrary HTTP calls, invalid schemas, invalid decision operands, disabled app skills, missing repeat bounds, unsafe side effects, and cross-user targets.
      - Invalid draft nodes stream as validation errors or clarification requests and are not committed.

  - id: S-26
    title: CLI and SDKs exercise the workflow input architecture before web UI
    given:
      - The workflow input session API exists.
      - Alice has CLI, npm SDK, and pip SDK credentials.
    when:
      - Alice starts workflow input, reads session status/events, stops a session, follows up, and undoes the last instruction through CLI and SDKs.
    then:
      - CLI, npm SDK, and pip SDK use the same durable workflow-input API as the web app.
      - CLI and SDK tests verify text commands, simulated transcript input, reconnect/status polling, stop, follow-up, undo, invalid-node rejection, and project workflow linking before Playwright implementation starts.

  - id: S-27
    title: Workspace navigation shows the active workspace list
    given:
      - Alice is authenticated on web or Apple.
      - Alice can open the workspace sidebar as a mobile drawer or persistent desktop/tablet column.
    when:
      - Alice switches between Chats, Workflows, and Projects.
    then:
      - Chats mode shows Alice's chat list and chat-specific empty/loading/error states.
      - Workflows mode shows Alice's workflow list and workflow-specific empty/loading/error states.
      - Projects mode shows Alice's project list and project-specific empty/loading/error states.
      - The selected item, action labels, prefetch behavior, test identifiers, and accessibility labels match the active workspace.
      - No workspace silently keeps rendering the chat list after the workspace changes.

  - id: S-28
    title: User edits a workflow in a focused explicit-save canvas
    given:
      - Alice opens Daily Weather check from the workflow home or workspace sidebar.
    when:
      - The focused editor replaces the workflow home in the main canvas.
      - Alice changes the description, trigger, or an expanded node.
    then:
      - The global app chrome and active-workspace sidebar remain available without a second workflow-library column.
      - A visible dirty state offers Undo and Save.
      - Leaving with unsaved graph changes requires an explicit decision rather than silently discarding or auto-saving.
      - Desktop and mobile render the flow vertically, and mobile node details expand inline.

  - id: S-29
    title: User creates a titled draft from the fixed workflow composer
    given:
      - Alice is on the workflow home or focused workflow editor.
      - General workflow AI planning and voice input are not part of the core milestone.
    when:
      - Alice enters "Daily school weather" in the composer fixed to the bottom of the viewport.
      - Alice submits the title.
    then:
      - OpenMates creates a disabled draft named Daily school weather without adding assumed trigger or action nodes.
      - The new draft opens in the focused manual editor.
      - The composer does not claim to understand or execute a complex natural-language workflow instruction.
      - The composer remains visible and reachable without covering workflow cards, flow nodes, or run history.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web exposes a Workflows workspace with a manual Shortcuts-style vertical editor that can create, save, enable, disable, edit, delete, and manually run workflows.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: playwright
    verification_ids: [T-E2E-001]
  - id: AC-2
    scenario: S-1
    text: The Daily rain alert workflow can be built with schedule, weather app-skill action, decision, push notification, and email notification nodes.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-PYTEST-002, T-E2E-001]
  - id: AC-3
    scenario: S-2
