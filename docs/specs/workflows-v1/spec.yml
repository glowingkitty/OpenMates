implementation_plan:
  spec_path: docs/specs/workflows-v1/spec.yml
  existing_patterns:
    - backend/core/api/app/routes/workflows.py and backend/core/api/app/services/workflow_service.py for owner-scoped CRUD, immutable-version persistence, feature gating, and history APIs that remain reusable.
    - backend/apps/reminder/tasks.py for due-time computation and server-offline scheduling patterns only; workflow claims and records use the new workflow-specific atomic boundary.
    - backend/core/api/app/services/workflow_app_skill_adapter.py, backend/core/api/app/services/workflow_action_adapter.py, and backend/core/api/app/services/skill_registry.py for real feature-gated execution adapters.
    - backend/core/api/app/routes/share.py and backend/core/directus/schemas/share_short_links.yml for the existing opaque /v1/share/short-url storage, owner verification, expiry, and resolution path.
    - frontend/packages/ui/src/services/shareEncryption.ts for existing Web Crypto AES-GCM, URL-safe encoding, token, and fragment-key primitives; extend it rather than creating Workflow cryptography.
    - frontend/packages/ui/src/stores/workflowWorkspaceStore.ts for the existing workflow list/detail/run cache and mutation boundary.
    - frontend/packages/ui/src/components/DailyInspirationBanner.svelte and frontend/packages/ui/src/components/enter_message/MessageInput.svelte as rendered visual references, without importing chat send/storage behavior.
    - docs/specs/unified-detail-pages/spec.yml for metadata API/version/encryption compatibility only; workflows-v1 owns Workflow header, action, tab, card, and run-screen composition.
    - frontend/packages/openmates-cli/src/client.ts, frontend/packages/openmates-cli/src/sdk.ts, and packages/openmates-python/openmates/sdk.py for cross-client API contract patterns.
  architecture: >
    Correct the core in dependency order instead of extending the prototype.
    workflow_triggers owns encrypted recurrence/event/webhook configuration plus
    minimal indexed routing and atomic claim state; workflow_runs is created only
    at accepted execution and remains pinned to one immutable workflow_version.
    One scheduler/runtime service accepts manual, schedule, webhook, and event
    adapters into that boundary. One authenticated normalized event envelope is
    owner/source/type routed, predicate-evaluated from Vault ciphertext, durably
    deduplicated by workflow_event_receipts, and protected by consent, scope,
    rate, size, and loop controls. Provider credentials remain exclusively in the
    credential Vault and are revalidated per node execution. Sharing is a separate
    persistent client-encrypted projection and minimally extends the existing
    /v1/share/short-url path with workflow_template ownership/revocation; the
    server never receives projection plaintext keys or URL fragment keys. CLI,
    npm, and pip prove shared runtime/share contracts before web. Web then owns
    the Workflow-specific routes and functional composition.
  boundaries:
    - No planned or future workflow_run records; recurrence state is only workflow_triggers.next_run_at and encrypted recurrence config.
    - No parallel short-link route, collection, encryption primitive, or Workflow-only resolver; extend /v1/share/short-url and share_short_links.
    - No provider credential, connected-account id, grant, webhook secret, event payload, schedule body, predicate value, or user text in graph/version/projection plaintext, logs, traces, or analytics.
    - No generic WorkspaceDetailHeader visual ownership for Workflow detail/runs and no duplicate report/action/status/editor areas.
    - AI workflow-input planning, assistant temporary workflows, Tasks projections, cooperative cancellation UI, definition timeline, and advanced event producers remain deferred unless a listed required AC cannot be met without them.
