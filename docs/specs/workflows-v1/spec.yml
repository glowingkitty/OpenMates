clarification:
  rounds:
    - question: Should V1 be a UI prototype or include a real server-side workflow runner?
      answer: V1 should be a real server-backed Workflows section with durable data models and real workflows.
    - question: Should V1 include AI-assisted workflow creation from a prompt?
      answer: Manual Shortcuts-style editing remains the primary editor, but the assistant must be able to use explicit workflow skills to create temporary one-time workflows from chat, run matching existing workflows after a cancelable countdown or required approval, and keep temporary workflows when the user asks.
    - question: Should workflows always run server-side, independent of user connection state?
      answer: Yes. Workflows must always run on the server; user input is modeled as an ask-user node that starts or continues a chat and resumes when the user responds.
    - question: Should CLI, SDK, web, and Apple clients all be able to manage workflows?
      answer: Yes. Users must be able to view, manage, create, and edit workflows across CLI, npm SDK, pip SDK, web, and Apple, with Apple parity after the other surfaces are confirmed.
    - question: Should workflows have separate private-device and cloud modes?
      answer: No. V1 should keep one cloud workflow product model, acknowledge that server-side automation needs backend runtime decrypt access, protect definitions and run content with Automation Vault encryption, and expose simple run-content retention controls.
    - question: Should one-time workflows delete themselves immediately after running?
      answer: No. Chat-created one-time workflows are temporary workflow records that remain inspectable and runnable/history-visible for seven days, then auto-delete unless the user keeps them. Recurring chat-created workflows are regular persisted workflows, not temporary records.
    - question: Should workflows need explicit end nodes?
      answer: No. A workflow completes naturally when a node has no next executable outgoing edge. The editor may show a visual terminator for readability, but the graph contract and runner must not require an end node.
    - question: Should user-created workflows be available to the assistant?
      answer: Yes. Persisted user-created workflows must be exposed as assistant-considerable runnable capabilities, and every workflow must support manual on-demand runs. If a manual run needs trigger input, the user is asked for the missing input before execution.
    - question: Should the Workflows screen keep the current manual-editor-first layout or move toward the Figma chat-like workflow surface?
      answer: >
        The Workflows screen should use the same basic layout model as the chat
        screen. Workflow recommendations/daily inspiration appear at the top,
        recent workflows appear underneath, Show all opens the full grid, and a
        bottom command input remains available.
    - question: How should recent workflows be ordered?
      answer: Show active enabled workflows first, sorted by soonest next_run_at; then show disabled, draft, manual-only, or unscheduled workflows sorted by updated_at newest first. Cards show Next run when available and fall back to Last run, Draft, or Manual only.
    - question: Should Show all preserve the landing content or switch to a browsing mode?
      answer: Show all switches into a full browsing mode that hides the recommendation banner and recent carousel, keeps the bottom workflow input visible, and shows all workflows in a vertical scrollable grid using the same default ordering unless search/filter is active.
    - question: Should workflow input reuse chat processing?
      answer: No. Workflow input should be a separate durable workflow-input session pipeline. It may share UI primitives and media/transcription helpers, but it must not use the chat pre/main/post processing pipeline.
    - question: Should workflow input be REST or WebSocket?
      answer: Use a durable REST session/job as the source of truth and WebSocket only for live event streaming while connected. Connection drops must not cancel workflow creation or updates; clients can poll or reconnect by session_id and event cursor.
    - question: Should the first Figma alignment milestone ship a core slice or the complete workflow model?
      answer: Ship a releasable core slice first.
    - question: How much Apple workflow editing belongs in the core milestone?
      answer: Apple includes the full native manual vertical editor in the core milestone.
    - question: How should the core workflow composer behave before general AI planning exists?
      answer: It stays fixed to the bottom of the viewport and only creates a new draft workflow using the entered text as its title. General AI processing comes later.
    - question: Should the workflow editor keep a dedicated workflow-list column?
      answer: No. Opening a workflow replaces the home in a focused main canvas while preserving global app chrome.
    - question: How are edits persisted and how do mobile nodes open?
      answer: Graph edits use explicit Save and Undo, and mobile node details expand inline in the vertical timeline.
    - question: Does workspace-specific sidebar content apply only to the hamburger drawer?
      answer: No. Mobile drawers and persistent desktop/tablet sidebars show chats in Chat mode, workflows in Workflows mode, projects in Projects mode, and the matching list for every registered workspace.
  vision_summary: >
    Workflows V1 is a real product section, not a mock. It exposes durable
    server-side workflow graph and run models, a manual vertical editor, and a
    chat-like Workflows home with recommendations, recent workflows, Show all
    browsing, and a bottom workflow command input. Natural-language text or
    voice workflow input is processed through a separate durable streaming
    workflow-input session pipeline, with CLI/SDK contracts implemented and
    tested before the web and Apple UI surfaces. The current core UI milestone
    uses title-only draft creation instead of general AI planning, provides full
    manual editors on web and Apple, opens workflows in a focused canvas, uses
    explicit Save/Undo, expands mobile nodes inline, and makes every sidebar or
    hamburger list reflect the active workspace.
  approved_by_user: true

