  - id: D-10
    status: active
    decision: Keep the landing composer title-only in the core milestone and do not render a fake detail change composer before the durable workflow-input planner exists.
    reason: Visual Figma alignment must not misrepresent deferred AI/voice functionality as implemented.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-11
    status: active
    decision: Workflow detail and run visuals are owned by workflows-v1 and follow Figma-specific composition instead of the generic unified-detail header visual.
    reason: The deployed generic Workflow composition was explicitly rejected and cannot count as visual approval.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-12
    status: active
    decision: Create workflow_runs only when an execution is atomically claimed or accepted; represent future recurrence only in workflow_triggers and loop/repeat only in immutable workflow_versions graphs.
    reason: Planned run rows conflate schedule state with actual execution and weaken idempotent claiming.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-13
    status: active
    decision: Use one authenticated normalized event envelope and encrypted structured trigger predicates for all event sources; never execute arbitrary predicate code.
    reason: Chat, assistant, app-skill, and command events need one owner-scoped, deduplicated, auditable dispatch boundary.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-14
    status: active
    decision: Maintain a separate persistent client-encrypted portable template projection per Workflow and use Chat-style fragment-key sharing.
    reason: The projection enables offline long-link sharing without exposing runtime Automation Vault state, credentials, or the fragment key to the server.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-15
    status: active
    decision: Treat Automation Vault with least-privilege audited decrypt as the privacy boundary for unattended execution.
    reason: Server-side unattended workflows cannot be cryptographically inaccessible to the backend that must execute them.
    decided_at: "2026-07-11T00:00:00Z"

