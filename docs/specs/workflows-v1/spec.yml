id: workflows-v1
title: Workflows V1
status: implementing

goal: >
  Add a real server-backed Workflows section where users can create, edit,
  enable, run, inspect, and delete server-side automations through a manual
  Shortcuts-style editor across web, CLI, npm SDK, pip SDK, and Apple clients.
  V1 must be durable enough to run scheduled workflows while the user is
  offline, replace reminders as the underlying automation primitive once fully
  released, support assistant-created temporary one-time workflows from chat,
  and validate real workflow execution without mocked app-skill or action nodes.

scope:
  in:
    - Server-side workflow execution that does not depend on any connected browser, WebSocket, IndexedDB, or active user device.
    - Durable workflow, version, trigger, run, node-run, and wait-state data models.
    - Workflow lifecycle modes for persisted reusable workflows and temporary chat-created one-time workflows that auto-delete after seven days unless the user keeps them.
    - A Workflows workspace that lists created workflows and opens a manual Shortcuts-style vertical editor.
    - One trigger node per workflow in V1, with schedule, manual run, required-start-input prompts for manual runs, disabled webhook-trigger data model support, and event-trigger metadata for chat, assistant action, app-skill, terminal command, and sandbox command events.
    - Action nodes for feature-enabled app skills, creating a chat/report, starting a deterministic chat, sending a safe push notification, and sending a safe email notification. A workflow completes when no executable outgoing edge remains; no explicit end node is required.
    - Decision nodes with structured rules over previous node outputs.
    - Repeat node UI and schema for bounded repeat/for-each/poll-until flows, with execution limited to explicitly supported safe repeat modes.
    - App skill workflow adapters generated from existing app skill metadata with minimal per-skill workflow metadata overrides.
    - Weather forecast and news search workflow actions using existing backend app skills through real app-skill adapters rather than mocked runner output.
    - Assistant-facing workflow skills so the assistant can find, propose, create, schedule, run, cancel pending, and keep workflows with countdown/approval behavior.
    - Persisted user-created workflows exposed as assistant-considerable runnable capabilities, subject to required input collection, feature availability, ownership, and safety gates.
    - Run history with per-node status, input summary, output summary, error, retry, timing, and credit usage.
    - CLI commands to list, show, create from JSON/YAML, edit, enable, disable, delete, run, and inspect workflow runs.
    - npm SDK and pip SDK methods that match CLI workflow management and run behavior.
    - Web Playwright coverage for the workflow list/editor and canonical rain/news workflows.
    - Apple app parity for listing, viewing, enabling/disabling, manually running, and inspecting workflows after CLI, SDK, and web evidence are green.
  out:
    - Open-ended AI-assisted workflow design as the primary editor. V1 may let the assistant create or run structured workflows from chat only through validated workflow skills and safety gates.
    - Fully free-form n8n-style canvas editing as the primary editor.
    - Arbitrary custom code execution in V1; custom code nodes may be represented as disabled/gated future nodes only.
    - Persistent connected-account offline automation grants for provider-backed mutations.
    - External send/mutation actions such as sending email to third parties, modifying calendars, payments, deleting external data, or posting to social media.
    - Multi-trigger workflows; V1 allows one active trigger per workflow.
    - Unbounded loops, arbitrary recursion, or user-authored JavaScript/Python expressions.
    - Public workflow sharing and workflow marketplace/templates beyond local starter examples.
    - Production migration of existing reminders into workflows before workflow-backed reminders are proven in dev.

context_discovery:
  github_issues:
    - "GitHub MCP issue search failed with bad credentials. gh issue searches for workflow automation, platform workflows, outgoing webhooks, and trigger reminder webhook automation returned no dedicated workflows issue."
  docs:
    - docs/specs/simplified-feature-availability/spec.yml
    - docs/specs/unified-notifications/spec.yml
    - docs/specs/sdk-cli-parity-v1/spec.yml
    - docs/specs/calendar-permission-management/spec.yml
    - docs/architecture/webhooks.md
    - docs/architecture/apps/app-skills.md
    - docs/architecture/apps/function-calling.md
    - docs/architecture/core/security.md
    - docs/contributing/guides/spec-driven-development.md
    - docs/contributing/guides/testing.md
  code_patterns:
    - backend/core/api/app/services/feature_availability_service.py defines platform:workflows as off by default.
    - frontend/packages/ui/src/components/Header.svelte can show a Workflows tab when platform:workflows is enabled.
    - frontend/packages/openmates-cli/src/server.ts says platform:workflows is not implemented yet.
    - backend/apps/reminder/tasks.py provides server-side schedule processing, DB fallback, email fallback, and AI dispatch patterns.
    - backend/apps/reminder/skills/set_reminder_skill.py provides one-time, random, and repeat schedule input patterns.
    - backend/core/api/app/routers/webhooks.py provides incoming webhook trigger, pending cache, confirmation, and server-side AI dispatch patterns.
    - backend/apps/weather/app.yml and backend/apps/weather/skills/forecast_skill.py provide a real forecast app skill and weather embed previews.
    - backend/apps/news/app.yml and backend/apps/news/skills/search_skill.py provide a real current-news app skill and news embed previews.
    - backend/core/api/app/services/push_notification_service.py and backend/core/api/app/tasks/email_tasks/reminder_notification_email_task.py provide notification delivery patterns.
