  data_flow:
    - "Daily schedule example: an authorized client saves daily at 07:00 in Europe/Berlin into an Automation Vault ciphertext referenced by workflow_triggers; only trigger_type=schedule, enabled=true, version_id, claim fields, and next_run_at=1783832400 (2026-07-12T05:00:00Z) are queryable plaintext."
    - At due time two workers contend on one trigger; one atomic lease wins, creates one queued workflow_run with one acceptance idempotency key and the claimed version_id, decrypts recurrence, computes the next next_run_at, executes, and finalizes the claim. A retry resolves to that run instead of creating another; no future runs exist.
    - Manual, webhook, and event adapters normalize into the same accepted-execution boundary; execution decrypts the immutable graph and uses real app-skill/platform adapters. Before every provider call, the opaque binding is resolved from the credential Vault and owner, consent, capability, and current scopes are revalidated.
    - "Terminal predicate example: an authenticated fictional envelope carries event_id=evt-example-001, owner_hash=<OWNER_HASH>, source=terminal, event_type=command.completed, scope.project_hash=<PROJECT_HASH>, occurred_at=1783832400, and transient payload.command_text='deploy preview'. Indexed routing selects owner/source/type; the Vault-encrypted AST { left: '$event.payload.command_text', op: contains, right: 'deploy' } is evaluated after consent/scope checks. The payload and predicate values never enter receipts or logs."
    - The dispatcher inserts a unique trigger_id plus event_id receipt before accepting execution; duplicates, excessive owner/source rates, oversized/unredacted command payloads, cross-project scopes, and workflow-origin recursion are rejected without another run.
    - After an authorized workflow edit, the client recursively allowlists a portable template, encrypts it with a client-generated template key, wraps that key for the owner, and PUTs only template_id, source_version, ciphertext, checksum, schema version, and owner_wrapped_key.
    - Online sharing generates token, shortKey, and encrypted_url client-side; POST /v1/share/short-url receives content_type=workflow_template plus opaque ciphertext but no fragment key, and the client assembles /s/{token}#{shortKey}. Owner-authorized DELETE revokes retrieval.
    - Offline sharing reads the persistent local/cross-device projection and emits /share/workflow-template/{templateId}#key={templateKeyBlob}. Import decrypts and validates client-side, then sends the portable allowlisted payload to create a new recipient-owned disabled workflow with rebinding requirements.
    - Web routes load the same owner-scoped records into the Workflow-owned header/editor or runs screen. Only dirty graph changes reveal Save/Undo.
