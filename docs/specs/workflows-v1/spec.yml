  - id: AC-34
    scenario: S-26
    text: CLI, npm SDK, and pip SDK expose and test workflow input session start/status/events/stop/follow-up/undo before the web UI consumes the same architecture.
    required: false
    status: pending
    coverage_status: covered
    verification_scope: cli
