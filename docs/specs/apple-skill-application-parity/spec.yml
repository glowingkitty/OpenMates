id: apple-skill-application-parity
title: Apple Skill Application And Code Execution Web Spec Parity
status: draft

goal: >
  Recreate the web app's skill, application preview, file/PDF/image, and code
  execution Playwright coverage in Apple beyond generic embed chrome, proving
  native renderer details, run actions, statuses, and safety states match the web
  product contract.

scope:
  in:
    - Native parity for skill-specific renderer details, provider icons, status states, raw JSON leak prevention, and fullscreen/basic info behavior.
    - Native parity for application preview start/stop/status behavior where Apple supports the application runtime, or a documented native unsupported state where it does not.
    - Native parity for code/PDF/image/file upload and code-run execution details, including terminal/source panel/actions where Apple supports execution.
    - Remote Mac simulator tests and deterministic fixture/audit checks.
  out:
    - Replacing backend provider APIs or web application runtime architecture.
    - Running real third-party provider calls in committed Apple tests unless a live-dev parity test explicitly requires it and sanitizes artifacts.
    - Committing uploaded private files, generated media with private data, run logs with secrets, hostnames, IPs, or private screenshots.

