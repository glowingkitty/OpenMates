apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Embeds/Renderers/*.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/*.swift
    - apple/OpenMates/Sources/Core/Networking/CodeRunService.swift
    - apple/OpenMates/Sources/Core/Models/EmbedModels.swift
    - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
    - apple/OpenMatesUITests/SkillApplicationParityUITests.swift
    - apple/OpenMatesTests/SkillApplicationParityTests.swift
  parity_expectations:
    - This spec builds on generic embed parity and adds app/skill-specific behavior, actions, and status assertions.
    - Apple renderer output must not show raw JSON, leaked provider payloads, or web-only placeholder copy unless intentionally classified.
    - Unsupported application/runtime execution must be visible as an intentional native limitation, not a silent broken state.
  verification:
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SkillApplicationParityUITests`.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SkillApplicationParityTests`.
    - "Existing embed parity tests remain required: `python3 scripts/apple_remote.py test-ios --simulator \"iPhone 17\" --only-testing OpenMatesUITests/EmbedRenderingParityUITests`."
  intentional_native_differences:
    - Code execution and application preview may be web-only until Apple has an approved runtime bridge; unsupported states must be explicit and tested.
    - PDF/video/map/web media surfaces may use native viewers or safe placeholders if platform-owned rendering differs from browser iframes.

scenarios:
  - id: S-1
    title: Skill renderers match web-specific details
    given:
      - Synthetic fixtures cover every skill family from the web skill specs.
    when:
      - Apple renders previews, details, fullscreen states, provider icons, statuses, and error/safety states.
    then:
      - Visible text, iconography, grouping, statuses, and primary actions match web where native support exists.
      - Unsupported or web-only states are explicitly visible and documented.
  - id: S-2
    title: Application previews and code execution are classified and tested
    given:
      - Web specs cover application preview start/stop and code-run terminal/source/actions.
    when:
      - Apple opens equivalent application/code embeds and actions.
    then:
      - Supported native actions match web behavior.
      - Unsupported runtime actions show deterministic native fallback states without raw JSON or silent no-ops.
  - id: S-3
    title: File PDF image and generated media flows match safety contracts
    given:
      - Simulator-safe fixtures represent uploaded files, PDFs, images, generated-media safety failures, and provider errors.
    when:
      - Apple renders those user and assistant embed states.
    then:
      - Apple matches web success, processing, failed, safety-blocked, and reload states without leaking raw payloads.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Apple skill renderer tests recreate web skill-specific output, provider icon, status, and fullscreen behavior beyond generic embed chrome.
  - id: AC-2
    scenario: S-2
    text: Apple application preview and code execution tests either match supported web actions or expose tested intentional unsupported states.
  - id: AC-3
    scenario: S-3
    text: Apple file/PDF/image/generated-media tests recreate web safety, processing, reload, and raw JSON leak prevention behavior.

tests:
  - id: T-UNIT-001
    type: unit
    file: apple/OpenMatesTests/SkillApplicationParityTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SkillApplicationParityTests
    covers:
      - AC-1
      - AC-2
      - AC-3
    assertions:
      - Skill/application/code/PDF/image fixture models decode web payloads and statuses.
      - Unsupported native runtime states are classified with user-visible copy and no silent fallback.
      - Renderer payloads redact provider secrets, files, hostnames, and raw JSON.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
  - id: T-UNIT-002
    type: unit
    file: apple/OpenMatesUITests/SkillApplicationParityUITests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SkillApplicationParityUITests
    covers:
      - AC-1
      - AC-2
      - AC-3
    assertions:
      - Skill/application/code/PDF/image states are visible in native UI with required identifiers.
      - Run/action controls either work as web equivalents or show explicit unsupported states.
      - Screenshots and attachments use synthetic fixtures only.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: not_run
        run_id: ""
        timestamp: ""

tasks:
  - id: TASK-1
    title: Add Apple skill application and code execution parity tests
    covers:
      scenarios:
        - S-1
        - S-2
        - S-3
      acceptance_criteria:
        - AC-1
        - AC-2
        - AC-3
    expected_files:
      - apple/OpenMatesUITests/SkillApplicationParityUITests.swift
      - apple/OpenMatesTests/SkillApplicationParityTests.swift
      - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
    verification:
      - T-UNIT-001
      - T-UNIT-002
    independently_deployable: true
