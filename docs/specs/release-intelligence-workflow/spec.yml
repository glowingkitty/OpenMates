id: release-intelligence-workflow
title: Release Intelligence And Communication Workflow
status: implementing

goal: >
  Build an LLM-assisted release-intelligence pipeline that turns OpenMates git,
  PR, deployment, and campaign history into natural-language daily, weekly,
  monthly, PR, release, newsletter, and social-media planning artifacts. Gemini
  Flash writes the primary narrative summaries, while deterministic source
  collection and release-status checks ground every claim and prevent unreleased
  work from being communicated as shipped.

scope:
  in:
    - Generate daily changelog YAML files with Gemini-written natural-language summaries grounded in recent commits and changed paths.
    - Generate weekly and monthly Gemini-written rollups from prior summaries, preserving dates so product progress over time is visible.
    - Support a target cadence of one user newsletter every two weeks when enough released user-facing changes exist.
    - Use merged main PRs plus existing feature availability gates as the newsletter eligibility gate for released product communication.
    - Update PR and GitHub release draft workflows to consume release-intelligence artifacts instead of raw commit dumps.
    - Create or update newsletter campaign drafts in openmates-marketing and Directus after released main changes are detected.
    - Notify the admin by Discord/email when newsletter drafts, approvals, or social/video recommendations need attention.
    - Generate social media and short-video recommendations from released or soon-to-release feature candidates.
  out:
    - Automatically approving or scheduling newsletters before an admin preview has been explicitly reviewed and approved.
    - Sending newsletters about dev-only, disabled, incomplete, or unmerged features.
    - Publishing or scheduling Buffer posts automatically without explicit user/admin approval.
    - Replacing the existing Directus newsletter campaign scheduler or Brevo sender.
    - Building full Remotion videos as part of the daily changelog script.

