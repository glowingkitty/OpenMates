assumptions:
  - id: A-1
    text: Local git refs origin/main and origin/dev are available often enough for deterministic reachability checks; when unavailable, the script fails closed and treats newsletter readiness as false.
    category: git
    required_before: implementation
    status: confirmed
    evidence:
      - source: git status during session 0837
        summary: Repository is on dev and up to date with remote; origin refs are used by existing create-pr skill guidance.
  - id: A-2
    text: Gemini or another LLM is required for the primary communication artifact; --no-llm remains available only for deterministic debugging and offline tests.
    category: llm
    required_before: implementation
    status: corrected
    evidence:
      - source: user request and discussion
        summary: User clarified that natural-language LLM summaries are the intended primary artifact, with deterministic data only as grounding.

contracts:
  artifact_schema:
    - daily files live at docs/releases/daily/YYYY-MM-DD.yml unless --output is provided.
    - daily files contain schema_version, cadence, date, generated_at, range, summary, sections, unreleased_progress, marketing_candidates, risks, sources, and llm_summary.
    - every deterministic section item contains title, commits, changed_paths, release_status, newsletter_ready, user_facing, and rationale.
    - llm_summary contains overview, released_changes, bug_fixes, unreleased_progress, internal_progress, newsletter_recommendation, social_video_recommendations, quality_notes, and validation_warnings.
  release_gating:
    - newsletter_ready is false unless all source commits are reachable from main or --assume-released is passed for a controlled dry run.
    - newsletter_ready is false when related feature IDs are effectively disabled by the existing feature availability service.
    - dev-only, disabled-feature, or unknown reachability changes may be PR/release planning material but not user newsletter material.
  llm_usage:
    - Gemini writes the primary natural-language llm_summary after deterministic items exist.
    - LLM output should not introduce items without source commit references; unsupported claims are retained only with validation_warnings for review.
  newsletter:
    - Campaign drafts are created or updated only from released main changes.
    - Admin preview and explicit approval remain mandatory before scheduling or sending.
    - Two weeks is the default target cadence, with manual override for urgent or sparse releases.
  social:
    - Social candidates are recommendations only until a user/admin invokes create-social-campaign or buffer-posts.
    - App-skill or chat-based demo recommendations must mark whether a production example chat is required.
  privacy_security:
    - Artifacts must not include secrets, raw user data, private emails, production identifiers, or unreleased private logs.
    - Newsletter/social prose must avoid overbroad privacy claims and follow the marketing communication strategy.

tests:
  - id: T-DAILY-UNIT
    type: pytest
    file: scripts/tests/test_release_intelligence.py
    command: python3 -m pytest scripts/tests/test_release_intelligence.py
    covers: [AC-1, AC-2, AC-3]
    assertions:
      - deterministic commit fixtures are grouped into expected sections
      - main-reachable changes are newsletter_ready
      - dev-only changes are not newsletter_ready
      - main-reachable changes tied to disabled feature gates, including Apple Watch, iOS, and macOS, are not newsletter_ready
      - workflows, projects, tasks, and plans are treated as unreleased when disabled by feature availability
      - LLM source payloads include the disabled feature list and prompt rules require neutral authorship wording
      - newsletter include evidence is limited to deterministic newsletter-ready commits
      - marketing candidates include released user-facing features and improvements
      - YAML serialization includes required top-level fields
      - LLM summary normalization keeps only known commit evidence and emits warnings for unsupported claims
      - weekly LLM source includes dated daily summaries
    red_phase:
      required: true
      expected: fail
      evidence:
        status: skipped_with_reason
        run_id: user_requested_immediate_first_slice
        timestamp: "2026-07-08T00:00:00Z"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: local:pytest-release-intelligence
        timestamp: "2026-07-09T12:22:33Z"
  - id: T-DAILY-SMOKE
    type: manual
    covers: [AC-1]
    assertions:
      - daily command runs against the current repository without writing unless --write is passed
      - output is valid YAML
      - output includes recent commits and clearly marks newsletter readiness
