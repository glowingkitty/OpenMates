implementation_plan:
  existing_patterns:
    - scripts/auto_translate.py for optional Gemini API loading and function-call style usage.
    - scripts/_remotion_marketing_review_helper.py for scheduled marketing review prompt generation.
    - backend/core/api/app/services/newsletter_campaign_service.py for existing campaign draft/approval/schedule constraints.
    - openmates-marketing/.agents/skills/create-social-campaign/SKILL.md for social campaign handoff rules.
  architecture: >
    A local script family under scripts/release_intelligence.py creates durable
    YAML artifacts. Daily artifacts are deterministic and commit-backed. Weekly,
    monthly, PR, release, newsletter, and social workflows consume those files
    instead of re-summarizing raw git history. Optional LLM prose generation is a
    later pass over this structured evidence and is validated against source
    commit references.
  data_flow:
    - Daily cron gathers commits, changed paths, branch reachability, feature availability status, and deterministic classification.
    - Daily YAML is written to docs/releases/daily/ and optionally posted as an admin digest.
    - Weekly and monthly scripts summarize daily YAML files with source dates preserved.
    - PR and release skills consume rollups and current main/dev ranges.
    - Newsletter check reads merged-main evidence, creates/updates a draft campaign, sends preview, and waits for approval.
    - Social workflow reads marketing candidates and hands off to create-social-campaign/remotion/buffer tools.
  affected_files:
    - path: scripts/release_intelligence.py
      reason: New deterministic daily/rollup/newsletter source artifact CLI.
    - path: scripts/tests/test_release_intelligence.py
      reason: Unit coverage for daily classification and artifact schema.
    - path: docs/specs/release-intelligence-workflow/spec.yml
      reason: Executable contract for the full workflow.
    - path: .agents/skills/create-pr/SKILL.md
      reason: Future update to consume release-intelligence artifacts.
    - path: .agents/skills/create-release/SKILL.md
      reason: Future update to consume release-intelligence artifacts.
    - path: .agents/skills/create-newsletter/SKILL.md
      reason: Future update to draft from release-intelligence source ranges.
    - path: /home/superdev/projects/openmates-marketing/.agents/skills/create-social-campaign/SKILL.md
      reason: Future update to consume social recommendation candidates.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/release-intelligence-workflow/spec.yml
    - python3 -m pytest scripts/tests/test_release_intelligence.py
    - python3 scripts/release_intelligence.py daily --since "24 hours ago" --stdout
  verification_order:
    - Deterministic script unit tests first.
    - Daily smoke output for user review second.
    - Rollup/newsletter/social follow-up tests after user confirms artifact shape.
  risks:
    - Commit subjects alone can misclassify changes; path rules and later PR/issue metadata should improve quality.
    - Reachability checks fail closed if origin/main is unavailable, which may under-report newsletter readiness but avoids over-communicating unreleased work.
    - A two-week newsletter cadence can still be too frequent when shipped user-facing changes are sparse; workflow should recommend skipping rather than forcing low-quality newsletters.

