clarification:
  rounds:
    - question: Should the target newsletter cadence be monthly or every two weeks?
      answer: The target should be every two weeks.
    - question: Should newsletters be auto-scheduled before admin approval?
      answer: No. Drafting and preview reminders can be automatic, but scheduling/sending requires admin approval.
  vision_summary: >
    The workflow should continuously collect product-change evidence and make it
    easy to communicate shipped changes on a two-week newsletter cadence, while
    separately tracking unreleased progress for PR and internal release planning.
    Deterministic scripts should classify and gate eligibility; LLMs can polish
    prose after the source data is already structured and auditable.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Daily changelog captures natural-language change analysis
    given:
      - The OpenMates dev branch has commits from the last 24 hours.
    when:
      - The daily release-intelligence script runs.
    then:
      - It writes a dated YAML file under docs/releases/daily/.
      - It includes a Gemini-written llm_summary with overview, released changes, bug fixes, unreleased progress, newsletter recommendations, and social/video ideas.
      - Every LLM-generated bullet cites one or more known source commits or receives a validation warning.
      - Changes not reachable from main, or tied to disabled/unreleased feature gates, are kept out of newsletter include recommendations.
      - The LLM source includes disabled feature IDs from the existing feature availability service.
  - id: S-2
    title: Rollups preserve product progress over time
    given:
      - Multiple daily changelog YAML files exist.
    when:
      - The weekly or monthly release-intelligence script runs.
    then:
      - Gemini summarizes the dated daily summaries into a weekly natural-language analysis.
      - It keeps shipped changes separate from unreleased progress.
      - It uses neutral authorship language and does not imply an OpenMates team.
      - It produces source material suitable for PR descriptions, release notes, and marketing planning.
  - id: S-3
    title: Main merge prepares newsletter draft without bypassing approval
    given:
      - One or more PRs have merged into main since the previous newsletter source range.
      - At least one merged change is user-facing and newsletter-worthy.
    when:
      - The newsletter check workflow runs.
    then:
      - It creates or updates a campaign draft in openmates-marketing.
      - It upserts a Directus draft campaign and sends an admin preview when configured.
      - It does not approve, schedule, or send the campaign without explicit admin approval.
      - It targets a two-week newsletter cadence unless a release is too small or urgent enough for manual override.
  - id: S-4
    title: PR and release drafts consume structured evidence
    given:
      - Release-intelligence daily and rollup files exist.
    when:
      - A maintainer creates a PR from dev to main or drafts a GitHub release.
    then:
      - The generated body uses structured release-intelligence artifacts.
      - It clearly separates released user-facing changes from internal or unreleased progress.
      - It avoids commit-dump prose.
  - id: S-5
    title: Social recommendations identify suitable product demos
    given:
      - A released or nearly released feature has clear user-facing value.
    when:
      - The weekly or newsletter workflow evaluates marketing candidates.
    then:
      - It recommends social post angles, channel fit, and whether a short video, longer demo, image, carousel, or founder post is appropriate.
      - It marks whether a production example chat or Playwright recording is required.
      - It does not create Buffer posts or publish social content automatically.

