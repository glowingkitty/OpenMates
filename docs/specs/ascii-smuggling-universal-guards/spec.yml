id: ascii-smuggling-universal-guards
title: ASCII Smuggling Universal Guards
status: approved

goal: >
  Ensure hidden Unicode ASCII-smuggling instructions are removed from every
  text value that reaches an LLM from user messages, external APIs, tool
  results, uploaded PDFs, audio transcripts, and decrypted direct embeds.

scope:
  in:
    - Deterministic ASCII-smuggling removal for all normal app skill results before LLM inference.
    - Final outbound LLM message sanitization for user, assistant, system, and tool text.
    - PDF OCR markdown/header/footer/table text sanitization before storage, TOC/legend detection, and read/search skill output.
    - Audio transcription and correction text sanitization before results are returned or embedded.
    - Decrypted direct embed text sanitization when content is filtered for LLM context.
    - Remaining external API skill outputs that currently lack sanitizer coverage.
  out:
    - Semantic LLM prompt-injection scanning for every field; existing targeted external-content scanners remain in place.
    - Rewriting encrypted blobs, Vault ciphertext, AES keys, binary file bytes, image data URLs, or base64 media payloads.
    - Client-side prevention of users uploading the original file bytes; this server-side slice protects LLM-bound text.

context_discovery:
  github_issues:
    - "GitHub MCP search failed with 401 bad credentials during session 9275; no issue linked."
  docs:
    - docs/architecture/privacy/prompt-injection.md
    - docs/architecture/privacy/sensitive-data-redaction.md
    - docs/contributing/guides/spec-driven-development.md
  code_patterns:
    - backend/core/api/app/utils/text_sanitization.py
    - backend/apps/ai/processing/content_sanitization.py
    - backend/apps/ai/processing/external_result_sanitizer.py
    - backend/apps/ai/processing/main_processor.py
    - backend/apps/ai/tasks/async_skill_continuation.py
    - backend/apps/ai/utils/llm_utils.py
    - backend/apps/pdf/services/ocr_service.py
    - backend/apps/pdf/tasks/process_task.py
    - backend/apps/pdf/skills/read_skill.py
    - backend/apps/pdf/skills/search_skill.py
    - backend/apps/audio/skills/transcribe_skill.py
    - backend/core/api/app/services/embed_service.py
