scenarios:
  - id: S-1
    title: CLI exports a complete personal archive without browser involvement
    given:
      - Alice has personal chats, embeds, uploads, projects, tasks, plans, workflows, invoices, usage, memories, and account metadata.
      - Some usage entries and completed tasks are no longer hot Directus rows because they were archived to S3.
    when:
      - Alice runs `openmates account export --output ./openmates-export.zip` against the dev server.
    then:
      - The CLI starts a resumable export job, streams chunks to disk, decrypts decryptable content locally where key material is available, and writes a readable ZIP.
      - The archive includes every default-selected domain, including hot and S3-archived usage/tasks.
      - The command finishes with a clear complete/partial/failed summary and never exports reusable credentials or raw secrets.

  - id: S-2
    title: User exports only selected domains and filters
    given:
      - Alice only wants chats from 2026-01-01 through 2026-03-31 and workflow runs from the last 30 days.
    when:
      - Alice runs a CLI export or uses the web export UI with selected domains and filters.
    then:
      - The manifest records selected domains and filter criteria.
      - The export includes only matching chats and workflow/runs plus required referenced embeds/uploads.
      - All-or-nothing domains that do not support advanced filters are either entirely included or entirely excluded.

  - id: S-3
    title: Web export survives connection loss and resumes
    given:
      - Alice starts a large web export on an unstable network.
      - The browser disconnects after some chunks are prepared or downloaded.
    when:
      - Alice reconnects and opens the export page again.
    then:
      - The UI shows the existing export job and its last persisted progress.
      - Alice can resume or cancel the job without restarting from zero.
      - Completed chunks are not duplicated and missing chunks are requested again.

  - id: S-4
    title: Chat export is complete and navigable
    given:
      - Alice has old personal chats that are metadata-only locally, plus nested embeds, uploads, code outputs, and compression summaries.
    when:
      - Alice exports chats with default settings.
    then:
      - Each exported chat has exactly one `.md` and one `.yml` file containing full decrypted messages and chat compression summaries in chronological/navigable order.
      - Chat files reference shared `embeds/` and `uploads/` entries rather than duplicating repeated embeds per chat.
      - Export validation fails or marks partial if any selected chat is missing expected server messages, required key material, or referenced embed/upload records.

  - id: S-5
    title: Safe metadata is exported for credentials-adjacent surfaces
    given:
      - Alice has connected accounts, API keys/devices, and webhooks.
    when:
      - Alice includes advanced account metadata in a personal export.
    then:
      - The export includes provider/account labels, connection status, scopes/capabilities, created/updated timestamps, API key names/scopes/limits, device metadata, and webhook metadata.
      - The export does not contain refresh tokens, access tokens, raw API keys, webhook signing secrets, token hashes, password hashes, backup-code hashes, TOTP seeds, private keys, or share URL fragments.

  - id: S-6
    title: Partial export is explicit and user-controlled
    given:
      - Alice selected invoices and one invoice PDF cannot be fetched from S3.
    when:
      - The export job reaches the validation phase.
    then:
      - The job status is `partial` or `failed`, not `complete`.
      - The export report names the failed domain/item and reason without leaking secrets.
      - Alice can retry, cancel, or explicitly download a partial export.
      - "`last_export_at` is not updated unless the export is complete or Alice explicitly accepts the partial export."

  - id: S-7
    title: SDKs expose the same export contract
    given:
      - A developer uses the npm SDK or pip SDK with an authenticated account.
    when:
      - They start an account export with selected domains and filters, poll status, and download chunks/artifacts.
    then:
      - SDK methods map to the same backend job contract as CLI and web.
      - SDKs expose typed/domain-aware options and do not invent different defaults.
      - SDK output preserves the same redaction and completeness semantics.

  - id: S-8
    title: Personal export never mixes team data
    given:
      - Alice has personal data and belongs to Team Acme with team chats, projects, tasks, plans, workflows, memories, connected accounts, and usage.
    when:
      - Alice runs a personal account export.
    then:
      - Rows with team scope or non-null team ownership hashes are excluded.
      - The export report explains that team data is available only through separate team export for owner/admin roles.
      - Viewer/member team export rules remain governed by the Teams V1 spec.

  - id: S-9
    title: Apple parity starts only after CLI, SDK, web, and user confirmation gates
    given:
      - CLI export and npm/pip SDK export have passed against the real dev API.
      - Deployed web export Playwright specs have passed against app.dev.openmates.org.
      - The user has confirmed the deployed web export UI looks correct and behaves as expected.
    when:
      - Apple account export implementation or parity work begins.
    then:
      - Apple uses the same personal export job contract or explicitly defers to CLI/web with a native-safe explanation.
      - Apple work does not start from incomplete, unverified, or UI-unapproved web behavior.
      - Apple verification records native build/test evidence or a documented native deferral.

