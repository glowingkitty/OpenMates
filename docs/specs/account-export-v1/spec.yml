risks:
  - id: R-1
    severity: high
    risk: Browser exports can still freeze if web packaging loads large chunks or binary blobs into memory.
    mitigation: CLI is reference large-export path; web must use bounded chunks/resume and either streaming writer support or explicit CLI handoff for very large exports.
  - id: R-2
    severity: high
    risk: Client-side encrypted domains cannot be decrypted by server job workers without weakening encryption guarantees.
    mitigation: Server provides authoritative encrypted chunks; clients decrypt locally and report progress/failures.
  - id: R-3
    severity: high
    risk: Data-domain scope is broad and can regress when new collections are added.
    mitigation: Add deterministic export-domain registry/test so new user-scoped collections require explicit include/exclude classification.
  - id: R-4
    severity: medium
    risk: S3 archive retrieval can be slow or missing due to lifecycle expiration.
    mitigation: Mark expired/missing archives explicitly in export-report.yml and avoid claiming complete for selected unavailable data.

open_questions:
  - id: OQ-1
    question: "Which persistent store should hold export jobs/chunks in implementation: Directus, Redis with Directus summary, or a dedicated Postgres table?"
    status: implementation_decision_needed
  - id: OQ-2
    question: "What exact CLI key-unlock flow is available for decrypting client-side encrypted data outside the browser?"
    status: assumption_A-1
  - id: OQ-3
    question: "Which browser archive writer is acceptable for Safari-compatible streaming/resume behavior?"
    status: resolved_with_bounded_jszip_and_cli_handoff
  - id: OQ-4
    question: "Should advanced optional user-linked email delivery/newsletter/referral/support records be default-off in the UI but available from CLI/SDK flags?"
    status: product_review_optional
