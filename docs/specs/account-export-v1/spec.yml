decisions:
  - id: D-1
    status: active
    decision: Personal export excludes team-scoped rows by default.
    reason: User confirmed team export is separate and requires owner/admin permissions.
    decided_at: "2026-07-18"
  - id: D-2
    status: active
    decision: V1 does not export reusable credentials or raw secrets.
    reason: Credentials and secret material would allow account/resource access and do not belong in a data portability archive.
    decided_at: "2026-07-18"
  - id: D-3
    status: active
    decision: Use a hybrid resumable export job instead of a single browser-only JSZip run.
    reason: Large exports must survive disconnects and must not freeze browsers or omit old/cold records.
    decided_at: "2026-07-18"
  - id: D-4
    status: active
    decision: Optimize archive layout for human navigation first.
    reason: Users need a readable archive today; stable schemas keep future machine import possible without making restore a V1 requirement.
    decided_at: "2026-07-18"
  - id: D-5
    status: active
    decision: Do not add a separate user-facing checksums.sha256 file in V1.
    reason: The user found that confusing; any needed integrity metadata should be folded into manifest/export report internals.
    decided_at: "2026-07-18"

