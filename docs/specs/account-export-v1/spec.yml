implementation_plan:
  spec_path: docs/specs/account-export-v1/spec.yml
  existing_patterns:
    - backend/core/api/app/routes/settings.py current export endpoints
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_content_batch_handler.py explicit chat hydration
    - backend/core/api/app/services/usage_archive_service.py S3 usage archive retrieval
    - backend/core/api/app/services/user_task_archive_service.py S3 task archive format
    - frontend/packages/openmates-cli/src/cli.ts CLI command dispatch
    - frontend/packages/openmates-cli/src/sdk.ts npm SDK facade
    - packages/openmates-python/openmates/sdk.py pip SDK facade
    - frontend/packages/ui/src/components/settings/account/SettingsExportAccount.svelte web UI
  architecture: >
    Implement an account export job service that builds an authoritative personal
    manifest from Directus and S3 archive sources, emits bounded chunks for CLI,
    SDK, and web clients, records client-side decryption/packaging progress, and
    marks jobs complete only after all selected domains are verified or explicitly
    accepted as partial. CLI is the reference large-export writer; web uses the
    same job contract with browser-safe chunking/resume behavior.
  data_flow:
    - User selects export domains and filters in CLI, SDK, or web.
    - Backend validates auth/scope, rejects team export requests, and creates a personal export job.
    - Backend builds manifest counts from hot Directus rows plus required S3 archive indexes.
    - Clients download bounded chunks, decrypt client-side encrypted content locally when possible, and stream archive output.
    - Clients report chunk/decryption results back to the job.
    - Backend marks complete, partial, failed, cancelled, or expired and updates last_export_at only under the approved contract.
  affected_files:
    - path: backend/core/api/app/routes/account_exports.py
      reason: New account export job API routes.
    - path: backend/core/api/app/services/account_export_service.py
      reason: Manifest, chunk, domain, S3 archive, and completeness orchestration.
    - path: backend/core/directus/schemas/account_exports.yml
      reason: Persist export job progress, selections, chunks, and outcomes if Directus is chosen for job state.
    - path: backend/core/api/app/routes/sdk.py
      reason: SDK account export route parity.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: CLI account export command.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI API client for export job endpoints.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK account export facade.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK account export facade.
    - path: frontend/packages/ui/src/services/accountExportService.ts
      reason: Replace browser-only local export with job-driven web export.
    - path: frontend/packages/ui/src/components/settings/account/SettingsExportAccount.svelte
      reason: Web UI domain selection, filters, progress, resume, partial handling.
    - path: frontend/apps/web_app/tests/export-account-flow.spec.ts
      reason: Update web E2E coverage for V1 contract.
    - path: docs/architecture/core/account-backup.md
      reason: Correct architecture claims.
    - path: docs/user-guide/export-account.md
      reason: Update user-facing export behavior and limitations.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/account-export-v1/spec.yml
    - Red backend contract tests before implementation.
    - Real CLI dev export before SDK/web implementation.
    - npm SDK and pip SDK parity tests after CLI contract is green.
    - Deploy to dev before Playwright green tests.
    - User confirmation on downloaded archive readability and UX before Apple parity.
    - python3 scripts/spec_verify.py docs/specs/account-export-v1/spec.yml before marking verified.
  verification_order:
    - Backend unit/contract red tests
    - Real CLI command against dev server
    - GitHub Actions daily-test wiring after dev CLI success
    - npm SDK and pip SDK parity
    - Web implementation and deployed Playwright green tests
    - User confirmation of dev web export UX/archive readability
    - User confirmation that deployed web export UI looks correct and behaves as expected
    - Apple implementation/parity, then native impact check/build or documented deferral

