schema_version: 2
id: account-export-v1
title: Account Export V1
status: implementing

goal: >
  Replace the current fragile browser-only account export with a complete,
  resumable, scalable personal data export system across CLI, npm SDK, pip SDK,
  and web. The export must include all selected personal OpenMates data in
  decrypted, human-navigable form wherever the user's key material permits it,
  while never exporting reusable credentials, private keys, raw secrets, or
  team-owned data through the personal export path.

scope:
  in:
    - Personal account export only; team export remains separate and owner/admin-gated.
    - Resumable export jobs with persisted progress, selected domains, filters, explicit completeness state, and safe retry after network loss.
    - CLI-first export command that streams large exports to disk and proves the backend/API contract against the dev server.
    - npm SDK and pip SDK parity for starting exports, polling status, listing chunks/manifests, and downloading/exporting helper output.
    - Web app export UI using the same export job contract after CLI and SDK gates are green.
    - Default-selected export domains for the most relevant personal backup content.
    - Advanced filters for chats, tasks, projects, plans, workflows/runs, and usage in V1.
    - Complete chat exports with exactly one readable markdown file and one structured YAML file per chat, including all messages and chat compression summaries.
    - Shared deduplicated embeds/uploads folders referenced from chats, tasks, projects, plans, and workflows.
    - Retrieval of hot Directus data plus current S3/cold-storage sources required for usage archives and task archives.
    - Explicit domain-level success, skipped, redacted, partial, and failure reporting.
    - Updating `last_export_at` only after a verified complete export, or after the user explicitly accepts a partial export.
    - Updating account-export architecture/user docs and tests so they no longer overpromise unverified behavior.
  out:
    - Full account import/restore for the new export format.
    - Rewriting current chat import beyond preserving existing chat-import behavior.
    - Team export implementation changes except ensuring personal export excludes team-scoped rows and references the separate team-export contract.
    - Exporting raw API keys, connected-account credentials, webhook signing secrets, password hashes, lookup hashes, backup-code hashes, TOTP seeds, private keys, master keys, chat keys, task keys, project keys, plan keys, workflow secret keys, recovery secrets, or share URL fragments.
    - Server-side plaintext ZIP generation for content that must be decrypted only with client-held key material.
    - Apple implementation before CLI, SDK, web, and user-confirmation gates are complete.

sequencing_gates:
  - gate: CLI_AND_SDK_FIRST
    required_before: web_implementation
    rule: CLI export and npm/pip SDK export must be fully implemented and verified against the real dev API before web export implementation begins.
    evidence: [T-CLI-EXPORT-DEV, T-CLI-FILTERS-DEV, T-CLI-PARTIAL-DEV, T-CLI-SECRET-SCAN, T-CLI-ARCHIVE-LAYOUT, T-NPM-SDK-EXPORT, T-PIP-SDK-EXPORT, T-PARITY-AUDIT]
  - gate: WEB_AFTER_CLI_SDK
    required_before: user_ui_confirmation
    rule: Web export work starts only after CLI and SDK gates are green, then must pass deployed Playwright spec tests against app.dev.openmates.org.
    evidence: [T-WEB-EXPORT, T-WEB-FILTERS, T-WEB-RESUME, T-WEB-PARTIAL, T-WEB-SECRET-SCAN]
  - gate: USER_CONFIRMATION_BEFORE_APPLE
    required_before: apple_implementation
    rule: Apple implementation/parity starts only after automated web spec tests pass and the user confirms the deployed web UI looks correct and behaves as expected.
    evidence: [V-USER-CONFIRMATION]

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --search 'account export data portability' --limit 10 returned no matching issues."
    - "Prod reported issue QHSJ2 resolved to UUID 6975162b-43df-4b66-aa58-4a173d677654 and reports incomplete account export, missing embed data, and older chats without full history."
  local_findings:
    - docs/findings/issues/prod/2026/6975162b-43df-4b66-aa58-4a173d677654-admin-exported-account-data-incomplete-embed-data-are-co.md
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/core/account-backup.md
    - docs/user-guide/export-account.md
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/teams-v1/spec.yml
    - docs/specs/user-data-permission-audit/spec.yml
    - docs/specs/sdk-cli-parity-v1/spec.yml
    - docs/specs/plans-v1/spec.yml
    - docs/specs/workflows-v1/spec.yml
  code_patterns:
    - frontend/packages/ui/src/services/accountExportService.ts currently builds a JSZip archive from local IndexedDB and partial backend data.
    - frontend/packages/ui/src/services/chatExportService.ts converts local chats/messages/embeds to YAML/Markdown.
    - frontend/packages/ui/src/services/zipExportService.ts extracts selected embed files from locally loaded messages and local embed state.
    - backend/core/api/app/routes/settings.py exposes GET /export-account-manifest and GET /export-account-data.
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_content_batch_handler.py can fetch encrypted messages, embeds, embed keys, chat key wrappers, compression checkpoints, and code run outputs for explicit chat batches.
    - backend/core/api/app/services/usage_archive_service.py retrieves user-key-encrypted gzip usage archives from S3.
    - backend/core/api/app/services/user_task_archive_service.py writes completed task archives to user-key-encrypted gzip S3 bundles.
    - backend/core/api/app/tasks/email_tasks/email_delivery_archive_task.py archives old email delivery rows to private S3 gzip bundles.
    - backend/core/api/app/services/s3/config.py defines usage_archives, task_archives, email_delivery_archives, chatfiles, invoices, profile_images_private, issue_logs, and userdata_backups buckets.
    - backend/core/api/app/routes/sdk.py currently proxies SDK account export manifest/data to the settings endpoints.
    - frontend/packages/openmates-cli/src/cli.ts currently exposes raw settings export endpoints, not a real account-export writer.
    - frontend/packages/openmates-cli/src/sdk.ts and packages/openmates-python/openmates/sdk.py expose minimal export_manifest/export_data helpers.
  tests:
    - frontend/apps/web_app/tests/export-account-flow.spec.ts verifies a ZIP downloads and contains recently imported chats/files, but does not prove full server-authoritative history, S3 archives, domain coverage, filters, or failure behavior.
    - frontend/packages/openmates-cli/tests/cli.test.ts currently only covers command/help surfaces for settings export.
    - frontend/packages/openmates-cli/tests/client.test.ts covers raw settings export endpoint calls.
    - packages/openmates-python/tests/test_sdk.py covers account export facade calls but not real export archive generation.
    - No dedicated backend account export job test exists at discovery time.

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Settings
    - apple/OpenMates/Sources/Chat
    - apple/OpenMates/Sources/Projects
    - apple/OpenMates/Sources/Tasks
    - apple/OpenMates/Sources/Workflows
  parity_expectations:
    - Apple must not implement Account Export V1 until CLI, SDK, web, and user-confirmation gates are complete.
    - Apple should eventually expose the same personal export job contract or clearly defer account export with a native-safe explanation.
    - Apple must not continue claiming full personal export if native UI cannot satisfy the V1 export contract.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios after web/user confirmation or a documented Apple deferral.
  intentional_native_differences:
    - Apple may defer full local archive writing in V1 if the web/CLI implementation is complete and the native UI links users to CLI/web export without weakening data-portability access.

clarification:
  rounds:
    - question: Should the default export be fully decrypted and human-readable for all decryptable user-owned content while excluding/redacting reusable secrets and credentials?
      recommendation: Yes. Do not include reusable credentials or raw secrets, but include safe overview metadata for connected/API/webhook/security surfaces.
      answer: Yes. No API keys, connected-account credentials, private keys, token secrets, password hashes, or webhook secrets. Include an overview of connected accounts without exposing access-enabling secrets.
    - question: Should every domain support filters in V1, or only advanced filters for highest-value domains first?
      recommendation: Only support advanced filters for chats, tasks, projects, plans, workflows/runs, and usage in V1; simpler domains are all-or-nothing.
      answer: Only support advanced filters for chats, tasks, projects, plans, workflows/runs, and usage.
    - question: Should V1 use a server-managed export job, or a hybrid resumable model where the server owns authoritative manifest/chunk progress and clients decrypt/package sensitive content?
      recommendation: Use a hybrid resumable job model so large exports do not freeze the browser and old/cold data cannot be forgotten.
      answer: Use the recommended hybrid resumable job model and double-check scalability for large exports, unstable connections, and S3 archive retrieval.
    - question: Should V1 include full account import/restore for the new export format?
      recommendation: Export/readability first. Keep existing chat import working, but leave full account restore/import for a later spec.
      answer: Focus on export first; improve/update import later.
    - question: Should the archive optimize for human navigation or machine re-importability when those goals conflict?
      recommendation: Optimize V1 for human navigation and durable readability, while still using stable YAML/JSON schemas for future tools.
      answer: Yes; optimize for human navigation with stable structured files.
  vision_summary: >
    Account Export V1 should be a reliable, resumable personal data export that
    lets users choose domains and filters from CLI, SDKs, and web, then produces
    a readable archive that includes complete personal chats, embeds, projects,
    tasks, plans, workflows/runs, billing/invoices, usage, and selected account
    metadata without exposing credentials or secrets. The first implementation
    must fix the current false-success architecture by using an authoritative
    backend manifest, explicit hot/cold data retrieval, chunked progress, client
    decryption where required, domain-level verification, and clear partial/failure
    reporting. Import/restore and team export are separate follow-up surfaces.
  approved_by_user: true

