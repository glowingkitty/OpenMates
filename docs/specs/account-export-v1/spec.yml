assumptions:
  - id: A-1
    text: CLI exports can access the user's required client-side key material after authenticated setup, or can prompt for it safely without logging or persisting it insecurely.
    category: encryption
    required_before: implementation
    status: unchecked
    evidence: []
    blocker_or_waiver: If contradicted, CLI V1 must export encrypted client-side fields with explicit unreadable markers or require a separate key-unlock step before implementation continues.
  - id: A-2
    text: Existing S3 archive services for usage and tasks can retrieve archived records for the authenticated owner without exposing other users' data.
    category: privacy
    required_before: task_execution
    status: checking
    evidence:
      - source: backend/core/api/app/services/usage_archive_service.py
        summary: Usage archives are user-key encrypted gzip JSON and retrieve by user hash/month.
      - source: backend/core/api/app/services/user_task_archive_service.py
        summary: Task archives are owner-hash grouped, gzip compressed, user-key encrypted, and indexed in user_task_archives.
  - id: A-3
    text: Web can stream or incrementally assemble export archives safely enough for selected V1 sizes; otherwise the UI must guide users to CLI for very large exports.
    category: frontend
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/services/accountExportService.ts
        summary: Web uses the Account Export V1 job/chunk API, stores the active job ID in localStorage for retry/resume, assembles bounded archives with browser JSZip, and stops with a CLI handoff message if the built archive exceeds the browser size guard.
    blocker_or_waiver: If browser streaming is insufficient, web V1 must offer resumable domain/chunk downloads or CLI handoff instead of freezing.

contracts:
  api:
    - route: POST /v1/account-exports
      auth: session_or_api_key
      request: "{ domains: string[], filters?: ExportFilters, format: zip|directory, include_advanced_metadata?: boolean }"
      response: "{ export_id, status, selected_domains, filters, default_domains, expires_at }"
      notes:
        - Starts a personal export job only for the authenticated user.
        - Rejects team-scoped export requests; team export remains under the team export API.
        - Requires a data-portability/read scope for API-key callers.
    - route: GET /v1/account-exports/{export_id}
      auth: session_or_api_key
      response: "{ export_id, status, progress, domains, chunks, failures, partial_allowed, resume_cursor?, expires_at }"
      notes:
        - Status values include queued, running, waiting_for_client_decryption, ready, partial, failed, cancelled, expired.
        - Response includes enough cursor/chunk state for CLI/SDK/web resume.
    - route: GET /v1/account-exports/{export_id}/manifest
      auth: session_or_api_key
      response: "manifest.yml-compatible structured manifest with domain counts, filters, sources, redactions, and completion state"
    - route: GET /v1/account-exports/{export_id}/chunks/{chunk_id}
      auth: session_or_api_key
      response: "bounded export chunk containing encrypted or server-decrypted records according to domain contract"
      notes:
        - Chunks are bounded for memory and retry safety.
        - Client-side encrypted fields remain encrypted until client/CLI decrypts locally.
    - route: POST /v1/account-exports/{export_id}/client-results
      auth: session_or_api_key
      request: "{ chunk_id, status, decrypted_count?, failed_items?, output_refs? }"
      notes:
        - Lets clients report successful local decryption/packaging or item-level failures for resumable progress.
    - route: POST /v1/account-exports/{export_id}/accept-partial
      auth: session_or_api_key
      request: "{ acknowledged_failures: string[] }"
      notes:
        - Required before marking partial export accepted or updating last_export_at for a partial export.
    - route: POST /v1/account-exports/{export_id}/cancel
      auth: session_or_api_key
      response: "{ success: true, status: cancelled }"
  cli:
    - command: openmates account export --output <path> [--domain <domain>...] [--from <date>] [--to <date>] [--chat <id>] [--project <id>] [--task-status <status>] [--workflow <id>] [--include-advanced-metadata] [--resume <export_id>] [--accept-partial]
      notes:
        - Streams output to disk.
        - Must hit real dev API/WebSocket paths for green CLI evidence.
        - Prints clear complete/partial/failed summary.
  sdk:
    - npm: accountExports.start(options), accountExports.get(id), accountExports.manifest(id), accountExports.iterChunks(id), accountExports.download(options)
    - pip: client.account_exports.start(options), get(id), manifest(id), iter_chunks(id), download(options)
  archive_layout:
    root_files:
      - README.md
      - manifest.yml
      - export-report.yml
    default_domain_folders:
      - profile/
      - account-security/
      - chats/
      - embeds/
      - uploads/
      - memories/
      - settings/
      - tasks/
      - projects/
      - plans/
      - workflows/
      - billing/
      - usage/
      - compliance/
    advanced_optional_folders:
      - reminders/
      - connected-accounts/
      - developer/
      - support-and-issues/
      - notifications/
      - referrals/
      - newsletters/
    notes:
      - No separate user-facing checksums.sha256 file in V1.
      - Domain indexes explain references to shared embeds/uploads.
      - Each chat gets one .md and one .yml file; compression summaries live inside the chat files.
  data_domains:
    default_selected:
      - chats
      - embeds
      - referenced_uploads
      - projects
      - tasks
      - plans
      - workflows_runs
      - billing_invoices
      - usage
      - profile_account_settings
      - memories_app_settings
      - compliance_consent_history
    advanced_optional:
      - reminders
      - connected_account_overview
      - api_key_device_metadata
      - webhook_metadata
      - support_issue_reports
      - notifications_email_delivery_newsletter_referrals
      - storage_inventory_unreferenced_files
      - detailed_operational_records
    v1_advanced_filters:
      - chats
      - tasks
      - projects
      - plans
      - workflows_runs
      - usage
  privacy_security:
    - Personal export excludes rows with non-null team scope or team ownership hashes.
    - Reusable credentials and raw secrets are never exported.
    - Safe metadata may include provider names, account labels, scopes/capabilities, status, timestamps, API-key names/scopes/limits, and webhook names/event types without secrets.
    - Export logs and reports must redact private emails, object keys, share URL fragments, raw tokens, and key material.
    - Client-side encrypted content is decrypted only by clients that hold the relevant user key material.

