id: apple-durable-chat-persistence-parity
title: Apple Durable Chat Persistence Parity
status: implementing

goal: >
  Ensure every server-visible Apple-created chat has durable zero-knowledge
  encrypted message rows and coherent version state before it is considered
  cross-client loadable. Web, CLI, and Apple must never observe a chat shell with
  advanced `messages_v` and encrypted metadata but zero stored messages after an
  Apple foreground, background, share, or shortcut send.

scope:
  in:
    - Authenticated Apple foreground sends from ChatViewModel.
    - Authenticated Apple background notification replies, share-extension sends, macOS quick-capture sends, and Shortcut/AppIntent sends that use BackgroundChatSender or the same chat id contract.
    - Apple-generated chat and message identifiers used in server-visible authenticated chats.
    - Backend invariants and health/debug repair tooling for `messages_v` versus durable encrypted chat message rows.
    - Tests that prove queued/background Apple sends still include encrypted user-message storage and that bad persisted rows are detected safely.
  out:
    - Storing plaintext private message content on the server.
    - Replacing Apple streaming UI or the broader lifecycle parity work covered by docs/specs/apple-chat-streaming-parity/spec.yml.
    - Public CLI, npm SDK, or pip SDK API changes.
    - Bulk production data repair without explicit operator approval.
    - Touching unrelated Apple composer or UI refactors already present in the worktree.

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials, so issue discovery is unavailable through MCP in this session."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/apple-chat-streaming-parity/spec.yml
    - docs/specs/apple-chat-opening-parity/spec.yml
    - docs/specs/macos-menu-bar-quick-capture/spec.yml
    - docs/architecture/apple/sync-parity.md
    - docs/architecture/data/sync.md
  code_patterns:
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift contains foreground encrypted user-message persistence and assistant completion persistence.
    - apple/OpenMatesShared/BackgroundChatSender.swift builds background storage payloads and currently skips storage after `message_queued` events.
    - apple/OpenMates/Sources/App/MainAppView.swift and apple/OpenMates/Sources/Core/Intents/AskOpenMatesIntent.swift generate new authenticated chat ids with `UUID().uuidString`.
    - backend/apps/ai/tasks/stream_consumer.py updates `messages_v` for AI lifecycle/cache purposes before client-encrypted durable rows are guaranteed.
    - backend/scripts/debug_chat.py and backend/scripts/debug_health.py already expect `messages_v` to match durable message count for health/debug checks.
  tests:
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    - backend/tests/test_encrypted_chat_metadata_guard.py
    - backend/tests/test_chat_directus_encryption_guards.py
    - backend/tests/test_apple_chat_parity_audit.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMatesShared/BackgroundChatSender.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Core/Intents/AskOpenMatesIntent.swift
    - apple/OpenMatesShareExtension/ShareViewController.swift
    - apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
  parity_expectations:
    - Apple uses the same lowercase server-visible chat id shape as web for authenticated UUID chats.
    - Apple sends encrypted user-message storage for queued/background sends, including `message_queued`, instead of relying on later metadata-only events.
    - Foreground Apple retries or defers encrypted user-message storage when the AI stream races ahead of local pending-message registration.
    - No Apple change may weaken zero-knowledge storage or log plaintext messages, keys, tokens, or private identifiers.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/BackgroundChatSenderParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
  intentional_native_differences:
    - Apple uses Swift and App Group storage while web uses browser storage, but durable encrypted-message semantics must match.

clarification:
  rounds:
    - question: Should the work proceed through a focused spec and then implementation for the Apple-created chat persistence issue?
      answer: The user asked to create a spec and then implement it, then instructed to continue when next steps were clear.
  vision_summary: >
    Fix the Apple-created chat persistence gap end-to-end. A chat created or sent
    from Apple may stream locally, but it must not become a cross-client-visible
    metadata shell with `messages_v` advanced and no durable encrypted message
    rows. Apple entry points need the same encrypted storage contract as web, and
    backend tooling must detect and safely repair already-bad version/message
    state.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple foreground new chat is durable before cross-client load
    given:
      - Alice is authenticated in Apple with an unlocked chat key.
      - Alice starts a new chat from the foreground composer.
    when:
      - Alice sends a message and the AI lifecycle emits task, typing, chunk, and completion events.
    then:
      - Apple persists the encrypted user message even if the AI lifecycle races ahead of local pending-message registration.
      - Apple sends encrypted assistant completion through the existing zero-knowledge completion path.
      - Web and CLI load the chat with durable user and assistant message rows, not only metadata.

  - id: S-2
    title: Apple queued and background sends store encrypted user rows
    given:
      - Alice sends from a background notification reply, share extension, macOS quick capture, or other BackgroundChatSender entry point.
    when:
      - The backend responds with `message_queued` because another task is active.
    then:
      - Apple still sends the encrypted user-message storage package for the queued message.
      - The storage package includes chat id, message id, encrypted content, encrypted chat key, sender metadata, and version metadata.
      - Later cross-client sync can show and decrypt the queued user message.

  - id: S-3
    title: Apple generated authenticated chat ids match web UUID shape
    given:
      - Alice creates a server-visible authenticated chat from foreground Apple, background Apple, share extension, macOS share extension, or Shortcut.
    when:
      - Apple generates a new UUID chat id.
    then:
      - The id is lowercase before it is used in WebSocket, REST, local store, encrypted metadata, or deep-link state.
      - Existing anonymous/incognito prefixes keep their intentional non-UUID shapes.

  - id: S-4
    title: Backend detects incoherent durable message/version state
    given:
      - A chat exists in Directus with encrypted metadata and `messages_v > 0`.
    when:
      - The durable `chat_messages` count is lower than `messages_v`, especially zero.
    then:
      - Debug and health tooling report a deterministic mismatch.
      - Repair tooling can reset metadata version state to the durable row count only when explicitly requested.
      - Repair never invents plaintext or encrypted message content.

  - id: S-5
    title: AI processing cannot permanently publish unrecoverable zero-row shells
    given:
      - Backend AI lifecycle needs cache/version state for an active request.
    when:
      - Client encrypted user or assistant persistence has not produced durable Directus message rows yet.
    then:
      - Any Directus `messages_v` advancement remains consistent with durable encrypted rows or is recoverable by explicit repair.
      - Health/debug expectations continue to treat `messages_v` as the durable message count for persisted Directus chat history.

