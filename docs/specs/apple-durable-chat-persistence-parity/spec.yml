      - T-BACKEND-VERSION-REPAIR
  - id: AC-5
    scenario: S-5
    text: Backend AI/version logic does not leave new unrecoverable Directus chats with `messages_v > 0` and zero durable encrypted messages.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids:
      - T-BACKEND-VERSION-INVARIANT

assumptions:
  - id: A-1
    text: The durable Directus `messages_v` contract remains equal to durable encrypted message row count for persisted chat history.
    category: sync
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/scripts/debug_chat.py
        summary: Debug output reports `messages_v` mismatch when the value differs from actual Directus chat message count.
      - source: backend/scripts/debug_health.py
        summary: Health check reports single-chat `messages_v` mismatch when stored version differs from message count.
  - id: A-2
    text: Repair can safely align version metadata down to durable row count because it does not create or decrypt private content.
    category: privacy_security
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/architecture/data/sync.md
        summary: Durable private content remains zero-knowledge encrypted client data; server repair must only touch metadata counters.

contracts:
  api:
    - route: Existing Apple WebSocket send path
      request: "plaintext AI request plus client-encrypted storage metadata for durable zero-knowledge persistence"
      response: "AI lifecycle events including queued, typing, streaming, completion, and post-processing events"
      errors:
        - Storage package may retry; failures must be visible in diagnostics and not silently swallowed.
    - route: Existing debug_chat/debug_health scripts
      request: "chat id or health scope plus explicit repair flag when mutation is intended"
      response: "detected mismatch details and optional metadata-only repair result"
      errors:
        - Repair without an explicit flag is refused.
        - Repair never writes message content.
  data:
    - Directus `chats.messages_v` for durable chat history equals the count of durable encrypted rows in `chat_messages`.
    - Apple locally generated server-visible UUID chat ids are lowercase.
    - Apple storage retry state contains only encrypted content or local message references needed to produce encrypted content.
  privacy_security:
    - No plaintext private message content, raw chat keys, auth/session tokens, or private user identifiers may be logged or added to committed test fixtures.
    - Metadata-only repair cannot infer, create, or decrypt missing messages.

