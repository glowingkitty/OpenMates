implementation_plan:
  existing_patterns:
    - apple/OpenMatesShared/BackgroundChatSender.swift
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - backend/scripts/debug_chat.py
    - backend/scripts/debug_health.py
    - backend/tests/test_chat_directus_encryption_guards.py
  architecture: >
    Make Apple send paths durable first by ensuring storage is sent for queued
    background messages, foreground storage misses are retried instead of
    silently dropped, and authenticated UUID ids are lowercase at generation.
    Add backend metadata-only integrity helpers/tests so existing and future
    mismatches are detectable and repairable without inventing encrypted
    content.
  data_flow:
    - Apple creates or receives a chat id and normalizes authenticated UUID ids to lowercase.
    - Apple sends plaintext AI request for processing and sends client-encrypted user storage metadata for durable Directus persistence.
    - Backend streams AI lifecycle events but durable chat history remains based on encrypted rows in `chat_messages`.
    - Debug/health tools compare durable row count with Directus `messages_v` and optionally repair metadata only.
  affected_files:
    - path: docs/specs/apple-durable-chat-persistence-parity/spec.yml
      reason: Executable product and verification contract.
    - path: apple/OpenMatesShared/BackgroundChatSender.swift
      reason: Send storage after queued events and normalize new background chat ids.
    - path: apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
      reason: Encode queued storage and lowercase UUID parity.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Retry/defer foreground encrypted user storage when local pending message lookup races.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Normalize foreground new authenticated chat ids when touched after re-reading concurrent changes.
    - path: apple/OpenMates/Sources/Core/Intents/AskOpenMatesIntent.swift
      reason: Normalize Shortcut-created authenticated chat ids.
    - path: backend/tests/test_chat_version_integrity.py
      reason: Guard durable version/count mismatch detection and metadata-only repair.
    - path: backend/shared/python_utils/chat_version_integrity.py
      reason: Shared deterministic helper for mismatch detection and safe repair payloads.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-durable-chat-persistence-parity/spec.yml
    - python3 -m pytest backend/tests/test_chat_version_integrity.py
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/BackgroundChatSenderParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
  verification_order:
    - Backend pytest red/green for metadata integrity helper.
    - Apple unit test red/green through remote Mac when available.
    - Apple build after source changes.

