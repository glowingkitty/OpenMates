      - AC-2
      - AC-3
    assertions:
      - protected predicates cover credits, usage, pending transfers, active subscriptions, unreadable balance, and owned chats/messages
      - reachable stale accounts return email reminder eligibility
      - unreachable stale accounts require zero owned chats/messages for no-email deletion eligibility
    red_phase:
