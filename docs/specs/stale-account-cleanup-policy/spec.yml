schema_version: 2
id: stale-account-cleanup-policy
title: Stale Account Cleanup Policy
status: implementing

goal: >
  Replace signup-completion based stale-account cleanup with a verifiable value
  policy that protects accounts with credits, product usage, pending financial
  state, active subscriptions, unreadable credit balances, or owned chat data,
  while allowing truly unused unreachable accounts to be identified safely.

scope:
  in:
    - Backend stale-account protection predicate and dry-run reporting.
    - Cleanup task safeguards for credits, usage entries, pending bank transfers, active subscriptions, unreadable balances, and owned chats/messages.
    - Signup E2E coverage proving lifecycle contact email persistence for new signups.
    - Read-only production audit counts for protected, reachable stale, unreachable stale, and chat/message ownership buckets.
  out:
    - Immediate production deletion during this implementation session.
    - New Directus schema fields.
    - Apple UI changes.

context_discovery:
  github_issues:
    - not_checked: User requested immediate implementation in-session; no tracker issue was provided.
  docs:
    - docs/contributing/guides/spec-driven-development.md
  code_patterns:
    - backend/core/api/app/tasks/email_tasks/incomplete_signup_deletion_task.py
    - backend/scripts/process_incomplete_signup_deletions.py
    - backend/core/api/app/routes/auth_routes/auth_utils.py
    - backend/core/api/app/routes/auth_routes/auth_password.py
    - backend/core/api/app/routes/auth_routes/auth_passkey.py
    - backend/core/directus/schemas/account_contact_emails.yml
  tests:
    - backend/tests/test_security_regressions.py
    - frontend/apps/web_app/tests/signup-skip-2fa-flow.spec.ts
    - frontend/apps/web_app/tests/signup-flow-passkey.spec.ts

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This is backend cleanup and web signup test coverage; no Apple UI/runtime behavior changes.
  verification:
    - Not required for this policy slice.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: What should count as a protected account?
      answer: current_credit_balance > 0 OR has usage entries OR has pending/admin-review bank transfer OR has active/trialing subscription OR credit balance cannot be decrypted/read.
    - question: Should accounts with owned chats be deleted without notification?
      answer: No; first double-check stale accounts do not have owned chats connected to them and do not delete accounts with actual owned chats.
    - question: What should happen to accounts without lifecycle contact email?
      answer: If they are not in use and have no credits, usage entries, or owned chats, they can be candidates for deletion because no notification email can be sent.
  vision_summary: >
    Cleanup should protect accounts where OpenMates owes value or has evidence of
    real product use. Accounts with no readable lifecycle email may be eligible
    only when they also have no credits, no usage entries, no financial blockers,
    no active subscription, and no owned chats/messages.
  approved_by_user: true

implementation_state:
  subject_commit: beec181f42d90795e985079b817099f4877789f8

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-16T00:00:00Z"
    reason: User confirmed the policy and instructed implementation to continue.
  implementation_plan:
    status: approved
    approved_at: "2026-07-16T00:00:00Z"
    reason: User requested implementation of the listed tasks after reviewing the plan.

decisions:
  - id: D-1
    status: active
    decision: Treat unreadable current credit balance as protected.
    reason: A decryption/read failure must not lead to account deletion.
    decided_at: "2026-07-16T00:00:00Z"
  - id: D-2
    status: active
    decision: Treat owned chats/messages as a blocker for no-email immediate deletion eligibility.
    reason: The user explicitly wants to avoid deleting accounts with connected owned chats.
    decided_at: "2026-07-16T00:00:00Z"
  - id: D-3
    status: active
    decision: Report completed reachable stale accounts instead of sending the existing incomplete-signup email templates.
    reason: Completed stale accounts need stale-account-specific copy; reusing incomplete-signup reminders would mislead users.
    decided_at: "2026-07-16T13:36:25Z"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Run production read-only policy simulation before code changes.
    outcome: succeeded
    recorded_at: "2026-07-16T00:00:00Z"
    summary: Found 281 protected users and 1299 stale candidates under the proposed policy before chat/message cross-check.

handoff:
  current_task_id: TASK-1
  next_action: Deploy to dev before running the updated Playwright signup spec.
  command: python3 scripts/tests.py run --spec signup-skip-2fa-flow.spec.ts
  expected_outcome: The deployed dev signup flow verifies lifecycle contact email persistence and passes.
  blocker: null
  last_verified_commit: beec181f42d90795e985079b817099f4877789f8

scenarios:
  - id: S-1
    title: Protected accounts are never stale candidates
    given:
      - A regular user account exists.
    when:
      - The account has positive credits, usage entries, a pending/admin-review bank transfer, an active/trialing subscription, or an unreadable credit balance.
    then:
      - Cleanup reports the account as protected and does not queue reminders or deletion.
  - id: S-2
    title: Reachable stale accounts enter reminder pipeline
    given:
      - A regular account has zero credits, no usage entries, no pending financial blocker, no active subscription, and no owned chats/messages.
      - The account has a decryptable lifecycle contact email.
    when:
      - The cleanup workflow runs after the age threshold.
    then:
      - The account follows the existing 14d, 7d, 1d reminder stages before deletion.
  - id: S-3
    title: Unreachable zero-value accounts are reported separately
    given:
      - A regular account has zero credits, no usage entries, no financial blocker, no active subscription, and no owned chats/messages.
      - No lifecycle contact email can be read.
    when:
      - Dry-run reporting runs.
    then:
      - The account is counted as unreachable zero-value deletion eligible, not as an email-reminder recipient.
  - id: S-4
    title: New signup persists lifecycle contact email
    given:
      - A user completes a real password signup flow.
    when:
      - The signup reaches authenticated chat.
    then:
      - The backend has an account_contact_emails row for that user with purpose account_lifecycle, source signup, and a decryptable email matching the signup email.

acceptance_criteria:
