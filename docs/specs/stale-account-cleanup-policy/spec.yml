assumptions:
  - id: A-1
    text: Current credit balances are stored in directus_users.encrypted_credit_balance and decrypt with the user vault key.
    category: data
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/directus/schemas/users.yml
        summary: encrypted_credit_balance and vault_key_id fields exist.
      - source: production_read_only_simulation
        summary: 1580 active regular users had readable credit balances with zero decrypt errors.
  - id: A-2
    text: Usage entries are keyed by SHA256(user_id) in usage.user_id_hash.
    category: data
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/directus/schemas/usage.yml
        summary: usage.user_id_hash is the indexed hashed user identifier.
  - id: A-3
    text: Owned chats/messages are keyed by SHA256(user_id) in chats.hashed_user_id and messages.hashed_user_id.
    category: data
    required_before: task_execution
    status: confirmed
    evidence:
      - source: backend/core/directus/schemas/chats.yml
        summary: chats.hashed_user_id stores backend-hashed user ID.
      - source: backend/core/directus/schemas/messages.yml
        summary: messages.hashed_user_id stores the hashed sender user ID.

contracts:
  api: []
  data:
    - No new schema fields are added.
    - Stale-account checks use existing Directus collections directus_users, usage, pending_bank_transfers, chats, messages, and account_contact_emails.
    - Read failures for credit balance are safety-protected.
  ui_states: []
  privacy_security:
    - Cleanup must not decrypt chat or message content.
    - Cleanup may decrypt only current credit balance and lifecycle contact email needed for notices.
    - No-email deletion eligibility requires no owned chats/messages.

