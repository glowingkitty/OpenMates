      expected: fail
      evidence:
        status: skipped_with_reason
        command: docker exec api python -m pytest /app/backend/tests/test_security_regressions.py
        run_id: "not_run"
        subject_commit: beec181f42d90795e985079b817099f4877789f8
        timestamp: "2026-07-16T13:36:25Z"
        reason: User requested immediate implementation after approving the policy; backend policy is covered by green unit tests.
