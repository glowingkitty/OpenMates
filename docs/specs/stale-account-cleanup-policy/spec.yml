implementation_plan:
  spec_path: docs/specs/stale-account-cleanup-policy/spec.yml
  existing_patterns:
    - backend/core/api/app/tasks/email_tasks/incomplete_signup_deletion_task.py
    - backend/scripts/process_incomplete_signup_deletions.py
    - backend/tests/test_security_regressions.py
    - frontend/apps/web_app/tests/signup-skip-2fa-flow.spec.ts
  architecture: >
    Add small shared helpers inside the cleanup task module, consume them from the
    dry-run script and scheduled task, and add a test-only admin assertion path
    for lifecycle contact email verification in the existing signup spec.
  data_flow:
    - Cleanup loads stale candidates and computes hashed user ID.
    - Cleanup decrypts only the current credit balance; unreadable balance is protected.
    - Cleanup checks usage, pending transfers, active subscription, and owned chats/messages.
    - Cleanup emits reachable reminder counts and unreachable zero-value candidate counts.
  affected_files:
    - path: backend/core/api/app/tasks/email_tasks/incomplete_signup_deletion_task.py
      reason: Cleanup protection policy and classification.
    - path: backend/scripts/process_incomplete_signup_deletions.py
      reason: Dry-run report for protected and stale buckets.
    - path: backend/tests/test_security_regressions.py
      reason: Backend policy tests.
    - path: frontend/apps/web_app/tests/signup-skip-2fa-flow.spec.ts
      reason: Real signup lifecycle email assertion.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/stale-account-cleanup-policy/spec.yml
    - python3 -m pytest backend/tests/test_security_regressions.py
    - read-only prod audit for chat/message cross-check
    - deploy before Playwright green run
    - python3 scripts/tests.py run --spec signup-skip-2fa-flow.spec.ts
  verification_order:
    - Backend unit tests first.
    - Read-only production audit second.
    - Web Playwright after deploy.

