assumptions:
  - id: A-1
    text: Existing per-domain keys and mutation services can encrypt and persist title plus description/summary without introducing durable server plaintext.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/projects.py, user_tasks.py, user_plans.py, workflows.py and encrypted_chat_metadata_handler.py
        summary: Each domain already accepts encrypted or Automation Vault-owned metadata fields through an authenticated mutation boundary.
  - id: A-2
    text: Existing domain version fields can be normalized behind a UI adapter so the newest server-accepted save converges across devices.
    category: sync
    required_before: implementation
    status: confirmed
    evidence:
      - source: commit 89cfd38
        summary: Chat metadata_v and Project, Workflow, Task, and Plan server-authoritative versions are implemented without changing encryption ownership.
  - id: A-3
    text: Users can be classified as writable or read-only before the header renders editing affordances.
    category: permissions
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/tests/test_unified_detail_metadata.py and frontend/apps/web_app/tests/unified-detail-header.spec.ts
        summary: Owner-scoped APIs reject foreign writes, while example/shared/incognito chat headers render without edit affordances.
  - id: A-4
