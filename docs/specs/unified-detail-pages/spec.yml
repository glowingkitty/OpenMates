schema_version: 2
id: unified-detail-pages
title: Unified Editable Detail Pages
status: clarifying

goal: >
  Give chats, projects, tasks, and plans one coherent detail-page
  header based on the rendered ChatHeader visual system, while allowing users
  with write access to edit encrypted titles and descriptions inline and have
  the newest accepted metadata version synchronize across their devices. Create
  the missing Task and Plan detail pages and migrate Project details. Preserve
  Workflow metadata API/version/encryption contracts while workflows-v1 owns its
  Figma-specific visual composition. Verify web first, then implement native
  Apple parity from the approved non-Workflow generic detail result.

scope:
  in:
    - Extract one reusable web detail-header visual primitive from ChatHeader instead of copying its scoped CSS.
    - Preserve ChatHeader loading, media, navigation, incognito, example, and shared-chat behavior while adopting the shared visual primitive.
    - Use the shared generic detail header for owned/writable chats, projects, tasks, and plans.
    - Create stable, directly addressable web detail pages for projects, workflows, tasks, and plans, including redirects from shipped query-parameter links where needed.
    - Show the item icon/type, title, description or chat summary, and domain-relevant metadata in the shared header for Chat, Project, Task, and Plan.
    - Allow users with write access to click/tap a title or description, or activate its edit affordance with keyboard navigation, to edit inline.
    - Fade an edit icon in and out at the top-right of the hovered or keyboard-focused editable field.
    - Show keyboard instructions while editing, plus a checkmark button to save and an undo button to restore the persisted value after a modification.
    - Title editing saves with Enter; description/summary editing saves with Control-Enter or Command-Enter; Escape cancels either field; clicking outside saves only valid changed content.
    - Encrypt and persist metadata through the owning domain service, increment monotonic metadata versions, and converge devices on the newest server-accepted version.
    - Keep read-only shared content, examples, public previews, and users without write access display-only with no edit icon, hints, or mutation path.
    - Preserve Report Issue access on workspace landing and detail states for Projects, Tasks, and Plans; workflows-v1 owns exact Workflow action placement.
    - Implement equivalent native Apple detail headers and inline editing after web behavior and visual evidence are green.
  out:
    - A generic backend table or universal plaintext metadata endpoint.
    - Server-side decryption of chat, project, task, or plan title/description content.
    - Simultaneous collaborative text editing, merge UI, conflict dialogs, CRDTs, or field-level history browsing.
    - Editing example chats, public previews, read-only shares, or content without write permission.
    - Redesigning chat media headers, teaser video behavior, highlights, or previous/next chat navigation.
    - Completing every feature inside Projects, Tasks, or Plans beyond the detail-page shell and metadata required by this contract.
    - Duplicating ChatHeader CSS into domain-specific header components.
    - Owning Workflow header geometry, colors, action placement, tabs, node-card composition, or run-screen visuals; docs/specs/workflows-v1/spec.yml is authoritative for those Figma-specific requirements.
    - Treating the deployed generic Workflow header artifact as visual approval or as a gate that permits Apple Workflow UI work.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials on 2026-07-11. gh issue searches for unified detail headers and workflow Figma details returned no matching issue."
  docs:
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/plans-v1/spec.yml
    - docs/specs/projects-remote-sources/spec.yml
    - docs/specs/apple-workspace-reporting-parity/spec.yml
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/contributing/guides/spec-driven-development.md
    - .claude/rules/apple-ui.md
  code_patterns:
    - frontend/packages/ui/src/components/ChatHeader.svelte owns the rendered gradient, orb, typography, summary, time, responsive, and decorative-icon styles as component-scoped CSS.
    - frontend/apps/web_app/src/routes/workflows/+page.svelte already renders ChatHeader but adds duplicate retention, title, description, save, test, disable, run, and delete controls below it.
    - frontend/packages/ui/src/components/projects/ProjectsPage.svelte uses a separate project-header implementation and selects projects without a canonical detail route.
    - frontend/packages/ui/src/components/tasks/TasksPage.svelte renders task and plan creation/list surfaces but has no standalone Task or Plan detail component.
    - frontend/packages/ui/src/services/sendersChatManagement.ts and encrypted_chat_metadata provide an existing encrypted chat metadata/version synchronization path.
    - backend/core/api/app/routes/projects.py exposes owner-scoped encrypted project name/description updates.
    - backend/core/api/app/routes/user_tasks.py and user_plans.py expose encrypted update payloads with updated_at and version fields.
    - backend/core/api/app/routes/workflows.py exposes workflow title/description updates under the workflow Automation Vault boundary.
    - Figma node 5386:33360 informs Project detail; Workflow nodes 5420:34107, 5420:34558, 5420:35214, 5422:34561, and 5488:39515 are governed by docs/specs/workflows-v1/spec.yml.
    - The deployed generic Workflow detail used WorkspaceDetailHeader, a top-right Report Issue button, and a duplicate below-header action row; the user explicitly rejected that artifact as Workflow visual approval.
  tests:
    - frontend/apps/web_app/tests/chat-flow.spec.ts
    - frontend/apps/web_app/tests/workflows-editor.spec.ts
    - frontend/apps/web_app/tests/projects-flow.spec.ts
    - frontend/apps/web_app/tests/report-issue-flow.spec.ts
    - backend/tests/test_sync_api.py
    - backend/tests/test_user_tasks_api.py
    - backend/tests/test_user_plans_api.py
    - backend/tests/test_workflow_core_ui_contract.py

  apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/Views/ChatHeaderView.swift
    - apple/OpenMates/Sources/Features/Projects/ProjectDetailView.swift
    - apple/OpenMates/Sources/Features/Tasks/TaskDetailView.swift
    - apple/OpenMates/Sources/Features/Plans/PlanDetailView.swift
    - apple/OpenMates/Sources/Shared/Components/WorkspaceDetailHeader.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMatesTests/UnifiedDetailMetadataTests.swift
    - apple/OpenMatesUITests/UnifiedDetailPagesUITests.swift
  parity_expectations:
    - The approved rendered web generic header is the visual and interaction source of truth for native Chat, Project, Task, and Plan detail headers.
    - Native title/description editing uses the same permission, save, undo, validation, encryption, version, error, and synchronization contracts as web.
    - Apple uses generated design tokens, AppStrings, OpenMates controls, and a shared native detail-header primitive rather than stock Form/List product chrome.
    - Generic Apple detail implementation starts only after deployed web Playwright and artifact review are green; Apple Workflow visuals remain independently blocked by workflows-v1 until explicit approval of corrected deployed Workflow artifacts.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/UnifiedDetailMetadataTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/UnifiedDetailPagesUITests
    - Capture sanitized iPhone, iPad, and macOS screenshots for Chat, Project, Task, and Plan details; Workflow artifacts belong to workflows-v1.
  intentional_native_differences:
    - Apple exposes visible touch edit affordances without requiring hover; pointer hover on iPadOS/macOS follows web intent where supported.
    - Native keyboard shortcut labels use platform-appropriate Command or Control glyphs/text while preserving the same save and cancel semantics.

  clarification:
  rounds:
    - question: Should this milestone create the missing Task and Plan detail pages and migrate Project details, or only implement Workflow details?
      answer: Create the missing Task and Plan detail pages and migrate Project to the shared generic header. Preserve the canonical Workflow route and metadata API contracts, but workflows-v1 owns its Figma-specific visual composition.
    - question: Should the shared header remain display-only like ChatHeader?
      answer: No. Use this work to add click/tap and keyboard editing for title and description or chat summary, synchronized through the backend across devices.
    - question: How should inline save and cancel work?
      answer: Title uses Enter to save; description uses Control-Enter or Command-Enter; Escape exits; clicking outside saves valid changes; show key hints, a checkmark save button, and an undo button when modified.
    - question: Who can see and use editing affordances?
      answer: Only users with write access. Read-only shares, examples, public previews, and users without write permission stay display-only.
    - question: How should cross-device concurrent metadata updates behave?
      answer: Reuse monotonic versioning with the newest server-accepted metadata version winning; do not add a conflict dialog for the unlikely simultaneous-edit case.
    - question: Is Apple parity included?
      answer: Yes, after web implementation and web tests are complete.
    - question: Does the generic detail-page contract continue to own Workflow visual composition?
      answer: No. The user approved narrowing this spec to Workflow metadata API/version/encryption compatibility; workflows-v1 exclusively owns Workflow Figma detail, routed tabs, card expansion, action placement, run visuals, and its separate Apple approval gate.
  vision_summary: >
    Every primary OpenMates content type should open into a recognizable detail
    page whose header is the same product component, not five approximations.
    Writable metadata can be edited directly in that header with explicit
    keyboard and button affordances, while encryption and synchronization remain
    domain-owned. Workflow keeps the same record metadata API guarantees but uses
    its own Figma-specific visual composition under workflows-v1. Web establishes
    each applicable contract first; Apple follows only explicitly approved web
    artifacts.
  approved_by_user: true

