contracts:
  api:
    - surface: chat encrypted metadata synchronization
      request: "{ chat_id, encrypted_title?, encrypted_chat_summary?, versions: { metadata_v } }"
      behavior:
        - Owner/write authorization is checked server-side.
        - The server accepts only client ciphertext and advances a monotonic metadata version.
        - Existing title_v compatibility is migrated without losing shipped chat data.
    - route: PATCH /v1/projects/{project_id}
      request: "{ encrypted_name?, encrypted_description?, version? }"
      behavior:
        - Require owner/write permission and advance a server-authoritative version.
    - route: PATCH /v1/workflows/{workflow_id}
      request: "{ title?, description?, version? }"
      behavior:
        - Preserve Automation Vault encryption and owner authorization while advancing the workflow metadata version.
    - route: PATCH /v1/user-tasks/{task_id}
      request: "{ encrypted_title?, encrypted_description?, version? }"
      behavior:
        - Require write permission and client ciphertext; accepted update returns the new version.
    - route: PATCH /v1/user-plans/{plan_id}
      request: "{ encrypted_title?, encrypted_summary?, version? }"
      behavior:
        - Require write permission and client ciphertext; accepted update returns the new version.
  data:
    - Domain records keep their existing encryption model and ownership model.
    - Each detail item exposes a server-authoritative monotonic metadata version in list, detail, mutation, sync, CLI, and SDK responses where that domain is exposed.
    - Latest accepted version wins; ordering never depends on client updated_at values.
    - The UI adapter receives decrypted display values and capability flags but never centralizes plaintext persistence.
    - Workflow retains its Automation Vault metadata mutation/version response contract for web, CLI, SDK, and Apple consumers even though workflows-v1 owns its visual composition.
  ui_states:
    - Display-only header.
    - Writable hover/focus state with fading edit icon at the field's top-right.
    - Editing unchanged state with key hints and cancel behavior.
    - Editing dirty state with checkmark and undo controls.
    - Saving state with duplicate submission blocked.
    - Save error state with draft, retry, and undo preserved.
    - Remote-version-applied state after cross-device synchronization.
    - Loading/not-found/forbidden detail state with no stale metadata flash.
    - Workflow is not a generic-header UI state in this contract; its Figma-specific header, actions, tabs, cards, and run view are defined only by workflows-v1.
  privacy_security:
    - The shared component never sends plaintext directly; it calls the domain adapter that owns encryption and mutation.
    - Server authorization is mandatory even when the client hides editing controls.
    - Logs and traces may include domain type, operation, version, duration, and redacted identifier prefix, never title, description, summary, keys, ciphertext, or private route fragments.
    - Public/read-only/example surfaces cannot enter edit mode through keyboard, DOM manipulation, or forged API calls.
    - Offline/error handling must not silently discard a user's draft or report a save that was not accepted.
  routing:
    - /projects/{project_id}
    - /workflows/{workflow_id}
    - /tasks/{task_id}
    - /plans/{plan_id}
    - /workflows/{workflow_id}/runs is owned by workflows-v1; this spec preserves only canonical Workflow record-route and metadata API compatibility.
    - Shipped workflow/project query links redirect to canonical detail URLs while concrete external consumers remain supported.

