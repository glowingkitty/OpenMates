    category: apple
    required_before: task_execution
    status: confirmed
    evidence:
      - source: docs/specs/workflows-v1/spec.yml
        summary: The workflow milestone recorded successful remote iOS model and UI test execution before this contract revision.

scenarios:
  - id: S-1
    title: Writable chat metadata is edited inline and synchronizes
    given:
      - Alice owns a chat and has its decrypted title and summary.
      - The shared detail header is visible on desktop.
    when:
      - Alice hovers or focuses the title and activates the edit icon.
      - Alice changes the title and presses Enter or the checkmark.
      - Alice edits the summary and presses Command-Enter or the checkmark.
    then:
      - The header showed the relevant save and exit key hints while editing.
      - The changed field showed checkmark and undo controls.
      - The client encrypted the changed metadata with the chat key before sending it.
      - The accepted metadata version appeared on Alice's second device without reload.

  - id: S-2
    title: User cancels or restores an inline edit
    given:
      - Alice has write access to a Project detail page.
      - Alice changed the project description but has not saved it.
    when:
      - Alice presses Escape or activates undo.
    then:
      - The persisted description is restored immediately.
      - No metadata mutation is sent.
      - Focus returns to the edited field or its edit affordance accessibly.

  - id: S-3
    title: Read-only content exposes no mutation affordance
    given:
      - Bob opens an example chat, public preview, or shared item without write access.
    when:
      - Bob hovers, taps, tabs through, or attempts the metadata mutation API.
    then:
      - No edit icon, edit hint, checkmark, or undo control appears.
      - The field cannot enter edit mode.
      - The backend rejects any forged mutation request without changing metadata.

  - id: S-4
    title: Each workspace opens a stable detail page with explicit visual ownership
    given:
      - Alice owns one Project, Workflow, Task, and Plan.
    when:
      - Alice opens each item from its workspace list and reloads or deep-links to it.
    then:
      - Each item opens at a stable detail URL and survives reload.
      - Chat, Project, Task, and Plan use the same generic header CSS primitive as ChatHeader.
      - Workflow uses the Figma-specific composition owned by workflows-v1 rather than this generic visual primitive.
      - Each domain preserves its owner-scoped metadata API, encryption boundary, and useful record metadata without duplicate persistence forms.
      - Back navigation returns to the correct workspace state.

  - id: S-5
    title: Latest accepted metadata version wins across devices
    given:
      - Alice has the same writable Task open on two devices.
      - Device A and Device B started from metadata version 4.
    when:
      - Device A saves a title and the server accepts version 5.
      - Device B later explicitly saves a different title and the server accepts the next version.
    then:
      - The server serializes accepted saves into monotonically increasing versions.
      - Version 6 becomes current on both devices.
      - Clients never choose a winner from untrusted local clock timestamps.
      - The UI does not show a conflict dialog.

  - id: S-6
    title: Save failure remains visible and recoverable
    given:
      - Alice edits a Plan description while the network is unavailable or the server rejects the update.
    when:
      - Alice activates save.
    then:
      - The field remains in edit mode with Alice's draft intact.
      - A visible localized error and retry action appear.
      - The UI does not claim that synchronization succeeded.
      - Undo still restores the last persisted value.

  - id: S-7
    title: Apple follows the approved applicable web detail contract
    given:
      - Web detail pages, metadata sync tests, and artifact review are green.
      - Alice opens Chat, Project, Task, and Plan details on Apple platforms.
    when:
      - Alice edits and saves writable metadata or views read-only content.
    then:
      - Native Chat, Project, Task, and Plan headers match the approved generic web hierarchy, gradient, icon, typography, spacing, metadata, and responsive intent.
      - Native editing follows equivalent save, undo, permission, encryption, version, error, and synchronization behavior.
      - iPhone, iPad, and macOS evidence is captured after web approval.
      - Workflow native visual evidence is neither implemented nor approved through this scenario and remains gated by workflows-v1.

  - id: S-8
    title: Reporting remains available from landing and details
    given:
      - Alice is in Projects, Tasks, or Plans.
    when:
      - Alice views the workspace landing or an item detail page.
    then:
      - Report Issue remains reachable in both states through the generic detail contract.
      - Opening the form includes safe workspace and item context without plaintext private metadata in logs.

