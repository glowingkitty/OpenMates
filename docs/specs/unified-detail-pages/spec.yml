decisions:
  - id: D-1
    status: active
    decision: Extract one WorkspaceDetailHeader visual primitive from ChatHeader and compose domain-specific content around it.
    reason: Svelte component-scoped CSS cannot be safely shared by copying selectors; one primitive prevents visual drift and keeps ChatHeader the source of truth.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-2
    status: active
    decision: Keep persistence, authorization, encryption, and version synchronization in domain adapters.
    reason: Chats, projects, tasks, and plans are client-encrypted while workflows use Automation Vault; a generic persistence layer would weaken existing boundaries.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-3
    status: active
    decision: Use monotonically increasing server-accepted versions with newest accepted save winning.
    reason: This matches the requested existing synchronization model without adding an unrealistic concurrent-edit conflict workflow.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-4
    status: active
    decision: Verify and approve web before native Apple implementation.
    reason: The browser-rendered shared component is the source of truth for Apple parity.
    decided_at: "2026-07-11T00:00:00Z"

