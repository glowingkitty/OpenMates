implementation_plan:
  spec_path: docs/specs/unified-detail-pages/spec.yml
  existing_patterns:
    - frontend/packages/ui/src/components/ChatHeader.svelte for the canonical rendered header.
    - frontend/packages/ui/src/services/sendersChatManagement.ts and chat sync services for encrypted chat metadata synchronization.
    - backend/core/api/app/routes/projects.py, workflows.py, user_tasks.py, and user_plans.py for domain mutations.
    - frontend/packages/ui/src/components/settings/elements for accessible compact action controls where applicable.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatHeaderView.swift and generated Swift tokens for native parity.
    - docs/specs/workflows-v1/spec.yml is the sole visual owner for Workflow detail/runs while this spec retains Workflow metadata API compatibility.
  architecture: >
    Extract a presentation-only WorkspaceDetailHeader from ChatHeader. It renders
    the canonical background, orbs, decorative icon, title, description, metadata,
    responsive geometry, and editable field states. ChatHeader composes its
    existing chat-only states through this primitive. Project, Task, and Plan
    detail containers provide a common view model plus domain mutation adapters.
    Workflow does not consume this generic visual primitive, but its existing
    domain adapter still checks write capability, encrypts through Automation
    Vault, submits the current server metadata version, receives the next version,
    updates local storage, and publishes the normal sync event. Canonical nested
    routes own detail loading and preserve
    redirects from shipped links. Web tests and artifact review gate equivalent
    SwiftUI composition and native adapter work for Chat, Project, Task, and Plan;
    workflows-v1 independently gates Workflow visuals.
  data_flow:
    - Detail route loads owner-scoped encrypted metadata and capability, then decrypts through the existing domain service.
    - Shared header receives display values, write capability, version, validation constraints, and required save/cancel callbacks.
    - User enters edit mode; the component stores an ephemeral local draft and never mutates persisted state before save.
    - Domain adapter validates, encrypts, submits the accepted current version, and receives a new server version.
    - Local store/IndexedDB/native persistence records ciphertext and version; existing sync propagates the new version to other devices.
    - Later accepted saves receive higher server versions and become current without using client clock ordering.
    - Web green and visual approval unlock native Apple implementation and evidence.
  affected_files:
    - path: frontend/packages/ui/src/components/workspace/WorkspaceDetailHeader.svelte
      reason: Shared canonical header and inline edit state.
    - path: frontend/packages/ui/src/components/ChatHeader.svelte
      reason: Compose existing chat behavior through the shared primitive.
    - path: frontend/packages/ui/src/components/workspace/detailMetadataAdapters.ts
      reason: Typed presentation-to-domain adapter contract without centralizing encryption.
    - path: frontend/packages/ui/src/components/projects/ProjectDetailPage.svelte
      reason: Canonical Project detail composition.
    - path: frontend/packages/ui/src/components/tasks/TaskDetailPage.svelte
      reason: Missing Task detail page.
    - path: frontend/packages/ui/src/components/plans/PlanDetailPage.svelte
      reason: Missing Plan detail page.
    - path: frontend/apps/web_app/src/routes/projects/[project_id]/+page.svelte
      reason: Stable Project detail route.
    - path: frontend/apps/web_app/src/routes/workflows/[workflow_id]/+page.svelte
      reason: Stable Workflow record route only; visual composition is owned by workflows-v1.
    - path: frontend/apps/web_app/src/routes/tasks/[task_id]/+page.svelte
      reason: Stable Task detail route.
    - path: frontend/apps/web_app/src/routes/plans/[plan_id]/+page.svelte
      reason: Stable Plan detail route.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/encrypted_chat_metadata_handler.py
      reason: Unified chat title/summary metadata version acceptance.
    - path: backend/core/api/app/routes/projects.py
      reason: Project metadata version response contract.
    - path: backend/core/api/app/routes/workflows.py
      reason: Workflow metadata version response contract.
    - path: backend/core/api/app/routes/user_tasks.py
      reason: Task metadata version response contract.
    - path: backend/core/api/app/routes/user_plans.py
      reason: Plan metadata version response contract.
    - path: frontend/packages/ui/src/i18n/sources/common.yml
      reason: Shared edit, keyboard hint, save, undo, retry, and error strings.
    - path: apple/OpenMates/Sources/Shared/Components/WorkspaceDetailHeader.swift
      reason: Native parity primitive after web approval.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/unified-detail-pages/spec.yml
    - python3 scripts/spec_verify.py docs/specs/unified-detail-pages/spec.yml --phase red
    - python3 -m pytest backend/tests/test_unified_detail_metadata.py
    - python3 scripts/audit_sdk_cli_parity.py
    - Deploy to dev and wait for Vercel Ready.
    - python3 scripts/tests.py run --spec unified-detail-header.spec.ts
    - python3 scripts/tests.py run --spec unified-detail-pages.spec.ts
    - python3 scripts/tests.py run --spec unified-detail-metadata-sync.spec.ts
    - Complete V-WEB-DETAIL-ARTIFACTS.
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/UnifiedDetailMetadataTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/UnifiedDetailPagesUITests
    - Complete V-APPLE-DETAIL-ARTIFACTS.
    - python3 scripts/spec_verify.py docs/specs/unified-detail-pages/spec.yml
  verification_order:
    - Backend metadata/version/encryption contracts.
    - CLI, npm SDK, and pip SDK parity audit for affected public metadata methods.
    - Deployed web inline-edit, route, reporting, and multi-device sync contracts.
    - Web desktop/mobile artifact approval.
    - Apple unit and UI tests, then iPhone/iPad/macOS artifacts.
  rollout:
    - Keep existing ChatHeader behavior while the shared primitive is introduced behind deterministic parity tests.
    - Land web domain pages in independently testable slices but do not mark the generic visual contract green until Chat, Project, Task, and Plan use the primitive; Workflow is excluded.
    - Start generic Apple detail changes only after applicable web artifact review passes; never use this gate to start Apple Workflow visual work.
  observability:
    - Log domain, operation, sanitized id prefix, incoming/accepted version, duration, and error code only.
    - Never log title, description, summary, ciphertext, keys, or decrypted drafts.
  required_assumptions: [A-1, A-2, A-3, A-4]
  open_questions:
    - none
  risks:
    - Extracting ChatHeader styles can regress chat media/loading/navigation states unless existing chat E2E contracts run unchanged.
    - Silent latest-version-wins can overwrite a nearly simultaneous remote edit; this is an explicitly accepted product tradeoff.
    - A generic UI adapter could accidentally centralize plaintext or encryption logic; domain adapters must remain responsible.
    - Creating stable detail routes can break shipped query links without explicit redirects and route tests.
    - Apple parity can drift if implementation starts before the web visual contract is approved.

