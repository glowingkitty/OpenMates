    covers: [AC-4, AC-6, AC-7]
    assertions:
      - each domain rejects unauthenticated and read-only metadata writes
      - chat/project/task/plan routes persist ciphertext only
      - workflow metadata preserves Automation Vault encryption
      - accepted updates return monotonic versions and later accepted saves become current
      - client timestamps cannot make an older accepted version overwrite a newer server version
