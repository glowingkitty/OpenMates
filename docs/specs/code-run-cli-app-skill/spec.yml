implementation_plan:
  existing_patterns:
    - "`openmates apps <app> <skill>` is the canonical CLI app-skill execution path."
    - "`OpenMatesClient.runSkill()` posts standard app-skill payloads to `/v1/apps/{app}/skills/{skill}`."
    - Audio transcription uses a custom app-skill POST route at the canonical skill URL when generic dispatch needs extra server context.
    - Existing web Code Run uses `/v1/code/run` with E2B execution, billing, active-run limits, internet default, dependency validation, status, cancel, and stream endpoints.
    - Code Run output sidecars are encrypted/persisted only when there is a chat-bound embed key.
  architecture: >
    Add Code Run direct execution as a canonical app-skill endpoint rather than a
    new CLI subsystem. The CLI materializes inline/local/repository/raw code into
    bounded file payloads and sends them to `/v1/apps/code/skills/run`. The API
    validates those payloads and calls shared Code Run start logic that enqueues
    E2B execution without any OpenMates-host code execution. Chat-bound runs reuse
    the existing embed access path and can persist encrypted output sidecars;
    direct runs return output only and leave no durable chat/embed records.
  data_flow:
    - User invokes `openmates apps code run` with inline code, local files, repo/blob/raw URL inputs, or chat/embed target flags.
    - CLI validates flags, normalizes paths, downloads repository/raw files client-side if requested, enforces limits, and builds a standard app-skill `requests` payload.
    - CLI calls `OpenMatesClient.runSkill()` against `/v1/apps/code/skills/run`.
    - Backend authenticates, checks credits and rate limits, validates paths/base64/manifests/secrets/limits, and creates transient execution state.
    - Worker writes payload files into E2B and executes the target path inside E2B only.
    - Direct-run status/output is returned to CLI and not persisted as chat data.
    - Chat-bound status/output can be encrypted into `code_run_outputs` and synchronized to clients.
  affected_files:
    - path: backend/apps/code/app.yml
      reason: Update `code.run` schema/help metadata for direct and chat-bound app-skill usage.
    - path: backend/apps/code/skills/run_code_skill.py
      reason: Replace catalog-only stub with a thin shared-service adapter or keep metadata-only if the custom route owns execution.
    - path: backend/core/api/app/routes/apps_api.py
      reason: Register custom `POST /v1/apps/code/skills/run` if generic dispatch cannot inject required Code Run services safely.
    - path: backend/core/api/app/routes/code_execution.py
      reason: Extract shared Code Run start/validation service used by both web route and app-skill route.
    - path: backend/apps/code/tasks/run_code_task.py
      reason: Ensure direct-run metadata/output can return to CLI without requiring chat/embed persistence.
    - path: backend/shared/providers/e2b_code_runner.py
      reason: Preserve E2B-only execution and existing internet control behavior.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add `apps code run` ergonomic flags and help examples while retaining generic app-skill command routing.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add SDK helpers only if needed for direct Code Run payload construction/result polling; keep `runSkill()` as transport.
    - path: frontend/packages/openmates-cli/src/codeRunInput.ts
      reason: New focused helper for CLI-side local/repo/raw URL materialization, path normalization, and payload validation.
    - path: frontend/packages/openmates-cli/tests/codeRunInput.test.ts
      reason: Unit coverage for direct-run input materialization/security limits.
    - path: backend/tests/test_code_run_app_skill.py
      reason: Backend route/security/regression coverage.
    - path: docs/architecture/apps/cli-package.md
      reason: Document `apps code run` after implementation.
    - path: docs/architecture/apps/cli-feature-parity.md
      reason: Update Code Run parity matrix after implementation.
    - path: docs/architecture/messaging/embeds.md
