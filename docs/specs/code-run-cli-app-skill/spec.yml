risks:
  - Direct-run output could be accidentally persisted if implementation reuses chat-bound sidecar code without an explicit mode check.
  - Backend URL/repo fetching would create SSRF and internal-network risk; v1 forbids it.
  - Local directory mode could upload more than the user intended; require explicit include/exclude defaults and dry-run-style file listing before upload for large selections.
  - Dependency manifests can trigger package-manager behavior; keep existing manifest restrictions and `--ignore-scripts` behavior.
  - CLI test accounts may lack credits for live direct-run verification; contract tests should mock backend/E2B where possible and reserve live dev checks for a paid/credited account.
