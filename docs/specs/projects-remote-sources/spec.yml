apple_impact:
  affected_files:
    - apple/OpenMates/Sources/**/Chat*
    - apple/OpenMates/Sources/**/Embeds*
    - apple/OpenMates/Sources/**/Projects*
  parity_expectations:
    - Apple chat should eventually render project, folder, and file mentions consistently with web chat once the API and encrypted payload contracts exist.
    - Apple embed surfaces should eventually render remote file/folder virtual previews consistently with existing embed preview/fullscreen behavior.
    - Initial V1 implementation may be web plus CLI first, but contracts must remain platform-neutral and avoid web-only assumptions.
  verification:
    - Apple affected for chat mention and preview rendering parity. On Linux, use `python3 scripts/apple_remote.py status` and then `build-ios` or `test-ios` after implementation unless Apple work is explicitly deferred.
  intentional_native_differences:
    - Native app may not host the CLI bridge itself in V1; it can consume synced encrypted Project metadata and remote-preview records once available.

clarification:
  rounds:
    - question: Should V1 upload individual files, folders, both, or only attach sources without uploads?
      answer: V1 Upload to OpenMates should support individual files and multi-select files. Folder upload and sync can be designed for later, but should not be implemented in V1.
    - question: Where should remote preview metadata and snippets be cached by default?
      answer: Keep preview files and metadata on the remote machine by default for scalability. Use `~/.openmates/remote-cache/<source-id>/`; repo-local `.openmates/preview-cache/` is opt-in only.
    - question: How much project context should be sent to the assistant for project or folder mentions?
      answer: "Use a tiered model: project/folder maps with file and folder counts, line counts, depth-limited tree, git/recency signals, ranked symbols/signatures, omitted summaries, and strict caps. Do not send full contents unless specific file reads or bounded snippets are approved."
    - question: How long should mention-based access last?
      answer: A specific file mention grants access for the current message. A project or folder mention grants structure/map access for the current chat. Broader reads/search are allowed by project mention unless privacy settings say Always ask.
    - question: Should V1 include assistant write/patch/command execution?
      answer: No. V1 should be read/preview/import-only. Writes, patches, commands, and remote mutations are later-phase but the architecture should reserve a permission model for them.
    - question: For existing remote files, should the assistant still generate diffs even if V1 cannot write to the remote source?
      answer: Yes. Existing remote files should be edited as unified diff proposals rendered through embed-like preview/fullscreen UI. A remote diff proposal is a message-local virtual artifact stored inside the encrypted assistant message, not a real embed or separate Project row unless the user explicitly saves/uploads it. It must not mutate the remote filesystem in V1.
    - question: Where should remote Project write and action settings live?
      answer: Global defaults belong under Settings > Privacy & Security > Assistant actions. Project-specific permissions belong under Settings > Projects > project name, with a gear icon on Project pages as quick access. Code-specific automated checks belong under Settings > Apps > Code, with Project-level overrides in the Project settings page.
    - question: Which write permission modes should V1 expose for Projects?
      answer: Keep the mental model simple with only Always ask before writes and Auto approve safe writes. Do not implement Auto decide in V1; reserve it for later after deterministic policies, audit logs, undo, and user feedback are solid.
    - question: How should mentions express read versus write intent?
      answer: Show a visible Read / Read & Write switch on Project, folder, and file mention/access chips. If Project mode is Auto approve safe writes, mentions default to Read & Write except protected files. If Project mode is Always ask before writes, mentions default to Read. The switch should be keyboard accessible, including Tab navigation.
    - question: Should OpenMates prompt for automated code checks after assistant code changes?
      answer: Yes. On first assistant code creation or update in a Project, ask whether to enable automated checks. Choices are Not now, isolated E2B sandbox with no remote-machine performance impact but code disclosure to the sandbox, or remote-machine checks with better privacy but local CPU/disk impact. This setting is separate from write permission.
  vision_summary: >
    Projects should become the privacy-preserving workspace boundary for code and
    document context. Attaching a folder or repository should not upload it by
    default; OpenMates stores encrypted Project/source metadata, while the local
    or remote CLI bridge performs search, map, and read operations after user
    consent. The UI should feel like existing embeds for previews and fullscreen
    reading, but remote files remain virtual until the user explicitly uploads
    selected files to OpenMates. Mentioning a Project is a meaningful consent
    signal for that chat unless the user chooses Always ask. Future write support
    should keep a simple two-mode Project policy: Always ask before writes or Auto
    approve safe writes. High-risk files still require explicit approval by
    default, and automated code checks are a separate Code app / Project setting
    rather than an implicit part of read or write access.
  approved_by_user: true

v1_product_model:
  project_source:
    description: >
      A Project can have zero or more attached sources. A source points to a local
      or remote folder/repository reachable by a user-controlled CLI bridge. The
      server stores only encrypted display metadata and opaque source IDs; it does
      not store file paths or raw trees in plaintext.
    source_types:
      - local_folder
      - local_git_repository
      - remote_folder
      - remote_git_repository
    source_state:
      - connected
      - offline
      - permission_required
      - revoked
  virtual_remote_preview:
    description: >
      A virtual preview is embed-compatible UI data for a file or folder that has
      not been uploaded as an OpenMates embed. It can render through existing
      UnifiedEmbed preview/fullscreen primitives with a remote-source badge and
      source status. It includes bounded metadata and snippets only.
    metadata:
      - source_id
      - remote_item_id
      - encrypted_display_path
      - encrypted_display_name
      - kind
      - language
      - size_bytes
      - line_count
      - mtime
      - content_hash
      - git_status
      - preview_policy
      - safety_flags
  project_map:
    description: >
      The bounded assistant-visible structure for a Project or folder mention.
      It is computed by the CLI bridge from allowed sources and sent as explicit
      client-decrypted context for the current turn or chat according to the
      permission mode.
    includes:
      - file_count
      - folder_count
      - total_line_count_estimate
      - depth_limited_tree
      - git_branch_and_status_summary
      - recent_files
      - dirty_files
      - ranked_symbols_and_signatures
      - omitted_paths_summary
      - search_capabilities
    excludes:
      - raw recursive tree without caps
      - full file contents by default
      - ignored files unless explicitly included by user approval
      - secrets, env files, and binary blobs unless explicitly uploaded or approved
  privacy_modes:
    always_ask:
      behavior: >
        Project/folder/file mention creates a pending permission request before
        the assistant receives project maps, search results, or file previews.
    ask_for_broad_access:
      behavior: >
        Specific file mentions can be read for the current message. Project or
        folder mentions grant map access for the current chat, but broad searches
        or multiple file reads can prompt when risk thresholds are exceeded.
    allow_for_mentions:
      behavior: >
        Mentioning a Project/folder/file is enough consent for bounded maps,
        searches, and reads within that Project for the current chat, subject to
        hard caps and secret filters.
  settings_surfaces:
    global_assistant_actions:
      path: Settings > Privacy & Security > Assistant actions
      behavior: >
        Stores global defaults for assistant autonomy across OpenMates, including
        default Project write mode for new Projects and global protected path
        patterns. This is not Code-app-specific because the same model will later
        apply to other high-risk assistant actions.
    project_settings:
      path: Settings > Projects > <project name>
      behavior: >
        Stores Project-specific remote source permissions, read/write mode,
        protected path patterns, connected source settings, automated check
        overrides, audit history, revocation controls, and source status. Project
        pages expose a gear icon that deep-links here instead of duplicating a
        separate settings UI inside the Project page.
    code_app_checks:
      path: Settings > Apps > Code > Automated checks
      behavior: >
        Stores global Code app defaults for lint/test/check behavior after
        assistant-created or assistant-updated code. Project settings can override
        these defaults per Project/source.
  write_permission_modes:
    always_ask:
      label: Always ask before writes
      default_for_new_projects: true
      behavior: >
        Project, folder, and file mentions default to Read. User can toggle a
        visible Read / Read & Write switch to grant write permission for the
        requested scope and duration. Applying remote diffs remains a later-phase
        action and must show an approval card before any write.
    auto_approve_safe_writes:
      label: Auto approve safe writes
      behavior: >
        Project, folder, and file mentions default to Read & Write except
        protected files. Deterministic checks, source-root bounds, base-hash
        checks, patch size limits, and high-risk file rules still apply. This mode
        does not grant shell command execution, package install, test execution,
        git mutation, or high-risk file writes by itself.
    auto_decide:
      status: reserved_later
      behavior: >
        Not implemented in V1. A future version may add Auto decide only after
        deterministic rules, audit receipts, undo/rollback, and user feedback are
        mature. LLM risk scoring must not be the sole authority for remote writes.
  high_risk_files:
    built_in_always_ask:
      - .env
      - .env.*
      - "*.pem"
      - "*.key"
      - id_rsa
      - id_ed25519
      - .npmrc
      - .pypirc
      - .netrc
      - .ssh/**
      - .gitignore
      - .gitattributes
      - .gitmodules
      - .github/workflows/**
      - Caddyfile
      - nginx.conf
      - Dockerfile
      - docker-compose*.yml
      - k8s/**
      - helm/**
      - terraform/**
      - "*.tf"
      - package.json
      - package-lock.json
      - pnpm-lock.yaml
      - yarn.lock
      - bun.lockb
      - pnpm-workspace.yaml
      - pyproject.toml
      - Cargo.toml
      - go.mod
      - migrations/**
      - schema.sql
      - backend/core/directus/schemas/**
      - paths containing auth, encryption, billing, privacy, permission, compliance, or security
      - files matched by .gitignore
      - binary files
      - symlink targets
      - deletes, renames, executable-bit changes, chmod changes, and binary edits
    behavior: >
      Built-in high-risk files require explicit user approval before write by
      default, even when the Project uses Auto approve safe writes. The default
      list must stay intentionally narrow and focused on secrets, deployment,
      dependency execution, auth/security/privacy/compliance, schema/migration,
      CI, and filesystem-boundary risk so the warning remains meaningful.
    user_defined:
      behavior: >
        Users can add global or Project-specific protected path patterns. These
        patterns only add restrictions. They can require permission for folders,
        file types, or individual paths that matter to the user.
  repo_policy_config:
    path: .openmates/permissions.yml
    behavior: >
      Optional repo-local config may declare protected paths, safe editable paths,
      project warnings, and suggested check commands. It may add restrictions and
      suggestions but must not silently enable auto-approve, disable global or
      Project high-risk rules, grant command execution, or weaken user settings.
      Importing broader permissions from repo config requires explicit user
      approval.
  remote_diff_virtual_artifact:
    description: >
      A non-mutating diff artifact for an existing remote file. It is serialized
      inside the encrypted assistant message and rendered like an embed
      preview/fullscreen diff, but it does not create a normal OpenMates embed,
      Project database row, or write to the remote filesystem. If the user later
      uploads the file to OpenMates, future edits use normal embed diff history
      for that uploaded embed.
    fields:
      - project_ref
      - source_ref
      - remote_item_ref
      - display_path label
      - unified_diff
      - base_hash, mtime, and line_count metadata
      - local UI status such as proposed, stale, applied, rejected, or failed
  automated_code_checks:
    first_use_prompt:
      trigger: First assistant-created or assistant-updated code in a Project.
      choices:
        - Not now
        - Use isolated cloud sandbox
        - Use my remote machine
      behavior: >
        The prompt explains that isolated E2B checks avoid remote-machine
        performance impact but send relevant code/config to an OpenMates-managed
        sandbox, while remote-machine checks keep code on the user's machine but
        consume local CPU/disk. The chosen default is stored in Code app settings
        with a Project override.
    phases:
      - phase: non_executing_checks
        behavior: >
          Always allowed for proposed diffs: patch applies, base hash matches,
          high-risk file detection, path policy, and secret-like pattern scan.
      - phase: e2b_checks
        behavior: >
          Requires first-use or Project-level consent for private code because
          relevant code/config leaves the user's machine for an isolated sandbox.
      - phase: remote_machine_checks
        behavior: >
          Requires first-use or Project-level consent and runs only configured
          allowed check commands, not arbitrary assistant-generated shell.
  project_share_payload:
    description: >
      A read-only exported Project bundle that lets recipients decrypt selected
      encrypted Project metadata and Project-linked records without giving the
      backend the Project key. The decrypt authority comes from the share URL
      fragment key and optional password, following the existing chat/embed
      share-link contract. Runtime remote-source access is never included.
    includes:
      - project_id
      - encrypted_project_metadata
      - encrypted_project_key_for_share
      - selected encrypted project item records
      - optional encrypted task, plan, and uploaded-embed key details for selected records
      - generated_at and duration_seconds
      - password_protected flag
    excludes:
      - URL fragment key or optional password sent to the backend
      - raw Project, task, plan, chat, or embed keys
      - decrypted Project metadata or file paths
      - CLI bridge credentials, connected-device identifiers, SSH/remotes, repo URLs, local paths, tokens, or source runtime grants
      - background sync, search/read permission, write permission, or command/test execution authority

contracts:
  cli:
    - command: openmates remote-access start
      behavior: >
        Starts an authenticated local bridge, lets the user select folders or
        repositories, attach each source to an existing or new Project, and choose
        session-only or persistent bridge metadata. It prints redacted source
        status and never prints sensitive file content.
    - command: openmates remote-access status
      behavior: >
        Lists attached source aliases, Project names, connection state, cache
        location, and last index time without printing raw private paths unless
        the local user explicitly asks for verbose local diagnostics.
    - command: openmates remote-access stop
      behavior: >
        Stops the bridge and marks sources offline for assistant access without
        deleting encrypted Project metadata.
  api:
    - route: POST /v1/projects/{project_id}/sources
      request: "encrypted source metadata, source type, opaque source id, capabilities"
      response: "source id, status, created_at"
      errors:
        - 401 when unauthenticated.
        - 403 when the user cannot edit the Project.
        - 400 for unsupported source type or malformed encrypted metadata.
    - route: POST /v1/projects/context-grants
      request: "project id, source ids, mention type, requested access, encrypted grant metadata"
      response: "grant id, mode, expires_at, required user action"
      errors:
        - 401 when unauthenticated.
        - 403 when Project access is unavailable.
        - 409 when source is offline and no cached preview can satisfy the request.
    - route: POST /v1/projects/remote-previews
      request: "encrypted preview metadata and bounded encrypted snippet for a virtual remote item"
      response: "preview id, status"
      errors:
        - 401 when unauthenticated.
        - 403 when Project access is unavailable.
        - 413 when snippet or metadata exceeds preview caps.
    - route: PATCH /v1/projects/{project_id}/settings
      request: "encrypted Project permission settings, protected path patterns, automated check override"
      response: "project id, updated_at"
      errors:
        - 401 when unauthenticated.
        - 403 when the user cannot edit the Project.
        - 400 for unsupported write mode or unsafe permission weakening request.
    - route: POST /v1/projects/{project_id}/share-bundles
      request: "encrypted share payload metadata, selected project record ids, password_protected?, expires_at?"
      response: "share bundle id or short-link token; client appends URL fragment key locally"
      errors:
        - 401 when unauthenticated.
        - 403 when the user cannot view/share the Project.
        - 400 when selected records include remote-source runtime grants, plaintext paths, connected-device credentials, or unsupported execution permissions.
      notes:
        - The backend stores or serves only encrypted payloads and server-visible expiration metadata.
        - The URL fragment key, optional password, raw Project key, and decrypted Project fields are never sent to the backend.
  frontend:
    - surface: Projects page
      behavior: >
        Shows local Project items and attached remote sources in one Project
        browser. Remote files/folders render as virtual previews and show offline,
        stale, or permission-required states. Upload to OpenMates is available for
        selected files only in V1.
    - surface: chat composer mentions
      behavior: >
        Adds Project, folder, and file mention types without breaking existing
        model, mate, skill, focus, memory, settings, and embed mentions. Mentions
        serialize into backend-parseable tokens and a client-decrypted context
        payload similar to settings/memory mention payloads.
    - surface: Settings > Privacy & Security > Assistant actions
      behavior: >
        Shows global defaults for assistant action autonomy, including default
        Project write mode for new Projects and global protected path patterns.
    - surface: Settings > Projects > <project name>
      behavior: >
        Shows Project-specific permission mode, protected paths, connected remote
        sources, automated Code check override, audit history, revocation, and
        source status. Project page gear links here.
    - surface: Settings > Apps > Code > Automated checks
      behavior: >
        Shows global automated-check defaults and first-use prompt behavior for
        assistant code creation or updates.
  assistant_context:
    - name: project_map
      behavior: Bounded structure and ranking context for a Project or folder mention.
    - name: remote_search_results
      behavior: "rg search matches with file path labels, line numbers, surrounding snippets, and omitted-result counts."
    - name: remote_file_preview
      behavior: Bounded preview snippets matching existing embed preview line/count behavior rather than a hardcoded line count.
    - name: uploaded_remote_embed
      behavior: Normal encrypted OpenMates embed created only after explicit Upload to OpenMates for selected files.
    - name: remote_diff_virtual_artifact
      behavior: Non-mutating unified diff proposal for an existing remote file, stored inside the encrypted assistant message, rendered like an embed preview/fullscreen diff, and never applied to the remote filesystem in V1.
  privacy_security:
    - Backend stores remote-source metadata, preview metadata, and Project item metadata only as encrypted blobs or opaque hashes.
    - Raw private paths, file contents, git remotes, environment variable values, and ignored file contents are not logged or sent to the LLM by default.
    - Secret-like files and ignored files require explicit user selection or approval before preview, upload, or assistant read.
    - Repo-local cache and `.gitignore` edits require explicit approval and must be reversible.
    - Project grants are scoped by Project/source/item, access kind, chat or turn duration, caps, and privacy mode.
    - Repo-local permission config may add restrictions and suggestions but cannot silently grant write permission, command execution, or weaken user/global settings.
    - Automated E2B checks for private Project code require explicit first-use or Project-level consent because relevant code/config leaves the user's machine.

scenarios:
  - id: S-1
    title: User attaches a remote repository to a Project
    given:
      - Alice is logged into OpenMates CLI.
      - Alice has a local or remote repository reachable from the machine running CLI.
    when:
      - Alice runs `openmates remote-access start` and chooses the repository.
      - Alice attaches it to an existing Project or creates a new Project.
    then:
      - OpenMates stores encrypted source metadata linked to the Project.
      - The CLI initializes default cache storage under `~/.openmates/remote-cache/<source-id>/`.
      - No repository files are uploaded to OpenMates automatically.
      - The Projects UI shows the source as connected and browseable when the bridge is online.

  - id: S-2
    title: User previews remote files and uploads selected files only
    given:
      - Alice has a Project with a connected remote source.
    when:
      - Alice browses the source in Projects and opens a file preview.
      - Alice selects two files and chooses Upload to OpenMates.
    then:
      - The file preview renders through the existing embed preview/fullscreen system as a virtual remote preview.
      - The preview snippet follows the current embed preview line/count policy and includes line count, language, size, hash, and mtime metadata.
      - Only the two selected files are uploaded and converted into encrypted OpenMates embeds.
      - Other remote files remain virtual and are not copied to OpenMates storage.

  - id: S-3
    title: User mentions a Project and assistant receives bounded context
    given:
      - Alice has a Project with an attached repository source.
      - Alice's project-data privacy mode is Allow for mentions.
    when:
      - Alice asks a chat question that mentions the Project.
    then:
      - The client treats the Project mention as consent for bounded project map access for the current chat.
      - The CLI bridge computes a capped Project map using file counts, folder counts, line counts, depth-limited tree, git status, recent and dirty files, ranked symbols, and omitted summaries.
      - The assistant receives the Project map, not a raw recursive tree or full file contents.
      - Broader reads and searches stay within configured caps and Project boundaries.

  - id: S-4
    title: Always ask blocks project reads until approval
    given:
      - Alice has set project-data access to Always ask.
      - Alice mentions a Project in chat.
    when:
      - The assistant needs a Project map, search, or file preview.
    then:
      - OpenMates creates a permission prompt before sending Project data to the assistant.
      - The prompt explains the source, access kind, duration, and approximate data volume.
      - If Alice rejects the request, no Project map, search result, or file preview is sent to the assistant.
      - If Alice approves, the grant is scoped to the approved Project/source/access kind and duration.

  - id: S-5
    title: User mentions a specific remote file for current message access
    given:
      - Alice has a connected remote source in a Project.
      - Alice mentions one specific remote file in a chat message.
    when:
      - The assistant needs to answer using that file.
    then:
      - OpenMates grants access to the specific file for the current message only, unless privacy settings require approval.
      - The assistant receives a bounded remote file preview or a capped read result, not unlimited file content.
      - Follow-up turns require another file mention or an existing broader Project/folder grant.

  - id: S-6
    title: Assistant searches a mentioned Project through the CLI bridge
    given:
      - Alice has mentioned a Project and the bridge is online.
      - The Project grant allows bounded search.
    when:
      - The assistant needs to find references to a symbol or phrase.
    then:
      - The bridge runs `rg` within approved source roots and returns capped matches with file labels, line numbers, snippets, and omitted-result counts.
      - Ignored files, secret-like files, binary files, and paths outside the approved source are excluded unless explicitly approved.
      - The backend never performs plaintext filesystem search and never sees decrypted Project metadata beyond client-provided approved context.

  - id: S-7
    title: Offline source degrades without leaking data
    given:
      - Alice has a Project with a previously connected remote source.
      - The CLI bridge is offline.
    when:
      - Alice opens the Project or mentions it in chat.
    then:
      - The UI shows the source as offline and can show only locally available encrypted/stale preview metadata allowed by policy.
      - Assistant search/read operations fail with an actionable source-offline message instead of silently falling back to stale broad context.
      - No backend job attempts to read the remote source directly.

  - id: S-8
    title: Assistant creates message-local remote diff proposals
    given:
      - Alice has attached a repository source to a Project.
    when:
      - Alice asks the assistant to edit an existing remote file in that source.
    then:
      - The assistant outputs a unified diff targeting the remote file reference.
      - OpenMates serializes the remote diff proposal inside the encrypted assistant message and renders it through embed-like preview/fullscreen diff UI.
      - The proposal is not stored as a normal OpenMates embed or a separate Project database row unless Alice explicitly saves or uploads it.
      - No remote file is modified and no shell command is executed.
      - If Alice asks to apply the patch, V1 explains that applying remote diffs is a later-phase capability.

  - id: S-9
    title: First write intent asks for Project write mode
    given:
      - Alice has a new remote Project with no write-mode setting.
      - Alice mentions a folder in chat and asks the assistant to update files in that folder.
    when:
      - The assistant proposes the first remote file edit for that Project.
    then:
      - OpenMates asks whether the Project should use Always ask before writes or Auto approve safe writes.
      - Always ask before writes is the recommended default.
      - The choice is stored under Settings > Projects > project name and can inherit from Settings > Privacy & Security > Assistant actions for future Projects.
      - The Project page gear links to the same settings page.

  - id: S-10
    title: Mention chip exposes Read and Read & Write access
    given:
      - Alice has a remote Project in Auto approve safe writes mode.
    when:
      - Alice mentions a Project, folder, or file in the chat composer.
    then:
      - The mention/access chip defaults to Read & Write except protected files.
      - Alice can toggle the chip to Read, or back to Read & Write, using visible controls and keyboard navigation.
      - Built-in high-risk files and user-protected paths still require explicit write approval before later-phase apply.
      - If the Project mode is Always ask before writes, the same chip defaults to Read.

  - id: S-11
    title: High-risk files require explicit approval by default
    given:
      - Alice's Project is in Auto approve safe writes mode.
      - The assistant proposes edits to src/App.svelte, Caddyfile, .env.example, .gitignore, and package.json.
    when:
      - OpenMates classifies the proposed remote diff bundle.
    then:
      - src/App.svelte can be considered safe if it passes path, hash, patch-size, and secret-scan checks.
      - Caddyfile, .env.example, .gitignore, and package.json are marked high-risk and require explicit approval before any later-phase apply.
      - Files matched by .gitignore, binary edits, deletes, renames, symlink target edits, chmod changes, and paths outside the approved source root cannot be auto-applied.
      - User-defined global and Project-specific protected patterns add more always-ask paths.

  - id: S-12
    title: User chooses automated checks after assistant code changes
    given:
      - Alice has a remote Project and the assistant has created or updated code for the first time in that Project.
    when:
      - OpenMates asks whether to run automated checks after assistant code changes.
    then:
      - Alice can choose Not now, Use isolated cloud sandbox, or Use my remote machine.
      - The prompt explains the privacy and performance tradeoff for E2B versus remote-machine checks.
      - The selection is stored in Settings > Apps > Code with a Project-specific override under Settings > Projects > project name.
      - Non-executing diff checks can run without extra consent, while E2B checks and remote-machine check commands follow the selected consent mode.

  - id: S-13
    title: User shares a read-only Project bundle without remote-source runtime access
    given:
      - Alice owns an encrypted Project with uploaded embeds, linked tasks, linked plans, and an attached remote source.
      - Alice chooses to share Project metadata and selected Project records with optional password protection.
    when:
      - OpenMates creates the Project share link.
      - Bob opens the link.
    then:
      - Bob can decrypt only the selected encrypted Project metadata and selected records using key material from the URL fragment and optional password.
      - Bob receives read-only Project context, not owner/edit access.
      - The backend never receives the URL fragment key, optional password, raw Project key, raw linked record keys, or decrypted Project fields.
      - Remote-source runtime access is excluded: Bob cannot use Alice's CLI bridge, local paths, repository remotes, source grants, search/read permissions, write permissions, check commands, tokens, or connected-device credentials.
      - Existing chat and embed share links continue to work without format changes.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: CLI remote-access start can attach a folder or repository source to an encrypted Project without uploading repository files by default.
  - id: AC-2
    scenario: S-2
    text: Projects UI can browse and preview remote files as virtual embed-compatible previews, and Upload to OpenMates creates encrypted embeds only for selected files.
  - id: AC-3
    scenario: S-3
    text: Project mentions provide bounded assistant context maps with counts, git/recency signals, ranked symbols, and omitted summaries instead of raw trees or full contents.
  - id: AC-4
    scenario: S-4
    text: The project-data Always ask privacy mode prevents any assistant project map, search result, or file preview from being sent before explicit approval.
  - id: AC-5
    scenario: S-5
    text: Specific remote file mentions grant current-message-only capped file access unless the user's privacy setting requires approval.
  - id: AC-6
    scenario: S-6
    text: Assistant search uses a bounded CLI bridge `rg` workflow inside approved source roots and excludes ignored, secret-like, binary, and out-of-scope paths by default.
  - id: AC-7
    scenario: S-7
    text: Offline remote sources show explicit offline/stale states and do not trigger backend plaintext source access or silent stale broad-context fallback.
  - id: AC-8
    scenario: S-8
    text: V1 can create non-mutating remote diff proposals for existing remote files as message-local virtual artifacts, rendered through embed-like diff UI, without modifying remote sources or creating real embeds or Project rows by default.
  - id: AC-9
    scenario: S-9
    text: First remote write intent for a Project asks the user to choose Always ask before writes or Auto approve safe writes, storing the choice in Project settings with global defaults under Privacy & Security.
  - id: AC-10
    scenario: S-10
    text: Project, folder, and file mention chips expose a keyboard-accessible Read / Read & Write switch whose default follows the Project write mode while preserving protected-file restrictions.
  - id: AC-11
    scenario: S-11
    text: Built-in and user-defined high-risk files, gitignored files, binary edits, deletes, renames, chmod changes, symlink target edits, and out-of-root paths cannot be auto-applied by default.
  - id: AC-12
    scenario: S-12
    text: Automated code checks are governed by Code app settings with Project overrides and a first-use prompt that distinguishes E2B sandbox checks from remote-machine checks.
  - id: AC-13
    scenario: S-13
    text: Project sharing uses URL-fragment key material for read-only selected encrypted Project data and never shares remote-source runtime access or server-readable raw keys.

