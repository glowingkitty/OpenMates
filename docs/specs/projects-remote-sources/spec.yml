id: projects-remote-sources
title: Projects Remote Sources And Assistant Context V1
status: implementing

goal: >
  Let users attach local or remote folders and repositories to encrypted
  OpenMates Projects, browse and preview their files without bulk-uploading them,
  mention projects, folders, and files in chat, and allow the assistant to search
  or read approved project context through a privacy-preserving CLI bridge.

scope:
  in:
    - Remote source attachment from OpenMates CLI to an existing Project or a newly created Project.
    - Local/remote folder and repository browsing from Projects UI using bounded remote metadata, not automatic file upload.
    - Remote file and folder previews rendered through the existing embed preview/fullscreen system as virtual remote previews.
    - Explicit Upload to OpenMates for selected individual files and multi-select file batches, creating normal encrypted OpenMates embeds only for selected files.
    - Project, folder, and file mentions in normal chat, including backend parser support and client-decrypted cleartext context payloads for explicit mentions.
    - Assistant project maps, folder maps, file previews, and search/read operations using user-consented project context and V1 `rg`/ripgrep search on the source machine.
    - Remote-machine preview/cache storage by default at `~/.openmates/remote-cache/<source-id>/`, with optional repo-local `.openmates/preview-cache/` only after explicit user approval.
    - Settings placement for global assistant-action defaults under Settings > Privacy & Security, with Project-specific permissions under Settings > Projects > <project name> and quick access from the Project page gear icon.
    - Privacy setting for project-data access with Always ask support, plus project-mention consent behavior for less restrictive modes.
    - Non-mutating remote diff proposals for existing remote files, stored inside the encrypted assistant message as message-local virtual artifacts and rendered like embed previews/fullscreen diffs without creating real embeds, Project rows, or modifying the remote filesystem.
    - Read-only Project share links for encrypted Project metadata and explicitly selected Project records, using URL-fragment key material and optional password protection matching the existing chat/embed share-link pattern.
    - Two-mode Project write policy for future remote writes: Always ask before writes, or Auto approve safe writes with deterministic high-risk file protections.
    - Code app automated check settings with first-use prompt, supporting isolated E2B checks or remote-machine checks as separate consent from write permission.
    - Zero-knowledge storage for Project metadata and remote-source metadata in OpenMates backend, with remote search/read executed by the client or CLI bridge.
    - Later-phase architecture placeholders for applying remote patches and running commands without implementing remote-source mutations in V1.
  out:
    - Applying assistant patches, shell commands, package installs, git mutations, or any remote-source filesystem mutation in V1.
    - Folder upload, background sync, bidirectional sync, or automatic mirror upload of repositories to OpenMates in V1.
    - Creating real OpenMates embeds for every remote file by default.
    - Sending raw recursive file trees, entire repositories, or unlimited file contents to the assistant.
    - Server-side decryption of Project metadata, remote-source metadata, preview cache contents, or user file contents.
    - Repo-local cache or `.gitignore` mutation without an explicit user approval step.
    - Sharing remote-source runtime access, CLI bridge credentials, local/private paths, execution grants, repository remotes, or any permission to search/read/mutate the recipient's or sender's filesystem.

