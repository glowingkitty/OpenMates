implementation_plan:
  existing_patterns:
    - Current Projects API and client encryption model in `projects.py`, Directus project schemas, and `projectService.ts`.
    - Explicit cleartext mention payload pattern in `mentionedSettingsMemoriesCleartext.ts`.
    - CLI file mention and encrypted file embed creation in `mentions.ts`, `fileEmbed.ts`, and `cli.ts`.
    - Connected account permission modes and approval-prompt model from `calendar-permission-management`.
    - Workflow countdown/approval split for safe versus high-risk actions from `workflows-v1`.
    - Embed diff editing architecture in `embed-diff-editing.md`, `stream_consumer.py`, and `embed_diff_service.py`.
    - Existing UnifiedEmbed preview/fullscreen rendering for uploaded embeds.
  architecture: >
    Extend Projects with encrypted remote source records and virtual remote preview
    records. The CLI bridge remains the only component that touches local or
    remote filesystem plaintext. The web app and backend coordinate encrypted
    metadata, mention serialization, approval/grant state, and assistant context
    envelopes. Main processor receives bounded client-decrypted Project context,
    can request more context only through approved bridge operations, and can
    create non-mutating, message-local remote diff virtual artifacts for existing
    remote files. Applying those diffs and running commands remain later-phase capabilities guarded by
    Project write mode, high-risk file classification, source-root/base-hash
    checks, and explicit approval.
  data_flow:
    - User starts CLI bridge and attaches source to Project.
    - CLI indexes bounded source metadata and writes local cache under the default remote cache path.
    - Client stores encrypted Project source metadata through Projects API.
    - Projects UI requests virtual previews from the bridge and renders them with existing embed preview components.
    - Chat composer serializes Project/folder/file mentions and sends encrypted/cleartext approved context payloads according to privacy mode.
    - Backend parser recognizes project mention tokens and `AskSkillRequest` carries Project context references to main processor.
    - Main processor uses Project map/search/read context only within grant scopes and caps.
    - When asked to edit an existing remote file, assistant emits a unified diff that is serialized into the encrypted assistant message as a virtual artifact instead of a real embed mutation or Project row.
    - First remote write intent prompts for Project write mode and persists the choice under Settings > Projects > project name.
    - Mention chips expose Read and Read & Write access. Defaults follow Project write mode, while protected files stay always-ask.
    - First assistant code creation/update prompts for automated checks and persists the choice in Code app settings with Project override.
  affected_files:
    - path: backend/core/directus/schemas/project_sources.yml
      reason: New encrypted Project remote source records.
    - path: backend/core/directus/schemas/project_remote_previews.yml
      reason: New virtual remote preview metadata records if persistent preview metadata is stored server-side.
    - path: backend/core/api/app/routes/projects.py
      reason: Source, preview, context-grant, and settings API routes.
    - path: backend/core/api/app/services/directus/project_methods.py
      reason: Directus helpers for source, preview, and settings records.
    - path: backend/shared/python_utils/project_file_risk.py
      reason: Deterministic high-risk file/path classification shared by backend and tests.
    - path: backend/core/api/app/utils/override_parser.py
      reason: Project/folder/file mention parsing.
    - path: backend/core/api/app/schemas/ai_skill_schemas.py
      reason: AskSkillRequest Project context fields.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Bounded Project context injection and remote diff virtual artifact instruction/routing.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Route remote diff fences to message-local virtual artifact rendering while keeping embed diffs on the existing embed path.
    - path: frontend/packages/ui/src/services/projectService.ts
      reason: Remote source, virtual preview, upload-selected, Project settings, and grant workflows.
    - path: frontend/packages/ui/src/components/projects/ProjectsPage.svelte
      reason: Remote source browsing, settings gear quick link, and upload-selected UI.
    - path: frontend/packages/ui/src/components/projects/ProjectBrowserItem.svelte
      reason: Virtual remote preview states.
    - path: frontend/packages/ui/src/components/settings/projects/**
      reason: Project-specific permission, protected path, remote source, and automated check settings.
    - path: frontend/packages/ui/src/components/settings/privacy/**
      reason: Global Privacy & Security assistant-action defaults.
    - path: frontend/packages/ui/src/components/settings/apps/code/**
      reason: Code app automated check settings and first-use prompt defaults.
    - path: frontend/packages/ui/src/components/enter_message/services/mentionSearchService.ts
      reason: Project/folder/file mention search.
    - path: frontend/packages/ui/src/components/enter_message/MentionDropdown.svelte
      reason: Mention rendering for Projects.
    - path: frontend/packages/ui/src/components/enter_message/ProjectAccessChip.svelte
      reason: Read and Read & Write switch for Project/folder/file mentions.
    - path: frontend/packages/ui/src/services/sendersChatMessages.ts
      reason: Send approved Project context payloads with chat messages.
    - path: frontend/packages/openmates-cli/src/server.ts
      reason: Remote access bridge server.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Remote access bridge client/API calls.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: remote-access commands.
    - path: frontend/packages/openmates-cli/src/projectFileRisk.ts
      reason: CLI-side high-risk file/path classification and allowed-check-command enforcement.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/projects-remote-sources/spec.yml
    - cd frontend/packages/openmates-cli && npm run test:unit:remote-access
    - cd frontend/packages/ui && npm run test:unit:project-remote-sources
    - docker exec api python -m pytest /app/backend/tests/test_project_remote_sources.py
    - python3 scripts/tests.py run --spec projects-remote-sources.spec.ts after deploy for green phase
    - python3 scripts/apple_remote.py status plus build-ios or test-ios if Apple parity work is included in the implementation slice
  verification_order:
    - CLI bridge/unit contract first
    - UI service unit contract second
    - Backend pytest contract third
    - Web Playwright after deploy fourth
    - Apple remote build/test fifth when native surfaces are touched

