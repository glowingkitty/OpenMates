risks:
  - id: R-1
    risk: Reusing SettingsShare directly for chat would preserve the wrong UI and fail the product intent.
    mitigation: Share tab may reuse helpers only; UI must be new chat-settings UI.
  - id: R-2
    risk: Files tab could over-list non-downloadable embeds and become noisy.
    mitigation: Use a downloadable adapter and test exclusion of non-downloadable references.
  - id: R-3
    risk: Dynamic settings route could expose private chat ids in regular navigation or stale breadcrumbs.
    mitigation: Keep route deep-link only, reset navigation on close, and use sanitized tests.
  - id: R-4
    risk: Changing shared/share route could regress embed sharing.
    mitigation: Preserve embed path and keep share-embed-flow.spec.ts as a required regression.

open_questions:
  - id: OQ-1
    question: Direct Figma child-node inspection is still needed after rate limit clears to refine exact spacing and state details.
    owner: OpenCode
    status: open
