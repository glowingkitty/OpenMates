schema_version: 2
id: chat-settings-redesign
title: Chat Settings Redesign
status: draft

goal: >
  Replace the accidentally exposed standalone chat details overlay and old chat
  share menu with a deep-linked chat-specific settings page inside the existing
  Settings shell. The page must match the provided Figma direction, use canonical
  settings elements, restore the chat Share button safely, and keep embed sharing
  unchanged.

scope:
  in:
    - A chat-specific settings page opened only by deep link or chat actions, not from regular Settings navigation.
    - Existing Settings shell, breadcrumb, panel state, and settings deep-link behavior for chat settings.
    - Breadcrumb behavior equivalent to the old share-chat settings path: Settings / Chats, with back navigation returning to main Settings.
    - Deep links to specific chat settings tabs, including Share from the active chat Share button and future links to Plan, Tasks, Files, and Usage.
    - Tabs rendered with the canonical SettingsTabs element in this order: Plan, Tasks, Files, Usage, Share.
    - Chat settings header with chat icon, chat title, chat gradient background, and total chat cost in credits so far.
    - Chat summary rendered below the header and above SettingsTabs.
    - Plan tab first slice with a Coming soon placeholder only.
    - Tasks tab first slice using existing chat task surfaces where available and safe placeholders where task data is not available.
    - Files tab listing only downloadable embed/file items referenced by the chat.
    - Files tab support for downloadable code, images, audio/recordings, PDFs, design icons, docs, sheets, and any other existing embed type with a download capability.
    - Usage tab showing local chat usage rows and CSV/YAML export using existing message metadata.
    - Share tab fully replacing the old SettingsShare chat-sharing UI, with Figma-guided initial, generated-link, QR, and URL-reveal states.
    - Existing zero-knowledge chat share-link generation, durable short-link creation, long-link fallback, password protection, expiration, community option, stop sharing, copy, QR, show URL, and download chat behavior.
    - Deleting frontend/packages/ui/src/components/chats/ChatDetailsSettingsPage.svelte and removing all product imports/render paths for that separate overlay.
    - Playwright coverage for opening chat settings from Share, tab deep linking, downloadable Files rows, Usage export controls, and Share state transitions.
  out:
    - Adding a normal Settings sidebar/menu entry for chat settings.
    - Keeping, importing, rendering, or reusing the standalone ChatDetailsSettingsPage overlay UI.
    - Changing embed sharing UI or embed share behavior in this slice.
    - New backend API routes, Directus schema changes, or new server-side file index endpoints.
    - Implementing real Plan tab behavior beyond a Coming soon placeholder.
    - Implementing new task-management backend contracts beyond existing Tasks V1 surfaces.
    - Apple implementation in this first web slice, except for documenting expected follow-up parity.

