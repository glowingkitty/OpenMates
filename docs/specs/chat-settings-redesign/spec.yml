contracts:
  ui:
    - name: ChatSettingsRoute
      requirements:
        - Lives inside the existing Settings shell and is opened through settingsDeepLink or equivalent dynamic route state.
        - Is not listed in regular settings navigation.
        - Supports a chat id plus tab id in the deep-link request without exposing private data in committed URLs or tests.
        - Uses SettingsTabs for tab navigation.
        - Replaces ChatDetailsSettingsPage.svelte completely; that file and all imports/render branches must be removed.
    - name: ChatSettingsHeader
      requirements:
        - Uses decrypted chat metadata already available to the client.
        - Falls back to Untitled chat, default icon, and deterministic gradient when metadata is unavailable.
        - Shows total known credits from local message metadata; unknown values display as 0 or Unknown without silent calculation errors.
        - Matches the Figma structure with Settings / Chats breadcrumb, centered chat icon/title, credit count, and summary immediately below.
    - name: ChatSettingsFilesTab
      requirements:
        - Uses a deterministic downloadable-item adapter shared by row rendering and all-files download.
        - Treats a referenced embed as downloadable only when an existing local export/download path can produce a file.
        - Does not show non-downloadable result cards in the primary list.
        - Shows file count/size when known, file/source path when known, and row metadata such as lines/language, dimensions, AI-generated status, or original filename.
    - name: ChatSettingsShareTab
      requirements:
        - Replaces old chat-sharing UI, but may reuse pure helper functions for crypto, short URL creation, QR rendering, copy, unshare, and download mechanics.
        - Does not route embed share contexts into the new chat settings Share tab.
        - Initial state includes Share with community, Password protection, Auto expire, Share chat, and Download chat controls.
        - Generated state includes auto-expire status, Download chat, QR toggle, copy action, URL toggle, and Stop sharing.
  api:
    - No new backend API routes.
    - Existing short-link and share metadata endpoints may be reused by the chat Share tab.
    - Existing task APIs may be used by the Tasks tab if the current task component already needs them.
  data:
    - No Directus schema changes.
    - No new server-side file index.
    - Chat settings reads local chat, message, metadata, and embed data already available to the browser.
  privacy_security:
    - URL fragment secrets, chat keys, embed keys, passwords, and decrypted private content are never sent to the server outside existing approved share metadata behavior.
    - Files tab must not log decrypted content or private filenames beyond existing local UI display.
    - Tests must use sanitized fixture chat data and placeholders, not private production chat ids or share fragments.
  i18n:
    - User-visible labels, empty states, errors, and action text must use i18n sources.
    - Missing translations are test failures.
  accessibility:
    - Tabs expose role=tablist/role=tab from SettingsTabs.
    - Share, download, copy, QR, URL, and stop-sharing controls have accessible names and keyboard activation.

