implementation_plan:
  spec_path: docs/specs/chat-settings-redesign/spec.yml
  status: approved
  approval:
    required: false
    reason: No material technical decision beyond the approved product contract; plan uses existing Settings, local stores, encrypted share helpers, and client-side exports only.
  existing_patterns:
    - id: P-1
      files: [frontend/packages/ui/src/components/Settings.svelte, frontend/packages/ui/src/components/settings/settingsRoutes.ts]
      reuse: Settings.svelte already builds static and dynamic settings views, strips deep-link parameters, opens the settings shell, and calls handleOpenSettings.
      covers: [AC-1, AC-3]
    - id: P-2
      files: [frontend/packages/ui/src/stores/settingsDeepLinkStore.ts, frontend/packages/ui/src/stores/settingsNavigationStore.ts]
      reuse: External UI already opens Settings via settingsDeepLink and breadcrumbs via navigateToSettings/resetSettingsNavigation.
      covers: [AC-1, AC-3]
    - id: P-3
      files: [frontend/packages/ui/src/components/settings/elements/SettingsTabs.svelte, docs/design-guide/settings-ui.md]
      reuse: SettingsTabs and canonical settings/elements are mandatory for settings UI; avoid custom tab widgets or inline settings controls.
      covers: [AC-2]
    - id: P-4
      files: [frontend/packages/ui/src/components/settings/share/SettingsShare.svelte, frontend/packages/ui/src/services/shareEncryption.ts, frontend/packages/ui/src/services/shortUrlEncryption.ts, frontend/packages/ui/src/services/shareMetadataQueue.ts]
      reuse: Keep existing zero-knowledge encryption, short URL, queued metadata, copy, QR, and download mechanics while replacing only the chat Share tab UI.
      covers: [AC-6, AC-7]
    - id: P-5
      files: [frontend/packages/ui/src/services/embedStore.ts, frontend/packages/ui/src/services/zipExportService.ts, frontend/packages/ui/src/services/chatExportService.ts]
      reuse: Use existing embed lookup/export/download primitives for deterministic downloadable-file rows and all-files downloads.
      covers: [AC-4, AC-5]
  architecture: >
    Add a chat-specific dynamic Settings route/state that renders a new chat settings page inside the existing Settings shell. Keep the route deep-link only, feed it active chat context plus requested tab, and remove the visible product dependency on the separate ChatDetailsSettingsPage overlay. Extract small pure helpers for tab parsing, header metadata, usage rows, downloadable rows, and share action state so tests can cover behavior without browser overlays.
  architecture_boundaries:
    - No backend API route, Directus schema, SDK, CLI, or Apple code changes in this first slice.
    - Chat settings route is not added to the regular settings sidebar/menu.
    - Embed share entry points remain on shared/share and existing embed context detection.
    - SettingsShare.svelte may be mined for helper behavior, but the chat UI must be new and Figma-guided.
      - ChatDetailsSettingsPage.svelte must be deleted during the route-seam slice, with ActiveChat imports, state, event handling, and render branches updated to use the Settings shell path instead.
  data_flow:
    - step: Chat Share entry
      example: active chat chat_id="chat-dev-123", title="Embedded software development", requested tab="share".
      flow: ActiveChat sets activeChatStore to chat-dev-123, records chat settings context, opens Settings, and deep-links to a dynamic chat settings path such as chats/chat-dev-123/share or an equivalent typed request.
      covers: [AC-1, AC-3]
    - step: Settings route resolution
      example: incoming request maps to cleanPath="chats/chat-dev-123" plus tab="share" without persisting private fragments in committed tests.
      flow: Settings registers the dynamic route for the current chat, sets breadcrumb Settings / Chats, and renders ChatSettingsPage with chat id and initial tab.
      covers: [AC-1, AC-3]
    - step: Header and summary
      example: title="Embedded software development", icon="code", totalCredits=93, summary="Explores Whisper deployment and debugging".
      flow: ChatSettingsPage derives display metadata from local decrypted chat/message state, falls back to Untitled chat/default icon/0 or Unknown credits, and renders hero then summary then SettingsTabs.
      covers: [AC-2]
    - step: Files
      example: content refs include embed:code:abc, embed:image:def, embed:search-result:ghi.
      flow: chatSettingsFiles adapter resolves refs through embedStore/registered metadata, includes code/image rows with local download handlers, excludes search-result because no file download path exists, and feeds both row rendering and Download files.
      covers: [AC-4]
    - step: Usage
      example: assistant message metadata provider="Google", app="AI", skill="Ask", credits=19, words=229, created_at=timestamp.
      flow: chatUsageRows helper groups local message metadata, totals known credits, marks missing values visibly, and serializes CSV/YAML exports client-side.
      covers: [AC-5]
    - step: Share
      example: selectedDuration=600, password enabled, community disabled.
      flow: ChatSettingsShareSection uses generateShareKeyBlob, shortUrlEncryption, metadata queue, QR generation, clipboard, stop-sharing, and chatExportService without sending URL fragment secrets to the server.
      covers: [AC-6]
    - step: Embed share regression
      example: embed context sets window.__embedShareContext and settingsDeepLink="shared/share".
      flow: SettingsShare continues to consume embed context synchronously; ChatSettingsShareSection is not invoked for embed sharing.
      covers: [AC-7]
  impacts:
    api: No new backend APIs; existing short-link/share metadata endpoints are reused only through current services.
    data: No schema migration, backfill, or server-side file index.
    ui: Adds chat-specific Settings content, Figma-guided tabs, and new chat Share tab states inside existing Settings shell.
    privacy_security: Keep URL fragment secrets and decrypted chat content local; do not log private filenames/content beyond existing local UI display; tests use sanitized fixture ids and placeholder fragments.
    i18n: Add all visible strings to existing translation sources; missing translations fail verification.
    accessibility: Rely on SettingsTabs roles and add accessible names/keyboard activation for share/download/copy/QR/URL/stop controls.
    rollout: Re-enable chat Share button by routing to Settings shell; no feature flag or persisted rollout migration needed unless implementation needs a temporary guard during red/green work.
    observability: Console error existing client failures with component prefixes only; no analytics or telemetry additions.
  affected_files:
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Restore chat Share entry point and route chat settings into Settings shell.
      covers: [AC-1, AC-3]
    - path: frontend/packages/ui/src/stores/settingsDeepLinkStore.ts
      reason: Support chat id plus tab deep-link data through a minimal typed request or encoded path while keeping current string callers compatible.
      covers: [AC-1, AC-3]
    - path: frontend/packages/ui/src/stores/settingsNavigationStore.ts
      reason: Ensure dynamic chat breadcrumb is Settings / Chats and back navigation returns to main Settings.
      covers: [AC-1]
    - path: frontend/packages/ui/src/components/settings/settingsRoutes.ts
      reason: Register or support dynamic chat settings route without normal navigation exposure.
      covers: [AC-1, AC-3]
    - path: frontend/packages/ui/src/components/Settings.svelte
      reason: Dynamic settings view, breadcrumb, and deep-link handling may need chat context support.
      covers: [AC-1, AC-3]
    - path: frontend/packages/ui/src/components/chats/ChatSettingsPage.svelte
      reason: New settings-shell chat page replacing the overlay product surface.
      covers: [AC-1, AC-2, AC-3, AC-4, AC-5, AC-6]
    - path: frontend/packages/ui/src/components/chats/ChatDetailsSettingsPage.svelte
      reason: Delete legacy separate overlay component once Settings-shell route seam exists.
      covers: [AC-1]
    - path: frontend/packages/ui/src/components/chats/ChatSettingsShareSection.svelte
      reason: New chat-only Share tab UI.
      covers: [AC-6]
    - path: frontend/packages/ui/src/components/chats/chatSettingsFiles.ts
      reason: Downloadable file extraction and download adapters.
      covers: [AC-4]
    - path: frontend/packages/ui/src/components/chats/chatUsageRows.ts
      reason: Local usage row grouping and CSV/YAML payload generation.
      covers: [AC-5]
    - path: frontend/packages/ui/src/components/chats/__tests__/chatSettingsFiles.test.ts
      reason: Unit red/green coverage for downloadable-only file rows.
      covers: [AC-4]
    - path: frontend/packages/ui/src/components/chats/__tests__/chatUsageRows.test.ts
      reason: Unit red/green coverage for usage rows and export serialization.
      covers: [AC-5]
    - path: frontend/apps/web_app/tests/chat-settings-flow.spec.ts
      reason: Main E2E coverage for deep links, header, tabs, and breadcrumb.
      covers: [AC-1, AC-2, AC-3]
    - path: frontend/apps/web_app/tests/chat-settings-files.spec.ts
      reason: E2E coverage for Files tab downloadable inclusion/exclusion and all-files action.
      covers: [AC-4]
    - path: frontend/apps/web_app/tests/chat-settings-usage.spec.ts
      reason: E2E coverage for Usage tab rows and export controls.
      covers: [AC-5]
    - path: frontend/apps/web_app/tests/share-chat-flow.spec.ts
      reason: Update existing share chat coverage for the new Share tab states.
      covers: [AC-1, AC-6]
    - path: frontend/apps/web_app/tests/share-embed-flow.spec.ts
      reason: Required unchanged embed share regression.
      covers: [AC-7]
  verification_strategy:
    - Run Playwright red phases against current deployed dev for chat settings, Files, Usage, and Share chat specs before implementation.
    - Run local frontend unit tests for downloadable file extraction, usage rows, and share encryption helpers after implementation.
    - Deploy to dev with sessions.py before Playwright green runs because web E2E targets app.dev.openmates.org.
    - Run chat settings, Files, Usage, Share chat, and unchanged Share embed Playwright specs against deployed dev.
    - Obtain user visual confirmation before marking the spec complete; Apple parity is deferred to a follow-up.
  verification_phase_gates:
    - gate: cli
      applicability: not_applicable
      reason: Browser-only local settings UI; no new CLI/API/WebSocket behavior or external programmatic contract.
    - gate: sdk
      applicability: not_applicable
      reason: No npm or pip SDK surface changes.
    - gate: web_red
      commands:
        - python3 scripts/tests.py run --spec chat-settings-flow.spec.ts
        - python3 scripts/tests.py run --spec chat-settings-files.spec.ts
        - python3 scripts/tests.py run --spec chat-settings-usage.spec.ts
        - python3 scripts/tests.py run --spec share-chat-flow.spec.ts
      expected: fail on current deployed dev before implementation.
    - gate: frontend_unit_green
      commands:
        - npm run test -- --run frontend/packages/ui/src/components/chats/__tests__/chatSettingsFiles.test.ts
        - npm run test -- --run frontend/packages/ui/src/components/chats/__tests__/chatUsageRows.test.ts
        - npm run test -- --run frontend/packages/ui/src/services/encryption/__tests__/shareEncryption.test.ts
      expected: pass locally after implementation.
    - gate: deploy_dev
      commands:
        - python3 scripts/sessions.py deploy
      expected: dev deployment live before Playwright green runs.
    - gate: web_green
      commands:
        - python3 scripts/tests.py run --spec chat-settings-flow.spec.ts
        - python3 scripts/tests.py run --spec chat-settings-files.spec.ts
        - python3 scripts/tests.py run --spec chat-settings-usage.spec.ts
        - python3 scripts/tests.py run --spec share-chat-flow.spec.ts
        - python3 scripts/tests.py run --spec share-embed-flow.spec.ts
      expected: pass against deployed app.dev.openmates.org.
    - gate: user_confirmation
      command: manual review on deployed dev URL
      expected: User confirms visual match to Figma intent.
    - gate: apple
      applicability: deferred
      reason: Apple parity explicitly out of first slice; revisit after user-confirmed web behavior.
  verification_order:
    - playwright_red_against_current_dev
    - frontend_unit_green
    - web_implementation
    - deploy_dev
    - playwright_green_against_deployed_dev
    - user_visual_confirmation
    - apple_deferred_follow_up
  acceptance_coverage:
    - ac: AC-1
      verification: [T-E2E-CHAT-SETTINGS, T-E2E-CHAT-SHARE]
    - ac: AC-2
      verification: [T-E2E-CHAT-SETTINGS, V-USER-VISUAL]
    - ac: AC-3
      verification: [T-E2E-CHAT-SETTINGS]
    - ac: AC-4
      verification: [T-UNIT-DOWNLOADABLE-FILES, T-E2E-CHAT-FILES]
    - ac: AC-5
      verification: [T-UNIT-USAGE, T-E2E-CHAT-USAGE]
    - ac: AC-6
      verification: [T-E2E-CHAT-SHARE, T-UNIT-SHARE]
    - ac: AC-7
      verification: [T-E2E-EMBED-SHARE]
  assumptions_to_check:
    - assumption: A-1
      timing: Before final spacing polish, not before the first implementation slice.
      source: Retry figma_get_figma_data for the child nodes if MCP rate limit clears; otherwise ship from screenshot plus cached figma_index.py state with user visual confirmation.
  risks_and_mitigations:
    - risk: Dynamic chat path with chat id could leak private ids into URL/hash history.
      mitigation: Prefer in-memory typed deep-link payload or sanitized dynamic route state; if encoded string path is used, avoid persisted/shareable external URLs and use placeholder ids in tests.
      covers: [AC-1, AC-3]
    - risk: Reusing SettingsShare directly would preserve the wrong UI.
      mitigation: Extract or duplicate only pure behavior helpers; render new ChatSettingsShareSection for chat context.
      covers: [AC-6]
    - risk: File rows become noisy by listing every embed.
      mitigation: Central downloadable adapter is the only source for row rendering and all-files downloads.
      covers: [AC-4]
    - risk: Embed sharing regresses due to shared/share changes.
      mitigation: Keep embed path unchanged and require share-embed-flow.spec.ts green after deploy.
      covers: [AC-7]
  phases:
    - id: PHASE-1
      name: Tests and route seam
      work: Add red Playwright coverage and minimal chat settings route/deep-link seam inside Settings without building final tab internals.
      covers: [AC-1, AC-3]
    - id: PHASE-2
      name: Local data helpers
      work: Add downloadable-files and usage-row helpers with unit tests.
      covers: [AC-4, AC-5]
    - id: PHASE-3
      name: Chat settings UI
      work: Build ChatSettingsPage header, summary, SettingsTabs, Plan placeholder, Tasks placeholder/existing surface, Files tab, and Usage tab.
      covers: [AC-2, AC-3, AC-4, AC-5]
    - id: PHASE-4
      name: Share replacement
      work: Build ChatSettingsShareSection with initial/generated/QR/URL states on existing encrypted share helpers and keep embed sharing unchanged.
      covers: [AC-6, AC-7]
    - id: PHASE-5
      name: Deploy and confirm
      work: Deploy, run green Playwright suite, record evidence, and request user visual confirmation.
      covers: [AC-1, AC-2, AC-3, AC-4, AC-5, AC-6, AC-7]

