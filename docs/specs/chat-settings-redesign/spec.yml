scenarios:
  - id: S-1
    title: Share button opens chat settings Share tab inside Settings
    given:
      - Alice is authenticated and viewing an owned non-public, non-incognito chat titled Embedded software development.
    when:
      - Alice clicks the active-chat Share button.
    then:
      - The existing Settings shell opens instead of a separate overlay.
      - Breadcrumb shows Settings / Chats and can return to main Settings.
      - The chat settings page opens on the Share tab.
      - The old standalone chat details/share overlay is not shown and has no remaining product render path.

  - id: S-2
    title: Chat settings header and tabs match the Figma structure
    given:
      - Alice opens chat settings for a chat with title, category/icon metadata, summary, and usage credits.
    when:
      - The settings page renders on mobile or desktop.
    then:
      - The header shows the chat icon, chat title, chat gradient background, and total credits used by the chat.
      - The chat summary appears below the header and above the tabs.
      - SettingsTabs renders Plan, Tasks, Files, Usage, and Share in that order.
      - Plan tab renders a Coming soon placeholder for the first slice.

  - id: S-3
    title: Deep links can open any chat settings tab
    given:
      - Alice has a loaded chat and an external UI action requests chat settings.
    when:
      - The action deep-links to Plan, Tasks, Files, Usage, or Share.
    then:
      - The same chat settings route opens inside Settings.
      - The requested tab is active.
      - Unsupported or missing tab values fall back to Plan without breaking the breadcrumb.

  - id: S-4
    title: Files tab lists only downloadable chat items
    given:
      - Alice's chat references downloadable embeds such as code, images, audio, PDFs, design icons, docs, and sheets.
      - The same chat also references non-downloadable result cards or embeds.
    when:
      - Alice opens the Files tab.
    then:
      - Only downloadable embed/file items are listed.
      - Each row shows an icon/type, title or filename, useful metadata such as line count, dimensions, file size, language, or source path when available, and a download action.
      - Non-downloadable references are omitted from the primary list.
      - The Download files action downloads all listed downloadable items using existing client-side download/export utilities where possible.

  - id: S-5
    title: Usage tab shows local chat usage and exports it
    given:
      - Alice's chat has local message metadata with provider/app/skill labels, timestamps, tokens, words, and credit costs where available.
    when:
      - Alice opens the Usage tab.
    then:
      - The tab shows a total and grouped usage rows similar to the Figma chat_usage frame, including provider/app labels, timestamps, and credit counts where local metadata exists.
      - Rows show provider/app context and credit amounts when known.
      - Download usage data offers CSV and YAML exports without new backend calls.

  - id: S-6
    title: Share tab replaces old chat share UI and preserves behavior
    given:
      - Alice owns an encrypted chat with a locally available chat key.
    when:
      - Alice opens Share, configures options, clicks Share chat, copies the link, shows QR code, shows URL, stops sharing, or downloads the chat.
    then:
      - The UI follows the Figma chat_share states for initial, generated, QR, and URL reveal.
      - Generated state supports Show QR code/Hide QR code and Show URL/Hide URL toggles without changing the generated link.
      - The generated URL preserves the existing zero-knowledge format with secrets in the fragment.
      - Durable short-link creation and long-link fallback behave as they do today.
      - Existing password protection, expiration, community share, stop sharing, copy, QR, URL reveal, and download chat behavior remain available.

  - id: S-7
    title: Embed sharing is unchanged
    given:
      - Alice opens a shareable embed fullscreen or embed context menu.
    when:
      - Alice chooses Share for the embed.
    then:
      - The existing embed share UI and behavior remain unchanged.
      - Chat settings Share tab is not used for embed sharing in this slice.

