clarification:
  rounds:
    - question: Should chat settings open in the existing Settings panel or as a separate overlay?
      answer: >
        Use the same logic as old share-chat settings: open inside the settings
        page via deep link, not accessible from regular settings navigation, with
        breadcrumb back to the main settings page.
    - question: Should default tab depend on entry point or remember the last-used tab?
      answer: >
        If the user presses Share, deep link to the Share tab. Deep links to other
        tabs must also be supported.
    - question: Should the old generic SettingsShare UI be reused or replaced?
      answer: >
        The new Share tab in the chat settings page completely replaces the old
        chat-sharing component UI.
    - question: Should embed sharing move to the new Figma Share tab too?
      answer: Keep the existing embed sharing flow unchanged for now.
    - question: Should the first slice add backend APIs or stay local-first?
      answer: >
        Use local-first chat settings with no new backend APIs. Reuse existing
        task and share APIs only where existing behavior already needs them.
  vision_summary: >
    Chat settings should be a deep-linked settings page, not a separate overlay
    or normal settings navigation item. The page uses a chat hero header,
    summary, SettingsTabs for Plan/Tasks/Files/Usage/Share, a first-slice Plan
    placeholder, downloadable-only Files rows, and a new Figma-guided chat Share
    tab while preserving the existing zero-knowledge share contract and leaving
    embed sharing unchanged.
  approved_by_user: true

