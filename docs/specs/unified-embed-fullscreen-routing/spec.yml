schema_version: 2
id: unified-embed-fullscreen-routing
title: Unified Embed Fullscreen Routing
status: approved

goal: >
  Replace split embed fullscreen routing with one web controller that owns target
  resolution, URL hash updates, parent-child navigation, and close/back stack
  behavior for chat, example chats, grouped embeds, and shared embed pages. Child
  embed links and deep links open the child directly; selecting a child from a
  parent fullscreen transitions to the child while preserving a visible return to
  the parent. After web verification and user confirmation on dev, implement the
  same parent-child fullscreen routing semantics in Apple.

scope:
  in:
    - Web embed fullscreen routing for chat, public example chats, grouped parent embeds, child previews, inline links, source quotes, and shared embed pages.
    - One controller owns fullscreen target resolution, active fullscreen state, navigation stack, and URL/hash writes.
    - Registry-driven direct child fullscreen support for all fullscreen-capable registered child embed types.
    - Parent fullscreen selection opens the parent; child selection or child deep link opens the child directly.
    - Selecting a child from inside a parent fullscreen visually transitions over the parent and records the parent as the previous visible state.
    - Close, minimize, Escape, and browser Back restore the previous visible state when one exists, otherwise return to chat/page content.
    - Existing example chat and public share deep-link behavior uses the same controller as authenticated chat.
    - Models3D and Weather child fullscreen regressions are covered by the unified routing tests.
    - Update or supersede conflicting spec text that expected standalone child links to resolve to parent fullscreen with a focused child.
    - Apple parity audit and implementation after web automated tests pass and user confirms deployed dev behavior.
  out:
    - More Models3D-only routing patches that bypass the shared controller.
    - Maintaining a compatibility bridge where child deep links resolve to parent fullscreen.
    - Backend embed schema changes or migrations.
    - New embed types or new provider integrations.
    - Apple implementation before web automated verification and user confirmation.
    - Production data migration.
  deferred:
    - Broader visual redesign of embed fullscreen chrome.
    - Apple parity work if web user confirmation requests product changes that alter the contract.

context_discovery:
  github_issues:
    - "#454 Weather forecast child day fullscreen does not open from forecast grid: same parent-child fullscreen failure class."
    - "GitHub MCP returned 401 bad credentials; `gh issue list` fallback was used for issue discovery."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/frontend/data-driven-embed-fullscreen-routing.md
    - docs/architecture/messaging/embeds.md
    - docs/specs/example-chat-public-quality/spec.yml
    - docs/specs/models3d-search/spec.yml
    - docs/specs/content-embed-example-chats/spec.yml
    - docs/architecture/apple/parity-matrix.md
  code_patterns:
    - frontend/packages/ui/src/components/ActiveChat.svelte currently owns main fullscreen state, event handling, and rendering.
    - frontend/packages/ui/src/services/embedStore.ts currently owns `resolveFullscreenTarget(...)` and raw/static embed metadata lookup.
    - frontend/packages/ui/src/demo_chats/exampleChatStore.ts currently owns parallel example-chat fullscreen target resolution.
    - frontend/packages/ui/src/stores/activeEmbedStore.ts currently owns URL/hash state but is written from multiple locations.
    - frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/GroupRenderer.ts dispatches child fullscreen events from grouped previews.
    - frontend/packages/ui/src/components/embeds/SearchResultsTemplate.svelte owns parent grid child selection and initial child opening behavior.
    - frontend/apps/web_app/src/routes/+page.svelte currently performs example-chat deep-link handling and active embed writes.
    - frontend/apps/web_app/src/routes/share/embed/[embedId]/+page.svelte dispatches fullscreen from shared embed pages.
    - frontend/packages/ui/src/data/embedRegistry.generated.ts lists registered fullscreen components and normalized embed types.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift owns top-level selected embed fullscreen state.
    - apple/OpenMates/Sources/Features/Embeds/Grouping/EmbedFullscreenContainer.swift owns grouped child fullscreen state.
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedFullscreenView.swift owns nested child overlay state.
  tests:
    - frontend/apps/web_app/tests/models3d-example-chat.spec.ts
    - frontend/apps/web_app/tests/helpers/embed-test-helpers.ts
    - frontend/packages/ui/src/data/__tests__/embedRegistry.test.ts
    - new frontend/packages/ui/src/services/__tests__/embedFullscreenController.test.ts
    - new or updated frontend/apps/web_app/tests/embed-fullscreen-routing.spec.ts

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Features/Embeds/Grouping/EmbedFullscreenContainer.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedFullscreenView.swift
  parity_expectations:
    - Apple uses one native routing owner for selected parent, selected child, visible navigation stack, and dismissal behavior.
    - Native child deep links open children directly and do not route through parent fullscreen unless the user selected the child from a parent fullscreen.
    - Native close/back behavior mirrors web after web behavior is deployed and confirmed by the user.
  verification:
    - Apple implementation starts only after web automated tests pass on deployed dev and the user confirms the deployed web UX.
    - Run `python3 scripts/apple_remote.py status` before native verification and use the appropriate remote build/test command if available.
  intentional_native_differences:
    - Platform presentation chrome may remain native, but route targets and visible back-stack semantics must match web.

clarification:
  rounds:
    - question: Should clicking or deep-linking a child embed open the child directly or open the parent fullscreen with the child focused?
      answer: >
        Open the child directly. Parent routing for standalone child embeds was an
        unintended glitch behavior.
    - question: When a user selects a child from a parent fullscreen, should the child become the canonical active route?
      answer: >
        Yes. The UI should transition visually over the parent, but the canonical
        active route becomes the child.
    - question: How should close, minimize, and browser Back behave after a child was opened?
      answer: >
        Child from chat or direct deep link returns to chat. Child from parent
        fullscreen returns to the parent fullscreen. Parent from chat returns to
        chat. Browser Back mirrors the same visible navigation stack.
    - question: Should the fix be a narrow Models3D compatibility patch or a full migration?
      answer: >
        Full migration. Only one unified controller should own fullscreen target
        resolution and URL/hash updates.
    - question: When should Apple parity be implemented?
      answer: >
        After automated web tests pass and the user inspects the deployed dev web
        behavior.
  vision_summary: >
    Embed fullscreen routing should behave like a normal product navigation stack
    instead of type-specific event patches. Direct child entry opens the child;
    parent-origin child entry preserves a parent return point; and one controller
    owns all target resolution and URL state before Apple repeats the pattern.
  approved_by_user: true

