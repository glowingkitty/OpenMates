implementation_plan:
  spec_path: docs/specs/unified-embed-fullscreen-routing/spec.yml
  existing_patterns:
    - frontend/packages/ui/src/services/embedStore.ts
    - frontend/packages/ui/src/stores/activeEmbedStore.ts
    - frontend/packages/ui/src/components/ActiveChat.svelte
    - frontend/packages/ui/src/components/embeds/SearchResultsTemplate.svelte
    - docs/architecture/frontend/data-driven-embed-fullscreen-routing.md
  architecture: >
    Add a unified web embed fullscreen controller service that composes existing
    registry metadata, embed lookup, and active hash state. Migrate opener
    surfaces to call controller helpers instead of dispatching ad hoc events or
    writing active hash state directly. ActiveChat and route bootstrap consume the
    controller's state and render the resolved canonical target.
  data_flow:
    - Opener calls `resolveEmbedFullscreenTarget` with target embed ID and optional context.
    - Controller resolves registered fullscreen capability and canonical target.
    - Controller records previous visible state when origin is a parent fullscreen.
    - Controller writes active route/hash for the canonical target.
    - ActiveChat or the page-level fullscreen host renders the controller target.
    - Close/back asks the controller to restore previous visible state or clear fullscreen.
  affected_files:
    - path: frontend/packages/ui/src/services/embedFullscreenController.ts
      reason: New unified controller service.
    - path: frontend/packages/ui/src/services/embedStore.ts
      reason: Move or delegate target resolution into the controller.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Remove competing example target resolver.
    - path: frontend/packages/ui/src/stores/activeEmbedStore.ts
      reason: Restrict active route writes behind controller helpers.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Consume controller state and close/back behavior.
    - path: frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/GroupRenderer.ts
      reason: Replace direct fullscreen event dispatch with controller opener.
    - path: frontend/packages/ui/src/components/embeds/SearchResultsTemplate.svelte
      reason: Use controller for child selection and parent-origin stack recording.
    - path: frontend/packages/ui/src/components/embeds/EmbedInlineLink.svelte
      reason: Use controller for inline opener routing.
    - path: frontend/packages/ui/src/components/embeds/SourceQuoteBlock.svelte
      reason: Use controller for quote opener routing.
    - path: frontend/apps/web_app/src/routes/+page.svelte
      reason: Use controller for example-chat deep links and route bootstrap.
    - path: frontend/apps/web_app/src/routes/share/embed/[embedId]/+page.svelte
      reason: Use controller for shared embed page fullscreen open.
    - path: frontend/apps/web_app/tests/models3d-example-chat.spec.ts
      reason: Preserve existing regression coverage.
    - path: frontend/apps/web_app/tests/embed-fullscreen-routing.spec.ts
      reason: Add generic parent-child route stack coverage.
    - path: scripts/audit_embed_fullscreen_routing.py
      reason: Deterministically prevent reintroducing split ownership.
    - path: docs/specs/example-chat-public-quality/spec.yml
      reason: Supersede conflicting expected child deep-link behavior.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/unified-embed-fullscreen-routing/spec.yml
    - python3 scripts/tests.py run -- --suite vitest
    - python3 scripts/audit_embed_fullscreen_routing.py
    - deploy scoped web changes to dev
    - python3 scripts/tests.py run -- --spec models3d-example-chat.spec.ts
    - python3 scripts/tests.py run -- --spec embed-fullscreen-routing.spec.ts
    - user confirmation on app.dev.openmates.org
    - Apple parity implementation and remote/static verification after user confirmation
  verification_order:
    - Web unit/controller tests and deterministic audit before deploy
    - Deploy to dev
    - Web Playwright tests against app.dev.openmates.org
    - User confirmation of deployed dev web behavior
    - Apple static audit, implementation, and remote build/test when available

