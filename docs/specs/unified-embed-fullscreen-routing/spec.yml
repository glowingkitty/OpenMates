scenarios:
  - id: S-1
    title: Child deep link opens direct child fullscreen
    given:
      - A public example chat contains a Models3D search parent embed and registered Models3D result child embeds.
      - The URL hash targets one child embed ID.
    when:
      - The page loads on the deployed dev web app.
    then:
      - The Models3D result child fullscreen is visible.
      - The parent fullscreen grid is not the canonical active route.
      - Closing the child returns to the example chat content.
  - id: S-2
    title: Parent fullscreen child selection preserves parent return state
    given:
      - A user opens a parent search-style fullscreen from chat.
      - The parent fullscreen displays child preview cards.
    when:
      - The user selects a child preview.
    then:
      - The child fullscreen opens and the active URL/hash targets the child.
      - Closing the child returns to the parent fullscreen.
      - Closing the parent returns to chat.
  - id: S-3
    title: Browser Back mirrors visible fullscreen stack
    given:
      - A user opens a parent fullscreen from chat and then opens a child from that parent.
    when:
      - The user presses browser Back once.
    then:
      - The parent fullscreen is visible again.
    when:
      - The user presses browser Back again.
    then:
      - Fullscreen is dismissed and chat content is visible.
  - id: S-4
    title: Multiple opener surfaces use the same controller
    given:
      - A fullscreen-capable embed can be opened from a chat preview, grouped child preview, inline embed link, source quote, example chat deep link, and shared embed page.
    when:
      - Each opener requests fullscreen.
    then:
      - The same controller resolves the target and writes active route state.
      - No opener directly writes hash state or bypasses target resolution.
  - id: S-5
    title: Weather child result opens from forecast grid
    given:
      - A Weather forecast parent fullscreen displays day child previews.
    when:
      - The user opens a day child preview.
    then:
      - The Weather child fullscreen is visible.
      - The active route targets the child directly.
      - Close returns to the forecast parent fullscreen.
  - id: S-6
    title: Apple mirrors confirmed web routing semantics
    given:
      - Web automated tests pass on deployed dev.
      - The user confirms the deployed web fullscreen behavior.
    when:
      - Native chat or grouped embed UI opens a parent or child fullscreen.
    then:
      - Native route target and visible close/back semantics match web.

