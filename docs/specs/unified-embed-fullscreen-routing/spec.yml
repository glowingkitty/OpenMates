risks:
  - id: R-1
    text: Existing opener surfaces may rely on event timing from `embedfullscreen` dispatches.
    mitigation: Keep opener helper API synchronous for request dispatch and cover event replacement with Playwright flows.
  - id: R-2
    text: Example-chat and authenticated-chat embed lookup paths differ.
    mitigation: Controller accepts an explicit lookup context and tests both raw/static and live embed lookup.
  - id: R-3
    text: Browser history integration can create duplicate entries or broken Back behavior.
    mitigation: Unit-test stack transitions and verify browser Back in deployed Playwright tests.
  - id: R-4
    text: Apple may need native navigation refactoring beyond simple file-local changes.
    mitigation: Keep Apple task gated and update native architecture only after web behavior is stable.

open_questions:
  - id: OQ-1
    text: None for the approved web contract. Apple implementation details remain gated until web confirmation.
    status: closed
