contracts:
  api:
    - No backend API contract change.
  data:
    - Existing persisted chat embed payloads remain unchanged.
    - Fullscreen navigation stack is client UI state only.
    - Active route hash stores the canonical visible target, not an inferred parent target for child embeds.
  ui_states:
    - Chat content with no fullscreen active.
    - Parent fullscreen active from chat or direct parent link.
    - Child fullscreen active from chat or direct child link.
    - Child fullscreen active from parent fullscreen with parent in previous visible stack.
    - Shared embed page fullscreen active.
    - Missing or unregistered target shows the existing visible error/logged failure path without silent fallback to an unrelated parent.
  privacy_security:
    - The controller must not expose private embed payload data in URLs beyond existing embed IDs/hash state.
    - No new logging of decrypted embed content.

