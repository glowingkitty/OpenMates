decisions:
  - id: D-1
    status: active
    decision: Child embed links and deep links open the child directly.
    reason: Parent-routing standalone child embeds was unintended glitch behavior.
    decided_at: "2026-07-16"
  - id: D-2
    status: active
    decision: Selecting a child from parent fullscreen makes the child the canonical active route while preserving the parent as the previous visible state.
    reason: URL/history should represent the visible child and still support intuitive close/back navigation.
    decided_at: "2026-07-16"
  - id: D-3
    status: active
    decision: Remove split resolver/hash ownership rather than keeping a compatibility bridge.
    reason: Existing duplicated ownership caused repeated Models3D-specific and Weather-specific regressions.
    decided_at: "2026-07-16"
  - id: D-4
    status: active
    decision: Apple parity waits until deployed web behavior is test-green and user-confirmed.
    reason: Avoid duplicating unstable web behavior in native code.
    decided_at: "2026-07-16"

