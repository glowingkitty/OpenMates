risks:
  - Windowed rendering can break scroll restoration if message heights change after embed previews hydrate.
  - Deferring full embed hydration can expose missing preview metadata in older embeds that were created before lightweight preview fields existed.
  - Shared-chat endpoint changes must preserve non-enumeration behavior for missing/private chats.
  - Large ref-index repair scans can reappear if inline embed links do not get lightweight ref metadata.
    - E2E performance assertions must avoid brittle timing thresholds while still proving bounded work.
    - Large-chat tests must use seeded/mocked messages and embeds; no test may trigger real AI inference to generate or process a 1000-message chat.
    - Compression target-message links may require a server query by message id instead of timestamp-only paging to avoid loading many forgotten pages.

open_questions:
  - Which exact preview metadata schema should be standardized for each app/skill parent embed type?
  - Should legacy embeds without preview metadata be upgraded lazily on first open or handled with a fallback preview-only hydration budget?
  - Should full ChatHistory virtualization be implemented immediately, or is bounded message-window rendering enough for the first deployable slice?
  - Should shared-chat compression checkpoints be included in the new manifest response on day one, or should compressed shared chats use a backward-compatible full import until checkpoint windowing is added?
