clarification:
  rounds:
    - question: Should embed previews be strictly metadata-only until click, or may visible previews lazily load a capped subset of child metadata such as thumbnails?
      answer: >
        Embed previews must stay useful. Search/image previews should include the
        image links, result counts, and first preview thumbnails/URLs needed for
        the card. They must not decrypt/load child embeds until the user actively
        opens the embed, but parent embed metadata should contain enough preview
        fields to render the lightweight card.
    - question: When opening an existing chat, should the default behavior load/render the latest message window first and target message windows for deep links?
      answer: >
        Yes. Initial open should show the latest conversation turn: the last user
        message, the last assistant response, and whatever immediately precedes
        them within the viewport. Older messages load as the user scrolls upward.
        Message or embed deep links should load the target window instead.
    - question: Should the first implementation include both authenticated owner chats and shared-chat recipients?
      answer: >
        Both owner chats and shared chats must be fixed in a unified way where it
        is reasonable.
    - question: Should the spec enforce hard performance targets?
      answer: >
        Do not overfit to hard targets yet. Optimize as well as reasonably
        possible and enforce bounded-work behavior instead of a fragile exact
        latency number.
    - question: Should message-specific deep links and copy-link actions be included in the same plan?
      answer: >
        Yes. Add deep links to specific messages and a message context-menu
        "Copy link" action. Opening such a URL should load and scroll to that
        message rather than the latest turn, and the target message should show
        an orange border while the message hash is active.
  vision_summary: >
    Users expect chats to open like scalable chat applications: a bounded visible
    window is loaded first, older content hydrates on scroll, and deep links load
    the target window. Embed cards must remain informative, but preview metadata
    belongs on the parent/lightweight record and child/full content is hydrated
    only for explicit actions such as fullscreen, inline embed link navigation,
    copy, download, or memory save. The same product guarantees apply to owner
    chats and shared-chat recipients.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Owner opens a large chat at the latest conversation turn
    given:
      - Alice is authenticated.
      - Alice owns a chat with 1000 messages and 500 embeds.
      - The latest conversation turn is one user message followed by one assistant response.
    when:
      - Alice opens or reloads the chat without a message-id or embed-id hash target.
    then:
      - OpenMates loads a bounded message window around the latest conversation turn.
      - The last user message and last assistant response are visible after initial render.
      - Older messages outside the initial window are not decrypted or rendered until Alice scrolls upward.
      - Even after more pages are hydrated, ChatHistory mounts only viewport messages plus overscan, not every loaded or cached message.
      - The browser remains responsive during initial load.

  - id: S-2
    title: Shared-chat recipient opens a large shared chat using the same window model
    given:
      - Bob opens a valid shared-chat link.
      - The shared chat has many messages and a dense parent/child embed graph.
    when:
      - Bob opens the shared-chat URL.
    then:
      - The share loader validates the link and imports enough metadata/key material to render the first bounded window.
      - Bob is navigated to the normal chat view after the first bounded window is ready, not after every message and embed is fully hydrated.
      - Older message pages and non-visible embeds hydrate in the background or on demand.
      - Shared-chat access remains zero-knowledge; the URL fragment key is not sent to the server.

  - id: S-3
    title: Lightweight search/image embed preview does not load child embeds
    given:
      - A visible assistant message contains an image-search parent embed with 10 child image-result embeds.
      - The parent embed stores preview metadata including result count and the first preview thumbnail URLs.
    when:
      - The message enters the visible chat window.
    then:
      - The image-search preview shows useful metadata, result count, and the capped preview thumbnails.
      - The preview does not decrypt or load child image-result embed content.
      - Child embed content is loaded only when the user opens the embed fullscreen or performs an explicit action that needs child content.

  - id: S-4
    title: Inline embed links remain reliable without eager hydration
    given:
      - An assistant message contains inline links such as [source](embed:source-ref) and large preview links such as [!](embed:source-ref).
      - The target embed content has not been fully decrypted during chat open.
    when:
      - The message renders in the visible window.
    then:
      - Inline embed links render with the correct label and app styling from lightweight ref metadata when available.
      - Clicking an inline embed link loads the target embed content on demand and opens the correct fullscreen view.
      - Missing ref metadata shows a recoverable loading state rather than triggering broad IndexedDB scans or all-embed decryption.

  - id: S-5
    title: Message deep link loads and highlights the target message
    given:
      - Alice has a link in the form /#chat-id=<CHAT_ID>&message-id=<MESSAGE_ID>.
      - The target message is far above the latest conversation turn.
    when:
      - Alice opens the link.
    then:
      - OpenMates loads a bounded message window around the target message.
      - The target message scrolls into view.
      - The target message shows an orange border while the URL hash points to that message.
      - The latest conversation turn is not loaded first unless it overlaps the target window.

  - id: S-6
    title: Message context menu copies a message-specific link
    given:
      - Alice opens a chat message context menu from mouse, keyboard, or touch.
      - The message has a stable message_id.
    when:
      - Alice chooses Copy link.
    then:
      - The clipboard receives a same-origin URL containing chat-id and message-id hash parameters.
      - OpenMates shows a copy confirmation.
      - Opening the copied link follows the target-message loading and orange-highlight behavior.

  - id: S-7
    title: Dense large-preview carousel only hydrates visible slides
    given:
      - A visible assistant message contains a carousel run of 20 large embed previews.
    when:
      - The message enters the visible chat window.
    then:
      - Only the active slide and a small overscan of adjacent slides mount embed preview renderers.
      - Hidden slides do not resolve, decrypt, decode, or render full previews until selected or near-selected.
      - Carousel navigation loads newly selected slides on demand without breaking swipe, keyboard, or dot navigation.

  - id: S-8
    title: Upward scroll hydrates older messages without resetting current view
    given:
      - Alice has opened a large chat at the latest conversation turn.
      - Older messages are not yet loaded in the visible message store.
    when:
      - Alice scrolls upward near the top of the loaded window.
    then:
      - OpenMates fetches/decrypts the next older message window.
      - The scroll anchor is preserved so content does not jump.
      - Embed previews in newly visible older messages follow the same lightweight preview rules.

  - id: S-9
    title: Compressed chat opens at the summary and recent window
    given:
      - Alice owns a chat with a latest compression checkpoint.
      - The checkpoint summarizes older messages up to compressed_up_to_timestamp.
      - The chat has recent messages after that checkpoint.
    when:
      - Alice opens or reloads the chat without a target message before the checkpoint.
    then:
      - OpenMates loads the latest compression checkpoint and decrypts its summary for display.
      - The initial window contains the compression summary and recent post-checkpoint messages.
      - Forgotten messages before compressed_up_to_timestamp are not loaded or decrypted during initial open.
      - Choosing Show earlier messages requests a bounded old-message page for the checkpoint and preserves the current view.
      - If a message deep link targets a forgotten message, OpenMates loads the bounded checkpoint old-message page needed to reveal and highlight that target.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Owner chat open reads/decrypts only a bounded latest-turn message window before first useful render, and ChatHistory mounts only viewport messages plus overscan rather than every loaded or cached message.
  - id: AC-2
    scenario: S-2
    text: Shared-chat open uses the same bounded message and visible-embed hydration model rather than importing all content before navigation.
  - id: AC-3
    scenario: S-3
    text: Search and image previews render useful parent metadata while avoiding child embed content hydration before explicit user action.
  - id: AC-4
    scenario: S-4
    text: Inline embed links and large preview links resolve and open on demand without forcing full chat/embed graph hydration.
  - id: AC-5
    scenario: S-5
    text: Chat URLs with message-id load a target message window, scroll the target into view, and apply an orange highlight while the hash target remains active.
  - id: AC-6
    scenario: S-6
    text: Message context menus include Copy link and copy a same-origin chat/message URL that reopens the target message.
  - id: AC-7
    scenario: S-7
    text: Large-preview carousel rendering is windowed to active/near-active slides and does not mount every slide at once.
  - id: AC-8
    scenario: S-8
    text: Upward scroll loads older message windows while preserving scroll position and lightweight embed behavior.
  - id: AC-9
    scenario: S-9
    text: Compressed chats initially render the latest summary plus recent messages and load forgotten pre-checkpoint messages only through explicit show-earlier or target-message hydration.

contracts:
  api:
    - route: GET /v1/share/chat/{chat_id}
      request: "Existing route remains valid during migration."
      response: "May include backward-compatible full payload while new windowed shared-chat endpoints are added."
      errors:
        - Returns dummy encrypted data for unavailable private/missing chats as today.
    - route: GET /v1/share/chat/{chat_id}/manifest
      request: "chat_id path parameter; URL fragment key remains client-only"
      response: "Encrypted chat metadata, message count, embed count, latest/target cursor hints, share flags, and lightweight embed preview metadata where available."
      errors:
        - Same unavailable-chat dummy/non-enumeration behavior as existing shared-chat route.
    - route: GET /v1/share/chat/{chat_id}/messages
      request: "cursor/anchor message id, direction, limit"
      response: "Encrypted message window plus minimal referenced embed preview metadata and key wrappers needed for that window."
      errors:
        - Same unavailable-chat dummy/non-enumeration behavior as existing shared-chat route.
    - route: WebSocket request_chat_content_batch or successor
      request: "chat id plus optional anchor message id, direction, and limit"
      response: "Encrypted bounded message window, embed preview metadata, embed keys needed for visible-window previews, and version data."
      errors:
        - Unauthorized when the user cannot access the chat.
    - route: WebSocket get_compressed_chat_old_messages or successor
      request: "chat id, checkpoint id, before timestamp, optional target message id, and bounded limit"
      response: "Encrypted bounded old-message window before the checkpoint plus has_more/cursor metadata."
      errors:
        - Unauthorized when the user cannot access the chat.
        - Compression checkpoint not found when the checkpoint does not belong to that user/chat.
  data:
    - Add or expose IndexedDB message-window read APIs using the existing chat_id_created_at index.
    - Keep existing full getMessagesForChat for export/debug/fork paths that explicitly require all messages.
    - Store lightweight embed preview metadata separately from encrypted full child content when needed for preview cards.
    - Persist local hydration ranges/manifests for owner and shared chats so reloads can resume partial hydration safely.
    - Keep child embed content encrypted and load/decrypt it on explicit fullscreen/open/copy/download/memory actions.
    - Store compression checkpoints as lightweight chat-window metadata and do not treat forgotten pre-checkpoint messages as part of the default latest-turn window.
  ui_states:
    - Initial latest-turn loading.
    - Target-message loading.
    - Older-window loading while scrolling upward.
    - Viewport virtualization with overscan before and after the visible messages.
    - Compression summary visible with forgotten messages collapsed.
    - Forgotten pre-checkpoint messages loading after Show earlier messages or target-message hydration.
    - Lightweight embed preview loaded.
    - Full embed content loading after explicit action.
    - Target message highlighted with orange border while hash target is active.
    - Recoverable missing embed-ref metadata state.
  privacy_security:
    - Shared-chat URL fragment keys must never be sent to the server.
    - Server responses remain encrypted; client-only decryption continues.
    - Preview metadata must not expose more than the parent embed already exposes to the chat recipient.
    - Message Copy link must not include plaintext message content, PII, raw logs, or secrets.
    - Compression summaries and forgotten-message windows remain client-encrypted and owner-authorized; shared-chat import must not expose checkpoint keys outside the existing share-key model.

