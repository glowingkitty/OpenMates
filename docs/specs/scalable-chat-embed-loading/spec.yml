id: scalable-chat-embed-loading
title: Scalable Chat And Embed Loading
status: implementing

goal: >
  Make owner chats and shared chats open reliably and quickly regardless of total
  message or embed count by loading a bounded visible message window first,
  rendering only visible chat content, and keeping embed previews lightweight
  until a user explicitly opens an embed or follows an embed/message deep link.

scope:
  in:
    - Authenticated owner chat opening and reload behavior.
    - Shared-chat recipient opening and reload behavior.
    - Initial chat viewport anchored around the latest user/assistant turn unless a message or embed deep link targets another location.
    - Paged/windowed IndexedDB message reads for chat open, upward scroll hydration, and target-message hydration.
    - ChatHistory rendering bounded to messages currently in the viewport plus overscan before and after the viewport for smooth scrolling.
    - Lightweight embed preview metadata for all embed types, including search result counts and the first preview thumbnails/URLs needed for the card.
    - Deferring child embed content decryption and full embed content loading until explicit fullscreen/open/copy/download/memory actions require it.
    - Inline embed links in assistant messages resolving reliably without eager child-content hydration.
    - Message deep links using URL hash parameters, target-message window loading, scroll-to-message, and orange highlight border while the hash target is active.
    - Message context menu action to copy a link to a specific message.
    - Compression-aware chat windows that show the latest compression summary without loading forgotten messages until requested.
    - Shared-chat loading changes that reuse the same windowed message and visible-embed hydration model where practical.
    - Regression tests and debug counters proving bounded work for large chats and dense embed graphs.
    - Synthetic large-chat test fixtures only; tests must not run real AI inference to create or exercise 1000-message chats.
  out:
    - Replacing the existing zero-knowledge encryption model.
    - Removing useful embed previews or reducing previews to generic placeholders.
    - Loading all child embeds for preview-only rendering.
    - Running generated application live previews automatically on chat load.
    - Changing billing, permissions, chat ownership, or share-link access rules.
    - Real model inference as part of scalable-loading tests or seeded 1000-message fixture generation.
    - Full native Apple implementation in this first web-focused spec.

