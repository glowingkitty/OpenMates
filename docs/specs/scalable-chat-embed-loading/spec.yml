implementation_plan:
  existing_patterns:
    - Authenticated startup sync already uses bounded metadata/full-content phases in docs/architecture/data/sync.md.
    - Phase 1b embed sync already uses embedStore.putEncryptedBatch for large embed batches.
    - ReadOnlyMessage already lazily creates TipTap editors when messages enter the viewport.
    - Deep-link parsing already supports chat-id, message-id/message_id, embed-id/embed_id, and latest-response scroll.
    - Chat compression checkpoints already store encrypted summaries separately and expose get_compressed_chat_old_messages for explicit forgotten-history expansion.
  architecture: >
    Introduce a chat content window abstraction used by owner and shared chats.
    The active chat store keeps a bounded hydrated message window plus hydration cursors,
    while IndexedDB and shared-chat endpoints expose bounded message windows.
    Embed previews render from lightweight parent preview metadata and defer child
    or full-content hydration to explicit user actions. ChatHistory is virtualized
    so message and large-preview component mount counts scale with viewport size and overscan,
    not total chat history.
  data_flow:
    - Chat open parses hash for chat-id, optional message-id, optional embed-id, and scroll intent.
    - ActiveChat requests a latest-turn or target-message window from local IndexedDB, WebSocket, or shared-chat HTTP window endpoints.
    - If the chat has a compression checkpoint, ActiveChat includes checkpoint metadata in the window and treats pre-checkpoint messages as a separate forgotten-history range.
    - ChatHistory renders only viewport messages plus overscan and asks for older windows as the user scrolls upward.
    - ChatHistory loads forgotten pre-checkpoint messages only after Show earlier messages or when a target-message link requires that range.
    - Embed preview components read preview metadata from parent/lightweight records and render only capped preview fields.
    - Full embed content and child embeds hydrate on explicit fullscreen/open/copy/download/memory actions.
    - Message Copy link writes a same-origin hash URL with chat-id and message-id.
  affected_files:
    - path: frontend/packages/ui/src/services/db/messageOperations.ts
      reason: Add bounded message window reads and keep full read for explicit all-message flows.
    - path: frontend/packages/ui/src/services/db.ts
      reason: Expose message window APIs.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Load latest-turn/target windows, handle message hash highlighting, and hydrate older windows.
    - path: frontend/packages/ui/src/components/ChatHistory.svelte
      reason: Render bounded message windows, preserve scroll anchors on older-window prepend, and keep compressed forgotten history collapsed until requested.
    - path: frontend/packages/ui/src/components/ChatMessage.svelte
      reason: Add Copy link action and target-message orange border state.
