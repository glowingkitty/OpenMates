id: passkey-linux-compatibility
title: Linux-Compatible Passkey Registration
status: approved

goal: >
  Improve passkey support for Linux users without weakening OpenMates'
  zero-knowledge encryption model. Passkeys must still require WebAuthn PRF,
  discoverable credentials, and user verification before any master key is
  wrapped or unwrapped.

scope:
  in:
    - Align WebAuthn registration and authentication options with backend user-verification enforcement.
    - Permit PRF-capable roaming authenticators such as USB security keys during passkey registration.
    - Add a registration fallback that derives the PRF output through an immediate WebAuthn assertion when creation does not return PRF results.
    - Keep password signup and existing login/recovery flows working.
  out:
    - Supporting non-PRF passkeys.
    - Supporting non-discoverable credentials for passwordless login.
    - Native Linux OS passkey provider work outside the browser.
    - Relaxing zero-knowledge master-key wrapping requirements.

context_discovery:
  github_issues:
    - "#55: implement passkeys with client-side encrypted chats, app settings, and memories"
    - "GitHub MCP issue search unavailable: 401 Bad credentials; gh CLI fallback used."
  docs:
    - docs/architecture/core/passkeys.md
    - docs/architecture/core/signup-and-auth.md
    - docs/architecture/core/master-key-lifecycle.md
    - docs/contributing/guides/spec-driven-development.md
  external_references:
    - "MDN WebAuthn extensions: PRF is available in create() and get(), but creation can report PRF enabled without returning evaluation results."
    - "Yubico PRF guide: robust registration enables PRF at creation, then derives the secret through authentication when needed."
    - "Google passkey support docs: Chrome on Linux supports passkeys via Google Password Manager."
    - "Mozilla WebAuthn discussion: Linux lacks a native platform passkey provider in Firefox context; USB security keys are a main Linux path."
  code_patterns:
    - backend/core/api/app/routes/auth_routes/auth_passkey.py
    - frontend/packages/ui/src/components/signup/steps/secureaccount/SecureAccountTopContent.svelte
    - frontend/packages/ui/src/components/signup/steps/passkey/PasskeyRegistrationBottomContent.svelte
    - frontend/packages/ui/src/components/settings/SettingsPasskeys.svelte
    - frontend/packages/ui/src/components/Login.svelte
  tests:
    - frontend/apps/web_app/tests/signup-flow-passkey.spec.ts
    - frontend/apps/web_app/tests/signup-skip-2fa-flow.spec.ts
    - frontend/apps/web_app/tests/recovery-key-login-flow.spec.ts
    - frontend/apps/web_app/tests/backup-code-login-flow.spec.ts
    - frontend/apps/web_app/tests/location-security-flow.spec.ts

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - No Apple app UI or native passkey implementation is changed by this web WebAuthn compatibility slice.
  verification:
    - Apple not affected; browser WebAuthn code only.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: For the first implementation slice, should all three safe changes be included now, or only the lower-risk backend option changes first?
      answer: All three now.
  vision_summary: >
    Keep passkeys secure and PRF-only, but stop unnecessarily excluding Linux-compatible security-key flows. Align requested WebAuthn options with backend enforcement and add a fallback for authenticators that support PRF but do not return PRF evaluation output during credential creation.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Linux user registers with a PRF-capable roaming authenticator
    given:
      - A user signs up in a browser with a discoverable, user-verifying, PRF-capable roaming authenticator.
    when:
      - The user selects passkey signup.
    then:
      - The browser is not restricted to platform authenticators only.
      - The passkey is created and the master key is wrapped using PRF-derived key material.
      - The user lands in chat after signup.

  - id: S-2
    title: Browser prompts for user verification consistently
    given:
      - A user registers or authenticates with passkey.
    when:
      - OpenMates sends WebAuthn options to the browser.
    then:
      - The options require user verification.
      - Backend verification no longer contradicts browser options by requiring verification after only preferring it.

  - id: S-3
    title: PRF is derived after creation when creation omits PRF output
    given:
      - "A browser or authenticator enables PRF during credential creation but does not return `prf.results.first` from `create()`."
    when:
      - The passkey registration flow continues.
    then:
      - "The client immediately performs a scoped `navigator.credentials.get()` for the newly-created credential."
      - "The client uses `get()` PRF output to wrap the master key."
      - Registration is blocked if PRF output is still missing.

  - id: S-4
    title: Existing auth flows keep working
    given:
      - Existing password, recovery-key, backup-code, and location re-auth flows are available.
    when:
      - The passkey compatibility changes are deployed.
    then:
      - Signup and login-related Playwright specs continue to pass against app.dev.openmates.org.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: "Passkey registration options no longer force `authenticatorAttachment: platform`, while still requiring resident/discoverable credentials and PRF validation."
  - id: AC-2
    scenario: S-2
    text: "Registration and authentication options request `userVerification: required` wherever backend verification requires user verification."
  - id: AC-3
    scenario: S-3
    text: "Registration uses PRF output from `create()` when available and falls back to immediate `get()` for the new credential when needed."
  - id: AC-4
    scenario: S-4
    text: Passkey, signup, and login-related E2E specs pass after deployment to Vercel dev.

contracts:
  api:
    - route: POST /v1/auth/passkey/registration/initiate
      response: "PublicKeyCredentialCreationOptions"
      changes:
        - "`authenticatorSelection.residentKey` remains `required`."
        - "`authenticatorSelection.userVerification` becomes `required`."
        - "`authenticatorSelection.authenticatorAttachment` is omitted to allow platform and cross-platform authenticators."
    - route: POST /v1/auth/passkey/assertion/initiate
      response: "PublicKeyCredentialRequestOptions"
      changes:
        - "`userVerification` becomes `required`."
  data:
    - No schema changes.
    - Stored passkey rows and encrypted master-key blobs keep the same format.
  ui_states:
    - Passkey signup success.
    - PRF unsupported error with password fallback.
    - Passkey cancellation leaves the user on the secure-account choice.
  privacy_security:
    - PRF remains mandatory.
    - Master key is never sent to the server in plaintext.
    - Non-user-verified assertions remain rejected.
    - Non-discoverable credentials remain unsupported for passwordless login.

