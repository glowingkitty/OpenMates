implementation_plan:
  existing_patterns:
    - backend/core/api/app/routes/auth_routes/auth_passkey.py manually adds PRF extension to py_webauthn options.
    - SecureAccountTopContent.svelte and SettingsPasskeys.svelte both extract PRF output before wrapping the master key.
    - "signup-flow-passkey.spec.ts uses Chrome DevTools virtual authenticators with `hasPrf: true`."
  architecture: >
    Keep the server-side WebAuthn and storage contract unchanged. Relax only the authenticator attachment selector, tighten user-verification options to match backend requirements, and add a client-side helper that can derive PRF through an immediate assertion for a newly-created credential when creation output is incomplete.
  data_flow:
    - Client asks server for registration options.
    - Browser creates a discoverable PRF-capable credential with required user verification.
    - Client reads PRF output from create() or falls back to get() scoped to the new credential.
    - Client derives the wrapping key and uploads the same encrypted passkey registration payload as before.
  affected_files:
    - path: backend/core/api/app/routes/auth_routes/auth_passkey.py
      reason: WebAuthn registration/authentication option safety and Linux security-key compatibility.
    - path: frontend/packages/ui/src/services/cryptoService.ts
      reason: Shared PRF result extraction/fallback helper.
    - path: frontend/packages/ui/src/components/signup/steps/secureaccount/SecureAccountTopContent.svelte
      reason: Passkey signup PRF fallback.
    - path: frontend/packages/ui/src/components/signup/steps/passkey/PasskeyRegistrationBottomContent.svelte
      reason: Legacy passkey registration component PRF fallback.
    - path: frontend/packages/ui/src/components/settings/SettingsPasskeys.svelte
      reason: Adding passkeys after signup must use the same PRF fallback.
    - path: frontend/packages/ui/src/components/AccountRecovery.svelte
      reason: Account recovery passkey setup must use the same PRF fallback.
    - path: frontend/apps/web_app/tests/signup-flow-passkey.spec.ts
      reason: E2E coverage for roaming-compatible passkey registration.
    - path: frontend/packages/ui/src/i18n/sources/signup/main.yml
      reason: PRF unsupported copy should mention browser, device, and password-manager support.
    - path: docs/architecture/core/passkeys.md
      reason: Update support and registration flow documentation.
    - path: docs/architecture/core/signup-and-auth.md
      reason: Update signup passkey registration flow documentation.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/passkey-linux-compatibility/spec.yml
    - python3 scripts/run_tests.py --spec signup-flow-passkey.spec.ts
    - Deploy to dev via sessions.py deploy.
    - Wait for Vercel Ready.
    - python3 scripts/run_tests.py --spec signup-flow-passkey.spec.ts
    - python3 scripts/run_tests.py --spec signup-skip-2fa-flow.spec.ts
    - python3 scripts/run_tests.py --spec recovery-key-login-flow.spec.ts
    - python3 scripts/run_tests.py --spec backup-code-login-flow.spec.ts
    - python3 scripts/spec_verify.py docs/specs/passkey-linux-compatibility/spec.yml

