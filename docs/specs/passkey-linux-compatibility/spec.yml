risks:
  - Some authenticators may prompt twice only when PRF output is missing from creation; this is preferable to rejecting compatible PRF authenticators.
  - Allowing cross-platform authenticators broadens supported hardware but keeps PRF, discoverable credential, and user verification constraints.
  - Playwright virtual authenticator behavior may differ from physical Linux security keys; production user reports remain important.

