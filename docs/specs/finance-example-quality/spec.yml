decisions:
  - id: D-1
    status: active
    decision: Use `Net cash flow` as the Finance hero metric.
    reason: Bank-account data can accurately compute income minus expenses for a period but cannot prove accounting profit/loss.
    decided_at: "2026-07-22"
  - id: D-2
    status: active
    decision: Do not build a new Finance follow-up filtering orchestration system in this slice.
    reason: Existing fullscreen filters handle saved data, and the assistant can call `finance.check_accounts` again when the user asks for unavailable or refreshed data.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: Finance raw counterparty originals must use owner-only embed PII mapping storage, not saved embed content.
    reason: Shared embeds and LLM context must remain placeholder-only while the owner can reveal originals locally.
    decided_at: "2026-07-22"

