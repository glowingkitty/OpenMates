contracts:
  data:
    - Finance saved embed content may include placeholder-safe transaction rows, account labels, source refs, summaries, time-series data, and public mapping summaries.
    - Finance saved embed content must not include raw counterparty originals, raw CSV contents, connected-account token refs, private keys, vault keys, user IDs, or owner-only mapping payloads.
    - Owner-only Finance mappings must use the existing `PIIMapping` shape `{ placeholder, original, type }` and be stored under `embed_pii:{embed_id}` or an equivalent owner-master-key encrypted embed PII channel.
    - Public examples may use synthetic original names for owner restoration tests only when they are clearly public fixture values and still default to hidden placeholders.
  ui:
    - "Preview primary label: `Net cash flow`."
    - "Fullscreen hero label: `Net cash flow`."
    - "Secondary labels: `Income`, `Expenses`, `Cash balance`."
    - "Tooltip/helper copy: `Income - expenses for the selected period and accounts`."
    - "Preview chart: line chart with income and expenses lines from left to right."
    - "Fullscreen chart: line chart with income and expenses lines; net is communicated through the hero metric and filtered totals."
  followups:
    - Existing fullscreen controls deterministically filter saved data.
    - LLM-readable Finance embed text should summarize period, accounts, transactions, net cash flow, income, expenses, cash balance, source/date coverage, and available filters compactly.
    - Questions outside saved coverage require a normal `finance.check_accounts` skill call.
  focus_modes:
    - "`activeFocusId` must be cleared synchronously on chat switch unless the new chat has clear active focus metadata."
    - "Example chats with `active_focus_id` must have a matching activation artifact; non-focus examples must not show focus pills."
  privacy_security:
    - Owner-side PII restoration must not change share behavior; shared viewers see placeholders only.
    - "Finance mappings must not be included when `share_pii` is false, and `share_pii=true` does not expose Finance embed-level owner mappings unless a future explicit spec approves it."

