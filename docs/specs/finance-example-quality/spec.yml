scenarios:
  - id: S-1
    title: Finance preview is compact and net-cash-flow first
    given:
      - A visitor opens `https://app.dev.openmates.org/#chat-id=example-finance-cash-flow-overview`.
      - The Finance embed has three monthly buckets with income, expenses, and net values.
    when:
      - The assistant answer renders the Finance Check accounts preview.
    then:
      - The preview hero number is labeled `Net cash flow` and equals income minus expenses for the selected period.
      - The preview renders a left-to-right line chart for income and expenses.
      - The preview content is not clipped by the card or the BasicInfosBar.
      - The preview does not show transaction rows or raw/placeholder counterparties.

  - id: S-2
    title: Finance fullscreen prioritizes net cash flow and clear secondary context
    given:
      - A user opens the Finance Check accounts fullscreen embed.
    when:
      - The fullscreen view renders saved overview data or filtered overview data.
    then:
      - The visually dominant metric is `Net cash flow` for the current filters.
      - Income, expenses, and cash balance are secondary metrics.
      - The chart appears before detailed account/transaction lists and uses a line chart for income and expenses over time.
      - Filter changes recompute net cash flow, income, expenses, and cash balance from saved normalized data.

  - id: S-3
    title: Finance transaction PII restores only for the owner
    given:
      - A Finance embed contains redacted transaction counterparties and owner-only PII mappings.
    when:
      - The owner views the fullscreen transaction list with PII hidden.
    then:
      - Counterparty cells show placeholders such as `[MERCHANT_SOFTWARE_001]`.
    and_when:
      - The owner enables the existing PII reveal toggle.
    then:
      - Counterparty cells show original merchant/payer/payee names restored locally.
      - Saved embed content, shared embed content, and LLM-visible text remain placeholder-only.

  - id: S-4
    title: Finance example chat never inherits stale focus-mode UI
    given:
      - The browser previously viewed a chat or example with an active focus mode.
    when:
      - The user navigates to `#chat-id=example-finance-cash-flow-overview`.
    then:
      - No focus-mode pill is visible for the Finance example.
      - The message history does not need a focus activation embed because Finance has no active focus mode.
      - If any chat does show a focus pill, its history contains a matching focus-mode activation artifact and clicking the pill deep-links to the correct settings focus page.

  - id: S-5
    title: Finance follow-ups use existing skill calls for new data
    given:
      - A Finance embed represents a finite saved snapshot.
    when:
      - The user asks for a filter or period covered by the saved snapshot.
    then:
      - The UI can filter the existing fullscreen data deterministically.
    and_when:
      - The user asks for a broader date range, fresh data, another account/source, or another CSV upload.
    then:
      - The assistant should call `finance.check_accounts` again with the needed inputs instead of guessing from the old snapshot.

