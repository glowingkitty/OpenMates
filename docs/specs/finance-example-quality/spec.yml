clarification:
  rounds:
    - question: Should the main Finance metric be labeled Net cash flow or Profit/Loss?
      answer: Use Net cash flow; Profit/Loss overstates what bank transactions alone can prove.
    - question: Should this slice implement a new follow-up filtering system or rely on the assistant calling the existing skill again when new data is needed?
      answer: Do not add a complicated follow-up orchestration system now; keep deterministic fullscreen filters and let the assistant call the skill again for new/different data.
  vision_summary: >
    The Finance example should look like a polished financial snapshot, not a cut-off
    fixture. Net cash flow is the hero metric, income/expense trends should read left
    to right, owner-only PII restoration must match the existing docs/sheets/mail
    privacy model, and unrelated focus-mode UI must never leak into a non-focus
    example chat.
  approved_by_user: true

