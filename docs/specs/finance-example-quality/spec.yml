schema_version: 2
id: finance-example-quality
title: Finance Example Chat Quality And PII Restoration
status: implementing

goal: >
  Fix the deployed Finance Check accounts example so it is visually clear,
  financially accurate for bank-transaction data, privacy-safe, and consistent
  with normal chat state. The Finance embed should lead with net cash flow,
  render an unclipped line-chart preview, restore owner-visible counterparty PII
  through the existing embed PII system, and never inherit stale focus-mode state
  from a different chat.

scope:
  in:
    - Finance Check accounts preview uses `Net cash flow` as the primary metric and fits inside the standard preview card.
    - Finance preview renders a left-to-right line chart for income and expenses instead of clipped vertical bars.
    - Finance fullscreen leads with filtered net cash flow; income, expenses, and cash balance are secondary context.
    - Finance fullscreen transaction counterparties use placeholders by default and restore owner-only originals when PII reveal is enabled.
    - Finance owner PII mappings use the existing `embed_pii:{embed_id}` storage pattern; raw originals never enter saved embed content, shared payloads, or LLM context.
    - Finance example chat remains natural-language and public-safe.
    - Opening the Finance example chat must not show a focus-mode pill unless the Finance chat history contains a matching focus-mode activation record.
    - Follow-up behavior stays simple: existing fullscreen UI filters saved data locally; the assistant may call `finance.check_accounts` again for broader, refreshed, or unavailable data.
  out:
    - Building a new natural-language follow-up filtering orchestration layer.
    - Calling Revolut or reprocessing CSV automatically just because a user clicks an example follow-up suggestion.
    - Arbitrary bank-export CSV auto-detection or conversion; canonical OpenMates CSV/TSV remains the V1 supported CSV input.
    - True accounting profit/loss claims. The user-facing metric is net cash flow, not accrual profit.
    - Exposing raw merchant, counterparty, payer, or payee names to shared viewers, public examples, backend persistence, or LLM context.

depends_on:
  - docs/specs/finance-check-accounts-v1/spec.yml
  - docs/specs/pii-placeholder-rewrite-v1/spec.yml
  - docs/specs/focus-mode-example-chat-rendering/spec.yml

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials; issue discovery could not use the configured GitHub token."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/finance-check-accounts-v1/spec.yml
    - docs/specs/pii-placeholder-rewrite-v1/spec.yml
    - docs/specs/focus-mode-example-chat-rendering/spec.yml
    - docs/specs/example-chat-public-quality/spec.yml
  code_patterns:
    - frontend/packages/ui/src/components/embeds/finance/FinanceCheckAccountsEmbedPreview.svelte currently shows `Current total value`, paired vertical bars, and enough content to clip inside the standard preview card.
    - frontend/packages/ui/src/components/embeds/finance/FinanceCheckAccountsEmbedFullscreen.svelte currently orders chart, `Total value`, income, expenses, net, filters, accounts, transactions and renders `counterparty_placeholder` directly.
    - frontend/packages/ui/src/components/embeds/finance/financeCheckAccountsContent.ts normalizes nested and TOON-flattened Finance overview payloads but has no Finance PII mapping support.
    - backend/shared/python_utils/finance_accounts.py has `FinancePrivacyRedactor.owner_mapping_payload()` and public mapping summaries, but Finance owner mappings are not persisted in the existing `embed_pii:{embed_id}` owner-only store.
    - frontend/packages/ui/src/stores/embedPIIStore.ts and frontend/packages/ui/src/components/enter_message/services/codeEmbedService.ts define the current owner-only embed PII storage/load pattern used by docs, sheets, code, and mail embeds.
    - frontend/packages/ui/src/components/ActiveChat.svelte keeps `activeFocusId` as local state and may leave the old focus pill visible while asynchronously checking metadata for a newly opened non-focus example chat.
    - frontend/packages/ui/src/demo_chats/data/example_chats/finance-cash-flow-overview.ts has no `active_focus_id`, so any `Focus active focus on` pill on that example is stale state, not Finance example data.
  tests:
    - frontend/apps/web_app/tests/finance-check-accounts.spec.ts
    - frontend/apps/web_app/tests/example-chats-load.spec.ts
    - frontend/apps/web_app/tests/focus-mode-ui-after-activation.spec.ts
    - frontend/packages/ui/src/components/embeds/finance/__tests__/financeCheckAccountsContent.test.ts
    - frontend/packages/ui/src/stores/__tests__/embedPIIStore.test.ts
    - backend/tests/test_finance_privacy_redaction.py
    - backend/tests/test_skill_preview_metadata.py
  findings:
    - "The deployed Finance preview is clipped because it tries to fit a large primary balance, metadata, a bar chart, legend, and the standard BasicInfosBar inside the fixed UnifiedEmbedPreview card."
    - "Bank data can support net cash flow, not accounting profit/loss; user approved `Net cash flow` as the primary label."
    - "The current LLM-readable Finance embed text is intentionally compact and does not need a new follow-up filtering system; broader questions should call the skill again."
    - "Finance PII restoration was promised by the V1 spec but not wired: owner mappings are conceptual on the backend and not stored/read by the Finance frontend."
    - "A focus pill on the Finance example chat is a stale state regression because the Finance example has no active focus metadata or activation embed."

