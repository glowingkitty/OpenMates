risks:
  - id: R-1
    risk: Accidentally storing raw Finance counterparties inside saved embed content would expose them to shared viewers and LLM context.
    mitigation: Backend sanitizer tests and frontend owner-only `embed_pii:{embed_id}` tests must be red/green before deploy.
  - id: R-2
    risk: A custom SVG line chart can become inaccessible or visually misleading with negative values.
    mitigation: Unit tests cover chart points; Playwright checks labels and visible line chart; accessible labels summarize totals.
  - id: R-3
    risk: Clearing focus state too aggressively could hide valid active focus modes.
    mitigation: Focus stale-pill test includes both positive focus example and negative Finance example navigation.

open_questions:
  - id: OQ-1
    status: resolved
    question: Should Finance use Profit/Loss or Net cash flow as the hero metric?
    resolution: Net cash flow.
  - id: OQ-2
    status: resolved
    question: Should this slice add a new follow-up filtering orchestration layer?
    resolution: No; use existing UI filters and normal skill re-invocation.
