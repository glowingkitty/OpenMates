implementation_plan:
  spec_path: docs/specs/finance-example-quality/spec.yml
  affected_files:
    - path: frontend/packages/ui/src/components/embeds/finance/FinanceCheckAccountsEmbedPreview.svelte
      reason: Make preview lead with net cash flow and an unclipped income/expense line chart.
      covers: [AC-1, AC-2]
    - path: frontend/packages/ui/src/components/embeds/finance/FinanceCheckAccountsEmbedFullscreen.svelte
      reason: Make fullscreen lead with filtered net cash flow and restore owner-only PII display when enabled.
      covers: [AC-2, AC-3]
    - path: frontend/packages/ui/src/components/embeds/finance/financeCheckAccountsContent.ts
      reason: Centralize Finance totals, chart points, and placeholder-to-original display helpers.
      covers: [AC-2, AC-3]
    - path: frontend/packages/ui/src/components/embeds/finance/__tests__/financeCheckAccountsContent.test.ts
      reason: Red/green unit coverage for Finance metrics, chart data, and PII display helpers.
      covers: [AC-2, AC-3]
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Clear stale active focus state on chat navigation before metadata resolves.
      covers: [AC-4]
    - path: frontend/apps/web_app/tests/finance-check-accounts.spec.ts
      reason: Deployed regression coverage for Finance example UX and owner-visible PII behavior.
      covers: [AC-1, AC-2, AC-3, AC-4]
    - path: frontend/apps/web_app/tests/focus-mode-example-chats.spec.ts
      reason: Deployed regression coverage for stale focus pill leakage between example chats.
      covers: [AC-4]
    - path: backend/core/api/app/services/embed_service.py
      reason: Ensure Finance owner mappings remain excluded from saved/shared embed payloads.
      covers: [AC-3]
    - path: backend/tests/test_finance_privacy_redaction.py
      reason: Backend red/green coverage for Finance owner mapping exclusion.
      covers: [AC-3]
  existing_patterns:
    - frontend/packages/ui/src/components/embeds/UnifiedEmbedPreview.svelte
    - frontend/packages/ui/src/components/embeds/UnifiedEmbedFullscreen.svelte
    - frontend/packages/ui/src/stores/embedPIIStore.ts
    - frontend/packages/ui/src/components/enter_message/services/codeEmbedService.ts
    - frontend/packages/ui/src/components/embeds/docs/DocsEmbedPreview.svelte
    - frontend/packages/ui/src/components/embeds/sheets/SheetEmbedFullscreen.svelte
    - frontend/packages/ui/src/components/ActiveChat.svelte
    - frontend/packages/ui/src/demo_chats/exampleChatStore.ts
  architecture: >
    Keep Finance analysis in the existing app-skill embed contract. Move only pure
    presentation calculations into shared Finance frontend helpers, wire Finance
    into the existing owner-only embed PII store, and fix the focus pill as a chat
    state reset bug rather than a Finance-specific workaround.
  data_flow:
    - Finance skill returns placeholder-safe saved content plus no raw owner mappings in model/saved output.
    - First-party owner client stores Finance owner mappings separately under owner-encrypted embed PII storage when available.
    - Finance preview/fullscreen read saved overview data and owner-only PII mappings locally.
    - Shared/public viewers get saved placeholder content but not owner mapping storage.
    - Chat navigation clears focus state when the new chat does not carry active focus metadata.
  verification_order:
    - Unit tests for Finance calculations and PII display helpers.
    - Backend sanitizer/privacy tests for owner mapping exclusion.
    - Deployed Playwright for Finance example and focus stale-pill regression.
    - User confirmation.
    - Apple parity attempt or explicit follow-up waiver under Finance V1.
  verification_strategy:
    - Run frontend unit tests for Finance calculation and PII display helpers before implementation and after changes.
    - Run backend Finance privacy tests to prove raw owner mappings stay out of saved/shared payloads.
    - Deploy to dev before Playwright, then run Finance example and stale focus-pill specs against `app.dev.openmates.org`.
    - Record evidence in this spec and leave final completion gated on user confirmation.

