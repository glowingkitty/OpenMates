scenarios:
  - id: S-1
    title: Client lists available models
    given:
      - Alice has a valid OpenMates API key.
    when:
      - Alice calls `GET https://api.dev.openmates.org/v1/models`.
    then:
      - "The response is OpenAI-shaped with `object: \"list\"` and `data` model objects."
      - "Each listed model has `id`, `object: \"model\"`, `created`, and `owned_by`."
      - At least one chat-capable OpenMates model is returned.

  - id: S-2
    title: Client retrieves one model
    given:
      - Alice has a model ID returned by `GET /v1/models`.
    when:
      - Alice calls `GET /v1/models/{model}`.
    then:
      - The response is one OpenAI-shaped model object.
      - Unknown model IDs return a 404 OpenAI-style error.

  - id: S-3
    title: Client sends a non-streaming chat completion
    given:
      - "Alice configures an OpenAI SDK client with `base_url=https://api.dev.openmates.org/v1` and her OpenMates API key."
    when:
      - "Alice calls `client.chat.completions.create` with `model`, `messages`, and `stream: false`."
    then:
      - The response object is `chat.completion`.
      - The assistant message has non-empty content.
      - Usage metadata is present when available or safely estimated in the existing OpenMates way.
      - The response is not wrapped in an OpenMates app-skill envelope.

  - id: S-4
    title: Client streams a chat completion
    given:
      - "Alice sends a Chat Completions request with `stream: true`."
    when:
      - The model begins responding.
    then:
      - The HTTP response uses `text/event-stream`.
      - "Each event is formatted as `data: <json>\n\n`."
      - Content arrives as OpenAI-style `chat.completion.chunk` choices with `delta` fields.
      - "The stream ends with `data: [DONE]`."

  - id: S-5
    title: Agentic client receives a function tool call
    given:
      - Alice sends `POST /v1/chat/completions` with a client-defined `get_weather` function tool.
      - Alice sets `tool_choice` to force `get_weather`.
    when:
      - OpenMates forwards the prompt and client tool definitions to the selected model.
    then:
      - "The response contains `choices[0].message.tool_calls` with `type: \"function\"`, `function.name: \"get_weather\"`, and JSON-string `function.arguments`."
      - "`finish_reason` is `tool_calls`."
      - OpenMates does not execute `get_weather` server-side.
      - No OpenMates app-skill embed or app-skill usage is created for the client tool.

  - id: S-6
    title: Agentic client sends a tool result follow-up
    given:
      - Alice received a `tool_calls` response for `get_weather`.
      - Alice executed the tool in her client.
    when:
      - "Alice sends a follow-up Chat Completions request with the original assistant `tool_calls` message and a `role: \"tool\"` message containing the result."
    then:
      - OpenMates accepts the `tool` role and `tool_call_id`.
      - The model can produce a normal assistant answer based on the supplied tool result.
      - OpenMates still does not execute the client tool server-side.

  - id: S-7
    title: Client tool name collides with an OpenMates app skill
    given:
      - Alice sends a client-defined function tool named `web-search` or a normalized variant such as `web_search`.
    when:
      - The model emits a call for that tool.
    then:
      - The call is returned to Alice as an external client `tool_call`.
      - OpenMates does not route it to the Web Search app skill.
      - Users who want OpenMates Web Search use `/v1/apps/ai/skills/ask` or the app-skill API instead.

  - id: S-8
    title: Unsupported fields fail visibly
    given:
      - Alice sends unsupported hosted tool types, missing model fields, malformed messages, or an unavailable model ID.
    when:
      - OpenMates validates the request.
    then:
      - The API returns an OpenAI-style error with `error.message`, `error.type`, `error.param`, and `error.code`.
      - The error is not hidden as a generic assistant response.
      - No inference or app-skill execution starts for pre-validation failures.

