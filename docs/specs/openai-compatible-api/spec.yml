decisions:
  - id: D-1
    status: active
    decision: Add canonical `/v1/chat/completions`, `/v1/models`, and `/v1/models/{model}` routes.
    reason: Agentic coding tools and OpenAI SDK-compatible clients append these paths to a configured `/v1` base URL.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-2
    status: active
    decision: Implement the routes as first-class FastAPI handlers sharing in-process AI logic, not as HTTP proxies or redirects.
    reason: Avoid extra latency, error-shape drift, and auth/rate-limit inconsistencies.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-3
    status: active
    decision: Treat tools supplied to `/v1/chat/completions` as external client tools only.
    reason: OpenAI-compatible clients expect to execute their own tools after receiving `tool_calls`.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-4
    status: active
    decision: Do not expose or execute OpenMates app skills through `/v1/chat/completions` in this slice.
    reason: OpenMates app skills are server-side tools with product-specific billing, side effects, confirmation semantics, embeds, and allow-listing; mixing them with client tools would be collision-prone.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-5
    status: active
    decision: Support standard OpenAI function tools first and reject hosted/custom tool types with OpenAI-style validation errors.
    reason: OpenCode, Roo Code, Cline, Aider, Continue, OpenAI SDKs, LiteLLM, and Vercel AI SDK compatibility primarily depends on function/tool calling, not OpenAI-hosted tool services.
    decided_at: "2026-07-17T00:00:00Z"
  - id: D-6
    status: active
    decision: Use official OpenAI SDKs and Vercel AI SDK as authoritative automated compatibility gates; use OpenCode as an end-to-end canary.
    reason: SDK failures are easier to attribute to the OpenMates API contract, while OpenCode adds its own agent runtime variables.
    decided_at: "2026-07-17T00:00:00Z"

