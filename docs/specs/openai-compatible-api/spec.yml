schema_version: 2
id: openai-compatible-api
title: OpenAI-Compatible Chat Completions API
status: approved

goal: >
  Make OpenMates usable as a reliable OpenAI-compatible provider for agentic
  coding tools and other AI applications by exposing canonical `/v1` Chat
  Completions and Models endpoints while preserving a strict boundary between
  external client tools and OpenMates app skills.

scope:
  in:
    - Canonical authenticated `POST /v1/chat/completions` endpoint.
    - Canonical authenticated `GET /v1/models` endpoint.
    - Canonical authenticated `GET /v1/models/{model}` endpoint.
    - Non-streaming OpenAI-style chat completion responses.
    - "Streaming OpenAI-style Server-Sent Events with `data: {...}` chunks and final `data: [DONE]`."
    - "Standard client-supplied OpenAI function tools using `tools: [{ type: \"function\", function: ... }]`."
    - Standard `tool_choice` values `none`, `auto`, `required`, and named function tool choice.
    - Assistant `message.tool_calls` responses that external clients execute themselves.
    - "Follow-up `role: \"tool\"` messages with `tool_call_id`."
    - OpenAI-style error responses for invalid auth, missing model, malformed tools, unsupported tool types, and unavailable models.
    - Real dev-server compatibility tests using official OpenAI Python SDK, official OpenAI JS SDK, Vercel AI SDK OpenAI-compatible provider, and OpenCode as a canary.
  out:
    - Automatic execution of OpenMates app skills from `/v1/chat/completions`.
    - Mixing external client tools and OpenMates app skills in the same Chat Completions request.
    - Exposing OpenMates app-skill tools through `/v1/chat/completions` by default.
    - OpenAI Responses API `/v1/responses` compatibility in this slice.
    - Legacy `/v1/completions`, `/v1/embeddings`, image generation, audio, batches, assistants, or files endpoints.
    - "Hosted OpenAI tool types such as `web_search`, `file_search`, `code_interpreter`, `computer_use`, or `type: \"custom\"` in the first slice."
    - Browser UI changes.
    - Apple app changes.

context_discovery:
  github_issues:
    - "GitHub MCP issue search was unavailable: get_me returned 401 Bad credentials. Local docs/specs search found no existing canonical `/v1/chat/completions` or `/v1/models` spec."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/apps/rest-api.md
    - docs/specs/workflows-cli-runtime/spec.yml
    - "https://opencode.ai/docs/providers/: OpenCode custom providers use `@ai-sdk/openai-compatible`, `options.baseURL`, `options.apiKey`, and declared models."
    - "https://opencode.ai/docs/config/: OpenCode config controls providers, models, and tools separately."
    - "https://ai-sdk.dev/providers/openai-compatible-providers: Vercel AI SDK OpenAI-compatible provider supports text generation, streaming, tool calling, system messages, and multimodal inputs."
    - "https://aider.chat/docs/llms/openai-compat.html: Aider uses `OPENAI_API_BASE`, `OPENAI_API_KEY`, and `openai/<model-name>`."
    - "https://docs.cline.bot/provider-config/openai-compatible: Cline OpenAI-compatible profiles require Base URL, API key, and Model ID, with tool/function calling as a model capability."
    - "https://docs.getbifrost.ai/cli-agents/roo-code: Roo Code requires native OpenAI-compatible function calling for coding-agent use."
    - "https://docs.continue.dev/customize/model-providers/top-level/openai: Continue uses `apiBase` and `/chat/completions`, with an option to avoid `/responses`."
    - "https://docs.litellm.ai/docs/providers/openai_compatible: LiteLLM expects base URLs ending in `/v1` and uses official OpenAI client routing."
    - "https://vercel.com/docs/ai-gateway/sdks-and-apis/openai-chat-completions: Vercel AI Gateway lists `/models`, `/models/{model}`, and `/chat/completions` as the compatibility surface."
  code_patterns:
    - backend/core/api/app/routes/apps_api.py currently auto-registers `POST /v1/apps/{app_id}/skills/{skill_id}` and special-cases `ai/ask` to return OpenAI-style responses.
    - backend/apps/ai/skills/ask_skill.py defines `OpenAICompletionRequest`, `OpenAICompletionResponse`, streaming chunk models, and transforms OpenAI-shaped requests into synthetic `AskSkillRequest` values.
    - backend/apps/ai/processing/tool_generator.py converts OpenMates app skills into OpenAI function-tool definitions for internal model calls.
    - backend/apps/ai/processing/main_processor.py enforces a strict allow-list for internally preselected OpenMates app-skill tools and rejects hallucinated tools before execution.
    - backend/apps/ai/llm_providers/openai_client.py already handles upstream OpenAI `tools`, `tool_choice`, streamed tool-call deltas, and parsed tool-call responses for provider calls.
    - backend/tests/test_rest_api_ai.py contains real dev integration tests for `/v1/apps/ai/skills/ask`, gated by `OPENMATES_TEST_ACCOUNT_API_KEY`.
    - backend/tests/conftest.py points REST API integration tests at `https://api.dev.openmates.org` and skips when the test API key is absent.
  tests:
    - backend/tests/test_rest_api_ai.py
    - backend/tests/test_openai_tool_choice.py
    - backend/tests/test_main_processor_invalid_tool_calls.py
    - backend/tests/test_llm_utils_stream_fallback.py
    - scripts/run-tests.sh integration-test handling
    - .github/workflows/playwright-spec.yml live CLI integration secret handling

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This is an external HTTP API compatibility surface. The Apple app does not consume OpenAI-compatible endpoints as a client in this slice.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should OpenMates expose a canonical `/v1/chat/completions` route or require clients to call `/v1/apps/ai/skills/ask`?
      answer: Add canonical Chat Completions and Models endpoints so OpenMates works with OpenAI-compatible clients.
    - question: Should the alias HTTP-forward to the app-skill endpoint?
      answer: No. Implement first-class FastAPI routes that share the same in-process dispatch and service logic rather than proxying over HTTP.
    - question: Should OpenAI tool calling be included?
      answer: Yes, for compatibility with agentic coding tools, but it must not collide with OpenMates app skills.
    - question: How should compatibility modes separate OpenAI client tools from OpenMates app skills?
      answer: "`/v1/chat/completions` uses external client tools only; OpenMates app skills remain available through `/v1/apps/ai/skills/ask` and explicit OpenMates APIs."
  vision_summary: >
    OpenMates should be a safe, plug-and-play OpenAI-compatible provider for
    tools such as OpenCode, Aider, Cline, Roo Code, Continue, LiteLLM, official
    OpenAI SDKs, and Vercel AI SDK. The canonical Chat Completions endpoint must
    behave like OpenAI for external client tools: return tool calls, accept tool
    results, and never execute those external tools server-side. Users who want
    OpenMates app skills should continue using the AI Ask app-skill endpoint.
  approved_by_user: true

