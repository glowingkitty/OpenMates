  - id: A-4
    text: A first-class compatibility route can reuse existing billing and rate-limit paths without double-charging or bypassing usage accounting.
    category: billing
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/apps/ai/skills/ask_skill.py
        summary: Current OpenAI-shaped AI Ask requests transform into internal requests and collect usage metadata from the worker stream.
      - source: backend/tests/test_openai_compatible_tools_contract.py
        summary: Client-tool requests precharge one credit before streaming and then charge post-usage deltas, preventing streaming disconnects from bypassing billing.

contracts:
  api:
    - route: GET /v1/models
      auth: Bearer OpenMates API key
      request: none
      response: "{ object: 'list', data: [{ id: string, object: 'model', created: integer, owned_by: string }] }"
      errors:
        - 401 OpenAI-style error when the API key is missing or invalid.
    - route: GET /v1/models/{model}
      auth: Bearer OpenMates API key
      request: model path parameter
      response: "{ id: string, object: 'model', created: integer, owned_by: string }"
      errors:
        - 401 OpenAI-style error when unauthenticated.
        - 404 OpenAI-style error when the model ID is not available.
    - route: POST /v1/chat/completions
      auth: Bearer OpenMates API key
      request: >
        OpenAI Chat Completions request with required `model` and `messages`,
        optional `stream`, `temperature`, `max_tokens`, `top_p`, `stop`,
        `presence_penalty`, `frequency_penalty`, `tools`, and `tool_choice`.
      response: OpenAI-compatible `chat.completion` for non-streaming requests.
      streaming_response: "OpenAI-compatible `chat.completion.chunk` SSE events and final `data: [DONE]`."
      errors:
        - 400 OpenAI-style error for malformed messages, unsupported tool types, invalid `tool_choice`, or missing required fields.
        - 401 OpenAI-style error for missing or invalid API keys.
        - 402 OpenAI-style error for insufficient credits where existing billing path reports that condition.
        - 404 OpenAI-style error for unavailable models.
        - 429 OpenAI-style error for rate limits.
        - 500 OpenAI-style error for server failures.
  compatibility_modes:
    - mode: openai_chat_no_tools
      trigger: "`/v1/chat/completions` without `tools`."
      behavior: Run normal chat completion and return OpenAI-style content; do not expose OpenMates app-skill tools implicitly.
    - mode: openai_chat_external_tools
      trigger: "`/v1/chat/completions` with standard function `tools`."
      behavior: Forward client tool definitions to the model, return tool calls to the client, and accept later tool-result messages; never execute those tools in OpenMates.
    - mode: openmates_ai_ask
      trigger: "`/v1/apps/ai/skills/ask`."
      behavior: Preserve current OpenMates-native AI Ask behavior, including app-skill execution through existing preselection, allow-listing, billing, embeds, and safety guards.
  tool_boundary:
    - Client tools are scoped to the single Chat Completions request and conversation messages supplied by the external caller.
    - Client tool names are not resolved through OpenMates app metadata, even when names match or normalize to app-skill IDs.
    - OpenMates app skills are server-side product tools and remain unavailable in `/v1/chat/completions` until a future explicit opt-in spec defines side-effect, confirmation, billing, and collision semantics.
    - Unsupported hosted/custom OpenAI tool types fail validation rather than being silently ignored or converted to app skills.
  privacy_security:
    - API keys authorize only the authenticated user's OpenMates account and billing context.
    - Client-supplied tool schemas and tool-result messages are request content and must be treated like user prompt data.
    - OpenMates must not call arbitrary external client tool endpoints because the OpenAI Chat Completions contract delegates execution to the client.
    - Pre-validation errors must happen before inference dispatch and before any credit charge.
  docs:
    - Public docs must state `base_url=https://api.openmates.org/v1` and dev examples with `https://api.dev.openmates.org/v1`.
    - Docs must explain that `/v1/chat/completions` is for OpenAI-compatible clients and `/v1/apps/ai/skills/ask` is for OpenMates app skills.

