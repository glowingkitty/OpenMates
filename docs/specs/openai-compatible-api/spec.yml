risks:
  - id: R-1
    risk: Client-supplied tools could accidentally route into OpenMates app-skill execution if names collide.
    mitigation: External tool mode must bypass SkillRegistry and test collisions with `web-search` and `web_search`.
  - id: R-2
    risk: Streaming format drift could break AI SDK/OpenCode even if raw curl appears to work.
    mitigation: Validate streaming with official OpenAI JS SDK and Vercel AI SDK, not only raw HTTP.
  - id: R-3
    risk: Some OpenMates providers may not support upstream function calling for all models.
    mitigation: "`/v1/models` should expose capability metadata internally where available, and live tool-call tests should use a known tool-capable model."
  - id: R-4
    risk: Continue may default to `/responses` for some OpenAI model IDs.
    mitigation: Docs should recommend Chat Completions-compatible configuration, and `/v1/responses` remains out of scope until a later spec.
  - id: R-5
    risk: Real compatibility tests spend credits and may be flaky when providers degrade.
    mitigation: Use tiny deterministic prompts, explicit test-account key gating, retries only where safe, and clear failure attribution logs.

open_questions:
  - id: Q-1
    status: resolved
    question: Should `/v1/chat/completions` expose OpenMates app skills as tools?
    answer: No. Use `/v1/apps/ai/skills/ask` for OpenMates app skills.
  - id: Q-2
    status: resolved
    question: Should first-slice tool support include hosted/custom OpenAI tool types?
    answer: No. Support standard function tools first and return explicit validation errors for unsupported tool types.
  - id: Q-3
    status: open
    question: Which specific OpenMates model ID should be the default documented tool-capable compatibility test model?
    next_action: Choose from actual enabled dev model metadata during TASK-3/TASK-6.
