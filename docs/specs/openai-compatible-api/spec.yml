implementation_plan:
  spec_path: docs/specs/openai-compatible-api/spec.yml
  existing_patterns:
    - backend/core/api/app/routes/apps_api.py special AI Ask app-skill handler.
    - backend/apps/ai/skills/ask_skill.py OpenAI request/response models and synthetic AskSkillRequest conversion.
    - backend/apps/ai/llm_providers/openai_client.py upstream OpenAI tool-choice handling and streamed tool-call parsing.
    - backend/tests/conftest.py dev REST API integration fixture.
  architecture: >
    Add a canonical OpenAI-compatible route module that shares authentication,
    billing context, and inference dispatch with the existing AI Ask path, but
    introduces an explicit external-tool mode for `/v1/chat/completions`. In
    external-tool mode, client tools are passed to the model and returned as
    OpenAI `tool_calls`; they are never resolved through OpenMates app metadata
    or SkillRegistry. Models endpoints expose enabled chat-capable OpenMates
    model IDs in OpenAI model-object shape.
  data_flow:
    - Client configures `base_url=https://api.openmates.org/v1` and an OpenMates API key.
    - Client calls `/models` to list model IDs or supplies a known model ID.
    - Client calls `/chat/completions` without tools for normal chat, or with function tools for external client-tool mode.
    - OpenMates validates auth, model, message roles, tool schema, and unsupported fields before inference dispatch.
    - OpenMates dispatches model inference with the authenticated user billing context.
    - For text responses, OpenMates returns content in OpenAI Chat Completions shape.
    - "For external client tool calls, OpenMates returns `message.tool_calls`; the client executes the tool and sends a later `role: tool` message."
  affected_files:
    - path: backend/core/api/app/routes/openai_compat.py
      reason: New canonical OpenAI-compatible routes and error helpers.
    - path: backend/core/api/main.py
      reason: Include the new route module if route registration is not already centralized.
    - path: backend/apps/ai/skills/ask_skill.py
      reason: Extend OpenAI request/message models for tool messages, client tools, and tool-call responses while preserving AI Ask behavior.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Ensure external client-tool mode bypasses OpenMates app-skill generation/execution and preserves tool-role history.
    - path: backend/apps/ai/llm_providers/*
      reason: Confirm selected model providers can receive standard function tools and return parsed tool calls through the unified stream/response interface.
    - path: backend/tests/test_openai_compatible_api_contract.py
      reason: Backend contract tests for route, model, chat, streaming, and error shapes.
    - path: backend/tests/test_openai_compatible_tools_contract.py
      reason: Backend contract tests for external function tools, tool-result follow-up, and collision safety.
    - path: scripts/openai_compat_smoke.py
      reason: Real dev-server HTTP and official OpenAI Python SDK smoke tests.
    - path: frontend/packages/openmates-cli/tests/openai-compatible-smoke.mjs
      reason: Official OpenAI JS SDK and Vercel AI SDK compatibility smoke tests.
    - path: scripts/openai_compat_opencode_smoke.py
      reason: OpenCode custom-provider canary after SDK gates pass.
    - path: docs/architecture/apps/rest-api.md
      reason: Document canonical OpenAI-compatible API surface and app-skill boundary.
    - path: docs/user-guide/cli/server-management.md
      reason: Add external-client setup notes if CLI/self-host docs reference OpenAI-compatible endpoints.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/openai-compatible-api/spec.yml
    - python3 -m pytest backend/tests/test_openai_compatible_api_contract.py
    - python3 -m pytest backend/tests/test_openai_compatible_tools_contract.py
    - Deploy to dev before real dev-server smoke tests.
    - OPENMATES_TEST_ACCOUNT_API_KEY=<test-key> python3 scripts/openai_compat_smoke.py --base-url https://api.dev.openmates.org/v1 --mode all-python
    - cd frontend/packages/openmates-cli && OPENMATES_TEST_ACCOUNT_API_KEY=<test-key> node tests/openai-compatible-smoke.mjs --base-url https://api.dev.openmates.org/v1 --mode all-js
    - OPENMATES_TEST_ACCOUNT_API_KEY=<test-key> python3 scripts/openai_compat_opencode_smoke.py --base-url https://api.dev.openmates.org/v1 --model <model-id>
    - python3 scripts/spec_verify.py docs/specs/openai-compatible-api/spec.yml
  verification_order:
    - Backend contract tests red, then implementation, then backend green.
    - Dev deploy before live compatibility smoke tests.
    - Raw HTTP and official OpenAI Python SDK live dev tests.
    - Official OpenAI JS SDK and Vercel AI SDK live dev tests.
    - OpenCode custom-provider canary after SDK gates pass.
    - Existing `/v1/apps/ai/skills/ask` real inference regression.
    - Documentation review and spec verification.

