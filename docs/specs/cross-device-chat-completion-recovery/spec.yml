decisions:
  - id: D-1
    status: active
    decision: Recovery is mandatory for every new authenticated turn on web, Apple, and CLI.
    reason: Conditional recovery would preserve the current origin-device failure mode.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-2
    status: active
    decision: Use one deterministic, domain-separated X25519 recovery keypair per chat-key version, with only the public key registered on the backend.
    reason: Every device with the chat key can recover the same private key without server escrow or a separate synchronized secret.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-3
    status: active
    decision: Inference is blocked until durable encrypted user-message, immutable wrapped-key, and recovery-public-key preflight acknowledgement.
    reason: Starting inference first can create an assistant result with no durable encrypted user turn or usable recovery key.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-4
    status: active
    decision: Every completed inference creates a sealed recovery job before terminal completion delivery, regardless of foreground connection state.
    reason: Connection presence does not prove that the connected device can decrypt or durably persist the completion.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-5
    status: active
    decision: Incomplete recovery jobs expire after seven days; sealed payload and lease material are deleted immediately after durable acknowledgement, chat deletion, or account deletion.
    reason: This bounds encrypted retention while giving users a practical reconnection window.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-6
    status: active
    decision: Existing chats are not bulk-migrated; their first post-cutover send registers recovery material during preflight.
    reason: Existing ciphertext and wrapped keys remain valid, and lazy registration avoids risky history rewrites.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-7
    status: active
    decision: Use a clean protocol cutover with no legacy fallback or capability feature flag.
    reason: Web updates atomically, Apple has no external testers, and outdated CLI users can be blocked with an explicit update instruction.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-8
    status: active
    decision: Added healthy-connection send-to-processing latency must remain at or below 250 ms p95.
    reason: Durable safety must not introduce a noticeable composer delay.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-9
    status: active
    decision: Activate the clean cutover through one server-authoritative protocol epoch after pausing new sends and draining all accepted legacy turns.
    reason: A bounded drain avoids mixed legacy/new in-flight state without introducing per-client capability negotiation or a lasting fallback.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-10
    status: active
    decision: Preflight consumption, inference identity, user billing identity, and durable queue publication form one idempotent state transition backed by a transactional outbox.
    reason: Lost acknowledgements and retries must never create duplicate inference or duplicate user billing.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-11
    status: active
    decision: A turn is not successful server-side until its sealed recovery job is durably committed. Persistence retries reuse stable identities, but a worker process crash does not automatically replay inference or side-effectful tools.
    reason: Terminal delivery must follow durable recovery, while automatic inference replay could duplicate provider/tool side effects or show a different answer.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-12
    status: active
    decision: Assistant encrypted persistence and terminal recovery acknowledgement commit in one database transaction with a monotonic lease fencing generation.
    reason: This removes the ambiguous crash window between message persistence and job deletion and rejects stale lease holders deterministically.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-13
    status: active
    decision: The protocol protects honest compatible clients from server-side plaintext persistence and accidental races; a malicious authorized device that intentionally corrupts its own chat key metadata is outside the integrity threat model.
    reason: A zero-knowledge backend cannot independently prove that an X25519 public key was deterministically derived from an unknown chat key.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-14
    status: active
    decision: Keep multi-record transactions inside a narrowly scoped internal Directus endpoint extension using Directus-provided Knex transactions; the Python API remains the authenticated protocol boundary and does not receive direct database credentials.
    reason: Directus REST item calls do not provide the required cross-collection transaction, while a Directus extension can preserve one database transaction without adding a second database-access architecture to the Python API.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-15
    status: superseded
    decision: npm and pip SDK saved-chat sends participate in the same preflight, sealed recovery, minimum-protocol, and update-required contracts as CLI.
    reason: The user expanded implementation scope to SDKs before web and Apple; API-key clients must not retain an unsafe alternate saved-chat path.
    decided_at: "2026-07-11T23:23:27Z"
  - id: D-17
    status: active
    decision: SDK recovery is internal/API-safety parity, not a launch-gating user-client recovery surface.
    reason: The clarified product use case is a user starting a saved chat in CLI, web, or Apple, and any of those clients completing encryption work after a connection drop. SDK saved-chat routes remain epoch-gated so they cannot bypass the cutover, but SDK takeover evidence is not required for this release.
    decided_at: "2026-07-12T10:50:00Z"
  - id: D-16
    status: active
    decision: Retry pending inference publication through an identical client resubmission using the stable outbox and Celery task identities; duplicate worker deliveries are suppressed by the durable inference claim.
    reason: Autonomous outbox replay would require durable server-decryptable chat plaintext, while client-assisted replay preserves the zero-knowledge boundary and remains idempotent after acknowledgement loss or process failure.
    decided_at: "2026-07-12T02:39:57Z"
  - id: D-18
    status: active
    decision: Already-admitted epoch-zero turns use a bounded metadata-only completion lifecycle across cutover; no new epoch-zero send is admitted after activation.
    reason: Running inference must block activation, while a successful pre-cutover inference waiting for client encryption must remain authorized without blocking the global epoch transition. Running records expire after 15 minutes and awaiting/persisted completion records expire after 24 hours.
    decided_at: "2026-07-13T11:20:00Z"

