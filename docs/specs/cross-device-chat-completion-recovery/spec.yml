implementation_plan:
  spec_path: docs/specs/cross-device-chat-completion-recovery/spec.yml
  existing_patterns:
    - backend/core/api/app/routes/handlers/websocket_handlers/encrypted_chat_metadata_handler.py
    - backend/core/api/app/routes/handlers/websocket_handlers/ai_response_completed_handler.py
    - frontend/packages/ui/src/services/sendersChatMessages.ts
    - frontend/packages/openmates-cli/src/client.ts
    - apple/OpenMates/Sources/Core/Networking/NotificationPreviewCrypto.swift
  architecture: >
    Pending implementation-plan approval. The Python API remains the authenticated
    WebSocket and worker boundary. A narrowly scoped internal Directus endpoint
    extension owns Knex transactions across preflight, encrypted message, outbox,
    recovery-job, and terminal acknowledgement records. One durable preflight
    exists per turn, one immutable recovery public key exists per chat-key version,
    and one sealed completion job exists per completed turn. Eligible clients
    claim jobs with server-clock leases and monotonic fencing generations.
  data_flow:
    - For example, client A derives recovery public key K1 for chat C1 key version 1 and submits turn T1, encrypted user message U1, wrapped key W1, and K1.
    - The Directus transaction extension validates ownership and immutable keys, writes U1 plus PREPARED preflight P1, and returns a durable acknowledgement.
    - Client A submits inference for P1. One transaction changes P1 to ENQUEUED, creates stable task A1 and billing identity T1, and inserts outbox O1.
    - An outbox dispatcher publishes A1. Duplicate dispatch or submission returns A1 and cannot create a second user charge.
    - The worker completes A1, seals assistant payload M1 to K1, and commits recovery job J1 before reporting task completion.
    - Eligible client B claims J1 at fencing generation 4, decrypts M1, encrypts assistant row E1 with the normal chat key, and submits E1 with generation 4.
    - One Directus transaction writes E1, advances authoritative chat versions, removes J1's sealed payload, and marks J1 terminal. Stale generations cannot mutate this state.
    - A cleanup worker removes terminal metadata and expires AVAILABLE or LEASED jobs after seven days; deletion guards prevent late task insertion after chat/account deletion.
  api_data_ui_privacy_impacts:
    api:
      - New WebSocket preflight, recovery availability/claim/renew, and terminal persistence message types.
      - Existing message_received requires protocol epoch 1 and an acknowledged preflight id.
      - Existing legacy-compatible error frames carry update-required guidance before closing old connections.
    data:
      - Three new Directus collections for preflights, recovery jobs, and inference outbox records, plus immutable recovery-key metadata on chat key versions.
      - Unique constraints cover owner/chat/turn, chat/key-version, task, billing, job, and assistant-message identities.
    ui:
      - Web and Apple show pending-send state during preflight and explicit retry/update/expiry states; no existing history UI is rewritten.
      - CLI prints the backend's update command guidance and exits failed sends non-zero.
    privacy_security:
      - Sealed recovery bytes are the only durable server copy of assistant plaintext-equivalent recovery content.
      - The internal Directus endpoint requires the existing service accountability token, exposes no public role permission, validates bounded payload sizes, and emits no key or content logs.
  migration_rollout:
    - Add empty collections and nullable recovery-key metadata; do not backfill chat history or recovery keys.
    - Publish CLI and Apple support, deploy backend and Directus extension with legacy epoch authoritative, and validate dormant paths.
    - Enter a bounded maintenance send pause, drain legacy accepted turns to zero, close old WebSockets, activate epoch 1, deploy the web bundle, and resume sends.
    - The first epoch-1 send for each valid historical chat registers K1 while preserving W1 and all existing ciphertext.
    - Rollback after activation is roll-forward only: pause sends, repair epoch-1 code, and resume without lowering the epoch.
  observability:
    - Record preflight latency, state-transition latency, outbox lag, sealed-job creation lag, available/leased/expired counts, lease contention, stale-fence rejection, takeover count, and terminal persistence latency.
    - Alert on inference without preflight, task completion without a sealed job, jobs approaching seven days, outbox age, deletion-guard rejection spikes, or p95 preflight regression.
    - Logs contain protocol epoch, state names, durations, counts, error categories, and hashed/prefixed ids only.
  assumptions_to_check:
    - A-4 implementation correctness is checked first by immutable Python, browser TypeScript, CLI TypeScript, and Swift vectors before backend or client feature implementation.
    - TASK-3 starts with a failing Directus extension transaction test that proves rollback and internal-only accountability against the installed runtime.
    - TASK-4 tests current chat/account deletion and device-revocation hooks invoking recovery invalidation synchronously.
  acceptance_criteria_mapping:
    - AC-1, AC-2, and AC-13 are gated by T-BACKEND-PREFLIGHT plus client recovery tests.
    - AC-3 is gated by existing-chat assertions in T-CLI-RECOVERY, T-WEB-RECOVERY, and T-APPLE-RECOVERY.
    - AC-4 through AC-9 are gated by backend job/auth/retention tests and T-CROSS-CLIENT-TAKEOVER.
    - AC-10 and AC-14 are gated by current and released-legacy CLI cutover tests plus T-CUTOVER-EPOCH.
    - AC-11 is gated by T-PREFLIGHT-PERFORMANCE using the defined production-like cohorts.
    - AC-12 is gated independently in Python, CLI TypeScript, browser TypeScript, and Swift.
  risks_open_questions:
    - Material approval is required for the new internal Directus transaction extension and protocol-epoch maintenance cutover.
    - Cross-runtime vectors may disprove A-4; implementation remains blocked until all four runtimes pass.
    - A malicious authorized device can poison its own chat recovery key and remains outside the integrity threat model; accidental incompatibility is covered by local self-tests and cross-runtime vectors.
    - The 250 ms cold-registration cohort may require connection reuse or schema/index tuning but cannot bypass durable acknowledgement.
  affected_files:
    - path: backend/core/directus/schemas/chat_turn_preflights.yml
      reason: Durable turn/preflight state and idempotency identities.
    - path: backend/core/directus/schemas/chat_completion_recovery_jobs.yml
      reason: Sealed payload, lease fencing, retention, and terminal state.
    - path: backend/core/directus/schemas/chat_inference_outbox.yml
      reason: Transactional inference publication without duplicate billing or queue work.
    - path: backend/core/directus/extensions/chat-recovery-transaction/
      reason: Internal Knex transaction boundary for preflight, outbox, encrypted assistant persistence, and terminal recovery state.
    - path: backend/core/api/app/services/chat_recovery_service.py
      reason: Authenticated Python client for the internal transaction endpoint and recovery state machine.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/message_received_handler.py
      reason: Enforce preflight before inference.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/encrypted_chat_metadata_handler.py
      reason: Reuse immutable key and encrypted-row validation in preflight.
    - path: backend/core/api/app/routes/websockets.py
      reason: Replace destructive pending delivery with retained recovery-job notifications.
    - path: backend/core/api/app/tasks/persistence_tasks.py
      reason: Persist preflight, sealed jobs, leases, and terminal acknowledgement safely.
    - path: frontend/packages/ui/src/services/sendersChatMessages.ts
      reason: Add web preflight and recovery-public-key registration.
    - path: frontend/packages/ui/src/services/chatSyncServiceHandlersAI.ts
      reason: Add retained job claim, persistence, and acknowledgement.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add CLI preflight, recovery worker, and update-required handling.
    - path: backend/core/api/app/routes/sdk.py
      reason: Keep API-key saved chats fail-closed behind the server-authoritative protocol epoch while preserving incognito behavior.
    - path: apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift
      reason: Add protocol-compatible recovery derivation and envelope decryption.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Own inactive-chat recovery at app scope.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Gate Apple inference on preflight.
  verification_strategy:
    - Validate and approve exact protocol/crypto plan before tests or feature code.
    - Add shared deterministic cryptographic vectors and run them independently in Python, CLI TypeScript, browser TypeScript, and Swift.
    - Add red backend preflight, outbox/idempotency, recovery lifecycle, authorization, retention, deletion-race, and cutover-epoch tests.
    - Add red CLI contract tests before web and Apple implementation.
    - Deploy before Playwright green verification.
    - Run Apple remote unit/build verification after backend, CLI, and web are green.
    - Finish with cross-client takeover and p95 performance evidence.
  verification_order:
    - Shared crypto vectors and backend contracts.
    - OpenMates CLI contracts.
    - Web Playwright after deployment.
    - Apple remote XCTest and build.
    - Cross-client takeover and performance proof.

