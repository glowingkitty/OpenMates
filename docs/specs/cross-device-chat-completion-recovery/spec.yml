assumptions:
  - id: A-1
    text: Every eligible device can obtain the same raw per-chat key after the user unlocks the existing master-key hierarchy.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/architecture/core/encryption-architecture.md
        summary: Existing clients synchronize a wrapped chat key and unwrap it locally with user-held key material.
  - id: A-2
    text: Existing chat ciphertext and wrapped chat keys do not need modification to derive a separate recovery keypair.
    category: migration
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/services/sendersChatMessages.ts
        summary: Current chat encryption already exposes local raw chat-key material at the client boundary needed for domain-separated derivation.
  - id: A-3
    text: Backend inference already handles response plaintext transiently, so sealing the response before durable recovery storage does not add a new plaintext trust boundary.
    category: privacy_security
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/architecture/messaging/message-processing.md
        summary: AI workers process plaintext transiently while durable private chat storage remains client encrypted.
  - id: A-4
    text: Web, CLI, Apple, and backend runtimes can implement interoperable X25519, HKDF-SHA256, and authenticated encryption primitives.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/openmates-cli/package.json
        summary: CLI has tweetnacl and Node cryptographic primitives.
      - source: frontend/packages/ui/package.json
        summary: Web UI has tweetnacl and browser SubtleCrypto.
      - source: apple/OpenMates/Sources/Core/Networking/NotificationPreviewCrypto.swift
        summary: Apple already uses CryptoKit Curve25519 and authenticated encryption patterns.
      - source: packages/openmates-python/pyproject.toml
        summary: Required launch clients have compatible X25519, HKDF, and AES-GCM primitives.
  - id: A-5
    text: Recovery preflight can meet the 250 ms p95 added-latency budget with one durable round trip on production-like infrastructure.
    category: performance
    required_before: completion
    status: checking
    evidence:
      - source: T-PREFLIGHT-PERFORMANCE
        summary: Must be proven by instrumentation and a production-like performance check before completion.
  - id: A-6
    text: The installed Directus extension runtime provides a Knex database context that can execute the required cross-collection transaction.
    category: persistence
    required_before: implementation
    status: confirmed
    evidence:
      - source: Directus API extension service documentation
        summary: Endpoint and operation handlers receive a database/Knex context, and Directus uses transaction callbacks over that context.
      - source: backend/core/docker-compose.yml
        summary: The Directus extensions directory is already mounted into the Directus runtime.
  - id: A-7
    text: Recovery access can bind to the existing authenticated WebSocket connection identity and react to force-logout/session revocation.
    category: auth
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/auth_ws.py
        summary: Authentication returns a server-derived connection fingerprint with the authenticated user identity.
      - source: backend/core/api/app/routes/websockets.py
        summary: Existing force-logout handling closes the revoked connection identity and can trigger lease invalidation.

contracts:
  api:
    - route: WebSocket chat_turn_preflight
      request: "protocol version, chat id, turn id, user message id, encrypted user row, immutable wrapped chat key, chat-key version, recovery public key, expected message version, and the canonical plaintext inference request used only to compute a server-keyed commitment"
      response: "durable acknowledgement containing preflight id, authoritative versions, accepted key fingerprint, inference-commitment version, and permission to submit inference"
      errors:
        - client_update_required when the clean-cutover protocol is absent or unsupported
        - immutable_chat_key_mismatch when the wrapped key differs for the same key version
        - recovery_key_mismatch when the registered recovery public key differs for the same chat-key version
        - version_conflict with authoritative version data for a safe client retry
        - durable_preflight_failed when persistence did not complete
    - route: WebSocket message_received
      request: "the identical canonical inference payload plus acknowledged preflight id and stable turn id"
      response: "existing queued, processing, streaming, completion, and error lifecycle"
      errors:
        - preflight_required when no durable unconsumed preflight exists
        - preflight_mismatch when chat, turn, user, device, message identity, or server-keyed inference commitment differs
        - preflight_expired when an unsubmitted preflight exceeded its bounded submission window
    - route: WebSocket recovery_job_available / recovery_job_claim
      request: "authenticated device identity, job id, lease request, supported recovery protocol version"
      response: "job id, lease token, lease expiry, sealed envelope, chat id, turn id, key version, and non-sensitive persistence metadata"
      errors:
        - unauthorized or device_revoked without sealed payload disclosure
        - lease_conflict with retry-after information
        - recovery_job_expired when retention elapsed
    - route: Existing encrypted assistant persistence boundary with recovery acknowledgement
      request: "stable recovery job and lease identities plus client-encrypted assistant rows and authoritative version metadata"
      response: "durable persistence acknowledgement and terminal job deletion confirmation"
      errors:
        - stale_lease without deleting the job
        - idempotent_already_persisted when stable message identity was previously committed
        - version_conflict that retains the job for retry
    - route: REST /v1/sdk/chats saved-chat protocol
      request: "API-key device identity, protocol epoch 1, client-encrypted preflight package, canonical inference request, and stable idempotency ids"
      response: "preflight acknowledgement, task/result state, and recovery claim/persistence acknowledgement as needed by synchronous SDK clients"
      errors:
        - client_update_required for SDKs without epoch-1 saved-chat support
        - api_key_revoked or insufficient_scope before recovery payload disclosure
        - incognito requests bypass durable saved-chat recovery and remain non-persistent
  data:
    - Preflight, encrypted user-row persistence, canonical key registration, and version checks commit in one database transaction; acknowledgement is emitted only after commit.
    - A preflight record is uniquely identified by user, chat, and turn and cannot authorize a different inference payload.
    - Inference request fields are canonicalized as RFC 8785 JSON covering user text, model, apps/tools, settings, attachments, parent message, and focus mode. Preflight stores only HMAC-SHA256 under a versioned Vault-held server commitment key; plaintext is discarded before acknowledgement.
    - Preflight states are PREPARED, ENQUEUED, TERMINAL, or ABANDONED; retrying an identical committed state returns its existing identities, while conflicting payload digests fail closed.
    - PREPARED-to-ENQUEUED transition, stable inference task creation, user billing identity, and queue-outbox publication commit atomically; outbox delivery is retryable and duplicate-safe.
    - Abandoned PREPARED records retain the already-durable encrypted user row but start no inference and expire after 24 hours; a later retry with the same identity remains idempotent.
    - One canonical wrapped chat key and one recovery public key exist per chat-key version; mismatches fail closed.
    - A recovery job contains sealed payload bytes, public routing metadata, stable turn/message ids, key version, monotonic lease generation, lease state, created/expiry timestamps, and no raw recovery private key.
    - Recovery-job states are AVAILABLE, LEASED, or TERMINAL; lease generations only increase and every mutation compares the current generation as a fencing token.
    - The server clock controls 60-second leases. A holder may renew while making persistence progress, but after five minutes of continuous tenure a waiting different device receives priority at the next expiry.
    - Recovery job expiry is exactly seven days from durable job creation unless deletion or acknowledgement occurs first.
    - Durable assistant persistence and transition of the recovery job to TERMINAL commit in one database transaction and are idempotent on stable job, turn, assistant-message, and lease-generation identities.
    - Successful acknowledgement immediately erases sealed payload, nonce, ephemeral public key, lease token, holder, and lease expiry. A 24-hour tombstone may retain only job id, owner id, chat id, turn id, assistant-message id, terminal ciphertext digest, and completed timestamp for idempotent retry, then is deleted.
    - Task completion is not acknowledged and user billing is not finalized until the sealed recovery job is durably committed; persistence retries reuse all stable identities.
    - Streamed chunks are provisional active-task state. Terminal completion is emitted only after sealed-job commit; a worker process crash emits failure and never automatically replays inference or tool calls.
    - Chat/account deletion creates a transactional deletion guard before canceling in-flight work so a late worker cannot insert a recovery job after deletion.
  crypto:
    - Protocol version is integer 1; identifiers are canonical lowercase UUID strings encoded as UTF-8, lengths are unsigned 32-bit big-endian integers, and key versions are unsigned 32-bit big-endian integers.
    - Recovery private bytes are HKDF-SHA256 with 32-byte raw chat key input, salt SHA-256 of ASCII `openmates:chat-recovery:v1`, info equal to length-prefixed chat id followed by key version, and output length 32 bytes.
    - The 32 derived bytes are provided as the raw X25519 private-key representation; each runtime's standards-compliant X25519 operation performs scalar clamping. Public keys are raw 32-byte X25519 values.
    - Every registration performs a local derive-public-seal-open self-test before submission. The zero-knowledge backend cannot prove derivation from the unknown chat key, which is an explicit threat-model boundary.
    - Every job uses a fresh random X25519 ephemeral private key. The shared secret is rejected if all zero.
    - Envelope key is HKDF-SHA256 with X25519 shared-secret input, salt SHA-256 of ASCII `openmates:chat-recovery-envelope:v1`, info equal to SHA-256 of the exact associated-data bytes, and output length 32 bytes.
    - Payload encryption is AES-256-GCM with a fresh random 12-byte nonce and 16-byte tag. Associated data is ASCII `OMCR1` followed by length-prefixed owner id, chat id, turn id, job id, assistant-message id, and key version.
    - Envelope JSON fields are exactly `v`, `epk`, `nonce`, and `ciphertext`; byte fields use unpadded base64url, `ciphertext` appends the GCM tag, unknown duplicate fields are rejected, and decoded payload size is capped at 16 MiB.
    - Decrypted payload is strict UTF-8 JSON containing the stable assistant completion and persistence metadata; schema validation rejects missing, duplicate, unknown security-critical, or mismatched identity fields before chat-key encryption.
    - A new ephemeral sealing key and nonce are generated for every recovery job; nonce reuse is forbidden. Shared immutable vectors define the exact byte layout before implementation begins.
  ui_states:
    - Sending remains pending while preflight is in progress and processing begins only after acknowledgement.
    - Preflight failures are visible and retryable without implying that inference started.
    - An outdated CLI displays update-required guidance and exits the send operation non-zero.
    - Recovery expiry is visible without exposing plaintext or silently replaying paid inference.
    - Streamed text is labeled by state as provisional until the post-seal terminal event; a worker failure retains the explicit failed state rather than substituting a replayed answer.
  privacy_security:
    - Backend durable stores contain no plaintext private chat content, raw chat keys, recovery private keys, master keys, or unwrapped key material.
    - Logs and traces contain only protocol versions, durations, sanitized error categories, counts, and hashed or prefixed identifiers.
    - Authorization is checked on list, claim, payload delivery, persistence acknowledgement, deletion, and retry.
    - Device revocation immediately prevents new claims and acknowledgements and invalidates active leases for that device.
    - Chat and account deletion make jobs inaccessible and delete primary-store rows in the same logical transaction; active leases are invalidated and late inserts are rejected by deletion guards.
    - Replicas, caches, and queues must observe deletion within five minutes. Encrypted backup copies follow the existing documented backup-retention policy and are not independently addressable by the application.
    - The integrity threat model excludes a malicious already-authorized device intentionally registering incorrect key material; honest clients mitigate accidental poisoning with immutable vectors and local self-tests.
    - Recovery operations require the existing authenticated WebSocket session and its server-derived connection/device fingerprint. Force logout or session revocation closes that identity, rejects later operations, and invalidates its active leases; no client-supplied capability claim grants access.
    - SDK saved-chat routes must respect the server-authoritative protocol epoch and fail before inference when recovery is inactive or sends are paused.
  rollout:
    - Publish recovery-capable CLI and Apple builds before cutover; no prior external Apple cohort requires compatibility.
    - Deploy schema, state machines, cleanup, transactional outbox, and protocol-epoch support while the legacy epoch remains authoritative.
    - At cutover, pause all new inference submissions, allow already accepted legacy turns to reach durable terminal state or explicit failure, and require the measured legacy in-flight count to be zero.
    - Close pre-cutover WebSockets with a legacy-compatible `error` frame whose message tells CLI users to update, activate protocol epoch 1 centrally, deploy the epoch-1 web bundle, and resume sends.
    - Epoch 1 accepts only acknowledged recovery preflight. Legacy clients may continue local/read operations that do not submit inference, but all legacy sends fail before inference with client_update_required.
    - Rollback after epoch activation pauses sends and rolls forward a protocol-compatible fix. It never lowers the epoch or re-enables legacy inference against epoch-1 state.
    - No negotiated capability feature flag or legacy send fallback remains after cutover.
  performance:
    - Added latency is measured from client send intent through durable preflight acknowledgement and server ENQUEUED commit, minus the same path's preflight-free baseline; model queue and model execution time are excluded.
    - The production-like check targets the dev API and persistence topology from the designated CI runner region using 100 warm-up turns and at least 1000 measured turns at concurrency 10.
    - Measurements include client recovery-key derivation or cached-key lookup, encryption, network round trip, durable database commit, and transactional outbox commit.
    - Results report warm-existing-chat and cold-first-post-cutover-send cohorts separately; each cohort must add at most 250 ms at p95 using the nearest-rank percentile.

