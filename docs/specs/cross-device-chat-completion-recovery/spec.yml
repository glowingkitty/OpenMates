scenarios:
  - id: S-1
    title: New turn cannot start inference before durable encrypted preflight
    given:
      - Alice is authenticated on a recovery-capable web, Apple, or CLI client.
      - Alice can unlock the target chat key.
    when:
      - Alice submits a new message.
    then:
      - The client persists the encrypted user row, immutable wrapped chat-key envelope, recovery public key, key version, turn id, and message id through one acknowledged preflight contract.
      - The backend starts inference only after durable preflight success.
      - A failed or timed-out preflight leaves the message visibly unsent or retryable and starts no billable inference.

  - id: S-2
    title: Existing chat remains readable and lazily gains recovery support
    given:
      - Alice has an existing chat created before rollout with valid encrypted history and a wrapped chat key.
      - The chat has no registered recovery public key.
    when:
      - Alice opens the chat or submits its first post-cutover turn.
    then:
      - Opening and decrypting existing history requires no migration or rewrite.
      - The first post-cutover send derives and registers recovery material during preflight.
      - Existing ciphertext, message ids, versions, and wrapped key remain unchanged.

  - id: S-3
    title: Secondary device completes an origin-disconnected turn
    given:
      - Alice starts a turn on device A and preflight succeeds.
      - Device A disconnects before assistant completion is durably stored.
      - Device B is authenticated, non-revoked, recovery-capable, and can unlock the same chat key.
    when:
      - Inference completes and device B synchronizes recovery jobs.
    then:
      - After per-job ephemeral secrets are erased, durable backend state stores a sealed completion that cannot be decrypted from at-rest data alone.
      - Device B leases and decrypts the job, encrypts the assistant data with the chat key, and durably persists it through the normal encrypted message boundary.
      - Device B acknowledges completion only after durable persistence succeeds.
      - The final chat contains one assistant turn and the recovery job is deleted.

  - id: S-4
    title: Concurrent devices cannot duplicate completion
    given:
      - Two eligible devices observe the same incomplete recovery job.
    when:
      - Both try to claim or persist it during connection churn or lease expiry.
    then:
      - At most one active lease exists at a time.
      - Lease expiry permits takeover without losing the job.
      - Stable turn and assistant-message ids make repeated persistence idempotent.
      - A stale acknowledgement cannot delete a newer active lease or an unpersisted job.

  - id: S-5
    title: Connected origin handles the same durable recovery contract
    given:
      - Device A remains connected and can unlock the chat key.
    when:
      - Its inference completes normally.
    then:
      - The backend still creates the sealed recovery job before delivery.
      - Device A leases, persists, and acknowledges through the same contract used for takeover.
      - Foreground connection state never bypasses durable job creation.
      - Any earlier streamed chunks are provisional; terminal completion is delivered only after the sealed job commits.

  - id: S-6
    title: Revoked or unauthorized device cannot recover a completion
    given:
      - A recovery job exists for Alice's private chat.
    when:
      - Another user, a logged-out client, or a revoked Alice device requests or acknowledges the job.
    then:
      - The backend rejects the request without revealing sealed payload or sensitive chat metadata.
      - Device revocation invalidates leases and future recovery access for that device.
      - Authorization failures are audit-visible without logging plaintext or key material.

  - id: S-7
    title: Recovery retention and deletion are bounded
    given:
      - A sealed job has not been durably acknowledged.
    when:
      - Seven days elapse, the chat is deleted, or Alice deletes the account.
    then:
      - The sealed payload and associated lease material are deleted.
      - Expiry does not silently replay inference or invent encrypted content.
      - A minimal non-sensitive terminal status may inform a capable client that recovery expired.

  - id: S-8
    title: Outdated CLI is blocked cleanly
    given:
      - Alice uses a CLI version that sends the legacy message contract.
    when:
      - Alice attempts to submit a post-cutover turn.
    then:
      - The backend starts no inference and returns a stable update-required error.
      - The CLI displays a concise command or package update instruction.
      - Existing locally accessible chat history remains readable.

  - id: S-9
    title: Healthy sends meet the latency budget
    given:
      - A healthy client connection and normally responsive persistence dependencies.
    when:
      - Preflight is added to the send path.
    then:
      - Added send-to-processing latency is measured independently of model queue time.
      - Added preflight latency is at most 250 ms at p95 over the agreed production-like window.
      - Failures and timeouts remain visible rather than silently falling back to unsafe processing.

  - id: S-10
    title: Retry after a lost submission acknowledgement does not duplicate inference
    given:
      - Durable preflight succeeded for one stable turn id.
      - The backend committed inference queue publication but the client did not receive its acknowledgement.
    when:
      - The client retries submission with the same preflight and turn identity.
    then:
      - The backend returns the existing task identity instead of enqueueing another inference.
      - User billing is keyed to the same turn and cannot be charged twice.
      - Persistence retries reuse the same assistant-message identity and produce at most one terminal recovery job.
      - A worker crash after inference starts produces an explicit failed turn and no automatic inference or tool replay.

  - id: S-11
    title: Clean cutover drains legacy work without mixed protocol state
    given:
      - Recovery-capable releases are available for web, Apple, and CLI.
      - Legacy turns or WebSocket connections may still exist.
    when:
      - The operator activates the new protocol epoch.
    then:
      - New sends pause while accepted legacy turns drain to terminal persistence or explicit failure.
      - The epoch changes only after the legacy in-flight count reaches zero and old WebSockets are closed with update-required guidance.
      - New-protocol sends then resume with no legacy fallback.
      - Rollback pauses sends and rolls forward a compatible fix; it never re-enables legacy inference over new recovery state.

  - id: S-12
    title: SDK saved-chat routes remain fail-closed during cutover
    given:
      - Alice uses a npm or pip SDK with an API key authorized for saved chats.
      - The server-authoritative recovery protocol epoch is zero or sends are paused.
    when:
      - Alice attempts to create or continue a saved private chat through the SDK route.
    then:
      - The route fails before durable recovery preflight or inference with update-required guidance.
      - Incognito SDK requests remain non-persistent and outside this recovery protocol.

