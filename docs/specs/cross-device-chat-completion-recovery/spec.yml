apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
