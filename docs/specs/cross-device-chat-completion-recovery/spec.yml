    - apple/OpenMatesShared/BackgroundChatSender.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    - apple/OpenMatesTests/ChatCompletionRecoveryTests.swift
  parity_expectations:
    - Apple participates in the same preflight, recovery-key derivation, sealed-job lease, durable persistence, and acknowledgement protocol as web and CLI.
    - The Apple app owns recovery outside the mounted chat view so an inactive chat can complete.
    - Existing Apple chat history remains readable without migration; the first post-cutover send registers recovery material during preflight.
    - Apple never logs or sends a raw chat key, recovery private key, or plaintext recovery payload to durable backend storage.
    - Any update-required or recovery-expired message uses AppStrings and existing OpenMates UI primitives.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatCompletionRecoveryTests
    - A cross-device test where an Apple-origin turn is durably completed by web or CLI after Apple disconnects.
  intentional_native_differences:
    - Apple uses CryptoKit, Keychain, SwiftData, and App Group storage while preserving byte-for-byte protocol compatibility with TypeScript and Python implementations.

clarification:
  rounds:
    - question: Which clients must support cross-device completion recovery in the first release?
      answer: Web, Apple, and CLI; npm and pip SDKs are excluded.
    - question: Should sealed recovery be optional or required from the first release?
      answer: Required for every new turn from the first release.
    - question: How long may an incomplete sealed recovery job remain on the backend?
      answer: Seven days, with immediate sealed-payload and lease deletion after durable acknowledgement, chat deletion, or account deletion.
    - question: May inference begin before encrypted user persistence and key-envelope acknowledgement?
      answer: No. Preflight must succeed first, with no more than 250 ms added p95 latency on a healthy connection.
    - question: Should rollout negotiate legacy client capabilities or use a clean cutover?
      answer: Use a clean cutover. There are no external Apple testers, and outdated CLI users should receive a clear update-required message.
    - question: Should the implementation also cover SDK clients before web and Apple?
      answer: Yes. Implement backend, CLI, npm SDK, and pip SDK first, then web, then Apple.
    - question: Are SDKs part of the intended product recovery use case?
      answer: No. The required use cases are users starting saved chats in CLI, web app, or Apple app, and any of those clients completing encryption work after a connection drop. SDKs are not launch-gating clients for this spec.
  vision_summary: >
    Apply a clean-cutover recovery protocol to every new turn submitted from CLI,
    web, or Apple, including turns in old chats. Existing history remains unchanged
    and readable. Before inference, the submitting client must durably persist
    encrypted user content and prove the immutable wrapped key plus per-chat
    recovery public key. The backend then retains only a sealed assistant recovery
    job until an eligible CLI, web, or Apple client durably stores the completion
    and acknowledges it. SDK routes must not bypass the epoch gate, but SDK
    recovery is not launch-gating product scope.
  approved_by_user: true

