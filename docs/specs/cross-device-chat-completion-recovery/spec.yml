schema_version: 2
id: cross-device-chat-completion-recovery
title: Cross-Device Encrypted Chat Completion Recovery
status: implementing

goal: >
  Ensure every newly submitted chat turn can be completed durably by any
  authenticated, non-revoked, recovery-capable web, Apple, or CLI client that
  can unlock the chat key when backend inference succeeds, even when the device
  that started the turn disconnects. The backend may process plaintext and seal
  the result transiently as it does today, but after ephemeral sealing material
  is erased, durable storage alone must contain only client-encrypted chat rows
  and a time-limited sealed recovery job that cannot be decrypted from at-rest
  data.

scope:
  in:
    - Every new authenticated private-chat turn submitted from web, Apple, or OpenMates CLI, including turns added to existing chats.
    - A clean protocol-epoch cutover with a bounded send pause and drain, but no legacy send fallback or negotiated capability feature flag.
    - A durable preflight acknowledgement before inference starts.
    - Durable encrypted user-message persistence, immutable wrapped chat-key validation, and per-chat recovery-public-key registration in preflight.
    - A domain-separated recovery keypair deterministically derived from the existing per-chat key on capable clients.
    - Backend-created sealed assistant-completion recovery jobs that any eligible device can lease, decrypt, persist with the chat key, and acknowledge.
    - Lease expiry, retry, idempotency, duplicate suppression, device revocation, account deletion, chat deletion, and seven-day recovery-job expiry.
    - Existing-chat compatibility without rewriting history or bulk-migrating old chats.
    - A blocking update-required response for outdated CLI clients that attempt to send after cutover.
    - Backend, CLI, web, and Apple verification, including shared deterministic cryptographic vectors.
    - Preflight latency instrumentation and a maximum added healthy-connection latency of 250 ms at p95.
  out:
    - Re-encrypting or rewriting existing chat history.
    - Bulk-registering recovery public keys for chats before their next post-cutover send.
    - Chat-key rotation or changing the existing master-key and wrapped-chat-key hierarchy.
    - Persisting plaintext user messages, assistant messages, raw chat keys, or recovery private keys on the backend.
    - Anonymous or incognito chats that never enter authenticated server persistence.
    - npm and pip SDKs as user-facing launch-gating clients. SDK saved-chat routes remain fail-closed behind the protocol epoch so they cannot bypass CLI/web/Apple cutover safety, but SDK cross-client takeover is not part of this release scope.
    - Automatic inference replay after a seven-day recovery job expires.
    - A staged legacy fallback, negotiated capability flag, or simultaneous support for old and new send protocols.
    - Shared, team-owned, or ownership-transferred chats; those require a separate multi-principal key and authorization contract.

