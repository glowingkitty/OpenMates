implementation_plan:
  existing_patterns:
    - Extend the existing Apple audit, remote Apple wrapper, test control plane, and workflow-review helper instead of adding parallel frameworks.
    - Reuse sessions.py local session metadata for stale-read state.
  architecture: >
    Deterministic Python scripts own policy and testable classification. The
    OpenCode hook records/compares local file hashes but delegates decisions to
    sessions.py. GitHub workflow filters consume path sets generated or validated
    by the shared CI impact classifier. The workflow review collector produces a
    bounded report and does not autonomously invoke an LLM.
  data_flow:
    - OpenCode read event records session-relative file hash.
    - OpenCode edit event checks the current hash before the edit hook proceeds.
    - Test runner normalizes all retry attempts into a final result plus flake history.
    - CI classifier maps changed paths to package/web impact decisions.
    - Explicit workflow-review command collects redacted OpenCode, git, and test metadata into a report.
  affected_files:
    - path: scripts/audit_apple_release_preflight.py
      reason: Semantic Apple target and source contract checks.
    - path: scripts/apple_remote.py
      reason: Non-uploading Release archive preflight and upload gate.
    - path: scripts/sessions.py
      reason: Session-scoped file hash lifecycle and stale-read guard.
    - path: .opencode/plugins/openmates-hooks.js
      reason: Read and edit lifecycle delegation.
    - path: scripts/run_tests.py
      reason: Retry normalization and flake history persistence.
    - path: scripts/ci_impact.py
      reason: Shared deterministic CI path classification.
    - path: .github/workflows/publish-cli.yml
      reason: CLI path-scoped triggers.
    - path: .github/workflows/publish-python-sdk.yml
      reason: Python SDK path-scoped triggers.
    - path: scripts/_workflow_review_helper.py
      reason: OpenCode-only explicit review collection.
  verification_strategy:
    - Run each focused Python test suite red before its implementation slice and green after it.
    - Run python3 scripts/spec_validate.py docs/specs/deterministic-workflow-guardrails/spec.yml after spec changes.
    - Run python3 scripts/spec_verify.py docs/specs/deterministic-workflow-guardrails/spec.yml before deploy.
  verification_order:
    - Deterministic script tests first.
    - Apple remote command contract tests second.
    - CI workflow static scope tests third.
    - OpenCode workflow-review collector tests last.

