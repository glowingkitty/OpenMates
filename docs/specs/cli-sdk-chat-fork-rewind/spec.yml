decisions:
  - id: D-1
    status: active
    decision: Expose both non-destructive fork and destructive same-chat rewind flows.
    reason: The user explicitly clarified that fork and from-message continuation are different use cases.
    decided_at: "2026-07-22"
  - id: D-2
    status: active
    decision: Name destructive same-chat continuation `rewind`, and provide `retry` as a convenience wrapper for the latest failed/orphan user turn.
    reason: The name makes destructive history editing explicit and keeps common failed-chat recovery easy.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: Require `--yes` for destructive CLI rewind/retry and explicit confirmation booleans for SDK rewind/retry.
    reason: Same-chat history deletion must not happen accidentally.
    decided_at: "2026-07-22"
  - id: D-4
    status: active
    decision: Keep the first slice personal-chat only.
    reason: Personal saved-chat recovery solves the immediate failed validation-chat need and avoids team/shared/incognito key and permission complexity.
    decided_at: "2026-07-22"

