    type: pytest
    file: backend/tests/test_sdk_chat_fork_rewind.py
    command: docker exec api python -m pytest /app/backend/tests/test_sdk_chat_fork_rewind.py -q
    covers: [AC-2, AC-3, AC-6]
    assertions:
      - fork endpoint rejects unsupported chat kinds and missing scopes
      - fork endpoint persists only client-encrypted copied messages for a new owner-scoped chat
      - rewind endpoint requires explicit destructive confirmation
      - rewind endpoint deletes only messages after the boundary and updates messages_v transactionally
      - rewind endpoint invalidates recovery/cache state for the deleted tail
    red_phase:
      required: true
      expected: fail_before_routes_exist
      evidence:
        status: pending
    green_phase:
      required: true
      expected: pass
      evidence:
        status: pending
