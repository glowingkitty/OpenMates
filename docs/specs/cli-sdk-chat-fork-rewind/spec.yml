implementation_plan:
  spec_path: docs/specs/cli-sdk-chat-fork-rewind/spec.yml
  existing_patterns:
    - Existing web fork uses client-side decrypt/re-encrypt in frontend/packages/ui/src/services/forkChatService.ts.
    - Existing CLI saved-chat send already decrypts chat keys locally and uses durable recovery preflight.
    - Existing SDK saved-chat send already uses client-encrypted user/assistant messages and recovery claim/persist.
    - Existing SDK routes already enforce API-key scopes and approved device requirements.
  architecture: >
    Implement a backend owner-scoped encrypted persistence/deletion contract for
    fork and rewind while keeping all plaintext operations in CLI/SDK clients.
    CLI/SDK load and decrypt the source chat locally, build copied encrypted rows
    or choose deletion boundaries locally, then call backend APIs that persist or
    delete ciphertext only. Retry composes message listing, rewind, and normal
    saved-chat send.
  data_flow:
    - CLI/SDK load source chat and messages using existing authenticated saved-chat load paths.
    - For fork, CLI/SDK decrypt source messages locally, create a new chat key, re-encrypt copied messages, and call the encrypted fork API.
    - For rewind, CLI/SDK identify the selected boundary and call the rewind API with expected version and confirmation.
    - For rewind with send, CLI/SDK waits for the rewind acknowledgement before invoking the existing saved-chat send path.
    - For retry, CLI/SDK identify the latest retryable user message, rewind to before it, then resend the same plaintext prompt.
  affected_files:
    - path: backend/core/api/app/routes/sdk.py
      reason: Add owner-scoped API-key endpoints for encrypted fork persistence and destructive rewind.
    - path: backend/tests/test_sdk_chat_fork_rewind.py
      reason: Cover backend API contracts and failure modes.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add source CLI client helpers for message listing, fork, rewind, and retry composition.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add `chats messages`, `chats fork`, `chats rewind`, and `chats retry` commands and help text.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: Cover command parsing and user-facing output.
    - path: frontend/packages/openmates-cli/tests/client.test.ts
      reason: Cover CLI client fork/rewind/retry request composition.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: Add npm SDK chat helper methods.
    - path: frontend/packages/openmates-cli/tests/sdk.test.ts
      reason: Cover npm SDK parity and destructive confirmation behavior.
    - path: frontend/packages/openmates-py/
      reason: Add pip SDK parity for the same chat helper methods.
    - path: scripts/audit_sdk_cli_parity.py
      reason: Update deterministic parity audit if it tracks chat helper surfaces.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/cli-sdk-chat-fork-rewind/spec.yml
    - docker exec api python -m pytest /app/backend/tests/test_sdk_chat_fork_rewind.py -q
    - real dev-server API proof through source CLI/SDK auth state before CLI/SDK green gates
    - source CLI command tests and real CLI smoke against api.dev.openmates.org
    - npm SDK and pip SDK local smoke calls against api.dev.openmates.org
    - python3 scripts/audit_sdk_cli_parity.py
  verification_order:
    - REST/API contract tests and dev-server proof first.
    - CLI implementation and dev-server proof second.
    - npm SDK and pip SDK parity third.
    - CI/daily wiring only after local dev-server CLI/SDK proof.
    - Web and Apple are out of scope for this slice.

