  - id: AC-6
    scenario: S-2
    text: Team, shared read-only, incognito, anonymous, and undecryptable chats are rejected explicitly in the first slice.
    required: true
    status: pending
    coverage_status: covered
    verification_scope: related_backend
    verification_ids: [T-API-FORK-REWIND, T-CLI-FORK]

contracts:
  api:
    - route: POST /v1/sdk/chats/{chat_id}/fork
      access_model: developer API-key REST API and first-party CLI/SDK helper surface
      auth: API key with chat read and create saved-chat scopes, approved device identity, and owner-scoped personal chat access
      request: Client supplies new chat id, encrypted new chat metadata/key wrapper as needed, and client-encrypted message history copied through the selected source message.
      response: New chat id, copied message count, messages_v, and encrypted metadata echo sufficient for CLI/SDK cache refresh.
      errors:
        - 400 invalid_message_boundary
        - 400 encrypted_history_required
        - 403 missing_scope
        - 403 approved_device_required
        - 404 chat_not_found
        - 409 unsupported_chat_kind
      plaintext_policy: Backend must never receive decrypted message content; all message content and metadata are client-encrypted fields.
    - route: POST /v1/sdk/chats/{chat_id}/rewind
      access_model: developer API-key REST API and first-party CLI/SDK helper surface
      auth: API key with chat read and delete/update saved-chat scopes, approved device identity, and owner-scoped personal chat access
      request: Client supplies boundary message id, expected messages_v, optional encrypted replacement user turn through normal saved-chat send flow, and confirmation flag for destructive execution.
      response: Deleted message count, new messages_v, invalidated recovery/cache state counts when available, and optional replacement task id if a send was requested.
      errors:
        - 400 destructive_confirmation_required
        - 400 invalid_message_boundary
        - 403 missing_scope
        - 403 approved_device_required
        - 404 chat_not_found
        - 409 version_conflict
        - 409 active_task_in_progress
      plaintext_policy: Backend deletes encrypted rows by ownership and message ordering; it must not decrypt or receive plaintext transcript content.
  cli:
    - command: openmates chats messages <chat-id> [--json]
      behavior: Print chronological message IDs, roles, timestamps, and previews decrypted locally by the CLI.
    - command: openmates chats fork <chat-id> --from-message <message-id> [--title <title>] [--json]
      behavior: Create a new encrypted chat with copied history through the boundary and print the new chat ID.
    - command: openmates chats rewind <chat-id> --to-message <message-id> [--send <prompt>] [--dry-run] [--yes] [--json]
      behavior: Dry-run by default unless `--yes`; destructive execution deletes the tail and optionally sends a replacement prompt in the same chat.
    - command: openmates chats retry <chat-id> [--dry-run] [--yes] [--json]
      behavior: Identify and resend the latest retryable user prompt by delegating to rewind plus normal send.
  sdk:
    - npm: client.chats.messages({ chatId })
    - npm: client.chats.fork({ chatId, fromMessageId, title? })
    - npm: client.chats.rewind({ chatId, toMessageId, send?, confirmDestructive })
    - npm: client.chats.retry({ chatId, confirmDestructive })
    - pip: client.chats.messages(chat_id=...)
    - pip: client.chats.fork(chat_id=..., from_message_id=..., title=None)
    - pip: client.chats.rewind(chat_id=..., to_message_id=..., send=None, confirm_destructive=True)
    - pip: client.chats.retry(chat_id=..., confirm_destructive=True)
  data:
    - Forked chats use a new chat id and new chat key; source message ciphertext is decrypted locally and re-encrypted locally for the new chat.
    - Rewind deletes messages after the selected boundary and updates `messages_v` to the remaining durable message count in the same transaction as deletion.
    - Rewind invalidates AI inference cache, sync cache, and active recovery state for the deleted tail before any replacement send is started.
    - Retry considers a user message retryable only when no later valid assistant message is present in the locally decrypted transcript and durable metadata agrees after sync.
  privacy_security:
    - No endpoint accepts decrypted message content or decrypted chat metadata.
    - All destructive operations require owner authorization and an approved device/API-key context.
    - Destructive CLI commands require `--yes` or `--dry-run`; SDK commands require an explicit `confirmDestructive`/`confirm_destructive` boolean.
    - Logs must include chat/message identifiers only, never decrypted content.
  rate_limits_budget:
    - Fork and message listing do not consume AI credits.
    - Rewind without send does not consume AI credits.
    - Rewind with send and retry consume normal saved-chat AI credits for the replacement turn only.
    - Existing API-key and WebSocket rate limits apply; no new bypass is introduced.

