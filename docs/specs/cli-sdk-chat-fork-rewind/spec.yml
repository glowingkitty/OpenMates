schema_version: 2
id: cli-sdk-chat-fork-rewind
title: CLI And SDK Chat Fork, Rewind, And Retry
status: implementing

goal: >
  Add first-party CLI and SDK support for recovering or branching saved personal
  chats from a specific message. Users must be able to list message IDs, create a
  non-destructive fork through a chosen message, destructively rewind the same
  chat to an earlier point with explicit confirmation, and retry the latest
  orphan or failed user turn without hand-editing Directus state.

scope:
  in:
    - A CLI message-listing command that exposes stable message IDs, roles, timestamps, and short previews for a saved personal chat.
    - A non-destructive CLI fork command that creates a new encrypted personal chat from an existing chat through a selected message.
    - A destructive CLI rewind command that removes messages after a selected message in the same chat and can optionally send a new prompt.
    - A safe CLI retry command that finds the latest user message without a valid assistant response after it, rewinds to the retry boundary, and resends that user prompt.
    - npm SDK parity for listing messages, forking, rewinding, and retrying saved personal chats.
    - pip SDK parity for the same operations.
    - First-party backend API/WebSocket support only where server-side ownership, deletion, version integrity, or encrypted persistence requires it.
  out:
    - Web UI changes; the existing browser fork flow remains unchanged in this slice.
    - Apple app parity implementation; Apple impact is recorded but implementation is deferred unless later requested.
    - Team chats, shared read-only chats, incognito chats, anonymous chats, and imported third-party chats with missing key material.
    - Server-side decryption, plaintext transcript transfer to the backend, or server-generated fork content.
    - Rewriting existing assistant messages or editing historical message ciphertext.
    - Automatically publishing or sharing a forked chat.

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials, so no tracker lookup could be performed from this environment."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/explain-in-new-chat/spec.yml
    - docs/specs/realistic-long-chat-cli-validation/spec.yml
    - docs/specs/apple-chat-management-sharing-parity/spec.yml
  code_patterns:
    - frontend/packages/ui/src/services/forkChatService.ts implements the existing web-only zero-knowledge client fork flow.
    - frontend/packages/openmates-cli/src/client.ts owns the source CLI saved-chat send and recovery flow.
    - frontend/packages/openmates-cli/src/sdk.ts owns the npm SDK chats facade and saved-chat recovery flow.
    - backend/core/api/app/routes/sdk.py exposes API-key SDK chat list/load/create/recovery routes.
    - backend/core/api/app/routes/handlers/websocket_handlers/message_received_handler.py owns first-party WebSocket saved-chat sends.
    - backend/core/api/app/routes/handlers/websocket_handlers/encrypted_chat_metadata_handler.py and related persistence tasks handle encrypted client-owned chat metadata/history writes.
  tests:
    - backend/tests/test_sdk_chat_recovery.py
    - backend/tests/test_sdk_cli_parity_api_key_auth.py
    - backend/tests/test_encrypted_chat_metadata_guard.py
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - frontend/packages/openmates-cli/tests/sdk.test.ts

apple_impact:
  affected_files:
    - apple/openmates/OpenMates/Features/Chat/
  parity_expectations:
    - Apple already has chat-management parity expectations that mention fork/explain behavior, but this spec changes only CLI/SDK/API surfaces.
    - Native same-chat destructive rewind/retry is not implemented in this slice.
  verification:
    - Apple not implemented in this slice; record as deferred parity if the CLI/SDK contract ships.
  intentional_native_differences:
    - CLI/SDK expose recovery/admin-like chat repair operations before native UI because the immediate need is validation-chat recovery.

clarification:
  rounds:
    - question: Should the first CLI/SDK slice support both non-destructive fork and one-shot continue-from-message?
      answer: Both fork and from-message continuation must be supported because they are different use cases.
    - question: Should same-chat continuation be modeled as an explicit destructive operation with a retry shortcut?
      answer: >
        Use the recommended command set: fork for non-destructive branching,
        rewind for same-chat destructive continuation, retry for the latest
        orphan/failed turn, plus easy message ID discovery.
  vision_summary: >
    The user needs two separate workflows: branch safely into a new chat, and repair
    the same chat by deleting the bad tail and continuing from an earlier point.
    The destructive workflow must be explicit and confirmable, while retry should
    be a convenience wrapper for the common failed-chat case.
  approved_by_user: true

assumptions:
  - id: A-1
    text: The first implementation slice can be limited to personal saved chats because the failed validation chat is personal and team/shared/incognito support adds separate permission and key-management work.
    status: confirmed
    required_before: implementation
    evidence:
      - User approved the recommended command set for recovering the earlier failed chat; no team/shared requirement was requested.
  - id: A-2
    text: Rewind may delete encrypted message rows and associated recovery/cache state after the chosen boundary, but must not expose plaintext to the server.
    status: unchecked
    required_before: implementation

scenarios:
  - id: S-1
    title: List message IDs for a saved chat
    given:
      - Alice has a saved personal chat with several user and assistant messages.
    when:
      - Alice runs `openmates chats messages <chat-id>`.
    then:
      - The CLI prints messages in chronological order with role, timestamp, short preview, and full message ID or copyable short ID.
      - JSON output includes enough fields for scripts to choose a fork or rewind boundary.

  - id: S-2
    title: Fork a saved chat through a chosen message
    given:
      - Alice has a saved personal chat and can decrypt its chat key locally.
      - Alice selected an assistant message ID as the fork boundary.
    when:
      - Alice runs `openmates chats fork <chat-id> --from-message <message-id>`.
    then:
      - A new saved personal chat is created with a new chat ID and new encrypted chat key.
      - The new chat contains encrypted copies of source messages up to and including the selected message.
      - The source chat is unchanged.
      - The CLI prints the new chat ID and copied message count.

  - id: S-3
    title: Rewind the same chat and send a replacement prompt
    given:
      - Alice has a saved personal chat whose tail after message `<message-id>` is invalid or unusable.
    when:
      - Alice runs `openmates chats rewind <chat-id> --to-message <message-id> --send "Continue from here" --yes`.
    then:
      - Messages after the selected boundary are deleted from durable encrypted storage for that chat.
      - Chat version metadata reflects the remaining durable message count.
      - AI inference caches and recovery state for the deleted tail are invalidated.
      - The replacement prompt is sent as the next normal saved-chat turn in the same chat.

  - id: S-4
    title: Retry the latest failed or orphan user turn
    given:
      - Alice has a saved personal chat where the latest user message has no valid assistant response after it.
    when:
      - Alice runs `openmates chats retry <chat-id> --yes`.
    then:
      - The CLI identifies the retryable user message and shows the planned deletion/send boundary in dry-run output.
      - With confirmation, the chat is rewound to before that user message and the same plaintext prompt is resent.
      - If no retryable user message is found, the CLI exits with a clear no-op error and changes nothing.

  - id: S-5
    title: SDKs expose the same capabilities
    given:
      - A script has an approved OpenMates SDK session with chat read/create/delete permissions and local master-key access.
    when:
      - It calls SDK message listing, fork, rewind, or retry helpers.
    then:
      - npm SDK and pip SDK expose equivalent option names and result fields.
      - SDK helpers preserve zero-knowledge encryption boundaries and return structured errors for unsupported chats, missing keys, permission failures, and destructive-confirmation omissions.

