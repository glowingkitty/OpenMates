risks:
  - id: R-1
    risk: Destructive rewind could delete more encrypted history than intended if boundary ordering is wrong.
    mitigation: Require dry-run output, explicit confirmation, expected messages_v, and backend owner/version checks.
  - id: R-2
    risk: Fork could leak plaintext if implemented server-side.
    mitigation: Contract requires local decrypt/re-encrypt and encrypted-only backend payloads.
  - id: R-3
    risk: Retry might resend the wrong user prompt when the latest assistant response is missing due to local sync lag.
    mitigation: Require fresh sync/load before retry and report dry-run boundary before destructive execution.

open_questions:
  - Should team/shared/incognito support be added in a later spec after the personal-chat recovery path is verified?
