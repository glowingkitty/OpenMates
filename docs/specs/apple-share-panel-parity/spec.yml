implementation_plan:
  spec_path: docs/specs/apple-share-panel-parity/spec.yml
  existing_patterns:
    - The browser SettingsShare.svelte is the single source for chat and embed share panel behavior.
    - CryptoManager already supplies PBKDF2 and AES-GCM building blocks required by the web share format.
    - MainAppView appOverlay supplies custom OpenMates panel chrome and EmbedFullscreenContainer already owns the embed-share trigger.
  architecture: >
    Add a small Apple share-crypto service that reproduces the web serialization,
    PBKDF2, AES-GCM, URL-safe base64, and short-link encryption contracts. Replace
    divergent ChatShareView and ShareEmbedView implementations with a shared,
    mode-driven custom product panel that receives chat/embed key material through
    existing key managers. Keep only the post-generation OS share action platform
    native. Persist and sync chat share metadata through the existing share routes
    and local encrypted chat records rather than creating a new backend protocol.
  data_flow:
    - Chat or embed action provides a typed share target and effective encryption key.
    - The panel validates password/settings and creates the web-compatible long encrypted URL locally.
    - Authenticated owners attempt the existing durable short-link API; only the opaque encrypted URL is sent.
    - The panel marks/share-syncs the native chat or embed metadata through existing API and local persistence paths.
    - The generated state presents copy, QR, adjustment, unshare where applicable, and system-share actions.
  affected_files:
    - path: apple/OpenMates/Sources/Core/Crypto/ShareLinkCrypto.swift
      reason: Web-compatible share-key and short-link crypto with no plaintext logging.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatShareView.swift
      reason: Replace incompatible endpoint-based implementation with the shared product panel.
    - path: apple/OpenMates/Sources/Features/Embeds/Views/ShareEmbedView.swift
      reason: Remove stock Form/NavigationStack/toolbar implementation and use embed mode of the shared panel.
    - path: apple/OpenMates/Sources/Features/Chat/Views/AppleSharePanel.swift
      reason: Shared custom configuration and generated-link UI for chat and embed modes.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Present the shared panel from chat actions with correct custom overlay state.
    - path: apple/OpenMates/Sources/Features/Embeds/Grouping/EmbedFullscreenContainer.swift
      reason: Present the shared panel from embed fullscreen without stock sheet chrome.
    - path: apple/OpenMatesTests/ShareLinkCryptoTests.swift
      reason: Cross-client crypto contract fixtures.
    - path: apple/OpenMatesUITests/SharePanelParityUITests.swift
      reason: iOS and macOS UI state and source-contract coverage.
  verification_strategy:
    - Add and run red ShareLinkCryptoTests and SharePanelParityUITests before production implementation.
    - Run the focused remote iOS and macOS tests after implementation.
    - Deploy, wait for dev readiness, then run existing web share-chat and share-embed Playwright specs.
    - Run python3 scripts/verify_parity.py --run --web-spec share-chat-flow.spec.ts --apple test with the focused Apple test when supported by the wrapper.
    - Capture sanitized simulator screenshots and review them against the rendered web panel.
  verification_order:
    - Apple crypto contract test
    - Apple iOS and macOS UI tests
    - Deployed web share chat and embed regression specs
    - Visual artifact review

