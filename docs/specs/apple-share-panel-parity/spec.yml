assumptions:
  - id: A-1
    text: Apple CryptoManager's CommonCrypto PBKDF2 and CryptoKit AES-GCM primitives can reproduce the web share format exactly.
    category: crypto
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift
        summary: Existing Apple crypto uses PBKDF2-SHA256 with 100,000 iterations and AES-GCM with 12-byte nonces.
  - id: A-2
    text: ChatKeyManager and EmbedKeyManager can supply the effective chat or embed key to the share panel without new cross-skill imports.
    category: crypto
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Core/Crypto/ChatKeyManager.swift
        summary: ChatKeyManager exposes chat keys and EmbedKeyManager derives effective embed keys from wrapped key entries.
  - id: A-3
    text: The existing short-link backend API accepts the web payload from Apple clients.
    category: api
    required_before: task_execution
    status: checking
    evidence:
      - source: docs/specs/share-short-links-og-images/spec.yml
        summary: The shared API contract is POST /v1/share/short-url with an opaque encrypted URL and content metadata.

contracts:
  api:
    - route: POST /v1/share/short-url
      request: "{ token, encrypted_url, content_type, content_id, password_protected, ttl_seconds }"
      response: "{ success: true, expires_at: number | null }"
      errors:
        - Long encrypted URL fallback only for network, timeout, or unavailable API conditions.
        - Visible error for invalid input, authentication, ownership, or unexpected API errors.
    - route: POST /v1/share/chat/metadata
      request: "Existing shared metadata payload including is_shared, privacy flags, and client-encrypted owner short URL."
      response: "Existing web-compatible metadata acknowledgement."
    - route: POST /v1/share/chat/unshare
      request: "{ chat_id }"
      response: "Existing unshare acknowledgement."
  data:
    - Chat share blobs serialize chat_encryption_key, generated_at, duration_seconds, and pwd exactly as web before AES-GCM encryption.
    - Embed share blobs serialize embed_encryption_key, generated_at, duration_seconds, and pwd exactly as web before AES-GCM encryption.
    - Owner-facing short URLs are encrypted at rest using the chat key when persisted locally or in existing metadata.
    - Share state records preserve is_shared, is_private, share_pii, share_highlights, and community settings across sync.
  ui_states:
    - Configuration: preview, description, primary action, optional controls, validation, loading, and visible errors.
    - Generated: copy, short/long fallback indication, QR, QR fullscreen, expiry information, change settings, stop sharing for chats, and system share.
    - Chat mode shows community, highlights, and conditionally PII controls; embed mode does not.
  privacy_security:
    - Never log plaintext key material, passwords, complete share URLs, URL fragments, or user content.
    - The backend receives only opaque short-link ciphertext and safe metadata already permitted by the web share contract.
    - Password length is limited to ten characters before cryptographic work.
    - UI tests use synthetic identifiers and fixtures and never assert real share URLs or secret values.

