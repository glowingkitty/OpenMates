schema_version: 2
id: apple-share-panel-parity
title: Apple Chat And Embed Share Panel Web Parity
status: implementing

goal: >
  Let iOS and macOS users create, manage, copy, scan, and system-share encrypted
  chat and embed links through the same product contract and custom OpenMates UI
  as the web share panel.

scope:
  in:
    - A shared custom Apple share panel for chat and embed entry points.
    - Web-compatible encrypted long links with fragment-only secrets, password protection, and all web expiration options.
    - Durable short-link creation with the same safe long-link fallback as web.
    - Chat and embed previews, share controls, QR fullscreen, copy feedback, change-settings, and chat stop-sharing controls.
    - Chat-only community, PII, and highlights controls with their privacy explanations.
    - The OS share sheet as a follow-on action after link generation.
    - iOS and macOS XCTest coverage with synthetic, sanitized fixtures.
  out:
    - Changing the existing web/backend share-link format, backend API, or public share routes.
    - Sending a share fragment secret, password, chat content, or embed content to OpenMates servers beyond the existing web metadata contract.
    - Replacing the OS-owned system share sheet with custom UI.

context_discovery:
  github_issues:
    - "GitHub MCP authentication returned 401; gh fallback search for 'share Apple embed chat' found no related issue."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/share-short-links-og-images/spec.yml
    - docs/specs/apple-chat-management-sharing-parity/spec.yml
    - apple/AGENTS.md
    - apple/CLAUDE.md
  code_patterns:
    - frontend/packages/ui/src/components/settings/share/SettingsShare.svelte
    - frontend/packages/ui/src/services/shareEncryption.ts
    - frontend/packages/ui/src/services/embedShareEncryption.ts
    - apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift
    - apple/OpenMates/Sources/Core/Crypto/ChatKeyManager.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Features/Embeds/Grouping/EmbedFullscreenContainer.swift
  tests:
    - frontend/apps/web_app/tests/share-chat-flow.spec.ts
    - frontend/apps/web_app/tests/share-embed-flow.spec.ts
    - frontend/packages/ui/src/services/encryption/__tests__/shareEncryption.test.ts
    - apple/OpenMatesUITests/ShareExtensionAttachmentParityUITests.swift

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Crypto/ShareLinkCrypto.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatShareView.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/ShareEmbedView.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Features/Embeds/Grouping/EmbedFullscreenContainer.swift
    - apple/OpenMatesUITests/SharePanelParityUITests.swift
  parity_expectations:
    - Product-owned share configuration and generated-link UI uses OpenMates components and generated tokens, not stock Form, NavigationStack, toolbar, or sheet chrome.
    - Link generation exactly matches the current web crypto and URL contracts; recipients can open Apple-created links in the web app.
    - The rendered web share panel remains the visual and interaction source of truth for equivalent iPhone and macOS states.
  verification:
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/SharePanelParityUITests"
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py build-macos
  intentional_native_differences:
    - The OS system share sheet is opened only after the custom generated-link panel and remains platform-owned.
    - Native QR rendering and text rasterization may differ while preserving the same content, structure, controls, and generated token values.

clarification:
  rounds:
    - question: Should Apple match every web share option, including community, PII/highlight, password, expiration, short-link fallback, and unshare behavior?
      answer: "Yes, correct. Full parity with web app."
    - question: Should the work ship for both iOS and macOS?
      answer: "Yes."
    - question: Should the Apple panel additionally expose the OS share sheet after a link is generated?
      answer: "Yes, trigger the share sheet as well."
  vision_summary: >
    Apple share chat and share embed must be complete product parity with the web
    panel on iOS and macOS. The app-owned configuration and generated-link states
    must use custom OpenMates UI; after generation users may invoke the normal
    platform share sheet.
  approved_by_user: true

implementation_state:
  subject_commit: 270b3a9d0

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-12"
  implementation_plan:
    status: approved
    approved_at: "2026-07-12"
    reason: User explicitly approved creating the plan, implementation, and tests after the complete parity scope was confirmed.

decisions:
  - id: D-1
    status: active
    decision: Port the existing client-side web share cryptography byte-for-byte at the contract level rather than adding server-generated Apple links.
    reason: The web contract keeps encryption keys and short-link secrets in URL fragments and supports offline long-link creation.
    decided_at: "2026-07-12"
  - id: D-2
    status: active
    decision: Use one custom share panel model and view for chat and embed modes, with explicitly scoped chat-only options.
    reason: The web implementation is one SettingsShare surface and separate native flows have already drifted in behavior and styling.
    decided_at: "2026-07-12"
  - id: D-3
    status: active
    decision: Keep the system share sheet as an optional post-generation action only.
    reason: It is OS-owned UI, while configuration and generated-link management are OpenMates product UI.
    decided_at: "2026-07-12"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Audit existing web and Apple share flows before introducing a native implementation.
    outcome: succeeded
    recorded_at: "2026-07-12"
    notes: >
      Confirmed Apple chat calls an incompatible /v1/chats/share endpoint and
      Apple embed calls an incompatible /v1/chats/{chatId}/embeds/{embedId}/share
      endpoint. Neither flow constructs web-compatible encrypted fragment links
      or durable short links; the embed flow also uses forbidden stock UI.
  - id: ATTEMPT-2
    task_id: TASK-2
    approach: Run the focused iOS UI contract test on the remote Mac before implementation.
    outcome: blocked
    recorded_at: "2026-07-12"
    notes: >
      The remote iOS test build stopped before the share assertion because
      ChatCompletionRecoveryCoordinator.swift from commit 7ac45d7d7 has Swift 6
      Sendable errors involving Task<[String: Any], Error>. That file is not
      owned or modified by this session.

handoff:
  current_task_id: TASK-2
  next_action: Re-run the focused iOS share configuration test after the recovery coordinator compile errors are fixed on dev.
  command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/SharePanelParityUITests"
  expected_outcome: The test reaches the custom share configuration assertion and fails because the web parity controls do not exist yet.
  blocker:
    reason: "Remote iOS build is blocked by Swift 6 Sendable errors in ChatCompletionRecoveryCoordinator.swift from 7ac45d7d7."
  last_verified_commit: b4fbf24

scenarios:
  - id: S-1
    title: Owner opens web-equivalent chat sharing configuration
    given:
      - Alice owns an encrypted private chat with an available chat key.
    when:
      - Alice chooses Share Chat in the Apple chat actions.
    then:
      - A custom OpenMates share panel opens with a chat preview, description, Share chat action, password control, all web expiration choices, community, highlights, and conditionally PII controls.
      - The panel contains no stock navigation, form, toolbar, or app-owned sheet chrome.
  - id: S-2
    title: Owner creates a compatible protected or expiring chat link
    given:
      - Alice is on the chat configuration panel.
    when:
      - Alice selects any web duration and optionally enters a password of at most ten characters.
      - Alice chooses Share chat.
    then:
      - Apple creates `/s/<token>#<shortKey>` when the existing short-link API is available, otherwise `/share/chat/<id>#key=<blob>`.
      - The blob uses the same PBKDF2/AES-GCM parameters and URL-encoded key fields as web.
      - The key, password, and fragment secret are not logged or sent to the backend.
  - id: S-3
    title: Owner manages an already shared chat
    given:
      - Alice opens a chat previously shared from Apple or web.
    when:
      - Alice opens Share Chat.
    then:
      - The panel restores the existing encrypted owner-facing share URL where available and shows copy, QR, change settings, stop sharing, and system-share actions.
      - Stop sharing restores private status and removes the local owner-facing stored share URL without exposing it in plaintext.
  - id: S-4
    title: Owner opens web-equivalent embed sharing configuration
    given:
      - Alice opens a finished encrypted embed fullscreen and its effective embed key is available.
    when:
      - Alice chooses Share Embed.
    then:
      - The current fullscreen closes or remains correctly layered while one custom OpenMates panel opens with an embed preview, description, Share embed action, password control, and all web expiration choices.
      - Chat-only community, highlights, PII, and stop-sharing controls are absent.
  - id: S-5
    title: Owner copies, scans, adjusts, or system-shares an embed link
    given:
      - Apple generated an encrypted embed link.
    when:
      - Alice copies the link, opens the QR fullscreen, changes settings, or chooses Share via system.
    then:
      - Copy feedback is visible, the QR encodes the displayed URL, changes return to the configuration state, and the OS share sheet receives the displayed URL.
  - id: S-6
    title: Link generation fails without hiding the cause
    given:
      - A key is missing, a password is invalid, or short-link creation is unavailable.
    when:
      - Alice generates a share link.
    then:
      - Missing keys and invalid passwords are shown as visible errors without generating a link.
      - Network/timeout short-link failures visibly use the long encrypted-link fallback.
      - Other permission or API failures remain visible and do not silently downgrade behavior.

