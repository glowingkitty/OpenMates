      expected: pass
      evidence:
        status: passed
        run_id: "5bde1312-4b95-4234-b4a0-34dd51dd5737"
        timestamp: "2026-06-19T13:36:00Z"

implementation_plan:
  existing_patterns:
    - frontend/packages/openmates-cli/src/benchmark.ts for command handling and result writing.
    - frontend/packages/openmates-cli/src/client.ts for real chat sendMessage and benchmark metadata.
    - frontend/packages/openmates-cli/src/cli.ts for file/image prepared embed creation.
    - backend/providers/*.yml for pricing.tokens per_credit_unit metadata.
  architecture: >
    Keep the benchmark runner CLI-local and continue using OpenMatesClient.sendMessage
    for all live inference. Add helper functions for suite expansion, pricing
    estimation, model comparison concurrency, incremental judging, image fixture
    attachment, and partial result output. Avoid backend route changes unless a
    small client capability is required for long-context history injection.
  data_flow:
    - CLI parses models, suite, comparison, size, parallelism, image, judge, run id, and output flags.
    - CLI expands cases and computes pricing estimates from provider metadata.
    - CLI refuses live runs when pricing or spend confirmation is missing.
    - CLI sends target requests through sendMessage with benchmark metadata.
    - CLI judges each completed target case immediately.
    - CLI writes completed or partial JSON to stdout/output.
  affected_files:
    - path: docs/specs/cli-model-benchmarks/spec.yml
      reason: Executable product contract.
    - path: frontend/packages/openmates-cli/src/benchmark.ts
      reason: Benchmark suites, comparison mode, cost preflight, and partial summaries.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Long-context history and image prepared-embed support if needed by benchmark runner.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: CLI benchmark command regression tests.
    - path: frontend/packages/openmates-cli/tests/client.test.ts
      reason: Client benchmark payload regression tests.
    - path: frontend/packages/openmates-cli/fixtures/brandenburger-tor.*
      reason: Public default image fixture for real image inference benchmark.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/cli-model-benchmarks/spec.yml
    - cd frontend/packages/openmates-cli && npm run build && npm run test:unit:cli
    - cd frontend/packages/openmates-cli && node --test --experimental-strip-types --loader ./tests/loader.mjs tests/client.test.ts
    - docker exec -i api python -m pytest /app/backend/tests/test_usage_entries.py /app/backend/tests/test_ai_skill_request_schema.py
    - cd frontend/packages/openmates-cli && node dist/cli.js benchmark model google/gemini-3.5-flash --suite quick --confirm-spend-credits --json
  verification_order:
    - Unit and backend contract tests first.
    - CLI live product-path benchmark second.
    - Billing usage source check third.

