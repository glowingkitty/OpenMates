decisions:
  - id: D-1
    status: active
    decision: Task creation and modification during chat are main-processor tool calls, not postprocessor suggestions.
    reason: The user explicitly corrected the architecture and wants task management available during normal processing.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-2
    status: active
    decision: Use conditional task tool injection to save tokens.
    reason: Create-only tools are enough when a chat has no tasks; existing task management tools only matter when the model can see tasks.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-3
    status: active
    decision: Keep one primary chat per task; `@TASK-123` is a temporary inference reference unless the user explicitly moves the task.
    reason: One execution owner preserves queue ordering and avoids conflicting active task contexts.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-4
    status: active
    decision: Private task content mutates in vault-encrypted Redis working copies and persists durably only as client-encrypted task-key ciphertext.
    reason: This matches the chat inference/cache model and preserves zero-knowledge durable storage.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-5
    status: active
    decision: Task update persistence uses claim/lease/idempotency with stable task update job IDs.
    reason: The newer recovery/workflow delivery patterns provide stronger race and duplicate protection than loose pending events.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-6
    status: active
    decision: CLI v1 auto-approves task tool changes.
    reason: The user prefers avoiding confirmation fatigue for task mutations.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-7
    status: active
    decision: Task tool results create visible system events that are persisted into encrypted chat history.
    reason: Auto-applied task mutations need a durable user-visible audit trail.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-8
    status: active
    decision: Do not remove legacy `pending_ai_response` as part of this work.
    reason: It remains wired as legacy compatibility and needs a separate audit before removal.
    decided_at: "2026-07-14T00:00:00Z"
  - id: D-9
    status: active
    decision: CLI task-tool verification runs locally against the real dev server first; GitHub Actions wiring comes only after local dev evidence is green.
    reason: The CLI is the first implementation gate and must prove the real API/WebSocket/auth path before long-term CI stability coverage is added.
    decided_at: "2026-07-14T00:00:00Z"

