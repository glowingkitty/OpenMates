contracts:
  api:
    - route: WebSocket `task_event`
      request: server-to-client frame
      response: "{ event_id, chat_id, task_id, short_id, event_type, title?, status?, reason?, created_at, task_update_job_id? }"
      errors:
        - Client ignores frames for chats it cannot decrypt or tasks it cannot resolve.
    - route: WebSocket `task_update_jobs_available`
      request: server-to-client frame
      response: "{ jobs: [{ job_id, task_id, chat_id?, revision, task_key_version, expires_at }] }"
      errors:
        - Empty jobs list is ignored.
    - route: WebSocket `task_update_job_claim`
      request: "{ protocol_version: 1, job_id }"
      response: "{ job_id, state: LEASED, lease_token, lease_generation, sealed_or_vault_payload_ref, expected_task_version, revision }"
      errors:
        - 404 when job is not found or not owned by the user.
        - 409 when job is already terminal or currently leased by another device.
    - route: WebSocket `task_update_job_persist`
      request: "{ protocol_version: 1, job_id, lease_token, lease_generation, expected_task_version, encrypted_task_payload, encrypted_task_event_message? }"
      response: "{ job_id, state: TERMINAL, committed_task_version }"
      errors:
        - 409 on stale lease, stale task version, or conflicting encrypted payload.
    - route: WebSocket `task_event_message_persisted`
      request: "{ event_id, encrypted_system_message }"
      response: "{ event_id, persisted: true }"
      errors:
        - 409 when a duplicate event message is already persisted with different ciphertext.
  data:
    - Durable Directus task content fields remain client-encrypted with the task key.
    - Redis task working copies are vault-encrypted, short-lived, owner scoped, and never copied into Directus.
    - Task update jobs retain only encrypted/sealed payload references, safe metadata, lease state, revision, and expiry.
    - Task system events persisted in chat history are normal encrypted `system` message rows.
    - "`primary_chat_id` remains singular; `referenced_task_ids` may be transient request context and is not durable unless a move tool runs."
  ui_states:
    - CLI normal output task created event.
    - CLI normal output task updated event.
    - CLI normal output task blocked event with reason.
    - CLI normal output task unblocked event.
    - CLI JSON output with `taskEvents`, `pendingTaskUpdateJobs`, and `updatedTasks`.
    - CLI reconnect processing pending task update jobs before or during chat sync.
  privacy_security:
    - Directus must never receive plaintext or vault-encrypted task title, description, latest instruction, tags, or activity summary.
    - WebSocket task events may carry plaintext to the currently authenticated client session only for user-visible display and encryption.
    - Logs must not include task plaintext, task keys, sealed task update payloads, or encrypted task payload bodies.
    - Unauthorized `@TASK-123` mention resolution must reveal no existence information beyond a generic not-visible response.

