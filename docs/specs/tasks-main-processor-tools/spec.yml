schema_version: 2
id: tasks-main-processor-tools
title: Tasks Main Processor Tools
status: approved

goal: >
  Make Tasks V1 a first-class main-processor capability for the OpenMates CLI.
  During normal chat turns, the AI can create, update, reorder, block, complete,
  and unblock chat tasks through explicit tools. Task content is edited in a
  short-lived vault-encrypted backend working copy, then persisted durably only
  after an authenticated client encrypts the latest task state with the task key.

scope:
  in:
    - CLI-first implementation and verification for normal chat turns that use main-processor task tools.
    - Pre-main task context resolution for tasks already attached to the chat and tasks mentioned with `@TASK-123` style IDs.
    - Conditional main-processor task tool injection based on visible task context.
    - A server-side vault-encrypted Redis task working copy used for AI inference and tool mutations.
    - A claim/lease/idempotency protocol for client-encrypted task persistence jobs.
    - CLI encryption and commit of pending task update jobs into Directus without durable plaintext or vault ciphertext.
    - CLI rendering of task tool results as compact system events in normal output and structured `taskEvents` in JSON output.
    - Durable chat-history persistence of task system events as client-encrypted `system` messages.
    - One `primary_chat_id` execution owner per task, while `@TASK-123` from another chat creates a temporary inference reference only.
    - Explicit task move support when the user asks to move a task into the active chat.
    - Automatic approval of task creation and modification in CLI v1, with no confirmation prompts.
    - Safe direct server mutation for non-private metadata such as status, queue state, position, and blocked reason.
    - Deterministic tests and real dev CLI smoke coverage before web or Apple work.
    - CLI task-tool smoke tests must run locally from this workspace against the real dev server before any GitHub Actions wiring.
  out:
    - Web UI implementation beyond documenting the later parity expectation.
    - Apple implementation in this first slice.
    - Team/shared/multi-owner tasks or multi-principal task encryption.
    - Multi-primary-chat task ownership.
    - Public task sharing.
    - Removing legacy `pending_ai_response`; any cleanup needs a separate audit/spec.
    - Replacing the existing postprocessor task proposal path in this slice, though it may be deprecated later.
    - Server-side durable plaintext, server-side durable vault ciphertext, or server-side search over private task content.

