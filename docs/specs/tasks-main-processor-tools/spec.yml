    - docs/architecture/core/chat-encryption-implementation.md
    - docs/architecture/data/sync.md
    - docs/architecture/messaging/message-processing.md
  code_patterns:
    - backend/apps/ai/processing/main_processor.py currently generates normal app-skill tools but has no Tasks V1 main-processor tool injection.
    - backend/apps/ai/processing/postprocessor.py can emit review-only `task_proposals` and `task_update_proposals`, but those are postprocessing metadata and are not the target architecture.
    - backend/core/api/app/schemas/chat.py documents Directus client-encrypted message storage and vault-encrypted Redis AI cache storage.
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_recovery_job_handlers.py implements claim/lease/persist handlers for sealed completion recovery.
    - backend/core/api/app/services/workflow_chat_delivery_service.py implements claim-fenced client ciphertext persistence with expiry and conflict detection.
    - backend/core/api/app/routes/user_tasks.py exposes current user task CRUD, extract, start-ai, complete, block, unblock, skip, and reorder routes.
    - backend/core/api/app/services/user_task_service.py currently starts AI task execution through a synthetic `ai.ask` instruction and does not expose task tools to main processing.
    - frontend/packages/openmates-cli/src/client.ts owns CLI chat send, recovery job persistence, and task API calls.
    - frontend/packages/openmates-cli/src/cli.ts renders normal/JSON CLI chat output and task subcommands.
    - frontend/packages/openmates-cli/src/ws.ts collects WebSocket frames for CLI AI responses.
