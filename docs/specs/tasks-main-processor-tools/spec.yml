scenarios:
  - id: S-1
    title: CLI chat creates tasks through main-processor tools
    given:
      - Alice is logged into the CLI.
      - Alice starts a saved chat with no existing attached tasks.
    when:
      - Alice says `Create tasks to prepare the launch: checklist, announcement, and risk review`.
    then:
      - The main processor receives only create-task tool schemas for task management.
      - The assistant creates three tasks through task tool calls during main processing.
      - The CLI prints compact task-created system event lines.
      - JSON output includes structured `taskEvents`, `pendingTaskUpdateJobs`, and updated task snapshots.
      - The task-created system events are persisted to encrypted chat history as system messages.
      - Durable task content in Directus is client-encrypted with task keys.

  - id: S-2
    title: CLI chat modifies existing attached tasks through main-processor tools
    given:
      - Alice has a saved chat with three attached tasks.
      - Task `TASK-1001` is titled `Draft announcement`.
    when:
      - Alice says `Rename TASK-1001 to Draft launch announcement and move it before the checklist task`.
    then:
      - The main processor receives the attached task list and update/reorder tools.
      - The assistant updates the task title and order through task tools.
      - Private task title changes are first written to the vault-encrypted working copy.
      - The CLI claims the pending task update job and persists client-encrypted task content.
      - Safe order metadata is committed with version checks.
      - The chat history contains encrypted system events for the rename and reorder.

  - id: S-3
    title: Mentioned task is available as a temporary reference
    given:
      - Alice is in chat A.
      - Task `TASK-2002` has primary chat B.
    when:
      - Alice says `Use @TASK-2002 as context and explain what is still missing`.
    then:
      - The backend resolves `TASK-2002` for inference context if Alice owns it.
      - The task is not automatically moved to chat A.
      - The main processor can reference the task content in its response.
      - No task move event or primary chat metadata change occurs.

  - id: S-4
    title: Explicit move transfers task execution ownership
    given:
      - Alice is in chat A.
      - Task `TASK-2002` has primary chat B and no active execution.
    when:
      - Alice says `Move @TASK-2002 into this chat`.
    then:
      - The main processor calls the explicit move task tool.
      - The task primary chat becomes chat A after safe metadata validation.
      - The task content persistence job is created if encrypted task content references the new chat context.
      - Chat A receives a durable encrypted system event noting the move.
      - Chat B is no longer the execution owner for future queue ordering.

  - id: S-5
    title: Blocked attached task exposes unblock tool
    given:
      - Alice has a chat with attached task `TASK-3003` in `blocked` status.
      - The blocked reason is `needs_user_input`.
    when:
      - Alice says `The missing destination city is Berlin, continue TASK-3003`.
    then:
      - The main processor receives the blocked task context and unblock tool.
      - The assistant unblocks the task through a task tool.
      - The CLI prints a task-unblocked system event.
      - The encrypted chat history persists the system event.
      - The task returns to an eligible queue state or starts according to queue policy.

  - id: S-6
    title: Offline client resumes pending task update persistence
    given:
      - Backend main processing created or modified a task while Alice's CLI disconnected before encrypted persistence completed.
      - A vault-encrypted Redis working copy and pending task update job remain valid.
    when:
      - Alice reconnects with the CLI.
    then:
      - The backend advertises available pending task update jobs.
      - The CLI claims one job, decrypts/opens the working-copy payload it is authorized to process, encrypts task content with the task key, and commits it.
      - Duplicate claims are rejected or become idempotent no-ops.
      - Directus never stores plaintext or vault-encrypted task content.

  - id: S-7
    title: CLI JSON output exposes deterministic task tool results
    given:
      - Alice runs `openmates chats new --json` with a prompt that creates and blocks tasks.
    when:
      - The chat completes successfully.
    then:
      - The JSON response includes `taskEvents` with stable event types and task IDs.
      - The JSON response includes `pendingTaskUpdateJobs` only until the CLI has persisted them.
      - The JSON response includes decrypted updated task snapshots suitable for smoke assertions.
      - No encrypted task fields or plaintext private task payloads leak in the final CLI JSON output beyond user-visible decrypted content for Alice's authenticated device.

