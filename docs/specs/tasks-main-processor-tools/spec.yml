apple_impact:
  affected_files:
    - none
  parity_expectations:
    - Apple must eventually participate in the same task update job claim/persist protocol before native task tools are enabled.
    - This first slice is CLI-first and must not require Apple work to prove the CLI contract.
    - Shared backend protocol changes must remain compatible with a future Apple client that can decrypt task keys and persist encrypted task updates.
  verification:
    - Apple not implemented in this first slice.
    - Reassess with `python3 scripts/apple_remote.py status` plus build/test when web or Apple task tool clients are added.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should task creation/modification be a postprocessor proposal flow or main-processor tool flow?
      answer: >
        Main-processor tool flow. The prior postprocessor-only path is not the
        desired architecture for Tasks V1 task creation and modification.
    - question: What task context should the main processor receive?
      answer: >
        The system prompt should include active chat tasks with IDs, titles, and
        descriptions, positioned for high model attention. If no chat tasks are
        attached, only create-task tools should be included to save tokens.
        Mentioned tasks via `@TASK-123` should also be resolved and included.
    - question: "How should `@TASK-123` interact with the one-primary-chat rule?"
      answer: >
        Keep exactly one primary chat for execution ownership and ordering.
        `@TASK-123` from another chat is a temporary inference reference only.
        Moving the task into the active chat requires an explicit move action.
    - question: How should private task content be modified and persisted?
      answer: >
        Use the same two-layer pattern as chat messages: vault-encrypted backend
        working copies in Redis for inference, and durable Directus storage only
        after a client encrypts task content with the task key. Do not store
        plaintext or vault ciphertext durably in Directus.
    - question: Should task update persistence use loose pending events or a stronger recovery-style protocol?
      answer: >
        Use a task update job ID with claim, lease token, lease generation,
        expected version, idempotent terminal persistence, and stale/conflicting
        commit rejection, modeled after sealed chat recovery and workflow delivery.
    - question: What should happen if no client can immediately encrypt and persist task updates?
      answer: >
        The vault-encrypted Redis working copy remains the temporary source of
        truth and the task is marked pending client persistence. The pending job
        is retried or delivered on reconnect until a trusted client persists the
        encrypted update or the job expires according to retention policy.
    - question: Should users confirm task changes?
      answer: >
        CLI v1 should auto-approve task creation and modification to avoid
        constant confirmation prompts. The risk of annoying users with
        approvals they always accept is higher than the v1 mutation risk.
    - question: How should task tool calls appear in chat history?
      answer: >
        Render task creation and modification as system event cards/messages in
        chat history. In CLI, show compact task event lines and include
        structured events in JSON output. Persist those events into encrypted
        chat history.
    - question: Should task event cards be interactive?
      answer: >
        They must make tasks easy to open. For CLI-first scope, normal output
        should include task IDs and JSON output should include task IDs/snapshots
        so commands and tests can open or inspect the task. Rich web
        interactivity is deferred.
  vision_summary: >
    Tasks become first-class AI tools during main processing, not after-the-fact
    postprocessor suggestions. The backend may keep short-lived vault-encrypted
    working copies for inference and mutation, but durable task and chat history
    persistence remains client-encrypted. CLI is the first complete client and
    must prove task tool execution, encrypted persistence, and visible task
    system events end to end.
  approved_by_user: true

