implementation_plan:
  spec_path: docs/specs/tasks-main-processor-tools/spec.yml
  first_slice: >
    Prove the server can resolve chat-attached and mentioned tasks, inject the
    correct task tool schemas into main processing, and expose deterministic
    red tests before implementing persistence jobs or CLI rendering.
  existing_patterns:
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/cross-device-chat-completion-recovery/spec.yml
    - backend/core/api/app/routes/handlers/websocket_handlers/chat_recovery_job_handlers.py
    - backend/core/api/app/services/workflow_chat_delivery_service.py
    - frontend/packages/openmates-cli/src/client.ts
    - frontend/packages/openmates-cli/src/ws.ts
  architecture: >
    Add a task context resolver and task tool generator before main processing.
    Task tools mutate safe metadata directly and private task content through a
    vault-encrypted Redis working copy. Every private mutation creates a pending
    task update job. The CLI claims jobs, encrypts task content with the task key,
    persists encrypted updates, renders task events, and persists task events as
    encrypted chat system messages.
  boundaries:
    - Main processor task tools are backend-only tool definitions, separate from postprocessor review-only proposals.
    - Durable task private fields stay client-encrypted with task keys.
    - Vault-encrypted Redis working copies are transient inference state, not durable storage.
    - CLI is the first persistence client for task update jobs; web and Apple are deferred.
    - GitHub Actions smoke wiring is deferred until local real-dev CLI smoke evidence passes.
  data_flow:
    - CLI sends a chat turn.
    - Backend resolves chat tasks and `@TASK-123` mentions.
    - Main processor receives task context and conditional task tool schemas.
    - The model calls task tools during the turn.
    - Task tools update safe metadata and vault-encrypted working copies.
    - Backend emits task event frames and pending task update jobs.
    - CLI renders task events, encrypts event system messages with the chat key, and persists them.
    - CLI claims task update jobs, encrypts latest task content with task keys, and commits terminal encrypted persistence.
    - Reconnect discovers and completes pending jobs that were not persisted before disconnect.
  affected_files:
    - path: backend/apps/ai/processing/main_processor.py
      reason: Inject task tools and task context into main processing.
    - path: backend/apps/ai/processing/task_tool_context.py
      reason: New resolver for chat tasks and `@TASK-123` mentions.
    - path: backend/apps/ai/processing/task_runtime_tools.py
      reason: New task tool implementations for main processor calls.
    - path: backend/core/api/app/services/user_task_working_copy_service.py
      reason: Vault-encrypted Redis working-copy lifecycle.
    - path: backend/core/api/app/services/user_task_update_job_service.py
      reason: Claim/lease/idempotent client persistence protocol.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/task_update_job_handlers.py
      reason: WebSocket handlers for task update job claim/persist/discovery.
    - path: backend/core/api/app/routes/websockets.py
      reason: Wire task update job and task event handlers.
    - path: frontend/packages/openmates-cli/src/ws.ts
      reason: Collect task events and pending task update jobs.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Claim/persist task update jobs and persist encrypted task event messages.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Render normal and JSON task tool outputs during chat.
    - path: scripts/verify_tasks_main_processor_cli_smoke.py
      reason: Real dev CLI smoke coverage for task tool flows.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/tasks-main-processor-tools/spec.yml
    - python3 -m pytest backend/tests/test_task_main_processor_tools.py backend/tests/test_task_mentions_and_chat_ownership.py backend/tests/test_task_working_copy_privacy.py backend/tests/test_task_update_jobs.py
    - cd frontend/packages/openmates-cli && node --test --experimental-strip-types --loader ./tests/loader.mjs tests/ws.test.ts tests/client.test.ts
    - python3 scripts/verify_tasks_main_processor_cli_smoke.py --api-url https://api.dev.openmates.org --skip-build
    - python3 scripts/spec_verify.py docs/specs/tasks-main-processor-tools/spec.yml
  verification_order:
    - Backend pytest red phase for task context/tool injection and update jobs.
    - CLI node red phase for task event/job frames and encrypted persistence.
    - Real dev CLI smoke red phase against current dev behavior.
    - Backend implementation.
    - CLI implementation.
    - Deploy to dev.
    - Real dev CLI smoke green phase from this workspace against https://api.dev.openmates.org.
    - Wire equivalent CLI smoke coverage into GitHub Actions only after local dev-server CLI evidence is green.
    - Web and Apple deferred until CLI contract is stable.
  migration_rollout:
    - No migration of existing task content is required for the first slice.
    - Existing postprocessor task proposal support remains available during rollout.
    - Task update jobs and working-copy cache keys must be namespaced by protocol version so stale experimental jobs can be ignored safely.
    - GitHub Actions workflow coverage must remain disabled or absent until T-CLI-LOCAL-001 has green evidence recorded in this spec.
  observability:
    - Log task tool names, task IDs, safe status transitions, job IDs, lease generations, and sanitized failure classes.
    - Never log task plaintext, task keys, encrypted payload bodies, vault ciphertext, or full sealed working-copy payloads.
    - Add counters or structured log fields for task_update_job_claimed, task_update_job_persisted, task_update_job_conflict, and task_event_persisted.
  assumptions_to_check:
    - A-2 before TASK-4: confirm CLI can persist client-encrypted system messages for task events without introducing a new message role.
    - A-3 before TASK-6: confirm whether task update terminal persistence needs a Directus extension transaction or can safely use existing API/service boundaries.
  ac_coverage_mapping:
    AC-1: [T-PYTEST-001, T-CLI-001]
    AC-2: [T-PYTEST-001, T-CLI-002]
    AC-3: [T-PYTEST-001, T-CLI-003]
    AC-4: [T-PYTEST-002, T-CLI-004]
    AC-5: [T-PYTEST-002, T-CLI-004]
    AC-6: [T-PYTEST-003, T-NODE-001, T-CLI-002]
    AC-7: [T-PYTEST-004, T-NODE-001]
    AC-8: [T-NODE-002, T-CLI-001]
    AC-9: [T-NODE-002, T-CLI-001]
    AC-10: [T-NODE-001, T-CLI-005]
    AC-11: [T-PYTEST-004, T-CLI-006]
    AC-12: [T-CLI-LOCAL-001, T-CI-001]
  open_plan_questions:
    - OQ-1 remains for retention TTL; default implementation should prefer a short configurable TTL unless product decides to match seven-day chat recovery jobs.
    - OQ-2 remains for postprocessor proposal deprecation; do not remove it in this implementation.

