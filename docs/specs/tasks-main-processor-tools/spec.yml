risks:
  - id: R-1
    risk: Task tool auto-approval may surprise users if task events are not clear.
    mitigation: Persist every task mutation as an encrypted chat system event and make CLI output explicit.
  - id: R-2
    risk: Task update jobs may conflict with concurrent clients.
    mitigation: Use lease tokens, lease generations, expected versions, idempotent terminal persistence, and conflict rejection.
  - id: R-3
    risk: Private task plaintext could leak into Directus or logs.
    mitigation: Add privacy tests and artifact review; keep durable private content client-encrypted only.
  - id: R-4
    risk: Prompt token growth from task context.
    mitigation: Inject only relevant attached/mentioned tasks and only necessary tool schemas.

open_questions:
  - id: OQ-1
    question: Should task update jobs expire after the same seven-day window as chat recovery jobs or a shorter task-specific TTL?
    status: unresolved
    next_action: Decide during implementation planning before adding cleanup jobs.
  - id: OQ-2
    question: Should the existing postprocessor task proposal flow remain as a secondary UX path after main-processor tools land?
    status: unresolved
    next_action: Decide after CLI main-processor tool smoke is green.
