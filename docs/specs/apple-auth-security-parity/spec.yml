id: apple-auth-security-parity
title: Apple Auth Recovery And Security Web Spec Parity
status: draft

goal: >
  Recreate the web app's auth, recovery, and security Playwright coverage in
  the Apple app so native login/signup/account recovery behavior matches the web
  contracts while using OS-owned authentication dialogs only where they are the
  correct native product boundary.

scope:
  in:
    - Native parity for signup, login, passkey, password plus OTP, 2FA reconnect, recovery key, backup code, account recovery, and session revoke flows.
    - Native settings parity for recovery key, backup code, change email, API key management, security/location messaging, and unauthenticated app load states.
    - Remote Mac XCTest verification against simulator-safe seeded flows and live dev account flows where required.
  out:
    - Changing backend auth policy, passkey cryptography, recovery semantics, or billing entitlement rules.
    - Committing private credentials, passkeys, recovery keys, backup codes, screenshots with private data, hostnames, IPs, or local Mac paths.
    - Replacing OS-owned passkey or permission dialogs with custom product UI.

