  expected_outcome: The test fails because the session-authenticated /v1/chats routes do not exist.
  blocker: null
  last_verified_commit: d58919d4e

scenarios:
  - id: S-1
    title: Newly paired Watch loads recent chats
    given:
      - Alice has paired the Watch and has more than 20 saved chats.
      - Some chats are hidden, deleted, or incognito.
    when:
      - The Watch chat shell refreshes for the first time.
    then:
      - The Watch receives at most 20 eligible recent chats in iPhone-equivalent order.
      - Hidden, deleted, and incognito chats are absent.
      - Encrypted metadata is decrypted only on the Watch.

  - id: S-2
    title: Watch opens an owned chat
    given:
      - Alice loaded an eligible chat from her recent list.
    when:
      - Alice opens that chat on the Watch.
    then:
      - The API validates ownership before returning encrypted messages.
      - The Watch decrypts and displays the message window locally.
      - Another user's chat ID returns not found without metadata leakage.

  - id: S-3
    title: Temporary outage preserves Watch state
    given:
      - Alice has a valid session and cached encrypted chats.
    when:
      - The Watch is offline or the API is temporarily unavailable.
    then:
      - Cached chats remain available.
      - The Watch shows offline state without clearing session, keys, server profile, or cache.
      - A later refresh can recover without pairing again.

  - id: S-4
    title: Revoked session clears Watch user data
    given:
      - Alice's Watch session has been explicitly revoked by the backend.
    when:
      - The Watch validates or refreshes that session.
    then:
      - The Watch clears cached user metadata, local master key, server profile, cookies, and encrypted chat cache.
      - The Watch returns to the pairing screen.

  - id: S-5
    title: App update preserves valid Watch login
    given:
      - Alice has a valid Watch session and encrypted offline cache.
    when:
      - OpenMates Watch updates and relaunches.
    then:
      - Existing valid session, keys, server profile, and cache are restored.
      - Alice is not asked to pair again.

