assumptions:
  - id: A-1
    text: Existing Directus chat services can return encrypted eligible chat metadata and encrypted message windows without server-side decryption.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/services/directus/chat_methods.py
        summary: Existing chat service methods load user chat metadata, ownership, and messages used by SDK and sync surfaces.
  - id: A-2
    text: Existing get_current_user session dependency supports the independent Watch pair-login cookie.
    category: auth
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/auth_routes/auth_dependencies.py
        summary: get_current_user authenticates auth_refresh_token cookies, rotates valid refresh tokens, and returns 401 for missing, invalid, or expired sessions.

contracts:
  api:
    - route: GET /v1/chats?limit=20
      auth: Session cookie via get_current_user; no SDK API key required.
      response: "{ chats: encrypted chat metadata[], limit: integer }"
      errors:
        - 401 when the session is invalid or revoked.
        - 422 when limit is outside the accepted range.
    - route: GET /v1/chats/{chat_id}/messages
      auth: Session cookie plus chat ownership.
      response: Encrypted message metadata array.
      errors:
        - 401 when the session is invalid or revoked.
        - 404 when the chat does not exist or belongs to another user.
  data:
    - The server returns existing encrypted fields and timestamps without plaintext decryption.
    - Hidden-chat classification remains client-side; Watch excludes chat records whose encrypted chat key cannot be unwrapped by the normal master key.
    - The Watch stores only encrypted offline snapshots plus locally decrypted in-memory display state.
  ui_states:
    - Loading recent chats.
    - Online recent-chat list.
    - Cached offline chat list.
    - Empty eligible chat list.
    - Revoked session returning to pairing.
  privacy_security:
    - No cross-user chat existence or metadata disclosure.
    - No server-side decryption for Watch list or message routes.
    - Revocation clears cached user metadata, cookies, local master key, server profile, and encrypted chat cache.
    - Network errors never trigger destructive cleanup.

