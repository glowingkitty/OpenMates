decisions:
  - id: D-1
    status: active
    decision: Use session-cookie authentication for native Watch read routes rather than SDK API keys.
    reason: Watch already owns an independent pair-login session and must not provision a separate API key.
    decided_at: "2026-07-11T21:45:00Z"
  - id: D-2
    status: active
    decision: Return encrypted chat metadata and messages without server-side decryption.
    reason: Client-side encryption ownership and privacy boundaries remain unchanged.
    decided_at: "2026-07-11T21:45:00Z"
  - id: D-3
    status: active
    decision: Treat only a confirmed invalid or revoked session as destructive; connectivity failures preserve local data.
    reason: App updates and temporary outages must not force pairing or erase offline history.
    decided_at: "2026-07-11T21:45:00Z"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Load Watch chats from GET /v1/chats using only fake WatchChatAPI unit tests.
    outcome: rejected
    recorded_at: "2026-07-11T21:40:00Z"
    reason: The production backend has no matching session-authenticated route, so physical Watch displays offline with an empty cache.

