implementation_plan:
  spec_path: docs/specs/apple-watch-chat-loading/spec.yml
  existing_patterns:
    - get_current_user session dependency on authenticated read-only routes.
    - Directus encrypted chat metadata and ownership methods used by SDK and sync routes.
    - WatchChatRuntime API abstraction and encrypted offline cache tests.
  architecture: >
    Add a focused session-authenticated chats router that reuses get_current_user
    and the existing Directus encrypted metadata, ownership, and message methods.
    Keep SDK routes unchanged. On Watch, make chat decryption return no display
    model when the normal master key cannot unwrap a chat key, which excludes
    hidden-chat candidates without exposing hidden-chat secrets. Separate
    transient API failures from explicit 401 revocation so only revocation calls
    one Watch-local cleanup operation.
  data_flow:
    - Watch sends its existing session cookie to the read-only chat route.
    - Backend validates session and ownership, then returns encrypted records.
    - Watch decrypts for display and persists an encrypted offline snapshot.
  affected_files:
    - path: backend/core/api/app/routes/chats.py
      reason: Session-authenticated encrypted chat reads.
    - path: backend/core/api/main.py
      reason: Register the focused chats router.
    - path: backend/tests/test_native_chats_api.py
      reason: Authentication, ordering, encryption, and ownership contract.
    - path: apple/OpenMates/Sources/Core/Watch/WatchChatRuntime.swift
      reason: Typed API, hidden-key exclusion, and offline/error handling.
    - path: apple/OpenMatesWatch/Sources/WatchAuthStore.swift
      reason: Revocation-only destructive cleanup.
    - path: apple/OpenMatesTests/WatchChatRuntimeTests.swift
      reason: Live route contract, hidden-key exclusion, and offline cache regression coverage.
    - path: apple/OpenMatesTests/WatchAuthStoreTests.swift
      reason: Persistence and revocation cleanup coverage.
  api_impact:
    - Add GET /v1/chats with session-cookie auth, bounded limit, and encrypted metadata response.
    - Add GET /v1/chats/{chat_id}/messages with session-cookie auth and ownership-obscuring 404.
    - Do not alter /v1/sdk/chats or its API-key scopes.
  data_impact:
    - No schema migration or backfill.
    - No plaintext fields are added; existing encrypted records are returned.
  ui_impact:
    - Existing Watch loading, online, offline-cache, empty, and pairing screens are reused.
    - Hidden chats are omitted rather than rendered as undecryptable rows.
  privacy_security_impact:
    - Ownership is checked before message lookup and non-owners receive 404.
    - Hidden-chat detection remains local and no hidden password material reaches the backend or Watch.
    - Revocation cleanup removes user metadata, master key, cookies, server profile, and encrypted cache.
  migration_rollout:
    - Deploy backend routes before uploading the Watch candidate.
    - Existing Watch build 53 recovers its list after backend deployment because it already calls the new route path.
    - Ship Watch cleanup and hidden-chat filtering in the subsequent TestFlight candidate.
  observability:
    - Log route outcome counts and sanitized client type without chat titles, message content, ciphertext, cookies, or user identifiers.
    - Add privacy-safe Watch diagnostics for refresh success, transient failure class, and confirmed revocation cleanup.
  verification_strategy:
    - python3 -m pytest backend/tests/test_native_chats_api.py
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchChatRuntimeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchAuthStoreTests
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py verify-watch-startup --simulator "Apple Watch Series 11 (46mm)" --duration 60
    - Physical TestFlight validation after backend deployment and Apple green evidence.
  required_assumption_checks:
    - A-1 is confirmed by existing encrypted Directus chat methods.
    - A-2 is confirmed by get_current_user cookie authentication and 401 behavior.
  acceptance_criteria_mapping:
    - AC-1 -> T-PYTEST-001, T-APPLE-001, V-HARDWARE-001
    - AC-2 -> T-PYTEST-001, T-APPLE-001, V-HARDWARE-001
    - AC-3 -> T-APPLE-001
    - AC-4 -> T-PYTEST-001, T-APPLE-002
    - AC-5 -> T-APPLE-002, V-HARDWARE-001
  verification_order:
    - Backend session and ownership contract first.
    - Apple runtime and auth-store tests second.
    - Watch build and simulator startup third.
    - Physical TestFlight validation last.
  first_slice: Add and run the failing backend contract proving GET /v1/chats does not exist, then implement only the authenticated encrypted list route.
  open_questions: []
  risks:
    - risk: Taking 20 rows before local hidden-chat exclusion can display fewer than 20 chats.
      mitigation: Fetch a bounded surplus, filter undecryptable hidden candidates locally, and cap the visible result at 20.
    - risk: Treating transient network errors as revocation would erase offline data.
      mitigation: Destructive cleanup is reachable only from explicit HTTP 401/session-invalid classification.
    - risk: Returning another user's chat metadata leaks existence.
      mitigation: Ownership failure and missing chat both return the same 404 response.

