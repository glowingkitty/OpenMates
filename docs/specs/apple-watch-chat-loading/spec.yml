schema_version: 2
id: apple-watch-chat-loading
title: Apple Watch Authenticated Chat Loading
status: implementing

goal: >
  Let an independently authenticated Apple Watch load and open the same recent
  saved chats as the iPhone while preserving encrypted content, offline cache,
  session persistence across app updates, and explicit cleanup after revocation.

scope:
  in:
    - A session-authenticated read-only API returns the 20 most recent chats eligible for the normal iPhone chat list.
    - The response preserves encrypted chat metadata and never decrypts user content on the server.
    - A session-authenticated read-only API returns encrypted messages only after ownership validation.
    - Hidden, deleted, and incognito chats are excluded from the Watch recent-chat list.
    - Ordinary network failures retain encrypted offline cache and the authenticated Watch session.
    - A backend-confirmed invalid or revoked Watch session clears local user data and returns to pairing.
    - App updates preserve the Watch session, master key, server profile, and encrypted offline cache.
  out:
    - SDK API-key authentication for the Watch.
    - Sending messages, creating chats, audio upload, or chat-management actions.
    - Server-side decryption or transfer of plaintext chat content.
    - Changes to pair-login cryptography or WatchConnectivity.
    - Changes to iPhone, web, CLI, npm SDK, or pip SDK chat-list behavior.

context_discovery:
  github_issues:
    - GitHub MCP authentication returned 401; the existing Apple Watch specs contain no linked chat-loading issue.
  docs:
    - docs/specs/apple-watch-support/spec.yml
    - docs/specs/apple-watch-login-v2/spec.yml
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/apple/sync.md
    - apple/AGENTS.md
  code_patterns:
    - apple/OpenMates/Sources/Core/Watch/WatchChatRuntime.swift calls GET /v1/chats and GET /v1/chats/{chat_id}/messages.
    - The backend exposes neither session-authenticated route; /v1/sdk/chats exists but requires an SDK API key.
    - WatchChatRuntime converts any initial API failure into offline state and reloads an empty cache, matching the physical screenshot.
    - WatchAuthStore currently enters authenticated state after refreshSessionToken even when the backend does not authenticate the session.
    - Existing Directus chat services already load encrypted metadata and messages and enforce ownership in other routes.
  tests:
    - apple/OpenMatesTests/WatchChatRuntimeTests.swift
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - backend/tests/test_sdk_routes.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Watch/WatchChatRuntime.swift
    - apple/OpenMatesWatch/Sources/WatchAuthStore.swift
    - apple/OpenMatesWatch/Sources/WatchRootView.swift
    - apple/OpenMatesTests/WatchChatRuntimeTests.swift
  parity_expectations:
    - Watch receives the same eligible recent saved-chat set and ordering as iPhone, capped at 20.
    - Watch decrypts content locally with its device-local keys.
    - Network failures preserve cached chats; confirmed revocation clears Watch-local user data.
  verification:
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchChatRuntimeTests
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py verify-watch-startup --simulator "Apple Watch Series 11 (46mm)" --duration 60
    - Physical TestFlight Watch chat-list and chat-open confirmation
  intentional_native_differences:
    - Watch caps initial chat loading at 20 for its compact client and offline cache.

clarification:
  rounds:
    - question: Which chats should the Watch initially load?
      answer: Match the normal iPhone list with the 20 most recent saved, non-incognito chats; hidden and deleted chats remain excluded.
    - question: What should happen after backend-confirmed session revocation?
      answer: Clear Watch user data and return to pairing; ordinary network failures must retain cached data.
    - question: Should app updates require a new Watch login?
      answer: No; updates preserve session, master key, server profile, and encrypted offline cache.
    - question: Does the summarized chat-loading, offline, and revocation behavior match the intended product contract?
      answer: Approved.
  vision_summary: >
    Watch is an independent encrypted client that loads the same eligible recent
    chats as iPhone. Connectivity loss is recoverable and cache-preserving;
    explicit session revocation is privacy-sensitive and clears Watch-local data.
  approved_by_user: true

implementation_state:
  subject_commit: d58919d4e

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-11T21:50:00Z"
    reason: User explicitly approved the session-authenticated read contract, offline preservation, and revocation cleanup behavior.
  implementation_plan:
    status: approved
    approved_at: "2026-07-11T21:55:00Z"
