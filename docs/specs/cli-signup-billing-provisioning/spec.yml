implementation_plan:
  existing_patterns:
    - frontend/packages/openmates-cli/src/client.ts pair-auth session creation and settings billing command patterns.
    - frontend/packages/openmates-cli/src/crypto.ts Node webcrypto AES-GCM/PBKDF2 helpers.
    - frontend/packages/openmates-cli/src/storage.ts keychain/encrypted-file session key storage.
    - frontend/packages/ui/src/services/cryptoService.ts web signup/recovery crypto source of truth.
    - backend/core/api/app/routes/payments.py existing credit bank-transfer and gift-card card purchase flows.
    - frontend/apps/web_app/tests/settings-buy-credits-bank-transfer.spec.ts web bank-transfer behavior.
  architecture: >
    Add narrow CLI command handlers and SDK helpers that reuse existing backend
    contracts where possible. Add only the backend surface needed for bank-transfer
    gift-card purchase because the existing credit bank-transfer endpoint applies
    credits directly and the existing gift-card purchase endpoint starts card
    checkout. Keep existing CLI security blocklist for raw settings passthrough,
    and expose security setup only through dedicated guided commands with local
    preflight checks.
  data_flow:
    - CLI signup collects non-secret fields and hidden password, derives crypto, calls setup_password, stores cookies/keys.
    - CLI security setup uses authenticated cookies plus email encryption key to create TOTP, backup-code, and recovery-key records.
    - CLI gift-card redemption uses authenticated cookies and optional email encryption key.
    - CLI bank-transfer credit purchase creates pending credit order and prints transfer details.
    - CLI bank-transfer gift-card purchase creates pending gift-card order; webhook/payment match later creates purchased gift-card record.
    - CLI deletion fetches preview, verifies email OTP, verifies TOTP when configured, calls delete-account with CLI email verification required, and clears local session.
    - E2E provisioning uses the same CLI signup/security setup code path and writes ignored local artifacts.
  affected_files:
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add public signup, security setup, billing, and provisioning command routing/help.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add SDK helpers for signup crypto payloads, security setup, bank transfer billing, and no-credit guidance.
    - path: frontend/packages/openmates-cli/src/crypto.ts
      reason: Add Node-compatible signup/recovery crypto helpers matching web contracts.
    - path: frontend/packages/openmates-cli/src/storage.ts
      reason: Ensure signup sessions persist master/email keys safely.
    - path: backend/core/api/app/routes/payments.py
      reason: Add bank-transfer gift-card order/status contract and webhook fulfillment support.
    - path: backend/core/api/app/routes/settings.py
      reason: Add CLI-only email-verification requirement flag for delete-account without changing web behavior.
    - path: backend/tests/test_cli_bank_transfer_gift_card_purchase.py
      reason: Verify new backend payment contract.
    - path: frontend/packages/openmates-cli/tests/signup.test.ts
      reason: Verify public signup command behavior.
    - path: frontend/packages/openmates-cli/tests/security-setup.test.ts
      reason: Verify setup-only security command boundaries.
    - path: frontend/packages/openmates-cli/tests/billing.test.ts
      reason: Verify terminal billing commands and no-credit guidance.
    - path: frontend/packages/openmates-cli/tests/account-delete.test.ts
      reason: Verify stricter CLI deletion verification and local session cleanup.
    - path: frontend/packages/openmates-cli/tests/e2e-provisioning.test.ts
      reason: Verify local artifact-only provisioning.
    - path: frontend/apps/web_app/tests/cli-created-account-login.spec.ts
      reason: Verify a CLI-provisioned password/TOTP account can log in on web.
    - path: frontend/apps/web_app/tests/signup-flow-helpers.ts
      reason: Route the CLI-created account login spec to the reserved credential slot.
    - path: scripts/run_tests.py
      reason: Dispatch the CLI-created account login spec with the reserved credential slot.
    - path: docs/architecture/apps/cli-feature-parity.md
      reason: Update intentional web-only boundaries and new CLI parity levels.
    - path: docs/architecture/apps/cli-package.md
      reason: Update CLI auth/security/billing command architecture.
    - path: docs/cli/settings.md
      reason: Document billing/security commands.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/cli-signup-billing-provisioning/spec.yml
    - Run red-phase unit/pytest tests before feature implementation.
    - Deploy backend/frontend changes before Playwright green-phase specs.
    - Run green-phase CLI unit tests, backend pytest, and listed Playwright specs.
    - Run python3 scripts/spec_verify.py docs/specs/cli-signup-billing-provisioning/spec.yml before marking verified.

