risks:
  - Terminal signup expands a previous security boundary; tests and docs must enforce no password flags and no secret logs.
  - Existing backend 2FA/recovery endpoints may allow setup calls on already configured accounts; CLI must preflight and backend hardening may be needed if direct API mutation is risky.
  - Bank-transfer gift-card fulfillment must not leak or create usable gift-card codes before payment is matched.
  - E2E provisioning can create highly sensitive artifacts; paths must remain ignored and output must be sanitized.
  - Playwright green evidence for recovery/backup specs requires a human/trusted process to update CI secrets from the local artifact.

open_questions:
  - Should future work add backend-level hardening to reject recovery/2FA setup when already configured, or is CLI-side refusal sufficient for this slice?
  - Should bank-transfer gift-card orders reuse `pending_bank_transfers` directly or introduce a small typed service wrapper around it to reduce order_type branching inside the webhook?
