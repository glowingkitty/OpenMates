id: cli-signup-billing-provisioning
title: CLI Signup, Security Setup, Billing, And E2E Provisioning
status: draft

goal: >
  Let terminal users create and secure an OpenMates account from the CLI without
  weakening the web app's client-side encrypted signup model. Add CLI-safe bank
  transfer billing flows for buying credits and gift cards, improve no-credit
  guidance, and provide a gated local E2E provisioning tool that creates the
  reserved recovery-key and backup-code test account artifacts needed by CI.

scope:
  in:
    - Public `openmates signup` for password-based account creation using hidden terminal prompts and the existing client-side encrypted password signup contract.
    - Guided CLI signup security setup that mirrors the web app sequence: TOTP 2FA setup with QR code and manual secret, backup-code generation/storage, recovery-key generation/storage, and explicit warning-based skips where the web flow permits them.
    - Signup gift-card redemption through a gift-card code input, plus clear instructions when a new CLI user has no credits.
    - CLI settings commands that can set up missing 2FA, backup codes, and recovery key once, but cannot modify, rotate, disable, or regenerate existing security methods.
    - CLI bank-transfer credit purchases using existing SEPA pending order infrastructure.
    - CLI bank-transfer gift-card purchases that create a pending order and expose the gift-card code later through status/list after the transfer is matched.
    - End-to-end validation that a CLI-created account can buy credits through CLI bank transfer, send a CLI chat after credits arrive, and later log in through the web app.
    - CLI account deletion with a stricter terminal-only verification contract, requiring a verified email code for every deletion and a 2FA code when 2FA is configured.
    - Test-only E2E provisioning command that creates or refreshes reserved test-account artifacts for recovery-key and backup-code Playwright specs without updating GitHub secrets.
    - Backend, CLI, docs, and test coverage for the new auth/security/billing contracts.
  out:
    - CLI card checkout for buying credits.
    - CLI card checkout for buying gift cards.
    - Passkey setup or login in the CLI.
    - CLI password change, 2FA rotation/modification, 2FA disable, or recovery-key regeneration.
    - Automatically updating GitHub Actions secrets from the provisioning command.
    - Storing real test credentials, OTP seeds, backup codes, recovery keys, gift-card codes, bank details, or private emails in git.
    - Changing Apple StoreKit purchase behavior.

