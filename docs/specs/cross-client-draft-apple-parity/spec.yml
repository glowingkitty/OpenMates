risks:
  - risk: Treating delta or paginated sync output as authoritative could delete valid local chats.
    mitigation: Require explicit tombstones or a proven complete ID set and cover partial responses in every client test.
  - risk: Public plaintext draft convenience methods could accidentally persist or log sensitive content.
    mitigation: Keep transport DTOs encrypted, constrain plaintext to crypto boundaries, and assert caches/queues/diagnostics contain no draft plaintext.
  - risk: Concurrent devices can race draft versions.
    mitigation: Preserve existing web conflict semantics, surface conflicts, and test reconnect after newer and deleted server versions.
  - risk: Native attributed-text decoration can disturb marked text, selection, undo, or keyboard traits.
    mitigation: Avoid equivalent content replacement, preserve marked text and selection, and test continuous typing, IME-safe update guards, and individual PII taps.
  - risk: Broad Apple MainAppView edits can conflict with adjacent sessions.
    mitigation: Re-read immediately before each minimal patch and avoid modifying unrelated concurrent changes.

