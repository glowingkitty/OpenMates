    red_phase: { required: true, expected: fail, evidence: { status: pending, run_id: "", timestamp: "" } }
    green_phase: { required: true, expected: pass, evidence: { status: passed, command: "docker exec api python -m pytest /app/backend/tests/test_cross_client_draft_sync.py", run_id: "session-5c92-backend-green", subject_commit: "5fff9cc49", timestamp: "2026-07-11T18:04:01Z" } }

