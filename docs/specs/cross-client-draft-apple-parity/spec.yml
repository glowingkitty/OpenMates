implementation_plan:
  spec_path: docs/specs/cross-client-draft-apple-parity/spec.yml
  existing_patterns:
    - Web draftSave and draftWebsocket services for client lifecycle and reconnect semantics.
    - Backend draft handlers for encrypted transport, versions, discoverability, and broadcasts.
    - Existing CLI OpenMatesClient WebSocket lifecycle and read-only npm SDK facade.
    - Existing read-only pip SDK transport facade and generated parity tests.
    - Apple DraftService, ChatStore, OfflineSyncBridge, NativeComposerTextView, and canonical OpenMates UI primitives.
  architecture: >
    Keep the backend protocol and web implementation authoritative. Extract or
    expose the minimal reusable encrypted draft lifecycle in npm/CLI and pip,
    connect Apple DraftService to the same WebSocket events and offline queue,
    add explicit authoritative deletion evidence to sync, then make focused
    native UI changes at existing state/layout seams.
  data_flow:
    - Client converts canonical composer content to encrypted markdown and preview, allocates or reuses chat UUID, persists ciphertext locally, and sends update_draft.
    - Backend validates ownership/new-chat status, increments draft_v, stores ciphertext, ensures draft-only discoverability, acknowledges sender, and broadcasts to other devices.
    - Clients persist acknowledged/broadcast ciphertext, decrypt only for active UI, and request draft versions after reconnect.
    - Clear/send emits deletion, removes empty draft-only discovery records, and clears stale local copies after reconnect.
    - Authoritative sync emits a complete ID set or tombstones; clients cascade local deletion only from that evidence.
  affected_files:
    - { path: frontend/packages/openmates-cli/src/client.ts, reason: Shared CLI/npm draft lifecycle and authoritative cache reconciliation }
    - { path: frontend/packages/openmates-cli/src/sdk.ts, reason: Public read-only npm SDK draft access }
    - { path: frontend/packages/openmates-cli/src/cli.ts, reason: First-class CLI draft commands and output }
    - { path: packages/openmates-python/openmates/sdk.py, reason: Equivalent read-only pip SDK draft access }
    - { path: backend/core/api/app/routes/handlers/websocket_handlers/phased_sync_handler.py, reason: Explicit authoritative deletion evidence if existing phases cannot provide it safely }
    - { path: apple/OpenMates/Sources/Core/Services/DraftService.swift, reason: WebSocket-backed encrypted draft lifecycle }
    - { path: apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift, reason: Offline replay and authoritative deletion cascade }
    - { path: apple/OpenMates/Sources/App/MainAppView.swift, reason: Sync event handling and focused shell/settings/welcome fixes }
    - { path: apple/OpenMates/Sources/Shared/Composer/NativeComposerTextView.swift, reason: Input-trait stability and inline PII rendering/taps }
    - { path: apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift, reason: Focus placeholder and keyboard-safe composer layout }
    - { path: apple/OpenMates/Sources/Shared/Composer/AppleComposerEmbedPreview.swift, reason: Image preview metadata parity }
  verification_strategy:
    - Record red contract evidence before production edits.
    - Verify backend and local client contracts before browser and Apple UI tests.
    - Deploy before Playwright green evidence and wait for Vercel Ready.
    - Run Apple remote unit/UI evidence after CLI, npm, pip, and web green evidence.
    - Run SDK/CLI parity and spec verification before completion.
  verification_order:
    - Backend protocol and CLI contract
    - npm SDK read-only access contract
    - pip SDK read-only access contract
    - Web Playwright against deployed dev
    - Apple unit tests, iPhone/iPad UI tests, and build

