schema_version: 2
id: cross-client-draft-apple-parity
title: Cross-Client Draft Sync And Apple Web Parity
status: implementing

goal: >
  Make encrypted draft chats and chat deletion reconcile identically across the
  OpenMates CLI, web app, and Apple app, with read-only draft access in the npm
  and pip SDKs, while correcting the
  reported Apple shell, settings, welcome, composer, image-preview, keyboard,
  capitalization, and inline PII regressions against the rendered web app.

scope:
  in:
    - Web-compatible Format-D encrypted draft creation, update, clear, conflict, reconnect, and draft-only chat discovery across CLI, web, and Apple.
    - Read-only list/get access to encrypted chat drafts in the npm and pip SDKs.
    - A real UUID for a new draft-only chat as soon as the first non-empty draft is persisted, matching web behavior.
    - Existing-chat draft synchronization using the existing chat ID and server draft version.
    - Authoritative removal of locally cached chats deleted on another device, including missed-event and cold-boot reconciliation.
    - Apple shell safe-area spacing, settings panel drag sizing, chat-only inspiration sizing, welcome-card actions, compact recent-card content, composer focus and compact-preview behavior, image preview persistence, keyboard-safe composer actions, keyboard capitalization, and tappable inline PII highlights.
    - Regression tests and cross-client evidence in CLI, read-only npm SDK, read-only pip SDK, web, and Apple order.
  out:
    - New cryptographic formats or server access to draft plaintext.
    - Syncing incognito drafts or persisting incognito chat content.
    - Merging concurrent draft plaintext or preserving multiple user-visible conflict copies; existing web draft-version behavior remains authoritative.
    - Redesigning chat sorting, settings information architecture, or the Apple shell.
    - Replacing the native Apple composer architecture.

context_discovery:
  github_issues:
    - "GitHub MCP authentication returned 401; gh issue search for draft sync, Apple, CLI, SDK, and deletion reconciliation returned no matching issue."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/platforms/cli-feature-parity.md
    - docs/architecture/core/client-side-encryption.md
    - docs/specs/apple-native-message-composer/spec.yml
    - docs/specs/apple-responsive-shell-parity/spec.yml
    - docs/specs/apple-durable-chat-persistence-parity/spec.yml
    - docs/specs/apple-sync-decryption-performance/spec.yml
    - docs/specs/apple-pii-detection-web-parity/spec.yml
  code_patterns:
    - frontend/packages/ui/src/services/drafts/draftSave.ts creates and encrypts web drafts locally, then sends update_draft or queues an offline change.
    - frontend/packages/ui/src/services/drafts/draftWebsocket.ts reconciles draft versions after reconnect and clears stale local drafts when server draft_v is zero.
    - backend/core/api/app/routes/handlers/websocket_handlers/draft_update_handler.py accepts new UUID draft-only chats, increments draft_v, caches ciphertext, adds discoverability metadata, and broadcasts chat_draft_updated.
    - backend/core/api/app/routes/handlers/websocket_handlers/delete_draft_handler.py clears server drafts and removes draft-only chats with no persisted messages.
    - backend/core/api/app/routes/handlers/websocket_handlers/get_draft_versions_handler.py is the existing reconnect-reconciliation contract.
    - frontend/packages/openmates-cli/src/client.ts syncs draft_v but has no draft mutation facade and carries forward server-absent cached chats before trimming by count.
    - packages/openmates-python/openmates has no draft-chat lifecycle facade.
    - apple/OpenMates/Sources/Core/Services/DraftService.swift encrypts and persists drafts only locally and does not send update_draft.
    - apple/OpenMates/Sources/App/MainAppView.swift upserts phased sync metadata but does not prune stale persisted chats from an authoritative server set.
    - apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift removes live chat_deleted events from persistence but does not reconcile missed deletions.
    - apple/OpenMates/Sources/Shared/Composer/NativeComposerTextView.swift owns native typing synchronization and must preserve keyboard input traits while applying PII decorations.
  tests:
    - frontend/packages/openmates-cli/tests/client.test.ts
    - frontend/packages/openmates-cli/tests/sdk.test.ts
    - packages/openmates-python/tests/test_sdk.py
    - frontend/apps/web_app/tests/chat-flow.spec.ts
    - apple/OpenMatesTests/ChatSyncParityTests.swift
    - apple/OpenMatesTests/DraftServiceTests.swift
    - apple/OpenMatesTests/NativeComposerDocumentTests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
    - apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift
    - apple/OpenMates/Sources/Core/Services/DraftService.swift
    - apple/OpenMates/Sources/Shared/Composer/NativeComposerTextView.swift
    - apple/OpenMates/Sources/Shared/Composer/ComposerPIIDecorations.swift
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
    - apple/OpenMates/Sources/Shared/Composer/AppleComposerEmbedPreview.swift
    - apple/OpenMatesTests/ChatSyncParityTests.swift
    - apple/OpenMatesTests/DraftServiceTests.swift
    - apple/OpenMatesTests/NativeComposerDocumentTests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
  parity_expectations:
    - Rendered web behavior and computed CSS are authoritative for Apple layout, state, and interaction behavior.
    - Web draft UUID, Format-D encryption, draft_v, WebSocket event, conflict, and reconnect semantics are authoritative for every client.
    - Apple keeps plaintext only in transient editor memory and persists or transmits only approved encrypted draft fields.
    - Native keyboard services remain stable while product-specific decorations and synchronization update.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - Targeted iPhone and iPad unit/UI tests listed below after CLI, read-only SDK access, and web evidence is green.
  intentional_native_differences:
    - Apple uses native keyboard, selection, safe-area, and long-press APIs while matching the web-visible outcome.
    - OS-owned keyboard and home-indicator chrome are retained; spacing may differ only by the measured safe-area inset.

clarification:
  rounds:
    - question: What behavior defines draft and Apple parity?
      answer: Match the web app behavior and ensure proper draft-chat sync across CLI, web, and Apple without asking questions the codebase answers.
  vision_summary: >
    The web app is the behavioral source of truth. Every supported client must
    operate on the same real draft-chat IDs, encrypted fields, draft versions,
    conflict rules, and authoritative deletion state, while Apple must render
    and interact like web within required native safe-area and keyboard chrome.
  approved_by_user: true

implementation_state:
  subject_commit: 5fff9cc49

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-11T00:00:00Z"
    reason: User explicitly directed full web parity and cross-client draft synchronization after repository discovery.
  implementation_plan:
    status: not_required
    reason: The existing web/backend protocol is authoritative; implementation extends established client adapters without a new architecture decision.

decisions:
  - id: D-1
    status: active
    decision: Reuse update_draft, delete_draft, get_draft_versions, chat_draft_updated, draft_deleted, chat_deleted, and phased sync instead of adding parallel APIs.
    reason: These events already implement the web draft lifecycle and encrypted cross-device transport.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-2
    status: active
    decision: Allocate a UUID when the first non-empty new-chat draft is saved and use it across all clients until send or clear.
    reason: The backend and web already treat unknown UUID chat IDs as discoverable draft-only chats.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-3
    status: active
    decision: Treat a complete authoritative server chat-ID set or explicit tombstone as deletion evidence; never infer deletion from a partial page alone.
    reason: Delta and paginated sync responses legitimately omit unchanged chats.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-4
    status: active
    decision: Preserve existing web draft-version conflict behavior rather than merge encrypted plaintext on the server.
    reason: The server cannot decrypt drafts and the user requested web parity, not a new conflict model.
    decided_at: "2026-07-11T00:00:00Z"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Add Apple-only local encrypted persistence.
    outcome: rejected
    recorded_at: "2026-07-11T00:00:00Z"
    reason: DraftService never sends the existing WebSocket draft protocol, so other clients cannot discover or reconcile Apple drafts.
  - id: ATTEMPT-2
    task_id: TASK-4
    approach: Preserve all server-absent cached chats and trim only when local count exceeds server total.
    outcome: rejected
    recorded_at: "2026-07-11T00:00:00Z"
    reason: A deleted chat can remain indefinitely when counts are equal or partial ordering changes.
  - id: ATTEMPT-3
    task_id: TASK-3
    approach: Expose draft mutation through public npm and pip SDK namespaces.
    outcome: rejected
    recorded_at: "2026-07-11T13:01:14Z"
