assumptions:
  - id: A-1
    text: The current backend update_draft and draft-only chat protocol is the web source of truth and supports unknown owned UUID chat IDs before first message persistence.
    category: sync
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/handlers/websocket_handlers/draft_update_handler.py
        summary: The handler explicitly accepts unknown chat IDs as new drafts, increments draft_v, adds discoverability, and broadcasts ciphertext.
  - id: A-2
    text: Format D uses the account master key and is interoperable among web, CLI/npm, pip, and Apple implementations.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/architecture/core/client-side-encryption.md
        summary: Existing clients use the account master-key encryption boundary for encrypted draft markdown and preview.
  - id: A-3
    text: Full sync can provide or derive an authoritative server chat-ID set without treating delta pages as complete.
    category: sync
    required_before: task_execution
    status: checking
    evidence:
      - source: backend/core/api/app/routes/handlers/websocket_handlers/phased_sync_handler.py
        summary: Phased sync accepts client IDs and returns total count, but tombstone or complete-set semantics must be proven by red tests before pruning.

contracts:
  api:
    - "update_draft: { chat_id, encrypted_draft_md, encrypted_draft_preview } -> draft_v acknowledgement or explicit error/conflict"
    - "delete_draft: { chat_id } -> draft deletion acknowledgement and cross-device draft_deleted"
    - "get_draft_versions: { chats: [{ chat_id, client_draft_v }] } -> authoritative draft versions"
    - "phased sync or explicit tombstones identify deleted chats without interpreting a partial page as a complete account set"
  data:
    - Draft chat IDs are UUIDs shared across clients; composer:new-chat remains local UI state only and is never sent or persisted as a server chat ID.
    - Durable draft fields contain encrypted canonical markdown, encrypted preview, draft_v, revision, timestamps, and non-sensitive sync metadata only.
    - Clearing a draft-only chat removes its discoverability metadata when no persisted messages exist.
    - Authoritative chat deletion cascades through local messages, embeds, embed keys, drafts, search indexes, and active selection.
  ui_states:
    - Empty, focused empty, expanded draft, blurred compact draft, keyboard-visible embed draft, restored local image, completed image, inline PII highlighted, and PII excluded.
    - Compact iPhone, regular iPad, settings closed, settings opening/dragging/open, and chat-only inspiration height.
  privacy_security:
    - Draft markdown, preview plaintext, detected PII, chat keys, and master keys never reach server logs, diagnostics, analytics, or durable plaintext storage.
    - Existing-chat mutation fails closed when ownership cannot be verified.
    - Incognito drafts never enter persistent or cross-device draft sync.
    - SDK draft APIs are read-only and return encrypted transport fields; optional decryption occurs only within authenticated client crypto boundaries.

