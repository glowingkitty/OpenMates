scenarios:
  - id: S-1
    title: A new encrypted draft chat appears on every client
    given:
      - The same account is authenticated in two or more supported clients.
      - No chat has been created for the empty composer.
    when:
      - One client persists the first non-empty draft.
    then:
      - It allocates one UUID and encrypts canonical markdown and preview with Format D.
      - The server stores ciphertext with draft_v and exposes a draft-only chat using that UUID.
      - CLI, web, and Apple can sync and decrypt the same draft with the account master key.
      - npm and pip SDK clients can list and get that encrypted draft without mutating it.
      - No plaintext draft is written to durable storage or sent to the server.

  - id: S-2
    title: An existing chat draft updates across devices
    given:
      - A persisted chat exists and is owned by the account.
    when:
      - A client saves a new encrypted draft revision for that chat ID.
    then:
      - The sender persists the acknowledged draft version.
      - Other online clients receive the encrypted update without the sender receiving a duplicate event.
      - Reconnecting clients request versions and obtain the authoritative encrypted draft.

  - id: S-3
    title: Clearing or sending removes a draft everywhere
    given:
      - A draft exists on multiple clients.
    when:
      - A client clears it or sends the message represented by the draft.
    then:
      - The server draft is deleted and draft_v reconciliation clears stale local copies.
      - A draft-only chat with no messages is removed from chat discovery.
      - An existing persisted chat remains without a draft.

  - id: S-4
    title: Offline edits reconcile without plaintext leakage
    given:
      - A client loses connectivity after editing a draft.
    when:
      - It reconnects after another client changed or deleted that draft.
    then:
      - Encrypted pending changes replay through the same versioned protocol.
      - Existing web conflict semantics choose the authoritative revision.
      - Errors remain visible and no plaintext queue entry is persisted.

  - id: S-5
    title: Deleted chats disappear after missed events
    given:
      - One client caches a chat and then misses its chat_deleted event while offline.
    when:
      - It completes an authoritative sync after the chat was deleted elsewhere.
    then:
      - The chat, messages, embeds, keys, draft, search entry, and selection are removed locally.
      - Partial or paginated sync responses do not delete valid omitted chats.

  - id: S-6
    title: Apple shell preserves minimal bottom clearance
    given:
      - Chat, workspace, or settings is visible on iPhone or iPad.
    when:
      - The bottom safe-area inset changes or the keyboard appears and disappears.
    then:
      - Content keeps only the minimum web-equivalent gap plus required home-indicator clearance.
      - macOS behavior remains unchanged where no home indicator exists.

  - id: S-7
    title: Settings resizing and inspiration height match web
    given:
      - Settings is opened side-by-side on iPad.
    when:
      - The settings divider is dragged or settings visibility changes.
    then:
      - Settings width follows live drag progress within web-equivalent bounds.
      - Inspiration content expands to chat-screen height only and does not consume settings height.

  - id: S-8
    title: Welcome cards match web interactions
    given:
      - Resume and recent-chat cards are visible.
    when:
      - The user long-presses any card or views a compact recent card.
    then:
      - The standard chat actions menu opens for every card.
      - Compact recent cards show only the title.

  - id: S-9
    title: Focused empty composer hides placeholder
    given:
      - The composer is empty.
    when:
      - It gains or loses focus.
    then:
      - The placeholder is hidden while focused and visible again when empty and blurred.

  - id: S-10
    title: Blurred text draft keeps content in compact preview
    given:
      - The user typed a non-empty text-only draft.
    when:
      - The composer loses focus without sending.
    then:
      - The draft content is preserved.
      - The composer compacts to the web preview height instead of remaining expanded.

  - id: S-11
    title: Local and finished images preserve the image preview contract
    given:
      - A locally selected image or completed image embed is present in the composer.
    when:
      - The app backgrounds and returns or upload finishes.
    then:
      - The local preview remains available without persisting a private file URL.
      - The finished image does not show generic Tap to show details metadata.

  - id: S-12
    title: Composer actions remain keyboard-safe
    given:
      - The iPad keyboard is visible and an embed increases composer height.
    when:
      - The editor lays out text, embeds, and actions.
    then:
      - Send, add, and related actions stay visible and tappable above the keyboard.
      - Editable content does not overlap the reserved action area.

  - id: S-13
    title: Native sentence capitalization remains stable
    given:
      - iPad sentence auto-capitalization is enabled.
    when:
      - The user types continuously and starts new sentences.
    then:
      - Native input traits are not reset after each document revision.
      - Sentence starts capitalize consistently with the system keyboard and web input expectations.

  - id: S-14
    title: Inline PII highlights are visible and individually excludable
    given:
      - Local PII detection identifies one or more ranges in composer text.
    when:
      - Decorations render and the user taps one highlighted range.
    then:
      - Each detected range has the web-equivalent yellow inline background.
      - Tapping a range excludes only that item from placeholder replacement and removes or updates its highlight.
      - PII plaintext remains local and is never added to diagnostics.

