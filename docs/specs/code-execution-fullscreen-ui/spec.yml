risks:
  - Existing Code Run E2E tests may be long-running and require deployed dev infrastructure, so red/green evidence can take longer than the UI implementation.
  - Reusing settings components inside a dark overlay may require small component props or wrapper styling to preserve contrast without forking the settings design system.
  - Apple currently appears to have output-state support but less visible pre-run selection support; Apple parity for selection may require additional native state plumbing if not already exposed.
  - The Figma screenshot shows static output content and does not define every active/cancel/error state, so implementation must preserve existing behavior while applying the design language.

open_questions:
  - Should Apple include the redesigned pre-run files/packages selection in the same first implementation if native selection is not currently exposed, or is terminal-output parity enough for v1 Apple?
  - Should the active execution Stop action appear as a terminal-style command below output, or remain as a distinct active-run control until execution finishes?
