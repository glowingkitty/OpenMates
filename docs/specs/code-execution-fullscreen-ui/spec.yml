implementation_plan:
  existing_patterns:
    - Code Run currently lives inside `CodeEmbedFullscreen.svelte` with `runSelectionOpen`, `runPanelOpen`, and `outputPaneActive` controlling a split layout.
    - The web output panel currently renders `.code-run-selection` and `.code-run-terminal` inside `.preview-panel` at 70% width.
    - Settings visual primitives exist as reusable Svelte components, but some may need small props or local wrapper usage for dark overlay contrast.
    - Apple Code Run output currently uses `CodeRunTerminalView` inside a split HStack and old terminal buttons in the header.
  architecture: >
    Keep Code Run state and backend service calls unchanged. Refactor the web
    fullscreen layout so Code Run selection and terminal states render through a
    single overlay layer above the source code instead of activating the split
    preview panel. Mirror the resulting browser-computed web overlay in Apple by
    updating the native code renderer to place a terminal overlay over the code
    source and restyle actions as terminal commands.
  data_flow:
    - User opens code-code embed fullscreen and sees source code by default.
    - User clicks `Run code`, which prepares candidates and opens the selection overlay.
    - User toggles optional files/packages and clicks Continue/Run.
    - Existing Code Run service starts execution, streams events, and persists encrypted output sidecars.
    - Terminal overlay renders live or saved output and terminal-style actions.
    - User clicks `View code`, which closes selection/output overlay and returns to source code without clearing saved output.
  affected_files:
    - path: frontend/packages/ui/src/components/embeds/code/CodeEmbedFullscreen.svelte
      reason: Main web selection/output overlay redesign.
    - path: frontend/packages/ui/src/components/embeds/code/CodeEmbedFullscreen.preview.ts
      reason: Add static preview variants for selection and output overlay states if feasible.
    - path: frontend/packages/ui/src/i18n/sources/app_skills/code.yml
      reason: Add or adjust visible strings such as `View code` only if no existing key can be reused.
    - path: frontend/apps/web_app/tests/code-generation-multiturn.spec.ts
      reason: Update Code Run E2E assertions for new overlay contract.
    - path: frontend/apps/web_app/tests/file-attachment-code-flow.spec.ts
      reason: Update saved-output assertions for new overlay contract.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/CodeRenderers.swift
      reason: Main Apple Code Run terminal overlay parity.
    - path: apple/OpenMates/Sources/Core/I18n/AppStrings.swift
      reason: Add typed accessors for any reused/new strings.
    - path: apple/OpenMatesUITests/EmbedRenderingParityUITests.swift
      reason: Add or update native parity evidence for code-run output overlay.
  verification_strategy:
    - Run `python3 scripts/spec_validate.py docs/specs/code-execution-fullscreen-ui/spec.yml` after spec edits.
    - Run red-phase Playwright tests before implementation/deploy where required.
    - Deploy web changes to dev before Playwright green verification.
    - Run remote Mac Apple build/test after commit/push for Apple parity.
    - Run `python3 scripts/spec_verify.py docs/specs/code-execution-fullscreen-ui/spec.yml` before marking verified.

