id: code-execution-fullscreen-ui
title: Code Execution Fullscreen Embed UI Parity
status: implementing

goal: >
  Redesign the code-code fullscreen Code Run UI on web and Apple so the pre-run
  file/package selection and post-run terminal output match the provided Figma
  design. The new overlay replaces the current split-panel selection and output
  controls, removes the `Hide output` CTA, and uses a `View code` breadcrumb to
  close the overlay and return to the fullscreen code view.

scope:
  in:
    - Update the web code-code fullscreen embed Code Run file/package selection UI.
    - Update the web code-code fullscreen embed Code Run terminal output UI.
    - Update the Apple native code-code fullscreen embed Code Run terminal UI and supporting selection state where implemented.
    - Use the settings-style breadcrumb, section headers, and toggles for selection rows.
    - Use the existing button CTA styling from `buttons.css` with the `play.svg` icon for the Continue/Run action.
    - Render the Code Run container as an overlay on top of the code block, with rounded edges and drop shadow.
    - Use `var(--color-grey-100)` for the selection overlay background and `#242424` for executing/output overlay background.
    - List `Ask followup`, `Copy output`, and `Run again` as terminal-style text commands below terminal output, default `#BCBCBC`, hover/active `#FFFFFF`.
    - Preserve existing Code Run behavior, billing, dependency selection, output persistence, cancellation, and follow-up/copy/run-again actions.
    - Keep fullscreen code navigation, PII visibility controls, syntax highlighting, and version timeline behavior intact.
  out:
    - Backend Code Run API, E2B provider, billing, or encryption changes.
    - New application-preview runtime behavior for code-application embeds.
    - Changing non-Code Run preview/render mode for markdown or HTML code embeds.
    - Redesigning the global fullscreen embed shell outside the code execution overlay.
    - Pixel-perfect matching of the Figma screenshot at all breakpoints before rendered web inspection; browser-computed web output remains the source of truth for Apple parity.

