  parity_expectations:
    - Apple code-code fullscreen Code Run output uses the browser-rendered web overlay as the visual source of truth.
    - Apple uses custom OpenMates primitives and generated tokens where available, not default native product controls.
    - Apple keeps native safe-area/text-rasterization differences classified as intentional only when they do not obscure the product UI.
  verification:
    - Remote Mac `xcodebuild` build for `OpenMates_iOS` after the native changes are committed and pushed.
    - Remote Mac simulator screenshot or UI test evidence for the code-code fullscreen Code Run output overlay.
  intentional_native_differences:
    - SwiftUI text rasterization, scroll physics, and safe-area insets may differ from web when the visual hierarchy, colors, spacing, and actions remain equivalent.

clarification:
  rounds:
    - question: >
        Should the new overlay menu be open by default only after Code Run
        finishes, or should it also be open by default in the pre-run files and
        packages selection state as shown in the top Figma frames?
      answer: >
        When the user clicks `Run code`, the current file and package selection
        view should be replaced by the new design. The same design direction also
        replaces the current code execution output view.
    - question: >
        What should the `View code` breadcrumb do in both states: close the
        overlay and reveal the full code block, or navigate from terminal output
        back to the file and package selection overlay?
      answer: >
        `View code` closes the overlay, like the current `Hide output` button.
        The `Hide output` button must be removed.
  vision_summary: >
    Code Run should no longer feel like a separate split-panel utility bolted on
    to code fullscreen. Clicking `Run code` opens a polished overlay over the
    code block for file/package selection; executing or completed runs reuse the
    same overlay placement with a dark terminal surface. `View code` is the only
    visible close path inside the overlay content and returns to the underlying
    fullscreen source code.
  approved_by_user: true

scenarios:
  - id: S-1
    title: User opens the redesigned file and package selection overlay
    given:
      - Alice opens a finished Python code-code embed in fullscreen on the web app.
      - The code embed supports Code Run and has one required target file plus optional related files or package suggestions.
    when:
      - Alice clicks `Run code`.
    then:
      - The current split-pane file/package selection panel is not shown.
      - A rounded overlay with drop shadow appears on top of the code block.
      - The underlying code remains visible behind the overlay on desktop and is not duplicated as a side-by-side split panel.
      - The overlay background is `var(--color-grey-100)`.
      - The overlay includes a `View code` breadcrumb row at the top.
      - The overlay uses settings-style section headers for `Files` and `Packages`.
      - Each selectable file or package row uses the settings toggle visual style.
      - Required files are visibly included and cannot be accidentally disabled.
      - The Continue/Run CTA uses the existing orange button styling and the `play.svg` icon.

  - id: S-2
    title: User closes selection through View code
    given:
      - Alice has the redesigned Code Run selection overlay open.
    when:
      - Alice clicks `View code`.
    then:
      - The overlay closes.
      - The fullscreen code block returns to its normal source-code view.
      - No `Hide output`, `Cancel`, or duplicate close button is shown inside the selection overlay.
      - Alice can click `Run code` again to reopen selection without losing current code content or PII visibility state.

  - id: S-3
    title: User starts execution and sees the redesigned terminal overlay
    given:
      - Alice has selected the intended files and packages in the redesigned overlay.
    when:
      - Alice clicks the Continue/Run CTA and Code Run starts.
    then:
      - The selection overlay transitions to the terminal overlay in the same overlay position over the code block.
      - The terminal overlay background changes to `#242424`.
      - The terminal output uses the same terminal-style monospace font currently used for output text.
      - The terminal content keeps stdout, stderr, and status colors readable against `#242424`.
      - Active execution still exposes a stop/cancel affordance without reintroducing the old header action bar.
      - The code block remains available by clicking `View code`, which closes the overlay.

  - id: S-4
    title: Finished output shows terminal-style follow-up actions below output
    given:
      - Alice has a finished Code Run output in the terminal overlay.
    when:
      - Alice reads the output.
    then:
      - "`Ask followup`, `Copy output`, and `Run again` are listed below the actual terminal output."
      - The action labels are rendered as terminal-style text commands using the terminal output font.
      - The action labels are `#BCBCBC` by default.
      - Hover, keyboard focus, and active/click states change the action label color to `#FFFFFF`.
      - Disabled actions remain visually disabled and cannot be activated.
      - Copy output, ask follow-up, and run again preserve the current behavior and telemetry/logging.

  - id: S-5
    title: Saved output uses the redesigned overlay after reload
    given:
      - Alice previously ran a code-code embed and the encrypted Code Run output sidecar was persisted.
    when:
      - Alice reloads the chat and opens the code-code embed fullscreen.
    then:
      - The source code remains the default fullscreen view.
      - The header CTA offers the saved output entry point without using the removed `Hide output` label.
      - Opening saved output shows the redesigned terminal overlay.
      - "`View code` closes the saved-output overlay and returns to source code."

  - id: S-6
    title: Apple code execution fullscreen matches the redesigned web overlay
    given:
      - Alice opens an equivalent code-code embed fullscreen in the Apple app.
      - The embed has Code Run output or a Code Run view model state available.
    when:
      - Alice opens the Code Run output surface.
    then:
      - Apple renders a rounded, shadowed terminal overlay above the code source instead of the previous split output panel.
      - Apple uses `#242424` for the terminal overlay background.
      - Apple lists `Ask followup`, `Copy output`, and `Run again` as terminal-style text commands below the output when those actions are available.
      - Apple uses a `View code` breadcrumb to close the overlay and return to source code.
      - Apple does not introduce default native product controls for this overlay.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web Code Run file/package selection is redesigned as the Figma-style overlay and no longer uses the old split-pane panel.
  - id: AC-2
    scenario: S-2
    text: "`View code` closes the Code Run overlay in every pre-run and post-run state, replacing `Hide output`."
  - id: AC-3
    scenario: S-3
    text: Web Code Run execution/output uses the dark terminal overlay over the code block while preserving execution behavior.
  - id: AC-4
    scenario: S-4
    text: Finished output actions are terminal-style text commands below output with default and hover/active colors matching the design.
  - id: AC-5
    scenario: S-5
    text: Persisted Code Run output after reload opens in the redesigned overlay and keeps source code as the default fullscreen view.
  - id: AC-6
    scenario: S-6
    text: Apple code-code fullscreen Code Run output matches the redesigned web overlay within native parity constraints.

contracts:
  api:
    - route: none
      request: No API contract changes are expected.
      response: Existing Code Run start/status/cancel/stream and encrypted output sidecar APIs must keep their current behavior.
      errors:
        - Existing Code Run errors remain visible in the terminal overlay.
  data:
    - No schema changes are expected.
    - Existing `code_run_outputs` sidecars remain the durable source for saved terminal output.
    - Existing file/package candidate state remains client-local until a run starts.
  ui_states:
    - Source code fullscreen default state.
    - Selection overlay loading state.
    - Selection overlay with files only.
    - Selection overlay with files and packages.
    - Selection overlay validation/error state.
    - Executing terminal overlay with streaming status/stdout/stderr.
    - Finished terminal overlay with terminal-style action commands.
    - Failed, timed out, cancelled, and manually stopped terminal states.
    - Saved output terminal overlay after reload.
    - Compact/mobile overlay and regular/desktop overlay.
  accessibility:
    - "`View code`, Continue/Run, toggles, Stop, Ask followup, Copy output, and Run again are keyboard accessible."
    - Action text commands expose button semantics despite terminal styling.
    - Overlay state changes announce terminal output through the existing live region or equivalent native accessibility behavior.
    - Focus remains inside the overlay while it is open and returns to the relevant fullscreen control when closed where feasible.
  privacy_security:
    - No terminal output, selected files, package names, or code content are logged beyond existing sanitized Code Run diagnostics.
    - PII masking/reveal behavior for source code remains unchanged when opening and closing the overlay.
    - Apple and web screenshots or fixtures added for tests must use synthetic public code/output only.

