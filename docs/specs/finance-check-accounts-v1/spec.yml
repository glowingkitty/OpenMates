decisions:
  - id: D-1
    status: active
    decision: V1 is read-only and requests only Revolut READ behavior.
    reason: Finance account data is sensitive and payment/write operations require separate risk, permission, and legal contracts.
    decided_at: "2026-07-20"
  - id: D-2
    status: active
    decision: Treat CSV statements as one-off skill inputs whose normalized results live in the output embed.
    reason: This avoids a separate durable finance datastore while still supporting follow-up requests from embed context.
    decided_at: "2026-07-20"
  - id: D-3
    status: active
    decision: Test Revolut via Sandbox first and defer real account testing until sandbox gates are green.
    reason: Revolut Business API requires paid Grow+ access in production; sandbox provides safer mock/simulation flows for implementation.
    decided_at: "2026-07-20"
  - id: D-4
    status: active
    decision: Keep OpenMates internal Revolut billing service separate from user-connected Finance provider code.
    reason: Internal billing reconciliation and user-owned account analysis have different secrets, privacy, ownership, and data-retention boundaries.
    decided_at: "2026-07-20"
  - id: D-5
    status: active
    decision: Default Revolut setup generates the private key and public certificate locally in OpenMates.
    reason: This avoids requiring users to run OpenSSL/manual certificate commands while preserving Revolut's certificate upload requirement and client-side encryption boundary.
    decided_at: "2026-07-20"
  - id: D-6
    status: active
    decision: SDKs can invoke Check accounts with existing connected accounts, but cannot create/connect Revolut accounts in V1.
    reason: Revolut setup requires an interactive certificate upload, client ID entry, and consent ceremony best handled by CLI, web, and Apple clients.
    decided_at: "2026-07-20"
  - id: D-7
    status: active
    decision: V1 starts with a canonical OpenMates bank-statement CSV template and defers LLM-assisted conversion from arbitrary bank CSVs.
    reason: A deterministic target format gives CLI, SDK, backend, and tests one stable contract before adding probabilistic conversion from varied bank exports.
    decided_at: "2026-07-20"
  - id: D-8
    status: active
    decision: Revolut Business OAuth callbacks use the app host, not the API host.
    reason: The consent redirect is user-facing and should land on a web page that can show the authorization code and next CLI exchange command; the API host has no user-facing callback UI.
    decided_at: "2026-07-21"

attempts:
  - id: ATTEMPT-1
