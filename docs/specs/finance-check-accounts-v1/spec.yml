risks:
  - id: R-1
    risk: Revolut Sandbox may not include enough transaction diversity by default.
    mitigation: Seed deterministic data with sandbox simulations and CSV fixtures; record a blocker if provider simulation is insufficient.
  - id: R-2
    risk: Certificate/private-key handling could accidentally move access-enabling material to server persistence.
    mitigation: Enforce connected-account plaintext field rejection and add tests for Revolut-specific secret field names.
  - id: R-3
    risk: CSV formats vary widely and may cause wrong balances if guessed.
    mitigation: Fail closed with column-mapping errors instead of silently guessing ambiguous files.
  - id: R-4
    risk: Finance projections could be mistaken for advice.
    mitigation: Label as informational projection based on supplied data coverage and avoid recommendations requiring professional advice.

