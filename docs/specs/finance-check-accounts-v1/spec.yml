implementation_plan:
  spec_path: docs/specs/finance-check-accounts-v1/spec.yml
  existing_patterns:
    - backend/apps/calendar/skills/get_events_skill.py
    - backend/shared/providers/google_calendar/client.py
    - backend/shared/providers/google_calendar/oauth.py
    - backend/core/api/app/services/token_broker.py
    - docs/specs/pii-placeholder-rewrite-v1/spec.yml
  architecture: >
    Add a new Finance app and pure Revolut Business provider wrapper. Generalize
    connected-account token exchange for provider-specific refresh flows, parse
    CSV statements into the same normalized transaction model, redact names with
    the reusable placeholder system, and return one filterable app-skill embed.
  data_flow:
    - User connects Revolut Business Sandbox through OpenMates-generated local keypair/certificate, certificate upload, JWT, and consent setup.
    - Client stores Revolut token/private-key material encrypted in connected_accounts.
    - User invokes Check accounts from CLI with connected account refs and/or CSV files.
    - Backend reads provider data through short-lived token refs and parses CSV inputs.
    - Normalizer categorizes transactions and replaces raw counterparty names with placeholders.
    - Skill computes summaries/projections and returns one unified app-skill embed payload.
    - Follow-up prompts use pii-placeholder-rewrite-v1 to target placeholders instead of original names.
  affected_files:
    - path: backend/apps/finance/app.yml
      reason: New Finance app metadata and Check accounts skill registration.
    - path: backend/apps/finance/skills/check_accounts_skill.py
      reason: Skill execution contract.
    - path: backend/shared/providers/revolut_business/
      reason: Pure async Revolut Business API wrapper and auth helpers.
    - path: backend/apps/ai/processing/connected_account_execution.py
      reason: Register Finance check_accounts as a connected-account read skill and generalize token exchange.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: CLI-first Check accounts command/path.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK parity if exposed through SDK facade.
    - path: frontend/packages/ui/src/components/embeds/finance/
      reason: Web embed preview/fullscreen after CLI and SDK gates.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/finance-check-accounts-v1/spec.yml
    - python3 scripts/spec_verify.py docs/specs/finance-check-accounts-v1/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/finance-check-accounts-v1/spec.yml --phase green
  verification_order:
    - PII placeholder rewrite unit evidence first.
    - Revolut Sandbox API script and backend unit red/green.
    - Real dev-server CLI red/green with sandbox + CSV.
    - npm SDK and pip SDK parity locally against dev server.
    - Parity audit and daily/GitHub wiring after local CLI/SDK success.
    - Web implementation and deployed Playwright.
    - User confirmation.
    - Apple parity after confirmation or waiver.

