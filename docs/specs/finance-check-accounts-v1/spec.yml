contracts:
  provider:
    name: Revolut Business API
    environments:
      sandbox: https://sandbox-b2b.revolut.com/api/1.0
      production: https://b2b.revolut.com/api/1.0
    production_plan_requirement: Grow plan or above per Revolut Business API page; pricing varies by country.
    auth: certificate-gated OAuth-like Business API flow with client assertion JWT, authorization code, access token, and refresh token.
    setup_contract:
      default: OpenMates generates the private key and public X.509 certificate locally in CLI/web/Apple clients.
      user_steps:
        - Copy the generated public certificate from OpenMates.
        - Paste the public certificate into Revolut Business or Sandbox API settings.
        - Set the OpenMates redirect URI in Revolut.
        - Copy the Revolut client_id back into OpenMates.
        - Complete Revolut consent and return to OpenMates.
      encrypted_client_fields:
        - private_key
        - client_id
        - refresh_token_bundle
        - provider_account_hint
      advanced_fallback: User may import their own certificate/private-key pair if they already generated one outside OpenMates.
      sdk_boundary: SDKs can use existing connected-account IDs for Check accounts execution but do not create or connect Revolut accounts in V1.
    read_endpoints:
      - method: GET
        path: /accounts
        purpose: List account balances/currencies/states.
      - method: GET
        path: /accounts/{account_id}
        purpose: Fetch one account.
      - method: GET
        path: /transactions
        purpose: List historical transactions with date/account/state/count filters.
      - method: GET
        path: /transactions/{transaction_id}
        purpose: Fetch one transaction.
    forbidden_v1_endpoints:
      - POST /pay
      - payment creation/cancel endpoints
      - counterparty mutation endpoints
      - currency exchange mutation endpoints
      - sensitive card data endpoints
    rate_limits:
      - Respect 429 and Revolut error 3162, including retry-after when provided.
      - Never tight-loop pagination; cap fetch windows and request counts.
  skill:
    app_id: finance
    skill_id: check_accounts
    user_facing_name: Check accounts
    description: Read connected bank-account data and CSV statements to produce an account overview and expense projection.
    input_schema:
      type: object
      properties:
        period:
          type: string
          enum: [monthly, quarterly, yearly, custom]
        start_date: { type: string }
        end_date: { type: string }
        connected_account_ids:
          type: array
          items: { type: string }
        csv_embed_refs:
          type: array
          items: { type: string }
        projection_horizon:
          type: string
          enum: [monthly, quarterly, yearly]
        account_filters:
          type: array
          items: { type: string }
      required: [period]
    normalized_output:
      accounts:
        fields: [account_ref, source_ref, display_label, currency, balance, balance_as_of]
      transactions:
        fields: [transaction_ref, account_ref, source_ref, posted_at, amount, currency, direction, category, counterparty_placeholder, state]
      summaries:
        fields: [income_total, expense_total, net_total, by_category, recurring_items, projection, confidence]
      privacy:
        fields: [placeholder_mappings_ref, raw_names_persisted_false]
  csv:
    accepted_file_types: [csv, tsv]
    canonical_template:
      required_columns:
        - transaction_id
        - account_id
        - account_label
        - posted_at
        - description
        - amount
        - currency
      optional_columns:
        - direction
        - balance_after
        - category_hint
        - counterparty_type
        - source_name
        - notes
      column_rules:
        - posted_at uses ISO 8601 date or datetime.
        - amount is signed from the account perspective; negative means money out and positive means money in.
        - currency uses ISO 4217 uppercase code.
        - description may contain raw bank text but must be transformed to category-aware placeholders before saved skill output or LLM context.
        - transaction_id may be user/bank-provided or a deterministic row hash generated by the importer when missing in a future converter.
    v1_behavior:
      - Parse the canonical OpenMates bank-statement CSV/TSV template deterministically.
      - If a CSV does not match the canonical template, return an actionable error that links to/downloads the template rather than guessing silently.
      - Defer LLM-assisted conversion from arbitrary bank-specific CSV formats to a later phase after the target format is stable.
      - Keep original CSV as an upload/embed input only; normalized saved result stores placeholders and derived fields.
  privacy_security:
    - Finance app is read-only and cannot initiate money movement.
    - Raw merchant/counterparty/payee/payer names are transient normalization inputs only.
    - Saved embeds and LLM context contain category-aware placeholders and aggregates, not raw counterparty names.
    - Original-name mappings are owner-only encrypted PII mappings consumed by pii-placeholder-rewrite-v1.
    - Production real-account testing requires explicit user approval after sandbox gates are green.

tests:
