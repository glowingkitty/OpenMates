schema_version: 2
id: finance-check-accounts-v1
title: Finance Check Accounts Skill V1
status: draft

goal: >
  Add a read-only Finance app skill named Check accounts that combines Revolut
  Business connected-account data and user-provided CSV bank statements into one
  unified account overview embed. The skill should summarize balances, income,
  expenses, recurring transactions, category-level spending, and monthly,
  quarterly, or yearly expense projections without exposing raw merchant,
  counterparty, payer, or payee names to the server/LLM beyond transient
  normalization.

scope:
  in:
    - New enabled-by-default Finance app with one read-only `check_accounts` skill.
    - Revolut Business API as the first connected-account provider, tested against
      Revolut Business Sandbox before any real account is used.
    - >
      Guided Revolut Business connection setup for the certificate-gated
      OAuth-like flow: OpenMates-generated local keypair/certificate by default,
      advanced manual certificate/private-key import as fallback, public cert
      upload in Revolut, client ID entry, consent redirect, authorization-code
      exchange, refresh-token bundle storage as client-side encrypted
      connected-account data.
    - >
      Account setup surfaces are CLI, web app, and Apple app only. SDKs can use
      the Check accounts skill once a connected account already exists, but SDKs
      do not own the interactive Revolut account-connection ceremony in V1.
    - Manual CSV bank-statement inputs from one or more accounts as one-off
      request/embed inputs, not a separate durable finance datastore in V1.
    - Unified normalized transactions from connected accounts and CSV statements
      in one app-skill-use embed result.
    - Deterministic merchant/counterparty/payee/payer redaction using the
      `pii-placeholder-rewrite-v1` mapping contract and category-aware placeholders.
    - Monthly, quarterly, and yearly expense projection using deterministic
      aggregation before LLM narrative.
    - CLI-first execution against the dev server with sandbox credentials/test
      account state, then npm SDK and pip SDK parity, then web, user confirmation,
      and Apple parity.
    - >
      Fullscreen embed contract for later web implementation: filter by account,
      source, date range, category, direction, transaction state, and placeholder.
  out:
    - Payment initiation, transfers, counterparties management, exchange, cards,
      payouts, or any Revolut `WRITE`, `PAY`, or sensitive-card-data operation.
    - Personal Revolut accounts; Revolut docs state there is no public API for
      personal Revolut accounts through this Business API flow.
    - Persistent normalized finance transaction storage outside the app-skill embed
      result and encrypted owner-only PII mappings.
    - Plaid/Tink/TrueLayer/Open Banking providers beyond noting future extension points.
    - Production real-account testing until sandbox CLI and SDK evidence is green
      and the user explicitly upgrades/provides a real account for final validation.
    - Investment advice, tax advice, credit underwriting, or automated financial decisions.

depends_on:
  - docs/specs/pii-placeholder-rewrite-v1/spec.yml

sequencing_gates:
  - gate: PII_REWRITE_BEFORE_FINANCE
    required_before: finance_skill_implementation
    rule: Finance implementation must not persist or send raw counterparty names; category-aware placeholder rewrite must be designed and covered first.
    evidence: [T-PII-UNIT-REWRITE]
  - gate: SANDBOX_PROVIDER_BEFORE_REAL_ACCOUNT
    required_before: production_account_validation
    rule: Revolut Sandbox setup, provider wrapper, and CLI/SDK tests must pass before using the user's real upgraded account.
    evidence: [T-API-REVOLUT-SANDBOX, T-CLI-FINANCE-DEV, T-NPM-SDK-FINANCE, T-PIP-SDK-FINANCE]
  - gate: CLI_FIRST
    required_before: sdk_implementation
    rule: A real CLI command/chat against the dev server with sandbox-connected account and CSV fixture must pass before SDK or web work starts.
    evidence: [T-CLI-FINANCE-DEV]
  - gate: SDK_SECOND
    required_before: web_implementation
    rule: npm SDK and pip SDK parity must pass locally against the dev server before web implementation starts.
    evidence: [T-NPM-SDK-FINANCE, T-PIP-SDK-FINANCE, T-PARITY-AUDIT]
  - gate: WEB_THIRD
    required_before: user_ui_confirmation
    rule: Web implementation and Playwright green evidence happen only after CLI and SDK gates are green and deployed to dev.
    evidence: [T-WEB-FINANCE-CHECK-ACCOUNTS]
  - gate: USER_CONFIRMATION_BEFORE_APPLE
    required_before: apple_implementation
    rule: Apple parity starts only after deployed web behavior and visuals are user-confirmed.
    evidence: [V-USER-CONFIRMATION]

context_discovery:
  github_issues:
    - "GitHub MCP get_me failed with 401 Bad credentials. Fallback `gh issue list --repo glowingkitty/OpenMates --search \"finance Revolut bank accounts check accounts connected account\" --state all --limit 20 --json number,title,state,labels,url` returned no matches."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/apps/app-skills.md
    - docs/architecture/privacy/pii-protection.md
    - docs/architecture/privacy/sensitive-data-redaction.md
    - docs/specs/calendar-permission-management/spec.yml
    - docs/specs/connected-account-cli-import/spec.yml
    - docs/specs/account-import-v1/spec.yml
    - docs/specs/business-company-financials/spec.yml
    - docs/specs/pii-placeholder-rewrite-v1/spec.yml
  code_patterns:
    - backend/apps/ai/mates/finance.md defines the Finn finance mate but no Finance app exists yet.
    - backend/apps/calendar/app.yml and backend/apps/calendar/skills/get_events_skill.py show connected-account read-skill patterns.
    - backend/apps/ai/processing/connected_account_execution.py currently maps only Calendar skills and hardcodes Google refresh-token exchange.
    - backend/core/directus/schemas/connected_accounts.yml stores connected account rows encrypted/hash-only.
    - backend/core/api/app/services/token_broker.py provides short-lived turn-token refs and access-token handles.
    - frontend/packages/ui/src/services/connectedAccountOAuthService.ts currently finalizes Google Calendar OAuth handoffs and must become provider-extensible.
    - frontend/packages/openmates-cli/src/cli.ts already owns interactive command flows and is the priority V1 setup surface for Revolut Business connection.
    - backend/core/api/app/services/payment/revolut_business_service.py is an internal OpenMates billing/bank-transfer service and must not be reused for user-connected finance data except as a source of API constants/docs context.
    - frontend/packages/ui/src/components/enter_message/utils/fileHelpers.ts recognizes CSV/TSV attachments as sheet-like files.
  tests:
    - backend/tests/test_connected_accounts_permissions.py
    - backend/tests/test_connected_account_execution.py
    - backend/tests/test_local_connected_account_connectors.py
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - packages/openmates-python/tests/test_sdk.py
    - frontend/apps/web_app/tests/file-attachment-code-flow.spec.ts
    - frontend/apps/web_app/tests/pii-detection-flow.spec.ts
  external_research:
    - "Revolut Business API official page: API access is available to Revolut Business customers on Grow plan and above; no public API for personal Revolut accounts. UK pricing page currently shows Grow from £30/month, but pricing varies by country."
    - "Business API base URL: https://b2b.revolut.com/api/1.0/; Sandbox base URL: https://sandbox-b2b.revolut.com/api/1.0/."
    - "Business API read scope is READ; write/pay/card-sensitive scopes are separate and out of V1 scope."
    - "GET /accounts returns account ID, name, balance, currency, state, public flag, and timestamps."
    - "GET /transactions supports filters such as request_id, from, to, count, account, and state; max 1,000 transactions per request; pagination uses the last item created_at as next `to`."
    - "Revolut Business API setup requires certificate upload, client assertion JWT, consent, authorization code exchange, access token, and refresh token; it is OAuth-like but not one-click consumer OAuth."
    - "Sandbox supports mock data and simulation endpoints including POST /sandbox/topup and POST /sandbox/transactions/{id}/{action}; simulations are sandbox-only."

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/**/Chat*
    - apple/OpenMates/Sources/**/Embeds*
    - apple/OpenMates/Sources/**/Settings*
    - apple/OpenMatesTests/SkillApplicationParityTests.swift
  parity_expectations:
    - Apple eventually renders Finance check-account embeds and respects the same placeholder/category privacy contract.
    - Apple starts after CLI, SDK, web, and user confirmation or a spec-recorded waiver.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios or targeted embed/app-skill parity test after web/user confirmation.
  intentional_native_differences:
    - Native Revolut connection setup may use platform web-auth/UI affordances, but encrypted connected-account storage and read-only scope boundaries must match web/CLI.

clarification:
  rounds:
    - question: Should V1 support read-only actions only?
      answer: Yes. V1 is read-only.
    - question: Should CSV bank-statement import ship in the same first release as Revolut connected-account support?
      answer: Yes. The skill should support both connected accounts and CSV statements and combine them into one result.
    - question: Should CSV statements be persisted as a separate finance datastore?
      answer: No separate finance datastore in V1. Each app skill use already creates an embed with processed output, which is enough for follow-up requests.
    - question: Should raw merchant/counterparty names be saved in embeds?
      answer: >
        Use the PII/placeholder mapping approach instead: raw names should be
        mapped to placeholders, with a reusable rewrite layer for follow-up
        questions.
    - question: Should this spec be split from the PII placeholder rewrite work?
      answer: Yes. Create a separate PII spec and make Finance depend on it.
    - question: Should V1 generate the Revolut API keypair/certificate locally or ask users to provide certificate files?
      answer: >
        Use OpenMates-generated local keypair/certificate by default, with manual
        certificate/private-key import as an advanced fallback. Prioritize CLI
        setup and skill execution first, ensure SDKs can use the skill after an
        account is connected, and keep account setup exclusive to CLI, web app,
        and Apple app surfaces.
  vision_summary: >
    The user wants a read-only Finance Check accounts skill that combines Revolut
    Business connected-account data and CSV statements into one useful overview,
    forecast, and eventually filterable fullscreen embed. The first implementation
    should focus on CLI and SDK support, use Revolut Sandbox before any real
    account, and rely on a separate reusable PII placeholder rewrite spec for
    merchant/payee privacy.
  approved_by_user: true

implementation_state:
  subject_commit: a754b9ac6

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-20"
    reason: User approved implementing the Finance app spec with CLI priority, SDK execution parity, CLI/web/Apple-only account setup, OpenMates-generated Revolut certificate flow, and canonical CSV template first.
  implementation_plan:
    status: approved
    approved_at: "2026-07-20"
