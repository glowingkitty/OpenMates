scenarios:
  - id: S-1
    title: User connects a Revolut Business Sandbox account
    given:
      - Alice has created a Revolut Business Sandbox account.
    when:
      - Alice starts `Connect Revolut Business` from OpenMates CLI or web settings.
    then:
      - OpenMates explains that Revolut Business API is available for Business accounts and production access requires Grow plan or above.
      - OpenMates generates a local private key and public certificate by default, then shows Alice the public certificate to upload in Revolut.
      - OpenMates also offers an advanced fallback for importing a user-generated certificate/private-key pair.
      - OpenMates guides Alice through public certificate upload, client ID entry, consent redirect, and token exchange.
      - OpenMates stores private key/client config/refresh-token bundle only in client-side encrypted connected-account fields.

  - id: S-2
    title: CLI checks accounts from Revolut Sandbox only
    given:
      - Alice has a connected Revolut Business Sandbox account with seeded test balances and transactions.
    when:
      - Alice runs the Finance Check accounts skill through a real OpenMates CLI command against `https://api.dev.openmates.org`.
    then:
      - The request reads accounts and transactions using short-lived connected-account token refs.
      - The result includes balances, income, expenses, categories, recurring items, and projection for the requested period.
      - No payment/write/pay/sensitive-card endpoint is called.

  - id: S-3
    title: CLI checks accounts from CSV statements only
    given:
      - Alice has CSV bank statements from two accounts.
    when:
      - Alice passes those CSV files to the Finance Check accounts skill.
    then:
      - OpenMates normalizes dates, amounts, currencies, accounts, descriptions, and transaction directions.
      - The result combines both statement files into one overview embed.
      - Raw merchant/counterparty names are replaced with category-aware placeholders before saved output or LLM context.

  - id: S-4
    title: CLI checks accounts from Revolut and CSV together
    given:
      - Alice has one connected Revolut Business Sandbox account and one uploaded CSV statement for another account.
    when:
      - Alice asks `Check all my accounts for this quarter`.
    then:
      - The result combines connected-account transactions and CSV transactions into one unified overview.
      - Duplicate-looking rows are flagged without destructive merge unless deterministic identity matches.
      - The embed records source/account metadata so future fullscreen filters can switch between accounts and sources.

  - id: S-5
    title: Follow-up asks about an original merchant name without exposing it
    given:
      - A prior Finance embed mapped `Spotify` to `[MERCHANT_STREAMING_001]`.
    when:
      - Alice asks `How much money did I spend on Spotify this year?`.
    then:
      - The PII rewrite layer sends `[MERCHANT_STREAMING_001]` to the server/LLM.
      - The Finance result can answer using the placeholder/category and local UI can restore the original for Alice.

  - id: S-6
    title: Fullscreen Finance embed filters normalized results
    given:
      - Alice opens a Finance Check accounts embed with multiple accounts and categories.
    when:
      - Alice filters to one account, streaming category, and this year.
    then:
      - The fullscreen view shows filtered totals, transaction rows, and projections from the saved normalized embed data.
      - Filtering does not require re-fetching raw Revolut data or re-uploading CSV files.

