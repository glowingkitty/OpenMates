implementation_plan:
  existing_patterns:
    - backend/core/api/app/utils/config_manager.py for backend_config.yml access.
    - backend/core/api/app/services/skill_registry.py for app and skill discovery.
    - backend/apps/ai/processing/skill_executor.py for runtime skill execution enforcement.
    - backend/apps/ai/processing/tool_generator.py for AI tool exposure.
    - frontend/packages/openmates-cli/src/server.ts for self-host server command structure.
    - frontend/packages/ui/src/stores/appSkillsStore.ts for frontend app/skill metadata consumption.
  architecture: >
    Add a backend FeatureAvailabilityService that owns feature ID discovery,
    metadata defaults, admin overrides, parent-child inheritance, and effective
    state. App metadata should describe implemented capabilities only; unavailable
    placeholders should be removed from runtime metadata, and intentionally hidden
    implemented features should declare default_enabled: false.
  data_flow:
    - FeatureAvailabilityService loads app, skill, embed, focus, memory, and platform feature definitions at server startup.
    - ConfigManager loads backend_config.yml from an environment-overridable path and returns feature_overrides.
    - The service computes effective enabled/disabled states and parent-child inherited disables.
    - Backend metadata routes and dispatchers call the service before exposing or executing features.
    - Frontend and Apple clients fetch effective availability and hide disabled entry points.
    - CLI feature commands edit backend_config.yml and instruct admins to restart.
  affected_files:
    - path: backend/shared/python_schemas/app_metadata_schemas.py
      reason: Remove stage fields, replace embed disabled with default_enabled false validation.
    - path: backend/apps/*/app.yml
      reason: Remove all stage keys and migrate disabled/default-off metadata.
    - path: backend/apps/*/focus_modes/*/SKILL*.md
      reason: Remove stage frontmatter and update focus mode metadata validation.
    - path: backend/core/api/app/utils/config_manager.py
      reason: Add feature_overrides loading, migration, and environment-overridable config file path.
    - path: backend/core/api/app/services/feature_availability_service.py
      reason: New service for feature discovery, defaults, overrides, and enforcement helpers.
    - path: backend/core/api/app/services/skill_registry.py
      reason: Apply feature availability during app and skill discovery.
    - path: backend/apps/ai/processing/tool_generator.py
      reason: Remove SERVER_ENVIRONMENT stage filtering and use feature availability.
    - path: backend/apps/ai/processing/postprocessor.py
      reason: Remove production-stage filtering and use feature availability.
    - path: backend/apps/ai/processing/skill_executor.py
      reason: Replace disabled_apps checks with feature availability enforcement.
    - path: backend/core/api/app/routes/application_preview.py
      reason: Block preview execution while embed:code:application is disabled.
    - path: frontend/packages/openmates-cli/src/server.ts
      reason: Add server features commands and config editing.
    - path: frontend/packages/ui/src/stores/appSkillsStore.ts
      reason: Merge effective availability into app/skill UI state.
    - path: frontend/packages/ui/src/components/Header.svelte
      reason: Gate projects, workflows, and tasks workspace tabs by platform feature availability.
    - path: frontend/apps/web_app/src/routes/projects/+page.svelte
      reason: Block direct projects route while platform:projects is disabled.
    - path: docs/contributing/guides/spec-driven-development.md
      reason: Update new feature guidance to use default_enabled false and no stages.
    - path: AGENTS.md
      reason: Update app/skill/embed/focus/memory authoring instructions to forbid stage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/simplified-feature-availability/spec.yml
    - python3 -m pytest backend/tests/test_feature_availability_service.py
    - python3 -m pytest backend/tests/test_feature_availability_enforcement.py
    - python3 -m pytest backend/tests/test_app_metadata_no_stage.py
    - cd frontend/packages/openmates-cli && npm run test:unit:server
    - cd frontend/packages/openmates-cli && npm run build
    - cd frontend/packages/openmates-cli && npm run typecheck (currently blocked by existing workspace-level TypeScript errors outside changed CLI server files)
    - cd frontend/apps/web_app && npm run check (currently blocked by existing workspace-level Svelte/TypeScript errors outside the projects route)
    - Deploy before Playwright green verification.
    - python3 scripts/tests.py run --spec feature-availability.spec.ts
    - python3 scripts/apple_remote.py status and build-ios when Apple metadata consumers are affected.
  verification_order:
    - Backend service and metadata pytest first.
    - CLI vitest second through scripts/tests.py.
    - Web Playwright after deploy.
    - Apple remote build or sanitized failure evidence last if affected.

