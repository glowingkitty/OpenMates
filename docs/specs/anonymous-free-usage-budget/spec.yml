id: anonymous-free-usage-budget
title: Anonymous Free Usage Budget
status: implementing

goal: >
  Let new, unauthenticated users try OpenMates on official cloud clients with a
  shared daily and weekly free-usage budget, while keeping anonymous chat content
  client-side encrypted, local-only, and automatically removable unless the user
  signs up and promotes the chats into their encrypted account sync.

scope:
  in:
    - Official-cloud-only anonymous free chat for web, CLI, and Apple clients.
    - Server-admin settings for monthly budget, derived daily hard cap percentage, weekly cap, and per-identity daily cap.
    - Shared daily and weekly free budget accounting that subtracts actual charged credits from the budget like normal user credit charging.
    - Per-identity daily abuse cap using a first-party anonymous local identifier plus HMAC-hashed request IP metadata.
    - Reuse of existing per-chat encryption for anonymous chats, with chat keys stored locally until signup.
    - Anonymous local chat/embed storage in an explicit local anonymous scope guarded by a tab/session-scoped anonymous marker and purged on unauthenticated client start when that marker is absent.
    - Signup conversion that wraps anonymous chat keys with the new account master key and uploads encrypted chats, messages, and embeds through normal sync.
    - App skills that do not require connected accounts, determined by machine-readable connected-account requirement metadata.
    - Signup-gated file uploads from anonymous chat, including composer UI that replaces suggestions above the message input with an account-required notice and replaces Send with Signup while a file is attached.
    - Terms/privacy notice before first anonymous message and legal/privacy/browser-storage documentation updates.
  out:
    - Granting credits to anonymous users or creating anonymous credit balances.
    - Server-side persistence of anonymous prompts, responses, encrypted chat blobs, or embed content before signup.
    - Anonymous memories, custom PII entries, connected accounts, reminders, notifications, billing, teams, sharing, or export.
    - Anonymous file uploads, transient upload processing, durable S3 objects, Directus upload_files rows, or Directus embed records before signup.
    - Anonymous availability on self-hosted editions.
    - Strong bot/fraud prevention beyond practical local ID, IP hash, rate limit, and global budget caps.
    - Retroactive import of older demo chats or shared chats into anonymous free usage.

