risks:
  - IndexedDB reuse can leak stale anonymous records if session-marker purge gating is incomplete; tests must cover same-session reload, new unauthenticated session, and auth-state transitions.
  - Connected-account metadata drift can accidentally expose a skill that needs user credentials; deterministic metadata audits are required.
  - IP HMAC records remain pseudonymous personal data under GDPR; privacy policy and retention must be explicit.
  - Reservation accounting must be atomic enough to prevent budget overspend under concurrent streaming requests.
  - Cross-platform parity makes this larger than a web-only feature and should be implemented in slices behind feature flags.

open_questions:
  - none

decisions:
  - Anonymous local storage uses IndexedDB plus a sessionStorage-backed anonymous session marker; same-tab reload can recover encrypted local chats, but closing the tab/window removes the marker and the next unauthenticated start purges them.
  - Anonymous file uploads require signup. Before account creation, attaching a file only changes the composer UI: suggestions above the input are replaced by account-required copy and Send is replaced by Signup; no file bytes, upload metadata, or embed payloads are sent to the backend. If the user starts signup from this state, preserve the typed message as a draft but discard the pending file so it must be reattached after account creation.
  - Per-identity abuse prevention is daily-only for v1; weekly protection is enforced through the shared weekly budget, not weekly per-identity metadata.
  - Public status exposes active/inactive and reset timing only; exact global remaining budget is admin-only.
