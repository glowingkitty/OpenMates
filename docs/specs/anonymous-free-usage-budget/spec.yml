implementation_plan:
  existing_patterns:
    - Mirror free-testing budget admin/public status patterns, but do not grant credits to users.
    - Reuse ChatKeyManager and existing chat/message/embed encryption for local anonymous records.
    - Reuse authenticated sync only after signup conversion wraps chat keys with the account master key.
  architecture: >
    Add an AnonymousFreeUsageService that owns budget config, public availability, HMAC identity checks,
    reservation/finalization accounting, and short-lived anonymous usage metadata. Add a platform-neutral
    anonymous chat/app execution API that routes through a shared usage meter instead of BillingService.
    Client platforms store anonymous encrypted chats locally in a marked anonymous scope guarded by an
    anonymous session marker. Same-session reload can recover the chat for UX, while a new unauthenticated
    session without that marker purges the anonymous scope before normal loading unless signup conversion is
    actively promoting the records.
  data_flow:
    - Client creates or loads first-party anonymous local ID.
    - Client creates a short-lived anonymous session marker for local encrypted chat continuity.
    - Client checks public anonymous free usage status.
    - Client creates local anonymous chat and per-chat key.
    - Client sends plaintext message for transient AI/app processing plus anonymous ID.
    - Client includes full decrypted anonymous text history on every anonymous AI/app turn.
    - Client blocks file attachments before upload, replaces suggestions above the input with account-required copy, and replaces Send with Signup while the pending file remains attached.
    - Backend HMACs local ID and request IP, reserves budget, executes allowed model/skills, finalizes actual credits, and streams response.
    - Client encrypts user and assistant messages locally with the chat key and stores them in anonymous local scope.
    - On signup, client wraps anonymous chat keys with master key and syncs encrypted records as normal authenticated chats.
  affected_files:
    - path: backend/core/api/app/services/anonymous_free_usage_service.py
      reason: Budget, identity, reservation, and status service.
    - path: backend/core/api/app/routes/admin.py
      reason: Admin budget endpoints.
    - path: backend/core/api/app/routes/settings.py
      reason: Public safe status metadata.
    - path: backend/core/api/app/routes/anonymous.py
      reason: Anonymous status/chat/skill endpoints, full-history payload validation, and signup_required rejection for file/upload payloads.
    - path: backend/core/directus/schemas/anonymous_free_usage_budget.yml
      reason: Budget config schema.
    - path: backend/core/directus/schemas/anonymous_free_usage_counters.yml
      reason: Daily/weekly aggregate counters and reservations.
    - path: backend/apps/**/app.yml
      reason: connected-account requirement metadata for anonymous skill gating.
    - path: frontend/packages/ui/src/services/anonymousChatStorage.ts
      reason: Anonymous local encrypted storage and purge/promote flow.
    - path: frontend/packages/ui/src/stores/serverStatusStore.ts
      reason: Anonymous availability state.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Anonymous first-send local system message and send flow integration.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI anonymous status/chat API.
    - path: apple/OpenMates/Sources/**
      reason: Native anonymous free chat parity.
    - path: shared/docs/privacy_policy.yml
      reason: Privacy policy update.
    - path: frontend/packages/ui/src/i18n/sources/legal/**
      reason: Legal text updates.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/anonymous-free-usage-budget/spec.yml
    - Backend pytest for service accounting and endpoint gating.
    - Vitest for anonymous local storage and signup conversion payload preparation.
    - Web Playwright after deploy for user-visible anonymous flow.
    - CLI unit tests for status/chat/skill gating.
    - Apple remote build or targeted test for native parity.
  verification_order:
    - Backend/service and CLI contracts first.
    - Web Playwright second after deploy.
    - Apple remote verification third.

