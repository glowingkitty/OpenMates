risks:
  - id: R-1
    description: Existing Apple embed renderers use UIKit/AppKit/PDFKit/QuickLook/AVKit assumptions that may not compile or behave on watchOS without careful guards or Watch-specific variants.
    mitigation: Start with unit mapping and build-watch tests, then migrate renderer-by-renderer with watchOS compiler-condition variants.
  - id: R-2
    description: Offline audio is inherently network-gated because cloud transcription is required before the iOS-equivalent pending embed can be prepared.
    mitigation: Make offline text queue fully supported and make offline audio clearly wait for network before upload/transcription/send.
  - id: R-3
    description: Adding a Watch target may expose shared Apple source files with unguarded iOS/macOS APIs.
    mitigation: Add build-watch early and keep Watch UI in a separate target with small platform-neutral shared seams.
  - id: R-4
    description: Watch UI may become too dense if all embed previews try to preserve iOS content density.
    mitigation: Use a Watch-specific card contract with essential fields only and require design artifact review.

