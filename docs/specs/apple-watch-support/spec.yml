    - python3 scripts/apple_remote.py test-watch --simulator "Apple Watch Series 11 (46mm)" --only-testing OpenMatesWatchUITests/WatchAudioComposerUITests
  intentional_native_differences:
    - Watch does not render rich fullscreen embed details; the fullscreen/detail action always presents Open on iPhone / Mac continuation options.
    - Watch UI may use system text input/dictation/microphone permission surfaces because those are OS-owned capability boundaries.
    - Watch card dimensions, typography, and safe-area treatment differ from iOS/macOS while preserving OpenMates colors, hierarchy, and content semantics.

clarification:
  rounds:
    - question: Should the Watch app use the dark chat design from the screenshot as the primary visual direction for all Watch screens, while embed preview cards use the existing embed color language?
      answer: Yes, but preview cards should use the same colors as existing embed previews, only at a different size.
    - question: Which embed preview types must be fully supported in Watch V1 versus allowed to fall back to a generic compact card?
      answer: >
        Full support for the proposed V1 set: website, web video, image,
        audio recording, code, PDF, maps/place, search result groups, travel
        stays/connections, shopping product, weather, and reminder.
    - question: For tapping an embed preview on Watch, should the default be Watch compact detail, immediate handoff/QR, or per-type behavior?
      answer: Fullscreen view always should show open on iPhone / Mac.
    - question: For Watch audio input, should audio auto-send after transcription or insert transcript plus audio-recording embed into the composer for review/edit first?
      answer: >
        Same behavior as iOS: embed and require the user to send manually.
    - question: Should Watch V1 require internet access after QR/PIN login, or also support offline cached chat reading and queued sends from the first release?
      answer: Offline caching like the iOS app is required.
  vision_summary: >
    Build a standalone Apple Watch OpenMates app with dark Watch-native chat UI,
    QR/PIN pair login, offline cached chat reading, queued sends, text/audio
    composer flows, and full compact preview support for the listed embed types.
    Watch embed previews keep existing OpenMates embed colors in a new small size,
    while any fullscreen/detail action becomes a continuation surface for opening
    the chat/embed on iPhone or Mac.
  approved_by_user: true

scenarios:
  - id: S-1
    title: User logs into Watch through QR/PIN pair login
    given:
      - Alice installs the independent OpenMates Watch app without requiring the iPhone app to be installed.
      - Alice has an OpenMates account that can authorize pair login from another signed-in device.
    when:
      - Alice opens the Watch app while unauthenticated.
      - The Watch displays a compact QR code and 6-character PIN entry flow.
      - Alice scans or opens the pair URL on another signed-in OpenMates device and authorizes the Watch.
      - Alice enters the PIN on Watch.
    then:
      - The Watch decrypts the pair-login bundle, saves its own local session and master key, and reaches the authenticated chat list.
      - The Watch never depends on iPhone local Keychain, iCloud Keychain, or WatchConnectivity for initial login.
      - Login failures, expiry, invalid PIN, and network failures are visible and recoverable.
  - id: S-2
    title: Authenticated Watch syncs and caches chats directly
    given:
      - Alice is authenticated on Watch.
      - Alice has recent encrypted chats on the server.
    when:
      - The Watch app starts, foregrounds, or reconnects after being offline.
    then:
      - The Watch connects directly to the OpenMates backend and WebSocket phased sync.
      - The Watch loads chat keys, decrypts titles/messages/embeds locally, and persists recent chats/messages/embeds for offline reading.
      - Hidden/private content and encrypted key material remain governed by the same Apple client-side encryption storage rules as iOS.
  - id: S-3
    title: User browses chats and opens a transcript in dark Watch UI
    given:
      - Alice is authenticated on Watch and has synced recent chats.
    when:
      - Alice opens the chat list and selects a chat.
    then:
      - The chat list uses the dark Watch design direction with compact search, new-chat, and settings affordances.
      - The chat thread uses Watch-adapted dark message bubbles, assistant avatar treatment, scroll behavior, and streaming states.
      - Text, markdown basics, inline embed references, and app/assistant metadata are readable on a small Watch display.
  - id: S-4
    title: User sends text replies and starts new text chats
    given:
      - Alice is authenticated on Watch and network is online.
    when:
      - Alice replies to an existing chat using Watch text input.
      - Alice starts a new chat from the Watch chat list and enters text.
    then:
      - The Watch sends through the same encrypted ChatSendPipeline semantics as iOS.
      - The local transcript updates optimistically and reconciles with streamed assistant events.
      - New chats receive lowercase UUID-style authenticated chat IDs and sync to web, iOS, iPad, and Mac.
  - id: S-5
    title: User records audio and manually sends the transcribed recording embed
    given:
      - Alice is authenticated on Watch and grants microphone access.
      - Alice opens an existing chat or starts a new chat.
    when:
      - Alice records audio from the Watch composer.
      - The Watch uploads the audio and receives a cloud transcript.
    then:
      - The composer shows the transcript and an audio-recording pending embed.
      - The message is not sent until Alice explicitly taps send.
      - Sending persists the recording embed and encrypted message content so other clients render the same recording/transcript.
      - Permission denial, upload failure, transcription failure, and cancellation are visible.
  - id: S-6
    title: Watch renders compact unified embed previews
    given:
      - A synced chat contains finished, processing, error, and metadata-loading embed states for supported V1 embed families.
    when:
      - Alice views the chat on Watch.
    then:
      - The Watch renders a small-width unified embed preview card using the existing embed/app colors and a Watch-specific size contract.
      - Website, web video, image, audio recording, code, PDF, maps/place, search result groups, travel stays/connections, shopping product, weather, and reminder previews each show their essential content.
      - Unsupported or malformed payloads fail visibly with a compact error card rather than leaking raw JSON or crashing.
  - id: S-7
    title: User opens Watch embed detail and continues on iPhone or Mac
    given:
      - Alice is viewing a compact embed preview on Watch.
    when:
      - Alice taps the embed preview.
    then:
      - The Watch opens a detail/fullscreen shell for that embed.
      - The shell always presents Open on iPhone / Mac continuation options.
      - The shell offers Handoff where available and universal-link/QR fallback for the current chat/embed.
      - WatchConnectivity may pre-warm the paired iPhone when reachable but is never required for standalone behavior.
  - id: S-8
    title: Offline Watch reading and queued sends match iOS intent
    given:
      - Alice has previously synced chats on Watch.
      - The Watch loses network connectivity.
    when:
      - Alice opens cached chats, drafts a text reply, or records an audio reply.
    then:
      - Cached chat list and cached message windows remain readable.
      - Text sends are queued and replayed when online.
      - Audio sends are queued only after local recording/upload/transcription requirements can be satisfied; if cloud transcription cannot run offline, the UI clearly explains that audio transcription waits for network before send is possible.
      - Replay preserves encrypted storage, message order, and visible diagnostics.

