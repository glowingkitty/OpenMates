  parity_expectations:
    - Watch is a first-class Apple client that uses the same OpenMates backend, client-side encrypted data model, sync semantics, and embed payloads as iOS/macOS.
    - Watch UI is adapted to the provided dark design direction rather than scaled-down iOS screens.
    - Watch embed previews use the same app/embed colors and semantic content as existing native embed previews, but a new Watch-size card contract.
    - Watch offline behavior matches iOS intent: cached chats remain readable and queued sends replay when connectivity returns.
    - Pair login transfers encrypted login bundle/master key material through the existing OpenMates pair-login security model, not Apple cloud sync.
  verification:
