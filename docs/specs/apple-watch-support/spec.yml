assumptions:
  - id: A-1
    text: Apple supports independent watchOS apps that run without installing the companion iOS app when configured as independent.
    category: platform
    required_before: implementation
    status: confirmed
    evidence:
      - source: "Apple Developer: Creating independent watchOS apps"
        summary: Apple documents independent watchOS apps that sign in, download data, request permissions, and sync directly without requiring a companion iOS app.
  - id: A-2
    text: WatchConnectivity may enhance paired-iPhone behavior but cannot be the primary data source for a standalone Watch app.
    category: platform
    required_before: implementation
    status: confirmed
    evidence:
      - source: "Apple Developer: Creating independent watchOS apps"
        summary: Independent apps cannot rely on Watch Connectivity as their main source of data and need their own access path.
  - id: A-3
    text: The existing pair-login protocol can authorize a new Apple device by transferring an encrypted login bundle and master key material after PIN confirmation.
    category: auth
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Auth/Views/PhonePairLoginView.swift
        summary: Current native pair-login initiates a token, displays QR, polls for authorization, derives a key from PIN/token, decrypts the bundle, and completes pair login.
  - id: A-4
    text: Current iOS audio recording behavior creates a pending embed and requires manual send after transcription.
    category: composer
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
        summary: uploadRecording uploads, calls apps/audio/skills/transcribe, and registers a pending composer embed with transcript and duration.
  - id: A-5
    text: Watch-specific embed preview cards need a separate size contract because the existing native embed cards are too large for Apple Watch.
    category: ui
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Embeds/Views/EmbedPreviewCard.swift
        summary: Existing compact preview cards use 300pt width and 200pt height, larger than a practical Watch card.

contracts:
  api:
    - route: POST /v1/auth/pair/initiate
      request: "PairInitiateRequest with Watch device hint"
      response: "PairInitiateResponse containing token and expiry"
      errors:
        - Network unavailable shows retry state.
        - Expired token shows refresh action.
    - route: GET /v1/auth/pair/poll/{token}
      request: "Watch polls the pair token until authorized, expired, or failed"
      response: "PairPollResponse with waiting, ready, or expired status"
      errors:
        - Poll failure is visible and recoverable.
    - route: POST /v1/auth/session
      request: "Watch session id plus watchOS device info"
      response: "SessionResponse with user and WebSocket token"
      errors:
        - Re-auth required preserves cached encrypted data when safe, matching iOS intent.
    - route: WebSocket /v1/ws
      request: "Watch phased sync request and encrypted send events"
      response: "Chat, message, embed, streaming, and sync events"
      errors:
        - Disconnection transitions to offline cached mode and queues eligible sends.
    - route: POST /v1/upload/file
      request: "Watch audio recording multipart upload with chat_id"
      response: "UploadFileResponse with encrypted S3 metadata"
      errors:
        - Upload failure keeps composer state and shows retry/cancel.
    - route: POST apps/audio/skills/transcribe
      request: "Uploaded audio metadata and chat id"
      response: "Transcript result used for pending audio-recording embed"
      errors:
        - Transcription failure shows visible error and does not auto-send.
  data:
    - Watch stores master keys and other secrets in local Keychain only, with non-synchronizable behavior matching iOS security intent.
    - Watch persists recent chats, latest message windows, embed records, embed keys, and queued actions in a watchOS-compatible offline store.
    - Watch-size embed preview contract includes a watch variant, target width range, target height range, app gradient/color source, icon, primary text, secondary text, media thumbnail area when available, status, and continuation metadata.
    - Watch continuation payload includes chat id, optional embed id, activity type, universal link, and QR payload with no plaintext private message content.
  ui_states:
    - Unauthenticated pair-login loading, QR visible, waiting, PIN entry, expired, invalid PIN, failed, and success states.
    - Authenticated chat list empty, loading, cached/offline, online, search, new-chat, and error states.
    - Chat thread loading, cached/offline, streaming, queued send, failed send, assistant typing, and empty new-chat states.
    - Composer idle, focused text, recording, transcribing, pending audio embed, pending send, send disabled, send enabled, upload error, and permission denied states.
    - Watch compact embed preview states for finished, processing, metadata-loading/fallback, error, and malformed payload.
    - Embed detail/fullscreen continuation state with Handoff, universal link, QR, and unavailable-device fallback.
  privacy_security:
    - Watch never logs plaintext messages, raw transcripts, audio content, encryption keys, auth/session tokens, cookies, push tokens, or full share URL fragments.
    - Pair-login screenshots and test artifacts must not expose real account tokens, private emails, or reusable PINs.
    - Audio recording data remains local until uploaded through the existing encrypted upload path and must not be stored in committed fixtures.
    - Continuation links and QR payloads may include chat/embed identifiers only when required to open the authenticated client; no decryption keys or private content may be embedded.
    - Watch offline queue must not persist plaintext private message content outside the approved encrypted/local storage boundary.

tests:
  - id: T-WATCH-REMOTE-TOOLING
    type: pytest
    file: scripts/tests/test_apple_remote_watch.py
    command: python3 -m pytest scripts/tests/test_apple_remote_watch.py
    covers: [AC-9]
    assertions:
      - Remote wrapper exposes sanitized build-watch and test-watch commands.
      - Output redacts private hostnames, usernames, local Mac paths, and device identifiers.
      - Watch build uses the OpenMates watchOS scheme and simulator destination.
    red_phase: { required: true, expected: fail, evidence: { status: missing_test, run_id: "", timestamp: "" } }
    green_phase: { required: true, expected: pass, evidence: { status: passed, run_id: "local-pytest", timestamp: "2026-07-06T21:43:30Z" } }
  - id: T-WATCH-BUILD
    type: build
    file: apple/OpenMates.xcodeproj/project.pbxproj
    command: python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    covers: [AC-9]
    assertions:
      - OpenMatesWatch target compiles for watchOS simulator.
      - Shared source used by Watch is free of unguarded UIKit/AppKit/PDFKit/QuickLook imports.
      - Watch target has independent-app configuration and required entitlements.
    red_phase: { required: true, expected: fail, evidence: { status: missing_test, run_id: "", timestamp: "" } }
    green_phase: { required: true, expected: pass, evidence: { status: passed, run_id: "remote-build-watch-7b662b3", timestamp: "2026-07-07T00:41:58Z" } }
  - id: T-WATCH-PAIR-LOGIN-UNIT
    type: unit
    file: apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    command: python3 scripts/apple_remote.py repo xcodebuild clean test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=iPhone 17" -only-testing OpenMatesTests/WatchPairLoginRuntimeTests
    covers: [AC-1]
    assertions:
      - Shared pair-login runtime PIN normalization uppercases, filters, and truncates Watch PIN input deterministically.
      - Shared pair-login runtime pair URL generation preserves the web app host and uppercases synthetic pair tokens.
      - Shared pair-login runtime backend failure strings map to typed Watch-visible failure states without logging real pair tokens, private emails, master keys, or reusable PINs.
      - Synthetic encrypted pair-login bundles decrypt through the same AES-GCM/PBKDF2 path and return expected bundle fields plus master key bytes.
      - Master keys save, load, and delete through the local Keychain path using redacted test user identifiers.
    red_phase: { required: true, expected: fail, evidence: { status: missing_test, run_id: "", timestamp: "" } }
    green_phase: { required: true, expected: pass, evidence: { status: passed, run_id: "remote-ios-xctest-watch-pair-login-runtime-5tests-193c954", timestamp: "2026-07-06T23:16:11Z" } }
  - id: T-WATCH-PAIR-LOGIN-UI
    type: unit
    file: apple/OpenMatesWatchUITests/WatchPairLoginUITests.swift
    command: python3 scripts/apple_remote.py test-watch --simulator "Apple Watch Series 11 (46mm)" --only-testing OpenMatesWatchUITests/WatchPairLoginUITests
    covers: [AC-1, AC-3]
    assertions:
      - Unauthenticated Watch app shows compact dark QR/PIN login states.
      - Expired, waiting, failed, and success states are accessible and do not leak private token values into screenshots.
      - No stock product chrome replaces OpenMates auth UI except OS-owned text input.
    red_phase: { required: true, expected: fail, evidence: { status: missing_test, run_id: "", timestamp: "" } }
    green_phase: { required: true, expected: pass, evidence: { status: "", run_id: "", timestamp: "" } }
  - id: T-WATCH-RUNTIME-UNIT
    type: unit
    file: apple/OpenMatesTests/WatchChatRuntimeTests.swift
    command: python3 scripts/apple_remote.py repo xcodebuild clean test -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination "platform=iOS Simulator,name=iPhone 17" -only-testing OpenMatesTests/WatchChatRuntimeTests
    covers: [AC-2]
    assertions:
      - Watch chat runtime loads cached chats before network refresh.
      - Watch chat runtime fetches recent chats directly from the backend API abstraction and persists a sorted JSON snapshot for cold/offline startup.
