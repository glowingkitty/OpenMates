implementation_plan:
  existing_patterns:
    - apple/OpenMates/Sources/Features/Auth/Views/PhonePairLoginView.swift
    - apple/OpenMates/Sources/Features/Auth/ViewModels/AuthManager.swift
    - apple/OpenMates/Sources/Core/Crypto/KeychainHelper.swift
    - apple/OpenMates/Sources/Core/Networking/APIClient.swift
    - apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedPreviewCard.swift
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedContentView.swift
    - apple/OpenMates/Sources/Core/Services/HandoffManager.swift
  architecture: >
    Add an independent watchOS target with thin Watch UI surfaces and move shared
    chat/auth/upload/embed runtime seams out of iOS/macOS-only views where needed.
    Watch screens should depend on platform-neutral services and models, while
    iOS/macOS keep their existing UI. The Watch target must compile without
    unguarded UIKit/AppKit/PDFKit/QuickLook dependencies and must keep all
    private keys local to the Watch install.
  data_flow:
    - Watch starts unauthenticated and initiates pair-login token/QR/PIN flow.
    - Another authenticated OpenMates device authorizes the token.
    - Watch completes pair login, decrypts pair bundle, stores session metadata and master key locally.
    - Watch opens WebSocket, requests phased sync, decrypts chat metadata/messages/embeds, and persists recent content offline.
    - Watch renders chat list/thread and compact embed previews from decrypted local state.
    - Watch text sends and manual audio sends use the same encrypted send/storage path as iOS.
    - Watch embed detail emits Handoff/universal-link/QR continuation payload for iPhone/Mac.
  affected_files:
    - path: apple/OpenMates.xcodeproj/project.pbxproj
      reason: Add watchOS app and test targets/schemes.
    - path: apple/OpenMatesWatch/**
      reason: New Watch app source, resources, entitlements, and tests.
    - path: apple/OpenMates/Sources/Core/**
      reason: Make selected core auth/network/crypto/sync services watchOS-compatible.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Extract shared upload/transcription/composer-embed and send runtime seams for Watch reuse.
    - path: apple/OpenMates/Sources/Features/Embeds/**
      reason: Add Watch-size preview variant and watchOS-safe renderers/fallbacks.
    - path: scripts/apple_remote.py
      reason: Add sanitized watchOS build/test commands for verification.
  verification_strategy:
    - Validate this spec before implementation.
    - Add remote tooling support first so watchOS builds/tests can be run.
    - Add unit tests for pair login, runtime sync, audio composer, offline queue, and embed mapping before product code.
    - Build the watchOS target on remote Mac after each slice.
    - Run targeted Watch UI tests for login, chat flow, audio composer, and embed previews.
    - Capture Watch screenshots for design review against the provided dark UI and embed preview references.
  verification_order:
    - Spec validation.
    - Remote watchOS tooling build smoke.
    - Watch unit tests for shared contracts.
    - Watch UI tests for user flows.
    - Design artifact review.
    - iOS build regression check because shared Apple core files are touched.

