id: apple-watch-support
title: Apple Watch Support
status: implementing

goal: >
  Add an independent Apple Watch app for OpenMates that logs in through the
  existing QR/PIN pair-login flow, syncs and caches chats directly, renders the
  regular OpenMates chat experience with Watch-adapted dark UI, supports compact
  unified embed previews, and lets users reply or start chats with text or audio
  while preserving the Apple app's client-side encryption and offline-sync
  guarantees.

scope:
  in:
    - New independent watchOS app target in the existing Apple project.
    - Watch QR/PIN pair-login as the only V1 authentication path.
    - Watch-local authenticated session state, Keychain-backed master key storage, chat-key loading, WebSocket phased sync, and offline persistence.
    - Dark Watch-native chat UI based on the provided design direction for login, chat list, chat detail, composer, and embed detail shells.
    - Recent chat list, chat opening, message transcript rendering, streaming status, text reply, text new-chat, audio reply, and audio new-chat flows.
    - Watch audio recording that uses the same native upload/transcribe/pending-embed behavior as iOS: transcript plus audio-recording embed are inserted into the composer and require manual send.
    - Separate Watch-size unified embed preview card variant with the same app/embed colors as existing embed previews and adapted width/height/typography for Apple Watch.
    - Full Watch preview support for website, web video, image, audio recording, code, PDF, maps/place, search result groups, travel stays/connections, shopping product, weather, and reminder embeds.
    - Watch embed detail/fullscreen shell that always presents Open on iPhone / Mac instead of rich fullscreen interactions on the Watch.
    - Handoff/universal-link/QR continuation for opening the current chat or embed on iPhone or Mac, with WatchConnectivity as optional paired-iPhone enhancement only.
    - Remote Mac verification support for watchOS build and targeted watchOS tests.
  out:
    - Native signup, password login, passkey login, recovery-key login, backup-code login, or billing on Watch in V1.
    - Stock watchOS UI rewrite using default product chrome instead of OpenMates primitives/tokens.
    - Fullscreen rich embed consumption on Watch beyond the continuation screen.
    - Editing/deleting/renaming/pinning/hiding chats from Watch.
    - File/photo/camera/sketch/map attachment creation from Watch in V1, except audio recording.
    - Apple Watch complications, widgets, notification reply flows, or Action Button shortcuts in the first implementation slice.
    - CloudKit, iCloud Keychain sync, or Apple cloud storage for OpenMates encryption keys.
    - Backend auth or encryption policy changes beyond minimal client metadata/device-info support if required for watchOS.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --search 'Apple Watch watchOS' --state all returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/frontend/native-apps.md
    - docs/architecture/apple/parity-matrix.md
    - docs/specs/apple-auth-security-parity/spec.yml
    - docs/specs/apple-durable-chat-persistence-parity/spec.yml
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - docs/specs/apple-unified-message-composer/spec.yml
    - apple/AGENTS.md
    - apple/CLAUDE.md
    - .claude/rules/apple-ui.md
    - "Apple Developer: Creating independent watchOS apps"
    - "Apple Developer: Transferring data with Watch Connectivity"
    - "Apple Developer: Implementing Handoff in Your App"
  code_patterns:
    - apple/OpenMates.xcodeproj/project.pbxproj currently has iOS, macOS, widget, notification service, share extension, and test targets but no watchOS target.
    - apple/OpenMates/Sources/Features/Auth/Views/PhonePairLoginView.swift already implements QR/PIN pair-login initiation, polling, PIN entry, and pair bundle decryption.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/AuthManager.swift stores sessions in App Group defaults and saves the master key through CryptoManager/KeychainHelper.
    - apple/OpenMates/Sources/Core/Crypto/KeychainHelper.swift uses local Keychain access groups with non-synchronizable, device-only storage.
    - apple/OpenMates/Sources/Core/Networking/APIClient.swift and WebSocketManager.swift provide URLSession HTTP/WebSocket clients with shared cookie storage and platform client headers.
    - apple/OpenMates/Sources/Core/Persistence/ChatStore.swift and OfflineSyncBridge.swift provide in-memory chat state, SwiftData-backed offline persistence, and queued offline actions.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift and ChatSendPipeline provide message loading, decryption, sending, streaming lifecycle, attachment upload, audio upload/transcription, and pending composer embed creation.
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedPreviewCard.swift, EmbedContentView.swift, and Features/Embeds/Renderers/*.swift provide unified native embed previews for iOS/macOS.
    - apple/OpenMates/Sources/Core/Services/HandoffManager.swift already advertises chat continuation activities for iPhone/iPad/Mac.
    - scripts/apple_remote.py currently supports build/test for iOS and macOS but not watchOS.
  tests:
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesUITests/EmbedRenderingParityUITests.swift

