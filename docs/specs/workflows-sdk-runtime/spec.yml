risks:
  - id: R-1
    risk: API-key scope enforcement for Workflow routes may be broader than the SDK docs imply.
    mitigation: Keep implementation on existing routes and add/extend tests only if an auth gap is discovered.
  - id: R-2
    risk: Run outputs may be unavailable when run_content_retention is none.
    mitigation: Document that SDK callers can inspect outputs only when the server retains content.
  - id: R-3
    risk: Existing dirty SDK files from concurrent sessions could be overwritten.
    mitigation: Re-read diffs before editing and make minimal patches around current code.

