contracts:
  api:
    - route: POST /v1/workflows/validate
      request: "{ source: string }"
      response: "{ validation: { draft_valid: boolean, enable_ready: boolean, diagnostics: array } }"
      sdk_methods: [workflows.validateYaml, workflows.validate_yaml]
    - route: POST /v1/workflows/yaml
      request: "{ source: string }"
      response: "{ workflow: WorkflowDetail, validation: WorkflowYamlValidation }"
      sdk_methods: [workflows.createFromYaml, workflows.create_from_yaml]
    - route: POST /v1/workflows/{workflow_id}/yaml
      request: "{ source: string }"
      response: "{ workflow: WorkflowDetail, validation: WorkflowYamlValidation }"
      sdk_methods: [workflows.updateFromYaml, workflows.update_from_yaml]
    - route: POST /v1/workflows/{workflow_id}/run
      request: "{ mode: manual|test, input: object } plus Idempotency-Key header"
      response: "{ run: WorkflowRunDetail }"
      sdk_methods: [workflows.run]
    - route: GET /v1/workflows/{workflow_id}/runs/{run_id}
      response: "{ run: WorkflowRunDetail with node_runs when retained }"
      sdk_methods: [workflows.runDetail, workflows.run_detail]
    - route: POST /v1/workflows/{workflow_id}/runs/{run_id}/cancel
      response: "{ run_id: string, status: cancellation_requested|cancelled }"
      sdk_methods: [workflows.cancelRun, workflows.cancel_run]
    - route: POST /v1/workflows/{workflow_id}/runs/{run_id}/respond
      request: "{ step_id: string, input: object }"
      response: "{ run: WorkflowRunDetail } or server response from existing route"
      sdk_methods: [workflows.respond, workflows.respond]
  data:
    - SDK methods pass opaque WorkflowDetail and WorkflowRunDetail objects through without client-side schema rewriting.
    - YAML source is not persisted locally by the SDK unless caller stores it.
  privacy_security:
    - SDK methods use API keys and approved SDK devices; they must not use CLI pair-session cookies.
    - SDK examples must not include secrets or real user identifiers.
    - Run outputs are visible only when the existing server route returns content for the authorized owner and retention mode.

