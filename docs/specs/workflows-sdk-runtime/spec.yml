implementation_plan:
  spec_path: docs/specs/workflows-sdk-runtime/spec.yml
  existing_patterns:
    - frontend/packages/openmates-cli/src/sdk.ts OpenMatesWorkflows facade methods
    - packages/openmates-python/openmates/sdk.py OpenMatesWorkflows facade methods
    - frontend/packages/openmates-cli/tests/sdk-workflows.test.ts local HTTP SDK transport contract
    - packages/openmates-python/tests/test_workflows.py monkeypatched requests SDK transport contract
    - scripts/audit_sdk_cli_parity.py deterministic CLI-to-SDK mapping audit
  architecture: >
    Add thin SDK facade methods over the existing Workflow routes. Do not add
    backend behavior or local YAML compilation; the server remains authoritative
    for YAML diagnostics and graph compilation.
  data_flow:
    - SDK caller provides YAML or graph data.
    - SDK sends the payload to the existing Workflow route with API-key auth.
    - Backend validates ownership, feature availability, API-key/device auth, YAML readiness, and runtime permissions.
    - SDK returns the existing WorkflowDetail or WorkflowRunDetail payload so callers can inspect run outputs.
  affected_files:
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK Workflow methods
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK Workflow methods
    - path: frontend/packages/openmates-cli/tests/sdk-workflows.test.ts
      reason: npm SDK Workflow contract tests
    - path: packages/openmates-python/tests/test_workflows.py
      reason: pip SDK Workflow contract tests
    - path: scripts/audit_sdk_cli_parity.py
      reason: deterministic parity guard
    - path: docs/user-guide/developers/sdk.md
      reason: public SDK examples
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/workflows-sdk-runtime/spec.yml
    - node --test --experimental-strip-types --loader ./tests/loader.mjs tests/sdk-workflows.test.ts
    - python3 -m pytest packages/openmates-python/tests/test_workflows.py
    - python3 scripts/audit_sdk_cli_parity.py
    - python3 scripts/spec_verify.py docs/specs/workflows-sdk-runtime/spec.yml
  verification_order:
    - Red npm SDK contract
    - Red pip SDK contract
    - Red parity audit
    - Implement npm SDK methods and tests
    - Implement pip SDK methods and tests
    - Update docs/examples
    - Run green npm, pip, audit, docs/static checks, and spec verification

