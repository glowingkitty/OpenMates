apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This spec changes npm and pip SDK facades plus docs/tests, not Apple UI.
    - Existing backend Workflow routes and Apple session behavior are not changed.
  verification:
    - Apple not affected unless implementation unexpectedly changes shared backend Workflow runtime behavior.
  intentional_native_differences:
    - Apple remains a native app client, not an API-key SDK client.

clarification:
  rounds:
    - question: Should Workflow SDK parity include only YAML authoring or also runtime management?
      answer: The SDK must also be able to run or modify workflows and see run outputs.
    - question: Are the proposed npm and pip examples for validate, create, update, run, output inspection, polling, and ask_for_user_input response acceptable?
      answer: Ok sounds good.
  vision_summary: >
    Developers should be able to automate the complete Workflow lifecycle from
    code. YAML is the ergonomic authoring path, graph APIs remain available for
    structured callers, and run detail must expose step outputs so SDK users can
    build automation around completed or waiting Workflow runs.
  approved_by_user: false

