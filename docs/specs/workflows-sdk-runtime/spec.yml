schema_version: 2
id: workflows-sdk-runtime
title: Workflows SDK Runtime
status: draft

parent_spec: docs/specs/workflows-cli-runtime/spec.yml

goal: >
  Let developers manage OpenMates Workflows from npm and pip with parity to the
  verified CLI Workflow runtime: validate YAML, create and modify workflows,
  enable or disable them, run them, inspect per-step run outputs, cancel runs,
  and resume runs waiting for user input through API-key SDK clients.

scope:
  in:
    - npm SDK Workflow methods for YAML validation, YAML create, YAML update, graph create/update, enable, disable, delete, run, run history, run detail, run cancel, and waiting-run response.
    - pip SDK Workflow methods with idiomatic snake_case equivalents for the same lifecycle.
    - SDK examples showing YAML and graph workflows, polling, output inspection, modification, rerun, cancellation, and ask_for_user_input response.
    - API-key authentication and approved SDK-device behavior through existing Workflow API routes.
    - Deterministic parity audit coverage so future Workflow CLI subcommands cannot drift from npm/pip SDKs.
    - Unit/contract tests proving npm and pip call the existing Workflow routes with the same payload semantics as the CLI.
  out:
    - New backend Workflow routes; this phase uses the existing /v1/workflows routes.
    - Web Workflow editor changes.
    - Apple Workflow UI parity.
    - Natural-language workflow authoring.
    - Workflow template sharing/import changes beyond existing SDK methods.
    - Connected-account app skills such as Mail or Calendar.
    - Browser-only SDK-device approval UI.

