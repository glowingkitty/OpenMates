  - id: D-2
    status: active
    decision: Keep graph create/update methods and add YAML methods alongside them.
    reason: Existing SDK tests and sdk-cli-parity-v1 already cover graph-level Workflow APIs; YAML is the missing CLI authoring parity surface.
