scenarios:
  - id: S-1
    title: Developer validates and creates a Workflow from YAML
    given:
      - Alice has an approved SDK API key.
      - The SDK caller has a YAML Workflow with a manual trigger, weather forecast step, and notification step.
    when:
      - The caller validates the YAML and creates the Workflow through npm or pip.
    then:
      - The SDK posts the YAML source to the authoritative server validation endpoint.
      - Invalid drafts return diagnostics without persistence.
      - Valid drafts create a disabled Workflow with validation metadata.
      - npm uses validateYaml and createFromYaml.
      - pip uses validate_yaml and create_from_yaml.

  - id: S-2
    title: Developer modifies an existing Workflow
    given:
      - Alice has an existing Workflow created through YAML or graph SDK APIs.
    when:
      - The caller changes the YAML source or graph and updates the Workflow.
    then:
      - YAML updates call the server YAML update route and return workflow plus validation.
      - Graph updates keep existing SDK update semantics.
      - Updating an enabled Workflow with incomplete YAML returns the server's enable-readiness conflict.

  - id: S-3
    title: Developer runs a Workflow and reads step outputs
    given:
      - Alice has an enabled Workflow with run_content_retention that preserves outputs.
    when:
      - The caller runs the Workflow with a stable idempotency key and polls run detail.
    then:
      - The SDK sends the same mode, input, and Idempotency-Key contract as the CLI.
      - The caller can list runs and inspect a single run.
      - Run detail exposes node_runs including node id, status, output, error, and credits when retained by the server.

  - id: S-4
    title: Developer cancels or resumes a waiting Workflow run
    given:
      - A Workflow run is waiting at an ask_for_user_input step.
    when:
      - The caller either cancels the run or responds to the waiting step through npm or pip.
    then:
      - Cancellation calls the existing run cancel route and returns cancellation_requested or cancelled.
      - Response calls the existing run response route with step id and input.
      - The run can complete after the SDK response is accepted.

  - id: S-5
    title: SDK parity stays aligned with CLI Workflow commands
    given:
      - The CLI exposes Workflow lifecycle and YAML commands.
    when:
      - The parity audit runs.
    then:
      - YAML validate/create/update, lifecycle, run, output inspection, cancellation, and response commands map to npm and pip SDK methods.
      - Missing mappings fail the deterministic audit.
      - Public SDK docs include examples for complete Workflow lifecycle automation.

