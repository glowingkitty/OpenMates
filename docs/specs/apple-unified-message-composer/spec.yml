id: apple-unified-message-composer
title: Apple Unified Message Composer
status: implementing

goal: >
  Replace the Apple app's duplicated message composer UIs with one shared native
  MessageComposerView that matches the rendered web MessageInput.svelte and
  ActionButtons.svelte design. The main app, macOS menu bar quick capture, and
  share extension should differ only through thin host containers and injected
  capabilities, not through separately styled message input fields.

scope:
  in:
    - A single native message composer component used by the main Apple chat/new-chat surfaces, macOS menu bar quick capture, and Apple share extension surfaces where SwiftUI hosting is available.
    - Three thin host containers that adapt outer width, destination selection, status lists, and extension-specific attachment intake without forking the composer UI.
    - Rendered-web parity for the message field dimensions, max width, background color, corner radii, shadow, compact/expanded behavior, action row placement, and primary-gradient icon styling.
    - Shared native action row behavior for files, maps/location, sketch, camera where available, record, send, signup/send policy, and unavailable-capability hiding.
    - Shared native composer state for focused/compact state, PII warning/highlight strips, pending embeds, queued message indicator, record hint, recording overlay entry point, and stable accessibility identifiers.
    - Apple UI and unit tests proving one composer contract across main chat, welcome/new-chat, menu bar quick capture, and share extension/debug preview states.
    - Remote Mac build and targeted simulator UI test verification.
  out:
    - Rewriting chat sending, encryption, WebSocket sync, or background send pipelines beyond the adapters needed to connect them to the shared composer callbacks.
    - Replacing OS-owned file, photo, camera, microphone permission, or share controllers.
    - Pixel-perfect screenshot failure gates as the only source of truth; deterministic geometry/style assertions and screenshots are both required.
    - Functional Projects, Plans, Tasks, or Workflows quick-capture destinations.
    - Redesigning the web composer.
    - TestFlight deployment as part of this spec.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'Apple composer message input quick capture parity' returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - .claude/rules/apple-ui.md
    - apple/AGENTS.md
    - apple/CLAUDE.md
    - docs/architecture/apple/parity-matrix.md
    - docs/architecture/messaging/message-input-field.md
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/specs/macos-menu-bar-quick-capture/spec.yml
    - docs/specs/apple-chat-opening-parity/spec.yml
    - docs/specs/apple-pii-detection-web-parity/spec.yml
  code_patterns:
    - frontend/packages/ui/src/components/ActiveChat.svelte caps message input children at max-width 629px and owns composer placement.
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte owns field states, overlays, PII, pending embeds, queued messages, and action button visibility.
    - frontend/packages/ui/src/components/enter_message/MessageInput.styles.css defines `.message-field` background, radius, min-height, padding, shadow, compact, inline-compact, fullscreen, queued indicators, and focus/incognito pills.
    - frontend/packages/ui/src/components/enter_message/ActionButtons.svelte defines action row order, spacing, send button, press-and-hold hint, and icon classes.
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift defines OMMessageInputField, a visual primitive used by some but not all native composer paths.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift builds the main chat composer via inline `inputField`, `inputBar`, `exampleChatInputRow`, and action buttons.
    - apple/OpenMates/Sources/App/MainAppView.swift builds `WelcomeComposer`, a separate new-chat composer using OMMessageInputField with duplicated action-row logic.
    - apple/OpenMates/Sources/App/OpenMatesApp.swift builds `MacMenuBarQuickCaptureView.composer`, a bespoke quick-capture composer not using OMMessageInputField.
    - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewGalleryView.swift has a debug quick-capture composer mock with duplicated identifiers.
    - apple/OpenMates/Sources/Features/Chat/Views/InputActionButtons.swift is an unused intended counterpart to ActionButtons.svelte.
  tests:
