      - production Apple chat, quick-capture, and share-extension composer surfaces reference MessageComposerView or an approved host adapter
      - no new product composer TextField/TextEditor implementation is added outside MessageComposerView without an explicit allowlist reason
      - quick-capture-specific identifiers are wrapper aliases, not separate composer fields
