assumptions:
  - id: A-1
    text: The existing foreground send, background quick-capture send, and share-extension send pipelines can remain separate behind callbacks while sharing the same visible composer component.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
        summary: Current composer already calls view-model methods via local callbacks and can pass equivalent callbacks to a shared component.
      - source: apple/OpenMates/Sources/App/OpenMatesApp.swift
        summary: Quick capture has destination/status concerns outside its bespoke TextField composer, making it a host-container candidate.
  - id: A-2
    text: Browser-computed message input metrics can be captured or manually recorded before implementation so Apple constants are grounded in rendered web output.
    category: testing
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/specs/apple-ui-contracts/spec.yml
        summary: Existing Apple UI contracts spec defines a rendered-web contract pipeline for message input states.

contracts:
  api:
    - No product API route changes are required.
    - Existing send pipelines are invoked through host callbacks such as `onSend`, `onAttachFile`, `onRecord`, `onOpenMaps`, and `onOpenAuth`.
  data:
    - MessageComposerView receives a value-style state model containing text, focus state, pending embeds, active PII matches, queued message text, record permission state, enabled capabilities, and send policy.
    - Host containers own destination selection, selected chat id, background status rows, extension-provided shared items, and pipeline-specific send execution.
    - Shared identifiers include `message-composer`, `message-field`, `message-editor`, `action-buttons`, `attach-files-button`, `record-audio-button`, and `send-button`.
    - Surface-specific aliases such as `quick-capture-composer` may be retained on host wrappers, but not as a separate field implementation.
  ui_states:
    - Main chat default, focused, and content-with-send states.
    - New-chat collapsed inline-compact and focused expanded states.
    - Main app large-width state proving max-width cap.
    - Quick capture compact popover state with destination chips outside composer.
    - Share extension state with pending shared attachment and optional instruction field.
    - PII warning and highlight strip state.
    - Pending embed state.
    - Record short-tap hint and recording overlay entry state.
  privacy_security:
    - Tests use synthetic prompts and fixtures only; no private messages, private chat ids, credentials, hostnames, IP addresses, or device names are committed.
    - Composer debug metrics expose sizes, booleans, and component mode only; they must not expose message content.
    - Share-extension and quick-capture tests must not log raw shared-file private paths.
  accessibility:
    - Shared identifiers should match web data-testid names when the product concept is the same.
    - Native accessibility labels must remain localized through AppStrings or existing localization accessors.
    - Hidden unavailable capabilities must not leave dead focusable controls.

