implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte
    - frontend/packages/ui/src/components/enter_message/MessageInput.styles.css
    - frontend/packages/ui/src/components/enter_message/ActionButtons.svelte
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/App/OpenMatesApp.swift
  architecture: >
    Add a shared SwiftUI MessageComposerView with a small configuration/state
    model and action callbacks. Main app, quick capture, and share extension
    become host containers that own destination/pipeline concerns and size the
    composer, while the shared component owns field visuals, action row, PII,
    pending embeds, record hint, queued state, and identifiers.
  data_flow:
    - Host creates MessageComposerState from local text/focus/pending embed/PII/send policy state.
    - Host creates MessageComposerCapabilities for available actions in that surface.
    - MessageComposerView renders the web-matched field and action row.
    - User actions call host-provided callbacks without the composer knowing the pipeline implementation.
    - Host send pipeline clears or updates state after successful send, failure, or queued processing.
  affected_files:
