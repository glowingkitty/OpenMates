  parity_expectations:
    - The rendered web app remains the visual source of truth; source CSS is used to identify values, but final native values should be checked against browser-computed evidence where available.
    - The native composer field must match web `.message-field`: grey-blue background, 24px expanded radius, 100px expanded min height, 60px bottom padding for actions, no border/focus ring, 0 4px 12px rgba(0,0,0,0.08) shadow, and inline-compact 48px pill state where applicable.
    - Main app host containers must cap the composer at the web `629px` contract instead of stretching full width on large iPad/macOS-style surfaces.
    - Action icons must use the same visual treatment as the web icon masks, including primary-gradient coloring where the current product web UI renders gradient icons.
    - Menu bar and share-extension hosts may use narrower outer containers, but the field, icons, action row, pending embeds, PII banners, and send button must come from the same component contract.
