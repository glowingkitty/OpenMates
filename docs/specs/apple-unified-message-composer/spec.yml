  intentional_native_differences:
    - OS-owned file/photo/camera/microphone/share permission flows remain native and can be injected as callbacks.
    - The menu bar quick-capture host does not render full chat history; destination strip and status list remain outside the composer.
    - Share extensions may receive pre-existing attachments from the OS before rendering the composer, but pending attachment display inside the composer must use the shared pending-embed strip.

clarification:
  rounds:
    - question: Should the first implementation include all Apple composer-like surfaces or only the in-app chat/new-chat quick-action surfaces?
      answer: >
        The relevant Apple composer surfaces are the main app composer, the menu
        bar composer, and the share extension composer.
    - question: Should the unified solution share only visual UI or also composer state/actions logic?
      answer: >
        The preferred direction is one unified message input component, with only
        the surrounding container size adapted for the three use cases.
    - question: Should web message input styling, including gradient icons, be part of the contract?
      answer: >
        Yes. The native composer must match the web app message input field
        styles, including the color gradient of the icons.
  vision_summary: >
    Build one native composer component that owns the message input UI and shared
    composer state. Main app, menu bar quick capture, and share extension should
    host that component in differently sized containers and connect their own
    destination/send plumbing through callbacks. The UI must match the rendered
    web message input design, including capped main-app width and gradient icon
    styling.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Main app chat composer uses the unified component
    given:
      - The Apple app is displaying a normal chat in a large iPad or macOS-style viewport.
      - The web message input contract caps the composer content at 629px inside the chat input container.
    when:
      - The user focuses the message editor.
    then:
      - The visible field comes from the shared MessageComposerView.
      - The field is centered and capped instead of spanning the whole chat card.
      - The expanded field styling matches web `.message-field`, including grey-blue background, 24px radius, shadow, action row padding, and no native focus ring.
      - The action icons render with the web-matched primary gradient treatment.

  - id: S-2
    title: New-chat and quick-action ask flows use the same composer
    given:
      - The Apple app opens the new-chat welcome surface from cold boot, the Dock/shortcut ask action, or the in-app New Chat control.
    when:
      - The user focuses the new-chat editor or selects a suggestion.
    then:
      - The new-chat surface hosts the same MessageComposerView used by normal chat.
      - Suggestions, welcome cards, and inspiration content remain host-owned and outside the composer.
      - PII warnings, pending embeds, send button, record hint, and action row behavior match normal chat where capabilities are enabled.
      - The collapsed and expanded states match web inline-compact and expanded field behavior.

  - id: S-3
    title: macOS menu bar quick capture uses the same composer in a compact host
    given:
      - The user opens the macOS menu bar quick capture popover.
      - The Chats tab is selected with New Chat as the default destination.
    when:
      - The user types, records, or attaches a file.
    then:
      - The popover uses MessageComposerView for the field, action row, pending embeds, and send affordance.
      - Destination chips and background status list remain outside the composer.
      - Unsupported capabilities are hidden through composer configuration rather than by forking layout.
      - Quick-capture-specific identifiers are preserved as aliases only where tests need them; shared identifiers remain available.

  - id: S-4
    title: Share extension uses the same composer for optional instructions
    given:
      - The user invokes an Apple share extension with an image, PDF, URL, text, or supported file.
    when:
      - The share extension asks for an optional instruction before sending.
    then:
      - The instruction field and pending attachment display use MessageComposerView.
      - OS-provided shared items are normalized into the shared pending-embed/pending-attachment display model.
      - Extension-specific destination selection and send pipeline remain outside the composer.
      - The UI does not use stock native text-field styling for the composer.

  - id: S-5
    title: One action-row contract covers enabled and unavailable capabilities
    given:
      - Different hosts expose different capabilities such as camera, sketch, maps, files, audio, signup, or send.
    when:
      - The composer renders in each host.
    then:
      - Available actions appear in the web-defined order and spacing.
      - Unavailable actions are hidden or disabled by declarative capability configuration.
      - The send button appears only when content or pending embeds can be sent.
      - The record hint and recording overlay entry point match the web ActionButtons and RecordAudio contract.

  - id: S-6
    title: Tests prevent composer forks from returning
    given:
      - Future changes touch Apple composer surfaces.
    when:
      - Static audits and targeted XCUITests run.
    then:
      - Adding a new product message input without MessageComposerView fails or is flagged.
      - Main app, menu bar, and share extension UI tests all verify the shared composer identifiers and visual metrics.
      - Screenshots are attached for review, but deterministic geometry/style checks catch the full-width regression automatically.

