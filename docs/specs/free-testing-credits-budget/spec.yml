risks:
  - Concurrent signups can overspend the budget unless the backend grant path uses a transactional reservation or equivalent lock.
  - Granting credits after account creation but before signup completion can create inconsistent state if one update succeeds and the other fails; idempotent retry and clear logging are required.
  - Public server-status must not leak exact remaining promotional budget.
  - Removing legacy signup payment components may affect tests or dormant deep links that still reference credits/payment steps.
  - Admin exhausted email could spam without an exhausted_email_sent_at guard tied to budget configuration changes.
  - Local device promo hiding is intentionally soft friction; users can clear browser storage, so backend grant idempotency remains the authoritative abuse control.

open_questions:
  - Should changing total_budget_credits after exhaustion reset exhausted_email_sent_at automatically, or only when the budget transitions from exhausted to active?
