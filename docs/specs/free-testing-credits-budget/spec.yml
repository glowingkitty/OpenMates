implementation_plan:
  existing_patterns:
    - Use backend/core/api/app/routes/admin.py for admin-only /v1/admin routes and require_admin.
    - Use backend/core/api/app/routes/settings.py server-status for safe public signup metadata.
    - Use existing encrypted credit balance update patterns from payments.py and auth_gift.py.
    - Use user_notification WebSocket handling for in-app translated user grant notification.
    - Use email_tasks with EmailTemplateService for admin exhausted email.
    - Use settings/elements components for new Server settings UI.
  architecture: >
    Add a small backend service for Free testing budget reads, admin writes, and
    idempotent signup grant attempts. The service owns budget availability,
    concurrency protection, user credit encryption, cache refresh, WebSocket
    user_credits_updated broadcast, user notification broadcast, stats updates,
    and exhausted-email enqueueing. Frontend signup only consumes safe public
    promotion metadata and never calculates remaining budget itself.
    The browser stores a first-party local marker after a successful grant or when
    an authenticated account response reports an existing grant; signup promo
    display checks that marker before rendering Free credits for testing.
  data_flow:
    - Admin saves budget in Server settings through an admin-only endpoint.
    - Public server-status returns active promotion metadata when remaining budget covers a full grant.
    - Signup basics renders Free credits for testing only from active public metadata.
    - Signup completion calls backend grant path after account creation/session setup.
    - Grant path atomically reserves budget, encrypts the new user credit balance, updates cache, broadcasts credit update and notification, and queues exhausted email if needed.
    - Frontend observes the grant notification or authenticated user marker and sets a local device flag so the same browser no longer advertises the promotion.
  affected_files:
    - path: backend/core/directus/schemas/free_testing_credits_budget.yml
      reason: Persistent server-level budget state or equivalent singleton schema.
    - path: backend/core/directus/schemas/free_testing_credit_grants.yml
      reason: Per-user idempotency ledger if not stored on directus_users.
    - path: backend/core/api/app/services/free_testing_credits_service.py
      reason: Central budget and grant logic.
    - path: backend/core/api/app/schemas/user.py
      reason: Authenticated account-level Free testing grant marker.
    - path: backend/core/api/app/routes/auth_routes/auth_login.py
      reason: Populate account-level grant marker on login responses.
    - path: backend/core/api/app/routes/auth_routes/auth_session.py
      reason: Populate account-level grant marker on session responses.
    - path: backend/core/api/app/routes/admin.py
      reason: Admin budget endpoints.
    - path: backend/core/api/app/routes/settings.py
      reason: Safe public promotion metadata in server-status.
    - path: backend/core/api/app/routes/auth_routes/auth_password.py
      reason: Password signup completion grant hook.
    - path: backend/core/api/app/routes/auth_routes/auth_passkey.py
      reason: Passkey signup completion grant hook.
    - path: frontend/packages/ui/src/components/signup/signupFlow.ts
      reason: Remove legacy payment/credits step assumptions from active signup sequence.
    - path: frontend/packages/ui/src/components/signup/Signup.svelte
      reason: Remove legacy signup payment/credits handling and wire grant notification behavior if needed.
    - path: frontend/packages/ui/src/components/signup/steps/basics/Basics.svelte
      reason: Dynamic advantage text.
    - path: frontend/packages/ui/src/stores/serverStatusStore.ts
      reason: Safe promotion metadata and first-party local promo hiding flag.
    - path: frontend/packages/ui/src/stores/authLoginLogoutActions.ts
      reason: Sync local promo hiding flag from authenticated login response.
    - path: frontend/packages/ui/src/stores/authSessionActions.ts
      reason: Sync local promo hiding flag from authenticated session response.
    - path: frontend/packages/ui/src/services/chatSyncServiceHandlersAppSettings.ts
      reason: Sync local promo hiding flag from grant notification event.
    - path: frontend/packages/ui/src/components/settings/SettingsServer.svelte
      reason: Add Free testing budget entry.
    - path: frontend/packages/ui/src/components/settings/server/SettingsFreeTestingBudget.svelte
      reason: New admin settings page.
    - path: frontend/packages/ui/src/components/settings/settingsRoutes.ts
