id: free-testing-credits-budget
title: Free Testing Credits Budget
status: implementing

goal: >
  Let server admins configure a finite Free testing credit budget from the
  admin-only Server settings area. While enough budget remains for a full grant,
  signup presents Free credits for testing instead of Pay per use, and each newly
  completed signup receives translated in-app notification copy plus encrypted
  credits automatically.

scope:
  in:
    - Admin-only Server settings UI for configuring total Free testing budget and per-user grant amount.
    - Public server-status metadata that tells signup whether the Free testing promotion is active.
    - Signup basics-page advantage text changes from Pay per use to Free credits for testing only while a full grant is available.
    - Automatic post-signup grant of the configured per-user credit amount to newly completed users.
    - User-visible translated notification text You received {credits} free credits for testing.
    - Budget accounting that increments used credits once per eligible completed signup and never overspends.
    - Admin visibility into total budget, used credits, remaining credits, grant amount, active/exhausted state, and exhausted notification state.
    - One admin email when the promotion transitions from active to exhausted.
    - Cleanup of legacy signup payment and credits step code so payment purchase flows remain only in Settings.
    - Privacy-preserving device/account promo hiding after the current browser or authenticated account has already received a Free testing grant.
  out:
    - Changing regular Settings > Billing purchase, gift-card, refund, referral, or auto-top-up behavior.
    - Changing alpha disclaimer copy or layout.
    - Partial grants when remaining budget is below the per-user grant amount.
    - Retroactively granting credits to existing users.
    - Per-invite, per-domain, or per-user-segment promotional budgets.
    - IP hashing, device fingerprinting, or email-claim limits for promotional abuse prevention.
    - Apple-specific signup or StoreKit UI changes.

