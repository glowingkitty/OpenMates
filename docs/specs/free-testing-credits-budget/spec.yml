apple_impact:
  affected_files:
    - none
  parity_expectations:
    - The first implementation is web signup copy, web admin Server settings, backend credit grant logic, and web translations.
    - Apple StoreKit, Apple billing screens, and Apple signup UI are not changed in this slice.
    - Backend credit balances remain compatible with Apple because the same encrypted user credit balance is updated.
  verification:
    - Apple not affected for UI parity.
  intentional_native_differences:
    - Free testing promotion management is web/admin-only, matching existing Server settings behavior.

clarification:
  rounds:
    - question: Should the active promo UI replace only the basics-page advantage text Pay per use with Free credits for testing, while leaving the alpha disclaimer page unchanged?
      answer: Yes. Replace the Pay per use advantage text on signup basics with Free credits for testing. Leave the alpha disclaimer unchanged.
    - question: Should the user notification include the specific amount as translated variable text?
      answer: Yes. Use translated copy You received {credits} free credits for testing with the credit count as a variable so the grant amount can change later.
    - question: Should legacy signup payment and credits code be cleaned up now that payments remain only in Settings?
      answer: Yes. Remove legacy payment and credits parts from signup. Payment remains only in the Settings menu.
  vision_summary: >
    Current signup finishes directly after account security setup and no longer
    asks for payment. The new feature should advertise Free credits for testing
    only in the basics-page advantages list while the admin budget can cover a
    full grant, then grant encrypted credits once per completed signup and notify
    both the user in-app and the admin by email when the budget is exhausted.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Admin configures a Free testing budget
    given:
      - Alice is an authenticated server admin.
      - The Free testing budget is disabled or empty.
    when:
      - Alice opens Server settings and sets total budget to 50000 credits and per-user grant to 1000 credits.
    then:
      - Server settings saves the configuration.
      - Server settings shows total budget 50000, used 0, remaining 50000, grant amount 1000, and active state.
      - Non-admin users cannot read or change the budget management endpoint.
  - id: S-2
    title: Signup advertises free testing credits while a full grant is available
    given:
      - The Free testing budget total is 50000 credits.
      - The used budget is 49000 credits.
      - The per-user grant is 1000 credits.
    when:
      - Bob opens the signup basics page.
    then:
      - The advantages list shows Free credits for testing.
      - The alpha disclaimer copy remains unchanged.
      - The signup flow still proceeds directly from account security setup to completion.
  - id: S-3
    title: New completed signup receives free testing credits
    given:
      - The Free testing budget has at least 1000 remaining credits.
      - Bob creates a new account and completes signup.
    when:
      - Signup reaches the existing completion path and lands Bob in the app.
    then:
      - Bob's encrypted credit balance increases by 1000 credits.
      - The budget used amount increases by 1000 credits.
      - Bob receives a success notification saying You received 1000 free credits for testing.
      - Bob receives the grant only once, even if signup completion is retried or the page reloads.
  - id: S-4
    title: Signup falls back when not enough budget remains
    given:
      - The Free testing budget total is 50000 credits.
      - The used budget is 49500 credits.
      - The per-user grant is 1000 credits.
    when:
      - Clara opens the signup basics page and completes signup.
    then:
      - The advantages list shows Pay per use.
      - Clara receives no free-testing grant.
      - The remaining 500 credits are not partially granted.
  - id: S-5
    title: Admin receives one budget exhausted email
    given:
      - The Free testing budget has exactly 1000 remaining credits.
      - No exhausted email has been sent for the current budget configuration.
    when:
      - The next completed signup receives the final 1000-credit grant.
    then:
      - The budget becomes exhausted.
      - One email is queued to SERVER_OWNER_EMAIL or ADMIN_NOTIFY_EMAIL.
      - Server settings records that the exhausted email was sent.
      - Rechecking status or retrying signup completion does not send duplicate exhausted emails.
  - id: S-6
    title: Legacy signup payment and credits paths are removed
    given:
      - Payment flows now belong only to Settings.
    when:
      - A user signs up with password or passkey.
    then:
      - Signup step ordering contains no credits, payment, or auto-top-up purchase step.
      - Signup components no longer import or render legacy signup payment/credits content.
      - Settings > Billing purchase, gift-card redemption, and bank-transfer flows remain unchanged.
  - id: S-7
    title: Device hides promotion after receiving a Free testing grant
    given:
      - The Free testing promotion is active.
      - A browser session completes signup and receives the Free testing grant.
    when:
      - The same browser returns to the signup basics page or logs in to an account that already has a Free testing grant.
    then:
      - The browser stores a first-party local marker that the grant was received.
      - Signup basics shows Pay per use instead of Free credits for testing on that browser.
      - Clearing browser storage can clear the local marker, but the backend grant ledger remains authoritative and still prevents duplicate grants.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Admins can create, update, disable, and view a persistent Free testing credit budget from Server settings, including total, used, remaining, per-user grant, active, and exhausted-email status.
  - id: AC-2
    scenario: S-1
    text: Non-admin users and unauthenticated callers cannot read or write admin budget management endpoints.
  - id: AC-3
    scenario: S-2
    text: Public server status exposes only safe promotion metadata needed by signup, including whether a full free-testing grant is currently available and the per-user grant amount.
  - id: AC-4
    scenario: S-2
    text: Signup basics advantage text uses Free credits for testing while promotion metadata is active and falls back to Pay per use otherwise; alpha disclaimer copy is unchanged.
  - id: AC-5
    scenario: S-3
    text: A newly completed signup receives the configured grant once, stored in the existing encrypted credit balance and reflected in cache and user_credits_updated behavior.
  - id: AC-6
    scenario: S-3
    text: The free-testing grant decrements remaining budget by incrementing used credits exactly once per granted signup and cannot overspend under concurrent signups.
  - id: AC-7
    scenario: S-3
    text: The user receives translated notification copy with a credits variable after a successful free-testing grant.
  - id: AC-8
    scenario: S-4
    text: If remaining budget is less than the per-user grant, signup shows Pay per use, no partial grant is made, and no user notification is sent.
  - id: AC-9
    scenario: S-5
    text: When the budget transitions to exhausted, one admin email is queued and duplicate emails are prevented until an admin changes or resets the budget configuration.
  - id: AC-10
    scenario: S-6
    text: Legacy signup credits/payment/auto-top-up purchase steps are removed from the active signup code without regressing Settings billing flows.
  - id: AC-11
    scenario: S-7
    text: Authenticated user/session responses expose only a boolean has_free_testing_credits_grant marker derived from the grant ledger, and the frontend persists a first-party local device flag when that marker or the grant notification is observed.
  - id: AC-12
    scenario: S-7
    text: Signup promotion display is gated by both safe public promotion metadata and the local device flag, without adding IP hashes, fingerprints, or email-claim tracking.

contracts:
  api:
    - route: GET /v1/settings/server-status
      response: "{ payment_enabled?, is_self_hosted, is_development, server_edition, domain, ai_models_configured, free_testing_credits?: { active: boolean, grant_credits: number } }"
      notes:
        - Public response must not expose total budget, used budget, remaining exact amount, admin email state, or internal IDs.
        - active is true only when remaining_credits >= grant_credits and grant_credits > 0.
    - route: GET /v1/admin/free-testing-credits-budget
      auth: admin only
      response: "{ enabled, total_budget_credits, used_budget_credits, remaining_budget_credits, per_user_grant_credits, active, exhausted, exhausted_email_sent_at, updated_at }"
    - route: PUT /v1/admin/free-testing-credits-budget
      auth: admin only
      request: "{ enabled: boolean, total_budget_credits: number, per_user_grant_credits: number }"
      response: "same as GET"
      validation:
        - total_budget_credits >= 0
        - per_user_grant_credits >= 1 when enabled is true
        - total_budget_credits cannot be set below used_budget_credits unless the request explicitly disables or resets the budget according to the final implementation contract.
    - route: internal signup completion grant path
      notes:
        - Called from existing signup completion paths after a new user is authenticated and before or during the /chat/new completion transition.
        - Must be idempotent per user.
    - route: authenticated user/session responses
      response_delta: "{ user: { has_free_testing_credits_grant: boolean } }"
      notes:
        - Marker is derived from the existing Free testing grant ledger.
        - Response must not expose grant IDs, user hashes, budget totals, remaining budget, or device identifiers.
  data:
    - Add persistent server-level Free testing budget state, likely a singleton Directus collection or equivalent server settings table.
    - Store total_budget_credits, used_budget_credits, per_user_grant_credits, enabled, exhausted_email_sent_at, created_at, updated_at, and updated_by_admin_user_id.
    - Store a per-user marker for free-testing grant idempotency, either on directus_users or a grant ledger keyed by user_id_hash.
    - Derive account-level promo hiding from the grant ledger; do not add a separate persistent user field unless future requirements need it.
    - User credit balance continues to use encrypted_credit_balance encrypted with the user's vault key.
    - Budget reservation and user credit update must be transactional enough to prevent overspending and duplicate grants during concurrent signups.
    - Free testing credits are promotional grants and must not increment credits_sold.
    - Free testing credits should use separate stats fields such as free_testing_credits_granted and free_testing_grants_created if grant analytics are needed.
  ui_states:
    - Signup basics advantage text shows Free credits for testing only when server status says the promotion is active.
    - Signup basics advantage text falls back to signup.advantage_pay_per_use on server-status error, disabled budget, exhausted budget, insufficient remaining budget, or a local device flag showing this browser/account already received the promotion.
    - Admin Server settings shows loading, saved, validation error, disabled, active, exhausted, and email-sent states.
    - User grant notification uses translated string signup.free_testing_credits_received with {credits} replacement.
    - Local device flag is first-party localStorage only and is not cleared by logout.
  privacy_security:
    - Public status exposes only whether the promotion is active and the grant amount.
    - Admin endpoints require the existing require_admin dependency.
    - No plaintext user emails, user IDs, or private signup data are written to logs or specs.
    - Grant ledger uses user_id_hash if a separate collection is introduced.
    - Admin exhausted email contains aggregate budget numbers only, not recipient user data.
    - Device/account promo hiding uses an account boolean derived from the grant ledger and a first-party browser flag; no IP hashes, fingerprint-derived identifiers, or email-claim hashes are introduced.
  i18n:
    - Add signup.advantage_free_testing_credits with English Free credits for testing and translated placeholders for other locales if not human-verified.
    - Add signup.free_testing_credits_received with English You received {credits} free credits for testing.
    - Add settings.server.free_testing_* keys for admin Server settings UI labels, helper text, success, validation, active, disabled, exhausted, and email-sent states.
    - Rebuild generated locale JSON from YAML sources.

