schema_version: 2
id: apple-chat-history-full-parity
title: Apple Chat History And Embed Full Web Parity
status: implementing

goal: >
  Make stable and restored chat history in the Apple app match the rendered web
  product across iPhone, iPad, and macOS. Apple must preserve the web message
  document's semantic order, identity, rich text, citations, media, app-skill
  groups, system states, banner, layout, interactions, accessibility, and
  composer clearance. Every embed type and app-skill variant registered by the
  web app must have dedicated native preview and fullscreen rendering; known
  web-supported types may not pass parity through a generic fallback.

scope:
  in:
    - Stable, completed, loaded, restored, shared, public, example, and cold-boot Apple chat-history rendering.
    - User, assistant, and system message roles plus sender name, mate category, model identity, thinking summary, PII display state, and message actions.
    - A canonical native ordered render document for web-supported markdown, Tiptap semantic nodes, inline entities, mentions, source quotes, embed references, app-skill groups, and system content.
    - Authoritative embed deduplication, parent-child relationship resolution, ownership, ordering, decryption state, and message association.
    - Dedicated web and Apple preview and fullscreen rendering for every current product embed registry key and app-skill variant; a missing web baseline surface must be implemented before Apple parity can pass.
    - A complete generated surface manifest covering registry entries, app-skill variants, showcase-only inline/quote replicas, grouped variants, status variants, platforms, and color schemes.
    - Inline, compact, large, grouped, processing, finished, empty, unavailable, and error embed states where the web product exposes them.
    - Sent audio recording preview and fullscreen behavior, including playback, duration normalization, transcript selection, model/status information, and unavailable states.
    - Verified source quote rendering, source identity, fullscreen navigation, and quote highlighting.
    - Chat banner/header states, mate profile identity, message bubble geometry, responsive transcript layout, composer and keyboard clearance, RTL behavior, Reduce Motion, and accessibility.
    - Browser-computed contracts and paired web/native screenshots in light and dark modes for iPhone, iPad, and macOS-equivalent layouts.
    - Deterministic registry, fixture, dispatch, identifier, fallback, artifact, and unresolved-visual-drift audits.
  out:
    - Active send, WebSocket event reduction, cancellation, and streaming lifecycle ownership already governed by `docs/specs/apple-chat-streaming-parity/spec.yml`, except the completed-turn handoff into stable history.
    - Bounded history pagination and initial large-chat performance already governed by `docs/specs/apple-chat-opening-parity/spec.yml`, except preserving render-document and embed relationship integrity across loading.
    - Composer editing semantics governed by `docs/specs/apple-tiptap-webview-composer/spec.yml` and native composer specs.
    - watchOS chat-history parity.
    - Replacing native chat history with a WebView.
    - Rewriting the complete app shell or transcript in UIKit/AppKit without measured SwiftUI performance evidence.
    - Exact screenshot pixel hashes as the visual completion authority.
    - Backend provider calls or private user content in committed fixtures.

