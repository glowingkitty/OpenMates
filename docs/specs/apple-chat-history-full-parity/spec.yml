scenarios:
  - id: S-1
    title: A restored mixed-content turn preserves web document order and identity
    given:
      - A completed chat contains a user audio message and an assistant response with mate identity, prose, inline entities, source quotes, and multiple app-skill groups.
      - The chat is loaded from encrypted local persistence after a cold boot.
    when:
      - The same chat is opened on iPhone, iPad, and macOS.
    then:
      - Sender name, category, avatar, model identity, role, and message ownership match web.
      - Rich text, citations, app-skill groups, and embeds appear in the same semantic order as web.
      - No content is duplicated, reassigned to another message, lifted to the top of the message, or lost during restoration.

  - id: S-2
    title: Composite embeds hydrate once with authoritative relationships
    given:
      - A message references app-skill parent embeds whose children are represented through parent IDs, child ID lists, legacy aliases, or synchronized duplicate records.
    when:
      - Apple normalizes and hydrates the visible message's embed graph.
    then:
      - Duplicate IDs resolve deterministically without duplicate cards.
      - Parent-child relationships resolve in both directions and preserve server/document order.
      - Known unresolved composites display an explicit unavailable/error state and diagnostic category rather than an incorrect generic success card.

  - id: S-3
    title: Native rich history supports every web semantic message node
    given:
      - A completed web message contains supported headings, paragraphs, lists, tables, code, links, mentions, wiki entities, embed references, verified source quotes, and system content.
    when:
      - Apple creates and renders its cached native render document.
    then:
      - Every supported node retains its meaning, order, styling, interaction, and accessibility role.
      - Verified source quotes resolve source identity and open the correct fullscreen source with quote highlighting.
      - System content never receives assistant mate chrome.

  - id: S-4
    title: Sent audio matches web preview and fullscreen behavior
    given:
      - A finished sent recording has encrypted media metadata, duration as either a number or formatted string, original and corrected transcripts, model information, and status.
    when:
      - The recording appears in chat history and the user opens it fullscreen.
    then:
      - Preview shows the web-equivalent title, duration/status, transcript snippet, correction state, model information, and play/pause control.
      - Fullscreen exposes playback and the complete selected transcript with explicit loading and unavailable states.
      - Audio decryption failures are visible and privacy-safe rather than silently hidden.

  - id: S-5
    title: Every product embed has dedicated web and native preview and fullscreen rendering
    given:
      - A generated manifest inventories registry entries, app-skill variants, showcase-only inline and quote replicas, grouped variants, and processing, finished, empty, unavailable, and error states.
    when:
      - The registry coverage audit and Apple artifact tests run.
    then:
      - Every known product key maps to dedicated web and native preview dispatch, dedicated web and native fullscreen dispatch, native type normalization, synthetic fixtures, and reviewed artifact pairs.
      - Inline, quote, grouped, status, platform, and color-scheme variants are represented explicitly in the manifest.
      - Any known key routed to generic fallback, classified as placeholder or platform-only, missing either surface, missing a fixture, or missing review fails completion.

  - id: S-6
    title: Header, transcript, and composer match responsive web layout
    given:
      - Equivalent web and Apple chats expose loaded, loading, credits-error, shared, example, highlight, media, and signup banner states.
      - The transcript contains short, long, and media-heavy messages.
    when:
      - The views render at compact, regular, split-view, narrow-window, wide-window, LTR, and RTL sizes.
    then:
      - Header content, bubble geometry, avatar layout, typography, colors, spacing, tails, embed sizing, and composer width match browser-computed contracts.
      - The final message and all interactive content remain fully visible above the composer and keyboard.
      - Container measurements, not size-class assumptions alone, select responsive variants.

  - id: S-7
    title: Chat history remains independently accessible and interactive
    given:
      - A message contains a clickable mate identity, links, source quotes, audio controls, app-skill cards, embeds, and message actions.
    when:
      - VoiceOver, keyboard navigation, pointer interaction, and XCUITest inspect the message.
    then:
      - Interactive children remain individually discoverable and operable.
      - Accessibility identifiers align with equivalent web test IDs where the product concept is shared.
      - Reduce Motion removes nonessential movement without hiding state or content.

  - id: S-8
    title: Paired visual evidence blocks material parity drift
    given:
      - Sanitized web contracts and native screenshots exist for the mixed-content history fixture and every embed surface.
    when:
      - Artifact pairing and agent visual review run for iPhone, iPad, and macOS in light and dark modes.
    then:
      - Every required pair is reviewed for content, hierarchy, clipping, geometry, typography, color, iconography, chrome, and interaction affordance.
      - Missing or unreviewed artifacts and unresolved high or critical product differences fail verification.
      - Platform-only differences are recorded separately and do not block unless they obscure product UI.

