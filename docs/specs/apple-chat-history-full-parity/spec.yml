implementation_plan:
  spec_path: docs/specs/apple-chat-history-full-parity/spec.yml
  existing_patterns:
    - docs/specs/apple-chat-streaming-parity/spec.yml
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - docs/specs/apple-example-chat-visual-parity/spec.yml
    - scripts/apple_ui_contracts.py
    - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewGalleryView.swift
  architecture: >
    Add two narrow normalization seams rather than replacing the transcript. A
    message-scoped `ChatHistoryRenderDocument` converts decrypted stable content
    into ordered native blocks before SwiftUI rendering. An `EmbedGraph` consumes
    deduplicated authoritative records, canonicalizes aliases, resolves ordered
    parent-child relationships in both directions, and exposes explicit known,
    unsupported, and unresolved states. Existing OpenMates SwiftUI primitives,
    `EmbedPreviewCard`, `EmbedFullscreenView`, and per-family renderers consume
    these models. The generated web registry plus app-skill/showcase manifest is
    the coverage source; deterministic audits reject missing web/native preview
    or fullscreen dispatch and known generic fallback.
  data_flow:
    - Sync decodes encrypted message identity fields and embed records without plaintext logging.
    - Message metadata decrypts with the chat key and persists encrypted plus decrypted-at-runtime identity fields through `PersistedMessage`.
    - "`EmbedGraph` deduplicates by stable ID, resolves relationship aliases, preserves declared/document order, and reports unresolved known composites."
    - "`ChatHistoryRenderDocument` parses one stable message into ordered semantic blocks that reference normalized embed graph nodes."
    - "`MessageBubble` renders blocks in order and delegates embed preview/fullscreen content to dedicated family renderers."
    - Web contract capture emits semantic-node and embed-surface manifests; Apple fixtures consume equivalent synthetic data.
    - iPhone, iPad, and macOS tests export light/dark artifacts that are paired and reviewed before completion.
  boundaries:
    - Active streaming reduction remains in `apple-chat-streaming-parity`; this spec begins when a turn becomes stable or restored.
    - Large-chat pagination remains in `apple-chat-opening-parity`; loaded windows must preserve render-document and embed-graph integrity.
    - No production API change is planned because encrypted identity fields already exist in shared schemas and Apple send payloads.
    - UIKit/AppKit transcript virtualization requires measured jank and a spec decision amendment; it is not part of the first slices.
  affected_files:
    - path: apple/OpenMates/Sources/Core/Models/ChatModels.swift
      reason: Native message identity and render-document inputs.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Canonical embed graph normalization and registry coverage.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Persist encrypted message identity fields needed after cold boot.
    - path: apple/OpenMates/Sources/Shared/Components/ChatHistoryRenderDocument.swift
      reason: Cached ordered semantic history model shared by transcript renderers.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Ordered message rendering, identity, layout, accessibility, and clearance.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/*.swift
      reason: Complete dedicated preview and fullscreen renderer parity.
    - path: scripts/apple_ui_contracts.py
      reason: Blocking complete-registry and visual artifact gates.
    - path: frontend/apps/web_app/tests/apple-chat-history-contracts.spec.ts
      reason: Browser-rendered mixed-content and semantic-node source contracts.
    - path: apple/OpenMatesTests/EmbedGraphNormalizationTests.swift
      reason: Red/green relationship, deduplication, ordering, and unresolved-state contracts.
    - path: apple/OpenMatesTests/ChatHistoryRenderDocumentTests.swift
      reason: Red/green ordered message semantics and identity contracts.
  migration_rollout:
    - SwiftData optional message identity fields are additive; existing persisted rows remain readable and derive conservative identity only when historical ciphertext is absent.
    - No plaintext backfill is allowed. Synced ciphertext populates fields on later refresh; legacy records without metadata remain explicit unknown identity rather than silently using an unrelated chat category.
    - Renderer families may deploy incrementally, but the all-registry completion gate remains red until every required surface is implemented and reviewed.
  observability:
    - Extend NativeSyncPerfLog with counts only for duplicate IDs, unresolved known composites, normalized nodes, and renderer classification; never log content or keys.
    - Deterministic audits print missing product keys and exact missing preview/fullscreen/fixture/platform/theme dimensions.
  first_slice:
    - Add embed-graph tests and normalization for the LJ9D3 duplicate/unresolved composite failure.
    - Preserve current rendering while switching hydration and app-skill child lookup to the normalized graph.
    - Prove no duplicate cards, bidirectional child discovery, stable ordering, and explicit unresolved-known classification before broader renderer changes.
  verification_strategy:
    - Run red tests before production implementation in contract order.
    - Verify deterministic and native unit contracts before UI artifact runs.
    - Deploy web contract changes before Playwright green evidence.
    - Run iPhone, iPad, then macOS native evidence and paired visual review.
    - Run python3 scripts/spec_verify.py docs/specs/apple-chat-history-full-parity/spec.yml before completion.
  verification_order:
    - Deterministic registry and chat audits.
    - Native render-document and embed-graph unit tests.
    - Web Playwright contract capture after deployment.
    - iPhone and iPad UI and screenshot tests.
    - macOS UI and screenshot tests.
    - Paired agent visual review.

