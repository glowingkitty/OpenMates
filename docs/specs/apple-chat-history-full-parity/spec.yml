  verified_findings:
    - Issue telemetry reached native embed loading with referenced composite parents, zero reachable children, and unresolvedComposite=true after successful sync.
    - Native sync applied duplicate embed IDs before history rendering.
    - Native app-skill cards are lifted above markdown and fixed to 300 by 200 points instead of preserving document position and container-driven variants.
    - Native sent-audio preview omits transcript, model/status, correction state, and preview playback and only decodes numeric duration.
    - Native markdown treats verified source quotes as ordinary blockquotes.
    - Native Message lacks web sender-name and per-message category fields and official mate identity uses a chat-ID allowlist.
    - The embed coverage audit currently reports missing web registry keys and fixtures; the chat parity audit currently reports identifier drift.
    - Existing embed UI evidence proves gallery execution but has no completed paired agent visual-review evidence.

