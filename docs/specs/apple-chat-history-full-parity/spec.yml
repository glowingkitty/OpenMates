decisions:
  - id: D-1
    status: active
    decision: Keep chat history fully native and introduce a canonical normalized native render document.
    reason: The user selected fully native rendering and Apple rules require product UI parity through native OpenMates primitives.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-2
    status: active
    decision: Treat every current web embed preview and fullscreen registry entry as blocking native scope.
    reason: The user explicitly requires complete preview and fullscreen implementation for all web embed types.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-3
    status: active
    decision: Generic fallback is permitted only for genuinely unknown future types and cannot satisfy known-type parity.
    reason: Silent generic cards currently conceal missing product behavior.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-4
    status: active
    decision: Require iPhone, iPad, and macOS plus light and dark modes for completion.
    reason: The user selected all shipping Apple chat-history targets.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-5
    status: active
    decision: Extend and consume existing embed/example-chat contract infrastructure instead of building a competing screenshot pipeline.
    reason: Existing specs and scripts already define registry capture, artifact pairing, and agent review, but their completion gates are unfinished.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-6
    status: active
    decision: This spec supersedes the placeholder, documented-exception, and web-only completion paths in `apple-embed-rendering-parity` for known product embed types.
    reason: Full parity requires both web and Apple preview/fullscreen implementations; exceptions remain valid only for genuinely unknown future payloads or OS-owned inner media surfaces.
    decided_at: "2026-07-11T00:00:00Z"

