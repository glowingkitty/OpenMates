risks:
  - The native message payload may not currently expose all encrypted identity fields used by web; this must be confirmed before implementation and may require a separately approved API amendment.
  - The web registry, app-skill dispatcher, stored legacy types, and native enum use different aliases; raw-string equality would create false coverage or missing coverage.
  - Complete registry parity is large and must be delivered in independently verified renderer families without weakening the final all-registry gate.
  - A bespoke native rich-text parser can drift from Tiptap semantics; normalization fixtures must cover supported node structure rather than visual strings alone.
  - Screenshot runs across three platforms and two color schemes can become slow; tests may shard while preserving one complete manifest and final review gate.
  - Concurrent Apple sessions are modifying adjacent files; task ownership and fresh reads are required before each implementation slice.
  - SwiftUI transcript performance may degrade with rich blocks; profiling must precede any focused UIKit/AppKit virtualization change.

