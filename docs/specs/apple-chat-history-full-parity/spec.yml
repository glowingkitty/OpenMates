contracts:
  api:
    - No production API change is approved by this spec.
    - If native identity or embed relationship fields are absent from existing encrypted sync payloads, implementation must stop and amend the approved contract before adding or changing an API.
  data:
    - Native Message represents decrypted and encrypted sender name, per-message category, model identity, role, content, thinking, PII mappings, and ordered embed references required by web history.
    - A cached message-scoped render document represents ordered semantic blocks and is built outside frequently evaluated SwiftUI body paths.
    - Embed normalization produces one record per ID, canonical type/app/skill identifiers, ordered parent-child relationships, explicit decryption state, explicit unsupported state, and stable message ownership.
    - Known web registry keys carry explicit preview and fullscreen support classifications; generic fallback is reserved for unknown future keys.
    - A generated embed-surface manifest records product key, registry or showcase source, app/skill variant, preview/fullscreen dispatch, inline/grouped variants, status variants, native renderer, fixture IDs, platform/theme artifacts, and review status.
    - A generated semantic-node manifest records every registered read-only Tiptap extension and supported markdown block with web renderer, native renderer, interaction contract, fixture, and artifact coverage.
    - Committed fixtures use only synthetic public content and placeholder identifiers.
  ui_states:
    - User, assistant, and system messages.
    - Loading, stable, restored, truncated, error, and unavailable history content.
    - Mate identity, official identity, generated-by, thinking, PII revealed/hidden, and message actions.
    - Rich text, code, tables, mentions, wiki entities, links, source quotes, app-skill groups, and embed groups.
    - Every registered embed preview and fullscreen processing, finished, empty, and error variant exposed by web fixtures.
    - Chat banner loading, loaded, credits error, shared, example, highlights, media, signup, and incognito states.
    - iPhone compact, iPad regular/split-view, macOS narrow/wide, light/dark, LTR/RTL, keyboard shown, and Reduce Motion.
  privacy_security:
    - Message plaintext, transcripts, encryption keys, media keys/nonces, credentials, private chat IDs, private emails, and private screenshots never enter committed contracts or diagnostics.
    - Native diagnostics report counts, sanitized type categories, unresolved relationship counts, and durations only.
    - Audio and embed decryption remains local and explicit failures are user-visible without exposing cryptographic details.
    - Visual fixtures and screenshots use synthetic public content only.

