    - apple/OpenMates/Sources/DevPreview/*.swift
    - apple/OpenMatesTests/*.swift
    - apple/OpenMatesUITests/*.swift
  parity_expectations:
    - Browser-rendered web DOM, computed CSS, content order, and interaction state are the final owned-product source of truth.
    - Every current product embed key has web and native preview and fullscreen classification, renderer dispatch, fixture, and reviewed artifact pairs; no known key may be classified as preview-only, fullscreen-only, placeholder, web-only, or native-only at completion.
    - Known web-supported message and embed types never rely on generic native fallback for completion.
    - iPhone, iPad, and macOS satisfy equivalent semantic, responsive, accessible, light-mode, and dark-mode contracts.
    - SwiftUI remains the default composition layer; UIKit/AppKit is limited to measured transcript or media performance hot paths.
  verification:
    - python3 scripts/apple_remote.py status
    - Remote OpenMates_iOS builds and targeted tests on iPhone and iPad simulators.
    - Remote OpenMates_macOS build and native test/screenshot verification at narrow and wide window sizes.
    - Paired web/native screenshot review for full chat history plus every embed preview/fullscreen registry entry.
  intentional_native_differences:
    - Native status bars, safe areas, text rasterization, scrolling physics, and OS-owned media or permission surfaces may differ when they do not obscure or materially alter OpenMates product UI.
    - XCTest/XCUITest replaces Playwright for native interaction proof.
    - SwiftData and native media frameworks may replace browser storage/media APIs while preserving the same visible and privacy contracts.

clarification:
  rounds:
    - question: What should full parity mean for this implementation?
      answer: Complete history surface, including all message, embed, banner, responsive, accessibility, and composer-clearance states.
    - question: May known web-supported types use generic native fallback?
      answer: No. Missing dedicated rendering blocks parity completion.
    - question: May Apple reuse the web history renderer in a WebView?
      answer: No. Chat history remains fully native.
    - question: Which Apple targets block completion?
      answer: iPhone, iPad, and macOS.
    - question: Does complete embed parity include every web embed preview and fullscreen view?
      answer: Yes. Every web embed type must be fully implemented in both native preview and fullscreen forms.
  vision_summary: >
    Apple chat history is a fully native product surface that must preserve the
    semantic content, ordering, identity, interactions, layout, and visual design
    of web across iPhone, iPad, and macOS. Completion requires dedicated preview
    and fullscreen support for every current web embed type and app-skill variant,
    with deterministic coverage gates and paired visual review rather than
    generic fallback or source-only claims.
  approved_by_user: true

