risks:
  - id: R-1
    text: macOS menu bar UI automation may be unreliable in remote XCUITest; provide a debug-hosted quick capture surface with the same view model if direct status-item automation is blocked.
  - id: R-2
    text: Background processing after the popover closes may be interrupted; pending capture jobs must store enough sanitized/encrypted state to retry or resume safely.
  - id: R-3
    text: Extensions have stricter runtime and entitlement limits than the main app; rich attachment sending may need a foreground handoff when upload/transcription exceeds extension budget.
  - id: R-4
    text: Apple currently stores only transcript for native uploadRecording; V1 must preserve full web transcript metadata to avoid parity drift.

open_questions:
  - id: OQ-1
    text: >
      Which menu bar icon treatment should ship first: OpenMates favicon
      gradient, monochrome template icon, or a user-selectable setting?
  - id: OQ-2
    text: Should failed background captures auto-notify through system notifications, or remain visible only when the popover is reopened?
