id: macos-menu-bar-quick-capture
title: macOS Menu Bar Quick Capture V1
status: approved

goal: >
  Add a speed-first macOS menu bar quick capture surface that lets users send
  text, voice recordings, pasted images/text, and dragged files into a new or
  recent OpenMates chat without switching away from their current work. The
  feature must reuse the normal web/Apple chat creation and encrypted embed
  contracts, and must upgrade background/share-extension send paths from
  text-only to full attachment parity.

scope:
  in:
    - A custom OpenMates menu bar status item / menu bar extra on macOS.
    - A custom OpenMates popover UI opened from the menu bar icon, not a stock macOS menu.
    - Top tabs matching the product sections Chats, Projects, Plans, Tasks, and Workflows, with Chats selected by default.
    - Projects, Plans, Tasks, and Workflows tabs render placeholder states only in V1.
    - Default Chats destination is New Chat.
    - A horizontally scrollable recent-chat selector lets the user select an existing chat destination without opening or viewing chat history in the popover.
    - Text input for typed text, pasted text, pasted images, and drag/drop attachments.
    - Attachment support for all currently upload-supported composer file types: images, PDFs, text/code/doc files, and audio files.
    - Unsupported files are rejected visibly with a non-silent error.
    - Voice recording uses the existing audio-recording embed pipeline: encrypted upload, audio.transcribe, Mistral Voxtral transcription, existing LLM correction behavior, and full transcript metadata persistence.
    - Speed-first voice UX: releasing the record button minimizes the menu immediately, processes in the background, and lets the user reopen the popover to inspect status.
    - Background status list for Uploading, Transcribing, Sending, Sent, Failed, Retry, and Delete states.
    - Chat creation and message sending match the web app as source of truth and Apple foreground ChatSendPipeline parity.
    - BackgroundChatSender or its replacement shared service supports text plus encrypted embed parity for menu bar quick capture, macOS share extension, iOS share extension, and notification-style background sends where applicable.
    - Share extensions can send text, images, PDFs, supported text/code/doc files, and audio files into New Chat or a recent chat with an optional user instruction.
    - Apple strings are localized through existing i18n/AppStrings flow.
    - Apple UI uses generated design tokens and OpenMates custom primitives, with web header/composer patterns as visual source of truth.
  out:
    - Functional Projects, Plans, Tasks, or Workflows creation from the menu bar in V1.
    - Viewing chat history, assistant responses, or full chat detail inside the menu bar popover.
    - Transcript review or manual transcript correction before sending.
    - Offline/local transcription.
    - New backend transcription or correction model behavior.
    - Arbitrary unsupported binary-file ingestion beyond the current normal composer upload contract.
    - TestFlight deployment before all required spec checks are green or explicitly blocked/waived.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'menu bar quick capture macOS' returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/plans-v1/spec.yml
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/apple-chat-management-sharing-parity/spec.yml
    - docs/specs/apple-chat-streaming-parity/spec.yml
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/architecture/apple/parity-matrix.md
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts is the web source of truth for chat creation, local chat writes, message ids, draft handling, and embed registration before send.
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts records audio via MediaRecorder, uploads encrypted audio, calls /v1/apps/audio/skills/transcribe, and stores transcript_original/transcript_corrected/use_corrected/correction_model/model metadata.
    - backend/apps/audio/skills/transcribe_skill.py uses Mistral Voxtral for transcription and the existing LLM correction flow; no model behavior change is required for this spec.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift contains ChatSendPipeline, foreground uploadRecording/uploadAttachment behavior, and encrypted embed payload creation for normal Apple chat sends.
    - apple/OpenMatesShared/BackgroundChatSender.swift supports text-only background sends today and must be extended or replaced with a shared background sender that supports embeds.
    - apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift intentionally excludes rich attachments today; that limitation is removed by this spec.
    - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift provides the existing native recording overlay pattern.
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift and MessageInputAudioRecordingUITests.swift cover existing foreground composer structure.
  tests:
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - apple/OpenMatesUITests/ChatManagementSharingParityUITests.swift
  design_references:
    - Web Header tabs and active section affordance from frontend/packages/ui/src/components/Header.svelte.
    - Web MessageInput composer and ActionButtons patterns from frontend/packages/ui/src/components/enter_message/MessageInput.svelte and ActionButtons.svelte.
    - Web RecordAudio overlay from frontend/packages/ui/src/components/enter_message/RecordAudio.svelte.

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/OpenMatesApp.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/AttachmentPicker.swift
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
    - apple/OpenMatesShared/BackgroundChatSender.swift
    - apple/OpenMatesShareExtension/ShareViewController.swift
    - apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
    - apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
    - apple/OpenMatesUITests/MacMenuBarQuickCaptureUITests.swift
    - apple/OpenMatesUITests/ShareExtensionAttachmentParityUITests.swift
  parity_expectations:
    - macOS quick capture uses the same chat id, message id, WebSocket, metadata, encrypted content, and encrypted embed contracts as normal web and Apple foreground chat sends.
    - The menu bar UI visually follows OpenMates web header/composer design tokens while adapting layout to a compact macOS popover.
    - Background/share sends preserve full audio transcript metadata and encrypted embed records just like the web composer.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17" when shared Apple code changes.
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/BackgroundChatSenderParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
    - macOS-specific Xcode UI test or sanitized blocker if remote Mac test runner cannot automate the menu bar status item.
    - TestFlight deployment only after required Apple checks pass or receive explicit waiver.
  intentional_native_differences:
    - The menu bar popover does not render full chat history; it is a capture and status surface only.
    - The top tabs are compact in the popover and non-Chat tabs are placeholders in V1.

clarification:
  rounds:
    - question: Should V1 send into all five destinations, or make Chats functional first with other tabs as placeholders?
      answer: >
        Chat focus first; other tabs remain placeholders until fully functional.
    - question: Should the default send destination be a new chat or the most recent/pinned chat?
      answer: >
        Default new chat, with a horizontal recent-chat list for selecting an
        existing destination without opening it.
    - question: Should V1 use native dictation or the existing web audio pipeline?
      answer: >
        Use the existing audio embed pipeline: encrypted audio upload, Mistral
        Voxtral transcript, and existing correction flow. No local dictation for V1.
    - question: Should the transcript be reviewed before sending?
      answer: >
        No. The menu bar is speed-first. Releasing the record button should
        minimize the popover and process/send in the background.
    - question: Should background sending include images and files too?
      answer: >
        Yes. BackgroundChatSender/share-extension paths must support images and
        all currently upload-supported files, not text only.
  vision_summary: >
    The user wants a fast macOS menu bar capture surface that defaults to a new
    chat, can optionally target a recent chat, and lets users send text, voice,
    pasted images/text, and dragged files without disrupting their current work.
    V1 intentionally optimizes for capture speed and chat parity while showing
    Projects, Plans, Tasks, and Workflows as visible but inactive future tabs.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Send typed text to a new chat from menu bar
    given:
      - Alice is signed into the macOS OpenMates app.
      - Alice clicks the OpenMates menu bar icon.
    when:
      - The quick capture popover opens on the Chats tab.
      - Alice types "Summarize what I should do next" and presses Send.
    then:
      - A new chat is created with the same id/key/message/version contract as normal web chat creation.
      - The message is sent through the normal chat WebSocket path.
      - The popover minimizes after send starts.
      - Reopening the popover shows Sent or Failed status for the capture.

  - id: S-2
    title: Send typed text to a selected recent chat
    given:
      - Alice has recent chats available from sync.
    when:
      - Alice opens the menu bar popover.
      - Alice selects a recent chat from the horizontal strip.
      - Alice sends a text message.
    then:
      - The message is appended to that existing chat using its existing encrypted chat key and version state.
      - The popover does not open or render the selected chat history.

  - id: S-3
    title: Voice capture sends in the background
    given:
      - Alice opens the menu bar popover on the Chats tab.
    when:
      - Alice presses and holds the record button.
      - Alice speaks a short instruction and releases the record button.
    then:
      - The popover minimizes immediately after release.
      - A pending capture job uploads the audio, transcribes it, registers an audio-recording embed, and sends the chat message.
      - The audio embed stores transcript, transcript_original, transcript_corrected, use_corrected, correction_model, and model metadata.
      - Reopening the popover shows Uploading, Transcribing, Sending, Sent, or Failed status.

  - id: S-4
    title: Paste image or text into the quick composer
    given:
      - Alice has text or an image on the macOS clipboard.
    when:
      - Alice opens the menu bar popover and pastes.
    then:
      - Text paste inserts into the composer.
      - Image paste creates a pending image attachment using the normal encrypted upload/embed path.
      - Sending includes image embed references and encrypted embeds with the same persistence semantics as normal chat composer sends.

  - id: S-5
    title: Drag supported files into the quick composer
    given:
      - Alice opens the menu bar popover.
    when:
      - Alice drags an image, PDF, supported text/code/doc file, or audio file into the popover.
    then:
      - Supported files become pending attachments.
      - Audio files are transcribed through the audio.transcribe flow.
      - Unsupported files are rejected visibly and are not silently dropped.

  - id: S-6
    title: Share extension sends attachments with instructions
    given:
      - Alice shares supported text, images, PDFs, supported documents, or audio files from another macOS or iOS app to OpenMates.
    when:
      - Alice optionally adds an instruction and chooses New Chat or a recent chat.
    then:
      - The share extension uses the same background sender as the menu bar capture path.
      - The resulting chat message has full encrypted embed parity with normal composer sends.

  - id: S-7
    title: Placeholder tabs are visible but non-functional
    given:
      - Alice opens the menu bar popover.
    when:
      - Alice switches to Projects, Plans, Tasks, or Workflows.
    then:
      - The tab visually activates.
      - The tab shows a concise placeholder explaining that quick capture for that surface is coming later.
      - The placeholder does not create durable project, plan, task, or workflow records.

