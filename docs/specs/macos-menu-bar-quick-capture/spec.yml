implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMatesShared/BackgroundChatSender.swift
    - apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
  architecture: >
    Extract or extend a shared Apple background capture sender that uses the
    same upload, transcription, encrypted embed, WebSocket, and encrypted
    metadata contracts as foreground ChatSendPipeline. Build the macOS menu bar
    popover as a compact OpenMates SwiftUI product surface and make share
    extensions call the same sender for equivalent text/attachment inputs.
  data_flow:
    - User opens menu bar popover and selects New Chat or a recent chat.
    - Text, pasted content, dragged files, or recording create a local pending capture job.
    - Supported files upload through the encrypted upload endpoint.
    - Audio recordings/files call audio.transcribe and store full transcript metadata.
    - Sender builds message content with embed references and encrypted embed payloads.
    - Sender dispatches chat_message_added and encrypted_chat_metadata through the normal contract.
    - Popover status store updates independently of whether the popover is visible.
  affected_files:
    - path: apple/OpenMates/Sources/App/OpenMatesApp.swift
      reason: Add macOS menu bar extra/status-item app integration.
    - path: apple/OpenMates/Sources/Features/QuickCapture/MacMenuBarQuickCaptureView.swift
      reason: New custom menu bar popover UI.
    - path: apple/OpenMates/Sources/Features/QuickCapture/QuickCaptureViewModel.swift
      reason: Pending capture state, recent chat selection, paste/drop/record orchestration.
    - path: apple/OpenMatesShared/BackgroundChatSender.swift
      reason: Extend text-only background sender to full embed parity or delegate to a new shared sender.
    - path: apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
      reason: Support rich attachments through shared background sender.
    - path: apple/OpenMatesShareExtension/ShareViewController.swift
      reason: Keep iOS share extension parity where applicable.
    - path: apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
      reason: Add deterministic payload and attachment classification coverage.
    - path: apple/OpenMatesUITests/MacMenuBarQuickCaptureUITests.swift
      reason: Add quick capture UI coverage or debug-hosted equivalent.
    - path: apple/OpenMatesUITests/ShareExtensionAttachmentParityUITests.swift
      reason: Add share extension attachment parity coverage.
    - path: frontend/packages/ui/src/components/Header.svelte
      reason: Read-only visual source for tab styling; update counterpart comments only if needed.
