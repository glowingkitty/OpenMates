contracts:
  ui_states:
    - Menu bar icon visible when the macOS app is running.
    - Popover closed, compose, recording, attachment pending, processing status, sent status, failed status, unsupported-file error, unauthenticated state.
    - Recent chat strip with New Chat selected by default.
    - Placeholder states for Projects, Plans, Tasks, and Workflows.
  chat_send:
    - New chat id is client-generated UUID.
    - User message id format is "{last_10_chars_of_chat_id}-{uuid_v4}".
    - New chat starts with messages_v 1 and title_v 0 until metadata arrives.
    - Existing chat sends preserve existing encrypted chat key and increment messages_v.
    - WebSocket event is chat_message_added with chat_id, message, encrypted_chat_key, optional embeds, and optional encrypted_embeds.
    - Encrypted durable user content and metadata use encrypted_chat_metadata after assistant task/metadata events, matching web/foreground Apple behavior.
  attachments:
    - Supported file classification matches normal Apple/web composer upload support.
    - Image embeds use images/upload style content and encrypted embed storage.
    - PDF and document/file embeds use the same normal composer classification and storage behavior.
    - Audio files and recordings use audio-recording embeds with transcript metadata when transcription succeeds.
    - Failed upload/transcription exposes failed status and retry/delete actions.
  privacy_security:
    - No plaintext message, transcript, file contents, auth tokens, keys, S3 keys, or private filenames are logged through NativeDiagnostics or console output.
    - Durable chat/message/embed records are encrypted the same way as normal chat sends.
    - Unsupported file rejection includes file type/category only, not private file paths.
  release:
    - TestFlight deployment requires green Apple unit/build/UI evidence or explicit blocker/waiver entries in this spec.

