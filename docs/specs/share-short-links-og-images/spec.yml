implementation_plan:
  existing_patterns:
    - Existing share-key blobs already keep chat/embed encryption keys in URL fragments.
    - Existing `/s/` resolver already decrypts opaque encrypted_url client-side.
    - Existing share metadata queue already sends plaintext title/summary/category/icon only after owner action.
    - Existing backend OG metadata endpoint already decrypts shared vault metadata for crawlers.
    - Existing `ChatHeader.svelte` category gradients and icon names define the visual source for chat OG images.
  architecture: >
    Replace Redis-only ephemeral short links with durable Directus-backed records
    while preserving the encrypted_url blob pattern. The frontend creates the long
    share URL in memory, encrypts it with a fragment-only shortKey, stores only the
    encrypted blob plus safe metadata flags, and displays only `/s/<token>#<shortKey>`.
    SvelteKit `/s/<token>` serves crawler metadata and client resolver UI; the resolver
    fetches the encrypted blob and redirects to the existing long share route after
    client-side decryption.
  data_flow:
    - User configures chat or embed sharing.
    - Client creates the existing long share URL in memory.
    - Client generates token and shortKey.
    - Client encrypts the long URL with shortKey-derived AES-GCM key.
    - Client POSTs token, encrypted_url, content_type, content_id, password_protected, and optional ttl_seconds.
    - Backend stores a durable short-link record with null expires_at for no-expiration shares.
    - UI displays and copies only the short URL and builds QR from it.
    - Crawlers request `/s/<token>` and receive safe OG tags from backend metadata.
    - Browsers with a fragment resolve and decrypt the encrypted_url, then navigate to `/share/chat/...` or `/share/embed/...`.
  affected_files:
    - path: backend/core/api/app/routes/share.py
      reason: Durable short-link API, metadata API, OG image endpoint.
    - path: backend/core/api/app/services/directus.py
      reason: If needed, helper methods for share_short_links collection access.
    - path: backend/core/directus/schemas/share_short_links.yml
      reason: Durable short-link schema.
    - path: frontend/packages/ui/src/services/shortUrlEncryption.ts
      reason: Build and parse `/s/<token>#<shortKey>` URLs.
    - path: frontend/packages/ui/src/components/settings/share/SettingsShare.svelte
      reason: Generate durable short links as the primary share output for chat and embed.
    - path: frontend/apps/web_app/src/routes/s/[token]/+server.ts
      reason: Serve OG HTML and redirect bootstrap for short-link path tokens.
    - path: frontend/apps/web_app/src/routes/s/[token]/+page.svelte
      reason: Client resolver for token path plus fragment secret.
    - path: frontend/apps/web_app/tests/share-chat-flow.spec.ts
      reason: Shared-chat spec coverage for short links and OG metadata.
    - path: frontend/apps/web_app/tests/share-embed-flow.spec.ts
      reason: Embed spec coverage for short links.
    - path: backend/tests/test_share_short_links.py
      reason: Backend contract tests.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/share-short-links-og-images/spec.yml
    - python3 -m pytest backend/tests/test_share_short_links.py
    - python3 scripts/run_tests.py --suite vitest
    - python3 scripts/run_tests.py --spec share-chat-flow.spec.ts
    - python3 scripts/run_tests.py --spec share-embed-flow.spec.ts
    - python3 scripts/spec_verify.py docs/specs/share-short-links-og-images/spec.yml

