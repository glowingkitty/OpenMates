apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This slice changes web share-panel behavior and SvelteKit public share routes only.
    - Native Apple sharing parity is out of scope for this implementation and should reuse the durable short-link contract later.
  verification:
    - Not required for this web-only share route and settings-panel change.
  intentional_native_differences:
    - Apple app does not yet expose this short-link share panel flow in this slice.

clarification:
  rounds:
    - question: Should no-expiry short links be durable database-backed records or best-effort Redis records?
      answer: Durable database-backed records.
    - question: Should durable short-link behavior apply to both shared chats and shared embeds?
      answer: Both chats and embeds, with projects and workflows planned later.
    - question: Should the public format keep custom short-domain support and use the existing `/s/` concept?
      answer: Yes.
    - question: Since URL fragments are invisible to crawlers, should the token move into the path as `/s/<token>#<shortKey>`?
      answer: Yes, the token must be visible so crawlers can fetch metadata while the secret remains in the fragment.
  vision_summary: >
    Sharing should no longer expose long confusing URLs to users. The copy link
    and QR code surfaces should use durable short URLs for chats and embeds,
    while preserving zero-knowledge access by keeping the decryption key in the
    fragment. Shared-chat OG previews should use title, summary, and a generated
    chat-header-style image only when password protection is not enabled; a
    password-protected share must show only a generic protected preview.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Owner shares a chat with the default no-expiration short link
    given:
      - Alice is logged in and owns a private encrypted chat titled "Paris travel plan".
      - Alice leaves password protection disabled and leaves expiration set to no expiration.
    when:
      - Alice opens the share panel and clicks Share chat.
    then:
      - The generated link shown for copy starts with `/s/` and contains a token in the path.
      - The decryption secret appears only after `#` in the short URL.
      - The QR code encodes the same short URL, not the long `/share/chat/...#key=...` URL.
      - The short-link database record has no expiration timestamp.

  - id: S-7
    title: Owner shares while offline
    given:
      - Alice is logged in and owns an encrypted chat or embed.
      - Alice's browser cannot reach the OpenMates API when she generates a share link.
    when:
      - Alice clicks Share chat or Share embed.
    then:
      - The share panel still produces a usable encrypted long share URL.
      - The copied link and QR code use the long `/share/...#key=...` URL.
      - The UI indicates that a long offline link was used because short-link creation needs a network connection.

  - id: S-2
    title: Owner shares a chat with explicit expiration
    given:
      - Alice is logged in and owns an encrypted chat.
    when:
      - Alice selects a one-hour share expiration and clicks Share chat.
    then:
      - The copied link and QR code still use `/s/<token>#<shortKey>`.
      - The durable short-link record expires at the same time as the share-key blob.
      - Resolving the short link after expiration fails without revealing whether the chat exists.

  - id: S-3
    title: Social crawler previews a non-password-protected shared chat
    given:
      - Alice shared a chat without password protection.
      - The chat has shared metadata title "Paris travel plan" and summary "A concise itinerary for a weekend in Paris.".
    when:
      - A crawler requests `/s/<token>` without the fragment.
    then:
      - The HTML contains `og:title` with the shared chat title.
      - The HTML contains `og:description` with the shared chat summary.
      - The HTML contains `og:image` pointing to a generated chat OG image route.
      - The OG image visually follows the chat header design with gradient, icon, title, summary, and optional side bubbles.

  - id: S-4
    title: Social crawler previews a password-protected shared chat
    given:
      - Alice shared a chat with password protection enabled.
    when:
      - A crawler requests `/s/<token>` without the fragment.
    then:
      - The HTML title and OG title are "Password protected chat".
      - The HTML and OG description do not include the chat summary.
      - The OG image is a generic OpenMates gradient image with a lock icon.
      - No chat title, summary, decrypted content, or preview images are exposed.

  - id: S-5
    title: Recipient opens a short chat link
    given:
      - Bob receives `/s/<token>#<shortKey>` for a shared chat.
    when:
      - Bob opens the link in a browser.
    then:
      - The short-link resolver fetches the encrypted long share URL using only the token.
      - The browser decrypts the long share URL using the fragment secret.
      - Bob is redirected to the existing `/share/chat/<chatId>#key=<blob>` flow and can view the chat.

  - id: S-6
    title: Owner shares an embed with the durable short link
    given:
      - Alice is logged in and opens a finished web-search embed fullscreen.
    when:
      - Alice clicks Share embed and generates a link.
    then:
      - The copied link and QR code use `/s/<token>#<shortKey>`.
      - The short-link record type is `embed`.
      - The resolver redirects to the existing `/share/embed/<embedId>#key=<blob>` flow.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Share chat copy and QR outputs use a durable short URL by default, never the long share URL.
  - id: AC-2
    scenario: S-2
    text: Short-link expiration is absent by default and matches the selected share expiration when one is configured.
  - id: AC-3
    scenario: S-3
    text: Non-password-protected shared chats expose only explicitly shared title/summary metadata and a generated chat-header-style OG image.
  - id: AC-4
    scenario: S-4
    text: Password-protected shared chats expose only the generic protected OG metadata and image.
  - id: AC-5
    scenario: S-5
    text: Short-link resolution remains zero-knowledge; the server never receives the fragment secret or decrypted long share URL.
  - id: AC-6
    scenario: S-6
    text: Shared embeds also use durable short URLs for copy and QR surfaces.
  - id: AC-7
    scenario: S-1
    text: Existing long share routes continue to work as internal resolver targets and backward-compatible old links.
  - id: AC-8
    scenario: S-7
    text: Offline share generation falls back to the locally generated long URL for copy and QR surfaces.

contracts:
  api:
    - route: POST /v1/share/short-url
      request: >
        { token: string, encrypted_url: string, content_type: "chat" | "embed",
        content_id: string, password_protected: boolean, ttl_seconds?: number | null }
      response: "{ success: true, expires_at: number | null }"
      errors:
        - 400 for invalid token, invalid content_type, invalid content_id, oversized encrypted_url, or invalid ttl_seconds.
        - 401 when unauthenticated.
        - 409 when token already exists.
    - route: GET /v1/share/short-url/{token}
      response: "{ encrypted_url: string }"
      errors:
        - 404 for missing, revoked, or expired short links.
        - 429 if abuse limits are exceeded.
    - route: GET /v1/share/short-url/{token}/metadata
      response: >
        { title: string, description: string, image: string, content_type: string,
        password_protected: boolean }
      errors:
        - 404-compatible fallback metadata for unknown, revoked, or expired links.
    - route: GET /v1/share/short-url/{token}/og-image.png
      response: PNG image bytes.
      errors:
        - 404-compatible generic fallback image for unknown, revoked, expired, or unsafe metadata.
  data:
    - Add a durable `share_short_links` collection/table with token, encrypted_url, content_type, content_id, owner hash, password_protected, expires_at, revoked_at, created_at, and updated_at.
    - Store only opaque encrypted_url; the server must not store the fragment secret or decrypted long URL.
    - Short-link records for no-expiration shares use null expires_at.
    - Expired, revoked, unshared, or deleted target content must not reveal private metadata.
  ui_states:
    - Share generated success shows/copies the short URL.
    - QR code uses the short URL.
    - If durable short-link creation fails because the browser is offline or the API is unreachable, the UI visibly falls back to the long URL.
    - If durable short-link creation fails for validation or permission reasons, the UI shows a visible error and does not silently copy the long URL.
    - The long URL may be kept only in memory as the encrypted resolver target, not displayed as the primary share output.
  privacy_security:
    - URL fragment secrets are never sent to backend routes or included in OG HTML.
    - Password-protected shares never expose chat title, summary, category, icon, or preview images in crawler-visible metadata.
    - Non-password OG metadata is limited to title, summary, category, icon, and future explicitly shared preview images from the owner-controlled share metadata path.
    - The resolver must not distinguish missing/private/unshared targets in user-facing error copy beyond generic invalid or expired states.
    - Short-link token entropy must remain high enough for non-enumerability and be rate-limited on create and resolve.

