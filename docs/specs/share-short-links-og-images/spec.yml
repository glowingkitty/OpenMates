id: share-short-links-og-images
title: Share Short Links And OG Images
status: approved

goal: >
  Make shared chat and embed links compact by default without weakening the
  zero-knowledge share model, and make shared-chat social previews useful while
  hiding metadata for password-protected shares.

scope:
  in:
    - Durable database-backed short links for shared chats and shared embeds.
    - Public short URL format `/s/<token>#<shortKey>` where the server receives only the token.
    - Share panel copy and QR code actions use the short URL instead of the long `/share/...#key=...` URL.
    - Offline share generation falls back to the long encrypted share URL because it can be generated without contacting OpenMates servers.
    - No-expiration short links by default, unless the user selects a share expiration.
    - Chat-specific OG title, description, and generated image for non-password-protected shared chats.
    - Generic password-protected OG title and lock-image preview for password-protected shared chats.
    - Playwright coverage for shared chat creation and shared embed creation using short links.
  out:
    - Custom short domain rollout beyond preserving existing `VITE_SHORT_URL_DOMAIN` support.
    - Durable short links for projects and workflows in this slice.
    - Dynamic generated OG images for embeds, projects, or workflows.
    - Public discovery, community approval, or demo-chat publishing changes.
    - Changing the underlying chat/embed encryption format or moving decryption server-side.

