risks:
  - Durable short links increase the need for explicit revocation when content is unshared or deleted.
  - Moving token into the URL path improves OG metadata but makes token enumeration defenses more important.
  - Generated OG images must not render unescaped user-controlled text directly into SVG/HTML.
  - Existing social preview caches may keep old metadata after a share changes.
  - Current `/s/#token-key` links should remain resolvable during a transition window if already generated.

open_questions:
  - Should a future cleanup job delete expired durable short-link records, or keep them tombstoned for abuse analysis?
  - Should projects and workflows share the same `share_short_links` collection with content_type expansion, or receive separate typed share tables?
