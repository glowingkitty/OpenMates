  production_discovery:
    - Current production core backend runs source-mode compose from /home/superdev/OpenMates/backend/core using docker-compose.yml plus docker-compose.no-webapp.yml.
    - Current production has no webapp container; official web app is outside the backend compose stack.
    - Current production persistent user data is mostly openmates-postgres-data, openmates-vault-data, openmates-vault-setup-data, and tiny Directus upload/extension bind mounts.
    - Current production has OpenObserve, Promtail, Prometheus, cAdvisor, and Alertmanager containers; image-mode selfhost template currently keeps only OpenObserve.
    - Published GHCR image tags can exist without matching Git tags, while the current CLI downloads compose templates from GitHub refs derived from package version.

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - The Apple app is not affected because this work changes host-level CLI and server deployment behavior only.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: For server backup and restore v1, should user data mean only product-critical state, or include operational data by default?
      answer: By default only Postgres, Directus uploads/extensions, Vault data/setup token files, runtime .env, and config. Optionally include OpenObserve logs and Prometheus metrics.
    - question: For update preflight backups, should the CLI keep exactly one rotating latest pre-update backup per role or retain several?
      answer: Keep one rotating latest pre-update backup per server role by default.
    - question: Which observability services should production include by default?
      answer: Use core minimal with no observability, core standard with OpenObserve and Promtail, core production with OpenObserve, Promtail, Prometheus, and cAdvisor, and make Alertmanager opt-in with --with-alerts.
    - question: How should the migration handle newly required API keys and Caddyfile changes that are easy to forget during production deploys?
      answer: Add CLI-managed deployment preflight reminders for new required env/API keys, and add host-level CLI Caddyfile check/apply/status commands because Caddy is not part of Docker images.
  vision_summary: >
    OpenMates server operations should move from hand-run git pulls and per-VM
    sidecar updates to a unified host-level CLI that understands core, upload,
    and preview roles. Image updates should be fast and safe: pre-pull images,
    create one rotating latest pre-update backup of user data, restart only the
    required services, verify required host/env/Caddy configuration, and verify
    health before declaring success. Browser UI may display version information,
    but actual updates should happen through the CLI or a CLI-installed systemd
    continuous updater.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Operator installs each server role without source builds
    given:
      - A Linux host has Docker, Docker Compose, Node.js, and npm installed.
      - The operator installs the public OpenMates CLI package.
    when:
      - The operator runs openmates server install --role core --profile production.
      - The operator runs openmates server install --role upload on the upload VM.
      - The operator runs openmates server install --role preview on the preview VM.
    then:
      - Each role writes only the runtime files, compose templates, env/config scaffolding, and server metadata needed for that role.
      - No default install requires git, a source checkout, or local Docker builds.
      - The saved server config records role, profile, install mode, image tag/channel, compose files, and default services.

  - id: S-2
    title: Operator targets specific services safely
    given:
      - A role-based image-mode install exists.
      - The role has service groups such as api, workers, observability, upload, preview, and setup.
    when:
      - The operator runs openmates server restart --services api,task-worker.
      - The operator runs openmates server start --exclude webapp.
      - The operator runs openmates server logs --services preview,admin-sidecar.
    then:
      - The CLI passes only valid service names to Docker Compose.
      - Invalid or cross-role service names fail before Docker is called.
      - Setup/dependency services are included only when required by the selected operation.

  - id: S-3
    title: Image update minimizes downtime and creates a latest pre-update backup
    given:
      - A core production image-mode install is running.
      - A newer image tag or channel digest is available.
    when:
      - The operator runs openmates server update.
    then:
      - The CLI writes or replaces one latest pre-update backup for the core role before replacing containers.
      - The CLI pulls images before stopping or recreating running services.
      - The CLI recreates only services affected by the selected role/service filter.
      - The CLI waits for configured health checks and reports success only after healthy services are reachable.
      - The CLI never runs git pull in image mode.

  - id: S-4
    title: Operator creates and restores user data backups on demand
    given:
      - A role-based install has persisted product data.
    when:
      - The operator runs openmates server backup --role core.
      - The operator runs openmates server backup --role core --include-observability.
      - The operator runs openmates server restore --role core --file <BACKUP_FILE>.
    then:
      - The default backup contains Postgres, Directus uploads/extensions, Vault data, Vault setup token files, runtime .env, and runtime config.
      - Optional observability backup includes OpenObserve logs and Prometheus metrics.
      - Restore requires explicit confirmation unless --yes is passed.
      - Restore stops affected services, restores data, starts services, and verifies health.

  - id: S-5
    title: Continuous updater runs as a host-level systemd service
    given:
      - A production server has a role-based image-mode install.
    when:
      - The operator runs openmates server update install-service --continuous --channel main --window "02:00-04:00 Europe/Berlin".
    then:
      - The CLI writes a systemd unit and timer or long-running service outside Docker Compose.
      - The updater checks for new image digests on the configured interval/channel.
      - The updater runs the same backup, pull, restart, and health-check flow as manual update.
      - The updater records status locally for openmates server update status.

  - id: S-6
    title: Published CLI installs do not depend on missing Git tags
    given:
      - A stable CLI package and matching GHCR image tags are published.
      - No matching Git tag exists for the version.
    when:
      - The operator runs openmates server install or openmates server update.
    then:
      - The CLI uses packaged runtime templates by default.
      - The CLI can still use --template-ref or --template-url for advanced testing.
      - Missing Git tags do not break normal installs or updates.

  - id: S-7
    title: Production observability is profile controlled
    given:
      - The operator installs a core server role.
    when:
      - The operator chooses --profile minimal, --profile standard, or --profile production.
    then:
      - Minimal excludes OpenObserve, Promtail, Prometheus, cAdvisor, and Alertmanager.
      - Standard includes OpenObserve and Promtail.
      - Production includes OpenObserve, Promtail, Prometheus, and cAdvisor.
      - Alertmanager is included only when --with-alerts is passed.

  - id: S-8
    title: Web admin settings no longer triggers host updates
    given:
      - An admin opens Settings > Server > Software Updates.
    when:
      - The server is managed by image-mode CLI.
    then:
      - The UI may show current version and update availability.
      - The UI does not expose an Install Update action that calls sidecar git/build update endpoints.
      - The UI points admins to openmates server update for host-level updates.

  - id: S-9
    title: Update preflight warns about newly required API keys
    given:
      - A new provider-backed feature or server integration has been added since the installed image digest.
      - The role runtime .env and Vault do not contain the required provider key or secret.
    when:
      - The operator runs openmates server update --dry-run.
      - The continuous updater checks a new target image digest.
    then:
      - The CLI reports newly required environment variables and provider API keys before updating containers.
      - The CLI distinguishes required keys from optional integrations and providers marked no_api_key.
      - Manual update requires confirmation or a documented flag to continue when required keys are missing.
      - Continuous update skips the update and records an actionable blocked status when required keys are missing.

  - id: S-10
    title: Caddyfile changes are applied through host-level CLI commands
    given:
      - A production, upload, or preview server uses host Caddy outside Docker Compose.
      - A new release includes an updated server-specific Caddyfile template.
    when:
      - The operator runs openmates server caddy check --role core.
      - The operator runs openmates server caddy apply --role core.
      - The operator runs openmates server update.
    then:
      - The CLI validates the role-appropriate Caddyfile before applying it.
      - The CLI backs up the existing system Caddyfile before replacing it.
      - The CLI reloads Caddy only after validation succeeds.
      - Update preflight reports when the packaged Caddyfile differs from the host-applied Caddyfile.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: The CLI supports --role core, --role upload, and --role preview for install, start, stop, restart, status, logs, update, backup, and restore where applicable.
  - id: AC-2
    scenario: S-1
    text: Role-based image installs create role-specific runtime directories and persist role/profile metadata in server config.
  - id: AC-3
    scenario: S-2
    text: The CLI supports --services and --exclude for service-scoped operations and validates requested services against the selected role before calling Docker.
  - id: AC-4
    scenario: S-2
    text: Backend-only production core operation can exclude webapp without custom manual compose commands.
  - id: AC-5
    scenario: S-3
    text: Image-mode update creates or replaces one latest pre-update backup for the affected role before container replacement.
  - id: AC-6
    scenario: S-3
    text: Image-mode update pulls images before downtime and recreates only affected services plus required setup/dependency services.
  - id: AC-7
    scenario: S-3
    text: Image-mode update waits for role-specific health checks and never runs git pull.
  - id: AC-8
    scenario: S-4
    text: openmates server backup creates a default archive containing Postgres, Directus uploads/extensions, Vault data/setup files, runtime .env, and runtime config.
  - id: AC-9
    scenario: S-4
    text: openmates server backup --include-observability adds OpenObserve logs and Prometheus metrics when those volumes exist.
  - id: AC-10
    scenario: S-4
    text: openmates server restore restores a selected backup with confirmation, service stop/start, and post-restore health checks.
  - id: AC-11
    scenario: S-5
    text: Continuous update can be installed as a host-level systemd service/timer and uses the same safe update path as manual CLI update.
  - id: AC-12
    scenario: S-6
    text: Published CLI packages include runtime templates and do not require a matching Git tag for normal install/update.
  - id: AC-13
    scenario: S-7
    text: Core observability profiles resolve to the documented minimal, standard, production, and --with-alerts service sets.
  - id: AC-14
    scenario: S-8
    text: Web admin settings cannot trigger the legacy sidecar git/build update flow for CLI-managed image-mode servers.
  - id: AC-15
    scenario: S-9
    text: Update dry-run and continuous update preflight detect missing newly required env/API keys and block unattended updates until resolved.
  - id: AC-16
    scenario: S-10
    text: The CLI provides caddy check, caddy diff/status, and caddy apply commands for host-level reverse proxy configuration.

contracts:
  cli:
    - openmates server install --role core|upload|preview [--profile minimal|standard|production] [--with-alerts] [--image-tag <tag>|--channel main|dev|stable]
    - openmates server start|stop|restart|status|logs [--role <role>] [--services <csv>] [--exclude <csv>]
    - openmates server update [--role <role>] [--services <csv>] [--exclude <csv>] [--skip-backup] [--dry-run] [--image-tag <tag>|--channel main|dev|stable]
    - openmates server update --continuous runs in the foreground for manual screen/tmux use.
    - openmates server update install-service --continuous installs host-level systemd automation.
    - openmates server update status reports latest manual or continuous update status.
    - openmates server backup [--role <role>] [--output <path>] [--include-observability]
    - openmates server restore [--role <role>] --file <path> [--yes]
    - openmates server backup list [--role <role>] lists on-host backup archives created by the CLI.
    - openmates server preflight [--role <role>] [--target-image-tag <tag>|--channel <channel>] checks required env/API keys, host prerequisites, role templates, Caddyfile drift, disk space, and backup writeability.
    - openmates server caddy check|status|diff|apply [--role core|upload|preview] manages host Caddy configuration outside Docker images.
  roles:
    core:
      data_bearing: true
      required_services: [api, cms, cms-database, cache, vault, vault-setup, cms-setup]
      optional_groups: [workers, webapp, observability, metrics, alerts]
      health_checks: [http://localhost:8000/health]
    upload:
      data_bearing: true
      required_services: [app-uploads, clamav, vault, vault-setup, admin-sidecar]
      optional_groups: []
      health_checks: [http://localhost:8000/health]
    preview:
      data_bearing: false
      required_services: [preview, admin-sidecar]
      optional_groups: [cache]
      health_checks: [http://localhost:8080/health]
  backup:
    default_contents:
      - Postgres logical dump for core role.
      - Directus uploads and extensions from bind mounts or named volumes.
      - Vault file storage volumes for core and upload roles.
      - Vault setup data/token volumes for core and upload roles.
      - Runtime .env and non-secret config files required to restore the role.
      - Backup manifest with role, CLI version, image tag/digest, created_at, service list, and checksums.
    optional_contents:
      - OpenObserve data when --include-observability is set.
      - Prometheus metrics when --include-observability is set.
    pre_update_retention:
      - Exactly one rotating latest pre-update backup per role by default.
      - User-created backups are not pruned automatically unless a future retention flag is added.
  compose_templates:
    - Runtime templates are shipped inside the npm package under a versioned templates directory.
    - Templates use GHCR image references for OpenMates-built services in image mode.
    - Third-party services keep upstream images and are not rebuilt by OpenMates.
    - Role/profile selection resolves to deterministic compose file order.
  update_safety:
    - Dry run prints image pull plan, selected services, backup target, expected health checks, and downtime-affecting steps.
    - Dry run prints required env/API key additions introduced by the target image compared with the installed image metadata.
    - Dry run prints Caddyfile drift when packaged role Caddyfile differs from the currently applied host Caddyfile.
    - Update pulls images before stopping services.
    - Update refuses to continue if backup fails, unless --skip-backup is explicitly passed.
    - Update refuses unattended continuous execution when required env/API keys are missing or Caddyfile drift is marked required.
    - Update records update state before and after each step so interrupted runs can be diagnosed.
  config_preflight:
    - Required provider/API keys are derived from app/provider metadata and explicit server-role metadata, not from a hardcoded ad hoc checklist.
    - Providers marked no_api_key are not reported as missing.
    - Optional providers are shown as warnings only when the target release newly introduces them.
    - The CLI can compare installed image metadata with target image metadata, or fall back to packaged metadata for dry runs.
    - Missing secrets are reported by variable/provider name only; secret values are never printed.
  caddy:
    - Caddy is host-level infrastructure and is not part of OpenMates Docker images.
    - Caddyfile templates for core, upload, preview, dev, and prod roles are packaged with the CLI or copied from the installed runtime template set.
    - Caddy apply uses the existing validation/back-up/reload behavior from deployment/apply-caddy-config.sh or an equivalent TypeScript implementation.
    - Caddy apply requires root privileges or sudo guidance when writing /etc/caddy/Caddyfile.
    - Caddy status reports template hash, applied hash, last applied timestamp where known, and validation status.
  web_ui:
    - Image-mode CLI-managed servers expose read-only update metadata to admins.
    - Web UI install/update action is hidden or disabled with CLI guidance.
  privacy_security:
    - Backup archives contain secrets and must be written with owner-only permissions where supported.
    - Backup commands never print secret values.
    - Restore commands require explicit confirmation and display the target role and backup manifest before modifying data.
    - Upload server remains isolated from core Directus and core Vault; role templates must not add those connections.

tests:
  - id: T-CLI-SERVER-UNIT
    type: unit
    file: frontend/packages/openmates-cli/tests/server.test.ts
    command: cd frontend/packages/openmates-cli && npm run test:unit:server
    covers:
      - AC-1
      - AC-2
      - AC-3
      - AC-4
      - AC-5
      - AC-6
      - AC-7
      - AC-8
      - AC-9
      - AC-10
      - AC-11
      - AC-12
      - AC-13
    assertions:
      - role parsing accepts core, upload, and preview and rejects unknown roles
      - service filters resolve valid role-specific services and reject invalid services before Docker is called
      - backend-only core operations add the no-webapp profile or equivalent compose override
      - image update plans include backup before pull/up and never include git pull
      - backup manifests include default and optional observability content sets
      - restore plans require confirmation and include stop, restore, start, health-check phases
      - continuous update systemd plans render unit/timer content without secrets
      - packaged templates are selected before GitHub raw template fallback
      - observability profiles resolve to expected service sets
      - config preflight reports newly required API keys without printing secret values
      - caddy command plans validate, diff, backup, and reload host Caddy configuration
