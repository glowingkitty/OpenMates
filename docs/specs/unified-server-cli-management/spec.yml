implementation_plan:
  existing_patterns:
    - frontend/packages/openmates-cli/src/server.ts command router and Docker helpers
    - frontend/packages/openmates-cli/src/serverConfig.ts persisted install path metadata
    - frontend/packages/openmates-cli/tests/server.test.ts CLI contract unit coverage
    - backend/admin_sidecar/main.py role-specific log/status conventions for satellite servers
    - backend/upload/docker-compose.yml upload VM isolation and local Vault pattern
    - backend/preview/docker-compose.preview.yml preview VM isolation and cache pattern
    - .github/workflows/publish-selfhost-images.yml GHCR image publishing
  architecture: >
    Move server lifecycle ownership to the host-level OpenMates CLI. The CLI
    ships runtime templates, resolves a role/profile/service plan, writes a
    small install directory, and shells out to Docker Compose. Image updates are
    preflighted, backed up, pulled before downtime, applied to selected services,
    and health checked. Continuous updates are installed as host-level systemd
    automation that calls the same CLI update path.
  data_flow:
    - Operator installs or migrates a role-based runtime directory.
    - CLI saves role/profile/image/channel/service metadata in ~/.openmates/server.json or a role-aware config file.
    - CLI backup creates a manifest, dumps/copies product-critical data, writes checksums, and sets restrictive file permissions.
    - CLI update resolves target images, creates the rotating latest pre-update backup, pulls images, applies Docker Compose up for selected services, and waits for health checks.
    - Continuous updater checks image digests and delegates to the same update function during the configured window.
    - Restore reads the manifest, confirms target role, stops affected services, restores data, starts services, and verifies health.
  affected_files:
    - path: frontend/packages/openmates-cli/src/server.ts
      reason: Add role/profile/service selection, backup/restore, and continuous update behavior.
    - path: frontend/packages/openmates-cli/src/serverConfig.ts
      reason: Persist role-aware server configuration and update/backup metadata.
    - path: frontend/packages/openmates-cli/tests/server.test.ts
      reason: Cover CLI planning, backup, restore, service filters, and packaged templates.
    - path: frontend/packages/openmates-cli/package.json
      reason: Include packaged runtime templates in npm package files.
    - path: frontend/packages/openmates-cli/templates/**
      reason: Store role/profile compose templates and systemd templates shipped with the CLI.
    - path: backend/core/docker-compose.selfhost.yml
      reason: Align core image-mode compose with runtime config mounts and observability profiles.
    - path: backend/upload/docker-compose.selfhost.yml
      reason: Add upload image-mode role template if the existing source compose remains source-only.
    - path: backend/preview/docker-compose.selfhost.yml
      reason: Add preview image-mode role template if the existing source compose remains source-only.
    - path: .github/workflows/publish-selfhost-images.yml
      reason: Publish upload and preview images and/or ensure version/tag/template alignment.
    - path: deployment/apply-caddy-config.sh
      reason: Reuse or expose host-level Caddy validation/apply behavior through the CLI.
    - path: deployment/prod_server/Caddyfile
      reason: Package and compare production Caddyfile templates for drift.
    - path: deployment/upload_server/Caddyfile
      reason: Package and compare upload server Caddyfile templates for drift.
    - path: deployment/preview_server/Caddyfile
      reason: Package and compare preview server Caddyfile templates for drift if present or add one.
    - path: .github/workflows/selfhost-smoke.yml
      reason: Verify role/profile/service image-mode install and update flows.
    - path: backend/core/api/app/routes/settings_software_update.py
      reason: Reject image-mode update installs and keep read-only status/version behavior.
    - path: frontend/packages/ui/src/components/settings/server/SettingsSoftwareUpdate.svelte
      reason: Remove or disable web-triggered install update actions.
    - path: docs/self-hosting/setup.md
      reason: Document backup, restore, roles, profiles, and continuous updates.
    - path: docs/user-guide/cli/server-management.md
      reason: Document new CLI commands and operational runbooks.
    - path: docs/architecture/core/servers.md
      reason: Update server role/profile and observability architecture.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/unified-server-cli-management/spec.yml
    - cd frontend/packages/openmates-cli && npm run test:unit:server
    - docker compose config lint for core/upload/preview role templates
    - backup/restore rehearsal against disposable image-mode install
    - self-host smoke workflow for packaged templates, role selection, service selection, and continuous updater planning
    - lint_changed for settings UI/backend route changes
  verification_order:
    - CLI unit contracts first
    - Compose lint second
    - Backup/restore rehearsal third
    - Self-host smoke fourth
    - Settings UI/backend route lint fifth
    - Apple not affected
  migration_notes:
    - Production migration should first install CLI and create a parallel runtime directory; do not overwrite /home/superdev/OpenMates in place.
    - Use core production profile without webapp for openmates.org backend until official webapp hosting changes.
    - Run backup before first cutover and verify restore into a disposable install before stopping the current source stack.
    - Keep the old source checkout and local images until image-mode production has run cleanly.
  risks:
    - Backup archives contain secrets and must be protected on disk.
    - Logical Postgres dump plus Vault file copy must be coordinated to avoid inconsistent restore state.
    - Continuous updates need conservative default windows to avoid active-user disruption.
    - API key metadata can drift if providers are added without declaring required keys; deterministic audits should enforce metadata.
    - Caddy apply requires host privileges and must fail safe when Caddy or required DNS modules are missing.
    - Systemd behavior differs across Linux distributions; generated unit/timer validation may be easier than full execution in CI.
    - Upload/preview role image publishing may uncover Dockerfile assumptions currently hidden by source bind mounts.

