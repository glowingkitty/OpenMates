id: unified-server-cli-management
title: Unified Server CLI Management
status: implementing

goal: >
  Make the OpenMates CLI the single supported host-level tool for installing,
  starting, stopping, updating, backing up, restoring, and continuously updating
  all OpenMates server roles: core production, upload, and preview. Updates must
  use prebuilt Docker images by default, minimize downtime, and create a verified
  latest pre-update backup before any data-bearing service is replaced.

scope:
  in:
    - Add first-class server roles for core, upload, and preview server installs.
    - Add profile-aware runtime templates for minimal, standard, and production core deployments.
    - Add service selection and exclusion flags for start, stop, restart, update, logs, and status commands.
    - Package runtime compose templates with the npm CLI so installs do not depend on missing Git tags.
    - Add image-mode upload and preview server templates and image publishing for their OpenMates-built containers.
    - Add backup and restore commands for product-critical user data and optional observability data.
    - Add automatic latest pre-update backup creation before update operations that touch data-bearing roles.
    - Add continuous update mode and systemd installation for unattended host-level image updates.
    - Add update preflight checks that detect newly required environment/API keys before production updates.
    - Add host-level Caddyfile check/apply/status commands so reverse proxy changes are handled by the CLI.
    - Remove or disable web UI initiated server updates, keeping read-only version/update status where useful.
    - Document and test a migration path from the current production source-based compose stacks.
  out:
    - Replacing Vercel-hosted official web app deployment with a Docker webapp container for openmates.org.
    - Building custom OpenMates images locally by default; source mode remains explicit contributor/fork behavior.
    - Automatic rollback of database migrations after a failed update.
    - Restoring arbitrary historical backup retention beyond the latest pre-update backup and user-created backup files.
    - Moving secrets out of Vault or weakening existing upload/preview VM isolation.
    - Apple app changes; this is host/CLI/server infrastructure only.

