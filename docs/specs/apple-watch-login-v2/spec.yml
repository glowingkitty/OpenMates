    - scripts/tests/test_apple_remote_testflight.py
    - scripts/tests/test_apple_remote_watch_debug.py
  parity_expectations:
    - Watch and iPhone must use the same selected OpenMates server for one login attempt.
    - Dev, prod, and self-hosted server selection follows the same intent as CLI/API URL targeting while remaining native and explicit on Watch.
    - Watch remains an independent client after login; iPhone only supplies server-profile context and explicit pair-login approval.
    - Native UI stays OpenMates-styled and must not introduce stock product chrome for app-owned login states.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-watch-login-v2/spec.yml
    - python3 -m pytest scripts/tests/test_apple_remote_testflight.py scripts/tests/test_apple_remote_watch_debug.py
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchPairLoginRuntimeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchEmbedPreviewTests
    - python3 scripts/apple_remote.py verify-watch-startup --simulator "Apple Watch Series 11 (46mm)" --duration 60
  intentional_native_differences:
    - Watch may use a compact custom server picker instead of the full iPhone settings screen.
    - Custom self-host profile setup can use native text fields and confirmation dialogs, but not default `Form`, `List`, or stock sheets.

clarification:
  rounds:
    - question: Should users be able to select a custom/self-hosted domain on Apple Watch, and should a connected iPhone send the actual logged-in account domain to Watch?
      answer: Yes. Users must be able to select a custom domain for self-hosting, and the connected phone should submit the actual domain used for the logged-in account to the Watch.
  vision_summary: >
    Watch login must be environment-aware. If the iPhone is connected and logged
    into dev, prod, or a self-hosted server, Watch uses that same server profile
    for token creation, fallback URL display, and iPhone approval. If the Watch
    is standalone, users can choose OpenMates production, OpenMates dev in debug
    builds, or add a custom HTTPS self-hosted server profile before creating a
    pair token.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Connected iPhone provides active server profile to Watch
    given:
      - Alice is logged into the iPhone app on `app.dev.openmates.org`.
      - Alice opens the unauthenticated Watch app and the paired iPhone is reachable.
    when:
      - WatchConnectivity activates.
    then:
      - The iPhone sends its active `ServerProfile` to Watch through application context or direct message.
      - The profile identifies the dev web, API, WebSocket, and upload endpoints.
      - The Watch displays the dev server label and creates pair tokens only against the dev API.
  - id: S-2
    title: Watch uses selected custom self-hosted server without iPhone
    given:
      - Bob runs a self-hosted OpenMates server at `https://chat.example.com`.
      - Bob opens the Watch app while no iPhone profile is reachable.
    when:
      - Bob chooses Add Custom Server and enters the custom domain.
    then:
      - Watch validates HTTPS and resolves endpoints through discovery or explicit advanced fields.
      - Watch stores the custom `ServerProfile` locally.
      - Watch creates the pair token and QR/fallback URL for that self-hosted profile.
  - id: S-3
    title: iPhone blocks mismatched environment approval
    given:
      - The iPhone is logged into `app.dev.openmates.org`.
      - The Watch sends or displays a pair request for `openmates.org`.
    when:
      - Alice opens the iPhone approval sheet.
    then:
      - The iPhone shows a mismatch message naming both environments.
      - The Allow button is disabled or replaced by a Start New Watch Request action.
      - The iPhone does not call pair authorize against either environment.
  - id: S-4
    title: iPhone approval succeeds for same-profile fresh token
    given:
      - The iPhone and Watch both use the same `ServerProfile`.
      - The Watch created a fresh pair token on that profile.
    when:
      - Alice explicitly taps Allow Watch Login on iPhone.
    then:
      - The iPhone authorizes the token against the same API base URL.
      - The Watch receives only the generated PIN/status metadata and completes pair login against the same API base URL.
      - The Watch stores its own session and master key locally.
  - id: S-5
    title: Expired or missing token is recoverable and not raw backend copy
    given:
      - The iPhone approval sheet is opened after the token expired or against a server where the token does not exist.
    when:
      - The iPhone attempts to validate or authorize the request.
    then:
      - The UI says the Watch request expired or is no longer valid.
      - The UI asks the user to start a new request on Watch.
      - The raw backend text `Pair token not found or expired` is not shown as the primary user-facing error.
  - id: S-6
    title: Watch startup remains alive for crash-debug window
    given:
      - The Watch app is installed from the same archive/TestFlight candidate that will be uploaded.
    when:
      - The remote verifier launches the Watch app and waits 60 seconds.
    then:
      - The Watch process remains alive or exits only through an expected user/system action recorded by the verifier.
      - No crash, watchdog, invalid-signature, or jetsam report is generated for the launch window.
      - Screenshots and logs prove the visible state at 5 seconds and 30 seconds.
  - id: S-7
    title: TestFlight Watch crash diagnostics are collectable
    given:
      - A tester reports a Watch crash from TestFlight.
    when:
      - The team investigates the report.
    then:
      - The team checks Xcode Organizer crashes for the TestFlight build.
      - If Organizer lacks the report, the tester can retrieve Watch crash logs from the paired iPhone diagnostics or share analytics data.
      - For live reproduction, the team can install Apple's watchOS logging profile on the paired iPhone, use Console.app, and collect filtered logs.

