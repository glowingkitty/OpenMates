schema_version: 2
id: apple-watch-login-v2
title: Apple Watch Production-First Pair Login
status: approved

goal: >
  Make Apple Watch login simple and crash-safe: start on OpenMates production,
  keep self-hosting behind one optional manual URL action, always expose the
  regular pair code and optional QR code, and use iPhone approval only when the
  phone is reachable and authenticated to the exact same server.

scope:
  in:
    - Production pair login starts automatically when an unauthenticated Watch has no remembered self-hosted profile.
    - One "Connect self-hosted edition" action reveals a manual HTTPS URL field; app.dev.openmates.org uses this path.
    - A validated self-hosted URL starts a fresh pair attempt and is remembered after successful login.
    - Every active attempt shows its six-character pair code and a "Show QR code" action without waiting for iPhone detection.
    - A matching reachable iPhone may offer explicit approval in parallel with code and QR pairing.
    - A mismatched iPhone never changes the Watch server, restarts pairing, or hides the regular fallback.
    - WatchConnectivity callbacks, server changes, network failures, and repeated view lifecycle events cannot crash or create overlapping attempts.
    - Build-49 crash symbolication and deterministic Watch startup/pairing verification remain required evidence.
  out:
    - Production and development server selector buttons on the default Watch login screen.
    - iPhone-to-Watch server-profile overrides or automatic server switching.
    - Silent iPhone approval without explicit consent.
    - Native signup, password, passkey, recovery-key, or billing flows on Watch.
    - New backend auth endpoints or changed pair-login cryptography.
    - Sending auth cookies, session tokens, encrypted bundles, plaintext master keys, or private user data over WatchConnectivity.

context_discovery:
  github_issues:
    - "GitHub MCP authentication returned 401; gh issue search for Watch pair login, WatchConnectivity, Apple Watch login, and QR login returned no matches."
  docs:
    - docs/specs/apple-watch-support/spec.yml
    - docs/specs/apple-watch-auto-login/spec.yml
    - docs/contributing/guides/spec-driven-development.md
    - docs/self-hosting/setup.md
    - apple/AGENTS.md
  code_patterns:
    - apple/OpenMatesWatch/Sources/WatchPairLoginView.swift currently starts token creation on task entry, renders Production and Dev buttons plus a custom-domain field, and may restart when an iPhone application context supplies another profile.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift owns both pair API sequencing and WatchConnectivity bridges.
    - WatchPhoneLoginBridge currently accepts iPhone application-context server profiles and invokes the view callback from WatchConnectivity lifecycle callbacks.
    - ServerProfile already derives production, app.dev.openmates.org, and app.* self-hosted web/API/WebSocket endpoints.
    - scripts/apple_remote.py already verifies Watch startup lifetime, crash reports, screenshots, and logs.
    - The supplied TestFlight build-49 report is EXC_BREAKPOINT/SIGTRAP on a WatchConnectivity utility queue with two unsymbolicated OpenMatesWatch frames; this implicates the handoff path but does not prove a source line without the matching dSYM.
  tests:
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - apple/OpenMatesTests/WatchEmbedPreviewTests.swift
    - scripts/tests/test_apple_remote_watch_debug.py

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift
    - apple/OpenMatesWatch/Sources/WatchPairLoginView.swift
    - apple/OpenMatesWatch/Sources/WatchAuthStore.swift
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsSessionPairingView.swift
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - apple/OpenMatesTests/WatchEmbedPreviewTests.swift
    - scripts/apple_remote.py
    - scripts/tests/test_apple_remote_watch_debug.py
  parity_expectations:
    - Pair-login API and cryptographic behavior remains identical to web, CLI, and iPhone pair login.
    - Watch owns the selected server for its attempt; iPhone reachability is an optional approval transport, not configuration authority.
    - Watch remains an independent authenticated client after login.
    - Product UI uses generated OpenMates tokens and custom controls rather than stock product chrome.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchPairLoginRuntimeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchEmbedPreviewTests
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py verify-watch-startup --simulator "Apple Watch Series 11 (46mm)" --duration 60
  intentional_native_differences:
    - Watch uses a full-screen QR view sized for scanning.
    - The self-hosted URL field is compact for Watch but preserves the same server endpoint semantics.

clarification:
  rounds:
    - question: What should happen when the reachable iPhone is logged into a different server?
      answer: Keep the Watch server and use the regular code/QR fallback; the iPhone must not override it.
    - question: When should code and QR fallback become available?
      answer: Always show the code immediately while trying a matching iPhone in parallel.
    - question: Should a successfully used self-hosted server be remembered?
      answer: Yes; remember it until the user explicitly changes or clears the Watch login server.
    - question: Does the production-first, optional self-host URL, always-visible fallback flow match the intended product experience?
      answer: Approved.
  vision_summary: >
    Pairing has one default path and one optional server override. Production
    starts automatically, self-host users enter one URL, code and QR are always
    available, and a matching iPhone adds explicit approval without controlling
    the Watch server or pairing lifecycle.
  approved_by_user: true

