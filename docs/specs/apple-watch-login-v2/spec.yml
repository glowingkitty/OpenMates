decisions:
  - id: D-1
    status: active
    decision: The Watch owns server selection; iPhone application context cannot replace it.
    reason: Server overrides make pairing unpredictable and can restart an active attempt.
    decided_at: "2026-07-11T17:45:00Z"
  - id: D-2
    status: active
    decision: Production is the implicit default and self-hosting is one optional manual URL flow.
    reason: Most users need no server decision, while self-host users retain explicit control.
    decided_at: "2026-07-11T17:45:00Z"
  - id: D-3
    status: active
    decision: Pair code and QR remain visible while matching-iPhone approval is attempted in parallel.
    reason: Pairing must not depend on unreliable reachability timing or hidden fallback controls.
    decided_at: "2026-07-11T17:45:00Z"
  - id: D-4
    status: active
    decision: Persist a self-hosted profile only after successful login.
    reason: A mistyped or unreachable URL must not replace the last known working server.
    decided_at: "2026-07-11T17:45:00Z"

