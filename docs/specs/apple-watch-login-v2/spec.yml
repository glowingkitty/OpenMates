id: apple-watch-login-v2
title: Apple Watch Login V2 Server Profiles And Crash-Safe Startup
status: implementing

goal: >
  Make Apple Watch login reliable across production, dev, and self-hosted
  OpenMates servers by introducing an explicit server-profile contract shared
  between iPhone and Watch, preventing environment-mismatched pair approvals,
  supporting custom domains for self-hosters, and requiring deterministic
  Watch startup/crash evidence before TestFlight uploads.

scope:
  in:
    - A reusable Apple `ServerProfile` contract for production, dev, and custom self-hosted servers.
    - Watch server selection when no iPhone profile is available, including custom domain entry.
    - iPhone-to-Watch synchronization of the iPhone app's active logged-in server profile through WatchConnectivity.
    - Pair-login token creation, pair URL display, iPhone approval, and Watch completion all bound to the same server profile.
    - Explicit iPhone approval UI that blocks environment mismatches and expired/missing pair tokens with actionable messages.
    - Watch startup behavior that survives network errors, token creation failures, missing localization/fonts, unreachable iPhone, and invalid server profiles without crashing.
    - Remote Mac/TestFlight debugging workflow for Watch startup crashes, device logs, screenshots, and crash reports.
    - Deterministic `apple_remote.py` verification command for Watch startup/login idle stability before upload.
  out:
    - Silent iPhone approval or automatic login without explicit user consent.
    - Separate watchOS-only TestFlight distribution as the primary shipping path.
    - Native signup, password login, passkey login, recovery-key login, or billing on Watch.
    - CloudKit, iCloud Keychain, or Apple account-based transfer of OpenMates encryption keys.
    - Full self-host installer changes beyond optional discovery metadata consumed by Apple clients.
    - Sending raw auth cookies, session tokens, WebSocket tokens, encrypted bundles, plaintext master keys, or private user data over WatchConnectivity.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials in this session."
    - "Existing Watch specs record previous GitHub issue searches with no matching public issues."
  docs:
    - docs/specs/apple-watch-support/spec.yml
    - docs/specs/apple-watch-auto-login/spec.yml
    - docs/architecture/platforms/cli-package.md
    - docs/self-hosting/setup.md
    - docs/contributing/guides/git-and-deployment.md
    - docs/contributing/guides/spec-driven-development.md
    - "Apple Developer Documentation: Acquiring crash reports and diagnostic logs"
  code_patterns:
    - apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift already persists a selected web domain and derives API URLs for prod, dev, and app.* custom domains.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift currently uses `APIClient.shared` and `APIClient.shared.webAppURL`, so Watch pair token creation and iPhone approval can accidentally target different environments.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift WatchConnectivity request payload currently contains token, pair URL, device name, and timestamp only; it does not include server profile identity or endpoint metadata.
    - apple/OpenMatesWatch/Sources/WatchPairLoginView.swift initiates a pair token immediately on task start and sends iPhone requests when reachable, but has no pre-token server selection state.
    - apple/OpenMates/Sources/App/MainAppView.swift presents pending iPhone Watch approval but currently surfaces raw backend 404 failures for mismatched or expired tokens.
    - scripts/apple_remote.py can build/test/install/launch via the remote Mac wrapper but lacks a single deterministic Watch startup verifier that collects crash logs and screenshots.
    - CLI pair-auth docs derive app URL from API URL for self-hosted installs, and installed self-host configs already model API targeting priority.
  tests:
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - apple/OpenMatesTests/WatchEmbedPreviewTests.swift
    - scripts/tests/test_apple_remote_testflight.py

