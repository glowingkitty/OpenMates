assumptions:
  - id: A-1
    text: Existing Apple `ServerConfiguration` can be extended into a richer `ServerProfile` without changing backend auth endpoints.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift
        summary: Current code already stores selected/custom domains and derives API URLs for prod, dev, and app.* custom domains.
  - id: A-2
    text: Custom self-hosted servers may not yet expose a discovery document, so advanced manual endpoint entry is required for V2.
    category: self_hosting
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/self-hosting/setup.md
        summary: Self-hosting docs describe local API targets and CLI server config but no mandatory Apple discovery document.
  - id: A-3
    text: TestFlight Watch crash reports may be delayed or absent from Organizer, so direct device/simulator log collection remains required.
    category: debugging
    required_before: implementation
    status: confirmed
    evidence:
      - source: Apple Developer Documentation, Acquiring crash reports and diagnostic logs
        summary: Organizer collects TestFlight crashes, but watchdog, invalid-signature, thermal, and jetsam events require direct device logs.

contracts:
  api:
    - route: POST /v1/auth/pair/initiate
      behavior: Called by Watch against the selected `ServerProfile.apiBaseURL` only.
      errors:
        - Network or 4xx/5xx errors keep Watch on a recoverable server/login state and do not crash.
    - route: POST /v1/auth/pair/authorize/{token}
      behavior: Called by iPhone against the request profile only after profile match and explicit user consent.
      errors:
        - 404 or expired token maps to a restart-request message.
    - route: POST /v1/auth/pair/complete/{token}
      behavior: Called by Watch against the same profile after receiving PIN approval.
  data:
    - name: ServerProfile
      fields:
        id: "Stable identifier such as `prod`, `dev`, or custom UUID."
        display_name: "User-visible label, for example `OpenMates`, `OpenMates Dev`, or `Self-hosted example.com`."
        web_base_url: HTTPS web app URL used for pair links.
        api_base_url: HTTPS API URL used for pair endpoints and future API calls.
        ws_base_url: WSS URL used after login.
        upload_base_url: HTTPS upload URL when available; may default to API/upload for self-hosted profiles.
        source: "`builtin`, `iphone`, `discovery`, or `manual`."
        verified: Whether discovery or iPhone context confirmed the profile.
    - name: WatchConnectivity login request
      fields:
        - kind
        - token
        - token_hash_prefix
        - pair_url
        - device_name
        - created_at
        - server_profile
      forbidden_fields:
        - master_key
        - master_key_exported
        - session_token
        - ws_token
        - cookie
        - auth_cookie
        - encrypted_bundle
  ui_states:
    - Watch server selection before token creation.
    - Watch connected-iPhone profile received.
    - Watch custom server validation/discovery loading.
    - Watch custom server validation error.
    - Watch pair token creating.
    - Watch waiting for iPhone confirmation.
    - Watch manual fallback URL/token/QR.
    - iPhone profile mismatch approval blocked.
    - iPhone expired token restart request.
    - iPhone approved/denied/error.
  privacy_security:
    - Server profile sync is not an auth grant; it only selects endpoints.
    - iPhone approval remains explicit.
    - WatchConnectivity payloads never include auth secrets or encrypted login bundles.
    - Logs include token hash prefix and profile ID only, never full token, cookies, master keys, user plaintext, or private self-host credentials.

