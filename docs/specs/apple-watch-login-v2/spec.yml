implementation_plan:
  spec_path: docs/specs/apple-watch-login-v2/spec.yml
  existing_patterns:
    - PairLoginRuntime profile-scoped API requests and encrypted bundle completion.
    - ServerProfile endpoint derivation and persistence.
    - WatchPairLoginConnectivityPayload exact-profile validation and forbidden-key audit.
  architecture: >
    Add a small pure WatchPairAttempt model beside PairLoginRuntime so iOS-hosted
    XCTest can prove transition ordering without importing the Watch UI target.
    WatchPairLoginState remains the MainActor owner of one attempt generation,
    one initiation task, and one poll task. Each async result carries the
    generation and immutable ServerProfile and is discarded when either differs.
    WatchPhoneLoginBridge reports reachability and approval PINs only; it no
    longer reads or forwards iPhone application-context profiles. The iPhone
    keeps exact-profile validation and does not expose a mismatched request for
    approval.
  boundaries:
    - No backend route, payload cryptography, or login bundle change.
    - Watch server selection is local Watch state, not WCSession application context.
    - Existing iPhone ServerConfiguration remains authoritative for iPhone requests only.
    - The self-host profile is committed to Watch persistence only from completePairLogin success.
  data_flow:
    - A fresh Watch resolves production; a Watch with a prior successful self-host login resolves that local profile.
    - Generation 1 initiates against api.openmates.org and renders CODE01 plus https://openmates.org/#pair=CODE01.
    - The same request is offered to a reachable iPhone, but code and QR stay rendered regardless of reply timing.
    - If the user confirms app.dev.openmates.org, generation 1 is cancelled before generation 2 initiates against api.dev.openmates.org.
    - A late generation-1 poll, approval, or reachability callback is ignored by identity checks.
    - A matching iPhone explicitly authorizes generation 2 and returns PIN metadata; a production iPhone ignores the dev request.
    - Successful Watch completion persists the dev profile; initiation, polling, validation, or completion failure leaves prior persistence unchanged.
  api_impact:
    - Existing pair endpoints receive the same request and response schemas.
    - Every request uses the immutable profile captured by its WatchPairAttempt.
  data_impact:
    - Add one Watch-local encoded successful ServerProfile value and one explicit reset operation.
    - Do not migrate the current transient selector value because unsuccessful selections are not trusted.
  ui_impact:
    - Remove Production and Dev selector buttons and always-visible custom-domain field.
    - Keep code and QR action visible whenever initiation succeeds.
    - Add one collapsed self-host action, URL entry, validation error, and cancel/confirm controls.
  privacy_security_impact:
    - Keep exact-profile authorization and the existing forbidden-key payload audit.
    - Do not log raw manual URLs beyond sanitized host labels, pair tokens, PINs, or pair URL fragments.
  migration_rollout:
    - Existing authenticated Watch sessions continue unchanged.
    - Existing unauthenticated server-selector state is intentionally discarded; production is used unless a prior successful self-host profile exists.
    - Gate TestFlight upload on targeted tests, Watch build, startup verifier, and no new crash report in the verification window.
  observability:
    - Log attempt generation, sanitized profile ID/host class, transition name, and stale-result rejection through NativeDiagnostics.
    - Preserve the startup verifier crash scan and screenshots at its existing checkpoints.
    - Symbolicate build 49 when its dSYM is available; do not block test-first implementation on unavailable historical symbols.
  affected_files:
    - path: apple/OpenMatesWatch/Sources/WatchPairLoginView.swift
      reason: Simplify UI and route all transitions through one attempt state.
    - path: apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift
      reason: Add the pure attempt transition contract, remove iPhone server override, and make connectivity callbacks idempotent.
    - path: apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift
      reason: Validate and persist only successful self-host profiles.
    - path: apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
      reason: Add state-machine, mismatch, lifecycle, and persistence regression tests.
    - path: apple/OpenMatesTests/WatchEmbedPreviewTests.swift
      reason: Lock the simplified Watch login UI contract.
  verification_strategy:
    - Run T-APPLE-001, T-APPLE-002, and T-APPLE-003 red against the current source before production changes.
    - Run the same targeted unit tests green after the state model and UI changes.
    - Run `python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"`.
    - Run T-APPLE-005 to verify startup plus pairing idle stability and collect screenshots/crash scan.
    - Run `python3 scripts/spec_verify.py docs/specs/apple-watch-login-v2/spec.yml` before completion.
  required_assumption_checks:
    - A-1 and A-2 are confirmed from current source and do not block implementation.
    - A-3 must be rechecked from the release archive before final root-cause reporting but does not block the replacement flow.
  acceptance_criteria_mapping:
    - AC-1 -> T-APPLE-001, T-APPLE-002, T-APPLE-005
    - AC-2 -> T-APPLE-001, T-APPLE-002
    - AC-3 -> T-APPLE-001, T-APPLE-003
    - AC-4 -> T-APPLE-001, T-APPLE-003
    - AC-5 -> T-APPLE-001, T-APPLE-004, T-APPLE-005
    - AC-6 -> T-APPLE-001
  verification_order:
    - Apple unit contract tests because this behavior is native-only.
    - Watch build.
    - Watch startup/pairing runtime verification.
    - TestFlight hardware confirmation.
  first_slice: Add pure transition tests proving one production attempt, immutable server ownership, and stale callback rejection.
  open_questions: []
  risks:
    - risk: WCSession reachability can change before activation completes.
      mitigation: Reachability only controls optional request delivery and never creates or mutates an attempt.
    - risk: SwiftUI task re-entry can create duplicate network work.
      mitigation: Attempt generation and stored task ownership make startup idempotent and cancellation explicit.
    - risk: Historical crash symbols may remain unavailable.
      mitigation: Keep the report as a bounded hypothesis and require deterministic no-crash runtime evidence for the replacement flow.

