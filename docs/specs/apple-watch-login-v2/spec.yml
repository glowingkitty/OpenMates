contracts:
  api:
    - route: POST /v1/auth/pair/initiate
      behavior: Called once per current Watch attempt against that attempt's immutable server profile.
      errors:
        - Network and HTTP errors render a recoverable retry state and do not persist the attempted profile.
    - route: GET /v1/auth/pair/poll/{token}
      behavior: Polling is scoped to the current token and immutable server profile; stale results are ignored.
    - route: POST /v1/auth/pair/authorize/{token}
      behavior: Called by iPhone only after exact profile match and explicit user approval.
    - route: POST /v1/auth/pair/complete/{token}
      behavior: Called by Watch against the same profile that created the token.
  data:
    - name: WatchPairAttempt
      fields:
        attempt_id: Unique local identity used to reject stale callbacks.
        server_profile: Immutable production or validated self-hosted profile.
        token: Current uppercase pair token after initiation.
        pair_url: Pair URL derived from the immutable profile.
        phase: idle, initiating, waiting, completing, failed, or expired.
    - name: WatchConnectivity request
      fields: [kind, token, pair_url, device_name, created_at, server_profile]
      forbidden_fields: [master_key, master_key_exported, session_token, ws_token, cookie, auth_cookie, encrypted_bundle]
  ui_states:
    - Production initiation loading.
    - Code and "Show QR code" visible for every active attempt.
    - Matching-iPhone approval available without hiding fallback.
    - '"Connect self-hosted edition" collapsed and expanded URL-entry states.'
    - Self-host URL validation and network error states.
    - Expired attempt with explicit retry.
  privacy_security:
    - Server selection is not an auth grant.
    - iPhone approval remains explicit and exact-profile only.
    - No forbidden auth or encryption secret crosses WatchConnectivity.
    - Diagnostics never log full tokens, pair URLs, credentials, private paths, or self-host secrets.

