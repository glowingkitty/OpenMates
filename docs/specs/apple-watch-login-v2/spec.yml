scenarios:
  - id: S-1
    title: Production pairing starts with code and QR available
    given:
      - Alice opens an unauthenticated Watch with no remembered self-hosted profile.
    when:
      - The login view becomes active.
    then:
      - Exactly one token is created against api.openmates.org.
      - The six-character code is visible as soon as initiation succeeds.
      - A "Show QR code" button opens the production pair URL.
      - No Production or Dev selector is shown.

  - id: S-2
    title: Self-hosted URL starts a fresh stable attempt
    given:
      - Bob needs app.dev.openmates.org or another HTTPS self-hosted server.
    when:
      - Bob taps "Connect self-hosted edition", enters the URL, and confirms it.
    then:
      - The URL is validated before token creation.
      - Any production attempt is cancelled before one self-hosted attempt starts.
      - Code and QR use the self-hosted web URL and API endpoint.
      - The profile is persisted only after successful login.

  - id: S-3
    title: Matching iPhone offers explicit approval in parallel
    given:
      - The Watch has an active production or self-hosted token.
      - A reachable iPhone is authenticated to the exact same server.
    when:
      - WatchConnectivity delivers the request.
    then:
      - The iPhone offers explicit approval.
      - The Watch continues showing code and QR while waiting.
      - Approval returns only PIN and non-secret status metadata.
      - Watch completes login against the server that created the token.

  - id: S-4
    title: Mismatched or unavailable iPhone does not alter pairing
    given:
      - The Watch has an active token for one server.
      - The iPhone is unreachable or authenticated to another server.
    when:
      - Reachability or application context changes.
    then:
      - The Watch server and active token remain unchanged.
      - No replacement token is created due to iPhone state.
      - Code and QR pairing remains available.

  - id: S-5
    title: Pairing transitions cannot crash or overlap
    given:
      - WatchConnectivity activation, reachability, application-context, SwiftUI task, and network callbacks may arrive in any order.
    when:
      - The login view starts, restarts, changes to self-hosted, or receives iPhone callbacks.
    then:
      - State mutation occurs on the required actor.
      - At most one initiation and one polling task are active.
      - Stale callbacks cannot mutate the current attempt.
      - The Watch process remains alive and errors are recoverable.

  - id: S-6
    title: Remembered self-hosted login restores the correct server
    given:
      - Bob previously completed login against a validated self-hosted profile.
    when:
      - The Watch restores its session or later returns to unauthenticated pairing.
    then:
      - The successful self-hosted profile is restored.
      - Failed URL attempts never replace it.
      - An explicit server reset returns pairing to production.

