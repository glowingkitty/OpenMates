implementation_plan:
  existing_patterns:
    - apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift domain persistence and API derivation.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift pair-login cryptography and WatchConnectivity payload helpers.
    - scripts/apple_remote.py remote Mac build/test/upload wrapper.
  architecture: >
    Extract the native endpoint selection into a `ServerProfile` model that can
    be serialized over WatchConnectivity and used to construct profile-scoped
    API clients for pair-login. The iPhone sends its active logged-in profile to
    Watch when reachable; Watch uses a local profile picker otherwise. Pair-login
    approval compares profiles before authorization. Remote verification gains a
    startup verifier that fails on crash, process exit, or missing diagnostics.
  data_flow:
    - iPhone app selects and persists active ServerProfile for the logged-in account.
    - iPhone publishes active ServerProfile to Watch via WatchConnectivity application context.
    - Watch displays profile selection or received profile before creating a token.
    - Watch initiates pair login against profile.api_base_url and displays profile.web_base_url/#pair=TOKEN.
    - iPhone receives Watch request with profile metadata and blocks if it differs from active profile.
    - iPhone authorizes fresh same-profile token after explicit approval and returns PIN only.
    - Watch completes pair login against the same profile and stores session/master key locally with profile metadata.
  affected_files:
    - path: apple/OpenMates/Sources/Core/Networking/ServerConfiguration.swift
      reason: Add ServerProfile model, discovery/manual custom endpoint validation, and serialization.
    - path: apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift
      reason: Make pair-login profile-scoped and add profile-aware WC payload validation.
    - path: apple/OpenMatesWatch/Sources/WatchPairLoginView.swift
      reason: Add server picker/custom domain state before token creation and profile-aware fallback display.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Route profile-aware Watch approval and block mismatches.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsSessionPairingView.swift
      reason: Show selected server, mismatch, expired, and restart-request approval states.
    - path: scripts/apple_remote.py
      reason: Add deterministic Watch startup/crash verification command.
    - path: scripts/tests/test_apple_remote_watch_debug.py
      reason: Guard the new remote Watch debug workflow.
  verification_strategy:
    - Run red phase for listed tests before implementation.
    - Implement profile model and tests first.
    - Implement Watch UI/server selection and approval mismatch handling.
    - Add remote startup verifier before any TestFlight upload.
    - Run green verification in pytest -> Apple unit tests -> Watch build -> Watch startup verifier order.
  verification_order:
    - python3 -m pytest scripts/tests/test_apple_remote_watch_debug.py
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchPairLoginRuntimeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchEmbedPreviewTests
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py verify-watch-startup --simulator "Apple Watch Series 11 (46mm)" --duration 60

