schema_version: 2
id: code-image-to-html
title: Code Image To HTML Skill
status: implementing

goal: >
  Add a Code app skill that turns an uploaded screenshot or existing image embed
  into a standalone HTML code embed with inline CSS and optional inline JS, using
  Gemini Pro for generation and isolated E2B browser rendering for visual feedback
  so OpenMates can match or exceed the useful quality observed from a reference
  implementation without executing untrusted generated code on OpenMates hosts.

scope:
  in:
    - New Code app skill `image_to_html` exposed through chat, REST, CLI, npm SDK, and pip SDK app-skill surfaces.
    - Input from uploaded image bytes (`image_base64`, `mime_type`, optional `filename`) and chat-bound existing image embed references.
    - No arbitrary remote `image_url` input in v1.
    - Gemini Pro quality generation using a reference-like agent loop with file creation/edit tools and E2B-rendered screenshot feedback.
    - User-configurable `max_correction_passes` with default 2, minimum 0, maximum 5.
    - Strict final output as one complete `index.html` with inline CSS and optional inline JS only.
    - Deterministic validation that forbids external URLs, `local-assets`, remote fonts/icons/scripts/images, unsafe HTML, and broken asset references.
    - One deterministic repair attempt when validation fails; validation repair does not count as a visual correction pass.
    - E2B isolated Chromium/Playwright render helper for generated HTML screenshots and visual feedback.
    - Actual-cost metered billing with an upfront max credit reservation, Gemini token usage, E2B render duration, margin/minimum, and itemized usage metadata.
    - Chat-bound runs create a durable `code-code` embed containing generated HTML plus latest E2B render screenshot metadata.
    - Direct REST/CLI/SDK calls without `chat_id` return long-running task metadata first; the worker result contains generated HTML, screenshot artifact metadata when stored, and usage metadata without silently creating a chat.
    - Store the latest successful E2B render screenshot as a lightweight encrypted generated asset linked to the code embed for chat-bound runs.
    - Regression evals using the prior simple card, complex dashboard, and Figma OpenMates tasks screenshots, with input/output images sent to Discord for user confirmation.
  out:
    - Pixel-perfect design conversion guarantees.
    - Multi-file `code.application` output in v1.
    - Tailwind, React, Vue, Bootstrap, Ionic, or external CDN dependencies in v1 output.
    - Arbitrary `image_url` fetching or backend SSRF-protected remote image import in v1.
    - Upstream asset extraction or image-generation tools that create `local-assets` references.
    - Running generated HTML/JS in local Playwright on OpenMates API or worker hosts.
    - Storing full rendered DOM snapshots.
    - Public deploy/hosting of generated HTML.
    - Apple-specific native generation UI in the first implementation slice.

