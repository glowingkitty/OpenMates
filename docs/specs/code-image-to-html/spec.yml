decisions:
  - id: D-1
    status: active
    decision: Build an OpenMates-native implementation instead of vendoring the reference app wholesale.
    reason: The reference is MIT and legally reusable, but its WebSocket/frontend flow, external asset defaults, and local Playwright assumptions do not match OpenMates architecture.
    decided_at: "2026-07-21T00:00:00Z"
  - id: D-2
    status: active
    decision: Use E2B for all generated HTML browser rendering and screenshot feedback.
    reason: Generated HTML/JS is untrusted code and must not execute on OpenMates API or worker hosts.
    decided_at: "2026-07-21T00:00:00Z"
  - id: D-3
    status: active
    decision: Default `max_correction_passes` is 2 with bounds 0 through 5.
    reason: This preserves reference-like iterative quality while capping cost and latency.
    decided_at: "2026-07-21T00:00:00Z"
  - id: D-4
    status: active
    decision: V1 supports only image bytes and existing image embed refs, not remote image URLs.
    reason: Avoids SSRF, redirect, large-response, and internal-network fetch risk in the MVP.
    decided_at: "2026-07-21T00:00:00Z"
  - id: D-5
    status: active
    decision: Use actual-cost metered billing with a max reservation and itemized usage metadata.
    reason: Gemini token cost and E2B render duration vary materially by image complexity and correction-pass count.
    decided_at: "2026-07-21T00:00:00Z"

