contracts:
  api:
    - route: POST /v1/apps/code/skills/image_to_html
      access_model: first-party session and developer API-key REST app-skill endpoint
      auth: session cookie or Bearer API key, matching existing app-skill routes
      rate_limits: per-user app-skill limits plus provider concurrency limits for Gemini and E2B render jobs
      credit_budget: requires max reservation before task dispatch and repeats headroom preflight before provider calls; fails with 402 when the authenticated user cannot cover reservation
      encryption_boundary: accepts decrypted image bytes in request body for direct calls or resolves encrypted image embeds only for authorized chat-bound users; returns decrypted generated HTML only through the authorized task result or encrypted code embed
      request: >
        { requests: [{ image_base64?: string, mime_type?: "image/png"|"image/jpeg"|"image/webp", filename?: string,
        source_image_ref?: string, source_image_embed_id?: string, prompt?: string, chat_id?: string,
        message_id?: string, max_correction_passes?: integer, quality?: "standard" }] }
      response: >
        { success: true, data: { task_id: string, embed_id: string, status: "processing",
        results: [{ task_id: string, embed_id: string, status: "processing", reserved_credits: integer }] },
        credits_charged: 0 }
      final_task_result: >
        { status: "finished", embed_id: string, html: string, latest_screenshot?: object,
        usage: { model: string, input_tokens?: integer, output_tokens?: integer,
        cache_read_tokens?: integer, cache_write_tokens?: integer, e2b_render_seconds: number,
        reserved_credits: integer, credits_charged: integer } }
      errors:
        - 400 for missing image, malformed base64, unsupported MIME type, over-limit image bytes/pixels, forbidden `image_url`, invalid correction pass bounds, or final validation failure.
        - 401 for unauthenticated calls.
        - 402 for insufficient credits to reserve the maximum configured budget.
        - 403 for unauthorized `source_image_embed_id` or chat access.
        - 429 for per-user, Gemini, or E2B concurrency/rate limits.
        - 502 for provider failures after visible structured error handling.
  cli:
    - command: openmates apps code image_to_html --file pricing-card.png
      behavior: Reads local image bytes, base64-encodes them, sends one request, prints task metadata, and follows the existing app-skill task-status flow for final HTML.
    - command: openmates apps code image_to_html --file dashboard.png --max-correction-passes 4 --json
      behavior: Emits structured JSON including task metadata first and final task-result HTML, screenshot metadata when present, correction passes, and usage metadata after completion.
    - command: openmates apps code image_to_html --input '{...}'
      behavior: Advanced users can call the generic app-skill payload with the same schema and bounds.
  npm_sdk:
    - method: client.apps.code.imageToHtml(input, options)
      behavior: Generated facade posts the canonical app-skill payload and the npm SDK base client polls `/v1/tasks/{task_id}` to return the final task-result HTML and usage metadata in the original response envelope.
  pip_sdk:
    - method: client.apps.code.image_to_html(input, prompt_injection_protection=None)
      behavior: Generated facade posts the canonical app-skill payload and the Python SDK base client polls `/v1/tasks/{task_id}` to return the final task-result HTML and usage metadata in the original response envelope.
  data:
    - "Chat-bound output is a `code-code` embed with `language: html`, `filename: index.html`, `line_count`, generated HTML, `latest_screenshot_url`, `latest_screenshot`, `latest_screenshot_captured_at`, and `image_to_html_metadata`."
    - Direct output without chat context does not create chat records; final HTML is returned through task status, and any stored screenshot artifact is explicitly tied to the requesting user/embed identifier.
    - Screenshot assets are encrypted at rest using generated-asset storage, include width/height/mime metadata, and use short-lived signed download URLs.
    - Usage records include app_id, skill_id, provider/model, token counts, E2B render seconds, correction passes used, validation repair count, chat/embed IDs when present, and final credits charged.
  privacy_security:
    - The backend never logs raw image bytes, full generated HTML, API keys, Vault keys, raw screenshot S3 keys with tokens, or user local file paths beyond sanitized basenames.
    - E2B render sandboxes receive generated HTML and no OpenMates auth cookies, user credentials, Vault keys, chat keys, or provider secrets except the E2B credential used by OpenMates to create the sandbox.
    - E2B render helper disables or tightly controls outbound network where feasible; output validation must still forbid external refs because generated HTML must be portable and inline-only.
    - Prompt-injection output safety remains active for app-skill responses; generated HTML is user-requested code and must be visibly returned as code, not model instructions.
    - Image bytes are bounded by max size and max pixel count before provider calls.

