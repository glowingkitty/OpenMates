scenarios:
  - id: S-1
    title: Chat user generates standalone HTML from an uploaded screenshot
    given:
      - Alice is authenticated in a normal OpenMates chat.
      - Alice uploads `pricing-card.png` and asks Code to turn it into HTML.
      - Alice has enough credits for the maximum reserved budget.
    when:
      - The assistant invokes `code.image_to_html` with the uploaded image reference and default correction settings.
    then:
      - OpenMates resolves and decrypts the referenced image bytes server-side for the skill.
      - Gemini Pro creates a complete `index.html` using inline CSS and optional inline JS only.
      - E2B renders the generated HTML and returns a screenshot for model feedback.
      - The model may edit the HTML through the correction loop, up to the default correction-pass budget.
      - Final validation rejects external URLs, `local-assets`, remote fonts/icons/scripts/images, and unsafe HTML before embed creation.
      - "The chat receives one finished `code-code` embed with `language: html`, `filename: index.html`, the generated HTML, usage metadata, and latest screenshot metadata."
      - The latest screenshot is an encrypted generated asset linked to the code embed.

  - id: S-2
    title: Direct CLI generation starts worker task without creating a chat
    given:
      - Alice is logged in through the OpenMates CLI.
      - Alice has a local file `dashboard.png` and enough credits.
    when:
      - Alice runs `openmates apps code image_to_html --file dashboard.png --max-correction-passes 2 --json`.
    then:
      - The CLI reads the local file, validates basic size/type limits, base64-encodes the bytes, and posts to `/v1/apps/code/skills/image_to_html`.
      - "The backend validates input and credit reservation, dispatches the Code worker, and returns `task_id`, `embed_id`, and `status: processing`."
      - The worker performs generation, E2B render feedback, validation, actual-cost billing, and exposes final HTML plus usage metadata through task status.
      - No chat or message is silently created.

  - id: S-3
    title: API and SDK callers get itemized actual-cost usage
    given:
      - A developer calls the npm SDK or pip SDK with `image_base64`, `mime_type`, and `max_correction_passes`.
    when:
      - The request is accepted and the worker completes successfully.
    then:
      - "The initial response includes `task_id`, `embed_id`, `status: processing`, and reserved credits."
      - The final worker result includes Gemini model, input tokens, output tokens, cache read/write tokens when available, E2B render seconds, correction passes used, reserved credits, final credits charged, and any refunded/unused reservation amount.
      - The usage entry records app_id `code`, skill_id `image_to_html`, provider/model, token usage, E2B seconds, and whether the run was chat-bound or direct.

  - id: S-4
    title: Validation failure triggers one repair then fails visibly if still unsafe
    given:
      - Gemini emits HTML containing Google Fonts, Font Awesome, `local-assets`, or remote image references.
    when:
      - The backend validates the generated HTML.
    then:
      - The backend sends deterministic validation errors to the model for one repair attempt.
      - If the repaired HTML is valid, generation continues normally and validation repair is recorded without consuming a visual correction pass.
      - If repaired HTML still violates policy, the skill returns a visible structured failure and does not create a chat embed.
      - Any billable Gemini/E2B usage that already occurred is charged and itemized.

  - id: S-5
    title: Unsafe or unsupported image input is rejected before provider calls
    given:
      - Alice sends missing image data, malformed base64, an unsupported MIME type, an oversized image, an image with too many pixels, or an `image_url` field.
    when:
      - The app-skill endpoint validates the request.
    then:
      - The request fails with a 400-class structured error before Gemini or E2B is called.
      - No provider usage or credits are charged.
      - Logs do not include image bytes or sensitive local filenames.

  - id: S-6
    title: Quality regression evals match or exceed reference Pro baseline
    given:
      - The implementation includes deterministic eval fixtures for simple card, complex dashboard, and Figma OpenMates tasks screenshots.
    when:
      - The eval script runs with the configured Gemini and E2B provider credentials.
    then:
      - Each eval produces generated HTML and a rendered screenshot.
      - Results are not obviously worse than the prior reference Gemini Pro outputs for the same input.
      - Input and output screenshots are sent to Discord for user confirmation.
      - The spec records the eval command, run id, timestamp, subject commit, token usage, E2B duration, and Discord delivery status.

  - id: S-7
    title: Generated HTML is never rendered on OpenMates hosts
    given:
      - Generated HTML includes JavaScript that attempts to access browser APIs or exfiltrate data.
    when:
      - The backend needs a render screenshot for feedback or storage.
    then:
      - Rendering happens only inside an E2B sandbox without OpenMates auth cookies, Vault keys, API tokens, user localStorage, or OpenMates IndexedDB.
      - The sandbox receives only the generated HTML and no user secrets.
      - The sandbox is stopped after the bounded render operation.

  - id: S-8
    title: Existing code embed renderers tolerate screenshot metadata
    given:
      - A chat contains a `code-code` embed generated by `image_to_html`.
    when:
      - Web, CLI, SDK, and Apple clients load the embed.
    then:
      - All clients can still access/copy/download the HTML code content.
      - Clients that understand `latest_screenshot_url` may show the generated render screenshot.
      - Clients that do not yet show the screenshot ignore the optional fields without crashing.

