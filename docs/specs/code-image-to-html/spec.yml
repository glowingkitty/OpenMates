risks:
  - id: R-1
    risk: Provider token cost can exceed expectations for very large screenshots or high correction-pass counts.
    mitigation: Enforce max reservation, image size/pixel limits, correction-pass cap, and visible itemized billing.
  - id: R-2
    risk: E2B sandbox render setup may be slower or more expensive than expected.
    mitigation: Use one short-lived render helper, timeouts, cleanup, and record E2B seconds separately from LLM tokens.
  - id: R-3
    risk: Inline-only validation may reduce visual fidelity by banning remote fonts/icons/assets.
    mitigation: Prefer CSS-drawn approximations, validation repair, and clear product positioning as starter HTML rather than pixel-perfect output.
  - id: R-4
    risk: Chat-bound screenshot asset storage may require generated-asset service generalization.
    mitigation: Add focused tests proving `code-code` embed screenshot indexing and fallback direct artifact behavior.

open_questions:
  - id: OQ-1
    question: What exact credit conversion and margin constants should production use for Gemini token dollars and E2B render seconds?
    status: implementation_default_needed
    plan: Start with configurable environment defaults and record final chosen values in app.yml/provider config during TASK-4.
