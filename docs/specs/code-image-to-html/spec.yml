implementation_plan:
  spec_path: docs/specs/code-image-to-html/spec.yml
  architecture: >
    Implement `code.image_to_html` as an OpenMates-native long-running app skill:
    the Code skill validates and dispatches Celery, shared provider/services own
    image validation, HTML validation, Gemini/E2B orchestration, and the Code
    worker owns embed/screenshot persistence plus billing. The dynamic app-skill
    endpoint remains the single REST contract for chat, CLI, npm SDK, and pip SDK
    callers.
  existing_patterns:
    - Reuse dynamic app-skill endpoint `/v1/apps/code/skills/image_to_html` for REST, CLI, npm SDK, and pip SDK parity.
    - Reuse E2B credential resolution from `backend/shared/providers/e2b_code_runner.py`.
    - Reuse generated-asset thumbnail storage pattern from application preview, generalized for `code-code` embeds.
    - Reuse generic app-skill SDK generation instead of hand-writing SDK methods when possible.
  data_flow:
    - Caller sends base64 image bytes or a chat-bound image embed reference to `/v1/apps/code/skills/image_to_html`.
    - Skill validates image MIME, bytes, correction-pass bounds, auth context, and credit reservation, then dispatches `apps.code.tasks.skill_image_to_html` to `app_code`.
    - Worker repeats credit headroom preflight, calls Gemini Pro, renders generated HTML screenshots in E2B, and returns image bytes for feedback.
    - Worker validates final inline-only HTML and performs one validation repair if needed.
    - Chat-bound success finalizes a `code-code` embed and stores encrypted latest render screenshot metadata; direct success exposes HTML and usage through task status.
    - Worker billing records actual Gemini token usage, E2B render seconds, correction passes, reservation, and final credits charged.
  affected_files:
    - path: backend/apps/code/app.yml
      reason: Register the new app skill, pricing metadata, tool schema, and optional code embed screenshot metadata fields.
    - path: backend/apps/code/skills/image_to_html_skill.py
      reason: Implement the Code app skill request validation and Celery dispatch contract.
    - path: backend/apps/code/tasks/image_to_html_task.py
      reason: Run Gemini/E2B generation, actual-cost billing, encrypted screenshot indexing, and final embed delivery in the app_code worker.
    - path: backend/apps/base_app.py
      reason: Pass in-process service metadata such as SecretsManager through app-skill dispatch for provider-backed skills.
    - path: backend/core/api/app/routes/apps_api.py
      reason: Apply image_to_html preflight budget reservation and result-declared variable billing in the dynamic REST skill route.
    - path: backend/shared/providers/image_to_html_generator.py
      reason: Encapsulate Gemini agentic generation and correction loop.
    - path: backend/shared/providers/e2b_html_renderer.py
      reason: Render untrusted HTML inside E2B and return screenshot bytes/metadata.
    - path: backend/shared/python_utils/code_html_validation.py
      reason: Provide deterministic inline-only HTML validation and safe repair error messages.
    - path: backend/tests/test_code_image_to_html_skill.py
      reason: Cover skill input validation and async dispatch behavior.
    - path: backend/tests/test_code_image_to_html_task.py
      reason: Cover worker generation, billing metadata, task result, and embed/screenshot persistence seams with injected fakes.
    - path: backend/tests/test_code_image_to_html_billing.py
      reason: Cover reservation, actual-cost charging, and usage metadata.
    - path: backend/tests/test_code_html_validation.py
      reason: Cover inline-only validation edge cases.
    - path: backend/tests/test_e2b_image_to_html_renderer.py
      reason: Cover E2B render planning and no-local-Playwright boundary.
    - path: backend/tests/test_image_to_html_generator.py
      reason: Cover Gemini orchestration, validation repair, and E2B render screenshot feedback with injected fakes.
    - path: backend/tests/test_apps_api.py
      reason: Cover result-declared variable billing and preflight reservation helpers for image_to_html REST calls.
