clarification:
  rounds:
    - question: Should the first MVP create only standalone HTML with inline CSS/JS, or also runnable multi-file applications?
      answer: Focus first on creating an HTML embed with inline CSS and JS.
    - question: Should E2B be used for Playwright/browser rendering instead of running Playwright on OpenMates hosts?
      answer: Yes. Use E2B for Playwright execution/evaluation, and include E2B usage in billing.
    - question: Should the rendered screenshot be stored with the generated code embed?
      answer: Yes. Store the latest successful E2B-rendered screenshot as encrypted generated-asset metadata linked to the chat-bound code embed, similar to application embed screenshots.
    - question: How should direct CLI/SDK calls behave when there is no chat/embed context?
      answer: "Follow the existing long-running app-skill pattern. Return `task_id`, `embed_id`, and `status: processing` immediately; expose the final HTML, screenshot artifact metadata, and usage metadata through the worker task result. Do not silently create a chat."
    - question: Should v1 accept `image_url`?
      answer: No. Keep v1 to base64/file upload and existing image embed refs because image URL fetching adds SSRF and fetch-abuse risks.
    - question: How many correction passes should the quality loop support?
      answer: Match the reference implementation's quality/correction-loop spirit and allow users to define a custom correction pass count while keeping a default.
  vision_summary: >
    The feature should be a production OpenMates Code app skill that creates a
    useful starter HTML code embed from a screenshot, not a pixel-perfect design
    converter. It should recreate the useful reference agentic flow in OpenMates
    architecture, with Gemini Pro generation, E2B-isolated browser rendering,
    actual-cost credit billing, inline-only output validation, screenshot artifact
    storage for chat-bound embeds, and REST/CLI/npm/pip readiness before web and
    Apple parity work.
  approved_by_user: true

