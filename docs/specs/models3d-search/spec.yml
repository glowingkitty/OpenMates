schema_version: 2
id: models3d-search
title: 3D Models Search Skill And Result Embeds
status: implementing

goal: >
  Add an enabled-by-default `models3d.search` skill that finds existing 3D
  models from supported public catalogs and returns a parent search embed with
  child 3D model result embeds. V1 is a low-cost discovery and link-out flow:
  it shows provider metadata and preview images, but does not download full
  model files, execute external JavaScript, or render interactive third-party
  model viewers inside OpenMates.

scope:
  in:
    - Add `models3d.search` under the existing canonical `models3d` app while keeping `models3d.generate` disabled by default until Hi3D credits or an approved waiver allow real-provider verification.
    - Search existing 3D model catalogs using the Printables browser-facing endpoint as the only current provider.
    - Mark Printables as `reverse_engineered_browser_api` because it has no official public API contract even though its browser-facing GraphQL endpoint supports public search and detail reads.
    - Normalize provider results into a parent `search` app-skill-use embed and child `model_result` direct embeds.
    - Store only lightweight, public, display-safe fields in child embeds: title, creator, provider, provider model ID, source URL, preview image URL, license, stats, tags, category, price/free state, file count, and shallow provider metadata.
    - Use preview or thumbnail images supplied by the provider and proxy them through the existing image proxy path in the web UI.
    - Show an "Open on (provider)" CTA on every web child result card that opens the provider source page.
    - Persist parent-level preview metadata so the parent card can render useful results without hydrating child embeds.
    - Expose the same search contract through CLI first, npm SDK second, pip SDK third, web fourth, user confirmation fifth, and Apple last if native rendering is affected.
    - Add provider documentation and privacy notes for Printables catalog search before enabling web UI.
  out:
    - Re-enabling or completing `models3d.generate`.
    - Downloading, importing, caching, decrypting, storing, converting, validating, or printing model files in V1.
    - Rendering interactive third-party 3D viewers or executing provider JavaScript in chat, fullscreen, CLI, SDK, or Apple clients.
    - Claiming print readiness, slicer compatibility, manifoldness, scale correctness, or license compliance beyond displaying the provider's public metadata and source link.
    - User-uploaded 3D files, CAD creation, mesh editing, model repair, or search-by-geometry.
    - Provider write actions such as likes, collections, follows, downloads, purchases, or account-authenticated operations.
    - Adding CGTrader, Cults, Sketchfab, MakerWorld, Thangs, or paid/commercial providers to the first implementation slice unless the spec is amended and approved.

