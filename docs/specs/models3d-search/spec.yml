scenarios:
  - id: S-1
    title: CLI searches existing 3D model catalogs
    given:
      - Alice is authenticated in the OpenMates CLI.
      - Alice wants to find existing public 3D models for a query such as "benchy" or "phone stand".
    when:
      - Alice runs `openmates apps models3d search --query benchy --json` against the dev API.
    then:
      - The command returns success JSON with the normalized provider name, result count, parent embed ID, and child result embed IDs.
      - Each result includes a title, source URL, provider, preview image URL when available, and public metadata.
      - The CLI response does not include full model file URLs, provider executable viewer code, or downloaded model artifacts.

  - id: S-2
    title: Parent search embed stores lightweight preview metadata
    given:
      - A search request returns one or more model results.
    when:
      - The backend creates the `models3d.search` parent app-skill-use embed.
    then:
      - The parent content includes app_id, skill_id, query, provider or providers, result_count, embed_ids, and lightweight preview_results.
      - The preview_results fields are sufficient for chat card rendering without loading child embeds.
      - The parent content does not contain full child payloads, raw provider blobs, model files, or hidden download URLs.

  - id: S-3
    title: Child result embeds are preview-only link-out cards
    given:
      - A provider returns public 3D model search results.
    when:
      - The backend creates child `model_result` embeds.
    then:
      - Each child stores normalized public metadata and a preview or thumbnail image URL when the provider supplies one.
      - Each child points users to the provider source page for downloads, licensing details, purchases, or account-specific actions.
      - Each child omits full model file bytes, direct download/import state, executable viewer scripts, and provider account tokens.

  - id: S-4
    title: Printables provider failures are visible and scoped
    given:
      - The Printables browser-facing endpoint is unavailable, returns invalid data, or exceeds a rate limit.
    when:
      - Alice searches with the current Printables-only provider surface.
    then:
      - The skill returns a typed visible error rather than a silent empty success.
      - Logs include enough provider and query context for debugging without storing secrets or private user data.

  - id: S-5
    title: SDKs expose the same native search contract
    given:
      - A developer uses the npm or pip SDK with an API key.
    when:
      - The developer calls the generated native method for `client.apps.models3d.search`.
    then:
      - The SDK sends `input_data` to `/v1/apps/models3d/skills/search` with the same request schema as the CLI.
      - The SDK returns the API response without requiring a browser session or chat UI.

  - id: S-6
    title: Web renders parent and child previews safely
    given:
      - CLI and SDK contracts are already green.
      - The deployed dev web app has a chat containing a `models3d.search` parent with child model results.
    when:
      - Alice opens the chat and the search fullscreen.
    then:
      - The parent preview renders from parent metadata without child hydration.
      - Child cards display preview images through the image proxy and link to source pages.
      - Each child card has an `Open on (provider)` CTA that opens the provider source page.
      - Web never executes provider JavaScript and never downloads full 3D model files for V1 search result display.

