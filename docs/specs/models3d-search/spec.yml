contracts:
  api:
    - route: POST /v1/apps/models3d/skills/search
      request: "{ input_data: { requests: [{ query: string, providers?: string[], count?: number = 10, sort?: 'best_match' | 'popular' | 'downloads' | 'newest', free_only?: boolean }] }, parameters?: object }"
      response: "{ success: true, data: { results: [{ id, query, provider_results, warnings? }], provider, result_count, parent_embed_id?, embed_ids? } }"
      errors:
        - 400 for missing or blank query.
        - 400 for unsupported provider selection.
        - 429 or typed provider_rate_limited error when a provider is rate limited and no fallback results are available.
        - typed provider_unavailable error when all requested providers fail.
  data:
    - Parent embed type `search` has category `app-skill-use`, skill_id `search`, has_children true, child_type `model_result`, and parent preview metadata fields query, provider/providers, result_count, embed_ids, and preview_results.
    - Child embed type `model_result` has category `direct` and stores title, creator_name, provider, provider_item_id, source_page_url, preview_image_url, thumbnail_url, license, tags, category, rating, likes_count, download_count, files_count, price, is_free, and normalized_provider_metadata.
    - Child embeds must not store full model file URLs when those URLs bypass the provider's source page, file bytes, external JS snippets, provider credentials, auth cookies, or long raw provider responses.
  ui_states:
    - Search parent loading, success with results, success with zero results, unsupported-provider error, and visible Printables provider error.
    - Child result with preview image, child result without preview image, free result, paid result, known license, unknown license, and source-link action.
  privacy_security:
    - Search queries are sent to selected external providers and must be disclosed in provider/privacy docs.
    - Preview images load through OpenMates image proxy in web UI to avoid leaking user IP directly from chat render.
    - Provider API keys, if any, remain server-side in Vault and are never serialized into embeds, SDK responses, logs, or frontend code.
    - No third-party script execution is allowed for result previews or fullscreen in V1.

