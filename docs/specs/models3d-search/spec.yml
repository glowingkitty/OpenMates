  external_research:
    - "Printables public GraphQL endpoint `https://api.printables.com/graphql/` supports `searchPrints2(query, printType: print, limit, ordering)` and `print(id: ID!)` with preview field `image.filePath`, detail `images.filePath`, title, creator, license, category, tags, stats, price, and filesCount. Ten read-only requests returned HTTP 200 with no blocking."
    - "Printables unauthenticated detail probes returned `filesCount` but empty `fileUploads` for tested public models, so V1 must not promise direct file names or downloads."
    - "MyMiniFactory and Thingiverse were investigated but removed from the current provider surface after the user asked to reduce V1 to Printables only. They remain potential future providers behind a separate approval/spec amendment."
    - "Sketchfab has official search/download APIs but is broader than 3D printing; Cults has official GraphQL/API but limited direct file access; CGTrader appears commercial/OAuth/B2B-oriented. These are deferred."

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Models/EmbedModels.swift
    - apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMatesTests/SkillApplicationParityTests.swift
  parity_expectations:
    - Apple eventually renders the same parent search summary and child model-result cards as web using preview images and source-link metadata only.
    - Apple must not execute provider JavaScript or download full 3D model files for V1 search results.
    - Apple work waits until CLI, npm SDK, pip SDK, web implementation, and user confirmation are complete.
  verification:
    - Run `python3 scripts/apple_remote.py status` before native verification when the implementation reaches the Apple phase.
    - Use targeted parity tests or `build-ios` after web approval, recording only sanitized evidence.
  intentional_native_differences:
    - Native source links may open in the OS browser instead of an in-app webview.

clarification:
  rounds:
    - question: Should `models3d.search` create a parent app-skill embed and child entries for each result?
      answer: Yes. Every search creates a search app-skill embed parent, and each result is a 3D model result child entry.
    - question: Should V1 download or render full model files?
      answer: No. Child entries should show preview images, not execute external JS, and not download the full 3D model.
    - question: Should implementation follow the OpenMates phase ladder?
      answer: Yes. CLI implementation first; SDK, web, user confirmation, and Apple later.
    - question: Should V1 keep MyMiniFactory and Thingiverse in the current provider surface?
      answer: No. Reduce current providers to Printables only, remove the other two, then continue SDK parity and web implementation.
  vision_summary: >
    `models3d.search` is a low-cost discovery skill for existing 3D models. It
    uses provider search/detail APIs to create a parent search card and child
    model result cards with preview images and source links. V1 intentionally
    avoids all model-file handling and third-party executable viewers, while the
    expensive Hi3D-backed generate skill remains off by default. When web
    frontend work is implemented, each child result must include an "Open on
    (provider)" CTA for the provider source page.
  approved_by_user: true

