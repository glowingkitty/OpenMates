implementation_plan:
  spec_path: docs/specs/models3d-search/spec.yml
  existing_patterns:
    - backend/apps/images/app.yml parent `search` plus child `image_result` embed metadata.
    - backend/apps/images/skills/search_skill.py direct async search skill returning child result embeds.
    - backend/apps/news/skills/search_skill.py direct async provider search with typed request/response models.
    - docs/specs/search-parent-preview-metadata-sync/spec.yml parent-preview metadata contract.
  architecture: >
    Add a Printables provider adapter under shared providers or a models3d-local
    provider integration layer, then implement a direct async `models3d.search`
    skill that normalizes public catalog results into parent/child embed content.
    Use fixture-backed tests for normalization, and gate real CLI verification
    before SDK/web/native work.
  data_flow:
    - CLI or SDK sends a `models3d.search` request with query, optional Printables provider selection, and count.
    - Backend validates the request and dispatches read-only searches to the Printables provider adapter.
    - The Printables adapter normalizes raw results into preview-only model result records.
    - Skill creates child `model_result` embeds and a parent `search` app-skill-use embed with preview_results metadata.
    - CLI/SDK receive normalized response data and embed IDs; web later renders cards from encrypted embed content.
  affected_files:
    - path: docs/specs/models3d-search/spec.yml
      reason: Product contract, tasks, and verification ledger.
    - path: backend/apps/models3d/app.yml
      reason: Add search skill and parent/child embed metadata while preserving disabled generate skill.
    - path: backend/apps/models3d/skills/search_skill.py
      reason: Implement read-only 3D model catalog search skill.
    - path: backend/shared/providers/printables/
      reason: Browser-facing GraphQL search/detail adapter with explicit reverse-engineered status.
    - path: backend/tests/test_models3d_search_skill.py
      reason: Parent/child embed contract tests.
    - path: backend/tests/test_models3d_search_providers.py
      reason: Provider normalization and failure-mode tests.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: CLI command parsing/contract coverage if needed.
    - path: frontend/packages/openmates-cli/tests/sdk.test.ts
      reason: npm SDK native method parity.
    - path: packages/openmates-python/tests/test_sdk.py
      reason: pip SDK native method parity.
    - path: frontend/packages/ui/src/components/embeds/models3d/
      reason: Web preview/fullscreen renderers and child result cards with `Open on (provider)` CTA after CLI and SDK gates are green.
    - path: frontend/apps/web_app/tests/models3d-search.spec.ts
      reason: Deployed web safety and rendering verification.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
      reason: Apple native parity after web user confirmation.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/models3d-search/spec.yml
    - python3 scripts/spec_verify.py docs/specs/models3d-search/spec.yml --phase red
    - Run red CLI/backend/SDK tests before implementation where feasible.
    - Deploy before Playwright green verification.
    - python3 scripts/spec_verify.py docs/specs/models3d-search/spec.yml
  verification_order:
    - Real dev CLI command against the dev API first, with no mocked OpenMates API/WebSocket path.
    - Backend provider and embed contract tests.
    - npm SDK parity.
    - pip SDK parity.
    - Web implementation and deployed Playwright verification.
    - User confirmation of deployed web behavior.
    - Apple remote status plus build/test only after user confirmation.

