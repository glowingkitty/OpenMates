    task_id: TASK-1
    approach: Add Schema V2 fixture tests before validator and verifier changes.
    outcome: failed_as_expected
    recorded_at: "2026-07-10T10:15:00Z"
    evidence: local:pytest:sdd-v2-red

handoff:
  current_task_id: TASK-4
  next_action: Run final schema, audit, documentation, and code-quality checks before deployment.
  command: python3 scripts/spec_verify.py docs/specs/sdd-v2/spec.yml --phase complete
  expected_outcome: Verification remains blocked only by pending green evidence until the tested revision is committed and recorded.
  blocker: null
  last_verified_commit: 3f37059a5

scenarios:
  - id: S-1
    title: Author creates a complete Schema V2 full spec
    given:
      - An OpenCode author starts a new multi-file authentication feature.
    when:
      - The author drafts docs/specs/auth-v2/spec.yml.
    then:
      - The validator rejects missing required acceptance-criterion, task,
        implementation-plan, evidence, or handoff fields.
      - The author receives a specific error identifying the missing contract field.

  - id: S-2
    title: Verification evidence identifies the exact tested revision
    given:
      - A required backend test passes for commit abc1234.
    when:
      - The author records green evidence.
    then:
      - The evidence records command, run identifier, timestamp, subject commit,
        and relevant target or artifact information.
      - The verifier rejects incomplete automated evidence.

  - id: S-3
    title: Material changes invalidate stale verification evidence
    given:
      - AC-2 has passing green evidence for commit abc1234.
    when:
      - The implementation or linked assertion changes at commit def5678.
    then:
      - AC-2 and linked task state become pending or needs_fix.
      - The old evidence is retained as history but cannot satisfy completion.

  - id: S-4
    title: A fresh OpenCode session resumes a full spec without chat context
    given:
      - TASK-3 is in progress after a failed red-phase attempt.
    when:
      - A new OpenCode session reads the spec.
    then:
      - The handoff identifies the current task, next command, expected result,
        current blocker, and last verified commit.
      - The session does not need a duplicate session task file to recover scope or status.

  - id: S-5
    title: Product and technical approvals remain distinguishable
    given:
      - The user approved the product contract for a feature.
    when:
      - The technical plan introduces a migration or privacy decision not previously approved.
    then:
      - The spec records a pending material technical-plan approval.
      - Implementation stops until the decision is approved, revised, waived, or blocked.

  - id: S-6
    title: Plan Mode can author a spec but cannot edit product code
    given:
      - An OpenCode session uses the Plan Mode agent.
    when:
      - It creates or updates docs/specs/example/spec.yml.
    then:
      - The edit is permitted.
      - An attempted edit to backend or frontend source is denied.

  - id: S-7
    title: Legacy specs remain usable during staged migration
    given:
      - A verified Schema V1 spec exists before SDD V2 is released.
    when:
      - Repository validation runs.
    then:
      - The legacy spec remains structurally valid under V1 rules.
      - A newly authored or actively resumed V2 spec must satisfy the stricter V2 rules.

