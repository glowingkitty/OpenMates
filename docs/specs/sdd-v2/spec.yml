schema_version: 2
id: sdd-v2
title: OpenCode Spec-Driven Development V2
status: approved

goal: >
  Make every new OpenMates full spec a durable, evidence-backed, resumable work
  contract whose schema, validator, verifier, skills, and OpenCode Plan Mode
  enforce the same truthfulness and traceability rules.

scope:
  in:
    - Schema V2 requirements for full specs created after this work is released.
    - Evidence provenance and stale-evidence invalidation for acceptance criteria,
      test assertions, contracts, assumptions, and relevant implementation changes.
    - Separate product-contract and material technical-plan approval records.
    - Durable decisions, failed attempts, task ownership, dependencies, and handoff state.
    - One authoritative full-spec ledger, with session task records limited to a
      reference to the spec and current task rather than duplicated plan data.
    - Reconciliation of planning-order and test-first instruction conflicts.
    - Path-scoped OpenCode Plan Mode edits limited to executable specs.
    - Deterministic fixtures and audits for the new schema and permissions.
    - Staged migration rules for legacy specs.
  out:
    - Changes to the user-facing Plans V1 product, API, encryption model, or UI.
    - Retrofitting every existing spec to Schema V2 in this change.
    - Replacing the active deterministic-workflow-guardrails implementation.
    - Product source, database schema, or external provider behavior.

context_discovery:
  github_issues:
    - GitHub MCP authentication returned 401; no issue was linked to this request.
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/contributing/guides/planning.md
    - docs/specs/README.md
    - docs/specs/deterministic-workflow-guardrails/spec.yml
    - .claude/rules/planning.md
    - .claude/rules/session-lifecycle.md
  code_patterns:
    - scripts/spec_validate.py
    - scripts/spec_verify.py
    - scripts/audit_opencode_spec_workflow.py
    - scripts/tests/test_spec_workflow_validation.py
    - scripts/tests/test_opencode_spec_workflow_audit.py
    - opencode.json
    - .agents/skills/specify/SKILL.md
    - .agents/skills/plan-from-spec/SKILL.md
    - .agents/skills/tasks-from-spec/SKILL.md
    - .agents/skills/verify-spec/SKILL.md
  tests:
    - scripts/tests/test_spec_workflow_validation.py
    - scripts/tests/test_opencode_spec_workflow_audit.py

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - No Apple product surface or native contract changes.
  verification:
    - Not required because this changes repository-only OpenCode workflow tooling.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should SDD improvements update the existing workflow-guardrails spec or use a separate contract?
      answer: >
        Use a separate SDD V2 spec. Link it to deterministic-workflow-guardrails,
        avoid duplicate work, and do not change the user-facing Plans feature.
  vision_summary: >
    New full specs must be executable, honest, resumable, and deterministic where
    possible. Existing specs stay valid under their current schema until actively
    resumed, while every new Schema V2 spec follows the stronger contract.
  approved_by_user: true

implementation_state:
  subject_commit: 3f37059a5

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-10T10:10:00Z"
  implementation_plan:
    status: not_required
    reason: The approved repository-governance contract already defines the required technical boundaries.

decisions:
  - id: D-1
    status: active
    decision: Keep SDD V2 separate from deterministic-workflow-guardrails.
    reason: The existing spec owns execution guardrails, while this spec owns the full-spec contract and evidence model.
    decided_at: "2026-07-10T10:10:00Z"

attempts:
