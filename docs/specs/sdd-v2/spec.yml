    required: true
    status: pending
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-SDD-VALIDATE]

assumptions:
  - id: A-1
    text: The current Python validator and verifier can distinguish schema versions without changing existing spec files.
    category: implementation
    required_before: implementation
    status: confirmed
    evidence:
      - source: scripts/spec_validate.py
        summary: The validator already loads each YAML spec independently and can branch on a new top-level schema_version field.
  - id: A-2
    text: OpenCode agent edit permission supports path-specific allow and deny rules.
    category: tooling
    required_before: implementation
    status: confirmed
    evidence:
      - source: OpenCode permissions documentation queried through Context7 on 2026-07-10.
        summary: Agent edit rules support glob patterns, with later matching rules taking precedence.
  - id: A-3
    text: The active deterministic-workflow-guardrails work owns any concurrent stale-read enforcement changes.
    category: coordination
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/specs/deterministic-workflow-guardrails/spec.yml
        summary: Its scope explicitly includes blocking edits after another process changes a file.

contracts:
  schema:
    - Schema V2 is required for new full specs after rollout; V1 remains supported for existing specs.
    - Schema V2 requires implementation_plan, tasks, approvals, decisions, attempts, and handoff.
    - Required acceptance criteria require explicit coverage metadata and linked verification, waiver, or accepted blocker records.
  evidence:
    - Automated evidence records status, command, run_id, timestamp, and subject_commit.
    - Playwright evidence also records target and deployment reference.
    - Manual, waived, blocked, and skipped evidence records actor, reason, timestamp, and next action where applicable.
    - Evidence belongs to a specified subject commit and becomes stale after a material linked change.
  planning:
    - Bounded repository discovery precedes evidence-backed clarification.
    - Tests and expected verification evidence are defined before implementation; red evidence may be flexible but must be recorded.
    - Full specs are the only durable plan/task ledger; session task records may reference but must not duplicate full-spec state.
  plan_mode:
    - Plan Mode may edit only docs/specs/**/spec.yml.
    - Plan Mode cannot edit product source, tests, arbitrary documentation, or configuration.
  migration:
    - Existing specs without schema_version are treated as V1.
    - New specs declare schema_version: 2.
    - A V1 spec is migrated when actively resumed for a material implementation change, not solely because validation runs.

tests:
  - id: T-SDD-VALIDATE
    type: pytest
    file: scripts/tests/test_spec_workflow_validation.py
    command: python3 -m pytest scripts/tests/test_spec_workflow_validation.py
    covers: [AC-1, AC-4, AC-5, AC-7]
    assertions:
      - complete Schema V2 fixture passes validation
      - incomplete Schema V2 fixture fails with the required field name
      - V1 fixture continues to pass existing validation rules
      - V2 task, approval, decision, attempt, and handoff references are validated
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        command: python3 -m pytest scripts/tests/test_spec_workflow_validation.py
        run_id: local:pytest:sdd-v2-red
        subject_commit: 3f37059a5
        timestamp: "2026-07-10T10:15:00Z"
        summary: Schema V2 handoff and task expected_files fixtures failed as expected before validator support existed.
    green_phase:
      required: true
      expected: pass
      evidence: {status: pending, run_id: "", timestamp: ""}
  - id: T-SDD-VERIFY
    type: pytest
    file: scripts/tests/test_spec_workflow_validation.py
    command: python3 -m pytest scripts/tests/test_spec_workflow_validation.py
    covers: [AC-2, AC-3]
    assertions:
      - incomplete automated evidence fails verification
      - a material changed subject commit invalidates linked evidence
      - replaced evidence for the new commit restores passing verification
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        command: python3 -m pytest scripts/tests/test_spec_workflow_validation.py
        run_id: local:pytest:sdd-v2-red
        subject_commit: 3f37059a5
        timestamp: "2026-07-10T10:15:00Z"
        summary: Schema V2 provenance and stale-evidence fixtures failed as expected before verifier support existed.
    green_phase:
      required: true
      expected: pass
      evidence: {status: pending, run_id: "", timestamp: ""}
  - id: T-SDD-OPENCODE-AUDIT
    type: pytest
    file: scripts/tests/test_opencode_spec_workflow_audit.py
    command: python3 -m pytest scripts/tests/test_opencode_spec_workflow_audit.py
    covers: [AC-6]
    assertions:
      - Plan Mode allows docs/specs/**/spec.yml edits
      - Plan Mode denies non-spec edits
      - canonical skills and Agent Skill mirrors remain synchronized
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        command: python3 -m pytest scripts/tests/test_opencode_spec_workflow_audit.py
        run_id: local:pytest:sdd-v2-audit-red
        subject_commit: 3f37059a5
        timestamp: "2026-07-10T10:15:00Z"
        summary: The audit fixture failed as expected because the Plan Mode audit still required total edit denial.
    green_phase:
      required: true
      expected: pass
      evidence: {status: pending, run_id: "", timestamp: ""}

implementation_plan:
  spec_path: docs/specs/sdd-v2/spec.yml
  existing_patterns:
    - scripts/spec_validate.py validates structural spec contracts.
    - scripts/spec_verify.py validates recorded evidence without running tests.
    - scripts/tests/test_spec_workflow_validation.py uses minimal fixture specs.
    - scripts/audit_opencode_spec_workflow.py checks OpenCode config and skill mirrors.
  architecture: >
    Add a versioned Schema V2 branch to the validator and verifier while retaining
    V1 behavior for existing specs. Update the canonical SDD guide and skills to
    require V2 fields, then synchronize Agent Skill mirrors and harden the
    OpenCode Plan Mode audit around path-scoped spec-only edit permission.
  approval_boundary:
    - Product-contract approval is recorded when the user approves the completed spec.
    - Technical-plan approval is required only when a plan introduces a material decision not already covered by the product contract.
    - This repository-governance change introduces no such additional material decision.
  data_flow:
    - Author declares schema_version: 2 in a new full spec.
    - Validator checks the V2 contract, IDs, references, task ownership, and handoff.
    - Verifier checks evidence provenance, subject commits, and stale invalidation.
    - A material change updates the spec handoff and invalidates affected evidence.
    - A resumed session reads the handoff and continues the identified task.
  affected_files:
    - path: docs/contributing/guides/spec-driven-development.md
      reason: Define Schema V2, evidence, approvals, invalidation, handoff, and migration rules.
    - path: docs/contributing/guides/planning.md
      reason: Remove contradictory planning order, duplicate full-spec task files, and test-after guidance.
    - path: .claude/rules/planning.md
      reason: Align global clarification and pre-planning rules with the SDD guide.
    - path: .claude/rules/session-lifecycle.md
      reason: Make session task records references for full specs instead of duplicate contracts.
    - path: .claude/skills/specify/SKILL.md
      reason: Require Schema V2 drafting and product-contract approval.
    - path: .claude/skills/plan-from-spec/SKILL.md
      reason: Require material technical-plan approval and V2 plan traceability.
    - path: .claude/skills/tasks-from-spec/SKILL.md
      reason: Require task ownership, dependencies, attempts, and handoff updates.
    - path: .claude/skills/verify-spec/SKILL.md
      reason: Require provenance, stale-evidence checks, and honest completion reports.
    - path: opencode.json
      reason: Permit Plan Mode editing only executable specs.
    - path: scripts/spec_validate.py
      reason: Validate Schema V2 while preserving V1 compatibility.
    - path: scripts/spec_verify.py
      reason: Enforce evidence provenance and invalidation.
    - path: scripts/audit_opencode_spec_workflow.py
      reason: Audit new config and canonical workflow requirements.
    - path: scripts/tests/test_spec_workflow_validation.py
      reason: Test V2 fixtures, V1 compatibility, evidence, and invalidation.
    - path: scripts/tests/test_opencode_spec_workflow_audit.py
      reason: Assert the Plan Mode permission contract and audit failures.
  migration_rollout:
    - Existing specs without schema_version remain Schema V1 and are not rewritten by this change.
    - New full specs declare schema_version: 2 after the validator and guide land.
    - An actively resumed V1 spec migrates before its next material implementation slice; documentation-only updates do not require migration.
  observability:
    - Validation and verification errors name the failing spec ID, record ID, and missing or stale evidence field.
    - No product telemetry or user data is collected; evidence paths remain repository-relative and sanitized.
  required_assumption_checks:
    - A-1: exercised by V1 and V2 fixture specs in test_spec_workflow_validation.py.
    - A-2: exercised by the direct workflow audit and test_opencode_spec_workflow_audit.py.
    - A-3: no implementation change is made to stale-read hooks or sessions.py without coordination.
  acceptance_criteria_mapping:
    - AC-1, AC-4, AC-5, AC-7: T-SDD-VALIDATE.
    - AC-2, AC-3: T-SDD-VERIFY.
    - AC-6: T-SDD-OPENCODE-AUDIT.
  verification_strategy:
    - Add validator/verifier fixture tests before implementation.
    - Run python3 -m pytest scripts/tests/test_spec_workflow_validation.py.
    - Run python3 -m pytest scripts/tests/test_opencode_spec_workflow_audit.py.
    - Run python3 scripts/audit_opencode_spec_workflow.py.
    - Run python3 scripts/spec_validate.py docs/specs/sdd-v2/spec.yml.
    - Run python3 scripts/spec_verify.py docs/specs/sdd-v2/spec.yml after green evidence is recorded.
  verification_order:
    - Validator and verifier fixtures.
    - OpenCode workflow audit fixtures and direct audit.
    - Schema validation and verification of this spec.
  open_questions:
    - none

