risks:
  - Strict Schema V2 validation can make migrations noisy; version-gating keeps legacy specs valid.
  - Subject-commit invalidation must be explicit and deterministic rather than heuristically guessing source-to-AC impact.
  - The deterministic-workflow-guardrails session may touch session lifecycle behavior; this work must not modify overlapping files without coordination.

open_questions:
  - Should V2 require a technical-plan approval for all full specs, or only when implementation introduces material decisions outside the approved product contract?
