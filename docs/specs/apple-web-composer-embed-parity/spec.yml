id: apple-web-composer-embed-parity
title: Apple Web Composer Embed Parity
status: approved

goal: >
  Make the Apple app's message composer match the web MessageInput embed behavior,
  not just its text-editing surface. Attachments, recordings, maps, sketches,
  pasted/generated embeds, and URL/code/document conversions must become
  editor-owned Tiptap embed nodes, render inside the WKWebView composer document,
  participate in web-style upload/transcription deferral, and serialize to the
  same canonical markdown that the web app sends.

scope:
  in:
    - A local, bundled web-composer core for Apple WKWebView that reuses or is generated from the web MessageInput Tiptap extension, embed insertion, rendering, and serialization contracts.
    - Editor-owned embed nodes for Apple attachments, images, PDFs, code/text files, maps, sketches, camera images, and audio recordings.
    - Swift-to-JavaScript bridge commands for inserting, updating, removing, focusing, clearing, and serializing embed nodes without reloading the WebView.
    - JavaScript-to-Swift bridge events for editor readiness, canonical markdown changes, embed-node lifecycle changes, blocking upload/transcription state, submit, focus, blur, height, and visible bridge errors.
    - Native OS-owned pickers and capture surfaces remaining native while delivering results into the editor through bridge commands.
    - Apple send behavior using editor serialization as the source of truth instead of appending Swift pending-embed references after text.
    - Red-first Apple tests, bridge/unit tests, and deterministic audits that fail against the current TestFlight behavior before implementation.
    - Remote Mac build/test verification and a TestFlight upload only after the parity tests are green.
  out:
    - Loading the production web app route inside the native app composer.
    - Moving chat transcript/read-only message rendering to WebView.
    - Replacing OS-owned file, photo, camera, microphone, document, location permission, or share controllers.
    - Rewriting backend upload, encryption, WebSocket sync, or Directus embed schemas except for minimal adapter fixes required to preserve the existing API contract.
    - Achieving exact pixel-equality for every embed card before functional parity; visual drift remains covered by the separate Apple embed rendering parity spec.
    - Keeping the native pending embed strip as the primary composer embed model after editor-owned embed nodes are available.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --search 'apple composer embed parity OR apple message input tiptap' --state all returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/apple-tiptap-webview-composer/spec.yml
    - docs/specs/apple-unified-message-composer/spec.yml
    - docs/specs/apple-embed-rendering-parity/spec.yml
    - docs/architecture/messaging/message-input-field.md
    - docs/architecture/messaging/message-parsing.md
    - docs/architecture/messaging/embeds.md
    - apple/AGENTS.md
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte imports the full web composer graph: Tiptap Editor, editorConfig, embedHandlers, fileHandlers, sendHandlers, PII, draft services, auth, stores, and native-like overlays.
    - frontend/packages/ui/src/components/enter_message/editorConfig.ts installs StarterKit with write-mode markdown rendering disabled plus Embed, mention nodes, CustomPlaceholder, and keyboard handling.
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts inserts image, file, PDF, map, code, sheet, doc, and recording embeds as Tiptap `embed` nodes and updates node attributes as upload/transcription progresses.
    - frontend/packages/ui/src/components/enter_message/extensions/Embed.ts renders editor-owned full-width embed nodes with `data-testid="embed-full-width-wrapper"`, `data-embed-type`, and `data-embed-status` and delegates to the generated embed renderer registry.
    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts scans Tiptap embed nodes for `uploading` or `transcribing`, creates deferred pending sends, stores editor snapshots, and later serializes canonical markdown.
    - frontend/packages/ui/src/message_parsing/serializers.ts serializes Tiptap embed nodes to canonical fenced JSON reference blocks through `tipTapToCanonicalMarkdown`.
    - frontend/packages/ui/src/stores/pendingUploadStore.ts records web deferred-send state from editor snapshots and embed node IDs.
    - apple/OpenMates/Resources/TiptapComposer/composer.js currently imports only vendored Tiptap core, StarterKit, and Placeholder and implements text-only markdown serialization.
    - apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift currently exposes focus, blur, clear, setContent, setPlaceholder, setTheme, setCompact, and setDisabled only.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift currently stores `pendingComposerEmbeds` outside the editor and sends by appending `contentWithComposerEmbedReferences` to text.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift currently renders `PendingComposerEmbedsList` as `inlineFieldContent` above the editor.
  tests:
    - apple/OpenMatesTests/TiptapComposerBridgeTests.swift
    - apple/OpenMatesTests/MessageComposerConfigurationTests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
    - scripts/apple_composer_audit.py

