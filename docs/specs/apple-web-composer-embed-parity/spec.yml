  parity_expectations:
    - The Apple composer document owns the same logical Tiptap node tree as the web composer for text plus embeds.
    - The Apple bridge may adapt native picker outputs into JS commands, but embed order, selection/cursor insertion position, lifecycle state, deletion, and serialization must be driven by the editor document.
    - Native upload and transcription services may remain Swift-owned if their progress and final payload are reflected back into the editor node attributes before send.
    - The native pending embed strip may remain temporarily only as a migration/fallback error surface and must not be the source of truth for normal sends.
    - Chat history remains native in this spec; read-only preview/fullscreen visual drift remains governed by `apple-embed-rendering-parity`.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-web-composer-embed-parity/spec.yml
    - python3 scripts/spec_verify.py docs/specs/apple-web-composer-embed-parity/spec.yml --phase red
