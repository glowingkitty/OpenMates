    - python3 scripts/tests.py run --suite vitest --filter composerBridgeCore
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/TiptapComposerBridgeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAttachmentUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAudioRecordingUITests
    - TestFlight upload through the repo's Apple deployment flow after green native verification.
  intentional_native_differences:
    - OS-owned pickers, camera, microphone, file importers, and permission prompts stay native.
    - The native host still owns top-level composer chrome, action buttons, suggestions, welcome cards, signup policy, PII banners, and chat send plumbing.
    - The local WKWebView bundle must not depend on production server HTML, private chat data, or remote scripts.

clarification:
  rounds:
    - question: Should the next step be implementation, documentation only, or deeper investigation of the web Tiptap architecture first?
      answer: >
        Investigate how the web app Tiptap implementation works, then suggest a
        plan to best ensure full parity with the web app.
    - question: Should the spec be updated or created so implementation can target true web composer parity?
      answer: >
        Create or update a spec according to the parity recommendations so the
        Apple app can finally implement proper parity.
  vision_summary: >
    Apple should no longer approximate web composer behavior with a local text-only
    Tiptap shell plus Swift pending embeds. The product target is a local
    WebView-backed composer core that owns embed nodes like the web app, while
    keeping native OS capture/picker surfaces and native chat history.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple loads a bundled web-composer core, not a text-only clone
    given:
      - The Apple app opens a normal chat composer.
      - The local WKWebView bundle is loaded from app resources.
    when:
      - The bridge reports editor readiness and diagnostics.
    then:
      - The editor extension list includes web-equivalent embed support, not only StarterKit and Placeholder.
      - The bridge exposes insert, update, remove, serialize, and diagnostics commands for embed nodes.
      - The bundle is local and deterministic; no production web route or remote script is loaded.

  - id: S-2
    title: Native attachments become editor-owned embed nodes
    given:
      - The user selects or captures an image, PDF, sketch, map, or supported text/code file from native Apple action buttons.
    when:
      - Swift receives the native picker/capture result.
    then:
      - Swift calls a bridge command that inserts an `embed` node at the current editor selection.
      - The embed renders inside the WKWebView document with `embed-full-width-wrapper`, `data-embed-type`, and `data-embed-status` diagnostics.
      - The native pending embed strip is not rendered for the normal success path.
      - Removing the embed in the editor removes it from the send payload.

  - id: S-3
    title: Audio recordings use web-style upload and transcription lifecycle
    given:
      - The user records audio from the Apple composer.
    when:
      - Recording completes and upload/transcription starts.
    then:
      - A recording embed node appears immediately in the editor with an uploading or transcribing status.
      - Progress and final transcript metadata update the existing editor node rather than adding an external native preview.
      - Pressing send before transcription finishes creates a deferred or blocked send state equivalent to the web pending-upload contract.
      - Cancelling or deleting the recording removes the editor node and cancels or excludes the corresponding upload where possible.

  - id: S-4
    title: Send serializes from editor state
    given:
      - The composer contains text before and after one or more embeds.
    when:
      - The user sends the message.
    then:
      - Apple asks the WKWebView editor for canonical markdown generated from the Tiptap document.
      - Embed references appear at their editor positions, not appended after all text.
      - Swift does not call `contentWithComposerEmbedReferences` for the normal parity path.
      - Raw JSON blocks, local file paths, AES keys, private URLs, and upload temp paths are never visible in the composer UI.

  - id: S-5
    title: Web and Apple serialization match for representative embed documents
    given:
      - A fixture document contains text, an image embed, a recording embed, a code/doc embed, a map embed, and trailing text.
    when:
      - The web composer core and Apple WebView composer serialize the fixture document.
    then:
      - Both outputs contain the same canonical markdown shape and embed reference ordering.
      - Upload/transcription-complete nodes serialize to fenced JSON references using the same type names as web.
      - Uploading/transcribing nodes either defer send or serialize only after their final contentRef/upload metadata is available.

  - id: S-6
    title: Deterministic audits prevent reverting to native pending strips
    given:
      - Future work touches Apple composer files.
    when:
      - The composer audit runs.
    then:
      - The audit fails if the Apple bundle lacks embed commands or diagnostics.
      - The audit fails if normal chat send still appends pending Swift embed references instead of serializing editor state.
      - The audit fails if UI tests only assert `pending-composer-embed` without proving editor-owned embed nodes.

  - id: S-7
    title: Verified parity reaches TestFlight
    given:
      - Red-phase tests fail against the current text-only Apple composer.
      - Implementation is complete and deployed to the remote Mac checkout.
    when:
      - Targeted Apple tests, build, and TestFlight upload run.
    then:
      - Remote iPhone simulator tests prove editor-owned attachments and recordings.
      - The iOS app builds successfully.
      - TestFlight upload happens only after the green evidence is recorded.

