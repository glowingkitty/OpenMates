risks:
  - id: R-1
    description: Directly bundling MessageInput.svelte may pull in too much of the Svelte app runtime, stores, sync, auth, maps, and upload services.
    mitigation: Extract or generate a focused composer-core bridge module instead of loading the production route or importing the whole component unchanged.
  - id: R-2
    description: Keeping Swift upload execution and JS editor ownership can create race conditions between native state and editor node state.
    mitigation: Treat editor node IDs as the source of truth and make Swift upload records keyed by those IDs with explicit bridge update acknowledgements.
  - id: R-3
    description: Existing tests currently assert the native pending strip behavior and may give false confidence again if only renamed.
    mitigation: Require red-phase assertions for editor-owned embed diagnostics and audit failures against tests that only look for pending-composer-embed.
  - id: R-4
    description: Recording upload/transcription deferral can regress send responsiveness or leave queued messages stuck.
    mitigation: Mirror the web pending-upload contract with explicit blockingEmbedsChanged events and UI test coverage for deferred send completion.

open_questions:
  - id: Q-1
    question: Should Apple use a generated vanilla JS composer-core bundle or a small Svelte bundle that mounts only embed NodeViews inside the WKWebView?
    required_before: implementation
    status: open
  - id: Q-2
    question: "Which first embed types must ship in the first green slice if full coverage is too large for one session: image, recording, PDF/file, map, and code/doc are the proposed minimum."
    required_before: task_execution
    status: open
