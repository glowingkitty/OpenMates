assumptions:
  - id: A-1
    text: A generated or extracted local web-composer core can reuse the web Tiptap embed contracts without bundling the full Svelte app route or private runtime state.
    category: architecture
    required_before: implementation
    status: unchecked
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/editorConfig.ts
        summary: The editor extension list is a focused seam that can be imported or mirrored by a generated bundle.
      - source: frontend/packages/ui/src/components/enter_message/embedHandlers.ts
        summary: Embed insertion functions are separate from MessageInput.svelte but currently import web services and stores that may need bridge adapters.
  - id: A-2
    text: Apple Swift upload/transcription code can continue owning native upload execution if it reports equivalent lifecycle updates back to editor nodes.
    category: apple
    required_before: task_execution
    status: unchecked
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
        summary: Existing upload and transcription functions already produce upload metadata and transcript data that can be mapped to editor node attributes.
  - id: A-3
    text: The current native pending embed strip can be removed from the normal composer path without breaking share extension or quick-capture pending attachment flows.
    category: apple
    required_before: task_execution
    status: unchecked
    evidence:
      - source: apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
        summary: Existing tests intentionally assert pending strips, so they must be rewritten red-first before removing the behavior.

contracts:
  bridge:
    commands:
      - name: insertEmbed
        request: "{ id, type, status, attrs, insertAtSelection?: true }"
        effect: Inserts a Tiptap `embed` node plus trailing text space at the current editor selection.
      - name: updateEmbed
        request: "{ id, attrs, status? }"
        effect: Updates matching embed node attributes without recreating unrelated editor content.
      - name: removeEmbed
        request: "{ id }"
        effect: Removes matching embed node and emits an embedRemoved event.
      - name: serializeMarkdown
        request: "{}"
        response: "{ markdown, blockingEmbeds, embedCount }"
      - name: getDiagnostics
        request: "{}"
        response: "{ extensions, embedCommandNames, embedNodeCount, blockingEmbedCount }"
    events:
      - ready
      - contentChanged
      - embedInserted
      - embedUpdated
      - embedRemoved
      - blockingEmbedsChanged
      - submit
      - heightChanged
      - focus
      - blur
      - error
  data:
    - Editor node attrs must use web-compatible fields such as id, type, status, contentRef, uploadEmbedId, filename, s3Files, s3BaseUrl, aesKey, aesNonce, vaultWrappedAesKey, transcript, duration, mimeType, and uploadError where applicable.
    - Canonical markdown must use fenced JSON embed references matching `tipTapToCanonicalMarkdown` output.
    - Swift pending upload records may exist as service state, but editor nodes are the composer source of truth.
  ui_states:
    - Empty editor with placeholder.
    - Text plus one finished embed.
    - Text around multiple embeds.
    - Uploading image/PDF/file embed.
    - Transcribing recording embed.
    - Failed upload/transcription embed with visible error state.
    - Deleted/cancelled embed excluded from send.
  privacy_security:
    - Do not log or display message plaintext, AES keys, auth/session tokens, private file paths, or share URL fragments.
    - Bridge diagnostics must use counts, type names, statuses, and redacted IDs only.
    - The local WKWebView bundle must not load remote scripts or production web UI at runtime.

