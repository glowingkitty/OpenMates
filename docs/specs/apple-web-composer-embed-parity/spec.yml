implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/editorConfig.ts
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts
    - frontend/packages/ui/src/components/enter_message/extensions/Embed.ts
    - frontend/packages/ui/src/message_parsing/serializers.ts
    - apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift
    - apple/OpenMates/Resources/TiptapComposer/composer.js
  architecture: >
    Build or extract a local composer-core bundle that exposes a bridge API around
    the same logical web Tiptap embed contracts. Swift remains the native host for
    OS capture/picker surfaces and upload execution, but all composer content,
    embed order, deletion, blocking state, and canonical markdown serialization
    flow through the WKWebView editor document.
  data_flow:
    - User focuses Apple composer; WKWebView editor initializes with embed-capable diagnostics.
    - Native action button opens OS-owned picker/capture/recording surface.
    - Swift receives result and calls insertEmbed with local preview/upload metadata.
    - Swift upload/transcription lifecycle calls updateEmbed as state changes.
    - User edits, deletes, or reorders text/embeds in the editor document.
    - Send calls serializeMarkdown and blocks/defers if blockingEmbeds is non-empty.
    - Swift send pipeline receives canonical markdown and existing embed payload metadata without appending pending refs.
  affected_files:
    - path: docs/specs/apple-web-composer-embed-parity/spec.yml
      reason: Executable product contract for true Apple/web composer embed parity.
    - path: frontend/packages/ui/src/components/enter_message/bridge/**
      reason: Proposed shared composer core extraction/generation seam.
    - path: apple/OpenMates/Resources/TiptapComposer/**
      reason: Local WKWebView composer bundle and vendored/generated assets.
    - path: apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift
      reason: Bridge commands/events and diagnostics.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Send/upload pipeline must use editor serialization and reflect lifecycle into editor nodes.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Native pending embed strip must stop being the normal composer embed surface.
    - path: scripts/apple_composer_audit.py
      reason: Deterministic guard against text-only composer regressions.
  verification_strategy:
    - Run red-phase audit/unit/UI tests before implementation and record expected failures.
    - Implement shared composer core and bridge API in small slices.
    - Run frontend vitest through `scripts/tests.py`, then Apple unit/UI tests through `scripts/apple_remote.py`.
    - Run `python3 scripts/spec_verify.py docs/specs/apple-web-composer-embed-parity/spec.yml` before TestFlight.
  verification_order:
    - Deterministic audit and frontend composer-core tests first.
    - Apple bridge unit tests second.
    - Apple attachment and audio UI tests third.
    - Apple build fourth.
    - TestFlight upload final.

