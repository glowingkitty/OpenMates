risks:
  - API-key full access by default is powerful; the warning flow must be explicit and hard to miss.
  - SDK chat access expands the blast radius of leaked API keys, so device approval, scopes, expiration, and budget caps are mandatory enforcement layers.
  - Credit estimation may be imperfect before execution; exact post-execution costs must still never push a key beyond its configured cap.
  - Python crypto parity can drift from web/Node unless shared vectors are mandatory.
  - Existing CLI pair-auth behavior must not regress while extracting shared SDK logic.

open_questions:
  - Should API keys support update-in-place for scopes, credit caps, and expiration after creation, or require key rotation for changes?
  - Should lifetime credit caps count historical usage before the cap was configured when editing an existing key?
  - Should saved SDK chats have a visible source label in the web app indicating they were created by an API key?
