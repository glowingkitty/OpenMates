id: sdk-packages-v1
title: SDK Packages V1
status: approved

goal: >
  Let developers use OpenMates from JavaScript and Python code with API keys,
  including app-skill execution, encrypted chat access, and new chat creation,
  while preserving zero-knowledge encryption, per-key scopes, per-key credit
  budgets, expiration controls, and first-use device approval.

scope:
  in:
    - CSPRNG-generated API keys for the web settings flow.
    - Guided API key creation with scope, credit limit, expiration, and one-time key reveal.
    - API key scopes for chats, app skills, settings, memories, embeds, sharing, and safe account reads.
    - Optional app-level and app-skill-level scope restrictions.
    - One credit cap per API key, selected from daily, weekly, monthly, or lifetime.
    - API-key SDK session unlock that returns only API-key-wrapped master-key material for local SDK decryption.
    - npm SDK ergonomics with lazy initialization and no explicit connect call.
    - pip SDK ergonomics with lazy initialization and no explicit connect call.
    - SDK access to existing encrypted chats only when the key has read scope.
    - SDK creation of non-persistent chats by default, with saved account chats only when explicitly requested.
    - SDK memory loading and explicit memory selection for requests.
    - Apple developer settings parity for API-key creation, warnings, listing, and device approval.
  out:
    - Requiring email address for SDK API-key auth.
    - Server-side plaintext storage of API keys, master keys, chat messages, memories, or API-key labels.
    - Password, passkey, 2FA, recovery-key, and active-session management through API keys.
    - Card checkout through SDKs.
    - Enterprise OAuth, team-scoped API keys, or organization keys.
    - Replacing the existing CLI pair-auth login flow.

