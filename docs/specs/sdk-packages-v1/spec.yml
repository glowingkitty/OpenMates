implementation_plan:
  existing_patterns:
    - SettingsApiKeys.svelte for API-key creation and one-time reveal.
    - SettingsWebhooks.svelte and webhooks.py for permissions plus rate-limit UI patterns.
    - api_key_auth.py for API-key lookup, device registration, approval blocking, and security notification.
    - encryption_keys login_method records for wrapping account master keys by login method.
    - usage daily/monthly API-key summaries for budget accounting.
    - openmates-cli client.ts, crypto.ts, ws.ts, and index.ts for Node crypto/sync/package foundations.
  architecture: >
    Add server-readable API-key authorization metadata to api_keys, a backend
    enforcement service used by every API-key route, an SDK session endpoint that
    returns only wrapped key material for local decryption, and SDK package
    facades that lazy-initialize on first authenticated method call. Keep CLI
    pair-auth flows intact while sharing protocol/crypto helpers where possible.
  data_flow:
    - User opens Create key and configures scopes, one optional credit cap, and expiration.
    - Browser generates the API key with CSPRNG, wraps the existing master key with API-key-derived material, hashes the key, and submits metadata plus encrypted display fields.
    - SDK sends Bearer API key and SDK device identity on first method call.
    - Backend hashes the API key, checks expiration, scope, budget, and device approval, then returns key-wrapper material only when the requested operation needs account decryption.
    - SDK decrypts the master key locally and decrypts/encrypts chat, memory, embed, and share payloads client-side.
    - Usage charging writes api_key_hash and device_hash so budget checks and usage UI remain per-key and per-device.
  affected_files:
    - path: backend/core/directus/schemas/api_keys.yml
      reason: Add scope and credit-limit metadata.
    - path: backend/core/api/app/routes/settings.py
      reason: API-key create/list/update models and settings endpoints.
    - path: backend/core/api/app/utils/api_key_auth.py
      reason: Preserve and extend first-device approval with SDK access types.
    - path: backend/core/api/app/services/api_key_authorization.py
      reason: New shared scope and credit-budget enforcement service.
    - path: backend/core/api/app/routes/sdk.py
      reason: New SDK session and chat endpoints.
    - path: backend/core/api/main.py
      reason: Register SDK API routes.
    - path: backend/core/api/app/routes/apps_api.py
