implementation_plan:
  spec_path: docs/specs/unified-key-wrappers/spec.yml
  existing_patterns:
    - backend/core/directus/schemas/embed_keys.yml for wrapper-row storage.
    - frontend/packages/ui/src/services/embedStore.ts for wrapper-first local decrypt patterns.
    - backend/tests/test_encrypted_chat_metadata_guard.py for chat key immutability guardrails.
    - docs/specs/workflows-v1/spec.yml for Automation Vault boundaries.
  architecture: >
    Implement a shared key-wrapper contract and domain-specific adapters that let
    each encrypted object resolve a stable content key from authorized wrapper
    rows. Production chats migrate by adding wrapper rows and keeping row-key
    fallback; unshipped objects switch to wrapper rows as canonical before launch.
  data_flow:
    - Client creates an object content key.
    - Client encrypts private content with the object content key.
    - Client stores wrapper rows for each authorized context.
    - Backend stores and returns wrappers only after owner/context/team authorization.
    - Object moves add new wrapper rows before deleting obsolete wrappers.
    - Chat migration copies existing encrypted_chat_key ciphertext into master chat wrapper rows without decrypting.
  affected_files:
    - path: backend/core/directus/schemas/chats.yml
      reason: Keep encrypted_chat_key as compatibility fallback and add chat wrapper relation/index notes.
    - path: backend/core/directus/schemas/embed_keys.yml
      reason: Extend existing wrapper contract with plan/team context support without breaking current sync.
    - path: backend/core/directus/schemas/projects.yml
      reason: Remove or deprecate row-level encrypted_project_key before project launch.
    - path: backend/core/directus/schemas/user_plans.yml
      reason: Make plan wrappers canonical and add plan/team context fields.
    - path: backend/core/directus/schemas/user_tasks.yml
      reason: Make task wrappers canonical and add plan/team context fields.
    - path: backend/core/directus/schemas/workflow_encrypted_blobs.yml
      reason: Document and test Automation Vault boundary relative to client wrapper architecture.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/phased_sync_handler.py
      reason: Include chat key wrappers and preserve embed key ordering in sync payloads.
    - path: backend/core/api/app/routes/sync_api.py
      reason: SDK/CLI sync payloads need wrapper rows for decryptability.
    - path: backend/core/api/app/routes/chats.py
      reason: Chat detail/read endpoints need wrapper-first data and fallback behavior.
    - path: backend/core/api/app/routes/projects.py
      reason: Project create/update/move wrapper handling.
    - path: backend/core/api/app/routes/user_plans.py
      reason: Plan wrapper canonicalization and plan-connected child object wrappers.
    - path: backend/core/api/app/routes/user_tasks.py
      reason: Task wrapper canonicalization and plan/team context support.
    - path: backend/core/api/app/services/directus
      reason: Shared wrapper persistence, idempotent backfill, authz, and add-then-delete replacement helpers.
    - path: frontend/packages/ui/src/services/embedStore.ts
      reason: Existing reference for local wrapper storage and decrypt resolution.
    - path: frontend/packages/ui/src/services/chatSyncServiceHandlersCoreSync.ts
      reason: Store chat wrappers before decrypt-dependent chat data where needed.
    - path: frontend/packages/ui/src/services/userPlanService.ts
      reason: Stop row-level plan key dependency.
    - path: frontend/packages/ui/src/services/userTaskService.ts
      reason: Stop row-level task key dependency and support plan wrappers.
    - path: frontend/packages/ui/src/services/projectService.ts
      reason: Stop row-level project key dependency.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI chat/project/plan/task wrapper sync and decrypt support.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK wrapper decrypt parity.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK wrapper decrypt parity.
    - path: frontend/apps/web_app/tests/chat-key-wrapper-migration.spec.ts
      reason: Live dev chat decrypt regression and no-migration-copy assertion.
    - path: scripts/verify_chat_key_wrapper_smoke.py
      reason: Real CLI dev-server proof that wrapper migration preserves decryptability.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/unified-key-wrappers/spec.yml
    - Backend pytest for chat wrapper migration and authz before implementation.
    - Real CLI dev smoke against api.dev.openmates.org before SDK/web work is considered green.
    - npm and pip SDK wrapper parity tests plus python3 scripts/audit_sdk_cli_parity.py.
    - Web Playwright after deploy against app.dev.openmates.org.
    - User confirmation that chat decryptability is unchanged and no migration UI appears.
    - Apple status/build and native decrypt test when touched.
  verification_order:
    - Spec validation.
    - Backend red/green contract tests.
    - Real CLI dev-server smoke.
    - GitHub Actions/daily-test wiring for the same CLI coverage after dev CLI success.
    - npm SDK parity.
    - pip SDK parity.
    - Web Playwright after deploy.
    - User confirmation.
    - Apple remote build/test.
  risks:
    - Breaking existing chat decryption by switching clients to wrapper rows before backfill/fallback is correct.
    - Accidentally logging raw keys or decrypted content during migration diagnostics.
    - Treating wrapper existence as authorization and leaking ciphertext/wrappers to unauthorized users.
    - Deleting old wrappers before new wrappers are safely persisted.
    - Mixing Automation Vault workflow runtime secrets with client-side wrapper semantics.
    - Scope creep into team permissions and read/write role semantics.
  open_questions:
    - What production evidence duration is required before a future spec can remove chats.encrypted_chat_key fallback?
    - Should physical storage eventually converge into one generic object_key_wrappers table, or is a canonical per-domain wrapper contract sufficient long-term?
    - Which exact team-key rotation policy will the teams spec choose for member removal: no rotation, rotate for future writes only, or explicit admin-triggered historical rewrap?

