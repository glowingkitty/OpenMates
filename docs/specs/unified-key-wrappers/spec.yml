schema_version: 2
id: unified-key-wrappers
title: Unified Key Wrappers
status: implementing

goal: >
  Unify OpenMates client-side encrypted object key handling so chats, embeds,
  projects, plans, tasks, and future teams use stable per-object content keys
  with separate access-context wrapper rows. Existing production chats must keep
  decrypting throughout the migration with no user-visible upgrade prompt.

scope:
  in:
    - A canonical key-wrapper contract for client-side encrypted object keys, separate from the rows whose content they decrypt.
    - Wrapper context types master, chat, project, plan, and team.
    - Team key epoch/version fields for future team wrappers so team-key rotation can be represented without re-encrypting object content.
    - Production-safe chat migration from row-level encrypted_chat_key to wrapper-first reads with row-key fallback.
    - Backend-only backfill of master chat wrappers by copying existing row-level encrypted_chat_key ciphertext without decrypting it.
    - Breaking cleanup for unshipped projects, tasks, plans, and team-adjacent dev data so they ship with wrapper rows as canonical from day one.
    - Embed key wrappers remain the reference implementation and must stay compatible with existing embed sync/share flows.
    - Client, CLI, npm SDK, pip SDK, web, and Apple decrypt paths must read wrappers consistently before row-level fallback where fallback is still required.
    - Workflow key handling boundaries between client-side encrypted/shareable workflow metadata and Automation Vault server-execution secrets.
  out:
    - Team membership roles, read/write permission scopes, ACL UI, invites, or team billing; these belong in a separate teams spec.
    - Durable device-specific, API-key-specific, or share-specific object key wrapper types.
    - Re-encrypting chat/message/embed/task/plan/project content during migration.
    - User-visible migration prompts, banners, manual repair flows, or required account actions.
    - Removing chats.encrypted_chat_key from production before a later compatibility-window spec explicitly proves it safe.
    - Making unattended workflow execution cryptographically inaccessible to the backend; Automation Vault remains the execution boundary.

context_discovery:
  github_issues:
    - "gh issue list --search 'encryption key wrapper team decrypt chats' --limit 10 returned no matching issues in this session."
    - "GitHub MCP credentials previously returned 401 in this workspace; gh CLI search was used for bounded discovery."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/tasks-v1/spec.yml
    - docs/specs/plans-v1/spec.yml
    - docs/specs/workflows-v1/spec.yml
    - docs/specs/sdk-cli-parity-v1/spec.yml
    - docs/specs/share-short-links-og-images/spec.yml
    - docs/user-guide/export-account.md
  code_patterns:
    - backend/core/directus/schemas/embed_keys.yml is the clean existing wrapper-row pattern with master/chat/project key types.
    - backend/core/directus/schemas/embeds.yml intentionally removed row-level embed key material and points to embed_keys.
    - backend/core/directus/schemas/chats.yml still stores encrypted_chat_key on the chat row.
    - backend/core/directus/schemas/projects.yml still stores encrypted_project_key on the project row.
    - backend/core/directus/schemas/user_plans.yml has both encrypted_plan_key on the row and user_plan_key_wrappers.
    - backend/core/directus/schemas/user_tasks.yml has both encrypted_task_key on the row and user_task_key_wrappers.
    - backend/core/directus/schemas/workflow_encrypted_blobs.yml uses Vault Transit ciphertext with vault_key_ref for server-executed workflows.
    - frontend/packages/ui/src/services/embedStore.ts stores embed_keys locally and decrypts embeds from wrapper rows.
    - frontend/packages/ui/src/services/userPlanService.ts still decrypts plans from row-level encrypted_plan_key.
    - frontend/packages/openmates-cli/src/tasksCli.ts still decrypts tasks from row-level encrypted_task_key.
  tests:
    - backend/tests/test_encrypted_chat_metadata_guard.py
    - frontend/packages/openmates-cli/tests/embedCreator.test.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - frontend/packages/openmates-cli/tests/tasks.test.ts
    - frontend/packages/openmates-cli/tests/sdk-tasks.test.ts
    - backend/tests/test_user_tasks_api.py
    - frontend/apps/web_app/tests/export-account-flow.spec.ts
    - frontend/apps/web_app/tests/chat-flow.spec.ts

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Core/Encryption
    - apple/OpenMates/Sources/Chat
    - apple/OpenMates/Sources/Projects
    - apple/OpenMates/Sources/Plans
    - apple/OpenMates/Sources/Tasks
  parity_expectations:
    - Apple must decrypt existing production chats after the chat wrapper migration with no user-visible migration state.
    - Apple must read canonical wrappers for new projects/plans/tasks/teams before those features ship natively.
    - Apple may keep row-level chat key fallback until the production compatibility window ends.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios after shared API/client contracts are implemented
    - Targeted Apple decrypt regression tests if native wrapper decoding already exists or is added during implementation.
  intentional_native_differences:
    - Native UI should not expose migration copy or progress; any repair diagnostics remain developer-only.

clarification:
  rounds:
    - question: For the first migration slice, should we target zero user-visible migration prompts by auto-backfilling wrappers when a user opens/syncs data, or is it acceptable to show a one-time upgrade encryption keys flow that requires the user's unlocked device?
      answer: Users should not see any migration info; it should just work. Backend-only migration is preferred wherever possible.
    - question: Should the first spec explicitly make master wrapper backfill backend-only, while deferring creation of new team/project/chat wrappers to normal client actions when the user moves or shares an object?
      answer: Backend-only master wrapper backfill is acceptable for existing row-level keys because the ciphertext can be copied without decrypting. New contextual wrappers are created by clients when needed.
    - question: Does the fact that projects, workflows, tasks, plans, and teams are not yet shipped to production change the migration plan?
      answer: Yes. Existing production chats need compatibility-first migration. Unshipped projects, workflows, tasks, plans, and teams can use breaking cleanup or data reset before launch.
    - question: Should the unified wrapper model support only master, chat, project, and team, or also device, share, or api_key wrapper types?
      answer: Support master, chat, project, team, and plan. Do not add separate device, api_key, or share wrapper types for V1.
    - question: Should plan be a real access context with its own plan_key and plan wrapper type for connected tasks?
      answer: Yes. Plans need first-class plan wrappers so plan-connected tasks remain decryptable when a plan is opened or shared.
  vision_summary: >
    Use the embed-style wrapper-row architecture as the standard for client-side
    encrypted product objects. Production chat migration must be invisible and
    compatibility-first; unshipped projects/tasks/plans/teams can be cleaned up
    before launch. Workflow execution remains a special Automation Vault boundary,
    while client-side workflow/share metadata follows wrapper rules where it uses
    client-side object keys.
  approved_by_user: true

