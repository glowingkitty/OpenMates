contracts:
  key_wrapper_contract:
    canonical_fields:
      - id
      - object_type
      - hashed_object_id
      - hashed_user_id
      - key_type
      - hashed_chat_id
      - hashed_project_id
      - hashed_plan_id
      - hashed_team_id
      - encrypted_object_key
      - team_key_epoch
      - created_at
      - expires_at
      - wrapper_version
    key_types:
      - master
      - chat
      - project
      - plan
      - team
    excluded_key_types:
      - device
      - api_key
      - share
    notes:
      - Physical storage may remain domain-specific in the first implementation, e.g. embed_keys, chat_key_wrappers, user_task_key_wrappers, user_plan_key_wrappers, and project_key_wrappers.
      - Domain-specific collections must map to the canonical fields and semantics even if field names differ, such as encrypted_embed_key or encrypted_task_key.
      - When a domain-specific wrapper collection already uses hashed_plan_id as its object id, plan-context wrapper storage must use a distinct field such as hashed_context_plan_id to avoid ambiguous duplicate fields.
      - Wrapper rows are encrypted grants, not authorization records. API authorization must still enforce owner/team/context membership before returning rows.
      - For key_type team, team_key_epoch is required so clients can choose the correct wrapped team key before decrypting encrypted_object_key.
      - team_key_epoch is a team key rotation/version marker, not the chat/message protocol epoch used by chat completion recovery.
  data:
    - collection: team_key_wrappers
      purpose: Future Teams encryption handoff for wrapping a team key to each active member without adding per-member wrappers to every object.
      required_fields:
        - hashed_team_id
        - hashed_user_id
        - team_key_epoch
        - encrypted_team_key
        - status
        - created_at
      optional_fields:
        - revoked_at
      implementation_notes:
        - Membership roles, invites, billing, and read/write scopes are specified by the Teams spec, not here.
        - Team-owned object wrappers with key_type team must reference the team_key_epoch used to wrap the object key.
        - Revoking a team key wrapper blocks future managed-client decrypt authority but is not cryptographic erasure of data already synced to a removed member's device.
    - collection: chat_key_wrappers
      purpose: Canonical chat key wrappers for production-safe chat migration and future team/project/plan access.
      required_fields:
        - hashed_chat_id
        - hashed_user_id
        - key_type
        - encrypted_chat_key
        - created_at
      optional_context_fields:
        - hashed_project_id
        - hashed_plan_id
        - hashed_team_id
        - team_key_epoch
        - expires_at
      migration_notes:
        - Backfill master rows from chats.encrypted_chat_key without decrypting.
        - Keep chats.encrypted_chat_key as fallback until a later removal spec.
    - collection: embed_keys
      purpose: Existing canonical embed key wrappers.
      required_changes:
        - Add plan and team context support, including team_key_epoch for team wrappers, if embeds can attach to plans or teams.
        - Preserve existing master/chat/project behavior and sync payload shape.
    - collection: project_key_wrappers
      purpose: Project key wrappers for master/team and future context moves.
      required_changes:
        - Replace row-level encrypted_project_key usage before projects ship.
        - Add team_key_epoch to team project wrappers.
    - collection: user_plan_key_wrappers
      purpose: Plan key wrappers and plan-context access to related objects.
      required_changes:
        - Make wrapper rows canonical and remove client dependency on encrypted_plan_key.
        - Support team and chat/project contexts where plan ownership or visibility requires them.
        - Use hashed_context_plan_id for plan-context wrapper storage because hashed_plan_id identifies the plan object itself.
        - Add team_key_epoch to team plan wrappers.
    - collection: user_task_key_wrappers
      purpose: Task key wrappers for master/chat/project/plan/team access.
      required_changes:
        - Make wrapper rows canonical and remove client dependency on encrypted_task_key.
        - Add hashed_plan_id and hashed_team_id context fields.
        - Add team_key_epoch to team task wrappers.
    - collection: workflow_encrypted_blobs
      purpose: Automation Vault encrypted workflow runtime content.
      required_changes:
        - Preserve vault_key_ref/key_version execution boundary.
        - Do not reinterpret Vault runtime blobs as client-side wrapper objects.
  api:
    - route: GET /v1/key-wrappers/{object_type}/{object_id}
      status: illustrative_contract
      request: "object_type in chat|embed|project|plan|task; object_id; optional context filters"
      response: "{ key_wrappers: KeyWrapper[] }"
      notes:
        - Implementation may expose domain-specific endpoints instead if existing sync APIs remain safer.
        - Every route returning wrappers must enforce owner/context/team authorization first.
    - route: POST /v1/key-wrappers/{object_type}/{object_id}
      status: illustrative_contract
      request: "{ key_wrappers: KeyWrapper[], expected_object_version?: number }"
      response: "{ key_wrappers: KeyWrapper[] }"
      notes:
        - Add replacement wrappers before deleting old wrappers.
        - Stale object versions return a visible conflict instead of partial key changes.
    - route: POST /v1/admin/migrations/chat-key-wrappers/backfill
      status: internal_or_script
      request: "dry_run?: boolean, limit?: number"
      response: "{ checked, created, skipped, failed }"
      notes:
        - May also be implemented as a deterministic script rather than public API.
        - Must not decrypt or log chat keys.
  client_decrypt_order:
    chat:
      - Try authorized chat_key_wrappers master/context rows.
      - Fallback to chats.encrypted_chat_key during compatibility window.
      - If both fail, show existing visible decrypt error without migration copy.
    embed:
      - Try embed_keys rows.
      - No row-level fallback.
    project_plan_task:
      - Try canonical wrapper rows only before production launch.
      - Dev-only legacy row-level fallback may exist only behind implementation tests and must not be shipped as public contract.
    workflow:
      - Use client wrappers only for client-side/shareable projection payloads.
      - Use Automation Vault only for server runtime content.
  privacy_security:
    - Backend migration may copy wrapped key ciphertext but must not decrypt object keys.
    - Logs, traces, tests, and evidence must not contain raw keys, decrypted object content, share URL fragments, or private metadata.
    - Wrapper row existence cannot be used as the only authorization check.
    - Removing a wrapper revokes only that access context and must not delete the encrypted object or unrelated wrappers.
    - Removing a member's team_key_wrapper revokes future managed-client access but cannot cryptographically erase data or plaintext keys already synced to that member's devices.
    - Key replacement is add-then-delete and idempotent; failures leave at least one previous valid access path.
    - Row-level chat fallback removal requires a separate later spec with production evidence.
  rollout:
    phases:
      - Add wrapper schema and backend backfill dry run for chats.
      - Ship wrapper-first clients with chat row-key fallback.
      - Backfill production chat master wrappers.
      - Stop row-level key dependency for unshipped projects/plans/tasks before launch.
      - Add plan/team wrapper contexts for new surfaces.
      - Ensure all team context wrappers and future team_key_wrappers include team_key_epoch before Teams implementation begins.
      - Record telemetry/deterministic checks for missing wrapper rows and decrypt failures.
