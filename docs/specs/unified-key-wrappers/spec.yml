decisions:
  - id: D-1
    status: active
    decision: Use a unified logical wrapper-row contract rather than row-level object keys.
    reason: Wrapper rows let access move from personal to chat/project/plan/team contexts without re-encrypting encrypted content.
    decided_at: "2026-07-17"
  - id: D-2
    status: active
    decision: Keep durable wrapper context types to master, chat, project, plan, and team for V1.
    reason: Device and API-key access should unlock through existing account/session master-key paths; share links should keep URL-fragment decrypt authority unless a future durable sharing product requires otherwise.
    decided_at: "2026-07-17"
  - id: D-3
    status: active
    decision: Migrate production chats with wrapper-first reads and encrypted_chat_key fallback.
    reason: Existing users must not lose chat decryptability or see migration prompts.
    decided_at: "2026-07-17"
  - id: D-4
    status: active
    decision: Treat workflows as split-domain encryption.
    reason: Client-side/shareable workflow metadata can use object wrappers, but unattended server execution still requires Automation Vault with audited decrypt.
    decided_at: "2026-07-17"
  - id: D-5
    status: active
    decision: Keep team read/write permission scopes out of this spec except where needed to prevent cryptographic access leaks.
    reason: Membership roles and ACL semantics belong in a dedicated teams spec; this spec only defines key wrapping and safe authorization boundaries.
    decided_at: "2026-07-17"
  - id: D-6
    status: active
    decision: Include team key epochs in the wrapper contract.
    reason: Team-owned object wrappers need to record which team key version wrapped the object key so future member-removal rotation can be incremental and does not require re-encrypting object content.
    decided_at: "2026-07-17"

