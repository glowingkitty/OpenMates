scenarios:
  - id: S-1
    title: Existing production chat keeps decrypting after wrapper migration
    given:
      - Alice has an existing production chat with encrypted_chat_key on the chat row.
      - Alice has not opened the app since the migration deployed.
    when:
      - The backend migration runs.
      - Alice opens the chat from web, CLI, npm SDK, pip SDK, or Apple.
    then:
      - A master chat wrapper row exists by copying encrypted_chat_key ciphertext without backend decryption.
      - Clients try wrapper rows first and fall back to encrypted_chat_key if needed.
      - Alice can decrypt the chat title, messages, and metadata exactly as before.
      - Alice sees no migration banner, prompt, progress, or repair instruction.

  - id: S-2
    title: New chat writes wrapper rows without breaking old clients
    given:
      - Alice creates a new chat after the wrapper-aware clients are deployed.
    when:
      - The chat is persisted and synced to another authenticated device.
    then:
      - The client writes a master chat wrapper row for the chat key.
      - The chat row may still include encrypted_chat_key only as compatibility fallback during the migration window.
      - Wrapper-aware clients decrypt using the wrapper row.
      - Legacy clients that only know encrypted_chat_key do not corrupt or rotate the chat key.

  - id: S-3
    title: Embeds continue using the existing wrapper architecture
    given:
      - Alice has embeds stored with embed_keys rows.
    when:
      - Chat sync, embed preview, share, and CLI embed show flows run after the unified wrapper work.
    then:
      - Existing embed_keys rows remain valid.
      - Embed sync still sends needed embed_keys before decrypting embed content.
      - No row-level embed key is reintroduced.
      - Future team/plan wrapper support extends the same wrapper contract without regressing current master/chat/project wrappers.

  - id: S-4
    title: Unshipped projects, tasks, and plans ship with wrappers as canonical
    given:
      - Dev-only project, task, and plan rows may have row-level encrypted keys from pre-release development.
    when:
      - The unified wrapper schema and clients are implemented before production launch of those surfaces.
    then:
      - Row-level encrypted_project_key, encrypted_task_key, and encrypted_plan_key are removed or marked migration-only and unused by clients.
      - New project, task, and plan content decrypts only through wrapper rows.
      - Dev-only incompatible rows can be deleted or reset instead of migrated.

  - id: S-5
    title: Plan-connected tasks decrypt through plan wrappers
    given:
      - Alice has a plan with plan_key.
      - The plan has three connected tasks, each with its own task_key.
    when:
      - Alice opens the plan or shares a read-only plan export/link.
    then:
      - Each connected task has a task wrapper with key_type plan, hashed_plan_id, and task_key wrapped by plan_key.
      - Alice or a share recipient with plan decrypt authority can decrypt task titles and labels through the plan wrapper.
      - Removing a task from the plan removes only the plan wrapper and does not remove master, project, team, or chat wrappers.

  - id: S-6
    title: Moving an object into a team changes wrappers, not ciphertext
    given:
      - Alice owns a chat with embeds and a project with tasks and plans.
      - A future team_key exists for Team Acme and Alice is authorized to move the project.
    when:
      - Alice moves the chat and project into Team Acme.
    then:
      - The client unwraps object keys through existing valid wrappers.
      - The client creates team wrappers for the chat key, embed keys, project key, and required child task/plan keys.
      - Each team wrapper records the team key epoch used to wrap the object key.
      - Content ciphertext stays unchanged.
      - Obsolete personal/project/plan wrappers are removed only after replacement wrappers are persisted and authorization checks pass.

  - id: S-7
    title: Wrapper presence does not replace authorization
    given:
      - Mallory somehow knows an object id but is not the owner and is not a team/project/plan/chat member for it.
    when:
      - Mallory requests encrypted object rows or wrapper rows.
    then:
      - The backend denies the read before returning ciphertext or wrappers.
      - Wrapper rows are scoped by hashed owner and context identifiers.
      - Future read/write role scopes remain defined by the teams permissions spec, not by wrapper existence alone.

  - id: S-8
    title: Workflow execution keeps Automation Vault boundaries
    given:
      - Alice has a scheduled workflow and a shareable workflow template projection.
    when:
      - The scheduler claims the workflow and a user exports or shares the template projection.
    then:
      - Scheduler/runtime secrets remain in Automation Vault and are decrypted only through audited backend execution paths.
      - Client-side/shareable projection data uses object wrapper semantics when it has client-side object keys.
      - Team access to workflow definitions does not grant server runtime decrypt outside the existing Automation Vault authorization model.

