implementation_plan:
  existing_patterns:
    - Existing code-code embeds already render and fullscreen source files using UnifiedEmbedPreview and UnifiedEmbedFullscreen.
    - Code Run already starts E2B sandboxes from selected encrypted code embeds with credit checks, limits, cancellation, logs, and privacy policy coverage.
    - Embed Diff-Based Editing already patches child code embeds with unified diffs and version history.
    - The generated embed registry already maps app.yml embed_types to preview/fullscreen components.
    - Share links already provide embed keys to recipients without exposing keys to the server.
  architecture: >
    Add application as a direct Code app embed type and treat it as a project
    manifest that references child source and asset embeds. The AI pipeline's
    primary runnable-app path is a structured application artifact builder that
    validates a typed payload, creates child code/file embeds, and creates one
    parent application embed from the same backend-owned operation. Markdown and
    code-fence inference remains as a compatibility fallback only. Add an E2B
    application preview service separate from Code Run terminal execution.
    Preview sessions are viewer-scoped, billed to the starter, exposed only
    through a user-content preview gateway, and stopped by explicit controls,
    idle heartbeat, and hard duration limits.
  data_flow:
    - Assistant emits or invokes a structured generated-application artifact containing manifest metadata, entrypoints, and file payloads.
    - Backend validates the artifact and creates child code-code embeds plus one parent code-application embed in a controlled operation.
    - If no structured artifact is emitted, stream parsing can infer a parent application embed from already-created child code embeds only after a runnable manifest is complete.
    - User opens application fullscreen and clicks Start preview.
    - Frontend calls the application preview start API with chat ID and application embed ID.
    - Backend checks auth, embed access, preview-origin config, credits, and concurrency limits.
    - Worker resolves/decrypts required child embeds using existing embed access patterns and writes files/assets into a new E2B sandbox.
    - Worker installs dependencies from allowlisted manifests, starts frontend/backend commands, records exposed ports, and returns a preview gateway URL.
    - Browser iframe or Apple WKWebView loads the preview gateway URL on APPLICATION_PREVIEW_ORIGIN.
    - Preview gateway validates session and proxies HTTP/WebSocket traffic to the correct E2B port while injecting provider access server-side.
    - Follow-up diffs update child embeds and active sandbox files; the dev server hot reloads or restarts.
    - Stop/idle/hard-timeout kills or stops the sandbox, finalizes billing, and leaves compact logs/status.
  affected_files:
    - path: backend/apps/code/app.yml
      reason: Register application embed type and preview metadata under the Code app.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Use structured application artifact creation as the primary generated-app path and keep manifest inference as fallback.
    - path: backend/core/api/app/services/embed_service.py
      reason: Provide the backend-owned application artifact builder that creates child and parent embeds consistently.
    - path: backend/shared/python_schemas/embed_schemas.py
      reason: Add application embed content schema and preview session schema if central schema coverage exists there.
    - path: backend/core/api/app/routes/application_preview.py
      reason: Add authenticated preview start/stop/status API routes.
    - path: backend/core/api/app/routes/application_preview_gateway.py
      reason: Add preview-origin gateway/proxy routes for HTTP and WebSocket traffic.
    - path: backend/apps/code/tasks/run_application_preview_task.py
      reason: Start and monitor E2B application preview sandboxes.
    - path: backend/shared/providers/e2b_application_preview.py
      reason: Provider wrapper for E2B app-preview lifecycle, port exposure, and cleanup.
    - path: frontend/packages/ui/src/components/embeds/code/ApplicationEmbedPreview.svelte
      reason: Render the application preview card.
    - path: frontend/packages/ui/src/components/embeds/code/ApplicationEmbedFullscreen.svelte
      reason: Render preview/files/logs/data/settings workspace.
    - path: frontend/packages/ui/src/services/applicationPreviewService.ts
      reason: Client API for start/stop/status and stream/log handling.
    - path: frontend/packages/ui/src/i18n/sources/embeds.yml
      reason: Add application embed labels and preview state text.
    - path: shared/docs/privacy_policy.yml
      reason: Update E2B disclosure for application live previews.
    - path: frontend/packages/ui/src/i18n/sources/legal/privacy.yml
      reason: Update user-facing privacy policy text.
    - path: apple/OpenMates/Sources/Features/Embeds/ApplicationPreviewView.swift
      reason: Add Apple WKWebView-based application preview surface.
    - path: apple/OpenMates/Sources/Core/I18n/AppStrings.swift
      reason: Add typed accessors for Apple application preview UI strings if new strings are needed.
    - path: docs/architecture/messaging/embeds.md
      reason: Document application parent embeds and child source/asset embed relationships.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/application-embeds/spec.yml
    - python3 -m pytest backend/tests/test_code_block_detection.py
    - python3 -m pytest backend/tests/test_application_preview_config.py backend/tests/test_application_preview_gateway.py
    - python3 scripts/run_tests.py --suite vitest
    - python3 scripts/run_tests.py --spec application-preview.spec.ts
    - python3 scripts/run_tests.py --spec application-preview-share.spec.ts
    - xcodebuild -project apple/OpenMates.xcodeproj -scheme OpenMates_iOS -destination 'platform=iOS Simulator,name=iPhone 17' build
    - python3 scripts/lint_changed.sh

