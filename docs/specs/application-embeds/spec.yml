clarification:
  rounds:
    - question: What exact user-content domain should the preview gateway use for OpenMates Cloud, and how should self-hosted instances configure it?
      answer: >
        The domain must be configured through environment variables so self-hosted
        editions can use the feature properly. OpenMates Cloud uses
        https://openmatesusercontent.org.
    - question: Should shared-chat recipients be able to run application previews, and who pays for those sessions?
      answer: >
        Shared-chat recipients should be able to run the application, but the
        authenticated viewer who starts the preview is billed. The application
        creator is never billed for another user opening or running their
        shared application. Each viewer starts a separate E2B sandbox session;
        shared recipients never attach to the creator's running sandbox.
    - question: Should the rendered DOM be cached as part of the application, similar to Code Run output sidecars?
      answer: >
        Full DOM caching is deferred from v1 because it risks storage growth,
        private data capture, stale state, and complex replay semantics. A
        lightweight screenshot thumbnail is in scope for v1 and should be shown
        in the application preview and fullscreen with a play button overlay.
        The durable source of truth remains the application manifest plus child
        embeds, not the rendered DOM.
    - question: Should Apple client support be deferred or included in the first implementation?
      answer: >
        Apple client support is part of v1. The Apple app should not execute
        generated application code locally; it should load the authorized
        preview gateway URL in WKWebView, with the same separate E2B sandbox per
        viewer and the same preview-origin isolation contract as the web app.
    - question: Should application preview pricing reuse existing Code Run pricing?
      answer: >
        Yes. Application previews reuse the existing Code Run price of 5 credits
        per started minute of E2B runtime unless implementation discovery shows
        that a separate SKU is required.
    - question: How should preview gateway traffic be authorized on the separate user-content origin?
      answer: >
        Use a short-lived signed path token in the preview URL, for example
        /p/<session_id>/<token>/. The token is scoped to one preview session,
        stored server-side only as a hash, expires with the active session
        timeout or 30-minute hard cap, and is revoked on Stop. It authorizes only
        sandbox proxy traffic on the preview gateway; normal start/status/stop
        APIs still require OpenMates authentication.
  vision_summary: >
    Application embeds are project containers. They reference encrypted child
    code and asset embeds, and a viewer can explicitly start an E2B preview
    session routed through a separate user-content origin. The preview runtime
    is cross-platform because browsers and Apple clients only load a URL; code
    executes in E2B, not in the OpenMates app origin or native app process.
    The primary creation path is now a structured backend application artifact
    builder that atomically creates child file embeds and one parent application
    embed; stream parser inference remains a fallback for legacy or free-form
    Markdown responses only.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Generate a multi-file frontend application through a structured artifact
    given:
      - Alice is authenticated in a normal chat.
      - Alice asks OpenMates to create a Svelte recipe manager UI with sample recipes.
    when:
      - The assistant chooses the generated-application artifact path.
    then:
      - The backend receives one structured application artifact payload with manifest metadata and files.
      - The backend validates file paths, entrypoints, runtime metadata, and secret-like content before creating embeds.
      - The backend atomically creates child code-code embeds and one parent code-application embed for the same message.
      - The assistant message shows one application embed, not a loose stack of unrelated code embeds.
      - The application embed has child code-code embeds for package.json, src/App.svelte, src/main.ts, and CSS files.
      - The application embed manifest lists file paths, child embed IDs, framework, runtime, and preview support.
      - The application embed preview shows either the latest screenshot thumbnail or an empty preview placeholder with a play button overlay.
      - Because Alice created the application in this active chat, OpenMates auto-starts one creator-owned preview session after the assistant response completes.
      - The auto-started session captures and persists the latest screenshot thumbnail, then stops after 1 minute unless Alice opens the preview.

  - id: S-10
    title: Fall back from Markdown code fences to an application parent
    given:
      - Alice asks for a generated application.
      - The assistant outputs ordinary Markdown code fences instead of a structured application artifact.
    when:
      - The backend detects child code-code embeds whose filenames form a runnable app manifest.
    then:
      - The backend creates at most one parent code-application embed referencing those child files.
      - The fallback requires a dependency manifest, at least one recognized source file, and a known entrypoint before creating the parent.
      - The fallback never starts a preview sandbox automatically unless it is created in the active authenticated creator chat as part of the just-finished assistant response.
      - If the file set is incomplete, OpenMates leaves the code embeds visible and does not create a misleading application parent.

  - id: S-2
    title: Start a cross-platform live preview
    given:
      - Alice has an application embed with E2B preview support.
      - APPLICATION_PREVIEW_ORIGIN is configured as https://openmatesusercontent.org.
    when:
      - Alice opens the generated application preview, or clicks Resume on a stopped or timed-out screenshot thumbnail.
    then:
      - OpenMates shows a credit estimate before or during preview startup.
      - The backend creates an E2B sandbox and writes the selected application files and assets into it.
      - The backend starts the configured frontend or fullstack development server.
      - The fullscreen iframe loads a URL under the configured preview origin.
      - Alice can open the same preview in a new browser window.
      - Opening the auto-started preview before its one-minute timeout extends the active idle timeout to 5 minutes.
      - The preview URL contains a short-lived signed path token scoped to Alice's preview session.
      - The raw E2B URL and traffic access token are not exposed to the client.

  - id: S-3
    title: Run a fullstack FastAPI application with sample data
    given:
      - Alice asks for a React dashboard with a FastAPI backend and customers database.
    when:
      - Alice starts the application preview.
    then:
      - E2B runs the frontend server and FastAPI server inside the same preview session.
      - The preview gateway routes frontend traffic and /api/* traffic to the correct sandbox ports.
      - The backend uses generated sample data or ephemeral SQLite data only.
      - No production database credentials or OpenMates user data are injected into the sandbox.

  - id: S-4
    title: Iterate on an active application preview
    given:
      - Alice has an active preview for a generated application.
      - The application includes a child code-code embed for src/App.tsx.
    when:
      - Alice asks the assistant to make the cards draggable.
    then:
      - The assistant emits diffs or replacement files against the child code embeds.
      - Successful diffs update the encrypted child embeds and application version metadata.
      - If the preview session is still active, OpenMates writes the changed files into E2B.
      - The running dev server hot reloads or restarts without creating a new application embed.
      - After the preview stabilizes, OpenMates can refresh the screenshot thumbnail for the latest successful preview state.

  - id: S-5
    title: Shared recipient runs a preview and pays for runtime
    given:
      - Alice shares a chat containing an application embed with Bob.
      - Bob is authenticated and has sufficient credits.
    when:
      - Bob opens the shared chat and clicks Start preview.
    then:
      - Bob can run the application preview from the shared application source.
      - Bob starts a separate E2B sandbox for his preview session.
      - Bob is billed for the E2B preview runtime he starts at the application preview credit rate.
      - Alice is not billed for Bob's preview session.
      - Bob cannot access any runtime state, uploaded files, local database state, logs, or secrets from Alice's active or previous preview sessions.
      - Bob cannot modify Alice's original application embeds unless normal shared-chat editing permissions allow it.

  - id: S-11
    title: Authenticated user runs the Habit Garden example application
    given:
      - Alice is authenticated and has enough credits for at least one started preview minute.
      - Alice opens the example chat example-habit-garden-vite-app on app.dev.openmates.org.
    when:
      - Alice opens the Habit Garden application embed fullscreen and clicks Start preview.
    then:
      - The API starts a viewer-owned application preview session using the dev user-content origin.
      - E2B starts the generated Vite application with server.allowedHosts covering the exact E2B sandbox host.
      - The iframe loads Habit Garden application content through the preview gateway without showing Vite's Blocked request page.
      - The iframe preserves same-origin semantics for the user-content origin so Vite module scripts and generated app JavaScript do not execute from origin null.
      - Generated app JavaScript responds to user interaction inside the iframe.
      - The preview URL does not expose the raw E2B host to the client.

  - id: S-12
    title: Unauthenticated user cannot start billable example preview
    given:
      - An unauthenticated visitor opens the Habit Garden example chat.
    when:
      - The visitor opens the application embed and clicks Start preview.
    then:
      - No preview/start API request creates a session or E2B sandbox.
      - The visitor is forwarded to the signup or login flow.
      - No credits or usage records are created for anonymous preview attempts.

  - id: S-13
    title: Application preview runtime appears in usage and billing history
    given:
      - Alice is authenticated and starts a Habit Garden preview from the example chat.
    when:
      - The preview reaches a billable running state and then stops or times out.
    then:
      - Alice is charged according to the application preview started-minute rate.
      - A usage entry is created for Alice with app_id=code, skill_id=application_preview, the preview session id, application embed id, and chat id.
      - The usage entry appears in the billing usage UI so Alice can understand where her credits went.

  - id: S-9
    title: Apple client opens an application preview
    given:
      - Alice is signed in to the OpenMates Apple app on iPadOS or macOS.
      - Alice opens a chat containing an application embed.
    when:
      - Alice taps the play button overlay on the application screenshot thumbnail.
    then:
      - The Apple app starts or resumes Alice's own E2B preview session through the authenticated API.
      - The Apple app displays the configured preview gateway URL in WKWebView.
      - Generated application code runs in E2B, not inside the Apple app process.
      - The Apple app uses the same stop, idle timeout, billing, and separate-session rules as web.

  - id: S-6
    title: Preview origin is missing or unsafe
    given:
      - A self-hosted operator has not configured APPLICATION_PREVIEW_ORIGIN, or configured an origin that shares the app auth domain.
    when:
      - A user opens an application embed.
    then:
      - The application source remains visible.
      - Live preview controls are disabled with an actionable setup message.
      - No E2B sandbox is started.
      - Server startup or health checks warn that application live previews are disabled or unsafe.

  - id: S-7
    title: Untrusted application JavaScript cannot access OpenMates state
    given:
      - A malicious generated application attempts to read cookies, localStorage, parent DOM, IndexedDB, camera, microphone, clipboard, or geolocation.
    when:
      - The application runs in the preview iframe or a new window.
    then:
      - The preview runs on the configured user-content origin, not the OpenMates app origin.
      - OpenMates auth cookies are not sent to the preview origin.
      - iframe sandbox and permissions policy block parent access and sensitive browser permissions by default.
      - The generated application cannot read OpenMates chat plaintext, vault keys, auth tokens, or app IndexedDB.

  - id: S-8
    title: Stop idle or long-running preview sessions
    given:
      - Alice has an active application preview session.
    when:
      - Alice never opens the auto-started preview for 1 minute, clicks Stop, closes the fullscreen long enough for the grace period, the opened preview heartbeat is idle for 5 minutes, or the preview reaches the 30-minute hard duration limit.
    then:
      - OpenMates stops or kills the E2B sandbox within configured limits.
      - Billing stops when the sandbox is stopped or killed.
      - Preview logs and a compact status summary remain available for the application session.
      - The latest successful preview screenshot remains visible on the application embed.
      - The stopped or timed-out embed shows Resume so Alice can explicitly start a new billed session.
      - Ephemeral database state is not treated as durable application storage.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: The Code app can create and render an application embed that references child code-code and asset embeds by path through a structured application artifact builder.
  - id: AC-2
    scenario: S-2
    text: Newly generated application embeds auto-start exactly one creator-owned preview after assistant completion for screenshot capture, while normal rendering, shared chats, example chats, and unauthenticated views never auto-start a sandbox.
  - id: AC-3
    scenario: S-2
    text: Live previews load only through APPLICATION_PREVIEW_ORIGIN using a short-lived signed path token and never expose raw E2B URLs or traffic access tokens to clients.
  - id: AC-4
    scenario: S-3
    text: E2B preview sessions can run frontend-only and fullstack applications, including a FastAPI backend with generated sample or ephemeral SQLite data.
  - id: AC-5
    scenario: S-4
    text: Follow-up edits patch child source embeds and sync changed files into the active E2B preview session when present.
  - id: AC-6
    scenario: S-5
    text: The authenticated viewer who starts a preview session is billed for E2B runtime, including shared-chat recipients, and the application creator is not billed for other viewers' sessions.
  - id: AC-7
    scenario: S-6
    text: Missing or unsafe preview-origin configuration disables live previews with an actionable setup message and prevents sandbox creation.
  - id: AC-8
    scenario: S-7
    text: Untrusted application JavaScript runs on a separate user-content origin with iframe sandboxing and no access to OpenMates cookies, storage, parent DOM, vault keys, or browser permissions by default.
  - id: AC-9
    scenario: S-8
    text: Auto-started unopened preview sessions stop after 1 minute, opened preview sessions use a 5-minute idle timeout, all sessions keep a 30-minute hard duration limit, and persistent compact logs/status remain after stop.
  - id: AC-10
    scenario: S-8
    text: Full rendered DOM snapshots are not stored in v1; durable state is the encrypted application manifest, child embeds, preview logs, and lightweight screenshot thumbnail only.
  - id: AC-11
    scenario: S-2
    text: Application previews can be opened both embedded in fullscreen and in a separate window using the same authorized preview session.
  - id: AC-12
    scenario: S-1
    text: Privacy policy and provider disclosures explain that E2B receives generated application files and runtime inputs when the creator auto-starts a generated preview or when a viewer explicitly starts or resumes a live preview.
  - id: AC-13
    scenario: S-1
    text: Application embed preview and fullscreen show a screenshot thumbnail or placeholder with a play/Resume overlay after the auto-start screenshot run stops or times out.
  - id: AC-14
    scenario: S-8
    text: The latest successful preview screenshot is stored as a lightweight encrypted thumbnail and remains available after the E2B session stops.
  - id: AC-15
    scenario: S-9
    text: Apple clients can start and view application previews through WKWebView without executing generated code inside the native app process.
  - id: AC-16
    scenario: S-5
    text: Every viewer starts an isolated E2B preview sandbox; shared recipients never reuse or attach to the creator's sandbox runtime state.
  - id: AC-17
    scenario: S-2
    text: Application previews use the existing Code Run price of 5 credits per started minute unless a later pricing migration changes the configured rate.
  - id: AC-18
    scenario: S-1
    text: Structured application artifact creation validates the manifest and creates child file embeds plus exactly one parent application embed in one backend-owned operation.
  - id: AC-19
    scenario: S-10
    text: Parser-based Markdown/code-fence inference remains a fallback only and creates at most one parent application embed after a runnable manifest is detected.
  - id: AC-20
    scenario: S-11
    text: The Habit Garden example application can be started by an authenticated user and renders live app content through E2B and the preview gateway without Vite allowed-host rejection.
  - id: AC-21
    scenario: S-12
    text: Unauthenticated users cannot start application previews from example chats; the Start preview action forwards them to signup/login without creating a preview session or charge.
  - id: AC-22
    scenario: S-13
    text: Every billed application preview session creates a user-visible usage entry tied to the authenticated user, chat, application embed, and preview session.

contracts:
  api:
    - route: internal application artifact builder
      request: "{ name: string, framework?: string, runtime: node|web|python, files: [{ path: string, language?: string, content: string, role?: string }], entrypoints: [{ name: string, command: string, port: number }], assets?: [...] }"
      response: "{ application_embed_id: string, child_embed_ids: string[], embed_reference: string }"
      errors:
        - validation error when required manifest files, source files, or entrypoints are missing.
        - validation error when paths are unsafe, duplicated, absolute, or outside the project root.
        - validation error when file content appears to include secrets or OpenMates credentials.
        - explicit typed failure when any child or parent embed cannot be created.
    - route: POST /v1/applications/{application_embed_id}/preview/start
      request: "{ chat_id: string, shared_context?: string, requested_runtime?: string }"
      response: "{ session_id: string, preview_url: string, status: queued|starting|running, credits_per_minute: number }"
      errors:
        - 401 when unauthenticated.
        - 402 when the viewer lacks enough credits to start the preview.
        - 403 when the viewer cannot access the application embed.
        - 409 when APPLICATION_PREVIEW_ORIGIN is missing or unsafe.
        - 429 when viewer or provider preview concurrency limits are exceeded.
    - route: POST /v1/applications/preview/{session_id}/stop
      request: "{}"
      response: "{ session_id: string, status: stopped|stopping, charged_credits?: number }"
      errors:
        - 401 when unauthenticated.
        - 403 when the viewer does not own the preview session.
    - route: GET /v1/applications/preview/{session_id}
      request: none
      response: "{ session_id: string, status: queued|starting|running|stopped|failed, logs: compact event list, preview_url?: string }"
      errors:
        - 401 when unauthenticated.
        - 403 when the viewer does not own the preview session.
    - route: ALL https://<APPLICATION_PREVIEW_ORIGIN>/p/{session_id}/{path...}
      request: browser or WKWebView preview traffic under /p/{session_id}/{preview_token}/{path...}.
      response: proxied application response from the correct E2B sandbox port.
      errors:
        - 403 when the signed preview session is invalid, expired, or belongs to another viewer.
        - 404 when the preview session or route does not exist.
        - 502 when the E2B sandbox is unavailable.
  data:
    - The structured artifact builder is the primary source of application embeds; it produces child file embeds and parent application manifests from a validated payload instead of parsing assistant Markdown.
    - Application embed content includes type=application, name, framework, runtime, entrypoints, file_refs, asset_refs, database mode, version_number, preview_capabilities, and latest_screenshot_ref when available.
    - file_refs map logical file paths to child code-code embed IDs and include role metadata such as source, config, dependency_manifest, backend, seed, or asset.
    - asset_refs map logical asset paths to child image/file embed IDs.
    - Preview sessions are ephemeral server-side records keyed by session_id and viewer user hash, with application_embed_id, chat_id hash, sandbox_id, E2B exposed ports, status, created_at, updated_at, idle deadline, hard deadline, and billing state.
    - A preview session belongs to exactly one authenticated viewer. Shared recipients get their own session_id, sandbox_id, logs, ephemeral filesystem, and ephemeral database state.
    - Preview gateway tokens are generated per session and stored only as hashes, never in plaintext session records or logs.
    - Creator auto-start sessions begin with a 1-minute idle deadline for screenshot capture and are marked auto_started=true in server session metadata.
    - Opening an auto-started session promotes it to an interactive session with a 5-minute idle deadline after the last authenticated viewer heartbeat or foreground preview activity.
    - Explicit Start/Resume sessions begin with the 5-minute interactive idle deadline.
    - The default hard deadline is 30 minutes after sandbox startup, after which the viewer must explicitly restart a new billed preview session.
    - Preview logs are compact text events capped by size and retained short-term like Code Run outputs.
    - latest_screenshot_ref points to a lightweight encrypted image/file embed or sidecar generated from the latest successful preview state.
    - Full rendered DOM snapshots are not stored in v1.
    - Parser-inferred application parents are marked by backend provenance as fallback-created for logs/debugging, but the client rendering contract is identical to structured-created application parents.
  ui_states:
    - Application preview card shows app name, framework/runtime, file count, asset count, preview status, and screenshot thumbnail or placeholder.
    - Application fullscreen has Preview, Files, Logs, Data, and Settings/Info areas where appropriate.
    - Screenshot thumbnails show a play or Resume button overlay when no live preview is running; clicking the overlay starts or resumes a preview session.
    - The creator's just-generated application may show an auto-starting state while the one-minute screenshot run is queued/starting/running.
    - Start preview, Resume preview, Stop preview, Restart preview, Open in new window, and Copy preview URL actions are visible according to session state and permissions.
    - Missing preview-origin setup shows an actionable self-host/cloud configuration message.
    - Preview startup shows queued, installing dependencies, starting server, running, failed, stopping, and stopped states.
    - Timed-out preview states distinguish idle timeout from hard duration limit and let the viewer start a new billed session when credits allow.
  privacy_security:
    - APPLICATION_PREVIEW_ORIGIN must be a separate origin that does not receive OpenMates app auth cookies.
    - Cloud production uses https://openmatesusercontent.org and Cloud dev uses https://dev.openmatesusercontent.org; each environment must have its own equivalent origin.
    - Live preview controls must be disabled if the configured origin is absent, invalid, or matches the app/API auth origin.
    - Generated application code must never run on app.openmates.org or any OpenMates origin that holds auth, localStorage, IndexedDB, or service workers.
    - Preview iframes use sandboxing, no-referrer, and a restrictive allow/permissions policy by default.
    - E2B traffic access tokens, raw sandbox URLs, and provider credentials are server-only.
    - Shared-chat recipients, example/demo chats, unauthenticated users, and users who merely render an existing application embed must never trigger creator auto-start billing.
    - Preview gateway path tokens are scoped to one session, expire with the session idle/hard deadline, are revoked on stop, and authorize only sandbox proxy traffic.
    - Logs and debug output must redact preview gateway tokens from /p/{session_id}/{preview_token}/ URLs.
    - Generated apps receive no OpenMates user secrets, provider API keys, vault keys, production DB credentials, or plaintext chat content beyond the selected generated files/assets needed to run the preview.
    - E2B provider disclosure must state that generated application files, runtime inputs, and execution logs are sent to E2B only when the viewer explicitly starts a preview.
  billing:
    - Preview billing is charged to the authenticated viewer who starts the preview session.
    - Shared-chat recipients are billed for their own preview sessions and never charge the application creator.
    - Application previews reuse the existing Code Run pricing of 5 credits per started minute of E2B runtime.
    - Preview sessions require enough credits for at least the minimum billable interval before sandbox creation.
    - Billing begins no earlier than sandbox file upload/startup and stops when the sandbox is stopped, killed, failed, timed out, or cancelled.
    - The UI displays current or estimated credits per minute before or during preview startup.
    - Usage history records application preview charges under app_id=code and skill_id=application_preview with chat_id, application_embed_id, preview_session_id, charged_minutes, and duration_seconds metadata.
  runtime:
    - v1 primary runtime is E2B for cross-platform support across desktop web, Safari iOS/iPadOS, and Apple native clients.
    - Apple clients render authorized preview gateway URLs in WKWebView and do not execute generated application code locally.
    - static previews may remain available for simple HTML/CSS without E2B when JavaScript execution is not required.
    - WebContainers are out of scope for v1 and may be revisited as a desktop-web cost optimization only.

tests:
  - id: T-PYTEST-APP-PREVIEW-001
    type: pytest
    file: backend/tests/test_application_preview_config.py
    command: python3 -m pytest backend/tests/test_application_preview_config.py
    covers:
      - AC-7
      - AC-9
      - AC-16
      - AC-17
    assertions:
      - missing preview origin prevents sandbox creation
      - preview origin matching app or API origin is rejected
      - preview start stores a queued viewer-owned session with a user-content preview URL and TTL
