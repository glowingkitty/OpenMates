id: application-embeds
title: Application Embeds And Cross-Platform Live Previews
status: implementing

goal: >
  Let users generate, inspect, iterate on, and run multi-file web applications
  inside OpenMates while keeping untrusted application code isolated from the
  OpenMates app origin, billing preview runtime to the viewer who starts it,
  and supporting desktop web, Safari iOS/iPadOS, and Apple native clients in v1.

scope:
  in:
    - Add a new Code app top-level application embed that owns a project manifest and references child source/asset embeds.
    - Add a structured backend application artifact builder as the primary creation path for generated runnable apps.
    - Use existing code-code embeds as child source files and existing image/file embeds as optional application assets.
    - Add E2B-backed live preview sessions as the v1 cross-platform runtime for generated React, Svelte, static JavaScript, and fullstack applications.
    - Route all live previews through an OpenMates preview gateway on an env-configured user-content origin.
    - Require a separate preview origin such as https://openmatesusercontent.org for OpenMates Cloud and an operator-provided equivalent for self-hosting.
    - Bill preview runtime credits to the authenticated viewer who starts or resumes a preview session, including shared-chat recipients.
    - Keep application source, manifests, and assets encrypted as normal embeds at rest.
    - Support opening live previews in embedded fullscreen and in a separate browser window or Apple WKWebView.
    - Add Apple client application preview support in v1 by rendering authorized preview gateway URLs inside WKWebView with the same isolation, billing, and session lifecycle as web.
    - Store and render a lightweight screenshot thumbnail for the latest successful application preview state.
    - Auto-start a creator-owned one-minute preview immediately after a newly generated application embed is created, capture a lightweight screenshot thumbnail, and stop the sandbox unless the creator opens it.
    - Show the screenshot thumbnail in the application embed preview and fullscreen with a play/Resume overlay that starts or resumes an E2B preview session.
    - Support iterative corrections by patching child code-code embeds with existing diff-based editing and syncing successful file changes into the active E2B sandbox.
    - Keep parser-based inference from Markdown/code fences as a best-effort fallback when no structured artifact was emitted.
    - Support ephemeral sample data and SQLite-backed previews inside E2B for v1 database demos.
    - Add privacy policy and provider documentation updates for the expanded E2B application preview use case.
  out:
    - WebContainers as a v1 runtime. They may be evaluated later as an optional desktop-web optimization.
    - Normal Vercel preview deployments or public deployments of generated applications.
    - Persisting live preview database state in E2B after the preview session ends.
    - Running untrusted generated JavaScript on app.openmates.org or any OpenMates auth-bearing origin.
    - Sharing OpenMates auth cookies, API tokens, user vault keys, or provider API keys with generated applications.
    - Full rendered DOM snapshot storage for every preview state in v1.
    - Real production databases, payment providers, email providers, or third-party API secrets inside generated apps.

