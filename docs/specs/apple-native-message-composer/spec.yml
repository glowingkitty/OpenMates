  intentional_native_differences:
    - Apple uses native selection handles, keyboard services, dictation, spell checking, undo manager, pointer interactions, and accessibility APIs.
    - Apple uses OS-owned picker/capture/permission interfaces and native MapKit/PencilKit surfaces.
    - Native preview implementation code may differ from Svelte, but rendered states, actions, document order, and serialization outcomes must match.

clarification:
  rounds:
    - question: Should the native composer replace the editor across all Apple hosts or only in-app surfaces?
      answer: All Apple hosts, including main chat, new chat, macOS quick capture, and iOS/macOS share extensions.
    - question: May parity roll out in phases behind a production flag, or is one complete replacement required?
      answer: A single full replacement is required; partial native behavior must not ship.
    - question: May the editable surface use a third-party native editor dependency?
      answer: No. Use Apple frameworks only.
    - question: Should the in-memory document mirror Tiptap JSON or use a shared product schema?
      answer: Use a shared product schema while preserving compatibility with existing chats.
    - question: Should the shared schema require database conversion?
      answer: No. ComposerDocument is an in-memory contract; canonical markdown and embed references remain persisted.
    - question: Should the current Apple TestFlight composer regressions be fixed as one release scope or split between interaction blockers and audio parity?
      answer: All reported composer, audio, PII, attachment, drawing, web-search, and sheet regressions belong in one repair scope.
    - question: Must the repaired behavior cover macOS as well as iOS?
      answer: The shared behavior must work on iOS and macOS; iPhone Apple UI tests are the required interaction proof for this repair.
  vision_summary: >
    Repair the shared Apple-native composer and existing-chat embed renderers so
    they behave and render like the web app. Every embed leaves a usable text
    line, typing remains responsive and unmodified, PII never scans embed
    metadata or hides controls, and audio, drawing, web-search, and sheet
    previews/fullscreens retain their web-specific content and chrome. The same
    implementation must serve iOS and macOS, with iPhone UI tests proving the
    interactive flow and a macOS build proving the shared surface compiles.
  approved_by_user: true

