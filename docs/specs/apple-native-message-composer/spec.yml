implementation_plan:
  spec: docs/specs/apple-native-message-composer/spec.yml
  spec_path: docs/specs/apple-native-message-composer/spec.yml
  first_slice:
    title: Prove TextKit attachment, selection, IME, and undo semantics in an isolated dev preview
    scenarios: [S-1, S-3, S-7]
    acceptance_criteria: [AC-1, AC-3, AC-7]
    boundary: >
      Add ComposerDocumentV1, UTF-16 position mapping, a long-lived UIKit/AppKit
      TextKit 2 adapter, and one interactive text-embed-text attachment fixture in
      a dev-preview host. Do not connect production chat, uploads, drafts, send,
      share extensions, or remove the WebView until iOS and macOS red/green tests
      prove view-provider reuse, selection, marked text, and undo behavior.
  existing_patterns:
    - frontend/packages/ui/src/message_parsing/serializers.ts for canonical markdown and embed-reference output.
    - frontend/packages/ui/src/components/enter_message/extensions/Embed.ts for atom identity, boundary deletion, grouping, and lifecycle behavior.
    - frontend/packages/ui/src/data/embedRegistry.generated.ts for authoritative registered write-mode renderer coverage.
    - frontend/packages/ui/src/services/encryption/MessageEncryptor.ts and MetadataEncryptor.ts for authoritative formats A/C/D.
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift for the shared host shell and capabilities.
    - apple/OpenMates/Sources/Features/Chat/Views/InlinePreviewView.swift for the first prototype attachment content only; it is not the final renderer registry.
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedContentView.swift and EmbedPreviewCard.swift for existing native read-only renderer patterns.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift and apple/OpenMatesShared/BackgroundChatSender.swift for existing upload/send/encryption service boundaries.
    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift for ciphertext-only local SwiftData persistence.
  architecture: >
    ComposerDocumentV1 is the platform-neutral in-memory semantic model. Web
    Tiptap and Apple TextKit adapt to it; neither framework representation is
    persisted. NativeComposerController owns document revision, UTF-16 selection,
    commands, lifecycle reducer, undo grouping, and canonical serialization.
    NativeComposerTextView provides thin long-lived UIKit and AppKit adapters.
    Embed atoms are one semantic U+FFFC position backed by
    ComposerTextAttachment/NSTextAttachmentViewProvider, with any synthetic
    layout separators hidden by ComposerPositionMap. Preview providers recover
    state from stable node ids and never own upload or encryption services.
  module_boundaries:
    - module: Shared Composer Core
      owns: ComposerDocumentV1, node schemas, UTF-16 position map, revisions, selection, commands, events, parser/serializer adapters, lifecycle reducer, immutable send snapshots.
      must_not_own: SwiftUI host layout, network clients, encryption keys, persistence implementation, app-specific navigation.
    - module: TextKit Adapters
      owns: UITextView/NSTextView setup, delegates, marked-text guard, attachment providers, viewport reuse, native undo integration, accessibility bridge.
      must_not_own: canonical persistence, upload/transcription work, encryption, chat selection.
    - module: Native Composer Renderer Registry
      owns: generated type-to-preview mapping, composer presentation state, lifecycle-specific native views, fallback policy for unknown received types.
      must_not_own: backend type discovery at runtime or generic fallback claims for registered write-mode types.
    - module: Composer Services
      owns: attachment upload/transcription adapter, cleanup, pending-send coordinator, encrypted draft repository, canonical send handoff.
      must_not_own: TextKit ranges or view-provider identity.
    - module: Host Adapters
      owns: capabilities, destination/chat id, picker/capture presentation, host send callbacks, extension normalization.
      must_not_own: a separate document model or editor implementation.
  data_flow:
    - "Example insertion: document revision 12 contains text node 'Explain ', cursor UTF-16 offset 8. Native picker returns photo.jpg; controller inserts embed node node-42 at offset 8 with generation 1/status draft, followed by existing text."
    - ComposerAttachmentService starts upload with node-42/generation-1/chat-7 while the attachment provider immediately renders a local image preview inside TextKit.
    - Upload completion returns durable embed id emb-9. The lifecycle reducer accepts node-42/generation-1, updates contentRef to embed:emb-9/status finished, and invalidates only that attachment range.
    - Submit creates immutable request req-3 for document revision 13, serializes ordered canonical markdown, and resolves ordered embed send materials by durable embed id.
    - ChatSendPipeline receives canonical markdown and existing embed materials, applies the authoritative chat/embed encryption path, and sends request-scoped plaintext only to the existing AI-processing boundary.
    - Draft save serializes revision 13 to canonical markdown, encrypts markdown and preview with master-key Format D, writes ciphertext to local SwiftData and existing draft sync fields, and never persists ComposerDocument or attributed strings.
  migration_and_compatibility:
    - No message, Directus, or canonical markdown migration.
    - Add a lightweight local SwiftData model/schema update for encrypted draft ciphertext, preview ciphertext, revision, and draft version only.
    - On unlocked startup, migrate legacy UserDefaults `openmates.drafts` entries one at a time: read markdown, encrypt Format D, write and decrypt-verify ciphertext, then remove that plaintext entry.
    - If migration cannot access the master key or verification fails, preserve the legacy entry for retry, block new plaintext writes, and surface a privacy-safe recoverable error.
    - Existing web encrypted drafts and existing message/embed references parse into ComposerDocument on demand without write-back.
  renderer_coverage:
    - Generate a manifest from embedRegistry.generated.ts plus app.yml/shared embed metadata.
    - Classify every Apple route as specific_native, generic_search, generic_fallback, structural_group_only, missing, or not_applicable_to_composer.
    - Registered write-mode types require specific native composer preview, shared fixture, lifecycle matrix, and visual case before cutover.
    - Initial known gaps include PCB schematic, fitness location/class/search, weather radar, and several generic fallback categories; task planning must expand from the generated manifest rather than this static list.
  async_and_send:
    - Introduce ComposerAttachmentService events keyed by nodeId plus generation; durable embedId remains separate.
    - Introduce ComposerPendingSendCoordinator with FIFO immutable ComposerSendSnapshot values keyed by request id/document revision.
    - Errors remain blocking; stale/duplicate callbacks are ignored; retry advances generation; removal cancels and invokes existing draft-embed cleanup.
    - Replace active-view NotificationCenter deferred-send ownership only after reducer tests pass.
  encryption_security:
    - Editor, document, renderer, and host layers never receive raw master/chat/embed keys.
    - Existing CryptoManager/ChatKeyManager/ChatSendPipeline remain the only native crypto boundaries and must pass shared web Format A/C/D/embed-key fixtures.
    - Existing chats must load/validate wrapped chat keys; missing or mismatched expected keys fail without replacement generation.
    - Persistent messages, embeds, drafts, local queues, logs, and crash artifacts contain no plaintext composer content.
    - Security review compares implementation to web MessageEncryptor, MetadataEncryptor, sendersChatMessages, draftSave, chatKeyManagement, and encryption-format docs.
  ui_and_accessibility:
    - Keep MessageComposerView as the common shell; replace its editable leaf only at final all-host cutover.
    - Attachment providers host native SwiftUI previews through UIHostingController/NSHostingController and expose localized remove/retry/cancel/open actions.
    - TextKit attachment semantic length is one UTF-16 unit; focus and VoiceOver traversal follow document order.
    - Browser-computed web contracts are captured for required viewports/states before implementing each renderer category.
  observability:
    - Use NativeDiagnostics and NativeSyncPerfLog only with node counts, lifecycle categories, durations, document revision, and hashed/prefixed ids.
    - Record parse, position-map, attachment-load/reuse, lifecycle transition, draft encrypt/write, submit queue, and send handoff timings.
    - Never log plaintext, canonical markdown, transcript, file path, URL, clipboard data, encryption material, or payload bodies.
  affected_files:
    - path: shared/composer/fixtures/**
      reason: Versioned synthetic canonical markdown and ComposerDocument cross-client fixtures.
    - path: frontend/packages/ui/src/components/enter_message/bridge/**
      reason: Web ComposerDocument adapter and contract tests without changing persisted format.
    - path: frontend/packages/ui/src/message_parsing/serializers.ts
      reason: Reuse/adapt canonical serializer behind shared contract fixtures; preserve web source-of-truth behavior.
    - path: apple/OpenMates/Sources/Shared/Composer/**
      reason: New ComposerDocument, controller, position map, lifecycle reducer, parser/serializer, TextKit adapters, attachments, and registry.
    - path: apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
      reason: Bind shared native controller/document instead of String-only editable state at cutover.
    - path: apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
      reason: Replace TiptapComposerWebView editable leaf and external inlineFieldContent seam.
    - path: apple/OpenMates/Sources/Features/Chat/Views/InlinePreviewView.swift
      reason: Reuse preview content in attachment providers, then retire external pending list.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Host document/controller and immutable send snapshots instead of text plus parallel pending array.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Adapt upload/send services to stable node/generation and ordered durable embed materials.
    - path: apple/OpenMates/Sources/Core/Services/PendingUploadStore.swift
      reason: Replace active-view notification readiness with exactly-once pending-send coordinator.
    - path: apple/OpenMates/Sources/Core/Services/DraftService.swift
      reason: Replace unused plaintext UserDefaults writes with encrypted ComposerDraftRepository and migration.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Add ciphertext-only local draft persistence fields/model.
    - path: apple/OpenMatesShared/BackgroundChatSender.swift
      reason: Consume ordered ComposerSendSnapshot/embed materials for quick capture/share extensions.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Migrate new-chat host and remove parallel pending/deferred implementation.
    - path: apple/OpenMates/Sources/App/OpenMatesApp.swift
      reason: Migrate macOS quick capture to shared AppKit adapter and controller.
    - path: apple/OpenMatesShareExtension/ShareViewController.swift
      reason: Embed shared UIKit native editor and normalize shared items into document atoms.
    - path: apple/OpenMatesShareExtensionMacOS/MacShareViewController.swift
      reason: Embed shared AppKit native editor and normalize shared items into document atoms.
    - path: scripts/apple_composer_audit.py
      reason: Enforce no production WebView/plaintext persistence/editor forks after cutover.
    - path: scripts/apple_composer_renderer_audit.py
      reason: Deterministically enforce generated renderer/fixture/lifecycle/visual coverage.
  assumption_checks:
    - assumption: A-2
      owner: TASK-1
      method: Implement tests first, then a dev-preview-only TextKit attachment prototype on iOS and macOS; confirm dynamic width, interaction, provider reuse, UTF-16 mapping, IME, and undo before production integration.
    - assumption: A-3
      owner: renderer coverage task
      method: Generate registry audit and turn every missing/fallback-only write-mode type into an explicit implementation blocker.
    - assumption: A-4
      owner: lifecycle/service task
      method: Reducer tests validate nodeId/generation to durable embedId mapping and existing API sufficiency before adapting ChatViewModel/BackgroundChatSender.
    - assumption: A-6
      owner: encryption task
      method: Shared synthetic web/Apple Format A/C/D/embed-key fixtures and zero-plaintext storage tests pass before draft/send integration.
  rollout:
    - Internal dev preview and tests may exercise native slices, but production hosts remain on the current editor during implementation.
    - Candidate-ready is one commit/release state where all Apple hosts use native adapters and production WebView resources/bridge code are removed together.
    - Upload candidate to TestFlight only after all candidate tests and artifact reviews pass.
    - Production-cutover-ready requires TestFlight validation and explicit user confirmation; rollback is release rollback, not a runtime dual-editor flag.
  verification_strategy:
    - Run shared web ComposerDocument and encryption fixtures first through scripts/tests.py Vitest dispatch.
    - Run Apple document/controller/lifecycle/encryption unit tests second through apple_remote.py.
    - Run web Playwright regressions after any shared web adapter deployment to app.dev.openmates.org.
    - Run Apple inline embed, host, draft, accessibility, visual, and performance UI evidence after unit contracts pass.
    - Run iOS and macOS builds/runtime tests, paired artifact review, security review, candidate gate, TestFlight, and production confirmation last.
    - CLI/npm/pip surfaces have no new API; run python3 scripts/audit_sdk_cli_parity.py at integration and record explicit not-affected evidence before web/Apple final gates.
  verification_order:
    - Shared schema/serializer and web encryption fixtures.
    - Native document/position/IME/undo feasibility tests.
    - Native renderer coverage audit and lifecycle reducer.
    - Native encryption/draft migration and service adapters.
    - Main/new chat integration.
    - iOS/macOS quick capture and share-extension integration.
    - Web regression, Apple visual/accessibility/performance, builds, security review, candidate, TestFlight, production confirmation.
  acceptance_criteria_mapping:
    - "AC-1: T-APPLE-STATIC, T-APPLE-NATIVE-EDITOR, T-APPLE-IOS-BUILD, T-APPLE-MACOS-BUILD"
    - "AC-2: T-WEB-DOCUMENT-CONTRACT, T-APPLE-DOCUMENT-CONTRACT"
    - "AC-3: T-APPLE-INLINE-EMBED-UI, T-APPLE-VISUAL-PARITY, V-WEB-RENDERED-COMPARISON"
    - "AC-4: T-APPLE-EMBED-LIFECYCLE, T-APPLE-UPLOAD-AUDIO-UI, T-WEB-COMPOSER-REGRESSION"
    - "AC-5: T-WEB-DOCUMENT-CONTRACT, T-APPLE-PARSE-PASTE"
    - "AC-6: T-APPLE-MENTION-PII, T-WEB-DOCUMENT-CONTRACT"
    - "AC-7: T-APPLE-NATIVE-EDITOR, T-APPLE-DOCUMENT-CONTRACT"
    - "AC-8: T-APPLE-DRAFT-EDIT-UI, T-APPLE-DOCUMENT-CONTRACT"
    - "AC-9: T-APPLE-ALL-HOSTS-UI, T-APPLE-MACOS-HOSTS-UI, T-APPLE-SHARE-HOSTS-UI, T-APPLE-STATIC"
    - "AC-10: T-APPLE-ACCESSIBILITY, T-APPLE-VISUAL-PARITY"
