assumptions:
  - id: A-1
    text: Canonical markdown and fenced embed references remain the durable source for existing messages and drafts, so ComposerDocument requires no message/database migration.
    category: data
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/services/drafts/draftSave.ts
        summary: Web drafts serialize Tiptap JSON to canonical markdown before encrypted persistence.
      - source: frontend/packages/ui/src/services/drafts/draftWebsocket.ts
        summary: Encrypted markdown is parsed back into write-mode editor state on restore.
      - source: apple/OpenMates/Sources/Core/Services/DraftService.swift
        summary: Apple currently persists local per-chat draft strings as markdown in UserDefaults; native ComposerDocument must parse those strings without rewriting them on open.
  - id: A-2
    text: Apple TextKit 2 attachment providers can host reusable interactive native preview views without corrupting selection or viewport layout on supported iOS and macOS versions.
    category: apple
    required_before: implementation
    status: confirmed
    evidence:
      - source: Apple TextKit 2 documentation
        summary: Apple documents custom text elements and attachment-view reuse, but OpenMates-specific interactive preview behavior needs a focused prototype and red tests.
      - source: apple/OpenMatesTests/NativeComposerControllerTests.swift
        summary: Remote iOS tests prove TextKit 2 attachment atoms, interactive provider controls, full-line bounds, stable identity, UTF-16 validation, marked text, and boundary insertion; the same controller/provider source typechecks against the macOS 14 SDK.
  - id: A-3
    text: The current web write-mode registry contains native routing gaps and generic fallbacks; every gap can receive a specific native preview without changing backend data contracts, but missing implementations block cutover.
    category: architecture
    required_before: task_execution
    status: corrected
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/index.ts
        summary: Generated web registry defines the renderer coverage that native parity must inventory against Apple renderers.
      - source: frontend/packages/ui/src/data/embedRegistry.generated.ts and apple/OpenMates/Sources/Core/Models/EmbedModels.swift
        summary: Research found 54 write-mode renderer entries and multiple missing/fallback-only Apple types, including fitness, weather radar, PCB schematic, social/weather/code-repo fallback categories, and composer previews beyond upload-derived image/audio/PDF/file.
  - id: A-4
    text: Existing Apple upload, transcription, draft, encryption, and send services can be adapted to stable ComposerDocument node ids without changing their remote APIs.
    category: architecture
    required_before: task_execution
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
        summary: Existing pending embed records already have stable ids and canonical references, but lifecycle ownership currently sits outside the editor.
      - source: apple/OpenMatesShared/BackgroundChatSender.swift and apple/OpenMates/Sources/Core/Services/PendingUploadStore.swift
        summary: Existing upload/transcription/send/delete contracts are sufficient; client adapters must add stable node id plus generation, immutable send snapshots, and exactly-once coordination.
  - id: A-5
    text: The remote Mac can run required iOS and macOS build/UI evidence and TestFlight deployment after implementation.
    category: deployment
    required_before: completion
    status: confirmed
    evidence:
      - source: scripts/apple_remote.py
        summary: Current remote wrapper has successfully built iOS and uploaded iOS/macOS TestFlight artifacts in prior sessions.
  - id: A-6
    text: Existing Apple CryptoManager, ChatKeyManager, send pipeline, and embed encryption can remain the sole native cryptographic implementation while matching authoritative web formats and storage invariants.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift
        summary: Apple implements message Format A, chat-key wrapping Format C, and master-key Format D compatible with web, but cross-client fixtures must prove the exact boundary before composer integration.
      - source: frontend/packages/ui/src/services/sendersChatMessages.ts
        summary: Web defines transient plaintext AI processing versus encrypted persistent message/embed storage and deterministic wrapped embed-key behavior.
      - source: docs/architecture/core/encryption-formats.md
        summary: Formats A/B/C/D and their durable fields are documented and compatible with current Apple CryptoManager behavior; cross-client fixtures remain mandatory before integration.

contracts:
  api:
    - No new product API route is expected.
    - Existing upload, transcription, embed deletion, draft sync, and send APIs remain authoritative.
    - Any discovered remote contract change requires an explicit spec update before implementation.
    - CLI, npm SDK, and pip SDK public APIs are not changed by the native editor; their existing encrypted send/decrypt contracts are regression dependencies and must be marked not-applicable only after parity audit evidence.
  data:
    - "ComposerDocumentV1: { version: 1, nodes: ComposerNodeV1[] }."
    - "TextNodeV1: { kind: text, id: string, source: string }. Source retains raw markdown, LF line endings, and original Unicode scalar content without normalization."
    - "HardBreakNodeV1: { kind: hardBreak, id: string }."
    - "MentionNodeV1: { kind: mention, id: string, mentionKind: mate|aiModel|bestModel|skill|focus|project|memory, targetId: string, canonicalSyntax: string, displayLabel: string }."
    - "EmbedNodeV1: { kind: embed, id: string, embedType: string, status: draft|uploading|processing|transcribing|finished|error|cancelled, contentRef?: string, referenceOnly: boolean, canonicalSource: string, display: ComposerEmbedDisplayV1, transient?: ComposerEmbedTransientV1 }."
    - canonicalSource is the exact canonical fenced embed reference used for lossless round-trip; it is in-memory plaintext governed by the same composer boundary as TextNode source and is never a separate durable field or log value.
    - Display metadata contains only reconstructible title, filename, media kind, dimensions/duration, and sanitized status/error category; it is not authoritative persisted content.
    - Transient metadata may contain in-memory upload/recording handles but is excluded from Codable fixture persistence, canonical markdown, logs, and cross-process messages.
    - ComposerDocument decoders reject unsupported future versions with a typed recoverable error; they do not best-effort mutate unknown versions.
    - Document/controller positions use zero-based UTF-16 code-unit offsets to match NSRange/TextKit and JavaScript fixtures; shared fixtures include emoji, combining marks, RTL, CJK, and multiline selections.
    - Node ids remain stable for the lifetime of an editor document. Stored embed ids/contentRefs remain durable; text, break, and mention ids may be deterministically regenerated when canonical markdown is reparsed and must not be relied on across sessions.
    - Selection is non-persisted controller state expressed as UTF-16 anchor/head offsets plus affinity and marked-text range.
    - Canonical markdown parsing and serialization must be deterministic and idempotent for shared fixtures.
    - Canonical equivalence normalizes line endings to LF and permits only serializer-defined insignificant outer blank-line differences; whitespace inside text, code, unknown fences, and embed JSON is preserved or canonicalized by explicit fixtures.
    - Unknown canonical markdown remains lossless text; unknown embed types remain removable/serializable fallback atoms.
    - Existing messages, encrypted web drafts, and local Apple markdown drafts remain markdown; no ComposerDocument database column, attributed-string archive, or message migration is introduced.
    - Opening existing content without an edit performs zero persistence writes.
    - Durable embed restoration uses existing embed records keyed by canonical embed id/contentRef. Lifecycle sidecar state is reconstructible from existing upload/embed services; any missing sidecar contract blocks implementation under A-4.
    - ComposerDocument, attributed strings, attachment providers, selection state, local preview URLs, and transient upload objects are never durable message/draft fields.
  embed_lifecycle:
    - "draft -> uploading|processing|finished|cancelled|error"
    - "uploading -> processing|transcribing|finished|cancelled|error"
    - "processing -> transcribing|finished|cancelled|error"
    - "transcribing -> finished|cancelled|error"
    - "error -> uploading|processing|transcribing|cancelled via explicit retry/remove"
    - finished and cancelled are terminal for a node generation; retry creates a new generation token while preserving the visible node id.
    - Every async callback carries node id plus generation token; stale, duplicate, or remove-then-complete callbacks are ignored without side effects.
    - Queued send captures a document revision and resumes once only when every blocking node in that revision is finished; removal, edit, app termination, or retry invalidates/recomputes the queued revision explicitly.
  editor_commands:
    - replaceDocument
    - insertText
    - replaceSelection
    - insertMention
    - insertEmbed
    - updateEmbed
    - removeEmbed
    - convertEmbedToSource
    - setSelection
    - undo
    - redo
    - serializeCanonicalMarkdown
  editor_events:
    - documentChanged
    - selectionChanged
    - focusChanged
    - contentHeightChanged
    - embedActionRequested
    - blockingStateChanged
    - submitRequested
    - recoverableError
  submit:
    - Return submits when the web keyboard contract permits and no marked-text composition is active.
    - Shift/Option-Return behavior is platform-mapped to the shared hard-break command and covered by fixtures.
    - Empty/whitespace-only documents do not submit unless they contain a sendable embed.
    - Conversion/upload/transcription blockers defer or reject submit visibly; repeated submit is idempotent by document revision and request id.
  ui_states:
    - Empty, focused empty, compact, expanded, multiline, scrolled, and fullscreen composer.
    - Raw markdown processing and completed decoration states.
    - Mention query, results, inserted mention, and deleted mention.
    - Individual and grouped embed previews in draft, uploading, processing, transcribing, finished, cancelled, and error states.
    - Deferred send, queued send, resumed send, and failed queued send.
    - PII highlight, warning, anonymized, dismissed, and disabled states.
    - Draft restored, edit mode, offline, conflict, and recoverable parse/render failure states.
  privacy_security:
    - Never log message plaintext, clipboard content, transcripts, encryption keys, tokens, cookies, raw attachment bytes, private file paths, private URLs, or full share fragments.
    - Diagnostics are limited to node counts, sanitized type/status categories, durations, and hashed/prefixed identifiers.
    - Temporary local previews and decrypted attachment data remain memory/file-protection scoped and are released when nodes are removed or the composer closes.
    - PII replacement never mutates embed ids, canonical references, or hidden machine metadata.
    - Share-extension and quick-capture boundaries receive only the minimum content required for their declared capabilities.
    - The web encryption implementation and docs are authoritative for formats A/C/D, chat-key validation, request-scoped plaintext, encrypted persistent message fields, master-key-encrypted drafts, deterministic embed-key derivation, and master/chat key wrapping.
    - Plaintext is permitted only in active editor memory, decrypted render memory, and request-scoped AI processing; no UserDefaults, IndexedDB-equivalent native store, offline queue, file, log, crash attachment, analytics event, or persistent model may contain plaintext composer content.
    - Native editor/view code receives no raw master key, chat key, or embed key. It hands canonical markdown and typed PII/embed references to existing audited service boundaries.
    - Legacy `openmates.drafts` plaintext UserDefaults entries accept no new writes after native composer work begins. Migration runs only after user unlock provides the master key, verifies encrypted read-back, and then atomically removes plaintext.
    - Existing-chat encryption failures are terminal and visible; code must not call a generate-new-key path when an expected wrapped chat key is missing or mismatched.
    - Test fixtures use deterministic non-production keys and synthetic content; committed artifacts contain no real ciphertext tied to users, credentials, or private identifiers.
  accessibility:
    - Shared concepts retain web-matched identifiers such as message-composer, message-field, message-editor, embed-full-width-wrapper, embed-unified-container, and send-button.
    - Inline atoms expose document-order accessibility elements and localized custom actions.
    - The text editor remains a valid native multiline text input with dictation, Voice Control, selection, and keyboard navigation.
  visual_parity_matrix:
    - Web source routes are the authenticated normal chat and new-chat composer at phone 393x852, tablet 1024x1366, and desktop 1440x1000 viewports with recorded composer container width.
    - Required paired states are empty, focused empty, multiline, fullscreen, mention, PII warning, each registered embed type in every supported lifecycle state, grouped embeds, error/retry, and deferred send.
    - Recorded properties include frame, padding, gap, radius, shadow, colors, typography, icon size, status placement, remove/retry hit area, overflow, and responsive mode.
    - Geometry tolerance is 2 points unless a generated token or platform text metric documents a different tolerance; color and screenshot thresholds are set from approved baseline artifacts before implementation.
    - Paired web/native screenshots and computed-contract JSON are retained as test artifacts with generic paths and no private content.
  performance:
    - Typing and selection updates must not rebuild all embed previews or parse the full document synchronously on each keystroke.
    - Stable node ids and attachment-view reuse prevent unrelated preview recreation.
    - Performance evidence covers a long draft, multiple image/PDF/audio embeds, active upload updates, and rapid typing on a supported phone simulator/device class.
    - Exact thresholds must be established from the current web and Apple baselines before implementation and recorded in the implementation plan.

tests:
  - id: T-WEB-DOCUMENT-CONTRACT
    type: vitest
    file: frontend/packages/ui/src/components/enter_message/bridge/__tests__/composerDocument.test.ts
    command: python3 scripts/tests.py run -- --suite vitest
    covers: [AC-2, AC-5, AC-6, AC-13]
    assertions:
      - shared fixture markdown parses into ComposerDocumentV1 in document order
      - ComposerDocumentV1 serializes to canonically equivalent markdown
      - mentions, individual/grouped embeds, unknown markdown, and unknown embed types are lossless
      - fixture outputs are consumable by Swift Codable tests
      - UTF-16 offsets and selections match Swift for emoji, combining marks, RTL, CJK, and multiline content
      - submit/newline/empty/marked-text fixture outcomes are platform-independent
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        run_id: "github-actions-29056768317"
        timestamp: "2026-07-09T23:13:03Z"
        summary: Three fixture cases failed at the typed ComposerDocument parser-not-implemented boundary; all UTF-16 assertions passed.
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "github-actions-29057487647"
        timestamp: "2026-07-09T23:29:16Z"
        summary: Full Vitest suite passed 520/520, including valid, legacy, grouped, unknown, invalid-fence, UTF-16, and negative ComposerDocument fixtures.

  - id: T-APPLE-DOCUMENT-CONTRACT
    type: unit
    file: apple/OpenMatesTests/NativeComposerDocumentTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/NativeComposerDocumentTests
    covers: [AC-2, AC-7, AC-8, AC-11]
