risks:
  - id: R-1
    description: TextKit attachment views and selection boundaries can behave differently across iOS and macOS, especially with IME, undo, and viewport reuse.
    mitigation: Require a focused attachment/selection prototype and red tests before broader implementation tasks begin.
  - id: R-2
    description: Reimplementing web parsing and conversion independently could create permanent semantic drift.
    mitigation: Make ComposerDocument fixtures and canonical markdown outputs shared, versioned, and mandatory for both TypeScript and Swift adapters.
  - id: R-3
    description: Native preview duplication can drift visually as web embed components evolve.
    mitigation: Generate a renderer coverage manifest from app metadata and require rendered-web artifact comparisons for changed preview contracts.
  - id: R-4
    description: Moving upload lifecycle ownership into document nodes can duplicate uploads, cleanup, or queued sends.
    mitigation: Use stable node ids, idempotent service commands, and exactly-once deferred-send tests before cutover.
  - id: R-5
    description: A single full replacement creates a large integration branch and delayed user feedback.
    mitigation: Implement and verify internal independently testable slices, but keep production on the existing editor until the complete cutover gate passes.
  - id: R-6
    description: Full native parity across every registered web embed type is larger than the current Apple renderer inventory.
    mitigation: Inventory generated renderer coverage before task planning; missing native renderers are blockers, not generic fallback cards.
  - id: R-7
    description: Composer integration could bypass the authoritative web encryption boundary, persist plaintext drafts, or silently replace a mismatched chat key.
    mitigation: Keep cryptography outside editor/view code, use cross-client Format A/C/D and embed-key fixtures, atomically migrate legacy plaintext drafts, audit durable stores for plaintext, and require security review before candidate-ready.

open_questions:
  - id: Q-1
    question: What measured typing, selection, parsing, and embed-update performance thresholds should gate cutover on supported iPhone, iPad, and Mac classes?
    required_before: task_execution
    status: open
  - id: Q-2
    question: Which current web renderer types lack native composer/read-only counterparts after running the generated registry inventory?
    required_before: task_execution
    status: answered
    answer: Generated inventory found explicit missing and fallback-only Apple categories; the renderer coverage task must use the generated manifest and treat each as a cutover blocker.
  - id: Q-3
    question: Which approved encrypted local store and offline-sync representation will replace the unused plaintext Apple UserDefaults DraftService while preserving web Format D compatibility?
    required_before: implementation
    status: answered
    answer: Store only Format D ciphertext, encrypted preview, revision, and draft version in local SwiftData and existing encrypted draft sync fields; atomically migrate legacy plaintext UserDefaults after unlock and decrypt verification.
