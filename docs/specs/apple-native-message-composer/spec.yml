      - Swift decodes the same shared ComposerDocument fixtures as web
      - canonical markdown parse/serialize is idempotent and preserves node order
      - existing draft/message fixtures require no migration
      - invalid content returns a typed recoverable error without partial serialization
      - opening an existing message or draft without edits performs zero persistence writes
      - unsupported ComposerDocument versions fail visibly without mutating source markdown
