    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/NativeComposerDocumentTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/NativeComposerInlineEmbedUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAudioRecordingUITests
    - macOS build and native composer tests through the remote Mac wrapper.
  intentional_native_differences:
    - Apple uses native selection handles, keyboard services, dictation, spell checking, undo manager, pointer interactions, and accessibility APIs.
    - Apple uses OS-owned picker/capture/permission interfaces and native MapKit/PencilKit surfaces.
    - Native preview implementation code may differ from Svelte, but rendered states, actions, document order, and serialization outcomes must match.

clarification:
  rounds:
    - question: Should the native composer replace the editor across all Apple hosts or only in-app surfaces?
      answer: All Apple hosts, including main chat, new chat, macOS quick capture, and iOS/macOS share extensions.
    - question: May parity roll out in phases behind a production flag, or is one complete replacement required?
      answer: A single full replacement is required; partial native behavior must not ship.
    - question: May the editable surface use a third-party native editor dependency?
      answer: No. Use Apple frameworks only.
    - question: Should the in-memory document mirror Tiptap JSON or use a shared product schema?
      answer: Use a shared product schema while preserving compatibility with existing chats.
    - question: Should the shared schema require database conversion?
      answer: No. ComposerDocument is an in-memory contract; canonical markdown and embed references remain persisted.
  vision_summary: >
    Build one Apple-framework-only native composer for every Apple host and cut
    over only after full web behavior and visual parity are proven. A shared,
    versioned ComposerDocument defines editing semantics for both web and Apple,
    while canonical markdown remains the durable format so existing chats and
    drafts continue to work without migration.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Native editor owns text, selection, and document state
    given:
      - Any Apple composer host is visible.
      - Existing canonical markdown has been parsed into ComposerDocument.
    when:
      - The user types, inserts line breaks, selects text, moves the cursor, uses undo/redo, dictation, an IME, or hardware-keyboard shortcuts.
    then:
      - A native UITextView/TextKit 2 or NSTextView/TextKit 2 adapter owns editing; no WKWebView participates.
      - ComposerDocument updates atomically with stable node identity and selection mapping.
      - Raw markdown characters remain editable and receive web-equivalent write-mode decoration without being replaced by rendered formatting.
      - Empty, focused, compact, expanded, scrolled, and fullscreen states match the rendered web composer.

  - id: S-2
    title: Existing content round-trips without migration
    given:
      - An existing sent message, encrypted draft, edit-message source, notification reply, or imported canonical markdown contains text, mentions, and embed references.
    when:
      - Apple opens the content in the native composer and serializes it without user edits.
    then:
      - The parsed ComposerDocument preserves semantic content and document order.
      - Serialization produces canonically equivalent markdown and embed references.
      - No database record is rewritten merely because it was opened.
      - Unknown but valid markdown remains lossless text rather than being discarded.

  - id: S-3
    title: Native attachment appears as a real inline preview
    given:
      - The cursor is between text before and text after the insertion point.
    when:
      - The user selects an image, PDF, file, camera photo, sketch, location, or other supported attachment.
    then:
      - One embed atom is inserted at the current document position with a stable id.
      - A native preview matching the corresponding web write-mode preview renders inside the editable document, not in an external pending strip.
      - Text before and after remains editable and preserves ordering.
      - The preview exposes web-equivalent status, progress, error, retry, cancel/remove, and completed actions where applicable.
      - No raw JSON, encryption key, private URL, or local file path is visible.

  - id: S-4
    title: Upload and transcription lifecycle updates one embed atom
    given:
      - An image/file upload or audio recording/transcription is in progress.
    when:
      - Progress, upload completion, transcription completion, failure, retry, cancellation, or server reconciliation occurs.
    then:
      - The existing embed atom is updated by id without moving the selection or recreating unrelated content.
      - Send is deferred or blocked while required embeds are uploading/transcribing, matching the web pending-upload contract.
      - Completion resumes a queued send exactly once.
      - Failure remains visible and recoverable; cancellation/removal excludes the embed from serialization and cleans up draft storage where required.

  - id: S-5
    title: Paste and typing conversions match web write mode
    given:
      - The user types or pastes URLs, fenced code, multi-line code/text, tables, documents, spreadsheets, images, or supported clipboard embed data.
    when:
      - Web write mode would convert or preview that content.
    then:
      - The native adapter produces the equivalent ComposerDocument text or embed nodes.
      - Open/incomplete markdown constructs remain editable text with processing decoration until the web completion boundary is reached.
      - Async URL/code/document conversion preserves cursor position and defers send while conversion is pending.
      - Unsupported clipboard data falls back visibly to lossless text or a supported file attachment.

  - id: S-6
    title: Mentions and PII decorations remain editable and serializable
    given:
      - The user types an at-sign query or content containing enabled PII categories.
    when:
      - Mention results or PII matches update.
    then:
      - Mate, model, best-model, skill, focus, project, and memory mentions use native atom attachments with localized display labels and canonical mention syntax.
      - Mention insertion replaces only the active query and preserves surrounding content and selection.
      - PII highlights and warnings match web category/settings behavior without changing serialized content until the user approves anonymization.
      - Embed references and machine-generated ids are excluded from PII replacement.

  - id: S-7
    title: Embed deletion, grouping, and ordering match web
    given:
      - The document contains individual and grouped embeds between text segments.
    when:
      - The user uses backspace/delete, remove, retry, group actions, cut, or undo/redo at embed boundaries.
    then:
      - Selection cannot become trapped inside atomic embed content.
      - Deletion and conversion-to-source behavior match web fixtures for individual and grouped embeds.
      - Removing an uploaded draft embed triggers the same cancellation/storage cleanup contract as web.
      - Undo/redo restores document order and visible state without duplicating uploads or cleanup calls.

  - id: S-8
    title: Drafts, edit mode, offline use, and cross-device restoration are lossless
    given:
      - The user has an unsent draft or edits an existing message with text, mentions, and embeds.
    when:
      - The app backgrounds, restarts cold, switches chats, loses connectivity, reconnects, or receives a newer encrypted draft.
    then:
      - Canonical markdown and required embed draft metadata are saved through existing encrypted storage/sync paths.
      - The native composer restores identical document order and visible embed states.
      - Draft conflict/version behavior matches the current web contract.
      - Edit cancel restores the original message; edit save serializes only the edited document.

  - id: S-9
    title: Every Apple host uses the same native composer contract
    given:
      - Main chat, new chat, macOS quick capture, or an iOS/macOS share extension is opened.
    when:
      - The host configures its available actions and destination/send callbacks.
    then:
      - The editable surface, document controller, inline previews, identifiers, and serialization are shared.
      - Unsupported actions are hidden declaratively without forking editor logic.
      - Extension-provided items are normalized into ComposerDocument embed atoms.
      - Host-specific destination controls and status lists remain outside the composer.

  - id: S-10
    title: Native composer is accessible, localized, and responsive
    given:
      - VoiceOver, Dynamic Type, reduced motion, RTL, hardware keyboard, pointer, or narrow/wide layout is active.
    when:
      - The user traverses, edits, activates, or removes text, mentions, embeds, and action controls.
    then:
      - Reading and focus order follows document order.
      - Embed atoms expose localized type, filename/title, status, and available actions.
      - Every visible control is hittable and all text comes through AppStrings/localization sources.
      - Layout matches web responsive states without clipping the caret, previews, or action row.

  - id: S-11
    title: Native composer failure never silently loses content
    given:
      - Parsing, serialization, attachment rendering, upload reconciliation, or TextKit layout fails.
    when:
      - The failure reaches a composer boundary.
    then:
      - The error is logged through privacy-safe NativeDiagnostics and shown as an explicit recoverable state.
      - Existing canonical markdown and pending embed metadata remain available for retry/export.
      - Send is blocked when serialization cannot be proven safe rather than sending incomplete content.
      - No hidden fallback to WKWebView or a second editor state occurs.

  - id: S-12
    title: Candidate, TestFlight, and production cutover gates are explicit
    given:
      - Native implementation work is complete on a non-production development path.
    when:
      - The cutover gate is evaluated.
    then:
      - Candidate-ready requires shared schema, Apple unit/UI, web regression, visual, accessibility, cold-boot, performance, iOS, and macOS evidence to be green.
      - The candidate build already switches every Apple host and removes production WKWebView composer resources and bridge code together.
      - Candidate-ready permits TestFlight upload; TestFlight validation is then required for production-cutover-ready.
      - Rollback means reverting/releasing the prior app build, never activating a hidden second editor implementation at runtime.

  - id: S-13
    title: Submit and newline behavior matches web without duplicate sends
    given:
      - The native composer is focused with empty, whitespace-only, normal, IME-marked, converting, uploading, editing, or sendable content.
    when:
      - The user presses Return, Shift/Option-Return where supported, the send button, or repeats submit while a send is starting.
    then:
      - Return submits only under the same completion/modifier rules as web; the newline command inserts a hard break at selection.
      - Empty or whitespace-only documents do not send unless a sendable embed atom exists.
      - IME marked text commits before submit and is never sent partially.
      - Pending conversion/upload/transcription defers or blocks submit according to the lifecycle contract.
      - One user submit produces at most one message across main chat, new chat, quick capture, share extension, and edit mode.

  - id: S-14
    title: Generated renderer coverage prevents silent native fallback cards
    given:
      - App metadata registers a web write-mode embed renderer type.
    when:
      - The generated composer renderer coverage audit runs.
    then:
      - The type has an explicit native preview implementation, shared fixture, supported lifecycle-state matrix, and visual artifact case.
      - Missing native coverage fails the cutover gate.
      - Unknown future types may render a safe removable fallback only for forward-compatible received content, never to claim write-mode parity for a registered type.

  - id: S-15
    title: Native composition preserves the authoritative web encryption boundary
    given:
      - The native composer contains canonical text, mentions, PII mappings, and embed references or restores a legacy Apple plaintext local draft.
    when:
      - A draft is saved, a message is sent, embed contents are persisted, another client decrypts the result, or legacy drafts are migrated.
    then:
      - ComposerDocument and TextKit own no encryption keys and persist no editor-native representation.
      - Canonical markdown enters the existing approved encryption/send pipeline; request-scoped plaintext for AI processing never becomes durable storage.
      - Persistent message fields use the existing chat key, draft markdown/preview use master-key Format D, and embed contents use the existing deterministic per-embed key plus master/chat wrapping contract.
      - An existing chat key is loaded and validated; failure never silently generates a replacement key for an existing chat.
      - Legacy Apple plaintext UserDefaults drafts are read only after unlock, encrypted and decrypt-verified in the approved store, then removed atomically; failed migration preserves recoverability and blocks new plaintext writes.
      - Web-created encrypted fixtures decrypt on Apple and Apple-created fixtures decrypt through the web test implementation without exposing secrets in logs or artifacts.

