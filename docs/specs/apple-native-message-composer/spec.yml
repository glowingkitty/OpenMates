  - id: TASK-18
    title: Match native live recording waveform, geometry, and cleanup to web
    status: done
    phase: working_tasks
    covers:
      scenarios: [S-4, S-10, S-11]
      acceptance_criteria: [AC-4, AC-10, AC-11]
    expected_files:
      - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift
      - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      - apple/OpenMates/Sources/App/MainAppView.swift
      - apple/OpenMates/Sources/DevPreview/DevChatOpeningPreviewView.swift
      - apple/OpenMatesTests/VoiceRecorderTests.swift
      - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
      - docs/specs/apple-native-message-composer/spec.yml
    implementation_requirements:
      - Use AVAudioRecorder metering, not audio-buffer retention: enable metering during recording, poll averagePower at most every 50ms, and store only normalized scalar display levels.
      - Match RecordAudio.svelte constants: a rolling 64-bar waveform, 64pt fixed track height, 2pt minimum bar height, -46dB to -18dB normalization window, 0.04 minimum visible level, and silence/noise-floor suppression.
      - Preserve the web overlay composition: centered bold release instruction, waveform between heading and controls, 220pt minimum recording panel, 44pt green mic control, timer/cancel/mic control row, and no control overlap at compact iPhone widths or Dynamic Type sizes.
      - Keep stop, drag-left cancellation, Escape cancellation, permission denial, recorder failure, and teardown idempotent; invalidate all timers/meters and delete cancelled files without logging audio, file paths, or recording content.
      - Use generated tokens and AppStrings only; add no hardcoded user-visible strings, colors, fonts, or spacing values except the documented web-equivalent measurements that lack generated tokens.
      - Update every voice-capable native composer host through the shared overlay integration points, without changing durable recording, embed, encryption, or send contracts.
    verification_ids: [T-APPLE-RECORDING-WAVEFORM-UNIT, T-APPLE-RECORDING-WAVEFORM-UI, T-APPLE-UPLOAD-AUDIO-UI, T-WEB-COMPOSER-REGRESSION]
