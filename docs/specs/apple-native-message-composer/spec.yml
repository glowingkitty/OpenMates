    - frontend/apps/web_app/tests/audio-recording.spec.ts
    - frontend/apps/web_app/tests/apple-ui-contracts.spec.ts
    - apple/OpenMatesTests/MessageComposerConfigurationTests.swift
    - apple/OpenMatesTests/TiptapComposerBridgeTests.swift
