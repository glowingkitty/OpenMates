schema_version: 2
id: apple-native-message-composer
title: Apple Native Message Composer
status: implementing

goal: >
  Replace the Apple app's WKWebView-backed editable message surface and external
  pending-embed strip with one fully native Swift composer built on Apple text
  frameworks. The composer must match the rendered web MessageInput behavior and
  appearance, including document-ordered inline embed previews, while preserving
  existing canonical markdown and embed-reference storage without migrating
  existing chats or drafts.

scope:
  in:
    - One native composer document and editing contract used by main chat, new chat, macOS quick capture, and iOS/macOS share extensions.
    - UIKit/TextKit 2 and AppKit/TextKit 2 editable-surface adapters wrapped for SwiftUI and extension hosts, with no WebView or third-party editor runtime.
    - A versioned cross-platform ComposerDocument in-memory schema implemented by web Tiptap and Apple native adapters.
    - Existing canonical markdown, mention syntax, and fenced JSON embed references remaining the durable message and encrypted-draft format.
    - The web encryption implementation and documented encryption formats remaining authoritative for message, draft, chat-key, and embed-key compatibility.
    - Atomic migration of legacy Apple plaintext UserDefaults drafts into approved master-key-encrypted draft storage before the native composer uses draft persistence.
    - Native document-ordered text, mention atoms, hard breaks, and embed atoms with stable identity and selection positions.
    - Native inline/full-width composer previews for every embed type currently supported by the web write-mode composer, including image, PDF, file, code, document, sheet, website, map/location, recording/audio, video where enabled, app-skill-use, focus activation, math/plot, and registered groups.
    - Native upload, transcription, processing, error, retry, cancel, remove, and finished states reflected in the same embed node rather than an external pending strip.
    - Web-equivalent typing, paste/drop normalization, URL conversion, code/document/table conversion, mentions, PII decorations, draft restoration, edit mode, grouping, deletion, and deferred-send semantics.
    - Existing Apple-native pickers, camera, microphone, MapKit, PencilKit, upload, encryption, and send services connected through typed composer commands.
    - Full parity verification before a single production cutover across all Apple hosts.
    - iOS, iPadOS, and macOS keyboard, pointer, accessibility, localization, cold-boot, offline-draft, and performance verification.
    - Every inserted embed leaves a following editable text line and moves the cursor to that line.
    - Existing-chat web-search embeds hydrate their referenced child embeds and render the web-equivalent result count and favicon summary.
    - Existing-chat sheet embeds render web-equivalent preview and fullscreen spreadsheet surfaces, including Sheets app chrome and gradient.
  out:
    - Migrating existing message or draft database records to ComposerDocument JSON.
    - Persisting TextKit attributed strings, Tiptap JSON, UIKit objects, AppKit objects, or local file URLs as the durable message format.
    - Replacing native chat transcript rendering, message bubbles, or read-only embed rendering with WebView content.
    - Replacing OS-owned file, photo, camera, microphone, share, permission, or document-picker interfaces.
    - Changing backend upload, encryption, WebSocket, Directus, or message APIs unless a separately approved contract defect is discovered.
    - Designing new cryptographic algorithms, key formats, wrapping formats, or plaintext persistence exceptions.
    - Shipping a partially native composer to users or maintaining permanent WebView/native runtime variants after cutover.
    - Adopting STTextView, TenTap, React Native, or another third-party editor runtime.

