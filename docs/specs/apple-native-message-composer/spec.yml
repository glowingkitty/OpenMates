id: apple-native-message-composer
title: Apple Native Message Composer
status: implementing

goal: >
  Replace the Apple app's WKWebView-backed editable message surface and external
  pending-embed strip with one fully native Swift composer built on Apple text
  frameworks. The composer must match the rendered web MessageInput behavior and
  appearance, including document-ordered inline embed previews, while preserving
  existing canonical markdown and embed-reference storage without migrating
  existing chats or drafts.

scope:
  in:
    - One native composer document and editing contract used by main chat, new chat, macOS quick capture, and iOS/macOS share extensions.
    - UIKit/TextKit 2 and AppKit/TextKit 2 editable-surface adapters wrapped for SwiftUI and extension hosts, with no WebView or third-party editor runtime.
    - A versioned cross-platform ComposerDocument in-memory schema implemented by web Tiptap and Apple native adapters.
    - Existing canonical markdown, mention syntax, and fenced JSON embed references remaining the durable message and encrypted-draft format.
    - The web encryption implementation and documented encryption formats remaining authoritative for message, draft, chat-key, and embed-key compatibility.
    - Atomic migration of legacy Apple plaintext UserDefaults drafts into approved master-key-encrypted draft storage before the native composer uses draft persistence.
    - Native document-ordered text, mention atoms, hard breaks, and embed atoms with stable identity and selection positions.
    - Native inline/full-width composer previews for every embed type currently supported by the web write-mode composer, including image, PDF, file, code, document, sheet, website, map/location, recording/audio, video where enabled, app-skill-use, focus activation, math/plot, and registered groups.
    - Native upload, transcription, processing, error, retry, cancel, remove, and finished states reflected in the same embed node rather than an external pending strip.
    - Web-equivalent typing, paste/drop normalization, URL conversion, code/document/table conversion, mentions, PII decorations, draft restoration, edit mode, grouping, deletion, and deferred-send semantics.
    - Existing Apple-native pickers, camera, microphone, MapKit, PencilKit, upload, encryption, and send services connected through typed composer commands.
    - Full parity verification before a single production cutover across all Apple hosts.
    - iOS, iPadOS, and macOS keyboard, pointer, accessibility, localization, cold-boot, offline-draft, and performance verification.
  out:
    - Migrating existing message or draft database records to ComposerDocument JSON.
    - Persisting TextKit attributed strings, Tiptap JSON, UIKit objects, AppKit objects, or local file URLs as the durable message format.
    - Replacing native chat transcript rendering, message bubbles, or read-only embed rendering with WebView content.
    - Replacing OS-owned file, photo, camera, microphone, share, permission, or document-picker interfaces.
    - Changing backend upload, encryption, WebSocket, Directus, or message APIs unless a separately approved contract defect is discovered.
    - Designing new cryptographic algorithms, key formats, wrapping formats, or plaintext persistence exceptions.
    - Shipping a partially native composer to users or maintaining permanent WebView/native runtime variants after cutover.
    - Adopting STTextView, TenTap, React Native, or another third-party editor runtime.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --search 'Apple native composer OR iOS message composer OR inline embed composer OR TextKit composer' --state all returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/messaging/message-input-field.md
    - docs/architecture/messaging/embeds.md
    - docs/architecture/core/encryption-architecture.md
    - docs/architecture/core/encryption-formats.md
    - docs/architecture/core/chat-encryption-implementation.md
    - docs/architecture/core/client-side-encryption.md
    - docs/specs/apple-unified-message-composer/spec.yml
    - docs/specs/apple-tiptap-webview-composer/spec.yml
    - docs/specs/apple-welcome-composer-action-parity/spec.yml
    - apple/AGENTS.md
    - .claude/rules/apple-ui.md
  online_research:
    - "Tiptap maintainer guidance states that ProseMirror depends heavily on the browser DOM and recommends WebView for direct Tiptap reuse; a native implementation must therefore reproduce semantics through an adapter rather than embed Tiptap itself."
    - "Apple TextKit 2 documentation supports custom text elements, selection management, viewport layout, and attachment-view reuse on supported Apple platforms."
    - "Current TextKit 2 editor projects demonstrate native performance and platform integration but also document selection, layout, IME, and attachment bugs that require focused regression tests."
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte owns the web editor lifecycle, parsing triggers, paste/drop handling, overlays, PII, drafts, mentions, and send coordination.
    - frontend/packages/ui/src/components/enter_message/editorConfig.ts configures raw-markdown write mode plus Embed and mention atom nodes.
    - frontend/packages/ui/src/components/enter_message/extensions/Embed.ts owns web embed attributes, NodeView rendering, grouping, removal cleanup, and renderer updates.
    - frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/index.ts routes generated embed types to web preview renderers.
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts owns web insertion and upload/transcription lifecycle updates.
    - frontend/packages/ui/src/message_parsing/parse_message.ts and serializers.ts convert canonical markdown to editor state and back.
    - frontend/packages/ui/src/services/drafts/draftSave.ts stores encrypted canonical markdown and reconstructs Tiptap JSON for editing; persisted drafts do not require Tiptap JSON compatibility.
    - frontend/packages/ui/src/services/db/chatKeyManagement.ts encrypts persistent message fields with the existing chat key and removes plaintext fields before storage.
    - frontend/packages/ui/src/services/sendersChatMessages.ts allows request-scoped plaintext for AI processing but encrypts persistent message/embed storage and wraps deterministic embed keys for master/chat access.
    - frontend/packages/ui/src/services/drafts/draftSave.ts encrypts canonical draft markdown and preview with the master key before database/server persistence.
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift already provides one native shell across Apple hosts.
    - apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift currently supplies the editable WebView surface and must be removed from production composer paths.
    - apple/OpenMates/Sources/Features/Chat/Views/InlinePreviewView.swift currently renders pending previews outside the editable document.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift currently owns pendingComposerEmbeds and appends references after text at send time.
    - apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift implements web-compatible message/chat-key/master-key formats A, C, and D.
    - apple/OpenMates/Sources/Core/Crypto/ChatKeyManager.swift manages wrapped per-chat keys and must not silently replace an existing chat key.
    - apple/OpenMates/Sources/Core/Services/DraftService.swift currently contains an unused plaintext UserDefaults draft implementation that must be migrated or removed before native draft persistence is enabled.
  tests:
