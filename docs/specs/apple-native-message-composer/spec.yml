  online_research:
    - "Tiptap maintainer guidance states that ProseMirror depends heavily on the browser DOM and recommends WebView for direct Tiptap reuse; a native implementation must therefore reproduce semantics through an adapter rather than embed Tiptap itself."
    - "Apple TextKit 2 documentation supports custom text elements, selection management, viewport layout, and attachment-view reuse on supported Apple platforms."
    - "Current TextKit 2 editor projects demonstrate native performance and platform integration but also document selection, layout, IME, and attachment bugs that require focused regression tests."
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte owns the web editor lifecycle, parsing triggers, paste/drop handling, overlays, PII, drafts, mentions, and send coordination.
    - frontend/packages/ui/src/components/enter_message/editorConfig.ts configures raw-markdown write mode plus Embed and mention atom nodes.
    - frontend/packages/ui/src/components/enter_message/extensions/Embed.ts owns web embed attributes, NodeView rendering, grouping, removal cleanup, and renderer updates.
    - frontend/packages/ui/src/components/enter_message/extensions/embed_renderers/index.ts routes generated embed types to web preview renderers.
    - frontend/packages/ui/src/components/enter_message/embedHandlers.ts owns web insertion and upload/transcription lifecycle updates.
    - frontend/packages/ui/src/message_parsing/parse_message.ts and serializers.ts convert canonical markdown to editor state and back.
    - frontend/packages/ui/src/services/drafts/draftSave.ts stores encrypted canonical markdown and reconstructs Tiptap JSON for editing; persisted drafts do not require Tiptap JSON compatibility.
    - frontend/packages/ui/src/services/db/chatKeyManagement.ts encrypts persistent message fields with the existing chat key and removes plaintext fields before storage.
    - frontend/packages/ui/src/services/sendersChatMessages.ts allows request-scoped plaintext for AI processing but encrypts persistent message/embed storage and wraps deterministic embed keys for master/chat access.
    - frontend/packages/ui/src/services/drafts/draftSave.ts encrypts canonical draft markdown and preview with the master key before database/server persistence.
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift already provides one native shell across Apple hosts.
    - apple/OpenMates/Sources/Shared/Components/TiptapComposerWebView.swift currently supplies the editable WebView surface and must be removed from production composer paths.
    - apple/OpenMates/Sources/Features/Chat/Views/InlinePreviewView.swift currently renders pending previews outside the editable document.
    - apple/OpenMates/Sources/Features/Embeds/Renderers/SearchEmbedModels.swift resolves parent/child search result graphs when all related records are available.
    - apple/OpenMates/Sources/Features/Embeds/Renderers/CodeRenderers.swift currently renders a non-parity sheet preview/fullscreen surface.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift currently owns pendingComposerEmbeds and appends references after text at send time.
    - apple/OpenMates/Sources/Core/Crypto/CryptoManager.swift implements web-compatible message/chat-key/master-key formats A, C, and D.
    - apple/OpenMates/Sources/Core/Crypto/ChatKeyManager.swift manages wrapped per-chat keys and must not silently replace an existing chat key.
    - apple/OpenMates/Sources/Core/Services/DraftService.swift currently contains an unused plaintext UserDefaults draft implementation that must be migrated or removed before native draft persistence is enabled.
