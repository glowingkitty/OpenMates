  parity_expectations:
    - The rendered web composer is the visual and behavioral source of truth, while ComposerDocument and canonical markdown fixtures are the semantic source of truth shared across platforms.
    - The web message/draft/embed encryption implementation and documented formats are the security source of truth; native composer code may call approved encryption boundaries but must not reproduce or alter cryptography in editor/view code.
    - Native embed previews appear at their document positions inside the editable field and use the same product information hierarchy, dimensions, statuses, actions, and responsive states as their web counterparts.
    - Text selection, cursor movement, deletion, undo/redo, dictation, IME composition, paste, keyboard shortcuts, and accessibility use native Apple behavior unless the web contract requires a product-specific override.
    - All Apple hosts use one document/controller contract and differ only by declared capabilities and host-owned destination/send plumbing.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-native-message-composer/spec.yml
    - python3 scripts/spec_verify.py docs/specs/apple-native-message-composer/spec.yml --phase red
