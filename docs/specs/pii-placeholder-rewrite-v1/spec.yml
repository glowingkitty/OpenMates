implementation_plan:
  spec_path: docs/specs/pii-placeholder-rewrite-v1/spec.yml
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
    - frontend/packages/ui/src/stores/embedPIIStore.ts
    - frontend/packages/secret-scanner/src/scanner.ts
  architecture: >
    Add a small client-side rewrite service that consumes known PIIMapping entries
    and runs before outbound message submission, then wire it into the existing
    send path and secret-scanner parity tests without changing server storage.
  data_flow:
    - Active chat decrypts message/embed PII mappings for owner-local restoration.
    - User sends a new message.
    - Rewrite service replaces known original values with existing placeholders.
    - Existing PII detection handles newly detected values and stores encrypted mappings.
    - Server receives only the rewritten/encrypted message content and encrypted mappings.
  affected_files:
    - path: frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
      reason: Existing PII replacement and mapping helpers may need exported utilities or shared types.
    - path: frontend/packages/ui/src/components/enter_message/services/placeholderRewriteService.ts
      reason: New reusable rewrite service.
    - path: frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
      reason: Wire rewrite before final send.
    - path: frontend/packages/ui/src/stores/embedPIIStore.ts
      reason: Make active mappings available without leaking cross-chat state.
    - path: frontend/packages/secret-scanner/src/scanner.ts
      reason: CLI-compatible known-value behavior and test parity.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/pii-placeholder-rewrite-v1/spec.yml
    - python3 scripts/spec_verify.py docs/specs/pii-placeholder-rewrite-v1/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/pii-placeholder-rewrite-v1/spec.yml --phase green
  verification_order:
    - Frontend unit and secret-scanner unit red evidence first.
    - Implement rewrite service and send path.
    - Frontend unit and secret-scanner unit green evidence.
    - Deploy to dev before Playwright green evidence.
    - Deployed web Playwright green evidence.
    - User confirmation.
    - Apple parity after confirmation or waiver.

