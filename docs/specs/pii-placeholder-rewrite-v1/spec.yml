  affected_files:
    - apple/OpenMates/Sources/**/Chat*
    - apple/OpenMates/Sources/**/Composer*
    - apple/OpenMates/Sources/**/PII*
  parity_expectations:
    - Apple must eventually rewrite outbound prompts using the same encrypted mapping contract before sending private original values.
    - Apple starts only after web and user confirmation, or a spec-recorded waiver.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios or targeted PII composer tests after web/user confirmation.
  intentional_native_differences:
    - Native UI may present reveal/exclusion controls differently, but outbound rewrite and privacy guarantees must match web.

clarification:
  rounds:
    - question: Should finance merchant names use strict placeholders, allow common merchant names, or a local searchable alias mapping?
      answer: Use the local searchable alias mapping idea, because it preserves queries like "how much did I spend on Spotify" without sending Spotify to the LLM/server when a prior mapping exists.
    - question: Should this be finance-only or a reusable PII layer?
      answer: Make it finance-first but reusable for other PII mappings later.
    - question: Should placeholders carry category context for finance?
      answer: Yes. Use category-aware placeholders so the LLM can reason about spending categories without exact merchant names.
    - question: Should this be split from the Finance app skill spec?
      answer: Yes. Create one independent PII spec and one Finance Check accounts spec so separate sessions can work in parallel.
  vision_summary: >
    The user wants a reusable client-side rewrite layer that detects original
    private values already known from encrypted message/embed mappings and sends
    placeholders instead. Finance is the first important consumer: merchant and
    payee names remain private, while category-aware placeholders keep spending
    analysis useful.
  approved_by_user: true

