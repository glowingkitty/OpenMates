scenarios:
  - id: S-1
    title: Follow-up rewrites original value from prior message mapping
    given:
      - Alice previously sent a message where `alice@example.com` was replaced with `[EMAIL_1_com]` and stored in encrypted PII mappings.
    when:
      - Alice later types `Use alice@example.com for the signup form` in the same chat.
    then:
      - The outbound payload sent to OpenMates contains `[EMAIL_1_com]` instead of `alice@example.com`.
      - The local composer/chat UI can still restore and show the original value when Alice reveals PII.

  - id: S-2
    title: Follow-up rewrites original merchant value from finance embed mapping
    given:
      - A Finance embed registered owner-only mapping `Spotify` to `[MERCHANT_STREAMING_001]`.
    when:
      - Alice asks `How much did I spend on Spotify this year?`.
    then:
      - The outbound prompt contains `[MERCHANT_STREAMING_001]`.
      - The LLM can reason that the merchant belongs to the streaming category without seeing `Spotify`.

  - id: S-3
    title: Manual exclusion suppresses automatic rewrite for exact value
    given:
      - Alice has a prior mapping for `ACME GmbH` to `[MERCHANT_SOFTWARE_003]`.
    when:
      - Alice explicitly removes/excludes the placeholder for `ACME GmbH` in the current message before sending.
    then:
      - The rewrite pass does not reapply `[MERCHANT_SOFTWARE_003]` behind Alice's back.
      - The send path records the user's chosen visibility behavior consistently with existing PII exclusion semantics.

  - id: S-4
    title: Unmapped original values are not guessed by the rewrite layer
    given:
      - Alice has no prior mapping for `New Merchant Ltd`.
    when:
      - Alice asks about `New Merchant Ltd`.
    then:
      - The rewrite layer does not invent a placeholder.
      - Existing PII pattern detection may still redact the value only if it matches a configured detector or user personal-data entry.

  - id: S-5
    title: Shared chat viewers cannot recover owner-only originals
    given:
      - A shared or public chat includes finance placeholders in an embed.
    when:
      - A non-owner views the shared chat.
    then:
      - The non-owner sees placeholders and category labels only.
      - Owner-only message/embed mappings are not included in the shared payload.

  - id: S-6
    title: Uploaded code, docs, and sheets are redacted before real chat send
    given:
      - Alice attaches code, CSV, DOCX, and XLSX files containing emails and API keys.
    when:
      - Alice sends the files through CLI or the deployed web composer.
    then:
      - The real chat send path acknowledges placeholder redaction for every local text/doc/sheet upload.
      - The sent web chat message and fullscreen embeds do not expose the raw uploaded PII.

