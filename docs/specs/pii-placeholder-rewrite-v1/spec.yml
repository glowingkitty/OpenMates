risks:
  - id: R-1
    risk: Over-eager rewrite may replace user-intended plaintext values after the user manually excluded them.
    mitigation: Track current-send exclusions and test that exclusions suppress rewrite.
  - id: R-2
    risk: Short or common merchant/person names could cause false-positive replacements.
    mitigation: Use exact known mappings, longest-match ordering, minimum-length/provider-specific rules where needed, and no guessing.
  - id: R-3
    risk: Share/public views could accidentally hydrate owner-only originals.
    mitigation: Keep mappings owner-only and verify shared/public views expose placeholders only.

