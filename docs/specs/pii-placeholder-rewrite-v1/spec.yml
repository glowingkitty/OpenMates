        summary: Active chat state merges decrypted message-level and embed-level mappings for local restoration/reveal behavior.
  - id: A-2
    text: The rewrite pass can run after URL/embed protection and before final encrypted message persistence without exposing original values to the server.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
        summary: Normal and deferred send paths run placeholder rewrite inside the protected PII anonymization block before message payload creation, IndexedDB persistence, encryption, and chatSyncService.sendNewMessage.

contracts:
  client_rewrite:
    input: "message markdown, active chat message PIIMapping[], active chat embed PIIMapping[], current-send exclusion set"
    output: "rewritten markdown plus any new mappings created by normal PII detection"
    matching_rules:
      - Match exact original values from known mappings.
      - Prefer longest originals first to avoid partial replacements.
      - Replace all occurrences for the exact original value unless excluded for this send.
      - Do not match inside protected embed reference JSON blocks.
      - Do not invent placeholders for unknown originals.
    finance_placeholder_format:
      - "[MERCHANT_<CATEGORY>_<NNN>]"
      - "[PAYEE_<CATEGORY>_<NNN>]"
      - "[PAYER_<CATEGORY>_<NNN>]"
      - "[TRANSFER_INTERNAL_<NNN>]"
  privacy_security:
    - Originals stay in encrypted message/embed mapping blobs only.
    - The server, LLM providers, logs, traces, and app-skill payloads receive placeholders, not matched originals.
    - Shared/public consumers do not receive owner-only mappings.
    - Mapping originals are never used for telemetry labels or analytics dimensions.

