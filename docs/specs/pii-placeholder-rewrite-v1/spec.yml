    reason: It lets users refer to original private values naturally while preserving the existing server/LLM placeholder boundary.
    decided_at: "2026-07-20"
  - id: D-2
    status: active
    decision: Keep finance merchant/payee placeholders category-aware.
    reason: Category context preserves analytic usefulness without exposing exact counterparties.
    decided_at: "2026-07-20"
  - id: D-3
    status: active
    decision: Respect manual exclusion/removal controls over automatic rewrite.
    reason: Users must remain in control when they intentionally reveal or exclude an exact value.
