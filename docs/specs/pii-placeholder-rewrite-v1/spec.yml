schema_version: 2
id: pii-placeholder-rewrite-v1
title: PII Placeholder Rewrite V1
status: implementing

goal: >
  Extend OpenMates' client-side PII placeholder system so outbound user messages
  are rewritten against previously encrypted message and embed mappings before
  they reach the server or LLM. A user should be able to ask a natural follow-up
  using an original private value, while OpenMates sends only the corresponding
  placeholder token and keeps restoration local to the owning client.

scope:
  in:
    - Client-side rewrite of outbound user message text using cumulative decrypted
      placeholder mappings from earlier user messages and current-chat embeds.
    - Reuse of the existing message-level and embed-level PII mapping architecture
      so mappings remain encrypted at rest and owner-only.
    - Finance-first support for category-aware placeholders such as
      `[MERCHANT_STREAMING_001]`, while keeping the rewrite service reusable for
      non-finance PII mappings.
    - Exact-value matching that replaces all occurrences of the same original
      value with the same placeholder inside the outbound message.
    - >
      Respect for existing user exclusions/manual placeholder removal semantics:
      if the user excluded or removed a value from redaction in the current send,
      the rewrite layer must not silently re-redact that same value.
    - Unit coverage for message mappings, embed mappings, collision handling,
      opt-out/exclusion behavior, and secret-scanner/CLI parity where applicable.
    - Deployed web coverage proving a follow-up prompt is sent with placeholders
      while the local UI can still render/restores originals.
    - Real CLI and deployed web chat coverage for PII inside uploaded code,
      CSV, DOCX, and XLSX files before those uploads reach chat history or AI context.
  out:
    - Fully redesigning the PII detector or all supported PII categories.
    - Server-side restoration or server-side access to original PII values.
    - Persisting raw finance merchant/payee names outside encrypted owner-only
      mapping blobs.
    - Global merchant allowlists or default plaintext merchant-name disclosure.
    - Apple native implementation before web behavior is verified and user-approved.

sequencing_gates:
  - gate: CLIENT_REWRITE_CORE_FIRST
    required_before: finance_skill_implementation
    rule: The reusable rewrite service and unit tests must exist before Finance depends on merchant/payee rewrite behavior.
    evidence: [T-UNIT-REWRITE, T-UNIT-EMBED-MAPPINGS, T-UNIT-SECRET-SCANNER]
  - gate: WEB_BEFORE_APPLE
    required_before: apple_implementation
    rule: Web send-path behavior and user confirmation are required before Apple parity begins.
    evidence: [T-WEB-PII-REWRITE, T-WEB-FILE-UPLOAD-PII, V-USER-CONFIRMATION]

