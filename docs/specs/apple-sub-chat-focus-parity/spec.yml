id: apple-sub-chat-focus-parity
title: Apple Sub-Chat Processing And Focus Mode Web Parity
status: implementing

goal: >
  Make the Apple app fully match the web app's zero-knowledge sub-chat
  processing, focus-mode activation, and cross-surface chat sync contracts. An
  Apple-created chat or sub-chat tree must appear correctly in the web app, and
  a web-created sub-chat/focus-mode flow must appear correctly in Apple, without
  weakening encryption or inventing Apple-only behavior.

scope:
  in:
    - Apple iOS chat send/receive lifecycle parity with `chat-flow.spec.ts`, including encrypted message persistence, generated title/category/icon/summary metadata, reload/cold-boot behavior, and web visibility under the same test account.
    - Full Apple parity for web sub-chat processing, including server approval requests, explicit approve/cancel UI, spawned child chat shell creation, progress updates, stop events, parent/child navigation, return-to-parent behavior, nested child rendering, and sending inside synced sub-chats.
    - Sub-chat sibling broadcast behavior wherever the web app exposes it, using the same data contract and safe encryption/key reuse behavior.
    - Apple focus-mode mention/search, activation, active pill/banner, details/indicator state, deactivation, and encrypted active-focus persistence parity with the web app.
    - Cross-surface verification for Apple-created data in the web app and web-created data in the Apple app.
    - Native data model, persistence, WebSocket, and UI-test support needed to represent web chat fields such as `parent_id`, `is_sub_chat`, sub-chat settings/progress, and `encrypted_active_focus_id`.
    - Deterministic tests that prevent future Apple drift from web sub-chat and focus-mode contracts.
  out:
    - Changing backend sub-chat limits, depth rules, or approval policy unless an existing web parity bug requires a backend fix.
    - Replacing the zero-knowledge encryption model or creating Apple-specific chat-key semantics.
    - Reworking the whole Apple app shell or transcript implementation to UIKit unless profiling proves it is needed.
    - Adding permanent production demo/example chats.
    - Committing private account credentials, private hostnames, raw logs with identifiers, test chat IDs, or remote Mac details.

