risks:
  - Sub-chat approval and live inference flows can be slow and flaky; tests must use deterministic markers, generous timeouts, cleanup, and screenshot/log evidence.
  - Parent-key reuse is security-sensitive; regression tests must fail on accidental child-key generation.
  - Cross-surface tests require coordinating remote Mac simulator and Playwright live-dev runs without leaking credentials or host details.
  - Existing Apple `MainAppView.swift` and `ChatViewModel.swift` are large files; implementation should prefer focused extractions rather than adding broad responsibilities inline.

open_questions:
  - Should the first implementation create a reusable native sub-chat approval component or keep it scoped inside chat UI until a second surface needs it?
  - Which existing web focus-mode catalog source should Apple consume or generate from to avoid another hardcoded mention list?
  - Should cross-surface orchestration live in one script or as two smaller scripts split by Apple-to-web and web-to-Apple direction?
