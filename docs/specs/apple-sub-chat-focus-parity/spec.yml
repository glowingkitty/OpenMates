  parity_expectations:
    - Apple must use the rendered web app and existing web E2E specs as the source of truth for sub-chat, focus-mode, and chat-sync behavior.
    - Apple must use OpenMates-native primitives for product UI; no new default `List`, `Form`, default `Menu`, default `.sheet`, or stock product controls for approval/progress/focus UI.
    - Native model and persistence fields must preserve web field names and semantics at API/sync boundaries while using idiomatic Swift properties internally.
  verification:
    - Remote Mac or XcodeBuildMCP build of `OpenMates_iOS`.
    - Remote Mac `xcodebuild test` for unit tests covering model decoding, send payloads, sub-chat lifecycle, and focus metadata encryption.
    - Remote Mac `xcodebuild test` for real-account Apple UI tests that run against live dev.
    - Playwright runs through `python3 scripts/run_tests.py --spec ...` after deployment for matching web checks.
    - Cross-surface orchestration evidence proving Apple-created chats/sub-chats appear in web and web-created sub-chats/focus state appear in Apple.
  intentional_native_differences:
    - Apple verification uses XCTest/XCUITest and remote Mac simulator flow instead of Playwright for native UI control.
    - Native approval UI may be a custom OpenMates overlay/popover instead of the browser DOM component, but it must expose equivalent choices, status, accessibility, and sync side effects.

clarification:
  rounds:
    - question: Should this Apple parity spec include full sub-chat approval UI now, or limit this slice to server-created/auto-approved sub-chats plus navigation/sync parity?
      answer: The specs must cover full parity for sub chat processing with web app.
  vision_summary: >
    Apple must not implement only a simplified or auto-approved sub-chat path.
    It must cover full web-app parity for sub-chat processing, including approval
    and cancellation behavior, while also preserving the existing chat sync,
    encryption, embed, and focus-mode parity goals discovered during this session.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Apple-created chat syncs to web with encrypted metadata and embeds
    given:
      - Alice is logged into the Apple app and web app with the same live dev test account.
      - The Apple app is connected to the realtime WebSocket and has a valid master key and chat key cache.
    when:
      - Alice creates a new Apple chat and sends `Kyoto and Osaka quick tip test`.
      - The assistant responds and post-processing completes.
      - Alice opens or reloads the web app with the same account.
    then:
      - The web app shows the Apple-created chat as the most recent non-archived chat.
      - The user and assistant messages decrypt in web with no `CLIENT_DECRYPT` or sync-guard errors for that chat.
      - Generated title, category, icon, summary, quick-tip embeds, and timestamps match the Apple state within expected live-processing variance.
      - Deleting the chat from either surface removes it from the other surface after sync.

  - id: S-2
    title: Apple handles web-equivalent sub-chat approval requests
    given:
      - Alice sends a parent chat request from Apple that causes the backend to emit a sub-chat approval request.
      - The request includes task id, proposed child chats, server limits, and expected approval/cancel actions.
    when:
      - The approval request arrives before the parent assistant response completes.
    then:
      - Apple renders a custom OpenMates approval UI with the same approve/cancel choices and count constraints as the web app.
      - Approving sends `sub_chat_confirmation` with `chat_id`, `task_id`, `action: approve`, and `approve_count` when applicable.
      - Cancelling sends `sub_chat_confirmation` with `action: cancel` and does not create local child chats.
      - The parent response stream stays active until the backend emits the final parent synthesis or a clear cancelled state.

  - id: S-3
    title: Apple creates and syncs server-spawned sub-chat shells securely
    given:
      - Alice approves a backend sub-chat batch from the Apple app.
      - The backend emits child chat definitions with ids, prompts, and first user message ids.
    when:
      - Apple receives the sub-chat lifecycle frames.
    then:
      - Each child chat is stored with `parent_id` equal to the parent chat id and `is_sub_chat` true.
      - Child chats reuse the parent chat key and do not generate independent random chat keys.
      - Each child first user message is encrypted and synced using the same zero-knowledge metadata channel as web.
      - The web app shows the same child chats under the parent after reload and can decrypt their first messages.

  - id: S-4
    title: Apple renders sub-chat progress, cards, tree, and navigation like web
    given:
      - A parent chat has one or more child chats and at least one grandchild chat.
      - Some child chats are running, completed, cancelled, or stopped.
    when:
      - Alice opens the parent chat and navigates between parent, child, and grandchild chats in Apple.
    then:
      - Apple shows sub-chat cards or an equivalent custom native carousel for children referenced by parent messages.
      - Apple shows parent/child tree structure in the chat list with clear nesting and current-chat state.
      - Opening a child exposes a return-to-parent action and child context matching web behavior.
      - Progress, stopped, completed, and cancelled states update from WebSocket events without requiring app restart.

  - id: S-5
    title: Apple supports sending inside synced sub-chats and sibling broadcast parity
    given:
      - Alice has opened a synced child sub-chat in Apple.
      - The child has siblings under the same parent.
    when:
      - Alice sends a message inside the child sub-chat with sibling broadcast disabled.
    then:
      - Only the active child receives and syncs the message.
      - The message payload includes `parent_id` context for the backend when web would include it.
    and:
      - When Alice enables the sibling broadcast control and sends another message, Apple mirrors web behavior by copying/sending the message to eligible sibling sub-chats using safe per-chat encryption and unique message ids.

  - id: S-6
    title: Web-created real sub-chat flow syncs into Apple
    given:
      - The web app runs the live sub-chat inference flow from `sub-chats-real-inference.spec.ts`.
      - The backend creates at least one sub-chat under a parent chat.
    when:
      - Alice opens the same account in Apple after sync.
    then:
      - Apple shows the parent chat, child sub-chat cards/tree entries, and return-to-parent navigation.
      - Apple can open the web-created sub-chat, decrypt messages, send a new child message, and receive an assistant response in that sub-chat.

  - id: S-7
    title: Apple focus-mode mention and activation mirror web
    given:
      - Alice starts a new Apple chat.
    when:
      - Alice types `@career` in the Apple composer.
    then:
      - Apple shows catalog-driven focus-mode mention results equivalent to the web mention dropdown.
      - Selecting a focus mode inserts the same backend mention syntax as web and closes the dropdown.
    and:
      - When the backend emits `focus_mode_activated`, Apple encrypts the focus id with the chat key, stores it as `encrypted_active_focus_id`, sends `update_encrypted_active_focus_id`, and shows the active focus pill/banner state.

  - id: S-8
    title: Apple active focus mode persists, affects later sends, and deactivates like web
    given:
      - A chat has an active focus mode stored as `encrypted_active_focus_id`.
    when:
      - Alice reloads/cold-boots Apple and sends another message in that chat.
    then:
      - Apple decrypts `encrypted_active_focus_id` locally and includes plaintext `active_focus_id` only in the AI-processing WebSocket payload.
      - Apple never stores plaintext focus id for private user chats.
      - Deactivation uses the same web event contract and clears/persists the encrypted active-focus field across Apple and web.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Apple-created chats, messages, generated metadata, and embeds are visible and decryptable in the web app after reload under the same account.
  - id: AC-2
    scenario: S-2
    text: Apple handles backend sub-chat approval requests with approve/cancel UI and sends the same `sub_chat_confirmation` payloads as web.
  - id: AC-3
    scenario: S-3
    text: Apple-created sub-chat shells use `parent_id`, `is_sub_chat`, and parent-key encryption semantics matching web and CLI contracts.
  - id: AC-4
    scenario: S-4
    text: Apple renders sub-chat progress, parent/child tree state, child cards, and return-to-parent navigation with web-equivalent behavior.
  - id: AC-5
    scenario: S-5
    text: Apple supports sending inside synced sub-chats and sibling broadcast behavior using safe per-target encryption and unique message ids.
  - id: AC-6
    scenario: S-6
    text: Web-created live sub-chat flows sync into Apple, remain decryptable, and can continue receiving child messages and assistant responses from Apple.
  - id: AC-7
    scenario: S-7
    text: Apple focus-mode mention results and activation handling are catalog-driven and equivalent to the web `@career` flow.
  - id: AC-8
    scenario: S-8
    text: Apple persists active focus mode as encrypted chat metadata, includes decrypted `active_focus_id` only in AI-processing payloads, and deactivates through the web-compatible contract.
  - id: AC-9
    scenario: S-1
    text: No Apple parity implementation may introduce plaintext private chat content, child prompts, chat keys, or private focus IDs into durable unencrypted storage.

contracts:
  websocket:
    - event: chat_message_added
      direction: apple_to_server
      payload: "{ chat_id: string, parent_id?: string|null, broadcast?: boolean, message: { message_id: string, role: user, content: string, created_at: number, chat_has_title: boolean, current_chat_title?: string|null }, encrypted_chat_key?: string|null, active_focus_id?: string|null, embeds?: array, encrypted_embeds?: array }"
      apple_behavior:
        - Include `parent_id` for sub-chat messages when web would include it.
        - Include plaintext `active_focus_id` only after decrypting `encrypted_active_focus_id` locally for AI processing.
        - Continue sending encrypted storage metadata separately after backend preprocessing.
    - event: sub_chat_confirmation_required
      direction: server_to_apple
      payload: "{ chat_id: string, task_id: string, sub_chats: array, max_auto_sub_chats?: number, max_direct_sub_chats?: number, existing_sub_chats?: number, remaining_sub_chats?: number }"
      apple_behavior:
        - Render approve/cancel UI and keep parent stream alive.
        - Do not create local child shells until approval/spawn data is accepted.
    - event: sub_chat_confirmation
      direction: apple_to_server
      payload: "{ chat_id: string, task_id: string, action: approve|cancel, approve_count?: number|null }"
      apple_behavior:
        - Use the existing backend event name; do not add an Apple-only approval event.
    - event: spawn_sub_chats
      direction: server_to_apple
      payload: "{ parent_id|chat_id: string, sub_chats: [{ id: string, user_message_id: string, prompt: string, wait_for_completion?: boolean }] }"
      apple_behavior:
        - Create encrypted child chat shells with `parent_id` and `is_sub_chat`.
        - Store child first messages encrypted with the parent chat key.
    - event: sub_chat_progress
      direction: server_to_apple
      payload: "{ chat_id: string, task_id?: string, status?: running|stopping|stopped|completed|cancelled, total?: number, completed?: number, active_sub_chat_id?: string|null }"
      apple_behavior:
        - Update parent and child UI without full reload.
    - event: sub_chat_stop
      direction: apple_to_server
      payload: "{ chat_id: string, task_id?: string|null }"
      apple_behavior:
        - Stop the active sub-chat batch using the same web event contract.
    - event: focus_mode_activated
      direction: server_to_apple
      payload: "{ chat_id: string, focus_id: string }"
      apple_behavior:
        - Encrypt `focus_id` with the chat key and persist as `encrypted_active_focus_id`.
        - Send `update_encrypted_active_focus_id` after local encryption.
    - event: update_encrypted_active_focus_id
      direction: apple_to_server
      payload: "{ chat_id: string, encrypted_active_focus_id: string|null }"
      apple_behavior:
        - Use this for activation persistence and deactivation clearing.
  data:
    - Apple `Chat` must decode, persist, merge, and sync `parent_id`, `is_sub_chat`, `sub_chat_settings`, budget metadata where present, and `encrypted_active_focus_id` without dropping unknown web-compatible fields during merges.
    - Child chats under the current zero-knowledge sub-chat design share the parent chat key; Apple must not generate a fresh child key unless the backend/web contract changes first.
    - Apple offline persistence must preserve enough sub-chat and focus metadata for cold boot before WebSocket sync.
    - Apple embed persistence must keep embed refs and encrypted embed payloads associated with the correct parent or child chat.
  ui_states:
    - New parent chat, awaiting sub-chat approval, approving, cancelled, running child chats, completed children, stopped children, parent synthesis complete.
    - Parent chat with child card carousel, child chat with return-to-parent action, nested child tree in chat list, sibling broadcast toggle, active focus pill/banner, focus details/indicator, and inactive focus state.
    - Loading, websocket disconnected, approval send failed, child creation failed, decryption unavailable, and cleanup/delete states must be visible to the user and logged.
  privacy_security:
    - Chat keys, decrypted messages, child prompts, active focus ids, and assistant responses remain out of durable plaintext storage for private chats.
    - Approval/progress UI may display proposed child prompts because the user must review them, but durable persistence uses existing encrypted message/chat storage.
    - Test fixtures and committed specs must use placeholders for account, chat, host, and remote Mac identifiers.
    - No broad silent fallback may hide sub-chat approval, encryption, or sync failures.

