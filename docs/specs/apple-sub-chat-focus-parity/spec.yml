implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/services/sendersChatMessages.ts: web message payload shape for parent_id, broadcast, and active_focus_id.
    - frontend/packages/ui/src/services/sendersSync.ts: web sub-chat confirmation and stop senders.
    - docs/specs/cli-sub-chat-deep-research/spec.yml: parent-key reuse and sub-chat shell contract.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift: Apple dual-phase send/encrypted storage pipeline.
    - apple/OpenMates/Sources/App/MainAppView.swift: Apple WebSocket sync event routing and metadata upsert patterns.
  architecture: >
    Extend Apple's existing chat model, sync routing, and send pipeline to carry
    the same web fields and lifecycle events. Keep backend event names unchanged,
    add native OpenMates UI for approval/progress/focus state, and verify parity
    through both native simulator tests and web Playwright checks against live dev.
  data_flow:
    - Apple sends a parent message through `chat_message_added` with encrypted chat key and optional active focus/sub-chat context.
    - Backend emits sub-chat approval/progress/spawn events through WebSocket.
    - Apple approval UI sends `sub_chat_confirmation`; approved child shells are persisted with parent-key encryption.
    - Apple and web both receive phased sync metadata/content and render the same parent-child tree and focus state after reload.
  affected_files:
    - path: apple/OpenMates/Sources/Core/Models/ChatModels.swift
      reason: Add sub-chat and encrypted active-focus fields.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Persist and load sub-chat/focus metadata across cold boot.
    - path: apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
      reason: Route sub-chat and focus lifecycle events.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Process sync/lifecycle events and cross-chat updates.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Send sub-chat/focus payload fields and maintain child/focus UI state.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Render approval, progress, child navigation, broadcast, and focus controls.
    - path: apple/OpenMates/Sources/Features/Chat/Views/FocusModeView.swift
      reason: Replace local-only focus state with synced encrypted state.
    - path: apple/OpenMates/Sources/Features/Chat/Views/MentionDropdownView.swift
      reason: Make focus-mode mention results catalog-driven and web-compatible.
    - path: apple/OpenMatesTests/ChatSyncParityTests.swift
      reason: Unit coverage for model/persistence metadata.
    - path: apple/OpenMatesTests/SubChatProcessingTests.swift
      reason: Unit coverage for sub-chat WS/send contracts.
    - path: apple/OpenMatesUITests/SubChatProcessingParityUITests.swift
      reason: Real-account native sub-chat flow coverage.
    - path: apple/OpenMatesUITests/FocusModeParityUITests.swift
      reason: Real-account native focus-mode flow coverage.
    - path: scripts/apple_web_chat_parity.py
      reason: Cross-surface orchestration for Apple-web parity evidence.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-sub-chat-focus-parity/spec.yml
    - xcodebuild unit tests for model/sub-chat/focus send contracts on remote Mac.
    - xcodebuild UI tests for real-account Apple chat, sub-chat, and focus flows on remote Mac.
    - python3 scripts/run_tests.py --spec chat-flow.spec.ts
    - python3 scripts/run_tests.py --spec sub-chats-real-inference.spec.ts
    - python3 scripts/run_tests.py --spec focus-mode-ui-after-activation.spec.ts
    - python3 scripts/spec_verify.py docs/specs/apple-sub-chat-focus-parity/spec.yml

