id: example-chat-public-quality
title: Public Example Chat Quality And Rendering Audit
status: implementing

goal: >
  Audit every public example chat that demonstrates app skills, focus modes,
  memories, PDFs, or media; identify root causes for broken or low-quality
  examples; regenerate or replace them with public-safe, high-quality examples;
  and verify both checked-in data and deployed rendering so public example pages
  never show broken embeds, private media, raw implementation payloads, or
  unnatural trigger syntax.

scope:
  in:
    - Full audit of public example chats with app_skill_examples, app_focus_mode_examples, app_settings_memory_examples, PDF/document examples, and media examples.
    - Root-cause investigation for every broken chat before replacement or removal.
    - Replacement chats created from natural prompts that never rely on @ mentions or @focus directives.
    - Stable public fixture assets for media, image, audio, video, and PDF examples instead of auth-bound generated S3 files.
    - Removal of superseded broken slugs with 404 behavior; new slugs are allowed when the concept changes substantially.
    - Preservation of capability coverage so every currently demonstrated public capability still has at least one working example after cleanup.
    - Agent quality review of each replacement before deployment and Firecrawl verification of deployed pages after deployment.
    - Deterministic audits and targeted tests that prevent vault keys, missing embeds, invalid interactive questions, and private media URLs from reaching public examples again.
  out:
    - Changing normal authenticated chat behavior unless root-cause investigation proves the public example bug is caused there.
    - Preserving old broken example URLs through redirects or hidden direct-render pages.
    - Publishing examples that require authenticated media fetches, private S3 presigned URLs, raw vault keys, or private user/account identifiers.
    - Broad redesign of example chat UI beyond fixes needed to render existing embed types correctly.
    - Apple UI changes; Apple can consume corrected public example data later, but this spec targets web/static example quality.

context_discovery:
  github_issues:
    - "GitHub MCP issue search failed with 401 bad credentials."
    - "`gh issue list --repo glowingkitty/OpenMates --search \"example chat rendering app skills focus memories demo chats\" --state all --limit 20 --json number,title,state,labels,updatedAt,url` returned `[]`."
  docs:
    - docs/specs/focus-mode-example-chat-rendering/spec.yml
    - docs/specs/cli-sub-chat-deep-research/spec.yml
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/messaging/message-parsing.md
    - docs/architecture/apps/focus-modes-implementation.md
  code_patterns:
    - frontend/packages/ui/src/demo_chats/data/example_chats/*.ts
    - frontend/packages/ui/src/demo_chats/exampleChatStore.ts
    - frontend/packages/ui/src/demo_chats/types.ts
    - frontend/packages/ui/src/i18n/sources/example_chats/*.yml
    - frontend/apps/web_app/src/routes/(seo)/example/[slug]/+page.server.ts
    - frontend/apps/web_app/src/routes/(seo)/example/[slug]/+page.svelte
    - frontend/apps/web_app/tests/example-chats-load.spec.ts
    - frontend/apps/web_app/tests/seo-demo-chat.spec.ts
    - scripts/audit_example_chats.py
    - scripts/create-example-chat-from-share.mjs
    - scripts/extract-shared-chat.mjs
  tests:
    - scripts/audit_example_chats.py
    - frontend/apps/web_app/tests/example-chats-load.spec.ts
    - frontend/apps/web_app/tests/seo-demo-chat.spec.ts
    - frontend/apps/web_app/tests/focus-mode-career-insights.spec.ts
  findings:
    - "Unauthenticated Firecrawl review found public examples leaking `vault_wrapped_aes_key` and `Presigned URL request failed: 401` in media/image examples."
    - "Firecrawl review found audio/video examples using generated/private S3 assets that are unavailable to public visitors."
    - "Firecrawl review found memory examples rendering `[Interactive Question - Invalid JSON]`, which points to malformed serialized interactive-question content."
    - "Firecrawl review found a website/app-skill example rendering raw fenced embed JSON instead of a normal embed preview."
    - "Firecrawl review found focus-mode SSR/direct pages where public routes rendered generic shell content or omitted the expected activation/sub-chat affordances."
    - "Existing `focus-mode-example-chat-rendering` spec already documents missing focus activation embeds, incomplete sub-chat transcripts, and static sub-chat summary fallbacks."
    - "Existing `scripts/audit_example_chats.py` validates categories, missing i18n keys, some raw payload patterns, focus auto-selection, sub-chat presence for web-research, and app-skill preview basics, but it does not yet enforce the broader public-quality gate."
    - "Issue `b88beff4-cfc5-48cd-ab62-58cb2dc4bcfd` reports memory example regressions: system messages not included/rendered, mail embed missing, interactive questions missing, document embed blank, and memory example card clicks not updating `#chat-id` for reload."
    - "`memory-mail-writing-styles` currently contains only two messages and one `code` embed instead of renderable app-settings/memory system artifacts and a `mail-email` draft embed."
    - "`memory-books-currently-reading` contains a `document`/`docx_model` embed payload that normalizes to `docs-doc` but lacks the `html`/`code` content shape required by `DocsEmbedPreview`, so the preview renders blank."
    - "Settings app-store example handlers call `activeChatStore.setWithoutHashUpdate` on wide viewports, so linked example chats load in memory without updating the reloadable `#chat-id` URL."

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This work changes public web example-chat source data, web rendering contracts, and validation tooling. No Apple Swift UI surface renders these public example pages today.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should this spec cover only the currently identified broken/low-quality example chats, or a full audit/regeneration pass for all public example chats that demonstrate app skills, focus modes, memories, media, and PDFs?
      answer: Full audit pass.
    - question: When replacement chats are generated, should existing public slugs be preserved whenever possible, or can new slugs replace substantially changed concepts?
      answer: New slugs are OK.
    - question: For old broken example URLs replaced by new slugs, should old URLs redirect, be removed/404, or remain hidden but directly renderable?
      answer: Remove / 404.
    - question: Before committing regenerated example chats, should deterministic checks be enough or is product quality review required?
      answer: Each chat must be checked for quality by an agent, then deployed and checked again with Firecrawl for correct rendering, focus activation embeds where applicable, and no broken or missing embeds.
    - question: For media-heavy replacement chats, should they demonstrate real public media/files or avoid generated/private media attachments?
      answer: Use stable public fixtures.
    - question: Should coverage be preserved for every public app skill/focus/memory/PDF/media capability currently represented by an example?
      answer: Preserve coverage.
  vision_summary: >
    Public example chats should be production-quality demonstrations that work for
    unauthenticated visitors. They may be replaced by new slugs, but broken
    examples must not remain published, every demonstrated capability needs a
    working example, and no replacement can rely on explicit @ triggers, private
    assets, raw embed payloads, or unreviewed generated content.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Auditor inventories all capability examples
    given:
      - The repository contains public example chats under `frontend/packages/ui/src/demo_chats/data/example_chats`.
      - Some examples declare app skill, focus mode, memory, PDF, media, image, audio, or video metadata.
    when:
      - A developer runs the public example audit workflow.
    then:
      - The workflow lists every public example in scope, its capability tags, linked skills/focus/memory IDs, and whether it has public fixture assets.
      - The workflow reports the broken examples and root-cause category before any replacement is made.
      - The workflow fails for unresolved high-risk issues such as vault keys, private media, missing embed references, raw JSON payloads, invalid interactive questions, missing focus activation embeds, and incomplete sub-chat transcripts.

  - id: S-2
    title: Broken example is replaced by a reviewed public-safe chat
    given:
      - An existing public example leaks private media, renders a broken embed, or has low-quality/unhelpful content.
      - The capability demonstrated by that example must remain represented publicly.
    when:
      - A replacement example is created.
    then:
      - The replacement uses a natural prompt with no @ mentions or @focus directives.
      - The system naturally demonstrates the app skill, memory, focus mode, PDF, or media capability.
      - Any file or media input uses a checked-in or otherwise stable public fixture asset.
      - An agent quality review confirms the transcript is useful, accurate enough for a demo, and free of unsafe operational advice.
      - The old broken slug is removed from listings and direct SSR lookup returns 404.

  - id: S-3
    title: Focus-mode examples render the same affordances as normal chats
    given:
      - A public example demonstrates a focus mode such as Deep research.
      - The example metadata declares `active_focus_id` and `app_focus_mode_examples`.
    when:
      - An unauthenticated visitor opens the hash route or the SSR `/example/<slug>` route.
    then:
      - The chat shows the focus-mode activation embed/card in the transcript.
      - The active focus state is visible where the normal chat UI exposes it.
      - Sub-chat cards include summaries and open complete child transcripts when relevant.
      - No raw focus activation JSON or @focus directive is visible.

  - id: S-4
    title: Public media and document examples render without authentication
    given:
      - A public example demonstrates image, audio, video, PDF, document search, vectorization, transcription, or generated media behavior.
    when:
      - An unauthenticated visitor opens the deployed example page.
    then:
      - All embed previews and fullscreen-capable assets load from stable public fixture URLs or checked-in public assets.
      - The page contains no `Presigned URL request failed`, `Transcript not available`, `Network error fetching S3`, `vault_wrapped_aes_key`, or private bucket/object identifiers.
      - PDF/document examples include the expected quoted or cited content when the prompt asks for it.

  - id: S-5
    title: Memory examples show useful saved-context behavior
    given:
      - A public example demonstrates an app settings memory category.
    when:
      - An unauthenticated visitor opens the deployed example page.
    then:
      - The conversation clearly shows saved context being used or updated.
      - Interactive questions render as valid UI or are rewritten as plain conversation; they never show `[Interactive Question - Invalid JSON]`.
      - The answer avoids irrelevant disclaimers and unsafe commands such as destructive git cleanup instructions unless the prompt explicitly asks for them and includes appropriate warnings.

  - id: S-7
    title: Settings-linked example chats are reloadable
    given:
      - A visitor opens an app settings memory, skill, focus-mode, or content detail page with a linked example chat card.
    when:
      - The visitor clicks the example chat card on a wide viewport where settings remains open.
    then:
      - The active chat changes to the linked `example-*` chat.
      - The browser URL hash changes to `#chat-id=<example-chat-id>`.
      - Reloading the page restores the same example chat.

  - id: S-8
    title: Memory examples preserve system artifacts and render created content embeds
    given:
      - A public memory example demonstrates saved app settings/memory behavior, mail draft creation, or document creation.
    when:
      - The example chat is loaded from the hash route.
    then:
      - App-settings/memory request and response system artifacts are either preserved as system messages or represented by equivalent visible transcript context.
      - Mail draft examples render a `mail-email` embed when the transcript says an email draft was created.
      - Document examples render a non-empty `docs-doc` preview when the transcript references a created document.
      - Interactive-question fences are balanced and parseable before any following embed reference.

  - id: S-6
    title: Deployed example pages pass Firecrawl rendering checks
    given:
      - Replacement examples have passed local deterministic audits and have been deployed to `app.dev.openmates.org`.
    when:
      - Firecrawl scrapes each affected `/example/<slug>` page and the corresponding hash route when needed.
    then:
      - Each page renders a specific transcript rather than the generic OpenMates landing shell.
      - Firecrawl output contains no broken/missing embed markers, raw vault keys, private media errors, invalid JSON placeholders, or unresolved i18n keys.
      - Focus-mode replacement pages include the expected focus activation embed text/card.
      - Removed old slugs return 404.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Deterministic auditing inventories every in-scope public example chat and fails on public-safety/rendering issues before deploy.
  - id: AC-2
    scenario: S-1
    text: Every broken example has a recorded root-cause category and replacement/removal decision.
  - id: AC-3
    scenario: S-2
    text: Replacements use natural prompts without @ mentions and preserve capability coverage with at least one working public example per previously demonstrated capability.
  - id: AC-4
    scenario: S-2
    text: Superseded broken slugs are removed from public listings and return 404 rather than redirecting or rendering hidden stale content.
  - id: AC-5
    scenario: S-3
    text: Focus-mode examples render activation embeds/cards, active focus state, and complete sub-chat affordances without raw focus JSON or forced @focus syntax.
  - id: AC-6
    scenario: S-4
    text: Media and document examples use stable public fixture assets and render without private S3, presigned URL, transcript, vault-key, or missing-file errors.
  - id: AC-7
    scenario: S-5
    text: Memory examples render valid saved-context behavior and never expose invalid interactive-question placeholders or irrelevant unsafe boilerplate.
  - id: AC-8
    scenario: S-6
    text: Deployed affected examples pass Firecrawl verification for specific page content, missing/broken embed absence, focus activation presence where applicable, and removed-slug 404 behavior.
  - id: AC-9
    scenario: S-7
    text: Clicking linked example chat cards from settings updates the reloadable `#chat-id` URL on every viewport.
  - id: AC-10
    scenario: S-8
    text: Memory examples preserve system-message semantics or equivalent visible context and render expected mail/document embeds without blank previews.

contracts:
  data:
    - "Every in-scope `ExampleChat` must declare enough metadata for audits to identify demonstrated app skills, focus modes, memories, and asset-backed capabilities."
    - "Message text must reference renderable embeds through supported embed references; raw fenced JSON payloads are not acceptable public content."
    - "No checked-in example chat data may contain `vault_wrapped_aes_key`, `vault:v1:`, presigned S3 URLs, private bucket names, account IDs, or other private source identifiers."
    - "Media/document examples must point to public fixture assets whose URLs are stable for unauthenticated visitors."
    - "Focus-mode examples with `active_focus_id` must include a renderable focus activation artifact and must not contain @focus directives in user prompts."
    - "Memory examples must not contain malformed interactive question JSON; if interactive UI cannot be represented safely, the transcript must use plain conversation instead."
    - "Example chat messages may use `role: system` when preserving app-settings/memory permission request/response artifacts from real chats."
    - "Document examples using a direct document embed must store renderable `docs-doc` content (`html` or `code`) or be rejected by deterministic audit."
    - "Mail examples whose transcript says an email draft was prepared must include at least one renderable `mail-email` embed."
  ui_states:
    - "Public `/example/<slug>` pages render crawlable SEO transcript HTML with `User:` and `OpenMates:` turns."
    - "Hash-route example chats render the normal chat transcript, embeds, sub-chat cards, focus activation cards, and parent navigation where applicable."
    - "Settings-linked example chat cards update `#chat-id` even when the settings panel remains open beside the chat."
    - "Missing/removed old slugs return 404 from SSR lookup and do not appear in the `/example` listing."
  tooling:
    - "`scripts/audit_example_chats.py` remains the primary deterministic local audit and is expanded rather than bypassed."
    - "Replacement/regeneration notes must record old slug, new slug, root-cause category, capability coverage, prompt source, fixture assets, quality-review result, and deployment Firecrawl result."
    - "Playwright remains the repeatable browser verification path; Firecrawl is used only for deployed public rendering verification as required by this spec."
  privacy_security:
    - "Public example chats are open-source-safe and must not contain private user data, secrets, raw share keys, vault keys, private file paths, private emails, or production identifiers."
    - "Public examples must not teach destructive operational commands unless framed safely and directly relevant to the prompt."

tests:
  - id: T-AUDIT-001
    type: unit
    file: scripts/audit_example_chats.py
    command: python3 scripts/audit_example_chats.py
    covers:
      - AC-1
      - AC-2
      - AC-3
      - AC-5
      - AC-6
      - AC-7
      - AC-9
      - AC-10
    assertions:
      - Audit inventories in-scope examples and reports capability-linked failures with chat IDs.
      - Audit fails on vault keys, presigned/private media errors, raw fenced embed JSON, invalid interactive-question placeholders, @focus directives, missing activation artifacts, and incomplete sub-chat transcripts.
      - Audit fails on unbalanced `interactive_question` fences, blank document embed payloads, missing expected mail embeds, and memory examples with neither system artifacts nor equivalent visible context.
      - Audit passes after replacement examples and fixtures satisfy the contract.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        run_id: local-audit-expanded-public-quality
        timestamp: "2026-06-11T15:59:14Z"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: local-audit-example-chat-public-quality-clean / pytest backend/tests/test_example_chat_scaffold.py
        timestamp: "2026-06-11T20:18:55Z"

  - id: T-E2E-001
    type: playwright
    file: frontend/apps/web_app/tests/example-chats-load.spec.ts
    command: python3 scripts/run_tests.py --spec example-chats-load.spec.ts
    target: app.dev.openmates.org
    covers:
      - AC-4
      - AC-5
      - AC-6
      - AC-7
      - AC-9
      - AC-10
    assertions:
      - Example listing and every linked `/example/<slug>` page return crawlable HTML with transcript text and no unresolved i18n keys.
      - Deep research or other focus examples render activation/sub-chat affordances without @focus syntax.
      - Removed superseded slugs are absent from listing and return 404 via targeted assertions.
      - Media, PDF, memory, and app-skill examples selected by this spec do not expose broken embed text in the browser.
      - Clicking a memory example card updates `window.location.hash` and reload restores that example chat.
      - Reported memory examples render valid interactive questions and non-empty mail/document embed previews.
    red_phase:
      required: false
      expected: not_applicable
      evidence:
        status: not_applicable
        run_id: deterministic-audit-red-phase-used
        timestamp: "2026-06-11T15:59:14Z"
    green_phase:
      required: true
      expected: pass_after_deploy
      evidence:
        status: passed
        run_id: "2026-06-11T20:20:03Z / GitHub Actions run 27375098399 / git d1ec9b237"
        timestamp: "2026-06-11T20:25:40Z"

  - id: T-MANUAL-001
    type: manual
    covers:
      - AC-2
      - AC-3
      - AC-8
    assertions:
      - Each replacement has an agent quality-review note covering usefulness, natural triggering, capability coverage, public fixture assets, and unsafe-content review.
      - After deployment, Firecrawl verifies each affected new slug renders specific transcript content and contains no broken/missing embed markers or private asset errors.
      - After deployment, Firecrawl verifies removed old slugs return 404.
      - Focus-mode replacements include a rendered focus activation embed/card in Firecrawl output.
    red_phase:
      required: false
      expected: not_applicable
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        run_id: "firecrawl-2026-06-11T17:37Z audio/memory/image/deep-research/pdf fresh maxAge=0; quality-review agents completed"
        timestamp: "2026-06-11T17:38:00Z"

implementation_plan:
  existing_patterns:
    - scripts/audit_example_chats.py:audit
    - frontend/packages/ui/src/demo_chats/data/example_chats/*.ts
    - frontend/packages/ui/src/demo_chats/exampleChatStore.ts:getAllExampleChats
    - frontend/apps/web_app/tests/example-chats-load.spec.ts
    - docs/specs/focus-mode-example-chat-rendering/spec.yml
  architecture: >
    Treat example chats as public product fixtures with deterministic source
    validation and deployed rendering validation. First harden the local audit to
    expose all currently broken examples, then repair or replace data while
    preserving capability coverage, then deploy and Firecrawl-check public pages.
  data_flow:
    - Audit reads checked-in example chat TypeScript and i18n sources.
    - Audit maps chat metadata to demonstrated capabilities and public asset requirements.
    - Replacement chats and fixture assets are checked in through existing example-chat data files.
    - Web example stores expose the replacement chats in listings, skill/focus/memory detail pages, hash routes, and SSR pages.
    - Playwright verifies repeatable browser/SSR behavior on `app.dev.openmates.org` after deploy.
    - Firecrawl verifies deployed public HTML/markdown output for affected slugs and removed-slug 404 behavior.
  affected_files:
    - path: scripts/audit_example_chats.py
      reason: Expand deterministic public-quality checks and inventory reporting.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/*.ts
      reason: Replace or remove broken example chat data while preserving capability coverage.
    - path: frontend/packages/ui/src/i18n/sources/example_chats/*.yml
      reason: Remove or update localized source text for examples that still use i18n source keys.
    - path: frontend/apps/web_app/tests/example-chats-load.spec.ts
      reason: Add targeted assertions for removed slugs and representative focus/media/memory examples.
    - path: frontend/packages/ui/src/components/settings/*Details.svelte
      reason: Ensure settings-linked example chat navigation updates reloadable hash URLs.
    - path: frontend/packages/ui/src/demo_chats/types.ts
      reason: Preserve system-message roles in static examples.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Convert example system messages into normal chat messages without role loss.
    - path: docs/specs/example-chat-public-quality/spec.yml
      reason: Executable product contract and verification evidence.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/example-chat-public-quality/spec.yml
    - python3 scripts/audit_example_chats.py
    - python3 scripts/run_tests.py --spec example-chats-load.spec.ts
    - Firecrawl scrape affected deployed example URLs after deploy.
  verification_order:
    - Spec validation first.
    - Deterministic audit red phase against current data.
    - Data/tooling implementation and quality review.
    - Deterministic audit green phase locally.
    - Deploy to dev and wait for Vercel Ready.
    - Playwright green phase against `app.dev.openmates.org`.
    - Firecrawl deployed verification.

