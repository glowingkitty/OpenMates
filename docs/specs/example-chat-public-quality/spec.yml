risks:
  - Regenerating many examples may take longer than one session; if so, preserve this spec and implement in prioritized batches without weakening the audit.
  - Firecrawl can miss client-only states, so repeatable Playwright checks remain required for browser behavior.
  - Replacing slugs can remove SEO history, but the user explicitly chose 404 removal over redirects for broken examples.

open_questions:
  - none
