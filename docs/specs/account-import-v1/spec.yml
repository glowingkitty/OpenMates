assumptions:
  - id: A-1
    text: The user's Claude official export sample is available locally outside git for structure inspection and redacted fixture creation.
    category: provider_sample
    required_before: implementation
    status: confirmed
    evidence:
      - source: /tmp/opencode/openmates-import-samples/claude-export-raw.zip
        summary: Raw sample exists outside git and schema-only inspection identified conversations.json list shape, chat/message keys, content block types, sender values, project/users files, and attachment/file metadata types.
    blocker_or_waiver: If no sample is available, implement only OpenMates Export V1 parser first and leave Claude parser blocked.
  - id: A-2
    text: Account Export V1 archive layout for chats, embeds, and referenced uploads is stable enough to target before OpenMates import implementation starts.
    category: dependency
    required_before: task_execution
    status: confirmed
    evidence:
      - source: docs/specs/account-export-v1/spec.yml
        summary: Export V1 is currently implementing archive layout with one markdown and one YAML file per chat plus shared embeds/uploads references.
      - source: docs/specs/account-export-v1/spec.yml#contracts.archive_layout
        summary: Archive layout defines README.md, manifest.yml, export-report.yml, chats/, embeds/, uploads/, and exactly one .md plus one .yml file per chat; stable enough for synthetic parser fixtures and V1 importer tests.
    blocker_or_waiver: If Export V1 layout changes, update this import spec before implementing OpenMates archive import.
  - id: A-3
    text: CLI and web clients can access enough client-side key material to encrypt imported chats/messages/embeds through normal OpenMates persistence paths.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/openmates-cli/src/crypto.ts
        summary: CLI exposes reusable AES-GCM client encryption helpers for imported content and key wrapping, including encryptWithAesGcmCombined and encryptBytesWithAesGcm.
      - source: backend/tests/test_chat_directus_encryption_guards.py
        summary: Existing tests prove Directus chat/message writes accept client-encrypted fields and reject Vault/server ciphertext or plaintext-shaped private fields.
    blocker_or_waiver: If contradicted, import must block with key-unavailable explanation rather than using server-side plaintext persistence.
  - id: A-4
    text: Import cost estimation can reserve or pre-check credits conservatively enough to avoid negative balances while allowing refunds/adjustments for blocked messages.
    category: billing
    required_before: task_execution
    status: corrected
    evidence:
      - source: backend/core/api/app/services/billing_service.py
        summary: Generic BillingService.charge_user_credits allows overdraft down to -500, so Account Import V1 must not reuse it as the only gate for paid scan/import.
      - source: backend/core/api/app/routes/internal_api.py
        summary: Internal billing balance route can read cached credits for preflight checks, but import still needs an import-specific strict no-debt reservation/pre-check before scan and final charge.
    blocker_or_waiver: Implement import-specific strict no-debt pre-check/reservation; if that is not ready, paid import must remain blocked after preview.

contracts:
  normalized_import_model:
    ParsedProviderChat:
      provider: claude|chatgpt|openmates
      source_chat_id: string
      source_fingerprint: string
      title: string|null
      created_at: string|null
      updated_at: string|null
      messages: ParsedProviderMessage[]
      embeds: ParsedProviderEmbed[]
      uploads: ParsedProviderUpload[]
      provider_labels: string[]
      source_metadata: object
    ParsedProviderMessage:
      role: user|assistant|system
      content: string
      created_at: string|null
      source_message_id: string|null
      provider_metadata: object
    ParsedProviderEmbed:
      source_embed_id: string
      type: string
      content: object|string
      referenced_upload_ids: string[]
    ParsedProviderUpload:
      source_upload_id: string
      file_name: string
      mime_type: string|null
      bytes: number|null
      content_ref: string
  api:
    - route: POST /v1/account-imports/preview
      auth: session_or_api_key
      request: "{ source: claude|chatgpt|openmates, chat_count, source_fingerprints: string[], estimated_tokens, estimated_bytes }"
      response: "{ import_id, free_remaining, chat_limit, default_selection_count, max_batch_count, duplicate_fingerprints, estimated_credits, can_import, reason? }"
      notes:
        - Does not accept raw message plaintext.
        - Applies 3 free imported chats per rolling 30 days when credits are unavailable.
        - Applies 30-chat paid batch cap and default newest-20 selection semantics.
    - route: POST /v1/account-imports/{import_id}/scan
      auth: session_or_api_key
      request: "{ chats: ParsedProviderChat[] }"
      response: "{ chats: SanitizedProviderChat[], credits_reserved, messages_blocked, failures }"
      notes:
        - Accepts only selected chats, never whole raw provider exports.
        - Plaintext is transient and must not be persisted in Directus or logs.
        - Fails closed when scanner is unavailable unless an explicit blocked-message policy applies.
    - route: POST /v1/account-imports/{import_id}/complete
      auth: session_or_api_key
      request: "{ imported_chat_ids: string[], source_fingerprints: string[], encrypted_record_counts, client_failures?: object[] }"
      response: "{ status: complete|partial|failed, credits_charged, credits_released, imported_count, failures }"
      notes:
        - Records import usage and finalized billing after client-encrypted persistence succeeds.
        - Does not write chat/message/embed plaintext.
  cli:
    - command: openmates account import claude <export.json|export.zip> [--select newest:20|all|ids:<csv>] [--dry-run] [--yes] [--json]
      notes:
        - Parses local Claude export.
        - Defaults to newest 20 when credits are available, newest 3 when only free allowance is available.
        - Must hit real dev API/WebSocket paths for green CLI evidence.
    - command: openmates account import chatgpt <export.json|export.zip> [--select newest:20|all|ids:<csv>] [--dry-run] [--yes] [--json]
      notes:
        - Parses local ChatGPT official export conversations.json from the active current_node path.
        - Imports text and multimodal text parts only; binary assets are not imported in V1.
    - command: openmates account import openmates <export.zip|directory> [--domain chats] [--select newest:20|all|ids:<csv>] [--dry-run] [--yes] [--json]
      notes:
        - Imports only chats plus referenced embeds/uploads in V1.
        - Refuses unsupported OpenMates archive layouts unless explicitly marked compatible by Export V1 manifest.
  sdk:
    - npm: accountImports.parseClaude(file), parseChatGPT(file), parseOpenMates(pathOrBlob), preview(chats), scan(importId, chats), persistEncrypted(importId, sanitizedChats), importClaude(options), importChatGPT(options), importOpenMates(options)
    - pip: client.account_imports.parse_claude(path), parse_chatgpt(path), parse_openmates(path), preview(chats), scan(import_id, chats), persist_encrypted(import_id, sanitized_chats), import_claude(options), import_chatgpt(options), import_openmates(options)
  web:
    - Settings > Account > Import supports Claude, ChatGPT, and OpenMates uploads through one local parser/upload control.
    - Signup/onboarding import can reuse the same component only after account/session/key prerequisites are met.
    - Provider instruction copy for Claude/ChatGPT references official data exports and explains that OpenMates parses locally and imports selected chats only.
  privacy_security:
    - Raw exports supplied by users for development inspection stay outside git and are not committed.
    - Redacted synthetic fixtures must be derived before tests are committed.
    - Permanent `chats`, `messages`, embeds, and upload-related private metadata are client-encrypted before persistence.
    - Directus plaintext private field guards remain active.
    - Logs redact source file names when they may contain private user text, raw message content, source IDs, share fragments, object keys, and credentials.

