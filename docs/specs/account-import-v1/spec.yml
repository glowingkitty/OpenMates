risks:
  - id: R-1
    severity: high
    risk: Import implementation could reintroduce plaintext Directus writes.
    mitigation: Keep low-level Directus guard, fail-closed tests, code-quality guard, and require encrypted persistence through normal chat/embed paths.
  - id: R-2
    severity: high
    risk: Safety scanning selected provider plaintext can expose sensitive content in logs or durable records.
    mitigation: Scan endpoint must avoid logging raw content, never write chat/message plaintext, and redact failures/reports.
  - id: R-3
    severity: high
    risk: Account Export V1 archive layout may change while import work is planned.
    mitigation: Treat OpenMates parser as blocked by A-2 until Export V1 layout is stable enough or update this spec before implementation.
  - id: R-4
    severity: medium
    risk: Free import allowance can be abused with repeated accounts or source relabeling.
    mitigation: Use authenticated account-scoped rolling 30-day records, rate limits, no debt, and conservative credit reservation.
  - id: R-5
    severity: medium
    risk: Claude export structures may vary across account types or future versions.
    mitigation: Build parser from real samples, keep redacted fixtures, fail visibly on unknown schema, and document supported export versions.
  - id: R-6
    severity: medium
    risk: Imported chats may be persisted but not usable as follow-up context.
    mitigation: CLI dev verification must prove a follow-up answer uses imported history through normal chat context paths.

open_questions:
  - id: OQ-1
    question: "Which persistent store should hold import usage/dedupe/allowance records: Directus, Redis with Directus summary, or a dedicated Postgres table?"
    status: implementation_decision_needed
  - id: OQ-2
    question: Should blocked unsafe imported messages be omitted entirely or replaced with a visible placeholder in V1?
    status: implementation_decision_needed
  - id: OQ-3
    question: Should OpenMates-to-OpenMates imports need the same prompt-injection scan when they come from a trusted Export V1 archive, or can they skip scan based on source manifest integrity?
    status: implementation_decision_needed
