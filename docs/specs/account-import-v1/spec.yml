schema_version: 2
id: account-import-v1
title: Account Import V1
status: approved

goal: >
  Implement a safe, encrypted, unified personal chat import system across CLI,
  npm SDK, pip SDK, web, and later Apple parity. V1 imports Claude and ChatGPT
  official exports plus OpenMates Export V1 archives into new OpenMates chats while
  preserving referenced embeds/uploads, scanning external plaintext before
  storage, and ensuring permanent Directus records contain only client-encrypted
  private chat/message/embed data.

scope:
  in:
    - Personal import only.
    - Claude official export import for chats.
    - ChatGPT official export import for chats from `conversations.json` text and multimodal text parts.
    - OpenMates Export V1 archive import for chats, referenced embeds, and uploaded files required by those embeds.
    - Unified normalized import model shared by CLI, npm SDK, pip SDK, web, and future source adapters.
    - Client-side encryption before permanent persistence for all private imported chat/message/embed content.
    - Transient server-side safety scanning for selected plaintext external-provider messages before import completion.
    - CLI-first import command that proves the backend/API contract against the real dev server.
    - npm SDK and pip SDK parity for parsing, previewing, estimating, scanning, and importing.
    - Web app import UI using the same contract after CLI and SDK gates are green.
    - Dedupe warnings for likely already-imported chats without merge, overwrite, or destructive updates.
    - Import limits, cost estimate, credit pre-check/reservation, rate limits, and audit records.
    - Documentation for Claude export import, ChatGPT export import, and OpenMates archive import.
  out:
    - Browser extension implementation.
    - Recommending third-party browser extensions as trusted import sources.
    - Gemini official export/provider parsers until reliable samples or paths exist.
    - Developer-console scripts as a user-facing import method.
    - Projects, tasks, plans, workflows/runs, memories/app settings, and full account restore; tracked separately in Linear OPE-588.
    - Team import or team-scoped rows.
    - Merging, overwriting, or updating existing chats from imported data.
    - Re-enabling the legacy plaintext `POST /v1/settings/import-chat` persistence path.
    - Apple implementation before CLI, SDK, web, and user-confirmation gates are complete.

sequencing_gates:
  - gate: CLI_FIRST
    required_before: sdk_implementation
    rule: CLI import against the real dev API must pass before npm SDK, pip SDK, web, or Apple implementation begins.
    evidence: [T-CLI-CLAUDE-DEV, T-CLI-OPENMATES-DEV, T-CLI-LIMITS-DEV, T-CLI-SECRET-SCAN]
  - gate: DAILY_WIRING_AFTER_CLI_AND_SDK
    required_before: web_implementation
    rule: After dev CLI proof and local npm/pip SDK parity are green, equivalent deterministic coverage is wired into the daily/GitHub Actions test path.
    evidence: [T-DAILY-IMPORT-WIRING]
  - gate: SDK_SECOND
    required_before: web_implementation
    rule: npm SDK and pip SDK import parity must pass before web import work starts.
    evidence: [T-NPM-SDK-IMPORT, T-PIP-SDK-IMPORT, T-PARITY-AUDIT]
  - gate: WEB_THIRD
    required_before: user_ui_confirmation
    rule: Web import work starts only after CLI and SDK gates are green, then must pass deployed Playwright specs against app.dev.openmates.org.
    evidence: [T-WEB-IMPORT, T-WEB-LIMITS, T-WEB-DEDUPE, T-WEB-SECRET-SCAN]
  - gate: USER_CONFIRMATION_BEFORE_APPLE
    required_before: apple_implementation
    rule: Apple parity starts only after automated web specs pass and the user confirms deployed dev web import behavior and visual quality.
    evidence: [V-USER-CONFIRMATION]

context_discovery:
  github_issues:
    - GitHub MCP get_me returned 401 Bad credentials during discovery, so GitHub issue lookup through MCP was unavailable.
  linear:
    - "python3 scripts/linear.py --json search 'import projects tasks plans workflows memories' returned no duplicates."
    - "Created OPE-588 due 2026-07-29 for expanding import beyond chats/embeds/uploads to projects, tasks, plans, workflows, and memories."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/account-export-v1/spec.yml
    - docs/architecture/core/account-backup.md
    - docs/user-guide/import-account.md
    - docs/architecture/platforms/cli-feature-parity.md
  code_patterns:
    - backend/core/api/app/routes/settings.py legacy import endpoint is currently fail-closed with HTTP 503 after plaintext persistence risk was identified.
    - backend/core/api/app/services/directus/api_methods.py now rejects low-level `create_item` writes to `chats` or `messages` when plaintext private fields are present.
    - frontend/packages/ui/src/services/chatImportService.ts parses legacy OpenMates ZIP/YAML imports and calls the disabled settings import endpoint.
    - frontend/packages/ui/src/components/settings/account/SettingsImportAccount.svelte is the existing web import UI for legacy OpenMates ZIP/YAML files.
    - frontend/packages/openmates-cli/src/cli.ts currently exposes `settings account import-chat`, but it targets the disabled legacy endpoint and must be replaced by a V1 command.
    - docs/specs/account-export-v1/spec.yml is implementing a new resumable Export V1 archive contract; OpenMates import should target that layout, not old browser-only ZIP behavior.
  external_research:
    - Open-source browser exporters exist for ChatGPT, Claude, and Gemini, but caveats include provider UI/private endpoint drift, attachment/artifact gaps, current-chat-only scope, bulk memory pressure, and unverifiable store builds.
    - Third-party export extensions should not be recommended by OpenMates in V1; future support may accept user-provided files that match documented schemas.
  raw_sample_findings:
    - "Claude raw export ZIP inspected locally at /tmp/opencode/openmates-import-samples/claude-export-raw.zip without printing message text or titles."
    - "Usable ZIP entries: conversations.json (~42 MB), one projects/<uuid>.json, and users.json; macOS __MACOSX/._ entries must be ignored."
    - "conversations.json is a list of 1888 conversation objects with keys: account, chat_messages, created_at, name, summary, updated_at, uuid."
    - "Each chat_message object has keys: attachments, content, created_at, files, parent_message_uuid, sender, text, updated_at, uuid."
    - "Observed sender values: human and assistant. Observed content block types: text, tool_use, tool_result, token_budget."
    - "Observed message attachments include txt, pdf, application/x-yaml, and blank file_type values; observed files include png, pdf, txt, svelte, yaml, heic, and file entries without extensions."
    - "ChatGPT raw export ZIP inspected locally at /tmp/opencode/openmates-import-samples/chatgpt-export-raw.zip without printing message text, titles, or user-identifying fields."
    - "ChatGPT export has a top-level export directory with conversations.json plus user/settings/shared/library/asset metadata files; __MACOSX entries must be ignored."
    - "ChatGPT conversations.json is a list of 53 conversation objects with mapping/current_node active-path structure and message author/content metadata."
    - "Observed ChatGPT content types include text, multimodal_text, reasoning_recap, and thoughts; V1 imports visible text/multimodal text parts and does not import binary asset contents."

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Settings
    - apple/OpenMates/Sources/Chat
    - apple/OpenMates/Sources/Embeds
  parity_expectations:
    - Apple import parity must not begin until CLI, SDK, web, and user-confirmation gates are complete.
    - Apple should use the same personal import contract or clearly defer import with a native-safe explanation.
    - Apple must preserve the same client-encrypted permanent storage and no-merge/no-overwrite behavior.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios after web/user confirmation or a documented Apple deferral.
  intentional_native_differences:
    - Apple may defer file-picker/provider parsing in V1 if web/CLI are complete and native UI links users to web/CLI import without weakening data portability.

clarification:
  rounds:
    - question: Should the first MVP include a browser extension prototype?
      answer: No. Implement CLI, SDK, web app support first, and once those are confirmed working, implement Apple app parity. No browser extension yet.
    - question: Should V1 support Claude official export and OpenMates Export V1 archives only, or include generic third-party exporter JSON?
      answer: Support Claude official export plus the OpenMates export structure, which external tools can target later.
    - question: Which OpenMates Export V1 domains should import V1 restore?
      answer: Focus on chats, embeds, and uploaded files in those embeds for V1. Create a Linear follow-up for projects, tasks, plans, workflows, and memories.
    - question: Should V1 merge/overwrite existing chats when importing OpenMates archives?
      answer: No. Show dedupe warnings, but never merge or overwrite.
    - question: Should the free import allowance apply only to external providers?
      answer: No. Because the system cannot reliably distinguish external and OpenMates chats for billing/abuse purposes, allow 3 imported chats per rolling 30 days for free regardless of source.
  vision_summary: >
    Import V1 should provide a unified, privacy-safe import path for Claude and
    ChatGPT official exports plus OpenMates Export V1 archives, restoring only chats plus
    referenced embeds/uploads and always creating new encrypted OpenMates chats.
    Import limits are source-agnostic: 3 free imported chats per rolling 30 days,
    and up to 30 chats per batch when the account has sufficient credits.
  approved_by_user: true

