scenarios:
  - id: S-1
    title: CLI imports selected Claude official export chats into new encrypted OpenMates chats
    given:
      - Alice has a Claude official export JSON containing 80 conversations.
      - Alice is logged in through the OpenMates CLI against api.dev.openmates.org.
      - Alice has enough credits to import more than the free allowance.
    when:
      - Alice runs `openmates account import claude ./claude-export.json --select newest:20`.
    then:
      - The CLI parses the export locally, previews selected chats, estimates scan cost, and requires confirmation.
      - The backend scans selected plaintext transiently and returns sanitized or blocked messages without writing plaintext.
      - The CLI encrypts sanitized chat titles, messages, embeds, and referenced upload metadata locally before persistence.
      - OpenMates creates new chats and messages that appear in normal sync as encrypted records.

  - id: S-2
    title: CLI imports OpenMates Export V1 chat archive without full account restore
    given:
      - Alice has an OpenMates Export V1 archive created by the account-export-v1 contract.
      - The archive contains chats, referenced embeds, uploads, projects, tasks, workflows, and memories.
    when:
      - Alice runs `openmates account import openmates ./openmates-export.zip --domain chats`.
    then:
      - V1 imports only chats plus referenced embeds/uploads.
      - Projects, tasks, workflows, plans, and memories are skipped with an explicit explanation and a link/reference to OPE-588.
      - Existing chats are not merged, overwritten, or modified.

  - id: S-10
    title: CLI, SDK, and web parse ChatGPT official export chats
    given:
      - Alice has a ChatGPT official export ZIP or JSON containing conversations.json.
      - The export may place conversations.json inside a top-level export directory and may include binary asset files.
    when:
      - Alice imports the export through CLI, SDK, or Settings > Account > Import.
    then:
      - OpenMates parses conversations from the active current_node path and ignores unselected branches.
      - V1 imports visible text and multimodal text message parts into new encrypted OpenMates chats.
      - Binary asset contents and ChatGPT asset file names are not imported in V1.
      - Permanent persistence still uses only client-encrypted chat/message fields.

  - id: S-3
    title: Free allowance applies regardless of source
    given:
      - Alice has zero credits and has not imported any chats in the last 30 days.
      - Alice uploads a Claude export, ChatGPT export, or OpenMates archive with 40 chats.
    when:
      - Alice previews import options.
    then:
      - The default selected chats are the newest 3 because the free allowance is 3 imported chats per rolling 30 days.
      - Alice cannot select a fourth chat without buying credits.
      - The UI/CLI explains that buying credits allows up to 30 chats per import batch.
      - Alice is never allowed to import into negative credits/debt.

  - id: S-4
    title: Paid import supports up to 30 chats per batch and defaults to newest 20
    given:
      - Alice has credits and an export containing 120 chats.
    when:
      - Alice previews the import.
    then:
      - The newest 20 chats are selected by default.
      - Alice can select up to 30 chats in the current batch.
      - Alice sees an estimated processing cost before scan/import starts.
      - Import refuses to start if available credits are insufficient for the reserved estimated cost.

  - id: S-5
    title: Dedupe warns but never merges or overwrites
    given:
      - Alice previously imported a Claude conversation.
      - Alice selects the same conversation from a later export.
    when:
      - Alice previews and confirms the import.
    then:
      - The CLI/web UI warns that one or more selected chats appear already imported.
      - If Alice continues, new chats are created.
      - No existing chat title, message, embed, upload, timestamp, or metadata is changed.

  - id: S-6
    title: Unsafe or malformed imports fail closed
    given:
      - Alice imports a malformed Claude JSON file, an unsupported OpenMates archive, or a chat containing prompt-injection/smuggling content.
    when:
      - Import parse, validation, scan, encryption, or persistence reaches the invalid content.
    then:
      - Malformed files fail before scanning or charging.
      - Safety scan failures block or replace affected messages according to the import safety policy.
      - Directus never receives plaintext private chat/message/embed fields.
      - Partial imported results are reported item-by-item without pretending complete success.

  - id: S-7
    title: SDKs expose the same import contract
    given:
      - A developer uses the npm SDK or pip SDK with an authenticated account.
    when:
      - They parse, preview, estimate, scan, and import Claude, ChatGPT, or OpenMates V1 chat data.
    then:
      - SDK methods use the same limits, cost semantics, normalized schema, encryption requirements, and no-merge behavior as CLI and web.
      - SDKs do not offer raw plaintext persistence shortcuts.

  - id: S-8
    title: Web import uses the same pipeline after CLI and SDK are green
    given:
      - CLI and SDK gates are complete.
      - Alice opens Settings > Account > Import or signup import onboarding in the web app.
    when:
      - Alice uploads a Claude official export, ChatGPT official export, or OpenMates V1 archive.
    then:
      - The browser parses locally where feasible, shows provider instructions, previews selected chats, shows dedupe warnings and cost estimate, and imports via the shared scan/encrypt/persist flow.
      - The UI clearly explains free allowance, paid batch limit, and skipped non-chat OpenMates domains.

  - id: S-9
    title: Apple parity starts only after CLI, SDK, web, and user confirmation gates
    given:
      - CLI import and npm/pip SDK import have passed against the real dev API.
      - Deployed web import Playwright specs have passed against app.dev.openmates.org.
      - The user confirmed the deployed web import UI looks correct and behaves as expected.
    when:
      - Apple import parity begins.
    then:
      - Apple uses the same import contract or explicitly defers to CLI/web with a native-safe explanation.
      - Apple verification records native build/test evidence or a documented native deferral.

