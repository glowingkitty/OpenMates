decisions:
  - id: D-1
    status: active
    decision: V1 supports Claude official export, ChatGPT official export, and OpenMates Export V1 archive sources.
    reason: Claude and ChatGPT official exports now have reliable local samples for synthetic parser contracts; OpenMates Export V1 is the canonical OpenMates portability format. Gemini remains delayed because Takeout returned empty content despite test chats.
    decided_at: "2026-07-18"
  - id: D-2
    status: active
    decision: V1 imports chats plus referenced embeds/uploads only.
    reason: These domains map cleanly to external AI account migration; other domains need separate conflict, ownership, and restore rules.
    decided_at: "2026-07-18"
  - id: D-3
    status: active
    decision: V1 always creates new chats and never merges or overwrites existing chats.
    reason: Merge/overwrite is destructive and needs a later conflict-resolution contract.
    decided_at: "2026-07-18"
  - id: D-4
    status: active
    decision: V1 does not recommend third-party export extensions.
    reason: Store builds and provider scraping behavior are hard for users to verify; recommending one creates implicit trust and support liability.
    decided_at: "2026-07-18"
  - id: D-5
    status: active
    decision: Free import allowance is 3 imported chats per rolling 30 days regardless of source.
    reason: The system should not depend on perfectly classifying external versus OpenMates source for abuse control.
    decided_at: "2026-07-18"
  - id: D-6
    status: active
    decision: Do not allow negative credits/debt for imports.
    reason: Import scan processing is abuse-prone and should require either free allowance or enough credits before work starts.
    decided_at: "2026-07-18"
  - id: D-7
    status: active
    decision: Store import usage, source fingerprints, allowance windows, and finalized billing/audit state in Directus records, not Redis-only state.
    reason: Dedupe warnings, rolling 30-day allowances, auditability, and later support/debugging need durable user-scoped records; Redis may still be used only for transient rate limits or in-flight locks.
    decided_at: "2026-07-18"
  - id: D-8
    status: active
    decision: Unsafe imported messages are omitted from encrypted chat persistence and reported in the import result instead of inserted as placeholder chat messages in V1.
    reason: Omitting blocked content is the smallest safe behavior and avoids writing provider-controlled text or confusing synthetic assistant/user messages into imported history.
    decided_at: "2026-07-18"

