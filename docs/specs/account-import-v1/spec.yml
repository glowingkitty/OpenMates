implementation_plan:
  status: ready
  spec_path: docs/specs/account-import-v1/spec.yml
  first_slice: >
    Confirm the remaining blocking assumptions and write the backend-only red test
    suite for parser, limit, dedupe, scan, and fail-closed behavior. Use redacted
    fixtures derived from the confirmed Claude export shape and from the stable
    Account Export V1 chat/archive layout; do not touch product source code until
    those tests fail for the expected reasons.
  existing_patterns:
    - backend/core/api/app/routes/settings.py legacy import endpoint currently fail-closed.
    - backend/core/api/app/services/directus/api_methods.py Directus plaintext private field guard.
    - frontend/packages/ui/src/services/chatImportService.ts legacy parser and import service.
    - frontend/packages/openmates-cli/src/cli.ts CLI command dispatch.
    - docs/specs/account-export-v1/spec.yml OpenMates Export V1 archive contract dependency.
  architecture: >
    Build a normalized import pipeline that parses source files locally in CLI/web/SDK where feasible, asks backend preview/scan endpoints for limits, cost, dedupe, and transient safety scanning, then has clients encrypt sanitized chats/messages/embeds/uploads and persist through the normal OpenMates encrypted chat/embed paths. The backend records import usage and billing but never stores plaintext chat content.
  boundaries:
    - Source parsing can run in CLI, SDKs, web, and backend tests, but committed fixtures must be redacted/synthetic and must not include raw Claude export content.
    - Preview accepts counts, fingerprints, token/byte estimates, and source metadata only; it never accepts raw message plaintext.
    - Scan accepts only user-selected normalized chats for the active import request, processes plaintext transiently, and must not write chat/message/embed plaintext or raw provider content to Directus, object storage, or logs.
    - Client encryption and normal encrypted persistence paths are required for all imported private chat, message, embed, and referenced upload metadata.
    - The legacy `POST /v1/settings/import-chat` path remains fail-closed until V1 replaces it with encrypted persistence.
    - V1 skips projects, tasks, plans, workflows/runs, memories, settings, and team rows; expansion is tracked separately in OPE-588.
  data_flow:
    - User selects Claude official export or OpenMates Export V1 archive in CLI, SDK, or web.
    - Client parser creates normalized ParsedProviderChat records and computes source fingerprints.
    - Client calls preview endpoint with counts/fingerprints/token estimate.
    - User confirms selected chats after seeing free allowance, paid limit, dedupe warnings, skipped domains, and estimated credits.
    - Client sends selected plaintext chats to scan endpoint; backend scans transiently and reserves/charges only under approved billing contract.
    - Client encrypts sanitized chats/messages/embeds/uploads locally and persists via normal encrypted OpenMates paths.
    - Client calls complete endpoint with encrypted persistence result for usage/billing finalization.
  concrete_example:
    - A Claude ZIP contains `conversations.json` with 1888 conversations; parser ignores `__MACOSX`, `.DS_Store`, and `._*` entries.
    - Parser maps Claude `human` messages to OpenMates `user`, Claude `assistant` messages to OpenMates `assistant`, flattens text/tool-result summaries into normalized message content, and preserves safe provider metadata without raw IDs in logs.
    - A paid account preview defaults to the newest 20 chats, caps selection at 30, returns duplicate source fingerprint warnings, and shows an estimated credit cost before scan.
    - A selected 20-chat scan returns sanitized chats plus blocked-message metadata, creates no Directus `chats` or `messages` rows, and reserves credits only under the approved billing contract.
    - CLI encrypts the sanitized chat titles/messages/embed payloads into new OpenMates chat IDs, persists through the normal sync path, and calls complete with imported encrypted record counts and source fingerprints.
  impacts:
    api:
      - Add `/v1/account-imports/preview`, `/v1/account-imports/{import_id}/scan`, and `/v1/account-imports/{import_id}/complete` routes.
      - Keep `/v1/settings/import-chat` disabled until removed or replaced by the V1 encrypted path.
    data:
      - Add durable user-scoped import usage records for rolling allowance, source fingerprints, finalized status, and billing/audit metadata.
      - Store no permanent plaintext chat titles, message bodies, embed private payloads, raw source IDs, or user file names from provider exports.
    ui:
      - Web uses provider cards, local file parsing, preview/selection, dedupe warnings, cost estimate, skipped-domain copy, and itemized partial results.
      - CLI and SDK output must expose the same warnings/limits/result states before web work starts.
    privacy_security:
      - Raw development samples stay outside git; committed fixtures are redacted or synthetic.
      - Logs and evidence must redact raw messages, source file names that may contain user text, source IDs, credentials, object keys, and share fragments.
      - Directus plaintext guards and archive/log verification scripts remain part of every green phase.
  assumption_checks:
    - A-2: Check `docs/specs/account-export-v1/spec.yml` and the export implementation fixtures before TASK-2 writes OpenMates parser fixtures; if layout changed, update this spec first.
    - A-3: Inspect CLI/web encryption and chat persistence helpers before TASK-4; if client key material is unavailable, block import with a key-unavailable error instead of adding server-side plaintext persistence.
    - A-4: Inspect billing/credit service reservation or pre-check semantics before TASK-3 paid completion logic; if reservation is unavailable, paid import remains preview-only/blocked.
  affected_files:
    - path: docs/specs/account-import-v1/spec.yml
      reason: Product contract and implementation ledger.
    - path: backend/core/api/app/routes/account_imports.py
      reason: New preview, scan, and complete endpoints.
    - path: backend/core/api/app/services/account_import_service.py
      reason: Limit, dedupe, billing reservation, scan orchestration, and import usage records.
    - path: backend/core/directus/schemas/account_imports.yml
      reason: Durable import usage/dedupe/allowance records if Directus is chosen.
    - path: backend/tests/test_account_import_*.py
      reason: Backend parser, limit, dedupe, scan, and fail-closed coverage.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: CLI import commands.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: API client for import endpoints.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK import facade.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK import facade.
    - path: frontend/packages/ui/src/services/chatImportService.ts
      reason: Shared web parser/import flow replacement.
    - path: frontend/packages/ui/src/components/settings/account/SettingsImportAccount.svelte
      reason: Web unified import UI.
    - path: frontend/apps/web_app/tests/import-account-v1.spec.ts
      reason: Web E2E coverage.
    - path: docs/user-guide/import-account.md
      reason: User-facing import instructions and limitations.
    - path: docs/architecture/core/account-backup.md
      reason: Architecture claims update.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/account-import-v1/spec.yml
    - Red backend parser/limit/dedupe/scan/fail-closed tests before implementation.
    - Real CLI Claude and OpenMates imports against dev before SDK/web work.
    - npm SDK and pip SDK parity tests after CLI contract is green.
    - Wire deterministic import coverage into daily tests after dev CLI success and local npm/pip SDK parity.
    - Deploy to dev before Playwright green tests.
    - User confirmation on deployed import UI and imported-chat usability before Apple parity.
    - python3 scripts/spec_verify.py docs/specs/account-import-v1/spec.yml before marking verified.
  verification_order:
    - Backend parser/limit/dedupe/scan/fail-closed red tests
    - Backend implementation green tests
    - Real CLI command against dev server
    - npm SDK and pip SDK parity
    - GitHub Actions/daily-test wiring after dev CLI success and SDK parity
    - Web implementation and deployed Playwright green tests
    - User confirmation of dev web import UX/imported-chat usability
    - Apple implementation/parity, then native impact check/build or documented deferral
  ac_coverage_mapping:
    - AC-1: T-PARSER-CLAUDE, T-SCAN-ENDPOINT, T-CLI-CLAUDE-DEV, T-ENCRYPTION-GUARDS.
    - AC-2: T-PARSER-OPENMATES, T-CLI-OPENMATES-DEV, T-WEB-IMPORT.
    - AC-3: T-BACKEND-LIMITS, T-CLI-LIMITS-DEV, T-WEB-LIMITS.
    - AC-4: T-BACKEND-LIMITS, T-CLI-LIMITS-DEV, T-WEB-LIMITS.
    - AC-5: T-BACKEND-DEDUPE, T-CLI-CLAUDE-DEV, T-WEB-DEDUPE.
    - AC-6: T-BACKEND-FAIL-CLOSED, T-SCAN-ENDPOINT, T-ENCRYPTION-GUARDS, T-CLI-SECRET-SCAN, T-WEB-SECRET-SCAN.
    - AC-7: T-NPM-SDK-IMPORT, T-PIP-SDK-IMPORT, T-PARITY-AUDIT.
    - AC-8: T-WEB-IMPORT, T-WEB-LIMITS, T-WEB-DEDUPE, V-USER-CONFIRMATION.
    - AC-9: T-CLI-CLAUDE-DEV, T-CLI-OPENMATES-DEV, T-NPM-SDK-IMPORT, T-PIP-SDK-IMPORT, T-WEB-IMPORT, V-USER-CONFIRMATION, V-APPLE-IMPACT.
  rollout:
    - Keep legacy import endpoint fail-closed while backend/CLI/SDK/web V1 work rolls out.
    - Ship CLI and SDK import capability against dev first; do not expose web UI until those gates pass.
    - Web UI remains behind the implementation sequence until deployed Playwright green evidence is recorded.
  observability:
    - Log import_id, user_id hash or internal ID, source type, counts, status, failure codes, duplicate counts, credits reserved/charged/released, and duration.
    - Do not log raw messages, chat titles, file names from imports, source IDs, source fingerprints in full, credentials, object keys, or share fragments.
  plan_approval:
    required: false
    reason: The plan introduces no product-scope expansion and uses the approved encrypted client-persistence, transient scan, no-merge, limits, and phase-order contract.

