contracts:
  cli:
    - command: openmates connect-account proton
      default_mode: read_only
      behavior: >
        Detect Proton Mail Bridge or print OS-specific install instructions when
        missing. When Bridge is present, start or attach to Bridge, acquire
        Bridge-generated IMAP settings after Bridge login, validate localhost
        IMAP, register an online local connector, and keep running until the user
        exits. The command prints no secrets and keeps credential material in
        process memory only.
      forbidden:
        - Proton account password prompt owned by OpenMates.
        - Bridge password flags such as --password, --bridge-password, or --smtp-password.
        - Printing or logging Bridge password, Proton password, SMTP password, or raw credential bundles.
    - command: openmates connect-account proton --write
      behavior: >
        Same as read-only mode, but first shows a warning and requires explicit
        confirmation before registering write capability. Send operations use
        delayed send and require user approval.
  api:
    - route: POST /v1/connected-accounts/local-connectors
      request: "Encrypted connected-account metadata, provider_id=protonmail_bridge, capabilities, connector instance id, public status fields, and no credentials."
      response: "connected_account_id, connector_session_id, heartbeat interval, online status."
      errors:
        - 400 when payload contains plaintext credential fields.
        - 400 when provider is unsupported or capability set is invalid.
        - 401 when unauthenticated.
      security:
        - Request must fail if it includes Bridge password, Proton password, SMTP password, IMAP password, access token, refresh token, or non-localhost host credentials.
    - route: POST /v1/connected-accounts/local-connectors/{connector_session_id}/heartbeat
      request: "connector session id, connected account id, status, capabilities, and health summary without secrets."
      response: "accepted status and next heartbeat deadline."
      errors:
        - 403 when connector does not belong to current user or account was revoked.
        - 409 when account was revoked or session expired.
    - route: POST /v1/connected-accounts/local-connectors/{connector_session_id}/complete-request
      request: "Result for a connector-routed mail read or delayed-send operation."
      response: "Accepted result or receipt persistence status."
      security:
        - Result payloads must be bounded and sanitized before LLM-visible inference.
  websocket:
    - event: local_connector_request
      direction: server_to_cli
      payload: "connector_session_id, connected_account_id, request_id, action, scoped arguments, approval/delay metadata, and no provider credentials."
    - event: local_connector_result
      direction: cli_to_server
      payload: "request_id, status, bounded result payload, delayed-send receipt state, and no Bridge credentials."
    - event: connected_accounts_sync_ready
      additions: "Local connector account rows include execution_mode=local_connector and online/offline status metadata."
  data:
    - collection: connected_accounts
      additions:
        - execution_mode: local_connector
        - connector_provider_id: protonmail_bridge
        - connector_status: online | offline | setup_required | revoked
        - encrypted_account_directory_hint may include user-facing labels but no secrets.
        - encrypted_refresh_token_bundle is absent or replaced by a local-connector-specific encrypted metadata field for this provider.
      forbidden_plaintext_fields:
        - proton_password
        - bridge_password
        - imap_password
        - smtp_password
        - access_token
        - refresh_token
  privacy_security:
    - Proton account password is only entered into Proton Bridge-owned login UI/CLI.
    - Bridge IMAP/SMTP password exists in OpenMates only in CLI connector memory by default.
    - Local connector registration and heartbeat payloads never contain credentials.
    - Local connector requests never expose Bridge credentials to the backend, LLM, logs, traces, or user-visible output.
    - Mail content is external untrusted content and must pass prompt-injection sanitization before model inference.
    - Non-localhost Bridge hostnames are rejected by default.

