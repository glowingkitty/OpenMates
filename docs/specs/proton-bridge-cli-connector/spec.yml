scenarios:
  - id: S-1
    title: User starts a read-only Proton connector on macOS
    given:
      - Alice is logged into OpenMates CLI on macOS.
      - Proton Mail Bridge is already installed.
    when:
      - Alice runs `openmates connect-account proton`.
    then:
      - The CLI detects Proton Mail Bridge.
      - The CLI starts or attaches to local Bridge.
      - The CLI displays that the connector is read-only by default and is active only while the command runs.
      - The CLI recommends screen, tmux, or zellij for long-lived use.
      - OpenMates registers Alice's Proton Mail connected account as online while the connector heartbeat is active.

  - id: S-2
    title: User starts a read-only Proton connector on Linux
    given:
      - Alice is logged into OpenMates CLI on a supported Linux system.
      - Proton Mail Bridge is installed or missing.
      - A supported keychain or secret-service provider is available.
    when:
      - Alice runs `openmates connect-account proton`.
    then:
      - The CLI detects `protonmail-bridge` or shows official DEB/RPM/PKGBUILD install instructions with verification guidance.
      - The CLI refuses to continue when Bridge cannot access a supported keychain.
      - The CLI starts or attaches to local Bridge.
      - The connector becomes online only after local IMAP validation succeeds.

  - id: S-3
    title: Proton login stays inside Proton Bridge
    given:
      - Proton Bridge has no connected Proton account yet or the account is signed out.
    when:
      - Alice starts the OpenMates Proton connector.
    then:
      - OpenMates never prompts for the Proton account password.
      - Proton Bridge may prompt for Proton login through its own CLI or GUI flow.
      - OpenMates captures only post-login Bridge IMAP/SMTP settings needed for local mail client access.
      - Proton account password input never passes through OpenMates prompt code, logs, traces, or process arguments.

  - id: S-4
    title: Bridge IMAP credentials stay local and ephemeral
    given:
      - Bridge is logged in and exposes a local IMAP server.
    when:
      - The OpenMates connector needs to validate and use the mailbox.
    then:
      - The connector privately reads Bridge `info` output when reliable or asks Alice for Bridge-generated IMAP credentials through hidden prompts.
      - The Bridge IMAP password is kept only in process memory by default.
      - No Bridge credential is sent to OpenMates cloud, written to OpenMates config, printed, logged, or accepted as a CLI flag.
      - The connector re-reads or re-prompts on the next start.

  - id: S-5
    title: Read-only mail search runs through the active local connector
    given:
      - Alice has a read-only Proton local connector online.
      - Alice asks OpenMates to search recent Proton Mail messages.
    when:
      - The Mail search skill is selected.
    then:
      - The backend routes the request to Alice's active CLI connector rather than trying to connect to IMAP directly.
      - The connector reads local IMAP on localhost and returns bounded mail result payloads.
      - Mail content is sanitized before model inference.
      - The LLM never receives Bridge credentials or raw account identifiers.

  - id: S-6
    title: Connector goes offline when the command stops
    given:
      - Alice has an online Proton local connector.
    when:
      - Alice presses Ctrl+C, the process exits, or heartbeats expire.
    then:
      - OpenMates marks the connected account offline.
      - New Mail read or write requests fail with a clear connector-offline message.
      - If OpenMates started the Bridge process, it terminates that process cleanly.
      - If Bridge was already running before OpenMates attached, OpenMates leaves that external Bridge process alone.

  - id: S-7
    title: User opts into Proton write mode
    given:
      - Alice wants OpenMates to send Proton Mail through local Bridge.
    when:
      - Alice runs `openmates connect-account proton --write`.
    then:
      - The CLI displays a write-mode warning before enabling send capability.
      - The warning explains that OpenMates can submit outbound mail through Bridge only while the connector runs.
      - Alice must confirm before write capability is registered.
      - The connected account records Read and Write capabilities, with send actions requiring explicit approval.

  - id: S-8
    title: Proton write mode uses delayed send and undo
    given:
      - Alice has Proton write mode online.
      - Alice approves sending a drafted email.
    when:
      - OpenMates would send the email through SMTP.
    then:
      - OpenMates queues the message for a fixed 30-second delay instead of immediate delivery.
      - Web and CLI surfaces show a visible countdown and an undo/cancel action while queued.
      - Undo before delivery cancels the queued SMTP send.
      - After delivery, Undo is disabled with a plain-language reason that OpenMates cannot recall sent email.
      - Delivery creates an encrypted receipt without exposing SMTP credentials.

  - id: S-9
    title: Settings show local connector status without secrets
    given:
      - Alice has connected Proton Mail through the CLI connector.
    when:
      - Alice opens connected-account settings in the web app.
    then:
      - Settings show the Proton Mail account with Online via CLI, Offline, Setup required, or Revoked state.
      - Settings never show Bridge password, SMTP password, raw local port tokens, or Proton account password.
      - Alice can revoke/remove the connected account metadata.
      - Revocation prevents later connector heartbeats from reusing the old connected-account id.

  - id: S-10
    title: Unsafe Bridge host or credential handling fails closed
    given:
      - A Bridge info response or user input points to a non-localhost IMAP host.
    when:
      - The connector attempts to register or validate the account.
    then:
      - The connector rejects the account by default.
      - The backend refuses local-connector registration payloads that include plaintext credentials.
      - CLI output and error reporting redact any discovered credential-like fields.

