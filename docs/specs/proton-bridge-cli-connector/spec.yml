decisions:
  - id: D-1
    status: active
    decision: Model Proton Bridge as a local_connector connected account, not as server-side OAuth or persistent cloud credentials.
    reason: OpenMates cloud cannot safely or generally reach a user's localhost Bridge, and Proton's security model assumes IMAP/SMTP stays local.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-2
    status: active
    decision: Default Proton connector capability is read-only.
    reason: Mailbox read/search is the lowest-risk useful slice and matches current Mail app behavior.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-3
    status: active
    decision: "`--write` enables write/send only after an explicit warning and confirmation."
    reason: Sending email has irreversible external side effects and requires stronger user awareness.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-4
    status: active
    decision: Proton Mail send uses a fixed 30-second delayed-send queue in v1.
    reason: Delayed send is the only reliable undo window before SMTP delivery; after delivery OpenMates cannot recall mail.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-5
    status: active
    decision: Bridge IMAP/SMTP credentials are kept in memory only by default and re-read or re-prompted on every connector start.
    reason: Proton Bridge already stores its own secrets in OS keychain; duplicating them in OpenMates storage adds risk without being necessary for an online-only connector.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-6
    status: active
    decision: The connector stops only Bridge processes it started, but always marks the OpenMates local connector offline when the command exits.
    reason: Killing an already-running user-managed Bridge instance would be surprising, while OpenMates account availability must still match the connector process.
    decided_at: "2026-07-15T00:00:00Z"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Treat Proton Bridge like a normal OAuth refresh-token connected account stored in `encrypted_refresh_token_bundle`.
    outcome: rejected
    recorded_at: "2026-07-15T00:00:00Z"
    reason: Proton Bridge exposes local IMAP/SMTP credentials and depends on a running localhost app; storing them as cloud-synced token material violates the intended online-only connector model.
  - id: ATTEMPT-2
    task_id: TASK-1
    approach: Require the user to manually install and run Bridge, then use existing self-hosted Proton provider env vars.
    outcome: rejected
    recorded_at: "2026-07-15T00:00:00Z"
    reason: The requested product is a comfortable CLI-managed macOS/Linux setup flow for normal users, not admin-only self-hosting configuration.
  - id: ATTEMPT-3
    task_id: TASK-1
    approach: Build a local connector command that supervises Bridge, keeps credentials local, and registers online status with OpenMates.
    outcome: planned
    recorded_at: "2026-07-15T00:00:00Z"
  - id: ATTEMPT-4
    task_id: TASK-3
    approach: Return a `local_connector_request` payload from Mail search without adding a backend-to-CLI request dispatcher.
    outcome: blocked
    recorded_at: "2026-07-15T07:10:00Z"
    reason: Code review confirmed no existing WebSocket or polling consumer dispatches the request to the CLI, so Mail search/send are not end-to-end functional yet.
  - id: ATTEMPT-5
    task_id: TASK-3
    approach: Add Redis-backed backend pending/result correlation, broadcast `local_connector_request` over the existing authenticated user WebSocket manager, and complete requests through the existing REST complete-request endpoint.
    outcome: succeeded
    recorded_at: "2026-07-15T07:55:17Z"
    reason: Focused backend and CLI tests now prove Mail search requests dispatch to the CLI connector, ignore stale result-cache entries, and complete through shared-cache request correlation without Bridge credentials.

