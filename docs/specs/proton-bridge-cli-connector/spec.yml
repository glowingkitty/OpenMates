schema_version: 2
id: proton-bridge-cli-connector
title: Proton Bridge CLI Connector
status: implementing

goal: >
  Let a user run `openmates connect-account proton` on macOS or Linux to detect
  Proton Mail Bridge, show OS-specific install instructions when Bridge is
  missing, start and supervise Bridge for the lifetime of the command, register
  an online-only Proton Mail connected account in
  OpenMates, support read-only mail search by default, and support explicit
  write mode with delayed-send undo while keeping Proton and Bridge credentials
  local to the user's machine.

scope:
  in:
    - "`openmates connect-account proton` as a macOS and Linux CLI command."
    - Detection of an existing Proton Mail Bridge install and OS-specific install instructions when missing.
    - Official macOS support through the Proton app bundle path and Homebrew cask when Homebrew is available.
    - Official Linux support through existing `protonmail-bridge` binaries and guided DEB/RPM/PKGBUILD install instructions with Proton package-verification guidance.
    - Starting and supervising Proton Mail Bridge while the connector command is running.
    - Clear startup copy explaining that Bridge-backed OpenMates mail access is active only while the connector command is running, and recommending screen, tmux, or zellij for long-lived sessions.
    - Default read-only mode for Mail search using local Bridge IMAP.
    - Explicit `--write` mode that enables Mail write/send capability only after a warning and user confirmation.
    - Fixed 30-second delayed send for Proton Mail write mode, with undo/cancel before delivery and disabled undo after delivery.
    - Local-connector connected-account execution mode where OpenMates cloud stores encrypted metadata and online status, but never stores Bridge IMAP/SMTP credentials.
    - Credential acquisition from Proton Bridge after Bridge login through a private `info` capture when reliable, with hidden-prompt fallback for Bridge-generated IMAP/SMTP credentials.
    - Connector heartbeat and offline transition when the CLI process stops, crashes, or loses connection.
    - Web connected-account settings display for online/offline/revoked local connector state.
  out:
    - Windows support.
    - Auto-installing Proton Mail Bridge or running package-manager commands on the user's behalf in v1.
    - Asking OpenMates users for their Proton account password or handling that password outside Proton Bridge.
    - Persisting Bridge IMAP/SMTP passwords in OpenMates cloud, Directus, logs, traces, command history, or default local OpenMates config.
    - Exposing Proton Bridge IMAP/SMTP on non-localhost interfaces.
    - Server-side/offline Proton access without a running user connector.
    - Background workflow automation using Proton credentials while the connector is offline.
    - Custom delayed-send durations in v1.
    - Full Apple native app parity; this is a macOS CLI feature, not an iOS/macOS native app UI feature.

context_discovery:
  github_issues:
    - "GitHub MCP failed with 401 Bad credentials; fallback `gh issue list --repo glowingkitty/OpenMates --search \"proton bridge connected account\" --state all --limit 10` returned no matches."
  docs:
    - docs/specs/calendar-permission-management/spec.yml
    - docs/specs/connected-account-cli-import/spec.yml
    - docs/architecture/core/client-side-encryption.md
    - docs/architecture/core/security.md
    - docs/architecture/platforms/cli.md
    - docs/architecture/platforms/cli-package.md
    - docs/self-hosting/proton-bridge.md
    - docs/user-guide/apps/mail.md
    - docs/contributing/guides/spec-driven-development.md
    - docs/contributing/guides/testing.md
  code_patterns:
    - frontend/packages/openmates-cli/src/cli.ts currently routes CLI commands and already exposes connected-accounts import.
    - frontend/packages/openmates-cli/src/client.ts already creates connected-account import rows and token-ref requests.
    - frontend/packages/openmates-cli/src/connectedAccountImport.ts assumes OAuth-style refresh_token envelopes and must not be reused for local Bridge credentials without a new credential contract.
    - backend/core/api/app/routes/connected_accounts.py stores encrypted/hash-only connected-account rows and currently validates Google Calendar import only.
    - backend/core/api/app/services/connected_accounts_service.py requires encrypted_refresh_token_bundle for normal rows and has optional server_access fields.
    - backend/shared/providers/protonmail/protonmail_bridge.py currently supports a single self-hosted/admin Bridge config via Vault/env and reads IMAP directly server-side.
    - backend/apps/mail/skills/search_skill.py currently searches Proton Mail via the self-hosted provider config rather than per-user local connected accounts.
    - frontend/packages/ui/src/components/settings/privacy/SettingsConnectedAccounts.svelte is the existing connected-account settings surface.
  tests:
    - frontend/packages/openmates-cli/tests/cli.test.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - frontend/packages/openmates-cli/tests/connectedAccountImport.test.ts
    - backend/tests/test_connected_accounts_permissions.py
    - backend/tests/test_token_broker_refs.py
    - frontend/apps/web_app/tests/settings.spec.ts
  external_research:
    - "Proton support: Bridge CLI starts with `protonmail-bridge -c` on Linux and `/Applications/Proton Mail Bridge.app/Contents/MacOS/Proton Mail Bridge -c` on macOS."
    - "Proton support: Bridge supports macOS and Linux, requires a paid Proton Mail plan, and exposes local IMAP/SMTP for email clients."
    - "Proton support: Bridge uses macOS Keychain on macOS and secret-service/GNOME Keyring/pass on Linux; keychain failures prevent Bridge from decrypting local data."
    - "Proton security model: Bridge stores refresh tokens and Bridge passwords in the OS keychain, holds access tokens in memory, and assumes IMAP/SMTP ports are not exposed beyond localhost."
    - "Proton source: interactive CLI has `login` and `info`; `info` prints IMAP/SMTP host, ports, username, and Bridge password for connected users."
    - "Proton source/build docs: `--noninteractive` starts Bridge without an interface but cannot add/remove accounts or get Bridge password."
    - "Homebrew cask: `brew install --cask proton-mail-bridge` installs Proton Mail Bridge on supported macOS systems."
    - "Proton support: Linux DEB/RPM packages should be verified with Proton's published package-signature process; PKGBUILD verification is handled by that package flow."

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This spec adds a macOS-capable OpenMates CLI command, not native Apple app UI.
    - Apple app connected-account settings may later show the same account status if shared settings sync includes local connectors, but native setup is out of scope.
  verification:
    - Apple native verification is not required for this CLI-only connector phase.
  intentional_native_differences:
    - The macOS path uses the terminal and Proton Bridge desktop app/CLI rather than Swift UI setup.

clarification:
  rounds:
    - question: Should OpenMates start and keep Proton Bridge running only while the CLI command is alive?
      answer: Yes. The connected account should go offline when the command stops.
    - question: Should OpenMates ask for the Proton account password?
      answer: No. Proton Bridge may ask for the Proton account password in its own login flow, but OpenMates must not ask for or handle it directly.
    - question: How should Bridge-generated IMAP/SMTP credentials be handled?
      answer: Read them safely from Bridge after login when possible, otherwise ask through hidden prompts; keep them in memory only for the connector lifetime by default.
    - question: Should write/send be supported?
      answer: Yes. Read-only is the default, but `--write` should enable write mode with clear startup warning and delayed-send support.
    - question: What startup warning is required?
      answer: Tell users Bridge access is only active while the command runs and recommend screen, tmux, or zellij for long-lived use.
  vision_summary: >
    Proton Bridge integration should feel like a convenient local CLI connector
    rather than a server-side credential import. OpenMates should detect whether
    Bridge is installed, print exact OS-specific install guidance when it is
    missing, start and supervise Bridge when present, register the account as
    available while the CLI connector is alive, keep Bridge credentials local,
    and default to read-only until the user explicitly starts write mode. Write
    mode must include delayed send and undo before delivery.
  approved_by_user: true

