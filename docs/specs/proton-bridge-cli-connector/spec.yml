implementation_plan:
  spec_path: docs/specs/proton-bridge-cli-connector/spec.yml
  existing_patterns:
    - Connected-account rows are stored encrypted/hash-only through backend/core/api/app/routes/connected_accounts.py.
    - Connected-account CLI import already performs client-side encryption before storage but assumes OAuth refresh tokens.
    - Proton self-hosting provider already knows how to search IMAP through Bridge, but it is single-account/admin-only and server-side.
    - Calendar permission management already defines delayed-send semantics for future Mail send.
    - CLI command routing and help live in frontend/packages/openmates-cli/src/cli.ts.
  architecture: >
    Add a local connector execution mode for connected accounts. The CLI owns
    Proton Bridge process supervision and in-memory Bridge credentials, while
    the backend stores only encrypted account metadata, online/offline connector
    state, and delayed-send receipts. Mail read/write requests for this provider
    are routed to the active CLI connector over the existing authenticated client
    channel or a narrow new connector channel; the backend never receives Bridge
    IMAP/SMTP credentials.
  data_flow:
    - CLI starts or attaches to Proton Bridge and verifies localhost IMAP.
    - CLI registers encrypted connected-account metadata with execution_mode=local_connector.
    - CLI sends heartbeats while the process is alive.
    - Backend routes Mail read requests to the active connector session.
    - CLI reads localhost IMAP and returns bounded sanitized results.
    - In write mode, backend creates approved delayed-send request and connector sends SMTP only after the 30-second undo window expires.
    - CLI exit, heartbeat expiry, or revocation marks the account offline.
  affected_files:
    - path: docs/specs/proton-bridge-cli-connector/spec.yml
      reason: Product/security contract.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add connect-account proton command and help text.
    - path: frontend/packages/openmates-cli/src/protonBridgeConnector.ts
      reason: New Bridge detection, install guidance, process supervision, credential capture, IMAP validation, and connector loop.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add local connector registration, heartbeat, request/result client methods, and delayed-send connector handling.
    - path: frontend/packages/openmates-cli/src/ws.ts
      reason: Listen for local connector request events on the authenticated CLI WebSocket.
    - path: frontend/packages/openmates-cli/tests/protonBridgeConnector.test.ts
      reason: CLI unit coverage.
    - path: frontend/packages/openmates-cli/tests/protonBridgeConnector.integration.test.ts
      reason: Fake Bridge and fake IMAP/SMTP connector coverage.
    - path: backend/core/directus/schemas/connected_accounts.yml
      reason: Add local connector metadata/status fields if schema changes are required.
    - path: backend/core/api/app/routes/connected_accounts.py
      reason: Add local connector registration, heartbeat, revocation, and status routes.
    - path: backend/core/api/app/services/connected_accounts_service.py
      reason: Validate local connector rows without requiring refresh-token bundles and reject plaintext credentials.
    - path: backend/apps/mail/skills/search_skill.py
      reason: Route Proton local connector read requests instead of self-hosted direct IMAP for per-user accounts.
    - path: backend/shared/providers/protonmail/protonmail_bridge.py
      reason: Reuse/refactor IMAP parsing helpers for connector results while preserving self-hosting mode.
    - path: backend/tests/test_local_connected_account_connectors.py
      reason: Backend local connector contract tests.
    - path: backend/tests/test_proton_local_connector_delayed_send.py
      reason: Delayed-send contract tests.
    - path: frontend/packages/ui/src/components/settings/privacy/SettingsConnectedAccounts.svelte
      reason: Show Proton local connector status and revocation without secrets.
    - path: frontend/apps/web_app/tests/proton-local-connector-settings.spec.ts
      reason: Web status and no-secret E2E coverage.
    - path: scripts/audit_sdk_cli_parity.py
      reason: Record intentional CLI-only setup boundary or enforce future parity constraints.
    - path: docs/user-guide/cli/README.md
      reason: Document command, macOS/Linux setup, write-mode warning, and multiplexer recommendation.
    - path: docs/user-guide/apps/mail.md
      reason: Document Proton local connector read/write behavior and delayed send.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/proton-bridge-cli-connector/spec.yml
    - cd frontend/packages/openmates-cli && npm run test:unit:proton-bridge-connector
    - cd frontend/packages/openmates-cli && npm run test:unit:proton-bridge-connector-integration
    - docker exec api python -m pytest /app/backend/tests/test_local_connected_account_connectors.py
    - docker exec api python -m pytest /app/backend/tests/test_proton_local_connector_delayed_send.py
    - python3 scripts/audit_sdk_cli_parity.py
    - Deploy to dev, wait for Vercel Ready, then python3 scripts/tests.py run --spec proton-local-connector-settings.spec.ts
  verification_order:
    - CLI tests for Bridge process and credential-safety behavior first.
    - Backend pytest for local connector registration, heartbeat, routing, and delayed-send second.
    - SDK/CLI parity audit third to record intentional CLI-only setup boundary.
    - Web settings Playwright after deploy.
    - User confirmation of warning copy and settings behavior after dev deploy.

