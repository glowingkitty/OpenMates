implementation_plan:
  existing_patterns:
    - backend/apps/ai/processing/main_processor.py already applies skill result filtering and grouped-result flattening for LLM inference.
    - backend/apps/ai/tasks/stream_consumer.py already strips failed embed references and fixes malformed inline embed references before persistence.
    - frontend/packages/openmates-cli/src/cli.ts already has type-specific result headers and can be extended to hide noisy fields by default.
    - Existing skill E2E specs already include CLI direct calls and web chat/embed phases for event and travel skills.
  architecture: >
    Add a reusable quality contract around app-skill results instead of one-off
    prompt fixes. Each representative search skill should return normalized
    constraint metadata and no-result reasons; backend processing should preserve
    decision fields for inference while hiding noisy/internal fields from default
    output; chat persistence should remove raw tool JSON blocks while retaining
    structured embed metadata; the CLI should render concise cards by default.
  data_flow:
    - User request is parsed into app-skill tool arguments with explicit constraints.
    - Skill/provider layer fetches raw provider results.
    - Skill normalizes provider fields, applies strict filters, separates relaxed alternatives when needed, and returns no-result reason/suggestions.
    - Main processor filters result fields for LLM inference while preserving decision-critical fields.
    - Assistant final answer references rendered embeds or inline embed links, not raw app_skill_use JSON blocks.
    - Web and CLI render concise user-facing output; `--json` keeps full structured payload for automation.
  affected_files:
    - path: backend/apps/events/skills/search_skill.py
      reason: Normalize event types, date/price/accessibility filtering, strict/relaxed/no-result metadata.
    - path: backend/apps/events/app.yml
      reason: Document filter behavior and LLM-visible decision fields.
    - path: backend/apps/travel/skills/search_connections.py
      reason: Enforce canonical constraints and expose strict/relaxed/no-result metadata.
    - path: backend/apps/travel/skills/search_stays.py
      reason: Improve hotel budget/amenity/proximity handling and no-result explanations.
    - path: backend/apps/travel/app.yml
      reason: Align public tool schema with backend-supported filters and LLM preprocessor hints.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Shared skill-result filtering contract for LLM inference.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Remove raw successful app_skill_use JSON from persisted assistant content while keeping inline embed links.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Concise default direct skill rendering and explicit verbose/debug output path.
    - path: frontend/apps/web_app/tests/skill-events-search.spec.ts
      reason: Event quality regression coverage.
    - path: frontend/apps/web_app/tests/skill-travel-connections.spec.ts
      reason: Flight quality regression coverage.
    - path: frontend/apps/web_app/tests/skill-travel-stays.spec.ts
      reason: Hotel quality regression coverage.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: CLI formatting regression coverage.
    - path: backend/tests/test_app_skill_processing_quality.py
      reason: Backend shared filtering/no-result contract coverage.
    - path: backend/tests/test_travel_skill_constraints.py
      reason: Travel schema/filtering contract coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/app-skill-processing-quality/spec.yml
    - python3 scripts/spec_verify.py docs/specs/app-skill-processing-quality/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/app-skill-processing-quality/spec.yml --phase green
  verification_order:
    - Backend pytest/unit contracts first for filtering, schema, no-result, and inference field contracts.
    - CLI unit tests second for concise default output and full JSON preservation.
    - Playwright event/travel/embed leak specs third against app.dev.openmates.org after deploy.
    - Apple not affected for this first slice.
  live_cli_verification:
    timestamp: "2026-06-13T09:20:30Z"
    api_url: http://localhost:8000
    commands:
      - request: Online data-engineering events near Berlin.
        result: Passed; venue-only physical Eventbrite results were filtered out and only online events remained.
      - request: Free or cheap electronic music events in Berlin this weekend.
        result: Passed; date filtering no longer crashes on naive provider dates, all results were inside the requested weekend window, and free/cheap options ranked first.
      - request: Wheelchair-accessible family events in Berlin this weekend.
        result: Passed; output labels accessibility as unknown or mentioned instead of presenting unproven accessibility as confirmed.
      - request: Direct Berlin to Barcelona flights on 2026-07-10 under 200 EUR.
        result: Passed; only direct flights under 200 EUR were shown and booking internals stayed hidden.
