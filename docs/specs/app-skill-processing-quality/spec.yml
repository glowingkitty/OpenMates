risks:
  - Provider APIs expose inconsistent metadata; strict filtering may reduce result counts until relaxed-result explanations are implemented well.
  - Over-filtering could hide useful but imperfect matches; strict and relaxed sections must make this tradeoff explicit.
  - LLM-visible field filtering can accidentally remove decision-critical context; tests must cover field preservation, not only field removal.
  - Raw JSON cleanup must not remove valid human-readable inline embed links or break embed rendering/persistence.
  - Live provider data changes can make exact-result E2E assertions flaky; tests should assert contracts and invariants rather than specific event/hotel names.

open_questions:
  - Should verbose CLI output use an existing flag, a new `--verbose`, or a hidden debug flag for app-skill details?
  - Should no-result credit reporting be standardized across all skills now, or only event/travel in the first implementation slice?
  - "Which constraint metadata shape should become canonical for all search-like skills: `constraints`, `constraint_matches`, `strict_results`, and `relaxed_results`, or a smaller field set?"
