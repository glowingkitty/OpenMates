    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: apple
    verification_ids: [T-APPLE-002]

contracts:
  api:
    - route: POST /v1/auth/pair/initiate
      behavior: Watch creates the same unauthenticated pair-login token as other initiating devices.
    - route: POST /v1/auth/pair/authorize/{token}
      behavior: iPhone authorizes only after user approval, using existing encrypted bundle semantics.
    - route: POST /v1/auth/pair/complete/{token}
      behavior: Watch completes login locally after receiving the generated PIN.
  data:
    - WatchConnectivity messages contain token, pair URL, timestamp, and display metadata only.
    - WatchConnectivity approval replies contain generated PIN and non-sensitive status metadata only.
  ui_states:
    - Watch generating token.
    - Watch waiting for iPhone confirmation.
    - Watch fallback URL/token/QR.
    - iPhone pending Apple Watch login approval under connected devices.
    - iPhone approved/denied/error states.
  privacy_security:
    - Explicit iPhone consent is mandatory.
    - No raw master key, auth cookie, session token, WebSocket token, or user plaintext is sent over WatchConnectivity.
    - Existing pair-login AES/PBKDF2 bundle remains the only path for transferring auth material.

