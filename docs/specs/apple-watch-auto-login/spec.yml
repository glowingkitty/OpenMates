id: apple-watch-auto-login
title: Apple Watch Auto Login Via Connected iPhone
status: verified

goal: >
  Let an unauthenticated Apple Watch request login from the paired iPhone when
  the iPhone is reachable, while preserving explicit user consent and keeping
  the existing standalone QR/PIN pair-login fallback for cases where the phone
  is unavailable or the user chooses to log in without it.

scope:
  in:
    - WatchConnectivity handoff from Watch to paired iPhone for a pair-login token.
    - Mandatory iPhone user consent before the iPhone authorizes a Watch login.
    - iPhone notification when possible, plus in-app pending approval under connected devices.
    - Watch unauthenticated state that shows "Confirm login on iPhone" only when the iPhone is connected.
    - '"Login without iPhone" fallback that reveals the full pair URL, a large centered 6-character token, and a "Show QR code" button.'
    - Full-screen Watch QR view optimized for maximum scan size and quiet zone.
    - Reuse of the existing pair-login backend, PIN, encrypted bundle, and Watch-local completion flow.
  out:
    - Silent Watch login without explicit iPhone consent.
    - Sending raw auth cookies, session tokens, or plaintext master keys over WatchConnectivity.
    - New backend auth endpoints or changed pair-login security policy.
    - iCloud Keychain, CloudKit, or Apple account-based key sync.
    - Rich Watch settings beyond the login approval surface.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --search 'Watch pair login OR WatchConnectivity OR Apple Watch login OR QR login' --state all returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/apple-watch-support/spec.yml
    - docs/specs/apple-auth-security-parity/spec.yml
    - apple/AGENTS.md
    - .claude/rules/apple-ui.md
  code_patterns:
    - apple/OpenMatesWatch/Sources/WatchPairLoginView.swift currently renders a small inline QR and PIN input.
    - apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift builds pair URLs as https://<web-host>/#pair=<TOKEN> and completes login locally on the initiating device.
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsSessionPairingView.swift contains the native iPhone pair-authorize screen and pair bundle encryption pattern.
    - apple/OpenMates/Sources/Core/Networking/DeepLinkHandler.swift already captures #pair tokens for native iPhone routing.
    - No WatchConnectivity or WCSession usage exists in apple/**/*.swift before this spec.
  tests:
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - apple/OpenMatesTests/WatchEmbedPreviewTests.swift
    - apple/OpenMatesUITests/AuthSecurityParityUITests.swift

