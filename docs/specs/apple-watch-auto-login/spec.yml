    - apple/OpenMates/Sources/Core/Networking/DeepLinkHandler.swift
    - apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
    - apple/OpenMatesTests/WatchEmbedPreviewTests.swift
  parity_expectations:
    - Pair-login cryptography and backend semantics remain identical to web/iOS pair login.
    - Watch login can be started without the iPhone, and the Watch remains an independent client after login.
    - iPhone consent is explicit and visible; notification is a convenience, not the trust boundary.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-watch-auto-login/spec.yml
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchPairLoginRuntimeTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/WatchEmbedPreviewTests
  intentional_native_differences:
    - Watch uses WatchConnectivity for token/PIN handoff only when the paired iPhone is reachable.
    - Watch QR is displayed in a full-screen native view instead of inline web-style QR layout.

clarification:
  rounds:
    - question: Should the connected iPhone auto-approve the Watch login silently when the iPhone app is already logged in, or should it show a one-tap approval prompt on the iPhone before sending the PIN/auth bundle to the Watch?
      answer: The iPhone must send a notification and require explicit user confirmation before login, to ensure consent.
    - question: When the iPhone is not reachable or not logged in, should the Watch fallback screen show the full URL as selectable/copyable text plus a manual 6-character token, or only the full URL and "Show QR code"?
      answer: Show the full URL, the 6-character token larger in the center, and a button for QR code under it.
    - question: If iPhone notification permission is disabled or the iPhone app cannot show a system notification, should the iPhone still show the pending Watch login approval as an in-app prompt the next time OpenMates opens?
      answer: Yes. Auto-open settings to a connected-devices sub-setting for connecting Apple Watch, and show on Watch that the login must be confirmed on iPhone when connected.
  vision_summary: >
    The Watch should prefer a connected-iPhone login request, but never silently
    approve. If the phone is connected, Watch shows a "Confirm login on iPhone"
    state with a "Login without iPhone" escape hatch. Fallback mode shows the
    pair URL, prominent token, and a full-screen scan-friendly QR code.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Watch requests login from reachable iPhone
    given:
      - Alice has the OpenMates iPhone app installed and paired with her Apple Watch.
      - Alice is logged into OpenMates on the iPhone.
      - The Watch app is unauthenticated and can reach the backend.
    when:
      - Alice opens OpenMates on Watch.
    then:
      - The Watch creates a normal pair-login token.
      - The Watch sends only the token and display metadata to the iPhone over WatchConnectivity.
      - The Watch shows "Confirm login on iPhone" and a "Login without iPhone" button.
  - id: S-2
    title: iPhone requires explicit approval
    given:
      - The iPhone receives a Watch login request.
    when:
      - Alice taps the notification or opens OpenMates.
    then:
      - OpenMates opens settings to connected devices > connect Apple Watch.
      - Alice sees the requesting Watch details and must tap Allow before authorization.
      - Deny or dismiss leaves the Watch unauthenticated and able to use fallback login.
  - id: S-3
    title: Approved iPhone login completes on Watch
    given:
      - Alice approves the Watch login on iPhone.
    when:
      - The iPhone authorizes the existing pair-login token and sends the generated PIN to the Watch over WatchConnectivity.
    then:
      - The Watch calls the existing pair complete flow with the PIN.
      - The Watch decrypts the bundle locally and stores its own session and master key.
      - The iPhone never sends plaintext master keys, cookies, or session tokens over WatchConnectivity.
  - id: S-4
    title: Watch fallback login is explicit and scan-friendly
    given:
      - The iPhone is not connected, not logged in, notification delivery fails, or Alice taps "Login without iPhone".
    when:
      - The Watch shows fallback login.
    then:
      - The fallback view shows the full pair URL.
      - The 6-character token is large and centered.
      - The "Show QR code" button opens a full-screen QR code with maximum practical Watch display size and a white quiet zone.

