implementation_plan:
  existing_patterns:
    - PairLoginRuntime.initiate/poll/complete for Watch-side login.
    - CLIPairAuthorizeView for iPhone-side pair authorization and PIN generation.
    - DeepLinkHandler/MainAppView settings route handling for pair tokens.
  architecture: >
    Add a small WatchConnectivity coordinator shared by iPhone and Watch. Watch
    initiates pair-login as today, then attempts a token handoff to the paired
    iPhone. iPhone stores a pending request, raises a notification when possible,
    opens the connected-device approval UI, and only after approval authorizes the
    token and returns the generated PIN to Watch. Watch completes the existing
    pair-login flow locally. If connectivity is missing or the user opts out,
    Watch displays URL/token/QR fallback.
  data_flow:
    - Watch calls /v1/auth/pair/initiate and builds https://<web-host>/#pair=<TOKEN>.
    - Watch sends token/url/device hint to iPhone via WCSession.
    - iPhone stores pending request and routes user to connected devices > connect Apple Watch.
    - User approves; iPhone authorizes the token using existing pair-login encrypted bundle semantics.
    - iPhone sends generated PIN/status to Watch via WCSession.
    - Watch calls /pair/complete and /auth/login through PairLoginRuntime.complete.
  affected_files:
    - path: apple/OpenMatesWatch/Sources/WatchPairLoginView.swift
      reason: Watch auto-login/fallback/QR UI.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsSessionPairingView.swift
      reason: iPhone connected-device Apple Watch approval surface.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: route pending Watch approval to settings overlay/subpage.
    - path: apple/OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift
      reason: shared payload helpers and authorization reuse.
    - path: apple/OpenMatesTests/WatchPairLoginRuntimeTests.swift
      reason: security/payload contract tests.
    - path: apple/OpenMatesTests/WatchEmbedPreviewTests.swift
      reason: Watch login UI contract identifiers.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-watch-auto-login/spec.yml
    - python3 scripts/spec_verify.py docs/specs/apple-watch-auto-login/spec.yml --phase green
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py build-watch --simulator "Apple Watch Series 11 (46mm)"
  verification_order:
    - Apple unit contract tests.
    - iPhone and Watch remote builds.

