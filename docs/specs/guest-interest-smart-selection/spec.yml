clarification:
  rounds:
    - question: Should this spec replace the current logged-out default of auto-opening `demo-for-everyone` on `/`, or only show smart selection after clicking New Chat?
      answer: Replace it. Fresh logged-out users should open the new-chat screen instead of the intro chat.
    - question: Should selected interest tags persist only in sessionStorage until the tab/window session ends, or persist longer in localStorage for returning logged-out visitors?
      answer: Session storage only for privacy before signup. If the user signs up, the preferences should be stored client-side encrypted and used only for local filtering.
    - question: When a user signs up after selecting tags, should the selected tags become encrypted synced account data across devices, or remain encrypted local-only IndexedDB state?
      answer: They should become encrypted synced account data, likely named `encrypted_topic_preferences`.
    - question: For the first version, should users be able to edit topic preferences later in Settings?
      answer: Yes. Add editing under Settings / Account / Interests.
    - question: Should v1 be web-only with future-compatible data, or require CLI and Apple parity in the first implementation?
      answer: CLI and Apple app parity as always, with CLI parity focused on settings/account management.
    - question: Should logged-out default daily inspirations become the first explainer header introducing OpenMates?
      answer: Yes. Move the `for-everyone` chat header content, including the intro/autoplay video behavior, into the first logged-out default daily inspiration, and later add more default inspirations explaining OpenMates while the user is not signed up.
  vision_summary: >
    New visitors should land directly on a new-chat welcome screen that feels usable and personalized without sacrificing privacy. They select a few icon-and-gradient phrase tags; the client deterministically reorders daily inspirations, intro/example chats, and starter suggestions without sending interests to the server. Guest interests live only in sessionStorage, then become encrypted synced topic preferences after signup and can be edited from web, CLI, and Apple account settings.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Fresh guest lands on new-chat welcome with OpenMates explainer inspiration
    given:
      - A fresh logged-out visitor opens `/` on the official web app.
      - The browser has no active chat hash and no authenticated session.
    when:
      - The app finishes initial unauthenticated loading.
    then:
      - The active surface is the new-chat welcome screen, not `demo-for-everyone`.
      - The daily inspiration area is visible above the welcome content.
      - The first logged-out default inspiration introduces OpenMates using the existing `for-everyone` chat header title, summary, gradient/header visual language, and intro video preview/fullscreen behavior.
      - Intro and example chats remain reachable from the welcome screen and sidebar.

  - id: S-2
    title: Guest selects adaptive interest tags
    given:
      - A logged-out visitor is on the new-chat welcome screen.
      - No interest tags are selected yet.
    when:
      - The visitor selects `software development`.
    then:
      - The `software development` tag becomes active and moves to the front of the tag rail.
      - Related tags such as `use the CLI`, `open source`, `read developer docs`, `run code`, `protect my privacy`, and `summarize documents` move after the active tag.
      - Unrelated tags remain available later in the rail instead of being hidden.
      - A Continue action appears once at least one tag is selected.

  - id: S-3
    title: Smart selection reorders all guest discovery surfaces
    given:
      - A logged-out visitor selected `software development` and `protect my privacy`.
    when:
      - The visitor presses Continue.
    then:
      - Daily inspirations prioritize `cli-programmatic-use`, `developer-docs-code`, `privacy-pii-replacement`, and `apps-skills-tools` before generic inspiration content.
      - Intro chats prioritize `demo-for-developers` while keeping `demo-for-everyone` reachable.
      - Example chats prioritize software-development and privacy examples such as Svelte docs, Python code run, OpenMates app skills/docs, PDF encryption, private workspace, and privacy website examples.
      - New-chat suggestions prioritize relevant prompts such as learning to code, using OpenMates from CLI/API, hiding personal data, and finding developer tutorial videos.
      - The same selected tags and registry order always produce the same ranked output.

  - id: S-4
    title: Guest interests are session-only before signup
    given:
      - A logged-out visitor selected `find apartments` and `local life`.
    when:
      - The visitor reloads the same tab, then later closes the tab/window and opens OpenMates again.
    then:
      - Same-session reload restores selected tags from sessionStorage.
      - Closing the browser session removes the guest selections.
      - No localStorage entry stores guest interest tags.
      - No network request sends cleartext selected tags.

  - id: S-5
    title: Signup promotes session interests into encrypted synced account data
    given:
      - A logged-out visitor selected `software development`, `use the CLI`, and `open source`.
      - The visitor starts signup and successfully creates an account.
    when:
      - The authenticated account sync completes.
    then:
      - The selected interests are encrypted client-side into `encrypted_topic_preferences` or an equivalent explicit encrypted synced field.
      - The server receives only ciphertext and metadata needed to sync it.
      - The account can use the decrypted preferences for local smart selection on new-chat and public fallback surfaces.
      - The signup flow does not upload the previous guest sessionStorage cleartext value.

  - id: S-6
    title: Account interests are editable on web, CLI, and Apple
    given:
      - An authenticated user has encrypted topic preferences synced to their account.
    when:
      - The user opens Settings > Account > Interests on web, the equivalent CLI account/settings command, or the Apple account settings screen.
    then:
      - The user can view, add, remove, and save topic preferences after client-side decryption.
      - Saving re-encrypts the full preferences payload before sync.
      - A second authenticated client receives the encrypted update through normal sync and can decrypt it locally.
      - User-visible labels are localized on web and Apple, and CLI output is clear text in the active terminal language where supported.

  - id: S-7
    title: Authenticated chat ownership takes precedence over public onboarding
    given:
      - An authenticated user has encrypted topic preferences.
    when:
      - The user opens the web, CLI, or Apple chat list/new-chat screen.
    then:
      - If the user has real user chats, those chats are shown as the primary experience.
      - If the user has no user chats, the public intro/example/suggestion fallback is ranked with the decrypted topic preferences.
      - Logged-in personalized daily inspirations, when present, take precedence over logged-out default OpenMates explainers.

  - id: S-8
    title: Product explainer inspirations stay separate from logged-in personalization
    given:
      - A logged-out visitor has not signed up.
    when:
      - The app loads default inspirations.
    then:
      - The default inspiration registry includes product explainer inspirations for OpenMates intro, privacy/personal-data replacement, app skills, memories/settings, example chats, and CLI/programmatic use.
      - These logged-out defaults are filterable by selected tags.
      - After signup, personalized encrypted daily inspirations replace or outrank logged-out defaults according to the existing daily inspiration source rules.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Fresh logged-out `/` visits open the new-chat welcome screen instead of auto-opening `demo-for-everyone`.
  - id: AC-2
    scenario: S-1
    text: The first logged-out default inspiration reuses the `for-everyone` chat header copy/video intent as an OpenMates explainer banner.
  - id: AC-3
    scenario: S-2
    text: The interest tag rail uses phrase labels, icons, and gradient backgrounds, and adaptively reorders selected and related tags without hiding unrelated tags.
  - id: AC-4
    scenario: S-3
    text: Selected tags deterministically rank daily inspirations, intro chats, example chats, and new-chat suggestions from a shared client-side registry.
  - id: AC-5
    scenario: S-4
    text: Guest selected tags persist only in sessionStorage and are never sent to the server as cleartext.
  - id: AC-6
    scenario: S-5
    text: Signup promotes guest interests into encrypted synced account topic preferences without uploading guest cleartext.
  - id: AC-7
    scenario: S-6
    text: Web Settings > Account > Interests can edit encrypted topic preferences.
  - id: AC-8
    scenario: S-6
    text: CLI account/settings commands can view and update encrypted topic preferences after local decryption.
  - id: AC-9
    scenario: S-6
    text: Apple account settings can view and update encrypted topic preferences with web-equivalent semantics.
  - id: AC-10
    scenario: S-7
    text: Authenticated user chats take precedence over public onboarding, while no-chat fallback uses decrypted topic preferences.
  - id: AC-11
    scenario: S-8
    text: Logged-out product explainer inspirations are used only as guest/default content and do not replace authenticated personalized inspirations.

contracts:
  data:
    - name: InterestTag
      shape: "{ id: string, labelKey: string, fallbackLabel: string, icon: string, gradientCategory: string, defaultOrder: number, related: string[], dailyInspirations: string[], introChats: string[], exampleChats: string[], suggestions: string[] }"
      rules:
        - Tag IDs are stable lowercase snake_case identifiers.
        - Labels are phrase-style, e.g. `find apartments`, `protect my privacy`, `software development`, `open source`, `use the CLI`.
        - Gradient categories reuse existing app/category gradient mapping rather than introducing arbitrary colors.
    - name: TopicPreferencesPayload
      shape: "{ version: 1, selectedTagIds: string[], updatedAt: string }"
      storage:
        - Guest web state uses sessionStorage key `openmates.guest_interest_tags.v1`.
        - Authenticated state syncs as client-encrypted `encrypted_topic_preferences` or an equivalently explicit encrypted field.
        - Server-side storage must never contain cleartext tag IDs.
    - name: GuestProductInspiration
      shape: "{ id: string, titleKey: string, phraseKey: string, assistantResponseKey?: string, category: string, videoKey?: string, featurePath?: string, tags: string[], order: number }"
      rules:
        - "`openmates-intro` is the first default logged-out inspiration and is derived from the `for-everyone` chat header/video content."
        - Additional default inspiration IDs include `privacy-pii-replacement`, `apps-skills-tools`, `memory-personalization`, `example-chats`, and `cli-programmatic-use`.
  ui_states:
    - Fresh logged-out new-chat welcome with no selected tags.
    - Interest tag rail with active and related resorted tags.
    - Continue hidden before selection and visible after one or more selections.
    - Smart-selected daily inspirations, intro/example chat cards, and suggestions after Continue.
    - Web Settings > Account > Interests with loading, saved, validation error, and sync error states.
    - CLI account interests list/set/clear output and error states.
    - Apple Account > Interests loading, edit, save, and sync error states.
  privacy_security:
    - Guest topic selections are session-only before signup.
    - No cleartext selected tag IDs are sent in HTTP, WebSocket, logs, analytics, issue reports, or sync payloads.
    - Authenticated topic preferences are encrypted client-side before sync and decrypted only locally.
    - Topic preferences affect local filtering/ranking only; they are not used for server-side targeting or model personalization in v1.
  ranking:
    - Active tags render first in selection order.
    - Unselected tags are scored by relation to selected tags, shared surfaces, shared category, and stable default order.
    - Content scoring uses explicit registry matches first, then metadata tags/app-skill/category matches, then featured/default fallback order.
    - Dedupe by content ID and apply variety penalties to avoid showing too many cards from one category when multiple tags are selected.

