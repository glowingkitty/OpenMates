id: guest-interest-smart-selection
title: Guest Interest Smart Selection
status: implementing

goal: >
  Let new visitors land directly on the new-chat screen and get a privacy-preserving,
  locally steered OpenMates experience by selecting interest tags that deterministically
  personalize logged-out default daily inspirations, intro/example chats, and new-chat
  suggestions. Preserve the selected interests as encrypted synced account data after
  signup so web, CLI, and Apple clients can edit and use the same topic preferences.

scope:
  in:
    - Fresh logged-out web visitors open the new-chat welcome screen by default instead of auto-opening `demo-for-everyone`.
    - Logged-out default daily inspirations become the first OpenMates explainer surface, starting with the existing `for-everyone` chat header/video content moved into the first default inspiration.
    - Additional logged-out default inspirations explain OpenMates features such as personal data replacement, app skills, memories/settings, examples, CLI/programmatic use, and privacy until the user signs up or has authenticated personalized inspirations.
    - A phrase-style interest tag rail on the web new-chat welcome screen, with icons and category/app gradient backgrounds.
    - Adaptive tag ordering where selected tags stay first and related unselected tags move next without hiding unrelated tags.
    - Deterministic client-side smart selection for daily inspirations, intro chats, example chats, and new-chat suggestions from selected tags.
    - Guest topic selections stored only in sessionStorage before signup.
    - Signup promotion of guest selections into encrypted synced account data named `encrypted_topic_preferences` or an equivalent explicit encrypted field.
    - Settings > Account > Interests editing on web, with CLI and Apple parity for reading/updating the same encrypted preferences.
    - Tests and docs for the privacy-preserving behavior and new default landing flow.
  out:
    - Server-side profiling, analytics-based personalization, or cleartext interest storage.
    - ML/LLM-based ranking for v1; all selection is deterministic client-side.
    - Hiding unrelated tags after a selection.
    - Persisting guest interests beyond sessionStorage before signup.
    - Replacing logged-in personalized daily inspiration generation with the guest rules.
    - Creating all future OpenMates explainer videos; v1 wires the first explainer and provides the registry for later additions.
    - Changing anonymous free usage budget or anonymous chat encryption rules already covered by separate specs.

