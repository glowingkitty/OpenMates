implementation_plan:
  existing_patterns:
    - DailyInspirationBanner already renders video/fullscreen and supports guest default inspirations.
    - NewChatSuggestions already renders horizontal gradient prompt cards and falls back to default i18n suggestion keys.
    - Example chats already expose stable IDs, categories, app-skill links, and settings-memory links.
    - Existing encrypted app settings/memories and user profile sync patterns show how to persist client-encrypted account data.
  architecture: >
    Add a shared interest registry and deterministic ranking utility in the frontend UI package, then consume it from web welcome surfaces, CLI account settings, and Apple settings/new-chat equivalents. Guest state remains web sessionStorage-only; authenticated state is an encrypted synced payload. Logged-out default daily inspirations gain OpenMates product explainer entries, with the `for-everyone` header/video becoming the first explainer banner.
  data_flow:
    - Guest opens `/`; app stays on new-chat welcome and loads logged-out product explainer inspirations.
    - Guest selects tags; sessionStorage stores tag IDs and the local smart-selection utility reranks all discovery surfaces.
    - Guest signs up; client encrypts `{ version, selectedTagIds, updatedAt }` into account topic preferences and syncs ciphertext.
    - Authenticated clients decrypt topic preferences locally and use them for settings display plus no-chat/public fallback ranking.
  affected_files:
    - path: frontend/packages/ui/src/demo_chats/interestTags.ts
      reason: Canonical tag registry and relationships.
    - path: frontend/packages/ui/src/demo_chats/guestSmartSelection.ts
      reason: Deterministic ranking across inspirations, intros, examples, and suggestions.
    - path: frontend/packages/ui/src/demo_chats/guestProductInspirations.ts
      reason: Logged-out OpenMates explainer inspiration registry.
    - path: frontend/packages/ui/src/components/ActiveChat.svelte
      reason: Default logged-out landing and new-chat welcome composition.
    - path: frontend/packages/ui/src/components/DailyInspirationBanner.svelte
      reason: Render/rank guest product inspiration content and first explainer video.
    - path: frontend/packages/ui/src/components/NewChatSuggestions.svelte
      reason: Use smart-selected suggestions.
    - path: frontend/packages/ui/src/services/userDB.ts
      reason: Persist/decrypt encrypted topic preferences.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add account interests commands.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsAccountChatsView.swift
      reason: Add Account > Interests settings parity or equivalent account settings placement.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/guest-interest-smart-selection/spec.yml
    - python3 scripts/spec_verify.py docs/specs/guest-interest-smart-selection/spec.yml --phase red
    - python3 scripts/spec_verify.py docs/specs/guest-interest-smart-selection/spec.yml --phase green
  verification_order:
    - Unit/vitest smart-selection and encrypted preference tests first.
    - CLI account/settings parity tests second.
    - Deploy to dev, wait for Vercel Ready, then run Playwright specs.
    - Apple remote status/build or targeted test-ios after web and CLI evidence.

