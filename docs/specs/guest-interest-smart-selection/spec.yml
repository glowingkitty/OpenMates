risks:
  - Existing Playwright specs currently expect logged-out `/` to auto-navigate to `demo-for-everyone`; these must be intentionally updated with the product change.
  - Cross-client encrypted preference sync may touch account/profile data contracts; implementation must avoid cleartext logging and avoid broad schema changes where an existing encrypted settings pattern can be reused.
  - Too many tags could still feel overwhelming if initial ordering is poor; v1 should keep a small broad default order and rely on adaptive resorting.
  - Moving the intro video/header into daily inspirations must preserve existing deep links and `demo-for-everyone` as an accessible intro chat.
open_questions:
  - Whether the synced ciphertext field should live on the user profile, app settings/memories infrastructure, or a dedicated account preferences collection should be decided during implementation by the smallest compatible encrypted-sync path.
