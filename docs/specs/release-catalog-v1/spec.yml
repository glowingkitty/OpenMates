schema_version: 2
id: release-catalog-v1
title: Tag-Backed Milestone Release Catalog
status: implementing

goal: >
  Make GitHub Releases a trustworthy catalog of intentional OpenMates product
  milestones by anchoring every release to an immutable tag and documenting only
  verified source, self-host image, npm, and PyPI availability.

scope:
  in:
    - Backfill v0.10 through v0.13 as annotated-tag, historical prerelease drafts.
    - Detect the unanchored v0.14 draft and require an explicit milestone SHA before it can be repaired.
    - Publish source archives through GitHub's automatic tag-backed downloads.
    - Link exact npm, PyPI, and GHCR artifacts only when their provenance is verified.
    - Add a deterministic release-catalog validation and draft-generation workflow.
  out:
    - Publishing the historical release drafts without maintainer review.
    - Apple, TestFlight, App Store, macOS, watchOS, or VS Code distribution.
    - Rebuilding unavailable historical Docker images or binaries.
    - Creating a GitHub Release for every npm or PyPI patch version.

context_discovery:
  github_issues:
    - No matching GitHub Issue found with gh issue list.
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/release-intelligence-workflow/spec.yml
    - docs/releases/daily/2026-05-22.yml
    - docs/releases/weekly/2026-W21.yml
  code_patterns:
    - .github/workflows/publish-cli.yml
    - .github/workflows/publish-python-sdk.yml
    - .github/workflows/publish-selfhost-images.yml
    - scripts/release_intelligence.py
    - scripts/tests/test_release_intelligence.py
    - .agents/skills/create-release/SKILL.md
  tests:
    - scripts/spec_validate.py
    - scripts/spec_verify.py
    - scripts/tests/test_release_catalog.py

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - Apple applications are not public or ready for tester distribution and are omitted from release artifacts.
  verification:
    - Not required because no Apple source or distribution behavior changes.
  intentional_native_differences:
    - Apple and TestFlight availability is explicitly absent from this release catalog.

clarification:
  rounds:
    - question: Should GitHub Releases catalog user-facing milestones or every package patch?
      answer: Catalog intentional user-facing milestones only.
    - question: Should v0.10 through v0.13 be published now or created as reviewable drafts?
      answer: Create drafts first.
    - question: Should Apple and VS Code artifacts be part of this release catalog?
      answer: No. Neither distribution channel is public or ready for testing.
  vision_summary: >
    GitHub Releases are a curated milestone catalog rather than a package feed.
    Each release must be anchored to an immutable commit tag and must describe
    only verifiable source, self-host image, npm, and PyPI artifacts. Historical
    releases remain drafts until a maintainer reviews them.
  approved_by_user: true

implementation_state:
  subject_commit: fe85386

approvals:
  product_contract:
    status: approved
    approved_at: "2026-07-10T11:30:08Z"
  implementation_plan:
    status: approved
    approved_at: "2026-07-10T11:30:08Z"

decisions:
  - id: D-1
    status: active
    decision: GitHub Releases represent product milestones rather than package patch versions.
    reason: Users need a curated product history while npm and PyPI retain package-level version history.
    decided_at: "2026-07-10T11:30:08Z"
  - id: D-2
    status: active
    decision: Historical releases are created as drafts after tag and provenance validation.
    reason: A maintainer must review reconstructed copy and external artifact links before public publication.
    decided_at: "2026-07-10T11:30:08Z"
  - id: D-3
    status: active
    decision: Apple and VS Code artifacts are excluded from this catalog.
    reason: Neither channel is publicly distributed or ready for testing.
    decided_at: "2026-07-10T11:30:08Z"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-1
    approach: Add catalog fixtures and run the audit before implementation.
    outcome: failed_as_expected
    recorded_at: "2026-07-10T11:30:08Z"
    evidence: local:pytest-release-catalog-red
  - id: ATTEMPT-2
    task_id: TASK-1
    approach: Run the catalog audit before creating the required annotated tags.
    outcome: failed_as_expected
    recorded_at: "2026-07-10T11:30:08Z"
    evidence: local:release-catalog-audit-red

handoff:
  current_task_id: TASK-3
  next_action: Select and record the immutable v0.14 milestone SHA before updating its existing draft.
  command: python3 scripts/release_catalog.py audit --tag v0.14.0-alpha
  expected_outcome: The audit passes only after v0.14 has an annotated tag matching its catalog SHA.
  blocker:
    reason: v0.14 remains unanchored until a maintainer selects its exact milestone commit.
    next_action: Record the selected immutable SHA in the milestone catalog before retagging the draft.
  last_verified_commit: a8e3ca9

scenarios:
  - id: S-1
    title: Historical milestone has immutable source provenance
    given:
      - v0.10 is represented by a release catalog entry.
    when:
      - A maintainer validates the catalog.
    then:
      - The entry requires an annotated tag and exact 40-character commit SHA.
      - The tag resolves to that SHA and GitHub source archives can be downloaded for it.
  - id: S-2
    title: Historical release draft shows only verified distribution channels
    given:
      - A backfilled milestone has a verified npm package but no matching PyPI package.
    when:
      - Its GitHub Release draft is rendered.
    then:
      - It includes the exact npm install command and package version.
      - It marks PyPI unavailable rather than inventing an artifact.
      - It excludes Apple and VS Code distribution entirely.
  - id: S-3
    title: Maintainer creates a reviewable historical release draft
    given:
      - All provenance for v0.10 through v0.13 validates.
    when:
      - The release workflow runs in draft mode.
    then:
      - It creates or updates prerelease drafts without publishing them.
      - Each draft contains a historical-backfill notice and an original release window.
  - id: S-4
    title: Future milestone cannot be released from a moving branch
    given:
      - A maintainer requests a new milestone release.
    when:
      - The release workflow receives a branch name instead of an immutable tag and SHA pair.
    then:
      - Validation fails before any GitHub Release is created.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Every catalog milestone declares a unique tag, immutable commit SHA, title, prerelease state, and original release window.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-CATALOG-UNIT, T-CATALOG-AUDIT]
  - id: AC-2
    scenario: S-1
    text: Catalog validation rejects missing tags, lightweight tags, SHA mismatches, duplicate tags, and moving branch targets.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-CATALOG-UNIT, T-CATALOG-AUDIT]
  - id: AC-3
    scenario: S-2
    text: Release notes preserve detailed user-facing milestone highlights, list only verified npm, PyPI, and GHCR artifacts, and omit unavailable channels without mentioning Apple or VS Code distribution.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-CATALOG-UNIT]
  - id: AC-4
    scenario: S-3
    text: Historical v0.10 through v0.13 release records are created as prerelease drafts and never automatically published.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: manual
    verification_ids: [T-HISTORICAL-DRAFTS]
  - id: AC-5
    scenario: S-4
    text: The release command requires an existing annotated tag that resolves to the catalog SHA before creating or updating a draft.
    required: true
    status: satisfied
    coverage_status: covered
    verification_scope: custom
    verification_ids: [T-CATALOG-UNIT, T-CATALOG-AUDIT]

assumptions:
  - id: A-1
    text: The GitHub CLI can create and update releases with the authenticated maintainer account.
    category: tooling
    required_before: task_execution
    status: confirmed
    evidence:
      - source: gh release list
        summary: The CLI listed existing releases in this repository.
  - id: A-2
    text: npm package metadata gitHead values identify the source commit for published historical package versions.
    category: provenance
    required_before: task_execution
    status: confirmed
    evidence:
      - source: npm view openmates@<version> gitHead
        summary: Exact source commits were returned for v0.10, v0.11, and v0.12 package candidates.

contracts:
  catalog:
    - Catalog data lives in docs/releases/milestones.yml and is the source of truth for milestone tag, source SHA, release-note metadata, and verified artifact links.
    - Catalog releases use the existing v0.x.0-alpha tag convention and are prereleases.
    - Historical entries include a backfill notice and original release window.
  artifacts:
    - GitHub source archives are provided by the annotated tag and are never uploaded as duplicate assets.
    - npm and PyPI links must name an exact published version.
    - GHCR links must include a tag and immutable digest verified against the release source.
    - Unverified or unavailable channels are omitted from installation sections, not rebuilt or implied.
  automation:
    - Draft creation requires --verify-tag and a tag resolving to the catalog SHA.
    - The workflow may create or update drafts but must never publish a release.
  privacy_security:
    - Catalogs and release notes contain no credentials, private build paths, user data, or opaque internal artifact URLs.

tests:
  - id: T-CATALOG-UNIT
    type: pytest
    file: scripts/tests/test_release_catalog.py
    command: python3 -m pytest scripts/tests/test_release_catalog.py
    covers: [AC-1, AC-2, AC-3, AC-5]
    assertions:
      - valid historical entries render a source, npm, PyPI, and GHCR availability table
      - unavailable channels are omitted and release notes preserve detailed user-facing highlights
      - invalid tags, non-40-character SHAs, duplicate tags, branch targets, and SHA mismatches fail validation
      - draft command uses --verify-tag and --draft --prerelease
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        command: python3 -m pytest scripts/tests/test_release_catalog.py
        run_id: local:pytest-release-catalog-red
        subject_commit: 6107f6114a798f48caccfbdda7a8befb93e14ef4
        timestamp: "2026-07-10T11:30:08Z"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        command: python3 -m pytest scripts/tests/test_release_catalog.py
        run_id: local:pytest-release-catalog-detailed-notes-green
        subject_commit: fe85386
        timestamp: "2026-07-10T14:30:00Z"
  - id: T-CATALOG-AUDIT
    type: unit
    file: scripts/release_catalog.py
    command: python3 scripts/release_catalog.py audit
    covers: [AC-1, AC-2, AC-5]
    assertions:
      - every catalog tag exists and is annotated
      - every tag resolves to its recorded commit SHA
      - release creation refuses a missing or mismatched tag
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        command: python3 scripts/release_catalog.py audit --tag v0.10.0-alpha
        run_id: local:release-catalog-audit-red
        subject_commit: c42dfc6
        timestamp: "2026-07-10T11:30:08Z"
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        command: python3 scripts/release_catalog.py audit
        run_id: local:release-catalog-audit-green
        subject_commit: fe85386
        timestamp: "2026-07-10T11:30:08Z"
  - id: T-HISTORICAL-DRAFTS
    type: manual
    covers: [AC-4]
    assertions:
      - v0.10 through v0.13 are visible as GitHub prerelease drafts
      - no historical draft is published by the automation
    red_phase:
      required: false
      expected: not_applicable
      evidence:
        status: not_applicable
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: passed
        command: gh release view v0.10.0-alpha --json tagName,targetCommitish,isDraft,isPrerelease
        run_id: manual:historical-release-drafts
        subject_commit: fe85386
        reason: Direct GitHub CLI inspection confirmed each draft, prerelease flag, and immutable targetCommitish.
        timestamp: "2026-07-10T11:30:08Z"

verifications:
  - id: V-HISTORICAL-DRAFTS
    kind: manual_check
    phase: final
    required_for_done: true
    covers: [AC-4]
    status: passed
    evidence:
      status: passed
      summary: v0.10 through v0.13 are GitHub prerelease drafts and each targetCommitish matches its annotated catalog tag.
      reason: Direct GitHub CLI inspection confirmed each draft remains unpublished and points to its catalog commit.
      timestamp: "2026-07-10T11:30:08Z"

implementation_plan:
  spec_path: docs/specs/release-catalog-v1/spec.yml
  existing_patterns:
    - docs/releases/daily/YYYY-MM-DD.yml
    - .github/workflows/publish-cli.yml
    - .github/workflows/publish-selfhost-images.yml
  architecture: >
    Store milestone provenance in YAML, validate it through a small deterministic
    Python CLI, and render reviewable GitHub Release drafts from that source.
  data_flow:
    - Maintainer records a milestone tag, SHA, and verified artifact references.
    - Audit verifies immutable local/remote git provenance and allowed artifact metadata.
    - Draft command validates the annotated tag, renders notes, and invokes gh release create or edit in draft prerelease mode.
  affected_files:
    - path: docs/releases/milestones.yml
      reason: Release catalog source of truth
    - path: scripts/release_catalog.py
      reason: Catalog validation, note rendering, and draft creation
    - path: scripts/tests/test_release_catalog.py
      reason: Deterministic catalog guard tests
    - path: .github/workflows/release-catalog.yml
      reason: Reviewable manual draft workflow
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/release-catalog-v1/spec.yml
    - python3 -m pytest scripts/tests/test_release_catalog.py
    - python3 scripts/release_catalog.py audit
  verification_order:
    - Deterministic local catalog tests and audit
    - GitHub draft inspection
  migration_backfill:
    - Create and push each historical annotated tag through the explicit create-tags action.
    - Audit source and package provenance before creating its draft release.
    - Do not publish historical drafts through automation.
  observability:
    - The CLI prints a PASS, READY, rendered command, or explicit FAIL reason for every milestone action.
  risks:
    - Historic GHCR artifacts may be unavailable and must remain unavailable in the catalog unless their digest and OCI revision label verify.
    - Existing published releases are intentionally immutable to this automation and fail closed.
  open_questions:
    - Which exact commit should anchor the existing v0.14.0-alpha draft?

