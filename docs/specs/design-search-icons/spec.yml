scenarios:
  - id: S-1
    title: CLI searches for design icons
    given:
      - Alice has an OpenMates CLI session or API key configured for the dev API.
      - Alice wants free SVG icons for a UI concept, such as "home", "calendar", or "settings".
    when:
      - Alice runs `openmates apps design search_icons home --count 12 --json` against the dev API.
    then:
      - The command returns a successful response with provider `Iconify`, result_count, a parent embed ID, and child icon embed IDs when embed creation is available.
      - Every returned icon has an Iconify ID, prefix, name, collection name, license metadata, palette flag, and OpenMates SVG fetch path.
      - Results are filtered to permissive/no-attribution licenses by default.

  - id: S-2
    title: Backend creates metadata-only parent and child embeds
    given:
      - Iconify search returns matching icons from one or more icon collections.
    when:
      - The backend creates the `design.search_icons` parent app-skill-use embed and child `icon_result` embeds.
    then:
      - The parent stores query, provider, result_count, license_filter, embed_ids, and lightweight preview_results.
      - Each child stores public metadata only: icon_id, prefix, name, collection, license, author, dimensions, palette flag, and OpenMates SVG path.
      - Neither parent nor child embeds store full SVG markup, PNG bytes, raw Iconify response blobs, provider credentials, or preview-server URLs.

  - id: S-3
    title: OpenMates API serves sanitized Iconify SVG on demand
    given:
      - Alice opens a child icon result preview or fullscreen.
    when:
      - The client requests `GET /v1/apps/design/icons/iconify/{prefix}/{name}.svg` from the regular OpenMates API.
    then:
      - The OpenMates API validates the icon identifier, fetches from Iconify server-side on cache miss, sanitizes SVG markup, caches the safe SVG, and returns `image/svg+xml` or JSON error metadata as appropriate.
      - The client does not call Iconify directly.
      - The preview server is not used for Iconify SVG fetches.

  - id: S-4
    title: Web fullscreen supports local copy, recolor, and PNG export
    given:
      - Alice opens a `design-icon-result` fullscreen in the web app.
      - The icon SVG has loaded from the OpenMates API route.
    when:
      - Alice changes the icon color, copies SVG, or downloads PNG.
    then:
      - Monotone icons can be recolored locally without a new server request per color.
      - Copy SVG places the currently displayed sanitized/recolored SVG markup on the clipboard.
      - Download PNG renders the currently displayed SVG locally to a canvas/blob and downloads a PNG.
      - Palette/multicolor icons preserve original colors and disable or explain unavailable recoloring.

  - id: S-5
    title: Provider failures and license filtering are visible
    given:
      - Iconify is unavailable, returns invalid data, returns no results, or returns only hidden-license matches.
    when:
      - Alice searches icons through CLI, SDK, or web.
    then:
      - No-results and license-filtered-empty states are explicit and not treated as provider crashes.
      - Provider failures return visible typed errors with provider/query context in logs but no private user data or secrets.
      - Unsupported license filters are rejected with validation errors.

  - id: S-6
    title: SDKs expose the same search contract
    given:
      - A developer uses npm or pip SDK with an API key.
    when:
      - The developer calls the generated `design.search_icons` SDK method with the same request schema as CLI.
    then:
      - The SDK sends the request to `/v1/apps/design/skills/search_icons`.
      - The SDK receives the same normalized metadata-only response contract.
      - SDK usage does not require a browser session and does not call Iconify directly.

  - id: S-7
    title: Web renders parent and icon child previews after CLI and SDK gates
    given:
      - CLI and SDK evidence are green.
      - The deployed dev web app has a chat containing a `design.search_icons` parent with child icon results.
    when:
      - Alice opens the chat, parent fullscreen, and a child icon fullscreen.
    then:
      - The parent preview renders useful result metadata without child hydration.
      - Child previews render SVGs through the OpenMates API route only.
      - Fullscreen exposes copy SVG, recolor where supported, PNG download where supported, collection, author, and license metadata.
      - No direct browser request to Iconify or preview server icon route occurs.

  - id: S-8
    title: Apple follows web behavior after user confirmation
    given:
      - The deployed web implementation is verified and explicitly approved by the user.
    when:
      - Apple parity work starts.
    then:
      - Native app renders Design icon search parent/child embeds with OpenMates API-hosted SVG loading only.
      - Native fullscreen offers SVG copy/share and PNG export if native rendering support is practical, or records a scoped accepted blocker for PNG only.

