contracts:
  api:
    - route: POST /v1/apps/design/skills/search_icons
      request: "{ requests: [{ query: string, count?: number = 24, license_policy?: 'permissive' | 'all', include_prefixes?: string[], exclude_prefixes?: string[] }] }"
      response: "{ success: true, data: { provider: 'Iconify', result_count, results: [{ id, query, results: IconResult[] }], parent_embed_id?, embed_ids? } }"
      errors:
        - 400 for missing or blank query.
        - 400 for count outside the accepted range.
        - 400 for unsupported license policy or invalid prefix names.
        - typed provider_unavailable when Iconify search cannot be reached.
    - route: GET /v1/apps/design/icons/iconify/{prefix}/{name}.svg
      request: "path params prefix and name from a stored Iconify icon_id; no color or PNG query parameters in V1"
      response: "image/svg+xml sanitized SVG body with cache headers"
      errors:
        - 400 for invalid prefix or icon name syntax.
        - 404 for Iconify missing icon.
        - 502 for invalid or unsafe SVG returned by provider.
        - 503 for provider unavailable/cache miss failure.
  data:
    - Parent embed type `search_icons` has category `app-skill-use`, skill_id `search_icons`, has_children true, child_type `icon_result`, and parent preview metadata fields query, provider, result_count, license_policy, embed_ids, and preview_results.
    - Child embed type `icon_result` has category `direct` and stores icon_id, prefix, name, display_name, collection_name, collection_category, license_title, license_spdx, license_url, author_name, author_url, width, height, palette, svg_path, and tags.
    - Child embeds must not store SVG markup, PNG bytes, data URLs, raw Iconify responses, provider credentials, or preview-server URLs.
  ui_states:
    - Parent processing, success with results, success with zero results, license-filtered-empty, and provider error.
    - Child preview loading SVG, loaded SVG, SVG load failure, palette icon, monotone icon, known license, unknown/hidden license excluded state.
    - Fullscreen loading SVG text, copy success/failure, color selection, palette recolor-disabled state, PNG export success/failure.
  privacy_security:
    - User search queries are sent from OpenMates backend to Iconify and must be disclosed in provider/privacy docs.
    - Web and Apple clients never call Iconify directly and do not send user IP or client metadata to Iconify from render paths.
    - SVG route sanitizes provider SVG before returning it to clients; unsafe script, event, external resource, and foreignObject content is rejected or removed.
    - Provider metadata and privacy policy are added for Iconify with `no_api_key: true` and verified privacy URL.
    - Logs include provider, query prefix, and icon_id context but not private user content beyond the requested search term needed for debugging.

