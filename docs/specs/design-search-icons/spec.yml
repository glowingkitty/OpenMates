  intentional_native_differences:
    - Apple PNG export can be implemented with native share/export APIs if practical; otherwise SVG copy/share is required and PNG export records a scoped blocker before completion.

clarification:
  rounds:
    - question: Should this skill live in `images` or a new `design` app?
      answer: It should be in a Design app planned for UI and product design workflows.
    - question: Should V1 search all Iconify sets or a curated subset?
      answer: Search all Iconify sets with license filtering.
    - question: Which licenses are shown by default?
      answer: "Use permissive/no-attribution defaults: MIT, ISC, Apache-2.0, BSD variants, CC0, Unlicense, and OFL-1.1."
    - question: Should search result embeds store full SVG markup?
      answer: No. Store metadata only and fetch SVG on demand.
    - question: Should SVG loading go through the preview server?
      answer: No. All provider API access must go through the regular OpenMates server; clients use OpenMates API routes, not Iconify or preview server.
  vision_summary: >
    The Design app V1 starts with an Iconify-backed icon search workflow. Search
    creates a parent result embed and child icon result embeds with lightweight
    metadata; web and Apple fetch SVGs on demand from a regular OpenMates API
    route, locally recolor monotone icons, copy SVG locally, and export PNG
    locally where supported. Iconify is the only V1 provider and all client-side
    direct Iconify or preview-server icon loading is out of scope.
  approved_by_user: true

