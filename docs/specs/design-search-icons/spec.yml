schema_version: 2
id: design-search-icons
title: Design Search Icons Skill
status: approved

goal: >
  Add a new Design app with a provider-backed `design.search_icons` skill that
  finds high-quality free SVG icons from Iconify, returns a parent search embed
  with child icon result embeds, and lets users inspect, recolor, copy, and
  export icons without any client talking directly to Iconify.

scope:
  in:
    - Create a new enabled-by-default `design` app for UI and product design workflows.
    - Add `design.search_icons` as the first Design app skill.
    - Use Iconify public API as the only V1 provider for icon search and SVG retrieval.
    - Search all Iconify icon sets by default while filtering visible results to permissive/no-attribution licenses.
    - Hide attribution, share-alike, non-commercial, GPL, and unknown-license sets by default unless a later approved filter explicitly exposes them.
    - Store lightweight child icon metadata in embeds, not full SVG markup for every search result.
    - Add a regular OpenMates API route for authenticated clients to fetch a sanitized Iconify SVG on demand.
    - Ensure web and Apple clients never call Iconify directly and never use the preview server for Iconify SVG loading.
    - Render parent search embeds with child `icon_result` embeds that show SVG previews.
    - Provide fullscreen actions to copy SVG, locally recolor monotone icons, and locally export PNG where the client supports it.
    - Implement and verify in OpenMates order: CLI against dev first, GitHub Actions/daily wiring, npm SDK, pip SDK, web, user confirmation, Apple.
  out:
    - SVGL/logo search in V1; brand logos need separate trademark-oriented `search_logos` work.
    - Server-side color variants or server-side PNG export in V1.
    - Storing full SVG markup in each search-result embed.
    - Client-side direct requests to `api.iconify.design`.
    - Preview-server routes for Iconify SVGs.
    - Icon generation from prompts; this remains separate from search.
    - License legal advice beyond displaying provider license metadata and filtering defaults.

