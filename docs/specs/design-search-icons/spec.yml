decisions:
  - id: D-1
    status: active
    decision: Create a new `design` app instead of adding icon search to `images`.
    reason: The user stated icon search belongs with UI and product design workflows, and no `backend/apps/design` exists in the current checkout.
    decided_at: "2026-07-18T09:30:00Z"
  - id: D-2
    status: active
    decision: Use Iconify as the only V1 provider and exclude SVGL/logo search.
    reason: Iconify passed direct API probes and supports broad open-source icon search; SVGL returned Cloudflare challenges and logos have separate trademark constraints.
    decided_at: "2026-07-18T09:30:00Z"
  - id: D-3
    status: active
    decision: Store metadata-only child embeds and fetch SVGs on demand from OpenMates API.
    reason: This keeps embeds small, avoids serializing repeated SVG markup, preserves server-side provider control, and still supports copy/recolor/export after fullscreen fetch.
    decided_at: "2026-07-18T09:30:00Z"
  - id: D-4
    status: active
    decision: Recolor and PNG export happen client-side for V1.
    reason: Fetching a base SVG once and modifying/exporting locally reduces provider/API calls and avoids server-side color/PNG endpoint complexity.
    decided_at: "2026-07-18T09:30:00Z"
  - id: D-5
    status: active
    decision: Clients must not call Iconify directly and must not use the preview server for Iconify SVGs.
    reason: The user clarified external API requests must go through the regular OpenMates server, not preview server or browser-direct provider calls.
    decided_at: "2026-07-18T09:30:00Z"

