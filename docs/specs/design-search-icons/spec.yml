    - Apple must not call Iconify directly and must not rely on the preview server for Iconify icons.
    - Apple starts only after CLI, daily wiring, SDK parity, web implementation, deployed Playwright, and explicit user confirmation are complete.
  verification:
    - Run `python3 scripts/apple_remote.py status` before native verification when implementation reaches Apple phase.
