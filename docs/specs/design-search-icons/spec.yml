implementation_plan:
  spec_path: docs/specs/design-search-icons/spec.yml
  existing_patterns:
    - backend/apps/images/app.yml parent search and child image_result embed metadata.
    - backend/apps/images/skills/search_skill.py request-array search skill with grouped results.
    - backend/shared/providers/hi3d/client.py pure async shared provider client.
    - frontend/packages/openmates-cli/src/cli.ts generated typed app-skill command path.
    - scripts/generate_sdk_app_skills.py generated SDK app-skill namespaces.
    - frontend/packages/ui/src/components/embeds/images/ImagesSearchEmbedPreview.svelte parent search UI pattern.
    - frontend/packages/ui/src/components/embeds/images/ImageResultEmbedFullscreen.svelte child fullscreen UI pattern.
  architecture: >
    Add a new `design` app, an Iconify shared provider client, a metadata-only
    `search_icons` app skill, and a regular OpenMates API route for sanitized
    on-demand SVG retrieval. CLI and SDKs use the generated app-skill pathway;
    web and Apple render from stored metadata and fetch SVGs through OpenMates
    API only, with local recolor/copy/export behavior.
  data_flow:
    - CLI, SDK, chat, or web invokes `design.search_icons` with a query and optional filters.
    - Backend validates input and calls Iconify `/search` server-side.
    - Backend filters results to default permissive/no-attribution licenses using collection metadata.
    - Skill creates metadata-only parent and child embeds and returns normalized result groups.
    - Web/Apple preview/fullscreen fetch a selected icon SVG from the regular OpenMates API route on demand.
    - OpenMates API route validates, fetches on cache miss, sanitizes, caches, and returns SVG text.
    - Clients locally recolor monotone SVGs, copy SVG text, and export PNG when supported.
  affected_files:
    - path: docs/specs/design-search-icons/spec.yml
      reason: Product contract, phase gates, and evidence ledger.
    - path: backend/apps/design/app.yml
      reason: New Design app metadata, `search_icons` skill, and parent/child embed type definitions.
    - path: backend/apps/design/skills/search_icons_skill.py
      reason: New Iconify-backed search skill and Pydantic request/response models.
    - path: backend/shared/providers/iconify/
      reason: Pure Iconify API wrapper and models.
    - path: backend/core/api/app/routes/design_icons.py
      reason: Regular OpenMates API route for sanitized on-demand Iconify SVG retrieval.
    - path: backend/providers/iconify.yml
      reason: Provider metadata with no_api_key and verified privacy policy.
    - path: docs/apis/iconify.md
      reason: Provider API documentation, pricing, endpoints, limits, privacy notes.
    - path: shared/docs/privacy_policy.yml
      reason: New third-party provider disclosure.
    - path: frontend/packages/ui/src/i18n/sources/legal/privacy.yml
      reason: Privacy-policy text update for Iconify provider disclosure.
    - path: frontend/packages/ui/src/components/embeds/design/
      reason: Web parent search, child icon preview, child fullscreen, local recolor/copy/export UI.
    - path: frontend/apps/web_app/tests/design-search-icons.spec.ts
      reason: Deployed web rendering and no-direct-Iconify network verification.
    - path: frontend/packages/openmates-cli/src/generated/appSkills.ts
      reason: Regenerated npm SDK and CLI app-skill metadata.
    - path: packages/openmates-python/openmates/generated/app_skills.py
      reason: Regenerated pip SDK app-skill metadata.
    - path: scripts/sdk_cli_parity_live_smoke.py
      reason: Live CLI/SDK parity smoke coverage.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/AppSkillUseRenderer.swift
      reason: Native Design icon result rendering after web approval.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/design-search-icons/spec.yml
    - python3 scripts/spec_verify.py docs/specs/design-search-icons/spec.yml --phase red
    - Run provider test script and backend red tests before implementation.
    - Run real dev CLI proof before SDK, web, or Apple implementation.
    - Wire the same CLI coverage into daily/GitHub Actions after dev CLI success.
    - Run npm and pip SDK parity plus `python3 scripts/audit_sdk_cli_parity.py`.
    - Deploy before Playwright green verification.
    - Ask for explicit user confirmation of deployed web behavior before Apple work.
    - python3 scripts/spec_verify.py docs/specs/design-search-icons/spec.yml
  verification_order:
    - Provider API test script and backend contract red tests.
    - Real dev CLI command against the dev API with no mocked OpenMates API/WebSocket path.
    - GitHub Actions/daily wiring for the same CLI coverage after dev CLI success.
    - npm SDK parity.
    - pip SDK parity.
    - Web implementation and deployed Playwright verification.
    - User confirmation of deployed web behavior and visual quality.
    - Apple remote status plus build/test only after user confirmation.

