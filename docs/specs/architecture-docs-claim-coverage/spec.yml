    - "active architecture docs without claims: 61"
    - "claim-backed active architecture docs: chat-encryption-implementation, signup-and-auth, sync, privacy-promises"
    - "current docs_claims_verify.py errors: 0"
    - "current docs_markdown_links.py broken links: 0"

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This is documentation and deterministic test/audit work only. Apple product code should not change in this spec.
    - Architecture docs under docs/architecture/apple/** may be updated or deleted based on current Apple source and specs, but Xcode verification is not required unless source code changes are introduced by a separate spec.
  verification:
    - Static architecture anchor assertions may inspect Apple files as text when Apple architecture docs claim native source structure.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should the first completion gate cover only docs/architecture/** or every active doc under docs/**?
      answer: >
        Start with architecture. Once completed, decide the best next step to add assertions for other docs. Architecture is the priority now.
    - question: Should outdated or incorrect architecture docs be updated, deleted, or still forced to receive claims?
      answer: >
        They either need to be updated to reflect the real code architecture or deleted. The implementation agent may decide which is appropriate. The essential requirement is that docs describe the actual source of truth from code and link to code files where parts are processed.
    - question: Can extensive assertions include static architecture checks in addition to behavioral tests?
      answer: >
        Static checks may supplement behavioral coverage, but they do not complete
        the architecture docs task. Completion requires behavioral claims linked
        to real tests that are run successfully, unless the doc is a tiny
        index/reference page with an explicit exception.
    - question: What concise claim shape should architecture docs use?
      answer: >
        Use id, claim, source, test or tests, and verified. Code is always the
        source of truth. If a linked assertion fails because code changed, update
        the doc or test to match current code rather than treating the doc as the
        authority.
  vision_summary: >
    The first milestone is complete only when every kept active architecture doc
    is current, code-linked, and backed by concise behavioral claims whose linked
    tests have passed. Static anchors are useful support but cannot substitute for
    behavioral proof. Stale docs should be corrected or removed rather than
    legitimized with weak claims.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Inventory identifies every architecture doc and its claim state
    given:
      - The repository contains architecture Markdown files under docs/architecture/**.
    when:
      - The architecture docs audit runs.
    then:
      - It lists every architecture doc by path, status, title, folder, and claim count.
      - It distinguishes active docs, missing-frontmatter docs, index docs, research-only docs, and docs/specs exclusions.
      - It reports architecture docs with no claims and architecture docs with weak claim profiles.

  - id: S-2
    title: Stale architecture doc is corrected or deleted
    given:
      - An architecture doc describes behavior that does not exist in the codebase.
    when:
      - The implementation audits the doc against source files, tests, routes, schemas, and config.
    then:
      - The doc is either updated to match the implemented architecture and linked source files, or deleted/folded into a correct doc.
      - No kept doc describes planned, abandoned, or historical architecture as current.
      - Broken inbound links caused by deletion or movement are fixed.

  - id: S-3
    title: Kept architecture doc links to source-of-truth code anchors
    given:
      - A kept architecture doc explains a processing flow, data model, API route, worker, frontend service, app skill, or infrastructure behavior.
    when:
      - The doc is updated for this spec.
    then:
      - It links to the primary source files that implement the described behavior.
      - It names stable functions, classes, schemas, route paths, config keys, or workflow steps instead of brittle line numbers.
      - The linked files exist in the repository.

  - id: S-4
    title: Static source anchors supplement behavioral claims
    given:
      - A kept architecture doc declares static source anchors.
    when:
      - The static architecture assertion test runs.
    then:
      - Each claimed file exists.
      - Each claimed function/class/schema/route/config anchor exists in the linked file or declared code search scope.
      - Removed or renamed code anchors fail the static check until docs are updated to match current code.
      - Static claims are reported separately and do not count as behavioral completion for substantive architecture docs.

  - id: S-5
    title: Behavioral architecture claims point to passing real tests
    given:
      - A kept architecture doc claims runtime behavior such as encryption, auth, sync, payment, app skill, embed, or UI flow behavior.
    when:
      - Claims verification and the linked behavioral test command run.
    then:
      - Each behavioral claim uses the concise claim schema: id, claim, source, test or tests, and verified.
      - Each claim points to an existing pytest, unit, integration, workflow, or Playwright assertion marker.
      - Each linked test command has passed for the claim before the spec is marked verified.
      - Claim IDs are globally unique.

  - id: S-6
    title: Every substantive architecture doc has behavioral proof
    given:
      - A kept active architecture doc is not just a tiny index page.
    when:
      - The architecture claim coverage audit runs.
    then:
      - The doc has behavioral claims covering its main assertions or invariants.
      - The doc has no static-only completion profile.
      - If no existing test proves a documented behavior, a focused test is added or the doc is updated to remove/soften the claim to current code reality.
      - Any exception is explicit, narrow, and limited to tiny index/reference docs.

  - id: S-7
    title: Architecture docs stay publishable and navigable
    given:
      - Architecture docs have been updated, deleted, or moved.
    when:
      - Markdown link validation and docs inventory run.
    then:
      - There are no broken Markdown links under docs/architecture/**.
      - docs/architecture/README.md links only to kept architecture docs.
      - docs/specs/ remains excluded from public docs generation.

  - id: S-8
    title: Completion report recommends the next docs area
    given:
      - Every kept active architecture doc has passed the architecture claim coverage gate.
    when:
      - The final report is generated.
    then:
      - It summarizes architecture docs kept, updated, deleted, and claim-backed.
      - It reports behavioral claims, linked test commands, and passing verification evidence.
      - It lists remaining docs outside architecture without claims.
      - It recommends the next area to claim-back, based on user impact and stale-risk.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: A deterministic audit reports every docs/architecture/**/*.md file, its status, and its claim coverage state.
  - id: AC-2
    scenario: S-2
    text: No kept active architecture doc describes unimplemented, stale, or contradicted architecture as current behavior.
  - id: AC-3
    scenario: S-2
    text: Architecture docs that cannot be made accurate and useful are deleted or folded into a correct kept doc, with inbound links repaired.
  - id: AC-4
    scenario: S-3
    text: Every kept active non-index architecture doc links to concrete source files and stable code anchors for the architecture it describes.
  - id: AC-5
    scenario: S-4
    text: Static architecture claims fail when referenced files, functions/classes, routes, schemas, config keys, or workflow anchors disappear, but static claims are supplementary and do not satisfy behavioral coverage for substantive docs.
  - id: AC-6
    scenario: S-5
    text: Every behavioral architecture claim uses the concise schema and points to real assertion markers in pytest, unit, integration, workflow, or Playwright coverage.
  - id: AC-7
    scenario: S-6
    text: Every kept active substantive architecture doc has behavioral claims with successfully run linked tests, with only explicit tiny index/reference exceptions allowed.
  - id: AC-8
    scenario: S-7
    text: Architecture docs have no broken internal Markdown links and architecture indexes link only to kept docs.
  - id: AC-9
    scenario: S-7
    text: The public docs generator still excludes docs/specs/ after architecture docs are updated.
  - id: AC-10
    scenario: S-8
    text: The final architecture docs report recommends the next docs area for claim coverage after architecture.

contracts:
  docs_scope:
    included:
      - docs/architecture/**/*.md
    excluded_for_this_phase:
      - docs/user-guide/**/*.md
      - docs/user-guide/cli/**/*.md
      - docs/self-hosting/**/*.md
      - docs/contributing/**/*.md
      - docs/design-guide/**/*.md
      - docs/specs/**/*.yml
  architecture_doc_policy:
    source_of_truth: code
    allowed_status_outside_specs:
      - active
    delete_or_update_rule: >
      If an architecture doc describes stale, absent, planned, historical, or contradicted behavior, update it to match code or delete/fold it. Do not keep stale docs with weaker wording.
    source_link_rule: >
      Kept non-index architecture docs must link to concrete source files and name stable functions/classes/routes/schemas/config anchors where behavior is processed.
    line_number_rule: Do not use line-number links as claim anchors.
  claim_profile:
    required_for_active_architecture_docs: true
    minimum_for_non_index_docs:
      behavioral_claims: 1
      linked_test_commands_passed: 1
      static_code_anchor_claims: supplemental_only
    index_doc_exception: >
      Small index/reference docs may use static or manual claims only when they
      do not assert runtime/product behavior. The exception reason must state why
      a behavioral test would be noise.
    supported_claim_types:
      - backend
      - integration
      - unit
      - e2e
      - workflow
      - static
      - manual
    completion_rule: >
      A substantive architecture doc is complete only when every behavioral claim
      has a linked assertion marker and its test command has been run green. If a
      test fails because the implemented code differs from the doc, update or
      delete/fold the doc to reflect current code. Code is always the source of
      truth.
  behavioral_claim_schema:
    required_fields:
      - id
      - claim
      - source
      - test or tests
      - verified
    example:
      id: chat-persistence-rejects-vault-ciphertext
      claim: Chat persistence rejects Vault/server ciphertext for stored chat content.
      source:
        - backend/core/api/app/tasks/persistence_tasks.py
      test:
        file: backend/tests/test_persistence_tasks.py
        command: python3 -m pytest backend/tests/test_persistence_tasks.py
        assertion: chat-persistence-rejects-vault-ciphertext
      verified: "2026-06-11"
    notes:
      - Use tests instead of test when multiple commands/assertions prove one claim.
      - verified records the date the linked command last passed for that claim.
      - type may be retained for compatibility during migration, but the concise schema above is the target contract.
  static_anchor_schema:
    purpose: Supplemental source-location checks only; not behavioral completion proof.
    claim_fields:
      - id
      - type: static
      - file
      - assertion
      - anchors
    supported_anchor_types:
      - file_exists
      - function
      - class
      - route
      - schema_field
      - enum_value
      - config_key
      - workflow_step
      - css_class
      - svelte_component
      - swift_type
    assertion_marker: docAssertStatic
  completion_report:
    required_fields:
      - architecture_docs_total
      - active_architecture_docs_kept
      - architecture_docs_deleted_or_folded
      - active_architecture_docs_with_claims
      - total_architecture_claims
      - static_claims
      - behavioral_claims
      - manual_exceptions
      - behavioral_claims_verified
      - linked_test_commands_passed
      - next_docs_area_recommendation

