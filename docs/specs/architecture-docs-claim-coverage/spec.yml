    - docs/contributing/guides/docs-writing-guidelines.md
    - docs/contributing/guides/spec-driven-development.md
    - docs/architecture/README.md
  code_patterns:
    - scripts/docs_claims_verify.py validates claim wiring and assertion marker existence.
    - scripts/docs_markdown_links.py validates relative Markdown links without Playwright.
    - scripts/docs_inventory.py reports docs counts, broken links, statuses, and docs without claims.
    - scripts/docs_claims_impact.py powers non-blocking hook context for changed docs/tests.
    - backend/tests/conftest.py provides doc_assert markers for pytest.
    - frontend/apps/web_app/tests/helpers/doc-checkpoint.ts provides docAssert markers for Playwright.
  tests:
