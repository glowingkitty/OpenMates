implementation_plan:
  existing_patterns:
    - scripts/docs_claims_verify.py validates claim marker wiring.
    - scripts/docs_inventory.py reports docs without claims and broken links.
    - scripts/docs_markdown_links.py validates relative Markdown and code links.
    - frontend/apps/web_app/tests/helpers/doc-checkpoint.ts provides docAssert and docAssertStatic.
    - backend/tests/conftest.py provides doc_assert.
  architecture: >
    Add an architecture-specific audit layer on top of the existing docs claims
    infrastructure. The new layer should inventory docs/architecture, enforce a
    claim profile for kept active docs, and validate static source anchors while
    existing behavioral tests continue to prove runtime behavior.
  data_flow:
    - Build a list of docs/architecture Markdown files and parse frontmatter claims.
    - For each active doc, classify it as index, implementation architecture, research/stale, or deletion candidate.
    - Compare implementation docs against source files and tests before editing prose.
    - Add static code-anchor claims for source files and stable anchors.
    - Add or reuse behavioral doc_assert/docAssert markers for runtime invariants, using the concise claim schema.
    - Run every unique linked claim test command and record each claim's verified date only after green evidence exists.
    - Run behavioral claim verification, static anchor verification, Markdown link validation, and docs generation.
    - Generate a completion report with next-docs-area recommendation.
  affected_files:
    - path: scripts/docs_architecture_claim_audit.py
      reason: New architecture-specific inventory, claim profile, and completion report.
    - path: scripts/docs_static_claims.py
      reason: New static source anchor verifier for architecture claims.
    - path: scripts/tests/test_architecture_docs_claim_audit.py
      reason: Regression tests for architecture coverage reporting.
    - path: scripts/tests/test_architecture_static_claims.py
      reason: Regression tests for source anchor checks.
    - path: scripts/docs_claims_verify.py
      reason: Enforce active architecture docs behavioral claim schema and marker wiring after rollout.
    - path: scripts/docs_architecture_behavioral_claims.py
      reason: Run or report unique behavioral claim commands and completion evidence.
    - path: docs/architecture/**/*.md
      reason: Audit, update, delete/fold, source-link, and claim-back architecture docs.
    - path: backend/tests/**/*.py
      reason: Add doc_assert markers for backend architecture behavior where missing.
    - path: frontend/apps/web_app/tests/**/*.spec.ts
      reason: Add docAssert markers for web architecture behavior where existing flows prove claims.
    - path: frontend/packages/**/tests/**/*.ts
      reason: Add unit docAssert markers for frontend/CLI architecture claims where appropriate.
    - path: docs/specs/architecture-docs-claim-coverage/spec.yml
      reason: Record red/green evidence and final report metadata.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/architecture-docs-claim-coverage/spec.yml
    - python3 -m pytest scripts/tests/test_architecture_docs_claim_audit.py
    - python3 -m pytest scripts/tests/test_architecture_static_claims.py
    - python3 -m pytest scripts/tests/test_docs_claims_enforcement.py scripts/tests/test_docs_claims_verify.py
    - python3 -m pytest scripts/tests/test_docs_markdown_links.py
    - python3 scripts/docs_markdown_links.py
    - python3 scripts/docs_claims_verify.py --json
    - python3 scripts/docs_architecture_behavioral_claims.py --json
    - python3 scripts/docs_architecture_claim_audit.py --report-json test-results/docs-architecture-claims-report.json
    - cd frontend/apps/web_app && npm run build:docs

