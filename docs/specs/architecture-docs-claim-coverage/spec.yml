risks:
  - "Risk: One giant architecture-doc cleanup becomes too large for one session. Mitigation: implement in folder batches, but do not mark the spec verified until every kept active architecture doc passes the final audit."
  - "Risk: Static source-anchor checks become brittle if they overfit formatting. Mitigation: check stable symbols, route strings, schema keys, config keys, and workflow steps, not line numbers or incidental whitespace."
  - "Risk: Adding weak claims creates false confidence. Mitigation: enforce claim profile minimums and require manual exceptions to explain why stronger claims would be noise."
  - "Risk: Docs reveal planned or internal-only work as current architecture. Mitigation: update to implemented behavior or delete/fold stale docs; create follow-up issues/specs for real planned work."
  - "Risk: Apple architecture docs require native build verification. Mitigation: this spec only changes docs/static assertions; any Apple code changes require a separate Apple verification workflow."

open_questions:
  - Which folder should be audited first during implementation: core/data/privacy or apps/AI/infrastructure?
  - Should the final next-docs-area recommendation prefer user-guide docs because they are public-user-facing, or CLI/self-hosting docs because they have higher technical drift risk?
  - Should architecture claim profile minimums become hard deploy-gate failures immediately after this spec, or remain an explicit script until all docs areas adopt claims?
