id: architecture-docs-claim-coverage
title: Architecture Docs Claim Coverage And Source Truth Audit
status: verified

goal: >
  Make docs/architecture/ a trustworthy source-of-truth map of the implemented
  OpenMates codebase. Every kept active architecture doc must describe current
  code behavior, link to the source files where that behavior is implemented,
  and declare concise behavioral claims backed by real unit, integration,
  backend, workflow, or Playwright assertions that have been run green.

scope:
  in:
    - Audit every Markdown file under docs/architecture/**.
    - Delete or fold architecture docs that describe stale, unimplemented, or duplicate architecture.
    - Update kept docs so prose reflects the actual current code, not planned or historical behavior.
    - Add code source links for the concrete files, functions, classes, schemas, routes, settings, workflows, or config keys that process the documented behavior.
    - Add concise behavioral claim frontmatter for every kept active architecture doc.
    - Add or extend real unit, integration, backend, workflow, or Playwright assertions for each documented behavior claim.
    - Run the linked tests successfully and record verification evidence in each claim.
    - Keep deterministic static architecture claims only as supplemental source-location checks or justified tiny index/reference exceptions.
    - Produce an end-state report recommending the next docs area after architecture.
  out:
    - Adding claim coverage for user-guide, cli, self-hosting, design-guide, or contributing docs during this first phase.
    - Rewriting product architecture to match docs; code is the source of truth and docs must follow it.
    - Treating file-existence/static source-anchor checks as sufficient proof of behavioral architecture claims.
    - Keeping planned, idea, todo, partial, or in-progress architecture docs outside docs/specs/.
    - Adding brittle line-number checks as claim assertions.
    - Running Playwright solely to validate Markdown links.
    - Implementing major product behavior changes discovered during doc review; create follow-up issues/specs instead.

