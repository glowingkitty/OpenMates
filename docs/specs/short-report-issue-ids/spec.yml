risks:
  - A 5-character ID has limited namespace size; uniqueness relies on database uniqueness and bounded retry.
  - Short IDs are guessable aliases, so all lookup routes must preserve authorization checks.
  - Old issue records may not have short IDs until a future backfill; UI should tolerate missing `short_issue_id` during rollout.

open_questions:
  - Should old issue reports be backfilled with short IDs in a later maintenance task?
