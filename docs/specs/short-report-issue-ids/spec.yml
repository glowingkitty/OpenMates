implementation_plan:
  existing_patterns:
    - backend/core/directus/schemas/issues.yml uses YAML field definitions and `unique: true` maps to Directus field uniqueness on create.
    - backend/core/api/app/routes/settings.py already creates issue records and returns `issue_id`.
    - frontend report issue flow already stores the submitted ID for the confirmation sub-page.
    - OpenMates CLI settings commands proxy to `/v1/settings/...` routes.
  architecture: >
    Add a backend-generated public alias for new issue reports. The UUID remains
    the durable primary key and internal correlation value; `short_issue_id` is a
    unique user-facing alias returned to clients and accepted by lookup routes.
  data_flow:
    - Server generates a short ID before creating the Directus issue record.
    - Server stores both UUID and short ID on the issue record.
    - Web and CLI display the short ID to users.
    - Web and CLI status calls can use the short ID; backend resolves it before authorization decisions.
    - Internal log/YAML/Linear calls continue to use the UUID.
  affected_files:
    - path: backend/core/directus/schemas/issues.yml
      reason: Add unique `short_issue_id` field.
    - path: backend/core/api/app/routes/settings.py
      reason: Generate, store, return, and resolve short issue IDs.
    - path: backend/scripts/debug_issue.py
      reason: Allow admin/debug issue lookup by short ID.
    - path: backend/tests/test_short_report_issue_ids.py
      reason: Backend contract tests.
    - path: frontend/packages/ui/src/stores/reportIssueStore.ts
      reason: Store display and internal issue IDs separately.
    - path: frontend/packages/ui/src/components/settings/SettingsReportIssue.svelte
      reason: Store short ID for confirmation while retaining UUID for logs.
    - path: frontend/packages/ui/src/components/settings/SettingsReportIssueConfirmation.svelte
      reason: Display/copy short ID.
    - path: frontend/packages/ui/src/services/issueReportSubmission.ts
      reason: Return short ID from helper reports.
    - path: frontend/packages/ui/src/services/chatErrorReportConsent.ts
      reason: Use the short ID in the success notification when available.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Print short ID and accept it for status.
    - path: frontend/packages/openmates-cli/tests/cli.test.ts
      reason: CLI create/status coverage.
    - path: frontend/apps/web_app/tests/report-issue-flow.spec.ts
      reason: Web E2E confirmation/status coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/short-report-issue-ids/spec.yml
    - python3 -m pytest backend/tests/test_short_report_issue_ids.py
    - npm run test:unit:cli from frontend/packages/openmates-cli
    - python3 scripts/tests.py run -- --spec report-issue-flow.spec.ts after deploy
    - python3 scripts/apple_remote.py status and build-ios if reachable
  verification_order:
    - Backend pytest first.
    - CLI unit test second.
    - Web Playwright red before implementation and green after deploy.
    - Apple remote build after backend/frontend verification because settings/report issue has a native counterpart.

