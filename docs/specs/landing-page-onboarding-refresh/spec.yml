scenarios:
  - id: S-1
    title: Fresh logged-out visitor sees expanded app-shell intro
    given:
      - A fresh logged-out visitor opens `/` without a chat hash.
      - The page is rendered inside the normal OpenMates app shell.
    when:
      - The guest welcome state finishes initial loading.
    then:
      - The guest daily inspiration intro expands to fill the active chat container.
      - The headline reads exactly `Simply ask your` and `AI team mates` on separate lines.
      - A user-message style bubble rotates through the four approved short requests.
      - Active app icons move in two rails under the message bubble.
      - The current matching active app icon is visually emphasized.
      - The existing-style progress bar is visible at the bottom.

  - id: S-2
    title: Visitor can skip intro and see regular-size slide 2
    given:
      - A logged-out visitor is viewing the expanded intro.
    when:
      - The visitor clicks the right carousel arrow before the intro completes.
    then:
      - The expanded intro collapses immediately.
      - The regular daily inspiration header shows slide 2 with `Actionable.` and `Not just a wall of text.`.
      - The example-chat area remains visible below the header.

  - id: S-3
    title: Intro auto-collapses after the fourth request
    given:
      - A logged-out visitor does not interact with the intro.
    when:
      - The intro reaches the end of `Explain the news`.
    then:
      - The intro collapses without a hold screen.
      - Slide 2 appears at regular daily inspiration header size.
      - The page remains usable with the message input and example-chat carousel visible.

  - id: S-4
    title: Future actionable slide demonstrates embeds without full chat complexity
    given:
      - The visitor is on the `Actionable` slide.
    when:
      - The slide plays the first event explainer animation.
    then:
      - The animation shows a simple user message for tech events in Berlin.
      - It shows a real chat-history-style user bubble with the speech-tail pointer.
      - It shows a real chat-history-style assistant response with a mate profile image and speech-tail pointer saying it found a real Luma event.
      - A real events embed preview for `DEPIN DAY BERLIN` fades in with its Luma cover image.
      - A visible cursor moves over the preview and clicks it.
      - The click reveals the actual CTA text `Open on Luma`, and the cursor clicks that CTA.
      - The slide does not show the rejected simplified fullscreen/map surface.
      - The animation is visually faithful to real OpenMates chat and events embed styling without mounting a full interactive chat runtime.

  - id: S-5
    title: Future landing sections show filtered real examples instead of pre-signup tags
    given:
      - A logged-out visitor views any regular-size explanatory slide.
    when:
      - The slide changes between actionable, privacy, mates/focus modes, and cross-platform benefits.
    then:
      - The cards below the header show real matching public example chats for the current benefit.
      - "`Show all example chats` opens the all-examples grid."
      - Secondary links alternate between apps exploration and privacy/encryption education as specified by the active benefit.
      - Topic tags are not shown before signup.

  - id: S-6
    title: Future post-signup onboarding replaces public examples
    given:
      - A visitor completes signup.
    when:
      - The app returns to the welcome/new-chat area.
    then:
      - The public example-chat area is replaced by an onboarding flow that offers chat import, job-based topic selection, and filtered inspiration.
      - If imported chats exist, the user sees `Continue where you left off` with real user chats instead of generic example chats.

