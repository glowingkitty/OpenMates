    decision: The expanded full-container state is one-time per fresh page load but not persisted as seen.
    reason: Replaying preserves the product overview for every fresh visitor while manual arrows keep it skippable.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: The icon rails may only use active app metadata.
    reason: The user rejected showing non-existing, inactive, or future app affordances in the landing intro.
    decided_at: "2026-07-22"
  - id: D-4
    status: active
