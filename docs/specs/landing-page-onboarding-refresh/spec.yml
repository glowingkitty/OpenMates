        summary: Existing app metadata is the source for active app icon/color rendering.
  - id: A-2
    text: Phase 1 is browser-only visual behavior and does not change REST, WebSocket, CLI, SDK, or encryption contracts.
    category: phase_gate
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/components/DailyInspirationBanner.svelte
        summary: The change is contained to Svelte rendering and CSS for logged-out guest intro state.
  - id: A-3
