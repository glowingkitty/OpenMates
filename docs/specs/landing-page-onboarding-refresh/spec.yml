risks:
  - Motion can overwhelm users if the first intro is too long; mitigate with manual arrows, progress bar, and reduced-motion fallback.
  - "`DailyInspirationBanner.svelte` is already complex; phase 1 should keep logic localized and avoid changing authenticated behavior."
  - Existing Playwright tests expect tag-first guest onboarding and may need careful assertion updates to distinguish phase-1 intro from future tag removal.
  - Figma structured metadata was rate-limited; screenshots and user notes are the current phase-1 design authority.

