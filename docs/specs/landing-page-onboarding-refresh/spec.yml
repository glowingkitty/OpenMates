schema_version: 2
id: landing-page-onboarding-refresh
title: Landing Page Onboarding Refresh
status: implementing

goal: >
  Make the logged-out OpenMates landing experience explain the product clearly to
  non-technical visitors by reusing the real app shell, existing daily inspiration
  header, active app metadata, and public example-chat system. The first shipped
  slice expands the guest daily inspiration header into a full active-chat intro
  animation that communicates: "Simply ask your AI team mates".

scope:
  in:
    - A full landing-page product contract for the logged-out discovery journey.
    - A phase-1 implementation of the expanded first guest intro animation only.
    - Reuse and update `DailyInspirationBanner.svelte` and the existing `ActiveChat.svelte` welcome placement before adding new top-level surfaces.
    - Logged-out first slide expands to fill the active chat container, then collapses into the regular daily inspiration header size.
    - Only active OpenMates app icons from current web app metadata appear in the intro icon rails.
    - The first intro replays on every fresh logged-out page load.
    - Manual previous/next buttons skip or navigate slides immediately.
    - The current slide progress bar remains visible at the bottom of the intro/header.
    - Later logged-out slides explain actionable embeds, privacy/safety, mates/focus modes, and provider/cross-platform independence.
    - Example chats are selected from existing public example chats first; new example chats are added only when no suitable existing chat exists and must remain SEO-safe public fixtures.
    - Topic tags move out of pre-signup landing and into post-signup onboarding.
  out:
    - Replacing the chat app shell with a separate static marketing page.
    - Showing inactive, future, or provider-only app icons in the intro rails.
    - Implementing all later landing slides in phase 1.
    - Implementing account import, external provider import UI, topic inference, onboarding video-call scheduling, README/CLI/social copy updates, or Apple parity in phase 1.
    - Changing anonymous free-usage budgets, signup billing, chat encryption, or app-skill execution behavior.
    - Rendering a full interactive chat or embed runtime inside compact autoplay explainer animations; visual-only reuse of real chat/embed components and styles is allowed when it is deterministic.

current_milestone:
  id: phase-2-actionable-event-slide
  goal: >
    Implement, deploy, and verify the first regular-size follow-up slide after the
    expanded logged-out intro: the `Actionable` Luma event preview explainer.
  in:
    - Full-container intro for the first guest slide only.
    - Headline `Simply ask your\nAI team mates` with the existing AI/sparkle visual language.
    - User-message style bubble rotating through `Find doctor appointments`, `Find events`, `Build a web app`, and `Explain the news`.
    - About 8.5 seconds total intro timing: roughly 0.6s entrance, 1.7s per request, then about 1.1s collapse.
    - Two active-app icon rails moving continuously in opposite directions, timed so Health, Events, Code, and News are near center during the matching request.
    - Highlighted active app opacity/scale emphasis while non-current icons are muted.
    - Existing-style progress bar and left/right controls.
    - Skip behavior: pressing next during expanded intro collapses immediately and shows slide 2 at regular header size.
  deferred:
    - Privacy and safety slide animations.
    - Mates and focus-mode slide animations.
    - Provider/cross-platform slide animations.
    - Post-signup import/topics/inspiration onboarding.
    - Documentation, README, CLI, and social communication updates.

