implementation_plan:
  spec_path: docs/specs/landing-page-onboarding-refresh/spec.yml
  existing_patterns:
    - frontend/packages/ui/src/components/DailyInspirationBanner.svelte
    - frontend/packages/ui/src/components/ActiveChat.svelte
    - frontend/packages/ui/src/data/appsMetadata.ts
    - frontend/apps/web_app/tests/guest-interest-smart-selection.spec.ts
  architecture: >
    Keep the landing in the existing app shell. Extend the guest intro variant of
    DailyInspirationBanner with an expanded-first-slide state, metadata-backed
    icon rails, deterministic request timing, and immediate skip/collapse behavior.
    Later slides can add lightweight explainer animation subcomponents without
    mounting the full chat/embed runtime inside autoplay header animations.
  data_flow:
    - ActiveChat renders DailyInspirationBanner with `variant='guest-intro'` for logged-out welcome state.
    - DailyInspirationBanner detects first guest intro slide and starts expanded on mount for logged-out users.
    - Intro request timing drives current request text, highlighted app id, icon-rail alignment, and progress.
    - Manual next/previous updates the carousel immediately and disables the expanded intro state for the current component instance.
    - Auto completion collapses and advances to slide 2.
  affected_files:
    - path: docs/specs/landing-page-onboarding-refresh/spec.yml
      reason: Product contract, implementation plan, and evidence ledger.
    - path: frontend/packages/ui/src/components/DailyInspirationBanner.svelte
      reason: Phase-1 guest intro animation implementation.
    - path: frontend/apps/web_app/tests/guest-interest-smart-selection.spec.ts
      reason: Focused deployed Playwright coverage for the refreshed logged-out intro.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/landing-page-onboarding-refresh/spec.yml
    - python3 scripts/tests.py run --spec guest-interest-smart-selection.spec.ts before implementation for red evidence if feasible.
    - bash scripts/lint_changed.sh with focused `--path` arguments for the touched files before deploy.
    - python3 scripts/sessions.py deploy --session aab5 after focused local checks.
    - python3 backend/scripts/debug.py vercel until Ready.
    - python3 scripts/tests.py run --spec guest-interest-smart-selection.spec.ts after deploy for green evidence.
    - User visual confirmation before activating slide 2 work or Apple parity.
  verification_order:
    - Spec validation.
    - Browser-only web implementation and focused local static/lint checks.
    - Deploy to dev.
    - Web Playwright against app.dev.openmates.org.
    - User visual confirmation.
    - Later slide-by-slide tasks and Apple parity only after confirmation.

