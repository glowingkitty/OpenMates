contracts:
  api:
    - route: none
      access_model: browser-only UI change
      auth: no API contract changes
      rate_limits: unchanged
      credit_budget: unchanged
      encrypted_or_plaintext_data: no new server data handled
  data:
    - Active app icon rails derive from active app metadata only; no fake apps or inactive apps are introduced.
    - Phase 1 does not persist a `seen intro` flag; replay is tied to fresh page load/component initialization.
    - Public example chat data is not changed in phase 1.
  ui_states:
    - Expanded logged-out intro.
    - Manual skip to slide 2.
    - Auto-collapse to slide 2.
    - Reduced-motion fallback keeps content readable and navigation usable without complex motion.
    - Authenticated users keep the existing default daily inspiration behavior and never see the expanded guest intro.
  privacy_security:
    - No cleartext interests are collected before signup in the refreshed landing flow.
    - Phase 1 introduces no analytics payloads, tracking IDs, or persistence of visitor categories.
    - Public demo text and icons contain no private user data.

