  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/guest-interest-smart-selection/spec.yml
    - docs/specs/example-chat-public-quality/spec.yml
    - docs/specs/apple-reminders-public-content-parity/spec.yml
    - docs/architecture/frontend/web-app.md (stale per sessions.py, not loaded as authority for new behavior)
  code_patterns:
    - frontend/apps/web_app/src/routes/+page.svelte mounts the real app shell and `ActiveChat` instead of a separate marketing page.
    - frontend/packages/ui/src/components/ActiveChat.svelte renders `DailyInspirationBanner` above the welcome content with `variant='guest-intro'` for logged-out users.
    - frontend/packages/ui/src/components/DailyInspirationBanner.svelte already owns guest intro copy, carousel arrows, progress animation, mobile card alternation, and default inspiration rendering.
    - frontend/packages/ui/src/components/GuestInterestTags.svelte currently renders logged-out interest selection; this refresh moves tags after signup.
    - frontend/packages/ui/src/demo_chats/exampleChatData.ts registers public example chats, including events, Artemis, code, privacy, memory, health, and CLI-related examples.
    - frontend/packages/ui/src/demo_chats/interestTags.ts currently maps guest tags to daily inspirations, intro chats, and example chats.
    - frontend/packages/ui/src/data/appsMetadata.ts and generated app metadata provide the active app list and app icon/color sources.
  tests:
    - frontend/apps/web_app/tests/guest-interest-smart-selection.spec.ts currently checks logged-out guest intro visuals and tag-first onboarding.
    - frontend/apps/web_app/tests/daily-inspiration-chat-flow.spec.ts checks daily inspiration carousel controls and progress behavior.
    - frontend/apps/web_app/tests/unauthenticated-chat-navigation.spec.ts checks logged-out welcome responsiveness.
    - frontend/apps/web_app/tests/language-switch-welcome-screen.spec.ts checks translated welcome screen state.

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/Views/DailyInspirationView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ExampleChatsView.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
  parity_expectations:
    - Apple parity is not part of phase 1 because the approved milestone is web landing animation only.
    - A later Apple task must decide whether native logged-out entry should mirror the expanded intro animation or intentionally keep a native-specific onboarding shape.
  verification:
    - Phase 1 records Apple deferred with reason after web deploy and user visual confirmation.
  intentional_native_differences:
    - None approved yet; native behavior is deferred rather than declared different.

clarification:
  rounds:
    - question: Should the new logged-out landing replace the current ActiveChat welcome state or update the existing daily inspiration/header path?
      answer: Update existing components first. The intro belongs in the existing daily inspirations header/guest intro path, expanded for logged-out users on load.
    - question: After the first full-container intro collapses, should later slides also expand?
      answer: No. Only the `Simply ask your AI team mates` intro fills the active chat container; all later slides remain regular daily inspiration header size so example chats below stay visible.
    - question: Should the intro replay on every fresh page load or be remembered as seen?
      answer: Replay on every fresh logged-out page load, with previous/next buttons letting impatient users skip immediately.
    - question: What timing and request order should the intro use?
      answer: Use about 8.5 seconds total, with the order `Find doctor appointments`, `Find events`, `Build a web app`, `Explain the news`.
    - question: Which icons should appear in the intro app rails?
      answer: Only exact active app icons from the web app. Do not show inactive, non-existing, or future apps. Highlight Health, Events, Code, and News for the matching short request.
    - question: How should app rail movement work?
      answer: Rails move continuously at the same speed, in opposite directions, and the icon order/timing should align the relevant app near center when its matching request is visible.
    - question: What should happen after the fourth request?
      answer: Auto-collapse immediately and switch to slide 2, showing `Actionable.\nNot just a wall of text.`; keep the progress bar.
    - question: Should slide 2 initially include all mini-animations or one polished example?
      answer: Implement only the `Find events` mini-animation first for slide 2; other slide internals come later.
    - question: Should the `Find events` animation render real embed components or a lightweight visual match?
      answer: Use a simplified deterministic animation, but its user/assistant messages must match the real chat history UI and its events surfaces must reuse or mirror the real events embed preview/fullscreen designs.
    - question: Which event should the first `Actionable` animation represent?
      answer: Use a language-learning event in Berlin. The sequence is user message, `Sure, let me help with that!`, fade response up/out, fade in embed preview, then expand preview into fullscreen details while the scene zooms out.
  vision_summary: >
    Logged-out users should understand OpenMates from the real app UI before they
    choose topics or read long intro chats. The first page load should feel like a
    concise animated product overview using real active apps and short natural
    requests, then collapse into the existing welcome/example-chat discovery area.
  approved_by_user: true

