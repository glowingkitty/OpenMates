assumptions:
  - id: A-1
    text: Web source behavior is authoritative for this parity slice, including unauthenticated audio recording behavior.
    category: product
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/apps/web_app/tests/audio-recording.spec.ts
        summary: Web tests run audio recording as an unauthenticated user and assert short tap, hold, release, and cancel behavior.
      - source: user confirmation 2026-07-08
        summary: User explicitly requested full parity with the web app and no questions already answered by web code.
  - id: A-2
    text: OS-owned Apple pickers can be represented in XCUITest with seeded fixtures when direct automation is not reliable.
    category: testing
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
        summary: Existing tests already use debug-only seeded composer embeds to verify pending-attachment hierarchy without private credentials or OS picker automation.
  - id: A-3
    text: Apple welcome composer can host action overlays and pending content through existing MessageComposerView overlayContent/preFieldContent/action callback seams.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
        summary: Shared composer accepts overlayContent and actionButtons builders and host-provided callbacks.
      - source: apple/OpenMates/Sources/App/MainAppView.swift
        summary: WelcomeComposer already passes overlayContent and callbacks for location, sketch, camera, and recording.

contracts:
  api:
    - No new backend API routes are required.
    - Existing Apple upload/transcription/send adapters may be reused or connected when authenticated actions insert pending content.
  data:
    - Welcome composer pending content must have typed display state for file, sketch, camera photo, location, and recording items.
    - Pending display state must not include raw private paths, raw JSON embed references, auth tokens, encryption keys, or unredacted diagnostics.
    - Recording preview state must track completed vs cancelled recording so cancellation cannot leave stale pending content.
  ui_states:
    - Signed-out focused empty composer.
    - Signed-out audio short-tap hint.
    - Signed-out audio recording overlay.
    - Audio recording completed preview.
    - Audio recording cancelled state.
    - Signed-out blocked file/sketch/camera CTA.
    - Authenticated or seeded pending file, sketch, camera, location, and recording content.
    - Location overlay open, selected, and cancelled.
    - Focused composer with suggestions outside the composer host.
  privacy_security:
    - Tests must use synthetic prompts and seeded fixtures only.
    - Specs, tests, and diagnostics must not commit private user data, private file paths, raw audio contents, location coordinates from a real user, credentials, or simulator host details.
    - Location tests should use deterministic placeholder coordinates or seeded MapKit/search fixtures where possible.
  accessibility:
    - Keep web-mapped identifiers stable: message-composer, message-field, message-editor, action-buttons, attach-files-button, share-location-button, sketch-button, take-photo-button, record-audio-button, send-button, record-overlay, release-text, timer-pill, cancel-hint, mic-button, press-hold-label, location-overlay.
    - Hidden unavailable actions must not leave dead focusable controls.
    - Native labels remain localized through AppStrings.

