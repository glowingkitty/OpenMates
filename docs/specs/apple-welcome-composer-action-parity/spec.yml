implementation_plan:
  existing_patterns:
    - docs/specs/apple-unified-message-composer/spec.yml
    - frontend/apps/web_app/tests/audio-recording.spec.ts
    - frontend/apps/web_app/tests/file-attachment-flow.spec.ts
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
  architecture: >
    Preserve the shared MessageComposerView visual shell and move missing welcome
    action semantics into NewChatWelcomeView/WelcomeComposer host state. Add typed
    pending composer content for welcome actions, make audio follow web signed-out
    behavior, keep file/sketch/camera auth gates aligned with web, and extend
    XCUITests to prove action outcomes rather than only button visibility.
  data_flow:
    - User focuses welcome composer; MessageComposerView shows web action row.
    - Audio short tap updates a hold hint state only; audio hold starts the recording overlay after the web threshold.
    - Audio release converts the native recording into pending recording display state; cancel clears it.
    - Location selection converts the chosen location into visible sendable composer content.
    - Signed-out file/sketch/camera actions set anonymousAttachmentPending and show signup CTA without inserting embeds.
    - Authenticated or seeded file/sketch/camera actions convert selected/captured content into pending display state and enable send.
  affected_files:
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Welcome composer action state and callbacks.
