id: apple-welcome-composer-action-parity
title: Apple Welcome Composer Action Parity
status: verified

goal: >
  Make the Apple welcome/new-chat composer action buttons behave like the web
  MessageInput.svelte composer, not merely appear visually similar. The web app
  is the source of truth for each button's signed-in, signed-out, overlay,
  recording, cancellation, and pending-embed outcomes.

scope:
  in:
    - The Apple welcome/new-chat composer in NewChatWelcomeView and WelcomeComposer.
    - Web-parity behavior for files, location, sketch, camera, record audio, and send/auth actions.
    - Web-equivalent Apple E2E tests for audio recording and file/pending-embed flows.
    - Apple UI tests for source-defined location, sketch, camera, composer height, focus, and overlay behavior.
    - Remote Mac build and targeted XCUITest verification before the work is marked done.
  out:
    - Redesigning the web composer.
    - Replacing OS-owned Apple file, photo, camera, microphone permission, or map controllers with custom clones.
    - Changing backend send, encryption, upload, transcription, or sync APIs except where existing Apple adapters need to call them correctly.
    - Completing full authenticated message send parity for every attachment type if the web source only requires in-composer insertion for this slice.
    - TestFlight deployment as completion evidence.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'Apple composer audio recording web parity' returned no matching issues."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'welcome composer action buttons Apple' returned no matching issues."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'message input Apple parity' returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - .claude/rules/apple-ui.md
    - apple/AGENTS.md
    - docs/specs/apple-unified-message-composer/spec.yml
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/MessageInput.svelte owns composer focus, overlay height, pending embeds, auth gates, and action event wiring.
    - frontend/packages/ui/src/components/enter_message/ActionButtons.svelte defines the web action order and mic short-tap hint.
    - frontend/packages/ui/src/components/enter_message/handlers/recordingHandlers.ts defines mic permission and 200 ms hold threshold behavior.
    - frontend/packages/ui/src/components/enter_message/RecordAudio.svelte defines release-to-finish, Escape cancel, document release, drag-left cancel, and recording preview insertion events.
    - frontend/packages/ui/src/components/enter_message/MapsView.svelte defines the 400 px map overlay, close/search/current-location/select actions, precise toggle, and map embed insertion contract.
    - frontend/packages/ui/src/components/enter_message/SketchView.svelte defines the 400 px sketch overlay, close, disabled Done when empty, export-to-image, and insertImage pipeline.
    - frontend/packages/ui/src/components/enter_message/CameraView.svelte defines camera overlay or native camera fallback and photo-to-image-embed pipeline.
    - apple/OpenMates/Sources/App/MainAppView.swift currently hosts NewChatWelcomeView and WelcomeComposer action callbacks.
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift supplies the shared visual composer shell but leaves action semantics to host callbacks.
    - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift provides native recording overlay identifiers matching RecordAudio.svelte.
    - apple/OpenMates/Sources/Features/Chat/Views/MapsShareView.swift provides the current native location overlay.
    - apple/OpenMates/Sources/Features/Chat/Views/SketchView.swift provides the current native sketch overlay.
  tests:
    - frontend/apps/web_app/tests/audio-recording.spec.ts
    - frontend/apps/web_app/tests/file-attachment-flow.spec.ts
    - frontend/apps/web_app/tests/apple-ui-contracts.spec.ts
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/App/MainAppView.swift
    - apple/OpenMates/Sources/Shared/Components/MessageComposerView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/MapsShareView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/SketchView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/AttachmentPicker.swift
    - apple/OpenMatesUITests/ComposerVisualParityUITests.swift
    - apple/OpenMatesUITests/MessageInputAttachmentUITests.swift
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
  parity_expectations:
    - The welcome composer uses the same action identifiers and visual shell as the web composer: attach-files-button, share-location-button, sketch-button, take-photo-button, record-audio-button, action-buttons, message-field, message-editor, and send-button.
    - Signed-out audio recording follows the web audio-recording.spec.ts behavior and is not blocked behind signup merely because the user is unauthenticated.
    - Signed-out file, sketch, and camera actions follow the web attachment gates: they cannot insert binary/file embeds without auth and must surface the signup CTA instead of no-oping.
    - Location remains available from the signed-out welcome composer, opens an in-field location overlay, and inserts location context into the composer rather than no-oping.
    - Authenticated file, sketch, camera, location, and audio outcomes produce visible pending content in the composer, enabling send just like web in-editor embeds do.
    - Overlay heights and focused welcome composer size follow the web MessageInput contract: focused empty composer stays near the web expanded height, overlays grow the field to 400 px, fullscreen expansion stays a deliberate composer state.
  verification:
    - python3 scripts/spec_validate.py docs/specs/apple-welcome-composer-action-parity/spec.yml
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ComposerVisualParityUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAudioRecordingUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/MessageInputAttachmentUITests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatFlowParityUITests/testGuestDefaultSuggestionsShowWhenComposerFocusedBeforeInterestSelection
  intentional_native_differences:
    - Apple may use OS-owned file/photo/camera/microphone permission UI and native MapKit/PencilKit internals, but the composer-visible states, identifiers, and outcomes must match the web contract.
    - Native XCUITest may use seeded fixtures or debug preview hooks for permission-sensitive actions, but the fixtures must prove the same user-visible state transitions as web Playwright.

clarification:
  rounds:
    - question: Should signed-out Apple welcome composer audio be blocked behind signup or match the web unauthenticated recording flow?
      answer: >
        Full parity with the web app is required. Do not ask product questions that
        the web app code already answers.
  vision_summary: >
    The web composer implementation is the product contract. Apple welcome/new-chat
    action buttons must match the web action semantics end-to-end, with tests that
    prove equivalent states and outcomes rather than only proving the buttons are
    visible.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Signed-out short tap on mic shows the web hold hint without recording
    given:
      - The user is signed out on the Apple welcome/new-chat composer.
      - Microphone permission is available or seeded as granted for the test.
    when:
      - The user taps record-audio-button without holding past the web threshold.
    then:
      - The recording overlay does not appear.
      - A press-and-hold hint equivalent to web press-hold-label appears briefly.
      - The focused composer remains expanded and does not collapse or blur.
      - No signup CTA appears solely because the mic was tapped.

  - id: S-2
    title: Signed-out press-and-hold audio creates an in-composer recording preview
    given:
      - The user is signed out on the Apple welcome/new-chat composer.
      - Microphone permission is available or seeded as granted for the test.
    when:
      - The user presses and holds record-audio-button past the 200 ms web threshold.
      - The user releases without cancelling.
    then:
      - record-overlay appears with release-text, timer-pill, cancel-hint, and mic-button.
      - Releasing completes recording and hides the overlay.
      - A recording preview or pending recording attachment appears in the composer.
      - The send/auth state follows the resulting composer content instead of treating the mic as a no-op.

  - id: S-3
    title: Recording cancellation matches Escape and drag-left web behavior
    given:
      - The Apple welcome/new-chat composer is showing record-overlay.
    when:
      - The user cancels by Escape or by a leftward drag beyond the web cancellation threshold.
    then:
      - The overlay disappears.
      - No recording preview or pending recording attachment is inserted.
      - The composer remains focused and usable.
      - Keyboard-started recording shows Press ESC to cancel; pointer-started recording shows Slide left to cancel.

  - id: S-4
    title: Location opens an in-field overlay and inserts location context
    given:
      - The user is on the Apple welcome/new-chat composer, signed in or signed out.
    when:
      - The user taps share-location-button.
    then:
      - The composer field expands to the web overlay height and shows location-overlay.
      - The overlay exposes close, search, current-location or map selection, and select/share controls.
      - Selecting a location closes the overlay and inserts location context into the composer as sendable content.
      - Cancelling closes the overlay without inserting content.

  - id: S-5
    title: File, sketch, and camera actions follow web auth and embed insertion gates
    given:
      - The user is on the Apple welcome/new-chat composer.
    when:
      - The user is signed out and taps attach-files-button, sketch-button, or take-photo-button.
    then:
      - The action surfaces the signup CTA and does not silently no-op.
      - No binary/file/sketch/camera embed is inserted while signed out.
    when:
      - The user is authenticated or the test uses an authenticated/seeded fixture and completes the same actions.
    then:
      - The selected file, captured sketch, or captured photo appears as visible pending composer content.
      - The send button becomes available because the pending embed is sendable.
      - Raw JSON embed references are never shown to the user.

  - id: S-6
    title: Focus, height, and action row stay stable across action interactions
    given:
      - The Apple welcome/new-chat composer is focused on a phone-sized viewport.
    when:
      - The user taps or holds each action button.
    then:
      - The action row remains visible while needed for release/cancel gestures.
      - The focused empty field remains near the web expanded height, not full-screen and not collapsed.
      - Map, sketch, and camera overlays use the web 400 px overlay field height unless fullscreen is explicitly toggled.
      - Suggestions and welcome cards remain outside the composer host.

