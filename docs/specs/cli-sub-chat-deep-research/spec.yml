implementation_plan:
  existing_patterns:
    - Mirror `handleSpawnSubChatsImpl` from the web client in Node.js, using existing CLI encryption helpers.
    - Reuse `OpenMatesWsClient.collectAiResponse` as the parent event loop rather than adding a separate WebSocket connection.
    - Reuse the skill example-chat app-store card pattern and app-skill-style examples wording for focus-mode example links.
  architecture: >
    Extend the CLI WebSocket response collector to report sub-chat lifecycle events
    to the client send flow. The client send flow owns chat keys and encrypted
    metadata, so it must handle child chat shell creation and confirmation decisions.
    Focus-mode examples should be represented as metadata on existing example chats,
    then rendered from FocusModeDetails only when present.
  data_flow:
    - User sends a CLI parent message.
    - Backend emits sub-chat lifecycle events while parent processing waits.
    - CLI initializes encrypted child chat shells and sends metadata to the server.
    - Child chats complete and backend resumes parent synthesis.
    - CLI receives final parent response, encrypts/stores it, and returns normal chat output plus optional progress metadata.
    - FocusModeDetails looks up example chats linked to `appId.focusModeId` and renders the section only when at least one exists.
  affected_files:
    - path: frontend/packages/openmates-cli/src/ws.ts
      reason: Collect and surface sub-chat lifecycle frames without resolving parent output early.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Create/sync child chat shells with parent key and send bounded confirmation payloads.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Show human-readable sub-chat progress on stderr, prompt for approval, add explicit auto-approve opt-in, and preserve JSON output.
    - path: frontend/packages/openmates-cli/tests/ws.test.ts
      reason: Regression coverage for event handling and parent response timing.
    - path: frontend/packages/openmates-cli/tests/client.test.ts
      reason: Regression coverage for child encryption/sync and confirmation behavior.
    - path: backend/core/api/app/tasks/persistence_tasks.py
      reason: Preserve parent_id and is_sub_chat when encrypted metadata creates Directus chat rows for CLI sub-chats.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/encrypted_chat_metadata_handler.py
      reason: Pass CLI sub-chat relationship fields from WebSocket encrypted metadata into persistence.
    - path: backend/apps/web/focus_modes/research/SKILL.md
      reason: Require sub-chat orchestration for complex Deep research and reinforce report structure.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Force the first Deep research tool step to use start_sub_chats when the preprocessor enabled sub-chats.
    - path: backend/apps/ai/processing/preprocessor.py
      reason: Enable sub-chats deterministically whenever the Deep research focus mode is selected.
    - path: frontend/packages/ui/src/demo_chats/types.ts
      reason: Add optional focus-mode example-chat metadata.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Add focus-mode example lookup helper.
    - path: frontend/packages/ui/src/components/settings/FocusModeDetails.svelte
      reason: Render linked example chat cards for focus modes when metadata exists.
    - path: frontend/apps/web_app/tests/focus-mode-settings.spec.ts
      reason: Verify focus-mode examples section behavior on deployed dev.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/cli-sub-chat-deep-research/spec.yml
    - Run red-phase node tests before implementation for newly added assertions.
    - Run green-phase CLI node tests and backend pytest after implementation.
    - Deploy before Playwright and real CLI quality green checks.
    - python3 scripts/spec_verify.py docs/specs/cli-sub-chat-deep-research/spec.yml

