apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This change targets the Node.js CLI, backend prompt metadata, and web app-store focus-mode detail pages. No Apple counterpart currently renders the app-store focus-mode detail example-chat section or uses the CLI WebSocket transport.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should focus modes expose example chats like app skills?
      answer: "Yes. Each focus mode should have an example chat linked in the app focus mode page, but only once there is a high-quality example that clearly shows how the focus mode is more useful than regular prompting."
    - question: Should implementation continue or stop for clarification?
      answer: Continue if there are next steps; stop only if unsure how to proceed.
    - question: How should the CLI handle sub-chat approval and focus-mode example wording?
      answer: "If the web app asks for approval, the CLI should also ask in the terminal for approval. The exception is when the user explicitly uses `--auto-approve`. Focus-mode example sections should reuse wording similar to app-skill examples."
  vision_summary: >
    Deep research should not merely run a few web searches in one parent turn; it
    should use sub-chats to investigate distinct angles in parallel, then synthesize
    a structured report with evidence, incentives, counterarguments, and uncertainty.
    The CLI must mirror the web zero-knowledge sub-chat contract before CLI quality
    tests can validate this behavior. Focus-mode example links are a quality-gated
    product contract: infrastructure may be added now, but no example should be shown
    until a real candidate demonstrates the focus mode better than normal prompting.
  approved_by_user: true

scenarios:
  - id: S-1
    title: CLI initializes server-spawned sub-chats securely
    given:
      - Alice is logged in through the OpenMates CLI.
      - Alice sends a non-incognito parent chat message that the backend processes with sub-chats enabled.
      - The backend emits `spawn_sub_chats` for two child chats, each with an id, prompt, and first user_message_id.
    when:
      - The CLI receives the `spawn_sub_chats` frame before the parent final response.
    then:
      - The CLI creates or recognizes each child chat as `is_sub_chat` with `parent_id` equal to the parent chat id.
      - Each child chat uses the parent chat key; no new independent child key is generated.
      - The CLI stores and syncs each child chat's first user message encrypted with the parent chat key.
      - The parent response collector remains active until the final parent synthesis is received.

  - id: S-2
    title: CLI handles sub-chat progress and bounded confirmation
    given:
      - Alice sends a CLI chat request that triggers a sub-chat batch.
      - The backend emits `sub_chat_progress` frames while child chats run.
    when:
      - The backend requests explicit approval for a sub-chat batch.
    then:
      - The CLI shows concise progress in human-readable mode without polluting `--json` output.
      - The CLI asks for terminal approval before sending `sub_chat_confirmation`.
      - The CLI only sends approval automatically when the user explicitly passed `--auto-approve` and the request remains within server-provided limits.
      - If the user rejects or the batch is over server-provided limits, the CLI sends or reports cancellation clearly and the parent response does not continue as if the batch had been approved.

  - id: S-3
    title: Deep research uses child chats for separate research angles
    given:
      - Alice asks a complex political, economic, market, geopolitical, policy, or news question from the CLI.
      - No focus mode is manually mentioned.
    when:
      - The backend preprocessor selects `web-research` and activates Deep research.
    then:
      - The parent turn uses `start_sub_chats` for distinct research angles when the question benefits from parallel investigation.
      - Child prompts are specific and independent, such as surface explanation, incentive analysis, counterarguments, regulatory history, or source-quality checks.
      - The final parent response uses the Deep research structure: Short Answer, Surface Explanation, What Else May Be Going On, Evidence, Counterarguments, Bottom Line.
      - The final answer distinguishes confirmed evidence, strong inference, plausible interpretation, and unsupported speculation.

  - id: S-4
    title: Focus-mode pages link only approved example chats
    given:
      - A focus mode has no approved example chat metadata.
    when:
      - Alice opens that focus mode's app-store detail page.
    then:
      - The page does not show an empty or placeholder examples section.
      - The page still shows how-to-use prompts and instructions normally.
    and:
      - When a future example chat includes metadata linking it to `web.research`, the Deep research focus-mode detail page shows a real example chat card that opens the example chat.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: CLI sub-chat shell creation mirrors the web zero-knowledge contract by reusing the parent chat key and syncing encrypted child chat/user-message metadata.
  - id: AC-2
    scenario: S-1
    text: CLI parent response collection does not resolve early when sub-chat lifecycle events arrive before final parent synthesis.
  - id: AC-3
    scenario: S-2
    text: CLI handles `sub_chat_progress`, `sub_chat_confirmation_required`, and `sub_chat_confirmation_resolved` frames without crashing or corrupting JSON output.
  - id: AC-4
    scenario: S-2
    text: CLI asks for terminal approval whenever the web app would ask for approval; `--auto-approve` is the only opt-in path for automatic approval and still never bypasses backend capacity validation.
  - id: AC-5
    scenario: S-3
    text: Deep research instructs the model to use sub-chats for separate research angles on complex requests and to spawn more only when early results expose a clear gap.
  - id: AC-6
    scenario: S-3
    text: Real CLI dev-server quality checks show focus activation, sub-chat spawning, and a structured Deep research final report.
  - id: AC-7
    scenario: S-4
    text: Focus-mode app-store pages can render linked example chats using the existing example-chat card pattern and app-skill-style examples copy, and remain hidden when no approved example exists.
  - id: AC-8
    scenario: S-4
    text: Permanent focus-mode example chats are created only through the existing shared-chat extraction workflow after a quality review confirms they demonstrate the focus mode better than regular prompting.

contracts:
  websocket:
    - event: spawn_sub_chats
      direction: server_to_cli
      payload: "{ parent_id|chat_id: string, sub_chats: [{ id: string, user_message_id: string, prompt: string, wait_for_completion?: boolean }] }"
      cli_behavior:
        - Resolve parent chat key from the active send context or sync cache.
        - Create child chat shell with parent_id and is_sub_chat.
        - Persist child user message encrypted with the parent chat key.
    - event: sub_chat_progress
      direction: server_to_cli
      payload: "{ chat_id: string, task_id?: string, status?: running|stopping|stopped|completed, total?: number, completed?: number, active_sub_chat_id?: string|null }"
      cli_behavior:
        - Print concise progress to stderr in human-readable mode.
        - Include structured progress in JSON result metadata if JSON mode is requested.
    - event: sub_chat_confirmation_required
      direction: server_to_cli
      payload: "{ chat_id: string, task_id: string, sub_chats: [...], max_auto_sub_chats?: number, max_direct_sub_chats?: number, existing_sub_chats?: number, remaining_sub_chats?: number }"
      cli_behavior:
        - Prompt the terminal user for approval by default, matching the web app approval requirement.
        - Approve automatically only when the user explicitly passed `--auto-approve` and the request fits the server-provided limits.
        - Otherwise send or report cancellation clearly without spawning unencrypted local state.
    - event: sub_chat_confirmation
      direction: cli_to_server
      payload: "{ chat_id: string, task_id: string, action: approve|cancel, approve_count?: number|null }"
      cli_behavior:
        - Use the backend's existing handler; do not invent a new event name.
  data:
    - Child chats share the parent chat encryption key under the current zero-knowledge sub-chat design.
    - 'Example chat metadata may include focus-mode linkage, for example `app_focus_mode_examples: ["web.research"]`, without affecting existing `app_skill_examples` behavior.'
    - The runtime Deep research focus mode id remains `research`; `deep_web_research` remains removed.
  ui_states:
    - Focus-mode details with approved examples show an Examples section using real example chat cards.
    - Focus-mode example sections reuse app-skill-style examples wording unless a later product decision introduces dedicated focus-mode copy.
    - Focus-mode details without approved examples show no placeholder examples section.
    - CLI human-readable output shows progress on stderr; JSON output stays parseable.
  privacy_security:
    - CLI must not write plaintext child prompts, assistant responses, or chat keys outside existing encrypted/session storage patterns.
    - CLI must not persist incognito sub-chat transcripts.
    - Example chats committed to git must be public-safe, sanitized, and free of private user data, secrets, raw account identifiers, or vault-only values.

