risks:
  - CLI send flow owns many encryption and sync responsibilities; changing it can regress normal chat persistence if tests do not cover the normal path.
  - Auto-approval of confirmation requests can surprise users if it approves too many child chats; implementation must stay bounded by server limits and visible progress.
  - Real Deep research quality can vary by provider/model availability; the quality gate must inspect actual output before committing a public example chat.
  - Focus-mode example metadata must not break existing app-skill example lookups or SEO example pages.

