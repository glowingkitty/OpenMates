id: cli-sub-chat-deep-research
title: CLI Sub-Chat Parity And Deep Research Focus Mode
status: implementing

goal: >
  Make the OpenMates CLI support the same zero-knowledge sub-chat orchestration
  contract as the web app so the Deep research focus mode can delegate separate
  research angles to parallel child chats and synthesize a higher-quality final
  report. Add a reusable focus-mode example-chat contract, but only show a
  linked example on a focus-mode page after a real high-quality example clearly
  demonstrates that focus mode's value over normal prompting.

scope:
  in:
    - CLI handling for backend sub-chat WebSocket lifecycle events emitted during a parent chat response.
    - CLI creation and encrypted sync of sub-chat shells and their first user messages using the parent chat key.
    - CLI support for server confirmation/progress events, including safe auto-approval only within server limits.
    - Deep research prompt updates that instruct the model to use sub-chats for separate hypotheses, incentives, counterarguments, and source-quality checks when the request is complex.
    - Real CLI quality checks against dev that verify Deep research activation, sub-chat spawning, and structured final synthesis.
    - Focus-mode example-chat metadata and app-store page rendering that stays hidden until a focus mode has an approved example chat.
  out:
    - Creating the permanent Deep research example chat before quality checks pass.
    - Changing backend sub-chat limits or nesting depth.
    - Adding a new runtime focus mode ID; the unified web focus mode remains `research` and user-facing name remains `Deep research`.
    - Adding browser-only account/security operations to the CLI.
    - Reworking the web sub-chat UI beyond parity references needed for the CLI.

