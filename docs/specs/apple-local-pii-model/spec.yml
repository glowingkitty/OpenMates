  intentional_native_differences:
    - The enhanced model may be Apple-only until web has an equivalent local-model capability.
    - First slice may use a bundled synthetic fixture model/test runner for Apple unit tests while production download hosting and model runtime are configured separately.

clarification:
  rounds:
    - question: Should the production model be bundled in the app or downloaded on demand?
      answer: Use on-demand download; regex stays available immediately, settings can download anytime, and the composer can recommend it when regex first detects PII.
    - question: Should the composer prompt be an OS notification, modal, or inline suggestion?
      answer: Use a non-intrusive inline composer/settings suggestion, not an OS notification.
    - question: When should Apple recommend downloading the enhanced model?
      answer: Recommend it automatically once the first time regex detects PII.
  vision_summary: >
    The Apple app should keep regex PII detection instant and default. Enhanced
    AI detection is optional, local-only, and downloaded on demand. Users can
    discover it in privacy settings or through a respectful composer suggestion
    the first time regex detects PII, and the model runs after regex with safe
    fallback if unavailable or slow.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Regex protects users before model download
    given:
      - Alice has not downloaded the enhanced model.
    when:
      - Alice types or sends text containing regex-detectable PII.
    then:
      - Apple detects and redacts regex PII exactly as before.
      - No model download or model load blocks typing or sending.
      - Settings show the enhanced model as available to download.

  - id: S-2
    title: Privacy settings manage enhanced model lifecycle
    given:
      - Alice opens Hide Personal Data settings.
    when:
      - The enhanced model is not downloaded, downloading, ready, failed, update available, or removable.
    then:
      - Alice sees clear local-only copy and an estimated size before download.
      - Alice can start, observe, retry, update, or remove the model.
      - Failures leave regex detection active and visible status in settings.

  - id: S-3
    title: Composer suggests enhanced detection on first regex detection
    given:
      - Alice has not downloaded the enhanced model and has not recently dismissed the model prompt.
    when:
      - Regex detects PII in the composer for the first time.
    then:
      - Apple shows an inline suggestion to download enhanced local detection.
      - Alice can download or dismiss it without interrupting typing.
      - Dismissal suppresses the suggestion for a backoff period unless Alice opens privacy settings.

  - id: S-4
    title: Ready model runs after regex and merges into normal mappings
    given:
      - The enhanced model is downloaded and ready.
    when:
      - Alice types or sends text with regex PII and contextual PII spans detected by the model.
    then:
      - Regex spans are detected first and keep precedence over overlapping model spans.
      - Model-only spans become normal `PIIMatch` values with stable ids, placeholders, exclusions, and encrypted mappings.
      - Disabled privacy categories filter both regex and model spans.
      - Send-time redaction recomputes detection with current settings rather than cached composer matches.

  - id: S-5
    title: Enhanced model remains local and performance-safe
    given:
      - The enhanced model is ready but device or runtime conditions are constrained.
    when:
      - Detection runs while composing or sending.
    then:
      - Text is never sent to a remote PII detection service.
      - Model inference is debounced or bounded so typing remains responsive.
      - If the model cannot load or exceeds the allowed budget, Apple falls back to regex and records sanitized local status only.

