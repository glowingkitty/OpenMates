  parity_expectations:
    - Existing regex behavior, placeholders, exclusions, encrypted mappings, and reveal/hide semantics remain unchanged.
    - Enhanced model detections use the same `PIIMatch`, placeholder, and `PIIMapping` pipeline as regex detections.
    - Settings UI uses OpenMates settings primitives, not default SwiftUI Form/List/Toggle controls.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
