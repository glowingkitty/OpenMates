assumptions:
  - id: A-1
    text: Production model hosting URL, checksum, and final artifact format may be configured after the app-facing lifecycle and detector seams are tested.
    category: delivery
    required_before: completion
    status: blocked
    evidence:
      - source: apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
        summary: EnhancedPIIModelConfiguration.productionManifest remains nil until a verified hosted artifact URL, SHA-256, size, and native runner are available.

  - id: A-2
    text: Regex remains the source of truth for high-confidence secrets and identifiers; model detections are additive contextual spans.
    category: privacy
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/specs/apple-pii-detection-web-parity/spec.yml
        summary: Verified regex parity spec requires deterministic regex behavior to remain unchanged.

contracts:
  api:
    - No new backend route is required for the first app-facing slice.
    - Production model download uses a signed static artifact URL plus checksum manifest when hosting is available.
  data:
    - Model download status is stored locally and contains no message text.
    - Composer prompt counters/dismissal timestamps are stored locally and contain no message text.
    - Model detections are converted to existing `PIIMatch` and `PIIMapping` structures before redaction.
  ui_states:
    - Settings states: not_downloaded, downloading, ready, failed, update_available, removing.
    - Composer suggestion states: hidden, shown, downloading, dismissed.
  privacy_security:
    - PII detection input text never leaves the device for enhanced detection.
    - Logs and diagnostics may include only status, durations, counts, and sanitized failure classes.
    - Raw PII, placeholders paired with originals, model input text, and model output values must not be logged.

