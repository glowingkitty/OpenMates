risks:
  - Production model artifact size and runtime format are still unresolved; on-demand delivery avoids app-binary bloat but still needs hosting, checksum, and storage budget decisions.
  - Model inference in foreground composer can degrade typing if not debounced and bounded.
  - Background/share extension model loading may be too expensive and is intentionally excluded from the first slice.
  - If production hosting is not ready, the first implementation can ship tested lifecycle and model-runner seams but not a user-visible production download.

open_questions:
  - What exact production artifact URL, checksum, size, and runtime format should the app use for the first hosted model?
