implementation_plan:
  existing_patterns:
    - apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
    - apple/OpenMates/Sources/Features/Settings/Views/SettingsHidePersonalDataView.swift
    - apple/OpenMatesTests/ChatSendPipelineParityTests.swift
  architecture: >
    Keep regex detection synchronous and authoritative. Add a lightweight
    enhanced-model manager for local download/cache state and a pluggable async
    model runner for contextual spans. Composer and send-time redaction use a
    single regex-first detector facade that returns regex-only results whenever
    the model is missing, disabled, loading, slow, or failed.
  data_flow:
    - Settings shows enhanced model status and can start/retry/remove the local artifact.
    - Composer records local prompt dismissal state without storing message text.
    - Regex detector runs immediately for typing and send-time redaction.
    - If the enhanced model is ready, a debounced async pass proposes additional model-only spans.
    - Send-time redaction recomputes regex plus ready-model spans with current settings before encryption/send.
  affected_files:
    - path: docs/specs/apple-local-pii-model/spec.yml
      reason: Executable product contract for issue #464.
    - path: apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
      reason: Regex-first enhanced detector facade, model span decoding, merge, and fallback behavior.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsHidePersonalDataView.swift
      reason: Enhanced model settings lifecycle UI/model state.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: New-chat composer suggestion and async enhanced detection integration.
    - path: apple/OpenMatesTests/ChatSendPipelineParityTests.swift
      reason: Detector, merge, fallback, timeout, and suggestion tests.
    - path: apple/OpenMatesTests/SettingsFullParityTests.swift
      reason: Settings lifecycle tests.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-local-pii-model/spec.yml
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatSendPipelineParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SettingsFullParityTests
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/spec_verify.py docs/specs/apple-local-pii-model/spec.yml
  verification_order:
    - Spec validation.
    - Apple unit tests for detector/suggestion/settings lifecycle.
    - Apple build.

