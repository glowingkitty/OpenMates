id: apple-local-pii-model
title: Apple Local PII Model
status: implementing

goal: >
  Add optional on-device AI-assisted PII detection to the Apple app without
  weakening the existing regex-first privacy protection. Regex detection remains
  instant and always available. Users can download an enhanced local model from
  privacy settings or from a non-intrusive composer suggestion the first time
  regex detects PII; once ready, the model runs locally as a second pass for
  contextual personal data before content leaves the device.

scope:
  in:
    - Apple on-demand model download and local cache state for enhanced personal data detection.
    - Privacy settings controls for download, progress, ready, update available, failure, and remove model states.
    - Non-blocking composer suggestion the first time regex detects PII, with dismissal backoff.
    - Regex-first then model-second detection merge for foreground composer and send-time redaction.
    - Native unit tests that run on Apple and prove regex fallback, model span merge, settings gating, and on-device/local-only behavior with synthetic fixtures.
  out:
    - Bundling the production model in the app binary.
    - Server-side PII parsing or remote model inference.
    - Replacing deterministic regex detection.
    - Blocking message send while the enhanced model downloads or loads.
    - Background/share-extension model inference in the first slice; these paths keep regex-only redaction unless a later performance pass proves model loading is safe there.

