risks:
  - Real model behavior may choose full regeneration instead of a diff; deterministic tests must isolate product behavior while real-inference tests validate prompt reliability.
  - Existing finished-embed update suppression can prevent patched content from reaching clients unless explicitly fixed.
  - Version reconstruction depends on every patch applying cleanly from v1; corrupted or missing rows need explicit error surfaces.
  - Remotion rerender side effects can make restore slower and require clear stale/rendering status.
  - Shared-chat history must not widen access beyond the existing share key and permission boundary.

open_questions:
  - Should full-regeneration updates to an existing embed be represented as a synthetic patch row, a full snapshot row, or a separate version-row type beyond v1 snapshot?
  - Should version history have retention limits before the larger hot/cold storage architecture from GitHub issue #459 is designed?
  - Should timeline diff comparison be selected-vs-current by default, or selected-vs-previous for each historical version?
