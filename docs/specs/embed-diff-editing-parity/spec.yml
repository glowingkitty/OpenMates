id: embed-diff-editing-parity
title: Embed Diff Editing Parity
status: implementing

goal: >
  Complete diff-based editing for code, document, sheet, mail, and Remotion
  video-create embeds across the shared backend, OpenMates CLI, web app, and
  Apple app. A user can ask the assistant to generate an embed, ask it to update
  that same embed, see the existing embed patched in place, browse and compare
  every previous version in fullscreen timeline UI, and restore any old version
  without destroying the version history.

scope:
  in:
    - Assistant-generated and assistant-updated embeds for code, docs, sheets, mail, and Remotion/video-create.
    - Unified diff fence generation, parsing, exact/fuzzy application, visual failure fallback, and full-regeneration fallback when the change is too large.
    - Append-only `embed_diffs` history with v1 snapshot, v2+ encrypted patches, latest full snapshot on the parent embed, version metadata sync, and reconstruction of any historical version.
    - Non-destructive restore semantics where restoring an older version creates a new latest version and never truncates or mutates prior history.
    - Web fullscreen timeline for supported embeds, including list, select, current-vs-selected comparison, and restore controls.
    - OpenMates CLI commands for `embeds versions list`, `embeds versions show`, and `embeds versions restore` plus normal `chats send` diff-update flow.
    - Apple native fullscreen timeline and restore flow for the same supported embed types, using web-rendered behavior as the parity source of truth.
    - Owner-device sync across web, CLI, and Apple; shared-chat recipients can view version history read-only.
    - Deterministic unit/contract tests plus real-inference E2E tests in CLI first, web second, Apple third order.
  out:
    - Branching version graphs, merge UI, CRDTs, or collaborative concurrent editing.
    - Destructive restore that overwrites or truncates existing `embed_diffs` history.
    - Letting shared-chat recipients restore or mutate the owner's embed history.
    - Real provider calls, private user data, raw production logs, secrets, or private identifiers in committed fixtures.
    - Exact pixel-perfect Apple/web screenshot gating for the timeline in v1; material parity and deterministic accessibility/state checks are required.

