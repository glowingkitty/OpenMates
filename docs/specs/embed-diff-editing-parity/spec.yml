implementation_plan:
  existing_patterns:
    - backend/core/api/app/services/embed_diff_service.py for parsing, patching, storing, and reconstructing versions.
    - backend/core/api/app/services/embed_service.py for sending plaintext `send_embed_data` to clients for client-side encryption.
    - frontend/packages/ui/src/services/embedStore.ts and embedDiffStore.ts for encrypted IndexedDB embed persistence patterns.
    - frontend/packages/openmates-cli/src/client.ts for CLI websocket `send_embed_data` encryption and `store_embed` persistence.
    - apple/OpenMates/Sources/Features/Embeds/Views/EmbedFullscreenView.swift for native fullscreen composition.
  architecture: >
    Keep the parent embed as the latest full snapshot and use `embed_diffs` as
    append-only history. Server routes list encrypted rows only; clients decrypt
    and reconstruct historical versions with the parent embed key. Restore is
    linear and non-destructive on the client: it reconstructs a selected version,
    encrypts a new latest parent snapshot, and appends a new encrypted history row.
  data_flow:
    - Assistant sees supported embed refs in history and emits a diff fence for a small edit.
    - Stream consumer resolves the ref, fetches current content with cache plus database fallback, applies the patch, and stores version history.
    - Backend publishes updated latest content and diff metadata to owner clients.
    - Web/CLI/Apple encrypt and persist latest content and version rows locally.
    - Timeline requests full history or a reconstructed version on demand.
    - Restore reconstructs the selected content server-side, creates a new latest version, and syncs it to owner clients.
  affected_files:
    - path: backend/apps/ai/instructions/base_diff_editing_instruction.md
      reason: Add supported type and Remotion-specific diff guidance.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Ensure diff instruction detection covers all supported embed refs reliably.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Apply diffs, handle fallbacks, and publish update/version events for already-finished embeds.
    - path: backend/core/api/app/services/embed_diff_service.py
      reason: Complete version history, reconstruction, restore, access checks, and non-destructive semantics.
    - path: backend/core/api/app/services/embed_service.py
      reason: Ensure patched finished embeds still send updated content and version metadata to clients.
    - path: backend/core/api/app/routes/embeds.py
      reason: Add REST endpoints for CLI/version history access if websocket-only is insufficient.
    - path: backend/core/api/app/routes/websockets.py
      reason: Add websocket handlers for version history and restore events.
    - path: frontend/packages/ui/src/services/embedDiffStore.ts
      reason: Store, fetch, and decrypt version rows and reconstructed version data.
    - path: frontend/packages/ui/src/components/embeds/shared/EmbedVersionTimeline.svelte
      reason: Implement timeline list, select, compare, restore, loading/error/read-only states.
    - path: frontend/packages/ui/src/components/embeds/code/CodeEmbedFullscreen.svelte
      reason: Wire version content selection and restore.
    - path: frontend/packages/ui/src/components/embeds/docs/DocsEmbedFullscreen.svelte
      reason: Wire version content selection and restore.
    - path: frontend/packages/ui/src/components/embeds/sheets/SheetEmbedFullscreen.svelte
      reason: Wire version content selection and restore.
    - path: frontend/packages/ui/src/components/embeds/mail/MailEmbedFullscreen.svelte
      reason: Add timeline integration if mail fullscreen exists or add supported surface.
    - path: frontend/packages/ui/src/components/embeds/videos/RemotionVideoCreateEmbedFullscreen.svelte
      reason: Add Remotion source/timeline diff history and rerender restore controls.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add `embeds versions` commands.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Implement list/show/restore calls and persist version metadata from websocket events.
    - path: frontend/packages/openmates-cli/src/ws.ts
      reason: Type version-history websocket frames.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Model version metadata and history rows.
    - path: apple/OpenMates/Sources/Features/Embeds/Views/EmbedFullscreenView.swift
      reason: Host native version timeline and restore controls.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/embed-diff-editing-parity/spec.yml
    - python3 scripts/spec_verify.py docs/specs/embed-diff-editing-parity/spec.yml --phase red
    - Deterministic backend, CLI, web, and Apple tests.
    - Real-inference CLI test first.
    - Deploy, wait for Vercel Ready, then Playwright web real-inference test.
    - Remote Mac Apple build/test after CLI and web evidence are green.
  verification_order:
    - Backend deterministic tests.
    - CLI deterministic tests.
    - CLI real-inference test.
    - Web deterministic tests.
    - Deploy and wait for Vercel Ready.
    - Web Playwright real-inference test.
    - Apple unit/UI deterministic tests.
    - Apple real synced-chat/native E2E evidence.

