clarification:
  rounds:
    - question: Which embed types should be fully supported in the first parity slice?
      answer: Code, docs, sheets, mail, and Remotion/video-create.
    - question: Should previous-version viewing include restore in v1?
      answer: View and restore previous versions across web, CLI, and Apple.
    - question: What should CLI parity look like?
      answer: "`openmates chats send` creates/updates embeds, and `openmates embeds versions list/show/restore` manages history."
    - question: Should E2E tests use real assistant inference or deterministic fixtures?
      answer: Real inference test to confirm the actual process works for real, first through OpenMates CLI, then web app, then Apple app, plus deterministic tests.
    - question: Should version history sync/share across devices and shared chats in v1?
      answer: Sync across the owner's web/CLI/Apple devices; shared-chat recipients can view timeline read-only.
  vision_summary: >
    Diff-based editing should become a real product workflow rather than a backend
    prototype: the assistant generates a supported embed, later emits a diff for
    that embed, the system patches the existing embed in place, and every client
    can view and restore the append-only version history. The history is
    effectively non-destructive because diffs are stored as separate encrypted
    model elements, the latest snapshot is only an optimization, and restore
    creates a new version instead of changing older rows. Verification must prove
    both model-independent deterministic behavior and the real assistant workflow
    in CLI -> web -> Apple order.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Assistant updates an existing code embed with a diff
    given:
      - Alice is logged in and has an active non-incognito chat.
      - The assistant previously generated a Python code embed with an `embed_ref` visible in the message history.
    when:
      - Alice asks the assistant to rename a function and add a small return type hint.
      - The assistant emits a valid ```` ```diff:<embed_ref> ```` block.
    then:
      - The backend resolves the embed ref to the existing embed id.
      - The backend applies the diff to the current embed content without creating a second code embed.
      - The parent embed `version_number` increments from 1 to 2 and stores the patched full snapshot as the latest content.
      - "`embed_diffs` contains v1 as the original encrypted snapshot and v2 as the encrypted patch."
      - Alice's active client receives updated content and version metadata for the same embed id.

  - id: S-2
    title: Docs, sheets, mail, and Remotion embeds use the same version contract
    given:
      - Alice has one generated embed of each supported type: document, sheet, mail, and Remotion/video-create.
      - Each embed has current content and a stable embed ref in chat history.
    when:
      - Alice asks for a small type-appropriate edit to each embed.
    then:
      - Document diffs patch structured document content without losing title, filename, generated artifact metadata, or DOCX regeneration requirements.
      - Sheet diffs patch table content without losing headers, row/column metadata, or sheet renderer compatibility.
      - Mail diffs patch receiver, subject, body, or footer while preserving structured fields.
      - Remotion diffs patch the TSX/source-of-truth, refresh timeline metadata, mark existing render artifacts stale when needed, and trigger rerender.
      - All supported types use the same append-only version-history API and restore semantics.

  - id: S-3
    title: Failed or unsafe diffs degrade visibly without corrupting content
    given:
      - Alice has a supported embed at version 3.
    when:
      - The assistant emits a malformed diff, a diff whose context does not match, or a diff targeting an unknown embed ref.
    then:
      - The system does not mutate the existing embed content or version number.
      - Alice sees a visible suggested-changes/diff card explaining that automatic application failed.
      - Logs include enough non-sensitive context to debug the failure.
      - The assistant can retry with a corrected diff or fall back to full regeneration according to the instruction contract.

  - id: S-4
    title: Web fullscreen timeline views, compares, and restores versions
    given:
      - Alice has a code embed with versions v1, v2, and v3.
      - Alice opens the embed fullscreen view in the web app.
    when:
      - Alice opens the timeline, selects v1, toggles the changes view, and chooses restore.
    then:
      - The fullscreen view shows a timeline with v1, v2, v3, timestamps, selected version, and current version.
      - Selecting v1 shows the reconstructed v1 content without replacing the current content.
      - The changes view clearly shows additions/removals between the selected version and current version.
      - Restore asks for confirmation and then creates v4 whose content equals v1.
      - v1, v2, and v3 remain visible and reconstructable after restore.

  - id: S-5
    title: CLI sends real chat update and manages version history
    given:
      - Alice is logged in through OpenMates CLI.
      - Alice creates a chat and asks the assistant to generate a code embed.
    when:
      - Alice sends a second CLI chat message asking for a small edit.
      - The assistant emits a diff and the backend patches the embed.
      - Alice runs `openmates embeds versions list <embed_id>`, `openmates embeds versions show <embed_id> --version 1`, and `openmates embeds versions restore <embed_id> --version 1`.
    then:
      - The CLI prints the updated embed id and version after the second chat response.
      - The list command shows all versions and timestamps without exposing encrypted blobs.
      - The show command prints or writes reconstructed historical content for the requested version.
      - The restore command creates a new latest version and prints the new version number.

  - id: S-6
    title: Apple native fullscreen timeline matches product behavior
    given:
      - Alice has the same versioned embed synced to the Apple app.
    when:
      - Alice opens the native fullscreen embed view, selects an older version, views changes, and restores it.
    then:
      - The Apple fullscreen view shows version history using native OpenMates product UI.
      - Selecting a version updates the displayed content without mutating the current version.
      - Restore creates a new latest version and keeps older versions visible.
      - The Apple app stores and syncs version metadata for cold boot and reconnect.

  - id: S-7
    title: Version history syncs across owner devices and shared chats are read-only
    given:
      - Alice updates an embed from the CLI and later opens the same chat in the web app and Apple app.
      - Alice shares the chat with Bob through the normal share-chat flow.
    when:
      - Alice and Bob open the versioned embed timeline.
    then:
      - Alice sees the same latest content, version list, historical content, and restore controls on web, CLI, and Apple.
      - Bob can view the version timeline and historical content through the shared chat link.
      - Bob cannot restore, mutate, or create new owner versions from the shared view.
      - No plaintext content, private user id, or encryption key leaks in version-history payloads or URLs.

  - id: S-8
    title: Real inference verification runs in required client order
    given:
      - Deterministic tests for patching, version storage, sync, and UI timeline behavior are green.
    when:
      - The real-inference verification ladder runs.
    then:
      - A real OpenMates CLI chat first proves the assistant generates a supported embed and updates it through a diff.
      - After CLI passes, a Playwright web E2E proves the same real assistant flow and fullscreen timeline restore on `app.dev.openmates.org`.
      - After web passes, an Apple native E2E or remote Mac test proves the same real assistant flow or a replayed server-backed chat with real inference-created history.
      - The spec is not considered verified until all required phases have recorded evidence or a sanitized infrastructure failure class is documented.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Real assistant diff fences targeting existing embed refs patch the existing embed in place and increment `version_number` without creating duplicate embeds.
  - id: AC-2
    scenario: S-2
    text: Code, docs, sheets, mail, and Remotion/video-create embeds all use the same append-only version-history contract while preserving type-specific metadata and post-processing needs.
  - id: AC-3
    scenario: S-3
    text: Malformed, unresolvable, or unapplicable diffs never corrupt embed content and surface a visible suggested-changes fallback.
  - id: AC-4
    scenario: S-4
    text: Web fullscreen timeline lists, selects, compares, and restores versions for every supported embed type.
  - id: AC-5
    scenario: S-5
    text: CLI chat send can trigger real assistant diff updates, and CLI version commands can list, show, and restore embed versions.
  - id: AC-6
    scenario: S-6
    text: Apple fullscreen embed UI supports equivalent timeline, compare, and restore behavior with native OpenMates product UI.
  - id: AC-7
    scenario: S-7
    text: Version history syncs across owner web, CLI, and Apple devices, and shared-chat recipients can view history read-only.
  - id: AC-8
    scenario: S-8
    text: Verification includes deterministic coverage and real-inference E2E evidence in CLI first, web second, Apple third order.

contracts:
  ai_prompting:
    - Diff editing instructions are injected only when supported diffable embeds exist in the conversation history.
    - The assistant must use ```` ```diff:<embed_ref> ```` fences for small edits to supported existing embeds.
    - The assistant must regenerate full content instead of diffing when a change affects more than 60 percent of content, changes the content type, or the user asks to start over.
    - Remotion-specific instructions must cover scene additions, duration changes, scene reorderings, captions, assets, and rerender implications.
  websocket:
    - event: send_embed_data
      direction: server_to_client
      payload: "{ embed_id, type, content, status, chat_id, message_id, version_number, content_hash?, version_history_rows?, updatedAt }"
      behavior:
        - Successful diff updates must publish updated plaintext content for client-side encryption even when the embed was already finished.
        - "`version_history_rows` carries plaintext snapshot/patch rows only during the active server-to-owner-client delivery; clients encrypt each row with the parent embed key before storage."
        - Clients must persist the new encrypted latest snapshot and encrypted version metadata for the same embed id.
    - event: store_embed_diff
      direction: client_to_server
      payload: "{ embed_id, version_number, encrypted_snapshot?, encrypted_patch?, hashed_user_id, created_at }"
      behavior:
        - Owner clients send only client-encrypted version rows to the server.
        - "The server validates parent embed ownership and derives `hashed_user_id` from the authenticated session instead of trusting the payload."
    - event: request_embed_diffs
      direction: client_to_server
      payload: "{ embed_id }"
      behavior:
        - Server returns only version rows the caller may access.
    - event: embed_diffs_response
      direction: server_to_client
      payload: "{ embed_id, diffs: [{ id, version_number, encrypted_snapshot?, encrypted_patch?, created_at }] }"
      behavior:
        - Owner clients may request full history lazily; shared recipients receive read-only history for shared embeds.
  api:
    - route: GET /v1/embeds/{embed_id}/versions
      response: "{ embed_id, current_version, versions: [{ version_number, created_at, has_snapshot, has_patch, encrypted_snapshot?, encrypted_patch? }], readonly: boolean }"
      errors:
        - 401 when unauthenticated.
        - 403 when the caller has no owner or share access.
        - 404 when the embed does not exist or version history is unavailable.
    - route: GET /v1/embeds/{embed_id}/versions/{version_number}
      response: "{ embed_id, version_number, current_version, rows: [{ version_number, created_at, encrypted_snapshot?, encrypted_patch? }], readonly: boolean }"
      errors:
        - 403 when the caller cannot access the embed or version.
        - 404 when version rows are unavailable.
    - route: POST /v1/embeds/{embed_id}/versions/{version_number}/restore
      response: "400 error because restore is a client-side encrypted append/update flow"
      errors:
        - 400 because server-side plaintext restore is forbidden.
  data:
    - "`embeds.encrypted_content` remains the latest full snapshot for fast rendering."
    - "`embeds.version_number` is the latest linear version number and increments for every successful diff, full-regeneration update to an existing embed, and restore."
    - "`embed_diffs` is append-only for v1 original snapshot and v2+ patches or restore patches."
    - Restore creates a new version row and updates the latest parent snapshot; it never changes or deletes older rows.
    - Version rows are encrypted client-side with the same embed key as the parent embed and follow embed deletion/account deletion cleanup.
  cli:
    - "`openmates chats send <chat> <prompt>` must preserve embed refs in context and report updated embed/version metadata when a diff edit succeeds."
    - "`openmates embeds versions list <embed_id>` lists version numbers, current marker, timestamps, and read-only status."
    - "`openmates embeds versions show <embed_id> --version <n>` prints reconstructed content or writes it to a path when requested."
    - "`openmates embeds versions restore <embed_id> --version <n>` asks for confirmation unless `--yes` is supplied, reconstructs content locally, and sends only encrypted `store_embed` plus `store_embed_diff` WebSocket payloads."
  ui_states:
    - Timeline loading, empty/no-history, current selected, historical selected, diff/changes view, restore confirmation, restore success, restore failure, read-only shared mode, and unavailable/offline states must be explicit.
    - The visual fallback diff card must be distinguishable from an applied version and must not imply content was changed.
  privacy_security:
    - Version-history payloads must not expose plaintext content to the server beyond existing active-turn plaintext processing boundaries.
    - Shared-chat recipients may decrypt/view only the history included in the share contract and cannot mutate owner history.
    - Logs must redact private content, emails, keys, raw encrypted blobs, and private identifiers.
    - Version history must be cleaned up with embed deletion, chat deletion, account deletion, and share revocation where applicable.

