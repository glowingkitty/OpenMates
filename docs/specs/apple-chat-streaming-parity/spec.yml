schema_version: 2
id: apple-chat-streaming-parity
title: Apple Full Chat Processing And Rendering Parity
status: approved

goal: >
  Make Apple chat processing match the rendered web product from message submit
  through durable completion. One stable assistant turn must own processing
  identity, provider-supplied thinking, progressive answer content, embeds,
  terminal state, and post-processing without duplicate rows, positional jumps,
  lost chunks, hidden errors, or cold-boot loss. The contract applies to iPhone,
  iPad, and macOS and includes the web rainbow processing animation.

scope:
  in:
    - Authenticated foreground chat sends from Apple.
    - Authenticated notification replies, share-extension sends, macOS quick capture, and other background Apple send entry points.
    - Anonymous Apple chat sends and promotion into authenticated encrypted storage.
    - Existing WebSocket lifecycle events from task initiation through post-processing and storage confirmation.
    - Deterministic ordering, deduplication, buffering, replacement, cancellation, reconnect, and finalization of stream events.
    - Client-encrypted user, assistant, provider-supplied thinking, embed, and post-processing persistence with coherent version metadata.
    - One assistant message row that owns identity, processing, thinking, progressive markdown, embeds, generated-by metadata, and final actions.
    - Web-equivalent thinking expansion, manual override, completion collapse, markdown rendering, internal scrolling, and cold-boot restoration.
    - Web-equivalent user-message positioning, response-growth spacer behavior, manual-scroll preservation, and load-earlier anchoring.
    - Web-equivalent message entry, streaming-tail, thinking, status, and rainbow processing animations, including Reduce Motion behavior.
    - Processing, queued, rejected, cancelled, pre-stream error, mid-stream error, reconnect, and successful terminal states.
    - Responsive and accessible presentation on iPhone, iPad, and macOS.
    - CLI, npm SDK, pip SDK, web, and Apple contract verification in that order where shared behavior changes.
  out:
    - watchOS chat UI and WatchChatRuntime parity; create a separate constrained-platform spec if required.
    - Replacing the zero-knowledge encryption model or durably storing private chat content in plaintext.
    - Backend/API redesign unless implementation proves the existing contract cannot satisfy an approved criterion and the user approves the change.
    - Rewriting the complete app shell or transcript in UIKit/AppKit without profiling evidence that focused SwiftUI optimization cannot meet the contract.
    - Unrelated chat management, sharing, highlights, search, composer redesign, or embed-renderer redesign except where response lifecycle layout depends on them.
    - Exposing hidden model chain-of-thought that is not already present in the provider-supplied web payload.

