assumptions:
  - id: A-1
    text: Existing backend WebSocket events are sufficient for Apple parity, including `chat_message_added`, `encrypted_chat_metadata`, `ai_task_initiated`, `ai_typing_started`, `ai_message_update`, `thinking_chunk`, `thinking_complete`, `ai_message_ready`, `post_processing_completed`, `message_queued`, `ai_typing_ended`, `ai_task_cancel_requested`, `pending_ai_response`, `ai_background_response_completed`, and `ai_response_storage_confirmed`.
    category: backend
    required_before: implementation
    status: unchecked
    evidence:
      - source: apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
        summary: Native currently routes these events, but not all are applied to UI/state.
  - id: A-2
    text: CLI can authenticate against the same dev account and load/decrypt chats created by Apple without adding new CLI public commands.
    category: cli
    required_before: task_execution
    status: unchecked
    evidence:
      - source: frontend/packages/openmates-cli/tests/client.test.ts
        summary: Existing tests cover pending AI response storage and encrypted message loading semantics.
  - id: A-3
    text: Anonymous backend response shape can be adapted in Apple without backend changes to drive the same native streaming reducer, even if the transport still returns final JSON for the first implementation slice.
    category: anonymous
    required_before: implementation
    status: unchecked
    evidence:
      - source: apple/OpenMates/Sources/Core/Services/AnonymousFreeUsageService.swift
        summary: Native anonymous service currently uses a separate final-response HTTP path.

contracts:
  websocket:
    - event: chat_message_added
      direction: apple_to_server
      apple_behavior:
        - Send plaintext user message only through the existing AI-processing WebSocket contract.
        - Locally store the user message encrypted before or atomically with the outbound send.
        - On send failure caused by connectivity, queue a retryable encrypted/local action rather than silently losing the user message.
    - event: encrypted_chat_metadata
      direction: apple_to_server
      apple_behavior:
        - Send encrypted user storage after preprocessing/typing metadata supplies the assistant task id and any generated metadata.
        - Use `messages_v` for the user-message version and `title_v` only when generated metadata changed.
        - Guard that cached chat key and wrapped encrypted chat key match before uploading encrypted content.
    - event: ai_response_completed
      direction: apple_to_server
      apple_behavior:
        - Encrypt assistant/system completion with the local chat key.
        - Send `versions.messages_v` advanced beyond the current stored user-message version.
        - Queue a durable retry item if the WebSocket is unavailable or send fails.
    - event: pending_ai_response
      direction: server_to_apple
      apple_behavior:
        - Apply the authoritative response even when a stale local streaming row with the same message id exists.
        - Replace partial or processing content with complete content and persist encrypted storage if needed.
    - event: ai_background_response_completed
      direction: server_to_apple
      apple_behavior:
        - Apply the completed assistant response for inactive/background chats without requiring an active `ChatViewModel` subscription.
        - Notify only through privacy-safe native notification surfaces when the app is not active in that chat.
    - event: cancel_ai_task
      direction: apple_to_server
      apple_behavior:
        - Send existing cancellation payload with `task_id` and `chat_id` when Stop is tapped.
        - Do not invent an Apple-only cancellation event.
    - event: message_queued
      direction: server_to_apple
      apple_behavior:
        - Show queued text in the composer/input surface for the current chat.
        - Do not surface it as a generic app notification.
  data:
    - Apple must introduce or reuse a durable pending assistant-response queue that stores only message ids/chat ids or already encrypted local records, never plaintext private content.
    - Apple streaming chunks should be persisted often enough to recover from app termination or WebSocket loss, following the web principle of first/final/periodic chunk persistence.
    - "`ChatStore` and related persistence must update or retain `messagesV` consistently with server-authoritative sync and not clobber newer values with stale local writes."
    - Background and share-extension sends must record enough encrypted handoff state for the main app to finish metadata or assistant completion when extension runtime ends.
    - Anonymous chats must use anonymous-local encryption before signup, then re-wrap and promote into authenticated encrypted storage without plaintext durable history.
  ui_states:
    - Sending user message.
    - Processing/preprocessing steps.
    - Typing with mate/model/provider/region where available.
    - Thinking/reasoning content streaming and complete.
    - Assistant chunks streaming in a single row.
    - Post-processing/follow-up suggestions.
    - Queued message while another task is active.
    - Cancellation requested, cancelled, timed out, completed, and error.
    - Offline/awaiting connection and retrying send.
    - Anonymous free-usage unavailable and signup-gated file/upload features.
  privacy_security:
    - Do not store private chat content, AI responses, raw chat keys, anonymous identifiers, tokens, credentials, or share URL keys in committed files or unencrypted durable storage.
    - Client-side encryption remains local to Apple or CLI. Server/CLI verification must prove decryptability without exposing plaintext in committed artifacts.
    - Logs must include enough context for debugging while redacting private identifiers and content.
    - Backend changes are forbidden by default; if a missing backend contract is discovered, implementation stops for explicit user confirmation.

tests:
  - id: T-SWIFT-PIPELINE-001
    type: unit
    file: apple/OpenMatesTests/ChatSendPipelineParityTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/ChatSendPipelineParityTests"
    covers:
      - AC-1
      - AC-2
      - AC-10
    assertions:
      - User send payload uses existing `chat_message_added` and encrypted storage uses `encrypted_chat_metadata`.
      - Completed assistant persistence sends `ai_response_completed` with `messages_v` advanced past the user-message version.
      - Failed assistant completion send records a durable pending item without plaintext content.
      - Cached chat key and incoming `encrypted_chat_key` mismatch aborts encrypted writes and sends no WebSocket payload.
    red_phase:
      required: true
      expected: fail
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass
      evidence:
        status: ""
        run_id: ""
        timestamp: ""

  - id: T-SWIFT-STREAM-001
    type: unit
    file: apple/OpenMatesTests/ChatStreamingLifecycleParityTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/ChatStreamingLifecycleParityTests"
    covers:
      - AC-3
      - AC-4
      - AC-9
    assertions:
      - Streaming reducer transitions through sending, processing, typing, streaming, final, cancellation, and error states.
