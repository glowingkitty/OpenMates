  parity_expectations:
    - The rendered web app and web chat source remain the behavior source of truth for processing phases, typing, chunk rendering, thinking, cancellation, queued-message UX, final persistence, and scroll stability.
    - Native UI must use OpenMates primitives and generated tokens; no new stock `List`, `Form`, default `Menu`, default `.sheet`, or native product chrome for chat processing states.
    - Apple may use native storage APIs instead of IndexedDB, but storage semantics must match web: client-side encrypted local persistence, durable retry queues for outbound encrypted assistant completion, and no plaintext durable private content.
    - All Apple chat send entry points must share the same reducer/persistence contract as far as possible instead of duplicating lifecycle-specific behavior.
