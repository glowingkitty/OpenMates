decisions:
  - id: D-1
    status: active
    decision: Migrate the existing apple-chat-streaming-parity spec in place to Schema V2.
    reason: One durable ledger avoids contradictory evidence and overlapping lifecycle contracts.
    decided_at: "2026-07-11T01:25:15Z"
  - id: D-2
    status: active
    decision: Full lifecycle parity includes rendering-coupled stream, persistence, cancellation, recovery, and cross-client behavior.
    reason: Visual parity cannot be reliable while native event ownership and finalization remain divergent.
    decided_at: "2026-07-11T01:25:15Z"
  - id: D-3
    status: active
    decision: iPhone, iPad, and macOS are required; Watch is excluded.
    reason: These three platforms share the owned chat product surface, while Watch uses a separately constrained runtime.
    decided_at: "2026-07-11T01:25:15Z"
  - id: D-4
    status: active
    decision: Thinking content is the provider-supplied payload already exposed by web and is encrypted-local persisted with its assistant message.
    reason: This matches current product behavior without exposing inferred or hidden chain-of-thought.
    decided_at: "2026-07-11T01:25:15Z"
  - id: D-5
    status: active
    decision: The rainbow ring and glow are required response-processing UI, not optional polish.
    reason: The user explicitly identified animation parity as part of the product contract.
    decided_at: "2026-07-11T01:25:15Z"
  - id: D-6
    status: active
    decision: Add a shared Reduce Motion contract for the processing rainbow instead of copying the web animation's current accessibility gap.
    reason: Current ActiveChat rainbow CSS has no reduced-motion override; web and Apple must converge on a static informative treatment.
    decided_at: "2026-07-11T01:25:15Z"

