implementation_plan:
  spec_path: docs/specs/apple-chat-streaming-parity/spec.yml
  existing_patterns:
    - frontend/apps/web_app/tests/chat-scroll-streaming.spec.ts
    - frontend/packages/ui/src/services/debugUtils.ts animation fixture
    - apple/OpenMatesTests/ChatStreamingLifecycleParityTests.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatBannerView.swift animation and token patterns
  architecture: >
    Extract a deterministic rendered web lifecycle contract first. Correct the
    native stream broker and lifecycle reducer so one message-keyed assistant
    turn owns ordered thinking, answer, terminal state, and persistence. Render
    that state through focused OpenMates SwiftUI components with stable IDs,
    generated tokens, and cached rich content. Keep the transcript SwiftUI-first;
    use a contained UIKit/AppKit list only if profiling proves unresolved jank.
  data_flow:
    - A deterministic fixture emits task-1 for chat-1 and assistant-1, followed by processing, typing, two thinking deltas, two answer snapshots, and one final event.
    - StreamingClient delivers ordered chat-scoped events without an old continuation removing its replacement.
    - ChatViewModel reduces events into one assistant-1 turn, rejecting stale sequence values and retaining canonical full-content snapshots.
    - SwiftUI renders assistant-1 identity, thinking, answer, embeds, and terminal state without sibling lifecycle cards or duplicate rows.
    - Finalization encrypts and persists the canonical answer and provider-supplied thinking exactly once, then clears active UI.
    - Sync, CLI, npm SDK, and pip SDK observe coherent durable versions and the same ordered user/assistant pair.
  boundaries:
    - Web fixture and Playwright own computed browser contract extraction, including rainbow and Reduce Motion convergence.
    - StreamingClient owns subscriber identity, buffering, and delivery only; it does not own message rendering or persistence.
    - ChatViewModel owns sequence-aware lifecycle and assistant-turn state; views do not infer event order.
    - ChatView and child components own rendered parity and accessibility; they do not send protocol events.
    - Existing send/persistence services remain the encryption boundary and never receive plaintext durable logging.
  impacts:
    api: Existing WebSocket event names and payloads remain unchanged unless V-BACKEND-GATE is explicitly approved.
    data: Persisted native assistant messages gain encrypted provider-supplied thinking metadata with a local migration path for old rows.
    ui: Processing, thinking, answer, terminal state, scrolling, and rainbow treatment become one message-owned responsive lifecycle.
    privacy_security: No hidden reasoning inference or plaintext message/thinking persistence is permitted.
  affected_files:
    - path: frontend/apps/web_app/tests/chat-response-processing-ui.spec.ts
      reason: Rendered web source contract and screenshot evidence
    - path: apple/OpenMates/Sources/Core/Networking/StreamingClient.swift
      reason: Safe subscription replacement and resend behavior
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Sequence-aware message-owned lifecycle and finalization
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Assistant-turn hierarchy, positioning, rainbow treatment, and testability
    - path: apple/OpenMates/Sources/Features/Chat/Views/ThinkingSectionView.swift
      reason: Web-equivalent thinking interaction and rendering
    - path: apple/OpenMatesUITests/ChatResponseProcessingParityUITests.swift
      reason: Deterministic native lifecycle, geometry, and screenshot proof
  verification_strategy:
    - Resolve A-4 by selecting the smallest deterministic fixture seam before product source changes.
    - Add deterministic red tests before each implementation slice.
    - Treat TASK-2 as browser-only contract extraction and Reduce Motion convergence; it may complete before shared CLI/SDK checks because it does not change shared transport behavior.
    - Verify shared contracts in CLI, npm SDK, and pip SDK before browser and Apple UI evidence.
    - Deploy web fixture/contract changes and wait for Vercel Ready before Playwright green.
    - Verify iPhone, iPad, and macOS last with screenshots and artifact review.
  verification_order:
    - Spec validation, fixture-seam approval, and red deterministic contracts
    - Browser-only rendered contract extraction and Reduce Motion convergence
    - CLI
    - npm SDK
    - pip SDK
    - Deployed web Playwright contract
    - Apple unit tests
    - iPhone UI tests and screenshots
    - iPad UI tests and screenshots
    - macOS build, interaction checks, and screenshots
  migration_backfill:
    - Preserve legacy evidence history in git but do not treat unsupported old evidence as current proof.
    - Re-evaluate completed native messages and embeds for thinking/version persistence compatibility before schema changes.
  observability:
    - Use privacy-safe NativeDiagnostics and NativeSyncPerfLog for event counts, sequence anomalies, phase durations, and sanitized message/chat prefixes.
    - Never log message or thinking plaintext.
  assumptions_to_check:
    - A-4 is checked in TASK-1 by tracing existing web debug fixtures and Apple DEBUG launch arguments; implementation is blocked until a single fixture design is recorded.
  acceptance_criteria_coverage:
    - AC-1 through AC-8 map to deterministic Swift lifecycle and Apple UI verification IDs.
    - AC-9 maps to Apple persistence plus CLI, npm SDK, and pip SDK contracts.
    - AC-10 maps to anonymous reducer, cold-boot, and Apple UI proof.
    - AC-11 and AC-12 map to browser contract plus iPhone, iPad, and macOS artifacts.
    - AC-13 maps to focused persistence tests and the privacy guard; AC-14 maps to the pre-implementation backend gate.
  risks:
    - Real providers may skip or reorder optional lifecycle events; deterministic finalization must support valid variants without hiding protocol errors.
    - Repeated markdown parsing may cause streaming jank and broad SwiftUI invalidation.
    - Exact CSS conic-gradient rendering requires a native implementation that preserves color order, timing, radius, and clipping without excessive frame cost.
    - Existing persisted messages lack thinking fields and may require a backward-compatible local migration.
    - macOS window resizing and pointer/selection behavior need dedicated runtime proof.
  open_questions:
    - Which existing fixture seam can drive identical intermediate lifecycle stages on web and Apple with the least test-only product code?
    - What measured screenshot and geometry tolerances should artifact review enforce after browser contract capture?

