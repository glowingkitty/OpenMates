  intentional_native_differences:
    - Native simulator verification uses XCTest/XCUITest rather than Playwright.
    - Apple uses SwiftData/App Group storage rather than IndexedDB/localStorage, but must expose equivalent persistence/retry behavior.
    - Native notification permission and share-extension UI are OS-owned where Apple platform rules require system surfaces.

clarification:
  rounds:
    - question: Should this spec target all authenticated Apple chat sends, including foreground chat, background notification replies, and share-extension sends, or only the foreground path?
      answer: It should target all chat sends, both not authenticated and authenticated, with authenticated focused first.
    - question: For unauthenticated Apple chats, should this spec require full streaming lifecycle parity now, or only no-regression plus compatible architecture?
      answer: Full streaming lifecycle parity is required; the Apple app must fill parity gaps with the web app.
    - question: Are backend/API changes allowed if needed for anonymous streaming events, pending-response recovery, queued-message replay, and cancellation semantics?
      answer: Backend changes are not expected. Apple changes should be enough; ask for confirmation if backend changes appear necessary.
    - question: Should Apple-created chats be verified from web under the same account, or is Apple-only verification enough?
      answer: Apple-created chats should be verified to also show up fully in the OpenMates CLI.
    - question: Should the spec also require web-created chats to load/stream/recover in Apple, or only Apple-created chats matching web behavior and appearing in CLI?
      answer: Also test that OpenMates CLI-created chats load and stream to the Apple app.
  vision_summary: >
    Apple chat must behave like web chat across the full send lifecycle and across
    every Apple entry point. Authenticated foreground/background/share sends are
    prioritized first, but anonymous Apple chats must also use the full streaming
    lifecycle. Cross-client proof is CLI-based: Apple-created chats must be fully
    visible in CLI, and CLI-created chats must load and continue streaming in Apple.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Authenticated Apple foreground send follows web lifecycle
    given:
      - Alice is authenticated in the Apple app with an unlocked master key and an active WebSocket.
      - Alice opens a normal encrypted chat or starts a new authenticated chat.
    when:
      - Alice sends `Kyoto and Osaka quick tip test` from the Apple composer.
    then:
      - The user bubble appears immediately and is encrypted for durable local storage.
      - Apple shows web-equivalent sending, processing, typing, streaming, and final states.
      - The assistant bubble streams progressively in one message row, then finalizes without duplicate assistant messages.
      - Apple sends encrypted user storage and encrypted assistant completion with correct version metadata.

  - id: S-2
    title: Apple persists and flushes completed assistant responses after interruption
    given:
      - Alice sends a message from Apple and the assistant final chunk arrives locally.
      - The WebSocket or app lifecycle interrupts before `ai_response_completed` reaches the server.
    when:
      - Alice returns online or foregrounds/reopens the app.
    then:
      - Apple retains only encrypted or reference-based pending completion state durably.
      - Apple retries `ai_response_completed` before or alongside the next sync so server `messages_v` advances correctly.
      - The pending item is removed only after storage confirmation or equivalent successful send.
      - The UI does not remain stuck in streaming or typing state.

  - id: S-3
    title: Apple recovers interrupted mid-stream responses
    given:
      - Alice sends a message from Apple and receives one or more streaming chunks.
      - The app backgrounds, network drops, or WebSocket reconnects before the final chunk.
    when:
      - Apple reconnects or restarts and syncs that chat.
    then:
      - Partial local content is preserved in encrypted local storage or replaced by authoritative pending/synced content.
      - Orphaned streaming state is cleared deterministically.
      - The final server response appears once when delivered by sync or pending-response event.
      - No duplicate user or assistant messages are created.

  - id: S-4
    title: Apple stop and queued-message behavior matches web contracts
    given:
      - Alice has an active Apple AI task in a chat.
    when:
      - Alice taps Stop, or sends another message while the active task is still running.
    then:
      - Stop sends the existing backend cancellation payload and immediately updates local UI optimistically.
      - Cancellation acknowledgment clears typing, processing, active task, and streaming state idempotently.
      - A second message during an active task shows a composer-local queued-message state equivalent to web.
      - The queued state auto-clears or transitions when the active task ends.

  - id: S-5
    title: Apple background notification replies and share-extension sends use the shared lifecycle
    given:
      - Alice is authenticated and has a chat available to notification reply or the share extension.
    when:
      - Alice sends a notification reply or shares text/URL into OpenMates from an OS-owned share surface.
    then:
      - The send uses the same encrypted message, version, metadata, and retry semantics as foreground chat where platform runtime allows it.
      - If extension/background runtime ends after processing starts, foreground Apple can finish encrypted metadata or assistant-completion handoff later.
      - CLI can later load the resulting chat and decrypt user and assistant messages.

  - id: S-6
    title: Anonymous Apple chat uses full streaming lifecycle parity
    given:
      - Alice is not authenticated and anonymous free usage is available.
      - Alice starts an anonymous Apple chat.
    when:
      - Alice sends `Explain Madrid in one paragraph`.
    then:
      - Apple shows the same processing, typing, streaming chunk, finalization, and follow-up lifecycle as authenticated chat where the anonymous backend provides equivalent data.
      - Anonymous user and assistant messages are encrypted locally with the anonymous chat key and survive app restart.
      - Anonymous sends never persist plaintext private content server-side.
      - After signup/login, promotion preserves the anonymous chat transcript, generated metadata, and message order in authenticated encrypted storage.

  - id: S-7
    title: Apple-created authenticated chats are fully visible in CLI
    given:
      - Alice creates and completes an authenticated Apple chat.
      - The Apple app has completed assistant persistence and any pending retry flush.
    when:
      - The OpenMates CLI syncs the same account.
    then:
      - CLI lists the Apple-created chat with generated title/category metadata.
      - CLI loads and decrypts user and assistant messages in the correct order.
      - CLI sees no version drift, duplicate rows, missing assistant response, or undecryptable message.

  - id: S-8
    title: CLI-created chats load and continue streaming in Apple
    given:
      - Alice creates a chat from OpenMates CLI and receives at least one assistant response.
    when:
      - Alice opens the same account in Apple and sends a follow-up message in the CLI-created chat.
    then:
      - Apple loads the CLI-created chat, decrypts existing messages and metadata, and renders the latest transcript.
      - Apple can send a follow-up in that chat and stream/finalize the response with the same lifecycle as an Apple-created chat.
      - CLI can resync and see the Apple follow-up without version drift or duplicate messages.

  - id: S-9
    title: Apple processing, thinking, and scroll UI match web behavior
    given:
      - Alice sends an Apple message that triggers preprocessing and a model with thinking output.
      - The chat transcript is scrollable enough to observe scroll behavior.
    when:
      - The response progresses from sending through final assistant content.
    then:
      - Apple surfaces preprocessing, typing metadata, model/provider/region where available, thinking chunks, and final completion with OpenMates-native UI.
      - Apple does not auto-scroll to the bottom on every streaming chunk.
      - If Alice manually scrolls during streaming, Apple preserves that position within a small tolerance.

