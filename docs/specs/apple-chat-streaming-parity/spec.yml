contracts:
  websocket:
    - Every event is scoped to chat ID and assistant message ID before mutation.
    - Sequence-aware chunk reduction is monotonic and idempotent; stale events cannot overwrite newer content or final state.
    - Stream subscriber replacement cannot remove a newer subscriber, and Stop cannot permanently detach the mounted chat.
    - messageReady, typingEnded, final chunk, authoritative sync, reconnect, and cancellation are safe in repeated or raced ordering.
  data:
    - User and completed assistant messages are encrypted before durable private storage.
    - Provider-supplied thinking content, signature metadata, token metadata where present, and message ownership survive encrypted local cold boot.
    - Transient partial state never replaces a newer authoritative final response.
    - Message and chat versions remain coherent across foreground, background, anonymous-promotion, CLI, npm SDK, and pip SDK synchronization.
  ui_states:
    - idle
    - sending
    - processing
    - typing
    - thinking_streaming
    - answer_streaming
    - queued
    - cancelling
    - cancelled
    - rejected
    - error_retryable
    - error_terminal
    - reconnecting
    - completed
    - post_processing
  ui_hierarchy:
    - Processing identity, thinking, answer, embeds, generated-by metadata, and response actions belong to one assistant turn keyed by message ID.
    - Thinking renders above the answer body inside that assistant turn.
    - Queued state stays adjacent to the composer; rejection/error notices do not impersonate an assistant message.
  animation:
    - The web active-chat processing ring is a 2px masked conic gradient using #ff2d55, #ff6b2b, #ffd60a, #30d158, #32ade6, #bf5af2, and #ff2d55.
    - The ring rotates 360 degrees in 3 seconds with linear infinite timing, uses a 1.5px blur, follows the 17px container radius, and never intercepts input.
    - The light glow uses the three web shadow layers; dark appearance uses the stronger web layers.
    - Message entry is a one-time 0.4 second opacity and 10px vertical transition for newly created settled rows, not every streamed mutation or paged reappearance.
    - Thinking expansion/collapse uses the web 200ms transition and streamed content remains capped at 200px with internal smooth follow-to-bottom behavior unless the user overrides it.
    - Streaming rich text applies bounded update cadence and tail emphasis without collapsing the message or moving assistant identity.
    - Current web source lacks a rainbow reduced-motion override; this spec intentionally requires web and Apple to converge on a static ring/glow, opacity-only state changes, and non-animated scrolling while preserving status.
  layout:
    - Transcript content remains capped at the web-equivalent 1000px/pt maximum.
    - The latest user message enters the upper transcript region and response growth uses reserved space rather than repeated bottom scrolling.
    - Compact assistant layout follows the rendered web container breakpoint and regular layout keeps avatar/name geometry stable.
    - Exact computed values and tolerances are captured by T-WEB-RENDER-CONTRACT before Apple UI implementation.
  accessibility:
    - Shared concepts use stable identifiers aligned with web test IDs, including active-chat-container, message-user, message-assistant, mate-profile, chat-mate-name, mate-message-content, processing-details, thinking-section, thinking-header, thinking-content, typing-indicator, and follow-up-suggestions.
    - Processing state changes are announced without repeatedly reading the full streamed response.
    - Thinking disclosure exposes localized label, expanded state, and content relationship.
  privacy_security:
    - No plaintext private message, thinking content, key, token, credential, or private identifier is added to durable logs, specs, screenshots, or committed fixtures.
    - Test fixtures use synthetic content and placeholder identifiers.
    - Hidden chain-of-thought is never inferred, requested, or exposed beyond the provider-supplied product payload.

