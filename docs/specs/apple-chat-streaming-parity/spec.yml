    - docs/specs/anonymous-streaming-ui/spec.yml
    - apple/AGENTS.md
    - apple/CLAUDE.md
  code_patterns:
    - frontend/packages/ui/src/components/ActiveChat.svelte owns processing phases, thinking placeholders, the active typing state, and the rainbow container treatment.
    - frontend/packages/ui/src/components/ChatHistory.svelte owns message-relative thinking data, send-time positioning, response spacer behavior, and scroll stability.
    - frontend/packages/ui/src/components/ChatMessage.svelte renders thinking inside its assistant message above the answer body.
    - frontend/packages/ui/src/components/ThinkingSection.svelte defines thinking interaction, markdown, dimensions, styling, and animation.
    - frontend/packages/ui/src/components/ReadOnlyMessage.svelte throttles streaming rendering, preserves height, and fades the newest rendered tail.
    - frontend/packages/ui/src/services/chatSyncServiceHandlersAI.ts and ActiveChat.svelte accumulate lifecycle events into one assistant message.
    - apple/OpenMates/Sources/Core/Networking/StreamingClient.swift buffers per-chat events but has continuation replacement and cancellation risks.
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift owns native lifecycle reduction, transient messages, and encrypted completion.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift currently renders processing and thinking as transcript siblings rather than assistant-message content.
    - apple/OpenMates/Sources/Features/Chat/Views/ThinkingSectionView.swift currently uses plain text and cannot honor manual collapse while streaming.
    - apple/OpenMates/Sources/Shared/Components/RichMarkdownRenderer.swift reparses streamed content and has markdown/token parity gaps.
