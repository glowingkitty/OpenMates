implementation_plan:
  existing_patterns:
    - Web `ActiveChat.svelte` owns processing phase, typing, chunk, thinking, final, and post-processing UI behavior.
    - Web `pendingAIResponses.ts` stores only message id and chat id for failed assistant-completion retry.
    - Web `sendCompletedAIResponseImpl` increments `messages_v` for assistant completion and does not write stale values back locally.
    - Apple `StreamingClient` already buffers events per chat, but `ChatViewModel` ignores thinking/preprocessing and keeps partial chunks transient.
    - Apple `OfflineSyncBridge` has offline action replay, but foreground send does not use it on WebSocket send failure.
    - Apple anonymous chat currently uses a separate final JSON HTTP path and must be adapted into the shared native lifecycle.
  architecture: >
    Introduce a small native chat lifecycle reducer/state model shared by
    foreground authenticated, anonymous, background reply, and share-extension
    sends. Keep WebSocket/backend contracts unchanged by default. Add durable
    encrypted/reference-only queues for pending assistant completion and unfinished
    background/share handoff, correct version math in `ChatSendPipeline`, and make
    foreground recovery flush queues before or with sync. Wire currently-routed
    WebSocket events into explicit Apple state instead of falling back to generic
    reloads. Anonymous transport may adapt final/stream-compatible responses into
    the same reducer until the backend exposes identical streaming frames.
  data_flow:
    - User sends from Apple foreground, notification reply, share extension, or anonymous composer.
    - Shared send path creates a local encrypted user message, advances local message version, and sends existing backend WebSocket/API payload.
    - Processing/typing/preprocessing/thinking events update shared lifecycle state and visible UI.
    - Streaming chunks update one assistant message and persist encrypted first/final/periodic content for recovery.
    - Final assistant content encrypts locally, appends once, advances assistant `messages_v`, sends `ai_response_completed`, and queues retry if unavailable.
    - Foreground/reconnect/cold boot flushes pending assistant completions and background handoffs before stale sync can lock in lower versions.
    - CLI sync loads Apple-created encrypted chat data; Apple sync loads CLI-created encrypted chat data and can continue the same chat.
  affected_files:
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Main foreground lifecycle reducer, chunk persistence, cancellation, queued-message state, anonymous send unification.
    - path: apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
      reason: Processing/typing/thinking/queued/scroll UI parity.
    - path: apple/OpenMates/Sources/App/MainAppView.swift
      reason: Foreground recovery, pending flush, background completion application, active chat resubscription.
    - path: apple/OpenMates/Sources/Core/Networking/WebSocketManager.swift
      reason: Route currently ignored events into explicit native lifecycle handlers where needed.
    - path: apple/OpenMates/Sources/Core/Networking/StreamingClient.swift
      reason: Ensure stream event buffering and replay supports recovery without duplicates.
    - path: apple/OpenMates/Sources/Core/Persistence/ChatStore.swift
      reason: Message/version merge and partial/final replacement semantics.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Durable pending assistant response and background/share handoff queues.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineSyncBridge.swift
      reason: Offline send replay and recovery flush sequencing.
    - path: apple/OpenMates/Sources/Core/Services/AnonymousFreeUsageService.swift
      reason: Anonymous shared lifecycle adaptation, encrypted local chunk/final persistence, promotion parity.
    - path: apple/OpenMatesShared/BackgroundChatSender.swift
      reason: Share-extension/background send handoff and metadata timeout durability.
    - path: apple/OpenMatesTests/ChatSendPipelineParityTests.swift
      reason: New deterministic payload/version/key/retry tests.
    - path: apple/OpenMatesTests/ChatStreamingLifecycleParityTests.swift
      reason: New deterministic reducer and lifecycle tests.
    - path: apple/OpenMatesTests/AnonymousChatStreamingParityTests.swift
      reason: New anonymous lifecycle and promotion tests.
    - path: apple/OpenMatesTests/BackgroundChatSenderParityTests.swift
      reason: New background/share handoff tests.
    - path: apple/OpenMatesUITests/ChatStreamingLifecycleParityUITests.swift
      reason: New live-dev authenticated lifecycle test.
    - path: apple/OpenMatesUITests/ChatStreamingInterruptionParityUITests.swift
      reason: New interruption/recovery test.
    - path: apple/OpenMatesUITests/ChatAnonymousStreamingParityUITests.swift
      reason: New anonymous lifecycle test.
    - path: apple/OpenMatesUITests/ChatCliCrossClientParityUITests.swift
      reason: New CLI-created chat Apple continuation test.
    - path: apple/OpenMatesUITests/ChatScrollStreamingParityUITests.swift
      reason: New Apple scroll stability test.
    - path: frontend/packages/openmates-cli/tests/client.test.ts
      reason: Extend CLI proof for Apple-created and CLI-created cross-client chat artifacts where practical.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-chat-streaming-parity/spec.yml
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/ChatSendPipelineParityTests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/ChatStreamingLifecycleParityTests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/AnonymousChatStreamingParityTests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesTests/BackgroundChatSenderParityTests"
    - cd frontend/packages/openmates-cli && node --test --experimental-strip-types --loader ./tests/loader.mjs tests/client.test.ts tests/ws.test.ts
    - python3 scripts/audit_sdk_cli_parity.py
    - python3 scripts/tests.py run --spec chat-scroll-streaming.spec.ts
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatStreamingLifecycleParityUITests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatStreamingInterruptionParityUITests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatAnonymousStreamingParityUITests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatCliCrossClientParityUITests"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing "OpenMatesUITests/ChatScrollStreamingParityUITests"
    - python3 scripts/code_quality_guard.py
    - python3 scripts/spec_verify.py docs/specs/apple-chat-streaming-parity/spec.yml
  verification_order:
    - Spec validation first.
    - Deterministic Apple unit tests red before implementation.
    - CLI cross-client contract tests red before implementation.
    - Implement authenticated foreground slice first.
    - Implement recovery/pending/cancel/queued/scroll slice second.
    - Implement background/share handoff slice third.
    - Implement anonymous lifecycle parity fourth.
    - Run CLI/SDK parity audit before web and Apple live E2E green evidence.
    - Run web source-of-truth spec after deploy where required.
    - Run Apple remote live E2E tests last.

