scenarios:
  - id: S-1
    title: Foreground send creates one stable assistant turn
    given:
      - Alice is authenticated in Apple with an unlocked chat key and active connection.
    when:
      - Alice sends a prompt and the response progresses through task, processing, typing, thinking, chunks, completion, and post-processing.
    then:
      - The user message appears immediately and is encrypted for durable storage.
      - One assistant message ID owns identity, thinking, progressive answer, embeds, and final actions.
      - No duplicate assistant row or detached processing/thinking card is created.
  - id: S-2
    title: Processing and rainbow animation match web
    given:
      - The current chat receives active assistant typing state.
    when:
      - Processing is visible before and during the first answer chunk.
    then:
      - The active chat container shows the web-equivalent rotating rainbow ring and outer glow.
      - The ring does not block interaction or alter content geometry.
      - Terminal, error, cancellation, and chat-switch events remove the treatment without leaving stale glow.
  - id: S-3
    title: Thinking belongs to and persists with the assistant message
    given:
      - A model emits provider-supplied thinking before answer text.
    when:
      - Multiple thinking chunks arrive and thinking completes.
    then:
      - Apple creates the owning assistant placeholder before answer text.
      - Thinking chunks accumulate in order, render markdown, auto-expand, allow manual override, cap and internally scroll while streaming, then collapse according to web behavior.
      - Completed thinking is encrypted-local persisted and restored with the same assistant message after cold boot.
  - id: S-4
    title: Answer chunks update one stable rich response
    given:
      - The assistant message exists and receives sequenced answer chunks.
    when:
      - Chunks include incomplete markdown and embed placeholders before a final payload.
    then:
      - Duplicate, stale, and out-of-order events cannot roll back or duplicate content.
      - Markdown, links, code, tables, interactive content, and embeds remain stable while progressive content grows.
      - Chunk updates do not retrigger row-entry animation or move assistant identity.
  - id: S-5
    title: Transcript positioning remains stable during response growth
    given:
      - Alice sends a short or multiline prompt in a chat with scrollable history.
    when:
      - The user message is positioned and the assistant response grows.
    then:
      - Apple positions the latest user message in the upper transcript region like web.
      - Response growth consumes reserved space without forced bottom scrolling.
      - Manual scroll and load-earlier anchors remain stable within measured tolerances.
  - id: S-6
    title: Completion is durable even when final signals race
    given:
      - Apple has rendered one or more partial chunks.
    when:
      - A final chunk, messageReady, typingEnded, authoritative sync, or reconnect completes the response in any valid ordering.
    then:
      - Exactly one final assistant message is encrypted and persisted.
      - Transient flags, processing UI, rainbow treatment, thinking-streaming state, stop control, and spacer state clear idempotently.
      - Relaunch restores the final message and completed thinking without an orphaned stream.
  - id: S-7
    title: Stop and resend remain functional in the same open chat
    given:
      - Alice has an active streamed response.
    when:
      - Alice stops it and sends another prompt without navigating away.
    then:
      - Cancellation uses the existing backend contract and produces an explicit native terminal state.
      - The per-chat subscription remains usable or is safely replaced.
      - The second response streams and persists normally without buffered-event loss.
  - id: S-8
    title: Queued, rejected, and failed responses have distinct visible states
    given:
      - A request is queued, rejected, fails before streaming, or fails mid-stream.
    when:
      - Apple receives the corresponding event or connection error.
    then:
      - Queued state is composer-local and transitions when work starts.
      - Rejections render as system notices rather than assistant identity bubbles.
      - Errors are visible, safe, retryable where applicable, and preserve recoverable user input.
      - No terminal path leaves a stuck spinner, rainbow glow, placeholder, or stop control.
  - id: S-9
    title: Background and share sends converge on the same durable lifecycle
    given:
      - Alice sends from a notification reply, share extension, macOS quick capture, or other background entry point.
    when:
      - The constrained process ends before all AI or encrypted-storage work completes.
    then:
      - Foreground recovery resumes through shared encrypted queues and lifecycle state.
      - User and assistant messages become cross-client visible with coherent versions and no plaintext durable storage.
  - id: S-10
    title: Anonymous chat uses the same visible lifecycle
    given:
      - Alice is signed out and anonymous free usage is available.
    when:
      - Alice sends a prompt, receives a response, restarts, and later signs up.
    then:
      - Anonymous processing, thinking, animation, chunks, finalization, errors, and follow-ups match authenticated UI where the backend supplies equivalent data.
      - Local content remains encrypted and promotion preserves order, thinking, embeds, and metadata.
  - id: S-11
    title: Reduced Motion preserves information without continuous movement
    given:
      - Reduce Motion is enabled.
    when:
      - Processing, thinking, message entry, and streaming-tail states appear.
    then:
      - State, hierarchy, color, border, and status information remain visible.
      - Rainbow rotation, shimmer, repeated dot motion, slide, and offset movement become static or cross-fade equivalents.
  - id: S-12
    title: Responsive Apple layouts match rendered web contracts
    given:
      - The same deterministic lifecycle fixture is available on web and Apple.
    when:
      - It runs on compact iPhone, regular iPad, narrow macOS, and wide macOS layouts in light and dark appearance.
    then:
      - Message hierarchy, widths, avatar/name positions, thinking card, rainbow ring, composer-adjacent statuses, and final actions match the captured browser contract within approved tolerances.
      - Dynamic Type, keyboard, VoiceOver, pointer, and selection behavior do not hide or obstruct required state.

