  parity_expectations:
    - The browser-rendered web product is the final authority for owned UI hierarchy, geometry, styles, timing, and responsive state.
    - iPhone, iPad, and macOS expose the same lifecycle and owned product UI; platform APIs may differ only where the OS owns the surface.
    - Apple uses generated tokens and OpenMates primitives and introduces no stock product chrome.
    - Apple renders and encrypted-local persists exactly the provider-supplied thinking payload exposed by web; it never fabricates or exposes hidden reasoning.
    - Rainbow processing treatment, thinking transitions, streaming-tail animation, and message-entry behavior match web under normal motion and become non-moving but equally informative under Reduce Motion.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/ChatStreamingLifecycleParityTests
    - python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/ChatResponseProcessingParityUITests
    - Remote iPad UI test and screenshot run using an available iPad Pro simulator.
    - Remote OpenMates_macOS build plus narrow and wide window screenshot evidence.
  intentional_native_differences:
    - Apple uses SwiftData/App Group persistence instead of IndexedDB while preserving equivalent encrypted lifecycle semantics.
    - Apple uses XCTest/XCUITest and native screenshot artifacts instead of Playwright for native proof.
    - OS-owned input, selection, permission, share, and accessibility mechanics may differ while surrounding OpenMates UI and state remain equivalent.

clarification:
  rounds:
    - question: Should the spec cover visual parity only or functional lifecycle defects that affect rendering?
      answer: Full chat lifecycle.
    - question: Should the legacy spec be preserved or migrated in place?
      answer: Migrate the existing spec in place to Schema V2 as the single source of truth.
    - question: Which Apple platforms are required?
      answer: iPhone, iPad, and macOS; Watch is out of scope.
    - question: What thinking payload should Apple display and persist?
      answer: Match the existing provider-supplied web payload and never infer hidden reasoning.
    - question: Does the discovered full-lifecycle scope match the intended vision?
      answer: Approved, including exact animation parity such as the rainbow processing animation.
  vision_summary: >
    Apple chat must match the complete web response lifecycle, not only the final
    message. One stable assistant turn owns processing identity, provider-supplied
    thinking, progressive answer rendering, terminal cleanup, and post-processing;
    encryption, recovery, scrolling, animation, accessibility, and responsive
    behavior are part of the same contract on iPhone, iPad, and macOS.
  approved_by_user: true

