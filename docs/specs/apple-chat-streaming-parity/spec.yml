id: apple-chat-streaming-parity
title: Apple Chat Streaming Messaging And Persistence Parity
status: approved

goal: >
  Make Apple chat sends behave like web chat sends across streaming, processing
  state, encrypted persistence, interruption recovery, cancellation, queued
  messages, and cross-client visibility. Authenticated Apple sends are the first
  implementation priority, but unauthenticated anonymous Apple chats must also
  reach the same full streaming lifecycle parity rather than remaining a separate
  final-response-only path.

scope:
  in:
    - Authenticated foreground sends from `ChatView` and `ChatViewModel`.
    - Authenticated background notification replies from `MainAppView` and `ChatSendPipeline`.
    - Authenticated share-extension/background sends from `BackgroundChatSender`.
    - Unauthenticated Apple anonymous free-usage sends, including local encrypted storage and promotion after signup.
    - Web-equivalent processing phases, typing metadata, thinking/preprocessing display, streaming chunks, finalization, follow-up suggestions, and post-processing state where Apple has the same product surface.
    - Durable Apple recovery for final assistant responses that could not send `ai_response_completed` because the socket/app lifecycle interrupted the send.
    - Correct `messages_v` advancement for Apple user messages, assistant messages, pending responses, and promoted anonymous messages.
    - Apple Stop/cancel and queued-message behavior matching existing backend/WebSocket contracts.
    - Streaming scroll stability matching web behavior: no forced bottom auto-scroll during streamed chunk growth, and manual scroll position is preserved.
    - Cross-client verification that Apple-created chats are fully visible and decryptable in OpenMates CLI.
    - Cross-client verification that CLI-created chats load in Apple and can continue receiving streamed Apple responses.
  out:
    - Backend/API contract changes unless implementation proves an existing backend contract is missing or incompatible; if that happens, stop and ask for user confirmation before editing backend behavior.
    - Replacing the zero-knowledge encryption model or storing private chat content durably in plaintext.
    - Rewriting the whole Apple app shell or transcript implementation to UIKit unless profiling or tests prove SwiftUI cannot meet parity.
    - Using the web app as the cross-client verifier for this spec; web remains the behavior source of truth, while CLI is the requested cross-client verification surface.
    - Changing CLI, npm SDK, or pip SDK public contracts except for tests/fixtures needed to verify existing chat behavior.
    - Committing private account credentials, private chat IDs, raw logs with identifiers, remote Mac details, or anonymous local identifiers.

