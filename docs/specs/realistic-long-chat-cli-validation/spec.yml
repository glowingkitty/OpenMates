decisions:
  - id: D-1
    status: active
    decision: The realistic validation chat must be driven by individual CLI turns inspected by OpenCode, not by a hidden deterministic script.
    reason: The goal is to evaluate real OpenMates quality, not just automated plumbing.
    decided_at: "2026-07-22"
  - id: D-2
    status: active
    decision: The validation run has no explicit max credit, token, or time cap.
    reason: The user explicitly accepted the expected high token/credit cost for realistic validation.
    decided_at: "2026-07-22"
  - id: D-3
    status: active
    decision: Pause on failed assistant responses or clearly broken/nonsensical embeds and ask before debugging or continuing.
    reason: Continuing a broken long chat can hide product defects and produce a poor public example.
    decided_at: "2026-07-22"
  - id: D-4
    status: active
    decision: Use Gemini models for the chat, primarily google/gemini-3.5-flash-lite where possible.
    reason: The validation should exercise the intended economical Gemini path.
    decided_at: "2026-07-22"
  - id: D-5
    status: active
    decision: Compression must use an intended cheap Gemini Flash or Flash-Lite path before the real validation counts as complete.
    reason: The previous smoke used a configured compression model that did not satisfy the user's expected Flash/Flash-Lite constraint.
    decided_at: "2026-07-22"
  - id: D-6
    status: active
    decision: The published compressed example chat must expose the compression summary and Show old forgotten messages reveal, not the normal Show older messages control.
    reason: The final example represents compressed history through checkpoint metadata and local reveal behavior, while normal older-message loading remains scroll-driven for non-static chat windows.
    decided_at: "2026-07-23"

attempts:
  - id: ATTEMPT-1
    task_id: TASK-3
    approach: One large first message plus four short follow-ups as a real compression smoke.
    outcome: rejected
    recorded_at: "2026-07-22"
    notes: This proved live checkpoint plumbing but violated the realistic many-turn validation requirement; it compressed one large old message and triggered only one checkpoint.
  - id: ATTEMPT-2
    task_id: TASK-3
    approach: Realistic Gemini Flash-Lite CLI chat 30521f99-a424-490e-be6b-8e35c281d3a5 continued turn by turn through business strategy, customer discovery, architecture, UX, GTM, outbound assets, and PRD planning with a temporary 6500-token compression threshold override.
    outcome: blocked
    recorded_at: "2026-07-22"
    notes: Turn 7 streamed a coherent PRD response, but the source CLI exited with "Encrypted completion recovery was rejected" and the raw transcript did not contain the assistant response. Compression triggered for 13 messages, but no chat_compression_checkpoints row persisted. Redis override cleanup via direct redis-cli was rejected by Redis auth, so use the admin API or authenticated cache path before resuming or ending the run.
  - id: ATTEMPT-3
    task_id: TASK-3
    approach: Applied a recovery metadata/versioning fix, restarted api/app-ai-worker, re-enabled the temporary 6500-token compression threshold, and retried chat 30521f99 with a repair-style PRD prompt through the source CLI.
    outcome: blocked
    recorded_at: "2026-07-22"
    notes: The CLI turn persisted without the previous encrypted completion recovery rejection, and logs showed recovery metadata no longer advanced terminal messages_v. The assistant response was unusable because it referred to a PRD "right above" that the user could not see; logs show the failed PRD assistant from ATTEMPT-2 remained in AI context/cache despite not being present in the raw Directus transcript. Compression triggered at 15 messages with the 6500-token override but skipped with "No messages to compress after split," so no chat_compression_checkpoints row exists for chat 30521f99. The temporary threshold override was cleared via /v1/admin/compression-threshold and verified as null.
  - id: ATTEMPT-4
    task_id: TASK-3
    approach: Tightened the recovery stream-consumer patch after code review so recovery cleanup updates non-terminal metadata only and performs no inference-cache write before terminal persistence.
    outcome: blocked
    recorded_at: "2026-07-22"
    notes: Targeted recovery tests now assert no messages_v increment, no client persistence event, and no AI inference-cache mutation in the recovery cleanup path. app-ai-worker was restarted with this safer behavior. The preserved chat 30521f99 may still contain polluted AI cache/history from ATTEMPT-2/3 and should not be used as final example source unless explicitly repaired or accepted by the user.
  - id: ATTEMPT-5
    task_id: TASK-3
    approach: Fixed the compression split edge case, dev-repaired chat 30521f99 by removing failed tail rows and the stale PRD task, cleared AI/sync caches, then retried the PRD turn with the 6500-token threshold override.
    outcome: blocked
    recorded_at: "2026-07-22"
    notes: Targeted compressor/recovery tests passed and app-ai-worker was restarted. The repaired raw transcript ended at the last good outbound-assets assistant response before retrying. The retry wrote a new user message but the CLI timed out waiting for AI response; app-ai-worker logs did not show the task being received and no assistant/checkpoint rows appeared. The new orphan user row was removed, AI cache cleared again, and the temporary threshold override was cleared/verified null. Next blocker is the CLI/API dispatch path that can persist a user message without starting the AI task.
  - id: ATTEMPT-6
    task_id: TASK-3
    approach: Added retryable dispatch-failure handling for saved-chat recovery sends and SDK saved-chat creation.
    outcome: succeeded
    recorded_at: "2026-07-22"
    notes: The recovery transaction extension now allows mark_inference_failed from ENQUEUED before worker claim, so API dispatch failures can mark the preflight/outbox FAILED. The WebSocket message handler now treats ai.ask responses without a task_id as a scoped ai_dispatch_failed error and marks the expected recovery inference failed; CLI collectAiResponse already rejects scoped error frames instead of timing out. The SDK saved-chat path now does the same and returns a retryable 502 detail. api and cms were restarted and api.dev.openmates.org health recovered. This guards the orphan/timeout path but does not implement a new CLI/SDK fork-from-message API; the existing fork behavior remains client-side web-only.
  - id: ATTEMPT-7
    task_id: TASK-3
    approach: Implemented CLI/SDK chat messages, fork, rewind, and retry support; repaired chat 30521f99 by retrying the PRD turn from boundary 736e1dc9-d0b0-478d-8542-fb5bfc1adbae with source CLI history hydration for saved chats.
    outcome: blocked
    recorded_at: "2026-07-22"
    notes: Focused npm SDK tests passed after the CLI client fixes. Live retry first exposed that the destructive rewind had already removed the orphan PRD user turn, then a direct send with @Gemini-3.5-Flash-Lite persisted a retryable PRD user message while the WebSocket closed during an api restart. A subsequent `chats retry 30521f99 --yes --response-timeout-seconds 600 --json` succeeded, deleted the orphan user message, invalidated one preflight/job/outbox set, and produced durable assistant message ce16cb9b-a28f-40be-936d-ca9305d4cdeb with a usable PRD response. `chats messages 30521f99 --json` now returns the full decrypted 22-message transcript after adding a paginated message-window fallback for empty full-sync caches. Direct database query found zero chat_compression_checkpoints rows for this chat, so the validation remains blocked on the two-checkpoint requirement before share/example publishing.
  - id: ATTEMPT-8
    task_id: TASK-3
    approach: Re-enabled the temporary 6500-token compression threshold, continued repaired chat 30521f99 with two inspected Gemini Flash-Lite turns, verified code embed rendering, and cleared the override.
    outcome: succeeded
    recorded_at: "2026-07-22"
    notes: The Sprint 1 engineering backlog turn completed with assistant message 207ca93d-3959-5db1-869c-6368232737ee and created checkpoint fc861922-e2c7-46d1-89a2-5b01d6719652 (compressed_message_count=19, summary_token_estimate=1402, compressed_up_to_timestamp=1784762057). The next Tauri scaffolding turn initially hit a WebSocket closure during an api restart, then `chats retry 30521f99 --yes --response-timeout-seconds 600 --json` repaired it and produced assistant message 5c1d9872-f3c9-59b3-9730-7bc5376e70cf plus code embeds fe39a10f, c49bc081, ab703220, 86dc6188, and b084ff22. Normal `chats show 30521f99` rendered those code embeds with filenames, languages, and previews. Database verification then found checkpoint 8e05dbbc-ec3a-4ae2-9a8d-440e52486933 (compressed_message_count=22, summary_token_estimate=1665, compressed_up_to_timestamp=1784762640). The admin threshold override was deleted and verified as null/default 100000.

