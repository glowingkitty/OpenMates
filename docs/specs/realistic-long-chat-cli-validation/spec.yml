scenarios:
  - id: S-1
    title: User chooses a long-running validation topic
    given:
      - OpenCode starts the reusable long-chat validation skill.
    when:
      - No topic is already approved for the session.
    then:
      - The skill suggests concrete long-running topics, including company-building advice across strategy, product, finance, marketing, hiring, operations, docs, sheets, and code.
      - The skill asks the user to choose or confirm one topic before any CLI chat is started.

  - id: S-2
    title: OpenCode drives a realistic many-turn CLI chat
    given:
      - The user has approved a topic.
      - The CLI test account is logged in against api.dev.openmates.org.
    when:
      - OpenCode starts and continues the chat.
    then:
      - Each turn is sent through the real OpenMates CLI path.
      - OpenCode inspects the assistant response and any generated embeds before sending the next turn.
      - The transcript consists of many individual user/assistant turns rather than one giant synthetic message.
      - The chat stays on Gemini routing with google/gemini-3.5-flash-lite primary where selectable.

  - id: S-3
    title: Workflow pauses on broken quality or product behavior
    given:
      - The long-running chat is in progress.
    when:
      - A CLI turn fails, an assistant response is missing or unusable, or a generated embed is broken, irrelevant, or nonsensical.
    then:
      - OpenCode pauses the run.
      - OpenCode reports the issue with the chat id, turn number, model when known, and affected embed or response.
      - OpenCode asks the user whether to debug/fix the issue or continue anyway.

  - id: S-4
    title: Two real compression checkpoints are verified
    given:
      - The same realistic CLI chat has accumulated enough token history.
    when:
      - Compression triggers during the first and later second context-pressure cycles.
    then:
      - The first compression checkpoint is durably persisted for the chat.
      - The chat continues with more inspected CLI turns.
      - A second compression checkpoint is durably persisted for the same chat.
      - Evidence records checkpoint ids, compressed_message_count values, summary_token_estimate values, model routing, and approximate credit spend.

  - id: S-5
    title: Successful chat becomes a public example chat
    given:
      - A realistic long CLI chat has passed quality checks and produced two verified compression checkpoints.
    when:
      - OpenCode publishes the chat as an example.
    then:
      - OpenCode creates a share link for the real chat and keeps the key fragment out of committed files and final public logs.
      - OpenCode uses the add-example-chat workflow and scripts/create-example-chat-from-share.mjs to scaffold the hardcoded example.
      - The deployed example page opens successfully.
      - The example exposes a compression summary and exercises Show old forgotten messages.

