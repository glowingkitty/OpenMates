implementation_plan:
  spec_path: docs/specs/realistic-long-chat-cli-validation/spec.yml
  existing_patterns:
    - .agents/skills/add-example-chat/SKILL.md
    - .claude/skills/add-example-chat/SKILL.md
    - docs/specs/long-chat-compression-history/spec.yml
    - scripts/create-example-chat-from-share.mjs
  architecture: >
    Add a reusable workflow skill that composes existing CLI chat, compression,
    sharing, and add-example-chat behavior instead of creating a new product API.
    Keep model/cost/checkpoint evidence in this spec, pause on real quality bugs,
    and only publish the chat after two verified compression checkpoints.
  data_flow:
    - User approves topic through the reusable skill before any chat starts.
    - OpenCode sends one CLI turn at a time against api.dev.openmates.org.
    - Backend model-selection and compression logs provide sanitized model evidence.
    - Directus chat_compression_checkpoints rows provide checkpoint persistence evidence.
    - OpenCode creates a share link only after live validation succeeds.
    - scripts/create-example-chat-from-share.mjs converts the shared chat into public example-chat files.
    - Deployed app.dev example page verifies the compression summary and forgotten-history reveal for the published example.
  affected_files:
    - path: .claude/skills/realistic-long-chat-validation/SKILL.md
      reason: Canonical reusable workflow skill source.
    - path: .agents/skills/realistic-long-chat-validation/SKILL.md
      reason: OpenCode-compatible skill mirror generated from the canonical skill.
    - path: backend/apps/ai/processing/chat_compressor.py
      reason: Compression model routing must use the approved cheap Gemini Flash/Flash-Lite path.
    - path: backend/tests/test_chat_compressor.py
      reason: Regression coverage for compression model routing and existing compression behavior.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/<slug>.ts
      reason: Generated final hardcoded example chat from the successful share link.
    - path: frontend/packages/ui/src/i18n/sources/example_chats/<slug>.yml
      reason: Generated i18n source for the final example chat.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Registration point for the final example chat.
    - path: frontend/apps/web_app/tests/example-chats-load.spec.ts
      reason: Deployed example-page compression summary and forgotten-history reveal verification.
    - path: docs/specs/realistic-long-chat-cli-validation/spec.yml
      reason: Product contract and evidence ledger for the workflow.
  verification_strategy:
    - Validate skill contract and agent parity before running any live chat.
    - Prove compression model routing uses the intended cheap Gemini Flash or Flash-Lite path.
    - Run the realistic CLI chat manually one turn at a time and record model, quality, cost, and checkpoint evidence.
    - Verify at least two persisted Directus compression checkpoints for the same chat.
    - Convert the successful share link into a hardcoded example and audit for private data.
    - Deploy and verify the example page on app.dev.openmates.org with the compression summary and Show old forgotten messages reveal.
  verification_order:
    - V-PRODUCT-CONTRACT-APPROVAL
    - T-SKILL-CONTRACT
    - T-COMPRESSION-MODEL
    - T-MODEL-ROUTING
    - T-REAL-CLI-LONG-CHAT
    - T-CHECKPOINT-DB-VERIFY
    - V-LIVE-RUN-OBSERVATION
    - T-EXAMPLE-SCAFFOLD
    - T-EXAMPLE-OLDER-MESSAGES
    - V-USER-CONFIRMATION
  phases:
    - phase: awaiting_approval
      tasks: [TASK-1]
    - phase: working_tasks
      tasks: [TASK-2]
    - phase: running_checks
      tasks: [TASK-3]
    - phase: working_tasks
      tasks: [TASK-4, TASK-5]

