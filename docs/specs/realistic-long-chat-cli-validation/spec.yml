risks:
  - id: R-1
    risk: A realistic long chat may uncover unrelated product bugs or broken embeds.
    mitigation: Pause and ask the user whether to debug/fix or continue.
  - id: R-2
    risk: The intended Gemini Flash-Lite model cannot be forced by the current CLI.
    mitigation: Record backend model-selection evidence or add a narrow model-selection path before the run if needed.
  - id: R-3
    risk: Long share-link extraction or example scaffold may not preserve enough history and checkpoint metadata for the compressed forgotten-history reveal.
    mitigation: Verify scaffold output count and checkpoint metadata before deploy and extend example-chat support only if needed.
  - id: R-4
    risk: The example chat may contain public-inappropriate business advice or private test artifacts.
    mitigation: Inspect the transcript and generated embeds before conversion and again after deployed rendering.

open_questions:
