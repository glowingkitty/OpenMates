contracts:
  workflow:
    - name: realistic-long-chat-validation skill
      access_model: internal developer workflow only
      auth: OpenCode operator uses logged-in OpenMates CLI test account and dev API
      rate_limits: existing OpenMates CLI/API/WebSocket limits apply
      credit_limits: no explicit max credit cap for this workflow; actual usage must be recorded
      encryption_boundary: share URL key fragments and chat keys must not be committed or printed in final public output
      stop_conditions:
        - assistant response failure
        - clearly broken, missing, irrelevant, or nonsensical embed
        - missing or non-persisted checkpoint when compression should have completed
        - non-Gemini model route unless user explicitly accepts continuing
  data:
    - The final example chat must originate from the successful real shared chat.
    - Evidence must record sanitized chat id, checkpoint ids, compressed_message_count, summary_token_estimate, model names, and credit spend.
    - The share URL key fragment may be used locally during conversion but must not be committed.
  ui_states:
    - Final deployed example chat opens normally.
    - Final deployed example chat shows a compression summary and Show old forgotten messages.
    - Compressed forgotten-message loading works on the final deployed example chat.
  privacy_security:
    - Do not commit share URL fragments, chat keys, private account data, raw cookies, or private tokens.
    - Inspect generated business advice for private test-account artifacts before publishing.
    - Do not hand-edit private content into the example transcript.

