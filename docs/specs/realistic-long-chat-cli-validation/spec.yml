    status: resolved
    question: Should this run have a max cost or time cap?
    answer: No explicit cap.
  - id: OQ-2
    status: resolved
    question: What should the default topic be?
    answer: Business advice for building a company across many functional areas.
  - id: OQ-3
    status: resolved
    question: Which exact public slug/title should the final example use?
    answer: Use slug example-privacy-first-local-ai and title Build a Privacy-First Local AI Workspace.
