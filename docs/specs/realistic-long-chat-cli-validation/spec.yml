schema_version: 2
id: realistic-long-chat-cli-validation
title: Realistic Long Chat CLI Validation Workflow
status: implementing

goal: >
  Create a reusable OpenCode skill and verified workflow for running a realistic,
  many-turn OpenMates CLI chat that validates long-context quality, Gemini model
  routing, generated embed quality, repeated compression checkpoints, share-link
  conversion, and final example-chat UX with compressed forgotten-history reveal.

scope:
  in:
    - A reusable skill that first agrees with the user on a long-running chat topic before starting any CLI chat.
    - Suggested topic examples, with the default candidate being business advice for building a company across strategy, product, finance, marketing, hiring, operations, documents, sheets, and code/tooling.
    - A real OpenMates CLI chat driven turn by turn by OpenCode against api.dev.openmates.org with real auth/test-account state.
    - Individual human-inspected turns; no hidden deterministic script may drive the full conversation unattended.
    - Primary chat model routing to Gemini, preferably google/gemini-3.5-flash-lite when selectable.
    - Compression model verification and, if needed, correction so compression uses an intended cheap Gemini Flash or Flash-Lite path.
    - Continuation until at least two durable compression checkpoints are observed and verified in the same chat.
    - Pausing when an assistant response fails or a generated embed is clearly broken, missing, irrelevant, or nonsensical.
    - Conversion of the successful shared real chat into a hardcoded public example chat using the existing add-example-chat workflow.
    - Verification that the final example chat exposes a compression summary and exercises Show old forgotten messages.
  out:
    - Treating a one-large-message smoke test as realistic long-chat validation.
    - Using mocked API calls, fixture replay, direct backend calls, or synthetic transcripts as proof for the real validation run.
    - Continuing through broken assistant responses or broken embeds without user permission.
    - Setting an arbitrary max credit, token, or time cap for this validation run.
    - Publishing an example chat before the real source chat passes the validation gates.
    - Hand-editing the transcript into a better demo after the fact instead of generating a better real CLI chat.

context_discovery:
  github_issues:
    - "GitHub MCP get_me is unavailable in this environment with 401 Bad credentials; no new tracker lookup was performed for this workflow spec."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/long-chat-compression-history/spec.yml
    - docs/specs/example-chat-public-quality/spec.yml
    - docs/specs/cli-model-benchmarks/spec.yml
    - docs/architecture/chat-compression.md
  code_patterns:
    - .agents/skills/add-example-chat/SKILL.md composes real CLI chat creation, share URL extraction, scaffold generation, deployment, and deployed example verification.
    - .claude/skills/add-example-chat/SKILL.md is the canonical Claude-compatible skill source mirrored into .agents/skills.
    - scripts/create-example-chat-from-share.mjs converts a shared chat URL with key fragment into hardcoded example chat data and i18n sources.
    - scripts/extract-shared-chat.mjs decrypts shared chat content for inspection.
    - backend/apps/ai/processing/chat_compressor.py owns COMPRESSION_MODEL_ID and compression split behavior.
    - frontend/packages/openmates-cli/src/cli.ts and frontend/packages/openmates-cli/src/client.ts provide the source CLI path for real chats.
    - frontend/apps/web_app/tests/long-chat-history.spec.ts verifies scroll-loaded older history, forgotten-message reveal, and export metadata for deterministic long-chat fixtures.
  tests:
    - backend/tests/test_chat_compressor.py
    - backend/tests/test_chat_compression_checkpoint_handler.py
    - frontend/packages/openmates-cli/tests/ws.test.ts
    - frontend/packages/openmates-cli/tests/client.test.ts
    - scripts/tests/create_example_chat_from_share.test.mjs
    - frontend/apps/web_app/tests/long-chat-history.spec.ts
    - frontend/apps/web_app/tests/example-chats-load.spec.ts

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - This spec creates an OpenCode workflow skill, runs a CLI validation chat, and publishes a public web example chat. It does not change Apple runtime behavior directly.
  verification:
    - Apple not affected.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: What exact validation target should be proven this time?
      answer: A realistic many-turn CLI chat that triggers compression twice, then a published UX example chat after success.
    - question: What realistic long-running task should the chat be about?
      answer: Business advice for building up a company, going step by step through many topics including docs, sheets, code, and other generated artifacts.
    - question: What guardrails should stop or pause the run?
      answer: Pause when an assistant response fails or an embed is clearly broken, missing, irrelevant, or nonsensical; report the issue and ask whether to debug or continue. No max credits, tokens, or time limit.
    - question: Should model selection be forced or normal auto-selection used?
      answer: Keep using Gemini models, with google/gemini-3.5-flash-lite as the primary model where possible, and verify compression uses the intended cheap Gemini Flash or Flash-Lite path.
    - question: What should publishing mean after the chat succeeds?
      answer: Use the share link of the successful chat to convert it into an example chat, and ensure compressed history can be opened with the Show old forgotten messages control.
  vision_summary: >
    The reusable workflow should test OpenMates like a real long-running user would:
    a natural, multi-topic company-building advisory chat through the CLI, many
    individual inspected turns, Gemini Flash-Lite primary routing, repeated real
    compression, and generated docs/sheets/code quality checks. Only after the
    real chat succeeds should the share link be converted into a public example
    chat that visibly exercises the compressed forgotten-history reveal.
  approved_by_user: true

