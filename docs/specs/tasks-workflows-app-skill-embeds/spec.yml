    - docs/specs/workflows-v1/spec.yml
    - docs/architecture/platforms/tasks-v1.md
    - docs/architecture/apps/app-skills.md
    - docs/architecture/messaging/embeds.md
  code_patterns:
    - backend/apps/ai/processing/task_tool_context.py currently returns no task prompt when no visible tasks exist.
    - backend/apps/ai/processing/task_runtime_tools.py currently exposes task_create, task_update, task_reorder, task_block, task_complete, task_unblock, and task_move as main-processor tools.
    - docs/specs/tasks-main-processor-tools/spec.yml currently requires encrypted task event `system` messages, which this spec supersedes for new dev data.
    - docs/architecture/apps/app-skills.md defines app skills as independently executed JSON-producing skill calls that become embeds.
    - docs/architecture/messaging/embeds.md defines parent `app_skill_use` embeds, child embed IDs, client-encrypted embed persistence, and fullscreen-capable rendering.
    - docs/specs/workflows-v1/spec.yml already defines workflow assistant skills, server-side execution, and Automation Vault-style server runtime access.
    - frontend/packages/openmates-cli/src/client.ts currently renders `taskEvents` and `pendingTaskUpdateJobs` from task system-event flows.
    - frontend/packages/openmates-cli/tests/tasks.test.ts and sdk-tasks.test.ts contain CLI/SDK task contract coverage that can be extended.
    - frontend/packages/openmates-cli/tests/workflows.test.ts and sdk-workflows.test.ts contain CLI/SDK workflow contract coverage that can be extended.
  tests:
