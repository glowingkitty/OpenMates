scenarios:
  - id: S-1
    title: CLI chat creates multiple task embeds
    given:
      - Alice is logged into the OpenMates CLI.
      - Alice starts a saved chat with no attached tasks.
    when:
      - Alice says `Create tasks for launch prep: checklist, announcement, risk review`.
    then:
      - The Tasks app create skill creates three durable `user_tasks` records.
      - The chat receives one parent app-skill embed for the skill call.
      - The parent embed references three child task embeds.
      - The CLI JSON output includes the parent embed ID and child task embed IDs.
      - No task-created `system` messages are persisted for this flow.

  - id: S-2
    title: Task assignment defaults to user unless OpenMates is clearly assigned
    given:
      - Alice is chatting with OpenMates in the CLI.
    when:
      - Alice asks `Make tasks for the client workshop` without delegating execution.
      - Alice later asks `OpenMates, take the announcement task and do it`.
    then:
      - The ambiguous workshop tasks are assigned to `user`.
      - The explicitly delegated announcement task is assigned to `openmates`.
      - The assistant only starts or completes tasks assigned to `openmates`.

  - id: S-3
    title: CLI task search waits for connected-client search
    given:
      - Alice has client-encrypted tasks on trusted devices.
    when:
      - Alice asks the assistant to search tasks for `invoice follow-up`.
      - No capable task-search client is online.
    then:
      - The Tasks search skill creates a pending parent app-skill embed with a waiting-for-client state.
      - The backend does not search private task title, description, tags, activity, or instructions.
      - Notifications are sent only according to Alice's notification preferences.
      - When a capable CLI client connects, it decrypts/searches locally and updates the parent embed with matching child task embeds.

  - id: S-4
    title: CLI workflow create and server-side workflow search
    given:
      - Alice is logged into the CLI.
      - Alice has existing server-side encrypted workflows.
    when:
      - Alice asks `Create a workflow that sends me a weather summary every morning`.
      - Alice asks `Find my weather workflows`.
    then:
      - Workflow create creates or modifies exactly one workflow and one child workflow embed under a parent app-skill embed.
      - Workflow search runs server-side and returns a parent app-skill embed with matching child workflow embeds.
      - Workflow search does not require a connected client or user confirmation.

  - id: S-5
    title: SDKs expose the same backend contracts after CLI proof
    given:
      - Backend and CLI task/workflow app-skill embed flows are green against dev.
    when:
      - npm SDK and pip SDK clients call the matching task/workflow create and search APIs.
    then:
      - SDK results expose the same parent embed and child task/workflow embed structure as CLI JSON.
      - SDK task search reports pending connected-client requirements without fabricating server search results.
      - SDK workflow search returns server-side workflow search results.

contracts:
  apps:
    - app_id: tasks
      skills:
        - task_create
        - task_search
      embed_types:
        - tasks-task
      notes:
        - The parent skill-call embed uses existing `app_skill_use` semantics.
        - The child task embed references the durable `user_tasks` record and contains only client-encrypted private content in durable storage.
    - app_id: workflows
      skills:
        - workflow_create_or_modify
        - workflow_search
      embed_types:
        - workflows-workflow
      notes:
        - Workflow create or modify returns exactly one workflow child embed.
        - Workflow search may return multiple workflow child embeds.
  chat_artifacts:
    - Task and workflow create/search chat artifacts are embeds, not `system` messages.
    - Parent app-skill embeds contain child embed IDs for generated or matched tasks/workflows.
    - CLI output must be sufficient to inspect the parent and children without web rendering.
  cli_surfaces:
    - "`openmates tasks ...` remains the primary user-facing task workspace command surface."
    - "`openmates workflows ...` remains the primary user-facing workflow workspace command surface."
    - "Generic `openmates apps ...` app-skill execution may expose `tasks.create`, `tasks.search`, `workflows.create-or-modify`, and `workflows.search` for advanced/debug/API parity use."
    - Both CLI surfaces share backend contracts and SDK payload shapes.
  task_assignment:
    - Allowed assignees are `user` and `openmates` for this scope.
    - Missing or ambiguous assignment defaults to `user`.
    - The assistant can work only on `openmates` tasks.
    - A task may be reassigned only through explicit user intent or an explicit task update action.
  task_search_privacy:
    - Private task title, description, tags, activity, and instructions remain client-side encrypted for durable storage.
    - Search over private task content requires a capable connected client.
    - Server-side search over private task content and server-visible metadata fallback are forbidden.
  workflow_search_privacy:
    - Workflow search may use server-side Automation Vault access and server-side indexes allowed by Workflows V1.
    - Workflow search does not require a connected client or user confirmation.

