apple_impact:
  affected_files:
    - none
  parity_expectations:
    - Apple is not part of the backend/CLI/SDK implementation slice.
    - When web chat task/workflow embeds are implemented, Apple must eventually render the same semantic parent/child embed structure and reuse native task/workflow detail components for fullscreen views.
  verification:
    - Not required for the first backend/CLI/SDK slice.
    - Reassess with `python3 scripts/apple_remote.py status` plus build/test when Apple task or workflow embed UI is added.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: Should app-skill embeds replace the existing task-management `system` messages immediately, or coexist during migration?
      answer: >
        Replace completely. Tasks are not deployed to production, so all current
        task data and chats with tasks can be safely deleted and no migration is
        needed.
    - question: Should Tasks and Workflows be separate apps/skills or one combined planning/work app?
      answer: >
        Separate apps. The Workflows app likely already exists and should remain
        separate from Tasks.
    - question: Should task create produce one task card or a task-list embed containing multiple tasks?
      answer: >
        Task create must be able to create multiple tasks in one call. The parent
        app-skill embed should contain one or more child task embeds.
    - question: Did task/workflow search mean local client search over encrypted tasks/workflows with matching child embeds?
      answer: >
        Yes. Search skills should exist for both Tasks and Workflows apps.
    - question: Should workflow create support multiple workflows in one call?
      answer: >
        No. Workflow create or modify should handle one workflow only because
        workflows are more complex and multi-workflow creation is uncommon.
    - question: Should a task child card in chat open the normal task detail/workspace view or a task embed fullscreen?
      answer: >
        It should open task embed fullscreen inside chat, while reusing the same
        fields, content, and UI elements as the task detail view from the Tasks
        workspace. There should not be a separate UI.
    - question: Should task search use server Vault encryption, connected-client search, or metadata fallback?
      answer: >
        Follow the recommendation to keep durable Tasks client-side encrypted.
        Task search requires a capable connected client, can wait asynchronously,
        and may notify according to user notification preferences. No private
        metadata fallback.
    - question: Should workflow search require a connected client?
      answer: >
        No. Workflows are server-side encrypted, so workflow search can run
        server-side and does not require a connected client or user confirmation.
    - question: What implementation phase should this spec focus on?
      answer: >
        Focus now on backend and CLI. Then implement SDK parity. Frontend comes
        later.
  vision_summary: >
    Tasks and Workflows become normal separate app-skill surfaces in chat. Task
    data remains the existing durable task model with client-side encrypted
    private content, but chat-visible artifacts become app-skill embeds instead
    of task system messages; Workflows use their server-side encrypted workflow
    model and server-side search.
  approved_by_user: true

