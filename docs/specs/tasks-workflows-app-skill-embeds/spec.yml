decisions:
  - id: D-1
    status: active
    decision: Tasks and Workflows remain separate apps with separate app skills and embed identities.
    reason: The user explicitly rejected a combined planning/work app and wants Tasks and Workflows as separate product surfaces.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-2
    status: active
    decision: New task chat artifacts use app-skill embeds and replace task event `system` messages completely.
    reason: Tasks are not deployed to production, so no migration or backward compatibility surface is needed.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-3
    status: active
    decision: Task create can create multiple child task embeds under one parent app-skill embed.
    reason: Multi-task creation is common in planning conversations and should not require one skill call per task.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-4
    status: active
    decision: Workflow create or modify handles exactly one workflow per skill call.
    reason: Workflow validation, approval, rollback, and fullscreen editing are more complex than tasks and multi-workflow creation is not a common V1 need.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-5
    status: active
    decision: Task search is a client-required skill with a pending waiting-for-client state and optional notifications.
    reason: Durable task content remains client-side encrypted; server-side metadata fallback would be incomplete and create privacy pressure.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-6
    status: active
    decision: Workflow search runs server-side.
    reason: Workflows use server-side encryption/Automation Vault access for runtime behavior, so connected-client search is unnecessary.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-7
    status: active
    decision: Backend and CLI are the first implementation gate, SDK parity is second, web and Apple are deferred.
    reason: The user explicitly wants current work focused on CLI and backend, then SDK, with frontend later.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-8
    status: superseded
    decision: Keep both generic app-skill CLI access and dedicated Tasks/Workflows CLI workspace commands.
    reason: Superseded by D-9 after user correction; generic app-skill CLI execution violates OpenMates CLI quality guidelines.
    decided_at: "2026-07-15T00:00:00Z"
  - id: D-9
    status: active
    decision: Forbid generic app-skill CLI execution and require explicit typed CLI commands per app skill.
    reason: The user clarified that generic commands like `openmates apps <app> <skill>` are against coding guidelines; each app skill must have a proper command, help text, input type enforcement, and usage examples.
    decided_at: "2026-07-15T10:00:00Z"
  - id: D-10
    status: active
    decision: Workflow runs project into normal visible Tasks workspace task entries with workflow/run links.
    reason: The user wants scheduled and active workflow work to be visible in Tasks while Workflows remain the scheduling/execution source of truth.
    decided_at: "2026-07-15T10:00:00Z"
  - id: D-11
    status: active
    decision: Workflow-generated tasks are read-only except delete, and deleting a future scheduled workflow task skips that run.
    reason: This avoids two-way schedule editing complexity while giving users a simple way to skip one occurrence.
    decided_at: "2026-07-15T10:00:00Z"

