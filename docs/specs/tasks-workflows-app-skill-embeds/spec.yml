schema_version: 2
id: tasks-workflows-app-skill-embeds
title: Tasks And Workflows App Skill Embeds
status: implementing

goal: >
  Replace dev-only task chat system artifacts with first-class Tasks and Workflows
  app-skill embeds. The first implementation slice is backend and OpenMates CLI:
  chat turns can create, search, and reference durable tasks and workflows through
  app skills; results appear as parent app-skill embeds with structured child
  task or workflow embeds instead of encrypted task-event system messages. SDK
  parity follows after CLI/backend proof; web fullscreen/detail reuse is deferred.

scope:
  in:
    - Backend and CLI-first implementation for Tasks app skills and Workflows app skills.
    - Separate Tasks and Workflows apps with separate skill metadata, execution contracts, and embed renderer identities.
    - Complete replacement of task-management `system` chat artifacts for new dev data; no production migration or backward compatibility path is required.
    - Task create app skill can create one or many durable `user_tasks` records in one skill call.
    - A task create result is a parent `app_skill_use` embed with one or more child task embeds.
    - Task search app skill searches client-encrypted task content on a connected capable client and returns a parent app-skill embed with matching child task embeds.
    - Task search has a pending waiting-for-client state when no capable client is online; it does not fall back to server-visible private metadata.
    - Workflow create or modify app skill creates or modifies exactly one workflow per skill call.
    - Workflow search app skill runs server-side because workflow definitions and relevant run metadata use server-side Automation Vault encryption.
    - Explicit task assignment semantics: every task is assigned to `user` or `openmates`; unclear assignment defaults to `user`; the assistant only executes tasks assigned to `openmates`.
    - Assistant prompt context includes chat-connected task information and assignment boundaries even when no tasks are currently attached.
    - CLI normal and JSON output render app-skill embed results and child task/workflow records without requiring browser UI.
    - Top-level `openmates tasks ...` and `openmates workflows ...` commands remain the primary user CLI workspace UX; generic `openmates apps ...` app-skill access remains an advanced/debug/API parity surface.
    - npm SDK and pip SDK parity after backend/CLI proof.
  out:
    - Production migration of existing task chats, task system messages, or dev task records.
    - Keeping legacy task-event system messages as a compatibility surface.
    - Durable server-side plaintext or Vault-encrypted copies of private task title, description, tags, activity, or instructions.
    - Server-side private task-content search or metadata fallback for task search.
    - Web app implementation in the first slice.
    - Apple implementation in the first slice.
    - Multi-workflow creation in one skill call.
    - Team/shared/multi-owner tasks.
    - Remote filesystem access, code mutation, or high-stakes agentic coding permissions.
  deferred:
    - Web chat rendering for task/workflow child embeds and fullscreen overlays.
    - Reusing the same task/workflow detail components between workspace detail pages and chat fullscreen embeds.
    - Apple parity for chat embed rendering and task/workflow detail reuse.

