implementation_plan:
  spec_path: docs/specs/tasks-workflows-app-skill-embeds/spec.yml
  existing_patterns:
    - docs/architecture/apps/app-skills.md
    - docs/architecture/messaging/embeds.md
    - backend/apps/ai/processing/skill_executor.py
    - backend/apps/ai/processing/task_runtime_tools.py
    - backend/core/api/app/services/embed_service.py
    - backend/tests/test_workflow_app_skill_adapter.py
    - frontend/packages/openmates-cli/tests/tasks.test.ts
    - frontend/packages/openmates-cli/tests/workflows.test.ts
  architecture: >
    Add Tasks and Workflows app-skill contracts that produce app-skill parent
    embeds with child task/workflow embeds. Preserve durable task and workflow
    storage models; change chat connection artifacts from task system messages to
    embed references. Backend owns skill schemas, execution routing, privacy
    boundaries, and task-search request lifecycle. CLI is the first capable client
    and renders/fulfills these contracts before SDKs are added.
  data_flow:
    - User asks in CLI chat to create tasks, create/modify a workflow, or search tasks/workflows.
    - Main processing selects the Tasks or Workflows app skill.
    - Backend creates a parent `app_skill_use` embed for the skill call.
    - Task create persists durable task records and child task embeds; workflow create persists one workflow and one child workflow embed.
    - Task search creates a connected-client search request when needed; CLI decrypts local tasks and returns matching child task embeds.
    - Workflow search uses server-side workflow access and returns matching child workflow embeds.
    - CLI JSON and normal output render parent and child embed summaries through explicit typed task/workflow commands.
    - Generic CLI app-skill execution is blocked by tests and a deterministic guard.
    - Workflow scheduling projects the next active time-trigger run into a visible read-only task; deleting it marks the run `skipped_by_user` and advances to the following run.
    - Workflow execution from any trigger creates or links a visible workflow task and updates that task to `in_progress` or `blocked` as the run progresses.
    - npm SDK and pip SDK expose the same payload shapes after CLI/backend proof.
  affected_files:
    - path: backend/apps/tasks/app.yml
      reason: New Tasks app metadata and app-skill declarations if no app folder exists yet.
    - path: backend/apps/tasks/skills/create_skill.py
      reason: Task create app skill implementation.
    - path: backend/apps/tasks/skills/search_skill.py
      reason: Client-required task search app skill implementation.
    - path: backend/apps/workflows/app.yml
      reason: Workflow app metadata and skill declarations.
    - path: backend/apps/workflows/skills/create_or_modify_skill.py
      reason: One-workflow create or modify app skill implementation.
    - path: backend/apps/workflows/skills/search_skill.py
      reason: Server-side workflow search app skill implementation.
    - path: backend/apps/ai/processing/main_processor.py
      reason: App-skill selection and task prompt context integration.
    - path: backend/apps/ai/processing/task_tool_context.py
      reason: Prompt guidance for task creation and assignment even when no visible tasks exist.
    - path: backend/core/api/app/services/embed_service.py
      reason: Parent/child task and workflow embed persistence integration if existing helpers need extension.
    - path: backend/core/api/app/services/workflow_service.py
      reason: Workflow run lifecycle and scheduling source of truth for next-run task projection.
    - path: backend/core/api/app/tasks/workflow_tasks.py
      reason: Workflow execution hooks that create/update linked task entries.
    - path: backend/tests/test_workflow_task_projections.py
      reason: Backend contract coverage for scheduled, running, blocked, failed, and skipped workflow task projections.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI chat send/render/connected-client task-search handling.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Normal and JSON output for explicit typed task/workflow commands and removal of generic app-skill execution.
    - path: scripts/code_quality_guard.py
      reason: Deterministic guard against reintroducing generic app-skill CLI execution, if an existing guard is the best fit.
    - path: frontend/packages/openmates-cli/tests/tasks.test.ts
      reason: CLI task app-skill embed and client-search coverage.
    - path: frontend/packages/openmates-cli/tests/workflows.test.ts
      reason: CLI workflow app-skill embed coverage.
    - path: packages/openmates-python/tests/test_sdk.py
      reason: pip SDK parity coverage.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/tasks-workflows-app-skill-embeds/spec.yml
    - python3 -m pytest backend/tests/test_task_app_skill_embeds.py backend/tests/test_task_app_skill_assignment.py backend/tests/test_task_app_skill_search.py backend/tests/test_workflow_app_skill_embeds.py
    - python3 -m pytest backend/tests/test_workflow_task_projections.py
    - node --test --experimental-strip-types --loader ./tests/loader.mjs tests/tasks.test.ts tests/workflows.test.ts
    - node --test --experimental-strip-types --loader ./tests/loader.mjs tests/cli.test.ts
    - node --test --experimental-strip-types --loader ./tests/loader.mjs tests/sdk-tasks.test.ts tests/sdk-workflows.test.ts
    - python3 -m pytest packages/openmates-python/tests/test_sdk.py
    - python3 scripts/audit_sdk_cli_parity.py
    - python3 scripts/spec_verify.py docs/specs/tasks-workflows-app-skill-embeds/spec.yml --phase green
  verification_order:
    - Backend contract tests for app-skill embed shapes, assignment, privacy boundaries, task search lifecycle, workflow search behavior, and workflow-run task projection.
    - CLI tests and real dev CLI smoke using explicit typed task/workflow commands for parent/child embed output and connected-client task search.
    - Deterministic guard proving generic `openmates apps <app> <skill>` execution cannot be reintroduced.
    - npm SDK and pip SDK parity after backend/CLI proof.
    - Web Playwright only in a later frontend phase after deploy.
    - User confirmation for user-visible web UI only in the later frontend phase.
    - Apple remote build/test only when Apple task/workflow embed UI is implemented.

