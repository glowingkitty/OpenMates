risks:
  - Browser analyser timing can make visual assertions flaky unless tests use deterministic seeded levels or compare bounded state rather than exact frames.
  - Publishing waveform samples too frequently can cause unnecessary Svelte redraws; updates must be capped to a visually smooth but bounded rate.
  - AudioContext cleanup must not stop externally owned MediaStream tracks before the existing MediaRecorder completion path finishes.
  - A later Apple parity slice must re-check the completed native composer architecture instead of porting against files that are currently changing.

