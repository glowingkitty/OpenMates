id: live-audio-recording-waveform
title: Web Live Audio Recording Waveform
status: implementing

goal: >
  Give users immediate visual feedback that their microphone is receiving sound
  by rendering a live rolling bar waveform while audio recording is active in
  the web composer. Apple parity is deliberately deferred until the active native
  TipTap/message-input spec is complete.

scope:
  in:
    - The active audio recording overlay in the web composer.
    - Live browser microphone-level metering and a rolling recent-history bar display.
    - Responsive layout, accessibility semantics, and deterministic web tests.
    - Cleanup of all metering resources when recording stops, is cancelled, errors, or the overlay is destroyed.
  out:
    - All Apple implementation and tests in this slice, including iPhone, iPad, macOS, and Apple Watch.
    - Persisting or replaying the waveform after recording finishes.
    - Changing recording formats, upload, transcription, encryption, send behavior, or backend APIs.
    - Replacing the existing recording overlay colors, timer, cancel hint, release behavior, or microphone control.

context_discovery:
  github_issues:
    - "GitHub MCP get_me returned 401 Bad credentials."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'audio recording waveform visualization' returned no matching issues."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'waveform' returned no matching issues."
    - "gh issue list --repo glowingkitty/OpenMates --state all --search 'audio recording' returned no matching issues."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/specs/apple-welcome-composer-action-parity/spec.yml
    - .claude/rules/apple-ui.md
    - apple/AGENTS.md
  code_patterns:
    - frontend/packages/ui/src/components/enter_message/RecordAudio.svelte owns the web MediaStream, MediaRecorder lifecycle, active gradient overlay, timer, cancel hint, and mic control.
    - apple/OpenMates/Sources/Features/Chat/Views/VoiceRecordingView.swift owns VoiceRecorder and the shared ComposerRecordingOverlay but currently publishes only recording state, duration, and errors.
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift and apple/OpenMates/Sources/App/MainAppView.swift both host the shared Apple recording overlay.
    - Web AudioContext analysis can meter the existing MediaStream without changing the MediaRecorder output.
    - AVAudioRecorder supports live average-power metering when isMeteringEnabled is enabled and updateMeters is called during recording.
  tests:
    - frontend/apps/web_app/tests/audio-recording.spec.ts
    - frontend/apps/web_app/tests/apple-ui-contracts.spec.ts
    - apple/OpenMatesUITests/MessageInputAudioRecordingUITests.swift
    - apple/OpenMatesTests/MessageComposerConfigurationTests.swift

apple_impact:
  affected_files:
    - none
  parity_expectations:
    - A later Apple slice should use this verified web rendering as its source of truth for rolling direction, placement, bar geometry, and existing recording colors.
    - Apple work must start only after the active apple-tiptap-webview-composer/message-input work is complete to avoid conflicts in the shared composer surface.
  verification:
    - Apple verification is not required for this web-only slice.
  intentional_native_differences:
    - Apple temporarily remains without a live waveform until the active native composer dependency is complete and a follow-up parity slice is approved.

clarification:
  rounds:
    - question: Where should the live bars sit in the existing recording overlay?
      answer: Keep Release to finish and place the waveform below it.
    - question: Should the bars show rolling recent history or animate as a fixed equalizer?
      answer: Show rolling recent history, matching the reference image.
    - question: Should Apple Watch be included in this first slice?
      answer: Limit Apple scope to the shared iPhone, iPad, and macOS overlay.
    - question: Should implementation start across web and Apple at the same time?
      answer: >
        No. Implement and test web first. Leave all Apple work until the active
        Apple message-input/TipTap spec is completed.
  vision_summary: >
    Preserve the existing recording UI and behavior while adding a white rolling
    bar waveform below the release instruction in the web app. The visualization
    must react to live browser microphone levels, remain responsive, and disappear
    cleanly with the recording overlay; Apple parity is a separately sequenced follow-up.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Web user sees live rolling microphone feedback
    given:
      - The web composer has microphone permission.
      - The user presses and holds record-audio-button beyond the existing hold threshold.
    when:
      - The microphone receives changing sound levels while recording remains active.
    then:
      - record-overlay keeps release-text above the visualization.
      - recording-waveform renders narrow centered vertical bars in the overlay's existing white-on-gradient color scheme.
      - New normalized level samples enter at the right and older samples move left.
      - Bar heights visibly differ as the microphone level changes.
      - timer-pill, cancel-hint, and mic-button remain visible and usable.

  - id: S-2
    title: Silence remains legible without implying missing input
    given:
      - Web recording is active.
    when:
      - The microphone level is silent or near the platform noise floor.
    then:
      - The waveform remains present as short centered bars rather than disappearing.
      - The bars do not use random decorative motion that could be mistaken for detected speech.
      - Existing recording state and timer continue normally.

  - id: S-3
    title: Metering resources stop with every recording exit path
    given:
      - Live waveform metering has started.
    when:
      - The user releases to finish, cancels with Escape or drag-left, a recording error occurs, or the overlay is destroyed.
    then:
      - Web animation frames and AudioContext/source/analyser resources are disconnected and closed.
      - Waveform samples reset.
      - No waveform updates continue after recording becomes inactive.
      - Existing completion and cancellation outcomes remain unchanged.

  - id: S-4
    title: Waveform adapts to available composer width
    given:
      - The active recording overlay is shown on phone-sized and desktop-sized layouts.
    when:
      - The available overlay width changes.
    then:
      - Bars remain centered between the release instruction and controls without horizontal overflow.
      - The visualization uses the available width while preserving narrow bars and consistent spacing.
      - The waveform is decorative to assistive technology; existing localized text continues to communicate recording state and actions.

