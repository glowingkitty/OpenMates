assumptions:
  - id: A-1
    text: The existing MediaStream can be connected to Web Audio analysis and MediaRecorder concurrently without changing the encoded recording.
    category: architecture
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/components/enter_message/RecordAudio.svelte
        summary: The acquired stream is retained for the complete recording lifecycle and can feed a non-output analyser branch.
  - id: A-2
    text: Apple waveform parity is deferred until the active native TipTap/message-input work is complete.
    category: sequencing
    required_before: implementation
    status: confirmed
    evidence:
      - source: user confirmation 2026-07-09
        summary: User requested web implementation and testing first, with Apple work left for later.
      - source: docs/specs/apple-tiptap-webview-composer/spec.yml
        summary: Active native composer work owns the Apple message-input surface that a later waveform parity slice will touch.

contracts:
  api:
    - No backend, upload, transcription, encryption, or send API changes.
  data:
    - Waveform history contains only transient normalized level values in memory.
    - No waveform samples, raw PCM, microphone levels, or AudioContext buffers are persisted, uploaded, or logged.
    - History is reset when recording starts and whenever recording ends.
  ui_states:
    - Active recording with near-silent baseline bars.
    - Active recording with changing rolling level history.
    - Responsive phone-width and desktop-width recording overlays.
    - Stop, cancel, error, and destroyed states with no remaining waveform activity.
  privacy_security:
    - Metering operates locally on the already-authorized microphone stream.
    - Diagnostics and tests must not record or retain user audio or raw microphone samples.
    - Analyser setup failure must not prevent the user from completing a recording; it must be visible in existing privacy-safe diagnostics rather than silently swallowed.
  accessibility:
    - recording-waveform is decorative and hidden from the accessibility tree.
    - release-text, timer-pill, cancel-hint, and mic-button retain their current labels, identifiers, and focus behavior.
    - Live data feedback must not add an extra high-frequency screen-reader announcement.

tests:
  - id: T-WEB-AUDIO-WAVEFORM
    type: playwright
    file: frontend/apps/web_app/tests/audio-recording.spec.ts
    command: python3 scripts/tests.py run -- --spec audio-recording.spec.ts
    target: app.dev.openmates.org
    covers:
      - AC-1
      - AC-2
      - AC-3
      - AC-4
    assertions:
      - press-and-hold shows recording-waveform below release-text while existing controls remain visible
      - fake microphone input produces a populated rolling history whose measured bar heights change over time
      - near-silent or seeded zero levels retain minimum-height bars without random activity
      - phone-width and desktop-width overlays contain the waveform without overflow
      - release and Escape cancellation remove the waveform and stop subsequent sample changes
      - recording-waveform is hidden from the accessibility tree
    red_phase:
      required: true
      expected: fail
      evidence:
        status: failed_as_expected
        run_id: "29058091784"
        timestamp: "2026-07-09T23:45:46Z"
        notes: The new test failed because recording-waveform was absent; all six pre-existing audio recording tests passed.
    green_phase:
      required: true
      expected: pass_after_deploy
      evidence:
        status: ""
        run_id: ""
        timestamp: ""

