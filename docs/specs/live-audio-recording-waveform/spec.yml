implementation_plan:
  spec: docs/specs/live-audio-recording-waveform/spec.yml
  existing_patterns:
    - RecordAudio.svelte already owns the acquired MediaStream and converges stop, cancel, error, and destroy behavior through stopInternal and onDestroy.
    - audio-recording.spec.ts already supplies fake microphone input and verifies active overlay, completion, and cancellation states through stable data-testid selectors.
    - The existing overlay uses release-text, timer-pill, cancel-hint, and mic-button as the cross-client recording contract; the new visualization must not replace them.
  architecture: >
    Keep recording and visualization in RecordAudio.svelte. Connect the existing
    MediaStream to an AudioContext MediaStreamAudioSourceNode and AnalyserNode,
    without connecting to the audio destination. At a bounded visual sampling
    interval, calculate the RMS amplitude from time-domain bytes, normalize it,
    and append it to a fixed-capacity Svelte array. Render that history as thin
    centered bars in a responsive decorative container. A single cleanup function
    cancels animation work, disconnects nodes, closes the AudioContext, and resets
    samples; every recording exit path calls it without stopping stream tracks
    before the existing MediaRecorder lifecycle does.
  data_flow:
    - The user holds record-audio-button and RecordAudio.svelte acquires the existing MediaStream.
    - MediaRecorder receives the stream unchanged while a separate non-output analyser reads time-domain frames.
    - A frame with RMS 0.08 is normalized to a bounded 0..1 display level and appended at the right of the rolling history.
    - The oldest sample is removed at fixed capacity and Svelte updates recording-waveform bar heights.
    - Release, Escape, drag cancellation, recorder error, or component destruction invokes waveform cleanup before the overlay closes.
  boundaries:
    api: No API, upload, transcription, encryption, or MediaRecorder format changes.
    data: Normalized levels remain transient in component memory and are never persisted or logged.
    ui: The waveform is inserted below release-text and above record-controls using the overlay's existing white-on-gradient palette.
    accessibility: The waveform wrapper and bars are decorative and excluded from the accessibility tree.
  affected_files:
    - path: frontend/apps/web_app/tests/audio-recording.spec.ts
      reason: Add deterministic red/green assertions for rolling levels, silence baseline, responsive containment, accessibility, and cleanup.
    - path: frontend/packages/ui/src/components/enter_message/RecordAudio.svelte
      reason: Add Web Audio metering lifecycle, rolling sample state, and waveform rendering/styles.
    - path: docs/specs/live-audio-recording-waveform/spec.yml
      reason: Record red/green evidence and completion status.
  rollout:
    - No migration, backfill, feature flag, or backend deployment is required.
    - Deploy the web component to dev before Playwright green verification.
    - Keep Apple parity deferred until the native TipTap/message-input spec is complete.
  observability:
    - Reuse the RecordAudio logger for privacy-safe analyser setup and cleanup errors.
    - Never log amplitude arrays, raw audio, MediaStream contents, or user-identifying data.
    - An analyser setup failure leaves MediaRecorder operational and reports the visual failure explicitly.
  assumptions_checked:
    - A-1 is confirmed by the retained MediaStream lifecycle in RecordAudio.svelte.
    - A-2 is confirmed by the user's sequencing decision and the active apple-tiptap-webview-composer spec.
  acceptance_criteria_coverage:
    - AC-1 -> T-WEB-AUDIO-WAVEFORM dynamic history assertions.
    - AC-2 -> T-WEB-AUDIO-WAVEFORM deterministic zero-level assertions.
    - AC-3 -> T-WEB-AUDIO-WAVEFORM release/cancel cleanup assertions.
    - AC-4 -> T-WEB-AUDIO-WAVEFORM phone/desktop layout and accessibility assertions plus V-RENDERED-PARITY.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/live-audio-recording-waveform/spec.yml
    - python3 scripts/tests.py run -- --spec audio-recording.spec.ts before implementation for red evidence.
    - Run the smallest frontend lint/type check accepted by the repository for the two changed source files.
    - Deploy to dev and wait for Vercel Ready.
    - python3 scripts/tests.py run -- --spec audio-recording.spec.ts after deploy for green evidence.
    - python3 scripts/spec_verify.py docs/specs/live-audio-recording-waveform/spec.yml
  verification_order:
    - Playwright red phase against current dev deployment.
    - Focused frontend lint/type verification after implementation.
    - Dev deployment and Vercel Ready check.
    - Playwright green phase and rendered artifact review.
  open_questions: []
  risks:
    - Exact browser frame timing is nondeterministic, so Playwright should inject deterministic analyser frames and assert bounded state changes rather than exact animation frames.
    - Cleanup must close only visualization resources and leave MediaRecorder track ownership unchanged.

