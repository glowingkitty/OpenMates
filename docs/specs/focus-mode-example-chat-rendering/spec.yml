risks:
  - Re-extracting from dev shares may reproduce incomplete data if the original share endpoint or CLI capture path omitted focus activation/sub-chat assistant messages.
  - Synthesizing activation embeds from metadata may differ slightly from real runtime activation-card timing/state unless the UI treats static examples as already activated.
  - Updating every locale source entry mechanically for the Framework embed syntax may require translation rebuild and careful generated-file handling.
  - The repository currently has many unrelated uncommitted changes; implementation must avoid touching unrelated files.

open_questions:
  - id: OQ-1
    question: Should missing activation embeds in historical examples be synthesized from static metadata, or should the source shared chats be regenerated/re-extracted only after confirming CLI/web runtime parity stores activation embeds correctly?
  - id: OQ-2
    question: Should sub-chat completion status for static examples be inferred from presence of assistant messages rather than timestamp deltas?
