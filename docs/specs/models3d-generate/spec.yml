        summary: Native format/tool evaluation begins only after this gate passes.

contracts:
  api:
    - name: Models3D Generate
      route: POST /v1/apps/models3d/skills/generate
      request: "{ prompt?: string, image_embed_refs?: string[], image_views?: {embed_ref: string, view: front|back|left|right}[] }"
      response: "{ task_id: string, embed_id: string, status: processing, estimated_credits: integer }"
      errors:
        - 400 when input modes conflict or view ordering is invalid
        - 402 when OpenMates credit headroom is insufficient
        - 409 when current Hi3D disclosure is not accepted
        - 503 for provider unavailability or unavailable provider balance
    - name: Hi3D Token
      route: POST https://api.hitem3d.ai/open-api/v1/auth/token
      auth: Basic access_key:secret_key from kv/data/providers/hi3d
    - name: Hi3D Submit And Poll
      route: POST /open-api/v1/submit-task then GET /open-api/v1/query-task
      auth: Bearer token held in process memory only
    - name: Print Export
      route: POST /v1/generated-assets/{upload_file_id}/exports
      request: "{ format: stl|3mf }"
      response: "{ task_id: string, status: processing|existing }"
    - name: Generated Asset Download
      route: GET /v1/generated-assets/download/{token}
      response: streamed decrypted GLB, STL, or 3MF with attachment headers
  data:
    app_id: models3d
    skill_id: generate
    embed_id: model3d_generate
    master_format: glb
    preview_format: glb with Meshopt geometry and KTX2/Basis textures
    poster_format: webp
    print_formats: [stl, 3mf]
    preview_budget:
      target_transfer_bytes: 15728640
      hard_transfer_bytes: 26214400
      max_texture_dimension: 2048
    master_encryption: chunked-aes-256-gcm-v1
    preview_encryption: existing whole-object aes-256-gcm for bounded artifacts
    content_fields:
      - status
      - input_mode
      - prompt
      - reference_image_embed_ids
      - provider
      - provider_model
      - quality
      - master_file
      - preview_file
      - poster_file
      - print_exports
      - bounds
      - units
      - face_count
      - material_count
      - validation_summary
      - cost_summary
  ui_states:
    - generating_reference_image
    - queued
    - generating_geometry
    - optimizing_preview
    - finished
    - exporting_print_file
    - cancelled
    - error
  privacy_security:
    - User images, generated references, provider outputs, credentials, tokens, signed provider URLs, and decrypted model bytes never enter logs, traces, analytics, or persistent plaintext storage.
    - Provider output URLs are downloaded promptly, validated, encrypted into OpenMates S3, and not persisted as durable client URLs.
    - Large-file parser and converter processes run with CPU, memory, time, file-count, extension, and output-size limits.
    - GLB and 3MF container entries are validated against path traversal, oversized expansion, unsupported extensions, and malformed metadata.

