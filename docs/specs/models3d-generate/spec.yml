  - id: A-5
    text: Hi3D does not document an exact API retention period or per-task deletion endpoint, so OpenMates must disclose that provider-side limitation before first use.
    category: privacy
    required_before: implementation
    status: corrected
    evidence:
      - source: https://docs.hi3d.ai/en/api/resources/privacy-policy
