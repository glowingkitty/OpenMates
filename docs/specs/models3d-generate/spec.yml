decisions:
  - id: D-1
    status: active
    decision: Use `models3d` as the canonical app ID and `generate` as the skill ID.
    reason: Numeric-leading IDs break ergonomic generated Python/TypeScript SDK access; the existing `3d` placeholder is unused.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-2
    status: active
    decision: Use Hi3D v2.1 as the only V1 3D provider.
    reason: The user chose Hi3D-only after a successful live API smoke test.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-3
    status: active
    decision: Text input first uses the regular images.generate default model-selection path and retains the resulting reference image.
    reason: Hi3D has no documented text input and the user requires text-to-3D without a second 3D provider.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-4
    status: active
    decision: Preserve master GLB, optimized web GLB, and poster as separate encrypted artifacts.
    reason: A 30-100 MB whole-object AES-GCM model is unsuitable for automatic chat rendering.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-5
    status: active
    decision: Generate STL and 3MF only on demand from the immutable master.
    reason: This avoids unnecessary conversion/storage while providing monochrome and color/material print workflows.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-6
    status: superseded
    decision: Require a separate current-version Hi3D processing-consent gate.
    reason: "Superseded by the user on 2026-07-12: the clear, versioned privacy-policy disclosure is sufficient and no separate consent screen or record should exist."
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-7
    status: active
    decision: Complete CLI, npm SDK, and pip SDK before web; gate Apple on explicit user approval of deployed web evidence.
    reason: The user explicitly required this sequence.
    decided_at: "2026-07-11T22:19:04Z"
  - id: D-8
    status: active
    decision: Treat Hi3D retention and deletion as a disclosed limitation rather than claiming provider-side per-task deletion.
    reason: The verified policy provides account/personal-data deletion rights but no exact API retention period or documented per-task deletion endpoint.
    decided_at: "2026-07-11T23:50:23Z"
  - id: D-9
    status: active
    decision: Benchmark two real Hi3D outputs generated end-to-end through the OpenMates CLI after the skill is implemented.
    reason: The user confirmed two real outputs are sufficient; requiring pre-supplied 30/60/100 MB fixtures unnecessarily blocked backend and CLI implementation.
    decided_at: "2026-07-12T00:31:00Z"
  - id: D-10
    status: active
    decision: Ship `models3d.generate` off by default until Hi3D-backed real-provider verification is affordable again.
    reason: The live Hi3D provider balance is `0.0`, additional credits are too expensive for the near term, and remaining CLI/SDK/web gates require real provider runs. Keeping only the skill disabled preserves the `models3d` app for a lower-cost search skill.
    decided_at: "2026-07-15T01:48:00Z"

