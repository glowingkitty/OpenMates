schema_version: 2
id: models3d-generate
title: 3D Models Generate Skill And Model Embed
status: implementing

goal: >
  Add a canonical `models3d` app whose Generate skill creates encrypted,
  downloadable, and interactively viewable 3D models from text, one image, or
  ordered multi-view images. Hi3D is the only 3D provider in V1; text requests
  first reuse the regular images.generate default-model path to create a visible
  reference image. Preserve a high-fidelity GLB master, derive a lightweight web
  preview and poster, and offer validated STL and 3MF print exports on demand.

scope:
  in:
    - Rename the unused internal app placeholder from `3d` to the stable app ID `models3d`; display the app as "3D models" and reuse the existing `3dmodels` icon and gradient.
    - Add `models3d/generate` for text, one reference image, and two-to-four ordered front/back/left/right reference images.
    - Reuse the same configured default image model and provider-selection path as `images.generate` when converting text to a reference image; do not hardcode a second image default.
    - Use Hi3D v2.1 as the only V1 3D provider and normalize its authentication, balance, submit, poll, failure, and refund behavior in a pure shared provider wrapper.
    - Show the generated reference image in text-to-3D results so users can understand and reproduce the two-stage generation.
    - Create a processing/error/cancelled/finished `model3d` app-skill embed with compact encrypted metadata and encrypted S3 artifacts.
    - Preserve the provider GLB as an immutable master and generate a separately encrypted Meshopt/KTX2 optimized GLB plus poster image for web preview.
    - Render only the poster and metadata in the chat embed; load/decrypt the optimized interactive model only after fullscreen opens.
    - Support rotate, pan, zoom, reset-camera, loading progress, accessibility fallback, GLB download, and print-export actions in web fullscreen.
    - Generate binary STL and 3MF derivatives on demand after geometry, units, manifoldness, and printability validation; label STL as geometry-only and 3MF as the preferred color/material print format.
    - Use a versioned chunked authenticated-encryption format for large master/print artifacts so server downloads do not buffer a 30-100 MB plaintext file in memory; optimized previews remain separate bounded objects.
    - Apply existing account storage billing, upload_files indexing, chat/embed deletion, account deletion, and shared-content safety behavior to every artifact.
    - Expose equivalent Generate contracts through OpenMates CLI, npm SDK, and pip SDK before beginning web implementation.
    - Deploy and verify web only after CLI/npm/pip contracts are green.
    - Begin Apple implementation only after the user explicitly confirms the deployed web flow and artifacts work correctly.
    - Add provider/privacy/training disclosures and explicit first-use confirmation because Hi3D licenses inputs and outputs for model improvement while per-task deletion and exact API retention remain unverified.
  out:
    - The later `models3d/search` skill and online marketplace/platform search.
    - CAD creation, parametric CAD source, model editing, mesh sculpting, rigging, or animation.
    - Arbitrary user-uploaded GLB, glTF, STL, OBJ, FBX, USDZ, or 3MF files in V1.
    - Automatic interactive 3D loading inside chat messages.
    - Treating STL as a color/material-preserving format or promising that PBR appearance maps exactly to physical print materials.
    - Supporting a second 3D provider or exposing provider selection in V1.
    - Apple implementation before explicit user approval of the deployed web implementation.

