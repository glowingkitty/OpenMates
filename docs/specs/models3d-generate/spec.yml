implementation_plan:
  spec_path: docs/specs/models3d-generate/spec.yml
  existing_patterns:
    - images.generate for encrypted reference resolution and the default image-model path.
    - videos.generate for async jobs, billing preflight/finalization, generated assets, and embed updates.
    - generated_assets/service.py for upload_files indexing, storage counters, and signed downloads.
    - UnifiedEmbedPreview and UnifiedEmbedFullscreen for all web embed chrome.
  architecture: >
    Build one pure Hi3D provider, one shared reference-image orchestration seam,
    and one models3d async worker. The worker validates provider output, preserves
    a chunk-encrypted immutable GLB master, derives bounded web preview/poster
    artifacts, and emits a compact encrypted model3d embed. Print conversion is
    a separate idempotent task. CLI and SDKs prove the backend contract before
    web; web uses a lazily imported model-viewer only in fullscreen. Apple is a
    separate final phase gated by explicit approval of deployed web evidence.
  boundaries:
    - No skill imports from images skills; shared default-model/orchestration behavior moves to backend/shared or BaseSkill.
    - No raw provider URL becomes durable embed content.
    - No model bytes or base64 data enter TOON, Directus fields, logs, traces, analytics, or task broker payloads.
    - No automatic inline interactive preview.
    - No print-ready claim before conversion validation and slicer artifact review.
  phases:
    - id: P1-provider-storage-red
      dependencies: []
      covers: [AC-4, AC-5, AC-8, AC-12, AC-17, AC-18]
      outcome: Add red provider, privacy, storage, security, optimization, and print contracts; resolve privacy deletion blocker and conversion tooling before provider implementation.
      verification_ids: [T-PYTEST-001, T-PYTEST-003, T-PYTEST-004, T-AUDIT-001]
    - id: P2-backend-generate
      dependencies: [P1-provider-storage-red]
      covers: [AC-1, AC-2, AC-3, AC-4, AC-5, AC-8, AC-13, AC-17, AC-18]
      outcome: Implement Hi3D wrapper, shared image-default seam, async models3d task, encrypted artifacts, billing, and master downloads. Print exports remain P3/TASK-3.
      verification_ids: [T-PYTEST-001, T-PYTEST-002, T-PYTEST-003]
    - id: P3-cli-sdk
      dependencies: [P2-backend-generate]
      covers: [AC-1, AC-2, AC-3, AC-14]
      outcome: Implement and prove CLI first, npm SDK second, and pip SDK third. Do not begin web until all are green.
      verification_ids: [T-CLI-001, T-CLI-002, T-NPM-001, T-PIP-001, T-BENCH-001, T-ORDER-001]
    - id: P4-web
      dependencies: [P3-cli-sdk]
      covers: [AC-6, AC-7, AC-9, AC-10, AC-12]
      outcome: Implement poster-only preview and lazy fullscreen viewer/export UI, deploy, wait for Ready, run Playwright, and present real artifacts for user confirmation.
      verification_ids: [T-E2E-001, T-ORDER-001, V-PRINT-ARTIFACTS, V-WEB-USER-APPROVAL]
    - id: P5-apple
      dependencies: [P4-web]
      covers: [AC-15, AC-16]
      outcome: Only after explicit approval, add native derivative/rendering parity and capture remote Mac evidence.
      verification_ids: [T-APPLE-001, V-APPLE-ARTIFACTS]
  data_flow:
    - Text input resolves the current images.generate default, creates and stores a normal image result/reference, then passes its decrypted bytes to the models3d worker.
    - Direct image/multi-view input resolves embed metadata with cache plus database fallback, unwraps keys, downloads encrypted objects, and decrypts only in worker memory.
    - Hi3D receives images, returns a temporary GLB URL, and OpenMates streams, validates, encrypts, and persists the file before the provider URL expires.
    - Optimization derives web GLB and poster from the immutable master; fullscreen fetches only the optimized object.
    - Print requests idempotently reuse or create encrypted STL/3MF derivatives and update the existing embed.
  verification_strategy:
    - Red backend/security/performance contracts before provider source.
    - CLI then npm then pip proof before any web implementation.
    - Deploy before Playwright green evidence.
    - Explicit user confirmation after web green and before Apple source changes.
  verification_order:
    - Provider/backend/storage/print contracts
    - OpenMates CLI
    - npm SDK
    - pip SDK
    - Deployed web Playwright and artifact review
    - Explicit user confirmation
    - Apple tests and artifacts
  affected_files:
    - {path: backend/apps/3d/app.yml, reason: Rename unused placeholder to canonical models3d metadata and Generate contract}
    - {path: backend/apps/models3d/skills/generate_skill.py, reason: LLM-facing Generate schema and async dispatch}
    - {path: backend/apps/models3d/tasks/generate_task.py, reason: Two-stage generation, validation, billing, and artifacts}
    - {path: backend/shared/providers/hi3d/, reason: Pure token/balance/task provider wrapper}
    - {path: backend/shared/python_utils/generated_assets/service.py, reason: Chunked large-artifact encryption and streaming download support}
    - {path: frontend/packages/ui/src/components/embeds/models3d/, reason: Unified poster preview and fullscreen viewer}
    - {path: frontend/packages/openmates-cli/, reason: CLI/npm SDK and text renderer contracts}
    - {path: packages/openmates-python/, reason: pip SDK contract}
    - {path: shared/docs/privacy_policy.yml, reason: Hi3D processing and training disclosure}
    - {path: frontend/packages/ui/src/legal/documents/privacy-policy.ts, reason: Privacy policy lastUpdated metadata}
    - {path: apple/OpenMates/Sources/Features/Embeds/Renderers/, reason: Post-approval Apple parity}
  required_assumptions: [A-1, A-2, A-3, A-4, A-5, A-6]
  open_questions:
    - Hi3D lacks a verified per-task deletion API and exact API retention period; resolve A-5 before implementation.
    - Select and validate the GLB-to-3MF toolchain before promising color/material export.
  risks:
    - Hi3D training terms may be unacceptable for sensitive reference images; privacy-policy disclosure and provider deletion limitations must remain explicit.
    - AI-generated geometry may look correct but be non-manifold or dimensionally unsuitable for printing.
    - KTX2/Meshopt optimization can alter appearance or unsupported glTF extensions; preserve master and compare renders.
    - Chunked encryption is security-sensitive and must use independent nonces/authentication with deterministic corruption tests.
    - Large parsing/conversion jobs can exhaust worker memory/CPU without strict sandbox and size limits.
    - Starting Apple before explicit web approval would violate the user-required sequence.

