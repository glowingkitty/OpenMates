scenarios:
  - id: S-1
    title: Text prompt becomes a visible reference and 3D model
    given:
      - Alice has enough OpenMates credits and has accepted the Hi3D disclosure.
    when:
      - Alice asks, "Generate a small orange retro desk lamp as a 3D model."
    then:
      - OpenMates uses the current default images.generate model to create one reference image.
      - The reference image is retained and shown in the model result.
      - Hi3D receives that image and produces one PBR GLB.
      - The result records combined image-generation and Hi3D cost metadata without secrets.
  - id: S-2
    title: Single image generates a model directly
    given:
      - Alice attaches one supported image of an isolated chair.
    when:
      - The mate calls `models3d/generate` with that image embed reference.
    then:
      - The worker resolves the encrypted input through cache with database fallback, decrypts it only in memory, and sends it to Hi3D.
      - No intermediate generated reference image or image-generation charge is created.
  - id: S-3
    title: Ordered multi-view images improve reconstruction
    given:
      - Alice supplies front, back, left, and right images of one object.
    when:
      - The skill submits a multi-view generation.
    then:
      - The request preserves view order and rejects duplicate/missing labels or more than four images.
      - Hi3D receives the supported ordered multipart request.
  - id: S-4
    title: Processing and provider failure remain visible
    given:
      - A generation has been accepted asynchronously.
    when:
      - Hi3D queues, processes, succeeds, fails, times out, or returns insufficient balance.
    then:
      - The embed transitions through typed processing states and ends in finished or actionable error.
      - Failed/refunded provider tasks are not billed as successful model generations.
      - Credentials, bearer tokens, provider URLs with expired signatures, and input plaintext never enter logs or traces.
  - id: S-5
    title: Finished result stores private artifacts
    given:
      - Hi3D returns a valid PBR GLB.
    when:
      - The generation worker finalizes the result.
    then:
      - The worker validates size, MIME, glTF structure, and configured extension allowlist before storage.
      - It stores an immutable encrypted master, bounded optimized preview, and poster, then indexes each artifact for storage billing/deletion.
      - Embed content contains only compact metadata, wrapped/client keys, and S3 references.
  - id: S-6
    title: Chat preview never loads the 3D payload
    given:
      - Alice sees a finished model embed in chat.
    when:
      - The message renders or scrolls into view.
    then:
      - Only the decrypted poster and compact metadata load.
      - No GLB viewer code or model bytes load until fullscreen opens.
  - id: S-7
    title: Web fullscreen loads an optimized interactive model
    given:
      - Alice opens a finished model embed in fullscreen.
    when:
      - The optimized preview decrypts successfully.
    then:
      - A lazily loaded model viewer shows progress and supports rotate, pan, zoom, and reset.
      - Failure or memory constraints fall back to poster plus download rather than crashing the chat.
  - id: S-8
    title: User downloads the original GLB
    given:
      - A master GLB is 30-100 MB.
    when:
      - Alice selects Download original GLB.
    then:
      - A short-lived authorized route streams independently authenticated chunks without buffering the full plaintext file.
      - The downloaded bytes match the validated provider master.
  - id: S-9
    title: User requests print exports
    given:
      - Alice has a finished GLB master.
    when:
      - Alice requests STL or 3MF.
    then:
      - OpenMates performs a queued on-demand conversion and printability check.
      - STL is binary and geometry-only; declared units are stored in embed/download metadata because STL has no standard units field.
      - 3MF preserves validated units, parts, and supported color/material data with a warning that PBR appearance is not guaranteed in slicers.
      - Failed non-manifold conversion returns diagnostics and no fake print-ready file.
  - id: S-10
    title: Provider processing is disclosed in privacy policy
    given:
      - Alice reviews the current OpenMates privacy policy.
    when:
      - Alice considers using 3D model generation.
    then:
      - The privacy policy identifies Hi3D, the data sent, model-improvement use, unverified per-task deletion/retention, and privacy-policy link.
      - No separate Hi3D consent screen or stored consent record is required.
  - id: S-11
    title: CLI and SDK contracts precede web
    given:
      - Backend provider, task, storage, and download contracts are green.
    when:
      - Cross-client implementation proceeds.
    then:
      - CLI text/image generation and downloads pass first, then npm SDK, then pip SDK.
      - Web implementation does not begin until all three are green.
  - id: S-12
    title: Apple waits for approved deployed web behavior
    given:
      - CLI, SDK, and deployed web checks are green.
    when:
      - Web screenshots and real-model evidence are presented.
    then:
      - Apple work remains blocked until the user explicitly confirms the web implementation works.
      - After confirmation, Apple matches approved behavior using a native-compatible derivative where needed.
  - id: S-13
    title: Deletion removes every model artifact
    given:
      - A model has master, preview, poster, and optional print derivatives.
    when:
      - The embed/chat/account is deleted under existing retention rules.
    then:
      - Every indexed S3 object and upload_files record is removed exactly once and storage counters are reconciled.

