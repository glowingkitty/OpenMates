clarification:
  rounds:
    - question: Which provider behavior should the Generate skill use for V1?
      answer: Hi3D only for now.
    - question: How should V1 fulfill text-to-3D while Hi3D has no documented text input?
      answer: Generate a reference image first, then submit it to Hi3D.
    - question: Which downloadable derivatives should V1 expose?
      answer: Keep GLB and generate print files on demand.
    - question: Which stable internal app ID should the spec define?
      answer: Use `models3d` while displaying "3D models".
    - question: How should the embed preview and fullscreen load?
      answer: Show only the preview image in the chat embed and load the interactive viewer only in fullscreen.
  vision_summary: >
    `models3d/generate` is a Hi3D-backed async generator for text, single-image,
    and ordered multi-view input. Text generation transparently uses the regular
    images.generate default model to create a retained reference before Hi3D.
    Generated models remain private encrypted artifacts: chat shows a poster,
    web fullscreen loads a bounded optimized GLB, the immutable master stays
    downloadable, and validated STL/3MF exports are generated only on demand.
    CLI and both SDKs precede web; Apple is blocked on explicit user approval of
    the deployed working web flow.
  approved_by_user: true

