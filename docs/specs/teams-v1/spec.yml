scenarios:
  - id: S-1
    title: Alice creates a team and switches context from CLI
    given:
      - Alice is authenticated in the CLI.
      - Alice has no active team context selected.
    when:
      - Alice runs openmates teams create "Acme Studio".
      - Alice runs openmates teams switch "Acme Studio".
      - Alice runs openmates teams current.
    then:
      - A team is created with Alice as owner.
      - The active CLI context is the new team.
      - Personal chats/tasks/projects/plans/workflows are not listed while the team context is active.
      - Alice can switch back to personal context.

  - id: S-2
    title: Alice invites Bob and Bob accepts into the team
    given:
      - Alice owns Team Acme.
      - Bob has an OpenMates account with an initialized master key.
    when:
      - Alice creates a direct invite for Bob as member.
      - Bob accepts the invite from CLI.
    then:
      - Bob becomes a member of Team Acme.
      - Bob receives a team_key_wrapper for team_key_epoch 1.
      - Bob can switch into Team Acme and list team workspaces.
      - Bob cannot see Alice's personal context records.

  - id: S-3
    title: Team chat requires @openmates and charges team credits
    given:
      - Alice and Bob are members of Team Acme.
      - Team Acme has enough credits.
      - Alice's CLI context is Team Acme.
    when:
      - Alice sends a team chat message without @openmates.
      - Bob sends a team chat message with @openmates.
    then:
      - Alice's message is stored and visible to team members but does not trigger AI processing.
      - Bob's message triggers AI processing.
      - The AI response consumes Team Acme credits, not Bob's personal credits.
      - The LLM input history identifies which human sent each team message.

  - id: S-4
    title: Active context scopes every workspace
    given:
      - Alice has personal chats, tasks, projects, plans, and workflows.
      - Alice also belongs to Team Acme with team-owned records in each workspace.
    when:
      - Alice lists each workspace in personal context.
      - Alice switches to Team Acme and lists each workspace again.
    then:
      - Personal context lists only personal records.
      - Team context lists only Team Acme records.
      - Commands with --personal or --team override the persisted active context for that invocation only.

  - id: S-5
    title: Alice moves personal records into a team with confirmation
    given:
      - Alice owns a personal chat, task, project, plan, and workflow.
      - Alice is a member of Team Acme.
    when:
      - Alice runs each move command and confirms "yes".
    then:
      - Each item transfers ownership/context to Team Acme.
      - The item disappears from Alice's personal context.
      - Team members can list/read the moved item.
      - Object ciphertext is not re-encrypted; only ownership/context metadata and wrappers change.

  - id: S-6
    title: Viewer can read but cannot write or export
    given:
      - Vera is a viewer in Team Acme.
      - Team Acme has chats, tasks, projects, plans, and workflows.
    when:
      - Vera lists and reads team records.
      - Vera tries to send a team chat message, trigger @openmates, create a task, move an item, invite a member, buy credits, or export team data.
    then:
      - Read/list commands succeed.
      - Every write, AI-trigger, billing, invite, move, and export action fails with a clear permission error.
      - No server-side team state changes are created by denied viewer actions.

  - id: S-7
    title: Owner/admin manage shared team credits
    given:
      - Alice owns Team Acme.
      - Team Acme has zero credits.
    when:
      - Alice creates a team chat and sends @openmates.
      - Alice buys team credits or transfers personal credits into Team Acme.
      - Alice sends @openmates again.
    then:
      - The first AI-triggering action is blocked for insufficient team credits.
      - Team creation and non-AI collaboration remain allowed with zero credits.
      - After funding the team balance, AI processing succeeds and deducts team credits.
      - Team-to-personal credit transfer is unavailable.

  - id: S-8
    title: Member removal revokes future access and local data is cleaned
    given:
      - Bob is a member of Team Acme and has synced team data locally.
      - Alice owns Team Acme.
    when:
      - Alice removes Bob from Team Acme.
      - Bob's active or next managed client syncs.
    then:
      - Bob's membership is revoked.
      - Bob's team_key_wrapper is revoked or deleted.
      - Bob can no longer fetch team records, wrappers, or billing data from the server.
      - Bob's managed client deletes local Team Acme data.
      - Team key rotation does not happen in V1.

  - id: S-9
    title: SDKs expose the same context and permission semantics as CLI
    given:
      - An npm SDK client and pip SDK client are authenticated as Alice.
      - Alice belongs to Team Acme.
    when:
      - Each SDK sets context to personal, then Team Acme.
      - Each SDK creates and lists team-scoped records.
    then:
      - SDK results match CLI behavior for context selection and workspace scoping.
      - SDK operations respect role permissions.
      - SDK team chat AI usage charges team credits.

  - id: S-10
    title: Web and Apple do not bypass the CLI/SDK contract
    given:
      - CLI and SDK team behavior has passed against dev.
    when:
      - Web and Apple implementation begins.
    then:
      - Web uses the same backend context, permission, wrapper, and billing contracts.
      - Apple starts only after web/user-confirmation gates unless explicitly deferred.
      - No client exposes team data through personal-only routes.

  - id: S-11
    title: Team memories are separate from personal memories
    given:
      - Alice has personal memories for Code and Travel encrypted with Alice's user master key.
      - Alice belongs to Team Acme and has team memories for Code and Travel encrypted with Team Acme's team key.
      - Bob is a member of Team Acme.
    when:
      - Alice lists memories in personal context.
      - Alice switches to Team Acme and lists memories again.
      - Bob asks @openmates a team-chat question that requests relevant memories.
    then:
      - Alice's personal context returns only Alice's personal memories.
      - Team Acme context returns only Team Acme memories.
      - Bob's team AI request can include approved Team Acme memories but cannot include Alice's personal memories.
      - Team memory rows are decryptable through Team Acme's team key path, not Alice's personal master-key-only path.

  - id: S-12
    title: Team connected accounts are disabled while personal accounts stay private
    given:
      - Alice has a personal Google Calendar connected account.
      - Alice owns Team Acme.
      - Team Acme does not support connected accounts in V1.
    when:
      - Alice switches to Team Acme and asks @openmates to read calendar events.
      - Alice tries to import or list a connected account in Team Acme context.
      - Bob uses Team Acme context to ask for calendar events.
    then:
      - The first team request cannot use Alice's personal Google Calendar connected account.
      - Team connected-account import, list, token-broker, and AI request paths fail closed with a clear unsupported message.
      - Bob cannot use Alice's personal connected account from Team Acme context.
      - Viewers and removed members also cannot use team connected accounts because the feature is disabled for every team role.

  - id: S-13
    title: Invite emails deliver one-time team accept links without leaking team secrets
    given:
      - Alice owns Team Acme.
      - Bob has a reachable email address and may or may not already have an OpenMates account.
    when:
      - Alice invites Bob by email as member, admin, or viewer.
      - CLI/web shows Alice the current OpenMates domain/deployment and explains Bob must accept with an account on that same domain.
      - OpenMates sends the invite notification email with a one-time invite link.
      - Bob opens the link in web or accepts the invite from CLI/SDK.
    then:
      - Invite creation response is the same whether or not Bob already has an OpenMates account on this domain.
      - The email includes only safe team/inviter display information and never includes raw team keys, wrapped team keys, personal account data, or private team content.
      - Accepting the one-time link requires Bob authentication or signup on the same OpenMates domain before an access request is created.
      - Bob sees user-facing copy such as Waiting for team access approval, not technical key-grant terminology.
      - A team owner/admin receives an access approval notification and must approve before Bob's membership becomes active and team sync is allowed.
      - Approval creates Bob's team membership and team key wrapper through the approved key-sharing flow.
      - Reusing, expired, declined, or revoked invite links fails closed.

  - id: S-14
    title: Owner/admin exports and imports team data without personal/team mixing
    given:
      - Alice owns Team Acme with team chats, tasks, projects, plans, workflows, memories, billing metadata, usage events, memberships, and invites.
      - Alice also has personal chats, memories, connected accounts, tasks, projects, plans, and workflows.
      - Vera is a viewer in Team Acme.
    when:
      - Alice exports Team Acme data.
      - Vera tries to export Team Acme data.
      - Alice imports a valid Team Acme export into a new or selected team context.
    then:
      - Alice's export includes only Team Acme scoped rows and authorized metadata, never Alice's personal rows or other teams' rows.
      - Export output is encrypted or redacted consistently with personal account export and never contains raw team keys, object keys, connected-account secrets, invite secrets, private emails beyond authorized metadata, or share URL fragments.
      - Vera's viewer export attempt is rejected.
      - Import creates or updates team-owned rows only under the destination team context and never writes imported rows into personal context.
      - Imported encrypted rows use the destination team's team-key/wrapper path or are rejected before persistence if they cannot be safely rewrapped.

