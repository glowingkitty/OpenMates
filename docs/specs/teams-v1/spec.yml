assumptions:
  - id: A-1
    text: The unified-key-wrappers spec is completed and can be treated as the encryption prerequisite for Teams V1.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: docs/specs/unified-key-wrappers/spec.yml
        summary: Spec status is verified and wrapper schemas include team context fields.
  - id: A-2
    text: Teams V1 does not need automatic team-key rotation; team_key_epoch remains 1.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification 2026-07-17
        summary: User chose the simpler epoch-1-only V1 model to reduce decryption risk.
  - id: A-3
    text: Every V1 team member/viewer can see all content in the team.
    category: permissions
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification 2026-07-17
        summary: User explicitly chose team-wide visibility in V1 and suggested multiple teams for separation.
  - id: A-4
    text: Team billing fields are optional because teams can be non-commercial.
    category: billing
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification 2026-07-17
        summary: User said teams should not be exclusive to businesses or commercial teams.
  - id: A-5
    text: Existing personal memories are encrypted with the user's master key and must not be reused directly as team memories.
    category: encryption
    required_before: implementation
    status: confirmed
    evidence:
      - source: backend/core/directus/schemas/user_app_settings_and_memories.yml
        summary: Existing schema notes say current clients encrypt each item with the user's master key before upload.
      - source: user clarification 2026-07-18
        summary: User confirmed team memories should instead use the team key for the specific team.
  - id: A-6
    text: Team connected accounts are disabled in V1 rather than implicitly sharing a member's personal connected account.
    category: privacy
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification 2026-07-18
        summary: User confirmed personal connected accounts must be inaccessible for all requests while in team context.
      - source: user clarification 2026-07-18
        summary: User chose to keep connected accounts deactivated for teams until a later version.
  - id: A-7
    text: Email invite flows must not let a team owner/admin probe whether an email address has an account on a cloud or self-hosted OpenMates domain.
    category: privacy
    required_before: implementation
    status: confirmed
    evidence:
      - source: user clarification 2026-07-18
        summary: User confirmed invite UX must show the current domain for smooth self-host/cloud use, but must not expose account-existence checks.

contracts:
  domain:
    invite_domain:
      displayed_to_inviter: true
      source: configured_api_or_web_origin
      purpose: Remind the team owner/admin that the recipient must accept using an account on this same OpenMates deployment/domain.
      account_existence_probe_allowed: false
      no_enumeration_rule: Team owners/admins must never learn from invite creation whether the email belongs to an existing account.
      user_facing_waiting_state: Waiting for team access approval
      internal_state: pending_access_approval
      approval_roles:
        - owner
        - admin
      approval_behavior: Owner/admin invite creation encrypts the raw team key client-side to an email-bound invite secret and uploads only the ciphertext invite team-key blob. The email/link carries invite routing in the URL and the random secret in the fragment only; after authenticated recipient verification, the recipient client derives the invite key from normalized account email plus fragment secret, decrypts the team key locally, wraps it with the user's personal master-key path, and uploads the normal team_key_wrapper.
      invite_secret_rules:
        fragment_only: true
        required_entropy_bits: 256
        kdf_inputs:
          - normalized_recipient_email
          - invite_secret_fragment
          - invite_id
          - team_id
          - deployment_origin
        server_sees_fragment_secret: false
        server_returns_encrypted_team_key_only_after_recipient_email_match: true
        raw_or_wrapped_team_key_in_email: false
    team_keys:
      local_storage: same_protected_local_or_keychain_tier_as_personal_master_key
      local_storage_key: team_id
      downloaded_on_login_or_sync: true
      deleted_on_logout_or_session_reset: true
      server_stores_only_per_user_wrapped_team_keys: true
      raw_team_key_server_visible: false
      v1_key_rotation_on_member_removal: false
    roles:
      owner:
        can_delete_team: true
        can_transfer_ownership: true
        can_manage_members: true
        can_manage_billing: true
        can_write_content: true
        can_use_team_credits: true
        can_export_team_data: true
        can_write_team_memories: true
        can_manage_team_connected_accounts: false
        can_use_team_connected_accounts: false
      admin:
        can_delete_team: false
        can_transfer_ownership: false
        can_manage_members: true
        can_manage_billing: true
        can_write_content: true
        can_use_team_credits: true
        can_export_team_data: true
        can_write_team_memories: true
        can_manage_team_connected_accounts: false
        can_use_team_connected_accounts: false
      member:
        can_delete_team: false
        can_transfer_ownership: false
        can_manage_members: false
        can_manage_billing: false
        can_write_content: true
        can_use_team_credits: true
        can_export_team_data: false
        can_write_team_memories: true
        can_manage_team_connected_accounts: false
        can_use_team_connected_accounts: false
      viewer:
        can_delete_team: false
        can_transfer_ownership: false
        can_manage_members: false
        can_manage_billing: false
        can_write_content: false
        can_use_team_credits: false
        can_export_team_data: false
        can_write_team_memories: false
        can_manage_team_connected_accounts: false
        can_use_team_connected_accounts: false
    active_context:
      default: personal
      cli_persistence: per authenticated local account
      sdk_persistence: caller-managed in client instance
      override_flags:
        - --personal
        - --team <team_id_or_slug>
      workspace_scopes:
        - chats
        - tasks
        - projects
        - plans
        - workflows
        - memories
    team_visibility:
      v1: team_wide
      private_items: false
      item_acl: false
    team_chat_ai_trigger:
      trigger: "@openmates"
      no_trigger_behavior: store_user_message_without_ai
      viewer_behavior: reject_message_before_store
      llm_history_format: include sender display label or stable team member alias in user-role content before message text
    team_chat_keys:
      chat_key_generation: per_chat_random_key
      team_chat_key_wrapping: encrypted_with_team_key
      personal_master_key_wrapping_for_team_chats: false
      per_member_chat_wrappers_v1: false
      required_chat_fields:
        - hashed_team_id
        - encrypted_chat_key
        - team_key_epoch
      removed_member_decrypt_caveat: Previously synced team ciphertext may remain decryptable if the removed member retained local team key material.
    credits:
      team_creation_requires_credits: false
      team_ai_usage_charges: team_balance
      personal_fallback_for_team_ai: false
      cli_sdk_team_funding: bank_transfer_order_only
      direct_public_team_credit_grant: false
      personal_to_team_transfer: false
      team_to_personal_transfer: false
      member_usage_limits_v1: false
      billing_profile_fields_required: false
      server_visible_operational_balance: true
      encrypted_balance_snapshot_source_of_truth: false
    memories:
      personal_encryption: user_master_key
      team_encryption: team_key_or_per_memory_object_key_wrapped_by_team_key
      personal_available_in_team_context: false
      team_available_in_personal_context: false
      team_visibility_v1: owner_admin_member_viewer_read
      team_write_roles:
        - owner
        - admin
        - member
      viewer_write_behavior: reject_before_store
      ai_request_scope: active_context_only
      move_personal_memory_to_team_v1: false
    connected_accounts:
      personal_available_in_team_context: false
      team_available_in_personal_context: false
      team_rows_are_explicit: false
      team_enabled_v1: false
      personal_account_reference_from_team_row: false
      team_route_behavior: reject_with_TEAM_CONNECTED_ACCOUNTS_DISABLED
      token_broker_team_behavior: reject_with_TEAM_CONNECTED_ACCOUNTS_DISABLED
      ai_request_scope: personal_context_only_for_connected_accounts
  data:
    - collection: teams
      purpose: Team account root with encrypted metadata and billing identity.
      fields:
        - team_id
        - slug
        - encrypted_name
        - encrypted_description
        - encrypted_billing_profile
        - created_by_user_hash
        - status
        - created_at
        - updated_at
    - collection: team_memberships
      purpose: Role and status for a user in a team.
      fields:
        - team_id_hash
        - hashed_user_id
        - role
        - status
        - invited_by_hash
        - joined_at
        - removed_at
    - collection: team_invites
      purpose: Direct invite/code records without exposing private recipient data broadly.
      fields:
        - invite_id
        - team_id_hash
        - hashed_recipient_email
        - encrypted_recipient_hint
        - encrypted_invite_team_key
        - invite_key_kdf_context
        - role
        - status
        - one_time_token_hash
        - sent_at
        - expires_at
        - created_at
        - accepted_at
        - declined_at
        - revoked_at
      notes:
        - Invite email delivery stores only hashed recipient routing fields plus encrypted display hints; raw email is used only for authorized notification delivery and must not be logged.
        - Invite links are one-time tokens and are stored only as hashes server-side.
        - Invite creation must not reveal whether hashed_recipient_email matches an existing account.
        - encrypted_invite_team_key is encrypted by the inviter client using normalized recipient email plus the URL fragment secret; the server stores and returns the ciphertext but cannot decrypt it.
        - invite_key_kdf_context must bind invite_id, team_id, deployment origin, and algorithm/version without storing the fragment secret.
    - collection: team_access_requests
      purpose: User-facing Waiting for team access approval state after recipient authenticates or signs up from an invite link.
      fields:
        - access_request_id
        - invite_id
        - hashed_team_id
        - hashed_user_id
        - role
        - status
        - requested_at
        - approved_at
        - rejected_at
        - resolved_by_user_hash
      notes:
        - Product copy says Waiting for team access approval; internal implementation may call this pending_access_approval.
        - Active membership and team sync are blocked until owner/admin approval creates a valid team key wrapper for the verified recipient.
    - collection: team_key_wrappers
      purpose: Wrap team_key_epoch 1 to each active member/viewer using their user master-key access path.
      fields:
        - hashed_team_id
        - hashed_user_id
        - team_key_epoch
        - encrypted_team_key
        - status
        - created_at
        - revoked_at
      notes:
        - Teams V1 always writes team_key_epoch 1.
        - No automatic key rotation is performed when a member is removed.
    - collection: team_credit_accounts
      purpose: Shared team credit balance, separate from personal credit balance.
      fields:
        - team_id_hash
        - encrypted_balance
        - version
        - updated_at
    - collection: team_credit_events
      purpose: Auditable team credit purchases, transfers, deductions, and refunds.
      fields:
        - event_id
        - team_id_hash
        - actor_user_hash
        - event_type
        - amount
        - encrypted_metadata
        - created_at
    - collection: team_usage_events
      purpose: Per-member attribution for team usage reporting.
      fields:
        - event_id
        - team_id_hash
        - actor_user_hash
        - workspace_type
        - object_id_hash
        - credit_amount
        - created_at
    - collection: user_app_settings_and_memories
      purpose: Context-owned encrypted personal and team memory rows.
      fields:
        - id
        - owner_context
        - hashed_user_id
        - hashed_team_id
        - created_by_user_hash
        - updated_by_user_hash
        - app_id
        - item_key
        - item_type
        - encrypted_app_key
        - encrypted_item_json
        - team_key_epoch
        - encryption_context
        - created_at
        - updated_at
        - sequence_number
        - item_version
      notes:
        - owner_context defaults to personal for existing rows.
        - personal rows require hashed_user_id and no hashed_team_id.
        - team rows require hashed_team_id, team_key_epoch 1, and team-key-path encryption.
        - list, update, delete, sync, export, mention metadata, and AI-memory confirmation must filter by owner_context plus hashed_user_id or hashed_team_id.
        - update/delete must verify ownership/context by row id plus owner_context plus owner hash, never by id alone.
    - collection: connected_accounts
      purpose: Personal encrypted connected-account rows; team context is disabled in V1.
      fields:
        - id
        - owner_context
        - hashed_user_id
        - hashed_team_id
        - created_by_user_hash
        - updated_by_user_hash
        - provider_type_hash
        - provider_account_id_hash
        - encrypted_provider_type
        - encrypted_provider_account_display
        - encrypted_account_label
        - encrypted_account_directory_hint
        - encrypted_refresh_token_bundle
        - encrypted_capabilities
        - encrypted_app_permissions
        - server_access_enabled
        - encrypted_server_access_ref
        - execution_mode
        - team_key_epoch
        - encryption_context
        - created_at
        - updated_at
        - revoked_at
      notes:
        - owner_context defaults to personal for existing rows.
        - existing personal rows require hashed_user_id and no hashed_team_id.
        - team connected-account rows are not created or used in V1.
        - token broker and connected-account permission continuation must reject team context and must never fall back to personal accounts.
    - collection: team_connected_account_grants
      purpose: Deferred later-version grants and wrapper state for team connected-account use; unused in V1.
      fields:
        - connected_account_id_hash
        - team_id_hash
        - hashed_user_id
        - role_snapshot
        - encrypted_account_secret_key
        - allowed_actions_hash
        - status
        - created_at
        - revoked_at
      notes:
        - No V1 route creates or consumes team connected-account grants.
        - A later version must re-review grant encryption and role semantics before enabling this collection.
    - collection: team_data_exports
      purpose: Auditable team export/import jobs and artifacts without plaintext team content.
      fields:
        - export_id
        - hashed_team_id
        - actor_user_hash
        - artifact_hash
        - encrypted_manifest
        - status
        - created_at
        - expires_at
      notes:
        - Export artifacts are team-scoped and encrypted/redacted like personal account exports.
        - Export jobs must never include personal-context rows or rows from another team.
  api:
    - route: GET /v1/teams
      auth: authenticated
      allowed_roles: any_member
      behavior: List teams where current user has active membership.
    - route: POST /v1/teams
      auth: authenticated
      allowed_roles: authenticated_user
      behavior: Create a team with creator as owner and zero credits.
    - route: GET /v1/teams/{team_id}
      auth: authenticated
      allowed_roles: owner_admin_member_viewer
      behavior: Return team metadata and caller role.
    - route: PATCH /v1/teams/{team_id}
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Update team metadata and optional billing profile.
    - route: DELETE /v1/teams/{team_id}
      auth: authenticated
      allowed_roles: owner
      behavior: Delete or archive team without affecting member personal accounts.
    - route: POST /v1/teams/{team_id}/leave
      auth: authenticated
      allowed_roles: admin_member_viewer
      behavior: Let non-owner members leave, revoke their team key wrapper, and delete local managed-client team data; last owner cannot leave without owner transfer or delete.
    - route: POST /v1/teams/{team_id}/invites
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Create direct invite/code for role admin, member, or viewer and send a notification email with a one-time accept link when an email recipient is provided; response must not disclose whether the email has an account on this deployment.
    - route: POST /v1/team-invites/{invite_id}/decline
      auth: authenticated_or_invite_token
      allowed_roles: invite_recipient
      behavior: Mark invite declined and revoke the one-time token without creating membership or key wrappers.
    - route: POST /v1/team-invites/{invite_id}/accept
      auth: authenticated
      allowed_roles: invite_recipient
      behavior: Consume the invite token after authenticated recipient verification, create a team access request in pending_access_approval state, and notify team owners/admins; active membership and team sync wait for approval and key-wrapper creation.
    - route: POST /v1/teams/{team_id}/access-requests/{access_request_id}/approve
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Approve recipient access, upload/create the recipient team key wrapper through the approved client-side wrapping path, activate membership, and notify the recipient.
    - route: POST /v1/teams/{team_id}/access-requests/{access_request_id}/reject
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Reject recipient access without creating active membership or key wrappers and notify the recipient.
    - route: POST /v1/teams/{team_id}/members/{user_id}/remove
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Revoke membership, revoke team key wrapper, broadcast removal cleanup event.
    - route: PATCH /v1/teams/{team_id}/members/{user_id}
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Change role within allowed hierarchy.
    - route: POST /v1/teams/{team_id}/credits/purchase
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Purchase credits for the team balance using team billing profile if present.
    - route: POST /v1/teams/{team_id}/credits/transfer-from-personal
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Atomically debit personal credits and credit team balance.
    - route: GET /v1/teams/{team_id}/usage
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Return team usage summary and per-member usage attribution.
    - route: GET /v1/settings/export-account-data
      auth: authenticated
      allowed_roles: authenticated_user_or_team_member_by_context
      behavior: Return only personal memories for personal context and only team memories for the selected team context; never mix contexts in one default export.
    - route: POST /v1/teams/{team_id}/export
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Create an encrypted/redacted team export artifact containing only selected-team rows across team metadata, memberships, invites, billing/usage metadata, chats, tasks, projects, plans, workflows, and memories. Connected accounts are excluded because team connected accounts are disabled in V1.
    - route: GET /v1/teams/{team_id}/export/{export_id}
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Download a prepared team export artifact after verifying actor membership, role, and hashed_team_id ownership.
    - route: POST /v1/teams/import
      auth: authenticated
      allowed_roles: authenticated_user_or_owner_admin_destination_team
      behavior: Validate and import a team export into a new team owned by the actor or an existing destination team where the actor is owner/admin; imported rows must be destination-team-owned and rewrapped with destination team key material before persistence.
    - route: WS store_app_settings_memories_entry
      auth: authenticated
      allowed_roles: personal_user_or_team_owner_admin_member_by_context
      behavior: Store personal memory rows under hashed_user_id or team memory rows under hashed_team_id after context authorization; viewer team writes are rejected before persistence.
    - route: WS delete_app_settings_memories_entry
      auth: authenticated
      allowed_roles: personal_user_or_team_owner_admin_member_by_context
      behavior: Delete memory rows only after id plus owner_context plus owner hash authorization; viewer team deletes are rejected.
    - route: GET /v1/connected-accounts
      auth: authenticated
      allowed_roles: authenticated_user_or_team_member_by_context
      behavior: List only personal connected accounts in personal context; reject team_id with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - route: POST /v1/connected-accounts
      auth: authenticated
      allowed_roles: personal_user_or_team_owner_admin_by_context
      behavior: Create or import a personal connected account only; reject team_id with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - route: PATCH /v1/connected-accounts/{account_id}
      auth: authenticated
      allowed_roles: personal_user_or_team_owner_admin_by_context
      behavior: Update only personal connected accounts; reject team_id with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - route: POST /v1/token-broker/connected-accounts
      auth: authenticated
      allowed_roles: personal_user_or_authorized_team_user_by_context
      behavior: Mint active-turn token refs only for personal connected accounts in personal context; reject team_id with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - route: POST /v1/teams/{team_id}/billing/bank-transfer-orders
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Create or return an idempotent pending SEPA team credit order. The record is order_type=team_credit_purchase, includes team_id and hashed_team_id, and does not grant credits until bank-transfer settlement.
    - route: GET /v1/teams/{team_id}/billing/bank-transfer-orders
      auth: authenticated
      allowed_roles: owner_admin
      behavior: List pending team bank-transfer orders for that team only.
    - route: GET /v1/teams/{team_id}/billing/bank-transfer-orders/{order_id}
      auth: authenticated
      allowed_roles: owner_admin
      behavior: Return status for a team bank-transfer order only after team authorization and team_id/order_id/order_type match.
  cli:
    commands:
      - openmates teams create <name>
      - openmates teams list
      - openmates teams get <team>
      - openmates teams update <team>
      - openmates teams delete <team>
      - openmates teams switch <team>
      - openmates teams switch --personal
      - openmates teams current
      - openmates teams invite <team> --email <email> --role <role>
      - openmates teams invites
      - openmates teams accept <invite>
      - openmates teams decline <invite>
      - openmates teams access-requests <team>
      - openmates teams approve-access <team> <access-request>
      - openmates teams reject-access <team> <access-request>
      - openmates teams remove-member <team> <member>
      - openmates teams leave <team>
      - openmates teams set-role <team> <member> <role>
      - openmates teams export <team> --output <path>
      - openmates teams import --file <path> [--team <destination-team>|--new-team-name <name>]
      - openmates teams billing <team>
      - openmates teams billing bank-transfer create <team> --credits <credits>
      - openmates teams billing bank-transfer status <team> <order>
      - openmates teams billing bank-transfer list <team>
      - openmates teams usage <team>
      - openmates chat move <chat> --team <team>
      - openmates tasks move <task> --team <team>
      - openmates projects move <project> --team <team>
      - openmates plans move <plan> --team <team>
      - openmates workflows move <workflow> --team <team>
      - openmates settings memories list --personal
      - openmates settings memories list --team <team>
      - openmates settings memories create --team <team> --app-id <id> --item-type <type> --data <json>
      - openmates settings memories update --team <team> --id <entry-id> --app-id <id> --item-type <type> --data <json>
      - openmates settings memories delete --team <team> --id <entry-id>
      - openmates connected-accounts import --payload <payload>
      - openmates connected-accounts import --team <team> --payload <payload> rejects with Team connected accounts are not supported yet.
    invite_ux:
      - Invite commands must show the current OpenMates domain/deployment before sending, for example api.openmates.org, api.dev.openmates.org, or the configured self-host URL.
      - Invite commands must tell owner/admins that recipients should accept with an account on that same domain for the smoothest flow.
      - Invite commands must not reveal whether the invited email already has an account.
      - Recipient-facing pending copy must say Waiting for team access approval instead of pending key grant.
      - Owner/admin invite commands encrypt the team key into an invite-secret blob before sending; accept commands decrypt that blob locally and upload the recipient's own team_key_wrapper before active membership and team sync are enabled.
  privacy_security:
    - Backend authorization is mandatory before returning team records, encrypted object rows, wrappers, billing data, or usage events.
    - Backend routes reject cleartext-looking payloads for team encrypted fields, including team metadata, invite key wrappers, billing balance snapshots, and encrypted billing metadata.
    - Viewer restrictions are enforced server-side and covered by tests for every mutating route.
    - Team key wrappers and object wrappers must not be treated as authorization records.
    - Removing a member does not cryptographically erase already-synced data; product copy must not promise that it does.
    - Logs and traces must not include raw keys, decrypted team content, invite secrets, share fragments, private emails outside authorized delivery, or plaintext billing metadata.
    - Team AI billing must fail closed if team credit balance cannot be verified atomically.
    - Personal memories and personal connected accounts must be inaccessible from team context across REST, WebSocket, token broker, AI request assembly, sync, export, CLI, SDK, web, and Apple surfaces.
    - Team memories must use the selected team's team-key path and must not be encrypted only with a member's personal master key.
    - Team chat keys must be wrapped by the selected team's team key and must not be encrypted only with a member's personal master key.
    - Invite fragments and invite-derived key material must never be sent to OpenMates API, Vercel, logs, email, analytics, or traces.
    - Team connected-account token material must not exist in V1; all team-context connected-account routes and token-broker calls fail closed with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - Connected-account routes, token broker, and permission-continuation handlers must never fall back to personal connected accounts when active_context is team.
  rollout:
    phases:
      - Backend schema, permission helpers, and route contract tests.
      - Team memory isolation and disabled team connected-account backend tests.
      - Team invite email-link and team data export/import backend tests.
      - CLI lifecycle/membership/context proof against dev API/WebSocket.
      - CLI team memory isolation and disabled team connected-account proof against dev API/WebSocket.
      - CLI team chat and team billing proof against dev API/WebSocket.
      - Wire CLI coverage into daily tests after dev CLI success.
      - npm SDK and pip SDK parity.
      - Web implementation and Playwright after deploy.
      - User confirmation on deployed dev web behavior.
      - Apple parity or documented Apple deferral.

