decisions:
  - id: D-1
    status: active
    decision: Implement Teams V1 CLI and SDK first.
    reason: Shared product behavior must be proven against the real dev API/WebSocket path before web and Apple UI.
    decided_at: "2026-07-17"
  - id: D-2
    status: active
    decision: Active context defaults to personal and can be switched to one team.
    reason: Personal data remains the default and team-scoped commands must be explicit or persisted by user action.
    decided_at: "2026-07-17"
  - id: D-3
    status: active
    decision: Teams V1 has team-wide visibility and no item-level ACLs.
    reason: Multiple teams can separate groups; per-item ACLs would add a second permissions and encryption layer.
    decided_at: "2026-07-17"
  - id: D-4
    status: active
    decision: Include viewer as a read-only team-wide role with export disabled.
    reason: Stakeholders can inspect team content without mutating team data or consuming credits.
    decided_at: "2026-07-17"
  - id: D-5
    status: active
    decision: Team AI usage always consumes team credits.
    reason: Shared credits are essential to Teams and avoid charging personal accounts for team work.
    decided_at: "2026-07-17"
  - id: D-6
    status: active
    decision: Use team_key_epoch 1 only in V1 and do not rotate team keys automatically.
    reason: Reliable decryption and simple join/leave are higher priority than forward-secret key rotation in the first team implementation.
    decided_at: "2026-07-17"
  - id: D-7
    status: active
    decision: Team memories are team-owned resources encrypted with the specific team's team key or a per-memory object key wrapped by that team key.
    reason: Team AI context must be shared across team members while staying cryptographically separate from personal memories encrypted by each user's master key.
    decided_at: "2026-07-18"
  - id: D-8
    status: active
    decision: Team context must never access personal memories or personal connected accounts.
    reason: Memories and connected accounts can expose sensitive personal context or provider credentials, so personal/team separation must be enforced in storage, sync, AI request assembly, and client context selection.
    decided_at: "2026-07-18"
  - id: D-9
    status: active
    decision: Team connected accounts are disabled in V1.
    reason: Personal connected accounts must never leak into team context, and explicit team-owned credential management is deferred until a later version with dedicated UI/API/permission review.
    decided_at: "2026-07-18"
  - id: D-10
    status: active
    decision: Clients store decrypted team keys locally using the same protected local/keychain-backed storage tier as personal master-key material, keyed by team_id, and delete those local team keys on logout/session reset.
    reason: Team clients need offline/local access to team-key material for zero-knowledge team chat, memory, and workspace encryption without persisting plaintext team keys in ordinary files.
    decided_at: "2026-07-18"
  - id: D-11
    status: active
    decision: Email invites use an email-bound invite-secret key exchange instead of recipient public wrapping keys in V1.
    reason: The model matches existing share-link mechanics, avoids new public-key account infrastructure, keeps raw team keys away from server/email, and binds encrypted team-key blob delivery to the authenticated recipient email.
    decided_at: "2026-07-18"
  - id: D-12
    status: active
    decision: Team-owned chat keys are encrypted with the selected team's team key in V1, not with the creator's personal master key and not with per-member chat wrappers.
    reason: Teams V1 has team-wide visibility; one team-key-wrapped chat key is simpler and lets all active members with the team key decrypt team chats consistently.
    decided_at: "2026-07-18"
  - id: D-13
    status: active
    decision: Member removal does not rotate the team key in V1.
    reason: V1 revokes future server sync/access and clears managed local caches, but does not promise cryptographic erasure of already-synced data.
    decided_at: "2026-07-18"

