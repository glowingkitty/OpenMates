implementation_plan:
  spec_path: docs/specs/teams-v1/spec.yml
  existing_patterns:
    - docs/specs/unified-key-wrappers/spec.yml for team-ready wrapper rows.
    - docs/specs/user-data-permission-audit/spec.yml for fail-closed route classification.
    - backend/core/directus/schemas/user_tasks.yml and user_plans.yml for encrypted workspace object schemas.
    - backend/core/directus/schemas/user_app_settings_and_memories.yml for existing personal memory row storage and client master-key encryption.
    - backend/core/directus/schemas/connected_accounts.yml and backend/core/api/app/routes/token_broker.py for existing personal connected-account storage and token-ref brokering.
    - frontend/packages/openmates-cli/src/client.ts for CLI API/WebSocket behavior.
    - frontend/packages/openmates-cli/src/sdk.ts and packages/openmates-python/openmates/sdk.py for SDK parity.
  architecture: >
    Add team identity, membership, permission, billing, and context-scoping as a
    backend-first capability, then expose it through CLI and SDKs before web and
    Apple UI. Personal and team records share workspace primitives but are always
    filtered by explicit context. Team encryption grants use team_key_wrappers and
    unified object wrappers with team_key_epoch fixed to 1 in V1. Team memories
    are context-owned resources; team connected accounts are disabled. Team context never
    falls back to personal memories or personal connected accounts.
  data_flow:
    - User creates team; backend creates owner membership, team credit account, and team key wrapper.
    - Owner/admin invites users; invite acceptance creates a Waiting for team access approval request, then owner/admin approval creates active membership and team key wrapper for the verified recipient.
    - Owner/admin email invites enqueue notification email with a one-time accept link; acceptance requires recipient auth/signup on the same OpenMates domain and never reveals account existence to the inviter.
    - CLI/SDK active context selects personal or team before workspace list/create/move commands.
    - Team memory create/list/update/delete uses hashed_team_id and team-key-path encryption; personal memory flows continue to use hashed_user_id and user master-key encryption.
    - Team connected-account create/list/use/token broker routes reject team_id with TEAM_CONNECTED_ACCOUNTS_DISABLED.
    - Team chat stores human messages without AI unless @openmates is present.
    - Team AI request checks team credits atomically, builds sender-attributed LLM history, includes only active-team memory context, deducts team credits, and records usage attribution.
    - Member removal revokes membership and team key wrapper, emits cleanup event, and prevents future team sync access.
    - Owner/admin team export collects only selected-team rows into an encrypted/redacted artifact; import writes only destination-team-owned rows after destination team-key wrapping.
  affected_files:
    - path: backend/core/directus/schemas/teams.yml
      reason: New team, membership, invite, key wrapper, billing, and usage schemas.
    - path: backend/core/directus/schemas/user_app_settings_and_memories.yml
      reason: Add owner_context, hashed_team_id, team_key_epoch, and encryption_context for team memories.
    - path: backend/core/directus/schemas/connected_accounts.yml
      reason: Keep personal connected-account storage separated and fail closed for team context in V1.
    - path: backend/core/api/app/routes/teams.py
      reason: Team lifecycle, membership, billing, and usage REST API.
    - path: backend/core/api/app/routes/settings.py
      reason: Context-scoped memory export/list behavior.
    - path: backend/core/api/app/routes/connected_accounts.py
      reason: Personal connected-account list/create/update behavior plus explicit V1 team-context rejection.
    - path: backend/core/api/app/routes/token_broker.py
      reason: Deny personal connected-account token refs in team context and reject team connected-account token brokerage in V1.
    - path: backend/core/api/app/services/directus/team_methods.py
      reason: Directus persistence and fail-closed team authorization helpers.
    - path: backend/core/api/app/services/team_billing_service.py
      reason: Team credit account, purchase, transfer, deduction, and usage attribution.
    - path: backend/core/api/app/services/team_invite_email_service.py
      reason: One-time team invite link notification delivery without leaking team secrets or private data.
    - path: backend/core/api/app/services/team_data_portability_service.py
      reason: Team-scoped export/import artifact construction, validation, and destination-team rewrap checks.
    - path: backend/core/api/app/routes/handlers/websocket_handlers
      reason: Team context sync, team memory sync, connected-account fail-closed team context, team cleanup events, and team chat AI trigger behavior.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Team chat sender-attributed history and team billing context for AI processing.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: CLI API/WebSocket client support for team context and team commands.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: User-facing Teams CLI commands and move/context overrides.
    - path: frontend/packages/openmates-cli/src/sdk.ts
      reason: npm SDK Teams parity.
    - path: packages/openmates-python/openmates/sdk.py
      reason: pip SDK Teams parity.
    - path: frontend/packages/ui/src/services
      reason: Later web team context, local cleanup, and team workspace sync.
    - path: frontend/apps/web_app/tests/teams-flow.spec.ts
      reason: Web parity after CLI and SDK gates.
    - path: apple/OpenMates
      reason: Apple parity or explicit deferral.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/teams-v1/spec.yml
    - Backend pytest contract tests for lifecycle, membership, invite email links, data portability, permissions, billing, offboarding, team chat, and move behavior.
    - Backend pytest contract tests for team memory isolation and team connected-account isolation.
    - Real CLI dev-server scripts against api.dev.openmates.org with real test-account auth.
    - Wire real CLI proof into daily tests after dev pass.
    - npm and pip SDK tests plus python3 scripts/audit_sdk_cli_parity.py.
    - Web Playwright against app.dev.openmates.org after deploy.
    - User confirmation of deployed dev web Teams behavior.
    - Apple build/test or explicit deferral after web/user confirmation.
  verification_order:
    - Spec validation.
    - Backend red/green tests.
    - Real CLI dev lifecycle and membership.
    - Real CLI dev memory and connected-account isolation.
    - Real CLI dev invite email-link and team data export/import proof.
    - Real CLI dev team chat, billing, workspace context, move, and offboarding.
    - Daily-test wiring for the CLI dev coverage.
    - npm SDK parity.
    - pip SDK parity.
    - Web Playwright after deploy.
    - User confirmation.
    - Apple parity or deferral.
  risks:
    - Leaking team data through personal-only routes or sync caches.
    - Charging personal credits for team AI usage.
    - Treating viewer as read-only in UI but not enforcing it server-side.
    - Creating decryption failures by writing team wrappers before team_key_wrapper sync is available.
    - Missing local cleanup on member removal and leaving managed clients in stale team context.
    - Leaking personal memories into team AI prompts or team memory mention metadata.
    - Letting team token-broker requests use a member's personal connected account.
    - Encrypting team connected-account token material in a way that lets viewers decrypt provider secrets.
    - Sending invite emails that expose raw team keys, wrapped team keys, private emails in logs, or team/private content.
    - Export/import accidentally merging team rows into personal context or carrying rows from the wrong team.
    - Billing transfer races between personal and team credit balances.
    - Scope creep into private ACLs, per-member limits, SSO, or key rotation.
  open_questions:
    - What exact retention period applies after team deletion before permanent purge or export? V1 can archive/delete according to existing account data policies until legal review.
    - Should team invoices use a default personal account identifier when optional team billing profile is absent, or only a team account ID? V1 should use team account ID unless payment law requires more.
    - Should V1 expose a confirmed copy flow from personal memory or connected account into a team? Current contract keeps this out of scope and requires explicit team creation/import instead.

