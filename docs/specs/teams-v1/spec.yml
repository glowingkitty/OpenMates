apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Core/Networking/OpenMatesAPIClient.swift
    - apple/OpenMates/Sources/Core/Encryption
    - apple/OpenMates/Sources/Chat
    - apple/OpenMates/Sources/Projects
    - apple/OpenMates/Sources/Plans
    - apple/OpenMates/Sources/Tasks
  parity_expectations:
    - Apple must not implement team UI or behavior until CLI, SDK, web, and user-confirmation gates are complete.
    - Apple must eventually support personal/team context selection and must fail closed if a team context is unavailable.
    - Apple must respect viewer read-only semantics and team credit charging once team parity begins.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios after web/user confirmation or a documented Apple deferral.
  intentional_native_differences:
    - Apple Teams UI can lag the CLI/SDK/web implementation in V1, but must not expose stale personal-only assumptions for team-owned records once native team surfaces are enabled.

clarification:
  rounds:
    - question: What is the smallest real end-to-end CLI/SDK user flow that must work first?
      answer: Create team, invite member, accept invite, switch personal/team contexts, create team chat, send @openmates message using team credits, and ensure team workspaces load only active-team data.
    - question: Should users move/copy existing personal items into teams in V1?
      answer: Move should work and be tested for chats, tasks, projects, workflows, and plans under their respective commands.
    - question: Should moving personal items into teams transfer ownership or copy/reference?
      answer: Full ownership transfer into teams the user already belongs to, with confirmation before the irreversible move.
    - question: Which team key hierarchy should V1 use?
      answer: Reuse unified key wrappers. Team key wraps per-object keys; per-user team key wrappers grant team access.
    - question: Should team keys rotate automatically when members are removed?
      answer: No. V1 keeps team_key_epoch fixed to 1 and relies on permission checks, wrapper revocation, and managed-client local deletion.
    - question: How should active account/team context work in CLI/SDK?
      answer: Default to personal, persist explicit CLI team switch per logged-in account, expose SDK context setters, and support --personal / --team overrides per command.
    - question: Which roles should V1 support?
      answer: owner, admin, member, and viewer. Viewer is team-wide read-only, cannot export, cannot write, and cannot trigger AI.
    - question: Should V1 support private team chats or item ACLs?
      answer: No. All team chats, projects, tasks, plans, and workflows are visible to all team members/viewers in V1.
    - question: Should V1 include team credits and billing?
      answer: Yes. Team AI usage must charge the shared team balance, not the acting user's personal balance.
    - question: Who can manage team credits?
      answer: Owner/admin can buy/view team credits and transfer personal credits into teams. Members can use team credits and see own usage plus availability. Viewers cannot use or see billing.
    - question: Should V1 include per-member usage limits?
      answer: No. Use shared balance plus per-member attribution and owner/admin reporting.
    - question: Should business billing fields be required?
      answer: No. Team billing fields are optional because non-commercial teams are supported.
    - question: Can teams exist with zero credits?
      answer: Yes. Team creation and collaboration are free; credit-consuming AI actions are blocked when team credits are insufficient.
    - question: How should memories and connected accounts behave in team context?
      answer: Team memories should be encrypted with the specific team's team key, and personal memories plus personal connected accounts must be inaccessible for all team-context requests. Team connected accounts are deferred for V1 and should fail closed until later explicit team-owned credential management ships.
  vision_summary: >
    Teams V1 makes OpenMates useful for small groups without per-seat subscriptions:
    users can create teams, invite members, switch context, collaborate in team-wide
    workspaces, use shared team credits, and keep personal context separate from
    team memories. Team connected accounts are intentionally disabled in V1.
    The first implementation proves
    the contract through CLI and SDKs before web and Apple UI. Encryption relies
    on the completed unified-key-wrappers spec, with team_key_epoch fixed to 1 in V1.
  approved_by_user: true

