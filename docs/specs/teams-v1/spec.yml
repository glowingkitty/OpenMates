schema_version: 2
id: teams-v1
title: Teams V1
status: approved

goal: >
  Implement OpenMates Teams for small groups with shared team credits, team-wide
  workspace data, CLI/SDK-first context switching, and team chat collaboration
  while preserving personal/team data isolation and the existing encrypted object
  key architecture.

scope:
  in:
    - CLI-first team lifecycle commands for create, list, get, update, delete, switch, and current context.
    - npm SDK and pip SDK parity for the same team lifecycle and active-context behavior.
    - Team membership roles owner, admin, member, and viewer.
    - Direct email/code invite, accept, decline, remove member, leave team, and role update flows.
    - Invite notification emails with one-time invite links that open the web accept flow and are also consumable from CLI/SDK.
    - Multi-team membership for one user.
    - Active context switching between personal and one selected team.
    - Context-scoped list/read/create behavior for chats, tasks, projects, plans, workflows, and memories.
    - Team-wide visibility in V1: every team member/viewer can see all team chats, tasks, projects, plans, workflows, and team memories.
    - Team memories encrypted with the specific team's team key or a per-memory object key wrapped by that team key.
    - Personal memories and personal connected accounts are inaccessible to all team-context requests, including AI requests.
    - Team connected accounts are explicitly disabled in V1; team-context connected-account routes fail closed until a later version ships team-owned credential management.
    - Confirmed move commands for chats, tasks, projects, plans, and workflows from personal context into a team.
    - Team chats require an explicit @openmates mention to trigger AI processing.
    - Team chat LLM context includes per-human sender attribution so the model can distinguish speakers.
    - Shared team credit balance and team billing profile.
    - Team AI usage consumes team credits only, never personal credits.
    - Owner/admin team credit purchase by bank-transfer order from CLI/SDK; card payment starts remain web/Apple-only.
    - Per-member team usage attribution and owner/admin usage reporting.
    - Viewer read-only role with export and all write/AI-trigger actions disabled.
    - Member removal revokes server/sync access, revokes that member's team key wrapper, and instructs managed clients to delete local team data.
    - Owner/admin team data export and import with the same privacy guarantees as personal account export: exported data is encrypted/redacted, scoped only to the selected team, and never mixes personal rows.
    - Team encryption uses unified key wrappers with team_key_epoch fixed to 1 for V1; no automatic team key rotation on member removal.
    - Web app and Apple app parity after CLI and SDK gates are green.
  out:
    - Private team chats, project ACLs, item-specific permissions, or participant lists.
    - Per-member credit limits or user groups.
    - SSO, SAML, domain-restricted teams, public team discovery, or public community teams.
    - Team-to-personal credit transfers.
    - Team key rotation, historical rewrap, public-key member key distribution, connected-account secret rewrap after every role change, or strict cryptographic erasure of already-synced data.
    - Team exports for viewers.
    - Team connected-account import/list/use/token brokerage.
    - Importing team data into a personal account context or implicitly merging team data with personal memories, connected accounts, chats, tasks, projects, plans, or workflows.
    - Web or Apple implementation before CLI and SDK contracts are verified.
    - Enterprise sales flows, per-seat subscriptions, or contact-us pricing.

