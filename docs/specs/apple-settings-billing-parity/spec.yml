    file: apple/OpenMatesTests/SettingsFullParityTests.swift
    command: python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SettingsFullParityTests
    covers:
      - AC-1
      - AC-2
      - AC-3
      - AC-4
      - AC-5
      - AC-7
    assertions:
      - Native settings destination inventory covers every web `baseSettingsViews` route or lists an explicit native exception.
      - Native app metadata decoding preserves web fields for apps, skills, focus modes, settings/memories, providers, pricing, and examples.
      - App Store category, filter, sort, and AI-exclusion logic matches web.
