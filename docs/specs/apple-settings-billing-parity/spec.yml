schema_version: 2
id: apple-settings-billing-parity
title: Apple Full Settings Web Parity
status: implementing

goal: >
  Make Settings on iPhone, iPad, and macOS a complete native reproduction of the
  current web settings source of truth. Every product-owned route, visibility
  variant, state, and action available on web must be reachable and functional
  in Apple without redirecting users to the web, while OS-owned capability UI
  may remain native.

scope:
  in:
    - The settings shell, root menu, profile header, collapse/expand behavior, scrolling, transitions, back navigation, deep links, footer, and legal destinations.
    - Every static and dynamic route represented by the web settings registry, including future additions detected by deterministic route auditing.
    - Guest, authenticated, admin, paired/restricted-session, self-hosted, payment-disabled, demo, loading, offline, empty, error, disabled, saving, and success variants.
    - Fully functional native Incognito and Learning Mode rows, setup/explainer pages, persistence, lockout/error states, chat behavior, and shortened-content notices.
    - Apps, All Apps, app details, skills, providers, models, content types, focus modes, app memories, reminders, embeds, examples, and native example-chat opening.
    - Memories hub/category/create/detail/edit/delete/example/mention flows using the same encrypted data and sync contracts as web.
    - Mates list/detail/system-prompt/mention/start-chat flows using the canonical metadata source.
    - Privacy, connected accounts, personal-data protection, location privacy, retention, auto-deletion, telemetry/debug controls, and temporary debug-log sharing.
    - Billing and usage, native credit purchase, balance refresh, auto-top-up, invoices and downloads, gift cards, referrals, support payments, usage tabs, drilldowns, and exports.
    - Account, security, passkeys, password, 2FA, recovery key, sessions/pairing, profile, interests, email, storage, import/export, chat cleanup, and account deletion.
    - AI, projects, notifications, shared links, interface, developers, newsletter, support, report issue, server/admin, logs, and all nested settings actions.
    - Rendered-web contract capture and native screenshot/UI-test evidence on iPhone, iPad, and macOS.
    - Executable reserved-account tests for sensitive, destructive, credential-rotating, billing, and policy-changing flows.
  out:
    - Redesigning the web settings product or introducing Apple-only settings behavior.
    - Replacing OS-owned StoreKit purchase sheets, passkey authorization prompts, permission prompts, file/photo pickers, share sheets, camera UI, or system authentication UI.
    - Web redirects, external-browser fallbacks, silent no-op rows, placeholder pages, fixture-only production behavior, or unsupported-state cards for web-supported product flows.
    - Committing credentials, private account data, recovery material, payment identifiers, invoices, private screenshots, host details, or raw logs.
    - Using production accounts for settings verification.

