implementation_plan:
  existing_patterns:
    - "`SettingsView.swift` already implements root settings navigation and stable row/page identifiers."
    - "`SettingsAppsFull.swift` has a simplified Apps root and app detail page but lacks web-equivalent all-apps, search/filter/sort, detail drilldowns, examples, and provider/model/focus detail behavior."
    - "`RealAccountUITestSupport.swift` already loads password/OTP credentials and should be extended to support reserved slots without printing secrets."
    - Web settings routes and app metadata are the source of truth for route coverage and app-store behavior.
  architecture: >
    Keep Apple settings native SwiftUI built from OpenMates primitives. Expand the
    existing settings navigation and app-store views rather than embedding web
    views. Use reusable native cards/detail sections that mirror web AppStoreCard,
    SkillDetails, FocusModeDetails, and SkillExamplesSection contracts. Add test
    helpers for route inventory, metadata decoding, reserved account loading, and
    redacted UI assertions.
  data_flow:
    - Settings root opens from app chrome.
    - Static/native destination inventory maps web settings routes to Swift views or explicit exceptions.
    - Apps metadata loads and normalizes to native `AppInfo`, `AppSkill`, focus mode, memory, provider, pricing, model, and example view models.
    - Skill/focus examples open either public example chats or native embed fullscreen/equivalent surfaces.
    - Safe settings mutations call backend settings endpoints and refresh local user/profile state.
    - Sensitive settings mutations require login and SecurityAuth-like re-authentication with reserved account credentials.
  affected_files:
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsView.swift
      reason: Root navigation, route inventory, banners, role visibility, stable identifiers.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsAppsFull.swift
      reason: App Store root, all-apps, app details, skill/focus/memory detail navigation.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsAIFull.swift
      reason: AI/default model/settings memory parity with web AI settings.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsSubPages.swift
      reason: Account/security/privacy/notifications/developers subsettings parity.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsBillingView.swift
      reason: Billing/gift-card/support/invoice/referral/StoreKit parity.
    - path: apple/OpenMates/Sources/Features/Settings/Views/SettingsServerView.swift
      reason: Admin/server/log role visibility and read-only/risky action handling.
    - path: apple/OpenMatesUITests/RealAccountUITestSupport.swift
      reason: Reserved account credential loading, OTP, re-auth, redaction helpers.
    - path: apple/OpenMatesUITests/SettingsFullParityUITests.swift
      reason: Full settings route and safe action UI coverage.
    - path: apple/OpenMatesUITests/SettingsAppsParityUITests.swift
      reason: Apps, app details, skills, focus modes, examples coverage.
    - path: apple/OpenMatesUITests/SettingsSensitiveActionsParityUITests.swift
      reason: Reserved-account sensitive/destructive settings coverage.
    - path: apple/OpenMatesTests/SettingsFullParityTests.swift
      reason: Static route and metadata coverage.
    - path: docs/contributing/guides/testing.md
      reason: Document Apple reserved-account policy if new native destructive specs are added.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-settings-billing-parity/spec.yml
    - Remote Mac unit/UI tests listed in T-UNIT/T-UI entries.
    - Deploy before any Apple tests that require committed source in the remote Mac checkout.
    - Run `python3 scripts/spec_verify.py docs/specs/apple-settings-billing-parity/spec.yml --phase red` and `--phase green` as evidence is recorded.

