apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Settings/Views/*.swift
    - apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMates/Sources/Core/StoreKit/StoreManager.swift
    - apple/OpenMatesUITests/SettingsBillingParityUITests.swift
    - apple/OpenMatesUITests/SettingsFullParityUITests.swift
    - apple/OpenMatesUITests/SettingsAppsParityUITests.swift
    - apple/OpenMatesUITests/SettingsSensitiveActionsParityUITests.swift
    - apple/OpenMatesTests/SettingsBillingParityTests.swift
    - apple/OpenMatesTests/SettingsFullParityTests.swift
    - frontend/packages/ui/src/i18n/sources/**/*.yml
    - docs/contributing/guides/testing.md
    - scripts/apple_remote.py
  parity_expectations:
    - Apple settings UI must use OpenMates primitives (`OMSettingsPage`, `OMSettingsRow`, `OMToggle`, `OMDropdown`, `OMSegmentedControl`, custom dialogs/overlays) and must not use default product `List`, `Form`, native toolbar, native picker/toggle, or app-owned default sheet/alert chrome.
    - Stable Apple `.accessibilityIdentifier(...)` values should match the web `data-testid` concept where the product control is the same.
    - The Apple Apps section must render the same app metadata source as web, excluding AI from the App Store root because AI has its own top-level settings page.
    - Skill/focus example cards must open the same destination class as web: linked example chat cards open public example chats; synthetic embed examples open an embed fullscreen or native equivalent without leaving raw payloads visible.
    - Sensitive actions must require the same user re-authentication concepts as web and use reserved test accounts only.
  verification:
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesTests/SettingsFullParityTests`.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsFullParityUITests`.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsAppsParityUITests`.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPhone 17" --only-testing OpenMatesUITests/SettingsSensitiveActionsParityUITests` with reserved-account environment supplied by CI or a local ignored secret source.
    - Remote Mac `python3 scripts/apple_remote.py test-ios --simulator "iPad Pro 13-inch (M5)" --only-testing OpenMatesUITests/SettingsFullParityUITests` for layout and horizontal-scroll evidence.
  intentional_native_differences:
    - StoreKit purchase sheets, App Store account prompts, passkey prompts, notification permission prompts, file import/export pickers, QR/share sheets, and clipboard permission prompts are OS-owned and may differ visually from web.
    - Native settings may deep-link to a web page only when platform policy or current native capability prevents a fully native flow; that must be explicit, tested, and listed in the relevant UI copy.
    - If Apple cannot safely support web-only application/embed preview examples yet, the examples must show a deterministic unsupported-state card rather than silently doing nothing.

clarification:
  rounds:
    - question: Should sensitive/destructive settings actions be executable Apple tests or non-destructive fixture parity only?
      answer: Executable Apple tests are required, using the same reserved-account approach as the Playwright specs.
    - question: Should this expand the existing settings/billing spec or create a separate full settings spec?
      answer: Expand the existing settings/billing spec and implement/test the full spec.
  vision_summary: >
    Full Apple settings parity means every web settings route has a native Apple
    equivalent or explicit native exception, and the Apps section must match the
    web App Store experience deeply enough that users can browse all apps,
    skills, focus modes, memories, provider/model details, and examples. Tests
    should be executable and use reserved accounts for credential-rotating,
    destructive, billing, and security-sensitive actions.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Settings root and navigation match web
    given:
      - A guest, normal authenticated user, and admin user can open Apple settings.
    when:
      - Each user opens the settings root and navigates through top-level rows, subsettings, back buttons, footer links, and legal views.
    then:
      - Visible rows match web auth and role visibility.
      - Banners, icons, descriptions, scroll collapse, back navigation, and footer/legal links match web intent.
      - Product UI uses OpenMates primitives with no default table/list/form chrome.
  - id: S-2
    title: Apps App Store root and all-apps views match web
    given:
      - App metadata is available from the same backend/static contract used by web.
    when:
      - A user opens Apps, Show all apps, search, filters, sorts, and category carousels.
    then:
      - Apple excludes AI from App Store root, shows the web category groups, supports all-apps filters (`all`, `settings_memories`, `focus_modes`, `skills`), search, and newest/name sorting.
      - Horizontal card rows scroll on touch without cancelling gestures.
      - Empty/loading/error states are visible and translated.
  - id: S-3
    title: App details render skills memories focus modes reminders and embeds
    given:
      - An app contains skills, settings/memory categories, focus modes, active reminders, and generated embeds.
    when:
      - The user opens app detail pages such as `app_store/weather`, `app_store/travel`, `app_store/images`, `app_store/web`, and `app_store/reminder`.
    then:
      - Skill, memory, and focus cards match web `AppStoreCard` visual language and open their detail pages.
      - Guests only see memory categories with examples; authenticated users see editable saved categories.
      - Reminder and embeds sections appear only for supported/authenticated states.
  - id: S-4
    title: Skill detail pages match web including provider icons pricing models and examples
    given:
      - A skill has providers, pricing, how-to-use examples, optional models, default model setting, and linked or synthetic examples.
    when:
      - The user opens skill detail pages and interacts with providers, model rows, default model dropdown, @mention text, and examples.
    then:
      - Provider rows show loaded provider icons with white backgrounds and correct provider names.
      - Pricing, how-to-use cards, highlighted words, model list, and default model persistence match web.
      - Linked example chat cards open the matching example chat and close settings; synthetic preview examples open native fullscreen/equivalent and keep settings context where web does.
      - Raw JSON, provider payloads, private URLs, and missing translation markers are not visible.
  - id: S-5
    title: Focus mode detail pages match web including examples and prompts
    given:
      - Focus modes such as Jobs Career Insights and Web Deep Research are present in app metadata.
    when:
      - The user opens the focus mode detail page, views examples/how-to-use cards, toggles full system prompt, and clicks @mention text.
    then:
      - Example chat cards, process bullets, system prompt toggle, expanded prompt text, sibling navigation, and @focus mention insertion match web behavior.
  - id: S-6
    title: Preferences and safe actions persist like web
    given:
      - A normal authenticated reserved or reusable test account is logged in.
    when:
      - The user changes default models, model toggles, interface language/dark mode/font, notification toggles, reminder settings, newsletter categories, support choices, report issue form fields, username/timezone, privacy auto-delete, and debug-log sharing settings.
    then:
      - Apple sends the same API or WebSocket settings contracts as web and shows equivalent loading, success, validation error, and rollback states.
      - Settings persist after reopening settings or relaunching the app.
  - id: S-7
    title: Billing gift cards support invoices and StoreKit states match web intent
    given:
      - A billing-capable test account and StoreKit test products are available.
    when:
      - The user opens pricing, credits, buy credits, bank transfer/web-only fallbacks, gift cards, invoices, referral code, auto top-up, and support one-time/monthly flows.
    then:
      - Apple shows equivalent account state and purchase intent; StoreKit or web-only differences are explicit.
      - No private payment data, invoice identifiers, or customer IDs appear in screenshots or logs.
  - id: S-8
    title: Account security and destructive settings use reserved accounts safely
    given:
      - Reserved E2E account slots 14 through 20 are provisioned like the Playwright specs.
    when:
      - Apple runs recovery reset, backup code reset, recovery key regeneration, email change roundtrip, API key lifecycle, passkey/2FA state display, session revoke, account export/import, storage delete, account chat deletion preview, and account deletion preview/finalization where safe.
    then:
      - Each destructive or credential-rotating action uses the matching reserved slot and never uses the normal account pool.
      - Recovery keys, backup codes, OTP secrets, API keys, emails, and exported files are redacted from logs and attachments.
      - Cleanup and verification restore or document the expected reserved-account state.
  - id: S-9
    title: Admin server logs and role visibility match web
    given:
      - Admin and non-admin test users are available.
    when:
      - Each opens server, logs, stats, tests, software update, gift card generator, free-testing budget, and debug-log surfaces.
    then:
      - Non-admin users cannot see or invoke admin/server controls.
      - Admin users can open seeded admin controls, and risky actions require explicit confirmation or remain read-only in tests.
  - id: S-10
    title: iPhone iPad and macOS settings layout stays usable
    given:
      - The same settings routes are opened on iPhone, iPad, and macOS-capable builds where supported.
    when:
      - The user scrolls vertical pages, horizontal app/skill/example rows, opens dialogs, and changes orientation/size class.
    then:
      - Layout matches web responsive intent, remains reachable with sidebar closed, and uses native-safe scroll containers without clipped actions.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Apple settings root, subsetting navigation, role visibility, banners, footers, and legal views match web settings routes and use only OpenMates product UI primitives.
  - id: AC-2
    scenario: S-2
    text: Apple Apps/App Store root and all-apps views match web categories, search, filters, sort, card rendering, horizontal scroll behavior, and loading/empty/error states.
  - id: AC-3
    scenario: S-3
    text: Apple app detail pages render and navigate to all skills, settings/memory categories, focus modes, active reminders, and app embeds with web-equivalent visibility rules.
  - id: AC-4
    scenario: S-4
    text: Apple skill detail pages match web provider icons, pricing, model/default model behavior, examples, @mention behavior, and raw-payload leak prevention.
  - id: AC-5
    scenario: S-5
    text: Apple focus mode detail pages match web examples, process bullets, system prompt toggle, expanded prompt, sibling navigation, and @focus mention insertion.
  - id: AC-6
    scenario: S-6
    text: Apple safe preferences and non-destructive settings actions persist through the same contracts and show equivalent loading, validation, success, and error states.
  - id: AC-7
    scenario: S-7
    text: Apple billing, gift card, support, invoice, referral, credits, and StoreKit/web-only states match web purchase intent without leaking private payment data.
  - id: AC-8
    scenario: S-8
    text: Apple sensitive, credential-mutating, and destructive account/settings actions are tested with reserved account slots and redact all secrets/artifacts.
  - id: AC-9
    scenario: S-9
    text: Apple admin/server/log visibility and read-only/risky admin actions match web role rules.
  - id: AC-10
    scenario: S-10
    text: Apple settings layouts remain usable and web-parity-aligned on iPhone and iPad, with macOS checked when the settings surface exists there.

contracts:
  ui_states:
    - Every web route in `baseSettingsViews` has a native route, native read-only equivalent, or explicit native unsupported/web-only state.
    - "App Store cards expose stable identifiers: `settings-app-store-page`, `settings-all-apps-page`, `app-store-card`, `app-card-<appId>`, `settings-skill-cards-scroll`, `settings-memory-cards-scroll`, `settings-focus-cards-scroll`, `skill-provider-item`, `settings-provider-logo`, `app-store-example-card`, `app-store-example-chat-card`, `focus-mode-details`, `focus-process-bullet`, `focus-instructions-toggle`, and `focus-instructions-text` where applicable."
    - "Sensitive controls expose identifiers matching web concepts: `auth-modal`, `password-input`, `tfa-input`, `auth-btn`, `tfa-backup-codes`, `code-item`, `confirm-checkbox`, `save-container`, `copy-button`, `primary-button`, `session-card`, `session-revoke-btn`, `api-key-row`, and `delete-confirmation` where applicable."
  api:
    - Apple settings requests use the same backend routes or documented native equivalents as web/CLI settings commands.
    - StoreKit purchase starts and completions may use native StoreKit, but post-purchase credits/account refresh uses the same account state contract.
    - App metadata loads from `/v1/apps/metadata?include_unavailable=true` or a generated static equivalent that remains byte/field-compatible with web metadata.
  data:
    - App metadata fields include app id/name/description/category/providers/last_updated/skills/focus_modes/settings_and_memories.
    - Skill metadata includes id, translated name/description, pricing, providers, icon, models, examples, and how-to-use translation keys.
    - Focus mode metadata includes id, translated name/description, process/system prompt data, examples, icon, and mention identity.
  privacy_security:
    - Reserved slots 14-20 follow `docs/contributing/guides/testing.md` and are the only allowed accounts for destructive or credential-rotating tests.
    - Apple test helpers must load reserved credentials from XCTest environment or ignored local secret config only.
    - Logs and screenshots must redact emails, recovery keys, backup codes, OTP seeds, API keys, invoices, payment IDs, exported file contents, and private URLs.
    - Account deletion finalization can run only against a dedicated reserved account whose reset/recreate workflow is documented; otherwise Apple tests cover deletion preview plus cancellation only.

