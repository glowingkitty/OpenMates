decisions:
  - id: D-1
    status: active
    decision: Migrate and expand the existing apple-settings-billing-parity umbrella instead of creating a duplicate spec.
    reason: The existing approved clarification already selected this umbrella, and active legacy specs must migrate to Schema V2 when materially resumed.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-2
    status: active
    decision: Prohibit web redirects and unsupported placeholders for every product-owned settings flow.
    reason: The user requires every web settings capability to be available directly in Apple.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-3
    status: active
    decision: Count a route as covered only when a reachable native implementation and required evidence exist.
    reason: The current native inventory incorrectly unions planned routes with implemented routes and permits false-green tests.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-4
    status: active
    decision: Implement in vertical slices but preserve one full-product completion gate.
    reason: The surface is too large for one safe code change, while the user does not accept partial route parity as completion.
    decided_at: "2026-07-11T00:00:00Z"
  - id: D-5
    status: active
    decision: Require functional and visual evidence on iPhone, iPad, and macOS.
    reason: Source inspection found no macOS settings test target and fixture-only iOS evidence cannot prove full Apple parity.
    decided_at: "2026-07-11T00:00:00Z"

