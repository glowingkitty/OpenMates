scenarios:
  - id: S-1
    title: Settings shell and menu track the current web source of truth
    given:
      - The same account state is opened on web and on an Apple device.
    when:
      - The user opens Settings, scrolls down, returns to the top, follows rows and deep links, navigates back, and closes/reopens Settings.
    then:
      - Row order, iconography, copy, visibility, profile/credits actions, footer, legal links, and responsive panel behavior match web.
      - The main header collapses over the web scroll range and expands when the user returns to the top.
      - Destination headers receive scroll state and reproduce web expanded/collapsed behavior.
      - Every visible row opens its complete native destination; there are no placeholders or browser fallbacks.

  - id: S-2
    title: Incognito can be activated and disabled from Apple Settings
    given:
      - An authenticated user has not completed the Incognito explainer on this Apple installation.
    when:
      - The user enables Incognito from Settings, completes the explainer, sends messages, and later disables Incognito.
    then:
      - First activation records the explainer state, closes Settings, starts a new incognito chat, and shows active state.
      - Incognito messages use request-scoped history, are not persisted or synced, and are excluded from client sync state.
      - Disabling clears all local incognito chats and returns future chats to normal persistence.
      - Repeated activation after the explainer is immediate and all UI uses localized OpenMates controls.

  - id: S-3
    title: Learning Mode is fully managed and enforced from Apple
    given:
      - Learning Mode is inactive for a guest or authenticated account.
    when:
      - The user opens Learning Mode, selects an age group, enables it, sends chats including incognito chats, and later attempts deactivation.
    then:
      - Guest state is session-only without a passcode; authenticated state is account-wide and passcode protected.
      - Wrong passcodes show remaining attempts and five failures produce the backend 24-hour lockout state.
      - Account policy applies to all authenticated Apple WebSocket chats, including incognito, and cannot be bypassed by local state.
      - Capped embeds show the localized shortened notice and disabled artifact classes have an explanatory state.
      - State remains consistent with web, CLI, npm SDK, and pip SDK controls.

  - id: S-4
    title: Route parity is truthful for all visibility variants
    given:
      - Web defines static and dynamic settings routes and access rules.
    when:
      - Deterministic route generation and native navigation tests run for guest, authenticated, admin, paired/restricted, self-hosted, payment-disabled, and demo states.
    then:
      - Every web route maps to a reachable native route or an explicitly approved OS-owned capability boundary.
      - Planned, fixture-only, stale, and unreachable routes fail coverage.
      - Route additions or access-rule changes on web fail the parity check until Apple is updated.

  - id: S-5
    title: Apps and every app detail route use live complete metadata
    given:
      - The current app catalog includes skills, providers, models, content types, focus modes, memories, reminders, embeds, and examples.
    when:
      - A user searches, filters, sorts, opens app cards, drills into each detail type, changes supported defaults, inserts mentions, and opens examples.
    then:
      - Apple reproduces web cards, sections, ordering, health/availability, empty/loading/error states, and all navigation.
      - Live metadata or a generated shared static contract supplies every required field; UI-test-only data is not production behavior.
      - Linked examples open the matching native public chat and synthetic examples open the matching native embed fullscreen.
      - Mention actions insert canonical syntax into the native composer and close/preserve Settings exactly as the responsive web behavior requires.

  - id: S-6
    title: Memories are encrypted, editable, synced, and usable from chat
    given:
      - A guest or authenticated user opens the Memories hub or an app memory category.
    when:
      - The user browses examples or creates, views, edits, deletes, syncs, and mentions a memory.
    then:
      - Guest and authenticated visibility matches web.
      - Authenticated entries use the existing encrypted local-first and WebSocket sync contracts; nonexistent REST routes are not used.
      - Loading, missing-key, empty, pending, conflict, error, and success states are explicit.
      - A memory mention inserts canonical syntax and can be used in a chat without leaking plaintext or keys.

  - id: S-7
    title: Mates list and details use canonical metadata and native chat actions
    given:
      - Canonical mate metadata contains all current mate identities and prompts.
    when:
      - A user opens Mates, selects a mate, expands its prompt/details, and starts a chat.
    then:
      - Apple shows the same identities, artwork, descriptions, process information, prompts, and availability as web.
      - Apple reads the canonical generated metadata rather than calling a nonexistent mates endpoint.
      - Start Chat or mention actions update the native composer/chat flow and never open a browser.

  - id: S-8
    title: Privacy settings match web behavior and retention contracts
    given:
      - A guest, authenticated user, paired session, self-hosted user, or admin opens Privacy.
    when:
      - The user manages connected accounts, personal-data protection, location privacy, chat/file auto-deletion, telemetry/debug preferences, and temporary debug sharing.
    then:
      - Rows, retention explanations, visibility, encryption notes, and admin notices match web.
      - Mutations use real backend/local contracts, persist after relaunch, and expose loading/error/rollback states.
      - Auto-deletion sends the backend period schema and debug sharing uses the debug-session lifecycle.
      - Privacy-safe diagnostics never expose credentials, private content, keys, URLs, paths, or identifiers.

  - id: S-9
    title: Billing, invoices, StoreKit, support, and usage are complete
    given:
      - Payment capability and account state vary across managed, self-hosted, payment-disabled, guest, authenticated, and StoreKit sandbox states.
    when:
      - The user views balance/usage, buys credits, manages auto-top-up, opens or downloads invoices, handles gift cards/referrals/support, restores purchases, and drills into usage.
    then:
      - Product-owned screens match web while the StoreKit sheet remains OS-owned.
      - Apple uses compatible balance, usage, auto-top-up, invoice, gift-card, referral, and support contracts.
      - Backend fulfillment failure keeps the transaction recoverable and does not report false success or irreversibly finish it.
      - Invoice documents can be viewed/downloaded through native OS file handling without opening a web page.
      - Usage overview/chats/apps/API tabs, privacy redaction, detail navigation, exports, and all states match web intent.

  - id: S-10
    title: Account and security settings are fully manageable in Apple
    given:
      - An authenticated reserved test account has configurable profile and security state.
    when:
      - The user manages profile, interests, email, password, 2FA, recovery key, passkeys, sessions, pairing, storage, chats, import/export, and account deletion.
    then:
      - Lists, forms, validation, re-authentication, success/error states, and persistence match web.
      - Passkey inventory, add, and remove flows are OpenMates-owned; only the authorization ceremony is OS-owned.
      - Sensitive and destructive tests fail closed without reserved credentials and redact all secrets and artifacts.

  - id: S-11
    title: Remaining product settings have complete native parity
    given:
      - The user can access AI, Projects, Notifications, Shared, Interface, Developers, Newsletter, Support, Report Issue, and related nested routes on web.
    when:
      - The user opens and changes every supported control from Apple.
    then:
      - Each route reproduces web layout, data, loading/empty/error/saving/success states, validation, persistence, and deep-link behavior.
      - No control is a no-op, local-only substitute for an account setting, stale endpoint call, or stock platform product UI.

  - id: S-12
    title: Admin, server, and logs obey role and deployment rules
    given:
      - Admin and non-admin accounts use managed and self-hosted deployments.
    when:
      - They open server, stats, update, budget, tests, gift-card administration, logs, and debug tools.
    then:
      - Visibility and authorization match web and backend enforcement.
      - Non-admin or restricted users cannot discover or invoke admin actions.
      - Risky actions require explicit OpenMates confirmation and reserved/synthetic test state.

  - id: S-13
    title: Settings remain visually and interactively usable on all Apple layouts
    given:
      - Representative deterministic states can be rendered on phone, tablet, and desktop window sizes in light and dark modes.
    when:
      - UI tests scroll, resize, rotate where applicable, use keyboard/pointer/touch, open overlays, and capture screenshots.
    then:
      - Required controls are rendered, visible, clickable, focusable, localized, and unclipped.
      - Browser-computed contracts and reviewed screenshots show equivalent hierarchy, dimensions, spacing, typography, colors, icons, radii, shadows, and responsive behavior.
      - macOS has a real test target and first-class remote build/test commands.

  - id: S-14
    title: Deterministic guards prevent settings parity from silently regressing
    given:
      - Web routes, test IDs, metadata fields, APIs, or visual contracts change.
    when:
      - Repository audits and CI run.
    then:
      - Missing native routes, identifiers, metadata, endpoint mismatches, forbidden controls, hardcoded strings, and stale fixtures fail with actionable output.
      - Visual/style checks begin as reviewed warnings and become required failures per promoted settings surface.
      - Passing evidence names the exact implementation commit and cannot satisfy changed contracts.

