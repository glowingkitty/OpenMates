risks:
  - The full route tree is too large for a single safe source change; tasks must remain independently buildable while the umbrella stays incomplete until all required evidence passes.
  - Existing fixture-backed tests can produce false confidence unless live/shared schema compatibility is separately enforced.
  - Sensitive, destructive, billing, and admin tests can damage account state unless reserved accounts fail closed and cleanup is explicit.
  - StoreKit transaction handling can lose fulfillment retries if backend failure is swallowed before finishing a transaction.
  - Memory and personal-data changes can expose plaintext or break cross-client decryption if settings views bypass existing crypto/service boundaries.
  - Visual contracts can become noisy if captured before animation/layout stabilizes; state-specific promotion and stable-box waits are required.
  - macOS automation and window resizing need new infrastructure before desktop parity can be claimed.

