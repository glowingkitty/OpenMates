apple_impact:
  affected_files:
    - apple/project.yml
    - apple/OpenMates/Sources/Features/Settings/**
    - apple/OpenMates/Sources/Shared/Components/**
    - apple/OpenMates/Sources/Core/I18n/AppStrings.swift
    - apple/OpenMates/Sources/Core/StoreKit/StoreManager.swift
    - apple/OpenMates/Sources/Features/Chat/Views/IncognitoMode.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Features/Embeds/**
    - apple/OpenMatesTests/Settings*.swift
    - apple/OpenMatesUITests/Settings*.swift
    - apple/OpenMatesMacUITests/Settings*.swift
  parity_expectations:
    - The rendered web app is the visual and behavioral source of truth; Svelte, CSS, stores, and APIs explain the implementation contract.
    - Every product-owned setting is implemented natively and remains usable without opening a browser or embedded web fallback.
    - Apple uses OpenMates primitives and generated tokens, not List, Form, stock navigation chrome, stock Toggle/Picker/Menu, SF Symbols, app-owned default sheets/alerts, or hardcoded user-visible strings.
    - Shared controls use matching web data-testid and Apple accessibilityIdentifier concepts wherever the product concept is identical.
    - iOS, iPadOS, and macOS share product behavior and visual hierarchy, with responsive layout differences derived from rendered web breakpoints and platform window size.
  verification:
    - python3 scripts/apple_remote.py status
    - Targeted iPhone and iPad unit/UI tests through scripts/apple_remote.py test-ios
    - macOS build, UI tests, resize tests, and screenshots through first-class redacted remote wrapper commands added by this spec.
    - Paired rendered-web and Apple screenshots for representative states before visual checks are promoted to required gates.
  intentional_native_differences:
    - StoreKit purchase sheets and App Store account prompts remain OS-owned, while product selection, status, reconciliation, and balance UI remain OpenMates-owned.
    - Passkey authorization prompts remain OS-owned, while passkey list, add/remove actions, state, errors, and confirmations remain OpenMates-owned.
    - Permission prompts and system file/photo/share/camera interfaces remain OS-owned.
    - Native keyboard, pointer, focus-ring, and accessibility mechanics may differ while product hierarchy, state, copy, and actions remain equivalent.

clarification:
  rounds:
    - question: May Apple settings use open-on-web fallbacks for settings that are not implemented natively?
      answer: No. Users must be able to do everything available in the web app from the Apple app, including passkey management and invoice viewing/downloading.
    - question: Must parity cover guest, authenticated, admin, paired/restricted, self-hosted, and payment-disabled visibility variants?
      answer: Yes. It should cover all visibility variants, while implementation starts by reaching settings-menu parity.
    - question: Should Incognito and Learning Mode be visual/navigation-only in the first settings slice?
      answer: No. Both must be fully functional.
    - question: May remaining settings rows open incomplete pages while menu parity is implemented first?
      answer: No. Every row must open a complete parity version of the web source of truth in logic and UI.
  vision_summary: >
    Apple Settings must be a complete native client for the same settings product
    as web. Implementation begins with the shell/menu and fully functional
    Incognito and Learning Mode, then proceeds in independently verified slices,
    but no route is counted as covered until its destination and actions have
    functional, visual, persistence, error-state, and cross-platform evidence.
  approved_by_user: true

