risks:
  - Full settings parity is large and should be implemented in independently verified slices to avoid long-lived broken Apple builds.
  - Destructive account tests can damage reserved accounts if slots are misconfigured; tests must fail closed when reserved credentials are absent.
  - App Store examples may expose private data if real user chats are used; only public example chats or synthetic fixtures are allowed.
  - StoreKit, passkey, notification, file picker, share sheet, and clipboard flows can vary by simulator state; tests must clean app containers and handle OS prompts explicitly.
  - Existing unrelated dirty worktree changes must not be included in settings parity commits.

open_questions:
  - Whether account deletion finalization should run against a newly provisioned throwaway Apple-specific account or remain preview/cancel-only in Apple tests.
  - Whether macOS settings parity should be fully implemented in this spec or tracked as a follow-up once iPhone/iPad parity is green.
