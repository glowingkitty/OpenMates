id: apple-settings-billing-parity
title: Apple Full Settings And Subsettings Web Spec Parity
status: implementing

goal: >
  Recreate the web app's full settings and subsettings coverage in Apple so
  users can browse and act on every settings surface with native OpenMates UI,
  including the Apps/App Store section, app detail pages, app skills, focus
  modes, examples that open on click, billing, security, account, privacy,
  notifications, shared links, developers, server/admin, support, newsletter,
  report issue, and interface preferences.

scope:
  in:
    - Full native parity for the settings root menu, authenticated and unauthenticated visibility, banners, back navigation, footer/legal links, loading/empty/error/success states, and no default platform product UI.
    - Full native parity for Apps/App Store browsing, categorized rows, Show all apps, search/filter/sort, all apps, app details, skill cards, memory cards, focus mode cards, active reminders, app embeds, provider icons, pricing, model lists, default app-skill model selection, and app-store examples.
    - Full native parity for opening skill and focus-mode examples from settings, including linked example chats and rendered embed examples where web uses preview fixtures.
    - Full native parity for all settings submenus and actions represented by `settingsRoutes.ts`, including account/security, privacy, memories, mates, billing/gift cards, notifications/reminders, shared/share/tip/fork, interface, developers, newsletter, support, report issue, server/admin, and logs.
    - Executable Apple UI tests for sensitive or destructive settings flows using the same reserved account policy as Playwright specs.
    - Remote Mac simulator verification for iPhone and iPad where layout, horizontal scrolling, or sidebar/split behavior differs.
  out:
    - Replacing backend settings, billing, authentication, app metadata, provider, reminder, or storage APIs.
    - Replacing App Store required StoreKit sheets with web Stripe UI; OS-owned purchase, passkey, file picker, share sheet, notification permission, and clipboard prompts may remain native.
    - Committing private account data, raw recovery keys, backup codes, OTP seeds, API keys, invoices, payment method details, private screenshots, private hostnames, or production identifiers.
    - Using production user accounts for destructive or credential-rotating tests.

