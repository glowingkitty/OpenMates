assumptions:
  - id: A-1
    text: The current web settings route registry and rendered deployed web app are the product source of truth.
    category: product
    required_before: implementation
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/components/settings/settingsRoutes.ts
        summary: Defines static settings routes; Settings.svelte adds dynamic routes and access behavior.
      - source: apple/AGENTS.md
        summary: Requires browser-rendered web output to be the final Apple visual source of truth.
  - id: A-2
    text: Existing authenticated WebSocket processing enforces account Learning Mode for Apple chat sends, including incognito, even without a client flag.
    category: backend
    required_before: task_execution
    status: confirmed
    evidence:
      - source: backend/core/api/app/routes/handlers/websocket_handlers/message_received_handler.py
        summary: Resolves authoritative Learning Mode account policy for authenticated messages.
  - id: A-3
    text: Existing Apple memories and mates pages can be repaired without retaining their currently referenced nonexistent REST endpoints.
    category: architecture
    required_before: task_execution
    status: confirmed
    evidence:
      - source: frontend/packages/ui/src/stores/appSettingsMemoriesStore.ts
        summary: Web memories use encrypted local-first and WebSocket synchronization contracts.
      - source: frontend/packages/ui/src/data/matesMetadata.ts
        summary: Web Mates uses generated static metadata rather than a /v1/mates endpoint.
  - id: A-4
    text: A remote Mac can provide sanitized iOS/iPadOS/macOS build, test, and screenshot evidence after changes are committed.
    category: infrastructure
    required_before: task_execution
    status: blocked
    evidence:
      - source: apple/AGENTS.md
        summary: Documents a previously validated redacted remote Mac workflow; current-session reachability must be checked before native verification.
      - source: remote verification on 2026-07-11
        summary: iOS and iPad UI tests and signing-disabled macOS builds work; macOS UI execution is blocked before test launch by unavailable signing.

contracts:
  api:
    - Apple settings use the same real backend routes, schemas, status semantics, and authentication boundaries as web, CLI, npm SDK, or pip SDK.
    - A native-equivalent endpoint may be introduced only when an OS-owned capability requires it and the approved product contract remains equivalent.
    - Learning Mode uses GET /v1/learning-mode, POST /v1/learning-mode/activate, and POST /v1/learning-mode/deactivate for authenticated state.
    - Billing and usage clients decode current backend response models; guessed or stale fields and nonexistent convenience routes are forbidden.
    - API failures are visible, logged through privacy-safe NativeDiagnostics, and never converted into false success or empty state.
  data:
    - A generated settings route manifest records web path, dynamic pattern, auth/role/deployment rules, Apple destination, implementation status, and verification IDs.
    - App, skill, focus, memory, content, provider, model, example, and mate metadata have one generated/shared source consumable by web and Apple.
    - Incognito state and chats remain device-session transient and excluded from persistence/sync.
    - Authenticated Learning Mode is account-wide backend state; guest Learning Mode is local session state.
    - Memories and personal data preserve existing encryption formats and key boundaries; no settings view owns cryptographic logic.
    - UI-test fixtures may produce deterministic states but must conform to production schemas and cannot satisfy live-contract criteria alone.
  ui_states:
    - expanded, collapsing, collapsed, and re-expanded settings headers
    - guest, authenticated, admin, paired/restricted, self-hosted, payment-disabled, and demo menus
    - loading, refreshing, empty, populated, unavailable, disabled, saving, success, validation error, API error, offline, and retry
    - first-run explainer, active, inactive, wrong passcode, attempts remaining, and locked Learning Mode/Incognito states
    - compact phone, regular tablet, narrow desktop, regular desktop, fullscreen, light, dark, reduced motion, keyboard, pointer, and touch
  privacy_security:
    - No plaintext passcodes, recovery keys, backup codes, OTP seeds, API keys, auth tokens, encryption keys, private message/memory content, invoices, payment identifiers, private URLs, or local paths appear in logs, screenshots, fixtures, or committed evidence.
    - Sensitive tests use reserved accounts and fail closed when credentials are absent.
    - Account deletion finalization uses a dedicated resettable account; otherwise only preview and cancellation are automated.
    - Web/source contract capture uses synthetic or sanitized state and strips volatile/private values.
  visual:
    - Rendered web DOM and computed styles are captured for promoted representative settings states.
    - Missing structure, identifiers, controls, and forbidden native chrome fail immediately.
    - Style differences remain warnings until screenshot review promotes the specific value/state to a failure gate.
    - Every Swift visual settings file and corresponding Svelte product file carries reciprocal source mapping when touched.

