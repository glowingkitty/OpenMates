implementation_plan:
  spec_path: docs/specs/apple-settings-billing-parity/spec.yml
  existing_patterns:
    - OMSettingsPage, OMSettingsRow, OMToggle, OMDropdown, OMSegmentedControl, and custom OpenMates overlays.
    - Rendered web contract extraction helpers in apple-ui-contract-helpers.ts and validation in scripts/apple_ui_contracts.py.
    - Reserved Apple account loading in RealAccountUITestSupport.swift.
    - Existing Learning Mode backend policy and web/CLI controls.
    - Existing encrypted web settings/memories local-first and WebSocket synchronization.
  architecture: >
    Generate a versioned settings manifest from the web route/access and metadata
    sources, then drive native navigation, audit coverage, and tests from that
    manifest. Rebuild settings as focused native feature modules sharing
    OpenMates primitives and typed API/data services. Add rendered-web contracts
    for promoted settings states, iOS/iPad fixture plus reserved-account tests,
    and a real macOS test target. Keep cryptography and OS-owned capability UI at
    existing boundaries.
  data_flow:
    - Build-time scripts derive route, access, app, mate, and UI-contract inputs from canonical web/backend sources.
    - Native Settings reads typed account/deployment capabilities and renders the same allowed destinations as web.
    - Each destination service loads local/static state first where the web contract does, then calls compatible API/WebSocket/storage boundaries.
    - Mutations expose progress, success, error, rollback, and refreshed account state.
    - UI tests use schema-compatible fixtures for deterministic rendering and reserved accounts for real persistence/security flows.
    - Web and Apple artifacts are compared and promoted state by state.
  affected_files:
    - path: scripts/apple_settings_parity_audit.py
      reason: Deterministic route, API, metadata, source, and identifier parity guard.
    - path: frontend/apps/web_app/tests/apple-settings-ui-contracts.spec.ts
      reason: Rendered web settings contract capture.
    - path: apple/OpenMates/Sources/Features/Settings/**
      reason: Native shell, destinations, typed services, and complete behavior.
    - path: apple/OpenMates/Sources/Shared/Components/OMDesignPrimitives.swift
      reason: Reusable web-equivalent settings primitives only where missing.
    - path: apple/OpenMatesTests/Settings*.swift
      reason: Typed model/service/policy/route contract tests.
    - path: apple/OpenMatesUITests/Settings*.swift
      reason: iPhone/iPad functional and visual parity tests.
    - path: apple/OpenMatesMacUITests/Settings*.swift
      reason: macOS functional, resize, keyboard/pointer, and visual parity tests.
    - path: apple/project.yml
      reason: Real macOS test target and generated project consistency.
    - path: scripts/apple_remote.py
      reason: First-class sanitized macOS build/test commands.
  verification_strategy:
    - Validate this spec and run red deterministic/backend/CLI/SDK tests before feature code.
    - Deploy rendered web contract changes before Playwright green evidence.
    - Verify shared behavior in CLI, npm SDK, pip SDK, backend, web, then Apple order.
    - Verify each native slice on iPhone, then iPad, then macOS before marking its task done.
    - Run full route/source audits and reviewed visual matrices before completion.
  verification_order:
    - Deterministic route/source audit preflight
    - OpenMates CLI
    - npm SDK
    - pip SDK
    - Backend contract tests
    - Web Playwright source-contract tests after deploy
    - iPhone unit and UI tests
    - iPad layout and UI tests
    - macOS build, resize, UI, and visual tests

