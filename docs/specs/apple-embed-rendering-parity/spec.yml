implementation_plan:
  existing_patterns:
    - docs/specs/apple-ui-contracts/spec.yml
    - docs/specs/apple-example-chat-visual-parity/spec.yml
    - frontend/apps/web_app/tests/apple-ui-contracts.spec.ts
    - frontend/apps/web_app/tests/helpers/apple-ui-contract-helpers.ts
    - scripts/apple_ui_contracts.py
    - apple/OpenMates/Sources/DevPreview/DevEmbedPreviewGalleryView.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
  architecture: >
    Extend the existing web-rendered Apple UI contract pipeline to an `embeds`
    surface. The web side enumerates generated registry keys and the app showcase
    page, captures rendered contracts and screenshots from deployed dev, then
    promotes a sanitized fixture. The Apple side consumes that fixture through a
    DEBUG-only embed preview route and UI tests that export screenshots for
    agent review. A deterministic audit keeps web and native coverage in sync.
  data_flow:
    - Playwright opens `/dev/preview/embeds/<app>` on deployed dev and captures web artifacts for each app section, display surface, and fixture variant.
    - The contract validator sanitizes and optionally promotes the artifact into Apple UI test fixtures.
    - Apple DEBUG launch arguments open the native embed preview gallery for a selected app/registry/display/variant or all required entries.
    - XCUITests capture native screenshots and an artifact manifest on iPhone and iPad simulators.
    - The pairing/audit command joins web/native artifacts and produces an agent-review manifest.
    - Agent review records material findings and accepted native differences; verification gates on unresolved high/critical findings.
  affected_files:
    - path: frontend/apps/web_app/tests/apple-embed-rendering-contracts.spec.ts
      reason: Capture web-rendered embed contract artifacts from deployed dev.
    - path: frontend/apps/web_app/tests/helpers/apple-ui-contract-helpers.ts
      reason: Reuse or extend contract capture helpers for embed preview/fullscreen surfaces.
    - path: scripts/apple_ui_contracts.py
      reason: Validate, promote, pair, and audit embed contracts and native coverage.
    - path: backend/tests/test_apple_ui_contracts.py
      reason: Unit-test deterministic embed coverage aliases and renderer-only classifications.
    - path: apple/OpenMatesUITests/Fixtures/WebUIContracts/embeds.json
      reason: Store promoted sanitized web source-of-truth fixture for native tests.
    - path: apple/OpenMates/Sources/DevPreview/DevEmbedPreviewGalleryView.swift
      reason: Render every required native embed fixture/display state in DEBUG builds.
    - path: apple/OpenMates/Sources/DevPreview/DevEmbedPreviewFixtures.swift
      reason: Add synthetic fixtures and coverage classification for all required embed types.
    - path: apple/OpenMates/Sources/Core/Models/EmbedModels.swift
      reason: Add missing native embed type cases only when needed for covered web registry keys.
    - path: apple/OpenMates/Sources/Features/Embeds/Views/EmbedContentView.swift
      reason: Add or classify renderer dispatch for missing registry keys.
    - path: apple/OpenMates/Sources/Features/Embeds/Renderers/*.swift
      reason: Fix visual parity issues found by artifact review.
    - path: apple/OpenMatesUITests/EmbedRenderingParityUITests.swift
      reason: Native screenshot/export verification for embed parity.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-embed-rendering-parity/spec.yml
    - python3 scripts/run_tests.py --spec apple-embed-rendering-contracts.spec.ts
    - python3 scripts/apple_ui_contracts.py validate apple/OpenMatesUITests/Fixtures/WebUIContracts/embeds.json --surface embeds
    - python3 scripts/apple_ui_contracts.py audit --surface embeds
    - Remote Mac `OpenMates_iOS` simulator build and `EmbedRenderingParityUITests` on iPhone/iPad after deploy or commit sync.
    - Agent visual review of paired screenshots and style/layout summaries.

