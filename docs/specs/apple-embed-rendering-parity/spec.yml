  apple:
    - "`EmbedType` currently lists 48 native embed cases, including direct embeds, composite search embeds, and selected app-skill-use embeds."
    - "`DevEmbedPreviewApp` currently covers only code, web, images, travel, and events."
    - "`EmbedContentView` falls back to `GenericEmbedRenderer` for native types not explicitly dispatched."
  known_gaps:
    - Apple debug gallery does not cover docs, videos, news, maps, math, music, reminder, sheets, audio, health, mail, pdf, shopping, electronics, home, or nutrition yet.
    - Apple enum/render dispatch lacks several web registry keys, including code repositories, code applications, electronics, music, social media, weather, video generation, and full PDF read/search variants.
    - Web has preview fixture files for more components than the Apple debug gallery currently mirrors.
    - Inline link and quote block replicas must be paired with Apple parity coverage instead of remaining web-showcase-only states.

scenarios:
  - id: S-1
    title: Web captures every registered embed surface as source of truth
    given:
      - The deployed dev web app exposes `/dev/preview/embeds/<app>` and the generated embed registry.
      - Each registered preview/fullscreen component has a fixture or a documented no-fixture exception.
    when:
      - The web embed contract Playwright spec runs for configured iPhone and iPad-equivalent viewports.
    then:
      - Each supported app section and embed registry key has screenshot artifacts for preview, grouping where applicable, and fullscreen states.
      - Each artifact includes app id, registry key, preview path, fullscreen path, variant, display surface, viewport, color scheme, visible text, computed styles, layout bounds, and screenshot path.
      - Missing components, missing fixtures, selector failures, unresolved load errors, clipped core content, or malformed artifacts fail the Playwright run.

  - id: S-2
    title: Apple renders equivalent embed preview and fullscreen states
    given:
      - A committed or generated web embed contract fixture exists.
      - The Apple app has DEBUG-only synthetic fixtures for each required web registry key or a documented native exception.
    when:
      - The Apple embed rendering parity UI test launches the debug embed surface on iPhone and iPad simulators.
    then:
      - Apple renders compact preview, large preview or grouped preview where applicable, and fullscreen for each required embed fixture.
      - Native screenshots include product UI only, excluding debug counters, local hostnames, private paths, and non-product probes.
      - The UI test fails when a required fixture cannot render, expected visible text is absent, a required accessibility identifier is missing, or a forbidden default native product control appears.

  - id: S-3
    title: Coverage audit prevents registry drift
    given:
      - Web registry data and Apple embed enum/fixture/renderer dispatch data can be inspected deterministically.
    when:
      - The embed parity audit runs.
    then:
      - Every web preview/fullscreen registry key is classified as native-rendered, native-placeholder-with-reason, web-only-with-reason, or intentionally unsupported.
      - Every `/dev/preview/embeds/[app]` section maps to an Apple debug fixture or documented exception.
      - Adding a new web embed type, preview component, fullscreen component, or app showcase section without native classification fails with a clear missing-coverage error.

  - id: S-4
    title: Artifact validation pairs web and Apple evidence
    given:
      - Web contract artifacts and Apple simulator screenshot exports exist for the same source commit.
    when:
      - The contract validation and pairing command runs.
    then:
      - Every required app id, registry key, display surface, variant, viewport class, and color scheme has matching web/native evidence.
      - Generated manifests are indexed by source commit and run id, and contain no private emails, hostnames, IP addresses, credentials, local Mac paths, or private chat identifiers.
      - The output manifest is ready for agent visual review.

  - id: S-5
    title: Agent reviews material visual differences
    given:
      - A paired artifact manifest contains web and Apple screenshots plus style/layout summaries.
    when:
      - The agent visual review workflow runs.
    then:
      - The report lists material differences such as missing previews, missing fullscreen content, wrong card chrome, wrong grouping, wrong typography, wrong color, wrong spacing, clipped media, wrong iconography, raw JSON leakage, and platform chrome leakage.
      - Each finding includes severity, app id, registry key, display surface, device class, screenshot references, and likely source file area.
      - Platform-only differences are classified separately and do not block unless they obscure or materially change product UI.

  - id: S-6
    title: Review status gates parity completion without pixel thresholds
    given:
      - An agent visual review report exists for the current paired artifacts.
    when:
      - The parity verification command runs before completion.
    then:
      - Verification fails if any required artifact is missing, any required embed state is unreviewed, or any high/critical material product drift remains unresolved or explicitly accepted.
      - Verification does not fail solely because screenshots differ at the pixel level without an agent-classified material issue.
      - Accepted native differences remain recorded with reasons for future sessions.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web Playwright captures screenshot and computed-style/layout contracts for every registered embed preview, group where applicable, and fullscreen state at required viewports.
  - id: AC-2
    scenario: S-2
    text: Apple UI tests render equivalent native embed preview/group/fullscreen states on iPhone and iPad simulators with product chrome only and export screenshots.
  - id: AC-3
    scenario: S-3
    text: A deterministic coverage audit fails when web embed registry/showcase entries are not classified and covered by Apple fixtures or documented exceptions.
  - id: AC-4
    scenario: S-4
    text: A validation/pairing command proves every required web/native artifact exists, is sanitized, and is indexed for review.
  - id: AC-5
    scenario: S-5
    text: Agent visual review reports material product UI differences between web and Apple embed screenshots with severity, references, and likely source areas.
  - id: AC-6
    scenario: S-6
    text: Completion is gated by artifact completeness and reviewed/unresolved material issues, not by exact pixel matching.

contracts:
  api:
    - No production API changes are required.
    - Apple DEBUG/test-only launch arguments may select embed preview surface, app id, registry key, display surface, variant, and visual snapshot mode.
    - Test-only launch arguments must not be available as user-facing production navigation.
  data:
    - Web contract artifact schema includes `schemaVersion`, `surface: embeds`, `generatedAt`, `sourceCommit`, `viewport`, `colorScheme`, `apps`, `registryKeys`, `displaySurfaces`, `variants`, `elements`, `computedStyle`, `layoutBounds`, `screenshotPath`, and `redactions`.
    - Apple artifact manifest includes `schemaVersion`, `surface: embeds`, `sourceCommit`, `simulator`, `viewportClass`, `colorScheme`, `appId`, `registryKey`, `displaySurface`, `variant`, `screenshotPath`, `xcresultPath`, and `testIdentifier`.
    - Coverage classification includes `registryKey`, `previewComponent`, `fullscreenComponent`, `webShowcasePath`, `appleEmbedType`, `appleFixture`, `appleRenderer`, `status`, and optional `exceptionReason`.
    - Pairing manifest includes one web/native artifact pair per app id, registry key, display surface, variant, viewport class, and color scheme.
    - Agent review report includes `reviewedAt`, `reviewer`, `sourceCommit`, `pairs`, `findings`, `acceptedDifferences`, and `unresolvedBlockingFindings`.
  ui_states:
    - Inline link visual replicas from the web showcase with native parity coverage.
    - Quote block visual replicas from the web showcase with native parity coverage.
    - Compact embed preview cards.
    - Large/grouped preview rows and carousel/group states where production supports grouping.
    - Fullscreen embed shell, header actions, navigation, status/info bars, and scrollable detail content.
    - Processing, finished, error, and empty states when corresponding `.preview.ts` variants exist.
    - iPhone compact and iPad regular layout behavior.
  privacy_security:
    - Only synthetic public fixture content may be committed.
    - Runtime screenshots from private accounts must not be promoted into committed fixtures.
    - Artifacts must redact local paths, hostnames, IP addresses, private emails, raw test credentials, provider tokens, private chat IDs, and private user content.
    - Agent review prompts must not include secrets or private remote connection details.

