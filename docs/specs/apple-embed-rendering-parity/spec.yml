risks:
  - The web registry, web showcase page, and Apple enum may use different keys for the same conceptual embed; the audit must classify aliases explicitly instead of assuming raw string equality.
  - Some embeds use provider/media surfaces that may be unstable in simulator screenshots; v1 should allow simulator-safe placeholders only when documented and visibly equivalent around product chrome.
  - A single all-embeds visual test can be slow and flaky; implementation may need app-key sharding while preserving one complete coverage manifest.
  - Existing Apple generic/fallback renderers may hide missing type-specific parity; the audit must distinguish intentional generic rendering from accidental fallback.
  - Agent-reviewed artifacts are only useful when screenshots are complete, named deterministically, and paired with enough style/layout data to localize drift.

