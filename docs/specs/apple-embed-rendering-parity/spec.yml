    - apple/OpenMatesUITests/EmbedRenderingParityUITests.swift
    - apple/OpenMatesUITests/Fixtures/WebUIContracts/embeds.json
  parity_expectations:
    - Web artifacts are captured from the rendered browser DOM and computed CSS on `app.dev.openmates.org`, not inferred from Svelte source alone.
    - Apple preview/fullscreen surfaces must use OpenMates primitives, generated tokens, and custom fullscreen chrome rather than default platform product UI.
    - Apple fixtures must cover every registered web embed preview/fullscreen key unless the spec documents a native exception with a reason.
    - Agent review is the v1 authority for material screenshot differences; deterministic checks enforce coverage, schema, sanitization, and unresolved finding status.
  verification:
    - "`python3 scripts/run_tests.py --spec apple-embed-rendering-contracts.spec.ts` after deployment to capture web artifacts from `app.dev.openmates.org`."
    - "`python3 scripts/apple_ui_contracts.py validate apple/OpenMatesUITests/Fixtures/WebUIContracts/embeds.json --surface embeds`."
    - "`python3 scripts/apple_ui_contracts.py audit --surface embeds`."
    - Remote Mac `xcodebuild test` for `OpenMatesUITests/EmbedRenderingParityUITests` on iPhone 17 and iPad Pro 13-inch (M5).
    - Agent visual review over paired web/native screenshots and generated style/layout summaries.
  intentional_native_differences:
    - Native status bars, safe areas, scrolling physics, video/PDF/map/web platform surfaces, and text rasterization may differ when classified separately and not obscuring product UI.
    - Pixel-perfect screenshot matching is explicitly warning-only/out of scope for v1.
    - Provider-owned or OS-owned media surfaces may render as simulator-safe placeholders when real media playback, maps, PDFs, or web previews are not reliable in CI.

clarification:
  rounds:
    - question: Should v1 require exact screenshot pixel comparison, or start with rendered-style/layout metrics plus agent-reviewed screenshots before promoting pixel thresholds?
      answer: >
        Inherited from the current Apple visual parity workflow: screenshots are
        supposed to be interpreted by an agent to see visual differences between
        the web app and app version. Do not make exact pixel comparison the v1
        gate.
    - question: Should social media and weather embeds be added to the web showcase, and should inline link and quote block replicas be included in native parity coverage?
      answer: >
        Yes. Social media and weather apps also need web showcase coverage. Inline
        link and quote block replicas also need parity coverage. The
        implementation order does not matter, but the work is not complete until
        all embeds are at parity with the web app versions.
  vision_summary: >
    Apple embed previews and fullscreen views should visually match the web app
    at equivalent device sizes and states. The useful first slice is a complete
    coverage and artifact pipeline for all registered embed types, with web
    rendered contracts as source of truth, native simulator screenshots as
    comparison evidence, and agent-reviewed material differences as the visual
    completion gate.
  approved_by_user: true

