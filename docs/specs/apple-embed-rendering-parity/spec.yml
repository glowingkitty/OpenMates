id: apple-embed-rendering-parity
title: Apple Embed Preview And Fullscreen Rendering Parity
status: implementing

goal: >
  Create a repeatable parity workflow that proves Apple embed previews and
  fullscreen views match the browser-rendered web app for every registered embed
  type. The web app remains the rendered source of truth; v1 captures web style,
  layout, text, variant, and screenshot artifacts, renders equivalent Apple
  DEBUG/test surfaces on iPhone and iPad simulators, and gates completion through
  artifact completeness plus agent-reviewed material visual differences rather
  than exact pixel hashes.

scope:
  in:
    - Enumerating all web embed preview/fullscreen registry entries from `embedRegistry.generated.ts` and `/dev/preview/embeds/[app]`.
    - Capturing browser-rendered preview, group, and fullscreen contracts for every supported web embed showcase section and fixture variant.
    - Expanding Apple DEBUG/test embed preview surfaces so every web-supported app/embed type has synthetic native fixture coverage or a documented native exception.
    - Rendering Apple preview cards, grouped previews, and fullscreen containers on iPhone and iPad simulators with product chrome only.
    - Pairing web and Apple screenshots/contracts by app id, embed registry key, display surface, fixture variant, device class, color scheme, and run id.
    - Agent visual review of paired artifacts for material drift in structure, spacing, typography, colors, clipping, grouping, fullscreen chrome, and missing content.
    - Deterministic gates for missing artifacts, missing registry coverage, malformed contracts, forbidden native product controls, unresolved high/critical material drift, and unsanitized private values.
  out:
    - Exact pixel-diff failure gates for all embed types in v1.
    - Replacing semantic/agent review with screenshot hashes.
    - Rewriting backend embed schemas or provider outputs unless a minimal synthetic fixture seam is required for Apple tests.
    - Real provider API calls, private account screenshots, production secrets, or live user content in committed fixtures.
    - Physical-device-only verification for camera, APNs, microphone, or OS-owned picker behavior.
    - Physical-device-only behavior that cannot be verified in simulator.

