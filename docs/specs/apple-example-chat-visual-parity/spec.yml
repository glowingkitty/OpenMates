risks:
  - Long all-example-chat screenshot runs may be slow; the implementation should support chunking while preserving an all-chat verification mode.
  - Screenshots can be noisy across OS versions and color schemes; v1 mitigates this by using agent semantic review rather than pixel gates.
  - Apple may not yet have native renderers for every web embed type used by example chats; those should become explicit findings rather than hidden failures.
  - Debug preview routes must not leak into production or user navigation.

open_questions:
  - Should the first implementation run all 46+ example chats by default, or chunk by category in CI while keeping a full local/nightly command?
  - Which color scheme should be canonical for v1: light, dark, or both paired explicitly?
  - Should the agent review report be committed for baseline examples, or stored only as test artifacts until findings stabilize?
