implementation_plan:
  existing_patterns:
    - frontend/apps/web_app/tests/apple-ui-contracts.spec.ts
    - frontend/apps/web_app/tests/helpers/apple-ui-contract-helpers.ts
    - scripts/apple_ui_contracts.py
    - apple/OpenMates/Sources/DevPreview/DevChatOpeningPreviewView.swift
    - apple/OpenMatesUITests/ChatFlowParityUITests.swift
  architecture: >
    Extend the existing web-rendered contract pipeline with an `example-chats`
    surface. Playwright discovers all registered example chats and writes web
    screenshots plus normalized style/layout contracts. Apple uses a DEBUG-only
    visual snapshot route to render the same chat data on simulators, exports
    XCUITest screenshots, and a pairing/review command prepares artifacts for an
    agent to inspect. Deterministic scripts fail missing or unsafe artifacts and
    unresolved material review findings, but do not enforce exact screenshot
    pixels in v1.
  data_flow:
    - Export or derive a public example-chat manifest from the existing example-chat store.
    - Playwright opens each web example chat at required viewport/color-scheme combinations.
    - Playwright captures screenshots and computed style/layout contracts into `test-results/apple-ui-contracts/example-chats/`.
    - A promotion/validation path creates `apple/OpenMatesUITests/Fixtures/WebUIContracts/example-chats.json` when artifacts are intentionally accepted.
    - Apple XCUITest launches visual snapshot mode for each required chat on iPhone and iPad simulators.
    - XCUITest result attachments are exported and paired with web artifacts.
    - An agent reviews paired screenshots and writes a visual findings report.
    - Verification fails only on missing artifacts, unsafe data, unreviewed required pairs, or unresolved material product drift.
  affected_files:
    - path: frontend/apps/web_app/tests/apple-example-chat-visual-contracts.spec.ts
      reason: Capture web source-of-truth screenshots and computed contracts for every example chat.
    - path: frontend/apps/web_app/tests/helpers/apple-ui-contract-helpers.ts
      reason: Reuse/extend capture helpers for full chat transcript/header/embed surfaces.
    - path: frontend/packages/ui/src/demo_chats/exampleChatStore.ts
      reason: Provide a deterministic public manifest export if existing imports are not test-friendly.
    - path: scripts/apple_ui_contracts.py
      reason: Validate, pair, promote, and review example-chat artifacts.
    - path: apple/OpenMates/Sources/DevPreview/DevExampleChatPreviewView.swift
      reason: Render named example chats in DEBUG visual snapshot mode.
    - path: apple/OpenMates/Sources/DevPreview/DevPreviewLaunchConfiguration.swift
      reason: Route UI-test launch arguments to the example-chat preview.
    - path: apple/OpenMatesUITests/ExampleChatVisualParityUITests.swift
      reason: Capture native screenshots for required example chats and device classes.
    - path: apple/OpenMates.xcodeproj/project.pbxproj
      reason: Add new UI test source if required by the project file.
    - path: apple/OpenMatesUITests/Fixtures/WebUIContracts/example-chats.json
      reason: Store promoted web contract fixture for native tests/audits.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/apple-example-chat-visual-parity/spec.yml
    - python3 scripts/run_tests.py --spec apple-example-chat-visual-contracts.spec.ts
    - python3 scripts/apple_ui_contracts.py validate apple/OpenMatesUITests/Fixtures/WebUIContracts/example-chats.json --surface example-chats
    - Remote Mac iPhone `xcodebuild test` for `ExampleChatVisualParityUITests`.
    - Remote Mac iPad `xcodebuild test` for `ExampleChatVisualParityUITests`.
    - python3 scripts/apple_ui_contracts.py review-visual --surface example-chats --manifest test-results/apple-ui-contracts/example-chats/pairs.json
    - python3 scripts/spec_verify.py docs/specs/apple-example-chat-visual-parity/spec.yml

