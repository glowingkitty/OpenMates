    type: playwright
    file: frontend/apps/web_app/tests/apple-example-chat-visual-contracts.spec.ts
    command: python3 scripts/run_tests.py --spec apple-example-chat-visual-contracts.spec.ts
    target: app.dev.openmates.org
    covers:
      - AC-1
      - AC-6
    assertions:
      - all registered example chats are discovered from a manifest/store export
      - each example chat route renders at required viewport(s)
      - each chat writes a sanitized screenshot and JSON contract entry
      - contract entries include visible message/embed summaries and computed style/layout data
    red_phase:
      required: true
      expected: fail
      evidence:
        status: ""
        run_id: ""
        timestamp: ""
    green_phase:
      required: true
      expected: pass_after_deploy
