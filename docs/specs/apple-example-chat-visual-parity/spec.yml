apple_impact:
  affected_files:
    - apple/OpenMates.xcodeproj/project.pbxproj
    - apple/OpenMates/Sources/DevPreview/DevExampleChatPreviewView.swift
    - apple/OpenMates/Sources/DevPreview/DevPreviewLaunchConfiguration.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatHeaderView.swift
    - apple/OpenMatesUITests/ExampleChatVisualParityUITests.swift
    - apple/OpenMatesUITests/Fixtures/WebUIContracts/example-chats.json
  parity_expectations:
    - Web screenshots and computed styles are captured from the rendered browser state, not inferred from Svelte source alone.
    - Apple screenshots render the same synthetic example-chat content with product chrome only; debug counters/probes are not included in visual artifacts.
    - Agent review is the v1 authority for visible screenshot differences; deterministic scripts only enforce artifact completeness, schema validity, and review workflow status.
  verification:
    - "`python3 scripts/run_tests.py --spec apple-example-chat-visual-contracts.spec.ts` after deployment to capture web artifacts from `app.dev.openmates.org`."
    - "`python3 scripts/apple_ui_contracts.py validate apple/OpenMatesUITests/Fixtures/WebUIContracts/example-chats.json --surface example-chats`."
    - Remote Mac `xcodebuild test` for `OpenMatesUITests/ExampleChatVisualParityUITests` on iPhone 17 and iPad Pro 13-inch (M5).
    - Agent visual review over paired web/native screenshots and generated style/layout summaries.
  intentional_native_differences:
    - Native status bars, safe areas, text rasterization, and system-owned controls may differ; the agent report must classify these separately from product UI drift.
    - Pixel-perfect screenshot matching is explicitly warning-only/out of scope for v1.
    - Dark/light color scheme differences are only acceptable when the paired web artifact uses the same color scheme or the report marks the mismatch as an environment setup issue.

clarification:
  rounds:
    - question: For the broader example-chat visual contract spec, should v1 require exact screenshot pixel comparison, or start with rendered-style/layout metrics plus human-reviewed screenshots before promoting pixel thresholds?
      answer: >
        The screenshots are supposed to be interpreted by an agent to see visual
        differences between the web app and app version. Do not make exact pixel
        comparison the v1 gate.
  vision_summary: >
    The user wants a broad visual parity workflow for example chats, but the
    screenshots should be reviewed semantically by an agent rather than compared
    as exact pixels. The web app remains the rendered source of truth, Apple must
    render matching product states, and the pipeline should produce reliable
    artifact pairs plus clear visual-difference reports.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Web captures every example chat as the visual source of truth
    given:
      - The registered example-chat manifest contains all public example chats.
      - The dev web app can render an example chat route without private credentials.
    when:
      - The web visual-contract Playwright spec runs for the configured mobile and tablet/desktop-equivalent viewports.
    then:
      - Each example chat has a screenshot artifact at a deterministic scroll position such as latest-turn/bottom.
      - Each example chat has a JSON contract containing slug/id, viewport, color scheme, visible messages, visible embeds, computed styles, layout bounds, and screenshot path.
      - Missing routes, missing screenshots, clipped content, or selector failures fail the Playwright run.

  - id: S-2
    title: Apple renders the same example chats without debug chrome
    given:
      - A committed or generated example-chat web contract fixture exists.
      - The Apple app has a DEBUG-only test route that can load a named example chat from synthetic bundled data.
    when:
      - The Apple example-chat visual parity UI test runs on iPhone and iPad simulators.
    then:
      - The native app renders product chat chrome only, excluding debug titles, counters, probes, or private account data.
      - Each configured example chat produces a screenshot attachment paired with the same slug/id and viewport category as the web artifact.
      - The UI test fails when the chat cannot render, the latest expected content is missing, a required accessibility identifier is absent, or forbidden default native product controls appear.

  - id: S-3
    title: Artifact validation pairs web and Apple evidence
    given:
      - Web contract artifacts and Apple screenshot exports exist for a test run.
    when:
      - The contract validation and pairing command runs.
    then:
      - Every registered example chat has matching web/native artifacts for required device classes.
      - Artifacts are named and indexed by chat slug/id, viewport, color scheme, scroll anchor, and run id.
      - Private values, local Mac paths, hostnames, IP addresses, private emails, and volatile IDs are rejected or redacted.
      - The output contains a manifest suitable for agent visual review.

  - id: S-4
    title: Agent reviews screenshots for visible product differences
    given:
      - A paired artifact manifest contains web and Apple screenshots plus computed-style/layout summaries.
    when:
      - An agent runs the visual review workflow.
    then:
      - The report lists material visual differences such as missing messages, wrong bubble alignment, wrong avatar size, clipped embeds, wrong colors, typography drift, spacing drift, missing tails, product chrome leakage, and status/safe-area issues.
      - Each finding includes severity, affected chat slug/id, device class, screenshot references, and likely source area.
      - Platform-only differences such as status bar placement and text rasterization are classified separately and do not block unless they obscure product UI.

  - id: S-5
    title: Review status gates parity completion without pixel thresholds
    given:
      - An agent visual review report exists for the current artifacts.
    when:
      - The parity verification command runs before deploy or completion.
    then:
      - The command fails if any required artifact is missing, any required chat is unreviewed, or any critical/high material product drift remains unresolved or explicitly accepted.
      - The command does not fail solely because screenshots differ at the pixel level without an agent-classified material issue.
      - Accepted native differences are recorded with a reason and remain visible in future reports.

  - id: S-6
    title: New example chats are automatically included
    given:
      - A developer adds a new example chat to the registered example-chat store.
    when:
      - The web contract and Apple visual parity workflows run.
    then:
      - The new chat is discovered automatically from the manifest or fails validation if it cannot be rendered.
      - The developer does not need to manually edit a hardcoded test list unless the chat needs a documented native exception.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web Playwright captures screenshot and computed-style/layout contracts for every registered example chat at required viewports.
  - id: AC-2
    scenario: S-2
    text: Apple UI tests render the matching example chats on iPhone and iPad simulators with product chrome only and export screenshot attachments.
  - id: AC-3
    scenario: S-3
    text: A validation/pairing command proves every required web/native artifact exists, is sanitized, and is indexed for review.
  - id: AC-4
    scenario: S-4
    text: Agent visual review reports material product UI differences between web and Apple screenshots with severity, references, and likely source areas.
  - id: AC-5
    scenario: S-5
    text: Completion is gated by artifact completeness and reviewed/unresolved material issues, not by exact pixel matching.
  - id: AC-6
    scenario: S-6
    text: Adding a new registered example chat automatically includes it in the visual parity workflow or fails with a clear missing-artifact error.

contracts:
  api:
    - No production API changes are required.
    - Apple DEBUG/test-only launch arguments may select an example chat slug/id and visual snapshot mode.
    - Test-only launch arguments must not be available as user-facing production navigation.
  data:
    - Example-chat manifest fields include `chat_id`, `slug`, `title`, `category`, `icon`, `messageCount`, and optional embed/type summary.
    - Web contract artifact schema includes `schemaVersion`, `surface: example-chats`, `generatedAt`, `sourceCommit`, `viewport`, `colorScheme`, `chats`, `states`, `elements`, `computedStyle`, `layoutBounds`, `screenshotPath`, and `redactions`.
    - Apple artifact manifest includes `schemaVersion`, `surface: example-chats`, `sourceCommit`, `simulator`, `viewportClass`, `colorScheme`, `chat_id`, `slug`, `screenshotPath`, `xcresultPath`, and `testIdentifier`.
    - Pairing manifest includes one web/native artifact pair per `chat_id`, viewport class, color scheme, and scroll anchor.
    - Agent review report includes `reviewedAt`, `reviewer`, `sourceCommit`, `pairs`, `findings`, `acceptedDifferences`, and `unresolvedBlockingFindings`.
  ui_states:
    - Example chat latest-turn/bottom state.
    - Chat header/banner state when present.
    - Visible assistant and user message bubbles.
    - Visible embed previews and generated content cards.
    - Follow-up/composer row for example chats.
    - iPhone compact/stacked message layout.
    - iPad regular side-by-side message layout.
  privacy_security:
    - Only public hardcoded example-chat content may be committed in fixtures.
    - Runtime screenshots from private accounts must not be promoted into committed fixtures.
    - Artifacts must redact local paths, hostnames, IP addresses, private emails, raw test credentials, and generated private chat IDs.
    - Agent review prompts must not include secrets or private remote connection details.

tests:
