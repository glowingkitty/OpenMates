id: apple-example-chat-visual-parity
title: Apple Example Chat Visual Parity Review Pipeline
status: approved

goal: >
  Create a repeatable visual parity pipeline for every public example chat so
  the web app remains the rendered source of truth and Apple screenshots can be
  reviewed by an agent for visible differences. The first version captures
  browser-rendered styles, layout bounds, and screenshots for each example chat,
  renders the matching Apple example-chat state on iPhone and iPad simulators,
  pairs the artifacts, and produces an agent-readable visual-diff report instead
  of failing on exact screenshot pixels.

scope:
  in:
    - Enumerating all registered hardcoded example chats from `exampleChatStore.ts` or an equivalent exported manifest.
    - Playwright capture of rendered web screenshots, layout bounds, computed styles, visible text, and embed surface metadata for each example chat.
    - Apple debug/test rendering of the same example-chat content without private accounts, secrets, or network-only dependencies.
    - iPhone and iPad simulator screenshot attachment/export for each example-chat visual state.
    - Artifact pairing by stable chat slug/id, viewport, color scheme, and scroll position.
    - Agent-reviewed visual comparison that reports differences in layout, spacing, typography, colors, missing content, clipped content, embed rendering, and platform chrome.
    - Deterministic failure gates only for missing artifacts, malformed contracts, missing required identifiers, forbidden native product controls, and unreviewed critical visual reports.
  out:
    - Exact pixel-diff failure gates for all example chats in v1.
    - Replacing human/agent visual judgment with screenshot hashes.
    - Rewriting the example-chat data model unless a minimal manifest/export seam is required.
    - Real physical-device-only verification for camera, microphone, APNs, or OS-owned pickers.
    - Production API or backend changes.
    - Committing private user screenshots, credentials, hostnames, IP addresses, device names, or raw logs.

