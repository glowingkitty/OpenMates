    - python3 scripts/apple_remote.py build-ios
  intentional_native_differences:
    - Apple may use platform secure text entry for the passcode while preserving the same product states and localized copy.

clarification:
  rounds:
    - question: Should Learning Mode be enforced for all chats on the account once active, including existing chats and CLI/API usage, or only for new chats created after activation?
      answer: All chats. All platforms for the same account.
  vision_summary: >
    Learning Mode is an account-wide, backend-enforced policy. When active it
    applies to every current and future chat across CLI, web, Apple, and API
    usage for the same account. Normal mate prompts are used when the mode is
    off; Learning Mode prompt variants and a global teaching-first prompt are
    used when the mode is on, while generated embeds are capped and full
    application artifacts are disabled. Anonymous users may opt into Learning
    Mode for the current browser session only by selecting an age group; that
    guest state is sent with anonymous chat requests and cannot disable an
    authenticated account policy.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Educator activates account-wide Learning Mode from settings
    given:
      - Alice is authenticated in the web app.
      - Learning Mode is inactive for Alice's account.
    when:
      - Alice opens Settings and clicks the Learning Mode quick setting.
      - Settings opens a dedicated Learning Mode subpage.
      - Alice selects learner age group 13-15 from a settings dropdown.
      - Alice enters a custom passcode in the settings form.
      - Alice confirms activation from the subpage.
    then:
      - The backend stores an active account-wide Learning Mode policy with age group 13-15 and a hashed passcode.
      - The plaintext passcode is not stored or logged.
      - Activation never uses native browser prompt, alert, or confirm overlays.
      - Settings shows Learning Mode as active on reload and on other clients for Alice's account.
      - Every chat request for Alice's account is processed with Learning Mode active, including existing chats.

  - id: S-2
    title: Deactivation requires passcode and blocks after repeated failures
    given:
      - Alice's account has Learning Mode active.
      - The passcode is known only to the educator.
    when:
      - A learner tries to deactivate Learning Mode with the wrong passcode 5 times.
    then:
      - The backend keeps Learning Mode active.
      - The backend records 5 failed deactivation attempts.
      - The backend blocks further deactivation attempts for 24 hours.
      - Web, CLI, and Apple display a localized locked state with the remaining time.
      - A correct passcode cannot deactivate the mode until the block expires.

  - id: S-3
    title: CLI sends are governed by backend Learning Mode policy
    given:
      - Alice's account has Learning Mode active with age group 16-18.
      - Alice uses OpenMates CLI to send a message in an existing chat.
    when:
      - The CLI sends the chat message over the WebSocket path.
    then:
      - The request payload includes Learning Mode context when known locally.
      - The backend resolves the effective account policy and does not rely only on client-provided flags.
      - Main processing uses the global Learning Mode prompt and the selected mate's Learning Mode prompt variant.
      - The response is teaching-first and uses the user's normal output language.

  - id: S-4
    title: Normal mate prompt is replaced by Learning Mode mate prompt while active
    given:
      - Alice's account has Learning Mode active.
      - The preprocessor selects Sophia, the software development mate.
    when:
      - Main processing builds the system prompt.
    then:
      - Sophia's normal `default_system_prompt` is not used as the active mate prompt.
      - Sophia's `learning_mode_system_prompt` is used instead.
      - The global Learning Mode prompt is also appended.
      - Every mate has an explicit Learning Mode prompt variant validated by tests.

  - id: S-5
    title: Generated code embed is shortened in Learning Mode
    given:
      - Alice's account has Learning Mode active.
      - The assistant emits an 80-line code block that would normally become a code embed.
    when:
      - The stream consumer creates the code embed.
    then:
      - The stored code embed contains only the first configured Learning Mode code lines.
      - The embed decoded content includes `learning_mode_shortened`, `original_line_count`, and `shown_line_count` metadata.
      - The UI renders the code content followed by a localized Learning Mode shortened notice outside the code block.
      - No language-specific code comment is added.

  - id: S-6
    title: Generated sheets and documents are capped in Learning Mode
    given:
      - Alice's account has Learning Mode active.
      - The assistant emits a large markdown table and a long document block.
    when:
      - The stream consumer creates sheet and document embeds.
    then:
      - The sheet stores only the configured maximum rows and columns.
      - The document stores only the configured maximum lines or blocks.
      - Both embeds include Learning Mode shortened metadata.
      - Web and Apple show the same localized shortened notice below the visible content.

  - id: S-7
    title: Generated application artifacts are disabled in Learning Mode
    given:
      - Alice's account has Learning Mode active.
      - The assistant emits a combined generated application artifact or code fences that would normally infer a runnable app.
    when:
      - The stream consumer handles the generated artifact.
    then:
      - OpenMates does not create a code-application parent embed.
      - OpenMates does not auto-start or offer a runnable application preview for that response.
      - At most capped illustrative code snippets are stored as code embeds.
      - The assistant message explains that Learning Mode can walk through building the project step by step.

  - id: S-8
    title: Generated media cannot be used to bypass Learning Mode
    given:
      - Alice's account has Learning Mode active.
      - Alice asks an image or video generation app to create a visual answer key or screenshot of a complete solution.
    when:
      - Main processing builds app/tool instructions.
    then:
      - The system prompt instructs the model not to use images, videos, documents, sheets, or code as a bypass for complete answers.
      - Media generation remains allowed for conceptual diagrams, flashcards, metaphors, and short illustrative learning aids.
      - The first slice relies on prompt/tool policy and embed limits, not OCR of generated images.

  - id: S-9
    title: Guest enables Learning Mode for anonymous chat requests
    given:
      - Eve is not authenticated and can use anonymous free chat.
      - Learning Mode is inactive in the current browser session.
    when:
      - Eve opens Settings and clicks the Learning quick setting.
      - Eve selects learner age group 10-12 from a settings dropdown.
      - Eve enables Learning Mode without entering a passcode.
      - Eve sends an anonymous chat message.
    then:
      - The web app stores `enabled=true` and `age_group=10_12` in sessionStorage only.
      - The anonymous chat request includes Learning Mode context for this request.
      - The backend validates the age group and applies the same Learning Mode prompt, blocked-skill, and artifact-cap policy as authenticated Learning Mode.
      - Clearing sessionStorage or starting a new browser session removes guest Learning Mode.
      - No passcode, failed-attempt, lockout, or account-wide persistence state is created for guests.
      - If the request is authenticated, server-side account Learning Mode state takes precedence and client flags cannot disable it.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: An authenticated user can activate account-wide Learning Mode with a custom passcode and age group from settings.
  - id: AC-2
    scenario: S-2
    text: Deactivation requires the passcode and is blocked for 24 hours after 5 failed attempts.
  - id: AC-3
    scenario: S-3
    text: Backend request processing resolves and enforces the effective account Learning Mode policy for all platforms and chats.
  - id: AC-4
    scenario: S-4
    text: Every mate has a Learning Mode prompt variant that replaces the normal mate prompt while Learning Mode is active.
  - id: AC-5
    scenario: S-5
    text: Generated code embeds are capped in Learning Mode and include localized non-code shortened UI notices.
  - id: AC-6
    scenario: S-6
    text: Generated sheet and document embeds are capped in Learning Mode and include shortened metadata and UI notices.
  - id: AC-7
    scenario: S-7
    text: Runnable generated application artifacts and previews are disabled in Learning Mode.
  - id: AC-8
    scenario: S-8
    text: Learning Mode prompt and tool policy prevent generated media from being used as a complete-answer bypass.
  - id: AC-9
    scenario: S-9
    text: Unauthenticated users can opt into request-scoped anonymous Learning Mode with an age group stored in sessionStorage and no passcode.

contracts:
  api:
    - route: GET /v1/learning-mode
      request: none
      response: "{ enabled: boolean, age_group?: string, deactivation_blocked_until?: number, failed_attempts: number }"
      errors:
        - 401 when unauthenticated
    - route: POST /v1/learning-mode/activate
      request: "{ passcode: string, age_group: 'under_10'|'10_12'|'13_15'|'16_18'|'adult' }"
      response: "{ enabled: true, age_group: string, failed_attempts: 0 }"
      errors:
        - 400 for invalid age group or weak/missing passcode
        - 401 when unauthenticated
    - route: POST /v1/learning-mode/deactivate
      request: "{ passcode: string }"
      response: "{ enabled: false, failed_attempts: 0 }"
      errors:
        - 401 when unauthenticated
        - 403 when passcode is wrong or deactivation is blocked
    - route: POST /v1/anonymous/chat/stream
      request: "{ anonymous_id: string, plaintext_message: string, learning_mode?: { enabled: boolean, age_group?: string } }"
      response: existing anonymous chat response or event stream
      errors:
        - 422 for invalid Learning Mode age group when enabled
  data:
    - Store account-wide Learning Mode policy on the user profile or a user-owned settings record available to all clients.
    - Store only a passcode hash and metadata, never plaintext passcodes.
    - Store `age_group`, `enabled`, `failed_attempts`, `deactivation_blocked_until`, and timestamps.
    - Include Learning Mode shortened metadata in generated embed decoded content.
    - Guest Learning Mode state is stored in browser sessionStorage only and sent per anonymous request.
  ui_states:
    - inactive
    - activation form
    - active
    - deactivation passcode form
    - wrong passcode with attempts remaining
    - deactivation blocked with remaining time
    - shortened embed notice
    - guest active with age group only
    - guest inactive
  privacy_security:
    - Clients must not be able to disable Learning Mode by clearing local storage.
    - Clients must not be able to bypass Learning Mode by omitting request flags.
    - Guest request flags may enable anonymous Learning Mode but must not disable authenticated account Learning Mode.
    - Do not log plaintext passcodes or generated private learner answers beyond existing encrypted chat behavior.
    - GitHub/public docs must not contain private educator or student data.
  prompts:
    - Normal mate prompts are used when Learning Mode is off.
    - Learning Mode mate prompts are used when Learning Mode is on.
    - The global Learning Mode prompt is appended in addition to the mate prompt variant.
    - Output language enforcement remains active after Learning Mode prompt injection.

learning_mode_limits:
  age_groups:
    - under_10
    - 10_12
    - 13_15
    - 16_18
    - adult
  embeds:
    code:
      max_lines: 40
    sheet:
      max_rows: 12
      max_cols: 8
    document:
      max_lines: 80
    mail:
      max_lines: 30
    mermaid:
      max_lines: 40
    plot:
      max_lines: 20
    application:
      allowed: false
    remotion_video:
      allowed: false

