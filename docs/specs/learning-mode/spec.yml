implementation_plan:
  existing_patterns:
    - Incognito quick setting and explainer flow in `CurrentSettingsPage.svelte` and `incognitoModeStore.ts`.
    - User preference injection in `message_received_handler.py`.
    - Mate prompt loading in `mate_utils.py` from frontmatter markdown.
    - System prompt assembly in `main_processor.py`.
    - Generated embed conversion in `stream_consumer.py`.
    - CLI WebSocket payload tests in `frontend/packages/openmates-cli/tests/client.test.ts`.
    - Apple settings UI parity tests under `apple/OpenMatesUITests/`.
  architecture: >
    Store Learning Mode as a backend account policy. Clients expose activation and
    deactivation flows and may pass local context, but the WebSocket handler and
    API path resolve the effective server policy for every request. Main
    processing swaps the selected mate prompt to its Learning Mode variant and
    appends a global Learning Mode instruction. Stream-time embed creation caps
    durable generated artifacts and records metadata for localized UI notices.
  data_flow:
    - User activates Learning Mode in settings with passcode and age group.
    - Backend stores hashed policy metadata on the account.
    - CLI/web/Apple fetch or receive the active policy for UI state.
    - Every chat send reaches the backend, which resolves effective policy server-side.
    - Main processor receives Learning Mode context and builds teaching-first prompts.
    - Stream consumer caps generated embeds and disables application artifacts while active.
    - Clients render shortened metadata as localized UI outside generated content.
  affected_files:
    - path: backend/apps/ai/mates/*.md
      reason: Add explicit Learning Mode prompt variants for each mate.
    - path: backend/apps/ai/utils/mate_utils.py
      reason: Load and validate Learning Mode mate prompts.
    - path: backend/apps/ai/skills/ask_skill.py
      reason: Extend request schemas with Learning Mode context.
    - path: backend/apps/ai/processing/main_processor.py
      reason: Inject Learning Mode prompts and media/tool no-bypass instructions.
    - path: backend/apps/ai/tasks/stream_consumer.py
      reason: Enforce generated embed caps and disable application artifacts.
    - path: backend/core/api/app/routes/learning_mode.py
      reason: Add account policy API endpoints.
    - path: backend/core/api/app/routes/handlers/websocket_handlers/message_received_handler.py
      reason: Resolve effective Learning Mode policy server-side for chat sends.
    - path: frontend/packages/openmates-cli/src/client.ts
      reason: Add CLI Learning Mode context to chat sends.
    - path: frontend/packages/openmates-cli/src/cli.ts
      reason: Add Learning Mode status/enable/disable commands.
    - path: frontend/packages/ui/src/stores/learningModeStore.ts
      reason: Store authenticated backend policy state and guest sessionStorage Learning Mode state.
    - path: frontend/packages/ui/src/components/settings/**
      reason: Add settings activation/deactivation UI.
    - path: backend/core/api/app/routes/anonymous.py
      reason: Accept and validate anonymous request-scoped Learning Mode context.
    - path: frontend/packages/ui/src/components/embeds/**
      reason: Render shortened Learning Mode notices.
    - path: frontend/packages/ui/src/i18n/sources/**
      reason: Add localized settings and embed notice strings.
    - path: apple/OpenMates/Sources/**
      reason: Add native settings parity, request propagation, and shortened notices.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/learning-mode/spec.yml
    - python3 scripts/tests.py run --suite openmates-cli
    - python3 -m pytest backend/tests/test_learning_mode_policy.py backend/tests/test_learning_mode_prompts_and_embeds.py
    - python3 scripts/tests.py run --spec learning-mode.spec.ts after deploy is Ready
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios
    - python3 scripts/spec_verify.py docs/specs/learning-mode/spec.yml
  verification_order:
    - CLI/backend contract first
    - Web Playwright second after deploy to dev
    - Apple remote build third

