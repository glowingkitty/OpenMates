id: learning-mode
title: Account-Wide Learning Mode
status: approved

goal: >
  Let educators or guardians lock an OpenMates account into a teaching-first
  mode across CLI, web, Apple, API, and all chats so learners receive guided
  explanations, short illustrative examples, and capped generated artifacts
  instead of complete answers, long code files, or runnable projects.

scope:
  in:
    - Account-wide Learning Mode policy that applies to every chat and platform for the authenticated account while active.
    - Settings activation flow that asks for a custom passcode and learner age group.
    - Passcode-protected deactivation with a 24-hour deactivation block after 5 failed attempts.
    - Backend-enforced request processing policy independent of client-provided flags.
    - Global Learning Mode system prompt modifier with age-group adaptation.
    - Per-mate Learning Mode prompt variants derived from each existing mate prompt.
    - Generated embed caps for code, sheets, documents, mail, diagrams, plots, and generated application artifacts.
    - Localized UI notice after shortened embed content: Shortened since Learning Mode is active.
    - CLI support and CLI/backend tests as the first verification target.
    - Web app settings controls, request propagation, and embed-shortening UI.
    - Apple app settings parity, request propagation, and embed-shortening UI.
    - Guest Learning Mode opt-in for anonymous chat requests using sessionStorage state and age group only.
  out:
    - Classroom roster management, educator dashboards, or remote assignment of policies to other accounts.
    - Exact birth date collection or precise age tracking.
    - Regex-based intent detection of restricted wording in user prompts.
    - OCR or computer-vision inspection of generated images in the first slice.
    - Offline-only Learning Mode policy that can be trusted without backend verification.
    - Migration of existing incognito behavior or focus modes.
    - Passcode, lockout, or cross-session persistence for unauthenticated guest Learning Mode.

