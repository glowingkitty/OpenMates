  parity_expectations:
    - Apple shows an account-wide Learning Mode settings row near Incognito with the same activation, age-group, deactivation, failed-attempt, and lockout states as web.
    - Apple includes effective Learning Mode context on chat sends when the backend policy reports active mode.
    - Apple renders Learning Mode shortened notices below capped code/document/sheet-like content without using native chrome that conflicts with the web design system.
  verification:
