      - pip SDK uses the key to list and load chats with metadata, messages, and embeds.
      - npm and pip SDK calls exercise app skills, settings, billing overview, and invoices.
      - The created API key is revoked at the end when the API returns a key id.
    red_phase:
      required: false
      expected: not_required_for_live_smoke
    green_phase:
      required: false
      expected: pass_when_run_with_live_account_and_approved_sdk_device
      evidence:
