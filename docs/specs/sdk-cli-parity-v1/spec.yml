id: sdk-cli-parity-v1
title: SDK CLI Parity V1
status: verified

goal: >
  Make the npm and Python SDKs first-class programmatic clients with parity to
  every OpenMates CLI product/account capability that is safe and meaningful in
  code, while keeping SDK auth API-key-only and preserving zero-knowledge
  encryption, per-key scopes, credit budgets, and device approval.

scope:
  in:
    - API-key-only SDK access for npm and pip, with approved API-key devices treated as the same trust level as CLI paired sessions.
    - npm and pip SDK parity coverage for CLI product/account capabilities, with live API-key support for safe audited surfaces and explicit typed unavailable errors for remaining surfaces that need backend/privacy contracts. Newsletter management remains CLI-only.
    - Generated native app-skill methods replacing the public generic app-skill run path in SDK examples and typed APIs.
    - Generated SDK app-skill method descriptions, input types, and output types sourced from app metadata and skill schemas.
    - Chat APIs that can set a specific focus mode before sending a message.
    - Backend API-key scopes/routes expanded until every SDK-accessible CLI parity operation works with API keys.
    - Coverage matrix and tests proving each CLI parity surface has npm and pip SDK coverage.
    - Agent and testing instructions updated so shared product behavior is verified through CLI, npm SDK, pip SDK, web, and Apple when applicable.
  out:
    - CLI TUI behavior; terminal rendering remains CLI-exclusive.
    - Self-hosted server commands such as install, start, stop, restart, status, logs, update, reset, make-admin, and uninstall; server operations remain CLI-exclusive for this spec.
    - E2E auth-account provisioning commands; local test-account artifact tooling remains CLI-exclusive.
    - Browser-only flows that are intentionally outside CLI, including passkey management, password changes, existing 2FA/recovery-key rotation, active session management, card checkout, and SDK device approval.
    - PyPI initial publish and auto-publish workflow implementation; that is handled after parity is implemented and tested.

