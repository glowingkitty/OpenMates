implementation_plan:
  existing_patterns:
    - frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
    - frontend/packages/ui/src/components/enter_message/services/uploadService.ts
    - apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
  architecture: >
    Add a shared web helper that detects supported text/code files, redacts a
    replacement File before upload, and records PII mappings using the same
    mapping format as message text. Port the full regex detector and mapping
    payload through Apple's message send pipeline, then apply the same redacted
    upload rule to Apple text/code file URLs before upload.
  data_flow:
    - User chooses a file.
    - Client checks whether the filename/MIME is supported UTF-8 text/code.
    - Client decodes text and runs local PII detection using current privacy settings.
    - Client creates a redacted File/Data when matches exist.
    - Client uploads only redacted bytes and stores encrypted owner-only mappings.
  affected_files:
    - path: frontend/packages/ui/src/components/enter_message/services/uploadService.ts
      reason: Redact supported text/code files before upload.
    - path: frontend/packages/ui/src/components/enter_message/services/piiDetectionService.ts
      reason: Reuse detection and mappings for file upload redaction.
    - path: frontend/apps/web_app/tests/file-attachment-code-flow.spec.ts
      reason: Verify web text-file redaction first.
    - path: apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
      reason: Port web regex coverage and placeholders.
    - path: apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
      reason: Carry encrypted PII mappings and redact supported file uploads.
    - path: apple/OpenMates/Sources/Core/Models/ChatModels.swift
      reason: Add PII mapping fields to native message model.
    - path: apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
      reason: Persist encrypted PII mapping metadata offline.
  verification_strategy:
    - python3 scripts/spec_validate.py docs/specs/text-file-pii-redaction-parity/spec.yml
    - python3 scripts/run_tests.py --spec file-attachment-code-flow.spec.ts
    - python3 scripts/run_tests.py --spec pii-detection-flow.spec.ts
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
  verification_order:
    - Web implementation and Playwright red/green evidence first.
    - Apple implementation and remote build second.

