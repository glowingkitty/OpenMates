    - frontend/apps/web_app/tests/file-attachment-code-flow.spec.ts
    - apple/OpenMatesUITests/ChatManagementSharingParityUITests.swift

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
    - apple/OpenMates/Sources/Features/Chat/ViewModels/ChatViewModel.swift
    - apple/OpenMates/Sources/Core/Models/ChatModels.swift
    - apple/OpenMates/Sources/Core/Persistence/OfflineStore.swift
    - apple/OpenMatesUITests/ChatManagementSharingParityUITests.swift
  parity_expectations:
    - Apple and web use the same deterministic regex categories and placeholder semantics for message text.
    - Apple stores encrypted PII mappings on messages so owner devices can restore placeholders in assistant replies like web.
    - Apple redacts supported text/code file uploads before upload, after the web implementation is verified.
  verification:
    - python3 scripts/apple_remote.py status
    - python3 scripts/apple_remote.py build-ios --simulator "iPhone 17"
  intentional_native_differences:
    - File picker UI remains OS-owned.
    - Local AI model detection remains a follow-up and is not required for this parity slice.

clarification:
  rounds:
    - question: Should text-file PII scanning be included or left to follow-up?
      answer: Include text-file scanning, and implement/test it in web before Apple.
    - question: Should uploads redact by default or ask before upload?
      answer: Redact by default.
    - question: Which uploaded file types are in scope first?
      answer: Common text/code files only.
  vision_summary: >
    Text/code file uploads should get the same privacy protection as typed
    messages: detect PII locally, replace it with placeholders before upload,
    and preserve encrypted mappings for owner-only reveal/restore. Web is the
    source of truth and must be implemented and tested before Apple parity.
  approved_by_user: true

scenarios:
  - id: S-1
    title: Web redacts PII from supported text file before upload
    given:
      - Alice is signed in on web.
      - Alice selects a UTF-8 markdown file containing an email, phone number, and API key.
    when:
      - The file is attached to a chat.
    then:
      - The browser detects PII before calling the upload endpoint.
      - The uploaded file content contains placeholders instead of original values.
      - Owner-only encrypted mappings are available for reveal/restore behavior.
  - id: S-2
    title: Web leaves unsupported or binary files unchanged
    given:
      - Alice selects a PDF or image file.
    when:
      - The file is attached to a chat.
    then:
      - The existing upload flow is preserved.
      - No lossy text rewrite is attempted on unsupported formats.
  - id: S-3
    title: Apple message text PII matches web semantics
    given:
      - Alice types message text containing web-supported PII categories.
    when:
      - Alice sends the message from Apple.
    then:
      - Apple replaces the same deterministic regex categories with compatible placeholders.
      - Apple encrypts PII mappings with the chat key and syncs them with the message.
      - The server and AI providers receive placeholders, not originals.
  - id: S-4
    title: Apple redacts supported text file before upload
    given:
      - Alice selects a UTF-8 text/code file containing PII in the Apple file picker.
    when:
      - The file is attached to a chat.
    then:
      - Apple redacts the file content before upload.
      - Apple preserves owner-only mappings for reveal/restore parity where the embed renderer supports it.
      - Unsupported file types keep the existing upload path.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: Web text/code uploads are locally scanned and redacted before upload, with encrypted mappings preserved for owner-only restore.
  - id: AC-2
    scenario: S-2
    text: Unsupported or binary files are not decoded or rewritten by the text-file PII path.
  - id: AC-3
    scenario: S-3
    text: Apple message text PII detection, placeholders, exclusions, encrypted mappings, and sync metadata match web semantics.
  - id: AC-4
    scenario: S-4
    text: Apple text/code uploads are locally scanned and redacted before upload after web behavior is verified.

contracts:
  data:
    - Message-level PII mappings contain placeholder, original, and type.
    - Mappings are encrypted with the chat key before they are sent or persisted remotely.
    - Redacted uploaded text/code files replace original values with placeholders before upload.
  ui_states:
    - Existing PII warning banners remain visible for typed message text.
    - Upload progress and pending embed previews continue to work for redacted text files.
    - Unsupported files keep the existing upload UX.
  privacy_security:
    - Original PII from supported text/code uploads must not be sent to the upload service.
    - Detection runs locally on the client.
    - Local AI model support is explicitly out of scope for this spec.

