    independently_deployable: false

risks:
  - Text-file redaction changes uploaded bytes and hashes, so deduplication and previews must tolerate redacted content.
  - PII mappings for file embeds may need renderer support beyond the first slice.
  - Apple encrypted mapping parity may require matching existing WebSocket metadata contracts exactly.

open_questions:
  - Whether owner reveal of original uploaded text/code file content should be exposed immediately in all renderers or staged after mappings are stored.
