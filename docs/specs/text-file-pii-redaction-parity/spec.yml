    - frontend/packages/ui/src/components/enter_message/handlers/sendHandlers.ts
    - frontend/packages/ui/src/components/enter_message/services/codeEmbedService.ts
    - frontend/packages/ui/src/stores/embedPIIStore.ts
    - frontend/packages/ui/src/services/sendersChatMessages.ts
    - apple/OpenMates/Sources/Features/Chat/Views/PIIDetectionView.swift
    - apple/OpenMates/Sources/Features/Chat/Views/ChatView.swift
