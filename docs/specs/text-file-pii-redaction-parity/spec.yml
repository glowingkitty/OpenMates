id: text-file-pii-redaction-parity
title: Text File PII Redaction Parity
status: approved

goal: >
  Ensure web and Apple redact PII from supported text/code file uploads before
  content leaves the device, while preserving owner-only encrypted PII mappings
  and keeping message text PII behavior consistent across clients.

scope:
  in:
    - Web app text/code file upload PII scanning before upload.
    - Apple app full regex PII parity with the web detector for message input.
    - Apple app encrypted PII mappings for sent messages, matching web storage and sync semantics.
    - Apple app text/code file upload PII scanning before upload after web behavior is implemented and tested.
    - Common UTF-8 text/code files such as .txt, .md, .csv, .json, .xml, .html, .log, source files, and config files.
  out:
    - PDF, DOCX, XLSX, binary, image, audio, and presentation text extraction.
    - Local AI PII model integration; tracked separately in GitHub issue #464.
    - Server-side parsing of original personal data from uploaded files.
    - Uploading original text/code file contents when PII is detected unless a future explicit user opt-in is specified.

