implementation_plan:
  existing_patterns:
    - backend/apps/nutrition/skills/search_recipes.py contains grouped app-skill request orchestration and output sanitization patterns.
    - backend/tests/test_skill_preview_metadata.py protects nutrition parent-preview metadata behavior.
    - docs/specs/example-chat-public-quality/spec.yml already requires recipe examples to include image URLs and renderable instructions.
  architecture: >
    Introduce a pure Edamam provider for Nutrition recipe search, keep skill
    orchestration in `SearchRecipesSkill`, and remove REWE-specific fetch and
    Firecrawl-detail logic. The provider performs one search request with an
    explicit field list, filters instructionless recipes, follows pagination
    only if needed, and normalizes recipes into the existing embed-friendly
    result shape. Secrets are retrieved server-side through the existing
    secrets manager pattern.
  data_flow:
    - LLM calls Nutrition `search_recipes` with `query` and optional filters.
    - Skill validates request and clamps `max_results`.
    - Provider builds Edamam search URL with explicit fields and server-side credentials.
    - Provider collects raw hits, filters missing instructions, deduplicates obvious duplicate URLs/URIs, and follows pagination only if needed.
    - Provider normalizes instructions, ingredients, nutrition, image URLs, labels, and attribution into result dictionaries.
    - Skill sanitizes long external text fields and returns grouped results with provider `Edamam`.
    - CLI quality checks should validate real model/tool behavior before using a fresh transcript as the example-chat source.
  affected_files:
    - path: backend/apps/nutrition/providers/edamam_recipe_provider.py
      reason: New Edamam provider wrapper and normalizer.
    - path: backend/apps/nutrition/providers/rewe_recipe_provider.py
      reason: Remove or obsolete unreliable REWE recipe provider.
    - path: backend/apps/nutrition/skills/search_recipes.py
      reason: Switch request schema and provider orchestration from REWE filters to Edamam query.
    - path: backend/apps/nutrition/app.yml
      reason: Update tool schema, provider metadata, pricing/provider claims, and examples.
    - path: frontend/packages/ui/src/i18n/sources/app_skills/nutrition.yml
      reason: Update user-facing skill description and examples.
    - path: frontend/packages/ui/src/i18n/sources/settings/app_store_examples.yml
      reason: Remove REWE-specific Nutrition preview claims if present.
    - path: frontend/packages/ui/src/components/embeds/nutrition/NutritionSearchEmbedPreview.examples.ts
      reason: Replace REWE app-store recipe fixtures with Edamam-shaped sample data.
    - path: frontend/packages/ui/src/demo_chats/data/example_chats/chickpea-spinach-protein-dinners.ts
      reason: Remove stale REWE Nutrition recipe embeds from the public example chat.
