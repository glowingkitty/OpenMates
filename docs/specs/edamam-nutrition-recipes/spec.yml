risks:
  - Edamam `instructionLines` is present in the OpenAPI Recipe schema and live responses but is omitted from the documented `field` enum; provider tests must catch regressions if the field becomes unavailable.
  - Edamam signed image URLs may expire, so persistent public examples may need stable proxied or fixture images rather than raw signed URLs.
  - Some Edamam instruction lines are low quality or combine many steps; normalization must improve readability without inventing content.
  - Edamam rate limits still reject bursts, so implementation must avoid parallel per-result calls and unnecessary pagination.
  - Removing REWE may break German filter-tag prompts unless prompt/tool descriptions clearly teach free-text query and Edamam filters.

open_questions:
  - Should persistent example chats use proxied/stabilized recipe images rather than Edamam signed image URLs if the raw URLs expire quickly?
  - Should duplicate recipes from syndicated sources be deduplicated by source URL, Edamam URI, normalized title, or a combination?
