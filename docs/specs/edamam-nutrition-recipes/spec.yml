# docs/specs/edamam-nutrition-recipes/spec.yml
#
# Executable product contract for replacing the Nutrition recipe provider.
# The provider change is intentionally specified before code because it changes
# third-party API usage, app-skill inputs, public docs, CLI verification, and
# example-chat output quality gates.

id: edamam-nutrition-recipes
title: Edamam Nutrition Recipe Search
status: verified

goal: >
  Replace the unreliable REWE-backed Nutrition recipe search with Edamam Recipe
  Search so users get English-friendly recipe results with ingredients,
  images, source links, nutrition metadata, and step-by-step instructions for
  every returned recipe whenever enough instruction-bearing results exist.

scope:
  in:
    - Replace `nutrition/search_recipes` provider implementation with Edamam Recipe Search v2.
    - Change the skill input contract to require a free-text `query` field.
    - Support optional structured Edamam filters for diet, health, cuisine, meal, dish, time, calories, ingredients, and excluded terms.
    - Request Edamam fields explicitly, including `instructionLines`, and filter out recipes without instructions.
    - Minimize Edamam requests by using the default 20-hit page and requesting additional pages only when needed to fill `max_results`.
    - Normalize instruction lines enough for readable recipe output without inventing missing steps.
    - Remove REWE-specific recipe provider code paths, metadata, docs, and user-facing claims from Nutrition.
    - Verify output quality with five OpenMates CLI recipe searches before creating a real CLI chat.
    - Create and review one real OpenMates CLI chat before replacing the current Nutrition app-skill example chat.
  out:
    - Meal planning memories and saved recipe persistence.
    - Shopping-cart or ingredient-ordering integration.
    - Scraping source recipe websites for missing Edamam instructions.
    - Adding a second recipe provider fallback in the same slice.
    - Apple-native recipe UI changes beyond impact verification.

context_discovery:
  github_issues:
    - "None found via `gh issue list --repo glowingkitty/OpenMates --search \"nutrition recipe Edamam REWE search_recipes\" --state all --limit 10`. GitHub MCP search returned 401, so `gh` fallback was used."
  docs:
    - docs/contributing/guides/spec-driven-development.md
    - docs/user-guide/apps/nutrition.md
    - docs/specs/example-chat-public-quality/spec.yml
    - docs/contributing/guides/testing.md
  code_patterns:
    - backend/apps/nutrition/skills/search_recipes.py
    - backend/apps/nutrition/providers/rewe_recipe_provider.py
    - backend/apps/nutrition/app.yml
    - backend/shared/python_utils/app_skill_helpers.py
  tests:
    - backend/tests/test_skill_preview_metadata.py
    - scripts/tests/test_user_guide_app_docs_claims.py
    - scripts/audit_example_chats.py
  external_research:
    - "Edamam Recipe Search v2 endpoint verified live: `https://api.edamam.com/api/recipes/v2`."
    - "Working credential pair verified with sanitized local requests; credentials must be stored in Vault/secrets, not committed."
    - "OpenAPI schema `https://api.edamam.com/doc/open-api/recipe-search-v2.yaml` defines `instructionLines` on `Recipe`."
    - "Live API accepts `field=instructionLines`, although the field enum in the OpenAPI query parameter omits it."
    - "Paced requests under the upgraded plan succeeded; rapid bursts still hit 429 around the fifth immediate request."

apple_impact:
  affected_files:
    - apple/OpenMates/Sources/Features/Embeds/NutritionRecipeEmbedPreview.swift
    - apple/OpenMates/Sources/Features/Embeds/NutritionRecipeEmbedFullscreen.swift
  parity_expectations:
    - Nutrition recipe embeds should continue rendering title, image, ingredients, instructions, nutrition, and source link fields after provider normalization.
    - No intentional visual redesign is included in this provider replacement.
  verification:
    - Run or attempt `python3 scripts/apple_remote.py status` after implementation.
    - Run or attempt `python3 scripts/apple_remote.py build-ios` if Apple embed schemas or shared example data change.
  intentional_native_differences:
    - none

clarification:
  rounds:
    - question: "Should the Edamam replacement change the nutrition `search_recipes` tool schema from required `filters: string[]` to a free-text `query` field with optional structured filters, or preserve the old `filters` field as the LLM-facing input and internally convert it to an Edamam query?"
      answer: Use `query` as the required field.
    - question: "Confirm the scope before writing the full spec: replace REWE with Edamam, require `query`, filter out missing instructions, minimize requests, normalize instructions, verify five CLI outputs, create a real CLI chat, then replace the app-skill example."
      answer: Yes, go ahead.
  vision_summary: >
    The Nutrition recipe skill should use Edamam directly and return up to ten
    high-quality recipe results with usable step-by-step instructions. It should
    avoid wasting API calls by using Edamam's default page size and only
    following pagination when instruction filtering leaves too few usable
    results. Implementation is not complete until CLI quality checks and a real
    CLI chat demonstrate good output quality before the example chat is
    replaced.
  approved_by_user: true

scenarios:
  - id: S-1
    title: User asks for a common recipe search
    given:
      - The Nutrition app skill is enabled.
      - Edamam credentials are available through server-side secrets.
    when:
      - "The mate calls `nutrition/search_recipes` with `query: \"edamame\"` and `max_results: 10`."
    then:
      - The skill queries Edamam once for the first page of results.
      - The skill returns ten recipes when at least ten first-page results include `instructionLines`.
      - Every returned recipe includes title, source URL, image URL, ingredients, and normalized instructions.

  - id: S-2
    title: User asks for filtered dietary results
    given:
      - The user asks for quick vegan pasta recipes.
    when:
      - "The mate calls `nutrition/search_recipes` with `query: \"pasta\"`, `health: [\"vegan\"]`, `time: \"1-30\"`, and `max_results: 10`."
    then:
      - The Edamam request maps these filters to the corresponding API query parameters.
      - Returned recipes preserve Edamam diet and health labels for the model and UI.
      - Recipes without instructions are not returned.

  - id: S-3
    title: Instruction filtering requires another page
    given:
      - The first Edamam page contains fewer usable instruction-bearing recipes than requested.
    when:
      - The skill needs more recipes to satisfy `max_results`.
    then:
      - The skill follows `_links.next.href` at most until `max_results` is filled or a configured page cap is reached.
      - The skill preserves the explicit field list on subsequent requests if Edamam's next link omits fields.
      - The response records how many raw hits were inspected and how many were filtered out for missing instructions.

  - id: S-4
    title: Edamam has fewer usable recipes than requested
    given:
      - The user asks for an obscure query such as `kiwano amaranth toddler breakfast`.
    when:
      - Edamam returns zero or fewer instruction-bearing recipes than `max_results`.
    then:
      - The skill returns the available usable recipes, or an empty results array if none exist.
      - The response does not fabricate instructions or scrape external sites.
      - The mate can explain that fewer instruction-bearing recipes were found.

  - id: S-5
    title: Edamam rate limit is hit
    given:
      - Edamam returns HTTP 429 for a search request.
    when:
      - The provider handles the response.
    then:
      - The skill returns an explicit typed error message for the affected request.
      - The error is logged with provider context and without credentials.
      - The skill does not retry in a tight loop or issue avoidable duplicate requests.

  - id: S-6
    title: Instruction lines are inconsistent
    given:
      - "Some Edamam recipes return one long instruction line containing multiple `Step N:` markers."
      - Other recipes return already split lines or lines without step prefixes.
    when:
      - The provider normalizes instructions.
    then:
      - "Obvious combined `Step N:` segments are split into separate ordered steps."
      - Existing clean line breaks are preserved.
      - Step prefixes are normalized consistently enough for recipe embeds and model summaries.
      - The normalizer does not split arbitrary prose in ways that change recipe meaning.

  - id: S-7
    title: CLI output quality gate passes before example replacement
    given:
      - The Edamam provider is implemented locally or on dev.
    when:
      - Five different OpenMates CLI recipe searches are run.
    then:
      - Each CLI output includes requested result counts when enough usable recipes exist.
      - Every returned recipe has instructions, image data, source attribution, and ingredients.
      - The reviewed outputs are good enough to create one real CLI chat for public example replacement.

  - id: S-8
    title: Public Nutrition example chat is replaced after real output review
    given:
      - Five CLI quality checks passed.
      - One real CLI chat demonstrates Nutrition recipe search naturally.
    when:
      - The example-chat workflow runs for the Nutrition app skill.
    then:
      - The new example chat is based on real OpenMates CLI/app output, not hand-authored fixtures.
      - Recipe embeds in the public example include renderable public images and renderable instructions.
      - Existing example-chat audits pass.

acceptance_criteria:
  - id: AC-1
    scenario: S-1
    text: "`nutrition/search_recipes` uses Edamam Recipe Search v2 and no longer calls the REWE recipe provider for recipe search."
  - id: AC-2
    scenario: S-1
    text: "The skill requires `query` as the primary input and caps `max_results` to 1-10 with a documented default."
  - id: AC-3
    scenario: S-1
    text: "The provider explicitly requests recipe fields required by UI/model output, including `instructionLines`."
  - id: AC-4
    scenario: S-2
    text: Optional filters map to Edamam-supported parameters and invalid values return explicit request-level errors.
  - id: AC-5
    scenario: S-3
    text: The provider uses one Edamam request by default and follows pagination only when needed to fill instruction-bearing results.
  - id: AC-6
    scenario: S-4
    text: "Recipes without non-empty `instructionLines` are filtered out and never returned as normal recipe results."
  - id: AC-7
    scenario: S-5
    text: Edamam HTTP errors and rate limits produce visible request-level errors without exposing credentials.
  - id: AC-8
    scenario: S-6
    text: "Instruction normalization produces a stable `instructions[]` shape with step numbers/text and preserves source text where splitting is uncertain."
  - id: AC-9
    scenario: S-7
    text: Five different OpenMates CLI checks demonstrate good result quality before creating a real chat.
  - id: AC-10
    scenario: S-8
    text: A new real Nutrition example chat replaces the current Nutrition app-skill example only after CLI output quality is approved.
  - id: AC-11
    scenario: S-8
    text: Nutrition docs, app metadata, translations, and example audits no longer make REWE-specific recipe claims after replacement.

contracts:
  api:
    - name: Edamam Recipe Search
      route: GET https://api.edamam.com/api/recipes/v2
      request: >
        type=public, q=<query>, app_id=<secret>, app_key=<secret>, repeated
        field values including instructionLines, optional Edamam filters.
      response: >
        Response.hits[].recipe with uri, label, source, url, image/images,
        ingredientLines, ingredients, instructionLines, yield, totalTime,
        calories, labels, cautions, cuisine/meal/dish types, nutrients, and
        optional glycemic/CO2 fields.
      errors:
        - 401/403 when credentials are invalid or plan lacks access.
        - 429 when rate limit is exceeded.
        - 400 when unsupported filters are sent.
    - name: Nutrition skill input
      route: app skill `nutrition/search_recipes`
      request: >
        `{ requests: [{ query: string, max_results?: number, health?: string[],
        diet?: string[], time?: string, calories?: string, cuisine_type?: string[],
        meal_type?: string[], dish_type?: string[], excluded?: string[],
        ingredients?: string }] }`
      response: >
        `{ provider: "Edamam", results: [{ id, query, results: RecipeResult[],
        total_available, raw_hits_seen, filtered_out_missing_instructions }] }`
      errors:
        - Missing query returns a request-level validation error.
        - Unsupported filter values return request-level validation errors.
        - Provider errors return request-level error groups without hiding failure.
  data:
    - Recipe results use stable Edamam `uri` or a derived ID as the result UID.
    - Recipe `url` and `source` are preserved for attribution and fallback.
    - "`image_url` uses the best available Edamam image URL but is treated as expiring and suitable for proxying, not long-term static storage."
    - "`instructions` is a normalized array of `{ step: integer, text: string }` derived only from Edamam `instructionLines`."
    - "`ingredients` preserves both display lines and structured ingredient data where available."
    - Nutrition values must label whether they are total recipe values or per-serving derived values.
  ui_states:
    - Recipe search preview still has parent result-list metadata for up to six preview cards.
    - Child recipe embeds can render title, source, image, ingredients, instructions, nutrition, labels, and source link.
    - Empty usable results show a helpful message rather than blank embeds.
  privacy_security:
    - Edamam app ID/key are server-only secrets and never sent to the frontend, CLI output, logs, examples, docs, or committed fixtures.
    - Source recipe text is external content and remains subject to prompt-injection sanitization before model inference.
    - Logs include status codes and request context but not credentials or full signed image URLs.
    - Public example chat data must not contain private credentials, account IDs, raw share keys, or private user data.
  rate_limits:
    - One Edamam request returns up to 20 raw hits by default; do not reduce page size if the API default already returns 20.
    - Do not issue per-result lookup calls for normal search output because search responses include required fields when requested.
    - Follow pagination only when instruction filtering leaves fewer usable results than `max_results`.
    - Use a small page cap, initially 3 pages / 60 raw hits, to prevent runaway API use.
    - On 429, surface an explicit rate-limit error; do not tight-loop retries.
  docs_i18n:
    - Update `backend/apps/nutrition/app.yml` from REWE/filter-tag claims to Edamam/free-text query claims.
    - Update `docs/user-guide/apps/nutrition.md` claims and source descriptions.
    - Update i18n YAML sources for Nutrition skill examples/descriptions; do not edit generated JSON directly.

