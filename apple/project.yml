# XcodeGen project spec — generates OpenMates.xcodeproj from this YAML.
# Run: xcodegen generate (requires: brew install xcodegen)
# This keeps the Xcode project config version-controlled and mergeable.

name: OpenMates
options:
  bundleIdPrefix: org.openmates
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

configs:
  Debug: debug
  Release: release

targets:
  OpenMates:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: OpenMates/Sources
        excludes:
          - "**/*.generated.swift"
      # Import generated design tokens from the frontend token pipeline
      - path: ../frontend/packages/ui/src/tokens/generated/swift
        name: DesignTokens
        type: group
    resources:
      # Xcode asset catalogs with theme-aware colors and custom icons
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Assets.xcassets
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Icons.xcassets
      - path: OpenMates/Resources
    settings:
      base:
        INFOPLIST_FILE: OpenMates/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app
        CODE_SIGN_ENTITLEMENTS: OpenMates/Resources/OpenMates.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          # StoreKit testing configuration for sandbox purchases
          STOREKIT_CONFIGURATION: OpenMates/Resources/OpenMates.storekit
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
    entitlements:
      path: OpenMates/Resources/OpenMates.entitlements
      properties:
        com.apple.developer.authentication-services.autofill-credential-provider: true
        com.apple.developer.web-credentials: true
        com.apple.developer.associated-domains:
          - webcredentials:openmates.org
          - webcredentials:dev.openmates.org
          - applinks:openmates.org
          - applinks:dev.openmates.org
          - activitycontinuation:openmates.org
          - activitycontinuation:dev.openmates.org
        keychain-access-groups:
          - $(AppIdentifierPrefix)org.openmates.app
    info:
      path: OpenMates/Resources/Info.plist
      properties:
        CFBundleDisplayName: OpenMates
        CFBundleName: OpenMates
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        NSUserActivityTypes:
          - org.openmates.app.viewChat
          - org.openmates.app.composeChat
          - org.openmates.app.browseChats
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: OpenMatesShareExtension
      - target: OpenMatesWidget

  # Share extension — share URLs, text, and images from other apps into OpenMates chats
  OpenMatesShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenMatesShareExtension
    settings:
      base:
        INFOPLIST_FILE: OpenMatesShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.share
        CODE_SIGN_ENTITLEMENTS: OpenMatesShareExtension/OpenMatesShareExtension.entitlements
        SWIFT_VERSION: "6.0"
    entitlements:
      path: OpenMatesShareExtension/OpenMatesShareExtension.entitlements

  # WidgetKit extension — Daily Inspiration home screen widget
  OpenMatesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenMatesWidget
    settings:
      base:
        INFOPLIST_FILE: OpenMatesWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.widget
        CODE_SIGN_ENTITLEMENTS: OpenMatesWidget/OpenMatesWidget.entitlements
        SWIFT_VERSION: "6.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: OpenMatesWidget/OpenMatesWidget.entitlements

  # Unit + integration tests (XCTest) — mirrors vitest/pytest suites
  OpenMatesTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - path: OpenMates/Tests/Unit
    dependencies:
      - target: OpenMates
    settings:
      base:
        INFOPLIST_FILE: OpenMates/Tests/Info.plist
        GENERATE_INFOPLIST_FILE: true

  # UI tests (XCUITest) — mirrors Playwright E2E specs
  OpenMatesUITests:
    type: bundle.ui-testing
    platform: [iOS, macOS]
    sources:
      - path: OpenMates/Tests/UI
    dependencies:
      - target: OpenMates
    settings:
      base:
        INFOPLIST_FILE: OpenMates/Tests/Info.plist
        GENERATE_INFOPLIST_FILE: true
