# XcodeGen project spec — generates OpenMates.xcodeproj from this YAML.
# Run: xcodegen generate (requires: brew install xcodegen)
# This keeps the Xcode project config version-controlled and mergeable.

name: OpenMates
options:
  bundleIdPrefix: org.openmates
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.13.0"
    CURRENT_PROJECT_VERSION: 9
    DEVELOPMENT_TEAM: Z9B2YFKN2X
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

configs:
  Debug: debug
  Release: release

packages:
  LucideIcons:
    url: https://github.com/JakubMazur/lucide-icons-swift.git
    from: 1.8.0

targets:
  OpenMates:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: OpenMates/Sources
        excludes:
          - "**/*.generated.swift"
      - path: OpenMatesShared
      # Import generated design tokens from the frontend token pipeline
      - path: ../frontend/packages/ui/src/tokens/generated/swift
        name: DesignTokens
        type: group
      - path: ../frontend/packages/ui/static/images/mates
        buildPhase: resources
        name: Mates
        type: folder
      - path: ../frontend/packages/ui/src/i18n/locales
        buildPhase: resources
        name: i18n
        type: folder
      - path: ../frontend/packages/ui/src/demo_chats/data/example_chats
        buildPhase: resources
        name: example_chats
        type: folder
      - path: OpenMates/Resources/Videos
        buildPhase: resources
        name: Videos
        type: folder
      - path: OpenMates/Resources/Fonts
        buildPhase: resources
        name: Fonts
        type: folder
    resources:
      # Xcode asset catalogs with theme-aware colors and custom icons
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Assets.xcassets
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Icons.xcassets
    settings:
      base:
        INFOPLIST_FILE: OpenMates/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app
        CODE_SIGN_ENTITLEMENTS: OpenMates/Resources/OpenMatesPasskey.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          OPENMATES_DEV_WEBCREDENTIALS: webcredentials:app.dev.openmates.org
          # StoreKit testing configuration for sandbox purchases
          STOREKIT_CONFIGURATION: OpenMates/Resources/OpenMates.storekit
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
          OPENMATES_DEV_WEBCREDENTIALS: webcredentials:app.dev.openmates.org
    entitlements:
      path: OpenMates/Resources/OpenMatesPasskey.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(CFBundleIdentifier)
          - $(AppIdentifierPrefix)org.openmates.app
        com.apple.security.application-groups:
          - group.org.openmates.app.shared
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.developer.associated-domains:
          - webcredentials:openmates.org
          - $(OPENMATES_DEV_WEBCREDENTIALS)
          - webcredentials:app.openmates.org
    info:
      path: OpenMates/Resources/Info.plist
      properties:
        CFBundleDisplayName: OpenMates
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: OpenMates
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        OpenMatesKeychainAccessGroup: $(AppIdentifierPrefix)org.openmates.app
        NSUserActivityTypes:
          - org.openmates.app.viewChat
          - org.openmates.app.composeChat
          - org.openmates.app.browseChats
        NSMicrophoneUsageDescription: OpenMates uses the microphone to record voice messages you choose to send in chat.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - LexendDeca-Light.ttf
          - LexendDeca-Regular.ttf
          - LexendDeca-Medium.ttf
          - LexendDeca-SemiBold.ttf
          - LexendDeca-Bold.ttf
          - LexendDeca-ExtraBold.ttf
    dependencies:
      - package: LucideIcons
      - target: OpenMatesShareExtension
        platforms: [iOS]
      - target: OpenMatesShareExtension_macOS
        platforms: [macOS]
      - target: OpenMatesWidget
        platforms: [iOS]
      - target: OpenMatesWatch
        platforms: [iOS]
        embed: true

  # Independent watchOS app — starts with standalone target plumbing; auth/chat UI lands in later spec tasks.
  OpenMatesWatch:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    resources:
      - path: OpenMatesWatch/Assets.xcassets
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Assets.xcassets
      - path: OpenMates/Resources/Fonts
        buildPhase: resources
        name: Fonts
        type: folder
      - path: ../frontend/packages/ui/src/i18n/locales
        buildPhase: resources
        name: i18n
        type: folder
    settings:
      base:
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: WatchAppIcon
        CODE_SIGN_ENTITLEMENTS: OpenMatesWatch/OpenMatesWatch.entitlements
        GENERATE_PKGINFO_FILE: YES
        INFOPLIST_FILE: OpenMatesWatch/Info.plist
        PRIVATE_HEADERS_FOLDER_PATH: $(CONTENTS_FOLDER_PATH)/PrivateHeaders
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.watch
        PRODUCT_NAME: OpenMatesWatch
        SDKROOT: watchos
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
        WRAPPER_EXTENSION: app
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
    entitlements:
      path: OpenMatesWatch/OpenMatesWatch.entitlements
    info:
      path: OpenMatesWatch/Info.plist
      properties:
        CFBundleIconFiles:
          - WatchAppIcon
        CFBundleIconName: WatchAppIcon
        CFBundleDisplayName: OpenMates
        CFBundleName: OpenMates
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        WKCompanionAppBundleIdentifier: org.openmates.app
        WKWatchKitApp: true
        NSMicrophoneUsageDescription: OpenMates uses the microphone to record voice messages you choose to send in chat.
        UIAppFonts:
          - LexendDeca-Light.ttf
          - LexendDeca-Regular.ttf
          - LexendDeca-Medium.ttf
          - LexendDeca-SemiBold.ttf
          - LexendDeca-Bold.ttf
          - LexendDeca-ExtraBold.ttf
    dependencies:
      - target: OpenMatesWatchExtension
        embed: true

  OpenMatesWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: OpenMatesWatch/Sources
      - path: OpenMates/Sources/Core/Models/AuthError.swift
      - path: OpenMates/Sources/Core/Models/AuthModels.swift
      - path: OpenMates/Sources/Core/Crypto/CryptoManager.swift
      - path: OpenMates/Sources/Core/Crypto/KeychainHelper.swift
      - path: OpenMates/Sources/Core/Models/EmbedModels.swift
      - path: OpenMates/Sources/Core/Networking/APIClient.swift
      - path: OpenMates/Sources/Core/Networking/ServerConfiguration.swift
      - path: OpenMates/Sources/Core/Watch/WatchChatRuntime.swift
      - path: OpenMates/Sources/Core/Watch/WatchEmbedPreviewModel.swift
      - path: OpenMates/Sources/Features/Auth/ViewModels/PairLoginRuntime.swift
      - path: OpenMates/Sources/Shared/Extensions/AnyCodable.swift
      - path: OpenMates/Sources/Shared/Extensions/DataExtensions.swift
      - path: OpenMatesShared/OpenMatesSharedEnvironment.swift
      - path: ../frontend/packages/ui/src/tokens/generated/swift/ColorTokens.generated.swift
        name: ColorTokens.generated.swift
      - path: ../frontend/packages/ui/src/tokens/generated/swift/GradientTokens.generated.swift
        name: GradientTokens.generated.swift
      - path: ../frontend/packages/ui/src/tokens/generated/swift/SpacingTokens.generated.swift
        name: SpacingTokens.generated.swift
      - path: ../frontend/packages/ui/src/tokens/generated/swift/TypographyTokens.generated.swift
        name: TypographyTokens.generated.swift
    resources:
      - path: ../frontend/packages/ui/src/tokens/generated/swift/Assets.xcassets
      - path: OpenMates/Resources/Fonts
        buildPhase: resources
        name: Fonts
        type: folder
      - path: ../frontend/packages/ui/src/i18n/locales
        buildPhase: resources
        name: i18n
        type: folder
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: OpenMatesWatchExtension/OpenMatesWatchExtension.entitlements
        INFOPLIST_FILE: OpenMatesWatchExtension/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.watch.watchkitextension
        PRODUCT_NAME: OpenMatesWatchExtension
        SDKROOT: watchos
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "4"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -Owholemodule
    entitlements:
      path: OpenMatesWatchExtension/OpenMatesWatchExtension.entitlements
    info:
      path: OpenMatesWatchExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenMates
        CFBundleName: OpenMatesWatchExtension
        CFBundlePackageType: XPC!
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: org.openmates.app.watch
          NSExtensionPointIdentifier: com.apple.watchkit
        NSMicrophoneUsageDescription: OpenMates uses the microphone to record voice messages you choose to send in chat.
        WKRunsIndependentlyOfCompanionApp: true
        UIAppFonts:
          - LexendDeca-Light.ttf
          - LexendDeca-Regular.ttf
          - LexendDeca-Medium.ttf
          - LexendDeca-SemiBold.ttf
          - LexendDeca-Bold.ttf
          - LexendDeca-ExtraBold.ttf

  # Share extension — share URLs, text, and images from other apps into OpenMates chats
  OpenMatesShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenMatesShareExtension
      - path: OpenMatesShared
      - path: OpenMates/Sources/Core/Crypto/CryptoManager.swift
      - path: OpenMates/Sources/Core/Crypto/KeychainHelper.swift
      - path: OpenMates/Sources/Core/Networking/ServerConfiguration.swift
      - path: OpenMates/Sources/Shared/Extensions/AnyCodable.swift
    settings:
      base:
        INFOPLIST_FILE: OpenMatesShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.share
        CODE_SIGN_ENTITLEMENTS: OpenMatesShareExtension/OpenMatesShareExtension.entitlements
        SWIFT_VERSION: "6.0"
    entitlements:
      path: OpenMatesShareExtension/OpenMatesShareExtension.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(CFBundleIdentifier)
          - $(AppIdentifierPrefix)org.openmates.app
        com.apple.security.application-groups:
          - group.org.openmates.app.shared

  # macOS share extension — share URLs and text from Mac apps into OpenMates chats
  OpenMatesShareExtension_macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: OpenMatesShareExtensionMacOS
      - path: OpenMatesShared
      - path: OpenMates/Sources/Core/Crypto/CryptoManager.swift
      - path: OpenMates/Sources/Core/Crypto/KeychainHelper.swift
      - path: OpenMates/Sources/Core/Networking/ServerConfiguration.swift
      - path: OpenMates/Sources/Shared/Extensions/AnyCodable.swift
    settings:
      base:
        INFOPLIST_FILE: OpenMatesShareExtensionMacOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.sharemacos
        CODE_SIGN_ENTITLEMENTS: OpenMatesShareExtensionMacOS/OpenMatesShareExtensionMacOS.entitlements
        SWIFT_VERSION: "6.0"
    entitlements:
      path: OpenMatesShareExtensionMacOS/OpenMatesShareExtensionMacOS.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(CFBundleIdentifier)
          - $(AppIdentifierPrefix)org.openmates.app
        com.apple.security.application-groups:
          - group.org.openmates.app.shared
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
  # WidgetKit extension — Daily Inspiration home screen widget
  OpenMatesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenMatesWidget
    settings:
      base:
        INFOPLIST_FILE: OpenMatesWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.widget
        CODE_SIGN_ENTITLEMENTS: OpenMatesWidget/OpenMatesWidget.entitlements
        SWIFT_VERSION: "6.0"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: OpenMatesWidget/OpenMatesWidget.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)$(CFBundleIdentifier)
          - $(AppIdentifierPrefix)org.openmates.app
        com.apple.security.application-groups:
          - group.org.openmates.app.shared

  OpenMatesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OpenMatesUITests
    dependencies:
      - target: OpenMates_iOS
    settings:
      base:
        INFOPLIST_FILE: OpenMatesUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.uitests
        PRODUCT_NAME: OpenMatesUITests
        TEST_TARGET_NAME: OpenMates_iOS
        SWIFT_VERSION: "6.0"

  OpenMatesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenMatesTests
    dependencies:
      - target: OpenMates_iOS
    settings:
      base:
        INFOPLIST_FILE: OpenMatesTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.openmates.app.tests
        PRODUCT_NAME: OpenMatesTests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OpenMates.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OpenMates
        BUNDLE_LOADER: $(TEST_HOST)
        SWIFT_VERSION: "6.0"

schemes:
  OpenMates_iOS:
    build:
      targets:
        OpenMates_iOS: all
    test:
      targets:
        - OpenMatesTests
        - OpenMatesUITests
  OpenMatesWatch:
    build:
      targets:
        OpenMatesWatch: all
