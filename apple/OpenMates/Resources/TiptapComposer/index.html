<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>OpenMates Composer</title>
  <style>
    :root {
      color-scheme: light dark;
      --font-primary: #1f2933;
      --font-tertiary: rgba(31, 41, 51, 0.58);
      --button-primary: #ff553b;
      --selection: rgba(255, 85, 59, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      color: var(--font-primary);
      font-family: "Lexend Deca", "LexendDeca", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.45;
    }

    body[contenteditable="false"] {
      opacity: 0.72;
    }

    #message-editor {
      width: 100%;
      min-height: 40px;
      padding: 16px 16px 60px;
      outline: none;
      caret-color: var(--button-primary);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      -webkit-user-select: text;
      user-select: text;
    }

    #message-editor .ProseMirror {
      min-height: inherit;
      outline: none;
    }

    #message-editor p {
      margin: 0;
    }

    #message-editor p + p {
      margin-top: 0.35em;
    }

    #message-editor .embed-full-width-wrapper {
      width: 100%;
      display: block;
      margin: 0 0 8px;
    }

    #message-editor .embed-unified-container {
      width: min(300px, 100%);
      min-height: 60px;
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.10);
      overflow: hidden;
      user-select: none;
    }

    #message-editor .embed-app-icon {
      width: 60px;
      height: 60px;
      flex: 0 0 60px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, #ff553b, #ff9f45);
    }

    #message-editor .embed-content {
      min-width: 0;
      flex: 1;
      padding: 0 12px;
    }

    #message-editor .embed-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      color: var(--font-primary);
    }

    #message-editor .embed-subtitle {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
      color: var(--font-tertiary);
      margin-top: 2px;
    }

    #message-editor .embed-remove {
      width: 32px;
      height: 32px;
      margin-right: 8px;
      border: 0;
      border-radius: 50%;
      background: rgba(31, 41, 51, 0.10);
      color: var(--font-tertiary);
      font: inherit;
    }

    #message-editor.inline-compact {
      min-height: 48px;
      padding: 12px 24px;
      text-align: center;
      font-weight: 600;
      line-height: 24px;
    }

    #message-editor .is-editor-empty:first-child::before,
    #message-editor p.is-empty:first-child::before {
      content: attr(data-placeholder);
      color: var(--font-tertiary);
      font-weight: 500;
      pointer-events: none;
      float: left;
      height: 0;
    }

    #message-editor.inline-compact .is-editor-empty:first-child::before,
    #message-editor.inline-compact p.is-empty:first-child::before {
      display: block;
      text-align: center;
      width: 100%;
    }

    ::selection {
      background: var(--selection);
    }
  </style>
</head>
<body>
  <div id="message-editor" role="textbox" aria-multiline="true" data-testid="message-editor" data-placeholder="" contenteditable="true"></div>
  <script type="importmap">
    {
      "imports": {
        "/@tiptap/": "./vendor/@tiptap/"
      }
    }
  </script>
  <script type="module" src="composer.js"></script>
</body>
</html>
